id: JDG.9.17
reference: Judges 9:17
source:
  edition: WLC
  text: אֲשֶׁר נִלְחַ֥ם אָבִ֖/י עֲלֵי/כֶ֑ם וַ/יַּשְׁלֵ֤ךְ אֶת נַפְשׁ/וֹ֙ מִ/נֶּ֔גֶד
    וַ/יַּצֵּ֥ל אֶתְ/כֶ֖ם מִ/יַּ֥ד מִדְיָֽן־־׃
translation:
  text: because my father fought for you, risked his life, and delivered you from
    the hand of Midian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'threw his life in front,' an idiom meaning he exposed himself
      to deadly danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'rescued you from the power of Midian.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: In context this relative particle introduces the reason supporting Jotham's
    accusation from the previous verse, so an explicitly causal rendering fits the
    discourse better than a bare relative 'who/that.'
- source_word: נִלְחַם
  chosen: fought
  alternatives:
  - fought against
  - went to battle
  lexicon: HALOT
  rationale: The Niphal of לחם commonly means 'to fight/do battle.' With עֲלֵיכֶם
    here, the sense is fighting on behalf of or for the benefit of the audience, not
    against them, as confirmed by the following clause about deliverance from Midian.
- source_word: עֲלֵיכֶם
  chosen: for you
  alternatives:
  - on your behalf
  - for your sake
  lexicon: HALOT
  rationale: 'Although עַל often means ''on/upon/against,'' in this context it expresses
    advantage or behalf: Gideon fought for the people''s benefit. ''For you'' is natural
    modern English and preserves the sense.'
- source_word: וַיַּשְׁלֵךְ אֶת־נַפְשׁוֹ מִנֶּגֶד
  chosen: risked his life
  alternatives:
  - cast his life in front
  - threw his life away
  - exposed himself to danger
  lexicon: HALOT
  rationale: Literally, 'threw his life from in front/opposite,' an idiom for exposing
    oneself to mortal danger. 'Risked his life' conveys the idiomatic sense clearly
    without over-paraphrasing.
- source_word: וַיַּצֵּל
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: נצל in the Hiphil means to snatch away, rescue, or deliver. 'Delivered'
    fits the military-political context and pairs naturally with 'from the hand of
    Midian.'
- source_word: מִיַּד מִדְיָן
  chosen: from the hand of Midian
  alternatives:
  - from Midian's hand
  - from the power of Midian
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' denotes power or control. Retaining
    'hand' preserves the biblical idiom in readable English.
