id: JDG.9.6
reference: Judges 9:6
source:
  edition: WLC
  text: וַ/יֵּאָ֨סְפ֜וּ כָּל בַּעֲלֵ֤י שְׁכֶם֙ וְ/כָל בֵּ֣ית מִלּ֔וֹא וַ/יֵּ֣לְכ֔וּ
    וַ/יַּמְלִ֥יכוּ אֶת אֲבִימֶ֖לֶךְ לְ/מֶ֑לֶךְ עִם אֵל֥וֹן מֻצָּ֖ב אֲשֶׁ֥ר בִּ/שְׁכֶֽם־־־־׃
translation:
  text: Then all the leaders of Shechem and all Beth-millo gathered together, and
    they went and made Abimelech king by the oak monument that was in Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by the oak of the pillar/standing stone"; the Hebrew phrase is difficult,
      and the exact sense of מֻצָּב is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Beth-millo may mean "the house of Millo," but the expression likely functions
      here as a place or clan name.
    reason: cultural_note
lexical_decisions:
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the בעלי of Shechem
  lexicon: HALOT
  rationale: בעלים literally denotes 'owners/masters/lords,' but in this civic-political
    context it refers to the leading men or power-holders of the city rather than
    all inhabitants. 'Leaders' communicates the social-political sense in natural
    English without overstating feudal lordship.
- source_word: בֵּית מִלּוֹא
  chosen: Beth-millo
  alternatives:
  - the house of Millo
  - the Millo household
  lexicon: HALOT
  rationale: This appears to be a proper place/group designation. Since the referent
    is uncertain and functions name-like, transliteration best preserves the source
    without over-interpreting it as a literal household.
- source_word: וַיַּמְלִיכוּ ... לְמֶלֶךְ
  chosen: made Abimelech king
  alternatives:
  - proclaimed Abimelech king
  - crowned Abimelech king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to reign/make king. 'Made ...
    king' is a straightforward rendering; 'crowned' would add ceremony not explicit
    in the Hebrew.
- source_word: עִם
  chosen: by
  alternatives:
  - with
  - beside
  - at
  lexicon: HALOT
  rationale: With a locative landmark, עִם can indicate proximity. Here it marks the
    place of Abimelech's enthronement relative to the tree/standing object. 'By' is
    idiomatic and spatially clear in English.
- source_word: אֵלוֹן
  chosen: oak
  alternatives:
  - terebinth
  - great tree
  lexicon: HALOT
  rationale: אֵלוֹן commonly refers to a large tree, often rendered 'oak' or 'terebinth.'
    'Oak' is the conventional and readable choice, while the exact species is not
    certain enough to press without note.
- source_word: מֻצָּב
  chosen: monument
  alternatives:
  - pillar
  - standing stone
  - garrison
  lexicon: HALOT
  rationale: As a passive participial form from נצב, the word denotes something set
    up/standing. In this context attached to אֵלוֹן, it likely identifies a notable
    standing memorial or marker associated with the oak. 'Monument' preserves the
    idea of an erected landmark without forcing the more specific 'pillar' or the
    contextually unlikely 'garrison'.
- source_word: וַיֵּאָסְפוּ
  chosen: gathered together
  alternatives:
  - assembled
  lexicon: HALOT
  rationale: The verb means to gather/assemble. 'Gathered together' fits the narrative
    style and reflects the collective action.
