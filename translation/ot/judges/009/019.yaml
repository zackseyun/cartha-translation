id: JDG.9.19
reference: Judges 9:19
source:
  edition: WLC
  text: וְ/אִם בֶּ/אֱמֶ֨ת וּ/בְ/תָמִ֧ים עֲשִׂיתֶ֛ם עִם יְרֻבַּ֥עַל וְ/עִם בֵּית֖/וֹ
    הַ/יּ֣וֹם הַ/זֶּ֑ה שִׂמְחוּ֙ בַּ/אֲבִימֶ֔לֶךְ וְ/יִשְׂמַ֥ח גַּם ה֖וּא בָּ/כֶֽם־־־־׃
translation:
  text: And if today you have acted in truth and integrity toward Jerubbaal and toward
    his house, rejoice in Abimelech, and let him also rejoice in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this day' instead of 'today.'
    reason: lexical_alternative
  - marker: b
    text: Or 'dealt with Jerubbaal and his house faithfully and with integrity.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his house' may refer to his household, family, or dynasty.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - Now if
  lexicon: HALOT
  rationale: Retains the conjunction plus conditional particle, linking this verse
    to the preceding conditional rhetoric in Jotham's speech. 'And if' best preserves
    the flow from the prior clause.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - truly
  - faithfully
  lexicon: HALOT
  rationale: The noun אֱמֶת denotes truth, reliability, or faithfulness. 'In truth'
    preserves the nominal expression and pairs naturally with the following 'integrity.'
- source_word: וּבְתָמִים
  chosen: and integrity
  alternatives:
  - and sincerity
  - and blamelessness
  lexicon: HALOT
  rationale: תָמִים here describes moral wholeness/uprightness in conduct. 'Integrity'
    is idiomatic in English and fits the ethical evaluation of their treatment of
    Jerubbaal's house.
- source_word: עֲשִׂיתֶם עִם
  chosen: you have acted toward
  alternatives:
  - you have dealt with
  - you have done by
  lexicon: HALOT
  rationale: The idiom עשה עם commonly means 'deal with' or 'act toward' someone.
    'Acted toward' is clear modern English and preserves the relational sense.
- source_word: יְרֻבַּעַל
  chosen: Jerubbaal
  rationale: Personal name is transliterated according to the project's philosophy.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his family
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew term and can include family/dynasty.
    Because Abimelech''s violence concerns the broader family line, ''house'' is preferable
    to the narrower ''family,'' while remaining intelligible.'
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'this day,' but in contemporary English
    'today' communicates the temporal force naturally without loss.
- source_word: שִׂמְחוּ
  chosen: rejoice
  alternatives:
  - be glad
  - celebrate
  lexicon: HALOT
  rationale: Imperative plural calling for joy. 'Rejoice' preserves the elevated rhetorical
    tone better than 'be glad' or 'celebrate.'
- source_word: בַּאֲבִימֶלֶךְ
  chosen: in Abimelech
  alternatives:
  - over Abimelech
  - with Abimelech
  lexicon: HALOT
  rationale: The preposition ב with שמח can indicate rejoicing in or over someone.
    'In Abimelech' best mirrors the Hebrew and matches the parallel 'in you' in the
    next clause.
- source_word: וְיִשְׂמַח גַּם הוּא בָּכֶם
  chosen: and let him also rejoice in you
  alternatives:
  - and may he also rejoice over you
  - and he too will rejoice in you
  lexicon: HALOT
  rationale: The prefixed imperfect after the imperative is jussive in force. 'Let
    him also rejoice in you' captures the reciprocal wish/entailment of the conditional
    statement.
