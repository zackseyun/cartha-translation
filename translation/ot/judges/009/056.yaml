theological_decisions:
- issue: Divine agency in judgment
  chosen_reading: God actively repaid Abimelech for his evil.
  alternative_readings:
  - God allowed Abimelech's evil to come back on him
  rationale: The Hebrew verb and syntax present God as the explicit subject who causes
    the evil to return upon Abimelech. The translation should preserve that direct
    statement without softening divine judicial agency.
  doctrine_reference: Translation philosophy §1, §3
