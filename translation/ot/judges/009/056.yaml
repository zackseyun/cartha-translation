id: JDG.9.56
reference: Judges 9:56
source:
  edition: WLC
  text: וַ/יָּ֣שֶׁב אֱלֹהִ֔ים אֵ֖ת רָעַ֣ת אֲבִימֶ֑לֶךְ אֲשֶׁ֤ר עָשָׂה֙ לְ/אָבִ֔י/ו
    לַ/הֲרֹ֖ג אֶת שִׁבְעִ֥ים אֶחָֽי/ו־׃
translation:
  text: Thus God repaid Abimelech for the evil that he had done to his father by killing
    his seventy brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned upon Abimelech the evil.' The Hebrew idiom speaks of causing
      his evil to come back on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: repaid
  alternatives:
  - returned
  - brought back upon
  lexicon: HALOT
  rationale: The hiphil of שוב here carries the idiom of causing evil to return upon
    someone, i.e., requiting or repaying. 'Repaid' expresses the judicial sense naturally
    in English while preserving the causative force.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form takes a singular verb and clearly refers to the
    one God of Israel acting in judgment; therefore 'God' is the correct English rendering.
- source_word: רָעַת
  chosen: the evil
  alternatives:
  - the wickedness
  - the harm
  lexicon: HALOT
  rationale: רָעָה can denote evil, wickedness, or harm. In this context it refers
    to Abimelech's morally evil deed, not merely unfortunate consequences, so 'the
    evil' best preserves the ethical force.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had done
  alternatives:
  - which he did
  lexicon: HALOT
  rationale: A natural English relative clause with past perfect fits the retrospective
    summary of Abimelech's prior action.
- source_word: לְאָבִיו
  chosen: to his father
  alternatives:
  - against his father
  lexicon: HALOT
  rationale: The preposition ל here marks the person affected by the deed. In English,
    'to his father' is idiomatic and sufficiently broad; the following infinitive
    explains the hostile action.
- source_word: לַהֲרֹג
  chosen: by killing
  alternatives:
  - when he killed
  - in killing
  lexicon: HALOT
  rationale: The infinitive construct with ל explains the content or manner of the
    evil done to his father. 'By killing' clearly links the evil to the murder of
    the brothers.
- source_word: שִׁבְעִים אֶחָיו
  chosen: his seventy brothers
  alternatives:
  - seventy of his brothers
  lexicon: HALOT
  rationale: This is the straightforward sense of the phrase. 'His seventy brothers'
    is natural English and preserves the familial relationship central to the crime.
- source_word: וַ
  chosen: Thus
  alternatives:
  - And
  - So
  lexicon: HALOT
  rationale: Although the conjunction is simply 'and,' in this summarizing context
    'Thus' brings out the narrative conclusion and resultative force in idiomatic
    English.
