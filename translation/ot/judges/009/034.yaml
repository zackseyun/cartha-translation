id: JDG.9.34
reference: Judges 9:34
source:
  edition: WLC
  text: וַ/יָּ֧קָם אֲבִימֶ֛לֶךְ וְ/כָל הָ/עָ֥ם אֲשֶׁר עִמּ֖/וֹ לָ֑יְלָה וַ/יֶּאֶרְב֣וּ
    עַל שְׁכֶ֔ם אַרְבָּעָ֖ה רָאשִֽׁים־־־׃
translation:
  text: So Abimelech and all the people who were with him got up by night, and they
    lay in ambush against Shechem in four companies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'four heads,' an idiom meaning four groups or divisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: got up
  alternatives:
  - arose
  - set out
  lexicon: HALOT
  rationale: From קום, here a wayyiqtol narrative verb indicating rising/setting into
    action. 'Got up' is natural modern English and preserves the concrete movement
    without overinterpreting it as departure alone.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: Adverbial accusative of time. 'By night' is concise and idiomatic in
    English, conveying nocturnal action without implying the entire night duration.
- source_word: וַיֶּאֶרְבוּ
  chosen: they lay in ambush
  alternatives:
  - they set an ambush
  - they lurked in ambush
  lexicon: HALOT
  rationale: From ארב, to lie in wait/ambush. 'Lay in ambush' best captures the military
    stealth sense in idiomatic English.
- source_word: עַל שְׁכֶם
  chosen: against Shechem
  alternatives:
  - near Shechem
  - by Shechem
  - at Shechem
  lexicon: HALOT
  rationale: With ארב, עַל can mark hostile direction or target. 'Against Shechem'
    reflects the adversarial posture of the ambush more clearly than a merely locative
    rendering.
- source_word: אַרְבָּעָה רָאשִׁים
  chosen: in four companies
  alternatives:
  - in four groups
  - as four bands
  - in four divisions
  lexicon: HALOT
  rationale: Literally 'four heads,' an idiom for divisions/groups of men. 'Companies'
    gives a clear military sense in context while preserving the idea of four distinct
    units.
- source_word: הָעָם אֲשֶׁר עִמּוֹ
  chosen: all the people who were with him
  alternatives:
  - all the men who were with him
  - all the troops with him
  lexicon: HALOT
  rationale: עם is broadly 'people.' Although the context is military, the Hebrew
    does not explicitly specify 'men' or 'troops,' so the more literal 'people who
    were with him' is preferred.
