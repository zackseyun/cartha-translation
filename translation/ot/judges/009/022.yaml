id: JDG.9.22
reference: Judges 9:22
source:
  edition: WLC
  text: וַ/יָּ֧שַׂר אֲבִימֶ֛לֶךְ עַל יִשְׂרָאֵ֖ל שָׁלֹ֥שׁ שָׁנִֽים־׃
translation:
  text: Abimelech ruled over Israel for three years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשַׂר
  chosen: ruled
  alternatives:
  - was prince over
  - governed
  lexicon: HALOT
  rationale: The verb from שׂרר denotes exercising rule or dominion. In this narrative
    context, 'ruled' is the most natural modern English rendering and avoids the awkwardly
    literal 'was prince over' while preserving the political sense.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: עַל
  chosen: over
  alternatives:
  - among
  lexicon: HALOT
  rationale: With verbs of ruling, עַל commonly marks authority over someone or something.
    'Over' best reflects the governance relationship.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the national name.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: three years
  lexicon: HALOT
  rationale: Straightforward duration expression; idiomatic English requires 'for
    three years' to convey the temporal span.
