id: JDG.9.48
reference: Judges 9:48
source:
  edition: WLC
  text: וַ/יַּ֨עַל אֲבִימֶ֜לֶךְ הַר צַלְמ֗וֹן הוּא֮ וְ/כָל הָ/עָ֣ם אֲשֶׁר אִתּ/וֹ֒
    וַ/יִּקַּח֩ אֲבִימֶ֨לֶךְ אֶת הַ/קַּרְדֻּמּ֜וֹת בְּ/יָד֗/וֹ וַ/יִּכְרֹת֙ שׂוֹכַ֣ת
    עֵצִ֔ים וַ/יִּ֨שָּׂאֶ֔/הָ וַ/יָּ֖שֶׂם עַל שִׁכְמ֑/וֹ וַ/יֹּ֜אמֶר אֶל הָ/עָ֣ם אֲשֶׁר
    עִמּ֗/וֹ מָ֤ה רְאִיתֶם֙ עָשִׂ֔יתִי מַהֲר֖וּ עֲשׂ֥וּ כָמֽוֹ/נִי־־־־־־־׃
translation:
  text: Then Abimelek went up Mount Zalmon, he and all the people who were with him.
    Abimelek took the axes in his hand, cut down a branch of trees, lifted it, and
    put it on his shoulder. Then he said to the people who were with him, “What you
    have seen me do, hurry and do as I have done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a bough of trees,” “a thicket of wood,” or “a bundle of brushwood”;
      the Hebrew term is rare and refers to a mass of branches or brushwood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: HALOT
  rationale: עלה in narrative commonly means 'go up' or 'ascend.' 'Went up' is natural
    modern English and preserves the directional sense without sounding overly elevated.
- source_word: הַר צַלְמוֹן
  chosen: Mount Zalmon
  alternatives:
  - the mountain Zalmon
  - Mount Salmon
  lexicon: HALOT
  rationale: הַר + proper name is best rendered as 'Mount Zalmon.' The place name
    is transliterated rather than translated, following the philosophy for names.
- source_word: הוּא וְכָל־הָעָם אֲשֶׁר אִתּוֹ
  chosen: he and all the people who were with him
  alternatives:
  - he and all the troops with him
  - he and all the men with him
  lexicon: HALOT
  rationale: The pronoun plus accompanying phrase is retained for emphasis. עָם is
    broadly 'people'; although these are likely fighting men, the Hebrew does not
    specify 'men' here, so 'people' is the more textually transparent choice.
- source_word: הַקַּרְדֻּמּוֹת
  chosen: the axes
  alternatives:
  - the axe
  - the hatchets
  lexicon: HALOT
  rationale: The noun is morphologically plural with the article. English can idiomatically
    say 'the axes' for the available cutting tools. Some construe it collectively
    or as an abstract plural, but the plural form is best represented.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with his hand
  - into his hand
  lexicon: HALOT
  rationale: The preposition ב plus 'hand' here indicates instrument/possession. 'In
    his hand' is the most direct rendering and fits the action sequence.
- source_word: וַיִּכְרֹת שׂוֹכַת עֵצִים
  chosen: cut down a branch of trees
  alternatives:
  - cut down a bough of trees
  - cut down a bundle of brushwood
  - cut a thicket of wood
  lexicon: HALOT
  rationale: שׂוֹכָה denotes a mass of interwoven branches, thicket, or bough. In
    this context Abimelek cuts something portable that he can carry on his shoulder
    and that the people can imitate for burning the tower. 'A branch of trees' communicates
    a cut leafy bough/cluster without over-specifying. Alternatives are possible because
    the term is relatively rare and context-driven.
- source_word: וַיִּשָּׂאֶהָ
  chosen: lifted it
  alternatives:
  - carried it
  - bore it
  lexicon: HALOT
  rationale: נשא means 'lift, carry, bear.' Since the next clause explicitly states
    placement on his shoulder, 'lifted it' preserves the sequence of actions.
- source_word: וַיָּשֶׂם עַל שִׁכְמוֹ
  chosen: put it on his shoulder
  alternatives:
  - placed it on his shoulder
  - set it upon his shoulder
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom, using readable modern English.
- source_word: מָה רְאִיתֶם עָשִׂיתִי
  chosen: What you have seen me do
  alternatives:
  - What you saw I did
  - What you have seen that I did
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat compressed. English requires smoothing: the sense
    is an imperative based on observed example. ''What you have seen me do'' is idiomatic
    and faithful.'
- source_word: מַהֲרוּ
  chosen: hurry
  alternatives:
  - make haste
  - quickly
  lexicon: HALOT
  rationale: Imperative plural from מהר. 'Hurry' is direct, natural, and preserves
    the urgency.
- source_word: עֲשׂוּ כָמוֹנִי
  chosen: do as I have done
  alternatives:
  - do like me
  - do as I do
  lexicon: HALOT
  rationale: כָמוֹנִי is literally 'like me.' In context, Abimelek is commanding imitation
    of the action just performed, so 'do as I have done' makes the implied comparison
    explicit in natural English.
