id: JDG.9.27
reference: Judges 9:27
source:
  edition: WLC
  text: וַ/יֵּצְא֨וּ הַ/שָּׂדֶ֜ה וַֽ/יִּבְצְר֤וּ אֶת כַּרְמֵי/הֶם֙ וַֽ/יִּדְרְכ֔וּ
    וַֽ/יַּעֲשׂ֖וּ הִלּוּלִ֑ים וַ/יָּבֹ֨אוּ֙ בֵּ֣ית אֱֽלֹֽהֵי/הֶ֔ם וַ/יֹּֽאכְלוּ֙
    וַ/יִּשְׁתּ֔וּ וַֽ/יְקַלְל֖וּ אֶת אֲבִימֶֽלֶךְ־־׃
translation:
  text: And they went out into the field and gathered the grapes from their vineyards
    and trod them, and they held a festival. Then they went into the house of their
    god and ate and drank and cursed Abimelek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they held harvest festivities' or 'they made merry.' The Hebrew term
      refers to festal celebration, likely connected with the grape harvest.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the house of their gods.' The Hebrew form can be read as plural, though
      here it is likely singular in sense, referring to the deity worshiped at that
      shrine.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ הַשָּׂדֶה
  chosen: they went out into the field
  alternatives:
  - they went out to the field
  - they went out into the countryside
  lexicon: HALOT
  rationale: The directional ending on שָׂדֶה supports movement into/to the open country
    or field. 'Into the field' is natural English and preserves the sense of going
    out from the city/settlement.
- source_word: וַיִּבְצְרוּ אֶת כַּרְמֵיהֶם
  chosen: gathered the grapes from their vineyards
  alternatives:
  - harvested their vineyards
  - picked their grapes
  lexicon: HALOT
  rationale: בצר in vineyard context refers specifically to gathering grapes, not
    generic harvesting. Expanding slightly to 'gathered the grapes from their vineyards'
    makes the object clear in English.
- source_word: וַיִּדְרְכוּ
  chosen: trod them
  alternatives:
  - trodden them
  - trampled them
  - pressed them
  lexicon: HALOT
  rationale: דרך here refers to treading grapes. 'Trod them' keeps the concrete imagery
    and links naturally to the previously supplied 'grapes.' 'Pressed them' is possible
    but less literal.
- source_word: וַיַּעֲשׂוּ הִלּוּלִים
  chosen: they held a festival
  alternatives:
  - they made merry
  - they celebrated praises
  - they held harvest festivities
  lexicon: HALOT
  rationale: הִלּוּלִים in this context denotes festal celebration associated with
    the vintage, likely with rejoicing and revelry. 'Held a festival' communicates
    the event clearly in modern English without overinterpreting the exact ritual
    form.
- source_word: בֵּית אֱלֹהֵיהֶם
  chosen: the house of their god
  alternatives:
  - the temple of their god
  - the house of their gods
  lexicon: HALOT
  rationale: 'The singular construct ''house of'' plus אֱלֹהֵיהֶם can be rendered
    singular in sense here: the shrine/temple of the deity they worshiped. ''House
    of their god'' is formally close; ''temple'' is interpretive. The plural form
    of אֱלֹהִים with singular sense is common.'
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: ate and drank
  alternatives:
  - feasted and drank
  - ate and drank together
  lexicon: HALOT
  rationale: A straightforward rendering preserves the sequence and avoids adding
    nuance not explicit in the text, though the context implies feasting.
- source_word: וַיְקַלְלוּ אֶת אֲבִימֶלֶךְ
  chosen: cursed Abimelek
  alternatives:
  - reviled Abimelek
  - called down curses on Abimelek
  lexicon: HALOT
  rationale: קלל in the piel commonly means 'curse.' This is stronger than mere insult,
    and the direct object marker supports a direct act against Abimelek.
