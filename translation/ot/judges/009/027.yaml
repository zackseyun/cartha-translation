theological_decisions:
- issue: Rendering אֱלֹהֵיהֶם in a pagan context
  chosen_reading: their god
  alternative_readings:
  - their gods
  rationale: Although the form can be morphologically plural, in this context it likely
    refers to the specific deity whose shrine they entered. Rendering it as singular
    best fits the immediate narrative scene without importing theological commentary.
  doctrine_reference: Translation philosophy §1, §5
