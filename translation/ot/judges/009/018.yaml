theological_decisions:
- issue: Social status nuance of אֲמָתוֹ in Abimelek's maternal description
  chosen_reading: Rendered as 'his female servant' rather than 'concubine' or 'slave
    woman' in the main text.
  alternative_readings:
  - his slave woman
  - his maidservant
  - his concubine
  rationale: The Hebrew noun itself denotes a female servant/slave woman. The verse
    uses the term polemically to underscore Abimelek's lower maternal status relative
    to Gideon's other sons. 'Female servant' preserves the lexical sense without importing
    the more institutionally specific 'concubine' into the main text. Because the
    social nuance may matter for interpretation, alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
