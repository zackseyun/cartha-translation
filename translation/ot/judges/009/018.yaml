id: JDG.9.18
reference: Judges 9:18
source:
  edition: WLC
  text: וְ/אַתֶּ֞ם קַמְתֶּ֨ם עַל בֵּ֤ית אָבִ/י֙ הַ/יּ֔וֹם וַ/תַּהַרְג֧וּ אֶת בָּנָ֛י/ו
    שִׁבְעִ֥ים אִ֖ישׁ עַל אֶ֣בֶן אֶחָ֑ת וַ/תַּמְלִ֜יכוּ אֶת אֲבִימֶ֤לֶךְ בֶּן אֲמָת/וֹ֙
    עַל בַּעֲלֵ֣י שְׁכֶ֔ם כִּ֥י אֲחִי/כֶ֖ם הֽוּא־־־־־־׃
translation:
  text: But you have risen up against my father's house today, and you killed his
    sons, seventy men, on one stone, and you made Abimelek, the son of his female
    servant, king over the leaders of Shechem, because he is your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of his slave woman,' or more interpretively, 'the son of his
      concubine.' The Hebrew says 'the son of his female servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַמְתֶּם עַל
  chosen: have risen up against
  alternatives:
  - have attacked
  - have stood against
  lexicon: HALOT
  rationale: The idiom קום על commonly conveys hostile action or opposition. 'Have
    risen up against' preserves the metaphor and accusatory force better than the
    flatter 'attacked,' while remaining natural English.
- source_word: בֵּית אָבִי
  chosen: my father's house
  alternatives:
  - my father's household
  - the house of my father
  lexicon: HALOT
  rationale: '''House'' here denotes the family line/household, not merely a building.
    ''My father''s house'' is a standard and readable rendering that preserves the
    familial-dynastic sense.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: The adverb marks the present occasion in Jotham's speech. 'Today' is
    idiomatic modern English and preserves the temporal emphasis.
- source_word: וַתַּהַרְגוּ
  chosen: you killed
  alternatives:
  - you slew
  - you murdered
  lexicon: HALOT
  rationale: The verb simply states killing. Although the context is morally charged,
    'murdered' would import an interpretive legal judgment not explicit in the verb
    itself. 'Killed' is therefore the more textually restrained choice.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - its sons
  lexicon: HALOT
  rationale: The suffix most naturally refers back to 'my father' (Gideon/Jerubbaal),
    not to 'house.' Thus 'his sons' is the clearest English rendering.
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ with a number is a common way to count adult males. 'Seventy men'
    is both literal and contextually appropriate.
- source_word: עַל אֶבֶן אֶחָת
  chosen: on one stone
  alternatives:
  - upon a single stone
  - at one stone
  lexicon: HALOT
  rationale: The phrase likely indicates the place/instrumental setting of the mass
    execution. 'On one stone' is the most direct rendering and preserves the grim
    concreteness of the Hebrew.
- source_word: וַתַּמְלִיכוּ
  chosen: you made ... king
  alternatives:
  - you crowned
  - you caused ... to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king. 'Made ... king' is straightforward
    and idiomatic, preserving the causative force.
- source_word: בֶּן אֲמָתוֹ
  chosen: the son of his female servant
  alternatives:
  - the son of his slave woman
  - the son of his maidservant
  - the son of his concubine
  lexicon: HALOT
  rationale: אָמָה denotes a female servant/slave woman. 'Female servant' is readable
    and accurate without over-specifying status. 'Concubine' is interpretive and not
    the lexical value of the noun itself, though the broader narrative may imply secondary-wife
    status.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the men of Shechem
  lexicon: HALOT
  rationale: בַּעֲלֵי in this political context refers to the leading men or בעלי-status
    holders of the city. 'Leaders of Shechem' communicates the civic-political sense
    more clearly for modern readers than the archaic 'lords.'
- source_word: כִּי אֲחִיכֶם הוּא
  chosen: because he is your brother
  alternatives:
  - for he is your brother
  lexicon: HALOT
  rationale: כִּי here gives the reason for their action. 'Because he is your brother'
    preserves the causal force and the irony of Jotham's accusation.
