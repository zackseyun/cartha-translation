id: JDG.19.18
reference: Judges 19:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֗י/ו עֹבְרִ֨ים אֲנַ֜חְנוּ מִ/בֵּֽית לֶ֣חֶם יְהוּדָה֮ עַד יַרְכְּתֵ֣י הַר אֶפְרַיִם֒ מִ/שָּׁ֣ם אָנֹ֔כִי וָ/אֵלֵ֕ךְ עַד בֵּ֥ית לֶ֖חֶם יְהוּדָ֑ה וְ/אֶת בֵּ֤ית יְהוָה֙ אֲנִ֣י הֹלֵ֔ךְ וְ/אֵ֣ין אִ֔ישׁ מְאַסֵּ֥ף אוֹתִ֖/י הַ/בָּֽיְתָ/ה־־־־־׃
translation:
  text: He said to him, “We are passing from Bethlehem in Judah to the remote parts of the hill country of Ephraim. I am from there, and I went to Bethlehem in Judah, and I am going to the house of Yahweh, but no man is taking me into his house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and I am going home' / 'to my house.' Some understand the Hebrew here idiomatically or as reflecting a different reading because 'the house of the LORD' is contextually unexpected.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹבְרִים אֲנַחְנוּ
  chosen: We are passing through
  alternatives:
  - We are traveling
  - We are on our way
  lexicon: HALOT
  rationale: The participle of עבר with the pronoun expresses ongoing travel or transit. 'Passing through' preserves the sense of being in transit without over-paraphrasing.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem in Judah
  alternatives:
  - from Bethlehem of Judah
  lexicon: HALOT
  rationale: A standard place-name expression. 'In Judah' is more natural modern English while preserving the geographic distinction from other Bethlehems.
- source_word: יַרְכְּתֵי הַר אֶפְרַיִם
  chosen: the remote parts of the hill country of Ephraim
  alternatives:
  - the far reaches of the hill country of Ephraim
  - the recesses of the hill country of Ephraim
  lexicon: HALOT
  rationale: יַרְכְּתֵי literally denotes extremities or remote parts. 'Hill country of Ephraim' is the established geographic sense of הַר אֶפְרַיִם.
- source_word: מִשָּׁם אָנֹכִי
  chosen: I am from there
  alternatives:
  - that is where I am from
  lexicon: HALOT
  rationale: A straightforward statement of origin. The simple rendering best matches the Hebrew.
- source_word: וָאֵלֵךְ עַד בֵּית לֶחֶם יְהוּדָה
  chosen: and I went to Bethlehem in Judah
  alternatives:
  - and I had gone to Bethlehem in Judah
  - and I am going to Bethlehem in Judah
  lexicon: HALOT
  rationale: 'The wayyiqtol of הלך is most naturally past narrative: ''I went.'' Although the travel description is somewhat compressed, this preserves the Hebrew verbal form better than smoothing it into a present tense.'
- source_word: וְאֶת בֵּית יְהוָה אֲנִי הֹלֵךְ
  chosen: and I am going to the house of the LORD
  alternatives:
  - and I am going home
  - and I am going to the house of Yahweh
  lexicon: HALOT
  rationale: The Hebrew explicitly reads 'the house of YHWH.' In keeping with doctrine, יְהוָה is rendered 'the LORD.' Some interpreters emend or idiomatically understand this as 'my house/home,' but the consonantal text supports 'the house of the LORD,' so the main text follows the source and preserves the alternative in a footnote.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֵין אִישׁ מְאַסֵּף אוֹתִי הַבָּיְתָה
  chosen: but no man is taking me into his house
  alternatives:
  - and no one is gathering me into the house
  - and no man is receiving me home
  lexicon: HALOT
  rationale: אסף in this hospitality context means to take in or receive. 'No man' preserves the singular אִישׁ and the gender-accurate policy. 'Into his house' makes explicit the hospitality sense of הַבָּיְתָה in idiomatic English.
