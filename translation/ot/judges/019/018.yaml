theological_decisions:
- issue: Rendering of וְאֶת בֵּית יְהוָה אֲנִי הֹלֵךְ
  chosen_reading: and I am going to the house of Yahweh
  alternative_readings:
  - and I am going home
  - and I am going to my house
  rationale: The Masoretic Text explicitly reads 'house of YHWH.' Although many translations adopt or imply an alternative sense such as 'my house/home' because of contextual difficulty, the translation philosophy prioritizes the source text's plain sense unless there is compelling reason otherwise. The contextual alternative is preserved in a footnote rather than replacing the Hebrew reading in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered singular אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - nobody
  rationale: The Hebrew uses the masculine singular noun אִישׁ. Following the gender-accurate policy, 'no man' is retained rather than neutralizing to 'no one,' since the context concerns household hospitality offered by a male householder.
  doctrine_reference: Translation philosophy §4
