id: JDG.19.29
reference: Judges 19:29
source:
  edition: WLC
  text: וַ/יָּבֹ֣א אֶל בֵּית֗/וֹ וַ/יִּקַּ֤ח אֶת הַֽ/מַּאֲכֶ֨לֶת֙ וַ/יַּחֲזֵ֣ק בְּ/פִֽילַגְשׁ֔/וֹ
    וַֽ/יְנַתְּחֶ֨/הָ֙ לַ/עֲצָמֶ֔י/הָ לִ/שְׁנֵ֥ים עָשָׂ֖ר נְתָחִ֑ים וַֽ/יְשַׁלְּחֶ֔/הָ
    בְּ/כֹ֖ל גְּב֥וּל יִשְׂרָאֵֽל־־׃
translation:
  text: When he entered his house, he took the knife, seized his concubine, and cut
    her up, limb by limb, into twelve pieces, and sent her throughout all the territory
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to her bones,' an idiom here meaning that he
      cut the body apart by its limbs or skeletal parts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  chosen: When he entered his house
  alternatives:
  - And he came into his house
  - He went to his house
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; 'entered his house' is natural
    English for בוא אל בית while preserving the concrete movement into the house.
- source_word: הַמַּאֲכֶלֶת
  chosen: the knife
  alternatives:
  - the cleaver
  - the slaughtering knife
  lexicon: HALOT
  rationale: מַאֲכֶלֶת denotes a cutting/slaughtering implement, often a knife used
    for butchery or sacrifice. 'Knife' is the clearest modern English rendering; more
    specialized options are possible but less certain in this context.
- source_word: וַיַּחֲזֵק בְּפִילַגְשׁוֹ
  chosen: seized his concubine
  alternatives:
  - took hold of his concubine
  - grasped his concubine
  lexicon: HALOT
  rationale: חזק with ב can mean to take hold of firmly. 'Seized' conveys the forceful
    action more vividly than the weaker 'took hold of.' פִילֶגֶשׁ is best rendered
    'concubine,' the standard term for a secondary wife/consort relationship in the
    Hebrew Bible.
- source_word: וַיְנַתְּחֶהָ
  chosen: cut her up
  alternatives:
  - dismembered her
  - divided her
  lexicon: HALOT
  rationale: The verb נתח refers to cutting into pieces, especially dismembering a
    body or carcass. 'Cut her up' is direct, idiomatic, and faithful to the brutality
    of the act; 'dismembered' is possible but slightly more interpretive.
- source_word: לַעֲצָמֶיהָ
  chosen: limb by limb
  alternatives:
  - according to her bones
  - by her limbs
  lexicon: HALOT
  rationale: Literally 'to/according to her bones.' In context this idiom describes
    dismemberment by skeletal parts. 'Limb by limb' communicates the sense in natural
    English better than the overly literal 'according to her bones.'
- source_word: לִשְׁנֵים עָשָׂר נְתָחִים
  chosen: into twelve pieces
  alternatives:
  - into twelve parts
  - into twelve sections
  lexicon: HALOT
  rationale: נְתָחִים are cut pieces or portions. 'Into twelve pieces' is the most
    straightforward rendering.
- source_word: וַיְשַׁלְּחֶהָ
  chosen: sent her
  alternatives:
  - sent it
  - dispatched her
  lexicon: HALOT
  rationale: The feminine singular suffix grammatically refers back to the concubine
    as the object distributed in pieces. English can preserve the shocking personal
    reference with 'sent her,' even though the body is now divided; this better reflects
    the Hebrew than the impersonal 'sent it.'
- source_word: בְּכֹל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - into all the territory of Israel
  - through all the border of Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. Here the sense is the
    full extent of Israel's land/tribal domain, not merely boundary lines. 'Throughout
    all the territory of Israel' expresses that distributive sense clearly.
