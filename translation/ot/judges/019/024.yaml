id: JDG.19.24
reference: Judges 19:24
source:
  edition: WLC
  text: הִנֵּה֩ בִתִּ֨/י הַ/בְּתוּלָ֜ה וּ/פִֽילַגְשֵׁ֗/הוּ אוֹצִֽיאָה נָּ֤א אוֹתָ/ם֙
    וְ/עַנּ֣וּ אוֹתָ֔/ם וַ/עֲשׂ֣וּ לָ/הֶ֔ם הַ/טּ֖וֹב בְּ/עֵינֵי/כֶ֑ם וְ/לָ/אִ֤ישׁ
    הַ/זֶּה֙ לֹ֣א תַעֲשׂ֔וּ דְּבַ֖ר הַ/נְּבָלָ֥ה הַ/זֹּֽאת־׃
translation:
  text: Look, here are my virgin daughter and his concubine. Please let me bring them
    out. Violate them and do to them what is good in your eyes. But to this man do
    not do this outrageous thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rape them.' The Hebrew verb can denote sexual violation/humiliation
      in this context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'what is good in your eyes,' an idiom meaning what seems good or
      pleasing to you.
    reason: cultural_note
  - marker: c
    text: Or 'this vile thing' or 'this disgraceful act.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing urgent attention. 'Look' is natural
    modern English while preserving the force better than the more archaic 'Behold.'
- source_word: בִתִּי הַבְּתוּלָה
  chosen: my virgin daughter
  alternatives:
  - my daughter, a virgin
  - my unmarried daughter
  lexicon: HALOT
  rationale: The appositional phrase identifies the daughter specifically as sexually
    untouched. 'Virgin daughter' is concise and preserves the lexical content of בְּתוּלָה
    without paraphrasing into merely social status such as 'unmarried.'
- source_word: וּפִילַגְשֵׁהוּ
  chosen: and his concubine
  alternatives:
  - and his secondary wife
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ is conventionally and accurately rendered 'concubine' in English
    Bible translation. Though culturally complex, 'concubine' is the most recognizable
    and sufficiently precise gloss.
- source_word: אוֹצִיאָה נָּא
  chosen: Please let me bring ... out
  alternatives:
  - Please let me bring ... forth
  - I will bring ... out, please
  lexicon: HALOT
  rationale: Cohortative with particle נָא expresses entreaty/polite urgency. English
    'Please let me bring them out to you' captures both the speaker's volition and
    appeal.
- source_word: וְעַנּוּ אוֹתָם
  chosen: and violate them
  alternatives:
  - and rape them
  - and abuse them
  - and humble them
  lexicon: HALOT
  rationale: ענה in the Piel can denote sexual violation/humiliation in this context.
    'Violate them' preserves the gravity and sexual abuse sense without adding a more
    specific legal term than the Hebrew itself states. 'Humble' is too opaque in modern
    English; 'abuse' is too broad.
- source_word: וַעֲשׂוּ לָהֶם הַטּוֹב בְּעֵינֵיכֶם
  chosen: and do to them what is good in your eyes
  alternatives:
  - and do to them what seems good to you
  - and treat them as you please
  lexicon: HALOT
  rationale: This idiom literally refers to what is good in the hearers' eyes, often
    meaning what seems right/pleasing to them. The chosen rendering stays close to
    the Hebrew while remaining intelligible.
- source_word: וְלָאִישׁ הַזֶּה
  chosen: But to this man
  alternatives:
  - But to this האיש
  - But against this man
  lexicon: HALOT
  rationale: Fronted prepositional phrase marks contrast. 'But to this man' preserves
    the dative/prepositional construction and the rhetorical contrast with the women
    offered.
- source_word: לֹא תַעֲשׂוּ
  chosen: do not do
  alternatives:
  - you must not do
  - do not commit
  lexicon: HALOT
  rationale: Simple prohibition in second person plural. 'Do not do' is direct and
    formally close.
- source_word: דְּבַר הַנְּבָלָה הַזֹּאת
  chosen: this outrageous thing
  alternatives:
  - this vile thing
  - this disgraceful act
  - this folly
  lexicon: HALOT
  rationale: נְבָלָה denotes an outrageous, disgraceful, morally vile act, often one
    violating communal and covenantal norms. 'Outrageous thing' communicates moral
    horror in clear modern English without sounding archaic like 'folly' in this context.
