theological_decisions:
- issue: Rendering sexually violent language with sufficient clarity but without interpretive
    overreach
  chosen_reading: Use 'violate them' for וְעַנּוּ אוֹתָם
  alternative_readings:
  - rape them
  - abuse them
  - humble them
  rationale: The verse depicts a horrific proposal of sexual violence. The translation
    should neither soften the evil nor claim more lexical specificity than the Hebrew
    verb alone supplies. 'Violate them' preserves the sexual and degrading force while
    remaining textually responsible.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Moral evaluation term נְבָלָה
  chosen_reading: Render as 'outrageous thing'
  alternative_readings:
  - vile thing
  - disgraceful act
  - folly
  rationale: The term signals grave moral outrage, not mere intellectual foolishness.
    'Outrageous thing' preserves the ethical condemnation in accessible modern English.
  doctrine_reference: Translation philosophy §§1, 6
