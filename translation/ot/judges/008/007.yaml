id: JDG.8.7
reference: Judges 8:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר גִּדְע֔וֹן לָ/כֵ֗ן בְּ/תֵ֧ת יְהוָ֛ה אֶת זֶ֥בַח וְ/אֶת צַלְמֻנָּ֖ע בְּ/יָדִ֑/י וְ/דַשְׁתִּי֙ אֶת בְּשַׂרְ/כֶ֔ם אֶת קוֹצֵ֥י הַ/מִּדְבָּ֖ר וְ/אֶת הַֽ/בַּרְקֳנִֽים־־־־־׃
translation:
  text: And Gideon said, “Therefore, when Yahweh gives Zebah and Zalmunna into my hand, I will thresh your flesh with the thorns of the wilderness and with briers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with brambles”; the precise plant named by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: Signals Gideon’s consequential response to the men of Succoth’s refusal in the previous verse; 'therefore' preserves the threat’s inferential force.
- source_word: בְּתֵת
  chosen: when ... gives
  alternatives:
  - in the giving of
  - when ... has given
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of נתן is naturally temporal here: ''when the LORD gives.'' This is more idiomatic in English than a wooden ''in giving'' while preserving the forward-looking condition.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name YHWH.
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - into my power
  - in my hand
  lexicon: HALOT
  rationale: This Hebrew idiom commonly expresses delivery into someone’s power. 'Into my hand' keeps the concrete imagery while remaining understandable.
- source_word: וְדַשְׁתִּי
  chosen: I will thresh
  alternatives:
  - I will trample
  - I will tear
  lexicon: HALOT
  rationale: From דושׁ, literally 'thresh.' The verb is violent and metaphorical here for punitive abuse. 'Thresh' preserves the agricultural metaphor and severity better than flattening it to a generic verb.
- source_word: בְּשַׂרְכֶם
  chosen: your flesh
  alternatives:
  - your bodies
  - your skin
  lexicon: HALOT
  rationale: '''Flesh'' is the direct lexical equivalent and conveys the brutality of the threat. ''Bodies'' is weaker and less vivid.'
- source_word: קוֹצֵי הַמִּדְבָּר
  chosen: the thorns of the wilderness
  alternatives:
  - desert thorns
  - thorns from the wilderness
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves both the plant imagery and the setting. 'Wilderness' matches common biblical English for מִדְבָּר.
- source_word: הַבַּרְקֳנִים
  chosen: briers
  alternatives:
  - brambles
  - thistles
  lexicon: HALOT
  rationale: The precise species is uncertain, but the term denotes a prickly plant. 'Briers' is a natural English equivalent that preserves the sense of sharp, injurious vegetation without over-specifying the botany.
