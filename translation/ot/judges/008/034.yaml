id: JDG.8.34
reference: Judges 8:34
source:
  edition: WLC
  text: וְ/לֹ֤א זָֽכְרוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶת יְהוָ֖ה אֱלֹהֵי/הֶ֑ם הַ/מַּצִּ֥יל אוֹתָ֛/ם מִ/יַּ֥ד כָּל אֹיְבֵי/הֶ֖ם מִ/סָּבִֽיב־־׃
translation:
  text: And the sons of Israel did not remember Yahweh their God, who had delivered them from the hand of all their enemies all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: And ... did not
  alternatives:
  - But ... did not
  - And ... not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative flow from the previous verse. 'And' preserves the Hebrew sequence naturally in English narrative.
- source_word: זָכְרוּ
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: HALOT
  rationale: זכר here denotes more than mental recollection; it implies covenantal remembrance shown in loyalty. 'Remember' is the standard and sufficiently broad English rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with the gender-accurate principle, this is preserved rather than flattened to 'Israelites,' though that alternative is idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: With YHWH as the referent, the plural form functions as the singular title 'God.' 'Their God' expresses covenant relationship.
- source_word: הַמַּצִּיל
  chosen: who had delivered
  alternatives:
  - the one delivering
  - who delivered
  - who rescued
  lexicon: HALOT
  rationale: The participle with article identifies YHWH by his saving action. In English, a relative clause is the most natural rendering. 'Had delivered' situates the action prior to their failure to remember; 'rescued' is possible, but 'delivered' fits the repeated biblical idiom 'deliver from the hand of.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for power or control. Retaining 'hand' preserves the source imagery and remains understandable in English.
- source_word: כָּל אֹיְבֵיהֶם
  chosen: all their enemies
  alternatives:
  - every one of their enemies
  lexicon: HALOT
  rationale: A straightforward rendering of the totalizing phrase.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - on every side
  - round about
  lexicon: HALOT
  rationale: The term indicates surrounding enemies on every side. 'All around' is natural modern English; 'round about' is archaic, and 'on every side' is also viable.
