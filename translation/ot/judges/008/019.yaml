id: JDG.8.19
reference: Judges 8:19
source:
  edition: WLC
  text: וַ/יֹּאמַ֕ר אַחַ֥/י בְּנֵֽי אִמִּ֖/י הֵ֑ם חַי יְהוָ֗ה ל֚וּ הַחֲיִתֶ֣ם אוֹתָ֔/ם לֹ֥א הָרַ֖גְתִּי אֶתְ/כֶֽם־־׃
translation:
  text: And he said, “They were my brothers, the sons of my mother. As Yahweh lives, if you had let them live, I would not have killed you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I would not have killed you.” The Hebrew counterfactual can be represented this way in English.
    reason: lexical_alternative
  - marker: b
    text: “The sons of my mother” means his full brothers, not merely kinsmen.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Gideon’s reply; 'And he said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kinsmen
  lexicon: HALOT
  rationale: The noun means literal brothers here, clarified by the following apposition 'the sons of my mother.' 'Brothers' best preserves the familial force and emotional weight.
- source_word: בְּנֵי אִמִּי
  chosen: the sons of my mother
  alternatives:
  - my mother's sons
  - my full brothers
  lexicon: HALOT
  rationale: This appositional phrase specifies uterine brothers. 'The sons of my mother' is a clear, fairly literal rendering. 'Full brothers' is interpretive and therefore left as an alternative rather than the main text.
- source_word: הֵם
  chosen: they were
  alternatives:
  - they are
  lexicon: HALOT
  rationale: Although formally 'they,' English requires a copula. Past tense fits the discourse because Gideon refers to men already killed.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is idiomatic English and preserves the solemn force. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לוּ
  chosen: if
  alternatives:
  - if only
  lexicon: HALOT
  rationale: Here לוּ introduces a counterfactual condition. In English, 'if' naturally conveys the protasis in this oath context; 'if only' would wrongly suggest wish rather than conditionality.
- source_word: הַחֲיִתֶם
  chosen: you had let them live
  alternatives:
  - you had kept them alive
  - you had spared them
  lexicon: HALOT
  rationale: The Hiphil of חיה means 'cause to live/keep alive.' 'Let them live' is natural and close to the Hebrew. 'Spared them' is a good contextual gloss but slightly less transparent to the underlying verb.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to Gideon’s brothers.
- source_word: לֹא הָרַגְתִּי אֶתְכֶם
  chosen: I would not kill you
  alternatives:
  - I would not have killed you
  lexicon: HALOT
  rationale: The Hebrew uses a perfect in the apodosis of a counterfactual condition. English can express this as 'I would not kill you' or 'I would not have killed you.' The former is concise and idiomatic in direct speech, while still conveying the unreal condition.
