theological_decisions:
- issue: Rendering Gideon's refusal of kingship-like authority
  chosen_reading: Gideon rejects personal and dynastic rule and attributes rightful rule to the LORD.
  alternative_readings:
  - Gideon rejects only the formal title of kingship while still exercising de facto rule
  rationale: The Hebrew uses repeated forms of מָשַׁל ('rule') for Gideon, his son, and the LORD. The verse itself contrasts human and divine rule without using a separate term for 'king.' The translation should preserve that lexical contrast and not import a stronger or narrower political category than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
