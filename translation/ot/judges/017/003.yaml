id: JDG.17.3
reference: Judges 17:3
source:
  edition: WLC
  text: וַ/יָּ֛שֶׁב אֶת אֶֽלֶף וּ/מֵאָ֥ה הַ/כֶּ֖סֶף לְ/אִמּ֑/וֹ וַ/תֹּ֣אמֶר אִמּ֡/וֹ
    הַקְדֵּ֣שׁ הִקְדַּ֣שְׁתִּי אֶת הַ/כֶּסֶף֩ לַ/יהוָ֨ה מִ/יָּדִ֜/י לִ/בְנִ֗/י לַֽ/עֲשׂוֹת֙
    פֶּ֣סֶל וּ/מַסֵּכָ֔ה וְ/עַתָּ֖ה אֲשִׁיבֶ֥/נּוּ לָֽ/ךְ־־־׃
translation:
  text: So he returned the eleven hundred pieces of silver to his mother, and his
    mother said, “I had solemnly dedicated the silver to the LORD from my hand for
    my son, to make a carved image and a cast image; so now I return it to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a molten image.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from my hand,” an idiom expressing personal possession or agency.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: returned
  alternatives:
  - gave back
  - restored
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause to return, i.e., to give back what
    had been taken. 'Returned' is natural English and preserves the restitution sense.
- source_word: אֶלֶף וּמֵאָה הַכֶּסֶף
  chosen: the eleven hundred pieces of silver
  alternatives:
  - the eleven hundred silver pieces
  - the eleven hundred shekels of silver
  lexicon: HALOT
  rationale: The phrase literally denotes 'eleven hundred silver.' 'Pieces of silver'
    is idiomatic and avoids supplying 'shekels' too confidently where the unit is
    not explicit in the Hebrew of this verse, though that is often inferred from context.
- source_word: לְאִמּוֹ
  chosen: to his mother
  lexicon: HALOT
  rationale: Straightforward dative/prepositional phrase indicating the recipient.
- source_word: הַקְדֵּשׁ הִקְדַּשְׁתִּי
  chosen: I had solemnly dedicated
  alternatives:
  - I had surely dedicated
  - I had fully consecrated
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Had
    solemnly dedicated' captures both the emphatic force and the cultic sense of setting
    apart.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - with my own hand
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom and the mother's personal
    agency in dedicating the silver. It may imply possession/source, but 'from my
    hand' is transparent and close to the Hebrew.
- source_word: לִבְנִי
  chosen: for my son
  alternatives:
  - on behalf of my son
  - to my son
  lexicon: HALOT
  rationale: The lamed here is best taken as indicating intended beneficiary/purpose.
    'For my son' fits the syntax and the following infinitive clause.
- source_word: לַעֲשׂוֹת
  chosen: to make
  alternatives:
  - for making
  lexicon: HALOT
  rationale: Infinitive of purpose following the dedication statement.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: '''Carved image'' is concrete, readable modern English, and avoids archaic
    ''graven'' while preserving the object’s crafted nature.'
- source_word: וּמַסֵּכָה
  chosen: and a cast image
  alternatives:
  - and a metal image
  - and a molten image
  lexicon: HALOT
  rationale: מסכה commonly refers to something cast, often metal. 'Cast image' is
    accurate and readable; 'molten image' is a traditional alternative worth preserving.
- source_word: וְעַתָּה
  chosen: so now
  alternatives:
  - and now
  - now therefore
  lexicon: HALOT
  rationale: This connective marks the next step in the mother's action. 'So now'
    reads naturally in English while preserving the discourse flow.
- source_word: אֲשִׁיבֶנּוּ לָךְ
  chosen: I return it to you
  alternatives:
  - I will return it to you
  - I am giving it back to you
  lexicon: HALOT
  rationale: The Hiphil imperfect can be rendered as present/future in context. Given
    the immediate speech-act and narrative setting, present 'I return it to you' is
    natural and direct.
