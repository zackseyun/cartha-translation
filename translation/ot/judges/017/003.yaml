theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per project doctrine, the default
    rendering is 'the LORD,' following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic language of dedication despite idolatrous outcome
  chosen_reading: I had solemnly dedicated the silver to the LORD
  alternative_readings:
  - I had consecrated the silver to the LORD
  rationale: The Hebrew uses sanctification/dedication language without editorial
    softening. The translation preserves the theological tension that the silver is
    said to be dedicated to the LORD for making images, rather than resolving or harmonizing
    the contradiction in the wording.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
