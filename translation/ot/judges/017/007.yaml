id: JDG.17.7
reference: Judges 17:7
source:
  edition: WLC
  text: וַ/יְהִי נַ֗עַר מִ/בֵּ֥ית לֶ֨חֶם֙ יְהוּדָ֔ה מִ/מִּשְׁפַּ֖חַת יְהוּדָ֑ה וְ/ה֥וּא
    לֵוִ֖י וְ/ה֥וּא גָֽר שָֽׁם־־׃
translation:
  text: Now there was a young man from Bethlehem in Judah, from the clan of Judah;
    and he was a Levite, and he was staying there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the family of Judah.' The Hebrew term can denote a family group
      or clan; 'clan' is used here for specificity.
    reason: lexical_alternative
  - marker: b
    text: Or 'was sojourning there' or 'was residing there.' The Hebrew verb often
      refers to living somewhere as a temporary resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - Then there was
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a new element in the narrative.
    'Now there was' is natural modern English and signals scene-setting without overtranslating
    the conjunction.
- source_word: נַעַר
  chosen: young man
  alternatives:
  - youth
  - boy
  - servant
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, young man, or servant depending on context.
    Here the following description identifies his origin and status, not servile function,
    so 'young man' best fits.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem in Judah
  alternatives:
  - from Bethlehem-judah
  - from Bethlehem of Judah
  lexicon: HALOT
  rationale: The place name is Bethlehem, qualified by Judah to distinguish it from
    other Bethlehems. 'In Judah' is idiomatic English and preserves the geographic
    sense.
- source_word: מִמִּשְׁפַּחַת יְהוּדָה
  chosen: from the clan of Judah
  alternatives:
  - from the family of Judah
  - from the tribe of Judah
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly refers to a clan or family grouping within a tribe.
    'Clan' is more precise than 'family' and avoids the broader, less exact 'tribe.'
- source_word: לֵוִי
  chosen: a Levite
  alternatives:
  - of Levi
  - a member of the tribe of Levi
  lexicon: HALOT
  rationale: The noun identifies him as a Levite. 'A Levite' is the standard concise
    English rendering and preserves the apparent tension with 'from the clan of Judah'
    without resolving it.
- source_word: גָר שָׁם
  chosen: was staying there
  alternatives:
  - was sojourning there
  - was residing there
  - was living there as a resident alien
  lexicon: HALOT
  rationale: גור often means to sojourn or reside as an outsider. In this narrative
    context, 'was staying there' is clear modern English and captures temporary residence
    without importing technical legal nuance too strongly.
