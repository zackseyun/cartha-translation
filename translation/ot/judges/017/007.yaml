theological_decisions:
- issue: Apparent tribal/geographical tension in the man's identity
  chosen_reading: Retain both 'from the clan of Judah' and 'he was a Levite' in the
    main text without harmonization.
  alternative_readings:
  - Interpret 'from the family of Judah' as merely geographic/social rather than genealogical
  - Emend or paraphrase to reduce the tension
  rationale: The Hebrew text presents both statements side by side. The translation
    should preserve the textual tension rather than resolve it, in keeping with the
    stated philosophy. This is a narrative/identity issue rather than a doctrinal
    one, but it affects how the verse is rendered.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
