id: JDG.17.9
reference: Judges 17:9
source:
  edition: WLC
  text: וַ/יֹּאמֶר ל֥/וֹ מִיכָ֖ה מֵ/אַ֣יִן תָּב֑וֹא וַ/יֹּ֨אמֶר אֵלָ֜י/ו לֵוִ֣י אָנֹ֗כִי
    מִ/בֵּ֥ית לֶ֨חֶם֙ יְהוּדָ֔ה וְ/אָנֹכִ֣י הֹלֵ֔ךְ לָ/ג֖וּר בַּ/אֲשֶׁ֥ר אֶמְצָֽא־׃
translation:
  text: Micah said to him, “Where do you come from?” And he said to him, “I am a Levite
    from Bethlehem in Judah, and I am going to reside wherever I may find a place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to sojourn wherever I may find [a place].' The verb carries the sense
      of residing temporarily, often as an outsider or dependent resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַיִן
  chosen: Where do you come from
  alternatives:
  - From where do you come?
  - Where are you from?
  lexicon: HALOT
  rationale: Interrogative of origin. 'Where do you come from?' is natural modern
    English while preserving the sense of provenance more closely than the flatter
    idiom 'Where are you from?'.
- source_word: לֵוִי
  chosen: a Levite
  alternatives:
  - Levite
  lexicon: HALOT
  rationale: 'Denotes tribal identity/member of Levi. English idiom normally uses
    the indefinite article in self-identification: ''I am a Levite.'' Capitalized
    as an ethnoreligious designation.'
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem in Judah
  alternatives:
  - from Bethlehem-judah
  - from Bethlehem of Judah
  lexicon: HALOT
  rationale: Toponym indicating Bethlehem located in the territory of Judah. 'In Judah'
    is clear modern English and avoids the less natural construct 'of Judah' while
    preserving the geographical distinction.
- source_word: הֹלֵךְ
  chosen: I am going
  alternatives:
  - I am traveling
  - I am on my way
  lexicon: HALOT
  rationale: Participle expressing ongoing or imminent action. 'I am going' preserves
    the verbal aspect without over-specifying the mode of travel.
- source_word: לָגוּר
  chosen: to reside
  alternatives:
  - to sojourn
  - to stay
  - to dwell as a resident alien
  lexicon: HALOT
  rationale: גור often carries the sense of residing temporarily or as a sojourner.
    'To reside' is readable modern English and preserves the idea of settling somewhere
    without implying permanent inheritance. 'Sojourn' is more formal and archaic;
    the fuller social nuance is difficult to carry in the main text.
- source_word: בַּאֲשֶׁר אֶמְצָא
  chosen: wherever I may find a place
  alternatives:
  - where I find
  - wherever I find
  - where I may find
  lexicon: HALOT
  rationale: The phrase is elliptical in Hebrew, implying a place/opportunity found.
    Supplying 'a place' makes the English idiomatic and clarifies the object left
    implicit in Hebrew. 'May' reflects the open-ended, contingent sense.
