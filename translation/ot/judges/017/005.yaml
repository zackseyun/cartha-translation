id: JDG.17.5
reference: Judges 17:5
source:
  edition: WLC
  text: וְ/הָ/אִ֣ישׁ מִיכָ֔ה ל֖/וֹ בֵּ֣ית אֱלֹהִ֑ים וַ/יַּ֤עַשׂ אֵפוֹד֙ וּ/תְרָפִ֔ים
    וַ/יְמַלֵּ֗א אֶת יַ֤ד אַחַד֙ מִ/בָּנָ֔י/ו וַ/יְהִי ל֖/וֹ לְ/כֹהֵֽן־־׃
translation:
  text: Now the man Micah had a house of gods, and he made an ephod and household
    idols, and he ordained one of his sons, and he became his priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shrine.' The Hebrew is literally 'a house of gods'; some take it as
      a private shrine.
    reason: lexical_alternative
  - marker: b
    text: Literally 'filled the hand of,' an idiom for installing or consecrating
      someone to priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית אֱלֹהִים
  chosen: a house of gods
  alternatives:
  - a shrine
  - a house of God/god
  lexicon: HALOT
  rationale: Although the phrase can idiomatically denote a shrine, the plural אֱלֹהִים
    here fits the immediate context of illicit cult objects (ephod and teraphim).
    Rendering it 'house of gods' preserves the likely sense of a private cultic shrine
    without importing later monotheistic associations of 'house of God.'
- source_word: אֵפוֹד
  chosen: an ephod
  lexicon: HALOT
  rationale: The term refers to a cultic object/garment with no simple English equivalent.
    Transliteration preserves the specific ancient term better than an interpretive
    paraphrase.
- source_word: תְרָפִים
  chosen: household idols
  alternatives:
  - teraphim
  - household gods
  lexicon: HALOT
  rationale: The word denotes domestic cult images. 'Household idols' communicates
    function clearly in modern English while preserving the negative cultic sense
    in context.
- source_word: וַיְמַלֵּא אֶת־יַד
  chosen: he ordained
  alternatives:
  - he filled the hand of
  - he installed/consecrated
  lexicon: HALOT
  rationale: This idiom literally means 'fill the hand' and is used for installation
    into priestly service. 'Ordained' is concise and natural English, while a footnote
    preserves the more literal/consecratory nuance.
- source_word: אַחַד מִבָּנָיו
  chosen: one of his sons
  lexicon: HALOT
  rationale: Straightforward partitive construction; 'sons' should be retained rather
    than gender-neutralized, in keeping with the Hebrew.
- source_word: וַיְהִי לוֹ לְכֹהֵן
  chosen: and he became his priest
  alternatives:
  - and he served as his priest
  - and he was his priest
  lexicon: HALOT
  rationale: 'The clause states the result of the ordination: Micah''s son became
    priest for him. ''Became his priest'' preserves the resultative force of וַיְהִי.'
- source_word: וְהָאִישׁ מִיכָה
  chosen: Now the man Micah
  alternatives:
  - And the man Micah
  - Now Micah
  lexicon: HALOT
  rationale: The Hebrew includes the article plus noun ('the man'), which can mark
    a discourse shift or topic resumption. 'Now the man Micah' preserves that texture
    better than simply 'Micah,' while remaining readable.
