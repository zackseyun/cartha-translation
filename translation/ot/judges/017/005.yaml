theological_decisions:
- issue: Whether to render בֵּית אֱלֹהִים in a way that could suggest legitimate worship
    of the true God
  chosen_reading: a house of gods
  alternative_readings:
  - a shrine
  - a house of God
  rationale: 'The context is explicitly irregular and idolatrous: Micah makes an ephod
    and teraphim and appoints his own son as priest. Rendering the phrase as ''a house
    of gods'' avoids implying sanctioned Yahwistic worship and better reflects the
    plural form in this context.'
  doctrine_reference: Translation philosophy §§1, 3, 5
