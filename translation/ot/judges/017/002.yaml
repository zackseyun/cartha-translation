id: JDG.17.2
reference: Judges 17:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לְ/אִמּ֡/וֹ אֶלֶף֩ וּ/מֵאָ֨ה הַ/כֶּ֜סֶף אֲשֶׁ֣ר לֻֽקַּֽח לָ֗/ךְ ו/אתי אָלִית֙ וְ/גַם֙ אָמַ֣רְתְּ בְּ/אָזְנַ֔/י הִנֵּֽה הַ/כֶּ֥סֶף אִתִּ֖/י אֲנִ֣י לְקַחְתִּ֑י/ו וַ/תֹּ֣אמֶר אִמּ֔/וֹ בָּר֥וּךְ בְּנִ֖/י לַ/יהוָֽה־־׃
translation:
  text: And he said to his mother, “The eleven hundred pieces of silver that were taken from you, about which you uttered a curse and also spoke in my hearing—look, the silver is with me; I took it.” And his mother said, “Blessed be my son by Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'about which you swore an oath'; the Hebrew verb can refer to an oath or a curse, but the context here favors 'uttered a curse.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Blessed be my son to/by the LORD'; the expression is a compact blessing formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף וּמֵאָה הַכֶּסֶף
  chosen: the eleven hundred pieces of silver
  alternatives:
  - the eleven hundred silver shekels
  - the eleven hundred silver pieces
  lexicon: HALOT
  rationale: The Hebrew literally gives 'one thousand and one hundred the silver.' 'Eleven hundred pieces of silver' is natural English while preserving the quantified object. 'Shekels' is possible contextually, but the unit is not explicit in the Hebrew here, so 'pieces of silver' avoids over-specification.
- source_word: לֻקַּח לָךְ
  chosen: were taken from you
  alternatives:
  - were taken for you
  - were stolen from you
  lexicon: HALOT
  rationale: The passive of לקח means 'was taken.' In context, 'from you' best reflects possession and loss. 'Stolen' captures the sense but adds an interpretive nuance not explicitly stated by the verb itself, though the context implies theft.
- source_word: וְאַתִּי אָלִית
  chosen: about which you uttered a curse
  alternatives:
  - and you cursed
  - and you pronounced an oath
  lexicon: HALOT
  rationale: אָלָה can denote an oath or a curse; in this narrative context, the mother's reaction in v. 2 and dedication in v. 3 suggest she had pronounced a curse regarding the missing silver. Rendering it 'uttered a curse' best fits the immediate context while preserving the force of the verb.
- source_word: וְגַם אָמַרְתְּ בְּאָזְנַי
  chosen: and also spoke in my hearing
  alternatives:
  - and also said in my ears
  - and even told me
  lexicon: HALOT
  rationale: The idiom 'in my ears' means 'in my hearing.' This keeps the concrete Hebrew sense while using idiomatic English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' is readable modern English and preserves the deictic force better than the archaic 'behold.'
- source_word: הַכֶּסֶף אִתִּי
  chosen: the silver is with me
  alternatives:
  - I have the silver
  - the silver is in my possession
  lexicon: HALOT
  rationale: The Hebrew is literally 'the silver is with me.' This is clear in English and preserves the source structure.
- source_word: אֲנִי לְקַחְתִּיו
  chosen: I took it
  alternatives:
  - I myself took it
  - I am the one who took it
  lexicon: HALOT
  rationale: The explicit pronoun אֲנִי adds emphasis, but English can convey this naturally without overloading the sentence. 'I took it' is direct and sufficient; the confession context carries the emphasis.
- source_word: בָּרוּךְ בְּנִי לַיהוָה
  chosen: Blessed be my son by the LORD
  alternatives:
  - Blessed be my son to the LORD
  - May my son be blessed by the LORD
  lexicon: HALOT
  rationale: The lamed with the divine name here is best taken as indicating agency or relation in a blessing formula. 'Blessed be my son by the LORD' preserves the compact Hebrew blessing. 'May my son be blessed by the LORD' is smoother but slightly more expansive than the verbless Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
