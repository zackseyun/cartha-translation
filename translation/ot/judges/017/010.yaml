id: JDG.17.10
reference: Judges 17:10
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ל֨/וֹ מִיכָ֜ה שְׁבָ֣/ה עִמָּדִ֗/י וֶֽ/הְיֵה לִ/י֮ לְ/אָ֣ב וּ/לְ/כֹהֵן֒
    וְ/אָנֹכִ֨י אֶֽתֶּן לְ/ךָ֜ עֲשֶׂ֤רֶת כֶּ֨סֶף֙ לַ/יָּמִ֔ים וְ/עֵ֥רֶךְ בְּגָדִ֖ים
    וּ/מִחְיָתֶ֑/ךָ וַ/יֵּ֖לֶךְ הַ/לֵּוִֽי־־׃
translation:
  text: Micah said to him, “Stay with me, and be a father and a priest to me, and
    I will give you ten pieces of silver a year, a set of clothes, and your living.”
    So the Levite went in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'ten silver'; the unit is not specified, so 'ten shekels
      of silver' is a common interpretive rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'an allowance of clothing.'
    reason: lexical_alternative
  - marker: c
    text: Or simply 'the Levite went'; the Hebrew verb is 'went,' though in context
      it may imply that he entered Micah's household.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָה
  chosen: Stay
  alternatives:
  - Dwell
  - Live
  lexicon: HALOT
  rationale: Imperative of ישב in context invites the Levite to reside with Micah.
    'Stay' is natural modern English and preserves the sense of remaining/living with
    him.
- source_word: עִמָּדִי
  chosen: with me
  lexicon: HALOT
  rationale: Directly expresses proximity/association; no expansion beyond the Hebrew.
- source_word: לְאָב
  chosen: a father
  alternatives:
  - father
  lexicon: HALOT
  rationale: In this context 'father' is an honorific for a personal religious adviser/patronal
    authority, not literal paternity. The indefinite article fits idiomatic English
    while preserving the metaphor.
- source_word: וּלְכֹהֵן
  chosen: and a priest
  alternatives:
  - and priest
  lexicon: HALOT
  rationale: כֹּהֵן is straightforwardly 'priest.' The article is supplied for natural
    English parallelism with 'a father.'
- source_word: עֲשֶׂרֶת כֶּסֶף
  chosen: ten pieces of silver
  alternatives:
  - ten silver pieces
  - ten shekels of silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'ten silver' without specifying a unit. 'Pieces
    of silver' preserves the nonspecificity better than 'shekels,' which would import
    a unit not stated in the text.
- source_word: לַיָּמִים
  chosen: a year
  alternatives:
  - yearly
  - by the days
  lexicon: HALOT
  rationale: This idiom means an annual term or yearly payment. 'A year' is concise
    and idiomatic in English.
- source_word: וְעֵרֶךְ בְּגָדִים
  chosen: a set of clothes
  alternatives:
  - an allowance of clothing
  - clothing
  lexicon: HALOT
  rationale: The phrase denotes provision/valuation of garments, likely a clothing
    allowance or outfit. 'A set of clothes' communicates the concrete sense accessibly
    without overtechnical wording.
- source_word: וּמִחְיָתֶךָ
  chosen: and your living
  alternatives:
  - and your food
  - and your maintenance
  - and your livelihood
  lexicon: HALOT
  rationale: מִחְיָה refers to sustenance/means of living. 'Your living' keeps the
    broad sense of ongoing support rather than narrowing it only to food.
- source_word: וַיֵּלֶךְ
  chosen: went in
  alternatives:
  - went
  - agreed and went
  - entered
  lexicon: HALOT
  rationale: In this narrative context, after an invitation to stay, the verb likely
    carries the sense of going in/entering Micah's household. 'Went in' reflects common
    English renderings of the contextual sense, though the base verb is simply 'went'.
- source_word: הַלֵּוִי
  chosen: the Levite
  lexicon: HALOT
  rationale: Definite gentilic/title referring to the previously introduced Levite;
    standard transliteration/translation.
