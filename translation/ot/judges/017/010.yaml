theological_decisions:
- issue: Honorific use of 'father' in an illicit shrine context
  chosen_reading: Retain 'father' literally
  alternative_readings:
  - advisor
  - patron
  - spiritual father
  rationale: The Hebrew uses the familial metaphor explicitly. Translating it literally
    preserves the social-religious role without softening the irregular cultic setting
    or importing later ecclesiastical terminology.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Unspecified silver unit
  chosen_reading: Do not specify 'shekels' in the main text
  alternative_readings:
  - ten shekels of silver
  rationale: The source text does not state a unit. Avoiding 'shekels' follows original-language
    primacy and resists filling in traditional assumptions beyond the Hebrew wording.
  doctrine_reference: Translation philosophy §1
