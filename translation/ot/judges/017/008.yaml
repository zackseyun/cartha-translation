id: JDG.17.8
reference: Judges 17:8
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ הָ/אִ֜ישׁ מֵ/הָ/עִ֗יר מִ/בֵּ֥ית לֶ֨חֶם֙ יְהוּדָ֔ה לָ/ג֖וּר בַּ/אֲשֶׁ֣ר
    יִמְצָ֑א וַ/יָּבֹ֧א הַר אֶפְרַ֛יִם עַד בֵּ֥ית מִיכָ֖ה לַ/עֲשׂ֥וֹת דַּרְכּֽ/וֹ־־׃
translation:
  text: And the man went from the town, from Bethlehem of Judah, to sojourn wherever
    he might find a place. And he came to the hill country of Ephraim, as far as the
    house of Micah, to continue his journey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to go on his way' or 'while making his journey.' The Hebrew idiom is
      literally 'to make his way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: Simple wayyiqtol of הלך narrating movement; 'went' is the most natural
    and sufficiently formal rendering.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש as 'the young man' by context from prior verse
  lexicon: HALOT
  rationale: The noun is simply 'the man' here. Although the broader context identifies
    him as a young Levite, this verse itself uses האיש, so the translation preserves
    the immediate wording.
- source_word: מֵהָעִיר
  chosen: from the town
  alternatives:
  - from the city
  lexicon: HALOT
  rationale: עיר can be 'city' or 'town.' Given Bethlehem's likely scale in context,
    'town' is idiomatic modern English without loss of meaning.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem of Judah
  alternatives:
  - from Beth-lehem in Judah
  - from Bethlehem Judah
  lexicon: HALOT
  rationale: Standard English transliteration with the genitival qualifier preserved
    to distinguish this Bethlehem from others.
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside
  - to stay as a foreign resident
  - to live
  lexicon: HALOT
  rationale: גור often denotes residing temporarily or as an outsider. 'Sojourn' preserves
    that nuance better than the flatter 'live' or 'stay.'
- source_word: בַּאֲשֶׁר יִמְצָא
  chosen: wherever he might find a place
  alternatives:
  - wherever he could find
  - where he found
  lexicon: HALOT
  rationale: The idiom indicates seeking any place available for residence. 'A place'
    is supplied naturally in English to make explicit the implied object of finding.
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - he arrived
  - he went
  lexicon: HALOT
  rationale: בוא is straightforwardly 'come/arrive.' 'Came' fits the narrative sequence
    and destination focus.
- source_word: הַר אֶפְרַיִם
  chosen: the hill country of Ephraim
  alternatives:
  - the hill country of the Ephraimites
  - Mount Ephraim
  lexicon: HALOT
  rationale: This phrase commonly denotes the region, not a single mountain. 'Hill
    country of Ephraim' is the standard geographic sense.
- source_word: עַד בֵּית מִיכָה
  chosen: as far as the house of Micah
  alternatives:
  - to the house of Micah
  - up to the house of Micah
  lexicon: HALOT
  rationale: עד marks extent or endpoint. 'As far as' preserves the sense of reaching
    that point in his travel.
- source_word: לַעֲשׂוֹת דַּרְכּוֹ
  chosen: to continue his journey
  alternatives:
  - to make his way
  - to go on his way
  - while making his journey
  lexicon: HALOT
  rationale: Literally 'to make/do his way,' an idiom for proceeding on one's route.
    'Continue his journey' communicates the idiomatic sense in natural English.
