id: JDG.17.4
reference: Judges 17:4
source:
  edition: WLC
  text: וַ/יָּ֥שֶׁב אֶת הַ/כֶּ֖סֶף לְ/אִמּ֑/וֹ וַ/תִּקַּ֣ח אִמּ/וֹ֩ מָאתַ֨יִם כֶּ֜סֶף
    וַ/תִּתְּנֵ֣/הוּ לַ/צּוֹרֵ֗ף וַֽ/יַּעֲשֵׂ֨/הוּ֙ פֶּ֣סֶל וּ/מַסֵּכָ֔ה וַ/יְהִ֖י
    בְּ/בֵ֥ית מִיכָֽיְהוּ־׃
translation:
  text: So he returned the silver to his mother, and his mother took two hundred pieces
    of silver and gave it to the silversmith, and he made it into a carved image and
    a cast image, and it was in the house of Micah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two hundred silver shekels'; the Hebrew says simply 'two hundred silver'
      without stating the unit explicitly in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'a graven image and a molten image.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew uses a singular verb ('and it was') after 'a carved image and
      a cast image,' likely treating the made object or set as a unit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: returned
  alternatives:
  - gave back
  - brought back
  lexicon: HALOT
  rationale: From שוב in the Hiphil/waw-consecutive narrative form, indicating causing
    the money to go back to its prior owner. 'Returned' is natural modern English
    and preserves the restitution sense.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף can denote silver or money. Here the repeated mention of measured
    silver and the later crafting context favor the more concrete 'silver,' while
    still implying monetary value.
- source_word: לְאִמּוֹ / אִמּוֹ
  chosen: to his mother / his mother
  lexicon: HALOT
  rationale: Straightforward possessive construction; repeated explicitly in Hebrew,
    so retained in English for narrative clarity and fidelity.
- source_word: מָאתַיִם כֶּסֶף
  chosen: two hundred pieces of silver
  alternatives:
  - two hundred silver shekels
  - two hundred of silver
  lexicon: HALOT
  rationale: The Hebrew gives a number plus 'silver' without an explicit unit. 'Pieces
    of silver' is idiomatic English that avoids supplying 'shekels' too confidently
    where the unit is not stated in this verse. The more specific 'shekels' is possible
    from context and common usage, but not required by the wording.
- source_word: לַצּוֹרֵף
  chosen: to the silversmith
  alternatives:
  - to the smith
  - to the metalworker
  - to the refiner
  lexicon: HALOT
  rationale: צֹרֵף commonly refers to a metalworker/refiner, and in this context,
    because the material is silver, 'silversmith' best captures the likely trade and
    reads naturally.
- source_word: וַיַּעֲשֵׂהוּ
  chosen: he made it into
  alternatives:
  - he made it
  - he fashioned it
  lexicon: HALOT
  rationale: The 3ms verb most naturally refers to the silversmith as subject. 'Made
    it into' clarifies the transformation of the silver into the following objects
    without over-paraphrasing.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image, often carved, and often in idolatrous contexts.
    'Carved image' is more lexically precise than the interpretive 'idol' and more
    readable than the archaic 'graven image.'
- source_word: וּמַסֵּכָה
  chosen: and a cast image
  alternatives:
  - and a molten image
  - and a metal image
  lexicon: HALOT
  rationale: מַסֵּכָה refers to an image made by casting metal. 'Cast image' is accurate
    and contemporary; 'molten image' is traditional but less natural in current English.
- source_word: וַיְהִי בְּבֵית מִיכָיְהוּ
  chosen: and it was in the house of Micah
  alternatives:
  - and they were in the house of Micah
  - and it came to be in Micah's house
  lexicon: HALOT
  rationale: 'The singular verb with the preceding singular object suffix supports
    a singular resumptive sense: the fashioned object/set was in Micah''s house. English
    can preserve this with singular ''it was,'' though the paired nouns are conceptually
    dual. This is slightly awkward but faithful to the Hebrew syntax.'
- source_word: מִיכָיְהוּ
  chosen: Micah
  alternatives:
  - Micaiah
  lexicon: HALOT
  rationale: Standard English transliteration in Judges is 'Micah.' Though the Hebrew
    form is longer, English convention strongly favors 'Micah' here.
