theological_decisions:
- issue: Whether to render פֶּסֶל וּמַסֵּכָה with explicitly condemnatory language
  chosen_reading: a carved image and a cast image
  alternative_readings:
  - an idol and a molten image
  - idolatrous images
  rationale: The verse narrates the making of cultic objects that are clearly problematic
    in the broader context, but the Hebrew nouns themselves should be translated rather
    than expanded into a stronger theological paraphrase. This preserves the text's
    wording without muting its likely cultic significance.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
