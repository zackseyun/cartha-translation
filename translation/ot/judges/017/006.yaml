theological_decisions:
- issue: Narratorial evaluation of Israel's condition without explicit endorsement
    of monarchy as an absolute theological good
  chosen_reading: The verse is rendered as a descriptive statement that also carries
    negative evaluative force through the idiom 'what was right in his own eyes,'
    without expanding it into a doctrinal claim beyond the text.
  alternative_readings:
  - A purely neutral historical note about the absence of centralized rule
  - An explicit theological argument that monarchy itself is the necessary remedy
  rationale: The repeated refrain in Judges functions literarily as an assessment
    of social and religious disorder. The translation preserves that tension by rendering
    the wording straightforwardly and letting the idiom communicate the critique,
    without importing a broader political theology not stated in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it
