id: JDG.17.6
reference: Judges 17:6
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם אֵ֥ין מֶ֖לֶךְ בְּ/יִשְׂרָאֵ֑ל אִ֛ישׁ הַ/יָּשָׁ֥ר בְּ/עֵינָ֖י/ו
    יַעֲשֶֽׂה׃פ
translation:
  text: In those days there was no king in Israel; each man did what was right in
    his own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone did what was right in his own eyes.' The Hebrew uses the singular
      masculine 'man' in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: A standard temporal frame formula in narrative Hebrew. 'In those days'
    is idiomatic, natural English and preserves the retrospective setting.
- source_word: אֵין מֶלֶךְ בְּיִשְׂרָאֵל
  chosen: there was no king in Israel
  alternatives:
  - there was not a king in Israel
  lexicon: HALOT
  rationale: The existential particle אֵין with the noun phrase states the absence
    of a king. 'There was no king in Israel' is idiomatic and keeps the clause's plain
    sense without adding interpretive nuance.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each person
  lexicon: HALOT
  rationale: The singular noun means 'man' or 'each one.' Following the project's
    gender-accurate principle, 'each man' preserves the masculine singular representative
    force better than the gender-neutral 'everyone' or 'each person'.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - what was upright
  - the right thing
  lexicon: HALOT
  rationale: The adjective יָשָׁר denotes what is straight, right, or upright. In
    this idiom, 'what was right' is the most natural English rendering and matches
    the evaluative sense.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - in his own sight
  lexicon: HALOT
  rationale: This Hebrew idiom expresses subjective personal judgment. 'In his own
    eyes' is the established and clearest English equivalent; 'own' makes the reflexive
    force explicit.
- source_word: יַעֲשֶׂה
  chosen: did
  alternatives:
  - would do
  - was doing
  lexicon: HALOT
  rationale: Although morphologically imperfect, in this narrative-summary context
    it expresses customary past action. English simple past 'did' communicates the
    habitual sense naturally; the distributive 'each man' already signals repeated
    customary behavior.
