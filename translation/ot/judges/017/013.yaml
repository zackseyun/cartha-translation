id: JDG.17.13
reference: Judges 17:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מִיכָ֔ה עַתָּ֣ה יָדַ֔עְתִּי כִּֽי יֵיטִ֥יב יְהוָ֖ה לִ֑/י כִּ֧י
    הָיָה לִ֛/י הַ/לֵּוִ֖י לְ/כֹהֵֽן־־׃
translation:
  text: Then Micah said, “Now I know that the LORD will do good to me, because I have
    a Levite as priest.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Levite as priest.” The Hebrew has the article (“the Levite”), which
      may refer to the specific Levite already introduced, though English idiom often
      uses “a Levite” in this construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: מִיכָה
  chosen: Micah
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this point
  lexicon: HALOT
  rationale: Temporal adverb marking Micah's present conclusion; 'Now' is concise
    and idiomatic.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I realize
  lexicon: HALOT
  rationale: Perfect verb used for present state resulting from realization. English
    present 'I know' best conveys the sense in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here introduces the content of what Micah knows, so 'that' is the most
    natural complementizer.
- source_word: יֵיטִיב
  chosen: will do good
  alternatives:
  - will deal well
  - will prosper
  lexicon: HALOT
  rationale: Hiphil of יטב means to do good / deal well. 'Will do good' preserves
    the verbal force without over-specifying prosperity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks the beneficiary. 'To me' fits naturally with 'do
    good,' though English readers may also hear beneficiary sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: This second כִּי gives the reason for Micah's confidence, so 'because'
    makes the logic explicit.
- source_word: הָיָה לִי
  chosen: I have
  alternatives:
  - there is for me
  - has become mine
  lexicon: HALOT
  rationale: Literally 'has been to me,' an idiom expressing possession/state. 'I
    have' is the clearest natural English equivalent here.
- source_word: הַלֵּוִי
  chosen: a Levite
  alternatives:
  - the Levite
  lexicon: HALOT
  rationale: 'Although the Hebrew has the article, in English the construction after
    ''have'' is more idiomatic as an indefinite class description: Micah has a Levite
    serving him. The article may be generic or point to the known Levite, but ''a
    Levite'' better conveys the significance Micah attaches to the man''s Levitical
    status.'
- source_word: לְכֹהֵן
  chosen: as priest
  alternatives:
  - for a priest
  - to be priest
  lexicon: HALOT
  rationale: The lamed marks role/function. 'As priest' is idiomatic English and preserves
    the sense of appointment to office.
