id: JDG.17.11
reference: Judges 17:11
source:
  edition: WLC
  text: וַ/יּ֥וֹאֶל הַ/לֵּוִ֖י לָ/שֶׁ֣בֶת אֶת הָ/אִ֑ישׁ וַ/יְהִ֤י הַ/נַּ֨עַר֙ ל֔/וֹ
    כְּ/אַחַ֖ד מִ/בָּנָֽי/ו־׃
translation:
  text: So the Levite agreed to stay with the man, and the young man became to him
    like one of his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was willing to stay with the man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the young man was to him like one of his sons,' expressing that
      Micah treated the Levite as a member of his household.
    reason: cultural_note
lexical_decisions:
- source_word: וַיּוֹאֶל
  chosen: agreed
  alternatives:
  - was willing
  - consented
  - undertook
  lexicon: HALOT
  rationale: The verb יאל in the Hiphil commonly conveys willingness or consent. 'Agreed'
    is natural modern English and fits the context of accepting Micah's offer.
- source_word: הַלֵּוִי
  chosen: the Levite
  lexicon: HALOT
  rationale: Definite noun referring to the Levite already introduced in context;
    'Levite' is the standard and precise rendering.
- source_word: לָשֶׁבֶת
  chosen: to stay
  alternatives:
  - to dwell
  - to live
  - to remain
  lexicon: HALOT
  rationale: From ישׁב, 'sit/dwell/live.' In this immediate context of accepting residence
    with Micah, 'to stay' is idiomatic and clear without losing the sense of residing.
- source_word: אֶת הָאִישׁ
  chosen: with the man
  alternatives:
  - with the האיש
  - by the man
  lexicon: HALOT
  rationale: Although אֵת is often a direct-object marker, with ישׁב it can mark association
    or proximity in idiom. English requires an explicit relational preposition here;
    'with the man' best captures the sense.
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  lexicon: HALOT
  rationale: 'Here היה introduces a change/resulting state: after staying with him,
    the young man came to be regarded in a certain way. ''Became'' expresses that
    development more clearly than a flat ''was.'''
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the youth
  - the boy
  lexicon: HALOT
  rationale: נַעַר can range from boy to young man or attendant. Since this Levite
    is functioning independently and serving in a household role, 'young man' is the
    most fitting English choice.
- source_word: כְּאַחַד מִבָּנָיו
  chosen: like one of his sons
  alternatives:
  - as one of his sons
  lexicon: HALOT
  rationale: The comparison marker כ plus 'one from his sons' indicates familial-like
    status within the household. 'Like one of his sons' is natural English and preserves
    the simile.
