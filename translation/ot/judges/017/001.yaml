id: JDG.17.1
reference: Judges 17:1
source:
  edition: WLC
  text: וַֽ/יְהִי אִ֥ישׁ מֵֽ/הַר אֶפְרָ֖יִם וּ/שְׁמ֥/וֹ מִיכָֽיְהוּ־־׃
translation:
  text: Now there was a man from the hill country of Ephraim, and his name was Mikayhu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally rendered 'Micah.' The Hebrew form here is Mikayhu.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces a new narrative unit. 'Now there
    was' is natural modern English that still signals narrative progression better
    than a bare 'There was,' while avoiding overly wooden repetition of 'and.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a certain man
  lexicon: HALOT
  rationale: The noun straightforwardly denotes an individual male person here. 'A
    man' is the plain sense; 'a certain man' is possible in narrative introductions
    but adds specificity not explicit in the Hebrew.
- source_word: מֵהַר אֶפְרָיִם
  chosen: from the hill country of Ephraim
  alternatives:
  - from the mountains of Ephraim
  - from Mount Ephraim
  lexicon: HALOT
  rationale: The construct phrase refers to the upland/hill-country region associated
    with Ephraim, not a single mountain peak. 'Hill country of Ephraim' is the standard
    and most geographically accurate rendering.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: The conjunction plus noun with pronominal suffix is a simple narrative
    continuation. 'And his name was' preserves the Hebrew coordination; 'whose name
    was' is smoother English but slightly restructures the clause.
- source_word: מִיכָיְהוּ
  chosen: Mikayhu
  alternatives:
  - Micah
  - Micaiah
  lexicon: HALOT
  rationale: Per project philosophy, personal names are transliterated rather than
    replaced by traditional Anglicized forms. 'Mikayhu' closely reflects the Hebrew
    form מִיכָיְהוּ in this verse; 'Micah' reflects later English tradition, and 'Micaiah'
    corresponds to a fuller related form but not the exact spelling here.
