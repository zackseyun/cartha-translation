id: JDG.17.12
reference: Judges 17:12
source:
  edition: WLC
  text: וַ/יְמַלֵּ֤א מִיכָה֙ אֶת יַ֣ד הַ/לֵּוִ֔י וַ/יְהִי ל֥/וֹ הַ/נַּ֖עַר לְ/כֹהֵ֑ן
    וַ/יְהִ֖י בְּ/בֵ֥ית מִיכָֽה־־׃
translation:
  text: So Micah ordained the Levite, and the young man became his priest and was
    in Micah’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “filled the hand of the Levite,” an idiom for installing
      or ordaining someone to priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַלֵּא אֶת־יַד
  chosen: ordained
  alternatives:
  - filled the hand of
  - installed
  - consecrated
  lexicon: HALOT, BDB
  rationale: The idiom 'fill the hand' in priestly/installation contexts means to
    install or ordain someone into office. A literal rendering would be opaque in
    modern English, so 'ordained' best conveys the function while remaining concise.
    The more literal alternative is preserved in a footnote because it is a significant
    idiom.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levite man
  lexicon: HALOT, BDB
  rationale: The noun identifies the man by tribal/clan status. 'The Levite' is the
    natural English rendering and matches the narrative's way of referring to him.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the youth
  - the boy
  lexicon: HALOT, BDB
  rationale: נַעַר can denote a boy, youth, servant, or young man depending on context.
    Here the person is functioning independently as a cultic figure, so 'the young
    man' fits better than 'boy'.
- source_word: לְכֹהֵן
  chosen: as priest
  alternatives:
  - for a priest
  - to be priest
  lexicon: HALOT, BDB
  rationale: The lamed marks role or function. In idiomatic English, 'became his priest'
    or 'served as priest' best expresses the sense. 'Priest' is the straightforward
    lexical equivalent of כֹּהֵן.
- source_word: וַיְהִי לוֹ
  chosen: became his
  alternatives:
  - was for him
  - was his
  lexicon: HALOT, BDB
  rationale: The construction indicates that the young man came to occupy the role
    of priest for Micah. 'Became his' captures the transition implied by the wayyiqtol
    plus dative pronoun.
- source_word: בְּבֵית מִיכָה
  chosen: in Micah’s house
  alternatives:
  - in the house of Micah
  - in Micah’s household
  lexicon: HALOT, BDB
  rationale: The phrase is spatial and domestic. 'In Micah’s house' is clear, natural,
    and sufficiently literal.
