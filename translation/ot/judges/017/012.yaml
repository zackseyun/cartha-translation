theological_decisions:
- issue: Rendering a non-Levitical/private cult installation without importing legitimacy
  chosen_reading: So Micah ordained the Levite
  alternative_readings:
  - So Micah consecrated the Levite
  - So Micah filled the hand of the Levite
  rationale: The Hebrew describes Micah's act of installing the Levite into priestly
    service, but the translation should not imply divine approval. 'Ordained' communicates
    installation into office without asserting legitimacy; the narrative context itself
    signals the irregularity of the arrangement.
  doctrine_reference: Translation philosophy §§1, 3, 6
