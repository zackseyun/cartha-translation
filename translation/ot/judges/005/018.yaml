id: JDG.5.18
reference: Judges 5:18
source:
  edition: WLC
  text: זְבֻל֗וּן עַ֣ם חֵרֵ֥ף נַפְשׁ֛/וֹ לָ/מ֖וּת וְ/נַפְתָּלִ֑י עַ֖ל מְרוֹמֵ֥י שָׂדֶֽה׃
translation:
  text: Zebulun was a people that scorned its life unto death, and Naphtali also,
    on the heights of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised his life to death,' that is, 'risked his life even to death.'
      The Hebrew uses a collective singular for Zebulun and a verb of treating with
      contempt.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the heights of the open field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבֻלוּן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Proper tribal name; transliterated per translation philosophy for personal/tribal
    names.
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  - folk
  lexicon: HALOT
  rationale: Singular collective noun used predicatively of Zebulun. 'A people' preserves
    the Hebrew nominal expression better than smoothing to an adverbial phrase.
- source_word: חֵרֵף
  chosen: scorned
  alternatives:
  - despised
  - defied
  - risked
  lexicon: HALOT
  rationale: From חרף, conveying treating with contempt or disdain. Here the sense
    is that Zebulun treated its life as something to be disregarded in battle. 'Scorned'
    preserves the contempt nuance better than the more interpretive 'risked.'
- source_word: נַפְשׁוֹ
  chosen: its life
  alternatives:
  - his life
  - its soul
  lexicon: HALOT
  rationale: נפש in this martial context refers to life/self rather than the English
    theological term 'soul.' Because Zebulun is a tribal collective, 'its life' fits
    the collective subject better than 'his life.'
- source_word: לָמוּת
  chosen: unto death
  alternatives:
  - to death
  - even to death
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the extent/result of the self-endangerment.
    'Unto death' is slightly more formal but preserves the Hebrew force of going as
    far as death.
- source_word: וְנַפְתָּלִי
  chosen: and Naphtali also
  alternatives:
  - and Naphtali
  - Naphtali too
  lexicon: HALOT
  rationale: The conjunction links Naphtali as sharing the same commendation. 'Also'
    is supplied in English to make the parallelism explicit and natural.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - in
  lexicon: HALOT
  rationale: Basic spatial sense fits the topographical imagery.
- source_word: מְרוֹמֵי
  chosen: the heights of
  alternatives:
  - the high places of
  - the heights in
  lexicon: HALOT
  rationale: Refers to elevated places/heights. 'High places' could suggest cultic
    sites in English, which is not required here; 'heights' better fits the battlefield
    setting.
- source_word: שָׂדֶה
  chosen: the field
  alternatives:
  - the open field
  - the countryside
  - the battlefield
  lexicon: HALOT
  rationale: Literally 'field/open country.' 'The field' keeps the imagery close to
    the Hebrew; 'battlefield' would over-interpret, though the military context is
    clear.
