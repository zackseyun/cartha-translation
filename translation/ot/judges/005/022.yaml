theological_decisions:
- issue: Referent of the 3ms suffix in 'his mighty ones'
  chosen_reading: Left ambiguous as 'his mighty ones'
  alternative_readings:
  - Sisera's mighty warriors
  - Sisera's powerful horses/stallions
  rationale: The verse is poetic and the suffix likely points to the enemy force in
    context, but the immediate phrase can naturally evoke either riders or horses.
    The translation preserves the Hebrew's ambiguity rather than specifying beyond
    the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
