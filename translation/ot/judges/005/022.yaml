id: JDG.5.22
reference: Judges 5:22
source:
  edition: WLC
  text: אָ֥ז הָלְמ֖וּ עִקְּבֵי ס֑וּס מִֽ/דַּהֲר֖וֹת דַּהֲר֥וֹת אַבִּירָֽי/ו־׃
translation:
  text: Then the horses’ hoofs pounded from the galloping, the galloping of his mighty
    ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the galloping of his stallions' or 'the galloping of his mighty warriors.'
      The Hebrew expression may refer to powerful horses or to the warriors associated
      with them.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the next vivid moment in the song; 'Then' is
    natural and preserves the poetic sequence.
- source_word: הָלְמוּ
  chosen: pounded
  alternatives:
  - beat
  - hammered
  - struck
  lexicon: HALOT
  rationale: The verb conveys a forceful striking sound/action. 'Pounded' captures
    the auditory and kinetic force in poetic English better than the flatter 'beat.'
- source_word: עִקְּבֵי
  chosen: hoofs
  alternatives:
  - heels
  - hooves
  lexicon: HALOT
  rationale: Though the noun can denote 'heels/footsteps,' with 'horse' it refers
    to the striking rear part/hoofs. 'Hoofs' is idiomatic in this collocation.
- source_word: סוּס
  chosen: horses’
  alternatives:
  - horse
  lexicon: HALOT
  rationale: 'The Hebrew singular after a construct can function collectively. English
    idiom prefers the plural possessive here: ''the horses’ hoofs.'''
- source_word: מִדַּהֲרוֹת
  chosen: from the galloping
  alternatives:
  - because of the rushing
  - from the charging
  lexicon: HALOT
  rationale: 'The prefixed מִן marks cause/source: the pounding happened from or because
    of the galloping. ''Galloping'' fits the equine context specifically.'
- source_word: דַּהֲרוֹת
  chosen: the galloping
  alternatives:
  - the rushing
  - the charging
  lexicon: HALOT
  rationale: The repeated noun is retained in English to preserve the Hebrew poetic
    intensification.
- source_word: אַבִּירָיו
  chosen: his mighty ones
  alternatives:
  - his strong ones
  - his stallions
  - his warriors
  lexicon: HALOT
  rationale: אַבִּיר commonly denotes mighty/strong ones. In context it could refer
    either to powerful riders/warriors or metaphorically to strong horses. 'His mighty
    ones' preserves the ambiguity rather than over-resolving it.
