id: JDG.5.10
reference: Judges 5:10
source:
  edition: WLC
  text: רֹכְבֵי֩ אֲתֹנ֨וֹת צְחֹר֜וֹת יֹשְׁבֵ֧י עַל מִדִּ֛ין וְ/הֹלְכֵ֥י עַל דֶּ֖רֶךְ
    שִֽׂיחוּ־־׃
translation:
  text: You who ride on white donkeys, you who sit on carpets, and you who walk on
    the road—speak!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit on saddlecloths' or 'sit on carpets/rugs'; the Hebrew term is rare
      and uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'tell of it' / 'recount' for 'speak'; the Hebrew verb can carry the sense
      of speaking out or recounting.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְבֵי
  chosen: you who ride
  alternatives:
  - riders of
  - those riding
  lexicon: HALOT
  rationale: Qal participle plural construct from רכב functions vocatively in parallel
    with the following participles; rendering as a direct address ('you who ride')
    fits the poem's summons and reads naturally in English.
- source_word: אֲתֹנוֹת
  chosen: donkeys
  alternatives:
  - female donkeys
  - she-donkeys
  lexicon: HALOT
  rationale: The noun specifically denotes female donkeys, but idiomatic English usually
    uses 'donkeys' unless the sex is contextually important. The social image is of
    riding animals associated with status, not their sex.
- source_word: צְחֹרוֹת
  chosen: white
  alternatives:
  - bright-colored
  - light-colored
  lexicon: HALOT
  rationale: The adjective most straightforwardly denotes whiteness/brightness. 'White
    donkeys' is the traditional and likely sense, conveying distinction and prestige.
- source_word: יֹשְׁבֵי
  chosen: you who sit
  alternatives:
  - those who sit
  - you who dwell
  lexicon: HALOT
  rationale: Parallel vocative participle. 'Sit' is preferable here because the following
    phrase likely refers to what they sit upon rather than where they dwell.
- source_word: מִדִּין
  chosen: carpets
  alternatives:
  - saddlecloths
  - rugs
  - judgment seats
  lexicon: HALOT
  rationale: This rare noun is difficult. In context with riders and travelers, a
    reference to rich coverings or carpets is most plausible, likely denoting luxurious
    seating. 'Judgment' as a sense is lexically possible by association with דין,
    but context strongly favors an object of sitting rather than juridical activity.
- source_word: וְהֹלְכֵי
  chosen: and you who walk
  alternatives:
  - and those who travel
  - and wayfarers
  lexicon: HALOT
  rationale: Another participial vocative completing the three addressed groups. 'Walk'
    preserves the concrete imagery while still naturally including travelers.
- source_word: דֶּרֶךְ
  chosen: the road
  alternatives:
  - the way
  - the path
  lexicon: HALOT
  rationale: Common noun for road/way. 'Road' best fits the literal travel setting
    in this poetic call.
- source_word: שִׂיחוּ
  chosen: speak
  alternatives:
  - tell of it
  - meditate
  - sing
  lexicon: HALOT
  rationale: Imperative plural from שיח, which can mean speak, recount, muse, or meditate.
    In this victory-song context, Deborah calls these groups to voice or recount the
    LORD's acts; 'speak' is broad and faithful, with more specific alternatives preserved
    in a footnote.
