id: JDG.5.29
reference: Judges 5:29
source:
  edition: WLC
  text: חַכְמ֥וֹת שָׂרוֹתֶ֖י/הָ תַּעֲנֶ֑ינָּה אַף הִ֕יא תָּשִׁ֥יב אֲמָרֶ֖י/הָ לָֽ/הּ־׃
translation:
  text: 'Her wisest princesses answer her; indeed, she herself replies to her own
    words:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her wise noblewomen answer her; yes, she too answers herself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַכְמוֹת
  chosen: wisest
  alternatives:
  - wise
  - wise women
  lexicon: HALOT
  rationale: The plural feminine adjective/noun from חכם functions substantivally
    with שָׂרוֹתֶיהָ. In context it describes the quality of the princesses ('wise'
    or 'wisest'). 'Wisest' captures the sense of an elite group of court women giving
    counsel, a natural English rendering for the plural in apposition.
- source_word: שָׂרוֹתֶיהָ
  chosen: princesses
  alternatives:
  - noblewomen
  - ladies
  lexicon: HALOT
  rationale: From שָׂרָה/שָׂרוֹת, feminine counterpart to a ruler/noble. 'Princesses'
    is the most direct and idiomatic rendering in this royal setting, referring to
    the noble women around Sisera's mother.
- source_word: תַּעֲנֶינָּה
  chosen: answer
  alternatives:
  - respond
  - reply
  lexicon: HALOT
  rationale: Qal imperfect 3fp of ענה in the sense 'answer, respond.' Present tense
    in English fits the vivid poetic scene.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Here אַף adds emphasis rather than simple addition. 'Indeed' conveys
    the intensifying force in smooth English poetry.
- source_word: הִיא
  chosen: she herself
  alternatives:
  - she
  - even she
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'She herself' preserves that emphasis,
    referring to Sisera's mother joining in the explanation.
- source_word: תָּשִׁיב
  chosen: replies
  alternatives:
  - answers
  - returns
  lexicon: HALOT
  rationale: Hiphil of שוב can mean 'bring back, return,' but with אֲמָרֶיהָ and in
    dialogue context it idiomatically means 'answer/reply.' 'Replies' avoids awkward
    repetition with the previous verb while preserving the responsive sense.
- source_word: אֲמָרֶיהָ
  chosen: her own words
  alternatives:
  - her sayings
  - her speech
  lexicon: HALOT
  rationale: Plural of אֵמֶר/אָמֶר, 'word, utterance, saying.' In context she is responding
    to what has been said or to her own spoken thoughts. 'Her own words' is idiomatic
    and reflects the pronominal suffix.
- source_word: לָהּ
  chosen: to her
  alternatives:
  - for herself
  lexicon: HALOT
  rationale: The preposition with 3fs suffix most naturally means 'to her.' In English,
    with 'replies to her own words,' the reflexive sense is clear without forcing
    an unnatural construction.
