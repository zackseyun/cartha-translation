id: JDG.5.2
reference: Judges 5:2
source:
  edition: WLC
  text: בִּ/פְרֹ֤עַ פְּרָעוֹת֙ בְּ/יִשְׂרָאֵ֔ל בְּ/הִתְנַדֵּ֖ב עָ֑ם בָּרֲכ֖וּ יְהוָֽה׃
translation:
  text: When locks were loosed in Israel, when the people volunteered, bless Yahweh!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When locks hung loose in Israel' or 'When avenging acts were undertaken in Israel.' The Hebrew of the opening line is difficult, and the wording may evoke either leaders stepping forward, warriors with unbound hair, or decisive acts of vengeance.
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/פְרֹעַ
  chosen: When ... took the lead
  alternatives:
  - when ... let loose
  - when ... acted freely
  - for the leading of
  lexicon: HALOT
  rationale: The infinitive construct of פרע in this poetic context is difficult. In Judges 5:2 it is commonly understood in relation to leadership being exercised or hair being let loose as a sign of warrior dedication. Given the parallel with the people's willing offering and the sense required by the song's praise, 'when ... took the lead' best captures the clause in idiomatic English without over-literal obscurity.
- source_word: פְּרָעוֹת
  chosen: leaders
  alternatives:
  - locks of hair
  - avenging acts
  - warriors
  lexicon: HALOT
  rationale: The plural noun from the same root is notoriously debated. In context, paired with the volunteering of the people, it most plausibly refers metonymically to leaders/leading ones rather than literal hair. 'Leaders' gives a clear English sense while reflecting the likely functional meaning in the poem.
- source_word: בְּ/יִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Straightforward locative phrase.
- source_word: בְּ/הִתְנַדֵּב
  chosen: when ... volunteered
  alternatives:
  - when ... offered themselves willingly
  - when ... freely offered themselves
  lexicon: HALOT
  rationale: The hitpael of נדב conveys voluntary self-offering or willingness. 'Volunteered' is concise, natural modern English and preserves the sense of willing participation.
- source_word: עָם
  chosen: the people
  alternatives:
  - the army
  - the nation
  lexicon: HALOT
  rationale: The collective noun here refers to the people of Israel generally, especially as they respond willingly to battle.
- source_word: בָּרֲכ֖וּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: Imperative plural of ברך. 'Bless' is the more direct lexical equivalent; 'praise' is interpretive. The imperative addresses hearers/singers to bless YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
