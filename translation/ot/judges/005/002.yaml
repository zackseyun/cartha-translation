theological_decisions:
- issue: Rendering of the obscure opening colon
  chosen_reading: The verse praises God for leadership arising in Israel and for the people's willing response.
  alternative_readings:
  - The verse refers to warriors' hair hanging loose in Israel
  - The verse refers to acts of vengeance in Israel
  rationale: The Hebrew root פרע can evoke loosening/unbinding, including unbound hair, and the line is textually and lexically difficult. In the immediate poetic parallelism with 'when the people volunteered,' the sense of leaders stepping forward fits the structure and yields coherent praise. Alternatives are preserved in a footnote because the ambiguity is genuine and should not be hidden.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
