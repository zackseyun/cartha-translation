id: JDG.5.17
reference: Judges 5:17
source:
  edition: WLC
  text: גִּלְעָ֗ד בְּ/עֵ֤בֶר הַ/יַּרְדֵּן֙ שָׁכֵ֔ן וְ/דָ֕ן לָ֥/מָּה יָג֖וּר אֳנִיּ֑וֹת
    אָשֵׁ֗ר יָשַׁב֙ לְ/ח֣וֹף יַמִּ֔ים וְ/עַ֥ל מִפְרָצָ֖י/ו יִשְׁכּֽוֹן׃
translation:
  text: Gilead stayed beyond the Jordan; and Dan—why did he linger by the ships? Asher
    sat by the seashore and stayed by his harbors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why did he sojourn by ships?' The Hebrew verb can mean 'reside' or 'sojourn';
      'linger' is chosen here to reflect the song's tone of reproach.
    reason: lexical_alternative
  - marker: b
    text: Or 'at his inlets/bays.' The Hebrew term refers to openings or breaks and
      in this coastal context likely means harbors or inlets.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gileadites
  lexicon: HALOT
  rationale: Proper name transliterated. In context it likely stands for the people/region
    of Gilead east of the Jordan, but the Hebrew names the territory/tribal entity
    directly, so 'Gilead' is retained rather than expanding interpretively to 'the
    Gileadites.'
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: A standard geographical expression meaning the far side/across from the
    speaker's frame of reference. 'Beyond the Jordan' is concise and idiomatic while
    preserving the spatial sense.
- source_word: שָׁכֵן
  chosen: stayed
  alternatives:
  - remained
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb denotes dwelling/remaining. In this poetic context, Deborah
    reproaches tribes for not joining the battle, so 'stayed' captures both residence
    and inaction without over-paraphrasing.
- source_word: וְדָן
  chosen: and Dan
  lexicon: HALOT
  rationale: Proper tribal name transliterated straightforwardly.
- source_word: לָמָּה
  chosen: why
  lexicon: HALOT
  rationale: Direct interrogative preserved; the line is a rhetorical rebuke.
- source_word: יָגוּר
  chosen: did he linger
  alternatives:
  - sojourned
  - remain
  - stay
  lexicon: HALOT
  rationale: גור often means sojourn/reside as an outsider, but here in poetic reproach
    with 'ships' it conveys lingering/staying instead of joining the fight. 'Linger'
    brings out the rhetorical force in natural English.
- source_word: אֳנִיּוֹת
  chosen: the ships
  alternatives:
  - ships
  - boats
  lexicon: HALOT
  rationale: Plural noun for seagoing vessels. English idiom with 'by the ships' benefits
    from the article, though Hebrew lacks the article; this reflects natural English
    rather than a change in sense.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper tribal name transliterated.
- source_word: יָשַׁב
  chosen: sat
  alternatives:
  - remained
  - dwelt
  lexicon: HALOT
  rationale: The verb literally means 'sat/dwelt.' 'Sat' preserves the vivid poetic
    image of inactivity better than smoothing to 'lived' or 'remained.'
- source_word: לְחוֹף יַמִּים
  chosen: by the seashore
  alternatives:
  - at the coast of the seas
  - by the shore of the seas
  lexicon: HALOT
  rationale: חוֹף is shore/coast. The plural יַמִּים may reflect the coastline/waters
    idiomatically. 'By the seashore' gives clear modern English while preserving the
    coastal setting.
- source_word: מִפְרָצָיו
  chosen: his harbors
  alternatives:
  - his landings
  - his bays
  - his breaches/inlets
  lexicon: HALOT
  rationale: The noun can denote breaks/openings, and in this maritime context likely
    refers to coastal inlets or harbors. 'Harbors' best fits the parallel with seashore
    and the tribe's coastal location.
- source_word: יִשְׁכּוֹן
  chosen: stayed
  alternatives:
  - dwelt
  - settled
  - remained
  lexicon: HALOT
  rationale: Parallel to the earlier dwelling verb, here again emphasizing settled
    inaction. 'Stayed' keeps the poetic rebuke coherent in English.
