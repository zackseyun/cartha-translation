id: JDG.5.9
reference: Judges 5:9
source:
  edition: WLC
  text: לִבִּ/י֙ לְ/חוֹקְקֵ֣י יִשְׂרָאֵ֔ל הַ/מִּֽתְנַדְּבִ֖ים בָּ/עָ֑ם בָּרֲכ֖וּ יְהוָֽה׃
translation:
  text: My heart is with the leaders of Israel, who volunteered among the people.
    Bless the LORD!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My heart is with the lawgivers of Israel, those who offered themselves
      willingly among the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  chosen: My heart
  alternatives:
  - My heart is toward
  - My heart belongs to
  lexicon: HALOT
  rationale: Literal noun with 1cs suffix. In context it expresses Deborah's inner
    allegiance/admiration. Rendering as 'My heart' preserves the Hebrew idiom rather
    than paraphrasing it away.
- source_word: לְחוֹקְקֵי
  chosen: is with the leaders
  alternatives:
  - is for the lawgivers
  - is with the commanders
  - is with the rulers
  lexicon: HALOT
  rationale: The participial/nominal form from חקק can denote those who decree/ordain,
    hence rulers or leaders. In the Song of Deborah the sense is not primarily legislative
    in a modern legal sense but those who take governing/command responsibility. 'Leaders'
    is the clearest optimal-equivalence rendering; 'lawgivers' is preserved as an
    alternative because of the root's association with decreeing.
- source_word: יִשְׂרָאֵל
  chosen: of Israel
  rationale: Standard genitival relation identifying the leaders as belonging to Israel.
- source_word: הַמִּתְנַדְּבִים
  chosen: who volunteered
  alternatives:
  - who offered themselves willingly
  - who willingly offered themselves
  lexicon: HALOT
  rationale: Hitpael participle of נדב conveys willing self-offering. 'Who volunteered'
    is natural modern English and preserves the voluntary sense without unnecessary
    expansion.
- source_word: בָּעָם
  chosen: among the people
  alternatives:
  - among the troops
  - in the people
  lexicon: HALOT
  rationale: עם normally means 'people.' Here it likely refers to the people of Israel
    generally, among whom these leaders willingly stepped forward. 'Among the people'
    keeps the broad social sense; 'among the troops' is possible contextually but
    narrower than the Hebrew requires.
- source_word: בָּרֲכוּ
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative plural from ברך. 'Bless' is the standard rendering and fits
    the direct exhortation to the audience/hearers in the song.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
