id: JDG.5.30
reference: Judges 5:30
source:
  edition: WLC
  text: הֲ/לֹ֨א יִמְצְא֜וּ יְחַלְּק֣וּ שָׁלָ֗ל רַ֤חַם רַחֲמָתַ֨יִם֙ לְ/רֹ֣אשׁ גֶּ֔בֶר
    שְׁלַ֤ל צְבָעִים֙ לְ/סִ֣יסְרָ֔א שְׁלַ֥ל צְבָעִ֖ים רִקְמָ֑ה צֶ֥בַע רִקְמָתַ֖יִם
    לְ/צַוְּארֵ֥י שָׁלָֽל׃
translation:
  text: ‘Are they not finding and dividing the spoil? A womb, two wombs for the head
    of each man; spoil of dyed cloths for Sisera, spoil of dyed cloths, embroidered—
    dyed cloth, two embroideries for the necks of the spoil.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “a womb, two wombs,” a harsh metonymy for women taken
      as sexual spoil.
    reason: lexical_alternative
  - marker: b
    text: Or “for the necks of the captives / those taken as spoil.” The Hebrew of
      the final phrase is difficult and may refer to embroidered cloths worn by captive
      women.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  chosen: Are they not
  alternatives:
  - Have they not
  lexicon: HALOT
  rationale: Introduces a rhetorical question in the mouth of Sisera’s mother and
    her attendants. English present progressive fits the vivid, immediate expectation
    in the song.
- source_word: יִמְצְאוּ
  chosen: finding
  alternatives:
  - find
  lexicon: HALOT
  rationale: Basic sense is 'find.' Rendered as progressive with the following verb
    to convey ongoing action expected after battle.
- source_word: יְחַלְּקוּ
  chosen: dividing
  alternatives:
  - divide
  - apportion
  lexicon: HALOT
  rationale: The verb means to divide or apportion. 'Dividing' pairs naturally with
    'finding' in English and preserves the sequence of plunder distribution.
- source_word: שָׁלָל
  chosen: spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: A standard military term for goods taken in war. 'Spoil' is concise and
    natural in poetic context; 'booty' is avoided because of misleading modern connotations.
- source_word: רַחַם
  chosen: a womb
  alternatives:
  - a girl
  - a woman
  - mercy
  lexicon: HALOT
  rationale: The noun literally means 'womb.' In this context it is a brutal metonymy
    for captive women allotted as sexual spoil. Retaining 'womb' preserves the poem’s
    shocking dehumanizing language rather than softening it to 'girl' or 'woman'.
- source_word: רַחֲמָתַיִם
  chosen: two wombs
  alternatives:
  - a pair of wombs
  - two girls
  - two women
  lexicon: HALOT
  rationale: Dual form of the same noun. Rendered literally as 'two wombs' to preserve
    the harsh objectifying idiom and the numerical escalation.
- source_word: לְרֹאשׁ גֶּבֶר
  chosen: for the head of each man
  alternatives:
  - for each warrior
  - for every man
  lexicon: HALOT
  rationale: Literally 'for the head of a man.' This idiom marks distribution per
    person. 'Each man' makes the distributive sense explicit while preserving the
    masculine singular source.
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - warrior
  - male
  lexicon: HALOT
  rationale: Gender-accurate rendering is required by the translation philosophy.
    Though the context is military, the Hebrew term itself is 'man'; 'warrior' would
    interpret beyond the lexical value.
- source_word: צְבָעִים
  chosen: dyed cloths
  alternatives:
  - colored garments
  - dyed garments
  lexicon: HALOT
  rationale: Refers to colored or dyed textiles among the spoils. 'Dyed cloths' is
    concise and fits the poetic inventory.
- source_word: לְסִיסְרָא
  chosen: for Sisera
  alternatives:
  - to Sisera
  lexicon: HALOT
  rationale: Dative of advantage/distribution in the list of spoil.
- source_word: רִקְמָה
  chosen: embroidered
  alternatives:
  - embroidery
  - embroidered cloth
  lexicon: HALOT
  rationale: Used appositionally to further describe the dyed spoil. Rendered adjectivally
    in English for smoother poetic sense while preserving the textile imagery.
- source_word: צֶבַע רִקְמָתַיִם
  chosen: dyed cloth, two embroideries
  alternatives:
  - a dyed embroidered cloth, a double embroidery
  - colored cloth, two embroidered pieces
  lexicon: HALOT
  rationale: The phrase is textually and syntactically compressed. The rendering stays
    close to the Hebrew sequence, preserving the dual 'two embroideries' rather than
    smoothing away the repetition.
- source_word: לְצַוְּארֵי שָׁלָל
  chosen: for the necks of the spoil
  alternatives:
  - for the necks of the captives
  - for the necks of those taken as spoil
  lexicon: HALOT
  rationale: Literally 'for the necks of spoil.' The Hebrew is difficult. A very literal
    rendering is kept in the main text for auditability, with a footnote preserving
    the common interpretive alternative that the embroidered cloth is for the necks
    of captive women.
