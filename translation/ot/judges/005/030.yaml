theological_decisions:
- issue: Whether to soften the sexualized war-plunder idiom רַחַם רַחֲמָתַיִם
  chosen_reading: Retain the literal metonymy 'a womb, two wombs'
  alternative_readings:
  - a girl, two girls
  - a woman or two for each man
  rationale: The text depicts the cruel expectations of Sisera’s household, not the
    narrator’s approval. Preserving the dehumanizing idiom maintains the moral force
    and poetic shock of the song rather than domesticating it.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: How to handle the difficult final phrase לְצַוְּארֵי שָׁלָל
  chosen_reading: Keep a close rendering in the main text and preserve a smoother
    interpretive alternative in a footnote
  alternative_readings:
  - for the necks of the captives
  - for my neck as spoil
  rationale: The Hebrew is compressed and debated. Optimal equivalence here favors
    a transparent main text with a footnote rather than overconfidently resolving
    the syntax.
  doctrine_reference: Translation philosophy §3, §5
