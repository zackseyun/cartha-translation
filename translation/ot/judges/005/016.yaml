id: JDG.5.16
reference: Judges 5:16
source:
  edition: WLC
  text: לָ֣/מָּה יָשַׁ֗בְתָּ בֵּ֚ין הַֽ/מִּשְׁפְּתַ֔יִם לִ/שְׁמֹ֖עַ שְׁרִק֣וֹת עֲדָרִ֑ים
    לִ/פְלַגּ֣וֹת רְאוּבֵ֔ן גְּדוֹלִ֖ים חִקְרֵי לֵֽב־׃
translation:
  text: Why did you sit among the sheepfolds, to hear the whistling for the flocks?
    Among the divisions of Reuben there were great searchings of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the streams of Reuben there were great searchings of heart.' The
      Hebrew term can mean 'divisions' or 'watercourses/streams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative asking the reason for Reuben's inaction; simple
    English 'Why' is natural and precise.
- source_word: יָשַׁבְתָּ
  chosen: did you sit
  alternatives:
  - did you remain
  - did you stay
  lexicon: HALOT
  rationale: The verb literally means 'sit/dwell/remain.' In this poetic rebuke, 'sit'
    preserves the concrete image and rhetorical force better than the more interpretive
    'remain.'
- source_word: בֵּין הַמִּשְׁפְּתַיִם
  chosen: among the sheepfolds
  alternatives:
  - between the sheepfolds
  - among the campfires
  lexicon: HALOT
  rationale: The dual/plural form is traditionally understood as sheepfolds or sheep
    pens in this pastoral context, especially with the following reference to flocks.
    'Among' reads more naturally in English than the overly literal 'between,' while
    preserving the setting. 'Campfires' is a proposed alternative in some discussions
    but is less likely here given the immediate flock imagery.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: Infinitive of purpose; 'to hear' is straightforward and idiomatic with
    the following sound expression.
- source_word: שְׁרִקוֹת
  chosen: the whistling
  alternatives:
  - the piping
  - the whistled calls
  lexicon: HALOT
  rationale: The noun denotes a whistling or piping sound. 'Whistling' best captures
    the likely shepherding signal in accessible modern English.
- source_word: עֲדָרִים
  chosen: for the flocks
  alternatives:
  - of the flocks
  - for the herds
  lexicon: HALOT
  rationale: Refers to animal groups, here most naturally flocks in a sheepfold context.
    Rendering with 'for' reflects the likely sense of shepherds' calls directed to
    the flocks.
- source_word: לִפְלַגּוֹת רְאוּבֵן
  chosen: Among the divisions of Reuben
  alternatives:
  - By the streams of Reuben
  - In the districts of Reuben
  lexicon: HALOT
  rationale: The noun can denote divisions/sections and elsewhere can be associated
    with watercourses. In this context, paired with internal deliberation and tribal
    hesitation, 'divisions' aptly conveys both social partition and indecision. The
    alternative 'streams' is ancient and should be preserved in a footnote because
    the Hebrew term can bear that sense.
- source_word: גְּדוֹלִים
  chosen: great
  alternatives:
  - many
  - weighty
  lexicon: HALOT
  rationale: Adjective intensifying the following noun phrase; 'great' is the most
    direct and idiomatic rendering.
- source_word: חִקְרֵי לֵב
  chosen: searchings of heart
  alternatives:
  - searchings of mind
  - deliberations of heart
  - resolutions of heart
  lexicon: HALOT
  rationale: A poetic expression for inward probing, reflection, or deliberation.
    'Searchings of heart' preserves the metaphor and echoes the parallelism in the
    Song of Deborah.
