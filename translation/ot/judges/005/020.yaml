theological_decisions:
- issue: Nature of the stars' participation in battle
  chosen_reading: Retain the poetic statement that the stars fought, without explaining
    whether this is literal cosmic intervention, angelic imagery, or metaphorical
    description of divine providence.
  alternative_readings:
  - Literal cosmic participation
  - Angelic/heavenly host imagery
  - Poetic metaphor for providentially ordered natural forces
  rationale: The Song of Deborah is elevated Hebrew poetry. The text itself presents
    the stars as fighting from heaven, but does not specify the mechanism. To preserve
    theological tension and avoid importing a narrower interpretation, the translation
    keeps the imagery unflattened.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
