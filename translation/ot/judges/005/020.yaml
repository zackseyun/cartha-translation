id: JDG.5.20
reference: Judges 5:20
source:
  edition: WLC
  text: מִן שָׁמַ֖יִם נִלְחָ֑מוּ הַ/כּֽוֹכָבִים֙ מִ/מְּסִלּוֹתָ֔/ם נִלְחֲמ֖וּ עִם
    סִיסְרָֽא־־׃
translation:
  text: From heaven the stars fought; from their courses they fought against Sisera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their paths' or 'from their tracks'; the Hebrew term can denote
      roads or courses, here likely the stars' appointed paths in the sky.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with Sisera'; in battle contexts this idiom commonly means 'against
      Sisera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן שָׁמַיִם
  chosen: From heaven
  alternatives:
  - From the heavens
  - Out of heaven
  lexicon: HALOT
  rationale: The preposition מִן with שָׁמַיִם is most naturally rendered 'from heaven.'
    Singular 'heaven' is idiomatic in English, though Hebrew שָׁמַיִם is formally
    plural.
- source_word: נִלְחָמוּ
  chosen: fought
  alternatives:
  - waged war
  - battled
  lexicon: HALOT
  rationale: The Niphal of לחם here denotes engaging in battle. 'Fought' is the most
    direct and natural English rendering and preserves the poetic repetition in the
    verse.
- source_word: הַכּוֹכָבִים
  chosen: the stars
  alternatives:
  - the heavenly bodies
  lexicon: HALOT
  rationale: כּוֹכָבִים straightforwardly means 'stars.' The definite article is retained.
    This keeps the poetic imagery without over-interpreting the referent.
- source_word: מִמְּסִלּוֹתָם
  chosen: from their courses
  alternatives:
  - from their paths
  - from their tracks
  - from their highways
  lexicon: HALOT
  rationale: מְסִלּוֹת commonly refers to raised roads, highways, or courses. In parallel
    with 'the stars,' 'courses' best conveys celestial tracks/orbits in idiomatic
    English while preserving the poetic metaphor.
- source_word: עִם סִיסְרָא
  chosen: against Sisera
  alternatives:
  - with Sisera
  lexicon: HALOT
  rationale: Although עִם often means 'with,' in warfare contexts with לחם it can
    indicate the opponent, hence 'fight against.' Rendering it 'against Sisera' communicates
    the sense clearly in English.
