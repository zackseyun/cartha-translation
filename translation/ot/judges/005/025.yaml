id: JDG.5.25
reference: Judges 5:25
source:
  edition: WLC
  text: מַ֥יִם שָׁאַ֖ל חָלָ֣ב נָתָ֑נָה בְּ/סֵ֥פֶל אַדִּירִ֖ים הִקְרִ֥יבָה חֶמְאָֽה׃
translation:
  text: He asked for water; she gave milk. In a bowl fit for nobles she brought him
    curds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'butter' or 'cream' for 'curds' (חֶמְאָה), a rich dairy product.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a nobleman's bowl,' literally 'in a bowl of nobles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Basic sense is literal 'water'; the verse contrasts what Sisera requested
    with what Yael provided.
- source_word: שָׁאַל
  chosen: asked for
  alternatives:
  - requested
  lexicon: HALOT
  rationale: Qal perfect 3ms, 'he asked/requested.' 'Asked for' is natural English
    and preserves the object relationship with 'water.'
- source_word: חָלָב
  chosen: milk
  lexicon: HALOT
  rationale: Standard lexical sense is 'milk.' It sets up the contrastive hospitality
    motif.
- source_word: נָתָנָה
  chosen: she gave
  alternatives:
  - she gave him
  lexicon: HALOT
  rationale: Qal perfect 3fs referring to Jael. English can omit the indirect object
    because it is understood from context; the recipient is implied by the prior clause.
- source_word: בְּסֵפֶל
  chosen: in a bowl
  alternatives:
  - in a dish
  - in a basin
  lexicon: HALOT
  rationale: סֵפֶל denotes a bowl or basin-like vessel. 'Bowl' is the most natural
    modern English equivalent here.
- source_word: אַדִּירִים
  chosen: fit for nobles
  alternatives:
  - of nobles
  - for the mighty
  lexicon: HALOT
  rationale: Plural adjective/noun from אדר, denoting nobles, mighty ones, or majestic
    persons. In context it qualifies the bowl as an impressive vessel associated with
    high-status guests. 'Fit for nobles' makes the idiomatic force clear in English
    while preserving the elevated register.
- source_word: הִקְרִיבָה
  chosen: she brought
  alternatives:
  - she presented
  - she offered
  lexicon: HALOT
  rationale: Hiphil of קרב literally 'caused to come near/bring near.' In this hospitality
    setting, 'brought' is the clearest idiomatic rendering; 'offered' is possible
    but can sound more formal or cultic than the context requires.
- source_word: חֶמְאָה
  chosen: curds
  alternatives:
  - butter
  - cream
  lexicon: HALOT
  rationale: The Hebrew term can denote curdled milk, butter, or a rich dairy product.
    In this narrative setting, 'curds' best fits common modern understanding and the
    likely ancient food item; 'butter' is preserved as an alternative because of translation
    tradition.
