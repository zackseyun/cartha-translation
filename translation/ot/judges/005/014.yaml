id: JDG.5.14
reference: Judges 5:14
source:
  edition: WLC
  text: מִנִּ֣י אֶפְרַ֗יִם שָׁרְשָׁ/ם֙ בַּ/עֲמָלֵ֔ק אַחֲרֶ֥י/ךָ בִנְיָמִ֖ין בַּֽ/עֲמָמֶ֑י/ךָ
    מִנִּ֣י מָכִ֗יר יָֽרְדוּ֙ מְחֹ֣קְקִ֔ים וּ/מִ֨/זְּבוּלֻ֔ן מֹשְׁכִ֖ים בְּ/שֵׁ֥בֶט
    סֹפֵֽר׃
translation:
  text: From Ephraim their root was in Amalek; after you, Benjamin, among your peoples.
    From Machir commanders came down, and from Zebulun those who wield the staff of
    the scribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their root was against Amalek' or 'their root was in the hill-country
      of Amalek.' The Hebrew line is difficult and likely poetic-geographical.
    reason: alternative_reading
  - marker: b
    text: Or 'Benjamin followed you, among your clans/kinsmen.' The phrase 'among
      your peoples' is a close rendering of an unusual Hebrew expression.
    reason: lexical_alternative
  - marker: c
    text: '''Machir'' is the leading clan of Manasseh; some translations render the
      broader tribal sense as ''Manasseh.'''
    reason: cultural_note
  - marker: d
    text: Or 'lawgivers' for 'commanders.' The Hebrew term can denote rulers or those
      who decree.
    reason: lexical_alternative
  - marker: e
    text: Or 'those who draw with the scribe's staff' / 'those who bear the marshal's
      staff.' The Hebrew expression is rare and may refer to military mustering or
      record-keeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּי אֶפְרַיִם
  chosen: From Ephraim
  alternatives:
  - Out of Ephraim
  - From among Ephraim
  lexicon: HALOT
  rationale: The preposition marks source/origin. 'From Ephraim' is idiomatic and
    preserves the poetic listing of tribes.
- source_word: שָׁרְשָׁם
  chosen: their root
  alternatives:
  - their stock
  - their descendants
  - those rooted from them
  lexicon: HALOT
  rationale: The noun is literally 'root.' In this poetic context it likely refers
    to Ephraim's rooted presence or origin in Amalekite territory. Retaining 'root'
    preserves the metaphor and avoids over-interpreting it as descendants alone.
- source_word: בַּעֲמָלֵק
  chosen: in Amalek
  alternatives:
  - against Amalek
  - in the hill-country of Amalek
  lexicon: HALOT
  rationale: The preposition is locative most naturally here. Given the difficult
    line, 'in Amalek' best preserves the Hebrew without importing a military sense
    ('against') not demanded by the text. The phrase may allude to Ephraim's territory
    associated with the hill country once linked to Amalek.
- source_word: אַחֲרֶיךָ בִנְיָמִין
  chosen: after you, Benjamin
  alternatives:
  - Benjamin followed you
  - after you came Benjamin
  lexicon: HALOT
  rationale: The Hebrew is terse and poetic. Keeping the vocative-like apposition
    preserves the sequence of tribes joining the battle song. 'After you, Benjamin'
    reflects the order without adding a finite verb absent in Hebrew.
- source_word: בַּעֲמָמֶיךָ
  chosen: among your peoples
  alternatives:
  - with your kinsmen
  - among your clans
  - among your troops
  lexicon: HALOT
  rationale: The plural of 'people' with second masculine singular suffix is unusual.
    'Among your peoples' is the most transparent formal rendering, likely referring
    to Benjamin's associated groups/clans. A smoother interpretive rendering would
    risk obscuring the Hebrew's difficulty.
- source_word: מִנִּי מָכִיר
  chosen: From Machir
  alternatives:
  - From the clan of Machir
  - From Manasseh
  lexicon: HALOT
  rationale: Machir is the eponymous ancestor/clan within Manasseh. Since the Hebrew
    names Machir directly, the translation preserves the proper name rather than substituting
    the broader tribal name Manasseh.
- source_word: יָרְדוּ
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The verb literally means 'went/came down.' 'Came down' fits English narrative
    perspective in a victory song and remains close to the Hebrew.
- source_word: מְחֹקְקִים
  chosen: commanders
  alternatives:
  - lawgivers
  - rulers
  - staff-bearers
  lexicon: HALOT
  rationale: Though the root can denote decreeing/inscribing and sometimes 'lawgiver,'
    in military-poetic context here it likely refers to leaders or commanders. 'Commanders'
    fits the tribal muster context better than the more misleading 'lawgivers,' while
    still conveying authority.
- source_word: וּמִזְּבוּלֻן
  chosen: and from Zebulun
  alternatives:
  - and out of Zebulun
  lexicon: HALOT
  rationale: Straightforward source marker continuing the tribal list.
- source_word: מֹשְׁכִים
  chosen: those who wield
  alternatives:
  - those who draw
  - those who carry
  lexicon: HALOT
  rationale: The participle literally means 'drawing/pulling.' With an instrument
    following, idiomatic English 'wield' communicates active use while preserving
    the image of handling an implement.
- source_word: בְּשֵׁבֶט סֹפֵר
  chosen: the staff of the scribe
  alternatives:
  - the marshal's staff
  - the scribe's rod
  - the writing staff
  lexicon: HALOT
  rationale: 'שֵׁבֶט is ''staff/rod/scepter,'' and סֹפֵר is ''scribe.'' The phrase
    is difficult: it may denote a command staff used for mustering troops or a literal
    writing implement metaphorically. ''The staff of the scribe'' preserves the Hebrew
    imagery and ambiguity better than a fully interpretive paraphrase.'
