id: JDG.5.24
reference: Judges 5:24
source:
  edition: WLC
  text: תְּבֹרַךְ֙ מִ/נָּשִׁ֔ים יָעֵ֕ל אֵ֖שֶׁת חֶ֣בֶר הַ/קֵּינִ֑י מִ/נָּשִׁ֥ים בָּ/אֹ֖הֶל
    תְּבֹרָֽךְ׃
translation:
  text: Most blessed among women is Jael, the wife of Heber the Kenite; among the
    women in the tent, most blessed is she.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed above women is Jael … above the women in the tent.' The Hebrew
      uses a comparative construction that can be rendered either 'among' or 'above.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the tent.' This may idiomatically evoke women of the tent,
      that is, tent-dwelling women, but the Hebrew is singular.
    reason: cultural_note
lexical_decisions:
- source_word: תְּבֹרַךְ
  chosen: Most blessed
  alternatives:
  - Blessed
  - May she be blessed
  lexicon: HALOT
  rationale: Pual 3fs of ברך expresses being blessed/praised. With the comparative
    construction מִן + נשים, the sense is superlative/comparative ('most blessed among
    women' or 'blessed above women'), not merely a simple passive. 'Most blessed'
    captures the elevated poetic force in English.
- source_word: מִנָּשִׁים
  chosen: among women
  alternatives:
  - above women
  - more than women
  lexicon: HALOT
  rationale: The preposition מִן with a plural noun after a passive adjective/verb
    can mark comparison. 'Among women' is idiomatic English that preserves the comparative-superlative
    sense without sounding wooden.
- source_word: יָעֵל
  chosen: Jael
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֵשֶׁת חֶבֶר הַקֵּינִי
  chosen: the wife of Heber the Kenite
  alternatives:
  - Heber the Kenite's wife
  lexicon: HALOT
  rationale: Construct chain identifying Jael by marital relation and clan affiliation.
    The fuller phrasing is clear and natural in modern English while preserving the
    Hebrew apposition.
- source_word: בָּאֹהֶל
  chosen: in the tent
  alternatives:
  - among tent-dwelling women
  - in the tents
  lexicon: HALOT
  rationale: Literally 'in the tent.' In context this likely refers to women associated
    with tent life, fitting Jael's domestic sphere, but the singular should be preserved
    in translation rather than expanded interpretively.
- source_word: תְּבֹרָךְ
  chosen: most blessed is she
  alternatives:
  - may she be blessed
  - she is blessed
  lexicon: HALOT
  rationale: The repeated verb forms an inclusio-like poetic emphasis. Rendering the
    second occurrence as 'most blessed is she' preserves the repetition while producing
    natural English cadence.
