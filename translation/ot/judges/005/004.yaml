id: JDG.5.4
reference: Judges 5:4
source:
  edition: WLC
  text: יְהוָ֗ה בְּ/צֵאתְ/ךָ֤ מִ/שֵּׂעִיר֙ בְּ/צַעְדְּ/ךָ֙ מִ/שְּׂדֵ֣ה אֱד֔וֹם אֶ֣רֶץ רָעָ֔שָׁה גַּם שָׁמַ֖יִם נָטָ֑פוּ גַּם עָבִ֖ים נָ֥טְפוּ מָֽיִם־־׃
translation:
  text: O Yahweh, when you went out from Seir, when you marched from the field of Edom, the earth trembled; the heavens also dripped, the clouds also dripped water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the country of Edom.' The Hebrew reads 'from the field of Edom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth quaked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per the project's default for the divine name יְהוָה, following established English convention that signals the covenant name without transliteration.
- source_word: בְּצֵאתְךָ
  chosen: when you went out
  alternatives:
  - at your going out
  - when you came out
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of יצא with 2ms suffix is temporal here, naturally rendered 'when you went out.' This preserves the poetic address to YHWH while using idiomatic English.
- source_word: מִשֵּׂעִיר
  chosen: from Seir
  lexicon: HALOT
  rationale: Seir is a place name and is transliterated. The prefixed מן is straightforwardly 'from.'
- source_word: בְּצַעְדְּךָ
  chosen: when you marched
  alternatives:
  - when you stepped
  - at your marching
  - when you strode
  lexicon: HALOT
  rationale: From צעד, literally 'to step/march.' In this poetic theophanic context, 'marched' best conveys purposeful divine advance without over-paraphrasing.
- source_word: מִשְּׂדֵה אֱדוֹם
  chosen: from the field of Edom
  alternatives:
  - from the country of Edom
  - from the plain of Edom
  lexicon: HALOT
  rationale: שָׂדֶה is literally 'field/open country.' 'Field of Edom' preserves the Hebrew image more closely than the broader 'country of Edom,' while remaining intelligible in English.
- source_word: אֶרֶץ רָעָשָׁה
  chosen: the earth trembled
  alternatives:
  - the land quaked
  - the earth quaked
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land'; in parallel with heavens and clouds, the cosmic sense 'earth' is preferable. רָעַשׁ denotes shaking/quaking; 'trembled' is natural English and fits the poetic cadence.
- source_word: גַּם שָׁמַיִם נָטָפוּ
  chosen: the heavens also dripped
  alternatives:
  - the heavens also dropped
  - the heavens also poured
  lexicon: HALOT
  rationale: נָטַף literally denotes dripping/dropping. 'Dripped' preserves the lexical image and prepares for the explicit object 'water' in the next clause. 'Heavens' rather than 'skies' better matches the elevated poetic register.
- source_word: גַּם עָבִים נָטְפוּ מָיִם
  chosen: the clouds also dripped water
  alternatives:
  - the thick clouds also dripped water
  - the clouds also poured water
  lexicon: HALOT
  rationale: עָבִים refers to clouds, often thick rain clouds. 'Clouds' is sufficient in English; 'dripped water' keeps the repetition of נָטַף and the explicit object מָיִם. Avoided 'poured' because it overstates the specific verb.
