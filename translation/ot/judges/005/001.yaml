id: JDG.5.1
reference: Judges 5:1
source:
  edition: WLC
  text: וַ/תָּ֣שַׁר דְּבוֹרָ֔ה וּ/בָרָ֖ק בֶּן אֲבִינֹ֑עַם בַּ/יּ֥וֹם הַ/ה֖וּא לֵ/אמֹֽר־׃
translation:
  text: 'Then Deborah and Barak son of Abinoam sang on that day, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a singular verb, 'and Deborah sang,' followed by 'and Barak';
      the sense in context is that Deborah and Barak sang together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשַׁר
  chosen: sang
  alternatives:
  - sang out
  - sang this song
  lexicon: HALOT
  rationale: From שׁיר 'to sing.' The singular feminine verb agrees with Deborah as
    the first named subject, while Barak is joined afterward. English idiom uses a
    plural compound subject ('Deborah and Barak sang') rather than preserving the
    Hebrew singular verb. 'Sang' is the plain sense without adding 'song,' which is
    not explicit in this verse.
- source_word: דְּבוֹרָה
  chosen: Deborah
  rationale: Standard English transliteration of the personal name.
- source_word: וּבָרָק
  chosen: and Barak
  rationale: Conjunction plus personal name; standard transliteration retained.
- source_word: בֶּן אֲבִינֹעַם
  chosen: son of Abinoam
  alternatives:
  - the son of Abinoam
  rationale: Hebrew patronymic construction is naturally rendered 'son of Abinoam.'
    The article is unnecessary in English apposition.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Temporal phrase marking the specific day of the victory. 'On that day'
    preserves the preposition and the formal narrative cadence better than the slightly
    looser 'that day.'
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing the song that follows. 'Saying:'
    is concise and transparent to the source.
