id: JDG.5.19
reference: Judges 5:19
source:
  edition: WLC
  text: בָּ֤אוּ מְלָכִים֙ נִלְחָ֔מוּ אָ֤ז נִלְחֲמוּ֙ מַלְכֵ֣י כְנַ֔עַן בְּ/תַעְנַ֖ךְ
    עַל מֵ֣י מְגִדּ֑וֹ בֶּ֥צַע כֶּ֖סֶף לֹ֥א לָקָֽחוּ־׃
translation:
  text: Kings came; they fought. Then the kings of Canaan fought at Taanach, by the
    waters of Megiddo; they took no plunder of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gain of silver' or 'profit of silver.' The Hebrew expression can denote
      material gain more generally, but in this battle context 'plunder of silver'
      best fits.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: 'Basic sense of בוא in the qatal plural is movement into the scene: ''came.''
    This preserves the terse, poetic opening.'
- source_word: מְלָכִים
  chosen: Kings
  alternatives:
  - the kings
  lexicon: HALOT
  rationale: Anarthrous plural is naturally rendered 'kings' rather than 'the kings'
    in the opening line, matching the poetic style.
- source_word: נִלְחָמוּ
  chosen: they fought
  alternatives:
  - they engaged in battle
  - they made war
  lexicon: HALOT
  rationale: לחם in the Niphal commonly means 'fight/do battle.' 'They fought' is
    concise and idiomatic.
- source_word: אָז
  chosen: Then
  alternatives:
  - at that time
  - thereupon
  lexicon: HALOT
  rationale: אָז marks the next poetic movement. 'Then' preserves sequence without
    overexplaining.
- source_word: מַלְכֵי כְנַעַן
  chosen: the kings of Canaan
  alternatives:
  - Canaanite kings
  lexicon: HALOT
  rationale: Construct chain is rendered transparently as 'the kings of Canaan.' This
    keeps the formal relation and echoes the Hebrew cadence.
- source_word: בְּתַעְנַךְ
  chosen: at Taanach
  alternatives:
  - in Taanach
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'at' for a battle location. 'At Taanach'
    is idiomatic for a military engagement site.
- source_word: עַל מֵי מְגִדּוֹ
  chosen: by the waters of Megiddo
  alternatives:
  - by the waters of Megiddo
  - near the waters of Megiddo
  - at the waters of Megiddo
  lexicon: HALOT
  rationale: עַל with a geographic feature here indicates proximity. 'By the waters
    of Megiddo' is natural English and preserves the topographical note.
- source_word: בֶּצַע כֶּסֶף
  chosen: plunder of silver
  alternatives:
  - gain of silver
  - profit of silver
  - silver spoil
  lexicon: HALOT
  rationale: בצע denotes gain, often unjust gain or booty/plunder in context. In a
    battle setting, 'plunder of silver' best fits the sense and reads naturally in
    English.
- source_word: לֹא לָקָחוּ
  chosen: they took no
  alternatives:
  - they did not take
  - they received no
  lexicon: HALOT
  rationale: Simple negated qatal. 'They took no plunder of silver' is idiomatic and
    keeps the emphasis on the absence of spoil.
