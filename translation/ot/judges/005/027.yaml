id: JDG.5.27
reference: Judges 5:27
source:
  edition: WLC
  text: בֵּ֣ין רַגְלֶ֔י/הָ כָּרַ֥ע נָפַ֖ל שָׁכָ֑ב בֵּ֤ין רַגְלֶ֨י/הָ֙ כָּרַ֣ע נָפָ֔ל
    בַּ/אֲשֶׁ֣ר כָּרַ֔ע שָׁ֖ם נָפַ֥ל שָׁדֽוּד׃
translation:
  text: Between her feet he sank, he fell, he lay; between her feet he sank, he fell;
    where he sank, there he fell—devastated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at her feet' instead of the more literal 'between her feet.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew repeats a sequence of short verbs ('sank, fell, lay ... sank,
      fell') for poetic emphasis.
    reason: cultural_note
  - marker: c
    text: Or 'destroyed' / 'violently slain' for 'devastated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין רַגְלֶיהָ
  chosen: between her feet
  alternatives:
  - at her feet
  - between her legs
  lexicon: HALOT
  rationale: Literally 'between her feet.' This preserves the Hebrew imagery and repetition.
    'At her feet' is smoother idiomatic English and common in tradition, but it weakens
    the concrete spatial wording. 'Between her legs' is more anatomically explicit
    than the Hebrew idiom requires in English.
- source_word: כָּרַע
  chosen: he sank
  alternatives:
  - he bowed
  - he collapsed
  - he knelt
  lexicon: HALOT
  rationale: The verb commonly means 'bend the knee, crouch, sink down.' In this death-scene
    context, 'he sank' best conveys the downward collapse without suggesting voluntary
    reverence ('bowed') or a deliberate posture ('knelt'). It also fits the poetic
    sequence with 'fell' and 'lay.'
- source_word: נָפַל
  chosen: he fell
  alternatives:
  - he collapsed
  - he dropped
  lexicon: HALOT
  rationale: Standard rendering of נפל. Repeated unchanged to preserve the poem's
    rhythm and intensification.
- source_word: שָׁכָב
  chosen: he lay
  alternatives:
  - he lay down
  - he was lying
  lexicon: HALOT
  rationale: Simple past 'he lay' preserves the terse sequence of perfect verbs and
    the stark poetic cadence.
- source_word: בַּאֲשֶׁר
  chosen: where
  alternatives:
  - at the place where
  - in the place where
  lexicon: HALOT
  rationale: 'Here the preposition with relative particle functions adverbially: ''where
    / at the place where.'' ''Where'' is the most natural concise English equivalent
    and preserves the line''s force.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: 'Direct equivalent, retained for emphasis in the final colon: ''there
    he fell.'''
- source_word: שָׁדוּד
  chosen: devastated
  alternatives:
  - destroyed
  - dead
  - violently slain
  lexicon: HALOT
  rationale: The passive participial/adjectival form denotes being despoiled, ruined,
    or devastated. In context it marks Sisera as utterly undone. 'Dead' is interpretive
    and too flat; 'destroyed' is possible but less vivid; 'violently slain' captures
    the sense but expands beyond the single Hebrew word.
