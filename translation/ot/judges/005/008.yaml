id: JDG.5.8
reference: Judges 5:8
source:
  edition: WLC
  text: יִבְחַר֙ אֱלֹהִ֣ים חֲדָשִׁ֔ים אָ֖ז לָחֶ֣ם שְׁעָרִ֑ים מָגֵ֤ן אִם יֵֽרָאֶה֙
    וָ/רֹ֔מַח בְּ/אַרְבָּעִ֥ים אֶ֖לֶף בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: They chose new gods; then war was at the gates. Was a shield or spear to be
    seen among forty thousand in Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'He/one chose new gods.' The Hebrew verb is singular,
      but the sense is commonly understood collectively of Israel.
    reason: alternative_reading
  - marker: b
    text: The Hebrew of this line is difficult; alternatively, 'then fighting was
      at the gates' or similar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְחַר
  chosen: They chose
  alternatives:
  - He chose
  - one chose
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb is commonly taken with an indefinite
    or collective subject in context. Rendering it as plural in English fits the following
    reference to Israel's condition and avoids the awkwardness of a singular subject
    before the plural object 'new gods.'
- source_word: אֱלֹהִים חֲדָשִׁים
  chosen: new gods
  alternatives:
  - new divine beings
  lexicon: HALOT
  rationale: In this context the plural plainly refers to foreign deities/idols rather
    than the God of Israel. 'New gods' is the natural and established sense and best
    matches the polemical force of the line.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal/sequential adverb linking apostasy with the ensuing crisis.
- source_word: לָחֶם שְׁעָרִים
  chosen: war was at the gates
  alternatives:
  - there was fighting at the gates
  - he fought the gates
  lexicon: HALOT
  rationale: 'The Hebrew is compressed and difficult. Taking לָחֶם as a noun ''war/battle''
    yields a coherent sense in context: conflict reached the city gates. This is preferable
    in English to a hyper-literal but obscure rendering.'
- source_word: מָגֵן
  chosen: shield
  lexicon: HALOT
  rationale: Standard military term; straightforward rendering.
- source_word: אִם יֵרָאֶה
  chosen: Was ... to be seen
  alternatives:
  - could ... be seen
  - was ... seen
  lexicon: HALOT
  rationale: The interrogative force here is idiomatic and likely rhetorical, expressing
    the absence of weapons. English inversion captures the rhetorical question naturally.
- source_word: וָרֹמַח
  chosen: or spear
  alternatives:
  - or lance
  lexicon: HALOT
  rationale: Standard weapon term; 'spear' is the clearest modern equivalent.
- source_word: בְּאַרְבָּעִים אֶלֶף
  chosen: among forty thousand
  alternatives:
  - among the forty thousand
  - within forty thousand
  lexicon: HALOT
  rationale: The preposition ב marks the population within which the search is made.
    'Among forty thousand' is idiomatic and preserves the rhetorical scale.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: Locative/social sense; 'in Israel' is natural English and suits the national
    reference.
