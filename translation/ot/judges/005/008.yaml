theological_decisions:
- issue: Subject of the opening verb
  chosen_reading: 'The subject is Israel/the people collectively: ''They chose new
    gods.'''
  alternative_readings:
  - God chose new things
  - He chose new gods
  rationale: The immediate context concerns Israel's apostasy and resulting oppression.
    Reading God as subject would create a theologically and contextually implausible
    statement that God chose 'new gods.' The collective/indefinite human subject best
    fits the song's accusation.
  doctrine_reference: Translation philosophy §1, §3
