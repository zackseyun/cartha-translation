id: JDG.5.6
reference: Judges 5:6
source:
  edition: WLC
  text: בִּ/ימֵ֞י שַׁמְגַּ֤ר בֶּן עֲנָת֙ בִּ/ימֵ֣י יָעֵ֔ל חָדְל֖וּ אֳרָח֑וֹת וְ/הֹלְכֵ֣י
    נְתִיב֔וֹת יֵלְכ֕וּ אֳרָח֖וֹת עֲקַלְקַלּֽוֹת־׃
translation:
  text: In the days of Shamgar son of Anath, in the days of Jael, the highways were
    deserted, and travelers on the byways went by crooked paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the roads ceased'—that is, normal travel on the main routes stopped.
    reason: lexical_alternative
  - marker: b
    text: '''Crooked paths'' likely refers to indirect side routes taken for safety
      rather than moral crookedness.'
    reason: cultural_note
lexical_decisions:
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: Temporal idiom marking the period characterized by the named figures;
    'in the days of' is a natural and standard English equivalent.
- source_word: שַׁמְגַּר בֶּן־עֲנָת
  chosen: Shamgar son of Anath
  alternatives:
  - Shamgar ben-Anath
  rationale: Personal name is transliterated per translation philosophy; בֶּן is rendered
    'son of' rather than retained in Hebrew form.
- source_word: יָעֵל
  chosen: Jael
  rationale: Personal name transliterated by standard English convention.
- source_word: חָדְלוּ
  chosen: were deserted
  alternatives:
  - ceased
  - were abandoned
  lexicon: HALOT
  rationale: The verb literally means 'ceased' or 'came to an end,' but with אֳרָחוֹת
    ('roads/highways') the sense is that normal use of the roads had stopped. 'Were
    deserted' conveys the implied result in idiomatic English without over-paraphrasing.
- source_word: אֳרָחוֹת
  chosen: the highways
  alternatives:
  - the roads
  - the caravan routes
  lexicon: HALOT
  rationale: The noun denotes roads/paths, often traveled routes. 'Highways' captures
    the sense of main public routes in contrast with smaller byways later in the verse.
- source_word: הֹלְכֵי נְתִיבוֹת
  chosen: travelers on the byways
  alternatives:
  - those who walked on the paths
  - wayfarers on the tracks
  lexicon: HALOT
  rationale: Construct phrase literally 'walkers of paths.' 'Travelers' is idiomatic
    for persons using routes; נְתִיבוֹת is distinguished from אֳרָחוֹת, so 'byways'
    preserves the contrast with the main highways.
- source_word: יֵלְכוּ
  chosen: went
  alternatives:
  - would go
  - walked
  lexicon: HALOT
  rationale: Imperfect here functions in past narrative/song context to describe customary
    action. Simple past reads naturally in English poetry-prose.
- source_word: אֳרָחוֹת עֲקַלְקַלּוֹת
  chosen: by crooked paths
  alternatives:
  - on winding roads
  - by roundabout ways
  lexicon: HALOT
  rationale: The adjective means twisted, winding, crooked. 'Crooked paths' preserves
    the image of indirect, unsafe travel routes chosen to avoid the main roads.
