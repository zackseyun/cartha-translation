id: JDG.5.3
reference: Judges 5:3
source:
  edition: WLC
  text: שִׁמְע֣וּ מְלָכִ֔ים הַאֲזִ֖ינוּ רֹֽזְנִ֑ים אָֽנֹכִ֗י לַֽ/יהוָה֙ אָנֹכִ֣י אָשִׁ֔ירָה
    אֲזַמֵּ֕ר לַֽ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: Hear, O kings; give ear, O rulers. I, to the LORD—I will sing; I will make
    music to the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hear, O kings; give ear, O rulers'' uses two near-parallel imperatives
      for poetic emphasis.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I will sing praise to the LORD.'' The Hebrew uses two related but
      distinct verbs: ''sing'' and ''make music.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is concise and idiomatic in elevated
    poetic address, fitting the summons to kings.
- source_word: מְלָכִים
  chosen: kings
  lexicon: HALOT
  rationale: Straightforward plural noun; no reason to generalize beyond literal political
    rulers in the song's address.
- source_word: הַאֲזִינוּ
  chosen: give ear
  alternatives:
  - listen closely
  - pay attention
  lexicon: HALOT
  rationale: This verb is near-synonymous with שׁמע but more vivid and poetic. 'Give
    ear' preserves the parallelism and elevated style better than flattening both
    verbs to 'listen'.
- source_word: רֹזְנִים
  chosen: rulers
  alternatives:
  - princes
  - dignitaries
  lexicon: HALOT
  rationale: The term denotes high officials or potentates. 'Rulers' is clear modern
    English and matches the public-political sense without sounding archaic like 'princes'.
- source_word: אָנֹכִי ... אָנֹכִי
  chosen: I ... I
  alternatives:
  - As for me ... I
  lexicon: HALOT
  rationale: The repeated independent pronoun is emphatic. The English punctuation
    with repeated 'I' preserves the self-declaration and poetic emphasis.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: With verbs of singing, ל can indicate direction or dedication. 'To the
    LORD' is the most natural English collocation and preserves the addressee/dedication
    sense. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English convention.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - let me sing
  - I sing
  lexicon: HALOT
  rationale: Cohortative/form with volitional nuance in context. In English poetry
    here, 'I will sing' best conveys resolve without awkwardness.
- source_word: אֲזַמֵּר
  chosen: I will make music
  alternatives:
  - I will sing praise
  - I will sing psalms
  lexicon: HALOT
  rationale: זמר refers to making music/singing praise. 'Make music' preserves the
    distinction from the previous 'sing' while remaining natural and not over-specifying
    instrumentation.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying the LORD specifically as Israel's God. Standard,
    transparent rendering.
