id: JDG.5.26
reference: Judges 5:26
source:
  edition: WLC
  text: יָדָ/הּ֙ לַ/יָּתֵ֣ד תִּשְׁלַ֔חְנָה וִֽ/ימִינָ֖/הּ לְ/הַלְמ֣וּת עֲמֵלִ֑ים וְ/הָלְמָ֤ה
    סִֽיסְרָא֙ מָחֲקָ֣ה רֹאשׁ֔/וֹ וּ/מָחֲצָ֥ה וְ/חָלְפָ֖ה רַקָּתֽ/וֹ׃
translation:
  text: She reached out her hand for the tent peg, her right hand for the workmen’s
    hammer; then she struck Sisera, she shattered his head, she smashed and pierced
    through his temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the hammer of laborers' / 'for a workmen’s mallet.' The Hebrew expression
      לְהַלְמוּת עֲמֵלִים is somewhat uncommon, and the exact nuance of the striking
      tool may be rendered in more than one way.
    reason: lexical_alternative
  - marker: b
    text: Or 'she crushed his head' instead of 'she shattered his head.' The Hebrew
      uses a sequence of forceful verbs to heighten the violence poetically.
    reason: lexical_alternative
  - marker: c
    text: Or 'she transfixed his temple' / 'she passed through his temple.' The final
      verb likely conveys piercing through.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָהּ
  chosen: her hand
  alternatives:
  - her arm
  lexicon: HALOT
  rationale: The common concrete sense 'hand' fits the parallel with 'her right hand'
    and preserves the vivid physical action.
- source_word: לַיָּתֵד
  chosen: for the tent peg
  alternatives:
  - for the peg
  lexicon: HALOT
  rationale: In the Jael narrative context, the peg is specifically a tent peg; supplying
    'tent' makes the referent clear in natural English without adding foreign content.
- source_word: תִּשְׁלַחְנָה
  chosen: reached out
  alternatives:
  - sent forth
  - stretched out
  lexicon: HALOT
  rationale: The verb means to send/stretch out the hand. 'Reached out' is idiomatic
    English for extending the hand toward an object.
- source_word: וִימִינָהּ
  chosen: her right hand
  lexicon: HALOT
  rationale: Straightforward anatomical parallelism with 'her hand'; preserving the
    poetic balance is important.
- source_word: לְהַלְמוּת עֲמֵלִים
  chosen: for the workmen’s hammer
  alternatives:
  - for a laborers' mallet
  - for the hammer of workers
  lexicon: HALOT
  rationale: The noun denotes a striking implement, likely a hammer or mallet. 'Workmen’s
    hammer' preserves the genitive idea and sounds natural in English while fitting
    the tent-setting context.
- source_word: וְהָלְמָה
  chosen: then she struck
  alternatives:
  - and she struck
  - and she hammered
  lexicon: HALOT
  rationale: The verb means to strike/smite. 'Then she struck' gives good narrative
    flow in English while retaining the sequential force of waw.
- source_word: מָחֲקָה
  chosen: she shattered
  alternatives:
  - she crushed
  - she smashed
  lexicon: HALOT
  rationale: The verb conveys forceful crushing or smashing. 'Shattered' communicates
    the violent impact poetically without becoming clinical.
- source_word: רֹאשׁוֹ
  chosen: his head
  lexicon: HALOT
  rationale: Direct and literal rendering.
- source_word: וּמָחֲצָה
  chosen: she smashed
  alternatives:
  - she crushed
  - she shattered
  lexicon: HALOT
  rationale: A second violent verb intensifies the action. Rendering it differently
    from the previous verb helps preserve the Hebrew piling up of near-synonyms.
- source_word: וְחָלְפָה
  chosen: pierced through
  alternatives:
  - transfixed
  - passed through
  lexicon: HALOT
  rationale: The verb here likely carries the sense of passing through/piercing. 'Pierced
    through' makes the result explicit in idiomatic English and matches the scene.
- source_word: רַקָּתוֹ
  chosen: his temple
  alternatives:
  - his skull
  - his cheek
  lexicon: HALOT
  rationale: In context the noun refers to the side of the head/temple. 'Temple' is
    the most precise and conventional English rendering for the fatal blow described.
