id: JDG.5.15
reference: Judges 5:15
source:
  edition: WLC
  text: וְ/שָׂרַ֤/י בְּ/יִשָּׂשכָר֙ עִם דְּבֹרָ֔ה וְ/יִשָּׂשכָר֙ כֵּ֣ן בָּרָ֔ק בָּ/עֵ֖מֶק
    שֻׁלַּ֣ח בְּ/רַגְלָ֑י/ו בִּ/פְלַגּ֣וֹת רְאוּבֵ֔ן גְּדֹלִ֖ים חִקְקֵי לֵֽב־־׃
translation:
  text: And the princes of Issachar were with Deborah; and Issachar was likewise with
    Barak; into the valley they were sent at his feet. Among the divisions of Reuben
    there were great searchings of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs of Issachar' or 'leaders of Issachar.' The Hebrew expression
      is poetic and may function idiomatically rather than as a strict possessive.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his feet,' that is, following closely behind him.
    reason: lexical_alternative
  - marker: c
    text: Or 'great resolutions of heart' or 'great deliberations of heart.' The Hebrew
      phrase is difficult; in context it likely highlights Reuben's inward debate
      instead of action.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂרַי
  chosen: princes of
  alternatives:
  - leaders of
  - chiefs of
  lexicon: HALOT
  rationale: The construct form with 1cs suffix in this poetic context is best understood
    idiomatically as 'princes/chiefs of' rather than a literal possessive 'my princes.'
    'Princes' preserves the elevated poetic register of the Song of Deborah, while
    'leaders' is possible but flatter.
- source_word: עִם
  chosen: with
  alternatives:
  - alongside
  lexicon: HALOT
  rationale: 'Simple accompaniment is in view: the leaders of Issachar stood with
    Deborah.'
- source_word: וְיִשָּׂשכָר כֵּן בָּרָק
  chosen: and Issachar was likewise with Barak
  alternatives:
  - and so was Issachar with Barak
  - and Issachar, so too, with Barak
  lexicon: HALOT
  rationale: כֵּן marks correspondence ('so, likewise'). The clause is elliptical
    in Hebrew; supplying 'was' yields natural English while preserving the parallel
    with the previous clause.
- source_word: בָּעֵמֶק
  chosen: into the valley
  alternatives:
  - in the valley
  - to the valley
  lexicon: HALOT
  rationale: With the passive verb שֻׁלַּח in a military movement context, English
    'into the valley' best conveys motion toward deployment rather than mere location.
- source_word: שֻׁלַּח
  chosen: they were sent
  alternatives:
  - he was sent
  - was dispatched
  lexicon: HALOT
  rationale: Although morphologically singular, the verb follows a collective/tribal
    subject in poetic style. Rendering it as plural in English matches the sense of
    Issachar's forces accompanying Barak. 'Dispatched' is possible but more technical.
- source_word: בְּרַגְלָיו
  chosen: at his feet
  alternatives:
  - at his heels
  - following him
  lexicon: HALOT
  rationale: Literally 'at his feet.' In context it expresses close following behind
    Barak into battle. The literal idiom is retained in the main text for transparency,
    while the sense could be paraphrased as 'following him.'
- source_word: בִּפְלַגּוֹת רְאוּבֵן
  chosen: among the divisions of Reuben
  alternatives:
  - among the clans of Reuben
  - in the districts of Reuben
  lexicon: HALOT
  rationale: פְּלַגּוֹת literally denotes divisions/sections. In this tribal context
    it likely refers to Reuben's internal groupings or factions. 'Divisions' preserves
    the wordplay with indecision in the following line.
- source_word: גְּדֹלִים
  chosen: great
  alternatives:
  - many
  - weighty
  lexicon: HALOT
  rationale: The adjective intensifies the following noun phrase; 'great' is the most
    direct rendering.
- source_word: חִקְקֵי לֵב
  chosen: searchings of heart
  alternatives:
  - resolutions of heart
  - deliberations of heart
  lexicon: HALOT
  rationale: The phrase is difficult and poetic. In context, especially paired with
    Reuben's hesitation in the surrounding verses, it points to inward deliberation
    or searching reflection rather than decisive action. 'Searchings of heart' is
    a well-established rendering that fits the rebuking tone.
