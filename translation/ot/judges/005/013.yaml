id: JDG.5.13
reference: Judges 5:13
source:
  edition: WLC
  text: אָ֚ז יְרַ֣ד שָׂרִ֔יד לְ/אַדִּירִ֖ים עָ֑ם יְהוָ֕ה יְרַד לִ֖/י בַּ/גִּבּוֹרִֽים־׃
translation:
  text: Then the remnant came down against the nobles; the people of Yahweh came down for me against the mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then a survivor came down to the nobles'; the Hebrew of this poetic line is difficult, and the prepositions may also be read in a non-hostile sense ('to,' 'for,' or 'with').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'for me'; likely Deborah's poetic self-reference.
    reason: cultural_note
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the next movement in the song; 'Then' is concise and natural in English poetic narrative.
- source_word: יְרַד / יְרַד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/come down.' In English narrative poetry, 'came down' works well for both occurrences and preserves the repeated Hebrew verb.
- source_word: שָׂרִיד
  chosen: the remnant
  alternatives:
  - survivor
  - those who remained
  lexicon: HALOT
  rationale: The noun denotes one who survives or what remains. In this military-poetic context, 'the remnant' best captures a surviving band as a collective.
- source_word: לְאַדִּירִים
  chosen: against the nobles
  alternatives:
  - to the nobles
  - for the nobles
  - against the mighty
  lexicon: HALOT
  rationale: אַדִּירִים refers to powerful or noble ones. The preposition ל can be read in a hostile sense in context, and the parallel with 'against the mighty' supports rendering the line as conflict rather than alliance. 'Nobles' distinguishes this term from גִּבּוֹרִים in the second colon.
- source_word: עָם יְהוָה
  chosen: the people of the LORD
  alternatives:
  - the LORD's people
  lexicon: HALOT
  rationale: Construct-like apposition identifying Israel as belonging to YHWH. 'The people of the LORD' is transparent and preserves the covenantal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - with me
  - for my sake
  lexicon: HALOT
  rationale: The 1cs pronominal suffix likely reflects Deborah's poetic self-reference. 'For me' is the most direct rendering, while leaving the exact nuance broad enough for the poetic context.
- source_word: בַּגִּבּוֹרִים
  chosen: against the mighty
  alternatives:
  - among the mighty
  - with the mighty
  - against the warriors
  lexicon: HALOT
  rationale: גִּבּוֹרִים denotes mighty men/warriors. Given the battle setting and the likely adversative force of the preposition in this poetic line, 'against the mighty' best fits the sense. 'Mighty' also preserves the broader semantic range beyond strictly military 'warriors.'
