theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Syntactical force of the prepositions in both cola
  chosen_reading: hostile sense ('against the nobles' / 'against the mighty')
  alternative_readings:
  - benefactive or associative sense ('to/for the nobles'; 'with/among the mighty')
  rationale: Judges 5 is victory poetry recounting battle action. Though the Hebrew prepositions could be construed differently in isolation, the immediate martial context and parallelism favor an adversative reading in both cola. This preserves the poem's momentum without over-paraphrasing.
