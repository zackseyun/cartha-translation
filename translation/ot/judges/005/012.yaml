id: JDG.5.12
reference: Judges 5:12
source:
  edition: WLC
  text: עוּרִ֤י עוּרִי֙ דְּבוֹרָ֔ה ע֥וּרִי ע֖וּרִי דַּבְּרִי שִׁ֑יר ק֥וּם בָּרָ֛ק
    וּֽ/שֲׁבֵ֥ה שֶׁבְיְ/ךָ֖ בֶּן אֲבִינֹֽעַם־־׃
translation:
  text: Awake, awake, Deborah! Awake, awake, speak a song! Rise up, Barak, and take
    captive your captives, son of Abinoam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sing a song.' The Hebrew verb is literally 'speak,' which may intentionally
      preserve the poetic force of the summons.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'take captive your captives,' a Hebrew idiom for triumph over
      enemies by seizing them as prisoners.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרִי
  chosen: Awake
  alternatives:
  - Rouse yourself
  - Arise
  lexicon: HALOT
  rationale: Imperative feminine singular from עור, repeated four times for poetic
    urgency. 'Awake' is idiomatic and preserves the summons without over-paraphrasing.
- source_word: דְּבוֹרָה
  chosen: Deborah
  rationale: Personal name transliterated per translation philosophy.
- source_word: דַּבְּרִי שִׁיר
  chosen: speak a song
  alternatives:
  - sing a song
  - utter a song
  lexicon: HALOT
  rationale: The verb is דבר ('speak'), not the usual שׁיר ('sing'). Retaining 'speak
    a song' preserves the source wording and poetic distinctiveness, though English
    readers may expect 'sing.'
- source_word: קוּם
  chosen: Rise up
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: Imperative masculine singular to Barak. 'Rise up' fits the martial and
    poetic context.
- source_word: בָּרָק
  chosen: Barak
  rationale: Personal name transliterated.
- source_word: וּשֲׁבֵה
  chosen: and take captive
  alternatives:
  - and lead away captive
  - and capture
  lexicon: HALOT
  rationale: Imperative from שבה in the sense of taking captives. 'Take captive' is
    clear modern English and preserves the military sense.
- source_word: שֶׁבְיְךָ
  chosen: your captives
  alternatives:
  - your captivity
  - those you captured
  lexicon: HALOT
  rationale: The noun שֶׁבִי can denote captives collectively or captivity. In this
    military victory song, 'your captives' best fits the imperative 'take captive'
    and yields the idiomatic Hebrew expression 'take captive your captives' without
    flattening it.
- source_word: בֶּן אֲבִינֹעַם
  chosen: son of Abinoam
  rationale: Patronymic retained formally; common biblical identification formula.
