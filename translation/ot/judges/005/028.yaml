id: JDG.5.28
reference: Judges 5:28
source:
  edition: WLC
  text: בְּעַד֩ הַ/חַלּ֨וֹן נִשְׁקְפָ֧ה וַ/תְּיַבֵּ֛ב אֵ֥ם סִֽיסְרָ֖א בְּעַ֣ד הָֽ/אֶשְׁנָ֑ב
    מַדּ֗וּעַ בֹּשֵׁ֤שׁ רִכְבּ/וֹ֙ לָ/ב֔וֹא מַדּ֣וּעַ אֶֽחֱר֔וּ פַּעֲמֵ֖י מַרְכְּבוֹתָֽי/ו׃
translation:
  text: 'Through the window Sisera’s mother looked out and wailed through the lattice:
    “Why is his chariot so late in coming? Why do the hoofbeats of his chariots delay?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cried out' for the rare verb translated 'wailed.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the steps/footfalls of his chariots'; 'hoofbeats' makes explicit
      the sound implied by chariot movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעַד
  chosen: through
  alternatives:
  - out of
  - from behind
  lexicon: HALOT
  rationale: With window/lattice, the preposition denotes looking or sounding through
    an opening. 'Through' is natural English and preserves the spatial sense.
- source_word: הַחַלּוֹן
  chosen: the window
  lexicon: HALOT
  rationale: Standard rendering for the architectural opening; definite article retained.
- source_word: נִשְׁקְפָה
  chosen: looked out
  alternatives:
  - peered out
  - gazed out
  lexicon: HALOT
  rationale: The verb commonly means to look out/down from a window or elevated place.
    'Looked out' is idiomatic and fits the scene.
- source_word: וַתְּיַבֵּב
  chosen: wailed
  alternatives:
  - cried out
  - sobbed
  lexicon: HALOT
  rationale: The rare verb likely denotes a vocal lament or anxious cry. 'Wailed'
    best conveys the emotional intensity without overinterpreting the exact sound.
- source_word: אֵם סִיסְרָא
  chosen: Sisera’s mother
  alternatives:
  - the mother of Sisera
  lexicon: HALOT
  rationale: Construct relationship rendered naturally in English with possessive
    form.
- source_word: הָאֶשְׁנָב
  chosen: the lattice
  alternatives:
  - the lattice window
  - the casement
  lexicon: HALOT
  rationale: The noun refers to a latticed opening. 'Lattice' is concise and conventional;
    the repeated בְּעַד already supplies the spatial sense.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative preserved in simple modern English.
- source_word: בֹּשֵׁשׁ
  chosen: is so late
  alternatives:
  - delays
  - tarries
  lexicon: HALOT
  rationale: The verb means to delay or be late. 'Is so late' fits the mother's anxious
    complaint and works smoothly with 'in coming.'
- source_word: רִכְבּוֹ
  chosen: his chariot
  alternatives:
  - his chariotry
  lexicon: HALOT
  rationale: Singular noun with singular suffix; rendered straightforwardly as the
    vehicle in which Sisera would be expected to return.
- source_word: לָבוֹא
  chosen: in coming
  alternatives:
  - to come
  lexicon: HALOT
  rationale: English idiom after 'late' prefers 'late in coming,' which preserves
    the infinitival sense naturally.
- source_word: אֶחֱרוּ
  chosen: delay
  alternatives:
  - are delayed
  - linger
  lexicon: HALOT
  rationale: The plural verb describes the continued lateness of what follows. 'Delay'
    keeps the active verbal force in idiomatic English.
- source_word: פַּעֲמֵי
  chosen: hoofbeats
  alternatives:
  - steps
  - footfalls
  lexicon: HALOT
  rationale: Literally 'steps/footfalls,' but in context of chariots the sound of
    the team drawing them is in view. 'Hoofbeats' communicates the concrete image
    more clearly in English while staying within the scene's implied meaning.
- source_word: מַרְכְּבוֹתָיו
  chosen: his chariots
  alternatives:
  - his chariot teams
  - his war chariots
  lexicon: HALOT
  rationale: Plural retained. The shift from singular 'his chariot' to plural 'his
    chariots' reflects the Hebrew and may broaden from Sisera's own vehicle to his
    returning force.
