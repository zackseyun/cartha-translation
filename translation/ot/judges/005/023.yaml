id: JDG.5.23
reference: Judges 5:23
source:
  edition: WLC
  text: א֣וֹרוּ מֵר֗וֹז אָמַר֙ מַלְאַ֣ךְ יְהוָ֔ה אֹ֥רוּ אָר֖וֹר יֹשְׁבֶ֑י/הָ כִּ֤י לֹֽא בָ֨אוּ֙ לְ/עֶזְרַ֣ת יְהוָ֔ה לְ/עֶזְרַ֥ת יְהוָ֖ה בַּ/גִּבּוֹרִֽים־׃
translation:
  text: Curse Meroz, said the angel of Yahweh; curse, utterly curse its inhabitants, because they did not come to the help of Yahweh, to the help of Yahweh against the mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the help of the LORD ... among the mighty'; the final phrase may also be understood as 'against the mighty' or 'with the mighty warriors.'
    reason: alternative_reading
lexical_decisions:
- source_word: א֣וֹרוּ / אֹ֥רוּ / אָר֖וֹר
  chosen: curse / curse, utterly curse
  alternatives:
  - denounce
  - ban
  - curse, curse bitterly
  lexicon: HALOT
  rationale: The repeated imperative from ארר calls for a strong judicial imprecation. Rendering the second clause as 'curse, utterly curse' reflects the intensification created by the infinitive absolute אָרוֹר following the imperative, without becoming overly paraphrastic.
- source_word: מֵר֗וֹז
  chosen: Meroz
  rationale: Proper name; transliterated per translation philosophy. The referent is likely a place, but the text itself simply names Meroz.
- source_word: מַלְאַ֣ךְ יְהוָ֔ה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'angel' or 'messenger.' In this formulaic biblical expression, 'the angel of the LORD' is the most natural rendering and preserves the text's theological and literary resonance. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יֹשְׁבֶ֑י/הָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - the inhabitants of it
  lexicon: HALOT
  rationale: The participial construct with 3fs suffix refers to the people dwelling in Meroz. 'Its inhabitants' is concise, natural English and preserves the collective sense.
- source_word: כִּ֤י לֹֽא בָ֨אוּ֙
  chosen: because they did not come
  alternatives:
  - for they did not come
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the curse. 'Because' makes the causal force explicit in modern English.
- source_word: לְ/עֶזְרַ֣ת יְהוָ֔ה
  chosen: to the help of the LORD
  alternatives:
  - to help the LORD
  - for the aid of the LORD
  lexicon: HALOT
  rationale: The noun עֶזְרָה with ל marks movement toward aid. 'To the help of the LORD' is somewhat formal but preserves the Hebrew idiom and the rhetorical repetition. 'To help the LORD' is possible but slightly smooths over the nominal construction.
- source_word: בַּ/גִּבּוֹרִֽים
  chosen: among the mighty
  alternatives:
  - against the mighty
  - with the mighty warriors
  lexicon: HALOT
  rationale: The preposition ב with גִּבּוֹרִים is syntactically difficult. 'Among the mighty' preserves the Hebrew more closely and fits the sense of joining the LORD's side in battle. Alternatives such as 'against the mighty' interpret the phrase more aggressively, while 'with the mighty warriors' expands the text.
