id: JDG.5.21
reference: Judges 5:21
source:
  edition: WLC
  text: נַ֤חַל קִישׁוֹן֙ גְּרָפָ֔/ם נַ֥חַל קְדוּמִ֖ים נַ֣חַל קִישׁ֑וֹן תִּדְרְכִ֥י
    נַפְשִׁ֖/י עֹֽז׃
translation:
  text: The torrent of Kishon swept them away— the ancient torrent, the torrent of
    Kishon. March on, my soul, with strength!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the torrent of old' or 'the primeval torrent' for 'the ancient torrent.'
      The Hebrew קְדוּמִים can carry the sense of antiquity, and some hear an intensified
      poetic description rather than a simple chronological label.
    reason: lexical_alternative
  - marker: b
    text: Or 'Tread on, my soul, in strength' or 'Trample, my soul, with might.' The
      Hebrew is terse and poetic, and the verb can suggest treading or trampling as
      well as marching.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַל
  chosen: torrent
  alternatives:
  - wadi
  - stream
  - river
  lexicon: HALOT
  rationale: נחל can denote a wadi/streambed or torrent valley; in this poetic battle
    context, where floodwaters overwhelm the enemy, 'torrent' best conveys the forceful,
    flood-like sense in natural English.
- source_word: קִישׁוֹן
  chosen: Kishon
  rationale: Proper name of the watercourse; per translation philosophy, names are
    transliterated rather than translated.
- source_word: גְּרָפָם
  chosen: swept them away
  alternatives:
  - dragged them away
  - washed them away
  lexicon: HALOT
  rationale: From גרף, 'to sweep away, wash away.' The 3ms verb with 3mp suffix refers
    to the torrent's action on the enemy forces. 'Swept them away' is idiomatic and
    preserves the violent hydrological imagery.
- source_word: נַחַל קְדוּמִים
  chosen: the ancient torrent
  alternatives:
  - the torrent of old
  - the primeval torrent
  lexicon: HALOT
  rationale: קְדוּמִים literally relates to 'former times/east/antiquity.' In this
    poetic apposition to Kishon, 'ancient torrent' best fits the temporal sense and
    the elevated style, without overcommitting to mythic overtones.
- source_word: תִּדְרְכִי
  chosen: March on
  alternatives:
  - tread on
  - trample
  - advance
  lexicon: HALOT
  rationale: From דרך, 'to tread, march.' Addressed to the speaker's soul in feminine
    singular, likely an exhortation to press forward triumphantly. 'March on' captures
    the imperative-like force in context and reads naturally in English poetry.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - I
  lexicon: HALOT
  rationale: נפש often denotes the inner self/life. In direct self-address within
    Hebrew poetry, 'my soul' preserves the poetic and rhetorical force better than
    flattening to 'I' or 'myself.'
- source_word: עֹז
  chosen: with strength
  alternatives:
  - in strength
  - mightily
  - O strength
  lexicon: HALOT
  rationale: עֹז denotes strength/might. The phrase after תִּדְרְכִי is syntactically
    compressed; 'with strength' gives a clear adverbial sense in English. An exclamatory
    vocative reading ('O strength') is less likely here.
