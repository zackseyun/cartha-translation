theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of צִדְקוֹת in this poetic victory context
  chosen_reading: righteous acts
  alternative_readings:
  - saving acts
  - victories
  rationale: The Hebrew term can denote acts that display righteousness/justice, and
    in context these are deliverances on Israel's behalf. 'Righteous acts' best preserves
    the lexical link while allowing readers to infer the salvific dimension from context
    rather than importing it into the translation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
