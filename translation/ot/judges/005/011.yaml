id: JDG.5.11
reference: Judges 5:11
source:
  edition: WLC
  text: מִ/קּ֣וֹל מְחַֽצְצִ֗ים בֵּ֚ין מַשְׁאַבִּ֔ים שָׁ֤ם יְתַנּוּ֙ צִדְק֣וֹת יְהוָ֔ה
    צִדְקֹ֥ת פִּרְזֹנ֖/וֹ בְּ/יִשְׂרָאֵ֑ל אָ֛ז יָרְד֥וּ לַ/שְּׁעָרִ֖ים עַם יְהוָֽה־׃
translation:
  text: From the sound of archers among the watering places, there they recount the
    righteous acts of the LORD, the righteous acts of his villagers in Israel. Then
    the people of the LORD went down to the gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the sound of archers by the watering places.' The opening phrase
      is difficult, and some understand it as describing the place where the song
      is heard rather than separation from the sound.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'villagers' is difficult and has also been understood
      as 'unwalled settlements,' 'rural folk,' or, less likely, 'rulers.'
    reason: lexical_alternative
  - marker: c
    text: The 'gates' were the public gathering places of a town, associated with
      civic life, judgment, and security.
    reason: cultural_note
lexical_decisions:
- source_word: מִקּוֹל
  chosen: From the sound of
  alternatives:
  - At the sound of
  - Far from the sound of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל most naturally gives a separative/source
    sense, 'from the sound of.' In this poetic line it introduces the scene associated
    with the noise. 'Far from' is possible in some interpretations, but the immediate
    context favors locating the recounting in relation to the sound rather than distancing
    from it.
- source_word: מְחַצְצִים
  chosen: archers
  alternatives:
  - those who divide out
  - those who shoot
  lexicon: HALOT
  rationale: In Judges 5:11 the participle is widely understood in context as referring
    to archers, likely from a root associated with shooting arrows. Because the verse
    contrasts danger and later public celebration at watering places, 'archers' is
    the most intelligible contextual rendering in English.
- source_word: בֵּין מַשְׁאַבִּים
  chosen: among the watering places
  alternatives:
  - between the watering places
  - by the water-drawing places
  lexicon: HALOT
  rationale: מַשְׁאַבִּים refers to places of drawing water or troughs/wells. 'Among
    the watering places' reads naturally in English while preserving the setting.
    'Between' is more literal for בֵּין, but in English 'among' better fits multiple
    locations in a poetic scene.
- source_word: יְתַנּוּ
  chosen: they recount
  alternatives:
  - they repeat
  - they sing
  - they tell
  lexicon: HALOT
  rationale: The verb in the Piel here conveys reciting or rehearsing aloud. 'Recount'
    preserves the sense of verbal celebration/testimony without overcommitting to
    musical performance, though song is possible in the poetic context.
- source_word: צִדְקוֹת יְהוָה
  chosen: the righteous acts of the LORD
  alternatives:
  - the saving acts of the LORD
  - the victories of the LORD
  lexicon: HALOT
  rationale: צדקות in this context refers not to abstract righteousness alone but
    to concrete acts displaying covenantal rightness and deliverance. 'Righteous acts'
    is the most textually transparent rendering; more interpretive options like 'saving
    acts' are possible but narrower.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: צִדְקֹת פִּרְזֹנוֹ
  chosen: the righteous acts of his villagers
  alternatives:
  - the righteous acts toward his peasantry
  - the righteous acts of his rulers
  - the righteous acts of his unwalled settlements
  lexicon: HALOT
  rationale: פִּרְזוֹן/פִּרְזֹנוֹ is difficult and debated. In Judges 5:7 a related
    form refers to village life or rural inhabitants. Here the suffix most naturally
    yields 'his villagers,' i.e., the LORD's people living in the villages of Israel,
    and the phrase parallels the preceding 'righteous acts of the LORD' by specifying
    those acts as experienced among Israel's rural population. Because the term is
    contested, alternatives are preserved in a footnote.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: 'The preposition ב is locative here: the righteous acts are recounted
    as occurring within Israel. ''In Israel'' is straightforward and idiomatic.'
- source_word: אָז יָרְדוּ
  chosen: Then ... went down
  alternatives:
  - At that time ... went down
  - Then ... came down
  lexicon: HALOT
  rationale: אָז marks the consequent moment in the song, and ירד retains its common
    sense 'go down.' The movement is likely toward the city gates, the place of public
    life and security.
- source_word: לַשְּׁעָרִים
  chosen: to the gates
  alternatives:
  - to the city gates
  - to the gateways
  lexicon: HALOT
  rationale: '''Gates'' in ancient Israel commonly denotes the civic/public space
    of a town. The simple ''gates'' preserves the Hebrew while remaining understandable;
    the cultural sense can be clarified in a footnote.'
- source_word: עַם יְהוָה
  chosen: the people of the LORD
  alternatives:
  - the LORD's people
  lexicon: HALOT
  rationale: This construct phrase is naturally rendered 'the people of the LORD.'
    It preserves the covenantal identification without paraphrase.
