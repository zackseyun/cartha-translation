id: JDG.5.31
reference: Judges 5:31
source:
  edition: WLC
  text: כֵּ֠ן יֹאבְד֤וּ כָל אוֹיְבֶ֨י/ךָ֙ יְהוָ֔ה וְ/אֹ֣הֲבָ֔י/ו כְּ/צֵ֥את הַ/שֶּׁ֖מֶשׁ בִּ/גְבֻרָת֑/וֹ וַ/תִּשְׁקֹ֥ט הָ/אָ֖רֶץ אַרְבָּעִ֥ים שָׁנָֽה־׃פ
translation:
  text: So may all your enemies perish, O Yahweh, but may those who love him be like the rising of the sun in its strength. And the land had rest forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'those who love him [are] like the going forth of the sun in its might.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the land was quiet'; the expression in Judges commonly denotes a period of peace or rest after conflict.
    reason: cross_reference
lexical_decisions:
- source_word: כֵּן
  chosen: So may
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces the concluding wish or comparison drawn from the preceding song. Rendering with 'So may' brings out the jussive force of the following verb in natural English.
- source_word: יֹאבְדוּ
  chosen: perish
  alternatives:
  - be destroyed
  - die
  lexicon: HALOT
  rationale: 'The Qal imperfect here functions jussively in an imprecatory/blessing conclusion: ''may ... perish.'' ''Perish'' is idiomatic and preserves the force without over-specifying the manner of destruction.'
- source_word: כָל אוֹיְבֶיךָ
  chosen: all your enemies
  alternatives:
  - every one of your enemies
  lexicon: HALOT
  rationale: Straightforward construct phrase; 'all your enemies' is natural and complete.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֹהֲבָיו
  chosen: but those who love him
  alternatives:
  - and his lovers
  - and those loving him
  lexicon: HALOT
  rationale: The conjunction marks contrast between the LORD's enemies and his lovers. 'Those who love him' is idiomatic English and preserves the 3ms suffix referring back to the LORD.
- source_word: כְּצֵאת הַשֶּׁמֶשׁ
  chosen: be like the rising of the sun
  alternatives:
  - be like the going out of the sun
  - be like the sun when it rises
  lexicon: HALOT
  rationale: The infinitive construct of יצא with 'sun' refers to its emergence/rising. 'Rising of the sun' is clear modern English and preserves the simile.
- source_word: בִּגְבֻרָתוֹ
  chosen: in its strength
  alternatives:
  - in his strength
  - in full strength
  - in its might
  lexicon: HALOT
  rationale: Refers to the sun's powerful brightness at full force. English naturally uses 'its' for the sun in this context, avoiding unnecessary personification while preserving the image.
- source_word: וַתִּשְׁקֹט הָאָרֶץ
  chosen: And the land had rest
  alternatives:
  - And the land was quiet
  - And the land was undisturbed
  lexicon: HALOT
  rationale: This is a standard Judges formula indicating cessation of conflict and settled peace. 'Had rest' captures the idiomatic sense better than a merely acoustic 'was quiet.'
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Standard duration expression.
