theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the pronoun in וְאֹהֲבָיו
  chosen_reading: him = the LORD
  rationale: The 3ms suffix most naturally refers to the immediately preceding divine name, yielding the contrast 'your enemies, O LORD' / 'those who love him.' This preserves the Hebrew shift from direct address to third-person reference without smoothing it away.
