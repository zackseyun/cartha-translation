id: JDG.5.5
reference: Judges 5:5
source:
  edition: WLC
  text: הָרִ֥ים נָזְל֖וּ מִ/פְּנֵ֣י יְהוָ֑ה זֶ֣ה סִינַ֔י מִ/פְּנֵ֕י יְהוָ֖ה אֱלֹהֵ֥י
    יִשְׂרָאֵֽל׃
translation:
  text: The mountains flowed down before the LORD—this Sinai—before the LORD, the
    God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from before the presence of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Flowed down'' renders a verb meaning to stream or drip; many translations
      interpret the image as ''melted.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: Definite article is present, so 'the mountains' best reflects the Hebrew
    form. 'Hills' is possible in some contexts but 'mountains' is the standard and
    fits the Sinai-theophany imagery.
- source_word: נָזְלוּ
  chosen: flowed down
  alternatives:
  - melted
  - quaked
  - dripped
  lexicon: HALOT
  rationale: The verb from נזל literally denotes flowing or streaming. In this poetic
    theophany context, English 'flowed down' preserves the vivid image better than
    the traditional but more interpretive 'melted.' 'Quaked' reflects the broader
    scene but is not the lexical sense of the verb.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - at the presence of
  - because of the presence of
  lexicon: HALOT
  rationale: The idiom literally means 'from before the face/presence of,' but in
    English poetry 'before' naturally conveys presence without overloading the line.
    The fuller sense is preserved in the footnote as an alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the project's stated policy for יְהוָה.
- source_word: זֶה
  chosen: this
  alternatives:
  - even
  - namely
  - that
  lexicon: HALOT
  rationale: 'The demonstrative is abrupt and poetic: ''this Sinai.'' Retaining ''this''
    preserves the Hebrew''s force and deixis better than smoothing it into ''even
    Sinai'' or ''Mount Sinai.'''
- source_word: סִינַי
  chosen: Sinai
  alternatives:
  - Mount Sinai
  lexicon: HALOT
  rationale: The Hebrew text simply has the proper name 'Sinai' without 'mount.' English
    can naturally supply the sense without adding a word not present in the source.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: The construct phrase identifies the LORD covenantally as Israel's God.
    Including 'the' yields natural English while preserving the appositional identification.
