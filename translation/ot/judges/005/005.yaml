theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrine
    and contested-terms table, it is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Poetic theophany imagery in נָזְלוּ
  chosen_reading: The mountains flowed down
  alternative_readings:
  - The mountains melted
  - The mountains quaked
  rationale: The text depicts creation's response to the LORD's presence in poetic
    imagery. 'Flowed down' preserves the lexical image without flattening it into
    a purely interpretive paraphrase such as 'quaked.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; preserve source text''s plain sense'
