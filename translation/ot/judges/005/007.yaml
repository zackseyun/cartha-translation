theological_decisions:
- issue: Metaphorical force of Deborah's self-description אֵם בְּיִשְׂרָאֵל
  chosen_reading: Deborah describes herself as arising 'as a mother in Israel,' a
    metaphor for protective, nurturing leadership within Israel.
  alternative_readings:
  - '''mother of Israel'' as a stronger titular rendering'
  - strictly literal maternal language without explanatory nuance
  rationale: The Hebrew says 'mother in Israel,' not 'mother of Israel.' Retaining
    'in Israel' preserves the source wording and avoids overstating the title while
    still allowing the metaphorical leadership sense to be heard.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
