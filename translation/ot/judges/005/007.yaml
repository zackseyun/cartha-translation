id: JDG.5.7
reference: Judges 5:7
source:
  edition: WLC
  text: חָדְל֧וּ פְרָז֛וֹן בְּ/יִשְׂרָאֵ֖ל חָדֵ֑לּוּ עַ֤ד שַׁ/קַּ֨מְתִּי֙ דְּבוֹרָ֔ה
    שַׁ/קַּ֥מְתִּי אֵ֖ם בְּ/יִשְׂרָאֵֽל׃
translation:
  text: Village life ceased in Israel; it ceased until I, Deborah, arose—until I arose
    as a mother in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the villagers ceased in Israel,' or 'the rural population ceased in
      Israel.' The Hebrew noun is difficult and may refer to village dwellers or to
      village life more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ / חָדֵלּוּ
  chosen: ceased
  alternatives:
  - stopped
  - came to an end
  - were lacking
  lexicon: HALOT
  rationale: The repeated verb from חדל marks cessation. 'Ceased' preserves the poetic
    repetition and fits the song's lament over social collapse better than the more
    colloquial 'stopped.'
- source_word: פְרָזוֹן
  chosen: village life
  alternatives:
  - rural population
  - peasantry
  - open country
  - villages
  lexicon: HALOT
  rationale: This noun is difficult and contextually refers not merely to settlements
    as places but to unwalled rural habitation and normal life in the villages. 'Village
    life' captures the social condition implied by the term and reads naturally in
    English while preserving the sense of rural life having broken down.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב is straightforwardly locative here. 'In Israel' is
    idiomatic and suits the national setting of the song.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the time when
  lexicon: HALOT
  rationale: 'Marks the turning point in the poem: the prior condition lasted until
    Deborah''s arising.'
- source_word: שַׁקַּמְתִּי
  chosen: I arose
  alternatives:
  - I rose up
  - I stood up
  lexicon: HALOT
  rationale: From קום, the verb denotes arising in the sense of stepping forward to
    act. 'I arose' preserves the elevated poetic tone and the repeated first-person
    emphasis.
- source_word: דְּבוֹרָה
  chosen: Deborah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֵם
  chosen: a mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: 'The noun is metaphorical or honorific, expressing Deborah''s protective
    and leadership role toward Israel. The indefinite article in English is natural:
    she arose ''as a mother'' in Israel, not as Israel''s literal biological mother.'
