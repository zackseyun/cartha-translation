id: JDG.2.4
reference: Judges 2:4
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/דַבֵּ֞ר מַלְאַ֤ךְ יְהוָה֙ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה אֶֽל
    כָּל בְּנֵ֖י יִשְׂרָאֵ֑ל וַ/יִּשְׂא֥וּ הָ/עָ֛ם אֶת קוֹלָ֖/ם וַ/יִּבְכּֽוּ־־־־׃
translation:
  text: And when the angel of the LORD spoke these words to all the sons of Israel,
    the people raised their voices and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the Israelites'; literally, 'to all the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּדַבֵּר
  chosen: And when ... spoke
  alternatives:
  - And it happened, when ... spoke
  - Now when ... spoke
  lexicon: HALOT
  rationale: The waw-consecutive of היה with the infinitive construct of דבר introduces
    a temporal clause. In idiomatic modern English, 'And when ... spoke' conveys the
    narrative progression without the wooden 'and it happened.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel.' In this narrative and in established
    biblical usage for מַלְאַךְ יְהוָה, 'angel' is the most natural rendering in English.
    יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: דְּבָרִים commonly means 'words' or 'matters.' Here the referent is the
    speech just delivered, so 'these words' preserves the verbal focus more closely
    than 'these things.'
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - to all the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per the gender-accurate
    guideline, the masculine form is preserved in the main text rather than neutralized
    to 'Israelites,' though that remains a viable idiomatic alternative.
- source_word: וַיִּשְׂאוּ ... אֶת קוֹלָם
  chosen: the people raised their voices
  alternatives:
  - the people lifted up their voice
  - the people raised their voice
  lexicon: HALOT
  rationale: The Hebrew idiom 'lift/raise the voice' means to cry out audibly. 'Raised
    their voices' is natural modern English and preserves the plural suffix on קוֹלָם
    better than singular 'voice' in English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: In this context עָם refers to the gathered Israelite populace, best rendered
    'the people.'
- source_word: וַיִּבְכּוּ
  chosen: and wept
  alternatives:
  - and cried
  - and wept aloud
  lexicon: HALOT
  rationale: בכה straightforwardly means 'weep' or 'cry.' 'Wept' fits the solemn tone
    and avoids adding intensity not explicit in the verb alone.
