id: JDG.2.3
reference: Judges 2:3
source:
  edition: WLC
  text: וְ/גַ֣ם אָמַ֔רְתִּי לֹֽא אֲגָרֵ֥שׁ אוֹתָ֖/ם מִ/פְּנֵי/כֶ֑ם וְ/הָי֤וּ לָ/כֶם֙
    לְ/צִדִּ֔ים וֵ/אלֹ֣הֵי/הֶ֔ם יִהְי֥וּ לָ/כֶ֖ם לְ/מוֹקֵֽשׁ־׃
translation:
  text: So I also said, ‘I will not drive them out from before you; they will become
    sides against you, and their gods will become a snare to you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sides.' Some ancient versions and parallel passages read or interpret
      this as 'thorns in your sides.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: So I also
  alternatives:
  - And also
  - Moreover I also
  lexicon: HALOT
  rationale: The conjunction plus adverb links this statement to the preceding rebuke
    and adds emphasis. 'So I also' captures both continuation and consequential force
    in natural English.
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - have said
  - declared
  lexicon: HALOT
  rationale: Simple past fits the narrative setting. 'Declared' is possible but 'said'
    better matches the common verb without overstating formality.
- source_word: לֹא אֲגָרֵשׁ
  chosen: I will not drive them out
  alternatives:
  - I will not expel them
  - I will not dispossess them
  lexicon: HALOT
  rationale: גרש commonly means drive out/expel. 'Drive them out' is idiomatic and
    matches the conquest context.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - from your presence
  - from before your face
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'from before you.' Retaining 'from before
    you' preserves the spatial and covenantal-conquest sense better than the more
    abstract 'from your presence.'
- source_word: וְהָיוּ לָכֶם
  chosen: they will become
  alternatives:
  - they will be
  - they will remain for you as
  lexicon: HALOT
  rationale: English requires a smoother predicate construction. 'Become' brings out
    the future-result sense in context.
- source_word: לְצִדִּים
  chosen: sides against you
  alternatives:
  - adversaries
  - thorns in your sides
  - opponents
  lexicon: HALOT
  rationale: The consonantal text reads 'sides.' This difficult reading is preserved
    in the main text rather than harmonized to the more familiar 'thorns in your sides'
    from some ancient versions and parallels. 'Sides against you' makes the metaphor
    intelligible while staying close to the Hebrew.
- source_word: וֵאלֹהֵיהֶם
  chosen: and their gods
  alternatives:
  - and their god-objects
  lexicon: HALOT
  rationale: Standard rendering of אלהים with 3mp suffix in this idolatry context.
- source_word: יִהְיוּ לָכֶם לְמוֹקֵשׁ
  chosen: will become a snare to you
  alternatives:
  - will be a trap to you
  - will become a stumbling trap to you
  lexicon: HALOT
  rationale: מוקש denotes a snare/trap, often metaphorically for enticement into sin.
    'Snare' preserves the metaphor and its moral danger.
