theological_decisions:
- issue: Retention of the difficult Masoretic reading לְצִדִּים
  chosen_reading: sides against you
  alternative_readings:
  - thorns in your sides
  - adversaries
  rationale: The Hebrew text as given reads 'sides,' not 'thorns.' Because the source
    text is primary, the main text preserves the MT rather than importing the smoother
    rendering known from ancient versions and from similar passages (e.g., Num 33:55).
    The likely sense is hostile pressure or affliction at Israel's side; an explanatory
    footnote preserves the traditional alternative.
  doctrine_reference: Translation philosophy §1, §3, §5
