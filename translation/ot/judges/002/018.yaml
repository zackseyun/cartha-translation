id: JDG.2.18
reference: Judges 2:18
source:
  edition: WLC
  text: וְ/כִֽי הֵקִ֨ים יְהוָ֥ה לָ/הֶם֮ שֹֽׁפְטִים֒ וְ/הָיָ֤ה יְהוָה֙ עִם הַ/שֹּׁפֵ֔ט וְ/הֽוֹשִׁיעָ/ם֙ מִ/יַּ֣ד אֹֽיְבֵי/הֶ֔ם כֹּ֖ל יְמֵ֣י הַ/שּׁוֹפֵ֑ט כִּֽי יִנָּחֵ֤ם יְהוָה֙ מִ/נַּֽאֲקָתָ֔/ם מִ/פְּנֵ֥י לֹחֲצֵי/הֶ֖ם וְ/דֹחֲקֵי/הֶֽם־׀־־׃
translation:
  text: Whenever Yahweh raised up judges for them, Yahweh was with the judge and saved them from the hand of their enemies all the days of the judge, for Yahweh was moved to pity by their groaning because of those who oppressed and afflicted them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD relented' or 'the LORD had compassion'; the Hebrew verb can express a change of disposition or compassionate response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: Whenever
  alternatives:
  - And when
  - For when
  lexicon: HALOT
  rationale: In this recurring/habitual context within the narrative summary, the conjunction plus כי is best rendered temporally as 'whenever,' expressing repeated action rather than a single event.
- source_word: הֵקִים
  chosen: raised up
  alternatives:
  - appointed
  - caused to arise
  lexicon: HALOT
  rationale: The idiom with leaders/judges commonly means 'raised up,' preserving both divine initiative and the Hebrew verbal imagery.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁפְטִים
  chosen: judges
  alternatives:
  - leaders
  - deliverers
  lexicon: HALOT
  rationale: Although these figures do more than judicial work, 'judges' is the established and contextually accurate rendering of שפטים in Judges; their deliverer role is expressed separately by the following verb.
- source_word: וְהָיָה יְהוָה עִם הַשֹּׁפֵט
  chosen: the LORD was with the judge
  alternatives:
  - the LORD came to be with the judge
  lexicon: HALOT
  rationale: A straightforward rendering of the clause; 'was with' communicates divine presence and support without over-interpretation.
- source_word: וְהוֹשִׁיעָם
  chosen: saved them
  alternatives:
  - delivered them
  - gave them victory
  lexicon: HALOT
  rationale: The Hiphil of ישׁע here denotes rescue/deliverance. 'Saved' is concise and faithful, while the following phrase specifies rescue from enemies. 'Delivered' is a viable alternative but not necessary in the main text.
- source_word: מִיַּד אֹיְבֵיהֶם
  chosen: from the hand of their enemies
  alternatives:
  - from the power of their enemies
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' is preserved because it remains intelligible in modern English and retains the concrete force of hostile power/control.
- source_word: כֹּל יְמֵי הַשֹּׁפֵט
  chosen: all the days of the judge
  alternatives:
  - throughout the judge's lifetime
  - as long as the judge lived
  lexicon: HALOT
  rationale: 'This is a formally close rendering. It preserves the repeated formula and leaves implicit what the context makes clear: the period of that judge''s tenure/life.'
- source_word: יִנָּחֵם
  chosen: was moved to pity
  alternatives:
  - relented
  - had compassion
  - was sorry
  lexicon: HALOT
  rationale: The Niphal of נחם here expresses a divine response of compassion in view of Israel's suffering. 'Was moved to pity' communicates the affective sense without implying moral error in God; 'relented' could suggest reversal of announced judgment, which is not the main emphasis here.
- source_word: מִנַּאֲקָתָם
  chosen: by their groaning
  alternatives:
  - because of their groaning
  - from their groaning
  lexicon: HALOT
  rationale: The preposition marks the occasion or cause of the LORD's compassionate response. 'By their groaning' is natural English and keeps the causal connection.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: 'In this context the phrase indicates cause: their groaning arose because of their oppressors.'
- source_word: לֹחֲצֵיהֶם
  chosen: those who oppressed
  alternatives:
  - their oppressors
  lexicon: HALOT
  rationale: The participle denotes active oppressors. Rendering it verbally in relation to the next participle produces smoother English while preserving the sense.
- source_word: וְדֹחֲקֵיהֶם
  chosen: and afflicted
  alternatives:
  - and harassed
  - and pressed hard
  lexicon: HALOT
  rationale: This participle is close in sense to the previous one but adds the idea of pressing/crushing. 'Afflicted' differentiates it enough in English without becoming awkwardly literal.
