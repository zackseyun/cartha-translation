theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Anthropopathic language in יִנָּחֵם יְהוָה
  chosen_reading: Yahweh was moved to pity
  alternative_readings:
  - the LORD relented
  - the LORD repented
  - the LORD had compassion
  rationale: The Hebrew presents God's responsive compassion in anthropopathic terms. 'Was moved to pity' preserves the emotional force while avoiding the misleading implication that God repented of wrongdoing. This maintains theological tension without flattening the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
