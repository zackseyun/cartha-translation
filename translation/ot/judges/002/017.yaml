theological_decisions:
- issue: Metaphor of covenant unfaithfulness in זָנוּ
  chosen_reading: Retain the sexual-infidelity metaphor with 'prostituted themselves'
    rather than flattening to 'were unfaithful.'
  alternative_readings:
  - were unfaithful
  - played the prostitute
  rationale: The Hebrew intentionally uses a morally charged metaphor for idolatry.
    Preserving it maintains the theological force of covenant betrayal without resorting
    to archaic diction.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the Tetragrammaton in the doctrine
    excerpt.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
