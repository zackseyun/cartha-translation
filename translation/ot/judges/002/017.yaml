id: JDG.2.17
reference: Judges 2:17
source:
  edition: WLC
  text: וְ/גַ֤ם אֶל שֹֽׁפְטֵי/הֶם֙ לֹ֣א שָׁמֵ֔עוּ כִּ֣י זָנ֗וּ אַֽחֲרֵי֙ אֱלֹהִ֣ים
    אֲחֵרִ֔ים וַ/יִּֽשְׁתַּחֲו֖וּ לָ/הֶ֑ם סָ֣רוּ מַהֵ֗ר מִן הַ/דֶּ֜רֶךְ אֲשֶׁ֨ר הָלְכ֧וּ
    אֲבוֹתָ֛/ם לִ/שְׁמֹ֥עַ מִצְוֺת יְהוָ֖ה לֹא עָ֥שׂוּ כֵֽן־־־־׃
translation:
  text: Yet they did not listen even to their judges, for they prostituted themselves
    after other gods and bowed down to them. They quickly turned aside from the way
    in which their fathers had walked, to obey the commandments of the LORD; they
    did not do so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they played the prostitute after other gods.' The Hebrew uses a sexual-infidelity
      metaphor for idolatry and covenant unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet ... even
  alternatives:
  - And also
  - But even
  lexicon: HALOT
  rationale: The combination adds emphasis and mild contrast with the preceding context.
    'Yet ... even' captures both the adversative flow and the intensifying force before
    'their judges.'
- source_word: אֶל שֹׁפְטֵיהֶם לֹא שָׁמֵעוּ
  chosen: they did not listen even to their judges
  alternatives:
  - they did not obey their judges
  - they did not listen to their judges either
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' in the sense of heed. 'Listen'
    preserves the Hebrew idiom while still implying refusal to obey in context.
- source_word: שֹׁפְטֵיהֶם
  chosen: their judges
  alternatives:
  - their leaders
  lexicon: HALOT
  rationale: The noun specifically refers to the judges raised up in this period,
    so the historical term should be retained rather than generalized.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for their refusal. 'For' fits the narrative style
    and keeps the clause tightly connected.
- source_word: זָנוּ אַחֲרֵי
  chosen: they prostituted themselves after
  alternatives:
  - they whored after
  - they played the prostitute after
  - they were unfaithful to by going after
  lexicon: HALOT
  rationale: זנה is a strong metaphor of sexual infidelity used for covenant unfaithfulness.
    'Prostituted themselves' preserves the force without archaic 'whored.' 'After'
    retains the Hebrew idiom of pursuit.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the LORD. 'Other
    gods' is the standard and most direct rendering.
- source_word: וַיִּשְׁתַּחֲווּ לָהֶם
  chosen: and bowed down to them
  alternatives:
  - and worshiped them
  - and prostrated themselves before them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down to them' preserves
    the physical image that implies worship.
- source_word: סָרוּ מַהֵר
  chosen: They quickly turned aside
  alternatives:
  - They soon turned away
  - They quickly departed
  lexicon: HALOT
  rationale: סור conveys turning aside/departing from a path; מַהֵר adds speed. This
    rendering preserves the path metaphor and urgency.
- source_word: מִן הַדֶּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  lexicon: HALOT
  rationale: A common metaphor for covenantal conduct. 'Way' is idiomatic and biblically
    resonant in English.
- source_word: אֲשֶׁר הָלְכוּ אֲבוֹתָם
  chosen: in which their fathers had walked
  alternatives:
  - that their fathers walked in
  - which their fathers followed
  lexicon: HALOT
  rationale: Keeps the walking metaphor and reflects the relative clause naturally
    in English. 'Fathers' is retained as gender-accurate and source-matching.
- source_word: לִשְׁמֹעַ מִצְוֺת יְהוָה
  chosen: to obey the commandments of the LORD
  alternatives:
  - to listen to the commandments of the LORD
  - in obeying the commandments of the LORD
  lexicon: HALOT
  rationale: Here שׁמע with 'commandments' is best expressed as 'obey.' יְהוָה follows
    the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לֹא עָשׂוּ כֵן
  chosen: they did not do so
  alternatives:
  - they did not do likewise
  - not so did they do
  lexicon: HALOT
  rationale: A concise English rendering of the summarizing clause. It refers back
    to the fathers' obedient pattern and avoids awkward literalism.
