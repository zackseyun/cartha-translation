id: JDG.2.6
reference: Judges 2:6
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֥ח יְהוֹשֻׁ֖עַ אֶת הָ/עָ֑ם וַ/יֵּלְכ֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אִ֥ישׁ
    לְ/נַחֲלָת֖/וֹ לָ/רֶ֥שֶׁת אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: When Joshua sent the people away, the sons of Israel went, each man to his
    inheritance, to take possession of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent ... away
  alternatives:
  - dismissed
  - let ... go
  lexicon: HALOT
  rationale: The verb שׁלח in this context means to send people away or dismiss them.
    'Sent ... away' is natural English and preserves the causative sense better than
    a bare 'sent.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the assembly
  lexicon: HALOT
  rationale: The Hebrew simply says 'the people.' Although the referent is Israel,
    the explicit noun should be preserved without expansion in the main text.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate philosophy, the masculine plural construct is
    retained as 'sons of Israel' rather than neutralizing to 'Israelites.' This also
    preserves the formal link to the Hebrew idiom.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive singular איש marks individual distribution. 'Each man'
    preserves both the distributive force and the masculine form better than the more
    neutral 'each one.'
- source_word: לְנַחֲלָתוֹ
  chosen: to his inheritance
  alternatives:
  - to his allotted inheritance
  - to his possession
  lexicon: HALOT
  rationale: נחלה commonly denotes an inherited allotment, especially tribal land
    in Israel. 'Inheritance' preserves the covenantal-land nuance better than the
    flatter 'possession.'
- source_word: לָרֶשֶׁת
  chosen: to take possession of
  alternatives:
  - to possess
  - to inherit
  lexicon: HALOT
  rationale: 'The infinitive of ירשׁ here expresses the purpose of going to their
    inheritances: to occupy/possess the land. ''Take possession of'' is idiomatic
    and captures the active sense.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this conquest-settlement context, ארץ refers specifically to the land
    of Canaan allotted to Israel, so 'the land' is the most contextually accurate
    rendering.
