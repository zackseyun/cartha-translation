theological_decisions:
- issue: Gendered covenantal designation
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The translation follows the project's gender-accurate policy by preserving
    the masculine form where the Hebrew uses it, while recognizing that the phrase
    refers corporately to Israel as a whole.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Land-allotment terminology
  chosen_reading: inheritance
  alternative_readings:
  - possession
  - allotment
  rationale: Using 'inheritance' preserves the theological and covenantal resonance
    of Israel's land grant rather than reducing it to mere property language.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #5'
