id: JDG.2.9
reference: Judges 2:9
source:
  edition: WLC
  text: וַ/יִּקְבְּר֤וּ אוֹת/וֹ֙ בִּ/גְב֣וּל נַחֲלָת֔/וֹ בְּ/תִמְנַת חֶ֖רֶס בְּ/הַ֣ר
    אֶפְרָ֑יִם מִ/צְּפ֖וֹן לְ/הַר גָּֽעַשׁ־־׃
translation:
  text: And they buried him within the territory of his inheritance, in Timnath-heres,
    in the hill country of Ephraim, north of Mount Gaash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Joshua 24:30 reads 'Timnath-serah' instead of 'Timnath-heres.' The difference
      is preserved here as a place-name variation in parallel burial notices.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: And they buried
  alternatives:
  - And they buried him
  - Then they buried
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative with a past-tense event. English includes
    'And' naturally for narrative continuity. The object is expressed separately by
    אוֹתוֹ, so 'him' is not repeated here in the gloss field.
- source_word: אוֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object marker with 3ms suffix, referring to Joshua in context;
    rendered explicitly as the English object pronoun.
- source_word: בִּגְבוּל
  chosen: within the territory of
  alternatives:
  - in the border of
  - within the bounds of
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this burial-location
    context, 'within the territory of' communicates location in a landed allotment
    more idiomatically than the more wooden 'in the border of.'
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his allotted inheritance
  - his possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inherited possession or allotted inheritance
    in the land. 'His inheritance' preserves the covenant-land nuance without overexpansion.
- source_word: בְּתִמְנַת חֶרֶס
  chosen: in Timnath-heres
  alternatives:
  - at Timnath-heres
  lexicon: HALOT
  rationale: Place name is transliterated per project philosophy. The preposition
    is rendered 'in' for natural English with a town/region name.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the hill country of the Ephraimites
  - in Mount Ephraim
  lexicon: HALOT
  rationale: הַר in this geographical expression refers to the hill country, not a
    single mountain. 'Hill country of Ephraim' is the standard and contextually accurate
    geographic rendering.
- source_word: מִצְּפוֹן
  chosen: north of
  alternatives:
  - to the north of
  - from the north of
  lexicon: HALOT
  rationale: With a place reference following, the preposition expresses relative
    location. 'North of' is concise and idiomatic.
- source_word: לְהַר גָּעַשׁ
  chosen: Mount Gaash
  alternatives:
  - the hill of Gaash
  lexicon: HALOT
  rationale: In this toponymic construction, English idiom favors 'Mount Gaash.' This
    preserves the proper-name force while remaining readable.
