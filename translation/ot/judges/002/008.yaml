id: JDG.2.8
reference: Judges 2:8
source:
  edition: WLC
  text: וַ/יָּ֛מָת יְהוֹשֻׁ֥עַ בִּן נ֖וּן עֶ֣בֶד יְהוָ֑ה בֶּן מֵאָ֥ה וָ/עֶ֖שֶׂר שָׁנִֽים־־׃
translation:
  text: And Joshua son of Nun, the servant of the LORD, died at the age of one hundred
    and ten years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the slave of the LORD.' The Hebrew word can denote either, but here
      it is used as an honorific title for Joshua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות narrates the next event in sequence. English naturally
    renders the verb as 'died'; the conjunction is carried by 'And' at the clause
    level.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, following the
    philosophy of transliterating names rather than translating them.
- source_word: בִּן נוּן
  chosen: son of Nun
  lexicon: HALOT
  rationale: Construct chain indicating parentage; 'son of Nun' is the normal and
    transparent English rendering.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave. Here it functions as an honorific
    title for Joshua in relation to YHWH, not to foreground bonded-status imagery.
    Therefore 'servant' best fits the context while preserving the title's dignity.
    יְהוָה is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  chosen: at the age of one hundred and ten years
  alternatives:
  - a son of one hundred and ten years
  - being one hundred and ten years old
  lexicon: HALOT
  rationale: The Hebrew age idiom literally uses 'son of' for age. Idiomatic modern
    English expresses this as 'at the age of one hundred and ten years,' preserving
    the numerical detail without wooden phrasing.
