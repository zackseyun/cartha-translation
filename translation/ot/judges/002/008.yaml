theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name as part of Joshua's title. Per DOCTRINE.md,
    the default rendering is 'the LORD,' following Jewish reverence tradition and
    the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֶבֶד in Joshua's title
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although the project may use 'slave' where bonded status is theologically
    salient, here עֶבֶד functions as an established honorific title ('servant of the
    LORD') for Joshua. 'Servant' preserves the title's conventional force without
    importing emphasis the context does not require.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status sensitivity
