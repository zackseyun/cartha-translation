id: JDG.2.13
reference: Judges 2:13
source:
  edition: WLC
  text: וַ/יַּעַזְב֖וּ אֶת יְהוָ֑ה וַ/יַּעַבְד֥וּ לַ/בַּ֖עַל וְ/לָ/עַשְׁתָּרֽוֹת־׃
translation:
  text: They abandoned the LORD and served Baal and the Ashtaroths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forsook the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'worshiped Baal and the Ashtaroths.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Ashtaroths,' a plural form; this may refer to multiple manifestations
      or images of the goddess also known as Ashtoreth/Astarte.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: From עזב, meaning to leave, forsake, or abandon. 'Abandoned' is clear
    modern English and conveys covenantal disloyalty without archaic tone; 'forsook'
    is traditional but less natural for contemporary readers.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for יְהוָה, rendered 'the LORD' to reflect established
    reverential convention and the pattern followed in many English translations and
    the Septuagintal tradition.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: From עבד, which can denote serving or worshiping in cultic contexts.
    'Served' preserves the broader semantic range and reflects the Hebrew verb directly;
    the religious sense is clear from the objects Baal and the Ashtaroths.
- source_word: לַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew has the article, in English the proper name is most
    naturally rendered simply 'Baal.' Retaining 'the Baal' would sound awkward and
    may over-literalize the article. The phrase refers to the deity/deity-type associated
    with Baal worship.
- source_word: וְלָעַשְׁתָּרוֹת
  chosen: the Ashtaroths
  alternatives:
  - the Ashtoreths
  - Ashtaroth
  - the Astartes
  lexicon: HALOT
  rationale: The plural form עשתרות is best represented by 'the Ashtaroths,' preserving
    the Hebrew plural and likely referring either to multiple local manifestations/images
    of the goddess or to the class of fertility goddesses associated with Ashtoreth/Astarte.
    This avoids flattening the plural into a singular proper name.
