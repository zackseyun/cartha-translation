theological_decisions:
- issue: Rendering the plural עשתרות
  chosen_reading: the Ashtaroths
  alternative_readings:
  - Ashtoreth
  - the Ashtoreths
  - Astarte
  rationale: The Hebrew form is morphologically plural, so the main text preserves
    that plurality rather than resolving it into a singular goddess name. This maintains
    the text's likely polemical force against multiple manifestations or cultic representations
    of the goddess.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cultic nuance of עבד with pagan deities
  chosen_reading: served
  alternative_readings:
  - worshiped
  rationale: Using 'served' preserves the lexical breadth of the Hebrew while still
    allowing the religious sense to be inferred from context. This avoids importing
    a narrower interpretive gloss where the source text itself uses the broader verb.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy'
