theological_decisions:
- issue: Anthropopathic language for divine wrath
  chosen_reading: Then the anger of the LORD burned against Israel
  alternative_readings:
  - Then the LORD became angry with Israel
  rationale: The Hebrew uses vivid anthropopathic imagery. Preserving 'anger ... burned' maintains the text's force without importing speculative theology beyond the idiom.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants.'
