id: JDG.2.14
reference: Judges 2:14
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף יְהוָה֙ בְּ/יִשְׂרָאֵ֔ל וַֽ/יִּתְּנֵ/ם֙ בְּ/יַד שֹׁסִ֔ים וַ/יָּשֹׁ֖סּוּ אוֹתָ֑/ם וַֽ/יִּמְכְּרֵ֞/ם בְּ/יַ֤ד אֽוֹיְבֵי/הֶם֙ מִ/סָּבִ֔יב וְ/לֹֽא יָכְל֣וּ ע֔וֹד לַ/עֲמֹ֖ד לִ/פְנֵ֥י אוֹיְבֵי/הֶֽם־־־׃
translation:
  text: Then the anger of Yahweh burned against Israel, and he gave them into the hand of plunderers, who plundered them. He sold them into the hand of their enemies all around, so that they could no longer stand before their enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the anger of the LORD was kindled against Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of,' an idiom meaning into the power of.
    reason: cultural_note
  - marker: c
    text: Or 'their enemies on every side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - the anger ... was kindled
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger burning. 'The anger ... burned' preserves the Hebrew metaphor with natural English, avoiding over-paraphrase while remaining readable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתְּנֵם בְּיַד
  chosen: he gave them into the hand of
  alternatives:
  - he handed them over to
  - he delivered them into the power of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for delivering someone into another's power. 'Into the hand of' preserves the idiom and remains intelligible in English.
- source_word: שֹׁסִים
  chosen: plunderers
  alternatives:
  - raiders
  - spoilers
  lexicon: HALOT
  rationale: The participle denotes those who despoil or pillage. 'Plunderers' matches the following cognate verb and preserves the lexical connection.
- source_word: וַיָּשֹׁסּוּ
  chosen: who plundered them
  alternatives:
  - and they plundered them
  - and they despoiled them
  lexicon: HALOT
  rationale: Rendered with a relative clause in English to connect naturally with 'plunderers' while preserving the cognate verbal force of the Hebrew.
- source_word: וַיִּמְכְּרֵם
  chosen: He sold them
  alternatives:
  - he gave them over
  - he delivered them
  lexicon: HALOT
  rationale: The verb is literally 'sell.' Retaining 'sold' preserves the severity of covenant judgment and the source text's concrete imagery.
- source_word: אֹיְבֵיהֶם מִסָּבִיב
  chosen: their enemies all around
  alternatives:
  - their surrounding enemies
  - their enemies on every side
  lexicon: HALOT
  rationale: '''All around'' is a natural rendering of the adverbial phrase and conveys encirclement without sounding archaic.'
- source_word: וְלֹא יָכְלוּ עוֹד לַעֲמֹד לִפְנֵי
  chosen: so that they could no longer stand before
  alternatives:
  - and they were no longer able to stand against
  - and they could no longer withstand
  lexicon: HALOT
  rationale: The phrase means being unable to hold one's ground before an opponent. 'Stand before' is close to the Hebrew and idiomatic enough in context.
