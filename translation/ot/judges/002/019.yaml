id: JDG.2.19
reference: Judges 2:19
source:
  edition: WLC
  text: וְ/הָיָ֣ה בְּ/מ֣וֹת הַ/שּׁוֹפֵ֗ט יָשֻׁ֨בוּ֙ וְ/הִשְׁחִ֣יתוּ מֵֽ/אֲבוֹתָ֔/ם
    לָ/לֶ֗כֶת אַֽחֲרֵי֙ אֱלֹהִ֣ים אֲחֵרִ֔ים לְ/עָבְדָ֖/ם וּ/לְ/הִשְׁתַּחֲוֺ֣ת לָ/הֶ֑ם
    לֹ֤א הִפִּ֨ילוּ֙ מִ/מַּ֣עַלְלֵי/הֶ֔ם וּ/מִ/דַּרְכָּ֖/ם הַ/קָּשָֽׁה׀׃
translation:
  text: And when the judge died, they turned back and acted more corruptly than their
    fathers, going after other gods to serve them and to bow down to them. They did
    not drop any of their deeds or their stubborn way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They did not abandon any of their practices or their stubborn way.'
      The Hebrew literally says they 'did not drop' them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בְּמוֹת
  chosen: And when ... died
  alternatives:
  - And it happened when ... died
  - Now when ... died
  lexicon: HALOT
  rationale: The Hebrew narrative formula וְהָיָה + temporal infinitive/construct
    is idiomatically rendered in English as a temporal clause. 'And when' preserves
    the sequence without woodenly reproducing the formula.
- source_word: הַשּׁוֹפֵט
  chosen: the judge
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: In Judges, שֹׁפֵט refers to the divinely raised deliverer/judge. 'Judge'
    preserves the book's terminology and historical-literary setting better than broader
    alternatives.
- source_word: יָשֻׁבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they turned again
  lexicon: HALOT
  rationale: שׁוּב here marks relapse after temporary reform under the judge. 'Turned
    back' clearly conveys reversion to prior behavior.
- source_word: וְהִשְׁחִיתוּ
  chosen: acted more corruptly
  alternatives:
  - corrupted themselves more
  - became more corrupt
  - acted corruptly
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here expresses corrupt behavior, and the comparison
    with 'their fathers' implies worsening. 'Acted more corruptly' is natural English
    and preserves the moral sense.
- source_word: מֵאֲבוֹתָם
  chosen: than their fathers
  alternatives:
  - more than their fathers
  - than their ancestors
  lexicon: HALOT
  rationale: The comparative sense after the corruption verb is best brought out with
    'than their fathers.' 'Fathers' is retained as the direct lexical equivalent;
    in context it refers to prior generations.
- source_word: לָלֶכֶת אַחֲרֵי
  chosen: going after
  alternatives:
  - to go after
  - following after
  lexicon: HALOT
  rationale: This infinitive phrase explains the manner/content of their corruption.
    'Going after' is idiomatic in English for pursuing other gods and preserves the
    metaphor of allegiance.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The plain sense is 'other gods.' 'Foreign gods' is interpretive and narrower;
    the Hebrew emphasizes otherness in contrast to the LORD.
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד in relation to deities often includes worshipful service, but 'serve'
    is the more direct lexical equivalent and allows the following verb for prostration
    to retain its distinct force.
- source_word: וּלְהִשְׁתַּחֲוֹת לָהֶם
  chosen: and to bow down to them
  alternatives:
  - and to worship them
  - and to prostrate themselves before them
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה literally denotes bowing/prostration in homage. 'Bow down
    to them' preserves the physical and cultic nuance better than the more generalized
    'worship.'
- source_word: לֹא הִפִּילוּ
  chosen: They did not drop
  alternatives:
  - They did not abandon
  - They did not let go of
  - They did not cease from
  lexicon: HALOT
  rationale: The Hiphil of נפל with מן can mean to let something fall away or drop
    off. 'Did not drop' is vivid and close to the Hebrew image, though idiomatically
    it means they did not give up these practices.
- source_word: מִמַּעַלְלֵיהֶם
  chosen: any of their deeds
  alternatives:
  - their practices
  - their actions
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds/acts, often with moral coloring. 'Deeds' is
    concise and sufficiently broad; 'any of' is supplied in English to clarify the
    negated idiom.
- source_word: וּמִדַּרְכָּם הַקָּשָׁה
  chosen: or their stubborn way
  alternatives:
  - or their hard way
  - or their stubborn path
  - or their obstinate conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ is commonly metaphorical for manner of life. קָשֶׁה here describes
    hardness/stubbornness rather than physical difficulty. 'Stubborn way' communicates
    the moral obstinacy of the phrase in natural English.
