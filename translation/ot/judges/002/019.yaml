theological_decisions:
- issue: Rendering of אֱלֹהִים אֲחֵרִים in a polytheistic context
  chosen_reading: other gods
  alternative_readings:
  - foreign gods
  rationale: The text describes Israel's apostasy by following deities other than
    the LORD. 'Other gods' preserves the covenantal contrast without importing additional
    ethnic nuance.
