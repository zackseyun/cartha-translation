theological_decisions:
- issue: Rendering of divine opposition in covenant judgment
  chosen_reading: the hand of the LORD was against them for harm
  alternative_readings:
  - the hand of the LORD was against them for evil
  - the hand of the LORD brought disaster on them
  rationale: 'The verse depicts covenantal judgment by the LORD in response to Israel''s
    apostasy. ''For harm'' communicates punitive calamity without suggesting that
    God commits moral evil. This preserves the text''s theological tension: the LORD
    actively judges, yet the wording should not import a claim beyond the Hebrew idiom.'
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    rendered as 'the LORD' per contested terms.
