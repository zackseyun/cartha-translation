id: JDG.2.15
reference: Judges 2:15
source:
  edition: WLC
  text: בְּ/כֹ֣ל אֲשֶׁ֣ר יָצְא֗וּ יַד יְהוָה֙ הָיְתָה בָּ֣/ם לְ/רָעָ֔ה כַּֽ/אֲשֶׁר֙
    דִּבֶּ֣ר יְהוָ֔ה וְ/כַ/אֲשֶׁ֛ר נִשְׁבַּ֥ע יְהוָ֖ה לָ/הֶ֑ם וַ/יֵּ֥צֶר לָ/הֶ֖ם מְאֹֽד׀־־׃
translation:
  text: Wherever they went out, the hand of the LORD was against them for harm, just
    as the LORD had spoken and just as the LORD had sworn to them, and they were greatly
    distressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whenever they went out,' possibly with the sense of going out to battle
      or on campaign.
    reason: lexical_alternative
  - marker: b
    text: Or 'for disaster' or 'for evil'; the Hebrew רָעָה here refers to calamity
      or harm, not necessarily moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹל אֲשֶׁר יָצְאוּ
  chosen: Wherever they went out
  alternatives:
  - In all that they went out
  - Whenever they marched out
  lexicon: HALOT
  rationale: The idiom בְּכֹל אֲשֶׁר + יצא conveys the circumstances of all their
    ventures/expeditions. 'Wherever they went out' is natural English and preserves
    the broad scope without over-specifying military action, though the context includes
    conflict.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: A common Hebrew anthropomorphic idiom for active power or intervention.
    Retaining 'hand' preserves the metaphor and theological force of divine agency.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD'.
- source_word: הָיְתָה בָם לְרָעָה
  chosen: was against them for harm
  alternatives:
  - was against them for evil
  - was upon them for disaster
  lexicon: HALOT
  rationale: The phrase indicates hostile divine action resulting in calamity. 'For
    harm' avoids importing moral evil into רָעָה while preserving the adverse sense.
    'Against them' makes explicit the relational force of בָם in context.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD had spoken
  alternatives:
  - as the LORD had said
  - just as the LORD said
  lexicon: HALOT
  rationale: The perfect verb refers back to prior divine warning/promise. 'Had spoken'
    fits the retrospective sense and keeps the formal connection to God's prior word.
- source_word: וְכַאֲשֶׁר נִשְׁבַּע יְהוָה לָהֶם
  chosen: and just as the LORD had sworn to them
  alternatives:
  - and as the LORD had sworn to them
  - and just as the LORD had sworn concerning them
  lexicon: HALOT
  rationale: נשבע + ל marks an oath directed to them. 'Sworn to them' is the most
    straightforward rendering, even though in English the content of the oath is not
    restated here.
- source_word: וַיֵּצֶר לָהֶם מְאֹד
  chosen: and they were greatly distressed
  alternatives:
  - and it was very distressing to them
  - and they were in severe distress
  lexicon: HALOT
  rationale: From צרר/יצר in this form, the clause expresses severe distress experienced
    by Israel. Rendering with an English passive-like result clause communicates the
    idiomatic sense clearly. 'Greatly distressed' preserves מְאֹד.
