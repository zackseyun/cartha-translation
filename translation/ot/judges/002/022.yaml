theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered ancestral term אֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew is explicitly masculine plural and refers to the forefathers
    of Israel. Per gender-accurate policy, the masculine term is preserved rather
    than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
