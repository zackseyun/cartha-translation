id: JDG.2.22
reference: Judges 2:22
source:
  edition: WLC
  text: לְמַ֛עַן נַסּ֥וֹת בָּ֖/ם אֶת יִשְׂרָאֵ֑ל הֲ/שֹׁמְרִ֣ים הֵם֩ אֶת דֶּ֨רֶךְ יְהוָ֜ה לָ/לֶ֣כֶת בָּ֗/ם כַּ/אֲשֶׁ֛ר שָׁמְר֥וּ אֲבוֹתָ֖/ם אִם לֹֽא־־־׃
translation:
  text: in order to test Israel by them, whether they would keep the way of Yahweh by walking in it, as their fathers kept it, or not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through them' for 'by them.' The Hebrew pronoun refers to the nations left in the land (see the preceding context).
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose/result. 'In order to' is natural modern English and preserves the purposive force.
- source_word: נַסּוֹת
  chosen: to test
  alternatives:
  - to try
  - to prove
  lexicon: HALOT
  rationale: The infinitive of נסה here denotes proving or testing Israel through the remaining nations. 'Test' is the clearest contemporary rendering.
- source_word: בָּם
  chosen: by them
  alternatives:
  - through them
  - with them
  lexicon: HALOT
  rationale: The pronoun refers back to the remaining nations in the prior context. 'By them' preserves the instrumental sense concisely; 'through them' is possible but slightly more interpretive.
- source_word: הֲשֹׁמְרִים
  chosen: whether they would keep
  alternatives:
  - whether they are keeping
  - whether they keep
  lexicon: HALOT
  rationale: 'The interrogative with participle expresses the content of the test: whether Israel would be characterized by keeping the LORD''s way. English idiom after ''test'' is best captured by ''whether they would keep''.'
- source_word: דֶּרֶךְ יְהוָה
  chosen: the way of the LORD
  alternatives:
  - the LORD's way
  - the path of the LORD
  lexicon: HALOT
  rationale: A common biblical idiom for the manner/path commanded by YHWH. 'The way of the LORD' is both transparent and idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָלֶכֶת בָּם
  chosen: by walking in it
  alternatives:
  - to walk in it
  - to live by it
  lexicon: HALOT
  rationale: Literally 'to walk in them/it,' referring back to 'the way.' English prefers singular agreement with 'way.' 'By walking in it' preserves the infinitive's explanatory force after 'keep the way of the LORD.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the fathers' conduct. 'As' is sufficient and natural.
- source_word: שָׁמְרוּ אֲבוֹתָם
  chosen: their fathers kept it
  alternatives:
  - their fathers observed it
  - their ancestors kept it
  lexicon: HALOT
  rationale: The verb repeats שמר, creating a deliberate parallel with Israel's possible obedience. 'Fathers' is retained as the gender-accurate and contextually genealogical term, matching the Hebrew.
- source_word: אִם לֹא
  chosen: or not
  alternatives:
  - if not
  lexicon: HALOT
  rationale: In this interrogative construction, the idiomatic English completion is 'whether ... or not,' not a conditional 'if not.'
