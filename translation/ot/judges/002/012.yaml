theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. No footnote
    is required because this is the stated default rather than a per-verse contested
    ambiguity.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenantal significance of Israel's apostasy
  chosen_reading: Retain relational/covenantal language without adding interpretive
    expansion
  alternative_readings:
  - Explicitly interpret as covenant breach in the main text
  rationale: The verse itself states abandonment of the LORD, pursuit of other gods,
    bowing to them, and provoking the LORD. The translation preserves that theological
    weight through lexical choices like 'abandoned' and 'provoked ... to anger' without
    importing extra doctrinal commentary not explicit in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
