id: JDG.2.12
reference: Judges 2:12
source:
  edition: WLC
  text: וַ/יַּעַזְב֞וּ אֶת יְהוָ֣ה אֱלֹהֵ֣י אֲבוֹתָ֗/ם הַ/מּוֹצִ֣יא אוֹתָ/ם֮ מֵ/אֶ֣רֶץ מִצְרַיִם֒ וַ/יֵּלְכ֞וּ אַחֲרֵ֣י אֱלֹהִ֣ים אֲחֵרִ֗ים מֵ/אֱלֹהֵ֤י הָֽ/עַמִּים֙ אֲשֶׁר֙ סְבִיב֣וֹתֵי/הֶ֔ם וַ/יִּֽשְׁתַּחֲו֖וּ לָ/הֶ֑ם וַ/יַּכְעִ֖סוּ אֶת יְהוָֽה־׀׀־׃
translation:
  text: And they abandoned Yahweh, the God of their fathers, who had brought them out from the land of Egypt, and went after other gods, from the gods of the peoples who were around them, and bowed down to them and provoked Yahweh to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the gods of the surrounding peoples.' The Hebrew phrase may be understood more generally of the gods worshiped by the peoples around Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: The verb עזב here denotes covenantal desertion, not mere physical departure. 'Abandoned' is natural modern English and preserves the relational/covenantal force better than the more archaic 'forsook'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבוֹתָם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct phrase is most naturally rendered 'the God of their fathers.' 'Ancestors' is possible but the source is specifically masculine plural and the traditional covenantal idiom is retained.
- source_word: הַמּוֹצִיא אוֹתָם מֵאֶרֶץ מִצְרַיִם
  chosen: who had brought them out from the land of Egypt
  alternatives:
  - who brought them up out of the land of Egypt
  - the one bringing them out of the land of Egypt
  lexicon: HALOT
  rationale: The participle with article functions attributively, identifying the LORD by the exodus act. 'Had brought them out' fits the English narrative sequence after 'abandoned' while preserving the completed salvific action. 'From the land of Egypt' closely reflects the Hebrew preposition.
- source_word: וַיֵּלְכוּ אַחֲרֵי
  chosen: went after
  alternatives:
  - followed
  - walked after
  lexicon: HALOT
  rationale: A common idiom for allegiance or pursuit. 'Went after' preserves the Hebrew imagery without sounding wooden.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective means 'other.' 'Foreign gods' is interpretive and less direct here.
- source_word: מֵאֱלֹהֵי הָעַמִּים אֲשֶׁר סְבִיבוֹתֵיהֶם
  chosen: from among the gods of the peoples who were around them
  alternatives:
  - from the gods of the surrounding peoples
  - some of the gods of the peoples around them
  lexicon: HALOT
  rationale: 'The prefixed מִן is best taken partitively: they pursued other gods drawn from the gods worshiped by surrounding peoples. ''From among'' makes that relation explicit while remaining faithful to the syntax.'
- source_word: וַיִּשְׁתַּחֲווּ לָהֶם
  chosen: they bowed down to them
  alternatives:
  - they worshiped them
  - they prostrated themselves before them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration and often implies worship. 'Bowed down to them' preserves the concrete act and lets the idolatrous worship sense emerge from context.
- source_word: וַיַּכְעִסוּ אֶת יְהוָה
  chosen: provoked the LORD to anger
  alternatives:
  - angered the LORD
  - provoked the LORD
  lexicon: HALOT
  rationale: The Hiphil of כעס commonly means to provoke to anger. This fuller rendering captures the causative force more precisely than the flatter 'angered.'
