id: JDG.2.5
reference: Judges 2:5
source:
  edition: WLC
  text: וַֽ/יִּקְרְא֛וּ שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא בֹּכִ֑ים וַ/יִּזְבְּחוּ שָׁ֖ם לַֽ/יהוָֽה־־׃פ
translation:
  text: So they called the name of that place Bochim, and they sacrificed there to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bochim sounds like the Hebrew word for 'weepers' or 'those who weep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called
  alternatives:
  - they named
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא with שֵׁם commonly means 'call/name.' 'Called' preserves the Hebrew idiom, while English remains natural with the following object phrase.
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - —
  lexicon: HALOT
  rationale: Retained explicitly because the Hebrew construction is 'called the name of...' rather than simply 'named.' This slightly more formal rendering preserves source texture without becoming unnatural.
- source_word: הַמָּקוֹם הַהוּא
  chosen: that place
  alternatives:
  - the place
  lexicon: HALOT
  rationale: The demonstrative הַהוּא is significant and is best represented by 'that,' yielding the natural English phrase 'that place.'
- source_word: בֹּכִים
  chosen: Bochim
  alternatives:
  - Weepers
  - Those Who Weep
  lexicon: HALOT
  rationale: As a place name, it should be transliterated per project philosophy ('Translate titles; transliterate names'). The underlying sense is related to weeping, but the main text should preserve the proper name.
- source_word: וַיִּזְבְּחוּ
  chosen: they sacrificed
  alternatives:
  - they offered sacrifices
  lexicon: HALOT
  rationale: The verb זבח denotes sacrificing/offering sacrifice. 'They sacrificed' is concise and faithful; 'offered sacrifices' is possible but slightly more expansive than the Hebrew verb alone requires.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Straightforward locative adverb referring back to the place just named.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD' in the main text, following established reverential convention and the project's stated default.
