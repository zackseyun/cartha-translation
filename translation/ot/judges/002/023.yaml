id: JDG.2.23
reference: Judges 2:23
source:
  edition: WLC
  text: וַ/יַּנַּ֤ח יְהוָה֙ אֶת הַ/גּוֹיִ֣ם הָ/אֵ֔לֶּה לְ/בִלְתִּ֥י הוֹרִישָׁ֖/ם מַהֵ֑ר וְ/לֹ֥א נְתָנָ֖/ם בְּ/יַד יְהוֹשֻֽׁעַ־־׃פ
translation:
  text: So Yahweh left these nations, not driving them out quickly, and he did not give them into the hand of Joshua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'left these peoples'; the Hebrew verb can mean 'allowed to remain' or 'left in place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח
  chosen: left ... in place
  alternatives:
  - allowed to remain
  - left
  lexicon: HALOT
  rationale: From נוח/הניח in the causative sense of letting remain or leaving undisturbed. 'Left ... in place' makes explicit the sense that the nations were allowed to remain in the land, fitting the immediate context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' or 'peoples.' In Judges, the referent is the surrounding ethnic-national groups remaining in Canaan; 'nations' is the most natural and conventional rendering here.
- source_word: לְבִלְתִּי
  chosen: not
  alternatives:
  - so as not to
  - in order not to
  lexicon: HALOT
  rationale: Introduces a negative infinitival clause expressing result/purpose. In idiomatic English, 'not driving them out quickly' best conveys the construction without overformal wording.
- source_word: הוֹרִישָׁם
  chosen: driving them out
  alternatives:
  - dispossessing them
  - causing them to be driven out
  lexicon: HALOT
  rationale: From ירשׁ in the causative, here meaning to dispossess or drive out inhabitants from the land. 'Driving them out' is clear modern English and suits the military-land context.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - speedily
  - at once
  lexicon: HALOT
  rationale: Adverb meaning quickly or hastily. 'Quickly' is the most natural contemporary equivalent.
- source_word: וְלֹא נְתָנָם
  chosen: and he did not give them
  alternatives:
  - and he had not given them
  - nor did he hand them over
  lexicon: HALOT
  rationale: 'נתן with object plus ''into the hand of'' is a standard idiom for delivering over in battle. The wayyiqtol sequence is well rendered with simple past in English narrative: ''and he did not give them.'''
- source_word: בְּיַד יְהוֹשֻׁעַ
  chosen: into the hand of Joshua
  alternatives:
  - into Joshua's hand
  - under Joshua's power
  lexicon: HALOT
  rationale: The idiom 'into the hand of' preserves the Hebrew imagery of power/control while remaining understandable in English. Retaining the idiom is preferable here to flattening it to mere abstraction.
