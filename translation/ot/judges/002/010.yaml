theological_decisions:
- issue: Meaning of 'did not know the LORD'
  chosen_reading: Covenantal/relational ignorance is left broad in the main text
  alternative_readings:
  - they lacked personal covenant loyalty to the LORD
  - they were ignorant of the LORD's acts and identity in a more factual sense
  rationale: The Hebrew יָדַע supports both relational and experiential knowledge. The verse itself pairs not knowing the LORD with not knowing his work, so the translation preserves the tension rather than narrowing it to either mere information deficit or explicit apostasy.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms table for YHWH.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
