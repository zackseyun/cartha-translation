id: JDG.2.10
reference: Judges 2:10
source:
  edition: WLC
  text: וְ/גַם֙ כָּל הַ/דּ֣וֹר הַ/ה֔וּא נֶאֶסְפ֖וּ אֶל אֲבוֹתָ֑י/ו וַ/יָּקָם֩ דּ֨וֹר אַחֵ֜ר אַחֲרֵי/הֶ֗ם אֲשֶׁ֤ר לֹא יָֽדְעוּ֙ אֶת יְהוָ֔ה וְ/גַם֙ אֶת הַֽ/מַּעֲשֶׂ֔ה אֲשֶׁ֥ר עָשָׂ֖ה לְ/יִשְׂרָאֵֽל־־־־־׃ס
translation:
  text: And all that generation also were gathered to their fathers, and another generation arose after them who did not know Yahweh, or even the work that he had done for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'were gathered to their fathers,' an idiom for dying and joining one's forebears.
    reason: cultural_note
  - marker: b
    text: Or 'did not acknowledge the LORD'; the Hebrew can denote relational or covenantal knowledge, not only factual awareness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Marks addition/emphasis linking this statement to the preceding context; rendered with both conjunction and adverbial force in natural English.
- source_word: הַדּוֹר הַהוּא
  chosen: that generation
  alternatives:
  - that entire generation
  - that age
  lexicon: HALOT
  rationale: דּוֹר here denotes the cohort of people living in the period just described, best rendered 'generation'.
- source_word: נֶאֶסְפוּ אֶל אֲבוֹתָיו
  chosen: were gathered to their fathers
  alternatives:
  - were gathered to their ancestors
  - died and were gathered to their fathers
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for death/burial and joining one's forebears. The more literal 'their fathers' is retained to preserve the idiom and its intergenerational flavor; 'ancestors' is possible but less textually direct.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - came up
  - appeared
  lexicon: HALOT
  rationale: Common narrative verb for the emergence of a new group or situation; 'arose' is idiomatic and sufficiently formal.
- source_word: דּוֹר אַחֵר
  chosen: another generation
  alternatives:
  - a different generation
  - a later generation
  lexicon: HALOT
  rationale: אַחֵר marks a distinct succeeding cohort; 'another generation' is the most natural equivalent.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - afterward
  - following them
  lexicon: HALOT
  rationale: Temporal succession is primary here; 'after them' keeps the personal reference explicit.
- source_word: לֹא יָדְעוּ אֶת יְהוָה
  chosen: did not know the LORD
  alternatives:
  - did not acknowledge the LORD
  - did not know about the LORD
  lexicon: HALOT
  rationale: יָדַע can imply relational knowledge, recognition, or covenantal acknowledgment. 'Know the LORD' preserves the theological depth and ambiguity without reducing it merely to ignorance of facts. Per doctrine, YHWH is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְגַם אֶת הַמַּעֲשֶׂה
  chosen: nor even the work
  alternatives:
  - and also the deed
  - nor the thing done
  lexicon: HALOT
  rationale: The second וְגַם adds a further object of ignorance. In English, after a negated clause, 'nor even' best conveys the additive-negative force. מַעֲשֶׂה in the singular can function collectively for God's deed/work on Israel's behalf.
- source_word: אֲשֶׁר עָשָׂה לְיִשְׂרָאֵל
  chosen: that he had done for Israel
  alternatives:
  - which he did for Israel
  - that he had done to Israel
  lexicon: HALOT
  rationale: The preposition ל here is best taken as benefactive in context, referring to the LORD's saving acts on Israel's behalf in Judges 2:7. 'For Israel' avoids the misleading sense of hostile action that 'to Israel' could suggest.
