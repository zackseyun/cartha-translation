id: JDG.2.21
reference: Judges 2:21
source:
  edition: WLC
  text: גַּם אֲנִי֙ לֹ֣א אוֹסִ֔יף לְ/הוֹרִ֥ישׁ אִ֖ישׁ מִ/פְּנֵי/הֶ֑ם מִן הַ/גּוֹיִ֛ם
    אֲשֶׁר עָזַ֥ב יְהוֹשֻׁ֖עַ וַ/יָּמֹֽת־־־׃
translation:
  text: I also will no longer continue to drive out before them any of the nations
    that Joshua left when he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will no longer drive out before them even one of the nations that
      Joshua left, and then died.' The Hebrew more literally has 'and he died'; 'when
      he died' expresses the temporal sense in smoother English.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֲנִי
  chosen: I also
  alternatives:
  - I too
  - even I
  lexicon: HALOT
  rationale: גַּם with the independent pronoun adds emphasis and continuation from
    the prior divine statement; 'I also' is natural English and preserves the emphatic
    force.
- source_word: לֹא אוֹסִיף
  chosen: will no longer continue
  alternatives:
  - will not again
  - will no longer
  lexicon: HALOT
  rationale: יסף in Hiphil with a following infinitive commonly means 'continue/add
    to' in a negative construction, yielding 'no longer continue' or idiomatically
    'will no longer.' I retained 'continue' because the Hebrew explicitly marks cessation
    of an ongoing action.
- source_word: לְהוֹרִישׁ
  chosen: to drive out
  alternatives:
  - to dispossess
  - to cause to inherit by dispossessing
  lexicon: HALOT
  rationale: הורישׁ in conquest contexts refers to removing prior inhabitants from
    the land. 'Drive out' is the clearest idiomatic English here, while 'dispossess'
    is possible but less natural for modern readers.
- source_word: אִישׁ
  chosen: any
  alternatives:
  - a man
  - one person
  lexicon: HALOT
  rationale: 'In the idiom לְהוֹרִישׁ אִישׁ, אִישׁ functions distributively/intensively:
    ''even one'' or ''any one.'' English ''any'' best captures the sense without awkwardness.'
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  - out of their presence
  lexicon: HALOT
  rationale: The preposition plus פָּנִים idiomatically means removal from someone's
    presence. 'Before them' keeps the Hebrew image and works naturally with 'drive
    out.'
- source_word: מִן הַגּוֹיִם
  chosen: any of the nations
  alternatives:
  - from the nations
  - any nation
  lexicon: HALOT
  rationale: Combined with אִישׁ, the phrase means not even one from among the nations.
    'Any of the nations' communicates the partitive sense clearly.
- source_word: אֲשֶׁר עָזַב יְהוֹשֻׁעַ
  chosen: that Joshua left
  alternatives:
  - which Joshua allowed to remain
  - that Joshua left behind
  lexicon: HALOT
  rationale: עזב here means 'leave, leave behind.' The clause identifies the nations
    remaining after Joshua's lifetime. 'Left' is simple and sufficiently precise.
- source_word: וַיָּמֹת
  chosen: when he died
  alternatives:
  - and died
  - before he died
  lexicon: HALOT
  rationale: The waw-consecutive can be rendered simply 'and he died,' but in English
    the temporal relation is smoother as 'when he died,' linking Joshua's death to
    the nations he left behind. This is an optimal-equivalence adjustment, not a change
    in meaning.
