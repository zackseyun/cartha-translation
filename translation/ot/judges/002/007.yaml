id: JDG.2.7
reference: Judges 2:7
source:
  edition: WLC
  text: וַ/יַּעַבְד֤וּ הָ/עָם֙ אֶת יְהוָ֔ה כֹּ֖ל יְמֵ֣י יְהוֹשֻׁ֑עַ וְ/כֹ֣ל יְמֵ֣י הַ/זְּקֵנִ֗ים אֲשֶׁ֨ר הֶאֱרִ֤יכוּ יָמִים֙ אַחֲרֵ֣י יְהוֹשׁ֔וּעַ אֲשֶׁ֣ר רָא֗וּ אֵ֣ת כָּל מַעֲשֵׂ֤ה יְהוָה֙ הַ/גָּד֔וֹל אֲשֶׁ֥ר עָשָׂ֖ה לְ/יִשְׂרָאֵֽל־׀־׃
translation:
  text: And the people served Yahweh all the days of Joshua, and all the days of the elders who lived on after Joshua, who had seen all the great work of Yahweh that he had done for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the great work'' could also be rendered ''the great deed'' or ''the great act.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: The verb עבד with YHWH as object commonly denotes serving in covenant loyalty, which can include worship but is broader than cultic worship alone. 'Served' preserves that breadth.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the covenant community collectively. 'The people' is the natural and standard rendering in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout the days of
  - for the whole time of
  lexicon: HALOT
  rationale: This idiom marks the full duration of a person's lifetime or tenure. 'All the days of' is both accurate and idiomatic.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  - the leaders
  lexicon: HALOT
  rationale: Though literally related to age, in Israelite context this commonly denotes recognized senior leaders. 'The elders' preserves both the lexical form and social role.
- source_word: הֶאֱרִיכוּ יָמִים אַחֲרֵי
  chosen: lived on after
  alternatives:
  - prolonged their days after
  - survived after
  - outlived
  lexicon: HALOT
  rationale: The idiom literally means 'lengthened days after,' referring to continuing to live beyond Joshua's death. 'Lived on after' is clear modern English without losing the temporal sense.
- source_word: רָאוּ
  chosen: had seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: English past perfect fits the relative clause referring to prior experience that explains the elders' faithfulness.
- source_word: מַעֲשֵׂה
  chosen: work
  alternatives:
  - deed
  - act
  lexicon: HALOT
  rationale: The singular collective noun refers to what the LORD accomplished on Israel's behalf. 'Work' communicates the collective sense naturally in English.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: גדול modifies the LORD's work as great in magnitude. 'Mighty' is possible, but 'great' more directly reflects the adjective.
- source_word: עָשָׂה לְיִשְׂרָאֵל
  chosen: he had done for Israel
  alternatives:
  - he did for Israel
  - he had done to/for Israel's benefit
  lexicon: HALOT
  rationale: 'The preposition ל here is benefactive: what the LORD accomplished on Israel''s behalf. ''For Israel'' is the clearest rendering.'
