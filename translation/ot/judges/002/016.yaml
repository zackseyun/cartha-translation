id: JDG.2.16
reference: Judges 2:16
source:
  edition: WLC
  text: וַ/יָּ֥קֶם יְהוָ֖ה שֹֽׁפְטִ֑ים וַ/יּ֣וֹשִׁיע֔וּ/ם מִ/יַּ֖ד שֹׁסֵי/הֶֽם׃
translation:
  text: Then Yahweh raised up judges, and they saved them from the hand of those who plundered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they delivered them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: raised up
  alternatives:
  - appointed
  - caused to arise
  lexicon: HALOT
  rationale: The hiphil of קום here means to cause leaders to arise. 'Raised up' is idiomatic English and standard for divine commissioning in this context, preserving both initiative and historical action better than the flatter 'appointed'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁפְטִים
  chosen: judges
  alternatives:
  - leaders
  - deliverers
  lexicon: HALOT
  rationale: Although the figures in Judges do more than judicial work, 'judges' is the direct lexical rendering of שֹׁפְטִים and preserves the book's terminology. 'Deliverers' captures function but narrows the term too much.
- source_word: וַיּוֹשִׁיעוּם
  chosen: they saved them
  alternatives:
  - they delivered them
  - they gave them victory
  lexicon: HALOT
  rationale: The verb ישׁע denotes rescue/deliverance. 'Saved' is a clear, direct rendering in context and does not over-theologize; 'delivered' is also possible and worth preserving in a footnote because it is common in this historical setting.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the grasp of
  lexicon: HALOT
  rationale: This Hebrew idiom commonly denotes power or control. 'From the hand of' preserves the metaphor and remains natural enough in English.
- source_word: שֹׁסֵיהֶם
  chosen: those who plundered them
  alternatives:
  - their spoilers
  - those who despoiled them
  - those who oppressed them
  lexicon: HALOT
  rationale: From שסה/שסס, the sense is violent despoiling or plundering. 'Those who plundered them' is clear modern English. 'Oppressed' is too broad and loses the predatory nuance.
