theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to foreground the judges' role as judicial officials or as rescuers
  chosen_reading: Retain 'judges' in the main text while expressing their rescuing action through the following verb 'they saved them.'
  alternative_readings:
  - Use 'deliverers' instead of 'judges'
  rationale: 'The Hebrew text itself balances office and function: they are called ''judges'' and then described as saving Israel. Preserving both avoids interpretive reduction.'
