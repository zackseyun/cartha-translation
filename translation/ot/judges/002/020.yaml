id: JDG.2.20
reference: Judges 2:20
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בְּ/יִשְׂרָאֵ֑ל וַ/יֹּ֗אמֶר יַעַן֩ אֲשֶׁ֨ר עָבְר֜וּ
    הַ/גּ֣וֹי הַ/זֶּ֗ה אֶת בְּרִיתִ/י֙ אֲשֶׁ֣ר צִוִּ֣יתִי אֶת אֲבוֹתָ֔/ם וְ/לֹ֥א שָׁמְע֖וּ
    לְ/קוֹלִֽ/י־־־׃
translation:
  text: So the anger of the LORD burned against Israel, and he said, “Because this
    nation has transgressed my covenant that I commanded their fathers, and they have
    not listened to my voice,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has broken my covenant.' The Hebrew verb literally means 'crossed over'
      and in covenant context carries the sense of violating or transgressing.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have not obeyed my voice.' The Hebrew idiom 'listen to my voice'
      often includes the sense of obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: The idiom literally speaks of anger burning/hotness. 'The anger ... burned'
    preserves the Hebrew metaphor in natural English better than a flatter 'was angry.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - at Israel
  lexicon: HALOT
  rationale: With verbs of anger, the preposition marks the object of wrath; 'against
    Israel' is the most idiomatic and semantically clear English rendering.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - On account of the fact that
  lexicon: HALOT
  rationale: This compound introduces the reason for the divine declaration. 'Because'
    is concise and accurate.
- source_word: עָבְרוּ
  chosen: has transgressed
  alternatives:
  - has crossed over
  - has violated
  - has broken
  lexicon: HALOT
  rationale: In covenantal context, עבר with covenant object means to overstep/violate.
    'Has transgressed' preserves the moral-covenantal force. Singular English agrees
    with the collective noun 'nation.'
- source_word: הַגּוֹי הַזֶּה
  chosen: this nation
  alternatives:
  - this people
  lexicon: HALOT
  rationale: Though referring to Israel, גוי means 'nation.' Rendering it as 'nation'
    preserves the marked choice of term here rather than smoothing to 'people.'
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my treaty
  - my pact
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for ברית in Israel''s relationship with the LORD.'
- source_word: צִוִּיתִי אֶת אֲבוֹתָם
  chosen: that I commanded their fathers
  alternatives:
  - that I commanded to their fathers
  - that I laid upon their fathers
  lexicon: HALOT
  rationale: The Hebrew construction is somewhat compressed; the sense is that the
    covenant was what the LORD commanded their fathers. This rendering is faithful
    and idiomatic.
- source_word: שָׁמְעוּ לְקוֹלִי
  chosen: they have not listened to my voice
  alternatives:
  - they have not obeyed my voice
  - they have not heard my voice
  lexicon: HALOT
  rationale: The idiom combines hearing and obedience. 'Listened to my voice' preserves
    the auditory metaphor while implying heed; 'obeyed' is possible but slightly more
    interpretive.
