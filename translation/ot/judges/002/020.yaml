theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention without altering meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Retention of covenantal and judicial language
  chosen_reading: transgressed my covenant ... not listened to my voice
  alternative_readings:
  - broken my covenant ... not obeyed me
  rationale: The verse frames Israel's sin in covenantal terms. The translation preserves
    that theological texture without paraphrasing into generalized disobedience.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
