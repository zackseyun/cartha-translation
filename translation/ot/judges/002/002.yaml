theological_decisions:
- issue: Covenantal terminology for Israel's prohibited relationship with the Canaanite
    population
  chosen_reading: make a covenant
  alternative_readings:
  - make a treaty
  rationale: The verse concerns disallowed covenantal alliance with the inhabitants
    of the land. 'Covenant' preserves the biblical-theological category and avoids
    reducing the term to merely political diplomacy.
