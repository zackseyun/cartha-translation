id: JDG.2.2
reference: Judges 2:2
source:
  edition: WLC
  text: וְ/אַתֶּ֗ם לֹֽא תִכְרְת֤וּ בְרִית֙ לְ/יֽוֹשְׁבֵי֙ הָ/אָ֣רֶץ הַ/זֹּ֔את מִזְבְּחוֹתֵי/הֶ֖ם
    תִּתֹּצ֑וּ/ן וְ/לֹֽא שְׁמַעְתֶּ֥ם בְּ/קֹלִ֖/י מַה זֹּ֥את עֲשִׂיתֶֽם־־־׃
translation:
  text: And you were not to make a covenant with the inhabitants of this land; you
    were to tear down their altars. But you have not listened to my voice. What is
    this you have done?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִכְרְתוּ בְרִית
  chosen: make a covenant
  alternatives:
  - cut a covenant
  - make a treaty
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'cut' with 'covenant,' but 'make a covenant'
    is the clearest natural English equivalent while preserving covenantal force.
    'Treaty' is possible in context but is narrower and less theologically resonant
    than בְּרִית.
- source_word: לְיֹשְׁבֵי הָאָרֶץ הַזֹּאת
  chosen: with the inhabitants of this land
  alternatives:
  - with those who dwell in this land
  - with the residents of this land
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive, 'those dwelling/inhabiting.' 'Inhabitants'
    is concise and idiomatic. 'This land' preserves the demonstrative force of הַזֹּאת.
- source_word: מִזְבְּחוֹתֵיהֶם תִּתֹּצוּן
  chosen: you were to tear down their altars
  alternatives:
  - you were to break down their altars
  - you shall demolish their altars
  lexicon: HALOT
  rationale: נתץ commonly means pull down, tear down, demolish, especially of altars
    and structures. 'Tear down' is vivid and natural. The imperfect here continues
    the content of the prior command, so English 'were to' fits the retrospective
    rebuke context.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקֹלִי
  chosen: But you have not listened to my voice
  alternatives:
  - and you have not obeyed my voice
  - but you did not listen to me
  lexicon: HALOT
  rationale: שמע with בְּקוֹל often carries the sense of hearing with obedience. 'Listened
    to my voice' preserves the Hebrew wording while allowing the implied disobedience
    to remain evident from context. 'But' rather than 'and' brings out the adversative
    force in English discourse.
- source_word: מַה זֹּאת עֲשִׂיתֶם
  chosen: What is this you have done?
  alternatives:
  - What have you done?
  - Why have you done this?
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'What is this you have done?' This preserves
    the rhetorical shock and rebuke more fully than the flatter 'What have you done?'
    It should not be shifted to 'Why have you done this?' because מַה here asks about
    the deed, not explicitly the motive.
- source_word: וְאַתֶּם לֹא ... תִּכְרְתוּ ... תִּתֹּצוּן
  chosen: And you were not to make ... you were to tear down
  alternatives:
  - And you shall not make ... you shall tear down
  - You must not make ... you must tear down
  lexicon: Hebrew grammar
  rationale: 'These imperfect forms recall prior divine commands and are followed
    by perfects of Israel''s failure. Rendering them as past obligation (''were not
    to,'' ''were to'') best fits the rebuke: the messenger is reminding Israel what
    had been commanded.'
