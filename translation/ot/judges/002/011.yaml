id: JDG.2.11
reference: Judges 2:11
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יַּעַבְד֖וּ אֶת הַ/בְּעָלִֽים־־־׃
translation:
  text: And the sons of Israel did what was evil in the sight of Yahweh, and they served the Baals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'worshiped the Baals.' The Hebrew verb can denote service rendered in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - committed
  lexicon: HALOT
  rationale: From עשה, the common verb 'to do/make.' In this idiom with 'the evil,' English 'did' is the most natural and sufficiently formal rendering.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the familial expression is preserved rather than flattened to 'Israelites,' though that remains a viable idiomatic alternative.
- source_word: אֶת־הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The Hebrew idiom 'do the evil' is rendered in natural English as 'do what was evil,' preserving the moral force without awkwardness.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divine evaluation. 'In the sight of' is clear modern English and preserves the metaphor. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  - became slaves to
  lexicon: HALOT
  rationale: From עבד, which can denote service or worship in cultic contexts. 'Served' preserves the lexical breadth and avoids over-specifying while still fitting the idolatry context.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the lords
  lexicon: HALOT
  rationale: Plural of Baal, referring to the various local manifestations/images of the Canaanite deity. 'The Baals' preserves the Hebrew plural and the polemical force of the text better than a singularized rendering.
