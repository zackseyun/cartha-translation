theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether עבד in this context should be rendered 'served' or 'worshiped'
  chosen_reading: served
  alternative_readings:
  - worshiped
  rationale: The context is idolatrous devotion, so 'worshiped' is interpretively possible. However, 'served' more directly reflects the Hebrew verb and preserves the broader covenantal contrast between serving the LORD and serving other gods.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
