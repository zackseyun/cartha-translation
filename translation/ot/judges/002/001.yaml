theological_decisions:
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: Rendered as 'the angel of Yahweh' without specifying whether this is a created angel or a theophanic manifestation.
  alternative_readings:
  - the messenger of the LORD as a created angel
  - the angel of the LORD as a manifestation of the LORD himself
  rationale: The verse itself presents the speaker with divine first-person speech, creating theological tension. Per project philosophy, the translation preserves that tension rather than resolving it interpretively in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
