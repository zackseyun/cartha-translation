id: JDG.2.1
reference: Judges 2:1
source:
  edition: WLC
  text: וַ/יַּ֧עַל מַלְאַךְ יְהוָ֛ה מִן הַ/גִּלְגָּ֖ל אֶל הַ/בֹּכִ֑ים וַ/יֹּאמֶר֩ אַעֲלֶ֨ה אֶתְ/כֶ֜ם מִ/מִּצְרַ֗יִם וָ/אָבִ֤יא אֶתְ/כֶם֙ אֶל הָ/אָ֗רֶץ אֲשֶׁ֤ר נִשְׁבַּ֨עְתִּי֙ לַ/אֲבֹ֣תֵי/כֶ֔ם וָ/אֹמַ֕ר לֹֽא אָפֵ֧ר בְּרִיתִ֛/י אִתְּ/כֶ֖ם לְ/עוֹלָֽם־־־פ־־׃
translation:
  text: Then the angel of Yahweh went up from Gilgal to Bochim and said, “I brought you up from Egypt and brought you into the land that I swore to your fathers, and I said, ‘I will never break my covenant with you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bochim likely means 'weepers' or refers to a place of weeping.
    reason: cultural_note
  - marker: b
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel.' In this narrative context the conventional and likely sense is a divine messenger, so 'angel' is preferred. יְהוָה follows the project default 'the LORD' rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' 'Went up' preserves the directional/topographical sense without sounding overly formal.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Place name is transliterated per project philosophy.
- source_word: הַבֹּכִים
  chosen: Bochim
  alternatives:
  - the Weepers
  - the place of weeping
  lexicon: HALOT
  rationale: As a place name with the article, it is best retained as the established transliteration 'Bochim.' Its meaning is transparent enough to preserve in a footnote rather than flatten into a descriptive translation in the main text.
- source_word: אַעֲלֶה אֶתְכֶם מִמִּצְרַיִם
  chosen: I brought you up from Egypt
  alternatives:
  - I will bring you up from Egypt
  lexicon: HALOT
  rationale: Although the form can be read as an imperfect, in context the speaker recounts past saving acts, followed by another past verb ('and brought you'). English simple past best captures the discourse flow and matches the retrospective speech.
- source_word: וָאָבִיא אֶתְכֶם
  chosen: and brought you
  alternatives:
  - and I brought you in
  lexicon: HALOT
  rationale: בוא in Hiphil means 'bring' or 'cause to enter.' 'Brought you' is natural English here, with 'into the land' supplying the destination.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''The land'' preserves the covenantal resonance of the promised land theme better than the more generic ''country.'''
- source_word: נִשְׁבַּעְתִּי לַאֲבֹתֵיכֶם
  chosen: that I swore to your fathers
  alternatives:
  - that I swore to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your fathers.' Per gender-accurate policy, 'fathers' is retained rather than neutralizing to 'ancestors,' while still conveying the patriarchal covenant context.
- source_word: וָאֹמַר
  chosen: and I said
  alternatives:
  - for I said
  lexicon: HALOT
  rationale: The waw-consecutive continues the sequence of divine actions/speech. 'And I said' is the most straightforward rendering.
- source_word: לֹא אָפֵר בְּרִיתִי אִתְּכֶם לְעוֹלָם
  chosen: I will never break my covenant with you
  alternatives:
  - I will not annul my covenant with you forever
  - I will never violate my covenant with you
  lexicon: HALOT
  rationale: הפר in covenant contexts means to break, annul, or violate. 'Break my covenant' is idiomatic and clear. לְעוֹלָם is rendered 'never' here as a natural English equivalent of the enduring negation ('not ... forever').
