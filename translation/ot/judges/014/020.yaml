id: JDG.14.20
reference: Judges 14:20
source:
  edition: WLC
  text: וַ/תְּהִ֖י אֵ֣שֶׁת שִׁמְשׁ֑וֹן לְ/מֵ֣רֵעֵ֔/הוּ אֲשֶׁ֥ר רֵעָ֖ה לֽ/וֹ׃
translation:
  text: And Samson’s wife became the wife of his companion, who had been his friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to his friend … who had accompanied him.” The Hebrew uses related terms
      from the רעה word-group for social association.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: became
  alternatives:
  - was
  lexicon: HALOT
  rationale: 'The waw-consecutive form of היה here marks a change of state/result
    in the narrative: Samson''s wife came to belong to another man. ''Became'' better
    captures the transition than the more static ''was''.'
- source_word: אֵשֶׁת שִׁמְשׁוֹן
  chosen: Samson’s wife
  alternatives:
  - the wife of Samson
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes marital relation. The possessive
    form is natural modern English and preserves the source sense.
- source_word: לְמֵרֵעֵהוּ
  chosen: the wife of his companion
  alternatives:
  - to his companion
  - to his friend
  lexicon: HALOT
  rationale: The preposition ל with היה indicates transfer/belonging ('became the
    wife of'). The noun from רעה/רע denotes an associate or companion. 'Companion'
    in the main clause avoids repeating 'friend' immediately and fits the wedding-context
    associate mentioned earlier in the narrative.
- source_word: אֲשֶׁר רֵעָה לוֹ
  chosen: who had been his friend
  alternatives:
  - who had accompanied him
  - who had associated with him
  lexicon: HALOT
  rationale: The relative clause identifies the companion as one who had acted as
    Samson's associate/friend. The verb רעה in this stem conveys association or friendship
    here, not shepherding. 'Had been his friend' is idiomatic and reflects the relational
    sense.
