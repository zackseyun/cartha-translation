id: JDG.14.8
reference: Judges 14:8
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב מִ/יָּמִים֙ לְ/קַחְתָּ֔/הּ וַ/יָּ֣סַר לִ/רְא֔וֹת אֵ֖ת מַפֶּ֣לֶת
    הָ/אַרְיֵ֑ה וְ/הִנֵּ֨ה עֲדַ֧ת דְּבוֹרִ֛ים בִּ/גְוִיַּ֥ת הָ/אַרְיֵ֖ה וּ/דְבָֽשׁ׃
translation:
  text: After some days he returned to take her, and he turned aside to see the carcass
    of the lion, and behold, a swarm of bees was in the body of the lion, and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'to marry her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיָּמִים
  chosen: After some days
  alternatives:
  - after a time
  - some time later
  lexicon: HALOT
  rationale: The idiom literally involves 'from days' and denotes the passage of an
    unspecified period. 'After some days' is a natural English rendering that stays
    close to the Hebrew while conveying elapsed time.
- source_word: לְקַחְתָּהּ
  chosen: to take her
  alternatives:
  - to marry her
  lexicon: HALOT
  rationale: The infinitive of לקח with a woman as object commonly means taking a
    woman in marriage. The more literal 'to take her' is retained in the main text
    because it reflects the Hebrew wording and allows the marital sense to be inferred
    from context; the more explicit alternative is preserved in a footnote.
- source_word: וַיָּסַר
  chosen: he turned aside
  alternatives:
  - he went aside
  - he detoured
  lexicon: HALOT
  rationale: סור here means to turn aside from one's path. 'He turned aside' is idiomatic
    and preserves the narrative movement.
- source_word: מַפֶּלֶת
  chosen: the carcass
  alternatives:
  - the fallen body
  - the remains
  lexicon: HALOT
  rationale: The noun refers to what has fallen, here the dead lion's remains. 'Carcass'
    is the most precise and natural English term in this context.
- source_word: עֲדַת דְּבוֹרִים
  chosen: a swarm of bees
  alternatives:
  - a congregation of bees
  - a company of bees
  lexicon: HALOT
  rationale: Though עֲדָה often means 'assembly/congregation,' with bees it denotes
    a gathered mass. 'A swarm of bees' is the standard contextual equivalent in English.
- source_word: בִּגְוִיַּת
  chosen: in the body of
  alternatives:
  - in the carcass of
  - in the corpse of
  lexicon: HALOT
  rationale: גְּוִיָּה denotes a body, often a dead body. Because 'carcass' has already
    rendered מַפֶּלֶת, varying here to 'body' avoids awkward repetition while still
    indicating the lion's remains.
- source_word: וּדְבָשׁ
  chosen: and honey
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
