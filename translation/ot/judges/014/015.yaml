id: JDG.14.15
reference: Judges 14:15
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י וַ/יֹּאמְר֤וּ לְ/אֵֽשֶׁת שִׁמְשׁוֹן֙ פַּתִּ֣י
    אֶת אִישֵׁ֗/ךְ וְ/יַגֶּד לָ֨/נוּ֙ אֶת הַ֣/חִידָ֔ה פֶּן נִשְׂרֹ֥ף אוֹתָ֛/ךְ וְ/אֶת
    בֵּ֥ית אָבִ֖י/ךְ בָּ/אֵ֑שׁ הַ/לְ/יָרְשֵׁ֕/נוּ קְרָאתֶ֥ם לָ֖/נוּ הֲ/לֹֽא׀־־־־־־׃
translation:
  text: And on the seventh day they said to Samson’s wife, “Entice your husband so
    that he may tell us the riddle, lest we burn you and your father’s household with
    fire. Did you invite us here to dispossess us? Is that not so?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your father’s house.” The Hebrew expression can refer either to the
      physical house or, more broadly, to the father’s household/family.
    reason: lexical_alternative
  - marker: b
    text: Or “to impoverish us” / “to take possession of what is ours.” The Hebrew
      verb can carry the sense of dispossessing or taking possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתִּי
  chosen: Entice
  alternatives:
  - Persuade
  - Coax
  - Deceive
  lexicon: HALOT
  rationale: The Piel imperative of פתה carries the sense of enticing or persuading,
    often with a manipulative nuance. 'Entice' preserves the coercive, scheming force
    better than the softer 'persuade'.
- source_word: אִישֵׁךְ
  chosen: your husband
  alternatives:
  - your man
  lexicon: HALOT
  rationale: In context of a married woman, אִישׁ naturally refers to her husband.
    This is the idiomatic and precise English rendering.
- source_word: וְיַגֶּד לָנוּ
  chosen: so that he may tell us
  alternatives:
  - and let him tell us
  - that he may declare to us
  lexicon: HALOT
  rationale: 'The conjunction plus jussive/imperfect expresses purpose after the imperative:
    she is to entice him with the aim that he tell them. ''Tell us'' is natural modern
    English for נגד in this context.'
- source_word: הַחִידָה
  chosen: the riddle
  alternatives:
  - the enigma
  lexicon: HALOT
  rationale: חִידָה is the standard term for a riddle or puzzling saying. 'Riddle'
    is the clearest contextual equivalent.
- source_word: פֶּן נִשְׂרֹף אֹתָךְ וְאֶת־בֵּית אָבִיךְ בָּאֵשׁ
  chosen: lest we burn you and your father’s household with fire
  alternatives:
  - or we will burn you and your father’s house with fire
  - lest we set you and your father’s house on fire
  lexicon: HALOT
  rationale: פֶּן introduces a threatened negative consequence, naturally rendered
    'lest.' בֵּית אָבִיךְ can denote more than the physical building; 'your father’s
    household' captures the familial unit likely in view, though the image of burning
    remains explicit.
- source_word: בֵּית אָבִיךְ
  chosen: your father’s household
  alternatives:
  - your father’s house
  lexicon: HALOT
  rationale: Hebrew 'house' often refers to the household/family. Because the threat
    is against persons associated with her father, 'household' best conveys the social
    sense, while the burning idiom is retained.
- source_word: הֲלְיָרְשֵׁנוּ
  chosen: to dispossess us
  alternatives:
  - to impoverish us
  - to take what is ours
  lexicon: HALOT
  rationale: The infinitive of ירשׁ here means to take possession of, dispossess,
    or strip someone of property. In context they suspect a plot to seize their goods
    through the wager. 'Dispossess us' preserves that force better than the vaguer
    'impoverish us.'
- source_word: קְרָאתֶם לָנוּ
  chosen: Did you invite us here
  alternatives:
  - Did you call us
  - Did you summon us
  lexicon: HALOT
  rationale: קרא with ל can mean call/invite. In the feast setting, 'invite us here'
    makes the social context explicit in idiomatic English.
- source_word: הֲלֹא
  chosen: Is that not so?
  alternatives:
  - did you not?
  - is it not?
  lexicon: HALOT
  rationale: הֲלֹא marks a rhetorical question expecting agreement. Since English
    already has a full prior clause, 'Is that not so?' captures the accusatory rhetorical
    force smoothly.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'on the seventh day' is both accurate
    and natural.
