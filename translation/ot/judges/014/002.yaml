id: JDG.14.2
reference: Judges 14:2
source:
  edition: WLC
  text: וַ/יַּ֗עַל וַ/יַּגֵּד֙ לְ/אָבִ֣י/ו וּ/לְ/אִמּ֔/וֹ וַ/יֹּ֗אמֶר אִשָּׁ֛ה רָאִ֥יתִי
    בְ/תִמְנָ֖תָ/ה מִ/בְּנ֣וֹת פְּלִשְׁתִּ֑ים וְ/עַתָּ֕ה קְחוּ אוֹתָ֥/הּ לִּ֖/י לְ/אִשָּֽׁה־׃
translation:
  text: Then he went up and told his father and mother, and he said, “I saw a woman
    in Timnah, one of the daughters of the Philistines. So now, get her for me as
    a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from the daughters of the Philistines.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: Then he went up
  alternatives:
  - Then he came up
  - Then he went
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In narrative it often reflects movement
    to another location, sometimes with topographical nuance. 'Went up' preserves
    the Hebrew verb without overexplaining the geography.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, report, make known. 'Told' is natural
    modern English and fits direct speech introduction.
- source_word: לְאָבִיו וּלְאִמּוֹ
  chosen: his father and mother
  alternatives:
  - his father and his mother
  lexicon: HALOT
  rationale: Straightforward possessive construction. English idiom normally omits
    the repeated possessive before 'mother'.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a young woman
  lexicon: HALOT
  rationale: Although אשה can mean 'wife' or 'woman,' here Samson has only seen her
    and is requesting marriage afterward, so 'a woman' best matches the discourse
    flow.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Simple past fits the Hebrew perfect in this narrative speech context.
- source_word: בְתִמְנָתָה
  chosen: in Timnah
  alternatives:
  - at Timnah
  lexicon: HALOT
  rationale: The directional/place form refers to location at Timnah. 'In Timnah'
    is the most natural English rendering.
- source_word: מִבְּנוֹת פְּלִשְׁתִּים
  chosen: one of the daughters of the Philistines
  alternatives:
  - from the daughters of the Philistines
  - one of the Philistine women
  lexicon: HALOT
  rationale: Literally 'from the daughters of the Philistines.' 'One of the daughters
    of the Philistines' preserves the partitive sense and the Hebrew familial idiom,
    while remaining readable.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Marks transition from report to request. 'So now' captures the consequential
    force in natural English.
- source_word: קְחוּ
  chosen: get
  alternatives:
  - take
  - obtain
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in marriage arrangements this idiom refers
    to obtaining/arranging a woman as wife. 'Get her for me' is idiomatic without
    becoming paraphrastic.
- source_word: אוֹתָהּ לִּי לְאִשָּׁה
  chosen: her for me as a wife
  alternatives:
  - her for me for a wife
  - her as my wife
  lexicon: HALOT
  rationale: This is a standard marriage-request formula. 'Her for me as a wife' preserves
    both the personal interest ('for me') and the marital purpose ('as a wife').
