id: JDG.14.13
reference: Judges 14:13
source:
  edition: WLC
  text: וְ/אִם לֹ֣א תוּכְלוּ֮ לְ/הַגִּ֣יד לִ/י֒ וּ/נְתַתֶּ֨ם אַתֶּ֥ם לִ/י֙ שְׁלֹשִׁ֣ים
    סְדִינִ֔ים וּ/שְׁלֹשִׁ֖ים חֲלִיפ֣וֹת בְּגָדִ֑ים וַ/יֹּ֣אמְרוּ ל֔/וֹ ח֥וּדָ/ה חִידָתְ/ךָ֖
    וְ/נִשְׁמָעֶֽ/נָּה־׃
translation:
  text: But if you cannot tell it to me, then you must give me thirty linen garments
    and thirty changes of clothes.” And they said to him, “Tell your riddle, and let
    us hear it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thirty linen cloths' for 'thirty linen garments'; the Hebrew term can
      denote fine linen items, but here likely refers to wearable articles in parallel
      with 'changes of clothes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תוּכְלוּ
  chosen: you cannot
  alternatives:
  - you are not able
  - you will not be able
  lexicon: HALOT
  rationale: From יכל, expressing ability. In this conditional setting, 'cannot' is
    natural modern English and preserves the sense of inability rather than unwillingness.
- source_word: לְהַגִּיד לִי
  chosen: tell it to me
  alternatives:
  - declare to me
  - explain it to me
  lexicon: HALOT
  rationale: 'נגד in the Hiphil commonly means ''tell, declare.'' Because the object
    is the riddle''s solution from the prior verse, English requires an implied object:
    ''tell it to me.'' ''Explain'' is possible contextually but slightly more interpretive.'
- source_word: וּנְתַתֶּם אַתֶּם לִי
  chosen: then you must give me
  alternatives:
  - then you shall give me
  - and you will give me
  lexicon: HALOT
  rationale: The waw plus perfect in this wager context expresses the consequence/obligation
    of the condition. 'Must give me' communicates the binding force in idiomatic English
    better than a bare future.
- source_word: סְדִינִים
  chosen: linen garments
  alternatives:
  - linen cloths
  - linen wraps
  - sheets
  lexicon: HALOT
  rationale: The term refers to fine linen items of clothing or cloth. In this context
    of wagered apparel, 'linen garments' best fits without the misleading modern sense
    of 'sheets.'
- source_word: חֲלִיפוֹת בְּגָדִים
  chosen: changes of clothes
  alternatives:
  - festal garments
  - sets of clothing
  - changes of garments
  lexicon: HALOT
  rationale: This idiom denotes replacement outfits or sets of clothing. 'Changes
    of clothes' is clear, idiomatic English and matches the sense of multiple garments
    given as prizes.
- source_word: חוּדָה
  chosen: Tell
  alternatives:
  - Pose
  - State
  lexicon: HALOT
  rationale: Imperative from חוד, used for propounding a riddle. Since the object
    immediately follows ('your riddle'), 'Tell your riddle' is natural English. 'Pose'
    is possible but less conversational.
- source_word: חִידָתְךָ
  chosen: your riddle
  alternatives:
  - your enigma
  lexicon: HALOT
  rationale: Standard rendering of חידה. 'Riddle' is the normal and contextually precise
    English equivalent.
- source_word: וְנִשְׁמָעֶנָּה
  chosen: and let us hear it
  alternatives:
  - that we may hear it
  - and we will hear it
  lexicon: HALOT
  rationale: Cohortative first person plural with 3fs suffix referring to the riddle.
    'Let us hear it' captures the volitional nuance naturally in English.
