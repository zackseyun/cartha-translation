theological_decisions:
- issue: Narrative resonance of יָשְׁרָה בְעֵינַי within Judges
  chosen_reading: she is right in my eyes
  alternative_readings:
  - she is pleasing to me
  - she seems right to me
  rationale: The phrase can denote attractiveness or suitability, but rendering it
    with 'right in my eyes' preserves the wording's thematic connection to the book's
    repeated moral formula about what is right in one's own eyes, without adding interpretation
    beyond the Hebrew.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
