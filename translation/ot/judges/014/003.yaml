id: JDG.14.3
reference: Judges 14:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר ל֜/וֹ אָבִ֣י/ו וְ/אִמּ֗/וֹ הַ/אֵין֩ בִּ/בְנ֨וֹת אַחֶ֤י/ךָ וּ/בְ/כָל
    עַמִּ/י֙ אִשָּׁ֔ה כִּֽי אַתָּ֤ה הוֹלֵךְ֙ לָ/קַ֣חַת אִשָּׁ֔ה מִ/פְּלִשְׁתִּ֖ים
    הָ/עֲרֵלִ֑ים וַ/יֹּ֨אמֶר שִׁמְשׁ֤וֹן אֶל אָבִי/ו֙ אוֹתָ֣/הּ קַֽח לִ֔/י כִּֽי הִ֖יא
    יָשְׁרָ֥ה בְ/עֵינָֽ/י־־־־־׃
translation:
  text: But his father and his mother said to him, “Is there not a woman among the
    daughters of your brothers or among all my people, that you are going to take
    a wife from the uncircumcised Philistines?” But Samson said to his father, “Get
    her for me, for she is right in my eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “she is pleasing in my eyes” or “she seems right to me.” The Hebrew
      idiom can express personal approval or attractiveness; the main text preserves
      the wording that echoes a recurring theme in Judges.
    reason: lexical_alternative
  - marker: b
    text: “The daughters of your brothers” likely refers broadly to women from Samson’s
      kin group or people, not only to the literal daughters of his immediate brothers.
    reason: cultural_note
lexical_decisions:
- source_word: הַאֵין
  chosen: Is there not
  alternatives:
  - Is there no
  - Are there not
  lexicon: HALOT
  rationale: Idiomatic rendering of the interrogative particle with negation, introducing
    the parents' rhetorical question.
- source_word: בִּבְנוֹת אַחֶיךָ
  chosen: among the daughters of your brothers
  alternatives:
  - among your kinswomen
  - among the daughters of your relatives
  lexicon: HALOT
  rationale: Keeps the familial language of the Hebrew more closely than a generalized
    'kinswomen.' 'Brothers' here likely extends to clan/kin, but the literal expression
    is preserved in the main text.
- source_word: וּבְכָל עַמִּי
  chosen: or among all my people
  alternatives:
  - or among all our people
  - or among all the people of my clan
  lexicon: HALOT
  rationale: The Hebrew has first person singular suffix, 'my people.' Although English
    might expect 'our people' from both parents speaking, the singular is retained
    because it is the form in the text.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: In the first occurrence the sense is an eligible woman; 'woman' fits
    the rhetorical question better than 'wife.'
- source_word: הוֹלֵךְ לָקַחַת
  chosen: you are going to take
  alternatives:
  - you are going to marry
  - you go to take
  lexicon: HALOT
  rationale: Represents the Hebrew verbal construction without over-paraphrasing.
    'Take' is retained because the next object clarifies marriage context.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In the second occurrence the marital sense is explicit, so 'wife' is
    the natural English rendering.
- source_word: מִפְּלִשְׁתִּים הָעֲרֵלִים
  chosen: from the uncircumcised Philistines
  alternatives:
  - from the Philistines, the uncircumcised
  - from those uncircumcised Philistines
  lexicon: HALOT
  rationale: Preserves the ethnic designation and the covenantally charged epithet
    'uncircumcised,' which is significant in Israelite speech and should not be softened.
- source_word: אוֹתָהּ קַח לִי
  chosen: Get her for me
  alternatives:
  - Take her for me
  - Get that one for me
  lexicon: HALOT
  rationale: Natural English for the father's role in arranging the marriage, while
    preserving the imperative force.
- source_word: יָשְׁרָה בְעֵינַי
  chosen: she is right in my eyes
  alternatives:
  - she is pleasing in my eyes
  - she seems right to me
  lexicon: HALOT
  rationale: Retains the important idiom 'in my eyes' and its evaluative sense. This
    wording also preserves the narrative resonance of Judges' recurring theme of what
    is 'right in one's own eyes.'
