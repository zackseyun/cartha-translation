id: JDG.14.14
reference: Judges 14:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֗ם מֵ/הָֽ/אֹכֵל֙ יָצָ֣א מַאֲכָ֔ל וּ/מֵ/עַ֖ז יָצָ֣א מָת֑וֹק
    וְ/לֹ֥א יָכְל֛וּ לְ/הַגִּ֥יד הַ/חִידָ֖ה שְׁלֹ֥שֶׁת יָמִֽים׃
translation:
  text: And he said to them, “Out of the eater came food, and out of the strong came
    sweetness.” But they could not tell the riddle for three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and out of the fierce came sweetness.” The Hebrew adjective can mean
      “strong,” “mighty,” or “fierce.”
    reason: lexical_alternative
  - marker: b
    text: Or “they could not explain the riddle for three days.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: מֵהָאֹכֵל
  chosen: Out of the eater
  alternatives:
  - From the eater
  - Out of the one eating
  lexicon: HALOT
  rationale: The form is the article plus Qal participle of אכל used substantivally,
    literally 'the eater.' 'Out of' fits the preposition מן in this riddle context
    and sounds natural in English while preserving the imagery.
- source_word: יָצָא
  chosen: came
  alternatives:
  - came out
  - went out
  lexicon: HALOT
  rationale: In English riddle style, 'came' is idiomatic and concise. 'Came out'
    is possible but slightly heavier; the sense of emergence is still retained by
    'out of ... came ...'.
- source_word: מַאֲכָל
  chosen: food
  alternatives:
  - something to eat
  lexicon: HALOT
  rationale: The noun denotes food or edible provision. 'Food' is compact and preserves
    the parallelism of the riddle.
- source_word: וּמֵעַז
  chosen: and out of the strong
  alternatives:
  - and from the strong one
  - and out of the fierce
  lexicon: HALOT
  rationale: The adjective עַז means strong, mighty, fierce. 'The strong' best preserves
    the Hebrew's terse parallelism and leaves the riddle unresolved in the same way
    as the source. 'Fierce' is possible in context of a lion, but would interpret
    the riddle too specifically.
- source_word: מָתוֹק
  chosen: sweetness
  alternatives:
  - something sweet
  - sweet
  lexicon: HALOT
  rationale: The adjective functions substantivally here. 'Sweetness' mirrors the
    abstract quality and balances 'food' in the poetic line. 'Something sweet' is
    also possible and more concrete, but less elegant.
- source_word: לֹא יָכְלוּ
  chosen: they could not
  alternatives:
  - they were not able to
  lexicon: HALOT
  rationale: Idiomatic rendering of יכל in English; concise and natural.
- source_word: לְהַגִּיד
  chosen: tell
  alternatives:
  - explain
  - declare
  lexicon: HALOT
  rationale: In context of a riddle, 'tell' is natural English for giving the answer.
    'Explain' is possible but slightly interpretive.
- source_word: הַחִידָה
  chosen: the riddle
  alternatives:
  - the puzzle
  - the enigma
  lexicon: HALOT
  rationale: חִידָה commonly denotes a riddle. 'Riddle' is the standard and clearest
    rendering in this narrative context.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: for three days
  alternatives:
  - within three days
  - three days
  lexicon: HALOT
  rationale: English idiom requires 'for' to express duration. This preserves the
    temporal sense without forcing a more precise boundary than the Hebrew states.
