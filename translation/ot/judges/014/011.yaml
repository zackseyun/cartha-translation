id: JDG.14.11
reference: Judges 14:11
source:
  edition: WLC
  text: וַ/יְהִ֖י כִּ/רְאוֹתָ֣/ם אוֹת֑/וֹ וַ/יִּקְחוּ֙ שְׁלֹשִׁ֣ים מֵֽרֵעִ֔ים וַ/יִּהְי֖וּ
    אִתּֽ/וֹ׃
translation:
  text: And when they saw him, they took thirty companions, and they were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'friends,' possibly specifically wedding companions or groomsmen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as a narrative introducer.
    In English, a simple 'And' best preserves the flow without the wooden formula
    'and it happened.'
- source_word: כִּרְאוֹתָם
  chosen: when they saw
  alternatives:
  - as soon as they saw
  - at their seeing
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of ראה plus suffix gives
    a temporal sense, naturally rendered 'when they saw.'
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object pronoun referring to Samson; straightforwardly 'him.'
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they brought
  - they selected
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this context of appointing men to accompany
    Samson, 'took' is sufficiently literal and idiomatic; alternatives are possible
    but less direct.
- source_word: שְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Cardinal number, directly rendered 'thirty.'
- source_word: מֵרֵעִים
  chosen: companions
  alternatives:
  - friends
  - groomsmen
  - attendants
  lexicon: HALOT
  rationale: The noun denotes associates/companions. 'Companions' preserves the relational
    sense without over-specifying a formal wedding role such as 'groomsmen,' though
    that is contextually possible.
- source_word: וַיִּהְיוּ אִתּוֹ
  chosen: and they were with him
  alternatives:
  - and they accompanied him
  - and they stayed with him
  lexicon: HALOT
  rationale: 'The clause is formally simple: ''and they were with him.'' This preserves
    the Hebrew wording while remaining natural English. More interpretive renderings
    like ''accompanied him'' are possible but less transparent.'
