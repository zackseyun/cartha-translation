id: JDG.14.6
reference: Judges 14:6
source:
  edition: WLC
  text: וַ/תִּצְלַ֨ח עָלָ֜י/ו ר֣וּחַ יְהוָ֗ה וַֽ/יְשַׁסְּעֵ֨/הוּ֙ כְּ/שַׁסַּ֣ע הַ/גְּדִ֔י
    וּ/מְא֖וּמָה אֵ֣ין בְּ/יָד֑/וֹ וְ/לֹ֤א הִגִּיד֙ לְ/אָבִ֣י/ו וּ/לְ/אִמּ֔/וֹ אֵ֖ת
    אֲשֶׁ֥ר עָשָֽׂה׃
translation:
  text: Then the Spirit of the LORD rushed upon him, and he tore it apart as one tears
    apart a young goat, though he had nothing in his hand. But he did not tell his
    father or his mother what he had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came mightily upon him' / 'came powerfully upon him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as one tears apart a kid'; that is, a young goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְלַח עָלָיו
  chosen: rushed upon him
  alternatives:
  - came powerfully upon him
  - came mightily upon him
  lexicon: HALOT
  rationale: צלח with עַל in Judges commonly denotes the Spirit coming upon someone
    with sudden empowering force. 'Rushed upon him' captures the vivid, forceful onset
    better than the more traditional but less natural 'came mightily upon.'
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the Spirit of Yahweh
  lexicon: HALOT
  rationale: רוּחַ here refers to God's empowering Spirit, not merely wind or disposition.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וַיְשַׁסְּעֵהוּ
  chosen: he tore it apart
  alternatives:
  - he ripped it apart
  - he tore him apart
  lexicon: HALOT
  rationale: The verb שׁסע denotes tearing/splitting violently. English idiom prefers
    'tore it apart.' Although the suffix is masculine singular and refers to the lion
    in context, English can naturally use 'it' for the animal without loss of meaning.
- source_word: כְּשַׁסַּע הַגְּדִי
  chosen: as one tears apart a young goat
  alternatives:
  - as he tears apart a young goat
  - as one tears a kid to pieces
  lexicon: HALOT
  rationale: The comparison is to the ease or manner of tearing a young goat. 'Young
    goat' is clearer for modern readers than 'kid,' which can be misunderstood.
- source_word: הַגְּדִי
  chosen: a young goat
  alternatives:
  - a kid
  lexicon: HALOT
  rationale: Though the Hebrew has the article, English simile style is more natural
    with the indefinite expression here. 'Young goat' avoids ambiguity.
- source_word: וּמְאוּמָה אֵין בְּיָדוֹ
  chosen: though he had nothing in his hand
  alternatives:
  - and there was nothing in his hand
  - with nothing in his hand
  lexicon: HALOT
  rationale: The clause highlights that Samson used no weapon. 'Though he had nothing
    in his hand' brings out the concessive force in smooth English while preserving
    the sense.
- source_word: וְלֹא הִגִּיד
  chosen: But he did not tell
  alternatives:
  - And he did not tell
  lexicon: HALOT
  rationale: The conjunction marks continuation with a slight contrast to the extraordinary
    deed just described; 'But' reads naturally in English.
- source_word: לְאָבִיו וּלְאִמּוֹ
  chosen: his father or his mother
  alternatives:
  - his father and his mother
  lexicon: HALOT
  rationale: After a negated verb, English idiom commonly uses 'or' to express that
    he told neither parent. This preserves the distributive sense without implying
    only one was excluded.
- source_word: אֵת אֲשֶׁר עָשָׂה
  chosen: what he had done
  alternatives:
  - what he did
  lexicon: HALOT
  rationale: The pluperfect-like English 'had done' fits the narrative sequence, indicating
    the action preceded his not telling them.
