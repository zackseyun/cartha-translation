id: JDG.14.5
reference: Judges 14:5
source:
  edition: WLC
  text: וַ/יֵּ֧רֶד שִׁמְשׁ֛וֹן וְ/אָבִ֥י/ו וְ/אִמּ֖/וֹ תִּמְנָ֑תָ/ה וַ/יָּבֹ֨אוּ֙
    עַד כַּרְמֵ֣י תִמְנָ֔תָ/ה וְ/הִנֵּה֙ כְּפִ֣יר אֲרָי֔וֹת שֹׁאֵ֖ג לִ/קְרָאתֽ/וֹ־׃
translation:
  text: Then Samson went down with his father and his mother to Timnah, and they came
    as far as the vineyards of Timnah. And look, a young lion was roaring as it came
    toward him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And behold.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'a young lion of lions,' an idiom meaning 'a young lion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'roaring to meet him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went
  - descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down/descend.' 'Went down' preserves
    the directional nuance, which is also idiomatic for travel from the hill country
    toward Timnah.
- source_word: תִּמְנָתָה
  chosen: to Timnah
  alternatives:
  - toward Timnah
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place. In natural English,
    'to Timnah' best conveys the destination.
- source_word: וַיָּבֹאוּ עַד
  chosen: they came as far as
  alternatives:
  - they came to
  - they arrived at
  lexicon: HALOT
  rationale: The combination of בוא with עַד marks reaching up to a point. 'Came as
    far as' preserves the sense of arrival at a specific stage on the journey.
- source_word: כַּרְמֵי תִמְנָתָה
  chosen: the vineyards of Timnah
  alternatives:
  - the vineyards near Timnah
  - the vine-growing area of Timnah
  lexicon: HALOT
  rationale: כֶּרֶם/כַּרְמֵי refers to vineyards. The construct phrase is most naturally
    rendered 'the vineyards of Timnah.'
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Suddenly
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a vivid or surprising
    event. 'And look' is readable modern English and preserves the immediacy better
    than the archaic 'behold.'
- source_word: כְּפִיר אֲרָיוֹת
  chosen: a young lion
  alternatives:
  - a lion cub
  - a young male lion
  lexicon: HALOT
  rationale: כְּפִיר denotes a young lion, not a small cub in the modern sense. The
    following plural אֲרָיוֹת functions idiomatically/intensively with the lion term;
    English naturally renders the phrase simply as 'a young lion.'
- source_word: שֹׁאֵג
  chosen: was roaring
  alternatives:
  - roaring
  lexicon: HALOT
  rationale: The participle presents the action in progress. 'Was roaring' captures
    the vivid ongoing action in idiomatic English narrative.
- source_word: לִקְרָאתוֹ
  chosen: as it came toward him
  alternatives:
  - toward him
  - to meet him
  - against him
  lexicon: HALOT
  rationale: לקראת often means 'to meet' or 'toward.' In this hostile context, the
    lion is approaching Samson. 'As it came toward him' makes the motion explicit
    and fits the participial scene.
