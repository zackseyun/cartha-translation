id: JDG.14.18
reference: Judges 14:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמְרוּ ל/וֹ֩ אַנְשֵׁ֨י הָ/עִ֜יר בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י בְּ/טֶ֨רֶם֙
    יָבֹ֣א הַ/חַ֔רְסָ/ה מַה מָּת֣וֹק מִ/דְּבַ֔שׁ וּ/מֶ֥ה עַ֖ז מֵ/אֲרִ֑י וַ/יֹּ֣אמֶר
    לָ/הֶ֔ם לוּלֵא֙ חֲרַשְׁתֶּ֣ם בְּ/עֶגְלָתִ֔/י לֹ֥א מְצָאתֶ֖ם חִידָתִֽ/י־׃
translation:
  text: And the men of the city said to him on the seventh day, before the sun went
    down, “What is sweeter than honey, and what is stronger than a lion?” And he said
    to them, “If you had not plowed with my heifer, you would not have found out my
    riddle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “before the sun came in,” an idiom meaning before sunset.
    reason: lexical_alternative
  - marker: b
    text: Literally, “If you had not plowed with my heifer.” Samson uses a metaphor
      for his wife, accusing them of using her to solve the riddle.
    reason: cultural_note
lexical_decisions:
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the townsmen
  - the people of the city
  lexicon: HALOT
  rationale: A formally close rendering that preserves the masculine plural 'men'
    rather than neutralizing to 'people,' in keeping with gender-accurate translation.
    'Townsmen' is possible but less transparent.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Standard temporal rendering; natural English while remaining formally
    close.
- source_word: בְּטֶרֶם יָבֹא הַחַרְסָה
  chosen: before the sun went down
  alternatives:
  - before the sun came in
  - before sunset
  lexicon: HALOT
  rationale: The idiom refers to the setting of the sun. 'Before the sun went down'
    communicates the temporal sense clearly in natural English. 'Before sunset' is
    also possible but slightly less vivid.
- source_word: מַה מָּתוֹק מִדְּבַשׁ
  chosen: What is sweeter than honey
  alternatives:
  - What is sweet from honey
  lexicon: HALOT
  rationale: Idiomatic comparative sense is required by the riddle's answer. The preposition
    מִן here functions comparatively ('than').
- source_word: וּמֶה עַז מֵאֲרִי
  chosen: and what is stronger than a lion
  alternatives:
  - and what is fierce than a lion
  - and what is mighty than a lion
  lexicon: HALOT
  rationale: עַז can denote strength, fierceness, or might. 'Stronger' best matches
    the comparative structure and common English expression in the riddle.
- source_word: לוּלֵא
  chosen: If ... not
  alternatives:
  - Unless
  lexicon: HALOT
  rationale: Introduces a contrary-to-fact condition. In English, 'If you had not...'
    best captures the sense in this context.
- source_word: חֲרַשְׁתֶּם
  chosen: had plowed
  alternatives:
  - had plowed up
  - had worked
  lexicon: HALOT
  rationale: The verb literally means 'to plow.' Retaining the agricultural metaphor
    preserves Samson's biting accusation instead of flattening it to a generic 'worked'
    or 'used'.
- source_word: בְּעֶגְלָתִי
  chosen: with my heifer
  alternatives:
  - with my young cow
  - with my wife
  lexicon: HALOT
  rationale: The Hebrew literally says 'with my heifer,' a metaphorical and insulting
    reference to Samson's wife. The literal image should be preserved in the main
    text for transparency; the referent can be clarified in a footnote.
- source_word: מְצָאתֶם
  chosen: would not have found out
  alternatives:
  - would not have found
  - would not have solved
  lexicon: HALOT
  rationale: In context of a riddle, the sense is not merely physical finding but
    discovering/solving. 'Found out' preserves the verbal link while making the idiomatic
    sense clear.
- source_word: חִידָתִי
  chosen: my riddle
  alternatives:
  - my enigma
  lexicon: HALOT
  rationale: Standard rendering for חִידָה in this narrative context; clear and natural
    English.
