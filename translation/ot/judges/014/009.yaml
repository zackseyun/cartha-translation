id: JDG.14.9
reference: Judges 14:9
source:
  edition: WLC
  text: וַ/יִּרְדֵּ֣/הוּ אֶל כַּפָּ֗י/ו וַ/יֵּ֤לֶךְ הָלוֹךְ֙ וְ/אָכֹ֔ל וַ/יֵּ֨לֶךְ֙
    אֶל אָבִ֣י/ו וְ/אֶל אִמּ֔/וֹ וַ/יִּתֵּ֥ן לָ/הֶ֖ם וַ/יֹּאכֵ֑לוּ וְ/לֹֽא הִגִּ֣יד
    לָ/הֶ֔ם כִּ֛י מִ/גְּוִיַּ֥ת הָ/אַרְיֵ֖ה רָדָ֥ה הַ/דְּבָֽשׁ־־־־׃
translation:
  text: He scraped it into his hands and went on, eating as he went. Then he went
    to his father and mother and gave some to them, and they ate. But he did not tell
    them that he had scraped the honey out of the carcass of the lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scooped it out' or 'took it out'; the Hebrew verb suggests removing
      the honey by hand from within the carcass.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֵּהוּ
  chosen: He scraped it
  alternatives:
  - He took it out
  - He scooped it out
  lexicon: HALOT
  rationale: From רדה, here referring to removing honey from the lion's carcass. 'Scraped'
    or 'scooped out' fits the physical action better than a generic 'took.' 'Scraped
    it' is vivid and natural in English while remaining close to the source.
- source_word: אֶל כַּפָּיו
  chosen: into his hands
  alternatives:
  - into his palms
  - onto his hands
  lexicon: HALOT
  rationale: כַּף commonly means 'palm' or 'hand.' In idiomatic English, 'into his
    hands' best conveys the sense without awkwardness.
- source_word: וַיֵּלֶךְ הָלוֹךְ וְאָכֹל
  chosen: went on, eating as he went
  alternatives:
  - went along eating
  - walked on and ate
  lexicon: HALOT
  rationale: The infinitive absolute construction with finite verb expresses continuing
    action. 'Eating as he went' captures the durative sense more naturally than a
    flat sequence.
- source_word: וַיֵּלֶךְ אֶל אָבִיו וְאֶל אִמּוֹ
  chosen: Then he went to his father and mother
  alternatives:
  - He came to his father and mother
  lexicon: HALOT
  rationale: הלך is straightforwardly 'went.' 'Then' helps the English narrative flow
    reflect the waw-consecutive sequence.
- source_word: וַיִּתֵּן לָהֶם
  chosen: gave some to them
  alternatives:
  - gave to them
  - gave it to them
  lexicon: HALOT
  rationale: The object is implied from context as some of the honey. 'Gave some to
    them' makes the implied partitive sense explicit in natural English without over-paraphrasing.
- source_word: וַיֹּאכֵלוּ
  chosen: they ate
  alternatives:
  - they ate it
  lexicon: HALOT
  rationale: Simple narrative verb; the object is understood from context and need
    not be repeated in English.
- source_word: וְלֹא הִגִּיד לָהֶם
  chosen: But he did not tell them
  alternatives:
  - And he did not tell them
  - he did not inform them
  lexicon: HALOT
  rationale: הגיד means 'tell, declare, report.' 'Tell' is the most natural narrative
    equivalent. 'But' appropriately marks the contrastive force in context.
- source_word: מִגְּוִיַּת הָאַרְיֵה
  chosen: out of the carcass of the lion
  alternatives:
  - from the body of the lion
  - from the corpse of the lion
  lexicon: HALOT
  rationale: גְּוִיָּה denotes a dead body/corpse. 'Carcass' is especially fitting
    for an animal and preserves the unpleasant concreteness of the Hebrew.
- source_word: רָדָה הַדְּבָשׁ
  chosen: had scraped the honey
  alternatives:
  - had taken the honey out
  - had scooped out the honey
  lexicon: HALOT
  rationale: The same verb רדה appears again; rendering it consistently with 'scraped'
    preserves lexical coherence. The pluperfect sense in English ('had scraped') fits
    the explanatory clause introduced by כִּי.
