id: JDG.14.4
reference: Judges 14:4
source:
  edition: WLC
  text: וְ/אָבִ֨י/ו וְ/אִמּ֜/וֹ לֹ֣א יָדְע֗וּ כִּ֤י מֵ/יְהוָה֙ הִ֔יא כִּי תֹאֲנָ֥ה
    הֽוּא מְבַקֵּ֖שׁ מִ/פְּלִשְׁתִּ֑ים וּ/בָ/עֵ֣ת הַ/הִ֔יא פְּלִשְׁתִּ֖ים מֹשְׁלִ֥ים
    בְּ/יִשְׂרָאֵֽל־־׃פ
translation:
  text: But his father and mother did not know that it was from the LORD, for he was
    seeking an occasion against the Philistines. At that time the Philistines were
    ruling over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for He was seeking an occasion against the Philistines,' with 'He'
      understood as the LORD. The Hebrew permits this, though the context more likely
      points to Samson.
    reason: alternative_reading
  - marker: b
    text: Or 'a pretext' or 'an opportunity' for action against the Philistines.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'Uses the covenant name according to project default: יְהוָה is rendered
    ''the LORD,'' not transliterated, following the doctrine table.'
- source_word: הִיא
  chosen: it was
  alternatives:
  - she/this was
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the matter under discussion, namely
    Samson's pursuit of the Philistine woman/situation. English idiom naturally uses
    impersonal 'it was' rather than preserving grammatical gender.
- source_word: תֹאֲנָה
  chosen: an occasion
  alternatives:
  - a pretext
  - an opportunity
  - a quarrel
  lexicon: HALOT
  rationale: The noun denotes a pretext or occasion for action. 'Occasion' preserves
    the ambiguity of a sought opening for conflict without over-specifying motive.
    'Pretext' is possible but can imply insincerity more strongly than the Hebrew
    requires.
- source_word: מְבַקֵּשׁ
  chosen: he was seeking
  alternatives:
  - he sought
  - he was looking for
  lexicon: HALOT
  rationale: The participle conveys ongoing or contemporaneous action; 'he was seeking'
    reflects that aspect better than a simple past.
- source_word: מִפְּלִשְׁתִּים
  chosen: against the Philistines
  alternatives:
  - from the Philistines
  - with the Philistines
  lexicon: HALOT
  rationale: With תֹאֲנָה and בקשׁ in this context, the sense is that Samson was seeking
    an opening for action directed against the Philistines. English 'against' best
    captures the hostile force implied by the narrative context.
- source_word: וּבָעֵת הַהִיא
  chosen: At that time
  alternatives:
  - And at that time
  - Now at that time
  lexicon: HALOT
  rationale: A natural temporal transition in English. 'At that time' preserves the
    narrative setting without unnecessary stiffness.
- source_word: מֹשְׁלִים
  chosen: were ruling over
  alternatives:
  - were dominating
  - ruled
  lexicon: HALOT
  rationale: The participle indicates an ongoing state of dominion. 'Were ruling over'
    is both readable and faithful to the political sense of משל with ב.
- source_word: וְאָבִיו וְאִמּוֹ
  chosen: his father and mother
  alternatives:
  - his father and his mother
  lexicon: HALOT
  rationale: Standard English coordination; no meaning is lost by omitting the repeated
    possessive in translation.
- source_word: לֹא יָדְעוּ
  chosen: did not know
  alternatives:
  - were unaware
  lexicon: HALOT
  rationale: A straightforward rendering of the verb ידע in the perfect; 'did not
    know' is direct and transparent.
