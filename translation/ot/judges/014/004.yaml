theological_decisions:
- issue: Divine involvement in Samson's pursuit and resulting conflict
  chosen_reading: The verse states that this matter was from the LORD while also describing
    Samson as seeking an occasion against the Philistines.
  alternative_readings:
  - The LORD directly caused Samson's desire in a deterministically exhaustive sense
  - The verse merely says the LORD later used an otherwise independent human choice
  rationale: The Hebrew explicitly attributes the matter to the LORD and also presents
    Samson as the acting subject seeking an occasion. The translation preserves both
    strands without resolving the theological tension beyond what the text states,
    in keeping with the doctrine's instruction to preserve tension rather than impose
    a system.
  doctrine_reference: Translation philosophy §3
- issue: Referent of 'he was seeking'
  chosen_reading: '''He'' refers to Samson.'
  alternative_readings:
  - '''He'' refers to the LORD'
  rationale: Although the nearest prior explicit subject in the clause is the LORD,
    the broader narrative context and the masculine singular participle naturally
    fit Samson as the one seeking an occasion against the Philistines through this
    marriage episode. This avoids making the English imply a theological claim stronger
    than the narrative requires, while the ambiguity is worth preserving in a footnote.
  doctrine_reference: Translation philosophy §3
