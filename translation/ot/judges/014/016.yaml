id: JDG.14.16
reference: Judges 14:16
source:
  edition: WLC
  text: וַ/תֵּבְךְּ֩ אֵ֨שֶׁת שִׁמְשׁ֜וֹן עָלָ֗י/ו וַ/תֹּ֨אמֶר֙ רַק שְׂנֵאתַ֨/נִי֙
    וְ/לֹ֣א אֲהַבְתָּ֔/נִי הַֽ/חִידָ֥ה חַ֨דְתָּ֙ לִ/בְנֵ֣י עַמִּ֔/י וְ/לִ֖/י לֹ֣א
    הִגַּ֑דְתָּה וַ/יֹּ֣אמֶר לָ֗/הּ הִנֵּ֨ה לְ/אָבִ֧/י וּ/לְ/אִמִּ֛/י לֹ֥א הִגַּ֖דְתִּי
    וְ/לָ֥/ךְ אַגִּֽיד־׃
translation:
  text: Then Samson’s wife wept over him and said, “You only hate me; you do not love
    me. You have posed the riddle to the sons of my people, but you have not told
    me.” And he said to her, “Look, I have not told my father or my mother, so should
    I tell you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “to the sons of my people.” The Hebrew is masculine
      and likely refers to the men of her people in this setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּבְךְּ ... עָלָיו
  chosen: wept over him
  alternatives:
  - wept before him
  - wept on him
  - pressed him with her tears
  lexicon: HALOT
  rationale: The verb בכה means 'weep/cry.' With עַל plus person, the sense is weeping
    over or upon someone, likely in his presence and as emotional pressure. 'Wept
    over him' preserves the Hebrew preposition without over-paraphrasing.
- source_word: אֵשֶׁת שִׁמְשׁוֹן
  chosen: Samson’s wife
  alternatives:
  - the wife of Samson
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes marital relation. 'Samson’s
    wife' is natural modern English while remaining formally accurate.
- source_word: רַק
  chosen: only
  alternatives:
  - surely
  - nothing but
  lexicon: HALOT
  rationale: 'Here רַק intensifies the accusation: ''you only/nothing but hate me.''
    ''Only'' is concise and idiomatic.'
- source_word: שְׂנֵאתַנִי ... וְלֹא אֲהַבְתָּנִי
  chosen: you only hate me; you do not love me
  alternatives:
  - you hate me and do not love me
  - you must hate me, not love me
  lexicon: HALOT
  rationale: The paired verbs 'hate' and 'love' should be preserved directly because
    the emotional contrast is central to her manipulation. Semicolon reflects the
    parallel accusation.
- source_word: הַחִידָה
  chosen: the riddle
  alternatives:
  - the puzzle
  lexicon: HALOT
  rationale: חִידָה commonly means 'riddle' in wisdom or challenge contexts. Since
    the narrative centers on Samson's wager-riddle, 'riddle' is the precise term.
- source_word: חַדְתָּ
  chosen: have posed
  alternatives:
  - have propounded
  - have told
  - have set forth
  lexicon: HALOT
  rationale: The verb here means to put forth or propound a riddle. 'Have posed' is
    natural modern English and fits the object 'riddle'.
- source_word: לִבְנֵי עַמִּי
  chosen: to the sons of my people
  alternatives:
  - to my people
  - to the men of my people
  - to my kinsmen
  lexicon: HALOT
  rationale: בני עמי is literally 'sons of my people.' In context she refers to her
    fellow Philistines, likely the male wedding companions addressed by the riddle.
    Following the project's gender-accurate principle, 'sons of my people' preserves
    the masculine form rather than flattening it to 'people.'
- source_word: וְלִי לֹא הִגַּדְתָּה
  chosen: but you have not told me
  alternatives:
  - and to me you have not explained it
  - but to me you have not declared it
  lexicon: HALOT
  rationale: נגד in Hiphil means 'tell, declare, make known.' 'Told me' is the most
    natural rendering in this domestic dialogue.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה introduces emphatic attention. 'Look' is readable modern English
    and preserves the discourse force without archaic tone.
- source_word: לְאָבִי וּלְאִמִּי לֹא הִגַּדְתִּי
  chosen: I have not told my father or my mother
  alternatives:
  - I have not told my father and my mother
  lexicon: HALOT
  rationale: English idiom prefers 'or' under negation. The Hebrew names both parents
    explicitly; this is retained.
- source_word: וְלָךְ אַגִּיד
  chosen: so should I tell you?
  alternatives:
  - and shall I tell you?
  - am I to tell you?
  lexicon: HALOT
  rationale: Though formally a simple imperfect ('shall I tell you'), in context it
    is rhetorical. 'So should I tell you?' brings out the implied argument from lesser
    to greater without adding content.
