id: JDG.14.17
reference: Judges 14:17
source:
  edition: WLC
  text: וַ/תֵּ֤בְךְּ עָלָי/ו֙ שִׁבְעַ֣ת הַ/יָּמִ֔ים אֲשֶׁר הָיָ֥ה לָ/הֶ֖ם הַ/מִּשְׁתֶּ֑ה
    וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י וַ/יַּגֶּד לָ/הּ֙ כִּ֣י הֱצִיקַ֔תְ/הוּ וַ/תַּגֵּ֥ד
    הַ/חִידָ֖ה לִ/בְנֵ֥י עַמָּֽ/הּ־׀־׃
translation:
  text: She wept on him the seven days that they had the feast. And on the seventh
    day he told her, because she pressed him hard; then she told the riddle to the
    sons of her people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She wept before him' or 'She cried to him.' The Hebrew idiom literally
      says she 'wept on him,' conveying sustained emotional pressure.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of her people'' may refer more specifically to the men of her
      own people, likely the Philistine companions in the immediate context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּבְךְּ עָלָיו
  chosen: She wept on him
  alternatives:
  - She wept before him
  - She cried to him
  - She wept over him
  lexicon: HALOT
  rationale: The verb בכה means 'weep/cry.' With עַל + pronominal suffix, the sense
    is that her weeping was directed at or imposed upon Samson. 'Wept on him' preserves
    the Hebrew idiom's pressure-laden force better than the smoother but weaker 'wept
    before him.'
- source_word: שִׁבְעַת הַיָּמִים
  chosen: the seven days
  alternatives:
  - for seven days
  lexicon: HALOT
  rationale: The construct phrase with article is most naturally rendered 'the seven
    days,' referring to the full duration of the feast. This keeps the temporal specificity
    of the Hebrew.
- source_word: אֲשֶׁר הָיָה לָהֶם הַמִּשְׁתֶּה
  chosen: that they had the feast
  alternatives:
  - during which they had the feast
  - while the feast lasted for them
  - that the feast belonged to them
  lexicon: HALOT
  rationale: מִשְׁתֶּה is a feast/banquet, often specifically a drinking feast or
    wedding feast. 'They had the feast' is idiomatic English that preserves the clause's
    sense without over-specifying beyond the Hebrew.
- source_word: וַיְהִי בַּיּוֹם הַשְּׁבִיעִי
  chosen: And on the seventh day
  alternatives:
  - And it happened on the seventh day
  - Now on the seventh day
  lexicon: HALOT
  rationale: The waw-consecutive plus היה often functions as narrative progression.
    'And on the seventh day' gives natural English while retaining the temporal transition.
- source_word: וַיַּגֶּד לָהּ
  chosen: he told her
  alternatives:
  - he explained to her
  - he disclosed it to her
  lexicon: HALOT
  rationale: נגד means to tell, declare, make known. 'Told her' is the most direct
    and natural rendering here.
- source_word: כִּי הֱצִיקַתְהוּ
  chosen: because she pressed him hard
  alternatives:
  - because she urged him relentlessly
  - because she harassed him
  - because she constrained him
  lexicon: HALOT
  rationale: The hiphil of צוק here conveys severe pressure or persistent urging.
    'Pressed him hard' captures both the emotional coercion and the intensity without
    sounding overly technical.
- source_word: וַתַּגֵּד הַחִידָה
  chosen: then she told the riddle
  alternatives:
  - and she disclosed the riddle
  - and she explained the riddle
  lexicon: HALOT
  rationale: The repeated נגד is mirrored with 'told' for consistency. חִידָה is 'riddle,'
    the same object as in the surrounding narrative.
- source_word: לִבְנֵי עַמָּהּ
  chosen: to the sons of her people
  alternatives:
  - to her people
  - to the men of her people
  - to her kinsmen
  lexicon: HALOT
  rationale: בני עמה literally means 'sons of her people.' In context it refers to
    the men/companions from her own people group. Following the project's gender-accurate
    principle, the masculine form is preserved rather than flattened to 'her people,'
    though that broader sense is possible.
