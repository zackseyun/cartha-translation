id: JDG.14.10
reference: Judges 14:10
source:
  edition: WLC
  text: וַ/יֵּ֥רֶד אָבִ֖י/הוּ אֶל הָ/אִשָּׁ֑ה וַ/יַּ֨עַשׂ שָׁ֤ם שִׁמְשׁוֹן֙ מִשְׁתֶּ֔ה
    כִּ֛י כֵּ֥ן יַעֲשׂ֖וּ הַ/בַּחוּרִֽים־׃
translation:
  text: So his father went down to the woman, and Samson made a feast there, for that
    is what the young men used to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a banquet' or 'a drinking feast.' The Hebrew מִשְׁתֶּה often refers
      to a celebratory meal that includes drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went
  - came down
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Went down' preserves
    the directional nuance common in Hebrew narrative.
- source_word: אָבִיהוּ
  chosen: his father
  alternatives:
  - her father
  lexicon: HALOT
  rationale: 'The pronominal suffix is 3ms, referring to Samson in context: ''his
    father.'''
- source_word: אֶל הָאִשָּׁה
  chosen: to the woman
  alternatives:
  - to his wife
  - to the young woman
  lexicon: HALOT
  rationale: The Hebrew says simply 'to the woman.' Although context identifies her
    as Samson's intended bride, the more literal wording is retained.
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - held
  - prepared
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). With מִשְׁתֶּה, 'made a feast' is idiomatic
    and close to the Hebrew.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural English equivalent.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often involving drinking. 'Feast'
    is clear modern English and avoids over-specifying while preserving the celebratory
    setting.
- source_word: כִּי כֵּן יַעֲשׂוּ
  chosen: for that is what ... used to do
  alternatives:
  - for thus ... do
  - because this is what ... do
  lexicon: HALOT
  rationale: The clause explains customary practice. English idiom is best conveyed
    with 'that is what ... used to do,' expressing habitual action.
- source_word: הַבַּחוּרִים
  chosen: the young men
  alternatives:
  - the bachelors
  - the youths
  lexicon: HALOT
  rationale: בָּחוּר commonly refers to a young man in the prime of life. 'Young men'
    is natural and sufficiently precise in this wedding context.
