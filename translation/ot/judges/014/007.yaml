id: JDG.14.7
reference: Judges 14:7
source:
  edition: WLC
  text: וַ/יֵּ֖רֶד וַ/יְדַבֵּ֣ר לָ/אִשָּׁ֑ה וַ/תִּישַׁ֖ר בְּ/עֵינֵ֥י שִׁמְשֽׁוֹן׃
translation:
  text: Then he went down and spoke to the woman, and she was pleasing in Samson’s
    eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'she pleased Samson' or 'she seemed right to Samson.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: Then he went down
  alternatives:
  - And he went down
  - He went down
  lexicon: HALOT
  rationale: The verb ירד literally means 'went down' or 'descended.' 'Went down'
    preserves the geographical movement toward Timnah and fits normal English narrative
    style. 'Then' reflects the waw-consecutive narrative sequence naturally without
    over-literal repetition of 'and.'
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - spoke with
  - talked with
  lexicon: HALOT
  rationale: דבר with ל marks speaking to someone. 'Spoke' is the most direct rendering;
    the indirect object 'to the woman' supplies the relational sense. 'Talked with'
    is possible but slightly more conversational than the Hebrew requires.
- source_word: לָאִשָּׁה
  chosen: to the woman
  alternatives:
  - to the young woman
  - to the wife
  lexicon: HALOT
  rationale: אִשָּׁה commonly means 'woman' or 'wife' depending on context. Here the
    woman is the Timnite woman Samson desires but is not yet married to, so 'the woman'
    is the most contextually accurate and least interpretively loaded choice.
- source_word: וַתִּישַׁר
  chosen: she was pleasing
  alternatives:
  - she was right
  - she was agreeable
  - she pleased him
  lexicon: HALOT
  rationale: From ישר, the sense here is that she was pleasing or suitable in Samson's
    estimation. 'She was pleasing' preserves the stative nuance better than the more
    interpretive 'she pleased him,' while avoiding the overly literal but awkward
    'she was right.'
- source_word: בְּעֵינֵי שִׁמְשׁוֹן
  chosen: in Samson’s eyes
  alternatives:
  - to Samson
  - in the sight of Samson
  lexicon: HALOT
  rationale: The idiom 'in the eyes of' is common in Hebrew for evaluation or judgment.
    Retaining 'in Samson’s eyes' preserves the Hebrew imagery and subtly echoes the
    recurring Judges theme of what is right in one's own eyes, without overstating
    the connection in the main text.
