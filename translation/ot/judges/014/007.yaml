- issue: Possible thematic resonance with the book of Judges motif of what is right
    in one's own eyes
  chosen_reading: Retain the Hebrew idiom 'in Samson’s eyes' in the main text
  alternative_readings:
  - Render idiomatically as 'to Samson' or 'he liked her'
  rationale: This is not a doctrinally contested term, but the Hebrew wording may
    intentionally resonate with the broader literary theme in Judges. Preserving the
    idiom maintains that possible tension without forcing an interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it
