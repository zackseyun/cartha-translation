id: JDG.1.6
reference: Judges 1:6
source:
  edition: WLC
  text: וַ/יָּ֨נָס֙ אֲדֹ֣נִי בֶ֔זֶק וַֽ/יִּרְדְּפ֖וּ אַחֲרָ֑י/ו וַ/יֹּאחֲז֣וּ אֹת֔/וֹ
    וַֽ/יְקַצְּצ֔וּ אֶת בְּהֹנ֥וֹת יָדָ֖י/ו וְ/רַגְלָֽי/ו־׃
translation:
  text: But Adoni-bezek fled, and they pursued him, seized him, and cut off his thumbs
    and big toes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the thumbs of his hands and his feet,' that is, his thumbs
      and big toes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb נוּס in the wayyiqtol form denotes fleeing. 'Fled' is concise,
    natural English and preserves the narrative force better than the more interpretive
    'escaped,' since he was subsequently captured.
- source_word: אֲדֹנִי בֶזֶק
  chosen: Adoni-bezek
  alternatives:
  - Lord of Bezek
  lexicon: HALOT
  rationale: Following the translation philosophy, personal names are transliterated
    rather than translated. Although the components could mean 'lord of Bezek,' in
    context this functions as a proper name/title-name and is best carried over as
    'Adoni-bezek.'
- source_word: וַיִּרְדְּפוּ אַחֲרָיו
  chosen: they pursued him
  alternatives:
  - they chased after him
  lexicon: HALOT
  rationale: רדף + אַחַר commonly means to pursue/chase after. 'Pursued him' is idiomatic
    and slightly more formal, fitting the narrative style.
- source_word: וַיֹּאחֲזוּ אֹתוֹ
  chosen: seized him
  alternatives:
  - caught him
  - took hold of him
  lexicon: HALOT
  rationale: אחז means to grasp or seize. 'Seized him' conveys forceful capture in
    a compact way; 'caught him' is possible but slightly less vivid.
- source_word: וַיְקַצְּצוּ
  chosen: cut off
  alternatives:
  - cut down
  - chopped off
  lexicon: HALOT
  rationale: קצץ in this context refers to cutting off body parts. 'Cut off' is the
    standard and clearest English rendering.
- source_word: בְּהֹנוֹת
  chosen: thumbs and big toes
  alternatives:
  - great toes
  lexicon: HALOT
  rationale: בֹּהֶן refers to the thumb of the hand and the big toe of the foot. Because
    the Hebrew governs both 'his hands' and 'his feet,' idiomatic English must unpack
    the sense as 'thumbs and big toes' rather than a wooden 'the thumbs of his hands
    and of his feet.'
- source_word: יָדָיו וְרַגְלָיו
  chosen: his thumbs and big toes
  alternatives:
  - the thumbs of his hands and the big toes of his feet
  lexicon: HALOT
  rationale: The paired body parts specify the members affected. English normally
    expresses this idiomatically as 'his thumbs and big toes.' This is an optimal-equivalence
    smoothing that preserves the exact referents without awkwardness.
