theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH; this also aligns with longstanding English Bible convention and the reverential substitution pattern reflected in Jewish tradition and the LXX.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency and pronoun shift in the verse
  chosen_reading: Retain both divine agency ('the LORD gave') and human agency ('they struck down')
  alternative_readings:
  - Smooth the verse by making Judah singular throughout
  - Make the final clause passive
  rationale: The Hebrew presents the LORD as the one granting victory and the tribal forces as the ones carrying out the battle. Preserving this distinction avoids flattening the text's theology of divine sovereignty and human action.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
