id: JDG.1.4
reference: Judges 1:4
source:
  edition: WLC
  text: וַ/יַּ֣עַל יְהוּדָ֔ה וַ/יִּתֵּ֧ן יְהוָ֛ה אֶת הַ/כְּנַעֲנִ֥י וְ/הַ/פְּרִזִּ֖י בְּ/יָדָ֑/ם וַ/יַּכּ֣וּ/ם בְּ/בֶ֔זֶק עֲשֶׂ֥רֶת אֲלָפִ֖ים אִֽישׁ־׃
translation:
  text: Then Judah went up, and Yahweh gave the Canaanites and the Perizzites into their hand, and they struck down ten thousand men at Bezek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Canaanite and the Perizzite,' with the singular forms used collectively for the peoples.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' an idiom meaning into their power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - advanced
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In narrative of military movement it can denote advancing/upward movement. 'Went up' preserves the Hebrew idiom without overinterpreting the geography or military nuance.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the tribe/entity; transliterated per translation philosophy. Singular verb with collective subject supports 'Judah' as the tribal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the gentilic with article often functions collectively. English plural best reflects the collective ethnic sense in context, especially paired with 'the Perizzites' and followed by plural object reference.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: As with 'the Canaanites,' the singular gentilic is used collectively; English plural is the most natural rendering.
- source_word: בְּיָדָם
  chosen: into their hand
  alternatives:
  - into their power
  - into their hands
  lexicon: HALOT
  rationale: The idiom נתן ביד means 'give into the hand/power of.' 'Into their hand' keeps the Hebrew imagery while remaining understandable. Singular 'hand' reflects the Hebrew form more closely than idiomatic English plural 'hands.'
- source_word: וַיַּכּוּם
  chosen: they struck down
  alternatives:
  - they defeated
  - they killed
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite/defeat. In this military context with a numbered tally, 'struck down' preserves the violent force without specifying more than the text states. 'Killed' may be too specific if the verb denotes rout/defeat, while 'defeated' may understate the lethal context.
- source_word: בְּבֶזֶק
  chosen: at Bezek
  alternatives:
  - in Bezek
  lexicon: HALOT
  rationale: With place names, ב can be rendered 'at' or 'in.' 'At Bezek' fits battle-location usage in English.
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ
  chosen: ten thousand men
  alternatives:
  - ten thousand soldiers
  - ten thousand people
  lexicon: HALOT
  rationale: The Hebrew construction literally denotes 'ten thousand man/men.' 'Men' is gender-accurate and contextually refers to fighting males in battle. 'Soldiers' is interpretive; 'people' is too broad.
