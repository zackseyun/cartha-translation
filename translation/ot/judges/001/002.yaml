id: JDG.1.2
reference: Judges 1:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֖ה יְהוּדָ֣ה יַעֲלֶ֑ה הִנֵּ֛ה נָתַ֥תִּי אֶת הָ/אָ֖רֶץ בְּ/יָדֽ/וֹ־׃
translation:
  text: And Yahweh said, “Judah shall go up. Behold, I have given the land into his hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'See' or 'Behold' for 'Look.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into his hand,' an idiom meaning into Judah's power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And ... said' preserves the Hebrew narrative flow without unnecessary paraphrase.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper tribal/personal name is transliterated, in keeping with the translation philosophy to transliterate names rather than translate them.
- source_word: יַעֲלֶה
  chosen: shall go up
  alternatives:
  - will go up
  - must go up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In this military context it refers to going up to battle. 'Shall go up' preserves the concise Hebrew sense and the force of divine direction without over-expanding to 'go up first to fight' (supplied from context in v.1).
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern English and preserves the discourse force better than archaic 'Behold.'
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have delivered
  lexicon: HALOT
  rationale: The perfect form presents the action as accomplished from the speaker's perspective. 'I have given' preserves that completed-force sense, fitting the idiom of divine assurance before battle.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the territory
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land/territory to be taken in context, not the earth in a global sense. 'The land' is the most natural and biblically consistent rendering.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - into Judah's hand
  - under his power
  lexicon: HALOT
  rationale: The idiom 'into his hand' is a standard Hebrew expression for giving over into someone's power. Retaining 'hand' preserves the Hebrew imagery while remaining understandable in English. The pronoun refers back to Judah.
