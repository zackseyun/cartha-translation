id: JDG.1.19
reference: Judges 1:19
source:
  edition: WLC
  text: וַ/יְהִ֤י יְהוָה֙ אֶתּ יְהוּדָ֔ה וַ/יֹּ֖רֶשׁ אֶת הָ/הָ֑ר כִּ֣י לֹ֤א לְ/הוֹרִישׁ֙ אֶת יֹשְׁבֵ֣י הָ/עֵ֔מֶק כִּי רֶ֥כֶב בַּרְזֶ֖ל לָ/הֶֽם־־־־׃
translation:
  text: And Yahweh was with Judah, and he took possession of the hill country; but he could not drive out the inhabitants of the valley, because they had iron chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the plain' or 'lowland'; the Hebrew term can refer to a broad valley region.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: אֶתּ יְהוּדָה
  chosen: with Judah
  alternatives:
  - with the tribe of Judah
  lexicon: HALOT
  rationale: The preposition אֵת here marks accompaniment, not direct object. 'Judah' can stand metonymically for the tribe, but the simpler form preserves the Hebrew wording while remaining clear.
- source_word: וַיֹּרֶשׁ
  chosen: he took possession of
  alternatives:
  - he dispossessed
  - he occupied
  - he drove out
  lexicon: HALOT
  rationale: ירש in Hiphil can mean to take possession/dispossess. Here with 'the hill country' as object, 'took possession of' fits better than 'drove out,' which is used explicitly in the next clause with the infinitive לְהוֹרִישׁ.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountain region
  - the hill country of Judah
  lexicon: HALOT
  rationale: In context הָהָר refers to the upland region, not a single mountain. 'Hill country' is idiomatic and geographically accurate.
- source_word: כִּי לֹא לְהוֹרִישׁ
  chosen: but he could not drive out
  alternatives:
  - for he did not drive out
  - because he was unable to dispossess
  lexicon: HALOT
  rationale: The clause is elliptical after the previous finite verb. English requires supplying sense. Given the following reason clause ('because they had iron chariots'), 'could not drive out' best captures the implied inability. The conjunction is rendered adversatively as 'but' to reflect the contrast with the prior success.
- source_word: יֹשְׁבֵי הָעֵמֶק
  chosen: the inhabitants of the valley
  alternatives:
  - those living in the valley
  - the dwellers of the plain
  lexicon: HALOT
  rationale: A natural rendering of the participial construction. 'Valley' is the straightforward gloss for עֵמֶק, though in some contexts it can denote a broad lowland/plain.
- source_word: עֵמֶק
  chosen: valley
  alternatives:
  - plain
  - lowland
  lexicon: HALOT
  rationale: Default sense is 'valley.' Because the term can also denote a broad lowland, an alternative is worth preserving in a footnote.
- source_word: רֶכֶב בַּרְזֶל לָהֶם
  chosen: because they had iron chariots
  alternatives:
  - for iron chariots were theirs
  - because they possessed chariots of iron
  lexicon: HALOT
  rationale: This clause gives the reason for the failure. 'They had iron chariots' is clear modern English and preserves the sense of possession expressed by לָהֶם.
