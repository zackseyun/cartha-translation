id: JDG.1.22
reference: Judges 1:22
source:
  edition: WLC
  text: וַ/יַּעֲל֧וּ בֵית יוֹסֵ֛ף גַּם הֵ֖ם בֵּֽית אֵ֑ל וַֽ/יהוָ֖ה עִמָּֽ/ם־־־׃
translation:
  text: The house of Joseph also went up against Bethel, and Yahweh was with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up to Bethel.' The Hebrew verb literally says 'went up,' but in this military context it likely means advancing against the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up against
  alternatives:
  - went up
  - attacked
  - marched up against
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up,' but in military narrative with a target location following, it commonly carries the sense of advancing against or attacking. Rendering 'went up against' preserves the Hebrew idiom while making the hostile movement clear in context.
- source_word: בֵית יוֹסֵף
  chosen: The house of Joseph
  alternatives:
  - Joseph's house
  - the descendants of Joseph
  lexicon: HALOT
  rationale: A standard tribal/clan designation in Judges. 'The house of Joseph' preserves the formal covenantal-tribal language better than a more interpretive paraphrase.
- source_word: גַּם הֵם
  chosen: also
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: The phrase adds this action to the preceding tribal campaigns. English can express the emphasis naturally with 'also' without requiring the explicit pronoun in the main text.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: This is the standard English transliteration of the place name. The preposition is not separately expressed because the directional/hostile sense is already carried by 'went up against.'
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD' to reflect the covenant name in standard English Bible style while respecting the stated translation policy.
- source_word: עִמָּם
  chosen: was with them
  alternatives:
  - was on their side
  - was among them
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix here expresses divine presence/support. 'Was with them' is the most direct and idiomatic rendering, preserving both presence and favor without overinterpreting.
