id: JDG.1.1
reference: Judges 1:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵי֙ מ֣וֹת יְהוֹשֻׁ֔עַ וַֽ/יִּשְׁאֲלוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל בַּ/יהוָ֖ה לֵ/אמֹ֑ר מִ֣י יַעֲלֶה לָּ֧/נוּ אֶל הַֽ/כְּנַעֲנִ֛י בַּ/תְּחִלָּ֖ה לְ/הִלָּ֥חֶם בּֽ/וֹ־־׃
translation:
  text: And it happened after the death of Joshua that the sons of Israel asked Yahweh, saying, “Who will go up for us first against the Canaanites to fight against them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions have 'the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Canaanite' is singular in form but collective in sense; thus 'the Canaanites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened' preserves the Hebrew discourse function without archaic 'came to pass.'
- source_word: אַחֲרֵי מוֹת יְהוֹשֻׁעַ
  chosen: after the death of Joshua
  alternatives:
  - after Joshua died
  lexicon: HALOT
  rationale: Construct phrase with temporal preposition; the nominal form 'the death of Joshua' closely matches the Hebrew while remaining natural English.
- source_word: וַיִּשְׁאֲלוּ
  chosen: asked
  alternatives:
  - inquired
  - consulted
  lexicon: HALOT
  rationale: שׁאל here denotes seeking guidance. 'Asked' is the most direct and readable rendering; the object and context make clear this is inquiry of the LORD.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is preserved. 'Sons of Israel' is more formally transparent than 'Israelites,' while still idiomatic enough in this context.
- source_word: בַּיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the doctrine's contested-terms table.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' preserves the Hebrew structure.
- source_word: מִי יַעֲלֶה לָּנוּ
  chosen: Who will go up for us
  alternatives:
  - Who shall go up for us
  - Who will go up on our behalf
  lexicon: HALOT
  rationale: עלה commonly refers to military advance/upward movement into battle. 'For us' captures לָנוּ naturally; 'on our behalf' is possible but more interpretive.
- source_word: אֶל הַכְּנַעֲנִי
  chosen: against the Canaanites
  alternatives:
  - to the Canaanites
  - against the Canaanite
  lexicon: HALOT
  rationale: Though singular in form, הַכְּנַעֲנִי functions collectively here for the Canaanite population. In English, plural 'the Canaanites' best conveys the collective military sense. 'Against' reflects the hostile context better than a wooden 'to.'
- source_word: בַּתְּחִלָּה
  chosen: first
  alternatives:
  - at the beginning
  - first of all
  lexicon: HALOT
  rationale: In context of determining battle order among tribes, 'first' is the most natural idiomatic equivalent.
- source_word: לְהִלָּחֶם בּוֹ
  chosen: to fight against them
  alternatives:
  - to fight against him
  - to wage war against them
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם means 'to fight.' The pronominal suffix is singular, matching the collective singular 'the Canaanite,' but English shifts naturally to plural 'them' to agree with the collective sense already expressed as 'the Canaanites.'
