id: JDG.12.13
reference: Judges 12:13
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֥ט אַחֲרָ֖י/ו אֶת יִשְׂרָאֵ֑ל עַבְדּ֥וֹן בֶּן הִלֵּ֖ל הַ/פִּרְעָתוֹנִֽי־־׃
translation:
  text: After him, Abdon son of Hillel the Pirathonite judged Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - led
  - governed
  lexicon: HALOT
  rationale: The verb שׁפט in Judges regularly describes the activity of Israel's
    judges. 'Judged' preserves the book's recurring terminology and allows the broader
    sense of governing/delivering without over-specifying here.
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Afterward
  - After him in succession
  lexicon: HALOT
  rationale: The prepositional phrase with pronominal suffix indicates succession
    to the previous judge. 'After him' is the most direct and natural rendering.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct-object marker plus the proper name indicates that Israel is the
    people governed by Abdon. English does not require a marker, so it is omitted.
- source_word: עַבְדּוֹן
  chosen: Abdon
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בֶּן הִלֵּל
  chosen: son of Hillel
  alternatives:
  - the son of Hillel
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies Abdon's parentage.
    'Son of Hillel' is idiomatic and formally close.
- source_word: הַפִּרְעָתוֹנִי
  chosen: the Pirathonite
  alternatives:
  - from Pirathon
  lexicon: HALOT
  rationale: The gentilic with article denotes a man from Pirathon. 'The Pirathonite'
    preserves the Hebrew adjectival form and matches common English rendering of gentilics.
