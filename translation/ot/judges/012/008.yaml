id: JDG.12.8
reference: Judges 12:8
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֤ט אַֽחֲרָי/ו֙ אֶת יִשְׂרָאֵ֔ל אִבְצָ֖ן מִ/בֵּ֥ית לָֽחֶם־׃
translation:
  text: After him, Ibzan from Bethlehem judged Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "of Bethlehem." The Hebrew preposition can indicate origin or association.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - governed
  - led
  lexicon: HALOT
  rationale: The verb שׁפט in Judges regularly refers to the activity of a judge ruling
    or governing Israel. 'Judged' preserves the book's recurring terminology and avoids
    over-paraphrasing.
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - afterward
  - after Jephthah
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates succession to the previous
    judge. 'After him' is the most direct rendering; the antecedent is clear from
    context without importing the name into the verse.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: 'Direct-object marker plus proper noun: Ibzan''s sphere of judging is
    Israel. English does not represent the object marker separately.'
- source_word: אִבְצָן
  chosen: Ibzan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מִבֵּית לָחֶם
  chosen: from Bethlehem
  alternatives:
  - of Bethlehem
  lexicon: HALOT
  rationale: The prefixed preposition מִן normally indicates origin or association.
    'From Bethlehem' is the most natural English rendering, though 'of Bethlehem'
    is also possible.
