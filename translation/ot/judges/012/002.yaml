id: JDG.12.2
reference: Judges 12:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִפְתָּח֙ אֲלֵי/הֶ֔ם אִ֣ישׁ רִ֗יב הָיִ֛יתִי אֲנִ֛י וְ/עַמִּ֥/י
    וּ/בְנֵֽי עַמּ֖וֹן מְאֹ֑ד וָ/אֶזְעַ֣ק אֶתְ/כֶ֔ם וְ/לֹֽא הוֹשַׁעְתֶּ֥ם אוֹתִ֖/י
    מִ/יָּדָֽ/ם־־׃
translation:
  text: Jephthah said to them, “I and my people were in a bitter conflict with the
    Ammonites, and I called out to you, but you did not save me from their hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I was a man of strife, I and my people, with the Ammonites
      greatly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ רִיב
  chosen: in a bitter conflict
  alternatives:
  - a man of strife
  - in a dispute
  - in conflict
  lexicon: HALOT
  rationale: The idiom אִישׁ רִיב literally reads 'a man of dispute/strife,' but with
    היה it functions predicatively to describe Jephthah's situation rather than his
    character alone. 'In a bitter conflict' captures the idiomatic sense in natural
    English while preserving the intensity signaled by רִיב and reinforced by מְאֹד.
- source_word: וְעַמִּי
  chosen: and my people
  alternatives:
  - and my kinsmen
  - and my army
  lexicon: HALOT
  rationale: עַם normally means 'people.' There is no warrant to narrow it to 'army';
    'my people' best reflects the collective group associated with Jephthah in context.
- source_word: וּבְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: '''The Ammonites'' is the standard natural English rendering of the ethnonym
    בני עמון while preserving the referent.'
- source_word: מְאֹד
  chosen: bitter
  alternatives:
  - greatly
  - severely
  - intensely
  lexicon: HALOT
  rationale: מְאֹד intensifies the preceding conflict. In English, folding the adverb
    into the noun phrase as 'bitter conflict' yields a more natural rendering than
    'I was in conflict ... very much' while retaining the force.
- source_word: וָאֶזְעַק אֶתְכֶם
  chosen: I called out to you
  alternatives:
  - I cried out to you
  - I summoned you
  lexicon: HALOT
  rationale: זעק commonly denotes a cry for help. 'Called out to you' is readable
    modern English and fits the context of appeal for military aid; 'cried out' is
    possible but can sound more emotionally marked in English.
- source_word: וְלֹא הוֹשַׁעְתֶּם אֹתִי
  chosen: you did not save me
  alternatives:
  - you did not deliver me
  - you did not rescue me
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means to save/deliver. 'Save' is the most direct rendering
    and does not over-theologize the military context; 'deliver' and 'rescue' are
    viable alternatives.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from their power
  - out of their grasp
  lexicon: HALOT
  rationale: The idiom 'from their hand' is common biblical language for power/control.
    It is sufficiently transparent in English and preserves the Hebrew imagery better
    than a fully flattened paraphrase.
