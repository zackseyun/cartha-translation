id: JDG.12.1
reference: Judges 12:1
source:
  edition: WLC
  text: וַ/יִּצָּעֵק֙ אִ֣ישׁ אֶפְרַ֔יִם וַֽ/יַּעֲבֹ֖ר צָפ֑וֹנָ/ה וַ/יֹּאמְר֨וּ לְ/יִפְתָּ֜ח
    מַדּ֣וּעַ עָבַ֣רְתָּ לְ/הִלָּחֵ֣ם בִּ/בְנֵי עַמּ֗וֹן וְ/לָ֨/נוּ֙ לֹ֤א קָרָ֨אתָ֙
    לָ/לֶ֣כֶת עִמָּ֔/ךְ בֵּיתְ/ךָ֕ נִשְׂרֹ֥ף עָלֶ֖י/ךָ בָּ/אֵֽשׁ׀׀־׃
translation:
  text: Then the men of Ephraim were called together, and they crossed over to Zaphon
    and said to Jephthah, “Why did you cross over to fight against the Ammonites and
    not call us to go with you? We will burn your house down over you with fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'northward' if צָפוֹנָה is taken as a directional adverb rather than
      the place name Zaphon.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew literally has ''man of Ephraim,'' but the surrounding verbs indicate
      a collective sense: the Ephraimites as a group.'
    reason: lexical_alternative
  - marker: c
    text: The threat likely means, 'We will burn your house with you in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֵק אִישׁ אֶפְרַיִם
  chosen: the men of Ephraim were called together
  alternatives:
  - the man of Ephraim cried out
  - the men of Ephraim cried out
  - Ephraim was summoned
  lexicon: HALOT
  rationale: Although אִישׁ is morphologically singular ('man'), the following plural
    verb וַיֹּאמְרוּ ('they said') shows a collective sense. In context the phrase
    refers to the Ephraimites as a group being mustered or rallying together, not
    a single individual. Rendering it as 'the men of Ephraim were called together'
    captures the collective force and avoids an English singular-plural mismatch.
- source_word: וַיַּעֲבֹר
  chosen: they crossed over
  alternatives:
  - he crossed over
  lexicon: HALOT
  rationale: 'The consonantal form is singular, but in context after the collective
    subject ''the men of Ephraim'' and before the plural speech verb, English naturally
    renders the action collectively: ''they crossed over.'' This reflects the sense
    rather than forcing a misleading singular in English.'
- source_word: צָפוֹנָה
  chosen: to Zaphon
  alternatives:
  - northward
  lexicon: HALOT
  rationale: Here צָפוֹנָה is best taken as a place name, Zaphon, rather than the
    adverb 'northward,' since the narrative likely specifies the location to which
    the Ephraimites crossed. This avoids a potentially awkward geographical statement
    and matches many contextual readings of the verse.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: A straightforward interrogative introducing their complaint.
- source_word: עָבַרְתָּ
  chosen: did you cross over
  alternatives:
  - did you go over
  lexicon: HALOT
  rationale: Keeps the repeated עבר language from earlier in the verse and preserves
    the military-movement nuance.
- source_word: לְהִלָּחֵם בִּבְנֵי עַמּוֹן
  chosen: to fight against the Ammonites
  alternatives:
  - to fight the sons of Ammon
  - to wage war against the Ammonites
  lexicon: HALOT
  rationale: '''Ammonites'' is the natural English rendering of ''sons of Ammon.''
    ''Fight against'' is idiomatic and clear.'
- source_word: וְלָנוּ לֹא קָרָאתָ
  chosen: and not call us
  alternatives:
  - and did not summon us
  - and did not invite us
  lexicon: HALOT
  rationale: קרא in this context means to call/summon for participation in battle.
    'Call us' is concise and natural.
- source_word: לָלֶכֶת עִמָּךְ
  chosen: to go with you
  alternatives:
  - to come with you
  lexicon: HALOT
  rationale: A simple infinitive phrase expressing participation in the campaign.
- source_word: בֵּיתְךָ נִשְׂרֹף עָלֶיךָ בָּאֵשׁ
  chosen: We will burn your house down over you with fire
  alternatives:
  - We will burn your house over you with fire
  - We will set your house on fire with you in it
  lexicon: HALOT
  rationale: The Hebrew threat is vivid and severe. 'Burn your house down over you
    with fire' preserves the image of Jephthah being inside or under the burning house
    without adding too much interpretive expansion. 'With fire' is retained though
    somewhat redundant in English because it is explicit in the Hebrew.
