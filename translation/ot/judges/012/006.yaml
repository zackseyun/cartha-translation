id: JDG.12.6
reference: Judges 12:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמְרוּ ל/וֹ֩ אֱמָר נָ֨א שִׁבֹּ֜לֶת וַ/יֹּ֣אמֶר סִבֹּ֗לֶת וְ/לֹ֤א יָכִין֙
    לְ/דַבֵּ֣ר כֵּ֔ן וַ/יֹּאחֲז֣וּ אוֹת֔/וֹ וַ/יִּשְׁחָט֖וּ/הוּ אֶל מַעְבְּר֣וֹת הַ/יַּרְדֵּ֑ן
    וַ/יִּפֹּ֞ל בָּ/עֵ֤ת הַ/הִיא֙ מֵֽ/אֶפְרַ֔יִם אַרְבָּעִ֥ים וּ/שְׁנַ֖יִם אָֽלֶף־־׃
translation:
  text: Then they said to him, “Please say ‘Shibboleth.’” But he said, “Sibboleth,”
    because he could not pronounce it that way. So they seized him and slaughtered
    him at the fords of the Jordan. At that time forty-two thousand from Ephraim fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shibboleth likely means 'ear of grain' or 'stream/flood,' but here
      it is used as a pronunciation test-word.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמָר נָא
  chosen: Please say
  alternatives:
  - Say, please
  - Please pronounce
  lexicon: HALOT
  rationale: Imperative אמר with particle נָא expresses a polite/requesting force.
    'Please say' is natural modern English and preserves the request tone.
- source_word: שִׁבֹּלֶת
  chosen: Shibboleth
  alternatives:
  - ear of grain
  - stream
  - flood
  lexicon: HALOT
  rationale: Here the word functions as a pronunciation test rather than by its lexical
    meaning, so transliteration best preserves the narrative point. The lexical senses
    are worth preserving in a footnote.
- source_word: סִבֹּלֶת
  chosen: Sibboleth
  lexicon: HALOT
  rationale: The altered pronunciation is central to the episode. Transliteration
    into English preserves the contrast between initial 'sh' and 's' sounds.
- source_word: וְלֹא יָכִין לְדַבֵּר כֵּן
  chosen: because he could not pronounce it that way
  alternatives:
  - for he could not speak thus
  - because he could not say it correctly
  lexicon: HALOT
  rationale: The idiom literally means he could not 'prepare/direct himself to speak
    thus.' In context it refers to inability to articulate the requested pronunciation.
    'Pronounce it that way' communicates the sense clearly in modern English.
- source_word: וַיֹּאחֲזוּ אֹתוֹ
  chosen: they seized him
  alternatives:
  - they took hold of him
  - they captured him
  lexicon: HALOT
  rationale: אחז commonly means grasp or seize. 'Seized' fits the immediate arrest
    after the failed pronunciation test.
- source_word: וַיִּשְׁחָטוּהוּ
  chosen: slaughtered him
  alternatives:
  - killed him
  - butchered him
  lexicon: HALOT
  rationale: שׁחט is stronger and more graphic than a generic 'kill,' often used for
    slaughtering. 'Slaughtered' preserves the brutality without becoming colloquial.
- source_word: אֶל מַעְבְּרוֹת הַיַּרְדֵּן
  chosen: at the fords of the Jordan
  alternatives:
  - by the crossing places of the Jordan
  - at the crossings of the Jordan
  lexicon: HALOT
  rationale: מַעְבְּרוֹת refers to crossing places, especially river fords. 'At the
    fords of the Jordan' is idiomatic and precise.
- source_word: וַיִּפֹּל ... מֵאֶפְרַיִם
  chosen: from Ephraim fell
  alternatives:
  - Ephraimites fell
  - of Ephraim fell
  lexicon: HALOT
  rationale: נפל in battle contexts means 'fall' = die. The phrase denotes members
    of the tribe/region of Ephraim. The main text uses natural English 'from Ephraim
    fell' recast as 'forty-two thousand from Ephraim fell.'
- source_word: אַרְבָּעִים וּשְׁנַיִם אָלֶף
  chosen: forty-two thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained exactly.
