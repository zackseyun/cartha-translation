id: JDG.12.14
reference: Judges 12:14
source:
  edition: WLC
  text: וַ/יְהִי ל֞/וֹ אַרְבָּעִ֣ים בָּנִ֗ים וּ/שְׁלֹשִׁים֙ בְּנֵ֣י בָנִ֔ים רֹכְבִ֖ים
    עַל שִׁבְעִ֣ים עֲיָרִ֑ם וַ/יִּשְׁפֹּ֥ט אֶת יִשְׂרָאֵ֖ל שְׁמֹנֶ֥ה שָׁנִֽים־־־׃
translation:
  text: He had forty sons and thirty grandsons, riding on seventy donkeys, and he
    judged Israel eight years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seventy young donkeys.' The Hebrew term can refer specifically to young
      donkeys in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  chosen: He had
  alternatives:
  - And there were to him
  lexicon: HALOT
  rationale: The Hebrew idiom 'and it was to him' naturally expresses possession in
    English. 'He had' is the clearest optimal-equivalence rendering.
- source_word: אַרְבָּעִים בָּנִים
  chosen: forty sons
  alternatives:
  - forty children
  lexicon: HALOT
  rationale: בָּנִים here specifically means male offspring, not children in general,
    so 'sons' is gender-accurate.
- source_word: וּשְׁלֹשִׁים בְּנֵי בָנִים
  chosen: and thirty grandsons
  alternatives:
  - and thirty sons of sons
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of sons' and idiomatically
    refers to grandsons. 'Grandsons' is natural English and preserves the male reference.
- source_word: רֹכְבִים
  chosen: riding
  alternatives:
  - who rode
  lexicon: HALOT
  rationale: The participle describes the sons and grandsons as mounted. 'Riding'
    keeps the descriptive force in smooth English.
- source_word: עַל שִׁבְעִים עֲיָרִם
  chosen: on seventy donkeys
  alternatives:
  - on seventy young donkeys
  - on seventy asses
  lexicon: HALOT
  rationale: עֲיָרִם denotes donkeys, often young donkeys/colts in some contexts.
    Here the broader 'donkeys' is sufficiently precise and idiomatic; 'asses' is archaic
    in modern English.
- source_word: וַיִּשְׁפֹּט אֶת־יִשְׂרָאֵל
  chosen: and he judged Israel
  alternatives:
  - and he led Israel as judge
  lexicon: HALOT
  rationale: The standard language of Judges uses שׁפט for the governing activity
    of the judges. 'Judged Israel' preserves the canonical wording without over-paraphrasing.
- source_word: שְׁמֹנֶה שָׁנִים
  chosen: eight years
  lexicon: HALOT
  rationale: Straightforward numerical expression.
