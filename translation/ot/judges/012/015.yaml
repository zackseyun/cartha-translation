id: JDG.12.15
reference: Judges 12:15
source:
  edition: WLC
  text: וַ/יָּ֛מָת עַבְדּ֥וֹן בֶּן הִלֵּ֖ל הַ/פִּרְעָתוֹנִ֑י וַ/יִּקָּבֵ֤ר בְּ/פִרְעָתוֹן֙
    בְּ/אֶ֣רֶץ אֶפְרַ֔יִם בְּ/הַ֖ר הָ/עֲמָלֵקִֽי־׃פ
translation:
  text: And Abdon son of Hillel the Pirathonite died, and he was buried in Pirathon,
    in the land of Ephraim, in the hill country of the Amalekites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'in the mountain of the Amalekite.' The Hebrew likely
      uses a singular gentilic in a collective or territorial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות straightforwardly denotes death. 'Died' is the plain, direct
    English equivalent and avoids euphemism.
- source_word: עַבְדּוֹן
  chosen: Abdon
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Construct relationship marking filiation is naturally rendered 'son of'
    in English.
- source_word: הִלֵּל
  chosen: Hillel
  rationale: Personal name transliterated by standard convention.
- source_word: הַפִּרְעָתוֹנִי
  chosen: the Pirathonite
  alternatives:
  - a man of Pirathon
  lexicon: HALOT
  rationale: The gentilic with article identifies Abdon by origin. 'The Pirathonite'
    is concise and conventional while preserving the adjectival force.
- source_word: וַיִּקָּבֵר
  chosen: he was buried
  alternatives:
  - and was buried
  lexicon: HALOT
  rationale: Niphal of קבר is passive/reflexive in sense here. English requires an
    explicit subject for smoothness; 'he was buried' accurately conveys the passive
    event.
- source_word: בְּפִרְעָתוֹן
  chosen: in Pirathon
  rationale: Toponym transliterated; preposition ב rendered locatively as 'in'.
- source_word: בְּאֶרֶץ אֶפְרַיִם
  chosen: in the land of Ephraim
  alternatives:
  - in Ephraim
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אֶרֶץ, so 'the land of Ephraim' preserves
    the fuller geographic expression rather than compressing it.
- source_word: בְּהַר הָעֲמָלֵקִי
  chosen: in the hill country of the Amalekites
  alternatives:
  - in the mountain of the Amalekite
  - in the hill country of the Amalekite
  lexicon: HALOT
  rationale: הַר in regional descriptions commonly refers to hill country rather than
    a single mountain. Although the gentilic is morphologically singular ('the Amalekite'),
    in English the collective sense is best represented by 'the Amalekites' for a
    territorial designation.
