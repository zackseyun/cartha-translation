id: JDG.12.9
reference: Judges 12:9
source:
  edition: WLC
  text: וַ/יְהִי ל֞/וֹ שְׁלֹשִׁ֣ים בָּנִ֗ים וּ/שְׁלֹשִׁ֤ים בָּנוֹת֙ שִׁלַּ֣ח הַ/ח֔וּצָ/ה
    וּ/שְׁלֹשִׁ֣ים בָּנ֔וֹת הֵבִ֥יא לְ/בָנָ֖י/ו מִן הַ/ח֑וּץ וַ/יִּשְׁפֹּ֥ט אֶת יִשְׂרָאֵ֖ל
    שֶׁ֥בַע שָׁנִֽים־־־׃
translation:
  text: He had thirty sons, and thirty daughters he sent away, and he brought in thirty
    daughters from outside for his sons. And he judged Israel seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'he married off thirty daughters outside his clan/household,
      and brought in thirty women from outside for his sons.' The Hebrew literally
      says 'daughters' in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  chosen: He had
  alternatives:
  - And there were to him
  lexicon: HALOT
  rationale: The idiom with היה + ל expresses possession. Natural English is 'He had,'
    which preserves the sense without wooden phrasing.
- source_word: שְׁלֹשִׁים בָּנִים
  chosen: thirty sons
  lexicon: HALOT
  rationale: Straightforward numerical phrase; 'sons' is gender-accurate and should
    not be neutralized.
- source_word: וּשְׁלֹשִׁים בָּנוֹת
  chosen: and thirty daughters
  lexicon: HALOT
  rationale: Straightforward numerical phrase; 'daughters' is the plain sense.
- source_word: שִׁלַּח הַחוּצָה
  chosen: he sent away
  alternatives:
  - he sent out
  - he married off outside
  lexicon: HALOT
  rationale: שׁלח means 'send.' With הַחוּצָה ('outward/outside'), the sense is that
    he sent his daughters out from his household, likely in marriage. 'He sent away'
    keeps the Hebrew wording without over-interpreting the marital arrangement in
    the main text.
- source_word: הַחוּצָה
  chosen: away
  alternatives:
  - outside
  - out
  lexicon: HALOT
  rationale: The directional form literally means 'to the outside/outward.' In idiomatic
    English after 'sent,' 'away' communicates the movement naturally. The more literal
    'outside' is preserved conceptually in the footnoted alternative.
- source_word: וּשְׁלֹשִׁים בָּנוֹת הֵבִיא לְבָנָיו מִן הַחוּץ
  chosen: and he brought in thirty daughters from outside for his sons
  alternatives:
  - and he brought thirty women from outside for his sons
  - and he brought in thirty daughters from elsewhere for his sons
  lexicon: HALOT
  rationale: The Hebrew repeats 'daughters,' idiomatically referring to young women
    as wives for his sons. Retaining 'daughters' reflects the source wording, while
    'for his sons' clarifies the marriage context. 'From outside' / 'from elsewhere'
    indicates they came from beyond his immediate clan or locality.
- source_word: מִן הַחוּץ
  chosen: from outside
  alternatives:
  - from elsewhere
  - from abroad
  lexicon: HALOT
  rationale: Literally 'from the outside.' 'From outside' is the closest natural rendering;
    'from abroad' would overstate geographic distance.
- source_word: וַיִּשְׁפֹּט אֶת־יִשְׂרָאֵל
  chosen: And he judged Israel
  alternatives:
  - And he led Israel
  - And he governed Israel
  lexicon: HALOT
  rationale: In Judges, שׁפט is the standard verb for the role of a judge-deliverer.
    'Judged' preserves the book's recurring terminology better than interpretive alternatives
    like 'led' or 'governed.'
- source_word: שֶׁבַע שָׁנִים
  chosen: seven years
  lexicon: HALOT
  rationale: Standard temporal expression.
