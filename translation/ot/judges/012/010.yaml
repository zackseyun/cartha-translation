id: JDG.12.10
reference: Judges 12:10
source:
  edition: WLC
  text: וַ/יָּ֣מָת אִבְצָ֔ן וַ/יִּקָּבֵ֖ר בְּ/בֵ֥ית לָֽחֶם׃פ
translation:
  text: Then Ibzan died and was buried in Bethlehem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - And ... died
  - '... died'
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative sequence without over-literal repetition of 'and.' The verb means 'died.'
- source_word: אִבְצָן
  chosen: Ibzan
  rationale: Personal names are transliterated by standard convention rather than
    translated.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  - was interred
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here; 'was buried' is the
    standard clear English rendering.
- source_word: בְּבֵית לָחֶם
  chosen: in Bethlehem
  alternatives:
  - at Bethlehem
  - in Beth-lehem
  lexicon: HALOT
  rationale: The preposition ב marks location, naturally rendered 'in.' The place
    name בֵּית לָחֶם is conventionally transliterated 'Bethlehem.'
