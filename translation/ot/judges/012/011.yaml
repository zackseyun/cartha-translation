id: JDG.12.11
reference: Judges 12:11
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֤ט אַֽחֲרָי/ו֙ אֶת יִשְׂרָאֵ֔ל אֵיל֖וֹן הַ/זְּבֽוּלֹנִ֑י וַ/יִּשְׁפֹּ֥ט
    אֶת יִשְׂרָאֵ֖ל עֶ֥שֶׂר שָׁנִֽים־־׃
translation:
  text: After him, Elon the Zebulunite judged Israel, and he judged Israel ten years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - led
  - governed
  lexicon: HALOT
  rationale: In Judges, שׁפט refers to the activity of the judges over Israel; 'judged'
    preserves the book's recurring terminology and avoids over-interpreting the office
    as merely military or administrative.
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Afterward
  - After Ibzan
  lexicon: HALOT
  rationale: The pronominal form means 'after him,' referring back to the previous
    judge in context. The more explicit 'after Ibzan' is interpretive and not stated
    in this verse.
- source_word: אֵילוֹן
  chosen: Elon
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הַזְּבוּלֹנִי
  chosen: the Zebulunite
  alternatives:
  - from Zebulun
  lexicon: HALOT
  rationale: The gentilicial form identifies Elon by tribal affiliation. 'The Zebulunite'
    is a natural and sufficiently formal rendering; 'from Zebulun' is possible but
    less precise to the adjectival form.
- source_word: עֶשֶׂר שָׁנִים
  chosen: ten years
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the duration expression.
- source_word: וַיִּשְׁפֹּט אֶת־יִשְׂרָאֵל ... וַיִּשְׁפֹּט אֶת־יִשְׂרָאֵל
  chosen: judged Israel ... and he judged Israel
  alternatives:
  - judged Israel ... for ten years
  - was judge over Israel for ten years
  lexicon: HALOT
  rationale: The Hebrew repeats the verb twice, first introducing Elon and then stating
    the duration of his judging. The English keeps the repetition rather than collapsing
    it entirely, preserving the source text's structure while remaining readable.
