id: JDG.12.3
reference: Judges 12:3
source:
  edition: WLC
  text: וָֽ/אֶרְאֶ֞ה כִּֽי אֵינְ/ךָ֣ מוֹשִׁ֗יע וָ/אָשִׂ֨ימָ/ה נַפְשִׁ֤/י בְ/כַפִּ/י֙ וָֽ/אֶעְבְּרָ/ה֙ אֶל בְּנֵ֣י עַמּ֔וֹן וַ/יִּתְּנֵ֥/ם יְהוָ֖ה בְּ/יָדִ֑/י וְ/לָ/מָ֞ה עֲלִיתֶ֥ם אֵלַ֛/י הַ/יּ֥וֹם הַ/זֶּ֖ה לְ/הִלָּ֥חֶם בִּֽ/י־־׃
translation:
  text: When I saw that you were not delivering us, I put my life in my hand and crossed over against the Ammonites, and Yahweh gave them into my hand. So why have you come up against me today to fight against me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I put my life in my hand,'' an idiom meaning ''I risked my life.'''
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: When I saw
  alternatives:
  - And I saw
  - So I saw
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה introduces Jephthah's perception leading to action. 'When I saw' fits the temporal-causal flow in English better than a bare sequential 'and I saw.'
- source_word: כִּי אֵינְךָ מוֹשִׁיעַ
  chosen: that you were not delivering
  alternatives:
  - that you were not saving
  - that there was no one delivering
  lexicon: HALOT
  rationale: מוֹשִׁיעַ from ישׁע denotes rescue/deliverance in military context. Address is singular to the king or representative addressee, so 'you were not delivering' preserves the direct accusation. 'Delivering' avoids importing soteriological overtones of 'saving' while retaining the rescue sense.
- source_word: וָאָשִׂימָה נַפְשִׁי בְכַפִּי
  chosen: I put my life in my hand
  alternatives:
  - I took my life in my hand
  - I risked my life
  lexicon: HALOT
  rationale: This is a Hebrew idiom for risking one's life. The more literal 'put my life in my hand' preserves the imagery while remaining intelligible; the idiomatic sense is clear from context.
- source_word: וָאֶעְבְּרָה אֶל בְּנֵי עַמּוֹן
  chosen: and crossed over against the Ammonites
  alternatives:
  - and crossed over to the Ammonites
  - and advanced against the Ammonites
  lexicon: HALOT
  rationale: עבר with אֶל in battle narrative can denote moving across/over toward an opponent. 'Against the Ammonites' makes the hostile direction explicit in English without over-paraphrasing.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: Standard English ethnonym is the most natural rendering of the Hebrew gentilic expression.
- source_word: וַיִּתְּנֵם יְהוָה בְּיָדִי
  chosen: and the LORD gave them into my hand
  alternatives:
  - and the LORD gave them into my power
  - and the LORD delivered them into my hand
  lexicon: HALOT
  rationale: This is a common victory formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Into my hand' preserves the Hebrew idiom and military sense.
- source_word: וְלָמָה עֲלִיתֶם אֵלַי
  chosen: So why have you come up against me
  alternatives:
  - And why have you come up to me
  - So why did you come up against me
  lexicon: HALOT
  rationale: עלה in military contexts often means to go up against in attack. 'Against me' is warranted by the following infinitive 'to fight against me' and avoids a misleadingly neutral 'to me.' Present perfect fits the rhetorical force in English.
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic modern English equivalent of the Hebrew deictic time expression.
- source_word: לְהִלָּחֶם בִּי
  chosen: to fight against me
  alternatives:
  - to wage war against me
  - to fight me
  lexicon: HALOT
  rationale: Niphal infinitive of לחם with ב conveys hostile combat. 'Fight against me' preserves the adversative force more clearly than simply 'fight me.'
