id: JDG.12.5
reference: Judges 12:5
source:
  edition: WLC
  text: וַ/יִּלְכֹּ֥ד גִּלְעָ֛ד אֶֽת מַעְבְּר֥וֹת הַ/יַּרְדֵּ֖ן לְ/אֶפְרָ֑יִם וְֽ֠/הָיָה
    כִּ֣י יֹאמְר֞וּ פְּלִיטֵ֤י אֶפְרַ֨יִם֙ אֶעֱבֹ֔רָה וַ/יֹּ֨אמְרוּ ל֧/וֹ אַנְשֵֽׁי
    גִלְעָ֛ד הַֽ/אֶפְרָתִ֥י אַ֖תָּה וַ/יֹּ֥אמֶֽר לֹֽא־־׀׃
translation:
  text: And Gilead captured the fords of the Jordan against Ephraim. And whenever
    the fugitives of Ephraim said, “Let me cross over,” the men of Gilead would say
    to him, “Are you an Ephraimite?” If he said, “No,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “crossing places.” The Hebrew refers to the river fords, the shallow
      places used to cross the Jordan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize. 'Captured' fits the military
    context of taking control of strategic crossing points.
- source_word: מַעְבְּרוֹת
  chosen: fords
  alternatives:
  - crossing places
  - crossings
  lexicon: HALOT
  rationale: Refers specifically to shallow crossing points in a river. 'Fords' is
    the most precise concise English equivalent.
- source_word: לְאֶפְרָיִם
  chosen: against Ephraim
  alternatives:
  - toward Ephraim
  - for Ephraim
  lexicon: HALOT
  rationale: 'The preposition ל here is best understood in a hostile/dative-of-reference
    sense in context: Gilead took the Jordan fords so as to block or control them
    against Ephraim.'
- source_word: וְהָיָה כִּי
  chosen: And whenever
  alternatives:
  - And it happened that when
  - And when
  lexicon: HALOT
  rationale: This idiom introduces a repeated or customary situation in narrative.
    'Whenever' conveys the iterative sense more naturally than a wooden rendering.
- source_word: פְּלִיטֵי אֶפְרַיִם
  chosen: the fugitives of Ephraim
  alternatives:
  - the escapees of Ephraim
  - the survivors of Ephraim
  lexicon: HALOT
  rationale: פּליט denotes one who has escaped, often from battle. 'Fugitives' best
    matches the immediate context of defeated men trying to get away.
- source_word: אֶעֱבֹרָה
  chosen: Let me cross over
  alternatives:
  - I want to cross over
  - I will cross over
  lexicon: HALOT
  rationale: First person cohortative expresses desire/request. 'Let me cross over'
    captures the polite/requestive force in context.
- source_word: הַאֶפְרָתִי
  chosen: an Ephraimite
  alternatives:
  - the Ephraimite
  lexicon: HALOT
  rationale: The gentilic asks about tribal identity. English idiom prefers the indefinite
    predicate 'an Ephraimite' in direct questioning.
- source_word: וַיֹּאמְרוּ לוֹ ... אַתָּה
  chosen: would say to him, “Are you an Ephraimite?”
  alternatives:
  - said to him, 'Are you an Ephraimite?'
  - would ask him, 'Are you an Ephraimite?'
  lexicon: HALOT
  rationale: The Hebrew is literally 'and they said to him, Are you...?' In English,
    a direct question is best rendered with interrogative syntax. 'Would say' preserves
    the iterative sense established by the clause.
- source_word: וַיֹּאמֶר לֹא
  chosen: If he said, “No,”
  alternatives:
  - and he said, 'No'
  lexicon: HALOT
  rationale: 'Though formally wayyiqtol, in this procedural sequence it functions
    conditionally after the repeated setup: if the man denied being an Ephraimite,
    the next step followed. ''If he said'' makes the logic clear in English while
    staying close to the sense.'
