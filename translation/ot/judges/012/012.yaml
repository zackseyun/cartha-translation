id: JDG.12.12
reference: Judges 12:12
source:
  edition: WLC
  text: וַ/יָּ֖מָת אֵל֣וֹן הַ/זְּבֽוּלֹנִ֑י וַ/יִּקָּבֵ֥ר בְּ/אַיָּל֖וֹן בְּ/אֶ֥רֶץ
    זְבוּלֻֽן׃פ
translation:
  text: Then Elon the Zebulunite died, and he was buried in Aijalon, in the land of
    Zebulun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the territory of Zebulun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - and ... died
  - so ... died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence. 'Then ... died'
    gives natural English narrative progression while preserving the simple sense
    'died'.
- source_word: אֵלוֹן
  chosen: Elon
  rationale: Personal name is transliterated according to the translation philosophy's
    preference to transliterate names rather than translate them.
- source_word: הַזְּבוּלֹנִי
  chosen: the Zebulunite
  alternatives:
  - the man of Zebulun
  lexicon: HALOT
  rationale: The gentilic with article identifies Elon by tribal/regional affiliation.
    'The Zebulunite' is the standard concise English rendering.
- source_word: וַיִּקָּבֵר
  chosen: and he was buried
  alternatives:
  - and was buried
  lexicon: HALOT
  rationale: 'Nifal of קבר is passive/reflexive in sense: ''was buried.'' Including
    ''he'' makes the English explicit and clear without adding meaning.'
- source_word: בְּאַיָּלוֹן
  chosen: in Aijalon
  alternatives:
  - at Aijalon
  rationale: Place name is transliterated. 'In Aijalon' is the most natural rendering
    for burial location with בְּ.
- source_word: בְּאֶרֶץ זְבוּלֻן
  chosen: in the land of Zebulun
  alternatives:
  - in the territory of Zebulun
  lexicon: HALOT
  rationale: אֶרֶץ here denotes land/territory. 'Land of Zebulun' is a clear, formally
    close rendering and fits the geographic notice.
