id: JDG.12.4
reference: Judges 12:4
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֤ץ יִפְתָּח֙ אֶת כָּל אַנְשֵׁ֣י גִלְעָ֔ד וַ/יִּלָּ֖חֶם אֶת אֶפְרָ֑יִם
    וַ/יַּכּוּ֩ אַנְשֵׁ֨י גִלְעָ֜ד אֶת אֶפְרַ֗יִם כִּ֤י אָמְרוּ֙ פְּלִיטֵ֤י אֶפְרַ֨יִם֙
    אַתֶּ֔ם גִּלְעָ֕ד בְּ/ת֥וֹךְ אֶפְרַ֖יִם בְּ/ת֥וֹךְ מְנַשֶּֽׁה־־־־׃
translation:
  text: Then Jephthah gathered all the men of Gilead and fought with Ephraim. And
    the men of Gilead struck Ephraim down, because they had said, “You Gileadites
    are fugitives of Ephraim, in the midst of Ephraim and in the midst of Manasseh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult in the final accusation; alternatively, 'You are fugitives
      of Ephraim, O Gilead, among Ephraim and among Manasseh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: The verb קבץ commonly means to gather or assemble. 'Gathered' is natural
    modern English and preserves the military mobilization sense without over-specifying
    formal conscription.
- source_word: כָּל אַנְשֵׁי גִלְעָד
  chosen: all the men of Gilead
  alternatives:
  - all the menfolk of Gilead
  - all the warriors of Gilead
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In this battle context it refers to the
    fighting men or representatives of Gilead, but 'men of Gilead' stays closer to
    the Hebrew and preserves the gender-accurate wording required by the translation
    philosophy.
- source_word: וַיִּלָּחֶם אֶת אֶפְרָיִם
  chosen: fought with Ephraim
  alternatives:
  - fought against Ephraim
  - went to war with Ephraim
  lexicon: HALOT
  rationale: The Niphal of לחם in battle contexts means to fight. 'Fought with' is
    idiomatic and reflects the direct engagement; 'against' is possible but the Hebrew
    construction here is adequately represented by 'with' in English.
- source_word: וַיַּכּוּ
  chosen: struck ... down
  alternatives:
  - defeated
  - struck
  - killed
  lexicon: HALOT
  rationale: נכה often means to strike, smite, or defeat. 'Struck ... down' preserves
    the violent military sense without claiming more than the verb itself specifies
    in this clause. 'Defeated' is possible but less vivid; 'killed' is too narrow.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the attack. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: פְּלִיטֵי אֶפְרַיִם
  chosen: fugitives of Ephraim
  alternatives:
  - escapees of Ephraim
  - survivors of Ephraim
  - renegades of Ephraim
  lexicon: HALOT
  rationale: פְּלִיטִים are those who have escaped or fled. 'Fugitives' best captures
    the insulting force in the taunt. The phrase is syntactically difficult in context,
    but this rendering preserves the lexical value of the noun rather than smoothing
    it away.
- source_word: אַתֶּם גִּלְעָד
  chosen: You Gileadites
  alternatives:
  - You are Gilead
  - You men of Gilead
  lexicon: HALOT
  rationale: The Hebrew uses the place name for its people. 'You Gileadites' is idiomatic
    English and conveys the collective address.
- source_word: בְּתוֹךְ אֶפְרַיִם בְּתוֹךְ מְנַשֶּׁה
  chosen: in the midst of Ephraim and in the midst of Manasseh
  alternatives:
  - among Ephraim and among Manasseh
  - between Ephraim and Manasseh
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst of' or 'among.' The repetition
    is retained rather than collapsed, since it is present in the Hebrew and contributes
    to the taunt's wording. 'Between' is interpretive and less literal.
