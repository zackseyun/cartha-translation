theological_decisions:
- issue: Syntactically difficult insult in the final clause
  chosen_reading: 'The speakers'' insult is rendered as direct speech: ''You Gileadites
    are fugitives of Ephraim, in the midst of Ephraim and in the midst of Manasseh.'''
  alternative_readings:
  - '''because they said, "You are fugitives of Ephraim, O Gilead, among Ephraim and
    among Manasseh"'
  - '''because Ephraim had said, "You Gileadites are Ephraimite fugitives in the midst
    of Ephraim and Manasseh"'
  rationale: The Hebrew of the accusation is compressed and awkward. The chosen rendering
    preserves the directness of the insult and the lexical force of פְּלִיטֵי while
    avoiding a paraphrase that would over-resolve the syntax. No doctrinal issue is
    at stake, but the ambiguity should remain visible to readers.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
