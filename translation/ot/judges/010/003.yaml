id: JDG.10.3
reference: Judges 10:3
source:
  edition: WLC
  text: וַ/יָּ֣קָם אַחֲרָ֔י/ו יָאִ֖יר הַ/גִּלְעָדִ֑י וַ/יִּשְׁפֹּט֙ אֶת יִשְׂרָאֵ֔ל
    עֶשְׂרִ֥ים וּ/שְׁתַּ֖יִם שָׁנָֽה־׃
translation:
  text: After him arose Jair the Gileadite, and he judged Israel twenty-two years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came after him' for the opening succession formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - came after
  - rose up
  lexicon: HALOT
  rationale: The verb קום in this narrative succession formula commonly marks the
    rise or appearance of the next leader after the previous one. 'Arose' preserves
    the formal narrative texture better than the more interpretive 'came after,' while
    still reading naturally in English.
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - afterward
  - after him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers to the immediately preceding
    judge. 'After him' is the most direct rendering and preserves the personal succession
    indicated in the Hebrew.
- source_word: יָאִיר
  chosen: Jair
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - from Gilead
  lexicon: HALOT
  rationale: The gentilic adjective identifies Jair by regional origin or affiliation.
    'The Gileadite' is the standard and sufficiently transparent English rendering,
    preserving the adjectival force better than the more expansive 'from Gilead.'
- source_word: וַיִּשְׁפֹּט
  chosen: he judged
  alternatives:
  - he led as judge
  - he governed
  lexicon: HALOT
  rationale: In Judges, שפט refers to the activity of a judge-deliverer or ruler.
    'He judged' keeps the book's recurring terminology and avoids importing a narrower
    modern judicial sense by paraphrase; the broader leadership nuance is inherent
    in the context.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  rationale: Direct-object marking has no separate English equivalent; 'Israel' is
    retained straightforwardly as the people/nation judged by Jair.
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: twenty-two years
  alternatives:
  - twenty and two years
  lexicon: HALOT
  rationale: The Hebrew cardinal expression is idiomatically rendered in contemporary
    English as 'twenty-two years.' This preserves the duration without archaic phrasing.
