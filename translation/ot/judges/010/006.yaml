id: JDG.10.6
reference: Judges 10:6
source:
  edition: WLC
  text: וַ/יֹּסִ֣פוּ בְּנֵ֣י יִשְׂרָאֵ֗ל לַ/עֲשׂ֣וֹת הָ/רַע֮ בְּ/עֵינֵ֣י יְהוָה֒ וַ/יַּעַבְד֣וּ אֶת הַ/בְּעָלִ֣ים וְ/אֶת הָ/עַשְׁתָּר֡וֹת וְ/אֶת אֱלֹהֵ֣י אֲרָם֩ וְ/אֶת אֱלֹהֵ֨י צִיד֜וֹן וְ/אֵ֣ת אֱלֹהֵ֣י מוֹאָ֗ב וְ/אֵת֙ אֱלֹהֵ֣י בְנֵי עַמּ֔וֹן וְ/אֵ֖ת אֱלֹהֵ֣י פְלִשְׁתִּ֑ים וַ/יַּעַזְב֥וּ אֶת יְהוָ֖ה וְ/לֹ֥א עֲבָדֽוּ/הוּ׀־־־־׀־־׃
translation:
  text: And the sons of Israel again did what was evil in the eyes of Yahweh, and they served the Baals and the Ashtoreths, and the gods of Aram, the gods of Sidon, the gods of Moab, the gods of the sons of Ammon, and the gods of the Philistines. They forsook Yahweh and did not serve him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continued to do what was evil in the eyes of the LORD.' The Hebrew verb can express repetition or continuation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gods of the sons of Ammon'; that is, the gods worshiped by the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  chosen: again did
  alternatives:
  - continued to do
  - added to do once more
  - did again
  lexicon: HALOT
  rationale: The verb יסף with an infinitive can mean 'to continue/add to' doing something. In the recurring Judges formula, idiomatic English is best captured by 'again did,' which preserves the cyclical sense without awkwardness.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew expression and its repeated narrative cadence in Judges. 'Israelites' is possible but less transparent to the source wording.
- source_word: לַעֲשׂוֹת הָרַע בְּעֵינֵי יְהוָה
  chosen: did what was evil in the eyes of the LORD
  alternatives:
  - did evil in the sight of the LORD
  - did the evil in the eyes of the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'Did what was evil in the eyes of the LORD' is natural English while preserving the evaluative metaphor 'in the eyes of.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַבְדוּ
  chosen: they served
  alternatives:
  - they worshiped
  lexicon: HALOT
  rationale: עבד fundamentally means 'serve.' In idolatry contexts this includes worship, but 'served' better preserves the lexical link with the later clause 'did not serve him.'
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the lords
  - the Baal idols
  lexicon: HALOT
  rationale: The plural refers to the various local manifestations/images associated with Baal worship. Transliteration preserves the proper-name force better than translating as 'lords.'
- source_word: הָעַשְׁתָּרוֹת
  chosen: the Ashtoreths
  alternatives:
  - the Ashtaroth
  - the Astartes
  lexicon: HALOT
  rationale: Transliterated as a cultic proper name in plural form, parallel to 'the Baals.' 'Ashtoreths' reflects the Hebrew plural and standard English biblical convention.
- source_word: אֱלֹהֵי אֲרָם
  chosen: the gods of Aram
  alternatives:
  - the gods of Syria
  lexicon: HALOT
  rationale: Aram is a proper regional name and should be transliterated rather than replaced with the later geopolitical term 'Syria.'
- source_word: אֱלֹהֵי צִידוֹן
  chosen: the gods of Sidon
  alternatives:
  - the Sidonian gods
  lexicon: HALOT
  rationale: A straightforward construct chain; 'of Sidon' preserves the place-name reference directly.
- source_word: אֱלֹהֵי מוֹאָב
  chosen: the gods of Moab
  alternatives:
  - the Moabite gods
  lexicon: HALOT
  rationale: A direct rendering of the construct chain; concise and transparent.
- source_word: אֱלֹהֵי בְנֵי עַמּוֹן
  chosen: the gods of the sons of Ammon
  alternatives:
  - the gods of the Ammonites
  - the gods of the people of Ammon
  lexicon: HALOT
  rationale: Rendered more formally to reflect the Hebrew phrase בני עמון. 'Ammonites' is idiomatic but less transparent to the source wording.
- source_word: אֱלֹהֵי פְלִשְׁתִּים
  chosen: the gods of the Philistines
  alternatives:
  - the Philistine gods
  lexicon: HALOT
  rationale: Direct construct rendering; keeps the ethnic name explicit.
- source_word: וַיַּעַזְבוּ
  chosen: They forsook
  alternatives:
  - they abandoned
  - they left
  lexicon: HALOT
  rationale: '''Forsook'' carries the covenantal and relational weight of עזב in this context better than the flatter ''left'' or ''abandoned.'''
- source_word: וְלֹא עֲבָדֻהוּ
  chosen: and did not serve him
  alternatives:
  - and no longer served him
  - and did not worship him
  lexicon: HALOT
  rationale: Maintains the lexical repetition of עבד from earlier in the verse and leaves the object pronoun explicit in English.
