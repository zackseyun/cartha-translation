id: JDG.10.1
reference: Judges 10:1
source:
  edition: WLC
  text: וַ/יָּקָם֩ אַחֲרֵ֨י אֲבִימֶ֜לֶךְ לְ/הוֹשִׁ֣יעַ אֶת יִשְׂרָאֵ֗ל תּוֹלָ֧ע בֶּן
    פּוּאָ֛ה בֶּן דּוֹד֖וֹ אִ֣ישׁ יִשָּׂשכָ֑ר וְ/הֽוּא יֹשֵׁ֥ב בְּ/שָׁמִ֖יר בְּ/הַ֥ר
    אֶפְרָֽיִם־־־־׃
translation:
  text: After Abimelech, Tola son of Puah, son of Dodo, a man of Issachar, arose to
    save Israel; and he lived in Shamir in the hill country of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'son of his uncle.' The Hebrew בֶּן־דּוֹדוֹ can be read as a patronymic
      with Dodo as a personal name, or as an appellative expression.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - stood up
  - came forward
  lexicon: HALOT
  rationale: The verb קום in this narrative setting introduces the emergence of a
    leader after Abimelech. 'Arose' preserves the formal narrative sense without over-interpreting
    it as official appointment.
- source_word: אַחֲרֵי אֲבִימֶלֶךְ
  chosen: After Abimelech
  alternatives:
  - Following Abimelech
  lexicon: HALOT
  rationale: A straightforward temporal marker indicating succession in narrative
    sequence.
- source_word: לְהוֹשִׁיעַ אֶת־יִשְׂרָאֵל
  chosen: to save Israel
  alternatives:
  - to deliver Israel
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save' or 'deliver.' 'Save' is concise,
    natural English and preserves the theological and narrative force of rescue without
    narrowing it to military deliverance alone.
- source_word: תּוֹלָע
  chosen: Tola
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן־פּוּאָה
  chosen: son of Puah
  rationale: Standard genealogical construction rendered formally.
- source_word: בֶּן־דּוֹדוֹ
  chosen: son of Dodo
  alternatives:
  - son of his uncle
  lexicon: HALOT
  rationale: The consonantal form is pointed here as the proper name דּוֹדוֹ, and
    in context functions naturally as an ancestor's name in the genealogy. Because
    the underlying consonants could also be understood appellatively ('his uncle'),
    the alternative is preserved in a footnote.
- source_word: אִישׁ יִשָּׂשכָר
  chosen: a man of Issachar
  alternatives:
  - an Issacharite
  lexicon: HALOT
  rationale: This phrase identifies tribal affiliation. 'A man of Issachar' is closer
    to the Hebrew wording, while remaining clear in English.
- source_word: וְהוּא יֹשֵׁב
  chosen: and he lived
  alternatives:
  - and he was living
  - and he dwelt
  lexicon: HALOT
  rationale: The participial construction describes his place of residence. 'Lived'
    gives idiomatic English without archaic tone.
- source_word: בְּשָׁמִיר
  chosen: in Shamir
  rationale: Place name transliterated.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: '''Hill country'' is the standard natural rendering of this geographic
    expression in English Bible style and fits the regional sense better than the
    more literal but potentially misleading ''mountains.'''
