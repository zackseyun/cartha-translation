id: JDG.10.9
reference: Judges 10:9
source:
  edition: WLC
  text: וַ/יַּעַבְר֤וּ בְנֵֽי עַמּוֹן֙ אֶת הַ/יַּרְדֵּ֔ן לְ/הִלָּחֵ֛ם גַּם בִּ/יהוּדָ֥ה
    וּ/בְ/בִנְיָמִ֖ין וּ/בְ/בֵ֣ית אֶפְרָ֑יִם וַ/תֵּ֥צֶר לְ/יִשְׂרָאֵ֖ל מְאֹֽד־־־׃
translation:
  text: Then the Ammonites crossed the Jordan to fight also against Judah, Benjamin,
    and the house of Ephraim, and Israel was greatly distressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel was in very great distress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: crossed
  alternatives:
  - went across
  - passed over
  lexicon: HALOT
  rationale: From עבר, with אֶת־הַיַּרְדֵּן as the object, the sense is specifically
    crossing the Jordan River. 'Crossed' is natural modern English and preserves the
    concrete movement.
- source_word: בְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: The ethnonym is the natural English equivalent in narrative context.
    'Sons of Ammon' is more formal but less idiomatic here.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English biblical usage is 'the Jordan.' 'River' is implicit
    and unnecessary in the main text.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The infinitive of לחם in the Niphal/Hithpael-style warfare sense denotes
    engaging in battle. 'To fight' is concise and accurate.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - as well
  lexicon: HALOT
  rationale: 'Marks extension beyond prior oppression east of the Jordan: they crossed
    over to attack additional territories. ''Also'' best captures the additive force.'
- source_word: בִּיהוּדָה וּבְבִנְיָמִין וּבְבֵית אֶפְרָיִם
  chosen: against Judah, Benjamin, and the house of Ephraim
  alternatives:
  - in Judah, Benjamin, and the house of Ephraim
  - against Judah and Benjamin and the house of Ephraim
  lexicon: HALOT
  rationale: Although the preposition is בְּ ('in'), with לְהִלָּחֵם it functions
    contextually as the object/target of hostilities. 'Against' makes the warfare
    relation explicit in idiomatic English. 'House of Ephraim' is retained rather
    than flattened to 'Ephraim' because בֵּית is present in the Hebrew and may denote
    the broader clan/territorial entity.
- source_word: וַתֵּצֶר
  chosen: was greatly distressed
  alternatives:
  - was in great distress
  - was severely oppressed
  lexicon: HALOT
  rationale: From צרר/צור in this form, the clause expresses severe straits or distress
    coming upon Israel. Because the verb is feminine singular with an impersonal sense,
    English restructures naturally. 'Was greatly distressed' captures the result without
    over-specifying agency.
- source_word: לְיִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The lamed marks the affected party. In English, 'Israel was greatly distressed'
    is more idiomatic than 'there was great distress for Israel,' while preserving
    the sense.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: An adverbial intensifier modifying the distress. 'Greatly' is natural
    and sufficiently strong.
