id: JDG.10.14
reference: Judges 10:14
source:
  edition: WLC
  text: לְכ֗וּ וְ/זַֽעֲקוּ֙ אֶל הָ֣/אֱלֹהִ֔ים אֲשֶׁ֥ר בְּחַרְתֶּ֖ם בָּ֑/ם הֵ֛מָּה
    יוֹשִׁ֥יעוּ לָ/כֶ֖ם בְּ/עֵ֥ת צָרַתְ/כֶֽם־׃
translation:
  text: Go and cry out to the gods whom you have chosen; let them save you in the
    time of your distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will save you.' The Hebrew form can be rendered as a simple future,
      but in context it functions as an ironic challenge.
    reason: alternative_reading
lexical_decisions:
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Come on, go
  - Be gone
  lexicon: HALOT
  rationale: Imperative plural of הלך, functioning as a sharp dismissal. 'Go' is the
    plain and idiomatic English equivalent.
- source_word: וְזַעֲקוּ
  chosen: and cry out
  alternatives:
  - and call out
  - and appeal
  lexicon: HALOT
  rationale: זעק commonly denotes a loud cry for help in distress. 'Cry out' preserves
    both urgency and prayer-like appeal better than the flatter 'call out.'
- source_word: אֶל הָאֱלֹהִים
  chosen: to the gods
  alternatives:
  - to the god(s)
  lexicon: HALOT
  rationale: Though אֱלֹהִים can be morphologically ambiguous, the plural referent
    is required here by the context of Israel's chosen foreign deities and by the
    following plural pronoun and verb ('they ... save'). Thus 'the gods' is the clearest
    rendering.
- source_word: אֲשֶׁר בְּחַרְתֶּם בָּם
  chosen: whom you have chosen
  alternatives:
  - which you have chosen
  - in whom you have chosen
  lexicon: HALOT
  rationale: בחר with ב can mean 'choose in/among,' but in English the idiomatic sense
    is simply 'choose.' 'Whom' is used because the referent is personal deities, not
    impersonal objects.
- source_word: הֵמָּה
  chosen: them
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis to the following verb. English commonly
    conveys this emphasis adequately with explicit subject 'them' in the clause 'let
    them save you'; a more wooden 'they themselves' is possible but less natural.
- source_word: יוֹשִׁיעוּ
  chosen: let them save you
  alternatives:
  - they will save you
  - may they save you
  - let them deliver you
  lexicon: HALOT
  rationale: Hiphil of ישׁע means 'save, deliver.' In context this is an ironic challenge
    from the LORD, not a prediction. English jussive-like force is best conveyed by
    'let them save you.' 'Save' is preferred over 'deliver' for directness and consistency
    with the root's common theological sense.
- source_word: בְּעֵת
  chosen: in the time of
  alternatives:
  - at the time of
  - when
  lexicon: HALOT
  rationale: Temporal phrase meaning 'at/in the time of.' 'In the time of' is natural
    English and preserves the nominal construction.
- source_word: צָרַתְכֶם
  chosen: your distress
  alternatives:
  - your trouble
  - your affliction
  - your adversity
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity, often in a crisis setting.
    'Distress' fits the tone of desperate need and pairs well with 'cry out' and 'save'.
