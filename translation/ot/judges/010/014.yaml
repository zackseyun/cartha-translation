theological_decisions:
- issue: Force of the final verb יוֹשִׁיעוּ in context
  chosen_reading: 'Rendered as an ironic imperative/jussive challenge: ''let them
    save you'''
  alternative_readings:
  - 'Rendered as a simple future: ''they will save you'''
  rationale: The verse is the LORD's rebuke to Israel for turning to other gods. The
    discourse force is sarcastic and confrontational, challenging them to seek rescue
    from those gods. English 'let them save you' best preserves that rhetorical force
    without adding content.
  doctrine_reference: Translation philosophy §1, §3
