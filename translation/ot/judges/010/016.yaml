id: JDG.10.16
reference: Judges 10:16
source:
  edition: WLC
  text: וַ/יָּסִ֜ירוּ אֶת אֱלֹהֵ֤י הַ/נֵּכָר֙ מִ/קִּרְבָּ֔/ם וַ/יַּעַבְד֖וּ אֶת יְהוָ֑ה
    וַ/תִּקְצַ֥ר נַפְשׁ֖/וֹ בַּ/עֲמַ֥ל יִשְׂרָאֵֽל־־׃פ
translation:
  text: So they removed the foreign gods from among them and served the LORD, and
    his soul grew impatient over the misery of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he could bear Israel’s misery no longer.' The Hebrew literally says,
      'his soul grew short over the misery of Israel,' an idiom expressing impatience
      or inability to endure further.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  chosen: removed
  alternatives:
  - put away
  - took away
  lexicon: HALOT
  rationale: The Hiphil of סור here means to cause to depart/remove. 'Removed' is
    natural modern English and preserves the concrete action of getting rid of the
    idols.
- source_word: אֱלֹהֵי הַנֵּכָר
  chosen: the foreign gods
  alternatives:
  - the gods of the foreigner
  - the strange gods
  lexicon: HALOT
  rationale: This idiom commonly refers to non-Israelite/deity idols. 'Foreign gods'
    is the standard clear rendering in context, avoiding archaic 'strange gods.'
- source_word: מִקִּרְבָּם
  chosen: from among them
  alternatives:
  - from their midst
  lexicon: HALOT
  rationale: Literally 'from their midst.' 'From among them' is idiomatic modern English
    while preserving the communal sense.
- source_word: וַיַּעַבְדוּ אֶת יְהוָה
  chosen: served the LORD
  alternatives:
  - worshiped the LORD
  lexicon: HALOT
  rationale: עבד with God can mean serve/worship, but 'served' better preserves the
    broader covenantal sense of allegiance and obedience. Per doctrine, יְהוָה is
    rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וַתִּקְצַר נַפְשׁוֹ
  chosen: his soul grew impatient
  alternatives:
  - he became impatient
  - his soul could no longer endure
  - his patience ran short
  lexicon: HALOT
  rationale: The Hebrew is literally 'his soul became short,' an anthropopathic idiom
    expressing impatience or inability to bear something longer. 'His soul grew impatient'
    preserves the idiom's force and the explicit 'soul' language better than a fully
    flattened paraphrase.
- source_word: בַּעֲמַל יִשְׂרָאֵל
  chosen: over the misery of Israel
  alternatives:
  - because of the trouble of Israel
  - over the suffering of Israel
  - at the toil of Israel
  lexicon: HALOT
  rationale: עָמָל denotes trouble, misery, suffering, or toil. In this context of
    Israel's distress, 'misery' best captures the affliction that moves the LORD to
    compassion without overinterpreting the mechanism.
