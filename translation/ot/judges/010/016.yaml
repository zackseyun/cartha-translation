theological_decisions:
- issue: Anthropopathic description of the LORD in וַתִּקְצַר נַפְשׁוֹ
  chosen_reading: Retain the idiomatic personal language as 'his soul grew impatient'
    rather than replacing it with an abstract theological paraphrase.
  alternative_readings:
  - he could bear Israel's misery no longer
  - he became grieved over Israel's misery
  rationale: The Hebrew uses vivid anthropopathic language. To preserve theological
    tension rather than resolve it, the translation keeps the personal idiom instead
    of smoothing it into a doctrinally safer abstraction. This communicates the text's
    portrayal of the LORD's responsive compassion without denying divine impassibility
    debates that the verse itself does not address.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
