id: JDG.10.5
reference: Judges 10:5
source:
  edition: WLC
  text: וַ/יָּ֣מָת יָאִ֔יר וַ/יִּקָּבֵ֖ר בְּ/קָמֽוֹן׃פ
translation:
  text: And Jair died and was buried in Kamon.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: From מות, the standard and direct narrative verb for death. 'Died' is
    the plainest and most formally accurate English rendering; 'passed away' is softer
    and less literal than the Hebrew warrants.
- source_word: יָאִיר
  chosen: Jair
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  - was interred
  lexicon: HALOT
  rationale: 'Niphal of קבר, naturally rendered as a passive: ''was buried.'' This
    is the normal idiomatic English equivalent and preserves the Hebrew verbal voice
    without unnecessary elevation of style.'
- source_word: בְּקָמוֹן
  chosen: in Kamon
  alternatives:
  - at Kamon
  lexicon: HALOT
  rationale: The preposition ב commonly marks location. 'In Kamon' is the most straightforward
    locative rendering for a place-name in burial notices; 'at Kamon' is possible
    but less natural in this formulaic context.
