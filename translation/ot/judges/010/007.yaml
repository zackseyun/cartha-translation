id: JDG.10.7
reference: Judges 10:7
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בְּ/יִשְׂרָאֵ֑ל וַֽ/יִּמְכְּרֵ/ם֙ בְּ/יַד פְּלִשְׁתִּ֔ים וּ/בְ/יַ֖ד בְּנֵ֥י עַמּֽוֹן־־׃
translation:
  text: So Yahweh’s anger burned against Israel, and he sold them into the hand of the Philistines and into the hand of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his anger was kindled against Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Sold them'' is a recurring Judges expression for the LORD giving Israel over to enemy domination as judgment.'
    reason: cross_reference
  - marker: c
    text: Or, more literally, 'into the hand of the Philistines and into the hand of the sons of Ammon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יִּֽחַר אַף
  chosen: anger burned
  alternatives:
  - became angry
  - his anger was kindled
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves anger kindling/burning. 'The LORD’s anger burned' preserves the Hebrew imagery while remaining natural English; 'became angry' is accurate but flattens the metaphor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּ/יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - at Israel
  lexicon: HALOT
  rationale: With the idiom of anger, the preposition ב often carries the sense 'against' in English. This best reflects the relational hostility implied by divine anger here.
- source_word: וַֽ/יִּמְכְּרֵ/ם
  chosen: he sold them
  alternatives:
  - he gave them over
  - he handed them over
  lexicon: HALOT
  rationale: מכר commonly means 'sell.' In Judges it is a recurring covenant-judgment motif describing God delivering Israel to oppressors. 'Sold them' preserves the metaphor and intertextual consistency better than the more interpretive 'gave them over.'
- source_word: בְּ/יַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' is common and understandable in modern English, while also preserving the concrete imagery of power/control. It is retained for formal and thematic consistency.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English transliteration of the people group.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: '''The Ammonites'' is the standard and natural English ethnonym for בני עמון. ''Sons of Ammon'' is more literal but less idiomatic in this context.'
