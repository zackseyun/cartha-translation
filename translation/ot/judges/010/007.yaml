theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal resonance without introducing a transliterated
    form in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Depiction of divine judgment in וימכרם
  chosen_reading: he sold them
  alternative_readings:
  - he gave them over
  - he handed them over
  rationale: The text presents the LORD as actively delivering Israel to foreign oppressors
    as covenant judgment. 'Sold them' preserves the severity and recurring Judges
    motif without softening the agency expressed in the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
