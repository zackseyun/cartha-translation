- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Depiction of divine judgment in וימכרם
  chosen_reading: he sold them
  alternative_readings:
  - he gave them over
  - he handed them over
  rationale: The text presents the LORD as actively delivering Israel to foreign oppressors as covenant judgment. 'Sold them' preserves the severity and recurring Judges motif without softening the agency expressed in the Hebrew.
