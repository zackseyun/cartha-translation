id: JDG.10.13
reference: Judges 10:13
source:
  edition: WLC
  text: וְ/אַתֶּם֙ עֲזַבְתֶּ֣ם אוֹתִ֔/י וַ/תַּעַבְד֖וּ אֱלֹהִ֣ים אֲחֵרִ֑ים לָ/כֵ֥ן
    לֹֽא אוֹסִ֖יף לְ/הוֹשִׁ֥יעַ אֶתְ/כֶֽם־׃
translation:
  text: But you have forsaken me and served other gods; therefore I will no longer
    save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver you' or 'rescue you.' The Hebrew verb can denote deliverance
      from enemies as well as saving more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the explicit pronoun adds contrast and emphasis
    in context. 'But you' captures the adversative force naturally in English better
    than a simple 'and you.'
- source_word: עֲזַבְתֶּם
  chosen: have forsaken
  alternatives:
  - abandoned
  - left
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon.' 'Have forsaken' preserves the
    covenantal and relational weight better than the flatter 'left.' Present perfect
    English fits the present relevance of the completed action.
- source_word: אוֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct object pronoun straightforwardly rendered as 'me.'
- source_word: וַ/תַּעַבְדוּ
  chosen: and served
  alternatives:
  - and worshiped
  - and became slaves to
  lexicon: HALOT
  rationale: עבד with gods commonly denotes religious service/worship. 'Served' is
    the most direct and broadly accurate rendering, while allowing the idolatrous
    allegiance sense to remain. 'Worshiped' is possible but narrower than the Hebrew
    term.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase regularly means 'other gods.' 'Foreign gods' can be contextually
    appropriate elsewhere, but here the plain contrast is with Yahweh versus other
    deities.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - for that reason
  lexicon: HALOT
  rationale: Marks a consequential judgment. 'Therefore' preserves the formal causal
    connection clearly.
- source_word: לֹא אוֹסִיף
  chosen: I will no longer
  alternatives:
  - I will not continue to
  - I will not again
  lexicon: HALOT
  rationale: 'יסף in Hiphil with negation expresses cessation: ''I will not continue/add
    to.'' Idiomatic English is ''I will no longer.'''
- source_word: לְ/הוֹשִׁיעַ
  chosen: save
  alternatives:
  - deliver
  - rescue
  lexicon: HALOT
  rationale: ישע can mean 'save, deliver, rescue.' In Judges, the immediate sense
    is deliverance from oppressors, but 'save' is concise and preserves the broader
    theological resonance without exceeding the context.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct object pronoun rendered simply as 'you.'
