theological_decisions:
- issue: Rendering of divine deliverance term ישע in a judges-context
  chosen_reading: save
  alternative_readings:
  - deliver
  - rescue
  rationale: The verse concerns Yahweh's refusal to grant further deliverance from
    oppression, but the Hebrew verb itself is broader. 'Save' keeps the lexical connection
    to the wider biblical theme of salvation while remaining contextually valid. The
    alternatives are preserved in a footnote because readers may hear 'save' in a
    narrower spiritualized sense than the immediate narrative warrants.
  doctrine_reference: Translation philosophy §1, §3, §5
