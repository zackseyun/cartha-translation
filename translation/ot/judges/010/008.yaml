id: JDG.10.8
reference: Judges 10:8
source:
  edition: WLC
  text: וַֽ/יִּרְעֲצ֤וּ וַ/יְרֹֽצְצוּ֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל בַּ/שָּׁנָ֖ה הַ/הִ֑יא
    שְׁמֹנֶ֨ה עֶשְׂרֵ֜ה שָׁנָ֗ה אֶֽת כָּל בְּנֵ֤י יִשְׂרָאֵל֙ אֲשֶׁר֙ בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֔ן
    בְּ/אֶ֥רֶץ הָ/אֱמֹרִ֖י אֲשֶׁ֥ר בַּ/גִּלְעָֽד־־־׃
translation:
  text: And they shattered and crushed the sons of Israel in that year—for eighteen
    years, all the sons of Israel who were beyond the Jordan in the land of the Amorites,
    which is in Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they broke and oppressed the Israelites.' The Hebrew uses two forceful,
      near-synonymous verbs to intensify the severity of the affliction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel' throughout this verse; rendered formally here
      to preserve the repeated expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְעֲצוּ
  chosen: they shattered
  alternatives:
  - they broke
  - they oppressed
  lexicon: HALOT
  rationale: The verb conveys violent breaking or smashing. 'Shattered' preserves
    the forceful, physical-metaphorical sense better than the more generic 'oppressed.'
- source_word: וַיְרֹצְצוּ
  chosen: and crushed
  alternatives:
  - and oppressed
  - and smashed
  lexicon: HALOT
  rationale: Paired with the previous verb, this intensifies the affliction. 'Crushed'
    keeps the vivid parallelism and avoids flattening the Hebrew into a single abstract
    term.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the repeated Hebrew expression in this
    verse. Although 'Israelites' is smoother English, 'sons of Israel' reflects the
    source wording and repetition.
- source_word: בַּשָּׁנָה הַהִיא
  chosen: in that year
  alternatives:
  - that year
  lexicon: HALOT
  rationale: The preposition is retained for natural but still close translation.
- source_word: שְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: for eighteen years
  alternatives:
  - eighteen years
  lexicon: HALOT
  rationale: In English, the duration is best expressed with 'for.' This clarifies
    that the oppression extended over eighteen years, not merely within a single year.
- source_word: אֶת כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all Israel
  - all the Israelites
  lexicon: HALOT
  rationale: The direct object marker plus כָּל indicates the totality of the group
    in view; the repeated phrase is preserved for transparency.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: who were beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: '''Beyond the Jordan'' is a close rendering of the idiom and leaves the
    directional perspective as in the Hebrew rather than over-specifying it.'
- source_word: בְּאֶרֶץ הָאֱמֹרִי
  chosen: in the land of the Amorites
  alternatives:
  - in Amorite territory
  lexicon: HALOT
  rationale: This is a straightforward territorial designation; 'land of the Amorites'
    preserves the formal geographic expression.
- source_word: אֲשֶׁר בַּגִּלְעָד
  chosen: which is in Gilead
  alternatives:
  - that is in Gilead
  - in Gilead
  lexicon: HALOT
  rationale: The relative clause is retained explicitly to mirror the Hebrew structure
    and identify the region more precisely.
