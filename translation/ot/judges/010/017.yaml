id: JDG.10.17
reference: Judges 10:17
source:
  edition: WLC
  text: וַ/יִּצָּֽעֲקוּ֙ בְּנֵ֣י עַמּ֔וֹן וַֽ/יַּחֲנ֖וּ בַּ/גִּלְעָ֑ד וַ/יֵּאָֽסְפוּ֙
    בְּנֵ֣י יִשְׂרָאֵ֔ל וַֽ/יַּחֲנ֖וּ בַּ/מִּצְפָּֽה׃
translation:
  text: Then the Ammonites were summoned and camped in Gilead, and the sons of Israel
    gathered together and camped at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then the Ammonites cried out and camped in Gilead'; the Hebrew verb
      can mean 'cry out,' though in this context it likely refers to being mustered
      or summoned for battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֲקוּ
  chosen: were summoned
  alternatives:
  - cried out
  - were called together
  - raised a war cry
  lexicon: HALOT
  rationale: The verb from צעק commonly means 'cry out,' but in this military context
    with immediate reference to encampment, it likely carries the sense of mustering
    or being called together for battle. 'Were summoned' conveys the passive-like
    event sense in idiomatic English without over-paraphrasing. Because 'cried out'
    is a possible lexical rendering, it is preserved in a footnote.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of Ammon,' but in English
    the standard people-group rendering is 'the Ammonites.' This is an optimal-equivalence
    choice preserving referent clearly.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: The verb חנה denotes pitching camp or encamping. 'Camped' is more natural
    modern English while preserving the military sense.
- source_word: בַּגִּלְעָד
  chosen: in Gilead
  alternatives:
  - at Gilead
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' here with a regional place name.
    'In Gilead' best fits English usage for a territory.
- source_word: וַיֵּאָסְפוּ
  chosen: gathered together
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The verb אסף means to gather or assemble. 'Gathered together' reflects
    the collective mobilization of Israel and matches the narrative rhythm.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate
    principle, the masculine form is retained where it refers to the covenant people
    in their traditional designation. 'The Israelites' is a viable smoother alternative
    but is not as formally transparent.
- source_word: בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: With a settlement or gathering point, English idiom prefers 'at Mizpah'
    for encampment location.
