id: JDG.10.2
reference: Judges 10:2
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּט֙ אֶת יִשְׂרָאֵ֔ל עֶשְׂרִ֥ים וְ/שָׁלֹ֖שׁ שָׁנָ֑ה וַ/יָּ֖מָת וַ/יִּקָּבֵ֥ר
    בְּ/שָׁמִֽיר־׃פ
translation:
  text: He judged Israel twenty-three years. Then he died and was buried in Shamir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: he judged
  alternatives:
  - he governed
  - he led as judge
  lexicon: HALOT
  rationale: The verb שׁפט in Judges commonly refers to the activity of a judge/deliverer
    exercising leadership over Israel. 'He judged' preserves the book's recurring
    terminology and remains natural English.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  rationale: Direct-object marker plus the proper name; rendered straightforwardly
    as the people/nation Israel.
- source_word: עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  chosen: twenty-three years
  alternatives:
  - twenty and three years
  lexicon: HALOT
  rationale: Idiomatic modern English number expression while preserving the duration
    exactly.
- source_word: וַיָּמָת
  chosen: Then he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he died' gives natural
    English sequence without overstating contrast.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: Nifal form is naturally rendered as passive, 'was buried.' This preserves
    the event without supplying an agent.
- source_word: בְּשָׁמִיר
  chosen: in Shamir
  rationale: Proper place name, transliterated per translation philosophy for names.
    The preposition ב is locative, so 'in Shamir' is the most direct rendering.
