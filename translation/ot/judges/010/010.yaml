id: JDG.10.10
reference: Judges 10:10
source:
  edition: WLC
  text: וַֽ/יִּזְעֲקוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶל יְהוָ֖ה לֵ/אמֹ֑ר חָטָ֣אנוּ לָ֔/ךְ
    וְ/כִ֤י עָזַ֨בְנוּ֙ אֶת אֱלֹהֵ֔י/נוּ וַֽ/נַּעֲבֹ֖ד אֶת הַ/בְּעָלִֽים־־־׃פ
translation:
  text: Then the sons of Israel cried out to the LORD, saying, “We have sinned against
    you, because we have forsaken our God and have served the Baals.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” Hebrew “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: זעק commonly denotes an urgent cry for help or distress call. 'Cried
    out' preserves both the emotional force and the prayer context better than the
    flatter 'called out'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formally the Hebrew is 'sons of Israel.' In keeping with gender-accurate
    policy, this is retained rather than neutralizing to 'Israelites,' while still
    being natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: חָטָאנוּ לָךְ
  chosen: We have sinned against you
  alternatives:
  - We have sinned to you
  lexicon: HALOT
  rationale: The idiom חטא + ל marks the offended party. English idiom requires 'sinned
    against you' rather than the wooden 'sinned to you.'
- source_word: וְכִי
  chosen: because
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: Here כי introduces the content/reason explaining the sin. 'Because' best
    connects the confession with the specific offense that follows.
- source_word: עָזַבְנוּ
  chosen: have forsaken
  alternatives:
  - have abandoned
  - have left
  lexicon: HALOT
  rationale: '''Forsaken'' preserves the covenantal and relational weight of עזב in
    this context better than the more colloquial ''left.'''
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with first person suffix
    here refers to Israel's singular God. 'Our God' reflects standard Hebrew usage
    and the immediate contrast with the Baals.
- source_word: וַנַּעֲבֹד
  chosen: have served
  alternatives:
  - served
  - worshiped
  lexicon: HALOT
  rationale: The waw-consecutive continues the confessional content. In English present
    perfect coordinates naturally with 'have forsaken.' 'Served' is preferred over
    'worshiped' because עבד includes cultic service and allegiance, not merely inward
    reverence.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the Baalim
  lexicon: HALOT
  rationale: The plural refers to the various local manifestations/images associated
    with Baal worship. 'The Baals' is the most transparent English rendering; 'Baalim'
    is less accessible and more transliterative than needed.
