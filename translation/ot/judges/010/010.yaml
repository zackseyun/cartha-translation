theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrinal standard for YHWH, 'the LORD' is used in the main text rather than a
    transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Per translation
    philosophy, gender-accurate rendering is preferred over neutralization unless
    context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
