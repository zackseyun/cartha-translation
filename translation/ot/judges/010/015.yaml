id: JDG.10.15
reference: Judges 10:15
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ בְנֵי יִשְׂרָאֵ֤ל אֶל יְהוָה֙ חָטָ֔אנוּ עֲשֵׂה אַתָּ֣ה לָ֔/נוּ כְּ/כָל הַ/טּ֖וֹב בְּ/עֵינֶ֑י/ךָ אַ֛ךְ הַצִּילֵ֥/נוּ נָ֖א הַ/יּ֥וֹם הַ/זֶּֽה־־־־׃
translation:
  text: And the sons of Israel said to Yahweh, “We have sinned. Do to us according to all that is good in your eyes. Only please deliver us this day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.”
    reason: lexical_alternative
  - marker: b
    text: Literally “according to all the good in your eyes”; that is, whatever seems good to you.
    reason: lexical_alternative
  - marker: c
    text: Or “save us” or “rescue us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the idiom and the gendered/source-specific expression. 'Israelites' is possible, but 'sons of Israel' better reflects the Hebrew wording and aligns with the project's gender-accurate principle.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חָטָאנוּ
  chosen: We have sinned
  alternatives:
  - We sinned
  lexicon: HALOT
  rationale: The qatal first common plural naturally conveys a completed confession. English present perfect communicates the penitential force well in direct speech.
- source_word: עֲשֵׂה אַתָּה לָנוּ
  chosen: Do to us
  alternatives:
  - Deal with us
  - Act toward us
  lexicon: HALOT
  rationale: עשה with ל conveys acting toward someone. 'Do to us' is direct and preserves the stark submission of the plea.
- source_word: כְּכָל הַטּוֹב בְּעֵינֶיךָ
  chosen: whatever is good in your eyes
  alternatives:
  - according to all that is good in your eyes
  - whatever seems good to you
  lexicon: HALOT
  rationale: The idiom literally refers to what is good in someone's eyes. This rendering keeps the Hebrew imagery while remaining natural English. 'Whatever seems good to you' is smoother but less formally transparent.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - But
  - Nevertheless
  lexicon: HALOT
  rationale: 'אַךְ here marks a restrictive plea after surrender: they accept whatever God wills, only asking for deliverance. ''Only'' best captures that limitation.'
- source_word: הַצִּילֵנוּ
  chosen: deliver us
  alternatives:
  - save us
  - rescue us
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to deliver or rescue from danger. 'Deliver us' fits the covenantal and narrative register better than the broader 'save us.'
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - we beg you
  lexicon: HALOT
  rationale: נָא adds entreaty/politeness to the imperative. 'Please' is the most natural modern equivalent.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: '''This day'' preserves the solemn immediacy of the Hebrew phrase better than the more colloquial ''today''.'
