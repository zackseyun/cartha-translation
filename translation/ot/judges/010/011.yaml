theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with established
    reverential English convention without changing the referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the Hebrew idiom בְּנֵי יִשְׂרָאֵל literally or use an
    idiomatic ethnic term
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine and idiomatic. Per the gender-accurate
    principle, the literal familial expression is retained rather than neutralized,
    since it is not merely a generic demonym in form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Supplying the implied verb in an elliptical rhetorical question
  chosen_reading: that I delivered you
  alternative_readings:
  - did I not deliver you from Egypt, from the Amorites, from the Ammonites, and from
    the Philistines?
  rationale: The Hebrew line as given is incomplete in isolation and depends on the
    surrounding discourse. Supplying the implied verb is necessary for intelligible
    English. 'Delivered' preserves the historical-redemptive sense without adding
    doctrinal content beyond the context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §6
