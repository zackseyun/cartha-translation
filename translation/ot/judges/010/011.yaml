id: JDG.10.11
reference: Judges 10:11
source:
  edition: WLC
  text: וַ֥/יֹּאמֶר יְהוָ֖ה אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל הֲ/לֹ֤א מִ/מִּצְרַ֨יִם֙ וּ/מִן
    הָ֣/אֱמֹרִ֔י וּ/מִן בְּנֵ֥י עַמּ֖וֹן וּ/מִן פְּלִשְׁתִּֽים־־־־׃
translation:
  text: And the LORD said to the sons of Israel, “Was it not from Egypt, and from
    the Amorites, and from the Ammonites, and from the Philistines, that I delivered
    you?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'' Many English versions render this more
      idiomatically as ''the Israelites.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew clause is elliptical in this verse and is completed by the surrounding
      context; the English supplies 'that I delivered you' for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in direct speech introduction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech; 'to' is the natural English
    equivalent.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the gender-accurate
    principle, this is preserved rather than flattened to 'Israelites,' while remaining
    idiomatic enough in context.
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did I not
  - Is it not
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question.
    Because the implied verb is supplied from context, 'Was it not ... that I delivered
    you?' best carries the Hebrew structure while preparing for the implied main clause.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The preposition מן indicates source. 'From Egypt' fits the list structure
    in this verse; 'out of Egypt' is possible but less parallel with the following
    items.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular/collective, in English ethnic collectives
    in this context are best rendered as the people-group plural, matching the sense
    of oppression/deliverance from a nation.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: This ethnic designation is most naturally rendered by the standard English
    people-name 'the Ammonites.'
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English rendering of the ethnic plural.
- source_word: '[implied verb from context]'
  chosen: that I delivered you
  alternatives:
  - that I saved you
  - did I not deliver you
  lexicon: HALOT
  rationale: The Hebrew of this verse is elliptical, with the governing verb supplied
    by the continuation and broader context (cf. the following verse). English requires
    the implied action to make a complete sentence. 'Delivered' best matches the repeated
    Judges theme of rescue from oppressors without overinterpreting as spiritual salvation.
