theological_decisions:
- issue: Rendering of explicit masculine language in a leadership-selection context
  chosen_reading: Retain 'the man' in the main text
  alternative_readings:
  - the one
  - the person
  rationale: The Hebrew uses איש explicitly and the context concerns appointment of
    a military leader in ancient Israel. Per the translation philosophy's gender-accurate
    principle, the masculine form should be preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
