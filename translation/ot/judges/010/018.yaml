id: JDG.10.18
reference: Judges 10:18
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ הָ/עָ֜ם שָׂרֵ֤י גִלְעָד֙ אִ֣ישׁ אֶל רֵעֵ֔/הוּ מִ֣י הָ/אִ֔ישׁ
    אֲשֶׁ֣ר יָחֵ֔ל לְ/הִלָּחֵ֖ם בִּ/בְנֵ֣י עַמּ֑וֹן יִֽהְיֶ֣ה לְ/רֹ֔אשׁ לְ/כֹ֖ל יֹשְׁבֵ֥י
    גִלְעָֽד־׃פ
translation:
  text: And the people, the leaders of Gilead, said to one another, “Who is the man
    who will begin to fight against the Ammonites? He shall become head over all the
    inhabitants of Gilead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man to his companion.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם שָׂרֵי גִלְעָד
  chosen: the people, the leaders of Gilead
  alternatives:
  - the people of the leaders of Gilead
  - the leaders of Gilead
  lexicon: HALOT
  rationale: 'The Hebrew juxtaposes הָעָם (''the people'') with שָׂרֵי גִלְעָד (''leaders/chiefs
    of Gilead'') without an explicit conjunction. In context this is best taken appositionally:
    the speakers are the people, namely the leaders of Gilead. This preserves both
    elements of the Hebrew rather than omitting one.'
- source_word: אִישׁ אֶל־רֵעֵהוּ
  chosen: to one another
  alternatives:
  - each man to his companion
  - man to his neighbor
  lexicon: HALOT
  rationale: Literally 'a man to his companion/friend.' In idiomatic English, 'to
    one another' best conveys the reciprocal sense while preserving the collective
    dialogue. The masculine singular form is distributive rather than restricting
    the group to males in translation.
- source_word: מִי הָאִישׁ
  chosen: Who is the man
  alternatives:
  - Who is the האיש
  - Who is the one
  lexicon: HALOT
  rationale: Retains the explicit איש ('man') rather than flattening to merely 'who,'
    in keeping with the gender-accurate policy and the verse's search for a specific
    male military leader.
- source_word: יָחֵל
  chosen: will begin
  alternatives:
  - begins
  - undertakes
  lexicon: HALOT
  rationale: Hiphil of חלל here means 'to begin.' Future-oriented English fits the
    deliberative question about a prospective leader.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: A straightforward rendering of the infinitive of לחם in the military
    sense. 'Fight' is natural modern English and sufficiently formal.
- source_word: בִּבְנֵי עַמּוֹן
  chosen: against the Ammonites
  alternatives:
  - against the sons of Ammon
  - against the people of Ammon
  lexicon: HALOT
  rationale: '''Sons of Ammon'' is the literal ethnonym, but ''Ammonites'' is the
    standard natural English equivalent for the people group.'
- source_word: יִהְיֶה לְרֹאשׁ
  chosen: He shall become head
  alternatives:
  - he shall be head
  - he shall become chief
  lexicon: HALOT
  rationale: 'לְרֹאשׁ denotes leadership/headship. ''Head'' preserves the metaphor
    and political sense. ''Become'' brings out the resultative force in context: the
    one who leads in battle will thereby assume leadership.'
- source_word: לְכֹל יֹשְׁבֵי גִלְעָד
  chosen: over all the inhabitants of Gilead
  alternatives:
  - over all who dwell in Gilead
  - over all the residents of Gilead
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial expression for those dwelling in a place. 'Inhabitants'
    is clear, natural, and preserves the scope of authority over the whole population.
