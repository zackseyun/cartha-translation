id: JDG.10.4
reference: Judges 10:4
source:
  edition: WLC
  text: וַֽ/יְהִי ל֞/וֹ שְׁלֹשִׁ֣ים בָּנִ֗ים רֹֽכְבִים֙ עַל שְׁלֹשִׁ֣ים עֲיָרִ֔ים
    וּ/שְׁלֹשִׁ֥ים עֲיָרִ֖ים לָ/הֶ֑ם לָ/הֶ֞ם יִקְרְא֣וּ חַוֺּ֣ת יָאִ֗יר עַ֚ד הַ/יּ֣וֹם
    הַ/זֶּ֔ה אֲשֶׁ֖ר בְּ/אֶ֥רֶץ הַ/גִּלְעָֽד־־׀׃
translation:
  text: He had thirty sons, riding on thirty donkeys, and they had thirty towns. To
    this day they are called Havvoth-jair, which are in the land of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Havvoth-jair likely means 'the villages (or tent-settlements) of Jair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  chosen: He had
  alternatives:
  - And there were to him
  - And he came to have
  lexicon: HALOT
  rationale: The idiom with היה + ל expresses possession. Natural English is 'he had,'
    which preserves the sense without wooden phrasing.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring, not children in general,
    so 'sons' is gender-accurate and matches the source.
- source_word: רֹכְבִים
  chosen: riding
  alternatives:
  - who rode
  - mounted on
  lexicon: HALOT
  rationale: The participle describes the sons' characteristic state/action. 'Riding'
    is concise and natural in English.
- source_word: עֲיָרִים
  chosen: donkeys
  alternatives:
  - young donkeys
  - colts
  - asses
  lexicon: HALOT
  rationale: עֲיָרִים refers to donkeys, often young donkeys. 'Donkeys' is clear modern
    English; 'asses' is archaic in contemporary usage, and 'young donkeys/colts' may
    over-specify beyond what is necessary here.
- source_word: עֲיָרִים
  chosen: towns
  alternatives:
  - cities
  - settlements
  - villages
  lexicon: HALOT
  rationale: The second occurrence is a different lexical item from the previous one
    despite identical consonants in English transliteration. In the phrase 'thirty
    עֲיָרִים ... called Havvoth-jair,' the sense is inhabited places under their control.
    'Towns' fits the scale implied in Judges and avoids overstating with 'cities.'
- source_word: יִקְרְאוּ
  chosen: they are called
  alternatives:
  - they call them
  - they named
  lexicon: HALOT
  rationale: The 3mp verb can be rendered as an impersonal/passive-like English expression
    in naming formulas. 'They are called' is idiomatic and fits the continuing force
    with 'to this day.'
- source_word: חַוֹּת יָאִיר
  chosen: Havvoth-jair
  alternatives:
  - the villages of Jair
  - the tent-villages of Jair
  lexicon: HALOT
  rationale: This is a place-name established in the biblical tradition. Per translation
    philosophy, personal and place names are transliterated by standard conventions
    rather than translated in the main text. The lexical sense can be preserved in
    a footnote.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: To this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the Hebrew temporal formula indicating
    persistence up to the narrator's present.
- source_word: אֲשֶׁר בְּאֶרֶץ הַגִּלְעָד
  chosen: which are in the land of Gilead
  alternatives:
  - which is in the land of Gilead
  - that are in Gilead
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the plural towns/Havvoth-jair,
    hence plural 'which are.' 'Land of Gilead' preserves the geographic expression
    more fully than simply 'Gilead.'
