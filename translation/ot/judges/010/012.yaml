id: JDG.10.12
reference: Judges 10:12
source:
  edition: WLC
  text: וְ/צִידוֹנִ֤ים וַֽ/עֲמָלֵק֙ וּ/מָע֔וֹן לָחֲצ֖וּ אֶתְ/כֶ֑ם וַ/תִּצְעֲק֣וּ אֵלַ֔/י
    וָ/אוֹשִׁ֥יעָ/ה אֶתְ/כֶ֖ם מִ/יָּדָֽ/ם׃
translation:
  text: The Sidonians, Amalek, and Maon oppressed you, and you cried out to me, and
    I saved you from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Amalekites.' The Hebrew reads 'Amalek,' which may stand for the
      people as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Maonites.' The Hebrew reads 'Maon,' likely referring to a people-group
      associated with Maon.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִידוֹנִים
  chosen: The Sidonians
  alternatives:
  - the people of Sidon
  lexicon: HALOT
  rationale: Gentilic/plural noun referring to the people of Sidon. 'Sidonians' is
    the standard concise English ethnonym and preserves the proper-name character.
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew form is the proper name 'Amalek,' which can stand for the
    people/group. Rendering it as 'Amalek' stays closer to the source text; 'the Amalekites'
    is a common interpretive expansion in English but is not required by the Hebrew.
- source_word: מָעוֹן
  chosen: Maon
  alternatives:
  - the Maonites
  lexicon: HALOT
  rationale: The consonantal text reads 'Maon,' a proper name. Some translations render
    the referent as 'the Maonites' to make explicit that a people-group is intended,
    but the Hebrew itself gives the name. Transliteration best follows the source
    while allowing a footnote to preserve the alternative.
- source_word: לָחֲצוּ
  chosen: oppressed
  alternatives:
  - pressed
  - afflicted
  lexicon: HALOT
  rationale: The verb denotes pressing hard, oppressing, or afflicting in a hostile
    sense. 'Oppressed' is idiomatic modern English and fits the covenant-historical
    context of foreign domination.
- source_word: וַתִּצְעֲקוּ אֵלַי
  chosen: you cried out to me
  alternatives:
  - you called to me
  lexicon: HALOT
  rationale: The idiom conveys a desperate appeal for help. 'Cried out to me' preserves
    both the emotional force and the directional sense of the preposition.
- source_word: וָאוֹשִׁיעָה
  chosen: I saved
  alternatives:
  - I delivered
  lexicon: HALOT
  rationale: From ישׁע, meaning to save/deliver. 'Saved' is a clear, direct rendering
    and preserves the lexical connection with broader biblical salvation language;
    'delivered' is also possible but less consistent with the core verb.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from their power
  - out of their hand
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' means from someone's power or control.
    Retaining 'from their hand' preserves the biblical idiom while remaining understandable
    in English.
