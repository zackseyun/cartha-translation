id: JDG.21.23
reference: Judges 21:23
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵן֙ בְּנֵ֣י בִנְיָמִ֔ן וַ/יִּשְׂא֤וּ נָשִׁים֙ לְ/מִסְפָּרָ֔/ם
    מִן הַ/מְּחֹלְל֖וֹת אֲשֶׁ֣ר גָּזָ֑לוּ וַ/יֵּלְכ֗וּ וַ/יָּשׁ֨וּבוּ֙ אֶל נַ֣חֲלָתָ֔/ם
    וַ/יִּבְנוּ֙ אֶת הֶ֣/עָרִ֔ים וַ/יֵּשְׁב֖וּ בָּ/הֶֽם־־־־׃
translation:
  text: So the sons of Benjamin did so, and took wives according to their number from
    the dancers whom they had seized. Then they went and returned to their inheritance,
    rebuilt the cities, and lived in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the dancing women.' The Hebrew participle is feminine plural.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom they had snatched away' or 'carried off.' The Hebrew verb denotes
      taking by force.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'built the cities'; 'rebuilt' reflects the context of Benjamin's
      devastated towns in the preceding narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did so
  alternatives:
  - did thus
  - acted accordingly
  lexicon: HALOT
  rationale: Idiomatic narrative formula meaning they carried out the previously described
    plan; 'did so' is natural modern English and sufficiently formal.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: Retains the Hebrew familial/tribal expression rather than flattening
    it to an ethnicon. This is gender-accurate and reflects the male tribal members
    acting in the narrative.
- source_word: וַיִּשְׂאוּ נָשִׁים
  chosen: took wives
  alternatives:
  - married women
  - took women as wives
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for marriage acquisition. 'Took wives'
    preserves the source wording and the social-legal force better than the smoother
    but less literal 'married.'
- source_word: לְמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in proportion to their number
  lexicon: HALOT
  rationale: Expresses that the wives taken matched the number needed by the Benjaminites.
    'According to their number' is clear and close to the Hebrew.
- source_word: מִן הַמְּחֹלְלוֹת
  chosen: from the dancers
  alternatives:
  - from the dancing women
  - from those who were dancing
  lexicon: HALOT
  rationale: The participle refers to the women engaged in dancing at the festival.
    'Dancers' is concise and natural, while the feminine plural sense is already clear
    from the context of taking wives.
- source_word: אֲשֶׁר גָּזָלוּ
  chosen: whom they had seized
  alternatives:
  - whom they had snatched away
  - whom they had carried off
  - whom they had taken by force
  lexicon: HALOT
  rationale: גזל commonly denotes taking by force or robbery. 'Seized' preserves the
    coercive, morally troubling force of the Hebrew without euphemism. The pluperfect
    'had seized' fits the relative clause in English narrative sequence.
- source_word: וַיֵּלְכוּ וַיָּשׁוּבוּ
  chosen: Then they went and returned
  alternatives:
  - Then they departed and returned
  - Then they went back
  lexicon: HALOT
  rationale: Keeps both Hebrew verbs rather than collapsing them entirely. The sequence
    marks departure from the festival scene and return to tribal territory.
- source_word: אֶל נַחֲלָתָם
  chosen: to their inheritance
  alternatives:
  - to their allotted inheritance
  - to their possession
  - to their territory
  lexicon: HALOT
  rationale: נחלה in tribal-land contexts denotes inherited allotment. 'Inheritance'
    preserves the covenant-land nuance better than the more generic 'territory.'
- source_word: וַיִּבְנוּ אֶת הֶעָרִים
  chosen: rebuilt the cities
  alternatives:
  - built the cities
  - restored the towns
  lexicon: HALOT
  rationale: Given the broader context of Benjamin's devastated settlements after
    the civil war, English 'rebuilt' makes the narrative sense explicit, though the
    Hebrew verb itself is simply 'built.' This is a contextually warranted optimal-equivalence
    rendering.
- source_word: וַיֵּשְׁבוּ בָּהֶם
  chosen: and lived in them
  alternatives:
  - and settled in them
  - and dwelt in them
  lexicon: HALOT
  rationale: ישב in settlement contexts can mean dwell/settle. 'Lived in them' is
    readable modern English and adequately conveys habitation.
