theological_decisions:
- issue: Moral force of גָּזָלוּ in describing how the women were taken
  chosen_reading: 'Render with coercive force: ''whom they had seized'''
  alternative_readings:
  - whom they had taken
  - whom they had carried off
  rationale: The verse narrates an act previously authorized by Israel, but the translation
    should not soften the Hebrew's violent terminology. Preserving the morally charged
    wording avoids importing approval or euphemism not present in the text.
  doctrine_reference: Translation philosophy 1, 3, and 6
- issue: Whether to smooth tribal/land terminology into generic modern terms
  chosen_reading: Keep 'sons of Benjamin' and 'inheritance' in the main text
  alternative_readings:
  - Benjaminites
  - territory
  rationale: These expressions preserve the covenantal-tribal texture of the Hebrew
    narrative without becoming archaic. They also avoid unnecessary interpretive flattening.
  doctrine_reference: Translation philosophy 1, 4, and 5
