id: JDG.21.17
reference: Judges 21:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ יְרֻשַּׁ֥ת פְּלֵיטָ֖ה לְ/בִנְיָמִ֑ן וְ/לֹֽא יִמָּחֶ֥ה שֵׁ֖בֶט
    מִ/יִּשְׂרָאֵֽל־׃
translation:
  text: And they said, “An inheritance must remain for the survivors of Benjamin,
    so that a tribe may not be blotted out from Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a remnant for Benjamin” or “an inheritance for Benjamin’s survivors.”
      The Hebrew juxtaposes “inheritance” and “survivors/remnant” compactly, and the
      exact relationship between the two nouns may be expressed in more than one natural
      way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, introducing the group's speech.
    'And they said' preserves the Hebrew narrative flow without overinterpreting temporal
    sequence.
- source_word: יְרֻשַּׁת
  chosen: An inheritance
  alternatives:
  - A possession
  - An inherited portion
  lexicon: HALOT
  rationale: The noun from ירש denotes an inheritance or hereditary possession. 'Inheritance'
    is the most natural and contextually fitting rendering in this discussion about
    preserving tribal land and continuity.
- source_word: פְּלֵיטָה
  chosen: the survivors
  alternatives:
  - the remnant
  - those who escaped
  lexicon: HALOT
  rationale: The term denotes escaped survivors. In this immediate narrative context,
    it refers to the surviving Benjaminites after the near-destruction of the tribe.
    'The survivors' is clear modern English; 'remnant' is possible but can sound more
    theologically loaded than the context requires.
- source_word: לְבִנְיָמִן
  chosen: of Benjamin
  alternatives:
  - for Benjamin
  - for the Benjaminites
  lexicon: HALOT
  rationale: The lamed can be rendered 'for' or expressed idiomatically in English
    as 'of' with 'survivors of Benjamin.' This best captures that the survivors belong
    to the tribe of Benjamin rather than that Benjamin as an abstract entity receives
    an inheritance.
- source_word: וְלֹא יִמָּחֶה
  chosen: so that ... may not be blotted out
  alternatives:
  - and ... not be wiped out
  - and ... not be erased
  lexicon: HALOT
  rationale: The Niphal of מחה conveys being wiped out, blotted out, or erased. 'Blotted
    out' preserves the force and biblical resonance of removal from existence or record,
    while 'so that' makes explicit the purposive sense implied by the clause in context.
- source_word: שֵׁבֶט
  chosen: a tribe
  alternatives:
  - the tribe
  - a tribal line
  lexicon: HALOT
  rationale: שֵׁבֶט here refers to one of Israel's tribes. The anarthrous Hebrew is
    well represented by English 'a tribe,' emphasizing that no tribal unit of Israel
    should disappear.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: Simple separative מן. 'From Israel' is idiomatic and preserves the sense
    that a tribe must not vanish from among the covenant people.
