id: JDG.21.24
reference: Judges 21:24
source:
  edition: WLC
  text: וַ/יִּתְהַלְּכ֨וּ מִ/שָּׁ֤ם בְּנֵֽי יִשְׂרָאֵל֙ בָּ/עֵ֣ת הַ/הִ֔יא אִ֥ישׁ לְ/שִׁבְט֖/וֹ
    וּ/לְ/מִשְׁפַּחְתּ֑/וֹ וַ/יֵּצְא֣וּ מִ/שָּׁ֔ם אִ֖ישׁ לְ/נַחֲלָתֽ/וֹ־׃
translation:
  text: Then the sons of Israel departed from there at that time, each man to his
    tribe and to his family, and they went out from there, each man to his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to his clan'; the Hebrew term can denote a wider kinship group than
      an immediate family.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his allotted land'; 'inheritance' here refers to each Israelite's
      hereditary territorial possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  chosen: departed
  alternatives:
  - went
  - walked away
  lexicon: HALOT
  rationale: The hitpael of הלך here functions idiomatically for setting out or dispersing
    rather than emphasizing literal walking. 'Departed' captures the narrative sense
    of leaving the assembly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression and its masculine
    form. 'Israelites' is possible, but 'sons of Israel' better reflects the source
    wording in this narrative context.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in those days
  - at that moment
  lexicon: HALOT
  rationale: This phrase is a straightforward temporal marker. 'At that time' is natural
    English and closely matches the Hebrew.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive use of אִישׁ is preserved with 'each man.' This follows
    the project's gender-accurate principle and reflects the masculine singular form
    used representatively for the members of Israel.
- source_word: לְשִׁבְטוֹ
  chosen: to his tribe
  alternatives:
  - to his tribal group
  lexicon: HALOT
  rationale: '''Tribe'' is the standard and precise rendering for שֵׁבֶט in Israel''s
    social structure.'
- source_word: וּלְמִשְׁפַּחְתּוֹ
  chosen: and to his family
  alternatives:
  - and to his clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can denote a clan-level kinship unit. 'Family' is readable
    modern English; 'clan' is a viable alternative and is preserved in a footnote
    because the social unit may be broader than the modern nuclear family.
- source_word: וַיֵּצְאוּ
  chosen: they went out
  alternatives:
  - they left
  - they returned
  lexicon: HALOT
  rationale: The verb יצא is literally 'go out.' Here it marks the next stage of departure
    from the gathering place. 'Went out' preserves the Hebrew verbal imagery without
    overinterpreting.
- source_word: לְנַחֲלָתוֹ
  chosen: to his inheritance
  alternatives:
  - to his possession
  - to his allotted land
  lexicon: HALOT
  rationale: נַחֲלָה commonly refers to inherited allotment, especially land within
    Israel. 'Inheritance' preserves both the legal and territorial sense; 'allotted
    land' is interpretive and thus better kept as an alternative.
