id: JDG.21.25
reference: Judges 21:25
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם אֵ֥ין מֶ֖לֶךְ בְּ/יִשְׂרָאֵ֑ל אִ֛ישׁ הַ/יָּשָׁ֥ר בְּ/עֵינָ֖י/ו
    יַעֲשֶֽׂה׃
translation:
  text: In those days there was no king in Israel; each man did what was right in
    his own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone did what was right in his own eyes.' The Hebrew has the masculine
      singular 'each man,' used distributively.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: A standard temporal formula in narrative Hebrew. 'In those days' is idiomatic,
    natural English and preserves the retrospective framing.
- source_word: אֵין מֶלֶךְ
  chosen: there was no king
  alternatives:
  - there was not a king
  lexicon: HALOT
  rationale: The existential negative אֵין with a noun is best rendered as a simple
    existential clause. 'There was no king' is idiomatic and preserves the statement
    of political absence.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Locative phrase indicating the national setting. 'In Israel' is the straightforward
    rendering.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - everyone
  lexicon: HALOT
  rationale: The singular distributive noun means 'each man/every man.' Following
    the project's gender-accurate principle, 'each man' preserves the masculine singular
    representative force better than the gender-neutral 'everyone.'
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - what was upright
  lexicon: HALOT
  rationale: 'With the article, the adjective functions substantivally: ''the right/upright
    thing.'' ''What was right'' is idiomatic English and captures the moral evaluative
    sense.'
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - in his own sight
  lexicon: HALOT
  rationale: This Hebrew idiom expresses subjective personal judgment. 'In his own
    eyes' is the established and accurate English equivalent; 'own' makes the reflexive
    sense explicit.
- source_word: יַעֲשֶׂה
  chosen: did
  alternatives:
  - would do
  - was doing
  lexicon: HALOT
  rationale: Though morphologically imperfect, in this summary statement it describes
    customary past action in the narrative frame. English simple past 'did' communicates
    the habitual retrospective sense most naturally.
