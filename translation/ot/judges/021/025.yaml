theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: each man
  alternative_readings:
  - everyone
  - each person
  rationale: The Hebrew uses masculine singular representative language. Per the doctrine's
    gender-accurate principle, the translation preserves that form rather than neutralizing
    it, while the sense remains distributive across the population.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Implied evaluation of the refrain
  chosen_reading: Retain the statement without adding interpretive qualifiers
  alternative_readings:
  - each man did whatever he pleased
  - everyone did whatever seemed best to them
  rationale: The verse is often understood as a negative theological assessment of
    Israel's disorder, but the Hebrew wording itself states that each man did what
    was right in his own eyes. The translation preserves that wording and does not
    intensify it beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
