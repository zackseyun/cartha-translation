id: JDG.21.2
reference: Judges 21:2
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הָ/עָם֙ בֵּֽית אֵ֔ל וַ/יֵּ֤שְׁבוּ שָׁם֙ עַד הָ/עֶ֔רֶב לִ/פְנֵ֖י
    הָ/אֱלֹהִ֑ים וַ/יִּשְׂא֣וּ קוֹלָ֔/ם וַ/יִּבְכּ֖וּ בְּכִ֥י גָדֽוֹל־־׃
translation:
  text: Then the people came to Bethel and sat there before God until evening, and
    they raised their voices and wept with great weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wept a great weeping'; the Hebrew uses a cognate expression for intensified
      mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol here narrates arrival. 'Came' is natural
    English for movement to a named place in narrative. 'Entered' would over-specify,
    and 'went' weakens the sense of arrival.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the army
  - the nation
  lexicon: HALOT
  rationale: עם commonly denotes the assembled people. In this context it refers to
    the gathered Israelites corporately, not specifically a military force, so 'the
    people' is the best broad rendering.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - the house of God
  lexicon: HALOT
  rationale: This is the place name Bethel, not a common noun phrase in this verse.
    Per translation philosophy, personal and place names are transliterated by standard
    conventions.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: sat there
  alternatives:
  - remained there
  - stayed there
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell/remain.' Here the physical and durative
    sense before God until evening is well conveyed by 'sat there.' 'Remained' is
    possible but less concrete than the Hebrew.
- source_word: עַד הָעֶרֶב
  chosen: until evening
  alternatives:
  - until the evening
  lexicon: HALOT
  rationale: A straightforward temporal phrase. English idiom prefers 'until evening'
    without the article.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - before the LORD
  - in the presence of God
  lexicon: HALOT
  rationale: The Hebrew reads האלהים, not YHWH, so 'God' should be retained rather
    than importing the covenant name. 'Before God' is a clear and sufficiently formal
    rendering of the presence formula לִפְנֵי.
- source_word: וַיִּשְׂאוּ קוֹלָם
  chosen: raised their voices
  alternatives:
  - lifted up their voice
  - raised their voice
  lexicon: HALOT
  rationale: This idiom means to cry out audibly. 'Raised their voices' preserves
    the plural subject naturally in modern English while reflecting the Hebrew idiom.
- source_word: וַיִּבְכּוּ בְּכִי גָדוֹל
  chosen: wept with great weeping
  alternatives:
  - wept bitterly
  - wept loudly
  - wept a great weeping
  lexicon: HALOT
  rationale: The cognate construction intensifies the action. 'Wept with great weeping'
    preserves the Hebrew emphasis more transparently than the interpretive 'wept bitterly.'
    It is slightly formal but still readable and auditable.
