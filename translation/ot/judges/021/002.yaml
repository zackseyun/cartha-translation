theological_decisions:
- issue: Rendering of הָאֱלֹהִים in a cultic setting
  chosen_reading: God
  alternative_readings:
  - the LORD
  rationale: The source text uses האלהים rather than the divine name YHWH. Following
    original-language primacy, the translation preserves 'God' and does not harmonize
    to 'the LORD,' even though the setting is worship at Bethel.
