id: JDG.21.6
reference: Judges 21:6
source:
  edition: WLC
  text: וַ/יִּנָּֽחֲמוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶל בִּנְיָמִ֖ן אָחִ֑י/ו וַ/יֹּ֣אמְר֔וּ
    נִגְדַּ֥ע הַ/יּ֛וֹם שֵׁ֥בֶט אֶחָ֖ד מִ/יִּשְׂרָאֵֽל־׃
translation:
  text: And the sons of Israel grieved over Benjamin their brother, and they said,
    “Today one tribe has been cut off from Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had compassion for Benjamin their brother' or 'were sorry for Benjamin
      their brother.' The Hebrew verb can express sorrow, pity, or relenting depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּחֲמוּ
  chosen: grieved over
  alternatives:
  - had compassion for
  - were sorry for
  - relented concerning
  lexicon: HALOT
  rationale: The Niphal of נחם here expresses sorrow/compassion in response to Benjamin’s
    near-destruction. 'Grieved over' fits the emotional sense in context better than
    the more wooden 'repented' or the potentially misleading 'comforted themselves.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the familial/corporate expression in
    the Hebrew. Although 'Israelites' is idiomatic, 'sons of Israel' reflects the
    source wording and remains readable.
- source_word: אֶל
  chosen: over
  alternatives:
  - for
  - concerning
  lexicon: HALOT
  rationale: Though literally 'to/toward,' with נחם in this context it marks the object
    of grief or compassion. English idiom requires a relational rendering such as
    'over' or 'for'; 'over' pairs naturally with 'grieved.'
- source_word: בִּנְיָמִן אָחִיו
  chosen: Benjamin their brother
  alternatives:
  - Benjamin, his brother
  - their brother Benjamin
  lexicon: HALOT
  rationale: The singular suffix on 'his brother' functions collectively with the
    plural subject 'sons of Israel,' referring to Benjamin as their fellow tribal
    brother. 'Benjamin their brother' communicates the corporate kinship clearly in
    English.
- source_word: נִגְדַּע
  chosen: has been cut off
  alternatives:
  - has been hewn down
  - has been destroyed
  lexicon: HALOT
  rationale: The verb גדע literally denotes being cut down/off. 'Has been cut off'
    preserves the metaphor and the severity of the tribe’s loss without overinterpreting
    it as total annihilation.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - This day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    immediacy of the lament.'
- source_word: שֵׁבֶט אֶחָד
  chosen: one tribe
  alternatives:
  - a single tribe
  lexicon: HALOT
  rationale: The phrase denotes one tribal unit within Israel. 'One tribe' is direct
    and idiomatic.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: '''From Israel'' is the most natural rendering of the separative preposition
    here, indicating removal from the national whole.'
