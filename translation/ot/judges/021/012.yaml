id: JDG.21.12
reference: Judges 21:12
source:
  edition: WLC
  text: וַֽ/יִּמְצְא֞וּ מִ/יּוֹשְׁבֵ֣י יָבֵ֣ישׁ גִּלְעָ֗ד אַרְבַּ֤ע מֵאוֹת֙ נַעֲרָ֣ה
    בְתוּלָ֔ה אֲשֶׁ֧ר לֹֽא יָדְעָ֛ה אִ֖ישׁ לְ/מִשְׁכַּ֣ב זָכָ֑ר וַ/יָּבִ֨יאוּ אוֹתָ֤/ם
    אֶל הַֽ/מַּחֲנֶה֙ שִׁלֹ֔ה אֲשֶׁ֖ר בְּ/אֶ֥רֶץ כְּנָֽעַן׀־־׃ס
translation:
  text: And from the inhabitants of Jabesh-gilead they found four hundred young women,
    virgins, who had not known a man by lying with a male; and they brought them to
    the camp at Shiloh, which is in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'who had not had sexual relations with a man.' The
      Hebrew reads literally, 'who had not known a man by lying with a male.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they discovered
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of מצא, straightforwardly rendered as a past
    narrative verb.
- source_word: מִיּוֹשְׁבֵי יָבֵישׁ גִּלְעָד
  chosen: from the inhabitants of Jabesh-gilead
  alternatives:
  - among the inhabitants of Jabesh-gilead
  - from those living in Jabesh-gilead
  lexicon: HALOT
  rationale: The preposition מִן with ישׁב can indicate selection from a group. 'Inhabitants'
    is idiomatic and preserves the sense of those dwelling there.
- source_word: אַרְבַּע מֵאוֹת
  chosen: four hundred
  lexicon: HALOT
  rationale: Direct cardinal number.
- source_word: נַעֲרָה
  chosen: young women
  alternatives:
  - girls
  - maidens
  lexicon: HALOT
  rationale: Though singular in form after the number, it is collective in sense.
    'Young women' is natural modern English and avoids the archaic tone of 'maidens'
    while preserving age/sex reference better than the potentially too-young 'girls'.
- source_word: בְתוּלָה
  chosen: virgins
  alternatives:
  - virgin women
  lexicon: HALOT
  rationale: The appositional noun specifies sexual status. 'Virgins' is the most
    direct rendering.
- source_word: אֲשֶׁר לֹא יָדְעָה אִישׁ
  chosen: who had not known a man
  alternatives:
  - who had not had relations with a man
  - whom no man had known
  lexicon: HALOT
  rationale: ידע is a conventional sexual euphemism here. 'Had not known a man' preserves
    the Hebrew idiom while remaining understandable in context.
- source_word: לְמִשְׁכַּב זָכָר
  chosen: by lying with a male
  alternatives:
  - in sexual intercourse with a male
  - for the lying of a male
  lexicon: HALOT
  rationale: This phrase clarifies the sexual sense of 'known.' 'By lying with a male'
    stays close to the Hebrew construction and avoids over-paraphrase. 'Male' reflects
    זָכָר directly.
- source_word: וַיָּבִיאוּ אוֹתָם
  chosen: and they brought them
  alternatives:
  - and they led them
  lexicon: HALOT
  rationale: ביא normally means 'bring.' The pronoun is masculine plural in form but
    refers to the group of women; English naturally uses 'them.'
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - into the camp
  lexicon: HALOT
  rationale: Direct destination with אל. 'To the camp' is the most neutral rendering.
- source_word: שִׁלֹה
  chosen: Shiloh
  rationale: Standard English transliteration of the place name.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  chosen: which is in the land of Canaan
  alternatives:
  - that was in the land of Canaan
  lexicon: HALOT
  rationale: Relative clause identifying Shiloh's location. Present tense 'is' works
    naturally in English for geographic description within past narrative.
