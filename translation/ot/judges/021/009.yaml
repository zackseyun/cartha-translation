id: JDG.21.9
reference: Judges 21:9
source:
  edition: WLC
  text: וַ/יִּתְפָּקֵ֖ד הָ/עָ֑ם וְ/הִנֵּ֤ה אֵֽין שָׁם֙ אִ֔ישׁ מִ/יּוֹשְׁבֵ֖י יָבֵ֥שׁ
    גִּלְעָֽד־׃
translation:
  text: And the people were mustered, and behold, there was not a man there from the
    inhabitants of Jabesh-gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there was no one there from the inhabitants of Jabesh-gilead.' The
      Hebrew more literally says, 'there was not a man there,' using masculine language
      that likely reflects the representative or military context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּקֵד
  chosen: were mustered
  alternatives:
  - were counted
  - were inspected
  - assembled themselves
  lexicon: HALOT
  rationale: The verb from פקד in the Hitpael/passive-like narrative form here refers
    to taking a muster or roll of the people. 'Were mustered' best fits the military/corporate
    context and the following discovery of absence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the army
  - the troops
  - the congregation
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In this context it refers to the assembled
    Israelite body; 'the people' preserves the Hebrew wording without over-specifying
    'army,' though the setting is martial.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention to what was discovered. 'And behold' preserves
    the discourse force and narrative vividness.
- source_word: אֵין שָׁם אִישׁ
  chosen: there was not a man there
  alternatives:
  - there was no one there
  - not one man was there
  lexicon: HALOT
  rationale: The Hebrew is literally masculine singular 'man' with existential negation.
    Following the gender-accurate policy, 'man' is retained rather than neutralizing
    to 'one,' especially since the context concerns fighting men/representatives from
    a town.
- source_word: מִיּוֹשְׁבֵי
  chosen: from the inhabitants of
  alternatives:
  - from those dwelling in
  - from the residents of
  lexicon: HALOT
  rationale: The participial form of ישב denotes those who live in a place. 'Inhabitants
    of' is idiomatic and suitably formal for the context.
- source_word: יָבֵשׁ גִּלְעָד
  chosen: Jabesh-gilead
  alternatives:
  - Jabesh Gilead
  lexicon: HALOT
  rationale: This is a place name and should be transliterated. The hyphenated conventional
    English form clearly represents the single toponym.
