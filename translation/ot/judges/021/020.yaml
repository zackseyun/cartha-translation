id: JDG.21.20
reference: Judges 21:20
source:
  edition: WLC
  text: ו/יצו אֶת בְּנֵ֥י בִנְיָמִ֖ן לֵ/אמֹ֑ר לְכ֖וּ וַ/אֲרַבְתֶּ֥ם בַּ/כְּרָמִֽים־׃
translation:
  text: And they commanded the sons of Benjamin, saying, “Go and lie in wait in the
    vineyards.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “set an ambush in the vineyards.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the sons of Benjamin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: And they commanded
  alternatives:
  - And he commanded
  - and they instructed
  lexicon: HALOT
  rationale: The verb צוה means 'to command, charge, instruct.' The morphology supplied
    indicates 3mp, supporting 'they commanded.' Although some English versions smooth
    to singular from the broader context, the provided form favors plural and should
    be reflected in the draft.
- source_word: אֶת בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the children of Benjamin
  lexicon: HALOT
  rationale: Literally 'the sons of Benjamin.' This preserves the Hebrew kinship expression
    and remains natural English. 'Benjaminites' is possible dynamically, but the more
    formal rendering better matches the source wording here.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard Hebrew quotative infinitive introducing direct speech; 'saying'
    is the most transparent and conventional rendering.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Imperative plural of הלך, straightforwardly 'go.'
- source_word: וַאֲרַבְתֶּם
  chosen: and lie in wait
  alternatives:
  - and set an ambush
  - and lurk in ambush
  lexicon: HALOT
  rationale: 'From ארב, ''to lie in wait, ambush.'' Because it follows an imperative
    (''Go''), English idiom is best served by continuing the command sense: ''Go and
    lie in wait.'' ''Set an ambush'' is possible but slightly more interpretive than
    the verbal idea of hiding in wait.'
- source_word: בַּכְּרָמִים
  chosen: in the vineyards
  alternatives:
  - among the vineyards
  lexicon: HALOT
  rationale: כרמים refers to vineyards. 'In the vineyards' is the most direct rendering
    of the preposition and fits the scene naturally.
