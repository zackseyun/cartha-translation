id: JDG.21.16
reference: Judges 21:16
source:
  edition: WLC
  text: וַ/יֹּֽאמְר֨וּ זִקְנֵ֣י הָ/עֵדָ֔ה מַה נַּעֲשֶׂ֥ה לַ/נּוֹתָרִ֖ים לְ/נָשִׁ֑ים
    כִּֽי נִשְׁמְדָ֥ה מִ/בִּנְיָמִ֖ן אִשָּֽׁה־־׃
translation:
  text: Then the elders of the congregation said, “What shall we do for wives for
    those who remain, since the women of Benjamin have been destroyed?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'since from Benjamin a woman has been destroyed,' using
      the singular 'woman' collectively for the women of Benjamin.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי הָעֵדָה
  chosen: the elders of the congregation
  alternatives:
  - the elders of the assembly
  - the elders of the community
  lexicon: HALOT
  rationale: זִקְנֵי is the construct plural 'elders of,' and הָעֵדָה commonly denotes
    the assembled community or congregation. 'Congregation' preserves the corporate
    sense without implying a specifically modern civic body.
- source_word: מַה נַּעֲשֶׂה
  chosen: What shall we do
  alternatives:
  - What are we to do
  - What should we do
  lexicon: HALOT
  rationale: The interrogative plus 1cp imperfect expresses deliberation about future
    action. 'What shall we do' is natural English and preserves the force of communal
    deliberation.
- source_word: לַנּוֹתָרִים
  chosen: for those who remain
  alternatives:
  - for the survivors
  - for those left
  lexicon: HALOT
  rationale: From יתר/נותר, referring to those left over after the slaughter. 'Those
    who remain' is slightly more formal and stays close to the participial sense;
    'survivors' is possible but somewhat more interpretive.
- source_word: לְנָשִׁים
  chosen: for wives
  alternatives:
  - for women as wives
  - for women
  lexicon: HALOT
  rationale: The preposition plus נָשִׁים in this context means obtaining women as
    wives for the remaining Benjaminites, not merely women in general. 'For wives'
    conveys the idiomatic marital sense in English.
- source_word: כִּי
  chosen: since
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the question. 'Since' reads smoothly
    in English while preserving the causal force.
- source_word: נִשְׁמְדָה
  chosen: have been destroyed
  alternatives:
  - have been wiped out
  - have perished
  lexicon: HALOT
  rationale: The Niphal of שׁמד conveys being destroyed or exterminated. The plural
    English subject 'the women' requires 'have been destroyed.' This preserves the
    severity of the statement without colloquializing it.
- source_word: מִבִּנְיָמִן אִשָּׁה
  chosen: the women of Benjamin
  alternatives:
  - from Benjamin, a woman
  - from Benjamin, any woman
  - a woman from Benjamin
  lexicon: HALOT
  rationale: 'Literally ''from Benjamin a woman,'' with אִשָּׁה singular used collectively
    after a passive verb. In idiomatic English the sense is collective: no women remain
    from Benjamin. Rendering as ''the women of Benjamin'' communicates the intended
    meaning clearly.'
