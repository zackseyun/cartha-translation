id: JDG.21.18
reference: Judges 21:18
source:
  edition: WLC
  text: וַ/אֲנַ֗חְנוּ לֹ֥א נוּכַ֛ל לָ/תֵת לָ/הֶ֥ם נָשִׁ֖ים מִ/בְּנוֹתֵ֑י/נוּ כִּֽי
    נִשְׁבְּע֤וּ בְנֵֽי יִשְׂרָאֵל֙ לֵ/אמֹ֔ר אָר֕וּר נֹתֵ֥ן אִשָּׁ֖ה לְ/בִנְיָמִֽן־־־׃ס
translation:
  text: But we cannot give them wives from our daughters, because the sons of Israel
    have sworn, saying, ‘Cursed is the one who gives a wife to Benjamin.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'to the tribe of Benjamin' or 'to a Benjaminite'; the
      Hebrew uses the tribal name 'Benjamin' directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  chosen: But we
  alternatives:
  - And we
  - Now we
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive or continuative
    turn in the speakers' reasoning. 'But we' fits the discourse flow in English and
    preserves the emphatic subject.
- source_word: לֹא נוּכַל
  chosen: cannot
  alternatives:
  - are not able to
  - cannot lawfully
  lexicon: HALOT
  rationale: The verb יכל denotes ability or possibility. In context the inability
    is practical and oath-bound, but the Hebrew states inability directly rather than
    explicitly adding 'lawfully,' so 'cannot' is the best concise rendering.
- source_word: לָתֵת לָהֶם
  chosen: give them
  alternatives:
  - give to them
  - provide for them
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with indirect object suffix. English
    idiom prefers 'give them' over the more wooden 'give to them.'
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although the noun can mean 'women' or 'wives,' the marriage context in
    Judges 21 makes 'wives' clearly intended.
- source_word: מִבְּנוֹתֵינוּ
  chosen: from our daughters
  alternatives:
  - from among our daughters
  lexicon: HALOT
  rationale: The preposition מן indicates source. 'From our daughters' is natural
    English and preserves the sense that the women would be taken from their own daughters.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the stated inability. 'Because' is
    the clearest modern English equivalent.
- source_word: נִשְׁבְּעוּ
  chosen: have sworn
  alternatives:
  - swore
  - bound themselves by oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' Present perfect in
    English conveys a past oath with continuing force in the present discussion.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the formally masculine
    expression is retained as 'sons of Israel.' 'Israelites' is possible but smooths
    over the source form.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - declaring
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the oath. 'Saying'
    is simple and transparent.
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: אָרוּר is the standard covenantal/judicial term for being under a curse.
    'Cursed' is clear modern English without archaic weight.
- source_word: נֹתֵן אִשָּׁה
  chosen: the one who gives a wife
  alternatives:
  - whoever gives a wife
  - one giving a woman in marriage
  lexicon: HALOT
  rationale: The participle functions generically. 'The one who gives a wife' preserves
    the singular generic force and the marriage sense of אִשָּׁה in context.
- source_word: לְבִנְיָמִן
  chosen: to Benjamin
  alternatives:
  - to the tribe of Benjamin
  - to a Benjaminite
  lexicon: HALOT
  rationale: The Hebrew uses the tribal name directly. In context it refers to the
    tribe/corporate Benjamin rather than merely the individual patriarch, and English
    can preserve that compactly as 'to Benjamin.'
