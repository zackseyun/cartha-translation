id: JDG.21.19
reference: Judges 21:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֡וּ הִנֵּה֩ חַג יְהוָ֨ה בְּ/שִׁל֜וֹ מִ/יָּמִ֣ים יָמִ֗ימָ/ה אֲשֶׁ֞ר
    מִ/צְּפ֤וֹנָ/ה לְ/בֵֽית אֵל֙ מִזְרְחָ֣/ה הַ/שֶּׁ֔מֶשׁ לִ/מְסִלָּ֔ה הָ/עֹלָ֥ה מִ/בֵּֽית
    אֵ֖ל שְׁכֶ֑מָ/ה וּ/מִ/נֶּ֖גֶב לִ/לְבוֹנָֽה־׀־־׃
translation:
  text: And they said, "Look, there is a feast of the LORD in Shiloh from year to
    year, which is north of Bethel, east of the highway that goes up from Bethel to
    Shechem, and south of Lebonah."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a festival of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''from days to days,'' that is, ''from year to year.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses a natural modern discourse marker that still preserves the deictic
    force of drawing attention to what follows.
- source_word: חַג יְהוָה
  chosen: a feast of the LORD
  alternatives:
  - a festival of the LORD
  - the feast of the LORD
  lexicon: HALOT
  rationale: חַג denotes a festival/feast, often pilgrimage-related. 'Feast' is idiomatic
    and suitably weighty. The construct with יְהוָה is rendered 'of the LORD,' following
    the project's default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: בְּשִׁלֹה
  chosen: in Shiloh
  lexicon: HALOT
  rationale: Locative preposition plus place name; standard transliteration of the
    toponym.
- source_word: מִיָּמִים יָמִימָה
  chosen: from year to year
  alternatives:
  - yearly
  - at set times each year
  - from days to days
  lexicon: HALOT
  rationale: This idiom refers to regular annual recurrence. 'From year to year' preserves
    the idiomatic sense while remaining readable.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause describing Shiloh's location.
- source_word: מִצְּפוֹנָה לְבֵית אֵל
  chosen: north of Bethel
  alternatives:
  - to the north of Bethel
  lexicon: HALOT
  rationale: Directional expression with מן conveys relative location; concise English
    geographic phrasing is best.
- source_word: מִזְרְחָה הַשֶּׁמֶשׁ
  chosen: east
  alternatives:
  - eastward
  - toward the sunrise
  lexicon: HALOT
  rationale: Literally 'toward the sunrise,' but in geographic description the idiomatic
    sense is simply 'east.'
- source_word: לִמְסִלָּה
  chosen: of the highway
  alternatives:
  - of the road
  - of the main road
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a raised or major road/highway. 'Highway' best
    reflects a recognized route in the geographic description.
- source_word: הָעֹלָה
  chosen: that goes up
  alternatives:
  - that ascends
  - that leads up
  lexicon: HALOT
  rationale: Participial form describing the road. 'Goes up' is a natural rendering
    and preserves the Hebrew topographical idiom.
- source_word: מִבֵּית אֵל שְׁכֶמָה
  chosen: from Bethel to Shechem
  alternatives:
  - from Bethel toward Shechem
  lexicon: HALOT
  rationale: The directional suffix on שְׁכֶמָה indicates motion toward Shechem. In
    English, 'from Bethel to Shechem' is the clearest way to express the route.
- source_word: וּמִנֶּגֶב לִלְבוֹנָה
  chosen: and south of Lebonah
  alternatives:
  - and to the south of Lebonah
  lexicon: HALOT
  rationale: נֶגֶב here functions as a directional term 'south.' The phrase completes
    the geographic triangulation of Shiloh's location.
