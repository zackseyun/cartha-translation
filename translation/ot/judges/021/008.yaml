id: JDG.21.8
reference: Judges 21:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ מִ֗י אֶחָד֙ מִ/שִּׁבְטֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֛ר לֹֽא עָלָ֥ה אֶל
    יְהוָ֖ה הַ/מִּצְפָּ֑ה וְ֠/הִנֵּה לֹ֣א בָא אִ֧ישׁ אֶל הַֽ/מַּחֲנֶ֛ה מִ/יָּבֵ֥ישׁ
    גִּלְעָ֖ד אֶל הַ/קָּהָֽל־־־־־׃
translation:
  text: And they said, “Which one from the tribes of Israel did not go up to the LORD
    at Mizpah?” And behold, not a man from Jabesh-gilead had come to the camp, to
    the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the LORD at Mizpah.' The Hebrew can be understood as appearing
      before Yahweh at the assembly site.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'not a man'; the singular masculine form emphasizes that no individual
      from Jabesh-gilead was present.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And they said' preserves the Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: מִי אֶחָד
  chosen: Which one
  alternatives:
  - Who is the one
  - What one
  lexicon: HALOT
  rationale: The combination asks for identification of a single offending group/unit
    from among Israel; 'Which one' is idiomatic English and preserves the singular
    focus.
- source_word: מִשִּׁבְטֵי יִשְׂרָאֵל
  chosen: from the tribes of Israel
  alternatives:
  - of the tribes of Israel
  - among the tribes of Israel
  lexicon: HALOT
  rationale: The preposition מִן marks selection from a larger set. 'From the tribes
    of Israel' is natural and keeps the tribal framework explicit.
- source_word: לֹא עָלָה
  chosen: did not go up
  alternatives:
  - had not gone up
  - did not come up
  lexicon: HALOT
  rationale: עלה commonly means 'go up' for travel to an assembly or sacred site.
    The idiom is retained rather than flattened to 'come' because the upward pilgrimage/approach
    nuance is conventional in biblical Hebrew.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. The phrase indicates appearing
    in covenantal assembly directed to YHWH; 'to the LORD' is a straightforward rendering
    of אֶל.
- source_word: הַמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: Although the Hebrew form can reflect motion toward the place, in English
    the assembly location is most naturally expressed as 'at Mizpah' after 'go up
    to the LORD.' This avoids awkward double destination phrasing while preserving
    the locale.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Marks a noteworthy discovery in the narrative. 'And behold' preserves
    the discourse force better than omitting it.
- source_word: לֹא בָא אִישׁ
  chosen: not a man had come
  alternatives:
  - no one had come
  - not one man came
  lexicon: HALOT
  rationale: The singular אִישׁ after negation is idiomatically distributive. 'Not
    a man had come' preserves the masculine singular form and the emphatic absence;
    this matches the gender-accurate policy.
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - into the camp
  lexicon: HALOT
  rationale: מַחֲנֶה refers to the gathered encampment of Israel. 'To the camp' is
    the most direct rendering of אֶל in this context.
- source_word: מִיָּבֵישׁ גִּלְעָד
  chosen: from Jabesh-gilead
  alternatives:
  - of Jabesh-gilead
  lexicon: HALOT
  rationale: 'The preposition marks origin/source: no man from that town had come.
    Standard English transliteration is retained for the place name.'
- source_word: אֶל הַקָּהָל
  chosen: to the assembly
  alternatives:
  - to the congregation
  - for the assembly
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community/assembly. 'Assembly' is clear modern
    English and fits the civic-sacral gathering context better than the more church-associated
    'congregation.' The second אֶל is retained appositionally ('to the camp, to the
    assembly') to reflect the Hebrew's emphasis on the communal gathering.
