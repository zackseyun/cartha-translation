theological_decisions:
- issue: Rendering of חרם in a warfare/judgment context
  chosen_reading: devote to destruction
  alternative_readings:
  - utterly destroy
  - put under the ban
  rationale: The Hebrew carries more than ordinary killing; it denotes consecration
    to destruction under ban. The chosen rendering preserves that theological-legal
    nuance without archaic obscurity.
