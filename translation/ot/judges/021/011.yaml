id: JDG.21.11
reference: Judges 21:11
source:
  edition: WLC
  text: וְ/זֶ֥ה הַ/דָּבָ֖ר אֲשֶׁ֣ר תַּעֲשׂ֑וּ כָּל זָכָ֗ר וְ/כָל אִשָּׁ֛ה יֹדַ֥עַת
    מִשְׁכַּב זָכָ֖ר תַּחֲרִֽימוּ־־־׃
translation:
  text: 'And this is what you shall do: every male, and every woman who has known
    the bed of a male, you shall devote to destruction.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'every woman who has had sexual relations with a man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'devote to destruction' refers to placing someone under the ban for
      destruction, not merely ordinary killing.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/זֶה
  chosen: And this
  alternatives:
  - Now this
  - And this is
  lexicon: HALOT
  rationale: Introduces the instruction that follows. Retaining the conjunction with
    'And' preserves the narrative flow.
- source_word: הַ/דָּבָר אֲשֶׁר תַּעֲשׂוּ
  chosen: is what you shall do
  alternatives:
  - is the thing that you shall do
  - is the matter that you shall do
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew construction 'this [is] the thing that
    you shall do,' preserving imperative force without wooden phrasing.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all males
  lexicon: HALOT
  rationale: זָכָר denotes male sex rather than specifically adult social status.
    'Every male' is more precise than 'every man' in this context of total destruction.
- source_word: וְ/כָל אִשָּׁה
  chosen: and every woman
  alternatives:
  - and every female
  - and every wife
  lexicon: HALOT
  rationale: אִשָּׁה here is best rendered 'woman' in contrast with males and then
    qualified by sexual experience. 'Female' is possible but less natural; 'wife'
    is too specific.
- source_word: יֹדַעַת
  chosen: has known
  alternatives:
  - has had relations with
  - knows
  lexicon: HALOT
  rationale: The participle from ידע is a standard euphemism for sexual relations
    in Hebrew. 'Has known' preserves the source idiom while remaining understandable
    in context.
- source_word: מִשְׁכַּב זָכָר
  chosen: the bed of a male
  alternatives:
  - lying with a male
  - sexual relations with a man
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves the Hebrew euphemistic expression.
    Because the phrase clearly refers to sexual intercourse, a more explicit alternative
    is preserved in a footnote.
- source_word: תַּחֲרִימוּ
  chosen: you shall devote to destruction
  alternatives:
  - you shall utterly destroy
  - you shall put under the ban
  lexicon: HALOT
  rationale: Hiphil of חרם refers to placing persons or things under the ban for destruction.
    'Devote to destruction' preserves the technical force better than simply 'kill'
    or 'destroy'.
