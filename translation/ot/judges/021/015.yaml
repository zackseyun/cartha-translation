theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for the Tetragrammaton, preserving reverential convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency of the disaster affecting Benjamin
  chosen_reading: the LORD had made a breach among the tribes of Israel
  alternative_readings:
  - the LORD had allowed a breach among the tribes of Israel
  rationale: The Hebrew verb עָשָׂה straightforwardly attributes the action to the LORD. The translation preserves that attribution rather than softening it to mere permission, while leaving the theological tension intact.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
