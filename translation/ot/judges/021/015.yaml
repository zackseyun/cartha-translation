id: JDG.21.15
reference: Judges 21:15
source:
  edition: WLC
  text: וְ/הָ/עָ֥ם נִחָ֖ם לְ/בִנְיָמִ֑ן כִּֽי עָשָׂ֧ה יְהוָ֛ה פֶּ֖רֶץ בְּ/שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And the people had compassion for Benjamin, because Yahweh had made a breach among the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had compassion for Benjamin' or 'was sorry concerning Benjamin.' The Hebrew verb can express grief, pity, or regret depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעָם
  chosen: And the people
  alternatives:
  - And the nation
  lexicon: HALOT
  rationale: הָעָם here refers to the assembled Israelite community in the narrative, best rendered 'the people' in natural English.
- source_word: נִחָם
  chosen: grieved
  alternatives:
  - had compassion
  - relented
  - was sorry
  lexicon: HALOT
  rationale: The Niphal of נחם can denote being sorry, grieving, or relenting. In this context the people are lamenting Benjamin's devastation, so 'grieved' best captures the emotional sense without implying a reversal of decision.
- source_word: לְבִנְיָמִן
  chosen: for Benjamin
  alternatives:
  - concerning Benjamin
  - over Benjamin
  lexicon: HALOT
  rationale: The preposition ל marks the object or occasion of grief; 'for Benjamin' is idiomatic and clear.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the people's grief.
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - had caused
  - brought about
  lexicon: HALOT
  rationale: The qatal form reports a completed action prior to the grief being described; English pluperfect fits the narrative sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פֶּרֶץ
  chosen: a breach
  alternatives:
  - a gap
  - a rupture
  - a breaking
  lexicon: HALOT
  rationale: פֶּרֶץ denotes a breach, break, or rupture. Here it metaphorically describes the catastrophic loss within Israel's tribal structure. 'Breach' preserves the metaphor and gravity better than flatter alternatives.
- source_word: בְּשִׁבְטֵי יִשְׂרָאֵל
  chosen: among the tribes of Israel
  alternatives:
  - in the tribes of Israel
  - within the tribes of Israel
  lexicon: HALOT
  rationale: The preposition ב here is best expressed idiomatically as 'among,' indicating that the breach affected Israel's tribal body collectively.
