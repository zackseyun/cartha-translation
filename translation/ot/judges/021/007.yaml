id: JDG.21.7
reference: Judges 21:7
source:
  edition: WLC
  text: מַה נַּעֲשֶׂ֥ה לָ/הֶ֛ם לַ/נּוֹתָרִ֖ים לְ/נָשִׁ֑ים וַ/אֲנַ֨חְנוּ֙ נִשְׁבַּ֣עְנוּ בַֽ/יהוָ֔ה לְ/בִלְתִּ֛י תֵּת לָ/הֶ֥ם מִ/בְּנוֹתֵ֖י/נוּ לְ/נָשִֽׁים־־׃
translation:
  text: What shall we do for those who remain, for wives? For we have sworn by Yahweh not to give them any of our daughters as wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for wives''; the English ''to get wives'' makes the implied sense explicit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the survivors.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה נַּעֲשֶׂה
  chosen: What shall we do
  alternatives:
  - What are we to do
  - What can we do
  lexicon: HALOT
  rationale: Interrogative מַה with 1cp imperfect of עשה expresses deliberation about a course of action. 'What shall we do' is natural modern English and preserves the cohortative/deliberative sense without over-paraphrase.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - about them
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as advantage/reference: what action should be taken for their benefit. ''For them'' fits the immediate context of finding wives for the surviving Benjaminites.'
- source_word: לַנּוֹתָרִים
  chosen: for those who remain
  alternatives:
  - for the survivors
  - for the remnant
  lexicon: HALOT
  rationale: From יתר/נותר, referring to the surviving men of Benjamin after the slaughter. 'Those who remain' is slightly more formal and closely reflects the participial form; 'survivors' is possible but somewhat more interpretive.
- source_word: לְנָשִׁים
  chosen: to get wives
  alternatives:
  - for wives
  - as regards wives
  lexicon: HALOT
  rationale: 'The bare Hebrew phrase is elliptical: literally ''for wives.'' In English, the sense must be supplied. ''To get wives'' makes explicit the implied purpose of the deliberation while staying close to the context.'
- source_word: וַאֲנַחְנוּ נִשְׁבַּעְנוּ
  chosen: For we have sworn
  alternatives:
  - And we have sworn
  - Yet we have sworn
  lexicon: HALOT
  rationale: The conjunction introduces the reason for the dilemma. Rendering ו as 'for' communicates the explanatory force in context better than a mechanically formal 'and.' Perfect 'have sworn' reflects a past oath with present binding force.
- source_word: בַיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text. 'By' correctly reflects oath formula usage with ב.
- source_word: לְבִלְתִּי תֵּת
  chosen: not to give
  alternatives:
  - to refrain from giving
  lexicon: HALOT
  rationale: 'This construction expresses purpose/content of the oath: they swore not to give. The concise English infinitive is the clearest equivalent.'
- source_word: מִבְּנוֹתֵינוּ
  chosen: any of our daughters
  alternatives:
  - from our daughters
  - our daughters
  lexicon: HALOT
  rationale: 'The מן is naturally partitive here: not to give from among our daughters. ''Any of our daughters'' captures the distributive/partitive force idiomatically.'
- source_word: לְנָשִׁים
  chosen: as wives
  alternatives:
  - for wives
  lexicon: HALOT
  rationale: In the second occurrence, the phrase modifies the giving of daughters in marriage. 'As wives' is idiomatic English for marital status and avoids awkward repetition of 'for wives.'
