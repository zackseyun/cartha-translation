theological_decisions:
- issue: Rendering of sacrificial terminology
  chosen_reading: burnt offerings and peace offerings
  alternative_readings:
  - burnt offerings and fellowship offerings
  - burnt offerings and offerings of well-being
  rationale: The verse names standard Israelite sacrifices without further theological
    explanation. Traditional sacrificial terms are retained in readable modern English,
    while preserving semantic alternatives for שְׁלָמִים in documentation.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
