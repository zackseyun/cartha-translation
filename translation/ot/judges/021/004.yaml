id: JDG.21.4
reference: Judges 21:4
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יַּשְׁכִּ֣ימוּ הָ/עָ֔ם וַ/יִּבְנוּ שָׁ֖ם מִזְבֵּ֑חַ
    וַ/יַּעֲל֥וּ עֹל֖וֹת וּ/שְׁלָמִֽים־׃פ
translation:
  text: And the next day the people rose early, built an altar there, and offered
    burnt offerings and peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.' The Hebrew term
      refers to a class of sacrifices associated with peace, wholeness, and shared
      communion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִמָּחֳרָת
  chosen: And the next day
  alternatives:
  - And it happened on the next day
  - And on the following day
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally includes 'and it happened,' but
    in natural English narrative this is typically absorbed. 'The next day' preserves
    the temporal sense of מִמָּחֳרָת without unnecessary stiffness.
- source_word: וַיַּשְׁכִּימוּ
  chosen: rose early
  alternatives:
  - got up early
  - started early in the morning
  lexicon: HALOT
  rationale: The verb means to rise early. 'Rose early' is concise, natural, and preserves
    the temporal emphasis.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the army
  - the Israelites
  lexicon: HALOT
  rationale: The noun is the common term 'the people.' Although the referent is Israel,
    the Hebrew does not explicitly say 'Israelites' here, so 'the people' is preferred.
- source_word: וַיִּבְנוּ שָׁם מִזְבֵּחַ
  chosen: built an altar there
  alternatives:
  - built there an altar
  lexicon: HALOT
  rationale: This straightforwardly renders the clause while keeping normal English
    word order. 'There' is retained because שָׁם is explicit in the Hebrew.
- source_word: וַיַּעֲלוּ
  chosen: offered
  alternatives:
  - brought up
  - presented
  lexicon: HALOT
  rationale: In sacrificial context, the idiom 'cause to go up' is best rendered 'offered,'
    which communicates the cultic action clearly in English.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: This is the standard and accurate rendering for the sacrificial term
    עֹלָה in the plural.
- source_word: וּשְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: '''Peace offerings'' is the most established English rendering for שְׁלָמִים
    and remains understandable. Alternatives reflect aspects of the term''s semantic
    range, including communion and well-being.'
