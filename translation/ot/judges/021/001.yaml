id: JDG.21.1
reference: Judges 21:1
source:
  edition: WLC
  text: וְ/אִ֣ישׁ יִשְׂרָאֵ֔ל נִשְׁבַּ֥ע בַּ/מִּצְפָּ֖ה לֵ/אמֹ֑ר אִ֣ישׁ מִמֶּ֔/נּוּ
    לֹא יִתֵּ֥ן בִּתּ֛/וֹ לְ/בִנְיָמִ֖ן לְ/אִשָּֽׁה־׃
translation:
  text: Now the men of Israel had sworn at Mizpah, saying, “No man among us shall
    give his daughter to Benjamin as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to Benjamin' likely means 'to the tribe of Benjamin' or 'to a Benjaminite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  chosen: Now the men of Israel
  alternatives:
  - And the men of Israel
  - Now the man of Israel
  lexicon: HALOT
  rationale: Although אִישׁ is morphologically singular, with a collective/national
    sense plus the proper name Israel it functions idiomatically for the Israelite
    men as a group. Rendering it as plural natural English best reflects the collective
    force in context. 'Now' captures the discourse-linking waw in readable English;
    'And' is possible but less natural at a chapter opening.
- source_word: נִשְׁבַּע
  chosen: had sworn
  alternatives:
  - swore
  - had taken an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' English past perfect
    fits the narrative context, since the oath precedes the ensuing events. 'Had sworn'
    is concise and natural.
- source_word: בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: The preposition with place name is naturally rendered 'at Mizpah' for
    the location where the oath was made.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing the content of the oath; 'saying'
    is the normal English equivalent.
- source_word: אִישׁ מִמֶּנּוּ
  chosen: No man among us
  alternatives:
  - Not one of us
  - No one from among us
  lexicon: HALOT
  rationale: Literally 'a man from us,' in this oath context meaning each individual
    Israelite male. 'No man among us' preserves the gendered and distributive force
    of the Hebrew.
- source_word: לֹא יִתֵּן
  chosen: shall give
  alternatives:
  - will give
  - may give
  lexicon: HALOT
  rationale: In oath language, the imperfect with negation expresses a binding future
    prohibition/commitment. 'Shall give' best conveys the solemnity.
- source_word: בִּתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Straightforward possessive singular; the oath concerns giving one's daughter
    in marriage.
- source_word: לְבִנְיָמִן
  chosen: to Benjamin
  alternatives:
  - to the Benjaminites
  lexicon: HALOT
  rationale: The singular proper name Benjamin can stand for the tribe collectively.
    Here 'to Benjamin' is a close rendering of the Hebrew and idiomatic enough in
    English, especially with the marriage context making the tribal sense clear.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: HALOT
  rationale: This construction commonly means giving a woman in marriage to become
    someone's wife. 'As a wife' is clear, natural, and close to the Hebrew idiom.
