id: JDG.21.22
reference: Judges 21:22
source:
  edition: WLC
  text: וְ/הָיָ֡ה כִּֽי יָבֹ֣אוּ אֲבוֹתָ/ם֩ א֨וֹ אֲחֵי/הֶ֜ם ל/רוב אֵלֵ֗י/נוּ וְ/אָמַ֤רְנוּ
    אֲלֵי/הֶם֙ חָנּ֣וּ/נוּ אוֹתָ֔/ם כִּ֣י לֹ֥א לָקַ֛חְנוּ אִ֥ישׁ אִשְׁתּ֖/וֹ בַּ/מִּלְחָמָ֑ה
    כִּ֣י לֹ֥א אַתֶּ֛ם נְתַתֶּ֥ם לָ/הֶ֖ם כָּ/עֵ֥ת תֶּאְשָֽׁמוּ־׀׃ס
translation:
  text: And it shall be, when their fathers or their brothers come to contend with
    us, that we will say to them, ‘Show us favor concerning them, because we did not
    take for each man his wife in the battle; for you did not give them to them at
    this time, so that you should incur guilt.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'come to complain to us' or 'come to bring a case against us.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'be gracious to us concerning them'; the plea is for leniency toward
      the speakers regarding the women.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is terse: ''we did not take each man his wife in the battle,''
      likely meaning that not enough wives had been obtained in war for the men of
      Benjamin.'
    reason: cultural_note
  - marker: d
    text: Or 'you did not give the women to them'; the Hebrew repeats pronouns compactly.
    reason: lexical_alternative
  - marker: e
    text: The final clause is difficult Hebrew. The sense is that because the women
      were not formally given by their families, the families would not be held guilty.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרִיב
  chosen: come to contend with us
  alternatives:
  - come to complain to us
  - come to bring a case against us
  lexicon: HALOT
  rationale: The infinitive construct of ריב with אֵלֵינוּ indicates coming to dispute,
    complain, or bring a grievance. 'Contend with us' preserves the adversarial sense
    without over-legalizing it.
- source_word: חָנּוּנוּ אֹתָם
  chosen: Show us favor concerning them
  alternatives:
  - Be gracious to us regarding them
  - Grant them to us as a favor
  lexicon: HALOT
  rationale: The imperative from חנן with 1cp suffix literally means 'be gracious
    to us.' Because the object 'them' follows, the sense is a plea for leniency toward
    the speakers in the matter of the women. 'Show us favor concerning them' keeps
    both the appeal to mercy and the connection to the women.
- source_word: לֹא לָקַחְנוּ אִישׁ אִשְׁתּוֹ בַּמִּלְחָמָה
  chosen: we did not take for each man his wife in the battle
  alternatives:
  - we did not seize each man his wife in battle
  - we did not take a wife for each man in the battle
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat awkward. The sense is that the
    Israelites had not captured enough women in war to provide each Benjaminite with
    a wife. 'For each man his wife' reflects אִישׁ אִשְׁתּוֹ more closely than the
    smoother but less literal 'a wife for each man.'
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in war
  - by war
  lexicon: HALOT
  rationale: The prefixed preposition is best taken locatively/instrumentally with
    reference to the recent conflict. 'In the battle' is a natural rendering that
    preserves the concrete historical setting.
- source_word: לֹא אַתֶּם נְתַתֶּם לָהֶם
  chosen: you did not give them to them
  alternatives:
  - you did not yourselves give them to them
  - you did not give the women to them
  lexicon: HALOT
  rationale: The clause contrasts direct parental giving in marriage with the irregular
    acquisition described in context. The repeated pronouns are retained, though slightly
    awkward in English, to mirror the Hebrew distinction between the women ('them')
    and the Benjaminite recipients ('to them').
- source_word: כָּעֵת תֶּאְשָׁמוּ
  chosen: at this time, so that you should incur guilt
  alternatives:
  - now you would become guilty
  - at such a time you would bear guilt
  lexicon: HALOT
  rationale: 'The phrase is difficult. In context it explains why the fathers/brothers
    are not culpable: they did not formally give the women. Rendering the result as
    ''so that you should incur guilt'' makes explicit the implied consequence while
    preserving the temporal phrase ''at this time.'''
