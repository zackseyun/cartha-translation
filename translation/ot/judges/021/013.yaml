id: JDG.21.13
reference: Judges 21:13
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְחוּ֙ כָּל הָ֣/עֵדָ֔ה וַֽ/יְדַבְּרוּ֙ אֶל בְּנֵ֣י בִנְיָמִ֔ן אֲשֶׁ֖ר
    בְּ/סֶ֣לַע רִמּ֑וֹן וַ/יִּקְרְא֥וּ לָ/הֶ֖ם שָׁלֽוֹם־־׃
translation:
  text: Then the whole congregation sent word and spoke to the sons of Benjamin who
    were at the rock of Rimmon, and proclaimed peace to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were in Sela-rimmon'; the Hebrew may be understood either as a descriptive
      phrase, 'the rock of Rimmon,' or as a more fixed place-name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: sent word
  alternatives:
  - sent
  - sent messengers
  lexicon: HALOT
  rationale: The verb שׁלח simply means 'send,' but in this context it is immediately
    followed by 'and spoke to,' implying a communicative mission rather than a bare
    physical dispatch. 'Sent word' captures the sense naturally in English without
    over-specifying 'messengers,' which is not explicit in the Hebrew.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the congregation
  - the whole assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    preserves the corporate covenant-community sense well in English; 'whole' reflects
    כָּל.
- source_word: וַיְדַבְּרוּ אֶל
  chosen: spoke to
  alternatives:
  - spoke with
  - addressed
  lexicon: HALOT
  rationale: דבר אל is the standard idiom 'speak to.' 'Spoke to' is the most direct
    and transparent rendering.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Benjamin.' In keeping with the project's
    gender-accurate philosophy, the literal familial/tribal expression is retained
    rather than generalized to 'Benjaminites,' though that remains a viable idiomatic
    alternative.
- source_word: אֲשֶׁר בְּסֶלַע רִמּוֹן
  chosen: who were at the rock of Rimmon
  alternatives:
  - who were in Sela-rimmon
  - who were at Sela Rimmon
  lexicon: HALOT
  rationale: סֶלַע means 'rock' or 'crag.' Since רִמּוֹן is a place-name element here,
    'the rock of Rimmon' gives the plain sense of the Hebrew construction. A more
    transliterated place-name reading is possible and worth preserving in a footnote.
- source_word: וַיִּקְרְאוּ לָהֶם שָׁלוֹם
  chosen: proclaimed peace to them
  alternatives:
  - called peace to them
  - offered them peace
  - announced peace to them
  lexicon: HALOT
  rationale: קרא + indirect object + שׁלום conveys a formal declaration or offer of
    peaceful relations. 'Proclaimed peace to them' preserves the public, declarative
    force better than the less idiomatic literal 'called peace to them.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - terms of peace
  lexicon: HALOT
  rationale: שָׁלוֹם here refers to peaceful relations/reconciliation rather than
    merely inner well-being. 'Peace' is the standard and sufficiently broad rendering
    in context.
