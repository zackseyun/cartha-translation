id: JDG.21.14
reference: Judges 21:14
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב בִּנְיָמִן֙ בָּ/עֵ֣ת הַ/הִ֔יא וַ/יִּתְּנ֤וּ לָ/הֶם֙ הַ/נָּשִׁ֔ים
    אֲשֶׁ֣ר חִיּ֔וּ מִ/נְּשֵׁ֖י יָבֵ֣שׁ גִּלְעָ֑ד וְ/לֹֽא מָצְא֥וּ לָ/הֶ֖ם כֵּֽן־׃
translation:
  text: So Benjamin returned at that time, and they gave them the women whom they
    had kept alive from the women of Jabesh-gilead; but they did not find enough for
    them that way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'but they did not find so for them.' The Hebrew expression
      is elliptical, meaning that there were not enough women for them by this means.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol here most naturally means 'returned' in
    narrative sequence, referring to the surviving Benjaminites resuming relation
    with the wider community.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  alternatives:
  - the Benjaminites
  lexicon: HALOT
  rationale: Although singular in form, the name functions collectively for the tribe
    in context. 'Benjamin' preserves the Hebrew form while English readers can understand
    the tribal sense from context.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that time period
  - then
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is natural modern English
    and preserves the narrative marker.
- source_word: וַיִּתְּנוּ לָהֶם
  chosen: they gave them
  alternatives:
  - they provided for them
  lexicon: HALOT
  rationale: נתן with indirect object is straightforwardly 'gave them.' The subject
    is the Israelite assembly from context, but the Hebrew leaves it implicit, so
    the English does as well.
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - the wives
  lexicon: HALOT
  rationale: The noun is literally 'the women.' While the women are being assigned
    as wives in context, the Hebrew term here is not the more specific 'wives,' so
    'women' is preferred.
- source_word: אֲשֶׁר חִיּוּ
  chosen: whom they had kept alive
  alternatives:
  - whom they had preserved alive
  - whom they had let live
  lexicon: HALOT
  rationale: 'The piel of חיה here is causative/intensive: they caused these women
    to remain alive after the slaughter. ''Kept alive'' is idiomatic and reflects
    the prior action.'
- source_word: מִנְּשֵׁי יָבֵשׁ גִּלְעָד
  chosen: from the women of Jabesh-gilead
  alternatives:
  - from among the women of Jabesh-gilead
  lexicon: HALOT
  rationale: The מן marks source/origin. 'From the women of Jabesh-gilead' is concise
    and accurate.
- source_word: וְלֹא מָצְאוּ לָהֶם כֵּן
  chosen: but they did not find enough for them that way
  alternatives:
  - but they did not find so for them
  - but there were not enough for them
  - but they did not find thus for them
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat idiomatic. כֵּן literally means
    'thus/so,' but in context the sense is that this measure did not suffice to provide
    wives for all the Benjaminites. 'Enough for them that way' makes the implied sense
    explicit without over-paraphrasing.
