id: JDG.21.21
reference: Judges 21:21
source:
  edition: WLC
  text: וּ/רְאִיתֶ֗ם וְ֠/הִנֵּה אִם יֵ֨צְא֥וּ בְנוֹת שִׁילוֹ֮ לָ/ח֣וּל בַּ/מְּחֹלוֹת֒
    וִֽ/יצָאתֶם֙ מִן הַ/כְּרָמִ֔ים וַ/חֲטַפְתֶּ֥ם לָ/כֶ֛ם אִ֥ישׁ אִשְׁתּ֖/וֹ מִ/בְּנ֣וֹת
    שִׁיל֑וֹ וַ/הֲלַכְתֶּ֖ם אֶ֥רֶץ בִּנְיָמִֽן־־־׃
translation:
  text: 'Watch, and behold: if the daughters of Shiloh come out to dance in the dances,
    then come out from the vineyards and seize for yourselves, each man his wife from
    the daughters of Shiloh, and go to the land of Benjamin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snatch' or 'carry off'; the Hebrew verb denotes forceful taking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/רְאִיתֶם
  chosen: Watch
  alternatives:
  - See
  - Look
  lexicon: HALOT
  rationale: Though literally 'and you shall see,' in this imperative-like instruction
    sequence it functions as a command to observe carefully. 'Watch' fits the context
    of lying in wait better than the more static 'see.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - look
  - then
  lexicon: HALOT
  rationale: Retained as an attention marker rather than omitted, since it heightens
    the immediacy of the instruction. In English, 'and behold' is slightly formal
    but still readable and reflects the discourse function.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: The particle is conditional in form. Although the sense is close to 'when'
    in this planned scenario, 'if' better reflects the Hebrew wording while remaining
    natural in the sequence.
- source_word: יֵצְאוּ
  chosen: come out
  alternatives:
  - go out
  lexicon: HALOT
  rationale: '''Come out'' is idiomatic in English for emerging from a place into
    view; either gloss is possible, but ''come out'' reads more naturally here.'
- source_word: בְנוֹת שִׁילוֹ
  chosen: the daughters of Shiloh
  alternatives:
  - the young women of Shiloh
  - the women of Shiloh
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew familial/social idiom.
    'Young women' is contextually plausible, but 'daughters of Shiloh' keeps the source
    texture and avoids over-interpreting age.
- source_word: לָחוּל
  chosen: to dance
  alternatives:
  - to whirl
  - to celebrate with dancing
  lexicon: HALOT
  rationale: The verb refers to dancing in this context. 'To dance' is the clearest
    modern English equivalent.
- source_word: בַּמְּחֹלוֹת
  chosen: in the dances
  alternatives:
  - in the dancing
  - in the round dances
  lexicon: HALOT
  rationale: The plural noun likely refers to dance performances or dance circles.
    'In the dances' preserves the plural form and avoids adding specifics not explicit
    in the text.
- source_word: וִיצָאתֶם מִן הַכְּרָמִים
  chosen: then come out from the vineyards
  alternatives:
  - then go out from the vineyards
  lexicon: HALOT
  rationale: The instruction is to emerge from hiding places among the vineyards.
    'Come out' is vivid and natural in English.
- source_word: וַחֲטַפְתֶּם
  chosen: seize
  alternatives:
  - snatch
  - carry off
  - kidnap
  lexicon: HALOT
  rationale: The verb denotes forceful taking. 'Seize' is strong and direct without
    importing a modern legal category into the main text. Because the action is clearly
    abduction-like, stronger alternatives are preserved in a footnote.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for yourselves as wives
  - for your own use
  lexicon: HALOT
  rationale: The dative indicates personal acquisition. 'For yourselves' is sufficient
    in English, with the following phrase specifying the marital purpose.
- source_word: אִישׁ אִשְׁתּוֹ
  chosen: each man his wife
  alternatives:
  - every man his wife
  - a man his wife
  lexicon: HALOT
  rationale: This distributive expression indicates one apiece. 'Each man his wife'
    preserves the gendered singular structure and the distributive force.
- source_word: מִבְּנוֹת שִׁילוֹ
  chosen: from the daughters of Shiloh
  alternatives:
  - from among the daughters of Shiloh
  lexicon: HALOT
  rationale: A straightforward rendering of the source phrase; 'from' is adequate,
    though the sense is selection from among them.
- source_word: וַהֲלַכְתֶּם אֶרֶץ בִּנְיָמִן
  chosen: and go to the land of Benjamin
  alternatives:
  - and depart to the land of Benjamin
  - and go into the land of Benjamin
  lexicon: HALOT
  rationale: The phrase directs movement toward Benjaminite territory. 'Go to the
    land of Benjamin' is clear and natural.
