theological_decisions:
- issue: Gendered distributive wording
  chosen_reading: each man his wife
  alternative_readings:
  - each of you a wife
  - each man a wife
  rationale: The Hebrew is explicitly gendered and singular-distributive. Per the
    translation philosophy's gender-accurate principle, the masculine singular is
    preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Moral description of the action
  chosen_reading: seize for yourselves
  alternative_readings:
  - kidnap for yourselves
  - carry off for yourselves
  rationale: The verse narrates and commands a violent taking of women, but the translation
    should render the lexical force of חטף without adding interpretive or legal terminology
    beyond what the Hebrew itself states. A footnote preserves sharper English alternatives
    to make the force auditable.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
