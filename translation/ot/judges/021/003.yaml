id: JDG.21.3
reference: Judges 21:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ לָ/מָ֗ה יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הָ֥יְתָה זֹּ֖את בְּ/יִשְׂרָאֵ֑ל לְ/הִפָּקֵ֥ד הַ/יּ֛וֹם מִ/יִּשְׂרָאֵ֖ל שֵׁ֥בֶט אֶחָֽד׃
translation:
  text: And they said, “Why, O Yahweh, God of Israel, has this happened in Israel, that today one tribe should be lacking from Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''has this been in Israel,'' an idiom meaning ''has this happened in Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'that today one tribe should be lacking from Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And they said' preserves the narrative flow without over-interpreting temporal nuance.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative of lament/inquiry; 'Why' is the natural and sufficiently formal English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct chain identifying YHWH as the God belonging to Israel. 'God of Israel' is the standard, transparent rendering.
- source_word: הָיְתָה זֹּאת
  chosen: has this happened
  alternatives:
  - has this come to pass
  - was this
  lexicon: HALOT
  rationale: Although literally 'has this been,' English idiom prefers 'has this happened' for an event or state of affairs. This is an optimal-equivalence rendering that preserves the sense of lament over an occurrence.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב here is locative/corporate. 'In Israel' is concise and natural, while still allowing the corporate sense.
- source_word: לְהִפָּקֵד
  chosen: should be missing
  alternatives:
  - should be lacking
  - should be numbered as absent
  - to be missing
  lexicon: HALOT
  rationale: Niphal infinitive construct of פקד here conveys being absent/lacking from the whole. 'Should be missing' best captures the resultative sense in idiomatic English within the clause introduced by 'that.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is modern, readable English and preserves the temporal emphasis of the Hebrew definite expression.'
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: מן marks separation from the larger national body. 'From Israel' is the most straightforward rendering.
- source_word: שֵׁבֶט אֶחָד
  chosen: one tribe
  alternatives:
  - a single tribe
  lexicon: HALOT
  rationale: The phrase denotes one tribal unit of Israel. 'One tribe' is direct and natural.
