theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrinal
    and stylistic policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine and refers to the covenant people
    corporately. Per the project's gender-accurate policy, the masculine form is preserved
    rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
