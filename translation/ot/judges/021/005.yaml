id: JDG.21.5
reference: Judges 21:5
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל מִ֠י אֲשֶׁ֨ר לֹא עָלָ֧ה בַ/קָּהָ֛ל מִ/כָּל
    שִׁבְטֵ֥י יִשְׂרָאֵ֖ל אֶל יְהוָ֑ה כִּי֩ הַ/שְּׁבוּעָ֨ה הַ/גְּדוֹלָ֜ה הָיְתָ֗ה
    לַ֠/אֲשֶׁר לֹא עָלָ֨ה אֶל יְהוָ֧ה הַ/מִּצְפָּ֛ה לֵ/אמֹ֖ר מ֥וֹת יוּמָֽת־־־־־׃
translation:
  text: And the sons of Israel said, “Who is there from all the tribes of Israel who
    did not come up in the assembly to the LORD?” For the great oath had been made
    concerning whoever did not come up to the LORD at Mizpah, saying, “He shall surely
    be put to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites said.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the LORD” represents the divine name YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew idiom
    and the gendered corporate expression present in the source. 'Israelites' is smoother
    English but less transparent to the wording.
- source_word: מִי אֲשֶׁר
  chosen: Who is there ... who
  alternatives:
  - Who
  - Which one ... that
  lexicon: HALOT
  rationale: The interrogative plus relative construction asks for identification
    of a person fitting the description. Expanded slightly in English for naturalness
    while preserving the sense.
- source_word: לֹא עָלָה
  chosen: did not come up
  alternatives:
  - did not go up
  - did not ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' 'Come up' fits the perspective of
    gathering at the sacred assembly and is idiomatic in English.
- source_word: בַקָּהָל
  chosen: in the assembly
  alternatives:
  - to the assembly
  - among the assembly
  - in the congregation
  lexicon: HALOT
  rationale: קהל denotes the assembled community. With the preposition ב, 'in the
    assembly' best reflects the Hebrew while remaining natural. 'Congregation' is
    possible but can sound more ecclesiastical than the context requires.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: 'The preposition is straightforwardly ''to.'' The divine name follows
    project doctrine: YHWH rendered ''the LORD.'' ''Before the LORD'' is interpretive
    and not required here.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
- source_word: הַשְּׁבוּעָה הַגְּדוֹלָה
  chosen: the great oath
  alternatives:
  - the solemn oath
  - the major oath
  lexicon: HALOT
  rationale: A direct rendering preserves both the noun and adjective. 'Solemn oath'
    captures force but adds interpretation beyond the adjective 'great.'
- source_word: הָיְתָה לַאֲשֶׁר
  chosen: had been made concerning whoever
  alternatives:
  - was against whoever
  - was upon whoever
  - applied to whoever
  lexicon: HALOT
  rationale: The construction indicates that the oath stood with reference to the
    person who failed to come. English requires some smoothing; 'had been made concerning
    whoever' conveys the legal force without over-specifying the preposition.
- source_word: הַמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  - at the Mizpah
  lexicon: HALOT
  rationale: Although the Hebrew form includes the article, place names in English
    normally omit it. 'At Mizpah' best fits the gathering location in context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - namely
  - as follows
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the oath.
- source_word: מוֹת יוּמָת
  chosen: He shall surely be put to death
  alternatives:
  - he shall surely die
  - he must certainly be executed
  lexicon: HALOT
  rationale: The infinitive absolute with passive/imperfect intensifies certainty.
    'Be put to death' makes the passive/judicial sense explicit in context better
    than the less specific 'surely die.'
