id: JDG.21.10
reference: Judges 21:10
source:
  edition: WLC
  text: וַ/יִּשְׁלְחוּ שָׁ֣ם הָ/עֵדָ֗ה שְׁנֵים עָשָׂ֥ר אֶ֛לֶף אִ֖ישׁ מִ/בְּנֵ֣י הֶ/חָ֑יִל
    וַ/יְצַוּ֨וּ אוֹתָ֜/ם לֵ/אמֹ֗ר לְ֠כוּ וְ/הִכִּיתֶ֞ם אֶת יוֹשְׁבֵ֨י יָבֵ֤שׁ גִּלְעָד֙
    לְ/פִי חֶ֔רֶב וְ/הַ/נָּשִׁ֖ים וְ/הַ/טָּֽף־־־־׃
translation:
  text: So the assembly sent there twelve thousand men from the sons of valor, and
    they commanded them, saying, “Go and strike the inhabitants of Jabesh-gilead with
    the edge of the sword, including the women and the little ones.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “from the valiant men” or “from the warriors.” Hebrew: “from the sons
      of valor.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדָה
  chosen: the assembly
  alternatives:
  - the congregation
  - the community
  lexicon: HALOT
  rationale: עֵדָה denotes the gathered Israelite body acting corporately. 'Assembly'
    is natural modern English and preserves the formal, collective sense better than
    the more ecclesiastical 'congregation.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - from there
  lexicon: HALOT
  rationale: The adverb most straightforwardly means 'there.' In context it indicates
    the destination/scene of the sending rather than necessarily the point of origin;
    English 'sent there' is idiomatic and fits the syntax.
- source_word: שְׁנֵים עָשָׂר אֶלֶף אִישׁ
  chosen: twelve thousand men
  alternatives:
  - twelve thousand soldiers
  lexicon: HALOT
  rationale: A literal numerical expression with אִישׁ functioning distributively/collectively.
    'Men' keeps the source wording; the military nuance is supplied by the following
    phrase rather than replacing אִישׁ itself with 'soldiers.'
- source_word: מִבְּנֵי הֶחָיִל
  chosen: from the sons of valor
  alternatives:
  - from the valiant men
  - from the warriors
  - from the mighty men
  lexicon: HALOT
  rationale: Literally 'from the sons of valor.' Because the translation philosophy
    prefers gender-accurate renderings where the source is explicitly masculine, 'sons
    of valor' preserves the Hebrew idiom and male reference. The phrase denotes proven
    fighting men; this nuance is reflected in the footnote alternatives but not flattened
    in the main text.
- source_word: וַיְצַוּוּ אֹתָם לֵאמֹר
  chosen: and they commanded them, saying
  alternatives:
  - and they instructed them, saying
  lexicon: HALOT
  rationale: צוה is a strong verb of command, not mere instruction. Retaining 'saying'
    reflects the Hebrew infinitive construction and keeps the narrative cadence.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative of הלך. 'Go' is sufficient and direct.
- source_word: וְהִכִּיתֶם
  chosen: and strike
  alternatives:
  - and attack
  - and kill
  lexicon: HALOT
  rationale: נכה has a broad range including strike, smite, defeat, kill. Here the
    following phrase 'with the edge of the sword' specifies lethal violence, so 'strike'
    preserves the lexical value while allowing the complement to carry the manner
    and severity.
- source_word: יֹשְׁבֵי יָבֵשׁ גִּלְעָד
  chosen: the inhabitants of Jabesh-gilead
  alternatives:
  - those living in Jabesh-gilead
  - the residents of Jabesh-gilead
  lexicon: HALOT
  rationale: The participle 'those dwelling' is idiomatically rendered 'inhabitants'
    in English. 'Jabesh-gilead' is a standard transliteration of the place name.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for killing by sword. 'With the edge
    of the sword' is a clear, established English equivalent that preserves the concrete
    imagery better than the more compressed 'by the sword.'
- source_word: וְהַנָּשִׁים
  chosen: including the women
  alternatives:
  - and the women
  lexicon: HALOT
  rationale: The object list extends the command to additional groups. 'Including'
    makes the scope explicit in smooth English without changing the sense.
- source_word: וְהַטָּף
  chosen: the little ones
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף refers to small children/dependents. 'Little ones' preserves the
    pathos and age nuance more closely than the broader 'children.'
