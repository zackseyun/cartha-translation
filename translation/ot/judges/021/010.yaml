theological_decisions:
- issue: Rendering a violent command without softening or expanding it
  chosen_reading: Translate the command directly and plainly, preserving its severity
  alternative_readings:
  - Use euphemistic language such as 'defeat' or 'put under the ban'
  - Expand interpretively to make explicit that killing is intended in every clause
  rationale: The verse narrates a command of lethal violence against Jabesh-gilead,
    including women and children. The translation should neither sanitize the text
    nor add theological explanation not present in the Hebrew. 'Strike ... with the
    edge of the sword, including the women and the little ones' preserves the grim
    force of the command while staying close to the wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
- issue: Gendered military idiom in מִבְּנֵי הֶחָיִל
  chosen_reading: Preserve the masculine idiom as 'sons of valor' in the main text
  alternative_readings:
  - valiant men
  - warriors
  rationale: The Hebrew is explicitly masculine and idiomatic. Per the doctrine's
    gender-accurate principle, the translation should not neutralize the male reference.
    Because 'sons of valor' may sound unfamiliar, an alternative is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
