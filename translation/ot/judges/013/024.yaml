id: JDG.13.24
reference: Judges 13:24
source:
  edition: WLC
  text: וַ/תֵּ֤לֶד הָֽ/אִשָּׁה֙ בֵּ֔ן וַ/תִּקְרָ֥א אֶת שְׁמ֖/וֹ שִׁמְשׁ֑וֹן וַ/יִּגְדַּ֣ל הַ/נַּ֔עַר וַֽ/יְבָרְכֵ֖/הוּ יְהוָֽה־׃
translation:
  text: And the woman bore a son and called his name Samson. And the boy grew, and Yahweh blessed him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Qal wayyiqtol of ילד, the standard verb for childbirth. 'Bore' is concise, natural, and formally close to the Hebrew narrative style.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - his wife
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the woman,' referring back to Manoah's wife. Retaining 'the woman' preserves the narrative wording without adding information not present in this verse.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a boy child
  lexicon: HALOT
  rationale: בן here denotes a male child. 'A son' is the standard and most natural rendering in this birth context.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  chosen: called his name
  alternatives:
  - named him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is transparent and still acceptable English in biblical narrative; it preserves the naming formula more closely than the smoother 'named him.'
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: וַיִּגְדַּל
  chosen: grew
  alternatives:
  - became great
  - grew up
  lexicon: HALOT
  rationale: From גדל, in context describing the child's development. 'Grew' is the most natural English equivalent and avoids overreading the verb as greatness rather than maturation.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: נער can cover a range from child to young man; here, immediately after birth and before later exploits, 'the boy' best fits the developmental context.
- source_word: וַיְבָרְכֵהוּ
  chosen: blessed him
  alternatives:
  - favored him
  lexicon: HALOT
  rationale: From ברך, the standard verb 'to bless.' 'Blessed him' preserves the theological and covenantal resonance better than a weaker paraphrase such as 'favored him.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
