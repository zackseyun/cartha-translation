theological_decisions:
- issue: Identity of the visitor
  chosen_reading: Render הָאִישׁ as 'the man' rather than 'the angel'
  alternative_readings:
  - the angel
  - the messenger
  rationale: Although the broader context identifies the figure as the angel of the
    LORD, this verse itself uses the ordinary noun אִישׁ ('man'). Preserving 'the
    man' maintains the narrative unfolding and avoids importing later identification
    into the immediate wording.
  doctrine_reference: Translation philosophy §1, §3
