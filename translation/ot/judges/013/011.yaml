id: JDG.13.11
reference: Judges 13:11
source:
  edition: WLC
  text: וַ/יָּ֛קָם וַ/יֵּ֥לֶךְ מָנ֖וֹחַ אַחֲרֵ֣י אִשְׁתּ֑/וֹ וַ/יָּבֹא֙ אֶל הָ/אִ֔ישׁ
    וַ/יֹּ֣אמֶר ל֗/וֹ הַ/אַתָּ֥ה הָ/אִ֛ישׁ אֲשֶׁר דִּבַּ֥רְתָּ אֶל הָ/אִשָּׁ֖ה וַ/יֹּ֥אמֶר
    אָֽנִי־־־׃
translation:
  text: So Manoah arose and went after his wife, and came to the man and said to him,
    “Are you the man who spoke to the woman?” And he said, “I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “following his wife.” The Hebrew literally says “after his wife.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the woman,” not “my wife.”
    reason: lexical_alternative
  - marker: c
    text: Or, “I am he.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - rose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly means 'arose' or 'got up.' 'Arose' preserves
    the narrative cadence and slightly formal register of Hebrew storytelling without
    sounding archaic in context.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - walked
  lexicon: HALOT
  rationale: הלך in this narrative sequence is the ordinary verb 'went.' 'Walked'
    would over-specify manner not required by the Hebrew.
- source_word: אַחֲרֵי אִשְׁתּוֹ
  chosen: after his wife
  alternatives:
  - following his wife
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after.' In context it indicates Manoah went
    along behind or in pursuit of his wife to meet the visitor. 'After his wife' is
    the most direct rendering; 'following his wife' is possible but slightly more
    interpretive.
- source_word: וַיָּבֹא אֶל הָאִישׁ
  chosen: came to the man
  alternatives:
  - went to the man
  - came up to the man
  lexicon: HALOT
  rationale: בוא with אֶל is naturally 'came to.' Retaining 'the man' reflects the
    Hebrew designation of the mysterious visitor at this point in the narrative.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש / visitor
  lexicon: HALOT
  rationale: The repeated noun אִישׁ is rendered consistently as 'man.' Although the
    figure is later understood to be the angel of the LORD, the text here presents
    him under the surface description 'the man,' and the translation should preserve
    that narrative perspective.
- source_word: הַאַתָּה
  chosen: Are you
  alternatives:
  - Are you indeed
  - Is it you
  lexicon: HALOT
  rationale: The interrogative plus pronoun forms a direct question. 'Are you' is
    the natural English equivalent; adding 'indeed' would overemphasize the question.
- source_word: אֲשֶׁר דִּבַּרְתָּ אֶל הָאִשָּׁה
  chosen: who spoke to the woman
  alternatives:
  - who spoke to my wife
  - who spoke with the woman
  lexicon: HALOT
  rationale: The relative clause is straightforward. 'The woman' follows the Hebrew
    wording exactly; 'my wife' would be contextually inferable but is not what the
    text says. 'Spoke to' matches אֶל better than 'spoke with' here.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - my wife
  lexicon: HALOT
  rationale: Although Manoah is referring to his wife, the Hebrew says 'the woman.'
    This likely reflects either formal indirect reference or the narrator's style;
    the translation preserves the wording rather than assimilating it to English expectation.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - It is I
  - I am he
  lexicon: HALOT
  rationale: The verbless Hebrew reply is simply 'I.' In idiomatic English, 'I am'
    best conveys the affirmative self-identification. 'I am he' is more wooden and
    archaic; 'It is I' is formal but less natural for modern readers.
