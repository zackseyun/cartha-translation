theological_decisions:
- issue: Potentially christological or theophanic weight of פֶלִאי
  chosen_reading: Render the adjective lexically as 'wonderful' without making the translation itself resolve the identity of the angel.
  alternative_readings:
  - Render more interpretively as 'beyond understanding'
  - Treat as a title-like expression with stronger capitalization or expansion
  rationale: The verse may invite theological reflection on the identity of the angel of the LORD, and 'wonderful' may echo later biblical usage, but the translation should not import a doctrinal conclusion beyond the Hebrew. A straightforward lexical rendering preserves the text's theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
