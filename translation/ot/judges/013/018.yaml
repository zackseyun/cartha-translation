id: JDG.13.18
reference: Judges 13:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לּ/וֹ֙ מַלְאַ֣ךְ יְהוָ֔ה לָ֥/מָּה זֶּ֖ה תִּשְׁאַ֣ל לִ/שְׁמִ֑/י וְ/הוּא פֶ֛לִאי־׃ס
translation:
  text: And the angel of Yahweh said to him, “Why do you ask my name, seeing it is wonderful?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond understanding,' 'incomprehensible,' or possibly 'secret.' The Hebrew word denotes something extraordinary or too wondrous to grasp fully.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in this narrative context the being is a supernatural envoy, so 'angel' is the most natural English rendering. יְהוָה follows the project default as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָמָּה זֶּה
  chosen: Why
  alternatives:
  - Why is this that
  - Why then
  lexicon: HALOT
  rationale: The idiom לָמָּה זֶּה introduces a rhetorical question. English 'Why' captures the force naturally without unnecessary stiffness.
- source_word: תִּשְׁאַל לִשְׁמִי
  chosen: do you ask my name
  alternatives:
  - do you inquire after my name
  lexicon: HALOT
  rationale: שׁאל with ל plus 'name' means to ask for or inquire about someone's name. 'Ask my name' is idiomatic modern English and preserves the directness.
- source_word: וְהוּא
  chosen: since it is
  alternatives:
  - and it is
  - for it is
  lexicon: HALOT
  rationale: The conjunction here explains the reason for the rhetorical question. 'Since it is' brings out the explanatory force more clearly in English than a bare 'and it is.'
- source_word: פֶלִאי
  chosen: wonderful
  alternatives:
  - wonderful beyond understanding
  - incomprehensible
  - extraordinary
  - secret
  lexicon: HALOT
  rationale: The adjective denotes something extraordinary, wondrous, beyond ordinary human grasp. 'Wonderful' is the most direct rendering and preserves the likely intertextual resonance with Isa 9:6, while avoiding over-interpretive expansion in the main text.
