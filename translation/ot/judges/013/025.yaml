id: JDG.13.25
reference: Judges 13:25
source:
  edition: WLC
  text: וַ/תָּ֨חֶל֙ ר֣וּחַ יְהוָ֔ה לְ/פַעֲמ֖/וֹ בְּ/מַחֲנֵה דָ֑ן בֵּ֥ין צָרְעָ֖ה וּ/בֵ֥ין אֶשְׁתָּאֹֽל־׃פ
translation:
  text: And the Spirit of Yahweh began to stir him in Mahaneh-dan, between Zorah and Eshtaol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mahaneh-dan means 'camp of Dan'; here it is treated as a place name.
    reason: cultural_note
  - marker: b
    text: Or 'began to impel him' / 'began to move him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּחֶל
  chosen: began
  alternatives:
  - started
  - came to begin
  lexicon: HALOT
  rationale: From חלל in the hifil/wayyiqtol sense 'to begin.' English 'began' is the most natural narrative rendering and preserves the ingressive force.
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the wind/spirit of the LORD
  lexicon: HALOT
  rationale: In Judges this phrase refers to YHWH's empowering Spirit coming upon a judge. 'Spirit' best fits the personal, empowering sense in context. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the stated doctrine.
- source_word: לְפַעֲמוֹ
  chosen: to stir him
  alternatives:
  - to impel him
  - to move him
  - to trouble him
  lexicon: HALOT
  rationale: From פעם in the verbal sense of stirring, impelling, or moving repeatedly. 'To stir him' captures the onset of divine prompting without over-specifying emotional disturbance. The pronominal suffix is represented by 'him.'
- source_word: בְּמַחֲנֵה דָן
  chosen: in Mahaneh-dan
  alternatives:
  - in the camp of Dan
  lexicon: HALOT
  rationale: Although the components literally mean 'camp of Dan,' here the phrase functions as a place name already known in Judges. Transliteration preserves its toponymic force better than a literal gloss.
- source_word: בֵּין צָרְעָה וּבֵין אֶשְׁתָּאֹל
  chosen: between Zorah and Eshtaol
  lexicon: HALOT
  rationale: Straightforward geographical expression. Standard English transliterations are used for the place names.
