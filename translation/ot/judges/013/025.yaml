theological_decisions:
- issue: Nature of רוּחַ יְהוָה in this context
  chosen_reading: the Spirit of Yahweh as divine empowering presence
  alternative_readings:
  - the wind of the LORD
  - the breath of the LORD
  rationale: Within the Samson narrative, the phrase denotes YHWH's empowering action in and upon Samson, not an impersonal wind. This preserves the text's theological force without importing later doctrinal elaboration beyond the context.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
