theological_decisions:
- issue: Rendering the divine name יְהוָה in the phrase מַלְאַךְ יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance specifies the default rendering of יְהוָה as 'the
    LORD.' This also aligns with longstanding English Bible convention and the reverential
    substitution pattern reflected in Jewish tradition and the Septuagint.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: Translated functionally as 'the angel of the LORD' without specifying
    whether this is a created angel or a theophanic manifestation
  alternative_readings:
  - the messenger of the LORD
  - a preincarnate appearance of the Son
  rationale: The verse itself identifies the figure by title but does not explicitly
    resolve the theological question of identity. Per translation philosophy, the
    rendering preserves the textual tension rather than importing a doctrinal conclusion
    into the translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
