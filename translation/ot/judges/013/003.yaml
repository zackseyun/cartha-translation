id: JDG.13.3
reference: Judges 13:3
source:
  edition: WLC
  text: וַ/יֵּרָ֥א מַלְאַךְ יְהוָ֖ה אֶל הָ/אִשָּׁ֑ה וַ/יֹּ֣אמֶר אֵלֶ֗י/הָ הִנֵּה נָ֤א
    אַתְּ עֲקָרָה֙ וְ/לֹ֣א יָלַ֔דְתְּ וְ/הָרִ֖ית וְ/יָלַ֥דְתְּ בֵּֽן־־־־׃
translation:
  text: And the angel of the LORD appeared to the woman and said to her, “Look, please—you
    are barren and have not borne children, but you will conceive and bear a son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Look, please'; the particle adds emphasis or mild urgency.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - showed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here is the standard narrative expression for a visible
    manifestation. 'Appeared' is idiomatic English and preserves the event of manifestation
    without overinterpreting how it occurred.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel,' but in this narrative context
    involving a divine appearance, 'angel' is the most natural English rendering.
    יְהוָה follows the doctrinal default as 'the LORD,' not 'Yahweh.'
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' Since the immediate focus is on the
    female recipient of the appearance rather than her marital relation, 'the woman'
    best matches the discourse here.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' gives a natural
    modern-English equivalent without archaic tone.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - indeed
  lexicon: HALOT
  rationale: נָא often softens or adds urgency/politeness. Here it is retained as
    'please' to reflect the particle rather than omit it, though English style requires
    punctuation to make it natural.
- source_word: עֲקָרָה
  chosen: barren
  alternatives:
  - infertile
  - childless
  lexicon: HALOT
  rationale: '''Barren'' is the conventional and precise rendering for עֲקָרָה in
    contexts of inability to bear children. ''Infertile'' is medically colored; ''childless''
    is broader and less exact.'
- source_word: וְלֹא יָלַדְתְּ
  chosen: and have not borne children
  alternatives:
  - and have not given birth
  - and have not borne
  lexicon: HALOT
  rationale: The perfect states her condition up to the present. 'Have not borne children'
    communicates the experiential fact naturally in English and avoids the slightly
    abrupt 'have not borne' while preserving the plural/generic sense implied by the
    idiom.
- source_word: וְהָרִית
  chosen: you will conceive
  alternatives:
  - you are about to conceive
  - you shall become pregnant
  lexicon: HALOT
  rationale: Though formally a perfect with prefixed conjunction, in this announcement
    context it has future force. 'You will conceive' is the clearest idiomatic rendering
    in English.
- source_word: וְיָלַדְתְּ
  chosen: and bear
  alternatives:
  - and give birth to
  - and have
  lexicon: HALOT
  rationale: In sequence with the future promise, this also carries future force.
    'Bear' is concise and pairs naturally with 'conceive.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a boy
  - son
  lexicon: HALOT
  rationale: בֵּן here specifies a male child. 'A son' is the standard and appropriately
    formal rendering in birth-announcement contexts.
