id: JDG.13.23
reference: Judges 13:23
source:
  edition: WLC
  text: וַ/תֹּ֧אמֶר ל֣/וֹ אִשְׁתּ֗/וֹ לוּ֩ חָפֵ֨ץ יְהוָ֤ה לַ/הֲמִיתֵ֨/נוּ֙ לֹֽא לָקַ֤ח מִ/יָּדֵ֨/נוּ֙ עֹלָ֣ה וּ/מִנְחָ֔ה וְ/לֹ֥א הֶרְאָ֖/נוּ אֶת כָּל אֵ֑לֶּה וְ/כָ/עֵ֕ת לֹ֥א הִשְׁמִיעָ֖/נוּ כָּ/זֹֽאת־־־׃
translation:
  text: But his wife said to him, “If Yahweh had intended to kill us, he would not have accepted from our hand a burnt offering and a grain offering, or shown us all these things, or now told us such things as these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he would not have taken from our hand.' The Hebrew verb is literally 'taken,' but in sacrificial context it carries the sense of receiving or accepting an offering.
    reason: lexical_alternative
  - marker: b
    text: '''Grain offering'' translates Hebrew minḥah, which can also mean a gift or tribute offering depending on context.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse contrast with Manoah's fear in the previous verse, while still preserving simple narrative movement.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - the woman
  lexicon: HALOT
  rationale: The noun with pronominal suffix straightforwardly means 'his wife.' This is more specific than 'the woman' and matches the Hebrew relation.
- source_word: לוּ חָפֵץ
  chosen: had intended
  alternatives:
  - had desired
  - had been pleased
  - wanted
  lexicon: HALOT
  rationale: לוּ introduces a contrary-to-fact condition, and חָפֵץ denotes delight/desire/will. In context, 'had intended' expresses volition in idiomatic English without implying emotional pleasure in killing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַהֲמִיתֵנוּ
  chosen: to kill us
  alternatives:
  - to put us to death
  lexicon: HALOT
  rationale: The Hiphil infinitive of מות with 1cp suffix means 'to cause us to die/kill us.' 'Kill us' is direct and natural.
- source_word: לֹא לָקַח מִיָּדֵנוּ
  chosen: he would not have accepted from our hand
  alternatives:
  - he would not have taken from our hand
  - he would not have received from us
  lexicon: HALOT
  rationale: Although לקח is literally 'take,' in sacrificial context with 'from our hand' it idiomatically means receiving/accepting an offering. 'Accepted' best conveys the cultic sense in English.
- source_word: עֹלָה
  chosen: a burnt offering
  lexicon: HALOT
  rationale: Standard cultic term for an עולה, the offering wholly burned.
- source_word: וּמִנְחָה
  chosen: and a grain offering
  alternatives:
  - and an offering
  - and a gift offering
  lexicon: HALOT
  rationale: מִנְחָה can broadly mean gift/tribute/offering, but in sacrificial context alongside עולה it is best rendered 'grain offering.'
- source_word: וְלֹא הֶרְאָנוּ אֶת כָּל אֵלֶּה
  chosen: or shown us all these things
  alternatives:
  - and would not have shown us all these things
  lexicon: HALOT
  rationale: The Hiphil of ראה means 'cause to see/show.' English coordinates the three evidences with repeated 'or' after the initial negative conditional apodosis.
- source_word: וְכָעֵת
  chosen: or now
  alternatives:
  - and at this time
  - and now
  lexicon: HALOT
  rationale: The phrase means 'and/at this time, now.' In the series of arguments, 'or now' reads naturally and preserves the temporal emphasis.
- source_word: לֹא הִשְׁמִיעָנוּ
  chosen: announced to us
  alternatives:
  - made us hear
  - told us
  - let us hear
  lexicon: HALOT
  rationale: The Hiphil of שמע is literally 'cause to hear,' often meaning inform/announce. 'Announced to us' preserves the formal revelatory tone better than the flatter 'told us.'
- source_word: כָזֹאת
  chosen: such a thing as this
  alternatives:
  - this
  - such things
  lexicon: HALOT
  rationale: The feminine demonstrative refers to the content just mentioned or implied. 'Such a thing as this' captures the idiomatic force and avoids ambiguity.
