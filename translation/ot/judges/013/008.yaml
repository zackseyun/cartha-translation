theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether אִישׁ הָאֱלֹהִים should be interpreted as an angelic messenger in
    the main text
  chosen_reading: the man of God
  alternative_readings:
  - the messenger of God
  rationale: Although the broader narrative reveals the figure's extraordinary identity,
    Manoah's wording here is literally and narratively 'the man of God.' Preserving
    that expression maintains the narrative perspective and avoids importing later
    interpretive resolution into the verse itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
- issue: Gender rendering of לַנַּעַר
  chosen_reading: for the boy
  alternative_readings:
  - for the child
  rationale: The Hebrew noun is grammatically masculine and contextually refers to
    the promised male child. Per the gender-accurate guideline, the masculine sense
    should be preserved rather than neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
