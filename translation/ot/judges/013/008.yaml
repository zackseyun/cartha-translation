id: JDG.13.8
reference: Judges 13:8
source:
  edition: WLC
  text: וַ/יֶּעְתַּ֥ר מָנ֛וֹחַ אֶל יְהוָ֖ה וַ/יֹּאמַ֑ר בִּ֣י אֲדוֹנָ֔/י אִ֣ישׁ הָ/אֱלֹהִ֞ים
    אֲשֶׁ֣ר שָׁלַ֗חְתָּ יָבוֹא נָ֥א עוֹד֙ אֵלֵ֔י/נוּ וְ/יוֹרֵ֕/נוּ מַֽה נַּעֲשֶׂ֖ה
    לַ/נַּ֥עַר הַ/יּוּלָּֽד־־־׃
translation:
  text: Then Manoah entreated the LORD and said, “Please, Lord, let the man of God
    whom you sent come again to us and teach us what we should do for the boy who
    is to be born.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'implored' / 'prayed to'; the Hebrew verb conveys earnest supplication.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man of God'; Manoah speaks from his present understanding, without
      yet identifying the visitor more specifically.
    reason: alternative_reading
  - marker: c
    text: 'Or ''for the child who will be born.'' The Hebrew is masculine: ''for the
      boy who is to be born.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּעְתַּר
  chosen: entreated
  alternatives:
  - implored
  - prayed to
  - pleaded with
  lexicon: HALOT
  rationale: The verb עתר in this stem conveys earnest supplication rather than a
    mere neutral 'said' or generic 'asked.' 'Entreated' preserves the intensity and
    prayerful direction toward God, while remaining readable. 'Prayed to' is possible
    but less lexically specific because the verb itself already carries the sense
    of earnest entreaty.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בִּי אֲדֹנָי
  chosen: Please, Lord
  alternatives:
  - O Lord, please
  - Pardon me, Lord
  lexicon: HALOT
  rationale: בִּי here is a polite particle of entreaty, not a literal first-person
    object. 'Please, Lord' captures the deferential appeal in natural English. אֲדֹנָי
    is best rendered 'Lord' here as a reverential address to God.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the messenger of God
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for a divinely commissioned man.
    'Man of God' is the natural and established equivalent and should not be paraphrased
    as 'messenger of God,' since the Hebrew says 'man' and the narrative tension depends
    on Manoah's understanding.
- source_word: אֲשֶׁר שָׁלַחְתָּ
  chosen: whom you sent
  alternatives:
  - that you sent
  lexicon: HALOT
  rationale: A straightforward relative clause referring to the man of God. 'Whom'
    fits the personal referent in standard English.
- source_word: יָבוֹא נָא עוֹד אֵלֵינוּ
  chosen: let ... come again to us
  alternatives:
  - please let ... come once more to us
  - may ... come again to us
  lexicon: HALOT
  rationale: The jussive/imperfect with נָא expresses a polite request. 'Let ... come
    again to us' captures both the petitionary force and the adverb עוֹד ('again/once
    more').
- source_word: וְיוֹרֵנוּ
  chosen: and teach us
  alternatives:
  - and instruct us
  - and show us
  lexicon: HALOT
  rationale: From ירה in the Hiphil, the sense is to instruct or teach. 'Teach us'
    is clear modern English and fits the request for guidance.
- source_word: מַה נַּעֲשֶׂה
  chosen: what we should do
  alternatives:
  - what we are to do
  - what shall we do
  lexicon: HALOT
  rationale: The clause asks for practical instruction. 'What we should do' is idiomatic
    in English and preserves the deliberative sense.
- source_word: לַנַּעַר
  chosen: for the boy
  alternatives:
  - for the child
  - for the lad
  lexicon: HALOT
  rationale: נַעַר commonly means 'boy' or 'young male.' Although the child is not
    yet born, Manoah speaks prospectively of the promised male child. 'Boy' preserves
    the masculine specificity better than the more neutral 'child.'
- source_word: הַיּוּלָּד
  chosen: who is to be born
  alternatives:
  - that will be born
  - to be born
  lexicon: HALOT
  rationale: The passive participial form points to the child as the one destined
    to be born. 'Who is to be born' is natural English and conveys futurity without
    overtranslation.
