id: JDG.13.2
reference: Judges 13:2
source:
  edition: WLC
  text: וַ/יְהִי֩ אִ֨ישׁ אֶחָ֧ד מִ/צָּרְעָ֛ה מִ/מִּשְׁפַּ֥חַת הַ/דָּנִ֖י וּ/שְׁמ֣/וֹ
    מָנ֑וֹחַ וְ/אִשְׁתּ֥/וֹ עֲקָרָ֖ה וְ/לֹ֥א יָלָֽדָה׃
translation:
  text: Now there was a certain man from Zorah, from the clan of the Danites, and
    his name was Manoah. His wife was barren and had not borne a child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and had borne no children.' The Hebrew literally says, 'and she had
      not borne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces a new narrative scene. 'Now there was'
    is natural modern English that preserves the discourse function better than a
    bare 'there was,' while avoiding overly wooden style.
- source_word: אִישׁ אֶחָד
  chosen: a certain man
  alternatives:
  - one man
  - a man
  lexicon: HALOT
  rationale: The combination often introduces a particular but as-yet-unnamed figure
    in narrative. 'A certain man' preserves the idiomatic specificity better than
    the more literal but less natural 'one man.'
- source_word: מִצָּרְעָה
  chosen: from Zorah
  alternatives:
  - of Zorah
  lexicon: HALOT
  rationale: The preposition מִן marks origin/location. 'From Zorah' is the most straightforward
    English rendering. The place name is transliterated per translation philosophy.
- source_word: מִמִּשְׁפַּחַת הַדָּנִי
  chosen: from the clan of the Danites
  alternatives:
  - from the family of the Danites
  - from the tribe of Dan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here denotes a kinship group within the larger tribal structure,
    so 'clan' is more precise than 'tribe.' הַדָּנִי is rendered collectively as 'the
    Danites' in idiomatic English.
- source_word: וּשְׁמוֹ מָנוֹחַ
  chosen: and his name was Manoah
  alternatives:
  - whose name was Manoah
  lexicon: HALOT
  rationale: This is the standard Hebrew naming formula. 'And his name was Manoah'
    preserves the narrative cadence and explicitness of the Hebrew. The personal name
    is transliterated by standard convention.
- source_word: וְאִשְׁתּוֹ
  chosen: His wife
  alternatives:
  - and his wife
  lexicon: HALOT
  rationale: The conjunction links the next clause, but English reads more naturally
    by beginning a new sentence here while preserving the relationship. 'His wife'
    accurately renders the construct with pronominal suffix.
- source_word: עֲקָרָה
  chosen: was barren
  alternatives:
  - was infertile
  - was unable to conceive
  lexicon: HALOT
  rationale: '''Barren'' is the conventional and concise rendering for עֲקָרָה in
    this narrative context. It is readily understandable in modern English and preserves
    the literary resonance of similar birth-announcement narratives.'
- source_word: וְלֹא יָלָדָה
  chosen: and had not borne a child
  alternatives:
  - and had borne no children
  - and had not given birth
  lexicon: HALOT
  rationale: The verb ילד in the qal with a female subject refers to bearing/giving
    birth. 'Had not borne a child' fits the English past perfect sense in context
    and avoids overstating the Hebrew plural, since no explicit plural object is present.
