id: JDG.13.17
reference: Judges 13:17
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר מָנ֛וֹחַ אֶל מַלְאַ֥ךְ יְהוָ֖ה מִ֣י שְׁמֶ֑/ךָ כִּֽי יָבֹ֥א דברי/ך וְ/כִבַּדְנֽוּ/ךָ־־׃
translation:
  text: Then Manoah said to the angel of Yahweh, “What is your name, so that when your words come to pass, we may honor you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative the being is presented in a supernatural way, so 'angel' is the most natural English rendering. יְהוָה follows the project default 'the LORD' rather than 'Yahweh.'
- source_word: מִי שְׁמֶךָ
  chosen: What is your name
  alternatives:
  - Who are you by name
  lexicon: HALOT
  rationale: The idiom asks for the person's name. English expresses this naturally as 'What is your name?' rather than a more wooden rendering.
- source_word: כִּי
  chosen: so that
  alternatives:
  - for
  - because
  - when
  lexicon: HALOT
  rationale: 'Here כִּי introduces purpose/result in relation to Manoah''s question: he wants to know the name in order to respond appropriately when the announced event occurs. ''So that'' best captures the clause linkage in English.'
- source_word: יָבֹא דְבָרֶיךָ
  chosen: your words come to pass
  alternatives:
  - your word comes to pass
  - what you said comes true
  lexicon: HALOT
  rationale: Although דְבָרֶיךָ is morphologically plural ('your words'), in English 'your words come to pass' preserves the Hebrew form while sounding natural. The idiom means that the announced message is fulfilled.
- source_word: וְכִבַּדְנוּךָ
  chosen: we may honor you
  alternatives:
  - we will honor you
  - we may glorify you
  - we may show you respect
  lexicon: HALOT
  rationale: The piel of כבד commonly means 'honor' or 'show honor.' 'Honor' fits the context of giving due respect after fulfillment of the message. 'Glorify' would sound too strong and potentially import later theological language not required by the verse. 'May honor' reflects the volitional/purpose nuance after the preceding clause.
