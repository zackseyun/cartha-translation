theological_decisions:
- issue: Identity of הָאִישׁ in the woman's speech
  chosen_reading: the man
  alternative_readings:
  - the angel
  - the messenger of God
  rationale: Although the broader context identifies the figure as the angel of the
    LORD, the woman here refers to him simply as 'the man.' The translation preserves
    her immediate perspective and does not import fuller theological identification
    into this verse.
  doctrine_reference: Translation philosophy §1, §3
