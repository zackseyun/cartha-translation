id: JDG.13.10
reference: Judges 13:10
source:
  edition: WLC
  text: וַ/תְּמַהֵר֙ הָֽ/אִשָּׁ֔ה וַ/תָּ֖רָץ וַ/תַּגֵּ֣ד לְ/אִישָׁ֑/הּ וַ/תֹּ֣אמֶר
    אֵלָ֔י/ו הִנֵּ֨ה נִרְאָ֤ה אֵלַ/י֙ הָ/אִ֔ישׁ אֲשֶׁר בָּ֥א בַ/יּ֖וֹם אֵלָֽ/י־׃
translation:
  text: So the woman hurried and ran and told her husband, and said to him, “Look,
    the man who came to me that day has appeared to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who came to me the other day.” The Hebrew expression is literally “who
      came to me on the day,” referring back to the earlier visit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  chosen: hurried
  alternatives:
  - quickly went
  - hastened
  lexicon: HALOT
  rationale: From מהר, indicating haste. 'Hurried' is natural modern English and preserves
    the sense without archaic tone.
- source_word: וַתָּרָץ
  chosen: ran
  alternatives:
  - rushed
  lexicon: HALOT
  rationale: From רוץ, the straightforward sense is physical running. Kept distinct
    from the previous verb to preserve the Hebrew's twofold depiction of urgency.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: From נגד in the Hiphil, 'tell/report.' 'Told' fits the narrative register
    and avoids overformal diction.
- source_word: לְאִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: Though אִישׁ can mean 'man,' with 3fs suffix in this domestic context
    it idiomatically means 'her husband.' This is the natural and contextually precise
    English rendering.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking attention. 'Look' preserves immediacy in readable
    modern English better than archaic 'Behold.'
- source_word: נִרְאָה אֵלַי
  chosen: has appeared to me
  alternatives:
  - appeared to me
  - was seen by me
  lexicon: HALOT
  rationale: Niphal of ראה here is best rendered intransitively/passively as 'appeared.'
    Present perfect in English fits the immediate report of a just-completed event.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש/person
  lexicon: HALOT
  rationale: Definite noun referring back to the previously encountered figure. 'The
    man' preserves the woman's description without importing later identification
    into the text.
- source_word: אֲשֶׁר בָּא בַיּוֹם אֵלַי
  chosen: who came to me that day
  alternatives:
  - who came to me the other day
  - who came to me on that day
  lexicon: HALOT
  rationale: Literally 'who came in/on the day to me.' In context this idiom points
    to the earlier occasion; 'that day' is a natural English rendering that preserves
    the demonstrative force without unnecessary awkwardness.
