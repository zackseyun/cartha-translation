id: JDG.13.15
reference: Judges 13:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מָנ֖וֹחַ אֶל מַלְאַ֣ךְ יְהוָ֑ה נַעְצְרָה נָּ֣א אוֹתָ֔/ךְ וְ/נַעֲשֶׂ֥ה
    לְ/פָנֶ֖י/ךָ גְּדִ֥י עִזִּֽים־־׃
translation:
  text: Then Manoah said to the angel of the LORD, “Please let us detain you, and
    we will prepare a young goat for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Literally “before you”; that is, prepare it for you as a guest.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in this narrative the
    being is presented in a supernatural way, so 'angel' best fits normal English
    usage while preserving the Hebrew construction. יְהוָה is rendered 'the LORD'
    per project doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: נַעְצְרָה נָּא
  chosen: Please let us detain
  alternatives:
  - Please let us keep
  - Please let us stay you here
  lexicon: HALOT
  rationale: 'The cohortative with particle נָא expresses a polite request: ''please
    let us detain/hold back.'' ''Detain'' conveys the sense of asking the visitor
    to remain for hospitality without implying hostile restraint.'
- source_word: אוֹתָךְ
  chosen: you
  lexicon: HALOT
  rationale: Although the morphology table tags the suffix as 2fs, the contextual
    referent is the angel addressed as masculine throughout the passage, and the following
    לְפָנֶיךָ is 2ms. English 'you' avoids importing a gender contradiction likely
    arising from tagging or orthographic irregularity.
- source_word: וְנַעֲשֶׂה
  chosen: and we will prepare
  alternatives:
  - and let us make
  - and we will make ready
  lexicon: HALOT
  rationale: עשה here refers to preparing food for a guest. 'Prepare' is idiomatic
    English and fits the hospitality context better than the overly literal 'make.'
- source_word: לְפָנֶיךָ
  chosen: for you
  alternatives:
  - before you
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before you,' but in this context of meal preparation it idiomatically
    means preparing something for the guest. 'For you' communicates the intended sense
    in natural English.
- source_word: גְּדִי עִזִּים
  chosen: a young goat
  alternatives:
  - a kid of the goats
  - a goat kid
  lexicon: HALOT
  rationale: The Hebrew phrase is the standard expression for a young goat. 'Young
    goat' is clear modern English and preserves the referent accurately.
