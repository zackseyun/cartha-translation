id: JDG.13.16
reference: Judges 13:16
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ מַלְאַ֨ךְ יְהוָ֜ה אֶל מָנ֗וֹחַ אִם תַּעְצְרֵ֨/נִי֙ לֹא אֹכַ֣ל בְּ/לַחְמֶ֔/ךָ וְ/אִם תַּעֲשֶׂ֣ה עֹלָ֔ה לַ/יהוָ֖ה תַּעֲלֶ֑/נָּה כִּ֚י לֹא יָדַ֣ע מָנ֔וֹחַ כִּֽי מַלְאַ֥ךְ יְהוָ֖ה הֽוּא־־־־־־׃
translation:
  text: And the angel of Yahweh said to Manoah, “If you detain me, I will not eat your food. But if you prepare a burnt offering, offer it up to Yahweh.” For Manoah did not know that he was the angel of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I will not eat your bread.” Here “bread” likely means food or a meal more generally.
    reason: lexical_alternative
  - marker: b
    text: Or “If you make a burnt offering, you must offer it to the LORD.” The Hebrew uses one verb for making/preparing the offering and another for offering it up.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in this narrative the being is presented as a supernatural envoy, so 'angel' best fits English usage and context. יְהוָה is rendered 'the LORD' per doctrine default for the divine name.
- source_word: תַּעְצְרֵנִי
  chosen: you detain me
  alternatives:
  - you keep me here
  - you hold me back
  lexicon: HALOT
  rationale: The verb עצר in this stem can mean restrain, detain, or hold back. In context Manoah is asking the visitor to stay while food is prepared, so 'detain' preserves the literal sense without over-paraphrasing.
- source_word: לֹא אֹכַל בְּלַחְמֶךָ
  chosen: I will not eat your food
  alternatives:
  - I will not eat your bread
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in Hebrew it often stands for food or a meal more generally. Since the context is a prepared meal rather than bread specifically, 'your food' communicates the idiomatic sense in natural English.
- source_word: תַּעֲשֶׂה עֹלָה
  chosen: you prepare a burnt offering
  alternatives:
  - you make a burnt offering
  - you offer a burnt offering
  lexicon: HALOT
  rationale: עשה with sacrificial objects can mean make/prepare. Because the next verb תעלנה explicitly gives the act of offering, rendering this first verb as 'prepare' avoids flattening the two-step expression into repetition.
- source_word: עֹלָה
  chosen: a burnt offering
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial term עֹלָה; it denotes the whole offering that ascends in smoke.
- source_word: לַיהוָה תַּעֲלֶנָּה
  chosen: offer it up to the LORD
  alternatives:
  - bring it up to the LORD
  - present it to the LORD
  lexicon: HALOT
  rationale: The Hiphil of עלה with עֹלָה naturally means to offer it up. 'Offer it up' preserves the sacrificial imagery and the object suffix on the verb.
- source_word: כִּי לֹא יָדַע מָנוֹחַ
  chosen: For Manoah did not know
  alternatives:
  - because Manoah did not know
  lexicon: HALOT
  rationale: כִּי here introduces an explanatory clause. 'For' fits the explanatory narrative comment in English.
- source_word: כִּי מַלְאַךְ יְהוָה הוּא
  chosen: that he was the angel of the LORD
  alternatives:
  - that this was the angel of the LORD
  lexicon: HALOT
  rationale: The clause explains Manoah's lack of recognition. 'He was' is the most natural way to represent the pronoun הוּא in English narrative style.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
