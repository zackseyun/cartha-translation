id: JDG.13.19
reference: Judges 13:19
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מָנ֜וֹחַ אֶת גְּדִ֤י הָ/עִזִּים֙ וְ/אֶת הַ/מִּנְחָ֔ה וַ/יַּ֥עַל
    עַל הַ/צּ֖וּר לַֽ/יהוָ֑ה וּ/מַפְלִ֣א לַ/עֲשׂ֔וֹת וּ/מָנ֥וֹחַ וְ/אִשְׁתּ֖/וֹ רֹאִֽים־־־׃
translation:
  text: So Manoah took the young goat and the grain offering, and offered them on
    the rock to the LORD, and he acted wondrously while Manoah and his wife were watching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the angel of the LORD did something wondrous.' The Hebrew is compressed
      and does not restate the subject explicitly, though the context points to the
      messenger of the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: גְּדִי הָעִזִּים
  chosen: the young goat
  alternatives:
  - the kid of the goats
  - the goat kid
  lexicon: HALOT
  rationale: Idiomatic English for a young goat; preserves the sacrificial animal
    reference without wooden phrasing.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the gift offering
  lexicon: HALOT
  rationale: In sacrificial context, מִנְחָה commonly refers to a grain offering or
    tribute offering. 'Grain offering' best fits the cultic setting and clarifies
    the type of accompanying offering.
- source_word: וַיַּעַל עַל הַצּוּר לַיהוָה
  chosen: offered them on the rock to the LORD
  alternatives:
  - offered it up on the rock to the LORD
  - brought them up on the rock to the LORD
  lexicon: HALOT
  rationale: עלה in sacrificial context means to offer up. Although singular verb
    is used, the direct objects are the goat and the offering together; 'offered them'
    communicates the sense naturally in English. 'The LORD' follows the doctrinal
    default for YHWH.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: וּמַפְלִא לַעֲשׂוֹת
  chosen: and he acted wondrously
  alternatives:
  - and the angel did a wondrous thing
  - while he was doing something extraordinary
  - and he was working wonders
  lexicon: HALOT
  rationale: The phrase is syntactically compressed and contextually refers to the
    messenger of the LORD doing something extraordinary. 'Acted wondrously' preserves
    the verbal idea of פלא ('to do wonderfully') without over-specifying beyond the
    Hebrew. The masculine singular subject is left as 'he,' following the narrative
    flow from the preceding context.
- source_word: רֹאִים
  chosen: were watching
  alternatives:
  - were looking on
  - saw
  lexicon: HALOT
  rationale: The participle conveys ongoing action; 'were watching' captures the durative
    sense better than simple past 'saw'.
