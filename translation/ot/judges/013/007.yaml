theological_decisions:
- issue: Rendering the Nazirite designation
  chosen_reading: a Nazirite to God
  alternative_readings:
  - one consecrated to God
  rationale: The Hebrew uses the technical term נְזִיר, tied to a specific consecrated
    status rather than a generic idea of holiness. Transliteration preserves the covenantal
    and legal background without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Temporal force of the conception announcement
  chosen_reading: you will conceive and bear a son
  alternative_readings:
  - you are pregnant and will bear a son
  rationale: Although הָרָה is formally adjectival ('pregnant'), the narrative context
    is an annunciation being reported, not a statement of an already visible pregnancy.
    The future rendering preserves the sense in clear English without forcing a potentially
    misleading present-tense reading.
  doctrine_reference: Translation philosophy §1, §6
