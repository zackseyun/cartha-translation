id: JDG.13.7
reference: Judges 13:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לִ֔/י הִנָּ֥/ךְ הָרָ֖ה וְ/יֹלַ֣דְתְּ בֵּ֑ן וְ/עַתָּ֞ה אַל תִּשְׁתִּ֣י
    יַ֣יִן וְ/שֵׁכָ֗ר וְ/אַל תֹּֽאכְלִי֙ כָּל טֻמְאָ֔ה כִּֽי נְזִ֤יר אֱלֹהִים֙ יִהְיֶ֣ה
    הַ/נַּ֔עַר מִן הַ/בֶּ֖טֶן עַד י֥וֹם מוֹתֽ/וֹ־׀־־־־־׃פ
translation:
  text: For he said to me, ‘Look, you will conceive and bear a son. So now, do not
    drink wine or strong drink, and do not eat anything unclean, for the boy will
    be a Nazirite to God from the womb until the day of his death.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Look, you are pregnant and bearing a son''; the wording can be
      rendered more literally that way, though the context supports the predictive
      sense ''you will conceive and bear a son.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a Nazirite of God.' The Hebrew uses the technical term for one specially
      consecrated to God.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר לִי
  chosen: For he said to me
  alternatives:
  - And he said to me
  - Because he said to me
  lexicon: HALOT
  rationale: The conjunction כִּי is absent here, but the verse continues Manoah's
    wife reporting the angel's words from the prior context; 'For' best reflects the
    explanatory connection in English discourse. 'Said to me' is a straightforward
    rendering of the verb plus indirect object.
- source_word: הִנָּךְ הָרָה
  chosen: Look, you will conceive
  alternatives:
  - Behold, you are pregnant
  - Look, you are pregnant
  lexicon: HALOT
  rationale: Literally, 'behold, you are pregnant.' In context, however, she is recounting
    the announcement before conception has occurred, and the following clause is future-oriented.
    'You will conceive' communicates the sense naturally in English while preserving
    the predictive force. 'Look' renders הִנֵּה without archaic 'behold.'
- source_word: וְיֹלַדְתְּ בֵּן
  chosen: and bear a son
  alternatives:
  - and give birth to a son
  lexicon: HALOT
  rationale: A standard idiomatic rendering of ילד with 'son' as direct object. 'Bear
    a son' is concise and natural.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: '''So now'' captures the transition from announcement to instruction.
    It is slightly more connective in English than bare ''now''.'
- source_word: אַל תִּשְׁתִּי יַיִן וְשֵׁכָר
  chosen: do not drink wine or strong drink
  alternatives:
  - do not drink wine or beer
  - do not drink wine or intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר refers broadly to intoxicating drink other than wine; 'strong
    drink' is the established and still understandable rendering without over-specifying
    a modern beverage category.
- source_word: וְאַל תֹּאכְלִי כָּל טֻמְאָה
  chosen: and do not eat anything unclean
  alternatives:
  - and do not eat any unclean thing
  - and do not eat any impurity
  lexicon: HALOT
  rationale: כָּל טֻמְאָה is literally 'any uncleanness/impure thing.' In English,
    'anything unclean' best conveys prohibited food without awkward abstraction.
- source_word: נְזִיר אֱלֹהִים
  chosen: a Nazirite to God
  alternatives:
  - a Nazirite of God
  - one consecrated to God
  lexicon: HALOT
  rationale: נָזִיר is a technical term for one under Nazirite consecration and should
    be transliterated rather than flattened. The genitive relation is best expressed
    as 'to God' in idiomatic English, indicating dedication.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: In this birth-announcement context, 'the boy' fits the expected referent
    better than the broader 'young man.' 'Child' is possible but loses the male specificity
    already established by 'son.'
- source_word: מִן הַבֶּטֶן
  chosen: from the womb
  alternatives:
  - from the belly
  - from birth
  lexicon: HALOT
  rationale: A natural and sufficiently literal rendering. 'From birth' is interpretive;
    'from the womb' preserves the Hebrew image and timing.
- source_word: עַד יוֹם מוֹתוֹ
  chosen: until the day of his death
  alternatives:
  - until his dying day
  - all his life
  lexicon: HALOT
  rationale: This is the most direct and formal rendering. 'All his life' is accurate
    in sense but less transparent to the source wording.
