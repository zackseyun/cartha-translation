theological_decisions:
- issue: Nature of טָמֵא in this context
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: The context is the Nazirite-related prenatal instruction in Judges 13.
    'Unclean' preserves the covenantal/ritual category used in Torah and avoids reducing
    it to a merely hygienic or moral sense. 'Impure' is possible but less standard
    in English Bible usage here.
