id: JDG.13.4
reference: Judges 13:4
source:
  edition: WLC
  text: וְ/עַתָּה֙ הִשָּׁ֣מְרִי נָ֔א וְ/אַל תִּשְׁתִּ֖י יַ֣יִן וְ/שֵׁכָ֑ר וְ/אַל תֹּאכְלִ֖י
    כָּל טָמֵֽא־־־׃
translation:
  text: 'Now please be careful: do not drink wine or strong drink, and do not eat
    anything unclean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And now, take care' or 'And now, be on your guard.'
    reason: lexical_alternative
  - marker: b
    text: '''Strong drink'' refers to intoxicating beverages other than wine.'
    reason: cultural_note
  - marker: c
    text: Or 'do not eat any unclean thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the instruction that follows. 'Now'
    is natural modern English; 'And now' is possible but not necessary in English
    style.
- source_word: הִשָּׁמְרִי נָא
  chosen: please be careful
  alternatives:
  - take care, please
  - be on your guard, please
  - carefully keep yourself
  lexicon: HALOT
  rationale: Imperative of שׁמר in the Niphal/reflexive sense calls for caution or
    careful self-watch. Including 'please' reflects נָא as a particle of entreaty,
    while 'be careful' gives clear idiomatic English without over-literal awkwardness.
- source_word: וְאַל תִּשְׁתִּי
  chosen: do not drink
  alternatives:
  - and do not drink
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive addressed to the woman. English
    imperative 'do not drink' best matches the force.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: וְשֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: Refers broadly to intoxicating beverage other than wine. 'Strong drink'
    is the most established and sufficiently clear rendering; 'beer' is too narrow,
    and 'intoxicating drink' is more explanatory than translational.
- source_word: וְאַל תֹּאכְלִי
  chosen: and do not eat
  alternatives:
  - do not eat
  lexicon: HALOT
  rationale: Second prohibition coordinated with the first. Retaining 'and' reflects
    the Hebrew linkage and keeps the sequence of commands clear.
- source_word: כָּל טָמֵא
  chosen: anything unclean
  alternatives:
  - any unclean thing
  - anything impure
  lexicon: HALOT
  rationale: כָּל with the adjective used substantivally denotes any unclean item/food.
    'Anything unclean' is idiomatic and preserves the ritual category without narrowing
    it.
