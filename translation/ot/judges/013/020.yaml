id: JDG.13.20
reference: Judges 13:20
source:
  edition: WLC
  text: וַ/יְהִי֩ בַ/עֲל֨וֹת הַ/לַּ֜הַב מֵ/עַ֤ל הַ/מִּזְבֵּ֨חַ֙ הַ/שָּׁמַ֔יְמָ/ה וַ/יַּ֥עַל
    מַלְאַךְ יְהוָ֖ה בְּ/לַ֣הַב הַ/מִּזְבֵּ֑חַ וּ/מָנ֤וֹחַ וְ/אִשְׁתּ/וֹ֙ רֹאִ֔ים
    וַ/יִּפְּל֥וּ עַל פְּנֵי/הֶ֖ם אָֽרְצָ/ה־־׃
translation:
  text: And when the flame went up from the altar toward heaven, the angel of the
    LORD went up in the flame of the altar, while Manoah and his wife were watching;
    and they fell facedown to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'fell on their faces to the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּעֲלוֹת
  chosen: And when ... went up
  alternatives:
  - And it happened, when ... went up
  - Now as ... went up
  lexicon: HALOT
  rationale: The construction introduces a temporal scene-setting clause. Rendering
    it as 'And when' preserves the narrative flow without woodenly retaining the idiom
    'and it happened.'
- source_word: הַלַּהַב
  chosen: the flame
  alternatives:
  - the blaze
  - the fire
  lexicon: HALOT
  rationale: לַהַב denotes flame or blazing fire. 'Flame' is the most natural and
    sufficiently concrete English equivalent here.
- source_word: מֵעַל הַמִּזְבֵּחַ
  chosen: from the altar
  alternatives:
  - from upon the altar
  - up from the altar
  lexicon: HALOT
  rationale: The preposition literally means 'from upon,' but idiomatic English is
    'from the altar.' The upward motion is already conveyed by the verb 'went up.'
- source_word: הַשָּׁמַיְמָה
  chosen: toward heaven
  alternatives:
  - heavenward
  - to the sky
  lexicon: HALOT
  rationale: The directional ending indicates motion toward heaven. 'Toward heaven'
    is clear, natural, and preserves the vertical orientation better than 'to the
    sky.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this narrative context
    the supernatural referent is clear. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible usage.
- source_word: בְּלַהַב הַמִּזְבֵּחַ
  chosen: in the flame of the altar
  alternatives:
  - with the flame of the altar
  - in the altar's flame
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken locatively/instrumentally with
    the visible phenomenon: the angel ascended ''in'' the altar''s flame. This preserves
    the vivid imagery without overinterpreting the mechanics.'
- source_word: וּמָנוֹחַ וְאִשְׁתּוֹ רֹאִים
  chosen: while Manoah and his wife were watching
  alternatives:
  - and Manoah and his wife were seeing
  - as Manoah and his wife looked on
  lexicon: HALOT
  rationale: The participle conveys ongoing action concurrent with the ascent. 'Were
    watching' captures the durative sense more naturally than the overly literal 'were
    seeing.'
- source_word: וַיִּפְּלוּ עַל־פְּנֵיהֶם
  chosen: they fell facedown
  alternatives:
  - they fell on their faces
  - they prostrated themselves
  lexicon: HALOT
  rationale: The idiom literally means 'fell on their faces.' 'Fell facedown' is a
    natural modern equivalent that preserves the posture of reverence and fear.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: The directional form means 'earthward/to the ground.' 'To the ground'
    is idiomatic in English narrative.
