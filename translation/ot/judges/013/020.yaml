theological_decisions:
- issue: Identity and rendering of מַלְאַךְ יְהוָה
  chosen_reading: Render as 'the angel of the LORD' without resolving in the translation
    whether this figure is merely an angelic messenger or a theophanic manifestation.
  alternative_readings:
  - the messenger of the LORD
  - a theophany/preincarnate appearance of the Son
  rationale: The Hebrew expression itself identifies the figure as 'the angel/messenger
    of YHWH' but does not require the translator to settle the theological interpretation
    in the main text. The translation preserves the textual designation and leaves
    theological identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    → the LORD
