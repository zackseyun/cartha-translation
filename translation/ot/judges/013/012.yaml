id: JDG.13.12
reference: Judges 13:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מָנ֔וֹחַ עַתָּ֖ה יָבֹ֣א דְבָרֶ֑י/ךָ מַה יִּֽהְיֶ֥ה מִשְׁפַּט הַ/נַּ֖עַר
    וּ/מַעֲשֵֽׂ/הוּ־־׃
translation:
  text: Then Manoah said, “Now let your words come true. What will be the rule for
    the boy, and his work?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when your words come true.” The Hebrew clause may be heard either as
      a wish (“let your words come true”) or as a temporal assumption (“when your
      words come true”).
    reason: alternative_reading
  - marker: b
    text: “The rule for the boy” could also be rendered “the custom,” “the ordinance,”
      or “the manner of life” for the boy.
    reason: lexical_alternative
  - marker: c
    text: Or “and what he is to do.” The Hebrew literally reads “and his work.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' is natural
    modern English while preserving the sequential force.
- source_word: מָנוֹחַ
  chosen: Manoah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - Please now
  - At this time
  lexicon: HALOT
  rationale: Here עתה marks the immediate moment of response and expectation; 'Now'
    is the most natural concise rendering.
- source_word: יָבֹא דְבָרֶיךָ
  chosen: let your words come true
  alternatives:
  - may your words come to pass
  - when your words come true
  lexicon: HALOT
  rationale: Literally 'may your words come/arrive.' In context Manoah refers to the
    announced birth and asks for instruction contingent on its fulfillment. 'Let your
    words come true' expresses the idiom clearly in English without overparaphrase.
    The alternative 'when your words come true' is possible, taking the clause more
    temporally than optatively.
- source_word: מַה יִּהְיֶה
  chosen: What will be
  alternatives:
  - How shall it be
  lexicon: HALOT
  rationale: A straightforward interrogative about the future circumstances or requirements.
- source_word: מִשְׁפַּט
  chosen: the rule
  alternatives:
  - the custom
  - the ordinance
  - the manner
  lexicon: HALOT
  rationale: מִשְׁפַּט can denote legal judgment, prescribed practice, or customary
    rule. In this context Manoah asks what governing prescription is to apply to the
    child. 'Rule' is concise and understandable; 'ordinance' sounds overly formal,
    while 'manner' may be too vague.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: Though the child is not yet born, the term refers to the coming male
    child. 'Boy' preserves the masculine reference and is idiomatic; 'child' is possible
    but less gender-specific than the Hebrew.
- source_word: וּמַעֲשֵׂהוּ
  chosen: and his work
  alternatives:
  - and what he is to do
  - and his conduct
  - and his task
  lexicon: HALOT
  rationale: The noun מַעֲשֶׂה means deed, work, or activity. Here it likely asks
    about the boy's prescribed activity or vocation. 'His work' is a close rendering
    that leaves the breadth of the Hebrew intact; a more interpretive expansion is
    preserved as an alternative.
