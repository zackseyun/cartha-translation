theological_decisions:
- issue: Rendering of הָאֱלֹהִים in this verse
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: Although אֱלֹהִים is morphologically plural, in this narrative it clearly
    refers to Israel's God and governs singular verbal forms. Rendering it as 'God'
    reflects standard monotheistic usage demanded by the immediate syntax and context,
    not a doctrinal imposition.
