id: JDG.13.9
reference: Judges 13:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע הָ/אֱלֹהִ֖ים בְּ/ק֣וֹל מָנ֑וֹחַ וַ/יָּבֹ֣א מַלְאַךְ֩ הָ/אֱלֹהִ֨ים
    ע֜וֹד אֶל הָ/אִשָּׁ֗ה וְ/הִיא֙ יוֹשֶׁ֣בֶת בַּ/שָּׂדֶ֔ה וּ/מָנ֥וֹחַ אִישָׁ֖/הּ
    אֵ֥ין עִמָּֽ/הּ־׃
translation:
  text: And God listened to the voice of Manoah, and the angel of God came again to
    the woman while she was sitting in the field, and Manoah her husband was not with
    her.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb שׁמע can mean either 'hear' or 'listen/respond to.' In context,
    God is responding favorably to Manoah's request in the previous verse, so 'listened
    to' better conveys attentive response than the flatter 'heard.'
- source_word: בְּקוֹל
  chosen: to the voice of
  alternatives:
  - to
  - the request of
  lexicon: HALOT
  rationale: The idiom שׁמע בקול literally means 'listen to the voice of.' Retaining
    'voice' preserves the Hebrew expression while remaining natural in English. 'Request'
    captures the sense but is more interpretive than the source wording.
- source_word: מָנוֹחַ
  chosen: Manoah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מַלְאַךְ הָאֱלֹהִים
  chosen: the angel of God
  alternatives:
  - God's angel
  - the messenger of God
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger' or 'angel.' In this narrative, the
    being is presented as a supernatural divine messenger, so 'angel' is the most
    natural and contextually appropriate rendering. The construct phrase is rendered
    straightforwardly as 'the angel of God.'
- source_word: עוֹד
  chosen: again
  alternatives:
  - once more
  - still
  lexicon: HALOT
  rationale: 'Here עוֹד marks repeated occurrence: the angel came to the woman another
    time. ''Again'' is concise and idiomatic.'
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: The narrative has consistently referred to Manoah's spouse as 'the woman.'
    Retaining that wording preserves discourse flow and avoids importing a relational
    term not used here.
- source_word: וְהִיא יֹשֶׁבֶת
  chosen: while she was sitting
  alternatives:
  - and she was sitting
  - as she sat
  lexicon: HALOT
  rationale: The clause gives the circumstance in which the angel came. 'While she
    was sitting' expresses the participial background action naturally in English.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - out in the field
  lexicon: HALOT
  rationale: A direct rendering of the locative phrase; 'in the field' is natural
    and sufficiently clear.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: Though אִישׁ literally means 'man,' with the 3fs suffix in this context
    it idiomatically means 'her husband.' This is the standard and contextually precise
    English rendering.
- source_word: אֵין עִמָּהּ
  chosen: was not with her
  alternatives:
  - was absent from her
  - was not there with her
  lexicon: HALOT
  rationale: The negative existential plus עִם expresses presence/companionship. 'Was
    not with her' is both literal and idiomatic.
