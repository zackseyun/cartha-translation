theological_decisions:
- issue: Nature of the prohibition regarding products of the vine
  chosen_reading: Render the phrase comprehensively as applying to anything derived
    from the grapevine, in line with Nazirite-style restrictions in context.
  alternative_readings:
  - Render more narrowly as only grapes or grape products fit for eating
  rationale: The wording 'from all that comes out of the vine of wine' is intentionally
    broad. The context in Judges 13 concerns consecration restrictions, so a comprehensive
    rendering best preserves the force without importing later technical terminology
    into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of טֻמְאָה
  chosen_reading: Use 'unclean' rather than 'impure' to preserve the covenantal/ritual
    register.
  alternative_readings:
  - impure
  rationale: '''Unclean'' better matches standard biblical category language and keeps
    intertextual links with Torah purity laws, while remaining understandable in modern
    English.'
  doctrine_reference: Translation philosophy §§1, 5, 6
