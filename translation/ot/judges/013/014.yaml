id: JDG.13.14
reference: Judges 13:14
source:
  edition: WLC
  text: מִ/כֹּ֣ל אֲשֶׁר יֵצֵא֩ מִ/גֶּ֨פֶן הַ/יַּ֜יִן לֹ֣א תֹאכַ֗ל וְ/יַ֤יִן וְ/שֵׁכָר֙
    אַל תֵּ֔שְׁתְּ וְ/כָל טֻמְאָ֖ה אַל תֹּאכַ֑ל כֹּ֥ל אֲשֶׁר צִוִּיתִ֖י/הָ תִּשְׁמֹֽר־־־־־׃
translation:
  text: She must not eat anything that comes from the vine of wine, and she must not
    drink wine or strong drink, and she must not eat anything unclean. She must keep
    all that I commanded her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from all that comes out of the vine of wine,'' that is, anything
      derived from the grapevine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל אֲשֶׁר יֵצֵא מִגֶּפֶן הַיַּיִן
  chosen: anything that comes from the vine of wine
  alternatives:
  - anything from the grapevine
  - anything produced by the vine
  - anything that comes from the wine vine
  lexicon: HALOT
  rationale: The phrase is comprehensive and refers to anything derived from the grapevine.
    'Anything that comes from' preserves the verbal force of יֵצֵא ('comes out/proceeds').
    'Vine of wine' is somewhat wooden in English but keeps the Hebrew imagery more
    closely than simply 'grapevine'; however the sense is effectively the grapevine.
- source_word: לֹא תֹאכַל
  chosen: she must not eat
  alternatives:
  - she shall not eat
  - let her not eat
  lexicon: HALOT
  rationale: Though literally 'she shall not eat,' English 'must not' best conveys
    the prohibitive force in this instruction while remaining natural.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for יַיִן.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: '''Strong drink'' is the conventional broad rendering for an alcoholic
    beverage other than wine. ''Beer'' is too narrow; ''intoxicating drink'' is interpretive.'
- source_word: אַל תֵּשְׁתְּ
  chosen: she must not drink
  alternatives:
  - let her not drink
  - she shall not drink
  lexicon: HALOT
  rationale: Jussive prohibition with אַל is naturally conveyed by 'must not' in contemporary
    English.
- source_word: כָל טֻמְאָה
  chosen: anything unclean
  alternatives:
  - any unclean thing
  - anything impure
  lexicon: HALOT
  rationale: The Hebrew is broad and indefinite. 'Anything unclean' is idiomatic and
    preserves ritual/moral category language without over-specifying.
- source_word: כֹּל אֲשֶׁר צִוִּיתִיהָ
  chosen: all that I commanded her
  alternatives:
  - everything that I commanded her
  - all that I have commanded her
  lexicon: HALOT
  rationale: Straightforward rendering of the totalizing phrase. Simple past fits
    the narrative context of the angel's prior instruction.
- source_word: תִּשְׁמֹר
  chosen: she must keep
  alternatives:
  - she shall keep
  - she must observe
  lexicon: HALOT
  rationale: שׁמר here means to keep/observe instructions. 'Keep' is concise and natural;
    'observe' is possible but slightly more formal.
