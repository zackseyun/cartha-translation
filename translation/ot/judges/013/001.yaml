id: JDG.13.1
reference: Judges 13:1
source:
  edition: WLC
  text: וַ/יֹּסִ֨פוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יִּתְּנֵ֧/ם יְהוָ֛ה בְּ/יַד פְּלִשְׁתִּ֖ים אַרְבָּעִ֥ים שָׁנָֽה־׃פ
translation:
  text: And the sons of Israel again did what was evil in the eyes of Yahweh, and Yahweh gave them into the hand of the Philistines for forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Hebrew 'the sons of Israel' is a corporate designation for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the Philistines,' an idiom meaning into their power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  chosen: again did
  alternatives:
  - continued to do
  - added to do once more
  - again did
  lexicon: HALOT
  rationale: The verb יסף with an infinitive commonly conveys repetition or continuation. In Judges' recurring cycle formula, English 'again did' idiomatically captures the sense that Israel repeated prior evil, without the awkwardly literal 'added to do.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Formally this is 'sons of Israel.' Given the translation philosophy's gender-accurate preference, the more literal rendering is retained here. It functions corporately for the covenant people, not merely male individuals.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: did what was evil
  alternatives:
  - did evil
  - did the evil
  lexicon: HALOT
  rationale: This infinitive construction with the article on רַע is a standard idiom in Judges. 'Did what was evil' is natural modern English and preserves the qualitative force better than the slightly flatter 'did evil.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom meaning according to the LORD's evaluation. 'In the eyes of' is transparent and preserves the metaphor; 'the LORD' follows the project's default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתְּנֵם
  chosen: gave them
  alternatives:
  - handed them over
  - delivered them
  lexicon: HALOT
  rationale: נתן plus 'into the hand of' is a standard expression for giving someone over to another's power. 'Gave them' keeps the Hebrew wording, while the following phrase supplies the sense of subjection.
- source_word: בְּיַד פְּלִשְׁתִּים
  chosen: into the hand of the Philistines
  alternatives:
  - into the power of the Philistines
  - under the control of the Philistines
  lexicon: HALOT
  rationale: The idiom literally reads 'into the hand of.' Retaining 'hand' preserves the Hebrew image and is still understandable in English; the singular 'hand' is idiomatic collective power.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English transliteration for the people group.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: HALOT
  rationale: English normally supplies 'for' to express duration. This makes explicit the temporal force without adding interpretive content.
