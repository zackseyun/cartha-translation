theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identity nuance of מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The phrase can carry theological significance in Judges, but this verse
    itself does not require resolving broader debates about whether the figure is
    merely angelic or a theophanic manifestation. 'Angel of the LORD' preserves the
    traditional and lexical sense without importing a doctrinal conclusion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
