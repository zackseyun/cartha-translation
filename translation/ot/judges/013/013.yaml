id: JDG.13.13
reference: Judges 13:13
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר מַלְאַ֥ךְ יְהוָ֖ה אֶל מָנ֑וֹחַ מִ/כֹּ֛ל אֲשֶׁר אָמַ֥רְתִּי אֶל
    הָ/אִשָּׁ֖ה תִּשָּׁמֵֽר־־־׃
translation:
  text: And the angel of the LORD said to Manoah, “The woman must be careful about
    everything that I said to her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing the next event in
    sequence. 'And ... said' preserves Hebrew narrative flow without overinterpreting
    temporal nuance.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative the conventional
    and contextually appropriate sense is a heavenly messenger. יְהוָה is rendered
    'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine excerpt''s contested terms table: יְהוָה defaults
    to ''the LORD.'''
- source_word: אֶל מָנוֹחַ
  chosen: to Manoah
  alternatives:
  - to Manoah directly
  lexicon: HALOT
  rationale: Simple directional preposition with proper name; standard English idiom
    is 'said to Manoah.'
- source_word: מִכֹּל אֲשֶׁר
  chosen: about everything that
  alternatives:
  - from all that
  - concerning all that
  - of all that
  lexicon: HALOT
  rationale: The preposition מִן with כֹּל here introduces the scope of what follows.
    In idiomatic English, 'about everything that I said to her' best conveys comprehensive
    reference to the prior instructions.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I told
  lexicon: HALOT
  rationale: The verb is simply 'said.' 'Told' is possible in English, but 'said'
    stays closer to the Hebrew while remaining natural.
- source_word: אֶל הָאִשָּׁה
  chosen: to her
  alternatives:
  - to the woman
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'to the woman.' In English, after the appositional
    subject has already been identified in context, 'to her' yields a smoother sentence
    while preserving the referent. The main clause retains 'The woman' to reflect
    the explicit noun in the verse.
- source_word: הָאִשָּׁה
  chosen: The woman
  alternatives:
  - Your wife
  - She
  lexicon: HALOT
  rationale: The Hebrew uses the definite noun 'the woman,' not 'your wife.' Retaining
    'The woman' preserves the source wording and avoids importing a relational term
    not present in the text.
- source_word: תִּשָּׁמֵר
  chosen: must be careful
  alternatives:
  - must keep herself
  - must guard herself
  - shall be on guard
  lexicon: HALOT
  rationale: Nifal of שׁמר here is reflexive/passive in force, referring to careful
    observance or guarding oneself. 'Must be careful' communicates the practical sense
    naturally in English and fits the context of abstaining from prohibited things.
