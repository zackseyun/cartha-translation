id: JDG.13.22
reference: Judges 13:22
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר מָנ֛וֹחַ אֶל אִשְׁתּ֖/וֹ מ֣וֹת נָמ֑וּת כִּ֥י אֱלֹהִ֖ים רָאִֽינוּ־׃
translation:
  text: And Manoah said to his wife, “We will surely die, because we have seen God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a god” or “a divine being.” The Hebrew אֱלֹהִים can in some contexts
      refer more broadly to a divine being, but here the context favors “God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite. 'And ... said' preserves
    Hebrew narrative flow without overinterpreting discourse nuance.
- source_word: מָנוֹחַ
  chosen: Manoah
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֶל אִשְׁתּוֹ
  chosen: to his wife
  alternatives:
  - to his woman
  lexicon: HALOT
  rationale: Idiomatic relational expression; 'wife' is the natural and contextually
    correct English rendering of אִשָּׁה with 3ms suffix here.
- source_word: מוֹת נָמוּת
  chosen: We will surely die
  alternatives:
  - We shall surely die
  - Dying, we will die
  - We are certain to die
  lexicon: HALOT
  rationale: Infinitive absolute + imperfect of מות intensifies the verbal idea. 'We
    will surely die' is a clear modern English equivalent that preserves the emphatic
    force.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Manoah's fear. 'Because' is the most
    straightforward causal rendering in contemporary English.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - a god
  - divine being
  lexicon: HALOT
  rationale: In this context Manoah refers to the divine figure they have encountered
    as truly divine, and the broader narrative identifies the messenger's appearance
    with an encounter with God. 'God' best reflects the likely sense in context, while
    preserving the theological weight of the statement.
- source_word: רָאִינוּ
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: HALOT
  rationale: Perfect 1cp can be rendered as simple past or present perfect in English.
    'We have seen' fits the immediate consequence in Manoah's statement and sounds
    natural in English.
