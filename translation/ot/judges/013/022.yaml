theological_decisions:
- issue: Rendering אֱלֹהִים in Manoah's exclamation after the appearance of the angel
    of the LORD
  chosen_reading: God
  alternative_readings:
  - a god
  - divine being
  rationale: The immediate literary context (Judg 13) presents the angel of the LORD
    in a way that evokes a direct encounter with God, and Manoah's fear reflects the
    common biblical expectation that seeing God means death. Rendering אֱלֹהִים as
    'God' preserves that theological force without flattening the narrative mystery
    of the messenger's identity.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
