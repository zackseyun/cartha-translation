id: JDG.13.6
reference: Judges 13:6
source:
  edition: WLC
  text: וַ/תָּבֹ֣א הָ/אִשָּׁ֗ה וַ/תֹּ֣אמֶר לְ/אִישָׁ/הּ֮ לֵ/אמֹר֒ אִ֤ישׁ הָ/אֱלֹהִים֙
    בָּ֣א אֵלַ֔/י וּ/מַרְאֵ֕/הוּ כְּ/מַרְאֵ֛ה מַלְאַ֥ךְ הָ/אֱלֹהִ֖ים נוֹרָ֣א מְאֹ֑ד
    וְ/לֹ֤א שְׁאִלְתִּ֨י/הוּ֙ אֵֽי מִ/זֶּ֣ה ה֔וּא וְ/אֶת שְׁמ֖/וֹ לֹֽא הִגִּ֥יד לִֽ/י־־־׃
translation:
  text: Then the woman came and said to her husband, “A man of God came to me, and
    his appearance was like the appearance of the angel of God, very fearsome. I did
    not ask him where he was from, and he did not tell me his name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an angel of God.' The Hebrew can be understood as a comparison to a
      divine messenger without requiring the woman to have fully identified him at
      this point.
    reason: alternative_reading
  - marker: b
    text: '''Very fearsome'' may also be rendered ''very awesome'' or ''very terrifying'';
      the Hebrew expresses an appearance that inspired intense awe and fear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: With the article and in narrative context, this refers to Manoah's wife
    as a character already in view. 'The woman' preserves the Hebrew wording, while
    her relation to Manoah is conveyed separately by 'to her husband.'
- source_word: לְאִישָׁהּ
  chosen: to her husband
  alternatives:
  - to her man
  lexicon: HALOT
  rationale: Though אִישׁ can mean 'man,' with the 3fs suffix in this marital context
    it naturally means 'her husband.' This is the idiomatic and contextually precise
    English rendering.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: a man of God
  alternatives:
  - the man of God
  lexicon: HALOT
  rationale: 'The absence of the article on אִישׁ supports the indefinite sense here:
    she is reporting that a divine messenger-like figure came, not yet identifying
    him as a known prophetic figure. ''Man of God'' is a standard Hebrew title and
    should be preserved.'
- source_word: בָּא אֵלַי
  chosen: came to me
  alternatives:
  - came to me here
  lexicon: HALOT
  rationale: A straightforward rendering of the verb and prepositional phrase; no
    expansion is warranted.
- source_word: וּמַרְאֵהוּ
  chosen: and his appearance
  alternatives:
  - and his look
  - and his form
  lexicon: HALOT
  rationale: מַרְאֶה commonly denotes visible appearance. 'Appearance' is natural
    English and fits the comparison that follows.
- source_word: כְּמַרְאֵה מַלְאַךְ הָאֱלֹהִים
  chosen: was like the appearance of the angel of God
  alternatives:
  - was like the appearance of an angel of God
  - looked like the angel of God
  lexicon: HALOT
  rationale: The repeated noun מַרְאֶה is retained for emphasis. The article on מַלְאַךְ
    plus הָאֱלֹהִים is best represented as 'the angel of God' in this narrative context,
    anticipating the figure's identity without over-paraphrasing.
- source_word: מַלְאַךְ
  chosen: angel
  alternatives:
  - messenger
  lexicon: HALOT
  rationale: Although מַלְאָךְ can mean 'messenger,' the immediate context is a supernatural
    visitation and the comparison is to a divine being. 'Angel' best communicates
    the sense here.
- source_word: נוֹרָא מְאֹד
  chosen: very fearsome
  alternatives:
  - very awesome
  - very terrifying
  - very dreadful
  lexicon: HALOT
  rationale: נוֹרָא conveys something inspiring fear or awe. 'Very fearsome' preserves
    the element of dread more clearly than the modern English 'awesome,' which can
    sound weakened or colloquial.
- source_word: וְלֹא שְׁאִלְתִּיהוּ
  chosen: I did not ask him
  alternatives:
  - but I did not inquire of him
  lexicon: HALOT
  rationale: A direct and readable rendering of the first-person verb with object
    suffix. 'Ask' is sufficient in modern English.
- source_word: אֵי מִזֶּה הוּא
  chosen: where he was from
  alternatives:
  - where he came from
  - from where he was
  lexicon: HALOT
  rationale: The idiom asks about origin or provenance. 'Where he was from' is idiomatic
    English and captures the sense cleanly.
- source_word: וְאֶת שְׁמוֹ לֹא הִגִּיד לִי
  chosen: and he did not tell me his name
  alternatives:
  - and his name he did not declare to me
  - and he did not make his name known to me
  lexicon: HALOT
  rationale: הִגִּיד means 'tell, declare, make known.' In this conversational report,
    'tell me his name' is the most natural equivalent while preserving the content.
