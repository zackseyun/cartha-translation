theological_decisions:
- issue: Rendering מַלְאַךְ הָאֱלֹהִים in a context later identifying the figure as
    the angel of the LORD
  chosen_reading: the angel of God
  alternative_readings:
  - an angel of God
  - messenger of God
  rationale: The Hebrew phrase here uses the definite article and occurs in a narrative
    where the visitor is a specific divine messenger. Rendering it 'the angel of God'
    preserves the textual wording and narrative development without importing later
    theological conclusions beyond the verse itself.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
