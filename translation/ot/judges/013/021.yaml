id: JDG.13.21
reference: Judges 13:21
source:
  edition: WLC
  text: וְ/לֹא יָ֤סַף עוֹד֙ מַלְאַ֣ךְ יְהוָ֔ה לְ/הֵרָאֹ֖ה אֶל מָנ֣וֹחַ וְ/אֶל אִשְׁתּ֑/וֹ
    אָ֚ז יָדַ֣ע מָנ֔וֹחַ כִּֽי מַלְאַ֥ךְ יְהוָ֖ה הֽוּא־־־־׃
translation:
  text: And the angel of the LORD did not appear again to Manoah and to his wife.
    Then Manoah knew that he was the angel of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'messenger'
      or 'angel'; in this context it refers to a supernatural figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַף עוֹד
  chosen: did not appear again
  alternatives:
  - did not continue to appear anymore
  - did not add again to appear
  lexicon: HALOT
  rationale: 'The idiom יָסַף + infinitive with עוֹד expresses cessation of a repeated
    or further action: ''did not again/further'' do something. In natural English,
    this is best rendered ''did not appear again.'''
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel,' but in this narrative context
    the supernatural figure is best rendered 'angel.' Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    the traditional English convention and reverential substitution pattern.
- source_word: לְהֵרָאֹה
  chosen: appear
  alternatives:
  - be seen
  - show himself
  lexicon: HALOT
  rationale: The Niphal infinitive of ראה here has the passive/reflexive sense 'to
    appear' or 'be seen.' 'Appear' is the most idiomatic English in this context.
- source_word: אֶל מָנוֹחַ וְאֶל אִשְׁתּוֹ
  chosen: to Manoah and to his wife
  alternatives:
  - to Manoah and his wife
  lexicon: HALOT
  rationale: The repeated preposition אֶל is retained in a natural but slightly formal
    way to reflect the Hebrew structure without sounding awkward.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: אָז marks the consequent realization in the narrative sequence. 'Then'
    is concise and natural.
- source_word: יָדַע
  chosen: knew
  alternatives:
  - realized
  - came to know
  lexicon: HALOT
  rationale: The verb denotes recognition or realization here. 'Knew' preserves the
    lexical core while remaining clear in context.
- source_word: כִּי מַלְאַךְ יְהוָה הוּא
  chosen: that he was the angel of the LORD
  alternatives:
  - that it was the angel of the LORD
  - that this was the angel of the LORD
  lexicon: HALOT
  rationale: The pronoun הוּא refers back to the previously encountered figure. 'He
    was the angel of the LORD' is the most natural English rendering for personal
    reference.
