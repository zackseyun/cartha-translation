theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD.' This preserves the covenant
    name's distinctiveness while following established English Bible convention noted
    in DOCTRINE.md.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identity language for מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The verse identifies the figure as a supernatural messenger without requiring
    the translation to resolve broader theological debates about the 'angel of the
    LORD.' The wording preserves the text's own expression and leaves theological
    tension intact.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
