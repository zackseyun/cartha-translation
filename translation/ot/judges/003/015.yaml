id: JDG.3.15
reference: Judges 3:15
source:
  edition: WLC
  text: וַ/יִּזְעֲק֣וּ בְנֵֽי יִשְׂרָאֵל֮ אֶל יְהוָה֒ וַ/יָּקֶם֩ יְהוָ֨ה לָ/הֶ֜ם מוֹשִׁ֗יעַ אֶת אֵה֤וּד בֶּן גֵּרָא֙ בֶּן הַ/יְמִינִ֔י אִ֥ישׁ אִטֵּ֖ר יַד יְמִינ֑/וֹ וַ/יִּשְׁלְח֨וּ בְנֵי יִשְׂרָאֵ֤ל בְּ/יָד/וֹ֙ מִנְחָ֔ה לְ/עֶגְל֖וֹן מֶ֥לֶךְ מוֹאָֽב־־־־־־־׃
translation:
  text: Then the sons of Israel cried out to Yahweh, and Yahweh raised up for them a deliverer, Ehud son of Gera, a Benjaminite, a man hindered in his right hand. And the sons of Israel sent tribute by his hand to Eglon king of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'a left-handed man.' The Hebrew literally describes Ehud as limited or restricted in his right hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried for help
  lexicon: HALOT
  rationale: זעק commonly denotes a cry of distress or appeal for help. 'Cried out' preserves both urgency and the conventional covenantal pattern in Judges without adding an explicit object like 'for help' that is implied but not stated.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the idiom and the gendered/source-accurate expression, in line with the project's gender-accurate policy. 'Israelites' is possible but less transparent to the Hebrew wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּקֶם ... מוֹשִׁיעַ
  chosen: raised up for them a deliverer
  alternatives:
  - appointed for them a savior
  - caused a rescuer to arise for them
  lexicon: HALOT
  rationale: The idiom 'raised up' is standard for God's commissioning of judges, and מוֹשִׁיעַ here refers to a human agent of rescue. 'Deliverer' fits the book's context better than 'savior' in English, which could imply more than the immediate historical sense.
- source_word: אֵהוּד בֶּן גֵּרָא
  chosen: Ehud son of Gera
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: בֶּן הַיְמִינִי
  chosen: a Benjaminite
  alternatives:
  - son of the Benjaminite
  - son of the right-hand tribe
  lexicon: HALOT
  rationale: This gentilic/adjectival expression identifies tribal affiliation. 'A Benjaminite' is the natural English equivalent and preserves the sense without woodenly reproducing the Hebrew form.
- source_word: אִישׁ אִטֵּר יַד יְמִינוֹ
  chosen: a man restricted in his right hand
  alternatives:
  - a left-handed man
  - a man impeded in his right hand
  lexicon: HALOT
  rationale: The Hebrew expression is unusual and more literally points to some limitation or binding of the right hand rather than directly stating left-handedness. Since the source text's wording is specific, the main text preserves that nuance; the common interpretive rendering 'left-handed' is worth preserving in a footnote.
- source_word: וַיִּשְׁלְחוּ ... בְּיָדוֹ
  chosen: sent ... by his hand
  alternatives:
  - sent ... through him
  - sent ... with him
  lexicon: HALOT
  rationale: The idiom בְּיָד often means agency or instrumentality. 'By his hand' is slightly formal but transparent and preserves the Hebrew image; the sense is that Ehud carried or delivered the tribute.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  lexicon: HALOT
  rationale: In this political context, the term refers to payment rendered to a superior ruler, so 'tribute' is more precise than the broader 'gift' or cultic-sounding 'offering'.
- source_word: לְעֶגְלוֹן מֶלֶךְ מוֹאָב
  chosen: to Eglon king of Moab
  alternatives:
  - to Eglon, the king of Moab
  rationale: Straightforward rendering of the proper name and royal title; the appositional structure is preserved in natural English.
