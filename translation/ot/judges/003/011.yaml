id: JDG.3.11
reference: Judges 3:11
source:
  edition: WLC
  text: וַ/תִּשְׁקֹ֥ט הָ/אָ֖רֶץ אַרְבָּעִ֣ים שָׁנָ֑ה וַ/יָּ֖מָת עָתְנִיאֵ֥ל בֶּן קְנַֽז־׃פ
translation:
  text: So the land had rest for forty years. Then Othniel son of Kenaz died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּשְׁקֹט
  chosen: had rest
  alternatives:
  - was quiet
  - was at peace
  - rested
  lexicon: HALOT
  rationale: The verb שׁקט commonly denotes being quiet, undisturbed, or at rest.
    In Judges, after deliverance, it often describes a period of peace from oppression.
    'Had rest' is idiomatic in English and preserves the covenant-historical sense
    without overinterpreting it as total prosperity.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In the context of Judges, אֶרֶץ refers to the land of Israel/the territory,
    not the whole earth. 'The land' is the most natural and contextually precise rendering.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: HALOT
  rationale: This accusative of duration indicates the length of the period of rest.
    'For forty years' makes the temporal force explicit in natural English.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - then died
  - and died
  lexicon: HALOT
  rationale: The verb simply states death. The prefixed waw advances the narrative;
    in English this is best conveyed by sentence sequencing rather than a mechanically
    repeated 'and.'
- source_word: עָתְנִיאֵל
  chosen: Othniel
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בֶּן קְנַז
  chosen: son of Kenaz
  alternatives:
  - the son of Kenaz
  lexicon: HALOT
  rationale: The construct phrase identifies Othniel by lineage. 'Son of Kenaz' is
    the standard, clear rendering.
