id: JDG.3.31
reference: Judges 3:31
source:
  edition: WLC
  text: וְ/אַחֲרָ֤י/ו הָיָה֙ שַׁמְגַּ֣ר בֶּן עֲנָ֔ת וַ/יַּ֤ךְ אֶת פְּלִשְׁתִּים֙ שֵֽׁשׁ
    מֵא֣וֹת אִ֔ישׁ בְּ/מַלְמַ֖ד הַ/בָּקָ֑ר וַ/יֹּ֥שַׁע גַּם ה֖וּא אֶת יִשְׂרָאֵֽל־־־־־׃ס
translation:
  text: After him was Shamgar son of Anath, and he struck down six hundred Philistine
    men with an ox goad; he too saved Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered Israel.' The Hebrew verb can denote rescue or deliverance
      in a military context.
    reason: lexical_alternative
  - marker: b
    text: An 'ox goad' was a pointed stick used to drive cattle.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַחֲרָיו
  chosen: After him
  alternatives:
  - Afterward
  - After Ehud
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'after him,' referring back
    to the preceding judge. 'After him' preserves the anaphoric link without importing
    the name into the text; 'After Ehud' is interpretive and better left implicit.
- source_word: הָיָה
  chosen: was
  alternatives:
  - arose
  - came
  lexicon: HALOT
  rationale: Here היה functions as a simple existential/copular verb introducing the
    next figure in sequence. 'Was' is plain and sufficient; 'arose' would add narrative
    color not explicit in the verb.
- source_word: שַׁמְגַּר בֶּן־עֲנָת
  chosen: Shamgar son of Anath
  alternatives:
  - Shamgar ben-Anath
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Son of Anath' is retained literally; whether this indicates parentage
    or an epithet is uncertain, so the Hebrew form is mirrored transparently.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - killed
  - defeated
  - struck
  lexicon: HALOT
  rationale: נכה commonly denotes striking, often lethally in battle contexts. 'Struck
    down' conveys violent defeat and likely killing without overstating beyond the
    verb itself.
- source_word: פְּלִשְׁתִּים
  chosen: Philistine
  alternatives:
  - Philistines
  lexicon: HALOT
  rationale: Used attributively in the phrase 'Philistine men.' This preserves the
    Hebrew construction of people-group plus counted individuals.
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  chosen: six hundred ... men
  alternatives:
  - six hundred men
  - six hundred persons
  lexicon: HALOT
  rationale: אִישׁ after a number commonly means 'men' or 'persons,' but in a military
    context 'men' is the natural and gender-accurate rendering. The number is kept
    formally.
- source_word: בְּמַלְמַד הַבָּקָר
  chosen: with an ox goad
  alternatives:
  - with a cattle prod
  - with a goad for the cattle
  lexicon: HALOT
  rationale: The phrase denotes an implement used to drive oxen/cattle. 'Ox goad'
    is the standard concise English equivalent and fits the likely agrarian weapon
    imagery better than the more modern-sounding 'cattle prod.'
- source_word: וַיֹּשַׁע
  chosen: saved
  alternatives:
  - delivered
  - gave victory to
  lexicon: HALOT
  rationale: The verb ישׁע in Judges regularly refers to deliverance of Israel from
    oppressors. 'Saved' is a clear, natural rendering that preserves the thematic
    vocabulary of the book.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - he also
  - even he
  lexicon: HALOT
  rationale: The phrase marks Shamgar as another deliverer in the sequence. 'He too'
    is idiomatic and preserves the additive emphasis.
- source_word: אֶת־יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object of the deliverance verb; rendered straightforwardly as
    the covenant people/nation.
