theological_decisions:
- issue: Nature of Shamgar's deliverance
  chosen_reading: he too saved Israel
  alternative_readings:
  - he too delivered Israel
  rationale: The verse attributes real deliverance to Shamgar without specifying its
    scope or duration. 'Saved' preserves the book's recurring deliverer language while
    not importing broader soteriological claims.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
