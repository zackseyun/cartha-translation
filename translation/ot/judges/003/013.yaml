theological_decisions:
- issue: Identification of עִיר הַתְּמָרִים
  chosen_reading: Render as 'the City of Palms' in the main text without substituting
    'Jericho.'
  alternative_readings:
  - Jericho
  rationale: The Hebrew text uses the descriptive title rather than the explicit name.
    To preserve original-language primacy and avoid importing an identification into
    the main text, the translation keeps the title and preserves the likely identification
    in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
