id: JDG.3.13
reference: Judges 3:13
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֣ף אֵלָ֔י/ו אֶת בְּנֵ֥י עַמּ֖וֹן וַ/עֲמָלֵ֑ק וַ/יֵּ֗לֶךְ וַ/יַּךְ֙
    אֶת יִשְׂרָאֵ֔ל וַ/יִּֽירְשׁ֖וּ אֶת עִ֥יר הַ/תְּמָרִֽים־־־׃
translation:
  text: He gathered to himself the Ammonites and Amalek, and he went and struck Israel,
    and they took possession of the City of Palms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely Jericho; compare Deuteronomy 34:3 and 2 Chronicles 28:15.
    reason: cross_reference
  - marker: b
    text: Or 'the Amalekites.' The Hebrew uses 'Amalek' as a collective name for the
      people group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף אֵלָיו
  chosen: He gathered to himself
  alternatives:
  - He assembled for himself
  - He gathered with him
  lexicon: HALOT
  rationale: אָסַף with אֵלָיו indicates drawing others to himself, i.e., assembling
    allies under his leadership. 'Gathered to himself' preserves both the reflexive
    nuance and readable English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: The ethnonym is the natural English rendering here. 'Sons of Ammon' is
    more formal but less idiomatic in context.
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew proper name can denote the people group collectively. Retaining
    'Amalek' follows the source form closely; English readers will understand it as
    the nation/tribe allied with Eglon.
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - he marched
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' 'He went' preserves the simple narrative
    sequence without importing military nuance beyond what the context already supplies.
- source_word: וַיַּךְ אֶת יִשְׂרָאֵל
  chosen: struck Israel
  alternatives:
  - defeated Israel
  - attacked Israel
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Struck' keeps the military sense
    while remaining closer to the Hebrew than the more interpretive 'defeated.'
- source_word: וַיִּירְשׁוּ
  chosen: they took possession of
  alternatives:
  - they possessed
  - they occupied
  - he took possession of
  lexicon: HALOT
  rationale: ירשׁ often means to take possession/inherit/dispossess. The verb is 3mp,
    so the subject is plural ('they'), referring to Eglon and his allied forces rather
    than Eglon alone. 'Took possession of' expresses the conquest-result sense clearly.
- source_word: עִיר הַתְּמָרִים
  chosen: the City of Palms
  alternatives:
  - the city of palm trees
  lexicon: HALOT
  rationale: This is a known place designation, traditionally associated with Jericho
    (cf. Deut 34:3; 2 Chr 28:15). Capitalizing 'City of Palms' treats it as a place-name
    while preserving the Hebrew imagery.
