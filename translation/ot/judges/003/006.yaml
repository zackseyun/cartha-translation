id: JDG.3.6
reference: Judges 3:6
source:
  edition: WLC
  text: וַ/יִּקְח֨וּ אֶת בְּנוֹתֵי/הֶ֤ם לָ/הֶם֙ לְ/נָשִׁ֔ים וְ/אֶת בְּנוֹתֵי/הֶ֖ם
    נָתְנ֣וּ לִ/בְנֵי/הֶ֑ם וַ/יַּעַבְד֖וּ אֶת אֱלֹהֵי/הֶֽם־־־׃פ
translation:
  text: They took their daughters for themselves as wives, and they gave their own
    daughters to their sons, and they served their gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "worshiped their gods."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: They took
  alternatives:
  - They married
  - They took for themselves
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In marriage contexts it commonly
    refers to taking a woman as a wife. Here 'They took' preserves the Hebrew verbal
    choice, while the following phrase 'as wives' makes the marital sense explicit.
- source_word: בְּנוֹתֵיהֶם
  chosen: their daughters
  alternatives:
  - their daughters [of those peoples]
  lexicon: HALOT
  rationale: The 3mp suffix refers back to the surrounding nations named in the context.
    English 'their daughters' is sufficient and natural, with the antecedent supplied
    by context.
- source_word: לָהֶם לְנָשִׁים
  chosen: for themselves as wives
  alternatives:
  - for themselves for wives
  - as wives for themselves
  lexicon: HALOT
  rationale: The double prepositional construction marks advantage ('for themselves')
    and purpose/result ('as wives'). This rendering preserves both elements while
    reading naturally in English.
- source_word: וְאֶת בְּנוֹתֵיהֶם נָתְנוּ לִבְנֵיהֶם
  chosen: and they gave their own daughters to their sons
  alternatives:
  - and they gave their daughters to their sons
  - and they gave their daughters to their sons in marriage
  lexicon: HALOT
  rationale: נתן means 'give.' In this context it refers to giving daughters in marriage.
    'Their own daughters' helps English readers distinguish the second 'their' from
    the first clause's referent without adding more than the context warrants.
- source_word: לִבְנֵיהֶם
  chosen: to their sons
  alternatives:
  - to their sons [of Israel]
  lexicon: HALOT
  rationale: The suffix here refers to Israel, contrasting with the previous suffixes
    referring to the nations. 'To their sons' is formally accurate; the shift in referent
    is clarified by the clause structure.
- source_word: וַיַּעַבְדוּ
  chosen: and they served
  alternatives:
  - and they worshiped
  lexicon: HALOT
  rationale: עבד with gods can mean serve or worship. 'Served' is closer to the Hebrew
    verb and preserves the covenantal sense of religious allegiance, while still implying
    worship in context.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their deities
  lexicon: HALOT
  rationale: The plural construct with suffix refers to the gods of the surrounding
    peoples. 'Their gods' is the standard, clear rendering and fits the polemical
    context of Judges.
