theological_decisions:
- issue: Religious allegiance expressed by עבד with pagan gods
  chosen_reading: served their gods
  alternative_readings:
  - worshiped their gods
  rationale: The Hebrew verb עבד often denotes service rendered in worship. Rendering
    it as 'served' preserves the broader covenantal and allegiance dimension without
    narrowing it only to cultic acts. The alternative is lexically valid but not required
    in the main text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
