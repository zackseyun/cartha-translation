id: JDG.3.19
reference: Judges 3:19
source:
  edition: WLC
  text: וְ/ה֣וּא שָׁ֗ב מִן הַ/פְּסִילִים֙ אֲשֶׁ֣ר אֶת הַ/גִּלְגָּ֔ל וַ/יֹּ֕אמֶר דְּבַר
    סֵ֥תֶר לִ֛/י אֵלֶ֖י/ךָ הַ/מֶּ֑לֶךְ וַ/יֹּ֣אמֶר הָ֔ס וַ/יֵּֽצְאוּ֙ מֵֽ/עָלָ֔י/ו
    כָּל הָ/עֹמְדִ֖ים עָלָֽי/ו־־־־׃
translation:
  text: But he himself turned back from the carved images that were near Gilgal and
    said, “I have a secret message for you, O king.” And he said, “Silence.” Then
    all who were standing by him went out from his presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the idols” for “the carved images.” The Hebrew term often refers to
      cultic images.
    reason: lexical_alternative
  - marker: b
    text: Or “that were at Gilgal.” The Hebrew location phrase is compressed and may
      indicate proximity or position at Gilgal.
    reason: lexical_alternative
  - marker: c
    text: Or “a secret word” or “a private matter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  chosen: turned back
  alternatives:
  - returned
  - went back
  lexicon: HALOT
  rationale: The verb denotes returning/turning back. 'Turned back' fits the narrative
    movement after Ehud had gone with the tribute party and then reversed course.
- source_word: הַפְּסִילִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: פסילים refers to carved images, often idols. 'Carved images' preserves
    the concrete lexical sense without prematurely collapsing it into the interpretive
    term 'idols,' though the cultic implication is clear in context.
- source_word: אֲשֶׁר אֶת־הַגִּלְגָּל
  chosen: that were near Gilgal
  alternatives:
  - that were at Gilgal
  - which were by Gilgal
  lexicon: HALOT
  rationale: The construction is elliptical/idiomatic, indicating location in relation
    to Gilgal. 'Near Gilgal' gives clear English while preserving the locative sense.
- source_word: דְּבַר סֵתֶר
  chosen: a secret message
  alternatives:
  - a secret word
  - a private matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message'; סתר means hidden/secret.
    In this court setting, 'secret message' is natural English and preserves the ambiguity
    that Ehud may be presenting information rather than explicitly naming his intent.
- source_word: לִי אֵלֶיךָ
  chosen: for you
  alternatives:
  - to you
  - I have for you
  lexicon: HALOT
  rationale: The idiom literally includes first-person possession plus direction ('a
    secret message to/for me for you'). English requires smoothing; 'I have a secret
    message for you' best captures the sense.
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In direct address, English idiom prefers the vocative 'O king' or simply
    'king.' 'O king' preserves the formal address.
- source_word: הָס
  chosen: Silence
  alternatives:
  - Be silent
  - Hush
  lexicon: HALOT
  rationale: The imperative is a terse command for quiet. 'Silence' reflects the abruptness
    and likely addresses attendants to withdraw and keep quiet.
- source_word: כָּל הָעֹמְדִים עָלָיו
  chosen: all who were standing by him
  alternatives:
  - all who attended him
  - all who stood around him
  lexicon: HALOT
  rationale: The participial phrase refers to those in attendance on the king. 'Standing
    by him' is a close and readable rendering.
- source_word: מֵעָלָיו
  chosen: from his presence
  alternatives:
  - from beside him
  - from before him
  lexicon: HALOT
  rationale: Literally 'from upon/beside him,' but in court narrative this means withdrawing
    from attendance. 'From his presence' conveys the social sense clearly in English.
