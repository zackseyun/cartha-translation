id: JDG.3.5
reference: Judges 3:5
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֔ל יָשְׁב֖וּ בְּ/קֶ֣רֶב הַֽ/כְּנַעֲנִ֑י הַ/חִתִּ֤י וְ/הָֽ/אֱמֹרִי֙
    וְ/הַ/פְּרִזִּ֔י וְ/הַ/חִוִּ֖י וְ/הַ/יְבוּסִֽי׃
translation:
  text: And the sons of Israel lived among the Canaanites, the Hittites, the Amorites,
    the Perizzites, the Hivites, and the Jebusites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'' Many English versions render this more
      idiomatically as ''the Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: And the sons of Israel
  alternatives:
  - And the Israelites
  - And the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Following the gender-accurate principle,
    the more formal familial expression is retained rather than flattening to 'Israelites,'
    though that is a natural English alternative. 'Children of Israel' is traditional
    but less precise to the masculine plural form.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישׁב commonly means 'sit, dwell, live, remain.' In this context it describes
    ongoing residence among the peoples of the land. 'Lived' is clear modern English;
    'dwelt' is more formal/archaic, and 'settled' could overemphasize initial establishment
    rather than continued habitation.
- source_word: בְּקֶרֶב
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: The phrase ישׁב בקרב regularly conveys living 'among' a group. 'Among'
    is the most natural optimal-equivalence rendering in English, while preserving
    the relational sense of being in the midst of surrounding peoples.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, these ethnonyms function collectively.
    English idiom normally renders them as plural people-groups in such lists.
- source_word: הַחִתִּי
  chosen: the Hittites
  alternatives:
  - the Hittite
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as an English plural people-group
    for naturalness and clarity in a list of nations.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as plural in English, consistent
    with the surrounding list.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as plural in English for idiomatic
    reference to the people-group.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as plural in English for consistency
    and readability.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as plural in English for idiomatic
    people-group reference.
