id: JDG.3.22
reference: Judges 3:22
source:
  edition: WLC
  text: וַ/יָּבֹ֨א גַֽם הַ/נִּצָּ֜ב אַחַ֣ר הַ/לַּ֗הַב וַ/יִּסְגֹּ֤ר הַ/חֵ֨לֶב֙ בְּעַ֣ד
    הַ/לַּ֔הַב כִּ֣י לֹ֥א שָׁלַ֛ף הַ/חֶ֖רֶב מִ/בִּטְנ֑/וֹ וַ/יֵּצֵ֖א הַֽ/פַּרְשְׁדֹֽנָ/ה־׃
translation:
  text: The hilt also went in after the blade, and the fat closed over the blade,
    because he did not pull the sword out of his belly; and the dung came out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the handle' or 'the shaft' also went in after the blade.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'dung' is rare and may refer more broadly to feces
      or the contents of the bowels.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּצָּב
  chosen: the hilt
  alternatives:
  - the handle
  - the shaft
  lexicon: HALOT
  rationale: In this context of a sword thrust, the noun most plausibly refers to
    the part of the weapon following the blade into Eglon's body. 'Hilt' is the most
    natural English term for the sword's handle/guard area and fits the narrative
    detail better than the more generic 'handle' or less precise 'shaft'.
- source_word: הַלַּהַב
  chosen: the blade
  alternatives:
  - the point
  - the flame
  lexicon: HALOT
  rationale: Though the noun can denote 'flame' elsewhere, in weapon context it refers
    to a blade. 'Blade' is the clear contextual sense here.
- source_word: וַיִּסְגֹּר
  chosen: closed over
  alternatives:
  - shut over
  - enclosed
  lexicon: HALOT
  rationale: The verb means 'to shut/close.' With the preposition בעד and the bodily
    imagery, 'closed over' idiomatically conveys that the fat enveloped the blade.
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the flesh fat
  lexicon: HALOT
  rationale: The noun specifically denotes fat. Retaining 'fat' preserves the graphic
    concreteness of the Hebrew narrative.
- source_word: בְּעַד
  chosen: over
  alternatives:
  - around
  - behind
  lexicon: HALOT
  rationale: Here the preposition marks covering/enclosing in relation to the blade.
    'Over' works naturally with 'closed' in English; 'around' is possible but less
    directly tied to the verbal idiom.
- source_word: שָׁלַף
  chosen: pull out
  alternatives:
  - draw out
  - withdraw
  lexicon: HALOT
  rationale: The verb commonly means to draw a weapon. Since the sword is already
    inside the body, 'pull out' is the most idiomatic English rendering.
- source_word: מִבִּטְנוֹ
  chosen: out of his belly
  alternatives:
  - from his abdomen
  - from his body
  lexicon: HALOT
  rationale: The noun denotes belly/abdomen. 'Belly' preserves the earthy, graphic
    style of the Hebrew better than the more clinical 'abdomen'.
- source_word: הַפַּרְשְׁדֹנָה
  chosen: the dung
  alternatives:
  - the feces
  - the contents of the bowels
  lexicon: HALOT
  rationale: This rare term is traditionally understood as excrement or bowel discharge.
    'Dung' is concise, vivid, and readable modern English without becoming clinical.
    Because the term is rare and debated, alternatives are preserved in a footnote.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: HALOT
  rationale: A simple narrative verb of exiting. 'Came out' is natural modern English
    and matches the gruesome physical detail.
- source_word: גַם
  chosen: also
  alternatives:
  - even
  lexicon: HALOT
  rationale: The particle adds emphasis that not only the blade but also the hilt
    entered. 'Also' communicates this clearly.
