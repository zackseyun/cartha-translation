id: JDG.3.17
reference: Judges 3:17
source:
  edition: WLC
  text: וַ/יַּקְרֵב֙ אֶת הַ/מִּנְחָ֔ה לְ/עֶגְל֖וֹן מֶ֣לֶךְ מוֹאָ֑ב וְ/עֶגְל֕וֹן אִ֥ישׁ
    בָּרִ֖יא מְאֹֽד־׃
translation:
  text: He presented the tribute to Eglon king of Moab. Now Eglon was a very fat man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gift' or 'present.' The Hebrew minḥah can denote an offering or gift,
      but here likely refers to tribute paid by a subject people to a ruler.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: He presented
  alternatives:
  - he brought near
  - he brought
  lexicon: HALOT
  rationale: The Hiphil of קרב here means to bring/present something before a superior.
    'Presented' fits the courtly context of delivering an offering to a king better
    than the more wooden 'brought near,' while remaining close to the source sense.
- source_word: הַמִּנְחָה
  chosen: the tribute
  alternatives:
  - the gift
  - the offering
  - the present
  lexicon: HALOT
  rationale: In Judges 3 the context is political subjugation and payment to a foreign
    ruler, so 'tribute' best captures מִנְחָה here. 'Gift' or 'present' are possible
    more generally, but would understate the coercive political setting.
- source_word: לְעֶגְלוֹן מֶלֶךְ מוֹאָב
  chosen: to Eglon king of Moab
  alternatives:
  - to Eglon, the king of Moab
  rationale: Standard English apposition. The proper name is transliterated, while
    the title is translated in keeping with the translation philosophy.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular and refers to Eglon specifically,
    not to a generic human. 'Man' is therefore the gender-accurate rendering.
- source_word: בָּרִיא
  chosen: fat
  alternatives:
  - stout
  - well-fed
  - corpulent
  lexicon: HALOT
  rationale: The adjective denotes physical fatness or stoutness. 'Fat' is the plainest
    and most direct rendering and suits the narrative's later emphasis on Eglon's
    body. 'Stout' is softer and less precise; 'corpulent' is too clinical.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier. 'Very' is natural modern English and
    adequately conveys the force.
- source_word: וְעֶגְלוֹן
  chosen: Now Eglon
  alternatives:
  - And Eglon
  rationale: The conjunction introduces a parenthetical descriptive note about Eglon.
    'Now' reads naturally in English for this explanatory aside, while preserving
    the discourse function of the Hebrew waw.
