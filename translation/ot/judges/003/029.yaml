id: JDG.3.29
reference: Judges 3:29
source:
  edition: WLC
  text: וַ/יַּכּ֨וּ אֶת מוֹאָ֜ב בָּ/עֵ֣ת הַ/הִ֗יא כַּ/עֲשֶׂ֤רֶת אֲלָפִים֙ אִ֔ישׁ כָּל
    שָׁמֵ֖ן וְ/כָל אִ֣ישׁ חָ֑יִל וְ/לֹ֥א נִמְלַ֖ט אִֽישׁ־־־׃
translation:
  text: And at that time they struck down about ten thousand men of Moab, every stout
    man and every man of valor; not a man escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Moab'; the translation makes explicit that the reference is to Moabite
      men, since the verse immediately counts 'about ten thousand men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every robust man'; Hebrew 'every fat/stout one,' likely describing well-fed
      or strong men rather than making a neutral comment on body size alone.
    reason: lexical_alternative
  - marker: c
    text: Or 'every capable man' or 'every mighty man' for 'every man of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they killed
  - they struck
  lexicon: HALOT
  rationale: From נכה in a military context, the sense is defeating/slaying in battle.
    'Struck down' preserves the violent result without over-specifying beyond the
    context.
- source_word: אֶת מוֹאָב
  chosen: men of Moab
  alternatives:
  - Moab
  - the Moabites
  lexicon: HALOT
  rationale: Although the direct object is 'Moab,' the following appositional count
    'about ten thousand men' makes clear the reference is to Moabite fighting men.
    Rendering 'men of Moab' makes the English explicit while staying close to the
    Hebrew sense.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that time
  - in that time
  lexicon: HALOT
  rationale: Standard temporal expression; 'at that time' is natural modern English
    and formally close.
- source_word: כַּעֲשֶׂרֶת אֲלָפִים אִישׁ
  chosen: about ten thousand men
  alternatives:
  - some ten thousand men
  - approximately ten thousand men
  lexicon: HALOT
  rationale: The prefixed כ can mark approximation here, so 'about' best reflects
    the idiom in readable English.
- source_word: כָּל שָׁמֵן
  chosen: every stout man
  alternatives:
  - every robust man
  - every fat man
  lexicon: HALOT
  rationale: שָׁמֵן literally means 'fat/fatness,' but in this martial context likely
    connotes well-fed, strong, or robust men rather than making a merely physical
    description. 'Stout' preserves the concrete imagery without sounding needlessly
    crude.
- source_word: וְכָל אִישׁ חָיִל
  chosen: every man of valor
  alternatives:
  - every capable man
  - every mighty man
  - every valiant man
  lexicon: HALOT
  rationale: אִישׁ חַיִל commonly denotes a valiant, capable, or mighty man, often
    in military settings. 'Man of valor' fits the battle context and preserves the
    idiomatic force.
- source_word: וְלֹא נִמְלַט אִישׁ
  chosen: not a man escaped
  alternatives:
  - and no man escaped
  - and not one escaped
  lexicon: HALOT
  rationale: This idiom emphasizes totality of defeat. 'Not a man escaped' is concise,
    natural, and preserves the masculine singular noun used distributively.
