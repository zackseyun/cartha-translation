id: JDG.3.20
reference: Judges 3:20
source:
  edition: WLC
  text: וְ/אֵה֣וּד בָּ֣א אֵלָ֗י/ו וְ/הֽוּא יֹ֠שֵׁב בַּ/עֲלִיַּ֨ת הַ/מְּקֵרָ֤ה אֲשֶׁר
    ל/וֹ֙ לְ/בַדּ֔/וֹ וַ/יֹּ֣אמֶר אֵה֔וּד דְּבַר אֱלֹהִ֥ים לִ֖/י אֵלֶ֑י/ךָ וַ/יָּ֖קָם
    מֵ/עַ֥ל הַ/כִּסֵּֽא׀־־־׃
translation:
  text: Then Ehud came to him while he was sitting alone in his cool roof chamber,
    and Ehud said, “I have a word from God for you.” So he rose from his seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a message from God.”
    reason: lexical_alternative
  - marker: b
    text: Or “cool upper room.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “from the seat”; “chair” or “throne” are also possible depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  chosen: came
  alternatives:
  - went in
  - approached
  lexicon: HALOT
  rationale: The verb simply denotes arrival/coming to Eglon. 'Came' is the most natural
    English rendering here and avoids over-specifying manner.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was dwelling
  lexicon: HALOT
  rationale: The participle gives a durative/background sense. 'Was sitting' fits
    the narrative scene-setting better than the simple past 'sat'.
- source_word: עֲלִיַּת הַמְּקֵרָה
  chosen: cool roof chamber
  alternatives:
  - cool upper room
  - roof chamber with cooling
  lexicon: HALOT
  rationale: עֲלִיָּה is an upper room/roof chamber. הַמְּקֵרָה likely denotes a cooled
    or ventilated room. 'Cool roof chamber' preserves both the architectural and climatic
    sense in readable English.
- source_word: אֲשֶׁר לוֹ לְבַדּוֹ
  chosen: alone
  alternatives:
  - which he had to himself alone
  - for his private use
  lexicon: HALOT
  rationale: The phrase indicates that the chamber was for him by himself, emphasizing
    privacy. 'Alone' captures the immediate narrative force concisely; the possessive/private
    nuance is implicit in context.
- source_word: דְּבַר אֱלֹהִים
  chosen: a word from God
  alternatives:
  - the word of God
  - a message from God
  lexicon: HALOT
  rationale: The construct phrase can mean a divine message. Because the noun lacks
    the article and the context is a specific communication to Eglon, 'a word from
    God' is preferable to the more technical-sounding 'the word of God.' 'Message
    from God' is possible, but 'word' preserves the Hebrew more closely.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  - divine
  lexicon: HALOT
  rationale: 'Despite the plural form, the singular sense is demanded by the construct
    phrase and context: Ehud claims a divine message. ''God'' is the standard and
    contextually correct rendering.'
- source_word: וַיָּקָם
  chosen: he rose
  alternatives:
  - he stood up
  - he got up
  lexicon: HALOT
  rationale: The verb means to arise. 'He rose' is concise and suitably dignified
    for the narrative moment.
- source_word: מֵעַל הַכִּסֵּא
  chosen: from his seat
  alternatives:
  - from the chair
  - from the throne
  lexicon: HALOT
  rationale: כִּסֵּא can denote seat, chair, or throne. Here Eglon is a king, so 'throne'
    is possible, but the immediate setting is a private upper chamber rather than
    a formal court scene. 'Seat' preserves the lexical breadth without importing regal
    imagery beyond what the scene requires.
