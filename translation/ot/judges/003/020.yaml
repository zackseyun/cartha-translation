theological_decisions:
- issue: Rendering of אֱלֹהִים in Ehud's deceptive statement
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: The Hebrew form is morphologically plural but commonly singular for Israel's
    God. In the construct phrase דְּבַר אֱלֹהִים and in this narrative context, singular
    'God' is the most natural reading. The text reports Ehud's words without endorsing
    or expanding their theological implications.
