theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention without making a claim about exact
    historical pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gender rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine and names the covenant people through
    the stock expression 'sons of Israel.' Per the gender-accurate principle, the
    masculine form is preserved rather than replaced with a neutral collective in
    the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
