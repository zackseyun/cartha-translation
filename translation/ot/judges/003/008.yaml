id: JDG.3.8
reference: Judges 3:8
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף יְהוָה֙ בְּ/יִשְׂרָאֵ֔ל וַֽ/יִּמְכְּרֵ֗/ם בְּ/יַד֙ כּוּשַׁ֣ן
    רִשְׁעָתַ֔יִם מֶ֖לֶךְ אֲרַ֣ם נַהֲרָ֑יִם וַ/יַּעַבְד֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶת
    כּוּשַׁ֥ן רִשְׁעָתַ֖יִם שְׁמֹנֶ֥ה שָׁנִֽים־־־׃
translation:
  text: So the anger of the LORD burned against Israel, and he sold them into the
    hand of Cushan-rishathaim king of Aram-naharaim. And the sons of Israel served
    Cushan-rishathaim eight years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mesopotamia'; Hebrew 'Aram-naharaim,' traditionally understood as 'Aram
      of the Two Rivers.'
    reason: alternative_reading
  - marker: b
    text: '''The sons of Israel'' is the literal Hebrew expression; many translations
      render it ''the Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - the LORD's anger was kindled
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom literally involves anger 'burning.' 'The anger of the LORD
    burned' preserves the Hebrew imagery while remaining natural English; it is more
    transparent than the flattened 'became angry.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: וַיִּמְכְּרֵם
  chosen: he sold them
  alternatives:
  - he gave them over
  - he handed them over
  lexicon: HALOT
  rationale: The verb מכר normally means 'sell.' In Judges this is covenant-judgment
    language for delivering Israel to oppressors. 'Sold them' preserves the metaphor
    and rhetorical force better than the interpretive alternatives.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for power/control. 'Into the hand of' keeps
    the source-language image; the meaning is clear enough in context.
- source_word: כּוּשַׁן רִשְׁעָתַיִם
  chosen: Cushan-rishathaim
  alternatives:
  - Cushan Rishathaim
  lexicon: HALOT
  rationale: This is a personal name/title and should be transliterated rather than
    translated. Hyphenation helps readers recognize it as a single designation.
- source_word: אֲרַם נַהֲרָיִם
  chosen: Aram-naharaim
  alternatives:
  - Mesopotamia
  - Aram of the Two Rivers
  lexicon: HALOT
  rationale: As a place name, it is transliterated in keeping with the philosophy
    to transliterate names. 'Mesopotamia' is a traditional interpretive equivalent
    but not the Hebrew form.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - were subject to
  - became slaves to
  lexicon: HALOT
  rationale: The verb עבד commonly means 'serve.' Here it denotes political subjection/forced
    service. 'Served' is the most direct rendering; stronger paraphrases are possible
    but go beyond the lexical form.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the gender-accurate
    principle, this is retained rather than neutralized to 'Israelites,' while still
    functioning as the covenant people designation.
- source_word: שְׁמֹנֶה שָׁנִים
  chosen: eight years
  lexicon: HALOT
  rationale: Straightforward temporal expression; no special interpretive issue.
