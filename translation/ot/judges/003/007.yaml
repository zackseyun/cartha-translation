theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render הָאֲשֵׁרוֹת as a specific cult object ('Asherah poles')
    or preserve ambiguity
  chosen_reading: the Asherahs
  alternative_readings:
  - the Asherah poles
  - the Asheroth
  rationale: The Hebrew term may refer to cultic poles/trees or to manifestations
    associated with the goddess Asherah. To avoid importing a narrower archaeological
    or interpretive conclusion than the text itself states, the translation preserves
    the ambiguity in the main text and notes the common alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
