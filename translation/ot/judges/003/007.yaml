id: JDG.3.7
reference: Judges 3:7
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֨וּ בְנֵי יִשְׂרָאֵ֤ל אֶת הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה וַֽ/יִּשְׁכְּח֖וּ
    אֶת יְהוָ֣ה אֱלֹֽהֵי/הֶ֑ם וַ/יַּעַבְד֥וּ אֶת הַ/בְּעָלִ֖ים וְ/אֶת הָ/אֲשֵׁרֽוֹת־־־־־׃
translation:
  text: And the sons of Israel did what was evil in the eyes of the LORD, and they
    forgot the LORD their God and served the Baals and the Asherahs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'evil in the eyes of the LORD,' a standard expression for what the
      LORD judged to be evil.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Asherah poles.' The Hebrew may refer either to cultic objects associated
      with Asherah or, more broadly, to Asherah worship.
    reason: alternative_reading
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew idiom. Because the source
    is explicitly masculine plural and refers to the covenant people corporately,
    'sons of Israel' preserves the form; smoother alternatives are possible but less
    direct.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  chosen: what was evil in the eyes of the LORD
  alternatives:
  - evil in the sight of the LORD
  - what was evil before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative formula. 'What was evil' brings
    out the object marker אֶת before הָרַע, while 'in the eyes of' closely reflects
    the idiom בְּעֵינֵי. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: וַיִּשְׁכְּחוּ
  chosen: they forgot
  alternatives:
  - they abandoned
  - they neglected
  lexicon: HALOT
  rationale: The basic sense of שׁכח is 'forget.' In this covenantal context it implies
    practical abandonment, but the more literal 'forgot' best preserves the source
    and lets the theological force arise from context.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: 'With יְהוָה as the referent and the construct plus pronominal suffix,
    the singular sense is required: ''the LORD their God.'''
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  - became slaves to
  lexicon: HALOT
  rationale: עבד in cultic contexts can mean serve/worship. 'Served' is broad enough
    to preserve both religious devotion and subjection, while avoiding over-interpretation.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the Baal gods
  lexicon: HALOT
  rationale: The plural form likely refers to multiple local manifestations/images
    associated with Baal worship. 'The Baals' preserves the Hebrew plural and the
    polemical force.
- source_word: הָאֲשֵׁרוֹת
  chosen: the Asherahs
  alternatives:
  - the Asherah poles
  - the Asheroth
  lexicon: HALOT
  rationale: The Hebrew plural can denote either the goddess Asherah in pluralized/localized
    form or cultic objects associated with her. 'The Asherahs' preserves the lexical
    ambiguity better than the interpretive 'Asherah poles'; the more transliterated
    'Asheroth' is less accessible in modern English.
