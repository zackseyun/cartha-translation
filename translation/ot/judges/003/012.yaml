theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Divine agency in וַיְחַזֵּק יְהוָה אֶת עֶגְלוֹן
  chosen_reading: the LORD strengthened Eglon
  alternative_readings:
  - the LORD allowed Eglon to become strong
  - the LORD gave Eglon victory
  rationale: The Hebrew verb explicitly attributes active strengthening to the LORD.
    To weaken this to mere permission would import a theological softening not present
    in the text. The translation preserves the tension of divine sovereignty and human
    evil without resolving it beyond the wording of the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
