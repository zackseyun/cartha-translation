id: JDG.3.12
reference: Judges 3:12
source:
  edition: WLC
  text: וַ/יֹּסִ֨פוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יְחַזֵּ֨ק יְהוָ֜ה אֶת עֶגְל֤וֹן מֶֽלֶךְ מוֹאָב֙ עַל יִשְׂרָאֵ֔ל עַ֛ל כִּֽי עָשׂ֥וּ אֶת הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־־־־־׃
translation:
  text: And the sons of Israel again did what was evil in the eyes of Yahweh, and Yahweh strengthened Eglon king of Moab against Israel, because they had done what was evil in the eyes of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; also idiomatically, 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  chosen: again did
  alternatives:
  - continued to do
  - added to do once more
  - did again
  lexicon: HALOT
  rationale: The idiom יסף + infinitive commonly means to do something again or continue doing it. Here, with the cyclical pattern in Judges, 'again did' captures repetition without over-paraphrasing.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew familial expression. 'The Israelites' is idiomatic English, but 'the sons of Israel' remains natural enough and reflects the source wording more transparently.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: did what was evil
  alternatives:
  - to do evil
  - did the evil
  lexicon: HALOT
  rationale: This infinitive construction after יסף is best rendered idiomatically in English as 'did what was evil.' 'The evil' is too wooden here, while 'to do evil' would fit less smoothly with the chosen rendering of the main verb.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' preserves the metaphor and remains understandable in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְחַזֵּק
  chosen: strengthened
  alternatives:
  - made strong
  - gave strength to
  - emboldened
  lexicon: HALOT
  rationale: חזק in the piel commonly means 'strengthen' or 'make strong.' 'Strengthened' is the most direct and preserves the theological force that the LORD actively empowered Eglon.
- source_word: אֶת עֶגְלוֹן מֶלֶךְ מוֹאָב
  chosen: Eglon king of Moab
  alternatives:
  - Eglon, the king of Moab
  lexicon: HALOT
  rationale: This is a straightforward appositional construction. The chosen rendering is concise and natural.
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - over Israel
  - upon Israel
  lexicon: HALOT
  rationale: In this hostile context, עַל is best rendered 'against,' indicating opposition rather than mere spatial relation or rule.
- source_word: עַל כִּי
  chosen: because
  alternatives:
  - on account that
  - for
  lexicon: HALOT
  rationale: The paired particles introduce the reason for the LORD's action. 'Because' is the clearest natural English equivalent.
- source_word: עָשׂוּ אֶת הָרַע
  chosen: they had done what was evil
  alternatives:
  - they did evil
  - they had done the evil
  lexicon: HALOT
  rationale: The clause gives the reason for divine judgment. 'Had done' fits English style after 'because' and mirrors the completed action underlying the judgment.
