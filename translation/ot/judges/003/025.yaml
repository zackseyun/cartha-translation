id: JDG.3.25
reference: Judges 3:25
source:
  edition: WLC
  text: וַ/יָּחִ֣ילוּ עַד בּ֔וֹשׁ וְ/הְנֵּ֛ה אֵינֶ֥/נּוּ פֹתֵ֖חַ דַּלְת֣וֹת הָֽ/עֲלִיָּ֑ה
    וַ/יִּקְח֤וּ אֶת הַ/מַּפְתֵּ֨חַ֙ וַ/יִּפְתָּ֔חוּ וְ/הִנֵּה֙ אֲדֹ֣נֵי/הֶ֔ם נֹפֵ֥ל
    אַ֖רְצָ/ה מֵֽת־־׃
translation:
  text: And they waited until they were embarrassed, and behold, he still was not
    opening the doors of the upper room. So they took the key and opened them, and
    behold, their master had fallen to the floor, dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they were ashamed.' The Hebrew idiom can denote shame or social
      embarrassment; here it likely refers to the servants' growing awkwardness as
      they kept waiting.
    reason: lexical_alternative
  - marker: b
    text: Or 'upper chamber' or 'upstairs room.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their lord.' Here the word refers to their human superior, Eglon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחִילוּ
  chosen: they waited
  alternatives:
  - they delayed
  - they tarried
  lexicon: HALOT
  rationale: In this context the verb describes continued waiting by Eglon's servants
    outside the locked room. 'Waited' best fits the narrative situation in natural
    English; more literal alternatives like 'tarried' are archaic, and 'delayed' could
    imply intentional postponement rather than patient waiting.
- source_word: עַד בּוֹשׁ
  chosen: until they were embarrassed
  alternatives:
  - until they were ashamed
  - to the point of embarrassment
  lexicon: HALOT
  rationale: The idiom expresses that their waiting became socially awkward because
    their lord still did not open the doors. 'Embarrassed' captures the situational
    sense in readable modern English; 'ashamed' is possible but can sound morally
    weightier than the context requires.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: HALOT
  rationale: The particle marks a vivid narrative turn twice in the verse. 'Behold'
    preserves the suddenness and literary force better than flatter options, while
    remaining understandable in modern Bible style.
- source_word: אֵינֶנּוּ פֹתֵחַ
  chosen: he still was not opening
  alternatives:
  - he was not opening
  - he did not open
  lexicon: HALOT
  rationale: The construction indicates ongoing non-action at that moment. 'Still
    was not opening' brings out the continued expectation that he should have opened
    by now.
- source_word: דַּלְתוֹת הָעֲלִיָּה
  chosen: the doors of the upper room
  alternatives:
  - the doors of the roof chamber
  - the doors of the upstairs room
  lexicon: HALOT
  rationale: עֲלִיָּה refers to an upper chamber/upper room. 'Upper room' is idiomatic
    and clear; 'roof chamber' is more wooden. The plural 'doors' is retained from
    the Hebrew.
- source_word: הַמַּפְתֵּחַ
  chosen: the key
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: וַיִּפְתָּחוּ
  chosen: opened them
  alternatives:
  - opened the doors
  lexicon: HALOT
  rationale: The object is implied from the previous phrase ('the doors'). 'Opened
    them' avoids unnecessary repetition while remaining clear.
- source_word: אֲדֹנֵיהֶם
  chosen: their master
  alternatives:
  - their lord
  lexicon: HALOT
  rationale: Here the term refers to Eglon as the servants' human superior, not to
    the divine title 'Lord.' 'Master' communicates social hierarchy without creating
    confusion with divine usage.
- source_word: נֹפֵל אַרְצָה
  chosen: had fallen to the floor
  alternatives:
  - was lying fallen on the ground
  - had fallen to the ground
  lexicon: HALOT
  rationale: The participle plus directional phrase depicts the discovered state of
    the body. 'Had fallen' reads naturally in English as a resultant state discovered
    upon opening the doors. 'To the floor' fits an indoor upper-room setting better
    than 'to the ground.'
- source_word: מֵת
  chosen: dead
  alternatives:
  - having died
  lexicon: HALOT
  rationale: Predicate adjective describing Eglon's condition when found. 'Dead' is
    the natural English rendering.
