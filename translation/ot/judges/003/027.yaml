id: JDG.3.27
reference: Judges 3:27
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/בוֹא֔/וֹ וַ/יִּתְקַ֥ע בַּ/שּׁוֹפָ֖ר בְּ/הַ֣ר אֶפְרָ֑יִם וַ/יֵּרְד֨וּ עִמּ֧/וֹ בְנֵֽי יִשְׂרָאֵ֛ל מִן הָ/הָ֖ר וְ/ה֥וּא לִ/פְנֵי/הֶֽם־־׃
translation:
  text: And when he arrived, he blew the trumpet in the hill country of Ephraim, and the sons of Israel went down with him from the hills, and he was before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites went down with him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the hill country'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי בְּבוֹאוֹ
  chosen: And when he arrived
  alternatives:
  - And it happened, when he came
  - And when he came
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol + infinitive construct with prefixed ב marks a temporal transition. Rendering idiomatically as 'And when he arrived' preserves the sequence without woodenly reproducing 'and it happened.' 'Arrived' fits the narrative context of Ehud's return.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  chosen: he blew the trumpet
  alternatives:
  - he sounded the ram's horn
  - he blew the horn
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn/trumpet signal instrument, often a ram's horn. 'Trumpet' is natural modern English and communicates the military signal clearly; the more specific 'ram's horn' is possible but less idiomatic here.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in Mount Ephraim
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר in this geographical expression commonly denotes the hill country/highlands rather than a single peak. 'Hill country of Ephraim' best reflects the regional sense in readable English.
- source_word: וַיֵּרְדוּ עִמּוֹ בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel went down with him
  alternatives:
  - the Israelites went down with him
  - the children of Israel went down with him
  lexicon: HALOT
  rationale: בְנֵי יִשְׂרָאֵל is formally 'sons of Israel.' In this narrative it denotes the Israelite fighting force/people. Because the project prefers gender-accurate renderings matching source intent, 'sons of Israel' is retained in the main text; a more idiomatic alternative is preserved in a footnote.
- source_word: מִן הָהָר
  chosen: from the hill country
  alternatives:
  - from the mountain
  - from the hills
  lexicon: HALOT
  rationale: With the article and in parallel with הַר אֶפְרָיִם, the phrase refers back to the same upland region. 'From the hill country' preserves the geographic sense better than singular 'mountain.'
- source_word: וְהוּא לִפְנֵיהֶם
  chosen: and he was before them
  alternatives:
  - and he led them
  - and he went before them
  lexicon: HALOT
  rationale: The Hebrew states literally that he was 'before them,' indicating position and leadership. 'He was before them' stays close to the text while allowing the leadership implication to remain implicit rather than over-interpreting as 'led them.'
