  rationale: While translating 'מִן הָהָר' as 'from the hill country' is consistent with the rendering of 'בְּהַר אֶפְרָיִם', the immediate repetition of the phrase ('...in the hill country of Ephraim, and the sons of Israel went down with him from the hill country...') is slightly wooden in English. Using a variation like 'from the hills' would avoid the awkward repetition while maintaining the correct geographical sense.
