  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the doctrine's gender-accurate principle, the masculine plural is preserved where it reflects the source form and likely refers to the male Israelite force in context. Because English readers may also understand the phrase corporately, a more idiomatic alternative is preserved in a footnote rather than replacing the source-shaped wording.
