id: JDG.3.14
reference: Judges 3:14
source:
  edition: WLC
  text: וַ/יַּעַבְד֤וּ בְנֵֽי יִשְׂרָאֵל֙ אֶת עֶגְל֣וֹן מֶֽלֶךְ מוֹאָ֔ב שְׁמוֹנֶ֥ה
    עֶשְׂרֵ֖ה שָׁנָֽה־־־׃ס
translation:
  text: And the sons of Israel served Eglon king of Moab for eighteen years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the Israelites were subject to Eglon king of Moab
      for eighteen years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - were subject to
  - labored for
  lexicon: HALOT
  rationale: The verb עבד in this context denotes political subjection or servitude
    to a foreign ruler, not worship. 'Served' preserves the Hebrew wording while remaining
    natural in English; 'were subject to' is interpretive and therefore left as an
    alternative.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally close rendering is appropriate here. 'The sons of Israel'
    reflects the Hebrew idiom directly and preserves the gendered collective form,
    in keeping with the project's gender-accurate policy. 'The Israelites' is idiomatic
    but less transparent to the source wording.
- source_word: אֶת עֶגְלוֹן
  chosen: Eglon
  lexicon: HALOT
  rationale: אֶת marks the definite direct object; in English it is not translated
    separately. The personal name is transliterated as 'Eglon' per the translation
    philosophy for names.
- source_word: מֶלֶךְ מוֹאָב
  chosen: king of Moab
  alternatives:
  - the king of Moab
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'king of Moab.' The article
    is not required in English apposition after the proper name ('Eglon king of Moab'),
    which closely mirrors the Hebrew structure.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: for eighteen years
  alternatives:
  - eighteen years
  lexicon: HALOT
  rationale: The Hebrew accusative of duration is best expressed idiomatically in
    English with 'for eighteen years.' This makes the temporal force explicit without
    adding meaning.
