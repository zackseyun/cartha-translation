theological_decisions:
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew expression is grammatically masculine plural and functions
    as the covenant people designation. Per the translation philosophy, gender-accurate
    rendering is preferred over flattening to a neutral term unless context demands
    otherwise. A more idiomatic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of 'knowing war'
  chosen_reading: had not known it
  alternative_readings:
  - had not experienced it
  - had not learned war
  rationale: 'The Hebrew uses the common verb ''know,'' and the translation preserves
    that wording rather than resolving it into the more interpretive ''experience''
    or ''learn.'' This keeps the text''s semantic breadth: both acquaintance with
    and experience of war may be in view.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
