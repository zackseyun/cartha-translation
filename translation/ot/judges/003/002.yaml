id: JDG.3.2
reference: Judges 3:2
source:
  edition: WLC
  text: רַ֗ק לְמַ֨עַן֙ דַּ֚עַת דֹּר֣וֹת בְּנֵֽי יִשְׂרָאֵ֔ל לְ/לַמְּדָ֖/ם מִלְחָמָ֑ה
    רַ֥ק אֲשֶׁר לְ/פָנִ֖ים לֹ֥א יְדָעֽוּ/ם־־׃
translation:
  text: only so that the generations of the sons of Israel might know—to teach them
    war—only those who formerly had not known it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had not experienced war before.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַק
  chosen: only
  alternatives:
  - just
  - except
  lexicon: HALOT
  rationale: 'The particle restricts the purpose clause: the nations were left ''only''
    for this purpose. Repeated again later in the verse, so the repetition is preserved
    rather than smoothed away.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - for the sake of
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: דַּעַת
  chosen: might know
  alternatives:
  - might learn
  - for knowing
  lexicon: HALOT
  rationale: With לְמַעַן, the infinitive construct expresses purpose/result. 'Might
    know' keeps the connection to ידע and fits the clause idiomatically.
- source_word: דֹּרוֹת
  chosen: the generations of
  alternatives:
  - the generations among
  - future generations of
  lexicon: HALOT
  rationale: Plural noun meaning 'generations.' The construct relation with 'sons
    of Israel' is best represented directly. 'Future' is implied by context but not
    explicit, so not added to the main text.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A standard ethnonym, but the Hebrew is literally 'sons of Israel.' In
    keeping with the gender-accurate principle, the more literal form is retained
    here; it refers corporately to Israel, not exclusively to males.
- source_word: לְלַמְּדָם
  chosen: to teach them
  alternatives:
  - to train them
  - to instruct them
  lexicon: HALOT
  rationale: Piel of למד with 3mp suffix means 'to teach them.' 'Train' would foreground
    military preparation, but the verb itself is broader; the object 'war' supplies
    the military sense.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - warfare
  - battle
  lexicon: HALOT
  rationale: The singular abstract noun is best rendered 'war.' 'Warfare' is possible,
    but 'war' is simpler and sufficiently broad.
- source_word: אֲשֶׁר לְפָנִים
  chosen: who formerly
  alternatives:
  - who before
  - who previously
  lexicon: HALOT
  rationale: This combination points to prior time. 'Formerly' gives smooth English
    while preserving the temporal contrast with the present generations.
- source_word: לֹא יְדָעוּם
  chosen: had not known it
  alternatives:
  - had not experienced them
  - did not know them
  lexicon: HALOT
  rationale: The verb is ידע with 3mp object suffix referring back to 'war' in a collective/abstract
    sense. English idiom prefers singular 'it' for the abstract noun 'war.' 'Experienced'
    is interpretive and therefore left as an alternative, not the main rendering.
