id: JDG.3.30
reference: Judges 3:30
source:
  edition: WLC
  text: וַ/תִּכָּנַ֤ע מוֹאָב֙ בַּ/יּ֣וֹם הַ/ה֔וּא תַּ֖חַת יַ֣ד יִשְׂרָאֵ֑ל וַ/תִּשְׁקֹ֥ט
    הָ/אָ֖רֶץ שְׁמוֹנִ֥ים שָׁנָֽה׃ס
translation:
  text: So Moab was subdued under the hand of Israel that day, and the land had rest
    for eighty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on that day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under the hand of Israel,' an idiom for being brought under Israel's
      power.
    reason: cultural_note
  - marker: c
    text: Or 'was quiet' or 'was at peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכָּנַע
  chosen: was subdued
  alternatives:
  - was humbled
  - was brought into subjection
  lexicon: HALOT
  rationale: The Niphal of כנע here is passive/resultative, indicating Moab was brought
    low or subjugated. 'Was subdued' is idiomatic English that preserves the military-political
    sense without over-paraphrasing.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the nation name.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A common temporal expression. 'That day' is natural English and preserves
    the demonstrative force.
- source_word: תַּחַת יַד יִשְׂרָאֵל
  chosen: under the hand of Israel
  alternatives:
  - under Israel
  - under the power of Israel
  lexicon: HALOT
  rationale: The idiom תַּחַת יַד literally means being under someone's hand, often
    denoting control or domination. Retaining 'under the hand of' preserves the Hebrew
    imagery while remaining understandable in English.
- source_word: וַתִּשְׁקֹט
  chosen: had rest
  alternatives:
  - was quiet
  - was at peace
  lexicon: HALOT
  rationale: From שקט, denoting quietness or freedom from disturbance. In Judges this
    commonly refers to cessation of conflict; 'had rest' is the most idiomatic and
    contextually fitting rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Judges, 'the land' commonly refers to the land of Israel/the region
    as a whole in a covenant-historical sense. 'Land' is more textually grounded than
    the broader interpretive 'country.'
- source_word: שְׁמוֹנִים שָׁנָה
  chosen: for eighty years
  alternatives:
  - eighty years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with duration. This accurately
    conveys the temporal span.
