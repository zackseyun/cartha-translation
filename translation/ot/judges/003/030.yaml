theological_decisions:
- issue: Nature of Israel's dominance over Moab
  chosen_reading: military-political subjugation expressed in conventional biblical
    idiom
  alternative_readings:
  - purely metaphorical humbling
  - total annihilation
  rationale: The verse reports Moab's subjugation and the resulting rest in the land.
    The wording should not be intensified into extermination nor weakened into merely
    emotional humiliation.
