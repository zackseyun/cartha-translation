id: JDG.3.18
reference: Judges 3:18
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כַּ/אֲשֶׁ֣ר כִּלָּ֔ה לְ/הַקְרִ֖יב אֶת הַ/מִּנְחָ֑ה וַ/יְשַׁלַּח֙
    אֶת הָ/עָ֔ם נֹשְׂאֵ֖י הַ/מִּנְחָֽה־־׃
translation:
  text: And when he had finished presenting the tribute, he sent away the people who
    were carrying the tribute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gift' or 'the offering.' Here the Hebrew term likely refers to tribute
      presented to a ruler rather than a sacrificial offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. In readable modern
    English, 'And when' preserves the temporal transition without the wooden 'and
    it happened.'
- source_word: כִּלָּה
  chosen: he had finished
  alternatives:
  - he finished
  - he completed
  lexicon: HALOT
  rationale: The verb means to complete or finish. The English pluperfect fits the
    sequence with the following action and reflects that the presentation was completed
    before he sent the people away.
- source_word: לְהַקְרִיב
  chosen: presenting
  alternatives:
  - offering
  - bringing near
  lexicon: HALOT
  rationale: The Hiphil of קרב here means to bring/present an offering or gift. 'Presenting'
    fits the political context of delivering a gift to a ruler better than the more
    cultic-sounding 'offering.'
- source_word: הַמִּנְחָה
  chosen: the tribute
  alternatives:
  - the gift
  - the offering
  lexicon: HALOT
  rationale: In this context, Ehud is delivering a political payment to Eglon, not
    a sacrificial offering. 'Tribute' best captures the sense of a gift imposed by
    subjection, while remaining natural English. The repeated use is kept consistent
    within the verse.
- source_word: וַיְשַׁלַּח
  chosen: he sent away
  alternatives:
  - he dismissed
  - he sent off
  lexicon: HALOT
  rationale: The verb means to send away or dismiss. 'Sent away' is straightforward
    and preserves the motion implied in the Hebrew.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the men
  - the party
  lexicon: HALOT
  rationale: The noun is the common term 'people.' In context it refers to those accompanying
    the tribute, but the Hebrew does not specify 'men' here, so 'the people' is the
    more textually precise rendering.
- source_word: נֹשְׂאֵי הַמִּנְחָה
  chosen: who were carrying the tribute
  alternatives:
  - the bearers of the tribute
  - carrying the gift
  lexicon: HALOT
  rationale: The participial construction identifies the people by their role. 'Who
    were carrying the tribute' renders the participle naturally in English while preserving
    its descriptive force.
