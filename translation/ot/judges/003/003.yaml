id: JDG.3.3
reference: Judges 3:3
source:
  edition: WLC
  text: חֲמֵ֣שֶׁת סַרְנֵ֣י פְלִשְׁתִּ֗ים וְ/כָל הַֽ/כְּנַעֲנִי֙ וְ/הַ/צִּ֣ידֹנִ֔י
    וְ/הַ֣/חִוִּ֔י יֹשֵׁ֖ב הַ֣ר הַ/לְּבָנ֑וֹן מֵ/הַר֙ בַּ֣עַל חֶרְמ֔וֹן עַ֖ד לְב֥וֹא
    חֲמָֽת׀־׃
translation:
  text: the five rulers of the Philistines, and all the Canaanites, and the Sidonians,
    and the Hivites who lived in the hill country of Lebanon, from Mount Baal-hermon
    as far as Lebo-hamath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as far as the entrance of Hamath.' The Hebrew expression can be understood
      either as a place name, Lebo-hamath, or descriptively.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲמֵשֶׁת
  chosen: the five
  alternatives:
  - five
  lexicon: HALOT
  rationale: 'Construct form with the following noun phrase; English naturally supplies
    the article in this list context: ''the five rulers of the Philistines.'''
- source_word: סַרְנֵי
  chosen: rulers
  alternatives:
  - lords
  - princes
  - satraps
  lexicon: HALOT
  rationale: The term refers specifically to the Philistine political leaders. 'Rulers'
    is clear modern English and avoids the potentially misleading feudal nuance of
    'lords' and the historically inaccurate Persian association of 'satraps.'
- source_word: פְלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people group.
- source_word: כָל הַכְּנַעֲנִי
  chosen: all the Canaanites
  alternatives:
  - all Canaan
  lexicon: HALOT
  rationale: Though morphologically singular, the ethnic singular functions collectively
    here; English plural best conveys the people group.
- source_word: הַצִּידֹנִי
  chosen: the Sidonians
  alternatives:
  - the Sidonian people
  - those of Sidon
  lexicon: HALOT
  rationale: Collective ethnic singular rendered as an English plural ethnonym for
    naturalness and clarity.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite people
  lexicon: HALOT
  rationale: Collective ethnic singular rendered as plural in English, matching normal
    usage for people groups.
- source_word: יֹשֵׁב
  chosen: who lived
  alternatives:
  - dwelling
  - who dwelt
  lexicon: HALOT
  rationale: Participle describing the Hivites; relative clause in past narrative
    English is the most natural rendering.
- source_word: הַר הַלְּבָנוֹן
  chosen: the hill country of Lebanon
  alternatives:
  - Mount Lebanon
  - the mountains of Lebanon
  lexicon: HALOT
  rationale: Though literally 'mountain of Lebanon,' the phrase denotes the mountainous
    region. 'Hill country of Lebanon' communicates the geographic sense in readable
    English without implying a single peak.
- source_word: מֵהַר בַּעַל חֶרְמוֹן
  chosen: from Mount Baal-hermon
  alternatives:
  - from Mount Baal Hermon
  lexicon: HALOT
  rationale: Proper place name; transliterated and hyphenated for readability in English.
- source_word: עַד לְבוֹא חֲמָת
  chosen: as far as Lebo-hamath
  alternatives:
  - as far as the entrance of Hamath
  - to Lebo-hamath
  lexicon: HALOT
  rationale: The expression is a known place designation in biblical geography. Rendering
    it as the proper name 'Lebo-hamath' preserves the toponym and avoids over-interpreting
    it as a mere descriptive phrase, while still reflecting the Hebrew form.
