id: JDG.3.21
reference: Judges 3:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אֵהוּד֙ אֶת יַ֣ד שְׂמֹאל֔/וֹ וַ/יִּקַּח֙ אֶת הַ/חֶ֔רֶב מֵ/עַ֖ל
    יֶ֣רֶךְ יְמִינ֑/וֹ וַ/יִּתְקָעֶ֖/הָ בְּ/בִטְנֽ/וֹ־־׃
translation:
  text: Then Ehud reached with his left hand, took the sword from his right thigh,
    and drove it into his belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thrust it into his abdomen.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sword'; context may suggest a short sword or dagger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: reached
  alternatives:
  - stretched out
  - sent forth
  lexicon: HALOT
  rationale: In this physical-action context, the verb means to extend or reach out
    the hand. 'Reached' is natural modern English and fits the immediate sequence
    of taking the sword.
- source_word: יַד שְׂמֹאלוֹ
  chosen: his left hand
  alternatives:
  - his left side
  - his left
  lexicon: HALOT
  rationale: The noun is explicitly 'hand,' not merely 'side.' Retaining 'left hand'
    preserves the narrative emphasis on Ehud's left-handed action.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - grasped
  lexicon: HALOT
  rationale: A straightforward rendering of לקח in narrative sequence; no stronger
    nuance is demanded by the context.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - the dagger
  lexicon: HALOT
  rationale: The Hebrew term is the common word for 'sword.' Although the weapon in
    context is short enough to be called a dagger in English, this verse itself uses
    the broader lexical item, so 'sword' best reflects the source while remaining
    intelligible.
- source_word: מֵעַל יֶרֶךְ יְמִינוֹ
  chosen: from his right thigh
  alternatives:
  - from upon his right thigh
  - from his right side
  lexicon: HALOT
  rationale: The phrase literally indicates removal from upon the right thigh. 'From
    his right thigh' is idiomatic English and preserves the concrete location where
    the weapon was strapped.
- source_word: וַיִּתְקָעֶהָ
  chosen: drove it into
  alternatives:
  - thrust it into
  - plunged it into
  lexicon: HALOT
  rationale: The verb conveys forceful thrusting or driving in. 'Drove it into' communicates
    the violent action clearly in modern English; the feminine suffix refers back
    to 'the sword.'
- source_word: בְּבִטְנוֹ
  chosen: his belly
  alternatives:
  - his abdomen
  - his stomach
  lexicon: HALOT
  rationale: The Hebrew denotes the belly/abdomen. 'Belly' is the most direct and
    vivid narrative equivalent; 'abdomen' is more clinical, and 'stomach' could be
    too anatomically narrow.
