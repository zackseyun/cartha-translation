theological_decisions:
- issue: Meaning of the testing language
  chosen_reading: The verse states that the remaining nations served as a means by which Israel was tested regarding covenant obedience.
  alternative_readings:
  - The testing is presented merely as historical observation without theological purpose
  rationale: The infinitives לְנַסּוֹת and לָדַעַת explicitly express purpose. The translation preserves this theological tension without expanding beyond the text into later doctrinal categories about temptation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
