id: JDG.3.4
reference: Judges 3:4
source:
  edition: WLC
  text: וַֽ/יִּהְי֕וּ לְ/נַסּ֥וֹת בָּ֖/ם אֶת יִשְׂרָאֵ֑ל לָ/דַ֗עַת הֲ/יִשְׁמְעוּ֙ אֶת מִצְוֺ֣ת יְהוָ֔ה אֲשֶׁר צִוָּ֥ה אֶת אֲבוֹתָ֖/ם בְּ/יַד מֹשֶֽׁה־־־־־׃
translation:
  text: And they were there to test Israel, to know whether they would listen to the commandments of Yahweh, which he commanded their fathers through Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to test Israel by them.' The Hebrew explicitly includes 'by/through them,' referring to the nations left in the land as the means of testing.
    reason: lexical_alternative
  - marker: b
    text: '''Listen to'' here carries the sense of heeding or obeying the LORD''s commandments.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their fathers'; that is, their forefathers or ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: And they were there
  alternatives:
  - And they were
  - And they remained
  lexicon: HALOT
  rationale: The waw-consecutive of היה here resumes the previous context about the nations left in the land. English supplies 'there' for natural sense, indicating continued presence rather than mere existence.
- source_word: לְנַסּוֹת
  chosen: to test
  alternatives:
  - to try
  - to prove
  lexicon: HALOT
  rationale: נסה in this context means to test or prove by trial. 'Test' is the clearest modern English rendering and fits the theological context without implying enticement to evil.
- source_word: בָּם
  chosen: through them
  alternatives:
  - by them
  - with them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers back to the remaining nations as the means by which Israel is tested. English idiom can express this instrumentally as 'through them'; however the main sentence structure conveys the same idea by 'they were there to test Israel.'
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to find out
  - to learn
  lexicon: HALOT
  rationale: 'ידע literally means ''to know.'' In context it expresses the purpose/result of the testing: to ascertain whether Israel would obey. ''To know'' preserves the Hebrew wording while remaining intelligible.'
- source_word: הֲיִשְׁמְעוּ
  chosen: they would listen to
  alternatives:
  - they would obey
  - they would hear
  lexicon: HALOT
  rationale: שׁמע with commandments can mean hear in the sense of heed/obey. 'Listen to' preserves the auditory metaphor of the Hebrew while naturally implying responsive obedience in context.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: מצוה is well rendered by 'commandment.' The plural here refers to the covenantal commands given by the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר צִוָּה
  chosen: which he commanded
  alternatives:
  - that he commanded
  lexicon: HALOT
  rationale: A straightforward relative clause preserving the Hebrew syntax and antecedent relationship to 'commandments.'
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural, referring to the forefathers of Israel. Per gender-accurate philosophy, 'fathers' is retained rather than neutralizing to 'ancestors' in the main text.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' commonly denotes agency or mediation. 'Through Moses' communicates the sense in clear modern English while preserving Moses' mediatorial role.
