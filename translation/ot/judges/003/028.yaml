id: JDG.3.28
reference: Judges 3:28
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ רִדְפ֣וּ אַחֲרַ֔/י כִּֽי נָתַ֨ן יְהוָ֧ה אֶת אֹיְבֵי/כֶ֛ם
    אֶת מוֹאָ֖ב בְּ/יֶדְ/כֶ֑ם וַ/יֵּרְד֣וּ אַחֲרָ֗י/ו וַֽ/יִּלְכְּד֞וּ אֶת מַעְבְּר֤וֹת
    הַ/יַּרְדֵּן֙ לְ/מוֹאָ֔ב וְ/לֹֽא נָתְנ֥וּ אִ֖ישׁ לַ/עֲבֹֽר־־־־־׃
translation:
  text: And he said to them, “Follow after me, for the LORD has given your enemies,
    Moab, into your hand.” So they went down after him and captured the fords of the
    Jordan leading to Moab, and they did not allow anyone to cross over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pursue after me.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “has given your enemies, Moab, into your hand,” with “Moab” in apposition
      to “your enemies.”
    reason: lexical_alternative
  - marker: c
    text: Or “the crossing places of the Jordan toward Moab.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רִדְפוּ אַחֲרַי
  chosen: Follow after me
  alternatives:
  - Pursue after me
  - Follow me
  lexicon: HALOT
  rationale: רדף commonly means 'pursue,' but in this military context addressed to
    allies joining Ehud's movement, idiomatic English 'follow after me' preserves
    both urgency and directional sense without sounding unnatural. 'Follow me' is
    possible but slightly weakens the pursuit nuance.
- source_word: נָתַן ... בְּיֶדְכֶם
  chosen: has given ... into your hand
  alternatives:
  - has delivered ... into your hand
  - has given ... into your power
  lexicon: HALOT
  rationale: The idiom נתן ביד means to hand over into someone's power. 'Has given
    ... into your hand' keeps the Hebrew imagery while remaining clear in English.
    Perfect aspect after כי is well rendered as a completed, confidence-giving action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated forms.
- source_word: אֹיְבֵיכֶם אֶת מוֹאָב
  chosen: your enemies, Moab
  alternatives:
  - Moab your enemies
  - the Moabites your enemies
  - your enemy Moab
  lexicon: HALOT
  rationale: The appositional structure identifies Moab as the enemy. 'Your enemies,
    Moab' preserves the Hebrew sequence and collective-national sense. 'The Moabites'
    is interpretive; the text names the nation.
- source_word: וַיֵּרְדוּ אַחֲרָיו
  chosen: they went down after him
  alternatives:
  - they went down following him
  - they descended after him
  lexicon: HALOT
  rationale: ירד is literally 'go down/descend.' Since movement from the hill country
    toward the Jordan valley is in view, 'went down after him' preserves the geographical
    realism better than a flattened 'followed him.'
- source_word: מַעְבְּרוֹת הַיַּרְדֵּן
  chosen: the fords of the Jordan
  alternatives:
  - the crossing places of the Jordan
  - the crossings of the Jordan
  lexicon: HALOT
  rationale: מעברות refers to places of crossing, especially shallow fords. 'Fords'
    is the most precise and natural military-geographical term in English.
- source_word: לְמוֹאָב
  chosen: leading to Moab
  alternatives:
  - toward Moab
  - for Moab
  lexicon: HALOT
  rationale: 'The preposition ל here marks direction/destination: the Jordan crossing
    points on the Moabite side or toward Moab. ''Leading to Moab'' communicates function
    in context more clearly than the more ambiguous ''for Moab.'''
- source_word: וְלֹא נָתְנוּ אִישׁ לַעֲבֹר
  chosen: they did not allow anyone to cross over
  alternatives:
  - they did not permit a man to pass over
  - they let no one cross
  lexicon: HALOT
  rationale: Literally, 'they did not give a man to cross.' This idiom means they
    allowed no person to pass. 'Anyone' conveys the distributive force of איש in idiomatic
    modern English while preserving the total prohibition.
