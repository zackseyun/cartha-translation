theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse invokes Israel's covenant God as the one granting victory.
    Following the project's stated policy, the Tetragrammaton is rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: National name מוֹאָב as collective entity
  chosen_reading: Moab
  alternative_readings:
  - the Moabites
  rationale: The Hebrew names the nation rather than explicitly using an ethnicon.
    Rendering it as 'Moab' preserves the collective-national personification common
    in biblical narrative without adding interpretation.
