theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the doctrinal translation
    policy and preserving continuity with Jewish reverence practice and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether מוֹשִׁיעַ should be rendered 'deliverer' or 'savior'
  chosen_reading: deliverer
  alternative_readings:
  - savior
  - rescuer
  rationale: In Judges the term refers to a human agent raised up by God to rescue
    Israel from oppressors. 'Deliverer' preserves the salvation vocabulary without
    inviting anachronistic confusion with the unique redemptive role of Christ.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: How to construe אֲחִי כָלֵב הַקָּטֹן מִמֶּנּוּ
  chosen_reading: Caleb’s younger brother
  alternative_readings:
  - the younger brother of Caleb
  - the brother of Caleb, younger than he
  rationale: The most straightforward reading is that Othniel is Caleb's brother and
    younger than Caleb. This is a syntactic/lexical decision rather than a doctrinal
    one, but it affects interpretation enough to document explicitly.
