id: JDG.3.9
reference: Judges 3:9
source:
  edition: WLC
  text: וַ/יִּזְעֲק֤וּ בְנֵֽי יִשְׂרָאֵל֙ אֶל יְהוָ֔ה וַ/יָּ֨קֶם יְהוָ֥ה מוֹשִׁ֛יעַ
    לִ/בְנֵ֥י יִשְׂרָאֵ֖ל וַ/יּֽוֹשִׁיעֵ֑/ם אֵ֚ת עָתְנִיאֵ֣ל בֶּן קְנַ֔ז אֲחִ֥י כָלֵ֖ב
    הַ/קָּטֹ֥ן מִמֶּֽ/נּוּ־־־׃
translation:
  text: 'Then the sons of Israel cried out to the LORD, and the LORD raised up a deliverer
    for the sons of Israel, and he delivered them: Othniel son of Kenaz, Caleb’s younger
    brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Deliverer'' could also be rendered ''savior'' or ''rescuer''; the Hebrew
      refers here to a human agent raised up by God to rescue Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the younger brother of Caleb.' The Hebrew phrase identifies Othniel
      in relation to Caleb and indicates that he was younger than Caleb.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried for help
  lexicon: HALOT
  rationale: זעק in this context conveys an urgent cry for help directed to God, not
    merely speaking or praying. 'Cried out' is natural English and preserves the distress
    implied by the verb.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the familial expression is preserved rather than neutralized to 'Israelites,'
    while remaining idiomatic enough in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: וַיָּקֶם
  chosen: raised up
  alternatives:
  - appointed
  - caused to arise
  lexicon: HALOT
  rationale: קום in the hiphil here means to cause someone to arise or stand up for
    a role. 'Raised up' is the standard and contextually precise idiom for God bringing
    forth a leader.
- source_word: מוֹשִׁיעַ
  chosen: deliverer
  alternatives:
  - savior
  - rescuer
  lexicon: HALOT
  rationale: The participle from ישׁע denotes one who brings rescue. 'Deliverer' fits
    the Judges context well and avoids importing later christological overtones that
    'savior' may carry in English, while still reflecting the rescue theme.
- source_word: וַיּוֹשִׁיעֵם
  chosen: he delivered them
  alternatives:
  - he saved them
  - he gave them victory
  lexicon: HALOT
  rationale: The verb ישׁע here refers to concrete rescue from oppression. 'Delivered
    them' matches the military-political setting and coheres with 'deliverer' for
    מוֹשִׁיעַ.
- source_word: אֵת עָתְנִיאֵל בֶּן קְנַז
  chosen: Othniel son of Kenaz
  alternatives:
  - Othniel, the son of Kenaz
  lexicon: HALOT
  rationale: Personal names are transliterated. The appositional naming after the
    rescue clause identifies the deliverer.
- source_word: אֲחִי כָלֵב הַקָּטֹן מִמֶּנּוּ
  chosen: Caleb’s younger brother
  alternatives:
  - the younger brother of Caleb
  - the brother of Caleb, younger than he
  - Caleb’s youngest brother
  lexicon: HALOT
  rationale: The phrase most naturally identifies Othniel as Caleb's brother who was
    younger than Caleb. 'Younger brother' is idiomatic English. 'Youngest brother'
    would overstate the comparative. The Hebrew construction has been debated, but
    this rendering best fits the syntax and common understanding.
