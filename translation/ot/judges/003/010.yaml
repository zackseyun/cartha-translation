id: JDG.3.10
reference: Judges 3:10
source:
  edition: WLC
  text: וַ/תְּהִ֨י עָלָ֥י/ו רֽוּחַ יְהוָה֮ וַ/יִּשְׁפֹּ֣ט אֶת יִשְׂרָאֵל֒ וַ/יֵּצֵא֙ לַ/מִּלְחָמָ֔ה וַ/יִּתֵּ֤ן יְהוָה֙ בְּ/יָד֔/וֹ אֶת כּוּשַׁ֥ן רִשְׁעָתַ֖יִם מֶ֣לֶךְ אֲרָ֑ם וַ/תָּ֣עָז יָד֔/וֹ עַ֖ל כּוּשַׁ֥ן רִשְׁעָתָֽיִם־־־׃
translation:
  text: The Spirit of Yahweh came upon him, and he judged Israel. He went out to battle, and Yahweh gave Cushan-rishathaim king of Aram into his hand, and his hand prevailed over Cushan-rishathaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the LORD was upon him.' The Hebrew idiom can be rendered more statically, though the narrative context favors 'came upon him.'
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew name often rendered 'Syria' in older English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַ/תְּהִ֨י עָלָ֥י/ו רֽוּחַ יְהוָה
  chosen: The Spirit of the LORD came upon him
  alternatives:
  - The Spirit of the LORD was upon him
  - the רוח of the LORD came upon him
  lexicon: HALOT
  rationale: The idiom היה על + person with רוּחַ conveys the Spirit's coming upon or resting on someone for empowerment. 'Came upon him' is natural English and fits the narrative onset of divine enablement better than the more static 'was upon him.' 'Spirit' is capitalized because the construct phrase refers to God's Spirit.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַ/יִּשְׁפֹּט אֶת יִשְׂרָאֵל
  chosen: he judged Israel
  alternatives:
  - he governed Israel
  - he led Israel as judge
  lexicon: HALOT
  rationale: שׁפט in Judges often includes governing/delivering functions, but the direct lexical sense is 'judge.' Retaining 'judged' preserves the book's terminology and allows the broader role to be inferred from context.
- source_word: וַ/יֵּצֵא לַ/מִּלְחָמָה
  chosen: He went out to battle
  alternatives:
  - he went out to war
  - he went out for battle
  lexicon: HALOT
  rationale: The phrase is a standard military idiom. 'Went out to battle' is idiomatic modern English and slightly more concrete in this immediate narrative setting than 'went out to war.'
- source_word: וַ/יִּתֵּן יְהוָה בְּ/יָד/וֹ
  chosen: the LORD gave ... into his hand
  alternatives:
  - the LORD delivered ... into his hand
  - the LORD gave ... into his power
  lexicon: HALOT
  rationale: נתן ביד is a common idiom for giving an enemy into someone's power. 'Into his hand' preserves the Hebrew imagery while remaining understandable in English.
- source_word: כּוּשַׁן רִשְׁעָתַיִם
  chosen: Cushan-rishathaim
  alternatives:
  - Cushan Rishathaim
  lexicon: HALOT
  rationale: This is a proper name/title and is transliterated rather than translated, in keeping with the philosophy of transliterating personal names. Hyphenation helps English readers recognize the compound form.
- source_word: מֶ֣לֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: אֲרָם is the Hebrew place-name Aram. 'Aram' is preferred over the traditional but interpretive 'Syria' because it more directly reflects the source text.
- source_word: וַ/תָּ֣עָז יָד/וֹ עַל
  chosen: his hand prevailed over
  alternatives:
  - his power was strong against
  - his hand was strong over
  - he overpowered
  lexicon: HALOT
  rationale: The idiom עזז יד על expresses strength or dominance over an opponent. 'His hand prevailed over' preserves the Hebrew metaphor while communicating the result clearly.
