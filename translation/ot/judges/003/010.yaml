theological_decisions:
- issue: Rendering of the divine Spirit phrase
  chosen_reading: The Spirit of the LORD came upon him
  alternative_readings:
  - the Spirit of Yahweh came upon him
  - the רוח of Yahweh was upon him
  rationale: The verse depicts divine empowerment for Othniel's judging and military action. The translation preserves this without importing later doctrinal elaboration beyond the text itself.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD; preserve theological tension rather than resolve it'
- issue: Geographical designation אֲרָם
  chosen_reading: Aram
  alternative_readings:
  - Syria
  rationale: Using 'Aram' avoids anachronistic or tradition-driven substitution and adheres to original-language primacy.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
