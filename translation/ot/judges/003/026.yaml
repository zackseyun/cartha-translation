id: JDG.3.26
reference: Judges 3:26
source:
  edition: WLC
  text: וְ/אֵה֥וּד נִמְלַ֖ט עַ֣ד הִֽתְמַהְמְהָ֑/ם וְ/הוּא֙ עָבַ֣ר אֶת הַ/פְּסִילִ֔ים
    וַ/יִּמָּלֵ֖ט הַ/שְּׂעִירָֽתָ/ה־׃
translation:
  text: But Ehud escaped while they delayed, and he passed beyond the carved images
    and escaped to Seirah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the idols' or 'the graven images' for 'the carved images.'
    reason: lexical_alternative
  - marker: b
    text: Seirah may also be rendered 'Seirath' in English transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: נִמְלַט / וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - slipped away
  - fled
  - was delivered
  lexicon: HALOT
  rationale: The Niphal of מלט here denotes successful escape from danger. 'Escaped'
    is natural modern English and preserves the repeated verb in the verse, showing
    both the initial getaway and the completed arrival at safety.
- source_word: עַד הִתְמַהְמְהָם
  chosen: while they delayed
  alternatives:
  - while they lingered
  - until they hesitated
  - while they tarried
  lexicon: HALOT
  rationale: The construction marks the time during which Ehud escaped. The Hitpael
    of מהה conveys delay or lingering. 'While they delayed' is idiomatic and fits
    the narrative context of Eglon's servants hesitating outside.
- source_word: עָבַר אֶת הַפְּסִילִים
  chosen: passed beyond the carved images
  alternatives:
  - passed by the idols
  - went past the carved stones
  - passed the graven images
  lexicon: HALOT
  rationale: פסילים literally refers to carved images/idols. 'Carved images' preserves
    the lexical sense without importing more than the text states. 'Passed beyond'
    reflects עבר with the direct object in a travel context, suggesting movement past
    a known landmark.
- source_word: הַפְּסִילִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: Although these were likely cultic objects and thus 'idols,' the more
    literal 'carved images' better reflects the noun's form and leaves the exact referent
    transparent. This also matches the repeated landmark from the surrounding context.
- source_word: הַשְּׂעִירָתָה
  chosen: Seirah
  alternatives:
  - Seirath
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    in keeping with the project's philosophy. 'Seirah' is a standard readable transliteration;
    'Seirath' is preserved as an alternative traditional form.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction marks narrative contrast with the preceding scene of
    the servants waiting. 'But' brings out that contrast more clearly than a simple
    'and' in English.
