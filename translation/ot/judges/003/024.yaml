id: JDG.3.24
reference: Judges 3:24
source:
  edition: WLC
  text: וְ/ה֤וּא יָצָא֙ וַ/עֲבָדָ֣י/ו בָּ֔אוּ וַ/יִּרְא֕וּ וְ/הִנֵּ֛ה דַּלְת֥וֹת הָ/עֲלִיָּ֖ה
    נְעֻל֑וֹת וַ/יֹּ֣אמְר֔וּ אַ֣ךְ מֵסִ֥יךְ ה֛וּא אֶת רַגְלָ֖י/ו בַּ/חֲדַ֥ר הַ/מְּקֵרָֽה־׃
translation:
  text: When he had gone out, his servants came and looked, and behold, the doors
    of the upper room were locked. So they said, “Surely he is relieving himself in
    the cool inner room.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “covering his feet,” a Hebrew euphemism for relieving oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא יָצָא
  chosen: When he had gone out
  alternatives:
  - And he went out
  - Now he had gone out
  lexicon: HALOT
  rationale: The clause refers back to Ehud's departure and sets the scene for the
    servants' arrival. Rendering with 'When' makes the temporal relationship natural
    in English while preserving the Hebrew sequence.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his slaves
  lexicon: HALOT
  rationale: In this royal-household context, 'servants' is the most natural English
    rendering for attendants of the king. 'Slaves' is possible lexically but the bonded
    status is not the focus here.
- source_word: וַיִּרְאוּ
  chosen: came and looked
  alternatives:
  - saw
  - looked
  lexicon: HALOT
  rationale: The Hebrew verb is 'saw,' but in context it introduces their inspection
    upon arriving. 'Came and looked' captures the narrative action idiomatically without
    straying from the sense.
- source_word: דַּלְתוֹת הָעֲלִיָּה
  chosen: the doors of the upper room
  alternatives:
  - the doors of the roof chamber
  - the doors of the upstairs room
  lexicon: HALOT
  rationale: עֲלִיָּה denotes an upper chamber/upper room. 'Upper room' is clear modern
    English and fits the architectural setting.
- source_word: נְעֻלוֹת
  chosen: were locked
  alternatives:
  - were bolted
  - were shut
  lexicon: HALOT
  rationale: The participle from נעל indicates being locked/bolted. 'Locked' is the
    clearest contemporary rendering.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Certainly
  lexicon: HALOT
  rationale: Here the particle introduces the servants' inference. 'Surely' best conveys
    their assumption.
- source_word: מֵסִיךְ ... אֶת רַגְלָיו
  chosen: he is relieving himself
  alternatives:
  - he is covering his feet
  - he is easing himself
  lexicon: HALOT
  rationale: This Hebrew idiom literally reads 'covering his feet' and refers euphemistically
    to defecation or bodily relief. The idiomatic sense should be translated in the
    main text for clarity, while the literal expression is worth preserving in a footnote.
- source_word: חֲדַר הַמְּקֵרָה
  chosen: the cool inner room
  alternatives:
  - the cool chamber
  - the room of cooling
  - the upper room's cool chamber
  lexicon: HALOT
  rationale: The phrase denotes a private chamber associated with coolness, likely
    a ventilated inner room. 'Cool inner room' is readable and preserves the functional
    sense of the Hebrew.
