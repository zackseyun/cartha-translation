id: JDG.3.16
reference: Judges 3:16
source:
  edition: WLC
  text: וַ/יַּעַשׂ֩ ל֨/וֹ אֵה֜וּד חֶ֗רֶב וְ/לָ֛/הּ שְׁנֵ֥י פֵי֖וֹת גֹּ֣מֶד אָרְכָּ֑/הּ
    וַ/יַּחְגֹּ֤ר אוֹתָ/הּ֙ מִ/תַּ֣חַת לְ/מַדָּ֔י/ו עַ֖ל יֶ֥רֶךְ יְמִינֽ/וֹ׃
translation:
  text: Ehud made himself a sword with two edges, a cubit in length, and strapped
    it on under his clothes on his right thigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew measure gomed is rare and its exact length is uncertain; it is
      commonly understood as roughly a cubit or forearm-length measure.
    reason: cultural_note
  - marker: b
    text: Or 'a double-edged sword.' Literally, 'a sword, and for it two edges.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לּוֹ
  chosen: made himself
  alternatives:
  - made for himself
  - made
  lexicon: HALOT
  rationale: The verb עשה with לּוֹ indicates that Ehud made the weapon for his own
    use. 'Made himself' is idiomatic English and preserves the reflexive sense without
    overtranslating.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - dagger
  lexicon: HALOT
  rationale: חֶרֶב is the standard term for 'sword.' Although the short length in
    context could suggest a dagger-like weapon, the Hebrew noun itself is broader,
    so 'sword' best preserves the source wording while the description clarifies its
    size.
- source_word: וְלָהּ שְׁנֵי פֵיוֹת
  chosen: with two edges
  alternatives:
  - double-edged
  - with two mouths/edges
  lexicon: HALOT
  rationale: The idiom literally refers to 'two mouths,' a Hebrew expression for a
    double-edged blade. 'With two edges' is clear modern English and closely reflects
    the Hebrew image.
- source_word: גֹּמֶד אָרְכָּהּ
  chosen: a cubit in length
  alternatives:
  - a gomed in length
  - about a cubit long
  lexicon: HALOT
  rationale: גֹּמֶד is a rare measure. Many English versions render it approximately
    as 'cubit,' likely indicating a short forearm-length measure. Because the exact
    value is uncertain, 'a cubit in length' gives a familiar approximation while remaining
    concise; the uncertainty is preserved in a footnote.
- source_word: וַיַּחְגֹּר אוֹתָהּ
  chosen: strapped it on
  alternatives:
  - girded it on
  - fastened it on
  lexicon: HALOT
  rationale: חגר means to gird or strap on. 'Strapped it on' is natural modern English
    and fits the action of securing a weapon to the body.
- source_word: מִתַּחַת לְמַדָּיו
  chosen: under his clothes
  alternatives:
  - under his garment
  - beneath his robe
  lexicon: HALOT
  rationale: The noun מַד can refer to clothing or a garment. The plural with suffix
    here is best rendered generically as 'his clothes,' which is natural and does
    not over-specify the type of garment.
- source_word: עַל יֶרֶךְ יְמִינוֹ
  chosen: on his right thigh
  alternatives:
  - at his right thigh
  - on his right side
  lexicon: HALOT
  rationale: יָרֵךְ is 'thigh' or hip area. 'On his right thigh' is the most direct
    rendering and matches the physical placement of the weapon.
