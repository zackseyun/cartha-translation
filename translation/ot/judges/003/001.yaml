id: JDG.3.1
reference: Judges 3:1
source:
  edition: WLC
  text: וְ/אֵ֤לֶּה הַ/גּוֹיִם֙ אֲשֶׁ֣ר הִנִּ֣יחַ יְהוָ֔ה לְ/נַסּ֥וֹת בָּ֖/ם אֶת יִשְׂרָאֵ֑ל אֵ֚ת כָּל אֲשֶׁ֣ר לֹֽא יָדְע֔וּ אֵ֖ת כָּל מִלְחֲמ֥וֹת כְּנָֽעַן־־־־׃
translation:
  text: 'Now these are the nations that Yahweh left to test Israel by them, that is, all who had not known any of the wars of Canaan:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not experienced any of the wars of Canaan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section while maintaining narrative continuity. 'Now these are' is natural modern English and preserves the discourse-shifting force better than a bare 'These are,' while avoiding overly wooden style.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to distinct surrounding ethnic-political groups left in the land. 'Nations' is the standard and most contextually fitting rendering in Judges.
- source_word: הִנִּיחַ
  chosen: left
  alternatives:
  - allowed to remain
  - let remain
  lexicon: HALOT
  rationale: The verb נוח/הניח in this causative form means to leave, set down, or allow to remain. 'Left' is concise and fits the context of remaining peoples after conquest; 'allowed to remain' is interpretive expansion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְנַסּוֹת
  chosen: to test
  alternatives:
  - to prove
  - to try
  lexicon: HALOT
  rationale: נסה commonly means to test or prove. 'To test' is clear modern English and preserves the sense without importing a specifically negative connotation such as 'tempt.'
- source_word: בָּם
  chosen: by them
  alternatives:
  - through them
  - with them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates the means by which Israel would be tested, namely by these nations. 'By them' is the most direct rendering; 'through them' is possible but slightly more interpretive.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object marker plus proper name; straightforwardly rendered as 'Israel.'
- source_word: אֵת כָּל אֲשֶׁר לֹא יָדְעוּ
  chosen: all those who had not known
  alternatives:
  - all who had not experienced
  - all who did not know
  lexicon: HALOT
  rationale: The phrase identifies the subset of Israel in view. 'Had not known' preserves the Hebrew idiom and the pluperfect-like sense in context. 'Experienced' captures the sense but moves further from the wording.
- source_word: יָדְעוּ
  chosen: had not known
  alternatives:
  - had not experienced
  lexicon: HALOT
  rationale: ידע can denote experiential knowledge. Here the object is 'all the wars of Canaan,' so the sense is not mere information but lack of firsthand acquaintance. The main text keeps 'known' for formal fidelity, with the experiential nuance preserved in a footnote.
- source_word: אֵת כָּל מִלְחֲמוֹת כְּנָעַן
  chosen: any of the wars of Canaan
  alternatives:
  - all the wars of Canaan
  - the warfare of Canaan
  lexicon: HALOT
  rationale: Literally 'all the wars of Canaan.' In idiomatic English under negation, 'had not known any of the wars of Canaan' best conveys the sense that they had experienced none of them. 'Wars of Canaan' is retained rather than paraphrasing to 'wars in Canaan' because the Hebrew genitive likely refers to the battles associated with the conquest of Canaan.
