id: JDG.3.23
reference: Judges 3:23
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א אֵה֖וּד הַֽ/מִּסְדְּר֑וֹנָ/ה וַ/יִּסְגֹּ֞ר דַּלְת֧וֹת הָ/עַלִיָּ֛ה
    בַּעֲד֖/וֹ וְ/נָעָֽל׃
translation:
  text: Then Ehud went out into the vestibule and shut the doors of the upper room
    behind him and locked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the porch,' 'into the antechamber,' or 'into the colonnade'; the
      Hebrew term is rare and refers to an adjoining architectural space.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, the standard narrative verb for exiting. 'Went
    out' fits the movement away from the upper room.
- source_word: הַמִּסְדְּרוֹנָה
  chosen: into the vestibule
  alternatives:
  - into the porch
  - into the antechamber
  - into the colonnade
  lexicon: HALOT
  rationale: מִסְדְּרוֹן is a rare architectural term. 'Vestibule' best captures an
    adjoining passage or lobby area without overcommitting to a specific structure.
    The directional he indicates motion into/toward this space.
- source_word: וַיִּסְגֹּר
  chosen: shut
  alternatives:
  - closed
  lexicon: HALOT
  rationale: סגר commonly means 'shut/close.' 'Shut' pairs naturally with doors in
    English narrative style.
- source_word: דַּלְתוֹת
  chosen: the doors
  alternatives:
  - the door leaves
  lexicon: HALOT
  rationale: Plural of דלת, referring to the double doors or door-panels. Standard
    English idiom is simply 'the doors.'
- source_word: הָעֲלִיָּה
  chosen: the upper room
  alternatives:
  - the roof chamber
  - the upstairs room
  lexicon: HALOT
  rationale: עֲלִיָּה denotes an upper chamber. 'Upper room' is clear, idiomatic,
    and preserves the architectural sense.
- source_word: בַּעֲדוֹ
  chosen: behind him
  alternatives:
  - after him
  - on his behalf
  lexicon: HALOT
  rationale: 'With verbs of shutting, בעד commonly indicates spatial relation: the
    doors were shut behind him as he exited.'
- source_word: וְנָעָל
  chosen: and locked them
  alternatives:
  - and bolted them
  lexicon: HALOT
  rationale: נעל in this context means to fasten/lock a door. 'Locked them' is the
    most natural modern English rendering; the plural object is implied from 'doors.'
