id: 2SA.13.26
reference: 2 Samuel 13:26
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְשָׁל֔וֹם וָ/לֹ֕א יֵֽלֶךְ נָ֥א אִתָּ֖/נוּ אַמְנ֣וֹן אָחִ֑/י
    וַ/יֹּ֤אמֶר ל/וֹ֙ הַ/מֶּ֔לֶךְ לָ֥/מָּה יֵלֵ֖ךְ עִמָּֽ/ךְ־׃
translation:
  text: Then Absalom said, “If not, please let Amnon my brother go with us.” But the
    king said to him, “Why should he go with you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'If you will not, please let Amnon my brother go with
      us.' The Hebrew is elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said / But ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English idiom is smoother
    with 'Then' for the first clause and 'But' for the second to reflect the shift
    to the king's response.
- source_word: וָלֹא
  chosen: If not
  alternatives:
  - and not
  - if no
  lexicon: HALOT
  rationale: In context this elliptical expression responds to the previous refusal
    and means 'if not' or 'if you will not.' 'If not' preserves the concise Hebrew
    while making the logic clear in English.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray you
  - now
  lexicon: HALOT
  rationale: Polite particle marking request. 'Please' is natural modern English and
    preserves the deferential tone.
- source_word: יֵלֶךְ
  chosen: let ... go / should he go
  alternatives:
  - may ... go
  - will ... go
  lexicon: HALOT
  rationale: The jussive in Absalom's request is best represented by 'let ... go.'
    In the king's reply, the imperfect in a rhetorical question is naturally rendered
    'should he go.'
- source_word: אִתָּנוּ
  chosen: with us
  alternatives:
  - along with us
  lexicon: HALOT
  rationale: Straightforward comitative preposition with first person plural suffix.
- source_word: אַמְנוֹן אָחִי
  chosen: Amnon my brother
  alternatives:
  - my brother Amnon
  lexicon: HALOT
  rationale: Both are possible in English. 'Amnon my brother' follows the Hebrew order
    more closely while remaining natural.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Simple interrogative; 'Why' is the most natural equivalent.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Second masculine singular suffix referring to Absalom. English does not
    mark the gender here.
