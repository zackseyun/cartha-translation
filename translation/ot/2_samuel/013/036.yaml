id: 2SA.13.36
reference: 2 Samuel 13:36
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלֹּת֣/וֹ לְ/דַבֵּ֗ר וְ/הִנֵּ֤ה בְנֵֽי הַ/מֶּ֨לֶךְ֙ בָּ֔אוּ
    וַ/יִּשְׂא֥וּ קוֹלָ֖/ם וַ/יִּבְכּ֑וּ וְ/גַם הַ/מֶּ֨לֶךְ֙ וְ/כָל עֲבָדָ֔י/ו בָּכ֕וּ
    בְּכִ֖י גָּד֥וֹל מְאֹֽד׀־־־׃
translation:
  text: And as soon as he finished speaking, behold, the king’s sons came, and they
    raised their voices and wept. The king also, and all his servants, wept with very
    great weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''wept with a very great weeping,'' an emphatic expression for
      intense mourning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלֹּתוֹ לְדַבֵּר
  chosen: And as soon as he finished speaking
  alternatives:
  - And it happened when he finished speaking
  - When he had finished speaking
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי + temporal clause is idiomatically
    rendered in English rather than woodenly. 'As soon as' captures the immediate
    sequence implied by the clause while remaining faithful to the temporal sense.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: This discourse marker draws attention to the unexpected arrival of the
    king's sons. 'Behold' preserves the vividness and narrative force better than
    flattening it away.
- source_word: בְנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the sons of the king
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'The king’s sons' is natural modern
    English and preserves the familial relationship central to the scene.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple past 'came' matches the common Hebrew verb of motion and fits
    the narrative flow.
- source_word: וַיִּשְׂאוּ קוֹלָם
  chosen: they raised their voices
  alternatives:
  - they lifted up their voice
  - they cried aloud
  lexicon: HALOT
  rationale: This Hebrew idiom commonly introduces loud lament. 'Raised their voices'
    preserves the imagery while sounding natural in English.
- source_word: וַיִּבְכּוּ
  chosen: and wept
  alternatives:
  - and cried
  lexicon: HALOT
  rationale: '''Wept'' is more precise than ''cried'' here because the context is
    mourning and lament, not merely vocal outcry.'
- source_word: וְגַם
  chosen: also
  alternatives:
  - and also
  - likewise
  lexicon: HALOT
  rationale: 'Marks addition: not only the sons but the king and his servants joined
    in the mourning.'
- source_word: וְכָל עֲבָדָיו
  chosen: and all his servants
  alternatives:
  - and all his attendants
  - and all his officials
  lexicon: HALOT
  rationale: עֶבֶד can denote servants or royal attendants. In this court setting
    'servants' is broad and sufficiently accurate without over-specifying rank.
- source_word: בָּכוּ בְּכִי גָּדוֹל מְאֹד
  chosen: wept with very great weeping
  alternatives:
  - wept very bitterly
  - wept exceedingly
  - wept a very great weeping
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative for emphasis. This rendering preserves
    the intensification more transparently than reducing it to a simple adverb, though
    it remains readable.
