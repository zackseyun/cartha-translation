id: 2SA.13.8
reference: 2 Samuel 13:8
source:
  edition: WLC
  text: וַ/תֵּ֣לֶךְ תָּמָ֗ר בֵּ֛ית אַמְנ֥וֹן אָחִ֖י/הָ וְ/ה֣וּא שֹׁכֵ֑ב וַ/תִּקַּ֨ח
    אֶת הַ/בָּצֵ֤ק ו/תלוש וַ/תְּלַבֵּ֣ב לְ/עֵינָ֔י/ו וַ/תְּבַשֵּׁ֖ל אֶת הַ/לְּבִבֽוֹת־־׃
translation:
  text: So Tamar went to the house of her brother Amnon, while he was lying down.
    She took the dough, kneaded it, shaped it into cakes in his sight, and cooked
    the cakes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made heart-shaped cakes'; the Hebrew verb and noun are rare and may
      reflect a shape associated with the word for 'heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boiled the cakes'; the Hebrew verb can specifically denote boiling,
      though here it may function more generally for cooking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: So ... went
  alternatives:
  - Then ... went
  - And ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving sequence and consequence from the prior instruction.
- source_word: בֵּית
  chosen: to the house of
  alternatives:
  - into the house of
  - to the home of
  lexicon: HALOT
  rationale: With הלך, 'to the house of' is the most natural English rendering of
    motion toward a household location.
- source_word: אָחִיהָ
  chosen: her brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 3fs suffix; gender-accurate and contextually
    important.
- source_word: וְהוּא שֹׁכֵב
  chosen: while he was lying down
  alternatives:
  - and he was lying down
  - he was in bed
  lexicon: HALOT
  rationale: The clause is circumstantial, describing Amnon's condition when Tamar
    arrived. 'Lying down' is closer to the Hebrew than the more interpretive 'in bed.'
- source_word: הַבָּצֵק
  chosen: the dough
  alternatives:
  - the kneading dough
  lexicon: HALOT
  rationale: Standard rendering for בצק in a food-preparation context.
- source_word: וְתָלֹשׁ
  chosen: kneaded it
  alternatives:
  - worked it
  - mixed it
  lexicon: HALOT
  rationale: לוש commonly refers to kneading dough. 'Kneaded it' is precise and idiomatic.
- source_word: וַתְּלַבֵּב
  chosen: shaped it into cakes
  alternatives:
  - made cakes
  - formed heart-shaped cakes
  lexicon: HALOT
  rationale: The verb is rare and cognate with לבב/לב, likely referring to forming
    the dough into the food item named in the next clause. 'Shaped it into cakes'
    preserves the action without overcommitting to the speculative 'heart-shaped'
    nuance.
- source_word: לְעֵינָיו
  chosen: in his sight
  alternatives:
  - before his eyes
  - in front of him
  lexicon: HALOT
  rationale: Idiomatic expression meaning in his presence/where he could see. 'In
    his sight' is natural and fairly formal.
- source_word: וַתְּבַשֵּׁל
  chosen: cooked
  alternatives:
  - boiled
  - prepared
  lexicon: HALOT
  rationale: בשל is a general cooking verb, though often specifically 'boil.' Because
    the exact method is not explicit in English context and the broader scene concerns
    prepared cakes, 'cooked' avoids false specificity.
- source_word: הַלְּבִבוֹת
  chosen: the cakes
  alternatives:
  - the pastries
  - the heart-cakes
  lexicon: HALOT
  rationale: This noun denotes the prepared food item Tamar makes. 'Cakes' is the
    conventional and sufficiently specific rendering; 'heart-cakes' is possible etymologically
    but too uncertain for the main text.
