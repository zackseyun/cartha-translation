id: 2SA.13.31
reference: 2 Samuel 13:31
source:
  edition: WLC
  text: וַ/יָּ֧קָם הַ/מֶּ֛לֶךְ וַ/יִּקְרַ֥ע אֶת בְּגָדָ֖י/ו וַ/יִּשְׁכַּ֣ב אָ֑רְצָ/ה
    וְ/כָל עֲבָדָ֥י/ו נִצָּבִ֖ים קְרֻעֵ֥י בְגָדִֽים־־׃ס
translation:
  text: Then the king arose, tore his garments, and lay on the ground, and all his
    servants were standing with their garments torn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tearing one's garments was a customary expression of grief, horror, or mourning
      in the Hebrew Bible.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative sequence. 'Arose' preserves the formal
    narrative movement and suits the king's abrupt reaction.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context, David.
    The text uses the title, not the personal name, so 'the king' is retained.
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  chosen: tore his garments
  alternatives:
  - tore his clothes
  - rent his garments
  lexicon: HALOT
  rationale: קרע with בגדיו is the standard idiom for tearing one's clothing in grief
    or shock. 'Garments' is slightly more formal and fits the mourning idiom; 'rent'
    is archaic.
- source_word: וַיִּשְׁכַּב אַרְצָה
  chosen: lay on the ground
  alternatives:
  - lay down on the ground
  - lay earthward
  lexicon: HALOT
  rationale: שכב means 'lie down/lie'; אַרְצָה with directional ending indicates movement
    toward the ground/earth. 'Lay on the ground' is idiomatic English and captures
    the posture of grief.
- source_word: וְכָל־עֲבָדָיו
  chosen: and all his servants
  alternatives:
  - and all his attendants
  - and all his officials
  lexicon: HALOT
  rationale: עבדים can denote servants or royal attendants. Here it refers broadly
    to the king's household/court servants. 'Servants' is the most direct rendering
    and does not over-specify rank.
- source_word: נִצָּבִים
  chosen: were standing
  alternatives:
  - stood
  - were stationed
  lexicon: HALOT
  rationale: Niphal participle of נצב gives a durative/stative sense. Rendering with
    English progressive ('were standing') reflects the participial aspect in the scene.
- source_word: קְרֻעֵי בְגָדִים
  chosen: with their garments torn
  alternatives:
  - with torn garments
  - their clothes torn
  lexicon: HALOT
  rationale: Passive participle of קרע plus 'garments' describes their state. 'With
    their garments torn' reads naturally in English while preserving the resultative
    sense.
