id: 2SA.13.21
reference: 2 Samuel 13:21
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ דָּוִ֔ד שָׁמַ֕ע אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/יִּ֥חַר
    ל֖/וֹ מְאֹֽד־׃
translation:
  text: When King David heard all these things, he was very angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And the king David heard all these things, and it burned
      to him greatly,' that is, 'his anger burned greatly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  chosen: When King
  alternatives:
  - And the king
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply as 'and,' but in English narrative
    style it often functions smoothly as a temporal transition. 'When King' captures
    the clause linkage naturally while preserving the sequence of events. 'King' is
    the straightforward sense of מֶלֶךְ with the article.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - learned of
  - came to hear
  lexicon: HALOT
  rationale: The verb means 'hear.' In this context it refers to receiving report
    of the matter. 'Heard' is both accurate and idiomatic.
- source_word: אֵת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard rendering meaning totality.
- source_word: הַ/דְּבָרִים
  chosen: things
  alternatives:
  - matters
  - words
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' Here it refers to
    the reported events surrounding Tamar and Amnon, so 'things' is natural English
    and broad enough to cover the sense.
- source_word: הָ/אֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Demonstrative adjective modifying 'things'.
- source_word: וַ/יִּחַר ל֖/וֹ
  chosen: he was angry
  alternatives:
  - it burned to him
  - his anger burned
  lexicon: HALOT
  rationale: The idiom חרה לו literally involves burning anger. 'He was angry' gives
    the idiomatic sense in clear modern English. The more literal 'his anger burned'
    is possible, but the Hebrew here does not explicitly supply 'anger' as the subject
    in this clause.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Common adverbial intensifier. 'Very' is the most natural modern equivalent.
