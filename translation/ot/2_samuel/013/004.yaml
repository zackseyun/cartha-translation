id: 2SA.13.4
reference: 2 Samuel 13:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ מַדּ֣וּעַ אַ֠תָּה כָּ֣כָה דַּ֤ל בֶּן הַ/מֶּ֨לֶךְ֙ בַּ/בֹּ֣קֶר
    בַּ/בֹּ֔קֶר הֲ/ל֖וֹא תַּגִּ֣יד לִ֑/י וַ/יֹּ֤אמֶר ל/וֹ֙ אַמְנ֔וֹן אֶת תָּמָ֗ר אֲח֛וֹת
    אַבְשָׁלֹ֥ם אָחִ֖/י אֲנִ֥י אֹהֵֽב־־׃
translation:
  text: He said to him, “Why are you so wasted away, son of the king, morning after
    morning? Will you not tell me?” And Amnon said to him, “I love Tamar, the sister
    of my brother Absalom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every morning' or more formally 'morning by morning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I am in love with Tamar.' The Hebrew more literally says 'I love Tamar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative asking for cause; simple 'Why' is natural and sufficient
    in English.
- source_word: כָּכָה
  chosen: so
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Functions adverbially with דַּל to intensify the condition; 'so' is idiomatic
    modern English.
- source_word: דַּל
  chosen: wasted away
  alternatives:
  - thin
  - weak
  - poor
  - gaunt
  lexicon: HALOT
  rationale: In this context of visible physical decline from lovesickness, 'wasted
    away' best captures the sense beyond mere economic poverty or simple thinness.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: son of the king
  alternatives:
  - king's son
  - prince
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the rhetorical force of Jonadab's
    address. 'Prince' is possible but less transparent to the Hebrew wording.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning after morning
  alternatives:
  - every morning
  - morning by morning
  lexicon: HALOT
  rationale: The repeated phrase expresses recurrence. 'Morning after morning' preserves
    the repetition while sounding natural in contemporary English.
- source_word: הֲלוֹא
  chosen: Will you not
  alternatives:
  - Surely you will
  - Is it not that you will
  lexicon: HALOT
  rationale: Introduces an expectation-laden question. 'Will you not tell me?' conveys
    the urging force in idiomatic English.
- source_word: תַּגִּיד לִי
  chosen: tell me
  alternatives:
  - declare to me
  - inform me
  lexicon: HALOT
  rationale: Common reporting verb; 'tell me' is the most natural equivalent here.
- source_word: אֶת תָּמָר
  chosen: Tamar
  alternatives:
  - it is Tamar
  lexicon: HALOT
  rationale: The direct-object marker has no independent English equivalent. The clause
    is completed by the following predicate 'I love'; English naturally renders simply
    'I love Tamar'.
- source_word: אֲחוֹת אַבְשָׁלֹם אָחִי
  chosen: the sister of my brother Absalom
  alternatives:
  - Absalom my brother's sister
  - my brother Absalom's sister
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional structure and the relational emphasis.
    'My brother Absalom's sister' is smoother, but the chosen wording stays closer
    while remaining readable.
- source_word: אֲנִי אֹהֵב
  chosen: I love
  alternatives:
  - I am in love with
  - I desire
  lexicon: HALOT
  rationale: The Hebrew verb is the common word for 'love.' Although the narrative
    context later exposes distorted desire, this clause itself states 'I love,' and
    the translation should not import a stronger interpretive gloss into the main
    text.
