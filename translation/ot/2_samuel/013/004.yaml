theological_decisions:
- issue: Rendering Amnon's statement of affection/desire toward Tamar
  chosen_reading: I love Tamar
  alternative_readings:
  - I am in love with Tamar
  - I desire Tamar
  rationale: The verse uses the ordinary Hebrew verb אָהֵב. Given the translation
    philosophy, the main text should preserve the lexical form without importing a
    moral or psychological interpretation not explicit in this clause. Because the
    broader narrative reveals sinful intent, an alternative interpretive gloss is
    worth preserving only as a lexical note, not as the main translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
