theological_decisions:
- issue: Rendering אָהֵב/אהב in a morally charged narrative
  chosen_reading: loved her
  alternative_readings:
  - desired her
  - was infatuated with her
  rationale: The narrative later exposes Amnon's 'love' as disordered and violent,
    but this verse itself uses the standard verb for love without qualification. To
    preserve theological and literary tension rather than resolve it prematurely,
    the main text keeps 'loved her.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
