id: 2SA.13.1
reference: 2 Samuel 13:1
source:
  edition: WLC
  text: וַ/יְהִ֣י אַֽחֲרֵי כֵ֗ן וּ/לְ/אַבְשָׁל֧וֹם בֶּן דָּוִ֛ד אָח֥וֹת יָפָ֖ה וּ/שְׁמָ֣/הּ
    תָּמָ֑ר וַ/יֶּאֱהָבֶ֖/הָ אַמְנ֥וֹן בֶּן דָּוִֽד־־־׃
translation:
  text: After this, Absalom son of David had a beautiful sister whose name was Tamar,
    and Amnon son of David loved her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was infatuated with her' or 'desired her.' The Hebrew verb is the ordinary
      word for 'love,' but the following narrative shows that Amnon's affection was
      corrupt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: After this
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative scene-setting
    formula. In natural modern English, the temporal phrase is best carried by 'After
    this' rather than a wooden 'And it happened.'
- source_word: אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - afterward
  - after these things
  lexicon: HALOT
  rationale: This phrase marks sequence in the narrative. 'After this' is idiomatic
    and preserves the temporal linkage to the preceding events.
- source_word: וּלְאַבְשָׁלוֹם בֶּן דָּוִד
  chosen: Absalom son of David had
  alternatives:
  - there belonged to Absalom son of David
  - Absalom son of David had
  lexicon: HALOT
  rationale: The prepositional possession construction ('to Absalom ... [was]') is
    naturally rendered in English with 'had.' 'Son of David' is retained formally
    to preserve the repeated dynastic identification in the verse.
- source_word: אָחוֹת
  chosen: sister
  alternatives:
  - a sister
  lexicon: HALOT
  rationale: The noun means 'sister.' English requires the indefinite article in this
    context, but the core lexical choice is straightforward.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - attractive
  - lovely
  lexicon: HALOT
  rationale: The adjective denotes physical beauty here. 'Beautiful' is the most direct
    and natural rendering.
- source_word: וּשְׁמָהּ תָּמָר
  chosen: whose name was Tamar
  alternatives:
  - and her name was Tamar
  lexicon: HALOT
  rationale: The Hebrew is a simple naming clause. 'Whose name was Tamar' reads smoothly
    in English while preserving the content.
- source_word: וַיֶּאֱהָבֶהָ
  chosen: loved her
  alternatives:
  - fell in love with her
  - desired her
  lexicon: HALOT
  rationale: The verb is the common Hebrew verb 'to love.' Although the broader narrative
    reveals distorted desire, this verse itself uses the ordinary lexical item, so
    'loved her' best preserves the source without importing later interpretation.
- source_word: אַמְנוֹן בֶּן דָּוִד
  chosen: Amnon son of David
  alternatives:
  - Amnon, David's son
  lexicon: HALOT
  rationale: The repeated 'son of David' should be retained for consistency and to
    preserve the verse's emphasis on the royal family relationships.
