id: 2SA.13.5
reference: 2 Samuel 13:5
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ יְה֣וֹנָדָ֔ב שְׁכַ֥ב עַל מִשְׁכָּבְ/ךָ֖ וְ/הִתְחָ֑ל וּ/בָ֧א
    אָבִ֣י/ךָ לִ/רְאוֹתֶ֗/ךָ וְ/אָמַרְתָּ֣ אֵלָ֡י/ו תָּ֣בֹא נָא֩ תָמָ֨ר אֲחוֹתִ֜/י
    וְ/תַבְרֵ֣/נִי לֶ֗חֶם וְ/עָשְׂתָ֤ה לְ/עֵינַ/י֙ אֶת הַ/בִּרְיָ֔ה לְמַ֨עַן֙ אֲשֶׁ֣ר
    אֶרְאֶ֔ה וְ/אָכַלְתִּ֖י מִ/יָּדָֽ/הּ־־׃
translation:
  text: Jehonadab said to him, “Lie down on your bed and pretend to be sick. When
    your father comes to see you, say to him, ‘Please let Tamar my sister come and
    give me food, and let her prepare the meal in my sight, so that I may watch and
    eat from her hand.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feign illness.' The Hebrew verb here refers to making oneself appear
      sick.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bread,' often used more broadly for food.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term likely refers to food specially prepared for a sick person
      or convalescent.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁכַב עַל מִשְׁכָּבְךָ
  chosen: Lie down on your bed
  alternatives:
  - Lie on your couch
  - Go to bed
  lexicon: HALOT
  rationale: שׁכב with עַל + מִשְׁכָּב naturally denotes lying down on one's bed/couch.
    'Bed' is the most natural modern English rendering here.
- source_word: וְהִתְחָל
  chosen: pretend to be sick
  alternatives:
  - make yourself sick
  - feign illness
  lexicon: HALOT
  rationale: 'Hitpael of חלה here is reflexive/pretensive in context: Amnon is being
    instructed to simulate illness, not actually become ill. ''Pretend to be sick''
    is clear modern English.'
- source_word: וּבָא אָבִיךָ לִרְאוֹתֶךָ
  chosen: When your father comes to see you
  alternatives:
  - and your father comes to see you
  lexicon: HALOT
  rationale: The waw + qatal after imperatives functions naturally in instruction
    sequence; English idiom is best conveyed with 'When your father comes to see you'
    rather than a wooden coordinate.
- source_word: תָּבֹא נָא
  chosen: Please let ... come
  alternatives:
  - Please may ... come
  - Let ... come, please
  lexicon: HALOT
  rationale: נָא adds politeness/entreaty. Because the request is directed to the
    father regarding Tamar's coming, English expresses this smoothly as 'Please let
    Tamar ... come.'
- source_word: תָמָר אֲחוֹתִי
  chosen: Tamar my sister
  lexicon: HALOT
  rationale: Straightforward appositional identification; retained as spoken by Amnon.
- source_word: וְתַבְרֵנִי לֶחֶם
  chosen: give me food
  alternatives:
  - feed me bread
  - prepare bread for me
  lexicon: HALOT
  rationale: The verb ברה in this stem/context refers to providing nourishment/food
    to a sick person. Although לֶחֶם is literally 'bread,' it often stands more broadly
    for food; 'give me food' best fits idiomatic English and the caregiving context.
- source_word: וְעָשְׂתָה לְעֵינַי אֶת הַבִּרְיָה
  chosen: let her prepare the meal in my sight
  alternatives:
  - let her make the food before my eyes
  - let her prepare the food while I watch
  lexicon: HALOT
  rationale: הַבִּרְיָה denotes food prepared for an invalid/convalescent meal. 'Prepare
    the meal in my sight' preserves both the specific act and the visual element לְעֵינַי.
- source_word: לְמַעַן אֲשֶׁר אֶרְאֶה
  chosen: so that I may watch
  alternatives:
  - so that I may see
  - in order that I may look on
  lexicon: HALOT
  rationale: ראה here is literal visual observation. Since 'in my sight' already appears
    earlier, varying with 'watch' avoids awkward repetition while preserving sense.
- source_word: וְאָכַלְתִּי מִיָּדָהּ
  chosen: and eat from her hand
  alternatives:
  - and receive it from her hand and eat
  - and eat at her hand
  lexicon: HALOT
  rationale: 'The idiom is literal enough in context and important to the plot: Amnon
    wants Tamar to hand him the food personally. ''From her hand'' preserves that
    nuance.'
