id: 2SA.13.17
reference: 2 Samuel 13:17
source:
  edition: WLC
  text: וַ/יִּקְרָ֗א אֶֽת נַעֲר/וֹ֙ מְשָׁ֣רְת֔/וֹ וַ/יֹּ֕אמֶר שִׁלְחוּ נָ֥א אֶת זֹ֛את
    מֵ/עָלַ֖/י הַ/ח֑וּצָ/ה וּ/נְעֹ֥ל הַ/דֶּ֖לֶת אַחֲרֶֽי/הָ־־־׃
translation:
  text: Then he called his young man who served him and said, “Please send this woman
    away from me, outside, and bolt the door behind her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'this'; the feminine form refers to Tamar with a deliberately distancing,
      contemptuous tone. 'This woman' makes the referent explicit in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'lock the door behind her.' The Hebrew verb can mean 'bolt,' 'bar,' or
      'lock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרוֹ מְשָׁרְתוֹ
  chosen: his young man who served him
  alternatives:
  - his servant
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    With the participle מְשָׁרֵת ('serving/ministering'), the phrase refers to Amnon's
    male personal attendant. 'Young man who served him' preserves both the lexical
    sense of נַעַר and the descriptive force of the participle without flattening
    it to a single title.
- source_word: שִׁלְחוּ נָא
  chosen: Please send
  alternatives:
  - Send, please
  - Put out
  lexicon: HALOT
  rationale: The imperative שִׁלְחוּ means 'send away/out'; נָא adds politeness/urgency.
    In English, 'Please send' naturally conveys the particle's force while keeping
    the command direct.
- source_word: זֹאת
  chosen: this woman
  alternatives:
  - this
  - this one
  lexicon: HALOT
  rationale: The Hebrew demonstrative is feminine singular and, in context, refers
    contemptuously to Tamar. English normally requires the referent to be made explicit
    for clarity. 'This woman' preserves the deictic force and the distancing, dismissive
    tone better than bare 'this.'
- source_word: מֵעָלַי
  chosen: away from me
  alternatives:
  - from upon me
  - off me
  lexicon: HALOT
  rationale: The idiom literally means 'from upon me' but in context expresses removal
    from his presence. 'Away from me' is the natural English equivalent.
- source_word: הַחוּצָה
  chosen: outside
  alternatives:
  - out
  - to the outside
  lexicon: HALOT
  rationale: 'The directional form with article functions adverbially: ''outside/outdoors.''
    ''Outside'' is concise and idiomatic.'
- source_word: וּנְעֹל
  chosen: and bolt
  alternatives:
  - and lock
  - and shut fast
  lexicon: HALOT
  rationale: The verb נעל means to bar, bolt, or lock. 'Bolt' fits the ancient door-setting
    well and conveys a forceful securing of the door.
- source_word: אַחֲרֶיהָ
  chosen: behind her
  alternatives:
  - after her
  lexicon: HALOT
  rationale: Though literally 'after her,' with shutting a door the idiomatic English
    is 'behind her.'
