id: 2SA.13.22
reference: 2 Samuel 13:22
source:
  edition: WLC
  text: וְ/לֹֽא דִבֶּ֧ר אַבְשָׁל֛וֹם עִם אַמְנ֖וֹן לְ/מֵ/רָ֣ע וְ/עַד ט֑וֹב כִּֽי שָׂנֵ֤א
    אַבְשָׁלוֹם֙ אֶת אַמְנ֔וֹן עַל דְּבַר֙ אֲשֶׁ֣ר עִנָּ֔ה אֵ֖ת תָּמָ֥ר אֲחֹתֽ/וֹ־־־־־־׃פ
translation:
  text: And Absalom did not speak with Amnon, either bad or good, because Absalom
    hated Amnon over the matter that he had violated Tamar his sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'neither bad nor good,' an idiom meaning that Absalom said nothing at
      all to Amnon.
    reason: lexical_alternative
  - marker: b
    text: Or 'had humbled Tamar.' In this context the Hebrew verb refers to Amnon's
      sexual violation of her.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבֶּר ... עִם
  chosen: did not speak with
  alternatives:
  - did not speak to
  - said nothing to
  lexicon: HALOT
  rationale: The idiom with דבר plus עם commonly means to speak with/to someone. 'Speak
    with' preserves the preposition and the relational sense without overinterpreting
    silence as absolute muteness.
- source_word: לְמֵרָע וְעַד טוֹב
  chosen: either bad or good
  alternatives:
  - from bad to good
  - neither bad nor good
  lexicon: HALOT
  rationale: This is an idiomatic merism indicating any kind of speech at all. 'Either
    bad or good' is natural English and preserves the polarity of the Hebrew expression.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Absalom's silence. 'Because' is the
    clearest modern English causal connector.
- source_word: שָׂנֵא
  chosen: hated
  alternatives:
  - was hating
  - detested
  lexicon: HALOT
  rationale: The verb straightforwardly denotes hatred. 'Hated' is the plain and strong
    English equivalent and fits the narrative explanation.
- source_word: עַל דְּבַר אֲשֶׁר
  chosen: over the matter that
  alternatives:
  - because
  - on account of what
  - concerning the fact that
  lexicon: HALOT
  rationale: The phrase literally refers to 'the matter/word that,' introducing the
    cause. 'Over the matter that' keeps the nominal construction more closely than
    a simple 'because' while remaining readable.
- source_word: עִנָּה
  chosen: had violated
  alternatives:
  - had humbled
  - had afflicted
  - had raped
  lexicon: HALOT
  rationale: In this context, referring back to Amnon's sexual assault of Tamar, the
    verb denotes sexual violation and humiliation. 'Had violated' communicates the
    offense clearly without importing a more specific legal term than the verb itself
    supplies in this clause.
- source_word: אֲחֹתוֹ
  chosen: his sister
  alternatives:
  - his own sister
  lexicon: HALOT
  rationale: The suffix refers to Absalom, the subject of the clause. 'His sister'
    is sufficient in English and preserves the familial relationship central to the
    motive.
