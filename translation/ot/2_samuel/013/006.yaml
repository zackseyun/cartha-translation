id: 2SA.13.6
reference: 2 Samuel 13:6
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב אַמְנ֖וֹן וַ/יִּתְחָ֑ל וַ/יָּבֹ֨א הַ/מֶּ֜לֶךְ לִ/רְאֹת֗/וֹ
    וַ/יֹּ֨אמֶר אַמְנ֤וֹן אֶל הַ/מֶּ֨לֶךְ֙ תָּֽבוֹא נָ֞א תָּמָ֣ר אֲחֹתִ֗/י וּ/תְלַבֵּ֤ב
    לְ/עֵינַ/י֙ שְׁתֵּ֣י לְבִב֔וֹת וְ/אֶבְרֶ֖ה מִ/יָּדָֽ/הּ־־׃
translation:
  text: So Amnon lay down and pretended to be sick. When the king came to see him,
    Amnon said to the king, “Please let Tamar my sister come and make two heart-shaped
    cakes before my eyes, so that I may eat from her hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two cakes' or 'two pastries'; the exact kind of food denoted by the
      Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - lay
  - went to bed
  lexicon: HALOT
  rationale: The verb שׁכב here describes Amnon taking to his bed as part of his deception.
    'Lay down' is natural modern English and fits the narrative setup better than
    the more ambiguous 'lay.'
- source_word: וַיִּתְחָל
  chosen: pretended to be sick
  alternatives:
  - made himself sick
  - feigned illness
  lexicon: HALOT
  rationale: In context Amnon is not actually ill but acting ill to deceive David.
    The hitpael form here carries the sense of feigning sickness, so 'pretended to
    be sick' makes the narrative sense explicit without over-paraphrasing.
- source_word: לִרְאֹתוֹ
  chosen: to see him
  alternatives:
  - to visit him
  - to look on him
  lexicon: HALOT
  rationale: The infinitive of ראה with object suffix is straightforwardly 'to see
    him.' In context this implies a visit, but the more direct wording best preserves
    the Hebrew.
- source_word: תָּבוֹא נָא
  chosen: Please let ... come
  alternatives:
  - Please may ... come
  - Let ... come, please
  lexicon: HALOT
  rationale: The jussive/imperfect with particle נָא expresses polite request. English
    idiom requires a smoother rendering in direct speech; 'Please let Tamar ... come'
    captures the request addressed to the king.
- source_word: תָּמָר אֲחֹתִי
  chosen: Tamar my sister
  alternatives:
  - my sister Tamar
  lexicon: HALOT
  rationale: Both English orders are possible. 'Tamar my sister' follows the Hebrew
    sequence more closely while remaining natural.
- source_word: וּתְלַבֵּב
  chosen: make
  alternatives:
  - prepare
  - cook
  - shape
  lexicon: HALOT
  rationale: The rare denominative verb from לבב refers to preparing the special food
    called לְבִבוֹת. Because the exact culinary action is uncertain, 'make' is the
    safest main-text rendering, with the nature of the food clarified by the following
    noun.
- source_word: לְעֵינַי
  chosen: before my eyes
  alternatives:
  - in my sight
  - where I can watch
  lexicon: HALOT
  rationale: The phrase is literally visual and likely underscores Amnon's request
    that Tamar prepare the food in his presence. 'Before my eyes' preserves the concreteness
    of the Hebrew.
- source_word: שְׁתֵּי לְבִבוֹת
  chosen: two heart-shaped cakes
  alternatives:
  - two cakes
  - two pastries
  - two dumplings
  lexicon: HALOT
  rationale: לְבִבוֹת denotes a kind of cake or pastry. Because the noun is etymologically
    related to 'heart' and many translations preserve that nuance, 'heart-shaped cakes'
    is a plausible and vivid rendering, though the exact form of the food is uncertain.
- source_word: וְאֶבְרֶה
  chosen: so that I may eat
  alternatives:
  - that I may be fed
  - that I may take nourishment
  lexicon: HALOT
  rationale: The verb ברה in this context refers to eating or being fed as an invalid.
    'So that I may eat' is clear and idiomatic, while preserving the purpose sense
    of the clause.
- source_word: מִיָּדָהּ
  chosen: from her hand
  alternatives:
  - from her hands
  - by her hand
  lexicon: HALOT
  rationale: The singular 'hand' is the Hebrew expression and in English naturally
    conveys personal service. It also preserves the manipulative intimacy implied
    in Amnon's request.
