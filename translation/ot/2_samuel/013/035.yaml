id: 2SA.13.35
reference: 2 Samuel 13:35
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יֽוֹנָדָב֙ אֶל הַ/מֶּ֔לֶךְ הִנֵּ֥ה בְנֵֽי הַ/מֶּ֖לֶךְ בָּ֑אוּ
    כִּ/דְבַ֥ר עַבְדְּ/ךָ֖ כֵּ֥ן הָיָֽה־־׃
translation:
  text: Then Jonadab said to the king, “Look, the king’s sons have come; it has happened
    just as your servant said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, the king’s sons have come; as your servant said, so it was.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'and said.'
- source_word: יֽוֹנָדָב
  chosen: Jonadab
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to the King
  lexicon: HALOT
  rationale: Refers to the human king David, so lowercase 'king' is appropriate.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    immediacy in readable modern English; 'behold' is too archaic for the project's
    style.
- source_word: בְנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the sons of the king
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. The plural 'sons'
    is important in context because Jonadab corrects the earlier fear that all had
    been killed.
- source_word: בָּאוּ
  chosen: have come
  alternatives:
  - came
  - are coming
  lexicon: HALOT
  rationale: The perfect here reports the now-confirmed arrival. English present perfect
    fits the deictic 'Look' and the immediate scene better than simple past, while
    avoiding an unwarranted progressive sense.
- source_word: כִּדְבַר עַבְדְּךָ
  chosen: just as your servant said
  alternatives:
  - according to the word of your servant
  - as your servant spoke
  lexicon: HALOT
  rationale: דבר in this construction means what was said/spoken. 'Your servant' preserves
    the courtly self-reference and social register; 'just as ... said' is idiomatic
    and accurate.
- source_word: כֵּן הָיָה
  chosen: it has happened
  alternatives:
  - so it was
  - thus it happened
  - it was so
  lexicon: HALOT
  rationale: This clause confirms the accuracy of Jonadab's prior statement. 'It has
    happened' communicates fulfilled confirmation in natural English; 'it was so'
    is possible but less idiomatic today.
