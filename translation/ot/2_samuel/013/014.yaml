id: 2SA.13.14
reference: 2 Samuel 13:14
source:
  edition: WLC
  text: וְ/לֹ֥א אָבָ֖ה לִ/שְׁמֹ֣עַ בְּ/קוֹלָ֑/הּ וַ/יֶּחֱזַ֤ק מִמֶּ֨/נָּה֙ וַ/יְעַנֶּ֔/הָ
    וַ/יִּשְׁכַּ֖ב אֹתָֽ/הּ׃
translation:
  text: But he would not listen to her, and being stronger than she was, he violated
    her and lay with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'he did not listen to her voice.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he overpowered her.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb can mean 'humiliated' or 'violated'; here it refers to sexual
      violation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  chosen: would not
  alternatives:
  - was unwilling
  - refused
  lexicon: HALOT
  rationale: The verb denotes willingness or consent. In the construction with negation
    and infinitive ('would not listen'), 'would not' is idiomatic English that preserves
    volitional refusal without sounding wooden.
- source_word: לִשְׁמֹעַ בְּקוֹלָהּ
  chosen: listen to her
  alternatives:
  - obey her voice
  - heed her
  lexicon: HALOT
  rationale: Literally 'listen to her voice.' In English, 'listen to her' best conveys
    the sense of heeding her plea. 'Obey her voice' is too wooden here, though the
    underlying idiom is noted.
- source_word: וַיֶּחֱזַק מִמֶּנָּה
  chosen: being stronger than she was
  alternatives:
  - he overpowered her
  - he was stronger than her
  lexicon: HALOT
  rationale: The verb חזק with מן expresses prevailing by strength over someone. 'Being
    stronger than she was' preserves the comparative force and explains the means
    by which he acted. 'Overpowered her' is possible, but the following verbs already
    narrate the assault, so this rendering avoids collapsing distinct actions into
    one.
- source_word: וַיְעַנֶּהָ
  chosen: he violated her
  alternatives:
  - he raped her
  - he humbled her
  - he afflicted her
  lexicon: HALOT
  rationale: In this sexual-violence context, ענה clearly refers to violation/humiliation
    through forced intercourse. 'Violated her' is accurate and grave without importing
    a more clinical term not directly present in the Hebrew. 'Humbled her' is too
    weak or ambiguous in modern English; 'raped her' is interpretively strong and
    reflects the event, but 'violated her' stays closer to the lexical range while
    still making the abuse plain.
- source_word: וַיִּשְׁכַּב אֹתָהּ
  chosen: lay with her
  alternatives:
  - slept with her
  - had intercourse with her
  lexicon: HALOT
  rationale: שׁכב with a direct object is a standard Hebrew idiom for sexual intercourse.
    'Lay with her' is the most natural literal rendering and preserves the idiomatic
    expression. 'Slept with her' can sound too casual in modern English, especially
    in this violent context.
