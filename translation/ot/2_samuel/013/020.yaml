id: 2SA.13.20
reference: 2 Samuel 13:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלֶ֜י/הָ אַבְשָׁל֣וֹם אָחִ֗י/הָ הַ/אֲמִינ֣וֹן אָחִי/ךְ֮ הָיָ֣ה
    עִמָּ/ךְ֒ וְ/עַתָּ֞ה אֲחוֹתִ֤/י הַחֲרִ֨ישִׁי֙ אָחִ֣י/ךְ ה֔וּא אַל תָּשִׁ֥יתִי
    אֶת לִבֵּ֖/ךְ לַ/דָּבָ֣ר הַ/זֶּ֑ה וַ/תֵּ֤שֶׁב תָּמָר֙ וְ/שֹׁ֣מֵמָ֔ה בֵּ֖ית אַבְשָׁל֥וֹם
    אָחִֽי/הָ־־׃
translation:
  text: Then Absalom her brother said to her, “Has Amnon your brother been with you?
    But now, my sister, keep silent; he is your brother. Do not take this matter to
    heart.” So Tamar remained, devastated, in the house of Absalom her brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Has Amnon your brother been with you?'—a discreet expression referring
      to the sexual assault.
    reason: lexical_alternative
  - marker: b
    text: Or 'desolate.' The Hebrew term conveys devastation, ruin, or appalled desolation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲמִינוֹן
  chosen: Amnon
  rationale: Personal name transliterated by standard convention, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: הָיָה עִמָּךְ
  chosen: been with you
  alternatives:
  - been with you sexually
  - been with you
  lexicon: HALOT
  rationale: The idiom literally reads 'has been with you,' which in this context
    is a discreet reference to sexual violation. The main text preserves the Hebrew's
    euphemistic restraint rather than making the sexual sense explicit, since the
    context already supplies it.
- source_word: הַחֲרִישִׁי
  chosen: keep silent
  alternatives:
  - be quiet
  - say nothing
  lexicon: HALOT
  rationale: Imperative from חרשׁ in the sense of being silent. 'Keep silent' is natural
    English and preserves the force of Absalom's command.
- source_word: אָחִי/ךְ הוּא
  chosen: he is your brother
  alternatives:
  - he is your brother after all
  lexicon: HALOT
  rationale: Retains the blunt explanatory clause as spoken. The wording reflects
    Absalom's appeal to family relation, without softening its disturbing effect in
    context.
- source_word: אַל תָּשִׁיתִי אֶת לִבֵּךְ לַדָּבָר הַזֶּה
  chosen: Do not take this matter to heart
  alternatives:
  - Do not set your heart on this thing
  - Do not take this thing to heart
  lexicon: HALOT
  rationale: The Hebrew idiom 'set/place your heart to this matter' means to dwell
    on it or let it consume one's inner life. 'Take this matter to heart' is a clear
    English equivalent that preserves the emotional sense.
- source_word: וַתֵּשֶׁב
  chosen: remained
  alternatives:
  - lived
  - stayed
  lexicon: HALOT
  rationale: While the verb is literally 'sat/dwelt,' in context it describes Tamar's
    ongoing condition in Absalom's house. 'Remained' captures the resultant state
    naturally in English.
- source_word: שֹׁמֵמָה
  chosen: devastated
  alternatives:
  - desolate
  - ruined
  - appalled
  lexicon: HALOT
  rationale: The participial/adjectival form conveys desolation and ruin. 'Devastated'
    communicates the emotional and social wreckage in idiomatic modern English, while
    'desolate' remains a viable more formal alternative.
- source_word: בֵּית אַבְשָׁלוֹם
  chosen: in the house of Absalom
  alternatives:
  - in Absalom's house
  lexicon: HALOT
  rationale: Rendered with 'house' to preserve the concrete familial/domestic setting.
    Either English form is acceptable; the fuller phrase slightly better reflects
    the Hebrew construct.
