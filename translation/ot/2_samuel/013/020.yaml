theological_decisions:
- issue: Narrative euphemism for sexual assault
  chosen_reading: Preserve the Hebrew's indirect wording ('been with you') in the
    main text rather than making the sexual act explicit.
  alternative_readings:
  - Has Amnon your brother violated you?
  - Has Amnon your brother lain with you?
  rationale: The verse uses euphemistic language in a traumatic narrative. Preserving
    that restraint respects the source text's diction while allowing the surrounding
    context to clarify the event. A more explicit rendering would interpret rather
    than translate the idiom.
  doctrine_reference: Translation philosophy §1, §3, §6
