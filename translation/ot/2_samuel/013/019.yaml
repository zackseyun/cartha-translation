id: 2SA.13.19
reference: 2 Samuel 13:19
source:
  edition: WLC
  text: וַ/תִּקַּ֨ח תָּמָ֥ר אֵ֨פֶר֙ עַל רֹאשָׁ֔/הּ וּ/כְתֹ֧נֶת הַ/פַּסִּ֛ים אֲשֶׁ֥ר
    עָלֶ֖י/הָ קָרָ֑עָה וַ/תָּ֤שֶׂם יָדָ/הּ֙ עַל רֹאשָׁ֔/הּ וַ/תֵּ֥לֶךְ הָל֖וֹךְ וְ/זָעָֽקָה־־׃
translation:
  text: Then Tamar put ashes on her head, tore the long-sleeved robe that was on her,
    put her hand on her head, and went away, going and crying out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ornamented robe,' 'the richly colored robe'; traditionally, 'the
      robe of many colors.' The Hebrew expression is uncertain, but in this context
      it refers to the distinctive garment worn by the king's virgin daughters.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵפֶר
  chosen: ashes
  alternatives:
  - ash
  lexicon: HALOT
  rationale: The noun refers to ashes used as a sign of mourning. English idiom normally
    uses the plural 'ashes' in this gesture.
- source_word: וַתִּקַּח ... עַל רֹאשָׁהּ
  chosen: put ashes on her head
  alternatives:
  - took ashes and put them on her head
  - placed ashes on her head
  lexicon: HALOT
  rationale: Although literally 'took ashes on her head,' the sense is the customary
    action of putting or placing ashes on the head in mourning. This is a natural
    English rendering that preserves the concrete act.
- source_word: כְתֹנֶת הַפַּסִּים
  chosen: the long-sleeved robe
  alternatives:
  - the ornamented robe
  - the richly colored robe
  - the robe of many colors
  lexicon: HALOT
  rationale: The phrase denotes a distinctive robe associated with royal virgin daughters
    in this context (cf. 2 Sam 13:18). 'Long-sleeved robe' reflects a plausible sense
    of פַּסִּים as extremities/palms, hence a garment reaching to the wrists/ankles,
    and avoids importing the traditional but uncertain 'many colors' from Gen 37.
- source_word: אֲשֶׁר עָלֶיהָ
  chosen: that was on her
  alternatives:
  - which she was wearing
  - that she had on
  lexicon: HALOT
  rationale: This relative clause simply identifies the robe as the one she was wearing.
    'That was on her' stays close to the Hebrew while remaining idiomatic.
- source_word: קָרָעָה
  chosen: tore
  alternatives:
  - ripped
  - tore apart
  lexicon: HALOT
  rationale: Standard rendering for the mourning gesture of tearing one's garment.
- source_word: וַתָּשֶׂם יָדָהּ עַל רֹאשָׁהּ
  chosen: put her hand on her head
  alternatives:
  - laid her hand on her head
  lexicon: HALOT
  rationale: A literal rendering preserves the embodied gesture of grief and humiliation
    without over-interpreting it.
- source_word: וַתֵּלֶךְ הָלוֹךְ וְזָעָקָה
  chosen: went away, going and crying out
  alternatives:
  - went away crying aloud
  - went on, crying out as she went
  - walked away wailing
  lexicon: HALOT
  rationale: 'The infinitive absolute with the finite verb intensifies or duratively
    marks the action: she kept going while crying out. ''Going and crying out'' preserves
    the Hebrew''s iterative feel more transparently than a smoother paraphrase like
    ''wailing''.'
- source_word: זָעָקָה
  chosen: crying out
  alternatives:
  - wailing
  - screaming
  - lamenting
  lexicon: HALOT
  rationale: The verb denotes a loud cry. 'Crying out' is broad enough to preserve
    the intensity without specifying whether the cry is verbal protest, lament, or
    scream.
