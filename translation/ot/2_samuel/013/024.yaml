id: 2SA.13.24
reference: 2 Samuel 13:24
source:
  edition: WLC
  text: וַ/יָּבֹ֤א אַבְשָׁלוֹם֙ אֶל הַ/מֶּ֔לֶךְ וַ/יֹּ֕אמֶר הִנֵּה נָ֥א גֹזְזִ֖ים
    לְ/עַבְדֶּ֑/ךָ יֵֽלֶךְ נָ֥א הַ/מֶּ֛לֶךְ וַ/עֲבָדָ֖י/ו עִם עַבְדֶּֽ/ךָ־־־־׃
translation:
  text: Then Absalom came to the king and said, “Look, your servant has shearers.
    Please let the king and his servants go with your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sheepshearers.” The Hebrew says simply “shearers,” but the broader context
      is sheep-shearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - So ... came
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    progression without overtranslating.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name is transliterated by standard English convention.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to the king David
  lexicon: HALOT
  rationale: The Hebrew has the title 'the king,' not the personal name. English preserves
    the formal court setting.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative speech introduction; explicit subject is unnecessary
    in English because Absalom is clear from context.
- source_word: הִנֵּה נָא
  chosen: Look
  alternatives:
  - Please look
  - See now
  - Behold, please
  lexicon: HALOT
  rationale: הִנֵּה marks attention; נָא adds politeness/urgency. 'Look' captures
    the deictic force in readable modern English; the following 'Please' renders the
    second נָא more naturally.
- source_word: גֹזְזִים
  chosen: shearers
  alternatives:
  - sheepshearers
  - men who are shearing
  lexicon: HALOT
  rationale: The participle refers to those doing the shearing. In context of Absalom's
    feast, 'shearers' is concise and idiomatic; 'sheepshearers' is possible but slightly
    more interpretive since 'sheep' is not explicit in this verse.
- source_word: לְעַבְדֶּךָ
  chosen: your servant
  alternatives:
  - for your servant
  lexicon: HALOT
  rationale: Absalom refers to himself deferentially before the king. English keeps
    the courtly self-reference. The lamed is represented idiomatically rather than
    woodenly.
- source_word: יֵלֶךְ נָא
  chosen: Please let ... go
  alternatives:
  - Please may ... go
  - Let ... go, please
  lexicon: HALOT
  rationale: The jussive expresses a polite request. English 'Please let' best conveys
    the petitionary force directed to the king.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - my lord the king
  lexicon: HALOT
  rationale: The Hebrew repeats the title plainly. The translation preserves the formal
    third-person self-reference used in royal address.
- source_word: וַעֲבָדָיו
  chosen: and his servants
  alternatives:
  - and his attendants
  - and his officials
  lexicon: HALOT
  rationale: Refers to the king's servants/retinue. 'Servants' is the most direct
    rendering; in this court context it can include attendants or officials, but the
    Hebrew term should remain visible.
- source_word: עִם עַבְדֶּךָ
  chosen: with your servant
  alternatives:
  - with me
  lexicon: HALOT
  rationale: Absalom again uses deferential self-reference. Retaining 'your servant'
    preserves the social register better than flattening to 'me'.
