id: 2SA.13.12
reference: 2 Samuel 13:12
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר ל֗/וֹ אַל אָחִ/י֙ אַל תְּעַנֵּ֔/נִי כִּ֛י לֹא יֵֽעָשֶׂ֥ה כֵ֖ן
    בְּ/יִשְׂרָאֵ֑ל אַֽל תַּעֲשֵׂ֖ה אֶת הַ/נְּבָלָ֥ה הַ/זֹּֽאת־־־־־׃
translation:
  text: She said to him, “No, my brother, do not violate me, for such a thing is not
    done in Israel. Do not do this disgraceful thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “do not humiliate me” or “do not rape me.” The Hebrew verb can denote
      violation with both sexual and shame/humiliation overtones.
    reason: lexical_alternative
  - marker: b
    text: Or “this outrageous thing” or “this vile act.” The Hebrew term refers to
      a morally scandalous act, not mere foolishness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר לּוֹ
  chosen: She said to him
  alternatives:
  - And she said to him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Tamar's speech. English omits
    the conjunction for natural flow while preserving sequence.
- source_word: אַל
  chosen: No / do not
  alternatives:
  - please do not
  lexicon: HALOT
  rationale: The first אַל functions as an urgent negative exclamation before the
    address ('No, my brother'); the following אַל introduces prohibitions ('do not').
    Rendering the first as 'No' captures the emotional force without adding unwarranted
    politeness.
- source_word: אָחִי
  chosen: my brother
  lexicon: HALOT
  rationale: Literal kinship term with 1cs suffix. Retained because the familial relationship
    is central to the horror of the act.
- source_word: תְּעַנֵּנִי
  chosen: violate me
  alternatives:
  - humiliate me
  - rape me
  - afflict me
  lexicon: HALOT
  rationale: From ענה in the Piel, used in sexual-violence contexts for violating/humiliating
    a woman. 'Violate me' is strong and accurate while fitting the immediate plea;
    'rape me' is interpretively specific and possible, but 'violate' better preserves
    the lexical range and the shame/humiliation component.
- source_word: כִּי לֹא יֵעָשֶׂה כֵן בְּיִשְׂרָאֵל
  chosen: for such a thing is not done in Israel
  alternatives:
  - for this is not done in Israel
  - for one does not do so in Israel
  lexicon: HALOT
  rationale: Impersonal Niphal of עשה expresses customary moral prohibition. 'Such
    a thing is not done in Israel' is idiomatic and preserves the appeal to Israel's
    communal moral norm.
- source_word: אַל תַּעֲשֵׂה
  chosen: Do not do
  alternatives:
  - Do not commit
  lexicon: HALOT
  rationale: Direct prohibition with עשה. 'Do not do' keeps the Hebrew wording; the
    object that follows supplies the moral content.
- source_word: הַנְּבָלָה הַזֹּאת
  chosen: this disgraceful thing
  alternatives:
  - this outrageous thing
  - this vile thing
  - this folly
  lexicon: HALOT
  rationale: נְבָלָה denotes a morally outrageous, shameful act, often one violating
    covenantal/social order. 'Disgraceful thing' communicates both shame and moral
    offensiveness in clear modern English. 'Folly' is too weak in contemporary usage.
