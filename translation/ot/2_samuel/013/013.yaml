theological_decisions:
- issue: Implication of Tamar's appeal to the king
  chosen_reading: Render the statement straightforwardly as Tamar's plea that the
    king would not withhold her from Amnon, without resolving whether this reflects
    an actually lawful/realistic possibility or a desperate rhetorical attempt to
    delay the assault.
  alternative_readings:
  - Tamar genuinely believed David might permit the marriage
  - Tamar was speaking strategically to stall Amnon rather than stating a realistic
    legal outcome
  rationale: The verse itself reports Tamar's words but does not explain whether her
    proposal was legally valid, politically plausible, or merely tactical. The translation
    should preserve that ambiguity rather than importing an interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
