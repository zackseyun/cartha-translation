id: 2SA.13.13
reference: 2 Samuel 13:13
source:
  edition: WLC
  text: וַ/אֲנִ֗י אָ֤נָה אוֹלִיךְ֙ אֶת חֶרְפָּתִ֔/י וְ/אַתָּ֗ה תִּהְיֶ֛ה כְּ/אַחַ֥ד
    הַ/נְּבָלִ֖ים בְּ/יִשְׂרָאֵ֑ל וְ/עַתָּה֙ דַּבֶּר נָ֣א אֶל הַ/מֶּ֔לֶךְ כִּ֛י לֹ֥א
    יִמְנָעֵ֖/נִי מִמֶּֽ/ךָּ־־־׃
translation:
  text: As for me, where could I carry my disgrace? And you—you would be like one
    of the vile men in Israel. So now, please speak to the king, for he will not withhold
    me from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my shame' or 'my reproach.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like one of the fools in Israel'; Hebrew נְבָלִים often refers to morally
      shameless or disgraceful people, not merely the intellectually foolish.
    reason: lexical_alternative
  - marker: c
    text: That is, 'he will not refuse to give me to you.' Tamar's statement may reflect
      either a genuine appeal or a desperate attempt to delay Amnon.
    reason: alternative_reading
lexical_decisions:
- source_word: אָ֤נָה
  chosen: where
  alternatives:
  - how
  - to where
  lexicon: HALOT
  rationale: 'Interrogative adverb introducing a rhetorical question about destination:
    ''where could I carry...?'' This fits the following verb of movement and the sense
    of social displacement/shame.'
- source_word: אוֹלִיךְ
  chosen: could I carry
  alternatives:
  - would I bring
  - could I take away
  lexicon: HALOT
  rationale: Hiphil of הלך literally 'cause to go/carry.' In context Tamar speaks
    of bearing or carrying away her reproach/disgrace. 'Could I carry' preserves the
    movement metaphor while sounding natural in English.
- source_word: חֶרְפָּתִי
  chosen: my disgrace
  alternatives:
  - my reproach
  - my shame
  lexicon: HALOT
  rationale: Refers to the public dishonor that would result from Amnon's act. 'Disgrace'
    communicates social shame clearly in modern English; 'reproach' is more formal
    but less natural.
- source_word: כְּאַחַד הַנְּבָלִים
  chosen: like one of the vile men
  alternatives:
  - like one of the fools
  - like one of the scoundrels
  lexicon: HALOT
  rationale: נבל in this moral context denotes a base, disgraceful, morally senseless
    person, not merely someone intellectually foolish. 'Vile men' best captures the
    ethical condemnation in readable English.
- source_word: דַּבֶּר נָא
  chosen: please speak
  alternatives:
  - please talk
  - speak, please
  lexicon: HALOT
  rationale: Imperative plus particle of entreaty. 'Please speak' preserves the urgent
    plea without sounding archaic.
- source_word: יִמְנָעֵנִי מִמֶּךָּ
  chosen: he will not withhold me from you
  alternatives:
  - he will not refuse me to you
  - he will not keep me from you
  - he will not deny me to you
  lexicon: HALOT
  rationale: מנע means withhold, keep back, prevent. The idiom here concerns the king
    not refusing Tamar to Amnon in marriage. 'Withhold me from you' is the most direct
    rendering of the Hebrew syntax while remaining intelligible.
