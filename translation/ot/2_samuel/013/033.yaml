id: 2SA.13.33
reference: 2 Samuel 13:33
source:
  edition: WLC
  text: וְ/עַתָּ֡ה אַל יָשֵׂם֩ אֲדֹנִ֨/י הַ/מֶּ֤לֶךְ אֶל לִבּ/וֹ֙ דָּבָ֣ר לֵ/אמֹ֔ר
    כָּל בְּנֵ֥י הַ/מֶּ֖לֶךְ מֵ֑תוּ כִּֽי אִם אַמְנ֥וֹן לְ/בַדּ֖/וֹ מֵֽת־־־־־׃פ
translation:
  text: Now let not my lord the king take this matter to heart, saying, ‘All the king’s
    sons are dead,’ for Amnon alone is dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'do not set this word/matter on his heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - So now
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing Jonadab’s corrective statement. 'Now' is
    natural modern English and preserves the transition.
- source_word: אַל יָשֵׂם ... אֶל לִבּוֹ
  chosen: let not ... take ... to heart
  alternatives:
  - do not let ... set ... on his heart
  - do not take seriously
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves 'setting' something 'to the heart.'
    'Take to heart' preserves the idiomatic sense in readable English without flattening
    it into mere cognition.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Standard courtly address. 'Lord' fits the deferential sense here better
    than 'master' in contemporary English.
- source_word: דָּבָר
  chosen: this matter
  alternatives:
  - this thing
  - this report
  - this word
  lexicon: HALOT
  rationale: In context Jonadab refers to the reported claim about the king's sons.
    'Matter' is idiomatic and broad enough to cover the report/event.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - namely
  lexicon: HALOT
  rationale: Introduces the content of what David is urged not to take to heart. 'Saying'
    is a standard and sufficiently formal rendering.
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  chosen: All the king’s sons
  alternatives:
  - all of the king's sons
  lexicon: HALOT
  rationale: Straightforward construct phrase. 'Sons' should be retained rather than
    generalized, since the referent is specifically David's male children present
    at the feast.
- source_word: מֵתוּ
  chosen: are dead
  alternatives:
  - have died
  - died
  lexicon: HALOT
  rationale: 'English present stative best matches the reported conclusion in direct
    speech: the supposed state is that they are dead.'
- source_word: כִּי אִם
  chosen: for ... alone
  alternatives:
  - but only
  - except that
  lexicon: HALOT
  rationale: 'Here the construction is exceptive/corrective: not all are dead; only
    Amnon is. ''For Amnon alone is dead'' reads naturally while preserving the correction.'
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'Emphasizes exclusivity: Amnon only, not all the king''s sons.'
- source_word: מֵת
  chosen: is dead
  alternatives:
  - has died
  - died
  lexicon: HALOT
  rationale: Matches the stative force used in the correction and keeps the contrast
    with the earlier false report.
