id: 2SA.13.2
reference: 2 Samuel 13:2
source:
  edition: WLC
  text: וַ/יֵּ֨צֶר לְ/אַמְנ֜וֹן לְ/הִתְחַלּ֗וֹת בַּֽ/עֲבוּר֙ תָּמָ֣ר אֲחֹת֔/וֹ כִּ֥י
    בְתוּלָ֖ה הִ֑יא וַ/יִּפָּלֵא֙ בְּ/עֵינֵ֣י אַמְנ֔וֹן לַ/עֲשׂ֥וֹת לָ֖/הּ מְאֽוּמָה׃
translation:
  text: Amnon was so distressed that he made himself sick because of Tamar his sister,
    for she was a virgin, and it seemed impossible in Amnon’s eyes to do anything
    to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Amnon was distressed to the point of becoming sick because of Tamar
      his sister.' The Hebrew expression can be understood either as reflexive ('made
      himself sick') or as describing the result ('became sick').
    reason: lexical_alternative
  - marker: b
    text: The phrase 'it seemed impossible in Amnon’s eyes' is a Hebrew idiom meaning
      that Amnon saw no feasible way to act.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֶר
  chosen: was so distressed
  alternatives:
  - was distressed
  - was tormented
  - was in anguish
  lexicon: HALOT
  rationale: From יצר in this stem/context, the sense is that Amnon was emotionally
    constrained or distressed. English 'was so distressed' captures the internal pressure
    that leads into 'made himself sick' without over-paraphrasing.
- source_word: לְהִתְחַלּוֹת
  chosen: that he made himself sick
  alternatives:
  - to become sick
  - to make himself ill
  lexicon: HALOT
  rationale: The hitpael infinitive of חלה can mean to become sick or make oneself
    sick. In context, the phrase describes the effect of his obsession; 'made himself
    sick' best reflects the reflexive nuance and the progression of the narrative.
- source_word: בַּעֲבוּר
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: Here the preposition marks cause, not benefit. 'Because of' is the most
    natural modern English rendering.
- source_word: אֲחֹתוֹ
  chosen: his sister
  lexicon: HALOT
  rationale: Straightforward kinship term; retaining it is important because the relationship
    is central to the narrative and moral horror of the episode.
- source_word: בְתוּלָה
  chosen: a virgin
  alternatives:
  - unmarried virgin
  - maiden
  lexicon: HALOT
  rationale: The Hebrew specifically denotes virginity. 'Virgin' is the clearest and
    most direct English equivalent; 'maiden' is too vague and archaic.
- source_word: וַיִּפָּלֵא בְּעֵינֵי אַמְנוֹן
  chosen: it seemed impossible in Amnon’s eyes
  alternatives:
  - it was too difficult for Amnon
  - it seemed extraordinary to Amnon
  lexicon: HALOT
  rationale: The idiom with פלא expresses something being beyond reach or too difficult
    from Amnon's perspective. 'It seemed impossible in Amnon’s eyes' preserves the
    Hebrew viewpoint idiom while remaining readable.
- source_word: לַעֲשׂוֹת לָהּ מְאוּמָה
  chosen: to do anything to her
  alternatives:
  - to do anything for her
  - to do the least thing to her
  lexicon: HALOT
  rationale: מְאוּמָה means 'anything' or 'the slightest thing.' In this context,
    the phrase refers broadly to taking any action toward her. 'To do anything to
    her' follows the Hebrew closely and fits the narrative setup, without prematurely
    specifying the later crime.
