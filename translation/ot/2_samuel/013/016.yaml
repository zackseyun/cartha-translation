id: 2SA.13.16
reference: 2 Samuel 13:16
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר ל֗/וֹ אַל אוֹדֹ֞ת הָ/רָעָ֤ה הַ/גְּדוֹלָה֙ הַ/זֹּ֔את מֵ/אַחֶ֛רֶת
    אֲשֶׁר עָשִׂ֥יתָ עִמִּ֖/י לְ/שַׁלְּחֵ֑/נִי וְ/לֹ֥א אָבָ֖ה לִ/שְׁמֹ֥עַֽ לָֽ/הּ־־׃
translation:
  text: But she said to him, “No, my brother, for this wrong of sending me away is
    greater than the other that you did to me.” But he would not listen to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Do not, because this great wrong—sending me away—is
      greater than the other that you did to me.' The Hebrew is compressed and difficult,
      so English must smooth the syntax.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: 'No'
  alternatives:
  - Do not
  lexicon: HALOT
  rationale: Although אַל often introduces a prohibition ('do not'), in this elliptical
    direct-speech context it functions as an urgent refusal/objection. Rendering it
    as 'No' gives natural English while preserving Tamar's protest.
- source_word: אוֹדֹת
  chosen: for
  alternatives:
  - concerning
  - because of
  lexicon: HALOT
  rationale: The noun/preposition here introduces the matter under protest. In idiomatic
    English, 'for' best connects Tamar's objection with the following clause.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  chosen: this wrong
  alternatives:
  - this great evil
  - this great wrong
  lexicon: HALOT
  rationale: רָעָה can denote evil, harm, or wrong. In this interpersonal and legal-moral
    context, 'wrong' is clear modern English. The adjective גְּדוֹלָה is carried forward
    comparatively in 'is greater than,' avoiding awkward repetition while preserving
    the sense.
- source_word: מֵאַחֶרֶת אֲשֶׁר עָשִׂיתָ עִמִּי
  chosen: than the other that you did to me
  alternatives:
  - than the other wrong that you did to me
  - than what you did to me before
  lexicon: HALOT
  rationale: אַחֶרֶת is feminine singular 'other,' referring back to an implied prior
    wrong. The translation keeps the comparison explicit without over-specifying beyond
    the Hebrew.
- source_word: לְשַׁלְּחֵנִי
  chosen: of sending me away
  alternatives:
  - to send me away
  - in sending me away
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix expresses the act under discussion.
    'Of sending me away' fits the English syntax after 'this wrong' and preserves
    the action's force.
- source_word: וְלֹא אָבָה לִשְׁמֹעַ לָהּ
  chosen: But he would not listen to her
  alternatives:
  - But he was unwilling to listen to her
  - and he would not hear her
  lexicon: HALOT
  rationale: אָבָה conveys willingness/refusal. 'Would not listen' is idiomatic and
    preserves the volitional refusal. A new sentence with 'But' reflects the narrative
    turn clearly.
- source_word: לּוֹ
  chosen: to him
  lexicon: HALOT
  rationale: Standard indirect-object rendering in direct speech introduction.
