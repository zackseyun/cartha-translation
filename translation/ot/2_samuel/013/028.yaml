theological_decisions:
- issue: Gendered expression in לִבְנֵי חָיִל
  chosen_reading: be men of valor
  alternative_readings:
  - be courageous
  - be valiant
  rationale: The Hebrew expression is grammatically and semantically masculine, addressed
    to male retainers in a violent royal setting. A gender-neutral rendering would
    flatten the source's form and social context. The phrase is idiomatic, but the
    masculine element should be retained per the translation philosophy's gender-accurate
    principle.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
