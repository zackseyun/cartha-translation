id: 2SA.13.28
reference: 2 Samuel 13:28
source:
  edition: WLC
  text: וַ/יְצַו֩ אַבְשָׁל֨וֹם אֶת נְעָרָ֜י/ו לֵ/אמֹ֗ר רְא֣וּ נָ֠א כְּ/ט֨וֹב לֵב אַמְנ֤וֹן
    בַּ/יַּ֨יִן֙ וְ/אָמַרְתִּ֣י אֲלֵי/כֶ֔ם הַכּ֧וּ אֶת אַמְנ֛וֹן וַ/הֲמִתֶּ֥ם אֹת֖/וֹ
    אַל תִּירָ֑אוּ הֲ/ל֗וֹא כִּ֤י אָֽנֹכִי֙ צִוִּ֣יתִי אֶתְ/כֶ֔ם חִזְק֖וּ וִ/הְי֥וּ
    לִ/בְנֵי חָֽיִל־־־־־׃
translation:
  text: 'Then Absalom commanded his young men, saying, “Please watch: when Amnon’s
    heart is merry with wine, and I say to you, ‘Strike Amnon,’ then kill him. Do
    not fear. Have I not myself commanded you? Be strong, and be men of valor.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when Amnon is in good spirits from wine.' The Hebrew idiom literally
      speaks of his heart being good with wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְעָרָיו
  chosen: his young men
  alternatives:
  - his servants
  - his attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, attendant, or armed retainer depending
    on context. Here Absalom is issuing orders to his personal agents who will carry
    out violence, so 'young men' preserves the literal sense while fitting the narrative
    setting better than the more domesticated 'servants.'
- source_word: רְאוּ נָא
  chosen: Please watch
  alternatives:
  - See now
  - Look, please
  - Take notice
  lexicon: HALOT
  rationale: The imperative of ראה with particle נָא is an urgent directive to pay
    attention. 'Please watch' is natural modern English and preserves the command
    force without sounding archaic.
- source_word: כְּטוֹב לֵב אַמְנוֹן בַּיַּיִן
  chosen: when Amnon’s heart is merry with wine
  alternatives:
  - when Amnon is in good spirits from wine
  - when Amnon feels good from the wine
  lexicon: HALOT
  rationale: The idiom 'good of heart' with wine refers to a cheerful, wine-loosened
    state, not necessarily full drunkenness. 'Merry with wine' preserves the Hebrew
    idiom's affective sense and its connection to wine.
- source_word: הַכּוּ אֶת אַמְנוֹן
  chosen: Strike Amnon
  alternatives:
  - Attack Amnon
  - Hit Amnon
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting, often in violent contexts.
    'Strike' is concise and leaves room for the following verb to specify the lethal
    outcome.
- source_word: וַהֲמִתֶּם אֹתוֹ
  chosen: then kill him
  alternatives:
  - and put him to death
  - and you shall kill him
  lexicon: HALOT
  rationale: מות in the Hiphil means to cause to die, kill, put to death. 'Then kill
    him' reflects the sequence after the signal and is idiomatic in English.
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A direct prohibition. 'Do not fear' is slightly more formal and forceful,
    fitting the military tone of the command.
- source_word: הֲלוֹא כִּי אָנֹכִי צִוִּיתִי אֶתְכֶם
  chosen: Have I not myself commanded you?
  alternatives:
  - Have I not commanded you?
  - Was it not I who commanded you?
  lexicon: HALOT
  rationale: The rhetorical question reassures them by appealing to Absalom's authority.
    Including 'myself' brings out the emphatic אָנֹכִי.
- source_word: חִזְקוּ
  chosen: Be strong
  alternatives:
  - Take courage
  - Be resolute
  lexicon: HALOT
  rationale: חזק in the imperative often calls for strength or courage. 'Be strong'
    is the most direct and familiar rendering.
- source_word: וִהְיוּ לִבְנֵי חָיִל
  chosen: be men of valor
  alternatives:
  - show yourselves valiant men
  - be courageous men
  - be mighty men
  lexicon: HALOT
  rationale: בני חיל is an idiom for valiant, capable, or courageous men, often with
    martial overtones. 'Men of valor' preserves the masculine form and the idiomatic
    force in readable English, in line with the project's gender-accurate policy.
