id: 2SA.13.29
reference: 2 Samuel 13:29
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֞וּ נַעֲרֵ֤י אַבְשָׁלוֹם֙ לְ/אַמְנ֔וֹן כַּ/אֲשֶׁ֥ר צִוָּ֖ה אַבְשָׁל֑וֹם
    וַ/יָּקֻ֣מוּ כָּל בְּנֵ֣י הַ/מֶּ֗לֶךְ וַֽ/יִּרְכְּב֛וּ אִ֥ישׁ עַל פִּרְדּ֖/וֹ
    וַ/יָּנֻֽסוּ׀־־׃
translation:
  text: So Absalom’s young men did to Amnon as Absalom had commanded. Then all the
    king’s sons arose, and each mounted his mule and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''did to Amnon as Absalom had commanded.'' The previous verse
      states the command explicitly: to strike Amnon down when his heart was merry
      with wine.'
    reason: cross_reference
  - marker: b
    text: Or 'Absalom’s servants' / 'Absalom’s attendants.' The Hebrew term can refer
      to young men in service.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי אַבְשָׁלוֹם
  chosen: Absalom’s young men
  alternatives:
  - Absalom’s servants
  - Absalom’s attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to Absalom’s agents carrying out his order, likely retainers/servants,
    but 'young men' preserves the lexical form and remains natural English without
    overstating household status.
- source_word: וַיַּעֲשׂוּ לְאַמְנוֹן
  chosen: did to Amnon
  alternatives:
  - treated Amnon
  - dealt with Amnon
  lexicon: HALOT
  rationale: The verb עשה with ל marks action done toward Amnon. Because the preceding
    verse specifies the command to strike Amnon, 'did to Amnon' preserves the Hebrew’s
    terseness and lets the immediate context supply the violent content without adding
    words not present here.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: as ... had commanded
  alternatives:
  - just as ... commanded
  - according to what ... commanded
  lexicon: HALOT
  rationale: This comparative clause indicates conformity to Absalom’s prior order.
    English pluperfect 'had commanded' fits the narrative sequence.
- source_word: וַיָּקֻמוּ
  chosen: arose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: '''Arose'' fits the elevated narrative style and reflects the sudden
    reaction of the king’s sons.'
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  chosen: all the king’s sons
  alternatives:
  - all the sons of the king
  lexicon: HALOT
  rationale: A straightforward construct rendering. 'Sons' is gender-accurate and
    contextually specific, referring to David’s male sons present at the feast.
- source_word: וַיִּרְכְּבוּ אִישׁ עַל פִּרְדּוֹ
  chosen: each mounted his mule
  alternatives:
  - every man rode on his mule
  - each rode on his mule
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' here. פֶּרֶד denotes a mule. 'Mounted
    his mule' is idiomatic and concise.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb נוּס means to flee. 'Fled' best captures the urgent flight in
    formal but readable English.
