id: 2SA.13.38
reference: 2 Samuel 13:38
source:
  edition: WLC
  text: וְ/אַבְשָׁל֥וֹם בָּרַ֖ח וַ/יֵּ֣לֶךְ גְּשׁ֑וּר וַ/יְהִי שָׁ֖ם שָׁלֹ֥שׁ שָׁנִֽים־׃
translation:
  text: But Absalom fled and went to Geshur, and he was there three years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "And Absalom fled and went to Geshur." The Hebrew conjunction can be
      rendered either "and" or "but" in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, "and he was there three years"; alternatively, "and he
      stayed there three years."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  chosen: But Absalom
  alternatives:
  - And Absalom
  rationale: The conjunction ו can be rendered 'and' or, in narrative context, 'but'
    to mark a slight contrast/resumption after the previous verse. 'Absalom' is transliterated
    as a personal name per translation philosophy.
- source_word: בָּרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: ברח commonly means 'flee' or 'run away.' 'Fled' is concise, natural English
    and preserves the sense of flight.
- source_word: וַ/יֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - came
  lexicon: HALOT
  rationale: הלך in the waw-consecutive narrative sequence is straightforwardly 'went.'
    'Departed' is possible but less direct.
- source_word: גְּשׁוּר
  chosen: Geshur
  rationale: Place name transliterated by standard English convention.
- source_word: וַ/יְהִי שָׁם
  chosen: and he was there
  alternatives:
  - and he stayed there
  - and he remained there
  lexicon: HALOT
  rationale: The Hebrew is literally 'and he was there.' This is retained in readable
    English. 'Stayed' or 'remained' are interpretive expansions of היה that are possible
    but not necessary.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: three years
  lexicon: HALOT
  rationale: Standard rendering of the numeral plus noun phrase indicating duration.
