id: 2SA.13.25
reference: 2 Samuel 13:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶל אַבְשָׁל֗וֹם אַל בְּנִ/י֙ אַל נָ֤א נֵלֵךְ֙ כֻּלָּ֔/נוּ
    וְ/לֹ֥א נִכְבַּ֖ד עָלֶ֑י/ךָ וַ/יִּפְרָץ בּ֛/וֹ וְ/לֹֽא אָבָ֥ה לָ/לֶ֖כֶת וַֽ/יְבָרֲכֵֽ/הוּ־־־־־׃
translation:
  text: But the king said to Absalom, “No, my son, please let us not all go, lest
    we be a burden on you.” And he pressed him, but he was not willing to go; so he
    blessed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and let us not be heavy upon you,” expressing concern that the royal
      party would impose on Absalom’s feast.
    reason: lexical_alternative
  - marker: b
    text: Or, “he urged him strongly” / “he insisted,” for the Hebrew idiom “he pressed
      him.”
    reason: lexical_alternative
  - marker: c
    text: Or, “he refused to go.” The Hebrew can emphasize either unwillingness or
      refusal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: 'No'
  alternatives:
  - Do not
  lexicon: HALOT
  rationale: The first אַל functions as an immediate negative response to Absalom’s
    invitation rather than a simple prohibition. 'No' captures the discourse force
    in natural English.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: A direct filial address from David to Absalom. 'My son' preserves both
    the relational and emotional tone.
- source_word: אַל נָא נֵלֵךְ כֻּלָּנוּ
  chosen: please let us not all go
  alternatives:
  - please, let us not go, all of us
  - do not, please, let all of us go
  lexicon: HALOT
  rationale: Combines prohibition particle אַל with polite particle נָא and first
    person plural cohortative/imperfect sense. The English wording preserves the plea-like
    tone and includes 'all' explicitly from כֻּלָּנוּ.
- source_word: וְלֹא נִכְבַּד עָלֶיךָ
  chosen: lest we be a burden on you
  alternatives:
  - and let us not be heavy upon you
  - so that we may not weigh you down
  lexicon: HALOT
  rationale: From כבד in the sense of being heavy/burdensome. Idiomatic English 'be
    a burden on you' best conveys the meaning without wooden literalism.
- source_word: וַיִּפְרָץ בּוֹ
  chosen: And he pressed him
  alternatives:
  - And he urged him strongly
  - And he insisted with him
  lexicon: HALOT
  rationale: The verb פרץ with ב here conveys forceful urging or pressing. 'Pressed
    him' is concise and fits the context of repeated invitation.
- source_word: וְלֹא אָבָה לָלֶכֶת
  chosen: but he was not willing to go
  alternatives:
  - but he refused to go
  - but he would not go
  lexicon: HALOT
  rationale: אָבָה denotes willingness/consent. 'Was not willing to go' preserves
    the nuance of declined consent, slightly softer than an absolute 'refused,' though
    that is contextually possible.
- source_word: וַיְבָרֲכֵהוּ
  chosen: so he blessed him
  alternatives:
  - and he blessed him
  - and he took leave of him with a blessing
  lexicon: HALOT
  rationale: ברך is straightforwardly 'bless.' In this narrative context it likely
    signals a favorable parting response; 'so he blessed him' connects naturally to
    the preceding refusal.
