id: 2SA.13.23
reference: 2 Samuel 13:23
source:
  edition: WLC
  text: וַֽ/יְהִי֙ לִ/שְׁנָתַ֣יִם יָמִ֔ים וַ/יִּהְי֤וּ גֹֽזְזִים֙ לְ/אַבְשָׁל֔וֹם
    בְּ/בַ֥עַל חָצ֖וֹר אֲשֶׁ֣ר עִם אֶפְרָ֑יִם וַ/יִּקְרָ֥א אַבְשָׁל֖וֹם לְ/כָל בְּנֵ֥י
    הַ/מֶּֽלֶךְ־־׃
translation:
  text: Now it happened after two full years that Absalom had sheep shearers at Baal-hazor,
    which is near Ephraim, and Absalom invited all the king’s sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''after two years of days,'' an idiom meaning a full two-year period.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁנָתַיִם יָמִים
  chosen: after two full years
  alternatives:
  - at the end of two years
  - after two years
  lexicon: HALOT
  rationale: The idiom literally combines 'two years' with 'days,' a Hebrew way of
    expressing a complete period. 'After two full years' conveys the elapsed and completed
    span naturally in English without flattening the idiom.
- source_word: גֹזְזִים
  chosen: sheep shearers
  alternatives:
  - shearers
  lexicon: HALOT
  rationale: The participle from גזז in this context refers to those shearing sheep.
    'Sheep shearers' makes the implied object explicit for modern English readers
    and fits the festive setting known from similar passages.
- source_word: בְּבַעַל חָצוֹר
  chosen: at Baal-hazor
  alternatives:
  - in Baal-hazor
  lexicon: HALOT
  rationale: This is a place name and is transliterated rather than translated, following
    the philosophy to transliterate names. 'At' suits the event-location sense in
    English.
- source_word: אֲשֶׁר עִם אֶפְרָיִם
  chosen: which is near Ephraim
  alternatives:
  - which is beside Ephraim
  - which is with Ephraim
  lexicon: HALOT
  rationale: The preposition עִם can denote proximity/association here. 'Near Ephraim'
    gives the likely geographical sense in idiomatic English better than the overly
    literal 'with Ephraim.'
- source_word: וַיִּקְרָא
  chosen: invited
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: Although the verb literally means 'called,' in this banquet context the
    sense is that Absalom invited the king's sons to the shearing feast. 'Invited'
    communicates the pragmatic force while remaining faithful to the narrative situation.
- source_word: לְכָל בְּנֵי הַמֶּלֶךְ
  chosen: all the king’s sons
  alternatives:
  - all the sons of the king
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'All the king’s sons' is natural
    modern English and preserves the familial and royal reference.
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now after this
  lexicon: HALOT
  rationale: This common narrative opener marks sequence and transition. 'Now it happened'
    preserves the Hebrew storytelling cadence in readable English.
