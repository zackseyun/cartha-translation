id: 2SA.13.10
reference: 2 Samuel 13:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אַמְנ֜וֹן אֶל תָּמָ֗ר הָבִ֤יאִי הַ/בִּרְיָה֙ הַ/חֶ֔דֶר וְ/אֶבְרֶ֖ה
    מִ/יָּדֵ֑/ךְ וַ/תִּקַּ֣ח תָּמָ֗ר אֶת הַ/לְּבִבוֹת֙ אֲשֶׁ֣ר עָשָׂ֔תָה וַ/תָּבֵ֛א
    לְ/אַמְנ֥וֹן אָחִ֖י/הָ הֶ/חָֽדְרָ/ה־־׃
translation:
  text: Then Amnon said to Tamar, “Bring the food into the inner room, so that I may
    eat from your hand.” So Tamar took the cakes she had made and brought them into
    the inner room to Amnon her brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the chamber” or simply “the room.” The Hebrew חֶדֶר refers to an interior
      room; “inner room” is chosen here to reflect the secluded setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאִי
  chosen: Bring
  alternatives:
  - Take
  - Bring here
  lexicon: HALOT
  rationale: Imperative feminine singular of בוא in the causative sense, directing
    Tamar to bring something to another location. 'Bring' is the most natural English
    command in context.
- source_word: הַבִּרְיָה
  chosen: the food
  alternatives:
  - the meal
  - the portion of food
  lexicon: HALOT
  rationale: This noun refers to prepared food for eating. 'Food' is broad enough
    to fit the context and avoids over-specifying the dish, since the more specific
    item appears later as לְבִבוֹת.
- source_word: הַחֶדֶר
  chosen: the inner room
  alternatives:
  - the chamber
  - the room
  lexicon: HALOT
  rationale: חֶדֶר denotes an interior room or chamber. Because the noun appears twice
    in the verse, rendering it consistently as 'inner room' helps convey the more
    secluded setting implied by the narrative.
- source_word: וְאֶבְרֶה
  chosen: so that I may eat
  alternatives:
  - that I may eat
  - and let me eat
  lexicon: HALOT
  rationale: From ברה in this context, the sense is eating or taking food. The cohortative
    nuance is well represented by 'so that I may eat' after the command.
- source_word: מִיָּדֵךְ
  chosen: from your hand
  alternatives:
  - from your hands
  - by your hand
  lexicon: HALOT
  rationale: A literal rendering preserves the manipulative intimacy of Amnon's request.
    Singular 'hand' matches the Hebrew idiom and is natural in English.
- source_word: הַלְּבִבוֹת
  chosen: the cakes
  alternatives:
  - the cakes of dough
  - the pastries
  lexicon: HALOT
  rationale: The term refers to the special cakes Tamar prepared in the preceding
    context. 'Cakes' is the established and sufficiently precise English equivalent.
- source_word: אָחִיהָ
  chosen: her brother
  lexicon: HALOT
  rationale: Explicitly rendering the kinship term is important to the narrative and
    moral force of the passage.
- source_word: הֶחָדְרָה
  chosen: into the inner room
  alternatives:
  - into the chamber
  - into the room
  lexicon: HALOT
  rationale: The directional ending on חֶדֶר indicates motion into the room. Rendering
    it consistently with the earlier occurrence preserves the narrative emphasis on
    seclusion.
