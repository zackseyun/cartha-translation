id: 2SA.13.7
reference: 2 Samuel 13:7
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח דָּוִ֛ד אֶל תָּמָ֖ר הַ/בַּ֣יְתָ/ה לֵ/אמֹ֑ר לְכִ֣י נָ֗א בֵּ֚ית
    אַמְנ֣וֹן אָחִ֔י/ךְ וַ/עֲשִׂי ל֖/וֹ הַ/בִּרְיָֽה־־׃
translation:
  text: Then David sent word to Tamar at the house, saying, “Please go to the house
    of your brother Amnon and make the food for him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “make him a restorative dish” or “prepare the meal for him.” The Hebrew
      term refers to food prepared for an invalid or convalescent person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  lexicon: HALOT
  rationale: The verb means 'sent.' Because it is followed by אֶל plus a person and
    לֵאמֹר introducing the message, English idiom is clearer with 'sent word' rather
    than the more wooden 'sent to Tamar.'
- source_word: הַבַּיְתָה
  chosen: at the house
  alternatives:
  - home
  - to the house
  lexicon: HALOT
  rationale: The directional ending on 'house' can suggest movement toward the house,
    but in context David is sending a message to Tamar where she is located. 'At the
    house' communicates the situational sense naturally in English without overtranslating.
- source_word: לְכִי נָא
  chosen: Please go
  alternatives:
  - Go, please
  - Please come/go
  lexicon: HALOT
  rationale: Imperative feminine singular with particle נָא, which softens the command
    into a polite request. 'Please go' captures both the imperative and the politeness.
- source_word: בֵּית אַמְנוֹן אָחִיךְ
  chosen: the house of your brother Amnon
  alternatives:
  - your brother Amnon's house
  - Amnon your brother's house
  lexicon: HALOT
  rationale: Construct chain literally means 'house of Amnon your brother.' The chosen
    rendering is clear, preserves the kinship term, and reflects the Hebrew syntax
    closely enough for readable English.
- source_word: וַעֲשִׂי לוֹ
  chosen: and make ... for him
  alternatives:
  - and prepare ... for him
  - and make for him
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In this culinary context, 'make ... for him'
    is natural English and leaves the object to be specified by the following noun.
- source_word: הַבִּרְיָה
  chosen: the food
  alternatives:
  - the meal
  - the cakes
  - the recovery food
  lexicon: HALOT
  rationale: The noun refers to food prepared for a sick person, likely a restorative
    dish. Since English lacks a simple exact equivalent, 'the food' is a restrained
    rendering in context. More specific options like 'cakes' are influenced by the
    wider narrative rather than this word alone; 'recovery food' is interpretive and
    awkward in the main text.
