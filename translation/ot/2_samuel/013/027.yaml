id: 2SA.13.27
reference: 2 Samuel 13:27
source:
  edition: WLC
  text: וַ/יִּפְרָץ בּ֖/וֹ אַבְשָׁל֑וֹם וַ/יִּשְׁלַ֤ח אִתּ/וֹ֙ אֶת אַמְנ֔וֹן וְ/אֵ֖ת
    כָּל בְּנֵ֥י הַ/מֶּֽלֶךְ־־־׃ס
translation:
  text: But Absalom pressed him, so he sent Amnon and all the king’s sons with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Absalom urged him' / 'Absalom prevailed upon him.' The Hebrew idiom
      is stronger than a simple request and indicates persistent pressure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרָץ בּוֹ
  chosen: pressed him
  alternatives:
  - urged him
  - prevailed upon him
  - insisted to him
  lexicon: HALOT
  rationale: The verb פרץ with בְּ on a person here is idiomatic and contextually
    means to press or urge someone insistently, not literally 'break through.' In
    the narrative flow, Absalom is urging David after David's initial refusal in the
    previous verse. 'Pressed him' is concise, natural English that preserves the force
    of persistent urging.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he let go
  - he dispatched
  lexicon: HALOT
  rationale: In context David grants the request and sends them to Absalom's feast.
    'Sent' is the standard and most natural rendering for שלח here.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - with Absalom
  lexicon: HALOT
  rationale: The pronominal form literally reads 'with him.' In context the referent
    is Absalom. Retaining the pronoun preserves the Hebrew form while remaining clear
    in English.
- source_word: אֶת אַמְנוֹן
  chosen: Amnon
  rationale: Direct object marker is untranslated; the personal name is transliterated
    in standard English form.
- source_word: וְאֵת כָּל בְּנֵי הַמֶּלֶךְ
  chosen: and all the king’s sons
  alternatives:
  - and all the sons of the king
  lexicon: HALOT
  rationale: This construct phrase refers specifically to David's royal sons. 'The
    king’s sons' is idiomatic modern English and preserves the familial and royal
    sense.
