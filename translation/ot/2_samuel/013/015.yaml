id: 2SA.13.15
reference: 2 Samuel 13:15
source:
  edition: WLC
  text: וַ/יִּשְׂנָאֶ֣/הָ אַמְנ֗וֹן שִׂנְאָה֙ גְּדוֹלָ֣ה מְאֹ֔ד כִּ֣י גְדוֹלָ֗ה הַ/שִּׂנְאָה֙
    אֲשֶׁ֣ר שְׂנֵאָ֔/הּ מֵ/אַהֲבָ֖ה אֲשֶׁ֣ר אֲהֵבָ֑/הּ וַֽ/יֹּאמֶר לָ֥/הּ אַמְנ֖וֹן
    ק֥וּמִי לֵֽכִי־׃
translation:
  text: Then Amnon hated her with very great hatred, because the hatred with which
    he hated her was greater than the love with which he had loved her. And Amnon
    said to her, “Get up, go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Get up, go.'' The abrupt two-word command conveys Amnon''s harsh
      dismissal; some English versions expand the sense with ''be gone'' or ''go away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂנָאֶהָ
  chosen: Then Amnon hated her
  alternatives:
  - And Amnon hated her
  - So Amnon hated her
  lexicon: HALOT
  rationale: 'The waw-consecutive advances the narrative, naturally rendered ''Then''
    in English. שׂנא means ''hate.'' The 3fs suffix makes Tamar the object: ''her.'''
- source_word: שִׂנְאָה גְּדוֹלָה מְאֹד
  chosen: with very great hatred
  alternatives:
  - exceedingly
  - with an exceedingly great hatred
  - with intense hatred
  lexicon: HALOT
  rationale: This is an accusative of manner/intensity reinforcing the verb. 'Very
    great hatred' preserves the Hebrew's emphatic piling up better than a smoother
    but less transparent paraphrase like 'intensely.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement. 'Because' is
    clearer in modern English than 'for' while preserving the causal force.
- source_word: גְדוֹלָה הַשִּׂנְאָה
  chosen: the hatred ... was greater
  alternatives:
  - great was the hatred
  - the hatred was great
  lexicon: HALOT
  rationale: The clause is comparative in sense because of the following מִן construction.
    Rendering 'was greater' brings out the comparison explicitly and idiomatically
    in English.
- source_word: אֲשֶׁר שְׂנֵאָהּ
  chosen: with which he hated her
  alternatives:
  - that he hated her with
  lexicon: HALOT
  rationale: The relative clause modifies 'hatred.' 'With which he hated her' is the
    most natural English equivalent while preserving the Hebrew construction.
- source_word: מֵאַהֲבָה
  chosen: than the love
  alternatives:
  - more than the love
  - from the love
  lexicon: HALOT
  rationale: 'The preposition מִן marks comparison here: the hatred was greater than
    the love. ''Than'' is the idiomatic English comparative marker.'
- source_word: אֲשֶׁר אֲהֵבָהּ
  chosen: with which he had loved her
  alternatives:
  - that he loved her with
  - with which he loved her
  lexicon: HALOT
  rationale: The perfect refers to prior action relative to the new hatred. English
    past perfect ('had loved') best captures the sequence.
- source_word: קוּמִי
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: Second feminine singular imperative. 'Get up' is natural modern English
    and preserves the abrupt command.
- source_word: לֵכִי
  chosen: go
  alternatives:
  - leave
  - be gone
  lexicon: HALOT
  rationale: הלך in the imperative is simply 'go.' 'Leave' is interpretive; 'go' preserves
    the stark brevity of Amnon's dismissal.
