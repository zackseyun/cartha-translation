id: 2SA.13.34
reference: 2 Samuel 13:34
source:
  edition: WLC
  text: וַ/יִּבְרַ֖ח אַבְשָׁל֑וֹם וַ/יִּשָּׂ֞א הַ/נַּ֤עַר הַ/צֹּפֶה֙ אֶת עינ/ו וַ/יַּ֗רְא
    וְ/הִנֵּ֨ה עַם רַ֜ב הֹלְכִ֥ים מִ/דֶּ֛רֶךְ אַחֲרָ֖י/ו מִ/צַּ֥ד הָ/הָֽר־־׃
translation:
  text: But Absalom fled. And the young man who was watching lifted up his eyes and
    saw, and behold, many people were coming by the road behind him, from the side
    of the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the watchman' for 'the young man who was watching'; the Hebrew combines
      'young man/attendant' with a participle meaning 'watching' or 'keeping lookout.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'lifted up his eyes,' an idiom meaning he looked up.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the road behind him, from the mountainside.' The exact spatial
      relation in the Hebrew is somewhat compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb ברח denotes flight/escape. 'Fled' is concise, natural, and preserves
    the narrative force better than the more colloquial 'ran away.'
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הַנַּעַר הַצֹּפֶה
  chosen: the young man who was watching
  alternatives:
  - the servant/watchman
  - the young man, the lookout
  - the watchman
  lexicon: HALOT
  rationale: נַעַר commonly means 'young man' or 'servant'; צֹפֶה is 'watching one/watchman.'
    The phrase likely identifies the attendant posted as lookout. 'The young man who
    was watching' preserves both elements without over-specifying an official title.
    'Watchman' is possible but slightly more interpretive.
- source_word: וַיִּשָּׂא ... אֶת עֵינוֹ
  chosen: lifted up his eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. Retaining 'lifted up his eyes' preserves
    the source texture while remaining understandable in English.
- source_word: וַיַּרְא וְהִנֵּה
  chosen: saw, and behold
  alternatives:
  - saw, and look
  - looked, and behold
  lexicon: HALOT
  rationale: The sequence marks sudden perception and draws attention to what is seen.
    'Behold' preserves the discourse force of הִנֵּה better than omitting it, while
    still acceptable in elevated modern narrative.
- source_word: עַם רַב
  chosen: many people
  alternatives:
  - a great crowd
  - a large multitude
  lexicon: HALOT
  rationale: עַם can mean 'people' collectively, and רַב indicates largeness. 'Many
    people' is straightforward and avoids implying a formal crowd gathering beyond
    the text.
- source_word: הֹלְכִים
  chosen: were coming
  alternatives:
  - were going
  - were walking
  lexicon: HALOT
  rationale: הלך literally means 'going/walking,' but from the watchman's perspective
    the group is approaching the scene. 'Were coming' reflects the deictic sense naturally
    in English.
- source_word: מִדֶּרֶךְ אַחֲרָיו
  chosen: by the road behind him
  alternatives:
  - from the road behind him
  - on the road behind him
  lexicon: HALOT
  rationale: The phrase is spatially difficult. אַחֲרָיו most naturally means 'behind
    him.' 'By the road behind him' captures movement along a route located behind
    the referent. The pronoun likely refers to the watchman's vantage or the mountain
    path in context; the Hebrew leaves the antecedent implicit.
- source_word: מִצַּד הָהָר
  chosen: from the side of the mountain
  alternatives:
  - from the mountainside
  - from the side of the hill
  lexicon: HALOT
  rationale: צַד is 'side,' and הָר is 'mountain/hill country.' 'From the side of
    the mountain' is a fairly formal rendering that stays close to the Hebrew; 'mountainside'
    is smoother but slightly more compressed.
