id: 2SA.13.37
reference: 2 Samuel 13:37
source:
  edition: WLC
  text: וְ/אַבְשָׁל֣וֹם בָּרַ֔ח וַ/יֵּ֛לֶךְ אֶל תַּלְמַ֥י בֶּן עמיחור מֶ֣לֶךְ גְּשׁ֑וּר
    וַ/יִּתְאַבֵּ֥ל עַל בְּנ֖/וֹ כָּל הַ/יָּמִֽים־־־־׃
translation:
  text: But Absalom fled and went to Talmai son of Ammihur, king of Geshur. And he
    mourned for his son all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject of 'he mourned' is implicit in Hebrew and is understood from
      context to be David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  chosen: But Absalom
  alternatives:
  - And Absalom
  - Now Absalom
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply 'and,' but here 'but'
    fits the narrative contrast after the report of Amnon's death and Absalom's escape.
    'Absalom' is transliterated as a personal name per translation philosophy.
- source_word: בָּרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb plainly denotes fleeing. 'Fled' is concise and preserves the
    narrative force better than the more colloquial 'ran away.'
- source_word: וַיֵּלֶךְ אֶל
  chosen: and went to
  alternatives:
  - and came to
  - and traveled to
  lexicon: HALOT
  rationale: A standard narrative wayyiqtol plus preposition. 'Went to' is the most
    natural and direct rendering in English.
- source_word: תַּלְמַי
  chosen: Talmai
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן עַמִּיחוּר
  chosen: son of Ammihur
  alternatives:
  - the son of Ammihur
  lexicon: HALOT
  rationale: A straightforward patronymic construction. The article is unnecessary
    in English.
- source_word: מֶלֶךְ גְּשׁוּר
  chosen: king of Geshur
  alternatives:
  - the king of Geshur
  lexicon: HALOT
  rationale: Construct chain identifying Talmai. English idiom does not require the
    article here.
- source_word: וַיִּתְאַבֵּל
  chosen: And he mourned
  alternatives:
  - And he grieved
  - And he lamented
  lexicon: HALOT
  rationale: The Hitpael of אבל denotes mourning. 'Mourned' best captures bereavement
    language. The subject is grammatically singular and contextually refers to David,
    though Hebrew leaves the antecedent implicit.
- source_word: עַל בְּנוֹ
  chosen: for his son
  alternatives:
  - over his son
  lexicon: HALOT
  rationale: The preposition עַל with mourning is naturally rendered 'for' in English.
    The singular 'his son' follows the Hebrew; context indicates mourning over Amnon.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - all his days
  - day after day
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew idiom. Although some
    English versions smooth this to 'continually,' 'all the days' is transparent and
    readable enough.
