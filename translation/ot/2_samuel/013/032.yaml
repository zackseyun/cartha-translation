id: 2SA.13.32
reference: 2 Samuel 13:32
source:
  edition: WLC
  text: וַ/יַּ֡עַן יוֹנָדָ֣ב בֶּן שִׁמְעָ֨ה אֲחִֽי דָוִ֜ד וַ/יֹּ֗אמֶר אַל יֹאמַ֤ר
    אֲדֹנִ/י֙ אֵ֣ת כָּל הַ/נְּעָרִ֤ים בְּנֵֽי הַ/מֶּ֨לֶךְ֙ הֵמִ֔יתוּ כִּֽי אַמְנ֥וֹן
    לְ/בַדּ֖/וֹ מֵ֑ת כִּֽי עַל פִּ֤י אַבְשָׁלוֹם֙ הָיְתָ֣ה שׂוּמָ֔ה מִ/יּוֹם֙ עַנֹּת֔/וֹ
    אֵ֖ת תָּמָ֥ר אֲחֹתֽ/וֹ׀־־־־־־־־׃
translation:
  text: Then Jonadab son of Shimeah, David’s brother, answered and said, “Let not
    my lord say that they have killed all the young men, the king’s sons, for Amnon
    alone is dead. For this had been determined by Absalom from the day he violated
    Tamar his sister.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been set on Absalom’s word/command,' that is, had been fixed in
      accordance with Absalom’s settled intention.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered 'humiliated' or, in context, more explicitly
      'raped.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying; 'answered' preserves the formal
    dialogue style of Hebrew narrative.
- source_word: אֲחִי דָוִד
  chosen: David’s brother
  alternatives:
  - the brother of David
  lexicon: HALOT
  rationale: Construct chain identifying Shimeah as David's brother; natural English
    possessive is clearest.
- source_word: אַל יֹאמַר אֲדֹנִי
  chosen: Let not my lord say
  alternatives:
  - My lord should not say
  - Do not let my lord say
  lexicon: HALOT
  rationale: Jussive with אַל expresses prohibition/wish. 'Let not my lord say' preserves
    the deferential courtly tone.
- source_word: הַנְּעָרִים בְּנֵי הַמֶּלֶךְ
  chosen: the young men, the king’s sons
  alternatives:
  - the servants, the king's sons
  - the boys, the king's sons
  lexicon: HALOT
  rationale: נְעָרִים can mean youths/young men; here it refers specifically to the
    royal sons present at the feast. Apposition is preserved with 'the young men,
    the king's sons.'
- source_word: הֵמִיתוּ
  chosen: they have killed
  alternatives:
  - they killed
  - he killed
  lexicon: HALOT
  rationale: Hiphil of מות is causative, 'put to death/kill.' The plural form matches
    the reported statement about all the king's sons.
- source_word: אַמְנוֹן לְבַדּוֹ מֵת
  chosen: Amnon alone is dead
  alternatives:
  - only Amnon has died
  - Amnon by himself is dead
  lexicon: HALOT
  rationale: לְבַדּוֹ emphasizes exclusivity; 'alone' is the most direct rendering.
- source_word: עַל פִּי אַבְשָׁלוֹם
  chosen: by Absalom
  alternatives:
  - according to Absalom's command
  - on Absalom's mouth/word
  lexicon: HALOT
  rationale: The idiom literally involves 'mouth/word' and can denote command, intention,
    or determination. In this context with הָיְתָה שׂוּמָה it points to Absalom as
    the source of the settled plan. 'By Absalom' keeps the clause readable while the
    fuller nuance is documented in the next decision and footnote.
- source_word: הָיְתָה שׂוּמָה
  chosen: had been determined
  alternatives:
  - had been set
  - had been fixed
  - had been planned
  lexicon: HALOT
  rationale: Passive/resultative sense of שׂוּם with היה indicates something established
    or fixed. 'Had been determined' communicates a settled resolve without over-paraphrasing.
- source_word: מִיּוֹם עַנֹּתוֹ
  chosen: from the day he violated
  alternatives:
  - from the day he humbled
  - from the day he raped
  lexicon: HALOT
  rationale: ענה in the Pi'el in this context refers to sexual violation/humiliation
    of Tamar. 'Violated' is accurate and readable modern English; 'humbled' is too
    opaque, while 'raped' is interpretive but contextually strong. A footnote preserves
    the lexical alternative.
- source_word: אֲחֹתוֹ
  chosen: his sister
  lexicon: HALOT
  rationale: Straightforward possessive; refers to Tamar as Absalom's sister in the
    narrative context.
