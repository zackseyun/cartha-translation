id: 2SA.13.3
reference: 2 Samuel 13:3
source:
  edition: WLC
  text: וּ/לְ/אַמְנ֣וֹן רֵ֗עַ וּ/שְׁמ/וֹ֙ יֽוֹנָדָ֔ב בֶּן שִׁמְעָ֖ה אֲחִ֣י דָוִ֑ד
    וְ/י֣וֹנָדָ֔ב אִ֥ישׁ חָכָ֖ם מְאֹֽד־׃
translation:
  text: Now Amnon had a friend, and his name was Jonadab son of Shimeah, David’s brother;
    and Jonadab was a very shrewd man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a very wise man' or 'a very clever man.' The Hebrew can denote wisdom
      broadly; 'shrewd' is chosen here because the narrative soon presents Jonadab’s
      insight in a morally dubious way.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעַ
  chosen: friend
  alternatives:
  - companion
  - associate
  lexicon: HALOT
  rationale: The noun commonly denotes a friend, companion, or associate. In this
    narrative context, 'friend' is the most natural English rendering and fits the
    relational setup for Jonadab’s later counsel to Amnon.
- source_word: וּלְאַמְנוֹן
  chosen: Now Amnon had
  alternatives:
  - And Amnon had
  - Amnon had
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/to Amnon,'
    an idiom introducing possession or circumstance. English expresses this naturally
    as 'Amnon had.' 'Now' renders the discourse-linking force smoothly in narrative.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: This is the standard Hebrew naming formula. 'And his name was' preserves
    the clause structure, while remaining idiomatic in English.
- source_word: בֶּן שִׁמְעָה
  chosen: son of Shimeah
  lexicon: HALOT
  rationale: A straightforward genealogical expression. Personal names are transliterated
    per project philosophy.
- source_word: אֲחִי דָוִד
  chosen: David’s brother
  alternatives:
  - the brother of David
  lexicon: HALOT
  rationale: The construct chain identifies Shimeah as David’s brother. Rendering
    it as 'David’s brother' is concise and clear in English.
- source_word: אִישׁ חָכָם מְאֹד
  chosen: a very shrewd man
  alternatives:
  - a very wise man
  - a very clever man
  lexicon: HALOT
  rationale: Although חָכָם often means 'wise,' in this immediate context Jonadab’s
    intelligence is morally ambiguous and manifests as crafty counsel. 'Shrewd' preserves
    the sense of keen discernment without importing positive moral approval. 'Man'
    is retained for gender accuracy, matching the masculine singular אישׁ.
