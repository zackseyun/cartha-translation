theological_decisions:
- issue: Rendering the sexual imperative without euphemistic softening
  chosen_reading: lie with me
  alternative_readings:
  - sleep with me
  rationale: The Hebrew uses a recognized sexual idiom. The translation should neither
    obscure the sexual demand nor become colloquial in a way that trivializes the
    violence. 'Lie with me' preserves the text's gravity and clarity.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Retention of the kinship address
  chosen_reading: my sister
  rationale: The address is not incidental; it intensifies the moral and narrative
    offense. It must remain explicit in English.
  doctrine_reference: Translation philosophy §§1, 5
