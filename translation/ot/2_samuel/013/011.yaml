id: 2SA.13.11
reference: 2 Samuel 13:11
source:
  edition: WLC
  text: וַ/תַּגֵּ֥שׁ אֵלָ֖י/ו לֶֽ/אֱכֹ֑ל וַ/יַּֽחֲזֶק בָּ/הּ֙ וַ/יֹּ֣אמֶר לָ֔/הּ בּ֛וֹאִי
    שִׁכְבִ֥י עִמִּ֖/י אֲחוֹתִֽ/י־׃
translation:
  text: When she brought it near to him to eat, he seized her and said to her, “Come,
    lie with me, my sister.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she approached him to eat'; the Hebrew verb can mean either that Tamar
      came near or that she brought the food near to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגֵּשׁ
  chosen: she brought it near
  alternatives:
  - she came near
  - she approached
  lexicon: HALOT
  rationale: The verb נגשׁ can mean either 'approach' or 'bring near.' In context
    Tamar is serving food she has prepared, and the infinitive 'to eat' clarifies
    purpose, so 'brought it near' best captures the action without over-paraphrase.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard directional preposition with pronominal suffix.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for him to eat
  lexicon: HALOT
  rationale: Infinitive construct expressing purpose. English 'to eat' is natural
    and sufficiently precise; the object is implied from context.
- source_word: וַיַּחֲזֶק בָּהּ
  chosen: he seized her
  alternatives:
  - he grabbed her
  - he took hold of her
  lexicon: HALOT
  rationale: חזק with ב can mean to take hold firmly. Given the coercive context of
    the narrative, 'seized' conveys force better than the milder 'took hold of' while
    remaining textually grounded.
- source_word: וַיֹּאמֶר לָהּ
  chosen: and said to her
  lexicon: HALOT
  rationale: Standard speech formula.
- source_word: בּוֹאִי
  chosen: Come
  alternatives:
  - Come here
  lexicon: HALOT
  rationale: Imperative feminine singular of בוא. Simple 'Come' preserves the directness
    of Amnon's command.
- source_word: שִׁכְבִי עִמִּי
  chosen: lie with me
  alternatives:
  - sleep with me
  - lie down with me
  lexicon: HALOT
  rationale: שׁכב with עִם is a common sexual idiom. 'Lie with me' is direct, idiomatic,
    and slightly more formal than 'sleep with me,' fitting the gravity of the scene.
- source_word: אֲחוֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: Literal kinship term. It should be retained because the familial relationship
    is central to the horror and moral force of the passage.
