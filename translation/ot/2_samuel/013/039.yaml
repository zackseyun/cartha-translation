id: 2SA.13.39
reference: 2 Samuel 13:39
source:
  edition: WLC
  text: וַ/תְּכַל֙ דָּוִ֣ד הַ/מֶּ֔לֶךְ לָ/צֵ֖את אֶל אַבְשָׁל֑וֹם כִּֽי נִחַ֥ם עַל
    אַמְנ֖וֹן כִּֽי מֵֽת־־־־׃ס
translation:
  text: And King David longed to go out to Absalom, for he was comforted concerning
    Amnon, since he was dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And the spirit of King David ceased from going out to Absalom,' or
      'King David ceased going out against Absalom.' The Hebrew of the opening clause
      is difficult, and some understand it as David's anger subsiding rather than
      his longing to see Absalom.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכַל
  chosen: longed
  alternatives:
  - ceased
  - was spent
  - yearned
  lexicon: HALOT
  rationale: The verb כלה can mean 'be finished/come to an end,' but in this syntactic
    setting with an infinitive ('to go out') and the difficult context, many understand
    it idiomatically as desire or longing. 'Longed' best fits the narrative flow and
    common sense of David's disposition toward Absalom after time had passed. The
    alternative construal ('David ceased to go out') is preserved in a footnote because
    the Hebrew is genuinely difficult.
- source_word: לָצֵאת אֶל
  chosen: to go out to
  alternatives:
  - to go to
  - to go forth to
  lexicon: HALOT
  rationale: The infinitive of יצא with אֶל is most literally 'to go out to.' Retaining
    'go out to' preserves the Hebrew image while remaining understandable in English.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: נִחַם עַל
  chosen: was comforted concerning
  alternatives:
  - was consoled over
  - relented concerning
  - was sorry about
  lexicon: HALOT
  rationale: נחם in the Niphal commonly means 'be comforted' or 'be consoled.' With
    עַל plus a person here, the sense is that David had come to terms with Amnon's
    death. 'Was comforted concerning' is slightly formal but transparent and avoids
    overinterpreting the emotional nuance.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for David's longing. 'For' reads
    naturally and preserves the explanatory force.
- source_word: כִּי מֵת
  chosen: since he was dead
  alternatives:
  - because he had died
  - for he was dead
  lexicon: HALOT
  rationale: 'The second כִּי gives the ground for David''s being comforted: Amnon
    was dead. ''Since he was dead'' is natural English and preserves the causal relation.'
- source_word: דָּוִד הַמֶּלֶךְ
  chosen: King David
  alternatives:
  - David the king
  rationale: English idiom normally places the royal title before the name. This is
    a stylistic adjustment without loss of meaning.
