id: 2SA.13.30
reference: 2 Samuel 13:30
source:
  edition: WLC
  text: וַֽ/יְהִי֙ הֵ֣מָּה בַ/דֶּ֔רֶךְ וְ/הַ/שְּׁמֻעָ֣ה בָ֔אָה אֶל דָּוִ֖ד לֵ/אמֹ֑ר
    הִכָּ֤ה אַבְשָׁלוֹם֙ אֶת כָּל בְּנֵ֣י הַ/מֶּ֔לֶךְ וְ/לֹֽא נוֹתַ֥ר מֵ/הֶ֖ם אֶחָֽד־־־־׃ס
translation:
  text: While they were on the way, the report came to David, saying, “Absalom has
    struck down all the king’s sons, and not one of them is left.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the news came to David”; the Hebrew term can also carry the sense of
      an unverified report or rumor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הֵמָּה בַדֶּרֶךְ
  chosen: While they were on the way
  alternatives:
  - And it happened, while they were on the road
  - As they were on the way
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus pronoun and prepositional phrase
    introduces a circumstantial setting. 'While they were on the way' gives natural
    modern English while preserving the temporal force.
- source_word: הַשְּׁמֻעָה
  chosen: the report
  alternatives:
  - the news
  - the rumor
  lexicon: HALOT
  rationale: שְׁמוּעָה can denote a report, news, or rumor. In this context it is
    an unverified message reaching David before the facts are clarified in the following
    verses, so 'report' preserves that intermediate sense better than the more definite
    'news' or the more interpretive 'rumor'.
- source_word: בָאָה אֶל דָּוִד
  chosen: came to David
  alternatives:
  - reached David
  lexicon: HALOT
  rationale: A straightforward rendering of the feminine singular verb with the subject
    'the report.' 'Came to David' is idiomatic and close to the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, preserving the direct-speech
    introduction.
- source_word: הִכָּה
  chosen: has struck down
  alternatives:
  - has killed
  - struck
  lexicon: HALOT
  rationale: נכה often means 'strike' or 'strike down,' and in lethal contexts can
    mean 'kill.' Because the reported claim is that all the king's sons were slain,
    'has struck down' preserves the Hebrew verb while clearly implying deadly violence.
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  chosen: all the king’s sons
  alternatives:
  - all of the king's sons
  lexicon: HALOT
  rationale: A direct and natural rendering. 'Sons' is gender-accurate and contextually
    specific, not generic.
- source_word: וְלֹא נוֹתַר מֵהֶם אֶחָד
  chosen: and not one of them is left
  alternatives:
  - and not one of them remained
  - and none of them was left
  lexicon: HALOT
  rationale: The Niphal of יתר expresses remaining or being left over. Present tense
    in English after the reported perfect ('has struck down ... is left') is idiomatic
    within the content of the report.
