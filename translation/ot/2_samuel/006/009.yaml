id: 2SA.6.9
reference: 2 Samuel 6:9
source:
  edition: WLC
  text: וַ/יִּרָ֥א דָוִ֛ד אֶת יְהוָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יֹּ֕אמֶר אֵ֛יךְ יָב֥וֹא
    אֵלַ֖/י אֲר֥וֹן יְהוָֽה־׃
translation:
  text: And David feared the LORD that day, and he said, “How can the ark of the LORD
    come to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''How will the ark of the LORD come to me?'' The wording may express
      either practical uncertainty or a sense of unworthiness/fear after Uzzah''s
      death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  chosen: feared
  alternatives:
  - was afraid of
  - revered
  lexicon: HALOT
  rationale: From ירא in the qal, the immediate context is David's fearful reaction
    after Uzzah's death, so 'feared' best preserves both the emotional force and the
    direct object construction with YHWH. 'Was afraid of' is possible but less concise;
    'revered' is too weak for this narrative moment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the stated policy for יְהוָה.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That day' is natural modern English and
    preserves the temporal specificity without unnecessary stiffness.
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How will
  - How is it that
  lexicon: HALOT
  rationale: Introduces David's question of possibility or propriety in light of the
    preceding judgment. 'How can' captures the sense of troubled impossibility better
    than a merely future 'How will.'
- source_word: יָבֹא
  chosen: come
  alternatives:
  - enter
  - be brought
  lexicon: HALOT
  rationale: The verb בוא normally means 'come/enter.' 'Come' is the most direct rendering
    here. 'Be brought' would import a passive nuance not present in the Hebrew, even
    though the ark is being transported.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to my place
  - to my house
  lexicon: HALOT
  rationale: The preposition plus first person singular suffix is simply 'to me.'
    More specific renderings like 'to my house' overinterpret the phrase.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the LORD's ark
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. 'The ark of the LORD' is clear,
    formal enough for the sacred object, and consistent with common biblical usage.
