id: 2SA.6.13
reference: 2 Samuel 6:13
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ֧י צָעֲד֛וּ נֹשְׂאֵ֥י אֲרוֹן יְהוָ֖ה שִׁשָּׁ֣ה צְעָדִ֑ים וַ/יִּזְבַּ֥ח
    שׁ֖וֹר וּ/מְרִֽיא־׃
translation:
  text: And when those carrying the ark of the LORD had gone six steps, he sacrificed
    an ox and a fattened calf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'six paces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a fattened animal'; traditionally understood here as a fattened
      calf.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Rendered אֲרוֹן as 'ark' in its established cultic sense, and יְהוָה
    as 'the LORD' per doctrine default for the divine name.
- source_word: כִּי
  chosen: when
  alternatives:
  - as soon as
  - after
  lexicon: HALOT
  rationale: In the narrative construction ויהי כי, כִּי introduces the temporal circumstance;
    'when' is the most natural English equivalent.
- source_word: צָעֲדוּ
  chosen: had gone
  alternatives:
  - had walked
  - had taken
  lexicon: HALOT
  rationale: The verb denotes stepping/marching forward. 'Had gone' reads naturally
    with the following measure 'six steps' while preserving the movement sense.
- source_word: נֹשְׂאֵי
  chosen: those carrying
  alternatives:
  - the bearers of
  - those bearing
  lexicon: HALOT
  rationale: The participle identifies the people transporting the ark. 'Those carrying'
    is readable modern English and preserves the ongoing action.
- source_word: שִׁשָּׁה צְעָדִים
  chosen: six steps
  alternatives:
  - six paces
  lexicon: HALOT
  rationale: A straightforward numerical expression. 'Steps' is the most direct rendering;
    'paces' is possible but slightly more interpretive.
- source_word: וַיִּזְבַּח
  chosen: he sacrificed
  alternatives:
  - he offered as a sacrifice
  lexicon: HALOT
  rationale: The singular verb most naturally refers to David as the subject in context.
    'Sacrificed' is concise and accurate for זבח.
- source_word: שׁוֹר
  chosen: an ox
  alternatives:
  - a bull
  lexicon: HALOT
  rationale: שׁוֹר can denote bovine livestock broadly, often an ox/bull. 'Ox' is
    a standard rendering here and pairs well with the second animal.
- source_word: מְרִיא
  chosen: a fattened calf
  alternatives:
  - a fatling
  - a fattened animal
  lexicon: HALOT
  rationale: The noun denotes a fattened animal. In this sacrificial context, 'fattened
    calf' is idiomatic and specific enough for modern readers, though the Hebrew term
    itself is somewhat broader.
