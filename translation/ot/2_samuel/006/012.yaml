id: 2SA.6.12
reference: 2 Samuel 6:12
source:
  edition: WLC
  text: וַ/יֻּגַּ֗ד לַ/מֶּ֣לֶךְ דָּוִד֮ לֵ/אמֹר֒ בֵּרַ֣ךְ יְהוָ֗ה אֶת בֵּ֨ית עֹבֵ֤ד אֱדֹם֙ וְ/אֶת כָּל אֲשֶׁר ל֔/וֹ בַּ/עֲב֖וּר אֲר֣וֹן הָ/אֱלֹהִ֑ים וַ/יֵּ֣לֶךְ דָּוִ֗ד וַ/יַּעַל֩ אֶת אֲר֨וֹן הָ/אֱלֹהִ֜ים מִ/בֵּ֨ית עֹבֵ֥ד אֱדֹ֛ם עִ֥יר דָּוִ֖ד בְּ/שִׂמְחָֽה־־־־־׃
translation:
  text: And it was reported to King David, saying, “Yahweh has blessed the house of Obed-edom and all that belongs to him because of the ark of God.” So David went and brought up the ark of God from the house of Obed-edom to the city of David with rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Rendered ''the LORD'' following the project''s default for the divine name; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal form of נגד introduces reported information without naming the messenger. 'It was reported' preserves the impersonal passive better than the more colloquial 'someone told.'
- source_word: לַמֶּלֶךְ דָּוִד
  chosen: to King David
  alternatives:
  - to the king, David
  lexicon: HALOT
  rationale: The phrase identifies David by title and name. English idiom naturally renders this as 'to King David.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew quotative introduction and preserve the reported-speech structure.
- source_word: בֵּרַךְ יְהוָה
  chosen: The LORD has blessed
  alternatives:
  - The LORD blessed
  lexicon: HALOT
  rationale: The perfect reports a completed action with present relevance; English present perfect fits the report well. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית עֹבֵד אֱדֹם
  chosen: the house of Obed-edom
  alternatives:
  - the household of Obed-edom
  lexicon: HALOT
  rationale: '''House'' is the most direct rendering and can include household/property in context. It also matches the repeated concrete reference to his house in this narrative.'
- source_word: וְאֶת כָּל אֲשֶׁר לוֹ
  chosen: and all that belongs to him
  alternatives:
  - and all that he has
  - and everything that is his
  lexicon: HALOT
  rationale: This idiomatic rendering captures possessions and dependents associated with his household without sounding wooden.
- source_word: בַּעֲבוּר
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: '''Because of'' best expresses the causal sense here: the blessing came due to the ark''s presence.'
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Standard and contextually clear rendering for the sacred object; no need to expand beyond the Hebrew.
- source_word: וַיֵּלֶךְ דָּוִד
  chosen: So David went
  alternatives:
  - Then David went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' conveys consequential movement in response to the report.
- source_word: וַיַּעַל אֶת אֲרוֹן הָאֱלֹהִים
  chosen: brought up the ark of God
  alternatives:
  - took up the ark of God
  - brought the ark of God up
  lexicon: HALOT
  rationale: עלה with the ark in this context refers to transporting it upward toward Jerusalem. 'Brought up' is idiomatic and preserves the directional nuance.
- source_word: מִבֵּית עֹבֵד אֱדֹם
  chosen: from the house of Obed-edom
  alternatives:
  - out of the house of Obed-edom
  lexicon: HALOT
  rationale: Direct and natural rendering of the source prepositional phrase.
- source_word: עִיר דָּוִד
  chosen: to the city of David
  alternatives:
  - into the city of David
  lexicon: HALOT
  rationale: The destination is implied with the motion verb 'brought up'; English supplies 'to' naturally for clarity.
- source_word: בְּשִׂמְחָה
  chosen: with rejoicing
  alternatives:
  - with joy
  - joyfully
  lexicon: HALOT
  rationale: The noun denotes joyful celebration. 'With rejoicing' preserves the nominal form and suits the ceremonial context better than the adverb 'joyfully.'
