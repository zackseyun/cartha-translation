id: 2SA.6.4
reference: 2 Samuel 6:4
source:
  edition: WLC
  text: וַ/יִּשָּׂאֻ֗/הוּ מִ/בֵּ֤ית אֲבִֽינָדָב֙ אֲשֶׁ֣ר בַּ/גִּבְעָ֔ה עִ֖ם אֲר֣וֹן
    הָ/אֱלֹהִ֑ים וְ/אַחְי֕וֹ הֹלֵ֖ךְ לִ/פְנֵ֥י הָ/אָרֽוֹן׃
translation:
  text: They carried it from the house of Abinadab, which was on the hill, with the
    ark of God, and Ahio was walking before the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which was in Gibeah.' The Hebrew גִּבְעָה can be read as the common
      noun 'hill' or as the place name 'Gibeah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂאֻהוּ
  chosen: They carried it
  alternatives:
  - They brought it up
  - They lifted it
  lexicon: HALOT
  rationale: From נשׂא, here a plural wayyiqtol with 3ms suffix. In context of moving
    the ark on a cart, 'carried it' is idiomatic English for transporting the object
    without over-specifying the manner. 'Brought it up' is possible in some contexts
    for נשׂא but is less plain here.
- source_word: מִבֵּית אֲבִינָדָב
  chosen: from the house of Abinadab
  alternatives:
  - out of Abinadab's house
  lexicon: HALOT
  rationale: 'בית in construct with the preposition מן is straightforwardly locative/source:
    the ark is being moved from Abinadab''s house.'
- source_word: אֲשֶׁר בַּגִּבְעָה
  chosen: which was on the hill
  alternatives:
  - which was in Gibeah
  - that was on the hill
  lexicon: HALOT
  rationale: גבעה can denote a common noun, 'hill,' or function as a place name, 'Gibeah.'
    Given the article on גִּבְעָה and the immediate syntax modifying 'house of Abinadab,'
    the common-noun sense is preferred in the main text. The place-name possibility
    is worth preserving in a footnote because some translations take it that way and
    the phrase may echo the location designation in the surrounding narrative.
- source_word: עִם אֲרוֹן הָאֱלֹהִים
  chosen: with the ark of God
  alternatives:
  - together with the ark of God
  lexicon: HALOT
  rationale: עם marks accompaniment. The phrase is retained closely and naturally
    in English. 'Ark of God' is the standard and transparent rendering of אֲרוֹן הָאֱלֹהִים.
- source_word: וְאַחְיוֹ
  chosen: and Ahio
  lexicon: HALOT
  rationale: Proper name, transliterated according to the translation philosophy.
- source_word: הֹלֵךְ
  chosen: was walking
  alternatives:
  - went
  - was going
  lexicon: HALOT
  rationale: The participle conveys ongoing action concurrent with the transport of
    the ark. 'Was walking' captures the durative sense better than the simple past
    'went.'
- source_word: לִפְנֵי הָאָרוֹן
  chosen: before the ark
  alternatives:
  - in front of the ark
  lexicon: HALOT
  rationale: לפני is a common spatial expression meaning 'before' or 'in front of.'
    'Before the ark' is concise and natural, while preserving the processional sense.
