theological_decisions:
- issue: Cause of Uzza's action
  chosen_reading: Uzza acted because the oxen stumbled, creating an apparent threat
    to the ark.
  alternative_readings:
  - Uzza acted because the oxen upset the ark
  - Uzza acted because the oxen let it slip
  rationale: The Hebrew states only the causal clause with the oxen as subject and
    a verb of slipping/letting drop. The translation should not import a fuller explanation
    than the text gives, but it should communicate the likely immediate cause in natural
    English. 'Stumbled' preserves the narrative tension without overstating the mechanics.
  doctrine_reference: Translation philosophy §§1, 3, 6
