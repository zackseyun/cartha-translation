id: 2SA.6.6
reference: 2 Samuel 6:6
source:
  edition: WLC
  text: וַ/יָּבֹ֖אוּ עַד גֹּ֣רֶן נָכ֑וֹן וַ/יִּשְׁלַ֨ח עֻזָּ֜א אֶל אֲר֤וֹן הָֽ/אֱלֹהִים֙
    וַ/יֹּ֣אחֶז בּ֔/וֹ כִּ֥י שָׁמְט֖וּ הַ/בָּקָֽר־־׃
translation:
  text: When they came to Nacon’s threshing floor, Uzza reached out to the ark of
    God and took hold of it, because the oxen stumbled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the threshing floor of Nachon' or, less likely, 'the fixed/established
      threshing floor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the oxen slipped' or 'the oxen nearly upset it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: HALOT
  rationale: The noun denotes a threshing floor, the standard agricultural site where
    grain was processed. 'Threshing floor' is the natural modern English equivalent.
- source_word: נָכוֹן
  chosen: Nacon’s
  alternatives:
  - Nachon’s
  - the established/firm threshing floor
  lexicon: HALOT
  rationale: Here the form functions most naturally as a proper name in apposition
    to גֹּרֶן, as reflected in many translations and the parallel narrative context.
    Because it lacks the article and reads smoothly as a place-name, 'Nacon’s' is
    preferred. A lexical alternative is preserved in a footnote because the form could
    also be understood adjectivally.
- source_word: וַיִּשְׁלַח
  chosen: reached out
  alternatives:
  - sent out
  - stretched out
  lexicon: HALOT
  rationale: With the hand/arm implied toward an object, שלח commonly means to stretch
    out or reach out. 'Reached out' is idiomatic English and fits the action sequence
    before taking hold.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark
  lexicon: HALOT
  rationale: The full construct phrase is retained to reflect the Hebrew explicitly
    and preserve the sacred identification of the ark.
- source_word: וַיֹּאחֶז בּוֹ
  chosen: took hold of it
  alternatives:
  - grasped it
  - seized it
  lexicon: HALOT
  rationale: אחז means to seize or take hold. 'Took hold of it' is clear, natural,
    and avoids implying violence beyond the text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: The conjunction gives the reason for Uzza's action. 'Because' is more
    natural in contemporary English than 'for' while preserving the causal sense.
- source_word: שָׁמְטוּ
  chosen: stumbled
  alternatives:
  - slipped
  - nearly upset it
  - let it slip
  lexicon: HALOT
  rationale: The verb can convey slipping, letting drop, or losing control. In context
    with 'the oxen' as subject, the sense is that they stumbled or slipped, threatening
    the ark's stability. 'Stumbled' is concise and idiomatic without over-interpreting
    the degree of danger.
- source_word: הַבָּקָר
  chosen: the oxen
  alternatives:
  - the cattle
  lexicon: HALOT
  rationale: In this transport context, בקר refers specifically to the draft animals
    pulling the cart. 'Oxen' is more precise than the broader 'cattle'.
