id: 2SA.6.5
reference: 2 Samuel 6:5
source:
  edition: WLC
  text: וְ/דָוִ֣ד וְ/כָל בֵּ֣ית יִשְׂרָאֵ֗ל מְשַֽׂחֲקִים֙ לִ/פְנֵ֣י יְהוָ֔ה בְּ/כֹ֖ל עֲצֵ֣י בְרוֹשִׁ֑ים וּ/בְ/כִנֹּר֤וֹת וּ/בִ/נְבָלִים֙ וּ/בְ/תֻפִּ֔ים וּ/בִ/מְנַֽעַנְעִ֖ים וּֽ/בְ/צֶלְצֶלִֽים׀־׃
translation:
  text: And David and all the house of Israel were celebrating before Yahweh with all kinds of cypress wood instruments, and with lyres, harps, tambourines, rattles, and cymbals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'with all woods of cypresses'; the phrase likely refers to various musical instruments made of cypress wood.
    reason: lexical_alternative
  - marker: b
    text: Or 'were playing/rejoicing before the LORD.' The Hebrew verb can denote festive, playful celebration.
    reason: lexical_alternative
  - marker: c
    text: The exact identification of 'rattles' is uncertain; possibly 'sistra' or another shaken percussion instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׂחֲקִים
  chosen: were celebrating
  alternatives:
  - were playing
  - were rejoicing
  - were making merry
  lexicon: HALOT
  rationale: The verb שׂחק in the piel can denote playful or festive activity, including celebratory performance in worshipful procession. 'Were celebrating' best captures the communal festive action here without implying mere childish play; the accompanying instruments clarify the nature of the action.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for action performed in Yahweh's presence. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before the LORD' is both natural and faithful to the Hebrew expression.
- source_word: בְּכֹל עֲצֵי בְרוֹשִׁים
  chosen: with all kinds of cypress wood instruments
  alternatives:
  - with all manner of cypress wood
  - with all instruments of cypress wood
  - with all firwood instruments
  lexicon: HALOT
  rationale: The Hebrew is difficult and somewhat elliptical. Literally it is 'with all woods of cypresses/firs,' likely referring to wooden musical instruments made of cypress/juniper-type wood. Rendering 'with all kinds of cypress wood instruments' makes the implied sense explicit in readable English while staying close to the source. 'Cypress' is a common modern rendering for בְרוֹשִׁים, though the exact species is uncertain.
- source_word: בְרוֹשִׁים
  chosen: cypress
  alternatives:
  - fir
  - juniper
  lexicon: HALOT
  rationale: The precise tree species is debated. 'Cypress' is a widely accepted modern equivalent and fits the likely sense of quality wood used for instruments.
- source_word: כִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: כִּנּוֹר is more specifically a lyre-type stringed instrument. 'Lyres' is more precise than the traditional but broader 'harps.'
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - psalteries
  lexicon: HALOT
  rationale: נֵבֶל denotes a stringed instrument distinct from כִּנּוֹר. 'Harps' is a conventional accessible rendering, though the exact instrument type is uncertain; 'lutes' is possible but less established.
- source_word: תֻפִּים
  chosen: tambourines
  alternatives:
  - hand drums
  - tabrets
  lexicon: HALOT
  rationale: תֹּף refers to a frame drum or tambourine used in festive settings. 'Tambourines' is clear modern English.
- source_word: מְנַעַנְעִים
  chosen: rattles
  alternatives:
  - sistra
  - castanets
  - shaken instruments
  lexicon: HALOT
  rationale: This rare term likely refers to instruments that are shaken to make sound. 'Rattles' is a transparent modern rendering; more technical identifications such as 'sistra' are possible but less accessible and less certain.
- source_word: צֶלְצֶלִים
  chosen: cymbals
  lexicon: HALOT
  rationale: Standard rendering for metallic clashing percussion instruments; context strongly supports 'cymbals'.
- source_word: כָל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - all Israel
  lexicon: HALOT
  rationale: Retains the Hebrew corporate expression rather than flattening it to simply 'all Israel.' The phrase emphasizes the representative national community.
