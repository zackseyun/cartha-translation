id: 2SA.6.23
reference: 2 Samuel 6:23
source:
  edition: WLC
  text: וּ/לְ/מִיכַל֙ בַּת שָׁא֔וּל לֹֽא הָ֥יָה לָ֖/הּ יָ֑לֶד עַ֖ד י֥וֹם מוֹתָֽ/הּ־־׃פ
translation:
  text: And Michal daughter of Saul had no child until the day of her death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offspring'; the Hebrew noun can refer to a child generically, not necessarily
      a son.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מִיכַל
  chosen: And Michal
  alternatives:
  - Now Michal
  - As for Michal
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/to Michal'
    or 'and for Michal,' an idiom introducing the subject. In natural English, 'And
    Michal' preserves the narrative linkage without awkwardness. 'As for Michal' is
    possible but more marked than the Hebrew requires.
- source_word: בַּת שָׁאוּל
  chosen: daughter of Saul
  alternatives:
  - Saul's daughter
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies Michal by lineage.
    'Daughter of Saul' is slightly more formal and mirrors the Hebrew structure closely.
- source_word: לֹא הָיָה לָהּ
  chosen: had no
  alternatives:
  - there was not to her
  - did not have
  lexicon: HALOT
  rationale: The Hebrew expresses possession idiomatically with 'there was not to
    her.' English normally renders this as 'had no,' which is both accurate and idiomatic.
- source_word: יָלֶד
  chosen: child
  alternatives:
  - son
  - offspring
  lexicon: HALOT
  rationale: The noun here is singular and can denote a child generically, not specifically
    a male child in this context. 'Child' best reflects the likely sense without over-specifying.
    'Offspring' is possible but less natural in this narrative statement.
- source_word: עַד יוֹם מוֹתָהּ
  chosen: until the day of her death
  alternatives:
  - until her dying day
  - up to the day of her death
  lexicon: HALOT
  rationale: This is a standard Hebrew temporal expression. 'Until the day of her
    death' is a clear, close rendering that preserves the formal force of the phrase.
