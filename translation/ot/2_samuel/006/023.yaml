theological_decisions:
- issue: Implication of childlessness 'until the day of her death'
  chosen_reading: Render the temporal phrase straightforwardly without implying that
    she bore children after death or using it to make a theological point beyond the
    text.
  alternative_readings:
  - Some readers take the phrase as an idiom simply emphasizing lifelong childlessness.
  rationale: The Hebrew idiom states that Michal remained childless throughout her
    life. The translation should preserve the wording without importing speculative
    implications or resolving narrative/theological questions not stated in the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
