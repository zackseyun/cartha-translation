id: 2SA.6.20
reference: 2 Samuel 6:20
source:
  edition: WLC
  text: וַ/יָּ֥שָׁב דָּוִ֖ד לְ/בָרֵ֣ךְ אֶת בֵּית֑/וֹ וַ/תֵּצֵ֞א מִיכַ֤ל בַּת שָׁאוּל֙
    לִ/קְרַ֣את דָּוִ֔ד וַ/תֹּ֗אמֶר מַה נִּכְבַּ֨ד הַ/יּ֜וֹם מֶ֣לֶךְ יִשְׂרָאֵ֗ל אֲשֶׁ֨ר
    נִגְלָ֤ה הַ/יּוֹם֙ לְ/עֵינֵ֨י אַמְה֣וֹת עֲבָדָ֔י/ו כְּ/הִגָּל֥וֹת נִגְל֖וֹת אַחַ֥ד
    הָ/רֵקִֽים־־־׃
translation:
  text: Then David returned to bless his household. But Michal daughter of Saul came
    out to meet David and said, “How honored the king of Israel was today, uncovering
    himself today in the sight of the slave girls of his servants, as one of the vulgar
    men shamelessly uncovers himself!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How glorious the king of Israel was today'—the Hebrew wording is overtly
      sarcastic in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'maidservants' for 'slave girls.' The Hebrew refers to female household
      dependents of low status.
    reason: lexical_alternative
  - marker: c
    text: Or 'as one of the worthless fellows shamelessly exposes himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבָרֵךְ
  chosen: to bless
  alternatives:
  - to greet with blessing
  - to pronounce blessing over
  lexicon: HALOT
  rationale: The infinitive of ברך here refers to David's intention toward his household
    after the procession. 'Bless' is the natural and sufficiently formal English equivalent
    and matches common biblical usage without paraphrase.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his home
  lexicon: HALOT
  rationale: Although literally 'his house,' בית often denotes the people of the household
    as well as the dwelling. Since David is returning 'to bless' them, 'household'
    better captures the likely referent in idiomatic English while remaining close
    to the Hebrew.
- source_word: מִיכַל בַּת שָׁאוּל
  chosen: Michal daughter of Saul
  alternatives:
  - Michal, Saul's daughter
  lexicon: HALOT
  rationale: The appositional form is preserved straightforwardly. 'Daughter of Saul'
    also retains the narrative emphasis on her Saulide identity.
- source_word: מַה נִּכְבַּד הַיּוֹם
  chosen: How honored ... was today
  alternatives:
  - How glorious ... was today
  - How distinguished ... was today
  lexicon: HALOT
  rationale: The phrase is sarcastic in context, but the lexical value of כבד is 'be
    honored/glorious.' 'Honored' preserves the verbal irony without over-translating
    the sarcasm into the base gloss.
- source_word: נִגְלָה
  chosen: uncovering himself
  alternatives:
  - exposing himself
  - revealing himself
  lexicon: HALOT
  rationale: The Niphal of גלה here refers to making oneself uncovered. 'Uncovering
    himself' is more literal and slightly less interpretively loaded than 'exposing
    himself,' while still conveying the shameful sense in context.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - before
  lexicon: HALOT
  rationale: '''In the sight of'' is a natural rendering of the idiom ''to the eyes
    of,'' preserving the public nature of the act.'
- source_word: אַמְהוֹת עֲבָדָיו
  chosen: the slave girls of his servants
  alternatives:
  - the maidservants of his servants
  - the female servants of his servants
  lexicon: HALOT
  rationale: אמה denotes a female slave/maidservant. Given the translation philosophy's
    preference to preserve bonded status where salient, 'slave girls' best reflects
    the social hierarchy and Michal's contemptuous framing. 'Of his servants' preserves
    the genitival relation rather than smoothing it away.
- source_word: כְּהִגָּלוֹת נִגְלוֹת
  chosen: as ... shamelessly uncovers himself
  alternatives:
  - as ... plainly uncovers himself
  - as ... utterly exposes himself
  lexicon: HALOT
  rationale: The infinitive absolute plus finite/related form intensifies the action.
    English lacks a direct equivalent, so 'shamelessly uncovers himself' conveys the
    emphatic and disgraceful force in context.
- source_word: אַחַד הָרֵקִים
  chosen: one of the vulgar men
  alternatives:
  - one of the worthless fellows
  - one of the empty-headed men
  - one of the riffraff
  lexicon: HALOT
  rationale: ריקים refers to empty/worthless persons, often socially contemptible
    men. 'Vulgar men' fits Michal's insult in contemporary readable English without
    becoming slangy. The singular-plus-partitive sense is preserved by 'one of the
    ... men.'
