theological_decisions:
- issue: Social-status terminology in אַמְהוֹת
  chosen_reading: slave girls
  alternative_readings:
  - maidservants
  - female servants
  rationale: This is not a major doctrinal crux, but the translation philosophy prefers
    preserving bonded status where context makes it salient. Here Michal's insult
    trades on rank and public shame before lower-status females, so 'slave girls'
    better reflects the social reality than the softer 'maidservants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος by analogy of bonded-status rendering
