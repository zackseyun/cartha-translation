id: 2SA.6.7
reference: 2 Samuel 6:7
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף יְהוָה֙ בְּ/עֻזָּ֔ה וַ/יַּכֵּ֥/הוּ שָׁ֛ם הָ/אֱלֹהִ֖ים עַל הַ/שַּׁ֑ל וַ/יָּ֣מָת שָׁ֔ם עִ֖ם אֲר֥וֹן הָ/אֱלֹהִֽים־־׃
translation:
  text: And the anger of Yahweh burned against Uzzah, and God struck him there for the error, and he died there beside the ark of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the error,' 'because of his rash act,' or possibly 'because he reached out his hand.' The Hebrew phrase is difficult and has been understood in several ways.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - was kindled
  - burned with anger
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger burning. 'The anger ... burned' preserves the Hebrew image in natural English without over-literal awkwardness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעֻזָּה
  chosen: against Uzzah
  alternatives:
  - at Uzzah
  lexicon: HALOT
  rationale: With חרה אף, the preposition marks the object of anger. 'Against Uzzah' is idiomatic English.
- source_word: וַיַּכֵּהוּ
  chosen: struck him
  alternatives:
  - smote him
  - struck him down
  lexicon: HALOT
  rationale: נכה commonly means 'strike.' 'Struck him' is clear and leaves the result to the following clause 'and he died.' 'Struck him down' would front-load the fatal outcome.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: The adverb is repeated in the verse; retaining 'there' in both places preserves the narrative emphasis on the location of judgment and death.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although the subject could be rendered again as 'the LORD,' the Hebrew uses 'God' here. Preserving the variation reflects the source text.
- source_word: עַל הַשַּׁל
  chosen: because of the irreverence
  alternatives:
  - because of the error
  - because of the rash act
  - for the offense
  lexicon: HALOT
  rationale: The noun שַׁל is rare and difficult. In context, Uzzah's wrongful act toward the ark is in view. 'Because of the irreverence' best captures the likely sense of an irreverent or improper act without over-specifying mechanics already known from the context.
- source_word: וַיָּמָת
  chosen: he died
  alternatives:
  - and he died
  - so he died
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol is best rendered straightforwardly as 'and he died' within the sentence.
- source_word: עִם אֲרוֹן הָאֱלֹהִים
  chosen: beside the ark of God
  alternatives:
  - by the ark of God
  - with the ark of God
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' but in this spatial context English 'beside' or 'by' is more natural and avoids implying accompaniment rather than location.
