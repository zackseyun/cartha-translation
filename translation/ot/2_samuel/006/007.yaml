theological_decisions:
- issue: Rendering the cause of Uzzah's death in the obscure phrase עַל הַשַּׁל
  chosen_reading: because of the irreverence
  alternative_readings:
  - because of the error
  - because he reached out his hand
  - because of his rashness
  rationale: The Hebrew term is rare/obscure, and interpreters differ on whether it points to error, irreverence, or the specific act of touching the ark. The translation avoids importing a full interpretive explanation into the main text while still conveying that God's judgment was for a wrongful, irreverent act. Alternatives are preserved in a footnote to maintain transparency and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
