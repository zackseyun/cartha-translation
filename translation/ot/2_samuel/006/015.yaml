id: 2SA.6.15
reference: 2 Samuel 6:15
source:
  edition: WLC
  text: וְ/דָוִד֙ וְ/כָל בֵּ֣ית יִשְׂרָאֵ֔ל מַעֲלִ֖ים אֶת אֲר֣וֹן יְהוָ֑ה בִּ/תְרוּעָ֖ה
    וּ/בְ/ק֥וֹל שׁוֹפָֽר־־׃
translation:
  text: So David and all the house of Israel were bringing up the ark of the LORD
    with shouting and with the sound of the horn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a shout of joy'; the Hebrew term can denote jubilant acclamation.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the sound of the trumpet'; the Hebrew shofar refers to a horn,
      often a ram's horn.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלִים
  chosen: were bringing up
  alternatives:
  - brought up
  - were carrying up
  lexicon: HALOT
  rationale: The Hiphil participle of עלה here describes the ongoing action in narrative
    context. 'Were bringing up' preserves the progressive sense better than a simple
    past, while remaining natural English. 'Bringing up' also reflects the idiomatic
    movement to a higher/appointed place associated with the ark's ascent to Jerusalem.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - all Israel
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of Israel.' Retaining 'house'
    preserves the corporate/familial sense of the Hebrew while remaining intelligible
    in English. 'All Israel' is possible but slightly flattens the source expression.
- source_word: אֲר֣וֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: אֲרוֹן is straightforwardly 'ark.' Per doctrine, יְהוָה is rendered 'the
    LORD' rather than a transliteration such as 'Yahweh.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the conventional small-caps covenantal rendering in English.
- source_word: תְרוּעָה
  chosen: shouting
  alternatives:
  - a shout of joy
  - acclamation
  - trumpet blast
  lexicon: HALOT
  rationale: תְרוּעָה can denote a loud shout or jubilant acclamation, sometimes associated
    with battle cry or festal noise. Because the next phrase explicitly mentions the
    sound of the shofar, rendering this as 'shouting' avoids redundancy and best captures
    the human vocal element.
- source_word: ק֥וֹל שׁוֹפָר
  chosen: the sound of the horn
  alternatives:
  - the sound of the trumpet
  - the sound of the ram's horn
  lexicon: HALOT
  rationale: קוֹל is 'sound/voice,' and שׁוֹפָר is the horn instrument, often specifically
    a ram's horn. 'Horn' is more source-near than 'trumpet,' which can suggest a metal
    instrument in modern English. 'The sound of the horn' is natural and accurate.
