id: 2SA.6.21
reference: 2 Samuel 6:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִד֮ אֶל מִיכַל֒ לִ/פְנֵ֣י יְהוָ֗ה אֲשֶׁ֨ר בָּֽחַר בִּ֤/י מֵֽ/אָבִי/ךְ֙ וּ/מִ/כָּל בֵּית֔/וֹ לְ/צַוֺּ֨ת אֹתִ֥/י נָגִ֛יד עַל עַ֥ם יְהוָ֖ה עַל יִשְׂרָאֵ֑ל וְ/שִׂחַקְתִּ֖י לִ/פְנֵ֥י יְהוָֽה־־־־־׃
translation:
  text: David said to Michal, “It was before Yahweh, who chose me rather than your father and rather than all his house, to appoint me ruler over the people of Yahweh, over Israel—and I danced before Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I danced before the LORD.” The Hebrew verb here is broader than a dance-specific term and can denote celebratory or playful action.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase is spatial/relational and idiomatically means acting in Yahweh's presence. 'Before the LORD' is natural English and preserves the repeated emphasis in the verse. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר בָּחַר בִּי
  chosen: who chose me
  alternatives:
  - who selected me
  lexicon: HALOT
  rationale: בחר commonly means 'choose/elect.' 'Chose me' is the plain sense and fits the royal-selection context without importing later theological categories.
- source_word: מֵאָבִיךְ וּמִכָּל בֵּיתוֹ
  chosen: above your father and above all his house
  alternatives:
  - instead of your father and all his house
  - rather than your father and all his household
  lexicon: HALOT
  rationale: The preposition מן after בחר marks comparison/separation. In context David contrasts the LORD's choice of him over Saul's line. 'Above' preserves the comparative force while remaining idiomatic. 'House' retains the dynastic/familial sense.
- source_word: לְצַוֹּת אֹתִי
  chosen: to appoint me
  alternatives:
  - to command me
  - to commission me
  lexicon: HALOT
  rationale: Although צוה usually means 'command,' in this construction with a following office it carries the sense of commissioning/appointing someone to a role. 'Appoint me' best fits the syntax and context of royal installation.
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in authority, often a leader or ruler. 'Ruler' communicates governing authority clearly in modern English without the potential ambiguity of 'prince.'
- source_word: עַל עַם יְהוָה עַל יִשְׂרָאֵל
  chosen: over the people of the LORD, over Israel
  alternatives:
  - over the LORD's people, over Israel
  lexicon: HALOT
  rationale: The double עַל is retained for emphasis. 'The people of the LORD' preserves the covenantal designation, and the appositional 'over Israel' is kept rather than collapsed.
- source_word: וְשִׂחַקְתִּי
  chosen: I celebrated
  alternatives:
  - I played
  - I danced
  - I rejoiced
  lexicon: HALOT
  rationale: The verb שׂחק can denote playful or celebratory action. In this immediate context David is responding to criticism of his exuberant conduct before the ark. 'Celebrated' captures the joyful public action without narrowing the verb to dance alone, since a different verb was used earlier for dancing.
