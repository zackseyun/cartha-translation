theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to make David's action specifically 'dance' in the final clause
  chosen_reading: I celebrated before the LORD
  alternative_readings:
  - I danced before the LORD
  - I played before the LORD
  rationale: The Hebrew here uses שׂחק, not the earlier כרר/פזז forms associated more specifically with dancing. To avoid overharmonizing with the previous verse while preserving the joyful sense, the broader 'celebrated' is used. The dance-specific alternative is preserved in a footnote because readers may expect it from context and translation tradition.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve tension rather than over-resolve'
