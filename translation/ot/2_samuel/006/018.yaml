id: 2SA.6.18
reference: 2 Samuel 6:18
source:
  edition: WLC
  text: וַ/יְכַ֣ל דָּוִ֔ד מֵ/הַעֲל֥וֹת הָ/עוֹלָ֖ה וְ/הַ/שְּׁלָמִ֑ים וַ/יְבָ֣רֶךְ אֶת הָ/עָ֔ם בְּ/שֵׁ֖ם יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: When David had finished offering the burnt offering and the peace offerings, he blessed the people in the name of Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD of hosts''; alternatively, ''Yahweh of hosts'' or ''the LORD of armies.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַל
  chosen: had finished
  alternatives:
  - finished
  - completed
  lexicon: HALOT
  rationale: The wayyiqtol of כלה marks completion of the preceding action. 'Had finished' fits natural English narrative sequence before the next main action.
- source_word: מֵהַעֲלוֹת
  chosen: offering
  alternatives:
  - bringing up
  - presenting
  lexicon: HALOT
  rationale: The preposition with Hiphil infinitive construct of עלה after כלה yields the sense 'finished offering up.' In sacrificial context, 'offering' is the most idiomatic and accurate English rendering.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a burnt offering. The singular is retained as in the Hebrew.
- source_word: וְהַשְּׁלָמִים
  chosen: and the peace offerings
  alternatives:
  - and the fellowship offerings
  - and the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים denotes a class of communion/well-being sacrifices. 'Peace offerings' preserves traditional recognizability and remains a valid lexical rendering; alternatives are possible but less concise here.
- source_word: וַיְבָרֶךְ
  chosen: he blessed
  alternatives:
  - he pronounced a blessing on
  lexicon: HALOT
  rationale: ברך in this construction straightforwardly means to bless. The simple verbal rendering best matches the Hebrew without expansion.
- source_word: אֶת־הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עָם here refers to the gathered people as a whole. 'The people' is the plain and sufficiently broad rendering.
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  lexicon: HALOT
  rationale: The phrase בְּשֵׁם commonly expresses agency or authority invoked in blessing. 'In the name of' is the standard and natural English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'of hosts' is the conventional and semantically broad rendering, encompassing heavenly armies and sovereign power. 'Of armies' is possible but narrower.
