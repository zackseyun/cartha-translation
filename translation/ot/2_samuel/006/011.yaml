id: 2SA.6.11
reference: 2 Samuel 6:11
source:
  edition: WLC
  text: וַ/יֵּשֶׁב֩ אֲר֨וֹן יְהוָ֜ה בֵּ֣ית עֹבֵ֥ד אֱדֹ֛ם הַ/גִּתִּ֖י שְׁלֹשָׁ֣ה חֳדָשִׁ֑ים
    וַ/יְבָ֧רֶךְ יְהוָ֛ה אֶת עֹבֵ֥ד אֱדֹ֖ם וְ/אֶת כָּל בֵּיתֽ/וֹ־־־׃
translation:
  text: And the ark of the LORD remained in the house of Obed-edom the Gittite for
    three months, and the LORD blessed Obed-edom and all his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Gittite,'' that is, a man associated with Gath.'
    reason: cultural_note
  - marker: b
    text: Or 'all his house.' The Hebrew can refer broadly to his household or domestic
      establishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit/dwell/remain.' In this context, with
    the ark as subject and a duration phrase following, 'remained' is the most natural
    English rendering and preserves the sense of continued presence without implying
    personal habitation in an overly literal way.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  - the LORD's ark
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Ark' is the established
    and accurate term for אֲרוֹן here. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name YHWH, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  lexicon: HALOT
  rationale: Here בֵּית with a personal name denotes the physical house/location where
    the ark stayed. Later in the verse, with כָּל and pronominal suffix, the broader
    social sense 'household' is more natural in English.
- source_word: עֹבֵד אֱדֹם
  chosen: Obed-edom
  rationale: Personal name transliterated by standard English convention, in keeping
    with project policy to transliterate names rather than translate them.
- source_word: הַגִּתִּי
  chosen: the Gittite
  alternatives:
  - from Gath
  lexicon: HALOT
  rationale: The gentilic adjective is best preserved as 'the Gittite,' a standard
    and concise rendering. A more explicit paraphrase like 'from Gath' is possible
    but less formally aligned with the Hebrew.
- source_word: שְׁלֹשָׁה חֳדָשִׁים
  chosen: for three months
  alternatives:
  - three months
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration phrase after 'remained.'
    This is not an addition of meaning but natural target-language expression.
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - showed favor to
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' No contextual pressure warrants a more
    interpretive rendering.
- source_word: אֶת עֹבֵד אֱדֹם וְאֶת כָּל בֵּיתוֹ
  chosen: Obed-edom and all his household
  alternatives:
  - Obed-edom and all his house
  lexicon: HALOT
  rationale: '''All his household'' communicates the likely scope of בֵּיתוֹ here—his
    family and domestic establishment—more naturally than the wooden ''all his house,''
    while still covering the full sphere of blessing.'
