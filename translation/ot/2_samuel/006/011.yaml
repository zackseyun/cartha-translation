theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per DOCTRINE.md, the default
    rendering is 'the LORD,' not a transliteration. This is a translation-policy decision
    rather than a theological narrowing of the text's meaning.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
