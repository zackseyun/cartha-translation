theological_decisions:
- issue: Social-status terminology for אָמָהוֹת
  chosen_reading: Render as 'slave girls' in the main text
  alternative_readings:
  - maidservants
  - female servants
  rationale: In keeping with the translation philosophy's original-language primacy
    and willingness to use stronger status language where socially salient, the verse
    contrasts David's self-humbling with honor among women of low social rank. 'Slave
    girls' preserves that status dimension more clearly than traditional 'maidservants.'
