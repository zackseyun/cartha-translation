id: 2SA.6.22
reference: 2 Samuel 6:22
source:
  edition: WLC
  text: וּ/נְקַלֹּ֤תִי עוֹד֙ מִ/זֹּ֔את וְ/הָיִ֥יתִי שָׁפָ֖ל בְּ/עֵינָ֑/י וְ/עִם הָֽ/אֲמָהוֹת֙
    אֲשֶׁ֣ר אָמַ֔רְתְּ עִמָּ֖/ם אִכָּבֵֽדָה־׃
translation:
  text: And I will make myself even more contemptible than this, and I will be lowly
    in my own eyes; but with the slave girls of whom you have spoken, with them I
    will be honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservants' / 'female servants.' The Hebrew refers to women of low
      household status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְקַלֹּתִי
  chosen: I will make myself even more contemptible
  alternatives:
  - I will be even more lightly esteemed
  - I will demean myself still more
  - I will become even more contemptible
  lexicon: HALOT
  rationale: From קלל in the Niphal, expressing being treated or regarded as slight/contemptible.
    In context David embraces further self-humbling. 'Make myself ... contemptible'
    captures the reflexive sense in idiomatic English and fits the contrast with later
    'be honored.'
- source_word: עוֹד מִזֹּאת
  chosen: even more than this
  alternatives:
  - still more than this
  - beyond this
  lexicon: HALOT
  rationale: עוֹד adds continuance/intensification; מִזֹּאת sets comparison with Michal's
    accusation in the previous verse. 'Even more than this' is natural and preserves
    the comparative force.
- source_word: וְהָיִיתִי שָׁפָל בְּעֵינַי
  chosen: and I will be lowly in my own eyes
  alternatives:
  - and I will be humble in my own eyes
  - and I will be base in my own sight
  lexicon: HALOT
  rationale: שָׁפָל denotes low, humble, brought low. 'Lowly' preserves the social/honor
    nuance without overstating moral virtue. 'In my own eyes' is a literal Hebrew
    idiom meaning in my own estimation.
- source_word: הָאֲמָהוֹת
  chosen: the slave girls
  alternatives:
  - the maidservants
  - the female servants
  lexicon: HALOT
  rationale: אָמָה commonly denotes a female slave/servant of lower status. Given
    the honor-shame and status contrast in the verse, 'slave girls' better preserves
    the social inferiority implied than the softer 'maidservants.'
- source_word: אֲשֶׁר אָמַרְתְּ
  chosen: of whom you have spoken
  alternatives:
  - whom you mentioned
  - that you spoke about
  lexicon: HALOT
  rationale: A straightforward relative clause referring back to the women Michal
    mentioned in v. 20. 'Of whom you have spoken' is slightly formal but clear and
    fits the rebuke.
- source_word: עִמָּם
  chosen: with them
  alternatives:
  - among them
  - by them
  lexicon: HALOT
  rationale: The preposition עם is best retained as 'with.' It marks the social sphere
    in which David says honor will be accorded, rather than merely agency.
- source_word: אִכָּבֵדָה
  chosen: I will be honored
  alternatives:
  - I will be held in honor
  - I will gain honor
  - I will be glorified
  lexicon: HALOT
  rationale: From כבד in the Niphal, passive/reflexive sense of receiving honor. 'I
    will be honored' best matches the honor-shame contrast with 'contemptible' and
    avoids the overly theological resonance of 'glorified.'
