id: 2SA.6.1
reference: 2 Samuel 6:1
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף ע֥וֹד דָּוִ֛ד אֶת כָּל בָּח֥וּר בְּ/יִשְׂרָאֵ֖ל שְׁלֹשִׁ֥ים אָֽלֶף־־׃
translation:
  text: David again gathered all the chosen men of Israel, thirty thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young men' or 'select men' for 'chosen men'; the Hebrew בָּחוּר can
      denote youthfulness or being picked/choice, and the context here favors an elite
      muster.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  chosen: again
  alternatives:
  - once again
  - added further
  lexicon: HALOT
  rationale: The idiom with יסף + עוד functions adverbially here, indicating repetition
    rather than simple addition. 'Again' is natural English and captures the narrative
    sense that David undertook another action.
- source_word: אֶת כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Marks the definite direct object with totality. In English, 'all' sufficiently
    conveys the scope without reproducing the object marker.
- source_word: בָּחוּר
  chosen: chosen men
  alternatives:
  - young men
  - select men
  lexicon: HALOT
  rationale: בָּחוּר can denote a young man, but in military or muster contexts it
    often refers to picked or choice men. Given the following number and the context
    of assembling a force, 'chosen men' best fits the sense.
- source_word: בְּיִשְׂרָאֵל
  chosen: of Israel
  alternatives:
  - in Israel
  - from Israel
  lexicon: HALOT
  rationale: 'Although the preposition is ב, in this construction with a collective
    selection it is idiomatic to render the source as partitive/genitival in English:
    the chosen men belonging to Israel. ''Of Israel'' is smoother and contextually
    accurate.'
- source_word: שְׁלֹשִׁים אָלֶף
  chosen: thirty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number expression; rendered directly in standard
    English form.
