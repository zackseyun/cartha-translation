- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. The project doctrine
    specifies 'the LORD' as the default rendering for יְהוָה, so that form is used
    in the main text.
