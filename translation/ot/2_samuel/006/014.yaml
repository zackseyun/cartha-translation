id: 2SA.6.14
reference: 2 Samuel 6:14
source:
  edition: WLC
  text: וְ/דָוִ֛ד מְכַרְכֵּ֥ר בְּ/כָל עֹ֖ז לִ/פְנֵ֣י יְהוָ֑ה וְ/דָוִ֕ד חָג֖וּר אֵפ֥וֹד
    בָּֽד־׃
translation:
  text: And David was dancing with all his might before the LORD, and David was wearing
    a linen ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was whirling' or 'was leaping about'; the Hebrew depicts energetic celebratory
      movement.
    reason: lexical_alternative
  - marker: b
    text: An ephod was a distinctive priestly or cultic garment; here David is described
      as wearing one made of linen.
    reason: cultural_note
lexical_decisions:
- source_word: מְכַרְכֵּר
  chosen: was dancing
  alternatives:
  - was whirling
  - was leaping about
  lexicon: HALOT
  rationale: The participle describes vigorous bodily movement in celebration. 'Was
    dancing' is the clearest natural English rendering in context, while 'whirling'
    is possible but too specific, and 'leaping about' overlaps with nearby descriptions
    elsewhere in the narrative rather than this word alone.
- source_word: בְּכָל עֹז
  chosen: with all his might
  alternatives:
  - with all his strength
  - with all his power
  lexicon: HALOT
  rationale: The phrase expresses total exertion or intensity. 'With all his might'
    is idiomatic modern English and preserves the force of the Hebrew without sounding
    wooden.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD'
    is concise, natural, and preserves the covenantal setting. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' following the
    stated doctrine and established English convention reflecting Jewish reverence
    practice and the Septuagintal pattern.
- source_word: חָגוּר
  chosen: was wearing
  alternatives:
  - was girded with
  - was clothed with
  lexicon: HALOT
  rationale: The passive participial/adjectival form indicates that David was equipped
    or dressed with the garment. 'Was wearing' communicates the sense in readable
    modern English better than the more archaic 'was girded with.'
- source_word: אֵפוֹד
  chosen: ephod
  alternatives:
  - priestly vestment
  lexicon: HALOT
  rationale: '''Ephod'' is a specific Israelite cultic garment with no exact English
    equivalent. Transliteration preserves the technical term more accurately than
    an explanatory paraphrase.'
- source_word: בָּד
  chosen: linen
  alternatives:
  - fine linen
  lexicon: HALOT
  rationale: בָּד here denotes linen material. 'Linen' is sufficient in English; 'fine
    linen' may over-specify quality not explicit in the word itself.
