id: 2SA.6.16
reference: 2 Samuel 6:16
source:
  edition: WLC
  text: וְ/הָיָה֙ אֲר֣וֹן יְהוָ֔ה בָּ֖א עִ֣יר דָּוִ֑ד וּ/מִיכַ֨ל בַּת שָׁא֜וּל נִשְׁקְפָ֣ה
    בְּעַ֣ד הַ/חַלּ֗וֹן וַ/תֵּ֨רֶא אֶת הַ/מֶּ֤לֶךְ דָּוִד֙ מְפַזֵּ֤ז וּ/מְכַרְכֵּר֙
    לִ/פְנֵ֣י יְהוָ֔ה וַ/תִּ֥בֶז ל֖/וֹ בְּ/לִבָּֽ/הּ־׀־׃
translation:
  text: As the ark of the LORD was coming into the city of David, Michal daughter
    of Saul looked out through the window and saw King David leaping and whirling
    before the LORD, and she despised him in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''leaping and whirling''; the verbs depict exuberant, celebratory
      movement before the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: As
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The clause-initial wayyiqtol/qatal narrative formula introduces a temporal
    setting. In idiomatic modern English, 'As' smoothly conveys the circumstantial
    sense with the following participial action, avoiding wooden 'and it happened'
    while preserving narrative flow.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Standard construct rendering. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This is a contested term in the project guidelines; default rendering
    is 'the LORD' to reflect reverential Jewish tradition and LXX-influenced English
    Bible convention.
- source_word: בָּא
  chosen: was coming
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: With the temporal setup and ongoing scene, the English progressive best
    captures the action in progress as Michal observes it. 'Entered' is possible but
    more interpretive than the simple verb 'come'.
- source_word: עִיר דָּוִד
  chosen: the city of David
  lexicon: HALOT
  rationale: Straightforward construct phrase; retained as the established place designation.
- source_word: מִיכַל בַּת שָׁאוּל
  chosen: Michal daughter of Saul
  alternatives:
  - Michal, the daughter of Saul
  lexicon: HALOT
  rationale: Appositional identification is preserved compactly. Omitting the article
    in English keeps the line natural while retaining the relational designation,
    which is narratively significant.
- source_word: נִשְׁקְפָה
  chosen: looked out
  alternatives:
  - looked down
  - gazed out
  lexicon: HALOT
  rationale: The verb denotes looking out from an elevated or enclosed vantage point.
    'Looked out' fits the window context without over-specifying vertical direction.
- source_word: בְּעַד הַחַלּוֹן
  chosen: through the window
  alternatives:
  - out of the window
  - from the window
  lexicon: HALOT
  rationale: בְּעַד commonly means 'through' in this spatial sense; this is the most
    natural English rendering.
- source_word: וַתֵּרֶא
  chosen: saw
  alternatives:
  - watched
  lexicon: HALOT
  rationale: The simple narrative verb 'saw' should be retained unless context demands
    a more durative nuance; here the following participles carry the vividness.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: English idiom normally renders the title-name combination as 'King David.'
- source_word: מְפַזֵּז
  chosen: leaping
  alternatives:
  - skipping
  - dancing energetically
  lexicon: HALOT
  rationale: The rare verb suggests exuberant, springing movement. 'Leaping' is vivid
    and concise, preserving the physicality without paraphrase.
- source_word: וּמְכַרְכֵּר
  chosen: whirling
  alternatives:
  - dancing
  - spinning
  lexicon: HALOT
  rationale: The verb conveys turning or whirling movement. 'Whirling' preserves the
    kinetic imagery and distinguishes it from the previous verb rather than flattening
    both into 'dancing.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard idiomatic rendering that preserves the covenantal/theological
    orientation of David's action.
- source_word: וַתִּבֶז לוֹ
  chosen: she despised him
  alternatives:
  - she held him in contempt
  - she scorned him
  lexicon: HALOT
  rationale: The verb denotes contempt or disdain. 'Despised' is direct, strong, and
    traditional without being archaic.
- source_word: בְּלִבָּהּ
  chosen: in her heart
  alternatives:
  - within herself
  lexicon: HALOT
  rationale: This Hebrew idiom indicates inward attitude rather than spoken expression.
    'In her heart' preserves the anthropological idiom and literary force.
