theological_decisions:
- issue: Rendering the divine action in judgment without softening anthropomorphic
    force
  chosen_reading: the LORD had broken out with a breach against Uzzah
  alternative_readings:
  - the LORD had made an outburst against Uzzah
  - the LORD had burst forth against Uzzah
  rationale: The Hebrew presents the event as a direct act of divine judgment and
    uses emphatic cognate wording. The translation preserves that force rather than
    softening it into mere consequence or accident.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יְהוָה →
    the LORD'
