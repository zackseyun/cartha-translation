id: 2SA.6.8
reference: 2 Samuel 6:8
source:
  edition: WLC
  text: וַ/יִּ֣חַר לְ/דָוִ֔ד עַל֩ אֲשֶׁ֨ר פָּרַ֧ץ יְהוָ֛ה פֶּ֖רֶץ בְּ/עֻזָּ֑ה וַ/יִּקְרָ֞א
    לַ/מָּק֤וֹם הַ/הוּא֙ פֶּ֣רֶץ עֻזָּ֔ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃
translation:
  text: And David was angry because the LORD had broken out with a breach against
    Uzzah, and he called that place Perez-uzzah to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perez-uzzah sounds like 'breach/outburst against Uzzah,' echoing the Hebrew
      wordplay in 'the LORD had broken out with a breach against Uzzah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְדָוִד
  chosen: And David was angry
  alternatives:
  - And it burned to David
  - And David became angry
  lexicon: HALOT
  rationale: The idiom חרה ל expresses anger. 'Was angry' gives clear modern English
    while preserving the emotional force without over-paraphrase.
- source_word: פָּרַץ יְהוָה פֶּרֶץ בְּעֻזָּה
  chosen: the LORD had broken out with a breach against Uzzah
  alternatives:
  - the LORD had made a breach upon Uzzah
  - the LORD had burst out against Uzzah
  lexicon: HALOT
  rationale: The verb פרץ and cognate noun פרץ form a deliberate wordplay emphasizing
    a sudden destructive outburst. 'Broken out with a breach' preserves both the verbal
    action and the cognate noun more closely than a smoother idiom would. 'Against
    Uzzah' reflects ב in a hostile/judicial sense in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD'.
- source_word: וַיִּקְרָא לַמָּקוֹם הַהוּא
  chosen: and he called that place
  alternatives:
  - and he named that place
  lexicon: HALOT
  rationale: A standard naming formula. 'Called that place' is natural and sufficiently
    formal.
- source_word: פֶּרֶץ עֻזָּה
  chosen: Perez-uzzah
  alternatives:
  - Outburst against Uzzah
  - Breach of Uzzah
  lexicon: HALOT
  rationale: This is a place-name formed from the same root פרץ. Per philosophy, names
    are transliterated rather than translated, while the wordplay is preserved in
    the surrounding clause and can be clarified in a footnote.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering in English for the Hebrew temporal
    formula.
