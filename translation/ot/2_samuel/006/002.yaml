id: 2SA.6.2
reference: 2 Samuel 6:2
source:
  edition: WLC
  text: וַ/יָּ֣קָם וַ/יֵּ֣לֶךְ דָּוִ֗ד וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אִתּ֔/וֹ מִֽ/בַּעֲלֵ֖י
    יְהוּדָ֑ה לְ/הַעֲל֣וֹת מִ/שָּׁ֗ם אֵ֚ת אֲר֣וֹן הָ/אֱלֹהִ֔ים אֲשֶׁר נִקְרָ֣א שֵׁ֗ם
    שֵׁ֣ם יְהוָ֧ה צְבָא֛וֹת יֹשֵׁ֥ב הַ/כְּרֻבִ֖ים עָלָֽי/ו׀־־׃
translation:
  text: David arose and went, with all the people who were with him, from Baale-judah
    to bring up from there the ark of God, which is called by the Name—the name of
    the LORD of Armies, who is enthroned above the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Baalah of Judah.” The Hebrew form here is unusual and may reflect
      a place associated with Kiriath-jearim.
    reason: alternative_reading
  - marker: b
    text: Or “over which the name of the LORD of hosts is called.” The Hebrew naming
      formula is compressed and can be rendered more literally this way.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
  - marker: d
    text: Or “who dwells between the cherubim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - set out
  - got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks the beginning of action. 'Arose'
    preserves the narrative sequence without over-paraphrasing.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - proceeded
  lexicon: HALOT
  rationale: הלך in simple narrative is best rendered 'went.' Keeping both verbs ('arose
    and went') reflects the Hebrew style rather than collapsing them.
- source_word: וְכָל־הָעָם אֲשֶׁר אִתּוֹ
  chosen: with all the people who were with him
  alternatives:
  - and all the people who were with him
  lexicon: HALOT
  rationale: This phrase accompanies David in the action. Rendering with 'with' in
    English makes the relation clear while preserving the full scope of the company.
- source_word: מִבַּעֲלֵי יְהוּדָה
  chosen: from Baale-judah
  alternatives:
  - from Baalah of Judah
  - from the lords/citizens of Judah
  lexicon: HALOT
  rationale: The phrase is best taken as a place name here, parallel to the destination-purpose
    clause about bringing up the ark 'from there.' 'Baale-judah' preserves the proper-name
    force. Because the underlying form is unusual and related to the place elsewhere
    called Kiriath-jearim/Baalah, an alternative is worth preserving in a footnote.
- source_word: לְהַעֲלוֹת מִשָּׁם
  chosen: to bring up from there
  alternatives:
  - to carry up from there
  - to bring from there
  lexicon: HALOT
  rationale: עלה in the Hiphil often means 'bring up.' The idiom is standard for moving
    the ark to Jerusalem and should be retained.
- source_word: אֵת אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: This is the standard designation for the ark in narrative context. 'Ark
    of God' is both accurate and natural.
- source_word: אֲשֶׁר נִקְרָא שֵׁם
  chosen: which is called by the Name
  alternatives:
  - over which the Name is called
  - which bears the Name
  - upon which the Name is invoked
  lexicon: HALOT
  rationale: The Hebrew construction is compressed and solemn. 'Called by the Name'
    preserves the covenantal naming formula without flattening it into mere possession.
    The capitalized 'Name' signals the reverential force of שֵׁם in this context.
- source_word: שֵׁם יְהוָה צְבָאוֹת
  chosen: the name of the LORD of Armies
  alternatives:
  - the name of the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated; 'Armies' is more transparent to modern readers than the traditional
    'hosts,' while preserving the martial-heavenly sense.
- source_word: יֹשֵׁב הַכְּרֻבִים
  chosen: who is enthroned above the cherubim
  alternatives:
  - who dwells between the cherubim
  - enthroned on the cherubim
  lexicon: HALOT
  rationale: יֹשֵׁב with the cherubim in ark theology denotes enthronement, not mere
    residence. 'Above the cherubim' fits the ark imagery in accessible English.
- source_word: עָלָיו
  chosen: above the cherubim
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: The final pronoun most naturally refers back to the ark in the naming
    formula, but in English the sense is best completed by attaching the enthronement
    phrase to 'the cherubim.' This avoids an awkward literal ending while preserving
    the referential sense.
