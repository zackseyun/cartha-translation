theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The Hebrew title is translated for meaning rather than preserved in traditional
    ecclesiastical wording. 'Armies' is clearer to modern readers while retaining
    the title's force.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Handling the compressed naming formula for the ark
  chosen_reading: which is called by the Name—the name of the LORD of Armies, who
    is enthroned above the cherubim
  alternative_readings:
  - over which the name of the LORD of hosts is called
  - which bears the name of the LORD of hosts, who dwells between the cherubim
  rationale: The Hebrew is syntactically dense and theologically weighty. The chosen
    rendering preserves the solemn covenantal association of the ark with the divine
    Name without over-resolving every grammatical ambiguity.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
