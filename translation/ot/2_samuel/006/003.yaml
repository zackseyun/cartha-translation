id: 2SA.6.3
reference: 2 Samuel 6:3
source:
  edition: WLC
  text: וַ/יַּרְכִּ֜בוּ אֶת אֲר֤וֹן הָֽ/אֱלֹהִים֙ אֶל עֲגָלָ֣ה חֲדָשָׁ֔ה וַ/יִּשָּׂאֻ֔/הוּ
    מִ/בֵּ֥ית אֲבִינָדָ֖ב אֲשֶׁ֣ר בַּ/גִּבְעָ֑ה וְ/עֻזָּ֣א וְ/אַחְי֗וֹ בְּנֵי֙ אֲבִ֣ינָדָ֔ב
    נֹהֲגִ֖ים אֶת הָ/עֲגָלָ֥ה חֲדָשָֽׁה־־־׃
translation:
  text: They set the ark of God on a new cart and carried it from the house of Abinadab,
    which was on the hill; and Uzzah and Ahio, the sons of Abinadab, were driving
    the new cart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which was at Gibeah,' taking the phrase as a place name rather than
      a topographical description.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְכִּבוּ
  chosen: They set ... on
  alternatives:
  - they mounted
  - they loaded
  - they made ride
  lexicon: HALOT
  rationale: From רכב in the causative sense of causing to ride/placing upon. In English,
    with an ark and cart, 'set ... on' is the most natural equivalent while preserving
    the concrete action.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the chest of God
  lexicon: HALOT
  rationale: אֲרוֹן is the standard term for the sacred ark in this context; 'ark'
    preserves established referential meaning without paraphrase.
- source_word: אֶל עֲגָלָה חֲדָשָׁה
  chosen: on a new cart
  alternatives:
  - onto a new wagon
  lexicon: HALOT
  rationale: Although אֶל is formally 'to/onto,' idiomatic English with placement
    onto a vehicle is 'on.' 'Cart' is the standard rendering for עֲגָלָה here.
- source_word: וַיִּשָּׂאֻהוּ
  chosen: carried it
  alternatives:
  - bore it
  - took it up
  lexicon: HALOT
  rationale: נשא commonly means lift, carry, bear. With the ark as object, 'carried
    it' is clear modern English. The pronoun refers back to the ark.
- source_word: מִבֵּית אֲבִינָדָב
  chosen: from the house of Abinadab
  alternatives:
  - from Abinadab's house
  lexicon: HALOT
  rationale: A straightforward construct phrase; either English form is possible,
    but the fuller form mirrors the Hebrew structure more closely.
- source_word: אֲשֶׁר בַּגִּבְעָה
  chosen: which was on the hill
  alternatives:
  - which was at Gibeah
  - that was on the hillside
  lexicon: HALOT
  rationale: The phrase can be read either as a topographical description ('on the
    hill') or as a place name ('at Gibeah'). Since the Hebrew has the article with
    גבעה and the plain sense is locative/topographical, the main text keeps 'on the
    hill,' while the place-name possibility is preserved in a footnote.
- source_word: וְעֻזָּא וְאַחְיוֹ
  chosen: and Uzzah and Ahio
  lexicon: HALOT
  rationale: Standard transliteration of the personal names, following the policy
    to transliterate names rather than translate them.
- source_word: בְּנֵי אֲבִינָדָב
  chosen: the sons of Abinadab
  alternatives:
  - the descendants of Abinadab
  lexicon: HALOT
  rationale: בְּנֵי most naturally means literal 'sons' here in narrative genealogy.
    No contextual pressure requires the broader 'descendants.'
- source_word: נֹהֲגִים
  chosen: were driving
  alternatives:
  - were leading
  - were guiding
  lexicon: HALOT
  rationale: The participle of נהג denotes driving or leading animals/vehicles. Since
    the object is the cart, 'were driving' best fits the immediate context.
- source_word: הָעֲגָלָה חֲדָשָׁה
  chosen: the new cart
  alternatives:
  - the new wagon
  lexicon: HALOT
  rationale: Repeated phrase retained for narrative emphasis and lexical consistency.
