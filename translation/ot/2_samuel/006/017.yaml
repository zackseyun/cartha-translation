id: 2SA.6.17
reference: 2 Samuel 6:17
source:
  edition: WLC
  text: וַ/יָּבִ֜אוּ אֶת אֲר֣וֹן יְהוָ֗ה וַ/יַּצִּ֤גוּ אֹת/וֹ֙ בִּ/מְקוֹמ֔/וֹ בְּ/ת֣וֹךְ הָ/אֹ֔הֶל אֲשֶׁ֥ר נָטָה ל֖/וֹ דָּוִ֑ד וַ/יַּ֨עַל דָּוִ֥ד עֹל֛וֹת לִ/פְנֵ֥י יְהוָ֖ה וּ/שְׁלָמִֽים־־׃
translation:
  text: They brought in the ark of Yahweh and set it in its place, inside the tent that David had pitched for it. And David offered burnt offerings and peace offerings before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace offerings,' alternatively 'fellowship offerings' or 'offerings of well-being' for Hebrew שְׁלָמִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  - the LORD's ark
  lexicon: HALOT
  rationale: אֲרוֹן is the ark/chest; in this established cultic expression, 'ark' is the natural English rendering. יְהוָה follows the doctrinal default 'the LORD' rather than a transliteration such as 'Yahweh'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּבִאוּ
  chosen: They brought in
  alternatives:
  - They brought
  - They carried in
  lexicon: HALOT
  rationale: The Hifil of בוא here denotes causing the ark to come into the prepared location. 'Brought in' captures both motion and destination naturally in English.
- source_word: וַיַּצִּגוּ אֹתוֹ בִּמְקוֹמוֹ
  chosen: and set it in its place
  alternatives:
  - and placed it in its place
  - and stationed it in its place
  lexicon: HALOT
  rationale: יצג in this context means to place/set in position. 'Set it in its place' is idiomatic and preserves the sense of deliberate positioning.
- source_word: בְּתוֹךְ הָאֹהֶל
  chosen: inside the tent
  alternatives:
  - in the midst of the tent
  - within the tent
  lexicon: HALOT
  rationale: בְּתוֹךְ indicates interior location. 'Inside the tent' is clear modern English without loss of meaning.
- source_word: אֲשֶׁר נָטָה לוֹ דָּוִד
  chosen: that David had pitched for it
  alternatives:
  - that David had spread for it
  - that David had set up for it
  lexicon: HALOT
  rationale: נטה with tent language commonly means to stretch out or pitch a tent. The pronoun לוֹ refers to the ark in context; English requires an explicit object, best rendered 'for it.' The pluperfect 'had pitched' reflects prior action relative to the ark's arrival.
- source_word: וַיַּעַל דָּוִד
  chosen: And David offered
  alternatives:
  - And David brought up
  - And David presented
  lexicon: HALOT
  rationale: עלה in sacrificial contexts means to offer up. Since the direct objects are sacrifices, 'offered' is the clearest contextual rendering.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for a burnt offering; the plural is retained.
- source_word: וּשְׁלָמִים
  chosen: and peace offerings
  alternatives:
  - and fellowship offerings
  - and offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings.' While 'fellowship offerings' or 'offerings of well-being' are possible, 'peace offerings' remains both recognizable and sufficiently accurate here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is concise and standard in sacrificial contexts.
