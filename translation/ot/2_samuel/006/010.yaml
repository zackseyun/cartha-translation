id: 2SA.6.10
reference: 2 Samuel 6:10
source:
  edition: WLC
  text: וְ/לֹֽא אָבָ֣ה דָוִ֗ד לְ/הָסִ֥יר אֵלָ֛י/ו אֶת אֲר֥וֹן יְהוָ֖ה עַל עִ֣יר דָּוִ֑ד וַ/יַּטֵּ֣/הוּ דָוִ֔ד בֵּ֥ית עֹבֵֽד אֱד֖וֹם הַ/גִּתִּֽי־־־־׃
translation:
  text: So David was not willing to bring the ark of Yahweh to himself into the City of David, but David turned it aside to the house of Obed-edom the Gittite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'up to the City of David.' The Hebrew preposition can suggest movement upward/toward as well as simple destination.
    reason: lexical_alternative
  - marker: b
    text: Or 'the man from Gath' for 'the Gittite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - did not want
  - refused
  lexicon: HALOT
  rationale: אָבָה denotes willingness or consent. 'Was not willing' preserves the nuance of reluctance/decision better than the flatter 'did not want' and avoids the stronger adversarial sense of 'refused'.
- source_word: לְהָסִיר אֵלָיו
  chosen: to bring ... to himself
  alternatives:
  - to remove ... to himself
  - to take ... to him
  lexicon: HALOT
  rationale: הֵסִיר literally means 'remove/turn aside,' but in this context of relocating the ark toward David's residence/seat, idiomatic English is better served by 'bring ... to himself.' The following verb וַיַּטֵּהוּ then expresses the actual diversion elsewhere.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Standard construct rendering. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: עַל עִיר דָוִד
  chosen: into the City of David
  alternatives:
  - up to the City of David
  - to the City of David
  lexicon: HALOT
  rationale: עַל can mark movement toward/up to a place. In English, 'into the City of David' communicates the destination naturally in this narrative context. 'Up to' is possible but less idiomatic here.
- source_word: וַיַּטֵּהוּ
  chosen: turned it aside
  alternatives:
  - diverted it
  - took it aside
  lexicon: HALOT
  rationale: From נטה, here meaning to turn aside/direct elsewhere. 'Turned it aside' preserves the concrete sense and contrasts well with the prior intended destination.
- source_word: בֵּית עֹבֵד אֱדוֹם
  chosen: the house of Obed-edom
  alternatives:
  - the household of Obed-edom
  lexicon: HALOT
  rationale: בֵּית can mean house/household. Since the ark is being lodged at a physical residence, 'house' is the more immediate sense, though 'household' remains a plausible nuance.
- source_word: הַגִּתִּי
  chosen: the Gittite
  alternatives:
  - the man from Gath
  lexicon: HALOT
  rationale: The gentilic is best preserved by the conventional transliterated form 'Gittite,' with the more explicit geographical sense available as an alternative.
