id: 2SA.6.19
reference: 2 Samuel 6:19
source:
  edition: WLC
  text: וַ/יְחַלֵּ֨ק לְ/כָל הָ/עָ֜ם לְ/כָל הֲמ֣וֹן יִשְׂרָאֵל֮ לְ/מֵ/אִ֣ישׁ וְ/עַד
    אִשָּׁה֒ לְ/אִ֗ישׁ חַלַּ֥ת לֶ֨חֶם֙ אַחַ֔ת וְ/אֶשְׁפָּ֣ר אֶחָ֔ד וַ/אֲשִׁישָׁ֖ה
    אֶחָ֑ת וַ/יֵּ֥לֶךְ כָּל הָ/עָ֖ם אִ֥ישׁ לְ/בֵיתֽ/וֹ־־־־׃
translation:
  text: He distributed to all the people, to the whole multitude of Israel, from man
    to woman, to each person one loaf of bread, one portion of meat, and one raisin
    cake. Then all the people went away, each to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one measure/portion'; the Hebrew word אֶשְׁפָּר is rare. Many understand
      it here as a portion of meat, especially in light of the parallel account in
      1 Chronicles 16:3.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man to woman,' an idiom meaning the entire gathered people,
      both male and female.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְחַלֵּק
  chosen: He distributed
  alternatives:
  - he apportioned
  - he divided out
  lexicon: HALOT
  rationale: The piel form of חלק here denotes distributing portions to a crowd. 'Distributed'
    is natural modern English and preserves the concrete act of giving portions.
- source_word: לְכָל הָעָם / לְכָל הֲמוֹן יִשְׂרָאֵל
  chosen: to all the people, to the whole multitude of Israel
  alternatives:
  - to all the people, to all the assembly of Israel
  - to all the people, to the entire throng of Israel
  lexicon: HALOT
  rationale: The paired phrases are somewhat appositional and emphatic. Rendering
    both preserves the Hebrew fullness rather than collapsing them into one phrase.
- source_word: לְמֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from men to women
  - from every man to every woman
  lexicon: HALOT
  rationale: This idiom marks the full range of the gathered people. 'From man to
    woman' is gender-accurate and reflects the singular Hebrew idiom without unnecessary
    smoothing.
- source_word: לְאִישׁ
  chosen: to each person
  alternatives:
  - to each man
  - to each one
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, the immediate context
    has already specified inclusion 'from man to woman.' Therefore 'to each person'
    best conveys distributive force in idiomatic English without implying males only.
- source_word: חַלַּת לֶחֶם אַחַת
  chosen: one loaf of bread
  alternatives:
  - one cake of bread
  - one round loaf of bread
  lexicon: HALOT
  rationale: חלה refers to a bread-cake or loaf. 'One loaf of bread' is clear and
    suitably concrete for modern readers.
- source_word: אֶשְׁפָּר אֶחָד
  chosen: one portion of meat
  alternatives:
  - one measure of meat
  - one serving
  lexicon: HALOT
  rationale: The noun is rare and debated, but in this context and in light of the
    parallel in 1 Chronicles 16:3, a food portion, likely meat, is the most plausible
    sense. The rendering avoids overprecision while reflecting the likely referent.
- source_word: אֲשִׁישָׁה אֶחָת
  chosen: one raisin cake
  alternatives:
  - one cake of raisins
  - one pressed cake
  lexicon: HALOT
  rationale: אֲשִׁישָׁה commonly denotes a pressed cake, often understood as raisin-based
    in biblical usage. 'Raisin cake' is the standard clear rendering.
- source_word: וַיֵּלֶךְ כָּל הָעָם אִישׁ לְבֵיתוֹ
  chosen: Then all the people went away, each to his house
  alternatives:
  - And all the people went, each to his home
  - Then all the people departed, each to his house
  lexicon: HALOT
  rationale: The clause narrates the dispersal after the distribution. 'Went away'
    reads naturally in English, and 'each to his house' preserves the distributive
    singular of the Hebrew.
