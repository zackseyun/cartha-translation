id: 2SA.20.19
reference: 2 Samuel 20:19
source:
  edition: WLC
  text: אָנֹכִ֕י שְׁלֻמֵ֖י אֱמוּנֵ֣י יִשְׂרָאֵ֑ל אַתָּ֣ה מְבַקֵּ֗שׁ לְ/הָמִ֨ית עִ֤יר וְ/אֵם֙ בְּ/יִשְׂרָאֵ֔ל לָ֥/מָּה תְבַלַּ֖ע נַחֲלַ֥ת יְהוָֽה׃פ
translation:
  text: I am one of the peaceable and faithful in Israel. You are seeking to destroy a city, and a mother in Israel. Why would you swallow up the inheritance of Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a city that is a mother in Israel,' likely meaning a prominent or nurturing city within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֻמֵי
  chosen: one of the peaceable
  alternatives:
  - at peace
  - peaceful
  - those who are at peace
  lexicon: HALOT
  rationale: The plural construct from שלום is idiomatic and difficult if rendered woodenly ('the peaceful of'). In context the speaker identifies herself with the peaceful/peaceable party in Israel, not merely stating a private feeling of peace. 'One of the peaceable' preserves the collective nuance while reading naturally in English.
- source_word: אֱמוּנֵי
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: From אמן in an adjectival/substantival plural form, describing those marked by fidelity or reliability. 'Faithful' best captures covenantal-social loyalty here and pairs naturally with 'peaceable.'
- source_word: מְבַקֵּשׁ לְהָמִית
  chosen: are seeking to put to death
  alternatives:
  - seek to kill
  - are trying to destroy
  lexicon: HALOT
  rationale: The participle plus infinitive expresses active intent. 'Put to death' is slightly more formal than 'kill' and fits the gravity of military destruction without overparaphrasing into 'destroy,' which would blur the specific verb מות.
- source_word: עִיר וְאֵם בְּיִשְׂרָאֵל
  chosen: a city, and a mother in Israel
  alternatives:
  - a city and a mother in Israel
  - a city that is a mother in Israel
  - a mother-city in Israel
  lexicon: HALOT
  rationale: The phrase is likely appositional or metaphorical, describing the city as a 'mother' in Israel, that is, a prominent or nurturing city. The more literal rendering 'a city, and a mother in Israel' preserves the Hebrew imagery and rhetorical force without prematurely collapsing it into an interpretive paraphrase. An explanatory alternative is preserved in a footnote.
- source_word: תְבַלַּע
  chosen: would you swallow up
  alternatives:
  - swallow
  - devour
  - consume
  lexicon: HALOT
  rationale: בלע literally means 'swallow up.' In siege context it metaphorically denotes engulfing or destroying, but the vivid image should be retained in the main text.
- source_word: נַחֲלַת יְהוָה
  chosen: the inheritance of the LORD
  alternatives:
  - the LORD's inheritance
  - the heritage of the LORD
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance/heritage, often with covenantal overtones. 'The inheritance of the LORD' is transparent and preserves the theological claim that Israel belongs to the LORD. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving reverential convention and consistency with the doctrine guidelines.
