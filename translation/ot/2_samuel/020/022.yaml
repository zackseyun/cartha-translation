id: 2SA.20.22
reference: 2 Samuel 20:22
source:
  edition: WLC
  text: וַ/תָּבוֹא֩ הָ/אִשָּׁ֨ה אֶל כָּל הָ/עָ֜ם בְּ/חָכְמָתָ֗/הּ וַֽ/יִּכְרְת֞וּ
    אֶת רֹ֨אשׁ שֶׁ֤בַע בֶּן בִּכְרִי֙ וַ/יַּשְׁלִ֣כוּ אֶל יוֹאָ֔ב וַ/יִּתְקַע֙ בַּ/שּׁוֹפָ֔ר
    וַ/יָּפֻ֥צוּ מֵֽ/עַל הָ/עִ֖יר אִ֣ישׁ לְ/אֹהָלָ֑י/ו וְ/יוֹאָ֛ב שָׁ֥ב יְרוּשָׁלִַ֖ם
    אֶל הַ/מֶּֽלֶךְ־־־־־־־׃ס
translation:
  text: Then the woman went to all the people in her wisdom, and they cut off the
    head of Sheba son of Bichri and threw it to Joab. Then he blew the trumpet, and
    they dispersed from the city, each man to his tent; and Joab returned to Jerusalem
    to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man to his tent,'' a stock idiom for dispersing to one''s
      own place.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּבוֹא
  chosen: went
  alternatives:
  - came
  lexicon: HALOT
  rationale: The verb בוא can mean 'come' or 'go' depending on viewpoint. In English
    narrative from the external narrator's perspective, 'went' fits the movement toward
    the people better than 'came.'
- source_word: הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Definite noun referring back to the wise woman of Abel; 'the woman' preserves
    the Hebrew wording without importing 'wise' again into the noun phrase.
- source_word: אֶל כָּל הָעָם
  chosen: to all the people
  alternatives:
  - to all the troops
  - to all the townspeople
  lexicon: HALOT
  rationale: עָם is broad and contextually refers to the gathered people involved
    in the city's response. 'People' is the most textually neutral rendering.
- source_word: בְּחָכְמָתָהּ
  chosen: with her wisdom
  alternatives:
  - wisely
  - by her wisdom
  lexicon: HALOT
  rationale: The preposition ב plus noun is retained more explicitly as 'with her
    wisdom,' preserving the means/instrument nuance and the narrative emphasis on
    her wise action.
- source_word: וַיִּכְרְתוּ
  chosen: cut off
  alternatives:
  - cut down
  - severed
  lexicon: HALOT
  rationale: With 'head' as object, 'cut off' is the natural English equivalent and
    clearly conveys decapitation.
- source_word: רֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Literal rendering is required by the context.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  alternatives:
  - Sheba, the son of Bichri
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew patronymic while transliterating
    the personal names.
- source_word: וַיַּשְׁלִכוּ
  chosen: threw
  alternatives:
  - cast
  - flung
  lexicon: HALOT
  rationale: '''Threw'' is idiomatic modern English and matches the force of the verb
    without sounding archaic.'
- source_word: אֶל יוֹאָב
  chosen: to Joab
  alternatives:
  - toward Joab
  lexicon: HALOT
  rationale: The preposition marks direction/recipient; 'to Joab' is the natural English
    rendering.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  chosen: he blew the trumpet
  alternatives:
  - he sounded the horn
  - he blew the ram's horn
  lexicon: HALOT
  rationale: The singular subject is Joab. שׁוֹפָר is specifically a horn/trumpet;
    'trumpet' is conventional and clear in English narrative, while 'blew' captures
    the idiom תקע בשופר.
- source_word: וַיָּפֻצוּ
  chosen: they dispersed
  alternatives:
  - they scattered
  lexicon: HALOT
  rationale: The verb denotes breaking up and spreading out. 'Dispersed' fits the
    military withdrawal context slightly better than 'scattered,' which can imply
    panic.
- source_word: מֵעַל הָעִיר
  chosen: from the city
  alternatives:
  - away from the city
  - from against the city
  lexicon: HALOT
  rationale: Literally 'from upon/against the city,' referring to the siege position.
    'From the city' is smoother English, while the dispersal context already implies
    withdrawal from the assault.
- source_word: אִישׁ לְאֹהָלָיו
  chosen: each man to his tent
  alternatives:
  - each to his tent
  - every man to his home
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for dispersing to one's dwelling
    or place. Following the project's gender-accurate policy, 'each man' preserves
    אִישׁ. 'Tent' is kept literally rather than flattened to 'home,' since the idiom
    is well established in this corpus.
- source_word: וְיוֹאָב שָׁב יְרוּשָׁלַם אֶל הַמֶּלֶךְ
  chosen: and Joab returned to Jerusalem to the king
  alternatives:
  - and Joab went back to Jerusalem to the king
  lexicon: HALOT
  rationale: שׁוּב is naturally 'return.' The sequence indicates Joab's return to
    the royal court in Jerusalem.
