id: 2SA.14.25
reference: 2 Samuel 14:25
source:
  edition: WLC
  text: וּ/כְ/אַבְשָׁל֗וֹם לֹא הָיָ֧ה אִישׁ יָפֶ֛ה בְּ/כָל יִשְׂרָאֵ֖ל לְ/הַלֵּ֣ל
    מְאֹ֑ד מִ/כַּ֤ף רַגְל/וֹ֙ וְ/עַ֣ד קָדְקֳד֔/וֹ לֹא הָ֥יָה ב֖/וֹ מֽוּם־־־־׃
translation:
  text: Now in all Israel there was not a man as handsome as Absalom, so highly praised;
    from the sole of his foot to the crown of his head there was no blemish in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greatly praised' or 'praised exceedingly.' The Hebrew phrase לְהַלֵּל
      מְאֹד expresses the exceptional degree of praise Absalom received for his appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְאַבְשָׁלוֹם
  chosen: Now ... Absalom
  alternatives:
  - And as for Absalom
  - Now Absalom
  lexicon: HALOT
  rationale: The prefixed conjunction plus comparative/asseverative particle introduces
    a new focus on Absalom. English smooths this as a discourse shift, best represented
    by 'Now ... Absalom' rather than a wooden 'And like Absalom.'
- source_word: לֹא הָיָה אִישׁ יָפֶה
  chosen: there was not a man as handsome
  alternatives:
  - there was no handsome man
  - no man was so handsome
  lexicon: HALOT
  rationale: 'The idiom expresses superlative comparison: no man in Israel matched
    Absalom in beauty. ''As handsome'' captures the comparative force naturally in
    English.'
- source_word: יָפֶה
  chosen: handsome
  alternatives:
  - beautiful
  - good-looking
  lexicon: HALOT
  rationale: For a male subject in context, 'handsome' is the most idiomatic English
    equivalent; 'beautiful' is possible but less natural here.
- source_word: בְּכָל יִשְׂרָאֵל
  chosen: in all Israel
  alternatives:
  - throughout all Israel
  lexicon: HALOT
  rationale: A straightforward locative phrase indicating the whole nation.
- source_word: לְהַלֵּל מְאֹד
  chosen: so highly praised
  alternatives:
  - greatly praised
  - to be praised greatly
  - for praise exceedingly
  lexicon: HALOT
  rationale: The infinitive with מְאֹד indicates the degree to which his beauty was
    the object of praise. 'So highly praised' conveys both the result and intensity
    in natural English.
- source_word: מִכַּף רַגְלוֹ
  chosen: from the sole of his foot
  alternatives:
  - from the bottom of his foot
  - from the palm of his foot
  lexicon: HALOT
  rationale: כַּף with 'foot' refers idiomatically to the sole of the foot.
- source_word: וְעַד קָדְקֳדוֹ
  chosen: to the crown of his head
  alternatives:
  - to his scalp
  - to the top of his head
  lexicon: HALOT
  rationale: קָדְקֹד denotes the crown/top of the head. 'Crown of his head' is idiomatic
    and preserves the body-part merism.
- source_word: לֹא הָיָה בוֹ מוּם
  chosen: there was no blemish in him
  alternatives:
  - there was no defect in him
  - he had no flaw
  lexicon: HALOT
  rationale: מוּם often denotes a physical defect or blemish. 'Blemish' preserves
    the slightly elevated register and the sense of bodily flaw in this description
    of physical perfection.
