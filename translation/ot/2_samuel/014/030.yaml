id: 2SA.14.30
reference: 2 Samuel 14:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֶל עֲבָדָ֜י/ו רְאוּ֩ חֶלְקַ֨ת יוֹאָ֤ב אֶל יָדִ/י֙ וְ/ל/וֹ שָׁ֣ם
    שְׂעֹרִ֔ים לְכ֖וּ ו/הוצתי/ה בָ/אֵ֑שׁ וַ/יַּצִּ֜תוּ עַבְדֵ֧י אַבְשָׁל֛וֹם אֶת הַ/חֶלְקָ֖ה
    בָּ/אֵֽשׁ־־־־׃פ
translation:
  text: Then he said to his servants, “Look, Joab’s field is next to mine, and he
    has barley there. Go and set it on fire.” So Absalom’s servants set the field
    on fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Joab’s field is at my hand,” an idiom meaning it is beside
      or adjacent to Absalom’s property.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְקַת
  chosen: field
  alternatives:
  - portion
  - plot of land
  lexicon: HALOT
  rationale: In this narrative context the noun refers to a tract of cultivated land
    belonging to Joab, not an abstract 'portion.' 'Field' is the most natural English
    equivalent for agricultural property.
- source_word: אֶל יָדִי
  chosen: next to mine
  alternatives:
  - at my hand
  - beside me
  - adjacent to my property
  lexicon: HALOT
  rationale: The idiom literally involves 'to/at my hand,' but in land-description
    context it denotes proximity or adjacency. 'Next to mine' communicates the plain
    sense in natural English.
- source_word: שְׂעֹרִים
  chosen: barley
  alternatives:
  - barley grain
  lexicon: HALOT
  rationale: The plural noun denotes barley as a crop growing in the field. English
    normally uses the mass noun 'barley' here.
- source_word: וְהוּצִיתִהָ
  chosen: set it on fire
  alternatives:
  - burn it
  - ignite it
  lexicon: HALOT
  rationale: The Hiphil of יצת means to kindle or set ablaze. 'Set it on fire' is
    idiomatic and preserves the causative force better than the bare 'burn it.' The
    feminine suffix refers back to the field/plot.
- source_word: וַיַּצִּתוּ
  chosen: set ... on fire
  alternatives:
  - burned
  - kindled
  lexicon: HALOT
  rationale: The same verb appears in the narrative result clause. Repeating 'set
    ... on fire' preserves lexical consistency and reflects the action commanded.
- source_word: עַבְדָיו / עַבְדֵי אַבְשָׁלוֹם
  chosen: servants / Absalom’s servants
  alternatives:
  - slaves
  - attendants
  lexicon: HALOT
  rationale: Although עבד can denote slaves or servants, this courtly narrative context
    does not foreground bonded status. 'Servants' fits the social setting without
    over-specifying.
- source_word: רְאוּ
  chosen: Look
  alternatives:
  - See
  - Take note
  lexicon: HALOT
  rationale: The imperative introduces attention to the nearby field. 'Look' is natural
    spoken English in direct speech.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: A straightforward imperative of movement preceding the command to ignite
    the field.
