id: 2SA.14.31
reference: 2 Samuel 14:31
source:
  edition: WLC
  text: וַ/יָּ֣קָם יוֹאָ֔ב וַ/יָּבֹ֥א אֶל אַבְשָׁל֖וֹם הַ/בָּ֑יְתָ/ה וַ/יֹּ֣אמֶר אֵלָ֔י/ו
    לָ֣/מָּה הִצִּ֧יתוּ עֲבָדֶ֛/ךָ אֶת הַ/חֶלְקָ֥ה אֲשֶׁר לִ֖/י בָּ/אֵֽשׁ־־־׃
translation:
  text: Then Joab arose and went to Absalom’s house and said to him, “Why have your
    servants set my field on fire?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the plot of land that belongs to me with fire.'' English idiom
      renders this as ''my field on fire.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then Joab arose
  alternatives:
  - Then Joab got up
  - So Joab arose
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Arose' preserves the formal narrative
    idiom without sounding overly archaic in context; 'then' captures the sequential
    force.
- source_word: וַיָּבֹא אֶל אַבְשָׁלוֹם הַבָּיְתָה
  chosen: went to Absalom’s house
  alternatives:
  - came to Absalom at the house
  - went into the house to Absalom
  lexicon: HALOT
  rationale: הַבָּיְתָה with directional he means 'to the house/homeward.' In context
    it refers to Absalom's residence. 'Went to Absalom’s house' is natural English
    and preserves the destination.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the plain and idiomatic rendering.
- source_word: הִצִּיתוּ
  chosen: have ... set ... on fire
  alternatives:
  - have burned
  - have kindled
  lexicon: HALOT
  rationale: The Hiphil of יצת means to ignite or set ablaze. 'Set on fire' is the
    clearest modern English equivalent and preserves the causative sense better than
    simply 'burned.'
- source_word: עֲבָדֶךָ
  chosen: your servants
  alternatives:
  - your slaves
  - your men
  lexicon: HALOT
  rationale: Although the singular form with 2ms suffix can function collectively,
    the verb הִצִּיתוּ is plural, indicating a plural subject in sense. 'Your servants'
    best reflects the social relationship here without importing the stronger bonded
    nuance of 'slaves,' which is not foregrounded in this courtly narrative context.
- source_word: הַחֶלְקָה
  chosen: my field
  alternatives:
  - the plot of land that belongs to me
  - my parcel
  lexicon: HALOT
  rationale: חֶלְקָה denotes a tract or plot of land. 'Field' is concise and idiomatic
    in English narrative, while the following relative clause supplies possession.
- source_word: אֲשֶׁר לִי
  chosen: my
  alternatives:
  - that belongs to me
  lexicon: HALOT
  rationale: 'The relative clause explicitly marks possession: ''which is mine.''
    English naturally compresses this to ''my'' before ''field'' without loss of meaning.'
- source_word: בָּאֵשׁ
  chosen: on fire
  alternatives:
  - with fire
  - in the fire
  lexicon: HALOT
  rationale: 'The beth marks means/instrument: ''with fire.'' In idiomatic English
    after ''set,'' the natural equivalent is ''set ... on fire.'''
