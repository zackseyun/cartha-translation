id: 2SA.14.15
reference: 2 Samuel 14:15
source:
  edition: WLC
  text: וְ֠/עַתָּה אֲשֶׁר בָּ֜אתִי לְ/דַבֵּ֨ר אֶל הַ/מֶּ֤לֶךְ אֲדֹנִ/י֙ אֶת הַ/דָּבָ֣ר
    הַ/זֶּ֔ה כִּ֥י יֵֽרְאֻ֖/נִי הָ/עָ֑ם וַ/תֹּ֤אמֶר שִׁפְחָֽתְ/ךָ֙ אֲדַבְּרָה נָּ֣א
    אֶל הַ/מֶּ֔לֶךְ אוּלַ֛י יַעֲשֶׂ֥ה הַ/מֶּ֖לֶךְ אֶת דְּבַ֥ר אֲמָתֽ/וֹ־־־־־־׃
translation:
  text: And now I have come to speak this matter to my lord the king, because the
    people have frightened me. So your servant said, ‘Please, let me speak to the
    king; perhaps the king will do the word of his servant.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because the people made me afraid.' The Hebrew verb is causative ('frightened
      me'), not 'the people fear me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the word of his maidservant.' That is, her request or plea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the speaker's present explanation; 'And
    now' preserves the connective ו plus temporal עתה.
- source_word: אֲשֶׁר בָּאתִי לְדַבֵּר
  chosen: I have come to speak
  alternatives:
  - I came to speak
  - I have come to say
  lexicon: HALOT
  rationale: The clause explains why she is present. English present perfect fits
    the current-result sense in context better than a simple past, while retaining
    the basic motion + infinitive construction.
- source_word: אֶל הַמֶּלֶךְ אֲדֹנִי
  chosen: to my lord the king
  alternatives:
  - to the king my lord
  lexicon: HALOT
  rationale: Preserves both the royal title and deferential address in natural English
    word order.
- source_word: אֶת הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this word
  - this thing
  lexicon: HALOT
  rationale: דבר here refers to the case/request she is presenting, not merely a spoken
    word. 'Matter' is idiomatic and suitably formal.
- source_word: כִּי יֵרְאֻנִי הָעָם
  chosen: because the people have frightened me
  alternatives:
  - because the people fear me
  - because the people made me afraid
  lexicon: HALOT
  rationale: 'From ירא in the piel, the sense is causative: ''make afraid, frighten.''
    This avoids the less likely reading that the people are fearing her.'
- source_word: וַתֹּאמֶר שִׁפְחָתְךָ
  chosen: So your servant said
  alternatives:
  - And your maidservant said
  - Then your slave-girl said
  lexicon: HALOT
  rationale: The speaker refers to herself in humble court language. 'Your servant'
    is natural English for deferential self-reference in this setting; 'maidservant'
    is possible but less idiomatic in contemporary English.
- source_word: אֲדַבְּרָה נָּא אֶל הַמֶּלֶךְ
  chosen: Please, let me speak to the king
  alternatives:
  - Please, I will speak to the king
  - Let me now speak to the king
  lexicon: HALOT
  rationale: The cohortative אֲדַבְּרָה with נָא expresses polite resolve/request.
    'Let me speak' best captures the volitional nuance in idiomatic English.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  lexicon: HALOT
  rationale: '''Perhaps'' matches the register of the passage better than the more
    colloquial ''maybe.'''
- source_word: יַעֲשֶׂה הַמֶּלֶךְ
  chosen: the king will do
  alternatives:
  - the king will act
  - the king will grant
  lexicon: HALOT
  rationale: עשה is broad and should not be overinterpreted. 'Do' preserves the generality
    of the Hebrew.
- source_word: אֶת דְּבַר אֲמָתוֹ
  chosen: the word of his servant
  alternatives:
  - the request of his servant
  - what his servant says
  lexicon: HALOT
  rationale: Literally 'the word of his maidservant/servant-woman.' 'Word' is retained
    to stay close to the Hebrew, while 'his servant' reflects the deferential self-designation
    in smoother English. Because the Hebrew shifts from שִׁפְחָה to אָמָה, both near-synonyms
    for female servant, no distinction is pressed in translation.
