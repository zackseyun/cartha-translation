id: 2SA.14.1
reference: 2 Samuel 14:1
source:
  edition: WLC
  text: וַ/יֵּ֖דַע יוֹאָ֣ב בֶּן צְרֻיָ֑ה כִּֽי לֵ֥ב הַ/מֶּ֖לֶךְ עַל אַבְשָׁלֽוֹם־־־׃
translation:
  text: Now Joab son of Zeruiah knew that the king’s heart was toward Absalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king longed for Absalom'; the Hebrew expression is terse and could
      also be understood more generally as 'the king’s heart was set toward Absalom.'
      Some have taken it negatively, 'was against Absalom,' though the following context
      favors a positive inclination.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: Now ... knew
  alternatives:
  - And ... knew
  - came to know
  lexicon: HALOT
  rationale: Wayyiqtol of ידע advances the narrative. 'Knew' is the straightforward
    sense; 'Now' renders the discourse-forwarding force idiomatically in English better
    than a bare 'And.'
- source_word: יוֹאָב בֶּן צְרֻיָה
  chosen: Joab son of Zeruiah
  alternatives:
  - Joab, the son of Zeruiah
  rationale: Personal names are transliterated. The construct phrase is rendered naturally
    in English without adding interpretive material.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Joab knew, so 'that' best fits
    the syntax.
- source_word: לֵב הַמֶּלֶךְ
  chosen: the king’s heart
  alternatives:
  - the heart of the king
  - the king’s mind
  lexicon: HALOT
  rationale: לֵב commonly denotes the inner disposition, will, or affection. 'Heart'
    preserves the Hebrew anthropological expression better than the more interpretive
    'mind.'
- source_word: עַל
  chosen: was toward
  alternatives:
  - was for
  - was against
  - was set on
  - went out to
  lexicon: HALOT
  rationale: The preposition עַל with 'heart' here is elliptical and contextually
    ambiguous. 'Was toward' preserves the directional sense without over-resolving
    whether the disposition is affectionate longing, concern, or hostile intent. This
    fits the immediate context, where Joab acts to restore Absalom.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention.
