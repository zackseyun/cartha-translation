theological_decisions:
- issue: Ambiguity of the king’s disposition toward Absalom
  chosen_reading: the king’s heart was toward Absalom
  alternative_readings:
  - the king longed for Absalom
  - the king’s heart was against Absalom
  rationale: The Hebrew is compressed and does not explicitly state whether David's
    disposition is positive or negative. In light of the translation philosophy, the
    rendering preserves the ambiguity as much as readable English allows, while a
    footnote records more specific interpretive options reflected in translations
    and context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
