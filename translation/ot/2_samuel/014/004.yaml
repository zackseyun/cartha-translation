id: 2SA.14.4
reference: 2 Samuel 14:4
source:
  edition: WLC
  text: וַ֠/תֹּאמֶר הָ/אִשָּׁ֤ה הַ/תְּקֹעִית֙ אֶל הַ/מֶּ֔לֶךְ וַ/תִּפֹּ֧ל עַל אַפֶּ֛י/הָ
    אַ֖רְצָ/ה וַ/תִּשְׁתָּ֑חוּ וַ/תֹּ֖אמֶר הוֹשִׁ֥עָ/ה הַ/מֶּֽלֶךְ־־׃ס
translation:
  text: Then the woman from Tekoa spoke to the king. She fell with her face to the
    ground and bowed down, and she said, “Save me, O king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Tekoite woman.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''Save, O king''; English idiom makes the implied object explicit:
      ''Save me, O king.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה הַתְּקֹעִית
  chosen: the woman from Tekoa
  alternatives:
  - the Tekoite woman
  - the woman of Tekoa
  lexicon: HALOT
  rationale: The gentilic/adjectival form הַתְּקֹעִית identifies her by origin. 'The
    woman from Tekoa' is natural modern English while preserving the geographical
    identification.
- source_word: וַתֹּאמֶר ... אֶל הַמֶּלֶךְ
  chosen: spoke to the king
  alternatives:
  - said to the king
  lexicon: HALOT
  rationale: אָמַר commonly means 'say,' but in English 'spoke to the king' reads
    smoothly for the initial approach. The second וַתֹּאמֶר later in the verse is
    rendered 'she said' to preserve the direct quotation structure.
- source_word: וַתִּפֹּל עַל אַפֶּיהָ אַרְצָה
  chosen: She fell with her face to the ground
  alternatives:
  - she fell on her face to the ground
  - she fell facedown to the ground
  lexicon: HALOT
  rationale: The idiom literally involves falling upon her face earthward. 'With her
    face to the ground' is clear, natural, and preserves the posture of deep supplication.
- source_word: וַתִּשְׁתָּחוּ
  chosen: bowed down
  alternatives:
  - prostrated herself
  - paid homage
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in reverence or supplication. 'Bowed
    down' is accessible and fits the narrative context without over-specifying cultic
    worship.
- source_word: הוֹשִׁיעָה
  chosen: Save me
  alternatives:
  - Help me
  - Grant deliverance
  lexicon: HALOT
  rationale: The imperative from יָשַׁע is a plea for rescue/deliverance. English
    idiom in this context naturally supplies the object 'me,' which is implied by
    the appeal to the king for aid. 'Save me' preserves the urgency better than the
    weaker 'Help me.'
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - my king
  - the king
  lexicon: HALOT
  rationale: In direct address, English commonly uses the vocative 'O king' to reflect
    the Hebrew appeal. This preserves the formal, urgent tone of petition.
