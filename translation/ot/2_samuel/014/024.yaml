theological_decisions:
- issue: Literal idiom 'see my face / the king’s face' versus interpretive rendering
    about access or audience
  chosen_reading: Preserve the idiom literally in the main text
  alternative_readings:
  - let him not come into my presence
  - he was not admitted to the king
  rationale: This is not a doctrinally contested phrase, but preserving the Hebrew
    idiom maintains the narrative's rhetorical force and avoids over-interpreting
    the social implications beyond what the text explicitly states.
  doctrine_reference: Translation philosophy §1, §3, §6
