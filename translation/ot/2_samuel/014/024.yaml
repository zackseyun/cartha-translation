id: 2SA.14.24
reference: 2 Samuel 14:24
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ יִסֹּ֣ב אֶל בֵּית֔/וֹ וּ/פָנַ֖/י לֹ֣א יִרְאֶ֑ה וַ/יִּסֹּ֤ב
    אַבְשָׁלוֹם֙ אֶל בֵּית֔/וֹ וּ/פְנֵ֥י הַ/מֶּ֖לֶךְ לֹ֥א רָאָֽה־־׃ס
translation:
  text: But the king said, “Let him turn aside to his own house, and let him not see
    my face.” So Absalom turned aside to his own house and did not see the king’s
    face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “see my face” / “the king’s face,” an idiom for being in someone’s
      presence or receiving an audience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסֹּב / וַיִּסֹּב (סבב)
  chosen: turn aside / turned aside
  alternatives:
  - go around
  - return
  - withdraw
  lexicon: HALOT
  rationale: The verb סבב here, with אֶל בֵּיתוֹ, indicates movement away from the
    king's presence toward one's own house. 'Turn aside' preserves the sense of being
    redirected rather than simply 'go,' and it matches the repeated verb in both clauses.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - home
  lexicon: HALOT
  rationale: '''House'' is the basic lexical sense of בַּיִת. Adding ''own'' reflects
    the possessive suffix naturally in English and clarifies the contrast with the
    king''s presence. ''Home'' is possible but slightly more interpretive.'
- source_word: וּפָנַי ... לֹא יִרְאֶה
  chosen: and let him not see my face
  alternatives:
  - but he must not see my face
  - and he shall not see my face
  lexicon: HALOT
  rationale: פָּנִים ('face') is retained literally because it is a common Hebrew
    idiom for personal presence/audience, and the repetition later in the verse argues
    for preserving the concrete expression. The jussive-like force after the king's
    speech is well conveyed by 'let him not see.'
- source_word: וּפְנֵי הַמֶּלֶךְ לֹא רָאָה
  chosen: and did not see the king’s face
  alternatives:
  - and did not see the king
  - and was not admitted to the king’s presence
  lexicon: HALOT
  rationale: The narrative repeats the 'face' idiom from the king's command. Keeping
    it literal preserves the Hebrew style and the thematic emphasis on denied access,
    while still being understandable in English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ. The first occurrence is subject of the
    speech; the final occurrence is possessive in 'the king's face.'
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וַיֹּאמֶר
  chosen: But the king said
  alternatives:
  - And the king said
  - Then the king said
  lexicon: HALOT
  rationale: 'The waw-consecutive can be rendered in context as simple sequence or
    mild contrast. ''But'' fits the narrative turn: although Joab had secured Absalom''s
    return, the king still refuses him audience.'
