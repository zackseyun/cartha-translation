id: 2SA.14.29
reference: 2 Samuel 14:29
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח אַבְשָׁל֜וֹם אֶל יוֹאָ֗ב לִ/שְׁלֹ֤חַ אֹת/וֹ֙ אֶל הַ/מֶּ֔לֶךְ
    וְ/לֹ֥א אָבָ֖ה לָ/ב֣וֹא אֵלָ֑י/ו וַ/יִּשְׁלַ֥ח עוֹד֙ שֵׁנִ֔ית וְ/לֹ֥א אָבָ֖ה לָ/בֽוֹא־־׃
translation:
  text: So Absalom sent for Joab to send him to the king, but he was not willing to
    come to him. So he sent again a second time, but he was not willing to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'refused to come' (lit. 'was not willing to come').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent for
  alternatives:
  - sent
  - summoned
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'send,' but with אֶל יוֹאָב followed by
    the purpose infinitive ('to send him to the king'), the sense is that Absalom
    sent a message to Joab requesting his presence. 'Sent for' captures the idiomatic
    force in natural English without overparaphrasing.
- source_word: לִשְׁלֹחַ אֹתוֹ אֶל הַמֶּלֶךְ
  chosen: to send him to the king
  alternatives:
  - to send him to the king's presence
  - to have him brought to the king
  lexicon: HALOT
  rationale: 'This infinitive phrase expresses purpose: Absalom wanted Joab to arrange
    his access to the king. ''To send him to the king'' is a close rendering of the
    Hebrew and leaves the mediation role of Joab implicit as in the source.'
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - refused
  - was unwilling
  lexicon: HALOT
  rationale: The verb means 'be willing, consent.' 'Was not willing' preserves the
    lexical sense more precisely than the stronger interpretive gloss 'refused,' though
    the latter is contextually possible.
- source_word: לָבוֹא אֵלָיו
  chosen: to come to him
  alternatives:
  - to come
  - to come to Absalom
  lexicon: HALOT
  rationale: The prepositional phrase explicitly marks direction toward Absalom, so
    'to come to him' should be retained rather than reduced to simply 'to come.'
- source_word: עוֹד שֵׁנִית
  chosen: again a second time
  alternatives:
  - a second time
  - again
  lexicon: HALOT
  rationale: Both adverb עוֹד ('again/still/further') and ordinal adverb שֵׁנִית ('a
    second time') are present. Rendering both preserves the Hebrew emphasis on repetition,
    even if slightly redundant in English.
- source_word: וַיִּשְׁלַח ... וְלֹא אָבָה ... וַיִּשְׁלַח ... וְלֹא אָבָה
  chosen: So Absalom sent ... but he was not willing ... So he sent again ... but
    he was not willing
  alternatives:
  - Then Absalom sent ... but he would not come ... then he sent again ... but he
    would not come
  lexicon: HALOT
  rationale: The repeated wayyiqtol sequence drives the narrative forward. 'So' and
    'but' reproduce the flow and contrast in readable modern English while preserving
    the repetition that structures the verse.
