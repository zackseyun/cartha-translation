id: 2SA.14.27
reference: 2 Samuel 14:27
source:
  edition: WLC
  text: וַ/יִּֽוָּלְד֤וּ לְ/אַבְשָׁלוֹם֙ שְׁלוֹשָׁ֣ה בָנִ֔ים וּ/בַ֥ת אַחַ֖ת וּ/שְׁמָ֣/הּ
    תָּמָ֑ר הִ֣יא הָיְתָ֔ה אִשָּׁ֖ה יְפַ֥ת מַרְאֶֽה׃פ
translation:
  text: Three sons and one daughter were born to Absalom, and her name was Tamar.
    She was a woman beautiful in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'She was very beautiful.' The Hebrew reads literally,
      'a woman beautiful in appearance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּלְדוּ
  chosen: were born
  alternatives:
  - were fathered
  - were borne
  lexicon: HALOT
  rationale: Nifal wayyiqtol of ילד is naturally rendered as a passive/resultative
    birth expression. English idiom prefers 'were born to Absalom' rather than a more
    wooden passive.
- source_word: לְאַבְשָׁלוֹם
  chosen: to Absalom
  alternatives:
  - for Absalom
  lexicon: HALOT
  rationale: 'The preposition ל with ילד in this construction marks parentage: children
    were born to Absalom.'
- source_word: שְׁלוֹשָׁה בָנִים
  chosen: Three sons
  alternatives:
  - three children, sons
  lexicon: HALOT
  rationale: בנים specifically means 'sons,' not generic children, so the gendered
    term should be preserved.
- source_word: וּבַת אַחַת
  chosen: and one daughter
  alternatives:
  - and a single daughter
  lexicon: HALOT
  rationale: Straightforward numeric expression; 'one daughter' is natural modern
    English.
- source_word: וּשְׁמָהּ תָּמָר
  chosen: and her name was Tamar
  alternatives:
  - and her name was called Tamar
  lexicon: HALOT
  rationale: The suffix on שֵׁם is feminine singular, referring to the daughter just
    mentioned. English idiom is best expressed as 'her name was Tamar.'
- source_word: תָּמָר
  chosen: Tamar
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הִיא הָיְתָה
  chosen: She was
  alternatives:
  - Now she was
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis but does not require an awkwardly
    emphatic English rendering here; simple 'She was' communicates the sense.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a lady
  lexicon: HALOT
  rationale: אִשָּׁה here denotes an adult female person. 'Woman' is the plain and
    accurate rendering.
- source_word: יְפַת מַרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - beautiful
  - of beautiful appearance
  - beautiful to look at
  lexicon: HALOT
  rationale: This Hebrew expression describes physical beauty/appearance. 'Beautiful
    in appearance' preserves the form and avoids over-paraphrase.
