id: 2SA.14.14
reference: 2 Samuel 14:14
source:
  edition: WLC
  text: כִּי מ֣וֹת נָמ֔וּת וְ/כַ/מַּ֨יִם֙ הַ/נִּגָּרִ֣ים אַ֔רְצָ/ה אֲשֶׁ֖ר לֹ֣א יֵאָסֵ֑פוּ
    וְ/לֹֽא יִשָּׂ֤א אֱלֹהִים֙ נֶ֔פֶשׁ וְ/חָשַׁב֙ מַֽחֲשָׁב֔וֹת לְ/בִלְתִּ֛י יִדַּ֥ח
    מִמֶּ֖/נּוּ נִדָּֽח־־׃
translation:
  text: For we must surely die and are like water poured out on the ground, which
    cannot be gathered up again. Yet God does not take away a life, but devises plans
    so that one who is banished will not remain banished from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God does not show partiality to a person'; the Hebrew clause is difficult,
      and some understand it differently.
    reason: alternative_reading
  - marker: b
    text: Or, 'so that a banished one is not driven away from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the rationale for the woman's appeal; 'for' best preserves
    the argumentative connection to the previous context.
- source_word: מוֹת נָמוּת
  chosen: we must surely die
  alternatives:
  - we will surely die
  - dying we die
  lexicon: HALOT
  rationale: Infinitive absolute + imperfect intensifies certainty. 'We must surely
    die' captures inevitability in idiomatic English without woodenly reproducing
    the Hebrew form.
- source_word: וְכַמַּיִם הַנִּגָּרִים אַרְצָה
  chosen: and are like water poured out on the ground
  alternatives:
  - and like water spilled on the earth
  - and like water flowing to the ground
  lexicon: HALOT
  rationale: The simile emphasizes irretrievability after death. 'Poured out on the
    ground' is natural English and fits the following clause about not being gathered
    again.
- source_word: אֲשֶׁר לֹא יֵאָסֵפוּ
  chosen: which cannot be gathered up again
  alternatives:
  - which are not gathered
  - which cannot be collected
  lexicon: HALOT
  rationale: The Niphal expresses the impossibility or non-occurrence of recovery.
    'Cannot be gathered up again' makes the sense explicit in English and matches
    the image of spilled water.
- source_word: וְלֹא יִשָּׂא אֱלֹהִים נֶפֶשׁ
  chosen: Yet God does not take away a life
  alternatives:
  - and God does not lift up a soul
  - and God does not show partiality to a person
  - and God does not take away the soul
  lexicon: HALOT
  rationale: This clause is difficult. Given the surrounding context about death,
    exile, and restoration, נָשָׂא נֶפֶשׁ is best taken here in the sense of taking
    away life rather than showing partiality. 'Yet' marks the contrast with human
    mortality. 'A life' is smoother and contextually clearer than the more wooden
    'a soul,' while preserving nephesh's reference to the living person.
- source_word: וְחָשַׁב מַחֲשָׁבוֹת
  chosen: but devises plans
  alternatives:
  - and thinks thoughts
  - and devises devices
  lexicon: HALOT
  rationale: The cognate construction conveys intentional planning. 'Devises plans'
    is idiomatic and preserves the deliberative force without awkward literalism.
- source_word: לְבִלְתִּי יִדַּח
  chosen: so that ... will not remain banished
  alternatives:
  - so that ... will not be driven away
  - so that ... will not be cast out
  lexicon: HALOT
  rationale: The verb נדח in the Niphal denotes being driven away or banished. In
    this context of estrangement and possible restoration, 'remain banished' captures
    both the state and the intended reversal.
- source_word: מִמֶּנּוּ נִדָּח
  chosen: one who is banished ... from him
  alternatives:
  - his banished one
  - an outcast from him
  lexicon: HALOT
  rationale: The Hebrew order is compressed. Rendering it as 'one who is banished
    ... from him' communicates the personal relation clearly in English while preserving
    the idea of alienation from God/the king in the analogy.
