id: 2SA.14.26
reference: 2 Samuel 14:26
source:
  edition: WLC
  text: וּֽ/בְ/גַלְּח/וֹ֮ אֶת רֹאשׁ/וֹ֒ וְֽ֠/הָיָה מִ/קֵּ֨ץ יָמִ֤ים לַ/יָּמִים֙ אֲשֶׁ֣ר
    יְגַלֵּ֔חַ כִּֽי כָבֵ֥ד עָלָ֖י/ו וְ/גִלְּח֑/וֹ וְ/שָׁקַל֙ אֶת שְׂעַ֣ר רֹאשׁ֔/וֹ
    מָאתַ֥יִם שְׁקָלִ֖ים בְּ/אֶ֥בֶן הַ/מֶּֽלֶךְ־׀־־׃
translation:
  text: 'Whenever he cut the hair of his head—at the end of every year he would cut
    it, because it was heavy on him—when he cut it, he weighed the hair of his head:
    two hundred shekels by the king’s weight.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to the king’s stone,' referring to the royal
      standard weight.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְגַלְּחוֹ
  chosen: Whenever he cut
  alternatives:
  - And when he cut
  - When he shaved
  lexicon: HALOT
  rationale: The prefixed conjunction + preposition with infinitive construct of גלח
    introduces a temporal circumstance. 'Whenever he cut' captures the iterative sense
    in context better than a simple one-time 'when he cut.' 'Cut' is preferable to
    'shaved' because the verse concerns periodic trimming of Absalom's hair, not necessarily
    complete shaving.
- source_word: אֶת רֹאשׁוֹ
  chosen: the hair of his head
  alternatives:
  - his head
  lexicon: HALOT
  rationale: Literally 'his head,' but in English the object of cutting is naturally
    the hair, not the head itself. Supplying 'hair of' is warranted by the immediate
    later phrase 'the hair of his head' and avoids awkward literalism.
- source_word: וְהָיָה מִקֵּץ יָמִים לַיָּמִים
  chosen: at the end of every year
  alternatives:
  - from time to time
  - at the end of days after days
  - year by year
  lexicon: HALOT
  rationale: The idiom literally involves 'from the end of days to days' and in this
    context denotes a regular annual interval. 'At the end of every year' is the clearest
    idiomatic English rendering and matches the narrative sense.
- source_word: אֲשֶׁר יְגַלֵּחַ
  chosen: he would cut it
  alternatives:
  - he cut it
  - he shaved it
  lexicon: HALOT
  rationale: Imperfect verb in a relative clause here expresses customary action.
    'Would cut it' conveys habitual repetition in English.
- source_word: כִּי כָבֵד עָלָיו
  chosen: because it was heavy on him
  alternatives:
  - because it became too heavy for him
  - for it was burdensome to him
  lexicon: HALOT
  rationale: כבד with על conveys heaviness/burdensomeness. 'Heavy on him' is close
    to the Hebrew image while remaining natural English. The pronoun refers to the
    hair.
- source_word: וְגִלְּחוֹ
  chosen: when he cut it
  alternatives:
  - and he cut it
  - and having cut it
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction resumes the temporal sequence. Rendering
    it as 'when he cut it' fits the flow and avoids an overly wooden repetition of
    'and' in English.
- source_word: וְשָׁקַל
  chosen: he weighed
  alternatives:
  - he would weigh
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol/qatal sequence reports what he did on those
    occasions. 'He weighed' is straightforward and idiomatic.
- source_word: שְׂעַר רֹאשׁוֹ
  chosen: the hair of his head
  alternatives:
  - his hair
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the emphatic specification in Hebrew,
    though English could shorten it to 'his hair.'
- source_word: מָאתַיִם שְׁקָלִים
  chosen: two hundred shekels
  lexicon: HALOT
  rationale: Standard rendering of the numeral plus weight unit. 'Shekels' here is
    a measure of weight, not currency.
- source_word: בְּאֶבֶן הַמֶּלֶךְ
  chosen: by the king’s weight
  alternatives:
  - according to the king's stone
  - by the royal standard
  lexicon: HALOT
  rationale: אֶבֶן literally means 'stone,' referring to a stone weight used as a
    standard. 'By the king’s weight' communicates the sense clearly in modern English;
    the more literal 'stone' is preserved in a footnote as a lexical/cultural alternative.
