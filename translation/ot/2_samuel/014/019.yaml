id: 2SA.14.19
reference: 2 Samuel 14:19
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ הֲ/יַ֥ד יוֹאָ֛ב אִתָּ֖/ךְ בְּ/כָל זֹ֑את וַ/תַּ֣עַן
    הָ/אִשָּׁ֣ה וַ/תֹּ֡אמֶר חֵֽי נַפְשְׁ/ךָ֩ אֲדֹנִ֨/י הַ/מֶּ֜לֶךְ אִם אִ֣שׁ לְ/הֵמִ֣ין
    וּ/לְ/הַשְׂמִ֗יל מִ/כֹּ֤ל אֲשֶׁר דִּבֶּר֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ כִּֽי עַבְדְּ/ךָ֤
    יוֹאָב֙ ה֣וּא צִוָּ֔/נִי וְ/ה֗וּא שָׂ֚ם בְּ/פִ֣י שִׁפְחָֽתְ/ךָ֔ אֵ֥ת כָּל הַ/דְּבָרִ֖ים
    הָ/אֵֽלֶּה־־־׀־־־׃
translation:
  text: Then the king said, “Is the hand of Joab with you in all this?” And the woman
    answered and said, “As your soul lives, my lord the king, no one can turn to the
    right or to the left from anything that my lord the king has spoken, for your
    servant Joab himself commanded me, and he himself put all these words into the
    mouth of your female servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “As surely as you live, my lord the king.” The Hebrew oath formula is
      literally, “As your soul lives.”
    reason: lexical_alternative
  - marker: b
    text: The expression “turn to the right or to the left” is a Hebrew idiom meaning
      to deviate from, contradict, or evade what the king has said.
    reason: cultural_note
lexical_decisions:
- source_word: הֲיָד ... אִתָּךְ
  chosen: Is the hand of Joab with you
  alternatives:
  - Is Joab involved with you
  - Is Joab behind this with you
  lexicon: HALOT
  rationale: Hebrew 'hand' often denotes agency, involvement, or influence. Retaining
    'hand' preserves the idiom's concrete force while remaining understandable in
    English.
- source_word: בְּכָל זֹאת
  chosen: in all this
  alternatives:
  - in all of this matter
  - in all this affair
  lexicon: HALOT
  rationale: A natural rendering of the phrase referring to the entire scheme or situation
    under discussion.
- source_word: חֵי נַפְשְׁךָ
  chosen: As your soul lives
  alternatives:
  - As surely as you live
  - By your life
  lexicon: HALOT
  rationale: This is a formal oath formula. 'As your soul lives' preserves the Hebrew
    expression more closely than the smoother idiom 'as surely as you live.'
- source_word: אִם אִישׁ לְהֵמִין וּלְהַשְׂמִיל
  chosen: no one can turn to the right or to the left
  alternatives:
  - there is no man who can deviate right or left
  - no one can go one way or the other
  lexicon: HALOT
  rationale: The idiom expresses inability to deviate from or contradict the king's
    discernment/statement. 'No one can turn to the right or to the left' preserves
    the directional metaphor in clear English.
- source_word: מִכֹּל אֲשֶׁר דִּבֶּר
  chosen: from anything that ... has spoken
  alternatives:
  - from all that ... has said
  lexicon: HALOT
  rationale: The preposition with the idiom indicates deviation from the king's words.
    'Anything that ... has spoken' is slightly more literal; 'said' would also be
    acceptable.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In courtly self-reference, 'servant' is the natural English equivalent
    and does not primarily denote chattel status here.
- source_word: צִוָּנִי
  chosen: commanded me
  alternatives:
  - ordered me
  - instructed me
  lexicon: HALOT
  rationale: The verb denotes giving a command. 'Commanded' best reflects the authority
    Joab exercised in the narrative.
- source_word: שָׂם בְּפִי
  chosen: put ... into the mouth of
  alternatives:
  - put ... in the mouth of
  - gave ... to say to
  lexicon: HALOT
  rationale: A common Hebrew idiom for supplying someone's speech. Retaining 'mouth'
    preserves the vividness and biblical style.
- source_word: שִׁפְחָתְךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: The feminine term is more specific than the generic 'servant.' 'Female
    servant' is clear modern English and preserves gender accuracy.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: Since Joab supplied her exact speech, 'words' is preferable to the broader
    'things' or 'matters.'
