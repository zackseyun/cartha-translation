id: 2SA.14.11
reference: 2 Samuel 14:11
source:
  edition: WLC
  text: וַ/תֹּאמֶר֩ יִזְכָּר נָ֨א הַ/מֶּ֜לֶךְ אֶת יְהוָ֣ה אֱלֹהֶ֗י/ךָ מ/הרבית גֹּאֵ֤ל הַ/דָּם֙ לְ/שַׁחֵ֔ת וְ/לֹ֥א יַשְׁמִ֖ידוּ אֶת בְּנִ֑/י וַ/יֹּ֨אמֶר֙ חַי יְהוָ֔ה אִם יִפֹּ֛ל מִ/שַּׂעֲרַ֥ת בְּנֵ֖/ךְ אָֽרְצָ/ה־־־־־׃
translation:
  text: Then she said, “Please let the king remember Yahweh your God, so that the avenger of blood may not destroy any more, and they may not destroy my son.” And he said, “As Yahweh lives, not one hair of your son shall fall to the ground.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the blood avenger.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''if a hair of your son falls to the ground,'' meaning complete protection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכָּר נָא
  chosen: Please let ... remember
  alternatives:
  - Please remember
  - May ... remember
  lexicon: HALOT
  rationale: The jussive with נָא expresses a polite plea rather than a simple future. 'Please let the king remember' preserves the deferential request addressed to the king.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The possessive 'your God' is retained literally, fitting the woman's appeal to the king's covenant accountability.
- source_word: מֵהַרְבּוֹת גֹּאֵל הַדָּם
  chosen: so that the avenger of blood may not continue
  alternatives:
  - from multiplying the avenger of blood
  - lest the avenger of blood increase
  lexicon: HALOT
  rationale: The construction with מן + Hiphil infinitive of רבה is idiomatic and difficult if rendered woodenly. In context it asks that the blood avenger not be allowed to keep acting destructively. 'May not continue' captures the force in readable English while preserving the legal figure 'avenger of blood.'
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  lexicon: HALOT
  rationale: This is the established legal term in the Hebrew Bible for the kin-avenger responsible for blood vengeance. The traditional phrase is both accurate and recognizable.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to bring to destruction
  lexicon: HALOT
  rationale: שׁחת here denotes destructive action against the son. 'Destroy' is the most direct and natural rendering in context.
- source_word: וְלֹא יַשְׁמִידוּ אֶת־בְּנִי
  chosen: and they may not destroy my son
  alternatives:
  - and let them not wipe out my son
  - so that they do not exterminate my son
  lexicon: HALOT
  rationale: The plural verb is retained with an indefinite English 'they,' reflecting the agents of vengeance without over-specifying. 'Destroy' matches the parallel destructive language and avoids overly technical wording.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is idiomatic English and preserves the solemnity of the king's sworn assurance.
- source_word: אִם יִפֹּל
  chosen: not ... shall fall
  alternatives:
  - surely not ... will fall
  lexicon: HALOT
  rationale: After an oath, אִם functions idiomatically as a strong negation in English. Rendering it as 'not one ... shall fall' communicates the oath's emphatic denial rather than a conditional statement.
- source_word: מִשַּׂעֲרַת בְּנֵךְ
  chosen: not one hair of your son
  alternatives:
  - a hair of your son
  lexicon: HALOT
  rationale: The singular 'from a hair of your son' is idiomatically rendered in English as 'not one hair of your son,' preserving the sense of complete protection.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: In this idiom, 'to the ground' is the natural English equivalent and matches common biblical usage for total safety.
