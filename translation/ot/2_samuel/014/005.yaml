id: 2SA.14.5
reference: 2 Samuel 14:5
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר לָ֥/הּ הַ/מֶּ֖לֶךְ מַה לָּ֑/ךְ וַ/תֹּ֗אמֶר אֲבָ֛ל אִשָּֽׁה אַלְמָנָ֥ה
    אָ֖נִי וַ/יָּ֥מָת אִישִֽׁ/י־־־׃
translation:
  text: The king said to her, “What troubles you?” She said, “Indeed, I am a widow,
    and my husband has died.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What is the matter with you?”
    reason: lexical_alternative
  - marker: b
    text: Or, “Alas, I am a widow.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לָּךְ
  chosen: What troubles you?
  alternatives:
  - What is the matter with you?
  - What do you have?
  - What is wrong with you?
  lexicon: HALOT
  rationale: The idiom מַה לָּךְ literally means 'what to/for you' and asks what is
    the matter or what trouble someone has. 'What troubles you?' is natural modern
    English and preserves the king's inquiry without over-literal awkwardness.
- source_word: אֲבָל
  chosen: Indeed
  alternatives:
  - Truly
  - But
  - Alas
  lexicon: HALOT
  rationale: Here אֲבָל functions as an asseverative particle introducing her statement,
    not primarily an adversative 'but.' 'Indeed' captures the emphatic force. 'Alas'
    is possible in context, but the following clause already conveys her distress,
    and 'indeed' better reflects the particle's discourse function.
- source_word: אִשָּׁה אַלְמָנָה
  chosen: a widow
  alternatives:
  - a widowed woman
  lexicon: HALOT
  rationale: The Hebrew uses the noun 'woman' plus the adjective 'widow.' English
    idiom compresses this naturally to 'a widow' without loss of meaning.
- source_word: וַיָּמָת אִישִׁי
  chosen: my husband has died
  alternatives:
  - my husband died
  - my man has died
  lexicon: HALOT
  rationale: אִישׁ with first person suffix in this context means 'my husband.' Rendering
    with the present perfect in English communicates her current state resulting from
    his death and reads naturally in reported speech. 'My man' would be misleading
    in modern English.
- source_word: הַמֶּלֶךְ
  chosen: The king
  lexicon: HALOT
  rationale: Straightforward rendering of the subject with the definite article preserved.
- source_word: וַתֹּאמֶר
  chosen: She said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: English narrative style often omits repeated initial 'and' while preserving
    the sequence of speech. This is a standard optimal-equivalence choice, not a change
    in meaning.
