id: 2SA.14.8
reference: 2 Samuel 14:8
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר הַ/מֶּ֛לֶךְ אֶל הָ/אִשָּׁ֖ה לְכִ֣י לְ/בֵיתֵ֑/ךְ וַ/אֲנִ֖י אֲצַוֶּ֥ה
    עָלָֽיִ/ךְ־׃
translation:
  text: Then the king said to the woman, “Go to your house, and I will give orders
    concerning you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will command for you” / “I will give orders on your behalf.” The Hebrew
      preposition can be understood in more than one way, but the sense is that the
      king will issue instructions regarding her matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and said' is possible but less idiomatic
    here.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with article.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In context this refers to the woman of Tekoa addressing David, so 'the
    woman' is the natural contextual rendering; 'wife' is a possible gloss for אִשָּׁה
    in other contexts but not here.
- source_word: לְכִי
  chosen: Go
  alternatives:
  - Come, go
  - Depart
  lexicon: HALOT
  rationale: Imperative feminine singular of הלך addressed to the woman. 'Go' is the
    clear, idiomatic command in context.
- source_word: לְבֵיתֵךְ
  chosen: to your house
  alternatives:
  - to your home
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house' or 'home.' 'House' preserves the concrete
    Hebrew wording while remaining natural English.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - as for me, I
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. English can preserve this adequately
    with 'and I' without overloading the sentence.
- source_word: אֲצַוֶּה
  chosen: I will give orders
  alternatives:
  - I will command
  - I will issue instructions
  lexicon: HALOT
  rationale: The piel of צוה means 'command, give orders.' 'Give orders' fits royal
    speech naturally in English and avoids sounding wooden while preserving authority.
- source_word: עָלָיִךְ
  chosen: concerning you
  alternatives:
  - for you
  - about you
  - on your behalf
  lexicon: HALOT
  rationale: 'With צוה, עַל can indicate the person or matter concerning which orders
    are given. ''Concerning you'' best captures the likely sense here: the king will
    issue instructions regarding her case. ''For you'' is possible but can imply benefaction
    more strongly than the Hebrew requires.'
