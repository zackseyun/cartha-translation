id: 2SA.14.28
reference: 2 Samuel 14:28
source:
  edition: WLC
  text: וַ/יֵּ֧שֶׁב אַבְשָׁל֛וֹם בִּ/ירוּשָׁלִַ֖ם שְׁנָתַ֣יִם יָמִ֑ים וּ/פְנֵ֥י הַ/מֶּ֖לֶךְ
    לֹ֥א רָאָֽה׃
translation:
  text: So Absalom lived in Jerusalem for two full years without seeing the king's
    face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and the face of the king he did not see.' The Hebrew idiom refers
      to being denied personal audience or access to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - stayed
  - dwelt
  - remained
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In this narrative
    context, 'lived' gives natural English for continued residence over a period of
    time, while preserving the sense of dwelling in a place.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  rationale: Straightforward locative prepositional phrase; 'Jerusalem' is the standard
    English form of the place name.
- source_word: שְׁנָתַיִם יָמִים
  chosen: for two full years
  alternatives:
  - for two years
  - two years' time
  lexicon: HALOT
  rationale: The idiom literally reads 'two years, days.' In Hebrew this construction
    can intensify or specify a full measure of time. 'Two full years' captures the
    idiomatic force more clearly than the bare 'two years' while remaining faithful
    to the source.
- source_word: וּפְנֵי הַמֶּלֶךְ
  chosen: the king's face
  alternatives:
  - the presence of the king
  - the king
  lexicon: HALOT
  rationale: The Hebrew literally says 'the face of the king,' an idiom for personal
    audience or presence. Retaining 'face' preserves the concrete Hebrew expression,
    though in smoother English it is best integrated into the clause 'without seeing
    the king's face.'
- source_word: לֹא רָאָה
  chosen: without seeing
  alternatives:
  - did not see
  - never saw
  lexicon: HALOT
  rationale: Literally 'he did not see.' Rendering the negative verbal idea with 'without
    seeing' produces idiomatic English when combined with the preceding duration phrase,
    while preserving the sense that Absalom had no audience with the king during that
    period.
