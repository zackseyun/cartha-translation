id: 2SA.14.20
reference: 2 Samuel 14:20
source:
  edition: WLC
  text: לְ/בַ/עֲב֤וּר סַבֵּב֙ אֶת פְּנֵ֣י הַ/דָּבָ֔ר עָשָׂ֛ה עַבְדְּ/ךָ֥ יוֹאָ֖ב אֶת
    הַ/דָּבָ֣ר הַ/זֶּ֑ה וַ/אדֹנִ֣/י חָכָ֗ם כְּ/חָכְמַת֙ מַלְאַ֣ךְ הָ/אֱלֹהִ֔ים לָ/דַ֖עַת
    אֶֽת כָּל אֲשֶׁ֥ר בָּ/אָֽרֶץ־־־־׃ס
translation:
  text: In order to change the face of the matter, your servant Joab did this thing.
    But my lord is wise, with the wisdom of an angel of God, to know all that is in
    the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn the matter around' or 'alter the appearance of the matter.' The
      Hebrew idiom is literally 'change/turn the face of the matter.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all that is on the earth.' In context, 'the land' likely refers to the
      realm or country rather than the whole world.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַעֲבוּר
  chosen: In order to
  alternatives:
  - for the sake of
  - because of
  lexicon: HALOT
  rationale: Introduces purpose. 'In order to' expresses the intentional force naturally
    in English.
- source_word: סַבֵּב אֶת־פְּנֵי הַדָּבָר
  chosen: change the face of the matter
  alternatives:
  - turn the matter around
  - alter the appearance of the matter
  lexicon: HALOT
  rationale: The idiom literally involves 'turning/changing the face of the matter.'
    I preserved the metaphor with readable English rather than flattening it entirely.
    It conveys reshaping how the case appears or is approached.
- source_word: עָשָׂה ... אֶת־הַדָּבָר הַזֶּה
  chosen: did this thing
  alternatives:
  - has done this
  - did this matter
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal clause plus object. 'Thing'
    is slightly more natural here than repeating 'matter,' while still reflecting
    דָּבָר.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In courtly self-reference before the king, 'servant' best matches the
    deferential idiom without foregrounding chattel status, which is not the point
    in this context.
- source_word: וַאדֹנִי
  chosen: But my lord
  alternatives:
  - and my lord
  - now my lord
  lexicon: HALOT
  rationale: The conjunction here is mildly contrastive or transitional in discourse.
    'But my lord' fits the woman's shift from explanation to compliment and appeal.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  - discerning
  lexicon: HALOT
  rationale: Standard rendering for the adjective, appropriate in praise of the king's
    discernment.
- source_word: כְּחָכְמַת מַלְאַךְ הָאֱלֹהִים
  chosen: with the wisdom of an angel of God
  alternatives:
  - like the wisdom of the angel of God
  - as wise as an angel of God
  lexicon: HALOT
  rationale: The comparison is explicit. 'An angel of God' is anarthrous in English
    and avoids over-specifying a particular angel. 'With the wisdom of' reads naturally
    while preserving the simile.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - so as to know
  - for knowing
  lexicon: HALOT
  rationale: Infinitive of result or capacity following the comparison; 'to know'
    is concise and natural.
- source_word: כָּל אֲשֶׁר בָּאָרֶץ
  chosen: all that is in the land
  alternatives:
  - everything that is on the earth
  - all that is in the earth
  lexicon: HALOT
  rationale: In this royal and local context, הָאָרֶץ most naturally means 'the land'
    rather than the whole world. This fits the woman's praise of David's awareness
    of affairs in the kingdom.
