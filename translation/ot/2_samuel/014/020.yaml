theological_decisions:
- issue: Reference of 'angel of God'
  chosen_reading: A comparative expression praising extraordinary discernment, not
    an ontological claim about the king.
  alternative_readings:
  - A hyperbolic comparison to divine-like knowledge
  rationale: The text uses conventional exalted court language. The translation preserves
    the comparison without importing a stronger theological claim about David's nature
    or omniscience.
  doctrine_reference: Preserve theological tension rather than resolve it.
