id: 2SA.14.7
reference: 2 Samuel 14:7
source:
  edition: WLC
  text: וְ/הִנֵּה֩ קָ֨מָה כָֽל הַ/מִּשְׁפָּחָ֜ה עַל שִׁפְחָתֶ֗/ךָ וַ/יֹּֽאמְרוּ֙ תְּנִ֣י
    אֶת מַכֵּ֣ה אָחִ֗י/ו וּ/נְמִתֵ֨/הוּ֙ בְּ/נֶ֤פֶשׁ אָחִי/ו֙ אֲשֶׁ֣ר הָרָ֔ג וְ/נַשְׁמִ֖ידָה
    גַּ֣ם אֶת הַ/יּוֹרֵ֑שׁ וְ/כִבּ֗וּ אֶת גַּֽחַלְתִּ/י֙ אֲשֶׁ֣ר נִשְׁאָ֔רָה לְ/בִלְתִּ֧י
    שום לְ/אִישִׁ֛/י שֵׁ֥ם וּ/שְׁאֵרִ֖ית עַל פְּנֵ֥י הָ/אֲדָמָֽה־־׀־־־־־׃פ
translation:
  text: And look, the whole family has risen up against your servant and said, ‘Give
    up the one who struck his brother, so that we may put him to death for the life
    of his brother whom he killed; then we will destroy the heir also.’ So they would
    extinguish my remaining ember, leaving my husband neither name nor remnant on
    the face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my last coal.' The Hebrew uses the image of a remaining live coal/ember
      for the last surviving hope of a family line.
    reason: lexical_alternative
  - marker: b
    text: '''Name nor remnant'' refers to preserving a man''s memory and surviving
      line, not merely his reputation.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁפְחָתֶךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your slave-girl
  lexicon: HALOT
  rationale: Though literally 'your female servant/slave,' in direct royal address
    this functions as a deferential self-reference. 'Your servant' is idiomatic modern
    English and preserves the humility without awkwardness.
- source_word: קָמָה ... עַל
  chosen: has risen up against
  alternatives:
  - has arisen against
  - has stood against
  lexicon: HALOT
  rationale: The idiom conveys hostile action, not mere standing. 'Has risen up against'
    captures the adversarial force naturally in English.
- source_word: כָל הַמִּשְׁפָּחָה
  chosen: the whole family
  alternatives:
  - the whole clan
  - all the kin
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here refers to the extended family group. 'Family' is the
    most accessible rendering; the collective force is preserved by 'whole.'
- source_word: תְּנִי
  chosen: Give up
  alternatives:
  - Hand over
  - Give
  lexicon: HALOT
  rationale: In judicial context the demand is for surrendering the son to the avengers.
    'Give up' communicates compelled delivery better than the bare 'give.'
- source_word: מַכֵּה אָחִיו
  chosen: the one who struck his brother
  alternatives:
  - his brother's attacker
  - the smiter of his brother
  lexicon: HALOT
  rationale: The participle from נכה is broader than 'murderer' and should not pre-judge
    the clause before the explicit statement 'whom he killed.' 'Struck' preserves
    the Hebrew wording and narrative progression.
- source_word: וּנְמִתֵהוּ
  chosen: so that we may put him to death
  alternatives:
  - and let us kill him
  - that we may execute him
  lexicon: HALOT
  rationale: The cohortative expresses intended action. 'Put him to death' is idiomatic
    and suitably judicial in tone.
- source_word: בְּנֶפֶשׁ אָחִיו
  chosen: for the life of his brother
  alternatives:
  - for his brother's life
  - in exchange for the life of his brother
  lexicon: HALOT
  rationale: This reflects the legal idiom of life-for-life recompense. 'For the life
    of his brother' is concise while preserving the sense of retributive justice.
- source_word: אֲשֶׁר הָרָג
  chosen: whom he killed
  alternatives:
  - because he killed him
  - that he slew
  lexicon: HALOT
  rationale: This relative clause identifies the brother in view and makes explicit
    that the striking resulted in death. 'Whom he killed' is straightforward modern
    English.
- source_word: וְנַשְׁמִידָה גַּם אֶת הַיּוֹרֵשׁ
  chosen: then we will destroy the heir also
  alternatives:
  - and we will wipe out the heir too
  - and let us destroy even the heir
  lexicon: HALOT
  rationale: 'The clause states the family''s further intent: eliminating the surviving
    son as heir. ''Destroy'' preserves the severity without over-specifying method.'
- source_word: הַיּוֹרֵשׁ
  chosen: the heir
  alternatives:
  - the one who would inherit
  lexicon: HALOT
  rationale: The participial noun denotes the inheriting son. 'The heir' is the natural
    English equivalent.
- source_word: וְכִבּוּ אֶת גַּחַלְתִּי אֲשֶׁר נִשְׁאָרָה
  chosen: So they would extinguish my remaining ember
  alternatives:
  - Thus they would quench my last coal
  - and they would put out my surviving ember
  lexicon: HALOT
  rationale: This is a metaphor for the last surviving descendant/hope of the household.
    'Remaining ember' preserves the image while reading naturally. The metaphor should
    remain in the main text rather than being flattened.
- source_word: לְבִלְתִּי שׂוּם
  chosen: leaving
  alternatives:
  - so as not to leave
  - in order not to set
  lexicon: HALOT
  rationale: 'The infinitive construction expresses result/purpose: the extinguishing
    would leave nothing behind. ''Leaving'' gives the sense smoothly in English.'
- source_word: לְאִישִׁי שֵׁם וּשְׁאֵרִית
  chosen: my husband neither name nor remnant
  alternatives:
  - my husband neither name nor survivor
  - my husband neither memorial name nor posterity
  lexicon: HALOT
  rationale: The phrase concerns the deceased husband's continuing line and memory.
    'Name' preserves memorial/lineage resonance; 'remnant' captures surviving posterity.
    'Husband' is contextually preferable to the more wooden 'man.'
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the earth
  alternatives:
  - upon the earth
  - from the face of the ground
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. 'On the face of the earth' preserves the
    idiomatic solemnity and is standard English.
