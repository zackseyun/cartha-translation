id: 2SA.14.18
reference: 2 Samuel 14:18
source:
  edition: WLC
  text: וַ/יַּ֣עַן הַ/מֶּ֗לֶךְ וַ/יֹּ֨אמֶר֙ אֶל הָ֣/אִשָּׁ֔ה אַל נָ֨א תְכַחֲדִ֤י מִמֶּ֨/נִּי֙
    דָּבָ֔ר אֲשֶׁ֥ר אָנֹכִ֖י שֹׁאֵ֣ל אֹתָ֑/ךְ וַ/תֹּ֨אמֶר֙ הָֽ/אִשָּׁ֔ה יְדַבֶּר נָ֖א
    אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Then the king answered and said to the woman, “Please do not hide from me
    anything that I ask you.” And the woman said, “Please speak, my lord the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''do not hide from me a thing that I ask you.'''
    reason: lexical_alternative
  - marker: b
    text: Or, more formally, 'Let my lord the king speak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying. 'Answered' preserves the formal
    dialogue sequence and pairs naturally with the following speech verb.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common Hebrew speech verb; 'said' is the most natural and transparent
    English rendering in narrative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct rendering of the title/noun with article.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In this context the referent is the woman of Tekoa, not a wife relation,
    so 'the woman' is contextually precise.
- source_word: אַל נָא
  chosen: Please do not
  alternatives:
  - Do not, please
  lexicon: HALOT
  rationale: Combines prohibition particle with entreaty particle. 'Please do not'
    conveys both the negative command and the courteous tone in idiomatic English.
- source_word: תְכַחֲדִי
  chosen: hide
  alternatives:
  - conceal
  - deny
  lexicon: HALOT
  rationale: The verb means to conceal or withhold. 'Hide' is clear modern English
    and fits the object 'anything' well. 'Deny' is less suitable here because the
    king is asking her not to withhold information.
- source_word: מִמֶּנִּי
  chosen: from me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating concealment from the
    speaker.
- source_word: דָּבָר
  chosen: anything
  alternatives:
  - a thing
  - a word
  - anything at all
  lexicon: HALOT
  rationale: Although literally 'a thing/word,' in English after a negative prohibition
    the idiomatic sense is 'anything.' This preserves the force of the indefinite
    object.
- source_word: אֲשֶׁר אָנֹכִי שֹׁאֵל אֹתָךְ
  chosen: that I ask you
  alternatives:
  - which I am asking you
  - that I inquire of you
  lexicon: HALOT
  rationale: The participle שֹׁאֵל can be rendered with present sense in direct discourse.
    'That I ask you' is natural English and preserves the ongoing/immediate force
    of the question.
- source_word: יְדַבֶּר נָא
  chosen: Please speak
  alternatives:
  - Let ... speak, please
  - Please let ... speak
  lexicon: HALOT
  rationale: Third-person jussive used deferentially with the subject following ('my
    lord the king'). In English, direct address is best conveyed as 'Please speak'
    rather than the more wooden 'Let my lord the king speak.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address formula. 'My lord the king' preserves both the possessive
    politeness and royal title without overinterpreting אֲדֹנִי as 'master.'
