id: 2SA.14.23
reference: 2 Samuel 14:23
source:
  edition: WLC
  text: וַ/יָּ֥קָם יוֹאָ֖ב וַ/יֵּ֣לֶךְ גְּשׁ֑וּרָ/ה וַ/יָּבֵ֥א אֶת אַבְשָׁל֖וֹם יְרוּשָׁלִָֽם־׃פ
translation:
  text: So Joab arose and went to Geshur, and brought Absalom to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought Absalom back to Jerusalem.' The context implies return from
      exile, though 'back' is not explicit in the Hebrew verb itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: From קום, the wayyiqtol advances the narrative with the sense of standing
    up/rising to act. 'Arose' preserves the formal narrative cadence better than the
    more colloquial 'got up,' while not over-interpreting it as immediate departure
    ('set out').
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - set out
  lexicon: HALOT
  rationale: הלך in simple narrative commonly means 'went.' 'Traveled' is possible
    but adds nuance not explicit in the Hebrew; 'set out' overlaps with the previous
    verb and can overstate the departure aspect.
- source_word: גְּשׁוּרָה
  chosen: to Geshur
  alternatives:
  - Geshurward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Geshur. Standard English expresses
    this naturally as 'to Geshur.'
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - brought back
  - brought in
  lexicon: HALOT
  rationale: ביא in the Hiphil means 'cause to come, bring.' 'Brought' is the most
    direct rendering. 'Brought back' is contextually plausible since Absalom is returning
    from exile, but 'back' is not explicit in the Hebrew and is therefore omitted
    from the main text.
- source_word: אֶת אַבְשָׁלוֹם
  chosen: Absalom
  lexicon: HALOT
  rationale: Direct-object marker plus proper name; transliterated as the standard
    English form 'Absalom' in keeping with the translation philosophy for personal
    names.
- source_word: יְרוּשָׁלִָם
  chosen: to Jerusalem
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Although the Hebrew lacks a separate preposition here, English idiom
    with 'brought' normally requires the destination to be marked as 'to Jerusalem.'
    This makes explicit the destination relation already conveyed by the syntax.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: The repeated waw-consecutive structure links the actions in sequence.
    'So' gives natural modern English narrative flow while preserving the inferential/sequential
    connection. 'And' would also be defensible but is slightly less idiomatic in English
    at the verse opening.
