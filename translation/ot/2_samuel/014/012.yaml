id: 2SA.14.12
reference: 2 Samuel 14:12
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ הָֽ/אִשָּׁ֔ה תְּדַבֶּר נָ֧א שִׁפְחָתְ/ךָ֛ אֶל אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ
    דָּבָ֑ר וַ/יֹּ֖אמֶר דַּבֵּֽרִי־־׃ס
translation:
  text: Then the woman said, “Please let your servant speak a word to my lord the
    king.” And he said, “Speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your maidservant' or 'your female servant'; the main text uses the
      idiomatic courtly expression 'your servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In this context the referent is the woman speaking to the king, so 'the
    woman' is the plain contextual sense.
- source_word: תְּדַבֶּר נָא
  chosen: Please let ... speak
  alternatives:
  - Please may ... speak
  - Please speak
  lexicon: HALOT
  rationale: The jussive/imperfect with נָא expresses a polite request. 'Please let
    ... speak' captures the deferential petition directed to the king.
- source_word: שִׁפְחָתְךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: Literally the term is feminine ('maidservant/female servant'), but in
    courtly address English idiom commonly uses 'your servant.' This preserves the
    humility formula while remaining readable. The feminine nuance is worth preserving
    in a footnote.
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  chosen: to my lord the king
  alternatives:
  - to my master the king
  lexicon: HALOT
  rationale: אדון here is a human honorific, not a divine title. 'My lord the king'
    is the standard respectful court address in English and fits the social setting.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - something
  - a matter
  lexicon: HALOT
  rationale: The noun literally means 'word/matter.' 'A word' preserves the concise
    Hebrew idiom in polite speech; 'something' would be smoother but less textually
    transparent.
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Simple narrative continuation introducing the king's reply.
- source_word: דַּבֵּרִי
  chosen: Speak
  alternatives:
  - Go ahead and speak
  - Speak on
  lexicon: HALOT
  rationale: A direct imperative to the woman. 'Speak' is concise and faithful; expanded
    idioms add nuance not explicit in the Hebrew.
