id: 2SA.14.9
reference: 2 Samuel 14:9
source:
  edition: WLC
  text: וַ/תֹּ֜אמֶר הָ/אִשָּׁ֤ה הַ/תְּקוֹעִית֙ אֶל הַ/מֶּ֔לֶךְ עָלַ֞/י אֲדֹנִ֥/י הַ/מֶּ֛לֶךְ
    הֶ/עָוֺ֖ן וְ/עַל בֵּ֣ית אָבִ֑/י וְ/הַ/מֶּ֥לֶךְ וְ/כִסְא֖/וֹ נָקִֽי־־׃ס
translation:
  text: Then the woman from Tekoa said to the king, “On me, my lord the king, be the
    guilt, and on my father’s house; but the king and his throne are innocent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the iniquity” or “the blame”; the Hebrew word can refer to guilt, wrongdoing,
      or its liability/consequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה הַתְּקוֹעִית
  chosen: the woman from Tekoa
  alternatives:
  - the Tekoite woman
  lexicon: HALOT
  rationale: The gentilic תְּקוֹעִית identifies her by origin. 'The woman from Tekoa'
    is more natural modern English than 'the Tekoite woman' while preserving the geographical
    identification.
- source_word: עָלַי
  chosen: On me
  alternatives:
  - Upon me
  - Let it be on me
  lexicon: HALOT
  rationale: The preposition with first-person suffix is fronted for emphasis. 'On
    me' preserves the terse, emphatic self-assumption of liability.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Standard courtly address in Samuel. 'My lord the king' preserves both
    respect and royal setting without flattening the title.
- source_word: הֶעָוֺן
  chosen: the guilt
  alternatives:
  - the iniquity
  - the punishment
  - the blame
  lexicon: HALOT
  rationale: עָוֹן can denote guilt, iniquity, or the liability/consequence of wrongdoing.
    In this judicial context the woman is taking responsibility onto herself, so 'the
    guilt' best captures the sense of culpability without over-specifying punishment.
- source_word: וְעַל בֵּית אָבִי
  chosen: and on my father’s house
  alternatives:
  - and on my family
  - and on my father’s household
  lexicon: HALOT
  rationale: Literally 'and on the house of my father.' 'My father’s house' preserves
    the idiom and its familial/legal scope better than the broader 'family.'
- source_word: וְהַמֶּלֶךְ וְכִסְאוֹ
  chosen: but the king and his throne
  alternatives:
  - and the king and his throne
  lexicon: HALOT
  rationale: 'The conjunction marks contrast in sense: guilt rests on her side, whereas
    the king is exonerated. Rendering with ''but'' makes the implied contrast explicit
    in natural English. ''His throne'' is retained literally as a metonym for royal
    authority/dynasty.'
- source_word: נָקִי
  chosen: are innocent
  alternatives:
  - are guiltless
  - are clear
  - are free from blame
  lexicon: HALOT
  rationale: Predicate adjective in singular after a compound subject is idiomatically
    rendered in English as plural. 'Are innocent' is clear, judicially appropriate,
    and matches the exoneration theme of the verse.
