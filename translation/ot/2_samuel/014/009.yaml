theological_decisions:
- issue: Royal exoneration formula
  chosen_reading: the king and his throne are innocent
  alternative_readings:
  - the king and his throne are guiltless
  - the king and his throne are free from blame
  rationale: The verse concerns legal/moral liability, not a broader theological claim
    about the king's moral perfection. The translation preserves the judicial force
    of the Hebrew without importing doctrinal implications.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
