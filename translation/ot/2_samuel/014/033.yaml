theological_decisions:
- issue: Nature of the king's kiss
  chosen_reading: Render literally as an act of kissing without specifying more than
    the text states.
  alternative_readings:
  - a formal sign of reconciliation
  - a ceremonial gesture of restored status
  rationale: The narrative likely implies reconciliation or restored favor, but the
    Hebrew simply states that the king kissed Absalom. The translation preserves the
    action and leaves the fuller significance to readers and context.
  doctrine_reference: Preserve theological tension rather than resolve it.
