id: 2SA.14.33
reference: 2 Samuel 14:33
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יוֹאָ֣ב אֶל הַ/מֶּלֶךְ֮ וַ/יַּגֶּד ל/וֹ֒ וַ/יִּקְרָ֤א אֶל אַבְשָׁלוֹם֙
    וַ/יָּבֹ֣א אֶל הַ/מֶּ֔לֶךְ וַ/יִּשְׁתַּ֨חוּ ל֧/וֹ עַל אַפָּ֛י/ו אַ֖רְצָ/ה לִ/פְנֵ֣י
    הַ/מֶּ֑לֶךְ וַ/יִּשַּׁ֥ק הַ/מֶּ֖לֶךְ לְ/אַבְשָׁלֽוֹם־־־־־׃פ
translation:
  text: Then Joab came to the king and told him, and he called for Absalom. So he
    came to the king and bowed himself with his face to the ground before the king,
    and the king kissed Absalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned Absalom.'
    reason: lexical_alternative
  - marker: b
    text: The king's kiss likely signals reconciliation or restored favor, though
      the text states only that he kissed him.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of בוא in court narrative; 'came' is natural
    English and preserves the movement toward the king.
- source_word: וַיַּגֶּד לוֹ
  chosen: told him
  alternatives:
  - reported to him
  - informed him
  lexicon: HALOT
  rationale: נגד in Hiphil often means to tell or report. 'Told him' is concise and
    fits the immediate narrative sequence after Joab's approach to the king.
- source_word: וַיִּקְרָא אֶל אַבְשָׁלוֹם
  chosen: he called for Absalom
  alternatives:
  - he summoned Absalom
  - he called to Absalom
  lexicon: HALOT
  rationale: קרא אל in this royal context implies having Absalom brought into the
    king's presence. 'Called for' preserves the idiom without overformalizing to 'summoned,'
    though that sense is present.
- source_word: וַיִּשְׁתַּחוּ לוֹ
  chosen: bowed himself
  alternatives:
  - prostrated himself
  - paid homage to him
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שחה denotes bowing down in reverence.
    'Bowed himself' is readable modern English; the following phrase 'with his face
    to the ground' supplies the full prostration sense.
- source_word: עַל אַפָּיו אַרצה
  chosen: with his face to the ground
  alternatives:
  - on his face to the ground
  - face down to the earth
  lexicon: HALOT
  rationale: Literally 'on his face earthward.' The chosen rendering is idiomatic
    English while preserving the physical posture of deep obeisance.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  lexicon: HALOT
  rationale: Standard rendering of לפני in court scenes; concise and natural.
- source_word: וַיִּשַּׁק הַמֶּלֶךְ לְאַבְשָׁלוֹם
  chosen: the king kissed Absalom
  alternatives:
  - the king gave Absalom a kiss
  lexicon: HALOT
  rationale: נשק here denotes a literal kiss, functioning as a sign of reconciliation
    and restored favor. The direct rendering is best and avoids interpretive expansion
    in the main text.
