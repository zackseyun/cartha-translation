theological_decisions:
- issue: Meaning of 'inheritance of God'
  chosen_reading: A reference to the covenantal inheritance allotted by God, from
    which the woman and her son would be cut off.
  alternative_readings:
  - A reference to God's own possession/people
  - A more general reference to family inheritance under divine order
  rationale: The immediate context concerns extinction of a family line and loss of
    standing within Israel. The phrase should retain its theological-covenantal weight
    without narrowing it beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §3, §5
