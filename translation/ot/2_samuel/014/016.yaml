id: 2SA.14.16
reference: 2 Samuel 14:16
source:
  edition: WLC
  text: כִּ֚י יִשְׁמַ֣ע הַ/מֶּ֔לֶךְ לְ/הַצִּ֥יל אֶת אֲמָת֖/וֹ מִ/כַּ֣ף הָ/אִ֑ישׁ לְ/הַשְׁמִ֨יד
    אֹתִ֤/י וְ/אֶת בְּנִ/י֙ יַ֔חַד מִֽ/נַּחֲלַ֖ת אֱלֹהִֽים־־׃
translation:
  text: For the king will hear, to deliver his servant from the hand of the man who
    would destroy me and my son together from the inheritance of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his maidservant'; the Hebrew term is specifically feminine.
    reason: lexical_alternative
  - marker: b
    text: '''The inheritance of God'' likely refers to the inheritance allotted by
      God within Israel; alternatively, ''God''s inheritance.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the woman's reason or confidence statement flowing
    from the previous verse. 'For' best preserves the explanatory force in context.
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - will listen
  - will heed
  lexicon: HALOT
  rationale: The verb שמע can mean hear/listen/heed. 'Will hear' keeps the Hebrew
    wording while allowing the following infinitive phrase to express the king's responsive
    action.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to snatch away or deliver. 'Deliver'
    is a natural English rendering that preserves the gravity without over-paraphrasing.
- source_word: אֲמָתוֹ
  chosen: his servant
  alternatives:
  - his maidservant
  - his female servant
  lexicon: HALOT
  rationale: The noun is specifically feminine ('maidservant'), referring to the speaking
    woman in deferential court language. 'His servant' is smoother modern English
    in direct address, but the feminine sense is worth preserving in a footnote.
- source_word: מִכַּף הָאִישׁ
  chosen: from the hand of the man
  alternatives:
  - from the grasp of the man
  - from the power of the man
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or control. Retaining ''hand''
    preserves the idiom and the formal texture of the source.'
- source_word: לְהַשְׁמִיד
  chosen: who would destroy
  alternatives:
  - to destroy
  - to wipe out
  - to exterminate
  lexicon: HALOT
  rationale: The infinitive expresses the hostile purpose of the man. Rendering it
    relatively in English ('who would destroy') makes the syntax natural while preserving
    the destructive intent.
- source_word: יַחַד
  chosen: together
  alternatives:
  - both together
  - alike
  lexicon: HALOT
  rationale: The adverb emphasizes that both mother and son are targeted. 'Together'
    is concise and clear.
- source_word: מִנַּחֲלַת אֱלֹהִים
  chosen: from the inheritance of God
  alternatives:
  - from God's inheritance
  - from the heritage of God
  lexicon: HALOT
  rationale: The phrase likely refers to the covenant land/allotted place among God's
    people. 'Inheritance of God' closely follows the Hebrew and preserves the theological
    resonance of covenant inheritance.
