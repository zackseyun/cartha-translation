id: 2SA.1.1
reference: 2 Samuel 1:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַֽחֲרֵי֙ מ֣וֹת שָׁא֔וּל וְ/דָוִ֣ד שָׁ֔ב מֵ/הַכּ֖וֹת אֶת הָ/עֲמָלֵ֑ק
    וַ/יֵּ֧שֶׁב דָּוִ֛ד בְּ/צִקְלָ֖ג יָמִ֥ים שְׁנָֽיִם־׃
translation:
  text: Now after the death of Saul, when David had returned from striking down the
    Amalekites, David stayed in Ziklag two days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Amalek,' a collective reference to the Amalekite people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative scene-setting
    formula. In contemporary English, 'Now' naturally signals continuation without
    the wooden 'And it happened.'
- source_word: אַחֲרֵי מוֹת
  chosen: after the death of
  alternatives:
  - after ... died
  - after the dying of
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered with the nominal expression
    'after the death of,' preserving the Hebrew's formal temporal framing.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁב
  chosen: had returned
  alternatives:
  - returned
  - came back
  lexicon: HALOT
  rationale: The qatal after the temporal frame is best rendered as prior action relative
    to the main wayyiqtol sequence; English past perfect clarifies the sequence.
- source_word: מֵהַכּוֹת
  chosen: from striking down
  alternatives:
  - from defeating
  - from attacking
  - from slaughtering
  lexicon: HALOT
  rationale: The infinitive construct of נכה with מן indicates source/origin after
    returning. 'Striking down' preserves the military violence of the verb without
    overstating total annihilation.
- source_word: אֶת הָעֲמָלֵק
  chosen: the Amalekites
  alternatives:
  - Amalek
  lexicon: HALOT
  rationale: Though the Hebrew uses the singular ethnonym 'Amalek,' in English this
    commonly refers to the people group collectively; 'the Amalekites' is the clearest
    natural rendering.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - lived
  - remained
  - dwelt
  lexicon: HALOT
  rationale: In this context of a limited two-day period, 'stayed' fits better than
    the more permanent-sounding 'lived' or archaic 'dwelt.'
- source_word: בְּצִקְלָג
  chosen: in Ziklag
  alternatives:
  - at Ziklag
  rationale: Standard rendering of the place name with the locative preposition.
- source_word: יָמִים שְׁנָיִם
  chosen: two days
  alternatives:
  - for two days
  lexicon: HALOT
  rationale: The accusative of duration is naturally expressed in English as 'two
    days'; the verb 'stayed' already implies duration, so an added 'for' is optional
    and omitted for tighter style.
