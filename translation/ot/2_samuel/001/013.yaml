id: 2SA.1.13
reference: 2 Samuel 1:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֗ד אֶל הַ/נַּ֨עַר֙ הַ/מַּגִּ֣יד ל֔/וֹ אֵ֥י מִ/זֶּ֖ה אָ֑תָּה
    וַ/יֹּ֕אמֶר בֶּן אִ֛ישׁ גֵּ֥ר עֲמָלֵקִ֖י אָנֹֽכִי־־׃
translation:
  text: David said to the young man who told him, “Where are you from?” And he said,
    “I am the son of an Amalekite immigrant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am the son of a resident foreigner, an Amalekite.” The Hebrew phrase
      can be understood either as identifying his father as an Amalekite immigrant
      or, more broadly, as linking the speaker by descent to an Amalekite sojourning
      in the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the youth
  - the servant
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young male or attendant. In this narrative context,
    the speaker is an adult enough to travel and report, so 'young man' is natural
    modern English without implying servile status not explicit in the verse.
- source_word: הַמַּגִּיד לוֹ
  chosen: who told him
  alternatives:
  - who reported to him
  - who informed him
  lexicon: HALOT
  rationale: The participle of נגד identifies the young man as the one bringing the
    report to David. 'Who told him' is idiomatic and sufficiently precise in context.
- source_word: אֵי מִזֶּה
  chosen: Where are you from?
  alternatives:
  - From where are you?
  - Where do you come from?
  lexicon: HALOT
  rationale: The interrogative plus demonstrative idiom asks about origin. 'Where
    are you from?' is the clearest contemporary equivalent.
- source_word: בֶּן אִישׁ
  chosen: the son of
  alternatives:
  - a son of
  - the son of a man who is
  lexicon: HALOT
  rationale: The construct phrase literally reads 'son of a man.' In Hebrew idiom
    this can mark descent or family identity. Rendering simply as 'the son of' preserves
    the filial identification without awkward literalism.
- source_word: גֵּר
  chosen: immigrant
  alternatives:
  - sojourner
  - resident foreigner
  - alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel or in a land not his
    own. 'Immigrant' communicates this social status in readable modern English better
    than archaic 'sojourner' or potentially misleading 'alien.'
- source_word: עֲמָלֵקִי
  chosen: Amalekite
  lexicon: HALOT
  rationale: Standard ethnic designation from עֲמָלֵק; transliterated in conventional
    English form.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun gives an explicit self-identification. English
    requires the copula for a natural sentence: ''I am.'''
