id: 2SA.1.17
reference: 2 Samuel 1:17
source:
  edition: WLC
  text: וַ/יְקֹנֵ֣ן דָּוִ֔ד אֶת הַ/קִּינָ֖ה הַ/זֹּ֑את עַל שָׁא֖וּל וְ/עַל יְהוֹנָתָ֥ן
    בְּנֽ/וֹ־־־׃
translation:
  text: Then David sang this lament over Saul and over Jonathan his son,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lamented with this lament'; the Hebrew verb and noun form a formal expression
      for taking up a funeral lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקֹנֵן
  chosen: sang this lament
  alternatives:
  - lamented
  - chanted this dirge
  - composed this lament
  lexicon: HALOT
  rationale: The verb קונן denotes taking up or uttering a lamentation, often in a
    stylized poetic form. Because the direct object is הַקִּינָה ('the lament'), English
    'sang this lament' captures the performative sense naturally, while 'lamented
    this lament' is awkward. 'Chanted this dirge' is possible but more interpretive
    and less natural in modern English.
- source_word: הַקִּינָה
  chosen: lament
  alternatives:
  - dirge
  - elegy
  lexicon: HALOT
  rationale: קִינָה is a formal lament song, often for the dead. 'Lament' is the clearest
    modern English term and preserves the mourning context without sounding overly
    technical or archaic. 'Dirge' is possible but narrower and somewhat stylistically
    marked.
- source_word: הַזֹּאת
  chosen: this
  lexicon: HALOT
  rationale: The demonstrative directly modifies 'lament' and is best rendered straightforwardly
    as 'this.'
- source_word: עַל
  chosen: over
  alternatives:
  - concerning
  - for
  lexicon: HALOT
  rationale: In lament contexts, עַל commonly marks the subject of mourning. 'Over'
    is idiomatic in English for lamenting the dead and better conveys grief than the
    more neutral 'concerning.'
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The suffix refers to Saul, identifying Jonathan as Saul's son. 'His son'
    is sufficient and natural. 'His own son' would add emphasis not explicit in the
    Hebrew.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw with wayyiqtol advances the narrative. 'Then' gives
    smooth modern English narrative flow while preserving sequence; 'And' would also
    be formally possible.
