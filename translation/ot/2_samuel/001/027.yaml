id: 2SA.1.27
reference: 2 Samuel 1:27
source:
  edition: WLC
  text: אֵ֚יךְ נָפְל֣וּ גִבּוֹרִ֔ים וַ/יֹּאבְד֖וּ כְּלֵ֥י מִלְחָמָֽה׃פ
translation:
  text: How the mighty have fallen, and the weapons of war have perished!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the implements of war' or 'the armor of war.' The Hebrew phrase can
      refer broadly to military equipment, not only offensive weapons.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the weapons of war' may be understood metaphorically of Saul
      and Jonathan themselves as Israel's martial strength, though it can also be
      read literally.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament, not a request for information. 'How'
    preserves the poetic force and echoes the refrain in this lament.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: The perfect verb in lament is naturally rendered in English as 'have
    fallen,' preserving the stative/resultative sense and the familiar poetic cadence.
- source_word: גִבּוֹרִים
  chosen: the mighty
  alternatives:
  - warriors
  - heroes
  lexicon: HALOT
  rationale: In this lament context, the term denotes mighty men/warriors. 'The mighty'
    is concise, idiomatic, and preserves the elevated poetic register without over-specifying.
- source_word: וַיֹּאבְדוּ
  chosen: have perished
  alternatives:
  - are lost
  - were destroyed
  lexicon: HALOT
  rationale: The verb אבד commonly means 'perish' or 'be lost/destroyed.' 'Have perished'
    fits the lament style and pairs well with 'have fallen' while allowing either
    literal destruction or figurative loss.
- source_word: כְּלֵי מִלְחָמָה
  chosen: the weapons of war
  alternatives:
  - weapons
  - implements of war
  - armor
  lexicon: HALOT
  rationale: The construct phrase literally means 'articles/vessels of war.' In English,
    'weapons of war' is the most natural rendering and can function both literally
    and metaphorically in context.
