theological_decisions:
- issue: Rendering of covenantal slur עֲרֵלִים
  chosen_reading: the uncircumcised
  alternative_readings:
  - the heathen
  - the unclean
  rationale: The Hebrew term is literally tied to circumcision and thus to covenant
    identity. Rendering it literally preserves the text's theological and rhetorical
    force rather than replacing it with a generalized insult.
  doctrine_reference: Translation philosophy §§1, 5
