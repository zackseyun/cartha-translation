id: 2SA.1.20
reference: 2 Samuel 1:20
source:
  edition: WLC
  text: אַל תַּגִּ֣ידוּ בְ/גַ֔ת אַֽל תְּבַשְּׂר֖וּ בְּ/חוּצֹ֣ת אַשְׁקְל֑וֹן פֶּן תִּשְׂמַ֨חְנָה֙
    בְּנ֣וֹת פְּלִשְׁתִּ֔ים פֶּֽן תַּעֲלֹ֖זְנָה בְּנ֥וֹת הָ/עֲרֵלִֽים־־־־׃
translation:
  text: Do not tell it in Gath; do not proclaim the news in the streets of Ashkelon,
    lest the daughters of the Philistines rejoice, lest the daughters of the uncircumcised
    exult.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'announce it' / 'bring the news' for 'proclaim the news.'
    reason: lexical_alternative
  - marker: b
    text: '''The daughters of the uncircumcised'' is a literal rendering of a covenantal
      term of reproach for the Philistines; alternatively, ''the daughters of the
      uncircumcised ones.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּגִּידוּ
  chosen: tell it
  alternatives:
  - declare it
  - report it
  lexicon: HALOT
  rationale: From נגד, 'to tell/report/declare.' 'Tell it' is natural English and
    fits the parallel with the following prohibition. The object is implicit from
    context (the news of Saul and Jonathan's fall), so 'it' is supplied in English.
- source_word: בְגַת
  chosen: in Gath
  lexicon: HALOT
  rationale: Locative preposition with the city name Gath; standard transliteration
    of the place name is retained.
- source_word: תְּבַשְּׂרוּ
  chosen: proclaim the news
  alternatives:
  - announce it
  - bring the news
  lexicon: HALOT
  rationale: From בשר in the piel, 'to bring/proclaim news.' 'Proclaim the news' preserves
    the public, herald-like sense and avoids flattening the parallelism with 'tell
    it.'
- source_word: בְּחוּצֹת אַשְׁקְלוֹן
  chosen: in the streets of Ashkelon
  alternatives:
  - in the squares of Ashkelon
  lexicon: HALOT
  rationale: חוּצוֹת commonly refers to streets or open places in a city. 'Streets'
    is the most idiomatic modern English rendering, while still fitting the public
    setting.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and preserves
    the poetic warning structure of the Hebrew.
- source_word: תִּשְׂמַחְנָה
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: HALOT
  rationale: From שמח, denoting joy/gladness. 'Rejoice' suits the elevated lament
    style.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  chosen: the daughters of the Philistines
  alternatives:
  - the women of the Philistines
  - Philistine daughters
  lexicon: HALOT
  rationale: A literal rendering preserves the poetic personification of the women
    of Philistine cities as celebrants.
- source_word: תַּעֲלֹזְנָה
  chosen: exult
  alternatives:
  - triumph
  - be jubilant
  lexicon: HALOT
  rationale: From עלז, a stronger, more exuberant expression than the previous verb.
    'Exult' preserves the intensification in the parallel line.
- source_word: בְּנוֹת הָעֲרֵלִים
  chosen: the daughters of the uncircumcised
  alternatives:
  - the daughters of the foreskinned
  - the daughters of the unclean
  lexicon: HALOT
  rationale: עֲרֵלִים literally means 'uncircumcised ones.' The phrase is a polemical
    ethnic-religious designation for the Philistines; the literal rendering preserves
    the covenantal insult without importing extra interpretation.
