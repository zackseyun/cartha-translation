id: 2SA.1.22
reference: 2 Samuel 1:22
source:
  edition: WLC
  text: מִ/דַּ֣ם חֲלָלִ֗ים מֵ/חֵ֨לֶב֙ גִּבּוֹרִ֔ים קֶ֚שֶׁת יְה֣וֹנָתָ֔ן לֹ֥א נָשׂ֖וֹג
    אָח֑וֹר וְ/חֶ֣רֶב שָׁא֔וּל לֹ֥א תָשׁ֖וּב רֵיקָֽם׃
translation:
  text: From the blood of the slain, from the fat of the mighty, Jonathan’s bow did
    not turn back, and Saul’s sword did not return empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not draw back.' The Hebrew verb can convey withdrawing or turning
      back.
    reason: lexical_alternative
  - marker: b
    text: '''Fat'' may also suggest the choicest or richest part, intensifying the
      image of battlefield success.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּם
  chosen: From the blood of
  alternatives:
  - Away from the blood of
  - Because of the blood of
  lexicon: HALOT
  rationale: 'The preposition מִן with דָּם is best taken as a source/separation expression
    in this martial context: the weapons do not recoil from contact with blood. ''From
    the blood of'' preserves the Hebrew imagery without over-interpreting.'
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - the wounded
  - the pierced
  lexicon: HALOT
  rationale: חָלָל commonly denotes those slain in battle. 'The slain' is the most
    natural and contextually precise rendering in David's lament.
- source_word: מֵחֵלֶב
  chosen: from the fat of
  alternatives:
  - from the choicest part of
  - from the flesh of
  lexicon: HALOT
  rationale: חֵלֶב literally means 'fat.' In battle poetry it can connote richness
    or the fatty parts of the body, but the literal image is vivid and intelligible
    in English, so it is retained.
- source_word: גִּבּוֹרִים
  chosen: the mighty
  alternatives:
  - warriors
  - heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים refers to strong or valiant fighters. 'The mighty' preserves
    the elevated poetic register of the lament better than the more prosaic 'warriors.'
- source_word: קֶשֶׁת יְהוֹנָתָן
  chosen: Jonathan’s bow
  alternatives:
  - the bow of Jonathan
  lexicon: HALOT
  rationale: Construct relationship rendered naturally in English as a possessive.
    This keeps the line concise and poetic.
- source_word: לֹא נָשׂוֹג אָחוֹר
  chosen: did not turn back
  alternatives:
  - did not retreat backward
  - did not draw back
  lexicon: HALOT
  rationale: The verb נסוג with אָחוֹר expresses withdrawal or turning back. For a
    bow in poetic personification, 'did not turn back' communicates steadfast effectiveness
    without awkwardness.
- source_word: וְחֶרֶב שָׁאוּל
  chosen: and Saul’s sword
  alternatives:
  - and the sword of Saul
  lexicon: HALOT
  rationale: Construct rendered idiomatically as an English possessive, matching the
    parallel with 'Jonathan’s bow.'
- source_word: לֹא תָשׁוּב רֵיקָם
  chosen: did not return empty
  alternatives:
  - did not come back empty-handed
  - did not return without effect
  lexicon: HALOT
  rationale: The idiom means not returning without accomplishing its lethal purpose.
    'Did not return empty' is faithful, concise, and preserves the poetic personification
    of the sword.
