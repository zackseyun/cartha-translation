id: 2SA.1.12
reference: 2 Samuel 1:12
source:
  edition: WLC
  text: וַֽ/יִּסְפְּדוּ֙ וַ/יִּבְכּ֔וּ וַ/יָּצֻ֖מוּ עַד הָ/עָ֑רֶב עַל שָׁא֞וּל וְ/עַל
    יְהוֹנָתָ֣ן בְּנ֗/וֹ וְ/עַל עַ֤ם יְהוָה֙ וְ/עַל בֵּ֣ית יִשְׂרָאֵ֔ל כִּ֥י נָפְל֖וּ
    בֶּ/חָֽרֶב־־־־־׃ס
translation:
  text: They mourned, wept, and fasted until evening for Saul, for Jonathan his son,
    for the people of the LORD, and for the house of Israel, because they had fallen
    by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Jonathan his son,'' identifying Jonathan specifically as Saul''s
      son.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD's people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפְּדוּ
  chosen: they mourned
  alternatives:
  - they lamented
  - they wailed
  lexicon: HALOT
  rationale: The verb ספד denotes formal mourning or lamentation for the dead. 'Mourned'
    is natural modern English and broad enough to include the public grief implied
    here without over-specifying vocal expression.
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה straightforwardly means 'weep/cry.' 'Wept' fits the solemn register
    and distinguishes this verb from the broader 'mourned' that precedes it.
- source_word: וַיָּצֻמוּ
  chosen: fasted
  lexicon: HALOT
  rationale: צום is the standard verb for abstaining from food as an act of grief
    or devotion. 'Fasted' is the direct and conventional rendering.
- source_word: עַד הָעָרֶב
  chosen: until evening
  alternatives:
  - until the evening
  lexicon: HALOT
  rationale: The phrase marks the duration of mourning. 'Until evening' is idiomatic
    English and preserves the temporal endpoint.
- source_word: עַל
  chosen: for
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: Repeated עַל here introduces the objects of mourning. In English, 'for'
    most naturally expresses mourning on account of persons or groups, whereas 'over'
    can sound less direct in this list structure.
- source_word: יְהוֹנָתָן בְּנוֹ
  chosen: Jonathan his son
  alternatives:
  - Jonathan, his son
  - Jonathan son of Saul
  lexicon: HALOT
  rationale: The Hebrew apposition identifies Jonathan specifically as Saul's son.
    'Jonathan his son' preserves the Hebrew sequence closely while remaining intelligible
    in English.
- source_word: עַם יְהוָה
  chosen: the people of the LORD
  alternatives:
  - the LORD's people
  lexicon: HALOT
  rationale: This construct phrase is best rendered transparently. Because יְהוָה
    is governed by the project's contested-terms policy, it is rendered 'the LORD.'
    'The people of the LORD' preserves the covenantal sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine policy, the divine name is rendered 'the LORD' rather than
    transliterated.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the household of Israel
  - Israel
  lexicon: HALOT
  rationale: The phrase is a standard collective designation. 'House of Israel' preserves
    the biblical idiom and its corporate sense better than flattening it to simply
    'Israel.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the mourning. 'Because' is clearer in
    contemporary English than the more formal 'for.'
- source_word: נָפְלוּ
  chosen: they had fallen
  alternatives:
  - they fell
  lexicon: HALOT
  rationale: The verb נפל means 'fall.' In battle-death contexts, 'had fallen' is
    idiomatic English and fits the retrospective explanation for the mourning.
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - by sword
  - in battle
  lexicon: HALOT
  rationale: The phrase literally refers to death by the sword, a conventional expression
    for violent death in battle. 'By the sword' preserves the imagery without paraphrasing
    it away.
