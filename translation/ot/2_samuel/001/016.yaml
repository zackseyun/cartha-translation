theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering מְשִׁיחַ in a royal context
  chosen_reading: anointed
  alternative_readings:
  - messiah
  rationale: Although the noun can underlie 'messiah,' here it refers specifically to Saul as the king consecrated by the LORD. 'The LORD’s anointed' preserves the title's meaning in context and avoids importing later christological associations into this narrative verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; transliterate names'
