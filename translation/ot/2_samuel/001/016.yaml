theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and preserving established reverential convention without obscuring that the Hebrew
    has the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering מְשִׁיחַ in a royal context
  chosen_reading: anointed
  alternative_readings:
  - messiah
  rationale: Although the noun can underlie 'messiah,' here it refers specifically
    to Saul as the king consecrated by the LORD. 'The LORD’s anointed' preserves the
    title's meaning in context and avoids importing later christological associations
    into this narrative verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; transliterate
    names'
