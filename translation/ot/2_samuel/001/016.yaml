id: 2SA.1.16
reference: 2 Samuel 1:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ דָּוִ֔ד דמי/ך עַל רֹאשֶׁ֑/ךָ כִּ֣י פִ֗י/ךָ עָנָ֤ה בְ/ךָ֙
    לֵ/אמֹ֔ר אָנֹכִ֥י מֹתַ֖תִּי אֶת מְשִׁ֥יחַ יְהוָֽה־־׃ס
translation:
  text: Then David said to him, “Your blood is on your own head, for your own mouth
    has testified against you, saying, ‘I myself killed the LORD’s anointed.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Your blood be on your head.” The Hebrew idiom assigns
      responsibility for his death to himself.
    reason: lexical_alternative
  - marker: b
    text: Or “your mouth has borne witness against you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: Then David said to him
  alternatives:
  - And David said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'to him' explicitly renders אֵלָיו.
- source_word: דָּמֶיךָ עַל רֹאשֶׁךָ
  chosen: Your blood is on your own head
  alternatives:
  - Your blood be on your head
  - Your bloodguilt is on your head
  lexicon: HALOT
  rationale: This is an idiomatic judicial formula assigning responsibility for one's
    death. 'Is on your own head' preserves the Hebrew image and sense of culpability.
    'Own' brings out the reflexive force implicit in the idiom.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for David's judgment. 'For' fits the formal judicial
    tone.
- source_word: פִּיךָ
  chosen: your own mouth
  alternatives:
  - your mouth
  lexicon: HALOT
  rationale: The body-part metonymy is retained rather than flattened to 'you,' since
    the Hebrew emphasizes self-incrimination by spoken testimony. 'Own' heightens
    the reflexive force in idiomatic English.
- source_word: עָנָה בְךָ
  chosen: has testified against you
  alternatives:
  - has answered against you
  - has borne witness against you
  lexicon: HALOT
  rationale: In this legal context ענה with ב conveys giving testimony against someone.
    'Has testified against you' communicates the forensic sense more clearly than
    a wooden 'answered against you.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when it said
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the testimony.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' preserves the emphasis
    of the self-incriminating confession.
- source_word: מֹתַתִּי
  chosen: killed
  alternatives:
  - put to death
  - caused the death of
  lexicon: HALOT
  rationale: The verb denotes causing death. 'Killed' is the most direct and natural
    English equivalent in this confession.
- source_word: מְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  lexicon: HALOT
  rationale: This construct phrase is a royal title for Saul. Following doctrine,
    יְהוָה is rendered 'the LORD.' 'Anointed' is translated rather than treated as
    a name-like title, preserving the Hebrew meaning and David's theological rationale.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
