id: 2SA.1.23
reference: 2 Samuel 1:23
source:
  edition: WLC
  text: שָׁא֣וּל וִ/יהוֹנָתָ֗ן הַ/נֶּאֱהָבִ֤ים וְ/הַ/נְּעִימִם֙ בְּ/חַיֵּי/הֶ֔ם וּ/בְ/מוֹתָ֖/ם
    לֹ֣א נִפְרָ֑דוּ מִ/נְּשָׁרִ֣ים קַ֔לּוּ מֵ/אֲרָי֖וֹת גָּבֵֽרוּ׃
translation:
  text: Saul and Jonathan, beloved and pleasant in their lives, were not parted in
    their death; they were swifter than eagles, they were stronger than lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lovely' for 'pleasant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faster than vultures,' since the Hebrew word can refer more broadly
      to a large bird of prey, though 'eagles' is the traditional and most natural
      rendering here.
    reason: lexical_alternative
  - marker: c
    text: Or 'mightier than lions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּאֱהָבִים
  chosen: beloved
  alternatives:
  - loved
  - lovely
  lexicon: HALOT
  rationale: Passive/adjectival form from אהב, describing Saul and Jonathan as those
    who were loved. 'Beloved' is concise, elevated, and fits the lament context better
    than the flatter 'loved.'
- source_word: וְהַנְּעִימִם
  chosen: pleasant
  alternatives:
  - lovely
  - delightful
  - agreeable
  lexicon: HALOT
  rationale: From נעים, denoting pleasantness or agreeableness. 'Pleasant' preserves
    the poetic parallel with 'beloved' without over-interpreting as moral virtue or
    physical beauty.
- source_word: בְּחַיֵּיהֶם
  chosen: in their lives
  alternatives:
  - during their lifetime
  - while they lived
  lexicon: HALOT
  rationale: The prepositional phrase marks the sphere/time of life. 'In their lives'
    is a natural English rendering that preserves the Hebrew parallel with 'in their
    death.'
- source_word: וּבְמוֹתָם
  chosen: in their death
  alternatives:
  - in death
  - when they died
  lexicon: HALOT
  rationale: Kept closely parallel to the previous phrase. Singular 'death' with plural
    suffix is idiomatic in Hebrew; English singular 'death' best preserves the collective
    sense.
- source_word: לֹא נִפְרָדוּ
  chosen: were not parted
  alternatives:
  - were not separated
  - did not part
  lexicon: HALOT
  rationale: Nifal of פרד expresses separation. 'Were not parted' preserves the passive/reflexive
    nuance and the poetic register of the lament.
- source_word: מִנְּשָׁרִים קַלּוּ
  chosen: they were swifter than eagles
  alternatives:
  - lighter than eagles
  - faster than vultures
  lexicon: HALOT
  rationale: קלל in this comparative context refers to speed/lightness, conventionally
    rendered 'swifter.' Although נשר can denote a large bird of prey and may at times
    overlap with 'vulture,' 'eagles' is the standard and most natural rendering in
    this poetic comparison.
- source_word: מֵאֲרָיוֹת גָּבֵרוּ
  chosen: they were stronger than lions
  alternatives:
  - they were mightier than lions
  - they prevailed over lions
  lexicon: HALOT
  rationale: גבר conveys strength or superiority. In this verbless-like poetic comparison,
    'stronger than lions' is the clearest idiomatic English equivalent; 'mightier'
    is possible but slightly less natural for modern readers.
- source_word: שָׁאוּל וִיהוֹנָתָן
  chosen: Saul and Jonathan
  rationale: Personal names are transliterated by standard English conventions, in
    keeping with project philosophy.
