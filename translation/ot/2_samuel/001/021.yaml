id: 2SA.1.21
reference: 2 Samuel 1:21
source:
  edition: WLC
  text: הָרֵ֣י בַ/גִּלְבֹּ֗עַ אַל טַ֧ל וְ/אַל מָטָ֛ר עֲלֵי/כֶ֖ם וּ/שְׂדֵ֣י תְרוּמֹ֑ת
    כִּ֣י שָׁ֤ם נִגְעַל֙ מָגֵ֣ן גִּבּוֹרִ֔ים מָגֵ֣ן שָׁא֔וּל בְּלִ֖י מָשִׁ֥יחַ בַּ/שָּֽׁמֶן־־׃
translation:
  text: Mountains of Gilboa, let there be no dew or rain upon you, nor fields of offerings;
    for there the shield of the mighty was defiled, the shield of Saul, not anointed
    with oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor bounteous fields,' 'nor fields of firstfruits,' or 'nor fields of
      heave offerings.' The Hebrew phrase is difficult, and תְּרוּמוֹת often refers
      to offerings set apart for God.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may refer to Saul's shield as no longer rubbed with oil,
      a customary preparation for battle, rather than to Saul himself as 'the anointed.'
    reason: cultural_note
lexical_decisions:
- source_word: הָרֵי בַגִּלְבֹּעַ
  chosen: Mountains of Gilboa
  alternatives:
  - O mountains of Gilboa
  - hills of Gilboa
  lexicon: HALOT
  rationale: Construct phrase addressing the mountain region of Gilboa directly in
    David's lament. 'Mountains' is the straightforward sense of הָרֵי; 'O mountains'
    is possible as an explicit vocative, but English can convey direct address without
    'O.'
- source_word: אַל טַּל וְאַל מָטָר עֲלֵיכֶם
  chosen: let there be no dew or rain upon you
  alternatives:
  - no dew or rain be upon you
  - may no dew or rain fall on you
  lexicon: HALOT
  rationale: אַל with nominal terms in a curse-like wish is well represented by an
    English jussive/optative. 'Upon you' preserves the direct address to the mountains.
- source_word: וּשְׂדֵי תְרוּמוֹת
  chosen: nor fields of offerings
  alternatives:
  - nor bounteous fields
  - nor fields of firstfruits
  - nor fields of heave offerings
  lexicon: HALOT
  rationale: The Hebrew is difficult. תְרוּמוֹת commonly denotes contributions/offerings
    set apart. Rather than smoothing to an interpretive paraphrase like 'bounteous
    fields,' the translation keeps the cultic sense more transparently as 'fields
    of offerings,' while preserving major alternatives in a footnote.
- source_word: כִּי שָׁם
  chosen: for there
  alternatives:
  - because there
  lexicon: HALOT
  rationale: Introduces the reason for the curse in natural English.
- source_word: נִגְעַל
  chosen: was defiled
  alternatives:
  - was polluted
  - was cast away
  - was loathed
  lexicon: HALOT
  rationale: The Niphal of געל carries the sense of being defiled or treated as abhorrent.
    In context of a shield lying bloodied and disgraced after battle, 'was defiled'
    best preserves the vivid dishonor without overinterpreting.
- source_word: מָגֵן גִּבּוֹרִים
  chosen: the shield of the mighty
  alternatives:
  - the shield of warriors
  - the shield of heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים refers to mighty men/warriors. 'The mighty' is concise and
    suitably elevated for lament poetry.
- source_word: מָגֵן שָׁאוּל
  chosen: the shield of Saul
  alternatives:
  - Saul's shield
  lexicon: HALOT
  rationale: 'The appositional repetition is preserved rather than collapsed, matching
    the poetic structure: first the general ''shield of the mighty,'' then specifically
    ''the shield of Saul.'''
- source_word: בְּלִי מָשִׁיחַ בַּשָּׁמֶן
  chosen: not anointed with oil
  alternatives:
  - as though not anointed with oil
  - without being anointed with oil
  lexicon: HALOT
  rationale: The phrase most naturally refers to the shield not being rubbed/anointed
    with oil, a known maintenance practice for leather shields. 'Not anointed with
    oil' preserves the Hebrew wording and the poetic force. 'As though not anointed'
    is a contextual expansion reflected in some translations, but it adds comparison
    not explicit in the Hebrew.
