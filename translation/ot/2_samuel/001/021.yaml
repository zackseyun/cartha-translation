theological_decisions:
- issue: Potential confusion between מָשִׁיחַ here and the theological title 'Messiah/anointed
    one'
  chosen_reading: Rendered as the verbal idea 'anointed' in the phrase 'not anointed
    with oil,' referring to treatment of Saul's shield, not a messianic title.
  alternative_readings:
  - the shield of Saul, the anointed, with oil
  - the shield of Saul, not of one anointed with oil
  rationale: Although מָשִׁיחַ can denote 'anointed one,' the immediate collocation
    with בַּשָּׁמֶן strongly supports the ordinary sense of being anointed with oil.
    In context the line concerns the shield's condition in battle poetry, not a doctrinal
    or royal-messianic title. This avoids importing christological or royal-theological
    claims the text does not make.
  doctrine_reference: Translation philosophy §§1, 3
