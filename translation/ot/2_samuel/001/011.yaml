id: 2SA.1.11
reference: 2 Samuel 1:11
source:
  edition: WLC
  text: וַ/יַּחֲזֵ֥ק דָּוִ֛ד ב/בגד/ו וַ/יִּקְרָעֵ֑/ם וְ/גַ֥ם כָּל הָ/אֲנָשִׁ֖ים אֲשֶׁ֥ר
    אִתּֽ/וֹ־׃
translation:
  text: Then David took hold of his clothes and tore them, and so did all the men
    who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his garment'; English uses 'his clothes' to reflect the
      idiom naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲזֵק
  chosen: took hold of
  alternatives:
  - seized
  - grasped
  lexicon: HALOT
  rationale: The verb חזק in this idiom introduces the act of grasping one's garments
    before tearing them in mourning. 'Took hold of' is natural English and preserves
    the physical action without overinterpreting.
- source_word: בבגדו
  chosen: his clothes
  alternatives:
  - his garment
  - his robe
  lexicon: HALOT
  rationale: Though singular in form ('his garment'), English commonly uses the plural
    'clothes' in the idiom of tearing one's garments in grief. This reflects the mourning
    context and reads naturally while staying close to the Hebrew sense.
- source_word: ויקרעם
  chosen: tore them
  alternatives:
  - ripped them
  - tore it
  lexicon: HALOT
  rationale: The suffix is plural, matching the idiomatic English plural 'clothes.'
    'Tore' is the standard and dignified rendering for garment-rending in mourning
    contexts.
- source_word: וגם
  chosen: and so did
  alternatives:
  - and also
  - and
  lexicon: HALOT
  rationale: The conjunction plus additive particle extends David's action to the
    accompanying men. 'And so did' conveys the ellipsis smoothly in English better
    than a wooden 'and also'.
- source_word: כל האנשים
  chosen: all the men
  alternatives:
  - all the people
  - all the menfolk
  lexicon: HALOT
  rationale: האנשים is grammatically and semantically 'the men,' not a gender-neutral
    collective. This follows the project's gender-accurate policy.
- source_word: אשר אתו
  chosen: who were with him
  alternatives:
  - who were with David
  - who accompanied him
  lexicon: HALOT
  rationale: This relative clause identifies David's companions. 'Who were with him'
    is a direct and natural rendering of the Hebrew.
