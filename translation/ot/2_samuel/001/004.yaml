id: 2SA.1.4
reference: 2 Samuel 1:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֥י/ו דָּוִ֛ד מֶה הָיָ֥ה הַ/דָּבָ֖ר הַגֶּד נָ֣א לִ֑/י וַ֠/יֹּאמֶר
    אֲשֶׁר נָ֨ס הָ/עָ֜ם מִן הַ/מִּלְחָמָ֗ה וְ/גַם הַרְבֵּ֞ה נָפַ֤ל מִן הָ/עָם֙ וַ/יָּמֻ֔תוּ
    וְ/גַ֗ם שָׁא֛וּל וִ/יהוֹנָתָ֥ן בְּנ֖/וֹ מֵֽתוּ־־־־־־׃
translation:
  text: David said to him, “What happened? Please tell me.” He said, “The people fled
    from the battle, and many of the people also fell and died; and Saul and Jonathan
    his son are also dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What was the matter?' Literally, 'What was the thing?'
    reason: lexical_alternative
  - marker: b
    text: '''Fell'' is a common Hebrew battle expression for being struck down; the
      following ''and died'' makes the result explicit.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'Saul and Jonathan his son also died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה הָיָה הַדָּבָר
  chosen: What happened?
  alternatives:
  - What was the matter?
  - What was the thing?
  lexicon: HALOT
  rationale: The idiom literally asks 'What was the matter/thing?' but in context
    David is asking for the outcome or report of events. 'What happened?' is natural
    modern English and preserves the sense without unnecessary literalism.
- source_word: הַגֶּד נָא לִי
  chosen: Please tell me
  alternatives:
  - Tell me, please
  - Declare it to me, please
  lexicon: HALOT
  rationale: הגד is an imperative 'tell/report,' and נָא adds politeness or urgency.
    'Please tell me' captures both clearly in readable English.
- source_word: אֲשֶׁר נָס הָעָם מִן הַמִּלְחָמָה
  chosen: The people fled from the battle
  alternatives:
  - The people have fled from the battle
  - The troops fled from the fighting
  lexicon: HALOT
  rationale: נָס means 'fled.' הָעָם here refers to the fighting force/people collectively.
    'The people fled from the battle' is sufficiently literal and fits the narrative
    report.
- source_word: וְגַם הַרְבֵּה נָפַל מִן הָעָם
  chosen: and many of the people also fell
  alternatives:
  - and many of the people also were struck down
  - and also many from the people fell
  lexicon: HALOT
  rationale: הַרְבֵּה functions adverbially/substantivally for 'many.' נפל in battle
    context commonly means 'fall' = be killed/struck down. Retaining 'fell' preserves
    the Hebrew imagery, while the following 'and died' makes the meaning explicit.
- source_word: וַיָּמֻתוּ
  chosen: and died
  alternatives:
  - and are dead
  - and were killed
  lexicon: HALOT
  rationale: The verb explicitly states death in addition to 'fell.' Rendering both
    avoids collapsing two Hebrew verbs into one English expression.
- source_word: וְגַם שָׁאוּל וִיהוֹנָתָן בְּנוֹ מֵתוּ
  chosen: and Saul and Jonathan his son are also dead
  alternatives:
  - and Saul and Jonathan his son also died
  - and also Saul and Jonathan his son are dead
  lexicon: HALOT
  rationale: The final clause reports the climactic news. English often uses present
    stative 'are dead' for reported status, though Hebrew has a perfect/plural predicate.
    This reads naturally while preserving the force of the announcement. 'His son'
    is kept explicitly because the Hebrew includes it.
