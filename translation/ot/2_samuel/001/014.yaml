theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of מְשִׁיחַ in reference to Saul
  chosen_reading: the LORD’s anointed
  alternative_readings:
  - the LORD’s messiah
  - the LORD’s anointed one
  rationale: Although מְשִׁיחַ is cognate with 'Messiah,' in this historical narrative it refers to Saul's royal consecration rather than functioning as a developed messianic title. 'Anointed' preserves the Hebrew sense without importing later christological associations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles with attention to context'
