id: 2SA.1.14
reference: 2 Samuel 1:14
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלָ֖י/ו דָּוִ֑ד אֵ֚יךְ לֹ֣א יָרֵ֔אתָ לִ/שְׁלֹ֨חַ֙ יָֽדְ/ךָ֔ לְ/שַׁחֵ֖ת אֶת מְשִׁ֥יחַ יְהוָֽה־׃
translation:
  text: Then David said to him, “How were you not afraid to put out your hand to destroy Yahweh’s anointed?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why were you not afraid…?” The Hebrew אֵיךְ literally means “How?” and expresses shocked reproach.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the LORD’s anointed.” That is, the king consecrated by the LORD.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving the sequential force.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward pronominal prepositional phrase referring to the Amalekite messenger.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Why
  lexicon: HALOT
  rationale: 'Introduces an exclamatory challenge: ''How were you not afraid...?'' This preserves the Hebrew idiom of shocked reproach better than the more interpretive ''Why.'''
- source_word: יָרֵאתָ
  chosen: were you not afraid
  alternatives:
  - did you not fear
  lexicon: HALOT
  rationale: From ירא, denoting fear/awe. 'Were you not afraid' is idiomatic contemporary English and fits the rhetorical rebuke. 'Did you not fear' is more formal but less natural here.
- source_word: לִשְׁלֹחַ יָדְךָ
  chosen: to stretch out your hand
  alternatives:
  - to put forth your hand
  - to send your hand
  lexicon: HALOT
  rationale: This is a Hebrew idiom for taking action against someone, often violently. 'Stretch out your hand' preserves the idiom in clear English and echoes established biblical usage.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to kill
  - to ruin
  lexicon: HALOT
  rationale: שׁחת has a broader sense of destroying/corrupting than the narrower 'kill.' In this context it refers to lethal action, but 'destroy' best matches the lexical range while fitting the accusation.
- source_word: מְשִׁיחַ
  chosen: anointed
  alternatives:
  - messiah
  - anointed one
  lexicon: HALOT
  rationale: Here the term refers to Saul as the one consecrated by the LORD as king, not directly as a messianic title. 'Anointed' is concise and idiomatic in the construct phrase 'the LORD’s anointed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
