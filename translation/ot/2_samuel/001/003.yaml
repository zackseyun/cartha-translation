id: 2SA.1.3
reference: 2 Samuel 1:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ דָּוִ֔ד אֵ֥י מִ/זֶּ֖ה תָּב֑וֹא וַ/יֹּ֣אמֶר אֵלָ֔י/ו מִ/מַּחֲנֵ֥ה
    יִשְׂרָאֵ֖ל נִמְלָֽטְתִּי׃
translation:
  text: David said to him, “Where have you come from?” He said to him, “I have escaped
    from the camp of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “From where do you come?”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵי מִזֶּה
  chosen: Where
  alternatives:
  - From where
  lexicon: HALOT
  rationale: The idiom אֵי מִזֶּה asks about origin or source. In natural English,
    'Where have you come from?' best captures the sense, while 'From where' is a more
    formal alternative.
- source_word: תָּבוֹא
  chosen: have you come
  alternatives:
  - did you come
  - are you coming
  lexicon: HALOT
  rationale: 'Although formally an imperfect, in direct speech with the preceding
    interrogative it functions naturally as a present-perfect inquiry about completed
    movement: ''Where have you come from?'' This is idiomatic English and fits the
    narrative context.'
- source_word: מִמַּחֲנֵה יִשְׂרָאֵל
  chosen: from the camp of Israel
  alternatives:
  - from Israel’s camp
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp, especially a military encampment. 'The camp of
    Israel' preserves the Hebrew construction and the military setting.
- source_word: נִמְלָטְתִּי
  chosen: I have escaped
  alternatives:
  - I have fled
  - I slipped away
  - I have gotten away
  lexicon: HALOT
  rationale: The Niphal of מלט conveys escape or deliverance from danger. 'I have
    escaped' best reflects successful flight from a perilous situation without adding
    interpretive detail.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... said
  alternatives:
  - asked ... answered
  lexicon: HALOT
  rationale: The Hebrew repeats the common verb 'said' for both speakers. English
    could smooth this to 'asked' and 'answered,' but retaining 'said' more closely
    follows the source while remaining readable.
- source_word: דָּוִד
  chosen: David
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
