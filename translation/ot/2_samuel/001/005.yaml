id: 2SA.1.5
reference: 2 Samuel 1:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔ד אֶל הַ/נַּ֖עַר הַ/מַּגִּ֣יד ל֑/וֹ אֵ֣יךְ יָדַ֔עְתָּ כִּי
    מֵ֥ת שָׁא֖וּל וִ/יהֽוֹנָתָ֥ן בְּנֽ/וֹ־־׃
translation:
  text: Then David said to the young man who told him, “How do you know that Saul
    and Jonathan his son are dead?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is more formally
    literal but less idiomatic here.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the servant
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth or young man. In this context the messenger
    is an adult enough to report battlefield events, so 'young man' is the best contextual
    rendering.
- source_word: הַמַּגִּיד לוֹ
  chosen: who told him
  alternatives:
  - who was telling him
  - the one reporting to him
  - his informant
  lexicon: HALOT
  rationale: The participle functions attributively, identifying the young man as
    the one giving the report to David. 'Who told him' is smooth English and captures
    the reporting sense without overtranslating.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How is it that
  - By what means
  lexicon: HALOT
  rationale: אֵיךְ introduces David's question about the basis of the messenger's
    knowledge. Simple 'How' is both accurate and natural.
- source_word: יָדַעְתָּ
  chosen: do you know
  alternatives:
  - did you know
  - have you known
  lexicon: HALOT
  rationale: Although the Hebrew form is perfect, English idiom in direct discourse
    often uses the present for a current state of knowledge grounded in prior information.
    'How do you know' is the most natural rendering of the question in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what is known: ''that Saul and Jonathan
    his son are dead.'''
- source_word: מֵת
  chosen: are dead
  alternatives:
  - has died
  - died
  lexicon: HALOT
  rationale: The singular verb with compound subject is acceptable in Hebrew. English
    requires a plural predicate with the two named persons, so 'are dead' communicates
    the resulting state clearly.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The suffix refers to Saul, identifying Jonathan as Saul's son. The straightforward
    possessive should be retained in English.
- source_word: שָׁאוּל וִיהוֹנָתָן
  chosen: Saul and Jonathan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions, in
    keeping with project philosophy.
