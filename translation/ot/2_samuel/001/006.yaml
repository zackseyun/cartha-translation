id: 2SA.1.6
reference: 2 Samuel 1:6
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר הַ/נַּ֣עַר הַ/מַּגִּ֣יד ל֗/וֹ נִקְרֹ֤א נִקְרֵ֨יתִי֙ בְּ/הַ֣ר הַ/גִּלְבֹּ֔עַ
    וְ/הִנֵּ֥ה שָׁא֖וּל נִשְׁעָ֣ן עַל חֲנִית֑/וֹ וְ/הִנֵּ֥ה הָ/רֶ֛כֶב וּ/בַעֲלֵ֥י
    הַ/פָּרָשִׁ֖ים הִדְבִּקֻֽ/הוּ׀־׃
translation:
  text: And the young man who told him said, “I happened to be on Mount Gilboa, and
    behold, Saul was leaning on his spear, and behold, the chariots and the horsemen
    were closing in on him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I chanced to be on Mount Gilboa.” The Hebrew idiom intensifies the idea
      of accidental presence.
    reason: lexical_alternative
  - marker: b
    text: Or “the chariotry and the riders” or “the chariots and the cavalry.”
    reason: lexical_alternative
  - marker: c
    text: Or “had overtaken him” / “were pressing hard after him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth or young man; here it identifies the Amalekite
    messenger. 'Young man' is natural modern English and avoids the potentially misleading
    'boy' or status-laden 'servant'.
- source_word: הַמַּגִּיד לוֹ
  chosen: who told him
  alternatives:
  - who reported to him
  - the one informing him
  lexicon: HALOT
  rationale: The participle of נגד functions attributively, identifying the young
    man as the one giving the report to David. 'Who told him' is idiomatic and sufficiently
    precise in context.
- source_word: נִקְרֹא נִקְרֵיתִי
  chosen: I happened to be
  alternatives:
  - I chanced to be
  - I was summoned
  - I encountered by chance
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the idea of chance
    occurrence from קרה: ''I happened to happen upon / I chanced to be.'' ''I happened
    to be'' captures the idiom in readable English. ''I was summoned'' would derive
    from a different root/sense and does not fit the context.'
- source_word: בְּהַר הַגִּלְבֹּעַ
  chosen: on Mount Gilboa
  alternatives:
  - in the hill country of Gilboa
  lexicon: HALOT
  rationale: 'Standard geographic rendering: הַר with a named mountain is best translated
    ''Mount Gilboa.'' English idiom prefers ''on'' with mountains in narrative description.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing vivid attention to the scene. 'Behold'
    preserves the narrative force better than flattening it away, while remaining
    understandable in solemn literary English.
- source_word: נִשְׁעָן
  chosen: was leaning on
  alternatives:
  - was resting on
  - was supporting himself on
  lexicon: HALOT
  rationale: The Niphal participle of שען indicates physical support or reliance.
    'Was leaning on' is the most straightforward contextual rendering.
- source_word: חֲנִיתוֹ
  chosen: his spear
  alternatives:
  - his lance
  lexicon: HALOT
  rationale: חֲנִית is a spear/lance. 'Spear' is the more common and accessible English
    term and fits the military setting.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariotry
  - the chariot force
  lexicon: HALOT
  rationale: Though רֶכֶב can function collectively ('chariotry'), in English narrative
    'the chariots' communicates the military unit clearly and naturally.
- source_word: בַעֲלֵי הַפָּרָשִׁים
  chosen: the horsemen
  alternatives:
  - the riders
  - the cavalry
  lexicon: HALOT
  rationale: Literally 'masters/owners of the horses,' an idiom for mounted riders.
    'Horsemen' is the clearest equivalent in this context; 'cavalry' is somewhat more
    interpretive and institutional.
- source_word: הִדְבִּקֻהוּ
  chosen: were closing in on him
  alternatives:
  - overtook him
  - caught up with him
  - pressed hard after him
  lexicon: HALOT
  rationale: From דבק in the Hiphil, the sense is to catch up to, overtake, or press
    closely upon. Given the scene is still unfolding from the speaker's perspective,
    'were closing in on him' best conveys imminent pursuit rather than completed capture.
