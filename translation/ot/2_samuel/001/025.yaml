id: 2SA.1.25
reference: 2 Samuel 1:25
source:
  edition: WLC
  text: אֵ֚יךְ נָפְל֣וּ גִבֹּרִ֔ים בְּ/ת֖וֹךְ הַ/מִּלְחָמָ֑ה יְה֣וֹנָתָ֔ן עַל בָּמוֹתֶ֖י/ךָ
    חָלָֽל־׃
translation:
  text: How the mighty have fallen in the midst of the battle! Jonathan lies slain
    on your heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your high places.' The Hebrew can refer to elevated terrain; here it
      likely means the heights of Israel addressed poetically in the lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament, not a request for information. 'How'
    preserves the poetic force and echoes the refrain in this lament.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: The perfect verb in lament is naturally rendered in English as 'have
    fallen,' preserving the vivid, completed sense and matching the repeated refrain.
- source_word: גִבֹּרִים
  chosen: the mighty
  alternatives:
  - warriors
  - heroes
  lexicon: HALOT
  rationale: '''The mighty'' is the established and contextually fitting sense for
    גבורים here, conveying valiant fighters without over-specifying military rank.'
- source_word: בְּתוֹךְ הַמִּלְחָמָה
  chosen: in the midst of the battle
  alternatives:
  - in battle
  - in the middle of the fighting
  lexicon: HALOT
  rationale: בְּתוֹךְ adds the sense of being within the thick of the conflict; 'in
    the midst of the battle' preserves that nuance better than the flatter 'in battle.'
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention per project
    philosophy.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple locative preposition; 'on' is natural modern English.
- source_word: בָּמוֹתֶיךָ
  chosen: your heights
  alternatives:
  - your high places
  - your mountains
  lexicon: HALOT
  rationale: במות often denotes elevated places/heights. Here in David's lament over
    Saul and Jonathan, the 2ms suffix addresses the land/mountains of Israel poetically.
    'Your heights' is concise and preserves the elevated-terrain imagery without importing
    cultic overtones that 'high places' can carry.
- source_word: חָלָל
  chosen: lies slain
  alternatives:
  - slain
  - wounded
  - pierced through
  lexicon: HALOT
  rationale: The adjective/noun denotes one killed, a slain man. Rendering it predicatively
    as 'lies slain' produces idiomatic English and makes explicit the implied verbal
    force after the naming of Jonathan.
