theological_decisions:
- issue: Referent of the second person suffix in 'your heights'
  chosen_reading: A poetic address to Israel/the mountains of Israel rather than to
    Jonathan personally
  alternative_readings:
  - address to Jonathan's own heights
  rationale: Within David's lament, the landscape is personified and addressed. This
    reading best fits the broader context and avoids an awkward possessive tied directly
    to Jonathan. The translation keeps the Hebrew ambiguity minimal while remaining
    natural in English.
