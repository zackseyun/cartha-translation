id: 2SA.1.2
reference: 2 Samuel 1:2
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֗י וְ/הִנֵּה֩ אִ֨ישׁ בָּ֤א מִן הַֽ/מַּחֲנֶה֙
    מֵ/עִ֣ם שָׁא֔וּל וּ/בְגָדָ֣י/ו קְרֻעִ֔ים וַ/אֲדָמָ֖ה עַל רֹאשׁ֑/וֹ וַ/יְהִי֙ בְּ/בֹא֣/וֹ
    אֶל דָּוִ֔ד וַ/יִּפֹּ֥ל אַ֖רְצָ/ה וַ/יִּשְׁתָּֽחוּ׀־־־׃
translation:
  text: Now on the third day, behold, a man came from the camp, from Saul, with his
    clothes torn and dirt on his head. And when he came to David, he fell to the ground
    and bowed down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from being with Saul' / 'from Saul's side.' The Hebrew expression indicates
      association with Saul, not necessarily direct dispatch by Saul.
    reason: lexical_alternative
  - marker: b
    text: Literally 'earth on his head,' a conventional sign of grief or mourning.
    reason: cultural_note
  - marker: c
    text: Or 'prostrated himself.' The verb can denote an act of deep respect, submission,
      or homage depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introduces the next event in sequence. 'Now'
    preserves the discourse transition in readable modern English without archaic
    formula.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on the third day afterward
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'on the third day' is the natural formal
    equivalent.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: Marks a vivid narrative presentation. 'Behold' retains the deictic force
    better than 'suddenly,' which adds a nuance not explicit in the Hebrew.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an individual male. Per
    gender-accurate policy, 'a man' is preferred over the less specific 'someone'.
- source_word: בָּא
  chosen: came
  alternatives:
  - was coming
  - arrived
  lexicon: HALOT
  rationale: Qal participle in this narrative setting functions as the main predication
    after הִנֵּה; English simple past is the most natural rendering.
- source_word: מִן־הַמַּחֲנֶה
  chosen: from the camp
  alternatives:
  - from the army camp
  - from the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה commonly denotes a camp, especially a military encampment. 'The
    camp' is sufficient here, with the military setting inferred from context.
- source_word: מֵעִם שָׁאוּל
  chosen: from Saul
  alternatives:
  - from being with Saul
  - from Saul's side
  lexicon: HALOT
  rationale: The preposition with עִם can indicate association or proximity. In context
    the man is arriving from Saul's camp/side. 'From Saul' is concise English that
    preserves the association without overexplaining.
- source_word: וּבְגָדָיו קְרֻעִים
  chosen: with his clothes torn
  alternatives:
  - and his garments were torn
  - with his garments torn
  lexicon: HALOT
  rationale: This describes the man's mourning appearance. 'Clothes' is more accessible
    modern English than 'garments' while preserving the sense.
- source_word: וַאֲדָמָה עַל־רֹאשׁוֹ
  chosen: and dirt on his head
  alternatives:
  - and earth on his head
  - with dust on his head
  lexicon: HALOT
  rationale: אֲדָמָה is literally 'ground/earth/soil.' In this mourning context, 'dirt
    on his head' communicates the idiom naturally. 'Dust' is possible but less directly
    tied to the lexical item.
- source_word: בְּבֹאוֹ אֶל־דָּוִד
  chosen: when he came to David
  alternatives:
  - upon his coming to David
  - as he came to David
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב expresses temporal circumstance.
    'When he came to David' is idiomatic and accurate.
- source_word: וַיִּפֹּל אַרְצָה
  chosen: he fell to the ground
  alternatives:
  - he fell earthward
  - he threw himself to the ground
  lexicon: HALOT
  rationale: The verb plus directional form אַרְצָה indicates falling down to the
    ground. 'To the ground' is the natural English equivalent.
- source_word: וַיִּשְׁתָּחוּ
  chosen: and bowed down
  alternatives:
  - and prostrated himself
  - and paid homage
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration as an act of respect or submission.
    'Bowed down' preserves the action without prematurely specifying worship; 'paid
    homage' is interpretive.
