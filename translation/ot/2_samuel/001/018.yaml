id: 2SA.1.18
reference: 2 Samuel 1:18
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לְ/לַמֵּ֥ד בְּנֵֽי יְהוּדָ֖ה קָ֑שֶׁת הִנֵּ֥ה כְתוּבָ֖ה עַל סֵ֥פֶר
    הַ/יָּשָֽׁר־־׃
translation:
  text: 'and said that the sons of Judah should be taught “The Bow.” Behold, it is
    written in the Book of Jashar:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “and he said to teach the sons of Judah archery/bow-use.” The
      Hebrew קָשֶׁת can denote the weapon itself, but here it is commonly understood
      as the title or opening word of the lament.
    reason: lexical_alternative
  - marker: b
    text: “Book of Jashar” may also be rendered “Book of the Upright.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  - then he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר continues the narrative sequence. English can omit the
    explicit subject because it is supplied by context from the previous verse; 'and
    said' preserves the flow without overloading the line.
- source_word: לְלַמֵּד
  chosen: should be taught
  alternatives:
  - to teach
  - to train
  lexicon: HALOT
  rationale: 'The infinitive construct of למד with prefixed ל expresses purpose/content
    after ''said'': David ordered that Judah be taught. Rendering as passive English
    (''should be taught'') communicates the sense idiomatically better than a bare
    infinitive.'
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the men of Judah
  lexicon: HALOT
  rationale: A literal familial/national expression. 'Sons of Judah' preserves the
    Hebrew form and its gender-accurate wording better than flattening to 'people
    of Judah.'
- source_word: קָשֶׁת
  chosen: The Bow
  alternatives:
  - the bow
  - bow
  - archery
  lexicon: HALOT
  rationale: Likely the title or incipit of the lament/song, not merely the weapon
    or a command to teach archery. Capitalization and quotation marks signal a title
    in English while preserving the lexical form 'bow.'
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - indeed
  - look
  lexicon: HALOT
  rationale: Introduces an emphatic notice drawing attention to the written source.
    'Behold' is slightly elevated but still clear and matches the discourse function
    well.
- source_word: כְתוּבָה
  chosen: it is written
  alternatives:
  - it was written
  - written
  lexicon: HALOT
  rationale: Passive participial form used predicatively. Present English 'it is written'
    is idiomatic for citing a written source and fits the deictic force of הִנֵּה.
- source_word: עַל סֵפֶר
  chosen: in the Book of
  alternatives:
  - on the scroll of
  - upon the book of
  lexicon: HALOT
  rationale: Although על is literally 'on/upon,' with כתב and a document it idiomatically
    indicates inscription in a written work. 'In the Book of' is natural English and
    reflects the sense.
- source_word: הַיָּשָׁר
  chosen: Jashar
  alternatives:
  - the Upright One
  - the Book of the Upright
  lexicon: HALOT
  rationale: As part of a known source title, transliteration is preferable to a potentially
    misleading translation. The traditional title 'Book of Jashar' is widely recognized,
    while the lexical sense 'upright' is preserved in a footnote.
