id: 2SA.1.24
reference: 2 Samuel 1:24
source:
  edition: WLC
  text: בְּנוֹת֙ יִשְׂרָאֵ֔ל אֶל שָׁא֖וּל בְּכֶ֑ינָה הַ/מַּלְבִּֽשְׁ/כֶ֤ם שָׁנִי֙
    עִם עֲדָנִ֔ים הַֽ/מַּעֲלֶה֙ עֲדִ֣י זָהָ֔ב עַ֖ל לְבוּשְׁ/כֶֽן־־׃
translation:
  text: Daughters of Israel, weep over Saul, who clothed you in scarlet with luxuries,
    who put ornaments of gold on your clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with delights,' 'with finery,' or 'with ornaments' for the phrase 'with
      luxuries.'
    reason: lexical_alternative
  - marker: b
    text: Or 'gold jewelry' for 'ornaments of gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוֹת יִשְׂרָאֵל
  chosen: Daughters of Israel
  alternatives:
  - Women of Israel
  lexicon: HALOT
  rationale: A direct vocative address. 'Daughters' preserves the Hebrew idiom and
    poetic tone better than the more flattened 'women.'
- source_word: אֶל שָׁאוּל
  chosen: over Saul
  alternatives:
  - for Saul
  - concerning Saul
  lexicon: HALOT
  rationale: With verbs of lament, אֶל can mark the object of mourning. 'Over Saul'
    is idiomatic English for lamentation and fits the funeral-song context.
- source_word: בְּכֶינָה
  chosen: weep
  alternatives:
  - lament
  - cry
  lexicon: HALOT
  rationale: The imperative from קונן/related lament usage calls for mourning. 'Weep'
    is natural English and suits the poetic summons, while still conveying lamentation.
- source_word: הַמַּלְבִּשְׁכֶם
  chosen: who clothed you
  alternatives:
  - the one clothing you
  - who dressed you
  lexicon: HALOT
  rationale: The article + participle functions substantivally, referring back to
    Saul. 'Who clothed you' gives clear English relative-clause sense.
- source_word: שָׁנִי
  chosen: scarlet
  alternatives:
  - crimson
  - scarlet cloth
  lexicon: HALOT
  rationale: Standard rendering for the dyed fabric/color term. 'Scarlet' is concise
    and conventional in English Bible style without being archaic.
- source_word: עִם עֲדָנִים
  chosen: with luxuries
  alternatives:
  - with delights
  - with finery
  - with ornaments
  lexicon: HALOT
  rationale: עֲדָנִים denotes delights/luxurious adornment. 'With luxuries' best captures
    the sense of rich, pleasurable finery accompanying the scarlet clothing.
- source_word: הַמַּעֲלֶה
  chosen: who put
  alternatives:
  - who brought up
  - who placed
  lexicon: HALOT
  rationale: The participle from עלה here idiomatically means to put/place upon. 'Who
    put' is the clearest natural English in context.
- source_word: עֲדִי זָהָב
  chosen: ornaments of gold
  alternatives:
  - gold jewelry
  - gold adornment
  lexicon: HALOT
  rationale: עֲדִי is adornment/ornament/jewelry. 'Ornaments of gold' preserves the
    poetic register and the construct relationship.
- source_word: עַל לְבוּשְׁכֶן
  chosen: on your clothing
  alternatives:
  - on your garments
  - upon your dress
  lexicon: HALOT
  rationale: לְבוּשׁ is clothing/garment. 'On your clothing' is readable modern English
    and reflects the prepositional phrase straightforwardly.
