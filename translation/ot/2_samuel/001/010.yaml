theological_decisions:
- issue: Narrative claim about Saul's death
  chosen_reading: 'Translate the Amalekite''s speech straightforwardly as his own
    report: he says he killed Saul.'
  alternative_readings:
  - Harmonize with 1 Samuel 31 by softening the statement as a boast or false claim
    in the translation
  rationale: The verse presents direct speech and should be translated according to
    what the speaker claims, without importing harmonization from the broader narrative
    into the wording itself. Any tension with 1 Samuel 31 is interpretive, not something
    to resolve in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
