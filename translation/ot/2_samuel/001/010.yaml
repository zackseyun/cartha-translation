id: 2SA.1.10
reference: 2 Samuel 1:10
source:
  edition: WLC
  text: וָ/אֶעֱמֹ֤ד עָלָי/ו֙ וַ/אֲמֹ֣תְתֵ֔/הוּ כִּ֣י יָדַ֔עְתִּי כִּ֛י לֹ֥א יִֽחְיֶ֖ה
    אַחֲרֵ֣י נִפְל֑/וֹ וָ/אֶקַּ֞ח הַ/נֵּ֣זֶר אֲשֶׁ֣ר עַל רֹאשׁ֗/וֹ וְ/אֶצְעָדָה֙ אֲשֶׁ֣ר
    עַל זְרֹע֔/וֹ וָ/אֲבִיאֵ֥/ם אֶל אֲדֹנִ֖/י הֵֽנָּה׀־־־׃
translation:
  text: So I stood over him and put him to death, because I knew that he would not
    live after he had fallen. Then I took the crown that was on his head and the armlet
    that was on his arm, and I have brought them here to my lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bracelet.' The Hebrew term refers to an ornament worn on the arm.
    reason: lexical_alternative
  - marker: b
    text: This is the Amalekite's report to David. Compare 1 Samuel 31:4–5 for the
      earlier account of Saul's death.
    reason: cross_reference
lexical_decisions:
- source_word: וָאֶעֱמֹד עָלָיו
  chosen: So I stood over him
  alternatives:
  - I stood upon him
  - I came and stood over him
  lexicon: HALOT
  rationale: עמד with על in this context is best rendered 'stood over him,' describing
    the Amalekite's position over Saul's fallen body. 'Upon him' is too literal and
    awkward in English.
- source_word: וַאֲמֹתְתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - finished him off
  lexicon: HALOT
  rationale: 'The Hiphil/causative sense of מות here is explicit: the speaker caused
    Saul''s death. ''Put him to death'' is slightly more formal and fits the gravity
    of the report better than the blunter ''killed him.'''
- source_word: כִּי יָדַעְתִּי כִּי לֹא יִחְיֶה
  chosen: because I knew that he would not live
  alternatives:
  - for I knew that he could not survive
  - because I knew he would not remain alive
  lexicon: HALOT
  rationale: This preserves the double כִּי structure naturally in English while keeping
    the speaker's stated rationale. 'Would not live' is a straightforward rendering
    of לא יחיה.
- source_word: אַחֲרֵי נִפְלוֹ
  chosen: after he had fallen
  alternatives:
  - after his fall
  - after he fell
  lexicon: HALOT
  rationale: The infinitive/nominal construction from נפל is most naturally represented
    temporally. 'After he had fallen' conveys prior completed action relative to the
    killing.
- source_word: הַנֵּזֶר
  chosen: the crown
  alternatives:
  - the diadem
  lexicon: HALOT
  rationale: נזר here refers to the royal headpiece. 'Crown' is the clearest modern
    English equivalent; 'diadem' is possible but less accessible.
- source_word: וְאֶצְעָדָה
  chosen: the armlet
  alternatives:
  - the bracelet
  lexicon: HALOT
  rationale: The item is worn on the arm (על זרעו), so 'armlet' fits the immediate
    context more precisely than the traditional 'bracelet,' which can suggest the
    wrist specifically.
- source_word: זְרֹעוֹ
  chosen: his arm
  alternatives:
  - his forearm
  lexicon: HALOT
  rationale: זרוע normally means 'arm.' Nothing in the verse requires the narrower
    'forearm.'
- source_word: וָאֲבִיאֵם
  chosen: I have brought them
  alternatives:
  - I brought them
  lexicon: HALOT
  rationale: 'The Hebrew wayyiqtol is past narrative, but in direct speech followed
    by הֵנָּה (''here''), English present perfect sounds natural: the items have now
    been delivered into David''s presence.'
- source_word: אֶל אֲדֹנִי
  chosen: to my lord
  alternatives:
  - to my master
  lexicon: HALOT
  rationale: אדני here is a human superior, David, not the divine title. 'My lord'
    preserves the deferential courtly address better than 'my master' in this narrative
    setting.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - to this place
  lexicon: HALOT
  rationale: The adverb points to the speaker's present location. 'Here' is idiomatic
    and sufficient.
