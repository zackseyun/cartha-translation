id: 2SA.1.19
reference: 2 Samuel 1:19
source:
  edition: WLC
  text: הַ/צְּבִי֙ יִשְׂרָאֵ֔ל עַל בָּמוֹתֶ֖י/ךָ חָלָ֑ל אֵ֖יךְ נָפְל֥וּ גִבּוֹרִֽים־׃
translation:
  text: Your glory, O Israel, lies slain on your heights! How the mighty have fallen!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צְבִי may also be rendered 'beauty' or 'splendor'; some take it more
      concretely as 'gazelle.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your high places.' Here 'heights' is chosen to preserve the topographical
      sense without implying cultic high places.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּבִי
  chosen: Your glory
  alternatives:
  - The beauty
  - The gazelle/deer
  lexicon: HALOT, BDB
  rationale: צְבִי can denote beauty, splendor, or glory, and in some contexts a gazelle/deer.
    Here, in a lament over Saul and Jonathan and in apposition with 'Israel,' the
    figurative sense of national splendor/glory best fits the poetic context. 'Your
    glory' also works naturally with the following second masculine singular suffix
    on 'your heights,' addressing Israel directly.
- source_word: יִשְׂרָאֵל
  chosen: O Israel
  alternatives:
  - Israel
  rationale: The proper name is transliterated. The vocative force is brought out
    in English with 'O' because the verse addresses Israel directly in lament.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT, BDB
  rationale: 'The preposition straightforwardly indicates location: the slain one
    lies on Israel''s heights.'
- source_word: בָּמוֹתֶיךָ
  chosen: your heights
  alternatives:
  - your high places
  - your hills
  lexicon: HALOT, BDB
  rationale: בָּמוֹת often means high places/heights. 'Your heights' preserves the
    poetic and topographical sense without importing the cultic associations that
    'high places' often carries elsewhere.
- source_word: חָלָל
  chosen: lies slain
  alternatives:
  - slain
  - wounded
  - pierced
  lexicon: HALOT, BDB
  rationale: The adjective/noun denotes one slain. Rendering it predicatively as 'lies
    slain' produces idiomatic English while preserving the state of being killed.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  lexicon: HALOT, BDB
  rationale: Introduces the exclamatory lament refrain. 'How' is the standard and
    natural English equivalent in dirge style.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT, BDB
  rationale: 'The perfect in this lament is well rendered in English with present
    relevance: ''have fallen.'' This also preserves the familiar refrain structure
    in the poem.'
- source_word: גִבּוֹרִים
  chosen: the mighty
  alternatives:
  - warriors
  - heroes
  lexicon: HALOT, BDB
  rationale: גִבּוֹרִים can mean mighty men, warriors, or heroes. 'The mighty' preserves
    the poetic breadth and matches the refrain repeated in this lament.
