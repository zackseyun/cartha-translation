id: 2SA.1.9
reference: 2 Samuel 1:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י עֲמָד נָ֤א עָלַ/י֙ וּ/מֹ֣תְתֵ֔/נִי כִּ֥י אֲחָזַ֖/נִי הַ/שָּׁבָ֑ץ
    כִּֽי כָל ע֥וֹד נַפְשִׁ֖/י בִּֽ/י־־־׃
translation:
  text: And he said to me, ‘Please stand over me and kill me, for anguish has seized
    me, though my life is still in me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for cramps/convulsions have seized me'; the Hebrew term translated 'anguish'
      is rare and its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for all my life/soul is still in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמָד נָא עָלַי
  chosen: Please stand over me
  alternatives:
  - Stand by me
  - Come stand over me
  lexicon: HALOT
  rationale: עָמַד means 'stand'; with עַל in this context it naturally conveys taking
    a position over someone who is fallen or wounded. 'Please' reflects נָא as a polite
    entreaty.
- source_word: וּמֹתְתֵנִי
  chosen: and kill me
  alternatives:
  - and put me to death
  - and finish me off
  lexicon: HALOT
  rationale: The Hiphil/causative sense from מות here is a direct request to cause
    death. 'Kill me' is the most natural modern English and fits the battlefield context
    without euphemism.
- source_word: אֲחָזַנִי
  chosen: has seized me
  alternatives:
  - has taken hold of me
  - has gripped me
  lexicon: HALOT
  rationale: אָחַז commonly means 'grasp, seize.' 'Has seized me' preserves the sudden
    overpowering force of Saul's condition.
- source_word: הַשָּׁבָץ
  chosen: anguish
  alternatives:
  - cramps
  - convulsions
  - dizziness
  lexicon: HALOT
  rationale: הַשָּׁבָץ is rare and uncertain. Traditional 'anguish' fits the immediate
    plea for death and avoids overprecision where the Hebrew term is debated. More
    physiological options are preserved in a footnote.
- source_word: כִּי כָל עוֹד נַפְשִׁי בִּי
  chosen: though my life is still in me
  alternatives:
  - for all my life is still in me
  - for I am still fully alive
  - for my soul is still in me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to animating life rather than the immaterial soul
    in a technical sense. 'Life is still in me' is idiomatic English and matches the
    sense that he remains alive despite mortal injury. 'Though' captures the concessive
    force in context, even though כִּי is formally causal.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  lexicon: HALOT
  rationale: A straightforward narrative wayyiqtol introducing the reported speech;
    'And he said to me' preserves the Hebrew sequence cleanly.
