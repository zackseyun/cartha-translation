id: 2SA.1.7
reference: 2 Samuel 1:7
source:
  edition: WLC
  text: וַ/יִּ֥פֶן אַחֲרָ֖י/ו וַ/יִּרְאֵ֑/נִי וַ/יִּקְרָ֣א אֵלָ֔/י וָ/אֹמַ֖ר הִנֵּֽ/נִי׃
translation:
  text: He turned behind him and saw me, and he called to me, and I said, “Here I
    am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'He turned behind him.' The expression means he turned
      and looked to his rear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: He turned
  alternatives:
  - He looked around
  - He turned himself
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol form denotes turning or facing. 'He turned'
    is the most direct and natural rendering in context.
- source_word: אַחֲרָיו
  chosen: behind him
  alternatives:
  - backward
  - to his rear
  lexicon: HALOT
  rationale: The prepositional form from אַחַר with 3ms suffix literally means 'behind
    him/after him.' 'Behind him' preserves the spatial sense without overinterpreting
    the motion.
- source_word: וַיִּרְאֵנִי
  chosen: and saw me
  alternatives:
  - and looked at me
  lexicon: HALOT
  rationale: ראה with 1cs suffix straightforwardly means 'saw me.' 'Looked at me'
    is possible but slightly weaker than the simple narrative verb.
- source_word: וַיִּקְרָא אֵלַי
  chosen: and he called to me
  alternatives:
  - and he called out to me
  - and he summoned me
  lexicon: HALOT
  rationale: קרא plus אֶל commonly means to call to someone. 'Called to me' fits the
    narrative setting and avoids the stronger implication of 'summoned.'
- source_word: וָאֹמַר
  chosen: and I said
  alternatives:
  - and I answered
  lexicon: HALOT
  rationale: The verb אמר normally means 'say.' Although 'answered' would fit the
    discourse context, 'said' stays closer to the Hebrew and remains natural English.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - At your service
  - Yes?
  lexicon: HALOT
  rationale: הִנֵּנִי is the conventional self-presenting response 'Here I am.' This
    preserves the idiomatic force and biblical resonance without paraphrase.
