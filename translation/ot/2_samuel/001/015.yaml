id: 2SA.1.15
reference: 2 Samuel 1:15
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א דָוִ֗ד לְ/אַחַד֙ מֵֽ/הַ/נְּעָרִ֔ים וַ/יֹּ֖אמֶר גַּ֣שׁ פְּגַע
    בּ֑/וֹ וַ/יַּכֵּ֖/הוּ וַ/יָּמֹֽת־׃
translation:
  text: Then David called one of the young men and said, “Come near; strike him down.”
    So he struck him, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “attack him” / “fall upon him” for “strike him down” (פְּגַע בּוֹ). The
      Hebrew verb can denote violent assault more generally; here the context makes
      the lethal outcome clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call or summon someone.
    'Called' is natural modern English and preserves the straightforward action without
    overstating formality.
- source_word: לְאַחַד מֵהַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one of the servants
  - one of the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths, servants, or attendants depending on context.
    Here it refers to members of David's retinue. 'Young men' is the most direct lexical
    rendering; alternatives are possible by function, but the Hebrew term itself is
    age/status language rather than a technical office title.
- source_word: גַּשׁ
  chosen: Come near
  alternatives:
  - Approach
  - Come here
  lexicon: HALOT
  rationale: The imperative נגשׁ commonly means to come near or approach. 'Come near'
    fits the immediate command sequence and sounds natural in English.
- source_word: פְּגַע בּוֹ
  chosen: strike him down
  alternatives:
  - attack him
  - fall upon him
  - kill him
  lexicon: HALOT
  rationale: פגע with ב can mean to strike, attack, or fall upon. In this execution
    context, the command is clearly lethal, but the verb itself is not the ordinary
    explicit verb 'kill.' 'Strike him down' preserves the violent force and implied
    result without overtranslating to the more interpretive 'kill him.'
- source_word: וַיַּכֵּהוּ
  chosen: he struck him
  alternatives:
  - he attacked him
  - he killed him
  lexicon: HALOT
  rationale: נכה is the common verb 'to strike/smite.' Since the following clause
    states the result ('and he died'), rendering it simply as 'he struck him' preserves
    the Hebrew sequence and avoids collapsing action and result into one English verb.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: מות is the standard verb 'to die.' The waw-consecutive continues the
    narrative sequence. 'And he died' is the most transparent rendering.
