theological_decisions:
- issue: Interpretation of David's comparison to 'the love of women'
  chosen_reading: Retain the literal comparative statement without specifying sexual,
    romantic, or merely platonic categories.
  alternative_readings:
  - Jonathan's covenantal friendship exceeded heterosexual romantic love
  - Jonathan's loyal affection exceeded the affection commonly shown by women
  - The statement is poetic lament and should not be pressed into a modern category
  rationale: The Hebrew text praises Jonathan's love as surpassing 'the love of women'
    but does not explicitly define the category of that love. To preserve theological
    and interpretive tension, the translation remains literal and does not import
    a modern sexualized or desexualized reading into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
