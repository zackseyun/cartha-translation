id: 2SA.1.26
reference: 2 Samuel 1:26
source:
  edition: WLC
  text: צַר לִ֣/י עָלֶ֗י/ךָ אָחִ/י֙ יְה֣וֹנָתָ֔ן נָעַ֥מְתָּ לִּ֖/י מְאֹ֑ד נִפְלְאַ֤תָה
    אַהֲבָֽתְ/ךָ֙ לִ֔/י מֵ/אַהֲבַ֖ת נָשִֽׁים־׃
translation:
  text: I am distressed over you, my brother Jonathan; you were very pleasant to me.
    Your love to me was wonderful, beyond the love of women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more than the love of women' or 'surpassing women's love.' The Hebrew
      comparison is poetic and does not itself specify the exact nature of the comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי עָלֶיךָ
  chosen: I am distressed over you
  alternatives:
  - I am in anguish because of you
  - I grieve for you
  lexicon: HALOT
  rationale: The predicate adjective/verb conveys personal distress or anguish. 'Distressed'
    is natural modern English and preserves the lament tone without over-paraphrasing.
    'Over you' reflects עַל in a lament context.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - my kinsman
  - my friend
  lexicon: HALOT
  rationale: Literal 'my brother' is retained. In context it expresses covenantal
    closeness as well as familial-style affection, but the text itself says 'brother,'
    so the translation preserves that wording.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: נָעַמְתָּ לִּי מְאֹד
  chosen: you were very pleasant to me
  alternatives:
  - you were very dear to me
  - you were exceedingly delightful to me
  lexicon: HALOT
  rationale: The verb conveys pleasantness, delightfulness, or agreeableness. 'Pleasant'
    is the most direct lexical match, though somewhat formal; it preserves the source
    sense without importing romantic connotations. 'Very' renders מְאֹד straightforwardly.
- source_word: נִפְלְאָתָה
  chosen: was wonderful
  alternatives:
  - was extraordinary
  - surpassed
  lexicon: HALOT
  rationale: The verb denotes something extraordinary or marvelous. 'Was wonderful'
    is idiomatic with 'your love' as subject and preserves the evaluative force.
- source_word: אַהֲבָתְךָ לִי
  chosen: Your love to me
  alternatives:
  - Your love for me
  lexicon: HALOT
  rationale: The noun is the standard word for 'love.' 'To me' follows the Hebrew
    preposition closely; 'for me' is possible in English, but 'to me' preserves the
    source structure and remains understandable.
- source_word: מֵאַהֲבַת נָשִׁים
  chosen: beyond the love of women
  alternatives:
  - more than the love of women
  - surpassing women's love
  lexicon: HALOT
  rationale: The comparative מִן is rendered 'beyond' to express surpassing comparison.
    'The love of women' is kept literal and general, avoiding interpretive narrowing
    such as 'the love women give' versus 'love for women.'
