id: 2SA.3.13
reference: 2 Samuel 3:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ט֔וֹב אֲנִ֕י אֶכְרֹ֥ת אִתְּ/ךָ֖ בְּרִ֑ית אַ֣ךְ דָּבָ֣ר אֶחָ֡ד
    אָנֹכִי֩ שֹׁאֵ֨ל מֵ/אִתְּ/ךָ֤ לֵ/אמֹר֙ לֹא תִרְאֶ֣ה אֶת פָּנַ֔/י כִּ֣י אִם לִ/פְנֵ֣י
    הֱבִיאֲ/ךָ֗ אֵ֚ת מִיכַ֣ל בַּת שָׁא֔וּל בְּ/בֹאֲ/ךָ֖ לִ/רְא֥וֹת אֶת פָּנָֽ/י־־׀־־־׃ס
translation:
  text: 'He said, “Good. I will make a covenant with you. Only I ask one thing of
    you: You shall not see my face unless you first bring Michal, Saul’s daughter,
    when you come to see my face.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall not appear before me unless you first bring Michal, Saul’s
      daughter, when you come to appear before me.” The Hebrew literally says, “see
      my face.”
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Good
  alternatives:
  - Very well
  - Agreed
  lexicon: HALOT
  rationale: Used as a brief assent to Abner’s proposal. 'Good' preserves the concise
    Hebrew response without overexpanding it.
- source_word: אֶכְרֹת ... בְּרִית
  chosen: I will make a covenant
  alternatives:
  - I will cut a covenant
  - I will make an agreement
  lexicon: HALOT
  rationale: Hebrew idiom literally 'cut a covenant.' 'Make a covenant' is natural
    English while preserving the formal covenantal sense better than the weaker 'agreement.'
- source_word: אַךְ דָּבָר אֶחָד
  chosen: Only ... one thing
  alternatives:
  - However, one matter
  - But one word/thing
  lexicon: HALOT
  rationale: Conveys restriction or exception. 'Only ... one thing' is idiomatic and
    reflects David’s single condition.
- source_word: שֹׁאֵל מֵאִתְּךָ
  chosen: I ask ... of you
  alternatives:
  - I request from you
  - I require of you
  lexicon: HALOT
  rationale: The participle with pronoun expresses a present request. 'Ask of you'
    is straightforward and does not overstate the force as 'require' might.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  - namely
  lexicon: HALOT
  rationale: Rendered by punctuation in English because it introduces the content
    of the request naturally without needing the explicit 'saying.'
- source_word: לֹא תִרְאֶה אֶת פָּנַי
  chosen: You shall not see my face
  alternatives:
  - You may not see me
  - You shall not appear before me
  lexicon: HALOT
  rationale: The Hebrew idiom 'see my face' is retained because it is clear in English
    and preserves the personal/courtly nuance of audience before David.
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - but only if
  lexicon: HALOT
  rationale: Best captures the exceptive conditional force in smooth English.
- source_word: לִפְנֵי הֱבִיאֲךָ
  chosen: you first bring
  alternatives:
  - before your bringing
  - before you bring
  lexicon: HALOT
  rationale: The construction marks prior condition. 'You first bring' makes the temporal
    priority explicit and idiomatic.
- source_word: מִיכַל בַּת שָׁאוּל
  chosen: Michal, Saul’s daughter
  alternatives:
  - Michal the daughter of Saul
  lexicon: HALOT
  rationale: Standard English appositional rendering of the Hebrew identification.
- source_word: בְּבֹאֲךָ לִרְאוֹת אֶת פָּנָי
  chosen: when you come to see my face
  alternatives:
  - when you come to see me
  - upon your coming to see my face
  lexicon: HALOT
  rationale: Retains the repeated 'see my face' wording from the Hebrew for emphasis
    and cohesion, while remaining readable.
