theological_decisions:
- issue: Interpretation of Abner's rhetorical question לְמִי אָרֶץ
  chosen_reading: 'Retained as a direct rhetorical question about rightful possession/rule:
    ''Whose is the land?'''
  alternative_readings:
  - Treated as an assertion implying 'The land is mine to give'
  - Expanded dynamically to 'Who should rule the land?'
  rationale: The Hebrew is concise and somewhat elliptical. Preserving the rhetorical
    question maintains the political tension without over-resolving Abner's exact
    nuance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
