id: 2SA.3.12
reference: 2 Samuel 3:12
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ אַבְנֵ֨ר מַלְאָכִ֧ים אֶל דָּוִ֛ד תחת/ו לֵ/אמֹ֖ר לְ/מִי אָ֑רֶץ
    לֵ/אמֹ֗ר כָּרְתָ֤/ה בְרִֽיתְ/ךָ֙ אִתִּ֔/י וְ/הִנֵּה֙ יָדִ֣/י עִמָּ֔/ךְ לְ/הָסֵ֥ב
    אֵלֶ֖י/ךָ אֶת כָּל יִשְׂרָאֵֽל׀־־־־׃
translation:
  text: Then Abner sent messengers to David on his behalf, saying, “Whose is the land?”
    saying, “Make your covenant with me, and behold, my hand is with you to bring
    all Israel over to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “To whom does the land belong?” The Hebrew is terse and may imply a
      claim about rightful rule.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: “my hand is with you,” an idiom expressing support or power on
      David’s side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תחתו
  chosen: on his behalf
  alternatives:
  - in his place
  - under him
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix here idiomatically indicates
    agency/representation in sending the messengers. 'On his behalf' is natural English
    and fits the context better than a more literal but opaque 'under him' or 'in
    his place'.
- source_word: לְמִי אָרֶץ
  chosen: Whose is the land?
  alternatives:
  - To whom does the land belong?
  - Whose land is it?
  lexicon: HALOT
  rationale: This terse clause is best taken as a rhetorical question about rightful
    rule over the kingdom/land. 'Whose is the land?' preserves the compactness and
    ambiguity of the Hebrew better than a more interpretive expansion.
- source_word: כָּרְתָה בְרִיתְךָ אִתִּי
  chosen: Make your covenant with me
  alternatives:
  - Cut your covenant with me
  - Make a covenant with me
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' 'Make your covenant
    with me' preserves the 2ms suffix on 'your covenant' reflected in the Hebrew form,
    while remaining readable English. 'Cut' is more formal-literal but less natural
    in modern English.
- source_word: וְהִנֵּה יָדִי עִמָּךְ
  chosen: and behold, my hand is with you
  alternatives:
  - and look, my hand is with you
  - and I am with you
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'hand' as an idiom for power/support. Retaining
    'my hand is with you' preserves the metaphor and political force better than flattening
    it to merely 'I am with you.'
- source_word: לְהָסֵב אֵלֶיךָ
  chosen: to bring ... over to you
  alternatives:
  - to turn ... to you
  - to transfer ... to you
  lexicon: HALOT
  rationale: הסב in this context conveys causing allegiance to shift. 'Bring ... over
    to you' is idiomatic English for political realignment and avoids over-literal
    awkwardness while preserving the directional sense.
- source_word: אֶת כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering for the collective national entity; context indicates
    the tribes/kingdom rather than merely individuals.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this political setting the word refers to human emissaries, not angels.
    'Messengers' is the broad default; 'envoys' is possible but slightly more interpretive.
