id: 2SA.3.29
reference: 2 Samuel 3:29
source:
  edition: WLC
  text: יָחֻ֨לוּ֙ עַל רֹ֣אשׁ יוֹאָ֔ב וְ/אֶ֖ל כָּל בֵּ֣ית אָבִ֑י/ו וְֽ/אַל יִכָּרֵ֣ת
    מִ/בֵּ֣ית יוֹאָ֡ב זָ֠ב וּ/מְצֹרָ֞ע וּ/מַחֲזִ֥יק בַּ/פֶּ֛לֶךְ וְ/נֹפֵ֥ל בַּ/חֶ֖רֶב
    וַ/חֲסַר לָֽחֶם־־־־׃
translation:
  text: May it fall on the head of Joab and on all his father’s house, and may there
    never be cut off from the house of Joab one who has a discharge, or is leprous,
    or holds a spindle, or falls by the sword, or lacks bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, “has a defiling skin disease.” The Hebrew term traditionally
      rendered “leprous” can refer to a range of serious skin conditions.
    reason: lexical_alternative
  - marker: b
    text: Or “holds a distaff”; some understand the phrase as “leans on a staff.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחֻלוּ
  chosen: May it fall
  alternatives:
  - May they fall
  - May it whirl/rest
  lexicon: HALOT
  rationale: In context this is an imprecatory wish referring back to the bloodguilt/culpability
    of Abner's death in the previous verse; idiomatically with עַל רֹאשׁ it means
    'fall upon' someone's head. Singular 'it' captures the implied guilt/curse better
    than a wooden plural.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard Hebrew idiom for guilt or retribution coming upon someone personally.
- source_word: בֵּית אָבִיו
  chosen: his father’s house
  alternatives:
  - his ancestral house
  - his family line
  lexicon: HALOT
  rationale: Retains the familial-household sense without over-paraphrase.
- source_word: אַל יִכָּרֵת מִבֵּית יוֹאָב
  chosen: may there never be cut off from the house of Joab
  alternatives:
  - let there not fail from the house of Joab
  - may none be lacking from the house of Joab
  lexicon: HALOT
  rationale: 'Niphal of כרת here expresses cessation/removal from a family line in
    the negative: David wishes that such afflictions never cease from Joab''s house.
    ''Cut off'' preserves the Hebrew force and curse formula.'
- source_word: זָב
  chosen: one who has a discharge
  alternatives:
  - one with a bodily discharge
  - one with an issue
  lexicon: HALOT
  rationale: Refers to a chronic bodily discharge, likely cultically unclean. Modern
    English 'discharge' is clear and avoids archaic 'issue'.
- source_word: מְצֹרָע
  chosen: is leprous
  alternatives:
  - has a skin disease
  - has a defiling skin disease
  lexicon: HALOT
  rationale: Traditional 'leprous' is concise and recognizable, though the Hebrew
    term can cover a broader range than modern Hansen's disease. A footnote preserves
    the broader sense.
- source_word: מַחֲזִיק בַּפֶּלֶךְ
  chosen: holds a spindle
  alternatives:
  - leans on a staff
  - holds a distaff
  lexicon: HALOT
  rationale: פֶּלֶךְ most naturally denotes a spindle/distaff. The phrase likely describes
    one reduced to women's work or physical incapacity, but the translation should
    preserve the concrete image rather than interpret it. Because 'staff' is a known
    alternative in some traditions, it is preserved in a footnote.
- source_word: נֹפֵל בַּחֶרֶב
  chosen: falls by the sword
  alternatives:
  - is slain by the sword
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom and solemn cadence of the curse list.
- source_word: חֲסַר לָחֶם
  chosen: lacks bread
  alternatives:
  - lacks food
  - is needy for bread
  lexicon: HALOT
  rationale: Bread here stands metonymically for sustenance, but 'lacks bread' preserves
    the Hebrew image and remains understandable in English.
