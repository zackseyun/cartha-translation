theological_decisions:
- issue: Nature of David's statement
  chosen_reading: An imprecatory wish/curse directed against Joab's house
  alternative_readings:
  - A predictive statement of what will happen
  rationale: The jussive/imprecatory syntax ('may it fall,' 'may there never be cut
    off') is best represented as a wish-prayer of judgment rather than a bare prediction.
