id: 2SA.3.22
reference: 2 Samuel 3:22
source:
  edition: WLC
  text: וְ/הִנֵּה֩ עַבְדֵ֨י דָוִ֤ד וְ/יוֹאָב֙ בָּ֣א מֵֽ/הַ/גְּד֔וּד וְ/שָׁלָ֥ל רָ֖ב
    עִמָּ֣/ם הֵבִ֑יאוּ וְ/אַבְנֵ֗ר אֵינֶ֤/נּוּ עִם דָּוִד֙ בְּ/חֶבְר֔וֹן כִּ֥י שִׁלְּח֖/וֹ
    וַ/יֵּ֥לֶךְ בְּ/שָׁלֽוֹם־׃
translation:
  text: And look, David’s servants and Joab came in from a raid and brought much plunder
    with them. But Abner was not with David in Hebron, because he had sent him away,
    and he had gone in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the raiding party.' The Hebrew גְּדוּד can refer to a troop or
      band; here 'raid' is chosen because the next clause mentions plunder.
    reason: lexical_alternative
  - marker: b
    text: Literally 'went in peace,' an idiom meaning he departed safely and on good
      terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now behold
  lexicon: HALOT
  rationale: Introduces a vivid narrative development. 'And look' preserves the deictic
    force in readable modern English better than the more archaic 'behold.'
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - David’s men
  - David’s servants/slaves
  lexicon: HALOT
  rationale: עֶבֶד here refers to retainers or officials in David’s service, not necessarily
    emphasizing chattel bondage. 'Servants' fits the military-court context better
    than 'slaves,' while remaining closer to the Hebrew than the looser 'men.'
- source_word: וְיוֹאָב
  chosen: and Joab
  rationale: Personal name transliterated per project philosophy; conjunction retained.
- source_word: בָּא
  chosen: came in
  alternatives:
  - came
  - arrived
  lexicon: HALOT
  rationale: Although morphologically singular, the verb functions with the compound
    subject 'David’s servants and Joab.' 'Came in' reflects motion back to the narrative
    setting and reads naturally in English.
- source_word: מֵהַגְּדוּד
  chosen: from a raid
  alternatives:
  - from the raiding party
  - from the troop
  - from the band
  lexicon: HALOT
  rationale: גְּדוּד can denote a troop/band, often in raiding context. Here the following
    mention of plunder makes 'from a raid' the clearest contextual rendering.
- source_word: וְשָׁלָל רָב
  chosen: much plunder
  alternatives:
  - great spoil
  - abundant plunder
  lexicon: HALOT
  rationale: Standard military term for goods taken in conflict. 'Plunder' is modern
    and clear; 'much' reflects רָב straightforwardly.
- source_word: עִמָּם הֵבִיאוּ
  chosen: brought with them
  alternatives:
  - they brought with them
  lexicon: HALOT
  rationale: English can leave the subject implicit because it is clear from context.
    The phrase preserves the sense that the returning party carried the plunder back.
- source_word: וְאַבְנֵר אֵינֶנּוּ עִם דָּוִד בְּחֶבְרוֹן
  chosen: But Abner was not with David in Hebron
  alternatives:
  - And Abner was not with David at Hebron
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively as 'But' because the clause
    contrasts Abner’s absence with the arrival of Joab and David’s servants. 'In Hebron'
    is a natural rendering of the locative phrase.
- source_word: כִּי שִׁלְּחוֹ
  chosen: because he had sent him away
  alternatives:
  - for he had dismissed him
  - because David had sent him away
  lexicon: HALOT
  rationale: The subject is contextually David. English supplies the pluperfect to
    show prior action relative to Joab’s arrival. 'Sent him away' is idiomatic and
    neutral.
- source_word: וַיֵּלֶךְ בְּשָׁלוֹם
  chosen: and he had gone in peace
  alternatives:
  - and he went in peace
  - and he departed in peace
  - and he went peacefully
  lexicon: HALOT
  rationale: 'The Hebrew idiom indicates a peaceful departure under safe terms. Pluperfect
    in English best reflects the sequence: David had sent him away, and Abner had
    departed safely before Joab arrived.'
