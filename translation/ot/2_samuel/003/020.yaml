id: 2SA.3.20
reference: 2 Samuel 3:20
source:
  edition: WLC
  text: וַ/יָּבֹ֨א אַבְנֵ֤ר אֶל דָּוִד֙ חֶבְר֔וֹן וְ/אִתּ֖/וֹ עֶשְׂרִ֣ים אֲנָשִׁ֑ים
    וַ/יַּ֨עַשׂ דָּוִ֧ד לְ/אַבְנֵ֛ר וְ/לַ/אֲנָשִׁ֥ים אֲשֶׁר אִתּ֖/וֹ מִשְׁתֶּֽה־־׃
translation:
  text: Abner came to David at Hebron, and twenty men were with him. And David made
    a feast for Abner and for the men who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepared a feast' or 'made a banquet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. Since the
    destination 'to David at Hebron' is the narrative focus, 'came' is the most natural
    English rendering.
- source_word: אֶל דָּוִד חֶבְרוֹן
  chosen: to David at Hebron
  alternatives:
  - to David, to Hebron
  - to David in Hebron
  lexicon: HALOT
  rationale: The Hebrew places 'Hebron' after 'David' without an explicit preposition
    before the place name. In context it identifies David's location, so idiomatic
    English is 'to David at Hebron.'
- source_word: וְאִתּוֹ עֶשְׂרִים אֲנָשִׁים
  chosen: and twenty men were with him
  alternatives:
  - with him were twenty men
  - and with him were twenty men
  lexicon: HALOT
  rationale: The phrase is verbless in Hebrew. English supplies 'were' naturally.
    'Men' is retained rather than a neutral substitute because אֲנָשִׁים here refers
    to adult male companions.
- source_word: וַיַּעַשׂ ... מִשְׁתֶּה
  chosen: made a feast
  alternatives:
  - prepared a feast
  - made a banquet
  lexicon: HALOT
  rationale: The idiom 'make a feast' closely reflects the Hebrew עשה + משתה while
    remaining natural English. 'Feast' fits the social-meal sense better than the
    more formal 'banquet'.
- source_word: מִשְׁתֶּה
  chosen: feast
  alternatives:
  - banquet
  - drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast or banquet, often with drinking implied. 'Feast'
    is broad and natural in English; 'drinking feast' would over-specify what is only
    implicit.
- source_word: לְאַבְנֵר וְלָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  chosen: for Abner and for the men who were with him
  alternatives:
  - for Abner and the men who were with him
  - for Abner and his men
  lexicon: HALOT
  rationale: The repeated preposition ל is represented with 'for ... and for ...'
    to preserve the Hebrew structure. 'His men' is possible but less explicit than
    the source wording.
