id: 2SA.3.30
reference: 2 Samuel 3:30
source:
  edition: WLC
  text: וְ/יוֹאָב֙ וַ/אֲבִישַׁ֣י אָחִ֔י/ו הָרְג֖וּ לְ/אַבְנֵ֑ר עַל֩ אֲשֶׁ֨ר הֵמִ֜ית
    אֶת עֲשָׂהאֵ֧ל אֲחִי/הֶ֛ם בְּ/גִבְע֖וֹן בַּ/מִּלְחָמָֽה־׃פ
translation:
  text: So Joab and Abishai his brother killed Abner, because he had killed Asahel
    their brother at Gibeon in the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Joab and Abishai his brother killed Abner.' The Hebrew conjunction
      can be rendered simply 'and'; 'so' brings out the explanatory connection to
      the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְגוּ
  chosen: killed
  alternatives:
  - slew
  - murdered
  lexicon: HALOT
  rationale: Basic past action of הרג, rendered with straightforward modern English.
    'Murdered' would over-interpret the legal/moral evaluation; the verse states the
    act and motive without using a distinct term for murder.
- source_word: לְאַבְנֵר
  chosen: Abner
  alternatives:
  - against Abner
  lexicon: HALOT
  rationale: The preposition ל after הרג can mark the object in this construction.
    Natural English expresses the direct object simply as 'killed Abner' rather than
    preserving the preposition woodenly.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for that
  - on account of the fact that
  lexicon: HALOT
  rationale: This combination introduces the reason or grounds for the action. 'Because'
    is the clearest idiomatic English equivalent.
- source_word: הֵמִית
  chosen: had killed
  alternatives:
  - killed
  - put to death
  lexicon: HALOT
  rationale: The Hiphil of מות here refers to causing death. English past perfect
    ('had killed') best reflects the prior action relative to Joab and Abishai's killing
    of Abner.
- source_word: אֲחִיו / אֲחִיהֶם
  chosen: his brother / their brother
  lexicon: HALOT
  rationale: The first refers specifically to Abishai as Joab's brother; the second
    refers to Asahel as the brother of both Joab and Abishai. The familial relationship
    is important to the motive and should be preserved explicitly.
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - in Gibeon
  lexicon: HALOT
  rationale: For a battle location involving a city/site, 'at Gibeon' is idiomatic
    English.
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in battle
  - during the battle
  lexicon: HALOT
  rationale: The article points to a specific battle already known from the narrative
    context. 'In the battle' preserves that specificity better than the more general
    'in battle'.
- source_word: וְ / וַ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction links this verse inferentially to the preceding narrative
    explanation. 'So' communicates the summarizing/explanatory force in natural English,
    while remaining close to the discourse function.
