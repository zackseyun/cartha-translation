id: 2SA.3.2
reference: 2 Samuel 3:2
source:
  edition: WLC
  text: ו/ילדו לְ/דָוִ֛ד בָּנִ֖ים בְּ/חֶבְר֑וֹן וַ/יְהִ֤י בְכוֹר/וֹ֙ אַמְנ֔וֹן לַ/אֲחִינֹ֖עַם
    הַ/יִּזְרְעֵאלִֽת׃
translation:
  text: Sons were born to David in Hebron, and his firstborn was Amnon, by Ahinoam
    the Jezreelitess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Jezreelite woman" or "the woman from Jezreel."
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/ילדו
  chosen: were born
  alternatives:
  - were borne
  - they were born
  lexicon: HALOT
  rationale: 'The passive/impersonal sense best fits the Hebrew verbal form in context:
    the focus is that sons came to be born to David, not explicitly on the mothers
    as subject. ''Were born'' is natural modern English and preserves the eventive
    sense.'
- source_word: לְ/דָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/advantage here: the sons were born
    to David. ''To David'' is the standard idiomatic rendering in genealogical notices.'
- source_word: בָּנִים
  chosen: Sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically means male children, not generic offspring. This
    follows the gender-accurate principle.
- source_word: בְּ/חֶבְרוֹן
  chosen: in Hebron
  lexicon: HALOT
  rationale: Simple locative use of ב; 'in Hebron' is straightforward and idiomatic.
- source_word: וַ/יְהִי
  chosen: and ... was
  alternatives:
  - now ... was
  - and there was
  lexicon: HALOT
  rationale: Here the verb introduces the specification of David's firstborn. Rendering
    it with a simple copular 'was' in coordination gives clear English without overtranslating
    the narrative waw.
- source_word: בְכוֹר/וֹ
  chosen: his firstborn
  alternatives:
  - his eldest
  lexicon: HALOT
  rationale: בכור denotes the firstborn son in birth order, a term with potential
    legal/familial significance. 'Firstborn' preserves that nuance better than merely
    'eldest'.
- source_word: אַמְנוֹן
  chosen: Amnon
  rationale: Personal name transliterated by standard English convention.
- source_word: לַ/אֲחִינֹעַם
  chosen: by Ahinoam
  alternatives:
  - to Ahinoam
  - from Ahinoam
  lexicon: HALOT
  rationale: 'In this birth-list context, the preposition marks maternity: the son
    was born to David by Ahinoam. ''By'' is concise and idiomatic in English genealogical
    style.'
- source_word: הַ/יִּזְרְעֵאלִת
  chosen: the Jezreelitess
  alternatives:
  - the Jezreelite woman
  - the woman from Jezreel
  lexicon: HALOT
  rationale: The feminine gentilic identifies Ahinoam by origin. 'Jezreelitess' is
    a precise traditional English equivalent, though somewhat formal; it preserves
    the feminine ethnic designation compactly. A more paraphrastic option was avoided
    to stay closer to the source.
