id: 2SA.3.5
reference: 2 Samuel 3:5
source:
  edition: WLC
  text: וְ/הַ/שִּׁשִּׁ֣י יִתְרְעָ֔ם לְ/עֶגְלָ֖ה אֵ֣שֶׁת דָּוִ֑ד אֵ֛לֶּה יֻלְּד֥וּ
    לְ/דָוִ֖ד בְּ/חֶבְרֽוֹן׃פ
translation:
  text: and the sixth, Ithream, by Eglah, David’s wife. These were born to David in
    Hebron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wife of David.' The Hebrew phrase is literally 'wife of David';
      in context it identifies Eglah as one of David’s wives, not necessarily his
      only wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשִּׁשִּׁי
  chosen: and the sixth
  alternatives:
  - and the sixth son
  - the sixth
  lexicon: HALOT
  rationale: The ordinal with conjunction continues the list of David’s sons from
    the previous verses. 'And the sixth' is the most natural English continuation;
    'son' is implied by context and need not be supplied in the main text.
- source_word: יִתְרְעָם
  chosen: Ithream
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לְעֶגְלָה
  chosen: by Eglah
  alternatives:
  - to Eglah
  - from Eglah
  lexicon: HALOT
  rationale: In this birth-list formula, ל marks the mother in the sense 'to/by [a
    woman].' English 'by Eglah' is idiomatic in genealogical contexts and matches
    the sense of maternity.
- source_word: אֵשֶׁת דָּוִד
  chosen: David’s wife
  alternatives:
  - the wife of David
  - a wife of David
  lexicon: HALOT
  rationale: The construct phrase literally means 'wife of David.' English possessive
    is the clearest rendering. Although David had multiple wives, the Hebrew construct
    here is definite by relation; 'David’s wife' is a natural literal rendering without
    forcing exclusivity beyond the syntax.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These sons
  - These ones
  lexicon: HALOT
  rationale: The demonstrative summarizes the preceding list. 'These' is sufficient;
    'sons' is contextually implied.
- source_word: יֻלְּדוּ
  chosen: were born
  alternatives:
  - were fathered
  - were borne
  lexicon: HALOT
  rationale: Passive of ילד in this formula is best rendered 'were born.' This preserves
    the straightforward genealogical statement without over-interpreting agency.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: 'In genealogical notices ילד + ל commonly indicates parentage: ''were
    born to David.'' This is standard and clear English.'
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  lexicon: HALOT
  rationale: Locative preposition indicating the place where these births occurred.
