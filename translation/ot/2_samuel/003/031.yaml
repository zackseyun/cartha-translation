id: 2SA.3.31
reference: 2 Samuel 3:31
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ דָּוִ֨ד אֶל יוֹאָ֜ב וְ/אֶל כָּל הָ/עָ֣ם אֲשֶׁר אִתּ֗/וֹ קִרְע֤וּ
    בִגְדֵי/כֶם֙ וְ/חִגְר֣וּ שַׂקִּ֔ים וְ/סִפְד֖וּ לִ/פְנֵ֣י אַבְנֵ֑ר וְ/הַ/מֶּ֣לֶךְ
    דָּוִ֔ד הֹלֵ֖ךְ אַחֲרֵ֥י הַ/מִּטָּֽה־־־־׃
translation:
  text: Then David said to Joab and to all the people who were with him, “Tear your
    clothes, put on sackcloth, and mourn before Abner.” And King David was walking
    behind the bier.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “funeral couch” or “stretcher”; the Hebrew word often means “bed,” but
      here it refers to the platform on which Abner’s body was carried.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְעוּ
  chosen: Tear
  alternatives:
  - Rip
  lexicon: HALOT
  rationale: Imperative plural of קרע in mourning context; 'tear' is the standard
    natural English equivalent for rending garments in grief.
- source_word: בִגְדֵיכֶם
  chosen: your clothes
  alternatives:
  - your garments
  lexicon: HALOT
  rationale: Refers to outer clothing generally. 'Clothes' is more readable modern
    English; 'garments' is possible but slightly more formal.
- source_word: חִגְרוּ שַׂקִּים
  chosen: put on sackcloth
  alternatives:
  - gird yourselves with sackcloth
  - tie on sackcloth
  lexicon: HALOT
  rationale: The Hebrew literally means 'gird on sackcloth,' a conventional mourning
    act. 'Put on sackcloth' preserves the sense in idiomatic modern English.
- source_word: וְסִפְדוּ
  chosen: and mourn
  alternatives:
  - and lament
  - and wail
  lexicon: HALOT
  rationale: ספד denotes formal mourning/lamentation for the dead. 'Mourn' is broad
    and natural; 'lament' is possible but can sound more literary.
- source_word: לִפְנֵי אַבְנֵר
  chosen: before Abner
  alternatives:
  - in front of Abner
  - before the body of Abner
  lexicon: HALOT
  rationale: Literally 'before Abner.' In funeral procession context this likely means
    in front of Abner/the bier carrying him. The more literal 'before Abner' is retained
    in the main clause, with context supplied by the following sentence.
- source_word: הֹלֵךְ
  chosen: was walking
  alternatives:
  - walked
  - went
  lexicon: HALOT
  rationale: Participle gives ongoing/imperfective sense in narrative; 'was walking'
    captures the durative aspect better than simple past.
- source_word: אַחֲרֵי
  chosen: behind
  alternatives:
  - after
  lexicon: HALOT
  rationale: Spatial sense in procession context is best rendered 'behind.'
- source_word: הַמִּטָּה
  chosen: the bier
  alternatives:
  - the bed
  - the funeral couch
  - the stretcher
  lexicon: HALOT
  rationale: Though מיטה often means 'bed/couch,' in a funerary context it refers
    to the couch or bier on which the body is carried. 'Bier' is the most precise
    English term, though less common.
- source_word: וְהַמֶּלֶךְ דָּוִד
  chosen: And King David
  alternatives:
  - and the king, David
  lexicon: HALOT
  rationale: Appositional phrase identifying David in his royal role; smooth English
    places the title before the name.
