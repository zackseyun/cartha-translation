id: 2SA.3.32
reference: 2 Samuel 3:32
source:
  edition: WLC
  text: וַ/יִּקְבְּר֥וּ אֶת אַבְנֵ֖ר בְּ/חֶבְר֑וֹן וַ/יִשָּׂ֧א הַ/מֶּ֣לֶךְ אֶת קוֹל֗/וֹ
    וַ/יֵּבְךְּ֙ אֶל קֶ֣בֶר אַבְנֵ֔ר וַ/יִּבְכּ֖וּ כָּל הָ/עָֽם־־־־׃פ
translation:
  text: They buried Abner in Hebron, and the king lifted up his voice and wept at
    Abner’s grave, and all the people wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward Abner’s grave.' The Hebrew preposition can be read more literally,
      but the context favors the idiomatic sense 'at Abner’s grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: They buried
  alternatives:
  - And they buried
  lexicon: HALOT
  rationale: Qal wayyiqtol 3mp of קבר, straightforward narrative past. English omits
    the conjunction at the start for natural flow while preserving the sequential
    sense in the sentence structure.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: The preposition ב commonly marks location; 'in Hebron' is the most natural
    English rendering for burial within the city.
- source_word: וַיִּשָּׂא ... אֶת־קוֹלוֹ
  chosen: lifted up his voice
  alternatives:
  - raised his voice
  lexicon: HALOT
  rationale: This is a Hebrew idiom for vocal lament or loud speech. 'Lifted up his
    voice' preserves the idiomatic and literary character of the source better than
    the flatter 'raised his voice.'
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. 'Wept' better matches the solemn funeral
    context and pairs well with the repeated verb later in the verse.
- source_word: אֶל־קֶבֶר אַבְנֵר
  chosen: at Abner’s grave
  alternatives:
  - over Abner's grave
  - toward Abner's grave
  - at the grave of Abner
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this context of lament at a
    burial site, idiomatic English is 'at Abner’s grave.' This conveys location in
    relation to the act of weeping without woodenly preserving the preposition.
- source_word: וַיִּבְכּוּ כָּל־הָעָם
  chosen: all the people wept
  alternatives:
  - all the people cried
  lexicon: HALOT
  rationale: The repeated בכה is rendered consistently as 'wept.' כָּל־הָעָם is naturally
    'all the people,' referring to the gathered populace.
