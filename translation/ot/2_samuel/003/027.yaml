id: 2SA.3.27
reference: 2 Samuel 3:27
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב אַבְנֵר֙ חֶבְר֔וֹן וַ/יַּטֵּ֤/הוּ יוֹאָב֙ אֶל תּ֣וֹךְ הַ/שַּׁ֔עַר
    לְ/דַבֵּ֥ר אִתּ֖/וֹ בַּ/שֶּׁ֑לִי וַ/יַּכֵּ֤/הוּ שָׁם֙ הַ/חֹ֔מֶשׁ וַ/יָּ֕מָת בְּ/דַ֖ם
    עֲשָׂה אֵ֥ל אָחִֽי/ו־־׃
translation:
  text: When Abner returned to Hebron, Joab drew him aside into the middle of the
    gate to speak with him privately, and there he struck him in the belly, so that
    he died, for the blood of Asahel his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the fifth rib,'' a traditional rendering for an idiom referring
      to the abdomen or belly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב commonly means 'return/turn back.' In context Abner is coming
    back to Hebron after having been sent away, so 'returned' is the most natural
    English rendering.
- source_word: וַיַּטֵּהוּ
  chosen: drew him aside
  alternatives:
  - turned him aside
  - led him aside
  lexicon: HALOT
  rationale: נטה in the hiphil can mean to incline, turn, or draw aside. Here Joab
    diverts Abner from his path into a more secluded spot, so 'drew him aside' captures
    both motion and intent.
- source_word: אֶל־תּוֹךְ הַשַּׁעַר
  chosen: into the middle of the gate
  alternatives:
  - into the midst of the gate
  - inside the gateway
  lexicon: HALOT
  rationale: תוך denotes the middle/interior. שער can refer to the gate structure
    or gateway area. 'Into the middle of the gate' stays close to the Hebrew while
    remaining intelligible.
- source_word: לְדַבֵּר אִתּוֹ בַּשֶּׁלִי
  chosen: to speak with him privately
  alternatives:
  - to speak with him quietly
  - to speak with him in peace
  - to speak with him at ease
  lexicon: HALOT
  rationale: בשלי is difficult and likely conveys quietness, ease, or privacy. In
    this narrative setting Joab is luring Abner into a private conversation; 'privately'
    best fits the idiom and context without overinterpreting.
- source_word: וַיַּכֵּהוּ שָׁם הַחֹמֶשׁ
  chosen: there he struck him in the belly
  alternatives:
  - there he struck him in the abdomen
  - there he struck him in the fifth rib
  lexicon: HALOT
  rationale: חֹמֶשׁ in these narrative death scenes is traditionally rendered 'fifth
    rib,' but the underlying sense is the abdomen/belly region. Since English readers
    do not naturally understand 'fifth rib' as an idiom for a mortal abdominal blow,
    'in the belly' communicates the plain sense better. The traditional rendering
    is preserved in a footnote as a lexical alternative.
- source_word: וַיָּמָת
  chosen: so that he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: The waw-consecutive simply advances the narrative, but in English 'so
    that he died' makes the causal sequence explicit and natural after the blow.
- source_word: בְּדַם עֲשָׂהאֵל אָחִיו
  chosen: for the blood of Asahel his brother
  alternatives:
  - because of the blood of Asahel his brother
  - in revenge for the blood of Asahel his brother
  lexicon: HALOT
  rationale: The preposition ב here expresses cause or motive. 'For the blood of Asahel
    his brother' is concise and preserves the Hebrew's legal-revenge nuance without
    adding explanatory words not present in the text.
