id: 2SA.3.28
reference: 2 Samuel 3:28
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע דָּוִד֙ מֵ/אַ֣חֲרֵי כֵ֔ן וַ/יֹּ֗אמֶר נָקִ֨י אָנֹכִ֧י וּ/מַמְלַכְתִּ֛/י מֵ/עִ֥ם יְהוָ֖ה עַד עוֹלָ֑ם מִ/דְּמֵ֖י אַבְנֵ֥ר בֶּן נֵֽר־־׃
translation:
  text: Afterward, when David heard of it, he said, “I and my kingdom are forever innocent before Yahweh of the blood of Abner son of Ner.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “After this” or “Later.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the bloods of Abner,” an idiom referring to responsibility for Abner’s bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַחֲרֵי כֵן
  chosen: Afterward
  alternatives:
  - After this
  - Later
  lexicon: HALOT
  rationale: Temporal expression meaning 'after this/afterward.' 'Afterward' is concise, natural English and fits the narrative sequence.
- source_word: וַיִּשְׁמַע
  chosen: when David heard of it
  alternatives:
  - David heard
  - David came to hear
  lexicon: HALOT
  rationale: The verb means 'heard.' English idiom benefits from supplying 'of it' to indicate the reported event just mentioned in context, without adding new content beyond the narrative implication.
- source_word: נָקִי
  chosen: innocent
  alternatives:
  - guiltless
  - free from guilt
  lexicon: HALOT
  rationale: נָקִי denotes being clean from guilt or innocent. 'Innocent' is the most natural modern rendering in a legal-moral context.
- source_word: אָנֹכִי וּמַמְלַכְתִּי
  chosen: I and my kingdom
  alternatives:
  - I and my kingship
  - I and my royal house
  lexicon: HALOT
  rationale: The phrase joins David personally with his realm/dynasty in disclaiming responsibility. 'My kingdom' best reflects מַמְלָכָה here as the political kingdom under David, not merely the abstract fact of reigning.
- source_word: מֵעִם יְהוָה
  chosen: before the LORD
  alternatives:
  - from with the LORD
  - in the sight of the LORD
  lexicon: HALOT
  rationale: The idiom expresses standing in relation to YHWH as witness and judge. 'Before the LORD' is idiomatic English that preserves the forensic sense. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: The phrase means enduringly/perpetually. 'Forever' is clear modern English and preserves the force of the declaration.
- source_word: מִדְּמֵי
  chosen: of the blood of
  alternatives:
  - for the blood of
  - from the bloodguilt of
  lexicon: HALOT
  rationale: Literally 'from the bloods of,' an idiom for bloodshed/bloodguilt. 'Of the blood of' keeps the concrete Hebrew expression while remaining natural in English. The legal implication of culpability is already conveyed by 'innocent.'
- source_word: אַבְנֵר בֶּן נֵר
  chosen: Abner son of Ner
  alternatives:
  - Abner the son of Ner
  lexicon: HALOT
  rationale: Standard transliteration of the personal names, with 'son of' preserving the Hebrew patronymic construction.
