theological_decisions:
- issue: Subject of הוֹשִׁיעַ in the quoted speech
  chosen_reading: 'The LORD is the speaker and ultimate subject: ''I will save ... by the hand of my servant David.'''
  alternative_readings:
  - 'David as subject: ''David will save my people Israel'''
  rationale: The Hebrew consonantal form can be represented in translation either with David as the grammatical subject or with the LORD as the implied first-person speaker acting through David. Given the preceding 'the LORD has spoken ... saying' and the phrase 'by the hand of my servant David,' the latter better preserves the distinction between divine agency and Davidic instrumentality. It also avoids implying that David independently saves Israel apart from the LORD, while still affirming David's appointed role.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it without documentation)
