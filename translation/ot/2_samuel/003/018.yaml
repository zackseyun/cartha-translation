id: 2SA.3.18
reference: 2 Samuel 3:18
source:
  edition: WLC
  text: וְ/עַתָּ֖ה עֲשׂ֑וּ כִּ֣י יְהוָ֗ה אָמַ֤ר אֶל דָּוִד֙ לֵ/אמֹ֔ר בְּ/יַ֣ד דָּוִ֣ד עַבְדִּ֗/י הוֹשִׁ֜יעַ אֶת עַמִּ֤/י יִשְׂרָאֵל֙ מִ/יַּ֣ד פְּלִשְׁתִּ֔ים וּ/מִ/יַּ֖ד כָּל אֹיְבֵי/הֶֽם־׀־־׃
translation:
  text: Now then, do it, for Yahweh has spoken concerning David, saying, ‘By the hand of my servant David I will save my people Israel from the hand of the Philistines and from the hand of all their enemies.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'David my servant will save my people Israel from the hand of the Philistines and from the hand of all their enemies.' The Hebrew form may be taken with David as the grammatical subject rather than the LORD as the implied speaker acting through David.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing an urgent transition from prior discussion to action. 'Now then' captures both temporal and exhortatory force more naturally than a bare 'now.'
- source_word: עֲשׂוּ
  chosen: do it
  alternatives:
  - act
  - do so
  lexicon: HALOT
  rationale: Second masculine plural imperative of עשה in context calls for carrying out the proposed plan. 'Do it' is idiomatic and preserves the directness of the command.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the imperative. 'For' fits the explanatory relationship between the command and the divine statement.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָמַר אֶל דָּוִד לֵאמֹר
  chosen: has spoken to David, saying
  alternatives:
  - said to David, saying
  - spoke concerning David, saying
  lexicon: HALOT
  rationale: 'The perfect can be rendered with present relevance in English here: the LORD''s prior word grounds present action. ''Has spoken'' communicates that abiding force. The preposition אֶל is most naturally ''to David,'' not ''concerning David.'''
- source_word: בְּיַד
  chosen: By the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: A common Hebrew idiom for agency/instrumentality. 'By the hand of' preserves the idiom while remaining understandable in English.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-divine commission contexts 'servant' is the established and contextually fitting rendering, emphasizing commissioned service rather than bonded status.
- source_word: הוֹשִׁיעַ
  chosen: I will save
  alternatives:
  - he will save
  - I will deliver
  lexicon: HALOT
  rationale: 'The form is best understood in the quoted divine speech as first person singular with prefixed/understood subject from the speaker''s perspective: the LORD declares what he will do by means of David. This avoids making David the ultimate savior and fits the theology of divine deliverance through a human agent. ''Save'' is preferred over ''deliver'' because it is the standard gloss for ישׁע and suits military rescue here.'
- source_word: עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - Israel my people
  - my people, Israel
  lexicon: HALOT
  rationale: Preserves the covenantal possessive and appositional national name in natural English order.
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'from the hand of' for hostile power/control, matching the earlier instrumental idiom and preserving literary texture.
- source_word: וּמִיַּד כָּל אֹיְבֵיהֶם
  chosen: and from the hand of all their enemies
  alternatives:
  - and from all their enemies
  - and from the power of all their enemies
  lexicon: HALOT
  rationale: Again preserves the repeated idiom and the comprehensive scope marked by כָּל. The pronoun 'their' refers to Israel in the third person within the quotation.
