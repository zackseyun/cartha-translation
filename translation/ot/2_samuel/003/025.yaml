id: 2SA.3.25
reference: 2 Samuel 3:25
source:
  edition: WLC
  text: יָדַ֨עְתָּ֙ אֶת אַבְנֵ֣ר בֶּן נֵ֔ר כִּ֥י לְ/פַתֹּתְ/ךָ֖ בָּ֑א וְ/לָ/דַ֜עַת
    אֶת מוֹצָֽאֲ/ךָ֙ וְ/אֶת מבוא/ך וְ/לָ/דַ֕עַת אֵ֛ת כָּל אֲשֶׁ֥ר אַתָּ֖ה עֹשֶֽׂה־־־־־׃
translation:
  text: You know Abner son of Ner, that he came to deceive you, and to learn your
    going out and your coming in, and to learn all that you are doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to entice you' / 'to persuade you.' The Hebrew verb can denote seducing,
      enticing, or deceiving; here the hostile context favors 'deceive you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your going out and your coming in,' an idiom for the whole range
      of your movements or activities.
    reason: cultural_note
lexical_decisions:
- source_word: יָדַעְתָּ
  chosen: You know
  alternatives:
  - You knew
  - Surely you know
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע can function as a present-state assertion in direct
    speech ('you know'), not merely a past tense. In context Joab is appealing to
    what David should recognize about Abner's intent.
- source_word: אַבְנֵר בֶּן נֵר
  chosen: Abner son of Ner
  alternatives:
  - Abner the son of Ner
  rationale: Personal name is transliterated; filial expression rendered naturally
    in English without unnecessary formality.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what David knows: ''that he came...''. ''Because''
    is possible, but ''that'' better fits the accusatory explanatory flow.'
- source_word: לְפַתֹּתְךָ
  chosen: to deceive you
  alternatives:
  - to entice you
  - to persuade you
  - to mislead you
  lexicon: HALOT
  rationale: פתה commonly carries the sense of enticing or deceiving. In this political-military
    context, 'deceive' best conveys hostile manipulation rather than mere persuasion.
- source_word: בָּא
  chosen: he came
  alternatives:
  - he has come
  lexicon: HALOT
  rationale: Simple past fits the narrative setting and English style.
- source_word: לָדַעַת
  chosen: to learn
  alternatives:
  - to know
  - to find out
  lexicon: HALOT
  rationale: Infinitive of ידע here expresses purpose of gaining information. 'To
    learn' is idiomatic and avoids awkward repetition of 'know' after 'You know'.
- source_word: מוֹצָאֲךָ
  chosen: your going out
  alternatives:
  - your movements out
  - your departure
  lexicon: HALOT
  rationale: Retains the Hebrew idiom paired with 'coming in,' a common expression
    for one's movements or activities.
- source_word: מְבוֹאֶךָ
  chosen: your coming in
  alternatives:
  - your return
  - your movements in
  lexicon: HALOT
  rationale: Kept parallel with 'your going out' to preserve the Hebrew merism describing
    the totality of David's movements.
- source_word: כָּל אֲשֶׁר אַתָּה עֹשֶׂה
  chosen: all that you are doing
  alternatives:
  - everything that you do
  - all that you do
  lexicon: HALOT
  rationale: The participle עֹשֶׂה supports an ongoing sense. 'All that you are doing'
    conveys present activity under observation.
