id: 2SA.3.19
reference: 2 Samuel 3:19
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר גַּם אַבְנֵ֖ר בְּ/אָזְנֵ֣י בִנְיָמִ֑ין וַ/יֵּ֣לֶךְ גַּם אַבְנֵ֗ר
    לְ/דַבֵּ֞ר בְּ/אָזְנֵ֤י דָוִד֙ בְּ/חֶבְר֔וֹן אֵ֤ת כָּל אֲשֶׁר טוֹב֙ בְּ/עֵינֵ֣י
    יִשְׂרָאֵ֔ל וּ/בְ/עֵינֵ֖י כָּל בֵּ֥ית בִּנְיָמִֽן־־־־־׃
translation:
  text: Abner also spoke in the hearing of Benjamin, and Abner also went to speak
    in the hearing of David at Hebron all that seemed good to Israel and to the whole
    house of Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the ears of,'' an idiom meaning ''in the hearing of'' or ''to.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'all that was pleasing to Israel and to the whole house of Benjamin.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/אָזְנֵי
  chosen: in the hearing of
  alternatives:
  - to
  - in the ears of
  - privately to
  lexicon: HALOT
  rationale: The idiom literally means 'in the ears of,' but in English 'in the hearing
    of' preserves the auditory/speech idiom without sounding unnatural. It fits both
    Benjamin and David in this verse.
- source_word: בִנְיָמִין
  chosen: Benjamin
  alternatives:
  - the Benjaminites
  - the tribe of Benjamin
  lexicon: HALOT
  rationale: As a collective tribal name here, 'Benjamin' is a natural English metonym
    for the tribe/people. The context already distinguishes 'the whole house of Benjamin'
    later, so the shorter form works at the first occurrence.
- source_word: לְ/דַבֵּר
  chosen: to speak
  alternatives:
  - to tell
  - to discuss
  lexicon: HALOT
  rationale: A straightforward infinitive of דבר. 'Speak' keeps the verbal link with
    the earlier finite verb and avoids over-interpreting the content as negotiation
    or persuasion.
- source_word: בְּ/חֶבְרוֹן
  chosen: at Hebron
  alternatives:
  - in Hebron
  lexicon: HALOT
  rationale: Either preposition works in English; 'at Hebron' reads naturally with
    a destination/meeting setting after 'went to speak.'
- source_word: אֵת כָּל אֲשֶׁר טוֹב בְּעֵינֵי
  chosen: all that seemed good to
  alternatives:
  - everything that was good in the eyes of
  - all that was pleasing to
  - all that was acceptable to
  lexicon: HALOT
  rationale: The Hebrew idiom 'good in the eyes of' commonly means what seems good/acceptable
    to someone. 'Seemed good to' preserves the evaluative sense without wooden literalism.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The collective national name is concise and natural here, especially
    paired with 'the whole house of Benjamin' as a subgroup.
- source_word: כָּל בֵּית בִּנְיָמִן
  chosen: the whole house of Benjamin
  alternatives:
  - all the house of Benjamin
  - the whole clan of Benjamin
  - the whole tribe of Benjamin
  lexicon: HALOT
  rationale: '''House of Benjamin'' is a standard Hebrew kinship-political expression.
    Retaining ''house'' preserves the source texture and avoids flattening the familial-tribal
    nuance.'
- source_word: גַּם ... גַּם
  chosen: also ... also
  alternatives:
  - both ... and
  - indeed ... also
  lexicon: HALOT
  rationale: The repeated גַּם marks addition in both clauses. Rendering both instances
    as 'also' preserves the parallel structure and emphasis on Abner's twofold action.
- source_word: וַיְדַבֵּר ... וַיֵּלֶךְ
  chosen: spoke ... went
  alternatives:
  - spoke ... came
  - addressed ... went
  lexicon: HALOT
  rationale: Simple past narrative verbs are best rendered with plain English past
    tense. 'Went' reflects the motion verb without importing the destination beyond
    what follows.
