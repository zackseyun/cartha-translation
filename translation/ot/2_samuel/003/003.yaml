id: 2SA.3.3
reference: 2 Samuel 3:3
source:
  edition: WLC
  text: וּ/מִשְׁנֵ֣/הוּ כִלְאָ֔ב ל/אביגל אֵ֖שֶׁת נָבָ֣ל הַֽ/כַּרְמְלִ֑י וְ/הַ/שְּׁלִשִׁי֙
    אַבְשָׁל֣וֹם בֶּֽן מַעֲכָ֔ה בַּת תַּלְמַ֖י מֶ֥לֶךְ גְּשֽׁוּר־־׃
translation:
  text: his second, Kileab, by Abigail the wife of Nabal the Carmelite; and the third,
    Absalom the son of Maacah daughter of Talmai king of Geshur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his second son, Kileab, by Abigail, Nabal’s wife, the woman from Carmel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁנֵהוּ
  chosen: his second
  alternatives:
  - his second son
  lexicon: HALOT
  rationale: Ordinal expression with 3ms suffix refers to David's second son in the
    list. 'His second' is slightly more formal and mirrors the Hebrew terseness; 'son'
    is implied by the genealogy context and can be left unstated in English.
- source_word: כִלְאָב
  chosen: Kileab
  alternatives:
  - Chileab
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy. 'Kileab'
    follows a standard direct transliteration from Hebrew.
- source_word: לַאֲבִיגַל
  chosen: by Abigail
  alternatives:
  - to Abigail
  lexicon: HALOT
  rationale: The preposition ל in birth notices idiomatically marks maternity ('born
    to/by'). 'By Abigail' is natural English in a genealogical list and clearly indicates
    mother.
- source_word: אֵשֶׁת נָבָל
  chosen: the wife of Nabal
  alternatives:
  - Nabal's wife
  lexicon: HALOT
  rationale: Construct phrase straightforwardly identifies Abigail by her former marriage.
    'The wife of Nabal' stays close to the Hebrew form.
- source_word: הַכַּרְמְלִי
  chosen: the Carmelite
  alternatives:
  - of Carmel
  lexicon: HALOT
  rationale: Gentilic/adjectival form describing Nabal as from Carmel. 'The Carmelite'
    is the conventional and precise rendering.
- source_word: וְהַשְּׁלִשִׁי
  chosen: and the third
  alternatives:
  - and his third
  lexicon: HALOT
  rationale: Continues the ordinal listing of sons. Possession is understood from
    context, so 'and the third' is sufficient and close to the Hebrew.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention.
- source_word: בֶּן מַעֲכָה
  chosen: the son of Maacah
  alternatives:
  - son of Maacah
  lexicon: HALOT
  rationale: Standard filial expression. Including 'the' improves English flow in
    apposition.
- source_word: בַּת תַּלְמַי
  chosen: daughter of Talmai
  lexicon: HALOT
  rationale: Standard genealogical construct identifying Maacah's father.
- source_word: מֶלֶךְ גְּשׁוּר
  chosen: king of Geshur
  alternatives:
  - the king of Geshur
  lexicon: HALOT
  rationale: Construct chain identifying Talmai's royal status and realm. Article
    is absent in Hebrew; English apposition works naturally without it.
