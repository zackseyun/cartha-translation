id: 2SA.3.17
reference: 2 Samuel 3:17
source:
  edition: WLC
  text: וּ/דְבַר אַבְנֵ֣ר הָיָ֔ה עִם זִקְנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר גַּם תְּמוֹל֙ גַּם
    שִׁלְשֹׁ֔ם הֱיִיתֶ֞ם מְבַקְשִׁ֧ים אֶת דָּוִ֛ד לְ/מֶ֖לֶךְ עֲלֵי/כֶֽם־־־־־׃
translation:
  text: Now Abner had spoken with the elders of Israel, saying, “For some time you
    have been seeking David to be king over you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'both yesterday and the day before.' The Hebrew idiom refers
      to prior or ongoing past time.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/דְבַר ... הָיָה עִם
  chosen: had spoken with
  alternatives:
  - the word of Abner was with
  - was in communication with
  - had a conversation with
  lexicon: HALOT
  rationale: The Hebrew idiom 'the word of X was with' naturally conveys speech or
    consultation. 'Had spoken with' renders the sense in clear modern English while
    preserving the interpersonal aspect signaled by עִם ('with').
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Standard rendering of זקנים in political/tribal leadership contexts;
    it refers to recognized leaders, not merely old men.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Conventional introduction to direct discourse; 'saying' keeps the Hebrew
    structure without awkwardness.
- source_word: גַּם תְּמוֹל גַּם שִׁלְשֹׁם
  chosen: For some time
  alternatives:
  - both yesterday and the day before
  - for a long time now
  - previously
  lexicon: HALOT
  rationale: Literally the phrase is 'both yesterday and the third day,' an idiom
    meaning formerly or over recent past time. 'For some time' communicates the idiomatic
    force in natural English better than a wooden temporal expression.
- source_word: הֱיִיתֶם מְבַקְשִׁים
  chosen: you have been seeking
  alternatives:
  - you were seeking
  - you have sought
  lexicon: HALOT
  rationale: The combination of היה with participle expresses ongoing past action.
    'Have been seeking' captures the durative sense in idiomatic English.
- source_word: אֶת דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Direct object marker אֶת is untranslated; the personal name is transliterated
    per project policy.
- source_word: לְמֶלֶךְ עֲלֵיכֶם
  chosen: to be king over you
  alternatives:
  - as king over you
  - for king over you
  lexicon: HALOT
  rationale: This expresses appointment or status. 'To be king over you' is smooth
    and accurately reflects David as the desired ruler.
