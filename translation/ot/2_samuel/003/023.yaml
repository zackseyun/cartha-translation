id: 2SA.3.23
reference: 2 Samuel 3:23
source:
  edition: WLC
  text: וְ/יוֹאָ֛ב וְ/כָל הַ/צָּבָ֥א אֲשֶׁר אִתּ֖/וֹ בָּ֑אוּ וַ/יַּגִּ֤דוּ לְ/יוֹאָב֙
    לֵ/אמֹ֔ר בָּֽא אַבְנֵ֤ר בֶּן נֵר֙ אֶל הַ/מֶּ֔לֶךְ וַֽ/יְשַׁלְּחֵ֖/הוּ וַ/יֵּ֥לֶךְ
    בְּ/שָׁלֽוֹם־־־־־׃
translation:
  text: When Joab and all the army that was with him arrived, they told Joab, saying,
    “Abner son of Ner came to the king, and he sent him away, and he went in peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he departed safely” / “he went away in peace.” The Hebrew idiom indicates
      a peaceful, unharmed departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  chosen: When Joab
  alternatives:
  - And Joab
  - Now Joab
  lexicon: HALOT
  rationale: The conjunction with a proper name can be rendered simply as 'and,' but
    in narrative English 'when' smoothly reflects the temporal setting created by
    the following plural verb 'arrived' and the report that follows.
- source_word: וְ/כָל הַ/צָּבָא אֲשֶׁר אִתּוֹ
  chosen: and all the army that was with him
  alternatives:
  - and all the host that was with him
  - and all the troops who were with him
  lexicon: HALOT
  rationale: צָבָא here refers to Joab's military force. 'Army' is clear modern English
    and suitably collective; 'host' is archaic, and 'troops' is possible but less
    directly tied to the singular collective noun.
- source_word: בָּאוּ
  chosen: arrived
  alternatives:
  - came
  lexicon: HALOT
  rationale: The verb means 'came,' but 'arrived' fits the narrative context in English,
    indicating their return to the place where the subsequent report is given.
- source_word: וַ/יַּגִּדוּ לְ/יוֹאָב לֵאמֹר
  chosen: they told Joab, saying
  alternatives:
  - they reported to Joab, saying
  - they informed Joab
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told Joab, saying'
    preserves the Hebrew reporting structure without becoming wooden.
- source_word: בָּא אַבְנֵר בֶּן נֵר אֶל הַמֶּלֶךְ
  chosen: Abner son of Ner came to the king
  alternatives:
  - Abner the son of Ner came to the king
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. 'Son of Ner' preserves the
    Hebrew patronymic in natural English.
- source_word: וַ/יְשַׁלְּחֵהוּ
  chosen: and he sent him away
  alternatives:
  - and he dismissed him
  - and he let him go
  lexicon: HALOT
  rationale: שׁלח with object pronoun here means to send someone away/release him.
    'Sent him away' is the most direct and idiomatic rendering in this narrative context.
- source_word: וַ/יֵּלֶךְ בְּ/שָׁלוֹם
  chosen: and he went in peace
  alternatives:
  - and he went away in peace
  - and he departed in peace
  - and he went safely
  lexicon: HALOT
  rationale: בשלום commonly conveys peaceful departure, often with the sense of safety
    or unharmed status. 'Went in peace' preserves the Hebrew idiom while remaining
    understandable; the nuance of safe departure is preserved in a footnote.
