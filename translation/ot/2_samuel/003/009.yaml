id: 2SA.3.9
reference: 2 Samuel 3:9
source:
  edition: WLC
  text: כֹּֽה יַעֲשֶׂ֤ה אֱלֹהִים֙ לְ/אַבְנֵ֔ר וְ/כֹ֖ה יֹסִ֣יף ל֑/וֹ כִּ֗י כַּ/אֲשֶׁ֨ר נִשְׁבַּ֤ע יְהוָה֙ לְ/דָוִ֔ד כִּֽי כֵ֖ן אֶֽעֱשֶׂה לּֽ/וֹ־־־׃
translation:
  text: May God do so to Abner, and more also, if, just as Yahweh has sworn to David, so I do for him—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so I will do for him.' The Hebrew imperfect in the final clause can be understood with future force.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה ... וְכֹה יֹסִיף לוֹ
  chosen: May God do so to Abner, and more also
  alternatives:
  - May God do thus to Abner, and even more
  - God do so to Abner and more also
  lexicon: HALOT
  rationale: This is a standard Hebrew oath formula invoking divine judgment on oneself. English idiom is best captured with 'May God do so ... and more also,' preserving the imprecatory force without archaic excess. 'More also' reflects the intensifying addition of וְכֹה יֹסִיף לוֹ.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this oath formula, אֱלֹהִים refers to God generically, not 'gods.' Singular English 'God' fits the idiom and context.
- source_word: לְאַבְנֵר
  chosen: to Abner
  alternatives:
  - to me, Abner
  lexicon: HALOT
  rationale: The oath formula uses the speaker's own name in the third person ('to Abner') as a self-imprecation. This is more transparent than paraphrasing as 'to me.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: '''Just as'' clearly marks comparison between the LORD''s oath and Abner''s intended action.'
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swore
  lexicon: HALOT
  rationale: The perfect can be rendered as present perfect in English to express a past oath with continuing relevance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי כֵן אֶעֱשֶׂה לוֹ
  chosen: so I do for him
  alternatives:
  - so I will do for him
  - that is what I will do for him
  lexicon: HALOT
  rationale: The clause states Abner's resolve to act in accordance with the LORD's oath to David. Although the Hebrew imperfect can be future, in English after 'if' a present form ('if ... so I do') preserves the oath syntax more naturally; the sense is promissory/future-oriented.
