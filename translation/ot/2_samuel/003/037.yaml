id: 2SA.3.37
reference: 2 Samuel 3:37
source:
  edition: WLC
  text: וַ/יֵּדְע֧וּ כָל הָ/עָ֛ם וְ/כָל יִשְׂרָאֵ֖ל בַּ/יּ֣וֹם הַ/ה֑וּא כִּ֣י לֹ֤א
    הָיְתָה֙ מֵֽ/הַ/מֶּ֔לֶךְ לְ/הָמִ֖ית אֶת אַבְנֵ֥ר בֶּן נֵֽר־־־־׃פ
translation:
  text: So all the people and all Israel knew on that day that it had not come from
    the king to put Abner son of Ner to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it was not from the king' or 'the king had not ordered it.' The Hebrew
      speaks of the matter's source or origin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדְעוּ
  chosen: knew
  alternatives:
  - came to know
  - understood
  lexicon: HALOT
  rationale: Qal wayyiqtol of ידע denotes coming to know/recognizing a fact. 'Knew'
    is natural English and fits the narrative summary.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  lexicon: HALOT
  rationale: עם here refers to the gathered people generally, not a specific ethnic
    distinction. 'All the people' is the standard clear rendering.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: Retains the collective national expression of the Hebrew. 'All Israel'
    is idiomatic and preserves the corporate sense.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A common temporal expression. 'On that day' preserves the preposition
    and the narrative emphasis.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they knew. English 'that' best fits indirect
    discourse here.
- source_word: לֹא הָיְתָה מֵהַמֶּלֶךְ
  chosen: it had not come from the king
  alternatives:
  - it was not from the king
  - the king was not responsible
  lexicon: HALOT
  rationale: 'The feminine singular verb with מן expresses source/origin: the matter
    was not from the king. ''It had not come from the king'' preserves the idiom while
    remaining readable. More interpretive renderings like ''the king was not responsible''
    go beyond the wording.'
- source_word: לְהָמִית
  chosen: to put ... to death
  alternatives:
  - to kill
  - to execute
  lexicon: HALOT
  rationale: Hiphil infinitive of מות means 'to cause to die.' 'To put to death' is
    a natural English equivalent that preserves causative force better than the blunter
    'kill.' 'Execute' would imply formal judicial process not stated in the text.
- source_word: אֶת אַבְנֵר בֶּן נֵר
  chosen: Abner son of Ner
  alternatives:
  - Abner the son of Ner
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of Ner'
    is the standard genealogical designation.
