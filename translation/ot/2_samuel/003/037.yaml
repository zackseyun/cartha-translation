theological_decisions:
- issue: Degree of implication regarding David's culpability in Abner's death
  chosen_reading: The verse states that the killing did not originate from the king,
    without expanding this into a broader doctrinal or moral exoneration.
  alternative_readings:
  - The king was innocent of Abner's death
  - The king had given no order for Abner's death
  rationale: The Hebrew wording focuses on source/origin ('not from the king') rather
    than explicitly using legal categories like innocence or command. The translation
    preserves that narrower claim and avoids importing a stronger conclusion than
    the text states.
  doctrine_reference: Translation philosophy §§1, 3
