id: 2SA.3.24
reference: 2 Samuel 3:24
source:
  edition: WLC
  text: וַ/יָּבֹ֤א יוֹאָב֙ אֶל הַ/מֶּ֔לֶךְ וַ/יֹּ֖אמֶר מֶ֣ה עָשִׂ֑יתָה הִנֵּה בָ֤א
    אַבְנֵר֙ אֵלֶ֔י/ךָ לָ/מָּה זֶּ֥ה שִׁלַּחְתּ֖/וֹ וַ/יֵּ֥לֶךְ הָלֽוֹךְ־־־׃
translation:
  text: Then Joab came to the king and said, “What have you done? Look, Abner came
    to you. Why is this—you sent him away, and he has gone on his way?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and he went, going''—an emphatic form meaning that he has certainly
      gone or gone completely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - So ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then' gives natural English
    narrative sequence without overformal repetition of 'and.'
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - into the presence of the king
  lexicon: HALOT
  rationale: Straightforward directional phrase; 'to the king' is idiomatic and sufficient.
- source_word: מֶה עָשִׂיתָה
  chosen: What have you done?
  alternatives:
  - What did you do?
  lexicon: HALOT
  rationale: The interrogative plus perfect is naturally rendered as an exclamatory
    rebuke in English. Present perfect preserves the force of a completed action with
    present implications.
- source_word: הִנֵּה
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: הִנֵּה draws attention emphatically. 'Look' is readable modern English
    and preserves the deictic force better than archaic 'behold.'
- source_word: בָא אַבְנֵר אֵלֶיךָ
  chosen: Abner came to you
  alternatives:
  - Abner has come to you
  lexicon: HALOT
  rationale: The clause states the salient fact underlying Joab's protest. Simple
    past fits the surrounding narrative better than English present perfect here.
- source_word: לָמָּה זֶּה
  chosen: Why is this—
  alternatives:
  - Why then
  - Why
  lexicon: HALOT
  rationale: The combination adds pointed rhetorical force beyond a bare 'why.' Rendering
    it as 'Why is this—' preserves the abrupt, accusatory tone and prepares for the
    following accusation.
- source_word: שִׁלַּחְתּוֹ
  chosen: you sent him away
  alternatives:
  - you let him go
  - you dismissed him
  lexicon: HALOT
  rationale: Piel of שלח here means to send away/release. 'Sent him away' is direct
    and keeps the agency on David.
- source_word: וַיֵּלֶךְ הָלוֹךְ
  chosen: and he has gone on his way
  alternatives:
  - and he is completely gone
  - and he went away
  - and he has surely gone
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the departure. 'Has
    gone on his way' captures both the completed departure and the emphatic sense
    without sounding wooden. The idiom implies he is fully gone.
