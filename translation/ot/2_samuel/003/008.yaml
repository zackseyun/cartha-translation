id: 2SA.3.8
reference: 2 Samuel 3:8
source:
  edition: WLC
  text: וַ/יִּחַר֩ לְ/אַבְנֵ֨ר מְאֹ֜ד עַל דִּבְרֵ֣י אִֽישׁ בֹּ֗שֶׁת וַ/יֹּ֨אמֶר֙ הֲ/רֹ֨אשׁ
    כֶּ֥לֶב אָנֹ֘כִי֮ אֲשֶׁ֣ר לִֽ/יהוּדָה֒ הַ/יּ֨וֹם אֶֽעֱשֶׂה חֶ֜סֶד עִם בֵּ֣ית שָׁא֣וּל
    אָבִ֗י/ךָ אֶל אֶחָי/ו֙ וְ/אֶל מֵ֣רֵעֵ֔/הוּ וְ/לֹ֥א הִמְצִיתִ֖/ךָ בְּ/יַד דָּוִ֑ד
    וַ/תִּפְקֹ֥ד עָלַ֛/י עֲוֺ֥ן הָ/אִשָּׁ֖ה הַ/יּֽוֹם־־־־׀־־־׃
translation:
  text: Then Abner became very angry because of Ish-bosheth’s words, and he said,
    “Am I a dog’s head that belongs to Judah? To this day I have shown covenant loyalty
    to the house of Saul your father, to his brothers, and to his friends, and have
    not delivered you into David’s hand; yet today you charge me with guilt concerning
    this woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a dog’s head that belongs to Judah,' a difficult insult idiom. It
      likely means something like 'a contemptible dog aligned with Judah,' but the
      translation preserves the metaphor more literally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְאַבְנֵר מְאֹד
  chosen: Then Abner became very angry
  alternatives:
  - Then Abner burned greatly
  - Then Abner was very furious
  lexicon: HALOT
  rationale: The idiom חרה ל expresses anger kindling or burning. 'Became very angry'
    renders the Hebrew idiom in clear modern English while preserving the intensity
    marked by מְאֹד.
- source_word: עַל דִּבְרֵי אִישׁ בֹּשֶׁת
  chosen: because of Ish-bosheth’s words
  alternatives:
  - at the words of Ish-bosheth
  - over Ish-bosheth’s words
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'Because of' naturally conveys עַל
    here as the cause of Abner's anger.
- source_word: הֲרֹאשׁ כֶּלֶב אָנֹכִי אֲשֶׁר לִיהוּדָה
  chosen: Am I a dog’s head that belongs to Judah?
  alternatives:
  - Am I a dog's head of Judah?
  - Am I the head of a dog belonging to Judah?
  lexicon: HALOT
  rationale: This is a difficult insult idiom. Retaining 'dog’s head' preserves the
    metaphor rather than flattening it into an interpretive paraphrase. אֲשֶׁר לִיהוּדָה
    is best taken as 'that belongs to Judah' or 'on Judah’s side,' expressing Abner’s
    denial that he is some contemptible Judahite partisan. The more literal wording
    keeps the rhetorical force and ambiguity auditable.
- source_word: הַיּוֹם
  chosen: To this day
  alternatives:
  - Today
  lexicon: HALOT
  rationale: In context Abner refers to his conduct up to the present, not merely
    on the current calendar day. 'To this day' captures the retrospective force here.
- source_word: אֶעֱשֶׂה חֶסֶד
  chosen: I have shown covenant loyalty
  alternatives:
  - I show kindness
  - I have dealt loyally
  - I have shown steadfast love
  lexicon: HALOT
  rationale: חֶסֶד is broader and weightier than mere kindness. In this political-relational
    context, 'covenant loyalty' best conveys faithful allegiance and beneficence without
    importing sentimentality. The perfective sense in English is supplied by context
    with 'To this day.'
- source_word: עִם בֵּית שָׁאוּל אָבִיךָ
  chosen: to the house of Saul your father
  alternatives:
  - with the house of Saul your father
  lexicon: HALOT
  rationale: עִם can be rendered 'with,' but English idiom with 'show loyalty' more
    naturally takes 'to.' 'House of Saul' preserves the dynastic sense.
- source_word: אֶל אֶחָיו וְאֶל מֵרֵעֵהוּ
  chosen: to his brothers, and to his friends
  alternatives:
  - to his kinsmen, and to his companions
  lexicon: HALOT
  rationale: אֶחָיו is literally 'his brothers,' likely including close male kin;
    'brothers' preserves the source form. מֵרֵעֵהוּ denotes companion/friend/associate;
    'friends' is natural and sufficiently broad.
- source_word: וְלֹא הִמְצִיתִךָ בְּיַד דָּוִד
  chosen: and have not delivered you into David’s hand
  alternatives:
  - and have not handed you over into David’s hand
  - and have not let David capture you
  lexicon: HALOT
  rationale: The causative verb with 'into the hand of' is a standard idiom for giving
    someone over to another's power. 'Delivered you into David’s hand' preserves the
    idiom and its political-military force.
- source_word: וַתִּפְקֹד עָלַי עֲוֺן הָאִשָּׁה
  chosen: yet today you charge me with guilt concerning this woman
  alternatives:
  - yet today you call me to account for this woman’s iniquity
  - yet today you visit on me the guilt of this woman
  lexicon: HALOT
  rationale: פקד על with עָוֺן can mean to call to account, charge, or punish for
    guilt. 'Charge me with guilt concerning this woman' communicates the accusation
    clearly in contemporary English while preserving the legal-moral sense. 'This
    woman' refers to Rizpah in context without adding her name to the main text.
