id: 2SA.3.15
reference: 2 Samuel 3:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ אִ֣ישׁ בֹּ֔שֶׁת וַ/יִּקָּחֶ֖/הָ מֵ֣/עִֽם אִ֑ישׁ מֵ/עִ֖ם פַּלְטִיאֵ֥ל
    בֶּן לוש־׃
translation:
  text: So Ish-bosheth sent and took her from her husband, from Paltiel the son of
    Laish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the man, from Paltiel son of Laish.'' The translation makes
      explicit that ''the man'' is her husband.'
    reason: lexical_alternative
  - marker: b
    text: Some English versions use 'Palti' in related passages; the Hebrew form here
      is Paltiel.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative form is most naturally
    rendered 'sent.' In context it implies sending agents to retrieve Michal, but
    the object of sending is not stated, so 'sent' is preferable to the more interpretive
    'sent word' or 'sent men.'
- source_word: אִישׁ בֹּשֶׁת
  chosen: Ish-bosheth
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. The two-part proper name is represented in established English form
    as 'Ish-bosheth.'
- source_word: וַיִּקָּחֶהָ
  chosen: took her
  alternatives:
  - fetched her
  - seized her
  lexicon: HALOT
  rationale: לקח with 3fs suffix means 'took her.' 'Fetched her' is possible in context,
    but 'took her' stays closer to the Hebrew and preserves the force of removal without
    overinterpreting. 'Seized her' is too strong for the bare verb here.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from being with
  - away from
  lexicon: HALOT
  rationale: The preposition with עִם denotes separation from someone's company or
    custody. English 'from' communicates this naturally; the repeated phrase is retained
    to mirror the Hebrew emphasis.
- source_word: אִישׁ
  chosen: her husband
  alternatives:
  - the man
  lexicon: HALOT
  rationale: Although the noun literally means 'man,' in this context it refers to
    Michal's marital partner. Rendering it 'her husband' makes explicit the relational
    sense required by the context and avoids awkward ambiguity in English.
- source_word: פַּלְטִיאֵל
  chosen: Paltiel
  alternatives:
  - Paltiel
  lexicon: HALOT
  rationale: The proper name is transliterated directly from the Hebrew form here
    as 'Paltiel.' This follows the MT spelling in this verse.
- source_word: בֶּן־לוּשׁ
  chosen: the son of Laish
  alternatives:
  - son of Lush
  lexicon: HALOT
  rationale: בֶּן is the standard filial expression 'son of.' The name לוש is conventionally
    rendered 'Laish' in English Bible tradition; this is a standard transliteration
    choice rather than a theological one.
