id: 2SA.3.14
reference: 2 Samuel 3:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח דָּוִד֙ מַלְאָכִ֔ים אֶל אִֽישׁ בֹּ֥שֶׁת בֶּן שָׁא֖וּל לֵ/אמֹ֑ר
    תְּנָ֤/ה אֶת אִשְׁתִּ/י֙ אֶת מִיכַ֔ל אֲשֶׁר֙ אֵרַ֣שְׂתִּי לִ֔/י בְּ/מֵאָ֖ה עָרְל֥וֹת
    פְּלִשְׁתִּֽים־־־־־׃
translation:
  text: Then David sent messengers to Ish-bosheth son of Saul, saying, “Give me my
    wife Michal, whom I betrothed to myself for a hundred Philistine foreskins.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “whom I won as my wife for a hundred Philistine
      foreskins.” The Hebrew more literally says, “whom I betrothed to myself.”
    reason: lexical_alternative
  - marker: b
    text: See 1 Samuel 18:25–27 for the account of David obtaining Michal by presenting
      Philistine foreskins as the bride-price Saul demanded.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then David sent
  alternatives:
  - And David sent
  - So David sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence without overinterpreting causation.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: The term commonly means 'messengers' in human contexts. 'Envoys' is possible
    but slightly more interpretive and formal.
- source_word: אֶל אִישׁ בֹּשֶׁת בֶּן שָׁאוּל
  chosen: to Ish-bosheth son of Saul
  alternatives:
  - to Ishbosheth, Saul's son
  lexicon: HALOT
  rationale: Standard transliteration of the personal name is retained, and 'son of
    Saul' closely follows the Hebrew apposition.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'with this message:'
  lexicon: HALOT
  rationale: A standard rendering that preserves the direct-speech introduction with
    minimal expansion.
- source_word: תְּנָה
  chosen: Give me
  alternatives:
  - Hand over to me
  - Give over to me
  lexicon: HALOT
  rationale: Imperative of נתן. 'Give me' is the most direct and idiomatic equivalent
    in this demand context.
- source_word: אֶת אִשְׁתִּי אֶת מִיכַל
  chosen: my wife Michal
  alternatives:
  - my wife, Michal
  lexicon: HALOT
  rationale: The appositional structure identifies the wife as Michal. English naturally
    compresses the repeated object marker into 'my wife Michal.'
- source_word: אֲשֶׁר אֵרַשְׂתִּי לִי
  chosen: whom I betrothed to myself
  alternatives:
  - whom I acquired as my betrothed
  - whom I espoused for myself
  lexicon: HALOT
  rationale: The verb ארשׂ refers to betrothal, not merely marriage in general. The
    dative לִי is retained with 'to myself,' reflecting David's claim of lawful prior
    right, though the English is slightly marked.
- source_word: בְּמֵאָה
  chosen: for a hundred
  alternatives:
  - with a hundred
  - at the price of a hundred
  lexicon: HALOT
  rationale: The preposition here expresses the bride-price basis or cost by which
    David secured Michal. 'For a hundred' is concise and idiomatic.
- source_word: עָרְלוֹת פְּלִשְׁתִּים
  chosen: Philistine foreskins
  alternatives:
  - the foreskins of a hundred Philistines
  lexicon: HALOT
  rationale: A literal rendering is warranted; the phrase refers to the grisly bride-price
    proof in 1 Samuel 18. 'Philistine foreskins' is direct and preserves the concrete
    wording.
