theological_decisions:
- issue: Marital status terminology in relation to Michal
  chosen_reading: Render אֵרַשְׂתִּי with 'betrothed' while still translating אִשְׁתִּי
    as 'my wife.'
  alternative_readings:
  - Render more generally as 'married' to smooth the English tension
  - Render more woodenly as 'my woman/wife ... whom I espoused'
  rationale: 'The Hebrew itself contains legal-relational tension: David calls Michal
    ''my wife'' while grounding his claim in prior betrothal/bride-price language.
    Preserving both reflects the source rather than harmonizing it.'
  doctrine_reference: Preserve theological tension rather than resolve it.
