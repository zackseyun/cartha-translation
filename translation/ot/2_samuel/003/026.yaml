id: 2SA.3.26
reference: 2 Samuel 3:26
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א יוֹאָב֙ מֵ/עִ֣ם דָּוִ֔ד וַ/יִּשְׁלַ֤ח מַלְאָכִים֙ אַחֲרֵ֣י אַבְנֵ֔ר
    וַ/יָּשִׁ֥בוּ אֹת֖/וֹ מִ/בּ֣וֹר הַסִּרָ֑ה וְ/דָוִ֖ד לֹ֥א יָדָֽע׃
translation:
  text: Then Joab went out from David and sent messengers after Abner, and they brought
    him back from the well of Sirah. But David did not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'from Bor-sirah,' treating the Hebrew as a place-name rather
      than 'the well of Sirah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: HALOT
  rationale: The verb יצא in the wayyiqtol narrative sequence is most naturally rendered
    'went out.' 'Left' is possible, but 'went out from David' preserves the concrete
    movement expressed by the Hebrew.
- source_word: מֵעִם דָּוִד
  chosen: from David
  alternatives:
  - from being with David
  - away from David
  lexicon: HALOT
  rationale: The preposition with עִם literally conveys movement from being with someone.
    'From David' is idiomatic English and sufficiently preserves the sense without
    awkwardness.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this narrative context מלאכים refers to human agents sent with a message,
    not angels. 'Messengers' is the standard and clearest rendering.
- source_word: אַחֲרֵי אַבְנֵר
  chosen: after Abner
  alternatives:
  - in pursuit of Abner
  - to follow Abner
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי here indicates pursuit/following. 'After Abner'
    is concise and natural, while still allowing the context to imply pursuit.
- source_word: וַיָּשִׁבוּ אֹתוֹ
  chosen: they brought him back
  alternatives:
  - they returned him
  - they caused him to return
  lexicon: HALOT
  rationale: The Hiphil of שוב is causative. 'They brought him back' is idiomatic
    English that accurately reflects the causative force better than the wooden 'returned
    him.'
- source_word: מִבּוֹר הַסִּרָה
  chosen: from the well of Sirah
  alternatives:
  - from the cistern of Sirah
  - from Bor-sirah
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or well. In a place-name expression
    with the article and proper name, 'the well of Sirah' is a natural rendering in
    English Bible style. 'Cistern' is possible but less certain here; some take the
    phrase more like a toponym ('Bor-sirah'), which is preserved in a footnote.
- source_word: וְדָוִד לֹא יָדָע
  chosen: But David did not know it
  alternatives:
  - and David did not know
  - but David was unaware
  lexicon: HALOT
  rationale: The clause indicates David's lack of knowledge regarding Joab's action.
    Adding 'it' makes the English complete and explicit without importing new content.
    'But' captures the contrastive force naturally in context.
