id: 2SA.3.6
reference: 2 Samuel 3:6
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּֽ/הְיוֹת֙ הַ/מִּלְחָמָ֔ה בֵּ֚ין בֵּ֣ית שָׁא֔וּל וּ/בֵ֖ין בֵּ֣ית
    דָּוִ֑ד וְ/אַבְנֵ֛ר הָיָ֥ה מִתְחַזֵּ֖ק בְּ/בֵ֥ית שָׁאֽוּל׃
translation:
  text: Now while the war continued between the house of Saul and the house of David,
    Abner was strengthening himself in the house of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was growing strong in the house of Saul.' The Hebrew verb can denote
      becoming strong or strengthening oneself; the reflexive form here likely suggests
      Abner was consolidating his own position within Saul's house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a new development in the narrative.
    In modern English, 'Now' preserves the discourse function without archaic phrasing
    like 'it came to pass.'
- source_word: בִּהְיוֹת הַמִּלְחָמָה
  chosen: while the war continued
  alternatives:
  - when there was war
  - during the war
  - while the war was going on
  lexicon: HALOT
  rationale: The infinitive construct with ב plus היה expresses a durative temporal
    clause. 'While the war continued' captures the ongoing state more naturally than
    a wooden 'in the being of the war.'
- source_word: הַמִּלְחָמָה
  chosen: the war
  alternatives:
  - the fighting
  - the conflict
  lexicon: HALOT
  rationale: The noun plainly refers to the ongoing armed struggle already in view;
    'war' is the most direct and contextually appropriate rendering.
- source_word: בֵּין בֵּית שָׁאוּל וּבֵין בֵּית דָּוִד
  chosen: between the house of Saul and the house of David
  alternatives:
  - between Saul's house and David's house
  - between the dynasty of Saul and the dynasty of David
  lexicon: HALOT
  rationale: '''House'' is retained because it can denote both household and dynastic
    faction, and this political/familial sense is important in Samuel. ''Dynasty''
    is interpretive and narrower than the Hebrew.'
- source_word: וְאַבְנֵר
  chosen: Abner
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הָיָה מִתְחַזֵּק
  chosen: was strengthening himself
  alternatives:
  - was growing strong
  - was making himself strong
  - was becoming powerful
  lexicon: HALOT
  rationale: The hithpael of חזק is reflexive/intensive. 'Was strengthening himself'
    preserves the reflexive nuance and suggests Abner's consolidation of his own position.
    Smoother alternatives like 'was growing strong' are possible but less explicit
    about the self-advancing force of the form.
- source_word: בְּבֵית שָׁאוּל
  chosen: in the house of Saul
  alternatives:
  - within the house of Saul
  - in Saul's house
  - among the house of Saul
  lexicon: HALOT
  rationale: The preposition ב with 'house of Saul' most naturally indicates the sphere
    or power base within which Abner was consolidating influence. 'In the house of
    Saul' preserves the Hebrew idiom and leaves open both household and political
    dimensions.
