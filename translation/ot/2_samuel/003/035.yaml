id: 2SA.3.35
reference: 2 Samuel 3:35
source:
  edition: WLC
  text: וַ/יָּבֹ֣א כָל הָ/עָ֗ם לְ/הַבְר֧וֹת אֶת דָּוִ֛ד לֶ֖חֶם בְּ/ע֣וֹד הַ/יּ֑וֹם
    וַ/יִּשָּׁבַ֨ע דָּוִ֜ד לֵ/אמֹ֗ר כֹּ֣ה יַעֲשֶׂה לִּ֤/י אֱלֹהִים֙ וְ/כֹ֣ה יֹסִ֔יף
    כִּ֣י אִם לִ/פְנֵ֧י בֽוֹא הַ/שֶּׁ֛מֶשׁ אֶטְעַם לֶ֖חֶם א֥וֹ כָל מְאֽוּמָה־־־־־־־׃
translation:
  text: Then all the people came to urge David to eat bread while it was still day,
    but David swore, saying, “May God do so to me, and more also, if before the sun
    goes down I taste bread or anything at all.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread'; here it can function more broadly for food, but the translation
      retains the concrete term.
    reason: lexical_alternative
  - marker: b
    text: 'The oath formula is a conventional self-curse: ''May God do so to me, and
      more also.'' The specific punishment is left unstated in Hebrew.'
    reason: cultural_note
lexical_decisions:
- source_word: לְהַבְרוֹת
  chosen: to urge ... to eat
  alternatives:
  - to make ... eat
  - to bring food to
  - to comfort with food
  lexicon: HALOT
  rationale: The Hiphil of ברה in this context refers to providing/urging mourning
    food; idiomatically here the people are trying to get David to take food. 'Urge
    David to eat' captures the action naturally in English without losing the concrete
    object 'bread' later in the clause.
- source_word: לֶחֶם
  chosen: eat bread
  alternatives:
  - eat food
  lexicon: HALOT
  rationale: Although לֶחֶם can function broadly as 'food,' retaining 'bread' preserves
    the Hebrew wording and the mourning/fasting setting. English still understands
    'eat bread' idiomatically enough here.
- source_word: בְּעוֹד הַיּוֹם
  chosen: while it was still day
  alternatives:
  - during the day
  - before the day ended
  lexicon: HALOT
  rationale: This temporal phrase means the day had not yet ended. 'While it was still
    day' is natural English and prepares for the later explicit reference to sunset.
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  lexicon: HALOT
  rationale: A straightforward rendering of the oath verb that fits the solemn formula
    that follows.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יֹסִיף
  chosen: May God do so to me, and more also
  alternatives:
  - Thus may God do to me and thus add
  - May God punish me, and more besides
  lexicon: HALOT
  rationale: This is a standard Hebrew self-imprecatory oath formula. The chosen rendering
    preserves the idiomatic force in recognizable English without over-specifying
    the unstated punishment.
- source_word: כִּי אִם
  chosen: if
  alternatives:
  - surely if
  - indeed if
  lexicon: HALOT
  rationale: In oath contexts כִּי אִם introduces the condition of the self-curse.
    English idiom is best served by a simple 'if' after the oath formula.
- source_word: לִפְנֵי בּוֹא הַשֶּׁמֶשׁ
  chosen: before the sun goes down
  alternatives:
  - before the sun comes in
  - before sunset
  lexicon: HALOT
  rationale: Literally 'before the coming of the sun,' but idiomatically it means
    before sunset. 'Before the sun goes down' is clear, natural, and faithful.
- source_word: אֶטְעַם
  chosen: I taste
  alternatives:
  - I eat
  - I partake of
  lexicon: HALOT
  rationale: 'The verb טעם is literally ''taste.'' Keeping ''taste'' preserves the
    emphatic breadth of the vow: David will not take even a small amount.'
- source_word: אוֹ כָל מְאוּמָה
  chosen: or anything at all
  alternatives:
  - or anything
  - or any thing whatsoever
  lexicon: HALOT
  rationale: This phrase broadens the prohibition beyond bread to absolutely anything.
    'Anything at all' conveys the emphatic totality in natural English.
