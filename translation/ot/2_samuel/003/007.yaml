id: 2SA.3.7
reference: 2 Samuel 3:7
source:
  edition: WLC
  text: וּ/לְ/שָׁא֣וּל פִּלֶ֔גֶשׁ וּ/שְׁמָ֖/הּ רִצְפָּ֣ה בַת אַיָּ֑ה וַ/יֹּ֨אמֶר֙
    אֶל אַבְנֵ֔ר מַדּ֥וּעַ בָּ֖אתָה אֶל פִּילֶ֥גֶשׁ אָבִֽ/י־־־׃
translation:
  text: Now Saul had a concubine whose name was Rizpah daughter of Aiah. And Ish-bosheth
    said to Abner, “Why did you go in to my father’s concubine?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “Why did you have relations with my father’s concubine?”
      The Hebrew says “go in to,” a common sexual euphemism.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשָׁאוּל
  chosen: Now Saul had
  alternatives:
  - And Saul had
  - Saul also had
  - There was for Saul
  lexicon: HALOT
  rationale: The prefixed waw + lamed introduces background information. English idiom
    is best conveyed as 'Now Saul had' rather than a wooden 'And to Saul [there was].'
    The possessive/existential sense of ל is naturally represented by 'had.'
- source_word: פִּלֶגֶשׁ / פִּילֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The standard lexical sense is 'concubine.' This preserves the social-legal
    category in the Hebrew text better than an explanatory paraphrase.
- source_word: וּשְׁמָהּ
  chosen: whose name was
  alternatives:
  - and her name was
  lexicon: HALOT
  rationale: English relative style is smoother while preserving the identifying function
    of the Hebrew phrase.
- source_word: רִצְפָּה
  chosen: Rizpah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בַת אַיָּה
  chosen: daughter of Aiah
  alternatives:
  - the daughter of Aiah
  lexicon: HALOT
  rationale: A straightforward patronymic/genitival construction; 'daughter of Aiah'
    is the natural English rendering.
- source_word: וַיֹּאמֶר
  chosen: And Ish-bosheth said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Although the Hebrew subject is implicit ('and he said'), the discourse
    context identifies the speaker as Ish-bosheth from the preceding verse. Supplying
    the subject in English avoids ambiguity and reflects normal narrative translation
    practice without adding new content.
- source_word: אֶל אַבְנֵר
  chosen: to Abner
  lexicon: HALOT
  rationale: Standard rendering of the preposition אֶל with a speech verb.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative 'Why' is the natural modern English equivalent.
- source_word: בָּאתָה
  chosen: did you go in
  alternatives:
  - have you gone in
  - did you come in
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/go,' but with אֶל plus a woman in
    this context it is a sexual euphemism. 'Go in to' preserves the idiom and its
    euphemistic force better than flattening it to 'sleep with' or rendering it woodenly
    as merely 'come to.'
- source_word: אֶל פִּילֶגֶשׁ אָבִי
  chosen: to my father’s concubine
  alternatives:
  - with my father's concubine
  lexicon: HALOT
  rationale: Retains the Hebrew preposition and the euphemistic construction. The
    possessive chain is naturally rendered 'my father's concubine.'
