id: 2SA.3.33
reference: 2 Samuel 3:33
source:
  edition: WLC
  text: וַ/יְקֹנֵ֥ן הַ/מֶּ֛לֶךְ אֶל אַבְנֵ֖ר וַ/יֹּאמַ֑ר הַ/כְּ/מ֥וֹת נָבָ֖ל יָמ֥וּת
    אַבְנֵֽר־׃
translation:
  text: And the king lamented over Abner and said, “Should Abner die as a fool dies?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Should Abner die like the death of a fool?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקֹנֵן
  chosen: lamented
  alternatives:
  - sang a lament
  - chanted a dirge
  - mourned
  lexicon: HALOT
  rationale: The verb קונן denotes taking up a lament or dirge. 'Lamented' is natural
    modern English and preserves the formal mourning sense without sounding overly
    technical. Because the following clause quotes the lament, 'lamented' fits better
    than the more generic 'mourned'.
- source_word: אֶל
  chosen: over
  alternatives:
  - for
  - concerning
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with verbs of lament it can mark the
    object of lament. 'Over Abner' is idiomatic English for mourning someone and best
    reflects the sense in context.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun referring to David in narrative context;
    no reason to substitute the proper name in translation.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - sang
  - declared
  lexicon: HALOT
  rationale: The common narrative verb 'said' introduces the quoted lament. While
    the speech is poetic, the Hebrew uses the ordinary verb for speaking.
- source_word: הַכְּמוֹת
  chosen: Should ... die
  alternatives:
  - Like the death of
  - As one dies
  lexicon: HALOT
  rationale: The phrase literally begins 'like the dying/death of.' In idiomatic English,
    the rhetorical question 'Should Abner die...' best captures the lament force and
    the comparative construction when paired with 'as a fool dies.'
- source_word: נָבָל
  chosen: a fool
  alternatives:
  - a wicked fool
  - a scoundrel
  lexicon: HALOT
  rationale: נבל can denote not merely intellectual foolishness but morally base,
    disgraceful folly. 'A fool' is the most direct lexical equivalent and preserves
    the biblical resonance; the moral nuance is contextually carried by the shameful
    kind of death in view.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - should die
  - must die
  lexicon: HALOT
  rationale: The imperfect here functions within a rhetorical lament. In English,
    the full clause is best rendered as a rhetorical question, 'Should Abner die as
    a fool dies?' This conveys the protest implicit in the lament better than a flat
    indicative.
- source_word: אַבְנֵר
  chosen: Abner
  rationale: Personal name is transliterated according to the translation philosophy.
