id: 2SA.3.34
reference: 2 Samuel 3:34
source:
  edition: WLC
  text: יָדֶ֣/ךָ לֹֽא אֲסֻר֗וֹת וְ/רַגְלֶ֨י/ךָ֙ לֹא לִ/נְחֻשְׁתַּ֣יִם הֻגָּ֔שׁוּ כִּ/נְפ֛וֹל
    לִ/פְנֵ֥י בְנֵֽי עַוְלָ֖ה נָפָ֑לְתָּ וַ/יֹּסִ֥פוּ כָל הָ/עָ֖ם לִ/בְכּ֥וֹת עָלָֽי/ו־־־־׃
translation:
  text: Your hands were not bound, and your feet were not put into bronze fetters;
    as one falls before sons of injustice, so you have fallen. And all the people
    wept over him even more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'before wicked men' or 'before evildoers.' The Hebrew
      reads literally 'before sons of injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶךָ לֹא אֲסֻרוֹת
  chosen: Your hands were not bound
  alternatives:
  - Your hands were not tied
  lexicon: HALOT
  rationale: אָסַר in the passive participial form denotes being bound or tied. 'Bound'
    is the more natural and idiomatic English in a lament context and fits the implied
    contrast with a prisoner or condemned man.
- source_word: וְרַגְלֶיךָ לֹא לִנְחֻשְׁתַּיִם הֻגָּשׁוּ
  chosen: and your feet were not put into bronze fetters
  alternatives:
  - and your feet were not brought to bronze shackles
  - and your feet were not put in chains
  lexicon: HALOT
  rationale: נְחֻשְׁתַּיִם refers to bronze/copper restraints; 'bronze fetters' preserves
    the material and the sense of leg restraints. הֻגָּשׁוּ literally 'were brought
    near/to,' but in this idiom means being placed into restraints.
- source_word: כִּנְפוֹל
  chosen: as one falls
  alternatives:
  - like falling
  - as when one falls
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ functions comparativally. Supplying
    'one' makes the English idiomatic while preserving the generic comparison.
- source_word: לִפְנֵי בְנֵי עַוְלָה
  chosen: before sons of injustice
  alternatives:
  - before wicked men
  - before evildoers
  - before sons of wickedness
  lexicon: HALOT
  rationale: בְנֵי עַוְלָה is literally 'sons of injustice/wrongdoing,' a Hebrew idiom
    for wicked men. The main text keeps the Hebraic force with 'sons of injustice,'
    while a more idiomatic alternative is preserved in a footnote.
- source_word: נָפָלְתָּ
  chosen: so you have fallen
  alternatives:
  - so you fell
  lexicon: HALOT
  rationale: The perfect here states the completed tragic outcome in the lament. 'Have
    fallen' conveys the present force of the completed event in English lament speech.
- source_word: וַיֹּסִפוּ כָל הָעָם לִבְכּוֹת עָלָיו
  chosen: And all the people wept over him even more
  alternatives:
  - And all the people continued to weep over him
  - And all the people added to weep over him
  lexicon: HALOT
  rationale: 'יָסַף + infinitive means to continue or do more of an action. In context,
    after David''s lament, the sense is intensification: the people wept all the more
    over Abner.'
