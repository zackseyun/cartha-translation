id: 2SA.3.4
reference: 2 Samuel 3:4
source:
  edition: WLC
  text: וְ/הָ/רְבִיעִ֖י אֲדֹנִיָּ֣ה בֶן חַגִּ֑ית וְ/הַ/חֲמִישִׁ֖י שְׁפַטְיָ֥ה בֶן
    אֲבִיטָֽל־־׃
translation:
  text: the fourth, Adonijah son of Haggith; and the fifth, Shephatiah son of Abital.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew begins with 'and the fourth,' continuing the list from the previous
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרְבִיעִי
  chosen: the fourth
  alternatives:
  - and the fourth
  lexicon: HALOT
  rationale: Ordinal adjective with prefixed conjunction. In English list style, the
    conjunction is not required at the start of the verse because it continues the
    sequence from the previous verse; 'the fourth' reads naturally while preserving
    the ordinal force.
- source_word: אֲדֹנִיָּה
  chosen: Adonijah
  rationale: Personal name transliterated rather than translated, following the project's
    policy to transliterate names by standard conventions.
- source_word: בֶן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Construct form indicating direct filiation. 'Son of' is the standard
    concise genealogical rendering in English.
- source_word: חַגִּית
  chosen: Haggith
  rationale: Personal name transliterated by standard English convention.
- source_word: וְהַחֲמִישִׁי
  chosen: and the fifth
  alternatives:
  - the fifth
  lexicon: HALOT
  rationale: Ordinal adjective with conjunction introducing the next item in the sequence.
    Here the conjunction is retained because it links the two names within the verse.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  rationale: Personal name transliterated according to common English biblical convention.
    'Shephatiah' is more familiar in English than a tighter transliteration.
- source_word: אֲבִיטָל
  chosen: Abital
  rationale: Personal name transliterated by standard English convention.
