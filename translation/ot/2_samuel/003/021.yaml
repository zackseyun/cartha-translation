theological_decisions:
- issue: Rendering of covenant language
  chosen_reading: make a covenant with you
  alternative_readings:
  - cut a covenant with you
  - enter into a covenant with you
  rationale: The verse concerns political covenant-making, not a specifically disputed
    theological covenant formula. The main text uses clear English while preserving
    the more literal idiom in documentation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of נפשׁ in an idiomatic desire expression
  chosen_reading: your soul desires
  alternative_readings:
  - you desire
  - your heart desires
  rationale: The Hebrew explicitly uses נפשׁ. Preserving 'soul' maintains lexical
    transparency and avoids flattening the anthropological language, while the alternatives
    are noted because English idiom often prefers them.
  doctrine_reference: Translation philosophy §1, §5
