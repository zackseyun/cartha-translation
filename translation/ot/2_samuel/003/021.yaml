id: 2SA.3.21
reference: 2 Samuel 3:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַבְנֵ֣ר אֶל דָּוִ֡ד אָק֣וּמָה וְֽ/אֵלֵ֡כָה וְ/אֶקְבְּצָה֩ אֶל
    אֲדֹנִ֨/י הַ/מֶּ֜לֶךְ אֶת כָּל יִשְׂרָאֵ֗ל וְ/יִכְרְת֤וּ אִתְּ/ךָ֙ בְּרִ֔ית וּ/מָ֣לַכְתָּ֔
    בְּ/כֹ֥ל אֲשֶׁר תְּאַוֶּ֖ה נַפְשֶׁ֑/ךָ וַ/יְּשַׁלַּ֥ח דָּוִ֛ד אֶת אַבְנֵ֖ר וַ/יֵּ֥לֶךְ
    בְּ/שָׁלֽוֹם־׀־־־־־׃
translation:
  text: Abner said to David, “I will arise and go, and I will gather all Israel to
    my lord the king, so that they may make a covenant with you, and you shall reign
    over all that your soul desires.” Then David sent Abner away, and he went in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant with you.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'over all that you desire'; Hebrew, 'over all that your soul desires.'
    reason: lexical_alternative
  - marker: c
    text: '''Went in peace'' is a Hebrew idiom for departing safely and on peaceful
      terms.'
    reason: cultural_note
lexical_decisions:
- source_word: אָק֣וּמָה
  chosen: I will arise
  alternatives:
  - I will get up
  - let me arise
  lexicon: HALOT
  rationale: The cohortative expresses Abner’s declared intention. 'Arise' preserves
    the formal sense and the rhetorical force better than the flatter 'get up.'
- source_word: וְֽאֵלֵכָה
  chosen: and go
  alternatives:
  - and I will go
  - and depart
  lexicon: HALOT
  rationale: Linked with the preceding cohortative, this continues Abner’s stated
    resolve. English omits the repeated subject naturally while preserving sequence.
- source_word: וְאֶקְבְּצָה
  chosen: and I will gather
  alternatives:
  - and assemble
  - and bring together
  lexicon: HALOT
  rationale: '''Gather'' is the most direct rendering of קבץ here, referring to bringing
    the tribes together politically under David.'
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  chosen: to my lord the king
  alternatives:
  - to my master the king
  - for my lord the king
  lexicon: HALOT
  rationale: The preposition is best taken as directional with the gathering brought
    to David. 'My lord the king' preserves courtly address without importing servile
    nuance from 'master.'
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the collective tribal entity.
- source_word: וְיִכְרְתוּ אִתְּךָ בְּרִית
  chosen: so that they may make a covenant with you
  alternatives:
  - and they will cut a covenant with you
  - and they may enter into a covenant with you
  lexicon: HALOT
  rationale: כרת ברית is the standard covenant-making idiom. 'Make a covenant' is
    clear modern English; the literal 'cut' is preserved as an alternative because
    of its ritual background.
- source_word: וּמָלַכְתָּ
  chosen: and you shall reign
  alternatives:
  - and you will be king
  - and you shall rule as king
  lexicon: HALOT
  rationale: The verb denotes exercising kingship. 'Reign' is concise and idiomatic.
- source_word: בְּכֹל אֲשֶׁר תְּאַוֶּה נַפְשֶׁךָ
  chosen: over all that your soul desires
  alternatives:
  - over all that you desire
  - over everything your heart desires
  lexicon: HALOT
  rationale: נפש here refers to the inner self as the seat of desire. 'Your soul desires'
    preserves the Hebrew expression more closely than the more idiomatic but interpretive
    'heart desires.'
- source_word: וַיְשַׁלַּח ... אֶת אַבְנֵר
  chosen: David sent Abner away
  alternatives:
  - David dismissed Abner
  - David let Abner go
  lexicon: HALOT
  rationale: In context the verb means to send off or dismiss, not merely 'send.'
    'Sent away' captures the departure sense.
- source_word: וַיֵּלֶךְ בְּשָׁלוֹם
  chosen: and he went in peace
  alternatives:
  - and he went peacefully
  - and he departed in peace
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression indicating a peaceful departure
    and safe release. 'Went in peace' preserves the idiom while remaining understandable.
