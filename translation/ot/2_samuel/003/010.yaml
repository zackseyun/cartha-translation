id: 2SA.3.10
reference: 2 Samuel 3:10
source:
  edition: WLC
  text: לְ/הַֽעֲבִ֥יר הַ/מַּמְלָכָ֖ה מִ/בֵּ֣ית שָׁא֑וּל וּ/לְ/הָקִ֞ים אֶת כִּסֵּ֣א
    דָוִ֗ד עַל יִשְׂרָאֵל֙ וְ/עַל יְהוּדָ֔ה מִ/דָּ֖ן וְ/עַד בְּאֵ֥ר שָֽׁבַע־־־־׃
translation:
  text: to transfer the kingdom from the house of Saul and to establish the throne
    of David over Israel and over Judah, from Dan to Beer-sheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Dan as far as Beer-sheba,' a geographic idiom meaning the whole
      land from north to south.
    reason: cultural_note
lexical_decisions:
- source_word: לְהַעֲבִיר
  chosen: to transfer
  alternatives:
  - to remove
  - to cause to pass over
  lexicon: HALOT
  rationale: The Hiphil of עבר here means causing the kingdom to pass from one holder
    to another. 'Transfer' captures the political sense clearly in modern English
    without over-paraphrasing.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: The noun denotes the kingdom/royal dominion. 'Kingdom' is the most natural
    and sufficiently broad rendering in this context of dynastic rule.
- source_word: מִבֵּית שָׁאוּל
  chosen: from the house of Saul
  alternatives:
  - from Saul's house
  - from the خاندان/dynasty of Saul
  lexicon: HALOT
  rationale: '''House'' is the standard biblical idiom for dynasty or ruling household.
    Retaining ''house of Saul'' preserves the dynastic nuance and biblical style.'
- source_word: וּלְהָקִים
  chosen: and to establish
  alternatives:
  - and to set up
  - and to raise up
  lexicon: HALOT
  rationale: In this political context קום in Hiphil means to establish or set in
    place. 'Establish' fits the formal register and the object 'throne' well.
- source_word: אֶת כִּסֵּא דָוִד
  chosen: the throne of David
  alternatives:
  - David's throne
  - the kingship of David
  lexicon: HALOT
  rationale: '''Throne'' is the concrete image in the Hebrew and naturally conveys
    royal authority. Keeping the metaphor is preferable to abstracting it to ''kingship.'''
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה
  chosen: over Israel and over Judah
  alternatives:
  - over Israel and Judah
  - for Israel and Judah
  lexicon: HALOT
  rationale: The repeated עַל is best preserved as 'over ... and over ...' to reflect
    the twofold political scope, likely emphasizing both northern Israel and Judah.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  chosen: from Dan to Beer-sheba
  alternatives:
  - from Dan as far as Beer-sheba
  lexicon: HALOT
  rationale: This is a fixed geographic idiom for the full north-to-south extent of
    the land. The conventional English form is clear and faithful.
- source_word: בְּאֵר שָׁבַע
  chosen: Beer-sheba
  alternatives:
  - Beersheba
  lexicon: HALOT
  rationale: A hyphenated transliteration preserves the two-part Hebrew name while
    remaining standard and readable in English.
