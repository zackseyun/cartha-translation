theological_decisions:
- issue: Dynastic language in 'house of Saul' and royal imagery in 'throne of David'
  chosen_reading: Retain the concrete dynastic and royal terms rather than abstracting
    them to 'dynasty' and 'rule.'
  alternative_readings:
  - from Saul's dynasty and establish David's rule
  rationale: The verse concerns political transfer of kingship, but the Hebrew expresses
    this through established biblical covenantal-dynastic imagery. Preserving 'house'
    and 'throne' maintains that texture without importing later theological claims.
  doctrine_reference: Translation philosophy §§1, 5
