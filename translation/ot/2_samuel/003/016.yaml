id: 2SA.3.16
reference: 2 Samuel 3:16
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ אִתָּ֜/הּ אִישָׁ֗/הּ הָל֧וֹךְ וּ/בָכֹ֛ה אַחֲרֶ֖י/הָ עַד בַּֽחֻרִ֑ים
    וַ/יֹּ֨אמֶר אֵלָ֥י/ו אַבְנֵ֛ר לֵ֥ךְ שׁ֖וּב וַ/יָּשֹֽׁב־׃
translation:
  text: Her husband went with her, walking and weeping behind her as far as Bahurim.
    Then Abner said to him, “Go, return.” So he returned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “after her” for “behind her.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “Go, return,” an emphatic double command; alternatively, “Go back.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this context אִישׁ with 3fs suffix refers specifically to the woman's
    husband, not merely 'man.' 'Her husband' is the natural and contextually precise
    English rendering.
- source_word: הָלוֹךְ וּבָכֹה
  chosen: walking and weeping
  alternatives:
  - continually going and weeping
  - going along and weeping
  lexicon: HALOT
  rationale: The infinitive absolute plus participial-like sequence intensifies/depicts
    ongoing action. 'Walking and weeping' preserves the durative sense in readable
    English without over-paraphrasing.
- source_word: אַחֲרֶיהָ
  chosen: behind her
  alternatives:
  - after her
  lexicon: HALOT
  rationale: Spatially, the phrase indicates following behind her. 'Behind her' is
    more idiomatic in modern English while preserving the literal sense.
- source_word: עַד בַּחֻרִים
  chosen: as far as Bahurim
  alternatives:
  - until Bahurim
  lexicon: HALOT
  rationale: עַד with a place name marks extent of movement. 'As far as Bahurim' communicates
    the endpoint naturally in English.
- source_word: בַּחֻרִים
  chosen: Bahurim
  lexicon: HALOT
  rationale: This is a place name and should be transliterated according to the project's
    policy to transliterate names rather than translate them.
- source_word: לֵךְ שׁוּב
  chosen: Go, return
  alternatives:
  - Go back
  - Go, go back
  lexicon: HALOT
  rationale: The two imperatives are both present in Hebrew. 'Go, return' preserves
    the emphatic two-word command more closely than collapsing it into a single English
    imperative, while remaining understandable.
- source_word: וַיָּשֹׁב
  chosen: So he returned
  alternatives:
  - and he returned
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he returned' gives smooth
    English narrative flow while preserving the result of Abner's command.
