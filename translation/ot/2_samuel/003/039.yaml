id: 2SA.3.39
reference: 2 Samuel 3:39
source:
  edition: WLC
  text: וְ/אָנֹכִ֨י הַ/יּ֥וֹם רַךְ֙ וּ/מָשׁ֣וּחַ מֶ֔לֶךְ וְ/הָ/אֲנָשִׁ֥ים הָ/אֵ֛לֶּה בְּנֵ֥י צְרוּיָ֖ה קָשִׁ֣ים מִמֶּ֑/נִּי יְשַׁלֵּ֧ם יְהוָ֛ה לְ/עֹשֵׂ֥ה הָ/רָעָ֖ה כְּ/רָעָתֽ/וֹ׃פ
translation:
  text: And I am still weak today, though anointed king; and these men, the sons of Zeruiah, are too harsh for me. May Yahweh repay the evildoer according to his evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And I am still tender today, though anointed king.' The Hebrew adjective can mean 'tender/soft' or, in context, 'weak.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'The LORD will repay the one who does evil according to his evil.' The Hebrew verb may also be read as a simple future.
    reason: alternative_reading
lexical_decisions:
- source_word: רַךְ
  chosen: weak
  alternatives:
  - tender
  - soft
  lexicon: HALOT
  rationale: In context David is not describing moral softness but political vulnerability or lack of strength to act against the sons of Zeruiah. 'Weak' communicates this clearly in modern English better than the more literal but potentially misleading 'tender' or 'soft'.
- source_word: וּמָשׁוּחַ מֶלֶךְ
  chosen: though anointed king
  alternatives:
  - and anointed king
  - even though I am anointed king
  lexicon: HALOT
  rationale: 'The clause is verbless and juxtaposes David''s weakness with his status as king. Rendering with concessive force (''though'') best captures the sense in English: despite being anointed king, he remains unable to control these men.'
- source_word: בְּנֵי צְרוּיָה
  chosen: the sons of Zeruiah
  alternatives:
  - Zeruiah's sons
  lexicon: HALOT
  rationale: This is a fixed familial designation for Joab and his brothers. The more formal 'the sons of Zeruiah' preserves the Hebrew expression and its rhetorical force.
- source_word: קָשִׁים מִמֶּנִּי
  chosen: are too harsh for me
  alternatives:
  - are too hard for me
  - are stronger than I
  - are too severe for me
  lexicon: HALOT
  rationale: קָשִׁים can denote hardness, severity, or harshness. In this context David laments their ruthless character and his inability to restrain them. 'Too harsh for me' captures both their severity and his practical inability to deal with them.
- source_word: יְשַׁלֵּם
  chosen: May ... repay
  alternatives:
  - will repay
  - requite
  lexicon: HALOT
  rationale: The imperfect here functions naturally as a wish or imprecation in context. 'May the LORD repay' reflects David's appeal for divine justice rather than a simple predictive statement.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֹשֵׂה הָרָעָה
  chosen: the evildoer
  alternatives:
  - the one who does evil
  - the doer of evil
  lexicon: HALOT
  rationale: The participial phrase denotes the person who commits evil. 'The evildoer' is concise, natural English and preserves the agentive sense.
- source_word: כְּרָעָתוֹ
  chosen: according to his evil
  alternatives:
  - according to his wickedness
  - according to his evil deed
  lexicon: HALOT
  rationale: The phrase calls for proportionate retribution corresponding to the person's evil. 'According to his evil' is a close rendering; 'wickedness' is possible but slightly more interpretive.
