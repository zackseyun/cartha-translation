theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of David's final statement
  chosen_reading: 'optative/imprecatory: ''May the LORD repay...'''
  alternative_readings:
  - 'predictive: ''The LORD will repay...'''
  rationale: In the immediate context David distances himself from vengeance and entrusts judgment to God. English idiom favors an optative rendering to reflect this appeal without overstating prophetic certainty.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension where ambiguity exists)
