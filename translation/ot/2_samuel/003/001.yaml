id: 2SA.3.1
reference: 2 Samuel 3:1
source:
  edition: WLC
  text: וַ/תְּהִ֤י הַ/מִּלְחָמָה֙ אֲרֻכָּ֔ה בֵּ֚ין בֵּ֣ית שָׁא֔וּל וּ/בֵ֖ין בֵּ֣ית
    דָּוִ֑ד וְ/דָוִד֙ הֹלֵ֣ךְ וְ/חָזֵ֔ק וּ/בֵ֥ית שָׁא֖וּל הֹלְכִ֥ים וְ/דַלִּֽים׃ס
translation:
  text: Now the war between the house of Saul and the house of David was prolonged,
    and David kept growing stronger, while the house of Saul kept growing weaker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was long.' The Hebrew adjective is literally 'long,' here referring
      to the duration of the war.
    reason: lexical_alternative
  - marker: b
    text: '''House'' can mean a household, family line, or ruling dynasty; the Hebrew
      likely carries both familial and political force here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - Then ... was
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next stage of the narrative. 'Now'
    gives natural English narrative progression without over-translating the conjunction.
- source_word: הַמִּלְחָמָה
  chosen: the war
  alternatives:
  - the fighting
  - the conflict
  lexicon: HALOT
  rationale: The noun plainly denotes war/hostilities. 'War' best matches the scope
    of the struggle between the two houses.
- source_word: אֲרֻכָּה
  chosen: was prolonged
  alternatives:
  - was long
  - lasted a long time
  lexicon: HALOT
  rationale: The adjective literally means 'long,' but in idiomatic English with 'war'
    the sense is duration. 'Was prolonged' preserves the durative force in readable
    English.
- source_word: בֵּין בֵּית שָׁאוּל וּבֵין בֵּית דָּוִד
  chosen: between the house of Saul and the house of David
  alternatives:
  - between Saul's house and David's house
  - between the dynasty of Saul and the dynasty of David
  lexicon: HALOT
  rationale: '''House'' is retained because it can denote both household and ruling
    house/dynasty, and this political-familial breadth is important here. A more interpretive
    ''dynasty'' is possible but narrower than the Hebrew.'
- source_word: וְדָוִד הֹלֵךְ וְחָזֵק
  chosen: David kept growing stronger
  alternatives:
  - David went on and became stronger
  - David was going and growing strong
  lexicon: HALOT
  rationale: The construction with הלך plus a following predicate expresses continuing
    progression. 'Kept growing stronger' captures the iterative/progressive sense
    in natural English.
- source_word: וּבֵית שָׁאוּל הֹלְכִים וְדַלִּים
  chosen: the house of Saul kept growing weaker
  alternatives:
  - the house of Saul kept becoming feebler
  - the house of Saul was going and becoming weak
  lexicon: HALOT
  rationale: The plural participle/adjective construction with 'house' reflects the
    members of Saul's house collectively. English idiom prefers singular treatment
    of the collective subject. 'Kept growing weaker' mirrors the progressive contrast
    with David.
- source_word: דַלִּים
  chosen: weaker
  alternatives:
  - feeble
  - poor
  - powerless
  lexicon: HALOT
  rationale: In this context the term denotes diminishing strength/status rather than
    economic poverty. 'Weaker' best fits the political-military contrast with 'stronger'.
