  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אָדָם in contrast with the LORD
  chosen_reading: man
  alternative_readings:
  - humankind
  - human beings
  - human hands
  rationale: The Hebrew singular אָדָם stands in deliberate contrast to יְהוָה and functions as a generic singular for humanity. Following the gender-accurate policy, 'man' preserves the source form and rhetorical contrast better than a pluralized or neutralized rendering.
