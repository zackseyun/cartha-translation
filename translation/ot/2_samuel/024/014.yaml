id: 2SA.24.14
reference: 2 Samuel 24:14
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר דָּוִ֛ד אֶל גָּ֖ד צַר לִ֣/י מְאֹ֑ד נִפְּלָה נָּ֤א בְ/יַד יְהוָה֙ כִּֽי רַבִּ֣ים רחמ/ו וּ/בְ/יַד אָדָ֖ם אַל אֶפֹּֽלָה־־־־־־־׃
translation:
  text: Then David said to Gad, “I am in great distress. Let us fall, please, into the hand of Yahweh, for his mercies are many; but let me not fall into the hand of man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for his compassion is abundant.' The Hebrew literally says, 'for many are his mercies.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of man'; that is, under human power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי מְאֹד
  chosen: I am in great distress
  alternatives:
  - It is very distressing to me
  - I am in deep trouble
  lexicon: HALOT
  rationale: The predicate adjective צַר with לִי expresses personal anguish or distress. 'I am in great distress' is idiomatic modern English and preserves the emotional force without over-paraphrase.
- source_word: נִפְּלָה נָּא
  chosen: Let us fall, please
  alternatives:
  - Please let us fall
  - Let me fall, please
  lexicon: HALOT
  rationale: The cohortative 1cp נִפְּלָה is best rendered 'let us fall,' reflecting David's identification with the people under judgment. נָא adds entreaty, naturally conveyed by 'please.'
- source_word: בְיַד יְהוָה
  chosen: into the hand of the LORD
  alternatives:
  - into the LORD's hand
  lexicon: HALOT
  rationale: The idiom 'into the hand of' conveys being given over to someone's power or control. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי רַבִּים רחמיו
  chosen: for his mercies are many
  alternatives:
  - for his compassion is great
  - for his compassion is abundant
  lexicon: HALOT
  rationale: רַבִּים with רחמיו is literally 'many are his mercies/compassions.' The plural 'mercies' preserves the Hebrew form and the sense of abundant compassionate acts. Singular 'compassion' is possible but less formally aligned.
- source_word: וּבְיַד אָדָם
  chosen: but let me not fall into the hand of man
  alternatives:
  - but let me not fall into human hands
  - but into the hand of man let me not fall
  lexicon: HALOT
  rationale: The contrast is between the LORD's hand and man's hand. Because אָדָם here denotes humanity generically yet in singular contrastive form, 'man' best preserves the Hebrew idiom and the project's gender-accurate policy.
- source_word: אַל אֶפֹּלָה
  chosen: let me not fall
  alternatives:
  - may I not fall
  - do not let me fall
  lexicon: HALOT
  rationale: The negative particle with 1cs imperfect expresses David's wish/request. 'Let me not fall' preserves the volitional nuance and matches the preceding cohortative structure.
