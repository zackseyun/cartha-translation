id: 2SA.24.5
reference: 2 Samuel 24:5
source:
  edition: WLC
  text: וַ/יַּעַבְר֖וּ אֶת הַ/יַּרְדֵּ֑ן וַ/יַּחֲנ֣וּ בַ/עֲרוֹעֵ֗ר יְמִ֥ין הָ/עִ֛יר
    אֲשֶׁ֛ר בְּ/תוֹךְ הַ/נַּ֥חַל הַ/גָּ֖ד וְ/אֶל יַעְזֵֽר־־־׃
translation:
  text: They crossed the Jordan and camped at Aroer, to the right of the city that
    is in the middle of the valley of Gad, and toward Jazer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to Jazer.' The Hebrew preposition can indicate either direction
      toward a place or movement to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'that is in the middle of the wadi/ravine of Gad.' The Hebrew word can
      refer to a valley, ravine, or seasonal streambed.
    reason: lexical_alternative
  - marker: c
    text: Literally 'to the right of the city.' Some interpreters understand this
      geographically as 'south of the city,' but the Hebrew expression itself is preserved
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: They crossed
  alternatives:
  - They passed over
  lexicon: HALOT
  rationale: Qal wayyiqtol of עבר in a travel narrative naturally means crossing over
    a boundary or river. 'Crossed' is idiomatic modern English and fits the direct
    object 'the Jordan.'
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name with object marker refers to the river Jordan. English
    commonly says 'the Jordan' in biblical style; 'Jordan River' is possible but less
    concise and not required by the Hebrew.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, used for setting up camp. 'Camped' is readable modern English;
    'encamped' is more formal but slightly archaic.
- source_word: בַעֲרוֹעֵר
  chosen: at Aroer
  alternatives:
  - in Aroer
  lexicon: HALOT
  rationale: The preposition ב with a place name in itinerary context is well rendered
    'at' for a stopping point.
- source_word: יְמִין הָעִיר
  chosen: to the right of the city
  alternatives:
  - on the right side of the city
  - south of the city
  lexicon: HALOT
  rationale: ימין literally means 'right hand/right side.' The most transparent rendering
    is 'to the right of the city.' Some take directional 'right' as 'south' when facing
    east, but that interpretive expansion is not demanded by the text, so the literal
    spatial wording is preferred.
- source_word: אֲשֶׁר בְּתוֹךְ הַנַּחַל
  chosen: that is in the middle of the valley
  alternatives:
  - that is within the wadi
  - that is in the midst of the ravine
  lexicon: HALOT
  rationale: The relative clause modifies 'the city.' נחל can denote a wadi, torrent-bed,
    ravine, or valley. For readable English in this geographical notice, 'valley'
    works well, while preserving the sense of a defined watercourse depression. 'In
    the middle of' reflects בתוך straightforwardly.
- source_word: הַגָּד
  chosen: of Gad
  alternatives:
  - in Gad
  lexicon: HALOT
  rationale: The phrase is most naturally taken as a genitival designation, 'the valley
    of Gad,' referring to territory associated with Gad.
- source_word: וְאֶל יַעְזֵר
  chosen: and toward Jazer
  alternatives:
  - and to Jazer
  lexicon: HALOT
  rationale: אל can mean 'to' or 'toward.' In an itinerary sequence after a camping
    notice, 'toward Jazer' best captures movement/direction without over-specifying
    arrival at Jazer within this verse.
