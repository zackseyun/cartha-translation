theological_decisions:
- issue: Nature of Araunah's gesture before the king
  chosen_reading: civil homage/prostration before a human king, rendered 'bowed down
    to the king'
  alternative_readings:
  - worshiped the king
  rationale: The Hebrew verb can describe both worship and obeisance, but here the
    object is the human king David in a courtly encounter. Rendering it as 'bowed
    down' preserves the physical act without implying divine worship.
  doctrine_reference: Translation philosophy §3 (preserve tension without importing
    doctrinal claims)
