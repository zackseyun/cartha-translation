id: 2SA.24.20
reference: 2 Samuel 24:20
source:
  edition: WLC
  text: וַ/יַּשְׁקֵ֣ף אֲרַ֗וְנָה וַ/יַּ֤רְא אֶת הַ/מֶּ֨לֶךְ֙ וְ/אֶת עֲבָדָ֔י/ו עֹבְרִ֖ים
    עָלָ֑י/ו וַ/יֵּצֵ֣א אֲרַ֔וְנָה וַ/יִּשְׁתַּ֧חוּ לַ/מֶּ֛לֶךְ אַפָּ֖י/ו אָֽרְצָ/ה־־׃
translation:
  text: Araunah looked out and saw the king and his servants coming toward him. So
    Araunah went out and bowed down to the king with his face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passing by him' or 'approaching him'; the Hebrew expression literally
      describes the king and his servants as moving in relation to Araunah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁקֵף
  chosen: looked out
  alternatives:
  - looked
  - gazed out
  - looked down
  lexicon: HALOT
  rationale: The verb commonly conveys looking out from a vantage point or through
    an opening, more specific than simply 'saw.' 'Looked out' preserves that nuance
    in natural English.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - caught sight of
  lexicon: HALOT
  rationale: A straightforward rendering of ראה following the prior verb; the sequence
    'looked out and saw' reflects the Hebrew narrative progression.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his officials
  lexicon: HALOT
  rationale: עבד often means servant(s) in royal contexts. 'Servants' is the most
    direct rendering and need not imply low status only; it can include royal attendants.
    'Officials' is possible but more interpretive.
- source_word: עֹבְרִים עָלָיו
  chosen: coming toward him
  alternatives:
  - passing by him
  - approaching him
  - crossing over to him
  lexicon: HALOT
  rationale: Literally the participle of עבר with על can suggest movement in relation
    to a person. In context, David is arriving at Araunah's threshing floor, so 'coming
    toward him' best captures the intended sense in idiomatic English. A more literal
    'passing by him' would mislead in context.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: A standard rendering of יצא. 'Went out' fits the viewpoint established
    by Araunah looking out from within or from his place of work.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The verb denotes an act of bowing/prostration. 'Bowed down' is clear
    modern English and avoids overreading the act as worship; 'prostrated himself'
    is possible but slightly heavier than the context requires.
- source_word: אַפָּיו אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - with his nostrils to the ground
  - face-down to the ground
  - to the ground on his face
  lexicon: HALOT
  rationale: The idiom literally uses 'his face/nose' plus 'earthward' to describe
    full prostration. 'With his face to the ground' communicates the idiom naturally
    and accurately.
- source_word: אֲרַוְנָה
  chosen: Araunah
  alternatives:
  - Ornan
  rationale: Personal names are transliterated by standard conventions. In Samuel
    the name is Araunah; 'Ornan' reflects the Chronicles parallel, not this Hebrew
    form.
