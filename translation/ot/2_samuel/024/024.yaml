id: 2SA.24.24
reference: 2 Samuel 24:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶל אֲרַ֗וְנָה לֹ֚א כִּֽי קָנ֨וֹ אֶקְנֶ֤ה מֵ/אֽוֹתְ/ךָ֙
    בִּ/מְחִ֔יר וְ/לֹ֧א אַעֲלֶ֛ה לַ/יהוָ֥ה אֱלֹהַ֖/י עֹל֣וֹת חִנָּ֑ם וַ/יִּ֨קֶן דָּוִ֤ד
    אֶת הַ/גֹּ֨רֶן֙ וְ/אֶת הַ/בָּקָ֔ר בְּ/כֶ֖סֶף שְׁקָלִ֥ים חֲמִשִּֽׁים־־־־׃
translation:
  text: But the king said to Araunah, “No, but I will surely buy it from you for a
    price. I will not offer to the LORD my God burnt offerings that cost me nothing.”
    So David bought the threshing floor and the cattle for fifty shekels of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “burnt offerings for nothing” or “free of charge.”
    reason: lexical_alternative
  - marker: b
    text: In 1 Chronicles 21:25, David pays six hundred shekels of gold for the site;
      this verse specifies fifty shekels of silver for the threshing floor and the
      cattle.
    reason: cross_reference
  - marker: c
    text: Or “the oxen.” The Hebrew term can refer collectively to cattle or more
      specifically to bovines used for labor/sacrifice.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרַוְנָה
  chosen: Araunah
  alternatives:
  - Ornan
  rationale: Personal name is transliterated by standard convention. 'Araunah' follows
    the Hebrew form in this verse; 'Ornan' reflects the Chronicles parallel, not this
    text.
- source_word: קָנוֹ אֶקְנֶה
  chosen: I will surely buy it
  alternatives:
  - I will indeed buy it
  - I will buy, yes buy it
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Surely
    buy' preserves the emphatic force in natural English. 'It' is supplied from context,
    referring to the offered site/materials.
- source_word: מֵאֹתְךָ
  chosen: from you
  lexicon: HALOT
  rationale: Straightforward preposition plus pronoun indicating purchase from Araunah
    personally.
- source_word: בִּמְחִיר
  chosen: for a price
  alternatives:
  - at a price
  - for payment
  lexicon: HALOT
  rationale: מְחִיר denotes a purchase price/payment. 'For a price' is idiomatic and
    preserves the commercial sense without over-specifying.
- source_word: אַעֲלֶה
  chosen: I will not offer
  alternatives:
  - I will not bring up
  - I will not sacrifice
  lexicon: HALOT
  rationale: The Hiphil of עלה with offerings means to offer up. 'Offer' is clear
    modern English; the sacrificial sense is made explicit by the object 'burnt offerings.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: First-person singular suffix should be preserved; it expresses David's
    personal covenantal confession.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard rendering for sacrificial offerings wholly consumed on the altar.
    'Burnt offerings' is clear and established without being archaic.
- source_word: חִנָּם
  chosen: that cost me nothing
  alternatives:
  - for nothing
  - free of charge
  lexicon: HALOT
  rationale: Literally 'for nothing/free,' but in context David's point is that he
    will not present offerings obtained without personal cost. This rendering makes
    the implied sense explicit without departing from the text.
- source_word: הַגֹּרֶן
  chosen: the threshing floor
  lexicon: HALOT
  rationale: Concrete agricultural term; standard rendering.
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the oxen
  lexicon: HALOT
  rationale: בָּקָר can denote cattle/oxen. 'Cattle' is broader and matches the Hebrew
    collective singular form; 'oxen' is possible but slightly more specific than the
    text requires.
- source_word: בְּכֶסֶף שְׁקָלִים חֲמִשִּׁים
  chosen: for fifty shekels of silver
  alternatives:
  - with silver, fifty shekels
  - for silver weighing fifty shekels
  lexicon: HALOT
  rationale: This phrase denotes the purchase price. 'Fifty shekels of silver' is
    the natural English expression and preserves the monetary detail.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: But the king said
  alternatives:
  - And the king said
  lexicon: HALOT
  rationale: The conjunction here marks contrast with Araunah's offer in the previous
    verse. 'But' better reflects the discourse function than a simple 'And.'
- source_word: וַיִּקֶן דָּוִד
  chosen: So David bought
  alternatives:
  - And David bought
  lexicon: HALOT
  rationale: The narrative waw here advances the result of David's refusal and purchase.
    'So' captures the consequential flow naturally.
