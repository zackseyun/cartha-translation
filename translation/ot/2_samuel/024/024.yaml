theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per project doctrine, the
    default rendering is 'the LORD,' following Jewish reverence tradition and longstanding
    English convention while signaling the divine name distinctly.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
