id: 2SA.24.16
reference: 2 Samuel 24:16
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ יָד֨/וֹ הַ/מַּלְאָ֥ךְ יְרֽוּשָׁלִַם֮ לְ/שַׁחֲתָ/הּ֒ וַ/יִּנָּ֤חֶם
    יְהוָה֙ אֶל הָ֣/רָעָ֔ה וַ֠/יֹּאמֶר לַ/מַּלְאָ֞ךְ הַ/מַּשְׁחִ֤ית בָּ/עָם֙ רַ֔ב
    עַתָּ֖ה הֶ֣רֶף יָדֶ֑/ךָ וּ/מַלְאַ֤ךְ יְהוָה֙ הָיָ֔ה עִם גֹּ֖רֶן ה/אורנה הַ/יְבֻסִֽי׀־־׃ס
translation:
  text: When the angel stretched out his hand toward Jerusalem to destroy it, the
    LORD relented concerning the calamity and said to the angel who was destroying
    the people, “Enough; now withdraw your hand.” And the angel of the LORD was by
    the threshing floor of Araunah the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD relented from the disaster.” The Hebrew says literally “relented
      concerning the calamity/disaster,” with רָעָה here meaning calamity, not moral
      evil.
    reason: lexical_alternative
  - marker: b
    text: Araunah is called Ornan in the parallel account in 1 Chronicles 21:15.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשְׁלַח יָדוֹ
  chosen: stretched out his hand
  alternatives:
  - sent his hand
  - reached out his hand
  lexicon: HALOT
  rationale: The idiom with שׁלח + יד commonly denotes extending the hand for action.
    'Stretched out his hand' is natural English and preserves the concrete imagery
    of impending judgment.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: In this narrative context the referent is the heavenly agent of plague/judgment,
    so 'angel' is the appropriate English rendering rather than the more generic 'messenger'.
- source_word: לְשַׁחֲתָהּ
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to bring it to destruction
  lexicon: HALOT
  rationale: The infinitive of שׁחת here expresses destructive action against Jerusalem.
    'Destroy it' is direct and fits the judgment context.
- source_word: וַיִּנָּחֶם יְהוָה אֶל הָרָעָה
  chosen: the LORD relented concerning the calamity
  alternatives:
  - the LORD relented from the disaster
  - the LORD was sorry concerning the evil
  lexicon: HALOT
  rationale: נחם in Niphal here indicates relenting or changing course in response
    to the announced judgment. הָרָעָה in this context refers to disaster/calamity,
    not moral evil. 'Concerning the calamity' preserves the preposition אֶל without
    overstating metaphysical change in God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: הַמַּשְׁחִית בָּעָם
  chosen: who was destroying the people
  alternatives:
  - the destroyer among the people
  - who was bringing ruin on the people
  lexicon: HALOT
  rationale: The participle functions attributively for the angel's ongoing action.
    Rendering it as a relative clause is idiomatic English and preserves the active
    destructive sense.
- source_word: רַב
  chosen: Enough
  alternatives:
  - It is enough
  - That is enough
  lexicon: HALOT
  rationale: Here רַב is an interjection meaning 'enough' or 'sufficient.' A concise
    exclamation best matches the force of the divine command.
- source_word: עַתָּה הֶרֶף יָדֶךָ
  chosen: now withdraw your hand
  alternatives:
  - now let your hand drop
  - now stay your hand
  - now relax your hand
  lexicon: HALOT
  rationale: הרף means to desist or cease. With 'your hand' it forms an idiom for
    stopping the action already underway. 'Withdraw your hand' is clear modern English
    while preserving the image.
- source_word: וּמַלְאַךְ יְהוָה
  chosen: And the angel of the LORD
  alternatives:
  - Now the angel of the LORD
  lexicon: HALOT
  rationale: The conjunction advances the narrative. 'Angel of the LORD' is the standard
    rendering of the construct phrase and should be preserved consistently.
- source_word: הָיָה עִם
  chosen: was by
  alternatives:
  - was at
  - was beside
  - was near
  lexicon: HALOT
  rationale: עִם can denote proximity/association. In this locative setting, 'was
    by' gives natural English and indicates the angel's position near the threshing
    floor.
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: HALOT
  rationale: The standard agricultural term is 'threshing floor,' which is both accurate
    and familiar in biblical narrative.
- source_word: הָאֹרְנָה
  chosen: Araunah
  alternatives:
  - Ornan
  lexicon: HALOT
  rationale: The Samuel form of the name is אראונה/Araunah. 'Ornan' reflects the Chronicles
    form and should be preserved as an alternative only in a note for cross-reference
    awareness.
- source_word: הַיְבֻסִי
  chosen: the Jebusite
  lexicon: HALOT
  rationale: The gentilic identifies Araunah ethnically/geographically and should
    be translated straightforwardly.
