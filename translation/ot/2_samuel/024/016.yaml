theological_decisions:
- issue: Anthropopathic language for God in וַיִּנָּחֶם יְהוָה
  chosen_reading: the LORD relented concerning the calamity
  alternative_readings:
  - the LORD repented of the evil/disaster
  - the LORD was sorry
  rationale: The Hebrew uses conventional anthropopathic language describing God's
    turning from further judgment. 'Relented' preserves the text's force without importing
    a claim of moral fault or error in God, and 'calamity' clarifies that רָעָה here
    means disaster rather than moral evil.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: rendered as 'the angel of the LORD' without resolving further theological
    identification
  alternative_readings:
  - a theophanic manifestation
  - a created angelic messenger
  rationale: The verse itself names the figure but does not require the translator
    to decide whether this is a created angel or a special manifestation of God. The
    translation preserves the textual designation and leaves theological interpretation
    open.
  doctrine_reference: Affirmations; Translation philosophy §3
