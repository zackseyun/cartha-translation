id: 2SA.24.8
reference: 2 Samuel 24:8
source:
  edition: WLC
  text: וַ/יָּשֻׁ֖טוּ בְּ/כָל הָ/אָ֑רֶץ וַ/יָּבֹ֜אוּ מִ/קְצֵ֨ה תִשְׁעָ֧ה חֳדָשִׁ֛ים
    וְ/עֶשְׂרִ֥ים י֖וֹם יְרוּשָׁלִָֽם־׃
translation:
  text: They traveled throughout all the land, and at the end of nine months and twenty
    days they came to Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשֻׁטוּ
  chosen: they traveled
  alternatives:
  - they roamed
  - they went to and fro
  lexicon: HALOT
  rationale: The verb from שׁוּט conveys moving about over an area. 'They traveled'
    is natural modern English and fits the census journey context without the slightly
    aimless nuance of 'roamed.' 'Went to and fro' is more formally literal but less
    idiomatic.
- source_word: בְּכָל הָאָרֶץ
  chosen: throughout all the land
  alternatives:
  - through all the land
  - throughout the whole land
  lexicon: HALOT
  rationale: ב + כל + הארץ indicates movement over the entirety of the territory.
    'Throughout all the land' preserves the comprehensiveness while remaining readable.
    'Land' is preferable to 'earth' here because the reference is the territory being
    surveyed.
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'arrive.' 'They came' keeps the narrative
    style and aligns with the destination phrase 'to Jerusalem.'
- source_word: מִקְצֵה
  chosen: at the end of
  alternatives:
  - from the end of
  - after
  lexicon: HALOT
  rationale: The preposition with קצה here marks the completion point of the period.
    'At the end of' is the most natural English expression for elapsed time in this
    context. 'After' is possible but slightly less transparent to the Hebrew construction.
- source_word: תִשְׁעָה חֳדָשִׁים וְעֶשְׂרִים יוֹם
  chosen: nine months and twenty days
  alternatives:
  - nine months, twenty days
  - nine months and twenty day(s)
  lexicon: HALOT
  rationale: This is a straightforward duration expression. 'Nine months and twenty
    days' is idiomatic English and accurately reflects the Hebrew sequence.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, following the translation
    philosophy to transliterate names rather than translate them.
