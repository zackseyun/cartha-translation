id: 2SA.24.18
reference: 2 Samuel 24:18
source:
  edition: WLC
  text: וַ/יָּבֹא גָ֥ד אֶל דָּוִ֖ד בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יֹּ֣אמֶר ל֗/וֹ עֲלֵה֙ הָקֵ֤ם
    לַֽ/יהוָה֙ מִזְבֵּ֔חַ בְּ/גֹ֖רֶן ארניה הַ/יְבֻסִֽי־־׃
translation:
  text: That day Gad came to David and said to him, “Go up and set up an altar to
    the LORD on the threshing floor of Araunah the Jebusite.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on that day.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'for the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Chronicles gives the name as Ornan (1 Chr 21:18).
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly means 'came' in narrative sequence. 'Entered'
    would over-specify, and 'went' is less natural with the following destination
    'to David.'
- source_word: בַּיּוֹם הַהוּא
  chosen: That day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are accurate; 'That day' is slightly more natural English while
    preserving the temporal specificity of the Hebrew.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  - Go
  lexicon: HALOT
  rationale: עלה is an imperative meaning 'go up/ascend.' 'Go up' preserves the directional
    force without sounding archaic.
- source_word: הָקֵם
  chosen: set up
  alternatives:
  - raise up
  - build
  lexicon: HALOT
  rationale: Hiphil imperative of קום here means to cause to stand, i.e., 'set up'
    or 'erect.' 'Build' is possible by sense, but 'set up' more closely reflects the
    verb used with 'altar.'
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח; no contextual reason to vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: 'The preposition ל marks dedication/direction. ''To the LORD'' is a natural
    rendering in altar-building contexts and preserves the covenant name according
    to doctrine: YHWH rendered ''the LORD.'''
- source_word: בְּגֹרֶן
  chosen: on the threshing floor
  alternatives:
  - at the threshing floor
  - in the threshing floor
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously by context. Since an altar
    is erected on the site, 'on the threshing floor' is the most idiomatic English.
- source_word: ארניה
  chosen: Araunah
  alternatives:
  - Ornan
  lexicon: HALOT
  rationale: The Samuel form of the proper name is Araunah. 'Ornan' reflects the Chronicles
    parallel, not this verse's Hebrew form.
- source_word: הַיְבֻסִי
  chosen: the Jebusite
  lexicon: HALOT
  rationale: Standard gentilic rendering identifying Araunah's ethnic background.
