- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and common English Bible convention while signaling
    the covenant name.
