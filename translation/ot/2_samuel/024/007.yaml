id: 2SA.24.7
reference: 2 Samuel 24:7
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ מִבְצַר צֹ֔ר וְ/כָל עָרֵ֥י הַ/חִוִּ֖י וְ/הַֽ/כְּנַעֲנִ֑י וַ/יֵּֽצְא֛וּ
    אֶל נֶ֥גֶב יְהוּדָ֖ה בְּאֵ֥ר שָֽׁבַע־־־׃
translation:
  text: They came to the fortified city of Tyre and to all the cities of the Hivites
    and the Canaanites, and they went out to the Negev of Judah, to Beersheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the south of Judah.' The Hebrew negev can denote either the specific
      region called the Negev or, more generally, the southern area.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְצַר צֹר
  chosen: the fortified city of Tyre
  alternatives:
  - the fortress of Tyre
  - the stronghold of Tyre
  lexicon: HALOT
  rationale: מִבְצַר denotes a fortified place/fortress. In apposition with צֹר, the
    sense is the fortified city identified as Tyre. 'Fortified city' is natural English
    and preserves the military-geographical nuance without overstating a single citadel.
- source_word: וְכָל עָרֵי
  chosen: and to all the cities of
  alternatives:
  - and all the cities of
  lexicon: HALOT
  rationale: With the preceding motion verb ויבאו, the phrase is best carried as the
    next destinations reached in the route. Supplying 'to' in English clarifies the
    movement implied by the Hebrew sequence.
- source_word: הַחִוִּי
  chosen: the Hivites
  lexicon: HALOT
  rationale: Standard ethnonym rendering; pluralized in English because it modifies
    'cities' collectively.
- source_word: וְהַכְּנַעֲנִי
  chosen: and the Canaanites
  lexicon: HALOT
  rationale: Standard ethnonym rendering; likewise pluralized in English to match
    'cities' and normal English usage for peoples.
- source_word: וַיֵּצְאוּ
  chosen: and they went out
  alternatives:
  - and they proceeded
  - and they came out
  lexicon: HALOT
  rationale: יצא commonly means 'go out/come out.' Here it marks the next stage of
    the route after the northern/coastal locations. 'Went out' preserves the verbal
    imagery and sequence.
- source_word: אֶל נֶגֶב יְהוּדָה
  chosen: to the Negev of Judah
  alternatives:
  - to the south of Judah
  - to the southern region of Judah
  lexicon: HALOT
  rationale: נֶגֶב can mean the south/southern region, but in geographical itinerary
    contexts it often functions as the proper regional designation 'Negev.' Retaining
    'Negev' preserves the place-name flavor while 'of Judah' specifies the Judean
    sector.
- source_word: בְּאֵר שָׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
