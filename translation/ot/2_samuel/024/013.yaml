id: 2SA.24.13
reference: 2 Samuel 24:13
source:
  edition: WLC
  text: וַ/יָּבֹא גָ֥ד אֶל דָּוִ֖ד וַ/יַּגֶּד ל֑/וֹ וַ/יֹּ֣אמֶר ל֡/וֹ הֲ/תָב֣וֹא לְ/ךָ֣
    שֶֽׁבַע שָׁנִ֣ים רָעָ֣ב בְּ/אַרְצֶ֡/ךָ אִם שְׁלֹשָׁ֣ה חֳ֠דָשִׁים נֻסְ/ךָ֨ לִ/פְנֵֽי
    צָרֶ֜י/ךָ וְ/ה֣וּא רֹדְפֶ֗/ךָ וְ/אִם הֱ֠יוֹת שְׁלֹ֨שֶׁת יָמִ֥ים דֶּ֨בֶר֙ בְּ/אַרְצֶ֔/ךָ
    עַתָּה֙ דַּ֣ע וּ/רְאֵ֔ה מָה אָשִׁ֥יב שֹׁלְחִ֖/י דָּבָֽר־־־׀׀־־־־׃ס
translation:
  text: So Gad came to David and told him, and said to him, “Shall seven years of
    famine come to you in your land? Or will you flee three months before your adversaries
    while they pursue you? Or shall there be three days of pestilence in your land?
    Now know and see what answer I should return to the one who sent me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 1 Chronicles 21:12 reads 'three years of famine' instead
      of 'seven years.'
    reason: textual_variant
  - marker: b
    text: Or 'your enemies' for 'your adversaries.'
    reason: lexical_alternative
  - marker: c
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Narrative wayyiqtol of בוא, standard motion verb. 'Came' fits the deictic
    perspective of Gad approaching David.
- source_word: וַיַּגֶּד
  chosen: told
  alternatives:
  - declared
  - reported
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell or report. 'Told' is natural modern
    English and preserves the direct communication.
- source_word: הֲתָבוֹא
  chosen: Shall ... come
  alternatives:
  - Will ... come
  - Is ... to come
  lexicon: HALOT
  rationale: The interrogative plus Qal imperfect feminine singular agrees with the
    feminine subject implied by the calamity option. 'Shall ... come' preserves the
    formal deliberative tone of Gad's question.
- source_word: שֶׁבַע שָׁנִים רָעָב
  chosen: seven years of famine
  alternatives:
  - seven years famine
  - seven years of hunger
  lexicon: HALOT
  rationale: רָעָב denotes famine rather than mere personal hunger. The construct-like
    English 'years of famine' is idiomatic and precise. The Masoretic Text reads 'seven
    years,' though the parallel in 1 Chronicles 21:12 reads 'three years'; the MT
    is translated here and the variant preserved in a footnote.
- source_word: בְּאַרְצֶךָ
  chosen: in your land
  alternatives:
  - in your הארץ
  - throughout your land
  lexicon: HALOT
  rationale: אֶרֶץ here refers to David's territory/land, not the whole earth. 'In
    your land' is the most direct contextual rendering.
- source_word: אִם שְׁלֹשָׁה חֳדָשִׁים נֻסְךָ לִפְנֵי צָרֶיךָ
  chosen: Or will you flee three months before your adversaries
  alternatives:
  - Or three months of your fleeing before your enemies
  - Or shall you be routed for three months before your foes
  lexicon: HALOT
  rationale: The clause is elliptical. The form נֻסְךָ from נוס conveys fleeing, with
    the pronominal suffix indicating David/Israel as the one fleeing. 'Will you flee
    three months before your adversaries' makes the Hebrew sense clear in readable
    English without over-paraphrase.
- source_word: צָרֶיךָ
  chosen: your adversaries
  alternatives:
  - your enemies
  - your foes
  lexicon: HALOT
  rationale: צַר can mean adversary or enemy. 'Adversaries' preserves the hostility
    while avoiding unnecessary repetition with the common English 'enemies'; the alternative
    remains viable.
- source_word: וְהוּא רֹדְפֶךָ
  chosen: while they pursue you
  alternatives:
  - and he pursues you
  - with him pursuing you
  lexicon: HALOT
  rationale: Though the Hebrew has singular הוּא, it likely functions collectively
    with the preceding plural adversaries/enemies. English smooths this to plural
    'they' for agreement with the collective sense.
- source_word: וְאִם הֱיוֹת שְׁלֹשֶׁת יָמִים דֶּבֶר
  chosen: Or shall there be three days of pestilence
  alternatives:
  - Or three days of plague
  - Or shall there be three days of disease
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague. 'Pestilence' preserves the
    gravity and traditional semantic range without sounding overly archaic in this
    context.
- source_word: עַתָּה דַּע וּרְאֵה
  chosen: Now know and see
  alternatives:
  - Now consider and see
  - Now know and discern
  lexicon: HALOT
  rationale: A paired imperative calling for reflection and decision. 'Know and see'
    is slightly formal but transparent and close to the Hebrew.
- source_word: מָה אָשִׁיב שֹׁלְחִי דָּבָר
  chosen: what answer I should return to the one who sent me
  alternatives:
  - what word I should bring back to my sender
  - what reply I should return to him who sent me
  lexicon: HALOT
  rationale: השיב דבר is an idiom for returning an answer/report. 'The one who sent
    me' renders the participle naturally. 'Answer' is better than the more wooden
    'word' in English here.
