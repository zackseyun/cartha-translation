theological_decisions:
- issue: Numerical discrepancy with the parallel account in 1 Chronicles 21:12
  chosen_reading: Translate the Masoretic Text of 2 Samuel as 'seven years of famine'
    in the main text
  alternative_readings:
  - three years of famine
  rationale: The base text provided is the WLC Masoretic Text, which reads 'seven
    years.' Because the parallel passage in Chronicles reads 'three years,' the alternative
    should be preserved in a footnote as a textual/canonical parallel rather than
    harmonized in the main text. This preserves transparency and avoids importing
    a resolution not present in the source verse itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
