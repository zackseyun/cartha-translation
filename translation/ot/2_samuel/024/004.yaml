id: 2SA.24.4
reference: 2 Samuel 24:4
source:
  edition: WLC
  text: וַ/יֶּחֱזַ֤ק דְּבַר הַ/מֶּ֨לֶךְ֙ אֶל יוֹאָ֔ב וְ/עַ֖ל שָׂרֵ֣י הֶ/חָ֑יִל וַ/יֵּצֵ֨א
    יוֹאָ֜ב וְ/שָׂרֵ֤י הַ/חַ֨יִל֙ לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ לִ/פְקֹ֥ד אֶת הָ/עָ֖ם אֶת
    יִשְׂרָאֵֽל־־־־׃
translation:
  text: But the king’s word prevailed against Joab and against the commanders of the
    army, so Joab and the commanders of the army went out from before the king to
    count the people of Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֶּחֱזַק
  chosen: prevailed
  alternatives:
  - was strong
  - overruled
  - was stronger
  lexicon: HALOT
  rationale: The verb חזק here, with 'the king’s word' as subject and followed by
    אֶל/עַל persons, idiomatically conveys that the king’s command carried the day
    or overruled objections. 'Prevailed' captures the sense naturally in English without
    over-paraphrasing.
- source_word: דְּבַר הַמֶּלֶךְ
  chosen: the king’s word
  alternatives:
  - the king’s command
  - the king’s order
  lexicon: HALOT
  rationale: דבר literally means 'word/matter.' In this context it refers to the king’s
    spoken directive. 'Word' preserves the Hebrew expression while still reading naturally;
    the coercive force is supplied by 'prevailed.'
- source_word: אֶל יוֹאָב וְעַל שָׂרֵי הֶחָיִל
  chosen: against Joab and against the commanders of the army
  alternatives:
  - over Joab and over the commanders of the army
  - with Joab and over the commanders of the army
  lexicon: HALOT
  rationale: Given the context of Joab’s prior objection, these prepositions mark
    those overruled by the king’s decision. 'Against' best communicates adversative
    force in idiomatic English.
- source_word: שָׂרֵי הֶחָיִל
  chosen: the commanders of the army
  alternatives:
  - the captains of the army
  - the officers of the army
  - the commanders of the forces
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; חַיִל here refers to military force. 'Commanders
    of the army' is clear modern English and fits the military context better than
    the more archaic 'captains.'
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - went forth
  lexicon: HALOT
  rationale: A straightforward rendering of יצא. 'Went out' is natural and sufficiently
    formal.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: from before the king
  alternatives:
  - from the presence of the king
  - before the king
  lexicon: HALOT
  rationale: The phrase indicates departure from the king’s presence. 'From before
    the king' is slightly formal but transparent and close to the Hebrew; it avoids
    losing the directional nuance.
- source_word: לִפְקֹד
  chosen: to count
  alternatives:
  - to number
  - to muster
  lexicon: HALOT
  rationale: פקד in this context refers to taking a census. 'Count' is clear modern
    English; 'number' is possible but slightly less natural, and 'muster' could imply
    specifically military enrollment beyond the wording here.
- source_word: הָעָם אֶת יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - the people, Israel
  - Israel
  lexicon: HALOT
  rationale: The appositional construction identifies 'the people' as 'Israel.' 'The
    people of Israel' expresses the sense smoothly in English without unnecessary
    repetition.
