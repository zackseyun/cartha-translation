id: 2SA.24.22
reference: 2 Samuel 24:22
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲרַ֨וְנָה֙ אֶל דָּוִ֔ד יִקַּ֥ח וְ/יַ֛עַל אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ
    הַ/טּ֣וֹב ב/עינ/ו רְאֵה֙ הַ/בָּקָ֣ר לָ/עֹלָ֔ה וְ/הַ/מֹּרִגִּ֛ים וּ/כְלֵ֥י הַ/בָּקָ֖ר
    לָ/עֵצִֽים־׃
translation:
  text: Then Araunah said to David, “Let my lord the king take and offer up what is
    good in his eyes. Look, the oxen are for the burnt offering, and the threshing
    sledges and the yokes of the oxen are for the wood.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever seems good to him.' The Hebrew idiom is literally 'the good
      in his eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the equipment of the oxen.' The Hebrew phrase is broad and may refer
      generally to the oxen’s wooden gear used as fuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקַּח
  chosen: Let ... take
  alternatives:
  - may ... take
  - should ... take
  lexicon: HALOT
  rationale: Jussive/imperfect in direct speech expresses permission or invitation.
    'Let ... take' is natural English and preserves the deferential tone.
- source_word: וְיַעַל
  chosen: and offer up
  alternatives:
  - and sacrifice
  - and bring up
  lexicon: HALOT
  rationale: עלה in sacrificial context commonly means 'offer up.' This preserves
    the verbal link to the עולה ('burnt offering') that follows better than the more
    generic 'sacrifice'.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my lord, the king
  lexicon: HALOT
  rationale: A courtly address combining respect and royal title. The unpunctuated
    English phrase is idiomatic and reflects the Hebrew construct-like sequence.
- source_word: הַטּוֹב בְּעֵינָיו
  chosen: what is good in his eyes
  alternatives:
  - whatever seems good to him
  - what is good in his sight
  lexicon: HALOT
  rationale: This keeps the Hebrew idiom relatively transparent while remaining readable.
    'His' refers to the king in third person after the direct address, matching the
    Hebrew shift.
- source_word: רְאֵה
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: A discourse marker drawing attention to what Araunah is providing. 'Look'
    is readable modern English; 'behold' is too archaic.
- source_word: הַבָּקָר
  chosen: the oxen
  alternatives:
  - the cattle
  - the herd animals
  lexicon: HALOT
  rationale: In this immediate context the animals are draft animals used with threshing
    equipment and suitable for sacrifice. 'Oxen' is more specific and contextually
    fitting than the broader 'cattle'.
- source_word: לָעֹלָה
  chosen: for the burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: The prefixed article likely points to the intended sacrificial use in
    context. 'The burnt offering' reads naturally as the offering David is about to
    make.
- source_word: הַמֹּרִגִּים
  chosen: the threshing sledges
  alternatives:
  - the threshing instruments
  - the threshing boards
  lexicon: HALOT
  rationale: מורג refers to a threshing implement, likely a sledge/board. 'Threshing
    sledges' is specific, established, and understandable.
- source_word: כְלֵי הַבָּקָר
  chosen: the yokes of the oxen
  alternatives:
  - the equipment of the oxen
  - the harness of the oxen
  - the implements of the oxen
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, equipment'), but here in parallel
    with threshing gear and 'for wood' it likely refers to wooden gear associated
    with the oxen, such as yokes. This gives a concrete and intelligible sense in
    context.
- source_word: לָעֵצִים
  chosen: for the wood
  alternatives:
  - for firewood
  - as wood
  lexicon: HALOT
  rationale: The phrase indicates use as fuel for the sacrifice. 'For the wood' preserves
    the Hebrew structure while making the intended function clear from context.
