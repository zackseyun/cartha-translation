id: 2SA.24.2
reference: 2 Samuel 24:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶל יוֹאָ֣ב שַׂר הַ/חַ֣יִל אֲשֶׁר אִתּ֗/וֹ שֽׁוּט
    נָ֞א בְּ/כָל שִׁבְטֵ֤י יִשְׂרָאֵל֙ מִ/דָּן֙ וְ/עַד בְּאֵ֣ר שֶׁ֔בַע וּ/פִקְד֖וּ
    אֶת הָ/עָ֑ם וְ/יָ֣דַעְתִּ֔י אֵ֖ת מִסְפַּ֥ר הָ/עָֽם־׀־־־־־־׃ס
translation:
  text: So the king said to Joab, the commander of the army who was with him, “Go
    about now through all the tribes of Israel, from Dan to Beer-sheba, and count
    the people, so that I may know the number of the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “muster the people.” The Hebrew verb can refer to numbering or registering
      people, sometimes in a military context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So ... said
  alternatives:
  - and ... said
  - then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving sequence without sounding overly wooden.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the subject is David
    in context, but the Hebrew uses the title rather than the name here.
- source_word: שַׂר הַחַיִל
  chosen: the commander of the army
  alternatives:
  - the captain of the host
  - the commander of the forces
  lexicon: HALOT
  rationale: שַׂר is a leader/official, and חַיִל here refers to military force. 'Commander
    of the army' is clear modern English and fits the military context better than
    the archaic 'captain of the host.'
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who was with him
  alternatives:
  - who was with him there
  lexicon: HALOT
  rationale: This relative clause identifies Joab as accompanying the king. English
    requires an explicit relative pronoun and finite verb.
- source_word: שׁוּט נָא
  chosen: Go about now
  alternatives:
  - Go to and fro, please
  - Roam now
  lexicon: HALOT
  rationale: שׁוּט conveys moving about through an area; נָא softens the command.
    'Go about now' preserves the directive force and the particle's mildness without
    awkwardly inserting 'please' in a royal command.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  chosen: through all the tribes of Israel
  alternatives:
  - among all the tribes of Israel
  - in all the tribes of Israel
  lexicon: HALOT
  rationale: Given the motion verb שׁוּט, 'through' best captures travel throughout
    the tribal territories rather than mere location.
- source_word: מִדָּן וְעַד בְּאֵר שֶׁבַע
  chosen: from Dan to Beer-sheba
  alternatives:
  - from Dan even to Beer-sheba
  lexicon: HALOT
  rationale: This is the standard merism for the full extent of the land. The place
    name is transliterated, and the idiom is preserved in natural English.
- source_word: וּפִקְדוּ
  chosen: and count
  alternatives:
  - and register
  - and muster
  lexicon: HALOT
  rationale: פקד in this context refers to taking a census/enrollment. 'Count' is
    the clearest concise rendering in contemporary English; 'muster' would overemphasize
    military enrollment, though that nuance is nearby.
- source_word: אֶת הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: Though the military context is present, עָם ordinarily means 'people'
    here, and the verse concerns a census of the populace as stated in the Hebrew.
- source_word: וְיָדַעְתִּי
  chosen: so that I may know
  alternatives:
  - that I may know
  - and I will know
  lexicon: HALOT
  rationale: The cohortative-like sense in context expresses purpose/result of the
    command. 'So that I may know' makes the king's purpose explicit in idiomatic English.
- source_word: מִסְפַּר הָעָם
  chosen: the number of the people
  alternatives:
  - the count of the people
  - the number of the populace
  lexicon: HALOT
  rationale: A direct and transparent rendering of the construct phrase; repetition
    of 'people' reflects the Hebrew and avoids unnecessary paraphrase.
