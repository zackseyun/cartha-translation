theological_decisions:
- issue: Scope of הָעָם in a military-administrative context
  chosen_reading: the people
  alternative_readings:
  - the fighting men
  - the troops
  rationale: Although Joab is addressed as military commander and the census has military
    implications, the Hebrew noun used is עָם ('people'), not a more specific term
    for warriors. The translation preserves the broader wording and does not narrow
    the scope beyond what the text states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text actually says.'
