id: 2SA.24.11
reference: 2 Samuel 24:11
source:
  edition: WLC
  text: וַ/יָּ֥קָם דָּוִ֖ד בַּ/בֹּ֑קֶר וּ/דְבַר יְהוָ֗ה הָיָה֙ אֶל גָּ֣ד הַ/נָּבִ֔יא חֹזֵ֥ה דָוִ֖ד לֵ/אמֹֽרפ־־׃
translation:
  text: When David arose in the morning, the word of Yahweh had come to Gad the prophet, David’s seer, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the word of the LORD was to Gad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - rose
  lexicon: HALOT
  rationale: Wayyiqtol of קום narrates the next event in sequence. 'Arose' is natural, slightly formal narrative English and fits the solemn tone.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: Temporal phrase marking the time of David's rising. 'In the morning' is idiomatic and sufficiently formal without sounding archaic.
- source_word: וּדְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the word of Yahweh
  - the LORD’s word
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' Retaining 'word' preserves the formal revelatory sense rather than paraphrasing as 'message' alone.
- source_word: הָיָה אֶל
  chosen: had come to
  alternatives:
  - came to
  - was to
  - was directed to
  lexicon: HALOT
  rationale: 'Though literally ''was to,'' this idiom in prophetic contexts commonly means that the divine word came to someone. ''Had come to'' best reflects the likely pluperfect sense in context: by the time David arose, the word had already come to Gad.'
- source_word: גָּד
  chosen: Gad
  rationale: Proper name transliterated according to standard English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: נָבִיא is the standard term for a prophet; straightforward rendering preserves the office designation.
- source_word: חֹזֵה דָוִד
  chosen: David’s seer
  alternatives:
  - the seer of David
  - David's visionary
  lexicon: HALOT
  rationale: Construct phrase identifying Gad's role in relation to David. 'Seer' is the established and accurate rendering for חֹזֶה, distinct from but related to 'prophet.' The possessive English construction is the most natural equivalent.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is the natural English narrative equivalent and signals continuation into the next verse.
