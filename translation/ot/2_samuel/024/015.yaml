id: 2SA.24.15
reference: 2 Samuel 24:15
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן יְהוָ֥ה דֶּ֨בֶר֙ בְּ/יִשְׂרָאֵ֔ל מֵ/הַ/בֹּ֖קֶר וְ/עַד עֵ֣ת מוֹעֵ֑ד
    וַ/יָּ֣מָת מִן הָ/עָ֗ם מִ/דָּן֙ וְ/עַד בְּאֵ֣ר שֶׁ֔בַע שִׁבְעִ֥ים אֶ֖לֶף אִֽישׁ־־־׃
translation:
  text: So the LORD sent a plague on Israel from the morning until the appointed time,
    and seventy thousand men of the people died, from Dan to Beersheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the set time.' The Hebrew phrase can denote an appointed or fixed
      time; less likely here, 'until the time of assembly.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: sent
  alternatives:
  - gave
  - inflicted
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in English 'sent a plague' is
    the most natural and accurate idiom for נתן with דבר in a judgment context, preserving
    divine agency without awkwardness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, reflecting
    Jewish reverence tradition and common English Bible practice.
- source_word: דֶּבֶר
  chosen: plague
  alternatives:
  - pestilence
  - disease
  lexicon: HALOT
  rationale: '''Plague'' is clear modern English and fits the context of a divinely
    sent deadly outbreak. ''Pestilence'' is more traditional but less accessible.'
- source_word: בְּיִשְׂרָאֵל
  chosen: on Israel
  alternatives:
  - in Israel
  - against Israel
  lexicon: HALOT
  rationale: The preposition can be rendered several ways; 'on Israel' fits English
    idiom for a calamity falling upon a people and preserves the sense of judgment
    affecting the nation.
- source_word: מֵהַבֹּקֶר
  chosen: from the morning
  alternatives:
  - from morning
  lexicon: HALOT
  rationale: Retains the temporal starting point with a natural English article.
- source_word: וְעַד עֵת מוֹעֵד
  chosen: until the appointed time
  alternatives:
  - until the set time
  - until the time appointed
  - until the time of assembly
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time or set time. Here the temporal
    sense best fits the narrative. 'Time of assembly' is lexically possible in other
    contexts but not likely here.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - there died
  - he caused to die
  lexicon: HALOT
  rationale: The singular verb with a collective/resultative sense is naturally rendered
    in English as 'died' with the following subject phrase. This avoids woodenness
    while preserving the event.
- source_word: מִן הָעָם
  chosen: of the people
  alternatives:
  - from the people
  - among the people
  lexicon: HALOT
  rationale: This construction identifies those who died as belonging to the people.
    'Of the people' is concise and idiomatic in English.
- source_word: מִדָּן וְעַד בְּאֵר שֶׁבַע
  chosen: from Dan to Beersheba
  alternatives:
  - from Dan even to Beersheba
  lexicon: HALOT
  rationale: This is the standard idiom for the full extent of Israel's land, and
    the conventional English rendering is both accurate and recognizable.
- source_word: שִׁבְעִים אֶלֶף אִישׁ
  chosen: seventy thousand men
  alternatives:
  - seventy thousand people
  lexicon: HALOT
  rationale: אִישׁ is masculine singular used distributively after the number; 'men'
    is the gender-accurate rendering per project philosophy. 'People' would flatten
    the masculine form.
