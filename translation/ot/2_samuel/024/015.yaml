theological_decisions:
- issue: Divine agency in the judgment
  chosen_reading: So the LORD sent a plague on Israel
  alternative_readings:
  - So the LORD allowed a plague on Israel
  - So the LORD inflicted pestilence on Israel
  rationale: The Hebrew directly attributes the action to the LORD with no mitigating
    verb such as 'allowed.' The translation preserves the text's explicit divine agency
    without softening it for theological comfort.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of עֵת מוֹעֵד
  chosen_reading: until the appointed time
  alternative_readings:
  - until the set time
  - until the time of assembly
  rationale: The phrase is somewhat debated, but in this narrative context a temporal
    endpoint is most likely. The translation preserves the ambiguity as much as possible
    with 'appointed time,' and an alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
