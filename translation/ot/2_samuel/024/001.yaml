theological_decisions:
- issue: Divine agency in David's incitement compared with the parallel in 1 Chronicles 21:1
  chosen_reading: and he incited David
  alternative_readings:
  - and one incited David
  - and Satan incited David (harmonized from Chronicles)
  rationale: The Hebrew subject of וַיָּסֶת is most naturally the immediately preceding subject, the LORD. The translation should preserve the tension between this verse and 1 Chronicles 21:1 rather than harmonize them away. This follows the doctrine's instruction to preserve theological tension rather than resolve it by importing an interpretive solution into the main text.
  doctrine_reference: Translation philosophy §3, 'Preserve theological tension rather than resolve it'
