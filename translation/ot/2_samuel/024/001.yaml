id: 2SA.24.1
reference: 2 Samuel 24:1
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף֙ אַף יְהוָ֔ה לַ/חֲר֖וֹת בְּ/יִשְׂרָאֵ֑ל וַ/יָּ֨סֶת אֶת דָּוִ֤ד בָּ/הֶם֙ לֵ/אמֹ֔ר לֵ֛ךְ מְנֵ֥ה אֶת יִשְׂרָאֵ֖ל וְ/אֶת יְהוּדָֽה־־־־׃
translation:
  text: Again the anger of Yahweh burned against Israel, and he incited David against them, saying, “Go, count Israel and Judah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Chronicles 21:1 says that Satan stood against Israel and incited David. The main text here follows the plain subject of the Hebrew in 2 Samuel and preserves the tension between the accounts rather than harmonizing them.
    reason: cross_reference
  - marker: b
    text: Or 'number' or 'take a census of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: Again
  alternatives:
  - And again
  - Once more
  lexicon: HALOT
  rationale: 'With אַף and the following infinitive, the verb marks renewed action: the LORD''s anger flared again. Rendering as ''Again'' is idiomatic English and captures the resumptive force without over-literal awkwardness.'
- source_word: אַף
  chosen: the anger
  alternatives:
  - anger
  - wrath
  lexicon: HALOT
  rationale: אַף often literally means 'nose' but idiomatically denotes anger/wrath. 'Anger' is clear modern English; 'wrath' is possible but more elevated and less necessary here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַחֲרוֹת
  chosen: burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: The idiom חרה אף means anger burning or kindling. 'Burned' preserves the metaphor in natural English better than the more wooden 'was kindled.'
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - at Israel
  - with Israel
  lexicon: HALOT
  rationale: In this idiom the preposition is best rendered 'against,' expressing hostility directed toward Israel.
- source_word: וַיָּסֶת
  chosen: he incited
  alternatives:
  - he stirred up
  - he moved
  lexicon: HALOT
  rationale: The verb סות in the Hiphil means to incite, entice, or provoke. 'Incited' best conveys causative prompting toward the action that follows.
- source_word: בָּהֶם
  chosen: against them
  alternatives:
  - among them
  - concerning them
  lexicon: HALOT
  rationale: The phrase after 'incited David' is difficult, but in context it most naturally means David was moved in relation to the people, specifically against them in the sense of taking the census that brings judgment. This is the most idiomatic and contextually coherent rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative of הלך introducing the command.
- source_word: מְנֵה
  chosen: count
  alternatives:
  - number
  - take a census of
  lexicon: HALOT
  rationale: The verb מנה means count/number. 'Count' is concise and natural; 'take a census of' is interpretive expansion, though contextually related.
- source_word: יִשְׂרָאֵל וְאֶת יְהוּדָה
  chosen: Israel and Judah
  alternatives:
  - the people of Israel and Judah
  lexicon: HALOT
  rationale: The text distinguishes the northern and southern entities in standard Hebrew fashion. The simple proper names should be retained without expansion.
