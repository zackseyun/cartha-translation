id: 2SA.24.21
reference: 2 Samuel 24:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲרַ֔וְנָה מַדּ֛וּעַ בָּ֥א אֲדֹנִֽ/י הַ/מֶּ֖לֶךְ אֶל עַבְדּ֑/וֹ וַ/יֹּ֨אמֶר דָּוִ֜ד לִ/קְנ֧וֹת מֵ/עִמְּ/ךָ֣ אֶת הַ/גֹּ֗רֶן לִ/בְנ֤וֹת מִזְבֵּ֨חַ֙ לַֽ/יהוָ֔ה וְ/תֵעָצַ֥ר הַ/מַּגֵּפָ֖ה מֵ/עַ֥ל הָ/עָֽם־־־׃
translation:
  text: And Araunah said, “Why has my lord the king come to his servant?” And David said, “To buy the threshing floor from you, to build an altar to Yahweh, so that the plague may be stopped from being upon the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant.' The Hebrew literally has 'his servant,' reflecting formal courtly self-reference.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative asking the reason for the king's visit; 'Why' is natural modern English and fully preserves the sense.
- source_word: בָּא
  chosen: has ... come
  alternatives:
  - came
  - is coming
  lexicon: HALOT
  rationale: 'The perfect after the interrogative in direct speech is naturally rendered in English as present perfect here: ''has ... come,'' matching the immediate conversational context.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  - my lord, the king
  lexicon: HALOT
  rationale: A deferential courtly address. 'My lord the king' preserves both the possessive honorific and the royal title without over-paraphrase.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - your servant
  lexicon: HALOT
  rationale: The Hebrew form is third person singular with suffix, literally 'his servant.' In English this can sound slightly formal but accurately reflects the self-referential court style of humility. 'Your servant' would communicate the pragmatic sense but is less formally exact.
- source_word: לִקְנוֹת
  chosen: to buy
  alternatives:
  - to acquire
  - to purchase
  lexicon: HALOT
  rationale: Straightforward infinitive of purchase. 'Buy' is the clearest modern equivalent.
- source_word: מֵעִמְּךָ
  chosen: from you
  alternatives:
  - from with you
  lexicon: HALOT
  rationale: Idiomatic English for the preposition plus pronoun in a transaction context.
- source_word: הַגֹּרֶן
  chosen: the threshing floor
  alternatives:
  - the threshing place
  lexicon: HALOT
  rationale: Standard rendering for the agricultural site in view; contextually specific and conventional.
- source_word: לִבְנוֹת מִזְבֵּחַ
  chosen: to build an altar
  alternatives:
  - to construct an altar
  lexicon: HALOT
  rationale: The infinitive phrase expresses purpose. 'Build an altar' is natural and sufficiently formal.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition can be represented as 'to' in connection with building an altar dedicated to him.
- source_word: וְתֵעָצַר
  chosen: so that ... may be restrained
  alternatives:
  - and ... will be stopped
  - that ... may be halted
  lexicon: HALOT
  rationale: The Niphal imperfect here expresses intended result/purpose following David's explanation. 'So that ... may be restrained' preserves the passive nuance and avoids overstating certainty.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the pestilence
  - the blow
  lexicon: HALOT
  rationale: In this narrative context the term denotes the deadly outbreak sent among the people. 'Plague' is the clearest idiomatic rendering.
- source_word: מֵעַל הָעָם
  chosen: from upon the people
  alternatives:
  - from the people
  - off the people
  lexicon: HALOT
  rationale: Retains the Hebrew spatial idiom more closely than simply 'from the people,' while remaining intelligible in English and preserving the sense of a burden lifted.
