id: 2SA.24.12
reference: 2 Samuel 24:12
source:
  edition: WLC
  text: הָל֞וֹךְ וְ/דִבַּרְתָּ֣ אֶל דָּוִ֗ד כֹּ֚ה אָמַ֣ר יְהוָ֔ה שָׁלֹ֕שׁ אָנֹכִ֖י נוֹטֵ֣ל עָלֶ֑י/ךָ בְּחַר לְ/ךָ֥ אַֽחַת מֵ/הֶ֖ם וְ/אֶֽעֱשֶׂה לָּֽ/ךְ־־־־׃
translation:
  text: 'Go and speak to David, ‘Thus says Yahweh: I am setting three things before you. Choose one of them for yourself, and I will do it to you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply 'three'; the noun is implied from the context. Possible renderings include 'three things' or 'three options.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ וְדִבַּרְתָּ
  chosen: Go and speak
  alternatives:
  - Go, speak
  - Go and tell
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb construction intensifies or reinforces the command. In English, 'Go and speak' is a natural imperative sequence that preserves the force without awkward literalism.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׁלֹשׁ
  chosen: three things
  alternatives:
  - three
  - three options
  lexicon: HALOT
  rationale: The Hebrew gives the bare numeral 'three' without an explicit noun. English normally requires an implied object; 'three things' is minimally interpretive and prepares for 'one of them' later in the verse. 'Three options' is possible but slightly more interpretive.
- source_word: אָנֹכִי נוֹטֵל עָלֶיךָ
  chosen: I am laying ... upon you
  alternatives:
  - I am setting before you
  - I am imposing on you
  - I take against you
  lexicon: HALOT
  rationale: נוֹטֵל with עַל literally suggests placing/laying upon. 'Laying ... upon you' preserves the concrete idiom and the weight of impending judgment better than the smoother but more interpretive 'setting before you.'
- source_word: בְּחַר לְךָ
  chosen: Choose one of them for yourself
  alternatives:
  - Choose for yourself one of them
  - Select one of them
  lexicon: HALOT
  rationale: בּחר is straightforwardly 'choose/select.' Including 'for yourself' reflects the ethical dative לְךָ and preserves David's personal responsibility in the choice.
- source_word: אַחַת מֵהֶם
  chosen: one of them
  alternatives:
  - one from them
  lexicon: HALOT
  rationale: Natural English rendering of the partitive expression.
- source_word: וְאֶעֱשֶׂה לָּךְ
  chosen: and I will do it to you
  alternatives:
  - and I will do it for you
  - and I will bring it upon you
  lexicon: HALOT
  rationale: In this judgment context, 'do it to you' best captures the adverse sense. Although ל can sometimes suggest 'for,' that would mislead in English here. 'Bring it upon you' is interpretive and imports wording from nearby contexts.
