theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the title 'the king' for Araunah
  chosen_reading: Retain 'Araunah the king' in the main text
  alternative_readings:
  - Araunah gave all this to the king
  - Araunah, O king, gave all this to the king
  rationale: The Hebrew apposition explicitly reads 'Araunah the king.' Although unusual
    in context and handled differently in some translations, there is no doctrinal
    reason to suppress the title; preserving the source wording best fits original-language
    primacy.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
