theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to preserve the title 'the king' for Araunah
  chosen_reading: Retain 'Araunah the king' in the main text
  alternative_readings:
  - Araunah gave all this to the king
  - Araunah, O king, gave all this to the king
  rationale: The Hebrew apposition explicitly reads 'Araunah the king.' Although unusual in context and handled differently in some translations, there is no doctrinal reason to suppress the title; preserving the source wording best fits original-language primacy.
