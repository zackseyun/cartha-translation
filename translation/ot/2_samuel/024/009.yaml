theological_decisions:
- issue: Numerical discrepancy with the parallel in 1 Chronicles 21:5
  chosen_reading: 'Translate the Masoretic Text of 2 Samuel as given: Israel eight
    hundred thousand; Judah five hundred thousand.'
  alternative_readings:
  - Harmonize with Chronicles numerically
  - Treat one account as including/excluding standing troops and reserve forces
  rationale: This is not a doctrinal issue to be resolved in translation. The verse
    should present the source text plainly without importing a harmonization theory.
    Explanatory possibilities belong in notes, not the main text.
  doctrine_reference: Translation philosophy §1, §3
