id: 2SA.24.9
reference: 2 Samuel 24:9
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן יוֹאָ֛ב אֶת מִסְפַּ֥ר מִפְקַד הָ/עָ֖ם אֶל הַ/מֶּ֑לֶךְ וַ/תְּהִ֣י
    יִשְׂרָאֵ֡ל שְׁמֹנֶה֩ מֵא֨וֹת אֶ֤לֶף אִֽישׁ חַ֨יִל֙ שֹׁ֣לֵֽף חֶ֔רֶב וְ/אִ֣ישׁ
    יְהוּדָ֔ה חֲמֵשׁ מֵא֥וֹת אֶ֖לֶף אִֽישׁ־־־־־׃
translation:
  text: 'Joab gave the number of the census of the people to the king: Israel was
    eight hundred thousand valiant men who drew the sword, and the men of Judah were
    five hundred thousand men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 1 Chronicles 21:5 gives different totals (1,100,000 for
      Israel and 470,000 for Judah). The translation here follows the Hebrew text
      of 2 Samuel without harmonizing the numbers.
    reason: cross_reference
lexical_decisions:
- source_word: מִסְפַּר מִפְקַד הָעָם
  chosen: the number of the census of the people
  alternatives:
  - the total of the muster of the people
  - the number of those counted among the people
  lexicon: HALOT
  rationale: The construct chain combines 'number' with 'muster/census/registration'
    and then 'the people.' 'Number of the census' preserves the formal structure while
    remaining natural English. 'Muster' is possible but 'census' better fits the counting
    context in this chapter.
- source_word: וַתְּהִי יִשְׂרָאֵל
  chosen: Israel was
  alternatives:
  - there were in Israel
  lexicon: HALOT
  rationale: The feminine singular verb with the collective proper noun yields a stative/result
    sense introducing the total. 'Israel was' is slightly formal but concise and close
    to the Hebrew; the following predicate supplies the counted total.
- source_word: שְׁמֹנֶה מֵאוֹת אֶלֶף
  chosen: eight hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: אִישׁ חַיִל
  chosen: valiant men
  alternatives:
  - mighty men
  - able-bodied men
  - men of valor
  lexicon: HALOT
  rationale: The phrase often denotes men of strength/valor. Here, in military census
    context, it refers to capable fighting men. 'Valiant men' preserves the martial
    nuance without sounding overly technical.
- source_word: שֹׁלֵף חֶרֶב
  chosen: who drew the sword
  alternatives:
  - drawing the sword
  - bearing arms
  lexicon: HALOT
  rationale: Literally 'drawing the sword.' This idiom marks men fit for battle. The
    relative clause is natural in English and keeps the concrete military image.
- source_word: וְאִישׁ יְהוּדָה
  chosen: and the men of Judah
  alternatives:
  - and Judah
  - and each man of Judah
  lexicon: HALOT
  rationale: Though singular in form, אִישׁ with a collective/genitival complement
    can represent the group. 'The men of Judah' best conveys the collective sense
    in English.
- source_word: חֲמֵשׁ מֵאוֹת אֶלֶף אִישׁ
  chosen: five hundred thousand men
  alternatives:
  - five hundred thousand
  lexicon: HALOT
  rationale: The final אִישׁ is retained as 'men' for completeness and rhythm, matching
    the Hebrew's explicit repetition.
