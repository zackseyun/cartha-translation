theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse contains direct address to God, so the same rendering is retained both in
    narration and prayer.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of עָוֹן in David's plea
  chosen_reading: guilt
  alternative_readings:
  - iniquity
  - punishment
  rationale: The Hebrew term can bear multiple related senses. In this context David
    confesses sin and asks the LORD to remove what clings to him because of that sin.
    'Guilt' best preserves the relational and moral sense without importing a narrower
    penal reading.
