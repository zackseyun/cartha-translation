id: 2SA.24.10
reference: 2 Samuel 24:10
source:
  edition: WLC
  text: וַ/יַּ֤ךְ לֵב דָּוִד֙ אֹת֔/וֹ אַחֲרֵי כֵ֖ן סָפַ֣ר אֶת הָ/עָ֑ם וַ/יֹּ֨אמֶר
    דָּוִ֜ד אֶל יְהוָ֗ה חָטָ֤אתִי מְאֹד֙ אֲשֶׁ֣ר עָשִׂ֔יתִי וְ/עַתָּ֣ה יְהוָ֔ה הַֽעֲבֶר
    נָא֙ אֶת עֲוֺ֣ן עַבְדְּ/ךָ֔ כִּ֥י נִסְכַּ֖לְתִּי מְאֹֽד־־־ס־־־׃
translation:
  text: After that, David’s heart struck him because he had counted the people. And
    David said to the LORD, “I have sinned greatly in what I have done. And now, LORD,
    please take away the guilt of your servant, for I have acted very foolishly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he had numbered the people” or “he had taken a census of the people.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “David’s heart struck him,” an idiom expressing inner conviction
      or a stricken conscience.
    reason: cultural_note
  - marker: c
    text: Or “the iniquity of your servant.” The Hebrew word can refer to iniquity,
      guilt, or at times the punishment resulting from sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ לֵב דָּוִד אֹתוֹ
  chosen: David’s heart struck him
  alternatives:
  - David was conscience-stricken
  - David's heart smote him
  lexicon: HALOT
  rationale: The idiom literally says 'the heart of David struck him.' 'David’s heart
    struck him' preserves the Hebrew imagery while remaining natural English. Alternatives
    either interpret the idiom more dynamically ('was conscience-stricken') or preserve
    older traditional diction ('smote').
- source_word: אַחֲרֵי כֵן
  chosen: After that
  alternatives:
  - Afterward
  - After this
  lexicon: HALOT
  rationale: A straightforward temporal connector. 'After that' is natural and sufficiently
    formal.
- source_word: סָפַר אֶת־הָעָם
  chosen: he had counted the people
  alternatives:
  - he had numbered the people
  - he had taken a census of the people
  lexicon: HALOT
  rationale: The verb means 'count/number.' 'Counted the people' is clear modern English.
    'Numbered' is traditional and possible; 'taken a census' is slightly more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the stated policy for יְהוָה.
- source_word: חָטָאתִי מְאֹד
  chosen: I have sinned greatly
  alternatives:
  - I have sinned very much
  - I have sinned grievously
  lexicon: HALOT
  rationale: This preserves both the confession of sin and the intensifier מְאֹד.
    'Greatly' is idiomatic and weighty without sounding archaic.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: in what I have done
  alternatives:
  - by what I have done
  - in that which I have done
  lexicon: HALOT
  rationale: This relative clause specifies the sphere of David's sin. 'In what I
    have done' is natural English and closely tracks the Hebrew sense.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: The conjunction plus adverb marks a transition from confession to petition.
    'And now' preserves that movement.
- source_word: הַעֲבֶר נָא
  chosen: please take away
  alternatives:
  - please let pass over
  - please remove
  lexicon: HALOT
  rationale: The Hiphil of עבר here is an idiom for causing guilt to pass away, i.e.,
    removing or taking away guilt. 'Please take away' communicates the sense clearly
    in English; 'let pass over' is too literal and obscure.
- source_word: עֲוֺן עַבְדְּךָ
  chosen: the guilt of your servant
  alternatives:
  - the iniquity of your servant
  - the punishment of your servant
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment depending on context.
    In a prayer for forgiveness, 'guilt' best captures the moral burden David asks
    God to remove. 'Iniquity' is possible but less accessible; 'punishment' is less
    likely here because the request follows confession rather than focusing on penalty.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in prayerful address to God
    by a king this is a conventional posture of humble service rather than emphasis
    on bonded status. Therefore 'servant' fits the context better under the project's
    context-sensitive policy.
- source_word: כִּי נִסְכַּלְתִּי מְאֹד
  chosen: for I have acted very foolishly
  alternatives:
  - for I have been very foolish
  - for I have done a very foolish thing
  lexicon: HALOT
  rationale: The verb from שכל in the Niphal conveys acting foolishly or behaving
    senselessly. 'I have acted very foolishly' expresses the verbal force and keeps
    the adverbial intensifier.
