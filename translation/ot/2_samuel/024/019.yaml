id: 2SA.24.19
reference: 2 Samuel 24:19
source:
  edition: WLC
  text: וַ/יַּ֤עַל דָּוִד֙ כִּ/דְבַר גָּ֔ד כַּ/אֲשֶׁ֖ר צִוָּ֥ה יְהוָֽה־׃
translation:
  text: So David went up according to the word of Gad, just as the LORD had commanded.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' 'Went up' preserves the
    directional nuance without sounding overly formal; 'went' would lose that nuance,
    while 'ascended' is too elevated for the narrative context.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - according to
  - in accordance with the word of
  - at the word of
  lexicon: HALOT
  rationale: The construction כ + דבר means 'according to the word/matter of.' Including
    'word' reflects the Hebrew explicitly and fits the prophetic-command context better
    than the more compressed 'according to' alone.
- source_word: גָּד
  chosen: Gad
  rationale: Standard English transliteration of the prophet's name.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This comparative conjunction introduces correspondence between Gad's
    word and the LORD's command. 'Just as' clearly conveys that equivalence in natural
    English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The verb means ''command.'' Rendering with English past perfect clarifies
    the sequence: the LORD''s command preceded David''s action and stands behind Gad''s
    word.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and preserving consistency.
