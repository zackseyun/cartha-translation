id: 2SA.24.17
reference: 2 Samuel 24:17
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ דָּוִ֨ד אֶל יְהוָ֜ה בִּ/רְאֹת֣/וֹ אֶֽת הַ/מַּלְאָ֣ךְ הַ/מַּכֶּ֣ה בָ/עָ֗ם וַ/יֹּ֨אמֶר֙ הִנֵּ֨ה אָנֹכִ֤י חָטָ֨אתִי֙ וְ/אָנֹכִ֣י הֶעֱוֵ֔יתִי וְ/אֵ֥לֶּה הַ/צֹּ֖אן מֶ֣ה עָשׂ֑וּ תְּהִ֨י נָ֥א יָדְ/ךָ֛ בִּ֖/י וּ/בְ/בֵ֥ית אָבִֽ/י־׀־׀׃פ
translation:
  text: Then David said to Yahweh, when he saw the angel striking the people, “Behold, I have sinned, and I have done wrong; but these sheep—what have they done? Please let your hand be against me and against my father's house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have acted perversely' / 'I have committed iniquity' for 'I have done wrong.'
    reason: lexical_alternative
  - marker: b
    text: '''My father''s house'' refers to David''s household or family line.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form in English.
- source_word: בִּרְאֹתוֹ
  chosen: when he saw
  alternatives:
  - on seeing
  - as he saw
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix is naturally temporal here; 'when he saw' gives clear modern English while preserving the sequence.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: In this judgment context the supernatural sense is clearly intended, so 'angel' is preferable to the more general 'messenger'.
- source_word: הַמַּכֶּה בָעָם
  chosen: striking the people
  alternatives:
  - smiting the people
  - plaguing the people
  - striking among the people
  lexicon: HALOT
  rationale: The participle from נכה denotes active striking. 'Striking the people' is faithful and readable; 'smiting' is archaic, while 'plaguing' interprets more specifically than the Hebrew states.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces David's emphatic self-accusation. 'Look' preserves the discourse force in contemporary English better than archaic 'Behold.'
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect here expresses David's acknowledgment of completed guilt with present relevance; 'I have sinned' is idiomatic and weighty in English.
- source_word: הֶעֱוֵיתִי
  chosen: I have done wrong
  alternatives:
  - I have acted perversely
  - I have committed iniquity
  - I am guilty
  lexicon: HALOT
  rationale: The Hiphil of עוה intensifies moral culpability beyond the previous verb. 'I have done wrong' is accessible modern English and preserves the distinction from 'I have sinned' without becoming wooden.
- source_word: הַצֹּאן
  chosen: these sheep
  alternatives:
  - this flock
  lexicon: HALOT
  rationale: David metaphorically refers to the people as sheep. 'These sheep' keeps the pastoral metaphor explicit and matches the demonstrative אֵלֶּה.
- source_word: מֶה עָשׂוּ
  chosen: what have they done?
  alternatives:
  - what did they do?
  lexicon: HALOT
  rationale: The question is rhetorical and appeals to present innocence regarding the judgment; the English present perfect conveys that force well.
- source_word: תְּהִי נָא יָדְךָ
  chosen: Please let your hand be
  alternatives:
  - Please may your hand be
  - Let your hand come
  lexicon: HALOT
  rationale: The jussive with particle נָא expresses plea. 'Your hand' is a standard Hebrew idiom for direct action or judgment and should be retained rather than paraphrased away.
- source_word: בִּי
  chosen: against me
  alternatives:
  - on me
  - upon me
  lexicon: HALOT
  rationale: With 'your hand,' English idiom prefers 'against me' to convey punitive action clearly.
- source_word: וּבְבֵית אָבִי
  chosen: and against my father's house
  alternatives:
  - and on my father's house
  - and against my family
  lexicon: HALOT
  rationale: '''Father''s house'' is a significant Hebrew kinship expression referring to David''s household/line. It is preserved rather than flattened to ''family,'' while ''against'' matches the preceding phrase idiomatically.'
