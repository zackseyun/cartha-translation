theological_decisions:
- issue: Metaphorical description of the people as sheep
  chosen_reading: Retain the metaphor explicitly in the main text
  alternative_readings:
  - Render as 'these people' for clarity
  rationale: The sheep metaphor is part of David's pastoral-royal self-understanding and heightens the innocence/vulnerability of the people. Preserving it avoids interpretive flattening.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic 'your hand' as divine judgment
  chosen_reading: Preserve 'your hand' in the main text
  alternative_readings:
  - Paraphrase as 'punish me' or 'strike me'
  rationale: The Hebrew idiom is transparent enough in English and carries theological weight regarding God's direct agency in judgment. Preserving the idiom maintains the text's imagery without obscuring meaning.
  doctrine_reference: Translation philosophy §1, §6
