theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of divine response in וַיֵּעָתֵר יְהוָה לָאָרֶץ
  chosen_reading: Then the LORD responded to the plea for the land
  alternative_readings:
  - Then the LORD was moved by prayer for the land
  - Then the LORD answered prayer for the land
  rationale: The Hebrew verb indicates favorable response to entreaty, but the text
    does not explicitly restate the prayer itself. The chosen wording preserves that
    God responded mercifully without importing a more developed theological explanation
    than the verse states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
