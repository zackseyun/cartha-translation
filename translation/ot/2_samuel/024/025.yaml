id: 2SA.24.25
reference: 2 Samuel 24:25
source:
  edition: WLC
  text: וַ/יִּבֶן֩ שָׁ֨ם דָּוִ֤ד מִזְבֵּ֨חַ֙ לַֽ/יהוָ֔ה וַ/יַּ֥עַל עֹל֖וֹת וּ/שְׁלָמִ֑ים
    וַ/יֵּעָתֵ֤ר יְהוָה֙ לָ/אָ֔רֶץ וַ/תֵּעָצַ֥ר הַ/מַּגֵּפָ֖ה מֵ/עַ֥ל יִשְׂרָאֵֽל׃
translation:
  text: There David built an altar to the LORD and offered up burnt offerings and
    peace offerings. Then the LORD responded to the plea for the land, and the plague
    was restrained from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace offerings,' alternatively 'fellowship offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD responded favorably for the land'; the expression may also
      be rendered 'the LORD answered prayer for the land.'
    reason: alternative_reading
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: Standard rendering of בנה in narrative context; 'built' is natural and
    sufficiently formal.
- source_word: שָׁם
  chosen: There
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Locative adverb pointing back to Araunah's threshing floor; 'there' is
    concise and natural.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Established and precise rendering for sacrificial altar.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/direction of the altar to YHWH. Per
    doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: וַיַּעַל
  chosen: offered up
  alternatives:
  - offered
  - caused to ascend
  lexicon: HALOT
  rationale: עלה with sacrifices idiomatically means to offer them up. 'Offered up'
    preserves the sacrificial nuance better than the flatter 'offered'.
- source_word: עֹלוֹת
  chosen: burnt offerings
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the sacrificial term עֹלָה in
    the plural.
- source_word: וּשְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally rendered 'peace offerings'; this remains understandable
    in modern English and preserves the sacrificial category. 'Fellowship offerings'
    is a viable interpretive alternative but somewhat more explanatory.
- source_word: וַיֵּעָתֵר
  chosen: responded to the plea
  alternatives:
  - was moved by prayer
  - answered prayer
  - accepted entreaty
  lexicon: HALOT
  rationale: The Niphal of עתר often conveys being entreated or responding favorably
    to supplication. Because the object is 'for the land,' 'responded to the plea'
    communicates divine favorable response without over-specifying the exact implied
    subject of the prayer.
- source_word: לָאָרֶץ
  chosen: for the land
  alternatives:
  - to the land
  - on behalf of the land
  lexicon: HALOT
  rationale: The prepositional phrase is difficult if rendered woodenly. In context
    it indicates favorable response concerning the land/land of Israel. 'For the land'
    is idiomatic and preserves the sense of divine relenting with respect to the land.
- source_word: וַתֵּעָצַר
  chosen: was restrained
  alternatives:
  - was stopped
  - ceased
  lexicon: HALOT
  rationale: עצר in the Niphal/passive sense indicates being held back or stopped.
    'Was restrained' preserves the passive nuance and the sense that the plague was
    divinely checked.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the pestilence
  lexicon: HALOT
  rationale: Clear modern English for the deadly outbreak described in the chapter;
    'pestilence' is possible but less accessible.
- source_word: מֵעַל יִשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - from upon Israel
  - away from Israel
  lexicon: HALOT
  rationale: The idiom literally means 'from upon Israel'; in English 'from Israel'
    communicates the sense naturally without loss.
