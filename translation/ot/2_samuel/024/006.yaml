id: 2SA.24.6
reference: 2 Samuel 24:6
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ הַ/גִּלְעָ֔דָ/ה וְ/אֶל אֶ֥רֶץ תַּחְתִּ֖ים חָדְשִׁ֑י וַ/יָּבֹ֨אוּ֙
    דָּ֣נָ/ה יַּ֔עַן וְ/סָבִ֖יב אֶל צִידֽוֹן־־׃
translation:
  text: They came to Gilead and to the land of Tahtim-hodshi, and they came to Dan-jaan,
    and around to Sidon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Tahtim-hodshi is obscure; some emend or interpret it as 'the land
      of the Hittites at Kadesh' or similar, but the underlying place-name is uncertain.
    reason: alternative_reading
  - marker: b
    text: Dan-jaan is likely a place name; its exact identification is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates movement in sequence. 'They came' is a natural
    English narrative rendering, though in itinerary contexts 'went' is also possible.
    Repeating it preserves the Hebrew's step-by-step travel report.
- source_word: הַגִּלְעָדָה
  chosen: to Gilead
  alternatives:
  - Gileadward
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward the region.
    English idiom normally expresses this simply as 'to Gilead.'
- source_word: אֶרֶץ
  chosen: the land of
  alternatives:
  - the territory of
  lexicon: HALOT
  rationale: אֶרֶץ here denotes a region/land area rather than the earth in general.
    'The land of' is the most straightforward geographic rendering.
- source_word: תַּחְתִּים חָדְשִׁי
  chosen: Tahtim-hodshi
  alternatives:
  - the land of the Hittites at Kadesh
  - Lower Hadshi
  - Tahtim-hadshi
  lexicon: HALOT
  rationale: This expression is textually and geographically obscure, and many translations
    emend or interpret it. Because the Hebrew form is uncertain and likely preserves
    a place-name or compound toponym, transliteration is the most auditable choice
    in the main text rather than importing a conjectural identification.
- source_word: דָּנָה יַּעַן
  chosen: Dan-jaan
  alternatives:
  - Dan-jaan
  - to Dan-jaan
  lexicon: HALOT
  rationale: The phrase is best taken as a place name, traditionally rendered by transliteration.
    The directional ending on דנה is absorbed idiomatically into the travel sequence
    rather than separately represented with an additional 'to' after the repeated
    'they came.' Spelling 'Dan-jaan' reflects the likely consonantal form in standard
    English transliteration.
- source_word: וְסָבִיב
  chosen: and around
  alternatives:
  - and all around
  - and they went around
  lexicon: HALOT
  rationale: סָבִיב denotes circling or surrounding movement. 'And around' keeps the
    concise itinerary style of the Hebrew while indicating movement through the surrounding
    area.
- source_word: אֶל צִידוֹן
  chosen: to Sidon
  alternatives:
  - toward Sidon
  lexicon: HALOT
  rationale: Simple preposition plus place name indicating destination. 'To Sidon'
    is the plain sense.
