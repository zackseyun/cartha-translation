id: 2SA.11.18
reference: 2 Samuel 11:18
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֖ח יוֹאָ֑ב וַ/יַּגֵּ֣ד לְ/דָוִ֔ד אֶת כָּל דִּבְרֵ֖י הַ/מִּלְחָמָֽה־־׃
translation:
  text: Then Joab sent word and told David all the news of the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the matters of the battle.' The Hebrew is literally 'all the words
      of the battle,' an idiom for the details or report of the fighting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In context, with the following
    reporting verb and indirect object David, English idiom is improved by 'sent word,'
    which naturally conveys sending a message rather than merely sending a person
    or object.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Standard English transliteration of the personal name.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, declare, or report. 'Told' is natural
    modern English and fits the direct-object construction with 'all the news of the
    battle.'
- source_word: לְדָוִד
  chosen: David
  rationale: Proper name transliterated by standard convention; the preposition is
    naturally represented in English by the indirect-object construction 'told David.'
- source_word: אֵת כָּל דִּבְרֵי הַמִּלְחָמָה
  chosen: all the news of the battle
  alternatives:
  - all the matters of the battle
  - everything concerning the battle
  - all the words of the battle
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words/matters of,' but in this narrative reporting
    context it refers to the details or report of the military engagement. 'News of
    the battle' is a clear optimal-equivalence rendering that preserves the sense
    without woodenly reproducing 'words.'
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the war
  - the fighting
  lexicon: HALOT
  rationale: While מִלְחָמָה can mean 'war' broadly, here the immediate context is
    a specific military action being reported back to David, so 'battle' is the more
    precise English choice.
