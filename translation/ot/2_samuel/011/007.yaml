id: 2SA.11.7
reference: 2 Samuel 11:7
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אוּרִיָּ֖ה אֵלָ֑י/ו וַ/יִּשְׁאַ֣ל דָּוִ֗ד לִ/שְׁל֤וֹם יוֹאָב֙ וְ/לִ/שְׁל֣וֹם
    הָ/עָ֔ם וְ/לִ/שְׁל֖וֹם הַ/מִּלְחָמָֽה׃
translation:
  text: When Uriah came to him, David asked how Joab was, how the troops were, and
    how the war was going.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'David asked about the welfare of Joab, and about the welfare
      of the troops, and about the welfare of the war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'enter.' In this narrative context,
    'came' is the most natural English rendering with the following phrase 'to him.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - before him
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix straightforwardly indicates
    motion toward David. 'To him' preserves the simple relational sense.
- source_word: וַיִּשְׁאַל
  chosen: asked
  alternatives:
  - inquired
  - questioned
  lexicon: HALOT
  rationale: שׁאל here introduces David's inquiry about conditions at the front. 'Asked'
    is idiomatic and sufficiently formal without overstating the action.
- source_word: לִשְׁלוֹם
  chosen: how ... was / how ... was going
  alternatives:
  - concerning the welfare of
  - for the peace of
  - about the well-being of
  lexicon: HALOT
  rationale: שָׁלוֹם in this construction refers to welfare, condition, or state.
    In English narrative, repeating 'how X was' and 'how the war was going' best conveys
    the idiomatic sense rather than the less natural 'asked for the peace of.'
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הָעָם
  chosen: the troops
  alternatives:
  - the people
  - the army
  - the men
  lexicon: HALOT
  rationale: Although עָם often means 'people,' in this military context David is
    asking about the fighting force with Joab. 'The troops' captures the contextual
    referent more clearly than the overly broad 'people.'
- source_word: הַמִּלְחָמָה
  chosen: the war
  alternatives:
  - the battle
  - the fighting
  lexicon: HALOT
  rationale: מִלְחָמָה denotes warfare or battle. 'The war' fits the broader campaign
    context and works naturally with 'was going.'
