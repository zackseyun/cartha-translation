theological_decisions:
- issue: Rendering of the campaign-season phrase לְעֵת צֵאת הַמְּלָאכִים
  chosen_reading: when kings go out to battle
  alternative_readings:
  - when messengers go out
  rationale: This is not a major doctrinal issue, but it is a meaningful interpretive
    decision. The military context, the parallel in ancient Near Eastern seasonal
    warfare, and the immediate narrative of Joab leading Israel's forces support 'kings'
    rather than 'messengers.' The wording also sets up the narrative irony that David
    did not do what kings normally do.
  doctrine_reference: Translation philosophy §1, §3
