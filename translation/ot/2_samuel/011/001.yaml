id: 2SA.11.1
reference: 2 Samuel 11:1
source:
  edition: WLC
  text: וַ/יְהִי֩ לִ/תְשׁוּבַ֨ת הַ/שָּׁנָ֜ה לְ/עֵ֣ת צֵ֣את הַ/מַּלְאֿכִ֗ים וַ/יִּשְׁלַ֣ח
    דָּוִ֡ד אֶת יוֹאָב֩ וְ/אֶת עֲבָדָ֨י/ו עִמּ֜/וֹ וְ/אֶת כָּל יִשְׂרָאֵ֗ל וַ/יַּשְׁחִ֨תוּ֙
    אֶת בְּנֵ֣י עַמּ֔וֹן וַ/יָּצֻ֖רוּ עַל רַבָּ֑ה וְ/דָוִ֖ד יוֹשֵׁ֥ב בִּ/ירוּשָׁלִָֽם׀־־־־־־׃ס
translation:
  text: At the turn of the year, at the time when kings go out to battle, David sent
    Joab, his servants with him, and all Israel. They devastated the Ammonites and
    besieged Rabbah, but David remained in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the turn/return of the year,'' likely referring to the spring
      campaign season.'
    reason: cultural_note
  - marker: b
    text: Or 'at the time when messengers go out.' The context strongly favors 'kings
      go out to battle.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  chosen: at the turn of the year
  alternatives:
  - at the return of the year
  - in the spring of the year
  lexicon: HALOT
  rationale: The phrase literally refers to the year's turning/return. 'At the turn
    of the year' preserves the temporal idiom without over-paraphrasing. 'In the spring'
    captures the likely seasonal sense in context but is more interpretive than the
    Hebrew wording itself.
- source_word: לְעֵת צֵאת הַמְּלָאכִים
  chosen: at the time when kings go out to battle
  alternatives:
  - at the time when messengers go out
  - at the time of the going out of kings
  lexicon: HALOT
  rationale: The consonantal text can be read from מְלָאכִים ('kings') in this well-established
    contextual sense, matching the military setting and ancient campaign season. A
    reading related to 'messengers' is lexically possible from a similar form but
    does not fit the context as well. 'Go out to battle' makes explicit the military
    sense implied by the narrative context.
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative. 'Sent' is natural modern English
    and sufficiently precise.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his men
  lexicon: HALOT
  rationale: The term broadly denotes servants/attendants in royal service. 'His servants'
    preserves the lexical form and avoids narrowing the group to military officers
    only, though in context they likely function as royal personnel in the campaign.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole army of Israel
  lexicon: HALOT
  rationale: The Hebrew says 'all Israel,' a conventional way of referring to the
    national fighting force or collective people. The literal expression is retained.
- source_word: וַיַּשְׁחִתוּ
  chosen: devastated
  alternatives:
  - destroyed
  - ravaged
  lexicon: HALOT
  rationale: The verb from שׁחת in the Hiphil conveys destructive action. 'Devastated'
    fits the military context and avoids implying total annihilation, since the narrative
    continues with a siege.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: '''The Ammonites'' is the standard idiomatic English rendering of the
    ethnonym. ''Sons of Ammon'' is more formally literal but less natural in English.'
- source_word: וַיָּצֻרוּ עַל רַבָּה
  chosen: besieged Rabbah
  alternatives:
  - laid siege to Rabbah
  lexicon: HALOT
  rationale: The verb צור with על denotes besieging a city. 'Besieged Rabbah' is concise
    and natural.
- source_word: יוֹשֵׁב
  chosen: remained
  alternatives:
  - was staying
  - was sitting/dwelling
  lexicon: HALOT
  rationale: The participle literally means 'sitting/dwelling,' but in this contrastive
    narrative setting it conveys that David stayed behind rather than going out with
    the army. 'Remained' captures the force idiomatically in English.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
