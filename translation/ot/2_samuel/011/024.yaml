id: 2SA.11.24
reference: 2 Samuel 11:24
source:
  edition: WLC
  text: ו/יראו ה/מוראים אֶל עֲבָדֶ֨/ךָ֙ מֵ/עַ֣ל הַ/חוֹמָ֔ה וַ/יָּמ֖וּתוּ מֵ/עַבְדֵ֣י
    הַ/מֶּ֑לֶךְ וְ/גַ֗ם עַבְדְּ/ךָ֛ אוּרִיָּ֥ה הַ/חִתִּ֖י מֵֽת־׃ס
translation:
  text: The archers shot at your servants from atop the wall, and some of the king’s
    servants died; your servant Uriah the Hittite also died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and some of the king’s servants died''; the preposition may be
      understood partitively (''some of'').'
    reason: lexical_alternative
  - marker: b
    text: Or 'is dead' for the final clause, reflecting the Hebrew stative form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרוּ / הַמּוֹרִים
  chosen: The archers shot
  alternatives:
  - the shooters shot
  - they shot, the archers
  lexicon: HALOT
  rationale: The consonantal text/morphology points to ירה ('to shoot') with the participle
    הַמּוֹרִים, best rendered idiomatically as 'the archers.' This avoids the awkwardly
    literal 'the shooters' while preserving the military sense.
- source_word: אֶל
  chosen: at
  alternatives:
  - toward
  - against
  lexicon: HALOT
  rationale: With a verb of shooting, English idiom prefers 'shot at' rather than
    the more wooden 'shot toward' or 'shot against.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your men
  lexicon: HALOT
  rationale: עבד commonly means 'servant' or 'slave'; in royal/military context it
    refers to the king's subordinates. 'Your servants' preserves the deferential court
    language better than 'your men.'
- source_word: מֵעַל הַחוֹמָה
  chosen: from atop the wall
  alternatives:
  - from above the wall
  - from on the wall
  lexicon: HALOT
  rationale: מֵעַל indicates position from above/upon. 'From atop the wall' is natural
    modern English and preserves the elevated firing position.
- source_word: וַיָּמֻתוּ מֵעַבְדֵי הַמֶּלֶךְ
  chosen: and some of the king’s servants died
  alternatives:
  - and servants of the king died
  - and some of the king's men died
  lexicon: HALOT
  rationale: The partitive מִן before 'servants of the king' naturally yields 'some
    of.' This is more precise than a bare plural and reflects that only a portion
    of the servants died.
- source_word: וְגַם
  chosen: also
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: '''Also'' cleanly conveys the additive force, highlighting Uriah''s death
    as an additional and climactic report.'
- source_word: עַבְדְּךָ אוּרִיָּה הַחִתִּי
  chosen: your servant Uriah the Hittite
  alternatives:
  - your servant Uriah the Hethite
  lexicon: HALOT
  rationale: Retains the deferential address 'your servant' and standard English transliteration
    'Uriah the Hittite.'
- source_word: מֵת
  chosen: died
  alternatives:
  - is dead
  lexicon: HALOT
  rationale: Though morphologically a stative/perfect-like form ('is dead'), in this
    narrative report English 'died' is the most natural equivalent and matches the
    preceding verbal sequence.
