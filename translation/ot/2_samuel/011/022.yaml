id: 2SA.11.22
reference: 2 Samuel 11:22
source:
  edition: WLC
  text: וַ/יֵּ֖לֶךְ הַ/מַּלְאָ֑ךְ וַ/יָּבֹא֙ וַ/יַּגֵּ֣ד לְ/דָוִ֔ד אֵ֛ת כָּל אֲשֶׁ֥ר
    שְׁלָח֖/וֹ יוֹאָֽב־׃
translation:
  text: So the messenger went and came and told David all that Joab had sent him to
    say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all that Joab sent him.' The sense is that the messenger
      reported all that Joab had sent him to communicate.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger' in human contexts and 'angel' in
    supernatural ones. Here the narrative context is military communication from Joab
    to David, so 'messenger' is the plain sense.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  lexicon: HALOT
  rationale: 'הלך in the wayyiqtol sequence straightforwardly advances the narrative:
    the messenger departed. ''Went'' is the most natural and sufficiently formal rendering.'
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: בוא is the standard verb 'come/arrive.' Rendering it as 'came' preserves
    the Hebrew narrative rhythm alongside the preceding 'went.'
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, report, or make known. 'Told' fits readable
    modern English and matches the direct object plus indirect object construction
    here.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  lexicon: HALOT
  rationale: The phrase marks the total content of the message. 'All that' is concise
    and idiomatic while preserving the comprehensiveness of כָּל.
- source_word: שְׁלָחוֹ יוֹאָב
  chosen: Joab had sent him to say
  alternatives:
  - Joab sent him
  - Joab had instructed him
  lexicon: HALOT
  rationale: The Hebrew literally reads 'which Joab sent him.' In English, 'sent him'
    without an expressed complement can sound incomplete after 'told David all that...'.
    The idiomatic expansion 'had sent him to say' makes explicit the communicative
    force already implied by the context and by the messenger's reporting function,
    without materially adding content beyond what the Hebrew construction conveys.
- source_word: לְדָוִד
  chosen: David
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
