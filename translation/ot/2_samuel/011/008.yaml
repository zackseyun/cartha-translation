id: 2SA.11.8
reference: 2 Samuel 11:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ לְ/א֣וּרִיָּ֔ה רֵ֥ד לְ/בֵיתְ/ךָ֖ וּ/רְחַ֣ץ רַגְלֶ֑י/ךָ
    וַ/יֵּצֵ֤א אֽוּרִיָּה֙ מִ/בֵּ֣ית הַ/מֶּ֔לֶךְ וַ/תֵּצֵ֥א אַחֲרָ֖י/ו מַשְׂאַ֥ת הַ/מֶּֽלֶךְ׃
translation:
  text: Then David said to Uriah, “Go down to your house and wash your feet.” So Uriah
    went out from the king’s house, and a gift from the king went out after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a portion from the king.” The Hebrew term can refer to something carried
      or sent, including a portion or gift.
    reason: lexical_alternative
  - marker: b
    text: “Wash your feet” is a literal expression that can also suggest refreshment
      or settling in at home after travel.
    reason: cultural_note
lexical_decisions:
- source_word: רֵד
  chosen: Go down
  alternatives:
  - Go
  lexicon: HALOT
  rationale: The imperative of ירד literally means 'go down/descend.' 'Go down' preserves
    the Hebrew's directional nuance, likely from palace to house, without overexplaining.
- source_word: לְבֵיתְךָ
  chosen: to your house
  alternatives:
  - home
  lexicon: HALOT
  rationale: '''House'' is the direct lexical sense of בית. ''Home'' is possible idiomatically,
    but ''house'' better preserves the concrete wording while remaining natural in
    English.'
- source_word: וּרְחַץ רַגְלֶיךָ
  chosen: and wash your feet
  alternatives:
  - and freshen up
  - and bathe your feet
  lexicon: HALOT
  rationale: The phrase is literally 'wash your feet.' It can function idiomatically
    as a gesture of refreshment after travel and may also imply settling in at home,
    but the main text should preserve the concrete expression rather than paraphrase.
- source_word: מִבֵּית הַמֶּלֶךְ
  chosen: from the king’s house
  alternatives:
  - from the palace
  lexicon: HALOT
  rationale: Literally 'from the house of the king.' 'Palace' is contextually plausible,
    but 'the king's house' stays closer to the Hebrew and is still clear.
- source_word: מַשְׂאַת הַמֶּלֶךְ
  chosen: a gift from the king
  alternatives:
  - the king’s portion
  - a present from the king
  lexicon: HALOT
  rationale: מַשְׂאֵת can denote a portion, tribute, or gift sent out. In this narrative
    context, something is dispatched after Uriah from the king; 'a gift from the king'
    is the most natural and widely defensible rendering in English. 'Portion' is possible
    but less clear without added explanation.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: The preposition indicates following after Uriah. 'After him' is the most
    idiomatic rendering in this narrative sequence.
