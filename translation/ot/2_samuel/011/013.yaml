id: 2SA.11.13
reference: 2 Samuel 11:13
source:
  edition: WLC
  text: וַ/יִּקְרָא ל֣/וֹ דָוִ֗ד וַ/יֹּ֧אכַל לְ/פָנָ֛י/ו וַ/יֵּ֖שְׁתְּ וַֽ/יְשַׁכְּרֵ֑/הוּ
    וַ/יֵּצֵ֣א בָ/עֶ֗רֶב לִ/שְׁכַּ֤ב בְּ/מִשְׁכָּב/וֹ֙ עִם עַבְדֵ֣י אֲדֹנָ֔י/ו וְ/אֶל
    בֵּית֖/וֹ לֹ֥א יָרָֽד־־־׃
translation:
  text: David invited him, and he ate and drank before him, and he made him drunk.
    In the evening he went out to lie on his bed with the servants of his lord, but
    he did not go down to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'David called for him' or 'David summoned him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before him,' that is, in David's presence.
    reason: lexical_alternative
  - marker: c
    text: Or, 'with his master's servants.' The 'lord' here is David.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'did not go down to his house.' The verb 'go down' is kept from the
      source text rather than simplified to 'go home.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא לוֹ
  chosen: David invited him
  alternatives:
  - David called for him
  - David summoned him
  lexicon: HALOT
  rationale: קרא with ל plus person can mean call to/for someone, but in this meal
    setting 'invited him' best captures the social action in natural English without
    losing the sense that David initiated the encounter.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' is concise and idiomatic,
    preserving the relational detail that Uriah ate in David's presence.
- source_word: וַיְשַׁכְּרֵהוּ
  chosen: he made him drunk
  alternatives:
  - he got him drunk
  - he made him intoxicated
  lexicon: HALOT
  rationale: 'The Hiphil of שׁכר is causative: David caused Uriah to become drunk.
    ''Made him drunk'' is direct and preserves David''s intentional action.'
- source_word: בָּעֶרֶב
  chosen: In the evening
  alternatives:
  - That evening
  - at evening
  lexicon: HALOT
  rationale: Temporal phrase marking the next stage of the narrative. 'In the evening'
    is clear modern English and keeps the sequence.
- source_word: לִשְׁכַּב
  chosen: to lie
  alternatives:
  - to lie down
  - to sleep
  lexicon: HALOT
  rationale: The infinitive means 'to lie down.' 'To lie' works smoothly with the
    following 'on his bed'; 'to sleep' would over-interpret the action.
- source_word: בְּמִשְׁכָּבוֹ
  chosen: on his bed
  alternatives:
  - in his sleeping place
  - on his couch
  lexicon: HALOT
  rationale: מִשְׁכָּב can denote bed or sleeping place. 'On his bed' is the most
    natural rendering here and fits the concrete scene.
- source_word: עִם עַבְדֵי אֲדֹנָיו
  chosen: with the servants of his lord
  alternatives:
  - with his master's servants
  lexicon: HALOT
  rationale: אֲדֹנָיו here refers to Uriah's lord, namely David. 'Servants of his
    lord' preserves the third-person possessive structure and the irony of Uriah remaining
    among royal servants rather than going home.
- source_word: וְאֶל בֵּיתוֹ לֹא יָרָד
  chosen: but he did not go down to his house
  alternatives:
  - and he did not go down to his house
  lexicon: HALOT
  rationale: ירד 'go down' is retained rather than flattened to 'go home,' since the
    Hebrew explicitly uses the directional verb and it is repeated in the surrounding
    context. 'But' reflects the adversative force in English narrative, though the
    Hebrew conjunction is simply 'and.'
