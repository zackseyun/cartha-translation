theological_decisions:
- issue: Ritual-purity clause and its function in the narrative
  chosen_reading: 'Render the clause as a parenthetical note about Bathsheba''s ritual
    purification: ''Now she was purifying herself from her uncleanness.'''
  alternative_readings:
  - 'Render as pluperfect: ''she had purified herself from her uncleanness'''
  - 'Render with stronger sanctification language: ''she was sanctifying herself'''
  rationale: The Hebrew participial clause most naturally gives background information
    rather than a completed prior action. The note likely explains the timing relevant
    to conception and reflects Levitical purity categories, not moral approval or
    condemnation. The translation should preserve the ritual sense without importing
    extra theological claims about Bathsheba's culpability or innocence beyond what
    the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
