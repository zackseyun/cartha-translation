id: 2SA.11.4
reference: 2 Samuel 11:4
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ דָּוִ֨ד מַלְאָכִ֜ים וַ/יִּקָּחֶ֗/הָ וַ/תָּב֤וֹא אֵלָי/ו֙ וַ/יִּשְׁכַּ֣ב
    עִמָּ֔/הּ וְ/הִ֥יא מִתְקַדֶּ֖שֶׁת מִ/טֻּמְאָתָ֑/הּ וַ/תָּ֖שָׁב אֶל בֵּיתָֽ/הּ־׃
translation:
  text: So David sent messengers and took her, and she came to him, and he lay with
    her. Now she was purifying herself from her uncleanness. Then she returned to
    her house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she had purified herself from her uncleanness.' The Hebrew can be understood
      as a background note about ritual cleansing after menstruation.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from שלח, best rendered with simple
    past in English narrative.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - agents
  lexicon: HALOT
  rationale: The term ordinarily means 'messengers.' 'Messengers' preserves the concrete
    sense without overinterpreting their official role.
- source_word: וַיִּקָּחֶהָ
  chosen: took her
  alternatives:
  - fetched her
  - brought her
  lexicon: HALOT
  rationale: לקח literally means 'take.' In this context it can imply having her brought,
    but 'took her' stays closer to the Hebrew and preserves the terse, morally weighty
    narration.
- source_word: וַתָּבֹוא אֵלָיו
  chosen: she came to him
  alternatives:
  - she went in to him
  lexicon: HALOT
  rationale: A straightforward rendering of the motion verb plus preposition. 'Came
    to him' is natural English and does not add euphemistic force beyond the Hebrew.
- source_word: וַיִּשְׁכַּב עִמָּהּ
  chosen: he lay with her
  alternatives:
  - he slept with her
  lexicon: HALOT
  rationale: This is the standard biblical idiom for sexual relations. 'Lay with her'
    preserves the idiomatic and literary register better than the more colloquial
    'slept with her.'
- source_word: וְהִיא מִתְקַדֶּשֶׁת מִטֻּמְאָתָהּ
  chosen: Now she was purifying herself from her uncleanness
  alternatives:
  - and she was sanctifying herself from her impurity
  - while she was cleansing herself from her uncleanness
  lexicon: HALOT
  rationale: The hitpael of קדשׁ here refers to ritual purification rather than moral
    sanctification. 'Purifying herself' communicates the ritual sense clearly. 'Uncleanness'
    preserves the cultic category of טֻמְאָה better than the more generic 'impurity.'
    The clause is parenthetical/background information, often understood to indicate
    post-menstrual purification.
- source_word: וַתָּשָׁב
  chosen: Then she returned
  alternatives:
  - and she returned
  lexicon: HALOT
  rationale: Simple past narrative continuation. 'Then' gives smooth English sequence
    while preserving the Hebrew storyline.
- source_word: אֶל בֵּיתָהּ
  chosen: to her house
  alternatives:
  - to her home
  lexicon: HALOT
  rationale: '''House'' is the more literal rendering of בית and fits the narrative
    style.'
