id: 2SA.11.25
reference: 2 Samuel 11:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל הַ/מַּלְאָ֗ךְ כֹּֽה תֹאמַ֤ר אֶל יוֹאָב֙ אַל יֵרַ֤ע
    בְּ/עֵינֶ֨י/ךָ֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה כִּֽי כָ/זֹ֥ה וְ/כָ/זֶ֖ה תֹּאכַ֣ל הֶ/חָ֑רֶב
    הַחֲזֵ֨ק מִלְחַמְתְּ/ךָ֧ אֶל הָ/עִ֛יר וְ/הָרְסָ֖/הּ וְ/חַזְּקֵֽ/הוּ־־־־־־־׃
translation:
  text: Then David said to the messenger, “Thus you shall say to Joab, ‘Do not let
    this matter be evil in your eyes, for the sword devours one as well as another.
    Strengthen your battle against the city and overthrow it.’ And encourage him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not let this matter displease you.” The Hebrew literally says, “Do
      not let this matter be evil in your eyes.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “for thus and thus the sword devours,” meaning the sword
      kills one person as well as another.'
    reason: lexical_alternative
  - marker: c
    text: Or, “And strengthen him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  lexicon: HALOT
  rationale: In this narrative context the term refers to a human courier, not an
    angelic being. 'Messenger' is the most natural and accurate English rendering.
- source_word: כֹּה תֹאמַר
  chosen: Thus you shall say
  alternatives:
  - This is what you shall say
  - So you shall say
  lexicon: HALOT
  rationale: This formula introduces quoted speech to be relayed. 'Thus you shall
    say' preserves the formal messenger formula while remaining readable.
- source_word: אַל יֵרַע בְּעֵינֶיךָ
  chosen: Do not let ... be evil in your eyes
  alternatives:
  - Do not let ... displease you
  - Do not regard ... as bad
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of something being evil in someone's
    eyes. Retaining 'be evil in your eyes' preserves the idiom's moral coloring and
    David's attempt to frame the event as not objectionable to Joab. A smoother alternative
    is preserved in a footnote.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this event
  lexicon: HALOT
  rationale: דבר here refers to the reported occurrence, namely Uriah's death in battle.
    'Matter' is idiomatic English and broad enough to cover the event without over-specifying.
- source_word: כִּי כָזֹה וְכָזֶה
  chosen: for ... one as well as another
  alternatives:
  - for now one way, now another
  - for thus and thus
  lexicon: HALOT
  rationale: The Hebrew expression is idiomatic, conveying variability or indiscriminate
    outcome. In context, with the sword as subject, the sense is that it kills this
    one and that one. 'One as well as another' communicates the idiom clearly in English.
- source_word: תֹּאכַל הֶחָרֶב
  chosen: the sword devours
  alternatives:
  - the sword consumes
  - the sword kills
  lexicon: HALOT
  rationale: The verb 'eat/devour' is a vivid metaphor commonly used of the sword.
    'Devours' preserves the metaphorical force better than the flatter 'kills'.
- source_word: הַחֲזֵק מִלְחַמְתְּךָ
  chosen: Strengthen your battle
  alternatives:
  - Press your attack
  - Make your battle strong
  lexicon: HALOT
  rationale: The imperative from חזק means to strengthen or make strong. 'Strengthen
    your battle' is slightly formal but preserves the Hebrew image; in context it
    means intensify the assault.
- source_word: וְהָרְסָהּ
  chosen: and overthrow it
  alternatives:
  - and tear it down
  - and destroy it
  lexicon: HALOT
  rationale: The verb means to pull down or demolish. With a city as object in siege
    context, 'overthrow it' fits military English while preserving the destructive
    sense.
- source_word: וְחַזְּקֵהוּ
  chosen: And encourage him
  alternatives:
  - And strengthen him
  - And embolden him
  lexicon: HALOT
  rationale: The suffix is masculine singular, referring most naturally to Joab. Since
    the command follows the message to Joab, the sense is to strengthen or encourage
    him. 'Encourage him' communicates the interpersonal force in natural English,
    while the more literal 'strengthen him' is preserved as an alternative.
