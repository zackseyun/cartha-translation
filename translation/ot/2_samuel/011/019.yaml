id: 2SA.11.19
reference: 2 Samuel 11:19
source:
  edition: WLC
  text: וַ/יְצַ֥ו אֶת הַ/מַּלְאָ֖ךְ לֵ/אמֹ֑ר כְּ/כַלּוֹתְ/ךָ֗ אֵ֛ת כָּל דִּבְרֵ֥י
    הַ/מִּלְחָמָ֖ה לְ/דַבֵּ֥ר אֶל הַ/מֶּֽלֶךְ־־־׃
translation:
  text: And he commanded the messenger, saying, “When you have finished telling the
    king all the news of the battle,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “all the matters of the battle,” that is, the full report concerning
      the battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: And he commanded
  alternatives:
  - And he instructed
  - And he ordered
  lexicon: HALOT
  rationale: The verb צוה commonly means to command or give instructions. 'Commanded'
    preserves the authoritative force and narrative style better than the softer 'instructed'.
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either a human messenger or an angel depending on context.
    Here the military-report context clearly indicates a human courier, so 'messenger'
    is the most natural rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: This infinitive introduces direct speech in standard Hebrew narrative.
    'Saying' is the conventional and sufficiently natural English equivalent.
- source_word: כְּכַלּוֹתְךָ
  chosen: When you have finished
  alternatives:
  - As soon as you finish
  - After you finish
  lexicon: HALOT
  rationale: The prefixed כ plus infinitive construct with suffix marks a temporal
    clause. 'When you have finished' fits the sequence naturally and preserves the
    sense without over-specifying immediacy.
- source_word: כָּל דִּבְרֵי הַמִּלְחָמָה
  chosen: all the news of the battle
  alternatives:
  - all the words of the battle
  - the whole account of the battle
  lexicon: HALOT
  rationale: Literally 'all the words/matters of the battle.' In idiomatic English,
    this refers to the full report or news concerning the battle. 'News of the battle'
    is natural while still faithful to the Hebrew sense of reported matters.
- source_word: לְדַבֵּר אֶל הַמֶּלֶךְ
  chosen: telling the king
  alternatives:
  - speaking to the king
  - reporting to the king
  lexicon: HALOT
  rationale: The infinitive 'to speak' with אֶל הַמֶּלֶךְ functions here as the act
    of delivering the report. 'Telling the king' is idiomatic English and matches
    the communicative function in context.
