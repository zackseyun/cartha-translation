id: 2SA.11.17
reference: 2 Samuel 11:17
source:
  edition: WLC
  text: וַ/יֵּ֨צְא֜וּ אַנְשֵׁ֤י הָ/עִיר֙ וַ/יִּלָּחֲמ֣וּ אֶת יוֹאָ֔ב וַ/יִּפֹּ֥ל מִן
    הָ/עָ֖ם מֵ/עַבְדֵ֣י דָוִ֑ד וַ/יָּ֕מָת גַּ֖ם אוּרִיָּ֥ה הַ/חִתִּֽי־־׃
translation:
  text: The men of the city came out and fought against Joab, and some of the people,
    from David’s servants, fell; Uriah the Hittite also died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went out' for 'came out.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the people, from David’s servants,' a partitive expression
      meaning that some of David’s men fell.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא means to go/come out. In English narrative, 'came out' fits
    the perspective of the city's men emerging to engage Joab's forces.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the men of the town
  - the city's men
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'men of the city.' 'Men' is retained
    as gender-accurate, since the referents are male combatants.
- source_word: וַיִּלָּחֲמוּ אֶת יוֹאָב
  chosen: fought against Joab
  alternatives:
  - fought with Joab
  lexicon: HALOT
  rationale: The Niphal/related warfare idiom with את here indicates hostile engagement
    directed toward Joab and his forces. 'Against' makes the adversarial sense explicit
    in natural English.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - were struck down
  - died
  lexicon: HALOT
  rationale: The singular verb with collective sense is idiomatically rendered 'fell'
    for casualties in battle. This preserves the Hebrew military idiom without over-paraphrasing.
- source_word: מִן הָעָם
  chosen: some of the people
  alternatives:
  - some of the troops
  - from the people
  lexicon: HALOT
  rationale: 'מן is partitive here: ''from among the people.'' In context this refers
    to members of the fighting force. ''Some of the people'' preserves the Hebrew
    wording while remaining intelligible.'
- source_word: מֵעַבְדֵי דָוִד
  chosen: from David’s servants
  alternatives:
  - from David’s men
  - from David’s officers
  lexicon: HALOT
  rationale: עבדים literally means 'servants.' In a royal-military context it can
    denote subjects or officials in service to the king. 'Servants' is the more textually
    transparent rendering; the military context already clarifies that these are David's
    personnel.
- source_word: וַיָּמָת גַּם אוּרִיָּה הַחִתִּי
  chosen: Uriah the Hittite also died
  alternatives:
  - and Uriah the Hittite also died
  lexicon: HALOT
  rationale: 'גם marks addition/emphasis: Uriah was among the dead as well. Keeping
    ''also'' highlights the narrative significance of his death.'
- source_word: הַחִתִּי
  chosen: the Hittite
  lexicon: HALOT
  rationale: Standard ethnic designation for Uriah, retained by transliteration-based
    convention for peoples and to match established biblical usage.
