id: 2SA.11.20
reference: 2 Samuel 11:20
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִֽם תַּעֲלֶה֙ חֲמַ֣ת הַ/מֶּ֔לֶךְ וְ/אָמַ֣ר לְ/ךָ֔ מַדּ֛וּעַ נִגַּשְׁתֶּ֥ם
    אֶל הָ/עִ֖יר לְ/הִלָּחֵ֑ם הֲ/ל֣וֹא יְדַעְתֶּ֔ם אֵ֥ת אֲשֶׁר יֹר֖וּ מֵ/עַ֥ל הַ/חוֹמָֽה־־־׃
translation:
  text: And if the king’s anger rises and he says to you, ‘Why did you go so near
    the city to fight? Did you not know what they would shoot from the wall?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what they would throw from atop the wall.' The Hebrew verb can refer
      more broadly to hurling projectiles, though 'shoot' best fits its common military
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  chosen: And if
  alternatives:
  - Now if
  - If it happens that
  lexicon: HALOT
  rationale: The construction introduces a conditional scenario in Joab’s instructions.
    'And if' preserves the narrative linkage of waw plus the conditional force of
    אִם without sounding wooden.
- source_word: תַּעֲלֶה חֲמַת הַמֶּלֶךְ
  chosen: the king’s anger rises
  alternatives:
  - the king’s wrath flares up
  - the king becomes angry
  lexicon: HALOT
  rationale: חֵמָה denotes heat, rage, or anger. 'Rises' reflects the verb עלה literally
    while remaining natural English. 'Anger' is preferred over 'wrath' for readable
    modern English in this narrative context.
- source_word: וְאָמַר לְךָ
  chosen: and he says to you
  alternatives:
  - and he will say to you
  - and he says
  lexicon: HALOT
  rationale: The qatal form in this conditional sequence is naturally rendered in
    English as part of the projected scenario. Present-style 'says' works idiomatically
    after 'if ... rises' in direct-speech setup.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Standard interrogative adverb; 'Why' is the plain and natural equivalent.
- source_word: נִגַּשְׁתֶּם אֶל הָעִיר
  chosen: did you go so near the city
  alternatives:
  - did you approach the city
  - did you come near to the city
  lexicon: HALOT
  rationale: נגשׁ means to approach or come near. 'Go so near' captures the reproachful
    tone in context, where the complaint is not merely movement toward but excessive
    proximity to the city wall.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - for battle
  - to wage war
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To fight' is concise, natural, and
    fits the immediate military setting better than the broader 'to wage war.'
- source_word: הֲלוֹא יְדַעְתֶּם
  chosen: Did you not know
  alternatives:
  - Did you not realize
  - Surely you knew
  lexicon: HALOT
  rationale: The interrogative plus negation expects an affirmative answer. 'Did you
    not know' preserves the rhetorical force without overinterpreting it.
- source_word: אֵת אֲשֶׁר יֹרוּ
  chosen: what they would shoot
  alternatives:
  - what they shoot
  - what they would throw
  lexicon: HALOT
  rationale: ירה in the Hiphil commonly means to shoot or cast. In siege context,
    projectiles from a wall are in view. 'Would shoot' fits the anticipated danger
    in the king’s hypothetical rebuke. 'Throw' is possible in context but less directly
    tied to the verb’s common military sense.
- source_word: מֵעַל הַחוֹמָה
  chosen: from the wall
  alternatives:
  - from atop the wall
  - off the wall
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon/above,' but idiomatic English is simply
    'from the wall.' 'Atop the wall' is possible but unnecessarily explicit in the
    main text.
