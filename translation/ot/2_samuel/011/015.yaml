id: 2SA.11.15
reference: 2 Samuel 11:15
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֥ב בַּ/סֵּ֖פֶר לֵ/אמֹ֑ר הָב֣וּ אֶת אֽוּרִיָּ֗ה אֶל מוּל֙ פְּנֵ֤י
    הַ/מִּלְחָמָה֙ הַֽ/חֲזָקָ֔ה וְ/שַׁבְתֶּ֥ם מֵ/אַחֲרָ֖י/ו וְ/נִכָּ֥ה וָ/מֵֽת־־׃ס
translation:
  text: He wrote in the letter, saying, "Put Uriah at the front of the hardest fighting,
    then withdraw from behind him so that he may be struck down and die."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "where the fighting is fiercest."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: He wrote
  alternatives:
  - And he wrote
  lexicon: HALOT
  rationale: Wayyiqtol narrative form; English normally omits the initial conjunction
    in smooth narrative while preserving past sequential action.
- source_word: בַּסֵּפֶר
  chosen: in the letter
  alternatives:
  - in the book
  - in the document
  lexicon: HALOT
  rationale: In this context סֵפֶר refers to the written message David sent by Uriah,
    so 'letter' is the most natural contextual rendering rather than the broader 'book/document'.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the contents of the letter.
- source_word: הָבוּ
  chosen: Put
  alternatives:
  - Place
  - Set
  lexicon: HALOT
  rationale: Imperative plural directing Joab's men; 'put' is idiomatic English for
    assigning someone to a position in battle.
- source_word: אֶת אוּרִיָּה
  chosen: Uriah
  lexicon: HALOT
  rationale: Direct-object marker אֶת is not translated; the personal name is transliterated
    per project philosophy.
- source_word: אֶל מוּל פְּנֵי הַמִּלְחָמָה הַחֲזָקָה
  chosen: at the front of the hardest fighting
  alternatives:
  - opposite the face of the strongest battle
  - where the fighting is fiercest
  - in the forefront of the heavy fighting
  lexicon: HALOT
  rationale: 'The phrase is idiomatic: מוּל פְּנֵי conveys direct exposure at the
    front, and הַחֲזָקָה modifies the battle as intense/severe. ''At the front of
    the hardest fighting'' preserves the military sense in natural English.'
- source_word: וְשַׁבְתֶּם מֵאַחֲרָיו
  chosen: then withdraw from behind him
  alternatives:
  - and turn back from behind him
  - and fall back from him
  lexicon: HALOT
  rationale: שׁוּב here means to turn back/withdraw. 'From behind him' preserves the
    tactical abandonment implied by מֵאַחֲרָיו.
- source_word: וְנִכָּה
  chosen: so that he may be struck down
  alternatives:
  - and he will be struck
  - that he may be killed
  lexicon: HALOT
  rationale: Niphal of נכה indicates being struck/smitten. 'Struck down' fits battle
    context and leaves the following 'and die' explicit rather than collapsing both
    verbs into one.
- source_word: וָמֵת
  chosen: and die
  alternatives:
  - so that he dies
  lexicon: HALOT
  rationale: Separate verb retained to reflect the Hebrew sequence and the deliberate
    lethal intent of the command.
