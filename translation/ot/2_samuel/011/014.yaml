id: 2SA.11.14
reference: 2 Samuel 11:14
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/בֹּ֔קֶר וַ/יִּכְתֹּ֥ב דָּוִ֛ד סֵ֖פֶר אֶל יוֹאָ֑ב וַ/יִּשְׁלַ֖ח
    בְּ/יַ֥ד אוּרִיָּֽה־׃
translation:
  text: In the morning, David wrote a letter to Joab and sent it by the hand of Uriah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''through Uriah'' or ''with Uriah.'' The Hebrew literally says ''by
      the hand of Uriah,'' an idiom for agency or delivery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: In
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, the full formula 'and it happened' is often wooden; 'In the morning'
    naturally carries the temporal transition while preserving the narrative flow.
- source_word: בַּבֹּקֶר
  chosen: the morning
  alternatives:
  - morning
  - in the morning
  lexicon: HALOT
  rationale: With the prefixed preposition and article, the phrase is best rendered
    adverbially as a temporal expression, 'in the morning.'
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - composed
  - wrote down
  lexicon: HALOT
  rationale: Standard narrative verb for writing; 'wrote' is the plain and sufficient
    English equivalent.
- source_word: סֵפֶר
  chosen: a letter
  alternatives:
  - a document
  - a written message
  - a scroll
  lexicon: HALOT
  rationale: Although ספר can broadly mean a written document, in this context—David
    writing to Joab and sending it with a messenger—the idiomatic sense is 'letter.'
    This is an optimal-equivalence rendering that reflects the communicative function
    rather than a more generic 'document.'
- source_word: אֶל
  chosen: to
  alternatives:
  - for
  lexicon: HALOT
  rationale: The preposition marks the recipient of the written message; 'to' is the
    normal English equivalent.
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard verb of sending in narrative; 'sent' is clear and direct.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - with
  - through
  lexicon: HALOT
  rationale: Literally 'by the hand of,' an idiom for agency or conveyance. Retaining
    the idiom preserves the Hebrew flavor and the grim irony that Uriah carries the
    message himself. Because the phrase remains understandable in modern English,
    it is preferable in the main text.
- source_word: אוּרִיָּה
  chosen: Uriah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
