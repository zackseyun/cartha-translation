theological_decisions:
- issue: Moral and narrative force of Bathsheba's identification as married
  chosen_reading: Retained the full appositional identification 'the daughter of Eliam,
    the wife of Uriah the Hittite' without compression.
  alternative_readings:
  - Shortening to 'Bathsheba, Uriah's wife'
  rationale: 'The Hebrew piles up identifiers, culminating in her marital status.
    Preserving this full identification maintains the narrative''s ethical weight
    without adding commentary: David is being explicitly informed that the woman is
    another man''s wife.'
  doctrine_reference: Translation philosophy §1, §3, §5
