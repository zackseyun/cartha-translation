id: 2SA.11.3
reference: 2 Samuel 11:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח דָּוִ֔ד וַ/יִּדְרֹ֖שׁ לָֽ/אִשָּׁ֑ה וַ/יֹּ֗אמֶר הֲ/לוֹא זֹאת֙
    בַּת שֶׁ֣בַע בַּת אֱלִיעָ֔ם אֵ֖שֶׁת אוּרִיָּ֥ה הַ/חִתִּֽי־־־׃
translation:
  text: So David sent and inquired about the woman, and someone said, “Is this not
    Bathsheba, the daughter of Eliam, the wife of Uriah the Hittite?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent someone
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol sequence is most naturally rendered 'sent.'
    English leaves the object implicit, as Hebrew does; 'sent someone' is interpretive
    and therefore kept as an alternative rather than placed in the main text.
- source_word: וַיִּדְרֹשׁ
  chosen: inquired about
  alternatives:
  - asked about
  - sought information about
  lexicon: HALOT
  rationale: דרש with ל plus a person here means to seek information or inquire concerning
    someone. 'Inquired about' is natural modern English and preserves the investigative
    sense better than the flatter 'asked about.'
- source_word: לָאִשָּׁה
  chosen: the woman
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: 'The prefixed article indicates definiteness: David is asking about the
    specific woman he has seen. ''The woman'' best reflects the Hebrew form and discourse
    context.'
- source_word: וַיֹּאמֶר
  chosen: someone said
  alternatives:
  - he said
  - one said
  lexicon: HALOT
  rationale: Although formally singular ('and he said'), the speaker is unspecified
    in context. English idiom prefers 'someone said' to avoid implying David himself
    is speaking. This makes explicit the indefinite force without overparaphrasing.
- source_word: הֲלוֹא
  chosen: Is this not
  alternatives:
  - Isn't this
  - Surely this is
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting confirmation.
    'Is this not' preserves that force with slightly more formal clarity than the
    contraction 'Isn't this.'
- source_word: זֹאת
  chosen: this
  alternatives:
  - this woman
  lexicon: HALOT
  rationale: The demonstrative is feminine singular, referring to the woman in view.
    English can simply say 'this' because 'the woman' has already been mentioned;
    adding 'woman' would be slightly more explicit than the Hebrew.
- source_word: בַּת־שֶׁבַע
  chosen: Bathsheba
  alternatives:
  - Bat-sheba
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Bathsheba' is the established English transliteration.
- source_word: בַּת אֱלִיעָם
  chosen: the daughter of Eliam
  alternatives:
  - daughter of Eliam
  lexicon: HALOT
  rationale: The construct phrase identifies her by lineage. Including 'the' yields
    idiomatic English within the appositional identification.
- source_word: אֵשֶׁת אוּרִיָּה
  chosen: the wife of Uriah
  alternatives:
  - wife of Uriah
  lexicon: HALOT
  rationale: The construct phrase marks marital status. 'The wife of Uriah' is idiomatic
    and preserves the identifying force, which is important in context because it
    signals that she is married.
- source_word: הַחִתִּי
  chosen: the Hittite
  alternatives:
  - a Hittite
  lexicon: HALOT
  rationale: The gentilic has the article in Hebrew and functions as an ethnic designation
    attached to Uriah. 'The Hittite' is the standard rendering and reflects the Hebrew
    form.
