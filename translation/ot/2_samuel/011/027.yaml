theological_decisions:
- issue: Strength of the narrator's moral evaluation of David's actions
  chosen_reading: 'Explicit moral condemnation: ''was evil in the eyes of the LORD'''
  alternative_readings:
  - was displeasing to the LORD
  rationale: The Hebrew verb רָעַע/יֵרַע carries moral force here. 'Displeasing' is possible idiomatically but can sound weaker and more subjective in English. The context demands clear divine condemnation of David's conduct without softening it.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and aligns with the translation's consistency policy.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
