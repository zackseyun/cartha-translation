id: 2SA.11.27
reference: 2 Samuel 11:27
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֣ר הָ/אֵ֗בֶל וַ/יִּשְׁלַ֨ח דָּוִ֜ד וַ/יַּאַסְפָ֤/הּ אֶל בֵּית/וֹ֙ וַ/תְּהִי ל֣/וֹ לְ/אִשָּׁ֔ה וַ/תֵּ֥לֶד ל֖/וֹ בֵּ֑ן וַ/יֵּ֧רַע הַ/דָּבָ֛ר אֲשֶׁר עָשָׂ֥ה דָוִ֖ד בְּ/עֵינֵ֥י יְהוָֽה־־־׃פ
translation:
  text: When the mourning was over, David sent and brought her into his house, and she became his wife and bore him a son. But the thing that David had done was evil in the eyes of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was displeasing in the sight of the LORD.' The Hebrew more literally says 'was evil in the eyes of the LORD,' expressing God's moral judgment on David's deed.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵבֶל
  chosen: the mourning
  alternatives:
  - the period of mourning
  - the grief
  lexicon: HALOT
  rationale: Refers to the mourning period after Uriah's death. 'Mourning' is natural English and preserves the social-ritual sense better than the more internal 'grief.'
- source_word: וַיַּעֲבֹר
  chosen: was over
  alternatives:
  - passed
  - came to an end
  lexicon: HALOT
  rationale: Though literally 'passed,' idiomatic English with a temporal subject is 'was over.' This preserves the event-sequence without wooden phrasing.
- source_word: וַיַּאַסְפָהּ אֶל־בֵּיתוֹ
  chosen: brought her into his house
  alternatives:
  - gathered her to his house
  - took her into his house
  lexicon: HALOT
  rationale: אָסַף literally involves gathering/bringing in. In this context it denotes David's taking Bathsheba into his household. 'Brought her into his house' is clear and sufficiently formal.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  chosen: she became his wife
  alternatives:
  - she was his wife
  - she became a wife to him
  lexicon: HALOT
  rationale: This construction marks a change of status. 'She became his wife' communicates the resulting marriage more naturally than a hyper-literal rendering.
- source_word: וַתֵּלֶד לוֹ בֵּן
  chosen: bore him a son
  alternatives:
  - gave birth to a son for him
  lexicon: HALOT
  rationale: Standard idiomatic rendering of ילד with indirect object; concise and accurate.
- source_word: וַיֵּרַע
  chosen: was evil
  alternatives:
  - was displeasing
  - was wicked
  - was bad
  lexicon: HALOT
  rationale: The verb means 'to be evil/bad' rather than merely 'to displease.' Rendering it as 'was evil' preserves the moral judgment of the narrator and avoids weakening the condemnation.
- source_word: הַדָּבָר אֲשֶׁר עָשָׂה דָוִד
  chosen: the thing that David had done
  alternatives:
  - the matter that David had done
  - what David had done
  lexicon: HALOT
  rationale: דבר here refers broadly to the deed/matter. 'The thing that David had done' is straightforward and preserves the Hebrew's concrete phrasing.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine evaluation. 'In the eyes of the LORD' keeps the metaphor and follows the project's default rendering of יְהוָה as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
