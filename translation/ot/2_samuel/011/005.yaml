id: 2SA.11.5
reference: 2 Samuel 11:5
source:
  edition: WLC
  text: וַ/תַּ֖הַר הָֽ/אִשָּׁ֑ה וַ/תִּשְׁלַח֙ וַ/תַּגֵּ֣ד לְ/דָוִ֔ד וַ/תֹּ֖אמֶר הָרָ֥ה
    אָנֹֽכִי׃
translation:
  text: The woman conceived, and she sent word and told David, “I am pregnant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The woman became pregnant.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'sent'; the sense is that she sent a message to David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb from הרה denotes becoming pregnant/conceiving. 'Conceived' is
    concise and natural in English, while preserving the eventive sense better than
    the more interpretive 'became pregnant.'
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: The noun אִשָּׁה can mean 'woman' or 'wife' depending on context. Here
    the narrative refers back to Bathsheba without explicitly foregrounding her marital
    relation in this clause, so 'the woman' most directly reflects the Hebrew form.
    'The wife' is possible contextually but adds a nuance not explicit in the immediate
    wording.
- source_word: וַתִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - sent a message
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent,' but in this context with the following
    reporting verb and indirect object it idiomatically implies sending a message.
    'Sent word' is natural English and avoids an overly wooden rendering while staying
    close to the Hebrew.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, declare, or report. 'Told' fits the
    direct, personal communication to David and reads naturally alongside 'sent word.'
- source_word: לְדָוִד
  chosen: David
  rationale: Standard transliteration of the personal name דָוִד, following the translation
    philosophy of transliterating names rather than translating them.
- source_word: הָרָה אָנֹכִי
  chosen: I am pregnant
  alternatives:
  - I have conceived
  - pregnant am I
  lexicon: HALOT
  rationale: 'The predicate adjective הָרָה with the pronoun אָנֹכִי expresses present
    state: ''I am pregnant.'' This is the most natural modern English rendering. ''I
    have conceived'' is possible but shifts from present condition to prior event;
    ''pregnant am I'' is overly formal and unnatural.'
