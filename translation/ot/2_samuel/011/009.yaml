id: 2SA.11.9
reference: 2 Samuel 11:9
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֣ב אוּרִיָּ֗ה פֶּ֚תַח בֵּ֣ית הַ/מֶּ֔לֶךְ אֵ֖ת כָּל עַבְדֵ֣י אֲדֹנָ֑י/ו
    וְ/לֹ֥א יָרַ֖ד אֶל בֵּיתֽ/וֹ־־׃
translation:
  text: But Uriah slept at the entrance of the king’s house with all the servants
    of his lord, and did not go down to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lay down' / 'spent the night.' The Hebrew verb can denote lying down
      or sleeping; here it refers to Uriah lodging there overnight.
    reason: lexical_alternative
  - marker: b
    text: Or 'the palace.' Literally, 'the king’s house.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his master.' The Hebrew 'his lord' refers here to David, Uriah’s superior.
    reason: lexical_alternative
  - marker: d
    text: Or 'did not go home.' Literally, 'did not go down to his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - spent the night
  lexicon: HALOT
  rationale: The verb שׁכב commonly means 'lie down' or 'sleep.' In this narrative
    context, 'slept' communicates that Uriah lodged there overnight, which is the
    point of the report. 'Spent the night' is possible but more interpretive.
- source_word: פֶּתַח
  chosen: at the entrance
  alternatives:
  - at the doorway
  - at the door
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening, entrance, or doorway. 'At the entrance' is
    natural English and preserves the spatial sense without over-specifying a physical
    door panel.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the palace
  - the king’s palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' While this refers functionally to
    the palace, 'the king’s house' stays closer to the Hebrew and remains clear in
    English.
- source_word: אֵת כָּל עַבְדֵי אֲדֹנָיו
  chosen: with all the servants of his lord
  alternatives:
  - among all the servants of his lord
  - beside all the servants of his master
  lexicon: HALOT
  rationale: The construction indicates association/location with the servants. 'With'
    is idiomatic and fits the scene. For עבדים, 'servants' is preferable here because
    bonded status is not the narrative focus. אֲדֹנָיו refers to David as Uriah's
    superior; 'lord' preserves the social hierarchy without importing divine overtones
    in context.
- source_word: אֲדֹנָיו
  chosen: his lord
  alternatives:
  - his master
  lexicon: HALOT
  rationale: The term means 'his lord/master.' 'His lord' reflects the Hebrew more
    directly and suits a royal court setting. Since the referent is David, the lowercase
    English avoids confusion with a divine title.
- source_word: וְלֹא יָרַד אֶל בֵּיתוֹ
  chosen: and did not go down to his house
  alternatives:
  - and did not go home
  - and did not go down to his home
  lexicon: HALOT
  rationale: ירד is literally 'go down.' Retaining 'go down' preserves the Hebrew
    idiom and the narrative wording, while 'his house' keeps the concrete term בַּיִת
    rather than paraphrasing as 'home.'
