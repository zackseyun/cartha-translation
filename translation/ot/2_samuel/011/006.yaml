id: 2SA.11.6
reference: 2 Samuel 11:6
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח דָּוִד֙ אֶל יוֹאָ֔ב שְׁלַ֣ח אֵלַ֔/י אֶת אֽוּרִיָּ֖ה הַ/חִתִּ֑י
    וַ/יִּשְׁלַ֥ח יוֹאָ֛ב אֶת אֽוּרִיָּ֖ה אֶל דָּוִֽד־־־־׃
translation:
  text: So David sent word to Joab, “Send Uriah the Hittite to me.” And Joab sent
    Uriah to David.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'send.' In the first clause, because the
    object of sending is implicit and the speech command follows immediately, 'sent
    word' makes natural English while preserving the sense that David communicated
    an order to Joab.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural English equivalent
    in both occurrences.
- source_word: שְׁלַח
  chosen: Send
  alternatives:
  - Dispatch
  lexicon: HALOT
  rationale: Imperative of שׁלח. 'Send' preserves the directness of David's command
    without overformalizing it.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - back to me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means
    'to me.' 'Back to me' would add a nuance not explicit in the Hebrew.
- source_word: אֶת אוּרִיָּה הַחִתִּי
  chosen: Uriah the Hittite
  alternatives:
  - Uriah the Hethite
  lexicon: HALOT
  rationale: Personal name is transliterated, and the gentilic is rendered by the
    standard modern English ethnic term 'Hittite.' The direct-object marker אֶת is
    not translated.
- source_word: וַיִּשְׁלַח יוֹאָב אֶת אוּרִיָּה אֶל דָּוִד
  chosen: And Joab sent Uriah to David
  alternatives:
  - So Joab sent Uriah to David
  lexicon: HALOT
  rationale: The second clause repeats the same sending verb in narrative sequence.
    'And' preserves the Hebrew waw-consecutive flow; 'sent' is retained for consistency
    with the repeated verb.
