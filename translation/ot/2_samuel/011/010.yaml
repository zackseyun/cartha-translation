id: 2SA.11.10
reference: 2 Samuel 11:10
source:
  edition: WLC
  text: וַ/יַּגִּ֤דוּ לְ/דָוִד֙ לֵ/אמֹ֔ר לֹֽא יָרַ֥ד אוּרִיָּ֖ה אֶל בֵּית֑/וֹ וַ/יֹּ֨אמֶר
    דָּוִ֜ד אֶל אוּרִיָּ֗ה הֲ/ל֤וֹא מִ/דֶּ֨רֶךְ֙ אַתָּ֣ה בָ֔א מַדּ֖וּעַ לֹֽא יָרַ֥דְתָּ
    אֶל בֵּיתֶֽ/ךָ־־־־־׃
translation:
  text: They told David, saying, “Uriah did not go down to his house.” So David said
    to Uriah, “Have you not come from a journey? Why did you not go down to your house?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go down to his/your house' is a literal idiom for going home, likely
      from the higher elevation or official precincts to one's residence.
    reason: cultural_note
  - marker: b
    text: Or 'from the road.' The Hebrew expression means 'from a journey' or 'from
      traveling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: They told
  alternatives:
  - They reported
  - They informed
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell, report, or declare. 'They told'
    is natural English and preserves the simple narrative force without overformalizing.
- source_word: לְדָוִד לֵאמֹר
  chosen: David, saying
  alternatives:
  - 'to David:'
  - David
  lexicon: HALOT
  rationale: The construction introduces reported speech. Rendering 'David, saying'
    keeps the Hebrew discourse marker visible while remaining readable in English
    punctuation.
- source_word: לֹא יָרַד אוּרִיָּה אֶל בֵּיתוֹ
  chosen: Uriah did not go down to his house
  alternatives:
  - Uriah had not gone down to his house
  - Uriah did not go home
  lexicon: HALOT
  rationale: ירד literally means 'go down.' In this context it refers to going from
    the palace area to one's home. 'Go down to his house' preserves the Hebrew idiom
    and the narrative repetition, which is significant in this episode.
- source_word: בֵּיתוֹ / בֵּיתֶךָ
  chosen: his house / your house
  alternatives:
  - his home / your home
  lexicon: HALOT
  rationale: בַּיִת can mean house or household/home. Here the physical destination
    is in view, though with domestic implications. 'House' better preserves the repeated
    Hebrew wording and the concrete sense.
- source_word: וַיֹּאמֶר
  chosen: So David said
  alternatives:
  - And David said
  - Then David said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives smooth modern
    English while preserving sequence and consequence.
- source_word: הֲלוֹא
  chosen: Have you not
  alternatives:
  - Did you not
  - Surely you have
  lexicon: HALOT
  rationale: The interrogative with negation expects an affirmative answer. 'Have
    you not' captures the rhetorical force without adding interpretive emphasis beyond
    the Hebrew.
- source_word: מִדֶּרֶךְ
  chosen: from a journey
  alternatives:
  - from the road
  - from traveling
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road,' but in this idiom it refers to travel
    or a journey. 'From a journey' communicates the sense clearly in idiomatic English.
- source_word: בָא
  chosen: come
  alternatives:
  - arrived
  - returned
  lexicon: HALOT
  rationale: בוא is the common verb 'come.' 'Returned' would overinterpret, since
    the text only states that he came from a journey.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is the clearest natural equivalent.
- source_word: לֹא יָרַדְתָּ אֶל בֵּיתֶךָ
  chosen: did you not go down to your house
  alternatives:
  - did you not go home
  - have you not gone down to your house
  lexicon: HALOT
  rationale: Repeats the earlier idiom with second person address. Preserving 'go
    down to your house' maintains the Hebrew repetition and the narrative tension.
