id: 2SA.21.7
reference: 2 Samuel 21:7
source:
  edition: WLC
  text: וַ/יַּחְמֹ֣ל הַ/מֶּ֔לֶךְ עַל מְפִי בֹ֖שֶׁת בֶּן יְהוֹנָתָ֣ן בֶּן שָׁא֑וּל
    עַל שְׁבֻעַ֤ת יְהוָה֙ אֲשֶׁ֣ר בֵּֽינֹתָ֔/ם בֵּ֣ין דָּוִ֔ד וּ/בֵ֖ין יְהוֹנָתָ֥ן
    בֶּן שָׁאֽוּל־־־־־־׃
translation:
  text: But the king spared Mephibosheth son of Jonathan, son of Saul, because of
    the oath of the LORD that was between them, between David and Jonathan son of
    Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD's oath'; that is, an oath sworn in the LORD's name between
      David and Jonathan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹל
  chosen: spared
  alternatives:
  - had compassion on
  - showed mercy to
  lexicon: HALOT
  rationale: The verb חמל in this context refers to refraining from killing or handing
    over for death. 'Spared' captures the concrete narrative sense better than the
    more general 'had compassion on,' while still reflecting mercy.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to David in the narrative. English should preserve
    the formal designation used in the Hebrew.
- source_word: מְפִיבֹשֶׁת
  chosen: Mephibosheth
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶּן יְהוֹנָתָן בֶּן שָׁאוּל
  chosen: son of Jonathan, son of Saul
  alternatives:
  - Jonathan's son, Saul's grandson
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew genealogical structure.
    Although 'Saul's grandson' is idiomatic English, the repeated 'son of' mirrors
    the source text and maintains transparency.
- source_word: עַל
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: Here עַל introduces the reason for the king's action. 'Because of' is
    natural modern English and accurately conveys causation.
- source_word: שְׁבֻעַת יְהוָה
  chosen: the oath of the LORD
  alternatives:
  - the LORD's oath
  - the oath before the LORD
  lexicon: HALOT
  rationale: Construct chain most naturally rendered 'the oath of the LORD.' In context
    this likely means an oath made invoking the LORD as witness, not necessarily one
    spoken by the LORD himself; the literal rendering preserves that ambiguity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
- source_word: אֲשֶׁר בֵּינֹתָם
  chosen: that was between them
  alternatives:
  - which was between them
  - binding on them
  lexicon: HALOT
  rationale: This relative clause identifies the oath as existing between two parties.
    'That was between them' is straightforward and preserves the relational language
    of the Hebrew.
- source_word: בֵּין דָּוִד וּבֵין יְהוֹנָתָן
  chosen: between David and Jonathan
  alternatives:
  - between David and between Jonathan
  lexicon: HALOT
  rationale: Standard English smooths the repeated preposition while preserving the
    bilateral covenantal relationship.
