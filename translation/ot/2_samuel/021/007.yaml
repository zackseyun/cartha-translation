theological_decisions:
- issue: Meaning of 'the oath of the LORD'
  chosen_reading: an oath made in the LORD's name / under the LORD's witness between
    David and Jonathan
  alternative_readings:
  - an oath given by the LORD himself
  rationale: In narrative covenant contexts, 'oath of the LORD' commonly denotes an
    oath sworn invoking the LORD, not a divine utterance. The main translation keeps
    the literal phrase 'the oath of the LORD' so as not to over-resolve the expression,
    while the rationale clarifies the likely sense.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
- issue: Referent of 'the king'
  chosen_reading: David
  rationale: The narrative context identifies the king as David, but the translation
    retains 'the king' because that is the form used in the Hebrew text.
