id: 2SA.21.6
reference: 2 Samuel 21:6
source:
  edition: WLC
  text: ינתן לָ֜/נוּ שִׁבְעָ֤ה אֲנָשִׁים֙ מִ/בָּנָ֔י/ו וְ/הוֹקַֽעֲנוּ/ם֙ לַֽ/יהוָ֔ה בְּ/גִבְעַ֥ת שָׁא֖וּל בְּחִ֣יר יְהוָ֑ה וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ אֲנִ֥י אֶתֵּֽן־ס׃
translation:
  text: Let seven men from his sons be given to us, and we will impale them before Yahweh at Gibeah of Saul, the chosen of Yahweh.” And the king said, “I will give them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will impale them' or 'we will expose them.' The Hebrew verb refers to a public execution or display, and the exact method is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ינתן
  chosen: be given
  alternatives:
  - let ... be given
  - be handed over
  lexicon: HALOT
  rationale: Nifal imperfect of נתן is passive/reflexive in sense here. English passive best matches the request being made to the king. The jussive/request nuance is conveyed by 'Let ... be given.'
- source_word: שִׁבְעָה אֲנָשִׁים
  chosen: seven men
  alternatives:
  - seven persons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine and refers to male descendants to be executed. 'Men' is gender-accurate and more precise than a neutral term.
- source_word: מִבָּנָיו
  chosen: from his sons
  alternatives:
  - from his descendants
  - from his children
  lexicon: HALOT
  rationale: בנים here most naturally refers to Saul's male offspring/descendants in context. 'Sons' preserves the Hebrew form and the male reference, though the broader kinship range is possible.
- source_word: וְהוֹקַעֲנוּם
  chosen: we will hang them
  alternatives:
  - we will impale them
  - we will expose them
  lexicon: HALOT
  rationale: The Hifil of יקע in this context refers to a public execution/display. English tradition often uses 'hang,' but the act may have involved impalement or exposure after death rather than hanging by a noose. 'Hang' is retained for readability, with alternatives preserved in a footnote because the exact mode is lexically debated.
- source_word: לַיהוָה
  chosen: before the LORD
  alternatives:
  - to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל can indicate relation/dedication, but in an execution context 'before the LORD' communicates that the act is carried out in his presence or under his sanction without overstating sacrificial meaning.
- source_word: בְּגִבְעַת שָׁאוּל
  chosen: at Gibeah of Saul
  alternatives:
  - in Gibeah of Saul
  lexicon: HALOT
  rationale: Place name construction is best preserved by transliteration. 'At' fits an execution site naturally in English.
- source_word: בְּחִיר יְהוָה
  chosen: the chosen of the LORD
  alternatives:
  - the LORD's chosen one
  - chosen by the LORD
  lexicon: HALOT
  rationale: Appositional phrase referring to Saul. 'The chosen of the LORD' is concise and preserves the nominal force of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲנִי אֶתֵּן
  chosen: I will give them
  alternatives:
  - I will give
  - I will hand them over
  lexicon: HALOT
  rationale: English supplies the object naturally from context. 'Give them' reflects the king's assent to the request without unnecessary expansion.
