theological_decisions:
- issue: Whether לַיהוָה implies a sacrificial offering or an execution carried out in relation to the LORD
  chosen_reading: before the LORD
  alternative_readings:
  - to the LORD
  - for the LORD
  rationale: The context is judicial reparation, not cultic sacrifice. Rendering the phrase as 'before the LORD' preserves the solemn covenantal/judicial dimension without implying that the men are being offered as sacrifices to God.
  doctrine_reference: 'Translation philosophy §3; Contested terms: יְהוָה → the LORD'
