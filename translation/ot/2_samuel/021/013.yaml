id: 2SA.21.13
reference: 2 Samuel 21:13
source:
  edition: WLC
  text: וַ/יַּ֤עַל מִ/שָּׁם֙ אֶת עַצְמ֣וֹת שָׁא֔וּל וְ/אֶת עַצְמ֖וֹת יְהוֹנָתָ֣ן בְּנ֑/וֹ
    וַ/יַּ֣אַסְפ֔וּ אֶת עַצְמ֖וֹת הַ/מּוּקָעִֽים־־־׃
translation:
  text: He brought up from there the bones of Saul and the bones of Jonathan his son,
    and they gathered the bones of those who had been hanged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who had been impaled' or 'those who had been exposed.' The Hebrew
      refers to the executed men whose bodies were publicly displayed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: brought up
  alternatives:
  - took up
  - brought
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/cause to go up.' In context of retrieving
    remains from a burial place, 'brought up' preserves the concrete upward/removal
    sense better than the flatter 'brought.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic adverb; 'from there' is natural and sufficiently
    formal.
- source_word: עַצְמוֹת
  chosen: bones
  alternatives:
  - remains
  lexicon: HALOT
  rationale: The noun literally means 'bones.' While 'remains' is smoother in English,
    'bones' is more textually precise and fits the burial context.
- source_word: יְהוֹנָתָן בְּנוֹ
  chosen: Jonathan his son
  alternatives:
  - his son Jonathan
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional structure and keeps clear that
    Jonathan is Saul's son.
- source_word: וַיַּאַסְפוּ
  chosen: they gathered
  alternatives:
  - they collected
  - he gathered
  lexicon: HALOT
  rationale: The form is 3rd person masculine plural, so 'they gathered' should be
    retained rather than harmonized to singular. 'Gathered' is idiomatic for collecting
    bones for burial.
- source_word: הַמּוּקָעִים
  chosen: those who had been hanged
  alternatives:
  - the impaled ones
  - those who had been exposed
  lexicon: HALOT
  rationale: From יקע, used for bodies exposed in execution. English 'hanged' communicates
    execution by suspension and fits the immediate narrative context, though 'impaled'
    is a possible more specific rendering. Because the exact mode may be broader than
    hanging, an alternative is preserved in a footnote.
