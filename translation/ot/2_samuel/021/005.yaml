id: 2SA.21.5
reference: 2 Samuel 21:5
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אֶל הַ/מֶּ֔לֶךְ הָ/אִישׁ֙ אֲשֶׁ֣ר כִּלָּ֔/נוּ וַ/אֲשֶׁ֖ר דִּמָּה
    לָ֑/נוּ נִשְׁמַ֕דְנוּ מֵֽ/הִתְיַצֵּ֖ב בְּ/כָל גְּבֻ֥ל יִשְׂרָאֵֽל־־־׃
translation:
  text: They said to the king, “The man who consumed us, and who planned against us
    so as to destroy us from having a place within all the territory of Israel—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who devised against us.' The Hebrew verb can carry the sense of planning
      or scheming.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from standing/establishing ourselves in all the territory of
      Israel,' that is, from continuing to have a place anywhere in Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּלָּנוּ
  chosen: consumed us
  alternatives:
  - destroyed us
  - finished us off
  lexicon: HALOT
  rationale: From כלה, with the sense of bringing to an end or consuming. 'Consumed
    us' preserves the vividness of the Hebrew while fitting the accusation against
    Saul/Gibeonite context.
- source_word: דִּמָּה לָנוּ
  chosen: planned against us
  alternatives:
  - devised against us
  - intended for us
  - thought to destroy us
  lexicon: HALOT
  rationale: From דמה in this context, likely 'devise/plan' rather than a more abstract
    'be like.' The preposition לָנוּ is adversative in sense here, so 'against us'
    communicates the hostile intent.
- source_word: נִשְׁמַדְנוּ
  chosen: to destroy us
  alternatives:
  - that we should be destroyed
  - to annihilate us
  lexicon: HALOT
  rationale: 'The Niphal of שׁמד conveys destruction/extermination. Rendered idiomatically
    with the preceding clause as purpose/result: Saul planned against them ''so as
    to destroy us.'''
- source_word: מֵהִתְיַצֵּב
  chosen: from having a place
  alternatives:
  - from standing
  - from remaining
  - from taking one's stand
  lexicon: HALOT
  rationale: התייצב literally means 'to station oneself/stand.' In this context of
    continued existence within Israel's borders, a more idiomatic English rendering
    is needed. 'From having a place' captures the idea of being prevented from continuing
    or remaining anywhere in Israel.
- source_word: בְּכָל גְּבֻל יִשְׂרָאֵל
  chosen: within all the territory of Israel
  alternatives:
  - in all the border of Israel
  - anywhere in Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here it refers to the
    whole land/domain of Israel, not merely a boundary line. 'Within all the territory
    of Israel' preserves the comprehensive scope.
- source_word: הָאִישׁ
  chosen: The man
  alternatives:
  - That man
  lexicon: HALOT
  rationale: Definite noun referring back to Saul as the subject of complaint. 'The
    man' is formally close to the Hebrew and works in English in direct speech.
