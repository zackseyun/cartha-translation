id: 2SA.21.15
reference: 2 Samuel 21:15
source:
  edition: WLC
  text: וַ/תְּהִי ע֧וֹד מִלְחָמָ֛ה לַ/פְּלִשְׁתִּ֖ים אֶת יִשְׂרָאֵ֑ל וַ/יֵּ֨רֶד דָּוִ֜ד
    וַ/עֲבָדָ֥י/ו עִמּ֛/וֹ וַ/יִּלָּחֲמ֥וּ אֶת פְּלִשְׁתִּ֖ים וַ/יָּ֥עַף דָּוִֽד־־־׃
translation:
  text: And there was war again between the Philistines and Israel, and David went
    down with his servants with him, and they fought the Philistines, and David grew
    weary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his men.' The Hebrew says 'his servants,' a common expression for those
      in a king's service, including military retainers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: there was
  alternatives:
  - it happened
  - and it came to pass
  lexicon: HALOT
  rationale: Idiomatic rendering of היה introducing a new narrative circumstance.
    'There was' preserves the existential sense without archaic English.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - further
  lexicon: HALOT
  rationale: In this narrative context עוֹד marks recurrence of hostilities, so 'again'
    best conveys repeated war.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - fighting
  lexicon: HALOT
  rationale: The noun denotes warfare/hostilities broadly rather than a single clash;
    'war' fits the collective sense.
- source_word: לַפְּלִשְׁתִּים אֶת יִשְׂרָאֵל
  chosen: between the Philistines and Israel
  alternatives:
  - for the Philistines against Israel
  - with the Philistines against Israel
  lexicon: HALOT
  rationale: Although the Hebrew uses ל plus אֶת, the construction here expresses
    opposition between the two parties. English 'between ... and ...' is the most
    natural equivalent.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went
  - marched down
  - descended
  lexicon: HALOT
  rationale: ירד literally means 'went down.' The more literal wording is retained
    since it is natural in English and may reflect movement to the battlefield.
- source_word: וַעֲבָדָיו
  chosen: his servants
  alternatives:
  - his men
  - his attendants
  - his officers
  lexicon: HALOT
  rationale: עבד commonly means 'servant.' In a royal-military context it can refer
    to those in the king's service, likely his men, but 'servants' preserves the lexical
    form and remains understandable.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase retained explicitly, even though
    English could omit it as redundant, because it is present in the source.
- source_word: וַיִּלָּחֲמוּ אֶת־פְּלִשְׁתִּים
  chosen: they fought the Philistines
  alternatives:
  - they battled the Philistines
  - they made war against the Philistines
  lexicon: HALOT
  rationale: לחם in the Niphal here denotes engaging in battle. 'They fought' is clear,
    direct, and natural.
- source_word: וַיָּעַף
  chosen: grew weary
  alternatives:
  - became exhausted
  - was faint
  lexicon: HALOT
  rationale: The verb denotes becoming faint or weary. 'Grew weary' preserves the
    inceptive sense of the wayyiqtol and fits the immediate context of battle fatigue.
