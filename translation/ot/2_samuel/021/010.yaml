id: 2SA.21.10
reference: 2 Samuel 21:10
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח רִצְפָּה֩ בַת אַיָּ֨ה אֶת הַ/שַּׂ֜ק וַ/תַּטֵּ֨/הוּ לָ֤/הּ אֶל
    הַ/צּוּר֙ מִ/תְּחִלַּ֣ת קָצִ֔יר עַ֛ד נִתַּךְ מַ֥יִם עֲלֵי/הֶ֖ם מִן הַ/שָּׁמָ֑יִם
    וְ/לֹֽא נָתְנָה֩ ע֨וֹף הַ/שָּׁמַ֜יִם לָ/נ֤וּחַ עֲלֵי/הֶם֙ יוֹמָ֔ם וְ/אֶת חַיַּ֥ת
    הַ/שָּׂדֶ֖ה לָֽיְלָה־־־־־־־׃
translation:
  text: Then Rizpah the daughter of Aiah took sackcloth and spread it out for herself
    on the rock, from the beginning of harvest until water was poured on them from
    the heavens. And she did not allow the birds of the sky to rest on them by day,
    nor the wild animals of the field by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until rain fell on them from heaven.' The Hebrew more literally says
      'until water was poured on them from the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשַּׂק
  chosen: sackcloth
  alternatives:
  - the sackcloth
  - a sackcloth cloth
  lexicon: HALOT
  rationale: שַׂק commonly denotes sackcloth, the coarse mourning fabric, not merely
    a generic sack. In this context of vigil and mourning, 'sackcloth' best captures
    the material and its connotations.
- source_word: וַתַּטֵּהוּ לָהּ אֶל הַצּוּר
  chosen: spread it out for herself on the rock
  alternatives:
  - pitched it for herself on the rock
  - stretched it out for herself beside the rock
  lexicon: HALOT
  rationale: The verb נטה with the object 'sackcloth' suggests spreading or stretching
    out cloth. 'For herself' reflects לָהּ as a dative of advantage. 'On the rock'
    is the most natural sense of אֶל here in context, indicating where she set up
    her mourning station.
- source_word: הַצּוּר
  chosen: the rock
  alternatives:
  - the rocky place
  lexicon: HALOT
  rationale: צוּר is literally 'rock.' The definite article is retained. This likely
    refers to the execution site or a rocky outcrop, but the text itself simply says
    'the rock.'
- source_word: מִתְּחִלַּת קָצִיר
  chosen: from the beginning of harvest
  alternatives:
  - from the start of the harvest
  - from the beginning of the barley harvest
  lexicon: HALOT
  rationale: The Hebrew says only 'from the beginning of harvest' without specifying
    barley in this verse. Although the broader context may imply the harvest season,
    the translation should not import a crop name absent here.
- source_word: עַד נִתַּךְ מַיִם עֲלֵיהֶם מִן הַשָּׁמַיִם
  chosen: until water was poured on them from the heavens
  alternatives:
  - until rain fell on them from heaven
  - until water was poured out upon them from the sky
  lexicon: HALOT
  rationale: נתך conveys pouring out. The subject is 'water,' so a literal rendering
    preserves the imagery and avoids prematurely interpreting it simply as 'rain,'
    though rain is almost certainly meant.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: In the first occurrence, 'the heavens' preserves the elevated register
    and the plural Hebrew form. It also fits the idiom of water coming from above.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds
  lexicon: HALOT
  rationale: This construct phrase is a standard Hebrew expression for birds. 'Birds
    of the sky' is natural English and preserves the imagery.
- source_word: לָנוּחַ עֲלֵיהֶם
  chosen: to rest on them
  alternatives:
  - to settle on them
  - to alight on them
  lexicon: HALOT
  rationale: נוח here refers to alighting or settling. 'Rest on them' is a clear,
    readable rendering that preserves the basic sense.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: The phrase refers to wild land animals. 'Wild animals of the field' is
    accessible modern English while preserving the Hebrew expression.
- source_word: יוֹמָם ... לָיְלָה
  chosen: by day ... by night
  alternatives:
  - in the daytime ... at night
  lexicon: HALOT
  rationale: These adverbial time expressions are idiomatically rendered 'by day'
    and 'by night,' preserving the contrast and rhythm.
- source_word: וְלֹא נָתְנָה
  chosen: she did not allow
  alternatives:
  - she did not permit
  - she did not let
  lexicon: HALOT
  rationale: נתן plus infinitive here functions idiomatically as 'allow/permit.' 'Did
    not allow' is clear and slightly more formal than 'did not let,' fitting the narrative
    tone.
