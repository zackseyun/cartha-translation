id: 2SA.21.11
reference: 2 Samuel 21:11
source:
  edition: WLC
  text: וַ/יֻּגַּ֖ד לְ/דָוִ֑ד אֵ֧ת אֲשֶׁר עָשְׂתָ֛ה רִצְפָּ֥ה בַת אַיָּ֖ה פִּלֶ֥גֶשׁ
    שָׁאֽוּל־־׃
translation:
  text: And it was reported to David what Rizpah daughter of Aiah, Saul’s concubine,
    had done.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - it was made known
  lexicon: HALOT
  rationale: Passive of נגד introduces reported information. 'It was reported' is
    natural modern English and preserves the passive sense better than the more colloquial
    'it was told.'
- source_word: לְדָוִד
  chosen: to David
  lexicon: HALOT
  rationale: Standard indirect object with ל; in English this is naturally incorporated
    into 'reported to David.'
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: The object marker plus relative particle together introduce the content
    of the report. 'What' is idiomatic English while accurately conveying the clause.
- source_word: עָשְׂתָה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: The perfect refers to an action completed prior to the reporting. English
    past perfect fits the narrative sequence smoothly.
- source_word: רִצְפָּה
  chosen: Rizpah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: בַת אַיָּה
  chosen: daughter of Aiah
  alternatives:
  - the daughter of Aiah
  lexicon: HALOT
  rationale: Hebrew patronymic/appositional identification is best rendered directly
    as 'daughter of Aiah.'
- source_word: פִּלֶגֶשׁ שָׁאוּל
  chosen: Saul’s concubine
  alternatives:
  - the concubine of Saul
  lexicon: HALOT
  rationale: Construct chain indicating relationship/status. 'Saul’s concubine' is
    concise and clear in modern English, preserving the social designation without
    euphemism.
