id: 2SA.21.9
reference: 2 Samuel 21:9
source:
  edition: WLC
  text: וַֽ/יִּתְּנֵ֞/ם בְּ/יַ֣ד הַ/גִּבְעֹנִ֗ים וַ/יֹּקִיעֻ֤/ם בָּ/הָר֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/יִּפְּל֥וּ שבעתים יָ֑חַד ו/הם הֻמְת֜וּ בִּ/ימֵ֤י קָצִיר֙ בָּ/רִ֣אשֹׁנִ֔ים תחלת קְצִ֥יר שְׂעֹרִֽים׃
translation:
  text: He gave them into the hand of the Gibeonites, and they hanged them on the mountain before Yahweh, and the seven of them fell together. They were put to death in the first days of harvest, at the beginning of the barley harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they impaled them' or 'they exposed them publicly.' The Hebrew verb can refer more broadly to hanging up bodies in public display, not necessarily to hanging in the later narrow sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵם
  chosen: He handed them over
  alternatives:
  - he gave them
  - he delivered them
  lexicon: HALOT
  rationale: נתן with object plus 'into the hand of' commonly means to hand over or deliver into another's power, not merely to give in a neutral sense.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - to
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is preserved because it is a common Hebrew expression for transfer into someone's control. In English, it remains understandable and retains the juridical force.
- source_word: הַגִּבְעֹנִים
  chosen: the Gibeonites
  rationale: Standard transliteration of the people group name.
- source_word: וַיֹּקִיעֻם
  chosen: they hanged them
  alternatives:
  - they impaled them
  - they exposed them
  lexicon: HALOT
  rationale: The verb יקע refers to a public execution/display by hanging up or impaling. 'Hanged them' is chosen as the most natural English rendering in this narrative context, while preserving the public, judicial sense. Because the exact mode may be broader than later English 'hanging,' an alternative is preserved in a footnote.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - on the hill
  - in the mountain region
  lexicon: HALOT
  rationale: הַר normally means mountain or hill country. 'On the mountain' best reflects the definite singular form and the execution setting.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This phrase indicates that the act occurred in a way understood as before YHWH, likely in covenantal/judicial significance. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: וַיִּפְּלוּ שבעתים יָחַד
  chosen: so that the seven of them fell together
  alternatives:
  - and the seven of them fell together
  - and all seven fell together
  lexicon: HALOT
  rationale: The clause reports the collective result of the execution. 'The seven of them' makes explicit the adverbial/numerical sense of שבעתים here, and 'fell together' preserves the Hebrew imagery of falling in death.
- source_word: הֻמְתוּ
  chosen: They were put to death
  alternatives:
  - they were killed
  lexicon: HALOT
  rationale: 'The Hophal of מות is a causative passive: they were caused to die, i.e., put to death. This is more precise than the flatter ''killed.'''
- source_word: בִּימֵי קָצִיר בָּרִאשֹׁנִים
  chosen: in the first days of harvest
  alternatives:
  - during the first days of harvest
  - in the early days of harvest
  lexicon: HALOT
  rationale: This phrase marks the time frame. 'First days of harvest' is a natural rendering of the plural adjective with temporal force.
- source_word: תְּחִלַּת קְצִיר שְׂעֹרִים
  chosen: at the beginning of the barley harvest
  alternatives:
  - at the start of the barley harvest
  lexicon: HALOT
  rationale: This appositional phrase specifies the harvest season more exactly. 'Barley harvest' is the plain sense.
