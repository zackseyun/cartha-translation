theological_decisions:
- issue: Rendering of the execution verb יקע
  chosen_reading: Public execution by hanging is expressed as 'they hanged them' in the main text, with a footnote preserving 'impaled/exposed' as possible nuances.
  alternative_readings:
  - they impaled them
  - they exposed them publicly
  rationale: The verse describes a covenant-related judicial execution before the LORD. The Hebrew verb can denote hanging up or impaling/exposing after death or as part of execution. The main text uses idiomatic English while the footnote preserves the lexical uncertainty rather than overstating the exact method.
  doctrine_reference: Preserve theological tension rather than resolve it; document per-verse lexical ambiguity.
