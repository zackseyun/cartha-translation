id: 2SA.21.22
reference: 2 Samuel 21:22
source:
  edition: WLC
  text: אֶת אַרְבַּ֥עַת אֵ֛לֶּה יֻלְּד֥וּ לְ/הָ/רָפָ֖ה בְּ/גַ֑ת וַ/יִּפְּל֥וּ בְ/יַד
    דָּוִ֖ד וּ/בְ/יַ֥ד עֲבָדָֽי/ו־־׃פ
translation:
  text: These four were born to the Rapha in Gath, and they fell by the hand of David
    and by the hand of his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Rapha,' 'to the giant,' or 'to the Rephaim.' The Hebrew likely refers
      to descent from the giant line associated with Gath.
    reason: alternative_reading
lexical_decisions:
- source_word: אַרְבַּעַת אֵלֶּה
  chosen: these four
  alternatives:
  - these four men
  - these four ones
  lexicon: HALOT
  rationale: Straightforward demonstrative-number construction; English idiom prefers
    'these four.' 'Men' is not explicit in the Hebrew and is therefore omitted.
- source_word: יֻלְּדוּ
  chosen: were born
  alternatives:
  - were begotten
  - were brought forth
  lexicon: HALOT
  rationale: Passive of ילד here denotes birth/descent. 'Were born' is the most natural
    modern English rendering; 'were begotten' is possible but less idiomatic and can
    sound overly formal.
- source_word: לְהָרָפָה
  chosen: to the Rapha
  alternatives:
  - to Rapha
  - to the giant
  - to the Rephaim
  lexicon: HALOT
  rationale: The phrase likely refers to descent from a figure or clan called Rapha/Repha
    in the giant tradition. Retaining 'the Rapha' preserves the Hebrew form and avoids
    over-interpreting it as a common noun ('giant') or plural ethnic term ('Rephaim')
    in the main text.
- source_word: בְּגַת
  chosen: in Gath
  alternatives:
  - at Gath
  lexicon: HALOT
  rationale: Standard locative use; 'in Gath' is the natural English rendering.
- source_word: וַיִּפְּלוּ
  chosen: they fell
  alternatives:
  - they were struck down
  - they died
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In battle context it implies death,
    but 'fell' preserves the Hebrew imagery while remaining idiomatic in English.
- source_word: בְיַד
  chosen: by the hand of
  alternatives:
  - at the hand of
  - by
  lexicon: HALOT
  rationale: This idiom denotes agency or instrumentality. 'By the hand of' preserves
    the Hebrew expression and is still readable in modern English.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his men
  - his servants/slaves
  lexicon: HALOT
  rationale: In royal/military context עבד often denotes retainers or officials in
    service to a master/king. 'His servants' is the most direct rendering; 'his men'
    is interpretive and less formally tied to the Hebrew term.
