theological_decisions:
- issue: Identity of הָרָפָה
  chosen_reading: A named or titular ancestor/clan figure, rendered conservatively
    as 'the Rapha'
  alternative_readings:
  - '''the giant'' as a common noun'
  - '''the Rephaim'' as a clan/people designation'
  rationale: The verse summarizes the preceding giant-combat narratives and links
    these four to the Rapha/Repha tradition in Gath. Because the Hebrew form can be
    understood in more than one way, the main text preserves the ambiguity rather
    than resolving it into a more interpretive label.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
