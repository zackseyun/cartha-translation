theological_decisions:
- issue: Apparent historical/textual tension over 'Michal' as mother of Adriel's sons
  chosen_reading: Retain 'Michal' in the main text as the reading of the Hebrew source,
    with the alternative 'Merab' preserved in a footnote.
  alternative_readings:
  - Merab daughter of Saul
  rationale: The translation philosophy prioritizes the original-language text over
    harmonizing tradition. Since the Hebrew here reads 'Michal,' the main text should
    not be emended. However, because 1 Samuel 18:19 associates Adriel with Merab,
    the alternative is significant and should be preserved for transparency.
  doctrine_reference: Translation philosophy §1, §3
