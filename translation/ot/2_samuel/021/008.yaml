id: 2SA.21.8
reference: 2 Samuel 21:8
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח הַ/מֶּ֡לֶךְ אֶת שְׁ֠נֵי בְּנֵ֨י רִצְפָּ֤ה בַת אַיָּה֙ אֲשֶׁ֣ר
    יָלְדָ֣ה לְ/שָׁא֔וּל אֶת אַרְמֹנִ֖י וְ/אֶת מְפִבֹ֑שֶׁת וְ/אֶת חֲמֵ֗שֶׁת בְּנֵי֙
    מִיכַ֣ל בַּת שָׁא֔וּל אֲשֶׁ֥ר יָלְדָ֛ה לְ/עַדְרִיאֵ֥ל בֶּן בַּרְזִלַּ֖י הַ/מְּחֹלָתִֽי־־־־־־־׃
translation:
  text: So the king took the two sons of Rizpah daughter of Aiah, whom she had borne
    to Saul—Armoni and Mephibosheth—and the five sons of Michal daughter of Saul,
    whom she had borne to Adriel son of Barzillai the Meholathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and ancient interpreters have 'Merab' instead of 'Michal';
      compare 1 Samuel 18:19, where Adriel is said to have married Merab, Saul's daughter.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: So ... took
  alternatives:
  - and ... took
  - then ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So ... took' gives natural
    English narrative flow while preserving the sequential sense of the Hebrew verb
    לקח.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; the referent in context is David, but the
    Hebrew uses the title rather than the personal name, so 'the king' is retained.
- source_word: שְׁנֵי בְּנֵי
  chosen: the two sons of
  alternatives:
  - two of the sons of
  lexicon: HALOT
  rationale: Construct chain with numeral straightforwardly means 'the two sons of.'
- source_word: רִצְפָּה בַת אַיָּה
  chosen: Rizpah daughter of Aiah
  alternatives:
  - Rizpah, the daughter of Aiah
  lexicon: HALOT
  rationale: Names are transliterated; filial identification is rendered directly
    and idiomatically.
- source_word: אֲשֶׁר יָלְדָה לְשָׁאוּל
  chosen: whom she had borne to Saul
  alternatives:
  - whom she bore to Saul
  - whom she had borne for Saul
  lexicon: HALOT
  rationale: ילד with ל marks the father. 'Had borne to Saul' is idiomatic English
    and reflects prior action relative to the king's taking them.
- source_word: אַרְמֹנִי
  chosen: Armoni
  rationale: Proper name transliterated by standard convention.
- source_word: מְפִבֹשֶׁת
  chosen: Mephibosheth
  rationale: Proper name transliterated by standard convention; context distinguishes
    this person from Jonathan's son by genealogy.
- source_word: חֲמֵשֶׁת בְּנֵי
  chosen: the five sons of
  alternatives:
  - five sons of
  lexicon: HALOT
  rationale: The object marker and construct phrase identify a second group taken
    by the king; English idiom naturally supplies 'the' for the counted set.
- source_word: מִיכַל בַּת שָׁאוּל
  chosen: Michal daughter of Saul
  alternatives:
  - Michal, the daughter of Saul
  - Merab daughter of Saul
  lexicon: HALOT
  rationale: The consonantal Hebrew text reads 'Michal,' and the translation should
    reflect the source text in the main line. Because 1 Samuel 18:19 names Merab as
    Adriel's wife, the alternative is preserved in a footnote as a likely textual
    or tradition-level difficulty rather than silently emending the text.
- source_word: אֲשֶׁר יָלְדָה לְעַדְרִיאֵל
  chosen: whom she had borne to Adriel
  alternatives:
  - whom she bore to Adriel
  lexicon: HALOT
  rationale: Same construction as earlier in the verse; consistent rendering preserves
    the Hebrew pattern.
- source_word: בֶּן בַּרְזִלַּי
  chosen: son of Barzillai
  lexicon: HALOT
  rationale: Standard patronymic rendering.
- source_word: הַמְּחֹלָתִי
  chosen: the Meholathite
  alternatives:
  - the man from Meholah
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the conventional English suffix '-ite,'
    preserving the ethnic/geographic designation.
