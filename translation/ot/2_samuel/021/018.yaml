theological_decisions:
- issue: Whether הָרָפָה should be rendered as a proper name ('Rapha') or interpreted
    as a common descriptor ('the giant')
  chosen_reading: 'proper name/clan ancestor: ''Rapha'''
  alternative_readings:
  - the giant
  - the Rephaite
  rationale: The Hebrew form with article has generated differing renderings, but
    in this genealogical-style phrase ('among the descendants of ...') a lineage reference
    is most natural. Rendering it as 'Rapha' avoids importing a full interpretive
    conclusion into the main text while still allowing the traditional 'giant' reading
    to be noted. This is a lexical-historical decision rather than a doctrinal one,
    but it affects how the reader understands the Rephaim-related tradition.
  doctrine_reference: Translation philosophy §1, §3, §5
