id: 2SA.21.18
reference: 2 Samuel 21:18
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַֽחֲרֵי כֵ֔ן וַ/תְּהִי ע֧וֹד הַ/מִּלְחָמָ֛ה בְּ/ג֖וֹב עִם פְּלִשְׁתִּ֑ים
    אָ֣ז הִכָּ֗ה סִבְּכַי֙ הַ/חֻ֣שָׁתִ֔י אֶת סַ֕ף אֲשֶׁ֖ר בִּ/ילִדֵ֥י הָ/רָפָֽה־־־־׃פ
translation:
  text: After this, there was again war with the Philistines at Gob, and then Sibbecai
    the Hushathite struck down Saph, who was among the descendants of Rapha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Saph'; the parallel in 1 Chronicles 20:4 has the name 'Sippai.'
    reason: textual_variant
  - marker: b
    text: Or 'who was among the descendants of the giant'; Hebrew may refer either
      to a figure named Rapha or to the giant/Rephaite lineage.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - After these things
  lexicon: HALOT
  rationale: A standard temporal transition. 'After this' is natural modern English
    and preserves the narrative sequence without unnecessary expansion.
- source_word: וַתְּהִי עוֹד הַמִּלְחָמָה
  chosen: there was again war
  alternatives:
  - the war happened again
  - there was further fighting
  lexicon: HALOT
  rationale: The clause literally uses 'and there was again the war.' English idiom
    prefers 'there was again war.' This preserves the repeated-conflict sense of עוֹד
    without over-paraphrasing.
- source_word: בְּגֹב
  chosen: at Gob
  alternatives:
  - in Gob
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'at'; with a battle location,
    'at Gob' is idiomatic in English.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation in English.
- source_word: אָז
  chosen: and then
  alternatives:
  - then
  - at that time
  lexicon: HALOT
  rationale: This adverb marks the next event in sequence. 'And then' gives smooth
    narrative flow in English while reflecting the Hebrew progression.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - defeated
  - smote
  lexicon: HALOT
  rationale: The verb נכה often means 'strike' and in battle contexts can imply killing.
    Since the object is a named warrior in a combat list, 'struck down' preserves
    the martial force without overstating beyond the lexical core; it also naturally
    implies lethal defeat in context.
- source_word: סִבְּכַי הַחֻשָׁתִי
  chosen: Sibbecai the Hushathite
  alternatives:
  - Sibbekai the Hushathite
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Sibbecai' is a common English transliteration
    of סִבְּכַי. The gentilic is retained as 'the Hushathite' rather than paraphrased,
    since the place-name identification is more transparent and traditional.
- source_word: סַף
  chosen: Saph
  alternatives:
  - Sippai
  lexicon: HALOT
  rationale: The MT here reads סַף, best represented as 'Saph.' A variant form of
    the name appears in the parallel tradition (1 Chr 20:4), so that alternative is
    worth preserving in a footnote.
- source_word: אֲשֶׁר בִּילִדֵי הָרָפָה
  chosen: who was among the descendants of Rapha
  alternatives:
  - who was one of the sons of Rapha
  - who was among the children of the giant
  - who was among the descendants of the giant
  lexicon: HALOT
  rationale: יַלִיד/יְלִידֵי with a proper name can denote descendants or members
    of a lineage. The phrase likely refers to the clan associated with Rapha/Rephaim.
    'Descendants of Rapha' preserves the Hebrew form without importing the interpretive
    gloss 'giant' into the main text. Because many translations render הָרָפָה as
    'the giant,' that alternative is preserved in a footnote.
