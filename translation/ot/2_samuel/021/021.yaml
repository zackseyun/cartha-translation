id: 2SA.21.21
reference: 2 Samuel 21:21
source:
  edition: WLC
  text: וַ/יְחָרֵ֖ף אֶת יִשְׂרָאֵ֑ל וַ/יַּכֵּ֨/הוּ֙ יְה֣וֹנָתָ֔ן בֶּן שמעי אֲחִ֥י
    דָוִֽד־־׃
translation:
  text: And he defied Israel, and Jonathan the son of Shimei, David’s brother, struck
    him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and the parallel in 1 Chronicles 20:7 read 'Shimea' or
      'Shimeah' instead of 'Shimei.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיְחָרֵף
  chosen: defied
  alternatives:
  - taunted
  - reproached
  - reviled
  lexicon: HALOT
  rationale: The verb חרף in this military context conveys insulting or defiant speech
    against Israel, not merely casual mockery. 'Defied' fits the hostile challenge
    context and aligns with similar usage in battle narratives.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The direct object is the national entity 'Israel.' In English, 'defied
    Israel' is natural and preserves the collective sense without expanding to 'the
    Israelites' unless needed for clarity.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - killed him
  - struck him
  - smote him
  lexicon: HALOT
  rationale: The verb נכה broadly means 'strike' and in this combat setting implies
    a lethal blow. 'Struck him down' preserves the verbal imagery while naturally
    conveying the likely result without over-paraphrasing.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן שמעי
  chosen: the son of Shimei
  alternatives:
  - son of Shimea
  rationale: The consonantal text here gives שמעי, commonly represented as 'Shimei.'
    However, the parallel in 1 Chronicles 20:7 has Shimea/Shimeah, and some English
    traditions harmonize. The translation follows the given Hebrew form and preserves
    the alternative in a footnote.
- source_word: אֲחִי דָוִד
  chosen: David’s brother
  alternatives:
  - the brother of David
  lexicon: HALOT
  rationale: The construct phrase literally means 'brother of David.' The possessive
    form is smoother in modern English while preserving the familial identification.
