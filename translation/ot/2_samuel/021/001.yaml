id: 2SA.21.1
reference: 2 Samuel 21:1
source:
  edition: WLC
  text: וַ/יְהִ֣י רָעָב֩ בִּ/ימֵ֨י דָוִ֜ד שָׁלֹ֣שׁ שָׁנִ֗ים שָׁנָה֙ אַחֲרֵ֣י שָׁנָ֔ה וַ/יְבַקֵּ֥שׁ דָּוִ֖ד אֶת פְּנֵ֣י יְהוָ֑ה וַ/יֹּ֣אמֶר יְהוָ֗ה אֶל שָׁאוּל֙ וְ/אֶל בֵּ֣ית הַ/דָּמִ֔ים עַל אֲשֶׁר הֵמִ֖ית אֶת הַ/גִּבְעֹנִֽים־ס־־־־־׃
translation:
  text: Now there was a famine in the days of David for three years, year after year. And David sought the face of Yahweh, and Yahweh said, “It is because of Saul and his bloodguilty house, because he put the Gibeonites to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sought the LORD' or 'inquired of the LORD'; literally, 'sought the face of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of bloods,' an idiom for a household guilty of bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In narrative context this denotes a severe food shortage affecting the land, best rendered 'famine' rather than the more general 'hunger.'
- source_word: שָׁלֹשׁ שָׁנִים שָׁנָה אַחֲרֵי שָׁנָה
  chosen: for three years, year after year
  alternatives:
  - three years in succession
  - for three years, one year after another
  lexicon: HALOT
  rationale: The Hebrew uses both the cardinal expression and the idiom 'year after year' to stress continuity. The translation preserves both elements rather than collapsing them into a bare 'for three years.'
- source_word: וַיְבַקֵּשׁ ... אֶת־פְּנֵי יְהוָה
  chosen: sought the face of the LORD
  alternatives:
  - sought the LORD
  - inquired of the LORD
  lexicon: HALOT
  rationale: Literally 'sought the face of YHWH.' Keeping 'the face of' preserves the Hebrew idiom and its personal, covenantal nuance, while remaining understandable in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל שָׁאוּל וְאֶל בֵּית הַדָּמִים
  chosen: because of Saul and his bloodguilty house
  alternatives:
  - on account of Saul and the house of bloodshed
  - against Saul and against the bloody house
  lexicon: HALOT
  rationale: The clause explains the cause of the famine. 'House' here means household/dynasty. 'Bloodguilty house' conveys culpability for bloodshed more precisely than the wooden 'house of bloods.' The possessive 'his' makes the relation explicit in natural English.
- source_word: בֵּית הַדָּמִים
  chosen: bloodguilty house
  alternatives:
  - house of bloodshed
  - bloody house
  lexicon: HALOT
  rationale: The plural 'bloods' is an idiom for bloodguilt/bloodshed. 'Bloodguilty house' communicates legal-moral culpability, not merely violence as an adjective.
- source_word: עַל אֲשֶׁר הֵמִית אֶת־הַגִּבְעֹנִים
  chosen: because he put the Gibeonites to death
  alternatives:
  - because he killed the Gibeonites
  - for he struck down the Gibeonites
  lexicon: HALOT
  rationale: The singular verb refers back to Saul as the principal agent. 'Put ... to death' is slightly more formal and judicial in tone than 'killed,' fitting the context of bloodguilt.
- source_word: הַגִּבְעֹנִים
  chosen: the Gibeonites
  lexicon: HALOT
  rationale: Standard transliteration of the people group name.
