theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential convention and broad ecclesial recognizability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the cause clause concerning Saul's house
  chosen_reading: The famine is presented as divine judgment because of Saul and his bloodguilty house, specifically for Saul's killing of the Gibeonites.
  alternative_readings:
  - The phrase could be read more woodenly as 'to Saul and to the house of bloods' without supplying 'because of.'
  rationale: In context, the LORD's reply explains the reason for the famine. English requires an explicit causal formulation to communicate the sense naturally without obscuring the Hebrew's judicial force.
