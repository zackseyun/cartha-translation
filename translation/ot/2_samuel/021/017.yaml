theological_decisions:
- issue: Metaphorical designation of David as Israel's sustaining light
  chosen_reading: Retain the metaphor 'the lamp of Israel' in the main text
  alternative_readings:
  - the light of Israel
  - Israel's hope
  rationale: The Hebrew uses a concrete metaphor rather than an abstract explanation.
    Preserving 'lamp' maintains the literary and royal-theological imagery without
    over-interpreting it.
  doctrine_reference: Translation philosophy §§1, 3, 6
