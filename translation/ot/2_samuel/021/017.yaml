id: 2SA.21.17
reference: 2 Samuel 21:17
source:
  edition: WLC
  text: וַ/יַּֽעֲזָר ל/וֹ֙ אֲבִישַׁ֣י בֶּן צְרוּיָ֔ה וַ/יַּ֥ךְ אֶת הַ/פְּלִשְׁתִּ֖י
    וַ/יְמִיתֵ֑/הוּ אָ֣ז נִשְׁבְּעוּ֩ אַנְשֵׁי דָוִ֨ד ל֜/וֹ לֵ/אמֹ֗ר לֹא תֵצֵ֨א ע֤וֹד
    אִתָּ֨/נוּ֙ לַ/מִּלְחָמָ֔ה וְ/לֹ֥א תְכַבֶּ֖ה אֶת נֵ֥ר יִשְׂרָאֵֽל־־־־־־׃פ
translation:
  text: But Abishai son of Zeruiah came to his aid, struck the Philistine, and killed
    him. Then David’s men swore to him, saying, “You must not go out with us to battle
    any longer, lest you extinguish the lamp of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the light of Israel.” The Hebrew reads “lamp,” a metaphor for David’s
      vital role in the life and stability of the nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזָר לוֹ
  chosen: came to his aid
  alternatives:
  - helped him
  - rescued him
  lexicon: HALOT
  rationale: The verb עזר means 'help, aid.' 'Came to his aid' is idiomatic English
    that preserves the narrative sense of intervention in combat better than the flatter
    'helped him.'
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  chosen: Abishai son of Zeruiah
  rationale: Personal names are transliterated by standard convention, while בן is
    rendered relationally as 'son of.'
- source_word: וַיַּךְ אֶת הַפְּלִשְׁתִּי
  chosen: struck the Philistine
  alternatives:
  - attacked the Philistine
  - struck down the Philistine
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' Because the following verb explicitly
    states death, 'struck' avoids redundancy that would result from 'struck down.'
- source_word: וַיְמִיתֵהוּ
  chosen: and killed him
  alternatives:
  - and put him to death
  lexicon: HALOT
  rationale: מות in the hiphil here clearly indicates causing death. 'Killed him'
    is the most natural modern English rendering.
- source_word: אָז נִשְׁבְּעוּ אַנְשֵׁי דָוִד לוֹ
  chosen: Then David’s men swore to him
  alternatives:
  - Then David's men took an oath to him
  - Then the men of David swore to him
  lexicon: HALOT
  rationale: נשבע denotes oath-taking. 'Swore to him' is concise and natural; 'David’s
    men' is a clear rendering of the construct phrase אַנְשֵׁי דָוִד.
- source_word: לֹא תֵצֵא עוֹד אִתָּנוּ לַמִּלְחָמָה
  chosen: You must not go out with us to battle any longer
  alternatives:
  - You shall no longer go out with us to battle
  - Do not go out with us to battle again
  lexicon: HALOT
  rationale: The imperfect after oath-reporting carries strong volitive force. 'You
    must not' communicates the solemn prohibition in natural English. 'To battle'
    is slightly more idiomatic here than 'to the battle/war.'
- source_word: וְלֹא תְכַבֶּה
  chosen: lest you extinguish
  alternatives:
  - and not extinguish
  - so that you do not quench
  lexicon: HALOT
  rationale: Although formally coordinated with וְלֹא, the clause expresses the purpose/result
    to be avoided by the prohibition. English 'lest' captures this idiom well and
    avoids a wooden coordination.
- source_word: נֵר יִשְׂרָאֵל
  chosen: the lamp of Israel
  alternatives:
  - the light of Israel
  lexicon: HALOT
  rationale: נֵר is literally 'lamp.' The phrase is metaphorical for David as the
    sustaining royal light of the nation. 'Lamp' preserves the Hebrew image more closely
    than the interpretive 'light.'
