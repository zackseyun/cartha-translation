id: 2SA.21.4
reference: 2 Samuel 21:4
source:
  edition: WLC
  text: וַ/יֹּ֧אמְרוּ ל֣/וֹ הַ/גִּבְעֹנִ֗ים אֵֽין ל/י כֶּ֤סֶף וְ/זָהָב֙ עִם שָׁא֣וּל
    וְ/עִם בֵּית֔/וֹ וְ/אֵֽין לָ֥/נוּ אִ֖ישׁ לְ/הָמִ֣ית בְּ/יִשְׂרָאֵ֑ל וַ/יֹּ֛אמֶר
    מָֽה אַתֶּ֥ם אֹמְרִ֖ים אֶעֱשֶׂ֥ה לָ/כֶֽם־־־־־׃
translation:
  text: The Gibeonites said to him, “We have no claim for silver or gold against Saul
    or against his house, and it is not for us to put any man in Israel to death.”
    Then he said, “What do you say that I should do for you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is not a matter of silver or gold between us and Saul and his house.”
      The Hebrew expression is idiomatic and likely refers to monetary compensation.
    reason: lexical_alternative
  - marker: b
    text: Or, “we have no right to put any man in Israel to death.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין לִי כֶּסֶף וְזָהָב עִם שָׁאוּל וְעִם בֵּיתוֹ
  chosen: We have no claim for silver or gold against Saul or against his house
  alternatives:
  - I have no silver or gold with Saul and with his house
  - It is not a matter of silver or gold between us and Saul and his house
  lexicon: HALOT
  rationale: The Hebrew is idiomatic and not a literal statement of possession. In
    context, the Gibeonites are declining monetary compensation from Saul's house.
    English 'have no claim for silver or gold against' brings out the legal/compensatory
    sense more clearly than a wooden 'there is no silver or gold for me with Saul.'
    The singular לִי likely functions idiomatically/corporately in the speakers' reply;
    English plural smooths the discourse.
- source_word: עִם
  chosen: against
  alternatives:
  - with
  - between us and
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in dispute/claim contexts it can
    mark the party involved in a matter. Here 'against Saul ... against his house'
    best conveys that the issue is not financial compensation to be exacted from them.
- source_word: וְאֵין לָנוּ אִישׁ לְהָמִית בְּיִשְׂרָאֵל
  chosen: and it is not for us to put any man in Israel to death
  alternatives:
  - and we have no man to put to death in Israel
  - and we have no right to kill any man in Israel
  lexicon: HALOT
  rationale: The clause is elliptical. The sense is not lack of a victim but lack
    of authority or prerogative to execute an Israelite. 'It is not for us' preserves
    the idiomatic force while remaining readable. 'Any man' reflects אִישׁ in a generic
    singular sense.
- source_word: אִישׁ
  chosen: any man
  alternatives:
  - anyone
  - a man
  lexicon: HALOT
  rationale: Gender-accurate translation is preferred. Here אִישׁ is generic for an
    individual person within Israel; 'any man' keeps the singular/generic force. 'Anyone'
    is possible but less formally aligned with the Hebrew.
- source_word: מָה אַתֶּם אֹמְרִים אֶעֱשֶׂה לָכֶם
  chosen: What do you say that I should do for you?
  alternatives:
  - What are you saying I should do for you?
  - What do you say I will do for you?
  lexicon: HALOT
  rationale: The Hebrew sequence is somewhat compressed. English idiom requires expansion.
    'What do you say that I should do for you?' captures David's request for their
    stated terms. 'Should' reflects the volitional nuance better than a bare future.
