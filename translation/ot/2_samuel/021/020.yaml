theological_decisions:
- issue: Identity of הָרָפָה
  chosen_reading: the Rapha as a proper ancestral designation
  alternative_readings:
  - the giant
  - the Rephaim
  rationale: The text most naturally points to lineage/descent rather than merely
    describing size. Rendering it as a proper designation avoids importing an interpretive
    gloss into the main text while allowing readers to connect it with the broader
    Rephaim tradition.
