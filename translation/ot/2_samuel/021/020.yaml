id: 2SA.21.20
reference: 2 Samuel 21:20
source:
  edition: WLC
  text: וַ/תְּהִי ע֥וֹד מִלְחָמָ֖ה בְּ/גַ֑ת וַ/יְהִ֣י אִ֣ישׁ מדין וְ/אֶצְבְּעֹ֣ת יָדָי/ו֩
    וְ/אֶצְבְּעֹ֨ת רַגְלָ֜י/ו שֵׁ֣שׁ וָ/שֵׁ֗שׁ עֶשְׂרִ֤ים וְ/אַרְבַּע֙ מִסְפָּ֔ר וְ/גַם
    ה֖וּא יֻלַּ֥ד לְ/הָ/רָפָֽה־׀־׃
translation:
  text: And there was war again at Gath, and there was a man of great size whose fingers
    and toes were six and six, twenty-four in number; he also was born to the Rapha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a huge man' or more literally 'a man of measure.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the fingers of his hands and the fingers of his feet'; English uses
      'toes' for the digits of the feet.
    reason: lexical_alternative
  - marker: c
    text: Or 'was descended from Rapha'; possibly referring to the Rephaim, a group
      associated with giants.
    reason: alternative_reading
lexical_decisions:
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  lexicon: HALOT
  rationale: The noun denotes warfare/conflict generally. 'War' fits the repeated
    campaign context better than the more event-specific 'battle'.
- source_word: בְּגַת
  chosen: at Gath
  alternatives:
  - in Gath
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'at'; 'at Gath' reads naturally
    in English for the location of military action.
- source_word: אִישׁ מדין
  chosen: a man of great size
  alternatives:
  - a man of measure
  - a huge man
  - a man of stature
  lexicon: HALOT
  rationale: The phrase is idiomatic. מדין is understood as related to measurement/size,
    describing unusual bodily dimensions. 'A man of great size' preserves the sense
    without wooden literalism.
- source_word: אֶצְבְּעֹת יָדָיו ... אֶצְבְּעֹת רַגְלָיו
  chosen: whose fingers and toes
  alternatives:
  - and the fingers of his hands and the fingers of his feet
  lexicon: HALOT
  rationale: Hebrew explicitly says 'fingers of his hands' and 'fingers of his feet.'
    In idiomatic English, digits on the feet are 'toes.' This is a natural equivalent
    that preserves the anatomical distinction.
- source_word: שֵׁשׁ וָשֵׁשׁ
  chosen: were six and six
  alternatives:
  - six each
  - six on each
  lexicon: HALOT
  rationale: The Hebrew repeats the number for hands and feet respectively. 'Were
    six and six' keeps the rhetorical force of the repetition while remaining understandable.
- source_word: עֶשְׂרִים וְאַרְבַּע מִסְפָּר
  chosen: twenty-four in number
  alternatives:
  - twenty-four altogether
  - numbering twenty-four
  lexicon: HALOT
  rationale: This clause sums the total count. 'Twenty-four in number' is a close
    and clear rendering.
- source_word: יֻלַּד לְהָרָפָה
  chosen: was born to the Rapha
  alternatives:
  - was descended from Rapha
  - was born to the giant
  - was one of the descendants of Rapha
  lexicon: HALOT
  rationale: The passive of ילד with ל marks descent/belonging. The form הָרָפָה likely
    refers to the ancestral figure/group known as Rapha/Rephaim. 'Born to the Rapha'
    stays close to the Hebrew while preserving the proper-name sense rather than flattening
    it to 'giant.'
