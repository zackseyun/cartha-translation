id: 2SA.21.14
reference: 2 Samuel 21:14
source:
  edition: WLC
  text: וַ/יִּקְבְּר֣וּ אֶת עַצְמוֹת שָׁא֣וּל וִ/יהוֹנָֽתָן בְּ֠נ/וֹ בְּ/אֶ֨רֶץ בִּנְיָמִ֜ן
    בְּ/צֵלָ֗ע בְּ/קֶ֨בֶר֙ קִ֣ישׁ אָבִ֔י/ו וַֽ/יַּעֲשׂ֔וּ כֹּ֥ל אֲשֶׁר צִוָּ֖ה הַ/מֶּ֑לֶךְ
    וַ/יֵּעָתֵ֧ר אֱלֹהִ֛ים לָ/אָ֖רֶץ אַֽחֲרֵי כֵֽן־־־־־׃פ
translation:
  text: They buried the bones of Saul and of Jonathan his son in the land of Benjamin,
    in Zela, in the tomb of Kish his father. They did all that the king had commanded,
    and after that God responded to the plea for the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God was entreated for the land,' or 'God answered prayer for the land.'
      The Hebrew verb implies a favorable response to supplication.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: They buried
  alternatives:
  - And they buried
  lexicon: HALOT
  rationale: Wayyiqtol narrative verb from קבר, straightforward past narrative action.
    English omits the conjunction for natural style while preserving sequence.
- source_word: עַצְמוֹת
  chosen: the bones of
  alternatives:
  - the remains of
  lexicon: HALOT
  rationale: עצמות literally means 'bones.' 'Remains' is possible idiomatically, but
    'bones' preserves the concrete wording of the Hebrew.
- source_word: שָׁאוּל וִיהוֹנָתָן בְּנוֹ
  chosen: Saul and of Jonathan his son
  alternatives:
  - Saul and Jonathan his son
  lexicon: HALOT
  rationale: The construct with repeated object marker sense is naturally rendered
    'the bones of Saul and of Jonathan his son.' Retaining 'his son' clarifies Jonathan's
    relation to Saul.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  chosen: in the land of Benjamin
  alternatives:
  - in Benjamin
  lexicon: HALOT
  rationale: Hebrew explicitly says 'in the land of Benjamin'; this is slightly fuller
    than simply 'in Benjamin' and preserves the territorial sense.
- source_word: בְּצֵלָע
  chosen: in Zela
  lexicon: HALOT
  rationale: Proper place name, transliterated according to the translation philosophy
    for names.
- source_word: בְּקֶבֶר קִישׁ אָבִיו
  chosen: in the tomb of Kish his father
  alternatives:
  - in the grave of Kish his father
  lexicon: HALOT
  rationale: קבר can be 'grave' or 'tomb.' 'Tomb' fits a family burial site and reads
    naturally in context. 'His father' refers to Saul's father Kish.
- source_word: וַיַּעֲשׂוּ כֹּל אֲשֶׁר צִוָּה הַמֶּלֶךְ
  chosen: They did all that the king had commanded
  alternatives:
  - They did everything the king commanded
  lexicon: HALOT
  rationale: Formal enough to preserve the relative clause and completed command,
    while remaining readable.
- source_word: וַיֵּעָתֵר אֱלֹהִים
  chosen: God responded to the plea
  alternatives:
  - God was moved by prayer
  - God accepted entreaty
  - God answered prayer
  lexicon: HALOT
  rationale: The Niphal of עתר often means to allow oneself to be entreated, to respond
    favorably to supplication. 'Responded to the plea' preserves the relational and
    petitionary sense without over-specifying the subject of the prayer.
- source_word: לָאָרֶץ
  chosen: for the land
  alternatives:
  - for the country
  - on behalf of the land
  lexicon: HALOT
  rationale: 'The preposition ל here indicates benefit/reference: God responded favorably
    with respect to the land, i.e., ending the famine affecting it. ''For the land''
    is concise and natural.'
- source_word: אַחֲרֵי כֵן
  chosen: after that
  alternatives:
  - afterward
  - after this
  lexicon: HALOT
  rationale: Standard temporal expression marking what followed these acts.
