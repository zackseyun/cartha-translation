theological_decisions:
- issue: Rendering of בני ישראל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where they match the source. Here the phrase is a national designation, but because
    it is repeated twice in the verse, preserving 'sons of Israel' maintains lexical
    transparency and the contrast with 'Judah.' A smoother alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Force of קנא in Saul's motive
  chosen_reading: zeal
  alternative_readings:
  - jealousy
  rationale: The text describes Saul's motive as partisan fervor on behalf of Israel
    and Judah. 'Zeal' better fits the political/national context and avoids implying
    envy, while still preserving the morally ambiguous intensity of the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
