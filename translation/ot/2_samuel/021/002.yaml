id: 2SA.21.2
reference: 2 Samuel 21:2
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א הַ/מֶּ֛לֶךְ לַ/גִּבְעֹנִ֖ים וַ/יֹּ֣אמֶר אֲלֵי/הֶ֑ם וְ/הַ/גִּבְעֹנִ֞ים
    לֹ֣א מִ/בְּנֵ֧י יִשְׂרָאֵ֣ל הֵ֗מָּה כִּ֚י אִם מִ/יֶּ֣תֶר הָ/אֱמֹרִ֔י וּ/בְנֵ֤י
    יִשְׂרָאֵל֙ נִשְׁבְּע֣וּ לָ/הֶ֔ם וַ/יְבַקֵּ֤שׁ שָׁאוּל֙ לְ/הַכֹּתָ֔/ם בְּ/קַנֹּאת֥/וֹ
    לִ/בְנֵֽי יִשְׂרָאֵ֖ל וִ/יהוּדָֽה־־׃
translation:
  text: So the king called the Gibeonites and spoke to them. Now the Gibeonites were
    not from the sons of Israel, but from the remnant of the Amorites; and the sons
    of Israel had sworn to them. But Saul had sought to strike them down in his zeal
    for the sons of Israel and Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were not Israelites.' The Hebrew reads 'were not from the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from what was left of the Amorites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Saul had sought to kill them in his jealousy for Israel and Judah.'
      The Hebrew term can mean either 'zeal' or 'jealousy' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: Basic sense of קרא in this context is to call/summon someone into one's
    presence. 'Called' is natural English and sufficiently formal.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to David in context; translated straightforwardly
    as 'the king' rather than supplying the name, since the Hebrew does not.
- source_word: לַגִּבְעֹנִים
  chosen: the Gibeonites
  lexicon: HALOT
  rationale: Gentilic plural rendered by standard English ethnonym.
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  chosen: spoke to them
  alternatives:
  - said to them
  lexicon: HALOT
  rationale: Although literally 'said to them,' English style after 'called' is smoother
    with 'spoke to them.' This does not exceed the source sense.
- source_word: וְהַגִּבְעֹנִים
  chosen: Now the Gibeonites
  alternatives:
  - And the Gibeonites
  lexicon: HALOT
  rationale: The waw here introduces explanatory background. 'Now' signals the parenthetical
    explanation naturally in English.
- source_word: לֹא מִבְּנֵי יִשְׂרָאֵל הֵמָּה
  chosen: were not from the sons of Israel
  alternatives:
  - were not of the children of Israel
  - were not Israelites
  lexicon: HALOT
  rationale: Retains the familial idiom 'sons of Israel' in a readable form. 'Israelites'
    is possible but loses the lexical connection to the repeated בני ישראל later in
    the verse.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: 'Idiomatic adversative expression here contrasting origin: not X, but
    Y.'
- source_word: מִיֶּתֶר הָאֱמֹרִי
  chosen: from the remnant of the Amorites
  alternatives:
  - from what was left of the Amorites
  - from the remainder of the Amorites
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains. 'Remnant' is concise and preserves the sense
    of surviving residue.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: and the sons of Israel
  alternatives:
  - and the Israelites
  lexicon: HALOT
  rationale: Kept consistent with the earlier בני ישראל phrase in the same verse.
- source_word: נִשְׁבְּעוּ לָהֶם
  chosen: had sworn to them
  alternatives:
  - had taken an oath to them
  - had sworn an oath to them
  lexicon: HALOT
  rationale: 'Pluperfect sense fits the narrative background: the oath preceded Saul''s
    action. ''Sworn to them'' is concise and accurate.'
- source_word: וַיְבַקֵּשׁ שָׁאוּל
  chosen: But Saul had sought
  alternatives:
  - And Saul sought
  - Saul tried
  lexicon: HALOT
  rationale: The clause continues explanatory background and contrasts Saul's conduct
    with Israel's oath. 'Had sought' reflects prior action relative to the present
    narrative.
- source_word: לְהַכֹּתָם
  chosen: to strike them down
  alternatives:
  - to kill them
  - to smite them
  lexicon: HALOT
  rationale: נכה often means strike down/kill. 'Strike them down' preserves the violent
    force without over-specifying beyond the verb itself.
- source_word: בְּקַנֹּאתוֹ
  chosen: in his zeal
  alternatives:
  - in his jealousy
  - because of his zeal
  lexicon: HALOT
  rationale: קנא can denote jealousy or zeal; here the sense is partisan zeal on behalf
    of Israel and Judah, not romantic jealousy. 'In his zeal' is the best contextual
    fit.
- source_word: לִבְנֵי יִשְׂרָאֵל וִיהוּדָה
  chosen: for the sons of Israel and Judah
  alternatives:
  - for Israel and Judah
  - for the Israelites and Judah
  lexicon: HALOT
  rationale: The preposition marks the object/beneficiary of Saul's zeal. Retaining
    'sons of Israel' preserves the repeated Hebrew wording, while 'and Judah' reflects
    the distinction present in the text.
