id: 2SA.21.12
reference: 2 Samuel 21:12
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ דָּוִ֗ד וַ/יִּקַּ֞ח אֶת עַצְמ֤וֹת שָׁאוּל֙ וְ/אֶת עַצְמוֹת֙ יְהוֹנָתָ֣ן
    בְּנ֔/וֹ מֵ/אֵ֕ת בַּעֲלֵ֖י יָבֵ֣ישׁ גִּלְעָ֑ד אֲשֶׁר֩ גָּנְב֨וּ אֹתָ֜/ם מֵ/רְחֹ֣ב
    בֵּֽית שַׁ֗ן אֲשֶׁ֨ר תלו/ם שם ה/פלשתים בְּ/י֨וֹם הַכּ֧וֹת פְּלִשְׁתִּ֛ים אֶת שָׁא֖וּל
    בַּ/גִּלְבֹּֽעַ־־־־׃
translation:
  text: Then David went and took the bones of Saul and the bones of Jonathan his son
    from the men of Jabesh-gilead, who had stolen them from the public square of Beth-shan,
    where the Philistines had hung them on the day the Philistines struck down Saul
    on Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remains' for 'bones,' though the Hebrew more literally says 'bones.'
    reason: lexical_alternative
  - marker: b
    text: '''Hung them'' could also be rendered ''displayed them'' or, in a stronger
      reading, ''impaled them''; the Hebrew verb itself most directly means ''hang.'''
    reason: lexical_alternative
  - marker: c
    text: Gilboa refers to the mountain area where Saul fell (cf. 1 Sam 31:8–13).
    reason: cross_reference
lexical_decisions:
- source_word: עַצְמוֹת
  chosen: bones
  alternatives:
  - remains
  lexicon: HALOT
  rationale: The noun literally denotes bones. In this burial-retrieval context, 'bones'
    is the plain sense and preserves the concreteness of the Hebrew better than the
    more interpretive 'remains.'
- source_word: בַּעֲלֵי
  chosen: the men of
  alternatives:
  - owners of
  - citizens of
  lexicon: HALOT
  rationale: Here the construct with a place name idiomatically refers to the people/inhabitants
    associated with Jabesh-gilead. 'The men of' is natural English and fits the historical
    narrative context.
- source_word: יָבֵישׁ גִּלְעָד
  chosen: Jabesh-gilead
  alternatives:
  - Jabesh Gilead
  rationale: Personal and place names are transliterated by standard English convention;
    the hyphenated form is common and clear.
- source_word: גָּנְבוּ
  chosen: had stolen
  alternatives:
  - took secretly
  - carried off
  lexicon: HALOT
  rationale: The verb means 'steal.' The pluperfect sense in English fits the relative
    clause referring to an action prior to David's taking the bones.
- source_word: מֵרְחֹב
  chosen: from the public square
  alternatives:
  - from the open square
  - from the plaza
  lexicon: HALOT
  rationale: The noun refers to an open area or town square. 'Public square' is idiomatic
    modern English and preserves the civic setting.
- source_word: בֵּית שַׁן
  chosen: Beth-shan
  alternatives:
  - Beth Shan
  - Beit-shean
  rationale: Standard English transliteration of the place name.
- source_word: תְּלֻם שָׁם
  chosen: had hung them there
  alternatives:
  - had impaled them there
  - had displayed them there
  lexicon: HALOT
  rationale: The verb תלה commonly means 'hang.' In this context of postmortem public
    display, 'hung them there' is the most direct rendering. 'Impaled' is possible
    in some contexts but is more specific than the Hebrew requires here.
- source_word: הַכּוֹת ... אֶת שָׁאוּל
  chosen: struck down Saul
  alternatives:
  - killed Saul
  - defeated Saul
  lexicon: HALOT
  rationale: The infinitive construct of נכה with object Saul refers to the Philistines'
    lethal defeat of Saul. 'Struck down' is faithful and idiomatic, preserving the
    verbal force without overparaphrase.
- source_word: בַּגִּלְבֹּעַ
  chosen: on Gilboa
  alternatives:
  - on Mount Gilboa
  - at Gilboa
  rationale: The Hebrew says simply 'on Gilboa.' Since the location is the mountain
    range known from context, 'on Gilboa' is a restrained rendering that stays close
    to the text; 'Mount' would be an explanatory addition.
- source_word: וַיֵּלֶךְ ... וַיִּקַּח
  chosen: Then David went and took
  alternatives:
  - David went and took
  - So David went and took
  lexicon: HALOT
  rationale: The waw-consecutive sequence advances the narrative. 'Then' appropriately
    signals continuation in English without overtranslating each conjunction.
- source_word: יְהוֹנָתָן בְּנוֹ
  chosen: Jonathan his son
  alternatives:
  - Jonathan, his son
  - his son Jonathan
  rationale: This preserves the Hebrew apposition and clearly identifies Jonathan
    as Saul's son in natural English.
