id: 2SA.21.16
reference: 2 Samuel 21:16
source:
  edition: WLC
  text: ו/ישבו בְּנֹ֜ב אֲשֶׁ֣ר בִּ/ילִידֵ֣י הָ/רָפָ֗ה וּ/מִשְׁקַ֤ל קֵינ/וֹ֙ שְׁלֹ֤שׁ
    מֵאוֹת֙ מִשְׁקַ֣ל נְחֹ֔שֶׁת וְ/ה֖וּא חָג֣וּר חֲדָשָׁ֑ה וַ/יֹּ֖אמֶר לְ/הַכּ֥וֹת
    אֶת דָּוִֽד׀־׃
translation:
  text: And Ishbi-benob, who was among the descendants of Rapha, whose spear weighed
    three hundred shekels of bronze, and who was girded with a new sword, said that
    he would strike down David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew name form is uncertain; 'Ishbi-benob' follows the traditional
      understanding. Possible alternatives include 'Jesbi-benob' or a different division
      of the consonants.
    reason: textual_variant
  - marker: b
    text: Or 'among those born to Rapha'; the phrase likely refers to the giant clan
      associated with the Rephaim.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'new'; the noun may be implied, traditionally understood as 'sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וישבו / בְּנֹב
  chosen: And Ishbi-benob
  alternatives:
  - And Jesbi-benob
  - And Yishbo in Nob
  lexicon: HALOT
  rationale: The consonantal text is difficult, but the traditional and contextually
    coherent reading is the giant's personal name, commonly vocalized Ishbi-benob.
    Rendering it as a proper name fits the narrative sequence and parallels the giant
    names in the surrounding verses. An alternative transliteration is preserved in
    a footnote because the form is textually and philologically uncertain.
- source_word: אֲשֶׁר בִּילִידֵי הָרָפָה
  chosen: who was among the descendants of Rapha
  alternatives:
  - who was among those born to the Rapha
  - who was among the descendants of the giant
  lexicon: HALOT
  rationale: יְלִידֵי with Rapha denotes lineage or stock. 'Descendants of Rapha'
    is natural English and preserves the familial/ethnic sense. 'Rapha' is transliterated
    as a proper name rather than flattened to 'giant,' though the association with
    the Rephaim/giants is relevant and can be noted as an alternative.
- source_word: וּמִשְׁקַל קֵינוֹ
  chosen: whose spear weighed
  alternatives:
  - and the weight of his spear
  - and the weight of his weapon
  lexicon: HALOT
  rationale: 'קֵין here is traditionally understood as ''spear'' or spear-shaft in
    this battle context. English idiom favors restructuring with a relative clause:
    ''whose spear weighed.'' This preserves the sense without awkward literalism.'
- source_word: שְׁלֹשׁ מֵאוֹת מִשְׁקַל נְחֹשֶׁת
  chosen: three hundred shekels of bronze
  alternatives:
  - three hundred shekels in weight of bronze
  - three hundred bronze shekels
  lexicon: HALOT
  rationale: מִשְׁקַל is a weight measure; 'shekels' is retained rather than converted
    to modern units for transparency. נְחֹשֶׁת is best rendered 'bronze' in this military
    context, though 'copper' is a possible broader gloss.
- source_word: וְהוּא חָגוּר חֲדָשָׁה
  chosen: and who was girded with a new sword
  alternatives:
  - and he was girded with something new
  - and he was wearing new armor
  lexicon: HALOT
  rationale: The adjective חֲדָשָׁה is feminine singular, implying an omitted feminine
    noun, traditionally understood as 'sword' from context. English requires supplying
    the implied object. 'Girded with a new sword' is the most likely sense in a combat
    narrative, while acknowledging the ellipsis and uncertainty.
- source_word: וַיֹּאמֶר לְהַכּוֹת אֶת דָּוִד
  chosen: said that he would strike down David
  alternatives:
  - thought to kill David
  - intended to strike David
  - said he would kill David
  lexicon: HALOT
  rationale: The idiom literally reads 'said to strike David,' which in context expresses
    intent or resolve. 'Said that he would strike down David' preserves the verbal
    force while sounding natural in English. 'Strike down' fits martial context and
    avoids overinterpreting with a more specific 'murder' nuance.
