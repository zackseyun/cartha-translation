id: 2SA.21.3
reference: 2 Samuel 21:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל הַ/גִּבְעֹנִ֔ים מָ֥ה אֶעֱשֶׂ֖ה לָ/כֶ֑ם וּ/בַ/מָּ֣ה
    אֲכַפֵּ֔ר וּ/בָרְכ֖וּ אֶת נַחֲלַ֥ת יְהוָֽה־־׃
translation:
  text: David said to the Gibeonites, “What shall I do for you, and with what shall
    I make atonement, so that you may bless the inheritance of the LORD?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and bless the LORD’s inheritance.' The Hebrew form can be read more
      literally as a coordinated clause; the main text brings out the likely purpose/result
      sense in context.
    reason: lexical_alternative
  - marker: b
    text: '''The inheritance of the LORD'' refers to Israel, the people belonging
      to the LORD.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, introducing David's speech. 'Said'
    is the default and does not over-interpret the speech act.
- source_word: הַגִּבְעֹנִים
  chosen: the Gibeonites
  lexicon: HALOT
  rationale: Gentilic plural referring to the people of Gibeon. Standard transliteration
    preserves the proper ethnic designation.
- source_word: מָה אֶעֱשֶׂה לָכֶם
  chosen: What shall I do for you
  alternatives:
  - What am I to do for you
  - What should I do for you
  lexicon: HALOT
  rationale: The interrogative plus imperfect expresses deliberative future sense.
    'Shall I do' is natural English and preserves the open question.
- source_word: וּבַמָּה
  chosen: and with what
  alternatives:
  - and by what means
  - and how
  lexicon: HALOT
  rationale: Literally 'and with/by what.' 'With what' keeps the instrumental nuance
    more closely than the broader 'how.'
- source_word: אֲכַפֵּר
  chosen: shall I make atonement
  alternatives:
  - shall I make amends
  - shall I appease
  lexicon: HALOT
  rationale: Piel of כפר commonly denotes making atonement or expiation. 'Make atonement'
    preserves the cultic-reparative force without reducing it merely to apology or
    compensation. 'Make amends' is contextually possible but weaker theologically
    and lexically.
- source_word: וּבָרְכוּ
  chosen: so that you may bless
  alternatives:
  - that you may bless
  - and bless
  lexicon: HALOT
  rationale: The conjunction plus imperative/volitive form functions here as the desired
    result of David's proposed action. Rendering it 'so that you may bless' communicates
    the purposive sense in idiomatic English.
- source_word: נַחֲלַת יְהוָה
  chosen: the inheritance of the LORD
  alternatives:
  - the LORD's inheritance
  - the heritage of the LORD
  lexicon: HALOT
  rationale: נחלה denotes inheritance/heritage, here referring to Israel as the people/land
    belonging to YHWH. 'The inheritance of the LORD' is transparent and close to the
    Hebrew construction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
