theological_decisions:
- issue: Rendering כפר in a context of bloodguilt and covenant violation
  chosen_reading: make atonement
  alternative_readings:
  - make amends
  - make expiation
  rationale: The verse concerns remedying serious communal guilt before God and the
    wronged Gibeonites. 'Make atonement' preserves the covenantal and theological
    weight of כפר better than a merely social or legal phrase, while remaining readable
    modern English.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sense of the final clause וּבָרְכוּ אֶת נַחֲלַת יְהוָה
  chosen_reading: 'purpose/result: ''so that you may bless the inheritance of the
    LORD'''
  alternative_readings:
  - 'simple coordination: ''and bless the inheritance of the LORD'''
  rationale: In context David asks what action and atonement would lead the Gibeonites
    to remove their grievance and speak blessing rather than curse over Israel. English
    expresses this most clearly with a purposive/result clause.
  doctrine_reference: Translation philosophy §3
