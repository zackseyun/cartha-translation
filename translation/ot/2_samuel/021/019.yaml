theological_decisions:
- issue: Apparent conflict with the better-known account of David killing Goliath
    (1 Samuel 17) and the parallel in 1 Chronicles 20:5
  chosen_reading: 'Retain the Masoretic wording of 2 Samuel 21:19 in the main text:
    Elhanan struck down Goliath the Gittite.'
  alternative_readings:
  - Adopt a harmonized reading such as 'Elhanan ... struck down Lahmi the brother
    of Goliath the Gittite'
  rationale: Per translation philosophy, original-language primacy governs over harmonization
    to translation tradition or parallel passages. The Hebrew text provided explicitly
    names Goliath as the object. Because the tension with 1 Samuel 17 and the Chronicler's
    wording is significant, the harmonized alternative is preserved in a footnote
    rather than imported into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
