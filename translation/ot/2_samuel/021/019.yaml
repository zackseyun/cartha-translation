id: 2SA.21.19
reference: 2 Samuel 21:19
source:
  edition: WLC
  text: וַ/תְּהִי ע֧וֹד הַ/מִּלְחָמָ֛ה בְּ/ג֖וֹב עִם פְּלִשְׁתִּ֑ים וַ/יַּ֡ךְ אֶלְחָנָן֩
    בֶּן יַעְרֵ֨י אֹרְגִ֜ים בֵּ֣ית הַלַּחְמִ֗י אֵ֚ת גָּלְיָ֣ת הַ/גִּתִּ֔י וְ/עֵ֣ץ
    חֲנִית֔/וֹ כִּ/מְנ֖וֹר אֹרְגִֽים־־־׃ס
translation:
  text: And there was again war at Gob with the Philistines, and Elhanan son of Jaare-oregim
    the Bethlehemite struck down Goliath the Gittite, and the shaft of his spear was
    like a weaver’s beam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Chronicles 20:5 reads differently, reporting that Elhanan killed Lahmi,
      the brother of Goliath. Many understand the Samuel text here to preserve a difficult
      or corrupted reading and harmonize it accordingly.
    reason: textual_variant
  - marker: b
    text: The Hebrew patronymic 'Jaare-oregim' is difficult; some think 'oregim' ('weavers')
      was accidentally repeated from the end of the verse.
    reason: textual_variant
lexical_decisions:
- source_word: בְּ/ג֖וֹב
  chosen: at Gob
  alternatives:
  - in Gob
  lexicon: HALOT
  rationale: The preposition בְ with a place name is naturally rendered 'at' in English
    for a battle location. 'Gob' is transliterated as a place name.
- source_word: וַ/יַּ֡ךְ
  chosen: struck down
  alternatives:
  - killed
  - struck
  lexicon: HALOT
  rationale: נכה commonly means to strike, smite, or kill depending on context. Here
    the direct object is a warrior in battle, so 'struck down' preserves the martial
    force without over-specifying beyond the verb itself.
- source_word: יַעְרֵ֨י אֹרְגִ֜ים
  chosen: Jaare-oregim
  alternatives:
  - Jair
  - Jaare
  lexicon: HALOT
  rationale: The Masoretic text reads a compound form traditionally represented as
    'Jaare-oregim.' Because the source text as given includes אֹרְגִים here as part
    of the patronymic sequence, the main text reflects the MT rather than harmonizing
    to Chronicles. The likely textual difficulty is preserved in a footnote rather
    than silently emended.
- source_word: בֵּ֣ית הַלַּחְמִ֗י
  chosen: the Bethlehemite
  alternatives:
  - Beth-lehemite
  - of Bethlehem
  lexicon: HALOT
  rationale: The gentilic sense is best conveyed by 'the Bethlehemite.' This follows
    the plain sense of the Hebrew form in the received text.
- source_word: אֵ֚ת גָּלְיָ֣ת הַ/גִּתִּ֔י
  chosen: Goliath the Gittite
  alternatives:
  - Lahmi the brother of Goliath the Gittite
  lexicon: HALOT
  rationale: The direct object marker plus proper name in the MT straightforwardly
    yields 'Goliath the Gittite.' Because 1 Chronicles 20:5 presents a harmonizing
    parallel ('Lahmi the brother of Goliath'), that alternative is preserved in a
    footnote rather than adopted into the main text.
- source_word: וְ/עֵ֣ץ חֲנִית֔/וֹ
  chosen: the shaft of his spear
  alternatives:
  - the wood of his spear
  - the handle of his spear
  lexicon: HALOT
  rationale: עֵץ literally means 'wood,' but in this collocation idiomatic English
    is 'shaft' for the wooden part of a spear. This is a contextual, not paraphrastic,
    rendering.
- source_word: כִּ/מְנ֖וֹר אֹרְגִֽים
  chosen: like a weaver’s beam
  alternatives:
  - like the beam of weavers
  lexicon: HALOT
  rationale: This is a conventional simile describing the thickness of the spear shaft.
    'Weaver’s beam' is clear modern English and closely reflects the Hebrew construction.
