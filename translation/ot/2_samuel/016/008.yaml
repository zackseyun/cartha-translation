theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of בְּרָעָתֶךָ
  chosen_reading: in your calamity
  alternative_readings:
  - in your evil
  rationale: Although the noun can denote moral evil, in this context Shimei points to the disaster now overtaking David as evidence of divine retribution. The translation preserves the situational sense without endorsing Shimei's accusation as narrator-approved theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
