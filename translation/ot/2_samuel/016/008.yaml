id: 2SA.16.8
reference: 2 Samuel 16:8
source:
  edition: WLC
  text: הֵשִׁיב֩ עָלֶ֨י/ךָ יְהוָ֜ה כֹּ֣ל דְּמֵ֣י בֵית שָׁא֗וּל אֲשֶׁ֤ר מָלַ֨כְתָּ֙ תחת/ו וַ/יִּתֵּ֤ן יְהוָה֙ אֶת הַ/מְּלוּכָ֔ה בְּ/יַ֖ד אַבְשָׁל֣וֹם בְּנֶ֑/ךָ וְ/הִנְּ/ךָ֙ בְּ/רָ֣עָתֶ֔/ךָ כִּ֛י אִ֥ישׁ דָּמִ֖ים אָֽתָּה׀־־׃
translation:
  text: Yahweh has brought upon you all the blood of the house of Saul, in whose place you reigned, and Yahweh has given the kingdom into the hand of Absalom your son. And behold, you are in your evil, because you are a man of bloodshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the bloodshed of the house of Saul' or 'all the bloodguilt of Saul's house.' The Hebrew literally says 'all the bloods of the house of Saul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you are in your evil.' The Hebrew term can mean either moral evil or calamity/disaster; here it likely refers to the disaster that has come upon David.
    reason: lexical_alternative
  - marker: c
    text: '''A man of bloodshed'' may also be rendered ''a man of blood'' or ''a bloody man,'' an idiom for one marked by bloodguilt or violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: has brought back
  alternatives:
  - has returned
  - has repaid
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'cause to return/bring back.' In this accusation, the sense is that YHWH has caused bloodguilt to come back upon David. 'Has brought back' preserves the concrete Hebrew idiom better than the more interpretive 'has repaid.'
- source_word: עָלֶיךָ
  chosen: upon you
  alternatives:
  - against you
  - on you
  lexicon: HALOT
  rationale: The preposition על with this verb conveys something coming back onto David. 'Upon you' preserves the judicial weight and idiomatic force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל דְּמֵי בֵית שָׁאוּל
  chosen: all the blood of the house of Saul
  alternatives:
  - all the bloodshed of the house of Saul
  - all the bloodguilt of Saul's house
  lexicon: HALOT
  rationale: The plural 'bloods' often denotes bloodshed or bloodguilt. Here Shimei accuses David regarding the deaths connected with Saul's house. 'All the blood of the house of Saul' stays close to the Hebrew while allowing the accusatory sense to be heard.
- source_word: אֲשֶׁר מָלַכְתָּ תַּחְתָּיו
  chosen: in whose place you reigned
  alternatives:
  - instead of whom you became king
  - under whom you reigned
  lexicon: HALOT
  rationale: תחתיו here means 'in his place' or 'instead of him,' referring to Saul. 'In whose place you reigned' is natural English and preserves the succession idea.
- source_word: וַיִּתֵּן ... אֶת־הַמְּלוּכָה בְּיַד
  chosen: has given the kingdom into the hand of
  alternatives:
  - gave the kingship into the power of
  - has handed the kingdom over to
  lexicon: HALOT
  rationale: The idiom 'give into the hand of' expresses transfer of power/control. 'Has given the kingdom into the hand of' keeps the Hebrew image while remaining readable.
- source_word: אַבְשָׁלוֹם בְּנֶךָ
  chosen: Absalom your son
  lexicon: HALOT
  rationale: Straightforward transliteration of the personal name with the appositional 'your son' retained.
- source_word: וְהִנְּךָ
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: הנה is a discourse particle drawing attention. 'And look' is readable modern English without archaic tone.
- source_word: בְּרָעָתֶךָ
  chosen: in your calamity
  alternatives:
  - in your evil
  - in your trouble
  - in your disaster
  lexicon: HALOT
  rationale: רעה can mean moral evil or experienced disaster/calamity depending on context. Here the sense is David's present ruin or distress, not that he is located in his own moral evil. 'Calamity' best fits the immediate context of Absalom's revolt while preserving the severity.
- source_word: אִישׁ דָּמִים
  chosen: a man of bloodshed
  alternatives:
  - a bloody man
  - a man of blood
  - a bloodthirsty man
  lexicon: HALOT
  rationale: This Hebrew expression denotes one characterized by bloodguilt or violence. 'A man of bloodshed' is clear modern English and avoids the archaic feel of 'bloody man' while preserving the idiom's force.
