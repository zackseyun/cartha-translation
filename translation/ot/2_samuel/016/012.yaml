theological_decisions:
- issue: Interpretation of בְעָוְנִי in light of the ketiv/qere and contextual sense
  chosen_reading: my affliction
  alternative_readings:
  - my iniquity
  rationale: The consonantal form can suggest 'my iniquity,' but the traditional reading and the immediate context favor 'my affliction/misery'—David's present humiliation under unjust cursing. Rendering 'my iniquity' could imply that David is asking God to notice his sin itself rather than his suffering, which is less likely in context. To preserve the textual and interpretive tension, the alternative is retained in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
