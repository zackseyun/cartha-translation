theological_decisions:
- issue: Whether David's statement attributes Shimei's cursing directly to divine command or more generally to divine permission/providence
  chosen_reading: Rendered as 'for the LORD has told him to,' preserving David's own stated attribution without softening it.
  alternative_readings:
  - for the LORD has permitted him
  - for the LORD has said to him, 'Curse David'
  rationale: The Hebrew text straightforwardly attributes the action to the LORD in David's speech. The translation preserves that theological tension rather than resolving it into mere permission. An explicit quotation is possible interpretively but is not present in the text, so it is not placed in the main line.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH -> the LORD
