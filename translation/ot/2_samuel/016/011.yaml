id: 2SA.16.11
reference: 2 Samuel 16:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֤ד אֶל אֲבִישַׁי֙ וְ/אֶל כָּל עֲבָדָ֔י/ו הִנֵּ֥ה בְנִ֛/י אֲשֶׁר יָצָ֥א מִ/מֵּעַ֖/י מְבַקֵּ֣שׁ אֶת נַפְשִׁ֑/י וְ/אַ֨ף כִּֽי עַתָּ֜ה בֶּן הַ/יְמִינִ֗י הַנִּ֤חוּ ל/וֹ֙ וִֽ/יקַלֵּ֔ל כִּ֥י אָֽמַר ל֖/וֹ יְהוָֽה־־־־־־־־׃
translation:
  text: Then David said to Abishai and to all his servants, “Look, my son, who came out from my own body, is seeking my life; how much more now this Benjaminite! Leave him alone, and let him curse, for Yahweh has told him to.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for the LORD has said to him.' The Hebrew does not state the content of what was said, but the context implies the cursing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphasis and draws attention to the comparison David is making. 'Look' is natural modern English while preserving the deictic force better than omitting it.
- source_word: בְנִי אֲשֶׁר יָצָא מִמֵּעַי
  chosen: my son, who came out from my own body
  alternatives:
  - my son, who came from my womb
  - my son, who came out of my inward parts
  lexicon: HALOT
  rationale: The Hebrew is vivid and bodily. Since David is male, 'from my womb' would be misleading in English; 'from my own body' preserves the idiom's force of natural descent without awkwardness.
- source_word: מְבַקֵּשׁ אֶת נַפְשִׁי
  chosen: is seeking my life
  alternatives:
  - seeks my life
  - is trying to kill me
  lexicon: HALOT
  rationale: This idiom commonly means seeking to take someone's life. 'Is seeking my life' preserves the Hebrew expression while remaining clear.
- source_word: וְאַף כִּי עַתָּה
  chosen: how much more now
  alternatives:
  - and indeed now
  - even now
  lexicon: HALOT
  rationale: The phrase heightens the argument from greater to lesser or from expected to more expected. 'How much more now' best captures the rhetorical force in context.
- source_word: בֶּן הַיְמִינִי
  chosen: this Benjaminite
  alternatives:
  - this son of Benjamin
  - this man of Benjamin
  lexicon: HALOT
  rationale: The expression denotes a member of the tribe of Benjamin. 'Benjaminite' is the standard concise English rendering and fits the contrast with David's own son.
- source_word: הַנִּחוּ לוֹ
  chosen: Leave him alone
  alternatives:
  - Let him alone
  - Leave him be
  lexicon: HALOT
  rationale: Imperative plural addressed to David's men. 'Leave him alone' is idiomatic modern English and conveys the command not to interfere.
- source_word: וִיקַלֵּל
  chosen: and let him curse
  alternatives:
  - that he may curse
  - let him keep cursing
  lexicon: HALOT
  rationale: 'Jussive-like continuation after the imperative: David permits Shimei''s cursing. ''Let him curse'' is concise and natural.'
- source_word: כִּי אָמַר לוֹ יְהוָה
  chosen: for the LORD has told him to
  alternatives:
  - for the LORD said to him
  - for the LORD has said to him
  lexicon: HALOT
  rationale: The Hebrew literally says 'for YHWH has said to him.' In English, because the implied content is the cursing itself, 'has told him to' makes the sense explicit without adding a new idea. 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
