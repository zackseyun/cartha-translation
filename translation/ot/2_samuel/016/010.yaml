id: 2SA.16.10
reference: 2 Samuel 16:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ מַה לִּ֥/י וְ/לָ/כֶ֖ם בְּנֵ֣י צְרֻיָ֑ה כי יְקַלֵּ֗ל ו/כי יְהוָה֙ אָ֤מַר ל/וֹ֙ קַלֵּ֣ל אֶת דָּוִ֔ד וּ/מִ֣י יֹאמַ֔ר מַדּ֖וּעַ עָשִׂ֥יתָה כֵּֽן־־׃ס
translation:
  text: But the king said, “What have I to do with you, sons of Zeruiah? If he is cursing because Yahweh has said to him, ‘Curse David,’ then who can say, ‘Why have you done so?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For he is cursing, because the LORD has said to him, “Curse David.”' The Hebrew particles can also be taken more explanatorily than conditionally.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לִּי וְלָכֶם
  chosen: What have I to do with you
  alternatives:
  - What is it to me and to you
  - What do I have in common with you
  lexicon: HALOT
  rationale: This idiom expresses dissociation or rebuke rather than a literal inquiry about possession. 'What have I to do with you' preserves the idiomatic force in natural English and matches the king's distancing response to the sons of Zeruiah.
- source_word: בְּנֵי צְרֻיָה
  chosen: sons of Zeruiah
  alternatives:
  - sons of Tseruiah
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying Joab and Abishai by their mother. 'Zeruiah' follows standard English transliteration conventions.
- source_word: יְקַלֵּל / קַלֵּל
  chosen: is cursing / Curse
  alternatives:
  - is reviling / Revile
  - is pronouncing a curse / Curse
  lexicon: HALOT
  rationale: The verb קלל here refers to abusive cursing directed at David. 'Curse' preserves the lexical connection between the finite verb and the quoted imperative, while remaining idiomatic in context.
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: The first כי is syntactically difficult and can introduce an explanatory or conditional sense. In context David is allowing for the possibility that Shimei's cursing is under divine direction; 'If' best captures the logic of the statement in English.
- source_word: וְכִי
  chosen: because
  alternatives:
  - and because
  - for
  lexicon: HALOT
  rationale: 'The second כי introduces the ground for the preceding clause: the cursing would be occurring because the LORD told him to do it. ''Because'' makes the causal relation explicit in clear English.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָמַר לוֹ
  chosen: has said to him
  alternatives:
  - said to him
  - told him
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect here because the prior divine command explains the present action. 'Has said' keeps the connection between prior command and current cursing.
- source_word: אֶת דָּוִד
  chosen: David
  alternatives:
  - against David
  lexicon: HALOT
  rationale: The direct-object marker simply marks David as the object of the cursing. English does not require an explicit preposition here.
- source_word: וּמִי יֹאמַר
  chosen: then who can say
  alternatives:
  - and who will say
  - who may say
  lexicon: HALOT
  rationale: The phrase is rhetorical, expressing that no one is in a position to challenge what the LORD has ordained. 'Can say' brings out the force of fitness or authority rather than mere futurity.
- source_word: מַדּוּעַ עָשִׂיתָה כֵּן
  chosen: Why have you done so?
  alternatives:
  - Why did you do this?
  - Why have you acted this way?
  lexicon: HALOT
  rationale: A natural rendering of the rhetorical challenge. 'Done so' is concise and fits the quoted speech.
