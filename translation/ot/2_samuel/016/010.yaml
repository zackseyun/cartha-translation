theological_decisions:
- issue: Divine involvement in Shimei's cursing
  chosen_reading: Render the verse so that David presents the cursing as possibly commanded by the LORD, without softening or resolving the theological tension.
  alternative_readings:
  - Render more weakly as mere permission by the LORD
  - Render more strongly as an unambiguous direct command without the verse's rhetorical framing
  rationale: The Hebrew states that the LORD said to him, 'Curse David,' and David's response accepts that possibility. The translation preserves this difficult tension without importing a broader doctrine of causation or moral approval.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH -> the LORD
