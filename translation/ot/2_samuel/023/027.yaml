id: 2SA.23.27
reference: 2 Samuel 23:27
source:
  edition: WLC
  text: אֲבִיעֶ֨זֶר֙ הָֽ/עַנְּתֹתִ֔י מְבֻנַּ֖י הַ/חֻשָׁתִֽי׃ס
translation:
  text: Abiezer the Anathothite, Mebunnai the Hushathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''from Anathoth'' and ''from Hushah.'' The Hebrew uses gentilics: ''the
      Anathothite'' and ''the Hushathite.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבִיעֶזֶר
  chosen: Abiezer
  alternatives:
  - Abi-ezer
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, in keeping with the policy to transliterate names.
- source_word: הָעַנְּתֹתִי
  chosen: the Anathothite
  alternatives:
  - from Anathoth
  lexicon: HALOT
  rationale: Gentilic form meaning an inhabitant/native of Anathoth. 'The Anathothite'
    preserves the concise appositional style of the Hebrew list and matches common
    English handling of gentilics in military rosters.
- source_word: מְבֻנַּי
  chosen: Mebunnai
  alternatives:
  - Mebunnai
  rationale: Proper personal name; transliterated directly. No translation is appropriate
    for a personal name in this context.
- source_word: הַחֻשָׁתִי
  chosen: the Hushathite
  alternatives:
  - from Hushah
  lexicon: HALOT
  rationale: Gentilic/title indicating origin or clan association. 'The Hushathite'
    preserves the Hebrew nominal style and parallels 'the Anathothite' in the same
    verse.
