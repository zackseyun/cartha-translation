id: 2SA.23.38
reference: 2 Samuel 23:38
source:
  edition: WLC
  text: עִירָא֙ הַ/יִּתְרִ֔י גָּרֵ֖ב הַ/יִּתְרִֽי׃ס
translation:
  text: Ira the Ithrite, Gareb the Ithrite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jithrite'; the gentilic הַיִּתְרִי may be transliterated with initial
      Y/J depending on English convention.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִירָא
  chosen: Ira
  alternatives:
  - Irah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project's policy for names.
- source_word: הַיִּתְרִי
  chosen: the Ithrite
  alternatives:
  - the Jithrite
  - the Yithrite
  lexicon: HALOT
  rationale: Gentilic with article, indicating clan or regional affiliation. 'Ithrite'
    is the conventional and readable transliteration of the Hebrew gentilic; the article
    is preserved as 'the' in apposition to the name.
- source_word: גָּרֵב
  chosen: Gareb
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly into standard English form.
