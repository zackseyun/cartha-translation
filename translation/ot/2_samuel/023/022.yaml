id: 2SA.23.22
reference: 2 Samuel 23:22
source:
  edition: WLC
  text: אֵ֣לֶּה עָשָׂ֔ה בְּנָיָ֖הוּ בֶּן יְהוֹיָדָ֑ע וְ/ל/וֹ שֵׁ֖ם בִּ/שְׁלֹשָׁ֥ה
    הַ/גִּבֹּרִֽים־־׃
translation:
  text: These things Benaiah son of Jehoiada did, and he had a name among the three
    mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he was renowned among the three mighty men.' The Hebrew idiom is
      literally 'and he had a name.'
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand this in light of the larger list of David's
      warriors and compare readings involving 'the thirty'; the Hebrew text here reads
      'the three.'
    reason: textual_variant
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These things
  alternatives:
  - These
  - Such things
  lexicon: HALOT
  rationale: The demonstrative points back to the exploits just narrated. 'These things'
    makes the resumptive force explicit in natural English.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - performed
  - accomplished
  lexicon: HALOT
  rationale: A common verb meaning 'do/make.' Here 'did' is the most direct and idiomatic
    rendering with the preceding demonstrative.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah, the son of Jehoiada
  rationale: Personal names are transliterated per project philosophy. The construct
    relationship is naturally rendered 'son of.'
- source_word: וְלוֹ שֵׁם
  chosen: and he had a name
  alternatives:
  - and he was renowned
  - and he had renown
  lexicon: HALOT
  rationale: Literally 'and to him [was] a name,' an idiom for reputation or renown.
    'Had a name' preserves the Hebrew idiom while remaining understandable in English.
- source_word: בִּשְׁלֹשָׁה הַגִּבֹּרִים
  chosen: among the three mighty men
  alternatives:
  - among the thirty mighty men
  - among the three warriors
  lexicon: HALOT
  rationale: The Hebrew reads 'among the three mighty men.' Although the parallel
    in some contexts raises the possibility of 'thirty,' the consonantal text here
    supports 'three.' 'Mighty men' is a conventional and contextually fitting rendering
    of הַגִּבֹּרִים, referring to David's elite warriors.
