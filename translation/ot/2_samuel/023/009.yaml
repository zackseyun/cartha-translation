id: 2SA.23.9
reference: 2 Samuel 23:9
source:
  edition: WLC
  text: ו/אחר/ו אֶלְעָזָ֥ר בֶּן דדי בֶּן אֲחֹחִ֑י בִּ/שְׁלֹשָׁ֨ה גברים עִם דָּוִ֗ד
    בְּ/חָֽרְפָ֤/ם בַּ/פְּלִשְׁתִּים נֶאֶסְפוּ שָׁ֣ם לַ/מִּלְחָמָ֔ה וַֽ/יַּעֲל֖וּ
    אִ֥ישׁ יִשְׂרָאֵֽל־־־־׃
translation:
  text: And after him was Eleazar son of Dodo, son of Ahohi, among the three mighty
    men with David, when they taunted the Philistines who had gathered there for battle,
    and the men of Israel had gone up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "son of Dodai, son of an Ahohite."
    reason: lexical_alternative
  - marker: b
    text: Or "when they defied the Philistines."
    reason: lexical_alternative
  - marker: c
    text: Literally "and the men of Israel went up"; in context this may mean they
      withdrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/אחר/ו
  chosen: And after him was
  alternatives:
  - And after him
  - Next after him was
  lexicon: HALOT
  rationale: Introduces the next warrior in sequence. Supplying 'was' makes natural
    English sense in a verbless identification clause.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן דדי בֶּן אֲחֹחִי
  chosen: son of Dodo, son of Ahohi
  alternatives:
  - son of Dodai, son of an Ahohite
  lexicon: HALOT
  rationale: Follows the consonantal text as personal names/gentilic in apposition.
    'Ahohi' is retained as a transliterated ancestral designation rather than converting
    to the gentilic 'Ahohite,' though that remains a plausible alternative.
- source_word: בִּ/שְׁלֹשָׁה גברים
  chosen: among the three mighty men
  alternatives:
  - one of the three warriors
  - among the three men
  lexicon: HALOT
  rationale: The phrase identifies Eleazar as belonging to David's elite triad. 'Mighty
    men' reflects the military-heroic sense of גברים in this context better than the
    bare 'men.' 'Among' captures בְּ in a membership sense.
- source_word: עִם דָּוִד
  chosen: with David
  lexicon: HALOT
  rationale: Straightforward accompaniment/association.
- source_word: בְּ/חָֽרְפָם
  chosen: when they taunted
  alternatives:
  - when they defied
  - when they reproached
  - when they challenged
  lexicon: HALOT
  rationale: חרף in military contexts often carries the sense of taunting or defying
    an enemy. 'Taunted' is vivid modern English and fits the hostile confrontation.
    The subject is best taken as David and his men in context.
- source_word: בַּ/פְּלִשְׁתִּים
  chosen: the Philistines
  rationale: Standard rendering of the people-group name.
- source_word: נֶאֶסְפוּ שָׁם לַ/מִּלְחָמָה
  chosen: who had gathered there for battle
  alternatives:
  - when they were gathered there for battle
  - having assembled there for battle
  lexicon: HALOT
  rationale: The Niphal of אסף here describes the Philistines assembling themselves.
    Rendering as a relative clause in English clarifies that the Philistines are the
    ones gathered there.
- source_word: וַֽ/יַּעֲלוּ אִישׁ יִשְׂרָאֵל
  chosen: and the men of Israel had gone up
  alternatives:
  - and the men of Israel withdrew
  - and the men of Israel went up
  lexicon: HALOT
  rationale: עלה literally means 'went up,' but in this battle context many understand
    it idiomatically as withdrawal/departure from the field. The main text keeps the
    more literal 'had gone up' to avoid over-interpreting, while preserving 'withdrew'
    as a contextual alternative in a footnote.
