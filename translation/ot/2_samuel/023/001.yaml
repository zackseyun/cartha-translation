id: 2SA.23.1
reference: 2 Samuel 23:1
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה דִּבְרֵ֥י דָוִ֖ד הָ/אַֽחֲרֹנִ֑ים נְאֻ֧ם דָּוִ֣ד בֶּן יִשַׁ֗י וּ/נְאֻ֤ם
    הַ/גֶּ֨בֶר֙ הֻ֣קַם עָ֔ל מְשִׁ֨יחַ֙ אֱלֹהֵ֣י יַֽעֲקֹ֔ב וּ/נְעִ֖ים זְמִר֥וֹת יִשְׂרָאֵֽל־׃
translation:
  text: 'Now these are the last words of David: An oracle of David son of Jesse, an
    oracle of the man raised on high, the anointed of the God of Jacob, and the sweet
    singer of the songs of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "utterance" or "declaration" for "oracle"; the Hebrew term is a formal
      speech marker often used in solemn or prophetic pronouncements.
    reason: lexical_alternative
  - marker: b
    text: Or "the Messiah of the God of Jacob"; Hebrew "the anointed of the God of
      Jacob." Here the phrase refers directly to David, though it carries royal-messianic
      resonance.
    reason: alternative_reading
  - marker: c
    text: Or "the pleasant singer of Israel's songs."
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: HALOT
  rationale: Basic sense is 'words/matters.' In this superscription-like context,
    'words' is the most natural and sufficiently formal rendering.
- source_word: הָאַחֲרֹנִים
  chosen: last
  alternatives:
  - final
  - later
  lexicon: HALOT
  rationale: With 'words,' the idiom refers to David's final utterance or concluding
    saying. 'Last' is the most direct English equivalent.
- source_word: נְאֻם
  chosen: oracle
  alternatives:
  - utterance
  - declaration
  lexicon: HALOT
  rationale: This noun is a formal prophetic-style speech marker, often introducing
    solemn inspired speech. 'Oracle' preserves that elevated, declarative force better
    than the flatter 'declaration.'
- source_word: בֶּן יִשַׁי
  chosen: son of Jesse
  lexicon: HALOT
  rationale: Standard patronymic construction; translated directly.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the warrior
  - the strong man
  lexicon: HALOT
  rationale: The noun commonly means 'man' with connotations of strength or prominence
    in some contexts. Here the plain rendering 'the man' best matches the Hebrew while
    allowing the following participial/passive description to supply the honorific
    sense.
- source_word: הֻקַם עָל
  chosen: raised on high
  alternatives:
  - exalted
  - raised up on high
  lexicon: HALOT
  rationale: The passive of קום with עָל here conveys elevation/exaltation. 'Raised
    on high' preserves the imagery and avoids over-interpreting with a purely abstract
    'exalted.'
- source_word: מְשִׁיחַ
  chosen: the anointed
  alternatives:
  - messiah
  - anointed one
  lexicon: HALOT
  rationale: Although the noun can under some contexts be rendered 'Messiah,' here
    it refers directly to David as the one anointed by God, not primarily as a title
    requiring messianic capitalization. 'The anointed' best reflects the Hebrew sense
    in context while preserving the royal-theological resonance.
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: the God of Jacob
  lexicon: HALOT
  rationale: Standard construct chain; translated straightforwardly.
- source_word: נְעִים
  chosen: sweet singer
  alternatives:
  - pleasant singer
  - lovely singer
  - favorite
  lexicon: HALOT
  rationale: The adjective means 'pleasant/sweet/delightful.' In apposition to David
    and followed by 'songs of Israel,' 'sweet singer' is idiomatic English and preserves
    the poetic tone.
- source_word: זְמִרוֹת יִשְׂרָאֵל
  chosen: the songs of Israel
  alternatives:
  - Israel's songs
  - the psalms of Israel
  lexicon: HALOT
  rationale: The noun denotes songs/music. 'Songs of Israel' is more textually grounded
    than 'psalms of Israel,' which would import later canonical associations not explicit
    in the Hebrew.
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - These are
  - And these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section. 'Now these
    are' gives natural modern English while retaining discourse continuity.
