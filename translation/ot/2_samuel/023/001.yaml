theological_decisions:
- issue: Whether מְשִׁיחַ should be rendered as a messianic title here
  chosen_reading: the anointed
  alternative_readings:
  - Messiah
  - anointed one
  rationale: The doctrine guidelines prefer translating titles, especially 'Messiah'
    where title is in view. In this verse, however, the referent is David himself
    in a royal descriptive chain ('the man raised on high, the anointed of the God
    of Jacob'), so rendering it 'the anointed' best reflects the immediate historical
    sense without importing a direct christological identification into the main text.
    The messianic resonance is real but secondary and can be preserved in documentation
    rather than by capitalizing or titling the term here.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    theological tension rather than resolve it.'
