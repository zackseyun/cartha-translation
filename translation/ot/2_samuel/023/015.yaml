id: 2SA.23.15
reference: 2 Samuel 23:15
source:
  edition: WLC
  text: וַ/יִּתְאַוֶּ֥ה דָוִ֖ד וַ/יֹּאמַ֑ר מִ֚י יַשְׁקֵ֣/נִי מַ֔יִם מִ/בֹּ֥אר בֵּֽית
    לֶ֖חֶם אֲשֶׁ֥ר בַּ/שָּֽׁעַר־׃
translation:
  text: And David longed and said, “Who will give me water to drink from the well
    of Bethlehem that is by the gate?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'If only someone would give me water to drink from
      the well of Bethlehem by the gate!' The Hebrew uses 'Who will...?' as an expression
      of longing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַוֶּה
  chosen: longed
  alternatives:
  - yearned
  - desired
  lexicon: HALOT
  rationale: The hitpael of אוה expresses strong desire or longing. 'Longed' is natural
    modern English and preserves the emotional force without over-paraphrasing.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - said to himself
  - exclaimed
  lexicon: HALOT
  rationale: The verb is the standard 'said.' Although the context may imply an exclamation
    of desire, the Hebrew does not explicitly add reflexive or emphatic wording, so
    the simple 'said' is preferred.
- source_word: מִי
  chosen: Who will
  alternatives:
  - Who would
  - If only someone would
  lexicon: HALOT
  rationale: The interrogative 'who?' introduces a wish-like expression. 'Who will'
    keeps the Hebrew form while remaining idiomatic enough in English. A more dynamic
    rendering such as 'If only someone would' captures the sense but moves farther
    from the wording.
- source_word: יַשְׁקֵנִי
  chosen: give me water to drink
  alternatives:
  - let me drink
  - make me drink
  - give me a drink
  lexicon: HALOT
  rationale: The hiphil of שקה means to give drink/cause to drink. Because the direct
    object 'water' follows, 'give me water to drink' is the clearest idiomatic rendering
    and preserves the causative sense better than the bare 'let me drink.'
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: מִבֹּאר
  chosen: from the well
  alternatives:
  - from the cistern
  lexicon: HALOT
  rationale: בְּאֵר ordinarily denotes a well rather than a cistern. 'Well' fits the
    Bethlehem setting and standard usage.
- source_word: בֵּית לֶחֶם
  chosen: Bethlehem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: אֲשֶׁר בַּשָּׁעַר
  chosen: that is by the gate
  alternatives:
  - that is at the gate
  - which is in the gate
  lexicon: HALOT
  rationale: The phrase identifies the particular well associated with the city gate.
    'By the gate' is clear modern English and avoids the potentially misleading 'in
    the gate,' while staying close to the Hebrew.
