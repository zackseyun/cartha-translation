id: 2SA.23.34
reference: 2 Samuel 23:34
source:
  edition: WLC
  text: אֱלִיפֶ֥לֶט בֶּן אֲחַסְבַּ֖י בֶּן הַ/מַּֽעֲכָתִ֑י אֱלִיעָ֥ם בֶּן אֲחִיתֹ֖פֶל
    הַ/גִּלֹנִֽי־־ס־׃ס
translation:
  text: Eliphelet son of Ahasbai, son of the Maacathite; Eliam son of Ahithophel the
    Gilonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Eliphelet son of Ahasbai the Maacathite; Eliam son of Ahithophel
      the Gilonite,' depending on how the appositional relationship in the list is
      construed and in comparison with the parallel in 1 Chronicles 11:35–36.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלִיפֶלֶט
  chosen: Eliphelet
  alternatives:
  - Eliphalet
  rationale: Personal name transliterated rather than translated, following the project
    rule to transliterate names by standard conventions.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogical/name-list context, בֶּן most naturally marks immediate
    filiation. 'Son of' is the standard and most transparent rendering, though 'descendant
    of' can be broader in some contexts.
- source_word: אֲחַסְבַּי
  chosen: Ahasbai
  rationale: Personal name transliterated directly from the Hebrew form.
- source_word: הַמַּעֲכָתִי
  chosen: the Maacathite
  alternatives:
  - the Maacathian
  - from Maacah
  lexicon: HALOT
  rationale: The gentilicial form with article is best rendered as an ethnic/regional
    designation, 'the Maacathite.' This preserves the Hebrew adjectival identity marker
    more closely than a paraphrase such as 'from Maacah.'
- source_word: אֱלִיעָם
  chosen: Eliam
  rationale: Personal name transliterated directly from the Hebrew form.
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal name transliterated directly from the Hebrew form.
- source_word: הַגִּלֹנִי
  chosen: the Gilonite
  alternatives:
  - the Gilonite
  - from Giloh
  lexicon: HALOT
  rationale: Gentilic from Giloh, best represented by the established English form
    'the Gilonite.' Rendering it as 'from Giloh' is possible but less formally aligned
    with the Hebrew adjective.
