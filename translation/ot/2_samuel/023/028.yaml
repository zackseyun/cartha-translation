id: 2SA.23.28
reference: 2 Samuel 23:28
source:
  edition: WLC
  text: צַלְמוֹן֙ הָֽ/אֲחֹחִ֔י מַהְרַ֖י הַ/נְּטֹפָתִֽי׃ס
translation:
  text: Zalmon the Ahohite, Maharai the Netophathite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Zalmon is rendered in some translations as 'Salmon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַלְמוֹן
  chosen: Zalmon
  alternatives:
  - Salmon
  rationale: Proper personal name; transliterated per translation philosophy. 'Zalmon'
    follows the consonantal form more directly in this context, while 'Salmon' is
    a known English variant preserved as an alternative.
- source_word: הָאֲחֹחִי
  chosen: the Ahohite
  alternatives:
  - an Ahohite
  - descendant of Ahoah
  lexicon: HALOT
  rationale: Gentilic with article, functioning as a clan/designation title. 'The
    Ahohite' is the standard concise English rendering for this ethnicon/gentilic
    in lists of David's warriors. 'Descendant of Ahoah' is interpretive and less list-like.
- source_word: מַהְרַי
  chosen: Maharai
  rationale: Proper personal name; transliterated by standard convention.
- source_word: הַנְּטֹפָתִי
  chosen: the Netophathite
  alternatives:
  - a Netophathite
  - from Netophah
  lexicon: HALOT
  rationale: Gentilic with article, indicating origin or clan association. 'The Netophathite'
    preserves the list style and mirrors the Hebrew form closely; 'from Netophah'
    is a valid dynamic alternative but less formally aligned.
