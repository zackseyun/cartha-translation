theological_decisions:
- issue: Messianic versus general royal reading
  chosen_reading: The verse is rendered as a general principle about the ideal ruler,
    without making an explicit messianic identification in the main text.
  alternative_readings:
  - A messianic reading that sees the line as ultimately fulfilled in the Messiah
  rationale: In context, David's 'last words' can be read both as wisdom about righteous
    kingship and as having typological/messianic resonance. The Hebrew itself states
    the principle without explicitly naming the Messiah, so the main text preserves
    that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
