id: 2SA.23.3
reference: 2 Samuel 23:3
source:
  edition: WLC
  text: אָמַר֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל לִ֥/י דִבֶּ֖ר צ֣וּר יִשְׂרָאֵ֑ל מוֹשֵׁל֙ בָּ/אָדָ֔ם
    צַדִּ֕יק מוֹשֵׁ֖ל יִרְאַ֥ת אֱלֹהִֽים׃
translation:
  text: 'The God of Israel has spoken; the Rock of Israel has said to me: One who
    rules over man justly, ruling in the fear of God,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over humankind.' Hebrew 'man' (אָדָם) can function representatively
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: This line may also be understood with messianic significance, as an ideal
      description of the king ultimately fulfilled in the Messiah.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַר
  chosen: has spoken
  alternatives:
  - said
  lexicon: HALOT
  rationale: Perfect verb introducing the oracle. Rendered with present relevance
    in English ('has spoken') to fit the prophetic declaration style; the parallel
    verb later is rendered 'has said' for natural variation while preserving the synonymous
    parallelism.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: The God of Israel
  lexicon: HALOT
  rationale: Construct phrase naming Israel's God. Definite article supplied naturally
    in English.
- source_word: לִי
  chosen: to me
  alternatives:
  - concerning me
  lexicon: HALOT
  rationale: 'The preposition with first-person suffix most naturally indicates indirect
    object here: the divine speech is addressed to David. ''Concerning me'' is possible
    in some contexts but less likely in this parallel prophetic formula.'
- source_word: דִבֶּר
  chosen: has said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common verb of speaking, parallel to אָמַר. Rendered 'has said' to preserve
    the paired testimony while keeping idiomatic English.
- source_word: צוּר יִשְׂרָאֵל
  chosen: the Rock of Israel
  lexicon: HALOT
  rationale: צוּר is a divine title/metaphor meaning 'rock,' often connoting stability
    and protection. It should be translated, not paraphrased.
- source_word: מוֹשֵׁל
  chosen: One who rules
  alternatives:
  - a ruler
  - he who rules
  lexicon: HALOT
  rationale: Qal participle used generically/principially. 'One who rules' preserves
    the participial, proverbial force better than a simple noun.
- source_word: בָּאָדָם
  chosen: over man
  alternatives:
  - over humankind
  - among men
  lexicon: HALOT
  rationale: With אדם and the doctrine's gender-accurate guidance, 'man' is retained
    as the representative singular. The preposition here is best taken in the sense
    of rule over a human subject rather than merely 'among.' An inclusive alternative
    is preserved in a footnote.
- source_word: צַדִּיק
  chosen: justly
  alternatives:
  - righteous
  - a righteous one
  lexicon: HALOT
  rationale: 'Although formally an adjective (''righteous''), in this compressed poetic
    line it functions adverbially/predicatively with the participle: the ruler rules
    in a just/righteous manner. ''Justly'' is the most natural English expression.'
- source_word: מוֹשֵׁל יִרְאַת אֱלֹהִים
  chosen: ruling in the fear of God
  alternatives:
  - ruling by the fear of God
  - a ruler in the fear of God
  - ruling with the fear of God
  lexicon: HALOT
  rationale: The second participial phrase further qualifies the ideal ruler. The
    construct יִרְאַת אֱלֹהִים is best rendered 'the fear of God.' 'In the fear of
    God' is idiomatic and preserves the theological sense of reverent accountability
    before God.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form refers to the one true God in a standard Hebrew
    idiom; singular English is required.
