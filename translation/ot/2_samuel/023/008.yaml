id: 2SA.23.8
reference: 2 Samuel 23:8
source:
  edition: WLC
  text: אֵ֛לֶּה שְׁמ֥וֹת הַ/גִּבֹּרִ֖ים אֲשֶׁ֣ר לְ/דָוִ֑ד יֹשֵׁ֨ב בַּשֶּׁ֜בֶת תַּחְכְּמֹנִ֣י
    רֹ֣אשׁ הַ/שָּׁלִשִׁ֗י ה֚וּא עֲדִינ֣/וֹ ה/עצנ/ו עַל שְׁמֹנֶ֥ה מֵא֛וֹת חָלָ֖ל בְּ/פַ֥עַם
    אחד׀־׃ס
translation:
  text: 'These are the names of the mighty men who belonged to David: Josheb-basshebeth,
    a Tahkemonite, chief of the Three. He was Adino the Eznite, who wielded his spear
    against eight hundred slain at one time.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text of this verse is difficult. 'Josheb-basshebeth' follows
      the Masoretic Text; the parallel in 1 Chronicles 11:11 reads 'Jashobeam, a Hachmonite.'
    reason: textual_variant
  - marker: b
    text: Or 'chief of the thirty,' according to some ancient witnesses and interpreters;
      the Masoretic Text reads 'chief of the Three.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'Adino the Eznite,' a very difficult phrase. Many understand it instead
      as something like 'he wielded his spear' or 'he brandished his spear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּבֹּרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the mighty ones
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly denotes mighty warriors or valiant men. 'Mighty
    men' preserves the established sense here while remaining natural English in this
    catalog context.
- source_word: אֲשֶׁר לְדָוִד
  chosen: who belonged to David
  alternatives:
  - who were David's
  - who were with David
  lexicon: HALOT
  rationale: The lamed with David marks association/possession. 'Belonged to David'
    conveys that these men were attached to David's company without overstating ownership.
- source_word: יֹשֵׁב בַּשֶּׁבֶת
  chosen: Josheb-basshebeth
  alternatives:
  - the one who sat in the seat
  - Ishbaal/Ishbosheth via harmonization with Chronicles
  lexicon: HALOT
  rationale: The Masoretic text is difficult, but in this context it functions as
    a proper name in apposition to the following descriptors. Rather than emending
    to match 1 Chronicles 11:11, the translation preserves the MT form as a transliterated
    name and notes the alternative in a footnote.
- source_word: תַּחְכְּמֹנִי
  chosen: a Tahkemonite
  alternatives:
  - the Tahkemonite
  - a Hachmonite
  lexicon: HALOT
  rationale: This is a gentilicial/patronymic designation. 'Tahkemonite' is a straightforward
    transliteration of the Hebrew form in Samuel; 'Hachmonite' reflects the Chronicles
    parallel and is preserved as an alternative.
- source_word: רֹאשׁ הַשָּׁלִשִׁי
  chosen: chief of the Three
  alternatives:
  - head of the thirty
  - chief captain
  - chief of the officers
  lexicon: HALOT
  rationale: Although the consonantal tradition has generated debate, the most natural
    reading of the MT vocalization is 'head/chief of the Three.' This fits the elite-warrior
    context. Alternatives arise from textual comparison and ancient versions, so they
    are preserved in a footnote.
- source_word: עֲדִינוֹ הָעֶצְנוֹ
  chosen: Adino the Eznite
  alternatives:
  - he wielded his spear
  - his ornament was his spear
  lexicon: HALOT
  rationale: The phrase is notoriously obscure. Retaining it as a proper name/title
    best reflects the MT as pointed, while avoiding conjectural rewriting in the main
    text. Because many interpreters understand this as a corruption for a verbal clause
    about brandishing a spear, that alternative is preserved in a footnote.
- source_word: עַל שְׁמֹנֶה מֵאוֹת חָלָל
  chosen: against eight hundred slain
  alternatives:
  - over eight hundred slain
  - eight hundred men
  lexicon: HALOT
  rationale: חָלָל means slain/wounded, here best 'slain.' The preposition עַל in
    this martial context is rendered 'against' to express hostile action resulting
    in the deaths.
- source_word: בְּפַעַם אֶחָד
  chosen: at one time
  alternatives:
  - in one encounter
  - on one occasion
  lexicon: HALOT
  rationale: The idiom denotes a single occasion or single time. 'At one time' is
    concise and natural.
- source_word: הוּא
  chosen: He was
  alternatives:
  - he
  - this one was
  lexicon: HALOT
  rationale: The independent pronoun introduces the following identification/apposition.
    'He was' makes the English syntax clear.
