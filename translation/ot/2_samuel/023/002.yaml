theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether רוּחַ should be rendered impersonally ('wind/breath') or personally
    ('Spirit')
  chosen_reading: Spirit
  alternative_readings:
  - breath
  - wind
  rationale: In the context of David's inspired final oracle, the text presents divine
    agency in speech. Rendering רוּחַ as 'Spirit' preserves the theological force
    of prophetic inspiration without importing more than the context warrants.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not import doctrinal claims the text does not make'
