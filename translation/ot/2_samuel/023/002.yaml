id: 2SA.23.2
reference: 2 Samuel 23:2
source:
  edition: WLC
  text: ר֥וּחַ יְהוָ֖ה דִּבֶּר בִּ֑/י וּ/מִלָּת֖/וֹ עַל לְשׁוֹנִֽ/י־־׃
translation:
  text: The Spirit of the LORD spoke by me, and his word was on my tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke through me.' The Hebrew preposition can express instrumentality
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֥וּחַ יְהוָ֖ה
  chosen: The Spirit of the LORD
  alternatives:
  - The רוח of the LORD
  - The breath of the LORD
  - The wind of the LORD
  lexicon: HALOT
  rationale: רוּחַ can denote wind, breath, or spirit, but in this prophetic-speech
    context with divine speaking, 'Spirit' best fits the personal, revelatory agency
    intended. יְהוָה is rendered 'the LORD' per doctrine default for the divine name.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - has spoken
  - spoke through
  lexicon: HALOT
  rationale: The verb דבר here denotes speaking. Simple past 'spoke' fits the poetic
    retrospective context. 'Spoke through' is interpretive; the preposition בִּי supplies
    the instrumental nuance, so the English keeps that separately with 'by me'.
- source_word: בִּי
  chosen: by me
  alternatives:
  - in me
  - through me
  lexicon: HALOT
  rationale: The preposition ב can mean 'in,' 'by,' or 'through' depending on context.
    With a verb of speaking and in parallel with 'his word was on my tongue,' the
    sense is instrumental/mediated speech. 'By me' is a concise, fairly formal rendering
    that preserves the Hebrew structure without over-paraphrasing. 'Through me' is
    a viable smoother alternative preserved in a footnote.
- source_word: וּמִלָּתוֹ
  chosen: and his word
  alternatives:
  - and his message
  - and what he said
  lexicon: HALOT
  rationale: מִלָּה means 'word' or 'utterance.' 'Word' preserves the lexical and
    theological weight of divine speech better than the more interpretive 'message'.
- source_word: עַל לְשׁוֹנִי
  chosen: was on my tongue
  alternatives:
  - was upon my tongue
  - was in my mouth
  lexicon: HALOT
  rationale: The idiom literally says 'upon my tongue.' 'Was on my tongue' is natural
    modern English while remaining close to the Hebrew image. 'In my mouth' would
    be a looser idiomatic equivalent but is less exact.
