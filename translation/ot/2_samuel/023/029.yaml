id: 2SA.23.29
reference: 2 Samuel 23:29
source:
  edition: WLC
  text: חֵ֥לֶב בֶּֽן בַּעֲנָ֖ה הַ/נְּטֹפָתִ֑י אִתַּי֙ בֶּן רִיבַ֔י מִ/גִּבְעַ֖ת בְּנֵ֥י
    בִנְיָמִֽן־ס־׃ס
translation:
  text: Heleb son of Baanah the Netophathite, Ittai son of Ribai from Gibeah of the
    sons of Benjamin;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Gibeah of the Benjaminites.' The Hebrew reads literally 'from Gibeah
      of the sons of Benjamin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  chosen: Heleb
  alternatives:
  - Helev
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English convention commonly renders the initial ח as H and final ב
    as b/v depending on tradition; 'Heleb' is a standard straightforward transliteration.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard filial marker in genealogical/name lists. 'Son of' is the natural
    formal rendering in this roster context.
- source_word: בַּעֲנָה
  chosen: Baanah
  alternatives:
  - Baana
  rationale: Proper name, transliterated. 'Baanah' preserves the doubled vowel more
    transparently in English.
- source_word: הַנְּטֹפָתִי
  chosen: the Netophathite
  alternatives:
  - the man from Netophah
  lexicon: HALOT
  rationale: Gentilic with article, denoting origin or clan association from Netophah.
    'The Netophathite' is concise and conventional for such gentilics in military
    lists.
- source_word: אִתַּי
  chosen: Ittai
  alternatives:
  - Ithai
  rationale: Proper name, transliterated by standard convention. 'Ittai' is a common
    English representation.
- source_word: רִיבַי
  chosen: Ribai
  alternatives:
  - Ribay
  rationale: Proper name, transliterated. 'Ribai' best reflects the Hebrew form in
    readable English.
- source_word: מִגִּבְעַת
  chosen: from Gibeah
  alternatives:
  - of Gibeah
  lexicon: HALOT
  rationale: The prefixed preposition מִן indicates source/origin, so 'from Gibeah'
    is the most direct rendering.
- source_word: בְּנֵי בִנְיָמִן
  chosen: of the sons of Benjamin
  alternatives:
  - of the Benjaminites
  - belonging to Benjamin
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' In this context it identifies Gibeah as
    associated with the tribe of Benjamin. The more literal wording preserves the
    Hebrew expression, though 'Benjaminites' is a viable smoother alternative.
