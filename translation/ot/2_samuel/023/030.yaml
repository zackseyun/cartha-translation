id: 2SA.23.30
reference: 2 Samuel 23:30
source:
  edition: WLC
  text: בְּנָיָ֨הוּ֙ פִּרְעָ֣תֹנִ֔י הִדַּ֖י מִ/נַּ֥חֲלֵי גָֽעַשׁ׃ס
translation:
  text: Benaiah the Pirathonite, Hiddai from the wadis of Gaash;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew naḥal can refer to a wadi, ravine, or torrent-bed; traditionally,
      'brooks' or 'valleys.'
    reason: lexical_alternative
  - marker: b
    text: The parallel in 1 Chronicles 11:32 reads 'Hurai' instead of 'Hiddai.'
    reason: cross_reference
lexical_decisions:
- source_word: בְּנָיָהוּ
  chosen: Benaiah
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated.
- source_word: פִּרְעָתֹנִי
  chosen: the Pirathonite
  alternatives:
  - from Pirathon
  lexicon: HALOT
  rationale: Gentilic adjective indicating origin from Pirathon. English idiom commonly
    renders such forms with the suffix '-ite'.
- source_word: הִדַּי
  chosen: Hiddai
  alternatives:
  - Hurai
  lexicon: HALOT
  rationale: Proper personal name, transliterated directly from the Masoretic Text.
    An alternative form appears in the parallel list in 1 Chronicles 11:32, but here
    the MT of Samuel reads Hiddai.
- source_word: מִ/נַּחֲלֵי
  chosen: from the wadis of
  alternatives:
  - from the brooks of
  - from the valleys of
  - from the ravines of
  lexicon: HALOT
  rationale: נחל often denotes a wadi, torrent-bed, or ravine rather than a perennial
    stream. 'Wadis' best preserves the geographical sense in readable modern English.
- source_word: גָעַשׁ
  chosen: Gaash
  lexicon: HALOT
  rationale: Place name, transliterated rather than translated.
