id: 2SA.23.39
reference: 2 Samuel 23:39
source:
  edition: WLC
  text: אֽוּרִיָּה֙ הַֽ/חִתִּ֔י כֹּ֖ל שְׁלֹשִׁ֥ים וְ/שִׁבְעָֽה׃פ
translation:
  text: 'Uriah the Hittite: thirty-seven in all.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or simply, ''all: thirty-seven.'' The Hebrew uses a brief summative expression
      to conclude the list.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוּרִיָּה
  chosen: Uriah
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: הַחִתִּי
  chosen: the Hittite
  alternatives:
  - the Hethite
  lexicon: HALOT
  rationale: Gentilic/national designation from 'Hittite'; 'the Hittite' is standard,
    clear modern English and matches the Hebrew definite article.
- source_word: כֹּל
  chosen: in all
  alternatives:
  - all
  - the whole number was
  lexicon: HALOT
  rationale: Here כֹּל summarizes the total of the preceding list. 'In all' is idiomatic
    English that preserves the summative force without awkwardness.
- source_word: שְׁלֹשִׁים וְשִׁבְעָה
  chosen: thirty-seven
  lexicon: HALOT
  rationale: Cardinal number giving the final total of the named warriors. Rendering
    as a compound English numeral is natural and precise.
