id: 2SA.23.13
reference: 2 Samuel 23:13
source:
  edition: WLC
  text: וַ/יֵּרְד֨וּ שלשים מֵ/הַ/שְּׁלֹשִׁ֣ים רֹ֗אשׁ וַ/יָּבֹ֤אוּ אֶל קָצִיר֙ אֶל
    דָּוִ֔ד אֶל מְעָרַ֖ת עֲדֻלָּ֑ם וְ/חַיַּ֣ת פְּלִשְׁתִּ֔ים חֹנָ֖ה בְּ/עֵ֥מֶק רְפָאִֽים־־־׃
translation:
  text: Then thirty of the thirty chief men went down and came at harvest time to
    David, to the cave of Adullam, while a band of the Philistines was camped in the
    Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'thirty from the thirty, chief'; the expression is difficult. It
      may mean 'thirty of the chief men' or refer more specifically to members of
      'the Thirty,' David's elite warriors.
    reason: alternative_reading
  - marker: b
    text: Or 'during harvest.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew חַיַּת פְּלִשְׁתִּים, literally 'living thing/animal of the Philistines,'
      here used idiomatically for a military band or troop.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down/descend.' 'Went down' is natural
    English and preserves the directional sense without overformal wording.
- source_word: שְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Straightforward numeral.
- source_word: מֵהַשְּׁלֹשִׁים רֹאשׁ
  chosen: of the thirty chief men
  alternatives:
  - from the thirty chiefs
  - from the thirty, chief
  - of the Thirty as chiefs
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. רֹאשׁ here functions
    appositionally/adjectivally with the group, indicating prominence or chief status.
    Rendering 'of the thirty chief men' communicates that these thirty belonged to
    the elite group and were leading warriors. This also fits the broader context
    of David's mighty men.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: With repeated אֶל marking destination toward David/the cave, 'came' is
    idiomatic in English narrative.
- source_word: אֶל קָצִיר
  chosen: at harvest time
  alternatives:
  - to harvest
  - during harvest
  lexicon: HALOT
  rationale: Although literally 'to harvest,' the phrase is temporal in context. 'At
    harvest time' is clear modern English and reflects the likely idiomatic sense.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - to meet David
  lexicon: HALOT
  rationale: Simple directional phrase; no need to add 'meet' in the main text since
    the Hebrew does not state it explicitly.
- source_word: אֶל מְעָרַת עֲדֻלָּם
  chosen: to the cave of Adullam
  alternatives:
  - to Adullam, to the cave
  - to the cave at Adullam
  lexicon: HALOT
  rationale: Construct phrase means 'the cave of Adullam.' This is the most direct
    and familiar English rendering.
- source_word: חַיַּת פְּלִשְׁתִּים
  chosen: a band of the Philistines
  alternatives:
  - the Philistine troop
  - the camp of the Philistines
  - the host of the Philistines
  lexicon: HALOT
  rationale: חַיָּה literally can denote a living thing/animal, but in military contexts
    it is used for a troop or band. 'A band of the Philistines' best fits the context
    and avoids misleadingly literal wording.
- source_word: חֹנָה
  chosen: was camped
  alternatives:
  - was encamped
  - camped
  lexicon: HALOT
  rationale: The participle of חנה denotes encampment. 'Was camped' gives the ongoing
    background action in natural English.
- source_word: בְּעֵמֶק רְפָאִים
  chosen: in the Valley of Rephaim
  alternatives:
  - in the valley of Rephaim
  lexicon: HALOT
  rationale: Place name preserved by transliteration; 'Valley' capitalized as part
    of the recognized toponym.
