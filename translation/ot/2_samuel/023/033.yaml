id: 2SA.23.33
reference: 2 Samuel 23:33
source:
  edition: WLC
  text: שַׁמָּה֙ הַֽ/הֲרָרִ֔י אֲחִיאָ֥ם בֶּן שָׁרָ֖ר הָארָרִֽי־׃ס
translation:
  text: Shammah the Hararite, Ahiam son of Sharar the Ararite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Ahiam son of Sharar the Hararite,' if the final designation
      is harmonized with the parallel ethnic term; the Hebrew here, however, is best
      read as 'Ararite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁמָּה
  chosen: Shammah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    to preserve the name rather than translate it.
- source_word: הֲרָרִי
  chosen: the Hararite
  alternatives:
  - the mountaineer
  - the man from Harar
  lexicon: HALOT
  rationale: A gentilicial/adjectival form used as an ethnic or geographic designation.
    In this roster context, retaining it as a demonym ('Hararite') is more natural
    and consistent than rendering it descriptively as 'mountaineer.' The article is
    represented with 'the.'
- source_word: אֲחִיאָם
  chosen: Ahiam
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is idiomatic modern
    English in a name list.
- source_word: שָׁרָר
  chosen: Sharar
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly.
- source_word: הָאֲרָרִי
  chosen: the Ararite
  alternatives:
  - the Hararite
  lexicon: HALOT
  rationale: The consonantal form here points to 'Ararite' rather than 'Hararite.'
    It is best preserved as a gentilicial designation. Because the similar form in
    the previous phrase may invite harmonization, the distinct spelling is maintained
    in translation rather than flattened.
