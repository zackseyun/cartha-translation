id: 2SA.23.37
reference: 2 Samuel 23:37
source:
  edition: WLC
  text: צֶ֖לֶק הָ/עַמֹּנִ֑י נַחְרַי֙ הַ/בְּאֵ֣רֹתִ֔י נשאי כְּלֵ֖י יוֹאָ֥ב בֶּן צְרֻיָֽהס־׃ס
translation:
  text: Zelek the Ammonite, Naharai the Beerothite, armor-bearer of Joab son of Zeruiah;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Naharai is spelled Nahrai in some English transliterations.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶלֶק
  chosen: Zelek
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the philosophy of transliterating names.
- source_word: הָעַמֹּנִי
  chosen: the Ammonite
  alternatives:
  - the Ammonian
  lexicon: HALOT
  rationale: Gentilic adjective identifying Zelek by ethnic/national origin. 'Ammonite'
    is the standard and natural English rendering.
- source_word: נַחְרַי
  chosen: Naharai
  alternatives:
  - Nahrai
  rationale: Proper personal name. Vocalization supports the common English form 'Naharai';
    alternate shorter transliteration exists and is worth preserving in a footnote
    because English versions vary.
- source_word: הַבְּאֵרֹתִי
  chosen: the Beerothite
  alternatives:
  - the man from Beeroth
  lexicon: HALOT
  rationale: Gentilic from Beeroth. 'Beerothite' preserves the concise ethnic/geographic
    label used in the Hebrew list format.
- source_word: נשאי
  chosen: armor-bearer
  alternatives:
  - weapon-bearer
  - one who carried the weapons of
  lexicon: HALOT
  rationale: Qal participle of נשׂא, 'carrying/bearing,' with כְּלֵי 'weapons/gear,
    implements.' In military context, the idiomatic sense is 'armor-bearer,' a recognized
    role, not merely someone carrying miscellaneous objects.
- source_word: כְּלֵי
  chosen: armor
  alternatives:
  - weapons
  - equipment
  lexicon: HALOT
  rationale: Although the noun broadly means 'articles, vessels, implements, weapons,'
    in the collocation with נשׂא and a military leader it refers to martial gear.
    'Armor' yields the established English expression 'armor-bearer.'
- source_word: יוֹאָב בֶּן צְרֻיָה
  chosen: Joab son of Zeruiah
  alternatives:
  - Joab, the son of Zeruiah
  rationale: Straightforward patronymic/matronymic identification. Retained in full
    to match the Hebrew and preserve the formal list style.
