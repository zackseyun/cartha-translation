id: 2SA.23.4
reference: 2 Samuel 23:4
source:
  edition: WLC
  text: וּ/כְ/א֥וֹר בֹּ֖קֶר יִזְרַח שָׁ֑מֶשׁ בֹּ֚קֶר לֹ֣א עָב֔וֹת מִ/נֹּ֥גַהּ מִ/מָּטָ֖ר
    דֶּ֥שֶׁא מֵ/אָֽרֶץ־׃
translation:
  text: he is like the light of morning when the sun rises, a morning without clouds;
    from brightness after rain, fresh grass from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and like the light of morning.' The Hebrew line is
      elliptical and continues the description of the ruler in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from brightness, from rain, grass from the earth'—a compressed poetic
      image of new growth appearing after rain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְאוֹר
  chosen: he is like the light
  alternatives:
  - and like the light
  - like the light
  lexicon: HALOT
  rationale: The prefixed conjunction with comparative כ introduces a simile continuing
    from the previous verse's description of the just ruler. English supplies 'he
    is' for clarity because the Hebrew is verbless here and depends on the prior context.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - dawn
  - daybreak
  lexicon: HALOT
  rationale: Standard rendering for בֹּקֶר. 'Morning' fits both occurrences and preserves
    the poetic parallelism.
- source_word: יִזְרַח שָׁמֶשׁ
  chosen: when the sun rises
  alternatives:
  - the sun shines forth
  - the sun dawns
  lexicon: HALOT
  rationale: יזרח denotes shining/rising. 'When the sun rises' is idiomatic modern
    English and captures the temporal-poetic sense.
- source_word: בֹּקֶר לֹא עָבוֹת
  chosen: a morning without clouds
  alternatives:
  - a cloudless morning
  - morning, no clouds
  lexicon: HALOT
  rationale: עָבוֹת refers to clouds/cloud-mass. 'A morning without clouds' preserves
    the Hebrew image with natural English syntax.
- source_word: מִנֹּגַהּ
  chosen: from brightness
  alternatives:
  - from shining
  - from brightness of
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness/radiance. The prefixed מִן is retained as 'from,'
    though the exact relation in the poetic line is compressed.
- source_word: מִמָּטָר
  chosen: after rain
  alternatives:
  - from rain
  - because of rain
  lexicon: HALOT
  rationale: Although literally 'from rain,' in English the image is best expressed
    as what appears after rainfall. This reflects the likely sense of emergence following
    rain rather than strict source origin.
- source_word: דֶּשֶׁא
  chosen: fresh grass
  alternatives:
  - tender grass
  - green growth
  - verdure
  lexicon: HALOT
  rationale: דֶּשֶׁא denotes fresh green grass/sprouting vegetation. 'Fresh grass'
    is accessible and vivid without sounding archaic.
- source_word: מֵאָרֶץ
  chosen: from the earth
  alternatives:
  - from the ground
  - out of the earth
  lexicon: HALOT
  rationale: אָרֶץ here refers to the ground/earth from which the grass springs. 'From
    the earth' keeps the poetic resonance.
