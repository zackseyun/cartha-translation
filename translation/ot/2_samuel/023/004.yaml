theological_decisions:
- issue: Implicit subject of the simile
  chosen_reading: The verse continues the description of the ruler from v. 3, rendered
    with an explicit English subject 'he is.'
  alternative_readings:
  - 'Leave the line as an impersonal fragment: ''And like the light of morning...'''
  rationale: The Hebrew poetry is elliptical, but the immediate context identifies
    the referent as the righteous ruler. Supplying the subject in English clarifies
    the sense without adding new theological content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relation of the final colon
  chosen_reading: 'The line depicts the effect of brightness after rain: fresh grass
    springing from the earth.'
  alternative_readings:
  - '''By clear shining after rain'' (traditional KJV-like construal)'
  - '''From brightness, from rain, grass from the earth'''
  rationale: The Hebrew prepositions are compressed and poetic. Rendering the image
    as post-rain brightness producing fresh grass best communicates the natural picture
    in readable English while staying close to the source.
  doctrine_reference: Translation philosophy §6
