id: 2SA.23.18
reference: 2 Samuel 23:18
source:
  edition: WLC
  text: וַ/אֲבִישַׁ֞י אֲחִ֣י יוֹאָ֣ב בֶּן צְרוּיָ֗ה ה֚וּא רֹ֣אשׁ ה/שלשי וְ/הוּא֙ עוֹרֵ֣ר
    אֶת חֲנִית֔/וֹ עַל שְׁלֹ֥שׁ מֵא֖וֹת חָלָ֑ל וְ/ל/וֹ שֵׁ֖ם בַּ/שְּׁלֹשָֽׁה׀־־־־׃
translation:
  text: Now Abishai, the brother of Joab son of Zeruiah, was chief of the Three. He
    wielded his spear against three hundred slain, and he had a name among the Three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''chief of the Three.'' Some interpreters, influenced by the parallel
      in 1 Chronicles 11:20 and textual uncertainty in this section, understand the
      group as ''the Thirty'' instead.'
    reason: textual_variant
  - marker: b
    text: 'Or ''raised/brandished his spear against three hundred and killed them.''
      The Hebrew is terse: literally, ''awakened/raised his spear against three hundred
      slain.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ הַשְּׁלֹשִׁי
  chosen: chief of the Three
  alternatives:
  - head of the Three
  - chief of the thirty
  lexicon: HALOT
  rationale: רֹאשׁ means 'head/chief.' The following term is textually and lexically
    difficult in this chapter because parallel passages and ancient versions vary
    between 'three' and 'thirty.' Given the MT form here and the immediate phrase
    בַּשְּׁלֹשָׁה later in the verse, 'the Three' is retained in the main text. The
    alternative connected to 'the thirty' is preserved in a footnote as a textual/interpretive
    possibility.
- source_word: עוֹרֵר אֶת־חֲנִיתוֹ
  chosen: wielded his spear
  alternatives:
  - raised his spear
  - brandished his spear
  lexicon: HALOT
  rationale: The verb עורר literally means 'to rouse/stir up/raise.' In this military
    context with spear as object, idiomatic English 'wielded his spear' communicates
    active martial use without over-paraphrasing.
- source_word: עַל שְׁלֹשׁ מֵאוֹת חָלָל
  chosen: against three hundred slain
  alternatives:
  - against three hundred men, slain
  - over three hundred slain
  - and killed three hundred
  lexicon: HALOT
  rationale: חָלָל denotes one pierced/slain. The Hebrew phrase is compressed; it
    does not explicitly repeat a finite verb 'killed,' though that is implied by context.
    'Against three hundred slain' preserves the terseness and avoids adding more than
    the text states.
- source_word: וְלוֹ שֵׁם
  chosen: and he had a name
  alternatives:
  - and he was renowned
  - and he had renown
  lexicon: HALOT
  rationale: The idiom literally says 'and to him [was] a name,' meaning reputation
    or renown. 'He had a name' preserves the Hebrew idiom in readable English.
- source_word: בַּשְּׁלֹשָׁה
  chosen: among the Three
  alternatives:
  - among the three warriors
  - among the thirty
  lexicon: HALOT
  rationale: The preposition ב plus numeral here is best rendered relationally as
    'among.' Because the verse distinguishes Abishai's status relative to an elite
    group, 'among the Three' fits the immediate wording and the surrounding catalog
    structure.
- source_word: אֲבִישַׁי ... יוֹאָב ... צְרוּיָה
  chosen: Abishai ... Joab ... Zeruiah
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
