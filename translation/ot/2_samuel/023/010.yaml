id: 2SA.23.10
reference: 2 Samuel 23:10
source:
  edition: WLC
  text: ה֣וּא קָם֩ וַ/יַּ֨ךְ בַּ/פְּלִשְׁתִּ֜ים עַ֣ד כִּֽי יָגְעָ֣ה יָד֗/וֹ וַ/תִּדְבַּ֤ק יָד/וֹ֙ אֶל הַ/חֶ֔רֶב וַ/יַּ֧עַשׂ יְהוָ֛ה תְּשׁוּעָ֥ה גְדוֹלָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וְ/הָ/עָ֛ם יָשֻׁ֥בוּ אַחֲרָ֖י/ו אַךְ לְ/פַשֵּֽׁט׀־־־׃ס
translation:
  text: He rose and struck down the Philistines until his hand grew weary and his hand clung to the sword. And Yahweh brought about a great victory on that day, and the people returned after him only to strip the slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great deliverance' or 'a great salvation.' The Hebrew term can denote rescue broadly; here it refers to the LORD's decisive deliverance in battle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'only to strip,' that is, to strip the fallen of weapons and spoil after the battle.
    reason: cultural_note
lexical_decisions:
- source_word: קָם
  chosen: rose
  alternatives:
  - stood up
  - arose
  lexicon: HALOT
  rationale: Qal of קום here marks decisive action in battle narrative. 'Rose' is concise and idiomatic in English, preserving the sense of taking action without overinterpreting.
- source_word: וַיַּךְ בַּפְּלִשְׁתִּים
  chosen: struck down the Philistines
  alternatives:
  - struck the Philistines
  - attacked the Philistines
  lexicon: HALOT
  rationale: נכה in military context commonly denotes striking in battle, often lethally. 'Struck down' brings out the combat force better than the flatter 'struck' while avoiding paraphrase.
- source_word: עַד כִּי יָגְעָה יָדוֹ
  chosen: until his hand grew weary
  alternatives:
  - until his hand was weary
  - until his hand became tired
  lexicon: HALOT
  rationale: יגע denotes weariness/exhaustion. 'Grew weary' is natural English and reflects the inceptive/resultative sense of the clause.
- source_word: וַתִּדְבַּק יָדוֹ אֶל הַחֶרֶב
  chosen: his hand clung to the sword
  alternatives:
  - his hand stuck to the sword
  - his hand held fast to the sword
  lexicon: HALOT
  rationale: דבק means cling, stick, adhere. 'Clung' preserves the vividness of the Hebrew and allows either literal cramping or hyperbolic battle description without forcing a medical explanation.
- source_word: וַיַּעַשׂ יְהוָה
  chosen: the LORD brought about
  alternatives:
  - the LORD worked
  - the LORD accomplished
  - the LORD made
  lexicon: HALOT
  rationale: עשה with an abstract object like תְּשׁוּעָה is idiomatically rendered in English as 'brought about' or 'accomplished.' This avoids wooden English ('made a salvation') while preserving divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תְּשׁוּעָה גְדוֹלָה
  chosen: a great victory
  alternatives:
  - a great salvation
  - a great deliverance
  lexicon: HALOT
  rationale: תְּשׁוּעָה can mean salvation/deliverance/victory. In immediate battle context, 'victory' best communicates the concrete military outcome while retaining the sense that it came from the LORD.
- source_word: וְהָעָם יָשֻׁבוּ אַחֲרָיו
  chosen: the people returned after him
  alternatives:
  - the troops returned behind him
  - the people came back after him
  lexicon: HALOT
  rationale: The clause indicates that the people rejoined him after the decisive action. 'Returned after him' is slightly formal but preserves the Hebrew sequence and avoids adding military detail not explicit in the text.
- source_word: אַךְ לְפַשֵּׁט
  chosen: only to strip the slain
  alternatives:
  - only to plunder
  - only to strip the dead
  lexicon: HALOT
  rationale: פשט in this context refers to stripping the fallen of armor and goods after battle. 'Strip the slain' is idiomatic, specific to battlefield spoil-taking, and explains the force of אַךְ ('only').
