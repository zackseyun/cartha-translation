id: 2SA.23.26
reference: 2 Samuel 23:26
source:
  edition: WLC
  text: חֶ֚לֶץ הַ/פַּלְטִ֔י עִירָ֥א בֶן עִקֵּ֖שׁ הַ/תְּקוֹעִֽי־׃ס
translation:
  text: Helez the Paltite, Ira son of Ikkesh the Tekoite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Pelonite' in some translation traditions; the Hebrew here
      most naturally reads 'the Paltite.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֶלֶץ
  chosen: Helez
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the policy to transliterate names.
- source_word: הַפַּלְטִי
  chosen: the Paltite
  alternatives:
  - the Pelonite
  lexicon: HALOT
  rationale: Gentilic with article, denoting clan or place association. 'Paltite'
    is the straightforward rendering of the Hebrew form here. An alternative tradition
    reflected elsewhere is 'Pelonite,' but this verse's consonantal text supports
    'Paltite.'
- source_word: עִירָא
  chosen: Ira
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Standard filial marker in genealogical identification; 'son of' is the
    natural formal rendering in English.
- source_word: עִקֵּשׁ
  chosen: Ikkesh
  lexicon: HALOT
  rationale: Proper personal name; transliterated. Doubling of the k sound is preserved
    in the conventional English form 'Ikkesh.'
- source_word: הַתְּקוֹעִי
  chosen: the Tekoite
  alternatives:
  - from Tekoa
  lexicon: HALOT
  rationale: Gentilic with article indicating origin from Tekoa. 'The Tekoite' preserves
    the concise Hebrew adjectival form better than the more expansive 'from Tekoa,'
    though both are possible.
