id: 2SA.23.31
reference: 2 Samuel 23:31
source:
  edition: WLC
  text: אֲבִֽי עַלְבוֹן֙ הָֽ/עַרְבָתִ֔י עַזְמָ֖וֶת הַ/בַּרְחֻמִֽי־׃ס
translation:
  text: Abi-albon the Arbathite, Azmaveth the Barhumite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Abialbon' as a single unhyphenated name.
    reason: lexical_alternative
  - marker: b
    text: '''Barhumite'' follows the Masoretic Text; some relate the designation to
      Bahurim and render ''Baharumite.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבִי עַלְבוֹן
  chosen: Abi-albon
  alternatives:
  - Abialbon
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. The maqqeph-linked form is represented with a hyphen for readability,
    though a closed form ('Abialbon') is also possible in English transliteration.
- source_word: הָעַרְבָתִי
  chosen: the Arbathite
  alternatives:
  - the Arabahite
  lexicon: HALOT
  rationale: Gentilic with article, indicating a man from Arbath/Arabah. 'Arbathite'
    preserves the likely place-based ethnic designation in a conventional English
    form. 'Arabahite' is possible if connected more directly to the Arabah region,
    but the gentilic here is best left as a transliterated designation.
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  alternatives:
  - Azmavet
  rationale: Proper personal name; transliterated by standard convention. The final
    tav is commonly represented as 'th' in established English biblical transliteration.
- source_word: הַבַּרְחֻמִי
  chosen: the Barhumite
  alternatives:
  - the Baharumite
  - the Barhumite man
  lexicon: HALOT
  rationale: Gentilic with article, most naturally rendered as a place-based designation.
    'Barhumite' follows the consonantal form of the MT. Some connect the term with
    Bahurim and thus render 'Baharumite,' but the MT pointing supports 'Barhumite'
    as the direct transliteration of the received text.
