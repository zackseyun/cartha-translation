id: 2SA.23.16
reference: 2 Samuel 23:16
source:
  edition: WLC
  text: וַ/יִּבְקְעוּ֩ שְׁלֹ֨שֶׁת הַ/גִּבֹּרִ֜ים בְּ/מַחֲנֵ֣ה פְלִשְׁתִּ֗ים וַ/יִּֽשְׁאֲבוּ
    מַ֨יִם֙ מִ/בֹּ֤אר בֵּֽית לֶ֨חֶם֙ אֲשֶׁ֣ר בַּ/שַּׁ֔עַר וַ/יִּשְׂא֖וּ וַ/יָּבִ֣אוּ
    אֶל דָּוִ֑ד וְ/לֹ֤א אָבָה֙ לִ/שְׁתּוֹתָ֔/ם וַ/יַּסֵּ֥ךְ אֹתָ֖/ם לַֽ/יהוָֽה־־־׃
translation:
  text: Then the three mighty men broke through the camp of the Philistines and drew
    water from the well of Bethlehem that was by the gate, and carried it and brought
    it to David. But he was not willing to drink it; instead, he poured it out to
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he poured them out'; the Hebrew uses a plural suffix, likely referring
      to the water idiomatically as 'waters.'
    reason: lexical_alternative
  - marker: b
    text: That is, he poured it out as an offering to the LORD, with libation-like
      force.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבְקְעוּ
  chosen: broke through
  alternatives:
  - broke into
  - forced their way through
  lexicon: HALOT
  rationale: The verb conveys breaching or breaking through an opposing position.
    'Broke through' fits the military context of penetrating the Philistine camp better
    than the more neutral 'went through.'
- source_word: שְׁלֹשֶׁת הַגִּבֹּרִים
  chosen: the three mighty men
  alternatives:
  - the three warriors
  - the three heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים in David's narratives is a recognized designation for his
    elite fighters. 'Mighty men' preserves the established sense and the likely quasi-technical
    force of the term.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  chosen: the camp of the Philistines
  alternatives:
  - the Philistine camp
  lexicon: HALOT
  rationale: The phrase denotes the military encampment belonging to the Philistines.
    'Camp of the Philistines' is slightly more formal but clear and close to the Hebrew
    construction.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  chosen: drew water
  alternatives:
  - dipped up water
  - fetched water
  lexicon: HALOT
  rationale: The verb commonly means to draw water from a well. 'Drew water' is idiomatic
    English and preserves the concrete action.
- source_word: מִבֹּאר בֵּית לֶחֶם אֲשֶׁר בַּשַּׁעַר
  chosen: from the well of Bethlehem that was by the gate
  alternatives:
  - from the well at Bethlehem that was at the gate
  - from Bethlehem's well by the gate
  lexicon: HALOT
  rationale: The Hebrew identifies a specific well associated with Bethlehem and located
    at or by the gate. 'By the gate' is natural English and adequately reflects בַּשַּׁעַר
    in this locative sense.
- source_word: וַיִּשְׂאוּ
  chosen: carried it
  alternatives:
  - lifted it
  - took it
  lexicon: HALOT
  rationale: After drawing the water, they bore it away to David. 'Carried it' makes
    explicit the implied object in smooth English.
- source_word: וַיָּבִאוּ אֶל דָּוִד
  chosen: brought it to David
  alternatives:
  - brought it back to David
  lexicon: HALOT
  rationale: The verb means to bring. 'Brought it to David' is straightforward; 'back'
    is implied by context but not explicit in the Hebrew, so it is omitted.
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  chosen: he was not willing to drink it
  alternatives:
  - he would not drink it
  - he refused to drink it
  lexicon: HALOT
  rationale: אָבָה expresses willingness or consent. 'He was not willing to drink
    it' preserves the nuance of volition rather than a bare statement of refusal.
    The Hebrew suffix is plural ('them'), likely referring to the waters idiomatically;
    English naturally uses singular 'it' for the collected water.
- source_word: וַיַּסֵּךְ אֹתָם
  chosen: he poured it out
  alternatives:
  - he poured them out
  - he offered it as a libation
  lexicon: HALOT
  rationale: נסך here refers to pouring out liquid in a ritual act. The base translation
    keeps the concrete action in the main text; the cultic nuance is important and
    preserved by the following phrase 'to the LORD' and noted in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
