theological_decisions:
- issue: Nature of David's act in pouring out the water
  chosen_reading: A literal pouring out to the LORD with sacrificial/libation overtones
  alternative_readings:
  - A purely symbolic rejection of drinking without cultic significance
  rationale: The verb נסך regularly carries ritual associations of pouring out an
    offering. In this narrative, David's refusal to drink and his pouring the water
    out 'to the LORD' strongly suggest dedicatory or libation-like significance. The
    main text preserves the concrete action without over-specifying the ritual category,
    while a footnote can note the offering nuance.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
