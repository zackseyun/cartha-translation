id: 2SA.23.6
reference: 2 Samuel 23:6
source:
  edition: WLC
  text: וּ/בְלִיַּ֕עַל כְּ/ק֥וֹץ מֻנָ֖ד כֻּלָּ֑/הַם כִּֽי לֹ֥א בְ/יָ֖ד יִקָּֽחוּ־׃
translation:
  text: But worthless men are all like thorns cast aside, for they cannot be taken
    in the hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew beliyya‘al here likely means 'worthless' or 'wicked' people, not
      the later proper name 'Belial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְלִיַּעַל
  chosen: worthless men
  alternatives:
  - the worthless
  - sons of worthlessness
  - Belial
  lexicon: HALOT
  rationale: In this context the noun denotes wicked/worthless people rather than
    a proper name. English supplies 'men' to make the plural personal reference clear
    from the following plural verb and pronoun. 'Belial' would be overly transliterative
    here and could misleadingly suggest the later personified figure.
- source_word: כְּקוֹץ
  chosen: like thorns
  alternatives:
  - like a thorn
  - as thornbushes
  lexicon: HALOT
  rationale: Though singular in form, the comparison is collective and matches the
    plural referent; 'like thorns' is natural English and preserves the simile.
- source_word: מֻנָד
  chosen: cast aside
  alternatives:
  - driven away
  - to be avoided
  - banished
  lexicon: HALOT
  rationale: The passive participle conveys something repelled or thrust away. 'Cast
    aside' fits the thorn image and the following explanation that they are not handled
    directly.
- source_word: כֻּלָּהֶם
  chosen: all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Retains the distributive force while keeping the line readable in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the comparison in the second colon.
- source_word: לֹא בְיָד יִקָּחוּ
  chosen: they cannot be taken in the hand
  alternatives:
  - they are not taken with the hand
  - one does not take them by hand
  lexicon: HALOT
  rationale: 'The Niphal/imperfect expresses what is not done to such thorns: they
    are not grasped by hand. ''Cannot be taken in the hand'' communicates practical
    impossibility in context without over-paraphrasing.'
