id: 2SA.23.21
reference: 2 Samuel 23:21
source:
  edition: WLC
  text: וְ/הוּא הִכָּה֩ אֶת אִ֨ישׁ מִצְרִ֜י אשר מַרְאֶ֗ה וּ/בְ/יַ֤ד הַ/מִּצְרִי֙ חֲנִ֔ית
    וַ/יֵּ֥רֶד אֵלָ֖י/ו בַּ/שָּׁ֑בֶט וַ/יִּגְזֹ֤ל אֶֽת הַ/חֲנִית֙ מִ/יַּ֣ד הַ/מִּצְרִ֔י
    וַ/יַּהַרְגֵ֖/הוּ בַּ/חֲנִיתֽ/וֹ־־־׃
translation:
  text: He also struck down an Egyptian, a man of impressive appearance. The Egyptian
    had a spear in his hand, but he went down to him with a staff, snatched the spear
    from the Egyptian’s hand, and killed him with his own spear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a handsome man' or 'a man of notable appearance.' The Hebrew phrase
      refers broadly to the Egyptian's appearance; some interpreters, influenced by
      the parallel in 1 Chronicles 11:23, understand it to imply unusual stature.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a club' or 'with a rod.' The Hebrew שֵׁבֶט can denote a staff,
      rod, scepter, or club depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - struck
  - smote
  - killed
  lexicon: HALOT
  rationale: The verb נכה often means 'strike' or 'strike down.' In this martial context,
    and since the verse later explicitly says he killed him, 'struck down' fits the
    heroic summary without collapsing the later narrative detail into the first clause.
- source_word: אִישׁ מִצְרִי
  chosen: an Egyptian
  alternatives:
  - an Egyptian man
  - a man, an Egyptian
  lexicon: HALOT
  rationale: English idiom prefers the ethnic designation directly. 'An Egyptian'
    fully conveys the sense of the Hebrew phrase.
- source_word: אשר מַרְאֶה
  chosen: a man of impressive appearance
  alternatives:
  - a handsome man
  - a man of appearance
  - a man of great stature
  lexicon: HALOT
  rationale: The phrase is somewhat elliptical. מַרְאֶה relates to appearance or outward
    look. 'Impressive appearance' preserves the focus on visible form without overcommitting
    to beauty or height alone. 'Great stature' is possible by contextual comparison
    with the parallel in 1 Chronicles 11:23, but the Samuel text itself speaks more
    generally of appearance.
- source_word: וּבְיַד הַמִּצְרִי חֲנִית
  chosen: The Egyptian had a spear in his hand
  alternatives:
  - and in the Egyptian's hand was a spear
  - with a spear in the Egyptian's hand
  lexicon: HALOT
  rationale: This is a natural English rendering of the possession construction while
    preserving the concrete image.
- source_word: וַיֵּרֶד אֵלָיו
  chosen: he went down to him
  alternatives:
  - he came down against him
  - he advanced toward him
  lexicon: HALOT
  rationale: ירד literally means 'go down.' The idiom can imply descending or moving
    against someone. 'Went down to him' keeps the literal motion while remaining readable.
- source_word: בַּשָּׁבֶט
  chosen: with a staff
  alternatives:
  - with the staff
  - with a club
  - with a rod
  lexicon: HALOT
  rationale: שֵׁבֶט can mean staff, rod, scepter, or club depending on context. Here
    it is a handheld weapon or stick used against a spear-bearing opponent. 'Staff'
    is the broadest and most literal choice; 'club' is interpretive and stronger than
    the text requires.
- source_word: וַיִּגְזֹל
  chosen: snatched
  alternatives:
  - seized
  - took away
  - plundered
  lexicon: HALOT
  rationale: גזל often carries the sense of taking by force. 'Snatched' captures the
    sudden, forceful action in combat better than the more general 'took'.
- source_word: וַיַּהַרְגֵהוּ
  chosen: killed him
  alternatives:
  - slew him
  - put him to death
  lexicon: HALOT
  rationale: הרג is the standard verb for killing. 'Killed him' is clear, direct,
    and modern.
- source_word: בַּחֲנִיתוֹ
  chosen: with his own spear
  alternatives:
  - with the spear
  - with his spear
  lexicon: HALOT
  rationale: The suffix most naturally refers to the Egyptian, since the spear has
    just been taken from him. 'His own spear' makes the referent explicit in English
    and highlights the reversal in the action.
- source_word: וְהוּא
  chosen: He also
  alternatives:
  - And he
  - He
  lexicon: HALOT
  rationale: The pronoun with conjunction continues the list of exploits. 'He also'
    conveys the additive force naturally in English narrative.
