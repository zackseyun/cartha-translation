theological_decisions:
- issue: Sense of the opening clause כִּי לֹא כֵן בֵּיתִי עִם אֵל
  chosen_reading: Rendered straightforwardly as 'For my house is not so with God,'
    preserving the Hebrew wording without harmonizing away the difficulty.
  alternative_readings:
  - For is not my house so with God?
  - Surely my house is so with God
  rationale: The Hebrew text is famously difficult, and some translations construe
    the clause as a positive rhetorical question to align more smoothly with the covenant
    affirmations that follow. The consonantal text as pointed reads negatively ('not
    so'), and optimal equivalence favors preserving that reading in the main text
    rather than emending by interpretation. Because the positive construal is significant
    and longstanding, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of the final verb יַצְמִיחַ
  chosen_reading: Understood as God causing David's salvation/desire, embodied in
    the covenant, to grow or come to fruition.
  alternative_readings:
  - God will not make it grow
  - He will surely make all salvation and desire sprout
  rationale: The final clause is syntactically compressed and debated. In context,
    a positive rhetorical reading coheres with the everlasting covenant language and
    avoids making the verse end in contradiction to its own affirmation. The object
    is left as 'it' in English to preserve some of the Hebrew compactness and ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
