id: 2SA.23.5
reference: 2 Samuel 23:5
source:
  edition: WLC
  text: כִּֽי לֹא כֵ֥ן בֵּיתִ֖/י עִם אֵ֑ל כִּי֩ בְרִ֨ית עוֹלָ֜ם שָׂ֣ם לִ֗/י עֲרוּכָ֤ה
    בַ/כֹּל֙ וּ/שְׁמֻרָ֔ה כִּֽי כָל יִשְׁעִ֥/י וְ/כָל חֵ֖פֶץ כִּֽי לֹ֥א יַצְמִֽיחַ־־־־־־־׃
translation:
  text: For my house is not so with God; yet he has made with me an everlasting covenant,
    ordered in every way and kept secure. For this is all my salvation and all my
    desire—will he not indeed make it grow?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Is not my house so with God?' Many understand the opening as a positive
      rhetorical question rather than a negative statement.
    reason: alternative_reading
  - marker: b
    text: Or, 'for he will surely cause it to sprout / flourish.' The final clause
      is difficult in Hebrew and may be read as either a rhetorical question or a
      strong affirmation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - surely
  - indeed
  - because
  lexicon: HALOT
  rationale: 'The verse uses כִּי repeatedly with different discourse functions. At
    the opening it is best taken as explanatory, linking this line to the preceding
    oracle: ''For.'''
- source_word: לֹא כֵן
  chosen: is not so
  alternatives:
  - is not thus
  - is not right
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and the tension
    of the clause without overinterpreting what 'so' specifically refers to.
- source_word: בֵּיתִי
  chosen: my house
  alternatives:
  - my household
  - my dynasty
  lexicon: HALOT
  rationale: '''House'' is retained in the main text because it can naturally carry
    both household and dynastic senses in covenantal contexts. The dynastic nuance
    is important but should not displace the literal term.'
- source_word: עִם אֵל
  chosen: with God
  alternatives:
  - before God
  - in relation to God
  lexicon: HALOT
  rationale: עִם most naturally means 'with.' This keeps the relational force without
    importing a more interpretive phrase.
- source_word: בְרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  lexicon: HALOT
  rationale: Standard covenantal phrasing in English; 'everlasting' fits biblical
    style and preserves the enduring force of עוֹלָם.
- source_word: שָׂם לִי
  chosen: he has made with me
  alternatives:
  - he has set for me
  - he has established for me
  lexicon: HALOT
  rationale: Although שׂוּם is literally 'set/place,' in covenant context English
    idiom is better served by 'made with me,' which communicates the covenant-establishing
    action clearly.
- source_word: עֲרוּכָה
  chosen: ordered
  alternatives:
  - arranged
  - set in order
  lexicon: HALOT
  rationale: The participial/adjectival sense points to something properly arranged
    or ordered. 'Ordered' is concise and idiomatic in covenant description.
- source_word: בַכֹּל
  chosen: in every way
  alternatives:
  - in all things
  - in everything
  lexicon: HALOT
  rationale: This phrase modifies the covenant's ordered character comprehensively.
    'In every way' is natural modern English while preserving the totalizing sense.
- source_word: וּשְׁמֻרָה
  chosen: kept secure
  alternatives:
  - guarded
  - preserved
  - kept
  lexicon: HALOT
  rationale: The passive idea is that the covenant is safeguarded. 'Kept secure' makes
    the passive/resultative force clear in readable English.
- source_word: כָּל יִשְׁעִי
  chosen: all my salvation
  alternatives:
  - my whole salvation
  - all my deliverance
  lexicon: HALOT
  rationale: '''Salvation'' is the broadest and most theologically resonant rendering
    of יֵשַׁע here, while still allowing deliverance as a nuance.'
- source_word: וְכָל חֵפֶץ
  chosen: all my desire
  alternatives:
  - all my delight
  - all my good pleasure
  lexicon: HALOT
  rationale: חֵפֶץ can denote desire or delight. 'Desire' fits the parallelism with
    'salvation' and avoids sounding overly emotive.
- source_word: כִּי לֹא יַצְמִיחַ
  chosen: will he not indeed make it grow?
  alternatives:
  - for he will surely cause it to sprout
  - surely he will make it flourish
  - for will he not cause it to spring up?
  lexicon: HALOT
  rationale: The Hebrew clause is difficult and often understood rhetorically. Rendering
    it as a rhetorical question best fits the positive covenantal logic of the verse
    and the common interpretation that God will bring David's salvation/desire to
    fruition. 'Make it grow' captures the Hiphil causative of צמח in accessible English.
