id: 2SA.23.36
reference: 2 Samuel 23:36
source:
  edition: WLC
  text: יִגְאָ֤ל בֶּן נָתָן֙ מִ/צֹּבָ֔ה בָּנִ֖י הַ/גָּדִֽי־ס׃ס
translation:
  text: Igal son of Nathan from Zobah, Bani the Gadite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Zobah.' The Hebrew preposition can mark origin or association; 'from
      Zobah' was chosen as the more direct geographic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְאָל
  chosen: Igal
  alternatives:
  - Jigal
  rationale: Proper personal name; transliterated rather than translated, following
    the policy to transliterate names by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical marker in Hebrew lists. 'Son of' is the natural
    English rendering in this catalog context.
- source_word: נָתָן
  chosen: Nathan
  rationale: Proper personal name; standard English transliteration.
- source_word: מִצֹּבָה
  chosen: from Zobah
  alternatives:
  - of Zobah
  lexicon: HALOT
  rationale: The prefixed preposition מִן normally means 'from.' In a roster of warriors
    it identifies geographic origin. 'From Zobah' is slightly more transparent than
    'of Zobah,' though both are possible.
- source_word: בָּנִי
  chosen: Bani
  rationale: Proper personal name; transliterated directly.
- source_word: הַגָּדִי
  chosen: the Gadite
  alternatives:
  - from Gad
  - the man from Gad
  lexicon: HALOT
  rationale: Gentilic form meaning a member of Gad or from the region/tribe of Gad.
    'The Gadite' is the conventional and concise English rendering for a gentilicial
    designation in a military list.
