id: 2SA.23.17
reference: 2 Samuel 23:17
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר חָלִילָ/ה֩ לִּ֨/י יְהוָ֜ה מֵ/עֲשֹׂ֣תִ/י זֹ֗את הֲ/דַ֤ם הָֽ/אֲנָשִׁים֙ הַ/הֹלְכִ֣ים בְּ/נַפְשׁוֹתָ֔/ם וְ/לֹ֥א אָבָ֖ה לִ/שְׁתּוֹתָ֑/ם אֵ֣לֶּה עָשׂ֔וּ שְׁלֹ֖שֶׁת הַ/גִּבֹּרִֽים׃ס
translation:
  text: And he said, “Far be it from me, O Yahweh, that I should do this! Is it not the blood of the men who went at the risk of their lives?” So he was not willing to drink it. These things the three mighty men did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “with their lives”; the phrase means they went in mortal danger.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “Is this not the blood of the men...?” David treats the water as if it were their blood because they obtained it at the risk of death.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָלִילָה לִּי יְהוָה
  chosen: Far be it from me, O LORD
  alternatives:
  - Far be it from me before the LORD
  - The LORD forbid that I should
  lexicon: HALOT
  rationale: חָלִילָה is an idiomatic expression of abhorrence or strong refusal. Including 'O LORD' reflects the vocative force with יְהוָה. Avoided the traditional 'The LORD forbid' because the Hebrew more directly expresses David's personal repudiation before/in relation to the LORD rather than a jussive wish for divine prevention.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵעֲשֹׂתִי זֹאת
  chosen: that I should do this
  alternatives:
  - from doing this
  - that I would do this
  lexicon: HALOT
  rationale: The preposition מִן with infinitive after חָלִילָה expresses repudiation of performing the act. 'That I should do this' is idiomatic modern English and preserves the sense of moral refusal.
- source_word: הֲדַם
  chosen: Is it not the blood
  alternatives:
  - Should it be the blood
  - This is the blood
  lexicon: HALOT
  rationale: The prefixed interrogative הֲ is best represented as a rhetorical question. The sense is that drinking the water would be tantamount to drinking the blood of the men because of the mortal danger involved.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - these men
  - the warriors
  lexicon: HALOT
  rationale: Straightforward rendering of the noun; 'warriors' would import the military context into the noun itself, which is already supplied later by 'mighty men.'
- source_word: הַהֹלְכִים
  chosen: who went
  alternatives:
  - who were going
  - who went out
  lexicon: HALOT
  rationale: The participle functions substantivally/descriptively of the men. In English narrative style, a relative clause with simple past reads naturally and fits the completed action.
- source_word: בְּנַפְשׁוֹתָם
  chosen: at the risk of their lives
  alternatives:
  - with their lives in their hands
  - with their lives
  - at the cost of their lives
  lexicon: HALOT
  rationale: Literally 'with their lives/souls.' The idiom denotes mortal peril. 'At the risk of their lives' communicates the sense clearly in modern English without over-paraphrase.
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  chosen: So he was not willing to drink it
  alternatives:
  - and he would not drink it
  - and he refused to drink it
  lexicon: HALOT
  rationale: אָבָה conveys willingness/consent. 'Was not willing' is slightly more formally aligned to the Hebrew than 'refused,' while still natural. The pronominal suffix on 'to drink them/it' refers to the water; English idiom requires singular 'it.'
- source_word: אֵלֶּה עָשׂוּ
  chosen: These things ... did
  alternatives:
  - These men did this
  - Such were the deeds
  lexicon: HALOT
  rationale: The demonstrative likely points to the deed just narrated. 'These things ... did' preserves the emphatic summary structure, though smoothed in English as 'These things the three mighty men did.'
- source_word: שְׁלֹשֶׁת הַגִּבֹּרִים
  chosen: the three mighty men
  alternatives:
  - the three warriors
  - the Three
  lexicon: HALOT
  rationale: גִּבֹּרִים here refers to David's elite warriors. 'Mighty men' preserves the established sense and matches the narrative designation without unnecessary paraphrase.
