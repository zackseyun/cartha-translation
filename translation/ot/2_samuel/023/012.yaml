  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering תְּשׁוּעָה in a battle context
  chosen_reading: victory
  alternative_readings:
  - deliverance
  - salvation
  rationale: The verse attributes the outcome of battle to the LORD. 'Victory' best fits the immediate military context while still reflecting divine deliverance; the broader theological sense of salvation is not denied but is not the plainest contextual sense here.
