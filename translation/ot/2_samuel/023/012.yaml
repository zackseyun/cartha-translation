id: 2SA.23.12
reference: 2 Samuel 23:12
source:
  edition: WLC
  text: וַ/יִּתְיַצֵּ֤ב בְּ/תוֹךְ הַֽ/חֶלְקָה֙ וַ/יַּצִּילֶ֔/הָ וַ/יַּ֖ךְ אֶת פְּלִשְׁתִּ֑ים וַ/יַּ֥עַשׂ יְהוָ֖ה תְּשׁוּעָ֥ה גְדוֹלָֽה־־׃ס
translation:
  text: But he took his stand in the middle of the field and defended it, and struck down the Philistines; and Yahweh brought about a great victory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great deliverance' or 'a great salvation.' The Hebrew term can carry any of these senses; here it refers to the LORD's saving action in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצֵּב
  chosen: took his stand
  alternatives:
  - stationed himself
  - stood firm
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys deliberately taking one's position or standing firm. 'Took his stand' captures both the reflexive nuance and the martial context in natural English.
- source_word: בְּתוֹךְ הַחֶלְקָה
  chosen: in the middle of the field
  alternatives:
  - in the midst of the plot
  - within the parcel
  lexicon: HALOT
  rationale: חֶלְקָה can mean a plot or parcel of land, but 'field' is clearer in English narrative style and fits the battle setting. 'In the middle' renders בְּתוֹךְ idiomatically.
- source_word: וַיַּצִּילֶהָ
  chosen: defended it
  alternatives:
  - delivered it
  - rescued it
  - saved it
  lexicon: HALOT
  rationale: The verb נצל often means rescue or deliver. Here the feminine suffix refers to the field/plot, so 'defended it' best expresses rescuing the field from enemy seizure in context, rather than abstract salvation language.
- source_word: וַיַּךְ אֶת־פְּלִשְׁתִּים
  chosen: struck down the Philistines
  alternatives:
  - struck the Philistines
  - defeated the Philistines
  lexicon: HALOT
  rationale: נכה in battle contexts commonly means to strike down or defeat. 'Struck down' preserves the force of the Hebrew while remaining idiomatic.
- source_word: וַיַּעַשׂ יְהוָה
  chosen: the LORD brought about
  alternatives:
  - the LORD worked
  - the LORD accomplished
  - the LORD made
  lexicon: HALOT
  rationale: עשה with an abstract object like תְּשׁוּעָה is idiomatically rendered 'brought about' or 'accomplished.' This avoids wooden English while preserving divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תְּשׁוּעָה גְדוֹלָה
  chosen: a great victory
  alternatives:
  - a great salvation
  - a great deliverance
  lexicon: HALOT
  rationale: תְּשׁוּעָה can mean salvation, deliverance, or victory. In this military narrative, 'victory' best communicates the concrete sense of deliverance through battle.
