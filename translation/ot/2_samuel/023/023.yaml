id: 2SA.23.23
reference: 2 Samuel 23:23
source:
  edition: WLC
  text: מִן הַ/שְּׁלֹשִׁ֣ים נִכְבָּ֔ד וְ/אֶל הַ/שְּׁלֹשָׁ֖ה לֹא בָ֑א וַ/יְשִׂמֵ֥/הוּ
    דָוִ֖ד אֶל מִשְׁמַעְתּֽ/וֹ־־־־׃ס
translation:
  text: He was honored among the thirty, but he did not attain to the three; and David
    appointed him over his bodyguard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He was more honored than the thirty.' The Hebrew construction may be
      read comparatively rather than inclusively.
    reason: lexical_alternative
  - marker: b
    text: Or 'but he did not come up to the three,' that is, he did not attain the
      rank of the elite three warriors.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to his mishmaath'; this may mean 'to his command' or 'over his guard.'
      'Bodyguard' reflects the likely military sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשְּׁלֹשִׁים
  chosen: among the thirty
  alternatives:
  - more than the thirty
  - from the thirty
  lexicon: HALOT
  rationale: The preposition מִן with a comparative/honor context can indicate relation
    within a group or comparison. In this formulaic listing of David's warriors, 'among
    the thirty' fits the idiom and parallels the status statement that follows.
- source_word: נִכְבָּד
  chosen: was honored
  alternatives:
  - was more honored
  - was esteemed
  lexicon: HALOT
  rationale: The Niphal of כבד here denotes being honored or held in esteem. 'Was
    honored' is clear modern English and preserves the passive nuance. The comparative
    sense is possible in context but is better left implicit rather than over-translated.
- source_word: וְאֶל הַשְּׁלֹשָׁה לֹא בָא
  chosen: but he did not attain to the three
  alternatives:
  - but he did not come up to the three
  - but he did not rank with the three
  lexicon: HALOT
  rationale: בוא with אֶל in this honor-ranking context is idiomatic for reaching
    or attaining a status. 'Attain to' preserves the metaphor without sounding wooden.
    'The three' refers to the elite triad already established in the passage.
- source_word: וַיְשִׂמֵהוּ
  chosen: and David appointed him
  alternatives:
  - and David set him
  - and David placed him
  lexicon: HALOT
  rationale: שׂים commonly means set/place, but in administrative contexts it naturally
    means appoint. This best conveys David's action in idiomatic English.
- source_word: אֶל מִשְׁמַעְתּוֹ
  chosen: over his bodyguard
  alternatives:
  - to his command
  - over his hearing/obedience
  - over his guard
  lexicon: HALOT
  rationale: מִשְׁמַעַת can denote charge, command, or those under one's authority;
    in this military-court context it likely refers to a personal guard or command
    attached to David. 'Over his bodyguard' gives the most plausible contextual sense
    while remaining concise.
