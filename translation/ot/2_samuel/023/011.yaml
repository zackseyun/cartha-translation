id: 2SA.23.11
reference: 2 Samuel 23:11
source:
  edition: WLC
  text: וְ/אַחֲרָ֛י/ו שַׁמָּ֥א בֶן אָגֵ֖א הָרָרִ֑י וַ/יֵּאָסְפ֨וּ פְלִשְׁתִּ֜ים לַ/חַיָּ֗ה
    וַ/תְּהִי שָׁ֞ם חֶלְקַ֤ת הַ/שָּׂדֶה֙ מְלֵאָ֣ה עֲדָשִׁ֔ים וְ/הָ/עָ֥ם נָ֖ס מִ/פְּנֵ֥י
    פְלִשְׁתִּֽים־־׃
translation:
  text: After him was Shammah son of Agee the Hararite. The Philistines gathered for
    battle, and there was there a plot of the field full of lentils, and the people
    fled from before the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew לַחַיָּה is difficult. It may mean 'for battle,' while some take
      it more literally as 'into a troop' or similar military grouping. The main text
      adopts the contextual sense 'for battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  chosen: After him
  alternatives:
  - After him came
  - And after him
  lexicon: HALOT
  rationale: Sequential notice in the list of mighty men. 'After him' preserves the
    concise narrative linkage without adding a verb not present in the Hebrew.
- source_word: שַׁמָּא
  chosen: Shammah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶן אָגֵא
  chosen: son of Agee
  rationale: Standard filial construction; formal and clear in English.
- source_word: הָרָרִי
  chosen: the Hararite
  alternatives:
  - the hill-country man
  lexicon: HALOT
  rationale: Gentilic/title is best preserved by transliteration as a clan or regional
    designation rather than paraphrased.
- source_word: וַיֵּאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: Common sense of אסף in Niphal-like passive/reflexive gathering context;
    'gathered' is natural and sufficiently formal.
- source_word: לַחַיָּה
  chosen: for battle
  alternatives:
  - to the troop
  - into a company
  lexicon: HALOT
  rationale: The phrase is difficult, but in this military context and in light of
    the parallel in 1 Chronicles 11:13, the sense is that the Philistines assembled
    for combat. This avoids an opaque literalism while staying within the probable
    contextual meaning.
- source_word: חֶלְקַת הַשָּׂדֶה
  chosen: a plot of the field
  alternatives:
  - a portion of the field
  - a tract of land
  lexicon: HALOT
  rationale: חלקה denotes a parcel or plot. 'A plot of the field' keeps the concrete
    image and reflects the construct relation.
- source_word: מְלֵאָה עֲדָשִׁים
  chosen: full of lentils
  alternatives:
  - planted with lentils
  lexicon: HALOT
  rationale: The Hebrew literally describes the plot as 'full of lentils.' 'Planted
    with' is interpretive; the more direct wording is preferable.
- source_word: וְהָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: עם normally means 'people.' In context it likely refers to Israelite
    forces or populace present, but 'the people' preserves the Hebrew wording without
    over-specification.
- source_word: נָס מִפְּנֵי
  chosen: fled from before
  alternatives:
  - fled before
  - ran away from
  lexicon: HALOT
  rationale: This reproduces the idiom closely. 'From before' is slightly more formal
    but still understandable and preserves the Hebrew prepositional nuance.
