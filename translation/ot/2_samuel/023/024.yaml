id: 2SA.23.24
reference: 2 Samuel 23:24
source:
  edition: WLC
  text: עֲשָׂה אֵ֥ל אֲחִֽי יוֹאָ֖ב בַּ/שְּׁלֹשִׁ֑ים אֶלְחָנָ֥ן בֶּן דֹּד֖וֹ בֵּ֥ית
    לָֽחֶם־־־׃
translation:
  text: Asahel the brother of Joab was among the Thirty; Elhanan son of Dodo of Bethlehem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''son of Dodo''; the parallel in 1 Chronicles 11:26 reads ''Dodai.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עֲשָׂה אֵל
  chosen: Asahel
  alternatives:
  - Asael
  lexicon: HALOT
  rationale: Proper name conventionally transliterated as 'Asahel.' The split orthography
    in the consonantal text represents the known personal name עֲשָׂהאֵל.
- source_word: אֲחִי יוֹאָב
  chosen: the brother of Joab
  alternatives:
  - Joab's brother
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes familial relationship. 'The
    brother of Joab' preserves the Hebrew structure while remaining natural English.
- source_word: בַּשְּׁלֹשִׁים
  chosen: among the Thirty
  alternatives:
  - in the Thirty
  - one of the Thirty
  lexicon: HALOT
  rationale: The preposition ב with the definite numeral-group refers to membership
    in David's elite warriors. 'Among the Thirty' is idiomatic and preserves the sense
    of inclusion in the group.
- source_word: אֶלְחָנָן
  chosen: Elhanan
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן דֹּדֹו
  chosen: son of Dodo
  alternatives:
  - son of Dodai
  lexicon: HALOT
  rationale: The MT here reads דֹּדֹו, best represented as the personal name 'Dodo.'
    An alternative form appears in the parallel tradition (1 Chr 11:26), so the variant
    is worth preserving in a footnote rather than harmonizing the main text.
- source_word: בֵּית לָחֶם
  chosen: of Bethlehem
  alternatives:
  - the Bethlehemite
  lexicon: HALOT
  rationale: The place name is Bethlehem. In this appositional genealogical context,
    'of Bethlehem' is the most transparent rendering; 'the Bethlehemite' is possible
    but slightly more interpretive.
