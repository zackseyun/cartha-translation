id: 2SA.23.20
reference: 2 Samuel 23:20
source:
  edition: WLC
  text: וּ/בְנָיָ֨הוּ בֶן יְהוֹיָדָ֧ע בֶּן אִֽישׁ חי רַב פְּעָלִ֖ים מִֽ/קַּבְצְאֵ֑ל
    ה֣וּא הִכָּ֗ה אֵ֣ת שְׁנֵ֤י אֲרִאֵל֙ מוֹאָ֔ב וְ֠/הוּא יָרַ֞ד וְ/הִכָּ֧ה אֶֽת ה/אריה
    בְּ/ת֥וֹךְ הַ/בֹּ֖אר בְּ/י֥וֹם הַ/שָּֽׁלֶג־־־־־׃
translation:
  text: And Benaiah son of Jehoiada, son of a valiant man, great in deeds, from Kabzeel—he
    struck down the two ariels of Moab, and he went down and struck down the lion
    in the midst of the pit on a snowy day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֲרִאֵל ('ariel') is uncertain here. It may mean 'lion-like men,'
      'heroes,' or be a title/name; the main text preserves the form 'ariels' to avoid
      overstating one interpretation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חַי
  chosen: a valiant man
  alternatives:
  - a living man
  - a man of vigor
  - a mighty man
  lexicon: HALOT
  rationale: The phrase is idiomatic in context, describing Jehoiada (or his line)
    as a man of strength/valor rather than merely 'alive.' 'Valiant man' is natural
    English and fits the commendatory list of exploits.
- source_word: רַב פְּעָלִים
  chosen: great in deeds
  alternatives:
  - abounding in actions
  - of many exploits
  - great in accomplishments
  lexicon: HALOT
  rationale: The expression characterizes Benaiah as notable for impressive acts.
    'Great in deeds' preserves both the evaluative sense of רַב and the concrete sense
    of פְּעָלִים.
- source_word: מִקַּבְצְאֵל
  chosen: from Kabzeel
  alternatives:
  - of Kabzeel
  lexicon: HALOT
  rationale: The prefixed preposition מִן is most straightforwardly rendered 'from,'
    indicating place of origin.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - smote
  - killed
  - defeated
  lexicon: HALOT
  rationale: For נכה in martial narrative, 'struck down' is a clear modern rendering
    that preserves the violent action without over-specifying beyond the verb itself.
- source_word: שְׁנֵי אֲרִאֵל מוֹאָב
  chosen: the two ariels of Moab
  alternatives:
  - the two heroes of Moab
  - the two lion-like men of Moab
  - the two sons of Ariel of Moab
  lexicon: HALOT
  rationale: אֲרִאֵל is lexically difficult and debated. Rather than flattening the
    ambiguity into an interpretation, the main text preserves the Hebrew-derived term
    'ariels' with an explanatory footnote. This best satisfies transparency and audibility
    while avoiding unwarranted paraphrase.
- source_word: יָרַד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The common narrative verb is best rendered simply and idiomatically as
    'went down.'
- source_word: הָאֲרִי
  chosen: the lion
  lexicon: HALOT
  rationale: The noun plainly refers to a lion; the article is retained in English.
- source_word: בְּתוֹךְ הַבּוֹר
  chosen: in the midst of the pit
  alternatives:
  - inside the pit
  - in the cistern
  lexicon: HALOT
  rationale: בּוֹר can denote a pit or cistern. 'Pit' is the broadest and most natural
    here; 'in the midst of' reflects בְּתוֹךְ more fully than a bare 'in.'
- source_word: בְּיוֹם הַשָּׁלֶג
  chosen: on a snowy day
  alternatives:
  - on the day of snow
  - when snow had fallen
  lexicon: HALOT
  rationale: This idiomatic rendering communicates the temporal setting naturally
    in English while preserving the sense of a day marked by snow.
