id: 2SA.23.7
reference: 2 Samuel 23:7
source:
  edition: WLC
  text: וְ/אִישׁ֙ יִגַּ֣ע בָּ/הֶ֔ם יִמָּלֵ֥א בַרְזֶ֖ל וְ/עֵ֣ץ חֲנִ֑ית וּ/בָ/אֵ֕שׁ
    שָׂר֥וֹף יִשָּׂרְפ֖וּ בַּ/שָּֽׁבֶת׃פ
translation:
  text: And the man who touches them must arm himself with iron and the shaft of a
    spear, and they must be completely burned with fire in their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must equip himself with iron and a spear shaft'; literally, 'must be
      filled with iron and wood of a spear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they shall surely be burned with fire on the spot.' The Hebrew uses
      an infinitive absolute with the verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: The 'them' refers back to the thorn-like 'worthless men' in the previous
      verse.
    reason: cross_reference
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And the man
  alternatives:
  - And a man
  - But a man
  lexicon: HALOT
  rationale: 'אִישׁ is singular masculine, here generic: any individual dealing with
    the ''worthless men/thorns'' of the previous verse. ''The man'' works idiomatically
    in English for a generic case, while preserving the masculine singular form in
    line with the gender-accurate policy.'
- source_word: יִגַּע בָּהֶם
  chosen: who touches them
  alternatives:
  - who comes near them
  - who handles them
  lexicon: HALOT
  rationale: נגע commonly means 'touch, reach, strike.' In this context of dangerous
    thorns, 'touches them' is the plain sense and fits the warning imagery.
- source_word: יִמָּלֵא
  chosen: must arm himself
  alternatives:
  - must be filled with
  - must equip himself with
  lexicon: HALOT
  rationale: The Niphal of מלא literally means 'be filled,' but in this construction
    with instruments ('with iron and a spear-shaft') it idiomatically conveys being
    equipped or furnished. 'Must arm himself' captures the practical sense in natural
    English without over-paraphrasing.
- source_word: בַרְזֶל
  chosen: iron
  alternatives:
  - an iron tool
  lexicon: HALOT
  rationale: The noun is simply 'iron.' The context implies an iron implement, but
    the Hebrew leaves it general, so 'iron' is retained.
- source_word: וְעֵץ חֲנִית
  chosen: and the shaft of a spear
  alternatives:
  - and a spear shaft
  - and wood of a spear
  lexicon: HALOT
  rationale: Literally 'and wood of a spear.' This refers to the wooden shaft/handle
    of a spear rather than the spearhead. 'The shaft of a spear' is clear modern English
    and preserves the concrete imagery.
- source_word: וּבָאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  - by fire
  lexicon: HALOT
  rationale: The preposition ב here is instrumental or locative. 'With fire' best
    matches the means by which the thorns are destroyed.
- source_word: שָׂרוֹף יִשָּׂרְפוּ
  chosen: they must be completely burned
  alternatives:
  - they shall surely be burned
  - they are utterly burned
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Completely
    burned' conveys the emphatic force in contemporary English.
- source_word: בַּשָּׁבֶת
  chosen: in their place
  alternatives:
  - on the spot
  - where they are
  - in the dwelling
  lexicon: HALOT
  rationale: This rare form is commonly understood adverbially as 'in the place' or
    'on the spot' in context. Given the imagery of clearing dangerous thorns by burning
    them where they are, 'in their place' preserves the local sense without overcommitting
    to a more interpretive idiom.
