id: 2SA.23.19
reference: 2 Samuel 23:19
source:
  edition: WLC
  text: מִן הַ/שְּׁלֹשָׁה֙ הֲ/כִ֣י נִכְבָּ֔ד וַ/יְהִ֥י לָ/הֶ֖ם לְ/שָׂ֑ר וְ/עַד הַ/שְּׁלֹשָׁ֖ה
    לֹא בָֽא־־־׃ס
translation:
  text: Was he not more honored than the three? So he became their commander, but
    he did not attain to the three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Was he not honored among the three?' The Hebrew may be taken less comparatively,
      but the comparative sense ('more honored than the three') best fits the syntax
      and the parallel in the surrounding passage.
    reason: lexical_alternative
  - marker: b
    text: That is, he did not attain the rank or standing of 'the three,' the highest
      tier among David's mighty men.
    reason: cultural_note
lexical_decisions:
- source_word: מִן הַשְּׁלֹשָׁה
  chosen: than the three
  alternatives:
  - among the three
  - more than the three
  lexicon: HALOT
  rationale: The preposition מִן with a comparative sense after נִכְבָּד is best rendered
    'than,' yielding 'more honored than the three.' The phrase refers to comparison
    with a known group, not simple inclusion.
- source_word: הֲכִי
  chosen: Was he not
  alternatives:
  - indeed
  - surely
  lexicon: HALOT
  rationale: The interrogative particle with כי introduces a rhetorical question expecting
    an affirmative answer. English idiom is best captured by 'Was he not ... ?' rather
    than a wooden 'indeed' or 'surely.'
- source_word: נִכְבָּד
  chosen: more honored
  alternatives:
  - glorious
  - weighty
  - distinguished
  lexicon: HALOT
  rationale: From כבד in the Niphal/passive-adjectival sense, the term denotes being
    honored or held in high esteem. 'More honored' fits the comparative construction
    and the context of rank among warriors.
- source_word: וַיְהִי לָהֶם לְשָׂר
  chosen: So he became their commander
  alternatives:
  - and he became their captain
  - and he was for them a chief
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or commander. In this military context,
    'commander' is natural modern English. 'Their' refers back to the group just mentioned.
- source_word: וְעַד הַשְּׁלֹשָׁה
  chosen: but he did not attain to the three
  alternatives:
  - but he did not come up to the three
  - yet he did not reach the three
  lexicon: HALOT
  rationale: The construction עַד ... לֹא בָא idiomatically expresses not reaching
    or attaining the status of a group. 'Attain to' communicates rank/status rather
    than physical movement.
- source_word: בָא
  chosen: attain
  alternatives:
  - come
  - reach
  lexicon: HALOT
  rationale: Although the verb literally means 'come,' the context is comparative
    status among elite warriors. Rendering it as 'attain' makes the idiom clear in
    English while preserving the sense of not reaching their level.
