id: 2SA.23.35
reference: 2 Samuel 23:35
source:
  edition: WLC
  text: חצרו הַֽ/כַּרְמְלִ֔י פַּעֲרַ֖י הָ/אַרְבִּֽי׃ס
translation:
  text: Hezro the Carmelite, Paarai the Arbite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hazro' for the first name.
    reason: lexical_alternative
  - marker: b
    text: '''Carmelite'' here means a man from Carmel, not a member of the later Carmelite
      order.'
    reason: cultural_note
  - marker: c
    text: Or 'the man from Arab' for 'the Arbite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חצרו
  chosen: Hezro
  alternatives:
  - Hazro
  lexicon: HALOT
  rationale: Proper name in a roster of David's warriors; transliterated rather than
    translated per project philosophy. Vocalization supports the common English form
    'Hezro,' though 'Hazro' is a possible transliteration.
- source_word: הַכַּרְמְלִי
  chosen: the Carmelite
  alternatives:
  - the man from Carmel
  - the Carmelite
  lexicon: HALOT
  rationale: Gentilic with article from Carmel. 'Carmelite' here denotes a person
    from Carmel, not the later religious order. Retaining the gentilic is concise
    and matches the list format.
- source_word: פַּעֲרַי
  chosen: Paarai
  alternatives:
  - Paari
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Paarai' best reflects the doubled vowel
    implied by the Hebrew pointing.
- source_word: הָאַרְבִּי
  chosen: the Arbite
  alternatives:
  - the man from Arab
  - the Arbite/Arabite
  lexicon: HALOT
  rationale: Gentilic with article, likely referring to origin from a place called
    Arab/Arbah. 'Arbite' preserves the Hebrew gentilic form and the terse style of
    the warrior list.
