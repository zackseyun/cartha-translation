lexical_decisions:
- source_word: שַׁמָּה
  chosen: Shammah
  alternatives:
  - Shamma
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the translation philosophy for names. 'Shammah' reflects the conventional
    English form for this Hebrew name.
- source_word: הַחֲרֹדִי
  chosen: the Harodite
  alternatives:
  - the man from Harod
  - the Harodian
  lexicon: HALOT
  rationale: Gentilic form with article, indicating origin or clan association from
    Harod. 'Harodite' is the standard concise English rendering of the gentilicial
    adjective and preserves the list format.
- source_word: אֱלִיקָא
  chosen: Elika
  alternatives:
  - Eliqa
  rationale: Proper personal name; transliterated by standard convention. 'Elika'
    is the established English form and fits the pattern of the surrounding names
    list.
- source_word: הַחֲרֹדִי
  chosen: the Harodite
  alternatives:
  - the man from Harod
  - the Harodian
  lexicon: HALOT
  rationale: Repeated gentilicial descriptor for Elika; rendered consistently with
    the first occurrence to preserve the structure and cadence of the roster.
