id: 2SA.23.32
reference: 2 Samuel 23:32
source:
  edition: WLC
  text: אֶלְיַחְבָּא֙ הַ/שַּׁ֣עַלְבֹנִ֔י בְּנֵ֥י יָשֵׁ֖ן יְהוֹנָתָֽן׃ס
translation:
  text: Elyahba the Shaalbonite, the sons of Jashen, Jonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew text is terse and difficult here: literally, ''Elyahba the Shaalbonite,
      the sons of Jashen, Jonathan.'' Some interpreters understand a textual irregularity
      and reconstruct the list differently, such as taking ''Jonathan'' as one of
      ''the sons of Jashen.'' This translation preserves the Hebrew wording as transmitted
      rather than emending it.'
    reason: textual_variant
lexical_decisions:
- source_word: אֶלְיַחְבָּא
  chosen: Elyahba
  alternatives:
  - Eliahba
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English spelling reflects a straightforward transliteration of the
    Hebrew consonants and vowels.
- source_word: הַשַּׁעַלְבֹנִי
  chosen: the Shaalbonite
  alternatives:
  - the Shaalbomite
  - from Shaalbon
  lexicon: HALOT
  rationale: Gentilic with article, indicating a man from Shaalbon/Shaalbim. 'The
    Shaalbonite' is a natural English rendering of the gentilical form while preserving
    the place-name connection.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - the descendants of
  lexicon: HALOT
  rationale: Construct plural of 'son.' The phrase is difficult in context because
    it is followed by singular 'Jonathan,' but the Hebrew form itself is plainly plural
    construct. Rendering it transparently preserves the textual form rather than smoothing
    the difficulty away.
- source_word: יָשֵׁן
  chosen: Jashen
  alternatives:
  - Jashen's
  - Jashen
  rationale: Treated as a proper name in the construct chain 'sons of Jashen.' The
    translation keeps the name transliterated and does not emend the text.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  rationale: Proper personal name; standard English transliteration 'Jonathan' is
    preferred for readability and convention.
