id: 2SA.23.14
reference: 2 Samuel 23:14
source:
  edition: WLC
  text: וְ/דָוִ֖ד אָ֣ז בַּ/מְּצוּדָ֑ה וּ/מַצַּ֣ב פְּלִשְׁתִּ֔ים אָ֖ז בֵּ֥ית לָֽחֶם׃
translation:
  text: Now David was then in the stronghold, and the garrison of the Philistines
    was then at Bethlehem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the temporal adverb: literally, ''David was then in the
      stronghold, and the garrison of the Philistines was then at Bethlehem.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: now ... then
  alternatives:
  - then
  - at that time
  lexicon: HALOT
  rationale: The adverb occurs twice in the verse. The first is rendered 'Now' to
    mark the narrative setting in natural English, while the second is rendered 'then'
    to preserve the temporal emphasis without sounding overly repetitive. This reflects
    the Hebrew's temporal framing.
- source_word: מְצוּדָה
  chosen: stronghold
  alternatives:
  - fortress
  - stronghold refuge
  lexicon: HALOT
  rationale: '''Stronghold'' is the standard and contextually fitting rendering for
    David''s defensible location, preserving the military/topographical sense without
    over-specifying the structure.'
- source_word: מַצַּב
  chosen: garrison
  alternatives:
  - station
  - outpost
  - governor's post
  lexicon: HALOT
  rationale: In this military context with 'of the Philistines' and location at Bethlehem,
    'garrison' best conveys an established military post or detachment. 'Station'
    is possible but less specific in English.
- source_word: פְּלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people group.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְ
  chosen: and
  alternatives:
  - while
  lexicon: HALOT
  rationale: The conjunction straightforwardly links the two clauses. Although English
    could smooth the relation with 'while,' 'and' better preserves the Hebrew coordination.
