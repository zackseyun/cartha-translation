theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of בַּיִת in the Davidic promise
  chosen_reading: house with dynastic implication preserved
  alternative_readings:
  - dynasty
  - royal house
  - temple
  rationale: The Hebrew deliberately plays on 'house' as both building and lineage. Rendering simply 'dynasty' would resolve the metaphor too strongly; 'house' preserves the theological tension and literary wordplay central to the Davidic covenant context.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
