id: 2SA.7.11
reference: 2 Samuel 7:11
source:
  edition: WLC
  text: וּ/לְ/מִן הַ/יּ֗וֹם אֲשֶׁ֨ר צִוִּ֤יתִי שֹֽׁפְטִים֙ עַל עַמִּ֣/י יִשְׂרָאֵ֔ל וַ/הֲנִיחֹ֥תִי לְ/ךָ֖ מִ/כָּל אֹיְבֶ֑י/ךָ וְ/הִגִּ֤יד לְ/ךָ֙ יְהוָ֔ה כִּי בַ֖יִת יַעֲשֶׂה לְּ/ךָ֥ יְהוָֽה־־־־־׃
translation:
  text: and from the day that I appointed judges over my people Israel. And I have given you rest from all your enemies. Yahweh declares to you that Yahweh will make a house for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'build you a house.' Here 'house' likely carries the sense of a royal dynasty, while also echoing David's desire to build a house (temple) for the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִן הַיּוֹם
  chosen: and from the day
  alternatives:
  - and since the day
  - even from the day
  lexicon: HALOT
  rationale: The compound prepositional sequence introduces a temporal starting point continuing the prior sentence. 'And from the day' preserves the connective force and temporal sense without over-paraphrasing.
- source_word: צִוִּיתִי שֹׁפְטִים
  chosen: I appointed judges
  alternatives:
  - I commanded judges
  - I ordained judges
  lexicon: HALOT
  rationale: Although the verb's core sense is 'command,' in this construction with 'judges' over Israel it idiomatically refers to instituting or commissioning them. 'Appointed' best fits the English sense in context.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - for my people Israel
  lexicon: HALOT
  rationale: עַל with governing authority is naturally 'over.' This preserves the leadership/jurisdiction sense of the judges.
- source_word: וַהֲנִיחֹתִי לְךָ מִכָּל אֹיְבֶיךָ
  chosen: and I have given you rest from all your enemies
  alternatives:
  - and I gave you rest from all your enemies
  - and I have caused you to rest from all your enemies
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to give rest or relief. 'Given you rest' is idiomatic and preserves divine agency. The perfect can be rendered as present perfect in English to reflect a completed action with present relevance in the promise context.
- source_word: וְהִגִּיד לְךָ יְהוָה
  chosen: The LORD also declares to you
  alternatives:
  - and the LORD tells you
  - and the LORD has declared to you
  lexicon: HALOT
  rationale: The verb נגד in Hiphil means 'declare, tell, announce.' 'Declares' fits the solemn covenantal announcement. 'Also' captures the conjunctive force in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי בַיִת יַעֲשֶׂה לְּךָ יְהוָה
  chosen: that the LORD will make a house for you
  alternatives:
  - that the LORD will build you a house
  lexicon: HALOT
  rationale: 'בַּיִת is intentionally double-layered here: David had proposed to build a temple-house for God, and God promises to make a dynastic ''house'' for David. ''Make a house'' preserves the broader Hebrew ambiguity better than ''build a house,'' which can sound too exclusively architectural in English.'
