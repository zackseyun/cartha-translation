id: 2SA.7.22
reference: 2 Samuel 7:22
source:
  edition: WLC
  text: עַל כֵּ֥ן גָּדַ֖לְתָּ אֲדֹנָ֣/י יְהוִ֑ה כִּֽי אֵ֣ין כָּמ֗וֹ/ךָ וְ/אֵ֤ין אֱלֹהִים֙
    זֽוּלָתֶ֔/ךָ בְּ/כֹ֥ל אֲשֶׁר שָׁמַ֖עְנוּ בְּ/אָזְנֵֽי/נוּ־־־׃
translation:
  text: Therefore you are great, Lord GOD, for there is none like you, and there is
    no God besides you, according to all that we have heard with our ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH.'' English versions commonly render this compound title
      as ''Lord GOD'' to reflect the divine name without saying ''Lord LORD.'''
    reason: cultural_note
  - marker: b
    text: Or 'and there is no god except you' / 'apart from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: Introduces an inference from the preceding prayer and divine acts. 'Therefore'
    is natural modern English and preserves the logical force.
- source_word: גָּדַ֖לְתָּ
  chosen: you are great
  alternatives:
  - you have shown yourself great
  - you are exalted
  lexicon: HALOT
  rationale: The Qal perfect of גדל can express resultant state or recognition of
    greatness. 'You are great' is idiomatic in English and fits the doxological context
    without over-paraphrasing.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord the LORD
  lexicon: HALOT
  rationale: This compound divine title combines אֲדֹנָי with the divine name YHWH.
    Following the doctrine default, YHWH is rendered 'the LORD'; in English convention
    when paired with Adonai, 'GOD' in small caps avoids 'Lord LORD.' Here represented
    as 'Lord GOD' in plain text formatting.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding declaration. 'For' is concise
    and preserves the explanatory force.
- source_word: אֵין כָּמוֹךָ
  chosen: there is none like you
  alternatives:
  - there is no one like you
  lexicon: HALOT
  rationale: A standard Hebrew expression of incomparability. 'None' works well in
    parallel with the following clause about no God besides him.
- source_word: וְאֵין אֱלֹהִים זֽוּלָתֶךָ
  chosen: and there is no God besides you
  alternatives:
  - and there is no god except you
  - and there is no God apart from you
  lexicon: HALOT
  rationale: זולתי conveys exclusion ('besides, except, apart from'). Capitalized
    'God' reflects reference to deity in a monotheistic confession, while preserving
    the exclusivity claim of the Hebrew.
- source_word: בְּכֹל אֲשֶׁר שָׁמַעְנוּ בְּאָזְנֵינוּ
  chosen: according to all that we have heard with our ears
  alternatives:
  - from all that we have heard with our ears
  - in all that we have heard with our ears
  lexicon: HALOT
  rationale: The phrase grounds the confession in received testimony/experience. 'According
    to all that we have heard with our ears' preserves the Hebrew preposition and
    the emphatic idiom 'with our ears' without flattening it.
