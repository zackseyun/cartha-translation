theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Sovereign LORD
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In the compound with Adonai, English convention uses 'GOD' to avoid the
    awkward repetition 'Lord LORD.' 'Sovereign LORD' is interpretive and imports nuance
    not explicit in the Hebrew title itself.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Monotheistic exclusivity in אֵין אֱלֹהִים זֽוּלָתֶךָ
  chosen_reading: there is no God besides you
  alternative_readings:
  - there is no god except you
  rationale: The verse expresses exclusive deity without requiring philosophical elaboration.
    The translation preserves the text's direct confession and does not import later
    doctrinal formulations, while remaining fully compatible with historic orthodoxy.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
