id: 2SA.7.18
reference: 2 Samuel 7:18
source:
  edition: WLC
  text: וַ/יָּבֹא֙ הַ/מֶּ֣לֶךְ דָּוִ֔ד וַ/יֵּ֖שֶׁב לִ/פְנֵ֣י יְהוָ֑ה וַ/יֹּ֗אמֶר מִ֣י אָנֹכִ֞י אֲדֹנָ֤/י יְהוִה֙ וּ/מִ֣י בֵיתִ֔/י כִּ֥י הֲבִיאֹתַ֖/נִי עַד הֲלֹֽם־׃
translation:
  text: Then King David went in and sat before Yahweh and said, “Who am I, Lord GOD, and what is my house, that you have brought me this far?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is my family/household'; 'house' here likely carries the broader sense of David's household and emerging dynasty, echoing the chapter's repeated use of 'house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went in
  alternatives:
  - came in
  - entered
  lexicon: HALOT
  rationale: The verb בוא in the waw-consecutive narrative form here marks David's movement into a place of prayer/worship. 'Went in' is natural English from the narrator's perspective and preserves the concrete motion without over-specifying the location.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: English idiom normally combines the title and name as 'King David.' This preserves both the definite title and the personal name.
- source_word: וַיֵּשֶׁב
  chosen: sat
  alternatives:
  - remained seated
  - dwelt
  lexicon: HALOT
  rationale: ישב commonly means 'sit' or 'dwell.' In this immediate narrative setting, paired with 'went in' and followed by speech, the physical sense 'sat' best fits.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence before someone. 'Before the LORD' is concise and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance with the contested-terms table.
- source_word: מִי אָנֹכִי
  chosen: Who am I
  alternatives:
  - What am I
  lexicon: HALOT
  rationale: A standard idiomatic expression of humility. 'Who am I' best reflects the personal, rhetorical force of the Hebrew.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - my Lord, the LORD
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name. In English Bible convention, 'Lord GOD' distinguishes this from simple 'Lord' and avoids the awkward 'Lord LORD.' Small-caps distinction cannot be represented in plain text metadata, but the intended sense is אדני יהוה.
- source_word: וּמִי בֵיתִי
  chosen: and what is my house
  alternatives:
  - and who is my household
  - and what is my family
  lexicon: HALOT
  rationale: Although literally 'and who is my house,' English idiom in this humility formula is better captured by 'what is my house,' where 'house' refers to David's household/dynasty. This preserves the metaphor while sounding natural.
- source_word: בֵּיתִי
  chosen: my house
  alternatives:
  - my household
  - my family
  - my dynasty
  lexicon: HALOT
  rationale: '''House'' is retained in the main text because it is theologically and literarily important in the surrounding chapter, where David''s ''house'' carries both household and dynastic overtones. Alternatives are possible but would flatten that connection.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of David''s astonishment: ''that you have brought me...'' English ''that'' best fits the rhetorical construction.'
- source_word: הֲבִיאֹתַנִי
  chosen: you have brought me
  alternatives:
  - you have led me
  - you have caused me to come
  lexicon: HALOT
  rationale: The Hiphil of בוא is causative, 'bring.' 'You have brought me' is the most direct and natural rendering.
- source_word: עַד הֲלֹם
  chosen: this far
  alternatives:
  - to this point
  - until now
  lexicon: HALOT
  rationale: The phrase expresses the extent of God's bringing David up to the present stage. 'This far' is idiomatic and preserves the sense of advancement to the present moment.
