theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'my house' in David's response
  chosen_reading: Retain 'my house' in the main text with dynastic/household overtones
  alternative_readings:
  - my family
  - my household
  - my dynasty
  rationale: 'In 2 Samuel 7, ''house'' is a central thematic wordplay: David proposes a house for God, and God promises David a house. Retaining ''house'' preserves that theological-literary connection, while the footnote can clarify the broader sense.'
