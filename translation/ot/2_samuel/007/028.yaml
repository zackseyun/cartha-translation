id: 2SA.7.28
reference: 2 Samuel 7:28
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אֲדֹנָ֣/י יְהוִ֗ה אַתָּה הוּא֙ הָֽ/אֱלֹהִ֔ים וּ/דְבָרֶ֖י/ךָ יִהְי֣וּ אֱמֶ֑ת וַ/תְּדַבֵּר֙ אֶֽל עַבְדְּ/ךָ֔ אֶת הַ/טּוֹבָ֖ה הַ/זֹּֽאת׀־־־׃
translation:
  text: And now, Lord GOD, you are God, and your words are true, and you have spoken this good thing to your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH''; English ''Lord GOD'' avoids the awkward repetition that would result from rendering both elements as ''Lord.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'your words will be true' or 'your words are trustworthy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord the LORD
  lexicon: HALOT
  rationale: The compound divine address combines אֲדֹנָי ('Lord') with the divine name YHWH. Per doctrine, YHWH is rendered 'the LORD' by default, but in the fixed Hebrew combination אֲדֹנָי יְהוִה, English convention commonly avoids 'Lord LORD.' 'Lord GOD' preserves both elements distinctly and naturally in English.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  chosen: you are God
  alternatives:
  - you are the God
  - you yourself are God
  lexicon: HALOT
  rationale: The Hebrew includes an emphatic pronoun construction ('you, he, are the God'). English idiom is best served by 'you are God,' which preserves the affirmation without awkwardness. 'The God' is possible formally, but less natural here in direct address.
- source_word: דְבָרֶיךָ
  chosen: your words
  alternatives:
  - your word
  - your promises
  lexicon: HALOT
  rationale: The noun is plural in form, so 'your words' is the most direct rendering. 'Your word' would be smoother in English but would flatten the plural; 'your promises' is interpretive beyond the lexical form.
- source_word: יִהְיוּ אֱמֶת
  chosen: are truth
  alternatives:
  - will be true
  - are true
  - are trustworthy
  lexicon: HALOT
  rationale: Though יִהְיוּ is formally future/imperfect ('will be'), in context David is affirming the reliability of God's speech as an abiding reality. 'Are truth' preserves the predicate noun אֱמֶת more closely than adjectival 'true' and reflects the confessional tone. English present tense reads naturally here.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - 'true'
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, faithfulness, or reliability. Here, with 'your words,' 'truth' is the most straightforward and weighty rendering, while still implying reliability.
- source_word: וַתְּדַבֵּר
  chosen: you have spoken
  alternatives:
  - you spoke
  - you have promised
  lexicon: HALOT
  rationale: The waw-prefixed verb refers to God's prior speech to David. 'You have spoken' fits the present affirmation of what God has already said. 'You have promised' is interpretive; the verb itself is 'speak.'
- source_word: אֶל עַבְדְּךָ
  chosen: to your servant
  alternatives:
  - to your slave
  lexicon: HALOT
  rationale: While עֶבֶד can mean 'slave' or 'servant,' in royal prayer language for David's self-reference before God, 'servant' is the most natural and established rendering. The bonded-status nuance is not the main emphasis here.
- source_word: הַטּוֹבָה הַזֹּאת
  chosen: this good thing
  alternatives:
  - this good promise
  - this goodness
  - this blessing
  lexicon: HALOT
  rationale: The phrase is literally 'this good [thing].' 'This good thing' preserves the broadness of the Hebrew, referring to the gracious promise just spoken. More specific options like 'promise' or 'blessing' are interpretive expansions.
