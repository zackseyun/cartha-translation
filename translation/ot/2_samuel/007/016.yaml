theological_decisions:
- issue: Dynastic promise language and possible messianic significance
  chosen_reading: Retain 'house,' 'kingdom,' and 'throne' in their historical-dynastic
    sense without making the messianic implication explicit in the translation.
  alternative_readings:
  - Render 'house' as 'dynasty' to foreground the dynastic promise
  - Translate in a way that more explicitly signals messianic fulfillment
  rationale: The verse speaks first in its immediate covenantal context to David's
    enduring royal line. Christian theology may see broader messianic fulfillment,
    but the translation should not import that interpretation into the wording beyond
    what the Hebrew states. Retaining the royal terms preserves the theological depth
    and tension without over-specification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
