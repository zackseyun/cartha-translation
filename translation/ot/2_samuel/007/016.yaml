id: 2SA.7.16
reference: 2 Samuel 7:16
source:
  edition: WLC
  text: וְ/נֶאְמַ֨ן בֵּיתְ/ךָ֧ וּ/מַֽמְלַכְתְּ/ךָ֛ עַד עוֹלָ֖ם לְ/פָנֶ֑י/ךָ כִּֽסְאֲ/ךָ֔
    יִהְיֶ֥ה נָכ֖וֹן עַד עוֹלָֽם־־׃
translation:
  text: And your house and your kingdom shall be made sure forever before you; your
    throne shall be established forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before you''; some textual witnesses read ''before me.'''
    reason: textual_variant
  - marker: b
    text: '''House'' here likely carries the sense of a royal house, that is, a dynasty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶאְמַן
  chosen: shall be made sure
  alternatives:
  - shall be established
  - shall be confirmed
  - shall be faithful/enduring
  lexicon: HALOT
  rationale: Niphal of אמן here conveys being made firm, reliable, or enduring. 'Shall
    be made sure' preserves the passive nuance better than a simple active paraphrase,
    while remaining natural English. 'Established' is possible, but using it here
    would reduce the distinction from נָכוֹן later in the verse.
- source_word: בֵּיתְךָ
  chosen: your house
  alternatives:
  - your dynasty
  lexicon: HALOT
  rationale: בַּיִת in royal-promise contexts can denote a dynastic house rather than
    merely a physical building. 'House' is retained in the main text because it is
    the source term and naturally carries dynastic resonance in English biblical style;
    the dynastic sense is noted here rather than paraphrased away.
- source_word: וּמַמְלַכְתְּךָ
  chosen: and your kingdom
  alternatives:
  - and your reign
  - and your royal dominion
  lexicon: HALOT
  rationale: The noun denotes kingship/kingdom. 'Kingdom' is the most direct and idiomatic
    rendering in this covenantal context, pairing well with 'house' and 'throne.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - unto eternity
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Forever' is clear modern English
    and fits the translation philosophy. The repetition later in the verse is preserved
    for emphasis.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - before me
  lexicon: HALOT
  rationale: The consonantal text reads second masculine singular, 'before you.' This
    is retained in the main text as the direct reading of the provided Hebrew. Because
    some textual traditions read 'before me,' that alternative is preserved in a footnote
    as a textual variant of significance.
- source_word: כִּסְאֲךָ
  chosen: your throne
  lexicon: HALOT
  rationale: Standard rendering of the royal seat/metonym for kingship. 'Throne' is
    both literal and politically symbolic, fitting the promise to David.
- source_word: יִהְיֶה נָכוֹן
  chosen: shall be established
  alternatives:
  - shall be firm
  - shall stand secure
  lexicon: HALOT
  rationale: נָכוֹן with היה expresses firmness or establishment. 'Shall be established'
    is idiomatic and preserves the sense of a securely fixed throne. It also provides
    a measured variation from 'shall be made sure' earlier, reflecting the distinct
    Hebrew wording.
