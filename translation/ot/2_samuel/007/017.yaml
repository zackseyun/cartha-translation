theological_decisions:
- issue: Nature of prophetic revelation in חִזָּיוֹן
  chosen_reading: Render as 'vision' in the main text.
  alternative_readings:
  - revelation
  - prophetic vision
  rationale: The Hebrew explicitly uses the standard term for a revelatory vision.
    Translating it as 'vision' preserves the text's claim without either minimizing
    it to a generic message or expanding it into a more interpretive phrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
