id: 2SA.7.17
reference: 2 Samuel 7:17
source:
  edition: WLC
  text: כְּ/כֹל֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וּ/כְ/כֹ֖ל הַ/חִזָּי֣וֹן הַ/זֶּ֑ה כֵּ֛ן
    דִּבֶּ֥ר נָתָ֖ן אֶל דָּוִֽד־׃ס
translation:
  text: According to all these words and according to all this vision, so Nathan spoke
    to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revelation' for 'vision.' The Hebrew term refers to prophetic revelation,
      often received in visionary form.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל
  chosen: According to all
  alternatives:
  - In accordance with all
  - Just as all
  lexicon: HALOT
  rationale: The prefixed כְ marks correspondence ('according to/in accordance with'),
    and כֹל means 'all.' 'According to all' preserves the formal repetition and sets
    up the summary statement of faithful reporting.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these matters
  lexicon: HALOT
  rationale: דְּבָרִים commonly means 'words' or 'matters.' Here, because Nathan is
    reporting a divine message, 'words' best preserves the verbal content of the revelation.
- source_word: וּכְכֹל
  chosen: and according to all
  alternatives:
  - and in accordance with all
  lexicon: HALOT
  rationale: The conjunction plus repeated prepositional phrase is retained to mirror
    the Hebrew's emphatic parallelism rather than collapsing the two clauses into
    one.
- source_word: הַחִזָּיוֹן הַזֶּה
  chosen: this vision
  alternatives:
  - this revelation
  - this prophetic vision
  lexicon: HALOT
  rationale: חִזָּיוֹן denotes a vision or revelatory sight. 'Vision' is the most
    direct rendering and keeps the prophetic mode of revelation explicit without interpretive
    expansion.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'כֵּן resumes and concludes the comparison: Nathan spoke ''so/thus''
    in accordance with what was revealed. ''So'' is natural modern English while preserving
    the logical connection.'
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר is the standard verb for speaking. 'Spoke' fits the narrative
    register and pairs well with 'words' earlier in the verse.
- source_word: נָתָן
  chosen: Nathan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - with David
  lexicon: HALOT
  rationale: אֶל normally indicates direction toward a person, so 'to David' is the
    straightforward rendering.
