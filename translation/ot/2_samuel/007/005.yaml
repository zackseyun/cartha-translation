  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render בַיִת as 'house' or 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The immediate referent is a sanctuary structure, but 'house' is the Hebrew term and preserves the literary-theological wordplay in the surrounding passage, where God contrasts David building a 'house' for him with God building a 'house' for David.
