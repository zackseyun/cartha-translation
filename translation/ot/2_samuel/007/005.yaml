id: 2SA.7.5
reference: 2 Samuel 7:5
source:
  edition: WLC
  text: לֵ֤ךְ וְ/אָֽמַרְתָּ֙ אֶל עַבְדִּ֣/י אֶל דָּוִ֔ד כֹּ֖ה אָמַ֣ר יְהוָ֑ה הַ/אַתָּ֛ה תִּבְנֶה לִּ֥/י בַ֖יִת לְ/שִׁבְתִּֽ/י־־־׃
translation:
  text: 'Go and say to my servant David, ‘Thus says Yahweh: Would you build a house for me to dwell in?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Are you the one who would build me a house to dwell in?” The Hebrew question is emphatic and rhetorical.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך gives a direct command to Nathan. Simple 'Go' is natural modern English and preserves the imperative force.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  - then say
  lexicon: HALOT
  rationale: 'Sequential waw + perfect with imperative force after לֵךְ is best rendered as a second command in English: ''and say.'''
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in royal-covenantal address to David the idiomatic and honorific sense is 'my servant,' not emphasizing chattel status. This fits the context and English usage.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention per translation philosophy.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַאַתָּה
  chosen: Would you
  alternatives:
  - Are you the one who will
  - You?
  lexicon: HALOT
  rationale: The interrogative particle with the pronoun gives an emphatic question. 'Would you' captures both the interrogative and the rhetorical nuance naturally in English.
- source_word: תִּבְנֶה לִּי בַיִת
  chosen: build a house for me
  alternatives:
  - build me a house
  lexicon: HALOT
  rationale: בית here refers to a temple/dwelling structure for God. 'House' preserves the Hebrew term and its later wordplay with David's 'house' in the chapter better than specifying 'temple' too early.
- source_word: לְשִׁבְתִּי
  chosen: to dwell in
  alternatives:
  - for my dwelling
  - for me to dwell
  lexicon: HALOT
  rationale: 'Infinitive construct of ישב with 1cs suffix expresses purpose: a house ''for my dwelling'' or ''for me to dwell in.'' ''To dwell in'' is idiomatic and clear in English while preserving the purpose sense.'
