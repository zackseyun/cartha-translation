theological_decisions:
- issue: Nature of חֶסֶד in the Davidic covenant context
  chosen_reading: Render as 'steadfast love' to preserve covenantal loyalty without
    importing a narrower doctrinal formula.
  alternative_readings:
  - mercy
  - lovingkindness
  - covenant loyalty
  rationale: The verse contrasts God's enduring favor toward David's line with his
    removal of favor from Saul. 'Steadfast love' best preserves the covenantal and
    relational force while remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Referent of 'from before you'
  chosen_reading: Keep the wording 'from before you' rather than resolving it into
    an interpretive paraphrase such as 'from being king before you.'
  alternative_readings:
  - from your presence
  - from before your face
  - from being king before you
  rationale: The Hebrew leaves the expression somewhat open while clearly referring
    to Saul's removal in relation to David. Preserving the idiom maintains the text's
    tension and avoids adding explanatory material not explicit in the source.
  doctrine_reference: Translation philosophy §§1, 3
