id: 2SA.7.15
reference: 2 Samuel 7:15
source:
  edition: WLC
  text: וְ/חַסְדִּ֖/י לֹא יָס֣וּר מִמֶּ֑/נּוּ כַּ/אֲשֶׁ֤ר הֲסִרֹ֨תִי֙ מֵ/עִ֣ם שָׁא֔וּל
    אֲשֶׁ֥ר הֲסִרֹ֖תִי מִ/לְּ/פָנֶֽי/ךָ־׃
translation:
  text: But my steadfast love will not depart from him, as I removed it from Saul,
    whom I removed from before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lovingkindness' or 'my covenant loyalty.' The Hebrew term carries
      the sense of loyal, steadfast love within a covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: Literally 'whom I removed from before you.' This may refer to Saul's removal
      from his position in relation to David, not merely physical departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my lovingkindness
  - my covenant loyalty
  - my mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love rather than mere emotion.
    'Steadfast love' is readable modern English and preserves the covenantal weight
    better than 'mercy' here.
- source_word: יָסוּר
  chosen: will not depart
  alternatives:
  - will not turn aside
  - will not be removed
  lexicon: HALOT
  rationale: The verb סור means to turn aside, depart, or be removed. In this context,
    with חֶסֶד as subject, 'will not depart' is the most natural English expression.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix straightforwardly indicates
    separation from the promised son/royal descendant; 'from him' is sufficient and
    idiomatic.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: HALOT
  rationale: Introduces comparison with Saul. 'As' is concise and preserves the comparative
    force.
- source_word: הֲסִרֹתִי
  chosen: I removed
  alternatives:
  - I took away
  - I turned away
  lexicon: HALOT
  rationale: 'Hiphil of סור is causative: ''remove'' or ''take away.'' ''Removed''
    keeps the verbal link with the earlier ''depart'' while sounding natural in English.'
- source_word: מֵעִם שָׁאוּל
  chosen: from Saul
  alternatives:
  - away from Saul
  - from being with Saul
  lexicon: HALOT
  rationale: The phrase means removal from association with Saul. English normally
    compresses this to 'from Saul' without loss of sense.
- source_word: אֲשֶׁר הֲסִרֹתִי מִלְּפָנֶיךָ
  chosen: whom I removed from before you
  alternatives:
  - whom I removed from your presence
  - whom I took away before you
  lexicon: HALOT
  rationale: מִלְּפָנֶיךָ is literally 'from before you.' Since God is speaking to
    David about Saul's removal from kingship before David, the more formal wording
    preserves the Hebrew imagery and avoids over-interpreting it as merely spatial
    presence.
