id: 2SA.7.7
reference: 2 Samuel 7:7
source:
  edition: WLC
  text: בְּ/כֹ֥ל אֲשֶֽׁר הִתְהַלַּכְתִּי֮ בְּ/כָל בְּנֵ֣י יִשְׂרָאֵל֒ הֲ/דָבָ֣ר דִּבַּ֗רְתִּי
    אֶת אַחַד֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֣ר צִוִּ֗יתִי לִ/רְע֛וֹת אֶת עַמִּ֥/י אֶת
    יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר לָ֛/מָּה לֹֽא בְנִיתֶ֥ם לִ֖/י בֵּ֥ית אֲרָזִֽים־־־־־־׃
translation:
  text: In all the places where I have walked among all the sons of Israel, did I
    ever speak a word with one of the tribes of Israel, whom I commanded to shepherd
    my people Israel, saying, ‘Why have you not built me a house of cedar?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''one of the tribes of Israel''; the parallel in 1 Chronicles 17:6
      reads ''judges of Israel,'' which likely reflects the leaders charged to shepherd
      the people.'
    reason: textual_variant
lexical_decisions:
- source_word: הִתְהַלַּכְתִּי
  chosen: have walked
  alternatives:
  - have moved about
  - have gone about
  - have dwelt
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys God's moving about among his people rather
    than permanent residence. 'Have walked' preserves the concrete metaphor and echoes
    covenantal presence language without over-paraphrasing.
- source_word: בְּכָל אֲשֶׁר ... בְּכָל בְּנֵי יִשְׂרָאֵל
  chosen: In all the places where ... among all the sons of Israel
  alternatives:
  - Throughout all the time that ... among all Israel
  lexicon: HALOT
  rationale: The paired בְּכֹל / בְּכָל construction is somewhat idiomatic. Rendering
    the first as 'in all the places where' fits the walking imagery, while the second
    keeps the sense of God's presence among the covenant people.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural is retained. Here it
    is a standard covenantal ethnonym; 'sons of Israel' is more formally transparent
    than 'Israelites.'
- source_word: הֲדָבָר דִּבַּרְתִּי
  chosen: did I ever speak a word
  alternatives:
  - did I speak anything
  - have I spoken a word
  lexicon: HALOT
  rationale: The interrogative plus cognate accusative intensifies the denial. 'Did
    I ever speak a word' preserves the Hebrew emphasis and rhetorical force.
- source_word: אַחַד שִׁבְטֵי יִשְׂרָאֵל
  chosen: one of the tribes of Israel
  alternatives:
  - one of the rulers of Israel
  lexicon: HALOT
  rationale: The MT reads 'tribes.' Although the parallel in 1 Chronicles 17:6 has
    'judges,' the Samuel reading should be translated as given. 'One of the tribes'
    is the straightforward rendering, with the textual/interpretive alternative preserved
    in a footnote.
- source_word: אֲשֶׁר צִוִּיתִי לִרְעוֹת
  chosen: whom I commanded to shepherd
  alternatives:
  - which I commanded to shepherd through
  - whom I appointed to pasture
  lexicon: HALOT
  rationale: The relative clause most naturally refers to leaders associated with
    Israel's tribes, those commissioned to care for the people. 'Shepherd' preserves
    the royal-pastoral metaphor better than flattening to 'rule'.
- source_word: עַמִּי אֶת יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: This appositional construction is naturally rendered 'my people Israel,'
    preserving both covenant possession and identification.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  - to say
  lexicon: HALOT
  rationale: Standard speech-introducing infinitive; 'saying' keeps the formal linkage
    to the quoted question.
- source_word: לָמָּה לֹא בְנִיתֶם לִי בֵּית אֲרָזִים
  chosen: Why have you not built me a house of cedar?
  alternatives:
  - Why have you not built for me a cedar house?
  lexicon: HALOT
  rationale: '''House of cedar'' is a natural English rendering that preserves the
    genitive sense and the contrast with the tent/tabernacle context. The plural verb
    ''have you not built'' reflects the Hebrew form, addressed corporately.'
