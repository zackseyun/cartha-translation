theological_decisions:
- issue: Gendered covenantal ethnonym
  chosen_reading: the sons of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine and functions as the standard national
    designation. Following the translation philosophy's gender-accurate principle,
    the masculine form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Textual/parallel tension between 'tribes' and a leader-oriented sense
  chosen_reading: one of the tribes of Israel
  alternative_readings:
  - one of the judges/rulers of Israel
  rationale: The Samuel MT reads 'tribes,' and original-language primacy requires
    translating the extant Hebrew text. Because the immediate clause about commanding
    to shepherd points toward leadership, and because 1 Chronicles 17:6 reads 'judges,'
    the alternative is preserved in a footnote rather than imported into the main
    text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
