theological_decisions:
- issue: Whether to render דָּבָר as 'word' or the more interpretive 'promise' in
    a covenant context
  chosen_reading: the word
  alternative_readings:
  - the promise
  rationale: The verse is indeed covenantal, but the Hebrew explicitly says 'the word
    that you have spoken.' Rendering it 'word' preserves the textual wording and lets
    the covenantal force arise from context rather than translator expansion.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Whether to make בֵּיתוֹ explicit as 'dynasty' rather than 'house'
  chosen_reading: his house
  alternative_readings:
  - his dynasty
  - his household
  rationale: In 2 Samuel 7 the dynastic meaning is crucial, yet 'house' is the key
    covenantal term and should be retained in the main text. The more explicit dynastic
    sense is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: Consistency of key terms, or documented
    exception.'
