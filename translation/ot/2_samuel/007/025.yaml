id: 2SA.7.25
reference: 2 Samuel 7:25
source:
  edition: WLC
  text: וְ/עַתָּה֙ יְהוָ֣ה אֱלֹהִ֔ים הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבַּ֤רְתָּ עַֽל עַבְדְּ/ךָ֙
    וְ/עַל בֵּית֔/וֹ הָקֵ֖ם עַד עוֹלָ֑ם וַ/עֲשֵׂ֖ה כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־׃
translation:
  text: And now, LORD God, confirm forever the word that you have spoken concerning
    your servant and concerning his house, and do as you have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the promise that you have spoken.'
    reason: lexical_alternative
  - marker: b
    text: '''His house'' here carries the sense of his royal house or dynasty, not
      merely his physical household.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered as 'the LORD'
    in English small-caps convention rather than transliteration.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In direct address following YHWH, אֱלֹהִים functions as the common divine
    title, naturally rendered 'God,' yielding the vocative 'LORD God.'
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the promise
  - the matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or by implication 'promise.' Here it
    refers to what God has spoken about David and his house. 'The word' preserves
    the Hebrew expression while still being understandable; 'promise' is interpretive
    and therefore kept as an alternative rather than the main text.
- source_word: דִּבַּרְתָּ
  chosen: you have spoken
  alternatives:
  - you spoke
  - you promised
  lexicon: HALOT
  rationale: The perfect verb in prayer recalls God's prior speech. Present perfect
    English ('have spoken') fits the continuing relevance of that speech. 'Promised'
    would sharpen the covenantal force but goes beyond the lexical value of דבר.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - over
  lexicon: HALOT
  rationale: With דבר in this context, עַל indicates the subject matter of God's speech.
    'Concerning' is precise and suitably formal without being archaic.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote a slave, in royal-prayer address it is a conventional
    expression of humble service before God. 'Servant' best matches the register here
    without importing the stronger bonded nuance unnecessarily.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his dynasty
  - his household
  lexicon: HALOT
  rationale: בַּיִת here includes David's lineage/dynastic house, but 'house' preserves
    the covenantal idiom central to the chapter. The dynastic sense is real, so 'dynasty'
    is preserved as an alternative rather than replacing the idiom.
- source_word: הָקֵם
  chosen: confirm
  alternatives:
  - establish
  - uphold
  lexicon: HALOT
  rationale: The Hiphil imperative of קום here asks God to cause his spoken word to
    stand. 'Confirm' communicates making the promise stand firm. 'Establish' is also
    strong and traditional; 'confirm' was chosen because the direct object is 'the
    word,' not primarily the house itself.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: This idiom denotes enduring perpetuity. 'Forever' is natural modern English
    and captures the force well.
- source_word: וַעֲשֵׂה
  chosen: and do
  alternatives:
  - and act
  - and fulfill it
  lexicon: HALOT
  rationale: עשה is broad and straightforward. 'And do' preserves the concise imperative
    and pairs naturally with 'as you have spoken.' 'Fulfill it' would be interpretive
    expansion.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: as you have spoken
  alternatives:
  - just as you said
  lexicon: HALOT
  rationale: This closing clause echoes the earlier wording and reinforces the prayer
    that God act in accordance with his own speech. 'As you have spoken' preserves
    that verbal repetition.
