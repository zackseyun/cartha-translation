theological_decisions:
- issue: Whether to render בַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The immediate referent is the sanctuary Solomon will build, but the chapter's
    literary and theological structure hinges on the double meaning of 'house' (temple/dynasty).
    Retaining 'house' in the main text preserves that tension rather than resolving
    it too narrowly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it; §1, Original-language primacy over translation tradition.
- issue: Force of עַד עוֹלָם in the Davidic promise
  chosen_reading: forever
  alternative_readings:
  - for a very long time
  rationale: In this covenantal context the phrase carries the full force of enduring
    perpetuity in the promise. The translation should not weaken the theological weight
    of the Davidic covenant by reducing it to an indefinite long duration.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
