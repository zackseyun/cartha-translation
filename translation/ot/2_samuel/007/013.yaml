id: 2SA.7.13
reference: 2 Samuel 7:13
source:
  edition: WLC
  text: ה֥וּא יִבְנֶה בַּ֖יִת לִ/שְׁמִ֑/י וְ/כֹנַנְתִּ֛י אֶת כִּסֵּ֥א מַמְלַכְתּ֖/וֹ
    עַד עוֹלָֽם־־־׃
translation:
  text: He will build a house for my name, and I will establish the throne of his
    kingdom forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a temple for my name.' The Hebrew reads 'a house for my name,' preserving
      the chapter's wordplay between a temple and a dynasty.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: He
  alternatives:
  - He himself
  lexicon: HALOT
  rationale: Third masculine singular independent pronoun used straightforwardly as
    the subject. English does not require an emphatic rendering here, though the pronoun
    does mark the subject explicitly.
- source_word: יִבְנֶה
  chosen: will build
  alternatives:
  - shall build
  lexicon: HALOT
  rationale: Qal imperfect 3ms of בנה indicates future action in this promise context.
    'Will build' is natural modern English and preserves the predictive force.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a temple
  lexicon: HALOT
  rationale: The Hebrew noun literally means 'house.' In this context it refers to
    a sanctuary/temple, but 'house' better preserves the source wording and the broader
    Davidic wordplay in the chapter between dynastic 'house' and cultic 'house.' The
    more interpretive 'temple' is therefore kept as an alternative rather than the
    main text.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - in honor of my name
  lexicon: HALOT
  rationale: The preposition ל with 'my name' is best rendered 'for my name,' preserving
    the covenantal/theological idiom without overexplaining it. This keeps the Hebrew
    expression intact and readable.
- source_word: וְכֹנַנְתִּי
  chosen: and I will establish
  alternatives:
  - and I will make firm
  - and I will set up
  lexicon: HALOT
  rationale: First person perfect with prefixed conjunction in prophetic/promise sequence
    functions futurally here. 'Establish' fits the royal/dynastic context and is idiomatic
    for confirming a throne.
- source_word: אֶת כִּסֵּא
  chosen: the throne
  alternatives:
  - the seat of rule
  lexicon: HALOT
  rationale: כִּסֵּא in royal contexts is literally 'throne' and should be rendered
    directly. The object marker אֶת is not translated in English.
- source_word: מַמְלַכְתּוֹ
  chosen: of his kingdom
  alternatives:
  - of his reign
  - of his kingship
  lexicon: HALOT
  rationale: The noun denotes kingdom/royal dominion. 'Of his kingdom' is the most
    direct and natural complement to 'throne' in English.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: This common idiom expresses enduring perpetuity. 'Forever' is the clearest
    modern English equivalent and preserves the force of the promise.
