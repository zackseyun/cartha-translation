theological_decisions:
- issue: Reference to the ark's lodging
  chosen_reading: Rendered concretely as 'the ark of God dwells within the tent curtain'
    without importing later temple theology.
  alternative_readings:
  - '''the ark of God dwells in a tent'''
  rationale: The Hebrew specifically mentions יְרִיעָה, a curtain/hanging, so the
    translation preserves the tabernacle-like provisional setting rather than generalizing
    to 'tent' in the main text.
  doctrine_reference: Translation philosophy §§1, 5
