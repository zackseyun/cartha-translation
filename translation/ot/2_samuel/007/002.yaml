id: 2SA.7.2
reference: 2 Samuel 7:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל נָתָ֣ן הַ/נָּבִ֔יא רְאֵ֣ה נָ֔א אָנֹכִ֥י יוֹשֵׁ֖ב
    בְּ/בֵ֣ית אֲרָזִ֑ים וַֽ/אֲרוֹן֙ הָֽ/אֱלֹהִ֔ים יֹשֵׁ֖ב בְּ/ת֥וֹךְ הַ/יְרִיעָֽה־׃
translation:
  text: And the king said to Nathan the prophet, “See now, I dwell in a house of cedar,
    but the ark of God dwells within the tent curtain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “within a curtain”; the Hebrew term refers to a tent curtain or hanging,
      likely evoking the tabernacle coverings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title in context; no need to supply 'David' since the Hebrew
    uses the title.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  alternatives:
  - Nathan, the prophet
  lexicon: HALOT
  rationale: Appositional identification; straightforward title translation while
    transliterating the personal name.
- source_word: רְאֵה נָא
  chosen: See now
  alternatives:
  - Look now
  - Please see
  lexicon: HALOT
  rationale: Idiomatic attention-getter. 'See now' preserves the imperative plus particle
    נָא without making it sound overly pleading.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis, but normal English can carry the sense
    with 'I' in this context; stronger reflexive emphasis would overstate it.
- source_word: יוֹשֵׁב
  chosen: dwell / dwells
  alternatives:
  - sit / sits
  - live / lives
  lexicon: HALOT
  rationale: Though literally 'sit/dwell,' the contrast is about habitation. 'Dwell'
    fits both David's residence and the ark's location with dignified, natural English.
- source_word: בְּבֵית אֲרָזִים
  chosen: in a house of cedar
  alternatives:
  - in a cedar house
  - in a house of cedars
  lexicon: HALOT
  rationale: Construct phrase indicating a house made of cedar wood/paneling. Singular
    'cedar' is idiomatic in English for building material.
- source_word: וַאֲרוֹן הָאֱלֹהִים
  chosen: but the ark of God
  alternatives:
  - and the ark of God
  lexicon: HALOT
  rationale: 'The conjunction marks contrast in sense, not mere addition: David contrasts
    his own house with the ark''s lesser lodging. ''But'' best conveys the discourse
    force.'
- source_word: בְּתוֹךְ הַיְרִיעָה
  chosen: within the tent curtain
  alternatives:
  - within a curtain
  - in the midst of the curtain
  - inside the tent
  lexicon: HALOT
  rationale: יְרִיעָה refers to a tent curtain/hanging, especially tabernacle fabric.
    'Tent curtain' preserves the concrete cultic image better than the vaguer 'tent'
    or the awkwardly literal 'curtain' alone.
