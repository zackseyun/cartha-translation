id: 2SA.7.24
reference: 2 Samuel 7:24
source:
  edition: WLC
  text: וַ/תְּכ֣וֹנֵֽן לְ֠/ךָ אֶת עַמְּ/ךָ֨ יִשְׂרָאֵ֧ל לְ/ךָ֛ לְ/עָ֖ם עַד עוֹלָ֑ם וְ/אַתָּ֣ה יְהוָ֔ה הָיִ֥יתָ לָ/הֶ֖ם לֵ/אלֹהִֽים־׀־׃ס
translation:
  text: And you established your people Israel for yourself to be your people forever, and you, Yahweh, became their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were their God.' The Hebrew can be rendered statively, but 'became their God' better reflects the covenant-establishing sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכ֣וֹנֵן
  chosen: established
  alternatives:
  - confirmed
  - made firm
  lexicon: HALOT
  rationale: From כון in the polel/piel-like stem, conveying making firm or establishing. 'Established' is natural English and preserves the covenantal sense of securing Israel's status.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - to yourself
  lexicon: HALOT
  rationale: The repeated לְךָ marks Israel as belonging to and designated for YHWH. 'For yourself' brings out the possessive/covenantal force more clearly than a bare 'for you.'
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - Israel your people
  lexicon: HALOT
  rationale: A direct rendering of the construct phrase with apposition. This preserves both possession ('your people') and the national name ('Israel').
- source_word: לְךָ לְעָם
  chosen: to be your people
  alternatives:
  - as a people for yourself
  - for a people to yourself
  lexicon: HALOT
  rationale: This idiom expresses covenant identity rather than merely social classification. 'To be your people' is idiomatic English and reflects the Hebrew sense.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: The phrase denotes enduring permanence. 'Forever' is clear modern English and fits the covenant context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָיִיתָ לָהֶם לֵאלֹהִים
  chosen: became their God
  alternatives:
  - were their God
  lexicon: HALOT
  rationale: The Hebrew uses היה with ל to express entering or standing in covenant relation. In this context, after God's constituting Israel as his people, 'became their God' preserves the reciprocal covenant formula and the verbal force better than the stative-sounding 'were their God.'
