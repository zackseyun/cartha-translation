theological_decisions:
- issue: Rendering the covenant formula reciprocally
  chosen_reading: '''you established your people Israel for yourself to be your people forever, and you, Yahweh, became their God'''
  alternative_readings:
  - '''you made your people Israel your own people forever, and you, LORD, became their God'''
  - '''you confirmed for yourself your people Israel to be a people for yourself forever, and you, O LORD, were their God'''
  rationale: 'The verse states the classic covenant relationship: Israel as YHWH''s people and YHWH as Israel''s God. The translation preserves this theological reciprocity without importing later doctrinal formulations. ''Became their God'' reflects the covenant-establishing force of היה + ל in context.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
