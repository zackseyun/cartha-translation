theological_decisions:
- issue: Reference of 'your word' in covenant context
  chosen_reading: Rendered broadly as 'your word' rather than the more interpretive
    'your promise.'
  alternative_readings:
  - your promise
  - what you said
  rationale: The context is God's covenant speech to David, so 'promise' is a plausible
    interpretive gloss. However, the Hebrew says 'your word,' and preserving that
    wording avoids importing a narrower theological category than the text explicitly
    states while still allowing readers to infer covenantal force from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Anthropomorphic language for God in 'according to your heart'
  chosen_reading: Retained the anthropomorphic expression 'according to your heart.'
  alternative_readings:
  - according to your will
  - according to your desire
  rationale: The Hebrew uses 'heart' for God's inner intention. Preserving the metaphor
    maintains the text's own way of speaking about God rather than resolving it into
    abstract theological language.
  doctrine_reference: Translation philosophy §3
