id: 2SA.7.21
reference: 2 Samuel 7:21
source:
  edition: WLC
  text: בַּ/עֲב֤וּר דְּבָֽרְ/ךָ֙ וּֽ/כְ/לִבְּ/ךָ֔ עָשִׂ֕יתָ אֵ֥ת כָּל הַ/גְּדוּלָּ֖ה
    הַ/זֹּ֑את לְ/הוֹדִ֖יעַ אֶת עַבְדֶּֽ/ךָ־־׃
translation:
  text: Because of your word and according to your heart, you have done all this greatness,
    to make your servant know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of your word' or 'because of your promise.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'according to your heart,' that is, according to your own intention
      or will.
    reason: lexical_alternative
  - marker: c
    text: Hebrew singular, 'all this greatness'; some translations render 'these great
      things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲבוּר
  chosen: Because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: The preposition marks cause or basis. 'Because of' is natural modern
    English and preserves the causal force without sounding archaic.
- source_word: דְּבָרְךָ
  chosen: your word
  alternatives:
  - your promise
  - what you said
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'promise.' In this covenant context
    it likely refers to God's spoken commitment, but 'your word' best preserves the
    Hebrew's lexical breadth while allowing the covenantal sense to be heard.
- source_word: וּכְלִבְּךָ
  chosen: and according to your heart
  alternatives:
  - and according to your will
  - and in keeping with your desire
  lexicon: HALOT
  rationale: לב often denotes the inner will, intention, or mind. 'According to your
    heart' keeps the Hebrew metaphor rather than flattening it to 'will,' while remaining
    intelligible in English.
- source_word: עָשִׂיתָ
  chosen: you have done
  alternatives:
  - you did
  - you have acted
  lexicon: HALOT
  rationale: The perfect verb is well represented by English present perfect here,
    reflecting completed action with present relevance in David's prayer.
- source_word: אֵת כָּל הַגְּדוּלָּה הַזֹּאת
  chosen: all this greatness
  alternatives:
  - all this great thing
  - all these great things
  lexicon: HALOT
  rationale: 'The Hebrew is singular: ''all this greatness.'' Many English versions
    pluralize for idiom, but the singular abstract noun is worth preserving because
    it gathers God''s mighty act into a unified display of greatness.'
- source_word: לְהוֹדִיעַ
  chosen: to make ... know
  alternatives:
  - to show
  - to make known to
  lexicon: HALOT
  rationale: The Hiphil of ידע is causative, 'to cause to know.' 'To make your servant
    know it' preserves that causative nuance more precisely than the broader 'show.'
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in royal prayer language 'your servant'
    is the established and contextually appropriate rendering for David's humble self-reference
    before God; the bonded-status nuance is not foregrounded here.
