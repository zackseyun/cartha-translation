id: 2SA.7.4
reference: 2 Samuel 7:4
source:
  edition: WLC
  text: וַ/יְהִ֖י בַּ/לַּ֣יְלָה הַ/ה֑וּא וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל נָתָ֖ן לֵ/אמֹֽר־־׃
translation:
  text: But that night the word of Yahweh came to Nathan, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened that night that the word of the LORD came to Nathan, saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: But ... came
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The initial waw-consecutive with היה functions as a narrative advance. In English, a simple connective plus the following main verb is more natural than the wooden 'and it happened.' 'But' fits the immediate context, marking contrast with Nathan's prior approval in the preceding verse.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - on that night
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'in that night,' but idiomatic English is 'that night.' This preserves the temporal specificity without awkwardness.
- source_word: וַיְהִי דְּבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the message of the LORD came
  lexicon: HALOT
  rationale: This is a standard prophetic formula. Supplying 'came' in English reflects the idiomatic sense of divine revelation addressed to a prophet, even though the Hebrew repeats 'and it was.' 'Word' is preferred over 'message' for consistency with common biblical formulae and because it preserves the theological weight of revelation language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל נָתָן
  chosen: to Nathan
  alternatives:
  - unto Nathan
  lexicon: HALOT
  rationale: אֶל marks direction toward the recipient of revelation; 'to Nathan' is the natural modern English rendering. 'Nathan' is transliterated as a personal name per translation philosophy.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the next verse. 'Saying' is the standard and natural English discourse marker.
