id: 2SA.7.12
reference: 2 Samuel 7:12
source:
  edition: WLC
  text: כִּ֣י יִמְלְא֣וּ יָמֶ֗י/ךָ וְ/שָֽׁכַבְתָּ֙ אֶת אֲבֹתֶ֔י/ךָ וַ/הֲקִימֹתִ֤י
    אֶֽת זַרְעֲ/ךָ֙ אַחֲרֶ֔י/ךָ אֲשֶׁ֥ר יֵצֵ֖א מִ/מֵּעֶ֑י/ךָ וַ/הֲכִינֹתִ֖י אֶת מַמְלַכְתּֽ/וֹ׀־־־׃
translation:
  text: When your days are fulfilled and you lie down with your fathers, I will raise
    up your offspring after you, who will come from your own body, and I will establish
    his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your descendant'; Hebrew 'your seed/offspring,' which can function collectively
      or as a representative singular.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from your inward parts,' an idiom meaning from your own body—that
      is, your biological offspring.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces a future circumstance/time clause rather than giving
    a causal explanation. 'When' best fits the syntax with the following imperfect
    and perfect sequence.
- source_word: יִמְלְאוּ יָמֶיךָ
  chosen: your days are fulfilled
  alternatives:
  - your days are complete
  - your time is fulfilled
  lexicon: HALOT
  rationale: The idiom literally speaks of days being filled/full. 'Your days are
    fulfilled' preserves the Hebrew imagery and its solemn tone better than a looser
    paraphrase.
- source_word: וְשָׁכַבְתָּ אֶת־אֲבֹתֶיךָ
  chosen: and you lie down with your fathers
  alternatives:
  - and you sleep with your fathers
  - and you die and join your fathers
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for death/burial among one's ancestors.
    'Lie down with your fathers' keeps the metaphor and avoids over-paraphrasing,
    while remaining understandable in context.
- source_word: וַהֲקִימֹתִי
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will set up
  lexicon: HALOT
  rationale: With offspring as object, קום in the Hiphil means to cause to arise/raise
    up a successor. 'Raise up' is the most natural and preserves the succession motif.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendant
  lexicon: HALOT
  rationale: זֶרַע can be collective or singular. 'Offspring' preserves that ambiguity
    better than 'descendant' while avoiding the less idiomatic 'seed' in modern English.
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - following you
  lexicon: HALOT
  rationale: A straightforward temporal/successional phrase indicating the successor
    comes after David.
- source_word: אֲשֶׁר יֵצֵא מִמֵּעֶיךָ
  chosen: who will come from your own body
  alternatives:
  - who will come from your loins
  - who will come forth from your inward parts
  lexicon: HALOT
  rationale: The phrase emphasizes physical descent. 'From your own body' communicates
    biological lineage clearly in modern English without archaic wording like 'loins.'
- source_word: וַהֲכִינֹתִי
  chosen: and I will establish
  alternatives:
  - and I will make firm
  - and I will confirm
  lexicon: HALOT
  rationale: כון in the Hiphil commonly carries the sense of making firm or establishing.
    'Establish' is idiomatic and fits covenantal royal language.
- source_word: מַמְלַכְתּוֹ
  chosen: his kingdom
  alternatives:
  - his reign
  - his royal dominion
  lexicon: HALOT
  rationale: The noun denotes kingdom/royal rule. 'His kingdom' is the standard and
    clearest rendering in this dynastic promise context.
