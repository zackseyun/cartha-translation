theological_decisions:
- issue: Scope of זַרְעֲךָ in the Davidic promise
  chosen_reading: your offspring
  alternative_readings:
  - your descendant
  - your seed
  rationale: The Hebrew permits a collective or representative singular sense. 'Offspring'
    preserves the immediate reference to Solomon while leaving open the broader dynastic
    and messianic trajectory recognized in the canon, without importing that fuller
    theology directly into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
