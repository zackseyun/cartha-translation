id: 2SA.7.27
reference: 2 Samuel 7:27
source:
  edition: WLC
  text: כִּֽי אַתָּה֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל גָּלִ֜יתָה אֶת אֹ֤זֶן
    עַבְדְּ/ךָ֙ לֵ/אמֹ֔ר בַּ֖יִת אֶבְנֶה לָּ֑/ךְ עַל כֵּ֗ן מָצָ֤א עַבְדְּ/ךָ֙ אֶת
    לִבּ֔/וֹ לְ/הִתְפַּלֵּ֣ל אֵלֶ֔י/ךָ אֶת הַ/תְּפִלָּ֖ה הַ/זֹּֽאת־־־־־־׃
translation:
  text: For you, O LORD of hosts, God of Israel, have revealed this to your servant,
    saying, ‘I will build you a house.’ Therefore your servant has found the courage
    to pray this prayer to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'have uncovered the ear of your servant,' a Hebrew idiom meaning
      'have revealed this to your servant.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will build a house for you.' The word 'house' also carries covenantal
      overtones of dynasty in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your servant has found his heart,' that is, has found the courage
      or resolve.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project doctrine for the divine name YHWH, following
    established convention that signals the covenant name without transliteration.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Kept the traditional but still intelligible 'of hosts' for the divine
    title יְהוָה צְבָאוֹת. 'Armies' is possible, but 'hosts' better preserves the
    breadth of heavenly and earthly forces implied in the title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering preserving covenantal identification.
- source_word: גָּלִיתָה אֶת אֹזֶן עַבְדְּךָ
  chosen: have revealed this to your servant
  alternatives:
  - have uncovered your servant's ear
  - have disclosed it to your servant
  lexicon: HALOT
  rationale: Literally the idiom is 'uncovered the ear of your servant,' meaning to
    reveal or disclose something. The main text uses natural English while preserving
    the sense of divine disclosure.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in royal prayer language here
    'your servant' is the most natural and contextually appropriate English, reflecting
    David's humble status before God rather than emphasizing bonded servitude.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Retained the quotative force explicitly to mirror the Hebrew structure.
- source_word: בַּיִת אֶבְנֶה לָּךְ
  chosen: I will build you a house
  alternatives:
  - I will build a house for you
  lexicon: HALOT
  rationale: Preserves the key word 'house,' which in this context carries the deliberate
    double sense of a physical house/temple and a dynastic house. 'Build you a house'
    is idiomatic and close to the Hebrew.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Captures the inferential force from God's revelation to David's response
    in prayer.
- source_word: מָצָא ... אֶת לִבּוֹ
  chosen: has found the courage
  alternatives:
  - has found his heart
  - has found it in his heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'has found his heart,' meaning to gain
    resolve or courage. 'Has found the courage' communicates the idiomatic sense in
    clear modern English.
- source_word: לְהִתְפַּלֵּל אֵלֶיךָ
  chosen: to pray ... to you
  alternatives:
  - to intercede before you
  lexicon: HALOT
  rationale: Standard rendering of the hitpael of פלל in this context of direct prayer
    addressed to God.
- source_word: הַתְּפִלָּה הַזֹּאת
  chosen: this prayer
  alternatives:
  - this petition
  lexicon: HALOT
  rationale: Simple and direct rendering of the demonstrative phrase, preserving the
    specificity of the prayer David is presently offering.
