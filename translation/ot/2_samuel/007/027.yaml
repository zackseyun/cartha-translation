theological_decisions:
- issue: Idiomatic disclosure formula
  chosen_reading: Rendered the idiom as 'have revealed this to your servant' in the
    main text.
  alternative_readings:
  - have uncovered your servant's ear
  rationale: The literal idiom may sound opaque in English. The chosen rendering preserves
    the meaning of divine revelation while a footnote retains the more literal expression
    for auditability.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Meaning of 'house'
  chosen_reading: Kept 'house' in the main text without narrowing it to 'temple' or
    'dynasty.'
  alternative_readings:
  - temple
  - dynasty
  rationale: The Hebrew intentionally preserves a theological wordplay central to
    the Davidic covenant context. Translating more specifically would resolve tension
    the text leaves resonant.
  doctrine_reference: Translation philosophy §3
