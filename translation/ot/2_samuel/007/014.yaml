id: 2SA.7.14
reference: 2 Samuel 7:14
source:
  edition: WLC
  text: אֲנִי֙ אֶהְיֶה לּ֣/וֹ לְ/אָ֔ב וְ/ה֖וּא יִהְיֶה לִּ֣/י לְ/בֵ֑ן אֲשֶׁר֙ בְּ/הַ֣עֲוֺת֔/וֹ
    וְ/הֹֽכַחְתִּי/ו֙ בְּ/שֵׁ֣בֶט אֲנָשִׁ֔ים וּ/בְ/נִגְעֵ֖י בְּנֵ֥י אָדָֽם־־׃
translation:
  text: I will be a father to him, and he will be a son to me. When he commits iniquity,
    I will discipline him with the rod of men and with the blows of the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'with human blows.' The Hebrew reads 'with the blows
      of the sons of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶהְיֶה לּוֹ לְאָב
  chosen: I will be a father to him
  alternatives:
  - I will be his father
  lexicon: HALOT
  rationale: The lamed construction is relational/predicative. 'A father to him' preserves
    the Hebrew idiom while remaining natural English; 'his father' is possible but
    slightly smooths the form.
- source_word: וְהוּא יִהְיֶה לִּי לְבֵן
  chosen: and he will be a son to me
  alternatives:
  - and he will be my son
  lexicon: HALOT
  rationale: Matches the reciprocal covenant formula and preserves the Hebrew relational
    idiom. 'My son' is idiomatic English but less formally transparent.
- source_word: אֲשֶׁר
  chosen: When
  alternatives:
  - who
  - if
  - whenever
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the circumstance tied to the following infinitive/verb
    form. 'When' best conveys the temporal sense in context; 'if' would overemphasize
    conditionality.
- source_word: בְּהַעֲוֺתוֹ
  chosen: he commits iniquity
  alternatives:
  - he does wrong
  - he is guilty
  - in his wrongdoing
  lexicon: HALOT
  rationale: From עוה/עון language of wrongdoing/guilt. 'Commits iniquity' preserves
    the moral gravity of the Hebrew better than the flatter 'does wrong.'
- source_word: וְהֹכַחְתִּיו
  chosen: I will discipline him
  alternatives:
  - I will correct him
  - I will rebuke him
  - I will chasten him
  lexicon: HALOT
  rationale: The Hiphil of יכח can denote reproof/correction. In this context, followed
    by instruments of chastisement, 'discipline' best captures corrective action rather
    than mere verbal rebuke.
- source_word: בְּשֵׁבֶט אֲנָשִׁים
  chosen: with the rod of men
  alternatives:
  - with a human rod
  - with the rod wielded by men
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the metaphor and leaves open whether
    the sense is ordinary human means or chastisement through human agents. Over-interpretive
    expansions were avoided.
- source_word: וּבְנִגְעֵי בְּנֵי אָדָם
  chosen: and with the blows of the sons of man
  alternatives:
  - and with the stripes of the children of men
  - and with human blows
  lexicon: HALOT
  rationale: נגע here refers to striking/plagues/blows. 'Blows' is clear modern English.
    'Sons of man' preserves the Hebrew phrase בני אדם; because אדם here denotes humanity
    generically, the phrase is retained but footnoted with a more idiomatic alternative.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered 'man / humankind' by context. In the construct
    phrase 'sons of man,' the traditional and gender-accurate form reflects the Hebrew
    while still denoting human beings generally.
