theological_decisions:
- issue: Scope of the filial promise in relation to David's royal line and its later
    messianic use
  chosen_reading: Render the verse in its immediate historical sense about the Davidic
    son/king without importing an explicit messianic interpretation into the translation.
  alternative_readings:
  - Read as directly messianic in the main text
  rationale: The verse functions first within the Davidic covenant concerning David's
    offspring, though later Scripture applies its sonship language more broadly. The
    translation should preserve the wording without adding christological interpretation
    not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
