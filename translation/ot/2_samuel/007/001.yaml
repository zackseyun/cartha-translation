theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential royal-residence nuance of בַּיִת
  chosen_reading: house
  alternative_readings:
  - palace
  rationale: Although a royal residence could be called a palace in English, 'house'
    better preserves the Hebrew wording and the literary/theological wordplay in the
    surrounding chapter concerning David's 'house' and the LORD's 'house.' This does
    not add doctrine but preserves textual texture.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
