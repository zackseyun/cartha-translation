id: 2SA.7.1
reference: 2 Samuel 7:1
source:
  edition: WLC
  text: וַ/יְהִ֕י כִּי יָשַׁ֥ב הַ/מֶּ֖לֶךְ בְּ/בֵית֑/וֹ וַ/יהוָ֛ה הֵנִֽיחַ ל֥/וֹ מִ/סָּבִ֖יב
    מִ/כָּל אֹיְבָֽי/ו־־־׃
translation:
  text: Now when the king was living in his house, and the LORD had given him rest
    on every side from all his enemies,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his palace.' Hebrew 'in his house'; 'house' is retained here, also
      anticipating the wordplay later in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: Now when
  alternatives:
  - And it happened when
  - And it came to pass when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a new scene. 'Now when' preserves
    the temporal transition in readable modern English without archaic phrasing.
- source_word: יָשַׁב
  chosen: was living
  alternatives:
  - sat
  - dwelt
  - lived
  lexicon: HALOT
  rationale: Although the verb is literally 'sat/dwelt,' in this context it denotes
    settled residence rather than the physical act of sitting. 'Was living' communicates
    the ongoing state naturally in English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title retained formally; the referent is David, but the Hebrew
    uses the title rather than the personal name here.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  - in his home
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' While the setting is royal and 'palace'
    is interpretively possible, 'house' stays closer to the Hebrew and also prepares
    for the wordplay on 'house' later in the chapter.
- source_word: וַיהוָה
  chosen: and the LORD
  alternatives:
  - and Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The conjunction is retained
    to reflect the Hebrew clause linkage.
- source_word: הֵנִיחַ לוֹ
  chosen: had given him rest
  alternatives:
  - had caused him to rest
  - had given him relief
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to give rest or relief from conflict. 'Had
    given him rest' is idiomatic and preserves the causative sense.
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverbial expression describes surrounding security. 'On every side'
    is a natural English equivalent with the same force.
- source_word: מִכָּל אֹיְבָיו
  chosen: from all his enemies
  alternatives:
  - from every one of his enemies
  lexicon: HALOT
  rationale: The phrase specifies the source of the rest. 'From all his enemies' is
    the standard and accurate rendering.
