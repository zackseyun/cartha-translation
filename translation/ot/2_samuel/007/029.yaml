theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Sovereign LORD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the fixed combination אֲדֹנָי יְהוִה, English convention commonly uses
    'Lord GOD' to avoid the awkward 'Lord LORD.' 'Sovereign LORD' is interpretive
    and not required by the Hebrew term אֲדֹנָי alone, so it is not preferred in the
    main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make 'house' explicitly dynastic
  chosen_reading: the house of your servant
  alternative_readings:
  - the dynasty of your servant
  - the household of your servant
  rationale: The promise to David concerns his dynastic line, but the Hebrew deliberately
    uses 'house,' which also resonates with household and covenantal continuity. Preserving
    'house' maintains the literary and theological wordplay of the chapter without
    over-resolving the metaphor.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
