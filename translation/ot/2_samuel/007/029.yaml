id: 2SA.7.29
reference: 2 Samuel 7:29
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הוֹאֵל֙ וּ/בָרֵךְ֙ אֶת בֵּ֣ית עַבְדְּ/ךָ֔ לִ/הְי֥וֹת לְ/עוֹלָ֖ם
    לְ/פָנֶ֑י/ךָ כִּֽי אַתָּ֞ה אֲדֹנָ֤/י יְהוִה֙ דִּבַּ֔רְתָּ וּ/מִ/בִּרְכָ֣תְ/ךָ֔
    יְבֹרַ֥ךְ בֵּֽית עַבְדְּ/ךָ֖ לְ/עוֹלָֽם־־־׃פ
translation:
  text: And now, please be willing and bless the house of your servant, that it may
    continue before you forever. For you, Lord GOD, have spoken, and by your blessing
    the house of your servant will be blessed forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be pleased' or 'consent' for 'please be willing.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the sense of ''household'' or ''dynasty'' in this
      context.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord GOD' represents the title-name combination 'Adonai YHWH'; elsewhere
      YHWH is rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹאֵל
  chosen: please be willing
  alternatives:
  - be pleased
  - consent
  - undertake
  lexicon: HALOT
  rationale: The verb יאל in the Hiphil often carries the sense of willingness or
    gracious consent. In prayer language here, 'please be willing' preserves both
    the petitionary tone and the nuance of asking God to consent graciously, more
    transparently than the idiomatic but less explicit 'be pleased.'
- source_word: וּבָרֵךְ
  chosen: and bless
  alternatives:
  - so bless
  lexicon: HALOT
  rationale: Straightforward imperative of ברך. 'Bless' is the standard rendering
    and fits the covenant-prayer context without paraphrase.
- source_word: בֵּית עַבְדְּךָ
  chosen: the house of your servant
  alternatives:
  - the household of your servant
  - the dynasty of your servant
  lexicon: HALOT
  rationale: בַּיִת can mean physical house, household, or dynasty. In the Davidic
    covenant context, 'house' intentionally preserves the layered sense, including
    dynastic implications, without collapsing it into an interpretive gloss. 'Your
    servant' reflects David's self-designation before God.
- source_word: לִהְיוֹת לְעוֹלָם לְפָנֶיךָ
  chosen: that it may continue before you forever
  alternatives:
  - to be before you forever
  - that it may be established before you forever
  lexicon: HALOT
  rationale: Literally 'to be forever before you.' In English, 'continue before you
    forever' communicates enduring existence in God's presence/favor. 'Be established'
    imports a stability nuance not explicit in היה itself, though contextually related.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine's contested-terms guidance, יְהוָה is rendered
    'the LORD.' In the compound אֲדֹנָי יְהוִה, standard English convention avoids
    'Lord LORD' by rendering as 'Lord GOD.' This preserves the title-name combination
    while respecting the prescribed treatment of the divine name.
- source_word: דִּבַּרְתָּ
  chosen: have spoken
  alternatives:
  - spoke
  - have said
  lexicon: HALOT
  rationale: The perfect here grounds David's confidence in God's prior promise. English
    present perfect 'have spoken' captures the completed action with present relevance.
- source_word: וּמִבִּרְכָתְךָ
  chosen: and by your blessing
  alternatives:
  - and from your blessing
  - and with your blessing
  lexicon: HALOT
  rationale: The preposition מִן here is best rendered instrumentally/source-wise.
    'By your blessing' is idiomatic and conveys that the enduring blessed state of
    David's house derives from God's blessing.
- source_word: יְבֹרַךְ
  chosen: will be blessed
  alternatives:
  - shall be blessed
  - is blessed
  lexicon: HALOT
  rationale: Passive/imperfect form naturally renders as future in this prayerful
    declaration. 'Will be blessed' is clear modern English.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם in covenant contexts commonly denotes enduring futurity. 'Forever'
    is the most natural modern equivalent and preserves the theological weight of
    permanence.
