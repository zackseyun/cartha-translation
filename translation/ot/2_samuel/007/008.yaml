  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עבד for David
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The doctrine notes servant/slave is context-dependent. Here the term functions as a royal-covenantal designation for David before God rather than emphasizing chattel or bonded status, so 'servant' is the more contextually accurate choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent); applied analogically to Hebrew עבד by translation philosophy'
