id: 2SA.7.8
reference: 2 Samuel 7:8
source:
  edition: WLC
  text: וְ֠/עַתָּה כֹּֽה תֹאמַ֞ר לְ/עַבְדִּ֣/י לְ/דָוִ֗ד כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת אֲנִ֤י לְקַחְתִּ֨י/ךָ֙ מִן הַ/נָּוֶ֔ה מֵ/אַחַ֖ר הַ/צֹּ֑אן לִֽ/הְי֣וֹת נָגִ֔יד עַל עַמִּ֖/י עַל יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'Now therefore, this is what you shall say to my servant David: This is what Yahweh of hosts says: I took you from the pasture, from following the flock, to be ruler over my people Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sheepfold.' The Hebrew noun can refer to a pastureland or a place where flocks dwell.
    reason: lexical_alternative
  - marker: b
    text: Or 'leader' or 'prince' for 'ruler.' The Hebrew term denotes one appointed to govern, not necessarily using the specific title 'king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the next stage of the divine message with both temporal and discourse-transition force; 'now therefore' captures the formal transition better than a bare 'now'.
- source_word: כֹּה תֹאמַר
  chosen: this is what you shall say
  alternatives:
  - thus you shall say
  - you shall say this
  lexicon: HALOT
  rationale: Idiomatic messenger formula. 'This is what you shall say' is natural modern English while preserving the directive force.
- source_word: לְעַבְדִּי
  chosen: to my servant
  alternatives:
  - to my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, here it functions as an honorific covenantal designation for David in relation to YHWH, not foregrounding bonded status. 'Servant' best fits the register and context.
- source_word: לְדָוִד
  chosen: to David
  lexicon: HALOT
  rationale: The preposition is retained appositionally after 'my servant,' yielding 'to my servant, to David' to reflect the Hebrew structure without awkwardness.
- source_word: כֹּה אָמַר
  chosen: This is what ... says
  alternatives:
  - Thus says ...
  - This is what ... has said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. Present-tense English is idiomatic for direct proclamation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name; follows established reverential convention and reflects the project's default rendering.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible title preserving the breadth of צבאות. 'Armies' is possible, but 'hosts' better preserves the established divine title without over-specifying earthly or heavenly referent.
- source_word: לְקַחְתִּיךָ
  chosen: I took you
  alternatives:
  - I brought you
  - I fetched you
  lexicon: HALOT
  rationale: Direct and faithful rendering of לקח in this context of divine selection and elevation.
- source_word: מִן הַנָּוֶה
  chosen: from the pasture
  alternatives:
  - from the sheepfold
  - from the grazing place
  - from the meadow
  lexicon: HALOT
  rationale: נוה here refers to a pastureland/dwelling place for flocks. 'Pasture' is the clearest natural rendering in context. 'Sheepfold' is a traditional rendering but is less likely the plain sense of the noun here.
- source_word: מֵאַחַר הַצֹּאן
  chosen: from following the flock
  alternatives:
  - from behind the flock
  - from tending the flock
  lexicon: HALOT
  rationale: Literally 'from after the flock'; idiomatically this describes David's role as shepherd. 'From following the flock' preserves the imagery and syntax better than the more interpretive 'tending the flock.'
- source_word: לִהְיוֹת
  chosen: to be
  alternatives:
  - to become
  lexicon: HALOT
  rationale: Infinitive of היה expressing purpose/result. 'To be' is the most direct rendering.
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - prince
  - leader
  - chief
  lexicon: HALOT
  rationale: נגיד denotes one appointed to lead or rule, often with royal connotations but not identical to 'king.' 'Ruler' preserves the governing sense without importing a more specific title than the Hebrew uses.
- source_word: עַל עַמִּי עַל יִשְׂרָאֵל
  chosen: over my people, over Israel
  alternatives:
  - over my people Israel
  - over Israel my people
  lexicon: HALOT
  rationale: The repeated עַל is preserved for emphasis and cadence. The appositional relationship is maintained without collapsing the phrase too quickly.
