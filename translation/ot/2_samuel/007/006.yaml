theological_decisions:
- issue: Gendered rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  - the people of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Following the project's
    gender-accurate principle, the translation preserves the form as 'sons of Israel'
    rather than neutralizing it, while recognizing smoother idiomatic alternatives.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Cultic terminology for מִשְׁכָּן
  chosen_reading: tabernacle
  alternative_readings:
  - dwelling place
  rationale: The broader context concerns the portable sanctuary before a permanent
    temple. 'Tabernacle' preserves that theological and historical setting without
    over-paraphrase.
