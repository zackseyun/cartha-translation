id: 2SA.7.6
reference: 2 Samuel 7:6
source:
  edition: WLC
  text: כִּ֣י לֹ֤א יָשַׁ֨בְתִּי֙ בְּ/בַ֔יִת לְ֠/מִ/יּוֹם הַעֲלֹתִ֞/י אֶת בְּנֵ֤י יִשְׂרָאֵל֙
    מִ/מִּצְרַ֔יִם וְ/עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וָ/אֶֽהְיֶה֙ מִתְהַלֵּ֔ךְ בְּ/אֹ֖הֶל
    וּ/בְ/מִשְׁכָּֽן־׃
translation:
  text: For I have not lived in a house from the day I brought up the sons of Israel
    out of Egypt to this day, but I have been moving about in a tent and in a tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or traditional “the children of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “have not dwelt in a house … but have gone about in a tent and in a dwelling
      place/tabernacle.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  chosen: have not lived
  alternatives:
  - have not dwelt
  - have not sat
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live.' In the context of residence in
    a house, 'lived' is natural modern English and preserves the durative sense better
    than the more archaic 'dwelt.' The present perfect fits the Hebrew perfect in
    a statement extending from the exodus until now.
- source_word: בְּבַיִת
  chosen: in a house
  alternatives:
  - in the house
  - in a temple
  lexicon: HALOT
  rationale: The noun is indefinite here, not marked as definite. 'House' is the plain
    sense; rendering it 'temple' would import interpretation from the broader context
    rather than translate the lexical item itself.
- source_word: לְמִיּוֹם הַעֲלֹתִי
  chosen: from the day I brought up
  alternatives:
  - since the day I brought up
  - from the day of my bringing up
  lexicon: HALOT
  rationale: The prepositional phrase marks the starting point in time. The Hiphil
    of עלה here means 'bring up,' a standard exodus idiom. 'From the day I brought
    up' is idiomatic and preserves the first-person divine action.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural construct is
    retained as 'sons of Israel.' 'Children of Israel' is traditional, and 'Israelites'
    is smoother, but 'sons' more directly reflects the Hebrew form while remaining
    understandable.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the exodus verb 'brought up,' English idiom favors 'out of Egypt,'
    making the deliverance sense explicit without adding content.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - even to this day
  lexicon: HALOT
  rationale: This is a standard temporal expression. 'To this day' is concise, idiomatic,
    and preserves the continuing timeframe.
- source_word: וָאֶהְיֶה מִתְהַלֵּךְ
  chosen: but I have been moving about
  alternatives:
  - and I was walking about
  - and I have gone about
  - and I have been journeying
  lexicon: HALOT
  rationale: The clause contrasts with not living in a house, so English 'but' brings
    out the adversative force implied by context. The hithpael participle of הלך conveys
    ongoing movement or going about; 'moving about' fits the image of non-fixed dwelling.
    Present perfect progressive reflects the continuing state up to the present.
- source_word: בְּאֹהֶל
  chosen: in a tent
  alternatives:
  - in the tent
  lexicon: HALOT
  rationale: The noun is indefinite in form. 'Tent' is the basic lexical sense and
    evokes the portable sanctuary setting.
- source_word: וּבְמִשְׁכָּן
  chosen: and in a tabernacle
  alternatives:
  - and in a dwelling
  - and in the tabernacle
  lexicon: HALOT
  rationale: משכן can mean 'dwelling place,' but in this cultic context 'tabernacle'
    is the established and accurate term for the sanctuary structure. Retaining both
    'tent' and 'tabernacle' reflects the Hebrew pairing rather than collapsing them
    into one expression.
