id: 2SA.7.20
reference: 2 Samuel 7:20
source:
  edition: WLC
  text: וּ/מַה יּוֹסִ֥יף דָּוִ֛ד ע֖וֹד לְ/דַבֵּ֣ר אֵלֶ֑י/ךָ וְ/אַתָּ֛ה יָדַ֥עְתָּ
    אֶֽת עַבְדְּ/ךָ֖ אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: And what more can David say to you? You know your servant, Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH'' (אֲדֹנָי יְהוִה); rendered ''Lord GOD'' in English
      to avoid ''Lord LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּמַה
  chosen: And what
  alternatives:
  - What
  - And what more
  lexicon: HALOT
  rationale: Introduces a rhetorical question continuing David's prayer. The conjunction
    is retained as 'And' to preserve discourse flow.
- source_word: יּוֹסִיף
  chosen: can ... say
  alternatives:
  - will add
  - can add
  lexicon: HALOT
  rationale: Hiphil of יסף literally means 'add/increase'; with עוֹד and infinitive
    לְדַבֵּר it idiomatically means 'add further to speak,' best rendered in natural
    English as 'can ... say' or 'say ... more.'
- source_word: עוֹד
  chosen: more
  alternatives:
  - further
  - again
  lexicon: HALOT
  rationale: Here עוֹד intensifies the idiom with יסף + infinitive, yielding 'what
    more' rather than a separate adverb like 'again.'
- source_word: לְדַבֵּר אֵלֶיךָ
  chosen: say to you
  alternatives:
  - speak to you
  lexicon: HALOT
  rationale: '''Speak to you'' is formally possible, but ''say to you'' is more idiomatic
    in English after ''what more can David...,'' while preserving the direct-address
    sense.'
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention.
- source_word: וְאַתָּה
  chosen: You
  alternatives:
  - and you
  lexicon: HALOT
  rationale: 'The conjunction marks continuation, but English does not require repeating
    ''and'' after the question. The pronoun is retained for emphasis: ''You know...''.'
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  - know fully
  lexicon: HALOT
  rationale: Qal perfect 2ms in prayer context expresses a present state grounded
    in completed knowledge. Simple present English is the most natural equivalent.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-prayer address to God
    it functions as a humble covenantal self-designation. 'Servant' is the most natural
    and contextually appropriate rendering here; the bonded-status nuance is not foregrounded
    as with some NT δοῦλος contexts.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - my Lord the LORD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH.
    Following the doctrine default, YHWH is rendered 'the LORD'; in English convention
    when paired with Adonai, this becomes 'Lord GOD' to avoid 'Lord LORD.' Small caps
    cannot be represented in plain text tool output, so 'GOD' signals the underlying
    divine name.
