theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - my Lord the LORD
  rationale: The doctrine default renders YHWH as 'the LORD.' In the fixed Hebrew
    title אֲדֹנָי יְהוִה, standard English practice uses 'Lord GOD' to preserve both
    elements without the awkward 'Lord LORD.' This respects the stated policy while
    remaining readable.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — יְהוָה YHWH → ''the LORD'''
