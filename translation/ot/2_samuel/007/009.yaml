id: 2SA.7.9
reference: 2 Samuel 7:9
source:
  edition: WLC
  text: וָ/אֶהְיֶ֣ה עִמְּ/ךָ֗ בְּ/כֹל֙ אֲשֶׁ֣ר הָלַ֔כְתָּ וָ/אַכְרִ֥תָ/ה אֶת כָּל
    אֹיְבֶ֖י/ךָ מִ/פָּנֶ֑י/ךָ וְ/עָשִׂ֤תִֽי לְ/ךָ֙ שֵׁ֣ם גָּד֔וֹל כְּ/שֵׁ֥ם הַ/גְּדֹלִ֖ים
    אֲשֶׁ֥ר בָּ/אָֽרֶץ־־׃
translation:
  text: And I was with you wherever you went, and I cut off all your enemies from
    before you. And I will make for you a great name, like the name of the great ones
    who are on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great renown.' Hebrew 'name' often carries the sense of reputation or
      fame, but the main text preserves the biblical idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the name of the great men who are on the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶהְיֶה
  chosen: I was
  alternatives:
  - I have been
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה in past narrative sequence is best rendered as simple
    past, continuing the recounting of the LORD's prior actions for David.
- source_word: עִמְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating presence and support; 'with
    you' preserves both literal and covenantal nuance.
- source_word: בְּכֹל אֲשֶׁר הָלַכְתָּ
  chosen: wherever you went
  alternatives:
  - in all that you went
  - everywhere you walked
  lexicon: HALOT
  rationale: Idiomatic Hebrew for all places/circumstances of David's movements. 'Wherever
    you went' is natural English and preserves the comprehensive scope.
- source_word: וָאַכְרִתָה
  chosen: I cut off
  alternatives:
  - I destroyed
  - I wiped out
  lexicon: HALOT
  rationale: From כרת in the Hiphil, here meaning to cut off/remove. 'I cut off' preserves
    the concrete Hebrew idiom and its force better than a more interpretive gloss.
- source_word: אֶת כָּל אֹיְבֶיךָ
  chosen: all your enemies
  lexicon: HALOT
  rationale: Direct object phrase straightforwardly rendered; 'all' should be retained
    for the totalizing claim.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' 'From before you' keeps the Hebrew
    spatial idiom and communicates removal from David's path or presence.
- source_word: וְעָשִׂיתִי לְךָ
  chosen: And I will make for you
  alternatives:
  - And I will make you
  - And I have made for you
  lexicon: HALOT
  rationale: The qatal here is naturally future in this promissory context following
    past acts; 'for you' reflects the lamed and avoids flattening the benefactive
    nuance.
- source_word: שֵׁם גָּדוֹל
  chosen: a great name
  alternatives:
  - great renown
  - a great reputation
  lexicon: HALOT
  rationale: Hebrew 'name' often carries the sense of renown, but retaining 'name'
    preserves the biblical idiom and intertextual resonance.
- source_word: כְּשֵׁם הַגְּדֹלִים
  chosen: like the name of the great ones
  alternatives:
  - like the renown of the great ones
  - like the name of the great men
  lexicon: HALOT
  rationale: The comparison is explicitly to the 'name' of the great ones, so repeating
    'name' preserves the Hebrew parallelism. 'Great ones' avoids over-specifying gender
    where the phrase denotes the mighty or renowned.
- source_word: אֲשֶׁר בָּאָרֶץ
  chosen: who are on the earth
  alternatives:
  - who are in the land
  - who are on earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth'; here the broad comparison to the renowned
    of the world favors 'earth' rather than a specific land.
