theological_decisions:
- issue: Temporal force of the final verb sequence in a divine promise context
  chosen_reading: 'Render וְעָשִׂיתִי as future: ''And I will make for you a great
    name'''
  alternative_readings:
  - 'Render as past/perfect: ''And I have made for you a great name'''
  rationale: Although formally a qatal, in this context of divine speech recounting
    past acts and then extending promise, English future best reflects the discourse
    flow and the parallel in 1 Chronicles 17:8. This avoids obscuring the promissory
    nature of the covenant speech.
