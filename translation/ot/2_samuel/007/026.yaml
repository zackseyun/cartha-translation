theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of 'house' in the Davidic promise
  chosen_reading: Retain 'house' in the main text while allowing the dynastic sense
    to be inferred from context
  alternative_readings:
  - dynasty
  - line
  rationale: The Hebrew term בַּיִת is lexically 'house,' but in 2 Samuel 7 it carries
    the covenantal sense of David's royal line. Retaining 'house' preserves the intertextual
    wordplay of the chapter without paraphrasing beyond the source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
