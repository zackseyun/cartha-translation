id: 2SA.7.26
reference: 2 Samuel 7:26
source:
  edition: WLC
  text: וְ/יִגְדַּ֨ל שִׁמְ/ךָ֤ עַד עוֹלָם֙ לֵ/אמֹ֔ר יְהוָ֣ה צְבָא֔וֹת אֱלֹהִ֖ים עַל
    יִשְׂרָאֵ֑ל וּ/בֵית֙ עַבְדְּ/ךָ֣ דָוִ֔ד יִהְיֶ֥ה נָכ֖וֹן לְ/פָנֶֽי/ךָ־־׃
translation:
  text: And may your name be magnified forever, saying, ‘The LORD of hosts is God
    over Israel,’ and may the house of your servant David be established before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may your name be made great forever.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to David''s household or dynasty, not merely a physical
      building.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיִגְדַּל
  chosen: And may ... be magnified
  alternatives:
  - and let ... be great
  - and may ... grow great
  lexicon: HALOT
  rationale: The jussive/imperfect expresses a wish or prayer in context, so 'may
    ... be' captures the volitional force. 'Be magnified' renders the passive/resultative
    sense naturally in English with 'name' as subject, preserving the idea of God's
    name being shown great rather than physically increasing.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Standard rendering; in Hebrew 'name' often denotes reputation, renown,
    or revealed identity, but 'your name' preserves the idiom without over-interpreting.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - unto eternity
  lexicon: HALOT
  rationale: Idiomatic English for enduring perpetuity; concise and natural while
    preserving the temporal force.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - so that people say
  - with the words
  lexicon: HALOT
  rationale: Retains the Hebrew quotative linkage to the confession that follows.
    A more explicit dynamic rendering is possible, but 'saying' best preserves the
    structure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the divine title, preserving
    its breadth beyond merely human military forces.
- source_word: אֱלֹהִים עַל יִשְׂרָאֵל
  chosen: is God over Israel
  alternatives:
  - is God for Israel
  - is God concerning Israel
  lexicon: HALOT
  rationale: The preposition עַל most naturally conveys authority or sovereignty here.
    'Over Israel' fits the confessional statement and avoids flattening it to mere
    association.
- source_word: וּבֵית עַבְדְּךָ דָוִד
  chosen: and may the house of your servant David
  alternatives:
  - and the house of your servant David
  - and may David your servant's house
  lexicon: HALOT
  rationale: '''House'' here refers to dynasty/lineage, but the literal term is retained
    in the main text because the dynastic sense is contextually clear from 2 Samuel
    7. The jussive nuance carries over from the prayer context with ''may''.'
- source_word: יִהְיֶה נָכוֹן
  chosen: be established
  alternatives:
  - be made firm
  - be secure
  - stand firm
  lexicon: HALOT
  rationale: נָכוֹן with היה conveys firmness, stability, and establishment. 'Be established'
    is idiomatic in covenant/dynastic contexts and matches the promise language of
    the chapter.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: A direct and natural rendering that preserves the relational and covenantal
    sense of standing before God.
