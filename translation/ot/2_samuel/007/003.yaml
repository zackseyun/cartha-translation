id: 2SA.7.3
reference: 2 Samuel 7:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר נָתָן֙ אֶל הַ/מֶּ֔לֶךְ כֹּ֛ל אֲשֶׁ֥ר בִּֽ/לְבָבְ/ךָ֖ לֵ֣ךְ עֲשֵׂ֑ה
    כִּ֥י יְהוָ֖ה עִמָּֽ/ךְ־׃ס
translation:
  text: And Nathan said to the king, “Go, do all that is in your heart, for the LORD
    is with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Go and do all that is in your heart.” The Hebrew idiom can also be
      expressed as “all that is on your heart.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural
    English narrative rendering that preserves the sequence without overinterpreting
    the connective.
- source_word: נָתָן
  chosen: Nathan
  rationale: Personal names are transliterated by standard English convention.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to King David
  lexicon: HALOT
  rationale: The Hebrew reads the common noun with article, not the proper name. 'To
    the king' is the most direct rendering; identifying him as David would import
    context not stated in this verse.
- source_word: כֹּל אֲשֶׁר בִּלְבָבְךָ
  chosen: all that is in your heart
  alternatives:
  - everything that is in your heart
  - all that is on your heart
  - all that is in your mind
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner will, intention, or resolve, not merely
    emotion. 'In your heart' preserves the Hebrew idiom while remaining understandable
    in modern English.
- source_word: לֵךְ עֲשֵׂה
  chosen: Go, do
  alternatives:
  - Go and do
  - Proceed, do
  lexicon: HALOT
  rationale: The paired imperatives convey prompt permission/encouragement. 'Go, do'
    is concise and natural; English readers readily understand the idiomatic force
    as 'go ahead and do' without adding words not present.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Nathan's counsel. 'For' preserves
    the explanatory force in a slightly more formal but still clear register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: עִמָּךְ
  chosen: is with you
  alternatives:
  - is with you in support
  - is on your side
  lexicon: HALOT
  rationale: The preposition with pronominal suffix expresses presence/accompaniment.
    'Is with you' preserves the covenantal and theological resonance without expanding
    the sense.
