id: 2SA.7.23
reference: 2 Samuel 7:23
source:
  edition: WLC
  text: וּ/מִ֤י כְ/עַמְּ/ךָ֙ כְּ/יִשְׂרָאֵ֔ל גּ֥וֹי אֶחָ֖ד בָּ/אָ֑רֶץ אֲשֶׁ֣ר הָלְכֽוּ
    אֱ֠לֹהִים לִ/פְדּֽוֹת ל֨/וֹ לְ/עָ֜ם וְ/לָ/שׂ֧וּם ל֣/וֹ שֵׁ֗ם וְ/לַ/עֲשׂ֨וֹת לָ/כֶ֜ם
    הַ/גְּדוּלָּ֤ה וְ/נֹֽרָאוֹת֙ לְ/אַרְצֶ֔/ךָ מִ/פְּנֵ֣י עַמְּ/ךָ֗ אֲשֶׁ֨ר פָּדִ֤יתָ
    לְּ/ךָ֙ מִ/מִּצְרַ֔יִם גּוֹיִ֖ם וֵ/אלֹהָֽי/ו־־׃
translation:
  text: And who is like your people, like Israel, the one nation on the earth whom
    God went to redeem for himself as a people, and to make a name for himself, and
    to do for you great and fearsome things for your land, before your people whom
    you redeemed for yourself from Egypt, from nations and their gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great and awesome things.' The Hebrew term can denote deeds that inspire
      awe, dread, or fear.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in Hebrew; alternatively, 'from Egypt, the
      nations and its god' or 'from Egypt, nations and gods.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִי
  chosen: And who is like
  alternatives:
  - And who is as
  - And what one is like
  lexicon: HALOT
  rationale: Introduces a rhetorical question of incomparability. 'And who is like'
    is idiomatic modern English and preserves the comparative force.
- source_word: כְעַמְּךָ כְיִשְׂרָאֵל
  chosen: your people, like Israel
  alternatives:
  - your people, as Israel
  - your people Israel
  lexicon: HALOT
  rationale: Retains the appositional comparison structure rather than collapsing
    it entirely; this preserves the emphatic identification of Israel as God's unique
    people.
- source_word: גּוֹי אֶחָד בָּאָרֶץ
  chosen: the one nation on the earth
  alternatives:
  - one nation in the earth
  - a unique nation on earth
  lexicon: HALOT
  rationale: The phrase stresses Israel's uniqueness among the nations. 'The one nation
    on the earth' best captures the rhetorical superlative in context.
- source_word: אֲשֶׁר הָלְכוּ אֱלֹהִים
  chosen: whom God went
  alternatives:
  - for whom God went
  - which God went out
  lexicon: HALOT
  rationale: Although אֱלֹהִים is morphologically plural, the sense here is singular
    with Israel's God as subject. 'Went' preserves the concrete verbal imagery of
    divine action rather than flattening it to 'acted'.
- source_word: לִפְדּוֹת לוֹ לְעָם
  chosen: to redeem for himself as a people
  alternatives:
  - to ransom for himself as a people
  - to redeem to himself for a people
  lexicon: HALOT
  rationale: פדה carries redemption/ransom language; 'redeem' is the standard theological
    and lexical equivalent. 'For himself as a people' reflects both the pronominal
    and covenantal result.
- source_word: וְלָשׂוּם לוֹ שֵׁם
  chosen: and to make a name for himself
  alternatives:
  - and to set for himself a name
  - and to establish a name for himself
  lexicon: HALOT
  rationale: This idiom refers to gaining renown through mighty acts. 'Make a name
    for himself' is natural English and preserves the idiomatic force.
- source_word: וְלַעֲשׂוֹת לָכֶם
  chosen: and to do for you
  alternatives:
  - and to perform for you
  - and to act for you
  lexicon: HALOT
  rationale: The Masoretic Text has second person plural ('for you'), likely addressing
    Israel collectively within the prayer. It is retained rather than emended in the
    main text.
- source_word: הַגְּדוּלָּה וְנֹרָאוֹת
  chosen: great and fearsome things
  alternatives:
  - great and awesome things
  - great things and terrors
  lexicon: HALOT
  rationale: נוראות denotes deeds that inspire awe and dread. 'Fearsome' preserves
    that stronger edge better than the now-softened English 'awesome,' though the
    latter remains a viable alternative.
- source_word: לְאַרְצְךָ
  chosen: for your land
  alternatives:
  - for your country
  - for your earth/land
  lexicon: HALOT
  rationale: אֶרֶץ here refers to Israel's land in covenant-historical context. 'Land'
    is the most natural and contextually precise rendering.
- source_word: מִפְּנֵי עַמְּךָ
  chosen: before your people
  alternatives:
  - from before your people
  - because of your people
  lexicon: HALOT
  rationale: מִפְּנֵי can denote 'from before' in contexts of driving out. Here 'before
    your people' works idiomatically in English while preserving the spatial sense
    of nations being displaced ahead of Israel.
- source_word: אֲשֶׁר פָּדִיתָ לְּךָ מִמִּצְרַיִם
  chosen: whom you redeemed for yourself from Egypt
  alternatives:
  - whom you ransomed for yourself out of Egypt
  lexicon: HALOT
  rationale: Repetition of פדה should be reflected consistently with 'redeemed.' 'For
    yourself' preserves the covenantal possession implied by לְּךָ.
- source_word: גּוֹיִם וֵאלֹהָיו
  chosen: from nations and their gods
  alternatives:
  - nations and its gods
  - the nations and their gods
  lexicon: HALOT
  rationale: 'The phrase is difficult syntactically, but most naturally refers to
    what was driven out before Israel in connection with the exodus/conquest tradition:
    nations and their gods. ''Their gods'' resolves the singular suffix distributively
    in idiomatic English.'
