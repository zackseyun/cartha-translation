theological_decisions:
- issue: Number and referent of אֱלֹהִים
  chosen_reading: singular 'God' referring to Israel's God
  alternative_readings:
  - plural 'gods'
  rationale: In this context the verb and discourse clearly point to the God of Israel
    acting uniquely on behalf of his people. Rendering it as plural would distort
    the monotheistic sense of the passage.
- issue: Syntactically difficult closing phrase גּוֹיִם וֵאלֹהָיו
  chosen_reading: '''from nations and their gods'' as the objects displaced before
    Israel'
  alternative_readings:
  - '''from Egypt, the nations and its god'''
  - '''from Egypt, nations and gods'''
  rationale: The Hebrew ending is textually and syntactically compressed. The chosen
    reading best fits the broader biblical theme of God redeeming Israel and driving
    out nations and their gods before them, while preserving the difficult wording
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
