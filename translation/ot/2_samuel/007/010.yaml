id: 2SA.7.10
reference: 2 Samuel 7:10
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֣י מָ֠קוֹם לְ/עַמִּ֨/י לְ/יִשְׂרָאֵ֤ל וּ/נְטַעְתִּי/ו֙ וְ/שָׁכַ֣ן
    תַּחְתָּ֔י/ו וְ/לֹ֥א יִרְגַּ֖ז ע֑וֹד וְ/לֹֽא יֹסִ֤יפוּ בְנֵֽי עַוְלָה֙ לְ/עַנּוֹת֔/וֹ
    כַּ/אֲשֶׁ֖ר בָּ/רִאשׁוֹנָֽה־־׃
translation:
  text: And I will appoint a place for my people Israel and plant them, so that they
    may dwell in their own place and be disturbed no more. And the sons of wickedness
    shall no longer afflict them, as formerly,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''evildoers'' or ''wicked men.'' Hebrew: ''sons of wickedness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: I will appoint
  alternatives:
  - I will set
  - I will establish
  lexicon: HALOT
  rationale: שׂוּם literally means 'set/place,' but with מָקוֹם as object in this
    promise context it carries the sense of assigning or appointing a place. 'Appoint'
    is natural English while preserving divine initiative.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a מקום/settled place
  - a homeland
  lexicon: HALOT
  rationale: Basic sense is 'place.' 'Homeland' would over-interpret; 'place' keeps
    the wording broad enough to include secure settlement in the land.
- source_word: לְעַמִּי לְיִשְׂרָאֵל
  chosen: for my people Israel
  alternatives:
  - for my people, for Israel
  - for Israel my people
  lexicon: HALOT
  rationale: The double phrase is appositional. 'For my people Israel' preserves both
    covenantal possession ('my people') and the national identifier ('Israel').
- source_word: וּנְטַעְתִּיו
  chosen: and plant them
  alternatives:
  - and plant him
  - and establish them
  lexicon: HALOT
  rationale: The ketiv-like consonantal form with 3ms suffix is commonly understood
    collectively with Israel as a people; English idiom prefers plural 'them.' 'Plant'
    preserves the agricultural metaphor of secure establishment better than the abstract
    'establish.'
- source_word: וְשָׁכַן
  chosen: so that they may dwell
  alternatives:
  - and he/it will dwell
  - and dwell
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb follows the collective singular
    Israel and expresses result/purpose after God's planting. Rendering with plural
    'they' matches the collective referent in English and avoids awkward singular
    national personification.
- source_word: תַּחְתָּיו
  chosen: in their own place
  alternatives:
  - under it
  - beneath him
  - in its place
  lexicon: HALOT
  rationale: תַּחַת can mean 'under' or, idiomatically in settlement contexts, 'in
    one's place/in place of.' Here the sense is settled security in the assigned location,
    not spatial subordination. 'In their own place' conveys the idiom clearly.
- source_word: יִרְגַּז
  chosen: be disturbed
  alternatives:
  - be shaken
  - tremble
  - be agitated
  lexicon: HALOT
  rationale: רגז can denote trembling, agitation, or being disturbed. In context of
    national security from oppressors, 'be disturbed' captures external destabilization
    better than an inward emotional sense.
- source_word: עוֹד
  chosen: no more
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: With negation, עוֹד idiomatically means cessation into the future. 'No
    more' is concise and idiomatic.
- source_word: יֹסִיפוּ
  chosen: shall no longer
  alternatives:
  - will not continue to
  - will not again
  lexicon: HALOT
  rationale: יסף in Hiphil with negation means 'continue/add to.' In English, 'shall
    no longer' naturally conveys cessation of repeated action.
- source_word: בְנֵי עַוְלָה
  chosen: the sons of wickedness
  alternatives:
  - wicked men
  - evildoers
  - sons of injustice
  lexicon: HALOT
  rationale: Literally 'sons of wickedness/injustice.' To remain gender-accurate and
    preserve the Hebrew idiom's force, the main text keeps 'sons of wickedness,' while
    a footnote preserves the more idiomatic alternative 'evildoers.'
- source_word: לְעַנּוֹתוֹ
  chosen: afflict them
  alternatives:
  - humble them
  - oppress them
  lexicon: HALOT
  rationale: ענה in the Piel can mean afflict, oppress, or humble. In this context
    of hostile treatment by wicked oppressors, 'afflict' is broad and fitting. The
    object is rendered plural in English to match the collective referent Israel.
- source_word: כַּאֲשֶׁר בָּרִאשׁוֹנָה
  chosen: as formerly
  alternatives:
  - as at the first
  - as before
  lexicon: HALOT
  rationale: The phrase points back to earlier periods of oppression. 'As formerly'
    is concise, natural, and faithful to the temporal comparison.
