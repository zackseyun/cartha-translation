theological_decisions:
- issue: Collective singular Israel represented by singular suffixes and verbs
  chosen_reading: Render the collective referent with English plurals ('them,' 'they')
    where required for natural English
  alternative_readings:
  - Maintain singular personification throughout ('plant him ... he may dwell ...
    afflict him')
  rationale: Hebrew often treats a people as a collective singular. English can preserve
    the sense more clearly with plural pronouns when the referent is the nation as
    a people. This is a linguistic, not doctrinal, decision.
  doctrine_reference: Translation philosophy §6; §5 documented exception for context
- issue: Idiomatic expression בְנֵי עַוְלָה
  chosen_reading: Preserve the literal idiom in the main text as 'sons of wickedness'
  alternative_readings:
  - evildoers
  - wicked men
  rationale: The Hebrew is explicitly masculine and idiomatic. Per the gender-accurate
    policy, the masculine form should not be flattened without note. A footnote can
    preserve the idiomatic English alternative.
  doctrine_reference: Translation philosophy §4
