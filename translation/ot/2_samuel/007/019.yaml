theological_decisions:
- issue: Interpretation of the difficult clause וְזֹאת תּוֹרַת הָאָדָם
  chosen_reading: and this is the instruction for man
  alternative_readings:
  - and this is the charter for humanity
  - and this is the law/custom of man
  - and this is the instruction concerning mankind
  rationale: The Hebrew phrase is notoriously difficult and has received varied interpretations.
    The translation keeps close to the lexical components ('this' + 'instruction'
    + 'man') rather than importing a more interpretive dynastic or messianic paraphrase.
    Because the ambiguity is genuine, alternatives are preserved in a footnote rather
    than resolved dogmatically in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for אָדָם
