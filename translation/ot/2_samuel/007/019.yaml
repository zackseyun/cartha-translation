id: 2SA.7.19
reference: 2 Samuel 7:19
source:
  edition: WLC
  text: וַ/תִּקְטַן֩ ע֨וֹד זֹ֤את בְּ/עֵינֶ֨י/ךָ֙ אֲדֹנָ֣/י יְהוִ֔ה וַ/תְּדַבֵּ֛ר גַּ֥ם
    אֶל בֵּֽית עַבְדְּ/ךָ֖ לְ/מֵֽ/רָח֑וֹק וְ/זֹ֛את תּוֹרַ֥ת הָ/אָדָ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: And even this was too small in your eyes, Lord GOD; you have also spoken about
    your servant’s house for a long time to come, and this is the instruction for
    man, Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the distant future.' The phrase refers to what lies far ahead in
      time.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house,' which can mean household or dynasty.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew of the final clause is difficult. It may also mean 'this is the
      charter for humanity' or 'this is the law/custom of man.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְטַן
  chosen: was too small
  alternatives:
  - seemed small
  - was a small thing
  lexicon: HALOT
  rationale: From קטן, 'to be small.' In context David says the prior promise was
    not enough/was a small thing in God's sight. 'Was too small' captures the idiomatic
    sense without overparaphrasing.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or estimation. 'In your eyes' preserves
    the metaphor directly and remains natural English.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD' ordinarily;
    in the compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by
    rendering 'Lord GOD.' This preserves the title distinction while respecting the
    default treatment of the divine name.
- source_word: וַתְּדַבֵּר גַּם אֶל
  chosen: you have also spoken about
  alternatives:
  - you also spoke concerning
  - you have spoken further about
  lexicon: HALOT
  rationale: The verb דבר with אֶל can be rendered 'speak to/concerning.' Here the
    content concerns David's dynasty, so 'spoken about' is the clearest idiomatic
    English.
- source_word: בֵּית עַבְדְּךָ
  chosen: your servant’s house
  alternatives:
  - the house of your servant
  - your servant’s dynasty
  lexicon: HALOT
  rationale: Literally 'house of your servant.' 'House' is retained in the main text
    because it is the source term and can denote household/dynasty; the dynastic nuance
    is important but better preserved in notes than substituted in the text.
- source_word: לְמֵרָחוֹק
  chosen: for a long time to come
  alternatives:
  - far into the future
  - for the distant future
  - afar off
  lexicon: HALOT
  rationale: Literally 'to/from far off,' idiomatically referring to the distant future.
    'For a long time to come' communicates temporal force in readable English.
- source_word: וְזֹאת
  chosen: and this
  alternatives:
  - and this too
  lexicon: HALOT
  rationale: Simple demonstrative introducing the difficult final clause; retained
    straightforwardly.
- source_word: תּוֹרַת
  chosen: instruction
  alternatives:
  - law
  - charter
  - custom
  lexicon: HALOT
  rationale: תורה can mean instruction, law, or directive. 'Instruction' is broad
    and avoids prematurely narrowing the difficult phrase to legal code.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' by context. Here
    the singular with article is difficult and traditionally rendered 'man'; the main
    text preserves the gender-accurate singular while a footnote preserves the broader
    alternative.
