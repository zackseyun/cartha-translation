id: 2SA.18.28
reference: 2 Samuel 18:28
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א אֲחִימַ֗עַץ וַ/יֹּ֤אמֶר אֶל הַ/מֶּ֨לֶךְ֙ שָׁל֔וֹם וַ/יִּשְׁתַּ֧חוּ לַ/מֶּ֛לֶךְ לְ/אַפָּ֖י/ו אָ֑רְצָ/ה וַ/יֹּ֗אמֶר בָּרוּךְ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֲשֶׁ֤ר סִגַּר֙ אֶת הָ֣/אֲנָשִׁ֔ים אֲשֶׁר נָשְׂא֥וּ אֶת יָדָ֖/ם בַּֽ/אדֹנִ֥/י הַ/מֶּֽלֶךְ־ס־־־׃
translation:
  text: Ahimaaz called out and said to the king, “Peace!” Then he bowed down before the king with his face to the ground and said, “Blessed be Yahweh your God, who has delivered up the men who lifted their hand against my lord the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All is well!' The Hebrew shalom can function as a report of well-being or favorable news, not only as a greeting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has delivered up' or 'has handed over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  chosen: Peace!
  alternatives:
  - All is well!
  - Greetings!
  lexicon: HALOT
  rationale: In messenger/report context, שָׁלוֹם can function as a report of well-being or favorable outcome, not merely a greeting. 'Peace!' preserves the Hebrew term's compact force and allows the narrative to unfold without over-interpreting it.
- source_word: וַיִּשְׁתַּחוּ
  chosen: he bowed down
  alternatives:
  - he prostrated himself
  - he paid homage
  lexicon: HALOT
  rationale: The verb denotes bodily prostration/bowing. 'He bowed down' is readable modern English and fits the following phrase 'with his face to the ground,' which supplies the physical detail. 'Paid homage' would foreground interpretation over the concrete action.
- source_word: לְאַפָּיו אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - on his face to the ground
  - face-down to the earth
  lexicon: HALOT
  rationale: This idiom describes full prostration. 'With his face to the ground' is natural English and preserves the vivid bodily posture.
- source_word: בָּרוּךְ יְהוָה אֱלֹהֶיךָ
  chosen: Blessed be the LORD your God
  alternatives:
  - May the LORD your God be blessed
  - Blessed is the LORD your God
  lexicon: HALOT
  rationale: A conventional blessing formula. 'Blessed be' captures the doxological tone in idiomatic English. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סִגַּר
  chosen: has delivered up
  alternatives:
  - has handed over
  - has given over
  lexicon: HALOT
  rationale: The verb means to hand over/deliver into another's power. 'Has delivered up' fits the military-judicial context of enemies being given into the king's hand and avoids the possible ambiguity of 'shut up/confined' in English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - those men
  lexicon: HALOT
  rationale: The masculine plural here refers to the specific male opponents involved in the uprising. 'The men' is gender-accurate and contextually precise.
- source_word: נָשְׂאוּ אֶת יָדָם
  chosen: lifted their hand against
  alternatives:
  - raised their hand against
  - rebelled against
  lexicon: HALOT
  rationale: This idiom denotes hostile action or rebellion. 'Lifted their hand against' preserves the Hebrew imagery while remaining understandable; 'rebelled against' is interpretive and less concrete.
- source_word: בַּאדֹנִי הַמֶּלֶךְ
  chosen: against my lord the king
  alternatives:
  - against my master the king
  lexicon: HALOT
  rationale: אדֹנִי here is a courtly address to David. 'My lord the king' preserves the deferential register better than 'my master,' which can sound socially misleading in modern English.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - called
  lexicon: HALOT
  rationale: The verb likely indicates raising his voice to announce himself/report to the king from a distance. 'Called out' captures that narrative sense more clearly than the flatter 'called'.
