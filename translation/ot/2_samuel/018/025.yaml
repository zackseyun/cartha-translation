id: 2SA.18.25
reference: 2 Samuel 18:25
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א הַ/צֹּפֶה֙ וַ/יַּגֵּ֣ד לַ/מֶּ֔לֶךְ וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ אִם
    לְ/בַדּ֖/וֹ בְּשׂוֹרָ֣ה בְּ/פִ֑י/ו וַ/יֵּ֥לֶךְ הָל֖וֹךְ וְ/קָרֵֽב־׃
translation:
  text: Then the watchman called out and told the king. And the king said, “If he
    is by himself, there is good news in his mouth.” And he kept coming nearer and
    nearer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “there is news in his mouth.” The Hebrew noun can mean simply “news,”
      though in this context it likely implies favorable news.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The participial/nominal form from צפה refers to one stationed to watch.
    'Watchman' is natural English and fits the military/city-wall context better than
    the more modern 'lookout,' while preserving the role.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - called
  lexicon: HALOT
  rationale: קרא here denotes raising the voice to announce what the watchman sees.
    'Called out' captures the public, audible announcement better than the flatter
    'called.'
- source_word: וַיַּגֵּד לַמֶּלֶךְ
  chosen: told the king
  alternatives:
  - reported to the king
  - announced to the king
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told the king' is
    concise and idiomatic; the reporting sense is already implied by context.
- source_word: אִם לְבַדּוֹ
  chosen: If he is by himself
  alternatives:
  - If he is alone
  - If he comes alone
  lexicon: HALOT
  rationale: לבדו means 'by himself/alone.' Supplying 'is' makes good English. 'Comes
    alone' is possible contextually, but the Hebrew more directly states his solitary
    condition rather than repeating the motion verb.
- source_word: בְּשׂוֹרָה
  chosen: good news
  alternatives:
  - news
  - tidings
  lexicon: HALOT
  rationale: בשׂורה denotes news, often favorable news in narrative contexts like
    this one. Since David infers a lone runner likely bears a positive report, 'good
    news' best reflects the lexical and contextual sense.
- source_word: בְּפִיו
  chosen: in his mouth
  alternatives:
  - on his lips
  - to tell
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in his mouth.' Retaining the image preserves
    the source texture while remaining understandable in English.
- source_word: וַיֵּלֶךְ הָלוֹךְ וְקָרֵב
  chosen: he kept coming nearer and nearer
  alternatives:
  - he went on, coming near
  - he continued approaching
  lexicon: HALOT
  rationale: This construction expresses continued action with increasing proximity.
    'He kept coming nearer and nearer' conveys the iterative/progressive force naturally
    in English better than a more wooden rendering.
