id: 2SA.18.22
reference: 2 Samuel 18:22
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף ע֜וֹד אֲחִימַ֤עַץ בֶּן צָדוֹק֙ וַ/יֹּ֣אמֶר אֶל יוֹאָ֔ב וִ֣/יהִי
    מָ֔ה אָרֻֽצָה נָּ֥א גַם אָ֖נִי אַחֲרֵ֣י הַ/כּוּשִׁ֑י וַ/יֹּ֣אמֶר יוֹאָ֗ב לָֽ/מָּה
    זֶּ֞ה אַתָּ֥ה רָץ֙ בְּנִ֔/י וּ/לְ/כָ֖ה אֵין בְּשׂוֹרָ֥ה מֹצֵֽאת־־־־־־׃
translation:
  text: Then Ahimaaz son of Zadok said again to Joab, “Whatever happens, please let
    me also run after the Cushite.” But Joab said, “Why is this, my son, that you
    are running, when you have no message that will bring reward?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Come what may, please let me also run after the Cushite.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clause is difficult; it may mean 'you have no news
      that will be favorably received' or 'you will get no reward for the news.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  chosen: said again
  alternatives:
  - continued and said
  - added further
  lexicon: HALOT
  rationale: The idiom literally means 'added again' and functions as a discourse
    marker indicating repeated speech. 'Said again' is natural English and preserves
    the sense of renewed request.
- source_word: וִיהִי מָה
  chosen: Whatever happens
  alternatives:
  - Come what may
  - Let it be whatever it may
  lexicon: HALOT
  rationale: This idiomatic expression conveys indifference to consequences or outcome.
    'Whatever happens' is clear modern English and fits the context of Ahimaaz pressing
    his request despite Joab's reluctance.
- source_word: אָרֻצָה נָּא
  chosen: please let me ... run
  alternatives:
  - please let me run
  - please, I will run
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite but earnest request. English
    supplies 'let me' to convey the volitional nuance naturally.
- source_word: גַם אֲנִי
  chosen: me also
  alternatives:
  - I too
  - I also
  lexicon: HALOT
  rationale: This emphasizes Ahimaaz's desire to join as an additional runner. 'Me
    also' fits the request structure after 'let'.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: '''Cushite'' is the more direct and historically grounded rendering of
    the ethnonym, avoiding anachronistic geographic assumptions tied to ''Ethiopian.'''
- source_word: לָמָּה זֶּה
  chosen: Why is this
  alternatives:
  - Why this
  - Why do you want this
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic and expresses Joab's puzzled objection.
    'Why is this' preserves the demonstrative force without over-paraphrasing.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: This is likely an affectionate or patronizing address rather than literal
    filiation. 'My son' preserves the relational tone.
- source_word: אֵין בְּשׂוֹרָה מֹצֵאת
  chosen: you have no message that will bring reward
  alternatives:
  - there is no good news finding
  - you will not get a reward for the news
  - there is no favorable message resulting
  lexicon: HALOT
  rationale: The Hebrew is elliptical and difficult. In context Joab's point is that
    Ahimaaz has no report whose delivery would profit him or earn recognition. 'Message
    that will bring reward' captures the likely idiomatic sense of מֹצֵאת as something
    yielding a favorable outcome.
