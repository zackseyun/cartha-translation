id: 2SA.18.2
reference: 2 Samuel 18:2
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֨ח דָּוִ֜ד אֶת הָ/עָ֗ם הַ/שְּׁלִשִׁ֤ית בְּ/יַד יוֹאָב֙ וְ֠/הַ/שְּׁלִשִׁית
    בְּ/יַ֨ד אֲבִישַׁ֤י בֶּן צְרוּיָה֙ אֲחִ֣י יוֹאָ֔ב וְ/הַ֨/שְּׁלִשִׁ֔ת בְּ/יַ֖ד
    אִתַּ֣י הַ/גִּתִּ֑י וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל הָ/עָ֔ם יָצֹ֥א אֵצֵ֛א גַּם אֲנִ֖י
    עִמָּ/כֶֽם־־־ס־־׃
translation:
  text: 'David sent out the troops: one third under Joab, one third under Abishai
    son of Zeruiah, Joab’s brother, and one third under Ittai the Gittite. And the
    king said to the troops, “I myself will surely go out with you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in the hand of,' an idiom meaning 'under the authority/command
      of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent out
  alternatives:
  - dispatched
  - sent
  lexicon: HALOT
  rationale: In this military context, the verb refers to sending forces into action.
    'Sent out' is natural English and preserves the directional nuance better than
    simply 'sent.'
- source_word: הָעָם
  chosen: the troops
  alternatives:
  - the people
  - the army
  - the men
  lexicon: HALOT
  rationale: Although literally 'the people,' in this immediate battle setting it
    refers specifically to David's fighting force. 'The troops' conveys the contextual
    referent without over-paraphrasing.
- source_word: הַשְּׁלִשִׁית / הַשְּׁלִשִׁת
  chosen: one third
  alternatives:
  - the third part
  - a third
  lexicon: HALOT
  rationale: The repeated feminine form denotes each third division of the force.
    'One third' is clear, idiomatic, and preserves the tripartite division.
- source_word: בְּיַד
  chosen: under
  alternatives:
  - in the hand of
  - under the command of
  lexicon: HALOT
  rationale: Literally 'in the hand of,' this idiom indicates authority or command.
    'Under' is concise and idiomatic in English military style while preserving the
    sense of assigned command.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה אֲחִי יוֹאָב
  chosen: Abishai son of Zeruiah, Joab’s brother
  alternatives:
  - Abishai the son of Zeruiah, brother of Joab
  lexicon: HALOT
  rationale: This preserves the familial identification in a natural English appositional
    structure.
- source_word: אִתַּי הַגִּתִּי
  chosen: Ittai the Gittite
  lexicon: HALOT
  rationale: Standard transliteration of the personal name and gentilic; 'the Gittite'
    identifies him as from Gath.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: And the king said
  alternatives:
  - Then the king said
  lexicon: HALOT
  rationale: Narrative waw plus verb is well represented by 'And ... said' here; retaining
    'the king' matches the Hebrew designation in context.
- source_word: יָצֹא אֵצֵא
  chosen: I myself will surely go out
  alternatives:
  - I too will go out
  - I will certainly go out
  - Going out, I will go out
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the statement. 'Will
    surely go out' captures the emphasis, and 'I myself' reflects the explicit pronoun
    plus גַּם אֲנִי.
- source_word: גַּם אֲנִי
  chosen: I myself
  alternatives:
  - I too
  - even I
  lexicon: HALOT
  rationale: The phrase adds emphasis to the king's personal participation. 'I myself'
    communicates emphasis more clearly in English than 'even I' in this context.
- source_word: עִמָּכֶם
  chosen: with you
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating accompaniment in battle.
