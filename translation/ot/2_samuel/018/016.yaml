id: 2SA.18.16
reference: 2 Samuel 18:16
source:
  edition: WLC
  text: וַ/יִּתְקַ֤ע יוֹאָב֙ בַּ/שֹּׁפָ֔ר וַ/יָּ֣שָׁב הָ/עָ֔ם מִ/רְדֹ֖ף אַחֲרֵ֣י יִשְׂרָאֵ֑ל
    כִּֽי חָשַׂ֥ךְ יוֹאָ֖ב אֶת הָ/עָֽם־־׃
translation:
  text: Then Joab blew the trumpet, and the people turned back from pursuing Israel,
    because Joab held back the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the horn.' Hebrew shofar refers to a signaling horn, often a ram's horn;
      'trumpet' is the idiomatic military rendering here.
    reason: lexical_alternative
  - marker: b
    text: That is, the forces of Israel aligned with Absalom.
    reason: cultural_note
  - marker: c
    text: Or 'restrained the people' or 'spared the people.' The Hebrew verb can carry
      the sense of withholding or restraining; here it most likely means Joab stopped
      his men from continuing the pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַע
  chosen: blew
  alternatives:
  - sounded
  - blew a blast
  lexicon: HALOT
  rationale: With שׁוֹפָר as the instrument, the verb תקע idiomatically means to blow/sound
    a horn or trumpet. 'Blew' is natural modern English and preserves the concrete
    action.
- source_word: בַּשֹּׁפָר
  chosen: the trumpet
  alternatives:
  - the horn
  - the ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is a horn used for signaling. 'Trumpet' is the most idiomatic
    English rendering in narrative military contexts, though 'horn' is more concrete.
    The definite article is retained.
- source_word: וַיָּשָׁב הָעָם
  chosen: the people turned back
  alternatives:
  - the troops returned
  - the army turned back
  lexicon: HALOT
  rationale: שׁוּב here denotes turning back/returning. הָעָם in this military setting
    refers to Joab's fighting force, but 'the people' closely follows the Hebrew while
    remaining intelligible.
- source_word: מִרְדֹף
  chosen: from pursuing
  alternatives:
  - from chasing
  - from continuing to pursue
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive construct expresses cessation:
    they turned back from pursuing. ''Pursuing'' fits the military context better
    than the more colloquial ''chasing''.'
- source_word: אַחֲרֵי יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the men of Israel
  lexicon: HALOT
  rationale: אַחֲרֵי marks the object of pursuit, literally 'after Israel.' In context
    this means the Israelite forces aligned with Absalom. The main text keeps the
    proper name as in Hebrew; the more explicit sense is preserved as an alternative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי here gives the reason the pursuit stopped. 'Because' is clearer
    in contemporary English than the more formal 'for'.
- source_word: חָשַׂךְ
  chosen: held back
  alternatives:
  - restrained
  - spared
  - withheld
  lexicon: HALOT
  rationale: חשׂך can mean withhold, spare, or restrain depending on context. Here
    Joab stops his men from continuing the pursuit, so 'held back' best captures the
    practical military sense without overinterpreting motive. 'Spared' would suggest
    mercy toward the enemy rather than restraint of his own troops.
- source_word: אֶת הָעָם
  chosen: the people
  alternatives:
  - the troops
  - his men
  lexicon: HALOT
  rationale: As earlier in the verse, הָעָם refers to Joab's force. 'The people' preserves
    lexical consistency within the verse, while the military nuance is carried by
    context.
