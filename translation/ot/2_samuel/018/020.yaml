id: 2SA.18.20
reference: 2 Samuel 18:20
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר ל֣/וֹ יוֹאָ֗ב לֹא֩ אִ֨ישׁ בְּשֹׂרָ֤ה אַתָּה֙ הַ/יּ֣וֹם הַ/זֶּ֔ה
    וּ/בִשַּׂרְתָּ֖ בְּ/י֣וֹם אַחֵ֑ר וְ/הַ/יּ֤וֹם הַ/זֶּה֙ לֹ֣א תְבַשֵּׂ֔ר כִּֽי על
    בֶּן הַ/מֶּ֖לֶךְ מֵֽת־־׃
translation:
  text: Joab said to him, “You are not a man of news today. You may carry news on
    another day, but today you must not carry news, because the king’s son is dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a bearer of good news.” The Hebrew term can denote news or tidings,
      often favorable, but here the context is the death of the king’s son.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ בְּשֹׂרָה
  chosen: a man of news
  alternatives:
  - a bearer of good news
  - a messenger of news
  - one fit to bring news
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'a man of news/message.' Because the content
    is the death of Absalom, rendering it as 'good news' would over-specify and sound
    inappropriate in English context, even though בשׂרה can often denote good tidings.
    'A man of news' preserves the idiom's force while remaining natural enough in
    context.
- source_word: וּבִשַּׂרְתָּ
  chosen: You may carry news
  alternatives:
  - you shall bring news
  - you can bear tidings
  lexicon: HALOT
  rationale: The form functions here as a future-like statement following Joab's refusal
    for the present day. 'May carry news' captures permission/allowance in context
    better than a bare predictive future.
- source_word: תְבַשֵּׂר
  chosen: you must not carry news
  alternatives:
  - you shall not bring news
  - you are not to bear tidings
  lexicon: HALOT
  rationale: The imperfect with לא in direct speech here expresses prohibition for
    the present circumstance. 'Must not' conveys Joab's command more clearly in contemporary
    English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Joab's prohibition. 'Because' is the clearest
    modern English connector.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - the son of the king
  lexicon: HALOT
  rationale: Construct chain rendered in natural English while preserving the relational
    emphasis.
- source_word: מֵת
  chosen: is dead
  alternatives:
  - has died
  - died
  lexicon: HALOT
  rationale: 'The stative/resultative sense fits the immediate explanation: the king''s
    son is dead. ''Is dead'' is concise and idiomatic.'
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Repeated temporal phrase rendered idiomatically in modern English. 'Today'
    preserves the immediacy without archaic tone.
