id: 2SA.18.13
reference: 2 Samuel 18:13
source:
  edition: WLC
  text: אֽוֹ עָשִׂ֤יתִי ב/נפש/ו שֶׁ֔קֶר וְ/כָל דָּבָ֖ר לֹא יִכָּחֵ֣ד מִן הַ/מֶּ֑לֶךְ
    וְ/אַתָּ֖ה תִּתְיַצֵּ֥ב מִ/נֶּֽגֶד־־־־׃
translation:
  text: Or if I had dealt falsely against his life, and no matter is hidden from the
    king, then you yourself would have stood aside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you would have stood against me.' The Hebrew expression may denote
      standing apart from someone or standing in opposition to him; the context favors
      the sense that Joab would have withheld support and left the speaker exposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ
  chosen: Or
  alternatives:
  - Otherwise
  - Or else
  lexicon: HALOT
  rationale: Introduces an alternative hypothetical scenario in the speaker's argument.
    'Or' is the most natural concise rendering in context.
- source_word: עָשִׂיתִי
  chosen: I had dealt
  alternatives:
  - I had acted
  - I had done
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but with בְּנַפְשׁוֹ שֶׁקֶר it idiomatically
    refers to acting treacherously or wrongly toward someone's life. 'Had dealt' captures
    the idiomatic force better than a wooden 'had done'.
- source_word: בְּנַפְשׁוֹ
  chosen: against his life
  alternatives:
  - to his harm
  - against him
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life/self. In this context of killing
    Absalom, 'against his life' makes explicit the life-and-death sense without overparaphrasing.
- source_word: שֶׁקֶר
  chosen: falsely
  alternatives:
  - deceitfully
  - treacherously
  - a falsehood
  lexicon: HALOT
  rationale: 'Though literally ''falsehood,'' in this construction it functions adverbially/idiomatically:
    acting falsely or treacherously. ''Falsely'' preserves the lexical link while
    reading naturally in English.'
- source_word: וְכָל דָּבָר לֹא יִכָּחֵד מִן־הַמֶּלֶךְ
  chosen: and no matter is hidden from the king
  alternatives:
  - and nothing is concealed from the king
  - for every matter is not hidden from the king
  lexicon: HALOT
  rationale: 'This clause states a general truth supporting the hypothetical: the
    king would find out. ''No matter is hidden from the king'' is idiomatic and preserves
    the universal sense of כָּל דָּבָר.'
- source_word: וְאַתָּה
  chosen: you yourself
  alternatives:
  - you
  - and you
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'You yourself' reflects that emphasis
    in English.
- source_word: תִּתְיַצֵּב
  chosen: would have stood
  alternatives:
  - would have stationed yourself
  - would have taken your stand
  lexicon: HALOT
  rationale: The hitpael of יצב means to station oneself or take one's stand. In this
    context of refusing support, 'would have stood' is concise and natural.
- source_word: מִנֶּגֶד
  chosen: aside
  alternatives:
  - aloof
  - at a distance
  - against me
  lexicon: HALOT
  rationale: The preposition literally denotes being opposite/in front of, but in
    this idiom the sense is that Joab would not support him and would stand apart
    from him. 'Aside' best conveys the pragmatic force in context.
