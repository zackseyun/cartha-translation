id: 2SA.18.26
reference: 2 Samuel 18:26
source:
  edition: WLC
  text: וַ/יַּ֣רְא הַ/צֹּפֶה֮ אִישׁ אַחֵ֣ר רָץ֒ וַ/יִּקְרָ֤א הַ/צֹּפֶה֙ אֶל הַ/שֹּׁעֵ֔ר
    וַ/יֹּ֕אמֶר הִנֵּה אִ֖ישׁ רָ֣ץ לְ/בַדּ֑/וֹ וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ גַּם זֶ֥ה מְבַשֵּֽׂר־־־־׃
translation:
  text: Then the watchman saw another man running, and the watchman called to the
    gatekeeper and said, “Look, a man is running by himself.” And the king said, “This
    one also brings news.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “is a messenger”; the Hebrew participle can denote one who brings a
      report, often good news.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The participial form from צפה denotes one who keeps watch. 'Watchman'
    is natural, specific, and fits the city-gate setting better than the more military
    'sentinel' or the slightly modern 'lookout'.
- source_word: אִישׁ אַחֵר
  chosen: another man
  alternatives:
  - a different man
  - one more man
  lexicon: HALOT
  rationale: אִישׁ means 'man' here, and אַחֵר marks him as an additional runner distinct
    from the first. 'Another man' is the most straightforward English rendering.
- source_word: רָץ
  chosen: running
  alternatives:
  - ran
  - was running
  lexicon: HALOT
  rationale: 'The participle depicts ongoing action: the man is seen in the act of
    running. ''Running'' preserves that aspect naturally in English.'
- source_word: הַשֹּׁעֵר
  chosen: the gatekeeper
  alternatives:
  - the porter
  - the doorkeeper
  lexicon: HALOT
  rationale: In this context of a city gate, 'gatekeeper' is clearer and more contemporary
    than 'porter' or 'doorkeeper'.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    force in readable modern English; 'behold' is too archaic.
- source_word: לְבַדּוֹ
  chosen: by himself
  alternatives:
  - alone
  - on his own
  lexicon: HALOT
  rationale: The phrase indicates that the runner is solitary. 'By himself' is idiomatic
    and preserves the observation that he is not part of a group.
- source_word: גַּם זֶה
  chosen: This one also
  alternatives:
  - He too
  - This man also
  lexicon: HALOT
  rationale: The king is identifying the second runner as likewise fitting the same
    category as the first. 'This one also' mirrors the demonstrative force of זֶה
    while remaining natural.
- source_word: מְבַשֵּׂר
  chosen: brings news
  alternatives:
  - is a messenger
  - brings good news
  lexicon: HALOT
  rationale: The piel participle of בשׂר can mean to bring news, often good news,
    but in narrative context it refers to one coming with a report. 'Brings news'
    avoids overstating the positivity while fitting the king's inference from a lone
    runner.
