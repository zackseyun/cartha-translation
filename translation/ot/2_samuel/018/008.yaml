id: 2SA.18.8
reference: 2 Samuel 18:8
source:
  edition: WLC
  text: וַ/תְּהִי שָׁ֧ם הַ/מִּלְחָמָ֛ה נפצית עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ וַ/יֶּ֤רֶב
    הַ/יַּ֨עַר֙ לֶ/אֱכֹ֣ל בָּ/עָ֔ם מֵ/אֲשֶׁ֥ר אָכְלָ֛ה הַ/חֶ֖רֶב בַּ/יּ֥וֹם הַ/הֽוּא־־־׃
translation:
  text: The battle spread there over the face of the whole land, and the forest devoured
    more of the people that day than the sword devoured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The battle was scattered over the face of the whole land.' The Hebrew
      participle can emphasize the battle's dispersal across the region.
    reason: lexical_alternative
lexical_decisions:
- source_word: נפצית
  chosen: spread
  alternatives:
  - was scattered
  - was dispersed
  lexicon: HALOT
  rationale: The Niphal participle from פוץ conveys being spread out or dispersed.
    In context of battle extending geographically, 'spread' is natural modern English
    and preserves the image without awkwardness.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  chosen: over the face of the whole land
  alternatives:
  - across the whole land
  - throughout all the land
  lexicon: HALOT
  rationale: This phrase is idiomatic Hebrew for broad geographic extent. 'Over the
    face of the whole land' keeps the Hebrew imagery while remaining intelligible;
    'land' is preferable to 'earth' here because the reference is the local region
    of battle, not the globe.
- source_word: וירב
  chosen: devoured more
  alternatives:
  - consumed more
  - was more abundant to consume
  lexicon: HALOT
  rationale: Although רבה commonly means 'be many/increase,' with the following infinitive
    לֶאֱכֹל and comparative מֵאֲשֶׁר, the sense is that the forest accounted for more
    deaths than the sword. Rendering the clause idiomatically as 'the forest devoured
    more' captures the comparative force in good English.
- source_word: היער
  chosen: the forest
  alternatives:
  - the woods
  lexicon: HALOT
  rationale: יַעַר denotes a forested area. 'Forest' is the standard and suitably
    vivid term in this military narrative.
- source_word: לֶאֱכֹל
  chosen: devoured
  alternatives:
  - consumed
  - ate up
  lexicon: HALOT
  rationale: The infinitive 'to eat/devour' is used metaphorically for causing death.
    'Devoured' preserves the metaphor and matches the repeated verb with the sword
    in the second clause.
- source_word: בעם
  chosen: of the people
  alternatives:
  - among the people
  - from the people
  lexicon: HALOT
  rationale: With the metaphor of devouring, English idiom works best as 'devoured
    more of the people.' This reflects the partitive sense without wooden literalism.
- source_word: מאשר אכלה החרב
  chosen: than the sword devoured
  alternatives:
  - than the sword consumed
  - than were killed by the sword
  lexicon: HALOT
  rationale: 'The comparison is explicit: the forest caused more deaths than the sword.
    Repeating ''devoured'' preserves the Hebrew parallelism and personification.'
- source_word: ביום ההוא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: '''That day'' is a natural English rendering of the temporal phrase and
    fits narrative style.'
