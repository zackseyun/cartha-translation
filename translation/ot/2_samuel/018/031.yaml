id: 2SA.18.31
reference: 2 Samuel 18:31
source:
  edition: WLC
  text: וְ/הִנֵּ֥ה הַ/כּוּשִׁ֖י בָּ֑א וַ/יֹּ֣אמֶר הַ/כּוּשִׁ֗י יִתְבַּשֵּׂר֙ אֲדֹנִ֣/י
    הַ/מֶּ֔לֶךְ כִּֽי שְׁפָטְ/ךָ֤ יְהוָה֙ הַ/יּ֔וֹם מִ/יַּ֖ד כָּל הַ/קָּמִ֥ים עָלֶֽי/ךָ־־׃ס
translation:
  text: And behold, the Cushite came, and the Cushite said, “Let my lord the king
    receive the good news, for the LORD has vindicated you today from the hand of
    all who rose up against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the Ethiopian.'' Hebrew: ''the Cushite.'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'the LORD has judged for you today' or 'has given you justice today.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  - And see
  lexicon: HALOT
  rationale: Retains the discourse-marker force introducing a new arrival with immediacy.
    'Behold' is slightly formal but still natural enough here and preserves the narrative
    vividness better than omitting it.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  - the man from Cush
  lexicon: HALOT
  rationale: Translated as an ethnonym/title rather than a personal name, matching
    the Hebrew article and standard identification of someone from Cush. 'Ethiopian'
    is possible historically/geographically, but 'Cushite' is more source-near and
    avoids anachronistic precision.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple narrative perfect rendered with natural English past tense.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering for אמר in narrative sequence.
- source_word: יִתְבַּשֵּׂר
  chosen: receive the good news
  alternatives:
  - hear good news
  - be informed of good news
  - let good news be announced
  lexicon: HALOT
  rationale: The hitpael/imperfect here functions jussively in direct speech. English
    requires an idiomatic expression; 'receive the good news' captures the messenger's
    announcement to the king better than a wooden reflexive such as 'let himself be
    informed.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address formula. 'My lord' is the standard respectful rendering
    and does not imply divinity in this context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the content/reason for the good news; 'for' fits the explanatory
    sense in English.
- source_word: שְׁפָטְךָ
  chosen: has vindicated you
  alternatives:
  - has judged for you
  - has given judgment to you
  - has delivered justice to you
  lexicon: HALOT
  rationale: 'From שׁפט in a legal-deliverance sense: YHWH has acted judicially on
    David''s behalf against his enemies. ''Vindicated you'' communicates both judgment
    and deliverance in idiomatic English.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Natural modern English while preserving temporal emphasis.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: Kept the Hebrew idiom 'from the hand of' because it is transparent in
    English and preserves the concrete imagery of hostile power.
- source_word: כָּל הַקָּמִים עָלֶיךָ
  chosen: all who rose up against you
  alternatives:
  - all who stood against you
  - all your adversaries
  - all who rebelled against you
  lexicon: HALOT
  rationale: The participle of קום with על conveys hostile uprising. 'Rose up against
    you' preserves the verbal imagery and suits the context of rebellion without over-specifying
    beyond the Hebrew.
