id: 2SA.18.1
reference: 2 Samuel 18:1
source:
  edition: WLC
  text: וַ/יִּפְקֹ֣ד דָּוִ֔ד אֶת הָ/עָ֖ם אֲשֶׁ֣ר אִתּ֑/וֹ וַ/יָּ֣שֶׂם עֲלֵי/הֶ֔ם שָׂרֵ֥י
    אֲלָפִ֖ים וְ/שָׂרֵ֥י מֵאֽוֹת־׃
translation:
  text: Then David mustered the people who were with him and appointed over them commanders
    of thousands and commanders of hundreds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'numbered' or 'reviewed'; the Hebrew verb can denote taking a military
      muster, not merely counting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people'; here it refers to the force with David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  chosen: mustered
  alternatives:
  - numbered
  - reviewed
  - took stock of
  lexicon: HALOT
  rationale: פקד in a military context commonly means to muster, review, or organize
    troops rather than merely count them. Given the immediate appointment of officers,
    'mustered' best captures the military-administrative sense in natural English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: עם literally means 'people.' In this context it refers to David's fighting
    force, but 'the people' preserves the Hebrew wording while remaining understandable.
    The military sense is clarified by the surrounding actions.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - that were with him
  - under his command
  lexicon: HALOT
  rationale: The relative clause is rendered straightforwardly. 'Who were with him'
    preserves the relational wording without over-interpreting it as a formal chain
    of command.
- source_word: וַיָּשֶׂם עֲלֵיהֶם
  chosen: appointed over them
  alternatives:
  - set over them
  - placed over them
  lexicon: HALOT
  rationale: שׂים with עַל often means to place or appoint someone over others. 'Appointed
    over them' communicates the administrative action clearly in modern English.
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - captains
  - officers
  - chiefs
  lexicon: HALOT
  rationale: שׂר denotes a leader or official. In this military setting, 'commanders'
    is the clearest modern rendering and avoids archaic 'captains' while preserving
    military authority.
- source_word: אֲלָפִים
  chosen: thousands
  alternatives:
  - units of a thousand
  - clans
  lexicon: HALOT
  rationale: Although אֶלֶף can sometimes denote a social or military unit and not
    a strict numeral, in the stock military expression 'commanders of thousands and
    commanders of hundreds' the numeric rendering is the most natural and conventional.
- source_word: מֵאוֹת
  chosen: hundreds
  alternatives:
  - units of a hundred
  lexicon: HALOT
  rationale: Part of the standard military-administrative pairing with 'thousands.'
    The simple numeric term preserves the Hebrew structure and sense.
