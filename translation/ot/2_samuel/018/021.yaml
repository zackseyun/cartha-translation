id: 2SA.18.21
reference: 2 Samuel 18:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹאָב֙ לַ/כּוּשִׁ֔י לֵ֛ךְ הַגֵּ֥ד לַ/מֶּ֖לֶךְ אֲשֶׁ֣ר רָאִ֑יתָה
    וַ/יִּשְׁתַּ֧חוּ כוּשִׁ֛י לְ/יוֹאָ֖ב וַ/יָּרֹֽץ׃
translation:
  text: Then Joab said to the Cushite, “Go, tell the king what you have seen.” And
    the Cushite bowed down to Joab and ran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cushi' if taken as a personal name; traditionally, 'the Ethiopian.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוּשִׁי
  chosen: the Cushite
  alternatives:
  - Cushi
  - the Ethiopian
  lexicon: HALOT
  rationale: Used the gentilic 'the Cushite' to reflect the Hebrew designation of
    the messenger by ethnicity/origin rather than as a personal name. 'Cushi' is possible
    if taken as a name, and 'the Ethiopian' is a traditional geographic equivalent,
    but 'the Cushite' is the most transparent and least interpretively loaded in modern
    English.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Imperative of הלך in straightforward command sense. 'Go' is the natural
    English equivalent here.
- source_word: הַגֵּד
  chosen: tell
  alternatives:
  - report
  - declare
  lexicon: HALOT
  rationale: The Hiphil imperative of נגד means to make known or report. 'Tell' fits
    readable modern English and the direct-object construction with 'the king'.
- source_word: אֲשֶׁר רָאִיתָה
  chosen: what you have seen
  alternatives:
  - what you saw
  - that which you saw
  lexicon: HALOT
  rationale: Rendered idiomatically as 'what you have seen.' The perfect can be represented
    in English either as simple past or present perfect; present perfect suits the
    immediate relevance of the report to be delivered.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The verb שׁחה/השתחוה denotes bowing low or prostration. 'Bowed down'
    preserves the physical act without over-specifying full prostration, and avoids
    importing worship language where the context is respectful deference to Joab.
- source_word: וַיָּרֹץ
  chosen: ran
  alternatives:
  - hurried off
  lexicon: HALOT
  rationale: Simple narrative verb from רוץ. 'Ran' is the plain sense and keeps the
    narrative pace.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' is a natural English
    discourse marker here, slightly smoother than repeating 'And' while preserving
    sequence.
