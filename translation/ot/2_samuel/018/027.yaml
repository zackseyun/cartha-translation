id: 2SA.18.27
reference: 2 Samuel 18:27
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַ/צֹּפֶ֔ה אֲנִ֤י רֹאֶה֙ אֶת מְרוּצַ֣ת הָ/רִאשׁ֔וֹן כִּ/מְרֻצַ֖ת
    אֲחִימַ֣עַץ בֶּן צָד֑וֹק וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אִֽישׁ ט֣וֹב זֶ֔ה וְ/אֶל בְּשׂוֹרָ֥ה
    טוֹבָ֖ה יָבֽוֹא־־־־׃
translation:
  text: Then the watchman said, “I see the running of the first one is like the running
    of Ahimaaz the son of Zadok.” And the king said, “He is a good man, and he comes
    with good news.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “the running of the first one is like the running of
      Ahimaaz.”
    reason: lexical_alternative
  - marker: b
    text: Or “he will come with good news”; the Hebrew verb can be understood as future.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The participial noun denotes one who keeps watch. 'Watchman' is the most
    natural and established English equivalent in this narrative setting, while remaining
    clear to modern readers.
- source_word: מְרוּצַת הָרִאשׁוֹן
  chosen: the running of the first one
  alternatives:
  - the way the first man runs
  - the first runner's pace
  lexicon: HALOT
  rationale: The Hebrew uses the noun 'running' rather than directly naming a runner.
    Rendering it as 'the running of the first one' preserves the concrete observation
    of manner of movement, though in idiomatic English it still reads naturally enough.
- source_word: כִּמְרֻצַת
  chosen: is like the running of
  alternatives:
  - is like the pace of
  - resembles the running of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Is like the running of' closely reflects
    the Hebrew construction and keeps the repeated noun for stylistic correspondence.
- source_word: אֲחִימַעַץ בֶּן צָדוֹק
  chosen: Ahimaaz the son of Zadok
  alternatives:
  - Ahimaaz son of Zadok
  rationale: Personal names are transliterated by standard convention. Including 'the
    son of' reflects the Hebrew בן construction explicitly.
- source_word: אִישׁ טוֹב זֶה
  chosen: He is a good man
  alternatives:
  - This is a good man
  - He is a worthy man
  lexicon: HALOT
  rationale: Although literally 'a good man, this one,' English idiom favors 'He is
    a good man.' This preserves David's positive assessment of Ahimaaz's character.
- source_word: וְאֶל בְּשׂוֹרָה טוֹבָה יָבוֹא
  chosen: and he comes with good news
  alternatives:
  - and he will come with good news
  - and he comes for good tidings
  lexicon: HALOT
  rationale: 'The preposition אֶל here is idiomatic in context, expressing movement
    with respect to a message; ''comes with good news'' best captures the sense in
    natural English. ''Good news'' is the standard rendering of בְּשׂוֹרָה טוֹבָה.
    The yiqtol can be rendered with present sense in this immediate narrative dialogue:
    David infers the messenger''s purpose as he approaches.'
