id: 2SA.18.23
reference: 2 Samuel 18:23
source:
  edition: WLC
  text: וִ/יהִי מָ֣ה אָר֔וּץ וַ/יֹּ֥אמֶר ל֖/וֹ ר֑וּץ וַ/יָּ֤רָץ אֲחִימַ֨עַץ֙ דֶּ֣רֶךְ
    הַ/כִּכָּ֔ר וַֽ/יַּעֲבֹ֖ר אֶת הַ/כּוּשִֽׁי־־׃
translation:
  text: But he said, “Whatever happens, let me run.” So he said to him, “Run.” Then
    Ahimaaz ran by the way of the plain and passed the Cushite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Come what may, I will run.” The Hebrew expression is idiomatic and
      conveys Ahimaaz’s insistence on running regardless of the outcome.
    reason: alternative_reading
  - marker: b
    text: “The plain” likely refers to the Jordan plain; the Hebrew does not require
      that fuller geographic specification in the main text.
    reason: cultural_note
  - marker: c
    text: Or, “outran the Cushite.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי מָה אָרוּץ
  chosen: But he said, “Whatever happens, let me run.”
  alternatives:
  - But he said, “Come what may, I will run.”
  - But he said, “Why should I not run?”
  lexicon: HALOT
  rationale: 'The idiom combines וִיהִי with interrogative מָה and first-person imperfect/volitive
    אָרוּץ in a context of insistence. The sense is concessive or idiomatic rather
    than a literal question: Ahimaaz persists in asking permission to run regardless
    of outcome. ''Whatever happens, let me run'' captures the force in natural English
    while preserving the urgency. A more literal ''Come what may, I will run'' is
    possible, but the surrounding dialogue suggests a request for permission rather
    than a mere declaration.'
- source_word: רּוּץ
  chosen: Run
  alternatives:
  - Go ahead, run
  lexicon: HALOT
  rationale: Imperative of רוץ. 'Run' is the direct and sufficient rendering.
- source_word: דֶּרֶךְ הַכִּכָּר
  chosen: by the way of the plain
  alternatives:
  - by way of the plain
  - by the route through the Jordan plain
  lexicon: HALOT
  rationale: דֶּרֶךְ means 'way/road/route,' and הַכִּכָּר refers to the plain, often
    the Jordan plain/circle. 'By the way of the plain' is a readable rendering that
    stays close to the Hebrew without over-specifying geography in the main text.
- source_word: וַיַּעֲבֹר אֶת־הַכּוּשִׁי
  chosen: and passed the Cushite
  alternatives:
  - and outran the Cushite
  - and went past the Cushite
  lexicon: HALOT
  rationale: עבר with direct object can mean 'pass by, overtake.' In this running
    context, the sense is that Ahimaaz overtook the Cushite messenger. 'Passed the
    Cushite' is slightly more formal and leaves the narrative implication clear; 'outran'
    is interpretive but plausible.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: כּוּשִׁי denotes a Cushite, i.e., a person from Cush. 'The Cushite' preserves
    the ethnic/geographic designation directly from the Hebrew better than the traditional
    but more interpretive 'the Ethiopian'.
- source_word: אֲחִימַעַץ
  chosen: Ahimaaz
  rationale: Personal name transliterated according to the translation philosophy.
