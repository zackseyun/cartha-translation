id: 2SA.18.30
reference: 2 Samuel 18:30
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ סֹ֖ב הִתְיַצֵּ֣ב כֹּ֑ה וַ/יִּסֹּ֖ב וַֽ/יַּעֲמֹֽד׃
translation:
  text: The king said, “Turn aside; stand here.” So he turned aside and stood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Turn around; stand here.” The Hebrew verb can denote turning generally,
      but in context likely means moving aside to make room for the next messenger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; 'said' is the natural
    English narrative equivalent.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly refers to the king already
    in context, so 'the king' preserves the Hebrew definiteness.
- source_word: סֹב
  chosen: Turn aside
  alternatives:
  - Turn around
  - Step aside
  lexicon: HALOT
  rationale: Imperative of סבב. In this context the king is directing the runner to
    move out of the way or to one side, not merely to rotate in place. 'Turn aside'
    preserves the motion sense without over-paraphrasing.
- source_word: הִתְיַצֵּב
  chosen: stand
  alternatives:
  - take your stand
  - station yourself
  lexicon: HALOT
  rationale: Hitpael imperative of יצב, meaning to station oneself or stand in position.
    'Stand' is concise and idiomatic in English, especially following the prior command.
- source_word: כֹּה
  chosen: here
  alternatives:
  - thus
  - in this place
  lexicon: HALOT
  rationale: Adverb indicating location in this command context; 'here' best fits
    the king's instruction to stand at a particular spot.
- source_word: וַיִּסֹּב
  chosen: he turned aside
  alternatives:
  - he turned around
  - he stepped aside
  lexicon: HALOT
  rationale: Narrative fulfillment of the imperative סֹב. 'Turned aside' keeps the
    lexical connection with the command and fits the situational sense.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - remained standing
  lexicon: HALOT
  rationale: Common narrative verb עמד. 'Stood' is the plain and sufficient English
    rendering here.
