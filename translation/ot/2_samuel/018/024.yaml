id: 2SA.18.24
reference: 2 Samuel 18:24
source:
  edition: WLC
  text: וְ/דָוִ֥ד יוֹשֵׁ֖ב בֵּין שְׁנֵ֣י הַ/שְּׁעָרִ֑ים וַ/יֵּ֨לֶךְ הַ/צֹּפֶ֜ה אֶל
    גַּ֤ג הַ/שַּׁ֨עַר֙ אֶל הַ֣/חוֹמָ֔ה וַ/יִּשָּׂ֤א אֶת עֵינָי/ו֙ וַ/יַּ֔רְא וְ/הִנֵּה
    אִ֖ישׁ רָ֥ץ לְ/בַדּֽ/וֹ־־־־־׃
translation:
  text: Now David was sitting between the two gates, and the watchman went to the
    roof of the gate by the wall. He lifted up his eyes and looked, and behold, a
    man was running by himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "between the two gatehouses"; the Hebrew literally says "between the
      two gates," likely referring to the space within a fortified gateway.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was staying
  lexicon: HALOT
  rationale: The participle describes David's ongoing posture/state at this moment
    in the narrative, so the English progressive 'was sitting' best reflects the durative
    sense in readable narrative English.
- source_word: בֵּין שְׁנֵי הַשְּׁעָרִים
  chosen: between the two gates
  alternatives:
  - between the two gatehouses
  - between the inner and outer gate
  lexicon: HALOT
  rationale: The Hebrew is literally 'between the two gates.' This likely refers to
    the space between an outer and inner gate in a fortified city entrance, but the
    text itself does not specify more than 'two gates,' so the more literal rendering
    is retained.
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The participial noun denotes one who keeps watch. 'Watchman' is the most
    natural and established English equivalent in this military/city-wall context.
- source_word: אֶל גַּג הַשַּׁעַר אֶל הַחוֹמָה
  chosen: to the roof of the gate by the wall
  alternatives:
  - to the roof of the gatehouse on the wall
  - to the gate roof toward the wall
  lexicon: HALOT
  rationale: The phrase indicates movement to the top/roof area of the gate structure
    in relation to the wall. 'By the wall' communicates the spatial relation clearly
    without over-specifying architectural details not explicit in the Hebrew.
- source_word: וַיִּשָּׂא אֶת עֵינָיו
  chosen: He lifted up his eyes
  alternatives:
  - he looked up
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. Retaining 'lifted up his eyes' preserves
    the source texture while remaining understandable in English.
- source_word: וַיַּרְא וְהִנֵּה
  chosen: and looked, and behold
  alternatives:
  - and saw, and behold
  - and saw, and there was
  lexicon: HALOT
  rationale: The sequence marks both the act of seeing and the sudden presentation
    of what is seen. 'Behold' preserves the deictic force of הִנֵּה better than a
    flatter rendering.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an individual male figure
    in the scene. Per the translation philosophy's gender-accurate principle, 'a man'
    is preferable to the more generic 'someone'.
- source_word: רָץ
  chosen: was running
  alternatives:
  - ran
  - running
  lexicon: HALOT
  rationale: The participle presents the man in the act of running as observed by
    the watchman. 'Was running' fits the immediate visual scene in English narrative.
- source_word: לְבַדּוֹ
  chosen: by himself
  alternatives:
  - alone
  lexicon: HALOT
  rationale: '''By himself'' clearly conveys that the runner is solitary. ''Alone''
    is possible, but ''by himself'' pairs naturally with the motion verb in English.'
