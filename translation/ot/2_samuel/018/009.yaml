id: 2SA.18.9
reference: 2 Samuel 18:9
source:
  edition: WLC
  text: וַ/יִּקָּרֵא֙ אַבְשָׁל֔וֹם לִ/פְנֵ֖י עַבְדֵ֣י דָוִ֑ד וְ/אַבְשָׁל֞וֹם רֹכֵ֣ב
    עַל הַ/פֶּ֗רֶד וַ/יָּבֹ֣א הַ/פֶּ֡רֶד תַּ֣חַת שׂוֹבֶךְ֩ הָ/אֵלָ֨ה הַ/גְּדוֹלָ֜ה
    וַ/יֶּחֱזַ֧ק רֹאשׁ֣/וֹ בָ/אֵלָ֗ה וַ/יֻּתַּן֙ בֵּ֤ין הַ/שָּׁמַ֨יִם֙ וּ/בֵ֣ין הָ/אָ֔רֶץ
    וְ/הַ/פֶּ֥רֶד אֲשֶׁר תַּחְתָּ֖י/ו עָבָֽר־־׃
translation:
  text: Absalom happened to come before David’s servants while Absalom was riding
    on the mule. The mule went under the thick branches of a large terebinth, and
    his head got caught in the terebinth, so that he was left hanging between heaven
    and earth while the mule that was under him passed on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the dense boughs of a great oak.' The Hebrew אֵלָה can be rendered
      more generally as a large tree, but 'terebinth' is the more precise lexical
      choice here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּרֵא
  chosen: happened to come
  alternatives:
  - was encountered
  - met
  - came upon
  lexicon: HALOT
  rationale: From קרא in the Niphal/wayyiqtol here, the sense is not that Absalom
    intentionally met them but that he found himself before them or was encountered
    by them. 'Happened to come before' captures the incidental nature better than
    a simple 'met.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: Standard spatial/relational sense. 'Before' is concise and natural in
    narrative English.
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - David’s men
  - David’s servants/slaves
  lexicon: HALOT
  rationale: עבדים can mean servants or retainers; in military narrative it often
    refers to the king’s men. 'Servants' preserves the lexical form while remaining
    idiomatic. The bonded nuance of 'slave' is not foregrounded in this context.
- source_word: רֹכֵב עַל הַפֶּרֶד
  chosen: riding on the mule
  alternatives:
  - mounted on the mule
  - riding the mule
  lexicon: HALOT
  rationale: Straightforward participial construction describing Absalom’s state at
    the time. 'The mule' reflects the definite article.
- source_word: הַפֶּרֶד
  chosen: the mule
  alternatives:
  - the mule colt
  lexicon: HALOT
  rationale: פֶּרֶד denotes a mule. No need to specify sex or age beyond the Hebrew.
- source_word: תַּחַת שׂוֹבֶךְ הָאֵלָה הַגְּדוֹלָה
  chosen: under the thick branches of a large terebinth
  alternatives:
  - under the dense boughs of the great oak
  - under the tangled branches of the large terebinth
  lexicon: HALOT
  rationale: שׂוֹבֶךְ refers to a thicket/interwoven mass, here the dense branching.
    אֵלָה is more precisely 'terebinth' than 'oak,' so the source sense is better
    preserved with 'terebinth.' 'Large' renders גְּדוֹלָה naturally.
- source_word: וַיֶּחֱזַק רֹאשׁוֹ בָאֵלָה
  chosen: his head got caught in the terebinth
  alternatives:
  - his head was caught fast in the terebinth
  - his head seized hold of the terebinth
  lexicon: HALOT
  rationale: Literally 'his head held fast in the terebinth.' English idiom prefers
    'got caught,' which conveys the involuntary entanglement without awkwardness.
- source_word: וַיֻּתַּן
  chosen: he was left hanging
  alternatives:
  - he was suspended
  - he was set
  lexicon: HALOT
  rationale: Passive of נתן literally 'he was given/placed,' but in context it describes
    the resulting state of suspension. 'Was left hanging' communicates the narrative
    effect clearly in natural English.
- source_word: בֵּין הַשָּׁמַיִם וּבֵין הָאָרֶץ
  chosen: between heaven and earth
  alternatives:
  - between the heavens and the earth
  - between sky and land
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression. 'Between heaven and earth'
    is the most natural and preserves the elevated narrative tone.
- source_word: עָבָר
  chosen: passed on
  alternatives:
  - went on
  - passed by
  - went on ahead
  lexicon: HALOT
  rationale: The verb indicates movement onward after Absalom is caught. 'Passed on'
    is concise and fits the scene.
