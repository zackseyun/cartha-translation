id: 2SA.18.19
reference: 2 Samuel 18:19
source:
  edition: WLC
  text: וַ/אֲחִימַ֤עַץ בֶּן צָדוֹק֙ אָמַ֔ר אָר֣וּצָה נָּ֔א וַ/אֲבַשְּׂרָ֖ה אֶת הַ/מֶּ֑לֶךְ כִּי שְׁפָט֥/וֹ יְהוָ֖ה מִ/יַּ֥ד אֹיְבָֽי/ו־־־׃
translation:
  text: Then Ahimaaz the son of Zadok said, “Please let me run and bring news to the king, for Yahweh has delivered him from the hand of his enemies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and announce the good news to the king,” since the Hebrew verb can carry the sense of bringing favorable news.
    reason: lexical_alternative
  - marker: b
    text: Or, “the LORD has judged for him” / “has given him justice,” emphasizing judicial vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲחִימַעַץ
  chosen: Then Ahimaaz
  alternatives:
  - And Ahimaaz
  lexicon: HALOT
  rationale: The prefixed waw advances the narrative. 'Then' gives natural English narrative flow while preserving sequence. The personal name is transliterated per translation philosophy.
- source_word: בֶּן צָדוֹק
  chosen: the son of Zadok
  alternatives:
  - son of Zadok
  lexicon: HALOT
  rationale: A straightforward filial designation. Including 'the' yields idiomatic English apposition after the name.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct-speech introduction.
- source_word: אָרוּצָה נָּא
  chosen: Please let me run
  alternatives:
  - Let me run, please
  - Please, I will run
  lexicon: HALOT
  rationale: The cohortative expresses volition/desire, and נָא adds politeness/entreaty. 'Please let me run' captures the request force in natural English better than a bare future-like 'I will run.'
- source_word: וַ/אֲבַשְּׂרָה
  chosen: and bring news
  alternatives:
  - and bear news
  - and announce the good news
  - and report
  lexicon: HALOT
  rationale: The piel of בשׂר means to bring news, often good news in context. Here the message concerns victory/vindication, so 'bring news' is accurate and natural without importing later technical gospel language.
- source_word: אֶת הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Although marked with the direct-object particle, English idiom with 'bring news' normally takes 'to the king,' making the relation clear and natural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Introduces the content/reason for the news. 'Because' best fits the explanatory sense in context.
- source_word: שְׁפָטוֹ
  chosen: has vindicated him
  alternatives:
  - has judged for him
  - has given him justice
  - has delivered judgment on his behalf
  lexicon: HALOT
  rationale: From שׁפט, in this context of deliverance from enemies, the sense is not merely generic judging but acting judicially in the king's favor. 'Vindicated him' captures the judicial-deliverance nuance succinctly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִיַּד אֹיְבָיו
  chosen: from the hand of his enemies
  alternatives:
  - from his enemies
  - out of the power of his enemies
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power/control. Retaining it preserves the source imagery while remaining understandable in English.'
