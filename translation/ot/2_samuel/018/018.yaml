id: 2SA.18.18
reference: 2 Samuel 18:18
source:
  edition: WLC
  text: וְ/אַבְשָׁלֹ֣ם לָקַ֗ח וַ/יַּצֶּב ל֤/וֹ ב/חי/ו אֶת מַצֶּ֨בֶת֙ אֲשֶׁ֣ר בְּ/עֵֽמֶק
    הַ/מֶּ֔לֶךְ כִּ֤י אָמַר֙ אֵֽין לִ֣/י בֵ֔ן בַּ/עֲב֖וּר הַזְכִּ֣יר שְׁמִ֑/י וַ/יִּקְרָ֤א
    לַ/מַּצֶּ֨בֶת֙ עַל שְׁמ֔/וֹ וַ/יִּקָּ֤רֵא לָ/הּ֙ יַ֣ד אַבְשָׁלֹ֔ם עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־־־־׃ס
translation:
  text: Now Absalom had taken and set up for himself in his lifetime the pillar that
    is in the Valley of the King, for he said, “I have no son to keep my name in remembrance.”
    So he called the pillar by his own name, and it is called Absalom’s Monument to
    this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Absalom’s hand.'' Here ''hand'' is an idiomatic expression for
      a memorial marker or monument.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַח
  chosen: had taken
  alternatives:
  - took
  lexicon: HALOT
  rationale: Rendered with past perfect ('had taken') to reflect the qatal before
    the following wayyiqtol sequence and to fit the narrative note explaining an earlier
    action by Absalom.
- source_word: וַיַּצֶּב
  chosen: set up
  alternatives:
  - erected
  - placed
  lexicon: HALOT
  rationale: The verb נצב in this stem commonly means to set up or erect. 'Set up'
    is natural modern English and fits a commemorative stone or pillar.
- source_word: בְחַיּו
  chosen: in his lifetime
  alternatives:
  - while he was alive
  - during his life
  lexicon: HALOT
  rationale: This idiom indicates that Absalom did this while still living. 'In his
    lifetime' is concise and idiomatic.
- source_word: מַצֶּבֶת
  chosen: pillar
  alternatives:
  - memorial stone
  - monument
  lexicon: HALOT
  rationale: מַצֶּבֶת denotes a standing stone or pillar. 'Pillar' preserves the concrete
    image; 'monument' is reserved for the later idiomatic name in English.
- source_word: בְּעֵמֶק הַמֶּלֶךְ
  chosen: in the Valley of the King
  alternatives:
  - in the King's Valley
  lexicon: HALOT
  rationale: A fairly literal rendering of the place name phrase. Capitalization signals
    a recognized location. The alternative is also possible, but this wording stays
    close to the Hebrew word order while remaining readable.
- source_word: בַּעֲבוּר הַזְכִּיר שְׁמִי
  chosen: to keep my name in remembrance
  alternatives:
  - to preserve my name
  - to cause my name to be remembered
  lexicon: HALOT
  rationale: 'The infinitive of זכר with this prepositional phrase expresses purpose:
    preserving remembrance of his name. ''Keep my name in remembrance'' captures both
    memorial and continuity aspects without over-paraphrasing.'
- source_word: וַיִּקְרָא לַמַּצֶּבֶת עַל שְׁמוֹ
  chosen: he called the pillar by his own name
  alternatives:
  - he named the pillar after himself
  - he called the pillar according to his name
  lexicon: HALOT
  rationale: The idiom means he gave it his own name. 'By his own name' is clear and
    fairly literal.
- source_word: וַיִּקָּרֵא לָהּ
  chosen: it is called
  alternatives:
  - it was called
  - one calls it
  lexicon: HALOT
  rationale: 'The passive/niphal here, followed by ''to this day,'' is best rendered
    as a present-result expression in English: the name continues in use.'
- source_word: יַד אַבְשָׁלוֹם
  chosen: Absalom’s Monument
  alternatives:
  - Absalom's Pillar
  - Absalom's Memorial
  - Absalom's Hand
  lexicon: HALOT
  rationale: Literally יָד is 'hand,' but in this context it functions idiomatically
    for a memorial marker or monument. 'Absalom's Monument' communicates the sense
    in natural English. The literal form is worth preserving in a footnote because
    the Hebrew is unusual.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the Hebrew temporal formula indicating
    the name remained current at the time of writing.
