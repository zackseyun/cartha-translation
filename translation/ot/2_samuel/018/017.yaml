id: 2SA.18.17
reference: 2 Samuel 18:17
source:
  edition: WLC
  text: וַ/יִּקְח֣וּ אֶת אַבְשָׁל֗וֹם וַ/יַּשְׁלִ֨יכוּ אֹת֤/וֹ בַ/יַּ֨עַר֙ אֶל הַ/פַּ֣חַת
    הַ/גָּד֔וֹל וַ/יַּצִּ֧בוּ עָלָ֛י/ו גַּל אֲבָנִ֖ים גָּד֣וֹל מְאֹ֑ד וְ/כָל יִשְׂרָאֵ֔ל
    נָ֖סוּ אִ֥ישׁ ל/אהל/ו־־־־׃ס
translation:
  text: And they took Absalom and threw him into the great pit in the forest, and
    they raised over him a very large heap of stones. And all Israel fled, each man
    to his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cairn of stones.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man to his tent,' an idiom for dispersing to one's own dwelling;
      that is, 'each to his home.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they seized
  - they carried away
  lexicon: HALOT
  rationale: Common narrative use of לקח in the waw-consecutive sequence; 'took' is
    the most direct and natural rendering without adding force not explicit in the
    verb.
- source_word: וַיַּשְׁלִיכוּ
  chosen: threw
  alternatives:
  - cast
  - hurled
  lexicon: HALOT
  rationale: The verb שלך here denotes forceful disposal of the body. 'Threw' is idiomatic
    modern English and preserves the indignity of the action better than the more
    archaic 'cast.'
- source_word: בַיַּעַר
  chosen: in the forest
  alternatives:
  - in the woods
  lexicon: HALOT
  rationale: יער is standardly 'forest.' 'In the forest' preserves the article and
    matches the setting already established in the surrounding narrative.
- source_word: אֶל הַפַּחַת הַגָּדוֹל
  chosen: into the great pit
  alternatives:
  - into the large pit
  - into the great ditch
  lexicon: HALOT
  rationale: פחת denotes a pit or hollow. 'Pit' is the clearest English equivalent
    here. 'Great' follows the adjective directly and keeps the narrative emphasis.
- source_word: וַיַּצִּבוּ עָלָיו
  chosen: they raised over him
  alternatives:
  - they set up over him
  - they placed over him
  lexicon: HALOT
  rationale: With גל אבנים as object, the sense is erecting or piling up a marker/burial
    heap over the body. 'Raised over him' reads naturally in English while preserving
    the physical image.
- source_word: גַּל אֲבָנִים
  chosen: a heap of stones
  alternatives:
  - a mound of stones
  - a cairn
  lexicon: HALOT
  rationale: גל is a heap or mound, often of stones. 'Heap of stones' is transparent
    and avoids the less familiar 'cairn' in the main text.
- source_word: גָּדוֹל מְאֹד
  chosen: a very large
  alternatives:
  - very great
  - exceedingly large
  lexicon: HALOT
  rationale: The adjective plus מאד intensifies the size of the heap. 'Very large'
    is natural modern English and preserves the emphasis.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: And all Israel
  alternatives:
  - And all the Israelites
  lexicon: HALOT
  rationale: The Hebrew uses the collective national name. 'All Israel' is the standard
    and more textually direct rendering.
- source_word: נָסוּ
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: נוס is the normal verb for flight. 'Fled' is concise and appropriately
    formal for narrative prose.
- source_word: אִישׁ לְאֹהָלוֹ
  chosen: each man to his tent
  alternatives:
  - each to his tent
  - every man to his home
  lexicon: HALOT
  rationale: The distributive איש is preserved by 'each man,' in keeping with the
    gender-accurate philosophy. 'Tent' reflects the Hebrew literally; although it
    can idiomatically mean household/home, the literal rendering is well established
    in this formula and preserves the source texture.
