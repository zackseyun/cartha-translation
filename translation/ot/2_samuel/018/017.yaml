theological_decisions:
- issue: Gendered distributive expression אִישׁ לְאֹהָלוֹ
  chosen_reading: each man to his tent
  alternative_readings:
  - each to his tent
  - each one to his home
  rationale: Per the translation philosophy, gender-accurate renderings are preferred
    where the source uses a masculine singular distributive form. Here the phrase
    is a conventional idiom for dispersal, but retaining 'each man' best matches the
    Hebrew form without obscuring meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Literal versus idiomatic rendering of לְאֹהָלוֹ
  chosen_reading: to his tent
  alternative_readings:
  - to his home
  rationale: Although 'tent' can function idiomatically for one's dwelling or household,
    the main text keeps the literal image because it remains intelligible in English
    and reflects the Hebrew wording more closely. The idiomatic alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
