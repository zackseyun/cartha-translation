id: 2SA.18.32
reference: 2 Samuel 18:32
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל הַ/כּוּשִׁ֔י הֲ/שָׁל֥וֹם לַ/נַּ֖עַר לְ/אַבְשָׁל֑וֹם
    וַ/יֹּ֣אמֶר הַ/כּוּשִׁ֗י יִהְי֤וּ כַ/נַּ֨עַר֙ אֹֽיְבֵי֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ
    וְ/כֹ֛ל אֲשֶׁר קָ֥מוּ עָלֶ֖י/ךָ לְ/רָעָֽה־־׃ס
translation:
  text: Then the king said to the Cushite, “Is it well with the young man, Absalom?”
    And the Cushite said, “May the enemies of my lord the king, and all who rise up
    against you for evil, be like that young man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Is the young man Absalom safe?” The Hebrew asks literally about his
      ‘peace/well-being’ (shalom), a broader term than mere survival.
    reason: lexical_alternative
  - marker: b
    text: 'The Cushite answers indirectly: his words imply that Absalom has met the
      fate appropriate to the king’s enemies, rather than stating the death explicitly.'
    reason: cultural_note
lexical_decisions:
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  - the man from Cush
  lexicon: HALOT
  rationale: A gentilic referring to a person from Cush. 'The Cushite' preserves the
    ethnic/geographic designation without importing later or narrower modern ethnic
    labels. 'Ethiopian' is traditional but less precise to the Hebrew term.
- source_word: הֲשָׁלוֹם
  chosen: Is it well with
  alternatives:
  - Is there peace for
  - Is the young man safe
  lexicon: HALOT
  rationale: שָׁלוֹם here asks after welfare or well-being. 'Is it well with' is natural
    English that preserves the broader sense of welfare, not merely physical survival,
    though safety is included by context.
- source_word: לַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or young man depending on context. Since Absalom
    is an adult son but still referred to with this term, 'young man' best preserves
    the Hebrew usage without sounding childish.
- source_word: לְאַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: יִהְיוּ
  chosen: May ... be
  alternatives:
  - Let ... be
  - They shall be
  lexicon: HALOT
  rationale: The jussive expresses a wish or imprecation. 'May ... be' best captures
    the force in idiomatic English.
- source_word: כַנַּעַר
  chosen: like that young man
  alternatives:
  - as the young man
  - like the young man
  lexicon: HALOT
  rationale: The comparative כ marks likeness. 'That young man' makes explicit in
    English that the Cushite is alluding to Absalom just mentioned, preserving the
    indirectness of the report without bluntly stating his death.
- source_word: אֹיְבֵי אֲדֹנִי הַמֶּלֶךְ
  chosen: the enemies of my lord the king
  alternatives:
  - my lord the king's enemies
  lexicon: HALOT
  rationale: This keeps the formal courtly address and possessive structure of the
    Hebrew.
- source_word: קָמוּ עָלֶיךָ
  chosen: rise up against you
  alternatives:
  - have risen against you
  - stand against you
  lexicon: HALOT
  rationale: The idiom קום על conveys hostile opposition or rebellion. Present-tense
    English in a relative clause reads naturally while preserving the idiomatic sense.
- source_word: לְרָעָה
  chosen: for evil
  alternatives:
  - to do harm
  - for harm
  lexicon: HALOT
  rationale: The phrase indicates hostile intent or harmful purpose. 'For evil' is
    slightly more formal but preserves the moral and harmful dimension of רָעָה better
    than a purely pragmatic 'to harm'.
- source_word: וַיֹּאמֶר
  chosen: Then ... said / And ... said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: The repeated narrative verb is rendered with standard English narrative
    style. 'Then' for the first instance and 'And' for the second preserve sequence
    without wooden repetition.
