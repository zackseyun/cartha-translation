id: 2SA.18.15
reference: 2 Samuel 18:15
source:
  edition: WLC
  text: וַ/יָּסֹ֨בּוּ֙ עֲשָׂרָ֣ה נְעָרִ֔ים נֹשְׂאֵ֖י כְּלֵ֣י יוֹאָ֑ב וַ/יַּכּ֥וּ אֶת
    אַבְשָׁל֖וֹם וַ/יְמִיתֻֽ/הוּ־׃
translation:
  text: Then ten young men, Joab’s armor-bearers, surrounded Absalom and struck him
    and killed him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  chosen: surrounded
  alternatives:
  - went around
  - encircled
  lexicon: HALOT
  rationale: The verb סבב in this narrative context indicates moving around someone
    so as to encircle him. 'Surrounded' is natural modern English and captures the
    tactical sense better than the more literal but less idiomatic 'went around.'
- source_word: עֲשָׂרָה נְעָרִים
  chosen: ten young men
  alternatives:
  - ten servants
  - ten attendants
  lexicon: HALOT
  rationale: נְעָרִים often means 'young men' in military or court service contexts.
    Here it refers to Joab's subordinate fighters, not children. 'Young men' preserves
    the lexical sense without overinterpreting their exact rank.
- source_word: נֹשְׂאֵי כְּלֵי יוֹאָב
  chosen: Joab’s armor-bearers
  alternatives:
  - the bearers of Joab's weapons
  - Joab's weapon-carriers
  lexicon: HALOT
  rationale: The participial phrase literally means 'bearers of the equipment/weapons
    of Joab.' In military context, 'armor-bearers' is the established and accurate
    English equivalent, while remaining understandable.
- source_word: וַיַּכּוּ
  chosen: struck him
  alternatives:
  - smote him
  - attacked him
  lexicon: HALOT
  rationale: נכה is a broad verb meaning to strike, hit, or smite. 'Struck him' is
    a clear modern rendering that preserves the physical action without archaic diction.
- source_word: וַיְמִיתֻהוּ
  chosen: killed him
  alternatives:
  - put him to death
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die' or 'kill.' 'Killed him' is the
    most direct and natural rendering in this narrative sequence.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
