id: 2SA.18.7
reference: 2 Samuel 18:7
source:
  edition: WLC
  text: וַ/יִּנָּ֤גְפוּ שָׁם֙ עַ֣ם יִשְׂרָאֵ֔ל לִ/פְנֵ֖י עַבְדֵ֣י דָוִ֑ד וַ/תְּהִי
    שָׁ֞ם הַ/מַּגֵּפָ֧ה גְדוֹלָ֛ה בַּ/יּ֥וֹם הַ/ה֖וּא עֶשְׂרִ֥ים אָֽלֶף־׃
translation:
  text: 'There the people of Israel were defeated before the servants of David, and
    the slaughter there was great on that day: twenty thousand men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blow,' 'the defeat,' or 'the plague.' The Hebrew word can denote
      a plague in other contexts, but here it refers to the deadly striking in battle.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''twenty thousand.'' ''Men'' is supplied in English for clarity
      in the battle context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגְפוּ
  chosen: were defeated
  alternatives:
  - were struck down
  - were routed
  lexicon: HALOT
  rationale: The Niphal of נָגַף here denotes being beaten/struck in battle. 'Were
    defeated' gives the military sense clearly in modern English without overstating
    the manner of death for every individual.
- source_word: עַם יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - Israel's troops
  - the army of Israel
  lexicon: HALOT
  rationale: Literally 'people of Israel.' In this battle context it refers to Israelite
    forces, but the more literal phrase preserves the Hebrew wording while remaining
    natural.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - at the hands of
  lexicon: HALOT
  rationale: In military contexts לִפְנֵי commonly marks defeat before an opponent.
    'Before' is concise and idiomatic in English biblical narrative.
- source_word: עַבְדֵי דָוִד
  chosen: the servants of David
  alternatives:
  - David's men
  - David's servants
  lexicon: HALOT
  rationale: עֶבֶד often means servant/official/retainer. In this narrative it refers
    to David's followers or troops. 'The servants of David' stays close to the Hebrew
    and reflects their status as his retainers; 'David's men' is a plausible but more
    interpretive alternative.
- source_word: הַמַּגֵּפָה
  chosen: the slaughter
  alternatives:
  - the blow
  - the plague
  - the defeat
  lexicon: HALOT
  rationale: Though מַגֵּפָה can mean 'plague' in other contexts, here in a battle
    report it refers to the deadly blow/striking inflicted in combat. 'The slaughter'
    best conveys the scale of battlefield killing in context.
- source_word: גְדוֹלָה
  chosen: was great
  alternatives:
  - was severe
  - was massive
  lexicon: HALOT
  rationale: The adjective simply means 'great.' 'Was great' preserves the Hebrew
    emphasis and works naturally with 'slaughter.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'on that day' is straightforward and natural.
- source_word: עֶשְׂרִים אָלֶף
  chosen: twenty thousand men
  alternatives:
  - twenty thousand
  - twenty thousand people
  lexicon: HALOT
  rationale: The Hebrew gives only the number, but in English battle casualty totals
    commonly supply 'men.' This clarifies that the count refers to combatants/casualties,
    not an abstract quantity, without materially altering the sense.
