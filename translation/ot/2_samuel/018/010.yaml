id: 2SA.18.10
reference: 2 Samuel 18:10
source:
  edition: WLC
  text: וַ/יַּרְא֙ אִ֣ישׁ אֶחָ֔ד וַ/יַּגֵּ֖ד לְ/יוֹאָ֑ב וַ/יֹּ֗אמֶר הִנֵּה֙ רָאִ֣יתִי
    אֶת אַבְשָׁלֹ֔ם תָּל֖וּי בָּ/אֵלָֽה־׃
translation:
  text: One man saw it and told Joab, and said, “Look, I saw Absalom hanging in the
    terebinth tree.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the oak.” The Hebrew אֵלָה can refer to a terebinth and is sometimes
      rendered more generally as “oak.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶחָד
  chosen: One man
  alternatives:
  - a man
  - one person
  lexicon: HALOT
  rationale: The phrase literally means 'one man.' 'One man' preserves the Hebrew
    idiom and the gendered singular reference better than the more indefinite 'a man'
    or gender-neutral 'one person.'
- source_word: וַיַּרְא
  chosen: saw it
  alternatives:
  - saw
  - caught sight of
  lexicon: HALOT
  rationale: The verb means 'saw.' English idiom benefits from supplying the implied
    object ('it') since the next clause reports what was seen. This is a minimal contextual
    addition, not a paraphrase.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: '''Told'' is a natural rendering for נגד in narrative reporting. ''Reported
    to'' is possible, but ''told'' better matches readable modern English while preserving
    the sense.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is idiomatic modern
    English and preserves the force without archaic tone; 'Behold' would be too archaic
    for the stated philosophy.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: The perfect here reports a completed observation in past narrative discourse.
    'I saw' is the most natural English rendering in context.
- source_word: תָּלוּי
  chosen: hanging
  alternatives:
  - suspended
  - hung
  lexicon: HALOT
  rationale: The passive participle means 'hanging/suspended.' 'Hanging' is the clearest
    and most idiomatic in English narrative. 'Hung' can sound awkward or ambiguous
    in this construction.
- source_word: בָּאֵלָה
  chosen: in the terebinth tree
  alternatives:
  - in the oak
  - on the great tree
  lexicon: HALOT
  rationale: אֵלָה most specifically denotes a terebinth, though some English versions
    use 'oak.' Because the translation philosophy prioritizes source-language sense
    over tradition, 'terebinth tree' is preferred. The article is retained by rendering
    'the terebinth tree.'
