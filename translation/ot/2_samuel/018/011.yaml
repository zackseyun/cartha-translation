id: 2SA.18.11
reference: 2 Samuel 18:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יוֹאָ֗ב לָ/אִישׁ֙ הַ/מַּגִּ֣יד ל֔/וֹ וְ/הִנֵּ֣ה רָאִ֔יתָ וּ/מַדּ֛וּעַ
    לֹֽא הִכִּית֥/וֹ שָׁ֖ם אָ֑רְצָ/ה וְ/עָלַ֗/י לָ֤/תֶת לְ/ךָ֙ עֲשָׂ֣רָה כֶ֔סֶף וַ/חֲגֹרָ֖ה
    אֶחָֽת־׃
translation:
  text: Then Joab said to the man who had told him, “Look, you saw him; why then did
    you not strike him down there to the ground? I would have been obliged to give
    you ten pieces of silver and one belt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ten silver'; the specific unit is not stated, so 'pieces of silver'
      is supplied for natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'I would have given you ten pieces of silver and a belt.' The Hebrew
      idiom more literally says, 'it would have been on me to give you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּגִּיד
  chosen: who had told him
  alternatives:
  - who reported to him
  - the one informing him
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally: ''the man, the
    one telling/reporting to him.'' ''Who had told him'' is natural English and preserves
    the prior-report sense in context.'
- source_word: וְהִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Joab's pointed reaction. 'Look' preserves the deictic/interjective
    force in readable modern English better than archaic 'Behold.'
- source_word: רָאִיתָ
  chosen: you saw him
  alternatives:
  - you saw
  - you did see him
  lexicon: HALOT
  rationale: The object is implicit from context (Absalom) and is naturally supplied
    in English. This avoids awkwardness while not adding new information beyond the
    discourse context.
- source_word: הִכִּיתוֹ
  chosen: strike him down
  alternatives:
  - kill him
  - smite him
  - strike him
  lexicon: HALOT
  rationale: נכה commonly means strike/smite, and in this context implies a lethal
    blow. 'Strike him down' preserves the verbal imagery without over-specifying beyond
    the Hebrew, whereas 'kill him' is interpretive though contextually likely.
- source_word: שָׁם אָרְצָה
  chosen: there to the ground
  alternatives:
  - there on the spot
  - there to the earth
  - right there to the ground
  lexicon: HALOT
  rationale: שָׁם means 'there,' and אָרְצָה literally 'to the earth/ground.' The
    phrase likely intensifies the idea of striking him down where he was. 'There to
    the ground' keeps both elements visible in English.
- source_word: וְעָלַי לָתֶת לְךָ
  chosen: I would have been obliged to give you
  alternatives:
  - it would have been on me to give you
  - I would have given you
  - it would have been my duty to give you
  lexicon: HALOT
  rationale: 'The idiom עלי + infinitive expresses obligation/incumbency: ''it would
    be upon me to give.'' ''I would have been obliged to give you'' captures the idiomatic
    force more precisely than the flatter ''I would have given you.'''
- source_word: עֲשָׂרָה כֶסֶף
  chosen: ten pieces of silver
  alternatives:
  - ten silver pieces
  - ten shekels of silver
  - ten silver coins
  lexicon: HALOT
  rationale: The Hebrew says literally 'ten silver.' Since no unit is specified, 'pieces
    of silver' is a transparent English completion. 'Shekels' would be too specific
    without explicit textual support.
- source_word: חֲגֹרָה אֶחָת
  chosen: one belt
  alternatives:
  - a belt
  - one girdle
  - a sash
  lexicon: HALOT
  rationale: חגורה denotes a belt/girdle. 'Belt' is the clearest modern equivalent.
    Retaining 'one' reflects the Hebrew numeral and the itemized reward.
