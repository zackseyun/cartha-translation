id: 2SA.18.4
reference: 2 Samuel 18:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ הַ/מֶּ֔לֶךְ אֲשֶׁר יִיטַ֥ב בְּ/עֵינֵי/כֶ֖ם אֶעֱשֶׂ֑ה
    וַ/יַּעֲמֹ֤ד הַ/מֶּ֨לֶךְ֙ אֶל יַ֣ד הַ/שַּׁ֔עַר וְ/כָל הָ/עָם֙ יָֽצְא֔וּ לְ/מֵא֖וֹת
    וְ/לַ/אֲלָפִֽים־־־׃
translation:
  text: The king said to them, “What seems good in your eyes, I will do.” So the king
    stood beside the gate, and all the people went out by hundreds and by thousands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What is good in your eyes, I will do.'' The expression means
      what they judge to be best.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the gate' / 'at the side of the gate.' Hebrew literally, 'to the
      hand of the gate,' an idiom for a position beside it.
    reason: lexical_alternative
  - marker: c
    text: That is, in organized military units.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר יִיטַב בְּעֵינֵיכֶם
  chosen: What seems good in your eyes
  alternatives:
  - Whatever seems good to you
  - What is good in your sight
  lexicon: HALOT
  rationale: The idiom בְּעֵינֵי + person literally means 'in the eyes of' and conveys
    evaluation or approval. 'Seems good in your eyes' preserves the Hebrew imagery
    while remaining natural English.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will act accordingly
  lexicon: HALOT
  rationale: A straightforward future rendering of עשה. 'I will do' is sufficiently
    broad and matches the king's acceptance of their counsel without adding nuance
    not explicit in the text.
- source_word: אֶל יַד הַשַּׁעַר
  chosen: beside the gate
  alternatives:
  - at the side of the gate
  - by the gate
  lexicon: HALOT
  rationale: The expression אֶל יַד literally means 'to/at the hand of,' an idiom
    for proximity. 'Beside the gate' is idiomatic English and accurately conveys location
    without wooden literalism.
- source_word: וְכָל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the army
  lexicon: HALOT
  rationale: Though the context is military, the Hebrew says 'all the people.' Retaining
    'people' respects the source wording while the following phrase clarifies organized
    military deployment.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - marched out
  lexicon: HALOT
  rationale: יצא commonly means 'go out.' 'Marched out' would make the military sense
    more explicit, but the Hebrew verb itself is broader; the organizational phrase
    that follows supplies the martial context.
- source_word: לְמֵאוֹת וְלַאֲלָפִים
  chosen: by hundreds and by thousands
  alternatives:
  - in companies of hundreds and of thousands
  - according to hundreds and thousands
  lexicon: HALOT
  rationale: This reflects military grouping. 'By hundreds and by thousands' is concise
    and natural, while preserving the numeric structure of the Hebrew.
