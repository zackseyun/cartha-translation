id: 2SA.19.21
reference: 2 Samuel 19:21
source:
  edition: WLC
  text: כִּ֚י יָדַ֣ע עַבְדְּ/ךָ֔ כִּ֖י אֲנִ֣י חָטָ֑אתִי וְ/הִנֵּֽה בָ֣אתִי הַ/יּ֗וֹם
    רִאשׁוֹן֙ לְ/כָל בֵּ֣ית יוֹסֵ֔ף לָ/רֶ֕דֶת לִ/קְרַ֖את אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־׃ס
translation:
  text: For your servant knows that I have sinned. And look, I have come today as
    the first of all the house of Joseph to come down to meet my lord the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The house of Joseph'' refers to the Joseph tribes, especially the northern
      tribal groupings associated with Ephraim and Manasseh.'
    reason: cultural_note
  - marker: b
    text: Or 'from all the house of Joseph.' The Hebrew construction can be understood
      to mean that he was the first one out of the whole Joseph group to come down
      and meet the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces Shimei's explanation/ground for his plea. 'For' fits the discourse
    connection in English better than repeating 'because' twice.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - has known
  - acknowledges
  lexicon: HALOT
  rationale: The perfect expresses a present state of awareness or acknowledgment.
    'Knows' is natural English and preserves the sense of conscious admission.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in royal address it commonly functions
    as a deferential self-designation. 'Your servant' best reflects the courtly register
    here without importing bonded-status emphasis not foregrounded in this context.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  - I have done wrong
  lexicon: HALOT
  rationale: The verb חטא is the standard term 'to sin.' 'I have sinned' preserves
    both the moral weight and the perfect aspect as a present admission of past wrongdoing.
- source_word: וְהִנֵּה
  chosen: And look,
  alternatives:
  - and behold
  - and see
  - now look
  lexicon: HALOT
  rationale: Signals attention to the evidence of repentance/action. 'And look' is
    readable modern English while preserving the deictic force better than omitting
    it.
- source_word: בָאתִי
  chosen: I have come
  alternatives:
  - I came
  lexicon: HALOT
  rationale: 'The perfect can be rendered as a present-result action in context: he
    is now present before the king. ''I have come'' captures that nuance.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Readable modern English equivalent.
- source_word: רִאשׁוֹן
  chosen: as the first
  alternatives:
  - first
  - the first one
  lexicon: HALOT
  rationale: Used predicatively with Shimei's arrival. 'As the first' makes the comparative
    role in the clause explicit in idiomatic English.
- source_word: לְכָל בֵּית יוֹסֵף
  chosen: of all the house of Joseph
  alternatives:
  - from all the house of Joseph
  - of the whole house of Joseph
  lexicon: HALOT
  rationale: The phrase marks Shimei as first among the northern tribes represented
    by 'the house of Joseph.' 'Of all the house of Joseph' is idiomatic and preserves
    the collective sense.
- source_word: בֵּית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - the house of Ephraim
  - Joseph's house
  lexicon: HALOT
  rationale: A tribal/collective designation for Joseph-associated northern groups.
    The literal rendering should be preserved in the main text; explanatory nuance
    can be footnoted.
- source_word: לָרֶדֶת
  chosen: to come down
  alternatives:
  - to go down
  - coming down
  lexicon: HALOT
  rationale: Though the infinitive literally means 'to go down,' in relation to the
    speaker's movement toward the king, 'to come down' is more natural in English
    while retaining the topographical sense.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to meet with
  - to encounter
  lexicon: HALOT
  rationale: Standard idiomatic rendering for movement toward someone in welcome or
    confrontation; here clearly in the sense of going out to meet.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address to the king. 'My lord the king' preserves both the possessive
    politeness and the royal title.
