id: 2SA.19.7
reference: 2 Samuel 19:7
source:
  edition: WLC
  text: לְ/אַֽהֲבָה֙ אֶת שֹׂ֣נְאֶ֔י/ךָ וְ/לִ/שְׂנֹ֖א אֶת אֹהֲבֶ֑י/ךָ כִּ֣י הִגַּ֣דְתָּ
    הַ/יּ֗וֹם כִּ֣י אֵ֤ין לְ/ךָ֙ שָׂרִ֣ים וַ/עֲבָדִ֔ים כִּ֣י יָדַ֣עְתִּי הַ/יּ֗וֹם
    כִּ֠י לא אַבְשָׁל֥וֹם חַי֙ וְ/כֻלָּ֤/נוּ הַ/יּוֹם֙ מֵתִ֔ים כִּי אָ֖ז יָשָׁ֥ר בְּ/עֵינֶֽי/ךָ־־׀׀־׃
translation:
  text: to love those who hate you and to hate those who love you. For you have made
    it clear today that your commanders and servants mean nothing to you; for I know
    today that if Absalom were alive and all of us were dead today, then it would
    be right in your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you have declared today that there are for you no commanders
      and servants.' The Hebrew idiom means that they count for nothing in your estimation.
    reason: lexical_alternative
  - marker: b
    text: Or, 'if only Absalom were alive and all of us were dead today.' Joab's wording
      is a sharp counterfactual accusation, not a literal report of David's words.
    reason: alternative_reading
lexical_decisions:
- source_word: לְאַהֲבָה
  chosen: to love
  alternatives:
  - loving
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ל expresses the action being charged
    against David; English infinitive is the most natural equivalent in this rebuke.
- source_word: שֹׂנְאֶיךָ
  chosen: those who hate you
  alternatives:
  - your haters
  - your enemies
  lexicon: HALOT
  rationale: Participial form functions substantivally. 'Those who hate you' preserves
    the verbal force better than the more interpretive 'enemies.'
- source_word: וְלִשְׂנֹא
  chosen: and to hate
  alternatives:
  - and hating
  lexicon: HALOT
  rationale: Parallel to לְאַהֲבָה; infinitive is best mirrored with English infinitive
    for rhetorical balance.
- source_word: אֹהֲבֶיךָ
  chosen: those who love you
  alternatives:
  - your friends
  - your supporters
  lexicon: HALOT
  rationale: Substantival participle; 'those who love you' preserves the lexical contrast
    with 'those who hate you'.
- source_word: הִגַּדְתָּ
  chosen: you have made it clear
  alternatives:
  - you have declared
  - you have told
  lexicon: HALOT
  rationale: In context Joab is not saying David merely spoke, but that his conduct
    has shown or declared something publicly. 'Made it clear' captures the idiomatic
    force in readable English.
- source_word: שָׂרִים
  chosen: commanders
  alternatives:
  - princes
  - officials
  - leaders
  lexicon: HALOT
  rationale: In this military-political context, Joab refers to David's military leaders.
    'Commanders' fits the immediate setting better than the broader 'officials' or
    the archaic 'princes.'
- source_word: עֲבָדִים
  chosen: servants
  alternatives:
  - slaves
  - servants and troops
  lexicon: HALOT
  rationale: Here the term refers broadly to David's servants/subjects in royal service,
    not primarily to chattel slavery; 'servants' is the least misleading contextual
    rendering.
- source_word: אֵין לְךָ שָׂרִים וַעֲבָדִים
  chosen: your commanders and servants mean nothing to you
  alternatives:
  - you have neither commanders nor servants
  - there are no commanders and servants for you
  lexicon: HALOT
  rationale: 'The idiom is not ontological nonexistence but practical disregard: David''s
    behavior suggests they count for nothing. This rendering conveys the rebuke''s
    sense in natural English.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I perceive
  lexicon: HALOT
  rationale: 'Simple perfect with present force in English fits the discourse: Joab
    states his present conclusion based on today''s events.'
- source_word: לֹא אַבְשָׁלוֹם חַי וְכֻלָּנוּ הַיּוֹם מֵתִים
  chosen: if Absalom were alive and all of us were dead today
  alternatives:
  - that Absalom being alive and all of us dead today
  - that if only Absalom were alive and we all were dead today
  lexicon: HALOT
  rationale: 'Though introduced by כִּי, the clause is idiomatically counterfactual
    in context. English conditional wording best expresses Joab''s accusation: David
    would have preferred Absalom alive at the cost of his loyal men.'
- source_word: יָשָׁר בְּעֵינֶיךָ
  chosen: it would be right in your eyes
  alternatives:
  - it would please you
  - it would be acceptable to you
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of what is right/straight in someone's
    eyes. 'Right in your eyes' preserves the idiom's moral coloring better than the
    flatter 'please you.'
