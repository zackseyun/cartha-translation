id: 2SA.19.39
reference: 2 Samuel 19:39
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֗לֶךְ אִתִּ/י֙ יַעֲבֹ֣ר כִּמְהָ֔ם וַ/אֲנִי֙ אֶעֱשֶׂה לּ֔/וֹ
    אֶת הַ/טּ֖וֹב בְּ/עֵינֶ֑י/ךָ וְ/כֹ֛ל אֲשֶׁר תִּבְחַ֥ר עָלַ֖/י אֶֽעֱשֶׂה לָּֽ/ךְ־־־־׃
translation:
  text: Then the king said, “Let Kimham cross over with me, and I will do for him
    what seems good in your eyes; and whatever you choose to lay on me, I will do
    for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whatever you ask of me, I will do for you.' The Hebrew expression is
      somewhat elliptical, literally 'whatever you choose upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: Then the king said
  alternatives:
  - And the king said
  - So the king said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אִתִּי יַעֲבֹר כִּמְהָם
  chosen: Let Kimham cross over with me
  alternatives:
  - Kimham shall cross over with me
  - Kimham may cross over with me
  lexicon: HALOT
  rationale: The imperfect here functions jussively in direct speech, expressing the
    king's decision/invitation. 'Let ... cross over' captures this better than a simple
    future. 'Cross over' preserves the repeated עבר language in the context of crossing
    the Jordan.
- source_word: כִּמְהָם
  chosen: Kimham
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַאֲנִי אֶעֱשֶׂה לוֹ
  chosen: and I will do for him
  alternatives:
  - and I will deal with him
  - and I will provide for him
  lexicon: HALOT
  rationale: עשה is broad and contextually refers to acting beneficially toward Kimham.
    'Do for him' stays close to the Hebrew without over-specifying the benefit.
- source_word: אֶת הַטּוֹב בְּעֵינֶיךָ
  chosen: what seems good in your eyes
  alternatives:
  - the good in your eyes
  - what is good in your sight
  - what pleases you
  lexicon: HALOT
  rationale: This idiom means what is judged good or pleasing by the addressee. 'What
    seems good in your eyes' is idiomatic English that preserves the Hebrew imagery
    better than the flatter 'what pleases you.'
- source_word: וְכֹל אֲשֶׁר תִּבְחַר עָלַי
  chosen: and whatever you choose to lay on me
  alternatives:
  - and whatever you choose of me
  - and whatever you ask of me
  - and whatever you choose concerning me
  lexicon: HALOT
  rationale: בחר with עלי is idiomatic and elliptical. In context David offers to
    undertake whatever Barzillai selects or requests. 'Choose to lay on me' preserves
    the preposition על ('on/upon me') and the sense of assuming an obligation, while
    remaining understandable.
- source_word: אֶעֱשֶׂה לָּךְ
  chosen: I will do for you
  alternatives:
  - I will do it for you
  - I will do for your sake
  lexicon: HALOT
  rationale: The final clause restates the king's promise personally to Barzillai.
    English supplies a natural objectless 'do for you' from the Hebrew idiom.
