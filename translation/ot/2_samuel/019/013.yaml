id: 2SA.19.13
reference: 2 Samuel 19:13
source:
  edition: WLC
  text: אַחַ֣/י אַתֶּ֔ם עַצְמִ֥/י וּ/בְשָׂרִ֖/י אַתֶּ֑ם וְ/לָ֧/מָּה תִהְי֛וּ אַחֲרֹנִ֖ים
    לְ/הָשִׁ֥יב אֶת הַ/מֶּֽלֶךְ־׃
translation:
  text: You are my brothers; you are my own bone and flesh. So why should you be the
    last to bring back the king?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'my kinsmen'; literally, 'my brothers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my bone and my flesh,' an idiom for close blood relationship.
    reason: cultural_note
  - marker: c
    text: David speaks of himself in the third person as 'the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kinsmen
  - my brothers and kin
  lexicon: HALOT
  rationale: The noun literally means 'my brothers.' In this context David addresses
    the elders of Judah as close kin. Per the project's gender-accurate policy, 'brothers'
    is retained rather than neutralizing to 'relatives,' while the kinship force is
    reinforced by the following 'bone and flesh.'
- source_word: עַצְמִי וּבְשָׂרִי
  chosen: my own bone and flesh
  alternatives:
  - my bone and my flesh
  - my very bone and flesh
  lexicon: HALOT
  rationale: This idiom expresses blood relationship or close kinship. 'My own bone
    and flesh' preserves the concrete Hebrew imagery while sounding natural in English;
    'own' brings out the possessive emphasis without paraphrasing away the idiom.
- source_word: וְלָמָה
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces an appeal based on the
    prior kinship statement. 'So why' captures the inferential force in natural English.
- source_word: תִּהְיוּ אַחֲרֹנִים
  chosen: should you be the last
  alternatives:
  - will you be the last
  - are you the last
  lexicon: HALOT
  rationale: The imperfect here is rhetorical and exhortative rather than merely predictive.
    'Should you be the last' best conveys David's persuasive question. 'The last'
    preserves the comparative sense of being behind others in acting.
- source_word: לְהָשִׁיב
  chosen: to bring back
  alternatives:
  - to restore
  - to return
  lexicon: HALOT
  rationale: The Hiphil of שוב means 'cause to return/bring back.' With 'the king'
    as object, 'bring back' is the most straightforward English rendering. 'Restore'
    is possible but can sound more abstract or institutional than the Hebrew here.
- source_word: אֶת־הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - me, the king
  lexicon: HALOT
  rationale: The Hebrew uses third person, likely reflecting royal self-reference
    by David. Rendering it as 'the king' preserves the source wording and rhetorical
    form better than converting it to first person.
