id: 2SA.19.31
reference: 2 Samuel 19:31
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מְפִיבֹ֨שֶׁת֙ אֶל הַ/מֶּ֔לֶךְ גַּ֥ם אֶת הַ/כֹּ֖ל יִקָּ֑ח אַ֠חֲרֵי
    אֲשֶׁר בָּ֞א אֲדֹנִ֥/י הַ/מֶּ֛לֶך בְּ/שָׁל֖וֹם אֶל בֵּיתֽ/וֹ־־־־׃ס
translation:
  text: Mephibosheth said to the king, “Let him even take it all, now that my lord
    the king has come safely to his own house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “in peace.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in English narrative.
- source_word: מְפִיבֹשֶׁת
  chosen: Mephibosheth
  rationale: Personal names are transliterated by standard English convention.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to King David
  lexicon: HALOT
  rationale: The Hebrew has the title with article, not the proper name; 'to the king'
    preserves the source wording.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'In this concessive context, גַּם adds emphasis: Mephibosheth yields
    not merely part but ''even'' the whole.'
- source_word: אֶת הַכֹּל
  chosen: it all
  alternatives:
  - the whole
  - everything
  lexicon: HALOT
  rationale: Refers back to the disputed property/inheritance in context. 'It all'
    is idiomatic English while preserving totality.
- source_word: יִקָּח
  chosen: Let him even take
  alternatives:
  - he may take
  - let him take
  lexicon: HALOT
  rationale: The imperfect here functions jussively in direct speech, expressing willing
    concession. English 'Let him take' captures that force.
- source_word: אַחֲרֵי אֲשֶׁר
  chosen: now that
  alternatives:
  - after
  - since
  lexicon: HALOT
  rationale: Though literally 'after that,' in context it introduces the reason/occasion
    for Mephibosheth's concession. 'Now that' is natural English and preserves the
    temporal-causal sense.
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  lexicon: HALOT
  rationale: English present perfect fits the relevance of the completed action to
    the present speech situation.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address is best preserved with 'my lord the king'; 'master' is
    possible but less idiomatic here.
- source_word: בְּשָׁלוֹם
  chosen: safely
  alternatives:
  - in peace
  - peacefully
  lexicon: HALOT
  rationale: The phrase denotes safe, unharmed return. 'Safely' communicates the sense
    clearly in modern English; the more literal 'in peace' is preserved in a footnote.
- source_word: אֶל בֵּיתוֹ
  chosen: to his own house
  alternatives:
  - to his house
  - home
  lexicon: HALOT
  rationale: '''His own house'' slightly brings out the possessive emphasis and the
    restoration of the king to his rightful residence.'
