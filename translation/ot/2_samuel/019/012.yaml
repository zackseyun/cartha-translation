id: 2SA.19.12
reference: 2 Samuel 19:12
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ דָּוִ֗ד שָׁ֠לַח אֶל צָד֨וֹק וְ/אֶל אֶבְיָתָ֥ר הַ/כֹּהֲנִים֮
    לֵ/אמֹר֒ דַּבְּר֞וּ אֶל זִקְנֵ֤י יְהוּדָה֙ לֵ/אמֹ֔ר לָ֤/מָּה תִֽהְיוּ֙ אַֽחֲרֹנִ֔ים
    לְ/הָשִׁ֥יב אֶת הַ/מֶּ֖לֶךְ אֶל בֵּית֑/וֹ וּ/דְבַר֙ כָּל יִשְׂרָאֵ֔ל בָּ֥א אֶל
    הַ/מֶּ֖לֶךְ אֶל בֵּיתֽ/וֹ־־־־־־־־׃
translation:
  text: And King David sent to Zadok and to Abiathar the priests, saying, “Speak to
    the elders of Judah, saying, ‘Why should you be the last to bring the king back
    to his house, when the word of all Israel has come to the king, to his house?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when all Israel’s proposal/message had reached the king at his house.”
      The Hebrew phrase 'the word of all Israel' is broad and may refer to the report,
      proposal, or appeal from the tribes to bring David back.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: sent to
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: The verb commonly means 'send.' With אֶל plus named recipients, 'sent
    to' best reflects dispatching a message to Zadok and Abiathar rather than summoning
    them.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as the title
    plus name, while preserving the royal designation.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun identifying Zadok and Abiathar
    by office.
- source_word: דַּבְּרוּ אֶל
  chosen: Speak to
  alternatives:
  - Tell
  - Speak with
  lexicon: HALOT
  rationale: דבר אל regularly means 'speak to.' 'Tell' is possible but slightly more
    interpretive; 'speak to' preserves the form of the command.
- source_word: זִקְנֵי יְהוּדָה
  chosen: the elders of Judah
  alternatives:
  - Judah’s elders
  lexicon: HALOT
  rationale: A standard construct phrase; 'elders of Judah' is clear and formal enough
    for the political leaders in view.
- source_word: לָמָּה תִהְיוּ אַחֲרֹנִים
  chosen: Why should you be the last
  alternatives:
  - Why will you be the last
  - Why are you the last
  lexicon: HALOT
  rationale: The imperfect here is naturally rendered in English as a rhetorical challenge
    about what they are about to do. 'Should you be' captures the exhortational force
    better than a flat future.
- source_word: לְהָשִׁיב
  chosen: to bring back
  alternatives:
  - to restore
  - to return
  lexicon: HALOT
  rationale: In context of escorting David back after Absalom's revolt, 'bring back'
    best conveys the causative sense of שוב.
- source_word: אֶת־הַמֶּלֶךְ אֶל־בֵּיתוֹ
  chosen: the king back to his house
  alternatives:
  - the king back home
  - the king to his palace
  lexicon: HALOT
  rationale: '''House'' is the literal term and can include palace/residence. ''Home''
    is smoother but less formal; ''palace'' is too specific for the Hebrew.'
- source_word: וּדְבַר כָּל־יִשְׂרָאֵל
  chosen: the word of all Israel
  alternatives:
  - the proposal of all Israel
  - the report of all Israel
  - all Israel’s word
  lexicon: HALOT
  rationale: דבר is broad and can mean word, matter, proposal, or message. 'Word'
    keeps the semantic breadth and allows the reader to infer that Israel's appeal
    or message is meant.
- source_word: בָּא אֶל־הַמֶּלֶךְ
  chosen: has come to the king
  alternatives:
  - came to the king
  - reached the king
  lexicon: HALOT
  rationale: The perfect is well represented by English present perfect in this discourse
    setting, indicating that the message has already reached David.
- source_word: אֶל־בֵּיתוֹ
  chosen: to his house
  alternatives:
  - at his house
  - to his home
  lexicon: HALOT
  rationale: The repeated phrase is retained rather literally. Though somewhat awkward
    in English, it reflects the Hebrew repetition and likely means the message reached
    the king at his residence.
