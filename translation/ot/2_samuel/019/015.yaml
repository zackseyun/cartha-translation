id: 2SA.19.15
reference: 2 Samuel 19:15
source:
  edition: WLC
  text: וַ/יַּ֛ט אֶת לְבַ֥ב כָּל אִישׁ יְהוּדָ֖ה כְּ/אִ֣ישׁ אֶחָ֑ד וַֽ/יִּשְׁלְחוּ֙
    אֶל הַ/מֶּ֔לֶךְ שׁ֥וּב אַתָּ֖ה וְ/כָל עֲבָדֶֽי/ךָ־־־־־׃
translation:
  text: And he swayed the heart of every man of Judah as one man, and they sent word
    to the king, “Return, you and all your servants.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “turned the heart of every man of Judah”; the Hebrew idiom refers to
      winning over or inclining their loyalty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “as one man,” an idiom meaning unitedly or with one accord.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּט
  chosen: swayed
  alternatives:
  - turned
  - inclined
  - won over
  lexicon: HALOT
  rationale: The verb נָטָה literally means 'stretch out, turn, incline.' With 'heart'
    as object, the sense is influencing disposition or allegiance. 'Swayed' captures
    the idiomatic force in natural English without over-paraphrasing; 'turned' is
    possible but can sound overly literal or imply conversion language not explicit
    here.
- source_word: לְבַב
  chosen: heart
  alternatives:
  - mind
  - will
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes inner disposition, will, or loyalty.
    'Heart' preserves the Hebrew anthropological expression, while the idiomatic sense
    is explained by the surrounding English.
- source_word: כָּל אִישׁ יְהוּדָה
  chosen: every man of Judah
  alternatives:
  - all the men of Judah
  - everyone in Judah
  lexicon: HALOT
  rationale: The singular distributive construction literally means 'every man of
    Judah.' Following the project's gender-accurate policy, 'man' is retained rather
    than neutralizing to 'everyone,' since the Hebrew is grammatically masculine and
    refers to the men of Judah as the political actors in context.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - like one man
  - with one accord
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for unified action. 'As one man' preserves
    the imagery and remains understandable; 'with one accord' is interpretive and
    less formally tied to the source.
- source_word: וַיִּשְׁלְחוּ אֶל הַמֶּלֶךְ
  chosen: they sent word to the king
  alternatives:
  - they sent to the king
  - they sent a message to the king
  lexicon: HALOT
  rationale: The object of 'sent' is implicit in Hebrew. English normally supplies
    'word' or 'a message.' 'Sent word' is concise, idiomatic, and faithful to the
    implied sense.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Come back
  - Turn back
  lexicon: HALOT
  rationale: In direct address to David, the imperative means to come back/return.
    'Return' is slightly more formal and suits royal address while remaining natural.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants/officials
  - your attendants
  lexicon: HALOT
  rationale: In a royal context, עֶבֶד often denotes servants or officials attached
    to the king. 'Your servants' is the most direct rendering and leaves the social
    range appropriately broad.
