id: 2SA.19.33
reference: 2 Samuel 19:33
source:
  edition: WLC
  text: וּ/בַרְזִלַּי֙ זָקֵ֣ן מְאֹ֔ד בֶּן שְׁמֹנִ֖ים שָׁנָ֑ה וְ/הֽוּא כִלְכַּ֤ל אֶת
    הַ/מֶּ֨לֶךְ֙ בְּ/שִׁיבָת֣/וֹ בְ/מַחֲנַ֔יִם כִּֽי אִ֛ישׁ גָּד֥וֹל ה֖וּא מְאֹֽד־־־־׃
translation:
  text: Now Barzillai was very old, eighty years old, and he had provided for the
    king during his stay in Mahanaim, for he was a very great man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was a very wealthy man' or 'he was a very prominent man.' The Hebrew
      expression 'a very great man' can refer broadly to wealth, status, or influence.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן מְאֹד
  chosen: was very old
  alternatives:
  - was exceedingly old
  - was very aged
  lexicon: HALOT
  rationale: זָקֵן functions predicatively here, with מְאֹד intensifying it. 'Very
    old' is natural modern English and preserves the emphasis without sounding archaic.
- source_word: בֶּן שְׁמֹנִים שָׁנָה
  chosen: eighty years old
  alternatives:
  - a son of eighty years
  - aged eighty years
  lexicon: HALOT
  rationale: This idiom literally reads 'a son of eighty years' but standard English
    idiom is 'eighty years old.'
- source_word: כִלְכַּל
  chosen: had provided for
  alternatives:
  - had sustained
  - had supported
  - had supplied
  lexicon: HALOT
  rationale: The verb כלכל in this context refers to materially sustaining or supplying
    someone's needs. 'Provided for' best captures the sense of practical support given
    to David at Mahanaim.
- source_word: אֶת הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite direct object referring to David in his royal capacity. 'The
    king' preserves the Hebrew designation.
- source_word: בְּשִׁיבָתוֹ
  chosen: during his stay
  alternatives:
  - when he stayed
  - in his dwelling
  - while he was staying
  lexicon: HALOT
  rationale: From ישב, here denoting residence/staying rather than enthronement. The
    suffix most naturally refers to the king, the object just mentioned. 'During his
    stay' is idiomatic and contextually clear.
- source_word: בְמַחֲנַיִם
  chosen: in Mahanaim
  lexicon: HALOT
  rationale: Place name, transliterated according to the translation philosophy for
    personal and place names.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason Barzillai was able to provide for the king. 'For'
    fits the explanatory relation smoothly in English.
- source_word: אִישׁ גָּדוֹל הוּא מְאֹד
  chosen: he was a very great man
  alternatives:
  - he was a very wealthy man
  - he was a very prominent man
  lexicon: HALOT
  rationale: The phrase can denote social prominence, wealth, or importance. In this
    narrative context, Barzillai's capacity to support the king likely reflects substantial
    means and status. 'A very great man' preserves the Hebrew's broader sense without
    reducing it only to wealth.
