id: 2SA.19.42
reference: 2 Samuel 19:42
source:
  edition: WLC
  text: וְ/הִנֵּ֛ה כָּל אִ֥ישׁ יִשְׂרָאֵ֖ל בָּאִ֣ים אֶל הַ/מֶּ֑לֶךְ וַ/יֹּאמְר֣וּ
    אֶל הַ/מֶּ֡לֶךְ מַדּוּעַ֩ גְּנָב֨וּ/ךָ אַחֵ֜י/נוּ אִ֣ישׁ יְהוּדָ֗ה וַ/יַּעֲבִ֨רוּ
    אֶת הַ/מֶּ֤לֶךְ וְ/אֶת בֵּית/וֹ֙ אֶת הַ/יַּרְדֵּ֔ן וְ/כָל אַנְשֵׁ֥י דָוִ֖ד עִמּֽ/וֹ־־־־־־־׃ס
translation:
  text: And behold, all the men of Israel came to the king and said to the king, “Why
    have our brothers, the men of Judah, stolen you away and brought the king and
    his household across the Jordan, with all David’s men with him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “taken you secretly” / “stolen you.” The Hebrew uses the ordinary verb
      for stealing as a metaphor for Judah’s acting without the participation of the
      other Israelites.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “all the men of Israel” and “the men of Judah,” using masculine collective
      language for the groups represented.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marking force of הִנֵּה as an attention-getter.
    'Behold' is slightly formal but still readable and preserves the narrative vividness
    better than omitting it.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israel
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, the phrase functions collectively.
    'Men of Israel' preserves the masculine, representative wording more accurately
    than flattening to 'all Israel.'
- source_word: בָּאִים
  chosen: came
  alternatives:
  - were coming
  lexicon: HALOT
  rationale: The participle in narrative context is naturally rendered with simple
    past in English for smoothness and sequence.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the interrogative.
- source_word: גְּנָבוּךָ
  chosen: stolen you away
  alternatives:
  - stolen you
  - taken you secretly
  - kidnapped you
  lexicon: HALOT
  rationale: The verb גנב literally means 'steal.' In this political context it is
    metaphorical and accusatory rather than literal kidnapping; 'stolen you away'
    preserves the metaphor and the sense that Judah appropriated the king without
    consulting the rest of Israel.
- source_word: אַחֵינוּ
  chosen: our brothers
  alternatives:
  - our kinsmen
  lexicon: HALOT
  rationale: Keeps the familial language of intra-Israelite dispute. 'Brothers' best
    reflects the source and preserves the rhetorical force.
- source_word: אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the people of Judah
  - the men of the tribe of Judah
  lexicon: HALOT
  rationale: Though singular in form, אִישׁ here is collective. 'Men of Judah' matches
    the collective masculine usage and parallels 'men of Israel.'
- source_word: וַיַּעֲבִרוּ
  chosen: brought ... across
  alternatives:
  - escorted ... across
  - caused ... to cross
  lexicon: HALOT
  rationale: The Hiphil of עבר means 'cause to cross' or 'bring across.' 'Brought
    ... across' is natural English and preserves the causative sense.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his family
  lexicon: HALOT
  rationale: In context this refers not to a building but to the king's household/retinue.
    'Household' is the most accurate contextual rendering.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering; 'River' is not necessary because the proper
    name is well known and the Hebrew simply has 'the Jordan.'
- source_word: וְכָל אַנְשֵׁי דָוִד עִמּוֹ
  chosen: with all David’s men with him
  alternatives:
  - and all David's men with him
  - along with all David's men
  lexicon: HALOT
  rationale: The phrase is somewhat appositional to the crossing event. Rendering
    it with 'with' keeps the Hebrew linkage and preserves the final עִמּוֹ ('with
    him'), even if slightly repetitive in English. The repetition reflects the Hebrew
    emphasis on David's entourage accompanying the king.
