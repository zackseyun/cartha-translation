id: 2SA.19.16
reference: 2 Samuel 19:16
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב הַ/מֶּ֔לֶךְ וַ/יָּבֹ֖א עַד הַ/יַּרְדֵּ֑ן וִ/יהוּדָ֞ה בָּ֣א הַ/גִּלְגָּ֗לָ/ה
    לָ/לֶ֨כֶת֙ לִ/קְרַ֣את הַ/מֶּ֔לֶךְ לְ/הַעֲבִ֥יר אֶת הַ/מֶּ֖לֶךְ אֶת הַ/יַּרְדֵּֽן־־־׃
translation:
  text: Then the king returned and came as far as the Jordan, and Judah had come to
    Gilgal to go to meet the king, to bring the king across the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of Judah had come to Gilgal.' The Hebrew uses 'Judah' collectively
      for the people/tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: Qal wayyiqtol of שוב in narrative sequence; 'returned' is the most natural
    English rendering in context of David coming back after flight.
- source_word: וַיָּבֹא עַד הַיַּרְדֵּן
  chosen: came as far as the Jordan
  alternatives:
  - came to the Jordan
  - arrived at the Jordan
  lexicon: HALOT
  rationale: בוא with עַד marks movement up to a boundary/location. 'As far as' preserves
    the nuance of reaching the Jordan without over-specifying crossing at this point.
- source_word: וִיהוּדָה
  chosen: Judah
  alternatives:
  - the men of Judah
  lexicon: HALOT
  rationale: The proper noun can stand collectively for the tribe/people of Judah.
    The Hebrew text simply has 'Judah,' so the main text preserves that concise collective
    sense rather than expanding interpretively to 'the men of Judah.'
- source_word: בָּא
  chosen: had come
  alternatives:
  - came
  lexicon: HALOT
  rationale: The qatal after the preceding wayyiqtol chain is well represented in
    English as pluperfect, indicating Judah's arrival at Gilgal as prior/background
    to the purpose clauses that follow.
- source_word: הַגִּלְגָּלָה
  chosen: to Gilgal
  alternatives:
  - toward Gilgal
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward/to Gilgal.
    Standard English idiom is simply 'to Gilgal.'
- source_word: לָלֶכֶת לִקְרַאת
  chosen: to go to meet
  alternatives:
  - to go out to meet
  - to meet
  lexicon: HALOT
  rationale: The paired infinitives express purpose. 'To go to meet' preserves both
    verbs without unnecessary expansion.
- source_word: לְהַעֲבִיר אֶת־הַמֶּלֶךְ אֶת־הַיַּרְדֵּן
  chosen: to bring the king across the Jordan
  alternatives:
  - to escort the king across the Jordan
  - to ferry the king over the Jordan
  lexicon: HALOT
  rationale: Hiphil of עבר means to cause to pass/cross. 'Bring ... across' is clear,
    natural English and preserves the causative sense without importing a specific
    means such as a ferry unless context states it.
