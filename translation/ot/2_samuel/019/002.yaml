id: 2SA.19.2
reference: 2 Samuel 19:2
source:
  edition: WLC
  text: וַ/יֻּגַּ֖ד לְ/יוֹאָ֑ב הִנֵּ֨ה הַ/מֶּ֧לֶךְ בֹּכֶ֛ה וַ/יִּתְאַבֵּ֖ל עַל אַבְשָׁלֹֽם־׃
translation:
  text: And it was reported to Joab, “Look, the king is weeping and mourning over
    Absalom.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal of נגד conveys that information was made known to Joab.
    'It was reported' is natural modern English and preserves the passive sense without
    specifying an unnamed agent.
- source_word: לְיוֹאָב
  chosen: to Joab
  rationale: Straightforward preposition plus personal name; name is transliterated
    per translation philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the content of the report. 'Look'
    preserves the immediacy in readable modern English better than the archaic 'Behold.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  rationale: Definite title referring to David in context; translated rather than
    replaced with the proper name because the Hebrew uses the title.
- source_word: בֹּכֶה
  chosen: is weeping
  alternatives:
  - is crying
  - weeps
  lexicon: HALOT
  rationale: Participle indicates ongoing action. 'Is weeping' captures the durative
    sense more clearly than a simple English present.
- source_word: וַיִּתְאַבֵּל
  chosen: and mourning
  alternatives:
  - and lamenting
  - and grieving
  lexicon: HALOT
  rationale: The hitpael of אבל denotes mourning, often in bereavement. Coordinating
    it with the participial sense in English ('is weeping and mourning') best reflects
    the report's description of the king's ongoing state.
- source_word: עַל אַבְשָׁלוֹם
  chosen: over Absalom
  alternatives:
  - for Absalom
  - because of Absalom
  lexicon: HALOT
  rationale: עַל with verbs of mourning commonly marks the object/cause of grief.
    'Over Absalom' is idiomatic English for mourning someone.
