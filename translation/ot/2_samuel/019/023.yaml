id: 2SA.19.23
reference: 2 Samuel 19:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֗ד מַה לִּ֤/י וְ/לָ/כֶם֙ בְּנֵ֣י צְרוּיָ֔ה כִּי תִֽהְיוּ
    לִ֥/י הַ/יּ֖וֹם לְ/שָׂטָ֑ן הַ/יּ֗וֹם י֤וּמַת אִישׁ֙ בְּ/יִשְׂרָאֵ֔ל כִּ֚י הֲ/ל֣וֹא
    יָדַ֔עְתִּי כִּ֥י הַ/יּ֖וֹם אֲנִי מֶ֥לֶךְ עַל יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And David said, “What have I to do with you, sons of Zeruiah, that you should
    become an adversary to me today? Shall any man be put to death in Israel today?
    For do I not know that today I am king over Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a satan to me,'' that is, ''an adversary/opponent to me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לִּי וְלָכֶם
  chosen: What have I to do with you
  alternatives:
  - What is there between me and you
  - What do I have in common with you
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression of dissociation or rebuke. The chosen English
    is a natural equivalent that preserves the force without woodenly reproducing
    the idiom.
- source_word: בְּנֵי צְרוּיָה
  chosen: sons of Zeruiah
  alternatives:
  - you sons of Zeruiah
  lexicon: HALOT
  rationale: A literal familial designation used as a direct address to Joab and Abishai.
    'Sons' is retained rather than generalized, in keeping with gender-accurate translation
    and the narrative's concrete reference.
- source_word: כִּי תִהְיוּ לִי הַיּוֹם לְשָׂטָן
  chosen: that you should become an adversary to me today
  alternatives:
  - that you should be a satan to me today
  - that you should oppose me today
  - that you should become my accuser today
  lexicon: HALOT
  rationale: שָׂטָן here is a common noun meaning adversary/opponent, not a proper
    name. 'Adversary' preserves the lexical sense and avoids importing later demonological
    associations.
- source_word: יּוּמַת אִישׁ
  chosen: Shall any man be put to death
  alternatives:
  - Should a man be executed
  - Is any man to be put to death
  lexicon: HALOT
  rationale: The passive/causative form conveys judicial execution rather than mere
    dying. 'Be put to death' is clear modern English and preserves the legal nuance.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew singular masculine noun is used generically here. Per translation
    philosophy, gender-accurate rendering is preferred where it matches the source's
    representative force.
- source_word: הֲלוֹא יָדַעְתִּי
  chosen: do I not know
  alternatives:
  - surely I know
  - do I not realize
  lexicon: HALOT
  rationale: The interrogative plus negation is rhetorical, expecting affirmation.
    'Do I not know' preserves the rhetorical shape better than flattening it into
    an assertion.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  chosen: king over Israel
  alternatives:
  - king of Israel
  lexicon: HALOT
  rationale: The preposition עַל is most directly 'over.' 'King over Israel' preserves
    the Hebrew wording and emphasizes David's present royal authority over the people.
