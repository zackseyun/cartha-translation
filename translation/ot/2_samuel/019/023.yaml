theological_decisions:
- issue: Meaning of שָׂטָן
  chosen_reading: common noun 'adversary' rather than the proper name Satan
  alternative_readings:
  - Satan
  rationale: In this historical narrative context, the term denotes opposition or
    obstruction from the sons of Zeruiah. Rendering it as the proper name would import
    a theological claim not warranted by the immediate Hebrew usage.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the text''s plain sense without importing doctrinal claims.'
