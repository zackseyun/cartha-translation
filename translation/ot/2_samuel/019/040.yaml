id: 2SA.19.40
reference: 2 Samuel 19:40
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֧ר כָּל הָ/עָ֛ם אֶת הַ/יַּרְדֵּ֖ן וְ/הַ/מֶּ֣לֶךְ עָבָ֑ר וַ/יִּשַּׁ֨ק
    הַ/מֶּ֤לֶךְ לְ/בַרְזִלַּי֙ וַ/יְבָ֣רֲכֵ֔/הוּ וַ/יָּ֖שָׁב לִ/מְקֹמֽ/וֹ־־׃ס
translation:
  text: All the people crossed the Jordan, and the king crossed over. Then the king
    kissed Barzillai and blessed him, and he returned to his own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he went back to his place.' The subject of 'returned' is most naturally
      Barzillai, though English readers may need the antecedent clarified from context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed
  alternatives:
  - passed over
  - went across
  lexicon: HALOT
  rationale: From עבר, here in the context of traversing the Jordan River. 'Crossed'
    is natural modern English and preserves the concrete movement.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the populace
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this narrative setting it refers to the
    assembled people accompanying the king, not necessarily only soldiers, so 'all
    the people' is the broadest accurate rendering.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The direct object is the river Jordan. English idiom commonly says 'crossed
    the Jordan'; adding 'River' is possible but unnecessary.
- source_word: וְהַמֶּלֶךְ עָבָר
  chosen: and the king crossed over
  alternatives:
  - and the king crossed
  - and the king passed over
  lexicon: HALOT
  rationale: The second clause repeats עבר with the king as subject. 'Crossed over'
    slightly reflects the Hebrew repetition while reading smoothly in English.
- source_word: וַיִּשַּׁק
  chosen: kissed
  alternatives:
  - gave a kiss to
  lexicon: HALOT
  rationale: נשק in this stem means 'kiss.' In context it is a gesture of affection
    and farewell; the simple verb is best.
- source_word: לְבַרְזִלַּי
  chosen: Barzillai
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַיְבָרֲכֵהוּ
  chosen: blessed him
  alternatives:
  - bid him farewell with a blessing
  lexicon: HALOT
  rationale: ברך normally means 'bless.' Although the social setting is a farewell,
    the Hebrew explicitly uses the blessing verb, so the main text should retain it.
- source_word: וַיָּשָׁב לִמְקֹמוֹ
  chosen: and he returned to his own place
  alternatives:
  - and he went back to his place
  - and he returned home
  lexicon: HALOT
  rationale: The singular subject most naturally refers to Barzillai, the nearest
    antecedent and the one just dismissed in the context. 'His own place' preserves
    מקום without overinterpreting it as 'home,' though that sense is implied.
