id: 2SA.19.1
reference: 2 Samuel 19:1
source:
  edition: WLC
  text: וַ/יִּרְגַּ֣ז הַ/מֶּ֗לֶךְ וַ/יַּ֛עַל עַל עֲלִיַּ֥ת הַ/שַּׁ֖עַר וַ/יֵּ֑בְךְּ
    וְ/כֹ֣ה אָמַ֣ר בְּ/לֶכְתּ֗/וֹ בְּנִ֤/י אַבְשָׁלוֹם֙ בְּנִ֣/י בְנִ֣/י אַבְשָׁל֔וֹם
    מִֽי יִתֵּ֤ן מוּתִ/י֙ אֲנִ֣י תַחְתֶּ֔י/ךָ אַבְשָׁל֖וֹם בְּנִ֥/י בְנִֽ/י־׀־׃
translation:
  text: Then the king was deeply shaken, and he went up to the chamber over the gate
    and wept. As he went, he said, “My son Absalom! My son, my son Absalom! If only
    I had died instead of you, Absalom, my son, my son!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the upper room of the gate.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''Who will give...?'' expressing a wish; that is, ''If only''
      or ''Would that.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְגַּז
  chosen: was deeply shaken
  alternatives:
  - was agitated
  - was disturbed
  - trembled
  lexicon: HALOT
  rationale: The verb רגז can denote trembling, agitation, or deep emotional disturbance.
    In this mourning context, 'was deeply shaken' captures the king's intense emotional
    upheaval better than a more physical 'trembled' or a flatter 'was disturbed.'
- source_word: עֲלִיַּת הַשַּׁעַר
  chosen: the chamber over the gate
  alternatives:
  - the upper room of the gate
  - the roof chamber of the gate
  lexicon: HALOT
  rationale: עֲלִיָּה refers to an upper room/chamber. With הַשַּׁעַר, the sense is
    a room above or attached to the gate structure. 'Chamber over the gate' is natural
    English and preserves the architectural sense.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: '''Wept'' is the standard and suitably solemn rendering for בכה here;
    ''cried'' is possible but less precise in literary tone.'
- source_word: וְכֹה אָמַר בְּלֶכְתּוֹ
  chosen: As he went, he said
  alternatives:
  - and thus he said as he went
  - and this is what he said while going
  lexicon: HALOT
  rationale: The Hebrew literally marks manner/content ('thus he said') and circumstance
    ('in his going'). 'As he went, he said' gives idiomatic English while preserving
    the ongoing movement and repeated lament.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: The repeated filial address is central to the pathos of the verse and
    should be preserved each time rather than reduced or varied.
- source_word: מִי יִתֵּן
  chosen: If only
  alternatives:
  - Who will give that...
  - Would that
  lexicon: HALOT
  rationale: This idiom expresses a wish. 'If only' is clear modern English and conveys
    the lament force without archaic stiffness.
- source_word: מוּתִי אֲנִי תַחְתֶּיךָ
  chosen: I had died instead of you
  alternatives:
  - let me die in your place
  - my dying instead of you
  lexicon: HALOT
  rationale: The construction expresses the wish that the speaker had died in the
    other's place. 'I had died instead of you' fits the counterfactual lament naturally
    in English.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
