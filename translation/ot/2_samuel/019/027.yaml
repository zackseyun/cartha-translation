id: 2SA.19.27
reference: 2 Samuel 19:27
source:
  edition: WLC
  text: וַ/יֹּאמַ֕ר אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ עַבְדִּ֣/י רִמָּ֑/נִי כִּֽי אָמַ֨ר עַבְדְּ/ךָ֜
    אֶחְבְּשָׁה לִּ/י֩ הַ/חֲמ֨וֹר וְ/אֶרְכַּ֤ב עָלֶ֨י/הָ֙ וְ/אֵלֵ֣ךְ אֶת הַ/מֶּ֔לֶךְ
    כִּ֥י פִסֵּ֖חַ עַבְדֶּֽ/ךָ־־־׃
translation:
  text: And he has slandered your servant to my lord the king, for your servant said,
    ‘Let me saddle the donkey for myself so that I may ride on it and go with the
    king,’ because your servant is lame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has deceived me' or 'has betrayed me.' The Hebrew verb can denote misleading
      or treacherous dealing; 'has slandered me' is chosen here because the context
      centers on false report to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִמָּנִי
  chosen: has slandered me
  alternatives:
  - has deceived me
  - has betrayed me
  lexicon: HALOT
  rationale: From רמה in the piel/perfect with 1cs suffix, in this context Mephibosheth
    accuses his servant of false representation before the king. 'Has slandered' best
    fits the following indirect report and the social-legal sense of misrepresentation,
    while 'deceived' is broader and less specific.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: In this royal-household narrative context, 'servant' is the most natural
    English rendering for a personal attendant. The bonded status is not the focus
    here, so 'slave' would overstate the nuance.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: This is a courtly address formula. 'My lord the king' preserves both
    the deferential tone and the formal royal address better than the flatter 'my
    master the king'.
- source_word: אֶחְבְּשָׁה לִּי הַחֲמוֹר
  chosen: Let me saddle the donkey for myself
  alternatives:
  - I will saddle the donkey for myself
  - Let me bind the donkey for myself
  lexicon: HALOT
  rationale: The cohortative/imperfect first person expresses intention or resolve
    in direct speech. 'Let me saddle' captures the volitional nuance naturally in
    English. חבש with donkey refers to saddling/preparing an animal for riding.
- source_word: וְאֶרְכַּב עָלֶיהָ
  chosen: so that I may ride on it
  alternatives:
  - and ride on it
  lexicon: HALOT
  rationale: The sequence of cohortatives expresses purpose/intention. 'So that I
    may ride on it' makes the relation clear in idiomatic English, though a more formal
    'and ride on it' is possible.
- source_word: וְאֵלֵךְ אֶת־הַמֶּלֶךְ
  chosen: and go with the king
  alternatives:
  - and go to the king
  - and accompany the king
  lexicon: HALOT
  rationale: With הלך plus את referring to accompaniment, the sense is association
    rather than motion toward. 'Go with the king' is straightforward and preserves
    the intended companionship.
- source_word: פִסֵּחַ
  chosen: lame
  alternatives:
  - crippled
  lexicon: HALOT
  rationale: The adjective denotes physical lameness. 'Lame' is accurate and less
    pejorative in modern English than 'crippled,' while still matching the source's
    concrete physical description.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: A standard deferential self-reference before the king. 'Your servant'
    preserves the courtly humility formula without importing unnecessary harshness.
