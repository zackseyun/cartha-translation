id: 2SA.19.34
reference: 2 Samuel 19:34
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ אֶל בַּרְזִלָּ֑י אַתָּה֙ עֲבֹ֣ר אִתִּ֔/י וְ/כִלְכַּלְתִּ֥י
    אֹתְ/ךָ֛ עִמָּדִ֖/י בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: And the king said to Barzillai, “You cross over with me, and I will provide
    for you with me in Jerusalem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will sustain you” or “I will support you.” The Hebrew verb carries
      the sense of providing for someone's needs.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing the next event in
    sequence. 'And' preserves Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly refers to the king in context,
    David.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Regular preposition marking the indirect object of speech.
- source_word: בַּרְזִלָּי
  chosen: Barzillai
  rationale: Personal name is transliterated per project philosophy.
- source_word: אַתָּה
  chosen: You
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis before the imperative. English can
    preserve this naturally with explicit 'You' at the start of the quotation.
- source_word: עֲבֹר
  chosen: cross over
  alternatives:
  - come over
  - pass over
  lexicon: HALOT
  rationale: עבר commonly means 'cross over' in travel contexts, especially crossing
    the Jordan in this narrative setting. This is more concrete than the looser 'come
    over'.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Simple accompaniment phrase modifying 'cross over'.
- source_word: וְכִלְכַּלְתִּי
  chosen: I will provide for
  alternatives:
  - I will sustain
  - I will support
  lexicon: HALOT
  rationale: From כלכל in the sense of sustaining or providing for someone's needs.
    'Provide for' is idiomatic modern English and fits the king's offer of ongoing
    support.
- source_word: אֹתְךָ
  chosen: you
  lexicon: HALOT
  rationale: Direct object marker plus 2ms suffix; represented by English object pronoun.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - beside me
  - in my care
  lexicon: HALOT
  rationale: Locative/accompaniment expression indicating Barzillai's presence in
    the king's company. Retained literally as 'with me' rather than interpreting more
    expansively.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Place name with preposition ב; standard rendering.
