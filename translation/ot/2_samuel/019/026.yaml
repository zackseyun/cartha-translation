id: 2SA.19.26
reference: 2 Samuel 19:26
source:
  edition: WLC
  text: וַ/יְהִ֛י כִּי בָ֥א יְרוּשָׁלִַ֖ם לִ/קְרַ֣את הַ/מֶּ֑לֶךְ וַ/יֹּ֤אמֶר ל/וֹ֙
    הַ/מֶּ֔לֶךְ לָ֛/מָּה לֹא הָלַ֥כְתָּ עִמִּ֖/י מְפִיבֹֽשֶׁת־־׃
translation:
  text: And when he came to Jerusalem to meet the king, the king said to him, “Why
    did you not go with me, Mephibosheth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in English, 'Why did you not come with me, Mephibosheth?'
      The Hebrew verb is literally 'go.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And when
  alternatives:
  - Now when
  - And it happened when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a new scene. 'And when' preserves
    the temporal transition naturally in English without the wooden 'and it happened.'
- source_word: בָא
  chosen: he came
  alternatives:
  - he arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Came' fits the movement toward
    Jerusalem and keeps the narrative simple and direct.
- source_word: יְרוּשָׁלַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to meet with
  - to greet
  lexicon: HALOT
  rationale: The infinitive of קרא with ל and the preposition לקראת often conveys
    going out to meet someone. 'To meet' is the most straightforward rendering here.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to David in context. 'The king' preserves the
    Hebrew designation.
- source_word: וַיֹּאמֶר לוֹ
  chosen: the king said to him
  alternatives:
  - he said to him
  lexicon: HALOT
  rationale: Although Hebrew repeats 'the king' after the verb, English style is smoother
    with the explicit subject before 'said.' This preserves clarity and avoids ambiguity.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative adverb; 'Why' is the natural English equivalent.
- source_word: לֹא הָלַכְתָּ עִמִּי
  chosen: did you not go with me
  alternatives:
  - did you not come with me
  lexicon: HALOT
  rationale: הלך is 'go/walk.' Since David is speaking from the perspective of the
    earlier departure, 'go with me' better reflects the Hebrew verb than the more
    idiomatic but perspective-shifted 'come with me.'
- source_word: מְפִיבֹשֶׁת
  chosen: Mephibosheth
  rationale: Standard English transliteration of the personal name.
