theological_decisions:
- issue: Rendering of אֱלֹהִים in an oath formula
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: Although morphologically plural, in this idiomatic oath formula the referent
    is the singular God of Israel. Rendering it as singular matches Hebrew usage and
    context; no doctrinally contested issue is involved beyond normal grammatical
    number.
