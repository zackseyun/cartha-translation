id: 2SA.19.14
reference: 2 Samuel 19:14
source:
  edition: WLC
  text: וְ/לַֽ/עֲמָשָׂא֙ תֹּֽמְר֔וּ הֲ/ל֛וֹא עַצְמִ֥/י וּ/בְשָׂרִ֖/י אָ֑תָּה כֹּ֣ה
    יַֽעֲשֶׂה לִּ֤/י אֱלֹהִים֙ וְ/כֹ֣ה יוֹסִ֔יף אִם לֹ֠א שַׂר צָבָ֞א תִּהְיֶ֧ה לְ/פָנַ֛/י
    כָּל הַ/יָּמִ֖ים תַּ֥חַת יוֹאָֽב־־־־׃
translation:
  text: And say to Amasa, ‘Are you not my bone and my flesh? May God do so to me,
    and more also, if you are not commander of the army before me continually in place
    of Joab.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the days,'' an idiom for ongoing tenure or continual service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַעֲמָשָׂא תֹּמְרוּ
  chosen: And say to Amasa
  alternatives:
  - And to Amasa you shall say
  - Tell Amasa
  lexicon: HALOT
  rationale: The conjunction plus preposition and imperfect 2mp functions as an instruction
    to David's messengers/elders. 'And say to Amasa' is natural English while preserving
    the directive force.
- source_word: הֲלוֹא
  chosen: Are you not
  alternatives:
  - Is it not that you are
  - Surely you are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Are you not' preserves
    the interrogative form better than flattening it into an assertion.
- source_word: עַצְמִי וּבְשָׂרִי
  chosen: my bone and my flesh
  alternatives:
  - my own bone and flesh
  - my kinsman
  lexicon: HALOT
  rationale: This kinship idiom is best retained literally because it is transparent
    enough in English and preserves the familial appeal. A more interpretive rendering
    like 'my kinsman' loses the vivid covenantal/familial language.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִיף
  chosen: May God do so to me, and more also
  alternatives:
  - Thus may God do to me, and thus may he add
  - May God punish me severely, and even more
  lexicon: HALOT
  rationale: This is a standard oath formula. The chosen rendering keeps the idiomatic
    solemnity without over-paraphrasing the unspecified curse. 'God' is singular in
    sense here despite the plural form אֱלֹהִים.
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - surely
  - unless
  lexicon: HALOT
  rationale: 'In oath contexts אִם לֹא introduces the content sworn to, effectively
    ''surely.'' I rendered it with English ''if ... not'' because it fits the preserved
    oath formula naturally: ''May God do so... if you are not...'' This keeps the
    Hebrew structure visible.'
- source_word: שַׂר צָבָא
  chosen: commander of the army
  alternatives:
  - captain of the army
  - army commander
  lexicon: HALOT
  rationale: The phrase denotes the chief military leader. 'Commander of the army'
    is clear modern English and suitably formal.
- source_word: תִּהְיֶה לְפָנַי
  chosen: you are not commander of the army before me
  alternatives:
  - you do not serve before me as commander of the army
  - you are not commander of the army in my service
  lexicon: HALOT
  rationale: לְפָנַי literally means 'before me,' often conveying service in one's
    presence/under one's authority. I retained 'before me' to preserve the Hebrew
    expression while keeping the sentence intelligible.
- source_word: כָּל הַיָּמִים
  chosen: continually
  alternatives:
  - all the days
  - from now on
  lexicon: HALOT
  rationale: Literally 'all the days.' In this appointment context it means ongoing
    tenure. 'Continually' gives idiomatic English without implying an absolute metaphysical
    permanence; the literal alternative is preserved in a footnote.
- source_word: תַּחַת יוֹאָב
  chosen: in place of Joab
  alternatives:
  - instead of Joab
  - under Joab
  lexicon: HALOT
  rationale: Here תַּחַת marks replacement/succession, not subordination. 'In place
    of Joab' clearly communicates that Amasa is to replace Joab.
