id: 2SA.19.3
reference: 2 Samuel 19:3
source:
  edition: WLC
  text: וַ/תְּהִ֨י הַ/תְּשֻׁעָ֜ה בַּ/יּ֥וֹם הַ/ה֛וּא לְ/אֵ֖בֶל לְ/כָל הָ/עָ֑ם כִּֽי
    שָׁמַ֣ע הָ/עָ֗ם בַּ/יּ֤וֹם הַ/הוּא֙ לֵ/אמֹ֔ר נֶעֱצַ֥ב הַ/מֶּ֖לֶךְ עַל בְּנֽ/וֹ־־־׃
translation:
  text: So the victory on that day was turned into mourning for all the people, because
    on that day the people heard it said, “The king is grieved over his son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deliverance on that day became mourning.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people heard, saying,' an idiom for hearing a report or hearing
      it said.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּשֻׁעָה
  chosen: the victory
  alternatives:
  - the salvation
  - the deliverance
  lexicon: HALOT
  rationale: In this military context following battle, תְּשׁוּעָה refers to the successful
    outcome or deliverance won in battle. 'Victory' is the most natural English rendering
    here, while 'salvation' would sound overly theological and 'deliverance' less
    idiomatic in context.
- source_word: וַתְּהִי ... לְאֵבֶל
  chosen: was turned into mourning
  alternatives:
  - became mourning
  - was for mourning
  lexicon: HALOT
  rationale: The Hebrew literally says 'the victory became to mourning.' English idiom
    is improved by rendering the resultative sense as 'was turned into mourning,'
    which preserves the reversal implied by the construction without over-paraphrasing.
- source_word: אֵבֶל
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: HALOT
  rationale: אֵבֶל commonly denotes mourning, especially communal or public grief.
    'Mourning' fits the social setting better than the more internal 'grief.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: Though the referent is the fighting force and broader populace aligned
    with David, the Hebrew uses the general term 'people.' 'The people' preserves
    the source wording while still fitting the context.
- source_word: כִּי שָׁמַע ... לֵאמֹר
  chosen: because ... the people heard it said
  alternatives:
  - because ... the people heard, saying
  - because ... the people heard it being said
  lexicon: HALOT
  rationale: The construction שָׁמַע + לֵאמֹר introduces reported speech or report.
    'Heard it said' is idiomatic English that captures the passive/reportive force
    without awkward literalism.
- source_word: נֶעֱצַב
  chosen: is grieved
  alternatives:
  - is pained
  - is distressed
  - is saddened
  lexicon: HALOT
  rationale: The Niphal of עצב conveys being pained or grieved. 'Is grieved' is concise,
    natural, and suitably weighty for the king's sorrow over Absalom.
- source_word: עַל בְּנוֹ
  chosen: over his son
  alternatives:
  - because of his son
  - concerning his son
  lexicon: HALOT
  rationale: With עצב, עַל marks the object or occasion of grief. 'Over his son' is
    the most idiomatic English expression for mourning or grief in this context.
