theological_decisions:
- issue: Whether כְּמַלְאַךְ הָאֱלֹהִים should be interpreted idiomatically as wisdom/discernment
    or translated literally
  chosen_reading: Translated literally as 'like the angel of God'
  alternative_readings:
  - like an angel of God
  - as one with divine discernment
  rationale: The phrase is not a doctrinal crux here, but preserving the literal comparison
    better reflects the Hebrew and maintains the biblical imagery. Any implied sense
    of discernment is left for readers to infer from context rather than being imported
    into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
