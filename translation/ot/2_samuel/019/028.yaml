id: 2SA.19.28
reference: 2 Samuel 19:28
source:
  edition: WLC
  text: וַ/יְרַגֵּ֣ל בְּ/עַבְדְּ/ךָ֔ אֶל אֲדֹנִ֖/י הַ/מֶּ֑לֶךְ וַ/אדֹנִ֤/י הַ/מֶּ֨לֶךְ֙
    כְּ/מַלְאַ֣ךְ הָ/אֱלֹהִ֔ים וַ/עֲשֵׂ֥ה הַ/טּ֖וֹב בְּ/עֵינֶֽי/ךָ־׃
translation:
  text: He slandered your servant to my lord the king, but my lord the king is like
    the angel of God; so do what is good in your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like an angel of God,' that is, one with exceptional discernment.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''in your eyes''; that is, ''as you see fit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַגֵּל
  chosen: He slandered
  alternatives:
  - He spied on
  - He informed against
  - He maligned
  lexicon: HALOT, BDB
  rationale: From רגל in the piel/waw-consecutive context, the sense here is not literal
    spying but hostile reporting or defamation before the king. In context (Mephibosheth
    accusing Ziba), 'slandered' best captures the adversarial nuance in natural English.
- source_word: בְּעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT, BDB
  rationale: Although עבד can denote a slave, in royal address formulas it commonly
    functions as a deferential self-reference. 'Your servant' preserves the courtly
    register without overstating chattel status in this immediate context.
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  chosen: to my lord the king
  alternatives:
  - against my lord the king
  - before my lord the king
  lexicon: HALOT, BDB
  rationale: אֶל marks direction toward the king. In English, 'to my lord the king'
    works idiomatically with 'slandered,' while preserving the formal address.
- source_word: וַאדֹנִי הַמֶּלֶךְ
  chosen: but my lord the king
  alternatives:
  - and my lord the king
  - now my lord the king
  lexicon: HALOT, BDB
  rationale: The conjunction here introduces contrast between Ziba's slander and David's
    discernment/authority. Rendering with 'but' brings out the discourse force in
    English better than a wooden 'and.'
- source_word: כְּמַלְאַךְ הָאֱלֹהִים
  chosen: like the angel of God
  alternatives:
  - like an angel of God
  lexicon: HALOT, BDB
  rationale: The Hebrew has the definite article on 'God' but not on 'angel.' 'The
    angel of God' is a familiar biblical expression and likely evokes a recognized
    idiom for divinely guided discernment. It is retained literally rather than flattened
    to a paraphrase such as 'very wise.'
- source_word: וַעֲשֵׂה
  chosen: so do
  alternatives:
  - and do
  - therefore do
  lexicon: HALOT, BDB
  rationale: Imperative addressed to the king. 'So do' conveys the inferential/requesting
    force in context after the comparison to the angel of God.
- source_word: הַטּוֹב
  chosen: what is good
  alternatives:
  - the good
  - what seems best
  lexicon: HALOT, BDB
  rationale: Substantivized adjective. 'What is good' is a clear and natural English
    equivalent that preserves the moral/evaluative sense.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  - as you see fit
  lexicon: HALOT, BDB
  rationale: A common Hebrew idiom for personal judgment or approval. The main text
    keeps the idiom with minimal smoothing; a more dynamic alternative is preserved
    in a footnote.
