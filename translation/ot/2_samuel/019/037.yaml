id: 2SA.19.37
reference: 2 Samuel 19:37
source:
  edition: WLC
  text: כִּ/מְעַ֞ט יַעֲבֹ֧ר עַבְדְּ/ךָ֛ אֶת הַ/יַּרְדֵּ֖ן אֶת הַ/מֶּ֑לֶךְ וְ/לָ֨/מָּה֙
    יִגְמְלֵ֣/נִי הַ/מֶּ֔לֶךְ הַ/גְּמוּלָ֖ה הַ/זֹּֽאת־־׃
translation:
  text: For your servant would only go a little way across the Jordan with the king;
    why should the king repay me with this reward?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reward me with this recompense.' The Hebrew uses a verb and cognate
      noun from the same root (גמל), emphasizing repayment or recompense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/מְעַט
  chosen: For ... only go a little way
  alternatives:
  - For only a little
  - Indeed, briefly
  lexicon: HALOT
  rationale: 'The phrase introduces the reason for Barzillai''s refusal: he would
    accompany the king only a short distance. Rendering it idiomatically as ''For
    ... only go a little way'' captures both causal כִּי and the adverbial sense of
    מְעַט.'
- source_word: יַעֲבֹר
  chosen: would ... go across
  alternatives:
  - would cross
  - will cross
  lexicon: HALOT
  rationale: Imperfect here expresses intended or potential action in context, not
    simple future prediction. 'Would go across' fits the polite, conditional tone
    of the speech.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although literally 'your servant/slave,' in royal address this is a conventional
    self-humbling term. 'Your servant' is the natural English equivalent here; the
    bonded sense is not foregrounded.
- source_word: אֶת הַיַּרְדֵּן
  chosen: across the Jordan
  alternatives:
  - the Jordan
  - over the Jordan
  lexicon: HALOT
  rationale: With עבר, the object marker plus 'the Jordan' yields the sense of crossing
    the river. English idiom prefers 'across the Jordan' rather than a more wooden
    'cross the Jordan' in this sentence.
- source_word: אֶת הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - the king
  - along with the king
  lexicon: HALOT
  rationale: 'Here אֶת is the preposition ''with,'' not the object marker. The sense
    is accompaniment: Barzillai would cross with David, but only a little way.'
- source_word: וְלָמָּה
  chosen: why should
  alternatives:
  - and why would
  - so why should
  lexicon: HALOT
  rationale: Introduces a rhetorical question expressing refusal of royal compensation.
    'Why should' conveys the polite rhetorical force in English.
- source_word: יִגְמְלֵנִי
  chosen: repay me
  alternatives:
  - reward me
  - deal bountifully with me
  lexicon: HALOT
  rationale: The verb גמל can mean to deal with or recompense. Because the following
    cognate noun specifies the recompense, 'repay me' avoids awkward repetition while
    preserving the reciprocity idea.
- source_word: הַגְּמוּלָה הַזֹּאת
  chosen: this reward
  alternatives:
  - this recompense
  - such a benefit
  lexicon: HALOT
  rationale: The noun denotes recompense or reward. 'This reward' is clear modern
    English and matches the king's proposed favor to Barzillai.
