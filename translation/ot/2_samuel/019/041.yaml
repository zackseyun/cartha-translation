id: 2SA.19.41
reference: 2 Samuel 19:41
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ר הַ/מֶּ֨לֶךְ֙ הַ/גִּלְגָּ֔לָ/ה וְ/כִמְהָ֖ן עָבַ֣ר עִמּ֑/וֹ וְ/כָל
    עַ֤ם יְהוּדָה֙ ו/יעברו אֶת הַ/מֶּ֔לֶךְ וְ/גַ֕ם חֲצִ֖י עַ֥ם יִשְׂרָאֵֽל־־׃
translation:
  text: Then the king crossed over to Gilgal, and Kimham crossed over with him. And
    all the people of Judah escorted the king across, and also half the people of
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought the king across' / 'caused the king to cross' for 'escorted
      the king across.' The Hebrew verb can carry a causative sense with a direct
      object in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - went over
  - passed over
  lexicon: HALOT
  rationale: The verb עבר in this narrative context refers to crossing the Jordan.
    'Crossed over' is natural English and preserves the movement sense better than
    the more ambiguous 'passed over.'
- source_word: הַגִּלְגָּלָה
  chosen: to Gilgal
  alternatives:
  - Gilgal-ward
  - toward Gilgal
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Gilgal.
    English idiom is best expressed as 'to Gilgal.'
- source_word: וְכִמְהָן
  chosen: and Kimham
  rationale: Personal name is transliterated per translation philosophy.
- source_word: עָבַר עִמּוֹ
  chosen: crossed over with him
  alternatives:
  - went over with him
  lexicon: HALOT
  rationale: Repeats the same crossing verb for Kimham; keeping 'crossed over' preserves
    the narrative linkage and likely river-crossing setting.
- source_word: וְכָל עַם יְהוּדָה
  chosen: all the people of Judah
  alternatives:
  - all the people of Judah
  - all Judah's people
  lexicon: HALOT
  rationale: עַם with Judah denotes the populace/supporters from Judah. 'People of
    Judah' is the most transparent English rendering.
- source_word: וַיַּעַבְרוּ אֶת־הַמֶּלֶךְ
  chosen: escorted the king across
  alternatives:
  - brought the king across
  - caused the king to cross
  lexicon: HALOT
  rationale: 'With a direct object, עבר can have a causative/transfer sense here:
    the Judeans are helping or conducting the king across. ''Escorted the king across''
    is idiomatic and fits the context of accompanying him over the river better than
    the wooden ''caused the king to cross.'''
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and even
  lexicon: HALOT
  rationale: Adds an additional group to those involved. 'And also' preserves the
    additive emphasis smoothly.
- source_word: חֲצִי עַם יִשְׂרָאֵל
  chosen: half the people of Israel
  alternatives:
  - half of the people of Israel
  - half the nation of Israel
  lexicon: HALOT
  rationale: The phrase is quantitative and contrasts Judah with Israel. 'Half the
    people of Israel' is clear and preserves the political distinction without overinterpreting.
