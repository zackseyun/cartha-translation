id: 2SA.19.22
reference: 2 Samuel 19:22
source:
  edition: WLC
  text: וַ/יַּ֨עַן אֲבִישַׁ֤י בֶּן צְרוּיָה֙ וַ/יֹּ֔אמֶר הֲ/תַ֣חַת זֹ֔את לֹ֥א יוּמַ֖ת
    שִׁמְעִ֑י כִּ֥י קִלֵּ֖ל אֶת מְשִׁ֥יחַ יְהוָֽה־־׃ס
translation:
  text: But Abishai son of Zeruiah answered and said, “Should Shimei not be put to
    death for this, because he cursed the LORD’s anointed?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “because of this” / “in return for this.” The Hebrew idiom asks whether
      this act should bring about Shimei’s execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in narrative commonly introduces a reply; 'answered' is the standard
    concise rendering and fits the discourse flow.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  chosen: Abishai son of Zeruiah
  rationale: Personal names are transliterated per project philosophy; 'son of Zeruiah'
    preserves the Hebrew patronymic/matronymic identification.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the default speech verb; 'said' is natural modern English and
    preserves the narrative sequence.
- source_word: הֲתַחַת זֹאת
  chosen: for this
  alternatives:
  - because of this
  - in return for this
  lexicon: HALOT
  rationale: The idiom asks whether, on account of this act, punishment should follow.
    'For this' is idiomatic in English and captures the causal sense without overexpanding.
- source_word: לֹא יוּמַת
  chosen: should ... not be put to death
  alternatives:
  - should ... not die
  - must ... not be executed
  lexicon: HALOT
  rationale: The Hophal of מות is causative/passive, indicating judicial execution
    rather than mere death. 'Be put to death' best reflects that legal nuance in readable
    English.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Standard transliteration of the personal name.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Abishai's proposal. 'Because' makes
    the causal force explicit in contemporary English.
- source_word: קִלֵּל
  chosen: cursed
  alternatives:
  - reviled
  lexicon: HALOT
  rationale: קלל in this context refers to Shimei's verbal denunciation of David.
    'Cursed' preserves the gravity and matches the established narrative in 2 Samuel
    16.
- source_word: מְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  lexicon: HALOT
  rationale: The construct phrase denotes the king as one anointed by YHWH. Following
    project doctrine, יְהוָה is rendered 'the LORD.' 'The LORD’s anointed' is the
    most natural English expression and preserves the theological significance of
    David's office.
