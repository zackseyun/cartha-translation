id: 2SA.19.29
reference: 2 Samuel 19:29
source:
  edition: WLC
  text: כִּי֩ לֹ֨א הָיָ֜ה כָּל בֵּ֣ית אָבִ֗/י כִּ֤י אִם אַנְשֵׁי מָ֨וֶת֙ לַ/אדֹנִ֣/י
    הַ/מֶּ֔לֶךְ וַ/תָּ֨שֶׁת֙ אֶֽת עַבְדְּ/ךָ֔ בְּ/אֹכְלֵ֖י שֻׁלְחָנֶ֑/ךָ וּ/מַה יֶּשׁ
    לִ֥/י עוֹד֙ צְדָקָ֔ה וְ/לִ/זְעֹ֥ק ע֖וֹד אֶל הַ/מֶּֽלֶךְ־־־־־־־׃פ
translation:
  text: For all my father's house were nothing but men deserving death before my lord
    the king, yet you set your servant among those who eat at your table. So what
    further right do I have, that I should cry out any more to the king?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of death,' that is, men liable to death or deserving execution.
    reason: lexical_alternative
  - marker: b
    text: '''Right'' translates Hebrew tsedaqah here in the sense of a just claim
      or entitlement, not primarily personal moral righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי לֹא הָיָה ... כִּי אִם
  chosen: For ... were nothing but
  alternatives:
  - indeed ... except
  - surely ... but only
  lexicon: HALOT
  rationale: 'The construction expresses emphatic limitation: Mephibosheth says his
    whole family amounted to nothing except people liable to death. ''Were nothing
    but'' captures the force idiomatically in English.'
- source_word: כָּל בֵּית אָבִי
  chosen: all my father's house
  alternatives:
  - all my father's household
  - my whole father's family
  lexicon: HALOT
  rationale: A standard Hebrew kinship expression for the extended family/household.
    'House' preserves the Hebrew image while remaining natural.
- source_word: אַנְשֵׁי מָוֶת
  chosen: men deserving death
  alternatives:
  - dead men
  - men of death
  - men doomed to die
  lexicon: HALOT
  rationale: The idiom refers to those liable to execution or worthy of death, not
    literally already dead. 'Men deserving death' best conveys the legal-moral sense
    in context.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  chosen: before my lord the king
  alternatives:
  - to my lord the king
  - in the sight of my lord the king
  lexicon: HALOT
  rationale: The lamed here marks relation or standing with respect to the king. 'Before'
    communicates status in the king's judgment and fits the context of liability to
    death.
- source_word: וַתָּשֶׁת
  chosen: yet you set
  alternatives:
  - but you placed
  - and you appointed
  lexicon: HALOT
  rationale: From שׂים/שׁית, 'to set/place.' 'Yet' brings out the contrast with the
    prior clause, though the Hebrew conjunction is simply waw.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the term can denote a slave, here it functions as a courtly
    self-designation of humility before the king. 'Servant' is the most contextually
    appropriate rendering.
- source_word: בְּאֹכְלֵי שֻׁלְחָנֶךָ
  chosen: among those who eat at your table
  alternatives:
  - with the eaters of your table
  - among your table companions
  lexicon: HALOT
  rationale: The phrase denotes inclusion among the king's privileged dependents or
    guests. 'Among those who eat at your table' is clear, natural, and preserves the
    social image.
- source_word: וּמַה יֶּשׁ לִי עוֹד צְדָקָה
  chosen: So what further right do I have
  alternatives:
  - what claim do I still have
  - what righteousness is still mine
  lexicon: HALOT
  rationale: צְדָקָה here is not abstract moral righteousness but a just claim or
    right in a legal-relational sense. 'Right' fits the context of appeal before the
    king.
- source_word: וְלִזְעֹק עוֹד אֶל הַמֶּלֶךְ
  chosen: that I should cry out any more to the king
  alternatives:
  - to appeal any longer to the king
  - to call out further to the king
  lexicon: HALOT
  rationale: זעק means to cry out, often in petition or complaint. 'Cry out' preserves
    the verbal force; the clause is rendered as the content/result of having no further
    claim.
