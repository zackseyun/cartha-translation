id: 2SA.19.6
reference: 2 Samuel 19:6
source:
  edition: WLC
  text: וַ/יָּבֹ֥א יוֹאָ֛ב אֶל הַ/מֶּ֖לֶךְ הַ/בָּ֑יִת וַ/יֹּאמֶר֩ הֹבַ֨שְׁתָּ הַ/יּ֜וֹם
    אֶת פְּנֵ֣י כָל עֲבָדֶ֗י/ךָ הַֽ/מְמַלְּטִ֤ים אֶֽת נַפְשְׁ/ךָ֙ הַ/יּ֔וֹם וְ/אֵ֨ת
    נֶ֤פֶשׁ בָּנֶ֨י/ךָ֙ וּ/בְנֹתֶ֔י/ךָ וְ/נֶ֣פֶשׁ נָשֶׁ֔י/ךָ וְ/נֶ֖פֶשׁ פִּלַגְשֶֽׁי/ךָ־־־־׃
translation:
  text: Then Joab came into the house to the king and said, “Today you have put to
    shame the faces of all your servants who today saved your life, and the lives
    of your sons and your daughters, and the lives of your wives and your concubines.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have shamed all your servants' faces'; Hebrew preserves the concrete
      expression 'the faces of.'
    reason: lexical_alternative
  - marker: b
    text: '''The house'' likely refers to the royal residence or palace.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'life' / 'lives' (nephesh), here meaning physical life rather than
      'soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the palace
  lexicon: HALOT
  rationale: Literally 'the house.' In context it likely refers to the royal residence,
    but 'the house' preserves the Hebrew wording without over-interpreting. 'To the
    king' is retained to reflect the appositional sequence אֶל־הַמֶּלֶךְ הַבָּיִת.
- source_word: הֹבַשְׁתָּ
  chosen: you have put to shame
  alternatives:
  - you have shamed
  - you have disgraced
  lexicon: HALOT
  rationale: From בוש in the causative, expressing causing shame. 'Put to shame' is
    a natural English rendering that preserves the causative force and the public-honor
    dimension.
- source_word: פְּנֵי
  chosen: the faces of
  alternatives:
  - the face of
  - all your servants
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'the faces of all your servants.' Retaining
    'faces' preserves the concrete idiom of public shame. A smoother English rendering
    could omit 'faces,' but the literal expression is significant enough to preserve.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your men
  - your officials
  lexicon: HALOT
  rationale: In this military-court context עבד can denote subjects or servants of
    the king. 'Servants' best preserves the relational sense without narrowing it
    to officials alone.
- source_word: הַמְמַלְּטִים
  chosen: who today saved
  alternatives:
  - who today delivered
  - who today rescued
  lexicon: HALOT
  rationale: The participle from מלט denotes delivering or rescuing from danger. 'Saved'
    is idiomatic and fits the immediate life-preserving context.
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - your self
  lexicon: HALOT
  rationale: נפש here refers to physical life rather than the immaterial soul. 'Your
    life' best matches the context of rescue from death.
- source_word: נֶפֶשׁ בָּנֶיךָ ... וּבְנֹתֶיךָ ... נָשֶׁיךָ ... פִּלַגְשֶׁיךָ
  chosen: the lives of your sons and your daughters, and the lives of your wives and
    your concubines
  alternatives:
  - the life of your sons...
  - the persons of your sons...
  lexicon: HALOT
  rationale: Repeated נֶפֶשׁ before grouped family members is best rendered as 'lives'
    in English, since the context is preservation from death. The repetition is partially
    preserved for rhetorical force.
- source_word: פִּלַגְשֶׁיךָ
  chosen: your concubines
  alternatives:
  - your secondary wives
  lexicon: HALOT
  rationale: '''Concubines'' is the standard and most precise English term for פילגש,
    referring to women in a recognized but lower-status marital/sexual union.'
- source_word: וַיָּבֹא ... וַיֹּאמֶר
  chosen: Then Joab came ... and said
  alternatives:
  - So Joab went ... and said
  lexicon: HALOT
  rationale: The wayyiqtol sequence advances the narrative. 'Then ... and said' gives
    clear English narrative flow while preserving the sequential force.
