theological_decisions:
- issue: Rendering of social/familial terms without importing moral evaluation
  chosen_reading: wives and concubines
  alternative_readings:
  - wives and secondary wives
  rationale: The verse lists David's household members in straightforward court language.
    The translation preserves the historical-social categories present in the Hebrew
    without softening or moralizing them.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
