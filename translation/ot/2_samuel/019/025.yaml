id: 2SA.19.25
reference: 2 Samuel 19:25
source:
  edition: WLC
  text: וּ/מְפִבֹ֨שֶׁת֙ בֶּן שָׁא֔וּל יָרַ֖ד לִ/קְרַ֣את הַ/מֶּ֑לֶךְ וְ/לֹא עָשָׂ֨ה
    רַגְלָ֜י/ו וְ/לֹא עָשָׂ֣ה שְׂפָמ֗/וֹ וְ/אֶת בְּגָדָי/ו֙ לֹ֣א כִבֵּ֔ס לְ/מִן הַ/יּוֹם֙
    לֶ֣כֶת הַ/מֶּ֔לֶךְ עַד הַ/יּ֖וֹם אֲשֶׁר בָּ֥א בְ/שָׁלֽוֹם־־־־־־־׃
translation:
  text: And Mephibosheth son of Saul came down to meet the king. He had not cared
    for his feet, nor trimmed his mustache, nor washed his clothes, from the day the
    king left until the day he came home in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'had not done his feet.' The expression refers to neglecting
      normal grooming or care for the feet.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor cared for his mustache.' The Hebrew term refers specifically to
      the upper-lip facial hair area, not necessarily the whole beard.
    reason: lexical_alternative
  - marker: c
    text: Or 'until the day he came in peace' or 'arrived safely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַד
  chosen: came down
  alternatives:
  - went down
  lexicon: HALOT
  rationale: The verb literally means 'went/came down.' 'Came down' fits the deictic
    perspective of the narrative as Mephibosheth approaches David.
- source_word: לִקְרַאת הַמֶּלֶךְ
  chosen: to meet the king
  alternatives:
  - to meet with the king
  - to greet the king
  lexicon: HALOT
  rationale: The idiom לקראת commonly means going out or coming in order to meet someone.
    'To meet the king' is natural and sufficiently formal.
- source_word: וְלֹא עָשָׂה רַגְלָיו
  chosen: He had not cared for his feet
  alternatives:
  - he had not done his feet
  - he had not attended to his feet
  - he had not trimmed his feet
  lexicon: HALOT
  rationale: The Hebrew literally says 'had not done his feet,' an idiom for neglecting
    foot care/grooming. 'Cared for his feet' communicates the sense without wooden
    obscurity. Because the exact grooming act is uncertain, a broader expression is
    preferable in the main text.
- source_word: וְלֹא עָשָׂה שְׂפָמוֹ
  chosen: nor trimmed his mustache
  alternatives:
  - nor cared for his mustache
  - nor shaved his beard
  - nor trimmed his upper lip
  lexicon: HALOT
  rationale: שָׂפָם refers to the upper lip/mustache area. In context of mourning-related
    neglect, 'trimmed his mustache' is the clearest idiomatic English rendering. 'Shaved
    his beard' is less precise and imports a broader facial-hair sense than the Hebrew
    term itself.
- source_word: וְאֶת בְּגָדָיו לֹא כִבֵּס
  chosen: nor washed his clothes
  alternatives:
  - nor laundered his garments
  lexicon: HALOT
  rationale: כִבֵּס means to wash garments. 'Washed his clothes' is clear modern English;
    'garments' is possible but less natural.
- source_word: לְמִן הַיּוֹם לֶכֶת הַמֶּלֶךְ
  chosen: from the day the king left
  alternatives:
  - from the day of the king's departure
  - since the day the king went away
  lexicon: HALOT
  rationale: The infinitive construct לֶכֶת after 'from the day' marks the time of
    the king's departure. 'From the day the king left' is concise and natural.
- source_word: עַד הַיּוֹם אֲשֶׁר בָּא בְשָׁלוֹם
  chosen: until the day he came home in peace
  alternatives:
  - until the day he came in peace
  - until the day he arrived safely
  lexicon: HALOT
  rationale: בְשָׁלוֹם here indicates safe, peaceful return. 'Came home in peace'
    captures both the return and the state of safety; 'arrived safely' is possible
    but loses the resonance of shalom.
