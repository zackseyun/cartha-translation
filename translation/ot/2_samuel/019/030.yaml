id: 2SA.19.30
reference: 2 Samuel 19:30
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ הַ/מֶּ֔לֶךְ לָ֛/מָּה תְּדַבֵּ֥ר ע֖וֹד דְּבָרֶ֑י/ךָ אָמַ֕רְתִּי
    אַתָּ֣ה וְ/צִיבָ֔א תַּחְלְק֖וּ אֶת הַ/שָּׂדֶֽה־׃
translation:
  text: 'Then the king said to him, “Why do you keep speaking of your matters? I have
    decided: you and Ziba shall divide the land.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “I said.”
    reason: lexical_alternative
  - marker: b
    text: Or “the field.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... הַמֶּלֶךְ
  chosen: Then the king said
  alternatives:
  - And the king said
  - So the king said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the plain and natural rendering.
- source_word: תְּדַבֵּר עוֹד
  chosen: do you keep speaking
  alternatives:
  - do you speak any more
  - do you continue speaking
  - do you speak further
  lexicon: HALOT
  rationale: The imperfect with עוֹד conveys continued or further speech. 'Keep speaking'
    captures the king's impatience in idiomatic English without overparaphrase.
- source_word: דְּבָרֶיךָ
  chosen: your matters
  alternatives:
  - your words
  - your case
  - these things of yours
  lexicon: HALOT
  rationale: דבר can mean 'word(s),' 'matter,' or 'affair.' In this judicial/dispute
    context, 'your matters' best reflects that Mephibosheth is pressing his case,
    not merely uttering words. 'Your case' is possible but slightly more interpretive/legalized.
- source_word: אָמַרְתִּי
  chosen: I have decided
  alternatives:
  - I have said
  - I said
  lexicon: HALOT
  rationale: Although formally 'I said,' in context the king is issuing a settled
    ruling. 'I have decided' brings out the performative force in clear English. A
    footnote preserves the more literal alternative.
- source_word: אַתָּה וְצִיבָא
  chosen: you and Ziba
  alternatives:
  - you and Tsiba
  lexicon: HALOT
  rationale: Standard English transliteration is 'Ziba.' The pronoun is retained explicitly
    for the ruling addressed to Mephibosheth.
- source_word: תַּחְלְקוּ
  chosen: shall divide
  alternatives:
  - must divide
  - are to divide
  - will divide
  lexicon: HALOT
  rationale: The imperfect here expresses the king's directive/judgment. 'Shall divide'
    preserves the authoritative force in natural legal-sounding English.
- source_word: הַשָּׂדֶה
  chosen: the land
  alternatives:
  - the field
  - the property
  lexicon: HALOT
  rationale: שָׂדֶה is literally 'field,' but in this inheritance/property dispute
    it likely stands collectively for the estate or landed property. 'The land' is
    natural and broad enough to fit the context; a footnote preserves 'field' as the
    more literal option.
