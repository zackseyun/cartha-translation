id: 2SA.19.20
reference: 2 Samuel 19:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶל הַ/מֶּ֗לֶךְ אַל יַחֲשָׁב לִ֣/י אֲדֹנִ/י֮ עָוֺן֒ וְ/אַל תִּזְכֹּ֗ר
    אֵ֚ת אֲשֶׁ֣ר הֶעֱוָ֣ה עַבְדְּ/ךָ֔ בַּ/יּ֕וֹם אֲשֶׁר יָׄצָ֥ׄאׄ אֲדֹנִֽ/י הַ/מֶּ֖לֶךְ
    מִ/ירֽוּשָׁלִָ֑ם לָ/שׂ֥וּם הַ/מֶּ֖לֶךְ אֶל לִבּֽ/וֹ־־־־־־־׃
translation:
  text: And he said to the king, “Do not let my lord hold me guilty, and do not remember
    how your servant did wrong on the day my lord the king went out from Jerusalem,
    so that the king should take it to heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “do not count iniquity to me”; the Hebrew idiom is literally forensic
      in form.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “set it on his heart,” an idiom meaning to take something seriously
      or hold it against someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲשָׁב לִי עָוֺן
  chosen: hold me guilty
  alternatives:
  - count iniquity to me
  - impute guilt to me
  - consider me guilty
  lexicon: HALOT
  rationale: The idiom literally involves 'reckoning/counting iniquity to me.' In
    natural English, 'hold me guilty' best conveys the forensic-relational sense without
    sounding overly technical. It preserves the plea not to treat Shimei according
    to his offense.
- source_word: עָוֺן
  chosen: guilty
  alternatives:
  - iniquity
  - guilt
  - punishment for guilt
  lexicon: HALOT
  rationale: Although the noun often means 'iniquity' or 'guilt,' in this idiom the
    sense is the offense as reckoned against the speaker. Rendering the whole phrase
    as 'hold me guilty' communicates the function of the noun in context better than
    a wooden 'count iniquity to me.'
- source_word: תִּזְכֹּר
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: HALOT
  rationale: A straightforward rendering that fits the parallel plea with the previous
    clause. The context implies remembering with intent to act against, but 'remember'
    leaves that implication to the reader as in the Hebrew.
- source_word: הֶעֱוָה
  chosen: did wrong
  alternatives:
  - acted perversely
  - committed iniquity
  - was at fault
  lexicon: HALOT
  rationale: The Hiphil of עוה here refers to wrongful action. 'Did wrong' is clear
    modern English and avoids archaic moral vocabulary while preserving the confession
    of wrongdoing.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: While עבד can denote a slave, in courtly self-reference before a king
    'your servant' is the idiomatic and socially appropriate English equivalent. The
    bonded-status nuance is not the main point here; deferential self-humbling is.
- source_word: יָצָא ... מִירוּשָׁלָם
  chosen: went out from Jerusalem
  alternatives:
  - departed from Jerusalem
  - left Jerusalem
  lexicon: HALOT
  rationale: '''Went out from'' closely follows the Hebrew and fits the narrative
    setting of David''s flight from the city.'
- source_word: לָשׂוּם ... אֶל לִבּוֹ
  chosen: take it to heart
  alternatives:
  - set it on his heart
  - take notice of it
  - lay it to heart
  lexicon: HALOT
  rationale: This Hebrew idiom means to take something to heart or pay serious heed
    to it. 'Take it to heart' is natural English and preserves the emotional-volitional
    force better than the more wooden 'set it on his heart.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King David
  lexicon: HALOT
  rationale: The Hebrew repeats 'the king' rather than the personal name. The translation
    preserves that repetition, which reflects courtly address and narrative style.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - lord
  lexicon: HALOT
  rationale: This is a respectful address to the king, not the divine name. 'My lord'
    preserves the first-person possessive and the deferential tone.
