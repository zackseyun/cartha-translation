id: 2SA.19.32
reference: 2 Samuel 19:32
source:
  edition: WLC
  text: וּ/בַרְזִלַּי֙ הַ/גִּלְעָדִ֔י יָרַ֖ד מֵ/רֹגְלִ֑ים וַ/יַּעֲבֹ֤ר אֶת הַ/מֶּ֨לֶךְ֙
    הַ/יַּרְדֵּ֔ן לְ/שַׁלְּח֖/וֹ אֶת ב/ירדן־־׃
translation:
  text: And Barzillai the Gileadite had come down from Rogelim, and he crossed the
    Jordan with the king to send him off at the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came down from Rogelim and crossed with the king over the Jordan to
      escort him.' The Hebrew allows slightly different ways of expressing Barzillai's
      accompaniment of the king at the river.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַרְזִלַּי
  chosen: Barzillai
  rationale: Personal name transliterated by standard convention, per translation
    philosophy.
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - the man from Gilead
  lexicon: HALOT
  rationale: Gentilic adjective identifying Barzillai by region; 'the Gileadite' is
    concise and natural.
- source_word: יָרַד
  chosen: had come down
  alternatives:
  - came down
  - went down
  lexicon: HALOT
  rationale: The qatal after the prior narrative context can be rendered as a past
    perfect in English to situate his arrival before the next wayyiqtol action. 'Come
    down' fits movement from Rogelim toward the Jordan.
- source_word: מֵרֹגְלִים
  chosen: from Rogelim
  rationale: Place name transliterated; prefixed preposition rendered straightforwardly.
- source_word: וַיַּעֲבֹר
  chosen: he crossed
  alternatives:
  - he went over
  - he accompanied across
  lexicon: HALOT
  rationale: The verb עבר in this context most naturally means crossing over. Because
    the direct object is 'the king' and 'the Jordan' follows, the sense is that Barzillai
    crossed with/accompanying the king at the Jordan.
- source_word: אֶת הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Although אֶת is normally the direct-object marker, with verbs of motion
    in some contexts English idiom requires an associative sense: Barzillai crossed
    along with the king. Rendering simply ''crossed the king'' would be impossible
    English and would misrepresent the event.'
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering for the river name; 'River' is not required
    in context.
- source_word: לְשַׁלְּחוֹ
  chosen: to send him off
  alternatives:
  - to escort him
  - to bid him farewell
  lexicon: HALOT
  rationale: 'The infinitive of שלח with pronominal suffix here expresses purpose:
    Barzillai crossed in order to accompany the king off or see him on his way. ''Send
    him off'' preserves the underlying verb while sounding natural in English.'
- source_word: אֶת בַּיַּרְדֵּן
  chosen: at the Jordan
  alternatives:
  - by the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: The final phrase locates the leave-taking at the Jordan. Given the preposition
    ב and the immediate context of crossing, 'at the Jordan' is the least interpretively
    loaded English rendering.
