theological_decisions:
- issue: Rendering of royal-installation verb מָשַׁח in reference to Absalom
  chosen_reading: anointed
  alternative_readings:
  - made king
  rationale: Although Absalom is a usurper in the narrative, the text itself uses
    the standard verb for anointing. Translating it literally avoids importing evaluative
    commentary and preserves the political-religious weight of the act.
  doctrine_reference: Translation philosophy §1, §3, §5
