id: 2SA.19.11
reference: 2 Samuel 19:11
source:
  edition: WLC
  text: וְ/אַבְשָׁלוֹם֙ אֲשֶׁ֣ר מָשַׁ֣חְנוּ עָלֵ֔י/נוּ מֵ֖ת בַּ/מִּלְחָמָ֑ה וְ/עַתָּ֗ה
    לָ/מָ֥ה אַתֶּ֛ם מַחֲרִשִׁ֖ים לְ/הָשִׁ֥יב אֶת הַ/מֶּֽלֶךְ־׃ס
translation:
  text: And Absalom, whom we anointed over us, has died in battle. So now why are
    you silent about bringing the king back?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why do you keep silent about restoring the king?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  chosen: And Absalom
  alternatives:
  - But Absalom
  - Now Absalom
  lexicon: HALOT
  rationale: The conjunction waw here naturally continues the reported speech. 'And'
    preserves the Hebrew linkage without over-interpreting discourse contrast.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: Relative pronoun referring to a person in object position after 'anointed';
    'whom' is the most precise English rendering in formal written style.
- source_word: מָשַׁחְנוּ עָלֵינוּ
  chosen: we anointed over us
  alternatives:
  - we made king over us
  - we anointed for ourselves
  lexicon: HALOT
  rationale: מָשַׁח is literally 'anoint,' a politically charged act of installing
    a king. Retaining 'anointed' preserves the royal-installation nuance better than
    the more interpretive 'made king.' The phrase עָלֵינוּ is best rendered 'over
    us' in this kingship context.
- source_word: מֵת
  chosen: has died
  alternatives:
  - is dead
  - died
  lexicon: HALOT
  rationale: The qatal verb reports a completed event with present relevance. 'Has
    died' reads naturally in English while preserving that force; 'is dead' would
    shift to resultant state.
- source_word: בַּ/מִּלְחָמָה
  chosen: in battle
  alternatives:
  - in the battle
  - in war
  lexicon: HALOT
  rationale: The prefixed article is often idiomatic in such expressions. 'In battle'
    is natural English and fits the context of Absalom's death during armed conflict.
- source_word: וְ/עַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the practical implication of the previous statement. 'So now'
    captures both continuity and inferential force.
- source_word: לָמָה
  chosen: why
  lexicon: HALOT
  rationale: Direct interrogative asking the reason for their inaction.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural, addressed to the people/tribes. English
    'you' adequately represents the plural in context.
- source_word: מַחֲרִשִׁים
  chosen: are you silent
  alternatives:
  - do you keep silent
  - are you saying nothing
  - do you hesitate
  lexicon: HALOT
  rationale: From חרשׁ in the Hiphil, meaning to be silent/keep quiet. The sense is
    not mere delay but failure to speak or act by speaking. 'Are you silent' is concise
    and idiomatic; 'hesitate' is too interpretive.
- source_word: לְ/הָשִׁיב
  chosen: about bringing ... back
  alternatives:
  - to bring ... back
  - about restoring
  lexicon: HALOT
  rationale: שׁוּב in Hiphil means 'cause to return/bring back.' With the preceding
    'silent,' English idiom benefits from 'silent about bringing...back,' making explicit
    the implied matter under discussion. 'Restore' is possible but less concrete.
- source_word: אֶת הַ/מֶּלֶךְ
  chosen: the king back
  alternatives:
  - the king
  - the king to return
  lexicon: HALOT
  rationale: Direct object of 'bring back,' referring to David. Keeping 'the king'
    rather than naming David preserves the source text's political framing.
