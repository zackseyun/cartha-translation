id: 2SA.19.17
reference: 2 Samuel 19:17
source:
  edition: WLC
  text: וַ/יְמַהֵ֗ר שִׁמְעִ֤י בֶן גֵּרָא֙ בֶּן הַ/יְמִינִ֔י אֲשֶׁ֖ר מִ/בַּֽחוּרִ֑ים
    וַ/יֵּ֨רֶד֙ עִם אִ֣ישׁ יְהוּדָ֔ה לִ/קְרַ֖את הַ/מֶּ֥לֶךְ דָּוִֽד־־־׃
translation:
  text: Shimei son of Gera, the Benjaminite from Bahurim, hurried and went down with
    the men of Judah to meet King David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with the man of Judah'; the expression is understood collectively
      here as 'with the men of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: hurried
  alternatives:
  - made haste
  - quickly
  lexicon: HALOT
  rationale: The verb conveys haste or urgency. 'Hurried' is natural modern English
    and preserves the narrative sense without archaic phrasing like 'made haste.'
- source_word: שִׁמְעִי בֶן־גֵּרָא
  chosen: Shimei son of Gera
  rationale: Personal names are transliterated per project philosophy; 'son of' preserves
    the Hebrew patronymic construction.
- source_word: בֶּן־הַיְמִינִי
  chosen: the Benjaminite
  alternatives:
  - son of the Benjaminite
  - son of Jemini
  lexicon: HALOT
  rationale: In context this gentilic identifies tribal affiliation, not a second
    immediate patronymic. 'The Benjaminite' is the clearest idiomatic rendering.
- source_word: אֲשֶׁר מִבַּחוּרִים
  chosen: from Bahurim
  alternatives:
  - who was from Bahurim
  lexicon: HALOT
  rationale: The relative clause identifies Shimei's place of origin. English can
    express this appositionally without repeating 'who was' while preserving the sense.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'went down.' This is a common topographical
    movement verb in Hebrew narrative; retaining 'went down' preserves that concrete
    sense.
- source_word: עִם אִישׁ יְהוּדָה
  chosen: with the men of Judah
  alternatives:
  - with the man of Judah
  - with the people of Judah
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, Hebrew often uses it collectively
    in expressions like this. Given the surrounding narrative context of a group accompanying
    the king, the collective plural 'the men of Judah' best represents the idiom.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to meet before
  - to greet
  lexicon: HALOT
  rationale: The infinitive expresses movement for an encounter. 'To meet' is the
    most direct and contextually appropriate rendering.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  rationale: English idiom normally places the royal title before the name. This preserves
    both the title and the personal name naturally.
