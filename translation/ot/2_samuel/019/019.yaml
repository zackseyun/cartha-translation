id: 2SA.19.19
reference: 2 Samuel 19:19
source:
  edition: WLC
  text: וְ/עָבְרָ֣ה הָ/עֲבָרָ֗ה לַֽ/עֲבִיר֙ אֶת בֵּ֣ית הַ/מֶּ֔לֶךְ וְ/לַ/עֲשׂ֥וֹת
    הַ/טּ֖וֹב ב/עינ/ו וְ/שִׁמְעִ֣י בֶן גֵּרָ֗א נָפַל֙ לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ בְּ/עָבְר֖/וֹ
    בַּ/יַּרְדֵּֽן־־׃
translation:
  text: The ferryboat had crossed over to bring the king’s household across and to
    do what was good in his sight, and Shimei son of Gera fell before the king as
    he was crossing the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ferry' or 'the crossing boat'; the Hebrew term refers to the means
      of crossing the river.
    reason: lexical_alternative
  - marker: b
    text: '''The king’s household'' refers to the people of the royal house or retinue,
      not the palace building.'
    reason: cultural_note
  - marker: c
    text: 'Hebrew: ''to do the good in his eyes,'' an idiom meaning to do what pleased
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲבָרָה
  chosen: the ferryboat
  alternatives:
  - the ferry
  - the crossing boat
  - the barge
  lexicon: HALOT
  rationale: The noun denotes a means of crossing, here likely a ferry or ferryboat
    used at the Jordan. 'Ferryboat' is concrete and natural in English while preserving
    the image better than the abstract 'crossing.'
- source_word: וְעָבְרָה
  chosen: had crossed over
  alternatives:
  - crossed over
  - passed over
  lexicon: HALOT
  rationale: Qal perfect 3fs agrees with הָעֲבָרָה and describes the ferry's completed
    movement. Pluperfect-like English ('had crossed over') fits the narrative sequence
    before Shimei's action.
- source_word: לַעֲבִיר אֶת בֵּית הַמֶּלֶךְ
  chosen: to bring the king’s household across
  alternatives:
  - to carry the king’s house across
  - to ferry the king’s household over
  lexicon: HALOT
  rationale: בֵּית הַמֶּלֶךְ here means the king's household/retinue, not the physical
    palace. 'Bring ... across' is idiomatic and reflects the causative sense of the
    Hiphil infinitive.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s household
  alternatives:
  - the king’s house
  - the royal household
  lexicon: HALOT
  rationale: In context of river crossing, the phrase refers to persons associated
    with the king rather than a building. 'Household' best captures the collective
    sense.
- source_word: וְלַעֲשׂוֹת הַטּוֹב בְּעֵינָיו
  chosen: and to do what was good in his sight
  alternatives:
  - and to do what pleased him
  - and to do the good in his eyes
  lexicon: HALOT
  rationale: This Hebrew idiom means acting in a way pleasing or favorable to someone.
    The more literal 'what was good in his sight' preserves the idiom while remaining
    understandable.
- source_word: בְּעֵינָיו
  chosen: in his sight
  alternatives:
  - in his eyes
  - to him
  lexicon: HALOT
  rationale: The idiom literally uses 'eyes'; 'in his sight' is a readable English
    equivalent that retains the evaluative nuance.
- source_word: נָפַל לִפְנֵי הַמֶּלֶךְ
  chosen: fell before the king
  alternatives:
  - prostrated himself before the king
  - fell down before the king
  lexicon: HALOT
  rationale: The phrase indicates an act of submission/humiliation. 'Fell before the
    king' is sufficiently literal and lets the context convey the posture of supplication.
- source_word: בְּעָבְרוֹ בַּיַּרְדֵּן
  chosen: as he was crossing the Jordan
  alternatives:
  - when he crossed the Jordan
  - at his crossing of the Jordan
  lexicon: HALOT
  rationale: The infinitive construct with suffix is temporally flexible. The nearest
    antecedent is the king, so 'as he was crossing the Jordan' naturally refers to
    the king's crossing and fits the scene.
