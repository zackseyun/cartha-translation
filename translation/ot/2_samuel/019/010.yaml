id: 2SA.19.10
reference: 2 Samuel 19:10
source:
  edition: WLC
  text: וַ/יְהִ֤י כָל הָ/עָם֙ נָד֔וֹן בְּ/כָל שִׁבְטֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר הַ/מֶּ֜לֶךְ
    הִצִּילָ֣/נוּ מִ/כַּ֣ף אֹיְבֵ֗י/נוּ וְ/ה֤וּא מִלְּטָ֨/נוּ֙ מִ/כַּ֣ף פְּלִשְׁתִּ֔ים
    וְ/עַתָּ֛ה בָּרַ֥ח מִן הָ/אָ֖רֶץ מֵ/עַ֥ל אַבְשָׁלֽוֹם־־׀־׃
translation:
  text: And all the people were arguing throughout all the tribes of Israel, saying,
    “The king delivered us from the hand of our enemies, and he rescued us from the
    hand of the Philistines, but now he has fled from the land because of Absalom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were debating” or “were in dispute.” The Hebrew suggests widespread
      contention among the tribes, not merely casual conversation.
    reason: lexical_alternative
  - marker: b
    text: Literally “from the hand of our enemies” and “from the hand of the Philistines,”
      a Hebrew idiom for deliverance from another’s power.
    reason: lexical_alternative
  - marker: c
    text: Or “from before Absalom” / “on account of Absalom.” The Hebrew expression
      is idiomatic for fleeing away because of him.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָדוֹן
  chosen: were arguing
  alternatives:
  - were debating
  - were discussing
  - were in dispute
  lexicon: HALOT
  rationale: The Niphal participle of דין here describes active public contention
    or deliberation among the people. 'Were arguing' best captures the sense of widespread
    dispute in context, stronger than mere 'discussing' but still natural English.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  chosen: throughout all the tribes of Israel
  alternatives:
  - in all the tribes of Israel
  - among all the tribes of Israel
  lexicon: HALOT
  rationale: The phrase marks the scope of the discussion across Israel. 'Throughout
    all the tribes' conveys distribution across the nation more idiomatically in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the people's speech.
- source_word: הִצִּילָנוּ
  chosen: delivered us
  alternatives:
  - saved us
  - rescued us
  lexicon: HALOT
  rationale: נצל commonly means to snatch away or deliver from danger. 'Delivered
    us' fits the political-military context and pairs well with the following verb
    without unnecessary repetition.
- source_word: מִכַּף אֹיְבֵינוּ
  chosen: from the hand of our enemies
  alternatives:
  - from the power of our enemies
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or control. The idiom is
    preserved because it remains understandable in English and reflects the source
    closely.'
- source_word: מִלְּטָנוּ
  chosen: rescued us
  alternatives:
  - delivered us
  - brought us safely away
  lexicon: HALOT
  rationale: Using 'rescued' distinguishes this verb from the previous הִצִּילָנוּ
    while preserving the overlapping sense of deliverance.
- source_word: מִכַּף פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  lexicon: HALOT
  rationale: The same idiom as earlier is retained for consistency and to reflect
    the Hebrew parallelism.
- source_word: וְעַתָּה
  chosen: but now
  alternatives:
  - and now
  - now
  lexicon: HALOT
  rationale: In context the word introduces a contrast between David's past deliverance
    and his present situation. 'But now' makes that contrast explicit in natural English.
- source_word: בָּרַח
  chosen: has fled
  alternatives:
  - fled
  - ran away
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English. 'Has fled'
    communicates the current state resulting from the action.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the country
  lexicon: HALOT
  rationale: אֶרֶץ here most naturally refers to the land/territory rather than the
    earth in general. 'Land' is the standard and suitably broad rendering.
- source_word: מֵעַל אַבְשָׁלוֹם
  chosen: because of Absalom
  alternatives:
  - from before Absalom
  - because of the presence of Absalom
  - on account of Absalom
  lexicon: HALOT
  rationale: The preposition מֵעַל after a verb of fleeing is idiomatic, indicating
    flight away from someone or because of someone's pressure. 'Because of Absalom'
    communicates the sense clearly in modern English without awkward literalism.
