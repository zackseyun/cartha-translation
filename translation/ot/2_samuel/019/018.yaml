id: 2SA.19.18
reference: 2 Samuel 19:18
source:
  edition: WLC
  text: וְ/אֶ֨לֶף אִ֣ישׁ עִמּ/וֹ֮ מִ/בִּנְיָמִן֒ וְ/צִיבָ֗א נַ֚עַר בֵּ֣ית שָׁא֔וּל
    וַ/חֲמֵ֨שֶׁת עָשָׂ֥ר בָּנָ֛י/ו וְ/עֶשְׂרִ֥ים עֲבָדָ֖י/ו אִתּ֑/וֹ וְ/צָלְח֥וּ הַ/יַּרְדֵּ֖ן
    לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: and a thousand men from Benjamin with him, and Ziba, the servant of Saul’s
    house, with his fifteen sons and his twenty servants; they crossed the Jordan
    before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "ahead of the king." The Hebrew phrase can mean either in the king’s
      presence or in advance of him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף אִישׁ
  chosen: a thousand men
  alternatives:
  - a thousand people
  - a thousand troops
  lexicon: HALOT
  rationale: The Hebrew is literally 'a thousand man/men,' a standard numerical expression.
    'Men' preserves the masculine plural sense and likely refers to adult male retainers
    or supporters, not a mixed crowd.
- source_word: מִבִּנְיָמִן
  chosen: from Benjamin
  alternatives:
  - of Benjamin
  - from the tribe of Benjamin
  lexicon: HALOT
  rationale: The phrase identifies tribal affiliation or origin. 'From Benjamin' is
    concise and natural while preserving the tribal reference.
- source_word: צִיבָא
  chosen: Ziba
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: נַעַר בֵּית שָׁאוּל
  chosen: the servant of Saul’s house
  alternatives:
  - the young man of Saul’s house
  - the attendant of Saul’s house
  lexicon: HALOT
  rationale: נַעַר can mean 'young man,' 'attendant,' or 'servant' depending on context.
    Since Ziba is elsewhere presented in a servile/administrative role within Saul's
    household, 'servant' best fits here. 'House' is retained to preserve the dynastic-household
    sense.
- source_word: וַחֲמֵשֶׁת עָשָׂר בָּנָיו
  chosen: with his fifteen sons
  alternatives:
  - and his fifteen sons
  lexicon: HALOT
  rationale: The conjunction links the members of Ziba's entourage. 'With' makes the
    English relation explicit and smooth, while preserving the possessive reference
    to Ziba.
- source_word: וְעֶשְׂרִים עֲבָדָיו
  chosen: and his twenty servants
  alternatives:
  - and his twenty slaves
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave. Here the text lists household personnel
    accompanying Ziba; the bonded status is not the focus, so 'servants' is the better
    contextual rendering under the project's context-dependent policy.
- source_word: וְצָלְחוּ
  chosen: they crossed
  alternatives:
  - they passed over
  - they went across
  lexicon: HALOT
  rationale: In context with 'the Jordan,' the verb denotes crossing over. 'They crossed'
    is idiomatic modern English and preserves the action clearly.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name normally appears in English as 'the Jordan.' 'River'
    is unnecessary because the referent is obvious.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  - ahead of the king
  lexicon: HALOT
  rationale: The phrase can indicate spatial precedence or presence. Given the narrative
    setting of preparing for David's crossing, 'before the king' preserves the Hebrew
    ambiguity without over-interpreting it as merely spatial or ceremonial.
