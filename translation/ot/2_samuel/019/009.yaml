theological_decisions:
- issue: Gendered distributive expression אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: Following the project's gender-accurate policy, the masculine singular
    distributive is retained as 'each man' rather than neutralized, since the Hebrew
    form is explicitly masculine and idiomatic.
