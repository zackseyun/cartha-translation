id: 2SA.19.9
reference: 2 Samuel 19:9
source:
  edition: WLC
  text: וַ/יָּ֥קָם הַ/מֶּ֖לֶךְ וַ/יֵּ֣שֶׁב בַּ/שָּׁ֑עַר וּֽ/לְ/כָל הָ/עָ֞ם הִגִּ֣ידוּ
    לֵ/אמֹ֗ר הִנֵּ֤ה הַ/מֶּ֨לֶךְ֙ יוֹשֵׁ֣ב בַּ/שַּׁ֔עַר וַ/יָּבֹ֤א כָל הָ/עָם֙ לִ/פְנֵ֣י
    הַ/מֶּ֔לֶךְ וְ/יִשְׂרָאֵ֔ל נָ֖ס אִ֥ישׁ לְ/אֹהָלָֽי/ו־־׃ס
translation:
  text: Then the king arose and sat in the gate. And they told all the people, saying,
    “Look, the king is sitting in the gate.” Then all the people came before the king.
    But Israel had fled, each man to his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man to his tent,'' an idiom for dispersing to one’s dwelling
      place or tribal home.'
    reason: cultural_note
  - marker: b
    text: Or 'And Israel fled, each man to his tent.' The Hebrew conjunction can be
      read more simply as 'and'; 'but' is used in the main text to clarify the contrast
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then the king arose
  alternatives:
  - So the king got up
  - Then the king stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום narrates the next event in sequence. 'Arose' preserves
    the formal narrative movement without sounding overly stiff.
- source_word: וַיֵּשֶׁב בַּשָּׁעַר
  chosen: sat in the gate
  alternatives:
  - took his seat in the gate
  - sat at the gate
  lexicon: HALOT
  rationale: ישב means 'sit, dwell, remain'; here it denotes taking a public position.
    'In the gate' reflects the Hebrew preposition and the gate's role as a civic place.
- source_word: הִגִּידוּ לֵאמֹר
  chosen: they told ... saying
  alternatives:
  - they reported ... saying
  - word was given ... saying
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means 'tell, declare, report.' The plural
    subject is indefinite/impersonal in context, but English can retain the simple
    plural 'they told.' 'Saying' preserves the Hebrew quotative structure.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the force better than the archaic 'Behold.'
- source_word: יוֹשֵׁב
  chosen: is sitting
  alternatives:
  - sits
  - is seated
  lexicon: HALOT
  rationale: The participle describes the king's present visible state. 'Is sitting'
    naturally conveys the ongoing aspect in English.
- source_word: וַיָּבֹא כָל הָעָם לִפְנֵי הַמֶּלֶךְ
  chosen: Then all the people came before the king
  alternatives:
  - Then all the people came into the king's presence
  - Then all the people came before him
  lexicon: HALOT
  rationale: בוא + לפני is well rendered 'came before.' This preserves the public
    audience scene without overinterpreting the exact ceremonial nuance.
- source_word: וְיִשְׂרָאֵל נָס
  chosen: But Israel had fled
  alternatives:
  - And Israel fled
  - while Israel had fled
  lexicon: HALOT
  rationale: The clause shifts to the broader situation after Absalom's defeat. Rendering
    with 'had fled' captures the prior/background sense of the qatal in relation to
    the immediate narrative, and 'But' marks the contrast with the people now gathering
    around the king.
- source_word: אִישׁ לְאֹהָלָיו
  chosen: each man to his tent
  alternatives:
  - every man to his tent
  - each to his home
  lexicon: HALOT
  rationale: Literally 'a man to his tents/tent.' This is an idiomatic expression
    for dispersing to one's dwelling or tribal place. 'Each man to his tent' preserves
    the Hebrew idiom and the masculine distributive singular; 'home' would flatten
    the imagery.
