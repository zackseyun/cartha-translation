id: 2SA.19.24
reference: 2 Samuel 19:24
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר הַ/מֶּ֛לֶךְ אֶל שִׁמְעִ֖י לֹ֣א תָמ֑וּת וַ/יִּשָּׁ֥בַֽע ל֖/וֹ הַ/מֶּֽלֶךְ־׃ס
translation:
  text: And the king said to Shimei, “You shall not die.” And the king swore it to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “You shall not be put to death.” The Hebrew literally
      says, “You shall not die,” which may function here as a royal promise of pardon
      from execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next narrative action. 'And ... said'
    preserves Hebrew narrative sequencing in readable English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context, so 'the
    king' is the natural rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition of direction/speech recipient; 'to' is idiomatic
    modern English.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לֹא תָמוּת
  chosen: You shall not die
  alternatives:
  - You will not die
  - You shall not be put to death
  lexicon: HALOT
  rationale: The negated imperfect of מות can express a solemn assurance or decree.
    'You shall not die' preserves the formal, royal force and leaves implicit whether
    this means immediate survival or exemption from execution. 'Be put to death' is
    interpretive and therefore kept as an alternative rather than the main text.
- source_word: וַיִּשָּׁבַע
  chosen: And ... swore
  alternatives:
  - And ... took an oath
  lexicon: HALOT
  rationale: From שבע in the Niphal, meaning to swear/take an oath. 'Swore' is concise
    and natural; the oath sense is clear from context.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to Shimei
  lexicon: HALOT
  rationale: Pronominal suffix refers back to Shimei. 'To him' is faithful and avoids
    unnecessary repetition while preserving the indirect-object relation.
- source_word: וַיִּשָּׁבַע לוֹ
  chosen: swore it to him
  alternatives:
  - swore to him
  - gave him his oath
  lexicon: HALOT
  rationale: English often omits an explicit object with 'swore,' but 'swore it to
    him' makes clear that the king confirmed the promise by oath. This slightly fuller
    rendering reflects the Hebrew construction without adding new content.
