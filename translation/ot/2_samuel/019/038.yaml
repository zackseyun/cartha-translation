id: 2SA.19.38
reference: 2 Samuel 19:38
source:
  edition: WLC
  text: יָֽשָׁב נָ֤א עַבְדְּ/ךָ֙ וְ/אָמֻ֣ת בְּ/עִירִ֔/י עִ֛ם קֶ֥בֶר אָבִ֖/י וְ/אִמִּ֑/י
    וְ/הִנֵּ֣ה עַבְדְּ/ךָ֣ כִמְהָ֗ם יַֽעֲבֹר֙ עִם אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ וַ/עֲשֵׂה
    ל֕/וֹ אֵ֥ת אֲשֶׁר ט֖וֹב בְּ/עֵינֶֽי/ךָ־׀־־־׃ס
translation:
  text: Please let your servant return, that I may die in my own city, near the grave
    of my father and my mother. But here is your servant Kimham; let him cross over
    with my lord the king, and do for him what is good in your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'with the grave of my father and my mother'; the sense
      is likely 'near/by the grave,' referring to burial in the family place.
    reason: lexical_alternative
  - marker: b
    text: Or 'what seems good to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשָׁב נָא
  chosen: Please let ... return
  alternatives:
  - Please let ... go back
  - May ... return, please
  lexicon: HALOT
  rationale: שׁוּב in the qal here expresses returning. נָא adds a polite/requesting
    force, best conveyed by 'Please let' in natural English.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In this courtly self-reference by Barzillai to the king, 'your servant'
    is the most natural and contextually appropriate rendering. The bonded nature
    of 'slave' is not foregrounded here; the term functions as deferential address.
- source_word: וְאָמֻת
  chosen: that I may die
  alternatives:
  - and die
  - so that I may die
  lexicon: HALOT
  rationale: 'The conjunction plus imperfect is best taken here as purpose/result
    following the request to return: he wishes to return home in order to die there.
    ''That I may die'' expresses the sense smoothly in English.'
- source_word: בְּעִירִי
  chosen: in my own city
  alternatives:
  - in my city
  lexicon: HALOT
  rationale: The 1cs suffix marks possession; 'my own city' brings out the personal
    attachment and fits the pathos of the request without overtranslating.
- source_word: עִם קֶבֶר אָבִי וְאִמִּי
  chosen: near the grave of my father and my mother
  alternatives:
  - with the grave of my father and my mother
  - by the grave of my father and my mother
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' but in this burial context
    idiomatic English prefers 'near' or 'by,' expressing desire to die and be buried
    where his parents are buried. 'Near' preserves the sense without wooden awkwardness.
- source_word: וְהִנֵּה
  chosen: But here is
  alternatives:
  - And behold
  - Now here is
  lexicon: HALOT
  rationale: הִנֵּה introduces what follows with presentative force. 'But here is'
    fits the contrast between Barzillai's refusal and Kimham's availability, while
    remaining readable modern English.
- source_word: כִמְהָם
  chosen: Kimham
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: יַעֲבֹר עִם
  chosen: let him cross over with
  alternatives:
  - he will cross over with
  - let him go over with
  lexicon: HALOT
  rationale: The imperfect here has jussive force in context, expressing Barzillai's
    request concerning Kimham. 'Cross over' preserves the repeated Jordan-crossing
    motif in the narrative.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: This is a standard respectful address to the king. 'My lord the king'
    preserves the courtly register better than 'my master the king.'
- source_word: וַעֲשֵׂה לוֹ
  chosen: and do for him
  alternatives:
  - and deal with him
  - and do to him
  lexicon: HALOT
  rationale: עשה with ל can mean to do for someone. 'Do for him' is idiomatic and
    avoids the potentially misleading English 'do to him.'
- source_word: אֵת אֲשֶׁר טוֹב בְּעֵינֶיךָ
  chosen: what is good in your eyes
  alternatives:
  - what seems good to you
  - whatever is good in your sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to what is good in someone's eyes.
    Retaining 'in your eyes' preserves the source idiom while remaining understandable
    in English.
