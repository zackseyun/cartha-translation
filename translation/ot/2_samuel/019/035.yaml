id: 2SA.19.35
reference: 2 Samuel 19:35
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר בַּרְזִלַּ֖י אֶל הַ/מֶּ֑לֶךְ כַּ/מָּ֗ה יְמֵי֙ שְׁנֵ֣י חַיַּ֔/י
    כִּי אֶעֱלֶ֥ה אֶת הַ/מֶּ֖לֶךְ יְרוּשָׁלִָֽם־־־׃
translation:
  text: Barzillai said to the king, “How many are the days of the years of my life,
    that I should go up with the king to Jerusalem?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'How many are the days of the years of my life...?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in English narrative.
- source_word: בַּרְזִלַּי
  chosen: Barzillai
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to King David
  lexicon: HALOT
  rationale: The Hebrew has the common noun with article, not the proper name; 'to
    the king' preserves the direct address context without adding 'David'.
- source_word: כַּמָּה
  chosen: How many
  alternatives:
  - How long
  lexicon: HALOT
  rationale: The interrogative asks quantitatively 'how many/how much.' In context
    it introduces a rhetorical question about the small remainder of his life. 'How
    many' best reflects the Hebrew form, while the idiomatic sense is carried by the
    full clause.
- source_word: יְמֵי שְׁנֵי חַיַּי
  chosen: the days of the years of my life
  alternatives:
  - the years of my life
  - the days left in my life
  lexicon: HALOT
  rationale: This layered Hebrew expression is somewhat formal and emphatic. Retaining
    'the days of the years of my life' preserves the source texture while remaining
    intelligible in English. Shorter alternatives are possible but flatten the wording.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - that I should
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/purpose nuance of the rhetorical question:
    ''that I should go up...?'' ''That'' works naturally in English with the following
    verb.'
- source_word: אֶעֱלֶה
  chosen: I should go up
  alternatives:
  - I would go up
  - I go up
  lexicon: HALOT
  rationale: עלה with Jerusalem commonly reflects ascent to the capital city. In this
    rhetorical question, 'I should go up' captures the modal nuance in English better
    than a simple future.
- source_word: אֶת הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - the king
  - accompanying the king
  lexicon: HALOT
  rationale: 'Although אֶת is formally the direct-object marker, in this context and
    parallel usage it conveys accompaniment: Barzillai is speaking of going up together
    with the king, not taking the king as a direct object. English therefore requires
    ''with the king.'''
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
