id: 2SA.19.43
reference: 2 Samuel 19:43
source:
  edition: WLC
  text: וַ/יַּעַן֩ כָּל אִ֨ישׁ יְהוּדָ֜ה עַל אִ֣ישׁ יִשְׂרָאֵ֗ל כִּֽי קָר֤וֹב הַ/מֶּ֨לֶךְ֙
    אֵלַ֔/י וְ/לָ֤/מָּה זֶּה֙ חָרָ֣ה לְ/ךָ֔ עַל הַ/דָּבָ֖ר הַ/זֶּ֑ה הֶ/אָכ֤וֹל אָכַ֨לְנוּ֙
    מִן הַ/מֶּ֔לֶךְ אִם נִשֵּׂ֥את נִשָּׂ֖א לָֽ/נוּ־־־־־־׃ס
translation:
  text: Then every man of Judah answered the man of Israel, “Because the king is a
    close relative to me. So why has this matter made you angry? Have we eaten at
    all at the king’s expense? Or has any gift been carried to us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the king is close to me'; the sense here is likely kinship
      or tribal closeness.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Have we eaten any of the king’s food? Or has anything been given to
      us?' The Hebrew of the final clause is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: Then ... answered
  alternatives:
  - and ... answered
  lexicon: HALOT
  rationale: Wayyiqtol of ענה introduces the next event in narrative sequence. 'Then
    ... answered' gives natural English narrative flow while preserving the responsive
    sense.
- source_word: כָּל אִישׁ יְהוּדָה
  chosen: every man of Judah
  alternatives:
  - all the men of Judah
  - every person of Judah
  lexicon: HALOT
  rationale: Literally 'every man of Judah.' The phrase is distributive/collective.
    'Every man of Judah' preserves the masculine singular form and representative
    force in keeping with the gender-accurate policy.
- source_word: עַל אִישׁ יִשְׂרָאֵל
  chosen: answered the man of Israel
  alternatives:
  - answered the men of Israel
  - answered against the man of Israel
  lexicon: HALOT
  rationale: Although the Hebrew has singular 'man of Israel,' it functions collectively
    in this exchange between Judah and Israel. Retaining the singular mirrors the
    Hebrew rhetoric. The preposition עַל after ענה can mark the party addressed in
    a dispute context.
- source_word: כִּי קָרוֹב הַמֶּלֶךְ אֵלַי
  chosen: Because the king is a close relative to me
  alternatives:
  - because the king is near to me
  - because the king is close to me
  lexicon: HALOT
  rationale: קָרוֹב with אֶל can denote relational nearness, especially kinship. In
    context Judah's argument is based on tribal/familial proximity to David, not merely
    emotional closeness or geography.
- source_word: וְלָמָּה זֶּה חָרָה לְךָ
  chosen: So why has this matter made you angry?
  alternatives:
  - and why does this burn to you?
  - and why are you angry?
  lexicon: HALOT
  rationale: חָרָה idiomatically means 'to burn/be angry.' I have brought 'this matter'
    forward from the following phrase for smoother English while preserving the causal
    object of the anger.
- source_word: עַל הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this word
  lexicon: HALOT
  rationale: דָּבָר here refers to the issue under dispute, not a spoken word in the
    narrow sense. 'Matter' is idiomatic and precise.
- source_word: הֶאָכוֹל אָכַלְנוּ מִן הַמֶּלֶךְ
  chosen: Have we eaten at all at the king’s expense?
  alternatives:
  - Have we really eaten from the king?
  - Have we eaten any of the king’s food?
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the denial/interrogation.
    'At all' captures the emphasis. 'From the king' in context means receiving material
    benefit from him, hence 'at the king’s expense' rather than literal consumption
    of his food alone.
- source_word: אִם נִשֵּׂאת נִשָּׂא לָנוּ
  chosen: Or has any gift been carried to us?
  alternatives:
  - Or has anything been given to us?
  - Or has he borne a portion to us?
  lexicon: HALOT
  rationale: The text is difficult, using forms from נשׂא. In context it parallels
    the previous denial of receiving advantage from the king. 'Has any gift been carried
    to us?' preserves the passive/resultative sense while making the implied object
    explicit in English. The alternative 'given to us' is possible but less closely
    tied to the Hebrew verb.
