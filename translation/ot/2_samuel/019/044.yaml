id: 2SA.19.44
reference: 2 Samuel 19:44
source:
  edition: WLC
  text: וַ/יַּ֣עַן אִֽישׁ יִשְׂרָאֵל֩ אֶת אִ֨ישׁ יְהוּדָ֜ה וַ/יֹּ֗אמֶר עֶֽשֶׂר יָד֨וֹת
    לִ֣/י בַ/מֶּלֶךְ֮ וְ/גַם בְּ/דָוִד֮ אֲנִ֣י מִמְּ/ךָ֒ וּ/מַדּ֨וּעַ֙ הֱקִלֹּתַ֔/נִי
    וְ/לֹא הָיָ֨ה דְבָרִ֥/י רִאשׁ֛וֹן לִ֖/י לְ/הָשִׁ֣יב אֶת מַלְכִּ֑/י וַ/יִּ֨קֶשׁ֙
    דְּבַר אִ֣ישׁ יְהוּדָ֔ה מִ/דְּבַ֖ר אִ֥ישׁ יִשְׂרָאֵֽל־־־־־־־׃ס
translation:
  text: Then the man of Israel answered the man of Judah and said, “I have ten shares
    in the king, and in David also I have more than you. Why then did you treat me
    lightly? Was not my word first in bringing back my king?” But the word of the
    men of Judah was harsher than the word of the men of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “ten hands to me in the king,” an idiom meaning ten shares
      or portions—likely referring to the ten northern tribes’ claim over against
      Judah.
    reason: cultural_note
  - marker: b
    text: Or, “in David also I have a greater claim than you.” The Hebrew is elliptical
      but expresses comparative claim or stake.
    reason: lexical_alternative
  - marker: c
    text: Or, “Was not my proposal first to bring back my king?”
    reason: alternative_reading
  - marker: d
    text: Or, “the words of the men of Judah were stronger/fiercer than the words
      of the men of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל / אִישׁ יְהוּדָה
  chosen: the man of Israel / the man of Judah
  alternatives:
  - the men of Israel / the men of Judah
  - an Israelite / a man of Judah
  lexicon: HALOT
  rationale: Hebrew singular אִישׁ is used representatively in the dialogue, likely
    as a spokesman for each side. Rendering the singular preserves the form of the
    exchange while allowing the later plural sense to emerge in the closing summary.
- source_word: עֶשֶׂר יָדוֹת לִי בַמֶּלֶךְ
  chosen: I have ten shares in the king
  alternatives:
  - I have ten parts in the king
  - I have ten hands in the king
  lexicon: HALOT
  rationale: יָדוֹת literally means 'hands,' but in this idiom it denotes portions,
    claims, or shares. 'Ten shares' communicates the tribal claim of Israel over against
    Judah without woodenly preserving an opaque idiom.
- source_word: וְגַם בְּדָוִד אֲנִי מִמְּךָ
  chosen: and in David also I have more than you
  alternatives:
  - and even in David I am more than you
  - and I also have a greater claim in David than you
  lexicon: HALOT
  rationale: The comparative force of מִמְּךָ after אֲנִי is elliptical. The sense
    is not personal superiority in general but stronger claim or greater share with
    respect to David. The chosen rendering makes the implied comparison explicit in
    natural English.
- source_word: הֱקִלֹּתַנִי
  chosen: did you treat me lightly
  alternatives:
  - did you despise me
  - did you make light of me
  - did you dishonor me
  lexicon: HALOT
  rationale: From קלל in the Hiphil, the verb conveys treating as insignificant or
    slighting. 'Treat me lightly' preserves the metaphor and the interpersonal offense
    without overstating it to outright hatred.
- source_word: וְלֹא הָיָה דְבָרִי רִאשׁוֹן לִי לְהָשִׁיב אֶת מַלְכִּי
  chosen: Was not my word first in bringing back my king?
  alternatives:
  - Was not my proposal the first to bring back my king?
  - Did I not speak first about bringing back my king?
  lexicon: HALOT
  rationale: The clause is difficult and somewhat elliptical. דָבָר can mean word,
    matter, or proposal. The point is priority in initiating the king's return. 'My
    word' keeps the Hebrew noun while the infinitive phrase clarifies the action in
    idiomatic English.
- source_word: מַלְכִּי
  chosen: my king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The first person singular suffix is explicit and rhetorically important,
    expressing personal allegiance and claim. It should be preserved rather than flattened
    to 'the king.'
- source_word: וַיִּקֶשׁ דְּבַר אִישׁ יְהוּדָה מִדְּבַר אִישׁ יִשְׂרָאֵל
  chosen: the word of the men of Judah was harsher than the word of the men of Israel
  alternatives:
  - the words of the men of Judah were stronger than the words of the men of Israel
  - the men of Judah spoke more fiercely than the men of Israel
  lexicon: HALOT
  rationale: קשׁה here conveys severity or harshness in speech. Although אִישׁ is
    singular in form, the sense is collective at this summary statement, so plural
    'men' is appropriate. 'Word' is retained as a collective singular matching Hebrew
    style.
