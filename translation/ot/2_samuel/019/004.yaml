id: 2SA.19.4
reference: 2 Samuel 19:4
source:
  edition: WLC
  text: וַ/יִּתְגַּנֵּ֥ב הָ/עָ֛ם בַּ/יּ֥וֹם הַ/ה֖וּא לָ/ב֣וֹא הָ/עִ֑יר כַּ/אֲשֶׁ֣ר
    יִתְגַּנֵּ֗ב הָ/עָם֙ הַ/נִּכְלָמִ֔ים בְּ/נוּסָ֖/ם בַּ/מִּלְחָמָֽה׃
translation:
  text: So the people slipped into the city that day, as people who are ashamed slip
    away when they flee in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stole into the city' / 'came stealthily into the city'; the Hebrew verb
      emphasizes furtive movement, not literal theft.
    reason: lexical_alternative
  - marker: b
    text: The comparison is to soldiers returning in shame after fleeing from battle.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְגַּנֵּב
  chosen: slipped into
  alternatives:
  - stole into
  - came stealthily into
  - snuck into
  lexicon: HALOT
  rationale: The hitpael of גנב literally suggests acting secretly or stealthily,
    not theft here. 'Slipped into' conveys furtive, subdued movement in natural English
    without sounding overly colloquial; the preposition 'into' is supplied from the
    following infinitive phrase 'to enter the city.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: Though the context is military, the Hebrew term is the broader 'people.'
    'The people' preserves the wording while still fitting the returning fighting
    force in context.
- source_word: לָבוֹא הָעִיר
  chosen: into the city
  alternatives:
  - to enter the city
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the action of entering. In
    English, after 'slipped,' 'into the city' is smoother than repeating an infinitive
    while preserving the sense.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: HALOT
  rationale: Introduces a comparison. 'As' is concise and idiomatic in this simile.
- source_word: יִתְגַּנֵּב
  chosen: slip away
  alternatives:
  - steal away
  - sneak away
  lexicon: HALOT
  rationale: The repeated verb should be rendered consistently, but English style
    benefits from slight variation because the second clause lacks an explicit destination.
    'Slip away' preserves the furtive nuance and matches the shame context.
- source_word: הַנִּכְלָמִים
  chosen: who are ashamed
  alternatives:
  - the disgraced
  - those humiliated
  - those put to shame
  lexicon: HALOT
  rationale: The niphal participle denotes being humiliated or ashamed. 'Who are ashamed'
    fits the comparative clause naturally and foregrounds the emotional state rather
    than a formal status.
- source_word: בְּנוּסָם
  chosen: when they flee
  alternatives:
  - in their fleeing
  - as they fled
  lexicon: HALOT
  rationale: The preposition with infinitive construct and suffix expresses circumstance/time.
    'When they flee' gives clear, natural English in a general simile.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in the battle
  - from the battle
  - in war
  lexicon: HALOT
  rationale: The phrase describes the setting of their shameful flight. 'In battle'
    is idiomatic and sufficiently specific without overtranslating the article.
