id: 2SA.19.5
reference: 2 Samuel 19:5
source:
  edition: WLC
  text: וְ/הַ/מֶּ֨לֶךְ֙ לָאַ֣ט אֶת פָּנָ֔י/ו וַ/יִּזְעַ֥ק הַ/מֶּ֖לֶךְ ק֣וֹל גָּד֑וֹל
    בְּנִ/י֙ אַבְשָׁל֔וֹם אַבְשָׁל֖וֹם בְּנִ֥/י בְנִֽ/י־׃ס
translation:
  text: And the king covered his face, and the king cried out with a loud voice, “My
    son Absalom! Absalom, my son, my son!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “wrapped his face” or “veiled his face.” The Hebrew verb suggests covering
      the face in grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאַט
  chosen: covered
  alternatives:
  - wrapped
  - veiled
  lexicon: HALOT
  rationale: The verb here denotes covering or muffling oneself, specifically with
    the object 'his face.' 'Covered' is the most natural modern English rendering
    and fits the mourning context without over-specifying the manner.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: With the direct object marker and the mourning action, the concrete sense
    'his face' is clearly intended, not the extended sense 'presence.'
- source_word: וַיִּזְעַק
  chosen: cried out
  alternatives:
  - shouted
  - wailed
  lexicon: HALOT
  rationale: The verb indicates a loud cry. 'Cried out' preserves the intensity while
    remaining broad enough to fit grief rather than anger. 'Wailed' is possible contextually
    but imports a more interpretive nuance than the Hebrew explicitly states.
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - loudly
  - with a great cry
  lexicon: HALOT
  rationale: This is a common Hebrew idiom literally meaning 'a great voice/sound.'
    'With a loud voice' preserves the form and emphasis better than the adverb 'loudly.'
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The noun is singular masculine with first-person suffix and refers specifically
    to Absalom as David's son. 'My son' is both literal and emotionally forceful;
    'my child' would be less precise.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: repetition of אַבְשָׁלוֹם / בְּנִי
  chosen: “My son Absalom! Absalom, my son, my son!”
  alternatives:
  - “My son, Absalom! Absalom! My son, my son!”
  rationale: The Hebrew repetition conveys intense grief and should be preserved rather
    than smoothed out. The chosen punctuation reflects natural English lament while
    keeping all repeated elements present.
