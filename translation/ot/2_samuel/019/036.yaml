id: 2SA.19.36
reference: 2 Samuel 19:36
source:
  edition: WLC
  text: בֶּן שְׁמֹנִ֣ים שָׁנָה֩ אָנֹכִ֨י הַ/יּ֜וֹם הַ/אֵדַ֣ע בֵּין ט֣וֹב לְ/רָ֗ע אִם
    יִטְעַ֤ם עַבְדְּ/ךָ֙ אֶת אֲשֶׁ֤ר אֹכַל֙ וְ/אֶת אֲשֶׁ֣ר אֶשְׁתֶּ֔ה אִם אֶשְׁמַ֣ע
    ע֔וֹד בְּ/ק֖וֹל שָׁרִ֣ים וְ/שָׁר֑וֹת וְ/לָ/מָּה֩ יִֽהְיֶ֨ה עַבְדְּ/ךָ֥ עוֹד֙ לְ/מַשָּׂ֔א
    אֶל אֲדֹנִ֖/י הַ/מֶּֽלֶךְ־׀־־־־־־׃
translation:
  text: I am eighty years old today. Can I still distinguish between good and bad?
    Can your servant taste what I eat and what I drink? Can I still hear the voice
    of male singers and female singers? Why then should your servant still be a burden
    to my lord the king?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Can I discern between good and evil?' The Hebrew expression can denote
      moral or practical discernment; here the context of age and failing senses favors
      the broader sense of diminished judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁמֹנִים שָׁנָה
  chosen: eighty years old
  alternatives:
  - a son of eighty years
  lexicon: HALOT
  rationale: Hebrew idiom for age; natural English requires 'years old' rather than
    a wooden literalism.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb in age statement; 'today' is idiomatic modern English
    while preserving the sense.
- source_word: הַאֵדַע בֵּין טוֹב לְרָע
  chosen: Can I still distinguish between good and bad?
  alternatives:
  - Do I know between good and evil?
  - Can I discern between good and evil?
  lexicon: HALOT
  rationale: Interrogative force is implied by context and the following sequence
    of rhetorical questions. 'Distinguish' captures ידע בין as discernment. 'Good
    and bad' fits the immediate context of diminished faculties and taste better than
    the more morally loaded 'good and evil,' though that remains possible.
- source_word: אִם
  chosen: Can
  alternatives:
  - whether
  - if
  lexicon: HALOT
  rationale: Repeated אִם introduces indirect/rhetorical questions in context; English
    renders this more naturally with 'Can I...?' rather than preserving 'if' woodenly.
- source_word: יִטְעַם
  chosen: taste
  alternatives:
  - perceive the taste of
  lexicon: HALOT
  rationale: The verb טעם commonly means 'taste'; here it refers to sensory ability
    in old age.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Courtly self-reference before the king is best rendered 'your servant.'
    The bonded nature is not the salient point here, unlike some δοῦλος contexts noted
    in doctrine.
- source_word: אֶת אֲשֶׁר אֹכַל וְאֶת אֲשֶׁר אֶשְׁתֶּה
  chosen: what I eat and what I drink
  alternatives:
  - what I would eat and what I would drink
  lexicon: HALOT
  rationale: Straightforward relative construction; present English fits the rhetorical
    question naturally.
- source_word: אֶשְׁמַע עוֹד בְּקוֹל שָׁרִים וְשָׁרוֹת
  chosen: Can I still hear the voice of male singers and female singers?
  alternatives:
  - Can I still hear singers, men and women?
  - Can I still hear the sound of singing men and singing women?
  lexicon: HALOT
  rationale: בְקוֹל is literally 'in/with the voice/sound of.' 'Hear the voice of'
    is acceptable English and preserves the singular קול with the paired participles/nouns.
    The masculine and feminine forms are retained explicitly per gender-accurate policy.
- source_word: שָׁרִים וְשָׁרוֹת
  chosen: male singers and female singers
  alternatives:
  - singers, men and women
  lexicon: HALOT
  rationale: The Hebrew marks gender distinctly; the translation preserves that distinction
    rather than collapsing to a generic 'singers.'
- source_word: לָמָּה
  chosen: Why then
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: Connects the rhetorical questions to the conclusion; 'then' makes the
    inferential force explicit in natural English.
- source_word: לְמַשָּׂא
  chosen: a burden
  alternatives:
  - a load
  - an encumbrance
  lexicon: HALOT
  rationale: Idiomatic sense is metaphorical burden or inconvenience to the king,
    not a literal load.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my lord, the king
  lexicon: HALOT
  rationale: Standard court address; retained with lowercase 'lord' because it refers
    to the human king, not the divine title.
