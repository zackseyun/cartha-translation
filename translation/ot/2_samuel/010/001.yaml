id: 2SA.10.1
reference: 2 Samuel 10:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַֽחֲרֵי כֵ֔ן וַ/יָּ֕מָת מֶ֖לֶךְ בְּנֵ֣י עַמּ֑וֹן וַ/יִּמְלֹ֛ךְ
    חָנ֥וּן בְּנ֖/וֹ תַּחְתָּֽי/ו־׃
translation:
  text: After this, the king of the Ammonites died, and Hanun his son became king
    in his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally means 'and it happened after this.'
    In natural modern English, 'After this' preserves the temporal transition without
    unnecessary stiffness.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות straightforwardly means 'die.' 'Died' is the plain and direct
    rendering; 'passed away' would soften the text beyond the Hebrew.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: the king of the Ammonites
  alternatives:
  - the king of the sons of Ammon
  - the king of Ammon
  lexicon: HALOT
  rationale: בני עמון is the standard ethnogeographic expression for the Ammonite
    people. 'The king of the Ammonites' is idiomatic English and accurately reflects
    the construct phrase.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was made king
  lexicon: HALOT
  rationale: The verb מלך in this succession context marks accession to kingship.
    'Became king' communicates the transition clearly; 'reigned' could suggest the
    whole duration of rule rather than the moment of succession.
- source_word: חָנוּן
  chosen: Hanun
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: The pronominal suffix refers to the deceased king; 'his son' is the direct
    and unambiguous rendering.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition תחת with suffix in royal succession commonly means 'in
    his place' or 'instead of him.' 'In his place' is idiomatic and fits the succession
    formula well.
