id: 2SA.10.10
reference: 2 Samuel 10:10
source:
  edition: WLC
  text: וְ/אֵת֙ יֶ֣תֶר הָ/עָ֔ם נָתַ֕ן בְּ/יַ֖ד אַבְשַׁ֣י אָחִ֑י/ו וַֽ/יַּעֲרֹ֕ךְ לִ/קְרַ֖את
    בְּנֵ֥י עַמּֽוֹן׃
translation:
  text: And the rest of the people he put under the command of Abishai his brother,
    and he drew them up to meet the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Ammonites.'' Hebrew: ''the sons of Ammon.'''
    reason: lexical_alternative
  - marker: b
    text: Literally 'gave into the hand of Abishai,' an idiom for entrusting troops
      to his authority.
    reason: lexical_alternative
  - marker: c
    text: Or 'he arranged them' / 'he set the battle line.' The Hebrew verb refers
      to drawing up troops in battle formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר הָעָם
  chosen: the rest of the people
  alternatives:
  - the remainder of the army
  - the rest of the troops
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains or is left over. הָעָם literally means 'the
    people,' but in this military context it refers to the remaining fighting force.
    'The rest of the people' preserves the Hebrew wording while remaining intelligible
    in context.
- source_word: נָתַן בְּיַד
  chosen: put under the command of
  alternatives:
  - gave into the hand of
  - placed in the hand of
  lexicon: HALOT
  rationale: The idiom נָתַן בְּיַד literally means 'gave into the hand of,' often
    expressing entrusting or placing under someone's authority. Here it refers to
    assigning troops to Abishai's command, so the idiomatic English rendering best
    conveys the military sense.
- source_word: אַבְשַׁי
  chosen: Abishai
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: The suffix clearly refers to Joab's brother Abishai. The familial relation
    is explicit in the Hebrew and should be retained.
- source_word: וַיַּעֲרֹךְ
  chosen: he drew them up
  alternatives:
  - he arranged them
  - he set the battle line
  lexicon: HALOT
  rationale: ערך in military contexts commonly means to arrange troops in battle order.
    'Drew them up' is natural modern English for forming troops for engagement and
    captures the martial nuance better than the more generic 'arranged.'
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - against
  - to face
  lexicon: HALOT
  rationale: לִקְרַאת literally means 'to meet' or 'toward the encounter with.' In
    battle contexts it can imply hostile engagement. 'To meet' preserves the lexical
    sense while allowing the military context to supply the adversarial force.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' This rendering preserves the
    source expression; 'Ammonites' is a valid smoother alternative but less formally
    transparent.
