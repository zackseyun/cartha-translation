id: 2SA.10.19
reference: 2 Samuel 10:19
source:
  edition: WLC
  text: וַ/יִּרְא֨וּ כָֽל הַ/מְּלָכִ֜ים עַבְדֵ֣י הֲדַדְעֶ֗זֶר כִּ֤י נִגְּפוּ֙ לִ/פְנֵ֣י
    יִשְׂרָאֵ֔ל וַ/יַּשְׁלִ֥מוּ אֶת יִשְׂרָאֵ֖ל וַ/יַּֽעַבְד֑וּ/ם וַ/יִּֽרְא֣וּ אֲרָ֔ם
    לְ/הוֹשִׁ֥יעַ ע֖וֹד אֶת בְּנֵ֥י עַמּֽוֹן־־־׃פ
translation:
  text: When all the kings who were servants of Hadadezer saw that they had been defeated
    before Israel, they made peace with Israel and served them. So Aram was afraid
    to save the sons of Ammon anymore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vassals of Hadadezer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Ammonites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants of
  alternatives:
  - vassals of
  - subjects of
  lexicon: HALOT
  rationale: In this political-military context, the term denotes subordinate rulers
    under Hadadezer. 'Servants' is a transparent rendering of עבד while allowing the
    following clause ('served them') to preserve the verbal repetition. 'Vassals'
    is contextually precise but less natural in the flow of the sentence.
- source_word: נִגְּפוּ
  chosen: had been defeated
  alternatives:
  - had been struck down
  - had been routed
  lexicon: HALOT
  rationale: The Niphal of נגב/נגף here indicates suffering military defeat. 'Had
    been defeated' communicates the result clearly in modern English without over-specifying
    casualties.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - by Israel
  - in the presence of Israel
  lexicon: HALOT
  rationale: The idiom literally means 'before Israel' and commonly conveys defeat
    at Israel's hands. Retaining 'before' preserves the Hebrew flavor while remaining
    intelligible.
- source_word: וַיַּשְׁלִמוּ אֶת יִשְׂרָאֵל
  chosen: they made peace with Israel
  alternatives:
  - they submitted to Israel
  - they were at peace with Israel
  lexicon: HALOT
  rationale: The Hiphil of שׁלם with אֶת marks entering into peaceful relations. 'Made
    peace with' is the standard idiomatic English equivalent and fits the political
    setting.
- source_word: וַיַּעַבְדוּם
  chosen: served them
  alternatives:
  - became subject to them
  - were in servitude to them
  lexicon: HALOT
  rationale: The verb continues the political subordination theme. The 3mp suffix
    most naturally refers to Israel. 'Served them' is direct and preserves the lexical
    link with 'servants' earlier in the verse.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is best transliterated as 'Aram' per the translation
    philosophy favoring transliteration of names. 'Syria' is anachronizing, and 'the
    Arameans' would shift from the place/people name used in the text.
- source_word: לְהוֹשִׁיעַ
  chosen: to save
  alternatives:
  - to help
  - to deliver
  lexicon: HALOT
  rationale: The Hiphil infinitive of ישׁע means to bring rescue or deliverance. 'Save'
    is the most direct rendering and does not import theological overtones beyond
    the lexical sense here.
- source_word: עוֹד
  chosen: anymore
  alternatives:
  - again
  - further
  lexicon: HALOT
  rationale: In context, עוֹד marks cessation of further assistance after this defeat.
    'Anymore' expresses that force naturally in English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression and its ethnogeographic
    sense. 'Ammonites' is a valid smoother alternative, but 'sons of Ammon' better
    reflects the source wording.
