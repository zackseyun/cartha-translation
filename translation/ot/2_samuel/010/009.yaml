id: 2SA.10.9
reference: 2 Samuel 10:9
source:
  edition: WLC
  text: וַ/יַּ֣רְא יוֹאָ֗ב כִּֽי הָיְתָ֤ה אֵלָי/ו֙ פְּנֵ֣י הַ/מִּלְחָמָ֔ה מִ/פָּנִ֖ים
    וּ/מֵֽ/אָח֑וֹר וַ/יִּבְחַ֗ר מִ/כֹּל֙ בְּחוּרֵ֣י ב/ישראל וַֽ/יַּעֲרֹ֖ךְ לִ/קְרַ֥את
    אֲרָֽם־׃
translation:
  text: When Joab saw that the battle line was set against him in front and in the
    rear, he chose some of the best men in Israel and arrayed them to meet Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'he chose from all the picked men of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' refers to the Aramean forces.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: Basic sense of ראה is visual perception, here extending to recognition
    of the tactical situation. 'Saw' preserves the Hebrew narrative style without
    over-interpreting.
- source_word: פְּנֵי הַמִּלְחָמָה
  chosen: the battle line
  alternatives:
  - the face of the battle
  - the battle front
  lexicon: HALOT
  rationale: Literally 'the face of the battle.' In military context this idiom refers
    to the front or battle line. 'Battle line' is natural English and preserves the
    tactical sense.
- source_word: הָיְתָה אֵלָיו
  chosen: was set against him
  alternatives:
  - was against him
  - came against him
  lexicon: HALOT
  rationale: The clause describes the battle front as positioned toward Joab. 'Was
    set against him' brings out the military positioning implied by the idiom more
    clearly than a bare 'was against him.'
- source_word: מִפָּנִים וּמֵאָחוֹר
  chosen: in front and in the rear
  alternatives:
  - before and behind
  - from the front and from behind
  lexicon: HALOT
  rationale: This expresses encirclement or attack on two sides. 'In front and in
    the rear' is idiomatic modern English and keeps the spatial contrast.
- source_word: וַיִּבְחַר מִכֹּל בְּחוּרֵי בְיִשְׂרָאֵל
  chosen: he chose some of the best men in Israel
  alternatives:
  - he chose from all the chosen men of Israel
  - he selected from all the picked men of Israel
  lexicon: HALOT
  rationale: בְּחוּרִים are selected or choice young fighting men. The phrase means
    Joab selected from Israel's elite troops. 'Some of the best men in Israel' communicates
    the sense clearly in contemporary English, though a more formal alternative is
    preserved in a footnote.
- source_word: וַיַּעֲרֹךְ
  chosen: arrayed
  alternatives:
  - drew up
  - arranged in battle formation
  lexicon: HALOT
  rationale: ערך in military contexts means to arrange troops in order for battle.
    'Arrayed' is concise, dignified, and contextually precise.
- source_word: לִקְרַאת אֲרָם
  chosen: to meet Aram
  alternatives:
  - against Aram
  - to face Aram
  lexicon: HALOT
  rationale: לקראת often means 'to meet' or 'to confront.' Here it introduces military
    engagement. 'To meet Aram' is sufficiently literal while fitting the battle context.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geographic labels. Although the referent is the Aramean forces, the
    Hebrew proper name is singular collective and is best preserved as 'Aram.'
