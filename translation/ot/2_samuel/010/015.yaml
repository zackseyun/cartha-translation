id: 2SA.10.15
reference: 2 Samuel 10:15
source:
  edition: WLC
  text: וַ/יַּ֣רְא אֲרָ֔ם כִּ֥י נִגַּ֖ף לִ/פְנֵ֣י יִשְׂרָאֵ֑ל וַ/יֵּאָסְפ֖וּ יָֽחַד׃
translation:
  text: When Aram saw that it had been defeated before Israel, they gathered together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Aram saw that it was defeated before Israel, and they assembled
      together.' The Hebrew uses the singular proper name 'Aram' collectively for
      the Arameans.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' brings
    out the temporal force naturally in English in relation to the following action,
    while preserving the basic sense of ראה, 'see.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper noun is singular in form and often denotes the Aramean
    polity/army collectively. 'Aram' preserves the name by transliteration, in keeping
    with the translation philosophy for names. The following English plural pronoun
    reflects the collective sense.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Aram perceived: ''that it had
    been defeated,'' not a causal clause.'
- source_word: נִגַּף
  chosen: had been defeated
  alternatives:
  - had been struck down
  - had been routed
  lexicon: HALOT
  rationale: The Niphal of נגב/נגף here conveys being beaten/defeated in battle. 'Had
    been defeated' is clear modern English and fits the military context without over-specifying
    the manner of loss.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - by
  - in the presence of
  lexicon: HALOT
  rationale: In battle contexts לִפְנֵי commonly means 'before' in the sense of 'in
    the face of' or 'before the power of.' 'Before Israel' is a standard and sufficiently
    transparent rendering.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name transliterated directly.
- source_word: וַיֵּאָסְפוּ
  chosen: they gathered
  alternatives:
  - they assembled
  - they regrouped
  lexicon: HALOT
  rationale: אָסף in the Niphal means 'gather oneself, assemble.' 'They gathered'
    is straightforward; 'regrouped' is interpretive and slightly more military than
    the Hebrew explicitly states.
- source_word: יָחַד
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: יָחַד adverbially means 'together.' This naturally modifies the assembling
    action in English.
