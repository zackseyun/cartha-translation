id: 2SA.10.4
reference: 2 Samuel 10:4
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח חָנ֜וּן אֶת עַבְדֵ֣י דָוִ֗ד וַ/יְגַלַּח֙ אֶת חֲצִ֣י זְקָנָ֔/ם
    וַ/יִּכְרֹ֧ת אֶת מַדְוֵי/הֶ֛ם בַּ/חֵ֖צִי עַ֣ד שְׁתֽוֹתֵי/הֶ֑ם וַֽ/יְשַׁלְּחֵֽ/ם־־־׃
translation:
  text: So Hanun took David’s servants, shaved off half of their beards, cut off their
    garments in the middle up to their buttocks, and sent them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'up to their seat' or 'up to their private area'; the Hebrew term is
      rare, and the exact anatomical reference is debated. The sense is that Hanun
      exposed them shamefully by cutting their garments very short.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  lexicon: HALOT
  rationale: Basic narrative verb לקח in the waw-consecutive sequence; 'took' is the
    plain sense here without adding the stronger nuance 'seized' unless context requires
    it.
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - David’s servants/officials
  - David’s slaves
  lexicon: HALOT
  rationale: עבד can denote servant, slave, or royal official depending on context.
    Here these are diplomatic emissaries in royal service, so 'servants' best fits
    idiomatic English and context without importing the bonded emphasis that 'slaves'
    would suggest.
- source_word: וַיְגַלַּח אֶת חֲצִי זְקָנָם
  chosen: shaved off half of their beards
  alternatives:
  - shaved half their beards
  lexicon: HALOT
  rationale: גלח means to shave. The phrase indicates partial shaving of each man's
    beard, a deliberate humiliation. 'Shaved off half of their beards' is clear and
    natural.
- source_word: וַיִּכְרֹת
  chosen: cut off
  alternatives:
  - cut
  lexicon: HALOT
  rationale: כרת commonly means 'cut off/cut down.' With garments, 'cut off' communicates
    removal of part of the clothing.
- source_word: מַדְוֵיהֶם
  chosen: their garments
  alternatives:
  - their robes
  - their outer garments
  lexicon: HALOT
  rationale: The noun refers to a garment or clothing item. 'Garments' is broad enough
    to preserve the Hebrew without over-specifying the exact type of clothing.
- source_word: בַּחֵצִי
  chosen: in the middle
  alternatives:
  - in half
  - at the halfway point
  lexicon: HALOT
  rationale: The phrase indicates the garments were cut at the midpoint. 'In the middle'
    is idiomatic and preserves the spatial sense.
- source_word: עַד שְׁתוֹתֵיהֶם
  chosen: up to their buttocks
  alternatives:
  - up to their private parts
  - up to their buttocks/seat
  lexicon: HALOT
  rationale: The rare term שְׁתוֹת likely refers to the buttocks or lower rear/seat
    area. In context of public humiliation by cutting garments short, 'buttocks' is
    the most direct and contextually fitting rendering. It avoids euphemism while
    not overstating the anatomy.
- source_word: וַיְשַׁלְּחֵם
  chosen: sent them away
  alternatives:
  - sent them off
  - dismissed them
  lexicon: HALOT
  rationale: שלח here means to send away after the humiliation. 'Sent them away' is
    natural English and preserves the narrative flow.
