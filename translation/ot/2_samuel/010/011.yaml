id: 2SA.10.11
reference: 2 Samuel 10:11
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אִם תֶּחֱזַ֤ק אֲרָם֙ מִמֶּ֔/נִּי וְ/הָיִ֥תָה לִּ֖/י לִֽ/ישׁוּעָ֑ה
    וְ/אִם בְּנֵ֤י עַמּוֹן֙ יֶחֱזְק֣וּ מִמְּ/ךָ֔ וְ/הָלַכְתִּ֖י לְ/הוֹשִׁ֥יעַֽ לָֽ/ךְ־־׃
translation:
  text: He said, “If Aram is too strong for me, then you shall be my help; but if
    the Ammonites are too strong for you, then I will go to help you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If Aram prevails against me … if the Ammonites prevail against you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “you shall be to me for deliverance” … “I will go to deliver you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחֱזַק / יֶחֱזְקוּ
  chosen: is too strong / are too strong
  alternatives:
  - prevails against
  - is stronger than
  - overpowers
  lexicon: HALOT
  rationale: The verb חזק in this military context means to be strong or prevail over.
    English 'is too strong for' naturally conveys the conditional sense of an enemy
    gaining the upper hand without overparaphrasing.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as Aram. Per translation philosophy,
    names are transliterated rather than replaced with later geopolitical labels like
    'Syria.'
- source_word: מִמֶּנִּי / מִמְּךָ
  chosen: for me / for you
  alternatives:
  - than me / than you
  - against me / against you
  lexicon: HALOT
  rationale: With חזק, the preposition מן marks comparison or superiority. In idiomatic
    English, 'too strong for me/you' best captures the sense.
- source_word: וְהָיְתָה לִּי לִישׁוּעָה
  chosen: you shall be my help
  alternatives:
  - you shall be salvation for me
  - you shall come to my rescue
  lexicon: HALOT
  rationale: The feminine verb agrees with the implied addressee/force under Abishai's
    command. יְשׁוּעָה often denotes deliverance or rescue; here 'help' is concise,
    natural military English that fits the immediate context of battlefield support.
- source_word: לִישׁוּעָה
  chosen: help
  alternatives:
  - deliverance
  - salvation
  - rescue
  lexicon: HALOT
  rationale: Although the noun can mean 'salvation' or 'deliverance,' in this tactical
    setting it refers to practical military aid. 'Help' preserves the sense without
    importing later theological associations.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for the ethnic-national group
    in English.
- source_word: וְהָלַכְתִּי לְהוֹשִׁיעַ לָךְ
  chosen: I will go to help you
  alternatives:
  - I will come to save you
  - I will go to deliver you
  lexicon: HALOT
  rationale: הלך + infinitive expresses movement with purpose. In context, 'go to
    help you' is the most natural English rendering of going to provide military support.
    'Save' would be possible but sounds overly absolute in this battlefield coordination
    statement.
