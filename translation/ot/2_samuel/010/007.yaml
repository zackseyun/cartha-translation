id: 2SA.10.7
reference: 2 Samuel 10:7
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֖ע דָּוִ֑ד וַ/יִּשְׁלַח֙ אֶת יוֹאָ֔ב וְ/אֵ֥ת כָּל הַ/צָּבָ֖א הַ/גִּבֹּרִֽים־־׃
translation:
  text: When David heard, he sent Joab and all the army, the mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "and all the army of the mighty men"; the Hebrew can be read with "the
      mighty men" in apposition to "the army" or as a genitival-like specification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: When David heard
  alternatives:
  - And David heard
  - David heard of it
  lexicon: HALOT
  rationale: שׁמע in the Qal wayyiqtol means 'heard.' English often supplies 'when'
    to smooth the narrative sequence introduced by consecutive wayyiqtol verbs. 'Heard
    of it' is possible from context, but the object is not explicit in this verse,
    so the simpler 'heard' is preferred.
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - and he sent
  - he dispatched
  lexicon: HALOT
  rationale: שׁלח in Qal commonly means 'send.' 'Dispatched' is slightly more idiomatic
    in military context, but 'sent' preserves the straightforward Hebrew wording.
- source_word: אֶת יוֹאָב
  chosen: Joab
  rationale: Direct-object marker אֶת is not translated; the personal name is transliterated
    per project policy.
- source_word: וְאֵת כָּל הַצָּבָא
  chosen: and all the army
  alternatives:
  - and all the host
  - and the whole army
  lexicon: HALOT
  rationale: צָבָא here refers to the military force. 'Army' is the clearest modern
    English equivalent; 'host' is traditional but archaic. כָּל is naturally rendered
    'all' or 'the whole.'
- source_word: הַגִּבֹּרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the mighty warriors
  - the elite troops
  lexicon: HALOT
  rationale: גִּבּוֹרִים can denote mighty men, warriors, or valiant fighters. Here
    it likely apposes or further specifies the army as David's fighting men. 'The
    mighty men' preserves the lexical force and leaves open the possibility of an
    elite corps without over-interpreting.
