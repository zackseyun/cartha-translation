id: 2SA.10.2
reference: 2 Samuel 10:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶעֱשֶׂה חֶ֣סֶד עִם חָנ֣וּן בֶּן נָחָ֗שׁ כַּ/אֲשֶׁר֩ עָשָׂ֨ה
    אָבִ֤י/ו עִמָּדִ/י֙ חֶ֔סֶד וַ/יִּשְׁלַ֨ח דָּוִ֧ד לְ/נַחֲמ֛/וֹ בְּ/יַד עֲבָדָ֖י/ו
    אֶל אָבִ֑י/ו וַ/יָּבֹ֨אוּ֙ עַבְדֵ֣י דָוִ֔ד אֶ֖רֶץ בְּנֵ֥י עַמּֽוֹן־׀־־־־׃
translation:
  text: And David said, “I will show kindness to Hanun son of Nahash, just as his
    father showed kindness to me.” So David sent his servants to comfort him concerning
    his father, and David’s servants came into the land of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to console him about his father.' The Hebrew expression likely refers
      to offering condolences over his father's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - favor
  lexicon: HALOT
  rationale: In this political/diplomatic context between David and Hanun, חֶסֶד refers
    to benevolent loyalty or kindness shown between parties rather than specifically
    covenantal 'steadfast love.' 'Kindness' is natural English and fits both occurrences
    in the verse.
- source_word: עִם
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although literally 'with,' English idiom with 'show kindness' normally
    takes 'to.' This is an optimal-equivalence adjustment that preserves the sense.
- source_word: חָנוּן בֶּן נָחָשׁ
  chosen: Hanun son of Nahash
  alternatives:
  - Hanun, the son of Nahash
  rationale: Personal names are transliterated by standard convention per translation
    philosophy; 'son of' preserves the Hebrew filial expression clearly.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: '''Just as'' clearly marks the comparison and reciprocity in modern English.'
- source_word: עָשָׂה ... חֶסֶד
  chosen: showed kindness
  alternatives:
  - did kindness
  - dealt kindly
  lexicon: HALOT
  rationale: English requires an idiomatic verbal expression for עשה + חסד. 'Showed
    kindness' is clear and corresponds well to the Hebrew sense.
- source_word: לְנַחֲמוֹ
  chosen: to comfort him
  alternatives:
  - to console him
  lexicon: HALOT
  rationale: The infinitive of נחם here denotes offering consolation after bereavement.
    'Comfort him' is standard, readable English.
- source_word: אֶל אָבִיו
  chosen: concerning his father
  alternatives:
  - about his father
  - because of his father
  - for his father
  lexicon: HALOT
  rationale: In context David sends comfort on account of the death of Hanun's father.
    'Concerning his father' preserves the relation without overparaphrasing; the sense
    is condolence regarding his father.
- source_word: בְּיַד עֲבָדָיו
  chosen: sent his servants
  alternatives:
  - sent by the hand of his servants
  - sent through his servants
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' indicates agency/instrumentality. In
    English, 'sent his servants' naturally conveys that David dispatched them as his
    agents.
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - the servants of David
  lexicon: HALOT
  rationale: Possessive form is natural modern English and preserves the genitive
    relation.
- source_word: אֶרֶץ בְּנֵי עַמּוֹן
  chosen: the land of the Ammonites
  alternatives:
  - the land of the sons of Ammon
  - the country of the Ammonites
  lexicon: HALOT
  rationale: '''Sons of Ammon'' is a literal ethnonym, but ''Ammonites'' is the standard
    and clear English equivalent for בני עמון in this narrative context.'
