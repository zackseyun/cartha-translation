id: 2SA.10.14
reference: 2 Samuel 10:14
source:
  edition: WLC
  text: וּ/בְנֵ֨י עַמּ֤וֹן רָאוּ֙ כִּי נָ֣ס אֲרָ֔ם וַ/יָּנֻ֨סוּ֙ מִ/פְּנֵ֣י אֲבִישַׁ֔י
    וַ/יָּבֹ֖אוּ הָ/עִ֑יר וַ/יָּ֣שָׁב יוֹאָ֗ב מֵ/עַל֙ בְּנֵ֣י עַמּ֔וֹן וַ/יָּבֹ֖א
    יְרוּשָׁלִָֽם־׃
translation:
  text: And when the sons of Ammon saw that Aram had fled, they fled before Abishai
    and entered the city. Then Joab returned from against the sons of Ammon and came
    to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Arameans'; Hebrew 'Aram.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from against the sons of Ammon' means Joab withdrew from fighting
      them.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' This keeps the Hebrew kinship expression visible
    while remaining natural English. 'Ammonites' is idiomatic, but the construct phrase
    is straightforward and worth preserving here.
- source_word: רָאוּ כִּי
  chosen: saw that
  alternatives:
  - saw when
  - realized that
  lexicon: HALOT
  rationale: 'The combination introduces what they perceived: they saw that Aram had
    fled. ''Realized that'' is possible dynamically, but ''saw that'' better preserves
    the Hebrew wording.'
- source_word: נָס
  chosen: had fled
  alternatives:
  - fled
  - was fleeing
  lexicon: HALOT
  rationale: 'The qatal after ''saw that'' is best rendered as prior action in English
    narrative sequence: they saw that Aram had fled.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is singular in form but collective/national in
    sense. 'Aram' preserves the source name better than the anachronistic 'Syria.'
    'The Arameans' is interpretive and possible, but the proper name is preferable.
- source_word: וַיָּנֻסוּ מִפְּנֵי אֲבִישַׁי
  chosen: they fled before Abishai
  alternatives:
  - they fled from before Abishai
  - they fled from Abishai
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before/from the presence of.' 'Before
    Abishai' is a concise biblical-English equivalent that preserves the military
    sense of retreat in his face.
- source_word: וַיָּבֹאוּ הָעִיר
  chosen: entered the city
  alternatives:
  - came into the city
  - went into the city
  lexicon: HALOT
  rationale: Idiomatic English for motion into a fortified urban center. The article
    is retained as 'the city,' likely their city/rabbinic capital in context.
- source_word: וַיָּשָׁב יוֹאָב
  chosen: Then Joab returned
  alternatives:
  - And Joab returned
  - So Joab turned back
  lexicon: HALOT
  rationale: שׁוּב here denotes returning. 'Then' helps English narrative flow after
    the enemy withdrawal.
- source_word: מֵעַל בְּנֵי עַמּוֹן
  chosen: from against the sons of Ammon
  alternatives:
  - from the sons of Ammon
  - away from the sons of Ammon
  lexicon: HALOT
  rationale: מֵעַל is more specific than simple 'from'; in military context it conveys
    withdrawing from engagement against them. 'From against' is slightly wooden but
    preserves that adversative nuance.
- source_word: וַיָּבֹא יְרוּשָׁלִָם
  chosen: came to Jerusalem
  alternatives:
  - went to Jerusalem
  - returned to Jerusalem
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. 'Came to Jerusalem'
    is a standard English rendering and matches the Hebrew without adding 'returned'
    a second time.
