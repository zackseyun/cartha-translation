id: 2SA.10.18
reference: 2 Samuel 10:18
source:
  edition: WLC
  text: וַ/יָּ֣נָס אֲרָם֮ מִ/פְּנֵ֣י יִשְׂרָאֵל֒ וַ/יַּהֲרֹ֨ג דָּוִ֜ד מֵ/אֲרָ֗ם שְׁבַ֤ע
    מֵאוֹת֙ רֶ֔כֶב וְ/אַרְבָּעִ֥ים אֶ֖לֶף פָּרָשִׁ֑ים וְ/אֵ֨ת שׁוֹבַ֧ךְ שַׂר צְבָא֛/וֹ
    הִכָּ֖ה וַ/יָּ֥מָת שָֽׁם־׃
translation:
  text: Aram fled from before Israel, and David killed seven hundred charioteers and
    forty thousand horsemen from Aram. He also struck down Shobach, the commander
    of their army, and he died there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seven hundred chariot/chariotry.' The exact referent may be the
      chariot force, hence 'charioteers.' 1 Chronicles 19:18 has 'seven thousand chariots.'
    reason: textual_variant
  - marker: b
    text: Or 'the commander of his army.' The Hebrew suffix is singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנָס אֲרָם מִפְּנֵי יִשְׂרָאֵל
  chosen: Aram fled from before Israel
  alternatives:
  - Aram fled before Israel
  - the Arameans fled from Israel
  lexicon: HALOT
  rationale: אֲרָם can denote the nation/people Aram or the Arameans. 'Aram' preserves
    the Hebrew proper-name form while still functioning collectively in English. מִפְּנֵי
    is literally 'from before,' an idiom for retreating in the face of an enemy; 'from
    before' is retained for transparency while remaining readable.
- source_word: וַיַּהֲרֹג דָּוִד
  chosen: David killed
  alternatives:
  - David struck down
  - David slew
  lexicon: HALOT
  rationale: הרג straightforwardly means 'kill/slay.' 'Killed' is clear modern English;
    'slew' is archaic, and 'struck down' is better reserved here for נכה later in
    the verse to preserve lexical distinction.
- source_word: שְׁבַע מֵאוֹת רֶכֶב
  chosen: seven hundred charioteers
  alternatives:
  - seven hundred chariots
  - seven hundred chariot teams
  lexicon: HALOT
  rationale: רֶכֶב literally means 'chariot/chariotry.' In battle casualty contexts,
    English often requires the human referent rather than the vehicle itself. Because
    the parallel in 1 Chronicles 19:18 reads 'seven thousand chariots,' this Samuel
    reading is difficult; but the Hebrew here most naturally points to a chariot force.
    'Charioteers' gives a sensible military referent without emending the text.
- source_word: וְאַרְבָּעִים אֶלֶף פָּרָשִׁים
  chosen: forty thousand horsemen
  alternatives:
  - forty thousand cavalrymen
  - forty thousand riders
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to horsemen/cavalry. 'Horsemen' is the most direct
    and idiomatic rendering.
- source_word: וְאֵת שׁוֹבַךְ
  chosen: Shobach
  alternatives:
  - Shobak
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Shobach'
    follows the Masoretic vocalization here.
- source_word: שַׂר צְבָאוֹ
  chosen: the commander of their army
  alternatives:
  - the commander of his army
  - the captain of his host
  lexicon: HALOT
  rationale: שַׂר is 'commander/official/prince'; in military context 'commander'
    fits best. צְבָא is 'army/host.' The suffix on צְבָאוֹ is singular ('his'), referring
    most immediately to the Aramean side under Hadadezer, but in English 'their army'
    reads naturally as the army of Aram just mentioned. The choice avoids awkward
    ambiguity while preserving the military sense.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - struck
  - defeated
  - killed
  lexicon: HALOT
  rationale: נכה has a broad range including strike, smite, defeat. Here, followed
    by 'and he died there,' it indicates a mortal blow. 'Struck down' preserves the
    verbal distinction from earlier 'killed' while fitting the context.
- source_word: וַיָּמָת שָׁם
  chosen: and he died there
  alternatives:
  - and he died on the spot
  - and he died there in battle
  lexicon: HALOT
  rationale: A simple, direct rendering of the clause. 'There' preserves שָׁם without
    adding interpretive detail.
