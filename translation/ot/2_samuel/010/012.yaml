id: 2SA.10.12
reference: 2 Samuel 10:12
source:
  edition: WLC
  text: חֲזַ֤ק וְ/נִתְחַזַּק֙ בְּעַד עַמֵּ֔/נוּ וּ/בְעַ֖ד עָרֵ֣י אֱלֹהֵ֑י/נוּ וַֽ/יהוָ֔ה יַעֲשֶׂ֥ה הַ/טּ֖וֹב בְּ/עֵינָֽי/ו־׃
translation:
  text: Be strong, and let us be strong for our people and for the cities of our God, and may Yahweh do what is good in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and let us be strong' or 'and let us strengthen ourselves.' The Hebrew verb is reflexive and carries the sense of showing strength or strengthening oneself.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the LORD will do what is good in his eyes.' The Hebrew form may be read as a simple future, though here it is rendered as a wish of submission to the LORD's will.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be courageous
  - Take courage
  lexicon: HALOT
  rationale: Qal imperative 2ms of חזק gives a direct exhortation to strength. 'Be strong' is the most straightforward rendering and pairs naturally with the following cohortative.
- source_word: וְנִתְחַזַּק
  chosen: and let us show ourselves strong
  alternatives:
  - and let us be strong
  - and let us strengthen ourselves
  lexicon: HALOT
  rationale: Hitpael cohortative 1cp of חזק is reflexive/inchoative. 'Let us show ourselves strong' preserves the reflexive nuance and the martial context better than the flatter 'let us be strong.'
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: HALOT
  rationale: In this military exhortation, בְּעַד expresses acting in defense of or for the benefit of. 'For' is concise and idiomatic, while still carrying the sense of fighting on behalf of.
- source_word: עַמֵּנוּ
  chosen: our people
  alternatives:
  - our army
  lexicon: HALOT
  rationale: The noun עם normally means 'people,' not specifically 'army.' The broader covenant-community sense fits the parallel with 'the cities of our God.'
- source_word: עָרֵי אֱלֹהֵינוּ
  chosen: the cities of our God
  alternatives:
  - our God's cities
  lexicon: HALOT
  rationale: A construct chain meaning 'the cities of our God.' The chosen wording is natural English and preserves the theological identification of the cities with Israel's God.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יַעֲשֶׂה הַטּוֹב בְּעֵינָיו
  chosen: may the LORD do what is good in his eyes
  alternatives:
  - and the LORD will do what is good in his eyes
  - and the LORD do what seems good to him
  lexicon: HALOT
  rationale: 'The yiqtol after the exhortation is well rendered as a jussive-like wish: ''may the LORD do...'' This fits the tone of entrusting the outcome to God. ''What is good in his eyes'' closely reflects the Hebrew idiom without over-paraphrasing.'
