id: 2SA.10.6
reference: 2 Samuel 10:6
source:
  edition: WLC
  text: וַ/יִּרְאוּ֙ בְּנֵ֣י עַמּ֔וֹן כִּ֥י נִבְאֲשׁ֖וּ בְּ/דָוִ֑ד וַ/יִּשְׁלְח֣וּ
    בְנֵֽי עַמּ֡וֹן וַ/יִּשְׂכְּרוּ֩ אֶת אֲרַ֨ם בֵּית רְח֜וֹב וְ/אֶת אֲרַ֣ם צוֹבָ֗א
    עֶשְׂרִ֥ים אֶ֨לֶף֙ רַגְלִ֔י וְ/אֶת מֶ֤לֶךְ מַֽעֲכָה֙ אֶ֣לֶף אִ֔ישׁ וְ/אִ֣ישׁ ט֔וֹב
    שְׁנֵים עָשָׂ֥ר אֶ֖לֶף אִֽישׁ־־־־־־׃
translation:
  text: When the sons of Ammon saw that they had become odious to David, the sons
    of Ammon sent and hired the Arameans of Beth-rehob and the Arameans of Zobah,
    twenty thousand foot soldiers, and the king of Maacah with one thousand men, and
    the men of Tob, twelve thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'they had become a stench to David.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria/Syrians.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'Ish-tob,' taken as a place or clan name; here rendered 'the
      men of Tob.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: The verb ראה literally means 'see,' and in narrative introduction 'saw
    that' naturally carries the sense of recognizing a situation. 'Saw' preserves
    the Hebrew idiom while remaining clear in English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression 'sons of Ammon.'
    Although 'Ammonites' is idiomatic English, the construct phrase is transparent
    and readable here.
- source_word: נִבְאֲשׁוּ בְּדָוִד
  chosen: had become odious to David
  alternatives:
  - had become a stench to David
  - had become hateful to David
  lexicon: HALOT
  rationale: The verb באשׁ literally evokes a bad smell and idiomatically means to
    become offensive or odious in someone's eyes. 'Had become odious to David' communicates
    the idiomatic force without flattening it into mere dislike. The more literal
    'become a stench' is viable but less natural in contemporary English.
- source_word: וַיִּשְׁלְחוּ
  chosen: sent
  alternatives:
  - sent messengers
  - dispatched
  lexicon: HALOT
  rationale: The object of 'sent' is not explicit in Hebrew before the following hiring
    action. A simple 'sent' best reflects the text without adding 'messengers' unnecessarily.
- source_word: וַיִּשְׂכְּרוּ
  chosen: hired
  alternatives:
  - hired as mercenaries
  - paid for
  lexicon: HALOT
  rationale: The verb שׂכר here refers to hiring military support. 'Hired' is concise
    and accurate; the mercenary sense is clear from context without expansion in the
    main text.
- source_word: אֲרַם בֵּית רְחוֹב
  chosen: the Arameans of Beth-rehob
  alternatives:
  - Aram-beth-rehob
  - the Syrians of Beth-rehob
  lexicon: HALOT
  rationale: אֲרַם refers to Aram/Arameans. 'Arameans' is preferred over the traditional
    but historically later 'Syrians.' The place name is transliterated as Beth-rehob
    in keeping with the policy to transliterate names.
- source_word: אֲרַם צוֹבָא
  chosen: the Arameans of Zobah
  alternatives:
  - Aram-zobah
  - the Syrians of Zobah
  lexicon: HALOT
  rationale: As above, 'Arameans' reflects the Hebrew ethnonym more directly than
    'Syrians,' and 'Zobah' is transliterated as a place name.
- source_word: עֶשְׂרִים אֶלֶף רַגְלִי
  chosen: twenty thousand foot soldiers
  alternatives:
  - twenty thousand infantry
  - twenty thousand on foot
  lexicon: HALOT
  rationale: רַגְלִי denotes foot troops. 'Foot soldiers' is natural modern English
    and preserves the military distinction.
- source_word: מֶלֶךְ מַעֲכָה
  chosen: the king of Maacah
  alternatives:
  - the king Maacah
  lexicon: HALOT
  rationale: The construct phrase clearly means the ruler of the region Maacah, not
    a personal name in apposition.
- source_word: אֶלֶף אִישׁ
  chosen: one thousand men
  alternatives:
  - a thousand men
  lexicon: HALOT
  rationale: This is a straightforward numerical expression. 'One thousand men' is
    slightly more formal and matches the military census style of the verse.
- source_word: אִישׁ טוֹב
  chosen: the men of Tob
  alternatives:
  - Ish-tob
  - the man/men of Tob
  lexicon: HALOT
  rationale: The phrase is best taken as a gentilic/toponymic expression referring
    to the people of Tob, as reflected by the parallel in 1 Chronicles 19:6 and many
    modern translations. Rendering it as the proper name 'Ish-tob' is possible from
    the consonants, but context favors a place designation with its fighting men.
- source_word: שְׁנֵים עָשָׂר אֶלֶף אִישׁ
  chosen: twelve thousand men
  alternatives:
  - twelve thousand troops
  lexicon: HALOT
  rationale: A direct rendering preserves the Hebrew count and military register.
