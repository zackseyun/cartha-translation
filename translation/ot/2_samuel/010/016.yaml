id: 2SA.10.16
reference: 2 Samuel 10:16
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח הֲדַדְעֶ֗זֶר וַ/יֹּצֵ֤א אֶת אֲרָם֙ אֲשֶׁר֙ מֵ/עֵ֣בֶר הַ/נָּהָ֔ר
    וַ/יָּבֹ֖אוּ חֵילָ֑ם וְ/שׁוֹבַ֛ךְ שַׂר צְבָ֥א הֲדַדְעֶ֖זֶר לִ/פְנֵי/הֶֽם־־׃
translation:
  text: Hadadezer sent and brought out the Arameans who were from beyond the River,
    and they came to Helam, with Shobak the commander of Hadadezer’s army before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, from beyond the Euphrates River.
    reason: cultural_note
  - marker: b
    text: Or 'Shobach,' a common alternative transliteration of the name.
    reason: lexical_alternative
  - marker: c
    text: '''Before them'' likely means he was leading them or at their head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Basic sense of שלח in the waw-consecutive narrative is 'sent.' 'Dispatched'
    is possible but less natural here.
- source_word: וַיֹּצֵא אֶת אֲרָם
  chosen: brought out the Arameans
  alternatives:
  - led out the Arameans
  - mustered the Arameans
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means 'bring out' or 'lead out.' Here Hadadezer
    causes the Aramean forces from beyond the River to come forth for battle. 'Brought
    out' preserves the causative force better than a looser military paraphrase.
- source_word: אֲרָם
  chosen: the Arameans
  alternatives:
  - Aram
  - the Syrians
  lexicon: HALOT
  rationale: In this context the ethnogeographic term refers to the Aramean forces/people,
    not merely the territory. 'Arameans' is preferred over traditional 'Syrians' because
    it more directly reflects the Hebrew and avoids anachronistic associations.
- source_word: מֵעֵבֶר הַנָּהָר
  chosen: from beyond the River
  alternatives:
  - from across the River
  - from beyond the Euphrates
  lexicon: HALOT
  rationale: Literally 'from beyond the River.' In context this likely refers to the
    Euphrates, but the Hebrew text itself says 'the River,' so the main text preserves
    that wording. The more explicit identification is suitable for a footnote.
- source_word: וַיָּבֹאוּ חֵילָם
  chosen: they came to Helam
  alternatives:
  - they came to Hilam
  lexicon: HALOT
  rationale: The place name is best transliterated. English convention more often
    gives 'Helam.'
- source_word: וְשׁוֹבַךְ
  chosen: Shobak
  alternatives:
  - Shobach
  lexicon: HALOT
  rationale: The consonantal form supports 'Shobak,' though many English versions
    use 'Shobach.' A footnote preserves the familiar alternative transliteration.
- source_word: שַׂר צְבָא
  chosen: the commander of ... army
  alternatives:
  - the captain of ... host
  - the commander of the forces of
  lexicon: HALOT
  rationale: The construct phrase denotes military leadership. 'Commander of the army'
    is clear modern English and preserves the military sense.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - at their head
  - leading them
  lexicon: HALOT
  rationale: Literally 'before them.' In military context it implies leadership or
    position at the front, but the more literal wording is retained in the main text.
