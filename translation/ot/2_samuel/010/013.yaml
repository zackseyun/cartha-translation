id: 2SA.10.13
reference: 2 Samuel 10:13
source:
  edition: WLC
  text: וַ/יִּגַּ֣שׁ יוֹאָ֗ב וְ/הָ/עָם֙ אֲשֶׁ֣ר עִמּ֔/וֹ לַ/מִּלְחָמָ֖ה בַּֽ/אֲרָ֑ם
    וַ/יָּנֻ֖סוּ מִ/פָּנָֽי/ו׃
translation:
  text: Then Joab and the people who were with him advanced to battle against Aram,
    and they fled before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; that is, the Aramean forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: advanced
  alternatives:
  - drew near
  - approached
  lexicon: HALOT
  rationale: The verb נגשׁ literally means 'draw near/approach,' but in a military
    context with לַמִּלְחָמָה ('for battle') it idiomatically conveys moving forward
    to engage in combat. 'Advanced' preserves the martial sense in natural English
    better than the more wooden 'drew near.'
- source_word: וְהָעָם אֲשֶׁר עִמּוֹ
  chosen: and the people who were with him
  alternatives:
  - and the troops with him
  - and the army with him
  lexicon: HALOT
  rationale: עָם is literally 'people.' In context it refers to Joab's fighting force,
    but 'the people who were with him' stays closer to the Hebrew while remaining
    clear. More specific military terms are possible but slightly more interpretive.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - for battle
  - to the battle
  lexicon: HALOT
  rationale: The prefixed preposition plus 'battle/war' expresses purpose or movement
    toward combat. 'To battle' is concise, idiomatic, and preserves the sense of engagement.
- source_word: בַּאֲרָם
  chosen: against Aram
  alternatives:
  - against the Arameans
  - with Aram
  lexicon: HALOT
  rationale: Although the form is singular proper noun 'Aram,' in military context
    it denotes the Aramean forces. 'Against Aram' preserves the Hebrew name directly
    and is standard English for conflict with a people or kingdom. 'Against the Arameans'
    is a valid contextual expansion but less formally aligned.
- source_word: וַיָּנֻסוּ
  chosen: they fled
  alternatives:
  - they ran away
  - they retreated
  lexicon: HALOT
  rationale: נוּס means 'flee.' 'They fled' is the most direct and appropriately forceful
    rendering. 'Retreated' could imply an orderly withdrawal not present in the verb
    itself.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - from before him
  - from his presence
  lexicon: HALOT
  rationale: The idiom 'flee from before someone' means to flee before or before the
    face of that person. 'Before him' is natural English and preserves the idiomatic
    force. The singular suffix refers to Joab as the lead subject.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
