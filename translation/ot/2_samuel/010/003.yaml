theological_decisions:
- issue: Royal-political suspicion rather than actual theological claim
  chosen_reading: Render the princes' accusation straightforwardly as a rhetorical
    question without implying their assessment is true.
  alternative_readings:
  - A more assertive rendering that treats the accusation as factual
  rationale: The Hebrew presents the words of Hanun's advisers, not narrator endorsement.
    The English preserves their suspicion through rhetorical questions.
  doctrine_reference: 'Translation philosophy §3: preserve tension rather than resolve
    it'
