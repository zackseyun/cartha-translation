id: 2SA.10.3
reference: 2 Samuel 10:3
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ שָׂרֵ֨י בְנֵֽי עַמּ֜וֹן אֶל חָנ֣וּן אֲדֹֽנֵי/הֶ֗ם הַֽ/מְכַבֵּ֨ד
    דָּוִ֤ד אֶת אָבִ֨י/ךָ֙ בְּ/עֵינֶ֔י/ךָ כִּֽי שָׁלַ֥ח לְ/ךָ֖ מְנַֽחֲמִ֑ים הֲ֠/לוֹא
    בַּ/עֲב֞וּר חֲק֤וֹר אֶת הָ/עִיר֙ וּ/לְ/רַגְּלָ֣/הּ וּ/לְ/הָפְכָ֔/הּ שָׁלַ֥ח דָּוִ֛ד
    אֶת עֲבָדָ֖י/ו אֵלֶֽי/ךָ־־־־־־׃
translation:
  text: And the princes of the Ammonites said to Hanun their lord, “Is David honoring
    your father in your sight because he has sent comforters to you? Has not David
    sent his servants to you in order to search the city, to spy it out, and to overthrow
    it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your eyes.'
    reason: lexical_alternative
  - marker: b
    text: '''Comforters'' refers to envoys sent to console Hanun after his father''s
      death.'
    reason: cultural_note
  - marker: c
    text: Or 'to investigate the city, to spy it out, and to overturn it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי בְנֵי עַמּוֹן
  chosen: the princes of the Ammonites
  alternatives:
  - the officials of the Ammonites
  - the leaders of the Ammonites
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes, officials, or leaders. 'Princes' preserves
    the courtly-political setting and matches the relation to Hanun as kingly ruler.
- source_word: אֲדֹנֵיהֶם
  chosen: their lord
  alternatives:
  - their master
  lexicon: HALOT
  rationale: אדון here is a human title of authority, not a divine title. 'Their lord'
    fits royal address in context and preserves the hierarchical nuance.
- source_word: הַמְכַבֵּד
  chosen: honoring
  alternatives:
  - showing honor to
  - glorifying
  lexicon: HALOT
  rationale: The participle from כבד here concerns showing honor or respect, not glorification
    in a theological sense. 'Honoring' is natural and sufficiently formal.
- source_word: בְּעֵינֶיךָ
  chosen: in your sight
  alternatives:
  - in your eyes
  - in your estimation
  lexicon: HALOT
  rationale: The idiom literally means 'in your eyes.' 'In your sight' preserves the
    metaphor while reading naturally in English.
- source_word: מְנַחֲמִים
  chosen: comforters
  alternatives:
  - consolers
  - those who comfort
  lexicon: HALOT
  rationale: The messengers were sent to console Hanun after his father's death (v.
    2). 'Comforters' is concise and reflects the participial form.
- source_word: הֲלוֹא
  chosen: Has not
  alternatives:
  - Is it not the case that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Has not' captures
    the adversarial suspicion voiced by the princes.
- source_word: בַּעֲבוּר
  chosen: in order to
  alternatives:
  - for the sake of
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose here. 'In order to' is clear modern English and fits the
    sequence of infinitives.
- source_word: חֲקוֹר
  chosen: search
  alternatives:
  - investigate
  - explore
  lexicon: HALOT
  rationale: The infinitive from חקר conveys examining or searching out. 'Search'
    is direct and works well with the military suspicion in context.
- source_word: וּלְרַגְּלָהּ
  chosen: to spy it out
  alternatives:
  - to scout it
  - to reconnoiter it
  lexicon: HALOT
  rationale: From רגל in the Piel, the sense is to spy out or scout. The suffix refers
    back to 'the city'; English supplies 'it' naturally.
- source_word: וּלְהָפְכָהּ
  chosen: to overthrow it
  alternatives:
  - to overturn it
  - to destroy it
  lexicon: HALOT
  rationale: הפך can mean overturn or overthrow. In a hostile military context, 'overthrow
    it' best captures intended subjugation without over-paraphrasing.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his men
  lexicon: HALOT
  rationale: עבד here refers to David's royal envoys/servants. 'Servants' is the default,
    and unlike Greek doulos there is no doctrinally contested term here requiring
    stronger bonded-language.
