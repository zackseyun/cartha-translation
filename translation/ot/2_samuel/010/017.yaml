id: 2SA.10.17
reference: 2 Samuel 10:17
source:
  edition: WLC
  text: וַ/יֻּגַּ֣ד לְ/דָוִ֗ד וַ/יֶּאֱסֹ֤ף אֶת כָּל יִשְׂרָאֵל֙ וַ/יַּעֲבֹ֣ר אֶת הַ/יַּרְדֵּ֔ן
    וַ/יָּבֹ֖א חֵלָ֑אמָ/ה וַ/יַּעַרְכ֤וּ אֲרָם֙ לִ/קְרַ֣את דָּוִ֔ד וַ/יִּלָּחֲמ֖וּ
    עִמּֽ/וֹס־־־׃
translation:
  text: When it was reported to David, he gathered all Israel, crossed the Jordan,
    and came to Helam. Then Aram drew up in battle formation to meet David and fought
    with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and fought against him.' The Hebrew literally says 'fought with him,'
      an idiom for engaging in battle with an opponent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד לְדָוִד
  chosen: When it was reported to David
  alternatives:
  - And it was told to David
  - When David was told
  lexicon: HALOT
  rationale: The passive wayyiqtol of נגד introduces the report without specifying
    the messenger. 'It was reported to David' preserves the impersonal passive sense
    while reading naturally in English. 'When' captures the narrative linkage implied
    by the initial waw better than a bare 'and' in modern English.
- source_word: וַיֶּאֱסֹף אֶת כָּל יִשְׂרָאֵל
  chosen: he gathered all Israel
  alternatives:
  - he assembled all Israel
  lexicon: HALOT
  rationale: אָסַף commonly means gather or assemble. 'Gathered all Israel' is a standard
    idiom for mustering the national fighting force or representatives, and preserves
    the broad collective sense without over-specifying 'army' where the Hebrew says
    'Israel'.
- source_word: וַיַּעֲבֹר אֶת הַיַּרְדֵּן
  chosen: crossed the Jordan
  alternatives:
  - crossed over the Jordan
  lexicon: HALOT
  rationale: עָבַר with the direct object marker and 'the Jordan' means to cross the
    river. English idiom prefers 'crossed the Jordan'; adding 'over' is possible but
    unnecessary.
- source_word: וַיָּבֹא חֵלָמָה
  chosen: and came to Helam
  alternatives:
  - and came toward Helam
  - and entered Helam
  lexicon: HALOT
  rationale: The directional he on חֵלָמָה indicates motion toward the place. In idiomatic
    English, 'came to Helam' best conveys arrival at that location.
- source_word: וַיַּעַרְכוּ אֲרָם
  chosen: Then Aram drew up in battle formation
  alternatives:
  - the Arameans arrayed themselves
  - Aram lined up for battle
  lexicon: HALOT
  rationale: עָרַךְ in military context means to arrange or deploy for battle. Although
    the singular collective 'Aram' is the Hebrew form, English can retain it as a
    national collective. 'Drew up in battle formation' makes the military sense explicit
    without adding content beyond the verb's contextual force.
- source_word: לִקְרַאת דָּוִד
  chosen: to meet David
  alternatives:
  - against David
  - to confront David
  lexicon: HALOT
  rationale: לִקְרַאת literally means 'to meet/toward meeting.' In this battle context
    it implies hostile encounter, but 'to meet David' is sufficiently clear and closer
    to the Hebrew than the more interpretive 'against David.'
- source_word: וַיִּלָּחֲמוּ עִמּוֹ
  chosen: and fought with him
  alternatives:
  - and fought against him
  - and engaged him in battle
  lexicon: HALOT
  rationale: The Niphal/related war verb with עִם can be rendered 'fight with' in
    the sense of fighting against someone in biblical narrative. Because modern English
    can hear 'with' as alliance, the hostile context from the previous clause clarifies
    the meaning, but the rendering remains close to the Hebrew construction.
