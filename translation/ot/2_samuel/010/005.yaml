id: 2SA.10.5
reference: 2 Samuel 10:5
source:
  edition: WLC
  text: וַ/יַּגִּ֤דוּ לְ/דָוִד֙ וַ/יִּשְׁלַ֣ח לִ/קְרָאתָ֔/ם כִּֽי הָי֥וּ הָ/אֲנָשִׁ֖ים
    נִכְלָמִ֣ים מְאֹ֑ד וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ שְׁב֣וּ בִֽ/ירֵח֔וֹ עַד יְצַמַּ֥ח
    זְקַנְ/כֶ֖ם וְ/שַׁבְתֶּֽם־־׃
translation:
  text: When they told David, he sent to meet them, for the men were greatly humiliated.
    And the king said, “Stay at Jericho until your beards have grown, and then return.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deeply ashamed' or 'very disgraced.' The Hebrew term emphasizes being
      publicly shamed or humiliated.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he sent to meet them'; the text implies that David sent representatives,
      but does not explicitly say 'messengers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: they told
  alternatives:
  - they reported
  - they informed
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell/report. The subject is indefinite
    in Hebrew, so English 'they told' is natural and sufficiently literal.
- source_word: לְדָוִד
  chosen: David
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention per translation
    philosophy.
- source_word: וַיִּשְׁלַח לִקְרָאתָם
  chosen: he sent to meet them
  alternatives:
  - he sent messengers to meet them
  - he sent for them
  lexicon: HALOT
  rationale: The idiom 'send to meet' conveys dispatching someone/something in response
    to them. 'He sent to meet them' preserves the Hebrew construction without over-specifying
    'messengers,' which is implied but not explicit.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for David's action. 'For' fits the narrative register
    and preserves the causal force.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the men involved
  - those men
  lexicon: HALOT
  rationale: Definite noun referring to David's servants who had been shamed. 'The
    men' is the plain sense.
- source_word: נִכְלָמִים מְאֹד
  chosen: greatly humiliated
  alternatives:
  - deeply ashamed
  - very disgraced
  lexicon: HALOT
  rationale: The Niphal participle of כלם denotes being humiliated/put to shame. 'Greatly
    humiliated' captures both the passive sense and the intensity of מְאֹד.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: And the king said
  alternatives:
  - Then the king said
  lexicon: HALOT
  rationale: Retains the narrative sequence and the explicit title הַמֶּלֶךְ, which
    in context refers to David.
- source_word: שְׁבוּ
  chosen: Stay
  alternatives:
  - Remain
  - Sit
  lexicon: HALOT
  rationale: Imperative of ישׁב in this context means to remain/dwell temporarily.
    'Stay' is idiomatic modern English.
- source_word: בִּירֵחוֹ
  chosen: at Jericho
  alternatives:
  - in Jericho
  lexicon: HALOT
  rationale: With a city name, English may use either 'in' or 'at.' 'At Jericho' suits
    the temporary lodging sense and reads naturally.
- source_word: עַד יְצַמַּח זְקַנְכֶם
  chosen: until your beards have grown
  alternatives:
  - until your beard grows back
  - until your beards grow
  lexicon: HALOT
  rationale: צמח means to sprout/grow. The plural addressees take 'your beards.' The
    perfect-like English 'have grown' fits the sense of waiting until regrowth is
    sufficient.
- source_word: וְשַׁבְתֶּם
  chosen: and then return
  alternatives:
  - and return
  - then come back
  lexicon: HALOT
  rationale: שׁוב means return. Adding 'then' makes the temporal sequence explicit
    in natural English, though it is implied by the Hebrew conjunction after 'until'.
