id: 2SA.10.8
reference: 2 Samuel 10:8
source:
  edition: WLC
  text: וַ/יֵּֽצְאוּ֙ בְּנֵ֣י עַמּ֔וֹן וַ/יַּעַרְכ֥וּ מִלְחָמָ֖ה פֶּ֣תַח הַ/שָּׁ֑עַר
    וַ/אֲרַ֨ם צוֹבָ֤א וּ/רְחוֹב֙ וְ/אִֽישׁ ט֣וֹב וּ/מַֽעֲכָ֔ה לְ/בַדָּ֖/ם בַּ/שָּׂדֶֽה־׃
translation:
  text: Then the sons of Ammon came out and drew up for battle at the entrance of
    the gate, while Aram of Zobah and Rehob and the men of Tob and Maacah were by
    themselves in the open field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites came out.' The Hebrew reads 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the Arameans of Zobah and Rehob and the men of Ish-tob and Maacah.'
      The Hebrew אִישׁ טוֹב may be rendered 'men of Tob' or understood as the place-name
      'Ish-tob.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא in narrative commonly means 'go out/come out.' 'Came out'
    fits the military scene from the city toward the battlefield from the narrator's
    perspective and is idiomatic in English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew ethnonym construction.
    'Ammonites' is idiomatic but less literal; here 'sons of Ammon' remains natural
    enough and keeps the source texture.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  chosen: drew up for battle
  alternatives:
  - arrayed themselves for battle
  - set the battle line
  lexicon: HALOT
  rationale: ערך with מלחמה is a military idiom for arranging forces in battle formation.
    'Drew up for battle' is clear modern English and preserves the tactical sense
    better than the more wooden 'arranged battle.'
- source_word: פֶּתַח הַשָּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - at the opening of the gate
  - at the gate entrance
  lexicon: HALOT
  rationale: פתח denotes an opening/entrance. 'At the entrance of the gate' communicates
    the location precisely, likely the city gate area where the Ammonites positioned
    themselves.
- source_word: וַאֲרַם צוֹבָא
  chosen: while Aram of Zobah
  alternatives:
  - and the Arameans of Zobah
  - and Syria of Zobah
  lexicon: HALOT
  rationale: אֲרַם refers to Aram/Arameans. Following the philosophy to transliterate
    names rather than use traditional but potentially misleading 'Syria,' 'Aram of
    Zobah' is preferred. The conjunction is rendered 'while' to clarify the contrast
    between two positioned forces in the verse.
- source_word: וּרְחוֹב
  chosen: and Rehob
  alternatives: []
  lexicon: HALOT
  rationale: A place-name, so transliterated straightforwardly.
- source_word: וְאִישׁ טוֹב
  chosen: and the men of Tob
  alternatives:
  - and Ish-tob
  - and the men of Ishtob
  lexicon: HALOT
  rationale: Although the consonants can be read literally as 'man/men of Tob,' many
    translations treat this as the place-name Ish-tob. The morphology presents אִישׁ
    plus the proper noun טוֹב, and the sense is a contingent from Tob. 'The men of
    Tob' is the clearest English rendering of the underlying Hebrew while preserving
    the likely geographical reference.
- source_word: וּמַעֲכָה
  chosen: and Maacah
  alternatives: []
  lexicon: HALOT
  rationale: A proper place-name, transliterated.
- source_word: לְבַדָּם
  chosen: were by themselves
  alternatives:
  - were alone
  - were separate
  lexicon: HALOT
  rationale: The adverbial expression indicates separation from the Ammonite force.
    'Were by themselves' naturally conveys that these allied troops were stationed
    apart.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  lexicon: HALOT
  rationale: שָׂדֶה is 'field/open country.' 'Open field' better captures the military
    contrast with the city gate and explains the tactical separation.
