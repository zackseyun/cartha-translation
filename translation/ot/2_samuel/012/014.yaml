id: 2SA.12.14
reference: 2 Samuel 12:14
source:
  edition: WLC
  text: אֶ֗פֶס כִּֽי נִאֵ֤ץ נִאַ֨צְתָּ֙ אֶת אֹיְבֵ֣י יְהוָ֔ה בַּ/דָּבָ֖ר הַ/זֶּ֑ה גַּ֗ם הַ/בֵּ֛ן הַ/יִּלּ֥וֹד לְ/ךָ֖ מ֥וֹת יָמֽוּת־־׃
translation:
  text: Nevertheless, because by this matter you have utterly despised Yahweh, the son born to you will surely die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Many translations render this clause, 'you have given the enemies of the LORD occasion to scorn' or 'to blaspheme,' following an interpretive or emended reading of the difficult Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶפֶס
  chosen: Nevertheless
  alternatives:
  - However
  - But
  lexicon: HALOT
  rationale: Introduces a strong adversative qualification after the prior declaration of forgiveness; 'Nevertheless' captures the concessive force more fully than a simple 'but.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here it introduces the reason for the announced consequence; 'because' is the clearest modern English causal connector.
- source_word: נִאֵץ נִאַצְתָּ
  chosen: you have utterly scorned
  alternatives:
  - you have greatly despised
  - you have shown utter contempt
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. 'Utterly scorned' preserves both the contempt sense of נאץ and the emphatic construction without sounding archaic.
- source_word: אֶת אֹיְבֵי יְהוָה
  chosen: the enemies of the LORD
  alternatives:
  - the LORD's enemies
  lexicon: HALOT
  rationale: The direct object marker plus construct phrase is most naturally rendered as the object of David's action in the MT. The phrase is translated straightforwardly, and יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּדָּבָר הַזֶּה
  chosen: by this matter
  alternatives:
  - by this deed
  - in this thing
  lexicon: HALOT
  rationale: דבר here refers to the affair or deed under discussion. 'Matter' is broad enough to include the whole incident while remaining natural English.
- source_word: גַּם
  chosen: the son
  alternatives:
  - also the son
  - indeed the son
  lexicon: HALOT
  rationale: The particle marks addition or emphasis linking the consequence to the prior clause. In idiomatic English the force is sufficiently conveyed by the sentence structure without requiring an explicit 'also,' which would sound awkward here.
- source_word: הַבֵּן הַיִּלּוֹד לְךָ
  chosen: the son born to you
  alternatives:
  - the child born to you
  - the son who has been born to you
  lexicon: HALOT
  rationale: בן specifically means 'son,' so the gendered term should be preserved. The passive participle yields 'born to you' naturally in English.
- source_word: מוֹת יָמוּת
  chosen: will surely die
  alternatives:
  - shall surely die
  - will certainly die
  lexicon: HALOT
  rationale: The infinitive absolute with imperfect expresses emphatic certainty. 'Will surely die' is a standard and clear way to preserve the force in modern English.
