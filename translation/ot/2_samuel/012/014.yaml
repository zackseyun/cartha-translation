theological_decisions:
- issue: Syntactical subject/object in the clause involving 'the enemies of the LORD'
  chosen_reading: 'MT-based reading: David''s action has scorned ''the enemies of the LORD.'''
  alternative_readings:
  - 'Emended/tradition-based reading: David has given ''the enemies of the LORD'' occasion to scorn or blaspheme'
  rationale: The consonantal MT as provided most directly reads 'you have utterly scorned the enemies of the LORD.' Many translations adopt an emended or interpretive reading to avoid the difficulty and produce the sense that David caused the LORD's enemies to blaspheme. Following original-language primacy, the draft keeps the plain MT reading in the main text while preserving the common alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3
