theological_decisions:
- issue: Meaning of רָעָה in divine judgment
  chosen_reading: disaster/calamity, not moral evil
  alternative_readings:
  - evil
  rationale: In this judicial context, the term refers to harmful judgment that God
    brings upon David, not to God committing moral evil. The English rendering should
    preserve divine sovereignty in judgment without suggesting moral wrongdoing by
    God.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension without importing doctrinal claims the text does not make.'
