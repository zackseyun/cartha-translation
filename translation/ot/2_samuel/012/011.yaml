id: 2SA.12.11
reference: 2 Samuel 12:11
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה הִנְ/נִי֩ מֵקִ֨ים עָלֶ֤י/ךָ רָעָה֙ מִ/בֵּיתֶ֔/ךָ וְ/לָקַחְתִּ֤י
    אֶת נָשֶׁ֨י/ךָ֙ לְ/עֵינֶ֔י/ךָ וְ/נָתַתִּ֖י לְ/רֵעֶ֑י/ךָ וְ/שָׁכַב֙ עִם נָשֶׁ֔י/ךָ
    לְ/עֵינֵ֖י הַ/שֶּׁ֥מֶשׁ הַ/זֹּֽאת׀־־׃
translation:
  text: 'Thus says the LORD: Behold, I am raising up disaster against you from your
    own house, and I will take your wives before your eyes and give them to your companion,
    and he will lie with your wives in the sight of this sun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'neighbor.' The Hebrew רֵעַ can mean 'neighbor,' 'companion,' or 'associate.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the sight of this sun,' that is, openly and publicly.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and standard English Bible usage.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal
    declarative force without sounding archaic beyond normal biblical register.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Retains the attention-marking force of the particle while flowing naturally
    into the participial construction that follows.
- source_word: מֵקִים ... רָעָה
  chosen: am raising up disaster
  alternatives:
  - am bringing evil
  - am stirring up calamity
  lexicon: HALOT
  rationale: רָעָה here denotes calamity/disaster rather than moral evil. 'Raising
    up' reflects מֵקִים more closely than a looser 'bringing,' while 'disaster' avoids
    implying that God is producing moral wickedness.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: In context the preposition marks hostile direction; 'against you' communicates
    the judicial sense more clearly in modern English.
- source_word: מִבֵּיתֶךָ
  chosen: from your own house
  alternatives:
  - from your house
  - out of your household
  lexicon: HALOT
  rationale: '''House'' in this context refers to David''s own household/family sphere.
    ''Your own house'' makes explicit the internal source of the coming judgment while
    preserving the household language.'
- source_word: וְלָקַחְתִּי אֶת נָשֶׁיךָ
  chosen: I will take your wives
  alternatives:
  - I will seize your wives
  lexicon: HALOT
  rationale: A straightforward future rendering of the waw-consecutive perfect in
    prophetic speech. 'Take' is sufficiently direct and matches the Hebrew verb without
    over-intensifying.
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A vivid idiom meaning openly and within David's awareness; 'before your
    eyes' preserves the concrete imagery.
- source_word: לְרֵעֶיךָ
  chosen: to your companion
  alternatives:
  - to your neighbor
  - to one close to you
  lexicon: HALOT
  rationale: רֵעַ can mean companion, associate, or neighbor. Here the referent is
    a specific close associate within David's sphere (fulfilled in Absalom), so 'companion'
    better fits than the more generic 'neighbor'.
- source_word: וְשָׁכַב עִם
  chosen: he will lie with
  alternatives:
  - he will sleep with
  lexicon: HALOT
  rationale: This is a sexual euphemism in Hebrew. 'Lie with' preserves the source
    idiom and gravity better than the more colloquial 'sleep with.'
- source_word: לְעֵינֵי הַשֶּׁמֶשׁ הַזֹּאת
  chosen: in the sight of this sun
  alternatives:
  - in broad daylight
  - before this sun
  lexicon: HALOT
  rationale: The Hebrew is strikingly concrete, emphasizing public exposure under
    the visible sun. 'In the sight of this sun' preserves that imagery more closely
    than the idiomatic but less literal 'in broad daylight.'
