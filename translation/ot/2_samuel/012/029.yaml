id: 2SA.12.29
reference: 2 Samuel 12:29
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֥ף דָּוִ֛ד אֶת כָּל הָ/עָ֖ם וַ/יֵּ֣לֶךְ רַבָּ֑תָ/ה וַ/יִּלָּ֥חֶם
    בָּ֖/הּ וַֽ/יִּלְכְּדָֽ/הּ־־׃
translation:
  text: Then David gathered all the people and went to Rabbah and fought against it
    and captured it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the army' or 'all the troops'; Hebrew literally, 'all the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: The verb אסף in this narrative context means to bring people together.
    'Gathered' is natural modern English and preserves the basic sense without over-specifying
    military organization. 'Mustered' is possible given the war setting, but the Hebrew
    itself does not explicitly state a formal troop review.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the army
  - all the troops
  lexicon: HALOT
  rationale: The phrase literally reads 'all the people.' In this context it likely
    refers to the fighting force under David, but the Hebrew uses עָם, not a more
    specific military term. To preserve source-language wording and avoid importing
    a narrower sense, the main text keeps 'all the people.'
- source_word: רַבָּתָה
  chosen: to Rabbah
  alternatives:
  - to Rabbath
  lexicon: HALOT
  rationale: This is the place name Rabbah with directional he, indicating motion
    toward the city. Standard English transliteration is 'Rabbah,' and 'to Rabbah'
    captures the directional force.
- source_word: וַיִּלָּחֶם בָּהּ
  chosen: fought against it
  alternatives:
  - fought against her
  - made war against it
  lexicon: HALOT
  rationale: The verb לחם with ב marks engaging in battle against the city. English
    idiom prefers 'fought against it' for a city. Although the pronominal suffix is
    grammatically feminine in Hebrew, English normally refers to cities as 'it' rather
    than 'her.'
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially a city in warfare.
    'Captured it' is clear, idiomatic, and suitably precise in a military narrative.
