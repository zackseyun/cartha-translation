id: 2SA.12.7
reference: 2 Samuel 12:7
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר נָתָ֛ן אֶל דָּוִ֖ד אַתָּ֣ה הָ/אִ֑ישׁ כֹּה אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י
    יִשְׂרָאֵ֗ל אָנֹכִ֞י מְשַׁחְתִּ֤י/ךָֽ לְ/מֶ֨לֶךְ֙ עַל יִשְׂרָאֵ֔ל וְ/אָנֹכִ֥י
    הִצַּלְתִּ֖י/ךָ מִ/יַּ֥ד שָׁאֽוּל־־־׃
translation:
  text: 'Then Nathan said to David, “You are the man! Thus says the LORD, the God
    of Israel: I anointed you king over Israel, and I delivered you from the hand
    of Saul.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You are that man!' The Hebrew literally reads, 'You are the man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    here.
- source_word: אַתָּה הָאִישׁ
  chosen: You are the man!
  alternatives:
  - You are that man!
  - You are the האיש/man
  lexicon: HALOT
  rationale: The verbless clause is emphatic and climactic after Nathan's parable.
    'You are the man!' is the most natural and forceful English equivalent. 'That
    man' is interpretive and not required by the Hebrew article.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register without sounding overly archaic in this context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'The God of Israel' preserves
    the covenantal title in standard English form.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, especially with repeated אָנֹכִי/וְאָנֹכִי.
    English can convey this adequately with explicit 'I' in both clauses without overemphasis.
- source_word: מְשַׁחְתִּיךָ
  chosen: I anointed you
  alternatives:
  - I consecrated you
  lexicon: HALOT
  rationale: משׁח in royal context refers to anointing for office. 'Anointed' preserves
    the historical and theological significance of royal appointment.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: Predicate of appointment after משׁח. English idiom allows 'anointed you
    king'; 'as king' is possible but less direct.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with royal office indicates rule or authority over. 'Over Israel'
    is the standard and precise rendering.
- source_word: הִצַּלְתִּיךָ
  chosen: I delivered you
  alternatives:
  - I rescued you
  - I saved you
  lexicon: HALOT
  rationale: נצל in this context denotes deliverance from danger or hostile power.
    'Delivered' fits biblical style and avoids importing soteriological overtones
    that 'saved' might suggest here.
- source_word: מִיַּד שָׁאוּל
  chosen: from the hand of Saul
  alternatives:
  - from Saul's hand
  - from Saul
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common in Hebrew for power or control.
    Retaining it preserves the source texture and remains clear in English.
