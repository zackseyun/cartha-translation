id: 2SA.12.17
reference: 2 Samuel 12:17
source:
  edition: WLC
  text: וַ/יָּקֻ֜מוּ זִקְנֵ֤י בֵית/וֹ֙ עָלָ֔י/ו לַ/הֲקִימ֖/וֹ מִן הָ/אָ֑רֶץ וְ/לֹ֣א
    אָבָ֔ה וְ/לֹֽא בָרָ֥א אִתָּ֖/ם לָֽחֶם־־׃
translation:
  text: The elders of his house stood over him to raise him up from the ground, but
    he was unwilling, and he would not eat bread with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elders of his household.' The Hebrew literally says 'the elders
      of his house.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'eat bread with them,' a Hebrew expression for taking food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: stood
  alternatives:
  - arose
  - got up
  lexicon: HALOT
  rationale: From קום, here describing the elders taking action in relation to David.
    'Stood' fits the following עָלָיו ('over him/upon him') more naturally than 'arose'
    in English, while preserving the concrete action.
- source_word: זִקְנֵי בֵיתוֹ
  chosen: the elders of his house
  alternatives:
  - the elders of his household
  - the elders of his family
  lexicon: HALOT
  rationale: A construct phrase literally 'elders of his house.' 'House' is retained
    in the main text for formal closeness and because it can denote the royal household;
    'household' is a viable smoother alternative.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - beside him
  - to him
  lexicon: HALOT
  rationale: The preposition עַל commonly means 'on/upon/over.' In this context of
    attendants trying to lift him from the ground, 'over him' best preserves the physical
    scene without overinterpreting.
- source_word: לַהֲקִימוֹ
  chosen: to raise him up
  alternatives:
  - to make him get up
  - to lift him up
  lexicon: HALOT
  rationale: 'Hiphil infinitive of קום with object suffix: causative, ''to cause him
    to rise.'' ''Raise him up'' is natural English and preserves the causative sense.'
- source_word: מִן הָאָרֶץ
  chosen: from the ground
  alternatives:
  - from the earth
  - from the floor
  lexicon: HALOT
  rationale: Though אֶרֶץ often means 'earth/land,' here the context is David lying
    prostrate in mourning/fasting. 'Ground' best conveys the immediate physical sense.
- source_word: וְלֹא אָבָה
  chosen: but he was unwilling
  alternatives:
  - but he would not
  - but he refused
  lexicon: HALOT
  rationale: אָבָה denotes willingness/consent. 'Was unwilling' preserves the lexical
    nuance more precisely than the stronger 'refused,' while still reading naturally.
- source_word: וְלֹא בָרָא אִתָּם לָחֶם
  chosen: and he would not eat bread with them
  alternatives:
  - and he would not eat with them
  - and he did not take food with them
  lexicon: HALOT
  rationale: The idiom ברה/אכל לחם in context refers to taking food. Retaining 'eat
    bread' preserves the Hebrew expression, while 'with them' reflects אִתָּם. This
    also matches the mourning context, where refusal of food is significant.
