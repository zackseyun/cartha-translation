id: 2SA.12.28
reference: 2 Samuel 12:28
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אֱסֹף֙ אֶת יֶ֣תֶר הָ/עָ֔ם וַ/חֲנֵ֥ה עַל הָ/עִ֖יר וְ/לָכְדָ֑/הּ
    פֶּן אֶלְכֹּ֤ד אֲנִי֙ אֶת הָ/עִ֔יר וְ/נִקְרָ֥א שְׁמִ֖/י עָלֶֽי/הָ־־־־׃
translation:
  text: Now gather the rest of the troops, camp against the city, and capture it,
    lest I capture the city and my name be called over it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'and it be called by my name.' The Hebrew literally
      says 'my name be called over it,' expressing that the honor for taking the city
      would be attributed to Joab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing an urgent next step. 'Now' is natural modern
    English; 'And now' is possible but less smooth.
- source_word: אֱסֹף
  chosen: gather
  alternatives:
  - assemble
  - muster
  lexicon: HALOT
  rationale: Imperative of אסף in a military context. 'Gather' is clear and natural;
    'muster' is more technical but less broadly readable.
- source_word: יֶתֶר הָעָם
  chosen: the rest of the troops
  alternatives:
  - the rest of the people
  - the remainder of the army
  lexicon: HALOT
  rationale: Though עָם often means 'people,' in this siege context it refers to the
    remaining fighting force with David. 'Troops' conveys the military sense better
    than the more generic 'people'.
- source_word: וַחֲנֵה עַל הָעִיר
  chosen: camp against the city
  alternatives:
  - encamp against the city
  - lay siege to the city
  lexicon: HALOT
  rationale: חנה means to camp/encamp. 'Camp against' preserves the military posture
    without overtranslating to the more interpretive 'lay siege,' though siege is
    implied by context.
- source_word: וְלָכְדָהּ
  chosen: and capture it
  alternatives:
  - and take it
  - and seize it
  lexicon: HALOT
  rationale: לכד commonly means capture/take in warfare. 'Capture it' is precise and
    idiomatic in English military narrative.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and accurately
    preserves the warning force, though slightly elevated.
- source_word: אֶלְכֹּד אֲנִי
  chosen: I capture
  alternatives:
  - I take
  lexicon: HALOT
  rationale: Repeats the same warfare verb as above; keeping 'capture' preserves lexical
    consistency.
- source_word: וְנִקְרָא שְׁמִי עָלֶיהָ
  chosen: and my name be called over it
  alternatives:
  - and it be called by my name
  - and the city bear my name
  - and my name be proclaimed over it
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the speaker's name being called
    over the city, indicating attribution of honor/ownership/conquest. The chosen
    rendering stays close to the idiom while remaining intelligible. A more idiomatic
    alternative is preserved in a footnote.
