id: 2SA.12.21
reference: 2 Samuel 12:21
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ עֲבָדָי/ו֙ אֵלָ֔י/ו מָֽה הַ/דָּבָ֥ר הַ/זֶּ֖ה אֲשֶׁ֣ר עָשִׂ֑יתָה
    בַּ/עֲב֞וּר הַ/יֶּ֤לֶד חַי֙ צַ֣מְתָּ וַ/תֵּ֔בְךְּ וְ/כַֽ/אֲשֶׁר֙ מֵ֣ת הַ/יֶּ֔לֶד
    קַ֖מְתָּ וַ/תֹּ֥אכַל לָֽחֶם־׃
translation:
  text: Then his servants said to him, “What is this thing that you have done? While
    the child was alive, you fasted and wept; but when the child died, you got up
    and ate bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ate bread,' an idiom for taking food or eating a meal.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although the Hebrew can denote servants or slaves, in a royal court setting
    'servants' is the most natural and contextually appropriate English rendering
    here, without making bonded status the focus of the verse.
- source_word: מָה הַדָּבָר הַזֶּה
  chosen: What is this thing
  alternatives:
  - What is this matter
  - Why have you done this
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the servants' astonishment and
    the concrete phrasing of the Hebrew, without collapsing it into a paraphrastic
    'why' question.
- source_word: אֲשֶׁר עָשִׂיתָה
  chosen: that you have done
  alternatives:
  - which you did
  lexicon: HALOT
  rationale: Present perfect English fits the servants' reference to David's completed
    course of action and reads naturally in modern English.
- source_word: בַּעֲבוּר
  chosen: while ... was alive
  alternatives:
  - for the sake of
  - because of
  - concerning
  lexicon: HALOT
  rationale: In this context the phrase introduces the circumstance regarding the
    child, not purpose in a narrow sense. Rendering the clause as 'While the child
    was alive' brings out the temporal force implied by the following contrast.
- source_word: הַיֶּלֶד חַי
  chosen: the child was alive
  alternatives:
  - the boy was alive
  - the child living
  lexicon: HALOT
  rationale: '''Child'' fits the context of David''s infant son better than ''boy.''
    Converting the verbless Hebrew phrase into an English clause is required for idiomatic
    translation.'
- source_word: צַמְתָּ
  chosen: you fasted
  lexicon: HALOT
  rationale: Direct and standard rendering of the verb צום.
- source_word: וַתֵּבְךְּ
  chosen: and wept
  alternatives:
  - and cried
  lexicon: HALOT
  rationale: '''Wept'' better matches the solemn register of the narrative than the
    more colloquial ''cried.'''
- source_word: וְכַאֲשֶׁר
  chosen: but when
  alternatives:
  - and when
  - then when
  lexicon: HALOT
  rationale: The conjunction marks a contrast with the previous clause. 'But when'
    makes the rhetorical contrast explicit in natural English.
- source_word: מֵת הַיֶּלֶד
  chosen: the child died
  alternatives:
  - the child was dead
  lexicon: HALOT
  rationale: The Hebrew verb is dynamic ('died'), and this better suits the temporal
    sequence being described.
- source_word: קַמְתָּ
  chosen: you got up
  alternatives:
  - you arose
  - you stood up
  lexicon: HALOT
  rationale: '''Got up'' is idiomatic modern English for קום in this context.'
- source_word: וַתֹּאכַל לָחֶם
  chosen: and ate bread
  alternatives:
  - and ate
  - and took food
  lexicon: HALOT
  rationale: Hebrew 'bread' often stands for food generally, but retaining 'bread'
    preserves the concrete wording and the cultural idiom without obscuring meaning.
