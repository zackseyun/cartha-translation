theological_decisions:
- issue: Anthropomorphic domestic imagery for the ewe lamb
  chosen_reading: Retain the intimate familial language straightforwardly
  alternative_readings:
  - Soften the imagery to avoid excessive sentimentality
  rationale: The Hebrew intentionally heightens the pathos of the parable by portraying
    the lamb as a cherished household member. The translation should preserve this
    emotional force rather than reduce it.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering בָּנָיו
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: Although the Hebrew form is formally 'his sons,' in this household scene
    English 'children' better communicates the family setting naturally. This is an
    optimal-equivalence choice, documented here because 'sons' is the more formal
    rendering.
  doctrine_reference: Translation philosophy §5, §6
