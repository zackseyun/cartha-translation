id: 2SA.12.3
reference: 2 Samuel 12:3
source:
  edition: WLC
  text: וְ/לָ/רָ֣שׁ אֵֽין כֹּ֗ל כִּי֩ אִם כִּבְשָׂ֨ה אַחַ֤ת קְטַנָּה֙ אֲשֶׁ֣ר קָנָ֔ה
    וַ/יְחַיֶּ֕/הָ וַ/תִּגְדַּ֥ל עִמּ֛/וֹ וְ/עִם בָּנָ֖י/ו יַחְדָּ֑ו מִ/פִּתּ֨/וֹ
    תֹאכַ֜ל וּ/מִ/כֹּס֤/וֹ תִשְׁתֶּה֙ וּ/בְ/חֵיק֣/וֹ תִשְׁכָּ֔ב וַ/תְּהִי ל֖/וֹ כְּ/בַֽת־־־־׃
translation:
  text: But the poor man had nothing except one small ewe lamb, which he had bought.
    He kept it alive, and it grew up with him and with his children together; it would
    eat from his morsel and drink from his cup and lie in his bosom, and it was like
    a daughter to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one little ewe lamb.'
    reason: lexical_alternative
  - marker: b
    text: '''In his bosom'' may also be rendered ''in his arms'' or ''in his lap,''
      expressing close affection within the household.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his sons'; rendered 'his children' for natural English in the household
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשׁ
  chosen: poor man
  alternatives:
  - poor person
  - needy man
  lexicon: HALOT
  rationale: The noun denotes a poor or destitute person. 'Poor man' fits the narrative
    contrast with the rich man in the preceding context and preserves the masculine
    singular reference.
- source_word: אֵין כֹּל כִּי אִם
  chosen: had nothing except
  alternatives:
  - had nothing but
  - there was nothing for ... except
  lexicon: HALOT
  rationale: This idiom expresses total lack with a single exception. 'Had nothing
    except' is natural English and preserves the exclusivity.
- source_word: כִּבְשָׂה אַחַת קְטַנָּה
  chosen: one small ewe lamb
  alternatives:
  - one little ewe lamb
  - a single small female lamb
  lexicon: HALOT
  rationale: כִּבְשָׂה specifically denotes a ewe lamb. 'One small ewe lamb' preserves
    number, sex, and diminutive sense without sounding childish.
- source_word: אֲשֶׁר קָנָה
  chosen: which he had bought
  alternatives:
  - that he had acquired
  - which he purchased
  lexicon: HALOT
  rationale: קנה commonly means 'buy/acquire.' 'Had bought' suits the past reference
    and highlights personal ownership established by purchase.
- source_word: וַיְחַיֶּהָ
  chosen: He kept it alive
  alternatives:
  - he nourished it
  - he raised it
  lexicon: HALOT
  rationale: The Hiphil of חיה can mean to keep alive, preserve, or sustain life.
    'Kept it alive' is the most direct rendering and conveys his ongoing care. 'Raised
    it' is possible but less explicit about the verb's life-preserving force.
- source_word: וַתִּגְדַּל
  chosen: it grew up
  alternatives:
  - it grew
  - it became big
  lexicon: HALOT
  rationale: The verb means to grow/become great. In context of a pet lamb reared
    in a household, 'grew up' idiomatically conveys maturation.
- source_word: עִמּוֹ וְעִם בָּנָיו יַחְדָּו
  chosen: with him and with his children together
  alternatives:
  - with him and his children
  - alongside him and his sons together
  lexicon: HALOT
  rationale: The phrase emphasizes shared life in the household. 'Children' is preferred
    over the formally possible 'sons' because in domestic English this better conveys
    household membership, while not changing the basic sense. 'Together' preserves
    יַחְדָּו for emphasis.
- source_word: מִפִּתּוֹ
  chosen: from his morsel
  alternatives:
  - from his bread
  - from his food
  lexicon: HALOT
  rationale: פַּת often means a piece or morsel of bread/food. 'Morsel' preserves
    the intimate image of sharing his own bite, stronger than the broader 'food.'
- source_word: מִכֹּסוֹ
  chosen: from his cup
  alternatives:
  - from his drinking cup
  lexicon: HALOT
  rationale: A straightforward possessive image of intimate sharing; 'cup' is sufficiently
    clear in English.
- source_word: בְחֵיקוֹ
  chosen: in his bosom
  alternatives:
  - in his arms
  - against his chest
  - in his lap
  lexicon: HALOT
  rationale: חֵיק refers to the bosom/lap/chest area. 'In his bosom' preserves the
    tenderness and traditional imagery without implying sexuality. Alternatives are
    possible, but this rendering best matches the affectionate domestic scene.
- source_word: תִשְׁכָּב
  chosen: lie
  alternatives:
  - sleep
  - rest
  lexicon: HALOT
  rationale: The verb literally means 'lie down.' 'Lie' keeps the physical image and
    avoids overinterpreting whether sleep is specifically intended.
- source_word: וַתְּהִי לוֹ כְּבַת
  chosen: it was like a daughter to him
  alternatives:
  - it became like a daughter to him
  - it was as a daughter to him
  lexicon: HALOT
  rationale: The comparison is explicit and affectionate. 'Like a daughter to him'
    is idiomatic modern English and preserves the simile without flattening it into
    literal kinship.
