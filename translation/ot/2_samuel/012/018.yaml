theological_decisions:
- issue: Interpretation of וְעָשָׂה רָעָה
  chosen_reading: An open-ended harmful action by David, left unspecified
  alternative_readings:
  - David may harm himself
  - David may do evil
  - David may react badly
  rationale: The text does not specify the object or exact nature of the feared action.
    To preserve the narrative's ambiguity and avoid importing a psychological or moral
    diagnosis, the translation uses 'He may do something harmful.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
