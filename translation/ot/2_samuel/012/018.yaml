id: 2SA.12.18
reference: 2 Samuel 12:18
source:
  edition: WLC
  text: וַ/יְהִ֛י בַּ/יּ֥וֹם הַ/שְּׁבִיעִ֖י וַ/יָּ֣מָת הַ/יָּ֑לֶד וַ/יִּֽרְאוּ֩ עַבְדֵ֨י
    דָוִ֜ד לְ/הַגִּ֥יד ל֣/וֹ כִּי מֵ֣ת הַ/יֶּ֗לֶד כִּ֤י אָֽמְרוּ֙ הִנֵּה֩ בִ/הְי֨וֹת
    הַ/יֶּ֜לֶד חַ֗י דִּבַּ֤רְנוּ אֵלָי/ו֙ וְ/לֹא שָׁמַ֣ע בְּ/קוֹלֵ֔/נוּ וְ/אֵ֨יךְ
    נֹאמַ֥ר אֵלָ֛י/ו מֵ֥ת הַ/יֶּ֖לֶד וְ/עָשָׂ֥ה רָעָֽה׀־־׃
translation:
  text: And on the seventh day the child died. And David’s servants were afraid to
    tell him that the child was dead, for they said, “Look, while the child was still
    alive, we spoke to him, and he did not listen to our voice. How then can we say
    to him, ‘The child is dead’? He may do something harmful.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He may do evil,' 'He may react badly,' or possibly 'He may harm himself.'
      The Hebrew expression is brief and leaves the exact feared action unspecified.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּיּוֹם הַשְּׁבִיעִי
  chosen: And on the seventh day
  alternatives:
  - And it happened on the seventh day
  - Now on the seventh day
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the next event in narrative sequence.
    In English, 'And on the seventh day' preserves the temporal transition naturally
    without the wooden 'and it happened.'
- source_word: וַיָּמָת הַיָּלֶד
  chosen: the child died
  alternatives:
  - the boy died
  lexicon: HALOT
  rationale: יֶלֶד can mean 'child' or 'boy.' 'Child' best fits the infant context
    of this episode and avoids implying an older age than the narrative suggests.
- source_word: וַיִּרְאוּ עַבְדֵי דָוִד
  chosen: David’s servants were afraid
  alternatives:
  - David’s servants feared
  lexicon: HALOT
  rationale: ירא here expresses fear/apprehension rather than reverence. 'Were afraid'
    is idiomatic modern English.
- source_word: לְהַגִּיד לוֹ
  chosen: to tell him
  alternatives:
  - to report to him
  - to inform him
  lexicon: HALOT
  rationale: הגיד commonly means 'tell, declare, report.' 'Tell him' is the most natural
    fit in this direct interpersonal setting.
- source_word: כִּי מֵת הַיֶּלֶד
  chosen: that the child was dead
  alternatives:
  - that the child had died
  lexicon: HALOT
  rationale: The clause gives the content of what they feared to tell him. English
    stative 'was dead' works smoothly after 'tell him that'; the event sense remains
    clear from the prior clause.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: This introduces the reason for their fear. 'For' is concise and preserves
    the explanatory force.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'Look' is readable modern English;
    'Behold' would be archaic.
- source_word: בִּהְיוֹת הַיֶּלֶד חַי
  chosen: while the child was still alive
  alternatives:
  - while the child was alive
  lexicon: HALOT
  rationale: The infinitive construct with ב marks contemporaneous time. 'Still alive'
    brings out the contrast with the coming report of death.
- source_word: דִּבַּרְנוּ אֵלָיו
  chosen: we spoke to him
  alternatives:
  - we talked to him
  lexicon: HALOT
  rationale: דבר אל is straightforwardly 'speak to.' 'Spoke' is slightly more formal
    and fits the narrative tone.
- source_word: וְלֹא שָׁמַע בְּקוֹלֵנוּ
  chosen: and he did not listen to our voice
  alternatives:
  - and he did not listen to us
  - and he would not heed us
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listen to our voice.' Retaining 'voice'
    preserves the source texture while remaining understandable in English.
- source_word: וְאֵיךְ נֹאמַר אֵלָיו
  chosen: How then can we say to him
  alternatives:
  - How can we tell him
  - How could we say to him
  lexicon: HALOT
  rationale: אֵיךְ expresses the servants' anxious rhetorical question. 'How then
    can we say to him' captures the inferential force from the previous clause.
- source_word: מֵת הַיֶּלֶד
  chosen: The child is dead
  alternatives:
  - The child has died
  lexicon: HALOT
  rationale: In direct speech, English often prefers the stative result 'is dead.'
    This also mirrors the earlier content clause naturally.
- source_word: וְעָשָׂה רָעָה
  chosen: He may do something harmful
  alternatives:
  - and he will do harm
  - and he may harm himself
  - and he may do evil
  lexicon: HALOT
  rationale: 'The Hebrew is terse and somewhat open-ended: literally ''and he will/may
    do evil/harm.'' In context the servants fear a dangerous reaction from David,
    but the object is unstated. ''He may do something harmful'' preserves the ambiguity
    without over-specifying self-harm or moral evil.'
