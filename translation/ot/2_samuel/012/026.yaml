id: 2SA.12.26
reference: 2 Samuel 12:26
source:
  edition: WLC
  text: וַ/יִּלָּ֣חֶם יוֹאָ֔ב בְּ/רַבַּ֖ת בְּנֵ֣י עַמּ֑וֹן וַ/יִּלְכֹּ֖ד אֶת עִ֥יר
    הַ/מְּלוּכָֽה־׃
translation:
  text: And Joab fought against Rabbah of the Ammonites and captured the royal city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'captured the capital city.' The Hebrew literally reads 'the city of
      the kingship/royalty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלָּחֶם
  chosen: fought against
  alternatives:
  - waged war against
  - fought
  lexicon: HALOT
  rationale: From לחם in the Niphal, denoting engagement in battle. 'Fought against'
    is natural English and preserves the adversative sense in context.
- source_word: רַבַּת בְּנֵי עַמּוֹן
  chosen: Rabbah of the Ammonites
  alternatives:
  - Rabbah of the sons of Ammon
  - Rabbah of Ammon
  lexicon: HALOT
  rationale: Rabbah is the proper place name; בְּנֵי עַמּוֹן is the standard ethnic/geopolitical
    designation. 'Of the Ammonites' gives clear modern English while preserving the
    referent.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially in military contexts.
    'Captured' fits the warfare setting and the object that follows.
- source_word: עִיר הַמְּלוּכָה
  chosen: the royal city
  alternatives:
  - the city of the kingdom
  - the capital city
  lexicon: HALOT
  rationale: Literally 'the city of the kingship/royalty.' In context it refers to
    the chief or royal sector of Rabbah. 'The royal city' is the most idiomatic rendering
    that stays close to the Hebrew. 'Capital city' is possible interpretively, but
    slightly more explanatory than the text itself.
