id: 2SA.12.4
reference: 2 Samuel 12:4
source:
  edition: WLC
  text: וַ/יָּ֣בֹא הֵלֶךְ֮ לְ/אִ֣ישׁ הֶֽ/עָשִׁיר֒ וַ/יַּחְמֹ֗ל לָ/קַ֤חַת מִ/צֹּאנ/וֹ֙
    וּ/מִ/בְּקָר֔/וֹ לַ/עֲשׂ֕וֹת לָ/אֹרֵ֖חַ הַ/בָּא ל֑/וֹ וַ/יִּקַּ֗ח אֶת כִּבְשַׂת֙
    הָ/אִ֣ישׁ הָ/רָ֔אשׁ וַֽ/יַּעֲשֶׂ֔/הָ לָ/אִ֖ישׁ הַ/בָּ֥א אֵלָֽי/ו־־׃
translation:
  text: Now a traveler came to the rich man, and he was unwilling to take from his
    own flock and from his own herd to prepare for the traveler who had come to him.
    So he took the ewe lamb of the poor man and prepared it for the man who had come
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guest' for both occurrences of 'traveler.' The Hebrew uses related but
      distinct terms for a person on a journey and for one received in hospitality.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵלֶךְ
  chosen: traveler
  alternatives:
  - wayfarer
  - guest
  lexicon: HALOT
  rationale: The noun denotes one on a journey, not merely a social guest. 'Traveler'
    is natural modern English and preserves the narrative contrast with the host's
    obligation to provide hospitality.
- source_word: וַיַּחְמֹל
  chosen: he was unwilling
  alternatives:
  - he spared himself from taking
  - he had compassion to avoid taking
  lexicon: HALOT
  rationale: Though the verb often means 'spare' or 'have compassion,' here the object
    is omitted and the sense is that the rich man refrained from taking from his own
    animals. 'He was unwilling' captures the idiomatic force in context better than
    a wooden 'he spared.'
- source_word: מִצֹּאנוֹ וּמִבְּקָרוֹ
  chosen: from his own flock and from his own herd
  alternatives:
  - from his sheep and from his cattle
  lexicon: HALOT
  rationale: '''Flock'' and ''herd'' are idiomatic collective terms matching the Hebrew
    collectives. Adding ''own'' makes explicit the possessive suffixes and sharpens
    the moral contrast.'
- source_word: לַעֲשׂוֹת
  chosen: to prepare
  alternatives:
  - to make
  - to dress
  lexicon: HALOT
  rationale: In food-preparation context, 'prepare' is the most natural English rendering.
    'Make' is too vague, while 'dress' is more specialized and less transparent to
    modern readers.
- source_word: לָאֹרֵחַ
  chosen: for the traveler
  alternatives:
  - for the guest
  - for the wayfarer
  lexicon: HALOT
  rationale: אָרֵחַ can mean guest or traveler; here 'traveler' keeps the lexical
    connection with הֵלֶךְ while remaining readable. The dative sense is preserved
    with 'for.'
- source_word: כִּבְשַׂת
  chosen: the ewe lamb
  alternatives:
  - the lamb
  - the female lamb
  lexicon: HALOT
  rationale: The Hebrew specifically indicates a female lamb. 'Ewe lamb' preserves
    that specificity and echoes the imagery of the parable.
- source_word: הָאִישׁ הָרָאשׁ
  chosen: the poor man
  alternatives:
  - the destitute man
  lexicon: HALOT
  rationale: רָאשׁ denotes one who is poor or needy. 'Poor man' is the standard, clear
    rendering and fits the socioeconomic contrast with 'the rich man.'
- source_word: וַיַּעֲשֶׂהָ
  chosen: prepared it
  alternatives:
  - made it
  - cooked it
  lexicon: HALOT
  rationale: The verb repeats עשה in the meal context; 'prepared it' maintains the
    connection with the earlier infinitive and avoids over-specifying the culinary
    process.
- source_word: הַבָּא לוֹ / הַבָּא אֵלָיו
  chosen: who had come to him
  alternatives:
  - who came to him
  lexicon: HALOT
  rationale: The participle with article functions substantivally, describing the
    arriving visitor. 'Who had come to him' fits the past narrative sequence smoothly
    in English.
