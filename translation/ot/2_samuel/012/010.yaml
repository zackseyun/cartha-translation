id: 2SA.12.10
reference: 2 Samuel 12:10
source:
  edition: WLC
  text: וְ/עַתָּ֗ה לֹא תָס֥וּר חֶ֛רֶב מִ/בֵּיתְ/ךָ֖ עַד עוֹלָ֑ם עֵ֚קֶב כִּ֣י בְזִתָ֔/נִי
    וַ/תִּקַּ֗ח אֶת אֵ֨שֶׁת֙ אוּרִיָּ֣ה הַ/חִתִּ֔י לִ/הְי֥וֹת לְ/ךָ֖ לְ/אִשָּֽׁה־־־׃ס
translation:
  text: Now therefore, the sword shall never depart from your house, because you have
    despised me and have taken the wife of Uriah the Hittite to be your wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your household' or 'from your dynasty'; Hebrew 'house' can include
      both family and royal line.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'despised me'; the offense against Uriah and his wife is presented
      as contempt toward God himself.
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the consequent judgment flowing from the preceding prophetic
    indictment. 'Now therefore' captures both the temporal and inferential force better
    than a bare 'Now.'
- source_word: לֹא תָסוּר
  chosen: shall never depart
  alternatives:
  - shall not depart
  - will not turn aside
  lexicon: HALOT
  rationale: With חֶרֶב as subject, סור conveys removal/departure. 'Shall never depart'
    idiomatically renders the force of the negation with עַד עוֹלָם in context, expressing
    enduring judgment.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - sword
  lexicon: HALOT
  rationale: Definite in sense though anarthrous in Hebrew; in English 'the sword'
    naturally conveys the emblem of violent conflict/judgment affecting David's house.
- source_word: מִבֵּיתְךָ
  chosen: from your house
  alternatives:
  - from your household
  - from your dynasty
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew metaphor and can encompass family line
    and household. ''Household'' narrows the sense; ''dynasty'' interprets more specifically
    than the text states.'
- source_word: עַד עוֹלָם
  chosen: never
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: In this judgment formula, the phrase denotes an indefinite enduring future.
    English 'never depart' is the most natural equivalent; the durative force is retained
    without woodenly saying 'until forever.'
- source_word: עֵקֶב כִּי
  chosen: because
  alternatives:
  - on account of the fact that
  - because indeed
  lexicon: HALOT
  rationale: The combination gives the reason for the announced judgment. A simple
    'because' communicates the causal force clearly in modern English.
- source_word: בְזִתָנִי
  chosen: you have despised me
  alternatives:
  - you have treated me with contempt
  - you have scorned me
  lexicon: HALOT
  rationale: The verb בזה denotes despising/showing contempt. 'Despised me' is direct
    and preserves the personal offense against the LORD mediated through David's actions.
- source_word: וַתִּקַּח
  chosen: and have taken
  alternatives:
  - and took
  lexicon: HALOT
  rationale: 'Although formally a wayyiqtol, in English this clause is best coordinated
    with the preceding perfect-like accusation: ''you have despised ... and have taken.''
    This yields natural English while preserving the completed action.'
- source_word: אֵשֶׁת אוּרִיָּה הַחִתִּי
  chosen: the wife of Uriah the Hittite
  alternatives:
  - Uriah the Hittite's wife
  lexicon: HALOT
  rationale: This more formal possessive keeps the emphasis on her existing marital
    bond to Uriah and mirrors the Hebrew construct chain closely.
- source_word: לִהְיוֹת לְךָ לְאִשָּׁה
  chosen: to be your wife
  alternatives:
  - to become your wife
  - as a wife for yourself
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for taking a woman in marriage. 'To be your
    wife' is natural and sufficiently formal without over-paraphrasing.
