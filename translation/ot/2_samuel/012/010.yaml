theological_decisions:
- issue: Referent of the first-person pronoun in 'you have despised me'
  chosen_reading: Retain 'me' as the direct divine referent
  alternative_readings:
  - you have despised the word/command of the LORD (interpretive expansion)
  rationale: The Hebrew explicitly has first-person singular suffix ('me'). The translation
    should preserve the theological weight that David's sin against Uriah and Bathsheba
    is fundamentally contempt toward God, without expanding the wording beyond the
    verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Scope of 'your house'
  chosen_reading: Translate literally as 'your house'
  alternative_readings:
  - your household
  - your dynasty
  rationale: The Hebrew can encompass family, household, and royal line. Rendering
    it literally preserves the breadth of the judgment rather than narrowing it to
    only domestic or dynastic consequences.
  doctrine_reference: Preserve theological tension rather than resolve it.
