id: 2SA.12.13
reference: 2 Samuel 12:13
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל נָתָ֔ן חָטָ֖אתִי לַֽ/יהוָ֑ה וַ/יֹּ֨אמֶר נָתָ֜ן אֶל
    דָּוִ֗ד גַּם יְהוָ֛ה הֶעֱבִ֥יר חַטָּאתְ/ךָ֖ לֹ֥א תָמֽוּת־ס־־׃
translation:
  text: Then David said to Nathan, “I have sinned against the LORD.” And Nathan said
    to David, “The LORD also has taken away your sin; you shall not die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The LORD has put away your sin.” The Hebrew verb literally means “has
      caused to pass over,” here in the sense of removing guilt.
    reason: lexical_alternative
  - marker: b
    text: Or “you will not die.” The Hebrew simply says “you shall not die,” without
      explicitly stating “be put to death,” though the legal context may imply spared
      capital judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: Qal perfect 1cs of חטא, a direct confession of wrongdoing. Present perfect
    English ('I have sinned') conveys the completed act with present relevance in
    this penitential context better than a simple past.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  - against Yahweh
  lexicon: HALOT
  rationale: The preposition ל can mark direction or relation, but with חטא in confessional
    contexts English idiom is best expressed as 'sin against.' Per doctrine, יְהוָה
    is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: גַּם adds emphasis/continuity to Nathan's response. 'Also' preserves
    the connective force without overinterpreting the nuance.
- source_word: הֶעֱבִיר
  chosen: has taken away
  alternatives:
  - has put away
  - has caused to pass over
  - has removed
  lexicon: HALOT
  rationale: Hiphil of עבר literally means 'cause to pass over/pass by.' In context
    with 'your sin,' the idiomatic sense is removal of guilt. 'Has taken away' is
    clear modern English while preserving the idea that the LORD has removed the sin's
    liability.
- source_word: חַטָּאתְךָ
  chosen: your sin
  alternatives:
  - your guilt
  - your sin-offering
  lexicon: HALOT
  rationale: חטאת can denote sin, guilt, or sin offering depending on context. Here
    the referent is David's offense just confessed, so 'your sin' is the most direct
    rendering; 'guilt' is a possible interpretive nuance but less literal.
- source_word: לֹא תָמוּת
  chosen: you shall not die
  alternatives:
  - you will not die
  - you shall not be put to death
  lexicon: HALOT
  rationale: The negated imperfect of מות states that David will not die. 'You shall
    not die' preserves the solemn judicial tone. 'Be put to death' is interpretive;
    while the context involves a death-deserving offense, the Hebrew text itself simply
    says 'die.'
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: Then David said ... And Nathan said
  alternatives:
  - And David said ... and Nathan said
  lexicon: HALOT
  rationale: The waw-consecutive narrative sequence is naturally rendered in English
    with 'Then' for the first clause and 'And' for the second, preserving narrative
    flow without wooden repetition.
