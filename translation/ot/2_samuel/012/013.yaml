theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    is applied consistently in both occurrences here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of forgiveness expressed by הֶעֱבִיר חַטָּאתְךָ
  chosen_reading: The LORD has taken away your sin
  alternative_readings:
  - The LORD has put away your sin
  - The LORD has caused your sin to pass over
  rationale: The text states divine removal of David's sin and consequent sparing
    from death, but it does not explain the mechanism of atonement here. The translation
    preserves that theological tension by rendering the removal plainly without importing
    later doctrinal categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
