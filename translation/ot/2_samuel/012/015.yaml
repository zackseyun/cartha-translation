id: 2SA.12.15
reference: 2 Samuel 12:15
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ נָתָ֖ן אֶל בֵּית֑/וֹ וַ/יִּגֹּ֣ף יְהוָ֗ה אֶת הַ/יֶּ֜לֶד אֲשֶׁ֨ר יָלְדָ֧ה אֵֽשֶׁת אוּרִיָּ֛ה לְ/דָוִ֖ד וַ/יֵּאָנַֽשׁ־־־׃
translation:
  text: Then Nathan went to his house, and Yahweh struck the child whom Uriah’s wife had borne to David, and it became sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'afflicted' or 'plagued' the child.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Uriah’s wife,'' preserving the narrative’s deliberate refusal here to name Bathsheba directly.'
    reason: cultural_note
  - marker: c
    text: Or 'and he was ill.' The Hebrew refers to the child becoming sick.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Then ... went
  alternatives:
  - And ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: Literal sense is 'his house'; this is clear modern English and preserves the concrete expression.
- source_word: וַיִּגֹּף
  chosen: struck
  alternatives:
  - afflicted
  - plagued
  - smote
  lexicon: HALOT
  rationale: נָגַף commonly denotes striking or smiting, often with harmful effect. 'Struck' is direct, readable, and leaves the nature of the affliction to the following clause rather than over-interpreting it as a specific plague.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: The referent is David's newborn/young child; 'child' is the most contextually appropriate and natural rendering.
- source_word: אֲשֶׁר יָלְדָה אֵשֶׁת אוּרִיָּה לְדָוִד
  chosen: whom Uriah’s wife had borne to David
  alternatives:
  - that the wife of Uriah bore to David
  - whom the wife of Uriah had given birth to for David
  lexicon: HALOT
  rationale: This preserves the Hebrew relative clause and the morally charged designation 'Uriah’s wife' rather than replacing it with Bathsheba's name, which the text intentionally withholds here.
- source_word: וַיֵּאָנַשׁ
  chosen: and he became sick
  alternatives:
  - and it became sick
  - and he was very ill
  lexicon: HALOT
  rationale: The verb from אנס/אנש in this stem denotes becoming sick or incurably ill. The masculine singular most naturally refers to the child, not an impersonal 'it.' 'Became sick' preserves the onset implied by the narrative verb without importing the stronger 'very' from the next verse.
