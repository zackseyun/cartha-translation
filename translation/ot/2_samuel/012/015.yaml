theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and standard English Bible convention while preserving reverential and covenantal force.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency of the affliction
  chosen_reading: the LORD struck the child
  alternative_readings:
  - the LORD afflicted the child
  rationale: The Hebrew explicitly attributes the action to the LORD. The translation should preserve that direct agency without softening it, while also avoiding over-specification beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
