theological_decisions:
- issue: Whether David executed the Ammonite captives with tools/kiln or conscripted
    them into harsh labor
  chosen_reading: conscripted them into forced labor with tools and at the brick kiln
  alternative_readings:
  - executed them with saws, iron implements, and by passing them through the kiln
  - put them to work with saws and iron tools and made them pass through the brickworks
  rationale: The Hebrew permits more than one construal, especially in the phrases
    with וַיָּשֶׂם and וְהֶעֱבִיר ... במלכן. Given the lexical ambiguity, the immediate
    context of subjugating a conquered population, and the parallel in 1 Chronicles
    20:3 often read as forced labor, the main text adopts the labor reading. To preserve
    the interpretive tension rather than overresolve it, the execution-oriented alternative
    is retained in footnotes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
