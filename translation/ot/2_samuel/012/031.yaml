id: 2SA.12.31
reference: 2 Samuel 12:31
source:
  edition: WLC
  text: וְ/אֶת הָ/עָ֨ם אֲשֶׁר בָּ֜/הּ הוֹצִ֗יא וַ/יָּ֣שֶׂם בַּ֠/מְּגֵרָה וּ/בַ/חֲרִצֵ֨י
    הַ/בַּרְזֶ֜ל וּֽ/בְ/מַגְזְרֹ֣ת הַ/בַּרְזֶ֗ל וְ/הֶעֱבִ֤יר אוֹתָ/ם֙ ב/מלכן וְ/כֵ֣ן
    יַעֲשֶׂ֔ה לְ/כֹ֖ל עָרֵ֣י בְנֵֽי עַמּ֑וֹן וַ/יָּ֧שָׁב דָּוִ֛ד וְ/כָל הָ/עָ֖ם יְרוּשָׁלִָֽם־־־־׃פ
translation:
  text: And he brought out the people who were in it and put them to work with saws,
    iron picks, and iron axes, and made them labor at the brick kiln. Thus he did
    to all the cities of the Ammonites. Then David and all the people returned to
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put them at the saw, and at iron sharp tools, and at iron cutting instruments.'
      The exact names of the implements are uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult; traditionally, 'made them pass through the brick kiln,'
      and some understand this as execution rather than forced labor.
    reason: alternative_reading
  - marker: c
    text: Compare 1 Chronicles 20:3, a parallel account with similarly difficult wording.
    reason: cross_reference
lexical_decisions:
- source_word: הוֹצִיא
  chosen: brought out
  alternatives:
  - brought forth
  - led out
  lexicon: HALOT
  rationale: The hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought
    out' is natural modern English and preserves the causative sense without overinterpreting.
- source_word: וַיָּשֶׂם
  chosen: put them to work with
  alternatives:
  - set them at
  - placed them under
  lexicon: HALOT
  rationale: Literally 'set/placed,' but in this context with a series of tools it
    likely denotes assigning forced labor rather than merely positioning them physically.
    This avoids importing the harsher interpretation of execution while still reflecting
    subjugation.
- source_word: בַּמְּגֵרָה
  chosen: with saws
  alternatives:
  - at the saw
  - to the saw
  lexicon: HALOT
  rationale: מְגֵרָה denotes a saw. The singular may be collective/instrumental; English
    plural reads naturally in a list of implements.
- source_word: בַחֲרִצֵי הַבַּרְזֶל
  chosen: iron picks
  alternatives:
  - iron threshing sledges
  - iron sharp tools
  lexicon: HALOT
  rationale: The noun is difficult and can denote sharp cutting implements or threshing
    devices. In this labor context, 'iron picks' gives a plausible tool term in readable
    English without implying torture. Because the exact implement is uncertain, an
    alternative is preserved in a footnote.
- source_word: בְמַגְזְרֹת הַבַּרְזֶל
  chosen: iron axes
  alternatives:
  - iron cutting tools
  - iron saws
  lexicon: HALOT
  rationale: The term refers broadly to cutting instruments. 'Iron axes' is a plausible
    concrete rendering in a tool list, but lexical uncertainty remains, so an alternative
    is footnoted.
- source_word: וְהֶעֱבִיר אֹתָם
  chosen: made them labor
  alternatives:
  - made them pass
  - put them to work
  lexicon: HALOT
  rationale: The hiphil of עבר is literally 'caused them to pass,' but with the following
    phrase and in this narrative context it likely refers to conscripting them into
    labor service. Rendering it woodenly as 'made them pass' would be obscure in English
    and may misleadingly suggest execution.
- source_word: במלכן
  chosen: at the brick kiln
  alternatives:
  - through the brick kiln
  - through Molech
  - through the king
  lexicon: HALOT
  rationale: The consonantal text is difficult. In context and by comparison with
    Chronicles, many understand a labor-related term connected with brickmaking rather
    than a reference to execution or to the Ammonite deity Milcom/Molech. 'At the
    brick kiln' fits the forced-labor reading and yields coherent sense. Because this
    is a major crux, alternatives are preserved in footnotes.
- source_word: וְכֵן יַעֲשֶׂה
  chosen: Thus he did
  alternatives:
  - So he did
  - And thus he would do
  lexicon: HALOT
  rationale: This summarizes David's treatment of the Ammonite cities. 'Thus he did'
    is idiomatic and preserves the narrative force.
- source_word: לְכֹל עָרֵי בְנֵי עַמּוֹן
  chosen: to all the cities of the Ammonites
  alternatives:
  - to all the cities of the sons of Ammon
  lexicon: HALOT
  rationale: '''Ammonites'' is the natural English ethnonym for בְנֵי עַמּוֹן in this
    context.'
- source_word: וַיָּשָׁב ... יְרוּשָׁלִָם
  chosen: returned to Jerusalem
  alternatives:
  - went back to Jerusalem
  lexicon: HALOT
  rationale: Standard narrative use of שוב with destination; 'returned' is concise
    and idiomatic.
