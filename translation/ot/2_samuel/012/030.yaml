theological_decisions:
- issue: Whether מַלְכָּם is a common noun phrase ('their king') or the proper name
    of the Ammonite god Milcom/Malcam
  chosen_reading: their king
  alternative_readings:
  - Milcom
  - Malcam
  rationale: This is primarily a lexical/textual issue rather than a doctrinal one,
    but it affects interpretation. The provided morphology parses the form as 'king'
    with a 3mp suffix, and the immediate syntax 'from off his head' straightforwardly
    supports a royal referent. Because some translations and commentators understand
    the word as the deity-name Milcom/Malcam, that alternative is preserved in a footnote
    rather than silently excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension/ambiguity
    where genuine)
