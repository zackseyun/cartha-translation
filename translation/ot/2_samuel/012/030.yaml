id: 2SA.12.30
reference: 2 Samuel 12:30
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֶת עֲטֶֽרֶת מַלְכָּ/ם֩ מֵ/עַ֨ל רֹאשׁ֜/וֹ וּ/מִשְׁקָלָ֨/הּ כִּכַּ֤ר
    זָהָב֙ וְ/אֶ֣בֶן יְקָרָ֔ה וַ/תְּהִ֖י עַל רֹ֣אשׁ דָּוִ֑ד וּ/שְׁלַ֥ל הָ/עִ֛יר הוֹצִ֖יא
    הַרְבֵּ֥ה מְאֹֽד־־־׃
translation:
  text: He took the crown of their king from off his head. Its weight was a talent
    of gold, and in it was a precious stone, and it was placed on David’s head. He
    brought out the spoil of the city in very great quantity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crown of Milcom' (also spelled 'Malcam'), taking מַלְכָּם as the
      name of the Ammonite deity rather than 'their king.'
    reason: alternative_reading
  - marker: b
    text: A talent was a very large unit of weight, often estimated at roughly 75
      pounds (34 kilograms), though exact ancient standards varied.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - diadem
  lexicon: HALOT
  rationale: עֲטֶרֶת denotes a royal crown or wreath. 'Crown' is the natural modern
    English equivalent here in a royal context.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: The consonants can be read as 'their king' (malkam) or as the proper
    name of the Ammonite deity Milcom/Malcam. Given the morphology supplied (noun
    'king' + 3mp suffix) and the immediate context of taking a crown from a head,
    the main text follows 'their king.' Because the deity-name reading is a known
    alternative in this verse, it is preserved in a footnote.
- source_word: מֵעַל רֹאשׁוֹ
  chosen: from off his head
  alternatives:
  - from his head
  lexicon: HALOT
  rationale: The preposition מֵעַל is slightly fuller than simple 'from'; 'from off
    his head' preserves the physical sense without sounding archaic beyond comprehension.
- source_word: וּמִשְׁקָלָהּ
  chosen: Its weight was
  alternatives:
  - and its weight was
  lexicon: HALOT
  rationale: This introduces a new descriptive clause about the crown. English idiom
    naturally renders it as 'Its weight was,' though the conjunction is implicit in
    the flow.
- source_word: כִּכַּר זָהָב
  chosen: a talent of gold
  alternatives:
  - a gold talent
  lexicon: HALOT
  rationale: כִּכַּר is a standard large unit of weight, commonly rendered 'talent.'
    'A talent of gold' is clear and conventional.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and in it was a precious stone
  alternatives:
  - with a precious stone
  - and a precious stone
  lexicon: HALOT
  rationale: 'The Hebrew is terse: literally ''and a precious stone.'' Since the phrase
    modifies the crown, English benefits from making the relation explicit. ''In it
    was'' conveys that the stone was set in the crown without overinterpreting the
    exact mounting.'
- source_word: וַתְּהִי עַל רֹאשׁ דָּוִד
  chosen: and it was placed on David’s head
  alternatives:
  - and it came to be on David's head
  - and it was on David's head
  lexicon: HALOT
  rationale: The clause states the result that the crown came onto David's head. 'Was
    placed on' expresses the event naturally in English while preserving the sense.
- source_word: וּשְׁלַל הָעִיר
  chosen: the spoil of the city
  alternatives:
  - the plunder of the city
  lexicon: HALOT
  rationale: שָׁלָל refers to war booty or spoil. 'Spoil' is concise and idiomatic
    in biblical-historical narrative; 'plunder' is possible but slightly more interpretive
    in tone.
- source_word: הוֹצִיא
  chosen: He brought out
  alternatives:
  - he carried off
  - he took out
  lexicon: HALOT
  rationale: The hiphil of יצא means 'bring out' or 'cause to go out.' In context
    David had the city's spoil brought out/removed. 'Brought out' stays close to the
    verb.
- source_word: הַרְבֵּה מְאֹד
  chosen: in very great quantity
  alternatives:
  - very much
  - exceedingly much
  lexicon: HALOT
  rationale: The adverbial pair intensifies abundance. 'In very great quantity' communicates
    the scale in natural English and fits the object 'spoil.'
