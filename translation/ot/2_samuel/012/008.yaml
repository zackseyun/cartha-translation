id: 2SA.12.8
reference: 2 Samuel 12:8
source:
  edition: WLC
  text: וָ/אֶתְּנָ֨/ה לְ/ךָ֜ אֶת בֵּ֣ית אֲדֹנֶ֗י/ךָ וְ/אֶת נְשֵׁ֤י אֲדֹנֶ֨י/ךָ֙ בְּ/חֵיקֶ֔/ךָ
    וָ/אֶתְּנָ֣/ה לְ/ךָ֔ אֶת בֵּ֥ית יִשְׂרָאֵ֖ל וִֽ/יהוּדָ֑ה וְ/אִ֨ם מְעָ֔ט וְ/אֹסִ֥פָה
    לְּ/ךָ֖ כָּ/הֵ֥נָּה וְ/כָ/הֵֽנָּה־־־־׃
translation:
  text: And I gave you your master's house and your master's wives into your arms,
    and I gave you the house of Israel and Judah; and if that had been too little,
    I would have added to you such and such things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into your bosom' or 'into your lap.' The Hebrew idiom conveys intimate
      possession or reception.
    reason: lexical_alternative
  - marker: b
    text: Or 'such things and more.' The Hebrew expression is an idiom for adding
      still more of the same kind.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  chosen: I gave
  alternatives:
  - I had given
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן in narrative sequence; simple past fits the recounting
    of the LORD's gifts to David.
- source_word: בֵּית אֲדֹנֶיךָ
  chosen: your master's house
  alternatives:
  - the house of your lord
  - your lord's household
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or dynasty. Here, in parallel with
    wives and kingdom, it refers broadly to Saul's royal house/estate transferred
    to David. 'Your master's house' preserves the concrete Hebrew while allowing the
    broader royal-house sense.
- source_word: נְשֵׁי אֲדֹנֶיךָ
  chosen: your master's wives
  alternatives:
  - the wives of your lord
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Master' is preferable here to 'lord'
    in English to avoid confusion with divine title usage in the same context.
- source_word: בְּחֵיקֶךָ
  chosen: into your arms
  alternatives:
  - into your bosom
  - into your lap
  lexicon: HALOT
  rationale: חֵיק literally denotes bosom/lap. In modern English, 'into your arms'
    communicates intimate possession/reception naturally without archaic tone. It
    preserves the metaphor of being placed under David's care/possession.
- source_word: בֵּית יִשְׂרָאֵל וִיהוּדָה
  chosen: the house of Israel and Judah
  alternatives:
  - the house of Israel and of Judah
  - Israel and Judah
  - the kingdom of Israel and Judah
  lexicon: HALOT
  rationale: Retaining 'house' reflects the Hebrew wording and keeps parallelism with
    the earlier 'house.' It likely denotes the royal realm/people of the united monarchy
    under David. 'Kingdom' would be interpretive; 'house' is more textually transparent.
- source_word: וְאִם מְעָט
  chosen: if that had been too little
  alternatives:
  - and if it was little
  - and if that were too little
  lexicon: HALOT
  rationale: This idiom introduces a contrary-to-fact or hypothetical insufficiency.
    'If that had been too little' expresses the sense idiomatically in English.
- source_word: וְאֹסִפָה לְּךָ
  chosen: I would have added to you
  alternatives:
  - I would have added for you
  - I would have given you more
  lexicon: HALOT
  rationale: Hiphil of יסף means to add/increase. 'Added to you' is close to the Hebrew;
    the modal 'would have' matches the hypothetical force from the preceding clause.
- source_word: כָּהֵנָּה וְכָהֵנָּה
  chosen: such and such things
  alternatives:
  - like these and like those
  - this much and more
  - such things and more
  lexicon: HALOT
  rationale: The paired demonstrative expression is idiomatic, meaning additional
    things of this sort, even more besides. 'Such and such things' preserves the indefinite,
    accumulative sense without over-specifying the referent.
