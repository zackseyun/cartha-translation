theological_decisions:
- issue: Whether the verse should be rendered in a way that implies divine approval
    of David's taking Saul's wives as conjugal partners
  chosen_reading: The translation states that God gave David 'your master's wives
    into your arms' without expanding the statement into an endorsement or detailed
    marital claim.
  alternative_readings:
  - Render more interpretively as 'gave your master's harem to you'
  - Soften to 'entrusted your master's women to your care'
  rationale: The Hebrew states a transfer associated with royal succession and possession.
    The translation preserves the wording without importing a theological judgment
    beyond the text. 'Into your arms' reflects the idiom while avoiding unnecessary
    interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
