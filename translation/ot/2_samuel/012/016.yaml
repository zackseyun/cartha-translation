id: 2SA.12.16
reference: 2 Samuel 12:16
source:
  edition: WLC
  text: וַ/יְבַקֵּ֥שׁ דָּוִ֛ד אֶת הָ/אֱלֹהִ֖ים בְּעַ֣ד הַ/נָּ֑עַר וַ/יָּ֤צָם דָּוִד֙
    צ֔וֹם וּ/בָ֥א וְ/לָ֖ן וְ/שָׁכַ֥ב אָֽרְצָ/ה־׃
translation:
  text: And David sought God on behalf of the boy. David fasted a fast, and he went
    in and spent the night and lay on the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'David fasted' or 'David kept a fast.' The Hebrew
      uses a cognate expression, literally 'fasted a fast,' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The boy'' refers to David''s child who was struck with illness (vv. 15,
      18). ''The child'' is also a possible rendering of the Hebrew term here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  chosen: sought
  alternatives:
  - pleaded with
  - inquired of
  lexicon: HALOT
  rationale: בקש in this context denotes earnest seeking or entreating directed toward
    God for the child's sake. 'Sought' preserves the Hebrew wording while allowing
    the prayerful sense to be inferred from context; 'pleaded with' is interpretive
    and stronger than the verb alone requires.
- source_word: אֶת־הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The direct object marker plus האלהים straightforwardly identifies the
    one David sought. 'God' is the natural English rendering.
- source_word: בְּעַד
  chosen: on behalf of
  alternatives:
  - for
  - concerning
  lexicon: HALOT
  rationale: בעד here expresses intercession for another. 'On behalf of' makes the
    representative/intercessory force explicit without overtranslation; 'for' is possible
    but less precise.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: נער can mean boy, youth, servant, or child depending on context. Here
    it refers to David's sick infant son. 'The boy' is a direct lexical rendering;
    'the child' is contextually possible and idiomatic, but 'boy' better reflects
    the Hebrew noun used.
- source_word: וַיָּצָם ... צוֹם
  chosen: fasted a fast
  alternatives:
  - fasted
  - kept a fast
  lexicon: HALOT
  rationale: The verb צום with the cognate accusative צום intensifies or emphasizes
    the action. 'Fasted a fast' preserves the Hebrew emphasis more transparently than
    smoothing to simply 'fasted,' though the latter is idiomatic English.
- source_word: וּבָא
  chosen: went in
  alternatives:
  - entered
  lexicon: HALOT
  rationale: בוא is the common verb 'to come/go in.' In this narrative sequence, 'went
    in' fits English narrative flow and preserves the directional sense.
- source_word: וְלָן
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: לון refers to passing the night or lodging. 'Spent the night' is clear
    modern English and captures the temporal force better than the more formal 'lodged.'
- source_word: וְשָׁכַב אָרְצָה
  chosen: lay on the ground
  alternatives:
  - lay earthward
  - lay on the floor
  lexicon: HALOT
  rationale: שכב means 'lie down,' and ארצה means 'to the earth/ground.' 'Lay on the
    ground' is the most natural rendering and conveys David's posture of mourning
    and humiliation. 'Floor' is possible in an indoor setting but is not specified
    by the Hebrew.
