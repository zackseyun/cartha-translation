id: 2SA.12.6
reference: 2 Samuel 12:6
source:
  edition: WLC
  text: וְ/אֶת הַ/כִּבְשָׂ֖ה יְשַׁלֵּ֣ם אַרְבַּעְתָּ֑יִם עֵ֗קֶב אֲשֶׁ֤ר עָשָׂה֙ אֶת
    הַ/דָּבָ֣ר הַ/זֶּ֔ה וְ/עַ֖ל אֲשֶׁ֥ר לֹֽא חָמָֽל־־־׃
translation:
  text: And he must repay the ewe lamb fourfold, because he did this thing and because
    he had no compassion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not spare.' The Hebrew verb can emphasize refraining from harming
      or acting out of pity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכִּבְשָׂה
  chosen: the ewe lamb
  alternatives:
  - the lamb
  - the female lamb
  lexicon: HALOT
  rationale: כִּבְשָׂה specifically denotes a female lamb/ewe. 'Ewe lamb' preserves
    the animal's sex and matches the narrative emphasis on the poor man's cherished
    animal.
- source_word: יְשַׁלֵּם
  chosen: he must repay
  alternatives:
  - he shall restore
  - he will pay back
  lexicon: HALOT
  rationale: Piel of שׁלם here expresses restitution/repayment. 'Must repay' conveys
    David's judicial pronouncement in idiomatic modern English better than a simple
    future.
- source_word: אַרְבַּעְתָּיִם
  chosen: fourfold
  alternatives:
  - four times
  - four times over
  lexicon: HALOT
  rationale: The adverbial numeral idiom means repayment in quadruple measure. 'Fourfold'
    is concise and standard in legal-restoration contexts.
- source_word: עֵקֶב אֲשֶׁר
  chosen: because
  alternatives:
  - on account of which
  - as a consequence of the fact that
  lexicon: HALOT
  rationale: The phrase introduces the reason for the sentence. 'Because' is the most
    natural English equivalent.
- source_word: עָשָׂה אֶת־הַדָּבָר הַזֶּה
  chosen: he did this thing
  alternatives:
  - he did this deed
  - he did this
  lexicon: HALOT
  rationale: דָּבָר can mean 'thing,' 'matter,' or 'deed.' 'This thing' preserves
    the Hebrew expression's force without overinterpreting.
- source_word: לֹא חָמָל
  chosen: he had no compassion
  alternatives:
  - he did not spare
  - he had no pity
  lexicon: HALOT
  rationale: חמל denotes sparing out of pity/compassion. In this context, the issue
    is mercilessness toward the poor man; 'had no compassion' makes that moral sense
    explicit in natural English. 'Did not spare' is possible but less clear in English
    without an object.
