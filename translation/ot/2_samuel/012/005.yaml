id: 2SA.12.5
reference: 2 Samuel 12:5
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף דָּוִ֛ד בָּ/אִ֖ישׁ מְאֹ֑ד וַ/יֹּ֨אמֶר֙ אֶל נָתָ֔ן חַי יְהוָ֕ה
    כִּ֣י בֶן מָ֔וֶת הָ/אִ֖ישׁ הָ/עֹשֶׂ֥ה זֹֽאת־־־־׃
translation:
  text: Then David burned with anger against the man, and he said to Nathan, “As the
    LORD lives, the man who has done this is a son of death!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a son of death,' that is, one who deserves to die or is worthy of
      death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: burned with anger
  alternatives:
  - was very angry
  - his anger burned
  lexicon: HALOT
  rationale: The idiom literally involves anger 'burning' and is stronger and more
    vivid than a flat 'was angry.' 'Burned with anger' preserves the Hebrew imagery
    while remaining natural English.
- source_word: בָּאִישׁ
  chosen: against the man
  alternatives:
  - at the man
  - against that man
  lexicon: HALOT
  rationale: The preposition with אִישׁ marks the object of David's anger. 'Against
    the man' is idiomatic and fits the judicial tone of the context.
- source_word: מְאֹד
  chosen: implicitly conveyed in the intensity of 'burned with anger'
  alternatives:
  - greatly
  - very much
  - very
  lexicon: HALOT
  rationale: The adverb intensifies David's anger. Because 'burned with anger' already
    carries strong force, the intensity is represented without adding a potentially
    clunky 'very.' This is an optimal-equivalence compression rather than omission.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is the most natural
    English equivalent and preserves the solemnity. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' following the
    stated doctrine and established reverential convention.
- source_word: כִּי
  chosen: the man who has done this is
  alternatives:
  - surely
  - indeed
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of David's oath-backed declaration.
    In English, the sense is best carried by direct assertion rather than a wooden
    'for' or 'indeed.'
- source_word: בֶן מָוֶת
  chosen: a son of death
  alternatives:
  - deserves to die
  - is worthy of death
  - is a dead man
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'son of death,' denoting one liable
    to death. Retaining the idiom in the main text preserves the force and texture
    of the Hebrew, while an explanatory alternative is worth preserving in a footnote.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: The definite noun refers to the rich man in Nathan's parable. 'The man'
    is the straightforward rendering.
- source_word: הָעֹשֶׂה זֹאת
  chosen: who has done this
  alternatives:
  - doing this
  - who did this thing
  lexicon: HALOT
  rationale: The participial construction identifies the offender by his action. English
    relative clause style is the clearest equivalent here.
