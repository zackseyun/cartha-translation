theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in an oath formula. The project
    doctrine specifies 'the LORD' as the default rendering for יְהוָה, preserving
    reverential convention and consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to translate בֶן מָוֶת idiomatically or more literally
  chosen_reading: a son of death
  alternative_readings:
  - deserves to die
  - is worthy of death
  rationale: This is not a doctrinally contested term, but it is a significant interpretive
    choice. The main text preserves the Hebrew idiom for transparency and auditability,
    while a footnote gives the idiomatic sense so readers are not misled.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 6
