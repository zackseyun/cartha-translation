theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to translate בֶן מָוֶת idiomatically or more literally
  chosen_reading: a son of death
  alternative_readings:
  - deserves to die
  - is worthy of death
  rationale: This is not a doctrinally contested term, but it is a significant interpretive choice. The main text preserves the Hebrew idiom for transparency and auditability, while a footnote gives the idiomatic sense so readers are not misled.
