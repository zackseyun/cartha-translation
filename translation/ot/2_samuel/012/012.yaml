theological_decisions:
- issue: Agency of the announced judgment
  chosen_reading: 'Retain first-person divine agency: ''I will do this thing'''
  alternative_readings:
  - I will cause this to be done
  rationale: The Hebrew uses a straightforward first-person verb. While the broader
    narrative shows God bringing judgment through historical means, the verse itself
    presents direct divine agency and should not be softened or paraphrased away.
  doctrine_reference: Translation philosophy §1, §3
