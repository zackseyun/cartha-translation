id: 2SA.12.12
reference: 2 Samuel 12:12
source:
  edition: WLC
  text: כִּ֥י אַתָּ֖ה עָשִׂ֣יתָ בַ/סָּ֑תֶר וַ/אֲנִ֗י אֶעֱשֶׂה֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה
    נֶ֥גֶד כָּל יִשְׂרָאֵ֖ל וְ/נֶ֥גֶד הַ/שָּֽׁמֶשׁ־־׃ס
translation:
  text: For you did it in secret, but I will do this thing before all Israel and before
    the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and in broad daylight'; literally, 'and before the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the announced judgment in the previous verse.
    'For' preserves the explanatory force in natural English.
- source_word: עָשִׂיתָ
  chosen: did it
  alternatives:
  - have done
  - acted
  lexicon: HALOT
  rationale: The verb 'do/make' here refers back to David's offense without restating
    it explicitly. 'Did it' preserves the Hebrew's elliptical directness and avoids
    over-specifying beyond the text.
- source_word: בַסָּתֶר
  chosen: in secret
  alternatives:
  - secretly
  - in hiding
  lexicon: HALOT
  rationale: The noun with preposition literally means 'in the secret/hidden place.'
    'In secret' is idiomatic English and preserves the contrast with the public exposure
    that follows.
- source_word: וַאֲנִי
  chosen: but I
  alternatives:
  - and I
  lexicon: HALOT
  rationale: 'Though waw can be simply conjunctive, the context is strongly adversative:
    David acted secretly, whereas God will act publicly. ''But I'' best conveys the
    contrast.'
- source_word: אֶעֱשֶׂה
  chosen: will do
  alternatives:
  - am about to do
  - will act
  lexicon: HALOT
  rationale: Simple future sense fits the prophetic announcement of coming judgment.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the demonstrative emphasis and
    the concrete reference to the announced act of judgment. 'This thing' is slightly
    more literal than simply 'this' while remaining readable.
- source_word: נֶגֶד כָּל יִשְׂרָאֵל
  chosen: before all Israel
  alternatives:
  - in front of all Israel
  - in the sight of all Israel
  lexicon: HALOT
  rationale: נֶגֶד denotes being in front of or in the presence/sight of. 'Before
    all Israel' is concise, natural, and preserves the public nature of the act.
- source_word: וְנֶגֶד הַשָּׁמֶשׁ
  chosen: and before the sun
  alternatives:
  - and in broad daylight
  - and in the sight of the sun
  lexicon: HALOT
  rationale: The Hebrew is literally 'before the sun.' This vivid idiom communicates
    open public exposure. The literal image is retained in the main text rather than
    replaced with the interpretive 'in broad daylight.'
