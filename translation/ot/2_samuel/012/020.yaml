id: 2SA.12.20
reference: 2 Samuel 12:20
source:
  edition: WLC
  text: וַ/יָּקָם֩ דָּוִ֨ד מֵ/הָ/אָ֜רֶץ וַ/יִּרְחַ֣ץ וַ/יָּ֗סֶךְ וַ/יְחַלֵּף֙ שמלת/ו וַ/יָּבֹ֥א בֵית יְהוָ֖ה וַ/יִּשְׁתָּ֑חוּ וַ/יָּבֹא֙ אֶל בֵּית֔/וֹ וַ/יִּשְׁאַ֕ל וַ/יָּשִׂ֥ימוּ ל֛/וֹ לֶ֖חֶם וַ/יֹּאכַֽל־־׃
translation:
  text: Then David got up from the ground, washed, anointed himself, and changed his clothes. He went into the house of Yahweh and bowed down. Then he went to his house, asked, and they set bread before him, and he ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped'; the Hebrew verb can denote bowing down physically in reverence or worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: got up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of קום; 'got up' is natural modern English and fits the physical action of rising after mourning on the ground.
- source_word: מֵהָאָרֶץ
  chosen: from the ground
  alternatives:
  - from the earth
  - from the floor
  lexicon: HALOT
  rationale: In context David has been lying on the ground in mourning/fasting; 'ground' best conveys the concrete setting without sounding overly cosmic ('earth') or too domesticated ('floor').
- source_word: וַיִּרְחַץ
  chosen: washed
  alternatives:
  - bathed
  lexicon: HALOT
  rationale: רחץ can mean wash/bathe; 'washed' is sufficiently broad and idiomatic in sequence with anointing and changing clothes.
- source_word: וַיָּסֶךְ
  chosen: anointed himself
  alternatives:
  - put on oil
  - rubbed himself with oil
  lexicon: HALOT
  rationale: סוך here refers to applying oil to oneself as part of ending mourning. 'Anointed himself' is concise and standard, while still reflecting the reflexive sense implied by context.
- source_word: וַיְחַלֵּף שִׂמְלֹתוֹ
  chosen: changed his clothes
  alternatives:
  - changed his garment
  - changed his clothing
  lexicon: HALOT
  rationale: The singular noun with suffix functions collectively in English; 'changed his clothes' is the most natural rendering for modern readers.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the sanctuary of the LORD
  lexicon: HALOT
  rationale: בית יהוה is the standard expression for the sanctuary/tabernacle context. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: וַיִּשְׁתָּחוּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated himself
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration. 'Bowed down' preserves the physical act without over-interpreting the precise liturgical nuance, though worship is clearly involved by context.
- source_word: וַיִּשְׁאַל
  chosen: asked for food
  alternatives:
  - requested food
  - asked
  lexicon: HALOT
  rationale: The object is implicit and supplied by the following clause where bread is set before him. 'Asked for food' makes the sense explicit in idiomatic English.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  - a meal
  lexicon: HALOT
  rationale: The Hebrew word is literally 'bread.' It can stand metonymically for food, but retaining 'bread' preserves the lexical form while the prior 'asked for food' clarifies the sense.
- source_word: וַיָּשִׂימוּ לוֹ לֶחֶם
  chosen: they set bread before him
  alternatives:
  - they placed bread for him
  - they served him bread
  lexicon: HALOT
  rationale: This is a natural English rendering of the idiom and keeps the unspecified plural subject.
- source_word: וַיֹּאכַל
  chosen: he ate
  alternatives:
  - and ate
  lexicon: HALOT
  rationale: Simple narrative conclusion; rendered straightforwardly.
