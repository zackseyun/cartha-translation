theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of David's hope regarding God's response
  chosen_reading: The LORD may be gracious to me, and the child may live
  alternative_readings:
  - The LORD will be gracious to me, and the child will live
  - The LORD may have mercy, so that the child lives
  rationale: The Hebrew expresses uncertainty ('Who knows?') and hope, not confidence or presumption. The English therefore uses 'may' for both clauses to preserve the tension and avoid importing certainty the text does not state.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
