id: 2SA.12.24
reference: 2 Samuel 12:24
source:
  edition: WLC
  text: וַ/יְנַחֵ֣ם דָּוִ֗ד אֵ֚ת בַּת שֶׁ֣בַע אִשְׁתּ֔/וֹ וַ/יָּבֹ֥א אֵלֶ֖י/הָ וַ/יִּשְׁכַּ֣ב עִמָּ֑/הּ וַ/תֵּ֣לֶד בֵּ֗ן ו/יקרא אֶת שְׁמ/וֹ֙ שְׁלֹמֹ֔ה וַ/יהוָ֖ה אֲהֵבֽ/וֹ־־׃
translation:
  text: Then David comforted Bathsheba his wife, and he went in to her and lay with her. She bore a son, and he named him Solomon. And Yahweh loved him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'consoled Bathsheba his wife.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''went in to her and lay with her,'' referring to sexual relations.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְנַחֵם
  chosen: comforted
  alternatives:
  - consoled
  lexicon: HALOT
  rationale: The piel of נחם here denotes giving comfort after grief, in context after the death of the child. 'Comforted' is natural modern English and preserves the pastoral sense without overinterpreting.
- source_word: בַּת שֶׁבַע
  chosen: Bathsheba
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Explicitly retained because the Hebrew marks Bathsheba as David's wife at this point in the narrative; this is significant and should not be omitted.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: he went in to her
  alternatives:
  - he came to her
  lexicon: HALOT
  rationale: This idiom commonly introduces sexual relations. 'Went in to her' preserves the Hebrew idiom and narrative register better than the less idiomatic but possible 'came to her.'
- source_word: וַיִּשְׁכַּב עִמָּהּ
  chosen: lay with her
  alternatives:
  - slept with her
  lexicon: HALOT
  rationale: A standard English equivalent for the sexual idiom שכב עם. 'Lay with her' is slightly more formal and fits the narrative tone better than 'slept with her.'
- source_word: וַתֵּלֶד בֵּן
  chosen: She bore a son
  alternatives:
  - She gave birth to a son
  lexicon: HALOT
  rationale: '''Bore a son'' is concise, idiomatic, and close to the Hebrew wording.'
- source_word: וַיִּקְרָא אֶת שְׁמוֹ שְׁלֹמֹה
  chosen: he named him Solomon
  alternatives:
  - he called his name Solomon
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to calling the name, but 'named him Solomon' is the natural English equivalent. The subject is singular masculine; context most naturally identifies David as the namer.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲהֵבוֹ
  chosen: loved him
  alternatives:
  - had affection for him
  lexicon: HALOT
  rationale: The verb אהב straightforwardly means 'love.' 'Loved him' is the plain and strongest natural rendering, and the suffix refers to the newborn son.
