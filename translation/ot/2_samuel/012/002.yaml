id: 2SA.12.2
reference: 2 Samuel 12:2
source:
  edition: WLC
  text: לְ/עָשִׁ֗יר הָיָ֛ה צֹ֥אן וּ/בָקָ֖ר הַרְבֵּ֥ה מְאֹֽד׃
translation:
  text: The rich man had very many sheep and cattle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rich man had a great many sheep and cattle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעָשִׁיר
  chosen: the rich man
  alternatives:
  - a rich man
  - for the rich man
  lexicon: HALOT
  rationale: The prefixed ל with היה expresses possession/existence ('there was to/for'),
    naturally rendered in English as 'had.' With the article on עָשִׁיר, 'the rich
    man' fits the narrative contrast with the poor man in the surrounding context
    better than the more indefinite 'a rich man.'
- source_word: הָיָה
  chosen: had
  alternatives:
  - there was
  - belonged to
  lexicon: HALOT
  rationale: Although the verb is literally 'was,' in this existential/possessive
    construction with לְ it is idiomatically best translated 'had' in clear modern
    English.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  - small livestock
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep and goats.
    Since the next term specifies cattle, 'sheep' is a natural and idiomatic representative
    rendering here, matching the common English contrast 'sheep and cattle.'
- source_word: וּבָקָר
  chosen: and cattle
  alternatives:
  - and herd animals
  - and oxen
  lexicon: HALOT
  rationale: בָּקָר denotes herd animals, commonly cattle. 'Cattle' is the most natural
    broad English equivalent in this livestock list.
- source_word: הַרְבֵּה מְאֹד
  chosen: very many
  alternatives:
  - in great abundance
  - exceedingly many
  - a great many
  lexicon: HALOT
  rationale: The combination intensifies quantity. 'Very many' preserves the emphasis
    straightforwardly without sounding archaic or overly expansive.
