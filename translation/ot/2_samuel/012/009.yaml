id: 2SA.12.9
reference: 2 Samuel 12:9
source:
  edition: WLC
  text: מַדּ֜וּעַ בָּזִ֣יתָ אֶת דְּבַ֣ר יְהוָ֗ה לַ/עֲשׂ֣וֹת הָ/רַע֮ ב/עינ/ו אֵ֣ת אוּרִיָּ֤ה
    הַֽ/חִתִּי֙ הִכִּ֣יתָ בַ/חֶ֔רֶב וְ/אֶ֨ת אִשְׁתּ֔/וֹ לָקַ֥חְתָּ לְּ/ךָ֖ לְ/אִשָּׁ֑ה
    וְ/אֹת֣/וֹ הָרַ֔גְתָּ בְּ/חֶ֖רֶב בְּנֵ֥י עַמּֽוֹן׀־־׃
translation:
  text: Why have you despised the word of the LORD, to do what is evil in his sight?
    You struck down Uriah the Hittite with the sword, and took his wife for yourself
    as a wife, and killed him with the sword of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have you treated the word of the LORD with contempt?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'took his wife for yourself as a wife'; the wording underscores David's
      personal appropriation of Uriah's wife.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with the sword of the sons of Ammon,' indicating that David caused
      Uriah's death through Ammonite agency.
    reason: cultural_note
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why then
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative introducing Nathan's accusation; simple 'Why' best
    matches the force in natural English.
- source_word: בָּזִיתָ
  chosen: have you despised
  alternatives:
  - have you treated with contempt
  - have you scorned
  lexicon: HALOT
  rationale: בזה conveys contempt/disdain, stronger than merely 'disobeyed.' Present
    perfect in English fits the rhetorical accusation looking at David's completed
    action with present moral force.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the command of the LORD
  - the matter of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or in context 'command.' 'Word of the
    LORD' preserves the Hebrew expression and allows the accusation to encompass both
    divine command and revealed will. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: לַעֲשׂוֹת הָרַע בְּעֵינָיו
  chosen: to do what is evil in his sight
  alternatives:
  - by doing evil in his sight
  - to do the evil in his eyes
  lexicon: HALOT
  rationale: Infinitive construction expresses result/purpose closely tied to despising
    the LORD's word. 'What is evil in his sight' is idiomatic English preserving the
    covenantal evaluation formula.
- source_word: הִכִּיתָ
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: נכה literally means 'strike/smite'; 'struck down' preserves the violent
    action without collapsing it immediately into the later explicit 'killed,' allowing
    the verse's rhetorical buildup to stand.
- source_word: בַחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard instrumental rendering. Repeated in the verse and retained for
    emphasis and formal correspondence.
- source_word: לָקַחְתָּ לְּךָ לְאִשָּׁה
  chosen: took his wife for yourself as a wife
  alternatives:
  - took his wife to be your wife
  - took his wife for yourself
  lexicon: HALOT
  rationale: The Hebrew is explicit and somewhat redundant; retaining 'for yourself
    as a wife' preserves the self-serving force of לְךָ and the marital designation
    לְאִשָּׁה. Slightly formal English is justified by the legal-moral gravity.
- source_word: הָרַגְתָּ
  chosen: killed
  alternatives:
  - murdered
  - put to death
  lexicon: HALOT
  rationale: הרג is the straightforward verb 'kill.' Although 'murdered' captures
    the moral reality, the Hebrew uses the common verb, and the surrounding context
    already conveys culpability.
- source_word: בְּחֶרֶב בְּנֵי עַמּוֹן
  chosen: with the sword of the Ammonites
  alternatives:
  - by the sword of the sons of Ammon
  - by the Ammonite sword
  lexicon: HALOT
  rationale: 'Construct phrase indicates instrumentality mediated through Ammonite
    forces. ''Ammonites'' is standard English for בְּנֵי עַמּוֹן. Repeating ''with
    the sword'' preserves the accusatory parallelism: David killed Uriah through foreign
    agents.'
- source_word: אוּרִיָּה הַחִתִּי
  chosen: Uriah the Hittite
  lexicon: HALOT
  rationale: Standard transliteration of the personal name and ethnic designation;
    preserves the text's identification of Uriah.
