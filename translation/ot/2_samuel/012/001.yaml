id: 2SA.12.1
reference: 2 Samuel 12:1
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֧ח יְהוָ֛ה אֶת נָתָ֖ן אֶל דָּוִ֑ד וַ/יָּבֹ֣א אֵלָ֗י/ו וַ/יֹּ֤אמֶר
    ל/וֹ֙ שְׁנֵ֣י אֲנָשִׁ֗ים הָיוּ֙ בְּ/עִ֣יר אֶחָ֔ת אֶחָ֥ד עָשִׁ֖יר וְ/אֶחָ֥ד רָֽאשׁ־־׃
translation:
  text: Then the LORD sent Nathan to David. He came to him and said to him, “There
    were two men in one city, one rich and one poor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There lived two men in one city.' The Hebrew more literally says, 'There
      were two men in one city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol narrative form is naturally rendered 'sent.'
    'Dispatched' is possible but less natural in modern English and too formal for
    the narrative flow.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
- source_word: אֶת נָתָן
  chosen: Nathan
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; the personal name
    is transliterated as 'Nathan' in keeping with the translation philosophy for names.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - against David
  lexicon: HALOT
  rationale: אֶל most straightforwardly means 'to' here, indicating the destination
    of Nathan's mission. 'Against' would overinterpret the preposition at this stage
    of the narrative.
- source_word: וַיָּבֹא אֵלָיו
  chosen: He came to him
  alternatives:
  - He went to him
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'come to' or 'go to.' 'Came to him' fits
    the English narrative perspective and preserves the directness of Nathan's approach.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The indirect object is explicit in Hebrew, so it is retained in English
    for transparency, though idiomatic English could omit 'to him.'
- source_word: שְׁנֵי אֲנָשִׁים
  chosen: two men
  alternatives:
  - two persons
  lexicon: HALOT
  rationale: אֲנָשִׁים is the ordinary plural of 'man' here, referring to two male
    individuals in Nathan's parable. 'Men' is gender-accurate and contextually appropriate.
- source_word: הָיוּ
  chosen: There were
  alternatives:
  - lived
  lexicon: HALOT
  rationale: The existential use of היה is best rendered 'there were' in this setup
    line. Some translations use 'lived,' drawing from context, but that adds a nuance
    not explicit in the verb itself.
- source_word: בְּעִיר אֶחָת
  chosen: in one city
  alternatives:
  - in a certain city
  - in the same city
  lexicon: HALOT
  rationale: The phrase is literally 'in one city.' In English, 'in one city' preserves
    the Hebrew wording while remaining natural. 'A certain city' is interpretive;
    'the same city' is possible but slightly more explicit than the Hebrew.
- source_word: אֶחָד עָשִׁיר
  chosen: one rich
  alternatives:
  - one was rich
  lexicon: HALOT
  rationale: The verbless clause is concise in Hebrew. In English, 'one rich' is not
    idiomatic by itself, so the full clause is smoothed to 'one rich' within the coordinated
    phrase 'one rich and one poor,' which communicates the predicative sense.
- source_word: וְאֶחָד רָאשׁ
  chosen: and one poor
  alternatives:
  - and one needy
  lexicon: HALOT
  rationale: רָאשׁ denotes one who is poor or impoverished. 'Poor' is the clearest
    and most idiomatic rendering in this contrast with 'rich.' 'Needy' is possible
    but weaker and less direct.
