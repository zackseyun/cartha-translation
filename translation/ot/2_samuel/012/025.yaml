id: 2SA.12.25
reference: 2 Samuel 12:25
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֗ח בְּ/יַד֙ נָתָ֣ן הַ/נָּבִ֔יא וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ יְדִ֣ידְיָ֑הּ
    בַּ/עֲב֖וּר יְהוָֽה־׃פ
translation:
  text: And he sent word through Nathan the prophet, and he named him Jedidiah, because
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jedidiah probably means 'beloved of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the hand of Nathan the prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: he sent word
  alternatives:
  - he sent
  - he sent by
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In this construction with בְּיַד
    ('by the hand of') Nathan, the sense is that the LORD communicated or commissioned
    through Nathan. 'Sent word' makes the implied communicative action clear in natural
    English without over-paraphrasing.
- source_word: בְּיַד נָתָן הַנָּבִיא
  chosen: through Nathan the prophet
  alternatives:
  - by the hand of Nathan the prophet
  - by Nathan the prophet
  lexicon: HALOT
  rationale: בְּיַד literally means 'by the hand of,' a common idiom for agency or
    mediation. 'Through Nathan the prophet' preserves the mediated action in readable
    modern English.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  chosen: he named him
  alternatives:
  - he called his name
  - he called him
  lexicon: HALOT
  rationale: The Hebrew idiom 'called his name' means 'named him.' English normally
    uses 'named him' in this context.
- source_word: יְדִידְיָהּ
  chosen: Jedidiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. The name likely means 'beloved of Yah(weh),' but the text presents
    it as a proper name, so transliteration is preferred in the main text.
- source_word: בַּעֲבוּר
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: בַּעֲבוּר here gives the reason or basis for the naming. 'Because of'
    is the clearest natural English rendering in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name יְהוָה is 'the
    LORD.'
