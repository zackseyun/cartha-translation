theological_decisions:
- issue: Subject of the verbs 'sent' and 'named'
  chosen_reading: The implied subject is the LORD for both verbs.
  alternative_readings:
  - David as the subject of 'named'
  - Nathan as the subject of 'named'
  rationale: In the immediate context (v. 24–25), the most natural continuation is
    that the LORD, having loved the child, sent a message through Nathan and gave
    the child the name Jedidiah. This also fits the agency phrase 'through Nathan
    the prophet.' The verse does not require importing further theological claims
    beyond divine initiative in naming.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    the source is genuinely ambiguous; here the syntax and context favor the LORD
    as subject.
