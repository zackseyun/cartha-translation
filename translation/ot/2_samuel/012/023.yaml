theological_decisions:
- issue: Whether David's statement implies conscious reunion with the deceased child
    in the afterlife
  chosen_reading: Render the statement straightforwardly as 'I am going to him' without
    specifying the nature of that going beyond death.
  alternative_readings:
  - A simple statement that David too will die and join the realm of the dead
  - An implication of personal reunion with the child after death
  rationale: The Hebrew states only that David will go to the child and the child
    will not return. It should not be expanded into a more specific doctrine of the
    intermediate state or salvation of infants. The translation preserves the text's
    wording and theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
