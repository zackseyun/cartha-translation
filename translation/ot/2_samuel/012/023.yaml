id: 2SA.12.23
reference: 2 Samuel 12:23
source:
  edition: WLC
  text: וְ/עַתָּ֣ה מֵ֗ת לָ֤/מָּה זֶּה֙ אֲנִ֣י צָ֔ם הַ/אוּכַ֥ל לַ/הֲשִׁיב֖/וֹ ע֑וֹד
    אֲנִי֙ הֹלֵ֣ךְ אֵלָ֔י/ו וְ/ה֖וּא לֹֽא יָשׁ֥וּב אֵלָֽ/י׀־׃
translation:
  text: But now he is dead. Why should I fast any longer? Can I bring him back again?
    I am going to him, but he will not return to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will go to him.' The Hebrew participle can express a certain future.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing David's changed response after the child's
    death. 'But now' best captures the contrast with the previous situation.
- source_word: מֵת
  chosen: he is dead
  alternatives:
  - he has died
  lexicon: HALOT
  rationale: 'The stative/resultative sense fits the context: the child is now in
    the state of death. English present ''is dead'' is natural and reflects the Hebrew
    predicate.'
- source_word: לָמָּה זֶּה
  chosen: Why should I
  alternatives:
  - Why this
  - Why do I
  lexicon: HALOT
  rationale: Idiomatic interrogative expression. Rendering it as 'Why should I' conveys
    the rhetorical force in context rather than a wooden 'Why this'.
- source_word: צָם
  chosen: fast
  alternatives:
  - keep fasting
  lexicon: HALOT
  rationale: Refers to David's fasting practice. The simple present after 'should
    I' is idiomatic English.
- source_word: עוֹד
  chosen: any longer
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: In this context it modifies the continuation of fasting after the child's
    death; 'any longer' expresses cessation of an ongoing action.
- source_word: הַאוּכַל
  chosen: Can I
  alternatives:
  - Am I able to
  - Could I
  lexicon: HALOT
  rationale: Expresses ability/possibility. 'Can I' is concise, natural English and
    preserves the rhetorical question.
- source_word: לַהֲשִׁיבוֹ
  chosen: bring him back
  alternatives:
  - restore him
  - cause him to return
  lexicon: HALOT
  rationale: Hiphil of שוב means cause to return. In context of death, 'bring him
    back' clearly communicates restoration to life without overinterpreting mechanism.
- source_word: עוֹד
  chosen: again
  alternatives:
  - anymore
  lexicon: HALOT
  rationale: Here עוֹד modifies the possibility of restoring the child, and 'again'
    fits the sense of returning to prior life.
- source_word: אֲנִי הֹלֵךְ אֵלָיו
  chosen: I am going to him
  alternatives:
  - I will go to him
  - I am about to go to him
  lexicon: HALOT
  rationale: The participle הֹלֵךְ can express imminent or certain future. 'I am going
    to him' preserves the participial sense while sounding natural in English.
- source_word: וְהוּא לֹא יָשׁוּב אֵלַי
  chosen: but he will not return to me
  alternatives:
  - and he cannot come back to me
  - but he is not returning to me
  lexicon: HALOT
  rationale: Qal imperfect of שוב naturally renders as future here. 'Return' preserves
    the lexical link with the earlier 'bring him back' and keeps the contrast clear.
