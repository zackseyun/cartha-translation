id: 2SA.12.19
reference: 2 Samuel 12:19
source:
  edition: WLC
  text: וַ/יַּ֣רְא דָּוִ֗ד כִּ֤י עֲבָדָי/ו֙ מִֽתְלַחֲשִׁ֔ים וַ/יָּ֥בֶן דָּוִ֖ד כִּ֣י
    מֵ֣ת הַ/יָּ֑לֶד וַ/יֹּ֨אמֶר דָּוִ֧ד אֶל עֲבָדָ֛י/ו הֲ/מֵ֥ת הַ/יֶּ֖לֶד וַ/יֹּ֥אמְרוּ
    מֵֽת־׃
translation:
  text: When David saw that his servants were whispering, David understood that the
    child was dead. So David said to his servants, “Is the child dead?” And they said,
    “He is dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads “dead” in the servants’ reply; English supplies “He
      is” for natural sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - noticed
  - perceived
  lexicon: HALOT
  rationale: The common sense of ראה here is visual perception leading to awareness.
    'Saw' is the most direct and natural rendering in context.
- source_word: מִתְלַחֲשִׁים
  chosen: were whispering
  alternatives:
  - were murmuring
  - were speaking quietly among themselves
  lexicon: HALOT
  rationale: The hitpael participle of לחש conveys hushed or whispered speech. 'Were
    whispering' best captures the discreet manner that prompts David's inference.
- source_word: וַיָּבֶן
  chosen: understood
  alternatives:
  - discerned
  - realized
  lexicon: HALOT
  rationale: בין here denotes mental discernment from observed clues. 'Understood'
    is clear and slightly more formal than 'realized,' fitting the narrative tone.
- source_word: מֵת
  chosen: was dead / is dead / He is dead
  alternatives:
  - had died
  - dead
  lexicon: HALOT
  rationale: The predicate adjective/verb expresses the state of death. In English,
    'was dead' after 'understood that' and 'is dead' in the direct question are idiomatic.
    'He is dead' makes the servants' reply explicit in natural English though Hebrew
    simply has 'dead.'
- source_word: הַיָּלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: יֶלֶד can mean child or boy. Since the verse concerns David's infant
    son, 'the child' is the most accurate and contextually appropriate rendering.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his slaves
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave depending on context. Here the focus
    is on royal household attendants rather than bonded status, so 'servants' is the
    best contextual rendering under optimal equivalence.
- source_word: הֲמֵת הַיֶּלֶד
  chosen: Is the child dead?
  alternatives:
  - Has the child died?
  lexicon: HALOT
  rationale: The interrogative plus predicate construction asks whether the child
    is dead. 'Is the child dead?' is the most straightforward English equivalent,
    while 'Has the child died?' is possible but slightly shifts from state to event.
- source_word: וַיֹּאמֶר ... וַיֹּאמְרוּ
  chosen: said ... said
  alternatives:
  - asked ... answered
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' Although English could specify 'asked'
    and 'answered' from context, retaining 'said' stays closer to the Hebrew while
    remaining natural.
