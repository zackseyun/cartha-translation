id: 2SA.12.27
reference: 2 Samuel 12:27
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח יוֹאָ֛ב מַלְאָכִ֖ים אֶל דָּוִ֑ד וַ/יֹּ֨אמֶר֙ נִלְחַ֣מְתִּי בְ/רַבָּ֔ה
    גַּם לָכַ֖דְתִּי אֶת עִ֥יר הַ/מָּֽיִם־־־׃
translation:
  text: Then Joab sent messengers to David and said, “I have fought against Rabbah;
    I have also captured the city of waters.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “the water city,” likely referring to the part of Rabbah controlling
      its water supply.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In this human context the term clearly refers to human agents sent with
    a report, so 'messengers' is the most natural rendering.
- source_word: נִלְחַמְתִּי בְרַבָּה
  chosen: I have fought against Rabbah
  alternatives:
  - I have fought at Rabbah
  - I have been fighting against Rabbah
  lexicon: HALOT
  rationale: The verb denotes engaging in battle; with בְ plus city name, English
    idiom is best represented by 'against Rabbah' in a siege/assault context. The
    perfect is rendered with present perfect to fit Joab's report of completed action
    with present relevance.
- source_word: רַבָּה
  chosen: Rabbah
  alternatives:
  - Rabbah of the Ammonites
  lexicon: HALOT
  rationale: The proper name is transliterated per project philosophy. The fuller
    identification is contextually known from the surrounding narrative and need not
    be repeated in the verse.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Also conveys the additive force linking the second achievement to the
    first.
- source_word: לָכַדְתִּי
  chosen: I have ... captured
  alternatives:
  - taken
  - seized
  lexicon: HALOT
  rationale: '''Captured'' fits military conquest language and pairs naturally with
    the report of battle.'
- source_word: עִיר הַמָּיִם
  chosen: the city of waters
  alternatives:
  - the water city
  - the city by the waters
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew expression without
    over-interpreting it. It likely refers to the water-supply district or lower city
    controlling the water source, but the Hebrew phrase itself is best kept transparent
    in the main text.
