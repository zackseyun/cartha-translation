id: 2SA.2.26
reference: 2 Samuel 2:26
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אַבְנֵ֜ר אֶל יוֹאָ֗ב וַ/יֹּ֨אמֶר֙ הֲ/לָ/נֶ֨צַח֙ תֹּ֣אכַל חֶ֔רֶב
    הֲ/ל֣וֹא יָדַ֔עְתָּה כִּֽי מָרָ֥ה תִהְיֶ֖ה בָּ/אַחֲרוֹנָ֑ה וְ/עַד מָתַי֙ לֹֽא
    תֹאמַ֣ר לָ/עָ֔ם לָ/שׁ֖וּב מֵ/אַחֲרֵ֥י אֲחֵי/הֶֽם־־־־׃
translation:
  text: Then Abner called to Joab and said, “Must the sword devour forever? Do you
    not know that it will be bitter in the end? How long will it be before you tell
    the people to turn back from pursuing their brothers?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from following after their brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלָנֶצַח
  chosen: forever
  alternatives:
  - without end
  - continually
  lexicon: HALOT
  rationale: The idiom הֲלָנֶצַח introduces a rhetorical question about unending continuation.
    'Forever' is the most natural concise English equivalent in this context.
- source_word: תֹּאכַל חֶרֶב
  chosen: the sword devour
  alternatives:
  - the sword consume
  - there be endless slaughter
  lexicon: HALOT
  rationale: The Hebrew personifies 'sword' as the subject of 'eat/devour.' Preserving
    the metaphor with 'devour' keeps the vividness of the source better than flattening
    it to 'slaughter,' while remaining readable.
- source_word: מָרָה
  chosen: bitter
  alternatives:
  - grievous
  - harsh
  lexicon: HALOT
  rationale: מָרָה here describes the eventual outcome of continued fighting. 'Bitter'
    preserves the metaphorical force and is idiomatic in English ('bitter in the end').
- source_word: בָּאַחֲרוֹנָה
  chosen: in the end
  alternatives:
  - afterward
  - at the last
  lexicon: HALOT
  rationale: This adverbial phrase points to the eventual result. 'In the end' is
    clear modern English and captures the temporal sense without archaism.
- source_word: וְעַד מָתַי
  chosen: How long will it be before
  alternatives:
  - Until when
  - How long
  lexicon: HALOT
  rationale: The phrase asks how much longer Joab will delay acting. Expanding slightly
    to 'How long will it be before' makes the English syntax natural while preserving
    the sense of delay.
- source_word: לֹא תֹאמַר לָעָם
  chosen: you tell the people
  alternatives:
  - you say to the people
  - you command the people
  lexicon: HALOT
  rationale: אמר with indirect command can mean 'say/tell.' 'Tell the people' is idiomatic
    and fits the military context without overstating it as a formal command.
- source_word: לָשׁוּב
  chosen: to turn back
  alternatives:
  - to return
  - to stop
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' Here it refers to ceasing pursuit
    and reversing course, so 'turn back' best captures the action.
- source_word: מֵאַחֲרֵי
  chosen: from pursuing
  alternatives:
  - from following after
  - from going after
  lexicon: HALOT
  rationale: Literally 'from after,' but in context of battle it denotes pursuit.
    'From pursuing' communicates the military sense clearly.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their brothers and fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' This preserves the familial/covenantal
    force of Israelites fighting fellow Israelites. 'Kinsmen' is possible but weaker
    in emotional impact.
