theological_decisions:
- issue: Gendered expression in לִבְנֵי חַיִל
  chosen_reading: valiant men
  alternative_readings:
  - valiant people
  - be courageous
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural expression is retained as 'men' rather than neutralized. In context
    David addresses a group of male military supporters of Saul, so the masculine
    wording is contextually appropriate rather than merely generic.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of אֲדֹנֵיכֶם
  chosen_reading: your lord
  alternative_readings:
  - your master
  - your ruler
  rationale: The term is not the divine name or a christological title here, but a
    human honorific for Saul. 'Lord' best reflects the political allegiance implied
    in the context without importing additional theology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
