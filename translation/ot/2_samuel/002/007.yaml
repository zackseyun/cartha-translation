id: 2SA.2.7
reference: 2 Samuel 2:7
source:
  edition: WLC
  text: וְ/עַתָּ֣ה תֶּחֱזַ֣קְנָה יְדֵי/כֶ֗ם וִֽ/הְיוּ֙ לִ/בְנֵי חַ֔יִל כִּי מֵ֖ת אֲדֹנֵי/כֶ֣ם
    שָׁא֑וּל וְ/גַם אֹתִ֗/י מָשְׁח֧וּ בֵית יְהוּדָ֛ה לְ/מֶ֖לֶךְ עֲלֵי/הֶֽם׀־־־־׃פ
translation:
  text: Now let your hands be strong, and be valiant men, for your lord Saul is dead,
    and also the house of Judah has anointed me king over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of valor.' The Hebrew expression denotes courage and capability,
      often in a martial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחֱזַקְנָה יְדֵיכֶם
  chosen: let your hands be strong
  alternatives:
  - strengthen your hands
  - be strong
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the hands being strong. Rendering
    it as 'let your hands be strong' preserves the concrete imagery while remaining
    natural in English. 'Strengthen your hands' is possible but sounds more causative
    than the Hebrew here.
- source_word: וִהְיוּ
  chosen: and be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Here היה functions as a straightforward exhortation following the previous
    jussive sense. 'Be' is the most natural English imperative-like rendering in context.
- source_word: לִבְנֵי חַיִל
  chosen: valiant men
  alternatives:
  - men of valor
  - worthy men
  - strong men
  lexicon: HALOT
  rationale: This expression commonly denotes courage and capability, especially in
    military or leadership contexts. 'Valiant men' is idiomatic modern English and
    preserves the masculine form present in the Hebrew. 'Men of valor' is more formal
    but less natural.
- source_word: כִּי מֵת אֲדֹנֵיכֶם שָׁאוּל
  chosen: for your lord Saul is dead
  alternatives:
  - for Saul your master has died
  - because your lord Saul has died
  lexicon: HALOT
  rationale: '''For'' fits the explanatory force of כִּי. ''Your lord'' reflects אֲדֹנֵיכֶם
    in a political sense of ruler/master. The stative English present ''is dead''
    is more natural than ''has died'' after the Hebrew perfect in this context.'
- source_word: אֲדֹנֵיכֶם
  chosen: your lord
  alternatives:
  - your master
  - your ruler
  lexicon: HALOT
  rationale: In context David addresses Saul's former supporters, and the term refers
    to Saul as their sovereign. 'Lord' best captures the political and honorific force
    without flattening it to merely domestic 'master'.
- source_word: וְגַם אֹתִי
  chosen: and also me
  alternatives:
  - and me also
  - moreover me
  lexicon: HALOT
  rationale: 'The phrase adds a further motivating fact: not only is Saul dead, but
    David has been anointed. ''And also me'' preserves the emphasis on David as the
    object of anointing, though the English sentence is smoothed in the final rendering.'
- source_word: מָשְׁחוּ
  chosen: has anointed
  alternatives:
  - anointed
  lexicon: HALOT
  rationale: The verb denotes ceremonial appointment by anointing. In English, 'has
    anointed' communicates the completed action with present relevance, though simple
    past is also possible.
- source_word: בֵית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - the people of Judah
  - Judah
  lexicon: HALOT
  rationale: The Hebrew literally says 'house of Judah,' a collective designation
    for the tribe/clan grouping. Retaining 'house' preserves the source wording and
    its corporate sense.
- source_word: לְמֶלֶךְ עֲלֵיהֶם
  chosen: king over them
  alternatives:
  - as king over them
  - to be king over them
  lexicon: HALOT
  rationale: The phrase marks the role to which David was anointed. 'King over them'
    is concise and natural, and it preserves the governing relationship expressed
    by עֲלֵיהֶם.
