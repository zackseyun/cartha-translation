id: 2SA.2.21
reference: 2 Samuel 2:21
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר ל֣/וֹ אַבְנֵ֗ר נְטֵ֤ה לְ/ךָ֙ עַל יְמִֽינְ/ךָ֙ א֣וֹ עַל שְׂמֹאלֶ֔/ךָ
    וֶ/אֱחֹ֣ז לְ/ךָ֗ אֶחָד֙ מֵֽ/הַ/נְּעָרִ֔ים וְ/קַח לְ/ךָ֖ אֶת חֲלִצָת֑/וֹ וְ/לֹֽא
    אָבָ֣ה עֲשָׂהאֵ֔ל לָ/ס֖וּר מֵ/אַחֲרָֽי/ו־־־־־׃
translation:
  text: Then Abner said to him, “Turn aside to your right or to your left, and seize
    for yourself one of the young men, and take his gear for yourself.” But Asahel
    was not willing to turn aside from following him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “take his armor for yourself.” The Hebrew term likely refers to equipment
      stripped from a fallen fighter; the exact item is not fully certain.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטֵה
  chosen: Turn aside
  alternatives:
  - Turn
  - Veer aside
  lexicon: HALOT
  rationale: The imperative from נטה in this pursuit context means to turn off one's
    present course. 'Turn aside' captures the directional sense better than the bare
    'turn.'
- source_word: עַל יְמִינְךָ אֹו עַל שְׂמֹאלֶךָ
  chosen: to your right or to your left
  alternatives:
  - to the right or to the left
  lexicon: HALOT
  rationale: The pronominal suffixes are second masculine singular, so 'your right
    ... your left' preserves the direct address.
- source_word: וֶאֱחֹז לְךָ
  chosen: and seize for yourself
  alternatives:
  - and grab for yourself
  - and take hold of for yourself
  lexicon: HALOT
  rationale: אחז commonly means seize or take hold. 'Seize' fits the martial setting
    and the reflexive nuance of לְךָ is retained with 'for yourself.'
- source_word: אֶחָד מֵהַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one of the servants
  - one of the soldiers
  lexicon: HALOT
  rationale: נְעָרִים literally means 'young men.' In military narrative it can denote
    attendants or soldiers, but 'young men' preserves the lexical form without over-specifying
    rank.
- source_word: וְקַח לְךָ אֶת חֲלִצָתוֹ
  chosen: and take his gear for yourself
  alternatives:
  - and take his spoil for yourself
  - and take his armor for yourself
  - and take his clothing for yourself
  lexicon: HALOT
  rationale: חֲלִיצָה/חֲלִצָתוֹ here refers to what is stripped from a fallen warrior,
    likely equipment or armor. 'Gear' is readable modern English and broad enough
    to avoid false precision, while fitting the combat context.
- source_word: וְלֹא אָבָה
  chosen: was not willing
  alternatives:
  - refused
  - was unwilling
  lexicon: HALOT
  rationale: אבה expresses willingness or consent. 'Was not willing' preserves the
    verbal nuance without making it sound more abrupt than the Hebrew requires.
- source_word: לָסוּר מֵאַחֲרָיו
  chosen: to turn aside from following him
  alternatives:
  - to stop following him
  - to turn away from behind him
  lexicon: HALOT
  rationale: סור means turn aside/depart, and מֵאַחֲרָיו literally means 'from after
    him.' 'From following him' gives the idiomatic sense in English while preserving
    the pursuit imagery.
