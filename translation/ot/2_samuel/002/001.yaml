id: 2SA.2.1
reference: 2 Samuel 2:1
source:
  edition: WLC
  text: וַ/יְהִ֣י אַֽחֲרֵי כֵ֗ן וַ/יִּשְׁאַל֩ דָּוִ֨ד בַּֽ/יהוָ֤ה לֵ/אמֹר֙ הַ/אֶעֱלֶ֗ה
    בְּ/אַחַת֙ עָרֵ֣י יְהוּדָ֔ה וַ/יֹּ֧אמֶר יְהוָ֛ה אֵלָ֖י/ו עֲלֵ֑ה וַ/יֹּ֧אמֶר דָּוִ֛ד
    אָ֥נָה אֶעֱלֶ֖ה וַ/יֹּ֥אמֶר חֶבְרֹֽנָ/ה־׀׃
translation:
  text: After this, David inquired of the LORD, saying, “Shall I go up into one of
    the cities of Judah?” And the LORD said to him, “Go up.” Then David said, “Where
    shall I go up?” And he said, “To Hebron.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - And it happened after this
  - Afterward
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally means 'and it was after this/so.'
    'After this' preserves the temporal transition in natural modern English without
    over-literal stiffness.
- source_word: וַיִּשְׁאַל ... בַּיהוָה
  chosen: inquired of the LORD
  alternatives:
  - asked the LORD
  - consulted the LORD
  lexicon: HALOT
  rationale: שׁאל with ב plus the divine name commonly denotes seeking divine guidance,
    not merely asking a question. 'Inquired of' best captures this established sense
    in readable English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated forms.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - asking
  lexicon: HALOT
  rationale: This infinitive introduces the content of David's inquiry. 'Saying' is
    concise and standard in English narrative representation of direct speech.
- source_word: הַאֶעֱלֶה
  chosen: Shall I go up
  alternatives:
  - Should I go up
  - Am I to go up
  lexicon: HALOT
  rationale: עלה here refers to going up to the hill country/cities of Judah. 'Shall
    I go up' preserves both the interrogative force and the directional idiom.
- source_word: בְּאַחַת עָרֵי יְהוּדָה
  chosen: into one of the cities of Judah
  alternatives:
  - to one of the cities of Judah
  - into any one of the cities of Judah
  lexicon: HALOT
  rationale: The phrase indicates movement toward and into one among Judah's cities.
    'One of the cities of Judah' is the clearest idiomatic rendering; 'into' fits
    the motion sense of עלה in context.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  - Go
  lexicon: HALOT
  rationale: The imperative repeats the same verb as David's question, so 'Go up'
    preserves the lexical repetition and the geographical nuance.
- source_word: אָנָה
  chosen: Where
  alternatives:
  - To where
  - Whither
  lexicon: HALOT
  rationale: The adverb asks for destination. 'Where' is natural modern English; 'to
    where' is possible but less idiomatic in this dialogue.
- source_word: חֶבְרֹנָה
  chosen: To Hebron
  alternatives:
  - Hebron
  - Toward Hebron
  lexicon: HALOT
  rationale: The directional he on the place name marks motion toward the city. English
    normally expresses this with 'to Hebron.'
