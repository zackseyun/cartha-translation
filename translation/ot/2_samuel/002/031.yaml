id: 2SA.2.31
reference: 2 Samuel 2:31
source:
  edition: WLC
  text: וְ/עַבְדֵ֣י דָוִ֗ד הִכּוּ֙ מִ/בִּנְיָמִ֔ן וּ/בְ/אַנְשֵׁ֖י אַבְנֵ֑ר שְׁלֹשׁ
    מֵא֧וֹת וְ/שִׁשִּׁ֛ים אִ֖ישׁ מֵֽתוּ־׃
translation:
  text: But David’s servants struck down from Benjamin and from Abner’s men three
    hundred and sixty men, who died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And David’s servants struck down ...' The Hebrew conjunction can be
      read simply as 'and'; the main text uses 'but' to reflect the contrast with
      the previous verse’s casualty report.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַבְדֵי
  chosen: But ... servants
  alternatives:
  - And ... servants
  lexicon: HALOT
  rationale: The conjunction can be rendered 'and' or, in narrative contrast, 'but.'
    In context this verse contrasts David's losses in v. 30 with the losses inflicted
    by David's side here, so 'But' brings out the adversative force naturally in English.
    עֲבָדִים is rendered 'servants' here rather than 'slaves' because it refers to
    royal retainers/soldiers in service to David, not emphasizing bonded status.
- source_word: דָוִד
  chosen: David’s
  rationale: Standard transliteration of the personal name.
- source_word: הִכּוּ
  chosen: struck down
  alternatives:
  - struck
  - killed
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite,' and in battle contexts often implies
    lethal defeat. 'Struck down' preserves the military sense without over-paraphrasing;
    the following 'who died' makes the lethal result explicit.
- source_word: מִ/בִּנְיָמִן
  chosen: from Benjamin
  alternatives:
  - of Benjamin
  - among the Benjaminites
  lexicon: HALOT
  rationale: The preposition מִן marks the group from which the casualties came. 'From
    Benjamin' is a concise English rendering preserving the tribal reference.
- source_word: וּ/בְ/אַנְשֵׁי אַבְנֵר
  chosen: and from Abner’s men
  alternatives:
  - and among Abner's men
  - and of Abner's men
  lexicon: HALOT
  rationale: The phrase identifies a second group among the casualties. Although the
    preposition is ב, in this casualty-count construction English idiom is best expressed
    as 'from Abner's men,' parallel to 'from Benjamin.' אַנְשֵׁי is rendered 'men'
    in the sense of fighting men/warriors.
- source_word: שְׁלֹשׁ מֵאוֹת וְשִׁשִּׁים
  chosen: three hundred and sixty
  rationale: Straightforward cardinal number rendering.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - persons
  lexicon: HALOT
  rationale: Although singular in Hebrew after a number, English idiom requires the
    plural. 'Men' is gender-accurate and contextually appropriate for combatants.
- source_word: מֵתוּ
  chosen: who died
  alternatives:
  - fell dead
  - died
  lexicon: HALOT
  rationale: מות is the standard verb 'die.' Rendering it as a relative clause avoids
    awkward English after the object phrase while preserving the Hebrew statement
    of result. It also avoids collapsing הִכּוּ and מֵתוּ into a single English verb.
