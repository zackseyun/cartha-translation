id: 2SA.2.5
reference: 2 Samuel 2:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח דָּוִד֙ מַלְאָכִ֔ים אֶל אַנְשֵׁ֖י יָבֵ֣ישׁ גִּלְעָ֑ד וַ/יֹּ֣אמֶר
    אֲלֵי/הֶ֗ם בְּרֻכִ֤ים אַתֶּם֙ לַֽ/יהוָ֔ה אֲשֶׁ֨ר עֲשִׂיתֶ֜ם הַ/חֶ֣סֶד הַ/זֶּ֗ה
    עִם אֲדֹֽנֵי/כֶם֙ עִם שָׁא֔וּל וַֽ/תִּקְבְּר֖וּ אֹתֽ/וֹ־־־׃
translation:
  text: Then David sent messengers to the men of Jabesh-gilead and said to them, “May
    you be blessed by the LORD, because you have shown this kindness to your lord,
    to Saul, and have buried him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Blessed are you by the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew hesed; often denotes kindness, loyalty, or faithful love.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In this narrative context the word refers to human agents sent by David,
    not heavenly beings. 'Messengers' is the plain and natural English rendering.
- source_word: אַנְשֵׁי יָבֵישׁ גִּלְעָד
  chosen: the men of Jabesh-gilead
  alternatives:
  - the people of Jabesh-gilead
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct ('men of'). Per gender-accurate
    policy, the masculine form is retained rather than neutralized.
- source_word: בְּרֻכִים אַתֶּם לַיהוָה
  chosen: May you be blessed by the LORD
  alternatives:
  - Blessed are you by the LORD
  - You are blessed of the LORD
  lexicon: HALOT
  rationale: The clause is a blessing formula. 'May you be blessed' gives idiomatic
    English while preserving the benedictory force. לַיהוָה here is rendered 'by the
    LORD' to express the source of blessing naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - faithful love
  lexicon: HALOT
  rationale: Here חֶסֶד refers to a concrete act of loyal kindness shown to Saul in
    burying him. 'Kindness' is clear modern English and fits the immediate action,
    while the broader covenantal nuance is less foregrounded than in some other contexts.
- source_word: אֲדֹנֵיכֶם
  chosen: your lord
  alternatives:
  - your master
  lexicon: HALOT
  rationale: The term denotes Saul as their ruler/master. 'Your lord' preserves the
    political and honorific sense in context and matches the singular relationship
    to Saul.
- source_word: עִם שָׁאוּל
  chosen: to Saul
  alternatives:
  - with Saul
  - for Saul
  lexicon: HALOT
  rationale: Although the preposition is literally 'with,' English idiom after 'shown
    this kindness' more naturally takes 'to Saul.' This preserves the sense without
    woodenness.
- source_word: וַתִּקְבְּרוּ אֹתוֹ
  chosen: and have buried him
  alternatives:
  - and buried him
  lexicon: HALOT
  rationale: The perfective sequence after אֲשֶׁר עֲשִׂיתֶם is naturally rendered
    in English as a completed action linked to the prior clause. 'Have buried' highlights
    the completed deed being commended.
