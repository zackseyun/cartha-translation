id: 2SA.2.16
reference: 2 Samuel 2:16
source:
  edition: WLC
  text: וַֽ/יַּחֲזִ֜קוּ אִ֣ישׁ בְּ/רֹ֣אשׁ רֵעֵ֗/הוּ וְ/חַרְבּ/וֹ֙ בְּ/צַ֣ד רֵעֵ֔/הוּ
    וַֽ/יִּפְּל֖וּ יַחְדָּ֑ו וַ/יִּקְרָא֙ לַ/מָּק֣וֹם הַ/ה֔וּא חֶלְקַ֥ת הַצֻּרִ֖ים
    אֲשֶׁ֥ר בְּ/גִבְעֽוֹן׀׃
translation:
  text: Each man seized his companion by the head, and his sword was in his companion’s
    side, so they fell together. Therefore that place, which is in Gibeon, was called
    Helkath-hazzurim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Helkath-hazzurim is a transliteration of the Hebrew place name. Its exact
      sense is uncertain; proposed meanings include 'Field of the Sides,' 'Field of
      the Sharp Swords,' and other similar renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲזִקוּ
  chosen: seized
  alternatives:
  - took hold of
  - gripped
  lexicon: HALOT
  rationale: The verb חזק in this context denotes forceful grasping in combat, not
    merely strengthening or holding fast. 'Seized' conveys sudden violent action naturally
    in English.
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - each one
  - a man
  lexicon: HALOT
  rationale: 'Distributive sense is required by the combat scene: each combatant acted
    against his counterpart. ''Each man'' preserves the masculine singular and the
    pairwise action.'
- source_word: בְּרֹאשׁ רֵעֵהוּ
  chosen: by the head ... his companion
  alternatives:
  - by the head of the other
  - by his fellow's head
  lexicon: HALOT
  rationale: רֹאשׁ is literally 'head,' and רֵעַ here refers to the opposing counterpart
    in the matched contest. 'Companion' is a natural rendering that need not imply
    friendship, only the other member of the pair.
- source_word: וְחַרְבּוֹ בְּצַד רֵעֵהוּ
  chosen: and his sword was in his companion’s side
  alternatives:
  - and his sword into his companion's side
  - with his sword in his fellow's side
  lexicon: HALOT
  rationale: The Hebrew is verbless after the conjunction, giving a compressed battle
    description. Rendering with 'was in' preserves the terse vividness without over-specifying
    an implied verb such as 'thrust.' צַד is best rendered 'side.'
- source_word: וַיִּפְּלוּ יַחְדָּו
  chosen: so they fell together
  alternatives:
  - and they fell together
  - and they both fell at the same time
  lexicon: HALOT
  rationale: Narrative waw plus verb continues the sequence; 'so' captures the resultative
    force in English. יַחְדָּו emphasizes simultaneity.
- source_word: וַיִּקְרָא לַמָּקוֹם הַהוּא
  chosen: Therefore that place ... was called
  alternatives:
  - and he called that place
  - and that place was named
  lexicon: HALOT
  rationale: The Hebrew has an impersonal/unspecified singular ('one called'), which
    idiomatic English commonly renders passively. 'Therefore' reflects the naming
    as a consequence of the event.
- source_word: חֶלְקַת הַצֻּרִים
  chosen: Helkath-hazzurim
  alternatives:
  - Field of the Sides
  - Field of the Sharp Swords
  - Portion of the Rocks
  lexicon: HALOT
  rationale: This is a place name and should be transliterated per project philosophy
    for names. The underlying sense is uncertain and debated, so the transliteration
    avoids falsely resolving the etymology; lexical alternatives are preserved in
    a footnote.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  chosen: which is in Gibeon
  alternatives:
  - that is at Gibeon
  - in Gibeon
  lexicon: HALOT
  rationale: This relative clause identifies the location of the named place. 'Which
    is in Gibeon' is straightforward and natural.
