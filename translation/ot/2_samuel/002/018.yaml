id: 2SA.2.18
reference: 2 Samuel 2:18
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ שָׁ֗ם שְׁלֹשָׁה֙ בְּנֵ֣י צְרוּיָ֔ה יוֹאָ֥ב וַ/אֲבִישַׁ֖י וַ/עֲשָׂהאֵ֑ל
    וַ/עֲשָׂהאֵל֙ קַ֣ל בְּ/רַגְלָ֔י/ו כְּ/אַחַ֥ד הַ/צְּבָיִ֖ם אֲשֶׁ֥ר בַּ/שָּׂדֶֽה־׃
translation:
  text: 'Now the three sons of Zeruiah were there: Joab, Abishai, and Asahel. And
    Asahel was swift on his feet like one of the gazelles that are in the open field.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one of the deer that are in the field.' The Hebrew צְבִי can be
      rendered more broadly as a deer-like wild animal, though 'gazelle' is the more
      precise choice here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ שָׁם
  chosen: were there
  alternatives:
  - happened to be there
  - were present there
  lexicon: HALOT
  rationale: The clause simply marks presence at the scene. English idiom is best
    served by 'were there'; 'now' is added at the sentence level to carry the narrative
    waw without over-literalness.
- source_word: שְׁלֹשָׁה בְּנֵי צְרוּיָה
  chosen: the three sons of Zeruiah
  alternatives:
  - three sons of Zeruiah
  lexicon: HALOT
  rationale: The phrase identifies the well-known trio. Adding 'the' is natural English
    and reflects the specific group in view.
- source_word: יוֹאָב וַאֲבִישַׁי וַעֲשָׂהאֵל
  chosen: Joab, Abishai, and Asahel
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: קַל
  chosen: swift
  alternatives:
  - light
  - quick
  - fleet
  lexicon: HALOT
  rationale: Here the adjective describes speed rather than weight. 'Swift' is natural,
    concise, and fits the simile that follows.
- source_word: בְּרַגְלָיו
  chosen: on his feet
  alternatives:
  - in his feet
  - with his feet
  - footed
  lexicon: HALOT
  rationale: The Hebrew idiom expresses speed in running. 'On his feet' is idiomatic
    English that preserves the bodily image.
- source_word: כְּאַחַד הַצְּבָיִם
  chosen: like one of the gazelles
  alternatives:
  - like one of the deer
  - like one of the roebucks
  lexicon: HALOT
  rationale: צְבִי commonly denotes gazelle in biblical Hebrew. 'Gazelles' best conveys
    the animal known for speed; 'deer' is broader and less precise.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  chosen: that are in the open field
  alternatives:
  - that are in the field
  - of the field
  - in the countryside
  lexicon: HALOT
  rationale: The phrase locates wild gazelles in their natural habitat. 'Open field'
    communicates the sense of uncultivated open country and reads naturally in English.
