id: 2SA.2.12
reference: 2 Samuel 2:12
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ אַבְנֵ֣ר בֶּן נֵ֔ר וְ/עַבְדֵ֖י אִֽישׁ בֹּ֣שֶׁת בֶּן שָׁא֑וּל מִֽ/מַּחֲנַ֖יִם
    גִּבְעֽוֹנָ/ה־־־׃
translation:
  text: Then Abner son of Ner, and the servants of Ish-bosheth son of Saul, went out
    from Mahanaim to Gibeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Ish-bosheth'; the same man is called 'Eshbaal' in 1 Chronicles 8:33;
      9:39.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: Then ... went out
  alternatives:
  - And ... went out
  - set out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then' gives natural
    English story flow. Although the verb is singular ('he went out'), the following
    coordinated subject includes Abner and the servants, so idiomatic English pluralizes
    the verb to match the compound subject.
- source_word: אַבְנֵר בֶּן נֵר
  chosen: Abner son of Ner
  rationale: Personal names are transliterated by standard convention, and the patronymic
    is rendered straightforwardly as 'son of'.
- source_word: וְעַבְדֵי
  chosen: the servants of
  alternatives:
  - the men of
  - the attendants of
  lexicon: HALOT
  rationale: עֶבֶד commonly denotes servant/official/retainer depending on context.
    Here it refers to those attached to Ish-bosheth in a military-political setting.
    'Servants' preserves the lexical link without over-specifying rank; 'men' is too
    vague, and 'attendants' too domestic.
- source_word: אִישׁ בֹּשֶׁת
  chosen: Ish-bosheth
  alternatives:
  - Eshbaal
  rationale: The Masoretic text reads Ish-bosheth, the standard English form for this
    figure in Samuel. The alternative form Eshbaal reflects the name as preserved
    in Chronicles, but this verse's Hebrew supports Ish-bosheth.
- source_word: בֶּן שָׁאוּל
  chosen: son of Saul
  rationale: Rendered literally as a patronymic identifying Ish-bosheth.
- source_word: מִמַּחֲנַיִם
  chosen: from Mahanaim
  rationale: The prefixed preposition מִן is rendered 'from'; Mahanaim is transliterated
    as a place name.
- source_word: גִּבְעֹנָה
  chosen: to Gibeon
  alternatives:
  - toward Gibeon
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location.
    In English, 'to Gibeon' is the most natural rendering, though 'toward Gibeon'
    is a possible more formal alternative.
