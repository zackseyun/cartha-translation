id: 2SA.2.2
reference: 2 Samuel 2:2
source:
  edition: WLC
  text: וַ/יַּ֤עַל שָׁם֙ דָּוִ֔ד וְ/גַ֖ם שְׁתֵּ֣י נָשָׁ֑י/ו אֲחִינֹ֨עַם֙ הַ/יִּזְרְעֵלִ֔ית
    וַ/אֲבִיגַ֕יִל אֵ֖שֶׁת נָבָ֥ל הַֽ/כַּרְמְלִֽי׃
translation:
  text: 'So David went up there, and also his two wives: Ahinoam the Jezreelite and
    Abigail, the wife of Nabal the Carmelite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Abigail, Nabal's wife, the woman from Carmel.' The Hebrew identifies
      Abigail by her former marriage and Nabal by his origin from Carmel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In narrative travel contexts it often
    reflects movement to a higher place or to a significant destination. 'Went up'
    preserves the Hebrew directional nuance better than the flatter 'went.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - to there
  lexicon: HALOT
  rationale: The adverb indicates destination/location already established in context.
    English idiom prefers 'there' after 'went up.'
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: The combination adds David's wives to the action. 'And also' preserves
    the additive force without overtranslating.
- source_word: שְׁתֵּי נָשָׁיו
  chosen: his two wives
  alternatives:
  - the two wives of his
  lexicon: HALOT
  rationale: This construct phrase straightforwardly denotes David's two wives. Natural
    English word order is used while preserving the possessive and number.
- source_word: אֲחִינֹעַם
  chosen: Ahinoam
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַיִּזְרְעֵלִית
  chosen: the Jezreelite
  alternatives:
  - from Jezreel
  - the woman from Jezreel
  lexicon: HALOT
  rationale: The gentilic adjective identifies Ahinoam by origin. 'The Jezreelite'
    is concise and formally close to the Hebrew, while remaining clear in English.
- source_word: וַאֲבִיגַיִל
  chosen: and Abigail
  rationale: The conjunction simply coordinates the second wife in the list; the name
    is transliterated.
- source_word: אֵשֶׁת נָבָל
  chosen: the wife of Nabal
  alternatives:
  - Nabal's wife
  lexicon: HALOT
  rationale: The construct means 'wife of Nabal.' Although Abigail is now David's
    wife, the Hebrew uses this identifying description tied to the earlier narrative.
    'The wife of Nabal' preserves the source wording and literary linkage.
- source_word: הַכַּרְמְלִי
  chosen: the Carmelite
  alternatives:
  - from Carmel
  lexicon: HALOT
  rationale: The gentilic identifies Nabal as a man of Carmel. 'The Carmelite' is
    the most direct rendering of the Hebrew adjective.
