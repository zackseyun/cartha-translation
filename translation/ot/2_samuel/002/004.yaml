id: 2SA.2.4
reference: 2 Samuel 2:4
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ אַנְשֵׁ֣י יְהוּדָ֔ה וַ/יִּמְשְׁחוּ שָׁ֧ם אֶת דָּוִ֛ד לְ/מֶ֖לֶךְ
    עַל בֵּ֣ית יְהוּדָ֑ה וַ/יַּגִּ֤דוּ לְ/דָוִד֙ לֵ/אמֹ֔ר אַנְשֵׁי֙ יָבֵ֣ישׁ גִּלְעָ֔ד
    אֲשֶׁ֥ר קָבְר֖וּ אֶת שָׁאֽוּל־־־־׃ס
translation:
  text: Then the men of Judah came, and there they anointed David king over the house
    of Judah. And they told David, saying, "The men of Jabesh-gilead were the ones
    who buried Saul."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, "who buried Saul."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: 'Common wayyiqtol of בוא, here narrating arrival: ''came'' is the natural
    English narrative equivalent.'
- source_word: אַנְשֵׁי יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the men of the tribe of Judah
  - the people of Judah
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of,' not a generic 'people.' This follows
    the gender-accurate policy while fitting the likely representative male leadership
    in the scene.
- source_word: וַיִּמְשְׁחוּ
  chosen: anointed
  alternatives:
  - consecrated
  lexicon: HALOT
  rationale: משׁח in royal contexts is the standard verb for anointing a king; 'anointed'
    preserves the political and theological resonance.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of place; 'there' is the straightforward rendering and preserves
    the narrative setting.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  - to be king
  lexicon: HALOT
  rationale: 'Predicate complement after משׁח: English idiom is ''anointed David king.''
    ''As king'' is possible but less direct.'
- source_word: עַל בֵּית יְהוּדָה
  chosen: over the house of Judah
  alternatives:
  - over Judah
  - over the clan of Judah
  lexicon: HALOT
  rationale: בֵּית is retained as 'house' to preserve the corporate/tribal sense rather
    than flattening it to merely territorial Judah.
- source_word: וַיַּגִּדוּ לְדָוִד לֵאמֹר
  chosen: And they told David, saying
  alternatives:
  - And they reported to David
  - And they informed David
  lexicon: HALOT
  rationale: נגד in the Hiphil is 'tell/report.' The infinitive לֵאמֹר introduces
    direct speech; 'told David, saying' keeps the Hebrew structure with readable English.
- source_word: אַנְשֵׁי יָבֵישׁ גִּלְעָד
  chosen: The men of Jabesh-gilead
  alternatives:
  - The men of Jabesh in Gilead
  - The people of Jabesh-gilead
  lexicon: HALOT
  rationale: Standard English transliteration of the place name is 'Jabesh-gilead.'
    Again, אַנְשֵׁי is rendered 'men of' rather than generalized 'people of.'
- source_word: אֲשֶׁר קָבְרוּ אֶת שָׁאוּל
  chosen: were the ones who buried Saul
  alternatives:
  - buried Saul
  - it was they who buried Saul
  lexicon: HALOT
  rationale: The relative clause can be rendered simply 'who buried Saul,' but 'were
    the ones who' brings out the identificational force in the report without overtranslation.
