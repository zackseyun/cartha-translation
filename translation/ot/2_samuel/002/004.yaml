theological_decisions:
- issue: Gendered collective language in אַנְשֵׁי
  chosen_reading: Render as 'men' in both occurrences
  alternative_readings:
  - people
  - leaders
  rationale: The Hebrew noun is grammatically and lexically male. In this narrative
    context it likely refers to male representatives/warriors/elders rather than an
    abstract populace. Following the translation philosophy, gender-accurate wording
    is preferred over neutralizing the term.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Retention of 'house' in 'house of Judah'
  chosen_reading: Keep 'house of Judah' in the main text
  alternative_readings:
  - Judah
  - tribe of Judah
  rationale: The phrase denotes the Judahite polity/tribal house. Retaining 'house'
    preserves the source-text imagery and avoids importing a narrower modern political
    term.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
