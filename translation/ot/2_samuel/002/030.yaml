id: 2SA.2.30
reference: 2 Samuel 2:30
source:
  edition: WLC
  text: וְ/יוֹאָ֗ב שָׁ֚ב מֵ/אַחֲרֵ֣י אַבְנֵ֔ר וַ/יִּקְבֹּ֖ץ אֶת כָּל הָ/עָ֑ם וַ/יִּפָּ֨קְד֜וּ
    מֵ/עַבְדֵ֥י דָוִ֛ד תִּשְׁעָֽה עָשָׂ֥ר אִ֖ישׁ וַ/עֲשָׂה אֵֽל־־־־׃
translation:
  text: And Joab returned from pursuing Abner, and he gathered all the troops. When
    they were counted, nineteen men of David’s servants were missing, besides Asahel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''nineteen men, and Asahel.'' The wording indicates Asahel is counted
      in addition to the nineteen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in the qal commonly means 'return.' 'Returned' is the most
    natural English narrative rendering here.
- source_word: מֵאַחֲרֵי אַבְנֵר
  chosen: from pursuing Abner
  alternatives:
  - from after Abner
  - from following Abner
  lexicon: HALOT
  rationale: Literally 'from after Abner,' but in this military context the idiom
    means ceasing pursuit. 'From pursuing Abner' conveys the plain sense in readable
    English.
- source_word: וַיִּקְבֹּץ אֶת כָּל הָעָם
  chosen: and he gathered all the troops
  alternatives:
  - and he gathered all the people
  - and he assembled all the men
  lexicon: HALOT
  rationale: עָם literally means 'people,' but in this immediate battle context it
    refers to Joab's fighting force. 'Troops' communicates the referent more clearly
    in English without undue paraphrase.
- source_word: וַיִּפָּקְדוּ
  chosen: When they were counted
  alternatives:
  - and they were mustered
  - and they were numbered
  lexicon: HALOT
  rationale: The nifal of פקד here denotes being counted or mustered. 'When they were
    counted' fits the narrative flow and explains how the loss was discovered.
- source_word: מֵעַבְדֵי דָוִד
  chosen: of David’s servants
  alternatives:
  - of David's men
  - from David's servants
  lexicon: HALOT
  rationale: עֲבָדִים literally means 'servants.' In a royal-military setting it can
    denote those in David's service, including his fighting men. I retained 'servants'
    for lexical transparency while allowing the military sense to be inferred from
    context.
- source_word: תִּשְׁעָה עָשָׂר אִישׁ
  chosen: nineteen men
  alternatives:
  - nineteen persons
  lexicon: HALOT
  rationale: Straightforward cardinal number plus איש. 'Men' is the natural and gender-accurate
    rendering in this military context.
- source_word: וַעֲשָׂה אֵל
  chosen: besides Asahel
  alternatives:
  - and Asahel
  - plus Asahel
  lexicon: HALOT
  rationale: The consonantal text reflects the proper name Asahel split by orthography/pointing
    in the supplied line. Context from the parallel battle report requires the sense
    'and Asahel' as an additional casualty beyond the nineteen; idiomatic English
    expresses this as 'besides Asahel.'
