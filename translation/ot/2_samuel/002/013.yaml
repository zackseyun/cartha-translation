id: 2SA.2.13
reference: 2 Samuel 2:13
source:
  edition: WLC
  text: וְ/יוֹאָ֨ב בֶּן צְרוּיָ֜ה וְ/עַבְדֵ֤י דָוִד֙ יָֽצְא֔וּ וַֽ/יִּפְגְּשׁ֛וּ/ם
    עַל בְּרֵכַ֥ת גִּבְע֖וֹן יַחְדָּ֑ו וַ/יֵּ֨שְׁב֜וּ אֵ֤לֶּה עַל הַ/בְּרֵכָה֙ מִ/זֶּ֔ה
    וְ/אֵ֥לֶּה עַל הַ/בְּרֵכָ֖ה מִ/זֶּֽה־־־־׃
translation:
  text: And Joab son of Zeruiah and the servants of David went out and met them together
    by the pool of Gibeon. And these sat on one side of the pool, and those on the
    other side of the pool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reservoir of Gibeon'; the Hebrew word can denote a constructed pool
      or water reservoir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  chosen: And Joab
  alternatives:
  - Now Joab
  - Then Joab
  lexicon: HALOT
  rationale: Retains the narrative conjunction with simple 'And,' a normal Hebrew
    narrative opener, while transliterating the personal name according to the translation
    philosophy.
- source_word: בֶּן צְרוּיָה
  chosen: son of Zeruiah
  alternatives:
  - the son of Zeruiah
  lexicon: HALOT
  rationale: A straightforward filial designation; English omits the article for natural
    style while preserving the familial identification.
- source_word: וְ/עַבְדֵי דָוִד
  chosen: and the servants of David
  alternatives:
  - and David's servants
  - and the men of David
  lexicon: HALOT
  rationale: עבדים here refers to David's retainers/official fighting men. 'Servants
    of David' preserves the lexical link to עבד without over-paraphrasing to 'soldiers,'
    though the context is military.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: HALOT
  rationale: The common verb יצא is best rendered plainly as 'went out.' 'Marched
    out' would over-specify the military nuance not explicit in the verb itself.
- source_word: וַיִּפְגְּשׁוּם
  chosen: met them
  alternatives:
  - encountered them
  - came face to face with them
  lexicon: HALOT
  rationale: The verb פגשׁ means 'meet/encounter.' The pronominal suffix requires
    an object, referring back to Abner and Ish-bosheth's men from the prior verse;
    'met them' is concise and accurate.
- source_word: עַל בְּרֵכַת גִּבְעוֹן
  chosen: by the pool of Gibeon
  alternatives:
  - at the pool of Gibeon
  - by the reservoir of Gibeon
  lexicon: HALOT
  rationale: בְּרֵכָה denotes a pool/reservoir. 'Pool' is the most natural modern
    English choice; 'by' fits the spatial scene, since the following clause places
    the groups on opposite sides.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - together there
  - at the same place
  lexicon: HALOT
  rationale: Preserves the adverb's sense that both parties came into the same location/encounter.
- source_word: וַיֵּשְׁבוּ
  chosen: sat
  alternatives:
  - took their seats
  - settled down
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit' or 'dwell.' In this immediate scene
    of opposing groups taking positions, 'sat' is literal and idiomatic.
- source_word: אֵלֶּה ... וְאֵלֶּה
  chosen: these ... and those
  alternatives:
  - the one group ... and the other group
  - these men ... and those men
  lexicon: HALOT
  rationale: This preserves the demonstrative contrast between the two parties without
    adding nouns not present in the Hebrew.
- source_word: עַל הַבְּרֵכָה מִזֶּה ... עַל הַבְּרֵכָה מִזֶּה
  chosen: on one side of the pool ... on the other side of the pool
  alternatives:
  - by the pool on this side ... by the pool on that side
  - at the pool on one side ... at the pool on the other side
  lexicon: HALOT
  rationale: Literally, 'on the pool from this side ... on the pool from this side,'
    an idiom indicating opposite sides of the same pool. 'On one side ... on the other
    side' communicates the spatial contrast clearly in natural English.
