id: 2SA.2.14
reference: 2 Samuel 2:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אַבְנֵר֙ אֶל יוֹאָ֔ב יָק֤וּמוּ נָא֙ הַ/נְּעָרִ֔ים וִֽ/ישַׂחֲק֖וּ
    לְ/פָנֵ֑י/נוּ וַ/יֹּ֥אמֶר יוֹאָ֖ב יָקֻֽמוּ־׃
translation:
  text: Then Abner said to Joab, “Please let the young men arise and compete before
    us.” And Joab said, “Let them arise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “play before us.” The Hebrew verb often means “play” or “sport,” but
      here it introduces a formal contest that becomes lethal in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָק֤וּמוּ / יָקֻֽמוּ
  chosen: let ... arise
  alternatives:
  - let ... get up
  - let ... stand up
  lexicon: HALOT
  rationale: The jussive of קום expresses a permissive/request sense here, not merely
    simple future. 'Let ... arise' preserves the formal force and fits the repeated
    response by Joab.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: נָא softens the request and is best represented in contemporary English
    as 'please.' 'Now' would miss the politeness nuance, and 'I pray' is archaic.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the youths
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths, young men, or attendants depending on context.
    In this military setting, these are selected fighting men, so 'young men' is natural
    and sufficiently broad without implying mere boys or household servants.
- source_word: וִישַׂחֲקוּ
  chosen: compete
  alternatives:
  - play
  - sport
  - fight
  - perform
  lexicon: HALOT
  rationale: The verb שׂחק ordinarily means 'play' or 'sport,' but in this context
    the following narrative shows a deadly martial contest. 'Compete' preserves the
    public-contest sense without overtranslating to 'fight' before the text itself
    makes the violence explicit. The more literal 'play' is misleading in modern English
    unless explained.
- source_word: לְפָנֵינוּ
  chosen: before us
  alternatives:
  - in our presence
  - before us all
  lexicon: HALOT
  rationale: The phrase literally means 'before our face/presence.' 'Before us' is
    concise, natural, and adequately formal.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: Then Abner said ... And Joab said
  alternatives:
  - And Abner said ... and Joab said
  lexicon: HALOT
  rationale: The waw-consecutive narrative sequence is naturally rendered in English
    with 'Then' and 'And' to preserve flow without wooden repetition.
