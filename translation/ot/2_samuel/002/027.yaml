id: 2SA.2.27
reference: 2 Samuel 2:27
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יוֹאָ֔ב חַ֚י הָֽ/אֱלֹהִ֔ים כִּ֥י לוּלֵ֖א דִּבַּ֑רְתָּ כִּ֣י אָ֤ז
    מֵֽ/הַ/בֹּ֨קֶר֙ נַעֲלָ֣ה הָ/עָ֔ם אִ֖ישׁ מֵ/אַחֲרֵ֥י אָחִֽי/ו׃
translation:
  text: Joab said, “As God lives, if you had not spoken, then from the morning the
    people would have gone up, each from following his brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since morning.'
    reason: lexical_alternative
  - marker: b
    text: That is, 'each would have stopped pursuing his brother.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי הָאֱלֹהִים
  chosen: As God lives
  alternatives:
  - By the life of God
  - As surely as God lives
  lexicon: HALOT
  rationale: A standard oath formula. 'As God lives' preserves the Hebrew idiom directly
    while remaining natural in English.
- source_word: לוּלֵא
  chosen: if ... not
  alternatives:
  - unless
  - had it not been that
  lexicon: HALOT
  rationale: 'In this counterfactual construction with the following perfect, it introduces
    an unreal condition: ''if you had not...''.'
- source_word: דִּבַּרְתָּ
  chosen: you had not spoken
  alternatives:
  - you had not said anything
  - you had not spoken up
  lexicon: HALOT
  rationale: The verb is simply 'speak.' 'Spoken' is the most direct rendering and
    leaves the object implicit as in Hebrew.
- source_word: כִּי אָז
  chosen: then
  alternatives:
  - surely then
  - for then
  lexicon: HALOT
  rationale: Together these particles mark the apodosis of the counterfactual statement.
    'Then' conveys the sense cleanly in English without overtranslating both particles
    separately.
- source_word: מֵהַבֹּקֶר
  chosen: from the morning
  alternatives:
  - since morning
  - at daybreak
  lexicon: HALOT
  rationale: The preposition מן with 'morning' indicates the time from which the action
    would have occurred. 'From the morning' is formally close; the footnote preserves
    the smoother English alternative 'since morning'.
- source_word: נַעֲלָה
  chosen: would have gone up
  alternatives:
  - would have withdrawn
  - would have stopped
  lexicon: HALOT
  rationale: The verb עלה normally means 'go up.' In this military context it likely
    refers to breaking off pursuit and moving away/up. The main text keeps the core
    verbal sense rather than interpreting more freely.
- source_word: אִישׁ מֵאַחֲרֵי אָחִיו
  chosen: each from following his brother
  alternatives:
  - each from pursuing his brother
  - each away from his brother
  lexicon: HALOT
  rationale: Literally, 'a man from after his brother.' In context this means each
    man ceasing to follow/pursue his fellow Israelite. The main text stays close to
    the Hebrew imagery; a footnote preserves the more idiomatic 'pursuing his brother'.
