theological_decisions:
- issue: Rendering the benedictory imperfect יַעַשׂ
  chosen_reading: 'A wish/prayer: ''may Yahweh show you...'','' not a simple future prediction.'
  alternative_readings:
  - 'A predictive future: ''the LORD will show you...'''
  rationale: In context David blesses the men of Jabesh-gilead for their loyalty to Saul. The jussive-like force of the imperfect after 'and now' suits a benediction. This preserves the interpersonal and theological tone of blessing without overstating certainty as mere prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
