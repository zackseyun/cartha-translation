id: 2SA.2.15
reference: 2 Samuel 2:15
source:
  edition: WLC
  text: וַ/יָּקֻ֖מוּ וַ/יַּעַבְר֣וּ בְ/מִסְפָּ֑ר שְׁנֵ֧ים עָשָׂ֣ר לְ/בִנְיָמִ֗ן וּ/לְ/אִ֥ישׁ
    בֹּ֨שֶׁת֙ בֶּן שָׁא֔וּל וּ/שְׁנֵ֥ים עָשָׂ֖ר מֵ/עַבְדֵ֥י דָוִֽד־׃
translation:
  text: 'So they arose and crossed over by number: twelve for Benjamin and for Ish-bosheth
    the son of Saul, and twelve from the servants of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passed over' or 'went over.' The Hebrew verb can denote movement across
      or over into the designated place.
    reason: lexical_alternative
  - marker: b
    text: Or 'from Benjamin.' The Hebrew preposition may indicate either origin or
      affiliation; here it likely means they represented Benjamin and Ish-bosheth.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Ish-bosheth'; elsewhere the related form 'Eshbaal' appears in the
      Old Testament tradition.
    reason: alternative_reading
  - marker: d
    text: Or 'from David's servants' or more interpretively 'from David's men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: they arose
  alternatives:
  - they got up
  - they stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, narrating the next action. 'Arose' preserves the
    formal narrative sequence without sounding overly stiff.
- source_word: וַיַּעַבְרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - went over
  lexicon: HALOT
  rationale: עבר commonly means 'cross over' or 'pass over.' In this military staging
    context, 'crossed over' best conveys movement from one side to another, likely
    into the agreed contest area.
- source_word: בְמִסְפָּר
  chosen: by number
  alternatives:
  - in number
  - according to the number
  lexicon: HALOT
  rationale: The phrase indicates a counted, matched number on each side. 'By number'
    is concise and preserves the Hebrew idiom better than a more interpretive expansion.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: לְבִנְיָמִן
  chosen: for Benjamin
  alternatives:
  - from Benjamin
  - belonging to Benjamin
  lexicon: HALOT
  rationale: The preposition ל here marks affiliation/side rather than simple origin.
    'For Benjamin' communicates representation in the contest.
- source_word: וּלְאִישׁ בֹּשֶׁת
  chosen: and for Ish-bosheth
  alternatives:
  - and for Eshbaal
  lexicon: HALOT
  rationale: 'The Masoretic form here is Ish-bosheth, the standard English transliteration
    of the form in Samuel. The prefixed ל continues the sense of affiliation: these
    twelve are on the side of Benjamin and Ish-bosheth.'
- source_word: בֶּן שָׁאוּל
  chosen: the son of Saul
  lexicon: HALOT
  rationale: Standard filial designation, retained for clarity and identification.
- source_word: וּשְׁנֵים עָשָׂר
  chosen: and twelve
  lexicon: HALOT
  rationale: Coordinates the equal number from David's side.
- source_word: מֵעַבְדֵי דָוִד
  chosen: from the servants of David
  alternatives:
  - from David's servants
  - from David's men
  lexicon: HALOT
  rationale: עבדים literally means 'servants.' In a royal-military context it can
    denote retainers or men in service, but 'servants of David' stays closer to the
    Hebrew while remaining natural English. 'Men' would be more interpretive and less
    lexically transparent.
