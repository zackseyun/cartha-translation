id: 2SA.2.20
reference: 2 Samuel 2:20
source:
  edition: WLC
  text: וַ/יִּ֤פֶן אַבְנֵר֙ אַֽחֲרָ֔י/ו וַ/יֹּ֕אמֶר הַ/אַתָּ֥ה זֶ֖ה עֲשָׂהאֵ֑ל וַ/יֹּ֖אמֶר
    אָנֹֽכִי׃
translation:
  text: Abner turned behind him and said, “Is that you, Asahel?” And he said, “I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Are you this one, Asahel?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: turned
  alternatives:
  - turned around
  - looked back
  lexicon: HALOT
  rationale: The verb פנה commonly means 'turn.' In this pursuit scene, 'turned' is
    the most natural concise rendering; 'looked back' is interpretive and narrower
    than the Hebrew.
- source_word: אַחֲרָיו
  chosen: behind him
  alternatives:
  - backward
  - to look behind him
  lexicon: HALOT
  rationale: The prepositional expression literally refers to what is behind him.
    'Behind him' preserves the spatial sense better than the more idiomatic but less
    transparent 'backward.'
- source_word: הֲאַתָּה זֶה
  chosen: Is that you
  alternatives:
  - Are you this one
  - Is this you
  lexicon: HALOT
  rationale: The Hebrew idiom combines the interrogative with the pronoun and demonstrative
    for identification. 'Is that you' is idiomatic modern English that preserves the
    recognition question.
- source_word: עֲשָׂהאֵל
  chosen: Asahel
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - It is I
  - I
  lexicon: HALOT
  rationale: The independent pronoun functions as a full reply of self-identification.
    'I am' is natural English and matches the elliptical force of the Hebrew better
    than the more formal 'It is I.'
