id: 2SA.2.24
reference: 2 Samuel 2:24
source:
  edition: WLC
  text: וַֽ/יִּרְדְּפ֛וּ יוֹאָ֥ב וַ/אֲבִישַׁ֖י אַחֲרֵ֣י אַבְנֵ֑ר וְ/הַ/שֶּׁ֣מֶשׁ בָּ֔אָה
    וְ/הֵ֗מָּה בָּ֚אוּ עַד גִּבְעַ֣ת אַמָּ֔ה אֲשֶׁר֙ עַל פְּנֵי גִ֔יחַ דֶּ֖רֶךְ מִדְבַּ֥ר
    גִּבְעֽוֹן־־־׃
translation:
  text: Joab and Abishai pursued Abner, and the sun went down; and they came as far
    as the hill of Ammah, which is opposite Giah on the way to the wilderness of Gibeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is before Giah'; the Hebrew expression can denote a position in
      front of or opposite a place.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the road to the wilderness of Gibeon'; the Hebrew may emphasize the
      route rather than simply the direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  - went in pursuit
  lexicon: HALOT
  rationale: The verb רדף in narrative commonly means to pursue in a hostile or military
    sense. 'Pursued' is natural modern English and preserves the action without over-paraphrase.
- source_word: אַחֲרֵי
  chosen: pursued Abner
  alternatives:
  - after Abner
  lexicon: HALOT
  rationale: Literally 'after Abner,' but in English the preposition is absorbed idiomatically
    into 'pursued Abner.' This is a standard optimal-equivalence adjustment.
- source_word: וְהַשֶּׁמֶשׁ בָּאָה
  chosen: the sun went down
  alternatives:
  - the sun came
  - the sun set
  lexicon: HALOT
  rationale: Hebrew literally says 'the sun came,' an idiom for sunset. 'Went down'
    clearly communicates the temporal setting in natural English while preserving
    the sense.
- source_word: וְהֵמָּה בָּאוּ
  chosen: and they came
  alternatives:
  - and they arrived
  - and they went
  lexicon: HALOT
  rationale: The independent pronoun adds mild emphasis or narrative continuity, but
    English does not require explicit emphasis here. 'They came' is the straightforward
    narrative rendering.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - until
  lexicon: HALOT
  rationale: With a place name, עַד marks extent of movement. 'As far as' best conveys
    the endpoint reached.
- source_word: גִּבְעַת אַמָּה
  chosen: the hill of Ammah
  alternatives:
  - Ammah's hill
  - the hill Ammah
  lexicon: HALOT
  rationale: Construct chain with a proper name. 'The hill of Ammah' is the clearest
    English representation while preserving the place name.
- source_word: אֲשֶׁר עַל־פְּנֵי גִיחַ
  chosen: which is opposite Giah
  alternatives:
  - which is before Giah
  - which faces Giah
  - which is east of Giah
  lexicon: HALOT
  rationale: עַל־פְּנֵי often denotes being in front of or opposite a location. 'Opposite'
    is a natural geographic rendering without over-specifying direction.
- source_word: דֶּרֶךְ מִדְבַּר גִּבְעוֹן
  chosen: on the way to the wilderness of Gibeon
  alternatives:
  - by the road to the wilderness of Gibeon
  - toward the wilderness road of Gibeon
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way/road.' Here it likely indicates the route leading
    toward the wilderness associated with Gibeon. 'On the way to the wilderness of
    Gibeon' is readable and preserves the geographic relation.
- source_word: גִּיחַ / גִּבְעוֹן / אַבְנֵר / יוֹאָב / אֲבִישַׁי / אַמָּה
  chosen: Giah / Gibeon / Abner / Joab / Abishai / Ammah
  rationale: Personal and place names are transliterated by standard English conventions
    in keeping with project philosophy.
