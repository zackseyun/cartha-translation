id: 2SA.2.11
reference: 2 Samuel 2:11
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִסְפַּ֣ר הַ/יָּמִ֔ים אֲשֶׁר֩ הָיָ֨ה דָוִ֥ד מֶ֛לֶךְ בְּ/חֶבְר֖וֹן
    עַל בֵּ֣ית יְהוּדָ֑ה שֶׁ֥בַע שָׁנִ֖ים וְ/שִׁשָּׁ֥ה חֳדָשִֽׁים־׃ס
translation:
  text: The length of time that David was king in Hebron over the house of Judah was
    seven years and six months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the number of the days.' The Hebrew idiom refers to the duration of
      David's reign in Hebron.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - and it happened
  - and it was
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions idiomatically to introduce
    a summary statement. English reads naturally with 'was' rather than the more wooden
    'and it happened'.
- source_word: מִסְפַּר הַיָּמִים
  chosen: The length of time
  alternatives:
  - the number of the days
  - the time
  lexicon: HALOT
  rationale: Literally 'the number of the days,' but in context this idiom denotes
    duration. 'The length of time' preserves the sense in clear modern English without
    over-paraphrasing.
- source_word: אֲשֶׁר הָיָה
  chosen: that ... was
  alternatives:
  - during which ... was
  - when ... was
  lexicon: HALOT
  rationale: This relative construction links the duration to David's reign. 'That
    ... was' is straightforward and sufficiently formal.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering for the royal title; no contextual reason to vary.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Hebron' is the most natural English
    rendering for residence/reign in a city.
- source_word: עַל בֵּית יְהוּדָה
  chosen: over the house of Judah
  alternatives:
  - over Judah
  - over the household of Judah
  lexicon: HALOT
  rationale: The phrase literally includes 'house,' which in this context refers to
    the tribe/kingdom aligned with Judah. Retaining 'house of Judah' preserves the
    Hebrew expression and its corporate sense better than flattening it to simply
    'Judah'.
- source_word: שֶׁבַע שָׁנִים וְשִׁשָּׁה חֳדָשִׁים
  chosen: seven years and six months
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the stated duration.
