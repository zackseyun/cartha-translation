id: 2SA.2.8
reference: 2 Samuel 2:8
source:
  edition: WLC
  text: וְ/אַבְנֵ֣ר בֶּן נֵ֔ר שַׂר צָבָ֖א אֲשֶׁ֣ר לְ/שָׁא֑וּל לָקַ֗ח אֶת אִ֥ישׁ בֹּ֨שֶׁת֙
    בֶּן שָׁא֔וּל וַ/יַּעֲבִרֵ֖/הוּ מַחֲנָֽיִם־־־־׃
translation:
  text: But Abner son of Ner, the commander of Saul’s army, took Ish-bosheth son of
    Saul and brought him over to Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ish-bosheth is called Eshbaal in 1 Chronicles 8:33 and 9:39.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַבְנֵר
  chosen: But Abner
  alternatives:
  - And Abner
  - Now Abner
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply 'and,' but here 'but' best
    reflects the narrative contrast with the preceding verse, where Judah anoints
    David. 'Abner' is transliterated as a personal name per translation philosophy.
- source_word: בֶּן נֵר
  chosen: son of Ner
  lexicon: HALOT
  rationale: Standard filial construction; rendered formally and naturally in English.
- source_word: שַׂר צָבָא אֲשֶׁר לְשָׁאוּל
  chosen: the commander of Saul’s army
  alternatives:
  - the captain of the army that belonged to Saul
  - Saul’s army commander
  lexicon: HALOT
  rationale: שַׂר צָבָא denotes a military chief/commander. 'Commander of Saul’s army'
    is clear modern English and preserves the genitival relation expressed by אֲשֶׁר
    לְשָׁאוּל.
- source_word: לָקַח
  chosen: took
  alternatives:
  - seized
  - took hold of
  lexicon: HALOT
  rationale: The verb commonly means 'take.' Nothing in the immediate context requires
    a more forceful gloss such as 'seized,' so the basic rendering is retained.
- source_word: אֶת אִישׁ בֹּשֶׁת
  chosen: Ish-bosheth
  alternatives:
  - Eshbaal
  lexicon: HALOT
  rationale: The consonantal text here reads the familiar name Ish-bosheth. The name
    is transliterated rather than translated. The alternative form 'Eshbaal' is preserved
    in a footnote because the same figure is called by that name in 1 Chronicles 8:33;
    9:39.
- source_word: וַיַּעֲבִרֵהוּ
  chosen: brought him over
  alternatives:
  - took him across
  - transferred him
  lexicon: HALOT
  rationale: From עבר in the Hiphil, meaning to cause to pass over or bring across.
    'Brought him over' preserves the causative sense while remaining idiomatic. It
    may imply crossing to the Transjordan side, but the text itself does not specify
    the route in this verse.
- source_word: מַחֲנָיִם
  chosen: Mahanaim
  lexicon: HALOT
  rationale: Place name; transliterated by standard convention.
