id: 2SA.2.19
reference: 2 Samuel 2:19
source:
  edition: WLC
  text: וַ/יִּרְדֹּ֥ף עֲשָׂהאֵ֖ל אַחֲרֵ֣י אַבְנֵ֑ר וְ/לֹֽא נָטָ֣ה לָ/לֶ֗כֶת עַל הַ/יָּמִין֙
    וְ/עַֽל הַ/שְּׂמֹ֔אול מֵ/אַחֲרֵ֖י אַבְנֵֽר־־־׃
translation:
  text: Asahel pursued Abner, and as he went he did not turn to the right or to the
    left from following Abner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asahel chased after Abner and did not turn aside to the right or to
      the left from behind Abner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֹּף
  chosen: pursued
  alternatives:
  - chased
  - ran after
  lexicon: HALOT
  rationale: The verb רדף commonly means to pursue or chase. 'Pursued' is natural
    modern English and preserves the sense of active, sustained pursuit in narrative
    context.
- source_word: אַחֲרֵי
  chosen: Abner
  alternatives:
  - after Abner
  lexicon: HALOT
  rationale: With the verb 'pursued,' English normally incorporates the object directly
    ('pursued Abner') rather than repeating the preposition 'after.' The underlying
    relation is still reflected by the verb choice.
- source_word: וְלֹא נָטָה
  chosen: did not turn
  alternatives:
  - did not deviate
  - did not veer
  lexicon: HALOT
  rationale: נטה here describes turning aside from a course. 'Did not turn' is straightforward
    and idiomatic, preserving the physical imagery.
- source_word: לָלֶכֶת
  chosen: as he went
  alternatives:
  - in going
  - to go
  lexicon: HALOT
  rationale: The infinitive with ל after 'did not turn' expresses manner or attendant
    action during the pursuit. 'As he went' makes the Hebrew construction readable
    in English without losing the ongoing-motion sense.
- source_word: עַל הַיָּמִין וְעַל הַשְּׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - to the right hand or to the left hand
  - right or left
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for not deviating from a path. 'To the
    right or to the left' preserves the idiom in clear contemporary English.
- source_word: מֵאַחֲרֵי אַבְנֵר
  chosen: from following Abner
  alternatives:
  - from behind Abner
  - away from Abner's trail
  lexicon: HALOT
  rationale: The phrase literally means 'from after Abner' and indicates not turning
    aside from the pursuit. 'From following Abner' best captures the functional sense
    in idiomatic English while retaining the pursuit imagery.
- source_word: עֲשָׂהאֵל / אַבְנֵר
  chosen: Asahel / Abner
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the project philosophy.
