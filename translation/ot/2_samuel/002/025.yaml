id: 2SA.2.25
reference: 2 Samuel 2:25
source:
  edition: WLC
  text: וַ/יִּֽתְקַבְּצ֤וּ בְנֵֽי בִנְיָמִן֙ אַחֲרֵ֣י אַבְנֵ֔ר וַ/יִּהְי֖וּ לַ/אֲגֻדָּ֣ה
    אֶחָ֑ת וַ/יַּ֣עַמְד֔וּ עַ֥ל רֹאשׁ גִּבְעָ֖ה אֶחָֽת־־׃
translation:
  text: Then the sons of Benjamin gathered together behind Abner, became one band,
    and took their stand on the top of one hill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'following Abner.' The Hebrew phrase can indicate either spatial position
      ('behind') or allegiance/sequence ('after, following').
    reason: lexical_alternative
  - marker: b
    text: Or 'one company' or 'one group.' The Hebrew term refers to a united band
      gathered together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  chosen: gathered together
  alternatives:
  - assembled
  - rallied
  lexicon: HALOT
  rationale: The hitpael form of קבץ conveys reflexive/collective assembling. 'Gathered
    together' is natural English and preserves the sense of regrouping after Abner.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the men of Benjamin
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' This keeps the Hebrew kinship expression
    while remaining idiomatic enough in English. 'Benjaminites' is possible, but the
    more literal rendering better reflects the source.
- source_word: אַחֲרֵי אַבְנֵר
  chosen: behind Abner
  alternatives:
  - after Abner
  - following Abner
  lexicon: HALOT
  rationale: אַחֲרֵי can denote spatial or figurative following. In this battle context,
    'behind Abner' naturally conveys rallying under his lead while preserving the
    Hebrew image.
- source_word: לַאֲגֻדָּה אֶחָת
  chosen: one band
  alternatives:
  - one group
  - one company
  lexicon: HALOT
  rationale: אֲגֻדָּה denotes a bound group or band. 'One band' captures the military/regrouping
    sense more vividly than the generic 'group'.
- source_word: וַיַּעַמְדוּ
  chosen: took their stand
  alternatives:
  - stood
  - stationed themselves
  lexicon: HALOT
  rationale: The verb עמד here is more than mere posture; in battle narrative it suggests
    assuming a defensive position. 'Took their stand' communicates that nuance in
    readable English.
- source_word: עַל רֹאשׁ גִּבְעָה אֶחָת
  chosen: on the top of one hill
  alternatives:
  - on the summit of a hill
  - at the head of one hill
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical usage it means 'top'
    or 'summit.' 'Top of one hill' is clear modern English and preserves the numeral
    אֶחָת.
