id: 2SA.2.17
reference: 2 Samuel 2:17
source:
  edition: WLC
  text: וַ/תְּהִ֧י הַ/מִּלְחָמָ֛ה קָשָׁ֥ה עַד מְאֹ֖ד בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יִּנָּ֤גֶף
    אַבְנֵר֙ וְ/אַנְשֵׁ֣י יִשְׂרָאֵ֔ל לִ/פְנֵ֖י עַבְדֵ֥י דָוִֽד־׃
translation:
  text: The battle was very fierce that day, and Abner and the men of Israel were
    defeated before the servants of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the battle was very severe that day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the servants of David'; this refers to David's forces or retainers.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the war
  - the fighting
  lexicon: HALOT
  rationale: מִלְחָמָה can denote war or battle; in this immediate narrative scene,
    'battle' best fits the specific engagement rather than a prolonged campaign.
- source_word: קָשָׁה עַד מְאֹד
  chosen: very fierce
  alternatives:
  - very hard
  - very severe
  lexicon: HALOT
  rationale: קָשָׁה literally means 'hard/severe.' With warfare as subject, idiomatic
    English prefers 'fierce' to convey the intensity of combat while preserving the
    force of עַד מְאֹד ('very exceedingly').
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase is a common temporal expression. 'That day' is natural modern
    English and preserves the temporal reference without unnecessary formality.
- source_word: וַיִּנָּגֶף
  chosen: were defeated
  alternatives:
  - was struck down
  - was routed
  - was beaten
  lexicon: HALOT
  rationale: The Niphal of נָגַף often means to be defeated/struck before an enemy.
    Because the verb is singular with a compound subject ('Abner and the men of Israel'),
    English idiom is best served by a plural predicate, 'were defeated.' This captures
    military defeat rather than merely physical injury.
- source_word: אַבְנֵר
  chosen: Abner
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וְאַנְשֵׁי יִשְׂרָאֵל
  chosen: and the men of Israel
  alternatives:
  - and the Israelites
  - and the soldiers of Israel
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' 'The men of Israel' preserves the source
    wording and the gender-accurate principle better than the broader ethnic label
    'Israelites,' while still naturally referring to Abner's fighting force in context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - at the hands of
  lexicon: HALOT
  rationale: In military contexts לִפְנֵי commonly marks defeat before an opposing
    force. 'Before' is the most direct rendering and preserves the Hebrew idiom.
- source_word: עַבְדֵי דָוִד
  chosen: the servants of David
  alternatives:
  - David's men
  - David's servants
  lexicon: HALOT
  rationale: עֶבֶד here denotes those in David's service. 'Servants of David' is formally
    closer to the Hebrew and fits the political-military setting; 'David's men' is
    possible but less transparent to the source term.
