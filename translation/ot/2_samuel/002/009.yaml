id: 2SA.2.9
reference: 2 Samuel 2:9
source:
  edition: WLC
  text: וַ/יַּמְלִכֵ֨/הוּ֙ אֶל הַ/גִּלְעָ֔ד וְ/אֶל הָ/אֲשׁוּרִ֖י וְ/אֶֽל יִזְרְעֶ֑אל
    וְ/עַל אֶפְרַ֨יִם֙ וְ/עַל בִּנְיָמִ֔ן וְ/עַל יִשְׂרָאֵ֖ל כֻּלֹּֽ/ה־־־־־־׃פ
translation:
  text: and made him king over Gilead, over the Ashurites, over Jezreel, over Ephraim,
    over Benjamin, and over all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Ashurites.' Some understand this as 'Asher,' referring to the
      tribe or region of Asher.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּמְלִכֵהוּ
  chosen: and made him king
  alternatives:
  - and crowned him king
  - and caused him to reign
  lexicon: HALOT
  rationale: Hiphil of מלך with 3ms suffix means to make someone king or install him
    as king. 'Made him king' is idiomatic modern English and preserves the causative
    sense better than the less precise 'reigned.'
- source_word: אֶל
  chosen: over
  alternatives:
  - to
  - for
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with the verb 'make king' and territorial
    objects it indicates the realm over which he was installed. English 'over' expresses
    dominion naturally.
- source_word: הַגִּלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Standard transliteration of the regional name. The article is not normally
    represented in English proper names.
- source_word: הָאֲשׁוּרִי
  chosen: the Ashurites
  alternatives:
  - Asher
  - the Asshurites
  lexicon: HALOT
  rationale: The form is difficult and has been understood variously. MT points to
    a gentilic singular with article used collectively, best rendered 'the Ashurites.'
    Because some take it as a textual issue for 'Asher,' that alternative is preserved
    in a footnote rather than adopted in the main text.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  lexicon: HALOT
  rationale: With territories and peoples under royal rule, 'over' is the natural
    English equivalent.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: יִשְׂרָאֵל כֻּלֹּה
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: 'כֻּלֹּה intensifies the scope: not merely Israel in part, but the whole.
    ''All Israel'' is concise and idiomatic.'
