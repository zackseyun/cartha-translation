id: 2SA.2.22
reference: 2 Samuel 2:22
source:
  edition: WLC
  text: וַ/יֹּ֧סֶף ע֣וֹד אַבְנֵ֗ר לֵ/אמֹר֙ אֶל עֲשָׂהאֵ֔ל ס֥וּר לְ/ךָ֖ מֵ/אַֽחֲרָ֑/י
    לָ֤/מָּה אַכֶּ֨/כָּה֙ אַ֔רְצָ/ה וְ/אֵיךְ֙ אֶשָּׂ֣א פָנַ֔/י אֶל יוֹאָ֖ב אָחִֽי/ךָ־־׃
translation:
  text: Abner said again to Asahel, “Turn aside from following me. Why should I strike
    you down to the ground? Then how could I lift up my face to Joab your brother?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'How could I face Joab your brother?' The Hebrew literally says, 'How
      could I lift up my face to Joab your brother?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  chosen: said again
  alternatives:
  - continued
  - added further
  lexicon: HALOT
  rationale: The idiom 'added again' with לֵאמֹר means he spoke once more. 'Said again'
    is natural English while preserving the iterative force.
- source_word: סוּר לְךָ מֵאַחֲרַי
  chosen: Turn aside from following me
  alternatives:
  - Turn away from behind me
  - Stop following me
  lexicon: HALOT
  rationale: סוּר is 'turn aside/turn away.' מֵאַחֲרַי is literally 'from behind me,'
    idiomatically 'from following me.' This keeps the spatial image while reading
    naturally.
- source_word: לָמָּה אַכֶּכָּה אַרְצָה
  chosen: Why should I strike you down to the ground?
  alternatives:
  - Why should I strike you to the ground?
  - Why should I kill you?
  lexicon: HALOT
  rationale: נכה in Hiphil commonly means 'strike down.' אַרְצָה adds the sense 'to
    the ground/downward.' 'Strike you down to the ground' preserves the vividness
    without overinterpreting as explicit killing, though death is strongly implied.
- source_word: וְאֵיךְ אֶשָּׂא פָנַי
  chosen: Then how could I lift up my face
  alternatives:
  - How could I face
  - How could I raise my face
  lexicon: HALOT
  rationale: The idiom literally means 'lift up my face,' expressing the ability to
    face someone without shame. Retaining the idiom in English preserves the Hebrew
    imagery; the following prepositional phrase clarifies the sense.
- source_word: אֶל יוֹאָב אָחִיךָ
  chosen: to Joab your brother
  alternatives:
  - before Joab your brother
  - toward Joab your brother
  lexicon: HALOT
  rationale: אֶל after the idiom marks the person before whom he would have to appear.
    'To Joab your brother' is a straightforward rendering that works with 'lift up
    my face.'
- source_word: עֲשָׂהאֵל / אַבְנֵר / יוֹאָב
  chosen: Asahel / Abner / Joab
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
