id: 2SA.2.23
reference: 2 Samuel 2:23
source:
  edition: WLC
  text: וַ/יְמָאֵ֣ן לָ/ס֗וּר וַ/יַּכֵּ֣/הוּ אַבְנֵר֩ בְּ/אַחֲרֵ֨י הַ/חֲנִ֜ית אֶל הַ/חֹ֗מֶשׁ
    וַ/תֵּצֵ֤א הַֽ/חֲנִית֙ מֵ/אַחֲרָ֔י/ו וַ/יִּפָּל שָׁ֖ם וַ/יָּ֣מָת תחת/ו וַ/יְהִ֡י
    כָּל הַ/בָּ֣א אֶֽל הַ/מָּקוֹם֩ אֲשֶׁר נָ֨פַל שָׁ֧ם עֲשָׂהאֵ֛ל וַ/יָּמֹ֖ת וַֽ/יַּעֲמֹֽדוּ־־־־־׃
translation:
  text: But he refused to turn aside, so Abner struck him in the belly with the butt
    end of the spear, and the spear came out behind him; and he fell there and died
    on the spot. And everyone who came to the place where Asahel had fallen and died
    stood still.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֹמֶשׁ is traditionally rendered 'the fifth rib' in some older English
      versions; the term likely refers more generally to the abdomen or belly in this
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  chosen: he refused
  alternatives:
  - he was unwilling
  - he would not
  lexicon: HALOT
  rationale: The verb מאן denotes refusal or unwillingness. 'He refused' is concise
    and idiomatic in narrative English.
- source_word: לָסוּר
  chosen: to turn aside
  alternatives:
  - to turn away
  - to stop pursuing
  lexicon: HALOT
  rationale: סור literally means 'turn aside/turn away.' In context Asahel is being
    urged to break off pursuit, so 'turn aside' preserves the concrete motion while
    remaining clear.
- source_word: וַיַּכֵּהוּ
  chosen: struck him
  alternatives:
  - hit him
  - smote him
  lexicon: HALOT
  rationale: A straightforward narrative rendering of נכה. 'Struck' fits modern readable
    English without archaic tone.
- source_word: בְּאַחֲרֵי הַחֲנִית
  chosen: with the butt end of the spear
  alternatives:
  - with the back end of the spear
  - with the rear of the spear
  lexicon: HALOT
  rationale: אַחֲרֵי means the back/rear part. In this scene Abner uses the rear end
    of the spear rather than the point, so 'butt end' is the most natural English
    expression.
- source_word: אֶל הַחֹמֶשׁ
  chosen: in the belly
  alternatives:
  - in the abdomen
  - in the fifth rib
  lexicon: HALOT
  rationale: חֹמֶשׁ in these battle contexts is a difficult anatomical term traditionally
    rendered 'fifth rib,' but that is likely an interpretive tradition rather than
    plain sense. Many modern translations render it as abdomen/belly. 'In the belly'
    is vivid, natural, and likely reflects the intended body area.
- source_word: וַתֵּצֵא הַחֲנִית מֵאַחֲרָיו
  chosen: the spear came out behind him
  alternatives:
  - the spear came out through his back
  - the spear protruded from behind him
  lexicon: HALOT
  rationale: The clause describes the spear passing through and emerging at his back.
    'Came out behind him' stays close to the Hebrew wording.
- source_word: וַיִּפָּל שָׁם
  chosen: he fell there
  alternatives:
  - he collapsed there
  lexicon: HALOT
  rationale: A simple narrative sequence; 'fell there' is formally close and idiomatic.
- source_word: וַיָּמָת תַּחְתָּו
  chosen: died on the spot
  alternatives:
  - died there
  - died where he was
  lexicon: HALOT
  rationale: תחתיו literally 'under him/in his place' is an idiom meaning immediately,
    where he stood. 'Died on the spot' conveys the force naturally in English.
- source_word: כָּל הַבָּא
  chosen: everyone who came
  alternatives:
  - all who came
  - everyone coming
  lexicon: HALOT
  rationale: The participle with כל has a distributive sense. 'Everyone who came'
    is natural English.
- source_word: וַיַּעֲמֹדוּ
  chosen: stood still
  alternatives:
  - stopped
  - stood
  lexicon: HALOT
  rationale: עמד here means to stop and stand upon seeing the body. 'Stood still'
    captures both the physical halt and the stunned pause.
