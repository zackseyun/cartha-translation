id: 2SA.2.29
reference: 2 Samuel 2:29
source:
  edition: WLC
  text: וְ/אַבְנֵ֣ר וַֽ/אֲנָשָׁ֗י/ו הָֽלְכוּ֙ בָּֽ/עֲרָבָ֔ה כֹּ֖ל הַ/לַּ֣יְלָה הַ/ה֑וּא
    וַ/יַּעַבְר֣וּ אֶת הַ/יַּרְדֵּ֗ן וַ/יֵּֽלְכוּ֙ כָּל הַ/בִּתְר֔וֹן וַ/יָּבֹ֖אוּ
    מַחֲנָֽיִם־־׃
translation:
  text: And Abner and his men traveled through the Arabah all that night, crossed
    the Jordan, went through all the Bithron, and came to Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'through all the ravine/gorge region'; the Hebrew term 'Bithron'
      may be a place-name or a descriptive geographical term.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֲרָבָה
  chosen: through the Arabah
  alternatives:
  - through the plain
  - through the wilderness plain
  lexicon: HALOT
  rationale: עֲרָבָה can denote the Jordan rift/Arabah region rather than a generic
    'plain.' Because the term has geographic force here in a travel itinerary, 'the
    Arabah' preserves the likely toponymic sense while remaining readable.
- source_word: כָּל הַלַּיְלָה הַהוּא
  chosen: all that night
  alternatives:
  - the whole of that night
  - all night long
  lexicon: HALOT
  rationale: This idiom marks duration across the entire night. 'All that night' is
    natural English and closely reflects the Hebrew demonstrative construction.
- source_word: וַיַּעַבְרוּ אֶת־הַיַּרְדֵּן
  chosen: crossed the Jordan
  alternatives:
  - passed over the Jordan
  lexicon: HALOT
  rationale: עבר with the direct object marker and 'the Jordan' naturally means crossing
    the river. 'Crossed' is the clearest modern English equivalent.
- source_word: כָּל הַבִּתְרוֹן
  chosen: all the Bithron
  alternatives:
  - the whole ravine
  - all the gorge region
  lexicon: HALOT
  rationale: הַבִּתְרוֹן is likely a place-name or regional designation, though its
    root suggests something cut or divided. Since the form with article may still
    function as a recognized locale and the exact referent is uncertain, retaining
    'Bithron' avoids over-interpreting the geography.
- source_word: מַחֲנָיִם
  chosen: Mahanaim
  lexicon: HALOT
  rationale: This is a proper place-name and should be transliterated rather than
    translated, in keeping with the translation philosophy for names.
- source_word: הָלְכוּ / וַיֵּלְכוּ / וַיָּבֹאוּ
  chosen: traveled ... went through ... came
  alternatives:
  - walked ... went ... arrived
  lexicon: HALOT
  rationale: 'The sequence of motion verbs is preserved with natural English variation:
    ''traveled'' for the initial extended movement, ''went through'' for passage across
    a region, and ''came'' for arrival at destination. This reflects the narrative
    progression without flattening all verbs into one English gloss.'
- source_word: וַאֲנָשָׁיו
  chosen: his men
  alternatives:
  - the men with him
  - his soldiers
  lexicon: HALOT
  rationale: Literally 'his men.' In this military narrative it refers to Abner's
    company. 'His men' is both accurate and concise; 'soldiers' would be interpretive.
