id: 2SA.2.3
reference: 2 Samuel 2:3
source:
  edition: WLC
  text: וַ/אֲנָשָׁ֧י/ו אֲשֶׁר עִמּ֛/וֹ הֶעֱלָ֥ה דָוִ֖ד אִ֣ישׁ וּ/בֵית֑/וֹ וַ/יֵּשְׁב֖וּ
    בְּ/עָרֵ֥י חֶבְרֽוֹן־׃
translation:
  text: And David brought up the men who were with him, each man with his household,
    and they settled in the towns of Hebron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the cities of Hebron.' The Hebrew may refer to the settlements belonging
      to the Hebron area rather than the single city center.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנָשָׁיו
  chosen: the men
  alternatives:
  - his men
  - the men belonging to him
  lexicon: HALOT
  rationale: אֲנָשָׁיו literally means 'his men.' In English, 'the men' is smoother
    here because the following relative clause 'who were with him' already identifies
    them as David's company. This preserves the personal, male referent rather than
    neutralizing it.
- source_word: אֲשֶׁר עִמּוֹ
  chosen: who were with him
  alternatives:
  - that were with him
  lexicon: HALOT
  rationale: The relative clause identifies the group accompanying David. 'Who' is
    natural for persons in modern English.
- source_word: הֶעֱלָה
  chosen: brought up
  alternatives:
  - brought
  - took up
  - caused to go up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'take up,' often with
    geographical ascent in view. Since the movement is to Hebron in the hill country,
    'brought up' preserves the directional nuance better than simply 'brought'.
- source_word: אִישׁ וּבֵיתוֹ
  chosen: each man with his household
  alternatives:
  - each man and his house
  - every man with his family
  lexicon: HALOT
  rationale: 'The distributive אִישׁ before ''and his house'' indicates individual
    units: each man together with those of his house. ''Household'' is more idiomatic
    and contextually accurate than the overly literal ''house,'' while still preserving
    the familial/domestic sense.'
- source_word: וַיֵּשְׁבוּ
  chosen: they settled
  alternatives:
  - they lived
  - they dwelt
  - they stayed
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, or settle. In this relocation context, 'settled'
    captures the idea of taking up residence after moving, more clearly than the wooden
    'dwelt'.
- source_word: בְּעָרֵי חֶבְרוֹן
  chosen: in the towns of Hebron
  alternatives:
  - in the cities of Hebron
  - in Hebron's towns
  lexicon: HALOT
  rationale: עָרִים can be rendered 'cities' or 'towns.' Since the phrase likely refers
    to the settlements belonging to the Hebron district rather than a single urban
    center, 'towns of Hebron' is clearer in contemporary English. This avoids implying
    multiple unrelated major cities named Hebron.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
