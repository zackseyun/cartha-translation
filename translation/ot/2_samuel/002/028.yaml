id: 2SA.2.28
reference: 2 Samuel 2:28
source:
  edition: WLC
  text: וַ/יִּתְקַ֤ע יוֹאָב֙ בַּ/שּׁוֹפָ֔ר וַ/יַּֽעַמְדוּ֙ כָּל הָ/עָ֔ם וְ/לֹֽא יִרְדְּפ֥וּ
    ע֖וֹד אַחֲרֵ֣י יִשְׂרָאֵ֑ל וְ/לֹֽא יָסְפ֥וּ ע֖וֹד לְ/הִלָּחֵֽם־־־׃
translation:
  text: Then Joab blew the trumpet, and all the people stood still, and they no longer
    pursued Israel or continued to fight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the horn'; Hebrew שׁוֹפָר refers to a horn used as a signaling instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַע
  chosen: blew
  alternatives:
  - sounded
  - blew a blast
  lexicon: HALOT
  rationale: With בַּשּׁוֹפָר ('the trumpet/horn'), the verb תקע idiomatically means
    to blow or sound an instrument. 'Blew' is the most natural modern English rendering.
- source_word: בַּשּׁוֹפָר
  chosen: the trumpet
  alternatives:
  - the horn
  - the ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn used as a signaling instrument. 'Trumpet' is conventional
    and clear in English, while not requiring the more specific 'ram's horn' unless
    context emphasizes material.
- source_word: וַיַּעַמְדוּ כָּל הָעָם
  chosen: all the people stood still
  alternatives:
  - all the troops halted
  - all the people stopped
  lexicon: HALOT
  rationale: עמד literally means 'stood,' but in this military context it conveys
    stopping/halting movement. 'Stood still' preserves the literal image while communicating
    cessation of action.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: The Hebrew says 'the people.' In context it refers to Joab's force, but
    'the people' should be retained unless clarity demands otherwise. The military
    sense is sufficiently implied by the surrounding narrative.
- source_word: יִרְדְּפוּ עוֹד אַחֲרֵי יִשְׂרָאֵל
  chosen: no longer pursued Israel
  alternatives:
  - did not pursue Israel any further
  - stopped chasing after Israel
  lexicon: HALOT
  rationale: רדף אחרי means 'pursue/chase after.' עוֹד with negation gives the sense
    'no longer' or 'any further.' 'Pursued Israel' is concise and faithful.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the men of Israel
  lexicon: HALOT
  rationale: The text simply has 'Israel.' In this context it refers to the opposing
    Israelite force under Abner, but the proper name should remain untranslated in
    the main text.
- source_word: וְלֹא יָסְפוּ עוֹד לְהִלָּחֵם
  chosen: or continued to fight
  alternatives:
  - nor did they fight anymore
  - and they did not resume fighting
  lexicon: HALOT
  rationale: יסף + infinitive means 'continue/add to' doing something. With negation
    and עוֹד, the sense is that they did not continue or resume fighting. 'Continued
    to fight' reads naturally in English and matches the sequence after pursuit ceased.
