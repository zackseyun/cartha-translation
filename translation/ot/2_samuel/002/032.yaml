id: 2SA.2.32
reference: 2 Samuel 2:32
source:
  edition: WLC
  text: וַ/יִּשְׂאוּ֙ אֶת עֲשָׂהאֵ֔ל וַֽ/יִּקְבְּרֻ֨/הוּ֙ בְּ/קֶ֣בֶר אָבִ֔י/ו אֲשֶׁ֖ר
    בֵּ֣ית לָ֑חֶם וַ/יֵּלְכ֣וּ כָל הַ/לַּ֗יְלָה יוֹאָב֙ וַֽ/אֲנָשָׁ֔י/ו וַ/יֵּאֹ֥ר
    לָ/הֶ֖ם בְּ/חֶבְרֽוֹן־־׃
translation:
  text: They carried Asahel and buried him in his father's tomb, which was at Bethlehem.
    Then Joab and his men traveled all night, and daybreak came upon them at Hebron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his father's grave.' The Hebrew קֶבֶר can refer either to a grave
      or to a tomb/family burial place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the dawn broke on them at Hebron.' The Hebrew idiom literally says 'it
      became light for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: They carried
  alternatives:
  - They lifted
  - They bore
  lexicon: HALOT
  rationale: נשא in this narrative context refers to carrying Asahel's body away for
    burial. 'Carried' is natural modern English and fits the funerary setting better
    than the more literal but less idiomatic 'lifted' or the slightly archaic 'bore'.
- source_word: עֲשָׂהאֵל
  chosen: Asahel
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: buried him
  alternatives:
  - interred him
  lexicon: HALOT
  rationale: קבר is the ordinary verb 'to bury.' 'Buried him' is the clearest and
    most natural rendering in modern English.
- source_word: בְּקֶבֶר אָבִיו
  chosen: in his father's tomb
  alternatives:
  - in his father's grave
  lexicon: HALOT
  rationale: קבר can be rendered 'grave' or 'tomb.' 'Tomb' fits well because the phrase
    likely refers to a family burial place rather than merely a single dug grave,
    though 'grave' remains possible.
- source_word: אֲשֶׁר בֵּית לָחֶם
  chosen: which was at Bethlehem
  alternatives:
  - which was in Bethlehem
  lexicon: HALOT
  rationale: The relative clause identifies the location of the father's tomb. English
    requires an explicit verb for smooth sense. 'At Bethlehem' is idiomatic for location
    with a town name; 'in Bethlehem' would also be acceptable.
- source_word: וַיֵּלְכוּ כָל הַלַּיְלָה
  chosen: traveled all night
  alternatives:
  - went all night
  - marched all night
  lexicon: HALOT
  rationale: הלך is broad ('go/walk/travel'). In this military narrative, 'traveled
    all night' communicates sustained movement without over-specifying a formal military
    march.
- source_word: יוֹאָב וַאֲנָשָׁיו
  chosen: Joab and his men
  alternatives:
  - Joab and his soldiers
  lexicon: HALOT
  rationale: אֲנָשָׁיו literally means 'his men.' Since these are Joab's fighting
    force, 'his men' preserves the Hebrew wording and military context without unnecessary
    expansion.
- source_word: וַיֵּאֹר לָהֶם
  chosen: daybreak came upon them
  alternatives:
  - it became light for them
  - the dawn broke on them
  lexicon: HALOT
  rationale: The verb אור here denotes becoming light/daybreak. 'Daybreak came upon
    them' is idiomatic and preserves the event-like force of the Hebrew better than
    the wooden 'it became light for them.'
- source_word: בְּחֶבְרוֹן
  chosen: at Hebron
  alternatives:
  - in Hebron
  rationale: Hebron is transliterated as a place name. 'At Hebron' is a natural English
    locative with a destination/arrival nuance in narrative context.
