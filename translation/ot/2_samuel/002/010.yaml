id: 2SA.2.10
reference: 2 Samuel 2:10
source:
  edition: WLC
  text: בֶּן אַרְבָּעִ֨ים שָׁנָ֜ה אִֽישׁ בֹּ֣שֶׁת בֶּן שָׁא֗וּל בְּ/מָלְכ/וֹ֙ עַל
    יִשְׂרָאֵ֔ל וּ/שְׁתַּ֥יִם שָׁנִ֖ים מָלָ֑ךְ אַ֚ךְ בֵּ֣ית יְהוּדָ֔ה הָי֖וּ אַחֲרֵ֥י
    דָוִֽד־־־־׃
translation:
  text: Ish-bosheth son of Saul was forty years old when he began to reign over Israel,
    and he reigned two years. But the house of Judah followed David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the house of Judah,' a corporate expression for the tribe/kingdom
      of Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'were loyal to David' / 'were on David's side.' Hebrew 'were after David'
      is an idiom of allegiance.
    reason: lexical_alternative
  - marker: c
    text: The name appears here in the Masoretic Text as Ish-bosheth; compare the
      alternative form Eshbaal in related traditions.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  chosen: was forty years old
  alternatives:
  - was a son of forty years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. Rendering it idiomatically in
    English preserves the plain sense without wooden literalism.
- source_word: אִישׁ בֹּשֶׁת
  chosen: Ish-bosheth
  alternatives:
  - Eshbaal
  lexicon: HALOT
  rationale: The consonantal form here is the established personal name Ish-bosheth
    in the Samuel tradition. An alternative historical form, Eshbaal, is reflected
    elsewhere in the broader textual tradition, but the MT here reads Ish-bosheth,
    so the transliterated MT name is retained.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he reigned
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb form here introduces the time
    at which his age is stated. English commonly expresses this as 'when he began
    to reign' or 'when he became king.' 'Began to reign' fits the regnal formula style
    of the context.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: In royal contexts עַל marks rule or authority over a people. 'Over Israel'
    is the natural English equivalent.
- source_word: וּשְׁתַּיִם שָׁנִים מָלָךְ
  chosen: and he reigned two years
  alternatives:
  - and his reign lasted two years
  lexicon: HALOT
  rationale: This is the straightforward regnal duration formula. The verbal rendering
    keeps the Hebrew structure and narrative style.
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - However
  - Yet
  lexicon: HALOT
  rationale: Here אַךְ marks a contrast between Ish-bosheth's reign over Israel and
    Judah's allegiance to David. 'But' communicates the adversative force most clearly
    in modern English.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - the people of Judah
  - Judah
  lexicon: HALOT
  rationale: The Hebrew literally says 'house of Judah.' Retaining 'house' preserves
    the tribal-household/corporate nuance and matches common biblical usage, while
    remaining understandable in English.
- source_word: הָיוּ אַחֲרֵי דָוִד
  chosen: followed David
  alternatives:
  - were behind David
  - were loyal to David
  - were on David's side
  lexicon: HALOT
  rationale: The idiom 'to be after' someone denotes allegiance or support. 'Followed
    David' is concise, natural, and preserves the sense of political loyalty without
    overinterpreting.
