id: 2SA.22.19
reference: 2 Samuel 22:19
source:
  edition: WLC
  text: יְקַדְּמֻ֖/נִי בְּ/י֣וֹם אֵידִ֑/י וַ/יְהִ֧י יְהוָ֛ה מִשְׁעָ֖ן לִֽ/י׃
translation:
  text: They confronted me in the day of my calamity, but the LORD was my support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They came upon me' or 'They met me' in the day of my calamity.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְקַדְּמֻנִי
  chosen: They confronted me
  alternatives:
  - They came upon me
  - They met me
  - They anticipated me
  lexicon: HALOT
  rationale: From קדמ in the Piel with 1cs object, here in a hostile context meaning
    to come before or meet someone aggressively. 'Confronted' captures the adversarial
    force better than the more neutral 'met' and is more natural in English than 'anticipated.'
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  lexicon: HALOT
  rationale: A straightforward temporal prepositional phrase. 'In the day of' preserves
    the Hebrew idiom while remaining clear in English.
- source_word: אֵידִי
  chosen: my calamity
  alternatives:
  - my disaster
  - my distress
  lexicon: HALOT
  rationale: אֵיד denotes ruin, disaster, or calamity. 'Calamity' best conveys severe
    misfortune without narrowing the sense to inward emotion alone, as 'distress'
    might.
- source_word: וַיְהִי
  chosen: but ... was
  alternatives:
  - and ... was
  lexicon: HALOT
  rationale: 'Though waw-consecutive on היה is formally ''and he/it was,'' in English
    the clause relation is adversative in context: enemies attack, yet the LORD supports.
    Rendering with ''but'' communicates the discourse contrast naturally.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following reverential Jewish and longstanding biblical translation practice.
- source_word: מִשְׁעָן
  chosen: my support
  alternatives:
  - my staff
  - my stay
  - my prop
  lexicon: HALOT
  rationale: מִשְׁעָן literally denotes something leaned on, such as a staff or support.
    In this metaphorical context, 'support' communicates the sense clearly in modern
    English without introducing an overly concrete image that may sound awkward here.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'The preposition marks relation: ''was support for me.'' English idiom
    expresses this naturally as ''was my support.'''
