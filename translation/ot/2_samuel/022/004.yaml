id: 2SA.22.4
reference: 2 Samuel 22:4
source:
  edition: WLC
  text: מְהֻלָּ֖ל אֶקְרָ֣א יְהוָ֑ה וּ/מֵ/אֹיְבַ֖/י אִוָּשֵֽׁעַ׃
translation:
  text: I call on the LORD, who is worthy of praise, and I am saved from my enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praised' / 'to be praised.' The Hebrew participle describes the LORD
      as one who is to be praised; 'worthy of praise' makes the sense explicit in
      natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהֻלָּל
  chosen: who is worthy of praise
  alternatives:
  - praised
  - to be praised
  lexicon: HALOT
  rationale: Passive participle of הלל used predicatively with YHWH. In English, 'worthy
    of praise' best captures the adjectival force and idiomatic sense in context,
    rather than the less natural 'praised I call' or the more wooden 'to be praised.'
- source_word: אֶקְרָא
  chosen: I call on
  alternatives:
  - I call
  - I invoke
  lexicon: HALOT
  rationale: קרא with the divine name commonly means calling upon or invoking the
    LORD, not merely speaking his name. 'Call on' is idiomatic and preserves the prayerful
    sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: וּמֵאֹיְבַי
  chosen: and from my enemies
  alternatives:
  - so from my enemies
  - and out of the hand of my enemies
  lexicon: HALOT
  rationale: The conjunction plus preposition marks coordination with the preceding
    clause and introduces the source from which deliverance comes. 'From my enemies'
    is the plain sense; expansions like 'out of the hand of' are not in the Hebrew
    here.
- source_word: אִוָּשֵׁעַ
  chosen: I am saved
  alternatives:
  - I am delivered
  - I will be saved
  lexicon: HALOT
  rationale: Niphal imperfect 1cs of ישׁע can denote being saved/delivered. In this
    poetic context following a habitual or gnomic statement, present English 'I am
    saved' reads naturally and reflects the result of calling on the LORD. 'Delivered'
    is possible, but 'saved' preserves the lexical connection to ישׁע.
