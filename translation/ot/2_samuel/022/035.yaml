id: 2SA.22.35
reference: 2 Samuel 22:35
source:
  edition: WLC
  text: מְלַמֵּ֥ד יָדַ֖/י לַ/מִּלְחָמָ֑ה וְ/נִחַ֥ת קֶֽשֶׁת נְחוּשָׁ֖ה זְרֹעֹתָֽ/י־׃
translation:
  text: He trains my hands for battle, and my arms can bend a bow of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for war.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my arms bend a bow of bronze,' with the Hebrew expressing the bow's
      being bent under the strength God gives.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלַמֵּד
  chosen: trains
  alternatives:
  - teaches
  - instructs
  lexicon: HALOT
  rationale: The participle from למד denotes teaching/training. In this martial context,
    'trains' best captures practical preparation for combat in natural English while
    remaining close to the Hebrew sense.
- source_word: יָדַי
  chosen: my hands
  lexicon: HALOT
  rationale: Literal plural with first-person singular suffix. 'Hands' is retained
    rather than generalized to 'me' to preserve the concrete bodily imagery.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: מלחמה can be rendered 'war' or 'battle.' 'Battle' fits idiomatic English
    after 'trains my hands' and conveys combat without implying only a prolonged campaign.
- source_word: וְנִחַת
  chosen: can bend
  alternatives:
  - is bent
  - has bent
  - makes bend
  lexicon: HALOT
  rationale: 'The verb from נחת here describes the action/effect involving the bow
    and the speaker''s arms. English idiom favors expressing the result as ability:
    ''my arms can bend.'' This avoids an awkward passive (''is bent'') while preserving
    the sense of martial strength enabled by God.'
- source_word: קֶשֶׁת
  chosen: a bow
  lexicon: HALOT
  rationale: Standard rendering of the weapon term; the indefinite article is natural
    in English.
- source_word: נְחוּשָׁה
  chosen: of bronze
  alternatives:
  - bronze
  - copper
  lexicon: HALOT
  rationale: The noun/adjective denotes bronze/copper. 'Of bronze' is the most idiomatic
    modifier for 'bow' in English and reflects the likely sense of a strong metal
    bow.
- source_word: זְרֹעֹתַי
  chosen: my arms
  lexicon: HALOT
  rationale: Literal plural with first-person singular suffix. 'Arms' should be retained
    because the verse intentionally parallels 'hands' and emphasizes bodily empowerment.
