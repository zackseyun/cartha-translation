id: 2SA.22.11
reference: 2 Samuel 22:11
source:
  edition: WLC
  text: וַ/יִּרְכַּ֥ב עַל כְּר֖וּב וַ/יָּעֹ֑ף וַ/יֵּרָ֖א עַל כַּנְפֵי רֽוּחַ־־־׃
translation:
  text: He rode on a cherub and flew; he was seen on the wings of the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he appeared on the wings of the wind.' The Hebrew verb can be understood
      as 'was seen' or 'appeared.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְכַּב
  chosen: he rode
  alternatives:
  - he mounted
  lexicon: HALOT
  rationale: Qal wayyiqtol of רכב, the standard verb for riding/mounting. 'He rode'
    is natural modern English and preserves the vivid imagery.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position/support here. 'On'
    is idiomatic modern English; 'upon' is possible but more archaic.
- source_word: כְּרוּב
  chosen: cherub
  alternatives:
  - cherubim-being
  lexicon: HALOT
  rationale: The singular noun denotes a cherub, the known heavenly throne-creature
    of the Hebrew Bible. 'Cherub' preserves the established referent without paraphrase.
- source_word: וַיָּעֹף
  chosen: and flew
  alternatives:
  - and he flew
  - and soared
  lexicon: HALOT
  rationale: From עוף, 'to fly.' 'Flew' is the plain sense. 'Soared' adds nuance not
    required by the Hebrew.
- source_word: וַיֵּרָא
  chosen: he was seen
  alternatives:
  - he appeared
  - he was visible
  lexicon: HALOT
  rationale: The form is best taken from ראה in the Niphal, yielding a passive/reflexive
    sense, 'he was seen' or 'appeared.' 'He was seen' more directly reflects the verbal
    stem and avoids over-interpreting whether the emphasis is on manifestation or
    visibility.
- source_word: כַּנְפֵי
  chosen: the wings of
  alternatives:
  - the pinions of
  lexicon: HALOT
  rationale: Construct plural of כָּנָף, literally 'wings.' 'Pinions' is possible
    but less accessible; 'wings' is the standard and vivid image.
- source_word: רוּחַ
  chosen: the wind
  alternatives:
  - the spirit
  - the storm-wind
  lexicon: HALOT
  rationale: In this poetic theophanic context, רוּחַ most naturally denotes wind
    rather than spirit. 'Storm-wind' is interpretive and stronger than the lexical
    form itself, though contextually related.
