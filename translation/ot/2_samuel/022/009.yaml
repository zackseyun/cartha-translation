id: 2SA.22.9
reference: 2 Samuel 22:9
source:
  edition: WLC
  text: עָלָ֤ה עָשָׁן֙ בְּ/אַפּ֔/וֹ וְ/אֵ֥שׁ מִ/פִּ֖י/ו תֹּאכֵ֑ל גֶּחָלִ֖ים בָּעֲר֥וּ
    מִמֶּֽ/נּוּ׃
translation:
  text: Smoke went up from his nostrils, and consuming fire from his mouth; coals
    blazed from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his nose,' with 'his anger' as an idiomatic sense of the Hebrew
      word for 'nose/nostril.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: went up
  alternatives:
  - rose
  - ascended
  lexicon: HALOT
  rationale: The verb denotes upward movement. 'Went up' is natural modern English
    and preserves the concrete imagery without sounding overly elevated.
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Standard gloss; no contextual reason to vary.
- source_word: בְּאַפּוֹ
  chosen: from his nostrils
  alternatives:
  - from his nose
  - in his anger
  lexicon: HALOT
  rationale: Although אַף can idiomatically mean 'anger,' in this poetic theophanic
    context the parallel with 'from his mouth' favors the concrete bodily image. The
    preposition is rendered idiomatically as 'from' in English to match the motion
    of smoke issuing outward.
- source_word: וְאֵשׁ
  chosen: and ... fire
  lexicon: HALOT
  rationale: Simple coordinating conjunction plus noun; retained directly.
- source_word: מִפִּיו
  chosen: from his mouth
  lexicon: HALOT
  rationale: Direct and literal; preserves the parallelism with 'from his nostrils.'
- source_word: תֹּאכֵל
  chosen: consuming
  alternatives:
  - devoured
  - was devouring
  - consumes
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'fire.' Rendering it adjectivally
    as 'consuming fire' produces natural English while preserving the active sense
    of fire that devours.
- source_word: גֶּחָלִים
  chosen: coals
  alternatives:
  - burning coals
  - charcoals
  lexicon: HALOT
  rationale: '''Coals'' is the standard gloss. ''Burning'' is not necessary because
    the following verb already conveys ignition/blazing.'
- source_word: בָּעֲרוּ
  chosen: blazed
  alternatives:
  - burned
  - were kindled
  lexicon: HALOT
  rationale: The verb conveys burning/kindling. 'Blazed' fits the vivid poetic imagery
    better than the flatter 'burned.'
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - by him
  - out of him
  lexicon: HALOT
  rationale: The preposition מן most naturally indicates source. 'From him' preserves
    the imagery of fiery emission from the divine warrior.
