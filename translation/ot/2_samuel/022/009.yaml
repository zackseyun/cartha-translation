theological_decisions:
- issue: Anthropomorphic language for God in the theophany
  chosen_reading: 'Retain the bodily imagery literally: ''nostrils,'' ''mouth,'' and
    fire/smoke issuing from him.'
  alternative_readings:
  - Interpret 'his nose' idiomatically as 'his anger' and smooth the imagery
  rationale: The verse is poetic and theophanic, using anthropomorphic imagery to
    depict divine wrath and power. Preserving the concrete imagery maintains the Hebrew
    parallelism and theological force without over-interpreting it into an abstract
    statement about anger alone.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
