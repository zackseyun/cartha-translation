id: 2SA.22.42
reference: 2 Samuel 22:42
source:
  edition: WLC
  text: יִשְׁע֖וּ וְ/אֵ֣ין מֹשִׁ֑יעַ אֶל יְהוָ֖ה וְ/לֹ֥א עָנָֽ/ם־׃
translation:
  text: They cried for help, but there was no one to save; to the LORD, but he did
    not answer them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh''; the main text follows the project''s standard rendering
      ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁעוּ
  chosen: They cried for help
  alternatives:
  - They looked
  - They cried out
  lexicon: HALOT
  rationale: From שׁעה/ישע in this form and context, the sense is a desperate cry
    for deliverance rather than mere visual looking. 'Cried for help' makes the implied
    appeal explicit in natural English and fits the parallel with 'no one to save.'
- source_word: וְאֵין
  chosen: but there was no
  alternatives:
  - and there was no
  lexicon: HALOT
  rationale: The conjunction links the clauses, but in English 'but' best conveys
    the adversative force created by the failed appeal.
- source_word: מֹשִׁיעַ
  chosen: one to save
  alternatives:
  - deliverer
  - savior
  lexicon: HALOT
  rationale: The participle of ישׁע denotes one who saves/delivers. 'One to save'
    is idiomatic and avoids importing later title-language ('Savior') where the immediate
    sense is simply absence of deliverance.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks the direction of their appeal. Per doctrine, יְהוָה
    is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: וְלֹא עָנָם
  chosen: but he did not answer them
  alternatives:
  - and he did not answer them
  - but he did not respond to them
  lexicon: HALOT
  rationale: ענה here means to answer/respond. 'But' again reflects the adversative
    sense in context; the 3ms verb with 3mp suffix is naturally rendered 'he did not
    answer them,' with the subject understood as the LORD from the previous phrase.
