id: 2SA.22.43
reference: 2 Samuel 22:43
source:
  edition: WLC
  text: וְ/אֶשְׁחָקֵ֖/ם כַּ/עֲפַר אָ֑רֶץ כְּ/טִיט חוּצ֥וֹת אֲדִקֵּ֖/ם אֶרְקָעֵֽ/ם־־׃
translation:
  text: I crushed them like the dust of the earth; like the mud of the streets I pounded
    them and trampled them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'I spread them out,' for the final verb; the Hebrew can carry
      the sense of beating out or flattening.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶשְׁחָקֵם
  chosen: I crushed them
  alternatives:
  - I beat them fine
  - I ground them down
  lexicon: HALOT
  rationale: From שׁחק in the Qal with 3mp suffix, conveying pulverizing or crushing.
    'I crushed them' is idiomatic modern English and fits the simile with dust, while
    preserving the violent force better than a weaker rendering.
- source_word: כַּעֲפַר אָרֶץ
  chosen: like the dust of the earth
  alternatives:
  - like dust on the ground
  - like the dust of the land
  lexicon: HALOT
  rationale: עפר commonly means 'dust' or loose earth. 'Dust of the earth' preserves
    the Hebrew genitive and echoes biblical diction naturally in English.
- source_word: כְּטִיט חוּצוֹת
  chosen: like the mud of the streets
  alternatives:
  - like street mire
  - like the mire of the open places
  lexicon: HALOT
  rationale: טיט is 'mud/mire' and חוצות refers to streets or open public places in
    a town. 'Mud of the streets' is clear, vivid, and faithful.
- source_word: אֲדִקֵּם
  chosen: I pounded them
  alternatives:
  - I crushed them
  - I pulverized them
  lexicon: HALOT
  rationale: From דקק in the Hiphil, meaning to crush or pound small. Because the
    first verb already carries 'crushed,' 'pounded' preserves the progression and
    avoids flattening the parallelism into repetition.
- source_word: אֶרְקָעֵם
  chosen: trampled them down
  alternatives:
  - stamped on them
  - spread them out
  lexicon: HALOT
  rationale: From רקע, whose core sense can involve beating out or stamping/spreading.
    In this martial context, paired with street mud, 'trampled them down' best captures
    the image of enemies treated like mud underfoot. The more literal 'spread them
    out' is possible but less fitting in context, so it is preserved in a footnote.
