theological_decisions:
- issue: Whether David's statement implies sinless perfection
  chosen_reading: A claim of covenantal integrity/blamelessness in context, not absolute
    sinlessness
  alternative_readings:
  - A claim of absolute moral perfection
  rationale: The lexical choice 'blameless' for תָמִים and 'from my iniquity' preserves
    the text's strong self-description while avoiding an interpretive overstatement
    the Hebrew does not require. The verse speaks of integrity before God and self-guarding
    from wrongdoing, consistent with historic orthodox reading of human fallenness.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
