id: 2SA.22.24
reference: 2 Samuel 22:24
source:
  edition: WLC
  text: וָ/אֶהְיֶ֥ה תָמִ֖ים ל֑/וֹ וָ/אֶשְׁתַּמְּרָ֖/ה מֵ/עֲוֺנִֽ/י׃
translation:
  text: I was blameless before him, and I kept myself from my iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was whole/complete with him.' The Hebrew adjective can emphasize integrity
      or wholeness, not merely freedom from accusation.
    reason: lexical_alternative
  - marker: b
    text: Or 'I guarded myself from my sin/guilt.' The Hebrew word can mean iniquity,
      guilt, or sin depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  chosen: I was
  alternatives:
  - and I was
  - I became
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה in narrative poetry is most naturally rendered as
    a past tense, 'I was.' The prefixed conjunction is carried by normal English clause
    linkage rather than repeated mechanically at the start.
- source_word: תָמִים
  chosen: blameless
  alternatives:
  - whole
  - complete
  - upright
  lexicon: HALOT
  rationale: תָמִים often denotes integrity or wholeness in covenantal/moral contexts.
    'Blameless' best fits David's claim of integrity here without implying absolute
    sinlessness.
- source_word: לוֹ
  chosen: before him
  alternatives:
  - to him
  - with him
  lexicon: HALOT
  rationale: 'Although literally ''to him/for him,'' in this idiom the sense is relational
    and evaluative: David was blameless in God''s sight. ''Before him'' is idiomatic
    English and matches the parallel in the Psalm version.'
- source_word: וָאֶשְׁתַּמְּרָה
  chosen: I kept myself
  alternatives:
  - I guarded myself
  - I was on guard
  lexicon: HALOT
  rationale: The hitpael/cohortative-like form of שׁמר here expresses reflexive self-guarding.
    'I kept myself' is concise, natural English that preserves the reflexive force.
- source_word: מֵעֲוֺנִי
  chosen: from my iniquity
  alternatives:
  - from my guilt
  - from my sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequence of guilt. 'Iniquity'
    preserves the moral weight and traditional semantic range. The first-person suffix
    is retained as 'my.'
