id: 2SA.22.2
reference: 2 Samuel 22:2
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר יְהוָ֛ה סַֽלְעִ֥/י וּ/מְצֻדָתִ֖/י וּ/מְפַלְטִ/י לִֽ/י־׃
translation:
  text: 'And he said: “The LORD is my rock and my fortress and my deliverer for me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my deliverer”; the final phrase “for me” is explicit in Hebrew and adds
      personal emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  - He said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'And he said' preserves
    the Hebrew sequence naturally without overinterpreting temporal nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated,
    following established reverential convention and the stated default for יְהוָה.
- source_word: סַלְעִי
  chosen: my rock
  alternatives:
  - my crag
  - my cliff
  lexicon: HALOT
  rationale: סֶלַע commonly denotes a rock face or crag. 'My rock' is the most idiomatic
    English metaphor here and preserves the protective imagery without unnecessary
    archaism.
- source_word: וּמְצֻדָתִי
  chosen: and my fortress
  alternatives:
  - and my stronghold
  lexicon: HALOT
  rationale: The noun denotes a fortified place or stronghold. 'Fortress' is clear,
    natural English and fits the parallel military-protective imagery.
- source_word: וּמְפַלְטִי
  chosen: and my deliverer
  alternatives:
  - and my rescuer
  - and the one who delivers me
  lexicon: HALOT
  rationale: 'The participial form from פלט functions substantivally: ''one who delivers/rescues
    me.'' ''Deliverer'' is concise and preserves the personal, ongoing sense of the
    Hebrew.'
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - omitted in smoother English as implied possession
  lexicon: HALOT
  rationale: The final pronoun is present in the Hebrew and should be represented.
    'For me' is somewhat emphatic and preserves the text's personal appropriation,
    though English style may find it slightly redundant.
