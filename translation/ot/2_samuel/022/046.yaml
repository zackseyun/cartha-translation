id: 2SA.22.46
reference: 2 Samuel 22:46
source:
  edition: WLC
  text: בְּנֵ֥י נֵכָ֖ר יִבֹּ֑לוּ וְ/יַחְגְּר֖וּ מִ/מִּסְגְּרוֹתָֽ/ם׃
translation:
  text: Foreigners lose heart and come trembling out of their strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Foreigners fade away.' The Hebrew verb can more literally denote withering
      or fading.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb is difficult here; alternatives include 'come cringing,'
      'come limping,' or more literally 'gird themselves.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from their fortresses' or, less likely, 'from their prisons/enclosures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  chosen: Foreigners
  alternatives:
  - sons of foreigners
  - foreign sons
  - children of a foreign land
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of foreignness/foreigners,'
    an idiom for foreign people. 'Foreigners' is natural modern English and preserves
    the collective ethnic sense without wooden literalism.
- source_word: יִבֹּלוּ
  chosen: lose heart
  alternatives:
  - fade away
  - wither
  - come trembling
  lexicon: HALOT
  rationale: From נבל, commonly 'wither, fade.' In this poetic military context it
    describes the collapse of courage or vitality rather than literal physical withering.
    'Lose heart' captures the idiomatic force in readable English. A more literal
    'fade away' is possible and worth preserving in a footnote.
- source_word: וְיַחְגְּרוּ
  chosen: come trembling
  alternatives:
  - come cringing
  - come limping
  - gird themselves
  lexicon: HALOT
  rationale: The verb is difficult here. While the root חגר commonly means 'gird,'
    in this context and in parallel with Psalm 18:45 it is widely understood idiomatically
    of coming out in fearful agitation. 'Come trembling' best fits the context of
    subdued enemies emerging from fortifications. More literal or alternate proposals
    are preserved in a footnote.
- source_word: מִמִּסְגְּרוֹתָם
  chosen: out of their strongholds
  alternatives:
  - out of their fortresses
  - from their prisons
  - from their enclosures
  lexicon: HALOT
  rationale: מִסְגְּרוֹת can denote places of confinement or enclosure. In a military
    victory song, 'strongholds' best fits enemies emerging from defensive positions.
    'Prisons' is less likely in context but lexically possible, so an alternative
    is noted.
