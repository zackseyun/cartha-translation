id: 2SA.22.6
reference: 2 Samuel 22:6
source:
  edition: WLC
  text: חֶבְלֵ֥י שְׁא֖וֹל סַבֻּ֑/נִי קִדְּמֻ֖/נִי מֹֽקְשֵׁי מָֽוֶת־׃
translation:
  text: The cords of Sheol surrounded me; the snares of death confronted me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: alternative_reading
  - marker: b
    text: Or 'met me' or 'came before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  chosen: cords of
  alternatives:
  - ropes of
  - bands of
  lexicon: HALOT
  rationale: חבל can denote cords/ropes or bands, especially in poetic imagery of
    entanglement. 'Cords' is natural modern English and preserves the metaphor without
    overinterpreting it as 'pangs,' which fits some contexts but is less likely here
    alongside 'snares.'
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: The Hebrew names the underworld/the realm of the dead. Following original-language
    primacy, 'Sheol' is retained rather than flattened to 'grave' or expanded interpretively.
    This preserves the Hebrew poetic and theological texture.
- source_word: סַבֻּנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - hemmed me in
  lexicon: HALOT
  rationale: From סבב, 'to surround/encircle.' 'Surrounded me' is the most straightforward
    and idiomatic rendering in English.
- source_word: קִדְּמֻנִי
  chosen: confronted me
  alternatives:
  - came before me
  - met me
  - overtook me
  lexicon: HALOT
  rationale: From קדם in the sense of meeting or coming before someone. In this poetic
    context, 'confronted me' communicates hostile encounter clearly in modern English
    without losing the sense of something coming upon the speaker.
- source_word: מֹקְשֵׁי
  chosen: snares of
  alternatives:
  - traps of
  lexicon: HALOT
  rationale: מוקש denotes a snare/trap. 'Snares' fits the poetic parallelism with
    'cords' and is a standard, vivid English equivalent.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Direct rendering of the noun; no contextual reason to paraphrase.
