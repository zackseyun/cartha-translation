theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse uses Israel's term for the underworld/death realm. Transliteration
    preserves theological tension and avoids prematurely resolving whether the emphasis
    is on burial, death, or the underworld more broadly.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
