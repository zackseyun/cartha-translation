theological_decisions:
- issue: Royal language about rule over foreign nations
  chosen_reading: Retain the historical-royal sense without importing later messianic
    expansion into the main text.
  alternative_readings:
  - Read as directly messianic in the main text
  rationale: In context this is David's song of deliverance and kingship. While the
    verse may have typological or messianic significance in broader canonical reading,
    the translation should first reflect the Hebrew's immediate historical sense and
    not insert explicit messianic interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
