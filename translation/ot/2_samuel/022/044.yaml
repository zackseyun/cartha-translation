id: 2SA.22.44
reference: 2 Samuel 22:44
source:
  edition: WLC
  text: וַֽ/תְּפַלְּטֵ֔/נִי מֵ/רִיבֵ֖י עַמִּ֑/י תִּשְׁמְרֵ֨/נִי֙ לְ/רֹ֣אשׁ גּוֹיִ֔ם
    עַ֥ם לֹא יָדַ֖עְתִּי יַעַבְדֻֽ/נִי־׃
translation:
  text: You delivered me from the strivings of my people; you kept me as the head
    of nations; a people I had not known served me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the contentions of my people.' The Hebrew may refer to internal
      strife among David's own people or conflicts involving them.
    reason: lexical_alternative
  - marker: b
    text: Or 'you preserved me as chief over nations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a people I did not know will serve me.' The Hebrew imperfect can be
      rendered with a future nuance in poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּפַלְּטֵנִי
  chosen: You delivered me
  alternatives:
  - You rescued me
  - You brought me out safely
  lexicon: HALOT
  rationale: From פלט in the Hiphil with 1cs suffix, expressing causing someone to
    escape or be delivered. 'Delivered' is natural modern English and fits the psalmic
    context of divine rescue.
- source_word: מֵרִיבֵי
  chosen: from the strivings
  alternatives:
  - from the contentions
  - from the disputes
  - from the quarrels
  lexicon: HALOT
  rationale: רִיב can denote strife, dispute, or contention. The plural construct
    with מן indicates deliverance from ongoing conflicts. 'Strivings' preserves the
    broad sense without narrowing to legal litigation alone.
- source_word: עַמִּי
  chosen: of my people
  alternatives:
  - with my people
  lexicon: HALOT
  rationale: The construct phrase מֵרִיבֵי עַמִּי is most naturally 'from the strivings/contentions
    of my people.' This may refer either to internal opposition among David's own
    people or conflicts involving them; the genitive is best left broad in English.
- source_word: תִּשְׁמְרֵנִי
  chosen: you kept me
  alternatives:
  - you preserved me
  - you guarded me
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, preserve. Here it introduces God's sustaining
    appointment of the king. 'Kept me' is concise and idiomatic, while still allowing
    the sense of preservation.
- source_word: לְרֹאשׁ גּוֹיִם
  chosen: as the head of nations
  alternatives:
  - for the head of nations
  - as chief over nations
  lexicon: HALOT
  rationale: רֹאשׁ here is metaphorical for chief or leader. The preposition לְ after
    שׁמר can indicate result or role. 'As the head of nations' communicates installed
    status and preserves the metaphor.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: גּוֹיִם in this royal context refers to nations/peoples beyond Israel.
    'Nations' is the standard and least misleading rendering here; 'Gentiles' would
    import later Jewish-Christian usage.
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  lexicon: HALOT
  rationale: The singular collective noun is indefinite here. 'A people' preserves
    the singular form while functioning naturally in English.
- source_word: לֹא יָדַעְתִּי
  chosen: I had not known
  alternatives:
  - I did not know
  - I had not recognized
  lexicon: HALOT
  rationale: 'ידע in the perfect denotes prior acquaintance or knowledge. The pluperfect-like
    English ''had not known'' best reflects the relation to the following clause:
    previously unknown peoples now serve him.'
- source_word: יַעַבְדֻנִי
  chosen: served me
  alternatives:
  - will serve me
  - became subject to me
  lexicon: HALOT
  rationale: עבד in this context denotes political service/subjection. The imperfect
    in poetry may express customary or resultant action; English simple past fits
    the surrounding retrospective song. 'Served me' preserves the lexical link without
    over-paraphrasing to 'became subject.'
