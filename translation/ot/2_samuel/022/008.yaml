theological_decisions:
- issue: Anthropopathic description of divine anger
  chosen_reading: because he was angry
  alternative_readings:
  - because his anger burned
  rationale: The Hebrew idiom attributes anger to God in vivid poetic-theophanic language.
    The translation preserves the real sense of divine anger without over-literalizing
    the idiom in the main text; the more literal 'his anger burned' is preserved in
    a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
