id: 2SA.22.8
reference: 2 Samuel 22:8
source:
  edition: WLC
  text: ו/תגעש וַ/תִּרְעַשׁ֙ הָ/אָ֔רֶץ מוֹסְד֥וֹת הַ/שָּׁמַ֖יִם יִרְגָּ֑זוּ וַ/יִּֽתְגָּעֲשׁ֖וּ
    כִּֽי חָ֥רָה לֽ/וֹ־׃
translation:
  text: Then the earth reeled and quaked; the foundations of the heavens trembled
    and shook, because he was angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “because his anger burned.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְעַשׁ
  chosen: reeled
  alternatives:
  - shook
  - convulsed
  lexicon: HALOT
  rationale: The verb conveys violent agitation or upheaval. 'Reeled' captures the
    vivid poetic image of the earth lurching under divine intervention, while avoiding
    redundancy with the following verb.
- source_word: וַתִּרְעַשׁ
  chosen: quaked
  alternatives:
  - trembled
  - shook
  lexicon: HALOT
  rationale: This common verb for seismic trembling is well rendered by 'quaked.'
    Paired with 'reeled,' it preserves the Hebrew poetic intensification with distinct
    but related English verbs.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic theophanic context, the global/cosmic sense 'earth' fits
    better than the more localized 'land'.
- source_word: מוֹסְדוֹת הַשָּׁמַיִם
  chosen: the foundations of the heavens
  alternatives:
  - the foundations of heaven
  - the bases of the heavens
  lexicon: HALOT
  rationale: A formal rendering best preserves the ancient cosmological imagery of
    the poetic line. The plural 'heavens' reflects the Hebrew form and common biblical
    usage.
- source_word: יִרְגָּזוּ
  chosen: trembled
  alternatives:
  - quaked
  - were agitated
  lexicon: HALOT
  rationale: The verb denotes shaking or agitation. 'Trembled' fits the plural subject
    'foundations' and varies naturally from the earlier 'quaked' without losing force.
- source_word: וַיִּתְגָּעֲשׁוּ
  chosen: shook
  alternatives:
  - were shaken
  - convulsed
  lexicon: HALOT
  rationale: The reflexive form intensifies the disturbance. 'Shook' is idiomatic
    and forceful, preserving the parallelism with the prior verb while sounding natural
    in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: '''Because'' clearly expresses the causal relationship in contemporary
    English. ''For'' is possible but more archaic/literary.'
- source_word: חָרָה לוֹ
  chosen: he was angry
  alternatives:
  - his anger burned
  - it burned for him
  lexicon: HALOT
  rationale: The idiom literally involves burning anger. 'He was angry' communicates
    the sense clearly in modern English, while the subject is best understood as God
    from context. A more literal alternative is worth preserving in a footnote.
