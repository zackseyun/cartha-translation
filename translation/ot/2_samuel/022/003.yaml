theological_decisions:
- issue: Metaphorical divine titles in a poetic chain
  chosen_reading: Retain the concrete metaphors ('rock,' 'shield,' 'horn,' 'stronghold,'
    'refuge') rather than flattening them into abstract explanations.
  alternative_readings:
  - Expand metaphors interpretively, e.g., 'protector' or 'source of strength'
  rationale: The verse piles up covenantal and martial images for God. Preserving
    the metaphors maintains the theological texture and poetic force without importing
    extra interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
- issue: Rendering of מֹשִׁעִי
  chosen_reading: my savior
  alternative_readings:
  - my deliverer
  rationale: Although 'deliverer' is possible and sometimes less theologically loaded
    in English, 'savior' is a faithful lexical rendering and does not import later
    doctrinal claims beyond the text's own assertion that God saves.
  doctrine_reference: 'Affirmations; Translation philosophy: readable modern English,
    not archaic or academic.'
