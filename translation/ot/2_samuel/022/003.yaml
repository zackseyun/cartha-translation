id: 2SA.22.3
reference: 2 Samuel 22:3
source:
  edition: WLC
  text: אֱלֹהֵ֥י צוּרִ֖/י אֶחֱסֶה בּ֑/וֹ מָגִנִּ֞/י וְ/קֶ֣רֶן יִשְׁעִ֗/י מִשְׂגַּבִּ/י֙
    וּ/מְנוּסִ֔/י מֹשִׁעִ֕/י מֵ/חָמָ֖ס תֹּשִׁעֵֽ/נִי־׃
translation:
  text: my God, my rock, in whom I take refuge, my shield and the horn of my salvation,
    my stronghold and my refuge, my savior—you save me from violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God of my rock'; the Hebrew construction can be rendered more literally
      this way, but 'my God, my rock' better fits the poetic apposition in English.
    reason: lexical_alternative
  - marker: b
    text: '''Horn'' is a Hebrew image for strength and victorious power.'
    reason: cultural_note
  - marker: c
    text: Or 'my deliverer' for 'my savior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי
  chosen: my God
  alternatives:
  - God of
  lexicon: HALOT
  rationale: Construct form with following possessive noun can be rendered appositionally
    in English. 'My God, my rock' is more natural and reflects the parallel title
    sequence better than the more wooden 'God of my rock.'
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock/cliff and is a frequent metaphor for God
    as stability and protection. 'Rock' preserves the established metaphor and is
    more idiomatic than 'crag.'
- source_word: אֶחֱסֶה בוֹ
  chosen: in whom I take refuge
  alternatives:
  - I take refuge in him
  - in him I seek shelter
  lexicon: HALOT
  rationale: The verb חסה means to seek refuge. Rendering with a relative clause ('in
    whom') fits the English appositional chain of divine titles while preserving the
    preposition בוֹ.
- source_word: מָגִנִּי
  chosen: my shield
  lexicon: HALOT
  rationale: Straightforward metaphor for protection; 'shield' is the standard and
    precise gloss.
- source_word: קֶרֶן יִשְׁעִי
  chosen: the horn of my salvation
  alternatives:
  - my saving horn
  - the horn of my deliverance
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn' and metaphorically signifies strength/power.
    Retaining 'horn' preserves the Hebrew image; 'of my salvation' closely reflects
    the construct phrase.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my high tower
  - my fortress
  lexicon: HALOT
  rationale: The noun denotes a secure high place or strong refuge. 'Stronghold' communicates
    both security and defensive imagery in contemporary English.
- source_word: וּמְנוּסִי
  chosen: my refuge
  alternatives:
  - my place of escape
  - my shelter
  lexicon: HALOT
  rationale: From a noun related to fleeing for safety; 'refuge' is concise, natural,
    and semantically accurate.
- source_word: מֹשִׁעִי
  chosen: my savior
  alternatives:
  - my deliverer
  lexicon: HALOT
  rationale: The participial form from ישׁע denotes one who saves/delivers. 'Savior'
    is the most direct nominal rendering and fits the poetic sequence of titles.
- source_word: מֵחָמָס
  chosen: from violence
  alternatives:
  - from wrong
  - from violent men
  lexicon: HALOT
  rationale: חָמָס denotes violence or violent wrongdoing. 'From violence' preserves
    the abstract noun in the Hebrew rather than specifying agents not explicit in
    the text.
- source_word: תֹּשִׁעֵנִי
  chosen: you save me
  alternatives:
  - you deliver me
  lexicon: HALOT
  rationale: 'Second masculine singular imperfect with first singular object: direct
    address to God. Present-tense English in poetry communicates the ongoing character
    of God''s saving action without over-specifying aspect.'
