theological_decisions:
- issue: Divine reciprocity in poetic description
  chosen_reading: Render the verse as describing God's corresponding dealings with
    people according to their character, without implying a denial of grace or a mechanistic
    doctrine of merit.
  alternative_readings:
  - A stronger merit-based reciprocity
  - A purely descriptive statement about human perception of God
  rationale: The Hebrew poetry presents reciprocal correspondence ('with X, you show
    yourself X-like'). The translation should preserve that tension without importing
    a full theological system. 'Show yourself' keeps the poetic relational sense and
    avoids over-defining how divine justice and grace interrelate.
  doctrine_reference: Preserve theological tension rather than resolve it.
