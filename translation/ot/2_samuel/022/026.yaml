id: 2SA.22.26
reference: 2 Samuel 22:26
source:
  edition: WLC
  text: עִם חָסִ֖יד תִּתְחַסָּ֑ד עִם גִּבּ֥וֹר תָּמִ֖ים תִּתַּמָּֽם־־׃
translation:
  text: With the faithful you show yourself faithful; with the blameless warrior you
    show yourself blameless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''merciful'': the Hebrew verb and adjective are cognate, and many translations
      render the first line, ''With the merciful you show yourself merciful.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty man' for 'warrior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָסִיד
  chosen: faithful
  alternatives:
  - loyal
  - godly
  - merciful one
  - saintly
  lexicon: HALOT
  rationale: חָסִיד denotes one characterized by covenant loyalty/piety. 'Faithful'
    fits the reciprocal wordplay with תִּתְחַסָּד and is clear in modern English.
    'Merciful' is possible by cognate association, but here the parallelism favors
    covenant fidelity rather than mere compassion.
- source_word: תִּתְחַסָּד
  chosen: you show yourself faithful
  alternatives:
  - you show yourself merciful
  - you act loyally
  lexicon: HALOT
  rationale: The hitpael of חסד here expresses reciprocal display of covenant loyalty
    toward the חָסִיד. 'Show yourself faithful' preserves the reflexive nuance and
    the lexical connection to חָסִיד. 'Merciful' is a traditional rendering, but using
    'faithful' better preserves the Hebrew wordplay and broader covenant sense.
- source_word: גִּבּוֹר
  chosen: warrior
  alternatives:
  - mighty man
  - strong man
  - hero
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a mighty man or warrior. Since it is modified
    by תָּמִים and appears in poetic parallelism, 'warrior' gives a natural English
    sense without flattening the term to generic strength.
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - whole
  - integrity
  - upright
  lexicon: HALOT
  rationale: תָּמִים often carries the sense of integrity or blamelessness in moral
    contexts. 'Blameless' is idiomatic and matches the following תִּתַּמָּם, preserving
    the lexical pairing.
- source_word: תִּתַּמָּם
  chosen: you show yourself blameless
  alternatives:
  - you show yourself upright
  - you deal with integrity
  - you are perfect
  lexicon: HALOT
  rationale: 'The hitpael/reflexive form mirrors the prior clause: God shows himself
    in a manner corresponding to the person''s character. ''Show yourself blameless''
    preserves the reflexive sense and the wordplay with תָּמִים. ''Perfect'' would
    sound misleading in contemporary English.'
- source_word: עִם
  chosen: with
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks relational correspondence. 'With' is the most direct
    and natural rendering in both cola.
