id: 2SA.22.49
reference: 2 Samuel 22:49
source:
  edition: WLC
  text: וּ/מוֹצִיאִ֖/י מֵ/אֹֽיְבָ֑/י וּ/מִ/קָּמַ/י֙ תְּר֣וֹמְמֵ֔/נִי מֵ/אִ֥ישׁ חֲמָסִ֖ים
    תַּצִּילֵֽ/נִי׃
translation:
  text: who brings me out from my enemies; you exalt me above those who rise against
    me; you deliver me from the violent man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and brings me out from my enemies'; the Hebrew conjunction may be carried
      into English explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or 'from a man of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמוֹצִיאִי
  chosen: who brings me out
  alternatives:
  - and brings me out
  - who delivers me
  lexicon: HALOT
  rationale: From יצא/הוציא in the causative sense, 'bring out' or 'lead out.' Because
    the verse continues the relative-style description of God from the preceding context,
    'who brings me out' fits the syntax and preserves the concrete imagery better
    than the more generalized 'delivers me.'
- source_word: מֵאֹיְבָי
  chosen: from my enemies
  alternatives:
  - out from my enemies
  lexicon: HALOT
  rationale: Straightforward preposition + noun with 1cs suffix. 'From my enemies'
    is natural English and preserves the source relation.
- source_word: וּמִקָּמַי
  chosen: those who rise against me
  alternatives:
  - my adversaries
  - those who stand up against me
  lexicon: HALOT
  rationale: From קום with hostile sense in participial/substantival usage. 'Those
    who rise against me' preserves the verbal imagery and the adversarial nuance better
    than the flatter 'adversaries.'
- source_word: תְּרוֹמְמֵנִי
  chosen: you exalt me above
  alternatives:
  - you lift me high above
  - you set me on high above
  lexicon: HALOT
  rationale: From רום in a causative/intensive sense, indicating elevation over opponents.
    'You exalt me above' is idiomatic, concise, and preserves both the vertical metaphor
    and the sense of triumph.
- source_word: מֵאִישׁ חֲמָסִים
  chosen: from the violent man
  alternatives:
  - from a man of violence
  - from violent men
  lexicon: HALOT
  rationale: איש is singular, and חמסים is an abstract/plural of quality meaning violence.
    'The violent man' is a natural English singular that reflects the Hebrew grammar
    and characterization. 'A man of violence' is possible but less idiomatic for modern
    readers.
- source_word: תַּצִּילֵנִי
  chosen: you deliver me
  alternatives:
  - you rescue me
  - you save me
  lexicon: HALOT
  rationale: From נצל, commonly 'deliver' or 'rescue.' 'Deliver' fits the elevated
    poetic register and pairs well with the surrounding military-oppression context.
