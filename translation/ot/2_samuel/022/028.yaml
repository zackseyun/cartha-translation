id: 2SA.22.28
reference: 2 Samuel 22:28
source:
  edition: WLC
  text: וְ/אֶת עַ֥ם עָנִ֖י תּוֹשִׁ֑יעַ וְ/עֵינֶ֖י/ךָ עַל רָמִ֥ים תַּשְׁפִּֽיל־־׃
translation:
  text: You save an afflicted people, but your eyes are on the haughty to bring them
    low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'poor people.' The Hebrew adjective can denote those who are poor, afflicted,
      or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'the proud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: The singular collective noun refers to a group of persons. 'People' is
    the most natural English collective here and fits the poetic parallelism.
- source_word: עָנִי
  chosen: afflicted
  alternatives:
  - poor
  - humble
  - needy
  lexicon: HALOT
  rationale: Though often rendered 'poor,' the adjective can denote one who is afflicted,
    oppressed, or humbled. In this poetic context contrasting with the exalted/haughty,
    'afflicted' captures social and experiential lowliness without reducing the sense
    merely to economics.
- source_word: תּוֹשִׁיעַ
  chosen: you save
  alternatives:
  - you deliver
  - you give victory to
  lexicon: HALOT
  rationale: From ישׁע in Hiphil, the verb commonly means to save or deliver. 'You
    save' is concise, natural, and preserves the broad salvific sense.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your gaze
  lexicon: HALOT
  rationale: The Hebrew uses the concrete idiom 'your eyes,' which should be preserved
    in English because it is clear and vivid.
- source_word: רָמִים
  chosen: the haughty
  alternatives:
  - the proud
  - the exalted ones
  - the lofty
  lexicon: HALOT
  rationale: As a participial form from רום in context, it denotes those who are high/exalted
    in a negative moral sense. 'The haughty' brings out the ethical contrast with
    the afflicted and fits the parallelism better than the more spatial 'exalted ones.'
- source_word: תַּשְׁפִּיל
  chosen: to bring them low
  alternatives:
  - you humble
  - you abase
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low, humble, or abase. Because the Hebrew
    clause literally says 'your eyes are on the haughty; you bring low,' the infinitival
    phrase in English smooths the syntax while preserving the resultative sense.
- source_word: וְאֶת
  chosen: (not separately translated)
  alternatives:
  - and
  - even
  lexicon: HALOT
  rationale: Here אֵת marks the direct object rather than contributing independent
    lexical content. It is represented implicitly in the English syntax.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: 'Although the conjunction is formally ''and,'' the poetic parallelism
    is adversative in sense: God saves the afflicted in contrast to humbling the haughty.
    ''But'' communicates the relationship more clearly in idiomatic English.'
