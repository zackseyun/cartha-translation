theological_decisions:
- issue: Moral versus merely social sense of the contrast
  chosen_reading: The verse contrasts God's saving of the lowly/afflicted with his
    humbling of the proud.
  alternative_readings:
  - The verse contrasts the economically poor with the socially elevated.
  rationale: The Hebrew permits a socioeconomic nuance, but the paired terms and broader
    biblical usage support a moral-theological contrast between the afflicted/humble
    and the haughty/proud without excluding social implications. The translation avoids
    narrowing the verse to economics alone.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence'
