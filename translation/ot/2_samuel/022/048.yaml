theological_decisions:
- issue: Divine vengeance language
  chosen_reading: Retain 'vengeance' as a description of God's just retribution on
    behalf of the speaker.
  alternative_readings:
  - justice
  - vindication
  rationale: The Hebrew noun נְקָמֹת directly denotes vengeance/avenging acts. Softer
    renderings such as 'justice' or 'vindication' reduce the lexical force and import
    interpretation not demanded by the text. Retaining 'vengeance' preserves the theological
    tension of divine judgment without embellishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Political subjugation imagery
  chosen_reading: Render the clause concretely as 'brings peoples down under me' rather
    than abstracting it to 'gives me victory over nations.'
  alternative_readings:
  - subdues peoples under me
  - gives me victory over nations
  rationale: The Hebrew uses a causative verb plus spatial language. A concrete rendering
    better reflects the source text and avoids importing a broader theological claim
    beyond the verse's immediate wording.
  doctrine_reference: Original-language primacy over translation tradition.
