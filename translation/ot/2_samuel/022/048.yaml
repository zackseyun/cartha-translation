id: 2SA.22.48
reference: 2 Samuel 22:48
source:
  edition: WLC
  text: הָ/אֵ֕ל הַ/נֹּתֵ֥ן נְקָמֹ֖ת לִ֑/י וּ/מוֹרִ֥יד עַמִּ֖ים תַּחְתֵּֽ/נִי׃
translation:
  text: the God who gives vengeance to me and brings peoples down under me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for me' or 'on my behalf' for 'to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nations' for 'peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: the God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Definite article plus אֵל is best represented as 'the God' in this poetic
    line, preserving the Hebrew definiteness and the appositional continuation from
    the surrounding context.
- source_word: הַנֹּתֵן
  chosen: who gives
  alternatives:
  - giving
  - who grants
  lexicon: HALOT
  rationale: The participle functions verbally in a relative sense, describing God's
    characteristic action. 'Who gives' is natural English and preserves the ongoing
    descriptive force.
- source_word: נְקָמֹת
  chosen: vengeance
  alternatives:
  - acts of vengeance
  - avenging acts
  lexicon: HALOT
  rationale: Though morphologically plural, the noun is commonly rendered idiomatically
    in English as the mass noun 'vengeance.' This avoids awkwardness while preserving
    the sense of retributive justice.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - on my behalf
  lexicon: HALOT
  rationale: The preposition can indicate advantage ('for me/on my behalf'), but 'to
    me' stays closer to the Hebrew construction and fits the idiom 'gives vengeance
    to me' in this poetic context.
- source_word: וּמוֹרִיד
  chosen: and brings ... down
  alternatives:
  - and subdues
  - and causes ... to descend
  lexicon: HALOT
  rationale: The Hiphil participle of ירד means 'cause to go down/bring down.' 'Brings
    down' preserves the concrete imagery better than the more interpretive 'subdues,'
    while still reading naturally.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: The plural 'peoples' reflects multiple ethnic or national groups more
    precisely than 'nations' here and preserves the collective-political sense of
    עַמִּים.
- source_word: תַּחְתֵּנִי
  chosen: under me
  alternatives:
  - beneath me
  - subject to me
  lexicon: HALOT
  rationale: The preposition literally means 'under/beneath.' 'Under me' preserves
    the spatial metaphor of subjugation without over-interpreting it.
