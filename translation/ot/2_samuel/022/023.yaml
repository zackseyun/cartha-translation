theological_decisions:
- issue: Rendering covenant-law terminology without flattening distinctions
  chosen_reading: Different Hebrew legal terms are preserved distinctly as 'judgments'
    and 'statutes.'
  alternative_readings:
  - Render both more generically as 'laws' or 'commands'
  rationale: The verse uses two different legal terms in parallel. Preserving the
    distinction respects the source text and avoids importing a simplified theological
    category not explicit in the Hebrew.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
