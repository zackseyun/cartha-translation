id: 2SA.22.23
reference: 2 Samuel 22:23
source:
  edition: WLC
  text: כִּ֥י כָל משפט/ו לְ/נֶגְדִּ֑/י וְ/חֻקֹּתָ֖י/ו לֹא אָס֥וּר מִמֶּֽ/נָּה־־׃
translation:
  text: For all his judgments were before me, and I did not turn away from his statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because all his judgments were before me, and I did not turn away from
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' fits the poetic
    flow in English while preserving the causal sense.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier.
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his ordinances
  - his rules
  - his judgments and decrees
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes judicial decisions, ordinances, or judgments.
    'Judgments' is a standard and sufficiently transparent rendering here, especially
    in parallel with 'statutes.'
- source_word: לְנֶגְדִּי
  chosen: were before me
  alternatives:
  - were before my eyes
  - were in front of me
  lexicon: HALOT
  rationale: Idiomatic expression meaning they were continually in David's view or
    awareness. 'Were before me' preserves the metaphor without over-expansion.
- source_word: וְחֻקֹּתָיו
  chosen: and his statutes
  alternatives:
  - and his decrees
  - and his prescribed laws
  lexicon: HALOT
  rationale: חֻקּוֹת commonly refers to fixed enactments or statutes. 'Statutes' preserves
    the legal-poetic parallelism with 'judgments.'
- source_word: לֹא אָסוּר
  chosen: I did not turn away
  alternatives:
  - I did not depart
  - I did not remove myself
  lexicon: HALOT
  rationale: From סוּר, 'to turn aside/depart.' 'Turn away' is natural modern English
    and conveys moral deviation from God's commands.
- source_word: מִמֶּנָּה
  chosen: from his statutes
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The pronominal form is feminine singular, which may function collectively
    with the preceding plural noun in poetic usage, or reflect attraction to a collective
    sense. In English, explicit repetition ('from his statutes') avoids awkwardness
    and makes the referent clear.
