id: 2SA.22.51
reference: 2 Samuel 22:51
source:
  edition: WLC
  text: מגדיל יְשׁוּע֣וֹת מַלְכּ֑/וֹ וְ/עֹֽשֶׂה חֶ֧סֶד לִ/מְשִׁיח֛/וֹ לְ/דָוִ֥ד וּ/לְ/זַרְע֖/וֹ
    עַד עוֹלָֽם־־׃פ
translation:
  text: He gives great salvation to his king and shows covenant faithfulness to his
    anointed, to David and to his offspring forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great deliverances' or 'great victories' to his king.
    reason: lexical_alternative
  - marker: b
    text: Or 'shows steadfast love' to his anointed. The Hebrew term often denotes
      loyal love or covenant faithfulness.
    reason: lexical_alternative
  - marker: c
    text: '''His anointed'' can also be rendered ''his Messiah''; here it refers first
      to David/the Davidic king, while also echoing the broader messianic promise.'
    reason: alternative_reading
lexical_decisions:
- source_word: מגדיל
  chosen: gives great
  alternatives:
  - magnifies
  - makes great
  lexicon: HALOT
  rationale: Hiphil participle of גדל literally means 'making great.' In this idiom
    with 'salvations,' English reads more naturally as 'gives great' or 'makes great'
    salvation/deliverance. 'Gives great' preserves the causative sense without awkwardness.
- source_word: יְשׁוּעוֹת
  chosen: salvation
  alternatives:
  - deliverances
  - victories
  lexicon: HALOT
  rationale: Plural noun can denote acts of deliverance or salvation. Singular collective
    'salvation' is idiomatic in English while still capturing the comprehensive saving
    help of God. 'Deliverances' is a viable more formal alternative and is preserved
    in a footnote-worthy lexical note.
- source_word: מַלְכּוֹ
  chosen: his king
  alternatives:
  - his kingly one
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix. 'His king' preserves the covenantal
    relationship between the LORD and the Davidic king.
- source_word: וְעֹשֶׂה חֶסֶד
  chosen: and shows covenant faithfulness
  alternatives:
  - and shows steadfast love
  - and does kindness
  - and shows loyal love
  lexicon: HALOT
  rationale: חסד is a theologically weighty covenant term. 'Covenant faithfulness'
    makes explicit the loyal, covenantal dimension in accessible modern English. 'Steadfast
    love' is traditional but can underrepresent the covenant-loyalty nuance in this
    royal covenant context.
- source_word: לִמְשִׁיחוֹ
  chosen: to his anointed
  alternatives:
  - to his Messiah
  lexicon: HALOT
  rationale: Although משיח can under some contexts be rendered 'Messiah,' here it
    refers immediately to the anointed Davidic king in historical context. 'His anointed'
    preserves the lexical sense and allows the royal-messianic resonance without over-specifying
    the later title in the main text.
- source_word: לְדָוִד
  chosen: to David
  lexicon: HALOT
  rationale: Personal name transliterated per translation philosophy.
- source_word: וּלְזַרְעוֹ
  chosen: and to his offspring
  alternatives:
  - and to his seed
  - and to his descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the singular collective sense of זרע and its
    covenantal resonance better than the more diffuse ''descendants.'' ''Seed'' is
    more formal but less natural in contemporary English.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - to eternity
  - for the age
  lexicon: HALOT
  rationale: Idiomatic rendering of enduring perpetuity. 'Forever' is clear modern
    English and fits the covenant promise context.
