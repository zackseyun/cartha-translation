theological_decisions:
- issue: Rendering of חסד in a Davidic covenant context
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - loyal love
  rationale: The verse closes David's song by emphasizing the LORD's loyal covenant
    commitment to the king and his line. 'Covenant faithfulness' best captures the
    relational and promissory force without importing a narrower emotional sense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of מְשִׁיחוֹ
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: The noun is lexically 'anointed one.' In this immediate context it refers
    to David/the Davidic king, so the main text should not collapse the historical
    referent into an explicit messianic title. The messianic trajectory is real and
    can be preserved by footnote.
  doctrine_reference: Translation philosophy §2 (translate titles; transliterate names)
    and §3 (preserve theological tension rather than resolve it)
