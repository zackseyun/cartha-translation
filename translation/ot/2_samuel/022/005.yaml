theological_decisions:
- issue: Whether בְלִיַּעַל should be rendered as a proper name ('Belial') or a common
    noun
  chosen_reading: Rendered as the common noun 'worthlessness' in the main text
  alternative_readings:
  - Belial
  - destruction
  - wickedness
  rationale: In 2 Samuel 22:5 the phrase is poetic and parallel to destructive waters.
    The Hebrew term commonly denotes worthlessness or ruinous evil; reading it as
    the later personified proper name 'Belial' would import a more developed demonological
    sense not required by the text. An alternative is preserved in a footnote for
    auditability.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension where ambiguity exists)
