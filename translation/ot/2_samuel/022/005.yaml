id: 2SA.22.5
reference: 2 Samuel 22:5
source:
  edition: WLC
  text: כִּ֥י אֲפָפֻ֖/נִי מִשְׁבְּרֵי מָ֑וֶת נַחֲלֵ֥י בְלִיַּ֖עַל יְבַעֲתֻֽ/נִי־׃
translation:
  text: For the breakers of death surrounded me; the torrents of worthlessness terrified
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the torrents of Belial,' taking בְלִיַּעַל as a proper name rather than
      'worthlessness.'
    reason: alternative_reading
  - marker: b
    text: '''Breakers'' may also be rendered ''waves'' or ''billows.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - When
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement in the
    song. 'For' best preserves the causal/explanatory force in natural English.
- source_word: אֲפָפֻנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - encompassed me
  lexicon: HALOT
  rationale: The verb conveys being enclosed or hemmed in. 'Surrounded me' is clear
    modern English and preserves the image without archaism.
- source_word: מִשְׁבְּרֵי
  chosen: breakers
  alternatives:
  - waves
  - billows
  lexicon: HALOT
  rationale: The noun can denote breakers/surf and is used metaphorically here. 'Breakers'
    keeps the violent water imagery more precisely than the more generalized 'waves.'
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the phrase depicts death as overwhelming
    surf.
- source_word: נַחֲלֵי
  chosen: torrents
  alternatives:
  - streams
  - wadis
  lexicon: HALOT
  rationale: The noun often refers to wadis/streams, but in poetic parallelism with
    'breakers' the sense of rushing floodwaters is prominent. 'Torrents' best captures
    the threatening force.
- source_word: בְלִיַּעַל
  chosen: worthlessness
  alternatives:
  - destruction
  - Belial
  - wickedness
  lexicon: HALOT
  rationale: In this Hebrew poetic context the term functions as a common noun denoting
    worthlessness or ruinous evil, not necessarily a proper name. 'Worthlessness'
    preserves the lexical sense while allowing the phrase to mean destructive, godless
    forces.
- source_word: יְבַעֲתֻנִי
  chosen: terrified me
  alternatives:
  - frightened me
  - overwhelmed me
  lexicon: HALOT
  rationale: The verb denotes sudden terror or dismay. 'Terrified me' best reflects
    the intensity of the threat.
