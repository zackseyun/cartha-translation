id: 2SA.22.32
reference: 2 Samuel 22:32
source:
  edition: WLC
  text: כִּ֥י מִי אֵ֖ל מִ/בַּלְעֲדֵ֣י יְהוָ֑ה וּ/מִ֥י צ֖וּר מִֽ/בַּלְעֲדֵ֥י אֱלֹהֵֽי/נוּ־׃
translation:
  text: For who is God besides Yahweh? And who is a rock besides our God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who is Rock besides our God?' The Hebrew 'rock' is a frequent metaphor and sometimes functions almost like a title for God.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For surely
  lexicon: HALOT
  rationale: Introduces the rhetorical ground or explanation for the preceding praise; 'For' preserves the connective force naturally in English.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Interrogative pronoun in a rhetorical question; 'who' is the direct and natural rendering.
- source_word: אֵל
  chosen: God
  alternatives:
  - god
  - Mighty One
  lexicon: HALOT
  rationale: In this monotheistic rhetorical context, the referent is the true God, not a generic deity. Capitalized 'God' reflects the sense in English.
- source_word: מִבַּלְעֲדֵי
  chosen: besides
  alternatives:
  - except for
  - apart from
  - outside of
  lexicon: HALOT
  rationale: 'The prepositional expression denotes exclusion: no God exists apart from the LORD. ''Besides'' is concise, idiomatic, and preserves the exclusivity claim.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמִי
  chosen: And who
  alternatives:
  - and who is it that
  lexicon: HALOT
  rationale: The conjunction links the parallel rhetorical clause; 'And who' preserves the poetic parallelism.
- source_word: צוּר
  chosen: a rock
  alternatives:
  - Rock
  - refuge
  - crag
  lexicon: HALOT
  rationale: The Hebrew metaphor commonly depicts God as stable, protective strength. 'Rock' preserves the metaphor directly. Lowercase is used in the main text because it functions predicatively ('who is a rock'), not as a fixed title here; capitalization remains a viable stylistic alternative.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; 'our God' preserves both covenantal and communal force.
