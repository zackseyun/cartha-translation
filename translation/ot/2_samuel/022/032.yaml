theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether צוּר should be rendered as a title ('Rock') or common metaphor ('rock')
  chosen_reading: a rock
  alternative_readings:
  - Rock
  rationale: The clause is a rhetorical comparison ('who is a rock besides our God?'), so the common noun best preserves the Hebrew syntax and metaphor without importing a formal title. The theological point of God's unique stability and protection remains intact.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
