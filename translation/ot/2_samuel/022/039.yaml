theological_decisions:
- issue: Violent warfare imagery in David's victory song
  chosen_reading: Retain the first-person language of total defeat without softening
    it
  alternative_readings:
  - Paraphrastic softening such as 'I defeated them completely'
  rationale: The Hebrew uses stark poetic verbs for destruction and subjugation. In
    keeping with optimal equivalence and original-language primacy, the translation
    preserves the severity of the imagery rather than muting it for modern sensibilities.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
