id: 2SA.22.39
reference: 2 Samuel 22:39
source:
  edition: WLC
  text: וָ/אֲכַלֵּ֥/ם וָ/אֶמְחָצֵ֖/ם וְ/לֹ֣א יְקוּמ֑וּ/ן וַֽ/יִּפְּל֖וּ תַּ֥חַת רַגְלָֽ/י׃
translation:
  text: I consumed them and shattered them, and they did not rise; they fell under
    my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I destroyed them'; the Hebrew verb literally means 'consume' and is
      used here in battle imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'crushed them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲכַלֵּם
  chosen: I consumed them
  alternatives:
  - I destroyed them
  - I finished them off
  lexicon: HALOT
  rationale: From אכל in a hostile/warfare context, the verb can extend from literal
    'eat/consume' to 'consume, destroy.' 'I consumed them' preserves the vivid metaphor
    while remaining intelligible in English and matching the poetic register of the
    song.
- source_word: וָאֶמְחָצֵם
  chosen: shattered them
  alternatives:
  - crushed them
  - smashed them
  - wounded them
  lexicon: HALOT
  rationale: From מחץ, commonly 'smite, crush, shatter.' 'Shattered' conveys decisive
    violent defeat and pairs well with the preceding poetic verb without flattening
    it into a generic 'defeated.'
- source_word: וְלֹא יְקוּמוּן
  chosen: and they did not rise
  alternatives:
  - and they could not rise
  - and they did not get up again
  lexicon: HALOT
  rationale: 'The clause states the result of the attack: they did not rise. A simple
    past rendering fits the narrative-poetic sequence better than adding modal force
    (''could not'') not explicit in the Hebrew.'
- source_word: וַיִּפְּלוּ
  chosen: they fell
  alternatives:
  - they collapsed
  lexicon: HALOT
  rationale: Standard rendering of נפל. 'Fell' is direct and preserves the compact
    poetic movement of the line.
- source_word: תַּחַת רַגְלָי
  chosen: under my feet
  alternatives:
  - beneath my feet
  lexicon: HALOT
  rationale: A conventional idiom of subjugation and defeat. 'Under my feet' is natural
    English and preserves the imagery of enemies brought low beneath the victor.
