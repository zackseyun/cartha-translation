id: 2SA.22.7
reference: 2 Samuel 22:7
source:
  edition: WLC
  text: בַּ/צַּר לִ/י֙ אֶקְרָ֣א יְהוָ֔ה וְ/אֶל אֱלֹהַ֖/י אֶקְרָ֑א וַ/יִּשְׁמַ֤ע מֵ/הֵֽיכָל/וֹ֙
    קוֹלִ֔/י וְ/שַׁוְעָתִ֖/י בְּ/אָזְנָֽי/ו־־׃
translation:
  text: In my distress I call on the LORD; I call to my God. He hears my voice from
    his temple, and my cry for help reaches his ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He heard my voice from his temple' (formal past-tense rendering of the
      Hebrew narrative verb).
    reason: lexical_alternative
  - marker: b
    text: '''Temple'' may also be rendered ''palace'' or ''sanctuary,'' referring
      to God''s heavenly dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר
  chosen: In my distress
  alternatives:
  - In my trouble
  - In my anguish
  lexicon: HALOT
  rationale: צַר in this prepositional phrase denotes a state of distress, trouble,
    or tightness/adversity. 'In my distress' is idiomatic English and preserves the
    situational force without overinterpreting the intensity.
- source_word: אֶקְרָא
  chosen: I call on / I call to
  alternatives:
  - I cry out to
  - I invoke
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' Because the verb occurs twice
    with slightly different complements (directly with the divine name, then with
    אֶל 'to'), English varies naturally as 'call on' and 'call to' while preserving
    the repetition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    established reverential convention and the pattern reflected in the Septuagint
    tradition.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'The singular form with 1cs suffix is straightforwardly possessive: ''my
    God.'''
- source_word: וַיִּשְׁמַע
  chosen: He hears
  alternatives:
  - and he heard
  - then he heard
  lexicon: HALOT
  rationale: Although the wayyiqtol form is formally past narrative ('and he heard'),
    in English poetic context a present-tense rendering can convey the vivid, gnomic
    force of the song. This keeps the line natural in English poetry while preserving
    the sense of divine response.
- source_word: מֵהֵיכָלוֹ
  chosen: from his temple
  alternatives:
  - from his palace
  - from his sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote palace or temple. In reference to God, 'temple' is
    the most natural English rendering and matches common biblical usage, while still
    allowing the heavenly dwelling sense.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - the sound of my voice
  lexicon: HALOT
  rationale: קוֹל with 1cs suffix is simply 'my voice'; this is the most direct and
    natural rendering.
- source_word: שַׁוְעָתִי
  chosen: my cry for help
  alternatives:
  - my cry
  - my plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה often denotes a cry for aid in distress. 'My cry for help' makes
    the implicit plea explicit in idiomatic English.
- source_word: בְּאָזְנָיו
  chosen: reaches his ears
  alternatives:
  - is in his ears
  - comes into his ears
  lexicon: HALOT
  rationale: Literally 'in his ears,' an idiom for being heard. 'Reaches his ears'
    communicates the idiomatic sense clearly in modern English without flattening
    the imagery.
