theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Per project doctrine,
    YHWH is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Divine dwelling in הֵיכָל
  chosen_reading: temple
  alternative_readings:
  - palace
  - sanctuary
  rationale: The term can denote a royal palace or temple, and in this poetic context
    may evoke God's heavenly dwelling. 'Temple' best preserves the cultic-theological
    resonance familiar in English Bible usage without denying the royal nuance.
