theological_decisions:
- issue: Divine enablement in martial imagery
  chosen_reading: The verse is rendered as describing ability granted by God ('I can
    run... I can leap') rather than as a bare statement of action.
  alternative_readings:
  - simple present action without explicit capability nuance
  rationale: The Hebrew imperfects in this poetic context naturally convey empowered
    capacity. This preserves the text's emphasis that victory comes from God without
    importing a broader doctrinal claim beyond the verse.
  doctrine_reference: Translation philosophy §1, §3
