id: 2SA.22.30
reference: 2 Samuel 22:30
source:
  edition: WLC
  text: כִּ֥י בְ/כָ֖ה אָר֣וּץ גְּד֑וּד בֵּ/אלֹהַ֖/י אֲדַלֶּג שֽׁוּר־׃
translation:
  text: For by you I can run against a troop; by my God I can leap over a wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''with you'' / ''through you''; the Hebrew preposition can express accompaniment
      or means. Here it is taken as means: God enables the action.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a raiding band.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a rampart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding praise/testimony.
    'For' preserves the connective force naturally in English poetry.
- source_word: בְּכָה
  chosen: by you
  alternatives:
  - with you
  - through you
  lexicon: HALOT
  rationale: 'The preposition ב with the 2ms suffix here expresses means or agency:
    David''s military success comes by God''s enablement. ''By you'' is concise and
    idiomatic.'
- source_word: אָרוּץ
  chosen: I can run
  alternatives:
  - I run
  - I rush
  lexicon: HALOT
  rationale: Qal imperfect 1cs of רוץ in poetic context expresses capability or repeated
    experience under divine empowerment. 'I can run' brings out the sense in English
    without over-paraphrasing.
- source_word: גְּדוּד
  chosen: a troop
  alternatives:
  - a raiding band
  - a band
  lexicon: HALOT
  rationale: גדוד commonly denotes a troop, band, or raiding party. 'Troop' is clear
    modern English and fits the martial imagery.
- source_word: בֵּאלֹהַי
  chosen: by my God
  alternatives:
  - with my God
  - through my God
  lexicon: HALOT
  rationale: The repeated preposition again marks means or enabling agency. 'My God'
    preserves the personal covenantal tone; 'by my God' mirrors the first colon for
    poetic balance.
- source_word: אֲדַלֶּג
  chosen: I can leap over
  alternatives:
  - I leap over
  - I spring over
  lexicon: HALOT
  rationale: Piel imperfect 1cs of דלג means to leap or spring. 'I can leap over'
    matches the capability nuance and the parallel with 'I can run.'
- source_word: שׁוּר
  chosen: a wall
  alternatives:
  - a rampart
  lexicon: HALOT
  rationale: שׁוּר denotes a wall, especially in fortified or defensive imagery. 'Wall'
    is the most direct and readable rendering; 'rampart' is possible but less natural
    in contemporary English.
