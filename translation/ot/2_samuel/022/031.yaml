theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of צְרוּפָה with 'word of the LORD'
  chosen_reading: proven
  alternative_readings:
  - refined
  - tested
  rationale: The Hebrew metaphor of smelting/refining can be rendered more literally, but 'proven' best communicates in modern English that the LORD's word has been tested and found reliable, without importing extra doctrinal claims.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; optimal equivalence'
