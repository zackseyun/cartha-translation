id: 2SA.22.31
reference: 2 Samuel 22:31
source:
  edition: WLC
  text: הָ/אֵ֖ל תָּמִ֣ים דַּרְכּ֑/וֹ אִמְרַ֤ת יְהוָה֙ צְרוּפָ֔ה מָגֵ֣ן ה֔וּא לְ/כֹ֖ל הַ/חֹסִ֥ים בּֽ/וֹ׃
translation:
  text: As for God, his way is blameless; the word of Yahweh is proven; he is a shield to all who take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refined' or 'tested' for 'proven'; the Hebrew evokes metal purified in a furnace.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: As for God
  alternatives:
  - God
  lexicon: HALOT
  rationale: הָאֵל means 'the God/God.' The prefatory English 'As for' reflects the discourse-marking force at the head of the clause, a natural way to render the topical opening without over-literal awkwardness.
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - perfect
  - whole
  - complete
  lexicon: HALOT
  rationale: תָּמִים here describes God's way as without defect or fault. 'Blameless' is idiomatic and preserves moral and qualitative integrity better than the potentially misleading 'perfect' in modern English.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path,' and in this context refers to God's manner of acting or course. 'Way' is the most natural and traditional rendering.
- source_word: אִמְרַת יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the promise of the LORD
  - the utterance of the LORD
  lexicon: HALOT
  rationale: אִמְרָה denotes an utterance, saying, or word. 'The word of the LORD' is broad enough to preserve the term's semantic range and fits the poetic parallelism. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְרוּפָה
  chosen: proven
  alternatives:
  - refined
  - tested
  - purified
  lexicon: HALOT
  rationale: The verb conveys being smelted/refined and thus tested and shown genuine. 'Proven' communicates the metaphor's result in clear modern English, while preserving the sense that the LORD's word has been tested and found true.
- source_word: מָגֵן
  chosen: a shield
  alternatives:
  - shield
  lexicon: HALOT
  rationale: The noun denotes a shield in both literal and metaphorical senses. With the predicate construction, 'he is a shield' is natural English.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and functions as the subject of the nominal clause. English supplies 'is' for a clear predicate statement.
- source_word: לְכֹל
  chosen: to all
  alternatives:
  - for all
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefit here. In idiomatic English with 'shield,' 'to all who...' is acceptable, though the sense is protective benefit.
- source_word: הַחֹסִים בּוֹ
  chosen: who take refuge in him
  alternatives:
  - who trust in him
  - who seek shelter in him
  lexicon: HALOT
  rationale: חסה means to seek refuge, often with God as the object. 'Take refuge in him' preserves the concrete protective imagery better than the more abstract 'trust in him.'
