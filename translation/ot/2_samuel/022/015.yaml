id: 2SA.22.15
reference: 2 Samuel 22:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח חִצִּ֖ים וַ/יְפִיצֵ֑/ם בָּרָ֖ק ו/יהמ/ם׃
translation:
  text: He sent arrows and scattered them; lightning, and threw them into confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and routed them' for both verbs describing the effect of the arrows
      and lightning on David's enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: He sent
  alternatives:
  - He shot
  - He dispatched
  lexicon: HALOT
  rationale: The verb שלח broadly means 'send.' In this poetic theophanic context,
    'sent' preserves the Hebrew imagery without over-specifying the mechanism as 'shot,'
    though arrows are the object.
- source_word: חִצִּים
  chosen: arrows
  lexicon: HALOT
  rationale: Standard rendering of חצים; concrete martial imagery should be preserved.
- source_word: וַיְפִיצֵם
  chosen: and scattered them
  alternatives:
  - and routed them
  - and dispersed them
  lexicon: HALOT
  rationale: From פוץ/פצץ in the causative sense 'scatter/disperse.' The 3mp suffix
    most naturally refers to the enemies implied in the surrounding context. 'Scattered
    them' is both literal and idiomatic.
- source_word: בָּרָק
  chosen: lightning
  alternatives:
  - a lightning bolt
  - flashes of lightning
  lexicon: HALOT
  rationale: ברק denotes lightning/flash. Singular 'lightning' works naturally in
    English as a mass noun and matches the compact poetic line.
- source_word: וַיְהֻמֵּם
  chosen: and threw them into confusion
  alternatives:
  - and routed them
  - and confounded them
  - and put them in turmoil
  lexicon: HALOT
  rationale: From המם, 'to throw into confusion, discomfit, rout.' 'Threw them into
    confusion' preserves the causative force and avoids collapsing the image into
    a purely military result.
