theological_decisions:
- issue: Referent of the pronominal suffixes in 'scattered them' and 'threw them into
    confusion'
  chosen_reading: The pronouns refer to the enemies/opponents in the broader poetic
    context.
  alternative_readings:
  - The pronouns could be left more implicit in English, with the object understood
    from context.
  rationale: The Hebrew suffixes require an object, and the surrounding context of
    divine warfare makes the enemies the most natural referent. This is not a doctrinally
    contested issue but a contextual decision necessary for intelligible English.
