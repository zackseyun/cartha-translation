id: 2SA.22.29
reference: 2 Samuel 22:29
source:
  edition: WLC
  text: כִּֽי אַתָּ֥ה נֵירִ֖/י יְהוָ֑ה וַ/יהוָ֖ה יַגִּ֥יהַּ חָשְׁכִּֽ/י־׃
translation:
  text: For you are my lamp, O Yahweh, and Yahweh lights up my darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my lamp''; alternatively, ''my light.'' The image is concrete in Hebrew, referring to a lamp rather than abstract light.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD gives light to my darkness.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For' preserves the connective force in natural English without over-specifying whether it is strictly causal or emphatic.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressing God directly; rendered simply as 'you' in contemporary English.
- source_word: נֵירִי
  chosen: my lamp
  alternatives:
  - my light
  lexicon: HALOT
  rationale: נֵיר denotes a lamp rather than abstract light. 'My lamp' preserves the concrete metaphor of God as the source that gives light and guidance. 'My light' is possible by sense but less formally precise.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיהוָה
  chosen: and the LORD
  alternatives:
  - and Yahweh
  lexicon: HALOT
  rationale: The conjunction joins the second clause, and the divine name is again rendered according to the doctrinal default as 'the LORD.' Repeating the name rather than substituting a pronoun preserves the Hebrew parallelism.
- source_word: יַגִּיהַּ
  chosen: lights up
  alternatives:
  - illumines
  - gives light to
  - brightens
  lexicon: HALOT
  rationale: Hiphil of נגה conveys causing to shine or giving light. 'Lights up' is idiomatic modern English that preserves the causative sense and poetic vividness better than the more formal 'illumines.'
- source_word: חָשְׁכִּי
  chosen: my darkness
  alternatives:
  - my dark place
  - the darkness around me
  lexicon: HALOT
  rationale: The noun means darkness, here with first-person singular suffix. 'My darkness' preserves the personal, metaphorical force without over-interpreting whether it refers to distress, danger, or gloom.
