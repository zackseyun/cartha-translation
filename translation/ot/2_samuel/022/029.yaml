theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. Because
    the first instance is direct address, 'O LORD' is used idiomatically while preserving
    the same underlying choice.
