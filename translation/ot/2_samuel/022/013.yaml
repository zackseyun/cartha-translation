theological_decisions:
- issue: Theophanic imagery and implied subject
  chosen_reading: The verse is rendered as describing fiery phenomena proceeding from
    the divine appearance without adding an explicit divine action beyond the Hebrew
    wording.
  alternative_readings:
  - Interpreting the line more dynamically as 'His brightness set coals of fire ablaze'
  rationale: The Hebrew is poetic and compact. The translation preserves the imagery
    and sequence without importing extra causal wording not explicit in the text.
    This maintains theological restraint and lets the theophanic picture stand as
    given.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
