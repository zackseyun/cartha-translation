id: 2SA.22.13
reference: 2 Samuel 22:13
source:
  edition: WLC
  text: מִ/נֹּ֖גַהּ נֶגְדּ֑/וֹ בָּעֲר֖וּ גַּחֲלֵי אֵֽשׁ־׃
translation:
  text: From the brightness before him, coals of fire blazed forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the radiance before him, burning coals flamed up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֹּגַהּ
  chosen: From the brightness
  alternatives:
  - From the radiance
  - Out of the brightness
  - From the shining
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, radiance, or shining light. 'Brightness' is
    clear modern English and fits the theophanic imagery. The prefixed מִן is rendered
    'from' to express source/origin.
- source_word: נֶגְדּוֹ
  chosen: before him
  alternatives:
  - in front of him
  - before his presence
  lexicon: HALOT
  rationale: נֶגֶד with 3ms suffix indicates what is before or in front of him. 'Before
    him' is idiomatic and preserves the spatial sense without overexpanding to 'presence,'
    though that nuance is possible in context.
- source_word: בָּעֲרוּ
  chosen: blazed forth
  alternatives:
  - burned
  - kindled
  - flamed up
  lexicon: HALOT
  rationale: בער in the qal commonly means to burn or blaze. 'Blazed forth' captures
    the vivid, sudden ignition in this poetic theophany and reads naturally in English.
    'Forth' is supplied to convey the sense of emergence from the preceding source
    phrase.
- source_word: גַּחֲלֵי אֵשׁ
  chosen: coals of fire
  alternatives:
  - burning coals
  - fiery coals
  lexicon: HALOT
  rationale: The construct phrase is literally 'coals of fire.' This formal rendering
    preserves the Hebrew imagery and poetic force. Smoother alternatives are possible,
    but the literal phrase remains natural enough in English.
