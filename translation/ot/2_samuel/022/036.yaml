id: 2SA.22.36
reference: 2 Samuel 22:36
source:
  edition: WLC
  text: וַ/תִּתֶּן לִ֖/י מָגֵ֣ן יִשְׁעֶ֑/ךָ וַ/עֲנֹתְ/ךָ֖ תַּרְבֵּֽ/נִי־׃
translation:
  text: You gave me the shield of your salvation, and your humility made me great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your gentleness' or 'your condescension'; the Hebrew expression is difficult
      and may refer to God stooping down graciously to exalt the speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  chosen: You gave
  alternatives:
  - you have given
  - you grant
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of נתן, straightforward past narrative: ''and you gave.''
    English drops the conjunction at the start only insofar as normal style permits,
    but the verbal sense remains simple past addressed to God.'
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  rationale: The indirect object is naturally expressed in English as 'gave me' rather
    than the more wooden 'gave to me.'
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - buckler
  - protection
  lexicon: HALOT
  rationale: Concrete military image should be preserved rather than abstracted. 'Shield'
    is the standard and natural rendering.
- source_word: יִשְׁעֶךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your victory
  lexicon: HALOT
  rationale: From ישׁע, denoting salvation/deliverance. 'Your salvation' preserves
    the genitive construction and the theological resonance of divine rescue; 'deliverance'
    is possible but less traditional and slightly narrower.
- source_word: וַעֲנֹתְךָ
  chosen: your humility
  alternatives:
  - your condescension
  - your help
  - your answering
  lexicon: HALOT
  rationale: 'This form is difficult and has been variously understood from ענה. In
    context and in light of the parallel in Psalm 18:35, the sense ''your humility/gentleness/condescension''
    best fits: God''s stooping down to aid the psalmist. ''Humility'' is a direct
    and transparent rendering that preserves the startling theological force without
    over-paraphrasing. Alternatives are worth preserving because some interpreters
    understand the term differently.'
- source_word: תַּרְבֵּנִי
  chosen: made me great
  alternatives:
  - multiplied me
  - increased me
  - exalted me
  lexicon: HALOT
  rationale: Hiphil of רבה means to make great/increase. In context of divine exaltation
    after deliverance, 'made me great' is idiomatic and matches the resultative sense
    better than the more literal but awkward 'multiplied me.'
