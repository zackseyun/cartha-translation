- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrine,
    the default rendering is 'the LORD' rather than a transliteration of the Tetragrammaton.
