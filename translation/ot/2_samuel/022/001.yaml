id: 2SA.22.1
reference: 2 Samuel 22:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר דָּוִד֙ לַֽ/יהוָ֔ה אֶת דִּבְרֵ֖י הַ/שִּׁירָ֣ה הַ/זֹּ֑את בְּ/יוֹם֩
    הִצִּ֨יל יְהוָ֥ה אֹת֛/וֹ מִ/כַּ֥ף כָּל אֹיְבָ֖י/ו וּ/מִ/כַּ֥ף שָׁאֽוּל־־׃
translation:
  text: And David spoke to the LORD the words of this song on the day when the LORD
    delivered him from the hand of all his enemies and from the hand of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the words of this song''; the wording explicitly introduces the
      composition as a song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  - sang
  - uttered
  lexicon: HALOT
  rationale: The verb דבר normally means 'speak/say.' Although the content is a song,
    the Hebrew says David 'spoke ... the words of this song,' so 'spoke' preserves
    the source wording better than smoothing to 'sang.'
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' to reflect established reverential
    convention and the pattern followed in many English Bibles and the LXX's treatment.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  chosen: the words of this song
  alternatives:
  - this song
  - the words of this poem
  lexicon: HALOT
  rationale: A relatively formal rendering preserves both 'words' and 'song' present
    in the Hebrew. Rendering simply 'this song' would omit דִּבְרֵי ('words of').
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day that
  - when
  lexicon: HALOT
  rationale: This idiom introduces the occasion of the song. 'On the day when' is
    natural English while retaining the temporal specificity of the Hebrew.
- source_word: הִצִּיל
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: נצל in this context denotes deliverance from hostile power. 'Delivered'
    is idiomatic in biblical narrative and fits the military-danger context well.
- source_word: מִכַּף
  chosen: from the hand of
  alternatives:
  - from the grasp of
  - from the power of
  lexicon: HALOT
  rationale: Literally 'from the palm/hand of.' 'From the hand of' is a standard biblical
    idiom in English that preserves the metaphor of hostile power or control.
- source_word: כָּל אֹיְבָיו
  chosen: all his enemies
  alternatives:
  - every one of his enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the collective phrase; 'all his enemies'
    is natural and complete.
- source_word: שָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
