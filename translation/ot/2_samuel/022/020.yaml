id: 2SA.22.20
reference: 2 Samuel 22:20
source:
  edition: WLC
  text: וַ/יֹּצֵ֥א לַ/מֶּרְחָ֖ב אֹתִ֑/י יְחַלְּצֵ֖/נִי כִּי חָ֥פֵֽץ בִּֽ/י־׃
translation:
  text: He brought me out into a broad place; he rescued me, because he delighted
    in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into an open/spacious place.' The Hebrew image contrasts freedom and
      relief with confinement or distress.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was pleased with me' / 'he took pleasure in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  chosen: He brought me out
  alternatives:
  - He led me out
  - He brought me forth
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, causative sense: ''cause to go out/bring out.''
    ''Brought me out'' is natural English and preserves the deliverance imagery.'
- source_word: לַמֶּרְחָב
  chosen: into a broad place
  alternatives:
  - into an open place
  - into a spacious place
  lexicon: HALOT
  rationale: מֶרְחָב denotes a broad, open, spacious area, often metaphorically contrasting
    confinement/distress. 'Broad place' keeps the Hebrew image while remaining understandable.
- source_word: יְחַלְּצֵנִי
  chosen: he rescued me
  alternatives:
  - he delivered me
  - he drew me out
  lexicon: HALOT
  rationale: חלץ in the Piel commonly means to draw out, deliver, rescue. 'Rescued
    me' is idiomatic modern English and fits the parallel with the preceding clause.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the rescue. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: חָפֵץ בִּי
  chosen: he delighted in me
  alternatives:
  - he took pleasure in me
  - he was pleased with me
  lexicon: HALOT
  rationale: חפץ with ב conveys taking pleasure or delight in someone. 'Delighted
    in me' preserves the personal, affective force better than the flatter 'was pleased
    with me'.
