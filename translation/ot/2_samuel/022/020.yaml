theological_decisions:
- issue: Cause of divine deliverance
  chosen_reading: because he delighted in me
  alternative_readings:
  - because he was pleased with me
  rationale: The verse grounds David's rescue in God's favorable delight. The translation
    preserves that relational language without importing a broader doctrinal claim
    about merit beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
