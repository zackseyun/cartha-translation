id: 2SA.22.41
reference: 2 Samuel 22:41
source:
  edition: WLC
  text: וְ/אֹ֣יְבַ֔/י תַּ֥תָּה לִּ֖/י עֹ֑רֶף מְשַׂנְאַ֖/י וָ/אַצְמִיתֵֽ/ם׃
translation:
  text: You gave me the backs of my enemies; I destroyed those who hated me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'You gave me the neck/back of my enemies,' an idiom for
      causing enemies to turn and flee before the victor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: The noun אֹיֵב commonly means 'enemy.' The 1cs suffix requires 'my enemies.'
    'Foes' is possible but 'enemies' is the most standard and transparent modern English
    equivalent.
- source_word: תַּתָּה לִּי עֹרֶף
  chosen: you gave me the backs
  alternatives:
  - you made them turn their backs to me
  - you gave me the neck
  lexicon: HALOT
  rationale: Literally, 'you gave to me back/neck.' In context עֹרֶף is an idiom for
    the enemy turning away in flight or being put to rout. 'You gave me the backs'
    preserves the vivid image while remaining intelligible. 'Neck' is more literal
    to the Hebrew lexeme but less natural in English here; the idiomatic sense is
    preserved in the chosen rendering.
- source_word: מְשַׂנְאַי
  chosen: those who hated me
  alternatives:
  - my haters
  - those who were against me
  lexicon: HALOT
  rationale: 'The participial form from שׂנא with 1cs suffix denotes ongoing identity:
    ''those who hate me'' or ''those who hated me.'' Because the following verb is
    past narrative poetry, ''those who hated me'' fits the English flow while preserving
    the substantive participial force.'
- source_word: וָאַצְמִיתֵם
  chosen: I destroyed
  alternatives:
  - I wiped them out
  - I annihilated them
  - I silenced them
  lexicon: HALOT
  rationale: From צמת, in the Hiphil, the verb commonly conveys destroying, exterminating,
    or putting an end to. 'I destroyed' is strong, accurate, and readable. 'Wiped
    them out' is more idiomatic but slightly more colloquial; 'annihilated' may overstate
    the register.
