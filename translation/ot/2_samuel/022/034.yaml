id: 2SA.22.34
reference: 2 Samuel 22:34
source:
  edition: WLC
  text: מְשַׁוֶּ֥ה רגלי/ו כָּ/אַיָּל֑וֹת וְ/עַ֥ל בָּמוֹתַ֖/י יַעֲמִדֵֽ/נִי׃
translation:
  text: He makes his feet like the feet of deer, and sets me secure on my heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like hinds'; the Hebrew refers to female deer, a common image for agility
      and sure-footedness.
    reason: lexical_alternative
  - marker: b
    text: Or 'sets me on my high places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁוֶּה
  chosen: makes
  alternatives:
  - makes equal
  - makes like
  - fits
  lexicon: HALOT
  rationale: The Piel participle of שוה here conveys causing or making something to
    be like something else. In context with the following comparison כָּאַיָּלוֹת,
    'makes' is the most natural English verb and avoids awkward literalism while preserving
    the causative sense.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his legs
  - his steps
  lexicon: HALOT
  rationale: The noun רֶגֶל normally means 'foot' or 'feet.' 'His feet' is the direct
    and contextually appropriate rendering in this simile of agility and sure-footedness.
- source_word: כָּאַיָּלוֹת
  chosen: like the feet of deer
  alternatives:
  - like deer
  - like hinds
  - like does
  lexicon: HALOT
  rationale: 'אַיָּלוֹת is the feminine plural of אַיָּל/אַיָּלָה, referring to deer/doe/hind.
    Traditional English often has ''hinds,'' but ''deer'' is clearer in modern English.
    Because the comparison is specifically to the feet in Hebrew syntax, English supplies
    ''the feet of'' for clarity: ''his feet like the feet of deer.'''
- source_word: בָּמוֹתַי
  chosen: my heights
  alternatives:
  - my high places
  - my heights of refuge
  lexicon: HALOT
  rationale: בָּמוֹת literally means 'high places' or 'heights.' In this poetic context
    it refers to elevated places associated with security and triumph, not necessarily
    cultic high places. 'My heights' preserves the possessive and poetic force more
    naturally than the more technical 'high places.'
- source_word: יַעֲמִדֵנִי
  chosen: sets me secure
  alternatives:
  - makes me stand
  - causes me to stand
  - sets me
  lexicon: HALOT
  rationale: The Hiphil of עמד means 'cause to stand' or 'set.' In context of divine
    enablement on dangerous heights, the sense includes stability and security, not
    merely physical placement. 'Sets me secure' captures the causative and the implied
    firmness in idiomatic English.
