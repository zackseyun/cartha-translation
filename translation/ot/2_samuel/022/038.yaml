id: 2SA.22.38
reference: 2 Samuel 22:38
source:
  edition: WLC
  text: אֶרְדְּפָ֥ה אֹיְבַ֖/י וָ/אַשְׁמִידֵ֑/ם וְ/לֹ֥א אָשׁ֖וּב עַד כַּלּוֹתָֽ/ם־׃
translation:
  text: I pursued my enemies and destroyed them, and I did not turn back until they
    were finished off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until I had consumed them' / 'until they were ended.' The Hebrew verb
      can carry the sense of bringing something to completion or consuming it utterly.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרְדְּפָה
  chosen: I pursued
  alternatives:
  - I chased
  - I kept pursuing
  lexicon: HALOT
  rationale: רדף in the Qal commonly means to pursue or chase. 'Pursued' is the most
    natural modern English rendering and fits the military context without over-paraphrasing.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: The noun אויב with 1cs suffix straightforwardly means 'my enemies.' This
    preserves the personal and martial force of the Hebrew.
- source_word: וָאַשְׁמִידֵם
  chosen: and destroyed them
  alternatives:
  - and annihilated them
  - and wiped them out
  lexicon: HALOT
  rationale: שׁמד in the Hiphil means to destroy, exterminate, or wipe out. 'Destroyed
    them' is strong but idiomatic English and avoids sounding overly colloquial or
    interpretively intensified.
- source_word: וְלֹא אָשׁוּב
  chosen: and I did not turn back
  alternatives:
  - and I did not return
  - and I would not turn back
  lexicon: HALOT
  rationale: שׁוב here is best understood in the sense of turning back from pursuit
    rather than simply returning home. 'Did not turn back' captures the military progression
    of the verse.
- source_word: עַד כַּלּוֹתָם
  chosen: until they were finished off
  alternatives:
  - until I had consumed them
  - until they were ended
  - until they were destroyed completely
  lexicon: HALOT
  rationale: כלה can mean to complete, finish, consume, or bring to an end. Because
    the infinitive construct with suffix follows the pursuit/destruction sequence,
    the sense is that the enemies were brought to their end. 'Finished off' communicates
    completion of defeat in natural English while preserving the violent finality
    of the Hebrew.
