theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical rendering of צוּר for God
  chosen_reading: rock
  alternative_readings:
  - crag
  - refuge
  rationale: The Hebrew metaphor is central to the verse's theology of divine stability and protection. It should be preserved rather than interpreted away.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
