id: 2SA.22.47
reference: 2 Samuel 22:47
source:
  edition: WLC
  text: חַי יְהוָ֖ה וּ/בָר֣וּךְ צוּרִ֑/י וְ/יָרֻ֕ם אֱלֹהֵ֖י צ֥וּר יִשְׁעִֽ/י־׃
translation:
  text: Yahweh lives, and blessed be my rock, and exalted be God, the rock of my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my saving rock' or 'the rock of my deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: The LORD lives
  alternatives:
  - As the LORD lives
  - Living is the LORD
  lexicon: HALOT
  rationale: 'Predicate adjective plus divine name forms a doxological declaration. English idiom is best captured as a verbless exclamation with supplied copular sense: ''The LORD lives.'' YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering for יְהוָה, preserving reverential convention and broad English Bible recognizability.
- source_word: וּבָרוּךְ
  chosen: and blessed be
  alternatives:
  - and blessed is
  - and may ... be blessed
  lexicon: HALOT
  rationale: Passive participial/adjectival form in a praise context functions as a benedictory acclamation. 'Blessed be' preserves the elevated doxological force better than the flatter 'blessed is.'
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: צוּר literally denotes 'rock' and is a frequent divine metaphor in Samuel/Psalms. 'Rock' preserves the metaphor and its theological resonance better than interpretive substitutes like 'refuge.'
- source_word: וְיָרֻם
  chosen: and exalted be
  alternatives:
  - and may ... be exalted
  - and let ... be exalted
  lexicon: HALOT
  rationale: The jussive expresses a wish/acclamation in parallel with 'blessed be.' 'Exalted be' gives natural English while retaining the volitional nuance.
- source_word: אֱלֹהֵי
  chosen: God
  alternatives:
  - the God of
  lexicon: HALOT
  rationale: In construct with the following phrase, the sense is 'God, the rock of my salvation' or 'the God of the rock of my salvation' depending on how the chain is construed. Given the appositional poetic parallelism and the repeated צוּר, rendering simply 'God, the rock of my salvation' is the clearest and most natural English representation.
- source_word: צור ישעי
  chosen: the rock of my salvation
  alternatives:
  - my saving rock
  - the rock of my deliverance
  lexicon: HALOT
  rationale: The construct chain is retained fairly literally. 'Salvation' is preferred over 'deliverance' because יֶשַׁע commonly carries the broader saving sense and matches the elevated praise context.
