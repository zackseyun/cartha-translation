id: 2SA.22.25
reference: 2 Samuel 22:25
source:
  edition: WLC
  text: וַ/יָּ֧שֶׁב יְהוָ֛ה לִ֖/י כְּ/צִדְקָתִ֑/י כְּ/בֹרִ֖/י לְ/נֶ֥גֶד עֵינָֽי/ו׃
translation:
  text: So the LORD repaid me according to my righteousness, according to my cleanness
    before his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to my purity.' The Hebrew term denotes cleanness or purity.
    reason: lexical_alternative
  - marker: b
    text: That is, 'in his sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: repaid
  alternatives:
  - returned
  - rewarded
  - dealt back
  lexicon: HALOT
  rationale: From שוב in the Hiphil-like causative/returning sense here, with YHWH
    as subject and לִי as indirect object, the idiom expresses requital or repayment.
    'Repaid' is natural English and fits the context of divine recompense in this
    song. 'Returned' is too wooden; 'rewarded' is possible but slightly more interpretive
    and positive than the broader sense of requital.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding English convention and the reverential substitution
    pattern reflected in the tradition.
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  - for me
  rationale: The preposition marks the indirect object of the verb. In idiomatic English
    with 'repaid,' the object is best rendered directly as 'me' rather than the more
    literal 'to me.'
- source_word: כְּצִדְקָתִי
  chosen: according to my righteousness
  alternatives:
  - in accordance with my righteousness
  - according to my justice
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness, rightness, or justice. In this personal
    vindication context, 'righteousness' best captures covenantal and moral uprightness
    without narrowing the sense to forensic 'justice' alone. 'According to' preserves
    the comparative force of כְּ.
- source_word: כְּבֹרִי
  chosen: according to my cleanness
  alternatives:
  - according to my purity
  - according to my cleanness of hands
  lexicon: HALOT
  rationale: בר/בֹּר here denotes purity or cleanness. Since 'hands' is not present
    in this verse (though it appears in the parallel Psalm 18:24), the translation
    should not import it. 'Cleanness' is slightly more literal and pairs well with
    the repeated 'according to'; 'purity' is a viable smoother alternative.
- source_word: לְנֶגֶד עֵינָיו
  chosen: before his eyes
  alternatives:
  - in his sight
  - before his face
  lexicon: HALOT
  rationale: The phrase literally means 'before/in front of his eyes' and idiomatically
    means 'in his sight.' 'Before his eyes' preserves the concrete imagery of the
    Hebrew while remaining natural English.
