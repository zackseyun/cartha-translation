theological_decisions:
- issue: David's claim of righteousness and cleanness
  chosen_reading: Retain the straightforward first-person claim without softening
    or doctrinal qualification.
  alternative_readings:
  - Interpret as relative covenant faithfulness rather than absolute sinlessness
  - Paraphrase to avoid apparent tension with David's known sins
  rationale: The Hebrew plainly states that the LORD repaid David according to his
    righteousness and cleanness. The translation should preserve this theological
    tension rather than resolve it by paraphrase. Readers may understand the claim
    in context as covenantal integrity or vindication in the matter at hand, but that
    interpretive resolution should not be imported into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
