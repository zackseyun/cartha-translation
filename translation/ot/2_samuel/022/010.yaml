theological_decisions:
- issue: Anthropomorphic theophanic imagery for God
  chosen_reading: 'Retain the bodily and spatial imagery literally: ''came down''
    and ''under his feet.'''
  alternative_readings:
  - Soften into non-corporeal imagery such as 'manifested himself from heaven'
  rationale: The Hebrew presents a poetic theophany using anthropomorphic language.
    Per translation philosophy, the text's imagery should be preserved rather than
    explained away. This maintains the theological tension of divine transcendence
    expressed through embodied poetic description.
  doctrine_reference: Translation philosophy §3
