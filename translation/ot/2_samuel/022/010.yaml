id: 2SA.22.10
reference: 2 Samuel 22:10
source:
  edition: WLC
  text: וַ/יֵּ֥ט שָׁמַ֖יִם וַ/יֵּרַ֑ד וַ/עֲרָפֶ֖ל תַּ֥חַת רַגְלָֽי/ו׃
translation:
  text: He bent the heavens and came down; thick darkness was under his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dark cloud' for 'thick darkness'; the Hebrew עֲרָפֶל can denote dense
      gloom associated with the LORD's appearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: bent
  alternatives:
  - stretched out
  - inclined
  - bowed
  lexicon: HALOT
  rationale: From נטה, here with שָׁמַיִם as object, the image is of God causing the
    heavens to bow downward. 'Bent' is vivid, natural English and preserves the cosmic-theophanic
    imagery better than the less idiomatic 'inclined' or the potentially misleading
    'stretched out'.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural form commonly denotes the heavens/sky. In this poetic theophany,
    'the heavens' better preserves the elevated, cosmic register than the more ordinary
    'the sky'.
- source_word: וַיֵּרַד
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: From ירד, 'came down' is clear modern English and fits the narrative-poetic
    movement. 'Descended' is possible but slightly more formal; the meaning is unchanged.
- source_word: וַעֲרָפֶל
  chosen: thick darkness
  alternatives:
  - dark cloud
  - gloom
  - deep darkness
  lexicon: HALOT
  rationale: עֲרָפֶל often refers to dense darkness associated with divine manifestation.
    'Thick darkness' preserves both the physical density and the theophanic atmosphere
    better than simply 'darkness' or the more interpretive 'dark cloud'.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: A straightforward spatial preposition. 'Under' is idiomatic and sufficiently
    formal for the poetic line.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his footsteps
  lexicon: HALOT
  rationale: The noun is literally 'his feet' with 3ms suffix. The concrete bodily
    imagery should be retained rather than paraphrased.
