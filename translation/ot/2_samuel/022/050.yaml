id: 2SA.22.50
reference: 2 Samuel 22:50
source:
  edition: WLC
  text: עַל כֵּ֛ן אוֹדְ/ךָ֥ יְהוָ֖ה בַּ/גּוֹיִ֑ם וּ/לְ/שִׁמְ/ךָ֖ אֲזַמֵּֽר־׃
translation:
  text: Therefore I will praise you among the nations, O Yahweh, and I will sing praise to your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore/so
  lexicon: HALOT
  rationale: The phrase marks a conclusion or result from the preceding deliverance. 'Therefore' is concise, natural English and preserves the inferential force.
- source_word: אוֹדְךָ
  chosen: I will praise you
  alternatives:
  - I will thank you
  - I will confess/praise you
  lexicon: HALOT
  rationale: Hiphil of ידה in praise contexts commonly carries the sense 'give thanks' or 'praise.' Here, paired with 'sing praise' in the next colon and addressed directly to the LORD, 'praise' best fits the poetic parallelism, while 'thank' remains a viable nuance.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the non-Israelite nations in an international setting. 'Nations' is the most standard and contextually appropriate rendering; 'Gentiles' would import later Jewish/NT associations more strongly than the Hebrew requires.
- source_word: וּלְשִׁמְךָ
  chosen: to your name
  alternatives:
  - for your name
  - of your name
  lexicon: HALOT
  rationale: The preposition ל with 'name' after זמר naturally yields 'sing praise to your name' in English. This preserves the Hebrew expression without flattening 'name' into merely 'you,' since 'name' carries reputation and revealed identity.
- source_word: אֲזַמֵּר
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: The piel of זמר denotes making music/singing praise. 'Sing praise' brings out the worship sense and matches the parallelism with 'I will praise you' better than the more generic 'sing'.
