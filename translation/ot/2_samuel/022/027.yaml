id: 2SA.22.27
reference: 2 Samuel 22:27
source:
  edition: WLC
  text: עִם נָבָ֖ר תִּתָּבָ֑ר וְ/עִם עִקֵּ֖שׁ תִּתַּפָּֽל־־׃
translation:
  text: With the pure you show yourself pure, but with the crooked you show yourself
    shrewd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the crooked you show yourself twisted/contrary.' The Hebrew verb
      is rare and difficult; the main text chooses 'shrewd' to convey a fitting response
      to the devious without suggesting moral crookedness in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָר
  chosen: pure
  alternatives:
  - clean
  - blameless
  lexicon: HALOT
  rationale: The adjective denotes purity/cleanness. 'Pure' is the most natural English
    match here and preserves the wordplay with the following verb from the same root.
- source_word: תִּתָּבָר
  chosen: you show yourself pure
  alternatives:
  - you are pure
  - you deal purely
  lexicon: HALOT
  rationale: 'The hitpael/imperfect of the same root as נָבָר likely has a reflexive
    nuance: God shows himself to be pure in relation to the pure. ''You show yourself
    pure'' preserves both the reflexive sense and the poetic parallelism.'
- source_word: עִקֵּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The adjective describes one who is morally twisted or devious. 'Crooked'
    is vivid, idiomatic modern English and fits the antithetical parallel with 'pure'.
- source_word: תִּתַּפָּל
  chosen: you show yourself shrewd
  alternatives:
  - you show yourself twisted
  - you contend
  - you wrestle
  lexicon: HALOT
  rationale: This rare verb is difficult. In context it describes God's corresponding
    dealing with the crooked. 'You show yourself shrewd' captures the sense that God
    outmatches the devious on their own ground without implying moral crookedness
    in God. This also aligns with the parallel in Psalm 18:26 often rendered 'shrewd'
    or similar.
- source_word: עִם
  chosen: with
  alternatives:
  - toward
  lexicon: HALOT
  rationale: 'The preposition marks relational correspondence: God''s manner of dealing
    is expressed as ''with'' the person described.'
