theological_decisions:
- issue: How to render God's response to the crooked without attributing moral perversity
    to God
  chosen_reading: you show yourself shrewd
  alternative_readings:
  - you show yourself twisted
  - you show yourself contrary
  - you contend with the crooked
  rationale: The Hebrew uses antithetical poetic correspondence, but the broader canonical
    and theological context does not support attributing moral crookedness to God.
    'Shrewd' preserves the idea that God responds fittingly to the devious and defeats
    them in their own craftiness, without importing evil into God's character.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence within historic orthodoxy
