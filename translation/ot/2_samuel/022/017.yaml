id: 2SA.22.17
reference: 2 Samuel 22:17
source:
  edition: WLC
  text: יִשְׁלַ֥ח מִ/מָּר֖וֹם יִקָּחֵ֑/נִי יַֽמְשֵׁ֖/נִי מִ/מַּ֥יִם רַבִּֽים׃
translation:
  text: He reached down from on high; he took me; he drew me out of many waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He sent from on high' or 'He stretched out from on high.' The Hebrew
      verb can more literally mean 'send' or 'stretch out'; 'reached down' brings
      out the rescue sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from great waters' or 'from mighty waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: reached down
  alternatives:
  - sent
  - stretched out
  lexicon: HALOT
  rationale: The verb is literally 'send/stretch out,' but in this rescue context
    with the following 'from on high' and direct object implied, English 'reached
    down' best captures the idiomatic sense of extending help from above without over-paraphrasing.
    Compare the parallel imagery in rescue contexts where the action is effectively
    an outstretched intervention.
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from heaven
  - from the height
  lexicon: HALOT
  rationale: מָרוֹם denotes a high place/height. 'From on high' preserves the elevated,
    poetic register and avoids specifying 'heaven' where the Hebrew is more general,
    though clearly divine in context.
- source_word: יִקָּחֵנִי
  chosen: he took me
  alternatives:
  - he seized me
  - he received me
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this sequence of divine rescue, the simple
    'he took me' is faithful and idiomatic, allowing the following verb to specify
    the rescue image more fully.
- source_word: יַמְשֵׁנִי
  chosen: he drew me out
  alternatives:
  - he pulled me out
  - he dragged me out
  lexicon: HALOT
  rationale: The Hiphil of משה here means to draw out, especially from water. 'Drew
    me out' is the standard and most natural English rendering, preserving the likely
    allusion to rescue-from-water imagery.
- source_word: מִמַּיִם רַבִּים
  chosen: out of many waters
  alternatives:
  - from great waters
  - from mighty waters
  lexicon: HALOT
  rationale: Literally 'from many waters.' 'Many waters' preserves the Hebrew image
    and poetic force. 'Great/mighty waters' is possible interpretively, but the adjective
    primarily denotes abundance here.
