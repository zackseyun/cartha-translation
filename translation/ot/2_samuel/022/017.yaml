theological_decisions:
- issue: Divine rescue imagery from above
  chosen_reading: Retain the poetic spatial language 'from on high' rather than interpret
    it explicitly as 'from heaven.'
  alternative_readings:
  - from heaven
  rationale: The verse depicts God’s transcendent intervention without requiring a
    more explicit cosmological term than the Hebrew uses. This preserves the text's
    poetic theology rather than narrowing it.
  doctrine_reference: Translation philosophy §1, §3
