id: 2SA.22.21
reference: 2 Samuel 22:21
source:
  edition: WLC
  text: יִגְמְלֵ֥/נִי יְהוָ֖ה כְּ/צִדְקָתִ֑/י כְּ/בֹ֥ר יָדַ֖/י יָשִׁ֥יב לִֽ/י׃
translation:
  text: Yahweh has dealt with me according to my righteousness; according to the cleanness of my hands he has repaid me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has rewarded me.' The Hebrew verb can mean to deal with or recompense someone according to their conduct.
    reason: lexical_alternative
  - marker: b
    text: '''Cleanness of my hands'' is a Hebrew idiom for innocence or purity in one''s actions.'
    reason: cultural_note
lexical_decisions:
- source_word: יִגְמְלֵנִי
  chosen: has dealt with me
  alternatives:
  - has rewarded me
  - has repaid me
  lexicon: HALOT
  rationale: The verb גמל can denote dealing with someone in a way that corresponds to their conduct, whether beneficially or adversely. Here the parallel with 'he has repaid me' favors a positive recompense sense. 'Has dealt with me' preserves the broader semantic range while fitting the poetic parallelism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּצִדְקָתִי
  chosen: according to my righteousness
  alternatives:
  - according to my justice
  - in keeping with my righteousness
  lexicon: HALOT
  rationale: צדקה here refers to David's uprightness or right conduct in context, not abstract covenantal status. 'Righteousness' is the most direct and theologically established rendering, and 'according to' reflects the prefixed כ comparative/measure sense.
- source_word: כְּבֹר
  chosen: according to the cleanness
  alternatives:
  - according to the purity
  - according to the innocence
  lexicon: HALOT
  rationale: בֹּר denotes cleanness or purity. 'Cleanness' best matches the concrete imagery of clean hands in Hebrew poetry and preserves the metaphor without overinterpreting it as legal innocence.
- source_word: יָדַי
  chosen: of my hands
  alternatives:
  - my hands
  lexicon: HALOT
  rationale: The phrase 'cleanness of my hands' is a natural English rendering of the construct expression and preserves the Hebrew idiom for moral innocence in one's actions.
- source_word: יָשִׁיב לִי
  chosen: he has repaid me
  alternatives:
  - he has returned to me
  - he has recompensed me
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to give back or repay. 'He has repaid me' clearly conveys recompense and pairs well with the first colon. The perfective English present perfect suits the poetic statement of completed divine action.
