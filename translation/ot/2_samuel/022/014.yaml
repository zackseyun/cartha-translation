theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, with alternatives preserved where relevant.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship between יְהוָה and עֶלְיוֹן
  chosen_reading: Treat both as parallel titles for the same God within Hebrew poetic
    parallelism.
  alternative_readings:
  - Read 'the Most High' as a separate appositional designation without emphasizing
    strict poetic equivalence
  rationale: 'The verse uses synonymous parallelism: ''the LORD'' in the first colon
    corresponds to ''the Most High'' in the second. The translation preserves this
    without importing additional doctrinal claims.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
