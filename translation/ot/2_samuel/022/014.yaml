id: 2SA.22.14
reference: 2 Samuel 22:14
source:
  edition: WLC
  text: יַרְעֵ֥ם מִן שָׁמַ֖יִם יְהוָ֑ה וְ/עֶלְי֖וֹן יִתֵּ֥ן קוֹלֽ/וֹ־׃
translation:
  text: The LORD thundered from heaven, and the Most High gave his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uttered his voice.' The Hebrew literally says 'gave his voice,' a poetic
      expression parallel to 'thundered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְעֵם
  chosen: thundered
  alternatives:
  - roared
  - caused thunder
  lexicon: HALOT
  rationale: The Hiphil of רעם in this context refers to producing thunder. 'Thundered'
    is idiomatic English and fits the storm-theophany imagery better than the more
    wooden 'caused to thunder.' 'Roared' is possible but less specific to the meteorological
    imagery.
- source_word: מִן שָׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: שָׁמַיִם can mean 'heaven(s)' or 'sky.' In a divine-theophanic context
    with YHWH as subject, 'from heaven' best preserves both the spatial and theological
    sense. 'From the heavens' is more formal but less natural in English here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.' This follows established reverential convention and the stated
    translation policy.
- source_word: וְעֶלְיוֹן
  chosen: and the Most High
  alternatives:
  - and the Exalted One
  lexicon: HALOT
  rationale: עֶלְיוֹן here functions as a divine title parallel to יְהוָה. 'The Most
    High' is the standard and clearest English rendering, preserving the title's superlative
    force.
- source_word: יִתֵּן קוֹלוֹ
  chosen: gave his voice
  alternatives:
  - uttered his voice
  - made his voice heard
  - gave forth his voice
  lexicon: HALOT
  rationale: Literally, the Hebrew says 'gave his voice.' Retaining this expression
    preserves the poetic parallelism with 'thundered' and avoids over-interpreting
    the idiom. 'Uttered his voice' is also possible and more idiomatic, but 'gave
    his voice' better reflects the source wording while remaining understandable.
