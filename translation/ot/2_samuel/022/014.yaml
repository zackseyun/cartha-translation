id: 2SA.22.14
reference: 2 Samuel 22:14
source:
  edition: WLC
  text: יַרְעֵ֥ם מִן שָׁמַ֖יִם יְהוָ֑ה וְ/עֶלְי֖וֹן יִתֵּ֥ן קוֹלֽ/וֹ־׃
translation:
  text: Yahweh thundered from heaven, and the Most High gave his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uttered his voice.' The Hebrew literally says 'gave his voice,' a poetic expression parallel to 'thundered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְעֵם
  chosen: thundered
  alternatives:
  - roared
  - caused thunder
  lexicon: HALOT
  rationale: The Hiphil of רעם in this context refers to producing thunder. 'Thundered' is idiomatic English and fits the storm-theophany imagery better than the more wooden 'caused to thunder.' 'Roared' is possible but less specific to the meteorological imagery.
- source_word: מִן שָׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: שָׁמַיִם can mean 'heaven(s)' or 'sky.' In a divine-theophanic context with YHWH as subject, 'from heaven' best preserves both the spatial and theological sense. 'From the heavens' is more formal but less natural in English here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעֶלְיוֹן
  chosen: and the Most High
  alternatives:
  - and the Exalted One
  lexicon: HALOT
  rationale: עֶלְיוֹן here functions as a divine title parallel to יְהוָה. 'The Most High' is the standard and clearest English rendering, preserving the title's superlative force.
- source_word: יִתֵּן קוֹלוֹ
  chosen: gave his voice
  alternatives:
  - uttered his voice
  - made his voice heard
  - gave forth his voice
  lexicon: HALOT
  rationale: Literally, the Hebrew says 'gave his voice.' Retaining this expression preserves the poetic parallelism with 'thundered' and avoids over-interpreting the idiom. 'Uttered his voice' is also possible and more idiomatic, but 'gave his voice' better reflects the source wording while remaining understandable.
