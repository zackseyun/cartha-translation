id: 2SA.22.16
reference: 2 Samuel 22:16
source:
  edition: WLC
  text: וַ/יֵּֽרָאוּ֙ אֲפִ֣קֵי יָ֔ם יִגָּל֖וּ מֹסְד֣וֹת תֵּבֵ֑ל בְּ/גַעֲרַ֣ת יְהוָ֔ה מִ/נִּשְׁמַ֖ת ר֥וּחַ אַפּֽ/וֹ׃
translation:
  text: Then the channels of the sea were seen; the foundations of the world were laid bare at the rebuke of Yahweh, at the blast of the breath of his nostrils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Yahweh” for “the LORD.”
    reason: alternative_reading
  - marker: b
    text: Or “the foundations of the inhabited world.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָאוּ
  chosen: were seen
  alternatives:
  - appeared
  - became visible
  lexicon: HALOT
  rationale: Niphal wayyiqtol of ראה is passive/reflexive here; 'were seen' preserves the passive force and the vivid poetic imagery better than a more interpretive 'appeared.'
- source_word: אֲפִקֵי יָם
  chosen: the channels of the sea
  alternatives:
  - the channels of the Sea
  - the beds of the sea
  - the springs of the sea
  lexicon: HALOT
  rationale: אֲפִיקִים commonly denotes channels, streambeds, or watercourses. In this storm-theophany context, 'channels of the sea' conveys the exposed seabed/watercourses without overcommitting to 'springs.' Lowercase 'sea' fits the common noun usage.
- source_word: יִגָּלוּ
  chosen: were laid bare
  alternatives:
  - were uncovered
  - were revealed
  lexicon: HALOT
  rationale: Niphal of גלה means to be uncovered/revealed. 'Were laid bare' is vivid, idiomatic English that matches the poetic force and parallels 'were seen.'
- source_word: מֹסְדוֹת תֵּבֵל
  chosen: the foundations of the world
  alternatives:
  - the foundations of the earth
  - the foundations of the inhabited world
  lexicon: HALOT
  rationale: מוֹסְדוֹת are foundations. תֵּבֵל often denotes the world, especially the inhabited world in poetic diction. 'World' is natural English and preserves the cosmic scope of the verse.
- source_word: בְּגַעֲרַת
  chosen: at the rebuke of
  alternatives:
  - by the rebuke of
  - at the blast of
  lexicon: HALOT
  rationale: גְּעָרָה is rebuke, often in divine-theophanic contexts. The preposition ב here is well rendered instrumentally/causally as 'at' in elevated English, echoing the immediate cause of cosmic upheaval.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִנִּשְׁמַת רוּחַ אַפּוֹ
  chosen: at the blast of the breath of his nostrils
  alternatives:
  - from the breath of the wind of his nostrils
  - from the blast of the breath of his anger
  lexicon: HALOT
  rationale: נִשְׁמָה is breath/blast; רוּחַ can intensify or specify the exhalation here rather than denote a separate 'wind'; אַף literally means nose/nostril and by extension anger. In this anthropomorphic poetic line, 'his nostrils' preserves the Hebrew image. 'Blast of the breath' captures the forceful theophanic effect without flattening the metaphor into abstract 'anger.'
