id: 2SA.22.18
reference: 2 Samuel 22:18
source:
  edition: WLC
  text: יַצִּילֵ֕/נִי מֵ/אֹיְבִ֖/י עָ֑ז מִ/שֹּׂ֣נְאַ֔/י כִּ֥י אָמְצ֖וּ מִמֶּֽ/נִּי׃
translation:
  text: He rescued me from my strong enemy, from those who hated me, for they were
    too mighty for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular 'my enemy' in the first phrase, followed by plural 'those
      who hated me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַצִּילֵנִי
  chosen: He rescued me
  alternatives:
  - He delivered me
  - He saves me
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to snatch away, rescue, or deliver.
    In this poetic narrative context, past-tense 'rescued' fits the surrounding thanksgiving
    and reads naturally in English. 'Delivered' is possible but slightly more traditional/churchy;
    'rescued' is clearer modern English.
- source_word: מֵאֹיְבִי
  chosen: from my enemy
  alternatives:
  - from my enemies
  lexicon: HALOT
  rationale: The form is singular with 1cs suffix ('my enemy'), so the main text preserves
    the singular rather than harmonizing to a plural. The following adjective עָז
    is also singular, supporting this reading.
- source_word: עָז
  chosen: strong
  alternatives:
  - mighty
  - fierce
  lexicon: HALOT
  rationale: The adjective denotes strength or might. 'Strong' is the most direct
    rendering modifying 'enemy.' 'Mighty' is possible, but reserving 'too mighty'
    later for אָמְצוּ helps reflect the intensification in the second clause.
- source_word: מִשֹּׂנְאַי
  chosen: from those who hated me
  alternatives:
  - from my haters
  - from those who were hostile to me
  lexicon: HALOT
  rationale: The participial form with 1cs suffix is plural ('those hating me' / 'those
    who hated me'). Rendering it as a relative clause is natural English and preserves
    the plural distinction from the singular 'enemy' in the prior phrase.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the rescue. 'For' is concise and
    fits poetic English; 'because' would also be acceptable but is slightly heavier.
- source_word: אָמְצוּ
  chosen: were too mighty
  alternatives:
  - were stronger
  - prevailed
  lexicon: HALOT
  rationale: 'The verb conveys being strong or prevailing. With מִמֶּנִּי (''than
    me/for me''), the sense is comparative: they were stronger than I was. ''Were
    too mighty for me'' captures both their superior strength and David''s inability
    to withstand them.'
- source_word: מִמֶּנִּי
  chosen: for me
  alternatives:
  - than me
  - against me
  lexicon: HALOT
  rationale: After a verb of strength, the preposition expresses comparison or relation
    of superiority. In idiomatic English, 'too mighty for me' best conveys the sense;
    the comparative nuance is implicit.
