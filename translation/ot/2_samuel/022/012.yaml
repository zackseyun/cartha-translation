id: 2SA.22.12
reference: 2 Samuel 22:12
source:
  edition: WLC
  text: וַ/יָּ֥שֶׁת חֹ֛שֶׁךְ סְבִיבֹתָ֖י/ו סֻכּ֑וֹת חַֽשְׁרַת מַ֖יִם עָבֵ֥י שְׁחָקִֽים־׃
translation:
  text: He made darkness a shelter around him, a massing of waters, thick clouds of
    the skies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He set darkness around him as shelters; a gathering of waters, thick
      clouds of the heavens.' The Hebrew is highly poetic, and the rare phrase translated
      'a massing of waters' may also be understood as 'gathering of waters' or, more
      interpretively, 'dark rain clouds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁת
  chosen: He made
  alternatives:
  - He set
  - He placed
  lexicon: HALOT
  rationale: From שׁית/שׂים in the waw-consecutive narrative form, meaning to set/place/make.
    'He made' reads naturally in English with the following predicate-object construction
    ('darkness a shelter') while preserving the causative sense.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard rendering for the noun; in this theophanic context it denotes
    literal and symbolic obscurity surrounding God’s appearance.
- source_word: סְבִיבֹתָיו
  chosen: around him
  alternatives:
  - surrounding him
  - round about him
  lexicon: HALOT
  rationale: The prepositional noun indicates encirclement. 'Around him' is idiomatic
    modern English and preserves the spatial sense.
- source_word: סֻכּוֹת
  chosen: a shelter
  alternatives:
  - booths
  - shelters
  - covering place
  lexicon: HALOT
  rationale: Plural of סֻכָּה literally means booths/shelters. In English, a singular
    collective 'a shelter' best conveys the function in context without awkwardness.
    The image is of protective covering, not festival booths.
- source_word: חַשְׁרַת מַיִם
  chosen: a massing of waters
  alternatives:
  - dark mass of waters
  - gathering of waters
  lexicon: HALOT
  rationale: This rare expression is difficult. The noun likely denotes a gathering,
    mass, or thick accumulation. 'A massing of waters' preserves the concrete storm
    imagery and avoids overcommitting to a more interpretive gloss like 'dark rain
    clouds.'
- source_word: עָבֵי שְׁחָקִים
  chosen: thick clouds of the skies
  alternatives:
  - thick clouds of the heavens
  - cloud masses of the sky
  lexicon: HALOT
  rationale: עָבִים are thick clouds; שְׁחָקִים refers to skies/heavens/cloudy heights.
    'Thick clouds of the skies' is natural and keeps the elevated poetic register.
