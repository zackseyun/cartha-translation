id: 2SA.22.45
reference: 2 Samuel 22:45
source:
  edition: WLC
  text: בְּנֵ֥י נֵכָ֖ר יִתְכַּֽחֲשׁוּ לִ֑/י לִ/שְׁמ֥וֹעַ אֹ֖זֶן יִשָּׁ֥מְעוּ לִֽ/י־׃
translation:
  text: The sons of foreigners submit themselves to me; at the hearing of the ear
    they obey me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feign obedience to me,' highlighting the nuance of reluctant or insincere
      submission in the Hebrew verb.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'at the hearing of the ear'; that is, 'as soon as they hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  chosen: The sons of foreigners
  alternatives:
  - foreigners
  - sons of a foreign land
  - strangers
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of,' and נֵכָר denotes foreignness/foreigners.
    Retaining 'sons of foreigners' preserves the Hebrew idiom and parallelism, while
    still being understandable in English. 'Strangers' is possible but less precise
    to נֵכָר.
- source_word: יִתְכַּחֲשׁוּ לִי
  chosen: submit themselves to me
  alternatives:
  - feign obedience to me
  - cringe before me
  - yield to me
  lexicon: HALOT
  rationale: The Hitpael of כחש can carry the sense of dissembling or forced submission
    in contexts of conquest. In this victory-song setting, the sense is not simple
    verbal denial but compelled yielding. 'Submit themselves to me' gives the main
    force in clear English; the nuance of insincere or reluctant submission is preserved
    in a footnote.
- source_word: לִשְׁמֹעַ אֹזֶן
  chosen: at the hearing of the ear
  alternatives:
  - as soon as they hear
  - at a mere hearing
  - when the ear hears
  lexicon: HALOT
  rationale: This is a Hebrew idiom meaning immediate response upon hearing. The chosen
    rendering stays relatively close to the form of the Hebrew while remaining intelligible.
    A smoother dynamic alternative is preserved in a footnote.
- source_word: יִשָּׁמְעוּ לִי
  chosen: they obey me
  alternatives:
  - they listen to me
  - they hear me
  lexicon: HALOT
  rationale: שׁמע with ל often means not merely hearing but heeding/obeying. In this
    context of subjugated nations, 'obey me' best captures the functional sense.
