id: 2SA.5.22
reference: 2 Samuel 5:22
source:
  edition: WLC
  text: וַ/יֹּסִ֥פוּ ע֛וֹד פְּלִשְׁתִּ֖ים לַֽ/עֲל֑וֹת וַ/יִּנָּֽטְשׁ֖וּ בְּ/עֵ֥מֶק
    רְפָאִֽים׃
translation:
  text: And the Philistines came up again and spread out in the Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deployed themselves' or 'made a raid/spread themselves.' The Hebrew
      verb likely describes the Philistines taking up position across the valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  chosen: came up again
  alternatives:
  - added again
  - continued again
  lexicon: HALOT
  rationale: The verb יסף with עוֹד often conveys repetition ('do again'). In this
    construction with the following infinitive לַעֲלוֹת, the sense is that they repeated
    the action of going up. English idiom is best captured by 'came up again' rather
    than the overly literal 'added again to go up.'
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - once more
  lexicon: HALOT
  rationale: Here עוֹד marks repetition of the prior military movement, so 'again'
    is the most natural contextual rendering.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation; the article is supplied naturally in English
    for the people group.
- source_word: לַעֲלוֹת
  chosen: came up
  alternatives:
  - went up
  - advanced
  lexicon: HALOT
  rationale: עלה literally means 'to go up.' In military narrative it commonly describes
    marching up or advancing. 'Came up' preserves the narrative idiom and matches
    the likely movement toward the Judean highlands.
- source_word: וַיִּנָּטְשׁוּ
  chosen: spread out
  alternatives:
  - deployed themselves
  - were scattered
  - made a raid
  lexicon: HALOT
  rationale: In this context of troop movement in a valley, the verb denotes taking
    up position over an area rather than simple abandonment. 'Spread out' is clear
    modern English and fits the military setting. Compare the parallel in 1 Chronicles
    14:13, which uses a verb meaning 'made a raid/spread themselves,' supporting a
    deployment sense here.
- source_word: בְּעֵמֶק
  chosen: in the Valley
  alternatives:
  - in the valley
  - through the valley
  lexicon: HALOT
  rationale: עֵמֶק means 'valley.' Capitalizing 'Valley' is appropriate because this
    is a recognized place name when paired with Rephaim.
- source_word: רְפָאִים
  chosen: Rephaim
  lexicon: HALOT
  rationale: This is a place name here, conventionally transliterated rather than
    translated, in keeping with the translation philosophy to transliterate names.
