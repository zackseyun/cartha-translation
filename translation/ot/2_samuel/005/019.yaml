id: 2SA.5.19
reference: 2 Samuel 5:19
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֨ל דָּוִ֤ד בַּֽ/יהוָה֙ לֵ/אמֹ֔ר הַ/אֶֽעֱלֶה֙ אֶל פְּלִשְׁתִּ֔ים
    הֲ/תִתְּנֵ֖/ם בְּ/יָדִ֑/י וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל דָּוִד֙ עֲלֵ֔ה כִּֽי נָתֹ֥ן
    אֶתֵּ֛ן אֶת הַ/פְּלִשְׁתִּ֖ים בְּ/יָדֶֽ/ךָ־־־־׃
translation:
  text: And David inquired of the LORD, saying, “Should I go up against the Philistines?
    Will you give them into my hand?” And the LORD said to David, “Go up, for I will
    certainly give the Philistines into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Will you deliver them into my hand?' The Hebrew idiom 'give into the
      hand' commonly refers to granting victory over an enemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל in this context refers to seeking divine guidance. 'Inquired'
    preserves the formal sense of consulting the LORD without over-specifying a ritual
    method.
- source_word: בַּיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following established reverential convention and the LXX pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  - and said
  lexicon: HALOT
  rationale: The infinitive introduces the content of David's inquiry. 'Saying' is
    a standard and transparent rendering that keeps the Hebrew discourse structure.
- source_word: הַאֶעֱלֶה
  chosen: Should I go up
  alternatives:
  - Shall I go up
  - Am I to go up
  lexicon: HALOT
  rationale: עלה commonly means 'go up' and in military context can denote advancing
    in battle. 'Should I go up' communicates the interrogative deliberative force
    in natural modern English.
- source_word: אֶל פְּלִשְׁתִּים
  chosen: against the Philistines
  alternatives:
  - to the Philistines
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' in this military context English idiom
    requires 'against' to express hostile movement toward an enemy force.
- source_word: הֲתִתְּנֵם
  chosen: Will you give them
  alternatives:
  - Will you deliver them
  - Will you hand them over
  lexicon: HALOT
  rationale: נתן with the object plus 'into my hand' is a common idiom for granting
    victory. 'Give them' preserves the Hebrew wording, while the following phrase
    clarifies the military sense.
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - into my power
  - into my control
  lexicon: HALOT
  rationale: The idiom 'into my hand' is retained because it is natural enough in
    English and preserves the biblical imagery of divinely granted victory.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Advance
  - Attack
  lexicon: HALOT
  rationale: The imperative repeats the earlier verb עלה. 'Go up' preserves the lexical
    repetition and avoids importing a more specific military nuance than the Hebrew
    explicitly states.
- source_word: כִּי נָתוֹן אֶתֵּן
  chosen: for I will certainly give
  alternatives:
  - for I will surely give
  - for I am indeed giving
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies certainty. 'Will
    certainly give' captures the emphatic force in clear modern English.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: The same victory idiom is preserved consistently here as in David's question,
    maintaining the Hebrew parallelism.
