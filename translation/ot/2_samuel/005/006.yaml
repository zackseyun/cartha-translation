theological_decisions:
- issue: Potentially offensive reference to disability terms in the taunt
  chosen_reading: Retain 'the blind and the lame' as the literal wording of the Jebusites'
    mockery without softening.
  alternative_readings:
  - the blind and the crippled
  - even the weakest among us
  rationale: The verse reports hostile speech and should not be paraphrased into an
    interpretive metaphor in the main text. Preserving the concrete terms maintains
    transparency to the Hebrew while allowing explanatory nuance in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
