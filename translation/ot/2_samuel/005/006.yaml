id: 2SA.5.6
reference: 2 Samuel 5:6
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ הַ/מֶּ֤לֶךְ וַֽ/אֲנָשָׁי/ו֙ יְר֣וּשָׁלִַ֔ם אֶל הַ/יְבֻסִ֖י יוֹשֵׁ֣ב
    הָ/אָ֑רֶץ וַ/יֹּ֨אמֶר לְ/דָוִ֤ד לֵ/אמֹר֙ לֹא תָב֣וֹא הֵ֔נָּה כִּ֣י אִם הֱסִֽירְ/ךָ֗
    הַ/עִוְרִ֤ים וְ/הַ/פִּסְחִים֙ לֵ/אמֹ֔ר לֹֽא יָב֥וֹא דָוִ֖ד הֵֽנָּה־־־־׃
translation:
  text: And the king and his men went to Jerusalem, to the Jebusites, the inhabitants
    of the land. And they said to David, “You will not come in here unless you remove
    the blind and the lame,” saying, “David will not come in here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew singular, 'and he said to David'; the singular
      likely functions collectively for the Jebusite inhabitants.
    reason: textual_variant
  - marker: b
    text: 'The Hebrew of ''unless you remove the blind and the lame'' is difficult.
      The sense is a taunt: the Jebusites considered the city so secure that even
      ''the blind and the lame'' could keep David out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - marched
  - set out
  lexicon: HALOT
  rationale: הלך in the waw-consecutive narrative commonly advances the storyline
    with a simple past sense, 'went.' 'Marched' would over-specify military nuance
    not explicit in the verb itself.
- source_word: הַמֶּלֶךְ וַאֲנָשָׁיו
  chosen: the king and his men
  alternatives:
  - the king and his soldiers
  - the king and his people
  lexicon: HALOT
  rationale: אֲנָשָׁיו literally means 'his men.' In this military context it likely
    refers to David's fighting force or attendants, but 'his men' preserves the Hebrew
    wording without narrowing too far.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name.
- source_word: אֶל הַיְבֻסִי
  chosen: to the Jebusites
  alternatives:
  - against the Jebusites
  - to the Jebusite
  lexicon: HALOT
  rationale: Though the form is singular in Hebrew, it is often a collective/gentilic
    usage. English idiom prefers the plural ethnic designation here. 'Against' is
    contextually possible, but אֶל is more basically 'to'; the hostile context is
    supplied by the narrative.
- source_word: יוֹשֵׁב הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - who inhabited the land
  - dwelling in the land
  lexicon: HALOT
  rationale: The singular participle with collective force modifies the ethnic term.
    'The inhabitants of the land' is natural English and preserves the collective
    sense.
- source_word: וַיֹּאמֶר
  chosen: they said
  alternatives:
  - he said
  lexicon: HALOT
  rationale: The consonantal text has singular 'and he said,' but the following speech
    is attributed to the Jebusites collectively. English commonly smooths this to
    the implied plural subject. The singular may reflect a collective singular; the
    sense is plural in context.
- source_word: לֹא תָבֹוא הֵנָּה
  chosen: You will not come in here
  alternatives:
  - You shall not come here
  - You cannot come in here
  lexicon: HALOT
  rationale: The imperfect here expresses emphatic future/prohibition-like taunt.
    'Come in here' fits the fortified-city context better than simply 'come here.'
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - for if
  lexicon: HALOT
  rationale: כִּי אִם introduces an exception/condition. 'Unless' is the clearest
    idiomatic rendering in English.
- source_word: הֱסִירְךָ
  chosen: you remove
  alternatives:
  - you turn away
  - you take away
  lexicon: HALOT
  rationale: סור in the Hiphil means 'remove, take away.' The form is syntactically
    difficult in this verse, but the sense is that even the blind and lame could repel
    him; 'remove' best captures the verbal idea while keeping the taunting force.
- source_word: הַעִוְרִים וְהַפִּסְחִים
  chosen: the blind and the lame
  alternatives:
  - the blind and the crippled
  lexicon: HALOT
  rationale: These are straightforward adjectival substantives. 'The lame' is the
    standard and least interpretively loaded rendering.
- source_word: לֵאמֹר ... לֹא יָבֹוא דָוִד הֵנָּה
  chosen: saying, “David will not come in here.”
  alternatives:
  - meaning, 'David cannot come in here'
  - that is, 'David will never come in here'
  lexicon: HALOT
  rationale: The second לֵאמֹר likely restates the taunt or gives its gist. Rendering
    it as direct speech preserves the rhetorical repetition of the Hebrew.
