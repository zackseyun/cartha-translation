id: 2SA.5.25
reference: 2 Samuel 5:25
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ דָּוִד֙ כֵּ֔ן כַּ/אֲשֶׁ֥ר צִוָּ֖/הוּ יְהוָ֑ה וַ/יַּךְ֙ אֶת פְּלִשְׁתִּ֔ים מִ/גֶּ֖בַע עַד בֹּאֲ/ךָ֥ גָֽזֶר־־׃פ
translation:
  text: And David did so, just as Yahweh had commanded him, and he struck down the Philistines from Geba as far as Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from Geba.'' Some translations differ here due to textual or parallel-passage considerations.'
    reason: textual_variant
  - marker: b
    text: Literally, 'to your coming to Gezer,' that is, to the approach or vicinity of Gezer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - did it
  lexicon: HALOT
  rationale: The verb עשה here refers back to the LORD's prior instruction, so simple 'did' best preserves the concise narrative sense in English without over-specifying the object.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - accordingly
  lexicon: HALOT
  rationale: כֵּן with עשה idiomatically means 'did so.' This is natural modern English and closely reflects the Hebrew construction.
- source_word: כַּאֲשֶׁר צִוָּהוּ
  chosen: just as ... had commanded him
  alternatives:
  - as ... commanded him
  - according to what ... commanded him
  lexicon: HALOT
  rationale: This clause marks David's obedience to the divine instruction. 'Just as' preserves the close correspondence implied by כַּאֲשֶׁר, and the pluperfect 'had commanded' fits the prior action in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - struck
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה in military context commonly denotes a decisive blow or defeat. 'Struck down' conveys martial force better than the bare 'struck' while avoiding archaic 'smote.'
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation.
- source_word: מִגֶּבַע
  chosen: from Geba
  alternatives:
  - from Gibea
  lexicon: HALOT
  rationale: The MT reads Geba (גבע), not Gibeah (גבעה). The translation follows the consonantal text directly. Because some versions read 'Gibeon' or harmonize with the parallel passage, the MT place name should be preserved here.
- source_word: עַד בֹּאֲךָ גָזֶר
  chosen: as far as Gezer
  alternatives:
  - to the approach of Gezer
  - until you come to Gezer
  lexicon: HALOT
  rationale: Literally the phrase includes 'your coming/approach to Gezer,' an idiom for reaching the vicinity or approach of a place. 'As far as Gezer' gives the geographic extent in clear English while preserving the sense.
