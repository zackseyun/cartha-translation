id: 2SA.5.7
reference: 2 Samuel 5:7
source:
  edition: WLC
  text: וַ/יִּלְכֹּ֣ד דָּוִ֔ד אֵ֖ת מְצֻדַ֣ת צִיּ֑וֹן הִ֖יא עִ֥יר דָּוִֽד׃
translation:
  text: But David captured the stronghold of Zion, that is, the City of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress of Zion.' The Hebrew term denotes a fortified strong place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לכד commonly denotes capturing or seizing a place. 'Captured'
    is natural modern English and fits a military context better than the more generic
    'took.' The prefixed waw-consecutive advances the narrative; in English this is
    represented simply by past tense.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: Hebrew grammar
  rationale: 'The waw-consecutive here links this verse to the preceding failed taunt
    and creates mild contrast: despite the Jebusite confidence, David captured the
    fortress. ''But'' brings out that discourse function better than a mechanically
    formal ''And.'''
- source_word: מְצֻדַת
  chosen: stronghold
  alternatives:
  - fortress
  - citadel
  lexicon: HALOT
  rationale: The noun מצודה refers to a fortified strong place. 'Stronghold' is a
    standard and readable rendering that preserves the military sense without over-specifying
    architecture. 'Fortress' would also work, but 'stronghold' fits common biblical
    usage well.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    in keeping with the translation philosophy to transliterate names.
- source_word: הִיא
  chosen: that is
  alternatives:
  - it is
  - which is
  lexicon: Hebrew grammar
  rationale: The independent pronoun functions appositionally, identifying 'the stronghold
    of Zion' with the following phrase. 'That is' communicates the explanatory force
    more idiomatically than the wooden 'it is.'
- source_word: עִיר דָּוִד
  chosen: the City of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: This is a title-like place designation, and the established but still
    transparent English form is 'the City of David.' It preserves the genitival relationship
    and reads naturally.
