theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving reverential convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Covenantal language in בְּרִית
  chosen_reading: covenant
  alternative_readings:
  - treaty
  - agreement
  rationale: '''Covenant'' best preserves the theological and political weight of the Hebrew term in Israel''s royal context; weaker modern terms flatten the solemnity of the act performed before the LORD.'
