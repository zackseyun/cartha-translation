id: 2SA.5.3
reference: 2 Samuel 5:3
source:
  edition: WLC
  text: וַ֠/יָּבֹאוּ כָּל זִקְנֵ֨י יִשְׂרָאֵ֤ל אֶל הַ/מֶּ֨לֶךְ֙ חֶבְר֔וֹנָ/ה וַ/יִּכְרֹ֣ת לָ/הֶם֩ הַ/מֶּ֨לֶךְ דָּוִ֥ד בְּרִ֛ית בְּ/חֶבְר֖וֹן לִ/פְנֵ֣י יְהוָ֑ה וַ/יִּמְשְׁח֧וּ אֶת דָּוִ֛ד לְ/מֶ֖לֶךְ עַל יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: So all the elders of Israel came to the king at Hebron, and King David made a covenant with them at Hebron before Yahweh, and they anointed David king over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'cut a covenant,' an idiom meaning 'made a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly means 'came' in narrative sequence. 'Came' is the most natural English rendering here with the destination supplied by the following phrase.
- source_word: כָּל זִקְנֵי יִשְׂרָאֵל
  chosen: all the elders of Israel
  alternatives:
  - all Israel's elders
  lexicon: HALOT
  rationale: Retains the collective leadership sense of זקנים and the comprehensiveness of כָּל without paraphrase.
- source_word: אֶל הַמֶּלֶךְ חֶבְרוֹנָה
  chosen: to the king at Hebron
  alternatives:
  - to the king, to Hebron
  - to the king in Hebron
  lexicon: HALOT
  rationale: The directional ending on חֶבְרוֹנָה marks movement toward Hebron. In idiomatic English, 'to the king at Hebron' best conveys that they came to the king, who was located there.
- source_word: וַיִּכְרֹת ... בְּרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  - entered into a covenant
  lexicon: HALOT
  rationale: Hebrew idiom literally 'cut a covenant.' 'Made a covenant' is standard, clear English that preserves the covenantal force without wooden literalism.
- source_word: לָהֶם
  chosen: with them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Although literally 'to/for them,' with כרת ברית the relational sense in English is 'made a covenant with them.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: Preserves the formal covenantal setting. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: וַיִּמְשְׁחוּ
  chosen: they anointed
  alternatives:
  - they consecrated
  lexicon: HALOT
  rationale: משׁח in royal contexts specifically denotes anointing. 'Anointed' preserves the ritual-political act.
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  chosen: king over Israel
  alternatives:
  - as king over Israel
  - to be king over Israel
  lexicon: HALOT
  rationale: This compact English rendering naturally expresses appointment to kingship with authority over Israel. 'King over Israel' is idiomatic and faithful.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: The appositional Hebrew is best rendered as the standard English title-name construction 'King David.'
