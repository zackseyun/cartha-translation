id: 2SA.5.1
reference: 2 Samuel 5:1
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ כָּל שִׁבְטֵ֧י יִשְׂרָאֵ֛ל אֶל דָּוִ֖ד חֶבְר֑וֹנָ/ה וַ/יֹּאמְר֣וּ
    לֵ/אמֹ֔ר הִנְ/נ֛וּ עַצְמְ/ךָ֥ וּֽ/בְשָׂרְ/ךָ֖ אֲנָֽחְנוּ־־׃
translation:
  text: Then all the tribes of Israel came to David at Hebron and said, “Look, we
    are your bone and your flesh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your bone and your flesh,'' a kinship idiom meaning close blood
      relation or shared family identity.'
    reason: cultural_note
  - marker: b
    text: Or 'to Hebron'; the Hebrew form of 'Hebron' includes a directional ending.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'came' is the plain sense of בוא.
- source_word: כָּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: all the tribes of Israel
  alternatives:
  - every tribe of Israel
  lexicon: HALOT
  rationale: A straightforward collective expression. 'All the tribes of Israel' preserves
    the corporate-national sense better than the distributive 'every tribe.'
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - before David
  lexicon: HALOT
  rationale: אֶל normally marks motion toward a person or place. 'To David' is the
    most direct rendering in context.
- source_word: חֶבְרֹנָה
  chosen: at Hebron
  alternatives:
  - to Hebron
  - in Hebron
  lexicon: HALOT
  rationale: The directional he on the place name can indicate motion 'to Hebron,'
    but in English the clause already has motion toward David; 'came to David at Hebron'
    best captures both the destination-person and the setting-place without awkwardness.
- source_word: וַיֹּאמְרוּ לֵאמֹר
  chosen: and said
  alternatives:
  - and spoke, saying
  lexicon: HALOT
  rationale: This common Hebrew speech formula is idiomatically rendered 'and said'
    in English; retaining both elements woodenly would overtranslate.
- source_word: הִנּוּ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: The particle draws attention emphatically. 'Look' is readable modern
    English and preserves the deictic force without archaic tone.
- source_word: עַצְמְךָ וּבְשָׂרְךָ
  chosen: your bone and your flesh
  alternatives:
  - your very bone and flesh
  - your own flesh and bone
  lexicon: HALOT
  rationale: The Hebrew idiom expresses kinship/solidarity. 'Your bone and your flesh'
    stays close to the source wording and preserves the metaphor. The more idiomatic
    English order 'flesh and bone' would invert the Hebrew sequence.
- source_word: אֲנָחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: 'English requires the copula for a natural complete clause: ''we are
    your bone and your flesh.'' The verbless Hebrew clause is thus represented idiomatically.'
