theological_decisions:
- issue: Kinship formula and political-theological force
  chosen_reading: Render the idiom literally as 'we are your bone and your flesh'
    rather than paraphrasing it as mere tribal alliance.
  alternative_readings:
  - we are your own people
  - we are your kinsmen
  rationale: The speakers appeal to shared kinship with David, grounding his kingship
    in covenantal-national solidarity. A literal rendering preserves both the familial
    metaphor and the political force without importing extra interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
