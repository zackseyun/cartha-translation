id: 2SA.5.2
reference: 2 Samuel 5:2
source:
  edition: WLC
  text: גַּם אֶתְמ֣וֹל גַּם שִׁלְשׁ֗וֹם בִּ/הְי֨וֹת שָׁא֥וּל מֶ֨לֶךְ֙ עָלֵ֔י/נוּ אַתָּ֗ה הייתה מוציא ו/ה/מבי אֶת יִשְׂרָאֵ֑ל וַ/יֹּ֨אמֶר יְהוָ֜ה לְ/ךָ֗ אַתָּ֨ה תִרְעֶ֤ה אֶת עַמִּ/י֙ אֶת יִשְׂרָאֵ֔ל וְ/אַתָּ֛ה תִּהְיֶ֥ה לְ/נָגִ֖יד עַל יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: Also previously, when Saul was king over us, you were the one who led Israel out and brought them in. And Yahweh said to you, ‘You shall shepherd my people Israel, and you shall be ruler over Israel.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'both yesterday and the day before'; an idiom meaning 'formerly' or 'for some time already.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you brought Israel out and brought them in,' a Hebrew idiom for leading the people in their affairs, especially in battle.
    reason: lexical_alternative
  - marker: c
    text: Or 'leader' or 'prince' for 'ruler'; the Hebrew term differs from the usual word for 'king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֶתְמוֹל גַּם שִׁלְשׁוֹם
  chosen: Even before now
  alternatives:
  - Both yesterday and the day before
  - Both formerly and previously
  lexicon: HALOT
  rationale: The idiom literally refers to 'yesterday and the third day' = 'formerly / for some time already.' In natural English here, the sense is that David had already functioned as leader prior to this moment. 'Even before now' captures the temporal force without woodenly reproducing the Hebrew idiom.
- source_word: בִּהְיוֹת שָׁאוּל מֶלֶךְ עָלֵינוּ
  chosen: when Saul was king over us
  alternatives:
  - while Saul was king over us
  lexicon: HALOT
  rationale: The infinitive construct with ב marks a temporal clause. 'When Saul was king over us' is straightforward modern English and preserves the temporal relationship.
- source_word: אַתָּה
  chosen: you were the one
  alternatives:
  - you
  - it was you
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'You were the one' brings out the emphasis more clearly than a bare 'you' in English.
- source_word: מוציא וְהַמֵּבִיא
  chosen: led Israel out and brought them in
  alternatives:
  - brought out and brought in Israel
  - marshaled Israel out and in
  lexicon: HALOT
  rationale: This pair is a common idiom for leading a people in military/civic life. 'Led Israel out and brought them in' preserves the Hebrew imagery while remaining intelligible. The object is rendered with 'them' in the second verb for natural English style.
- source_word: וַיֹּאמֶר יְהוָה
  chosen: And the LORD said
  alternatives:
  - And Yahweh said
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The waw-consecutive is naturally rendered as simple past narrative.
- source_word: תִרְעֶה
  chosen: You shall shepherd
  alternatives:
  - You shall pasture
  - You shall tend
  lexicon: HALOT
  rationale: רעה here is the royal-pastoral metaphor for governing God's people. 'Shepherd' preserves the metaphor and its theological resonance better than the flatter 'rule' or 'tend'.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal language; no expansion is warranted.
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: HALOT
  rationale: נָגִיד often denotes one appointed as leader or ruler, distinct from the more standard term for 'king.' 'Ruler' is clear modern English and preserves the distinction without importing later technical nuance. 'Prince' would sound misleading in contemporary English.
