- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Royal metaphor in תִרְעֶה
  chosen_reading: You shall shepherd my people Israel
  alternative_readings:
  - You shall rule my people Israel
  - You shall tend my people Israel
  rationale: The Hebrew uses shepherding language for kingship. Preserving the metaphor maintains the theological texture of divinely appointed kingship rather than flattening it into mere administration.
