id: 2SA.5.10
reference: 2 Samuel 5:10
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ דָּוִ֖ד הָל֣וֹךְ וְ/גָד֑וֹל וַ/יהוָ֛ה אֱלֹהֵ֥י צְבָא֖וֹת עִמּֽ/וֹ׃פ
translation:
  text: And David went on, growing greater, and the LORD, the God of hosts, was with
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "and became greater and greater." The Hebrew expression combines a finite
      verb with an infinitive absolute to emphasize ongoing increase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went on
  alternatives:
  - went
  - continued
  lexicon: HALOT
  rationale: הלך with the following infinitive absolute הָלוֹךְ forms an idiom of
    continued progression. 'Went on' captures the durative sense better than a bare
    'went' while remaining natural English.
- source_word: הָלוֹךְ וְגָדוֹל
  chosen: growing greater
  alternatives:
  - and became greater and greater
  - continually increasing in greatness
  lexicon: HALOT
  rationale: The infinitive absolute plus adjective/verb construction intensifies
    and conveys ongoing increase. 'Growing greater' preserves the progressive force
    in concise modern English.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: צְבָאוֹת literally denotes hosts/armies. 'God of hosts' is the established,
    accurate English rendering that preserves the breadth of the term without over-specifying
    earthly or heavenly forces.
- source_word: עִמּוֹ
  chosen: was with him
  alternatives:
  - was with David
  lexicon: HALOT
  rationale: The prepositional phrase states divine presence accompanying David. 'Was
    with him' is the most direct rendering and preserves the Hebrew pronoun.
