theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrine, YHWH is rendered 'the LORD' in the main text rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צְבָאוֹת in the divine title
  chosen_reading: hosts
  alternative_readings:
  - armies
  - heavenly hosts
  rationale: The title emphasizes the LORD's sovereign command over all hosts. 'Hosts'
    preserves the traditional and semantically broad sense without narrowing the referent
    beyond what the Hebrew states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
