theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of צְבָאוֹת in the divine title
  chosen_reading: hosts
  alternative_readings:
  - armies
  - heavenly hosts
  rationale: The title emphasizes the LORD's sovereign command over all hosts. 'Hosts' preserves the traditional and semantically broad sense without narrowing the referent beyond what the Hebrew states.
