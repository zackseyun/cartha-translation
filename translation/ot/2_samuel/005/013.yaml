id: 2SA.5.13
reference: 2 Samuel 5:13
source:
  edition: WLC
  text: וַ/יִּקַּח֩ דָּוִ֨ד ע֜וֹד פִּֽלַגְשִׁ֤ים וְ/נָשִׁים֙ מִ/יר֣וּשָׁלִַ֔ם אַחֲרֵ֖י
    בֹּא֣/וֹ מֵ/חֶבְר֑וֹן וַ/יִּוָּ֥לְדּוּ ע֛וֹד לְ/דָוִ֖ד בָּנִ֥ים וּ/בָנֽוֹת׃
translation:
  text: And David took more concubines and wives from Jerusalem after he came from
    Hebron, and more sons and daughters were born to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Jerusalem.' The Hebrew literally says 'from Jerusalem,' which may
      indicate the place from which David took them after relocating there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - acquired
  lexicon: HALOT
  rationale: The verb לקח in this context refers to taking women into marriage/concubinage.
    'Took' is the standard concise rendering and preserves the source's directness
    without adding interpretive nuance beyond the Hebrew.
- source_word: עוֹד
  chosen: more
  alternatives:
  - again
  - additional
  lexicon: HALOT
  rationale: The adverb marks addition rather than repetition alone in both occurrences
    here. 'More' fits naturally in English for both David's taking of women and the
    birth of further children.
- source_word: פִּלַגְשִׁים
  chosen: concubines
  lexicon: HALOT
  rationale: This is the standard lexical sense and should be preserved distinctly
    from 'wives' because the Hebrew explicitly differentiates the two categories.
- source_word: וְנָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although נשים can mean 'women,' in coordination with 'concubines' and
    in this royal household context it refers to marital partners. 'Wives' makes the
    relationship explicit and matches the likely sense.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: The preposition מן most naturally means 'from.' The phrase likely indicates
    the place from which he took them after relocating there. 'From Jerusalem' preserves
    the Hebrew form more closely than smoothing to 'in Jerusalem.'
- source_word: אַחֲרֵי בֹּאוֹ מֵחֶבְרוֹן
  chosen: after he came from Hebron
  alternatives:
  - after he had come from Hebron
  - after coming from Hebron
  lexicon: HALOT
  rationale: This temporal phrase situates the action after David's move from Hebron.
    The chosen rendering is clear modern English and keeps the sequence explicit.
- source_word: וַיִּוָּלְדוּ
  chosen: were born
  alternatives:
  - were fathered
  lexicon: HALOT
  rationale: The Niphal of ילד is naturally rendered 'were born.' English idiom then
    supplies 'to David' to reflect the Hebrew dative construction.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The lamed marks relation/possession in the birth formula. 'To David'
    is idiomatic in English biblical style and avoids overinterpreting the nuance.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes; 'sons and daughters' preserves
    that specificity better than the more general 'children'.
