  chosen_reading: Render the verse descriptively without moral qualification.
  alternative_readings:
  - Add evaluative wording implying approval or disapproval
  rationale: The Hebrew reports David's actions and the resulting births without explicit
    moral commentary in this verse. The translation should not import doctrinal judgment
    that the text itself does not state.
