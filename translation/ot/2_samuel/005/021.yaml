theological_decisions:
- issue: Relation to the parallel account in 1 Chronicles 14:12, which says the idols
    were burned
  chosen_reading: Translate the Masoretic text of 2 Samuel as 'carried them away'
    without harmonizing to Chronicles
  alternative_readings:
  - '''took them away'' with an explanatory footnote about eventual destruction'
  - harmonized renderings implying they were burned immediately
  rationale: Optimal equivalence requires translating the Hebrew text as given. The
    Samuel text states that David and his men bore/carried the idols away; the Chronicler
    adds that David ordered them burned. The translation should not import the later
    detail into Samuel, but the parallel is worth preserving in a footnote for auditability.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
