id: 2SA.5.21
reference: 2 Samuel 5:21
source:
  edition: WLC
  text: וַ/יַּעַזְבוּ שָׁ֖ם אֶת עֲצַבֵּי/הֶ֑ם וַ/יִּשָּׂאֵ֥/ם דָּוִ֖ד וַ/אֲנָשָֽׁי/ו־־׃פ
translation:
  text: And they left their idols there, and David and his men carried them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Chronicles 14:12 adds that David gave orders and the idols were burned.
      Here the Hebrew of Samuel says only that David and his men carried them away.
    reason: cross_reference
  - marker: b
    text: Or 'their images.' The Hebrew term refers to cult images; 'idols' makes
      the sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: they left
  alternatives:
  - they abandoned
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave' or 'forsake/abandon.' In this narrative
    context, 'left' is the most natural English rendering for retreating forces leaving
    objects behind.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' preserves the straightforward narrative
    sense.
- source_word: עֲצַבֵּיהֶם
  chosen: their idols
  alternatives:
  - their images
  lexicon: HALOT
  rationale: Though the noun can denote images or idols, in this military-religious
    context it refers to cult objects of the Philistines. 'Idols' makes the referent
    clear in modern English and matches the negative religious sense often carried
    by the term in context.
- source_word: וַיִּשָּׂאֵם
  chosen: carried them away
  alternatives:
  - took them
  - lifted them
  lexicon: HALOT
  rationale: נשא broadly means 'lift, carry, take.' 'Carried them away' fits the physical
    action and preserves the object suffix. It also avoids overinterpreting the purpose
    of the action.
- source_word: דָּוִד וַאֲנָשָׁיו
  chosen: David and his men
  alternatives:
  - David and his soldiers
  lexicon: HALOT
  rationale: אֲנָשָׁיו literally means 'his men.' This is gender-accurate and contextually
    refers to David's fighting force/companions. 'Men' is preferable to the more interpretive
    'soldiers,' though soldiers are in view.
