theological_decisions:
- issue: Interpretation of David's hatred toward 'the lame and the blind'
  chosen_reading: Retain the difficult wording without softening or importing later
    legal/theological implications.
  alternative_readings:
  - Treat the phrase as referring only to the Jebusites' taunt rather than David's
    own words
  - Emend or paraphrase to avoid attributing hatred to David
  rationale: The Hebrew text is syntactically difficult and has prompted interpretive
    smoothing in translation tradition. Following original-language primacy and preserving
    tension, the draft keeps the MT's hard wording while not extending it into a doctrinal
    claim about disability or temple access beyond what this verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 5
