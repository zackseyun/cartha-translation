id: 2SA.5.8
reference: 2 Samuel 5:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד בַּ/יּ֣וֹם הַ/ה֗וּא כָּל מַכֵּ֤ה יְבֻסִי֙ וְ/יִגַּ֣ע בַּ/צִּנּ֔וֹר
    וְ/אֶת הַ/פִּסְחִים֙ וְ/אֶת הַ֣/עִוְרִ֔ים שנאו נֶ֣פֶשׁ דָּוִ֑ד עַל כֵּן֙ יֹֽאמְר֔וּ
    עִוֵּ֣ר וּ/פִסֵּ֔חַ לֹ֥א יָב֖וֹא אֶל הַ/בָּֽיִת־־־־־׃
translation:
  text: And David said on that day, “Whoever strikes the Jebusites, let him reach
    the water shaft, and the lame and the blind, whom David’s soul hates.” Therefore
    they say, “The blind and the lame shall not come into the house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the conduit,' 'the gutter,' or 'the tunnel'; the Hebrew term likely
      refers to a water system or shaft, but its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew syntax in this clause is difficult. Some understand the words
      'the lame and the blind' as part of the Jebusites' taunt from the previous verse,
      rather than as the direct object of David's challenge.
    reason: alternative_reading
  - marker: c
    text: Or 'shall not enter the palace'; 'house' may refer to the royal residence
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מַכֵּה יְבֻסִי
  chosen: Whoever strikes the Jebusites
  alternatives:
  - Everyone who strikes a Jebusite
  - Whoever would strike the Jebusites
  lexicon: HALOT
  rationale: כָּל with the participle מַכֵּה functions idiomatically as an indefinite
    challenge formula, best rendered 'whoever strikes.' Although יְבֻסִי is singular
    in form, it is collective/gentilic, so English plural 'the Jebusites' is natural.
- source_word: וְיִגַּע
  chosen: let him reach
  alternatives:
  - and touch
  - and strike
  lexicon: HALOT
  rationale: The verb נגע commonly means 'touch/reach.' In this military context with
    the following בַּצִּנּוֹר, 'reach' is more idiomatic than literal 'touch' and
    avoids over-specifying a violent sense not explicit in the verb itself.
- source_word: בַּצִּנּוֹר
  chosen: the water shaft
  alternatives:
  - the conduit
  - the gutter
  - the tunnel
  lexicon: HALOT
  rationale: צִנּוֹר is a difficult term, traditionally rendered 'gutter' in older
    English, but likely refers to a water system/shaft associated with the city's
    defenses. 'Water shaft' is a clear modern rendering that fits the likely topographical
    sense while acknowledging uncertainty.
- source_word: וְאֶת הַפִּסְחִים וְאֶת הָעִוְרִים
  chosen: and the lame and the blind
  alternatives:
  - even the lame and the blind
  lexicon: HALOT
  rationale: These adjectives are substantival plurals. The straightforward rendering
    preserves the wording of the Hebrew. The conjunction is kept as 'and,' though
    the syntax of the whole clause is notoriously compressed.
- source_word: שנאו נֶפֶשׁ דָּוִד
  chosen: whom David’s soul hates
  alternatives:
  - whom David hates
  - hated by David
  lexicon: HALOT
  rationale: The Hebrew literally says 'David's soul hates.' Retaining 'soul' preserves
    the idiom and intensity, while still being understandable in English. The relative
    sense 'whom' is supplied to make the compressed Hebrew clause readable.
- source_word: עַל כֵּן יֹאמְרוּ
  chosen: Therefore they say
  alternatives:
  - That is why people say
  - Therefore it is said
  lexicon: HALOT
  rationale: This introduces a proverb or saying. 'Therefore they say' is concise
    and close to the Hebrew, while leaving the subject indefinite as in the source.
- source_word: עִוֵּר וּפִסֵּחַ
  chosen: The blind and the lame
  alternatives:
  - A blind man or a lame man
  lexicon: HALOT
  rationale: Though singular in Hebrew form, the phrase is proverbially generic. English
    plural with article sounds natural and reflects the class sense.
- source_word: לֹא יָבֹא אֶל הַבָּיִת
  chosen: shall not come into the house
  alternatives:
  - shall not enter the house
  - shall not come into the palace
  lexicon: HALOT
  rationale: בַּיִת can mean 'house' broadly, including a royal residence, but the
    Hebrew does not specify 'palace.' 'Come into the house' stays close to the text
    while allowing readers to infer the referent from context.
