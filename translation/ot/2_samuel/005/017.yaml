id: 2SA.5.17
reference: 2 Samuel 5:17
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֣וּ פְלִשְׁתִּ֗ים כִּי מָשְׁח֨וּ אֶת דָּוִ֤ד לְ/מֶ֨לֶךְ֙ עַל יִשְׂרָאֵ֔ל
    וַ/יַּעֲל֥וּ כָל פְּלִשְׁתִּ֖ים לְ/בַקֵּ֣שׁ אֶת דָּוִ֑ד וַ/יִּשְׁמַ֣ע דָּוִ֔ד
    וַ/יֵּ֖רֶד אֶל הַ/מְּצוּדָֽה־־־־־־׃
translation:
  text: When the Philistines heard that they had anointed David king over Israel,
    all the Philistines went up to seek David. When David heard of it, he went down
    to the stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fortress.' The Hebrew term denotes a fortified stronghold.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name in English Bible usage.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what the Philistines heard: that David had
    been anointed king.'
- source_word: מָשְׁחוּ
  chosen: they had anointed
  alternatives:
  - they anointed
  lexicon: HALOT
  rationale: The verb means 'anoint.' English past perfect fits the sequence after
    'heard that,' indicating prior action relative to the Philistines' response.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: Predicate complement after 'anointed David'; 'anointed David king' is
    idiomatic and close to the Hebrew.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with royal appointment naturally conveys rule or authority over Israel.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה is literally 'go up.' The more formal geographic sense is retained
    rather than paraphrasing as 'marched,' which adds nuance not explicit in the verb.
- source_word: כָל פְּלִשְׁתִּים
  chosen: all the Philistines
  alternatives:
  - the whole Philistine force
  lexicon: HALOT
  rationale: כָל is preserved straightforwardly as 'all,' emphasizing the comprehensive
    Philistine mobilization.
- source_word: לְבַקֵּשׁ אֶת דָּוִד
  chosen: to seek David
  alternatives:
  - to look for David
  - to search for David
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' This keeps the wording broad enough to include
    hostile intent without overtranslating it as 'capture' or 'kill.'
- source_word: וַיִּשְׁמַע דָּוִד
  chosen: When David heard of it
  alternatives:
  - And David heard
  - When David heard
  lexicon: HALOT
  rationale: English supplies 'of it' naturally because the object is implicit from
    context. 'When' smooths the narrative sequence.
- source_word: וַיֵּרֶד
  chosen: he went down
  alternatives:
  - he went down and stayed
  - he descended
  lexicon: HALOT
  rationale: ירד is literally 'go down.' The simple narrative verb is preserved.
- source_word: הַמְּצוּדָה
  chosen: the stronghold
  alternatives:
  - the fortress
  - the stronghold of refuge
  lexicon: HALOT
  rationale: מצודה denotes a fortified place or stronghold. 'Stronghold' is a natural
    and established rendering here.
