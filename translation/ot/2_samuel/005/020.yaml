id: 2SA.5.20
reference: 2 Samuel 5:20
source:
  edition: WLC
  text: וַ/יָּבֹ֨א דָוִ֥ד בְּ/בַֽעַל פְּרָצִים֮ וַ/יַּכֵּ֣/ם שָׁ֣ם דָּוִד֒ וַ/יֹּ֕אמֶר
    פָּרַ֨ץ יְהוָ֧ה אֶת אֹיְבַ֛/י לְ/פָנַ֖/י כְּ/פֶ֣רֶץ מָ֑יִם עַל כֵּ֗ן קָרָ֛א שֵֽׁם
    הַ/מָּק֥וֹם הַ/ה֖וּא בַּ֥עַל פְּרָצִֽים־־־־׃
translation:
  text: So David came to Baal-perazim, and there David struck them down. He said,
    “The LORD has broken through my enemies before me like a breakthrough of waters.”
    Therefore he called the name of that place Baal-perazim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-perazim sounds like 'lord/master of breakthroughs' or 'place of breakthroughs,'
      echoing David’s statement that the LORD 'broke through' his enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the bursting of floodwaters.' The Hebrew phrase preserves a wordplay
      with 'broken through' and 'Baal-perazim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבַעַל פְּרָצִים / בַּעַל פְּרָצִים
  chosen: Baal-perazim
  alternatives:
  - Lord of Breakings Through
  - Master of Breakthroughs
  lexicon: HALOT
  rationale: This is a place name and, per translation philosophy, personal/place
    names are transliterated rather than translated. The repeated use also preserves
    the wordplay with פָּרַץ/פֶּרֶץ in David’s explanation.
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - defeated them
  - smote them
  lexicon: HALOT
  rationale: The verb נכה commonly denotes striking down in battle. 'Struck them down'
    preserves the martial force better than the weaker 'defeated,' while remaining
    natural modern English.
- source_word: פָּרַץ
  chosen: has broken through
  alternatives:
  - has burst out against
  - has made a breach against
  lexicon: HALOT
  rationale: The verb carries the sense of breaking through or bursting forth. 'Has
    broken through' best matches the immediate simile of rushing waters and preserves
    the wordplay with Baal-perazim.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine file specifies the default rendering of YHWH as 'the LORD.'
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Standard and direct rendering of the noun with first-person singular
    suffix.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  - ahead of me
  lexicon: HALOT
  rationale: '''Before me'' is the most natural idiomatic rendering in this military
    context and reflects the Hebrew prepositional phrase closely.'
- source_word: כְּפֶרֶץ מָיִם
  chosen: like a breakthrough of waters
  alternatives:
  - like the bursting of floodwaters
  - like a breach made by waters
  lexicon: HALOT
  rationale: This phrase intentionally echoes the verb פָּרַץ and the place name.
    'Breakthrough of waters' is slightly less idiomatic than 'bursting of floodwaters'
    but better preserves the lexical repetition central to the verse’s wordplay.
- source_word: קָרָא שֵׁם הַמָּקוֹם הַהוּא
  chosen: he called the name of that place
  alternatives:
  - he named that place
  lexicon: HALOT
  rationale: This more formal phrasing reflects the Hebrew idiom closely while remaining
    understandable. It also preserves the narrative emphasis on the naming act.
