id: 2SA.5.24
reference: 2 Samuel 5:24
source:
  edition: WLC
  text: וִ֠/יהִי ב/שמע/ך אֶת ק֧וֹל צְעָדָ֛ה בְּ/רָאשֵׁ֥י הַ/בְּכָאִ֖ים אָ֣ז תֶּחֱרָ֑ץ
    כִּ֣י אָ֗ז יָצָ֤א יְהוָה֙ לְ/פָנֶ֔י/ךָ לְ/הַכּ֖וֹת בְּ/מַחֲנֵ֥ה פְלִשְׁתִּֽים־׃
translation:
  text: And when you hear the sound of marching in the tops of the balsam trees, then
    act decisively, for then the LORD has gone out before you to strike down the camp
    of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the tops of the baca trees'; the exact species named by the Hebrew
      is uncertain. Older English versions often read 'mulberry trees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  chosen: And when
  alternatives:
  - And it shall be
  - And it will happen, when
  lexicon: HALOT
  rationale: The waw + היה introduces a future circumstance. In English, 'And when'
    naturally conveys the temporal setup without woodenly reproducing 'it shall be.'
- source_word: בְּשָׁמְעֲךָ
  chosen: you hear
  alternatives:
  - your hearing
  - when you hear
  lexicon: HALOT
  rationale: 'Infinitive construct with 2ms suffix after ב marks temporal circumstance:
    ''when you hear.'' The finite English verb is the most natural equivalent.'
- source_word: קוֹל צְעָדָה
  chosen: the sound of marching
  alternatives:
  - the sound of steps
  - the sound of marching steps
  lexicon: HALOT
  rationale: קוֹל is 'sound,' and צעדה denotes stepping/marching. In this military
    context, 'marching' best captures the sense without over-literal awkwardness.
- source_word: בְּרָאשֵׁי הַבְּכָאִים
  chosen: in the tops of the balsam trees
  alternatives:
  - in the tops of the baca trees
  - at the tops of the mulberry trees
  lexicon: HALOT
  rationale: רָאשֵׁי means 'tops' or 'summits.' הַבְּכָאִים is a tree name with uncertain
    exact botanical identification. 'Balsam trees' is a common lexical judgment; alternatives
    are preserved because 'baca' transliterates the uncertainty and 'mulberry' reflects
    older tradition.
- source_word: אָז תֶּחֱרָץ
  chosen: then act decisively
  alternatives:
  - then move quickly
  - then be sharp
  - then bestir yourself
  lexicon: HALOT
  rationale: The verb חרץ here carries the sense of decisive, vigorous action in response
    to the sign. 'Act decisively' preserves the urgency without narrowing it merely
    to speed.
- source_word: כִּי אָז
  chosen: for then
  alternatives:
  - because then
  lexicon: HALOT
  rationale: כִּי gives the reason for the commanded action; 'for then' is idiomatic
    and clear.
- source_word: יָצָא יְהוָה
  chosen: the LORD has gone out
  alternatives:
  - the LORD goes out
  - the LORD has marched out
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The perfect verb is well
    represented by English present perfect here, indicating the LORD's action already
    initiated at the moment David hears the sign.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: This expresses the LORD going ahead of David in battle. 'Before you'
    is both idiomatic and theologically resonant.
- source_word: לְהַכּוֹת
  chosen: to strike down
  alternatives:
  - to strike
  - to defeat
  - to smite
  lexicon: HALOT
  rationale: The hiphil infinitive of נכה in battle contexts commonly means to strike/strike
    down. 'Strike down' communicates military force in contemporary English.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  chosen: the camp of the Philistines
  alternatives:
  - the army of the Philistines
  - the Philistine camp
  lexicon: HALOT
  rationale: מַחֲנֶה is literally 'camp,' which in military context can imply the
    army as encamped. 'The camp of the Philistines' stays close to the Hebrew while
    remaining natural.
