  text: וֶ/אֱלִישָׁמָ֥ע וְ/אֶלְיָדָ֖ע וֶ/אֱלִיפָֽלֶט׃פ
translation:
  text: and Elishama, and Eliada, and Eliphelet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eliphelet is also spelled Eliphalet in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶ/אֱלִישָׁמָע
  chosen: and Elishama
  alternatives:
  - Elishama
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and.' The proper name is transliterated
    rather than translated, following the translation philosophy for personal names.
    Standard English form 'Elishama' is used.
- source_word: וְ/אֶלְיָדָע
  chosen: and Eliada
  alternatives:
  - Elyada
  lexicon: HALOT
  rationale: The conjunction ו is again rendered 'and.' The name is transliterated
    by standard convention as 'Eliada,' preserving the Hebrew personal name rather
    than attempting to render its etymological meaning.
- source_word: וֶ/אֱלִיפָלֶט
  chosen: and Eliphelet
  alternatives:
  - Eliphalet
  lexicon: HALOT
  rationale: The conjunction ו is rendered 'and.' The proper name is transliterated.
    'Eliphelet' is a common English representation of this Hebrew name; an alternate
    spelling is worth preserving because English traditions vary.
