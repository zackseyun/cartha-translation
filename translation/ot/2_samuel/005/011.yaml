id: 2SA.5.11
reference: 2 Samuel 5:11
source:
  edition: WLC
  text: וַ֠/יִּשְׁלַח חִירָ֨ם מֶֽלֶךְ צֹ֥ר מַלְאָכִים֮ אֶל דָּוִד֒ וַ/עֲצֵ֣י אֲרָזִ֔ים
    וְ/חָרָשֵׁ֣י עֵ֔ץ וְ/חָֽרָשֵׁ֖י אֶ֣בֶן קִ֑יר וַ/יִּבְנֽוּ בַ֖יִת לְ/דָוִֽד־־־׃
translation:
  text: And Hiram king of Tyre sent messengers to David, and cedar logs, and craftsmen
    of wood, and craftsmen of stone walling; and they built a house for David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'masons' for 'craftsmen of stone walling.' The Hebrew phrase literally
      includes both 'stone' and 'wall.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a palace for David.' The Hebrew literally says 'a house,' which in a
      royal setting can refer to a palace.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative prose. 'Sent' is natural and sufficiently
    formal.
- source_word: חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: מֶלֶךְ צֹר
  chosen: king of Tyre
  alternatives:
  - the king of Tyre
  lexicon: HALOT
  rationale: Construct chain identifying Hiram's royal office and realm. 'Tyre' is
    the standard English form of צֹר.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: מַלְאָכִים can mean either ordinary messengers or diplomatic envoys.
    'Messengers' is the broader and more literal term; the diplomatic nuance is possible
    from context but not required by the noun itself.
- source_word: וַעֲצֵי אֲרָזִים
  chosen: cedar logs
  alternatives:
  - cedar wood
  - cedar timber
  lexicon: HALOT
  rationale: Literally 'woods/trees of cedars,' an idiom for cedar timber. 'Cedar
    logs' gives a concrete modern English equivalent without over-paraphrasing; 'cedar
    timber' is also possible.
- source_word: חָרָשֵׁי עֵץ
  chosen: craftsmen of wood
  alternatives:
  - woodworkers
  - carpenters
  lexicon: HALOT
  rationale: חָרָשׁ denotes an artisan/craftsman. 'Craftsmen of wood' stays close
    to the Hebrew while remaining understandable. 'Carpenters' may be too narrow if
    broader woodworking is intended.
- source_word: חָרָשֵׁי אֶבֶן קִיר
  chosen: craftsmen of stone walling
  alternatives:
  - stonecutters for the wall
  - masons
  lexicon: HALOT
  rationale: The phrase is difficult. אֶבֶן is 'stone' and קִיר is 'wall.' The expression
    likely refers to workers in stone construction for walls, i.e., masons. The chosen
    rendering preserves both lexical elements more transparently than simply 'masons,'
    while the smoother alternative is preserved in a footnote.
- source_word: וַיִּבְנוּ
  chosen: they built
  alternatives:
  - and they built
  lexicon: HALOT
  rationale: Wayyiqtol narrative verb with plural subject referring to the supplied
    workers. English includes the explicit subject naturally.
- source_word: בַיִת
  chosen: a house
  alternatives:
  - a palace
  lexicon: HALOT
  rationale: The basic sense is 'house.' In royal context it may denote a palace,
    but the Hebrew does not use a distinct term here. To avoid importing more than
    the text states, the main text keeps 'house,' with 'palace' preserved as a contextual
    alternative in a footnote.
- source_word: לְדָוִד
  chosen: for David
  alternatives:
  - for the use of David
  - for David's residence
  lexicon: HALOT
  rationale: Simple dative of advantage/benefit. 'For David' is direct and sufficient.
