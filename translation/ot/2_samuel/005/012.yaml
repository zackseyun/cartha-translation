theological_decisions:
- issue: Antecedent of the suffix in עַמּוֹ ('his people')
  chosen_reading: 'The suffix refers to the LORD: ''his people Israel.'''
  alternative_readings:
  - 'The suffix refers to David: ''his people Israel'' meaning David''s people.'
  rationale: The immediate context emphasizes the LORD as the acting subject who establishes David and exalts his kingdom. The statement that this was done 'for the sake of his people Israel' most naturally refers to Israel as the LORD's covenant people, a common biblical expression. This avoids implying royal possession as the primary idea while preserving the theological emphasis that David's kingship serves God's people under God's purpose.
  doctrine_reference: Affirmations; Translation philosophy §3
