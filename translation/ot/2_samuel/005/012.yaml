id: 2SA.5.12
reference: 2 Samuel 5:12
source:
  edition: WLC
  text: וַ/יֵּ֣דַע דָּוִ֔ד כִּֽי הֱכִינ֧/וֹ יְהוָ֛ה לְ/מֶ֖לֶךְ עַל יִשְׂרָאֵ֑ל וְ/כִי֙ נִשֵּׂ֣א מַמְלַכְתּ֔/וֹ בַּ/עֲב֖וּר עַמּ֥/וֹ יִשְׂרָאֵֽל־־׃ס
translation:
  text: And David knew that Yahweh had established him as king over Israel, and that he had exalted his kingdom for the sake of his people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the sake of David's people Israel,' if the pronoun 'his' is taken to refer to David rather than to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - realized
  - recognized
  lexicon: HALOT
  rationale: The verb ידע denotes knowing or coming to know. 'Knew' is the most direct rendering and fits the narrative style; 'realized' is possible but slightly more interpretive.
- source_word: הֱכִינוֹ
  chosen: had established him
  alternatives:
  - had confirmed him
  - had made him secure
  lexicon: HALOT
  rationale: The Hiphil of כון commonly carries the sense of establishing, making firm, or confirming. In royal context, 'had established him' naturally conveys divine confirmation and stabilization in kingship without over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמֶלֶךְ
  chosen: as king
  alternatives:
  - to be king
  - for king
  lexicon: HALOT
  rationale: The preposition ל with מלך here marks role or office. English idiom is best served by 'as king,' which clearly expresses appointment/establishment in office.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: In kingship contexts, עַל is naturally rendered 'over,' indicating rule or authority.
- source_word: נִשֵּׂא
  chosen: had exalted
  alternatives:
  - had lifted up
  - had raised high
  lexicon: HALOT
  rationale: The passive/perfect form of נשׂא here conveys elevation or exaltation. 'Had exalted' fits the royal context and idiomatic English better than the more literal 'lifted up.'
- source_word: מַמְלַכְתּוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his reign
  lexicon: HALOT
  rationale: ממלכה can denote kingdom, reign, or royal dominion. 'His kingdom' is the most straightforward and preserves the scope of David's royal rule; 'his reign' is possible but slightly narrower.
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: 'The phrase indicates purpose or benefit here: David''s kingdom was exalted on behalf of Israel. ''For the sake of'' best captures that beneficiary-oriented sense.'
- source_word: עַמּוֹ יִשְׂרָאֵל
  chosen: his people Israel
  alternatives:
  - his people, Israel
  - Israel his people
  lexicon: HALOT
  rationale: The appositional construction identifies Israel as the LORD's people, not merely David's. Retaining 'his people Israel' preserves the Hebrew sequence and the most likely antecedent of the suffix as the LORD.
