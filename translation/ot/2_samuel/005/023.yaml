id: 2SA.5.23
reference: 2 Samuel 5:23
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֤ל דָּוִד֙ בַּֽ/יהוָ֔ה וַ/יֹּ֖אמֶר לֹ֣א תַעֲלֶ֑ה הָסֵב֙ אֶל אַ֣חֲרֵי/הֶ֔ם וּ/בָ֥אתָ לָ/הֶ֖ם מִ/מּ֥וּל בְּכָאִֽים־׃
translation:
  text: So David inquired of Yahweh, and he said, “You shall not go up; circle around behind them, and come against them opposite the balsam trees.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the baca trees”; traditionally “the mulberry trees.” The exact species denoted by the Hebrew is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל with ביהוה in this context refers to seeking divine guidance, not merely asking a question. 'Inquired' is idiomatic in English for consulting the LORD in military decision-making contexts.
- source_word: בַּיהוָה
  chosen: of the LORD
  alternatives:
  - of Yahweh
  lexicon: HALOT
  rationale: 'The preposition with YHWH here expresses the object of inquiry: David inquired of YHWH. Per doctrine, יהוה is rendered ''the LORD'' rather than transliterated.'
- source_word: לֹא תַעֲלֶה
  chosen: You shall not go up
  alternatives:
  - Do not go up
  - You must not advance
  lexicon: HALOT
  rationale: עלה commonly means 'go up' and in military movement can imply advancing. 'You shall not go up' preserves the Hebrew wording while remaining natural in direct divine speech.
- source_word: הָסֵב
  chosen: circle around
  alternatives:
  - turn
  - go around
  lexicon: HALOT
  rationale: The imperative from סבב directs David to change course and move around the enemy position. 'Circle around' best conveys tactical maneuver rather than a mere turn.
- source_word: אֶל אַחֲרֵיהֶם
  chosen: behind them
  alternatives:
  - to their rear
  - around to their back
  lexicon: HALOT
  rationale: The phrase indicates movement to the enemy's rear. 'Behind them' is concise and clear in modern English.
- source_word: וּבָאתָ לָהֶם
  chosen: come against them
  alternatives:
  - come upon them
  - approach them
  lexicon: HALOT
  rationale: In military context בוא + ל often has an adversarial sense. 'Come against them' makes the tactical intent explicit without over-paraphrasing.
- source_word: מִמּוּל
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition denotes a position directly opposite or facing something. 'Opposite' preserves the spatial sense cleanly.
- source_word: בְּכָאִים
  chosen: the balsam trees
  alternatives:
  - the baca trees
  - the mulberry trees
  lexicon: HALOT
  rationale: The plant term is uncertain. 'Balsam trees' reflects a common lexical judgment for בְּכָאִים while avoiding the traditional but less certain 'mulberry trees.' Because the identification is not fully secure, alternatives are preserved in a footnote.
