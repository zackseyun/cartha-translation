id: 2SA.5.4
reference: 2 Samuel 5:4
source:
  edition: WLC
  text: בֶּן שְׁלֹשִׁ֥ים שָׁנָ֛ה דָּוִ֖ד בְּ/מָלְכ֑/וֹ אַרְבָּעִ֥ים שָׁנָ֖ה מָלָֽךְ־׃
translation:
  text: David was thirty years old when he began to reign, and he reigned forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a son of thirty years.' This is a Hebrew idiom meaning 'thirty
      years old.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he became king.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים שָׁנָה
  chosen: was thirty years old
  alternatives:
  - was a son of thirty years
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a son of thirty years,' a standard
    age expression best rendered idiomatically in natural English as 'was thirty years
    old.' This preserves the sense without wooden literalism.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - in his reigning
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of מלך with 3ms suffix marks
    the time of accession/reigning. 'When he began to reign' captures the temporal
    force in idiomatic English and fits the regnal formula context.
- source_word: מָלָךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb מלך denotes exercising kingship/reigning. 'He reigned' is the
    standard and most precise rendering in this regnal summary.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward numeral plus noun indicating the duration of David's
    reign.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
