id: 2SA.5.18
reference: 2 Samuel 5:18
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֖ים בָּ֑אוּ וַ/יִּנָּטְשׁ֖וּ בְּ/עֵ֥מֶק רְפָאִֽים׃
translation:
  text: And the Philistines came and spread out in the Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deployed themselves' in the Valley of Rephaim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  chosen: And the Philistines
  alternatives:
  - Now the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: The conjunction ו is rendered simply as 'And' to preserve the narrative
    flow. פְלִשְׁתִּים is the standard ethnonym 'Philistines.'
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - had come
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא in narrative context is naturally rendered 'came.'
    'Arrived' is possible but less idiomatic in this military narrative.
- source_word: וַ/יִּנָּטְשׁוּ
  chosen: spread out
  alternatives:
  - deployed themselves
  - were scattered
  - made a raid
  lexicon: HALOT
  rationale: The verb from נטשׁ in this context describes military positioning across
    an area. 'Spread out' is clear modern English and fits the following locative
    phrase. 'Deployed themselves' is possible but more interpretive and technical.
- source_word: בְּ/עֵמֶק
  chosen: in the Valley of
  alternatives:
  - in the valley of
  - through the Valley of
  lexicon: HALOT
  rationale: The preposition ב is locative, and עֵמֶק means 'valley.' Capitalizing
    'Valley' is appropriate because the following proper name forms a recognized place
    name.
- source_word: רְפָאִים
  chosen: Rephaim
  alternatives:
  - the Rephaim
  lexicon: HALOT
  rationale: As part of the place name עֵמֶק רְפָאִים, this is best transliterated
    'Rephaim' rather than translated. 'Valley of Rephaim' is the conventional and
    source-faithful rendering.
