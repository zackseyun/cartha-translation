id: 2SA.5.5
reference: 2 Samuel 5:5
source:
  edition: WLC
  text: בְּ/חֶבְרוֹן֙ מָלַ֣ךְ עַל יְהוּדָ֔ה שֶׁ֥בַע שָׁנִ֖ים וְ/שִׁשָּׁ֣ה חֳדָשִׁ֑ים
    וּ/בִ/ירוּשָׁלִַ֣ם מָלַ֗ךְ שְׁלֹשִׁ֤ים וְ/שָׁלֹשׁ֙ שָׁנָ֔ה עַ֥ל כָּל יִשְׂרָאֵ֖ל
    וִ/יהוּדָֽה־־׃
translation:
  text: In Hebron he reigned over Judah seven years and six months, and in Jerusalem
    he reigned thirty-three years over all Israel and Judah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּחֶבְרוֹן
  chosen: In Hebron
  alternatives:
  - At Hebron
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Hebron' is the most natural modern
    English rendering for the place where David reigned during this period.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he became king
  lexicon: HALOT
  rationale: The qatal form here summarizes duration of rule, not accession at a single
    moment. 'He reigned' best matches the verbal sense in context.
- source_word: עַל יְהוּדָה
  chosen: over Judah
  alternatives:
  - for Judah
  lexicon: HALOT
  rationale: עַל with מלך indicates the realm or people over whom one rules. 'Over
    Judah' is the standard and clearest rendering.
- source_word: שֶׁבַע שָׁנִים וְשִׁשָּׁה חֳדָשִׁים
  chosen: seven years and six months
  lexicon: HALOT
  rationale: This is a straightforward statement of duration; English idiom preserves
    the Hebrew sequence naturally.
- source_word: וּבִירוּשָׁלַם
  chosen: and in Jerusalem
  alternatives:
  - and at Jerusalem
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the second location of David's
    reign. 'In Jerusalem' is idiomatic modern English.
- source_word: שְׁלֹשִׁים וְשָׁלֹשׁ שָׁנָה
  chosen: thirty-three years
  alternatives:
  - thirty and three years
  lexicon: HALOT
  rationale: The Hebrew cardinal expression is rendered in standard contemporary English
    number style.
- source_word: עַל כָּל יִשְׂרָאֵל וִיהוּדָה
  chosen: over all Israel and Judah
  alternatives:
  - over all Israel, even Judah
  lexicon: HALOT
  rationale: The phrase distinguishes the united monarchy's full scope. Retaining
    both 'Israel and Judah' reflects the Hebrew wording and the political distinction
    within the unified kingdom.
