id: 2SA.5.9
reference: 2 Samuel 5:9
source:
  edition: WLC
  text: וַ/יֵּ֤שֶׁב דָּוִד֙ בַּ/מְּצֻדָ֔ה וַ/יִּקְרָא לָ֖/הּ עִ֣יר דָּוִ֑ד וַ/יִּ֤בֶן
    דָּוִד֙ סָבִ֔יב מִן הַ/מִּלּ֖וֹא וָ/בָֽיְתָ/ה־־׃
translation:
  text: So David lived in the stronghold and called it the City of David. And David
    built all around from the Millo inward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'from the Millo and inward,' or 'from the Millo toward the
      interior.' 'The Millo' likely refers to a known structure or terraced fill in
      Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, live, settle.' In narrative
    English, 'lived' is natural and fits David's taking up residence in the captured
    fortress. 'Dwelt' is more formal/archaic; 'settled' could imply initial establishment
    rather than ongoing residence.
- source_word: בַּמְּצֻדָה
  chosen: in the stronghold
  alternatives:
  - in the fortress
  lexicon: HALOT
  rationale: מְצֻדָה denotes a fortified place or stronghold. 'Stronghold' preserves
    the military-defensive sense and matches common usage in this Davidic context.
    'Fortress' is possible but slightly less idiomatic here.
- source_word: וַיִּקְרָא לָהּ
  chosen: called it
  alternatives:
  - named it
  lexicon: HALOT
  rationale: קרא + ל marks naming/designation. 'Called it' is a direct rendering;
    'named it' is also valid but slightly more interpretive.
- source_word: עִיר דָּוִד
  chosen: the City of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: This is a proper place-name designation. 'The City of David' is the standard
    and clearest English rendering.
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fortified
  - rebuilt
  lexicon: HALOT
  rationale: The basic sense of בנה is 'build.' Although the context involves urban
    fortification or expansion, the Hebrew does not explicitly specify 'fortified'
    or 'rebuilt,' so the simpler verb is preferred.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  lexicon: HALOT
  rationale: סביב indicates surrounding extent. 'All around' brings out the distributive
    sense in natural English.
- source_word: מִן הַמִּלּוֹא
  chosen: from the Millo
  alternatives:
  - from the supporting terraces
  - from the fill
  lexicon: HALOT
  rationale: מִלּוֹא is likely a technical/topographical term or place-name in Jerusalem.
    Because its exact referent is debated, transliterating as 'the Millo' is the most
    transparent main-text choice. Explanatory alternatives are better preserved in
    a footnote.
- source_word: וָבָיְתָה
  chosen: inward
  alternatives:
  - and inward
  - toward the interior
  - toward the house
  lexicon: HALOT
  rationale: The form is directional ('toward the inside/interior'), and in this construction
    likely means David built from the Millo inward into the city. Rendering it 'inward'
    gives the probable spatial sense without overcommitting to a specific architectural
    reconstruction. A more literal 'toward the house' is possible formally from בית,
    but context favors 'interior' rather than a single building.
