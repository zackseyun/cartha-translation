id: 2SA.5.14
reference: 2 Samuel 5:14
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה שְׁמ֛וֹת הַ/יִּלֹּדִ֥ים ל֖/וֹ בִּ/ירוּשָׁלִָ֑ם שַׁמּ֣וּעַ וְ/שׁוֹבָ֔ב
    וְ/נָתָ֖ן וּ/שְׁלֹמֹֽה׃
translation:
  text: 'These are the names of those born to him in Jerusalem: Shammua, Shobab, Nathan,
    and Solomon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children born to him in Jerusalem.' The Hebrew participle literally
      means 'the ones born.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a list. 'These are' is
    natural modern English and preserves the presentational force; the initial 'and'
    is not required in English style.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: Construct plural of 'name' introducing the following list; 'the names'
    is the most direct rendering in English.
- source_word: הַיִּלֹּדִים
  chosen: those born
  alternatives:
  - the children born
  - the sons born
  - the ones born
  lexicon: HALOT
  rationale: Passive participle from ילד, literally 'the ones born.' 'Those born'
    is concise and accurate. 'Sons' would over-specify beyond the form here, though
    the context is a sons list; 'children born' is possible but less idiomatic with
    the following prepositional phrase.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition marks parentage in idiomatic Hebrew ('born to him').
    'To him' is the standard English equivalent in genealogical contexts.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative prepositional phrase indicating the place of
    birth.
- source_word: שַׁמּוּעַ
  chosen: Shammua
  alternatives:
  - Shammuah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Shammua' is a common English form for this name.
- source_word: שׁוֹבָב
  chosen: Shobab
  lexicon: HALOT
  rationale: Proper name transliterated directly.
- source_word: נָתָן
  chosen: Nathan
  lexicon: HALOT
  rationale: Proper name transliterated directly; standard English biblical form.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  alternatives:
  - Shelomoh
  lexicon: HALOT
  rationale: Proper name transliterated in its standard English biblical form. 'Solomon'
    is the established English representation of the Hebrew name.
