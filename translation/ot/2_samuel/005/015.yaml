id: 2SA.5.15
reference: 2 Samuel 5:15
source:
  edition: WLC
  text: וְ/יִבְחָ֥ר וֶ/אֱלִישׁ֖וּעַ וְ/נֶ֥פֶג וְ/יָפִֽיעַ׃
translation:
  text: Ibhar, Elishua, Nepheg, and Japhia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the conjunction ''and'' before each name: ''and Ibhar and
      Elishua and Nepheg and Japhia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְחָר
  chosen: Ibhar
  alternatives:
  - Yibhar
  rationale: Proper personal name in a genealogical/list context; transliterated rather
    than translated per project policy. English convention commonly drops the initial
    yod sound in some Hebrew name transliterations here, though 'Yibhar' is a plausible
    more phonetic alternative.
- source_word: אֱלִישׁוּעַ
  chosen: Elishua
  alternatives:
  - Elishuaʿ
  rationale: Proper personal name; transliterated by standard English convention.
    Final ayin is not represented in ordinary English spelling.
- source_word: נֶפֶג
  chosen: Nepheg
  rationale: Proper personal name in a list of David's sons; transliterated directly.
- source_word: יָפִיעַ
  chosen: Japhia
  alternatives:
  - Yaphia
  rationale: Proper personal name; transliterated. 'Japhia' follows common English
    convention for initial yod in this name, while 'Yaphia' is a more phonetic alternative.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the names in a simple series. In English
    name lists, repeating 'and' before every item would sound unnatural, so the conjunction
    is represented idiomatically with commas and a final 'and,' consistent with optimal
    equivalence.
