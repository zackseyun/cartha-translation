id: 2SA.15.5
reference: 2 Samuel 15:5
source:
  edition: WLC
  text: וְ/הָיָה֙ בִּ/קְרָב אִ֔ישׁ לְ/הִשְׁתַּחֲוֺ֖ת ל֑/וֹ וְ/שָׁלַ֧ח אֶת יָד֛/וֹ
    וְ/הֶחֱזִ֥יק ל֖/וֹ וְ/נָ֥שַׁק לֽ/וֹ־־׃
translation:
  text: And whenever a man came near to bow down to him, he would reach out his hand,
    take hold of him, and kiss him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pay homage to him.' The Hebrew verb can denote an act of respectful
      obeisance, not necessarily worship in the narrow religious sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever ... he would
  alternatives:
  - And it happened
  - And when
  lexicon: HALOT
  rationale: The waw + היה introduces a customary/repeated action in narrative context.
    English idiom is best conveyed with a habitual construction ('whenever ... he
    would') rather than a wooden 'and it happened.'
- source_word: בִּקְרָב
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: From קרב, indicating approach/proximity. 'Came near' is natural modern
    English and preserves the movement toward Absalom.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per gender-accurate policy, 'a man'
    is retained rather than neutralizing to 'someone,' while still functioning generically
    in context.
- source_word: לְהִשְׁתַּחֲוֺת לוֹ
  chosen: to bow down to him
  alternatives:
  - to pay homage to him
  - to prostrate himself before him
  lexicon: HALOT
  rationale: השתחוה commonly denotes bowing/prostration as an act of respect or homage.
    'Bow down to him' preserves the physical gesture without over-specifying full
    prostration.
- source_word: וְשָׁלַח אֶת יָדוֹ
  chosen: he would reach out his hand
  alternatives:
  - he stretched out his hand
  - he put out his hand
  lexicon: HALOT
  rationale: שׁלח with 'hand' is an idiom for extending the hand. 'Reach out his hand'
    is readable modern English and fits the habitual sense.
- source_word: וְהֶחֱזִיק לוֹ
  chosen: take hold of him
  alternatives:
  - seize him
  - grasp him
  lexicon: HALOT
  rationale: החזיק here means to take hold of or grasp. 'Take hold of him' fits the
    social gesture and avoids the harsher connotation of 'seize.'
- source_word: וְנָשַׁק לוֹ
  chosen: and kiss him
  alternatives:
  - and give him a kiss
  lexicon: HALOT
  rationale: נשק is the straightforward verb 'kiss.' In this political-social context
    it denotes a greeting/gesture of favor, but the simple verb should stand in the
    main text.
