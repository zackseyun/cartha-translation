id: 2SA.15.37
reference: 2 Samuel 15:37
source:
  edition: WLC
  text: וַ/יָּבֹ֥א חוּשַׁ֛י רֵעֶ֥ה דָוִ֖ד הָ/עִ֑יר וְ/אַבְשָׁלֹ֔ם יָבֹ֖א יְרוּשָׁלִָֽם׃
translation:
  text: So Hushai, David’s friend, came into the city, as Absalom was entering Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and Absalom entered Jerusalem.' The Hebrew conjunction can be read as
      a simple sequential 'and,' and the verb may be rendered as a simple past.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came into
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'enter.' With 'the city' as object,
    English idiom is best represented by 'came into the city,' preserving the motion
    toward the city without overformal stiffness.
- source_word: חוּשַׁי
  chosen: Hushai
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: רֵעֶה דָוִד
  chosen: David’s friend
  alternatives:
  - David’s companion
  - David’s adviser
  lexicon: HALOT
  rationale: רֵעַ/רֵעֶה denotes a friend, companion, or associate. 'David’s friend'
    is the most direct rendering and matches the narrative role already established,
    without importing the more specific idea of official counsel unless context explicitly
    states it.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun rendered straightforwardly as 'the city.' In context this
    refers to Jerusalem, but the Hebrew uses the common noun here, so the translation
    preserves that wording rather than replacing it with the proper name.
- source_word: וְאַבְשָׁלֹם
  chosen: as Absalom
  alternatives:
  - and Absalom
  rationale: The conjunction ו can be rendered simply 'and,' but in this context the
    clause juxtaposes Hushai’s arrival with Absalom’s arrival in a near-simultaneous
    narrative scene. 'As Absalom' brings out the temporal overlap naturally in English
    while remaining faithful to the narrative connection.
- source_word: יָבֹא
  chosen: was entering
  alternatives:
  - entered
  - came into
  lexicon: HALOT
  rationale: Although formally an imperfect, in context after the preceding wayyiqtol
    it functions in a concurrent/backgrounded sense. 'Was entering' captures the unfolding
    action and the overlap with Hushai’s arrival better than a simple past.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
