id: 2SA.15.4
reference: 2 Samuel 15:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְשָׁל֔וֹם מִי יְשִׂמֵ֥/נִי שֹׁפֵ֖ט בָּ/אָ֑רֶץ וְ/עָלַ֗/י יָב֥וֹא
    כָּל אִ֛ישׁ אֲשֶֽׁר יִהְיֶה לּ/וֹ רִ֥יב וּ/מִשְׁפָּ֖ט וְ/הִצְדַּקְתִּֽי/ו־־־־־׃
translation:
  text: Then Absalom would say, “If only they would appoint me judge in the land!
    Then every man who has a dispute or a case could come to me, and I would give
    him justice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Who will appoint me judge in the land?” The Hebrew
      wording is a rhetorical wish, not merely a request for information.
    reason: lexical_alternative
  - marker: b
    text: “Every man” renders a grammatically masculine singular expression used generically
      for any person with a legal matter.
    reason: lexical_alternative
  - marker: c
    text: Or “I would vindicate him” / “I would declare him right.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... would say
  alternatives:
  - And he said
  - And Absalom said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר narrates repeated past speech in context;
    English 'would say' captures the iterative sense better than a simple preterite
    here.
- source_word: מִי יְשִׂמֵנִי
  chosen: If only they would appoint me
  alternatives:
  - Who will appoint me?
  - Who would make me?
  lexicon: HALOT
  rationale: Literally 'Who will set/make me?' but in this idiom the force is wishful
    rather than an actual information-seeking question. English 'If only they would
    appoint me' conveys the rhetorical longing naturally.
- source_word: שֹׁפֵט
  chosen: judge
  alternatives:
  - ruler
  - magistrate
  lexicon: HALOT
  rationale: The participle from שפט denotes one who adjudicates legal matters. 'Judge'
    best fits the legal context of disputes and cases.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land
  - in the country
  lexicon: HALOT
  rationale: '''Land'' is the straightforward rendering and preserves the broader
    territorial sense without over-specifying ''country.'''
- source_word: וְעָלַי יָבוֹא
  chosen: could come to me
  alternatives:
  - would come to me
  - might come before me
  lexicon: HALOT
  rationale: The sequence expresses the result Absalom imagines if he were appointed
    judge. 'Could come to me' communicates open access under that hypothetical condition.
- source_word: כָּל אִישׁ
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Per translation philosophy, a gender-accurate rendering is preferred; here 'every
    man' reflects the source while functioning generically.
- source_word: רִיב
  chosen: dispute
  alternatives:
  - complaint
  - contention
  - lawsuit
  lexicon: HALOT
  rationale: ריב commonly denotes a quarrel, dispute, or legal contention. 'Dispute'
    is broad enough to fit the paired legal language.
- source_word: וּמִשְׁפָּט
  chosen: a case
  alternatives:
  - judgment
  - justice
  - legal claim
  lexicon: HALOT
  rationale: Alongside ריב, משפט here likely refers to a legal case or matter requiring
    adjudication rather than the abstract concept of justice. 'A case' reads naturally
    in English legal context.
- source_word: וְהִצְדַּקְתִּיו
  chosen: I would give him justice
  alternatives:
  - I would vindicate him
  - I would declare him right
  - I would justify him
  lexicon: HALOT
  rationale: The Hiphil of צדק can mean to declare righteous, vindicate, or give justice.
    In this judicial setting, 'give him justice' communicates the legal-administrative
    sense clearly for modern readers, while preserving the idea of favorable adjudication.
