id: 2SA.15.29
reference: 2 Samuel 15:29
source:
  edition: WLC
  text: וַ/יָּ֨שֶׁב צָד֧וֹק וְ/אֶבְיָתָ֛ר אֶת אֲר֥וֹן הָ/אֱלֹהִ֖ים יְרוּשָׁלִָ֑ם וַ/יֵּשְׁב֖וּ
    שָֽׁם־׃
translation:
  text: So Zadok and Abiathar returned the ark of God to Jerusalem, and they stayed
    there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: returned
  alternatives:
  - brought back
  - took back
  lexicon: HALOT
  rationale: From שוב in the Hiphil/causative sense, here describing the action of
    taking the ark back to Jerusalem. 'Returned' is concise, natural English and fits
    the transitive sense with the ark as object.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: וְאֶבְיָתָר
  chosen: and Abiathar
  rationale: Personal name transliterated by standard English convention; conjunction
    retained.
- source_word: אֶת אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the covenant of God
  lexicon: HALOT
  rationale: The Hebrew text here reads simply 'the ark of God,' not the fuller covenant
    expression found elsewhere. The translation preserves the exact wording without
    importing additional terminology.
- source_word: יְרוּשָׁלָם
  chosen: to Jerusalem
  alternatives:
  - Jerusalem
  rationale: Rendered with English preposition 'to' to express the directional sense
    implied by the verb plus place name in context.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: and they stayed there
  alternatives:
  - and they remained there
  - and they dwelt there
  lexicon: HALOT
  rationale: ישב commonly means 'sit,' 'dwell,' or 'remain.' In this narrative context,
    'stayed there' is natural modern English and conveys continued presence without
    sounding overly formal.
