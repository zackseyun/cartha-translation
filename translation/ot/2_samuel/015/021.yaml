id: 2SA.15.21
reference: 2 Samuel 15:21
source:
  edition: WLC
  text: וַ/יַּ֧עַן אִתַּ֛י אֶת הַ/מֶּ֖לֶךְ וַ/יֹּאמַ֑ר חַי יְהוָ֗ה וְ/חֵי֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ כִּ֠י אִם בִּ/מְק֞וֹם אֲשֶׁ֥ר יִֽהְיֶה שָּׁ֣ם אֲדֹנִ֣/י הַ/מֶּ֗לֶךְ אִם לְ/מָ֨וֶת֙ אִם לְ/חַיִּ֔ים כִּי שָׁ֖ם יִהְיֶ֥ה עַבְדֶּֽ/ךָ־־־־׀־־־׃
translation:
  text: Then Ittai answered the king and said, “As Yahweh lives, and as my lord the king lives, surely in whatever place my lord the king may be, whether for death or for life, there your servant will be.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: ''As the LORD lives, and as my lord the king lives.'''
    reason: cultural_note
  - marker: b
    text: Or 'wherever my lord the king may be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying to speech; 'answered' preserves the formal dialogue structure.
- source_word: אִתַּי
  chosen: Ittai
  rationale: Personal name transliterated per project policy.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite royal title in narrative context; retained literally.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a Hebrew oath formula. 'As the LORD lives' is idiomatic English that preserves the solemn oath force. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: וְחֵי אֲדֹנִי הַמֶּלֶךְ
  chosen: and as my lord the king lives
  alternatives:
  - and by the life of my lord the king
  - and as the king my lord lives
  lexicon: HALOT
  rationale: Parallel oath formula coordinated with the first. 'my lord the king' reflects אֲדֹנִי plus appositional title.
- source_word: כִּי אִם
  chosen: surely
  alternatives:
  - indeed
  - certainly
  lexicon: HALOT
  rationale: In oath contexts this combination functions asseveratively rather than conditionally; 'surely' captures the emphatic force in natural English.
- source_word: בִּמְקוֹם אֲשֶׁר יִהְיֶה שָּׁם
  chosen: in whatever place ... may be
  alternatives:
  - wherever ... is
  - in the place where ... will be
  lexicon: HALOT
  rationale: The phrase expresses open-ended location. 'Whatever place ... may be' preserves the formal structure while remaining readable.
- source_word: אִם לְמָוֶת אִם לְחַיִּים
  chosen: whether for death or for life
  alternatives:
  - whether in death or in life
  - whether it means death or life
  lexicon: HALOT
  rationale: The paired prepositional phrases express total commitment regardless of outcome. 'For death or for life' stays close to the Hebrew while sounding idiomatic.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it functions as a deferential self-designation before the king rather than emphasizing bonded status; therefore 'servant' best fits the discourse context.
