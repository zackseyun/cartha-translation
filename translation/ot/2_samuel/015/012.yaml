id: 2SA.15.12
reference: 2 Samuel 15:12
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח אַ֠בְשָׁלוֹם אֶת אֲחִיתֹ֨פֶל הַ/גִּֽילֹנִ֜י יוֹעֵ֣ץ דָּוִ֗ד
    מֵֽ/עִיר/וֹ֙ מִ/גִּלֹ֔ה בְּ/זָבְח֖/וֹ אֶת הַ/זְּבָחִ֑ים וַ/יְהִ֤י הַ/קֶּ֨שֶׁר֙
    אַמִּ֔ץ וְ/הָ/עָ֛ם הוֹלֵ֥ךְ וָ/רָ֖ב אֶת אַבְשָׁלֽוֹם־־־׃
translation:
  text: And Absalom sent for Ahithophel the Gilonite, David’s counselor, from his
    city, from Giloh, while he was offering the sacrifices. And the conspiracy grew
    strong, and the people kept increasing with Absalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent Ahithophel'; the Hebrew verb can be rendered more literally, but
      in context it likely means Absalom summoned him to join the revolt.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plot grew strong.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the people were going and becoming many with Absalom,' an idiom
      for steadily increasing support.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent for
  alternatives:
  - sent
  - sent and summoned
  lexicon: HALOT
  rationale: In context with a direct object person (Ahithophel) and the larger narrative
    of recruiting support, English 'sent for' best conveys summoning a person rather
    than merely dispatching him somewhere.
- source_word: הַגִּלֹנִי
  chosen: the Gilonite
  alternatives:
  - from Giloh
  lexicon: HALOT
  rationale: A gentilicial designation derived from Giloh; 'the Gilonite' is the natural
    English rendering and preserves the appositional identification.
- source_word: יוֹעֵץ דָּוִד
  chosen: David’s counselor
  alternatives:
  - counselor of David
  - advisor to David
  lexicon: HALOT
  rationale: Construct relationship indicates Ahithophel’s role relative to David.
    'Counselor' is idiomatic and preserves the political advisory sense.
- source_word: מֵעִירוֹ מִגִּלֹה
  chosen: from his city, from Giloh
  alternatives:
  - from his city Giloh
  - from Giloh, his city
  lexicon: HALOT
  rationale: The Hebrew gives both the general noun and the place name. Rendering
    both preserves the source texture and avoids collapsing the apposition.
- source_word: בְּזָבְחוֹ אֶת־הַזְּבָחִים
  chosen: while he was offering the sacrifices
  alternatives:
  - as he offered the sacrifices
  - during his sacrificing of the sacrifices
  lexicon: HALOT
  rationale: The preposition with infinitive construct marks contemporaneous action.
    'Offering the sacrifices' is idiomatic English and preserves the cultic sense
    of זבח/זבחים without wooden repetition.
- source_word: הַקֶּשֶׁר
  chosen: the conspiracy
  alternatives:
  - the plot
  - the treason
  lexicon: HALOT
  rationale: In the context of Absalom’s organized revolt, 'conspiracy' best captures
    a coordinated secret political uprising. 'Plot' is possible but slightly weaker.
- source_word: אַמִּץ
  chosen: grew strong
  alternatives:
  - was strong
  - became strong
  lexicon: HALOT
  rationale: Following ויהי, the adjective describes the developing state of the conspiracy.
    'Grew strong' communicates the narrative progression more clearly than a static
    'was strong.'
- source_word: הוֹלֵךְ וָרָב
  chosen: kept increasing
  alternatives:
  - went on and increased
  - continued to multiply
  - was going and becoming many
  lexicon: HALOT
  rationale: This Hebrew verbal-adjectival sequence expresses ongoing increase. 'Kept
    increasing' is concise, natural English that preserves the durative force.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  - the following
  lexicon: HALOT
  rationale: A collective term for those joining Absalom. 'The people' is the most
    direct and contextually sufficient rendering.
- source_word: אֶת אַבְשָׁלוֹם
  chosen: with Absalom
  alternatives:
  - to Absalom
  - on Absalom’s side
  lexicon: HALOT
  rationale: Here אֶת functions in the sense of association rather than direct object
    marking. 'With Absalom' naturally conveys alignment with him while staying close
    to the Hebrew.
