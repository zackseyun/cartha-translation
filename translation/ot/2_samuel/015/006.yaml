theological_decisions:
- issue: Gendered expression in אַנְשֵׁי יִשְׂרָאֵל
  chosen_reading: the men of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: The Hebrew uses a masculine noun meaning 'men.' Although it may function
    representatively for the broader populace, the translation preserves the source's
    gendered form in the main text per the doctrine's gender-accurate principle rather
    than replacing it with a neutral collective.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
