id: 2SA.15.6
reference: 2 Samuel 15:6
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ אַבְשָׁל֜וֹם כַּ/דָּבָ֤ר הַ/זֶּה֙ לְ/כָל יִשְׂרָאֵ֔ל אֲשֶׁר יָבֹ֥אוּ
    לַ/מִּשְׁפָּ֖ט אֶל הַ/מֶּ֑לֶךְ וַ/יְגַנֵּב֙ אַבְשָׁל֔וֹם אֶת לֵ֖ב אַנְשֵׁ֥י יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: Absalom did this to all Israel who came to the king for judgment, and Absalom
    stole the hearts of the men of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'won over the hearts of the men of Israel.' The Hebrew literally says
      'stole the heart,' preserving the image of winning loyalty by stealth or manipulation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - treated
  lexicon: HALOT
  rationale: The verb עשה here refers back to Absalom's repeated conduct described
    in the preceding verse, so simple 'did' best preserves the Hebrew idiom 'did according
    to this thing' without overinterpreting it.
- source_word: כַּדָּבָר הַזֶּה
  chosen: this
  alternatives:
  - in this way
  - according to this practice
  lexicon: HALOT
  rationale: The phrase literally means 'according to this thing/matter.' In English,
    'did this' is the most natural concise rendering, while still pointing back to
    his established pattern of behavior.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - for all Israel
  - with all Israel
  lexicon: HALOT
  rationale: The preposition לְ with 'all Israel' is well represented by 'to' in this
    context of interpersonal action directed toward the people.
- source_word: אֲשֶׁר יָבֹאוּ
  chosen: who came
  alternatives:
  - who would come
  - who were coming
  lexicon: HALOT
  rationale: The imperfect here describes customary action in past narrative. English
    simple past 'came' communicates the repeated past situation naturally.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for a legal decision
  - for adjudication
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to a legal hearing or judicial decision. 'For judgment'
    is concise and sufficiently formal, while preserving the judicial sense better
    than the broader 'justice.'
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: The phrase indicates approach to the king as judicial authority. 'To
    the king' is the most direct rendering; 'before the king' is possible but slightly
    more interpretive.
- source_word: וַיְגַנֵּב
  chosen: stole
  alternatives:
  - won over
  - stole away
  - deceived and won
  lexicon: HALOT
  rationale: The verb גנב literally means 'steal.' In this idiom with 'heart,' it
    conveys winning people's loyalty by stealth or manipulation. 'Stole' preserves
    the metaphor and rhetorical force of the Hebrew better than flattening it to 'won
    over.'
- source_word: אֶת לֵב
  chosen: the hearts
  alternatives:
  - the heart
  lexicon: HALOT
  rationale: Hebrew has singular 'heart' as a collective after a plural genitive,
    but idiomatic English prefers 'the hearts' when referring distributively to many
    people.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of.' In keeping with the project's gender-accurate
    principle, the masculine form is retained rather than neutralized to 'people,'
    unless context clearly demands a generic rendering.
