id: 2SA.15.17
reference: 2 Samuel 15:17
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א הַ/מֶּ֛לֶךְ וְ/כָל הָ/עָ֖ם בְּ/רַגְלָ֑י/ו וַ/יַּעַמְד֖וּ בֵּ֥ית
    הַ/מֶּרְחָֽק־׃
translation:
  text: The king went out, and all the people with him on foot, and they halted at
    the last house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly a place-name: ''Beth-merhak.'' The Hebrew phrase can be read
      as ''house of distance/remoteness,'' but many understand it descriptively as
      ''the last house.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - left
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא commonly denotes going out/departing. 'Went out'
    is the most direct narrative rendering in modern English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to David in context; standard rendering is straightforward.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the troops
  - and all the populace
  lexicon: HALOT
  rationale: עָם here refers to the company accompanying the king. 'People' preserves
    the broad sense without narrowing it to soldiers only.
- source_word: בְּרַגְלָיו
  chosen: with him on foot
  alternatives:
  - at his feet
  - following him
  - on foot
  lexicon: HALOT
  rationale: Literally 'at/by his feet,' but in this idiom it indicates accompaniment
    in his train, likely on foot. Rendering 'with him on foot' captures both the relational
    and physical sense in readable English.
- source_word: וַיַּעַמְדוּ
  chosen: they halted
  alternatives:
  - they stood
  - they stopped
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in travel narrative it often means stopping
    or taking one's stand. 'Halted' fits the movement context naturally.
- source_word: בֵּית הַמֶּרְחָק
  chosen: the last house
  alternatives:
  - the distant house
  - Beth-merhak
  lexicon: HALOT
  rationale: The phrase is most naturally understood appellatively as 'the farthest/last
    house' rather than as a place-name. 'Last house' communicates the likely sense
    of the outermost house at the edge of the city. The possible place-name reading
    is preserved in a footnote.
