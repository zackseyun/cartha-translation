theological_decisions:
- issue: Political symbolism of Absalom's entourage
  chosen_reading: Render descriptively without making the implied royal pretension
    explicit in the main text.
  alternative_readings:
  - Absalom set up a royal-style procession for himself
  rationale: The verse implies self-exaltation and kingly ambition through the chariot,
    horses, and runners, but the Hebrew text itself simply describes the action. The
    translation should preserve the implication without importing interpretation into
    the wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; optimal equivalence.'
