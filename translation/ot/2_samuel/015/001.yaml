id: 2SA.15.1
reference: 2 Samuel 15:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מֵ/אַ֣חֲרֵי כֵ֔ן וַ/יַּ֤עַשׂ ל/וֹ֙ אַבְשָׁל֔וֹם מֶרְכָּבָ֖ה וְ/סֻסִ֑ים
    וַ/חֲמִשִּׁ֥ים אִ֖ישׁ רָצִ֥ים לְ/פָנָֽי/ו׃
translation:
  text: After this, Absalom acquired for himself a chariot and horses, and fifty men
    running before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made for himself' or 'provided himself with.' The Hebrew verb can denote
      making or procuring.
    reason: lexical_alternative
  - marker: b
    text: The fifty men running before him form a royal-style escort, signaling Absalom's
      public self-exaltation.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי מֵאַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally means 'and it was after this,'
    but idiomatic modern English is 'After this' or 'Afterward.' 'After this' preserves
    the temporal linkage without woodenly reproducing the formula.
- source_word: וַיַּעַשׂ לוֹ
  chosen: acquired for himself
  alternatives:
  - made for himself
  - provided himself with
  lexicon: HALOT
  rationale: עשה with לּוֹ can mean 'made/procured for himself.' Since a chariot,
    horses, and runners are items one ordinarily obtains or equips rather than personally
    manufactures, 'acquired for himself' best captures the sense in natural English
    while preserving the reflexive nuance.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מֶרְכָּבָה
  chosen: a chariot
  alternatives:
  - a chariot team
  - a royal chariot
  lexicon: HALOT
  rationale: The noun straightforwardly denotes a chariot. 'Royal chariot' would over-interpret
    the political symbolism, which is better left implicit in context.
- source_word: וְסֻסִים
  chosen: and horses
  alternatives:
  - with horses
  lexicon: HALOT
  rationale: A simple coordinate rendering matches the Hebrew conjunction and keeps
    the list structure intact.
- source_word: וַחֲמִשִּׁים אִישׁ
  chosen: and fifty men
  alternatives:
  - and fifty men as attendants
  lexicon: HALOT
  rationale: אִישׁ after a numeral is a standard counting expression meaning 'men/persons.'
    'Men' is gender-accurate and contextually appropriate, since these are male runners
    in a royal-style entourage.
- source_word: רָצִים
  chosen: running
  alternatives:
  - runners
  - who ran
  lexicon: HALOT
  rationale: The participle describes their function/action. Rendering it as 'running'
    after 'fifty men' yields smooth English while preserving the vivid image. 'Runners'
    is also possible but slightly more interpretive as a title.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - in front of him
  lexicon: HALOT
  rationale: The phrase denotes movement in front of Absalom as part of his public
    display. 'Before him' is concise and idiomatic in this context.
