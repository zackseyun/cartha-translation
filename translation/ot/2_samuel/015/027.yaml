id: 2SA.15.27
reference: 2 Samuel 15:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל צָד֣וֹק הַ/כֹּהֵ֔ן הֲ/רוֹאֶ֣ה אַתָּ֔ה שֻׁ֥בָ/ה
    הָ/עִ֖יר בְּ/שָׁל֑וֹם וַ/אֲחִימַ֨עַץ בִּנְ/ךָ֜ וִ/יהוֹנָתָ֧ן בֶּן אֶבְיָתָ֛ר שְׁנֵ֥י
    בְנֵי/כֶ֖ם אִתְּ/כֶֽם־־׃
translation:
  text: Then the king said to Zadok the priest, “Are you a seer? Return to the city
    in peace, with Ahimaaz your son and Jonathan son of Abiathar, your two sons with
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “You see, do you not?” The Hebrew הראה may be taken as a reference
      to Zadok as a 'seer' or as a question about seeing/perceiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/רוֹאֶה
  chosen: Are you a seer?
  alternatives:
  - Do you see?
  - the seer
  lexicon: HALOT
  rationale: The form can be understood as the noun/participle 'seer' used vocatively
    or interrogatively. In context David is addressing Zadok and likely asking/identifying
    him as one who can observe and report, not merely asking about physical sight.
    'Are you a seer?' preserves the Hebrew ambiguity better than flattening it to
    simple perception.
- source_word: שֻׁבָ/ה
  chosen: Return
  alternatives:
  - Go back
  lexicon: HALOT
  rationale: Imperative of שוב with directional he. 'Return' is a natural and sufficiently
    formal rendering in context.
- source_word: הָ/עִיר
  chosen: the city
  alternatives:
  - to the city
  lexicon: HALOT
  rationale: With the verb of motion, English idiom supplies 'to' implicitly or explicitly.
    'Return to the city' communicates the destination clearly.
- source_word: בְּ/שָׁל֑וֹם
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: HALOT
  rationale: Shalom here most naturally conveys peaceful/safe return. 'In peace' keeps
    the lexical connection to shalom and remains idiomatic.
- source_word: וַ/אֲחִימַ֨עַץ בִּנְ/ךָ֜ וִ/יהוֹנָתָ֧ן בֶּן אֶבְיָתָ֛ר
  chosen: with Ahimaaz your son and Jonathan son of Abiathar
  alternatives:
  - and Ahimaaz your son, and Jonathan the son of Abiathar
  lexicon: HALOT
  rationale: The names are transliterated. 'Son of Abiathar' is retained rather than
    replacing with a pronoun so the parallel identification remains explicit.
- source_word: שְׁנֵ֥י בְנֵי/כֶ֖ם
  chosen: your two sons
  alternatives:
  - the two of your sons
  - both your sons
  lexicon: HALOT
  rationale: This appositional phrase summarizes Ahimaaz and Jonathan together. 'Your
    two sons' is the most natural modern English rendering.
- source_word: אִתְּ/כֶֽם
  chosen: with you
  alternatives:
  - accompanying you
  lexicon: HALOT
  rationale: Simple accompaniment is intended; 'with you' is direct and idiomatic.
- source_word: וַ/יֹּאמֶר הַ/מֶּלֶךְ
  chosen: Then the king said
  alternatives:
  - And the king said
  lexicon: HALOT
  rationale: Narrative waw often advances the storyline. 'Then' gives natural English
    narrative flow without overtranslating.
