id: 2SA.15.8
reference: 2 Samuel 15:8
source:
  edition: WLC
  text: כִּי נֵ֨דֶר֙ נָדַ֣ר עַבְדְּ/ךָ֔ בְּ/שִׁבְתִּ֥/י בִ/גְשׁ֛וּר בַּ/אֲרָ֖ם לֵ/אמֹ֑ר
    אִם ישיב יְשִׁיבֵ֤/נִי יְהוָה֙ יְר֣וּשָׁלִַ֔ם וְ/עָבַדְתִּ֖י אֶת יְהוָֽה־־־׃
translation:
  text: For your servant made a vow while I was living in Geshur in Aram, saying,
    ‘If the LORD indeed brings me back to Jerusalem, then I will serve the LORD.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For your servant vowed a vow.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'if the LORD indeed brings me back' uses an emphatic
      repetition of the verb 'bring back/return.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will worship the LORD.' The Hebrew verb can denote service rendered
      to God in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר נָדַר
  chosen: made a vow
  alternatives:
  - vowed a vow
  - solemnly vowed
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('vow he vowed') for emphasis. English
    normally expresses this idiom as 'made a vow.' 'Vowed a vow' is more formally
    transparent but awkward in modern English.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In direct address to the king, this is a conventional deferential self-reference.
    'Your servant' best reflects the courtly register without importing the harsher
    social sense of chattel slavery, which is not foregrounded here.
- source_word: בְּשִׁבְתִּי
  chosen: while I was living
  alternatives:
  - when I dwelt
  - in my dwelling
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks the time of the vow.
    'While I was living' is natural modern English and preserves the durative sense.
- source_word: בִגְשׁוּר בַּאֲרָם
  chosen: in Geshur in Aram
  alternatives:
  - in Geshur of Aram
  - in Aramean Geshur
  lexicon: HALOT
  rationale: The phrase locates Geshur within the region of Aram. 'In Geshur in Aram'
    is straightforward and avoids over-interpreting the relationship beyond the Hebrew
    wording.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to quoted speech or content of the vow.
- source_word: אִם ישיב יְשִׁיבֵנִי
  chosen: if the LORD indeed brings me back
  alternatives:
  - if the LORD surely brings me back
  - if the LORD restores me
  lexicon: HALOT
  rationale: The doubled form of שוב in Hiphil intensifies the condition. 'Indeed
    brings me back' captures the emphatic force without sounding wooden. 'Restores
    me' is possible but less explicit about return to place, which is clarified by
    'to Jerusalem.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְעָבַדְתִּי אֶת יְהוָה
  chosen: then I will serve the LORD
  alternatives:
  - then I will worship the LORD
  - and I will serve the LORD
  lexicon: HALOT
  rationale: עבד with God can denote worshipful service. 'Serve the LORD' preserves
    the broader covenantal sense and remains close to the Hebrew. 'Then' makes explicit
    the apodosis implied by the conditional structure.
