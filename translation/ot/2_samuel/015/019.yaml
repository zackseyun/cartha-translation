id: 2SA.15.19
reference: 2 Samuel 15:19
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל אִתַּ֣י הַ/גִּתִּ֔י לָ֧/מָּה תֵלֵ֛ךְ גַּם אַתָּ֖ה
    אִתָּ֑/נוּ שׁ֣וּב וְ/שֵׁ֤ב עִם הַ/מֶּ֨לֶךְ֙ כִּֽי נָכְרִ֣י אַ֔תָּה וְ/גַם גֹּלֶ֥ה
    אַתָּ֖ה לִ/מְקוֹמֶֽ/ךָ־־־־־׃
translation:
  text: Then the king said to Ittai the Gittite, “Why are you also going with us?
    Go back and stay with the king, for you are a foreigner and also an exile to your
    own place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why will you also go with us?'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'stay with the king' may refer to remaining under the reigning
      royal authority in Jerusalem; the Hebrew does not explicitly name the referent.
    reason: alternative_reading
  - marker: c
    text: Or 'and also an exile to your place.' The Hebrew wording is compressed and
      may emphasize Ittai's displaced status and his connection to his own homeland/place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the title/noun. In context this is David,
    but the Hebrew uses the title rather than the personal name.
- source_word: אִתַּי הַגִּתִּי
  chosen: Ittai the Gittite
  lexicon: HALOT
  rationale: Personal name is transliterated; the gentilic is translated by standard
    English form 'Gittite,' indicating origin from Gath.
- source_word: לָמָּה תֵלֵךְ גַּם אַתָּה אִתָּנוּ
  chosen: Why are you also going with us?
  alternatives:
  - Why will you also go with us?
  - Why should you too go with us?
  lexicon: HALOT
  rationale: The imperfect can be rendered with present-progressive force in direct
    speech. 'Also' preserves גַּם, and the question is kept direct and personal.
- source_word: שׁוּב
  chosen: Go back
  alternatives:
  - Return
  lexicon: HALOT
  rationale: '''Return'' is more formal, but ''Go back'' is more idiomatic modern
    English while preserving the imperative sense.'
- source_word: וְשֵׁב
  chosen: stay
  alternatives:
  - remain
  - sit/dwell
  lexicon: HALOT
  rationale: From ישׁב, here in context meaning to remain/reside rather than literally
    'sit.' 'Stay' is concise and natural in English.
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  lexicon: HALOT
  rationale: Formally preserved. Although David is speaking, 'the king' likely refers
    to the reigning claimant in Jerusalem/royal authority in a general sense; the
    Hebrew repeats the title, so the translation retains it rather than resolving
    the referent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the elevated but readable
    narrative style.
- source_word: נָכְרִי
  chosen: a foreigner
  alternatives:
  - an outsider
  - a stranger
  lexicon: HALOT
  rationale: '''Foreigner'' best captures non-native status without the potentially
    misleading interpersonal sense of ''stranger.'''
- source_word: וְגַם גֹּלֶה
  chosen: and also an exile
  alternatives:
  - and even a fugitive
  - and also one banished
  lexicon: HALOT
  rationale: גֹּלֶה denotes one in exile/displacement. 'Exile' is the clearest nominal
    rendering here and pairs naturally with 'foreigner.'
- source_word: לִמְקוֹמֶךָ
  chosen: to your own place
  alternatives:
  - to your place
  - to your homeland
  lexicon: HALOT
  rationale: The suffix marks possession. 'Own place' makes explicit the personal
    reference and fits the sense of returning to one's proper/home location without
    over-specifying 'homeland.'
