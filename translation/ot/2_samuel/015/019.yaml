theological_decisions:
- issue: Referent of 'the king' in 'stay with the king'
  chosen_reading: Retain the literal phrase 'with the king' without identifying the
    referent in the main text.
  alternative_readings:
  - with King Absalom
  - with the king in Jerusalem
  - with me, the king
  rationale: The Hebrew text leaves the referent implicit and uses the title rather
    than a name. Preserving the ambiguity avoids importing an interpretive resolution
    the text itself does not state.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
