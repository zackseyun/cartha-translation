id: 2SA.15.28
reference: 2 Samuel 15:28
source:
  edition: WLC
  text: רְאוּ֙ אָנֹכִ֣י מִתְמַהְמֵ֔הַּ ב/עברות הַ/מִּדְבָּ֑ר עַ֣ד בּ֥וֹא דָבָ֛ר מֵ/עִמָּ/כֶ֖ם
    לְ/הַגִּ֥יד לִֽ/י׃
translation:
  text: See, I will wait at the fords of the wilderness until word comes from you
    to inform me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the crossings of the wilderness.”
    reason: lexical_alternative
  - marker: b
    text: Or “I am lingering” / “I will tarry.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Take note
  lexicon: HALOT
  rationale: Imperative plural of ראה used as an attention-getter. 'See' preserves
    the directness and idiomatic force without over-paraphrasing.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis. English can convey this naturally
    without an overly heavy reflexive; the emphasis is sufficiently carried by word
    order and context.
- source_word: מִתְמַהְמֵהַּ
  chosen: will wait
  alternatives:
  - am delaying
  - will linger
  - will tarry
  lexicon: HALOT
  rationale: The hitpael participle of מהה conveys lingering or delaying. In context
    David is intentionally remaining in place pending news, so 'will wait' best captures
    the functional sense in natural English.
- source_word: בְּעַבְרוֹת
  chosen: at the fords
  alternatives:
  - at the crossings
  - in the crossings
  lexicon: HALOT
  rationale: From עברה in the plural, referring to crossing places, especially river
    fords. 'Fords' is the most precise contextual rendering in this flight narrative.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  - the steppe
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/open country rather than a sandy
    desert specifically. 'Wilderness' is the standard and contextually appropriate
    rendering.
- source_word: עַד בּוֹא דָבָר
  chosen: until word comes
  alternatives:
  - until a message comes
  - until news comes
  lexicon: HALOT
  rationale: דָבָר here means a report or message rather than merely 'word' in the
    abstract, but 'word comes' is idiomatic English and preserves the Hebrew succinctness.
- source_word: מֵעִמָּכֶם
  chosen: from you
  alternatives:
  - from with you
  - from your presence
  lexicon: HALOT
  rationale: The prepositional expression means 'from you' in the sense of originating
    with them. A more literal rendering would be awkward in English.
- source_word: לְהַגִּיד לִי
  chosen: to inform me
  alternatives:
  - to tell me
  - to report to me
  lexicon: HALOT
  rationale: Hiphil infinitive of נגד means to make known or report. 'Inform me' fits
    the messenger context and reads smoothly in modern English.
