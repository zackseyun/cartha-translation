id: 2SA.15.11
reference: 2 Samuel 15:11
source:
  edition: WLC
  text: וְ/אֶת אַבְשָׁל֗וֹם הָלְכ֞וּ מָאתַ֤יִם אִישׁ֙ מִ/יר֣וּשָׁלִַ֔ם קְרֻאִ֖ים וְ/הֹלְכִ֣ים
    לְ/תֻמָּ֑/ם וְ/לֹ֥א יָדְע֖וּ כָּל דָּבָֽר־־׃
translation:
  text: Two hundred men from Jerusalem went with Absalom, invited guests, and they
    went innocently, not knowing anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their innocence' or 'with integrity'; the Hebrew expression suggests
      they went unsuspectingly, unaware of Absalom's plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלְכוּ
  chosen: went with
  alternatives:
  - went
  - accompanied
  lexicon: HALOT
  rationale: הלך means 'go/walk.' With אֶת־אַבְשָׁלוֹם, the sense is accompaniment,
    so 'went with' makes the relationship explicit in natural English without overtranslating.
- source_word: מָאתַיִם אִישׁ
  chosen: Two hundred men
  alternatives:
  - two hundred people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular collective 'man' after the
    number, a standard way to count males. 'Men' is gender-accurate and fits the likely
    referent.
- source_word: מִירוּשָׁלַםִ
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'From Jerusalem' is the most
    straightforward rendering.
- source_word: קְרֻאִים
  chosen: invited guests
  alternatives:
  - invited
  - those who had been invited
  - summoned
  lexicon: HALOT
  rationale: Passive participle of קרא, 'called/invited.' In this banquet/conspiracy
    context, 'invited guests' captures both the passive sense and the social setting
    more idiomatically than bare 'invited.'
- source_word: וְהֹלְכִים
  chosen: and they went
  alternatives:
  - going
  - as they went
  lexicon: HALOT
  rationale: The participle continues the narrative description. Rendering it with
    a finite verb in English produces natural narrative flow while preserving the
    sequence.
- source_word: לְתֻמָּם
  chosen: innocently
  alternatives:
  - in their innocence
  - in simplicity
  - with integrity
  lexicon: HALOT
  rationale: From תֹּם/תֻּם, conveying innocence, integrity, or simplicity. Here the
    following clause 'they did not know anything' favors the sense of unsuspecting
    innocence rather than moral integrity alone. 'Innocently' is concise and contextually
    clear.
- source_word: וְלֹא יָדְעוּ כָּל דָּבָר
  chosen: not knowing anything
  alternatives:
  - and they did not know anything
  - and they knew nothing at all
  - and they did not know the matter
  lexicon: HALOT
  rationale: 'The clause explains their innocence: they were unaware of Absalom''s
    plot. ''Not knowing anything'' reads smoothly after ''they went innocently.''
    ''Anything'' is a natural equivalent of כָּל דָּבָר here.'
