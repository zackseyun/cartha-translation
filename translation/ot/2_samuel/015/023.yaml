id: 2SA.15.23
reference: 2 Samuel 15:23
source:
  edition: WLC
  text: וְ/כָל הָ/אָ֗רֶץ בּוֹכִים֙ ק֣וֹל גָּד֔וֹל וְ/כָל הָ/עָ֖ם עֹֽבְרִ֑ים וְ/הַ/מֶּ֗לֶךְ
    עֹבֵר֙ בְּ/נַ֣חַל קִדְר֔וֹן וְ/כָל הָ/עָם֙ עֹבְרִ֔ים עַל פְּנֵי דֶ֖רֶךְ אֶת הַ/מִּדְבָּֽר־־־־־־׃
translation:
  text: And all the land was weeping with a loud voice, and all the people were crossing
    over. The king also crossed over the Kidron Valley, and all the people were crossing
    over on the road toward the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all the people were crossing over by the way of the
      wilderness.'
    reason: lexical_alternative
  - marker: b
    text: 'Kidron Valley: traditionally ''the brook Kidron.'' The Hebrew נחל can refer
      to a wadi, ravine, or seasonal watercourse.'
    reason: cultural_note
lexical_decisions:
- source_word: כָל הָאָרֶץ
  chosen: all the land
  alternatives:
  - all the הארץ/region
  - everyone in the land
  lexicon: HALOT
  rationale: אָרֶץ here most naturally refers to the land/region as a collective for
    the populace and setting, not the whole earth. 'All the land' preserves the Hebrew
    idiom while remaining intelligible in English.
- source_word: בּוֹכִים קוֹל גָּדוֹל
  chosen: was weeping with a loud voice
  alternatives:
  - were weeping loudly
  - was crying out loudly
  lexicon: HALOT
  rationale: The plural participle with collective subject is idiomatic; singular
    English 'was weeping' fits the collective 'all the land.' קוֹל גָּדוֹל is literally
    'a great/loud voice,' an idiom for audible lament. 'With a loud voice' keeps the
    Hebrew image.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the populace
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In this narrative it refers to David's accompanying
    company broadly, not only soldiers, so 'all the people' is the best general rendering.
- source_word: עֹבְרִים / עֹבֵר
  chosen: were crossing over / crossed over
  alternatives:
  - were passing by / passed by
  - were going on / went on
  lexicon: HALOT
  rationale: 'עבר in this context denotes movement across a boundary or wadi. ''Cross
    over'' fits both the repeated participles and the king''s action at the Kidron.
    The English shifts aspect slightly for natural narrative flow: progressive for
    the ongoing movement of the people, simple past for the king''s specific action.'
- source_word: בְּנַחַל קִדְרוֹן
  chosen: the Kidron Valley
  alternatives:
  - the brook Kidron
  - the wadi Kidron
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or brook/valley. 'Kidron Valley' is clear
    modern English and suits the topographical reference. 'Brook Kidron' is traditional
    but less natural for many readers.
- source_word: עַל פְּנֵי דֶרֶךְ אֶת הַמִּדְבָּר
  chosen: on the road toward the wilderness
  alternatives:
  - by the way of the wilderness
  - in the direction of the wilderness road
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. עַל פְּנֵי can indicate movement along/in
    front of/toward, and דֶרֶךְ אֶת הַמִּדְבָּר points to the route leading to the
    wilderness. 'On the road toward the wilderness' communicates the sense in readable
    English without over-paraphrasing.
