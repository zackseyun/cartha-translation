theological_decisions:
- issue: Reference of 'it and its dwelling place'
  chosen_reading: The phrase refers to the ark and the place where it dwells in Jerusalem.
  alternative_readings:
  - The phrase refers more broadly to God and his habitation.
  rationale: The immediate antecedent is 'the ark of God,' making the ark the most
    natural referent for אֹתוֹ. Yet because the ark signifies God's presence, the
    wording should not exclude an implicit reference to the divine dwelling. The translation
    keeps the concrete wording of the Hebrew without theological expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
