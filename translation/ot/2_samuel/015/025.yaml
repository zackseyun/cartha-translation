id: 2SA.15.25
reference: 2 Samuel 15:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ לְ/צָד֔וֹק הָשֵׁ֛ב אֶת אֲר֥וֹן הָ/אֱלֹהִ֖ים הָ/עִ֑יר
    אִם אֶמְצָ֥א חֵן֙ בְּ/עֵינֵ֣י יְהוָ֔ה וֶ/הֱשִׁבַ֕/נִי וְ/הִרְאַ֥/נִי אֹת֖/וֹ וְ/אֶת
    נָוֵֽ/הוּ־־־׃
translation:
  text: Then the king said to Zadok, “Return the ark of God to the city. If I find
    favor in the eyes of the LORD, he will bring me back and let me see it and its
    dwelling place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and show me it and his habitation'; the Hebrew could be understood with
      a more God-centered referent, though the immediate antecedent is 'the ark of
      God.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָשֵׁב
  chosen: Return
  alternatives:
  - Take back
  - Bring back
  lexicon: HALOT
  rationale: Imperative of שוב addressed to Zadok; 'Return' is concise, natural English
    and preserves the command to send the ark back.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the LORD
  lexicon: HALOT
  rationale: The Hebrew explicitly has 'God' (אֱלֹהִים), not YHWH, so 'the ark of
    God' follows the source text rather than harmonizing to a more familiar phrase.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - into the city
  lexicon: HALOT
  rationale: Definite noun with directional sense supplied by context after 'Return';
    'to the city' is idiomatic and sufficiently explicit.
- source_word: אִם אֶמְצָא חֵן בְּעֵינֵי יְהוָה
  chosen: If I find favor in the eyes of the LORD
  alternatives:
  - If I find grace in the eyes of the LORD
  - If I am pleasing to the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'Find favor' preserves the covenantal
    and relational nuance better than the more interpretive 'am pleasing.' 'In the
    eyes of' is retained for transparency to the Hebrew idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וֶהֱשִׁבַנִי
  chosen: he will bring me back
  alternatives:
  - he will restore me
  - he will return me
  lexicon: HALOT
  rationale: Hiphil of שוב with 1cs suffix indicates causative return. In this narrative
    context David means being brought back to Jerusalem, so 'bring me back' is the
    clearest rendering.
- source_word: וְהִרְאַנִי
  chosen: and let me see
  alternatives:
  - and show me
  - and cause me to see
  lexicon: HALOT
  rationale: Hiphil of ראה literally means 'cause me to see,' but in English 'let
    me see' naturally conveys divine permission/providence without awkwardness.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: The pronoun most naturally refers to the ark, a masculine noun in Hebrew
    but inanimate in English, so 'it' is appropriate.
- source_word: נָוֵהוּ
  chosen: its dwelling place
  alternatives:
  - his habitation
  - its abode
  - his pasture
  lexicon: HALOT
  rationale: נוה can denote habitation/dwelling place. In context with the ark and
    the city, it refers to the place where the ark dwells, likely the sanctuary location.
    'Its dwelling place' is clear and avoids over-specifying a temple that did not
    yet exist.
