id: 2SA.15.26
reference: 2 Samuel 15:26
source:
  edition: WLC
  text: וְ/אִם֙ כֹּ֣ה יֹאמַ֔ר לֹ֥א חָפַ֖צְתִּי בָּ֑/ךְ הִנְ/נִ֕י יַֽעֲשֶׂה לִּ֕/י
    כַּ/אֲשֶׁ֥ר ט֖וֹב בְּ/עֵינָֽי/ו־׃ס
translation:
  text: But if he says, ‘I take no pleasure in you,’ here I am; let him do to me as
    seems good in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I do not delight in you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'as is good in his eyes,' an idiom meaning 'as seems good to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces the contrasting possibility
    to the previous verse. 'But if' best captures the adversative flow in English
    while preserving the conditional sense.
- source_word: כֹּה
  chosen: thus / this
  alternatives:
  - thus
  - this way
  lexicon: HALOT
  rationale: 'Used idiomatically with אמר, introducing direct speech: ''if he says
    thus,'' naturally rendered in English as ''if he says'' followed by the quotation,
    without a separate English equivalent required in the main text.'
- source_word: יֹאמַר
  chosen: he says
  alternatives:
  - he should say
  - he will say
  lexicon: HALOT
  rationale: Imperfect here introduces a hypothetical future condition. English present
    in conditional direct-speech framing ('if he says') is idiomatic and accurate.
- source_word: לֹא חָפַצְתִּי בָּךְ
  chosen: I take no pleasure in you
  alternatives:
  - I do not delight in you
  - I have no delight in you
  - I do not desire you
  lexicon: HALOT
  rationale: חפץ commonly denotes taking pleasure or delight. 'Take no pleasure in
    you' preserves the relational and evaluative sense better than 'desire,' which
    could sound overly volitional or physical in English.
- source_word: הִנְנִי
  chosen: here I am
  alternatives:
  - behold me
  - I am here
  lexicon: HALOT
  rationale: A conventional self-presentation formula expressing readiness or submission.
    'Here I am' is natural modern English and preserves the force.
- source_word: יַעֲשֶׂה לִּי
  chosen: let him do to me
  alternatives:
  - may he do to me
  - he can do to me
  lexicon: HALOT
  rationale: The jussive/imperfect after הִנְנִי expresses willing submission to God's
    action. 'Let him do to me' best conveys this resigned permissive sense.
- source_word: כַּאֲשֶׁר טוֹב בְּעֵינָיו
  chosen: as seems good in his eyes
  alternatives:
  - as is good in his eyes
  - as is pleasing in his sight
  - as seems good to him
  lexicon: HALOT
  rationale: The idiom 'good in his eyes' means what appears good or right to someone.
    'As seems good in his eyes' keeps the Hebrew imagery while remaining readable.
    The pronoun refers to God in context.
