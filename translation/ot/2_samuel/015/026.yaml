theological_decisions:
- issue: Referent of the third-person singular pronouns ('he,' 'his')
  chosen_reading: Retained as lowercase third-person pronouns referring to the LORD
    from context
  alternative_readings:
  - Capitalized pronouns for deity ('He,' 'His')
  - Explicitly replacing pronouns with 'the LORD'
  rationale: The Hebrew uses third-person singular forms without repeating the divine
    name. English can preserve this naturally. Lowercase pronouns avoid importing
    a capitalization convention not marked in the source, while context clearly identifies
    the referent as the LORD from the surrounding verses.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
