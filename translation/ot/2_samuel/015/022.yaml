id: 2SA.15.22
reference: 2 Samuel 15:22
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר דָּוִ֛ד אֶל אִתַּ֖י לֵ֣ךְ וַ/עֲבֹ֑ר וַֽ/יַּעֲבֹ֞ר אִתַּ֤י הַ/גִּתִּי֙
    וְ/כָל אֲנָשָׁ֔י/ו וְ/כָל הַ/טַּ֖ף אֲשֶׁ֥ר אִתּֽ/וֹ־־־׃
translation:
  text: Then David said to Ittai, “Go on and cross over.” So Ittai the Gittite crossed
    over, along with all his men and all the little ones who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the children who were with him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go on
  alternatives:
  - Go
  - Proceed
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go on' gives natural English force in this narrative
    setting, where David is granting permission or directing movement, without adding
    content beyond the simple command.
- source_word: וַעֲבֹר / וַיַּעֲבֹר
  chosen: cross over / crossed over
  alternatives:
  - pass over / passed over
  - go over / went over
  lexicon: HALOT
  rationale: עבר commonly denotes crossing from one side to another. In the immediate
    context of departure and movement, 'cross over' is the clearest and most idiomatic
    rendering, and preserves the repeated verb in command and fulfillment.
- source_word: אִתַּי הַגִּתִּי
  chosen: Ittai the Gittite
  rationale: Personal name is transliterated, and the gentilic is translated in standard
    form. This preserves both identity and ethnic/geographic designation.
- source_word: אֲנָשָׁיו
  chosen: his men
  alternatives:
  - his people
  lexicon: HALOT
  rationale: אֲנָשִׁים literally means 'men' here, likely referring to the male members
    or fighting contingent attached to Ittai. 'His men' is the most direct and contextually
    natural rendering; 'his people' would flatten the lexical specificity.
- source_word: הַטַּף
  chosen: the little ones
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף refers to small children or little ones, often as the vulnerable
    noncombatant members of a group. 'The little ones' preserves the concrete sense
    better than the broader 'dependents' and is slightly closer to the Hebrew nuance
    than simply 'children'.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - that were with him
  lexicon: HALOT
  rationale: Relative clause identifying the little ones accompanying Ittai. 'Who'
    is natural English for persons and keeps the clause attached to 'the little ones'.
- source_word: וַיֹּאמֶר
  chosen: Then David said
  alternatives:
  - And David said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' renders the sequential
    force in readable modern English, while retaining the narrative progression.
