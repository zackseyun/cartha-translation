id: 2SA.15.33
reference: 2 Samuel 15:33
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר ל֖/וֹ דָּוִ֑ד אִ֚ם עָבַ֣רְתָּ אִתִּ֔/י וְ/הָיִ֥תָ עָלַ֖/י לְ/מַשָּֽׂא׃
translation:
  text: David said to him, “If you go on with me, you will be a burden to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If you cross over with me, you will be a burden to me.” The Hebrew verb
      can more literally mean “cross over” or “pass over.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... דָּוִד
  chosen: David said
  alternatives:
  - Then David said
  - And David said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. In smooth modern English,
    'David said' adequately conveys the clause without forcing an initial 'and/then,'
    though those are possible more formal renderings.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to Hushai
  lexicon: HALOT
  rationale: The pronominal object is explicit in Hebrew but unnamed in this verse;
    English should preserve the pronoun. The referent is contextually Hushai from
    the surrounding verses, but supplying the name in the main text would go beyond
    the immediate wording.
- source_word: אִם
  chosen: If
  alternatives:
  - Should you
  - Were you to
  lexicon: HALOT
  rationale: Introduces a straightforward conditional clause. 'If' is the most natural
    and direct rendering.
- source_word: עָבַרְתָּ אִתִּי
  chosen: you go on with me
  alternatives:
  - you pass over with me
  - you cross over with me
  - you go with me
  lexicon: HALOT
  rationale: עבר literally means 'pass over/cross over,' often with the sense of crossing
    to the other side. In this context of accompanying David onward, 'go on with me'
    communicates the movement idiomatically in English while preserving the sense
    of continuing with him. A more formal 'cross over with me' is possible but sounds
    less natural here without additional geographic specification.
- source_word: וְהָיִתָ עָלַי
  chosen: you will be ... to me
  alternatives:
  - you would be upon me
  - you would become for me
  lexicon: HALOT
  rationale: The construction with היה + על conveys resulting impact or imposition
    on David. English idiom requires restructuring; 'you will be ... to me' prepares
    for the predicate noun naturally.
- source_word: לְמַשָּׂא
  chosen: a burden
  alternatives:
  - a load
  - an encumbrance
  lexicon: HALOT
  rationale: מַשָּׂא commonly denotes a load, burden, or something carried. In this
    interpersonal context, 'a burden' is the clearest idiomatic rendering, expressing
    that Hushai's presence would weigh on David rather than help him.
