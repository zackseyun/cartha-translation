id: 2SA.15.14
reference: 2 Samuel 15:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּ֠וִד לְ/כָל עֲבָדָ֨י/ו אֲשֶׁר אִתּ֤/וֹ בִ/ירוּשָׁלִַ֨ם֙ ק֣וּמוּ
    וְ/נִבְרָ֔חָה כִּ֛י לֹא תִֽהְיֶה לָּ֥/נוּ פְלֵיטָ֖ה מִ/פְּנֵ֣י אַבְשָׁל֑וֹם מַהֲר֣וּ
    לָ/לֶ֗כֶת פֶּן יְמַהֵ֤ר וְ/הִשִּׂגָ֨/נוּ֙ וְ/הִדִּ֤יחַ עָלֵ֨י/נוּ֙ אֶת הָ֣/רָעָ֔ה
    וְ/הִכָּ֥ה הָ/עִ֖יר לְ/פִי חָֽרֶב־־־־־־־׃
translation:
  text: Then David said to all his servants who were with him in Jerusalem, “Get up,
    and let us flee, for there will be no escape for us from Absalom. Hurry to go,
    lest he quickly overtake us and bring disaster upon us and strike the city with
    the edge of the sword.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hurry to leave.' The Hebrew is literally 'Hurry to go,' an urgent command
      to depart at once.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring evil upon us.' Here 'evil' refers to calamity or disaster, not
      moral evil.
    reason: lexical_alternative
  - marker: c
    text: Literally 'with the mouth of the sword,' a Hebrew idiom meaning death by
      the sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/slaves
  - his attendants
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave. In this royal court context, 'servants'
    is the most natural English rendering for David's officials and retainers; 'slaves'
    would over-specify bonded status beyond what the immediate context requires.
- source_word: קוּמוּ
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: An imperative of קום. 'Get up' is idiomatic modern English and fits the
    urgent flight context better than the more formal 'rise'.
- source_word: וְנִבְרָחָה
  chosen: let us flee
  alternatives:
  - and let us flee
  - let us run away
  lexicon: HALOT
  rationale: Cohortative 1cp from ברח expresses exhortation including the speaker.
    'Let us flee' preserves both the urgency and the collective force.
- source_word: פְלֵיטָה
  chosen: escape
  alternatives:
  - deliverance
  - way of escape
  lexicon: HALOT
  rationale: In context the noun denotes surviving by escaping Absalom's advance.
    'Escape' is concise and natural; 'deliverance' could imply divine rescue not explicit
    in the verse.
- source_word: מִפְּנֵי אַבְשָׁלוֹם
  chosen: from Absalom
  alternatives:
  - before Absalom
  - from the presence of Absalom
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before/from the face of,' but in this
    context it marks threat or danger. 'From Absalom' communicates the sense clearly
    in English.
- source_word: מַהֲרוּ לָלֶכֶת
  chosen: Hurry to go
  alternatives:
  - Hurry to leave
  - Make haste to depart
  lexicon: HALOT
  rationale: The imperative plus infinitive intensifies urgency. 'Hurry to go' stays
    close to the Hebrew structure, though idiomatically it means to leave at once.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose/result clause. 'Lest' is concise and
    precise, though slightly elevated; it fits the gravity of the warning.
- source_word: יְמַהֵר
  chosen: quickly
  alternatives:
  - hasten
  - come quickly
  lexicon: HALOT
  rationale: The verb repeats the haste motif from מַהֲרוּ. Rendering adverbially
    in English ('quickly overtake') produces natural style while preserving the sense.
- source_word: וְהִשִּׂגָנוּ
  chosen: overtake us
  alternatives:
  - catch up with us
  - reach us
  lexicon: HALOT
  rationale: The hiphil of נשׂג here means to catch up to or overtake in pursuit.
    'Overtake us' best matches the military-flight context.
- source_word: וְהִדִּיחַ עָלֵינוּ אֶת הָרָעָה
  chosen: bring disaster upon us
  alternatives:
  - bring evil upon us
  - drive calamity onto us
  lexicon: HALOT
  rationale: The idiom means to cause calamity to come upon someone. 'Disaster' communicates
    רָעָה here as harmful calamity rather than moral evil.
- source_word: וְהִכָּה הָעִיר
  chosen: strike the city
  alternatives:
  - attack the city
  - smite the city
  lexicon: HALOT
  rationale: נכה is broad enough for 'strike' or 'attack.' 'Strike the city' preserves
    the verbal force without becoming archaic like 'smite.'
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the mouth of the sword
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'to the mouth of the sword.' 'With the
    edge of the sword' is the standard idiomatic English equivalent and preserves
    the image better than the flatter 'by the sword'.
