id: 2SA.15.34
reference: 2 Samuel 15:34
source:
  edition: WLC
  text: וְ/אִם הָ/עִ֣יר תָּשׁ֗וּב וְ/אָמַרְתָּ֤ לְ/אַבְשָׁלוֹם֙ עַבְדְּ/ךָ֨ אֲנִ֤י
    הַ/מֶּ֨לֶךְ֙ אֶֽהְיֶ֔ה עֶ֣בֶד אָבִ֤י/ךָ וַֽ/אֲנִי֙ מֵ/אָ֔ז וְ/עַתָּ֖ה וַ/אֲנִ֣י
    עַבְדֶּ֑/ךָ וְ/הֵפַרְתָּ֣ה לִ֔/י אֵ֖ת עֲצַ֥ת אֲחִיתֹֽפֶל־׃
translation:
  text: But if you return to the city and say to Absalom, ‘I will be your servant,
    O king; as I was your father’s servant in the past, so now I will be your servant,’
    then you will frustrate Ahithophel’s counsel for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am your servant, O king; I was your father’s servant formerly, and
      now I am your servant.' The Hebrew sequence is compressed and can be construed
      more literally with present-tense declarations.
    reason: alternative_reading
  - marker: b
    text: '''Servant'' here reflects courtly and political allegiance; ''slave'' is
      a possible lexical alternative for עֶבֶד, but the bonded nuance is not foregrounded
      in this setting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - and if
  - now if
  lexicon: HALOT
  rationale: The conjunction introduces a contrasting conditional option to the previous
    course of action. 'But if' captures the adversative force in context better than
    a simple 'and if'.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: Definite reference is to Jerusalem in the immediate narrative context.
    'City' is the natural and sufficiently formal rendering.
- source_word: תָּשׁוּב
  chosen: you return
  alternatives:
  - you go back
  - you turn back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' Here it refers to Hushai going back to
    Jerusalem.
- source_word: וְאָמַרְתָּ לְאַבְשָׁלוֹם
  chosen: and say to Absalom
  alternatives:
  - and tell Absalom
  lexicon: HALOT
  rationale: A straightforward speech introduction; 'say to' preserves the directness
    of the Hebrew.
- source_word: עַבְדְּךָ אֲנִי
  chosen: I will be your servant
  alternatives:
  - I am your servant
  - your servant am I
  lexicon: HALOT
  rationale: Although literally 'your servant I,' the following אֶהְיֶה ('I will be')
    governs the sense of pledged allegiance. Rendering the clause together as 'I will
    be your servant' produces clear English while preserving the commitment formula.
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In direct address after the vocative-like construction, English idiom
    prefers 'O king' or simply 'king.' 'O king' preserves the formal address.
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I am
  lexicon: HALOT
  rationale: 'Imperfect of היה here expresses future commitment: Hushai is to present
    himself as Absalom''s servant.'
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: While עבד can denote a slave, in royal court language it often functions
    as a deferential term for political service and loyalty. 'Servant' best fits this
    courtly setting without importing the stronger chattel nuance.
- source_word: אָבִיךָ
  chosen: your father’s
  alternatives:
  - of your father
  lexicon: HALOT
  rationale: Possessive English is the most natural rendering in the phrase 'your
    father’s servant.'
- source_word: מֵאָז
  chosen: in the past
  alternatives:
  - formerly
  - from then on
  - before now
  lexicon: HALOT
  rationale: The adverb points to prior time. 'In the past' communicates the temporal
    contrast with 'now' clearly in modern English.
- source_word: וְעַתָּה
  chosen: so now
  alternatives:
  - and now
  - now
  lexicon: HALOT
  rationale: The phrase marks contrast and transition from former service to present
    claimed service. 'So now' smooths the comparison in English.
- source_word: וַאֲנִי עַבְדֶּךָ
  chosen: I will be your servant
  alternatives:
  - I am your servant
  lexicon: HALOT
  rationale: The repeated servant formula is rendered consistently with the earlier
    pledge. Supplying 'will be' in English reflects the forward-looking sense of the
    whole declaration.
- source_word: וְהֵפַרְתָּה
  chosen: you will frustrate
  alternatives:
  - you will defeat
  - you will nullify
  - you will break
  lexicon: HALOT
  rationale: The Hiphil of פרר/הפר means to break, thwart, or frustrate counsel. 'Frustrate'
    is idiomatic for plans or advice and fits the strategic context.
- source_word: לִי
  chosen: for me
  alternatives:
  - on my behalf
  - for my sake
  lexicon: HALOT
  rationale: David speaks of Hushai frustrating Ahithophel's counsel in David's interest.
    'For me' is concise and natural.
- source_word: עֲצַת אֲחִיתֹפֶל
  chosen: Ahithophel’s counsel
  alternatives:
  - the counsel of Ahithophel
  - Ahithophel’s advice
  - Ahithophel’s plan
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, advice, or plan. 'Counsel' preserves both the
    advisory and strategic dimensions in this political context.
