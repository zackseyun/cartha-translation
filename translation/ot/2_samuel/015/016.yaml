id: 2SA.15.16
reference: 2 Samuel 15:16
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א הַ/מֶּ֛לֶךְ וְ/כָל בֵּית֖/וֹ בְּ/רַגְלָ֑י/ו וַ/יַּעֲזֹ֣ב הַ/מֶּ֗לֶךְ
    אֵ֣ת עֶ֧שֶׂר נָשִׁ֛ים פִּֽלַגְשִׁ֖ים לִ/שְׁמֹ֥ר הַ/בָּֽיִת־׃
translation:
  text: So the king went out, and all his household after him on foot; and the king
    left ten women, concubines, to keep the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and all his household at his feet.' The Hebrew idiom
      conveys that they went after him on foot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - left
  lexicon: HALOT
  rationale: The verb יצא in the wayyiqtol narrative form straightforwardly denotes
    departure. 'Went out' preserves the concrete motion and fits the narrative sequence
    better than the more interpretive 'left.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מלך with the article. The referent is David in
    context, but the Hebrew uses the title rather than the personal name here, so
    the translation preserves that.
- source_word: וְכָל בֵּיתוֹ
  chosen: and all his household
  alternatives:
  - and all his house
  - and all his family
  lexicon: HALOT
  rationale: בַּיִת with pronominal suffix can denote one's household rather than
    the physical building. 'Household' best captures the people belonging to the king's
    house in this departure scene.
- source_word: בְּרַגְלָיו
  chosen: after him on foot
  alternatives:
  - at his feet
  - on foot
  lexicon: HALOT
  rationale: Literally 'at/by his feet,' but in this idiom the sense is that they
    followed him on foot. Rendering both elements in natural English communicates
    the movement without wooden obscurity.
- source_word: וַיַּעֲזֹב
  chosen: left
  alternatives:
  - abandoned
  - set aside
  lexicon: HALOT
  rationale: עזב here means to leave behind. 'Abandoned' would overstate the emotional
    or moral force; the context is strategic placement rather than total forsaking.
- source_word: עֶשֶׂר נָשִׁים פִּלַגְשִׁים
  chosen: ten women, concubines
  alternatives:
  - ten concubines
  - ten women who were concubines
  lexicon: HALOT
  rationale: The Hebrew apposition includes both 'women' and 'concubines.' Retaining
    both reflects the source wording and avoids flattening the phrase, while the comma
    signals apposition in readable English.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to guard
  - to watch over
  lexicon: HALOT
  rationale: שׁמר broadly means keep, guard, watch. 'Keep' is concise and idiomatic
    with 'the house,' while still allowing the sense of guarding or maintaining it.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the palace
  - the household
  lexicon: HALOT
  rationale: Here בַּיִת refers to the physical royal residence left behind, not the
    people. 'House' preserves the Hebrew term; 'palace' is possible contextually but
    more interpretive than the source requires.
