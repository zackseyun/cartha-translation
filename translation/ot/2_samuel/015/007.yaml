theological_decisions:
- issue: Text-critical/narrative difficulty in the number of years
  chosen_reading: forty years
  alternative_readings:
  - four years
  rationale: The provided source text is the MT/WLC, which reads 'forty years.' Although
    'four years' is widely regarded as a plausible original reading because it fits
    the immediate chronology more naturally, the translation follows the base text
    and preserves the alternative in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3
