id: 2SA.15.7
reference: 2 Samuel 15:7
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קֵּ֖ץ אַרְבָּעִ֣ים שָׁנָ֑ה וַ/יֹּ֤אמֶר אַבְשָׁלוֹם֙ אֶל הַ/מֶּ֔לֶךְ
    אֵ֣לֲכָה נָּ֗א וַ/אֲשַׁלֵּ֛ם אֶת נִדְרִ֛/י אֲשֶׁר נָדַ֥רְתִּי לַֽ/יהוָ֖ה בְּ/חֶבְרֽוֹן־־־׃
translation:
  text: And at the end of forty years, Absalom said to the king, “Please let me go
    and pay the vow that I vowed to the LORD in Hebron.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''forty years''; some ancient witnesses and many translations read
      ''four years.'''
    reason: textual_variant
lexical_decisions:
- source_word: מִקֵּץ אַרְבָּעִים שָׁנָה
  chosen: at the end of forty years
  alternatives:
  - at the end of four years
  lexicon: HALOT
  rationale: The MT/WLC reads 'forty years' (אַרְבָּעִים). This is translated straightforwardly
    in the main text out of fidelity to the provided Hebrew source. Because many interpreters
    and versions prefer 'four years' on contextual and textual grounds, that alternative
    is preserved in a footnote rather than adopted silently.
- source_word: אֵלֲכָה נָּא
  chosen: Please let me go
  alternatives:
  - Please let me go now
  - Let me go, please
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite request. 'Please let me go'
    captures both the volitional sense and the courteous particle in natural English.
- source_word: וַאֲשַׁלֵּם
  chosen: and pay
  alternatives:
  - and fulfill
  - and perform
  lexicon: HALOT
  rationale: With נדר ('vow'), שׁלם commonly means to pay or fulfill a vow. 'Pay'
    is idiomatic and concrete in English while remaining faithful to the Hebrew collocation.
- source_word: נִדְרִי אֲשֶׁר נָדַרְתִּי
  chosen: the vow that I vowed
  alternatives:
  - my vow that I made
  - the vow I made
  lexicon: HALOT
  rationale: The Hebrew uses both noun and cognate verb for emphasis. 'The vow that
    I vowed' preserves that formal feature more closely than smoothing it to 'the
    vow I made.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text, following the project's stated default.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  lexicon: HALOT
  rationale: Standard locative rendering of the place name; personal/place names are
    transliterated by standard conventions.
