id: 2SA.15.15
reference: 2 Samuel 15:15
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ עַבְדֵֽי הַ/מֶּ֖לֶךְ אֶל הַ/מֶּ֑לֶךְ כְּ/כֹ֧ל אֲשֶׁר יִבְחַ֛ר
    אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ הִנֵּ֥ה עֲבָדֶֽי/ךָ־־־׃
translation:
  text: The king’s servants said to the king, “Whatever my lord the king chooses,
    here are your servants.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'According to all that my lord the king chooses, behold,
      your servants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; simple past 'said'
    is the most natural English narrative rendering.
- source_word: עַבְדֵי הַמֶּלֶךְ
  chosen: the king’s servants
  alternatives:
  - the king’s attendants
  - the king’s slaves
  lexicon: HALOT
  rationale: עבד can denote servant, slave, or official dependent. In this court setting,
    'servants' best captures loyal royal retainers without overstating chattel status,
    which is not foregrounded here.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - unto the king
  lexicon: HALOT
  rationale: Straightforward directional preposition with indirect object of speech.
- source_word: כְּכֹל אֲשֶׁר יִבְחַר
  chosen: Whatever ... chooses
  alternatives:
  - According to all that ... chooses
  - Exactly as ... chooses
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'according to all that ... chooses.'
    In idiomatic English direct speech, 'Whatever ... chooses' preserves the sense
    of complete readiness to comply.
- source_word: יִבְחַר
  chosen: chooses
  alternatives:
  - decides
  - selects
  lexicon: HALOT
  rationale: בחר commonly means 'choose/select.' 'Chooses' preserves the lexical sense
    better than the more interpretive 'decides,' while fitting the context of the
    king's preferred course of action.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Formal court address. 'My lord the king' is natural, deferential English
    and preserves the honorific force of אֲדֹנִי.
- source_word: הִנֵּה
  chosen: here are
  alternatives:
  - behold
  - look
  - we are here as
  lexicon: HALOT
  rationale: הִנֵּה marks presentation or readiness. 'Here are' communicates immediate
    availability in natural modern English better than the archaic 'behold.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants are ready
  - your slaves
  lexicon: HALOT
  rationale: The phrase expresses loyal self-offering to the king. 'Your servants'
    is the most contextually fitting and keeps the repeated עבד-wordplay with 'the
    king’s servants' earlier in the verse.
