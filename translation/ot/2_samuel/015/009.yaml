id: 2SA.15.9
reference: 2 Samuel 15:9
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר ל֥/וֹ הַ/מֶּ֖לֶךְ לֵ֣ךְ בְּ/שָׁל֑וֹם וַ/יָּ֖קָם וַ/יֵּ֥לֶךְ חֶבְרֽוֹנָ/ה־׃פ
translation:
  text: The king said to him, “Go in peace.” So he arose and went to Hebron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, best rendered simply as 'said' in
    direct speech introduction.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context, David;
    retaining 'the king' matches the Hebrew expression without over-specifying the
    name.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Leave
  - Proceed
  lexicon: HALOT
  rationale: Imperative of הלך in direct speech; 'Go' is the natural and sufficiently
    formal English equivalent.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: HALOT
  rationale: Common idiom of departure/blessing. 'Go in peace' is idiomatic English
    and preserves the Hebrew prepositional phrase.
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he rose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום. 'He arose' preserves the narrative sequence with
    slightly elevated but still readable diction; 'got up' would be more colloquial.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Standard narrative verb of motion; 'went' is the plain sense and fits
    the sequence after 'arose'.
- source_word: חֶבְרוֹנָה
  chosen: to Hebron
  alternatives:
  - Hebronward
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward the city. English
    expresses this naturally as 'to Hebron'.
