id: 2SA.15.10
reference: 2 Samuel 15:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אַבְשָׁלוֹם֙ מְרַגְּלִ֔ים בְּ/כָל שִׁבְטֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר
    כְּ/שָׁמְעֲ/כֶם֙ אֶת ק֣וֹל הַ/שֹּׁפָ֔ר וַ/אֲמַרְתֶּ֕ם מָלַ֥ךְ אַבְשָׁל֖וֹם בְּ/חֶבְרֽוֹן־־׃
translation:
  text: Then Absalom sent spies throughout all the tribes of Israel, saying, “As soon
    as you hear the sound of the trumpet, then say, ‘Absalom has become king in Hebron.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'the sound of the shofar' or 'ram's horn.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: מְרַגְּלִים
  chosen: spies
  alternatives:
  - messengers
  - scouts
  lexicon: HALOT
  rationale: The participial noun from רגל commonly denotes spies or secret agents.
    In this context Absalom is covertly organizing a coup, so 'spies' best preserves
    the clandestine sense better than the more neutral 'messengers'.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  chosen: throughout all the tribes of Israel
  alternatives:
  - into all the tribes of Israel
  - among all the tribes of Israel
  lexicon: HALOT
  rationale: The preposition with 'all the tribes' indicates distribution across the
    tribal territories/groups. 'Throughout all the tribes of Israel' communicates
    broad dissemination in natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing the content of Absalom's instruction.
- source_word: כְּשָׁמְעֲכֶם
  chosen: As soon as you hear
  alternatives:
  - When you hear
  - At your hearing
  lexicon: HALOT
  rationale: The construction marks the time at which the commanded response should
    occur. 'As soon as you hear' captures the immediacy implied in the signal-based
    instruction.
- source_word: קוֹל הַשֹּׁפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the ram's horn
  - the voice/sound of the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn trumpet, often a ram's horn. 'Trumpet'
    is the clearest main-text rendering in modern English; the more specific cultural
    form is worth preserving in a footnote.
- source_word: וַאֲמַרְתֶּם
  chosen: then say
  alternatives:
  - you shall say
  - and say
  lexicon: HALOT
  rationale: This is the instructed response following the trumpet signal. 'Then say'
    clearly marks sequence in idiomatic English.
- source_word: מָלַךְ אַבְשָׁלוֹם
  chosen: Absalom has become king
  alternatives:
  - Absalom reigns
  - Absalom is king
  - Absalom has been made king
  lexicon: HALOT
  rationale: The perfect verb presents the kingship as an accomplished fact to be
    publicly announced. 'Has become king' preserves that force better than the flatter
    'is king' and avoids overinterpreting passive agency.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: The preposition is locative. 'In Hebron' is the most natural English
    rendering for the city location.
