id: 2SA.15.36
reference: 2 Samuel 15:36
source:
  edition: WLC
  text: הִנֵּה שָׁ֤ם עִמָּ/ם֙ שְׁנֵ֣י בְנֵי/הֶ֔ם אֲחִימַ֣עַץ לְ/צָד֔וֹק וִ/יהוֹנָתָ֖ן
    לְ/אֶבְיָתָ֑ר וּ/שְׁלַחְתֶּ֤ם בְּ/יָדָ/ם֙ אֵלַ֔/י כָּל דָּבָ֖ר אֲשֶׁ֥ר תִּשְׁמָֽעוּ־־׃
translation:
  text: 'Look, their two sons are there with them: Ahimaaz for Zadok, and Jonathan
    for Abiathar. You shall send to me by their hand every matter that you hear.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through them.' The Hebrew reads literally 'by their hand,' an idiom
      for agency or transmission.
    reason: lexical_alternative
  - marker: b
    text: Or 'everything that you hear' or 'every report that you hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention emphatically. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: שָׁם עִמָּם
  chosen: are there with them
  alternatives:
  - are there
  - are with them there
  lexicon: HALOT
  rationale: The adverb and prepositional phrase together locate the sons in the same
    place as the priests. English supplies 'are' naturally.
- source_word: שְׁנֵי בְנֵיהֶם
  chosen: their two sons
  alternatives:
  - the two sons of theirs
  - their two young men
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means 'their two sons,' referring
    to the sons of Zadok and Abiathar just named.
- source_word: אֲחִימַעַץ לְצָדוֹק וִיהוֹנָתָן לְאֶבְיָתָר
  chosen: Ahimaaz for Zadok, and Jonathan for Abiathar
  alternatives:
  - Ahimaaz, Zadok's son, and Jonathan, Abiathar's son
  lexicon: HALOT
  rationale: The lamed here marks filial relation in context ('belonging to' / 'for'),
    since the preceding phrase already states these are their two sons. The chosen
    rendering stays close to the Hebrew sequence while remaining intelligible.
- source_word: וּשְׁלַחְתֶּם
  chosen: You shall send
  alternatives:
  - send
  - you must send
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this instruction context carries
    an imperative/future force. 'You shall send' preserves the directive tone without
    over-paraphrasing.
- source_word: בְּיָדָם
  chosen: by their hand
  alternatives:
  - through them
  - by means of them
  lexicon: HALOT
  rationale: Literally 'by their hand,' a common idiom for agency or instrumentality.
    Retained in the main text because it is still understandable in English and preserves
    the Hebrew texture.
- source_word: כָּל דָּבָר
  chosen: every matter
  alternatives:
  - everything
  - every word
  - every report
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'thing,' or 'matter.' In this intelligence-gathering
    context, 'every matter' captures the breadth of whatever information is heard.
- source_word: אֲשֶׁר תִּשְׁמָעוּ
  chosen: that you hear
  alternatives:
  - which you hear
  - that you learn
  lexicon: HALOT
  rationale: The relative clause modifies 'every matter.' 'Hear' is the direct lexical
    equivalent of שׁמע and fits the context of receiving information.
