id: 2SA.15.30
reference: 2 Samuel 15:30
source:
  edition: WLC
  text: וְ/דָוִ֡ד עֹלֶה֩ בְ/מַעֲלֵ֨ה הַ/זֵּיתִ֜ים עֹלֶ֣ה וּ/בוֹכֶ֗ה וְ/רֹ֥אשׁ ל/וֹ֙
    חָפ֔וּי וְ/ה֖וּא הֹלֵ֣ךְ יָחֵ֑ף וְ/כָל הָ/עָ֣ם אֲשֶׁר אִתּ֗/וֹ חָפוּ֙ אִ֣ישׁ רֹאשׁ֔/וֹ
    וְ/עָל֥וּ עָלֹ֖ה וּ/בָכֹֽה׀־־׃
translation:
  text: And David was going up the ascent of the Mount of Olives, going up and weeping,
    with his head covered, and he was walking barefoot. And all the people who were
    with him each covered his head, and they went up, going up and weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''going up'' for emphasis: ''going up and weeping.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'every man covered his head'; the Hebrew uses a distributive singular.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''they went up, going up and weeping,'' with repetition for emphasis
      and vividness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֵה הַזֵּיתִים
  chosen: the ascent of the Mount of Olives
  alternatives:
  - the ascent of the olives
  - the slope of the Mount of Olives
  lexicon: HALOT
  rationale: מַעֲלֵה denotes an ascent or upward slope/path. הַזֵּיתִים is the established
    place-name 'Mount of Olives' in English, preferable to a wooden 'the olives' because
    the phrase functions topographically.
- source_word: עֹלֶה ... עֹלֶה וּבוֹכֶה
  chosen: was going up ... going up and weeping
  alternatives:
  - went up ... weeping
  - was ascending ... and crying
  lexicon: HALOT
  rationale: The repeated participles create vivid ongoing action. Rendering with
    progressive English preserves the durative, scene-setting force and the Hebrew
    repetition rather than collapsing it.
- source_word: בֹּכֶה
  chosen: weeping
  alternatives:
  - crying
  - lamenting
  lexicon: HALOT
  rationale: '''Weeping'' best matches the plain emotional and physical sense without
    adding the more formal nuance of ritual lament.'
- source_word: וְרֹאשׁ לוֹ חָפוּי
  chosen: with his head covered
  alternatives:
  - and his head was covered
  - with his head wrapped
  lexicon: HALOT
  rationale: The clause describes David's mourning posture. 'With his head covered'
    is natural English and preserves the stative sense of חָפוּי without over-specifying
    the manner of covering.
- source_word: יָחֵף
  chosen: barefoot
  alternatives:
  - with bare feet
  - unshod
  lexicon: HALOT
  rationale: '''Barefoot'' is the standard concise English equivalent and fits readable
    modern English.'
- source_word: כָּל הָעָם אֲשֶׁר אִתּוֹ
  chosen: all the people who were with him
  alternatives:
  - all the people who were with David
  - all the troops with him
  lexicon: HALOT
  rationale: הָעָם is broad here, referring to the company accompanying David. 'People'
    is sufficiently general and avoids importing a specifically military sense not
    explicit in the text.
- source_word: חָפוּ אִישׁ רֹאשׁוֹ
  chosen: each covered his head
  alternatives:
  - every man covered his head
  - each one covered his head
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' or 'each man.' 'Each covered his head'
    preserves the distributive force while keeping the sentence natural in English.
- source_word: וְעָלוּ עָלֹה וּבָכֹה
  chosen: and they went up, going up and weeping
  alternatives:
  - and they went up, weeping as they went
  - and they kept ascending and weeping
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies and extends the
    action. The translation keeps the Hebrew's emphatic repetition audible rather
    than smoothing it away entirely.
