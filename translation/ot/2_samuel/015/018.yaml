id: 2SA.15.18
reference: 2 Samuel 15:18
source:
  edition: WLC
  text: וְ/כָל עֲבָדָי/ו֙ עֹבְרִ֣ים עַל יָד֔/וֹ וְ/כָל הַ/כְּרֵתִ֖י וְ/כָל הַ/פְּלֵתִ֑י
    וְ/כָֽל הַ/גִּתִּ֞ים שֵׁשׁ מֵא֣וֹת אִ֗ישׁ אֲשֶׁר בָּ֤אוּ בְ/רַגְל/וֹ֙ מִ/גַּ֔ת
    עֹבְרִ֖ים עַל פְּנֵ֥י הַ/מֶּֽלֶךְ־־־־־־־־׃
translation:
  text: And all his servants were passing by at his side, and all the Cherethites,
    and all the Pelethites, and all the Gittites—six hundred men who had come on foot
    with him from Gath—were passing on before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who had followed him from Gath'; the Hebrew literally says 'who had
      come with his foot from Gath,' an idiom for accompanying someone in his train
      or on foot.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/officials
  - his attendants
  lexicon: HALOT
  rationale: עֶבֶד can denote servants, retainers, or royal officials depending on
    context. Here David's broader following is in view, distinct from the named military
    groups that follow, so 'servants' preserves the basic lexical sense without over-specifying
    office.
- source_word: עֹבְרִים עַל יָדוֹ
  chosen: were passing by at his side
  alternatives:
  - were passing by him
  - were crossing at his hand
  lexicon: HALOT
  rationale: The idiom עַל יָד can mean 'at the side of' or 'beside.' 'At his side'
    gives natural English while preserving the spatial sense better than a wooden
    'at his hand.'
- source_word: הַכְּרֵתִי
  chosen: the Cherethites
  alternatives:
  - the Kerethites
  lexicon: HALOT
  rationale: This is an ethnicon/title for a known group in David's service. Following
    the philosophy to transliterate names, 'Cherethites' is retained rather than attempting
    an interpretive translation.
- source_word: הַפְּלֵתִי
  chosen: the Pelethites
  alternatives:
  - the Pelethim
  lexicon: HALOT
  rationale: Like Cherethites, this is best treated as a proper group designation
    and transliterated.
- source_word: הַגִּתִּים
  chosen: the Gittites
  alternatives:
  - men of Gath
  lexicon: HALOT
  rationale: The term denotes people from Gath. 'Gittites' preserves the ethnic label
    compactly; 'men of Gath' is possible but less consistent with transliterated ethnics
    in the verse.
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  chosen: six hundred men
  alternatives:
  - six hundred soldiers
  lexicon: HALOT
  rationale: אִישׁ here is a counting term for adult males. 'Men' is the straightforward
    rendering; 'soldiers' would add a military nuance not explicit in the phrase itself,
    though the context suggests fighting men.
- source_word: אֲשֶׁר בָּאוּ בְרַגְלוֹ מִגַּת
  chosen: who had come on foot with him from Gath
  alternatives:
  - who had followed him from Gath
  - who had come in his train from Gath
  lexicon: HALOT
  rationale: בְרַגְלוֹ literally involves 'his foot' and idiomatically can mean accompanying
    someone on foot or in one's retinue. 'On foot with him' keeps the concrete imagery
    and avoids over-paraphrase, while still reading naturally.
- source_word: עֹבְרִים עַל פְּנֵי הַמֶּלֶךְ
  chosen: were passing on before the king
  alternatives:
  - were passing before the king
  - were crossing in front of the king
  lexicon: HALOT
  rationale: עַל פְּנֵי commonly means 'before' or 'in front of.' 'Before the king'
    is idiomatic and fits the procession scene. 'Passing on' reflects the participial
    movement in context.
