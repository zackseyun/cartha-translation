id: 2SA.15.32
reference: 2 Samuel 15:32
source:
  edition: WLC
  text: וַ/יְהִ֤י דָוִד֙ בָּ֣א עַד הָ/רֹ֔אשׁ אֲשֶֽׁר יִשְׁתַּחֲוֶ֥ה שָׁ֖ם לֵ/אלֹהִ֑ים
    וְ/הִנֵּ֤ה לִ/קְרָאת/וֹ֙ חוּשַׁ֣י הָ/אַרְכִּ֔י קָר֨וּעַ֙ כֻּתָּנְתּ֔/וֹ וַ/אֲדָמָ֖ה
    עַל רֹאשֽׁ/וֹ־־־׃
translation:
  text: When David came to the summit, where he used to worship God, behold, Hushai
    the Archite came to meet him with his tunic torn and dirt on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where he worshiped God'; the Hebrew verb may denote either customary
      action ('used to worship') or simple past action.
    reason: lexical_alternative
  - marker: b
    text: '''Behold'' renders a Hebrew narrative marker that highlights the sudden
      appearance of Hushai.'
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  chosen: the summit
  alternatives:
  - the top
  - the head
  lexicon: HALOT
  rationale: Literally 'the head,' but in topographical context it refers to the top
    or summit of the ascent/mountain. 'Summit' is natural English and preserves the
    spatial sense without wooden literalism.
- source_word: אֲשֶׁר יִשְׁתַּחֲוֶה שָׁם לֵאלֹהִים
  chosen: where he used to worship God
  alternatives:
  - where he worshiped God
  - where one worships God
  lexicon: HALOT
  rationale: The imperfect verb can denote customary past action in narrative context.
    'Used to worship' captures the likely habitual sense at this known place of worship.
    'Bow down' is the more literal sense of the verb, but 'worship' best conveys the
    idiom with לֵאלֹהִים in English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retains the narrative vividness and suddenness of the Hebrew discourse
    marker. Though somewhat elevated, it remains readable and signals the dramatic
    appearance of Hushai.
- source_word: לִקְרָאתוֹ
  chosen: came to meet him
  alternatives:
  - to meet him
  - toward him
  lexicon: HALOT
  rationale: The prepositional infinitive indicates movement for encounter. English
    requires an explicit verb with Hushai as subject, supplied naturally from context.
- source_word: חוּשַׁי הָאַרְכִּי
  chosen: Hushai the Archite
  rationale: Personal name is transliterated; gentilic title is translated by standard
    convention as 'the Archite.'
- source_word: קָרוּעַ כֻּתָּנְתּוֹ
  chosen: with his tunic torn
  alternatives:
  - his tunic torn
  - with his garment torn
  - with his robe torn
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refers to a tunic-like garment. 'Tunic' is more specific than
    generic 'garment' and avoids the potentially misleading 'robe.' The predicate
    adjective קָרוּעַ is rendered as a resultant state.
- source_word: וַאֲדָמָה עַל רֹאשׁוֹ
  chosen: and dirt on his head
  alternatives:
  - and earth on his head
  - with dust on his head
  lexicon: HALOT
  rationale: אֲדָמָה is literally 'ground/soil/earth.' In this mourning context, 'dirt
    on his head' is idiomatic modern English. 'Dust' is possible, but the Hebrew term
    here is broader than fine dust.
