theological_decisions:
- issue: Force of David's blessing formula at the end of the verse
  chosen_reading: May steadfast love and faithfulness be with you
  alternative_readings:
  - steadfast love and faithfulness
  - mercy and truth
  rationale: The Hebrew lacks an explicit verb, so English must supply one. Rendering
    it as a benedictory wish fits the discourse context and avoids the awkward fragment
    while preserving the idiomatic blessing.
