id: 2SA.15.20
reference: 2 Samuel 15:20
source:
  edition: WLC
  text: תְּמ֣וֹל בּוֹאֶ֗/ךָ וְ/הַ/יּ֞וֹם אנוע/ך עִמָּ֨/נוּ֙ לָ/לֶ֔כֶת וַ/אֲנִ֣י הוֹלֵ֔ךְ
    עַ֥ל אֲשֶׁר אֲנִ֖י הוֹלֵ֑ךְ שׁ֣וּב וְ/הָשֵׁ֧ב אֶת אַחֶ֛י/ךָ עִמָּ֖/ךְ חֶ֥סֶד וֶ/אֱמֶֽת׀־־׃
translation:
  text: You came only yesterday, and today should I make you wander with us, while
    I am going wherever I can go? Return, and take your brothers back with you. May
    steadfast love and faithfulness be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'while I am going where I am going.' The Hebrew expression
      is idiomatic and conveys the uncertainty of David's flight.
    reason: lexical_alternative
  - marker: b
    text: '''Your brothers'' likely refers to Ittai''s companions or kinsmen who came
      with him.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'steadfast love and faithfulness,' a common expression for loyal
      love and reliability.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּמוֹל
  chosen: only yesterday
  alternatives:
  - yesterday
  - recently
  lexicon: HALOT
  rationale: Temporal adverb meaning 'yesterday' or 'recently.' 'Only yesterday' brings
    out David's point that Ittai is a very recent arrival.
- source_word: בּוֹאֶךָ
  chosen: you came
  alternatives:
  - your coming
  lexicon: HALOT
  rationale: 'Infinitive construct with 2ms suffix functions naturally in English
    as a finite clause: ''you came.'''
- source_word: אֲנוּעֲךָ
  chosen: should I make you wander
  alternatives:
  - should I make you move about
  - should I drive you along
  lexicon: HALOT
  rationale: From נוע, 'to wander, move to and fro.' In context David questions forcing
    Ittai into unstable exile. 'Make you wander' preserves the causative nuance and
    the unsettled sense.
- source_word: עִמָּנוּ לָלֶכֶת
  chosen: with us
  alternatives:
  - to go with us
  lexicon: HALOT
  rationale: The infinitive 'to go' is implicit in English after 'wander'; 'with us'
    keeps the clause readable without losing meaning.
- source_word: וַאֲנִי הוֹלֵךְ עַל אֲשֶׁר אֲנִי הוֹלֵךְ
  chosen: while I am going wherever I can go
  alternatives:
  - while I am going where I am going
  - while I go where I must go
  lexicon: HALOT
  rationale: The Hebrew is idiomatic and somewhat elliptical. A very literal rendering
    ('where I am going') is awkward in English and undercommunicates the uncertainty
    of David's flight. 'Wherever I can go' captures the open-ended, unsettled force
    without over-paraphrasing.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: Common imperative for returning. 'Return' fits the elevated but readable
    tone.
- source_word: וְהָשֵׁב
  chosen: take ... back
  alternatives:
  - bring back
  - cause to return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, 'bring back' or 'take back.' With Ittai as
    the addressee, 'take your brothers back' is idiomatic English.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your companions
  lexicon: HALOT
  rationale: Literally 'your brothers.' In context it likely refers to Ittai's fellow
    Gittites/companions, but the Hebrew uses the kinship term. Per translation philosophy,
    the gender-accurate source form is retained.
- source_word: חֶסֶד וֶאֱמֶת
  chosen: steadfast love and faithfulness
  alternatives:
  - mercy and truth
  - kindness and faithfulness
  - covenant loyalty and faithfulness
  lexicon: HALOT
  rationale: This common pair denotes loyal, reliable covenantal goodness. 'Steadfast
    love and faithfulness' is established, readable English that preserves the theological
    weight better than the flatter 'kindness and truth'.
