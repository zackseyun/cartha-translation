id: 2SA.15.3
reference: 2 Samuel 15:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ אַבְשָׁל֔וֹם רְאֵ֥ה דְבָרֶ֖/ךָ טוֹבִ֣ים וּ/נְכֹחִ֑ים
    וְ/שֹׁמֵ֥עַ אֵין לְ/ךָ֖ מֵ/אֵ֥ת הַ/מֶּֽלֶךְ־׃
translation:
  text: Then Absalom said to him, “Look, your claims are good and right, but there
    is no one from the king to hear you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your case is good and right.” The Hebrew דָּבָר can mean “word,” “matter,”
      or, in a legal context, “case/claim.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “there is no hearer for you from the king,” meaning no one commissioned
      by the king to hear the case.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: Then Absalom said to him
  alternatives:
  - And Absalom said to him
  - So Absalom said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence. 'To him' reflects the pronominal object.
- source_word: רְאֵה
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה used as a discourse attention-getter. 'Look' is idiomatic
    modern English and preserves the direct appeal better than archaic 'behold.'
- source_word: דְבָרֶךָ
  chosen: your claims
  alternatives:
  - your case
  - your words
  - your matters
  lexicon: HALOT
  rationale: In the legal setting of petitioners coming for judgment (context of 2
    Sam 15:2–6), דָּבָר refers not merely to spoken words but to the person's case
    or claims. 'Claims' captures the forensic nuance while remaining natural English.
- source_word: טוֹבִים
  chosen: good
  alternatives:
  - valid
  - sound
  lexicon: HALOT
  rationale: Basic adjectival sense 'good.' In context it commends the merits of the
    petitioner's case. 'Good' preserves the Hebrew's broad evaluation without over-specifying
    legal validity.
- source_word: וּנְכֹחִים
  chosen: right
  alternatives:
  - straight
  - just
  - reasonable
  lexicon: HALOT
  rationale: 'נְכֹחִים conveys straightness/uprightness/correctness. ''Right'' is
    concise, idiomatic, and fits the legal context: the claims are not only good but
    just/correct.'
- source_word: וְשֹׁמֵעַ אֵין לְךָ מֵאֵת הַמֶּלֶךְ
  chosen: but there is no one from the king to hear you
  alternatives:
  - but you have no hearing from the king
  - but there is no deputy of the king to listen to you
  - but no one appointed by the king will hear you
  lexicon: HALOT
  rationale: שֹׁמֵעַ as a participle means 'one hearing/listening,' here someone who
    hears a legal case. מֵאֵת הַמֶּלֶךְ indicates source/commission from the king,
    not necessarily the king personally. The clause means no royal representative
    is available to hear the petitioner. 'To hear you' preserves the judicial nuance
    in accessible English.
