id: 2SA.15.31
reference: 2 Samuel 15:31
source:
  edition: WLC
  text: וְ/דָוִד֙ הִגִּ֣יד לֵ/אמֹ֔ר אֲחִיתֹ֥פֶל בַּ/קֹּשְׁרִ֖ים עִם אַבְשָׁל֑וֹם וַ/יֹּ֣אמֶר דָּוִ֔ד סַכֶּל נָ֛א אֶת עֲצַ֥ת אֲחִיתֹ֖פֶל יְהוָֽה־־־׃
translation:
  text: And it was told David, saying, “Ahithophel is among the conspirators with Absalom.” And David said, “O Yahweh, please turn Ahithophel’s counsel into foolishness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “frustrate Ahithophel’s counsel.” The Hebrew more literally asks that his counsel be made foolish.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּיד
  chosen: it was told
  alternatives:
  - someone told
  - he was told
  lexicon: HALOT
  rationale: The verb נגד in the Hiphil commonly means 'tell, report, declare.' English idiom prefers an impersonal passive here ('it was told David') to reflect the Hebrew report formula without supplying an explicit subject.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - namely
  lexicon: HALOT
  rationale: Retained as 'saying' to preserve the Hebrew quotative structure and the formal feel of the report, while remaining natural enough in English.
- source_word: בַּקֹּשְׁרִים
  chosen: among the conspirators
  alternatives:
  - in the conspiracy
  - among those conspiring
  lexicon: HALOT
  rationale: From קשר in the sense of conspiracy/treason. The plural participial form denotes the group of plotters, so 'among the conspirators' best captures both membership and the concrete group.
- source_word: עִם
  chosen: with
  alternatives:
  - on the side of
  - together with
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates association with Absalom; 'with' is the most direct rendering.
- source_word: סַכֶּל
  chosen: make ... foolish
  alternatives:
  - frustrate
  - turn into foolishness
  - make ... folly
  lexicon: HALOT
  rationale: The Piel imperative of שכל here asks God to render Ahithophel's counsel foolish or ineffective by making it appear as folly. 'Make Ahithophel’s counsel foolish' preserves the lexical link to folly more transparently than the more interpretive 'frustrate.'
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: נא marks entreaty or urgency in prayer. 'Please' is natural modern English and preserves the petitionary tone without archaism.
- source_word: עֲצַת
  chosen: counsel
  alternatives:
  - advice
  - plan
  lexicon: HALOT
  rationale: עֵצָה often means counsel/advice, especially strategic advice. 'Counsel' fits the political context and preserves the gravity of Ahithophel's role better than the more casual 'advice.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
