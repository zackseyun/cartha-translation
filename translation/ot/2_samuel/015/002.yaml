id: 2SA.15.2
reference: 2 Samuel 15:2
source:
  edition: WLC
  text: וְ/הִשְׁכִּים֙ אַבְשָׁל֔וֹם וְ/עָמַ֕ד עַל יַ֖ד דֶּ֣רֶךְ הַ/שָּׁ֑עַר וַ/יְהִ֡י
    כָּל הָ/אִ֣ישׁ אֲשֶֽׁר יִהְיֶה לּ/וֹ רִיב֩ לָ/ב֨וֹא אֶל הַ/מֶּ֜לֶךְ לַ/מִּשְׁפָּ֗ט
    וַ/יִּקְרָ֨א אַבְשָׁל֤וֹם אֵלָי/ו֙ וַ/יֹּ֗אמֶר אֵֽי מִ/זֶּ֥ה עִיר֙ אַ֔תָּה וַ/יֹּ֕אמֶר
    מֵ/אַחַ֥ד שִׁבְטֵֽי יִשְׂרָאֵ֖ל עַבְדֶּֽ/ךָ־־־־־־־־׃
translation:
  text: Absalom would rise early and stand beside the road to the gate. Whenever any
    man had a dispute and came to the king for judgment, Absalom would call to him
    and say, “From what city are you?” And he would say, “Your servant is from one
    of the tribes of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “had a legal case” for “had a dispute”; the Hebrew רִיב can denote a
      dispute, complaint, or legal case in a judicial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁכִּים
  chosen: would rise early
  alternatives:
  - rose early
  - got up early
  lexicon: HALOT
  rationale: The verb denotes rising early. Given the iterative context across the
    verse, the English habitual 'would rise early' best reflects repeated action rather
    than a single event.
- source_word: וְעָמַד
  chosen: stand
  alternatives:
  - stood
  - take his stand
  lexicon: HALOT
  rationale: Basic sense is 'stand.' Combined with the preceding habitual verb and
    the narrative setting, 'would rise early and stand' conveys Absalom's repeated
    practice.
- source_word: עַל יַד
  chosen: beside
  alternatives:
  - by
  - at the side of
  lexicon: HALOT
  rationale: The idiom literally involves 'at/on the hand of' and commonly means 'beside'
    or 'next to.' 'Beside' is natural English and preserves the spatial sense.
- source_word: דֶּרֶךְ הַשַּׁעַר
  chosen: the road to the gate
  alternatives:
  - the way of the gate
  - the road by the gate
  lexicon: HALOT
  rationale: The construct phrase refers to the approach/road leading to the gate.
    'Road to the gate' is clearer in modern English than the more literal but awkward
    'way of the gate.'
- source_word: וַיְהִי כָּל הָאִישׁ אֲשֶׁר יִהְיֶה־לּוֹ רִיב
  chosen: Whenever any man had a dispute
  alternatives:
  - And it happened that every man who had a case
  - whenever any man had a grievance
  lexicon: HALOT
  rationale: This clause introduces a recurring circumstance. רִיב can mean dispute,
    complaint, or legal case. 'Dispute' fits the judicial context and reads naturally;
    'whenever' captures the iterative force better than a wooden 'and it happened.'
- source_word: לָבוֹא אֶל־הַמֶּלֶךְ לַמִּשְׁפָּט
  chosen: came to the king for judgment
  alternatives:
  - came to the king for justice
  - came to the king for a legal decision
  lexicon: HALOT
  rationale: מִשְׁפָּט in this context is judicial adjudication. 'For judgment' is
    concise and preserves the legal sense without overinterpreting.
- source_word: וַיִּקְרָא ... אֵלָיו
  chosen: Absalom would call to him
  alternatives:
  - called out to him
  - summoned him
  lexicon: HALOT
  rationale: The verb means call/call out. 'Would call to him' matches the habitual
    narrative pattern and avoids the stronger implication of official summons.
- source_word: אֵי מִזֶּה עִיר אַתָּה
  chosen: From what city are you?
  alternatives:
  - Which city are you from?
  - From where, from what city, are you?
  lexicon: HALOT
  rationale: The Hebrew asks literally from what city the man is. 'From what city
    are you?' is direct and idiomatic English.
- source_word: מֵאַחַד שִׁבְטֵי יִשְׂרָאֵל
  chosen: from one of the tribes of Israel
  alternatives:
  - of one of the tribes of Israel
  lexicon: HALOT
  rationale: The reply identifies tribal origin. English normally supplies 'from'
    for clarity, even though the Hebrew construction is compressed.
- source_word: עַבְדֶּךָ
  chosen: Your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the noun can denote slave/servant, here it functions as a conventional
    deferential self-reference in direct address to a royal son. 'Your servant' best
    matches the social register without importing bonded-status emphasis not salient
    in this context.
