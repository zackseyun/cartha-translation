id: 2SA.15.35
reference: 2 Samuel 15:35
source:
  edition: WLC
  text: וַ/הֲ/ל֤וֹא עִמְּ/ךָ֙ שָׁ֔ם צָד֥וֹק וְ/אֶבְיָתָ֖ר הַ/כֹּהֲנִ֑ים וְ/הָיָ֗ה
    כָּל הַ/דָּבָר֙ אֲשֶׁ֤ר תִּשְׁמַע֙ מִ/בֵּ֣ית הַ/מֶּ֔לֶךְ תַּגִּ֕יד לְ/צָד֥וֹק
    וּ/לְ/אֶבְיָתָ֖ר הַ/כֹּהֲנִֽים־׃
translation:
  text: Are not Zadok and Abiathar the priests there with you? And whatever matter
    you hear from the king’s house, you shall report to Zadok and Abiathar the priests.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַהֲלוֹא
  chosen: Are not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Are
    not' preserves the interrogative force and natural English idiom.
- source_word: עִמְּךָ שָׁם
  chosen: there with you
  alternatives:
  - with you there
  lexicon: HALOT
  rationale: Combines the preposition and adverb in a natural English order while
    preserving both location and association.
- source_word: צָדוֹק וְאֶבְיָתָר
  chosen: Zadok and Abiathar
  rationale: Standard English transliterations of the personal names.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: The article is present in Hebrew and identifies Zadok and Abiathar by
    office; 'the priests' is the most direct rendering.
- source_word: וְהָיָה
  chosen: And
  alternatives:
  - Then
  - And it shall be
  lexicon: HALOT
  rationale: Here the verb functions idiomatically to continue the instruction rather
    than to assert existence. Rendering it simply as a connective produces clear English
    without overtranslating a Hebrew discourse feature.
- source_word: כָּל הַדָּבָר אֲשֶׁר
  chosen: whatever matter
  alternatives:
  - everything that
  - every word that
  - whatever thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this espionage/reporting
    context, 'matter' best conveys information or business heard at court without
    narrowing it to spoken words alone.
- source_word: תִּשְׁמַע
  chosen: you hear
  alternatives:
  - you learn
  - you overhear
  lexicon: HALOT
  rationale: The basic sense is 'hear.' 'Learn' is interpretive, and 'overhear' is
    too narrow; 'hear' preserves the source while fitting the context.
- source_word: מִבֵּית הַמֶּלֶךְ
  chosen: from the king’s house
  alternatives:
  - from the royal house
  - from the palace
  lexicon: HALOT
  rationale: Literally 'from the house of the king.' 'The king’s house' preserves
    the Hebrew image and can include the palace/court setting without collapsing it
    into a single modern term.
- source_word: תַּגִּיד
  chosen: you shall report
  alternatives:
  - you shall tell
  - you shall declare
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means to make known or report. 'Report' fits
    the context of relaying intelligence to the priests.
- source_word: לְצָדוֹק וּלְאֶבְיָתָר הַכֹּהֲנִים
  chosen: to Zadok and Abiathar the priests
  alternatives:
  - to the priests Zadok and Abiathar
  lexicon: HALOT
  rationale: Keeps the Hebrew order and appositional identification, maintaining clarity
    and emphasis on their priestly role.
