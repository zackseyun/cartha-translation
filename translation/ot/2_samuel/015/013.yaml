id: 2SA.15.13
reference: 2 Samuel 15:13
source:
  edition: WLC
  text: וַ/יָּבֹא֙ הַ/מַּגִּ֔יד אֶל דָּוִ֖ד לֵ/אמֹ֑ר הָיָ֛ה לֶב אִ֥ישׁ יִשְׂרָאֵ֖ל
    אַחֲרֵ֥י אַבְשָׁלֽוֹם־־׃
translation:
  text: Then a messenger came to David, saying, “The hearts of the men of Israel are
    with Absalom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the heart of the men of Israel is after Absalom,' an
      idiom meaning their loyalty or allegiance has gone over to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The wayyiqtol of בוא advances the narrative with simple past action.
    'Came' is the most natural English narrative equivalent here.
- source_word: הַמַּגִּיד
  chosen: a messenger
  alternatives:
  - the informer
  - the bearer of news
  - the reporter
  lexicon: HALOT
  rationale: From נגד in the Hiphil participial form, this denotes one who brings
    a report. Although formally definite ('the messenger'), English idiom often uses
    the indefinite in introducing a participant of this type, and 'messenger' best
    fits the context of relayed political news.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with the message
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing direct speech.
    'Saying' preserves the Hebrew reporting structure without awkwardness.
- source_word: הָיָה לֶב
  chosen: The hearts ... are with
  alternatives:
  - the heart ... was after
  - the loyalty ... has turned to
  lexicon: HALOT
  rationale: Literally, 'the heart of the men of Israel has become/was after Absalom.'
    In Hebrew, 'heart' can denote inner disposition, will, or allegiance. Because
    אִישׁ is collective here, English plural 'hearts' communicates the distributive
    sense naturally. 'Are with Absalom' expresses the idiom of political allegiance
    in clear modern English while staying close to the source meaning.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, it functions collectively here. Per
    the gender-accurate policy, 'men of Israel' preserves the masculine form and likely
    political/military sense better than the more neutral 'people of Israel.'
- source_word: אַחֲרֵי
  chosen: with
  alternatives:
  - after
  - following
  lexicon: HALOT
  rationale: Literally 'after,' but in this idiom it indicates allegiance or following.
    'With Absalom' is idiomatic English that conveys the political alignment implied
    by the Hebrew.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
