id: 2SA.8.11
reference: 2 Samuel 8:11
source:
  edition: WLC
  text: גַּם אֹתָ֕/ם הִקְדִּ֛ישׁ הַ/מֶּ֥לֶךְ דָּוִ֖ד לַֽ/יהוָ֑ה עִם הַ/כֶּ֤סֶף וְ/הַ/זָּהָב֙
    אֲשֶׁ֣ר הִקְדִּ֔ישׁ מִ/כָּל הַ/גּוֹיִ֖ם אֲשֶׁ֥ר כִּבֵּֽשׁ־־־׃
translation:
  text: King David also dedicated them to the LORD, along with the silver and the
    gold that he had dedicated from all the nations that he had subdued.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conquered.' The Hebrew verb can denote bringing peoples under control
      by force.
    reason: lexical_alternative
  - marker: b
    text: '''Them'' refers to the items mentioned in the previous verse.'
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Adds this verse to the preceding account; 'also' best captures the additive
    force in natural English.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Refers back to the items just mentioned in the previous verse; the pronoun
    should remain generic in English rather than be over-specified in the main text.
- source_word: הִקְדִּישׁ
  chosen: dedicated
  alternatives:
  - consecrated
  - set apart as holy
  lexicon: HALOT
  rationale: In this context of valuables devoted to God, 'dedicated' is clear modern
    English and preserves the cultic sense without sounding overly technical.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: Standard English rendering of the royal title plus name.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' in the main text.
- source_word: עִם
  chosen: along with
  alternatives:
  - with
  lexicon: HALOT
  rationale: Smoothly links 'them' with the previously dedicated silver and gold,
    making the coordination explicit in idiomatic English.
- source_word: הַכֶּסֶף וְהַזָּהָב
  chosen: the silver and the gold
  alternatives:
  - the silver and gold
  lexicon: HALOT
  rationale: Retains the Hebrew articles while remaining natural English; these are
    specific stores of precious metals.
- source_word: אֲשֶׁר הִקְדִּישׁ
  chosen: that he had dedicated
  alternatives:
  - which he dedicated
  lexicon: HALOT
  rationale: 'Pluperfect sense fits the discourse: these metals had already been dedicated
    from prior victories.'
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - out of all the nations
  - from all the peoples
  lexicon: HALOT
  rationale: מִן marks source/origin; 'nations' is the standard rendering of גּוֹיִם
    here in a geopolitical context.
- source_word: אֲשֶׁר כִּבֵּשׁ
  chosen: that he had subdued
  alternatives:
  - that he had conquered
  lexicon: HALOT
  rationale: כָּבַשׁ can mean 'subdue' or 'conquer.' 'Subdued' fits the broader military-political
    context and avoids overstating permanent annexation, while still conveying decisive
    victory.
