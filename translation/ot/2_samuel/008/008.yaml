id: 2SA.8.8
reference: 2 Samuel 8:8
source:
  edition: WLC
  text: וּ/מִ/בֶּ֥טַח וּ/מִ/בֵּֽרֹתַ֖י עָרֵ֣י הֲדַדְעָ֑זֶר לָקַ֞ח הַ/מֶּ֧לֶךְ דָּוִ֛ד
    נְחֹ֖שֶׁת הַרְבֵּ֥ה מְאֹֽד׃ס
translation:
  text: And from Betah and from Berothai, cities of Hadadezer, King David took a very
    great amount of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel account in 1 Chronicles 18:8 names these places as Tibhath
      and Cun; this verse's Hebrew text reads Betah and Berothai.
    reason: cross_reference
  - marker: b
    text: Or 'Berothah,' reflecting a related place-name form in some translations.
    reason: lexical_alternative
  - marker: c
    text: Or 'copper'; the Hebrew term can refer to copper or bronze, depending on
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בֶּטַח
  chosen: and from Betah
  alternatives:
  - and from Tebah
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are rendered straightforwardly
    as 'and from.' The place name is transliterated as 'Betah' following the Hebrew
    form here. Because the parallel in 1 Chronicles 18:8 has 'Tibhath/Tebah,' that
    alternative is worth preserving in a footnote as a cross-text naming difference,
    but the main text follows the MT of this verse.
- source_word: וּ/מִ/בֵּרֹתַי
  chosen: and from Berothai
  alternatives:
  - and from Berothah
  lexicon: HALOT
  rationale: Rendered with the same conjunction-preposition pattern and transliterated
    as a place name. The Hebrew form points to 'Berothai'; some English traditions
    use 'Berothah' based on related forms, so that is preserved as an alternative.
- source_word: עָרֵי הֲדַדְעָזֶר
  chosen: cities of Hadadezer
  alternatives:
  - towns of Hadadezer
  lexicon: HALOT
  rationale: 'Construct chain indicating possession or association: these were cities
    belonging to or under Hadadezer. ''Cities'' is the standard rendering for עָרִים
    and fits the military-geographical context.'
- source_word: לָקַח
  chosen: took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: The basic sense of לקח is 'take.' In context of war booty, 'took' is
    sufficiently natural and avoids over-interpreting whether the focus is military
    capture of the cities or removal of materials from them.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as the title
    plus name, 'King David.'
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In historical
    and biblical English, 'bronze' is the conventional and likely intended sense for
    metal taken as spoil and later used for temple furnishings (cf. 1 Chr 18:8). The
    alternative 'copper' is possible but less likely in this context.
- source_word: הַרְבֵּה מְאֹד
  chosen: a very great amount of
  alternatives:
  - very much
  - in great abundance
  lexicon: HALOT
  rationale: The infinitive absolute/adverbial intensification expresses quantity
    emphatically. 'A very great amount of' communicates abundant quantity in natural
    modern English while preserving the emphasis.
