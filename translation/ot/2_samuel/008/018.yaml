id: 2SA.8.18
reference: 2 Samuel 8:18
source:
  edition: WLC
  text: וּ/בְנָיָ֨הוּ֙ בֶּן יְה֣וֹיָדָ֔ע וְ/הַ/כְּרֵתִ֖י וְ/הַ/פְּלֵתִ֑י וּ/בְנֵ֥י
    דָוִ֖ד כֹּהֲנִ֥ים הָיֽוּ־׃פ
translation:
  text: Benaiah son of Jehoiada was over the Kerethites and the Pelethites, and David’s
    sons were priests.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief ministers' or 'royal officials.' The Hebrew word is the usual
      term for 'priests,' but some understand it here in a broader courtly sense because
      the context concerns royal administration.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנָיָהוּ בֶּן־יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions, following
    the project's policy to transliterate names rather than translate them.
- source_word: וְהַכְּרֵתִי
  chosen: the Kerethites
  alternatives:
  - the Cherethites
  lexicon: HALOT
  rationale: The term is a gentilic/group designation. 'Kerethites' reflects a direct
    transliteration from the Hebrew consonants; 'Cherethites' is the more traditional
    English form. The main text keeps the Hebrew form transparent, while the traditional
    form is preserved as an alternative.
- source_word: וְהַפְּלֵתִי
  chosen: the Pelethites
  lexicon: HALOT
  rationale: This is a group designation paired with 'Kerethites.' A straightforward
    transliteration best preserves the source term without over-interpreting its ethnic
    or military identity.
- source_word: כֹּהֲנִים
  chosen: priests
  alternatives:
  - chief ministers
  - royal officials
  lexicon: HALOT
  rationale: The plain lexical sense of כֹּהֲנִים is 'priests.' Although in this context
    some argue for a broader court-office sense because David's sons were not Levitical
    priests in the cultic sense, the translation philosophy prioritizes the source
    text's plain sense. The contextual alternative is preserved in a footnote rather
    than replacing the lexical meaning in the main text.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - served as
  lexicon: HALOT
  rationale: The Qal perfect of היה is the ordinary copula 'were.' English requires
    supplying the implied predication naturally. 'Served as' is interpretive and therefore
    left as an alternative nuance, not adopted in the main text.
