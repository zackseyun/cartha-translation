theological_decisions:
- issue: Meaning of David’s sons being called כֹּהֲנִים
  chosen_reading: Retain the formal rendering 'priests' in the main text, with a footnote
    noting the possible sense 'chief ministers' or 'royal officials.'
  alternative_readings:
  - David’s sons were chief ministers
  - David’s sons were royal officials
  rationale: This verse presents a historical and theological tension, since elsewhere
    priestly office is restricted and David’s sons are not ordinarily understood as
    cultic priests. Per the translation philosophy, the draft preserves the lexical
    force of the Hebrew rather than resolving the tension in translation. The interpretive
    alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 3, 5
