id: 2SA.8.5
reference: 2 Samuel 8:5
source:
  edition: WLC
  text: וַ/תָּבֹא֙ אֲרַ֣ם דַּמֶּ֔שֶׂק לַ/עְזֹ֕ר לַ/הֲדַדְעֶ֖זֶר מֶ֣לֶךְ צוֹבָ֑ה וַ/יַּ֤ךְ
    דָּוִד֙ בַּֽ/אֲרָ֔ם עֶשְׂרִֽים וּ/שְׁנַ֥יִם אֶ֖לֶף אִֽישׁ־׃
translation:
  text: And Aram of Damascus came to help Hadadezer king of Zobah, and David struck
    down twenty-two thousand men of the Arameans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֲרַם is rendered 'Aram' rather than the traditional 'Syria'; it
      refers to the Aramean kingdom centered at Damascus.
    reason: lexical_alternative
  - marker: b
    text: Hadadezer is spelled 'Hadarezer' in some passages and translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence is most naturally rendered 'came.'
    English supplies smooth past narrative sense.
- source_word: אֲרַם דַּמֶּשֶׂק
  chosen: Aram of Damascus
  alternatives:
  - the Arameans of Damascus
  - Syria of Damascus
  - Damascus-Aram
  lexicon: HALOT
  rationale: אֲרַם can denote the Aramean polity/people rather than the later conventional
    English 'Syria.' Following original-language primacy, 'Aram' avoids importing
    the later geopolitical label. 'Of Damascus' identifies the Aramean kingdom centered
    there.
- source_word: לַעְזֹר
  chosen: to help
  alternatives:
  - to assist
  - to come to the aid of
  lexicon: HALOT
  rationale: עזר straightforwardly means 'help/assist.' 'To help' is the clearest
    modern English rendering.
- source_word: לַהֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  lexicon: HALOT
  rationale: Personal name is transliterated by standard convention from the consonantal
    form here. An alternate spelling exists in some passages/traditions and is worth
    preserving in a footnote.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  alternatives:
  - the king of Zobah
  lexicon: HALOT
  rationale: Construct chain is naturally rendered 'king of Zobah.' English article
    is unnecessary before the title in apposition to the proper name.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - defeated
  - killed
  - struck
  lexicon: HALOT
  rationale: נכה in military context often denotes a decisive blow, frequently involving
    killing. 'Struck down' preserves the force without over-specifying beyond the
    context.
- source_word: בַּאֲרָם
  chosen: of the Arameans
  alternatives:
  - among Aram
  - in Aram
  - Aram
  lexicon: HALOT
  rationale: With נכה plus ב, the phrase likely marks the group against whom David
    struck. Since the following count is 'men,' idiomatic English is 'of the Arameans'
    rather than the less natural 'in Aram.'
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף אִישׁ
  chosen: twenty-two thousand men
  alternatives:
  - twenty-two thousand
  - twenty-two thousand soldiers
  lexicon: HALOT
  rationale: The numeral phrase explicitly includes אִישׁ, literally 'man/men.' Per
    gender-accurate policy, 'men' is retained rather than neutralizing to 'people';
    'soldiers' would be interpretive though context implies combatants.
