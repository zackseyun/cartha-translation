id: 2SA.8.1
reference: 2 Samuel 8:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַֽחֲרֵי כֵ֔ן וַ/יַּ֥ךְ דָּוִ֛ד אֶת פְּלִשְׁתִּ֖ים וַ/יַּכְנִיעֵ֑/ם
    וַ/יִּקַּ֥ח דָּוִ֛ד אֶת מֶ֥תֶג הָ/אַמָּ֖ה מִ/יַּ֥ד פְּלִשְׁתִּֽים־־־׃
translation:
  text: And after this, David struck the Philistines and subdued them, and David took
    the bridle of the mother city from the hand of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the bridle of the mother city,' a difficult phrase. It may refer
      idiomatically to control of the chief city; compare 1 Chronicles 18:1, which
      reads 'Gath and its daughter towns.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: And after this
  alternatives:
  - And it happened after this
  - Afterward
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces narrative sequence. 'And after
    this' preserves the temporal transition in readable modern English without the
    overly wooden 'and it happened.'
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - attacked
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite' and in military narrative can imply
    defeat. 'Struck' keeps the concrete verbal force while allowing the following
    verb to specify the result.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: וַיַּכְנִיעֵם
  chosen: subdued them
  alternatives:
  - humbled them
  - brought them into subjection
  lexicon: HALOT
  rationale: כנע in the Hiphil means to subdue or bring into subjection. 'Subdued
    them' is natural English and captures the military-political result.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' 'Took' is sufficiently broad and lets
    the object phrase carry the interpretive difficulty.
- source_word: מֶתֶג הָאַמָּה
  chosen: the bridle of the mother city
  alternatives:
  - the bridle of the metropolis
  - the chief city
  - Metheg-ammah
  lexicon: HALOT
  rationale: The phrase is difficult and likely idiomatic. מֶתֶג literally means 'bridle,'
    and אַמָּה can mean 'mother' and by extension a mother-city/chief city. Rather
    than importing the interpretive equivalent 'chief city' into the main text, this
    rendering preserves the Hebrew imagery while signaling the likely urban-political
    sense in a footnote. 'Metheg-ammah' is possible as a place-name-like transliteration
    but obscures meaning for English readers.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom literally reads 'from the hand of.' Retaining it preserves
    the Hebrew expression of control or possession and remains intelligible in English.
