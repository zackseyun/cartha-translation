id: 2SA.8.4
reference: 2 Samuel 8:4
source:
  edition: WLC
  text: וַ/יִּלְכֹּ֨ד דָּוִ֜ד מִמֶּ֗/נּוּ אֶ֤לֶף וּ/שְׁבַע מֵאוֹת֙ פָּרָשִׁ֔ים וְ/עֶשְׂרִ֥ים
    אֶ֖לֶף אִ֣ישׁ רַגְלִ֑י וַ/יְעַקֵּ֤ר דָּוִד֙ אֶת כָּל הָ/רֶ֔כֶב וַ/יּוֹתֵ֥ר מִמֶּ֖/נּוּ
    מֵ֥אָה רָֽכֶב־־־׃
translation:
  text: David captured from him 1,700 horsemen and 20,000 foot soldiers. Then David
    hamstrung all the chariot horses, but left enough for 100 chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text reads '1,700 horsemen.' The parallel in 1 Chronicles 18:4
      reads '7,000 horsemen.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'all the chariot force'; the translation makes explicit that the
      horses were hamstrung, since that is the action described.
    reason: lexical_alternative
  - marker: c
    text: Or 'but left enough of them for 100 chariots'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - seized
  - took captive
  lexicon: HALOT
  rationale: The verb לכד commonly means to capture or seize in battle. 'Captured'
    is natural military English and fits the direct object of troops taken from Hadadezer.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The suffix is singular in the consonantal text and contextually refers
    to Hadadezer as the defeated king. English keeps the singular reference.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת פָּרָשִׁים
  chosen: 1,700 horsemen
  alternatives:
  - 1,700 cavalrymen
  - 1,000 and 700 horsemen
  lexicon: HALOT
  rationale: פָּרָשִׁים denotes horsemen/cavalry. 'Horsemen' is a straightforward
    rendering. The numeral is rendered idiomatically as 1,700. This follows the MT
    of Samuel, while the parallel in 1 Chronicles 18:4 reads 7,000 horsemen; that
    alternative is preserved in a footnote as a textual variant.
- source_word: וְעֶשְׂרִים אֶלֶף אִישׁ רַגְלִי
  chosen: 20,000 foot soldiers
  alternatives:
  - 20,000 infantry
  - 20,000 men on foot
  lexicon: HALOT
  rationale: Literally '20,000 man of foot.' 'Foot soldiers' communicates the military
    sense clearly in modern English while preserving the contrast with horsemen.
- source_word: וַיְעַקֵּר
  chosen: hamstrung
  alternatives:
  - disabled
  - houghed
  lexicon: HALOT
  rationale: The verb עקר in this context refers to disabling horses by cutting the
    hamstrings. 'Hamstrung' is the standard clear English equivalent; 'houghed' is
    archaic.
- source_word: אֶת כָּל הָרֶכֶב
  chosen: all the chariot horses
  alternatives:
  - all the chariots
  lexicon: HALOT
  rationale: Although רֶכֶב often means 'chariot(s),' in this collocation with hamstringing
    it must refer metonymically to the horses attached to the chariot force, since
    chariots themselves are not hamstrung. The translation makes the implied referent
    explicit for intelligibility.
- source_word: וַיּוֹתֵר מִמֶּנּוּ
  chosen: left enough of them
  alternatives:
  - spared some of them
  - left from them
  lexicon: HALOT
  rationale: The verb יתר in the hiphil means to leave over, spare, or reserve. Because
    the antecedent is the chariot force/horses, 'left enough of them' idiomatically
    prepares for the following number.
- source_word: מֵאָה רָכֶב
  chosen: for 100 chariots
  alternatives:
  - 100 chariot teams
  - 100 chariots
  lexicon: HALOT
  rationale: Since the previous clause concerns hamstringing the animals of the chariot
    corps, the remaining force is best understood as enough horses to maintain 100
    chariots. This avoids the awkward impression that literal vehicles were left after
    horses were hamstrung.
