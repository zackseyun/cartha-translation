id: 2SA.8.12
reference: 2 Samuel 8:12
source:
  edition: WLC
  text: מֵ/אֲרָ֤ם וּ/מִ/מּוֹאָב֙ וּ/מִ/בְּנֵ֣י עַמּ֔וֹן וּ/מִ/פְּלִשְׁתִּ֖ים וּ/מֵֽ/עֲמָלֵ֑ק
    וּ/מִ/שְּׁלַ֛ל הֲדַדְעֶ֥זֶר בֶּן רְחֹ֖ב מֶ֥לֶךְ צוֹבָֽה־׃
translation:
  text: from Aram, and from Moab, and from the Ammonites, and from the Philistines,
    and from Amalek, and from the spoil of Hadadezer son of Rehob, king of Zobah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֲרָם, traditionally rendered 'Syria.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: c
    text: Some passages spell the name 'Hadarezer.'
    reason: textual_variant
lexical_decisions:
- source_word: מֵאֲרָם
  chosen: from Aram
  alternatives:
  - from Syria
  lexicon: HALOT
  rationale: אֲרָם is the proper name of the Aramean region/people. 'Aram' preserves
    the Hebrew name rather than replacing it with the later geopolitical label 'Syria.'
- source_word: וּמִמּוֹאָב
  chosen: and from Moab
  lexicon: HALOT
  rationale: Proper name of the nation/territory; straightforward source of dedicated
    items.
- source_word: וּמִבְּנֵי עַמּוֹן
  chosen: and from the Ammonites
  alternatives:
  - and from the sons of Ammon
  - and from the people of Ammon
  lexicon: HALOT
  rationale: Literally 'from the sons of Ammon.' In idiomatic English, 'the Ammonites'
    accurately conveys the ethnic/national referent while preserving the sense.
- source_word: וּמִפְּלִשְׁתִּים
  chosen: and from the Philistines
  lexicon: HALOT
  rationale: Ethnonym rendered by its standard English form.
- source_word: וּמֵעֲמָלֵק
  chosen: and from Amalek
  alternatives:
  - and from the Amalekites
  lexicon: HALOT
  rationale: The Hebrew uses the proper name עֲמָלֵק rather than an explicit gentilic
    form. 'From Amalek' stays closer to the source while still naturally denoting
    the Amalekite sphere/people.
- source_word: וּמִשְּׁלַל
  chosen: and from the spoil
  alternatives:
  - and from plunder
  - and from booty
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' is concise and idiomatic in
    this military context; 'plunder' is possible but can sound more verbal than nominal
    here.
- source_word: הֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  lexicon: HALOT
  rationale: Transliteration follows the consonantal form in this verse. The variant
    spelling 'Hadarezer' appears elsewhere and is worth preserving as a textual/name
    variant.
- source_word: בֶּן רְחֹב
  chosen: son of Rehob
  lexicon: HALOT
  rationale: Standard filial construction; rendered formally and transparently.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  lexicon: HALOT
  rationale: Royal title plus place name; 'Zobah' is transliterated as a proper name
    in keeping with the translation philosophy.
