theological_decisions:
- issue: Nature of David's treatment of Moab in the measuring formula
  chosen_reading: Retain the literal measuring imagery and the death/life allocation
    without softening or reconstructing beyond the Hebrew.
  alternative_readings:
  - Interpret the line figuratively as a general statement of subjugation
  - Specify that one-third were spared in the main text
  rationale: The Hebrew presents a grim, concrete procedure involving measured groups
    assigned to death and life. The translation preserves that severity without importing
    a more interpretive paraphrase. While the ratio implied is commonly understood
    as two portions killed and one spared, the wording is kept close to the source
    rather than converting it into an explicit fraction in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
