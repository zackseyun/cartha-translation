id: 2SA.8.2
reference: 2 Samuel 8:2
source:
  edition: WLC
  text: וַ/יַּ֣ךְ אֶת מוֹאָ֗ב וַֽ/יְמַדְּדֵ֤/ם בַּ/חֶ֨בֶל֙ הַשְׁכֵּ֣ב אוֹתָ֣/ם אַ֔רְצָ/ה
    וַ/יְמַדֵּ֤ד שְׁנֵֽי חֲבָלִים֙ לְ/הָמִ֔ית וּ/מְלֹ֥א הַ/חֶ֖בֶל לְ/הַחֲי֑וֹת וַ/תְּהִ֤י
    מוֹאָב֙ לְ/דָוִ֔ד לַ/עֲבָדִ֖ים נֹשְׂאֵ֥י מִנְחָֽה־־׃
translation:
  text: He struck Moab and measured them with a line, making them lie down on the
    ground. He measured off two lengths of line for death and a full length of line
    for life. So Moab became David’s servants, bringing tribute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a cord' or 'with a measuring line.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew describes David measuring the Moabites while they lay on the
      ground: two measured portions were assigned ''for death'' and one full portion
      ''for life,'' implying that some were executed and others spared.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּךְ
  chosen: He struck
  alternatives:
  - He defeated
  - He attacked
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike/smite.' 'He struck' preserves the
    concrete military action without over-interpreting it as a complete defeat, though
    defeat is implied by context.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/people name, following the philosophy
    of transliterating names.
- source_word: וַיְמַדְּדֵם
  chosen: and measured them
  alternatives:
  - and measured them off
  lexicon: HALOT
  rationale: The piel of מדד means 'measure.' The object suffix refers to the Moabites.
    'Measured them' keeps the starkness of the Hebrew and allows the following specification
    with the line to explain the action.
- source_word: בַּחֶבֶל
  chosen: with a line
  alternatives:
  - with a cord
  - with a measuring line
  lexicon: HALOT
  rationale: חבל can denote a cord/rope/line. Here it is an instrument of measuring,
    so 'line' is concise and natural; the measuring sense is reinforced by the repeated
    verb.
- source_word: הַשְׁכֵּב אֹתָם אַרְצָה
  chosen: making them lie down on the ground
  alternatives:
  - after making them lie down on the ground
  - causing them to lie on the ground
  lexicon: HALOT
  rationale: The infinitive/causative construction describes how the measuring was
    carried out. 'Making them lie down on the ground' is idiomatic and preserves the
    procedural force.
- source_word: וַיְמַדֵּד שְׁנֵי חֲבָלִים
  chosen: He measured off two lengths of line
  alternatives:
  - He measured two lines
  - He measured off two cords
  lexicon: HALOT
  rationale: The phrase refers to two measured portions marked by the line. 'Lengths
    of line' clarifies that the line is the measuring standard, not necessarily two
    separate ropes.
- source_word: לְהָמִית
  chosen: for death
  alternatives:
  - to put to death
  - for killing
  lexicon: HALOT
  rationale: The lamed expresses purpose/result. 'For death' mirrors the terse Hebrew
    parallelism with the following phrase and avoids adding unnecessary words.
- source_word: וּמְלֹא הַחֶבֶל
  chosen: and a full length of line
  alternatives:
  - and one full line
  - and the full line
  lexicon: HALOT
  rationale: מְלֹא means fullness/full amount. The Hebrew lacks an explicit numeral;
    'a full length of line' best conveys one complete measured portion in contrast
    to the two portions assigned to death.
- source_word: לְהַחֲיוֹת
  chosen: for life
  alternatives:
  - to spare alive
  - to let live
  lexicon: HALOT
  rationale: The hiphil of חיה means 'keep alive, let live.' 'For life' preserves
    the concise antithesis with 'for death,' while the context makes clear this means
    sparing them.
- source_word: וַתְּהִי מוֹאָב לְדָוִד לַעֲבָדִים
  chosen: So Moab became David’s servants
  alternatives:
  - And Moab became servants to David
  - So Moab became subject to David as servants
  lexicon: HALOT
  rationale: The construction indicates subjugation. 'Servants' is the most direct
    rendering of עֲבָדִים here; 'slaves' would overstate the social nuance in this
    political context, where vassalage is in view.
- source_word: נֹשְׂאֵי מִנְחָה
  chosen: bringing tribute
  alternatives:
  - bearing tribute
  - bringing an offering
  lexicon: HALOT
  rationale: מִנְחָה in royal-political contexts refers to tribute rather than a cultic
    offering. 'Bringing tribute' expresses the ongoing vassal obligation in natural
    English.
