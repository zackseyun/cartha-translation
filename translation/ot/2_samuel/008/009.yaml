id: 2SA.8.9
reference: 2 Samuel 8:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֕ע תֹּ֖עִי מֶ֣לֶךְ חֲמָ֑ת כִּ֚י הִכָּ֣ה דָוִ֔ד אֵ֖ת כָּל חֵ֥יל
    הֲדַדְעָֽזֶר־׃
translation:
  text: When Toi king of Hamath heard that David had struck down all the army of Hadadezer,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel passage in 1 Chronicles 18:9 reads the king's name as 'Tou.'
      The Hebrew text here reads 'Toi.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: HALOT
  rationale: The waw-consecutive verb from שׁמע introduces the next event in narrative
    sequence. 'Heard' is the most direct and natural English rendering; 'learned'
    is possible but slightly more interpretive.
- source_word: תֹּעִי
  chosen: Toi
  alternatives:
  - Tou
  lexicon: HALOT
  rationale: Personal names are transliterated. The MT here reads Toi; the parallel
    in 1 Chronicles 18:9 has Tou. The main text follows the verse's Hebrew form, with
    the parallel form preserved in a footnote.
- source_word: מֶלֶךְ חֲמָת
  chosen: king of Hamath
  lexicon: HALOT
  rationale: A straightforward construct chain identifying Toi's royal office and
    realm. 'Hamath' is the standard English transliteration of the place name.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Toi heard, so 'that' best fits
    the syntax. 'Because' would shift it toward causal explanation rather than reported
    content.
- source_word: הִכָּה
  chosen: had struck down
  alternatives:
  - had defeated
  - had smitten
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'strike down' in military contexts. 'Had
    struck down' preserves the concrete force of the Hebrew while fitting the English
    past-perfect relation after 'heard that.' 'Defeated' is possible but less literal
    and may understate the violent sense.
- source_word: אֵת כָּל חֵיל
  chosen: all the army
  alternatives:
  - all the force
  - all the host
  - all the troops
  lexicon: HALOT
  rationale: חַיִל in this context refers to military strength/forces. 'Army' is the
    clearest modern English equivalent. 'All the army' reflects כָּל with the collective
    noun.
- source_word: הֲדַדְעָזֶר
  chosen: Hadadezer
  alternatives:
  - Hadad-ezer
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
