id: 2SA.8.14
reference: 2 Samuel 8:14
source:
  edition: WLC
  text: וַ/יָּ֨שֶׂם בֶּ/אֱד֜וֹם נְצִבִ֗ים בְּ/כָל אֱדוֹם֙ שָׂ֣ם נְצִבִ֔ים וַ/יְהִ֥י כָל אֱד֖וֹם עֲבָדִ֣ים לְ/דָוִ֑ד וַ/יּ֤וֹשַׁע יְהוָה֙ אֶת דָּוִ֔ד בְּ/כֹ֖ל אֲשֶׁ֥ר הָלָֽךְ־־־׃
translation:
  text: He placed garrisons in Edom; throughout all Edom he placed garrisons, and all Edom became servants to David. And Yahweh gave David victory wherever he went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Edomites became servants to David.' The Hebrew says 'all Edom became slaves/servants to David,' using the nation name collectively for its people.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD saved/delivered David wherever he went.' In this military context, 'gave David victory' brings out the sense of deliverance in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם / שָׂם
  chosen: placed
  alternatives:
  - set
  - stationed
  lexicon: HALOT
  rationale: The verb שׂים broadly means 'put, set, place.' 'Placed' is natural modern English and fits the military object 'garrisons' without overinterpreting; 'stationed' is possible but slightly more specific than the base verb.
- source_word: נְצִבִים
  chosen: garrisons
  alternatives:
  - governors
  - prefects
  - military posts
  lexicon: HALOT
  rationale: In this military-conquest context, נְצִבִים refers to stationed officials/forces established to control territory. 'Garrisons' best captures the likely military sense here, especially with repetition in Edom after David's campaign. 'Governors' is possible in some contexts but is less likely here.
- source_word: בֶּאֱדוֹם / בְּכָל אֱדוֹם
  chosen: in Edom / throughout all Edom
  alternatives:
  - among Edom
  - throughout Edom
  lexicon: HALOT
  rationale: The preposition ב marks location. Rendering the second phrase as 'throughout all Edom' preserves the distributive force of בְכָל while reading naturally in English.
- source_word: וַיְהִי כָל אֱדוֹם עֲבָדִים לְדָוִד
  chosen: all Edom became slaves to David
  alternatives:
  - all the Edomites became servants to David
  - all Edom became subject to David
  lexicon: HALOT
  rationale: עֲבָדִים is the plural of עֶבֶד, denoting servile subjection. In a conquest setting, the bonded/subjugated sense is salient, so 'slaves' better reflects the force than the softer 'servants.' 'All Edom' is a collective national expression preserved from the Hebrew.
- source_word: וַיּוֹשַׁע
  chosen: gave ... victory
  alternatives:
  - saved
  - delivered
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means 'save, deliver, give victory.' In this military summary, 'gave David victory' communicates the contextual sense clearly in idiomatic English while preserving divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  chosen: wherever he went
  alternatives:
  - in all that he went
  - wherever he marched
  lexicon: HALOT
  rationale: This idiom expresses comprehensive success in David's undertakings or movements. 'Wherever he went' is the most natural equivalent and avoids adding the more military-specific 'marched,' which the verb itself does not require.
