id: 2SA.8.7
reference: 2 Samuel 8:7
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח דָּוִ֗ד אֵ֚ת שִׁלְטֵ֣י הַ/זָּהָ֔ב אֲשֶׁ֣ר הָי֔וּ אֶ֖ל עַבְדֵ֣י
    הֲדַדְעָ֑זֶר וַ/יְבִיאֵ֖/ם יְרוּשָׁלִָֽם׃
translation:
  text: And David took the shields of gold that belonged to the servants of Hadadezer
    and brought them to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the golden shields'; the Hebrew may also be understood more literally
      as 'the shields of gold.' A minority view takes the term as 'quivers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: The verb לקח in narrative commonly means 'take.' 'Took' is the most natural
    and sufficiently broad English rendering here, without adding the stronger nuance
    of violent seizure unless context requires it.
- source_word: שִׁלְטֵי הַזָּהָב
  chosen: the shields of gold
  alternatives:
  - the golden shields
  - the quivers of gold
  lexicon: HALOT
  rationale: שלטים is traditionally understood here as shields or pieces of defensive
    armor, matching the military-plunder context and parallel in 1 Kings 14:26. 'Shields
    of gold' stays close to the Hebrew construct. 'Golden shields' is possible stylistically;
    'quivers' is a minority lexical proposal but less likely in context.
- source_word: אֲשֶׁר הָיוּ אֶל
  chosen: that belonged to
  alternatives:
  - that were with
  - that were on
  - that were for
  lexicon: HALOT
  rationale: The combination expresses possession or association rather than mere
    location in this context. 'Belonged to' communicates that these gold shields were
    in the possession of Hadadezer's servants.
- source_word: עַבְדֵי הֲדַדְעָזֶר
  chosen: the servants of Hadadezer
  alternatives:
  - the officials of Hadadezer
  - the slaves of Hadadezer
  lexicon: HALOT
  rationale: עבדים can denote servants, officials, or slaves depending on context.
    Here it most likely refers to royal retainers/court servants rather than chattel
    slaves, so 'servants' is the best contextual rendering.
- source_word: וַיְבִיאֵם
  chosen: and brought them
  alternatives:
  - and carried them
  - and brought these
  lexicon: HALOT
  rationale: בוא in the Hiphil commonly means 'bring.' The pronominal suffix is represented
    by 'them,' referring to the shields.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
