id: 2SA.8.3
reference: 2 Samuel 8:3
source:
  edition: WLC
  text: וַ/יַּ֣ךְ דָּוִ֔ד אֶת הֲדַדְעֶ֥זֶר בֶּן רְחֹ֖ב מֶ֣לֶךְ צוֹבָ֑ה בְּ/לֶכְתּ֕/וֹ
    לְ/הָשִׁ֥יב יָד֖/וֹ בִּֽ/נְהַר־־־׃
translation:
  text: David struck down Hadadezer son of Rehob, king of Zobah, when he went to restore
    his power at the River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hadadezer''; some textual traditions and the parallel in 1 Chronicles
      read ''Hadarezer.'''
    reason: textual_variant
  - marker: b
    text: Or 'to recover his control' or 'to reestablish his dominion'; literally,
      'to restore his hand.'
    reason: lexical_alternative
  - marker: c
    text: That is, likely the Euphrates River.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - defeated
  - struck
  lexicon: HALOT
  rationale: The verb נכה commonly denotes striking in battle and often implies defeat.
    'Struck down' preserves the military force better than the weaker 'struck,' while
    avoiding overprecision such as 'killed,' which the verse itself does not state.
- source_word: הֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  rationale: Personal names are transliterated. The WLC form here supports 'Hadadezer.'
    The variant 'Hadarezer' appears elsewhere in the textual tradition and in parallel
    passages, so it is preserved in a footnote as an alternative form of the name.
- source_word: בֶּן רְחוֹב
  chosen: son of Rehob
  rationale: A straightforward patronymic construction; 'son of' is retained rather
    than reduced to 'the son of' or omitted.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  rationale: Construct chain rendered directly. 'Zobah' is a place name and is transliterated.
- source_word: בְּלֶכְתּוֹ
  chosen: when he went
  alternatives:
  - as he went
  - when he was going
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב can express temporal circumstance.
    'When he went' is natural English and preserves the temporal sense.
- source_word: לְהָשִׁיב
  chosen: to restore
  alternatives:
  - to recover
  - to reestablish
  lexicon: HALOT
  rationale: The hiphil of שוב here means to cause to return or restore. 'Restore'
    is broad enough to preserve the ambiguity of what is being restored without overinterpreting.
- source_word: יָדוֹ
  chosen: his power
  alternatives:
  - his hand
  - his control
  - his dominion
  lexicon: HALOT
  rationale: Hebrew 'hand' often functions idiomatically for power or control. In
    this military-political context, 'restore his power' communicates the idiom's
    sense in readable English better than the opaque 'restore his hand.' The more
    specific 'dominion' is possible but slightly more interpretive.
- source_word: בִּנְהַר
  chosen: at the River
  alternatives:
  - at the Euphrates River
  - by the river
  lexicon: HALOT
  rationale: With נהר used absolutely and with the article implied by context, the
    phrase likely refers to the great river, the Euphrates. The main text keeps the
    more literal 'the River,' while a footnote preserves the likely identification
    for clarity.
