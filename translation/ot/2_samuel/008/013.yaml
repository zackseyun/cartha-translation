theological_decisions:
- issue: Identity of the defeated enemy
  chosen_reading: Aram in the main text, with Edom preserved in a footnote as a textual/canonical
    alternative.
  alternative_readings:
  - Edom
  rationale: The MT of 2 Samuel 8:13 reads 'Aram,' but the parallel in 1 Chronicles
    18:12 and the broader context of the Valley of Salt point to Edom. The translation
    follows the provided Hebrew source text in the main line while preserving the
    significant alternative in a footnote for transparency.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension/alternatives in footnotes)
