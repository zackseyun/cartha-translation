id: 2SA.8.13
reference: 2 Samuel 8:13
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ דָּוִד֙ שֵׁ֔ם בְּ/שֻׁב֕/וֹ מֵ/הַכּוֹת֥/וֹ אֶת אֲרָ֖ם בְּ/גֵיא
    מֶ֑לַח שְׁמוֹנָ֥ה עָשָׂ֖ר אָֽלֶף־־׃
translation:
  text: And David made a name for himself when he returned from striking down Aram
    in the Valley of Salt—eighteen thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses and the parallel in 1 Chronicles 18:12 point to 'Edom' rather
      than 'Aram.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - won
  - gained
  lexicon: HALOT
  rationale: The idiom עשה שם is literally 'make a name,' meaning to gain renown.
    'Made' preserves the Hebrew idiom while remaining natural in English.
- source_word: שֵׁם
  chosen: a name for himself
  alternatives:
  - renown
  - fame
  lexicon: HALOT
  rationale: In the idiom עשה שם, שֵׁם refers to reputation or renown. 'A name for
    himself' keeps the idiomatic force and the reflexive sense implied by context.
- source_word: בְּשֻׁבוֹ
  chosen: when he returned
  alternatives:
  - on his return
  - as he returned
  lexicon: HALOT
  rationale: The preposition with infinitive construct plus suffix is temporal. 'When
    he returned' is clear modern English and fits the narrative sequence.
- source_word: מֵהַכּוֹתוֹ
  chosen: from striking down
  alternatives:
  - after striking down
  - from defeating
  lexicon: HALOT
  rationale: The construction marks the action from which he returned. 'Striking down'
    reflects the verbal force of נכה without overinterpreting the manner of defeat.
- source_word: אֶת אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The proper name is singular in Hebrew and is best transliterated as 'Aram'
    rather than the later geopolitical term 'Syria.' 'The Arameans' is interpretive;
    the text names the polity/people as Aram.
- source_word: בְּגֵיא מֶלַח
  chosen: in the Valley of Salt
  alternatives:
  - at the Valley of Salt
  lexicon: HALOT
  rationale: A place name introduced by ב. 'In the Valley of Salt' is the most straightforward
    rendering, though English could also use 'at' for battle location.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  chosen: eighteen thousand men
  alternatives:
  - eighteen thousand
  lexicon: HALOT
  rationale: The Hebrew gives the number 'eighteen thousand' without an explicit noun.
    Supplying 'men' is idiomatic in English for a battle casualty/defeat count and
    reflects the implied military context.
