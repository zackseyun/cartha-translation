theological_decisions:
- issue: Rendering the royal summary pair מִשְׁפָּט וּצְדָקָה
  chosen_reading: justice and righteousness
  alternative_readings:
  - justice and equity
  - judgment and righteousness
  rationale: The verse commends David's rule in terms of both juridical justice and
    moral rectitude. Keeping both nouns distinct preserves the theological and ethical
    fullness of ideal kingship rather than reducing the pair to near-synonyms.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
