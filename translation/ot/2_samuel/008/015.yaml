id: 2SA.8.15
reference: 2 Samuel 8:15
source:
  edition: WLC
  text: וַ/יִּמְלֹ֥ךְ דָּוִ֖ד עַל כָּל יִשְׂרָאֵ֑ל וַ/יְהִ֣י דָוִ֗ד עֹשֶׂ֛ה מִשְׁפָּ֥ט
    וּ/צְדָקָ֖ה לְ/כָל עַמּֽ/וֹ־־־׃
translation:
  text: So David reigned over all Israel, and David was administering justice and
    righteousness for all his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'administered justice and what is right.' The Hebrew pair 'justice and
      righteousness' is a standard expression for ideal royal rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: The verb מלך in the wayyiqtol form here denotes David's kingship in action,
    not merely accession. 'Reigned' is the most natural English rendering in this
    summary statement.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: עַל with מלך regularly marks the realm ruled. 'All Israel' preserves
    the comprehensive scope of David's kingship without unnecessary expansion.
- source_word: וַיְהִי ... עֹשֶׂה
  chosen: was administering
  alternatives:
  - was doing
  - administered
  lexicon: HALOT
  rationale: The construction ויהי + participle presents ongoing customary action.
    'Was administering' captures the durative sense better than the overly literal
    'was doing' and better preserves the aspect than a simple past.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In royal/governing context, מִשְׁפָּט refers to the proper administration
    of justice rather than merely a judicial verdict. 'Justice' is clear modern English
    and fits the paired expression with צדקה.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צְדָקָה often denotes righteousness, rectitude, or right order. In this
    collocation with מִשְׁפָּט, rendering it 'righteousness' preserves the distinct
    ethical dimension rather than collapsing both terms into 'justice.'
- source_word: לְכָל עַמּוֹ
  chosen: for all his people
  alternatives:
  - to all his people
  - for all the people
  lexicon: HALOT
  rationale: The preposition ל here is well represented by 'for' in the sense of governance
    exercised on behalf of the people. 'His people' reflects the 3ms suffix and the
    covenant-royal relationship in context.
