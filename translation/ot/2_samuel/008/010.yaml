id: 2SA.8.10
reference: 2 Samuel 8:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח תֹּ֣עִי אֶת יֽוֹרָם בְּנ֣/וֹ אֶל הַ/מֶּֽלֶךְ דָּ֠וִד לִ/שְׁאָל
    ל֨/וֹ לְ/שָׁל֜וֹם וּֽ/לְ/בָרֲכ֗/וֹ עַל֩ אֲשֶׁ֨ר נִלְחַ֤ם בַּ/הֲדַדְעֶ֨זֶר֙ וַ/יַּכֵּ֔/הוּ
    כִּי אִ֛ישׁ מִלְחֲמ֥וֹת תֹּ֖עִי הָיָ֣ה הֲדַדְעָ֑זֶר וּ/בְ/יָד֗/וֹ הָי֛וּ כְּלֵֽי
    כֶ֥סֶף וּ/כְלֵֽי זָהָ֖ב וּ/כְלֵ֥י נְחֹֽשֶׁת־־־־־־־־׃
translation:
  text: Then Toi sent Joram his son to King David to ask about his welfare and to
    bless him because he had fought against Hadadezer and struck him down, for Hadadezer
    had been a man of wars with Toi; and in his hand were articles of silver, articles
    of gold, and articles of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'for Hadadezer had been at war with Toi.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in his hand were'—that is, he carried these items with him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - and ... sent
  - so ... sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    progression without losing the sequential force.
- source_word: תֹּעִי
  chosen: Toi
  alternatives:
  - Tou
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. 'Toi' follows
    the Hebrew form in Samuel; 'Tou' reflects the Chronicles parallel, so it is preserved
    as an alternative only conceptually, not in the main text.
- source_word: יֽוֹרָם בְּנוֹ
  chosen: Joram his son
  alternatives:
  - his son Joram
  lexicon: HALOT
  rationale: Both are possible in English. 'Joram his son' stays close to the Hebrew
    order while remaining readable.
- source_word: לִשְׁאָל לוֹ לְשָׁלוֹם
  chosen: to ask about his welfare
  alternatives:
  - to ask him of peace
  - to greet him
  - to inquire after his well-being
  lexicon: HALOT
  rationale: The idiom שׁאל לְשׁלום means to inquire about someone's peace/well-being.
    'Ask about his welfare' preserves the idiomatic sense in clear modern English.
- source_word: וּלְבָרֲכוֹ
  chosen: and to bless him
  alternatives:
  - and to congratulate him
  - and to greet him with blessing
  lexicon: HALOT
  rationale: ברך normally means 'bless.' In this diplomatic context it can overlap
    with congratulation, but 'bless' is the more direct lexical rendering and fits
    the formal tone.
- source_word: עַל אֲשֶׁר נִלְחַם בַּהֲדַדְעֶזֶר וַיַּכֵּהוּ
  chosen: because he had fought against Hadadezer and struck him down
  alternatives:
  - because he had fought with Hadadezer and defeated him
  - because he had fought Hadadezer and beaten him
  lexicon: HALOT
  rationale: The clause gives the reason for the embassy. ב can mark opposition here,
    so 'against' clarifies the sense. נכה is rendered 'struck him down' as a strong
    but not overly interpretive equivalent for military defeat.
- source_word: כִּי אִישׁ מִלְחֲמוֹת תֹּעִי הָיָה הֲדַדְעָזֶר
  chosen: for Hadadezer had been a man of wars with Toi
  alternatives:
  - for Hadadezer had been at war with Toi
  - for Hadadezer was a warrior enemy of Toi
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and compressed. 'A man of wars with
    Toi' preserves the metaphor and plural 'wars,' while remaining intelligible. A
    smoother alternative is preserved in a footnote because English readers may find
    the literal phrase unusual.
- source_word: וּבְיָדוֹ הָיוּ
  chosen: and in his hand were
  alternatives:
  - and he had with him
  - and he brought
  lexicon: HALOT
  rationale: Literally 'in his hand were.' This likely refers to what Joram carried.
    The more literal wording is retained in the main text for auditability, with the
    carried sense inferable from context.
- source_word: כְּלֵי כֶסֶף וּכְלֵי זָהָב וּכְלֵי נְחֹשֶׁת
  chosen: articles of silver, articles of gold, and articles of bronze
  alternatives:
  - vessels of silver, vessels of gold, and vessels of bronze
  - objects of silver, gold, and bronze
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, implement'). 'Articles' is suitably
    general and natural in English. נְחֹשֶׁת is best rendered 'bronze' in most contexts
    rather than the older generic 'brass'.
