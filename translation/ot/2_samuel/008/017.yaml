id: 2SA.8.17
reference: 2 Samuel 8:17
source:
  edition: WLC
  text: וְ/צָד֧וֹק בֶּן אֲחִיט֛וּב וַ/אֲחִימֶ֥לֶךְ בֶּן אֶבְיָתָ֖ר כֹּהֲנִ֑ים וּ/שְׂרָיָ֖ה
    סוֹפֵֽר־־׃
translation:
  text: Zadok son of Ahitub and Ahimelech son of Abiathar were priests, and Seraiah
    was secretary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief ministers' or 'royal officials' for 'priests'; some take the term
      here in a broader court-administrative sense because the verse lists David's
      officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'scribe.' The Hebrew term refers to an official responsible for writing
      or administration.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names rather than translating them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The genealogical marker most naturally means immediate filiation here
    in an administrative list, so 'son of' is preferred over the broader 'descendant
    of'.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  rationale: Proper personal name; transliterated.
- source_word: אֲחִימֶלֶךְ
  chosen: Ahimelech
  rationale: Proper personal name; transliterated.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Proper personal name; transliterated.
- source_word: כֹּהֲנִים
  chosen: priests
  alternatives:
  - chief ministers
  lexicon: HALOT
  rationale: The normal and primary sense of כֹּהֵן is 'priest.' Although in some
    royal-administrative contexts the term can be argued to denote high officials
    or ministers, here the straightforward sense 'priests' best matches the Hebrew
    and standard usage; the alternative is preserved in a footnote because the surrounding
    list is administrative.
- source_word: שְׂרָיָה
  chosen: Seraiah
  alternatives:
  - Saraiah
  rationale: Proper personal name; 'Seraiah' is a standard English transliteration
    of the Hebrew form.
- source_word: סוֹפֵר
  chosen: secretary
  alternatives:
  - scribe
  - recorder
  lexicon: HALOT
  rationale: In a royal court list, סוֹפֵר denotes an official scribe/secretary. 'Secretary'
    communicates the administrative office in clear modern English, while 'scribe'
    is a viable more formal alternative. 'Recorder' is less likely here because that
    office is usually represented by a different term.
