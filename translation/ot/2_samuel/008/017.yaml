theological_decisions:
- issue: Rendering כֹּהֲנִים in a royal-official list
  chosen_reading: priests
  alternative_readings:
  - chief ministers
  - royal officials
  rationale: No doctrinal issue is at stake, but the verse sits in a context listing
    court officials, which has led some to argue for a broader administrative sense.
    The Hebrew term's default meaning is 'priests,' and there is insufficient contextual
    pressure here to override that default in the main text. The broader administrative
    possibility is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity in footnotes where genuine'
