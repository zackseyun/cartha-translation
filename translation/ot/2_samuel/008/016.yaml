id: 2SA.8.16
reference: 2 Samuel 8:16
source:
  edition: WLC
  text: וְ/יוֹאָ֥ב בֶּן צְרוּיָ֖ה עַל הַ/צָּבָ֑א וִ/יהוֹשָׁפָ֥ט בֶּן אֲחִיל֖וּד מַזְכִּֽיר־־־׃
translation:
  text: And Joab son of Zeruiah was over the army, and Jehoshaphat son of Ahilud was
    recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was in command of the army.'
    reason: lexical_alternative
  - marker: b
    text: '''Recorder'' refers to a royal official responsible for keeping records
      and reporting matters to the king; alternatively, ''secretary'' or ''chronicler.'''
    reason: cultural_note
lexical_decisions:
- source_word: עַל הַצָּבָא
  chosen: was over the army
  alternatives:
  - was in command of the army
  - was over the host
  lexicon: HALOT
  rationale: The preposition עַל with an office listing indicates authority or oversight.
    'Was over the army' is a natural, close rendering that preserves the administrative
    sense without over-paraphrasing.
- source_word: מַזְכִּיר
  chosen: recorder
  alternatives:
  - chronicler
  - remembrancer
  - secretary
  lexicon: HALOT
  rationale: מַזְכִּיר denotes an official court role, likely one who records and
    reports matters for the king. 'Recorder' is the standard concise English equivalent
    in this administrative context and avoids the potentially misleading modern office
    sense of 'secretary,' while 'chronicler' may suggest an author of historical books
    rather than a royal official.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: In genealogical identification, בֶּן is straightforwardly 'son of.' This
    preserves the formal court-list style of the Hebrew.
- source_word: וְ / וִ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links the officials in a simple list. 'And'
    preserves the paratactic structure of the Hebrew.
- source_word: יוֹאָב / צְרוּיָה / יְהוֹשָׁפָט / אֲחִילוּד
  chosen: Joab / Zeruiah / Jehoshaphat / Ahilud
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the translation philosophy.
