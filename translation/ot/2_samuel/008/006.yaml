theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲבָדִים in a political-vassalage context
  chosen_reading: servants
  alternative_readings:
  - subjects
  - slaves
  rationale: Although the term can denote slaves or servants, here it describes national subjugation and tribute-bearing. 'Servants' preserves the lexical form without importing the more individualized chattel sense of 'slaves'; 'subjects' is interpretive and less textually transparent.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
