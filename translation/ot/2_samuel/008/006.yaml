id: 2SA.8.6
reference: 2 Samuel 8:6
source:
  edition: WLC
  text: וַ/יָּ֨שֶׂם דָּוִ֤ד נְצִבִים֙ בַּ/אֲרַ֣ם דַּמֶּ֔שֶׂק וַ/תְּהִ֤י אֲרָם֙ לְ/דָוִ֔ד לַ/עֲבָדִ֖ים נוֹשְׂאֵ֣י מִנְחָ֑ה וַ/יֹּ֤שַׁע יְהוָה֙ אֶת דָּוִ֔ד בְּ/כֹ֖ל אֲשֶׁ֥ר הָלָֽךְ־׃
translation:
  text: And David placed garrisons in Aram of Damascus, and Aram became servants to David, bringing tribute. And Yahweh gave David victory wherever he went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Syria of Damascus.' The Hebrew name is 'Aram,' which this translation normally preserves rather than replacing with the traditional 'Syria.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bearing tribute' or 'bringing gifts.' The Hebrew term can mean gift, offering, or tribute; here it likely refers to vassal payment.
    reason: lexical_alternative
  - marker: c
    text: Or 'the LORD saved/delivered David wherever he went.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: placed
  alternatives:
  - put
  - set
  lexicon: HALOT
  rationale: Common verb שׂים in narrative context means to place/set. 'Placed' is natural modern English and fits the military-administrative object 'garrisons'.
- source_word: נְצִבִים
  chosen: garrisons
  alternatives:
  - governors
  - prefects
  - military posts
  lexicon: HALOT
  rationale: In this military conquest context, the noun refers to stationed officials/troops or outposts established to control territory. 'Garrisons' best captures the likely military sense in readable English.
- source_word: בַּאֲרַם דַּמֶּשֶׂק
  chosen: in Aram of Damascus
  alternatives:
  - in Syria of Damascus
  - in Damascus Aram
  - in Aram, at Damascus
  lexicon: HALOT
  rationale: אֲרָם is the Hebrew ethnogeographic name 'Aram'; per philosophy, names are transliterated rather than replaced by the traditional but less source-near 'Syria.' The construct/appositional phrase identifies the Aramean polity centered on Damascus.
- source_word: וַתְּהִי אֲרָם לְדָוִד לַעֲבָדִים
  chosen: Aram became servants to David
  alternatives:
  - Aram became subject to David
  - Aram became David's servants
  lexicon: HALOT
  rationale: The clause expresses political subjugation. 'Servants' preserves the lexical link to עֲבָדִים without over-paraphrasing to 'subject,' while still being intelligible in context.
- source_word: נוֹשְׂאֵי מִנְחָה
  chosen: bringing tribute
  alternatives:
  - bearing tribute
  - bringing gifts
  - bringing an offering
  lexicon: HALOT
  rationale: מִנְחָה can mean gift, offering, or tribute depending on context. Here, in an international vassalage setting, 'tribute' is the most contextually precise rendering. 'Bringing' smooths the participial construction into idiomatic English.
- source_word: וַיֹּשַׁע
  chosen: gave ... victory
  alternatives:
  - saved
  - delivered
  - granted success
  lexicon: HALOT
  rationale: The hiphil of ישׁע here describes YHWH's saving action in battle. In this military context, 'gave victory' communicates the sense more clearly than the more general 'saved' or 'delivered'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  chosen: wherever he went
  alternatives:
  - in all that he went
  - wherever he marched
  - in every place he went
  lexicon: HALOT
  rationale: This idiom expresses comprehensive success in David's campaigns/journeys. 'Wherever he went' is idiomatic and sufficiently broad, without narrowing the sense only to marching.
