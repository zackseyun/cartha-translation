id: 2SA.17.9
reference: 2 Samuel 17:9
source:
  edition: WLC
  text: הִנֵּ֨ה עַתָּ֤ה הֽוּא נֶחְבָּא֙ בְּ/אַחַ֣ת הַ/פְּחָתִ֔ים א֖וֹ בְּ/אַחַ֣ד הַ/מְּקוֹמֹ֑ת
    וְ/הָיָ֗ה כִּ/נְפֹ֤ל בָּ/הֶם֙ בַּ/תְּחִלָּ֔ה וְ/שָׁמַ֤ע הַ/שֹּׁמֵ֨עַ֙ וְ/אָמַ֔ר
    הָֽיְתָה֙ מַגֵּפָ֔ה בָּ/עָ֕ם אֲשֶׁ֖ר אַחֲרֵ֥י אַבְשָׁלֹֽם־׃
translation:
  text: Look, right now he is hidden in one of the pits or in one of the other places.
    And when some of them fall at the first attack, whoever hears it will say, ‘There
    has been a slaughter among the people who follow Absalom.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one of the hollows'; the Hebrew term can refer to pits, depressions,
      or similar hiding places in the terrain.
    reason: lexical_alternative
  - marker: b
    text: '''There has been a slaughter'' could also be rendered ''There has been
      a defeat'' or ''a blow'' among Absalom''s followers; the Hebrew term refers
      here to a severe military striking down, not to a disease-plague.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces vivid attention-getting discourse. 'Look' preserves immediacy
    in modern English better than archaic 'Behold.'
- source_word: עַתָּה
  chosen: right now
  alternatives:
  - now
  - at present
  lexicon: HALOT
  rationale: Emphasizes present, immediate circumstance in Hushai's counsel. 'Right
    now' captures the urgency more naturally than bare 'now.'
- source_word: נֶחְבָּא
  chosen: is hidden
  alternatives:
  - has hidden himself
  - is hiding
  lexicon: HALOT
  rationale: The Niphal participle/passive sense is best represented by 'is hidden.'
    It leaves open whether David hid himself or is concealed, matching the Hebrew
    form without over-specifying agency.
- source_word: בְּאַחַת הַפְּחָתִים
  chosen: in one of the pits
  alternatives:
  - in one of the hollows
  - in one of the depressions
  lexicon: HALOT
  rationale: פְּחָתִים refers to pits or hollows. 'Pits' is the most straightforward
    English equivalent, though the terrain sense of 'hollows' is possible.
- source_word: בְּאַחַד הַמְּקוֹמֹת
  chosen: in one of the other places
  alternatives:
  - in one of the places
  - in some other place
  lexicon: HALOT
  rationale: The phrase is indefinite and broad. Adding 'other' in English reflects
    the contrastive alternative introduced by אוֹ after the first location.
- source_word: כִּנְפֹל בָּהֶם
  chosen: when some of them fall
  alternatives:
  - when he falls upon them
  - when there is a falling among them
  lexicon: HALOT
  rationale: The idiom with נפל plus ב can denote casualties occurring among a group.
    In context, Hushai imagines losses among Absalom's men. 'Some of them fall' communicates
    this clearly. The alternative 'he falls upon them' is less likely here because
    the following report concerns a defeat among Absalom's followers.
- source_word: בַּתְּחִלָּה
  chosen: at the first attack
  alternatives:
  - at the beginning
  - at first
  lexicon: HALOT
  rationale: Literally 'at the beginning,' but in military context it refers to the
    initial engagement. 'At the first attack' makes the situational sense explicit
    without undue paraphrase.
- source_word: הַשֹּׁמֵעַ
  chosen: whoever hears it
  alternatives:
  - the hearer
  - one who hears
  lexicon: HALOT
  rationale: The articular participle is generic. 'Whoever hears it' is idiomatic
    English and preserves the indefinite representative sense.
- source_word: מַגֵּפָה
  chosen: a slaughter
  alternatives:
  - a defeat
  - a plague
  - a blow
  lexicon: HALOT
  rationale: In this battle context, מַגֵּפָה denotes a striking down, rout, or slaughter
    rather than disease-plague. 'Slaughter' best conveys severe military losses. 'Defeat'
    is possible but weaker; 'plague' would mislead modern readers.
- source_word: הָעָם אֲשֶׁר אַחֲרֵי אַבְשָׁלֹם
  chosen: the people who follow Absalom
  alternatives:
  - the troops behind Absalom
  - the people who are after Absalom
  lexicon: HALOT
  rationale: אַחֲרֵי here means allegiance or following, not spatial pursuit. 'Who
    follow Absalom' clearly expresses political/military loyalty.
