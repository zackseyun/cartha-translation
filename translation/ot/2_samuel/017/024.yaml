id: 2SA.17.24
reference: 2 Samuel 17:24
source:
  edition: WLC
  text: וְ/דָוִ֖ד בָּ֣א מַחֲנָ֑יְמָ/ה וְ/אַבְשָׁלֹ֗ם עָבַר֙ אֶת הַ/יַּרְדֵּ֔ן ה֕וּא
    וְ/כָל אִ֥ישׁ יִשְׂרָאֵ֖ל עִמּֽ/וֹ־־׃
translation:
  text: Then David came to Mahanaim, and Absalom crossed the Jordan, he and all the
    men of Israel with him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: Qal perfect of בוא commonly means 'came' or 'arrived.' 'Came' is the
    most natural narrative rendering in English and preserves the motion toward the
    named destination.
- source_word: מַחֲנָיְמָה
  chosen: to Mahanaim
  alternatives:
  - Mahanaim
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location.
    English idiom expresses this as 'to Mahanaim,' though in the main sentence 'came
    to Mahanaim' naturally incorporates the prepositional force.
- source_word: עָבַר אֶת־הַיַּרְדֵּן
  chosen: crossed the Jordan
  alternatives:
  - passed over the Jordan
  lexicon: HALOT
  rationale: עבר with the direct object marker and 'the Jordan' denotes crossing the
    river. 'Crossed the Jordan' is clear modern English and suitably formal for narrative.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: 'The independent pronoun adds explicitness after the verb, functioning
    appositionally: ''he and all the men of Israel.'' English retains it as ''he''
    without overemphasizing unless context demands reflexive stress.'
- source_word: כָל־אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all the people of Israel
  lexicon: HALOT
  rationale: אִישׁ is singular in a collective construction after כָל, literally 'every
    man of Israel.' Because the Hebrew is grammatically masculine and refers to the
    fighting men aligned with Absalom, 'all the men of Israel' is gender-accurate
    and idiomatic. 'All the people of Israel' would flatten the masculine wording
    and likely broaden the reference beyond the military/political force in view.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Standard preposition + pronominal suffix meaning accompaniment; 'with
    him' is straightforward and exact.
- source_word: וְ
  chosen: Then / and
  alternatives:
  - now
  - so
  lexicon: HALOT
  rationale: The initial waw advances the narrative. Rendering the first waw as 'Then'
    gives smooth English narrative flow, while the second is naturally 'and.' This
    is a documented contextual variation rather than a lexical change in meaning.
