theological_decisions:
- issue: Rendering יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Describing divine action in צִוָּה לְהָפֵר
  chosen_reading: the LORD had ordained to frustrate
  alternative_readings:
  - the LORD had commanded to defeat
  - the LORD had determined to nullify
  rationale: The verse attributes providential sovereignty to the LORD over the failure of Ahithophel's counsel. 'Ordained' communicates divine determination in context without importing a narrower doctrinal system beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
- issue: Rendering הָרָעָה with reference to God's action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - harm
  - calamity
  rationale: The Hebrew can denote calamity as well as evil. Because the object is judicial ruin brought upon Absalom, 'disaster' best reflects the contextual sense and avoids suggesting that God brings moral evil.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
