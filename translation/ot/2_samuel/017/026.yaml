id: 2SA.17.26
reference: 2 Samuel 17:26
source:
  edition: WLC
  text: וַ/יִּ֤חַן יִשְׂרָאֵל֙ וְ/אַבְשָׁלֹ֔ם אֶ֖רֶץ הַ/גִּלְעָֽד׃ס
translation:
  text: Israel and Absalom camped in the land of Gilead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּחַן
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: The verb חנה in the waw-consecutive form denotes setting up camp or encamping.
    'Camped' is natural modern English and preserves the military movement context
    without archaic tone.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Here 'Israel' functions collectively for the Israelite forces aligned
    with Absalom, but the Hebrew uses the national name directly. Retaining 'Israel'
    preserves the source wording and political sense.
- source_word: וְאַבְשָׁלֹם
  chosen: and Absalom
  lexicon: HALOT
  rationale: The conjunction links Absalom with Israel as joint subject of the singular
    verb, a common collective construction. The personal name is transliterated per
    translation philosophy.
- source_word: אֶרֶץ הַגִּלְעָד
  chosen: the land of Gilead
  alternatives:
  - the territory of Gilead
  - Gilead
  lexicon: HALOT
  rationale: אֶרֶץ plus place name commonly means 'land/territory of.' 'The land of
    Gilead' is the most transparent and idiomatic rendering, preserving the geographic
    designation.
