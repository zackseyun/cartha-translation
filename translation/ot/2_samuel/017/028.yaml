id: 2SA.17.28
reference: 2 Samuel 17:28
source:
  edition: WLC
  text: מִשְׁכָּ֤ב וְ/סַפּוֹת֙ וּ/כְלִ֣י יוֹצֵ֔ר וְ/חִטִּ֥ים וּ/שְׂעֹרִ֖ים וְ/קֶ֣מַח
    וְ/קָלִ֑י וּ/פ֥וֹל וַ/עֲדָשִׁ֖ים וְ/קָלִֽי׃
translation:
  text: beds, basins, and pottery vessels, and wheat, barley, flour, roasted grain,
    beans, lentils, and roasted grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bowls' for 'basins.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'vessels of a potter'; that is, earthenware or pottery vessels.
    reason: lexical_alternative
  - marker: c
    text: Or 'parched grain' for 'roasted grain.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew likely refers more specifically to broad beans (fava beans).
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁכָּב
  chosen: beds
  alternatives:
  - bedding
  - couches
  lexicon: HALOT
  rationale: The noun can denote a place or item for lying down. In this supply list,
    a concrete plural sense in English is most natural, even though the Hebrew form
    is singular/collective; 'beds' communicates the provision of sleeping accommodations.
- source_word: סַפּוֹת
  chosen: basins
  alternatives:
  - bowls
  lexicon: HALOT
  rationale: In a list of provisions and household items, this term most likely refers
    to vessels such as basins or bowls. 'Basins' fits the likely utilitarian sense
    and pairs well with the following vessel term.
- source_word: כְלִי יוֹצֵר
  chosen: pottery vessels
  alternatives:
  - earthenware vessels
  - potter's vessels
  lexicon: HALOT
  rationale: Literally 'vessel(s) of a potter/former.' The phrase denotes ceramic
    ware. 'Pottery vessels' is idiomatic modern English and preserves the material
    sense better than the more wooden 'potter's vessels.'
- source_word: חִטִּים
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering for the grain named in the supply list.
- source_word: שְׂעֹרִים
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering for the grain named in the supply list.
- source_word: קֶמַח
  chosen: flour
  alternatives:
  - meal
  lexicon: HALOT
  rationale: The term refers to ground grain. 'Flour' is the clearest modern equivalent
    here.
- source_word: קָלִי
  chosen: roasted grain
  alternatives:
  - parched grain
  lexicon: HALOT
  rationale: This food term refers to grain prepared by roasting/parching. 'Roasted
    grain' is more accessible modern English than 'parched grain' while preserving
    the sense.
- source_word: פּוֹל
  chosen: beans
  alternatives:
  - broad beans
  lexicon: HALOT
  rationale: The term denotes a kind of bean, likely fava/broad beans. 'Beans' is
    sufficiently accurate in the main text; the more specific option is worth preserving
    in a footnote.
- source_word: עֲדָשִׁים
  chosen: lentils
  lexicon: HALOT
  rationale: Standard rendering for the legume in the list.
- source_word: קָלִי
  chosen: roasted grain
  alternatives:
  - parched grain
  lexicon: HALOT
  rationale: The term appears again at the end of the verse. It is retained consistently
    as 'roasted grain.' The repetition is preserved rather than harmonized away, since
    the Hebrew repeats it.
