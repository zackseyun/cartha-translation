id: 2SA.17.27
reference: 2 Samuel 17:27
source:
  edition: WLC
  text: וַ/יְהִ֕י כְּ/ב֥וֹא דָוִ֖ד מַחֲנָ֑יְמָ/ה וְ/שֹׁבִ֨י בֶן נָחָ֜שׁ מֵ/רַבַּ֣ת
    בְּנֵֽי עַמּ֗וֹן וּ/מָכִ֤יר בֶּן עַמִּיאֵל֙ מִ/לֹּ֣א דְבָ֔ר וּ/בַרְזִלַּ֥י הַ/גִּלְעָדִ֖י
    מֵ/רֹגְלִֽים־־־׃
translation:
  text: Now when David came to Mahanaim, Shobi son of Nahash from Rabbah of the Ammonites,
    and Machir son of Ammiel from Lo-debar, and Barzillai the Gileadite from Rogelim,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came about
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    English, a simple discourse marker such as 'Now' preserves the transition naturally
    without woodenly reproducing the Hebrew idiom.
- source_word: כְּבוֹא
  chosen: when ... came
  alternatives:
  - as ... came
  - upon ... coming
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of בוא is temporal here,
    best rendered 'when ... came' in smooth English narrative.
- source_word: מַחֲנָיְמָה
  chosen: to Mahanaim
  alternatives:
  - Mahanaimward
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place. English idiom expresses
    this simply as 'to Mahanaim.'
- source_word: שֹׁבִי
  chosen: Shobi
  lexicon: HALOT
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶן נָחָשׁ
  chosen: son of Nahash
  lexicon: HALOT
  rationale: Standard patronymic construction; retained formally.
- source_word: מֵרַבַּת בְּנֵי עַמּוֹן
  chosen: from Rabbah of the Ammonites
  alternatives:
  - from Rabbah of the sons of Ammon
  - from Rabbah of the Ammonites’ city
  lexicon: HALOT
  rationale: רַבַּת is the city Rabbah; בְּנֵי עַמּוֹן is the standard ethnic/geopolitical
    designation. 'Of the Ammonites' is natural English while preserving the referent.
- source_word: מָכִיר
  chosen: Machir
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: בֶּן עַמִּיאֵל
  chosen: son of Ammiel
  lexicon: HALOT
  rationale: Standard patronymic construction; retained formally.
- source_word: מִלֹּא דְבָר
  chosen: from Lo-debar
  alternatives:
  - from Lo Debar
  lexicon: HALOT
  rationale: Place name transliterated in conventional English form with hyphenation.
- source_word: בַרְזִלַּי
  chosen: Barzillai
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - the man from Gilead
  lexicon: HALOT
  rationale: Gentilic adjective indicating regional identity; 'the Gileadite' is concise
    and standard.
- source_word: מֵרֹגְלִים
  chosen: from Rogelim
  lexicon: HALOT
  rationale: Place name transliterated.
