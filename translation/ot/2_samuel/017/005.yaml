id: 2SA.17.5
reference: 2 Samuel 17:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְשָׁל֔וֹם קְרָ֣א נָ֔א גַּ֖ם לְ/חוּשַׁ֣י הָ/אַרְכִּ֑י וְ/נִשְׁמְעָ֥ה
    מַה בְּ/פִ֖י/ו גַּם הֽוּא־־׃
translation:
  text: Then Absalom said, “Please call Hushai the Archite also, and let us hear what
    he too has to say.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and let us hear what is in his mouth, he too.' The expression
      means 'what he has to say.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: קְרָא נָא
  chosen: Please call
  alternatives:
  - Call, please
  - Do call
  lexicon: HALOT
  rationale: Imperative plus particle נָא expresses a polite/requesting nuance rather
    than mere command; 'Please call' is idiomatic English.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - as well
  lexicon: HALOT
  rationale: The first גַּם modifies the request to include an additional person beyond
    Ahithophel; 'also' fits that additive sense.
- source_word: חוּשַׁי הָאַרְכִּי
  chosen: Hushai the Archite
  alternatives:
  - Hushai the Arkite
  lexicon: HALOT
  rationale: Personal name is transliterated; the gentilic/title is rendered in its
    standard English form 'the Archite.'
- source_word: וְנִשְׁמְעָה
  chosen: and let us hear
  alternatives:
  - and we will hear
  - that we may hear
  lexicon: HALOT
  rationale: Cohortative first person plural expresses volition/proposal. 'Let us
    hear' best captures the hortatory sense in English.
- source_word: מַה בְּפִיו
  chosen: what he ... has to say
  alternatives:
  - what is in his mouth
  - what is on his lips
  - what is in his mouth to say
  lexicon: HALOT
  rationale: The Hebrew idiom 'what is in his mouth' refers to what someone says or
    proposes. 'Has to say' communicates the idiomatic sense clearly without over-paraphrasing.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - also he
  - he also
  lexicon: HALOT
  rationale: The second גַּם with pronoun emphasizes Hushai as an additional counselor
    whose opinion should also be heard. 'He too' preserves the emphasis naturally.
