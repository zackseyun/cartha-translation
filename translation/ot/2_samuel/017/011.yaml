id: 2SA.17.11
reference: 2 Samuel 17:11
source:
  edition: WLC
  text: כִּ֣י יָעַ֗צְתִּי הֵ֠אָסֹף יֵאָסֵ֨ף עָלֶ֤י/ךָ כָל יִשְׂרָאֵל֙ מִ/דָּן֙ וְ/עַד
    בְּאֵ֣ר שֶׁ֔בַע כַּ/ח֥וֹל אֲשֶׁר עַל הַ/יָּ֖ם לָ/רֹ֑ב וּ/פָנֶ֥י/ךָ הֹלְכִ֖ים בַּ/קְרָֽב־־־־׃
translation:
  text: But I advise that all Israel be surely gathered to you, from Dan to Beersheba,
    as numerous as the sand that is by the sea, and that you yourself go into battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and your face going in the battle,' an idiom meaning
      that you personally lead the attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces Hushai's counter-advice in contrast to Ahithophel's
    plan in the preceding context. English 'But' best captures the adversative force
    in context, though the particle can also mean 'for' or 'indeed'.
- source_word: יָעַצְתִּי
  chosen: I advise
  alternatives:
  - I counsel
  - I have advised
  lexicon: HALOT
  rationale: From יעץ, 'to advise/counsel.' Present English 'I advise' fits the speech-act
    force in context better than a more wooden past perfect rendering.
- source_word: הֵאָסֹף יֵאָסֵף
  chosen: be surely gathered
  alternatives:
  - must certainly be gathered
  - let there be a complete gathering
  lexicon: HALOT
  rationale: Infinitive absolute + finite verb of אסף intensifies the verbal idea.
    'Be surely gathered' preserves the emphatic force without becoming awkward.
- source_word: עָלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  - around you
  lexicon: HALOT
  rationale: With אסף, על can indicate gathering to or around a leader. 'To you' is
    the most natural English expression for assembling under Absalom's command.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard collective expression for the nation/army. 'All Israel' is idiomatic
    and preserves the totalizing rhetoric.
- source_word: מִדָּן וְעַד בְּאֵר שֶׁבַע
  chosen: from Dan to Beersheba
  alternatives:
  - from Dan even to Beersheba
  lexicon: HALOT
  rationale: Conventional geographic merism for the full extent of Israel. Retained
    in familiar English form.
- source_word: כַּחוֹל אֲשֶׁר עַל הַיָּם לָרֹב
  chosen: as numerous as the sand that is by the sea
  alternatives:
  - like the sand by the sea in abundance
  - as the sand on the seashore in multitude
  lexicon: HALOT
  rationale: Simile expressing vast number. 'As numerous as' makes the comparison
    explicit in natural English while preserving the imagery.
- source_word: וּפָנֶיךָ
  chosen: you yourself
  alternatives:
  - your face
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face,' but in this idiom it refers to the person personally.
    'You yourself' brings out the emphatic sense that Absalom should lead in person.
- source_word: הֹלְכִים
  chosen: go
  alternatives:
  - are going
  - march
  lexicon: HALOT
  rationale: Although morphologically plural, the form follows the plural-like expression
    'your face' and functions idiomatically with a singular referent. English singular
    'go' is required by sense.
- source_word: בַּקְרָב
  chosen: into battle
  alternatives:
  - in the midst of the battle
  - into the fight
  lexicon: HALOT
  rationale: קרב can denote battle/combat. 'Into battle' is idiomatic and suits the
    military context better than a more literal but clumsy rendering.
