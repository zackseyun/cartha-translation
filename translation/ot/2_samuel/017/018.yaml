id: 2SA.17.18
reference: 2 Samuel 17:18
source:
  edition: WLC
  text: וַ/יַּ֤רְא אֹתָ/ם֙ נַ֔עַר וַ/יַּגֵּ֖ד לְ/אַבְשָׁלֹ֑ם וַ/יֵּלְכוּ֩ שְׁנֵי/הֶ֨ם
    מְהֵרָ֜ה וַ/יָּבֹ֣אוּ אֶל בֵּֽית אִ֣ישׁ בְּ/בַחוּרִ֗ים וְ/ל֥/וֹ בְאֵ֛ר בַּ/חֲצֵר֖/וֹ
    וַ/יֵּ֥רְדוּ שָֽׁם׀־־׃
translation:
  text: But a young man saw them and told Absalom, so the two of them went quickly
    and came to the house of a man in Bahurim, who had a well in his courtyard, and
    they went down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they went down into it,' that is, into the well.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  chosen: young man
  alternatives:
  - boy
  - servant
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, or servant depending on context. Here
    the figure is old enough to observe, report, and function independently, so 'young
    man' best fits without overcommitting to age or status.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: The verb נגד in Hifil commonly means to tell or report. 'Told' is natural
    modern English and adequately conveys the act of informing Absalom.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: The Hebrew explicitly marks two persons. 'The two of them' preserves
    the specificity and reads smoothly in English.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - in haste
  - hurriedly
  lexicon: HALOT
  rationale: The noun used adverbially conveys haste. 'Quickly' is concise, idiomatic,
    and preserves the urgency.
- source_word: בֵּית אִישׁ
  chosen: the house of a man
  alternatives:
  - a man's house
  - the home of a man
  lexicon: HALOT
  rationale: The construct phrase is straightforward. 'The house of a man' stays close
    to the Hebrew while remaining readable.
- source_word: בְּבַחוּרִים
  chosen: in Bahurim
  alternatives:
  - at Bahurim
  lexicon: HALOT
  rationale: Bahurim is a place name and should be transliterated. 'In Bahurim' is
    the most natural locative rendering.
- source_word: בְאֵר
  chosen: well
  alternatives:
  - cistern
  lexicon: HALOT
  rationale: בְאֵר ordinarily denotes a well rather than a cistern. The following
    verse describes covering its mouth, which can fit a well; the default lexical
    sense should be retained here.
- source_word: בַּחֲצֵרוֹ
  chosen: in his courtyard
  alternatives:
  - in his court
  - in his enclosure
  lexicon: HALOT
  rationale: חָצֵר refers to a courtyard or enclosed area associated with a house.
    'Courtyard' is the clearest modern equivalent.
- source_word: וַיֵּרְדוּ שָׁם
  chosen: they went down there
  alternatives:
  - they went down into it
  - they descended there
  lexicon: HALOT
  rationale: The Hebrew says literally 'they went down there.' English can leave the
    destination slightly implicit, matching the Hebrew's use of שָׁם, while the context
    makes clear that they descended into the well.
