id: 2SA.17.25
reference: 2 Samuel 17:25
source:
  edition: WLC
  text: וְ/אֶת עֲמָשָׂ֗א שָׂ֧ם אַבְשָׁלֹ֛ם תַּ֥חַת יוֹאָ֖ב עַל הַ/צָּבָ֑א וַ/עֲמָשָׂ֣א
    בֶן אִ֗ישׁ וּ/שְׁמ/וֹ֙ יִתְרָ֣א הַ/יִּשְׂרְאֵלִ֔י אֲשֶׁר בָּא֙ אֶל אֲבִיגַ֣ל בַּת
    נָחָ֔שׁ אֲח֥וֹת צְרוּיָ֖ה אֵ֥ם יוֹאָֽב־־־־־־׃
translation:
  text: And Absalom set Amasa over the army in place of Joab. Now Amasa was the son
    of a man whose name was Ithra the Israelite, who had gone in to Abigail daughter
    of Nahash, sister of Zeruiah, Joab’s mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Ithra the Israelite.'' 1 Chronicles 2:17 has ''Jether the Ishmaelite.'''
    reason: textual_variant
lexical_decisions:
- source_word: שָׂם
  chosen: set
  alternatives:
  - appointed
  - placed
  lexicon: HALOT
  rationale: Common verb for putting/setting. 'Set' is concise and natural here, while
    still allowing the idiom 'set over the army.'
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this context of replacing a commander, תַּחַת indicates substitution
    rather than spatial position. 'In place of' makes the replacement sense explicit.
- source_word: עַל הַצָּבָא
  chosen: over the army
  alternatives:
  - in command of the army
  lexicon: HALOT
  rationale: The preposition עַל with צָבָא indicates authority over the military
    force. 'Over the army' is a clear, fairly formal rendering.
- source_word: בֶן אִישׁ
  chosen: the son of a man
  alternatives:
  - the son of a certain man
  lexicon: HALOT
  rationale: The Hebrew is literally indefinite. 'The son of a man' preserves the
    wording, though English smooths it with the following relative clause.
- source_word: וּשְׁמוֹ יִתְרָא
  chosen: whose name was Ithra
  alternatives:
  - and his name was Ithra
  lexicon: HALOT
  rationale: Restructured for natural English while preserving the identifying function
    of the clause.
- source_word: הַיִּשְׂרְאֵלִי
  chosen: the Israelite
  alternatives:
  - the Ishmaelite
  lexicon: HALOT
  rationale: The MT reads 'the Israelite,' and the translation follows the provided
    Hebrew text. However, the parallel in 1 Chronicles 2:17 reads 'Jether the Ishmaelite,'
    which may reflect either a textual variant or harmonizing tradition; this is preserved
    in a footnote.
- source_word: אֲשֶׁר בָּא אֶל
  chosen: who had gone in to
  alternatives:
  - who had relations with
  - who came to
  lexicon: HALOT
  rationale: This idiom commonly refers to sexual union. 'Had gone in to' preserves
    the Hebrew euphemism without flattening it into explicit paraphrase.
- source_word: אֲבִיגַל בַּת נָחָשׁ
  chosen: Abigail daughter of Nahash
  alternatives:
  - Abigail, daughter of Nahash
  lexicon: HALOT
  rationale: Straightforward filial construction. Kept close to the Hebrew order and
    relation.
- source_word: אֲחוֹת צְרוּיָה
  chosen: sister of Zeruiah
  alternatives:
  - Zeruiah's sister
  lexicon: HALOT
  rationale: A direct and transparent rendering of the construct chain.
- source_word: אֵם יוֹאָב
  chosen: Joab’s mother
  alternatives:
  - the mother of Joab
  lexicon: HALOT
  rationale: Natural English possessive; preserves the appositional identification
    of Zeruiah.
