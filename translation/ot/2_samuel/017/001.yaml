id: 2SA.17.1
reference: 2 Samuel 17:1
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲחִיתֹ֖פֶל אֶל אַבְשָׁלֹ֑ם אֶבְחֲרָ֣ה נָּ֗א שְׁנֵים עָשָׂ֥ר אֶ֨לֶף֙
    אִ֔ישׁ וְ/אָק֛וּמָה וְ/אֶרְדְּפָ֥ה אַחֲרֵי דָוִ֖ד הַ/לָּֽיְלָה־־־׃
translation:
  text: Then Ahithophel said to Absalom, “Please let me choose twelve thousand men,
    and I will arise and pursue David tonight.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Please, I will choose twelve thousand men, and I will
      arise and pursue David this night.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence better than a bare 'and.'
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern equivalent.
- source_word: אַבְשָׁלֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention.
- source_word: אֶבְחֲרָה נָּא
  chosen: Please let me choose
  alternatives:
  - Please, I will choose
  - Let me choose, please
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite request or proposal. English
    idiom is best captured by 'Please let me choose' rather than a wooden 'I will
    choose, please.'
- source_word: שְׁנֵים עָשָׂר אֶלֶף אִישׁ
  chosen: twelve thousand men
  alternatives:
  - twelve thousand troops
  - twelve thousand soldiers
  lexicon: HALOT
  rationale: Literally 'twelve thousand man/men.' 'Men' preserves the lexical form
    אִישׁ and avoids importing a more specific military term than the Hebrew states,
    though the context is military.
- source_word: וְאָקוּמָה
  chosen: and I will arise
  alternatives:
  - and I will set out
  - and I will go
  lexicon: HALOT
  rationale: קוּם literally means 'arise' or 'get up.' Here it introduces immediate
    action. 'Arise' preserves the Hebrew image while remaining intelligible in context.
- source_word: וְאֶרְדְּפָה
  chosen: and pursue
  alternatives:
  - and chase
  - and go after
  lexicon: HALOT
  rationale: רדף commonly means 'pursue,' especially in military pursuit. This is
    the most precise contextual rendering.
- source_word: אַחֲרֵי
  chosen: David
  alternatives:
  - after David
  lexicon: HALOT
  rationale: In English, 'pursue David' naturally incorporates the sense of אַחֲרֵי
    ('after'). Rendering both explicitly as 'pursue after David' would be awkward
    and redundant.
- source_word: הַלָּיְלָה
  chosen: tonight
  alternatives:
  - this night
  - by night
  lexicon: HALOT
  rationale: With the article, the noun refers to the present night in context. 'Tonight'
    is the most natural modern English rendering.
