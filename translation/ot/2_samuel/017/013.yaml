id: 2SA.17.13
reference: 2 Samuel 17:13
source:
  edition: WLC
  text: וְ/אִם אֶל עִיר֙ יֵֽאָסֵ֔ף וְ/הִשִּׂ֧יאוּ כָֽל יִשְׂרָאֵ֛ל אֶל הָ/עִ֥יר הַ/הִ֖יא
    חֲבָלִ֑ים וְ/סָחַ֤בְנוּ אֹת/וֹ֙ עַד הַ/נַּ֔חַל עַ֛ד אֲשֶֽׁר לֹא נִמְצָ֥א שָׁ֖ם
    גַּם צְרֽוֹר־־־־־־־־׃פ
translation:
  text: And if he withdraws into a city, then all Israel will bring ropes to that
    city, and we will drag it into the wadi until not even a pebble is found there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brook' or 'stream' for 'wadi' (Heb. naḥal), a seasonal watercourse or
      ravine.
    reason: lexical_alternative
  - marker: b
    text: Or 'not even a small stone.' The Hebrew says 'not even a pebble/stone' as
      a hyperbolic image of total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָסֵף
  chosen: withdraws
  alternatives:
  - is gathered
  - gathers himself
  - takes refuge
  lexicon: HALOT
  rationale: Nifal of אסף here refers to David's retreating/collecting himself into
    a fortified place. 'Withdraws into a city' communicates the military sense more
    naturally than the overly literal 'is gathered into a city.'
- source_word: וְהִשִּׂיאוּ
  chosen: will bring
  alternatives:
  - will carry
  - will lift up
  lexicon: HALOT
  rationale: 'From נשׂא in the causative, with חבלים as object: the sense is bringing/carrying
    ropes to the city for the hyperbolic siege image. ''Bring'' is idiomatic in English.'
- source_word: חֲבָלִים
  chosen: ropes
  alternatives:
  - cords
  - lines
  lexicon: HALOT
  rationale: The concrete image is of ropes used to pull down or drag away the city.
    'Ropes' is the clearest modern equivalent.
- source_word: וְסָחַבְנוּ אֹתוֹ
  chosen: we will drag it
  alternatives:
  - we will pull it away
  - we will haul it
  lexicon: HALOT
  rationale: סחב means to drag/haul. The pronoun refers back to the city, grammatically
    feminine but resumed by a masculine suffix, a common enough shift in sense-based
    reference. 'Drag it' preserves the violent hyperbole.
- source_word: הַנַּחַל
  chosen: the wadi
  alternatives:
  - the brook
  - the stream
  - the valley
  lexicon: HALOT
  rationale: נחל can denote a torrent-bed or seasonal watercourse. 'Wadi' best captures
    the geographical feature in this setting, though 'brook' is traditional.
- source_word: גַּם צְרוֹר
  chosen: not even a pebble
  alternatives:
  - not even a stone
  - not even a small stone
  lexicon: HALOT
  rationale: 'צרור denotes a small stone/pebble. The phrase intensifies the hyperbole:
    nothing of the city would remain. ''Pebble'' preserves the diminutive force better
    than simply ''stone''.'
