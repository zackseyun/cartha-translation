id: 2SA.17.6
reference: 2 Samuel 17:6
source:
  edition: WLC
  text: וַ/יָּבֹ֣א חוּשַׁי֮ אֶל אַבְשָׁלוֹם֒ וַ/יֹּאמֶר֩ אַבְשָׁל֨וֹם אֵלָ֜י/ו לֵ/אמֹ֗ר
    כַּ/דָּבָ֤ר הַ/זֶּה֙ דִּבֶּ֣ר אֲחִיתֹ֔פֶל הֲ/נַעֲשֶׂ֖ה אֶת דְּבָר֑/וֹ אִם אַ֖יִן
    אַתָּ֥ה דַבֵּֽר־־־׃ס
translation:
  text: When Hushai came to Absalom, Absalom said to him, “Ahithophel has spoken in
    this way. Should we do what he says? If not, you speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Should we do according to his word?” The Hebrew is more literally “Should
      we do his word?” meaning to carry out Ahithophel’s counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - entered
  - went in
  lexicon: HALOT
  rationale: The wayyiqtol of בוא in narrative commonly advances the storyline with
    'came' when motion is toward a person or place already in view. 'Came' is natural
    English here with אֶל אַבְשָׁלוֹם.
- source_word: חוּשַׁי
  chosen: Hushai
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - before
  lexicon: HALOT
  rationale: Standard directional preposition; 'to Absalom' fits the narrative setting.
- source_word: וַיֹּאמֶר ... לֵאמֹר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: English normally does not need both the finite verb and the infinitive
    'saying'; 'said' adequately represents the speech introduction.
- source_word: כַּדָּבָר הַזֶּה
  chosen: in this way
  alternatives:
  - like this
  - according to this word
  lexicon: HALOT
  rationale: The phrase points to the manner/content just proposed by Ahithophel.
    'In this way' is idiomatic and preserves the demonstrative force without woodenly
    rendering דָבָר as 'word'.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The perfect reports a completed prior speech whose content is immediately
    under consideration. English present perfect naturally conveys that relevance.
- source_word: הֲנַעֲשֶׂה
  chosen: Should we do
  alternatives:
  - Shall we do
  - Are we to do
  lexicon: HALOT
  rationale: Interrogative plus first common plural imperfect expresses deliberation.
    'Should we do' captures the consultative sense in contemporary English.
- source_word: אֶת דְּבָרוֹ
  chosen: what he says
  alternatives:
  - his word
  - his proposal
  - what he has said
  lexicon: HALOT
  rationale: Although literally 'his word,' the idiom here refers to Ahithophel's
    counsel/proposal. 'What he says' is a clear optimal-equivalence rendering that
    preserves the sense without overinterpreting.
- source_word: אִם אַיִן
  chosen: If not
  alternatives:
  - But if not
  - If there is not
  lexicon: HALOT
  rationale: This is an idiomatic conditional contrast in deliberative speech. 'If
    not' is the most natural concise rendering.
- source_word: אַתָּה דַבֵּר
  chosen: you speak
  alternatives:
  - you tell us
  - speak yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis before the imperative. 'You speak'
    preserves that emphasis better than a bare 'speak,' while avoiding expansion beyond
    the Hebrew.
