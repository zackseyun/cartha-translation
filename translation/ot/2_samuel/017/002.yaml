id: 2SA.17.2
reference: 2 Samuel 17:2
source:
  edition: WLC
  text: וְ/אָב֣וֹא עָלָ֗י/ו וְ/ה֤וּא יָגֵ֨עַ֙ וּ/רְפֵ֣ה יָדַ֔יִם וְ/הַֽחֲרַדְתִּ֣י
    אֹת֔/וֹ וְ/נָ֖ס כָּל הָ/עָ֣ם אֲשֶׁר אִתּ֑/וֹ וְ/הִכֵּיתִ֥י אֶת הַ/מֶּ֖לֶךְ לְ/בַדּֽ/וֹ־־־׃
translation:
  text: I will come upon him while he is weary and weak-handed, and I will throw him
    into panic, so that all the people who are with him will flee; then I will strike
    down the king alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'weak of hands,' an idiom for diminished strength or courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָב֣וֹא עָלָ֗יו
  chosen: I will come upon him
  alternatives:
  - I will come against him
  - I will attack him
  lexicon: HALOT
  rationale: בוא with עַל can denote coming upon/against someone in a hostile sense.
    'Come upon him' preserves the verbal imagery while allowing the military nuance
    to be carried by context.
- source_word: יָגֵעַ
  chosen: weary
  alternatives:
  - exhausted
  - faint
  lexicon: HALOT
  rationale: The adjective denotes weariness from exertion. 'Weary' is natural modern
    English and fits the immediate military context.
- source_word: וּ/רְפֵה יָדַיִם
  chosen: weak-handed
  alternatives:
  - with slack hands
  - discouraged
  - feeble
  lexicon: HALOT
  rationale: Literally 'slack/weak of hands.' I retained the concrete idiom as 'weak-handed'
    to preserve the Hebrew image of diminished strength/courage, rather than flattening
    it to a purely psychological gloss.
- source_word: וְ/הַֽחֲרַדְתִּי אֹתוֹ
  chosen: I will throw him into panic
  alternatives:
  - I will terrify him
  - I will make him tremble
  lexicon: HALOT
  rationale: 'The Hiphil of חרד is causative: to make someone tremble/be terrified.
    ''Throw him into panic'' communicates the causative force in idiomatic English
    within a battle setting.'
- source_word: וְ/נָס כָּל הָעָם אֲשֶׁר אִתּוֹ
  chosen: so that all the people who are with him will flee
  alternatives:
  - and all the people with him will flee
  lexicon: HALOT
  rationale: Though the Hebrew uses simple coordination, English benefits from making
    the result relation explicit after 'throw him into panic.' 'The people who are
    with him' preserves the relational phrase אֲשֶׁר אִתּוֹ.
- source_word: וְ/הִכֵּיתִי
  chosen: I will strike down
  alternatives:
  - I will strike
  - I will kill
  lexicon: HALOT
  rationale: נכה often means strike/smite and in context implies lethal attack. 'Strike
    down' preserves the verbal form without over-specifying beyond what the context
    strongly suggests.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: The noun is definite and should remain so. In context this refers to
    David, but the Hebrew says 'the king,' and the title should be preserved.
- source_word: לְ/בַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: The phrase emphasizes isolating the king as the sole target. 'Alone'
    is concise and preserves that focus.
