id: 2SA.17.23
reference: 2 Samuel 17:23
source:
  edition: WLC
  text: וַ/אֲחִיתֹ֣פֶל רָאָ֗ה כִּ֣י לֹ֣א נֶעֶשְׂתָה֮ עֲצָת/וֹ֒ וַ/יַּחֲבֹ֣שׁ אֶֽת
    הַ/חֲמ֗וֹר וַ/יָּ֜קָם וַ/יֵּ֤לֶךְ אֶל בֵּית/וֹ֙ אֶל עִיר֔/וֹ וַ/יְצַ֥ו אֶל בֵּית֖/וֹ
    וַ/יֵּחָנַ֑ק וַ/יָּ֕מָת וַ/יִּקָּבֵ֖ר בְּ/קֶ֥בֶר אָבִֽי/ו־־־־׃ס
translation:
  text: When Ahithophel saw that his counsel had not been followed, he saddled the
    donkey, arose, and went to his house in his city. He gave orders to his household,
    then hanged himself and died; and he was buried in his father's tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his counsel had not been carried out.' The Hebrew is literally 'his
      counsel was not done.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He set his house in order.' The Hebrew more literally says 'he gave
      orders to his house/household.'
    reason: lexical_alternative
  - marker: c
    text: Or 'strangled himself.' The verb can denote death by hanging or strangling;
      in context it describes Ahithophel's suicide.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָתוֹ
  chosen: his counsel
  alternatives:
  - his advice
  - his plan
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, advice, or plan. 'Counsel' preserves
    both the advisory and strategic sense in this political context.
- source_word: נֶעֶשְׂתָה
  chosen: had not been followed
  alternatives:
  - had not been done
  - had not been carried out
  lexicon: HALOT
  rationale: Although the verb is literally 'was not done,' in context it refers to
    Ahithophel's advice not being implemented. 'Had not been followed' expresses the
    idiomatic sense in natural English without undue paraphrase.
- source_word: וַיַּחֲבֹשׁ אֶת־הַחֲמוֹר
  chosen: he saddled the donkey
  alternatives:
  - he saddled his donkey
  - he bound the donkey for riding
  lexicon: HALOT
  rationale: חבש with a donkey refers to saddling or preparing it for travel. The
    Hebrew has the definite article 'the donkey,' not an explicit possessive, so 'the
    donkey' is retained.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: A common narrative verb. 'Arose' preserves the sequential Hebrew style
    while remaining readable.
- source_word: אֶל־בֵּיתוֹ אֶל־עִירוֹ
  chosen: to his house in his city
  alternatives:
  - to his house, to his city
  - home to his city
  lexicon: HALOT
  rationale: The double אֶל likely specifies first the destination generally ('to
    his house') and then more particularly ('in his city'). 'To his house in his city'
    is idiomatic English that preserves both elements.
- source_word: וַיְצַו אֶל־בֵּיתוֹ
  chosen: He gave orders to his household
  alternatives:
  - he set his house in order
  - he gave instructions concerning his house
  lexicon: HALOT
  rationale: The phrase can mean he gave instructions to his household or arranged
    his affairs. 'Gave orders to his household' stays close to the preposition אֶל
    while fitting the immediate context before his death. The common interpretive
    rendering 'set his house in order' is possible but more idiomatic than the Hebrew
    explicitly states.
- source_word: וַיֵּחָנַק
  chosen: hanged himself
  alternatives:
  - strangled himself
  - was hanged
  lexicon: HALOT
  rationale: 'The Niphal/waw form here is best understood reflexively in context:
    Ahithophel commits suicide. ''Hanged himself'' is the standard idiomatic English
    rendering for this mode of death and matches the narrative sense better than the
    more ambiguous ''was hanged.'''
- source_word: בְּקֶבֶר אָבִיו
  chosen: in his father's tomb
  alternatives:
  - in the grave of his father
  - in his ancestral burial place
  lexicon: HALOT
  rationale: קֶבֶר can mean grave or tomb. 'Tomb' fits a family burial context in
    narrative English and preserves the filial reference.
