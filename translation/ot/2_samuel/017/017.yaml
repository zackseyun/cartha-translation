id: 2SA.17.17
reference: 2 Samuel 17:17
source:
  edition: WLC
  text: וִ/יהוֹנָתָ֨ן וַ/אֲחִימַ֜עַץ עֹמְדִ֣ים בְּ/עֵין רֹגֵ֗ל וְ/הָלְכָ֤ה הַ/שִּׁפְחָה֙
    וְ/הִגִּ֣ידָה לָ/הֶ֔ם וְ/הֵם֙ יֵֽלְכ֔וּ וְ/הִגִּ֖ידוּ לַ/מֶּ֣לֶךְ דָּוִ֑ד כִּ֣י
    לֹ֥א יוּכְל֛וּ לְ/הֵרָא֖וֹת לָ/ב֥וֹא הָ/עִֽירָ/ה־׃
translation:
  text: Now Jonathan and Ahimaaz were staying at En-rogel, and a female servant would
    go and tell them, and they would go and tell King David, for they could not be
    seen entering the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were standing at En-rogel.' The Hebrew participle literally says 'standing,'
      but in context it likely means they were stationed there.
    reason: lexical_alternative
  - marker: b
    text: Or 'the maidservant' / 'the servant girl.' The Hebrew שִׁפְחָה refers specifically
      to a female servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמְדִים
  chosen: were staying
  alternatives:
  - were standing
  - stood
  lexicon: HALOT
  rationale: Although the participle of עמד literally means 'standing,' in narrative
    context with a location it can denote remaining/stationing oneself there. 'Were
    staying' communicates their continued position at En-rogel more naturally in English
    while preserving the sense that they were posted there.
- source_word: בְּעֵין רֹגֵל
  chosen: at En-rogel
  alternatives:
  - by En-rogel
  - at the spring of Rogel
  lexicon: HALOT
  rationale: This is a place name. Per translation philosophy, names are transliterated
    rather than translated. 'At' fits the locative sense naturally in English.
- source_word: הַשִּׁפְחָה
  chosen: a female servant
  alternatives:
  - the servant girl
  - the maidservant
  - the slave girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. Because the verse introduces
    her function rather than emphasizing bonded status, 'female servant' is a clear,
    readable rendering. The article likely marks a known participant in context, but
    English idiom can introduce such a figure with an indefinite expression without
    loss of sense.
- source_word: וְהָלְכָה
  chosen: would go
  alternatives:
  - went
  - was going
  lexicon: HALOT
  rationale: In this narrative setup, the qatal after the participle describes the
    customary or intended action in the communication chain. 'Would go' captures the
    iterative/procedural sense better than a simple past.
- source_word: וְהִגִּידָה לָהֶם
  chosen: tell them
  alternatives:
  - report to them
  - inform them
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, report, or declare. 'Tell them' is the most
    natural English in this espionage-like sequence.
- source_word: וְהֵם יֵלְכוּ וְהִגִּידוּ
  chosen: they would go and tell
  alternatives:
  - they would go and report
  - they went and told
  lexicon: HALOT
  rationale: 'The yiqtol + qatal sequence continues the procedural sense: after receiving
    the message, they in turn would go inform David. ''Would go and tell'' preserves
    the chain of action.'
- source_word: לַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - to the king, David
  - to King David
  lexicon: HALOT
  rationale: English idiom naturally renders the title-name combination as 'King David.'
- source_word: כִּי לֹא יוּכְלוּ
  chosen: for they could not
  alternatives:
  - because they could not
  - since they were not able to
  lexicon: HALOT
  rationale: כִּי here gives the reason for the arrangement. 'For' is concise and
    fits the explanatory clause.
- source_word: לְהֵרָאוֹת
  chosen: be seen
  alternatives:
  - appear
  - be visible
  - show themselves
  lexicon: HALOT
  rationale: The Niphal infinitive of ראה here is passive/reflexive in sense. In context
    the concern is detection, so 'be seen' is the clearest rendering.
- source_word: לָבוֹא הָעִירָה
  chosen: entering the city
  alternatives:
  - to come into the city
  - to go into the city
  lexicon: HALOT
  rationale: The directional ending on עִירָה marks motion toward the city. 'Entering
    the city' is idiomatic and pairs well with 'be seen' in English.
