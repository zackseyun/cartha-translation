id: 2SA.17.16
reference: 2 Samuel 17:16
source:
  edition: WLC
  text: וְ/עַתָּ֡ה שִׁלְח֣וּ מְהֵרָה֩ וְ/הַגִּ֨ידוּ לְ/דָוִ֜ד לֵ/אמֹ֗ר אַל תָּ֤לֶן
    הַ/לַּ֨יְלָה֙ בְּ/עַֽרְב֣וֹת הַ/מִּדְבָּ֔ר וְ/גַ֖ם עָב֣וֹר תַּעֲב֑וֹר פֶּ֚ן יְבֻלַּ֣ע
    לַ/מֶּ֔לֶךְ וּ/לְ/כָל הָ/עָ֖ם אֲשֶׁ֥ר אִתּֽ/וֹ־־׃
translation:
  text: Now send quickly and tell David, saying, ‘Do not stay tonight at the fords
    of the wilderness, but also be sure to cross over, lest the king and all the people
    who are with him be swallowed up.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the plains of the wilderness.' The Hebrew phrase can denote desert
      lowlands/plains; here 'fords' is chosen because the immediate context stresses
      crossing over and imminent danger near a crossing point.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - So now
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing urgent next action. 'Now' is natural modern
    English and preserves the immediacy.
- source_word: שִׁלְחוּ מְהֵרָה
  chosen: send quickly
  alternatives:
  - send at once
  - send in haste
  lexicon: HALOT
  rationale: Imperative plus adverbial noun expressing urgency. 'Send quickly' is
    concise and idiomatic.
- source_word: וְהַגִּידוּ לְדָוִד לֵאמֹר
  chosen: and tell David, saying
  alternatives:
  - and report to David
  - and inform David
  lexicon: HALOT
  rationale: Retains the Hebrew messenger formula. 'Tell David, saying' is slightly
    formal but transparent and fitting in narrative speech introduction.
- source_word: אַל תָּלֶן הַלַּיְלָה
  chosen: Do not stay tonight
  alternatives:
  - Do not lodge tonight
  - Do not spend the night
  lexicon: HALOT
  rationale: לון commonly means to lodge or spend the night. 'Stay tonight' is readable
    modern English without losing the sense.
- source_word: בְּעַרְבוֹת הַמִּדְבָּר
  chosen: at the fords of the wilderness
  alternatives:
  - in the plains of the wilderness
  - at the crossings of the wilderness
  lexicon: HALOT
  rationale: Though ערבות can denote desert plains, in this context with the following
    command to cross over and the danger of being overtaken, 'fords' best fits the
    immediate geography and action. The phrase likely refers to the Jordan crossing
    area.
- source_word: וְגַם עָבוֹר תַּעֲבוֹר
  chosen: but also be sure to cross over
  alternatives:
  - indeed, cross over
  - yes, you must cross over
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the command. 'Be sure
    to cross over' captures the emphatic force in natural English; 'but also' reflects
    וְגַם as adding a stronger instruction beyond merely not staying.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Standard warning conjunction. 'Lest' is still clear in English and preserves
    the concise force of the Hebrew.
- source_word: יְבֻלַּע
  chosen: be swallowed up
  alternatives:
  - be consumed
  - be destroyed
  - be overwhelmed
  lexicon: HALOT
  rationale: Passive of בלע literally means 'be swallowed.' In military danger it
    can imply destruction or being engulfed. 'Be swallowed up' preserves the vivid
    Hebrew image while remaining intelligible.
- source_word: לַמֶּלֶךְ
  chosen: the king
  alternatives:
  - the king himself
  lexicon: HALOT
  rationale: Although the referent is David, the Hebrew uses the title. Retaining
    'the king' preserves the narrative register and political status.
- source_word: וּלְכָל הָעָם אֲשֶׁר אִתּוֹ
  chosen: and all the people who are with him
  alternatives:
  - and all the troops with him
  - and all the people with him
  lexicon: HALOT
  rationale: עָם is broader than 'troops' and includes David's company generally.
    'Who are with him' closely follows the relative clause.
