id: 2SA.17.29
reference: 2 Samuel 17:29
source:
  edition: WLC
  text: וּ/דְבַ֣שׁ וְ/חֶמְאָ֗ה וְ/צֹאן֙ וּ/שְׁפ֣וֹת בָּקָ֔ר הִגִּ֧ישׁוּ לְ/דָוִ֛ד
    וְ/לָ/עָ֥ם אֲשֶׁר אִתּ֖/וֹ לֶ/אֱכ֑וֹל כִּ֣י אָמְר֔וּ הָ/עָ֗ם רָעֵ֛ב וְ/עָיֵ֥ף
    וְ/צָמֵ֖א בַּ/מִּדְבָּֽר־׃
translation:
  text: and honey and curds and sheep and cheese from the herd they brought near for
    David and for the people who were with him to eat, for they said, “The people
    are hungry and weary and thirsty in the wilderness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'butter' for חֶמְאָה; the Hebrew term can denote a milk product broadly,
      but here it likely refers to curds rather than modern butter.
    reason: lexical_alternative
  - marker: b
    text: Or 'small livestock' for צֹאן; the Hebrew can refer collectively to sheep
      and goats.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'cheese from the herd' renders Hebrew שְׁפוֹת בָּקָר, a cattle-based
      dairy product; some translations paraphrase more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַשׁ
  chosen: honey
  alternatives:
  - syrup
  lexicon: HALOT
  rationale: The standard sense is 'honey.' In some contexts the word can refer more
    broadly to a sweet syrup, but here among food provisions 'honey' is the most natural
    and conventional rendering.
- source_word: חֶמְאָה
  chosen: curds
  alternatives:
  - butter
  - cream
  lexicon: HALOT
  rationale: In biblical usage this term often refers to a curdled milk product rather
    than modern churned butter. 'Curds' best fits the ancient food context and readable
    modern English.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - small livestock
  - flock animals
  lexicon: HALOT
  rationale: The noun can denote small livestock collectively, including sheep and
    goats, but 'sheep' is a natural concise rendering here. The broader sense is possible,
    yet the verse lists provisions in a compact way and English commonly uses 'sheep'
    in such contexts.
- source_word: שְׁפוֹת בָּקָר
  chosen: cheese from the herd
  alternatives:
  - cow's milk cheese
  - cheeses of cattle
  lexicon: HALOT
  rationale: The phrase denotes a dairy product associated with cattle. 'Cheese from
    the herd' preserves the concrete sense without over-specifying the exact production
    method. It is more precise than simply 'milk' and more idiomatic than a wooden
    plural like 'cheeses of cattle.'
- source_word: הִגִּישׁוּ
  chosen: they brought near
  alternatives:
  - they presented
  - they brought
  lexicon: HALOT
  rationale: The verb literally means 'bring near/present.' 'They brought near' preserves
    the formal nuance of supplying these provisions to David and his people, while
    still sounding natural enough in context.
- source_word: לְדָוִד וְלָעָם אֲשֶׁר אִתּוֹ
  chosen: for David and for the people who were with him
  alternatives:
  - to David and to the people with him
  lexicon: HALOT
  rationale: The paired prepositions are retained with 'for ... and for ...' to reflect
    the distributive sense of the Hebrew, while the relative clause is rendered straightforwardly.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for food
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To eat' is the simplest and clearest
    rendering in English.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their action. 'For they said' preserves
    the explanatory force and narrative flow.
- source_word: רָעֵב וְעָיֵף וְצָמֵא
  chosen: hungry and weary and thirsty
  alternatives:
  - famished and exhausted and thirsty
  lexicon: HALOT
  rationale: These are straightforward predicate adjectives. 'Hungry and weary and
    thirsty' keeps the triad's rhythm without exaggerating the intensity beyond the
    Hebrew.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or sparsely inhabited steppe rather
    than a sand desert specifically. 'Wilderness' is the better broad rendering in
    biblical narrative.
