id: 2SA.17.20
reference: 2 Samuel 17:20
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ עַבְדֵי֩ אַבְשָׁל֨וֹם אֶֽל הָ/אִשָּׁ֜ה הַ/בַּ֗יְתָ/ה וַ/יֹּֽאמְרוּ֙
    אַיֵּ֗ה אֲחִימַ֨עַץ֙ וִ/יה֣וֹנָתָ֔ן וַ/תֹּ֤אמֶר לָ/הֶם֙ הָֽ/אִשָּׁ֔ה עָבְר֖וּ
    מִיכַ֣ל הַ/מָּ֑יִם וַ/יְבַקְשׁוּ֙ וְ/לֹ֣א מָצָ֔אוּ וַ/יָּשֻׁ֖בוּ יְרוּשָׁלִָֽם־׃ס
translation:
  text: Absalom’s servants came to the woman at the house and said, “Where are Ahimaaz
    and Jonathan?” The woman said to them, “They crossed over the stream of water.”
    They searched, but did not find them, so they returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the brook” or “the water channel” for “the stream of water.” The Hebrew
      phrase is unusual (מִיכַל הַמָּיִם), and the exact nuance of the watercourse
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי אַבְשָׁלוֹם
  chosen: Absalom’s servants
  alternatives:
  - Absalom’s men
  - Absalom’s slaves
  lexicon: HALOT
  rationale: עֶבֶד can denote servant, official, or slave depending on context. Here
    it refers to agents in Absalom’s service; 'servants' is the most natural contextual
    rendering in narrative English without foregrounding bonded status, which is not
    salient in this verse.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' In context the referent is the woman
    of the house previously introduced, not specifically her marital relation, so
    'the woman' is best.
- source_word: הַבַּיְתָה
  chosen: at the house
  alternatives:
  - into the house
  - to the house
  lexicon: HALOT
  rationale: The directional he on בַּיִת marks motion toward the house. Because the
    following dialogue occurs with the woman there, 'at the house' gives idiomatic
    English while preserving arrival at that location. 'Into the house' is possible
    but slightly more specific than the Hebrew requires.
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: 'The interrogative asks location. Since two persons follow, English requires
    plural agreement: ''Where are''.'
- source_word: עָבְרוּ
  chosen: They crossed over
  alternatives:
  - They passed by
  - They went across
  lexicon: HALOT
  rationale: עבר commonly means to pass over/across. Here it describes moving beyond
    a watercourse, so 'crossed over' is the clearest rendering.
- source_word: מִיכַל הַמָּיִם
  chosen: the stream of water
  alternatives:
  - the brook
  - the water channel
  - the wadi
  lexicon: HALOT
  rationale: The phrase is somewhat unusual and likely denotes a small flowing watercourse
    or channel. 'Stream of water' stays close to the Hebrew without over-specifying
    a technical topographical term. 'Brook' is possible and traditional; 'wadi' may
    be too specialized for the target reader.
- source_word: וַיְבַקְשׁוּ
  chosen: They searched
  alternatives:
  - They looked
  - They sought
  lexicon: HALOT
  rationale: בקשׁ in this context means to search for someone. 'Searched' best fits
    the narrative action.
- source_word: וְלֹא מָצָאוּ
  chosen: but did not find them
  alternatives:
  - and did not find them
  lexicon: HALOT
  rationale: The Hebrew conjunction is simply 'and,' but English idiom often uses
    'but' to mark the unsuccessful result of the search. 'Them' is supplied from context
    because the object is implicit in Hebrew but explicit in natural English.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  chosen: so they returned to Jerusalem
  alternatives:
  - and they returned to Jerusalem
  lexicon: HALOT
  rationale: שׁוב means return. 'So' makes the sequence/result relation natural in
    English while remaining faithful to the narrative flow.
