id: 2SA.17.21
reference: 2 Samuel 17:21
source:
  edition: WLC
  text: וַ/יְהִ֣י אַחֲרֵ֣י לֶכְתָּ֗/ם וַֽ/יַּעֲלוּ֙ מֵֽ/הַ/בְּאֵ֔ר וַ/יֵּ֣לְכ֔וּ וַ/יַּגִּ֖דוּ
    לַ/מֶּ֣לֶךְ דָּוִ֑ד וַ/יֹּאמְר֣וּ אֶל דָּוִ֗ד ק֣וּמוּ וְ/עִבְר֤וּ מְהֵרָה֙ אֶת
    הַ/מַּ֔יִם כִּי כָ֛כָה יָעַ֥ץ עֲלֵי/כֶ֖ם אֲחִיתֹֽפֶל׀־־־׃
translation:
  text: After they had gone, they came up out of the well and went and told King David.
    They said to David, “Get up and cross over the water quickly, for this is what
    Ahithophel has advised against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “has counseled against you.”
    reason: lexical_alternative
  - marker: b
    text: “The water” likely refers to the Jordan River in the immediate narrative
      context.
    reason: cross_reference
lexical_decisions:
- source_word: אַחֲרֵי לֶכְתָּם
  chosen: After they had gone
  alternatives:
  - After their departure
  - After they left
  lexicon: HALOT
  rationale: 'The construction אַחֲרֵי + infinitive with suffix marks temporal sequence:
    ''after their going.'' ''After they had gone'' is natural modern English and preserves
    the sense.'
- source_word: וַיַּעֲלוּ מֵהַבְּאֵר
  chosen: they came up out of the well
  alternatives:
  - they went up from the well
  - they came out of the cistern
  lexicon: HALOT
  rationale: עלה with מן conveys upward movement from inside the pit/well. 'Well'
    is the plain sense of בְּאֵר here; 'came up out of' reflects the physical emergence.
- source_word: וַיַּגִּדוּ
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told' is concise
    and idiomatic in narrative English.
- source_word: לַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - to the king, David
  lexicon: HALOT
  rationale: The appositional phrase is best rendered as the standard English title-name
    combination 'King David.'
- source_word: קוּמוּ
  chosen: Get up
  alternatives:
  - Arise
  - Rise up
  lexicon: HALOT
  rationale: The imperative calls for immediate action. 'Get up' is readable modern
    English without undue archaism.
- source_word: וְעִבְרוּ מְהֵרָה אֶת הַמַּיִם
  chosen: cross over the water quickly
  alternatives:
  - cross the waters quickly
  - pass over the water at once
  lexicon: HALOT
  rationale: עבר with אֶת הַמַּיִם refers to crossing a body of water, likely the
    Jordan in context. Singular 'the water' reproduces the Hebrew idiom naturally
    in English.
- source_word: כִּי כָכָה
  chosen: for this is what
  alternatives:
  - for thus
  - because this is how
  lexicon: HALOT
  rationale: The combination introduces the content or manner of Ahithophel's counsel.
    'For this is what' is idiomatic and clear.
- source_word: יָעַץ עֲלֵיכֶם
  chosen: has advised against you
  alternatives:
  - has counseled against you
  - has planned against you
  lexicon: HALOT
  rationale: יעץ means to advise/counsel. With עַל plus pronominal suffix in this
    hostile context, the sense is counsel directed against David and his party. 'Advised
    against you' preserves the verbal idea better than the more interpretive 'planned
    against you.'
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
