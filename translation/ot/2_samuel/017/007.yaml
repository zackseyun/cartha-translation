id: 2SA.17.7
reference: 2 Samuel 17:7
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר חוּשַׁ֖י אֶל אַבְשָׁל֑וֹם לֹֽא טוֹבָ֧ה הָ/עֵצָ֛ה אֲשֶׁר יָעַ֥ץ
    אֲחִיתֹ֖פֶל בַּ/פַּ֥עַם הַ/זֹּֽאת־־־׃
translation:
  text: Then Hushai said to Absalom, “The counsel that Ahithophel has given this time
    is not good.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on this occasion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force; 'and said' is more formally
    literal but less idiomatic here.
- source_word: חוּשַׁי
  chosen: Hushai
  rationale: Personal name transliterated per project philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern equivalent.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated per project philosophy.
- source_word: לֹא טוֹבָה
  chosen: is not good
  alternatives:
  - is not sound
  - is not favorable
  lexicon: HALOT
  rationale: טוֹב in predicative use commonly means 'good.' 'Sound' would bring out
    evaluative prudence, but 'good' is broader and closer to the Hebrew.
- source_word: הָעֵצָה
  chosen: the counsel
  alternatives:
  - the advice
  - the plan
  lexicon: HALOT
  rationale: עֵצָה can mean counsel/advice/plan. 'Counsel' best fits the political-strategic
    context and preserves the formal tone of Ahithophel's advisory role.
- source_word: אֲשֶׁר יָעַץ
  chosen: that ... has given
  alternatives:
  - which ... advised
  - that ... advised
  lexicon: HALOT
  rationale: English idiom prefers 'give counsel/advice' rather than 'counsel counseled.'
    'Has given' renders the completed action naturally while retaining the relative
    clause structure.
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal name transliterated per project philosophy.
- source_word: בַּפַּעַם הַזֹּאת
  chosen: this time
  alternatives:
  - at this time
  - on this occasion
  lexicon: HALOT
  rationale: The phrase idiomatically means 'this time' or 'on this occasion.' 'This
    time' is concise, natural, and contextually clear.
