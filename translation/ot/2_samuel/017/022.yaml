id: 2SA.17.22
reference: 2 Samuel 17:22
source:
  edition: WLC
  text: וַ/יָּ֣קָם דָּוִ֗ד וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אִתּ֔/וֹ וַ/יַּעַבְר֖וּ אֶת הַ/יַּרְדֵּ֑ן
    עַד א֣וֹר הַ/בֹּ֗קֶר עַד אַחַד֙ לֹ֣א נֶעְדָּ֔ר אֲשֶׁ֥ר לֹא עָבַ֖ר אֶת הַ/יַּרְדֵּֽן־־־־־־׃
translation:
  text: Then David arose, and all the people who were with him, and they crossed the
    Jordan. By the light of morning, not one was missing who had not crossed the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until the light of morning'; the Hebrew phrase preserves the imagery
      of morning light while indicating the time by which the crossing was completed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly means 'arose' or 'got up.' 'Arose' preserves
    the narrative movement with slightly elevated but still natural English. 'Set
    out' is possible contextually but is more interpretive than the verb itself warrants.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  chosen: and all the people who were with him
  alternatives:
  - and all the people with him
  lexicon: HALOT
  rationale: This renders the full phrase transparently and naturally. 'People' is
    preferable to 'men' because הָעָם here denotes the group accompanying David, not
    specifically adult males as such.
- source_word: וַיַּעַבְרוּ אֶת הַיַּרְדֵּן
  chosen: and they crossed the Jordan
  alternatives:
  - and they crossed over the Jordan
  - and they passed over the Jordan
  lexicon: HALOT
  rationale: עבר with the direct object marker and 'the Jordan' is straightforwardly
    'crossed the Jordan.' Adding 'over' is acceptable English but slightly redundant;
    'passed over' is more traditional but less natural in contemporary English.
- source_word: עַד אוֹר הַבֹּקֶר
  chosen: By the light of morning
  alternatives:
  - until the light of morning
  - by daybreak
  - before morning light
  lexicon: HALOT
  rationale: The phrase literally involves 'until/light of the morning.' In context
    it marks the point by which the crossing was complete. 'By the light of morning'
    preserves the imagery of אוֹר while communicating the temporal sense clearly.
    'By daybreak' is idiomatic but loses the lexical image of 'light.'
- source_word: עַד אַחַד לֹא נֶעְדָּר
  chosen: not one was missing
  alternatives:
  - not even one was lacking
  - not one was absent
  lexicon: HALOT
  rationale: This idiom means that none failed to be present/accounted for. 'Not one
    was missing' is natural modern English and fits the military-flight context.
- source_word: אֲשֶׁר לֹא עָבַר אֶת הַיַּרְדֵּן
  chosen: who had not crossed the Jordan
  alternatives:
  - who did not cross the Jordan
  lexicon: HALOT
  rationale: 'The relative clause is attached to ''not one was missing'' and is best
    rendered as a litotes-like completion: there was not one who had not crossed.
    The English past perfect helps show completed action relative to the morning reference.'
