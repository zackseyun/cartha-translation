id: 2SA.17.12
reference: 2 Samuel 17:12
source:
  edition: WLC
  text: וּ/בָ֣אנוּ אֵלָ֗י/ו ב/אחת הַ/מְּקוֹמֹת֙ אֲשֶׁ֣ר נִמְצָ֣א שָׁ֔ם וְ/נַ֣חְנוּ
    עָלָ֔י/ו כַּ/אֲשֶׁ֛ר יִפֹּ֥ל הַ/טַּ֖ל עַל הָ/אֲדָמָ֑ה וְ/לֹֽא נ֥וֹתַר בּ֛/וֹ וּ/בְ/כָל
    הָ/אֲנָשִׁ֥ים אֲשֶׁר אִתּ֖/וֹ גַּם אֶחָֽד־־־־־׃
translation:
  text: Then we will come upon him in one of the places where he is found, and we
    will settle on him just as the dew falls on the ground; and not one will be left
    of him and of all the men who are with him—not even one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will descend on him'; the Hebrew verb literally means 'settle/rest
      upon,' here used in a military simile of overwhelming coverage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאנוּ
  chosen: Then we will come upon
  alternatives:
  - and we will come to
  - and we will come against
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter,' but in military context with the following
    preposition and object it carries the sense of advancing upon an opponent. 'Then'
    reflects the discourse sequence in Ahithophel's plan.
- source_word: אֵלָיו
  chosen: him
  alternatives:
  - to him
  - against him
  lexicon: HALOT
  rationale: With בוא in this context, the phrase is idiomatically hostile rather
    than merely directional. English 'come upon him' captures the attack sense without
    overparaphrase.
- source_word: בְאַחַת הַמְּקֹמוֹת אֲשֶׁר נִמְצָא שָׁם
  chosen: in one of the places where he is found
  alternatives:
  - at one of the places where he may be found
  - in whatever place he is found there
  lexicon: HALOT
  rationale: This phrase indicates any location in which David might be discovered.
    'Where he is found' preserves the passive nuance of נִמְצָא and avoids adding
    modal force not explicit in the Hebrew.
- source_word: וְנַחְנוּ עָלָיו
  chosen: and we will settle on him
  alternatives:
  - and we will rest on him
  - and we will descend on him
  - and we will light upon him
  lexicon: HALOT
  rationale: The verb from נוח literally means 'rest/settle.' In context of an overwhelming
    attack, 'settle on him' conveys sustained pressure and matches the following simile
    of dew covering the ground. 'Descend on' is possible but imports motion not explicit
    in the verb.
- source_word: כַּאֲשֶׁר יִפֹּל הַטַּל עַל הָאֲדָמָה
  chosen: just as the dew falls on the ground
  alternatives:
  - as dew falls on the earth
  - like the dew that falls on the land
  lexicon: HALOT
  rationale: A straightforward simile of completeness and inevitability. 'Ground'
    is more natural English here than 'earth' while preserving the image.
- source_word: וְלֹא נוֹתַר
  chosen: and not one will be left
  alternatives:
  - and none will remain
  - and there will not remain
  lexicon: HALOT
  rationale: The Niphal of יתר expresses remaining/surviving. Rendering with singular
    'not one' anticipates the final גַּם אֶחָד and produces idiomatic English.
- source_word: בּוֹ
  chosen: of him
  alternatives:
  - in him
  - from him
  lexicon: HALOT
  rationale: The preposition is idiomatic after 'be left/remain,' referring to the
    group centered on him. 'Of him' works in English to indicate that none belonging
    to his side survives.
- source_word: וּבְכָל הָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  chosen: and of all the men who are with him
  alternatives:
  - or of all the men with him
  - and among all the men who are with him
  lexicon: HALOT
  rationale: This extends the statement from David himself to his entire company.
    'Men' is gender-accurate and contextually refers to fighting men/companions.
- source_word: גַּם אֶחָד
  chosen: not even one
  alternatives:
  - even one
  - a single one
  lexicon: HALOT
  rationale: An emphatic idiom reinforcing total annihilation. Rendered explicitly
    for natural English emphasis.
