id: 2SA.17.15
reference: 2 Samuel 17:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חוּשַׁ֗י אֶל צָד֤וֹק וְ/אֶל אֶבְיָתָר֙ הַ/כֹּ֣הֲנִ֔ים כָּ/זֹ֣את
    וְ/כָ/זֹ֗את יָעַ֤ץ אֲחִיתֹ֨פֶל֙ אֶת אַבְשָׁלֹ֔ם וְ/אֵ֖ת זִקְנֵ֣י יִשְׂרָאֵ֑ל וְ/כָ/זֹ֥את
    וְ/כָ/זֹ֖את יָעַ֥צְתִּי אָֽנִי־־־׃
translation:
  text: Then Hushai said to Zadok and to Abiathar the priests, “This and that is what
    Ahithophel advised Absalom and the elders of Israel, and this and that is what
    I have advised.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''this and that'' (traditional: ''thus and thus''), meaning
      the substance of what was said without repeating it word for word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'and said.'
- source_word: חוּשַׁי
  chosen: Hushai
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל צָדוֹק וְאֶל אֶבְיָתָר הַכֹּהֲנִים
  chosen: to Zadok and to Abiathar the priests
  alternatives:
  - to Zadok and Abiathar the priests
  - to the priests Zadok and Abiathar
  lexicon: HALOT
  rationale: Retains both prepositions for clarity and keeps 'the priests' appositional
    to both names. This is the most transparent rendering of the Hebrew syntax in
    readable English.
- source_word: כָּזֹאת וְכָזֹאת
  chosen: This and that
  alternatives:
  - Thus and thus
  - Such and such
  lexicon: HALOT
  rationale: The idiom reports the substance of speech/advice without repeating it
    in full. 'This and that' is idiomatic modern English; 'thus and thus' is more
    formal/traditional but less natural today.
- source_word: יָעַץ
  chosen: advised
  alternatives:
  - counseled
  - gave counsel to
  lexicon: HALOT
  rationale: In this political context the verb refers to giving strategic counsel.
    'Advised' is natural and sufficiently weighty; 'counseled' is possible but slightly
    less common in contemporary narrative English.
- source_word: אֶת אַבְשָׁלֹם וְאֵת זִקְנֵי יִשְׂרָאֵל
  chosen: Absalom and the elders of Israel
  alternatives:
  - to Absalom and the elders of Israel
  lexicon: HALOT
  rationale: Although English often supplies 'to' after 'advised,' the direct-object
    marking in Hebrew allows a smooth English rendering without repeating the preposition.
    The relation remains clear from the verb 'advised.'
- source_word: וְכָזֹאת וְכָזֹאת
  chosen: and this and that
  alternatives:
  - and thus and thus
  - and such and such
  lexicon: HALOT
  rationale: The repeated idiom contrasts Hushai's counsel with Ahithophel's. Matching
    the first occurrence preserves the rhetorical parallel.
- source_word: יָעַצְתִּי אָנִי
  chosen: is what I have advised
  alternatives:
  - I advised
  - I have counseled
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, and the English cleft construction
    'is what I have advised' preserves that emphasis naturally. Present perfect fits
    the immediate report of recently completed counsel with present relevance.
