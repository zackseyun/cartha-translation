id: 2SA.17.10
reference: 2 Samuel 17:10
source:
  edition: WLC
  text: וְ/ה֣וּא גַם בֶּן חַ֗יִל אֲשֶׁ֥ר לִבּ֛/וֹ כְּ/לֵ֥ב הָ/אַרְיֵ֖ה הִמֵּ֣ס יִמָּ֑ס
    כִּֽי יֹדֵ֤עַ כָּל יִשְׂרָאֵל֙ כִּי גִבּ֣וֹר אָבִ֔י/ךָ וּ/בְנֵי חַ֖יִל אֲשֶׁ֥ר
    אִתּֽ/וֹ־־־־־־׃
translation:
  text: Even the valiant man whose heart is like a lion’s heart will utterly melt,
    for all Israel knows that your father is a mighty man, and that the men with him
    are valiant men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'man of valor' / 'mighty man' for both occurrences of חַיִל-based idioms
      in this verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'will melt, melt'—an emphatic construction meaning 'will utterly
      melt' or 'will surely lose heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן חַיִל
  chosen: valiant man
  alternatives:
  - man of valor
  - mighty man
  lexicon: HALOT
  rationale: The idiom literally means 'son of valor/strength' and denotes a warrior
    characterized by courage or military prowess. 'Valiant man' is natural modern
    English and preserves the singular individual in view.
- source_word: לִבּוֹ כְּלֵב הָאַרְיֵה
  chosen: whose heart is like a lion’s heart
  alternatives:
  - whose heart is like the heart of a lion
  - lionhearted
  lexicon: HALOT
  rationale: Retains the Hebrew simile rather than compressing it into the idiomatic
    adjective 'lionhearted.' This better preserves the source imagery while remaining
    readable.
- source_word: הִמֵּס יִמָּס
  chosen: will utterly melt
  alternatives:
  - will surely melt
  - will completely lose heart
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verb מסס. 'Will
    utterly melt' captures the emphatic force and the metaphor of courage dissolving.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason for the preceding statement.
    'For' fits the explanatory flow in English.
- source_word: יֹדֵעַ כָּל יִשְׂרָאֵל
  chosen: all Israel knows
  alternatives:
  - all Israel well knows
  - all Israel is aware
  lexicon: HALOT
  rationale: A straightforward rendering of the participial construction expressing
    general, established knowledge.
- source_word: גִבּוֹר
  chosen: a mighty man
  alternatives:
  - a warrior
  - mighty
  lexicon: HALOT
  rationale: Describes David as a powerful warrior. 'A mighty man' preserves the nominal
    force and echoes the military context.
- source_word: וּבְנֵי חַיִל
  chosen: the men with him are valiant men
  alternatives:
  - those with him are men of valor
  - his companions are valiant warriors
  lexicon: HALOT
  rationale: The phrase literally means 'sons of valor.' Rendering it as 'valiant
    men' keeps the lexical connection with the earlier singular phrase while sounding
    natural in English.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: with him
  alternatives:
  - who are with him
  lexicon: HALOT
  rationale: A concise rendering of the relative phrase modifying 'men.'
