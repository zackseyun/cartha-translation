id: 2SA.17.19
reference: 2 Samuel 17:19
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח הָ/אִשָּׁ֗ה וַ/תִּפְרֹ֤שׂ אֶת הַ/מָּסָךְ֙ עַל פְּנֵ֣י הַ/בְּאֵ֔ר
    וַ/תִּשְׁטַ֥ח עָלָ֖י/ו הָֽ/רִפ֑וֹת וְ/לֹ֥א נוֹדַ֖ע דָּבָֽר־־׃
translation:
  text: Then the woman took a covering and spread it over the mouth of the well, and
    scattered crushed grain on it, so that nothing was known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spread out grain on it'; the Hebrew term refers to crushed or pounded
      grain products.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and no thing was known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: The noun אִשָּׁה can mean 'woman' or 'wife.' In this narrative, the referent
    is the woman of the house already introduced in context, so 'the woman' is the
    most natural and least interpretively loaded rendering.
- source_word: הַמָּסָךְ
  chosen: a covering
  alternatives:
  - the covering
  - a cloth
  - a screen
  lexicon: HALOT
  rationale: מָסָךְ denotes a covering, curtain, or screen. Here it is a practical
    item used to conceal the well, so 'a covering' is broad and natural English without
    over-specifying the material.
- source_word: עַל־פְּנֵי הַבְּאֵר
  chosen: over the mouth of the well
  alternatives:
  - over the surface of the well
  - over the face of the well
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי literally means 'over the face/surface of.' For
    a well in English, 'over the mouth of the well' best conveys the opening being
    covered.
- source_word: וַתִּשְׁטַח
  chosen: scattered
  alternatives:
  - spread out
  - strewed
  lexicon: HALOT
  rationale: The verb שטח means to spread out. With רִפוֹת as the object, the sense
    is that she spread/scattered them over the covering to disguise it. 'Scattered'
    communicates the action idiomatically in context.
- source_word: הָרִפוֹת
  chosen: crushed grain
  alternatives:
  - groats
  - bruised grain
  - pounded grain
  lexicon: HALOT
  rationale: רִיפוֹת refers to crushed or pounded grain products. 'Crushed grain'
    is understandable modern English and fits the concealment scene better than the
    archaic 'groats,' while preserving the agricultural detail.
- source_word: וְלֹא נוֹדַע דָּבָר
  chosen: so that nothing was known
  alternatives:
  - and nothing was noticed
  - and the matter was not known
  lexicon: HALOT
  rationale: The passive construction literally means 'and a thing was not known.'
    In context it indicates that the concealment succeeded and nothing was detected.
    'So that nothing was known' preserves the passive sense while reading naturally
    in English.
