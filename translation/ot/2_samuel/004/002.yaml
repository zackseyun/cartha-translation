id: 2SA.4.2
reference: 2 Samuel 4:2
source:
  edition: WLC
  text: וּ/שְׁנֵ֣י אֲנָשִׁ֣ים שָׂרֵֽי גְדוּדִ֣ים הָי֪וּ בֶן שָׁא֟וּל שֵׁם֩ הָ/אֶחָ֨ד
    בַּֽעֲנָ֜ה וְ/שֵׁ֧ם הַ/שֵּׁנִ֣י רֵכָ֗ב בְּנֵ֛י רִמּ֥וֹן הַ/בְּאֶֽרֹתִ֖י מִ/בְּנֵ֣י
    בִנְיָמִ֑ן כִּ֚י גַּם בְּאֵר֔וֹת תֵּחָשֵׁ֖ב עַל בִּנְיָמִֽן־־־־׃
translation:
  text: 'And Saul’s son had two men who were commanders of raiding bands: the name
    of the one was Baanah, and the name of the second was Rechab, sons of Rimmon the
    Beerothite, from the sons of Benjamin; for Beeroth also was considered part of
    Benjamin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was counted as belonging to Benjamin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי אֲנָשִׁים
  chosen: two men
  alternatives:
  - two persons
  lexicon: HALOT
  rationale: Straightforward masculine plural referring to male individuals; 'men'
    is the natural gender-accurate rendering.
- source_word: שָׂרֵי גְדוּדִים
  chosen: commanders of raiding bands
  alternatives:
  - captains of troops
  - leaders of bands
  lexicon: HALOT
  rationale: שָׂרֵי denotes leaders/commanders, and גְדוּדִים commonly refers to bands,
    often raiding parties rather than formal army units. 'Commanders of raiding bands'
    preserves the irregular-military sense better than the traditional 'captains of
    bands.'
- source_word: בֶן שָׁאוּל
  chosen: Saul’s son
  alternatives:
  - the son of Saul
  lexicon: HALOT
  rationale: Construct phrase referring to Ish-bosheth from the previous verse. English
    possessive is smoother while preserving the singular filial relation.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הַשֵּׁנִי
  chosen: the name of the one ... and the name of the second
  alternatives:
  - one was named ... and the other was named
  - the name of the first ... and the name of the second
  lexicon: HALOT
  rationale: Retains the repetitive Hebrew naming formula with readable English. 'Second'
    reflects הַשֵּׁנִי more precisely than 'other,' while still sounding natural.
- source_word: בְּנֵי רִמּוֹן
  chosen: sons of Rimmon
  alternatives:
  - the sons of Rimmon
  lexicon: HALOT
  rationale: Literal filial designation identifying Baanah and Rechab by ancestry.
- source_word: הַבְּאֶרֹתִי
  chosen: the Beerothite
  alternatives:
  - from Beeroth
  lexicon: HALOT
  rationale: Gentilic adjective from Beeroth; transliterating the place-name and rendering
    the gentilic ending in standard English form is most natural.
- source_word: מִבְּנֵי בִנְיָמִן
  chosen: from the sons of Benjamin
  alternatives:
  - from the Benjaminites
  - of the people of Benjamin
  lexicon: HALOT
  rationale: More formally reflects the Hebrew idiom while remaining understandable.
    'Sons of Benjamin' preserves tribal lineage language.
- source_word: כִּי גַּם
  chosen: for ... also
  alternatives:
  - because ... too
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory clause giving the reason Beerothites are counted
    with Benjamin.
- source_word: בְּאֵרוֹת
  chosen: Beeroth
  lexicon: HALOT
  rationale: Proper place-name, transliterated according to standard convention.
- source_word: תֵּחָשֵׁב
  chosen: was considered
  alternatives:
  - was counted
  - was reckoned
  lexicon: HALOT
  rationale: Niphal of חשׁב here expresses being regarded or counted as belonging
    to a group. 'Was considered' is clear modern English; 'counted' is a viable alternative
    preserved in a footnote.
- source_word: עַל בִּנְיָמִן
  chosen: part of Benjamin
  alternatives:
  - as belonging to Benjamin
  - to Benjamin
  lexicon: HALOT
  rationale: The preposition עַל in this idiom conveys affiliation or inclusion. 'Part
    of Benjamin' communicates the tribal association clearly in idiomatic English.
