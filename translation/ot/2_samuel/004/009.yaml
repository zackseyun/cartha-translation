theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains an oath formula invoking the covenant name. Following
    the project's doctrinal guidance, the main text uses 'the LORD' while preserving
    the more directly transliterated alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
