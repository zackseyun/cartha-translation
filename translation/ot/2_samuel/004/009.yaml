id: 2SA.4.9
reference: 2 Samuel 4:9
source:
  edition: WLC
  text: וַ/יַּ֨עַן דָּוִ֜ד אֶת רֵכָ֣ב וְ/אֶת בַּעֲנָ֣ה אָחִ֗י/ו בְּנֵ֛י רִמּ֥וֹן הַ/בְּאֵֽרֹתִ֖י
    וַ/יֹּ֣אמֶר לָ/הֶ֑ם חַי יְהוָ֕ה אֲשֶׁר פָּדָ֥ה אֶת נַפְשִׁ֖/י מִ/כָּל צָרָֽה־׀־־־־־׃
translation:
  text: But David answered Rekab and Baanah his brother, the sons of Rimmon the Beerothite,
    and said to them, “As the LORD lives, who has redeemed my life out of every distress,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol commonly introduces a reply in dialogue. 'Answered'
    preserves the narrative formula and fits the immediate speech context.
- source_word: רֵכָב
  chosen: Rekab
  alternatives:
  - Rechab
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated. 'Rekab' reflects
    a straightforward modern transliteration from Hebrew רֵכָב.
- source_word: בַּעֲנָה
  chosen: Baanah
  lexicon: HALOT
  rationale: Personal name, transliterated by standard convention.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his brothers
  lexicon: HALOT
  rationale: The singular with 3ms suffix most naturally refers to Baanah as the brother
    of Rekab. English keeps the singular relation explicit.
- source_word: בְּנֵי רִמּוֹן הַבְּאֵרֹתִי
  chosen: the sons of Rimmon the Beerothite
  alternatives:
  - sons of Rimmon from Beeroth
  lexicon: HALOT
  rationale: Construct chain plus gentilic identifies their father and origin. 'Beerothite'
    is a conventional and concise rendering of the gentilic.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is idiomatic English
    and preserves the solemn force. Per doctrine, יְהוָה is rendered 'the LORD' rather
    than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for the divine
    name, following Jewish reverence tradition and LXX pattern.
- source_word: פָּדָה
  chosen: has redeemed
  alternatives:
  - redeemed
  - delivered
  - ransomed
  lexicon: HALOT
  rationale: פדה denotes redemption/ransom-like deliverance. 'Has redeemed' preserves
    the theological and lexical weight better than the flatter 'delivered.' The perfect
    is rendered with present relevance in English.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נפש here refers to David's life/self in danger, not specifically the
    immaterial soul. 'My life' is the clearest contextually accurate English.
- source_word: מִכָּל צָרָה
  chosen: out of every distress
  alternatives:
  - from every trouble
  - from all adversity
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, adversity. 'Out of every distress' pairs
    naturally with 'redeemed' and preserves the comprehensive force of כָּל.
