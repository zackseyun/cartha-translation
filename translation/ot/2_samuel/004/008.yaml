id: 2SA.4.8
reference: 2 Samuel 4:8
source:
  edition: WLC
  text: וַ֠/יָּבִאוּ אֶת רֹ֨אשׁ אִֽישׁ בֹּ֥שֶׁת אֶל דָּוִד֮ חֶבְרוֹן֒ וַ/יֹּֽאמְרוּ֙ אֶל הַ/מֶּ֔לֶךְ הִנֵּֽה רֹ֣אשׁ אִֽישׁ בֹּ֗שֶׁת בֶּן שָׁאוּל֙ אֹֽיִבְ/ךָ֔ אֲשֶׁ֥ר בִּקֵּ֖שׁ אֶת נַפְשֶׁ֑/ךָ וַ/יִּתֵּ֣ן יְ֠הוָה לַֽ/אדֹנִ֨/י הַ/מֶּ֤לֶךְ נְקָמוֹת֙ הַ/יּ֣וֹם הַ/זֶּ֔ה מִ/שָּׁא֖וּל וּ/מִ/זַּרְעֽ/וֹ־־־־־־־־׃ס
translation:
  text: They brought the head of Ish-bosheth to David at Hebron, and said to the king, “Here is the head of Ish-bosheth son of Saul, your enemy, who sought your life. Yahweh has given my lord the king vengeance today on Saul and on his offspring.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'vengeances' (plural), an intensive form meaning 'vengeance' or 'acts of vengeance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  chosen: They brought
  alternatives:
  - And they brought
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence; English omits the initial 'and' for natural flow while preserving the action.
- source_word: רֹאשׁ
  chosen: head
  lexicon: HALOT
  rationale: Literal physical head is clearly intended in this execution context; no metaphorical rendering is warranted.
- source_word: אִישׁ בֹּשֶׁת
  chosen: Ish-bosheth
  alternatives:
  - Eshbaal
  lexicon: HALOT
  rationale: Personal name is transliterated per philosophy. 'Ish-bosheth' follows the Masoretic form in this verse; the historically related form 'Eshbaal' is not the form present here.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וַיֹּאמְרוּ אֶל הַמֶּלֶךְ
  chosen: and said to the king
  alternatives:
  - and they said to the king
  lexicon: HALOT
  rationale: Direct speech introduction in standard narrative style; singular 'the king' retained because the Hebrew has the definite singular title.
- source_word: הִנֵּה
  chosen: Here is
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: Deictic presentation formula. 'Here is' is readable modern English and preserves the demonstrative force without archaic tone.
- source_word: בֶּן שָׁאוּל
  chosen: son of Saul
  lexicon: HALOT
  rationale: Straightforward filial designation; retained formally.
- source_word: אֹיִבְךָ
  chosen: your enemy
  alternatives:
  - the one hostile to you
  lexicon: HALOT
  rationale: Common noun for enemy/opponent; 'your enemy' is the natural and direct rendering.
- source_word: בִּקֵּשׁ אֶת נַפְשֶׁךָ
  chosen: sought your life
  alternatives:
  - sought your soul
  - tried to kill you
  lexicon: HALOT
  rationale: Hebrew idiom literally involving 'soul/life' means seeking to take someone's life. 'Sought your life' preserves the idiom in clear English.
- source_word: וַיִּתֵּן יְהוָה
  chosen: The LORD has given
  alternatives:
  - And the LORD gave
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. The perfective sense can be represented idiomatically in English as 'has given' in the speakers' triumphant announcement of a present result.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: לַאדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address with first-person singular suffix on 'lord.' Lowercase 'lord' distinguishes the human superior from the divine name.
- source_word: נְקָמוֹת
  chosen: vengeance
  alternatives:
  - acts of vengeance
  - avenging
  lexicon: HALOT
  rationale: Plural abstract/intensive noun is naturally rendered by singular English abstract 'vengeance'; this avoids awkwardness while preserving the retaliatory sense.
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic modern English equivalent of 'this day' in direct speech.
- source_word: מִשָּׁאוּל וּמִזַּרְעוֹ
  chosen: on Saul and on his offspring
  alternatives:
  - against Saul and against his seed
  - from Saul and from his offspring
  lexicon: HALOT
  rationale: With נְקָמוֹת, the preposition marks the object against whom vengeance is taken. 'Offspring' is a natural rendering of זֶרַע in this dynastic context, better than the more wooden 'seed'.
