theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether the speakers' claim that the LORD gave vengeance should be translated as narrator-endorsed theology
  chosen_reading: Retain the claim as direct speech without interpretive qualification in the main text
  alternative_readings:
  - Add wording implying alleged or supposed divine approval
  rationale: The Hebrew presents the assassins' speech directly. The translation should not insert evaluative qualifiers not present in the text; David's response in the following context supplies the narrative correction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
