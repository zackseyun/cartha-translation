id: 2SA.4.12
reference: 2 Samuel 4:12
source:
  edition: WLC
  text: וַ/יְצַו֩ דָּוִ֨ד אֶת הַ/נְּעָרִ֜ים וַ/יַּהַרְג֗וּ/ם וַֽ/יְקַצְּצ֤וּ אֶת יְדֵי/הֶם֙
    וְ/אֶת רַגְלֵי/הֶ֔ם וַ/יִּתְל֥וּ עַל הַ/בְּרֵכָ֖ה בְּ/חֶבְר֑וֹן וְ/אֵ֨ת רֹ֤אשׁ
    אִֽישׁ בֹּ֨שֶׁת֙ לָקָ֔חוּ וַ/יִּקְבְּר֥וּ בְ/קֶֽבֶר אַבְנֵ֖ר בְּ/חֶבְרֽוֹן־־־־־־׃פ
translation:
  text: Then David commanded the young men, and they killed them and cut off their
    hands and their feet and hung them by the pool at Hebron. But they took the head
    of Ish-bosheth and buried it in the tomb of Abner at Hebron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hung them at the pool.' The Hebrew preposition can be understood more
      broadly as indicating location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו דָּוִד
  chosen: Then David commanded
  alternatives:
  - And David commanded
  - So David gave orders
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative sequence without over-paraphrasing; 'commanded' preserves the force
    of צוה.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths or attendants/servants depending on context.
    Here these are David's agents carrying out an execution, so 'young men' preserves
    the lexical sense while remaining natural.
- source_word: וַיַּהַרְגוּם
  chosen: they killed them
  alternatives:
  - they put them to death
  lexicon: HALOT
  rationale: The verb הרג is the ordinary term for killing. 'Killed them' is direct
    and formally close; 'put them to death' is possible but slightly more interpretive.
- source_word: וַיְקַצְּצוּ אֶת יְדֵיהֶם וְאֶת רַגְלֵיהֶם
  chosen: cut off their hands and their feet
  alternatives:
  - cut off their hands and feet
  - dismembered their hands and feet
  lexicon: HALOT
  rationale: קצץ means to cut off/cut down. The explicit repetition of both body parts
    is retained for the verse's grim judicial emphasis.
- source_word: וַיִּתְלוּ עַל הַבְּרֵכָה
  chosen: hung them by the pool
  alternatives:
  - hanged them at the pool
  - hung them over the pool
  lexicon: HALOT
  rationale: תלה is 'hang.' In modern English, 'hung' is idiomatic here. עַל with
    הַבְּרֵכָה likely indicates location at/by the pool rather than directly over
    it; 'by the pool' is the most natural rendering.
- source_word: בְּחֶבְרוֹן
  chosen: at Hebron
  alternatives:
  - in Hebron
  lexicon: HALOT
  rationale: Either preposition works in English. 'At Hebron' fits the public-location
    sense with the pool; the second occurrence is also rendered 'at Hebron' for consistency.
- source_word: רֹאשׁ אִישׁ בֹּשֶׁת
  chosen: the head of Ish-bosheth
  lexicon: HALOT
  rationale: A straightforward construct chain. The personal name is transliterated
    per project policy.
- source_word: לָקָחוּ
  chosen: they took
  alternatives:
  - they removed
  - they retrieved
  lexicon: HALOT
  rationale: לקח is the common verb 'take.' The simple rendering best matches the
    Hebrew.
- source_word: וַיִּקְבְּרוּ בְקֶבֶר אַבְנֵר
  chosen: buried it in the tomb of Abner
  alternatives:
  - buried it in Abner's grave
  lexicon: HALOT
  rationale: The implied object is the head. 'Tomb' is slightly more dignified and
    natural in English for a named burial place, while remaining faithful to קבר.
