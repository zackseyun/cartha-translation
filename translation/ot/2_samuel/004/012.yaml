theological_decisions:
- issue: Moral/theological framing of David's action
  chosen_reading: Render the narrative description without adding evaluative language
    beyond the text itself.
  alternative_readings:
  - Translate with explicit judicial language such as 'executed them' throughout
  rationale: The verse reports David's command and the subsequent mutilation/display
    of the murderers, but it does not itself provide an explicit theological comment
    in this line. The translation should preserve the starkness of the narrative without
    importing additional moral explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
