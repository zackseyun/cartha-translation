id: 2SA.4.3
reference: 2 Samuel 4:3
source:
  edition: WLC
  text: וַ/יִּבְרְח֥וּ הַ/בְּאֵרֹתִ֖ים גִּתָּ֑יְמָ/ה וַֽ/יִּהְיוּ שָׁ֣ם גָּרִ֔ים עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־׃ס
translation:
  text: But the Beerothites had fled to Gittaim and have lived there as sojourners
    to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "have been living there as resident foreigners to this day."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרְחוּ
  chosen: had fled
  alternatives:
  - fled
  - ran away
  lexicon: HALOT
  rationale: Qal wayyiqtol of ברח, 'to flee.' Rendered as past perfect ('had fled')
    to fit the narrative background explanation relative to the surrounding events.
- source_word: הַבְּאֵרֹתִים
  chosen: the Beerothites
  alternatives:
  - the men of Beeroth
  lexicon: HALOT
  rationale: Gentilic plural from Beeroth. 'Beerothites' is the most natural English
    rendering of the people-group designation.
- source_word: גִּתָּיְמָה
  chosen: to Gittaim
  alternatives:
  - toward Gittaim
  lexicon: HALOT
  rationale: Place name with directional he, indicating motion toward a place. English
    idiom is best expressed simply as 'to Gittaim.'
- source_word: וַיִּהְיוּ שָׁם
  chosen: have lived there
  alternatives:
  - were there
  - came to be there
  lexicon: HALOT
  rationale: The clause describes an ongoing state extending 'to this day.' English
    present perfect naturally conveys a condition begun in the past and continuing
    into the narrator's present.
- source_word: גָּרִים
  chosen: as sojourners
  alternatives:
  - as resident foreigners
  - as temporary residents
  - as aliens
  lexicon: HALOT
  rationale: Participle from גור denotes residing as a non-native outsider. 'Sojourners'
    preserves the social-legal nuance without sounding overly technical; 'aliens'
    is misleading in modern English.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew temporal expression indicating
    continuation up to the narrator's present.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction introduces explanatory contrast with the previous verse
    about Beeroth's relation to Benjamin. 'But' brings out the slight contrast/backgrounding
    function in context better than a bare 'And.'
