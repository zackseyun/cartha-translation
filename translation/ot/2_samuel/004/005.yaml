id: 2SA.4.5
reference: 2 Samuel 4:5
source:
  edition: WLC
  text: וַ/יֵּ֨לְכ֜וּ בְּנֵֽי רִמּ֤וֹן הַ/בְּאֵֽרֹתִי֙ רֵכָ֣ב וּ/בַעֲנָ֔ה וַ/יָּבֹ֨אוּ֙
    כְּ/חֹ֣ם הַ/יּ֔וֹם אֶל בֵּ֖ית אִ֣ישׁ בֹּ֑שֶׁת וְ/ה֣וּא שֹׁכֵ֔ב אֵ֖ת מִשְׁכַּ֥ב
    הַֽ/צָּהֳרָֽיִם־־׃
translation:
  text: The sons of Rimmon the Beerothite, Rekab and Baanah, went and came to the
    house of Ish-bosheth in the heat of the day, while he was lying down for his midday
    rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rechab and Baanah,' following a more traditional English spelling of
      Rekab's name.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the lying down of noon,' that is, a midday rest.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי רִמּוֹן הַבְּאֵרֹתִי
  chosen: The sons of Rimmon the Beerothite
  alternatives:
  - the men/descendants of Rimmon the Beerothite
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural 'sons of,' which can denote literal sons
    or male descendants/members of a household. Here, because Rekab and Baanah are
    immediately named as Rimmon's sons, the literal familial sense is most natural.
- source_word: רֵכָב וּבַעֲנָה
  chosen: Rekab and Baanah
  alternatives:
  - Rechab and Baanah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions. 'Rekab'
    reflects a closer transliteration of רֵכָב, though 'Rechab' is a familiar traditional
    form.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - set out
  lexicon: HALOT
  rationale: The wayyiqtol of הלך straightforwardly narrates movement. 'Went' preserves
    the simple narrative sequence without overinterpreting.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: 'בוא commonly means ''come'' or ''enter.'' Since the phrase is followed
    by אֶל בֵּית (''to the house of''), ''came to'' is the most natural English rendering
    and preserves the two-step narrative: they went, and they came to the house.'
- source_word: כְּחֹם הַיּוֹם
  chosen: in the heat of the day
  alternatives:
  - about the heat of the day
  - at the hottest part of the day
  - around noon
  lexicon: HALOT
  rationale: The expression literally means 'as/at the heat of the day' and idiomatically
    refers to the hottest part of the day. 'In the heat of the day' is both natural
    and close to the Hebrew; 'around noon' would be more interpretive.
- source_word: בֵּית אִישׁ־בֹּשֶׁת
  chosen: the house of Ish-bosheth
  lexicon: HALOT
  rationale: Standard construct chain meaning 'the house of Ish-bosheth.' The personal
    name is transliterated, not translated.
- source_word: וְהוּא שֹׁכֵב
  chosen: while he was lying down
  alternatives:
  - and he was lying down
  - as he lay
  lexicon: HALOT
  rationale: The clause gives Ish-bosheth's state at the time of their arrival. Rendering
    with 'while' makes the circumstantial force clear in idiomatic English.
- source_word: אֵת מִשְׁכַּב הַצָּהֳרָיִם
  chosen: for his midday rest
  alternatives:
  - the midday lying-down
  - his noonday rest
  - his afternoon nap
  lexicon: HALOT
  rationale: Literally, the phrase is 'the lying down of noon/midday.' English requires
    an idiomatic rendering. 'For his midday rest' preserves the sense without sounding
    colloquial; 'afternoon nap' is possible but slightly more interpretive and informal.
