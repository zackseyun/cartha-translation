id: 2SA.4.4
reference: 2 Samuel 4:4
source:
  edition: WLC
  text: וְ/לִ/יהֽוֹנָתָן֙ בֶּן שָׁא֔וּל בֵּ֖ן נְכֵ֣ה רַגְלָ֑יִם בֶּן חָמֵ֣שׁ שָׁנִ֣ים
    הָיָ֡ה בְּ/בֹ֣א שְׁמֻעַת֩ שָׁא֨וּל וִ/יהֽוֹנָתָ֜ן מִֽ/יִּזְרְעֶ֗אל וַ/תִּשָּׂאֵ֤/הוּ
    אֹֽמַנְתּ/וֹ֙ וַ/תָּנֹ֔ס וַ/יְהִ֞י בְּ/חָפְזָ֥/הּ לָ/נ֛וּס וַ/יִּפֹּ֥ל וַ/יִּפָּסֵ֖חַ
    וּ/שְׁמ֥/וֹ מְפִיבֹֽשֶׁת־־׃
translation:
  text: Now Jonathan son of Saul had a son disabled in his feet. He was five years
    old when the news about Saul and Jonathan came from Jezreel, and his nurse picked
    him up and fled. But as she hurried to flee, he fell and became lame. His name
    was Mephibosheth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lame in both feet.' The Hebrew phrase literally refers to being stricken
      in the feet.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְכֵה רַגְלָיִם
  chosen: disabled in his feet
  alternatives:
  - crippled in his feet
  - lame in both feet
  lexicon: HALOT
  rationale: The phrase literally denotes one stricken in the feet. 'Disabled in his
    feet' preserves the physical impairment without using archaic or potentially pejorative
    English. 'Lame in both feet' is a possible contextual rendering, but 'both' is
    implied by the dual form rather than separately stated.
- source_word: בֶּן חָמֵשׁ שָׁנִים
  chosen: five years old
  alternatives:
  - a son of five years
  lexicon: HALOT
  rationale: Standard idiomatic English for age while preserving the Hebrew sense
    exactly.
- source_word: בְּבֹא שְׁמֻעַת
  chosen: when the news ... came
  alternatives:
  - at the coming of the report
  - when the report arrived
  lexicon: HALOT
  rationale: The infinitive construct with ב plus the noun 'report/news' is naturally
    rendered temporally in English. 'News' is more idiomatic than 'report' here.
- source_word: שְׁמֻעַת שָׁאוּל וִיהוֹנָתָן
  chosen: the news about Saul and Jonathan
  alternatives:
  - the news of Saul and Jonathan
  - the report concerning Saul and Jonathan
  lexicon: HALOT
  rationale: The construct chain refers to the report concerning Saul and Jonathan,
    namely their defeat/death. 'About' is clear modern English and avoids over-specifying
    the content.
- source_word: מִיִּזְרְעֶאל
  chosen: from Jezreel
  alternatives:
  - out of Jezreel
  lexicon: HALOT
  rationale: Straightforward locative source; 'from Jezreel' is the natural English
    equivalent.
- source_word: אֹמַנְתּוֹ
  chosen: his nurse
  alternatives:
  - his caregiver
  - his foster-mother
  lexicon: HALOT
  rationale: The term denotes the woman caring for and rearing the child. 'Nurse'
    is the conventional and sufficiently clear rendering in this narrative context.
- source_word: וַתִּשָּׂאֵהוּ
  chosen: picked him up
  alternatives:
  - carried him
  - lifted him
  lexicon: HALOT
  rationale: The verb means to lift/carry. 'Picked him up' fits the immediate action
    before flight and reads naturally in English.
- source_word: וַתָּנֹס
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: A standard rendering of נוס in narrative flight contexts.
- source_word: בְּחָפְזָהּ
  chosen: as she hurried
  alternatives:
  - in her haste
  - while she was hurrying
  lexicon: HALOT
  rationale: The phrase marks the circumstance of urgent haste. 'As she hurried' integrates
    smoothly into English narrative while preserving the causal-temporal nuance.
- source_word: לָנוּס
  chosen: to flee
  alternatives:
  - to escape
  lexicon: HALOT
  rationale: Maintains lexical consistency with the previous verb and preserves the
    purpose infinitive.
- source_word: וַיִּפֹּל
  chosen: he fell
  lexicon: HALOT
  rationale: Simple narrative verb; the subject is the child, not the nurse, as shown
    by the following masculine singular verb.
- source_word: וַיִּפָּסֵחַ
  chosen: became lame
  alternatives:
  - was lamed
  - was crippled
  lexicon: HALOT
  rationale: The verb denotes becoming lame. 'Became lame' best reflects the inceptive/resultative
    sense after the fall.
- source_word: מְפִיבֹשֶׁת
  chosen: Mephibosheth
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וְלִיהוֹנָתָן
  chosen: Now Jonathan
  alternatives:
  - And Jonathan
  lexicon: HALOT
  rationale: The prefixed conjunction introduces a parenthetical explanatory notice
    in the narrative. 'Now' conveys the discourse function more naturally than a bare
    'And' in English.
