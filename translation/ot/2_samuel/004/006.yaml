id: 2SA.4.6
reference: 2 Samuel 4:6
source:
  edition: WLC
  text: וְ֠/הֵנָּה בָּ֜אוּ עַד תּ֤וֹךְ הַ/בַּ֨יִת֙ לֹקְחֵ֣י חִטִּ֔ים וַ/יַּכֻּ֖/הוּ
    אֶל הַ/חֹ֑מֶשׁ וְ/רֵכָ֛ב וּ/בַעֲנָ֥ה אָחִ֖י/ו נִמְלָֽטוּ־־׃
translation:
  text: And there they came into the middle of the house, as if taking wheat, and
    they struck him in the belly. Then Rekab and Baanah his brother escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'under the fifth rib.' The Hebrew expression likely
      refers more generally to the abdomen or belly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנָּה
  chosen: And there
  alternatives:
  - And behold
  - Now they
  lexicon: HALOT
  rationale: The particle-pronoun combination introduces the next action with a deictic
    sense. 'And there' preserves the narrative movement without adding excessive dramatic
    force; 'behold' is possible but sounds archaic in modern English.
- source_word: בָּאוּ
  chosen: they came
  alternatives:
  - they entered
  lexicon: HALOT
  rationale: The verb means 'came' or 'entered.' Since the following phrase already
    specifies movement into the house, 'came' keeps the Hebrew sequence natural in
    English.
- source_word: עַד תּוֹךְ הַבַּיִת
  chosen: into the middle of the house
  alternatives:
  - into the interior of the house
  - as far as the midst of the house
  lexicon: HALOT
  rationale: תּוֹךְ denotes the midst/interior. 'Into the middle of the house' is
    a clear, fairly literal rendering that preserves the sense of penetrating well
    inside.
- source_word: לֹקְחֵי חִטִּים
  chosen: as if taking wheat
  alternatives:
  - taking wheat
  - to get wheat
  lexicon: HALOT
  rationale: The participial phrase is elliptical and explains the pretense under
    which they entered. English idiom benefits from making the implied disguise explicit
    with 'as if,' which reflects the narrative context without over-paraphrasing.
- source_word: וַיַּכֻּהוּ
  chosen: they struck him
  alternatives:
  - they struck him down
  - they killed him
  lexicon: HALOT
  rationale: The verb נכה broadly means 'strike.' Although the context results in
    death, the Hebrew here states the act of striking; 'killed' would move beyond
    the immediate lexical value.
- source_word: אֶל הַחֹמֶשׁ
  chosen: in the belly
  alternatives:
  - in the abdomen
  - in the fifth rib
  lexicon: HALOT
  rationale: This expression is traditionally rendered 'under the fifth rib' in older
    English, but the Hebrew noun more naturally refers to the abdomen/belly region.
    In context it denotes the place of the blow, so 'in the belly' best reflects the
    source text's plain sense rather than translation tradition.
- source_word: וְרֵכָב וּבַעֲנָה אָחִיו
  chosen: Then Rekab and Baanah his brother
  alternatives:
  - And Rekab and Baanah his brother
  lexicon: HALOT
  rationale: The names are transliterated per project policy. The conjunction is rendered
    'Then' to smooth the sequence into idiomatic English while preserving the narrative
    progression.
- source_word: נִמְלָטוּ
  chosen: escaped
  alternatives:
  - got away
  - fled
  lexicon: HALOT
  rationale: The Niphal of מלט conveys escaping/deliverance. 'Escaped' is concise
    and fits the immediate context of successful flight after the attack.
