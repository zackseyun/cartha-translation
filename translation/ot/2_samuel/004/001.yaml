id: 2SA.4.1
reference: 2 Samuel 4:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע בֶּן שָׁא֗וּל כִּ֣י מֵ֤ת אַבְנֵר֙ בְּ/חֶבְר֔וֹן וַ/יִּרְפּ֖וּ
    יָדָ֑י/ו וְ/כָל יִשְׂרָאֵ֖ל נִבְהָֽלוּ־־׃
translation:
  text: When Saul’s son heard that Abner had died in Hebron, his hands became weak,
    and all Israel was alarmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his hands became weak,'' an idiom for losing strength or courage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שָׁאוּל
  chosen: Saul’s son
  alternatives:
  - the son of Saul
  lexicon: HALOT
  rationale: Construct phrase identifying Ish-bosheth indirectly. English possessive
    is natural and preserves the Hebrew wording without importing the proper name
    not present in this verse.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what he heard: that Abner had died. English
    ''when'' is supplied at the clause level from the narrative sequence, but כִּי
    itself is best represented as ''that'' here.'
- source_word: מֵת
  chosen: had died
  alternatives:
  - died
  - was dead
  lexicon: HALOT
  rationale: Qal perfect of מות reports a completed event prior to the hearing. English
    past perfect fits the narrative relation smoothly.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: Standard locative use of בְּ with a place name.
- source_word: וַיִּרְפּוּ יָדָיו
  chosen: his hands became weak
  alternatives:
  - his hands dropped
  - his courage failed
  - his hands were slack
  lexicon: HALOT
  rationale: Hebrew idiom literally speaks of the hands becoming slack/weak, expressing
    loss of strength or resolve. 'His hands became weak' preserves the bodily metaphor
    while remaining clear in English.
- source_word: נִבְהָלוּ
  chosen: was alarmed
  alternatives:
  - was dismayed
  - was terrified
  - was disturbed
  lexicon: HALOT
  rationale: The verb conveys being disturbed, alarmed, or thrown into panic. 'Was
    alarmed' is natural collective English with 'all Israel' as a singular collective
    subject.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Retains the collective national designation used in the Hebrew, which
    can refer to the people as a whole rather than enumerated individuals.
