theological_decisions:
- issue: Whether to make David's legal idiom explicitly interpretive as 'avenge' or
    retain the blood-accountability language
  chosen_reading: Retain 'require his blood from your hand' in the main text
  alternative_readings:
  - avenge his blood at your hand
  - hold you accountable for his blood
  rationale: The Hebrew idiom is juridical and concrete. Keeping 'blood' preserves
    the OT legal texture and avoids narrowing the sense to personal vengeance alone.
