id: 2SA.4.11
reference: 2 Samuel 4:11
source:
  edition: WLC
  text: אַ֞ף כִּֽי אֲנָשִׁ֣ים רְשָׁעִ֗ים הָרְג֧וּ אֶת אִישׁ צַדִּ֛יק בְּ/בֵית֖/וֹ
    עַל מִשְׁכָּב֑/וֹ וְ/עַתָּ֗ה הֲ/ל֨וֹא אֲבַקֵּ֤שׁ אֶת דָּמ/וֹ֙ מִ/יֶּדְ/כֶ֔ם וּ/בִעַרְתִּ֥י
    אֶתְ/כֶ֖ם מִן הָ/אָֽרֶץ־־־־־־׃
translation:
  text: How much more, when wicked men have killed a righteous man in his own house
    on his bed, should I not now require his blood from your hand and purge you from
    the land?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold you accountable for his blood'; the Hebrew idiom is literally 'require
      his blood from your hand.'
    reason: lexical_alternative
  - marker: b
    text: '''Purge you from the land'' refers to judicially removing the murderers
      from the land, not ritual cleansing alone.'
    reason: cultural_note
lexical_decisions:
- source_word: אַף כִּי
  chosen: How much more, when
  alternatives:
  - Indeed when
  - Even though
  - How much more if
  lexicon: HALOT
  rationale: In context David argues from the lesser case in v.10 to the greater case
    here. The combination introduces an a fortiori statement rather than simple concession,
    so 'How much more, when' best captures the logic.
- source_word: אֲנָשִׁים רְשָׁעִים
  chosen: wicked men
  alternatives:
  - evil men
  - lawless men
  lexicon: HALOT
  rationale: Straightforward adjectival phrase. 'Wicked' preserves the moral condemnation
    more naturally than 'evil' here.
- source_word: הָרְגוּ
  chosen: have killed
  alternatives:
  - killed
  - murdered
  - slew
  lexicon: HALOT
  rationale: The perfect refers to the completed act with present relevance in David's
    judgment. 'Have killed' fits the English argument flow. 'Murdered' is interpretive,
    though context implies murder; the Hebrew verb itself is the common 'kill'.
- source_word: אִישׁ צַדִּיק
  chosen: a righteous man
  alternatives:
  - an innocent man
  - a just man
  lexicon: HALOT
  rationale: צַדִּיק commonly means 'righteous/just.' Here it marks Ish-bosheth as
    not deserving this treacherous killing. 'Righteous man' stays closer to the lexical
    value than the more interpretive 'innocent man'.
- source_word: בְּבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his house
  lexicon: HALOT
  rationale: The possessive suffix is explicit; 'own' brings out the outrage of the
    murder in the victim's private space without adding new content.
- source_word: עַל מִשְׁכָּבוֹ
  chosen: on his bed
  alternatives:
  - on his couch
  - in his bed
  lexicon: HALOT
  rationale: מִשְׁכָּב can denote bed or place of lying down. 'On his bed' is the
    most direct rendering and matches the scene.
- source_word: הֲלוֹא אֲבַקֵּשׁ אֶת דָּמוֹ מִיֶּדְכֶם
  chosen: should I not now require his blood from your hand
  alternatives:
  - shall I not now demand his blood from your hand
  - should I not seek his blood from your hand
  lexicon: HALOT
  rationale: The idiom 'require blood from the hand of' means to hold someone accountable
    for bloodshed. Singular 'your hand' reflects the Hebrew collective singular יָד
    in the idiom, though addressed to two men.
- source_word: דָּמוֹ
  chosen: his blood
  alternatives:
  - bloodguilt for him
  - his lifeblood
  lexicon: HALOT
  rationale: Hebrew 'blood' in legal contexts stands for bloodguilt and the life unlawfully
    taken. The literal 'his blood' preserves the idiom and gravity.
- source_word: וּבִעַרְתִּי אֶתְכֶם מִן הָאָרֶץ
  chosen: and purge you from the land
  alternatives:
  - and remove you from the land
  - and sweep you away from the earth
  - and eliminate you from the land
  lexicon: HALOT
  rationale: בער in this stem often means to burn away/remove/purge evil. Here David
    announces judicial removal by execution. 'Purge you from the land' preserves the
    covenantal-judicial tone better than the flatter 'remove you.'
