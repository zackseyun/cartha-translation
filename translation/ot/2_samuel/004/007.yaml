id: 2SA.4.7
reference: 2 Samuel 4:7
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ הַ/בַּ֗יִת וְ/הֽוּא שֹׁכֵ֤ב עַל מִטָּת/וֹ֙ בַּ/חֲדַ֣ר מִשְׁכָּב֔/וֹ
    וַ/יַּכֻּ֨/הוּ֙ וַ/יְמִתֻ֔/הוּ וַ/יָּסִ֖ירוּ אֶת רֹאשׁ֑/וֹ וַ/יִּקְחוּ֙ אֶת רֹאשׁ֔/וֹ
    וַ/יֵּֽלְכ֛וּ דֶּ֥רֶךְ הָ/עֲרָבָ֖ה כָּל הַ/לָּֽיְלָה־־־־־׃
translation:
  text: They came into the house while he was lying on his bed in his bedroom, and
    they struck him down and put him to death. Then they removed his head and took
    his head and went by way of the Arabah all night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the room where he slept' for 'in his bedroom.'
    reason: lexical_alternative
  - marker: b
    text: The Arabah is the Jordan rift/plain region; the Hebrew uses a geographic
      name.
    reason: cultural_note
  - marker: c
    text: Or 'they cut off his head'; the Hebrew verb is more literally 'they removed
      his head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ הַבַּיִת
  chosen: They came into the house
  alternatives:
  - They entered the house
  lexicon: HALOT
  rationale: The verb בוא with the directional/accusative phrase הַבַּיִת naturally
    means entering the house. 'Came into' is idiomatic and preserves the narrative
    motion.
- source_word: וְהוּא שֹׁכֵב
  chosen: while he was lying
  alternatives:
  - and he was lying
  - as he lay
  lexicon: HALOT
  rationale: The clause is circumstantial, describing Ish-bosheth's state when they
    entered. 'While he was lying' makes the temporal/circumstantial force clear in
    natural English.
- source_word: עַל מִטָּתוֹ
  chosen: on his bed
  alternatives:
  - upon his bed
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on his bed' is clear modern English.
- source_word: בַּחֲדַר מִשְׁכָּבוֹ
  chosen: in his bedroom
  alternatives:
  - in the room where he slept
  - in his sleeping chamber
  - in the chamber of his bed
  lexicon: HALOT
  rationale: The construct phrase literally refers to the room of his lying down/sleeping.
    'Bedroom' is a natural optimal-equivalence rendering that preserves the sense
    without archaic stiffness.
- source_word: וַיַּכֻּהוּ
  chosen: they struck him down
  alternatives:
  - they struck him
  - they attacked him
  lexicon: HALOT
  rationale: נכה often denotes a violent blow or smiting. 'Struck him down' fits the
    lethal context and prepares for the following explicit death statement without
    collapsing the two verbs into one.
- source_word: וַיְמִתֻהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put him to death' preserves the causative
    force more clearly than the simpler 'killed him,' while remaining readable.
- source_word: וַיָּסִירוּ אֶת רֹאשׁוֹ
  chosen: they removed his head
  alternatives:
  - they cut off his head
  - they took away his head
  lexicon: HALOT
  rationale: 'סור in Hiphil means remove/take away. Since the next clause explicitly
    says they took his head, rendering this as ''removed his head'' preserves the
    sequence: decapitation followed by carrying it away. ''Cut off'' is interpretive
    but contextually implied.'
- source_word: וַיִּקְחוּ אֶת רֹאשׁוֹ
  chosen: took his head
  alternatives:
  - carried off his head
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' Keeping the repetition ('his head ...
    his head') reflects the Hebrew's grim emphasis.
- source_word: וַיֵּלְכוּ דֶּרֶךְ הָעֲרָבָה
  chosen: went by way of the Arabah
  alternatives:
  - traveled on the road through the Arabah
  - went along the Arabah route
  lexicon: HALOT
  rationale: דֶּרֶךְ with a following place name can mean 'by way of' or 'along the
    road of.' 'By way of the Arabah' is concise and preserves the geographical reference.
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the Jordan Rift Valley
  lexicon: HALOT
  rationale: This is a geographic term/name. Per philosophy, names are transliterated
    rather than translated when functioning as place names. A footnote can preserve
    the sense 'desert plain/rift valley.'
- source_word: כָּל הַלָּיְלָה
  chosen: all night
  alternatives:
  - throughout the whole night
  lexicon: HALOT
  rationale: Idiomatic temporal expression best rendered 'all night' in modern English.
