id: 2SA.4.10
reference: 2 Samuel 4:10
source:
  edition: WLC
  text: כִּ֣י הַ/מַּגִּיד֩ לִ֨/י לֵ/אמֹ֜ר הִנֵּה מֵ֣ת שָׁא֗וּל וְ/הֽוּא הָיָ֤ה כִ/מְבַשֵּׂר֙
    בְּ/עֵינָ֔י/ו וָ/אֹחֲזָ֣/ה ב֔/וֹ וָ/אֶהְרְגֵ֖/הוּ בְּ/צִֽקְלָ֑ג אֲשֶׁ֥ר לְ/תִתִּ/י
    ל֖/וֹ בְּשֹׂרָֽה־־־׃
translation:
  text: When someone told me, saying, ‘Look, Saul is dead,’ and he thought he was
    bringing good news in his own eyes, I seized him and killed him in Ziklag—that
    was the reward I gave him for his news.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one who told me, “Behold, Saul is dead,” while he
      was in his own eyes like one bringing good news.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is elliptical in Hebrew and likely ironic: David means
      that execution, not payment, was the only ''reward'' the messenger received
      for reporting Saul''s death.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - Indeed
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a specific illustrative case supporting David's
    statement in the surrounding context. 'When' best captures the temporal-circumstantial
    force in idiomatic English.
- source_word: הַמַּגִּיד לִי לֵאמֹר
  chosen: someone told me, saying
  alternatives:
  - the one who told me, saying
  - the one reporting to me
  lexicon: HALOT
  rationale: The participle with article is substantival, 'the one who told me.' English
    smooths this to 'someone told me,' while retaining 'saying' to reflect the direct-report
    construction.
- source_word: הִנֵּה מֵת שָׁאוּל
  chosen: ‘Look, Saul is dead,’
  alternatives:
  - ‘Behold, Saul is dead,’
  - ‘Saul has died,’
  lexicon: HALOT
  rationale: הִנֵּה is a deictic attention-getter; 'Look' is natural modern English.
    The stative/resultative sense of מֵת is well conveyed by 'is dead,' though 'has
    died' is possible.
- source_word: וְהוּא הָיָה כִמְבַשֵּׂר בְּעֵינָיו
  chosen: and he thought he was bringing good news in his own eyes
  alternatives:
  - and he was like one bringing good news in his own eyes
  - and he considered himself a bearer of good news
  lexicon: HALOT
  rationale: כְמְבַשֵּׂר literally means 'as one bringing news/good news.' In this
    context the messenger expected a reward, so 'bringing good news' fits. בְּעֵינָיו
    is an idiom meaning 'in his own eyes,' i.e., in his own estimation; 'he thought'
    makes the sense explicit in readable English.
- source_word: וָאֹחֲזָה בו
  chosen: I seized him
  alternatives:
  - I took hold of him
  - I grabbed him
  lexicon: HALOT
  rationale: אָחַז means to grasp or seize. 'Seized' is concise and suitably forceful
    in context.
- source_word: וָאֶהְרְגֵהוּ
  chosen: and killed him
  alternatives:
  - and put him to death
  - and struck him down
  lexicon: HALOT
  rationale: The verb straightforwardly means 'kill.' 'Killed him' is the most direct
    rendering without adding judicial nuance not explicit in the verb itself.
- source_word: בְּצִקְלָג
  chosen: in Ziklag
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy.
- source_word: אֲשֶׁר לְתִתִּי לוֹ בְּשֹׂרָה
  chosen: that was the reward I gave him for his news
  alternatives:
  - which was to give him news-wages
  - which I gave him as payment for the news
  - which was the good news I gave him
  lexicon: HALOT
  rationale: The clause is elliptical and somewhat ironic. בְּשֹׂרָה can denote news,
    especially good news, and in context refers to the expected reward for reporting
    Saul's death. Rendering the sense as 'the reward I gave him for his news' communicates
    the irony clearly in modern English while staying close to the Hebrew intent.
