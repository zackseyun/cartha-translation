id: 2SA.9.6
reference: 2 Samuel 9:6
source:
  edition: WLC
  text: וַ֠/יָּבֹא מְפִיבֹ֨שֶׁת בֶּן יְהוֹנָתָ֤ן בֶּן שָׁאוּל֙ אֶל דָּוִ֔ד וַ/יִּפֹּ֥ל
    עַל פָּנָ֖י/ו וַ/יִּשְׁתָּ֑חוּ וַ/יֹּ֤אמֶר דָּוִד֙ מְפִיבֹ֔שֶׁת וַ/יֹּ֖אמֶר הִנֵּ֥ה
    עַבְדֶּֽ/ךָ־־־־׃
translation:
  text: Mephibosheth son of Jonathan, son of Saul, came to David and fell on his face
    and bowed down. David said, “Mephibosheth,” and he said, “Here is your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “paid homage.” The Hebrew verb can denote bowing in reverence; because
      the action is toward David, the main text avoids the potentially misleading
      English “worshiped.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “Behold, your servant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - entered
  - came in
  lexicon: HALOT
  rationale: The verb בוא broadly means 'come/enter.' In this narrative context with
    אֶל דָּוִד ('to David'), 'came' is the most natural English rendering and preserves
    the movement toward David without over-specifying entry into a room.
- source_word: מְפִיבֹשֶׁת
  chosen: Mephibosheth
  rationale: Personal names are transliterated rather than translated, following the
    project's policy.
- source_word: בֶּן יְהוֹנָתָן בֶּן שָׁאוּל
  chosen: son of Jonathan, son of Saul
  alternatives:
  - Jonathan's son, Saul's grandson
  lexicon: HALOT
  rationale: The repeated construct chain is preserved formally to match the Hebrew
    genealogy and emphasis. 'Saul's grandson' is idiomatic English but compresses
    the source wording.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - before David
  lexicon: HALOT
  rationale: אֶל normally marks direction toward someone. 'To David' is straightforward
    and avoids importing the nuance of court appearance that 'before David' might
    suggest.
- source_word: וַיִּפֹּל עַל פָּנָיו
  chosen: fell on his face
  alternatives:
  - fell facedown
  - prostrated himself
  lexicon: HALOT
  rationale: This idiom is rendered transparently and naturally in English. 'Prostrated
    himself' would overlap too much with the following verb and reduce the two-step
    Hebrew description.
- source_word: וַיִּשְׁתָּחוּ
  chosen: bowed down
  alternatives:
  - paid homage
  - worshiped
  - prostrated himself
  lexicon: HALOT
  rationale: The verb can denote bowing in reverence, homage, or worship depending
    on context. Here the object is David, a human king, so 'bowed down' best captures
    respectful obeisance without implying divine worship. 'Paid homage' is possible
    but slightly more interpretive.
- source_word: וַיֹּאמֶר דָּוִד מְפִיבֹשֶׁת
  chosen: David said, “Mephibosheth,”
  alternatives:
  - Then David said, “Mephibosheth.”
  lexicon: HALOT
  rationale: The direct address is preserved simply. English punctuation supplies
    the vocative force naturally.
- source_word: הִנֵּה
  chosen: Here is
  alternatives:
  - Behold
  - Here I am
  - Look
  lexicon: HALOT
  rationale: 'הִנֵּה is a presentative particle. In response to being addressed, English
    often uses ''Here I am,'' but because the following noun phrase is ''your servant,''
    the literal presentative ''Here is'' preserves the Hebrew structure: ''Behold,
    your servant.'''
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עֶבֶד can mean 'slave' or 'servant,' in deferential court speech
    to a king it functions as a conventional self-humbling address. 'Your servant'
    is the most idiomatic and contextually appropriate rendering here; the bonded-status
    nuance is not the main point of this formula.
