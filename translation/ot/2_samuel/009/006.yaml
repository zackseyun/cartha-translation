theological_decisions:
- issue: Rendering of שׁחה in relation to a human king
  chosen_reading: bowed down
  alternative_readings:
  - paid homage
  - worshiped
  rationale: Because the action is directed toward David rather than God, the translation
    avoids 'worshiped,' which in modern English would likely imply divine worship.
    This preserves the social-political act of obeisance without importing theological
    confusion.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of עַבְדֶּךָ in royal self-reference
  chosen_reading: your servant
  alternative_readings:
  - your slave
  rationale: The project's guidance prefers 'slave' where bonded nature is salient,
    but here the phrase is a stock expression of humility before a king. 'Servant'
    better communicates the discourse function in readable modern English while remaining
    faithful to the Hebrew.
  doctrine_reference: Translation philosophy §1, §6; Contested terms table on δοῦλος
    by analogy of context-sensitive bonded-language rendering
