id: 2SA.9.10
reference: 2 Samuel 9:10
source:
  edition: WLC
  text: וְ/עָבַ֣דְתָּ לּ֣/וֹ אֶֽת הָ/אֲדָמָ֡ה אַתָּה֩ וּ/בָנֶ֨י/ךָ וַ/עֲבָדֶ֜י/ךָ
    וְ/הֵבֵ֗אתָ וְ/הָיָ֨ה לְ/בֶן אֲדֹנֶ֤י/ךָ לֶּ֨חֶם֙ וַ/אֲכָל֔/וֹ וּ/מְפִיבֹ֨שֶׁת֙
    בֶּן אֲדֹנֶ֔י/ךָ יֹאכַ֥ל תָּמִ֛יד לֶ֖חֶם עַל שֻׁלְחָנִ֑/י וּ/לְ/צִיבָ֗א חֲמִשָּׁ֥ה
    עָשָׂ֛ר בָּנִ֖ים וְ/עֶשְׂרִ֥ים עֲבָדִֽים־־־־׃
translation:
  text: You and your sons and your slaves shall work the land for him, and you shall
    bring in the produce, and it shall be bread for your master's son, and he shall
    eat it. But Mephibosheth, your master's son, shall always eat bread at my table.
    Now Ziba had fifteen sons and twenty slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread' can also mean 'food' or 'provisions' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַדְתָּ לּוֹ אֶת הָאֲדָמָה
  chosen: shall work the land for him
  alternatives:
  - shall serve him by working the ground
  - shall cultivate the land for him
  lexicon: HALOT
  rationale: עבד with אֲדָמָה here refers concretely to agricultural labor on behalf
    of Mephibosheth, not general service. 'Work the land' is natural English and preserves
    the direct object 'the land' and beneficiary 'for him'.
- source_word: אַתָּה וּבָנֶיךָ וַעֲבָדֶיךָ
  chosen: you and your sons and your slaves
  alternatives:
  - you and your sons and your servants
  lexicon: HALOT
  rationale: The phrase lists Ziba together with his household labor force. For עֲבָדֶיךָ,
    'slaves' better reflects the bonded status of the term in this socioeconomic context,
    in line with the project's guidance to use 'slave' where bonded nature is salient.
- source_word: וְהֵבֵאתָ
  chosen: you shall bring in the produce
  alternatives:
  - you shall bring it in
  - you shall bring in
  lexicon: HALOT
  rationale: 'The verb literally means ''bring,'' but the object is implicit from
    the farming context: the yield of the land. Supplying ''the produce'' makes the
    sense clear in English without over-paraphrasing.'
- source_word: וְהָיָה לְבֶן אֲדֹנֶיךָ לֶּחֶם
  chosen: and it shall be bread for your master's son
  alternatives:
  - and it shall be food for your master's son
  - and it shall belong to your master's son as food
  lexicon: HALOT
  rationale: לֶחֶם often means 'bread' literally, but can also denote food/provisions
    more broadly. Here retaining 'bread' preserves the Hebrew wording and links with
    the repeated 'eat bread at my table' later in the verse.
- source_word: וַאֲכָלוֹ
  chosen: and he shall eat it
  alternatives:
  - and he shall eat
  - and he shall consume it
  lexicon: HALOT
  rationale: The suffix refers back to the produce/food just mentioned. English requires
    an explicit object for clarity, so 'it' is supplied.
- source_word: וּמְפִיבֹשֶׁת ... יֹאכַל תָּמִיד לֶחֶם עַל שֻׁלְחָנִי
  chosen: But Mephibosheth, your master's son, shall always eat bread at my table
  alternatives:
  - Yet Mephibosheth ... shall continually eat at my table
  - But Mephibosheth ... shall always eat food at my table
  lexicon: HALOT
  rationale: ו here is adversative in context, contrasting field provisions with David's
    personal provision for Mephibosheth. 'Always' renders תָּמִיד naturally. 'Eat
    bread at my table' preserves the repeated idiom of royal table fellowship.
- source_word: עַל שֻׁלְחָנִי
  chosen: at my table
  alternatives:
  - from my table
  - upon my table
  lexicon: HALOT
  rationale: The idiom in English is 'eat at my table.' This conveys ongoing royal
    provision and fellowship without woodenly reproducing the preposition.
- source_word: וּלְצִיבָא חֲמִשָּׁה עָשָׂר בָּנִים וְעֶשְׂרִים עֲבָדִים
  chosen: Now Ziba had fifteen sons and twenty slaves
  alternatives:
  - And Ziba had fifteen sons and twenty servants
  lexicon: HALOT
  rationale: This is a verbless clause appended as background information. English
    idiom supplies 'had.' Again, עֲבָדִים is rendered 'slaves' to reflect household
    bondservants rather than generic employees.
