theological_decisions:
- issue: Covenantal nuance of חֶסֶד
  chosen_reading: Rendered as 'kindness' in the main text, with covenantal/loyal-love
    alternatives documented.
  alternative_readings:
  - steadfast love
  - loyal love
  - covenant loyalty
  rationale: The verse concerns David's faithful benevolence grounded in his bond
    with Jonathan. The narrative context favors an accessible rendering in the text
    while preserving the fuller theological nuance in documentation rather than overstating
    it in the main line.
  doctrine_reference: Translation philosophy §§1, 5, 6
