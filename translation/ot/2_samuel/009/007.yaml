id: 2SA.9.7
reference: 2 Samuel 9:7
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ל֨/וֹ דָוִ֜ד אַל תִּירָ֗א כִּ֣י עָשֹׂה֩ אֶעֱשֶׂ֨ה עִמְּ/ךָ֥ חֶ֨סֶד֙
    בַּֽ/עֲבוּר֙ יְהוֹנָתָ֣ן אָבִ֔י/ךָ וַ/הֲשִׁבֹתִ֣י לְ/ךָ֔ אֶֽת כָּל שְׂדֵ֖ה שָׁא֣וּל
    אָבִ֑י/ךָ וְ/אַתָּ֗ה תֹּ֥אכַל לֶ֛חֶם עַל שֻׁלְחָנִ֖/י תָּמִֽיד־־־־׃
translation:
  text: David said to him, “Do not be afraid, for I will surely show you kindness
    for the sake of Jonathan your father, and I will restore to you all the land of
    Saul your grandfather, and you shall always eat bread at my table.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “steadfast love,” “loyal love,” or “covenant loyalty” for the Hebrew
      hesed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “Saul your father”; “father” can mean an ancestor, here Saul is Mephibosheth’s
      grandfather.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “eat bread at my table,” an idiom for ongoing provision and table
      fellowship.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּירָא
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: Natural modern English for the negative imperative while preserving the
    direct reassurance.
- source_word: כִּי עָשֹׂה אֶעֱשֶׂה
  chosen: for I will surely show
  alternatives:
  - for I will indeed do
  - for I will certainly show
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. In English,
    'will surely' conveys the emphasis without awkward literalism.
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyal love
  - covenant loyalty
  lexicon: HALOT
  rationale: Here the term denotes benevolent covenantal loyalty expressed in concrete
    action toward Mephibosheth because of Jonathan. 'Kindness' is the most idiomatic
    main-text rendering in this narrative context, while the richer covenant nuance
    is preserved in alternatives.
- source_word: בַּעֲבוּר יְהוֹנָתָן אָבִיךָ
  chosen: for the sake of Jonathan your father
  alternatives:
  - because of Jonathan your father
  - on account of Jonathan your father
  lexicon: HALOT
  rationale: '''For the sake of'' best captures both causation and relational motive.'
- source_word: וַהֲשִׁבֹתִי לְךָ
  chosen: and I will restore to you
  alternatives:
  - and I will give back to you
  - and I will return to you
  lexicon: HALOT
  rationale: Hiphil of שוב here means to cause to return/restore property. 'Restore'
    is the clearest idiomatic legal-social sense.
- source_word: כָּל שְׂדֵה שָׁאוּל
  chosen: all the land of Saul
  alternatives:
  - all the field of Saul
  - all Saul's farmland
  lexicon: HALOT
  rationale: Although שָׂדֶה is singular, it can function collectively. 'Land' communicates
    the estate/property sense better than the overly narrow 'field' in English.
- source_word: שָׁאוּל אָבִיךָ
  chosen: Saul your grandfather
  alternatives:
  - Saul your father
  lexicon: HALOT
  rationale: Hebrew אָב can denote an ancestor, not only immediate father. Since Mephibosheth
    is Jonathan's son, 'grandfather' makes the relationship explicit in natural English
    and avoids confusion.
- source_word: תֹּאכַל לֶחֶם
  chosen: you shall always eat bread
  alternatives:
  - you shall always eat
  - you shall always dine
  lexicon: HALOT
  rationale: The idiom literally says 'eat bread,' meaning to partake of meals. Retaining
    'eat bread' preserves the Hebrew expression while remaining understandable.
- source_word: עַל שֻׁלְחָנִי תָּמִיד
  chosen: at my table ... always
  alternatives:
  - at my table continually
  - at my table regularly
  lexicon: HALOT
  rationale: '''At my table'' is the natural English equivalent for table fellowship/provision.
    תָּמִיד is best rendered ''always'' here to stress ongoing, permanent privilege.'
