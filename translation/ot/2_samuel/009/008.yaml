id: 2SA.9.8
reference: 2 Samuel 9:8
source:
  edition: WLC
  text: וַ/יִּשְׁתַּ֕חוּ וַ/יֹּ֖אמֶר מֶ֣ה עַבְדֶּ֑/ךָ כִּ֣י פָנִ֔יתָ אֶל הַ/כֶּ֥לֶב
    הַ/מֵּ֖ת אֲשֶׁ֥ר כָּמֽוֹ/נִי־׃
translation:
  text: And he bowed down and said, “What is your servant, that you have turned toward
    a dead dog like me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “paid attention to” / “regarded.” The Hebrew literally says “turned toward,”
      expressing gracious notice.
    reason: lexical_alternative
  - marker: b
    text: “A dead dog” is an idiom of extreme self-abasement and worthlessness.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The verb שׁחה in the hitpael commonly denotes bowing oneself down in
    reverence or submission. 'Bowed down' is natural modern English and preserves
    the physical gesture without over-specifying whether this is worship or courtly
    homage.
- source_word: מֶה עַבְדֶּךָ
  chosen: What is your servant
  alternatives:
  - Who is your servant
  - What is your slave
  lexicon: HALOT
  rationale: The Hebrew literally asks 'What [is] your servant?' expressing humility
    and self-abasement. 'What is your servant' preserves the idiom better than smoothing
    to 'Who am I,' while remaining intelligible. 'Servant' fits courtly self-reference
    here better than 'slave,' since bonded status is not the salient point in this
    exchange.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the rhetorical question:
    ''What is your servant, that...?'' This is more idiomatic in English than a causal
    ''because'' or ''for.'''
- source_word: פָנִיתָ אֶל
  chosen: you have turned toward
  alternatives:
  - you have regarded
  - you have paid attention to
  - you have turned to
  lexicon: HALOT
  rationale: פנה אל literally means 'turn toward/to.' In context it conveys gracious
    attention from a superior to an unworthy inferior. 'Turned toward' preserves the
    concrete Hebrew image while still making sense idiomatically.
- source_word: הַכֶּלֶב הַמֵּת
  chosen: a dead dog
  alternatives:
  - this dead dog
  lexicon: HALOT
  rationale: A conventional expression of extreme self-humiliation and worthlessness.
    English preserves the force well with the established idiom 'a dead dog.' The
    Hebrew articles are retained idiomatically as an indefinite expression in English.
- source_word: אֲשֶׁר כָּמוֹנִי
  chosen: like me
  alternatives:
  - such as I am
  - as I am
  lexicon: HALOT
  rationale: This relative phrase qualifies 'dead dog' and is best rendered succinctly
    as 'like me.' It preserves Mephibosheth's self-abasing comparison without sounding
    archaic.
