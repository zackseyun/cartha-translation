id: 2SA.9.2
reference: 2 Samuel 9:2
source:
  edition: WLC
  text: וּ/לְ/בֵ֨ית שָׁא֥וּל עֶ֨בֶד֙ וּ/שְׁמ֣/וֹ צִיבָ֔א וַ/יִּקְרְאוּ ל֖/וֹ אֶל דָּוִ֑ד
    וַ/יֹּ֨אמֶר הַ/מֶּ֧לֶךְ אֵלָ֛י/ו הַ/אַתָּ֥ה צִיבָ֖א וַ/יֹּ֥אמֶר עַבְדֶּֽ/ךָ־־׃
translation:
  text: Now the house of Saul had a servant whose name was Ziba, and they called him
    to David. And the king said to him, “Are you Ziba?” And he said, “Your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly, “I am your servant.” The Hebrew reply is elliptical:
      “Your servant.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/בֵית שָׁאוּל
  chosen: Now the house of Saul had
  alternatives:
  - And for the house of Saul there was
  - Now there was, belonging to the house of Saul
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'and/to the house of Saul,'
    an idiom introducing existence/possession. English expresses this naturally as
    'the house of Saul had' or 'there was ... belonging to the house of Saul.' 'Now'
    captures the discourse-linking waw at the start of a new scene.
- source_word: עֶבֶד
  chosen: a servant
  alternatives:
  - a slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, here it refers to a household
    retainer of Saul's estate. The bonded nature is not foregrounded theologically,
    so 'servant' is the more natural contextual rendering while preserving social
    subordination.
- source_word: וּשְׁמוֹ צִיבָא
  chosen: whose name was Ziba
  alternatives:
  - and his name was Ziba
  lexicon: HALOT
  rationale: This construct is idiomatic in Hebrew narrative. 'Whose name was Ziba'
    is smoother modern English while preserving the identifying function.
- source_word: וַיִּקְרְאוּ לוֹ אֶל דָּוִד
  chosen: and they called him to David
  alternatives:
  - and they summoned him to David
  - and he was called to David
  lexicon: HALOT
  rationale: The verb קרא with ל plus destination here means summoning someone into
    David's presence. 'Called him to David' stays close to the Hebrew; 'summoned'
    is possible but slightly more interpretive.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to David in the narrative; standard rendering
    is straightforward.
- source_word: הַאַתָּה צִיבָא
  chosen: Are you Ziba?
  alternatives:
  - You are Ziba?
  lexicon: HALOT
  rationale: The interrogative plus pronoun is most naturally rendered as a direct
    question in English.
- source_word: עַבְדֶּךָ
  chosen: Your servant
  alternatives:
  - I am your servant
  lexicon: HALOT
  rationale: The Hebrew reply is elliptical, literally 'your servant.' In context
    it functions as a deferential self-identification/affirmation. Retaining the ellipsis
    preserves the terseness and courtly humility of the Hebrew.
