id: 2SA.9.5
reference: 2 Samuel 9:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֖ח הַ/מֶּ֣לֶךְ דָּוִ֑ד וַ/יִּקָּחֵ֗/הוּ מִ/בֵּ֛ית מָכִ֥יר בֶּן
    עַמִּיאֵ֖ל מִ/לּ֥וֹ דְבָֽר־׃
translation:
  text: So King David sent and took him from the house of Machir son of Ammiel, from
    Lo-debar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent for him and brought him from the house of Machir son of Ammiel,
      from Lo-debar.' The Hebrew uses the sequence 'sent' + 'took him,' which can
      be rendered more idiomatically in English as 'sent for' or 'brought.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol form straightforwardly means 'sent.' English
    can imply the object of sending from context; 'sent for' is possible in idiomatic
    context, but the Hebrew does not explicitly include 'for,' so 'sent' is retained
    and coordinated with the following verb.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: The appositional phrase is naturally rendered as the title plus name
    in English. This preserves both the definiteness of 'the king' and the identification
    of David.
- source_word: וַיִּקָּחֵהוּ
  chosen: took him
  alternatives:
  - brought him
  - fetched him
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this narrative context it can imply bringing
    someone to the king, but 'took him' stays closer to the Hebrew while remaining
    natural. More interpretive options like 'brought him' are possible but go beyond
    the explicit lexical value.
- source_word: מִבֵּית
  chosen: from the house of
  alternatives:
  - from the household of
  - from the home of
  lexicon: HALOT
  rationale: בַּיִת can denote a physical house or a household. Here either is possible,
    but 'house of' preserves the Hebrew wording and remains idiomatic in English narrative.
- source_word: מָכִיר בֶּן עַמִּיאֵל
  chosen: Machir son of Ammiel
  alternatives:
  - Makir son of Ammiel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English biblical convention.
    'Son of' is retained rather than reduced to a patronymic form to reflect the Hebrew
    construct.
- source_word: מִלּוֹ דְבָר
  chosen: from Lo-debar
  alternatives:
  - from Lo Debar
  lexicon: HALOT
  rationale: This is a place name, not a descriptive phrase in context, so it is transliterated.
    The maqqef-linked form is represented with the conventional English hyphenation
    'Lo-debar.' The repeated preposition מִן is preserved with a second 'from,' matching
    the Hebrew structure.
