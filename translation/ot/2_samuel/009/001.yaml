id: 2SA.9.1
reference: 2 Samuel 9:1
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔ד הֲ/כִ֣י יֶשׁ ע֔וֹד אֲשֶׁ֥ר נוֹתַ֖ר לְ/בֵ֣ית שָׁא֑וּל וְ/אֶעֱשֶׂ֤ה
    עִמּ/וֹ֙ חֶ֔סֶד בַּ/עֲב֖וּר יְהוֹנָתָֽן־׃
translation:
  text: David said, “Is there still anyone left of the house of Saul, that I may show
    kindness to him for Jonathan’s sake?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show loyal love' or 'show covenant faithfulness'; the Hebrew word often
      denotes faithful, covenantal kindness, not mere sentiment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: The verb אמר is the standard narrative verb 'say.' Although the following
    clause is interrogative, English naturally renders the speech introduction as
    'said' rather than 'asked.'
- source_word: הֲכִי
  chosen: Is there still
  alternatives:
  - Is there yet
  - Is there indeed still
  lexicon: HALOT
  rationale: The interrogative particle with כי introduces a question seeking confirmation.
    'Is there still' captures the sense idiomatically in modern English without overtranslating
    the particle combination.
- source_word: יֶשׁ עוֹד
  chosen: there still anyone
  alternatives:
  - there anyone yet
  - there still someone
  lexicon: HALOT
  rationale: 'יש plus עוד expresses continued existence: ''is there still/yet.'' ''Anyone''
    fits the indefinite sense in context.'
- source_word: אֲשֶׁר נוֹתַר
  chosen: left
  alternatives:
  - remaining
  - who remains
  lexicon: HALOT
  rationale: נותר denotes one who remains or is left over. 'Left' is concise, natural
    English and preserves the sense of a surviving remnant.
- source_word: לְבֵית שָׁאוּל
  chosen: of the house of Saul
  alternatives:
  - from Saul's house
  - belonging to the house of Saul
  lexicon: HALOT
  rationale: בית here refers to household/dynasty. 'Of the house of Saul' preserves
    the familial-dynastic sense better than the more spatial 'from Saul's house.'
- source_word: וְאֶעֱשֶׂה עִמּוֹ
  chosen: that I may show to him
  alternatives:
  - and I will do for him
  - so that I may act toward him
  lexicon: HALOT
  rationale: עשה with חסד is an idiom meaning 'show/do kindness.' Rendering the conjunction
    and verb as 'that I may show' reflects the purpose nuance in English.
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyal love
  - covenant faithfulness
  lexicon: HALOT
  rationale: חסד can carry covenantal loyalty and faithful kindness. In this interpersonal
    royal context, 'kindness' is the clearest main-text rendering, while the richer
    covenantal nuance is worth preserving in a footnote.
- source_word: בַּעֲבוּר יְהוֹנָתָן
  chosen: for Jonathan’s sake
  alternatives:
  - because of Jonathan
  - on account of Jonathan
  lexicon: HALOT
  rationale: בעבור expresses motive or account. 'For Jonathan's sake' is idiomatic
    and highlights David's action as grounded in his relationship and commitment to
    Jonathan.
