theological_decisions:
- issue: Nuance of חֶסֶד in David's intended action toward Saul's house
  chosen_reading: Render חֶסֶד as 'kindness' in the main text
  alternative_readings:
  - steadfast love
  - loyal love
  - covenant faithfulness
  rationale: The verse concerns David's benevolent action rooted in his covenant relationship
    with Jonathan. 'Kindness' is the most natural English in context, but the covenant-loyalty
    dimension should not be erased, so an explanatory footnote preserves that nuance
    without importing more theology into the main text than the immediate context
    requires.
  doctrine_reference: Translation philosophy §§3, 5
