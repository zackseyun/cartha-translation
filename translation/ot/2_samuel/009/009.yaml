id: 2SA.9.9
reference: 2 Samuel 9:9
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א הַ/מֶּ֗לֶךְ אֶל צִיבָ֛א נַ֥עַר שָׁא֖וּל וַ/יֹּ֣אמֶר אֵלָ֑י/ו
    כֹּל֩ אֲשֶׁ֨ר הָיָ֤ה לְ/שָׁאוּל֙ וּ/לְ/כָל בֵּית֔/וֹ נָתַ֖תִּי לְ/בֶן אֲדֹנֶֽי/ךָ־־־׃
translation:
  text: Then the king called Ziba, Saul’s servant, and said to him, “All that belonged
    to Saul and to all his house I have given to your master’s son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Saul’s young man” / “Saul’s attendant” for נַעַר; here it likely denotes
      a household servant or retainer.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to all his house,” that is, to all Saul’s household/estate.
    reason: lexical_alternative
  - marker: c
    text: “Your master’s son” refers to Mephibosheth, Saul’s descendant and Ziba’s
      superior in the household structure.
    reason: cultural_note
lexical_decisions:
- source_word: נַעַר
  chosen: servant
  alternatives:
  - young man
  - attendant
  lexicon: HALOT
  rationale: Though נַעַר often means 'young man' or 'boy,' in royal-household context
    with a named retainer of Saul it functions as a status/role term. 'Servant' best
    fits the context and reads naturally in English.
- source_word: כֹּל אֲשֶׁר הָיָה לְשָׁאוּל
  chosen: All that belonged to Saul
  alternatives:
  - Everything that was Saul's
  - All that was Saul's
  lexicon: HALOT
  rationale: The idiom 'what was to Saul' denotes possession. 'Belonged to Saul' expresses
    ownership clearly in modern English without over-paraphrase.
- source_word: וּלְכָל בֵּיתוֹ
  chosen: and to all his house
  alternatives:
  - and to all his household
  - and to his entire family
  lexicon: HALOT
  rationale: בַּיִת/בֵּית can mean house, household, or dynasty/family depending on
    context. Here it refers to Saul's household/estate. 'House' preserves the Hebrew
    term while remaining intelligible; the possessive clarifies reference.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I gave
  lexicon: HALOT
  rationale: The perfect here reports a completed action with present relevance in
    direct speech. English present perfect communicates that David has already transferred
    the property and that the result now stands.
- source_word: לְבֶן אֲדֹנֶיךָ
  chosen: to your master’s son
  alternatives:
  - to the son of your lord
  - to your lord's son
  lexicon: HALOT
  rationale: אֲדוֹן here is a social superior, not a divine title. 'Master' is the
    most natural contextual rendering. The construct phrase is most idiomatically
    rendered 'your master's son,' referring to Mephibosheth as Saul's son in the broader
    patronal sense already established in the narrative.
- source_word: וַיִּקְרָא ... וַיֹּאמֶר
  chosen: Then the king called ... and said
  alternatives:
  - And the king called ... and said
  lexicon: HALOT
  rationale: The waw-consecutive sequence advances the narrative. 'Then' gives smooth
    English narrative flow while preserving temporal progression.
