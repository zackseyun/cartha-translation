id: 2SA.9.12
reference: 2 Samuel 9:12
source:
  edition: WLC
  text: וְ/לִ/מְפִיבֹ֥שֶׁת בֵּן קָטָ֖ן וּ/שְׁמ֣/וֹ מִיכָ֑א וְ/כֹל֙ מוֹשַׁ֣ב בֵּית
    צִיבָ֔א עֲבָדִ֖ים לִ/מְפִיבֹֽשֶׁת־־׃
translation:
  text: Mephibosheth had a young son, and his name was Mica. And all who lived in
    the house of Ziba were servants to Mephibosheth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the household of Ziba were servants to Mephibosheth.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'servants' can also mean 'slaves,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְפִיבֹשֶׁת
  chosen: Mephibosheth had
  alternatives:
  - and to Mephibosheth there was
  - now Mephibosheth had
  lexicon: HALOT
  rationale: The prepositional phrase with ל introduces possession/existence idiomatically
    in Hebrew ('to Mephibosheth [there was]'). Natural English expresses this as 'Mephibosheth
    had.' The initial conjunction is absorbed into the flow of the narrative rather
    than mechanically rendered as 'and' at the start.
- source_word: בֵּן קָטָן
  chosen: a young son
  alternatives:
  - a small son
  - a little son
  lexicon: HALOT
  rationale: בֵּן is 'son' and קָטָן here describes youth/smallness. In idiomatic
    English for a child, 'young son' is clearer and more natural than 'small son'
    or 'little son' while preserving the sense.
- source_word: וּ/שְׁמ֣/וֹ מִיכָא
  chosen: and his name was Mica
  alternatives:
  - whose name was Mica
  lexicon: HALOT
  rationale: This clause straightforwardly identifies the son by name. 'Mica' is a
    standard transliteration of מִיכָא. 'And his name was' preserves the Hebrew clause
    structure; 'whose name was' would be slightly smoother but less formally aligned.
- source_word: וְ/כֹל מוֹשַׁב בֵּית צִיבָא
  chosen: And all who lived in the house of Ziba
  alternatives:
  - And all the household of Ziba
  - And all the inhabitants of Ziba's house
  lexicon: HALOT
  rationale: מוֹשַׁב literally relates to dwelling/settlement, here referring to those
    dwelling in the household. 'All who lived in the house of Ziba' makes explicit
    the personal reference implied by the collective noun. 'Household' is possible,
    but the Hebrew wording more directly evokes those dwelling there.
- source_word: עֲבָדִים
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: עֲבָדִים can mean 'servants' or 'slaves' depending on context. Here it
    refers to the dependents of Ziba's household in service to Mephibosheth. Since
    the verse emphasizes household service arrangement rather than the bonded status
    as a theological point, 'servants' best fits the context while remaining accurate
    under the project's context-dependent policy for servant/slave language.
- source_word: לִ/מְפִיבֹשֶׁת
  chosen: to Mephibosheth
  alternatives:
  - belonging to Mephibosheth
  - under Mephibosheth
  lexicon: HALOT
  rationale: The preposition ל marks relation/service directed toward Mephibosheth.
    'To Mephibosheth' is a close rendering in English after 'were servants,' conveying
    their service relation without overinterpreting ownership or rank.
