id: 2SA.9.13
reference: 2 Samuel 9:13
source:
  edition: WLC
  text: וּ/מְפִיבֹ֗שֶׁת יֹשֵׁב֙ בִּ/יר֣וּשָׁלִַ֔ם כִּ֣י עַל שֻׁלְחַ֥ן הַ/מֶּ֛לֶךְ
    תָּמִ֖יד ה֣וּא אֹכֵ֑ל וְ/ה֥וּא פִסֵּ֖חַ שְׁתֵּ֥י רַגְלָֽי/ו־׃פ
translation:
  text: And Mephibosheth lived in Jerusalem, because he always ate at the king’s table.
    Now he was lame in both his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For he always ate at the king’s table.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''lame in his two feet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב
  chosen: lived
  alternatives:
  - was living
  - dwelt
  - sat
  lexicon: HALOT
  rationale: Although the participle of ישׁב is literally 'sitting/dwelling,' in this
    narrative context with a city name it idiomatically denotes residence. 'Lived'
    is natural modern English and preserves the sense better than the more wooden
    'was dwelling.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Mephibosheth lived in Jerusalem. 'Because'
    makes the causal force explicit in contemporary English; 'for' is possible but
    more literary/archaic.
- source_word: שֻׁלְחַן הַמֶּלֶךְ
  chosen: the king’s table
  alternatives:
  - the table of the king
  lexicon: HALOT
  rationale: Construct chain rendered with standard English possessive. This preserves
    the idiom of royal provision and fellowship without unnecessary stiffness.
- source_word: תָּמִיד
  chosen: always
  alternatives:
  - continually
  - regularly
  lexicon: HALOT
  rationale: תָּמִיד conveys ongoing regularity. 'Always' fits the repeated privilege
    emphasized in this chapter and is idiomatic with 'ate at the king’s table.'
- source_word: אֹכֵל
  chosen: ate
  alternatives:
  - was eating
  - would eat
  lexicon: HALOT
  rationale: The participle expresses customary action. English simple past 'ate'
    with 'always' communicates habitual past action more naturally than a progressive
    form.
- source_word: פִסֵּחַ
  chosen: lame
  alternatives:
  - crippled
  - disabled
  lexicon: HALOT
  rationale: The adjective denotes lameness. 'Lame' is the most direct lexical equivalent
    and matches the repeated description of Mephibosheth in this narrative. 'Crippled'
    is more interpretive and can sound harsher in modern English.
- source_word: שְׁתֵּי רַגְלָיו
  chosen: both his feet
  alternatives:
  - his two feet
  - both his legs
  lexicon: HALOT
  rationale: The Hebrew literally says 'his two feet.' In English, 'lame in both his
    feet' is a conventional rendering that preserves the specific body part. 'Legs'
    is less precise.
- source_word: וְהוּא
  chosen: Now he was
  alternatives:
  - and he was
  - he was
  lexicon: HALOT
  rationale: The conjunction introduces a concluding descriptive note already known
    from earlier context. 'Now he was' gives smooth English discourse flow while retaining
    the additive/concluding force of the Hebrew waw.
