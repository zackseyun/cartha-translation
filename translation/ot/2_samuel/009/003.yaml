id: 2SA.9.3
reference: 2 Samuel 9:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֗לֶךְ הַ/אֶ֨פֶס ע֥וֹד אִישׁ֙ לְ/בֵ֣ית שָׁא֔וּל וְ/אֶעֱשֶׂ֥ה
    עִמּ֖/וֹ חֶ֣סֶד אֱלֹהִ֑ים וַ/יֹּ֤אמֶר צִיבָא֙ אֶל הַ/מֶּ֔לֶךְ ע֛וֹד בֵּ֥ן לִ/יהוֹנָתָ֖ן
    נְכֵ֥ה רַגְלָֽיִם־׃
translation:
  text: Then the king said, “Is there still no one left of the house of Saul, that
    I may show him the kindness of God?” Ziba said to the king, “There is still a
    son of Jonathan, crippled in his feet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the covenant loyalty of God” or “God’s kindness.”
    reason: lexical_alternative
  - marker: b
    text: Or “lame in his feet.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֶפֶס עוֹד אִישׁ
  chosen: Is there still no one left
  alternatives:
  - Is there still anyone
  - Is there yet a man
  lexicon: HALOT
  rationale: The idiom with אֶפֶס plus עוֹד and אִישׁ functions as a question about
    whether anyone remains. 'No one left' captures the sense of remaining survivors
    more naturally in English than a wooden 'is there still a man.'
- source_word: לְבֵית שָׁאוּל
  chosen: of the house of Saul
  alternatives:
  - from Saul's house
  - belonging to the house of Saul
  lexicon: HALOT
  rationale: '''House'' here denotes family line or dynasty. ''Of the house of Saul''
    preserves the familial/dynastic sense while remaining idiomatic.'
- source_word: וְאֶעֱשֶׂה עִמּוֹ
  chosen: that I may show him
  alternatives:
  - and I will do for him
  - so that I may act toward him
  lexicon: HALOT
  rationale: With חֶסֶד, English idiom prefers 'show' rather than the more literal
    'do.' The cohortative nuance is well represented by 'that I may show him.'
- source_word: חֶסֶד אֱלֹהִים
  chosen: the kindness of God
  alternatives:
  - God's kindness
  - the covenant loyalty of God
  - godly kindness
  lexicon: HALOT
  rationale: חֶסֶד carries the sense of loyal, gracious kindness. In this narrative
    context David seeks to extend covenantal kindness in a way reflecting God's own
    character. 'The kindness of God' preserves the genitive and avoids over-specifying
    with 'covenant loyalty' in the main text, while still conveying theological weight.
- source_word: עוֹד בֵּן לִיהוֹנָתָן
  chosen: There is still a son of Jonathan
  alternatives:
  - Jonathan still has a son
  - There remains a son of Jonathan
  lexicon: HALOT
  rationale: This straightforwardly reports a surviving descendant. 'There is still
    a son of Jonathan' mirrors the Hebrew emphasis on one remaining.
- source_word: נְכֵה רַגְלָיִם
  chosen: crippled in his feet
  alternatives:
  - lame in his feet
  - disabled in his feet
  lexicon: HALOT
  rationale: The adjective from נכה denotes being stricken or impaired; with 'feet'
    it refers to physical disability affecting mobility. 'Crippled in his feet' is
    clear modern English, though 'lame in his feet' is a close traditional alternative
    worth preserving.
