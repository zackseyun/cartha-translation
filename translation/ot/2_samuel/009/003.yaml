theological_decisions:
- issue: Nuance of חֶסֶד אֱלֹהִים
  chosen_reading: the kindness of God
  alternative_readings:
  - God's covenant loyalty
  - godly kindness
  rationale: The phrase can denote kindness characterized by God, belonging to God,
    or reflecting covenantal faithfulness. The main text keeps the wording broad and
    transparent without importing a narrower doctrinal formulation, while the lexical
    note records the covenantal nuance present in חֶסֶד.
  doctrine_reference: Translation philosophy §§1, 3, 5
