theological_decisions:
- issue: Speaker of 'my table' in the final clause
  chosen_reading: Retain first person 'my table,' understood as David speaking in
    the quoted or resumed sense preserved by the Masoretic Text.
  alternative_readings:
  - Some translations smooth to 'the king's table' or treat the clause as resumptive
    narration rather than direct speech.
  rationale: The Hebrew text reads שֻׁלְחָנִי ('my table'). Rather than emending or
    harmonizing to avoid the shift after Ziba's speech, the translation preserves
    the MT's first-person form. English 'was eating at my table' reflects the text
    as given, while the surrounding context makes clear that the table is the king's,
    i.e., David's.
  doctrine_reference: Translation philosophy §§1, 3, 5
