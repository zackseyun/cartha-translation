id: 2SA.9.11
reference: 2 Samuel 9:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר צִיבָא֙ אֶל הַ/מֶּ֔לֶךְ כְּ/כֹל֩ אֲשֶׁ֨ר יְצַוֶּ֜ה אֲדֹנִ֤/י הַ/מֶּ֨לֶךְ֙
    אֶת עַבְדּ֔/וֹ כֵּ֖ן יַעֲשֶׂ֣ה עַבְדֶּ֑/ךָ וּ/מְפִיבֹ֗שֶׁת אֹכֵל֙ עַל שֻׁלְחָנִ֔/י
    כְּ/אַחַ֖ד מִ/בְּנֵ֥י הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Ziba said to the king, “According to all that my lord the king commands his
    servant, so your servant will do.” And Mephibosheth was eating at my table like
    one of the king’s sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my table.'' Some translations render ''the king’s table'' to
      smooth the shift in person, but the Masoretic Text preserves the first person,
      likely reflecting David’s perspective.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in direct speech introduction; 'said'
    is the natural English narrative equivalent.
- source_word: כְּכֹל אֲשֶׁר
  chosen: According to all that
  alternatives:
  - Just as everything that
  - In accordance with all that
  lexicon: HALOT
  rationale: Preserves the comparative/comprehensive force of כ + כל + אשר without
    sounding wooden.
- source_word: יְצַוֶּה
  chosen: commands
  alternatives:
  - orders
  - will command
  lexicon: HALOT
  rationale: Piel of צוה commonly means 'command/order.' Although the imperfect can
    be future-like, in this deferential formula English present 'commands' best conveys
    general obligation.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address formula. 'Lord' fits respectful royal address in English
    and aligns with the project's default handling of such titles where appropriate.
- source_word: עַבְדּוֹ / עַבְדֶּךָ
  chosen: his servant / your servant
  alternatives:
  - his slave / your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a courtly
    self-designation and reference within royal service rather than emphasizing bonded
    status; therefore 'servant' is the better contextual rendering.
- source_word: כֵּן יַעֲשֶׂה
  chosen: so ... will do
  alternatives:
  - thus ... shall do
  - so ... does
  lexicon: HALOT
  rationale: Represents the correlative force of כן with the imperfect of עשה in a
    pledge of obedience.
- source_word: וּמְפִיבֹשֶׁת
  chosen: And Mephibosheth
  alternatives:
  - Now Mephibosheth
  lexicon: HALOT
  rationale: Simple conjunction plus proper name; retained as a new clause. The name
    is transliterated per project policy.
- source_word: אֹכֵל
  chosen: was eating
  alternatives:
  - ate
  - would eat
  - eats
  lexicon: HALOT
  rationale: Qal participle gives a durative/state sense. 'Was eating' captures the
    ongoing status/resulting arrangement better than simple past 'ate.'
- source_word: עַל שֻׁלְחָנִי
  chosen: at my table
  alternatives:
  - on my table
  lexicon: HALOT
  rationale: Idiomatic English for dining fellowship/status. Hebrew על with 'table'
    is naturally rendered 'at' in this context.
- source_word: כְּאַחַד מִבְּנֵי הַמֶּלֶךְ
  chosen: like one of the king’s sons
  alternatives:
  - as one of the king's sons
  - like one of the sons of the king
  lexicon: HALOT
  rationale: Preserves the comparison and the familial/royal status language. 'The
    king's sons' is more natural English than a fully literal rendering.
