id: 2SA.9.4
reference: 2 Samuel 9:4
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר ל֥/וֹ הַ/מֶּ֖לֶךְ אֵיפֹ֣ה ה֑וּא וַ/יֹּ֤אמֶר צִיבָא֙ אֶל הַ/מֶּ֔לֶךְ
    הִנֵּה ה֗וּא בֵּ֛ית מָכִ֥יר בֶּן עַמִּיאֵ֖ל בְּ/ל֥וֹ דְבָֽר־־־־׃
translation:
  text: The king said to him, “Where is he?” Ziba said to the king, “Look, he is in
    the house of Machir son of Ammiel, in Lo-debar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, he is in the house of Machir son of Ammiel, at Lo-debar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיפֹה
  chosen: Where
  alternatives:
  - Where now
  - In what place
  lexicon: HALOT
  rationale: Interrogative of location. Simple 'Where' is natural modern English and
    fully conveys the sense without adding discourse nuance not required by context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the answer. 'Look' preserves the
    presentational force in readable modern English better than archaic 'behold.'
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  lexicon: HALOT
  rationale: In this context the phrase identifies a residence/location. 'House of'
    is the most direct rendering, though 'household of' is a possible extension in
    some contexts.
- source_word: מָכִיר בֶּן עַמִּיאֵל
  chosen: Machir son of Ammiel
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves
    the Hebrew patronymic construction.
- source_word: בְּלוֹ דְבָר
  chosen: in Lo-debar
  alternatives:
  - at Lo-debar
  lexicon: HALOT
  rationale: Toponym with prefixed preposition בְּ indicating location. 'In Lo-debar'
    is the most idiomatic English rendering for a place name.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... said
  alternatives:
  - asked ... answered
  lexicon: HALOT
  rationale: The Hebrew repeats the common verb 'say' for both clauses. English can
    smooth this as 'asked/answered,' but retaining 'said' in both places stays closer
    to the source while remaining natural enough in dialogue.
- source_word: הַמֶּלֶךְ
  chosen: The king
  lexicon: HALOT
  rationale: Definite title referring to David in context. Rendering the title rather
    than substituting the name preserves the Hebrew discourse form.
