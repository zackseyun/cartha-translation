id: ZEP.1.18
reference: Zephaniah 1:18
source:
  edition: WLC
  text: גַּם כַּסְפָּ֨/ם גַּם זְהָבָ֜/ם לֹֽא יוּכַ֣ל לְ/הַצִּילָ֗/ם בְּ/יוֹם֙ עֶבְרַ֣ת
    יְהוָ֔ה וּ/בְ/אֵשׁ֙ קִנְאָת֔/וֹ תֵּאָכֵ֖ל כָּל הָ/אָ֑רֶץ כִּֽי כָלָ֤ה אַךְ נִבְהָלָה֙
    יַֽעֲשֶׂ֔ה אֵ֥ת כָּל יֹשְׁבֵ֖י הָ/אָֽרֶץ־־־־־־־׃ס
translation:
  text: Neither their silver nor their gold will be able to rescue them on the day
    of the LORD’s wrath, and in the fire of his jealousy all the earth will be consumed;
    for he will make a complete, indeed sudden, end of all the inhabitants of the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the land' / 'all the inhabitants of the land.' Hebrew אֶרֶץ can
      mean either 'land' or 'earth'; the broader sense is adopted here because of
      the verse’s sweeping judgment language.
    reason: alternative_reading
  - marker: b
    text: Or 'by the fire of his zeal.' The Hebrew noun can mean 'jealousy' or 'zeal';
      'jealousy' is retained in the main text to preserve the covenantal nuance.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'a complete, indeed sudden, end' reflects a difficult Hebrew
      expression. Alternatives include 'a full, terrifying end' or 'a complete end—yes,
      a dreadful one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם ... גַּם
  chosen: Neither ... nor
  alternatives:
  - also ... also
  - both ... and
  lexicon: HALOT
  rationale: The paired גַּם ... גַּם with following negation לֹא is idiomatically
    rendered in English as 'neither ... nor,' which best conveys the emphatic exclusion.
- source_word: כַּסְפָּם
  chosen: their silver
  alternatives:
  - their money
  lexicon: HALOT
  rationale: כֶּסֶף can mean 'silver' or 'money.' Here, paired with 'their gold,'
    the material sense is primary, emphasizing wealth/assets rather than currency
    in abstraction.
- source_word: זְהָבָם
  chosen: their gold
  lexicon: HALOT
  rationale: Straightforward material term, paired with silver to denote wealth incapable
    of deliverance.
- source_word: יוּכַל לְהַצִּילָם
  chosen: will be able to rescue them
  alternatives:
  - will be able to deliver them
  - can save them
  lexicon: HALOT
  rationale: The construction expresses inability. 'Rescue' is natural modern English
    and preserves the concrete sense of deliverance from impending judgment.
- source_word: בְּיוֹם עֶבְרַת יְהוָה
  chosen: on the day of the LORD’s wrath
  alternatives:
  - in the day of the LORD’s fury
  - on the day of the LORD’s overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath/fury. 'Wrath' fits prophetic judgment language
    well. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: וּבְאֵשׁ קִנְאָתוֹ
  chosen: and in the fire of his jealousy
  alternatives:
  - and by the fire of his zeal
  - and in the fire of his ardor
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal. In covenant-judgment contexts, 'jealousy'
    preserves the relational and theological force of divine exclusivity better than
    the more generalized 'zeal.'
- source_word: תֵּאָכֵל
  chosen: will be consumed
  alternatives:
  - will be devoured
  - will be eaten up
  lexicon: HALOT
  rationale: The Niphal gives a passive/resultative sense. 'Will be consumed' is idiomatic
    and fitting for fire imagery.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Because the phrase recurs at the end
    of the verse with 'all the inhabitants of the earth,' the broader universal sense
    is more coherent here, matching the sweeping scope of judgment in context.
- source_word: כִּי כָלָה
  chosen: for he will make a complete end
  alternatives:
  - for an end
  - for a full destruction
  lexicon: HALOT
  rationale: כָּלָה denotes completion, full end, annihilating finish. Rendering it
    verbally in English clarifies the clause and preserves the force of totality.
- source_word: אַךְ
  chosen: indeed
  alternatives:
  - surely
  - 'yes'
  - only
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative/intensifying particle rather than
    restrictive 'only.' 'Indeed' naturally conveys emphasis in modern English.
- source_word: נִבְהָלָה
  chosen: sudden
  alternatives:
  - terrifying
  - panic-stricken
  - hasty
  lexicon: HALOT
  rationale: The form is difficult, but in this collocation with כָלָה it is commonly
    understood adverbially/adjectivally to intensify the end as abrupt and dreadful.
    'Sudden' captures the likely force in idiomatic English without overinterpreting
    the morphology.
- source_word: יַעֲשֶׂה
  chosen: he will make
  alternatives:
  - he will do
  - he will bring about
  lexicon: HALOT
  rationale: A common verb whose object is the 'end'; 'make' is concise and natural
    in English.
- source_word: אֵת כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: of all the inhabitants of the earth
  alternatives:
  - against all who dwell in the earth
  - for all the inhabitants of the land
  lexicon: HALOT
  rationale: 'The direct-object marker with the following phrase yields the object
    of the action: the end concerns all the inhabitants. ''Inhabitants of the earth''
    matches the universal sense chosen for הָאָרֶץ and preserves the participial force
    of יֹשְׁבֵי as resident-dwellers.'
