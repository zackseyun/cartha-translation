theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH. This also aligns with the prophetic register and English Bible convention
    while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאָרֶץ in this verse
  chosen_reading: earth (universal scope)
  alternative_readings:
  - land (regional/Judah-focused scope)
  rationale: While אֶרֶץ can denote either 'land' or 'earth,' the repeated phrase
    'all the inhabitants of the earth' and the cosmic language of total consumption
    favor a universal rendering here. This preserves the text's rhetorical breadth
    without denying that Judah is the immediate historical focus of the prophecy.
- issue: Rendering קִנְאָה for God
  chosen_reading: jealousy
  alternative_readings:
  - zeal
  rationale: '''Jealousy'' better preserves the covenantal and exclusive-relational
    dimension of divine judgment language in the prophets. ''Zeal'' is possible but
    can sound less relational and more abstract in English.'
