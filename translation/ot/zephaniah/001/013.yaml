id: ZEP.1.13
reference: Zephaniah 1:13
source:
  edition: WLC
  text: וְ/הָיָ֤ה חֵילָ/ם֙ לִ/מְשִׁסָּ֔ה וּ/בָתֵּי/הֶ֖ם לִ/שְׁמָמָ֑ה וּ/בָנ֤וּ בָתִּים֙
    וְ/לֹ֣א יֵשֵׁ֔בוּ וְ/נָטְע֣וּ כְרָמִ֔ים וְ/לֹ֥א יִשְׁתּ֖וּ אֶת יֵינָֽ/ם־׃
translation:
  text: Their wealth will become plunder, and their houses a desolation; they will
    build houses but not live in them, and plant vineyards but not drink their wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their goods' or, less likely in this context, 'their strength/army'
      for 'their wealth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their houses a desolation,' a compact expression meaning their houses
      will become ruined and deserted.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their goods
  - their strength
  - their army
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, resources, or military force depending
    on context. In parallel with houses becoming desolation and with the theme of
    material judgment, 'their wealth' best fits the sense of possessions/resources
    subject to seizure.
- source_word: לִמְשִׁסָּה
  chosen: plunder
  alternatives:
  - spoil
  - booty
  lexicon: HALOT
  rationale: The noun denotes something taken by pillage or plundering. 'Plunder'
    is clear modern English and preserves the judgment context without archaic tone.
- source_word: וּבָתֵּיהֶם לִשְׁמָמָה
  chosen: and their houses a desolation
  alternatives:
  - and their houses for desolation
  - and their houses laid waste
  lexicon: HALOT
  rationale: 'The lamed marks result: their houses will end up as desolation. ''A
    desolation'' preserves the nominal force and the starkness of the Hebrew.'
- source_word: וּבָנוּ בָתִּים
  chosen: they will build houses
  alternatives:
  - they have built houses
  lexicon: HALOT
  rationale: Though the form is qatal with prefixed conjunction, in this prophetic
    sequence it functions futurally in context. English future best communicates the
    judgment oracle's forward-looking force.
- source_word: וְלֹא יֵשֵׁבוּ
  chosen: but not live in them
  alternatives:
  - but not inhabit them
  - but not dwell in them
  lexicon: HALOT
  rationale: ישב commonly means dwell/live/inhabit. 'Live in them' is the most natural
    modern English in this context; 'in them' is supplied from the house context for
    idiomatic completeness.
- source_word: וְנָטְעוּ כְרָמִים
  chosen: and plant vineyards
  alternatives:
  - and they will plant vineyards
  lexicon: HALOT
  rationale: A straightforward rendering of the agricultural image of settled prosperity,
    here denied by judgment.
- source_word: וְלֹא יִשְׁתּוּ אֶת יֵינָם
  chosen: but not drink their wine
  alternatives:
  - but not drink the wine from them
  - but not drink its wine
  lexicon: HALOT
  rationale: The suffix on 'their wine' most naturally refers to the vineyards/produce
    belonging to them. 'Drink their wine' is concise and idiomatic, preserving the
    irony that they will not enjoy what they cultivated.
