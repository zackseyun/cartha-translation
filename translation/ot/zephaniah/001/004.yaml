id: ZEP.1.4
reference: Zephaniah 1:4
source:
  edition: WLC
  text: וְ/נָטִ֤יתִי יָדִ/י֙ עַל יְהוּדָ֔ה וְ/עַ֖ל כָּל יוֹשְׁבֵ֣י יְרוּשָׁלִָ֑ם וְ/הִכְרַתִּ֞י
    מִן הַ/מָּק֤וֹם הַ/זֶּה֙ אֶת שְׁאָ֣ר הַ/בַּ֔עַל אֶת שֵׁ֥ם הַ/כְּמָרִ֖ים עִם הַ/כֹּהֲנִֽים־־־־־־׃
translation:
  text: And I will stretch out my hand against Judah and against all the inhabitants
    of Jerusalem, and I will cut off from this place the remnant of Baal, the name
    of the idolatrous priests along with the priests,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the memory of the idolatrous priests.' Hebrew 'the name of the idolatrous
      priests' is an idiom for removing even their remembrance.
    reason: lexical_alternative
  - marker: b
    text: '''Idolatrous priests'' renders Hebrew kemarim, a term for pagan or syncretistic
      priests, distinguished here from the ordinary ''priests.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְנָטִיתִי יָדִי
  chosen: I will stretch out my hand
  alternatives:
  - I have stretched out my hand
  - I will raise my hand
  lexicon: HALOT
  rationale: The idiom נָטָה יָד commonly expresses decisive action in judgment. Future
    English fits the prophetic context and parallels the following cohort of divine
    actions. 'Stretch out my hand' preserves the Hebrew image better than a more interpretive
    paraphrase.
- source_word: עַל יְהוּדָה וְעַל כָּל יוֹשְׁבֵי יְרוּשָׁלָם
  chosen: against Judah and against all the inhabitants of Jerusalem
  alternatives:
  - over Judah and over all who dwell in Jerusalem
  lexicon: HALOT
  rationale: עַל with this hostile gesture is adversative, so 'against' is the plain
    sense. 'Inhabitants' is a natural rendering of יוֹשְׁבֵי in this civic context.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: כרת in the Hiphil often means to cut off, especially in judgment contexts.
    'Cut off' preserves the covenantal/judicial force without over-paraphrasing.
- source_word: מִן הַמָּקוֹם הַזֶּה
  chosen: from this place
  alternatives:
  - from this מקום
  - from here
  lexicon: HALOT
  rationale: The phrase likely refers to Jerusalem/the land in immediate context.
    'From this place' keeps the deictic force of the Hebrew and avoids narrowing beyond
    the text.
- source_word: שְׁאָר הַבַּעַל
  chosen: the remnant of Baal
  alternatives:
  - what is left of Baal
  - the rest of Baal worship
  lexicon: HALOT
  rationale: שְׁאָר means remainder/remnant. The phrase likely refers to what remains
    of Baal's presence or worship in the land. 'The remnant of Baal' is formally close
    and leaves the object slightly compressed as in Hebrew.
- source_word: שֵׁם הַכְּמָרִים
  chosen: the name of the idolatrous priests
  alternatives:
  - the name of the Chemarim
  - the memory of the idolatrous priests
  lexicon: HALOT
  rationale: כְּמָרִים refers to pagan/idolatrous priests rather than ordinary Israelite
    priests. Rendering the semantic value is preferable to transliteration. 'The name
    of' reflects the Hebrew idiom for erasing memory/reputation, not merely killing
    persons.
- source_word: עִם הַכֹּהֲנִים
  chosen: along with the priests
  alternatives:
  - together with the priests
  lexicon: HALOT
  rationale: כֹּהֲנִים is the ordinary term for priests, distinguished here from כְּמָרִים.
    'Along with' naturally renders עִם while preserving the distinction between the
    two groups.
