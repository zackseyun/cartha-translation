theological_decisions:
- issue: Distinction between כְּמָרִים and כֹּהֲנִים
  chosen_reading: Render כְּמָרִים as 'idolatrous priests' and כֹּהֲנִים as 'priests'
    to preserve the contrast between pagan/syncretistic clergy and the ordinary priestly
    class.
  alternative_readings:
  - Render both simply as 'priests'
  - Transliterate כְּמָרִים as 'Chemarim'
  rationale: The verse intentionally distinguishes two classes. Flattening both to
    'priests' obscures the rhetoric of judgment; transliteration is less accessible
    and hides the semantic contrast. The chosen rendering preserves the likely denunciation
    of both overtly idolatrous and compromised priestly leadership.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Force of 'the name of'
  chosen_reading: Retain 'the name of' in the main text rather than paraphrasing to
    'memory of' or 'mention of'.
  alternative_readings:
  - the memory of the idolatrous priests
  - every mention of the idolatrous priests
  rationale: The Hebrew idiom concerns eradication so complete that even the name
    is removed. Keeping 'name' preserves the textual imagery and theological weight
    of total judgment while remaining intelligible in English.
  doctrine_reference: Translation philosophy §§1, 3, 5
