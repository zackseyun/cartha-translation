  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Representative sense of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral where the source carries representative force. Here אדם functions collectively, but 'man' best preserves the Hebrew diction and the solemn cadence of judgment.
