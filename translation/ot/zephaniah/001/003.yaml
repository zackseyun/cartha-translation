id: ZEP.1.3
reference: Zephaniah 1:3
source:
  edition: WLC
  text: אָסֵ֨ף אָדָ֜ם וּ/בְהֵמָ֗ה אָסֵ֤ף עוֹף הַ/שָּׁמַ֨יִם֙ וּ/דְגֵ֣י הַ/יָּ֔ם וְ/הַ/מַּכְשֵׁל֖וֹת אֶת הָ/רְשָׁעִ֑ים וְ/הִכְרַתִּ֣י אֶת הָ/אָדָ֗ם מֵ/עַ֛ל פְּנֵ֥י הָ/אֲדָמָ֖ה נְאֻם יְהוָֽה־־־־׃
translation:
  text: I will sweep away man and beast; I will sweep away the birds of the heavens and the fish of the sea, and the stumbling blocks with the wicked. And I will cut off man from the face of the ground,” declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind.' Hebrew 'man' (אָדָם) is used here in a collective sense for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the causes of stumbling' for 'the stumbling blocks.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from the face of the earth.' Hebrew 'ground' may intentionally echo earlier judgment language.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסֵף
  chosen: I will sweep away
  alternatives:
  - I will gather
  - I will remove
  - I will utterly consume
  lexicon: HALOT
  rationale: The Hiphil of אסף here is used in a judgment context for removal rather than neutral gathering. 'Sweep away' captures the forceful, comprehensive sense and fits the repeated cadence of the verse.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered according to context. Here it is paired first with 'beast' and later repeated with the article as a collective for humanity under judgment. 'Man' preserves the gender-accurate representative sense and echoes the source's diction.
- source_word: בְהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: In this cosmic judgment list, 'beast' is the most natural broad category in elevated English and matches the register of the surrounding creature terms.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the creation-order resonance and the Hebrew genitive. 'Heavens' is slightly more literal than 'sky' and suits prophetic style.
- source_word: דְגֵי הַיָּם
  chosen: the fish of the sea
  alternatives:
  - the fish of the waters
  lexicon: HALOT
  rationale: Standard, direct rendering of the construct phrase; it also preserves the triadic land-air-sea pattern.
- source_word: הַמַּכְשֵׁלוֹת
  chosen: the stumbling blocks
  alternatives:
  - the causes of stumbling
  - the ruins
  lexicon: HALOT
  rationale: The noun commonly denotes things that cause stumbling or offense. In this judgment context it likely refers to objects or occasions bound up with the wicked. 'Stumbling blocks' is the most transparent lexical equivalent, while the relation to 'the wicked' is left unforced.
- source_word: אֶת הָרְשָׁעִים
  chosen: along with the wicked
  alternatives:
  - with the wicked
  - even the wicked
  lexicon: HALOT
  rationale: The syntax after 'the stumbling blocks' is compressed. 'Along with the wicked' makes clear that both are included in the sweeping judgment without over-specifying whether the phrase is appositional or coordinate.
- source_word: וְהִכְרַתִּי
  chosen: And I will cut off
  alternatives:
  - And I will destroy
  - And I will wipe out
  lexicon: HALOT
  rationale: כרת in the Hiphil regularly carries the sense of cutting off in judgment. This preserves the idiomatic theological force better than a flatter 'destroy.'
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the ground
  alternatives:
  - from the face of the earth
  - from upon the land
  lexicon: HALOT
  rationale: אדמה is 'ground/soil' rather than the broader 'earth' in many contexts. 'From the face of the ground' preserves the Hebrew idiom and may intentionally echo flood/judgment language.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. Per doctrine, יהוה is rendered 'the LORD.' 'Declares' is idiomatic modern English while retaining prophetic solemnity.
