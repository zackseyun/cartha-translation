- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relationship between 'seek' and 'inquire'
  chosen_reading: Render בקש and דרש with distinct but related English verbs
  alternative_readings:
  - Render both as 'seek'
  - Render as 'seek' and 'consult'
  rationale: The Hebrew uses two related verbs to intensify covenant neglect. Distinguishing them in English preserves the rhetorical fullness without overstating a theological distinction between them.
