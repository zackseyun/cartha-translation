id: ZEP.1.6
reference: Zephaniah 1:6
source:
  edition: WLC
  text: וְ/אֶת הַ/נְּסוֹגִ֖ים מֵ/אַחֲרֵ֣י יְהוָ֑ה וַ/אֲשֶׁ֛ר לֹֽא בִקְשׁ֥וּ אֶת יְהוָ֖ה וְ/לֹ֥א דְרָשֻֽׁ/הוּ־־־׃
translation:
  text: and those who turn back from following Yahweh, and who do not seek Yahweh or inquire of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: alternative_reading
  - marker: b
    text: Or 'those who draw back from following the LORD.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be rendered 'and have not sought him,' using a broader sense of 'inquire/seek' for the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּסוֹגִים
  chosen: those who turn back
  alternatives:
  - those who draw back
  - the backsliders
  - those who have turned away
  lexicon: HALOT
  rationale: From נסוג/סוג, denoting retreating, turning back, or drawing back. 'Those who turn back' is natural modern English and preserves the image of apostasy without importing later ecclesiastical terminology like 'backsliders' into the main text.
- source_word: מֵאַחֲרֵי יְהוָה
  chosen: from following the LORD
  alternatives:
  - from after the LORD
  - from behind the LORD
  lexicon: HALOT
  rationale: The idiom 'from after YHWH' means ceasing to follow him. 'From following the LORD' renders the Hebrew idiom clearly in English while preserving covenantal discipleship imagery. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִקְשׁוּ
  chosen: seek
  alternatives:
  - look for
  - seek after
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' In prophetic covenantal context, 'seek the LORD' is a standard theological expression and should be preserved rather than flattened to 'look for.'
- source_word: דְרָשֻׁהוּ
  chosen: inquire of him
  alternatives:
  - consult him
  - seek him
  lexicon: HALOT
  rationale: דרש can overlap with 'seek,' but here, following בקש, a differentiated rendering avoids redundancy and reflects the nuance of consulting, resorting to, or inquiring of God. The pronominal suffix is retained with 'him,' referring back to the LORD.
- source_word: וַאֲשֶׁר לֹא... וְלֹא
  chosen: who do not... or
  alternatives:
  - and those who do not... and do not
  - even those who have not... nor
  lexicon: HALOT
  rationale: The relative clause continues the list of those under judgment. English idiom is smoother with 'who do not seek the LORD or inquire of him,' while preserving the two negated actions.
