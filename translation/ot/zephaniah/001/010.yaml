id: ZEP.1.10
reference: Zephaniah 1:10
source:
  edition: WLC
  text: וְ/הָיָה֩ בַ/יּ֨וֹם הַ/ה֜וּא נְאֻם יְהוָ֗ה ק֤וֹל צְעָקָה֙ מִ/שַּׁ֣עַר הַ/דָּגִ֔ים וִֽ/ילָלָ֖ה מִן הַ/מִּשְׁנֶ֑ה וְ/שֶׁ֥בֶר גָּד֖וֹל מֵ/הַ/גְּבָעֽוֹת־־׃
translation:
  text: And on that day, declares Yahweh, there will be the sound of a cry from the Fish Gate, and a wail from the Second Quarter, and a great crash from the hills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of an outcry.'
    reason: lexical_alternative
  - marker: b
    text: The 'Second Quarter' was likely a district of Jerusalem; Hebrew 'Mishneh.'
    reason: cultural_note
  - marker: c
    text: Or 'a great destruction' or 'a great breaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: there will be
  alternatives:
  - it will happen
  - it shall come to pass
  lexicon: HALOT
  rationale: The idiom introduces what will occur in the coming day of judgment. 'There will be' is natural English and fits the following nominal sequence ('sound... wail... crash') better than a wooden 'it shall be.'
- source_word: בַיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is idiomatic modern English while preserving the eschatological/judgment force.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A common prophetic formula. 'Declares the LORD' is clear, dignified, and idiomatic. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in standard English Bible style.
- source_word: קוֹל צְעָקָה
  chosen: the sound of a cry
  alternatives:
  - a cry
  - the sound of an outcry
  lexicon: HALOT
  rationale: The construct phrase literally denotes a 'sound/voice of crying out.' Including 'sound of' preserves the Hebrew expression rather than flattening it to simply 'a cry.' 'Cry' is preferred over 'outcry' for readability.
- source_word: מִשַּׁעַר הַדָּגִים
  chosen: from the Fish Gate
  alternatives:
  - from the gate of the fish
  lexicon: HALOT
  rationale: A known Jerusalem place name; capitalized as a proper location. 'Fish Gate' is the conventional and natural rendering.
- source_word: וִילָלָה
  chosen: a wail
  alternatives:
  - howling
  - lamentation
  lexicon: HALOT
  rationale: Denotes a cry of lament/distress. 'Wail' is vivid and natural in English, fitting the judgment context better than the more archaic 'howling' or more formal 'lamentation.'
- source_word: מִן הַמִּשְׁנֶה
  chosen: from the Second Quarter
  alternatives:
  - from the Mishneh
  - from the second district
  lexicon: HALOT
  rationale: Likely a specific district of Jerusalem rather than a generic 'second part.' Translating the sense as 'Second Quarter' communicates that it is a place name while remaining readable.
- source_word: וְשֶׁבֶר גָּדוֹל
  chosen: a great crash
  alternatives:
  - great destruction
  - a great breaking
  lexicon: HALOT
  rationale: שבר can denote breaking, fracture, or ruin. In this sequence of audible phenomena ('sound... wail...'), 'crash' best preserves the acoustic force implied by the context, while still suggesting destructive collapse.
- source_word: מֵהַגְּבָעוֹת
  chosen: from the hills
  alternatives:
  - from the heights
  lexicon: HALOT
  rationale: The noun normally means hills. 'From the hills' is the plain sense and likely refers to elevated parts of the city or surrounding terrain from which the crashing sound is heard.
