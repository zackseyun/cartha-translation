id: ZEP.1.17
reference: Zephaniah 1:17
source:
  edition: WLC
  text: וַ/הֲצֵרֹ֣תִי לָ/אָדָ֗ם וְ/הָֽלְכוּ֙ כַּֽ/עִוְרִ֔ים כִּ֥י לַֽ/יהוָ֖ה חָטָ֑אוּ וְ/שֻׁפַּ֤ךְ דָּמָ/ם֙ כֶּֽ/עָפָ֔ר וּ/לְחֻמָ֖/ם כַּ/גְּלָלִֽים׃
translation:
  text: And I will bring distress on mankind, and they will walk like the blind, because they have sinned against Yahweh; their blood will be poured out like dust, and their flesh like dung.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind.' The Hebrew 'man' is singular but collective in sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'their entrails' / 'their bowels,' reflecting a more specific understanding of the Hebrew term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲצֵרֹתִי
  chosen: I will bring distress
  alternatives:
  - I will afflict
  - I will cause anguish
  lexicon: HALOT
  rationale: From צרר in the causative, expressing the act of bringing distress or constriction upon people. 'Bring distress' is natural English and preserves the divine agency and judgment tone without over-paraphrase.
- source_word: לָאָדָם
  chosen: on man
  alternatives:
  - on humankind
  - on mankind
  lexicon: HALOT
  rationale: אָדָם here is collective/generic. Per doctrine, gender-accurate rendering is preferred where the source has representative force. 'Man' preserves the Hebrew form and generic sense; the broader sense can be noted in a footnote.
- source_word: וְהָלְכוּ
  chosen: they will walk
  alternatives:
  - they will go about
  lexicon: HALOT
  rationale: הלך is straightforwardly 'walk/go.' 'Walk' fits the simile that follows and preserves the concrete imagery.
- source_word: כַּעִוְרִים
  chosen: like the blind
  alternatives:
  - like blind men
  - like blind people
  lexicon: HALOT
  rationale: The phrase is comparative and likely collective. 'The blind' is idiomatic English and preserves the image of helpless disorientation under judgment.
- source_word: כִּי לַיהוָה חָטָאוּ
  chosen: because they have sinned against the LORD
  alternatives:
  - for they have sinned against the LORD
  lexicon: HALOT
  rationale: כִּי gives the reason for the judgment. חטא with ל marks offense against YHWH. 'Against the LORD' is the clearest English expression. YHWH is rendered 'the LORD' per doctrine.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered לפי doctrine default as 'the LORD,' following established reverential convention and the stated translation policy.
- source_word: וְשֻׁפַּךְ דָּמָם
  chosen: their blood will be poured out
  alternatives:
  - their blood will be spilled
  lexicon: HALOT
  rationale: שפך with דם is a standard violent-judgment expression. 'Poured out' is slightly more formal and preserves the passive/resultative sense of the Hebrew.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - like dirt
  lexicon: HALOT
  rationale: עפר commonly denotes dust/loose earth. 'Dust' is the more idiomatic and vivid comparison in English, especially in judgment imagery.
- source_word: וּלְחֻמָם
  chosen: their flesh
  alternatives:
  - their entrails
  - their bowels
  lexicon: HALOT
  rationale: The noun לחם/לחהם here is difficult and has been understood as flesh or soft tissue/offal. 'Their flesh' best fits the parallelism with 'their blood' and avoids archaic anatomical language in the main text; the more specific alternative is worth preserving in a footnote.
- source_word: כַּגְּלָלִים
  chosen: like dung
  alternatives:
  - like refuse
  - like excrement
  lexicon: HALOT
  rationale: גללים denotes dung/excrement. 'Dung' is direct, traditional, and readable without softening the force of the image.
