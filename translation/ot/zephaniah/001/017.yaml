  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic force of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: The Hebrew is singular collective and representative. Per the translation philosophy, gender-accurate renderings are preferred over flattening to gender-neutral language unless context requires otherwise. A footnote can preserve the broader collective sense.
