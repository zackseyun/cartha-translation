id: ZEP.1.2
reference: Zephaniah 1:2
source:
  edition: WLC
  text: אָסֹ֨ף אָסֵ֜ף כֹּ֗ל מֵ/עַ֛ל פְּנֵ֥י הָ/אֲדָמָ֖ה נְאֻם יְהוָֽה־׃
translation:
  text: I will utterly sweep away everything from the face of the earth, declares
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''I will completely remove everything from the face of the ground/land.''
      The Hebrew uses an emphatic verbal construction: literally, ''Gathering, I will
      gather away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסֹף אָסֵף
  chosen: I will utterly sweep away
  alternatives:
  - I will completely remove
  - I will surely gather up and take away
  - I will utterly consume
  lexicon: HALOT
  rationale: The construction combines an infinitive absolute with a finite verb of
    אסף for emphatic certainty/intensity. In this judgment context, the sense is not
    benign 'gather' but comprehensive removal. 'Utterly sweep away' captures both
    the emphatic force and the destructive context in idiomatic modern English.
- source_word: כֹּל
  chosen: everything
  alternatives:
  - all
  - all things
  lexicon: HALOT
  rationale: Here the term is absolute and comprehensive, referring to the totality
    of what follows in the judgment oracle. 'Everything' is natural English and preserves
    the scope.
- source_word: מֵעַל פְּנֵי
  chosen: from the face of
  alternatives:
  - from upon
  - off the face of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for removal from the surface/presence of
    the land/earth. 'From the face of' preserves the idiom while remaining understandable.
- source_word: הָאֲדָמָה
  chosen: the earth
  alternatives:
  - the ground
  - the land
  lexicon: HALOT
  rationale: Although אֲדָמָה can mean 'ground' or 'land,' the universal scope signaled
    by 'everything' in this opening judgment announcement favors 'earth' rather than
    a merely local 'land.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula marks solemn divine speech. 'Declares the LORD'
    is standard, clear modern English and preserves the authoritative force. 'the
    LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in the main text, following established reverential convention and the stated
    default.
