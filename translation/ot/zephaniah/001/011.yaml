id: ZEP.1.11
reference: Zephaniah 1:11
source:
  edition: WLC
  text: הֵילִ֖ילוּ יֹשְׁבֵ֣י הַ/מַּכְתֵּ֑שׁ כִּ֤י נִדְמָה֙ כָּל עַ֣ם כְּנַ֔עַן נִכְרְת֖וּ
    כָּל נְטִ֥ילֵי כָֽסֶף־־׃
translation:
  text: Wail, inhabitants of the Mortar, for all the merchant people are destroyed;
    all who weigh out silver are cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Maktesh, literally 'mortar'; likely the name of a market district
      in Jerusalem, perhaps so called because of its hollow shape or bustling trade.
    reason: alternative_reading
  - marker: b
    text: Or 'all the people of Canaan.' Here 'Canaan' is likely used in the sense
      of 'merchant(s),' a known Hebrew usage in commercial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, a cry of grief/disaster. 'Wail' is vivid
    and natural English, fitting prophetic judgment language.
- source_word: יֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those who dwell in
  - residents of
  lexicon: HALOT
  rationale: Construct participle of ישב used substantivally. 'Inhabitants of' is
    idiomatic and preserves the collective address.
- source_word: הַמַּכְתֵּשׁ
  chosen: the Mortar
  alternatives:
  - the mortar
  - Maktesh
  lexicon: HALOT
  rationale: Literally 'the mortar' (a hollow for pounding), likely a district of
    Jerusalem named for its basin-like shape or commercial activity. Capitalized 'the
    Mortar' treats it as a place-name while preserving the Hebrew sense. The transliterated
    alternative is worth preserving in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' is concise and natural in
    English prophetic style.
- source_word: נִדְמָה
  chosen: are destroyed
  alternatives:
  - is silenced
  - is brought to ruin
  - has perished
  lexicon: HALOT
  rationale: Nifal of דמה here conveys being undone/ruined in context of judgment
    on a commercial class. Although the form is singular, it governs a collective
    expression; English plural smooths the sense. 'Destroyed' best matches the parallel
    with 'are cut off' in the next clause.
- source_word: כָּל עַם כְּנַעַן
  chosen: all the merchant people
  alternatives:
  - all the people of Canaan
  - all the traders
  - all the merchant folk
  lexicon: HALOT
  rationale: '''Canaan'' can metonymically mean merchants/traders in prophetic and
    poetic usage. In this context of commerce and silver, the mercantile sense is
    most likely. ''Merchant people'' preserves the collective noun עַם while making
    the idiom clear.'
- source_word: נִכְרְתוּ
  chosen: are cut off
  alternatives:
  - are destroyed
  - are wiped out
  lexicon: HALOT
  rationale: Nifal of כרת commonly means 'be cut off.' This is a standard judgment
    expression and should be preserved where natural.
- source_word: כָּל נְטִילֵי כָסֶף
  chosen: all who weigh out silver
  alternatives:
  - all the silver-weighers
  - all who carry silver
  - all who load silver
  lexicon: HALOT
  rationale: The noun likely refers to those handling/weighing silver in trade, not
    merely carrying it. In commercial context, 'weigh out silver' best captures the
    likely sense of money-dealers or traders.
