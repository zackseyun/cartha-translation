theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / GOD in the compound title 'the Lord GOD'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD.'
    In the sequence אֲדֹנָי יְהוִה, standard English convention uses 'the Lord GOD'
    to represent the underlying Hebrew without producing the awkward 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the sacrificial imagery
  chosen_reading: Retain the metaphor of the LORD preparing a sacrifice and consecrating
    invited ones without identifying them in the main text
  alternative_readings:
  - Explicitly interpret the sacrifice as Judah's slaughter
  - Explicitly identify the invited ones as foreign nations summoned to judgment
  rationale: The Hebrew presents the imagery tersely and powerfully. To preserve theological
    tension and avoid importing an interpretive resolution not stated in the verse
    itself, the main text keeps the sacrificial metaphor intact. Context may suggest
    the invited ones are agents of judgment, but that is better preserved in a footnote
    than made explicit in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
