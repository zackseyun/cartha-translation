id: ZEP.1.7
reference: Zephaniah 1:7
source:
  edition: WLC
  text: הַ֕ס מִ/פְּנֵ֖י אֲדֹנָ֣/י יְהוִ֑ה כִּ֤י קָרוֹב֙ י֣וֹם יְהוָ֔ה כִּֽי הֵכִ֧ין
    יְהוָ֛ה זֶ֖בַח הִקְדִּ֥ישׁ קְרֻאָֽי/ו־׃
translation:
  text: Be silent before the Lord GOD, for the day of the LORD is near; for the LORD
    has prepared a sacrifice; he has consecrated his invited ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his guests,' 'his summoned ones,' or 'his called ones.' In context,
      this likely refers to those whom the LORD has summoned for the sacrificial judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַס
  chosen: Be silent
  alternatives:
  - Hush
  - Be still
  - Silence!
  lexicon: HALOT
  rationale: An interjection/imperative calling for silence. 'Be silent' is natural
    modern English and preserves the solemn, urgent force better than the more abrupt
    'Hush' or the potentially misleading 'Be still.'
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - in the presence of
  lexicon: HALOT
  rationale: With a command to silence and a divine addressee, the phrase idiomatically
    means 'before' or 'in the presence of.' 'Before' is concise and idiomatic in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title combines Adonai with the divine name. Following the
    doctrine's default for יְהוָה, the tetragrammaton is rendered 'the LORD'; in this
    fixed English convention after 'Lord,' 'GOD' signals the underlying YHWH and avoids
    'Lord LORD.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the command to be silent. 'For' fits
    the explanatory flow in both clauses.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close at hand
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective expressing imminence. 'Is near' is straightforward
    and preserves prophetic urgency.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: This is the established prophetic expression for divine judgment. 'The
    day of the LORD' is both accurate and theologically recognizable.
- source_word: הֵכִין
  chosen: has prepared
  alternatives:
  - has made ready
  - has appointed
  lexicon: HALOT
  rationale: The perfect verb presents the action as accomplished/certain. 'Has prepared'
    fits the sacrificial imagery directly.
- source_word: זֶבַח
  chosen: a sacrifice
  alternatives:
  - a sacrificial feast
  - a slaughter offering
  lexicon: HALOT
  rationale: The noun ordinarily means 'sacrifice,' though in context it carries grim
    judgment imagery. The basic term should remain in the main text, allowing the
    metaphor to stand without over-interpretive expansion.
- source_word: הִקְדִּישׁ
  chosen: has consecrated
  alternatives:
  - has sanctified
  - has set apart
  lexicon: HALOT
  rationale: The verb means to make holy/set apart. 'Has consecrated' preserves the
    cultic register appropriate to the sacrifice imagery.
- source_word: קְרֻאָיו
  chosen: his invited ones
  alternatives:
  - his guests
  - his summoned ones
  - his called ones
  lexicon: HALOT
  rationale: Passive participial form from 'call/invite.' In the sacrificial-banquet
    metaphor, 'invited ones' best preserves the imagery without prematurely specifying
    whether they are guests, attackers, or victims. The context suggests those summoned
    by God for the sacrificial event.
