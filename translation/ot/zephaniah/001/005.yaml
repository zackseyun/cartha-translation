theological_decisions:
- issue: Identity of מַלְכָּם
  chosen_reading: Milcom, the foreign deity, in the main text
  alternative_readings:
  - their king
  - Molech
  rationale: The verse condemns syncretistic oath-taking to the LORD and another object
    of allegiance. Reading the term as the deity Milcom best explains the parallelism
    and prophetic denunciation of idolatry. Because the Hebrew form can also be understood
    as 'their king,' and some connect it with Molech, those alternatives are preserved
    in a footnote rather than resolved silently.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
