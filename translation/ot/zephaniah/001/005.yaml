id: ZEP.1.5
reference: Zephaniah 1:5
source:
  edition: WLC
  text: וְ/אֶת הַ/מִּשְׁתַּחֲוִ֥ים עַל הַ/גַּגּ֖וֹת לִ/צְבָ֣א הַ/שָּׁמָ֑יִם וְ/אֶת
    הַ/מִּֽשְׁתַּחֲוִים֙ הַ/נִּשְׁבָּעִ֣ים לַֽ/יהוָ֔ה וְ/הַ/נִּשְׁבָּעִ֖ים בְּ/מַלְכָּֽ/ם־־־׃
translation:
  text: those who bow down on the rooftops to the host of the heavens, and those who
    bow down, who swear by the LORD and swear by Milcom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their king'; some understand the name here as 'Molech.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּשְׁתַּחֲוִים
  chosen: those who bow down
  alternatives:
  - those who worship
  - those who prostrate themselves
  lexicon: HALOT
  rationale: The participle from שׁחה denotes the act of bowing/prostration in worship.
    'Bow down' preserves the physical act while allowing the worship sense to remain
    clear in context.
- source_word: עַל הַגַּגּוֹת
  chosen: on the rooftops
  alternatives:
  - upon the roofs
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Rooftops' is natural modern English
    and preserves the cultural setting of rooftop worship.
- source_word: לִצְבָא הַשָּׁמַיִם
  chosen: to the host of the heavens
  alternatives:
  - to the host of heaven
  - to the heavenly host
  - to the stars
  lexicon: HALOT
  rationale: צָבָא הַשָּׁמַיִם refers to the celestial array worshiped as astral powers.
    'Host of the heavens' stays close to the Hebrew plural while remaining intelligible.
    'Heavenly host' could suggest angels to modern readers, and 'stars' is too narrow.
- source_word: הַנִּשְׁבָּעִים לַיהוָה
  chosen: who swear by the LORD
  alternatives:
  - who swear to the LORD
  - who take oaths to the LORD
  lexicon: HALOT
  rationale: With נשׁבע plus ל, the sense is oath-taking invoking allegiance to or
    by YHWH. In English, 'swear by the LORD' is idiomatic and matches the parallel
    with the following phrase.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: בְּמַלְכָּם
  chosen: by Milcom
  alternatives:
  - by their king
  - by Molech
  lexicon: HALOT
  rationale: The consonantal form most naturally points to the Ammonite deity Milcom
    in this prophetic polemic against syncretism. The pronominal ending in the written
    form has generated alternatives, but the proper-name reading best fits context
    and ancient versions/tradition.
