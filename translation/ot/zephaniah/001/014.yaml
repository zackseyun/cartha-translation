theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of גִּבּוֹר in the final clause
  chosen_reading: the warrior cries out bitterly
  alternative_readings:
  - the mighty man cries out bitterly
  - the warrior cries out there bitterly
  rationale: The clause is terse and somewhat abrupt. Rendering גִּבּוֹר as 'warrior' preserves the image of even the strong collapsing in terror on the day of judgment, without importing a broader theological claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
