id: ZEP.1.14
reference: Zephaniah 1:14
source:
  edition: WLC
  text: קָר֤וֹב יוֹם יְהוָה֙ הַ/גָּד֔וֹל קָר֖וֹב וּ/מַהֵ֣ר מְאֹ֑ד ק֚וֹל י֣וֹם יְהוָ֔ה מַ֥ר צֹרֵ֖חַ שָׁ֥ם גִּבּֽוֹר־׃
translation:
  text: The great day of Yahweh is near—near and very quickly coming. The sound of the day of Yahweh! There the warrior cries out bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The voice of the day of the LORD'; Hebrew qol can mean 'sound,' 'voice,' or 'noise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty man cries out bitterly there.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective expressing imminence. 'Is near' is natural English and preserves the repeated emphasis in the verse.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: Standard prophetic expression for divine judgment. 'The day of the LORD' preserves the established biblical idiom and the genitival relation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - great and terrible
  - mighty
  lexicon: HALOT
  rationale: The adjective itself means 'great'; the text does not add 'terrible' here, so the translation should not import that interpretive expansion from other passages.
- source_word: וּמַהֵר מְאֹד
  chosen: and coming very quickly
  alternatives:
  - and hastening greatly
  - and very swift
  lexicon: HALOT
  rationale: The adjective/adverbial expression intensifies the nearness with speed. 'Coming very quickly' makes the temporal force clear in idiomatic English while staying close to the Hebrew sense.
- source_word: קוֹל
  chosen: The sound of
  alternatives:
  - The voice of
  - The noise of
  lexicon: HALOT
  rationale: קוֹל can mean sound, voice, or noise. Here it introduces the auditory terror associated with the day; 'sound of' is broad and fits the context without over-specifying a speaker.
- source_word: מַר
  chosen: bitterly
  alternatives:
  - bitter
  - in bitterness
  lexicon: HALOT
  rationale: Used adverbially with the participle 'cries out.' 'Bitterly' captures the emotional force in natural English.
- source_word: צֹרֵחַ
  chosen: cries out
  alternatives:
  - shouts
  - screams
  lexicon: HALOT
  rationale: The participle denotes a loud cry. 'Cries out' preserves intensity without sounding overly colloquial or sensationalized.
- source_word: שָׁם
  chosen: there
  alternatives:
  - then
  - in that place
  lexicon: HALOT
  rationale: The adverb most naturally means 'there.' In context it points to the scene of the day's terror rather than merely functioning temporally.
- source_word: גִּבּוֹר
  chosen: the warrior
  alternatives:
  - the mighty man
  - the hero
  lexicon: HALOT
  rationale: The term denotes a strong fighting man or champion. 'Warrior' is clear modern English and fits the judgment context better than the less transparent 'mighty man.'
