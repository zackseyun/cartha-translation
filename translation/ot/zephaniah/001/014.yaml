theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per doctrine, the default
    rendering is 'the LORD,' not a transliteration, unless a special contextual reason
    requires otherwise; none does here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of גִּבּוֹר in the final clause
  chosen_reading: the warrior cries out bitterly
  alternative_readings:
  - the mighty man cries out bitterly
  - the warrior cries out there bitterly
  rationale: The clause is terse and somewhat abrupt. Rendering גִּבּוֹר as 'warrior'
    preserves the image of even the strong collapsing in terror on the day of judgment,
    without importing a broader theological claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
