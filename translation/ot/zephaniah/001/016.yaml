id: ZEP.1.16
reference: Zephaniah 1:16
source:
  edition: WLC
  text: י֥וֹם שׁוֹפָ֖ר וּ/תְרוּעָ֑ה עַ֚ל הֶ/עָרִ֣ים הַ/בְּצֻר֔וֹת וְ/עַ֖ל הַ/פִּנּ֥וֹת
    הַ/גְּבֹהֽוֹת׃
translation:
  text: a day of trumpet and battle cry against the fortified cities and against the
    high corner towers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a day of trumpet and alarm" or "a day of trumpet and shouting." The
      Hebrew term translated "battle cry" can denote a loud shout, alarm signal, or
      war cry; the military sense is favored by the context of attack on fortified
      cities.
    reason: lexical_alternative
  - marker: b
    text: Literally "the high corners." This likely refers to elevated corner fortifications
      or corner towers of city walls.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹם
  chosen: a day of
  alternatives:
  - day of
  lexicon: HALOT
  rationale: Continues the series of appositional descriptions of the day of the LORD
    in the surrounding context. The indefinite article makes natural English while
    preserving the Hebrew construct-like listing.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  - shofar
  lexicon: HALOT
  rationale: Refers to the horn used for alarm or signal. 'Trumpet' is standard, readable
    English; 'ram's horn' is more specific but less idiomatic here, and 'shofar' would
    be unnecessary transliteration.
- source_word: תְּרוּעָה
  chosen: battle cry
  alternatives:
  - shout
  - alarm
  - war cry
  lexicon: HALOT
  rationale: In military/judgment context with 'trumpet' and attacks on fortified
    cities, the sense is not generic rejoicing but an alarming martial outcry. 'Battle
    cry' best captures the force in context.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With hostile military imagery, English 'against' conveys the adversative
    force more clearly than the more literal but less natural 'upon'.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: Standard rendering of עִיר. In context of siege and defense works, 'cities'
    fits best.
- source_word: הַבְּצֻרוֹת
  chosen: fortified
  alternatives:
  - fortress-like
  - walled
  lexicon: HALOT
  rationale: Adjective describing cities made secure by defenses. 'Fortified' is the
    most direct and idiomatic rendering.
- source_word: הַפִּנּוֹת
  chosen: corner towers
  alternatives:
  - corners
  - battlements
  - corner fortifications
  lexicon: HALOT
  rationale: Literally 'corners,' but in siege/fortification context it likely refers
    metonymically to prominent defensive corners or corner towers of city walls. Rendering
    the implied architectural sense makes the line intelligible in English.
- source_word: הַגְּבֹהוֹת
  chosen: high
  alternatives:
  - lofty
  - elevated
  lexicon: HALOT
  rationale: Simple adjective modifying the defensive structures. 'High' is natural
    and sufficient.
