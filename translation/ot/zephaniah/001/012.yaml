theological_decisions:
- issue: Rendering the wine-settling metaphor for complacent sinners
  chosen_reading: Preserve the metaphor explicitly as 'grown thick on their dregs' rather than replacing it with an interpretive abstraction like 'complacent.'
  alternative_readings:
  - settled on their lees
  - complacent in their ease
  rationale: The Hebrew uses vivid wine imagery to depict moral-spiritual stagnation. Preserving the metaphor maintains prophetic force and avoids paraphrase beyond what the source warrants, while 'dregs' keeps the image accessible in modern English.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern English, not archaic or academic.'
- issue: Meaning of the sinners' claim about the LORD
  chosen_reading: Render as denial that the LORD acts either beneficially or harmfully.
  alternative_readings:
  - denial that the LORD rewards or judges
  - denial that the LORD does either good or evil in an absolute moral sense
  rationale: In context of judgment, the phrase concerns perceived divine inactivity, not a metaphysical statement about God's moral character. The translation therefore preserves the practical sense of indifference without suggesting that Scripture attributes moral evil to God.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
