id: ZEP.1.12
reference: Zephaniah 1:12
source:
  edition: WLC
  text: וְ/הָיָה֙ בָּ/עֵ֣ת הַ/הִ֔יא אֲחַפֵּ֥שׂ אֶת יְרוּשָׁלִַ֖ם בַּ/נֵּר֑וֹת וּ/פָקַדְתִּ֣י עַל הָ/אֲנָשִׁ֗ים הַ/קֹּֽפְאִים֙ עַל שִׁמְרֵי/הֶ֔ם הָ/אֹֽמְרִים֙ בִּ/לְבָבָ֔/ם לֹֽא יֵיטִ֥יב יְהוָ֖ה וְ/לֹ֥א יָרֵֽעַ־־־־׃
translation:
  text: 'And it will happen at that time: I will search Jerusalem with lamps, and I will punish the men who are settled on their dregs, who say in their hearts, ''Yahweh will not do good, nor will he do harm.'''
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'who are settled on their lees.' The Hebrew uses wine imagery for people left undisturbed and spiritually complacent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future event formula. 'It will happen' is natural modern English while preserving the prophetic temporal marker.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - on that day
  lexicon: HALOT
  rationale: Temporal phrase rendered straightforwardly. 'On that day' would import the more common ביום ההוא formula, but the Hebrew here is specifically 'at that time.'
- source_word: אֲחַפֵּשׂ
  chosen: I will search
  alternatives:
  - I will examine
  - I will investigate
  lexicon: HALOT
  rationale: The verb conveys careful searching. 'Search' best preserves the concrete imagery and divine scrutiny.
- source_word: בַּנֵּרוֹת
  chosen: with lamps
  alternatives:
  - with lanterns
  - by lamplight
  lexicon: HALOT
  rationale: Concrete instrumental phrase. 'Lamps' is the most direct rendering for נרות and preserves the image of thorough searching.
- source_word: וּפָקַדְתִּי עַל
  chosen: and I will punish
  alternatives:
  - and I will attend to
  - and I will visit judgment on
  lexicon: HALOT
  rationale: פקד with על in judgment contexts commonly denotes punitive visitation. 'Punish' makes the judicial force clear in idiomatic English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the menfolk
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine plural noun, in keeping with the stated philosophy. The referent is a class of persons in Jerusalem, but the Hebrew form is specifically masculine.
- source_word: הַקֹּפְאִים
  chosen: who have grown thick
  alternatives:
  - who are congealed
  - who are settled
  lexicon: HALOT
  rationale: The participle literally evokes thickening or congealing. 'Have grown thick' preserves the metaphor better than the traditional but more interpretive 'settled.'
- source_word: עַל שִׁמְרֵיהֶם
  chosen: on their dregs
  alternatives:
  - on their lees
  - in their sediment
  lexicon: HALOT
  rationale: Wine imagery is in view. 'Dregs' is more accessible modern English than 'lees' while preserving the metaphor of undisturbed complacency.
- source_word: הָאֹמְרִים בִּלְבָבָם
  chosen: who say in their hearts
  alternatives:
  - who say to themselves
  - who think in their hearts
  lexicon: HALOT
  rationale: A standard idiom for inward conviction or self-talk. The plural 'hearts' matches the Hebrew suffix.
- source_word: לֹא יֵיטִיב יְהוָה וְלֹא יָרֵעַ
  chosen: The LORD will not do good, nor will he do harm
  alternatives:
  - The LORD will do neither good nor evil
  - The LORD does nothing, either good or bad
  lexicon: HALOT
  rationale: The statement expresses practical atheism or divine indifference. 'Do good ... do harm' follows the Hebrew verbs closely without importing a broader philosophical claim. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal default for the divine name.
