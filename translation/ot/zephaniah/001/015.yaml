theological_decisions:
- issue: Nature of the 'day' in prophetic judgment language
  chosen_reading: Retain the repeated 'day of ...' structure as a description of the
    day of the LORD's judgment without specifying a single historical or exclusively
    eschatological referent.
  alternative_readings:
  - Read as exclusively historical judgment on Judah
  - Read as exclusively final eschatological judgment
  rationale: The Hebrew piles up descriptors poetically and does not itself resolve
    whether the referent is proximate, typological, or final. Preserving the imagery
    without narrowing the scope best maintains the text's theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
