id: ZEP.1.15
reference: Zephaniah 1:15
source:
  edition: WLC
  text: י֥וֹם עֶבְרָ֖ה הַ/יּ֣וֹם הַ/ה֑וּא י֧וֹם צָרָ֣ה וּ/מְצוּקָ֗ה י֤וֹם שֹׁאָה֙
    וּ/מְשׁוֹאָ֔ה י֥וֹם חֹ֨שֶׁךְ֙ וַ/אֲפֵלָ֔ה י֥וֹם עָנָ֖ן וַ/עֲרָפֶֽל׃
translation:
  text: That day is a day of wrath, a day of distress and anguish, a day of ruin and
    devastation, a day of darkness and gloom, a day of clouds and thick darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a day of fury' for 'a day of wrath.'
    reason: lexical_alternative
  - marker: b
    text: '''Ruin and devastation'' may also be rendered ''desolation and destruction.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a day of cloud and thick darkness'; the Hebrew uses singular nouns in
      a poetic sequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֥וֹם עֶבְרָ֖ה
  chosen: a day of wrath
  alternatives:
  - a day of fury
  - a day of indignation
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing anger or wrath. 'Wrath' is the most natural
    and weighty English equivalent in prophetic judgment context, preserving the force
    without paraphrase.
- source_word: הַ/יּ֣וֹם הַ/ה֑וּא
  chosen: That day
  alternatives:
  - the day, that one
  - that particular day
  lexicon: HALOT
  rationale: The demonstrative phrase points emphatically to the specific day already
    in view, best rendered idiomatically as 'That day' in English.
- source_word: צָרָ֣ה
  chosen: distress
  alternatives:
  - trouble
  - affliction
  lexicon: HALOT
  rationale: צָרָה often denotes distress or trouble under pressure. 'Distress' fits
    the solemn prophetic register and pairs well with the following term.
- source_word: וּ/מְצוּקָ֗ה
  chosen: anguish
  alternatives:
  - constraint
  - straits
  - hardship
  lexicon: HALOT
  rationale: מְצוּקָה conveys tightness, pressure, or severe adversity. 'Anguish'
    communicates the experiential intensity in idiomatic English while preserving
    the parallelism with 'distress'.
- source_word: שֹׁאָה֙
  chosen: ruin
  alternatives:
  - desolation
  - crash
  - waste
  lexicon: HALOT
  rationale: שֹׁאָה refers to destructive ruin or devastation. 'Ruin' is concise and
    natural in the poetic sequence.
- source_word: וּ/מְשׁוֹאָ֔ה
  chosen: devastation
  alternatives:
  - desolation
  - waste
  lexicon: HALOT
  rationale: מְשׁוֹאָה is closely related to שֹׁאָה and intensifies the picture of
    catastrophic destruction. 'Devastation' preserves the near-synonymous poetic piling
    up rather than collapsing the pair into one term.
- source_word: חֹ֨שֶׁךְ֙
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: חֹשֶׁךְ straightforwardly means 'darkness' and should be rendered literally
    here.
- source_word: וַ/אֲפֵלָ֔ה
  chosen: gloom
  alternatives:
  - deep darkness
  - blackness
  lexicon: HALOT
  rationale: אֲפֵלָה denotes deep gloom or obscurity. 'Gloom' provides a distinct
    but parallel term alongside 'darkness' and preserves the poetic intensification.
- source_word: עָנָ֖ן
  chosen: clouds
  alternatives:
  - cloud
  lexicon: HALOT
  rationale: Though singular in Hebrew, English idiom in this collocation commonly
    uses the mass/plural sense 'clouds,' especially in a weather-theophany context.
    This preserves natural English without losing meaning.
- source_word: וַ/עֲרָפֶֽל
  chosen: thick darkness
  alternatives:
  - dark cloud
  - gloom
  lexicon: HALOT
  rationale: עֲרָפֶל often denotes dense darkness or dark storm-cloud, especially
    in theophanic contexts. 'Thick darkness' is a standard, source-sensitive rendering
    that preserves the climactic weight of the line.
