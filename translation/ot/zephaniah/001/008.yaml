id: ZEP.1.8
reference: Zephaniah 1:8
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/יוֹם֙ זֶ֣בַח יְהוָ֔ה וּ/פָקַדְתִּ֥י עַל הַ/שָּׂרִ֖ים וְ/עַל
    בְּנֵ֣י הַ/מֶּ֑לֶךְ וְ/עַ֥ל כָּל הַ/לֹּבְשִׁ֖ים מַלְבּ֥וּשׁ נָכְרִֽי־־־׃
translation:
  text: And on the day of the LORD’s sacrifice, I will punish the officials, the king’s
    sons, and all who wear foreign clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrifice of the LORD'; the phrase may also evoke a sacrificial
      feast prepared by the LORD in judgment (cf. Zeph 1:7).
    reason: lexical_alternative
  - marker: b
    text: '''Officials'' may also be rendered ''princes'' or ''rulers.'''
    reason: lexical_alternative
  - marker: c
    text: That is, garments associated with foreign peoples; the expression may imply
      adoption of foreign customs or loyalties, not merely non-native fabric.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it shall happen
  - And it will be
  lexicon: HALOT
  rationale: The clause introduces a future event formula. In English, the existential
    'it shall happen' is often unnecessarily wooden here, so the sense is carried
    forward into the temporal phrase 'on the day...' while preserving the future setting.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  - at the time of
  lexicon: HALOT
  rationale: A standard temporal construction; 'on the day' is natural English and
    preserves the prophetic time marker.
- source_word: זֶבַח יְהוָה
  chosen: the LORD’s sacrifice
  alternatives:
  - the sacrifice of the LORD
  - the LORD’s sacrificial feast
  lexicon: HALOT
  rationale: Construct chain with YHWH. 'The LORD’s sacrifice' is the most direct
    rendering. In context it refers to the judgment scene introduced in the previous
    verse, where the LORD has prepared a sacrifice. 'Sacrificial feast' is interpretive
    and therefore left as an alternative only.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: וּפָקַדְתִּי עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  - I will call to account
  lexicon: HALOT
  rationale: פקד with עַל in judgment contexts commonly carries the sense of punitive
    visitation. 'I will punish' communicates the judicial force clearly in modern
    English without overexpansion.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the rulers
  - the leaders
  lexicon: HALOT
  rationale: שׂרים denotes high-ranking leaders or officials. 'Officials' fits the
    governmental context and avoids the potentially misleading hereditary nuance of
    'princes' in English, especially since 'the king’s sons' are mentioned separately.
- source_word: בְּנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the royal sons
  - the king’s children
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Sons' preserves the masculine and
    specific familial reference; 'children' would be less precise.
- source_word: כָּל הַלֹּבְשִׁים
  chosen: all who wear
  alternatives:
  - everyone wearing
  - all those clothed in
  lexicon: HALOT
  rationale: The participial phrase is naturally rendered as a relative clause in
    English.
- source_word: מַלְבּוּשׁ נָכְרִי
  chosen: foreign clothing
  alternatives:
  - foreign garments
  - alien attire
  - strange apparel
  lexicon: HALOT
  rationale: The phrase denotes clothing associated with foreigners. 'Foreign clothing'
    is clear, contemporary, and sufficiently literal. 'Alien attire' and 'strange
    apparel' are archaic or potentially misleading.
