theological_decisions:
- issue: Possible identification of חִזְקִיָּה with King Hezekiah
  chosen_reading: Retain the name simply as 'Hezekiah' without adding 'King' or otherwise
    identifying him in the main text.
  alternative_readings:
  - Interpret the ancestor as King Hezekiah and signal royal descent explicitly in
    translation or note
  rationale: The genealogy may intentionally trace Zephaniah to the well-known Hezekiah,
    but the Hebrew text itself does not explicitly title him as king. To avoid importing
    a historical conclusion the verse does not state, the translation preserves the
    bare name. The possibility is worth preserving in a footnote as a historical note,
    not as main-text interpretation.
  doctrine_reference: Do not import doctrinal or interpretive claims the text does
    not make; original-language primacy over translation tradition.
