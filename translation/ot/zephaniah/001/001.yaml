id: ZEP.1.1
reference: Zephaniah 1:1
source:
  edition: WLC
  text: דְּבַר יְהוָ֣ה אֲשֶׁ֣ר הָיָ֗ה אֶל צְפַנְיָה֙ בֶּן כּוּשִׁ֣י בֶן גְּדַלְיָ֔ה
    בֶּן אֲמַרְיָ֖ה בֶּן חִזְקִיָּ֑ה בִּ/ימֵ֛י יֹאשִׁיָּ֥הוּ בֶן אָמ֖וֹן מֶ֥לֶךְ יְהוּדָֽה־׀־־־־־־׃
translation:
  text: 'The word of the LORD that came to Zephaniah son of Cushi, son of Gedaliah,
    son of Amariah, son of Hezekiah, in the days of Josiah son of Amon, king of Judah:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hezekiah may refer to King Hezekiah, which would make Zephaniah of royal
      descent, but the text itself does not explicitly identify him as the king.
    reason: cross_reference
  - marker: b
    text: Cushi can also be understood as 'Cushite,' but here it is rendered as a
      personal name within the genealogy.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  chosen: word
  alternatives:
  - message
  lexicon: HALOT
  rationale: Construct with יְהוָה in the standard prophetic superscription formula
    דְּבַר־יְהוָה, best rendered 'the word of the LORD.' 'Message' is possible in
    English, but 'word' preserves the formulaic prophetic register without becoming
    archaic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliterating. This also matches the conventional English representation
    of the covenant name in prophetic literature.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - which came to
  lexicon: HALOT
  rationale: The idiom 'the word of the LORD that came to X' is standard in prophetic
    headings. Rendering the clause idiomatically as 'that came to' communicates the
    Hebrew construction naturally in English while preserving the prophetic formula.
- source_word: צְפַנְיָה
  chosen: Zephaniah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical marker is formally singular and naturally rendered
    'son of.' While Hebrew genealogies can sometimes telescope generations, the text
    itself presents a direct lineage formula, so 'son of' should be retained.
- source_word: כּוּשִׁי
  chosen: Cushi
  alternatives:
  - Cushite
  lexicon: HALOT
  rationale: Here the term functions as a proper name within a genealogy, not necessarily
    as an ethnic descriptor. 'Cushi' preserves the onomastic function better than
    'Cushite,' which could misleadingly suggest ethnicity in the main text.
- source_word: גְּדַלְיָה
  chosen: Gedaliah
  rationale: Standard transliteration of the personal name.
- source_word: אֲמַרְיָה
  chosen: Amariah
  rationale: Standard transliteration of the personal name.
- source_word: חִזְקִיָּה
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  - Hizkijah
  rationale: Standard English form of the personal name. This may allude to King Hezekiah,
    but the text itself gives only the name, so the standard transliteration is appropriate
    without interpretive expansion.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: HALOT
  rationale: The Hebrew temporal expression literally means 'in the days of.' Although
    'during the reign of' would fit the royal context, the more literal phrase preserves
    the source wording and remains natural English.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  rationale: Standard English transliteration of the king's name.
- source_word: אָמֹון
  chosen: Amon
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional royal title identifying Josiah. English idiom does not require
    the article here, and 'king of Judah' is the standard rendering.
