id: ZEP.2.10
reference: Zephaniah 2:10
source:
  edition: WLC
  text: זֹ֥את לָ/הֶ֖ם תַּ֣חַת גְּאוֹנָ֑/ם כִּ֤י חֵֽרְפוּ֙ וַ/יַּגְדִּ֔לוּ עַל עַ֖ם
    יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: This will be their lot in return for their pride, because they taunted and
    magnified themselves against the people of the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the announced judgment;
    English 'This' naturally introduces the consequence.
- source_word: לָהֶם
  chosen: will be their
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: 'The preposition with pronoun is idiomatically rendered in English with
    an implied copular/result sense: ''this will be their...'' rather than the wooden
    ''this to them.'''
- source_word: תַּחַת
  chosen: in return for
  alternatives:
  - instead of
  - because of
  - as recompense for
  lexicon: HALOT
  rationale: Here תַּחַת marks recompense or exchange. 'In return for' communicates
    punitive recompense in clear modern English.
- source_word: גְּאוֹנָם
  chosen: their pride
  alternatives:
  - their arrogance
  - their exaltation
  lexicon: HALOT
  rationale: In this judgment context the noun denotes haughty pride rather than neutral
    majesty. 'Pride' is concise and idiomatic; 'arrogance' is possible but slightly
    more interpretive.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the judgment. 'Because' is clearer in contemporary
    English than 'for.'
- source_word: חֵרְפוּ
  chosen: they taunted
  alternatives:
  - they reproached
  - they mocked
  - they reviled
  lexicon: HALOT
  rationale: The verb conveys scornful reproach. 'Taunted' captures the hostile derision
    in accessible English; 'reproached' is more formal and less vivid.
- source_word: וַיַּגְדִּלוּ עַל
  chosen: and magnified themselves against
  alternatives:
  - and boasted against
  - and made themselves great against
  - and exalted themselves over
  lexicon: HALOT
  rationale: The Hiphil of גדל with עַל conveys self-exaltation over or against someone.
    'Magnified themselves against' preserves the lexical image while remaining understandable.
    The reflexive sense is supplied in English because the Hebrew idiom implies self-aggrandizement.
- source_word: עַם
  chosen: the people of
  alternatives:
  - the nation of
  lexicon: HALOT
  rationale: With the divine name following, 'people of' is the standard covenantal
    sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'Armies' translates the Hebrew meaning
    more transparently for modern readers than the traditional 'hosts,' while preserving
    the martial/cosmic force of the title.
