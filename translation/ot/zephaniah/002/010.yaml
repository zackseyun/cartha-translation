theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The doctrine excerpt requires יְהוָה to be rendered 'the LORD.' For צְבָאוֹת,
    'Armies' is preferred here as a transparent translation of the Hebrew title, while
    the traditional 'hosts' is preserved as an alternative because it is familiar
    in English Bible tradition.
