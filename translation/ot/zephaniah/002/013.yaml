theological_decisions:
- issue: Anthropomorphic depiction of divine judgment
  chosen_reading: Retain the concrete image 'he will stretch out his hand'
  alternative_readings:
  - he will act against the north
  rationale: The Hebrew explicitly uses bodily imagery for God's judicial action.
    Preserving the image follows original-language primacy and avoids flattening the
    prophetic rhetoric into abstraction.
  doctrine_reference: Translation philosophy §1, §6
