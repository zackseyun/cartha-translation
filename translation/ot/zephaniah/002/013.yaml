id: ZEP.2.13
reference: Zephaniah 2:13
source:
  edition: WLC
  text: וְ/יֵ֤ט יָד/וֹ֙ עַל צָפ֔וֹן וִֽ/יאַבֵּ֖ד אֶת אַשּׁ֑וּר וְ/יָשֵׂ֤ם אֶת נִֽינְוֵה֙
    לִ/שְׁמָמָ֔ה צִיָּ֖ה כַּ/מִּדְבָּֽר־־־׃
translation:
  text: And he will stretch out his hand against the north and destroy Assyria, and
    he will make Nineveh a desolation, dry like the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the desert.' The Hebrew midbar can denote wilderness, pastureland,
      or desert-like wasteland depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵט
  chosen: he will stretch out
  alternatives:
  - he will extend
  - he will turn
  lexicon: HALOT
  rationale: The verb נטה commonly means to stretch out or extend, especially with
    'hand' as the object. 'Stretch out' is idiomatic in English and preserves the
    image of active judgment.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic idiom of divine action
    present in the Hebrew.
- source_word: עַל צָפוֹן
  chosen: against the north
  alternatives:
  - toward the north
  - over the north
  lexicon: HALOT
  rationale: With the hostile/judicial context and the following destruction of Assyria,
    עַל is best rendered 'against.' 'The north' likely denotes the northern region
    where Assyria lay relative to Judah.
- source_word: וִיאַבֵּד
  chosen: destroy
  alternatives:
  - wipe out
  - cause to perish
  lexicon: HALOT
  rationale: The Hiphil of אבד here expresses causing ruin or destruction. 'Destroy'
    is the most natural and sufficiently strong English equivalent.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: In prophetic context this proper noun refers to the empire/land, not
    merely the eponymous ancestor. 'Assyria' is standard English transliteration for
    the geopolitical entity.
- source_word: וְיָשֵׂם
  chosen: he will make
  alternatives:
  - he will set
  - he will turn
  lexicon: HALOT
  rationale: The verb שׂים with a double object often means 'make' or 'set as.' 'Make'
    reads naturally in English with the result phrase 'a desolation.'
- source_word: נִינְוֵה
  chosen: Nineveh
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: לִשְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  lexicon: HALOT
  rationale: The noun שְׁמָמָה denotes devastation or desolation. Rendering it as
    the noun phrase 'a desolation' preserves the Hebrew construction after 'make.'
- source_word: צִיָּה
  chosen: dry
  alternatives:
  - parched
  - arid
  lexicon: HALOT
  rationale: The term denotes dryness or parched wasteland conditions. 'Dry' is concise
    and works well predicatively with the following comparison.
- source_word: כַּמִּדְבָּר
  chosen: like the wilderness
  alternatives:
  - like the desert
  lexicon: HALOT
  rationale: מִדְבָּר can mean wilderness or desert. 'Wilderness' better preserves
    the broader Hebrew sense of an uninhabited wasteland, while still conveying barrenness.
