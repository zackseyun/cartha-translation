id: ZEP.2.4
reference: Zephaniah 2:4
source:
  edition: WLC
  text: כִּ֤י עַזָּה֙ עֲזוּבָ֣ה תִֽהְיֶ֔ה וְ/אַשְׁקְל֖וֹן לִ/שְׁמָמָ֑ה אַשְׁדּ֗וֹד
    בַּֽ/צָּהֳרַ֨יִם֙ יְגָ֣רְשׁ֔וּ/הָ וְ/עֶקְר֖וֹן תֵּעָקֵֽר׃ס
translation:
  text: For Gaza will be abandoned, and Ashkelon a desolation; Ashdod—they will drive
    her out at noon, and Ekron will be uprooted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew likely contains wordplay: ''Gaza'' (ʿAzzah) and ''abandoned'' (ʿazuvah)
      sound similar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at midday.' The phrase emphasizes that Ashdod's expulsion will happen
      in broad daylight, not under cover of darkness.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding call to judgment/seek
    the LORD. 'For' best preserves the causal connection in natural English.
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: עֲזוּבָה תִהְיֶה
  chosen: will be abandoned
  alternatives:
  - will be forsaken
  - will become deserted
  lexicon: HALOT
  rationale: The passive/resultative sense of עזב in this form is well conveyed by
    'abandoned.' This also preserves the likely wordplay with עַזָּה (Gaza), without
    forcing an artificial English pun.
- source_word: אַשְׁקְלוֹן
  chosen: Ashkelon
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: לִשְׁמָמָה
  chosen: a desolation
  alternatives:
  - for desolation
  - a wasteland
  lexicon: HALOT
  rationale: שממה denotes devastation/desolation. 'A desolation' is idiomatic with
    the verbless predicate implied after the conjunction and keeps the prophetic judgment
    tone.
- source_word: אַשְׁדּוֹד
  chosen: Ashdod
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: בַּצָּהֳרַיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: Literally 'at noon/midday.' 'At noon' is concise and vivid, highlighting
    the unexpected boldness/public nature of the expulsion.
- source_word: יְגָרְשׁוּהָ
  chosen: they will drive her out
  alternatives:
  - they will expel her
  - they will drive it out
  lexicon: HALOT
  rationale: גרשׁ commonly means drive out/expel. The 3fs suffix refers to the city,
    which is grammatically feminine in Hebrew; 'her' preserves the source grammar
    and personification better than 'it.'
- source_word: וְעֶקְרוֹן
  chosen: and Ekron
  lexicon: HALOT
  rationale: Proper place name with simple conjunction.
- source_word: תֵּעָקֵר
  chosen: will be uprooted
  alternatives:
  - will be rooted out
  lexicon: HALOT
  rationale: The Niphal of עקר carries the sense of being uprooted. 'Uprooted' preserves
    the metaphor of removal from the roots and suits the judgment context.
