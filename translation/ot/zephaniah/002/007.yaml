theological_decisions:
- issue: Rendering the restoration idiom וְשָׁב שְׁבוּתָם
  chosen_reading: restore their fortunes
  alternative_readings:
  - bring back their captives
  - restore their captivity
  rationale: The Hebrew idiom can be rendered more literally, but in prophetic restoration
    contexts it often signifies reversal of plight more broadly. The chosen rendering
    preserves the restoration sense without importing a narrower exile-only meaning
    where the verse itself emphasizes renewed possession and security.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
