id: ZEP.2.7
reference: Zephaniah 2:7
source:
  edition: WLC
  text: וְ/הָ֣יָה חֶ֗בֶל לִ/שְׁאֵרִ֛ית בֵּ֥ית יְהוּדָ֖ה עֲלֵי/הֶ֣ם יִרְע֑וּ/ן בְּ/בָתֵּ֣י
    אַשְׁקְל֗וֹן בָּ/עֶ֨רֶב֙ יִרְבָּצ֔וּ/ן כִּ֧י יִפְקְדֵ֛/ם יְהוָ֥ה אֱלֹהֵי/הֶ֖ם
    וְ/שָׁ֥ב שבות/ם׃
translation:
  text: And the coastland shall belong to the remnant of the house of Judah; on it
    they shall pasture. In the houses of Ashkelon they shall lie down at evening,
    for the LORD their God will attend to them and restore their fortunes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will visit them' / 'will care for them.' The Hebrew verb can denote
      attentive intervention, whether for blessing or judgment; here the context favors
      gracious restoration.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring back their captives.' The Hebrew idiom often means to restore
      a people's former condition or fortunes.
    reason: alternative_reading
lexical_decisions:
- source_word: חֶבֶל
  chosen: coastland
  alternatives:
  - tract
  - territory
  - region
  lexicon: HALOT
  rationale: In this context of Philistia's seacoast (vv. 5–6), חֶבֶל refers to a
    territorial stretch or region; 'coastland' best captures the geographic sense
    in natural English.
- source_word: שְׁאֵרִית
  chosen: remnant
  alternatives:
  - survivors
  - remainder
  lexicon: HALOT
  rationale: '''Remnant'' preserves the prophetic-theological nuance of a preserved
    group within Judah, stronger than the merely numerical ''remainder''.'
- source_word: עֲלֵיהֶם
  chosen: on it
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: Although morphologically plural, the phrase likely refers back collectively
    to the coastland/territory. English idiom prefers singular 'on it' for the land
    as a collective possession and grazing area.
- source_word: יִרְעוּן
  chosen: shall pasture
  alternatives:
  - shall graze
  - shall shepherd
  lexicon: HALOT
  rationale: The verb רעה can mean to pasture or shepherd. Here the subject is the
    remnant dwelling on the land, so 'shall pasture' conveys using the land for grazing
    without over-specifying shepherding activity.
- source_word: בְּבָתֵּי אַשְׁקְלוֹן
  chosen: In the houses of Ashkelon
  alternatives:
  - among the houses of Ashkelon
  - in Ashkelon's houses
  lexicon: HALOT
  rationale: A straightforward locative rendering fits the image of restored habitation
    in a formerly judged Philistine city.
- source_word: בָּעֶרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - by evening
  lexicon: HALOT
  rationale: '''At evening'' is concise and preserves the temporal setting of settling
    down to rest.'
- source_word: יִרְבָּצוּן
  chosen: shall lie down
  alternatives:
  - shall rest
  - shall couch themselves
  lexicon: HALOT
  rationale: The verb often describes animals lying down, fitting the pastoral imagery;
    'shall lie down' preserves that concrete image better than the more abstract 'rest'.
- source_word: יִפְקְדֵם
  chosen: will attend to them
  alternatives:
  - will visit them
  - will care for them
  - will take note of them
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend, muster, punish,
    or care for. In this restoration context, 'will attend to them' captures gracious
    divine intervention without narrowing too far, while avoiding the ambiguity of
    English 'visit'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD'.
- source_word: וְשָׁב שְׁבוּתָם
  chosen: and restore their fortunes
  alternatives:
  - and bring back their captives
  - and restore their captivity
  lexicon: HALOT
  rationale: This idiom commonly denotes restoration of a people's condition, not
    only literal return from captivity. 'Restore their fortunes' is idiomatic modern
    English and fits the broader restoration context.
