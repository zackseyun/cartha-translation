id: ZEP.2.11
reference: Zephaniah 2:11
source:
  edition: WLC
  text: נוֹרָ֤א יְהוָה֙ עֲלֵי/הֶ֔ם כִּ֣י רָזָ֔ה אֵ֖ת כָּל אֱלֹהֵ֣י הָ/אָ֑רֶץ וְ/יִשְׁתַּֽחֲווּ
    ל/וֹ֙ אִ֣ישׁ מִ/מְּקוֹמ֔/וֹ כֹּ֖ל אִיֵּ֥י הַ/גּוֹיִֽם־־׃
translation:
  text: The LORD will be fearsome against them, for he will make all the gods of the
    earth waste away; and all the coastlands of the nations will bow down to him,
    each from his own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will famish all the gods of the earth.' The Hebrew verb literally refers
      to becoming lean or emaciated.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the islands of the nations.' 'Coastlands' is a common prophetic
      term for distant maritime peoples and regions.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹרָא
  chosen: fearsome
  alternatives:
  - terrible
  - awesome
  - to be feared
  lexicon: HALOT
  rationale: Predicate adjective from ירא expressing that YHWH inspires dread/awe.
    'Fearsome' preserves the active sense in contemporary English better than archaic
    'terrible' and avoids the modern positive-only drift of 'awesome.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: In context of judgment on the nations just mentioned, עַל with this predicate
    is best rendered adversatively as 'against them,' not merely spatially.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason YHWH is fearsome against them.
- source_word: רָזָה
  chosen: will make ... waste away
  alternatives:
  - will famish
  - will starve
  - will make lean
  lexicon: HALOT
  rationale: The verb literally relates to becoming lean/emaciated. With 'all the
    gods of the earth' as object, the sense is that YHWH will reduce them to nothing,
    likely by depriving them of worshipers. 'Make ... waste away' communicates the
    metaphor naturally while preserving the imagery better than the traditional but
    potentially misleading 'famish.'
- source_word: אֵת כָּל אֱלֹהֵי הָאָרֶץ
  chosen: all the gods of the earth
  alternatives:
  - all the gods of the land
  lexicon: HALOT
  rationale: Plural 'gods' refers to the deities of the nations. 'Earth' fits the
    universal scope of the verse better than the narrower 'land.'
- source_word: וְיִשְׁתַּחֲווּ לוֹ
  chosen: will bow down to him
  alternatives:
  - will worship him
  - will prostrate themselves to him
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration and often functions as worship language.
    'Bow down to him' keeps the physical and cultic sense together without over-paraphrasing.
- source_word: אִישׁ מִמְּקוֹמוֹ
  chosen: each from his own place
  alternatives:
  - everyone from his place
  - each in his place
  lexicon: HALOT
  rationale: Gender-accurate singular distributive expression. 'Each from his own
    place' reflects both the individualizing force of אִישׁ and the preposition מִן
    ('from'), suggesting worship offered from dispersed locations.
- source_word: כֹּל אִיֵּי הַגּוֹיִם
  chosen: all the coastlands of the nations
  alternatives:
  - all the islands of the nations
  - all the distant shores of the nations
  lexicon: HALOT
  rationale: אִיִּים can denote islands/coastlands, often as a poetic term for distant
    maritime peoples. 'Coastlands' best captures the idiomatic prophetic usage for
    far-off nations rather than only literal islands.
