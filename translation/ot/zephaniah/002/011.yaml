theological_decisions:
- issue: How to render the judgment on 'all the gods of the earth' without importing
    a metaphysical claim beyond the text
  chosen_reading: Retain 'all the gods of the earth' as the text's polemical language
    about the nations' deities, with YHWH causing them to 'waste away.'
  alternative_readings:
  - Interpret 'gods' as idols only
  - Paraphrase as 'he will destroy all false religion'
  rationale: The Hebrew explicitly says 'gods,' and the verse's rhetoric is about
    YHWH's supremacy over the nations' worship. Rendering it directly preserves the
    biblical idiom without forcing a later systematic-theological explanation into
    the translation.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Whether the final clause implies centralized pilgrimage or decentralized
    worldwide worship
  chosen_reading: Translate 'each from his own place' to preserve the dispersed-worship
    picture.
  alternative_readings:
  - '''each in his place'''
  - Interpret as pilgrimage to Zion
  rationale: The preposition מִן naturally means 'from,' and the clause depicts the
    nations worshiping YHWH from their various locations. This preserves the prophetic
    universal scope without narrowing it to a single cultic movement unless the text
    states that explicitly.
  doctrine_reference: Translation philosophy §§1, 3, 4
