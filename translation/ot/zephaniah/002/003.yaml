id: ZEP.2.3
reference: Zephaniah 2:3
source:
  edition: WLC
  text: בַּקְּשׁ֤וּ אֶת יְהוָה֙ כָּל עַנְוֵ֣י הָ/אָ֔רֶץ אֲשֶׁ֥ר מִשְׁפָּט֖/וֹ פָּעָ֑לוּ
    בַּקְּשׁוּ צֶ֨דֶק֙ בַּקְּשׁ֣וּ עֲנָוָ֔ה אוּלַי֙ תִּסָּ֣תְר֔וּ בְּ/י֖וֹם אַף יְהוָֽה־־־־׃
translation:
  text: Seek the LORD, all you humble of the land, who have carried out his justice;
    seek righteousness, seek humility; perhaps you will be hidden in the day of the
    LORD’s anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all you humble of the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who have done his ordinance' or 'who have practiced his judgment.'
    reason: lexical_alternative
  - marker: c
    text: '''Righteousness'' may also be rendered ''justice.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'perhaps you may be hidden' or 'perhaps you will be sheltered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּקְּשׁוּ
  chosen: Seek
  alternatives:
  - seek after
  - pursue
  lexicon: HALOT
  rationale: Imperative plural of בקשׁ, a direct summons. 'Seek' is the most natural
    and sufficiently formal rendering, and its repetition is preserved for rhetorical
    force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This also matches established English Bible convention for YHWH.
- source_word: עַנְוֵי הָאָרֶץ
  chosen: you humble of the land
  alternatives:
  - you humble of the earth
  - you afflicted of the land
  - you meek of the earth
  lexicon: HALOT
  rationale: עַנְוֵי denotes the humble/meek/lowly. 'Humble' fits the parallel with
    'seek humility' later in the verse. הָאָרֶץ can mean 'land' or 'earth'; here 'land'
    better suits the prophetic address to Judah's people, though 'earth' remains possible.
- source_word: אֲשֶׁר מִשְׁפָּטוֹ פָּעָלוּ
  chosen: who have carried out his justice
  alternatives:
  - who have done his ordinance
  - who have practiced his judgment
  - who have obeyed his justice
  lexicon: HALOT
  rationale: פּעל means to do/work/carry out; מִשְׁפָּט can denote justice, judgment,
    or ordinance. 'Carried out his justice' preserves both the active verbal sense
    and the ethical/judicial force of מִשְׁפָּט without sounding wooden.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can be rendered 'righteousness' or 'justice.' In this context,
    paired with humility and addressed as a moral pursuit, 'righteousness' is the
    better main-text rendering; 'justice' is preserved as an alternative in a footnote.
- source_word: עֲנָוָה
  chosen: humility
  alternatives:
  - meekness
  - lowliness
  lexicon: HALOT
  rationale: The noun denotes humility/meekness. 'Humility' is clear modern English
    and pairs well with the earlier address to the humble.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - it may be that
  - possibly
  lexicon: HALOT
  rationale: אוּלַי expresses possibility rather than certainty. 'Perhaps' preserves
    the prophetic tension and does not overstate assurance.
- source_word: תִּסָּתְרוּ
  chosen: you will be hidden
  alternatives:
  - you may be hidden
  - you will be sheltered
  - you will be concealed
  lexicon: HALOT
  rationale: Niphal of סתר conveys being hidden/concealed. 'You will be hidden' is
    a straightforward rendering; the preceding 'perhaps' already supplies the modal
    uncertainty. 'Sheltered' is interpretive and therefore left as an alternative.
- source_word: בְּיוֹם אַף יְהוָה
  chosen: in the day of the LORD’s anger
  alternatives:
  - on the day of the LORD's anger
  - in the day of the LORD's wrath
  lexicon: HALOT
  rationale: אַף literally refers to anger/wrath. 'Anger' is accessible modern English
    and preserves the force without importing extra theological nuance. 'In the day'
    is a natural rendering of בְּיוֹם.
