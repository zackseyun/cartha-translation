id: ZEP.2.12
reference: Zephaniah 2:12
source:
  edition: WLC
  text: גַּם אַתֶּ֣ם כּוּשִׁ֔ים חַֽלְלֵ֥י חַרְבִּ֖/י הֵֽמָּה־׃
translation:
  text: You Cushites also will be slain by my sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You Cushites also—they are the slain of my sword.'
    reason: lexical_alternative
  - marker: b
    text: '''Cushites'' may also be rendered ''Ethiopians,'' referring to the people
      of Cush.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: Adds the sense of inclusion with the surrounding nations under judgment.
    'Also' is natural English and preserves the additive force without overemphasis.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural pronoun directly addresses the Cushites.
    English 'you' adequately carries the direct address.
- source_word: כּוּשִׁים
  chosen: Cushites
  alternatives:
  - Ethiopians
  lexicon: HALOT
  rationale: As an ethnonym, this is best transliterated as 'Cushites' rather than
    updated geographically as 'Ethiopians,' which can mislead modern readers by implying
    exact modern national identity. This follows the philosophy of transliterating
    names.
- source_word: חַֽלְלֵי
  chosen: slain
  alternatives:
  - pierced
  - killed
  - the slain of
  lexicon: HALOT
  rationale: The noun means those slain. In English, restructuring as a verbal predicate
    ('will be slain') produces clear, natural sense while preserving the passive/resultative
    idea of death by violence.
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: Straightforward rendering of the construct with first person singular
    suffix. 'Sword' retains the concrete image of divine judgment rather than abstracting
    to 'weapon' or 'judgment.'
- source_word: הֵמָּה
  chosen: will be
  alternatives:
  - they are
  - they themselves are
  lexicon: HALOT
  rationale: 'This independent pronoun is used predicatively/emphatically in a verbless
    clause: ''they are [the] slain of my sword.'' In idiomatic English, future ''will
    be'' is supplied because the prophetic context announces coming judgment. The
    emphatic force is absorbed into the direct address and sentence structure rather
    than rendered woodenly as ''they themselves.'''
