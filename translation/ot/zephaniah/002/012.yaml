theological_decisions:
- issue: Implied verbal tense in the verbless clause
  chosen_reading: 'future sense: ''will be slain'''
  alternative_readings:
  - 'present-like literal: ''are the slain of my sword'''
  rationale: Hebrew poetry often uses verbless clauses in prophetic announcements
    where future judgment is implied by context. Rendering with future English communicates
    the oracle's force clearly without changing the underlying meaning.
