id: ZEP.2.6
reference: Zephaniah 2:6
source:
  edition: WLC
  text: וְֽ/הָיְתָ֞ה חֶ֣בֶל הַ/יָּ֗ם נְוֺ֛ת כְּרֹ֥ת רֹעִ֖ים וְ/גִדְר֥וֹת צֹֽאן׃
translation:
  text: And the seacoast shall become pastures, with wells for shepherds and enclosures
    for flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the coastland shall be meadows, with cisterns for shepherds and folds
      for flocks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: shall become
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    futurally; 'shall become' captures the transition implied in the oracle better
    than the more static 'shall be.'
- source_word: חֶבֶל הַיָּם
  chosen: the seacoast
  alternatives:
  - the coastland
  - the region of the sea
  lexicon: HALOT
  rationale: חֶבֶל denotes a tract/region, and with הים refers to the coastal strip.
    'Seacoast' is natural modern English and preserves the geographic sense.
- source_word: נְוֺת
  chosen: pastures
  alternatives:
  - meadows
  - grazing places
  - habitations
  lexicon: HALOT
  rationale: The noun can denote dwelling places or pasture-land. In this context,
    followed by shepherds and flocks, the pastoral sense is primary, so 'pastures'
    best fits the imagery.
- source_word: כְּרֹת
  chosen: wells
  alternatives:
  - cisterns
  - dug places
  - sheepfolds
  lexicon: HALOT
  rationale: The term likely refers to dug-out places, commonly understood here as
    wells or cisterns. 'Wells' fits the pastoral setting and pairs naturally with
    shepherds. 'Sheepfolds' is less likely because the next phrase already supplies
    enclosure imagery.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - herdsmen
  - pastors
  lexicon: HALOT
  rationale: The participial/noun form refers to those who pasture flocks. 'Shepherds'
    is the most direct and idiomatic rendering in this context.
- source_word: וְגִדְרוֹת
  chosen: and enclosures
  alternatives:
  - and walls
  - and folds
  - and pens
  lexicon: HALOT
  rationale: From גדר, the sense is enclosed places or folds. 'Enclosures' is broad
    enough to preserve the image without over-specifying the construction.
- source_word: צֹאן
  chosen: for flocks
  alternatives:
  - for sheep
  - small livestock
  lexicon: HALOT
  rationale: צאן can denote sheep/goats collectively. 'Flocks' preserves the collective
    pastoral sense and matches the parallel with shepherds.
