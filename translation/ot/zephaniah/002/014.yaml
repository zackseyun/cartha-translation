id: ZEP.2.14
reference: Zephaniah 2:14
source:
  edition: WLC
  text: וְ/רָבְצ֨וּ בְ/תוֹכָ֤/הּ עֲדָרִים֙ כָּל חַיְת/וֹ ג֔וֹי גַּם קָאַת֙ גַּם קִפֹּ֔ד
    בְּ/כַפְתֹּרֶ֖י/הָ יָלִ֑ינוּ ק֠וֹל יְשׁוֹרֵ֤ר בַּֽ/חַלּוֹן֙ חֹ֣רֶב בַּ/סַּ֔ף כִּ֥י
    אַרְזָ֖ה עֵרָֽה־־־־׃
translation:
  text: Herds will lie down in her midst, every kind of beast; both the desert owl
    and the hedgehog will spend the night among her capitals. A voice will sing in
    the window; devastation will be on the threshold, for her cedarwork has been laid
    bare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identification of the Hebrew animal names is uncertain. 'Desert owl'
      may also be rendered 'pelican.'
    reason: lexical_alternative
  - marker: b
    text: Or 'porcupine' for 'hedgehog.' The exact species denoted by the Hebrew term
      is debated.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'every beast of a nation' or similar; the phrase is difficult, likely
      meaning 'every kind of beast.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָבְצוּ
  chosen: will lie down
  alternatives:
  - will crouch
  - will rest
  lexicon: HALOT
  rationale: The verb רבץ commonly denotes animals lying down or resting. 'Will lie
    down' is natural English and preserves the image of animals occupying the ruined
    city.
- source_word: עֲדָרִים
  chosen: Herds
  alternatives:
  - flocks
  lexicon: HALOT
  rationale: The noun can refer broadly to animal groups. 'Herds' fits the following
    reference to beasts generally and avoids implying only sheep.
- source_word: בְתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the middle of her
  lexicon: HALOT
  rationale: The feminine suffix refers to the city, personified as feminine. 'In
    her midst' preserves the personified-city imagery.
- source_word: כָּל חַיְתוֹ גוֹי
  chosen: every kind of beast
  alternatives:
  - all the animals of the nations
  - every beast of the nation
  lexicon: HALOT
  rationale: The Hebrew is difficult. The phrase is commonly understood idiomatically
    as a comprehensive expression for all sorts of wild animals. 'Every kind of beast'
    communicates the sense clearly without forcing an awkwardly literal rendering.
- source_word: קָאַת
  chosen: desert owl
  alternatives:
  - pelican
  - owl
  lexicon: HALOT
  rationale: The identification of this animal is uncertain. 'Desert owl' is a plausible
    modern rendering for a desolation-dwelling bird, while preserving the ruin imagery.
    An alternative is preserved in a footnote because the zoological identification
    is debated.
- source_word: קִפֹּד
  chosen: hedgehog
  alternatives:
  - porcupine
  - owl
  lexicon: HALOT
  rationale: The exact species is uncertain. 'Hedgehog' is a common traditional-modern
    rendering for a small creature inhabiting ruins. An alternative is footnoted due
    to lexical uncertainty.
- source_word: בכפתריה
  chosen: among her capitals
  alternatives:
  - on her capitals
  - in her capitals
  lexicon: HALOT
  rationale: כפתור here likely refers to architectural capitals or knob-like tops
    of columns. 'Among her capitals' fits the image of creatures lodging in the ruined
    upper structures.
- source_word: יָלִינוּ
  chosen: will spend the night
  alternatives:
  - will lodge
  - will stay overnight
  lexicon: HALOT
  rationale: The verb לין refers to passing the night. 'Will spend the night' is idiomatic
    and vivid.
- source_word: קוֹל יְשׁוֹרֵר
  chosen: A voice will sing
  alternatives:
  - A sound will sing out
  - A voice will cry out
  lexicon: HALOT
  rationale: The phrase literally involves a sound/voice and a verb from שׁיר ('sing').
    'A voice will sing' preserves the eerie poetic effect of sound issuing from the
    ruined building.
- source_word: בחלון
  chosen: in the window
  alternatives:
  - at the window
  lexicon: HALOT
  rationale: A straightforward locative rendering fits the image of sound coming through
    an abandoned opening.
- source_word: חֹרֶב
  chosen: devastation
  alternatives:
  - desolation
  - ruin
  lexicon: HALOT
  rationale: The noun can denote dryness or desolation; in this context of urban ruin,
    'devastation' best conveys the result of judgment.
- source_word: בסף
  chosen: on the threshold
  alternatives:
  - at the doorway
  lexicon: HALOT
  rationale: סף is the threshold or sill of an entrance. 'On the threshold' keeps
    the architectural concreteness.
- source_word: כִּי אַרְזָה עֵרָה
  chosen: for her cedarwork has been laid bare
  alternatives:
  - for the cedar has been stripped
  - for her cedar paneling is exposed
  lexicon: HALOT
  rationale: The clause explains the ruined condition of the building. ארזה likely
    refers to cedarwork/cedar paneling, and ערה in the passive sense indicates being
    stripped bare or exposed.
