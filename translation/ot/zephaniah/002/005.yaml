id: ZEP.2.5
reference: Zephaniah 2:5
source:
  edition: WLC
  text: ה֗וֹי יֹֽשְׁבֵ֛י חֶ֥בֶל הַ/יָּ֖ם גּ֣וֹי כְּרֵתִ֑ים דְּבַר יְהוָ֣ה עֲלֵי/כֶ֗ם כְּנַ֨עַן֙ אֶ֣רֶץ פְּלִשְׁתִּ֔ים וְ/הַאֲבַדְתִּ֖י/ךְ מֵ/אֵ֥ין יוֹשֵֽׁב־׃
translation:
  text: Woe, inhabitants of the seacoast, nation of the Cherethites! The word of Yahweh is against you, Canaan, land of the Philistines; and I will destroy you until no inhabitant remains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew כְּרֵתִים may also be rendered 'Cherethites,' the more traditional English spelling of the ethnonym.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection introducing judgment; 'Woe' is the standard English equivalent that preserves the oracular force better than the softer 'Ah' or lament-like 'Alas'.
- source_word: יֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those who dwell in
  - dwellers of
  lexicon: HALOT
  rationale: Construct participle from ישב referring to the people residing in the region. 'Inhabitants of' is natural English while preserving the substantive sense.
- source_word: חֶבֶל הַיָּם
  chosen: the seacoast
  alternatives:
  - the region of the sea
  - the coastland
  lexicon: HALOT
  rationale: The phrase denotes the coastal tract by the sea. 'Seacoast' is concise and idiomatic, preserving the geographic reference without over-literal awkwardness.
- source_word: גּוֹי כְּרֵתִים
  chosen: nation of the Kerethites
  alternatives:
  - nation of the Cherethites
  - people of the Kerethites
  lexicon: HALOT
  rationale: גּוֹי is 'nation/people'; 'nation' fits the vocative apposition. כְּרֵתִים is best transliterated as an ethnonym. 'Kerethites' follows a direct transliteration from Hebrew; 'Cherethites' is a familiar traditional spelling and is preserved in a footnote.
- source_word: דְּבַר יְהוָה
  chosen: The word of the LORD
  alternatives:
  - The LORD's word
  lexicon: HALOT
  rationale: Standard prophetic formula. YHWH is rendered 'the LORD' per doctrine; the construct phrase is kept in its familiar and transparent English form.
- source_word: עֲלֵיכֶם
  chosen: is against you
  alternatives:
  - is upon you
  lexicon: HALOT
  rationale: With דבר יהוה in a judgment context, the preposition conveys hostile direction. 'Is against you' makes the adversative force explicit in natural English.
- source_word: כְּנַעַן אֶרֶץ פְּלִשְׁתִּים
  chosen: Canaan, land of the Philistines
  alternatives:
  - O Canaan, land of the Philistines
  - Canaanite land, the land of the Philistines
  lexicon: HALOT
  rationale: Appositional identification of Philistia with Canaan. Retaining 'Canaan' preserves the rhetorical force and covenantal-geographic resonance; 'land of the Philistines' clarifies the referent.
- source_word: וְהַאֲבַדְתִּיךְ
  chosen: and I will destroy you
  alternatives:
  - and I will make you perish
  - and I will wipe you out
  lexicon: HALOT
  rationale: Hiphil of אבד with 2fs suffix expresses causative destruction of the addressed land/entity. 'Destroy you' is direct and appropriately grave without colloquial overstatement.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: until no inhabitant remains
  alternatives:
  - so that there is no inhabitant
  - with no one dwelling there
  lexicon: HALOT
  rationale: The idiom expresses total depopulation. 'Until no inhabitant remains' captures the result in clear English and fits the future judgment sequence.
