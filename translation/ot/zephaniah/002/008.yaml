theological_decisions:
- issue: Referent of the third-person plural suffix in גְּבוּלָם
  chosen_reading: their border refers to the border/territory of 'my people' just
    mentioned
  alternative_readings:
  - their own border
  - the border in a more general territorial sense
  rationale: The immediate antecedent is 'my people,' and the context concerns Moabite
    and Ammonite aggression against Judah. The English keeps the literal 'their border'
    while the rationale documents the likely referent rather than over-resolving it
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
