id: ZEP.2.8
reference: Zephaniah 2:8
source:
  edition: WLC
  text: שָׁמַ֨עְתִּי֙ חֶרְפַּ֣ת מוֹאָ֔ב וְ/גִדּוּפֵ֖י בְּנֵ֣י עַמּ֑וֹן אֲשֶׁ֤ר חֵֽרְפוּ֙
    אֶת עַמִּ֔/י וַ/יַּגְדִּ֖ילוּ עַל גְּבוּלָֽ/ם־־׃
translation:
  text: I have heard the reproach of Moab and the insults of the sons of Ammon, with
    which they reproached my people and made themselves great against their border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boasted against their border' or 'magnified themselves against their
      territory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect first-person singular can be rendered as a present perfect
    in English to convey a completed action with present relevance in prophetic speech.
    'I have heard' preserves the immediacy of YHWH's notice of the offense.
- source_word: חֶרְפַּת
  chosen: the reproach
  alternatives:
  - the taunt
  - the disgrace
  lexicon: HALOT
  rationale: The noun denotes scorn or reproach directed at someone. 'Reproach' preserves
    the moral and verbal sense better than the more colloquial 'taunt.'
- source_word: גִדּוּפֵי
  chosen: the insults
  alternatives:
  - the revilings
  - the blasphemies
  lexicon: HALOT
  rationale: The term refers to abusive speech. 'Insults' is clear modern English
    and fits the parallel with 'reproach.' 'Blasphemies' would over-specify a directly
    Godward object not explicit here.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew expression literally
    while remaining intelligible. 'Ammonites' is possible, but 'sons of Ammon' keeps
    the parallelism with the source text.
- source_word: אֲשֶׁר חֵרְפוּ
  chosen: with which they reproached
  alternatives:
  - which they used to taunt
  - because they reproached
  lexicon: HALOT
  rationale: The relative clause most naturally refers back to the reproach/insults
    as the means by which Moab and Ammon attacked Judah. 'With which they reproached'
    preserves that linkage.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal language; no expansion is warranted.
- source_word: וַיַּגְדִּילוּ
  chosen: made themselves great
  alternatives:
  - boasted
  - magnified themselves
  - acted arrogantly
  lexicon: HALOT
  rationale: The Hiphil of גדל here conveys self-exaltation or aggrandizement. 'Made
    themselves great' preserves the metaphor and leaves the arrogance explicit without
    collapsing it into interpretation.
- source_word: עַל גְּבוּלָם
  chosen: against their border
  alternatives:
  - against their territory
  - over their border
  - against my people's border
  lexicon: HALOT
  rationale: The suffix is third person plural ('their'). In context it most naturally
    refers to 'my people,' i.e., the border of Judah/Israel, but the Hebrew expression
    itself is tersely preserved as 'their border.' 'Against' fits עַל in a hostile
    sense here.
