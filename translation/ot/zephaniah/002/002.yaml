id: ZEP.2.2
reference: Zephaniah 2:2
source:
  edition: WLC
  text: בְּ/טֶ֨רֶם֙ לֶ֣דֶת חֹ֔ק כְּ/מֹ֖ץ עָ֣בַר י֑וֹם בְּ/טֶ֣רֶם לֹא יָב֣וֹא עֲלֵי/כֶ֗ם חֲרוֹן֙ אַף יְהוָ֔ה בְּ/טֶ֨רֶם֙ לֹא יָב֣וֹא עֲלֵי/כֶ֔ם י֖וֹם אַף יְהוָֽה׀־־־־׃
translation:
  text: before the decree gives birth—before the day passes away like chaff—before the burning anger of Yahweh comes upon you, before the day of Yahweh’s anger comes upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the decree takes effect.' The Hebrew literally says 'before the decree gives birth,' using birth imagery for the emergence or execution of the decree.
    reason: lexical_alternative
  - marker: b
    text: Or 'before the day passes by like chaff.' The Hebrew is compact and poetic, and the exact relation between 'day' and 'like chaff' may be understood slightly differently in English.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the burning anger of the LORD' ... 'the day of the LORD’s anger.'
    reason: cross_reference
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - ere
  lexicon: HALOT
  rationale: Temporal marker repeated three times for urgent warning; 'before' is clear modern English and preserves the anaphoric structure.
- source_word: לֶדֶת
  chosen: gives birth
  alternatives:
  - brings forth
  - is born
  lexicon: HALOT
  rationale: Infinitive of ילד literally denotes bearing/birth. With חֹק as subject/object of the clause, the image is metaphorical; 'gives birth' preserves the vividness better than flattening to 'takes effect'.
- source_word: חֹק
  chosen: decree
  alternatives:
  - statute
  - ordinance
  - decision
  lexicon: HALOT
  rationale: Here the sense is a fixed decision or decree rather than general law. 'Decree' fits the prophetic judgment context and the metaphor of something coming forth.
- source_word: כְּמֹץ
  chosen: like chaff
  alternatives:
  - as chaff
  lexicon: HALOT
  rationale: Standard simile; 'chaff' preserves the image of something weightless and quickly blown away.
- source_word: עָבַר יוֹם
  chosen: the day passes away
  alternatives:
  - the day passes by
  - the day sweeps past
  lexicon: HALOT
  rationale: The perfect with יום in this poetic warning conveys the fleeting passing of the day. 'Passes away' works idiomatically in English and matches the chaff simile.
- source_word: חֲרוֹן אַף
  chosen: burning anger
  alternatives:
  - fierce anger
  - heat of anger
  - wrath
  lexicon: HALOT
  rationale: The Hebrew idiom combines 'burning' and 'nose/anger' for intense wrath. 'Burning anger' preserves the metaphorical heat more transparently than the more traditional but less literal 'fierce anger'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָבוֹא עֲלֵיכֶם
  chosen: comes upon you
  alternatives:
  - comes against you
  - comes over you
  lexicon: HALOT
  rationale: This is a standard judgment formula. 'Comes upon you' is natural English and preserves the directional force of על.
- source_word: יוֹם אַף יְהוָה
  chosen: the day of the LORD’s anger
  alternatives:
  - the day of the LORD's wrath
  - the day of the anger of the LORD
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'The day of the LORD’s anger' is clear and keeps the relation explicit without importing the fuller technical phrase 'day of the LORD,' which is not exactly the wording here.
