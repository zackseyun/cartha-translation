theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the reverential convention noted in DOCTRINE.md.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of חֹק לֶדֶת
  chosen_reading: retain birth imagery in 'the decree gives birth'
  alternative_readings:
  - before the decree takes effect
  - before the decision is carried out
  rationale: The Hebrew uses explicit birth imagery. Preserving the metaphor maintains the prophetic vividness and avoids over-interpreting the figure into a more abstract legal idiom.
