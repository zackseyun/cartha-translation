id: ZEP.2.1
reference: Zephaniah 2:1
source:
  edition: WLC
  text: הִֽתְקוֹשְׁשׁ֖וּ וָ/ק֑וֹשּׁוּ הַ/גּ֖וֹי לֹ֥א נִכְסָֽף׃
translation:
  text: Gather yourselves together, yes, gather, O shameless nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “O nation not desired” or “O nation without longing.”
      The Hebrew expression is difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְקוֹשְׁשׁוּ
  chosen: Gather yourselves together
  alternatives:
  - Collect yourselves
  - Gather stubble
  lexicon: HALOT
  rationale: The hitpolel imperative plural from קשׁשׁ is idiomatic and reflexive,
    calling the people to assemble or collect themselves. While the root can literally
    mean gathering straw/stubble, here the reflexive form in parallel with the following
    imperative points to a figurative summons to assemble.
- source_word: וָקֹשּׁוּ
  chosen: yes, gather
  alternatives:
  - and gather
  - and collect yourselves
  lexicon: HALOT
  rationale: The second imperative intensifies the first. Rendering waw here as emphatic
    ('yes') brings out the rhetorical force in natural English, while preserving the
    repetition of the Hebrew verb.
- source_word: הַגּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation' or 'people.' 'Nation' best preserves the
    collective political-covenantal sense in prophetic address.
- source_word: לֹא
  chosen: shameless
  alternatives:
  - not desired
  - without longing
  - undesirable
  lexicon: HALOT
  rationale: The negation modifies נִכְסָף. In context, the phrase characterizes the
    nation morally rather than expressing mere lack of desirability. 'Shameless' is
    a widely recognized contextual rendering that captures the prophetic rebuke, though
    it is interpretive.
- source_word: נִכְסָף
  chosen: shameless
  alternatives:
  - desired
  - longed for
  - yearning
  lexicon: HALOT
  rationale: From כסף ('to long for, desire'). The niphal passive-participial/adjectival
    sense would more literally be 'not desired' or 'not longed for.' In this context
    many understand an idiomatic extension toward 'without shame' or 'unashamed' in
    light of the call to self-gathering before judgment. Because the Hebrew is difficult,
    the more literal alternative should be preserved in a footnote.
