theological_decisions:
- issue: Restoration language for the afflicted remnant
  chosen_reading: the lame ... the outcast
  alternative_readings:
  - the limping one ... the driven-away one
  rationale: The feminine singular participles likely personify daughter Zion or function
    collectively for the afflicted people. The chosen English keeps the communal restoration
    sense without erasing the concrete imagery of weakness and exile.
  doctrine_reference: Preserve theological tension rather than resolve it.
