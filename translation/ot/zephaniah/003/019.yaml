id: ZEP.3.19
reference: Zephaniah 3:19
source:
  edition: WLC
  text: הִנְ/נִ֥י עֹשֶׂ֛ה אֶת כָּל מְעַנַּ֖יִ/ךְ בָּ/עֵ֣ת הַ/הִ֑יא וְ/הוֹשַׁעְתִּ֣י
    אֶת הַ/צֹּלֵעָ֗ה וְ/הַ/נִּדָּחָה֙ אֲקַבֵּ֔ץ וְ/שַׂמְתִּי/ם֙ לִ/תְהִלָּ֣ה וּ/לְ/שֵׁ֔ם
    בְּ/כָל הָ/אָ֖רֶץ בָּשְׁתָּֽ/ם־־־־׃
translation:
  text: Behold, at that time I will deal with all your oppressors, and I will save
    the lame and gather the outcast, and I will make them a praise and a name in every
    land where they were put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who afflict you.' The Hebrew verb can denote afflicting, oppressing,
      or humbling.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who limps' and 'the one driven away'; the Hebrew uses feminine
      singular forms, likely personifying the afflicted community.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all the earth.'
    reason: lexical_alternative
  - marker: d
    text: The final phrase is difficult Hebrew; it may also be understood more literally
      as 'in their shame.' The translation follows the contextual sense, 'where they
      were put to shame.'
    reason: textual_variant
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the prophetic
    force better than the more colloquial 'look' or 'see'.
- source_word: עֹשֶׂה
  chosen: I will deal with
  alternatives:
  - I am about to act against
  - I will act against
  lexicon: HALOT
  rationale: Although literally 'doing/making,' with the object 'all your oppressors'
    the idiom implies decisive action against them. 'Deal with' captures the judicial
    sense without over-specifying the exact mode of judgment.
- source_word: מְעַנַּיִךְ
  chosen: your oppressors
  alternatives:
  - those who afflict you
  - those who humble you
  lexicon: HALOT
  rationale: From ענה in the sense of afflicting/oppressing. 'Oppressors' is the clearest
    contextual rendering for hostile agents acting against daughter Zion/Jerusalem.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - on that day
  lexicon: HALOT
  rationale: A standard prophetic temporal formula. 'At that time' is the direct rendering
    of the Hebrew phrase here; 'on that day' would import a different common formula
    not used in this clause.
- source_word: וְהוֹשַׁעְתִּי
  chosen: I will save
  alternatives:
  - I will deliver
  lexicon: HALOT
  rationale: The verb ישׁע commonly denotes saving/delivering. 'Save' preserves the
    theological resonance while fitting the restoration context.
- source_word: הַצֹּלֵעָה
  chosen: the lame
  alternatives:
  - the limping one
  - the crippled
  lexicon: HALOT
  rationale: Literally 'the one who limps,' feminine singular used collectively or
    personifying the afflicted community. 'The lame' is idiomatic English and preserves
    the image.
- source_word: הַנִּדָּחָה
  chosen: the outcast
  alternatives:
  - the driven away
  - the banished
  lexicon: HALOT
  rationale: From נדח, 'to drive away/scatter.' 'The outcast' communicates both exclusion
    and displacement in concise English.
- source_word: אֲקַבֵּץ
  chosen: gather
  alternatives:
  - bring together
  - regather
  lexicon: HALOT
  rationale: A common restoration verb for assembling the scattered people. 'Gather'
    is direct and preserves biblical intertextual resonance.
- source_word: וְשַׂמְתִּים
  chosen: I will make them
  alternatives:
  - I will set them
  - I will appoint them
  lexicon: HALOT
  rationale: The idiom with following predicates ('for praise and for a name') is
    best rendered 'make them,' expressing transformed status.
- source_word: לִתְהִלָּה
  chosen: a praise
  alternatives:
  - an object of praise
  - renown
  lexicon: HALOT
  rationale: Retains the noun 'praise' rather than paraphrasing. It indicates that
    they will become the occasion or object of praise.
- source_word: וּלְשֵׁם
  chosen: a name
  alternatives:
  - renown
  - fame
  lexicon: HALOT
  rationale: Literally 'a name,' a Hebrew idiom for reputation or renown. The literal
    rendering is preserved because it remains intelligible in English and echoes biblical
    style.
- source_word: בְּכָל הָאָרֶץ
  chosen: in every land
  alternatives:
  - in all the earth
  - throughout the whole earth
  lexicon: HALOT
  rationale: Although הארץ can mean 'earth,' in this restoration context with dispersion/shame
    among the nations, 'every land' better conveys the distributive sense of places
    where they had been scattered.
- source_word: בָּשְׁתָּם
  chosen: where they were put to shame
  alternatives:
  - in their shame
  - when they were ashamed
  lexicon: HALOT
  rationale: The form is difficult, but context and parallelism support a sense tied
    to the places of their shame. Rendering it as a relative clause makes good sense
    in English and matches the restoration reversal theme; compare the closely related
    wording in many textual traditions and ancient versions.
