id: ZEP.3.15
reference: Zephaniah 3:15
source:
  edition: WLC
  text: הֵסִ֤יר יְהוָה֙ מִשְׁפָּטַ֔יִ/ךְ פִּנָּ֖ה אֹֽיְבֵ֑/ךְ מֶ֣לֶךְ יִשְׂרָאֵ֤ל יְהוָה֙ בְּ/קִרְבֵּ֔/ךְ לֹא תִֽירְאִ֥י רָ֖ע עֽוֹד׀־׃
translation:
  text: Yahweh has taken away your judgments; he has turned away your enemy. The King of Israel, Yahweh, is in your midst; you will fear evil no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the judgments against you' or 'your sentence.'
    reason: lexical_alternative
  - marker: b
    text: '''Evil'' here may mean ''disaster'' or ''calamity'' in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסִיר
  chosen: has taken away
  alternatives:
  - has removed
  - has turned aside
  lexicon: HALOT
  rationale: Hiphil of סור commonly means to remove or take away. Present perfect English fits the prophetic declaration of accomplished divine action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִשְׁפָּטַיִךְ
  chosen: your judgments
  alternatives:
  - the judgments against you
  - your punishment
  - your sentence
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or sentence. In this context of Zion's restoration, it most naturally refers to punitive judgments resting on her. 'Your judgments' preserves the Hebrew form while allowing the sense of judgments directed toward her; the fuller alternative is preserved in a footnote.
- source_word: פִּנָּה
  chosen: has turned away
  alternatives:
  - has cleared away
  - has removed
  lexicon: HALOT
  rationale: The verb conveys turning aside or removing. With 'your enemy' as object, 'has turned away' captures the idea that the enemy has been driven off.
- source_word: אֹיְבֵךְ
  chosen: your enemy
  alternatives:
  - your enemies
  lexicon: HALOT
  rationale: The form is singular in the text, so singular is retained. It may function collectively, but the translation stays close to the Hebrew number.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: The King of Israel
  alternatives:
  - Israel's King
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly as a title. Capitalization reflects its use for God in apposition with the following divine name.
- source_word: בקרבך
  chosen: in your midst
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: A common covenant-presence expression. 'In your midst' preserves both locality and theological resonance.
- source_word: לֹא תִירְאִי
  chosen: you will fear
  alternatives:
  - you shall fear
  - you need not fear
  lexicon: HALOT
  rationale: 'Imperfect 2fs after the declaration of divine presence is best rendered as future: ''you will fear.'' This avoids adding modal nuance not explicit in the Hebrew.'
- source_word: רָע
  chosen: evil
  alternatives:
  - disaster
  - harm
  - calamity
  lexicon: HALOT
  rationale: רָע can denote moral evil or experienced calamity. Here, in a restoration oracle, the sense is likely harmful evil/disaster. 'Evil' is retained in the main text for lexical breadth, with the more specific alternative preserved in a footnote.
- source_word: עוֹד
  chosen: no more
  alternatives:
  - any longer
  - again
  lexicon: HALOT
  rationale: עוֹד with negation idiomatically means 'no more' or 'any longer.' 'No more' is concise and natural.
