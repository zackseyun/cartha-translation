theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of מִשְׁפָּטַיִךְ in a salvation oracle
  chosen_reading: your judgments
  alternative_readings:
  - the judgments against you
  - your punishment
  rationale: The Hebrew noun is broader than 'punishment,' but in context it refers to adverse judicial sentences removed by the LORD. The main text preserves the lexical form while a footnote clarifies the likely contextual sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Sense of רָע in the final clause
  chosen_reading: evil
  alternative_readings:
  - disaster
  - harm
  - calamity
  rationale: The Hebrew allows either moral or experiential nuance. To preserve theological tension rather than over-resolve, the main text keeps the broader 'evil' and a footnote notes the contextual alternative 'disaster.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
