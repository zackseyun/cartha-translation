id: ZEP.3.3
reference: Zephaniah 3:3
source:
  edition: WLC
  text: שָׂרֶ֣י/הָ בְ/קִרְבָּ֔/הּ אֲרָי֖וֹת שֹֽׁאֲגִ֑ים שֹׁפְטֶ֨י/הָ֙ זְאֵ֣בֵי עֶ֔רֶב
    לֹ֥א גָרְמ֖וּ לַ/בֹּֽקֶר׃
translation:
  text: Her officials within her are roaring lions; her judges are evening wolves;
    they leave nothing for the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they do not leave a bone until morning.' The Hebrew
      idiom pictures total, ravenous consumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֶיהָ
  chosen: her officials
  alternatives:
  - her princes
  - her rulers
  lexicon: HALOT
  rationale: שַׂר can denote a prince, chief, ruler, or official. In this denunciation
    of civic leadership, 'officials' communicates governing authorities in clear modern
    English without implying royal sons specifically.
- source_word: בקרבה
  chosen: within her
  alternatives:
  - in her midst
  lexicon: HALOT
  rationale: The phrase literally means 'in her midst/in her inner part.' 'Within
    her' is natural English and preserves the image of corrupt leadership operating
    inside the city.
- source_word: אריות שאגים
  chosen: are roaring lions
  alternatives:
  - are lions roaring
  - are growling lions
  lexicon: HALOT
  rationale: The verbless clause plus participle is well represented by 'are roaring
    lions.' 'Roaring' preserves the active predatory menace of שֹׁאֲגִים.
- source_word: שֹׁפְטֶיהָ
  chosen: her judges
  lexicon: HALOT
  rationale: The term straightforwardly refers to judicial authorities; 'judges' is
    the most direct rendering.
- source_word: זאבי ערב
  chosen: evening wolves
  alternatives:
  - wolves at dusk
  - wolves of the evening
  lexicon: HALOT
  rationale: The construct phrase is literally 'wolves of evening.' 'Evening wolves'
    is concise, idiomatic enough, and preserves the metaphor of predators emerging
    at nightfall.
- source_word: לא גרמו לבקר
  chosen: they leave nothing for the morning
  alternatives:
  - they do not leave a bone until morning
  - they gnaw no bones by morning
  lexicon: HALOT
  rationale: The clause is idiomatic and difficult. The verb גרם is associated with
    bones/gnawing, yielding the sense that these predators consume everything before
    morning. 'They leave nothing for the morning' communicates the force clearly in
    modern English while avoiding an obscure literalism in the main text.
