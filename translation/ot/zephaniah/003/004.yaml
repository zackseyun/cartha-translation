theological_decisions:
- issue: Scope of קֹדֶשׁ in priestly profanation
  chosen_reading: a broad reference to what is holy rather than a narrowed reference
    to the sanctuary alone
  alternative_readings:
  - the sanctuary
  - holy things
  rationale: The Hebrew does not explicitly specify the temple building, and the translation
    philosophy prefers preserving textual breadth rather than resolving ambiguity
    too narrowly. The broader rendering also fits the accusation against priests generally.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
