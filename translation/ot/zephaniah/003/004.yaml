id: ZEP.3.4
reference: Zephaniah 3:4
source:
  edition: WLC
  text: נְבִיאֶ֨י/הָ֙ פֹּֽחֲזִ֔ים אַנְשֵׁ֖י בֹּֽגְד֑וֹת כֹּהֲנֶ֨י/הָ֙ חִלְּלוּ קֹ֔דֶשׁ
    חָמְס֖וּ תּוֹרָֽה־׃
translation:
  text: Her prophets are reckless, treacherous men; her priests have profaned what
    is holy; they have done violence to the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the sanctuary" or "holy things" for "what is holy."
    reason: lexical_alternative
  - marker: b
    text: Or "instruction" for "the law" (Hebrew torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֶיהָ
  chosen: her prophets
  alternatives:
  - the prophets belonging to her
  lexicon: HALOT
  rationale: Construct plural of 'prophets' with 3fs suffix referring to the city/personified
    Jerusalem. 'Her prophets' is the natural English equivalent and preserves the
    possessive relation.
- source_word: פֹּחֲזִים
  chosen: reckless
  alternatives:
  - insolent
  - boastful
  - wanton
  - unstable
  lexicon: HALOT
  rationale: The adjective conveys rash, unrestrained, morally unstable behavior.
    'Reckless' captures both the ethical and behavioral force in clear modern English
    better than the more archaic 'light' or narrower 'boastful'.
- source_word: אַנְשֵׁי בֹּגְדוֹת
  chosen: treacherous men
  alternatives:
  - men of treacheries
  - faithless men
  - deceitful men
  lexicon: HALOT
  rationale: The construct phrase is literally 'men of treacheries/betrayals.' 'Treacherous
    men' is idiomatic English that preserves the plural abstract noun's force as a
    characterization of habitual betrayal. 'Men' is retained in keeping with the gender-accurate
    policy and because the Hebrew lexeme is explicitly masculine.
- source_word: כֹּהֲנֶיהָ
  chosen: her priests
  alternatives:
  - the priests belonging to her
  lexicon: HALOT
  rationale: Construct plural with 3fs suffix, parallel to 'her prophets.' 'Her priests'
    is the straightforward English rendering.
- source_word: חִלְּלוּ
  chosen: have profaned
  alternatives:
  - have defiled
  - have desecrated
  lexicon: HALOT
  rationale: Piel of חלל in cultic context means to profane or desecrate. 'Have profaned'
    best matches the verb's covenantal/cultic sense without overinterpreting the manner
    of defilement.
- source_word: קֹדֶשׁ
  chosen: what is holy
  alternatives:
  - the sanctuary
  - holy things
  - the holy place
  lexicon: HALOT
  rationale: The noun can denote holiness, a holy thing, or the sanctuary depending
    on context. Here the object of profanation is left somewhat broad in Hebrew. 'What
    is holy' preserves that breadth better than specifying 'sanctuary,' while remaining
    idiomatic.
- source_word: חָמְסוּ
  chosen: have done violence to
  alternatives:
  - have violated
  - have wronged
  - have treated violently
  lexicon: HALOT
  rationale: The verb from חמס carries the sense of violence, wrong, or violation.
    With 'law' as object, 'have done violence to' preserves the vivid metaphor of
    abusive distortion rather than flattening it to mere disobedience.
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - Torah
  lexicon: HALOT
  rationale: In prophetic literature תורה can mean instruction broadly or the covenantal
    law more specifically. Here, in parallel with priestly profanation, 'the law'
    best conveys the institutional and covenantal reference for English readers, while
    'instruction' is preserved as an alternative.
