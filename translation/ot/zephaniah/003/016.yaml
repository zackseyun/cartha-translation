id: ZEP.3.16
reference: Zephaniah 3:16
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא יֵאָמֵ֥ר לִ/ירֽוּשָׁלִַ֖ם אַל תִּירָ֑אִי צִיּ֖וֹן אַל
    יִרְפּ֥וּ יָדָֽיִ/ךְ־־׃
translation:
  text: On that day it will be said to Jerusalem, “Do not fear”; to Zion, “Do not
    let your hands grow weak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not let your hands drop' / 'Do not let your hands be slack.' The
      Hebrew idiom speaks of losing strength, resolve, or courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is idiomatic modern English
    and preserves the prophetic time reference without archaic tone.
- source_word: יֵאָמֵר
  chosen: it will be said
  alternatives:
  - one will say
  - they will say
  lexicon: HALOT
  rationale: Niphal imperfect of אמר is naturally rendered as an impersonal passive
    here. 'It will be said' preserves the Hebrew's unspecified speaker better than
    supplying 'they' or 'one'.
- source_word: לִירוּשָׁלַם
  chosen: to Jerusalem
  alternatives:
  - concerning Jerusalem
  lexicon: HALOT
  rationale: The preposition ל marks the addressee of the speech. 'To Jerusalem' is
    the most direct rendering.
- source_word: אַל תִּירָאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Negative jussive/imperfect addressed to a feminine singular addressee.
    'Do not fear' is concise, natural, and preserves the imperative force. 'Be afraid'
    is possible but slightly more expansive.
- source_word: צִיּוֹן
  chosen: to Zion
  alternatives:
  - O Zion
  - Zion
  lexicon: HALOT
  rationale: 'Though the Hebrew lacks an explicit preposition before ''Zion,'' the
    syntax continues the direct address begun with Jerusalem. Rendering ''to Zion''
    in English clarifies the parallelism: the same message is addressed to both city
    names personified as feminine singular.'
- source_word: אַל יִרְפּוּ יָדַיִךְ
  chosen: Do not let your hands grow weak
  alternatives:
  - Do not let your hands drop
  - Do not let your hands hang limp
  - Let not your hands be slack
  lexicon: HALOT
  rationale: רפה with 'hands' is an idiom for losing strength, resolve, or courage.
    'Grow weak' communicates the idiomatic sense in readable modern English while
    retaining the image of the hands. More literal options like 'drop' or 'be slack'
    are possible and worth preserving in a footnote.
