theological_decisions:
- issue: Personification of Jerusalem/Zion as feminine singular addressees
  chosen_reading: Retained the city-personification in direct address without expanding
    to 'people of Jerusalem/Zion.'
  alternative_readings:
  - Addressed to the inhabitants of Jerusalem/Zion
  rationale: The Hebrew directly addresses Jerusalem and Zion as feminine singular
    entities. Preserving the personified city imagery avoids importing an interpretive
    expansion while remaining clear in English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text says without paraphrastic expansion.'
