theological_decisions:
- issue: Semantic force of עָנִי וָדָל for the remnant
  chosen_reading: Rendered as 'humble and lowly'
  alternative_readings:
  - poor and needy
  - afflicted and weak
  rationale: The verse describes the remnant left after judgment not merely in socioeconomic
    terms but as marked by dependence on the LORD, confirmed by the following clause
    about taking refuge in his name. The chosen rendering preserves that theological
    posture without denying the social dimension.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's contested-terms policy for YHWH.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
