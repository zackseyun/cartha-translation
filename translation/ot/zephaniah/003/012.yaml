id: ZEP.3.12
reference: Zephaniah 3:12
source:
  edition: WLC
  text: וְ/הִשְׁאַרְתִּ֣י בְ/קִרְבֵּ֔/ךְ עַ֥ם עָנִ֖י וָ/דָ֑ל וְ/חָס֖וּ בְּ/שֵׁ֥ם יְהוָֽה׃
translation:
  text: But I will leave in your midst a people humble and lowly, and they will take
    refuge in the name of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a people afflicted and poor' or 'a poor and needy people.' The Hebrew
      terms can emphasize social affliction and poverty as well as humility and lowliness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁאַרְתִּי
  chosen: But I will leave
  alternatives:
  - And I will leave
  - I will cause to remain
  lexicon: HALOT
  rationale: Hiphil of שׁאר conveys causing to remain/leave behind. English 'leave'
    is natural and preserves divine agency. 'But' reflects the discourse contrast
    with the preceding judgment/restoration context, though the conjunction itself
    is simply waw.
- source_word: בְקִרְבֵּךְ
  chosen: in your midst
  alternatives:
  - within you
  - in the midst of you
  lexicon: HALOT
  rationale: The phrase denotes location among Zion/Jerusalem addressed as feminine
    singular. 'In your midst' is idiomatic and retains the corporate addressee.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  - people
  lexicon: HALOT
  rationale: Here עַם refers to a collective group belonging to the LORD within Jerusalem,
    best rendered 'a people' rather than the more political 'nation'.
- source_word: עָנִי
  chosen: humble
  alternatives:
  - afflicted
  - poor
  lexicon: HALOT
  rationale: עָנִי can denote affliction or poverty, but in this prophetic context
    describing the purified remnant's character and status, 'humble' captures both
    social lowliness and spiritual posture without over-narrowing to economics.
- source_word: וָדָל
  chosen: and lowly
  alternatives:
  - and poor
  - and weak
  lexicon: HALOT
  rationale: דַּל commonly denotes one who is poor, weak, or lowly. Paired with עָנִי,
    an English hendiadys-like rendering 'humble and lowly' communicates the remnant's
    modest, dependent condition in readable modern English.
- source_word: וְחָסוּ
  chosen: and they will take refuge
  alternatives:
  - and they will trust
  - and they will seek shelter
  lexicon: HALOT
  rationale: חסה regularly carries the imagery of seeking refuge/protection, often
    in God. 'Take refuge' preserves the metaphor better than the flatter 'trust'.
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  lexicon: HALOT
  rationale: The preposition with 'name' here expresses reliance on the revealed character
    and authority of God. 'In the name of' is the standard and most transparent rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
