theological_decisions:
- issue: Pastoral imagery in the final clause
  chosen_reading: Retained the sheep/flock imagery with 'graze and lie down' rather
    than abstracting to general peace and rest.
  alternative_readings:
  - they will feed and rest
  - they will live securely
  rationale: The Hebrew uses concrete pastoral language that evokes covenant peace
    and safety. Preserving the imagery maintains the prophetic texture without importing
    additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Remnant terminology
  chosen_reading: Rendered שְׁאֵרִית as 'remnant' in the main text.
  alternative_readings:
  - remainder
  - survivors
  rationale: In prophetic literature 'remnant' carries an established textual-theological
    sense of the preserved people of Israel. This is warranted by the Hebrew term
    itself and does not impose a sectarian interpretation.
  doctrine_reference: Translation philosophy §1, §5
