id: ZEP.3.13
reference: Zephaniah 3:13
source:
  edition: WLC
  text: שְׁאֵרִ֨ית יִשְׂרָאֵ֜ל לֹֽא יַעֲשׂ֤וּ עַוְלָה֙ וְ/לֹא יְדַבְּר֣וּ כָזָ֔ב וְ/לֹֽא
    יִמָּצֵ֥א בְּ/פִי/הֶ֖ם לְשׁ֣וֹן תַּרְמִ֑ית כִּֽי הֵ֛מָּה יִרְע֥וּ וְ/רָבְצ֖וּ
    וְ/אֵ֥ין מַחֲרִֽיד־־־־׃ס
translation:
  text: The remnant of Israel will do no wrong and speak no lies, and no deceitful
    tongue will be found in their mouth; for they will graze and lie down, with no
    one to make them afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no tongue of deceit will be found in their mouth.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause uses pastoral imagery: ''they will graze and lie down,''
      like a flock living in safety.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: The remnant of Israel
  alternatives:
  - The remainder of Israel
  - Israel's remnant
  lexicon: HALOT
  rationale: שְׁאֵרִית commonly denotes a surviving remainder/remnant. 'Remnant' preserves
    the prophetic-theological nuance of a preserved group without overparaphrase.
- source_word: יַעֲשׂוּ עַוְלָה
  chosen: will do no wrong
  alternatives:
  - will do no injustice
  - will commit no iniquity
  lexicon: HALOT
  rationale: עַוְלָה can denote wrong, injustice, or unrighteousness. 'Do no wrong'
    is natural English and broad enough to preserve the moral sense without narrowing
    it only to judicial injustice.
- source_word: יְדַבְּרוּ כָזָב
  chosen: speak no lies
  alternatives:
  - speak no falsehood
  - utter no deceit
  lexicon: HALOT
  rationale: כָזָב is falsehood/lie. 'Speak no lies' is idiomatic and direct, matching
    the verbal force of יְדַבְּרוּ.
- source_word: יִמָּצֵא בְּפִיהֶם
  chosen: will be found in their mouth
  alternatives:
  - will be found on their lips
  - will be found in their mouths
  lexicon: HALOT
  rationale: The singular noun with plural suffix is a collective idiom. 'In their
    mouth' is a close rendering of the Hebrew while remaining understandable in English.
- source_word: לְשׁוֹן תַּרְמִית
  chosen: deceitful tongue
  alternatives:
  - tongue of deceit
  - deceptive speech
  lexicon: HALOT
  rationale: The phrase is a Hebrew idiom for deceitful speech. 'Deceitful tongue'
    preserves the concrete imagery better than a fully abstract rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי here introduces the ground/resulting assurance for the preceding
    description. 'For' best preserves the explanatory connection.
- source_word: יִרְעוּ
  chosen: will graze
  alternatives:
  - will feed
  - will pasture
  lexicon: HALOT
  rationale: The verb literally refers to grazing/pasturing like sheep. 'Will graze'
    preserves the pastoral imagery and fits the following 'lie down'.
- source_word: וְרָבְצוּ
  chosen: and lie down
  alternatives:
  - and rest
  - and lie down to rest
  lexicon: HALOT
  rationale: רבץ is the standard verb for animals lying down. 'Lie down' keeps the
    sheep-like imagery intact rather than flattening it to 'rest'.
- source_word: אֵין מַחֲרִיד
  chosen: with no one to make them afraid
  alternatives:
  - and none will terrify them
  - with nothing to frighten them
  lexicon: HALOT
  rationale: The participle מַחֲרִיד denotes one causing terror. The English construction
    'with no one to make them afraid' is idiomatic and reflects the implied personal
    agent.
