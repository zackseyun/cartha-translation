id: ZEP.3.11
reference: Zephaniah 3:11
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא לֹ֤א תֵב֨וֹשִׁי֙ מִ/כֹּ֣ל עֲלִילֹתַ֔יִ/ךְ אֲשֶׁ֥ר פָּשַׁ֖עַתְּ
    בִּ֑/י כִּי אָ֣ז אָסִ֣יר מִ/קִּרְבֵּ֗/ךְ עַלִּיזֵי֙ גַּאֲוָתֵ֔/ךְ וְ/לֹֽא תוֹסִ֧פִי
    לְ/גָבְהָ֛ה ע֖וֹד בְּ/הַ֥ר קָדְשִֽׁ/י־׀־׃
translation:
  text: On that day you will not be put to shame because of all your deeds by which
    you rebelled against me, for then I will remove from your midst those who exult
    in your pride, and you will no longer be haughty on my holy mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not be ashamed.' The Hebrew verb can be rendered either as
      the state of shame or as being put to shame/disgraced.
    reason: lexical_alternative
  - marker: b
    text: Or 'your proudly exultant ones.' The Hebrew expression refers to people
      characterized by arrogant rejoicing.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵבֹושִׁי
  chosen: you will not be put to shame
  alternatives:
  - you will not be ashamed
  - you will not be disgraced
  lexicon: HALOT
  rationale: The verb בושׁ commonly denotes shame/disgrace. The passive-like English
    'be put to shame' fits the future sense well and avoids implying mere subjective
    embarrassment; it captures the state/result in context of restored Zion.
- source_word: מִכֹּל עֲלִילֹתַיִךְ
  chosen: because of all your deeds
  alternatives:
  - for all your deeds
  - from all your acts
  lexicon: HALOT
  rationale: עֲלִילָה can mean deed, act, or practice, often with moral coloring from
    context. 'Deeds' is natural English and broad enough to include the sinful actions
    specified by the following clause. The preposition מִן after בושׁ is rendered
    idiomatically as 'because of' rather than woodenly 'from'.
- source_word: פָּשַׁעַתְּ בִּי
  chosen: you rebelled against me
  alternatives:
  - you transgressed against me
  - you sinned against me
  lexicon: HALOT
  rationale: פשע emphasizes rebellion/breach rather than generic sin. 'Rebelled against
    me' best preserves the covenantal and relational force of the verb with בִּי.
- source_word: אָסִיר
  chosen: I will remove
  alternatives:
  - I will take away
  - I will turn aside
  lexicon: HALOT
  rationale: The Hiphil of סור/סיר here has the causative sense of removing or taking
    away. 'Remove' is concise and idiomatic in the judgment-restoration context.
- source_word: מִקִּרְבֵּךְ
  chosen: from your midst
  alternatives:
  - from within you
  - out of your midst
  lexicon: HALOT
  rationale: A standard idiom for removal from the community/city. 'From your midst'
    preserves the communal sense better than the more individualizing 'from within
    you'.
- source_word: עַלִּיזֵי גַּאֲוָתֵךְ
  chosen: those who exult in your pride
  alternatives:
  - your proudly exultant ones
  - the jubilant ones of your arrogance
  - those who rejoice in your majesty
  lexicon: HALOT
  rationale: עַלִּיזֵי are exultant/rejoicing ones; גַּאֲוָה here is negative in context,
    hence 'pride' rather than a more positive 'majesty.' The construct relationship
    is rendered idiomatically as people characterized by or delighting in that pride.
- source_word: וְלֹא תוֹסִפִי לְגָבְהָה עוֹד
  chosen: and you will no longer be haughty
  alternatives:
  - and you will not again exalt yourself
  - and you will no longer act proudly
  lexicon: HALOT
  rationale: The idiom 'not continue/add to' + infinitive means 'no longer' or 'not
    again.' גבה in this context refers to arrogance rather than physical height, so
    'be haughty' best captures the moral sense.
- source_word: בְּהַר קָדְשִׁי
  chosen: on my holy mountain
  alternatives:
  - in my holy mountain
  - at my holy mountain
  lexicon: HALOT
  rationale: The phrase refers to Zion as the LORD's holy mountain. 'On' is the most
    natural English preposition for the image while preserving the locative sense.
