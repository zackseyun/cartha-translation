theological_decisions:
- issue: Whether the opening promise means the people will feel no shame at all, or
    specifically will no longer stand disgraced on account of former rebellion after
    divine purification.
  chosen_reading: The verse promises removal of disgrace tied to past rebellious deeds
    in the context of restoration, not denial that those deeds were shameful.
  alternative_readings:
  - The people will simply not feel shame anymore
  - The verse means they are innocent of former deeds
  rationale: The clause 'because of all your deeds by which you rebelled against me'
    grounds the shame in real past sin, while the following 'for then I will remove...'
    explains that the end of shame comes through God's purifying action. The translation
    therefore preserves both guilt and restoration without flattening either.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
