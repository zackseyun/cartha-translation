id: ZEP.3.1
reference: Zephaniah 3:1
source:
  edition: WLC
  text: ה֥וֹי מֹרְאָ֖ה וְ/נִגְאָלָ֑ה הָ/עִ֖יר הַ/יּוֹנָֽה׃
translation:
  text: Woe to the rebellious and defiled city, the oppressing one!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and polluted.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַיּוֹנָה could be read more literally as 'the dove,' but in context
      it is commonly understood as a figurative description of the city as oppressive.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation or lament. 'Woe' is the standard
    English equivalent in prophetic judgment contexts and preserves the force better
    than the softer 'Ah' or 'Alas.'
- source_word: מֹרְאָה
  chosen: rebellious
  alternatives:
  - defiant
  - filthy
  lexicon: HALOT
  rationale: From the root מרה ('to be rebellious'). In context it characterizes the
    city morally as resistant to correction and authority. 'Rebellious' best reflects
    the verbal root and prophetic accusation. 'Filthy' reflects a different interpretive
    tradition but is less directly tied to the root.
- source_word: וְנִגְאָלָה
  chosen: and defiled
  alternatives:
  - and polluted
  - and redeemed
  lexicon: HALOT
  rationale: The Niphal feminine singular from גאל here is widely understood in context
    as 'defiled/polluted,' likely reflecting a semantic development or textual vocalization
    tradition in this prophetic denunciation. Although the more common sense of גאל
    is 'redeem,' that meaning is contextually impossible here. 'Defiled' communicates
    moral and cultic corruption clearly; 'polluted' is a close alternative preserved
    in a footnote.
- source_word: הָעִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר. 'City' is the normal and contextually
    appropriate English equivalent.
- source_word: הַיּוֹנָה
  chosen: the oppressing one
  alternatives:
  - the oppressive one
  - the dove
  lexicon: HALOT
  rationale: Traditionally connected here with a verbal idea of oppression/tyranny
    in context, yielding a moral description of the city. Although the form could
    be read as 'dove' from יונה, that sense does not fit the denunciatory parallelism
    as well. 'The oppressing one' makes the predicative force clear in English while
    preserving the article.
