id: ZEP.3.8
reference: Zephaniah 3:8
source:
  edition: WLC
  text: לָ/כֵ֤ן חַכּוּ לִ/י֙ נְאֻם יְהוָ֔ה לְ/י֖וֹם קוּמִ֣/י לְ/עַ֑ד כִּ֣י מִשְׁפָּטִ/י֩ לֶ/אֱסֹ֨ף גּוֹיִ֜ם לְ/קָבְצִ֣/י מַמְלָכ֗וֹת לִ/שְׁפֹּ֨ךְ עֲלֵי/הֶ֤ם זַעְמִ/י֙ כֹּ֚ל חֲר֣וֹן אַפִּ֔/י כִּ֚י בְּ/אֵ֣שׁ קִנְאָתִ֔/י תֵּאָכֵ֖ל כָּל הָ/אָֽרֶץ־־־׃
translation:
  text: Therefore wait for me, declares Yahweh, for the day when I rise up for plunder; for my judgment is to gather nations, to assemble kingdoms, to pour out on them my indignation, all my burning anger; for in the fire of my jealousy all the earth will be consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for the day when I rise up for prey.” The Hebrew term rendered “as a witness” is difficult and may be understood differently.
    reason: alternative_reading
  - marker: b
    text: “Jealousy” may also be rendered “zeal.”
    reason: lexical_alternative
  - marker: c
    text: “Earth” may also be translated “land,” but the broader context of nations and kingdoms supports the wider sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential connective linking the coming judgment to the preceding context.
- source_word: חַכּוּ לִי
  chosen: wait for me
  alternatives:
  - wait for me expectantly
  - wait on me
  lexicon: HALOT
  rationale: Imperative plural of חכה with ל marks waiting directed toward YHWH. 'Wait for me' is natural English and preserves the relational object.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. 'Declares the LORD' is idiomatic, readable, and preserves prophetic authority. YHWH rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לְיוֹם קוּמִי
  chosen: for the day when I rise up
  alternatives:
  - for the day of my rising
  - until the day I arise
  lexicon: HALOT
  rationale: The preposition with 'day' plus infinitive/verb form points to a future time. 'When I rise up' is clear and preserves the divine action imagery.
- source_word: לְעַד
  chosen: as a witness
  alternatives:
  - for witness
  - for testimony
  - for prey
  lexicon: HALOT
  rationale: The consonantal text can be understood as 'witness/testimony,' which fits the legal-judicial context introduced by 'my judgment.' Some traditions render 'prey' from a different vocalization/sense, but 'witness' better suits the immediate context of judicial gathering and sentencing.
- source_word: מִשְׁפָּטִי
  chosen: my judgment
  alternatives:
  - my decision
  - my decree
  - my justice
  lexicon: HALOT
  rationale: Here מִשְׁפָּט refers to YHWH's judicial determination. 'Judgment' best fits the following infinitives describing the sentence enacted.
- source_word: לֶאֱסֹף גּוֹיִם
  chosen: to gather nations
  alternatives:
  - to collect nations
  lexicon: HALOT
  rationale: Straightforward infinitive construction expressing the content of the divine judgment.
- source_word: לְקָבְצִי מַמְלָכוֹת
  chosen: to assemble kingdoms
  alternatives:
  - to gather kingdoms
  lexicon: HALOT
  rationale: Using 'assemble' avoids awkward repetition while preserving the near-synonymous parallelism with the previous clause.
- source_word: לִשְׁפֹּךְ עֲלֵיהֶם זַעְמִי
  chosen: to pour out on them my indignation
  alternatives:
  - to pour out on them my wrath
  - to pour out my fury on them
  lexicon: HALOT
  rationale: The idiom 'pour out' is retained. זעם denotes divine anger/fury; 'indignation' is weighty without sounding archaic, and distinguishes it from the next anger term.
- source_word: כֹּל חֲרוֹן אַפִּי
  chosen: all my burning anger
  alternatives:
  - all the heat of my anger
  - all my fierce anger
  - all my wrathful anger
  lexicon: HALOT
  rationale: חֲרוֹן אַף is an idiom for burning/fierce anger. 'Burning anger' preserves the metaphor and avoids redundancy with 'indignation' while intensifying the line.
- source_word: בְּאֵשׁ קִנְאָתִי
  chosen: in the fire of my jealousy
  alternatives:
  - by the fire of my zeal
  - in the fire of my zeal
  lexicon: HALOT
  rationale: קִנְאָה can mean jealousy or zeal. In divine covenantal judgment contexts, 'jealousy' preserves the relational exclusivity nuance, while 'fire' keeps the metaphor explicit.
- source_word: תֵּאָכֵל כָּל הָאָרֶץ
  chosen: all the earth will be consumed
  alternatives:
  - the whole land will be devoured
  - all the land will be consumed
  lexicon: HALOT
  rationale: אָ֫רֶץ can mean 'earth' or 'land.' Given the universal scope of gathered nations and kingdoms, 'earth' is preferable here. Passive 'will be consumed' reflects the Niphal.
