  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of לְעַד
  chosen_reading: as a witness
  alternative_readings:
  - for prey
  rationale: The Hebrew form is difficult and has been rendered in two major ways. The judicial context ('my judgment,' gathering nations for sentencing) favors 'witness/testimony' in the main text. The alternative is preserved in a footnote because it is a meaningful interpretive option reflected in some translations.
