theological_decisions:
- issue: Referent of the feminine singular ('her dwelling') and subsequent plural
    verbs
  chosen_reading: The verse addresses Jerusalem/Zion personified as a woman, then
    shifts to the people collectively in the plural.
  alternative_readings:
  - The feminine could refer more broadly to the nation or city-state without personification.
  rationale: The feminine suffix on 'her dwelling' naturally fits the city personified,
    while the plural verbs at the end refer to the inhabitants. The translation preserves
    the shift rather than smoothing it out.
- issue: Force of the clause about judgment ('all that I had appointed against her')
  chosen_reading: 'The clause is rendered as part of the unrealized result: had she
    feared and accepted correction, her dwelling would not have been cut off in accordance
    with the judgments appointed against her.'
  alternative_readings:
  - 'The clause could be taken concessively: ''so her dwelling would not be cut off—despite
    all that I had appointed against her.'''
  rationale: The Hebrew is syntactically compressed and debated. The chosen reading
    best fits the flow from divine expectation to tragic refusal, while avoiding overstatement
    beyond the text. The concessive alternative is preserved in a footnote.
