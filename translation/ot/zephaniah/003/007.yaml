id: ZEP.3.7
reference: Zephaniah 3:7
source:
  edition: WLC
  text: אָמַ֜רְתִּי אַךְ תִּירְאִ֤י אוֹתִ/י֙ תִּקְחִ֣י מוּסָ֔ר וְ/לֹֽא יִכָּרֵ֣ת מְעוֹנָ֔/הּ
    כֹּ֥ל אֲשֶׁר פָּקַ֖דְתִּי עָלֶ֑י/הָ אָכֵן֙ הִשְׁכִּ֣ימוּ הִשְׁחִ֔יתוּ כֹּ֖ל עֲלִילוֹתָֽ/ם־־־׃
translation:
  text: I said, ‘Surely you will fear me; you will accept correction. Then her dwelling
    would not be cut off according to all that I had appointed against her.’ But instead,
    they rose early; they corrupted all their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “Then her dwelling would not be cut off, despite all that
      I had appointed against her.”
    reason: alternative_reading
  - marker: b
    text: “Rose early” is a Hebrew idiom that can imply eagerness or persistence.
    reason: cultural_note
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: Straightforward first-person perfect of אמר. 'I said' preserves the direct
    divine speech framing; 'I thought' is possible idiomatically but less direct.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - only
  - indeed
  lexicon: HALOT
  rationale: 'Here אַךְ introduces an expectation or confident assertion rather than
    limitation. ''Surely'' fits the rhetorical force: God expected Jerusalem to respond.'
- source_word: תִּירְאִי אוֹתִי
  chosen: you will fear me
  alternatives:
  - you will revere me
  lexicon: HALOT
  rationale: ירא with God commonly denotes fear/reverence. 'Fear me' is the more direct
    and biblically resonant rendering; 'revere me' softens the term beyond the Hebrew.
- source_word: תִּקְחִי מוּסָר
  chosen: you will accept correction
  alternatives:
  - you will receive instruction
  - you will take discipline
  lexicon: HALOT
  rationale: לקח + מוסר idiomatically means to receive/accept discipline or correction.
    'Accept correction' is natural English and preserves the moral-disciplinary sense.
- source_word: וְלֹא יִכָּרֵת
  chosen: would not be cut off
  alternatives:
  - would not be destroyed
  - would not be removed
  lexicon: HALOT
  rationale: Niphal of כרת often means 'be cut off.' The modal sense in context is
    conditional/resultative from the preceding expectation. 'Cut off' preserves the
    covenant-judgment nuance better than a flatter 'destroyed.'
- source_word: מְעוֹנָהּ
  chosen: her dwelling
  alternatives:
  - her habitation
  - her abode
  lexicon: HALOT
  rationale: The noun denotes dwelling place/habitation. The feminine suffix refers
    to the city/personified community. 'Dwelling' is clear modern English.
- source_word: כֹּל אֲשֶׁר פָּקַדְתִּי עָלֶיהָ
  chosen: according to all that I had appointed against her
  alternatives:
  - despite all that I had appointed against her
  - with respect to all that I had charged upon her
  - all that I had visited upon her
  lexicon: HALOT
  rationale: פקד can mean appoint, visit, attend to, punish. In this context the clause
    is difficult; the sense is that her dwelling need not have been cut off in line
    with the judgments decreed against her, had she responded rightly. 'Appointed
    against her' preserves divine determination without overinterpreting as already
    executed punishment.
- source_word: אָכֵן
  chosen: But instead
  alternatives:
  - surely
  - indeed
  - however
  lexicon: HALOT
  rationale: Although often 'surely/indeed,' here it marks a sharp adversative turn
    from expected repentance to actual corruption. 'But instead' makes the contrast
    explicit in idiomatic English.
- source_word: הִשְׁכִּימוּ
  chosen: they rose early
  alternatives:
  - they were eager
  - they acted early
  lexicon: HALOT
  rationale: Hiphil of שׁכם literally means to rise early. In prophetic idiom it can
    imply eagerness or persistence, but the literal phrase is retained and the implication
    is left to context.
- source_word: הִשְׁחִיתוּ
  chosen: they corrupted
  alternatives:
  - they ruined
  - they acted corruptly
  lexicon: HALOT
  rationale: Hiphil of שׁחת can mean spoil, ruin, corrupt. 'They corrupted' works
    transitively with 'all their deeds' and reflects moral degeneration.
- source_word: כֹּל עֲלִילוֹתָם
  chosen: all their deeds
  alternatives:
  - all their actions
  - all their practices
  lexicon: HALOT
  rationale: עלילות refers to deeds/actions, often with moral coloring in context.
    'Deeds' is concise and preserves the evaluative tone.
