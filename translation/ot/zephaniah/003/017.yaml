theological_decisions:
- issue: Meaning of יחריש באהבתו
  chosen_reading: he will be quiet in his love
  alternative_readings:
  - he will quiet you with his love
  - he will renew you in his love
  rationale: The Hebrew syntax lacks an explicit object for 'quiet,' so 'he will quiet
    you' is interpretive rather than strictly textual. The chosen reading preserves
    the ambiguity/tension of the Hebrew and follows the project's source-text primacy.
    Because the alternative is well known and pastorally/theologically significant,
    it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
