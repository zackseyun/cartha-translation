id: ZEP.3.17
reference: Zephaniah 3:17
source:
  edition: WLC
  text: יְהוָ֧ה אֱלֹהַ֛יִ/ךְ בְּ/קִרְבֵּ֖/ך גִּבּ֣וֹר יוֹשִׁ֑יעַ יָשִׂ֨ישׂ עָלַ֜יִ/ךְ
    בְּ/שִׂמְחָ֗ה יַחֲרִישׁ֙ בְּ/אַ֣הֲבָת֔/וֹ יָגִ֥יל עָלַ֖יִ/ךְ בְּ/רִנָּֽה׃
translation:
  text: The LORD your God is in your midst, a mighty one who saves; he will rejoice
    over you with gladness; he will be quiet in his love; he will exult over you with
    singing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will quiet you with his love.' Another less likely interpretive
      rendering is, 'he will renew you in his love.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהַיִךְ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: With the 2fs suffix, the phrase addresses daughter Zion/Jerusalem corporately
    as feminine singular. In English, 'your God' best reflects covenantal address
    and standard monotheistic reference.
- source_word: בקרבך
  chosen: in your midst
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: The phrase denotes presence in the community's center. 'In your midst'
    is idiomatic, preserves the locative force, and fits prophetic covenant-presence
    language.
- source_word: גבור
  chosen: a mighty one
  alternatives:
  - mighty
  - warrior
  - hero
  lexicon: HALOT
  rationale: The adjective/substantive conveys strength or warrior-like might. 'A
    mighty one' preserves the nominal force without over-specifying military imagery,
    while still pairing naturally with the following saving verb.
- source_word: יושיע
  chosen: who saves
  alternatives:
  - he saves
  - who will save
  - a savior
  lexicon: HALOT
  rationale: 'Although morphologically imperfect, in apposition to ''a mighty one''
    it functions well in English as a relative description: ''a mighty one who saves.''
    This preserves both the verbal sense and the descriptive linkage.'
- source_word: ישיש
  chosen: he will rejoice
  alternatives:
  - he will exult
  - he will delight greatly
  lexicon: HALOT
  rationale: The verb expresses exuberant joy. 'Rejoice' is natural modern English
    and avoids redundancy with the later גִּיל, which is rendered differently for
    stylistic and lexical distinction.
- source_word: בשמחה
  chosen: with gladness
  alternatives:
  - with joy
  - in joy
  lexicon: HALOT
  rationale: '''With gladness'' gives a smooth English collocation and avoids repeating
    ''joy'' too many times in the verse while preserving the noun''s positive affective
    sense.'
- source_word: יחריש באהבתו
  chosen: he will be quiet in his love
  alternatives:
  - he will quiet you with his love
  - he will be silent in his love
  - he will renew you in his love
  lexicon: HALOT
  rationale: The Hebrew most directly means 'be silent/quiet in his love.' A long-standing
    interpretive translation reads 'quiet you with his love,' but that introduces
    an object not present in the Hebrew. 'Renew you' reflects a different textual/interpretive
    tradition and is less likely from the consonantal text. The chosen rendering preserves
    the source text's plain sense and theological tension.
- source_word: יגיל
  chosen: he will exult
  alternatives:
  - he will rejoice
  - he will be glad
  lexicon: HALOT
  rationale: This verb also denotes joyful exultation. Rendering it as 'exult' differentiates
    it from the earlier ישיש while preserving the heightened celebratory sense.
- source_word: ברנה
  chosen: with singing
  alternatives:
  - with a shout of joy
  - with ringing cries
  lexicon: HALOT
  rationale: The noun denotes ringing cry, joyful shout, or song. 'With singing' is
    a clear and traditional English rendering that fits the context of divine rejoicing.
