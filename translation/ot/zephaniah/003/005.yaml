id: ZEP.3.5
reference: Zephaniah 3:5
source:
  edition: WLC
  text: יְהוָ֤ה צַדִּיק֙ בְּ/קִרְבָּ֔/הּ לֹ֥א יַעֲשֶׂ֖ה עַוְלָ֑ה בַּ/בֹּ֨קֶר בַּ/בֹּ֜קֶר
    מִשְׁפָּט֨/וֹ יִתֵּ֤ן לָ/אוֹר֙ לֹ֣א נֶעְדָּ֔ר וְ/לֹֽא יוֹדֵ֥עַ עַוָּ֖ל בֹּֽשֶׁת־׃
translation:
  text: The LORD is righteous in her midst; he does no injustice. Morning by morning
    he brings his justice to light; it does not fail. But the unjust knows no shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he brings his judgment to light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and standard English Bible convention.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Predicative adjective describing the LORD's moral character. 'Righteous'
    preserves the covenantal and moral sense better than the more narrowly judicial
    'just,' though the judicial nuance remains in context.
- source_word: בְּקִרְבָּהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: The 3fs suffix refers back to the city/personified Jerusalem. 'In her
    midst' preserves both the locative sense and the feminine personification present
    in Hebrew.
- source_word: לֹא יַעֲשֶׂה עַוְלָה
  chosen: he does no injustice
  alternatives:
  - he does no wrong
  - he commits no unrighteousness
  lexicon: HALOT
  rationale: The verbal phrase states that the LORD does not act unjustly. 'Does no
    injustice' keeps the ethical/judicial force of עַוְלָה and reads naturally in
    English.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: Morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repetition marks regular, continual action. 'Morning by morning'
    is idiomatic and preserves the Hebrew distributive repetition.
- source_word: מִשְׁפָּטוֹ
  chosen: his justice
  alternatives:
  - his judgment
  - his ordinance
  lexicon: HALOT
  rationale: In this context the word refers to the LORD's just judicial action being
    manifested. 'Justice' fits the parallel with righteousness and injustice, while
    'judgment' is possible but can sound more like a single verdict than the ongoing
    exercise of justice.
- source_word: יִתֵּן לָאוֹר
  chosen: he brings his justice to light
  alternatives:
  - he sets forth his judgment at dawn
  - he gives it to the light
  lexicon: HALOT
  rationale: Literally 'he gives to the light,' an idiom for bringing something into
    the open or making it manifest. The chosen rendering preserves the imagery while
    making the idiom clear in English.
- source_word: לֹא נֶעְדָּר
  chosen: it does not fail
  alternatives:
  - it is not lacking
  - it does not go missing
  lexicon: HALOT
  rationale: The Niphal conveys absence/lack. Here it means the daily manifestation
    of God's justice never fails to appear. 'It does not fail' is concise and idiomatic.
- source_word: וְלֹא יוֹדֵעַ עַוָּל בֹּשֶׁת
  chosen: But the unjust knows no shame
  alternatives:
  - and the unjust knows no shame
  - but the wrongdoer knows no shame
  lexicon: HALOT
  rationale: עַוָּל is a substantival adjective/noun, 'the unjust' or 'wrongdoer.'
    The conjunction is rendered adversatively ('But') to bring out the contrast between
    the LORD's unfailing justice and the shamelessness of the wicked. 'Knows no shame'
    is the natural English equivalent of the Hebrew idiom.
