theological_decisions:
- issue: Referent and gender of the pronominal suffix in בְּקִרְבָּהּ
  chosen_reading: The feminine suffix refers to the city/personified Jerusalem/Zion,
    rendered 'in her midst.'
  alternative_readings:
  - in its midst
  rationale: Hebrew uses a feminine suffix, and the surrounding context addresses
    the city as a feminine entity. Retaining 'her' preserves the source-text personification
    rather than flattening it to impersonal 'its.'
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Sense of מִשְׁפָּטוֹ in context
  chosen_reading: Rendered as 'his justice' rather than 'his judgment.'
  alternative_readings:
  - his judgment
  rationale: The verse emphasizes the LORD's righteous character and lack of injustice;
    'justice' better preserves the thematic contrast with עַוְלָה/עַוָּל. 'Judgment'
    remains a viable lexical alternative and is preserved in a footnote.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
