id: ZEP.3.6
reference: Zephaniah 3:6
source:
  edition: WLC
  text: הִכְרַ֣תִּי גוֹיִ֗ם נָשַׁ֨מּוּ֙ פִּנּוֹתָ֔/ם הֶחֱרַ֥בְתִּי חֽוּצוֹתָ֖/ם מִ/בְּלִ֣י
    עוֹבֵ֑ר נִצְדּ֧וּ עָרֵי/הֶ֛ם מִ/בְּלִי אִ֖ישׁ מֵ/אֵ֥ין יוֹשֵֽׁב־׃
translation:
  text: I have cut off nations; their corner towers are laid waste. I have made their
    streets desolate, with no one passing through. Their cities are devastated, without
    a man, with no inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their corners,' possibly referring to corner fortifications or towers.
    reason: lexical_alternative
  - marker: b
    text: Or 'their squares' or 'their open places.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'without a man'; an idiom here for complete depopulation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכְרַתִּי
  chosen: I have cut off
  alternatives:
  - I cut off
  - I destroyed
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means to cut off, remove, or destroy. 'Cut
    off' preserves the concrete Hebrew idiom while remaining natural in English. The
    perfect is rendered with present relevance ('have cut off') in this prophetic
    divine speech.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: גוי commonly denotes nations/peoples. 'Nations' is the most standard
    and contextually fitting term for foreign political entities under judgment.
- source_word: נָשַׁמּוּ
  chosen: are laid waste
  alternatives:
  - are desolated
  - are devastated
  lexicon: HALOT
  rationale: From שמם, expressing devastation/desolation. 'Are laid waste' is idiomatic
    English and fits the passive/resultative sense.
- source_word: פִּנּוֹתָם
  chosen: their corner towers
  alternatives:
  - their corners
  - their battlements
  - their strongholds
  lexicon: HALOT
  rationale: Literally 'their corners,' but in city-destruction contexts this likely
    refers to corner structures or defensive towers. 'Corner towers' makes the architectural
    sense explicit without over-paraphrasing.
- source_word: הֶחֱרַבְתִּי
  chosen: I have made desolate
  alternatives:
  - I have destroyed
  - I have laid waste
  lexicon: HALOT
  rationale: The Hiphil of חרב can mean to make dry/waste, devastate, or destroy.
    Here it governs streets/public places, so 'made desolate' best matches the image
    of emptied urban space.
- source_word: חוּצוֹתָם
  chosen: their streets
  alternatives:
  - their open places
  - their squares
  lexicon: HALOT
  rationale: חוּץ in the plural often refers to streets or public places of a city.
    'Streets' is the clearest modern equivalent, though 'squares' remains possible.
- source_word: מִבְּלִי עוֹבֵר
  chosen: with no one passing through
  alternatives:
  - so that none passes through
  - without a passerby
  lexicon: HALOT
  rationale: The phrase expresses total abandonment. 'With no one passing through'
    is natural English and preserves the participial sense of ongoing passage.
- source_word: נִצְדּוּ
  chosen: are devastated
  alternatives:
  - are laid waste
  - are ruined
  lexicon: HALOT
  rationale: The verb is difficult and comparatively rare; in context it clearly conveys
    ruin/devastation of cities. 'Are devastated' avoids false precision while matching
    the parallelism.
- source_word: עָרֵיהֶם
  chosen: their cities
  alternatives:
  - their towns
  lexicon: HALOT
  rationale: Standard rendering of עיר in this judgment context.
- source_word: מִבְּלִי אִישׁ
  chosen: without a man
  alternatives:
  - without anyone
  - without a person
  lexicon: HALOT
  rationale: In keeping with the project's gender-accurate policy, אִישׁ is rendered
    'man' rather than neutralized. In context it functions idiomatically for absence
    of human presence, but the Hebrew form is singular masculine.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: with no inhabitant
  alternatives:
  - without anyone living there
  - with none dwelling there
  lexicon: HALOT
  rationale: The phrase intensifies the picture of depopulation. 'No inhabitant' is
    concise and idiomatic, preserving the nominal force of the Hebrew expression.
