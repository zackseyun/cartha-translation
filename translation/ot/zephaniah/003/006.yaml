theological_decisions:
- issue: Gendered term אִישׁ in a depopulation formula
  chosen_reading: without a man
  alternative_readings:
  - without anyone
  - without a person
  rationale: The Hebrew uses the masculine singular noun אִישׁ. Per the translation
    philosophy, gender-accurate renderings are preferred over gender-neutral ones
    unless context requires otherwise. Here the phrase is part of a stock expression
    for total depopulation; the following clause clarifies the broader sense ('no
    inhabitant').
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
