id: ZEP.3.18
reference: Zephaniah 3:18
source:
  edition: WLC
  text: נוּגֵ֧י מִ/מּוֹעֵ֛ד אָסַ֖פְתִּי מִמֵּ֣/ךְ הָי֑וּ מַשְׂאֵ֥ת עָלֶ֖י/הָ חֶרְפָּֽה׃
translation:
  text: I have gathered those grieving because of the appointed festival from you;
    they were a burden on her, a reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those afflicted from the appointed assembly'; the Hebrew is difficult,
      and the phrase may refer either to people grieving because they are deprived
      of the festival or to those removed from the festal gathering.
    reason: alternative_reading
  - marker: b
    text: Or 'I gathered' or, in prophetic context, 'I will gather.'
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'her' likely refers to Zion/Jerusalem.
    reason: cross_reference
lexical_decisions:
- source_word: נוּגֵי
  chosen: those grieving
  alternatives:
  - those afflicted
  - those sorrowful
  - those who mourn
  lexicon: HALOT
  rationale: The form is best taken as a substantive participial/adjectival expression
    describing people in a state of grief or affliction. 'Those grieving' preserves
    the personal reference and emotional force without over-specifying the cause.
- source_word: מִמּוֹעֵד
  chosen: because of the appointed festival
  alternatives:
  - from the appointed assembly
  - away from the festival
  - because of the appointed time
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time or festival assembly in cultic
    contexts. In this context of Zion's restoration, the sense likely concerns grief
    connected with the loss of festal gathering. 'Because of the appointed festival'
    captures the causal nuance often recognized here, though the Hebrew preposition
    can be understood in more than one way.
- source_word: אָסַפְתִּי
  chosen: I have gathered
  alternatives:
  - I gathered
  - I will gather
  lexicon: HALOT
  rationale: The qatal 1cs is formally past/perfect. In prophetic discourse it may
    function with future force, but here 'I have gathered' preserves the Hebrew form
    while remaining natural in English. The surrounding restoration context allows
    either a prophetic perfect or a simple perfective statement.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  - away from you
  lexicon: HALOT
  rationale: The 2fs suffix refers to the feminine addressee, likely Zion/Jerusalem.
    'From you' is the most direct rendering and leaves the relational nuance intact.
- source_word: הָיוּ
  chosen: they were
  alternatives:
  - they have become
  lexicon: HALOT
  rationale: Simple copular past fits the clause naturally and reflects the Hebrew
    verb without expansion.
- source_word: מַשְׂאֵת
  chosen: a burden
  alternatives:
  - an uplifted thing
  - a load
  - an oracle
  lexicon: HALOT
  rationale: Here the noun is best understood in the sense of a load or burden, not
    'oracle.' The context is social disgrace borne in relation to Zion/her people.
- source_word: עָלֶיהָ
  chosen: on her
  alternatives:
  - upon her
  - against her
  lexicon: HALOT
  rationale: The preposition על with 3fs suffix is rendered straightforwardly. 'On
    her' works idiomatically with 'burden' and preserves the feminine referent, likely
    Zion.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - shame
  - taunt
  lexicon: HALOT
  rationale: חרפה regularly denotes reproach, disgrace, or shame. 'Reproach' preserves
    both the social and verbal dimensions of public dishonor.
