theological_decisions:
- issue: Syntactic ambiguity of the verse and referents
  chosen_reading: The verse speaks of the LORD gathering people from Zion who grieve
    over the loss of the appointed festival; these people had been a burden of reproach
    upon her.
  alternative_readings:
  - The verse speaks of removing from Zion the reproach associated with those excluded
    from the festival.
  - 'The final clause may be rendered more appositionally: ''the reproach upon her
    was a burden for them.'''
  rationale: The Hebrew is notably compressed and difficult. The chosen rendering
    preserves the main verbal action ('I have gathered') and keeps the final clause
    close to the Masoretic wording without importing a stronger interpretive paraphrase
    than necessary. This maintains the restoration theme while respecting the text's
    ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
