id: ZEP.3.10
reference: Zephaniah 3:10
source:
  edition: WLC
  text: מֵ/עֵ֖בֶר לְ/נַֽהֲרֵי כ֑וּשׁ עֲתָרַ/י֙ בַּת פוּצַ֔/י יוֹבִל֖וּ/ן מִנְחָתִֽ/י־־׃
translation:
  text: From beyond the rivers of Cush, my worshipers, the daughter of my dispersed
    ones, will bring my offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my suppliants' instead of 'my worshipers.' The Hebrew term likely refers
      to those who pray or entreat, and by extension those who worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'the daughter of my scattered ones.' The Hebrew expression is compact
      and may function as a poetic title for a dispersed community.
    reason: alternative_reading
  - marker: c
    text: '''Cush'' refers to the ancient region south of Egypt, not precisely the
      same as modern Ethiopia.'
    reason: cultural_note
lexical_decisions:
- source_word: מֵעֵבֶר
  chosen: from beyond
  alternatives:
  - from across
  - from the far side of
  lexicon: HALOT
  rationale: The preposition מִן with עֵבֶר denotes origin from the region beyond
    or across a boundary. 'From beyond' is natural English and preserves the geographic
    sense without over-specifying distance.
- source_word: לְנַהֲרֵי כוּשׁ
  chosen: the rivers of Cush
  alternatives:
  - the rivers of Ethiopia
  - the streams of Cush
  lexicon: HALOT
  rationale: כוּשׁ is best transliterated as the place-name 'Cush' rather than updated
    to 'Ethiopia,' since the ancient geographic referent is broader and not identical
    to the modern nation-state. 'Rivers' follows the plural construct naturally.
- source_word: עֲתָרַי
  chosen: my worshipers
  alternatives:
  - my suppliants
  - those who entreat me
  lexicon: HALOT
  rationale: From עתר, the noun form here likely refers to those who pray or make
    supplication. In context of restored nations bringing tribute to the LORD, 'my
    worshipers' captures the devotional sense in idiomatic English, while the more
    specific nuance 'suppliants' is preserved as an alternative.
- source_word: בַּת
  chosen: the daughter of
  alternatives:
  - the daughter
  - daughter
  lexicon: HALOT
  rationale: The construct בַּת commonly introduces a collective or personified group
    relation. Retaining 'the daughter of' preserves the Hebrew imagery rather than
    flattening it into an abstract apposition.
- source_word: פוּצַי
  chosen: my dispersed ones
  alternatives:
  - my scattered ones
  - those I have scattered
  lexicon: HALOT
  rationale: The passive participial/adjectival sense from פוץ with 1cs suffix points
    to people dispersed or scattered. 'My dispersed ones' is concise and preserves
    the possessive relation; the phrase may imply either those belonging to the speaker
    or those dispersed by him, so a less interpretive rendering is preferred.
- source_word: יוֹבִלוּן
  chosen: will bring
  alternatives:
  - will lead
  - will carry
  - will conduct
  lexicon: HALOT
  rationale: The Hiphil of יבל often means to bring, lead, or carry along. With מִנְחָתִי
    as object, 'will bring' is the most idiomatic English for presenting an offering,
    while still reflecting the causative movement implied by the verb.
- source_word: מִנְחָתִי
  chosen: my offering
  alternatives:
  - my gift offering
  - my tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote an offering presented to God or tribute presented
    to a superior. In this prophetic worship context, 'offering' best fits the cultic-religious
    sense without over-narrowing to a specific sacrificial type.
