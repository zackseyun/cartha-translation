theological_decisions:
- issue: Interpretation of עֲתָרַי בַּת פוּצַי
  chosen_reading: 'Taken appositionally as a description of the people coming from
    afar: ''my worshipers, the daughter of my dispersed ones.'''
  alternative_readings:
  - 'Taken as two groups: ''my suppliants ... my dispersed ones'''
  - Taken with בַּת as 'daughter' = 'community/people of my dispersed ones'
  rationale: The Hebrew sequence is compressed and somewhat difficult. The chosen
    rendering preserves the poetic apposition and personified collective imagery without
    forcing a full interpretive paraphrase. It allows the verse to speak of a restored
    people associated with the LORD and his dispersed ones, while keeping the syntax
    auditable.
