id: ZEP.3.14
reference: Zephaniah 3:14
source:
  edition: WLC
  text: רָנִּי֙ בַּת צִיּ֔וֹן הָרִ֖יעוּ יִשְׂרָאֵ֑ל שִׂמְחִ֤י וְ/עָלְזִי֙ בְּ/כָל
    לֵ֔ב בַּ֖ת יְרוּשָׁלִָֽם־־׃
translation:
  text: Sing for joy, daughter Zion; shout aloud, Israel! Rejoice and exult with all
    your heart, daughter Jerusalem!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Daughter of Zion' and 'Daughter of Jerusalem.' The Hebrew uses a personified
      city expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָנִּי
  chosen: Sing for joy
  alternatives:
  - Cry out
  - Sing
  lexicon: HALOT
  rationale: Imperative feminine singular from רנן, commonly expressing jubilant vocal
    praise. 'Sing for joy' captures both the musical and exultant force better than
    the flatter 'sing' or less specific 'cry out'.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter of Zion
  - O daughter Zion
  lexicon: HALOT
  rationale: A personified city formula. 'daughter Zion' is concise, natural in prophetic
    style, and preserves the vocative force without adding 'O,' which is not explicit
    in the Hebrew.
- source_word: הָרִיעוּ
  chosen: shout aloud
  alternatives:
  - Raise a shout
  - Shout in triumph
  lexicon: HALOT
  rationale: Imperative from רוע/ריע in the Hiphil, denoting a loud jubilant cry.
    'Shout aloud' is idiomatic and preserves the public, celebratory force.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration. Here it functions vocatively
    in parallel with the personified city expressions.
- source_word: שִׂמְחִי
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: HALOT
  rationale: Imperative from שמח. 'Rejoice' fits the elevated prophetic summons and
    pairs well with the following imperative.
- source_word: וְעָלְזִי
  chosen: and exult
  alternatives:
  - and be jubilant
  - and rejoice
  lexicon: HALOT
  rationale: Imperative from עלז, conveying exuberant joy. 'Exult' preserves the heightened
    nuance and avoids collapsing it into the same English gloss as שמח.
- source_word: בְּכָל לֵב
  chosen: with all your heart
  alternatives:
  - with your whole heart
  - with all the heart
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for total inward devotion or feeling. 'With
    all your heart' is the most natural English equivalent and preserves the singular
    'heart'.
- source_word: בַּת יְרוּשָׁלִָם
  chosen: daughter Jerusalem
  alternatives:
  - Daughter of Jerusalem
  - O daughter Jerusalem
  lexicon: HALOT
  rationale: Parallel to 'daughter Zion,' preserving the personification and vocative
    address. Keeping the same structure maintains poetic symmetry.
