id: ZEP.3.9
reference: Zephaniah 3:9
source:
  edition: WLC
  text: כִּֽי אָ֛ז אֶהְפֹּ֥ךְ אֶל עַמִּ֖ים שָׂפָ֣ה בְרוּרָ֑ה לִ/קְרֹ֤א כֻלָּ/ם֙ בְּ/שֵׁ֣ם יְהוָ֔ה לְ/עָבְד֖/וֹ שְׁכֶ֥ם אֶחָֽד־־׃
translation:
  text: For then I will change the speech of the peoples to a pure speech, so that all of them may call on the name of Yahweh and serve him with one accord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will turn to the peoples a pure lip.' The phrase may mean purified speech, purified lips, or a restored pure language.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Hebrew literally, 'with one shoulder,' an idiom for united service or acting shoulder to shoulder.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶהְפֹּךְ
  chosen: I will change
  alternatives:
  - I will transform
  - I will turn
  - I will convert
  lexicon: HALOT
  rationale: The verb הפך literally means 'turn/overturn/change.' In this context with 'speech/lip' as the object-complement construction, the sense is not destruction but alteration into a new condition. 'Change' is natural English and preserves the divine action without overinterpreting it as inward conversion.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the peoples of the nations
  lexicon: HALOT
  rationale: עמים commonly means 'peoples' and highlights multiple ethnic groups rather than a single nation. 'Peoples' fits the plural and the universal scope of the verse better than the more politically loaded 'nations,' though that remains a viable alternative.
- source_word: שָׂפָה
  chosen: speech
  alternatives:
  - lip
  - language
  lexicon: HALOT
  rationale: שׂפה literally means 'lip,' but often metonymically denotes speech or language. Here 'pure speech' communicates the idiom clearly in modern English while preserving the focus on what is spoken. 'Lip' would be more formal but less idiomatic; 'language' may suggest distinct tongues rather than purified worship speech.
- source_word: בְרוּרָה
  chosen: pure
  alternatives:
  - clean
  - clear
  - purified
  lexicon: HALOT
  rationale: ברורה conveys something cleansed, pure, or clear. 'Pure' best matches the likely cultic/moral sense in context and works naturally with 'speech.' 'Clear' would underplay the moral-religious dimension.
- source_word: לִקְרֹא
  chosen: may call on
  alternatives:
  - to call on
  - to invoke
  lexicon: HALOT
  rationale: With 'the name of the LORD,' קרא commonly means invocation in worship. 'Call on' is the standard biblical idiom and preserves covenantal and liturgical resonance. 'May call on' reflects the purpose nuance after the preceding infinitival construction in English.
- source_word: בְּשֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: This is a fixed biblical expression for invocation/worship. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh,' with alternatives preserved in a footnote where useful.
- source_word: לְעָבְדוֹ
  chosen: and serve him
  alternatives:
  - to serve him
  - and worship him
  lexicon: HALOT
  rationale: עבד can mean serve or worship depending on context. Here the object is the LORD and the context is unified invocation, so worship is included; however, 'serve him' preserves the broader covenantal sense and avoids narrowing the term to liturgy alone.
- source_word: שְׁכֶם אֶחָד
  chosen: with one accord
  alternatives:
  - with one shoulder
  - shoulder to shoulder
  - with a single purpose
  lexicon: HALOT
  rationale: Literally 'one shoulder,' an idiom for united effort or common action. 'With one accord' is idiomatic English that preserves the corporate unity without wooden obscurity. The more literal image is worth preserving in a footnote.
