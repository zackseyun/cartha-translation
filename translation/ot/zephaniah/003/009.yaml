theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the promised transformation
  chosen_reading: change the speech of the peoples to a pure speech
  alternative_readings:
  - restore a pure language to the peoples
  - purify the lips of the peoples
  rationale: The Hebrew permits emphasis either on language/speech itself or on lips as a figure for worship. The chosen rendering preserves the text's focus on purified invocation of the LORD without making a stronger claim about reversal to a single historical language. Alternatives are preserved in footnotes.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
