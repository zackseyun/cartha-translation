id: ZEP.3.20
reference: Zephaniah 3:20
source:
  edition: WLC
  text: בָּ/עֵ֤ת הַ/הִיא֙ אָבִ֣יא אֶתְ/כֶ֔ם וּ/בָ/עֵ֖ת קַבְּצִ֣/י אֶתְ/כֶ֑ם כִּֽי
    אֶתֵּ֨ן אֶתְ/כֶ֜ם לְ/שֵׁ֣ם וְ/לִ/תְהִלָּ֗ה בְּ/כֹל֙ עַמֵּ֣י הָ/אָ֔רֶץ בְּ/שׁוּבִ֧/י
    אֶת שְׁבוּתֵי/כֶ֛ם לְ/עֵינֵי/כֶ֖ם אָמַ֥ר יְהוָֽה־־׃
translation:
  text: At that time I will bring you in, and at the time when I gather you; for I
    will make you a name and a praise among all the peoples of the earth, when I restore
    your fortunes before your eyes, says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when I restore your captivity' or 'when I bring back
      your captives.' The Hebrew idiom refers broadly to restoring those who have
      suffered exile or calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: HALOT
  rationale: Temporal phrase introducing the promised future act. 'At that time' is
    idiomatic modern English and preserves the prophetic timing formula.
- source_word: אָבִיא אֶתְכֶם
  chosen: I will bring you in
  alternatives:
  - I will bring you
  - I will bring you back
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring in/bring'. 'Bring you in' best reflects
    the causative nuance and likely sense of bringing the exiles into their restored
    place, without over-specifying 'back' where the object/location is implicit rather
    than explicit.
- source_word: וּבָעֵת קַבְּצִי אֶתְכֶם
  chosen: and at the time when I gather you
  alternatives:
  - and at the time of my gathering you
  - and when I gather you
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses the time of God's gathering
    them. 'At the time when I gather you' keeps the parallelism with the previous
    clause while remaining natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding promise.
    'For' preserves the explanatory force cleanly.
- source_word: אֶתֵּן אֶתְכֶם לְשֵׁם וְלִתְהִלָּה
  chosen: I will make you a name and a praise
  alternatives:
  - I will set you for renown and praise
  - I will make you renowned and praised
  lexicon: HALOT
  rationale: Literally 'give you for a name and for praise.' In English, 'make you
    a name and a praise' best conveys the idiom of granting renown and honor while
    staying close to the Hebrew imagery.
- source_word: בְּכֹל עַמֵּי הָאָרֶץ
  chosen: among all the peoples of the earth
  alternatives:
  - among all the peoples of the land
  - with all the peoples of the earth
  lexicon: HALOT
  rationale: '''Among'' fits the social setting of reputation before the nations.
    הָאָרֶץ here is best taken globally (''earth'') in this restoration oracle, not
    merely ''land.'' ''Peoples'' preserves the plural עמים.'
- source_word: בְּשׁוּבִי אֶת שְׁבוּתֵיכֶם
  chosen: when I restore your fortunes
  alternatives:
  - when I restore your captivity
  - when I bring back your captives
  lexicon: HALOT
  rationale: The idiom שוב שבות regularly denotes restoration from calamity/exile.
    In contemporary English, 'restore your fortunes' communicates the idiomatic sense
    better than the wooden 'restore your captivity,' while not excluding return from
    exile.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A transparent idiom meaning the restoration will be openly witnessed
    by them. 'Before your eyes' is vivid and natural.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula. Present-tense 'says' is standard in English
    prophetic discourse. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
