theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatic restoration formula שׁוּב שְׁבוּת
  chosen_reading: restore your fortunes
  alternative_readings:
  - restore your captivity
  - bring back your captives
  rationale: The Hebrew idiom can be rendered woodenly, but optimal equivalence favors
    the established idiomatic sense of comprehensive restoration. This avoids importing
    a narrower meaning while still fitting the exile-restoration context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
