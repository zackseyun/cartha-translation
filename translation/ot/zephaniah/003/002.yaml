theological_decisions:
- issue: Referent of the feminine singular subject
  chosen_reading: Render with the feminine pronoun 'she,' leaving the antecedent implicit
    in this verse.
  alternative_readings:
  - Expand to 'Jerusalem did not...'
  - Expand to 'the city did not...'
  rationale: The Hebrew verbs are feminine singular, referring back to the city addressed
    in context. Retaining 'she' preserves the literary personification without importing
    an explicit noun not present in this verse.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
