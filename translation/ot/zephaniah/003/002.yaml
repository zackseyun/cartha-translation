id: ZEP.3.2
reference: Zephaniah 3:2
source:
  edition: WLC
  text: לֹ֤א שָֽׁמְעָה֙ בְּ/ק֔וֹל לֹ֥א לָקְחָ֖ה מוּסָ֑ר בַּֽ/יהוָה֙ לֹ֣א בָטָ֔חָה
    אֶל אֱלֹהֶ֖י/הָ לֹ֥א קָרֵֽבָה־׃
translation:
  text: She did not obey the voice; she did not accept correction. She did not trust
    in the LORD; she did not draw near to her God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not listen to the voice' or 'did not heed the voice.' The Hebrew
      idiom can emphasize obedient listening.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not receive discipline' or 'did not take instruction.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'YHWH'; rendered 'the LORD' in keeping with the translation's standard
      practice.
    reason: alternative_reading
  - marker: d
    text: Or 'did not approach.' 'Draw near' may carry both relational and worship-related
      overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעָה בְּקוֹל
  chosen: did not obey the voice
  alternatives:
  - did not listen to the voice
  - did not heed the voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly carries the sense of listening with obedience,
    not mere auditory hearing. 'Obey' best captures the idiomatic force, while retaining
    'the voice' rather than specifying the speaker in the main text because the Hebrew
    leaves it implicit.
- source_word: קוֹל
  chosen: the voice
  alternatives:
  - the sound
  - the call
  lexicon: HALOT
  rationale: קוֹל literally means 'voice/sound.' In this rebuke context, 'voice' is
    the most natural rendering and preserves the personal, authoritative nuance.
- source_word: לָקְחָה מוּסָר
  chosen: did not accept correction
  alternatives:
  - did not receive discipline
  - did not take instruction
  lexicon: HALOT
  rationale: The idiom 'take musar' means to receive or accept disciplinary instruction.
    'Correction' is readable modern English and fits the prophetic rebuke context;
    'discipline' and 'instruction' are viable alternatives.
- source_word: מוּסָר
  chosen: correction
  alternatives:
  - discipline
  - instruction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, chastening, or instruction. Here the context
    is moral refusal to be corrected, so 'correction' communicates the sense clearly
    in contemporary English.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ב marks
    the object of trust, so 'in the LORD' is the natural English equivalent.
- source_word: בָטְחָה
  chosen: did not trust
  alternatives:
  - did not put her trust
  - did not rely
  lexicon: HALOT
  rationale: בטח denotes trust, confidence, or reliance. 'Did not trust' is concise
    and natural, preserving the covenantal and relational force.
- source_word: אֱלֹהֶיהָ
  chosen: her God
  alternatives:
  - her gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular possessive
    and in this covenant context refers to Israel/Jerusalem's God in the singular.
    'Her God' reflects standard Hebrew usage and the immediate parallel with 'the
    LORD.'
- source_word: קָרֵבָה
  chosen: did not draw near
  alternatives:
  - did not come near
  - did not approach
  lexicon: HALOT
  rationale: קרב in this context conveys approaching God relationally or cultically.
    'Draw near' is idiomatic biblical English that preserves both relational and worship
    connotations better than the flatter 'come near.'
