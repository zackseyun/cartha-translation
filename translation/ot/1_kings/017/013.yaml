id: 1KI.17.13
reference: 1 Kings 17:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלֶ֤י/הָ אֵלִיָּ֨הוּ֙ אַל תִּ֣ירְאִ֔י בֹּ֖אִי עֲשִׂ֣י כִ/דְבָרֵ֑/ךְ
    אַ֣ךְ עֲשִׂי לִ֣/י מִ֠/שָּׁם עֻגָ֨ה קְטַנָּ֤ה בָ/רִאשֹׁנָה֙ וְ/הוֹצֵ֣אתְ לִ֔/י
    וְ/לָ֣/ךְ וְ/לִ/בְנֵ֔/ךְ תַּעֲשִׂ֖י בָּ/אַחֲרֹנָֽה־־׃ס
translation:
  text: And Elijah said to her, “Do not fear. Go, do as you have said. But first make
    me a small cake from there and bring it out to me, and afterward make some for
    yourself and for your son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Come, do as you have said.' The Hebrew verb can be rendered more literally
      as 'come,' but here it functions idiomatically as an exhortation to proceed.
    reason: lexical_alternative
  - marker: b
    text: Or 'a little cake.' The Hebrew עֻגָה can refer to a small baked loaf or
      cake.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: The prohibition plus ירא expresses fear. 'Do not fear' is slightly more
    formal and concise, while remaining natural English.
- source_word: בֹּאִי
  chosen: Go
  alternatives:
  - Come
  lexicon: HALOT
  rationale: Though the verb is literally 'come,' in idiomatic sequence with the following
    imperatives it functions as an action prompt ('go on, proceed'). 'Go' fits the
    context of sending her to prepare food more naturally in English.
- source_word: עֲשִׂי כִדְבָרֵךְ
  chosen: do as you have said
  alternatives:
  - do according to your word
  - do as you said
  lexicon: HALOT
  rationale: This preserves the sense of acting in accordance with her stated plan,
    with natural modern English.
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Here אַךְ introduces a qualification to the preceding instruction. 'But'
    best captures the adversative force in smooth English.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from it
  lexicon: HALOT
  rationale: The adverb literally means 'from there,' referring to the available flour/oil
    supply in context. Retaining 'from there' preserves the Hebrew wording while remaining
    understandable.
- source_word: עֻגָה קְטַנָּה
  chosen: a small cake
  alternatives:
  - a little cake
  - a small loaf
  - a small flatbread
  lexicon: HALOT
  rationale: עֻגָה denotes a small baked bread/cake. 'Small cake' is a conventional
    and understandable rendering without over-specifying shape.
- source_word: בָרִאשֹׁנָה
  chosen: first
  alternatives:
  - as the first thing
  - before anything else
  lexicon: HALOT
  rationale: 'The adverbial sense is temporal priority: Elijah''s portion is to be
    prepared before hers and her son''s.'
- source_word: וְהוֹצֵאתְ לִי
  chosen: and bring it out to me
  alternatives:
  - and bring it to me
  - and bring me out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out.' Including 'out' reflects the verb's
    causative nuance, likely from the preparation area to Elijah.
- source_word: וְלָךְ וְלִבְנֵךְ תַּעֲשִׂי
  chosen: make some for yourself and for your son
  alternatives:
  - you shall make for yourself and your son
  - make for you and your son
  lexicon: HALOT
  rationale: English idiom benefits from supplying 'some' from context, since the
    object is implied from the prior clause. 'Yourself' is natural with the pronoun
    sequence.
- source_word: בָּאַחֲרֹנָה
  chosen: afterward
  alternatives:
  - last
  - after that
  lexicon: HALOT
  rationale: The term marks subsequent order rather than absolute finality in a broad
    sense. 'Afterward' is natural and precise in context.
