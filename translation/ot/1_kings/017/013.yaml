theological_decisions:
- issue: Potential ethical/theological misunderstanding of Elijah's command to be
    fed first
  chosen_reading: Render the temporal priority plainly without softening or moralizing
  alternative_readings:
  - Paraphrasing to reduce the force of Elijah's request
  rationale: The Hebrew explicitly states that Elijah's small cake is to be made 'first'
    and the widow's and her son's portion 'afterward.' The translation preserves this
    tension rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
