theological_decisions:
- issue: Whether to render the final clause explicitly as death or preserve the Hebrew
    idiom
  chosen_reading: Preserve the idiom 'no breath was left in him' rather than interpretively
    stating 'he died.'
  alternative_readings:
  - until he died
  - until no life remained in him
  rationale: The Hebrew states literally that no נְשָׁמָה remained in him. Since the
    wording itself is idiomatic but not identical to a simple death formula, the translation
    preserves the textual expression and lets the reader infer the severity. This
    avoids importing a stronger interpretive conclusion into the main text than the
    wording itself states.
  doctrine_reference: Translation philosophy §1, §3
