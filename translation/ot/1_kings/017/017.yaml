id: 1KI.17.17
reference: 1 Kings 17:17
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה חָלָ֕ה בֶּן הָ/אִשָּׁ֖ה בַּעֲלַ֣ת
    הַ/בָּ֑יִת וַ/יְהִ֤י חָלְי/וֹ֙ חָזָ֣ק מְאֹ֔ד עַ֛ד אֲשֶׁ֥ר לֹא נֽוֹתְרָה בּ֖/וֹ
    נְשָׁמָֽה־־־׃
translation:
  text: After these things, the son of the woman who owned the house became sick,
    and his illness grew very severe, until no breath was left in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until no life remained in him.' The Hebrew literally says, 'until no
      breath was left in him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: After these things
  alternatives:
  - After this
  - And it happened after these things
  lexicon: HALOT
  rationale: Retains the common Hebrew narrative transition with natural English.
    'After these things' preserves the plural הַדְּבָרִים and the temporal formula
    without overly wooden 'and it happened.'
- source_word: חָלָה
  chosen: became sick
  alternatives:
  - fell ill
  - was sick
  lexicon: HALOT
  rationale: The verb denotes becoming ill. 'Became sick' captures the ingressive
    sense in context better than the stative 'was sick.'
- source_word: בֶּן הָאִשָּׁה בַּעֲלַת הַבָּיִת
  chosen: the son of the woman who owned the house
  alternatives:
  - the son of the woman, the mistress of the house
  - the son of the woman, the owner of the house
  lexicon: HALOT
  rationale: בַּעֲלַת הַבָּיִת literally means 'mistress/owner of the house.' 'Who
    owned the house' is clear modern English and preserves the possessive-social sense
    without archaic phrasing.
- source_word: וַיְהִי חָלְיוֹ חָזָק מְאֹד
  chosen: his illness grew very severe
  alternatives:
  - his sickness became very severe
  - his illness was very severe
  lexicon: HALOT
  rationale: The clause marks the worsening of his condition. 'Grew very severe' expresses
    the progression naturally in English while reflecting the Hebrew sequence.
- source_word: עַד אֲשֶׁר לֹא נוֹתְרָה בוֹ נְשָׁמָה
  chosen: until no breath was left in him
  alternatives:
  - until there was no breath left in him
  - until no life remained in him
  lexicon: HALOT
  rationale: נְשָׁמָה commonly means 'breath,' and in this context implies the cessation
    of life. 'No breath was left in him' stays close to the Hebrew while allowing
    the narrative implication to stand without interpretively expanding it to 'he
    died' in the main text.
