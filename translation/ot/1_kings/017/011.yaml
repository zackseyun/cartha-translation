id: 1KI.17.11
reference: 1 Kings 17:11
source:
  edition: WLC
  text: וַ/תֵּ֖לֶךְ לָ/קַ֑חַת וַ/יִּקְרָ֤א אֵלֶ֨י/הָ֙ וַ/יֹּאמַ֔ר לִֽקְחִי נָ֥א לִ֛/י
    פַּת לֶ֖חֶם בְּ/יָדֵֽ/ךְ־־׃
translation:
  text: As she went to get it, he called to her and said, “Please bring me a piece
    of bread in your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he called after her.”
    reason: lexical_alternative
  - marker: b
    text: Or “a morsel of bread.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: As she went
  alternatives:
  - So she went
  - And she went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'As she went' fits the immediate
    sequence with the following infinitive, conveying action in progress when Elijah
    speaks.
- source_word: לָקַחַת
  chosen: to get it
  alternatives:
  - to take
  - to fetch
  lexicon: HALOT
  rationale: Infinitive construct of לקח after הלך expresses purpose. Because the
    prior verse specifies water, 'it' naturally refers back to the requested water
    and avoids awkward repetition while remaining faithful to the discourse context.
- source_word: וַיִּקְרָא אֵלֶיהָ
  chosen: he called to her
  alternatives:
  - he cried out to her
  - he called after her
  lexicon: HALOT
  rationale: קרא with אֶל commonly means to call to someone. 'Called to her' is natural
    English; 'called after her' is possible from context but slightly more interpretive,
    so it is preserved as an alternative.
- source_word: לִקְחִי
  chosen: bring
  alternatives:
  - take
  - fetch
  lexicon: HALOT
  rationale: Imperative of לקח literally means 'take,' but in English when requesting
    that someone obtain and deliver something, 'bring' best captures the intended
    action.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray you
  - kindly
  lexicon: HALOT
  rationale: Particle of entreaty softens the imperative. 'Please' is the clearest
    modern equivalent and matches the translation philosophy's preference for readable
    contemporary English.
- source_word: לִי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative pronoun marks the beneficiary. English idiom prefers 'bring
    me' rather than the more wooden 'bring for me.'
- source_word: פַּת לֶחֶם
  chosen: a piece of bread
  alternatives:
  - a morsel of bread
  - a piece of food
  lexicon: HALOT
  rationale: The construct phrase denotes a piece, morsel, or bit of bread. 'A piece
    of bread' is clear and natural; 'morsel' is slightly more literary and less common.
- source_word: בְּיָדֵךְ
  chosen: in your hand
  alternatives:
  - with you
  - in your possession
  lexicon: HALOT
  rationale: Literally 'in your hand.' The phrase may idiomatically imply possession,
    but the concrete wording is retained because it is natural in English and preserves
    the Hebrew imagery without obscurity.
