theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Prophetic authority in לְפִי דְבָרִי
  chosen_reading: except by my word
  alternative_readings:
  - except according to my word
  - except at my word
  rationale: The Hebrew presents Elijah's word as the divinely authorized condition for the drought's end. The translation preserves that force without expanding it into a doctrinal explanation about independent prophetic power.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
