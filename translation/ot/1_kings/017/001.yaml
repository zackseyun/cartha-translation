id: 1KI.17.1
reference: 1 Kings 17:1
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ אֵלִיָּ֨הוּ הַ/תִּשְׁבִּ֜י מִ/תֹּשָׁבֵ֣י גִלְעָד֮ אֶל אַחְאָב֒ חַי יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ אֲשֶׁ֣ר עָמַ֣דְתִּי לְ/פָנָ֔י/ו אִם יִהְיֶ֛ה הַ/שָּׁנִ֥ים הָ/אֵ֖לֶּה טַ֣ל וּ/מָטָ֑ר כִּ֖י אִם לְ/פִ֥י דְבָרִֽ/י־־־־׃ס
translation:
  text: And Elijah the Tishbite, from the inhabitants of Gilead, said to Ahab, “As Yahweh, the God of Israel, lives, before whom I stand, there will be neither dew nor rain in these years, except by my word.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the inhabitants of Gilead'; the Hebrew may denote residents/settlers rather than simply natives.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath idiom: ''if there shall be...'' meaning ''there shall not be.'''
    reason: cultural_note
  - marker: c
    text: Or 'except according to my word' / 'except at my word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּשְׁבִּי
  chosen: the Tishbite
  alternatives:
  - the man from Tishbe
  lexicon: HALOT
  rationale: A gentilicial/title form identifying Elijah by origin. 'The Tishbite' is concise and natural in English while preserving the proper-name-like designation.
- source_word: מִתֹּשָׁבֵי גִלְעָד
  chosen: from the settlers of Gilead
  alternatives:
  - from among the inhabitants of Gilead
  - of the sojourners of Gilead
  lexicon: HALOT
  rationale: תּוֹשָׁב can denote resident settlers/inhabitants rather than merely native-born citizens. 'From the settlers of Gilead' preserves the nuance better than a flat 'of Gilead,' while remaining readable.
- source_word: חַי יְהוָה
  chosen: As the LORD ... lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD ... lives' communicates the idiomatic force in natural English. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible continuity.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; retained formally because it is theologically and covenantally significant.
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  chosen: before whom I stand
  alternatives:
  - in whose presence I stand
  - whom I serve
  lexicon: HALOT
  rationale: The standing-before formula conveys attendance in the divine presence, often with service implications. 'Before whom I stand' preserves the concrete Hebrew idiom without over-interpreting it as merely 'serve.'
- source_word: אִם יִהְיֶה
  chosen: there will be
  alternatives:
  - surely there shall not be
  lexicon: HALOT
  rationale: In this oath context, אִם introduces a strong negation ('if there shall be...' = 'there shall not be'). English requires making the negation explicit in the clause as a whole rather than reproducing the Hebrew particle mechanically.
- source_word: טַל וּמָטָר
  chosen: neither dew nor rain
  alternatives:
  - dew or rain
  lexicon: HALOT
  rationale: English idiom prefers 'neither ... nor' under explicit negation. Retains both agricultural/weather terms distinctly.
- source_word: הַשָּׁנִים הָאֵלֶּה
  chosen: in these years
  alternatives:
  - these years
  - during these years
  lexicon: HALOT
  rationale: A natural temporal rendering of the Hebrew phrase in context of prolonged drought.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - unless
  lexicon: HALOT
  rationale: 'The phrase marks exception: no dew or rain will come except under the stated condition.'
- source_word: לְפִי דְבָרִי
  chosen: by my word
  alternatives:
  - according to my word
  - at my word
  lexicon: HALOT
  rationale: Literally 'according to the mouth of my word.' 'By my word' is compact and idiomatic, preserving Elijah's prophetic authority without unnecessary literalism.
