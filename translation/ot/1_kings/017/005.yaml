theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH. This verse carries no contextual reason to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Geographical force of עַל פְּנֵי הַיַּרְדֵּן
  chosen_reading: east of the Jordan
  alternative_readings:
  - before the Jordan
  - opposite the Jordan
  rationale: The Hebrew idiom is somewhat flexible, but in this narrative setting
    the intended location is best conveyed as the Transjordan side. This is a geographical
    interpretation, not a doctrinally loaded one, but it is significant enough to
    document because more formal alternatives are possible.
