theological_decisions:
- issue: Meaning of עֲוֺנִי in the widow's accusation
  chosen_reading: my iniquity
  alternative_readings:
  - my sin
  - my guilt
  rationale: The widow interprets her son's death in relation to her own moral culpability.
    The Hebrew term can include both wrongdoing and guilt/liability. The translation
    preserves that theological tension rather than narrowing it to either act ('sin')
    or status ('guilt') alone.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
