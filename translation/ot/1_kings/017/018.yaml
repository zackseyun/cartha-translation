id: 1KI.17.18
reference: 1 Kings 17:18
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל אֵ֣לִיָּ֔הוּ מַה לִּ֥/י וָ/לָ֖/ךְ אִ֣ישׁ הָ/אֱלֹהִ֑ים בָּ֧אתָ
    אֵלַ֛/י לְ/הַזְכִּ֥יר אֶת עֲוֺנִ֖/י וּ/לְ/הָמִ֥ית אֶת בְּנִֽ/י־־־־׃
translation:
  text: She said to Elijah, “What do I have to do with you, man of God? Have you come
    to me to bring my iniquity to remembrance and to cause my son to die?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my sin' or 'my guilt.' The Hebrew term can refer to wrongdoing, guilt,
      or the burden/consequence of guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לִּי וָלָךְ
  chosen: What do I have to do with you
  alternatives:
  - What is there between me and you
  - What have I to do with you
  lexicon: HALOT
  rationale: Idiomatic expression of distance, complaint, or protest. A natural modern
    English rendering is preferred while preserving the confrontational force.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: man of God
  alternatives:
  - godly man
  lexicon: HALOT
  rationale: Established Hebrew title for a prophet or divine messenger; 'man of God'
    preserves the formal title and biblical resonance better than an interpretive
    paraphrase.
- source_word: בָּאתָ אֵלַי
  chosen: Have you come to me
  alternatives:
  - Did you come to me
  lexicon: HALOT
  rationale: The perfect is used in direct speech with rhetorical force. English present
    perfect captures the accusatory sense in context.
- source_word: לְהַזְכִּיר
  chosen: to bring ... to remembrance
  alternatives:
  - to remind
  - to call to mind
  lexicon: HALOT
  rationale: The Hiphil of זכר here means to cause something to be remembered or brought
    to attention. 'Bring to remembrance' preserves the causative nuance and solemn
    tone.
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my sin
  - my guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquity'
    keeps the moral weight without over-resolving whether the focus is act or liability;
    alternatives are viable and worth preserving.
- source_word: וּלְהָמִית
  chosen: and to cause ... to die
  alternatives:
  - and to kill
  - and to put ... to death
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Cause to die' reflects the morphology
    more closely than the more direct 'kill,' while still reading naturally enough
    in context.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The noun specifically means 'son'; gender-accurate rendering is required
    by the translation philosophy.
