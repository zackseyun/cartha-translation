id: 1KI.17.16
reference: 1 Kings 17:16
source:
  edition: WLC
  text: כַּ֤ד הַ/קֶּ֨מַח֙ לֹ֣א כָלָ֔תָה וְ/צַפַּ֥חַת הַ/שֶּׁ֖מֶן לֹ֣א חָסֵ֑ר כִּ/דְבַ֣ר
    יְהוָ֔ה אֲשֶׁ֥ר דִּבֶּ֖ר בְּ/יַ֥ד אֵלִיָּֽהוּ׃פ
translation:
  text: The jar of flour was not used up, and the jug of oil did not run out, according
    to the word of the LORD that he had spoken by the hand of Elijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Elijah,'' an idiom meaning ''through Elijah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּד
  chosen: jar
  alternatives:
  - container
  - pitcher
  lexicon: HALOT
  rationale: A household vessel for storing dry goods; 'jar' is natural modern English
    and fits flour better than 'pitcher.'
- source_word: הַקֶּמַח
  chosen: the flour
  alternatives:
  - meal
  lexicon: HALOT
  rationale: Refers to flour/meal. 'Flour' is the clearest contemporary rendering
    in this domestic provision context.
- source_word: לֹא כָלָתָה
  chosen: was not used up
  alternatives:
  - did not fail
  - was not exhausted
  - did not come to an end
  lexicon: HALOT
  rationale: כלה in this context means to be finished or consumed. 'Was not used up'
    idiomatically conveys ongoing miraculous supply of the flour.
- source_word: צַפַּחַת
  chosen: jug
  alternatives:
  - jar
  - flask
  lexicon: HALOT
  rationale: A small vessel suitable for holding oil. 'Jug' distinguishes it from
    the flour container and reads naturally in English.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  lexicon: HALOT
  rationale: Straightforward lexical rendering; in context this is ordinary household
    oil, likely olive oil, but the Hebrew does not specify further.
- source_word: לֹא חָסֵר
  chosen: did not run out
  alternatives:
  - did not diminish
  - did not lack
  - was not lacking
  lexicon: HALOT
  rationale: חסר here expresses not becoming deficient or lacking. 'Did not run out'
    is idiomatic English parallel to the previous clause and suits a supply item.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  - as the LORD had said
  lexicon: HALOT
  rationale: Keeps the formal link between the event and YHWH's spoken promise. 'The
    LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by doctrine table: יְהוָה is rendered ''the LORD'' in the main
    text.'
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had spoken
  alternatives:
  - which he spoke
  - that he spoke
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence: the provision continued in fulfillment
    of a prior divine word.'
- source_word: בְּיַד אֵלִיָּהוּ
  chosen: by the hand of Elijah
  alternatives:
  - through Elijah
  - by Elijah
  lexicon: HALOT
  rationale: The Hebrew idiom literally means agency mediated through a person. The
    main text preserves the idiom in understandable English; a footnote preserves
    the smoother alternative 'through Elijah.'
