theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Agency formula in prophetic mediation
  chosen_reading: that he had spoken by the hand of Elijah
  alternative_readings:
  - that he had spoken through Elijah
  rationale: The verse attributes the fulfilled promise to the LORD while marking
    Elijah as the human agent. Preserving 'by the hand of' maintains the prophetic
    mediation idiom without adding doctrinal interpretation beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
