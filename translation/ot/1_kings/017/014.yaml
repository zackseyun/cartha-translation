id: 1KI.17.14
reference: 1 Kings 17:14
source:
  edition: WLC
  text: כִּ֣י כֹה֩ אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל כַּ֤ד הַ/קֶּ֨מַח֙ לֹ֣א תִכְלָ֔ה
    וְ/צַפַּ֥חַת הַ/שֶּׁ֖מֶן לֹ֣א תֶחְסָ֑ר עַ֠ד י֧וֹם תתן יְהוָ֛ה גֶּ֖שֶׁם עַל פְּנֵ֥י
    הָ/אֲדָמָֽה־־׃
translation:
  text: 'For this is what the LORD, the God of Israel, says: ‘The jar of flour will
    not be used up, and the jug of oil will not run dry, until the day the LORD gives
    rain on the face of the ground.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will not fail” for “will not be used up.”
    reason: lexical_alternative
  - marker: b
    text: Or “will not diminish” for “will not run dry.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: “on the face of the ground.”'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Rendered according to the project's default for the divine name, preserving
    the traditional small-caps convention in plain text as 'the LORD' rather than
    transliterating the Tetragrammaton.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  rationale: Straightforward construct chain; retained formally to identify Israel's
    covenant God in Elijah's prophetic formula.
- source_word: כַּד
  chosen: jar
  alternatives:
  - container
  - pitcher
  lexicon: HALOT
  rationale: Refers to a household vessel. 'Jar' is natural modern English and fits
    the context of storing flour better than the broader 'container' or the more water-associated
    'pitcher'.
- source_word: קֶּמַח
  chosen: flour
  alternatives:
  - meal
  lexicon: HALOT
  rationale: The Hebrew denotes ground grain. 'Flour' is clearer for modern readers;
    'meal' is possible but can sound archaic or ambiguous in contemporary English.
- source_word: לֹא תִכְלָה
  chosen: will not be used up
  alternatives:
  - will not fail
  - will not be exhausted
  - will not be finished
  lexicon: HALOT
  rationale: From כלה in the sense of coming to an end or being consumed. 'Will not
    be used up' idiomatically conveys the depletion of a supply in this domestic setting.
- source_word: צַפַּחַת
  chosen: jug
  alternatives:
  - jar
  - flask
  lexicon: HALOT
  rationale: A smaller vessel, here paired with oil. 'Jug' distinguishes it from כַּד
    and sounds natural in English; 'flask' may sound too specialized.
- source_word: שֶּׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: In context this likely refers to olive oil, but the Hebrew simply says
    'oil'; the translation keeps the broader term and avoids over-specification.
- source_word: לֹא תֶחְסָר
  chosen: will not run dry
  alternatives:
  - will not lack
  - will not diminish
  - will not be lacking
  lexicon: HALOT
  rationale: From חסר, to lack or diminish. Because the subject is a vessel containing
    liquid, 'will not run dry' is an idiomatic contextual rendering that communicates
    the sense clearly.
- source_word: עַד יוֹם
  chosen: until the day
  alternatives:
  - until
  lexicon: HALOT
  rationale: The construct phrase is preserved explicitly rather than compressed,
    matching the Hebrew temporal expression.
- source_word: תתן יְהוָה גֶּשֶׁם
  chosen: the LORD gives rain
  alternatives:
  - the LORD sends rain
  - the LORD grants rain
  lexicon: HALOT
  rationale: The verb נתן is literally 'give.' 'Gives rain' is faithful and natural
    English; 'sends rain' is interpretive but possible.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the ground
  alternatives:
  - upon the land
  - on the earth
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom פְּנֵי ('face/surface
    of'). 'Ground' fits the immediate agricultural context better than the broader
    'earth'.
