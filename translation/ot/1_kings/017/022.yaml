id: 1KI.17.22
reference: 1 Kings 17:22
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע יְהוָ֖ה בְּ/ק֣וֹל אֵלִיָּ֑הוּ וַ/תָּ֧שָׁב נֶֽפֶשׁ הַ/יֶּ֛לֶד
    עַל קִרְבּ֖/וֹ וַ/יֶּֽחִי־־׃
translation:
  text: And the LORD listened to the voice of Elijah, and the life of the child returned
    to his inner being, and he lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the soul of the child returned to his inner being.' Hebrew nephesh can
      mean 'life,' 'soul,' or 'self' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: שׁמע can mean both 'hear' and 'listen/respond to.' In this prayer context,
    'listened' better conveys that the LORD not only heard Elijah's voice but responded
    favorably to it, while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בְּקוֹל
  chosen: to the voice
  alternatives:
  - to the prayer
  - to the plea
  lexicon: HALOT
  rationale: Literally 'to/at the voice.' 'To the voice' preserves the concrete Hebrew
    expression better than interpretive expansions like 'prayer' or 'plea,' though
    those reflect the sense.
- source_word: וַתָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: שׁוב here denotes restoration or return. 'Returned' is the most direct
    and idiomatic rendering in this resurrection context.
- source_word: נֶפֶשׁ
  chosen: the life
  alternatives:
  - the soul
  - the breath
  - the life-breath
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or animating life. In this context
    of a dead child reviving, 'the life' best communicates the restoration of life
    without importing later dualistic assumptions that 'soul' may suggest. The alternative
    is preserved in a footnote because 'soul' is a traditional rendering.
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: יֶלֶד denotes a child or boy. 'The child' fits the narrative and avoids
    over-specifying sex where English does not require it, though the child is male
    in context.
- source_word: עַל קִרְבּוֹ
  chosen: to his inner being
  alternatives:
  - into him
  - to his inward parts
  - within him
  lexicon: HALOT
  rationale: קֶרֶב refers to the inward part, midst, or inner being. The phrase literally
    means 'upon/to his inward part.' 'To his inner being' preserves the Hebrew's bodily-interior
    sense better than the smoother but less explicit 'into him.'
- source_word: וַיֶּחִי
  chosen: and he lived
  alternatives:
  - and he came to life
  - and he revived
  lexicon: HALOT
  rationale: 'חיה here states the result plainly: the child lived. ''And he lived''
    is concise and close to the Hebrew; alternatives are possible but slightly more
    interpretive.'
