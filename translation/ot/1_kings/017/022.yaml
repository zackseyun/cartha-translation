theological_decisions:
- issue: Rendering נֶפֶשׁ in a resurrection context
  chosen_reading: the life
  alternative_readings:
  - the soul
  rationale: The verse describes the restoration of the child's life. Rendering נֶפֶשׁ
    as 'the life' preserves the immediate narrative sense and avoids implying a specific
    anthropology beyond what the Hebrew states. Because 'soul' is a longstanding and
    plausible alternative, it is preserved in a footnote to maintain transparency
    and theological tension where readers may infer more than the text explicitly
    says.
  doctrine_reference: Translation philosophy §3; Contested terms table does not fix
    נֶפֶשׁ, so ambiguity is documented rather than over-resolved.
