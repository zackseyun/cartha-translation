theological_decisions:
- issue: Rendering נֶפֶשׁ in a resurrection context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse petitions for the child's animating life to return, and 'life'
    best preserves the narrative sense without forcing a particular doctrinal anthropology.
    Because 'soul' is a traditional and lexically possible rendering, it is preserved
    in a footnote to maintain transparency and theological tension where readers may
    hear anthropological implications.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
