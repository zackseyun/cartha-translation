id: 1KI.17.21
reference: 1 Kings 17:21
source:
  edition: WLC
  text: וַ/יִּתְמֹדֵ֤ד עַל הַ/יֶּ֨לֶד֙ שָׁלֹ֣שׁ פְּעָמִ֔ים וַ/יִּקְרָ֥א אֶל יְהוָ֖ה
    וַ/יֹּאמַ֑ר יְהוָ֣ה אֱלֹהָ֔/י תָּ֥שָׁב נָ֛א נֶֽפֶשׁ הַ/יֶּ֥לֶד הַ/זֶּ֖ה עַל קִרְבּֽ/וֹ־־־־׃
translation:
  text: Then he stretched himself out over the boy three times, and he cried out to
    the LORD and said, “LORD my God, please let this boy’s life return to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “please let this boy’s soul return to him.” Hebrew: “let the נפש of
      this boy return to his inner part.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְמֹדֵד
  chosen: stretched himself out
  alternatives:
  - measured himself
  - lay upon himself
  - extended himself
  lexicon: HALOT
  rationale: The rare reflexive verb in this context describes Elijah physically extending
    himself over the child. 'Stretched himself out' is idiomatic modern English and
    fits the narrative action better than the more opaque 'measured himself.'
- source_word: עַל הַיֶּלֶד
  chosen: over the boy
  alternatives:
  - upon the boy
  - on the boy
  lexicon: HALOT
  rationale: עַל here marks physical position. 'Over the boy' is natural English and
    suits the action of lying stretched across him.
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: three times
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the numeral plus 'times/occasions.'
- source_word: וַיִּקְרָא אֶל יְהוָה
  chosen: he cried out to the LORD
  alternatives:
  - he called to the LORD
  - he called out to the LORD
  lexicon: HALOT
  rationale: קרא אל in prayer contexts often carries the sense of earnest invocation.
    'Cried out' conveys the urgency of Elijah's prayer without overinterpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' in keeping
    with established reverential convention and the LXX/English Bible pattern.
- source_word: יְהוָה אֱלֹהָי
  chosen: LORD my God
  alternatives:
  - O LORD, my God
  - LORD, my God
  lexicon: HALOT
  rationale: The direct address combines the covenant name with the first-person possessive
    'my God.' 'LORD my God' preserves the vocative force in readable English; punctuation
    supplies the address.
- source_word: תָּשָׁב נָא
  chosen: please let ... return
  alternatives:
  - please cause ... to return
  - let ... return, please
  - may ... return, please
  lexicon: HALOT
  rationale: The jussive of שוב with נא expresses a polite, urgent plea. English idiom
    is best captured by 'please let ... return,' which preserves petitionary force
    without wooden literalism.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  - life-breath
  lexicon: HALOT
  rationale: In this resurrection context, נֶפֶשׁ refers to the animating life of
    the child rather than making a technical anthropological statement about the immaterial
    soul. 'Life' is the clearest contextual rendering, while 'soul' remains a viable
    lexical alternative worth preserving in a footnote.
- source_word: הַיֶּלֶד הַזֶּה
  chosen: this boy
  alternatives:
  - this child
  lexicon: HALOT
  rationale: יַלֶד commonly means 'boy/child.' Since the narrative has consistently
    referred to him as the widow's son and the masculine singular is explicit, 'this
    boy' is suitably concrete and gender-accurate.
- source_word: עַל קִרְבּוֹ
  chosen: to him
  alternatives:
  - into his inward part
  - within him
  - to his inner being
  lexicon: HALOT
  rationale: Literally 'upon/into his inward part,' an idiom for life returning to
    the body/person. 'To him' communicates the sense naturally in English without
    importing a modern anatomical reading.
