id: 1KI.17.4
reference: 1 Kings 17:4
source:
  edition: WLC
  text: וְ/הָיָ֖ה מֵ/הַ/נַּ֣חַל תִּשְׁתֶּ֑ה וְ/אֶת הָ/עֹרְבִ֣ים צִוִּ֔יתִי לְ/כַלְכֶּלְ/ךָ֖
    שָֽׁם־׃
translation:
  text: And it shall be that you will drink from the brook, and I have commanded the
    ravens to provide for you there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wadi' or 'stream' for 'brook.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to sustain you' or 'to feed you.'
    reason: lexical_alternative
  - marker: c
    text: Some have proposed a non-bird reading for 'ravens,' but the ordinary Hebrew
      sense is the birds, and the following context supports that reading.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be that
  alternatives:
  - And it will happen that
  - And this shall be
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol/qatal formula introduces the ensuing circumstance.
    'And it shall be that' preserves the slightly formal predictive setup without
    sounding overly wooden.
- source_word: מֵהַנַּחַל
  chosen: from the brook
  alternatives:
  - from the wadi
  - from the stream
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi, torrent-bed, or brook. 'Brook' is natural
    English and fits the narrative setting; 'wadi' is more geographically precise
    but less accessible, so it is preserved as an alternative rather than used in
    the main text.
- source_word: תִּשְׁתֶּה
  chosen: you will drink
  alternatives:
  - you shall drink
  lexicon: HALOT
  rationale: Simple imperfect 2ms indicating future action. 'Will drink' is readable
    modern English; 'shall drink' is possible but more archaic in contemporary usage.
- source_word: הָעֹרְבִים
  chosen: the ravens
  alternatives:
  - the crows
  lexicon: HALOT
  rationale: The noun ordinarily refers to ravens/corvids. 'Ravens' is the standard
    and more specific rendering in this narrative context.
- source_word: צִוִּיתִי
  chosen: I have commanded
  alternatives:
  - I commanded
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed prior action with present
    relevance. 'I have commanded' fits the sense that the provision has already been
    arranged before Elijah arrives.
- source_word: לְכַלְכֶּלְךָ
  chosen: to provide for you
  alternatives:
  - to sustain you
  - to feed you
  lexicon: HALOT
  rationale: The verb means to sustain, support, or provide for. 'Provide for you'
    is broad enough to cover the coming food supply without narrowing the sense too
    quickly, while still sounding natural in English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple adverb of place. 'There' is the direct and natural equivalent.
