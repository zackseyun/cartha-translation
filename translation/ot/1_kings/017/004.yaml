theological_decisions:
- issue: Nature of the ravens' commission
  chosen_reading: Literal ravens are in view as agents commanded by God to sustain
    Elijah.
  alternative_readings:
  - A place-name or human group has occasionally been proposed instead of birds.
  rationale: The plain sense of הָעֹרְבִים in context is the birds 'ravens,' and the
    narrative continues with them bringing bread and meat. No doctrinal pressure requires
    demythologizing or reinterpreting the term; original-language primacy favors the
    ordinary lexical sense.
  doctrine_reference: Translation philosophy §1, §3
