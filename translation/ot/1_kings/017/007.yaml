id: 1KI.17.7
reference: 1 Kings 17:7
source:
  edition: WLC
  text: וַ/יְהִ֛י מִ/קֵּ֥ץ יָמִ֖ים וַ/יִּיבַ֣שׁ הַ/נָּ֑חַל כִּ֛י לֹֽא הָיָ֥ה גֶ֖שֶׁם
    בָּ/אָֽרֶץ־׃ס
translation:
  text: And after some time, the wadi dried up, because there was no rain in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brook.' The Hebrew word refers to a seasonal streambed or wadi.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative transition introducing
    the next event. In natural modern English, the formula is best absorbed into the
    clause rather than rendered woodenly as 'it came to pass.'
- source_word: מִקֵּץ יָמִים
  chosen: after some time
  alternatives:
  - after a while
  - at the end of days
  lexicon: HALOT
  rationale: The idiom literally means 'from the end of days' and in narrative usage
    refers to the passing of an unspecified period. 'After some time' is idiomatic
    English that preserves the indefinite sense without over-literal awkwardness.
- source_word: וַיִּיבַשׁ
  chosen: dried up
  alternatives:
  - became dry
  - dried out
  lexicon: HALOT
  rationale: The verb יבש in this context describes the brook/wadi ceasing to contain
    water. 'Dried up' is the most natural English rendering for a watercourse.
- source_word: הַנָּחַל
  chosen: the wadi
  alternatives:
  - the brook
  - the stream
  - the ravine
  lexicon: HALOT
  rationale: נחל commonly denotes a seasonal watercourse or valley stream. 'Wadi'
    best captures the Near Eastern geographical sense and explains why it can dry
    up; 'brook' is traditional but less precise.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason the wadi dried up. 'Because' communicates
    the causal force clearly in modern English.
- source_word: לֹא הָיָה גֶשֶׁם
  chosen: there was no rain
  alternatives:
  - rain had not fallen
  - there had been no rain
  lexicon: HALOT
  rationale: The clause states the absence of rainfall as the cause. 'There was no
    rain' is straightforward and preserves the simple explanatory force.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/region
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land/region affected by drought, not the whole
    earth. 'In the land' is the standard contextual rendering and fits the Elijah
    narrative.
