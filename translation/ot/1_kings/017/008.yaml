id: 1KI.17.8
reference: 1 Kings 17:8
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלָ֥י/ו לֵ/אמֹֽר־׃
translation:
  text: Then the word of Yahweh came to him, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence. In English, 'Then' naturally conveys the progression without the archaic 'it came to pass.' The verb's force is carried together with 'came' from the following clause structure.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: דבר in the construct phrase דְבַר יְהוָה is the standard prophetic formula 'the word of the LORD,' referring to divine communication. 'Word' preserves the established idiom and its theological weight better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: The preposition אֶל with 3ms suffix straightforwardly means 'to him.' 'Unto' is unnecessarily archaic for the project's modern-English style.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech. 'Saying' is the most transparent and formally faithful rendering, especially since the quoted speech begins in the next verse.
