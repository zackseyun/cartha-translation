id: 1KI.17.10
reference: 1 Kings 17:10
source:
  edition: WLC
  text: וַ/יָּ֣קָם וַ/יֵּ֣לֶךְ צָרְפַ֗תָ/ה וַ/יָּבֹא֙ אֶל פֶּ֣תַח הָ/עִ֔יר וְ/הִנֵּֽה
    שָׁ֛ם אִשָּׁ֥ה אַלְמָנָ֖ה מְקֹשֶׁ֣שֶׁת עֵצִ֑ים וַ/יִּקְרָ֤א אֵלֶ֨י/הָ֙ וַ/יֹּאמַ֔ר
    קְחִי נָ֨א לִ֧/י מְעַט מַ֛יִם בַּ/כְּלִ֖י וְ/אֶשְׁתֶּֽה׀־־־־׃
translation:
  text: So he arose and went to Zarephath. When he came to the entrance of the city,
    behold, a widow was there gathering sticks. He called to her and said, “Please
    bring me a little water in a vessel, so that I may drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gate of the city.' The Hebrew says 'entrance/opening of the city' (פֶּתַח),
      which is broader than the more specific word for 'gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks rising or setting oneself to act.
    'He arose' preserves the narrative cadence and slightly formal register without
    obscuring meaning.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - set out
  lexicon: HALOT
  rationale: הלך is the standard verb 'go/walk.' 'Went' is the most natural and sufficiently
    literal rendering in sequence with the preceding verb.
- source_word: צָרְפַתָה
  chosen: to Zarephath
  alternatives:
  - toward Zarephath
  lexicon: HALOT
  rationale: Directional he indicates motion toward the place. Standard English idiom
    is simply 'to Zarephath.' The place name is transliterated per translation philosophy.
- source_word: וַיָּבֹא אֶל פֶּתַח הָעִיר
  chosen: When he came to the entrance of the city
  alternatives:
  - and he came to the gate of the city
  - and he came to the opening of the city
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance,' not the more specific שַׁעַר 'gate.' 'Entrance
    of the city' best reflects the Hebrew while remaining natural English. Rendering
    the clause with 'When he came' smooths the Hebrew narrative sequence into readable
    English without loss of sense.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Behold' preserves
    the deictic force and narrative vividness better than flattening it into mere
    existence.
- source_word: אִשָּׁה אַלְמָנָה
  chosen: a widow
  alternatives:
  - a widowed woman
  lexicon: HALOT
  rationale: The appositional phrase literally 'a woman, a widow' is idiomatically
    rendered 'a widow' in English, since the gender is already inherent in the noun.
- source_word: מְקֹשֶׁשֶׁת עֵצִים
  chosen: gathering sticks
  alternatives:
  - collecting wood
  - gathering pieces of wood
  lexicon: HALOT
  rationale: קשׁשׁ often refers to gathering small pieces such as stubble or sticks.
    'Gathering sticks' fits the immediate context and avoids suggesting large timber.
- source_word: וַיִּקְרָא אֵלֶיהָ
  chosen: He called to her
  alternatives:
  - He called out to her
  - He cried to her
  lexicon: HALOT
  rationale: קרא with אֶל commonly means to call to someone. 'Called to her' is straightforward
    and natural.
- source_word: קְחִי נָא
  chosen: Please bring
  alternatives:
  - Please take
  - Fetch, please
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in a request for obtaining something
    for the speaker, idiomatic English is 'bring.' נָא adds politeness or entreaty,
    well conveyed by 'please.'
- source_word: מְעַט מַיִם
  chosen: a little water
  alternatives:
  - a small amount of water
  - some water
  lexicon: HALOT
  rationale: מְעַט denotes a small quantity. 'A little water' is the most natural
    equivalent.
- source_word: בַּכְּלִי
  chosen: in a vessel
  alternatives:
  - in a jar
  - in a container
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel/container/implement. 'Vessel' preserves
    the generality of the Hebrew; more specific options like 'jar' would over-interpret.
- source_word: וְאֶשְׁתֶּה
  chosen: so that I may drink
  alternatives:
  - that I may drink
  - and let me drink
  lexicon: HALOT
  rationale: The cohortative expresses purpose or desired result. 'So that I may drink'
    captures the request's aim in clear English.
