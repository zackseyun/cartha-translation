id: 1KI.17.2
reference: 1 Kings 17:2
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלָ֥י/ו לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to him, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. In English,
    rendering the clause idiomatically as 'And ... came' preserves the sequence without
    the wooden 'and it happened,' while still reflecting the Hebrew narrative flow.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: Construct with the divine name yields the standard prophetic formula
    'the word of YHWH.' 'The word' preserves the formulaic and revelatory sense better
    than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English convention and preserving reverential
    treatment of the Tetragrammaton.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix normally indicates direction
    toward a person. 'To him' is the natural English rendering in this revelatory
    formula.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct functions as the standard introduction to direct
    speech. 'Saying' is the conventional and clear English equivalent.
