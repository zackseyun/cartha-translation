id: 1KI.17.12
reference: 1 Kings 17:12
source:
  edition: WLC
  text: וַ/תֹּ֗אמֶר חַי יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אִם יֶשׁ לִ֣/י מָע֔וֹג כִּ֣י אִם מְלֹ֤א כַף קֶ֨מַח֙ בַּ/כַּ֔ד וּ/מְעַט שֶׁ֖מֶן בַּ/צַּפָּ֑חַת וְ/הִנְ/נִ֨י מְקֹשֶׁ֜שֶׁת שְׁנַ֣יִם עֵצִ֗ים וּ/בָ֨אתִי֙ וַ/עֲשִׂיתִ֨י/הוּ֙ לִ֣/י וְ/לִ/בְנִ֔/י וַ/אֲכַלְנֻ֖/הוּ וָ/מָֽתְנוּ־־־־־־׃
translation:
  text: And she said, “As Yahweh your God lives, I have no bread-cake, only a handful of flour in the jar and a little oil in the jug. And look, I am gathering two sticks, so that I may go in and prepare it for myself and for my son, and we may eat it and die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have no loaf” or “I have no baked bread.” The Hebrew מָעוֹג refers to a small bread-cake.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: As the LORD ... lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: Standard oath formula. Rendering it as 'As the LORD ... lives' preserves the solemn oath sense in natural English while keeping YHWH as 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct possessive construction addressed to Elijah; straightforwardly rendered 'your God.'
- source_word: אִם יֶשׁ לִי מָעוֹג
  chosen: I have no bread-cake
  alternatives:
  - I have no loaf
  - I have no baked bread
  lexicon: HALOT
  rationale: In this oath/denial context, אִם functions idiomatically as a strong negation. מָעוֹג denotes a small round cake or bread-cake rather than bread in general, so 'bread-cake' preserves the specific sense.
- source_word: כִּי אִם
  chosen: only
  alternatives:
  - except that
  - but only
  lexicon: HALOT
  rationale: Idiomatic exceptive phrase introducing what she does have; 'only' is concise and natural.
- source_word: מְלֹא כַף קֶמַח
  chosen: a handful of flour
  alternatives:
  - a palmful of flour
  - a full hand of flour
  lexicon: HALOT
  rationale: Literally 'a fullness of the palm/hand of flour.' 'A handful of flour' is the natural English equivalent and preserves the small quantity.
- source_word: כַּד
  chosen: jar
  alternatives:
  - pitcher
  - container
  lexicon: HALOT
  rationale: A household vessel for storing flour; 'jar' fits the domestic setting and pairs well with 'jug' for the oil vessel.
- source_word: מְעַט שֶׁמֶן
  chosen: a little oil
  alternatives:
  - a small amount of oil
  lexicon: HALOT
  rationale: Simple quantitative phrase; 'a little oil' is idiomatic and accurate.
- source_word: צַפַּחַת
  chosen: jug
  alternatives:
  - flask
  - jar
  lexicon: HALOT
  rationale: A small vessel suitable for holding oil. 'Jug' is readable modern English and distinguishes it from כַּד.
- source_word: וְהִנְנִי
  chosen: And look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Signals immediacy and draws attention to her present action. 'And look' is readable modern English without archaic tone.
- source_word: מְקֹשֶׁשֶׁת
  chosen: I am gathering
  alternatives:
  - I am picking up
  - I am collecting
  lexicon: HALOT
  rationale: The participle indicates ongoing action; 'I am gathering' captures the present activity.
- source_word: שְׁנַיִם עֵצִים
  chosen: two sticks
  alternatives:
  - two pieces of wood
  lexicon: HALOT
  rationale: In context this refers to small pieces for a minimal fire, not two logs. 'Two sticks' preserves the pathos of scarcity.
- source_word: וּבָאתִי וַעֲשִׂיתִיהוּ
  chosen: so that I may go in and prepare it
  alternatives:
  - then I will go in and make it
  - and I will come and prepare it
  lexicon: HALOT
  rationale: The sequence expresses intended action following the gathering. 'Prepare it' is slightly broader and more natural in English than 'make it,' while the pronoun refers to the meal from the flour and oil.
- source_word: לִי וְלִבְנִי
  chosen: for myself and for my son
  alternatives:
  - for me and my son
  lexicon: HALOT
  rationale: Explicitly preserves both prepositional phrases and the personal focus of her statement.
- source_word: וַאֲכַלְנֻהוּ
  chosen: and we may eat it
  alternatives:
  - and let us eat it
  - and we will eat it
  lexicon: HALOT
  rationale: The verbal sequence expresses intended result/purpose. 'We may eat it' fits the preceding 'so that I may...' construction in English.
- source_word: וָמָתְנוּ
  chosen: and die
  alternatives:
  - and then die
  lexicon: HALOT
  rationale: Plain future consequence of their final meal. The concise 'and die' preserves the starkness of the Hebrew.
