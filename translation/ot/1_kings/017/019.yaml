id: 1KI.17.19
reference: 1 Kings 17:19
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלֶ֖י/הָ תְּנִֽי לִ֣/י אֶת בְּנֵ֑/ךְ וַ/יִּקָּחֵ֣/הוּ מֵ/חֵיקָ֗/הּ
    וַֽ/יַּעֲלֵ֨/הוּ֙ אֶל הָ/עֲלִיָּ֗ה אֲשֶׁר הוּא֙ יֹשֵׁ֣ב שָׁ֔ם וַ/יַּשְׁכִּבֵ֖/הוּ
    עַל מִטָּתֽ/וֹ־־־־־׃
translation:
  text: And he said to her, “Give me your son.” Then he took him from her lap, carried
    him up to the upper room where he was staying, and laid him on his own bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from her bosom.' The Hebrew term refers to the chest/lap area and conveys
      close maternal holding.
    reason: lexical_alternative
  - marker: b
    text: Or 'the upstairs room' or 'the loft.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנִי לִי
  chosen: Give me
  alternatives:
  - Hand over to me
  lexicon: HALOT
  rationale: נתן in the imperative with indirect object לִי is naturally rendered
    'Give me.' This is direct, idiomatic English and preserves the urgency of Elijah's
    request without adding harshness.
- source_word: בְּנֵךְ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: בֵּן specifically means 'son,' not the more general 'child.' Gender-accurate
    rendering follows the source text.
- source_word: מֵחֵיקָהּ
  chosen: from her lap
  alternatives:
  - from her bosom
  - from her arms
  lexicon: HALOT
  rationale: חֵיק denotes the bosom/lap area. 'From her lap' is natural modern English
    and fits the image of the mother holding the child. 'Bosom' is more formal/archaic;
    'arms' is interpretive and less precise.
- source_word: וַיַּעֲלֵהוּ
  chosen: carried him up
  alternatives:
  - brought him up
  - took him up
  lexicon: HALOT
  rationale: עלה with object and destination indicates upward movement. 'Carried him
    up' makes explicit in idiomatic English that Elijah physically bore the boy upstairs,
    which is implied by the context.
- source_word: הָעֲלִיָּה
  chosen: the upper room
  alternatives:
  - the upstairs room
  - the loft
  lexicon: HALOT
  rationale: עֲלִיָּה refers to an upper chamber/roof room. 'Upper room' is a clear
    and established English equivalent without sounding archaic.
- source_word: אֲשֶׁר הוּא יֹשֵׁב שָׁם
  chosen: where he was staying
  alternatives:
  - where he was living
  - where he was dwelling there
  lexicon: HALOT
  rationale: ישב commonly means 'sit,' but in context it denotes residing/staying.
    'Where he was staying' is idiomatic and contextually accurate, avoiding the overly
    literal but misleading 'sitting there.'
- source_word: וַיַּשְׁכִּבֵהוּ
  chosen: laid him
  alternatives:
  - made him lie down
  - placed him
  lexicon: HALOT
  rationale: The Hiphil of שׁכב means to cause to lie down. 'Laid him' is concise,
    natural English that preserves the action.
- source_word: עַל מִטָּתוֹ
  chosen: on his own bed
  alternatives:
  - on his bed
  lexicon: HALOT
  rationale: The suffix refers back to Elijah, the subject of the surrounding verbs.
    'His own bed' clarifies the referent in English and avoids possible ambiguity
    with the boy's bed.
