id: 1KI.17.23
reference: 1 Kings 17:23
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אֵלִיָּ֜הוּ אֶת הַ/יֶּ֗לֶד וַ/יֹּרִדֵ֤/הוּ מִן הָ/עֲלִיָּה֙ הַ/בַּ֔יְתָ/ה
    וַֽ/יִּתְּנֵ֖/הוּ לְ/אִמּ֑/וֹ וַ/יֹּ֨אמֶר֙ אֵ֣לִיָּ֔הוּ רְאִ֖י חַ֥י בְּנֵֽ/ךְ־־׃
translation:
  text: Then Elijah took the boy, brought him down from the upper room into the house,
    and gave him to his mother. And Elijah said, “See, your son is alive.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your son lives.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - picked up
  - received
  lexicon: HALOT
  rationale: Common narrative verb לקח in wayyiqtol; 'took' is the most natural and
    sufficiently formal rendering in English narrative.
- source_word: הַיֶּלֶד
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: יֶלֶד can mean child/boy. Here the mother-son context and prior narrative
    favor 'boy' as a natural English rendering without implying infancy.
- source_word: וַיֹּרִדֵהוּ
  chosen: brought him down
  alternatives:
  - carried him down
  - took him down
  lexicon: HALOT
  rationale: From ירד in a causative form, meaning to cause to go down/bring down.
    'Brought him down' captures the movement from the upper room without over-specifying
    manner.
- source_word: הָעֲלִיָּה
  chosen: the upper room
  alternatives:
  - the upstairs room
  - the loft
  - the upper chamber
  lexicon: HALOT
  rationale: עֲלִיָּה denotes an upper chamber/roof room. 'Upper room' is clear modern
    English and preserves the architectural sense.
- source_word: הַבַּיְתָה
  chosen: into the house
  alternatives:
  - to the house
  - inside the house
  lexicon: HALOT
  rationale: The directional ending on בַּיְתָה indicates motion toward/into the house.
    'Into the house' best reflects the directional nuance in idiomatic English.
- source_word: וַיִּתְּנֵהוּ לְאִמּוֹ
  chosen: gave him to his mother
  alternatives:
  - returned him to his mother
  - handed him to his mother
  lexicon: HALOT
  rationale: נתן plus indirect object is straightforwardly 'gave ... to.' 'Returned'
    is interpretive and goes beyond the lexical form, though contextually implied.
- source_word: רְאִי
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative feminine singular from ראה addressed to the mother. 'See'
    is natural, direct, and preserves the deictic force without archaic tone.
- source_word: חַי בְּנֵךְ
  chosen: your son is alive
  alternatives:
  - your son lives
  - your son is living
  lexicon: HALOT
  rationale: Predicate adjective + subject expresses the restored state of life. 'Is
    alive' is idiomatic modern English and clearly communicates the miracle's result.
