theological_decisions:
- issue: Degree of explicitness regarding the resurrection miracle
  chosen_reading: Render the statement simply as 'your son is alive' without adding
    interpretive wording such as 'has been raised back to life.'
  alternative_readings:
  - your son lives again
  - your son has been restored to life
  rationale: The Hebrew states the fact of life directly and dramatically. The miracle
    is clear from context, but the translation should not expand the wording beyond
    the source text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
