theological_decisions:
- issue: Nature of Elijah's provision by עֹרְבִים
  chosen_reading: literal ravens
  alternative_readings:
  - Arabians/merchants or other human agents
  rationale: The plain lexical sense of עֹרְבִים is 'ravens,' and nothing in the immediate
    context requires reinterpreting the term to avoid the miraculous element. Following
    original-language primacy, the main text keeps the ordinary meaning.
  doctrine_reference: Translation philosophy §1, §3
