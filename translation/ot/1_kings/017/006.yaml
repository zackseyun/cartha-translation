id: 1KI.17.6
reference: 1 Kings 17:6
source:
  edition: WLC
  text: וְ/הָ/עֹרְבִ֗ים מְבִיאִ֨ים ל֜/וֹ לֶ֤חֶם וּ/בָשָׂר֙ בַּ/בֹּ֔קֶר וְ/לֶ֥חֶם וּ/בָשָׂ֖ר
    בָּ/עָ֑רֶב וּ/מִן הַ/נַּ֖חַל יִשְׁתֶּֽה־׃
translation:
  text: And the ravens were bringing him bread and meat in the morning, and bread
    and meat in the evening, and he would drink from the wadi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brook' or 'stream'; the Hebrew נַחַל refers to a wadi or watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֹרְבִים
  chosen: and the ravens
  alternatives:
  - and the crows
  lexicon: HALOT
  rationale: עֹרְבִים ordinarily denotes ravens/corvids; 'ravens' is the standard
    and more specific English rendering. The conjunction is carried as 'and.'
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - bring
  lexicon: HALOT
  rationale: The participle conveys ongoing/repeated action in narrative context.
    'Were bringing' captures the iterative sense better than a simple past, while
    remaining natural English.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: English idiom prefers 'bringing him' rather than the more wooden 'bringing
    to him,' while preserving the indirect object.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The concrete noun is best preserved as 'bread'; broadening to 'food'
    would paraphrase beyond the source.
- source_word: וּבָשָׂר
  chosen: and meat
  alternatives:
  - and flesh
  lexicon: HALOT
  rationale: בָּשָׂר here refers to edible flesh; 'meat' is the natural contextual
    rendering in modern English.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'in the morning' is idiomatic
    and accurate.
- source_word: וְלֶחֶם וּבָשָׂר בָּעָרֶב
  chosen: and bread and meat in the evening
  alternatives:
  - and bread and meat at evening
  lexicon: HALOT
  rationale: The repetition in Hebrew is retained rather than compressed, preserving
    the rhythm and emphasis of the provision morning and evening.
- source_word: וּמִן הַנַּחַל
  chosen: from the wadi
  alternatives:
  - from the brook
  - from the stream
  lexicon: HALOT
  rationale: נַחַל denotes a wadi/seasonal watercourse. 'Wadi' reflects the Hebrew
    more precisely than the traditional 'brook,' though 'brook' remains a viable alternative.
- source_word: יִשְׁתֶּה
  chosen: he would drink
  alternatives:
  - he drank
  - he drinks
  lexicon: HALOT
  rationale: The imperfect here naturally expresses customary/repeated action in the
    narrative setting. 'Would drink' conveys habitual action from the wadi.
