theological_decisions:
- issue: Meaning of God's statement that he has 'commanded' the widow
  chosen_reading: Retain the direct wording 'I have commanded' without softening it.
  alternative_readings:
  - I have appointed a widow there
  - I have prepared a widow there
  rationale: The Hebrew verb צוה straightforwardly means 'command.' Some interpreters
    soften the expression because the widow does not appear consciously aware of a
    prior divine command in the following narrative. Per translation philosophy, the
    translation should preserve the textual wording and its theological tension rather
    than resolve it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
