id: 1KI.17.9
reference: 1 Kings 17:9
source:
  edition: WLC
  text: ק֣וּם לֵ֤ךְ צָרְפַ֨תָ/ה֙ אֲשֶׁ֣ר לְ/צִיד֔וֹן וְ/יָשַׁבְתָּ֖ שָׁ֑ם הִנֵּ֨ה
    צִוִּ֥יתִי שָׁ֛ם אִשָּׁ֥ה אַלְמָנָ֖ה לְ/כַלְכְּלֶֽ/ךָ׃
translation:
  text: Get up, go to Zarephath, which belongs to Sidon, and stay there. Look, I have
    commanded a widow there to provide for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is in Sidon' or 'which is near Sidon.' The Hebrew more literally
      relates Zarephath to Sidon, likely indicating regional or political association.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have appointed a widow there to sustain you.' The Hebrew says 'I have
      commanded,' which may describe God's sovereign direction even if the widow is
      not yet shown as consciously aware of it.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֣וּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise up
  lexicon: HALOT
  rationale: Imperative of קום meaning to arise/stand up. 'Get up' is natural modern
    English while preserving the command's force.
- source_word: לֵ֤ךְ
  chosen: go
  alternatives:
  - walk
  - depart
  lexicon: HALOT
  rationale: Imperative of הלך in a movement command. 'Go' is the standard and most
    idiomatic rendering in English.
- source_word: צָרְפַתָ/ה֙
  chosen: Zarephath
  lexicon: HALOT
  rationale: Place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: אֲשֶׁ֣ר לְ/צִיד֔וֹן
  chosen: which belongs to Sidon
  alternatives:
  - which is in Sidon
  - which is near Sidon
  lexicon: HALOT
  rationale: The phrase identifies Zarephath in relation to Sidon. The preposition
    ל can indicate belonging or association. 'Belongs to Sidon' reflects political/geographical
    affiliation more precisely than simply 'in Sidon,' while remaining readable.
- source_word: וְ/יָשַׁבְתָּ֖ שָׁ֑ם
  chosen: and stay there
  alternatives:
  - and live there
  - and dwell there
  lexicon: HALOT
  rationale: Qal perfect with vav used as an imperative/result sequence after prior
    imperatives. 'Stay there' is idiomatic and captures the command to reside there
    without archaic tone.
- source_word: הִנֵּ֨ה
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' preserves the discourse function
    in contemporary English better than archaic 'Behold.'
- source_word: צִוִּ֥יתִי
  chosen: I have commanded
  alternatives:
  - I have appointed
  - I have instructed
  lexicon: HALOT
  rationale: Piel perfect of צוה, commonly 'command.' 'I have commanded' preserves
    the verbal force and leaves intact the theological tension of how this command
    operates in the narrative.
- source_word: אִשָּׁ֥ה אַלְמָנָ֖ה
  chosen: a widow
  alternatives:
  - a widowed woman
  lexicon: HALOT
  rationale: The construct-like apposition 'a woman, a widow' is naturally rendered
    'a widow' in English without loss of meaning.
- source_word: לְ/כַלְכְּלֶֽ/ךָ
  chosen: to provide for you
  alternatives:
  - to sustain you
  - to feed you
  lexicon: HALOT
  rationale: The verb כלכל denotes sustaining/providing support. 'Provide for you'
    is broad enough to include food and ongoing care, fitting the context well.
