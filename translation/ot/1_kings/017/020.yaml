id: 1KI.17.20
reference: 1 Kings 17:20
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א אֶל יְהוָ֖ה וַ/יֹּאמַ֑ר יְהוָ֣ה אֱלֹהָ֔/י הֲ֠/גַם עַל הָ/אַלְמָנָ֞ה אֲשֶׁר אֲנִ֨י מִתְגּוֹרֵ֥ר עִמָּ֛/הּ הֲרֵע֖וֹתָ לְ/הָמִ֥ית אֶת בְּנָֽ/הּ־־־־׃
translation:
  text: Then he cried out to Yahweh and said, “O Yahweh my God, have you also brought harm on the widow with whom I am staying, by causing her son to die?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have you done evil to the widow'; the Hebrew verb can denote doing harm, bringing calamity, or dealing badly.
    reason: lexical_alternative
  - marker: b
    text: Or 'with whom I sojourn'; the Hebrew suggests residing as a guest or dependent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: cried out
  alternatives:
  - called
  - called out
  lexicon: HALOT
  rationale: קרא with אֶל־יְהוָה in a prayer context conveys urgent appeal, stronger than a neutral 'said' or 'called.' 'Cried out' captures the emotional force while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְהוָה אֱלֹהָי
  chosen: LORD my God
  alternatives:
  - O LORD, my God
  - LORD, my God
  lexicon: HALOT
  rationale: This is a direct address combining the divine name with a first-person possessive on 'God.' 'LORD my God' preserves the Hebrew compactness; English punctuation can vary, but the sense is vocative prayer.
- source_word: הֲגַם
  chosen: also
  alternatives:
  - even
  - indeed also
  lexicon: HALOT
  rationale: 'The interrogative-plus-additive particle expresses shocked extension: ''have you also...?'' ''Also'' best preserves the sense that this calamity is added to prior hardship.'
- source_word: עַל הָאַלְמָנָה
  chosen: on the widow
  alternatives:
  - against the widow
  - to the widow
  lexicon: HALOT
  rationale: With רעע, עַל marks adverse action directed toward someone. 'On the widow' is idiomatic in English with 'brought harm on'; 'against' is possible but less natural here.
- source_word: מִתְגּוֹרֵר עִמָּהּ
  chosen: with whom I am staying
  alternatives:
  - with whom I sojourn
  - with whom I am residing
  lexicon: HALOT
  rationale: גור in the hitpael denotes residing as a dependent/temporary guest. 'Staying' is readable modern English and fits the narrative situation better than the archaic 'sojourn.'
- source_word: הֲרֵעוֹתָ
  chosen: have you also brought harm
  alternatives:
  - have you done evil
  - have you afflicted
  - have you dealt badly
  lexicon: HALOT
  rationale: The hiphil of רעע here means to cause harm or bring calamity, not necessarily moral evil in the abstract. 'Brought harm' communicates the causative sense and avoids implying Elijah accuses God of moral wrongdoing.
- source_word: לְהָמִית
  chosen: by causing ... to die
  alternatives:
  - to kill
  - so as to put to death
  lexicon: HALOT
  rationale: The infinitive expresses the means/result of the harm. 'By causing her son to die' is more idiomatic and contextually appropriate than the blunt 'to kill,' while still preserving divine causation as stated in Elijah's prayer.
- source_word: בְּנָהּ
  chosen: her son
  alternatives:
  - her child
  lexicon: HALOT
  rationale: בן specifically means 'son,' and the narrative concerns the widow's male child. Gender-specific rendering follows the source.
