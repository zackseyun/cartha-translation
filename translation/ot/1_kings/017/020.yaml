theological_decisions:
- issue: Whether Elijah's prayer should be rendered as accusing God of moral evil or lamenting calamity permitted/brought by God
  chosen_reading: Rendered as 'have you also brought harm ... by causing her son to die'
  alternative_readings:
  - have you done evil to the widow ... by killing her son
  - have you afflicted the widow ... by letting her son die
  rationale: The Hebrew hiphil of רעע can denote causing harm/calamity without necessarily imputing moral evil. The translation preserves Elijah's bold lament and attribution of the event to God's action, while avoiding an English phrasing that would overstate a charge of moral wickedness beyond what the Hebrew requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
