id: 1KI.12.33
reference: 1 Kings 12:33
source:
  edition: WLC
  text: וַ/יַּ֜עַל עַֽל הַ/מִּזְבֵּ֣חַ אֲשֶׁר עָשָׂ֣ה בְּ/בֵֽית אֵ֗ל בַּ/חֲמִשָּׁ֨ה
    עָשָׂ֥ר יוֹם֙ בַּ/חֹ֣דֶשׁ הַ/שְּׁמִינִ֔י בַּ/חֹ֖דֶשׁ אֲשֶׁר בָּדָ֣א מ/ל/בד וַ/יַּ֤עַשׂ
    חָג֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל וַ/יַּ֥עַל עַל הַ/מִּזְבֵּ֖חַ לְ/הַקְטִֽיר־׀־־־־׃פ
translation:
  text: And he went up to the altar that he had made in Bethel on the fifteenth day
    in the eighth month, in the month that he had devised from his own heart, and
    he made a feast for the sons of Israel; and he went up to the altar to burn incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the month that he had devised on his own' or 'of his own choosing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel,' a standard national designation for the people
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: he went up
  alternatives:
  - he ascended
  - he went up onto
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In altar context it can imply approaching
    or mounting the altar area. 'Went up' is natural English and preserves the repeated
    narrative wording.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the sacrificial altar. No contextual reason
    to expand beyond the Hebrew.
- source_word: אֲשֶׁר עָשָׂה בְּבֵית־אֵל
  chosen: that he had made in Bethel
  alternatives:
  - which he had made at Bethel
  lexicon: HALOT
  rationale: Straightforward relative clause. 'In Bethel' reflects בְּ naturally here
    for location.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  chosen: on the fifteenth day
  alternatives:
  - on the fifteenth
  lexicon: HALOT
  rationale: Idiomatic English date expression preserving the Hebrew temporal construction.
- source_word: בַּחֹדֶשׁ הַשְּׁמִינִי
  chosen: in the eighth month
  alternatives:
  - of the eighth month
  lexicon: HALOT
  rationale: Clear temporal phrase; 'in' is idiomatic in English for month designation.
- source_word: בַּחֹדֶשׁ אֲשֶׁר בָּדָא מִלְּבַד
  chosen: in the month that he had devised from his own heart
  alternatives:
  - in the month that he had invented on his own
  - in the month that he had contrived from himself
  lexicon: HALOT
  rationale: בדא conveys devising/inventing. מִלְּבַד here is an idiom meaning from
    his own mind/heart, not merely 'by himself.' 'From his own heart' preserves the
    evaluative force and echoes the Hebrew anthropology.
- source_word: וַיַּעַשׂ חָג
  chosen: he made a feast
  alternatives:
  - he held a feast
  - he instituted a festival
  lexicon: HALOT
  rationale: עשה + חג is literally 'made a feast/festival.' 'Made a feast' stays close
    to the Hebrew while remaining understandable.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: בני ישראל is formally 'sons of Israel.' Per translation philosophy, gender-accurate
    renderings are preferred where they match source intent. Here it is the standard
    national designation; retaining 'sons of Israel' preserves the Hebrew form, though
    'Israelites' is possible.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - to make an offering smoke
  - to offer incense
  lexicon: HALOT
  rationale: הקטיר in cultic contexts refers to causing an offering to go up in smoke,
    often specifically burning incense. Given Jeroboam's altar activity and common
    English usage, 'to burn incense' is the most natural concise rendering.
