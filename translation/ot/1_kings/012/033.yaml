theological_decisions:
- issue: Rendering the evaluative phrase מִלְּבַד in Jeroboam's cultic innovation
  chosen_reading: from his own heart
  alternative_readings:
  - on his own
  - of his own choosing
  rationale: The phrase underscores that the festival month was self-devised rather
    than divinely appointed. 'From his own heart' preserves the Hebrew idiom and the
    narrator's implicit critique without adding commentary beyond the text.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Rendering בני ישראל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew expression is grammatically masculine plural and is the conventional
    covenantal/national designation. Following the gender-accurate principle, the
    formal expression is retained rather than neutralized, while recognizing that
    it refers corporately to the nation.
  doctrine_reference: 'Translation philosophy #4'
