id: 1KI.12.17
reference: 1 Kings 12:17
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֔ל הַ/יֹּשְׁבִ֖ים בְּ/עָרֵ֣י יְהוּדָ֑ה וַ/יִּמְלֹ֥ךְ עֲלֵי/הֶ֖ם
    רְחַבְעָֽם׃פ
translation:
  text: But Rehoboam reigned over the Israelites who lived in the cities of Judah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  chosen: the Israelites
  alternatives:
  - the sons of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: Although literally 'sons of Israel,' the idiomatic national sense here
    is best conveyed by 'the Israelites.' This avoids an unnecessarily wooden rendering
    while preserving the ethnic-covenantal reference.
- source_word: הַ/יֹּשְׁבִים
  chosen: who lived
  alternatives:
  - who were dwelling
  - who sat
  lexicon: HALOT
  rationale: The participle of ישב commonly denotes residing or dwelling. 'Who lived'
    is natural modern English and accurately reflects ongoing residence.
- source_word: בְּ/עָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - in Judah's cities
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Cities of Judah' preserves the territorial
    sense without overinterpreting political boundaries.
- source_word: וַ/יִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: The verb מלך in this narrative context denotes exercising kingship. 'Reigned'
    is the most idiomatic and concise rendering in English.
- source_word: עֲלֵי/הֶם
  chosen: over
  alternatives:
  - over them
  lexicon: HALOT
  rationale: English normally omits the explicit pronoun because the object is immediately
    specified by the preceding phrase. 'Over' fully conveys the governing relationship.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וּ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction marks contrast with the preceding account of the northern
    tribes' revolt. 'But' brings out the adversative force in context better than
    a simple 'And'.
