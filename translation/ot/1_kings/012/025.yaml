id: 1KI.12.25
reference: 1 Kings 12:25
source:
  edition: WLC
  text: וַ/יִּ֨בֶן יָרָבְעָ֧ם אֶת שְׁכֶ֛ם בְּ/הַ֥ר אֶפְרַ֖יִם וַ/יֵּ֣שֶׁב בָּ֑/הּ
    וַ/יֵּצֵ֣א מִ/שָּׁ֔ם וַ/יִּ֖בֶן אֶת פְּנוּאֵֽל־־׃
translation:
  text: Then Jeroboam built Shechem in the hill country of Ephraim and lived there;
    and he went out from there and built Penuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Penuel is also spelled Peniel in some English renderings and related biblical
      passages.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fortified
  - rebuilt
  lexicon: HALOT
  rationale: The verb בנה commonly means 'build.' In a city context it can imply rebuilding
    or fortifying, but the plain sense 'built' best preserves the Hebrew without over-specifying
    the nature of the construction.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Proper place name; transliterated according to standard English convention.
- source_word: בְּהַר אֶפְרַיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in Mount Ephraim
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר can denote mountainous or hill-country region, not only a single
    mountain. 'Hill country of Ephraim' is idiomatic modern English and fits the geographic
    sense.
- source_word: וַיֵּשֶׁב בָּהּ
  chosen: and lived there
  alternatives:
  - and dwelt in it
  - and settled in it
  lexicon: HALOT
  rationale: ישב often means 'sit, dwell, live, settle.' 'Lived there' is natural
    English and accurately conveys residence without archaic tone. The feminine suffix
    refers to the city, rendered idiomatically as 'there' rather than 'in her/it.'
- source_word: וַיֵּצֵא מִשָּׁם
  chosen: and he went out from there
  alternatives:
  - and he departed from there
  - and he went forth from there
  lexicon: HALOT
  rationale: יצא literally means 'go out.' The phrase likely indicates departure from
    Shechem. 'Went out from there' preserves the movement language more closely than
    the more interpretive 'departed.'
- source_word: פְּנוּאֵל
  chosen: Penuel
  alternatives:
  - Peniel
  rationale: Proper place name. 'Penuel' matches the consonantal form here. 'Peniel'
    is a known variant spelling in English tradition and elsewhere in Hebrew, worth
    preserving in a footnote as a lexical alternative.
