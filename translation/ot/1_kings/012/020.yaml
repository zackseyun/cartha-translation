theological_decisions:
- issue: Political allegiance formula after the schism
  chosen_reading: No one followed the house of David except the tribe of Judah alone
  alternative_readings:
  - No one remained with the house of David except the tribe of Judah alone
  rationale: This is primarily a historical-political statement, not a theological
    one. 'Followed' best reflects the Hebrew idiom אַחֲרֵי in context of allegiance,
    while avoiding interpretive expansion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
