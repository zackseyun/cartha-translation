id: 1KI.12.20
reference: 1 Kings 12:20
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/שְׁמֹ֤עַ כָּל יִשְׂרָאֵל֙ כִּֽי שָׁ֣ב יָרָבְעָ֔ם וַֽ/יִּשְׁלְח֗וּ
    וַ/יִּקְרְא֤וּ אֹת/וֹ֙ אֶל הָ֣/עֵדָ֔ה וַ/יַּמְלִ֥יכוּ אֹת֖/וֹ עַל כָּל יִשְׂרָאֵ֑ל
    לֹ֤א הָיָה֙ אַחֲרֵ֣י בֵית דָּוִ֔ד זוּלָתִ֥י שֵֽׁבֶט יְהוּדָ֖ה לְ/בַדּֽ/וֹ־־־־־־־׃
translation:
  text: And when all Israel heard that Jeroboam had returned, they sent and called
    him to the assembly and made him king over all Israel. No one followed the house
    of David except the tribe of Judah alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No one remained with the house of David except the tribe of Judah alone.'
      The Hebrew idiom literally says 'was after the house of David,' expressing allegiance
      or alignment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The waw-consecutive with היה plus infinitive construct of שמע introduces
    a narrative transition. In idiomatic modern English, 'And when ... heard' preserves
    the temporal force without woodenly retaining 'it happened.'
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Retains the collective national expression of the Hebrew. 'All Israel'
    is a standard and natural rendering in this historical context.
- source_word: כִּי שָׁב יָרָבְעָם
  chosen: that Jeroboam had returned
  alternatives:
  - that Jeroboam came back
  - that Jeroboam had come back
  lexicon: HALOT
  rationale: שׁוּב here denotes return. The pluperfect-like English 'had returned'
    fits the reported event prior to the subsequent actions.
- source_word: וַיִּשְׁלְחוּ
  chosen: they sent
  alternatives:
  - they sent word
  - they sent messengers
  lexicon: HALOT
  rationale: The verb simply says 'they sent'; the object is unstated. English can
    leave it implicit, avoiding over-interpretation such as 'messengers,' though that
    is likely implied by context.
- source_word: וַיִּקְרְאוּ אֹתוֹ אֶל הָעֵדָה
  chosen: and called him to the assembly
  alternatives:
  - and summoned him to the congregation
  - and invited him to the assembly
  lexicon: HALOT
  rationale: קרא with אל conveys summoning/calling someone to a gathering. 'Assembly'
    is clear modern English for עֵדָה in this political gathering context; 'congregation'
    could sound overly ecclesial here.
- source_word: הָעֵדָה
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: In this context the term refers to the assembled body of Israel for political
    action. 'Assembly' best captures that without importing later religious associations.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  chosen: and made him king
  alternatives:
  - and crowned him king
  - and proclaimed him king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause to reign / make king. 'Made him king'
    is direct and close to the Hebrew; 'crowned' would add ceremony not stated.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering of royal rule with על. 'Over all Israel' preserves
    the scope of Jeroboam's kingship.
- source_word: לֹא הָיָה אַחֲרֵי בֵית דָּוִד
  chosen: No one followed the house of David
  alternatives:
  - There was none after the house of David
  - No one remained behind the house of David
  lexicon: HALOT
  rationale: The idiom 'to be after' here means to follow/align with. 'Followed the
    house of David' communicates political allegiance clearly in English.
- source_word: זוּלָתִי שֵׁבֶט יְהוּדָה לְבַדּוֹ
  chosen: except the tribe of Judah alone
  alternatives:
  - except only the tribe of Judah
  - besides the tribe of Judah alone
  lexicon: HALOT
  rationale: זוּלָתִי marks exception, and לְבַדּוֹ intensifies exclusivity. 'Except
    the tribe of Judah alone' preserves the emphatic sense, though English is slightly
    redundant because the Hebrew is emphatic.
