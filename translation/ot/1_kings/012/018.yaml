id: 1KI.12.18
reference: 1 Kings 12:18
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם אֶת אֲדֹרָם֙ אֲשֶׁ֣ר עַל הַ/מַּ֔ס וַ/יִּרְגְּמ֨וּ
    כָל יִשְׂרָאֵ֥ל בּ֛/וֹ אֶ֖בֶן וַ/יָּמֹ֑ת וְ/הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם הִתְאַמֵּץ֙
    לַ/עֲל֣וֹת בַּ/מֶּרְכָּבָ֔ה לָ/נ֖וּס יְרוּשָׁלִָֽם־־־׃
translation:
  text: Then King Rehoboam sent Adoram, who was over the forced labor, but all Israel
    stoned him with stones, and he died. And King Rehoboam strengthened himself to
    get up into the chariot to flee to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Adoram''; some related passages use the name form ''Adoniram.'''
    reason: alternative_reading
  - marker: b
    text: Or simply, 'stoned him'; the Hebrew explicitly says, 'stoned him with stones.'
    reason: lexical_alternative
  - marker: c
    text: Or, in smoother English, 'hurried to get into the chariot.' The Hebrew more
      literally says, 'strengthened himself to get up into the chariot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of שלח, indicating that Rehoboam sent Adoram
    on a mission.
- source_word: אֲדֹרָם
  chosen: Adoram
  alternatives:
  - Adoniram
  lexicon: HALOT
  rationale: The MT here reads Adoram. The parallel in some contexts uses Adoniram;
    the verse should reflect the form present in the Hebrew text, with the alternative
    preserved in a footnote as a name-form issue.
- source_word: אֲשֶׁר עַל הַמַּס
  chosen: who was over the forced labor
  alternatives:
  - who was over the labor gang
  - who was over the levy
  lexicon: HALOT
  rationale: The phrase identifies Adoram as the official in charge of corvée labor.
    'Forced labor' communicates the coercive sense of מַס more clearly for modern
    readers than the traditional but less transparent 'tribute' or 'levy'.
- source_word: הַמַּס
  chosen: forced labor
  alternatives:
  - levy
  - labor force
  - corvée
  lexicon: HALOT
  rationale: In this context מַס refers not to taxation in money but to conscripted
    labor imposed by the state.
- source_word: וַיִּרְגְּמוּ ... אֶבֶן
  chosen: stoned him with stones
  alternatives:
  - pelted him with stones
  - stoned him
  lexicon: HALOT
  rationale: The Hebrew idiom explicitly includes 'stone.' 'Stoned him with stones'
    preserves the force and concreteness of the expression, though English can sound
    slightly redundant. This is preferable here for auditability and closeness to
    the source.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: A conventional collective expression for the northern tribes in this
    context; 'all Israel' preserves the political-covenantal label used in the narrative.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: Simple narrative continuation stating the result of the stoning.
- source_word: הִתְאַמֵּץ
  chosen: strengthened himself
  alternatives:
  - made haste
  - acted quickly
  - mustered strength
  lexicon: HALOT
  rationale: The hitpael of אמץ literally conveys strengthening or exerting oneself.
    In context it describes urgent self-exertion to escape. The more literal 'strengthened
    himself' is retained in the main text, with smoother contextual alternatives noted
    here.
- source_word: לַעֲלוֹת בַּמֶּרְכָּבָה
  chosen: to get up into the chariot
  alternatives:
  - to mount the chariot
  - to get into the chariot
  lexicon: HALOT
  rationale: עלה with chariot naturally means to mount or get up into it. 'Get up
    into the chariot' preserves the directional nuance.
- source_word: לָנוּס יְרוּשָׁלָם
  chosen: to flee to Jerusalem
  alternatives:
  - to escape to Jerusalem
  lexicon: HALOT
  rationale: נוּס denotes fleeing, emphasizing Rehoboam's urgent retreat rather than
    a neutral departure.
