id: 1KI.12.27
reference: 1 Kings 12:27
source:
  edition: WLC
  text: אִֽם יַעֲלֶ֣ה הָ/עָ֣ם הַ/זֶּ֗ה לַ/עֲשׂ֨וֹת זְבָחִ֤ים בְּ/בֵית יְהוָה֙ בִּ/יר֣וּשָׁלִַ֔ם וְ֠/שָׁב לֵ֣ב הָ/עָ֤ם הַ/זֶּה֙ אֶל אֲדֹ֣נֵי/הֶ֔ם אֶל רְחַבְעָ֖ם מֶ֣לֶךְ יְהוּדָ֑ה וַ/הֲרָגֻ֕/נִי וְ/שָׁ֖בוּ אֶל רְחַבְעָ֥ם מֶֽלֶךְ יְהוּדָֽה־׀־־־־־׃
translation:
  text: If this people goes up to offer sacrifices in the house of Yahweh in Jerusalem, then the heart of this people will return to their lord, to Rehoboam king of Judah, and they will kill me and return to Rehoboam king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When this people goes up…' The Hebrew conditional particle can in some contexts approach a temporal sense, but here it is best taken as Jeroboam's feared condition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple in Jerusalem.
    reason: cultural_note
  - marker: c
    text: Or 'to their master.' The Hebrew term can denote a lord or master; here it refers to Rehoboam, as the following apposition makes clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces Jeroboam's conditional concern. 'If' best preserves the apprehensive conditional force in context.
- source_word: יַעֲלֶה
  chosen: goes up
  alternatives:
  - ascends
  - goes
  lexicon: HALOT
  rationale: עלה commonly means 'go up' and is the standard idiom for pilgrimage to Jerusalem, preserving the topographical and cultic nuance.
- source_word: לַעֲשׂוֹת זְבָחִים
  chosen: to offer sacrifices
  alternatives:
  - to make sacrifices
  - to perform sacrifices
  lexicon: HALOT
  rationale: The idiom 'do/make sacrifices' is naturally rendered in English as 'offer sacrifices' without loss of meaning.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - at the house of the LORD
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH here refers to the sanctuary/temple. 'House of the LORD' preserves the Hebrew expression while remaining clear. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: וְשָׁב לֵב הָעָם הַזֶּה
  chosen: then the heart of this people will return
  alternatives:
  - and the heart of this people will turn back
  - then this people's heart will return
  lexicon: HALOT
  rationale: שׁוּב with 'heart' expresses renewed allegiance or inward turning. 'Will return' preserves the lexical repetition with the later שָׁבוּ.
- source_word: אֶל אֲדֹנֵיהֶם
  chosen: to their lord
  alternatives:
  - to their master
  - to their masters
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֲדֹנֵי can function as a singular construct with pronominal suffix, clarified by the apposition 'to Rehoboam king of Judah.' Singular 'lord' best fits the syntax and referent.
- source_word: רְחַבְעָם מֶלֶךְ יְהוּדָה
  chosen: Rehoboam king of Judah
  alternatives:
  - Rehoboam, the king of Judah
  lexicon: HALOT
  rationale: Standard English rendering of the proper name plus royal title; appositional structure is preserved.
- source_word: וַהֲרָגֻנִי
  chosen: and they will kill me
  alternatives:
  - and they will slay me
  lexicon: HALOT
  rationale: The verb הרג denotes killing. 'Kill' is clear modern English and fits the fearful prediction.
- source_word: וְשָׁבוּ
  chosen: and return
  alternatives:
  - and turn back
  lexicon: HALOT
  rationale: Maintains the repetition of שׁוּב from earlier in the verse, highlighting the feared political reversal.
