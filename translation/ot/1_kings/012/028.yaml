id: 1KI.12.28
reference: 1 Kings 12:28
source:
  edition: WLC
  text: וַ/יִּוָּעַ֣ץ הַ/מֶּ֔לֶךְ וַ/יַּ֕עַשׂ שְׁנֵ֖י עֶגְלֵ֣י זָהָ֑ב וַ/יֹּ֣אמֶר
    אֲלֵ/הֶ֗ם רַב לָ/כֶם֙ מֵ/עֲל֣וֹת יְרוּשָׁלִַ֔ם הִנֵּ֤ה אֱלֹהֶ֨י/ךָ֙ יִשְׂרָאֵ֔ל
    אֲשֶׁ֥ר הֶעֱל֖וּ/ךָ מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: So the king took counsel and made two calves of gold, and he said to them,
    “You have gone up to Jerusalem long enough. Behold, your gods, O Israel, who brought
    you up from the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is too much for you to go up to Jerusalem.”
    reason: lexical_alternative
  - marker: b
    text: Or, “your God, O Israel.” The Hebrew form can sometimes function as a singular
      title, and the wording echoes Exodus 32:4; here, however, the two calves and
      the plural verb favor “your gods.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: took counsel
  alternatives:
  - consulted
  - deliberated
  lexicon: HALOT
  rationale: The Niphal of יעץ here indicates that the king engaged in consultation/deliberation.
    'Took counsel' is idiomatic, concise, and preserves the formal sense better than
    a looser 'made plans.'
- source_word: עֶגְלֵי זָהָב
  chosen: calves of gold
  alternatives:
  - golden calves
  lexicon: HALOT
  rationale: The construct phrase is literally 'calves of gold.' This preserves the
    Hebrew wording and echoes the Exodus 32 allusion. 'Golden calves' is natural English
    but slightly less formally transparent.
- source_word: רַב לָכֶם מֵעֲלוֹת יְרוּשָׁלַםִ
  chosen: You have gone up to Jerusalem long enough
  alternatives:
  - It is too much for you to go up to Jerusalem
  - You have gone up to Jerusalem enough
  lexicon: HALOT
  rationale: The phrase can mean either that going up is burdensome ('too much for
    you') or that they have done it enough/long enough. Given the preposition מִן
    with infinitive and the rhetorical setting, 'long enough' communicates the king's
    appeal clearly in modern English while staying close to the sense.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: '''Behold'' preserves the deictic force and solemn rhetorical presentation.
    It is still understandable in modern English and suits the elevated narrative
    tone.'
- source_word: אֱלֹהֶיךָ יִשְׂרָאֵל
  chosen: your gods, O Israel
  alternatives:
  - your God, O Israel
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural with singular reference,
    here the plural form aligns naturally with the two calves just mentioned, and
    the following plural verb הֶעֱלוּ supports a plural rendering. 'O Israel' makes
    explicit the vocative force.
- source_word: הֶעֱלוּךָ
  chosen: who brought you up
  alternatives:
  - which brought you up
  lexicon: HALOT
  rationale: For idols represented as agents in direct speech, 'who' is more natural
    than 'which' in contemporary English and reflects the personalizing rhetoric of
    Jeroboam's proclamation.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: '''From the land of Egypt'' closely reflects the Hebrew and preserves
    the strong verbal echo of the exodus formula.'
