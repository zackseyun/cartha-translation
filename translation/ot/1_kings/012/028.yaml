theological_decisions:
- issue: Whether אֱלֹהֶיךָ should be rendered singular or plural in Jeroboam's proclamation
  chosen_reading: 'plural: ''your gods, O Israel'''
  alternative_readings:
  - 'singular: ''your God, O Israel'''
  rationale: The Hebrew noun form is plural, and in this verse the immediate context
    mentions two calves, while the verb הֶעֱלוּ is also plural. Although the phrase
    echoes Exodus 32:4, where English tradition often renders singular or leaves the
    ambiguity unresolved, this verse's grammar and context favor the plural. The translation
    avoids softening the idolatrous plurality implied in the text while preserving
    the exodus allusion in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
