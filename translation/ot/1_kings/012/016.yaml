id: 1KI.12.16
reference: 1 Kings 12:16
source:
  edition: WLC
  text: וַ/יַּ֣רְא כָּל יִשְׂרָאֵ֗ל כִּ֠י לֹֽא שָׁמַ֣ע הַ/מֶּלֶךְ֮ אֲלֵי/הֶם֒ וַ/יָּשִׁ֣בוּ
    הָ/עָ֣ם אֶת הַ/מֶּ֣לֶךְ דָּבָ֣ר לֵ/אמֹ֡ר מַה לָּ/נוּ֩ חֵ֨לֶק בְּ/דָוִ֜ד וְ/לֹֽא
    נַחֲלָ֣ה בְּ/בֶן יִשַׁ֗י לְ/אֹהָלֶ֨י/ךָ֙ יִשְׂרָאֵ֔ל עַתָּ֕ה רְאֵ֥ה בֵיתְ/ךָ֖
    דָּוִ֑ד וַ/יֵּ֥לֶךְ יִשְׂרָאֵ֖ל לְ/אֹהָלָֽי/ו־־־׀־־־׃
translation:
  text: When all Israel saw that the king had not listened to them, the people answered
    the king, saying, “What share do we have in David? We have no inheritance in the
    son of Jesse. To your tents, Israel! Now see to your own house, David.” So Israel
    went to their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To your homes, Israel!' The Hebrew literally says 'to your tents,' an
      idiom for dispersing and withdrawing allegiance.
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the sense of ''dynasty'' here: ''See to your own
      dynasty, David.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: The verb ראה literally means 'see,' but in context it includes recognition
    of the king's refusal. 'Saw' preserves the Hebrew idiom while remaining natural
    English.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Retains the collective national expression of the Hebrew. 'All Israel'
    is idiomatic in biblical narrative and reflects the political body rather than
    merely individuals.
- source_word: לֹא שָׁמַע ... אֲלֵיהֶם
  chosen: had not listened to them
  alternatives:
  - had not heard them
  - did not listen to them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to, heed,' not merely auditory hearing.
    'Had not listened' best captures the sense of refusing their appeal.
- source_word: וַיָּשִׁבוּ הָעָם אֶת־הַמֶּלֶךְ דָּבָר
  chosen: the people answered the king
  alternatives:
  - the people returned a word to the king
  - the people replied to the king
  lexicon: HALOT
  rationale: This is a Hebrew idiom for giving a reply. 'Answered the king' is concise,
    natural, and faithful to the idiomatic force.
- source_word: מַה לָּנוּ חֵלֶק בְּדָוִד
  chosen: What share do we have in David?
  alternatives:
  - What portion have we in David?
  - What do we have to do with David?
  lexicon: HALOT
  rationale: חלק means 'share, portion.' The phrase is a political repudiation of
    dynastic allegiance. 'Share' preserves the inheritance/political-allotment nuance
    better than the more idiomatic but less literal 'What do we have to do with David?'
- source_word: וְלֹא נַחֲלָה בְּבֶן־יִשַׁי
  chosen: We have no inheritance in the son of Jesse
  alternatives:
  - and no portion in the son of Jesse
  - and no heritage in the son of Jesse
  lexicon: HALOT
  rationale: נחלה is 'inheritance, possession, heritage.' 'Inheritance' preserves
    the covenantal-land and tribal-allotment resonance that complements 'share' in
    the previous clause.
- source_word: בְּבֶן־יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - Jesse's son
  lexicon: HALOT
  rationale: A literal rendering preserves the dismissive rhetorical force of referring
    to David by his paternal lineage rather than royal title.
- source_word: לְאֹהָלֶיךָ יִשְׂרָאֵל
  chosen: To your tents, Israel!
  alternatives:
  - To your homes, Israel!
  lexicon: HALOT
  rationale: The phrase is a stock call for dispersal and political withdrawal. 'Tents'
    is the literal term and preserves the historical idiom; a footnote preserves the
    more interpretive sense 'homes.'
- source_word: עַתָּה רְאֵה בֵיתְךָ דָּוִד
  chosen: Now see to your own house, David
  alternatives:
  - Now look to your own house, David
  - Now take care of your own house, David
  lexicon: HALOT
  rationale: ראה here means 'look to, attend to, take care of.' 'See to your own house'
    communicates the dismissive challenge to the Davidic dynasty while staying close
    to the Hebrew wording.
- source_word: בֵיתְךָ
  chosen: your own house
  alternatives:
  - your house
  - your dynasty
  lexicon: HALOT
  rationale: בַּיִת can mean literal house or household/dynasty. Here the address
    to David likely carries dynastic force, but 'house' preserves the Hebrew's layered
    meaning; the dynastic nuance is noted in rationale rather than over-specifying
    in the main text.
- source_word: וַיֵּלֶךְ יִשְׂרָאֵל לְאֹהָלָיו
  chosen: So Israel went to their tents
  alternatives:
  - So Israel departed to their tents
  - So Israel went home
  lexicon: HALOT
  rationale: The singular collective subject 'Israel' is naturally represented by
    singular name plus plural pronoun in English. 'Went to their tents' preserves
    the repeated idiom and signals the tribes' withdrawal.
