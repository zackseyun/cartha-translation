theological_decisions:
- issue: Political slogan against the Davidic house
  chosen_reading: Render the repudiation in straightforward political terms without
    importing later theological judgment against the Davidic covenant.
  alternative_readings:
  - Heighten the line into an anti-messianic or anti-covenantal statement
  - Flatten it into a merely domestic quarrel
  rationale: The verse narrates a historical revolt against Rehoboam and the Davidic
    monarchy. The translation preserves the force of the rebellion while not overstating
    its theological implications beyond the text itself.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
