id: 1KI.12.26
reference: 1 Kings 12:26
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יָרָבְעָ֖ם בְּ/לִבּ֑/וֹ עַתָּ֛ה תָּשׁ֥וּב הַ/מַּמְלָכָ֖ה לְ/בֵ֥ית
    דָּוִֽד׃
translation:
  text: And Jeroboam said in his heart, “Now the kingdom will return to the house
    of David.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to himself.” The Hebrew literally says “in his heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: HALOT
  rationale: Literally 'in his heart.' This Hebrew idiom denotes internal thought.
    The more formal rendering is retained because it is clear in modern English and
    preserves the anthropological imagery of the source.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this point
  - As things stand now
  lexicon: HALOT
  rationale: Marks the immediacy of Jeroboam's concern. 'Now' is concise and natural
    while preserving the temporal force.
- source_word: תָּשׁוּב
  chosen: will return
  alternatives:
  - will go back
  - will turn back
  lexicon: HALOT
  rationale: From שוב, 'return/turn back.' 'Will return' best fits the future sense
    and the political context of the kingdom reverting to a prior dynasty.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the realm
  lexicon: HALOT
  rationale: Refers here to the royal dominion or political kingdom. 'The kingdom'
    is the most natural and contextually precise English rendering.
- source_word: לְבֵית דָּוִד
  chosen: to the house of David
  alternatives:
  - to David's house
  - to the dynasty of David
  lexicon: HALOT
  rationale: '''House of David'' is a standard biblical expression for David''s dynastic
    line. Retaining the phrase preserves the covenantal-dynastic resonance better
    than the more interpretive ''dynasty of David.'''
