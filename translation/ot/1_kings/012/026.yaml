theological_decisions:
- issue: Rendering the internal-speech idiom בְּלִבּוֹ
  chosen_reading: in his heart
  alternative_readings:
  - to himself
  - within himself
  rationale: This is not a major doctrinal issue, but preserving the Hebrew idiom
    maintains the text's literary texture without obscuring meaning. No theological
    tension is being resolved beyond what the source states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without unnecessary paraphrase.'
