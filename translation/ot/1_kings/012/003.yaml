id: 1KI.12.3
reference: 1 Kings 12:3
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְחוּ֙ וַ/יִּקְרְאוּ ל֔/וֹ ו/יבאו יָרָבְעָ֖ם וְ/כָל קְהַ֣ל יִשְׂרָאֵ֑ל
    וַֽ/יְדַבְּר֔וּ אֶל רְחַבְעָ֖ם לֵ/אמֹֽר־־־׃
translation:
  text: So they sent and called for him, and Jeroboam and all the assembly of Israel
    came and spoke to Rehoboam, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned him.' The Hebrew idiom 'called for him' conveys that they sent
      for Jeroboam to come.
    reason: lexical_alternative
  - marker: b
    text: '''Assembly'' could also be rendered ''congregation,'' but here it refers
      to the gathered body of Israel in a public-political sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: they sent
  alternatives:
  - they sent word
  - they dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the qal commonly means 'send.' Here it introduces the
    action of summoning Jeroboam. 'They sent' is concise and leaves the implied object
    unstated as in Hebrew; 'sent word' is possible but slightly interpretive.
- source_word: וַיִּקְרְאוּ לוֹ
  chosen: called for him
  alternatives:
  - called him
  - summoned him
  lexicon: HALOT
  rationale: קרא + ל can mean to call to or call for someone. In this context, after
    'they sent,' the sense is that they summoned Jeroboam. 'Called for him' preserves
    the idiom naturally in English without overformal wording.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: בוא is the standard verb 'come.' 'Came' keeps the narrative sequence
    straightforward and close to the Hebrew.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וְכָל־קְהַל יִשְׂרָאֵל
  chosen: and all the assembly of Israel
  alternatives:
  - and the whole assembly of Israel
  - and all the congregation of Israel
  lexicon: HALOT
  rationale: קהל denotes an assembled community. 'Assembly' is clear modern English
    and fits the political/public gathering here better than the more ecclesiastical
    'congregation.' 'All the assembly of Israel' closely reflects the Hebrew structure.
- source_word: וַיְדַבְּרוּ אֶל־רְחַבְעָם
  chosen: spoke to Rehoboam
  alternatives:
  - said to Rehoboam
  - addressed Rehoboam
  lexicon: HALOT
  rationale: דבר אל is naturally 'speak to.' Since the verse is followed by לֵאמֹר
    introducing direct speech, 'spoke to Rehoboam' preserves the narrative setup better
    than collapsing it into 'said to'.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: The infinitive construct formula introduces the following quotation.
    'Saying,' is the standard transparent rendering and preserves the discourse structure
    into the next verse.
