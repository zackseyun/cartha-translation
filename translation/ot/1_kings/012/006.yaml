id: 1KI.12.6
reference: 1 Kings 12:6
source:
  edition: WLC
  text: וַ/יִּוָּעַ֞ץ הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם אֶת הַ/זְּקֵנִים֙ אֲשֶׁר הָי֣וּ עֹמְדִ֗ים
    אֶת פְּנֵי֙ שְׁלֹמֹ֣ה אָבִ֔י/ו בִּֽ/הְיֹת֥/וֹ חַ֖י לֵ/אמֹ֑ר אֵ֚יךְ אַתֶּ֣ם נֽוֹעָצִ֔ים
    לְ/הָשִׁ֥יב אֶת הָֽ/עָם הַ/זֶּ֖ה דָּבָֽר־־־־־׃
translation:
  text: Then King Rehoboam consulted the elders who had stood before Solomon his father
    while he was still alive, saying, “How do you advise me to answer this people?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''How do you advise to answer this people a word?'' The expression
      means to give them a reply.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who had served in Solomon's presence.' Literally, 'who had stood before
      Solomon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: consulted
  alternatives:
  - took counsel with
  - conferred with
  lexicon: HALOT
  rationale: The Niphal of יעץ here denotes seeking counsel from others. 'Consulted'
    is natural modern English and preserves the sense of asking advice rather than
    merely deliberating internally.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  chosen: King Rehoboam
  alternatives:
  - Rehoboam the king
  rationale: English idiom normally places the royal title before the name. The definite
    article on 'king' is not separately represented in English.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  - the senior men
  lexicon: HALOT
  rationale: In this court setting זקנים refers to elder statesmen or senior advisers,
    not merely aged males. 'Elders' is the most accurate and idiomatic rendering.
- source_word: אֲשֶׁר הָיוּ עֹמְדִים אֶת־פְּנֵי שְׁלֹמֹה
  chosen: who had stood before Solomon
  alternatives:
  - who had attended Solomon
  - who had served in Solomon's presence
  lexicon: HALOT
  rationale: The idiom 'stand before' commonly denotes attendance or service in a
    royal court. Retaining 'stood before' preserves the Hebrew imagery while remaining
    understandable.
- source_word: אָבִיו
  chosen: his father
  rationale: Straightforward possessive referring to Solomon as Rehoboam's father.
- source_word: בִּהְיֹתוֹ חַי
  chosen: while he was still alive
  alternatives:
  - during his lifetime
  - when he was alive
  lexicon: HALOT
  rationale: This temporal clause specifies that these elders had served Solomon before
    his death. 'Still alive' brings out the contrast implied by the narrative context.
- source_word: אֵיךְ אַתֶּם נוֹעָצִים
  chosen: How do you advise me
  alternatives:
  - What do you counsel
  - How are you advising
  lexicon: HALOT
  rationale: The participle with interrogative asks for their counsel. English requires
    an object to make the request natural in context; 'me' is implied by the consultation
    scene.
- source_word: לְהָשִׁיב
  chosen: to answer
  alternatives:
  - to respond to
  - to return an answer to
  lexicon: HALOT
  rationale: In context שוב in the Hiphil means to give a reply back. 'Answer' is
    concise and idiomatic.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: The singular collective עם is best preserved as 'people.' 'This people'
    reflects the Hebrew demonstrative and the somewhat distancing tone of the phrase.
- source_word: דָּבָר
  chosen: answer
  alternatives:
  - word
  - a word
  - a response
  lexicon: HALOT
  rationale: Although literally 'word,' in this construction it refers to the content
    of the reply Rehoboam should give. Rendering it with 'answer' avoids awkward English
    while preserving the sense.
