id: 1KI.12.29
reference: 1 Kings 12:29
source:
  edition: WLC
  text: וַ/יָּ֥שֶׂם אֶת הָ/אֶחָ֖ד בְּ/בֵֽית אֵ֑ל וְ/אֶת הָ/אֶחָ֖ד נָתַ֥ן בְּ/דָֽן־־־׃
translation:
  text: He set one in Bethel, and the other he put in Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, one of the two calves mentioned in the previous verse; alternatively,
      'He set one calf in Bethel, and the other he put in Dan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: He set
  alternatives:
  - he placed
  - he put
  lexicon: HALOT
  rationale: From שׂוּם/שִׂים, a common verb meaning to set, place, or put. 'Set'
    is slightly more formal and fits the first clause well in narrative style.
- source_word: אֶת הָאֶחָד
  chosen: one
  alternatives:
  - the one
  - one of them
  lexicon: HALOT
  rationale: The direct-object marker plus 'the one' functions idiomatically here
    to distinguish one item from another previously mentioned. English naturally renders
    this simply as 'one' in the distributive pair.
- source_word: בְּבֵית אֵל
  chosen: in Bethel
  alternatives:
  - at Bethel
  lexicon: HALOT
  rationale: Bethel is a place name; although the form is literally 'in Beth-el/house
    of God,' it should be transliterated as the established proper name 'Bethel' per
    translation philosophy. 'In' matches the Hebrew preposition בְּ straightforwardly.
- source_word: וְאֶת הָאֶחָד
  chosen: and the other
  alternatives:
  - and one
  - and the one
  lexicon: HALOT
  rationale: Though literally 'and the one,' English idiom in a paired contrast is
    'and the other,' making the distributive contrast clear.
- source_word: נָתַן
  chosen: he put
  alternatives:
  - he gave
  - he placed
  - he set
  lexicon: HALOT
  rationale: נָתַן is broadly 'give/put/set.' In this locative context, 'put' is the
    most natural English rendering. Variation from 'set' in the first clause avoids
    awkward repetition while preserving sense; the semantic overlap is close and context
    warrants the stylistic variation.
- source_word: בְּדָן
  chosen: in Dan
  alternatives:
  - at Dan
  lexicon: HALOT
  rationale: Dan is the place name. 'In Dan' is a direct and natural rendering of
    the Hebrew preposition with the toponym.
