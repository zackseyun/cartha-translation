theological_decisions:
- issue: Referent of 'one' and 'the other'
  chosen_reading: The verse leaves the objects implicit, referring back to the two
    calves mentioned in the previous verse; the translation preserves the implicit
    reference rather than supplying 'calf' in the main text.
  alternative_readings:
  - He set one calf in Bethel, and the other he put in Dan.
  rationale: Although the antecedent is clear from context, the Hebrew here does not
    repeat the noun. Preserving the ellipsis respects the source text while remaining
    intelligible in English.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
