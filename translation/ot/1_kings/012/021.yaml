id: 1KI.12.21
reference: 1 Kings 12:21
source:
  edition: WLC
  text: ו/יבאו רְחַבְעָם֮ יְרוּשָׁלִַם֒ וַ/יַּקְהֵל֩ אֶת כָּל בֵּ֨ית יְהוּדָ֜ה וְ/אֶת
    שֵׁ֣בֶט בִּנְיָמִ֗ן מֵאָ֨ה וּ/שְׁמֹנִ֥ים אֶ֛לֶף בָּח֖וּר עֹשֵׂ֣ה מִלְחָמָ֑ה לְ/הִלָּחֵם֙
    עִם בֵּ֣ית יִשְׂרָאֵ֔ל לְ/הָשִׁיב֙ אֶת הַ/מְּלוּכָ֔ה לִ/רְחַבְעָ֖ם בֶּן שְׁלֹמֹֽה־־־־־־׃פ
translation:
  text: When Rehoboam came to Jerusalem, he assembled all the house of Judah and the
    tribe of Benjamin, one hundred eighty thousand chosen warriors, to fight against
    the house of Israel, to restore the kingdom to Rehoboam son of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one hundred and eighty thousand select fighting men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ / ויבאו
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא with Jerusalem as destination is idiomatically rendered
    'came to Jerusalem' in English narrative. Although the consonantal form appears
    plural, the subject is singular Rehoboam; the sense is clearly singular in context
    and reflected by the following singular verb.
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: קהל in the Hiphil means to gather or assemble people. 'Assembled' is
    natural modern English and preserves the causative sense.
- source_word: כָּל בֵּית יְהוּדָה
  chosen: all the house of Judah
  alternatives:
  - all the household of Judah
  - all Judah
  lexicon: HALOT
  rationale: Retains the political-collective idiom 'house of Judah' rather than flattening
    to simply 'Judah,' since the phrase parallels 'house of Israel' later in the verse.
- source_word: שֵׁבֶט בִּנְיָמִן
  chosen: the tribe of Benjamin
  alternatives:
  - Benjamin
  lexicon: HALOT
  rationale: שֵׁבֶט is explicitly present and should be translated. 'The tribe of
    Benjamin' preserves the tribal-political distinction.
- source_word: מֵאָה וּשְׁמֹנִים אֶלֶף
  chosen: one hundred eighty thousand
  alternatives:
  - a hundred and eighty thousand
  lexicon: HALOT
  rationale: Standard contemporary English number style.
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - select
  - young man
  lexicon: HALOT
  rationale: In military census contexts בָּחוּר commonly denotes selected or choice
    fighting men rather than merely males of a certain age. 'Chosen' fits the collocation
    with warfare.
- source_word: עֹשֵׂה מִלְחָמָה
  chosen: warriors
  alternatives:
  - men fit for war
  - those who made war
  - fighting men
  lexicon: HALOT
  rationale: The participial phrase literally means 'doing war' or 'making war.' 'Warriors'
    gives a concise, natural rendering without losing the military sense.
- source_word: לְהִלָּחֵם עִם
  chosen: to fight against
  alternatives:
  - to wage war with
  - to fight with
  lexicon: HALOT
  rationale: In this hostile context, English 'fight against' makes the adversarial
    force explicit.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the household of Israel
  lexicon: HALOT
  rationale: Preserves the same political-collective idiom as 'house of Judah' and
    reflects the divided-kingdom setting.
- source_word: לְהָשִׁיב אֶת הַמְּלוּכָה
  chosen: to restore the kingdom
  alternatives:
  - to bring back the kingship
  - to return the royal rule
  lexicon: HALOT
  rationale: שׁוב in Hiphil here means to bring back or restore. 'Restore the kingdom'
    is idiomatic and captures the political objective.
- source_word: לִרְחַבְעָם בֶּן שְׁלֹמֹה
  chosen: to Rehoboam son of Solomon
  alternatives:
  - for Rehoboam son of Solomon
  lexicon: HALOT
  rationale: The lamed marks the beneficiary/recipient of the restored rule. 'To Rehoboam
    son of Solomon' is a straightforward rendering.
