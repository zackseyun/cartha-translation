theological_decisions:
- issue: Political terminology of מַמְלָכָה
  chosen_reading: kingdom
  alternative_readings:
  - kingship
  - royal rule
  rationale: The context concerns restoration of national rule to Rehoboam after the
    schism. 'Kingdom' is the most natural English rendering here, though the nuance
    includes kingship/royal dominion.
