theological_decisions:
- issue: Nature of the sin in Jeroboam's cult
  chosen_reading: The verse states that this cultic arrangement became sin, without
    specifying a later doctrinal category beyond the narrative's condemnation of idolatrous
    worship.
  alternative_readings:
  - The arrangement became an occasion for sin
  - The arrangement became a sin-offering context (rejected)
  rationale: חַטָּאת can in some contexts mean 'sin offering,' but here the narrative
    context of illicit worship makes 'sin' the clear sense. The translation avoids
    expanding the statement into a fuller theological explanation not explicit in
    the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Referent of 'the one'
  chosen_reading: '''the one'' refers to one of the two calves, most likely the one
    at Dan in light of the following phrase.'
  alternative_readings:
  - '''the one calf'' made explicit in the main text'
  - 'Text-critical reading reflected in some versions: ''before the one, even to Dan''
    with varying syntactic explanations'
  rationale: The Hebrew is terse and somewhat awkward. The translation keeps the literal
    expression in the main text while clarifying the likely referent in a footnote
    rather than smoothing it into a fully explicit paraphrase.
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
