id: 1KI.12.30
reference: 1 Kings 12:30
source:
  edition: WLC
  text: וַ/יְהִ֛י הַ/דָּבָ֥ר הַ/זֶּ֖ה לְ/חַטָּ֑את וַ/יֵּלְכ֥וּ הָ/עָ֛ם לִ/פְנֵ֥י הָ/אֶחָ֖ד
    עַד דָּֽן־׃
translation:
  text: And this thing became a sin, and the people went before the one as far as
    Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the one.'' The phrase likely means ''before the one calf,''
      referring to one of the two calves Jeroboam set up, especially the one at Dan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  lexicon: HALOT
  rationale: With לְחַטָּאת ('for/as sin'), היה commonly carries the sense 'became'
    or 'came to be,' expressing result rather than mere existence.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this event
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). Here it refers back to Jeroboam's
    cultic arrangement as a concrete affair; 'this thing' is natural English and preserves
    the demonstrative force.
- source_word: לְחַטָּאת
  chosen: a sin
  alternatives:
  - for sin
  - sinful
  lexicon: HALOT
  rationale: The phrase indicates that the matter became sinful / occasioned sin.
    'A sin' is a standard idiomatic rendering in this construction and preserves the
    noun rather than paraphrasing with an adjective.
- source_word: וַיֵּלְכוּ הָעָם
  chosen: the people went
  alternatives:
  - the people walked
  - the people came
  lexicon: HALOT
  rationale: הלך in narrative is straightforwardly 'went.' No stronger interpretive
    gloss such as 'went to worship' is supplied, since the object of movement is expressed
    in the following phrase.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - to
  - in the presence of
  lexicon: HALOT
  rationale: לפני literally means 'before/in front of.' Here it likely means going
    before the calf/idol for worship. 'Before' preserves the Hebrew wording without
    over-interpreting.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - the one calf
  - one of them
  lexicon: HALOT
  rationale: The Hebrew literally says 'the one.' In context it refers to one of the
    two calves previously mentioned. The noun is omitted in Hebrew, so the main text
    preserves that ellipsis as much as readable English allows.
- source_word: עַד דָּן
  chosen: as far as Dan
  alternatives:
  - up to Dan
  lexicon: HALOT
  rationale: עד marks extent, and Dan is the northern sanctuary location. 'As far
    as Dan' is idiomatic and preserves the geographic endpoint.
