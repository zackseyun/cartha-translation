id: 1KI.12.4
reference: 1 Kings 12:4
source:
  edition: WLC
  text: אָבִ֖י/ךָ הִקְשָׁ֣ה אֶת עֻלֵּ֑/נוּ וְ/אַתָּ֡ה עַתָּ֣ה הָקֵל֩ מֵ/עֲבֹדַ֨ת אָבִ֜י/ךָ
    הַ/קָּשָׁ֗ה וּ/מֵ/עֻלּ֧/וֹ הַ/כָּבֵ֛ד אֲשֶׁר נָתַ֥ן עָלֵ֖י/נוּ וְ/נַעַבְדֶֽ/ךָּ־־׃
translation:
  text: Your father made our yoke harsh. So now, lighten the hard labor of your father
    and his heavy yoke that he put on us, and we will serve you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made our yoke hard.' The Hebrew uses the imagery of a yoke for oppressive
      obligations.
    reason: lexical_alternative
  - marker: b
    text: '''Hard labor'' may also be rendered ''hard service'' or ''harsh service.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשָׁה
  chosen: made ... harsh
  alternatives:
  - made ... hard
  - made ... severe
  lexicon: HALOT
  rationale: Hiphil of קשׁה means to make hard/harsh. 'Made our yoke harsh' is idiomatic
    in English and preserves the causative sense without awkwardness.
- source_word: עֻלֵּנוּ
  chosen: our yoke
  alternatives:
  - our burden
  lexicon: HALOT
  rationale: Literal 'yoke' preserves the metaphor of oppressive rule/taxation/labor
    and matches the following parallel mention of the father's heavy yoke.
- source_word: הָקֵל
  chosen: lighten
  alternatives:
  - make lighter
  - ease
  lexicon: HALOT
  rationale: Imperative from קלל in the sense of making light/easing. 'Lighten' is
    concise and preserves the verbal connection to 'heavy' later in the verse.
- source_word: מֵעֲבֹדַת ... הַקָּשָׁה
  chosen: the hard labor of your father
  alternatives:
  - the harsh service your father imposed
  - the hard service of your father
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to forced labor/service obligations under Solomon's
    rule. 'Hard labor' communicates the burden clearly in modern English while remaining
    close to the source.
- source_word: וּמֵעֻלּוֹ הַכָּבֵד
  chosen: and his heavy yoke
  alternatives:
  - and from his heavy yoke
  - and his burdensome yoke
  lexicon: HALOT
  rationale: The phrase is parallel to 'hard labor.' Rendering with possessive 'his
    heavy yoke' keeps the Hebrew suffix and the metaphor. Omitting a repeated 'from'
    in English improves flow while preserving sense.
- source_word: אֲשֶׁר נָתַן עָלֵינוּ
  chosen: that he put on us
  alternatives:
  - that he laid on us
  - that he placed upon us
  lexicon: HALOT
  rationale: Idiomatic English equivalent for נתן על in the context of imposing burdens.
- source_word: וְנַעַבְדֶךָּ
  chosen: and we will serve you
  alternatives:
  - then we will serve you
  lexicon: HALOT
  rationale: Simple cohortative/imperfect with vav expressing result/promise. 'We
    will serve you' captures the people's pledge of allegiance if Rehoboam eases the
    burden.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct address to Rehoboam; repeated twice in Hebrew and retained in
    English for emphasis.
- source_word: עַתָּה
  chosen: So now
  alternatives:
  - now
  - therefore now
  lexicon: HALOT
  rationale: Adds the discourse force between complaint and request. 'So now' is natural
    English and reflects the transition.
