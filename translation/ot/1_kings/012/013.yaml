id: 1KI.12.13
reference: 1 Kings 12:13
source:
  edition: WLC
  text: וַ/יַּ֧עַן הַ/מֶּ֛לֶךְ אֶת הָ/עָ֖ם קָשָׁ֑ה וַֽ/יַּעֲזֹ֛ב אֶת עֲצַ֥ת הַ/זְּקֵנִ֖ים
    אֲשֶׁ֥ר יְעָצֻֽ/הוּ־־׃
translation:
  text: And the king answered the people harshly, and he abandoned the counsel of
    the elders who had advised him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the qal with a human object commonly means 'answer/respond.' 'Answered'
    preserves the narrative idiom and the likely connection to the people's prior
    request.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context; 'the king'
    is the natural formal rendering.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עָם here denotes the assembled people of Israel addressing the king.
    'The people' is the standard and most transparent rendering.
- source_word: קָשָׁה
  chosen: harshly
  alternatives:
  - roughly
  - severely
  lexicon: HALOT
  rationale: As an adverbial accusative/adjectival complement after 'answered,' קָשָׁה
    describes the manner of the king's reply. 'Harshly' is idiomatic modern English
    and fits the context of a severe response.
- source_word: וַיַּעֲזֹב
  chosen: abandoned
  alternatives:
  - forsook
  - left aside
  - rejected
  lexicon: HALOT
  rationale: עזב means to leave, forsake, or abandon. 'Abandoned' conveys a decisive
    setting aside of the elders' advice without sounding archaic like 'forsook.'
- source_word: עֲצַת
  chosen: the counsel
  alternatives:
  - the advice
  lexicon: HALOT
  rationale: עֵצָה can mean counsel/advice. 'Counsel' preserves the deliberative,
    advisory nuance in a royal setting, while remaining readable.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the older men
  lexicon: HALOT
  rationale: זְקֵנִים in this context refers to recognized senior advisors, not merely
    men advanced in age. 'The elders' best captures the social-political role.
- source_word: אֲשֶׁר יְעָצֻהוּ
  chosen: who had advised him
  alternatives:
  - who counseled him
  - that they had given him
  lexicon: HALOT
  rationale: 'The relative clause identifies the elders as those who had given counsel
    to the king. Rendering the verbal form as past perfect (''had advised'') fits
    the sequence: their advice preceded his rejection of it.'
