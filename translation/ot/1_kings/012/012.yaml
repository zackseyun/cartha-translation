id: 1KI.12.12
reference: 1 Kings 12:12
source:
  edition: WLC
  text: ו/יבו יָרָבְעָ֧ם וְ/כָל הָ/עָ֛ם אֶל רְחַבְעָ֖ם בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י
    כַּ/אֲשֶׁ֨ר דִּבֶּ֤ר הַ/מֶּ֨לֶךְ֙ לֵ/אמֹ֔ר שׁ֥וּבוּ אֵלַ֖/י בַּ/יּ֥וֹם הַ/שְּׁלִישִֽׁי־־׃
translation:
  text: So Jeroboam and all the people came to Rehoboam on the third day, just as
    the king had spoken, saying, “Come back to me on the third day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Return to me on the third day.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - returned
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. With אֶל
    רְחַבְעָם ('to Rehoboam'), idiomatic English from the narrator's perspective is
    'came to Rehoboam.'
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Standard English transliteration of the personal name.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  - and all the assembly
  lexicon: HALOT
  rationale: עָם here refers broadly to the people who had made the request of the
    king; 'all the people' is the most natural and sufficiently formal rendering.
- source_word: אֶל רְחַבְעָם
  chosen: to Rehoboam
  alternatives:
  - before Rehoboam
  lexicon: HALOT
  rationale: אֶל marks direction toward a person; 'to Rehoboam' is the straightforward
    rendering.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: Standard temporal expression in Hebrew; 'on the third day' is natural
    English and preserves the form.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence between the people's action and the king's
    prior instruction; 'just as' captures that relation clearly.
- source_word: דִּבֶּר הַמֶּלֶךְ
  chosen: the king had spoken
  alternatives:
  - the king had said
  - the king spoke
  lexicon: HALOT
  rationale: The perfect refers to prior speech relative to their coming. English
    past perfect makes the sequence explicit and natural.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when he said
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive introducing direct speech.
- source_word: שׁוּבוּ אֵלַי
  chosen: Come back to me
  alternatives:
  - Return to me
  - Come again to me
  lexicon: HALOT
  rationale: שׁוּב means 'return/turn back.' In direct speech to petitioners who are
    to reappear before the king, 'Come back to me' is idiomatic modern English while
    preserving the sense of returning.
