theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' This also matches the prophetic formula and broader translation
    consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Kinship term אֲחֵיכֶם with masculine/generic force
  chosen_reading: your brothers
  alternative_readings:
  - your fellow Israelites
  - your kindred
  rationale: The source uses a masculine kinship term and the doctrine calls for gender-accurate
    rendering rather than neutralization. The familial force is central to the prohibition
    against civil war.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
