id: 1KI.12.24
reference: 1 Kings 12:24
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֡ה לֹֽא תַעֲלוּ֩ וְ/לֹא תִלָּ֨חֲמ֜וּ/ן עִם אֲחֵי/כֶ֣ם בְּנֵֽי
    יִשְׂרָאֵ֗ל שׁ֚וּבוּ אִ֣ישׁ לְ/בֵית֔/וֹ כִּ֧י מֵ/אִתִּ֛/י נִהְיָ֖ה הַ/דָּבָ֣ר
    הַ/זֶּ֑ה וַ/יִּשְׁמְעוּ֙ אֶת דְּבַ֣ר יְהוָ֔ה וַ/יָּשֻׁ֥בוּ לָ/לֶ֖כֶת כִּ/דְבַ֥ר
    יְהוָֽה־־־־־׃ס
translation:
  text: 'Thus says the LORD: ‘Do not go up or fight against your brothers, the sons
    of Israel. Return, each man to his house, for this thing has come from me.’ So
    they listened to the word of the LORD and turned back to go according to the word
    of the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against your brothers, the Israelites.' The Hebrew reads literally 'with
      your brothers, the sons of Israel,' but with 'fight' the preposition means fighting
      against them.
    reason: lexical_alternative
  - marker: b
    text: Or 'for this matter is from me.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your brothers.' The kinship language underscores that this would
      be war against fellow covenant people.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה follows the doctrine default
    as 'the LORD' rather than 'Yahweh.' 'Thus says' preserves the formal force and
    recognizable prophetic idiom.
- source_word: לֹא תַעֲלוּ
  chosen: Do not go up
  alternatives:
  - You shall not go up
  - Do not march up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend' and in military contexts can imply
    marching up. Here 'go up' preserves the Hebrew wording while remaining natural.
- source_word: וְלֹא תִלָּחֲמוּן
  chosen: or fight
  alternatives:
  - and do not fight
  - or wage war
  lexicon: HALOT
  rationale: The verb לחם in the Niphal means 'fight/do battle.' 'Or fight' fits the
    English prohibition sequence smoothly after 'Do not go up.'
- source_word: עִם אֲחֵיכֶם בְּנֵי יִשְׂרָאֵל
  chosen: against your brothers, the sons of Israel
  alternatives:
  - with your brothers, the people of Israel
  - against your brothers, the Israelites
  lexicon: HALOT
  rationale: Although עִם is literally 'with,' with לחם it idiomatically means fighting
    against someone. 'Brothers' is retained per gender-accurate policy and because
    the kinship emphasis is important. בְּנֵי יִשְׂרָאֵל is rendered more formally
    as 'the sons of Israel' to preserve the Hebrew expression and appositional force.
- source_word: שׁוּבוּ אִישׁ לְבֵיתוֹ
  chosen: Return, each man to his house
  alternatives:
  - Go back, each of you to his house
  - Return every man to his home
  lexicon: HALOT
  rationale: שׁוּבוּ is a direct imperative, best rendered 'Return.' אִישׁ distributively
    means 'each man.' 'House' rather than 'home' keeps the concrete Hebrew wording.
- source_word: כִּי מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה
  chosen: for this thing has come from me
  alternatives:
  - for this matter is from me
  - because this thing happened by me
  lexicon: HALOT
  rationale: The clause explains the divine origin of the political division. 'Has
    come from me' is idiomatic English that preserves the sense of originating from
    God without over-specifying causation beyond the Hebrew.
- source_word: וַיִּשְׁמְעוּ אֶת דְּבַר יְהוָה
  chosen: So they listened to the word of the LORD
  alternatives:
  - And they obeyed the word of the LORD
  - And they heard the word of the LORD
  lexicon: HALOT
  rationale: שׁמע can mean hear or obey depending on context. Because the following
    clause shows compliance, 'listened to' preserves the auditory sense while allowing
    the obedience implication to emerge contextually.
- source_word: וַיָּשֻׁבוּ לָלֶכֶת
  chosen: and turned back to go
  alternatives:
  - and went back
  - and returned to depart
  lexicon: HALOT
  rationale: The Hebrew is slightly fuller than a simple 'returned'; it literally
    combines returning with going. 'Turned back to go' preserves that verbal texture,
    though somewhat idiomatically.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - as the LORD had spoken
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: This phrase marks conformity to the divine command. 'According to the
    word of the LORD' is a transparent and suitably formal rendering.
