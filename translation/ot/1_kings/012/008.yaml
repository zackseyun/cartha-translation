id: 1KI.12.8
reference: 1 Kings 12:8
source:
  edition: WLC
  text: וַֽ/יַּעֲזֹ֛ב אֶת עֲצַ֥ת הַ/זְּקֵנִ֖ים אֲשֶׁ֣ר יְעָצֻ֑/הוּ וַ/יִּוָּעַ֗ץ אֶת
    הַ/יְלָדִים֙ אֲשֶׁ֣ר גָּדְל֣וּ אִתּ֔/וֹ אֲשֶׁ֥ר הָ/עֹמְדִ֖ים לְ/פָנָֽי/ו־־׃
translation:
  text: But he abandoned the advice of the elders that they had given him, and consulted
    with the young men who had grown up with him, who stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who attended him' / 'who served him'; the Hebrew idiom 'stood before
      him' can denote court service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: abandoned
  alternatives:
  - forsook
  - rejected
  - left
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave, forsake, or abandon. 'Abandoned'
    conveys a deliberate setting aside of the elders' counsel more forcefully than
    the weaker 'left' and more idiomatically than 'forsook' in modern English.
- source_word: עֲצַת
  chosen: advice
  alternatives:
  - counsel
  - plan
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, advice, or plan. In this context it refers to
    guidance offered to the king, so 'advice' is natural modern English; 'counsel'
    is possible but slightly more formal.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  lexicon: HALOT
  rationale: Though literally related to age, זקנים in this setting denotes recognized
    senior advisers, so 'the elders' best captures both age and social role.
- source_word: אֲשֶׁר יְעָצֻהוּ
  chosen: that they had given him
  alternatives:
  - with which they had advised him
  - that they had counseled him with
  lexicon: HALOT
  rationale: The clause specifies that the elders had given him this advice. English
    idiom prefers 'given him' with 'advice' rather than a more wooden repetition of
    'advised him'.
- source_word: וַיִּוָּעַץ
  chosen: consulted with
  alternatives:
  - took counsel with
  - advised with
  lexicon: HALOT
  rationale: The Niphal of יעץ here means to consult or take counsel. 'Consulted with'
    is clear, idiomatic, and preserves the reciprocal nuance.
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the youths
  - the boys
  lexicon: HALOT
  rationale: Although ילד can denote children or boys, the context identifies peers
    of Rehoboam serving in court. 'Young men' avoids the misleading implication that
    literal children are in view while preserving their relative youth in contrast
    to the elders.
- source_word: אֲשֶׁר גָּדְלוּ אִתּוֹ
  chosen: who had grown up with him
  alternatives:
  - who were brought up with him
  - who grew up with him
  lexicon: HALOT
  rationale: The phrase indicates shared upbringing or maturation alongside him. 'Had
    grown up with him' fits the narrative past sequence smoothly.
- source_word: אֲשֶׁר הָעֹמְדִים לְפָנָיו
  chosen: who stood before him
  alternatives:
  - who were standing before him
  - who attended him
  - who served him
  lexicon: HALOT
  rationale: The idiom 'stand before' can imply attendance or service at court. The
    more literal 'stood before him' preserves the Hebrew court idiom without over-interpreting;
    the functional sense can be noted in a footnote.
