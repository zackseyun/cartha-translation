id: 1KI.12.32
reference: 1 Kings 12:32
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ יָרָבְעָ֣ם חָ֡ג בַּ/חֹ֣דֶשׁ הַ/שְּׁמִינִ֣י בַּ/חֲמִשָּֽׁה עָשָׂר֩
    י֨וֹם לַ/חֹ֜דֶשׁ כֶּ/חָ֣ג אֲשֶׁ֣ר בִּ/יהוּדָ֗ה וַ/יַּ֨עַל֙ עַל הַ/מִּזְבֵּ֔חַ
    כֵּ֤ן עָשָׂה֙ בְּ/בֵֽית אֵ֔ל לְ/זַבֵּ֖חַ לָ/עֲגָלִ֣ים אֲשֶׁר עָשָׂ֑ה וְ/הֶעֱמִיד֙
    בְּ/בֵ֣ית אֵ֔ל אֶת כֹּהֲנֵ֥י הַ/בָּמ֖וֹת אֲשֶׁ֥ר עָשָֽׂה׀־׀׀־־־־׃
translation:
  text: Jeroboam made a feast in the eighth month, on the fifteenth day of the month,
    like the feast that was in Judah, and he went up to the altar. So he did in Bethel,
    sacrificing to the calves that he had made; and in Bethel he installed the priests
    of the high places that he had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The feast in Judah likely refers to the Feast of Booths (Tabernacles), held
      on the fifteenth day of the seventh month; Jeroboam set his rival feast one
      month later.
    reason: cross_reference
  - marker: b
    text: Or 'he went up on the altar.' The Hebrew expression can be rendered more
      literally, but in context it refers to approaching/ascending the altar to officiate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ ... חָג
  chosen: made a feast
  alternatives:
  - held a festival
  - instituted a feast
  lexicon: HALOT
  rationale: The verb עשה with חג idiomatically means to hold or celebrate a feast.
    'Made a feast' stays close to the Hebrew while remaining natural enough in English.
- source_word: בַּחֹדֶשׁ הַשְּׁמִינִי
  chosen: in the eighth month
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in' best reflects the Hebrew preposition
    ב in this calendrical context.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם לַחֹדֶשׁ
  chosen: on the fifteenth day of the month
  alternatives:
  - on the fifteenth day in the month
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew date formula.
- source_word: כֶּחָג אֲשֶׁר בִּיהוּדָה
  chosen: like the feast that was in Judah
  alternatives:
  - like the feast that was celebrated in Judah
  - like the feast in Judah
  lexicon: HALOT
  rationale: The comparison is explicit. 'That was in Judah' is slightly more formal
    and preserves the Hebrew relative construction without over-specifying the feast's
    name.
- source_word: וַיַּעַל עַל הַמִּזְבֵּחַ
  chosen: he went up to the altar
  alternatives:
  - he went up on the altar
  - he ascended to the altar
  lexicon: HALOT
  rationale: עלה על המזבח can denote ascending to the altar area to officiate. 'To
    the altar' is idiomatic English and avoids the misleading sense that he physically
    climbed onto the altar surface, while still preserving the cultic action.
- source_word: כֵּן עָשָׂה בְּבֵית אֵל
  chosen: So he did in Bethel
  alternatives:
  - Thus he did in Bethel
  - He did the same in Bethel
  lexicon: HALOT
  rationale: כֵּן marks correspondence with what precedes. 'So he did' is concise
    and natural, and Bethel is transliterated as a place name.
- source_word: לְזַבֵּחַ לָעֲגָלִים
  chosen: sacrificing to the calves
  alternatives:
  - to sacrifice to the calves
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result in context. Rendering it as a
    participial clause after 'So he did in Bethel' gives clear English flow while
    preserving that the sacrifices were directed to the calves.
- source_word: הָעֲגָלִים
  chosen: the calves
  alternatives:
  - the calf idols
  lexicon: HALOT
  rationale: The noun literally means 'calves.' The idolatrous referent is clear from
    context and need not be imported into the noun itself.
- source_word: וְהֶעֱמִיד
  chosen: he installed
  alternatives:
  - he stationed
  - he appointed
  lexicon: HALOT
  rationale: In this context of cult personnel, 'installed' conveys formal placement
    into office/location better than the more generic 'stationed' and is less interpretively
    loaded than 'appointed.'
- source_word: כֹּהֲנֵי הַבָּמוֹת
  chosen: the priests of the high places
  alternatives:
  - the priests for the high places
  lexicon: HALOT
  rationale: בָּמוֹת refers to illicit local worship sites commonly rendered 'high
    places.' This established translation is accurate and understandable.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - which he had made
  lexicon: HALOT
  rationale: The repeated relative clause links both the calves and the high places
    to Jeroboam's own manufacture/establishment. The pluperfect fits the sequence
    in English.
