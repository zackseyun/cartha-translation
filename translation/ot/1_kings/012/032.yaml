theological_decisions:
- issue: Reference of 'the feast that was in Judah'
  chosen_reading: Render generically as 'the feast that was in Judah' without naming
    it explicitly.
  alternative_readings:
  - Interpret specifically as the Feast of Booths/Tabernacles
  rationale: The context strongly alludes to the Judean feast on the fifteenth day
    of the seventh month, but the Hebrew text here does not name it. To avoid importing
    information not stated in the verse, the main text keeps the generic wording;
    the likely identification is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
- issue: Cultic evaluation of Jeroboam's actions
  chosen_reading: Translate descriptively without adding condemnatory adjectives in
    the main text.
  alternative_readings:
  - Explicitly call the calves 'idols' or the priests 'illegitimate priests' in the
    main text
  rationale: The broader narrative condemns Jeroboam's cult, but this verse itself
    states the actions descriptively. The translation preserves that wording and lets
    the context carry the evaluation.
  doctrine_reference: 'Translation philosophy: Preserve what the source text says
    without paraphrastic expansion.'
