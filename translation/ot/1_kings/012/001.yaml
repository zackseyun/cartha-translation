id: 1KI.12.1
reference: 1 Kings 12:1
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ רְחַבְעָ֖ם שְׁכֶ֑ם כִּ֥י שְׁכֶ֛ם בָּ֥א כָל יִשְׂרָאֵ֖ל לְ/הַמְלִ֥יךְ
    אֹתֽ/וֹ־׃
translation:
  text: Then Rehoboam went to Shechem, because all Israel had come to Shechem to make
    him king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For all Israel came to Shechem to make him king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Then ... went
  alternatives:
  - And ... went
  - So ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'and' would be more formally
    literal but less idiomatic here.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Place name is transliterated by standard English convention.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Rehoboam's journey. 'Because' is
    clearer in contemporary English than the more formal 'for' while preserving the
    causal sense.
- source_word: בָּא
  chosen: had come
  alternatives:
  - came
  lexicon: HALOT
  rationale: 'Although morphologically a perfect, in context it denotes action prior
    to Rehoboam''s going. English past perfect best captures the relative sequence:
    Israel had already assembled at Shechem.'
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the collective expression. It refers
    to the assembled tribes/people as a national body, not necessarily every individual
    without exception.
- source_word: לְהַמְלִיךְ אֹתוֹ
  chosen: to make him king
  alternatives:
  - to crown him king
  - to proclaim him king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to reign, install, or make king.
    'Make him king' is a clear, direct rendering that preserves the causative force
    without importing later ceremonial connotations such as 'crown.'
