theological_decisions:
- issue: Scope of 'all Israel'
  chosen_reading: 'Rendered as a corporate/national expression: ''all Israel.'''
  alternative_readings:
  - A strictly exhaustive sense meaning every individual Israelite
  rationale: The phrase is a conventional collective designation in historical narrative.
    The translation preserves the source wording without overstating the exhaustiveness
    in interpretation.
