theological_decisions:
- issue: Divine causation and human action
  chosen_reading: The verse states that the king's refusal occurred because the outcome was from the LORD, with the purpose of establishing the LORD's prior word.
  alternative_readings:
  - A weaker providential reading that treats the event as merely permitted by the LORD
  - A stronger deterministic paraphrase that makes the LORD the direct efficient cause of the king's refusal in wording beyond the text
  rationale: The Hebrew explicitly attributes the circumstance/source to the LORD and gives a purpose clause tied to fulfillment of prophetic word. The translation preserves that tension without softening divine sovereignty or overstating the mechanics beyond what the text says.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
