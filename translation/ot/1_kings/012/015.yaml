id: 1KI.12.15
reference: 1 Kings 12:15
source:
  edition: WLC
  text: וְ/לֹֽא שָׁמַ֥ע הַ/מֶּ֖לֶךְ אֶל הָ/עָ֑ם כִּֽי הָיְתָ֤ה סִבָּה֙ מֵ/עִ֣ם יְהוָ֔ה לְמַ֜עַן הָקִ֣ים אֶת דְּבָר֗/וֹ אֲשֶׁ֨ר דִּבֶּ֤ר יְהוָה֙ בְּ/יַד֙ אֲחִיָּ֣ה הַ/שִּׁילֹנִ֔י אֶל יָרָבְעָ֖ם בֶּן נְבָֽט־־־־־־׃
translation:
  text: So the king did not listen to the people, for it was a turn of events from Yahweh, in order to establish his word that Yahweh had spoken by the hand of Ahijah the Shilonite to Jeroboam son of Nebat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the cause was from the LORD.' The Hebrew סִבָּה can mean 'cause,' 'reason,' or a turn in circumstances.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the hand of Ahijah the Shilonite,' an idiom meaning 'through Ahijah the Shilonite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: In this context with אֶל ('to') and a request from the people, the verb means to heed or listen rather than merely hear audibly. 'Listen to' is natural English and preserves the sense that the king refused their appeal.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם here, referring to the assembled people of Israel rather than a narrower subgroup.
- source_word: סִבָּה
  chosen: turn of events
  alternatives:
  - cause
  - circumstance
  - reason
  lexicon: HALOT
  rationale: The noun can denote a cause or turn in affairs. 'Turn of events' best fits the narrative idiom in English and avoids implying a merely abstract reason; it captures that the outcome unfolded under divine providence.
- source_word: מֵעִם יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  - from with the LORD
  lexicon: HALOT
  rationale: The phrase indicates source/origin. Per doctrine, יְהוָה is rendered 'the LORD.' 'From the LORD' is idiomatic and faithful.
- source_word: לְמַעַן הָקִים
  chosen: in order to establish
  alternatives:
  - so that he might fulfill
  - to confirm
  lexicon: HALOT
  rationale: לְמַעַן marks purpose, and הֵקִים with 'word' commonly means to establish or confirm a spoken word. 'Establish' preserves the formal link to covenantal/prophetic fulfillment language without over-paraphrasing.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - his message
  lexicon: HALOT
  rationale: '''Word'' is the most direct rendering and preserves the biblical idiom of divine speech. ''Promise'' would narrow the sense more than the Hebrew requires, though fulfillment is in view.'
- source_word: דִּבֶּר
  chosen: had spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: English past perfect clarifies that the LORD's speech through Ahijah preceded the present narrative event.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for agency in prophetic mediation. Retaining 'by the hand of' preserves the source texture while remaining understandable in English.
- source_word: הַשִּׁילֹנִי
  chosen: the Shilonite
  alternatives:
  - from Shiloh
  lexicon: HALOT
  rationale: The gentilic is best represented by the established English form 'the Shilonite,' preserving the Hebrew adjectival designation attached to Ahijah.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam, the son of Nebat
  lexicon: HALOT
  rationale: Standard English rendering of the personal name plus patronymic, preserving Hebrew naming style.
