id: 1KI.12.19
reference: 1 Kings 12:19
source:
  edition: WLC
  text: וַ/יִּפְשְׁע֤וּ יִשְׂרָאֵל֙ בְּ/בֵ֣ית דָּוִ֔ד עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃ס
translation:
  text: So Israel has been in rebellion against the house of David to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'So Israel rebelled against the house of David to this
      day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשְׁעוּ
  chosen: has been in rebellion
  alternatives:
  - rebelled
  - broke away
  - transgressed
  lexicon: HALOT
  rationale: פשע in political contexts commonly denotes rebellion or revolt, not merely
    generic sin. The English perfect 'has been in rebellion' captures the wayyiqtol
    narrative event together with the continuing state implied by the following phrase
    'to this day.' 'Broke away' is possible contextually but is more interpretive;
    'rebelled' is closer formally but slightly less natural with the durative force
    of the clause.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The proper name is retained as 'Israel.' In this context it refers to
    the northern tribes/corporate nation in distinction from the Davidic dynasty.
    'The Israelites' is possible but less direct than the Hebrew proper name.
- source_word: בְּבֵית דָּוִד
  chosen: against the house of David
  alternatives:
  - against David's house
  - from the house of David
  lexicon: HALOT
  rationale: With פשע, the preposition ב can mark the party against whom one rebels.
    'Against the house of David' is the most idiomatic and preserves the dynastic
    sense of בֵּית דָּוִד. 'From the house of David' reflects the separation idea
    but under-translates the adversative force of the construction.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking continuation from the narrated
    event up to the writer's present. 'To this day' is the established and natural
    English equivalent.
