id: 1KI.12.9
reference: 1 Kings 12:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם מָ֚ה אַתֶּ֣ם נֽוֹעָצִ֔ים וְ/נָשִׁ֥יב דָּבָ֖ר אֶת הָ/עָ֣ם
    הַ/זֶּ֑ה אֲשֶׁ֨ר דִּבְּר֤וּ אֵלַ/י֙ לֵ/אמֹ֔ר הָקֵל֙ מִן הָ/עֹ֔ל אֲשֶׁר נָתַ֥ן
    אָבִ֖י/ךָ עָלֵֽי/נוּ־־־׃
translation:
  text: And he said to them, “What do you advise, so that we may answer this people
    who have spoken to me, saying, ‘Lighten the yoke that your father put on us’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'return an answer' for the idiom 'answer a word.'
    reason: lexical_alternative
  - marker: b
    text: '''Yoke'' is a metaphor for the heavy labor and obligations imposed by the
      king.'
    reason: cultural_note
lexical_decisions:
- source_word: מָה אַתֶּם נוֹעָצִים
  chosen: What do you advise
  alternatives:
  - What are you advising
  - What counsel do you give
  lexicon: HALOT
  rationale: The participial construction asks for ongoing or present counsel from
    the advisers. 'What do you advise' is natural modern English while preserving
    the direct request for counsel.
- source_word: וְנָשִׁיב דָּבָר
  chosen: so that we may answer
  alternatives:
  - and we may return an answer
  - that we may reply with a word
  lexicon: HALOT
  rationale: The Hiphil of שוב with דָבָר idiomatically means to return an answer
    or reply. 'So that we may answer' captures the purpose nuance and reads naturally
    in English.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people-group
  - these people
  lexicon: HALOT
  rationale: The singular collective עָם is best preserved as 'people' rather than
    plural 'people'/'persons.' 'This people' reflects the Hebrew demonstrative construction
    and the somewhat distancing tone.
- source_word: אֲשֶׁר דִּבְּרוּ אֵלַי לֵאמֹר
  chosen: who have spoken to me, saying
  alternatives:
  - who spoke to me, saying
  - who said to me
  lexicon: HALOT
  rationale: This relative clause introduces the content of the people's request.
    'Have spoken to me, saying' preserves the Hebrew sequence without over-literal
    awkwardness.
- source_word: הָקֵל
  chosen: Lighten
  alternatives:
  - Make lighter
  - Ease
  lexicon: HALOT
  rationale: The imperative asks for reduction of burden. 'Lighten' is concise, idiomatic,
    and fits the object 'the yoke' well.
- source_word: מִן הָעֹל
  chosen: the yoke
  alternatives:
  - the burden
  - the hard yoke
  lexicon: HALOT
  rationale: עֹל literally means 'yoke' and carries the metaphor of imposed labor
    or oppression. The literal image should be preserved here rather than flattened
    to 'burden.'
- source_word: אֲשֶׁר נָתַן אָבִיךָ עָלֵינוּ
  chosen: that your father put on us
  alternatives:
  - that your father laid on us
  - which your father imposed on us
  lexicon: HALOT
  rationale: '''Put on us'' is a natural rendering of נתן על while retaining the concrete
    image of an imposed yoke. ''Imposed on us'' is possible but slightly more interpretive.'
