id: 1KI.12.11
reference: 1 Kings 12:11
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אָבִ/י֙ הֶעְמִ֤יס עֲלֵי/כֶם֙ עֹ֣ל כָּבֵ֔ד וַ/אֲנִ֖י אוֹסִ֣יף עַֽל
    עֻלְּ/כֶ֑ם אָבִ֗/י יִסַּ֤ר אֶתְ/כֶם֙ בַּ/שּׁוֹטִ֔ים וַ/אֲנִ֕י אֲיַסֵּ֥ר אֶתְ/כֶ֖ם
    בָּ/עַקְרַבִּֽים־׃
translation:
  text: And now, my father made your yoke heavy, but I will add to your yoke. My father
    disciplined you with whips, but I will discipline you with scorpions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with scorpion-whips,' that is, whips or lashes designed to
      be more painful; the Hebrew literally reads 'with scorpions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעְמִיס
  chosen: made ... heavy
  alternatives:
  - loaded
  - made burdensome
  lexicon: HALOT
  rationale: The Hiphil of עמס conveys imposing a load or burden. In context with
    עֹל ('yoke'), 'made your yoke heavy' is idiomatic and clear in English, preserving
    the metaphor without awkward literalism like 'loaded a heavy yoke upon you.'
- source_word: עֹל / עֻלְּכֶם
  chosen: yoke
  alternatives:
  - burden
  lexicon: HALOT
  rationale: '''Yoke'' is the standard concrete metaphor for oppressive rule or forced
    labor and should be preserved rather than flattened to ''burden.'' The repetition
    is maintained for rhetorical force.'
- source_word: כָּבֵד
  chosen: heavy
  alternatives:
  - harsh
  - weighty
  lexicon: HALOT
  rationale: The adjective literally means 'heavy.' Here it modifies 'yoke' and supports
    the oppression metaphor. 'Harsh' would interpret rather than translate.
- source_word: אוֹסִיף עַל
  chosen: I will add to
  alternatives:
  - I will increase
  - I will make heavier
  lexicon: HALOT
  rationale: The Hiphil of יסף with עַל naturally means to add to or increase. 'I
    will add to your yoke' is a close rendering that preserves the Hebrew structure;
    the implication of increasing severity is clear from context.
- source_word: יִסַּר / אֲיַסֵּר
  chosen: disciplined / will discipline
  alternatives:
  - chastised
  - punished
  lexicon: HALOT
  rationale: יסר can denote discipline, chastening, or correction, often by corporal
    means. In this political threat context, 'discipline' preserves the lexical sense
    without over-specifying judicial punishment. 'Chastise' is traditional but less
    natural in contemporary English.
- source_word: בַּשּׁוֹטִים
  chosen: with whips
  alternatives:
  - with lashes
  lexicon: HALOT
  rationale: שׁוֹט refers to a whip or scourge. 'With whips' is the most direct and
    natural rendering.
- source_word: בָּעַקְרַבִּים
  chosen: with scorpions
  alternatives:
  - with scorpion-whips
  lexicon: HALOT
  rationale: The noun literally means 'scorpions.' In context it may refer metaphorically
    to especially cruel whips or instruments with barbs, but the main text should
    preserve the literal Hebrew image. The likely idiomatic sense is worth preserving
    in a footnote rather than replacing the term in the translation.
