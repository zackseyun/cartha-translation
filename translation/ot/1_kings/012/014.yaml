theological_decisions:
- issue: Nature of the punishment image in 'scorpions'
  chosen_reading: Retain the literal image 'scorpions' in the main text
  alternative_readings:
  - Render idiomatically as 'scorpion-whips'
  rationale: This is not a doctrinally contested term, but the Hebrew uses the concrete
    noun עקרבים. Preserving the literal image maintains transparency to the source
    text while allowing the probable idiomatic sense to be explained in a footnote
    rather than resolved in translation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity/tension where genuine'
