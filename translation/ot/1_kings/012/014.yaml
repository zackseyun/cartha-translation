id: 1KI.12.14
reference: 1 Kings 12:14
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אֲלֵי/הֶ֗ם כַּ/עֲצַ֤ת הַ/יְלָדִים֙ לֵ/אמֹ֔ר אָבִ/י֙ הִכְבִּ֣יד
    אֶֽת עֻלְּ/כֶ֔ם וַ/אֲנִ֖י אֹסִ֣יף עַֽל עֻלְּ/כֶ֑ם אָבִ֗/י יִסַּ֤ר אֶתְ/כֶם֙ בַּ/שּׁוֹטִ֔ים
    וַ/אֲנִ֕י אֲיַסֵּ֥ר אֶתְ/כֶ֖ם בָּ/עַקְרַבִּֽים־־׃
translation:
  text: He spoke to them according to the advice of the young men, saying, “My father
    made your yoke heavy, but I will add to your yoke. My father disciplined you with
    whips, but I will discipline you with scorpions.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with scorpion-whips,' that is, whips with sharp points or barbs;
      the Hebrew literally reads 'with scorpions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: He spoke
  alternatives:
  - He answered
  - He said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' In context this is Rehoboam's
    reply, but 'spoke' preserves the Hebrew wording without over-interpreting it as
    a formal 'answer.'
- source_word: כַּעֲצַת
  chosen: according to the advice of
  alternatives:
  - by the counsel of
  - in line with the counsel of
  lexicon: HALOT
  rationale: עֵצָה denotes counsel/advice. 'According to the advice of' is natural
    modern English and reflects the comparative כ preposition.
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the youths
  - the boys
  lexicon: HALOT
  rationale: Although literally 'the children/boys,' in this narrative the referent
    is the younger advisers contrasted with the elders. 'Young men' best conveys their
    social identity in context without sounding childish.
- source_word: הִכְבִּיד
  chosen: made ... heavy
  alternatives:
  - made ... burdensome
  - made ... harsh
  lexicon: HALOT
  rationale: The hiphil of כבד here means to make heavy. Rendering it directly preserves
    the yoke metaphor and avoids prematurely abstracting it to 'burdensome,' though
    that sense is implicit.
- source_word: עֻלְּכֶם
  chosen: your yoke
  alternatives:
  - your burden
  lexicon: HALOT
  rationale: עוֹל is literally 'yoke' and is a common metaphor for imposed labor or
    rule. The concrete image should be preserved in the main text.
- source_word: אֹסִיף עַל
  chosen: I will add to
  alternatives:
  - I will make heavier
  - I will increase
  lexicon: HALOT
  rationale: יסף with על literally means 'add to.' This keeps the Hebrew idiom and
    lets the object 'your yoke' carry the sense of increased burden.
- source_word: יִסַּר / אֲיַסֵּר
  chosen: disciplined / will discipline
  alternatives:
  - chastised / will chastise
  - punished / will punish
  lexicon: HALOT
  rationale: יסר can denote chasten, discipline, or instruct through correction. 'Discipline'
    preserves the corrective-force nuance without narrowing it to mere punishment,
    while fitting the coercive royal context.
- source_word: בַּשּׁוֹטִים
  chosen: with whips
  alternatives:
  - with lashes
  lexicon: HALOT
  rationale: שׁוֹט refers to a whip/scourge. 'Whips' is the clearest ordinary English
    equivalent.
- source_word: בָּעַקְרַבִּים
  chosen: with scorpions
  alternatives:
  - with scorpion-whips
  lexicon: HALOT
  rationale: The Hebrew literally says 'with scorpions.' This may refer metaphorically
    to barbed whips, but the literal term should stand in the main text; the likely
    idiomatic sense is worth preserving in a footnote.
