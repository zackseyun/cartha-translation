id: 1KI.12.23
reference: 1 Kings 12:23
source:
  edition: WLC
  text: אֱמֹ֗ר אֶל רְחַבְעָ֤ם בֶּן שְׁלֹמֹה֙ מֶ֣לֶךְ יְהוּדָ֔ה וְ/אֶל כָּל בֵּ֥ית
    יְהוּדָ֖ה וּ/בִנְיָמִ֑ין וְ/יֶ֥תֶר הָ/עָ֖ם לֵ/אמֹֽר־־־־׃
translation:
  text: Speak to Rehoboam son of Solomon, king of Judah, and to all the house of Judah
    and Benjamin, and the rest of the people, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Say to Rehoboam ...'
    reason: lexical_alternative
  - marker: b
    text: '''The house of Judah'' preserves the Hebrew idiom for the Judahite community
      or polity; alternatively, ''all Judah.'''
    reason: lexical_alternative
  - marker: c
    text: '''The people'' may in context refer to those gathered for war, but the
      Hebrew here does not explicitly say ''army.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Speak
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative of אמר introducing a divine command to deliver a message.
    'Speak' is natural English here and fits the formal address that follows; 'say'
    is possible but slightly less smooth in this construction.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition marking the addressee of the speech.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בֶּן שְׁלֹמֹה
  chosen: son of Solomon
  lexicon: HALOT
  rationale: Construct chain identifying Rehoboam by lineage. 'Son of Solomon' is
    the straightforward rendering.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Royal title in construct with Judah; rendered directly and idiomatically.
- source_word: כָּל בֵּית יְהוּדָה
  chosen: all the house of Judah
  alternatives:
  - all the household of Judah
  - all Judah
  lexicon: HALOT
  rationale: בֵּית in this political-collective context can denote the house/community
    aligned with Judah. 'House of Judah' preserves the Hebrew idiom and likely political-corporate
    sense better than flattening to simply 'Judah'.
- source_word: וּבִנְיָמִין
  chosen: and Benjamin
  alternatives:
  - and the house of Benjamin
  lexicon: HALOT
  rationale: The tribe/territory name stands independently here. English can naturally
    render it as 'and Benjamin,' with the collective tribal sense understood from
    context.
- source_word: וְיֶתֶר הָעָם
  chosen: and the rest of the people
  alternatives:
  - and the remainder of the people
  - and the rest of the army
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder/rest.' הָעָם commonly means 'the people'; in context
    it may refer specifically to those assembled for war, but the Hebrew does not
    explicitly say 'army' in this verse, so 'people' is retained.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and say,
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the message
    in the following verse. Rendering with 'saying,' preserves the linkage and signals
    continuation.
