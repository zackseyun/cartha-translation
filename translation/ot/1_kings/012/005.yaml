id: 1KI.12.5
reference: 1 Kings 12:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם לְכ֥וּ עֹ֛ד שְׁלֹשָׁ֥ה יָמִ֖ים וְ/שׁ֣וּבוּ אֵלָ֑/י
    וַ/יֵּלְכ֖וּ הָ/עָֽם׃
translation:
  text: He said to them, “Go away for three more days, then return to me.” So the
    people went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go for another three days and return to me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר. English often omits the initial
    conjunction in smooth narrative, but the speech introduction is retained straightforwardly.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct prepositional phrase marking the addressees of the speech.
- source_word: לְכוּ
  chosen: Go away
  alternatives:
  - Go
  - Leave
  lexicon: HALOT
  rationale: Imperative plural of הלך. In this context Rehoboam is dismissing the
    delegation temporarily, so 'go away' makes the sense of departure from his presence
    clearer than the bare 'go'.
- source_word: עוֹד שְׁלֹשָׁה יָמִים
  chosen: for three more days
  alternatives:
  - yet three days
  - for another three days
  - three days more
  lexicon: HALOT
  rationale: עוֹד with a time expression indicates an additional period. 'For three
    more days' is idiomatic modern English and preserves the temporal force.
- source_word: וְשׁוּבוּ
  chosen: then return
  alternatives:
  - and return
  - come back
  lexicon: HALOT
  rationale: Imperative plural of שוב. 'Return' is the core sense; 'then' brings out
    the sequence implied in English after the first command.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to me again
  lexicon: HALOT
  rationale: Simple directional phrase indicating that they are to come back to the
    speaker.
- source_word: וַיֵּלְכוּ הָעָם
  chosen: So the people went away
  alternatives:
  - And the people went
  - and the people departed
  lexicon: HALOT
  rationale: Narrative conclusion reporting compliance. Although הָעָם is singular
    in form, it functions collectively; 'the people' with plural English verb is natural
    English. 'Went away' echoes the dismissal in לְכוּ.
