id: 1KI.12.31
reference: 1 Kings 12:31
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אֶת בֵּ֣ית בָּמ֑וֹת וַ/יַּ֤עַשׂ כֹּֽהֲנִים֙ מִ/קְצ֣וֹת הָ/עָ֔ם
    אֲשֶׁ֥ר לֹֽא הָי֖וּ מִ/בְּנֵ֥י לֵוִֽי־־׃
translation:
  text: He made shrines on high places, and he appointed priests from among all the
    people, who were not from the sons of Levi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a house of high places,' an idiom for shrines or sanctuaries
      associated with high places.
    reason: lexical_alternative
  - marker: b
    text: Or, 'who were not Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - He built
  - He established
  lexicon: HALOT
  rationale: The verb עשה is broad ('make/do'). 'Made' preserves the Hebrew's generality
    in both clauses without over-specifying construction in the first or ordination
    in the second.
- source_word: בֵּית בָּמוֹת
  chosen: shrines on high places
  alternatives:
  - a house of high places
  - high-place shrines
  - temples of high places
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of high places,' an idiom
    for a shrine/sanctuary associated with illicit local worship sites. 'Shrines on
    high places' is natural English and preserves the cultic sense better than a wooden
    literalism.
- source_word: כֹּהֲנִים
  chosen: priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים in cultic context.
- source_word: מִקְצוֹת הָעָם
  chosen: from among all the people
  alternatives:
  - from the extremities of the people
  - from among the people
  - from every class of the people
  lexicon: HALOT
  rationale: The idiom here refers to selection from the populace at large, not specifically
    from a legitimate priestly group. 'From among all the people' communicates that
    Jeroboam drew priests broadly from the people.
- source_word: אֲשֶׁר לֹא הָיוּ מִבְּנֵי לֵוִי
  chosen: who were not from the sons of Levi
  alternatives:
  - who were not Levites
  - who were not of the sons of Levi
  lexicon: HALOT
  rationale: This relative clause identifies these priests as non-Levitical. 'From
    the sons of Levi' keeps the familial/tribal wording of the Hebrew while remaining
    readable. 'Levites' is a viable smoother alternative.
