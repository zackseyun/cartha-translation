theological_decisions:
- issue: Rendering the illegitimate cultic institutions established by Jeroboam
  chosen_reading: He made shrines on high places
  alternative_readings:
  - He built a house of high places
  - He made temples on the high places
  rationale: The Hebrew describes unauthorized worship structures associated with
    high places. The translation should reflect the cultic setting without importing
    later theological commentary beyond the text itself. 'Shrines on high places'
    conveys the sense clearly in modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
- issue: Rendering the non-Levitical status of the appointed priests
  chosen_reading: who were not from the sons of Levi
  alternative_readings:
  - who were not Levites
  rationale: The text explicitly marks these priests as outside the Levitical line.
    The translation preserves that historical-cultic distinction without adding explanatory
    interpretation.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
