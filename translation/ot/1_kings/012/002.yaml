id: 1KI.12.2
reference: 1 Kings 12:2
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/שְׁמֹ֣עַ יָרָבְעָ֣ם בֶּן נְבָ֗ט וְ/הוּא֙ עוֹדֶ֣/נּוּ בְ/מִצְרַ֔יִם
    אֲשֶׁ֣ר בָּרַ֔ח מִ/פְּנֵ֖י הַ/מֶּ֣לֶךְ שְׁלֹמֹ֑ה וַ/יֵּ֥שֶׁב יָרָבְעָ֖ם בְּ/מִצְרָֽיִם׀־׃
translation:
  text: Now when Jeroboam son of Nebat heard of it—while he was still in Egypt, where
    he had fled from King Solomon—Jeroboam remained in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'when Jeroboam ... heard'; the object is implied from
      context, likely the news just mentioned in the surrounding narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - Then it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative transition. In English,
    a simple discourse marker such as 'Now' best preserves the flow without woodenly
    reproducing 'and it happened.'
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - upon hearing
  - as soon as ... heard
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע introduces a temporal
    clause. 'When ... heard' is natural modern English and preserves the temporal
    sense.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam, the son of Nebat
  lexicon: HALOT
  rationale: Personal names are transliterated; the filial designation is retained
    in standard biblical English form.
- source_word: וְהוּא עוֹדֶנּוּ בְמִצְרַיִם
  chosen: while he was still in Egypt
  alternatives:
  - and he was still in Egypt
  - he being still in Egypt
  lexicon: HALOT
  rationale: This parenthetical circumstantial clause gives Jeroboam's location at
    the time of hearing. 'While he was still in Egypt' conveys the ongoing circumstance
    clearly.
- source_word: אֲשֶׁר בָּרַח מִפְּנֵי הַמֶּלֶךְ שְׁלֹמֹה
  chosen: where he had fled from King Solomon
  alternatives:
  - to which he had fled from before King Solomon
  - where he had escaped from King Solomon
  lexicon: HALOT
  rationale: The relative clause modifies Egypt in sense, identifying it as the place
    to which Jeroboam fled. 'From' for מִפְּנֵי is idiomatic here, expressing flight
    from the presence/power of the king.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - dwelt
  - lived
  - stayed
  lexicon: HALOT
  rationale: Although ישב often means 'sit' or 'dwell,' in this context after the
    note about his flight and current location it conveys continued residence. 'Remained'
    best captures the narrative point without awkward repetition.
- source_word: בְּמִצְרָיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Standard geographical rendering.
- source_word: שְׁמֹעַ ... heard of it
  chosen: heard of it
  alternatives:
  - heard
  - heard this
  lexicon: HALOT
  rationale: English requires an object more naturally than the Hebrew, whose object
    is implied from context (the events just narrated, especially Solomon's death
    and Rehoboam's accession). 'Of it' supplies the implied reference without over-specifying.
