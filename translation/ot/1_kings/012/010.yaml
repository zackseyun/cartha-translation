id: 1KI.12.10
reference: 1 Kings 12:10
source:
  edition: WLC
  text: וַ/יְדַבְּר֣וּ אֵלָ֗י/ו הַ/יְלָדִים֙ אֲשֶׁ֨ר גָּדְל֣וּ אִתּ/וֹ֮ לֵ/אמֹר֒ כֹּֽה
    תֹאמַ֣ר לָ/עָ֣ם הַ/זֶּ֡ה אֲשֶׁר֩ דִּבְּר֨וּ אֵלֶ֜י/ךָ לֵ/אמֹ֗ר אָבִ֨י/ךָ֙ הִכְבִּ֣יד
    אֶת עֻלֵּ֔/נוּ וְ/אַתָּ֖ה הָקֵ֣ל מֵ/עָלֵ֑י/נוּ כֹּ֚ה תְּדַבֵּ֣ר אֲלֵי/הֶ֔ם קָֽטָנִּ֥/י
    עָבָ֖ה מִ/מָּתְנֵ֥י אָבִֽ/י־־׃
translation:
  text: 'The young men who had grown up with him spoke to him, saying, “This is what
    you shall say to this people who spoke to you, saying, ‘Your father made our yoke
    heavy, but you, make it lighter for us’: this is what you shall say to them, ‘My
    little finger is thicker than my father’s waist.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my little finger is thicker than my father’s loins.'' ''Loins''
      is a more literal rendering of ''waist'' here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the boys
  - the youths
  lexicon: HALOT
  rationale: Although the noun literally derives from 'children/boys,' in this context
    it refers to Rehoboam's contemporaries and advisors, not small children. 'Young
    men' best captures the social sense in readable English.
- source_word: גָּדְלוּ אִתּוֹ
  chosen: had grown up with him
  alternatives:
  - were brought up with him
  - had been raised with him
  lexicon: HALOT
  rationale: The idiom indicates shared upbringing or maturation alongside him. 'Had
    grown up with him' is natural modern English and preserves the relational nuance.
- source_word: כֹּה תֹאמַר
  chosen: This is what you shall say
  alternatives:
  - Thus you shall say
  - This is how you shall speak
  lexicon: HALOT
  rationale: Formulaic speech introduction. 'This is what you shall say' is clear
    modern English while retaining the directive force.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The Hebrew is singular with demonstrative emphasis. 'This people' preserves
    the slightly distancing tone better than the smoother 'these people.'
- source_word: הִכְבִּיד אֶת עֻלֵּנוּ
  chosen: made our yoke heavy
  alternatives:
  - made our burden heavy
  - made our yoke harsh
  lexicon: HALOT
  rationale: The Hebrew keeps the metaphor of a yoke, referring to oppressive labor
    or taxation. Preserving 'yoke' maintains the image and intertextual resonance.
- source_word: הָקֵל מֵעָלֵינוּ
  chosen: make it lighter for us
  alternatives:
  - lighten it from upon us
  - ease our burden
  lexicon: HALOT
  rationale: The verb means to make light or lighten. 'Make it lighter for us' communicates
    the request naturally while still referring back to the yoke.
- source_word: קָטָנִּי
  chosen: My little finger
  alternatives:
  - My smallness
  - My little one
  lexicon: HALOT
  rationale: This is an idiomatic ellipsis commonly understood as 'my little finger'
    in context, contrasting a small body part with the father's loins/waist to express
    greater strength or severity.
- source_word: עָבָה
  chosen: is thicker than
  alternatives:
  - is thicker
  - is stouter than
  lexicon: HALOT
  rationale: The adjective/verb conveys thickness or stoutness. English requires the
    comparative sense here because of the following מִן construction.
- source_word: מִמָּתְנֵי אָבִי
  chosen: than my father’s waist
  alternatives:
  - than my father's loins
  - than my father's hips
  lexicon: HALOT
  rationale: מָתְנַיִם often refers to loins/waist/hips. 'Waist' is more accessible
    modern English, while still conveying the bodily comparison without unnecessary
    archaic wording. The idiom expresses boastful superiority, not a theological concept.
