id: 1KI.12.7
reference: 1 Kings 12:7
source:
  edition: WLC
  text: ו/ידבר אֵלָ֜י/ו לֵ/אמֹ֗ר אִם הַ֠/יּוֹם תִּֽהְיֶה עֶ֜בֶד לָ/עָ֤ם הַ/זֶּה֙ וַֽ/עֲבַדְתָּ֔/ם
    וַ/עֲנִיתָ֕/ם וְ/דִבַּרְתָּ֥ אֲלֵי/הֶ֖ם דְּבָרִ֣ים טוֹבִ֑ים וְ/הָי֥וּ לְ/ךָ֛ עֲבָדִ֖ים
    כָּל הַ/יָּמִֽים־־־׃
translation:
  text: And he spoke to him, saying, “If today you will be a servant to this people,
    and serve them, and answer them, and speak good words to them, then they will
    be your servants all the days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kind words.”
    reason: lexical_alternative
  - marker: b
    text: Or “they will serve you always.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: 'Although עֶבֶד can denote slave/servant, here the counsel is metaphorical
    and political: the king is urged to adopt a posture of service toward the people.
    ''Servant'' fits idiomatic English and the relational sense better than ''slave''
    in this context.'
- source_word: וַעֲבַדְתָּם
  chosen: serve them
  alternatives:
  - work for them
  lexicon: HALOT
  rationale: From עבד, in parallel with 'be a servant'; 'serve them' preserves the
    verbal link and the political-service nuance.
- source_word: וַעֲנִיתָם
  chosen: answer them
  alternatives:
  - respond to them
  lexicon: HALOT
  rationale: ענה here means to answer/reply, not to afflict. In the context of the
    people's petition, 'answer them' is the plain sense.
- source_word: דְּבָרִים טוֹבִים
  chosen: good words
  alternatives:
  - kind words
  - favorable words
  lexicon: HALOT
  rationale: A fairly literal rendering that remains natural in English and preserves
    the emphasis on benevolent speech. 'Kind words' is possible, but 'good words'
    stays closer to the Hebrew.
- source_word: וְהָיוּ לְךָ עֲבָדִים
  chosen: they will be your servants
  alternatives:
  - they will serve you
  - they will be your subjects
  lexicon: HALOT
  rationale: 'Keeps the noun עֲבָדִים explicit and preserves the reciprocal contrast:
    if the king serves the people now, they will become his servants thereafter.'
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - all your days
  lexicon: HALOT
  rationale: A formal but intelligible rendering of the idiom, avoiding over-interpretation.
    'Always' is smoother but less transparent to the Hebrew wording.
- source_word: אִם הַיּוֹם
  chosen: If today
  alternatives:
  - If this day
  - If now
  lexicon: HALOT
  rationale: 'Retains the temporal emphasis of the Hebrew: the decision required is
    immediate, in response to the present crisis.'
- source_word: וַיְדַבֵּר אֵלָיו לֵאמֹר
  chosen: And he spoke to him, saying
  alternatives:
  - And they spoke to him, saying
  lexicon: HALOT
  rationale: The consonantal form is singular in the provided text, so the translation
    follows it directly. English retains the standard narrative formula.
