theological_decisions:
- issue: Political metaphor of kingship as service
  chosen_reading: Render the language straightforwardly as service/servanthood without
    softening or importing later theological overtones.
  alternative_readings:
  - Use more royal-political language such as 'be subject to the people' or 'act as
    their minister'
  rationale: The verse gives practical counsel to Rehoboam in ordinary political terms.
    The translation preserves the irony and reciprocity of servant language without
    turning it into a doctrinal statement beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
