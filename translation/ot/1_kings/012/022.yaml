id: 1KI.12.22
reference: 1 Kings 12:22
source:
  edition: WLC
  text: וַ/יְהִי֙ דְּבַ֣ר הָֽ/אֱלֹהִ֔ים אֶל שְׁמַעְיָ֥ה אִישׁ הָ/אֱלֹהִ֖ים לֵ/אמֹֽר־־׃
translation:
  text: And the word of God came to Shemaiah the man of God, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the word of God came to Shemaiah.'' Many English versions read
      ''the word of the LORD'' in similar formulas, but here the text specifically
      says ''God'' (אֱלֹהִים), not the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the formula ויהי דבר... אל, English idiom is best represented by 'came'
    rather than the more wooden 'was,' yielding the standard prophetic expression
    'the word of God came to...' while preserving the eventive sense.
- source_word: דְּבַר
  chosen: word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this revelatory formula most naturally means 'word,' referring
    to a divine communication. 'Message' is possible but 'word' better preserves the
    biblical idiom and theological resonance.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the true God in narrative prose, not a generic
    'god' or the divine name YHWH. Therefore 'God' is the accurate rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word; 'to' is the natural
    modern English equivalent.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  lexicon: HALOT
  rationale: This is a recognized title for a prophetic figure. The definite article
    on הָאֱלֹהִים and the appositional construction support the established rendering
    'the man of God,' identifying Shemaiah in his prophetic role.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse.
    'Saying' is the conventional and clear English way to preserve the discourse linkage.
