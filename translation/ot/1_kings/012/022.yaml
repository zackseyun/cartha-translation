- issue: Rendering of אֱלֹהִים in the revelatory formula
  chosen_reading: God
  alternative_readings:
  - the LORD
  rationale: The source text uses אֱלֹהִים, not YHWH. Per the translation philosophy,
    original-language primacy requires rendering the term actually present rather
    than harmonizing to the more common formula 'word of the LORD.'
