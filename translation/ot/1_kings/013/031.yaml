id: 1KI.13.31
reference: 1 Kings 13:31
source:
  edition: WLC
  text: וַ/יְהִי֮ אַחֲרֵ֣י קָבְר֣/וֹ אֹת/וֹ֒ וַ/יֹּ֤אמֶר אֶל בָּנָי/ו֙ לֵ/אמֹ֔ר בְּ/מוֹתִ/י֙
    וּ/קְבַרְתֶּ֣ם אֹתִ֔/י בַּ/קֶּ֕בֶר אֲשֶׁ֛ר אִ֥ישׁ הָ/אֱלֹהִ֖ים קָב֣וּר בּ֑/וֹ
    אֵ֚צֶל עַצְמֹתָ֔י/ו הַנִּ֖יחוּ אֶת עַצְמֹתָֽ/י־־׃
translation:
  text: And it happened, after he had buried him, that he said to his sons, “When
    I die, bury me in the tomb where the man of God is buried; lay my bones beside
    his bones.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Afterward it happened
  lexicon: HALOT
  rationale: Retains the narrative wayyiqtol opening without archaic diction. 'And
    it happened' preserves the Hebrew storytelling cadence better than omitting it
    entirely.
- source_word: אַחֲרֵי קָבְרוֹ אֹתוֹ
  chosen: after he had buried him
  alternatives:
  - after burying him
  - after he buried him
  lexicon: HALOT
  rationale: The infinitive/construct phrase with suffixes is best represented as
    a temporal clause. 'Had buried' reflects prior action relative to the following
    speech.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: Gender-accurate rendering is required by the source; the Hebrew specifically
    refers to sons, not children in general.
- source_word: בְּמוֹתִי
  chosen: When I die
  alternatives:
  - At my death
  - When I am dead
  lexicon: HALOT
  rationale: Natural modern English for the temporal infinitive with first-person
    suffix, preserving the prospective sense.
- source_word: וּקְבַרְתֶּם אֹתִי
  chosen: bury me
  alternatives:
  - then you shall bury me
  - and bury me
  lexicon: HALOT
  rationale: English imperative-like force in direct speech is clearest here. The
    Hebrew perfect with prefixed conjunction in this context functions as an instruction
    to his sons.
- source_word: בַּקֶּבֶר
  chosen: in the tomb
  alternatives:
  - in the grave
  - in the burial place
  lexicon: HALOT
  rationale: '''Tomb'' better fits a specific burial site that can contain multiple
    sets of bones, which the rest of the verse presumes.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew title in the passage and should be translated
    directly and consistently, not interpreted more narrowly as 'prophet.'
- source_word: קָבוּר בּוֹ
  chosen: is buried
  alternatives:
  - lies buried there
  - has been buried in it
  lexicon: HALOT
  rationale: Simple present English idiom communicates the stative passive participle
    clearly.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - alongside
  lexicon: HALOT
  rationale: '''Beside'' is concise and natural, preserving the spatial proximity
    indicated by the Hebrew preposition.'
- source_word: עַצְמֹתָיו ... עַצְמֹתָי
  chosen: his bones ... my bones
  alternatives:
  - his remains ... my remains
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'bones'; retaining the concrete term preserves
    the burial imagery and the later narrative significance.
- source_word: הַנִּיחוּ
  chosen: lay
  alternatives:
  - place
  - set down
  lexicon: HALOT
  rationale: Direct imperative to his sons. 'Lay my bones beside his bones' is idiomatic
    and suitably solemn.
