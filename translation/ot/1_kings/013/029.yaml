id: 1KI.13.29
reference: 1 Kings 13:29
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א הַ/נָּבִ֜יא אֶת נִבְלַ֧ת אִישׁ הָ/אֱלֹהִ֛ים וַ/יַּנִּחֵ֥/הוּ
    אֶֽל הַ/חֲמ֖וֹר וַ/יְשִׁיבֵ֑/הוּ וַ/יָּבֹ֗א אֶל עִיר֙ הַ/נָּבִ֣יא הַ/זָּקֵ֔ן לִ/סְפֹּ֖ד
    וּ/לְ/קָבְרֽ/וֹ־־־־׃
translation:
  text: Then the prophet lifted up the corpse of the man of God and laid it on the
    donkey and brought him back. And he came to the city of the old prophet to mourn
    and to bury him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to lament and to bury him.' The Hebrew verb for mourning can specifically
      denote funeral lamentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: lifted up
  alternatives:
  - carried
  - took up
  lexicon: HALOT
  rationale: נשא commonly means 'lift, carry, take up.' 'Lifted up' preserves the
    concrete action before the following transport clauses.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Refers to the prophet in the narrative context, namely the older prophet
    who found the body. The definite article is retained.
- source_word: נִבְלַת
  chosen: the corpse
  alternatives:
  - the body
  - the carcass
  lexicon: HALOT
  rationale: נבלה denotes a dead body/corpse. 'Corpse' is more precise than the softer
    'body' and avoids the animal-oriented sense that 'carcass' can suggest.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the title for a prophet or divinely commissioned
    man; preserving the established biblical expression is both accurate and readable.
- source_word: וַיַּנִּחֵהוּ אֶל הַחֲמוֹר
  chosen: laid it on the donkey
  alternatives:
  - set it on the donkey
  - placed him on the donkey
  lexicon: HALOT
  rationale: The verb from נוח in Hiphil here means to set/place. Although the suffix
    is masculine singular, English naturally uses 'it' with 'corpse'; the phrase describes
    placing the corpse onto the donkey.
- source_word: הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: Modern, natural English equivalent; avoids archaic diction.
- source_word: וַיְשִׁיבֵהוּ
  chosen: brought him back
  alternatives:
  - returned him
  - brought it back
  lexicon: HALOT
  rationale: The Hiphil of שוב means 'cause to return/bring back.' 'Brought him back'
    is idiomatic in English and reflects the personal reference to the deceased man
    of God.
- source_word: וַיָּבֹא אֶל עִיר הַנָּבִיא הַזָּקֵן
  chosen: And he came to the city of the old prophet
  alternatives:
  - and went to the city of the old prophet
  - and came into the old prophet's city
  lexicon: HALOT
  rationale: The construct chain most naturally means 'the city of the old prophet,'
    i.e., the city where he lived. 'Came to' is a straightforward rendering of בוא
    with אל.
- source_word: הַזָּקֵן
  chosen: old
  alternatives:
  - elder
  lexicon: HALOT
  rationale: In context this is an age descriptor distinguishing him from the man
    of God, not an office title.
- source_word: לִסְפֹּד
  chosen: to mourn
  alternatives:
  - to lament
  lexicon: HALOT
  rationale: ספד refers to mourning with lamentation, often in funeral context. 'To
    mourn' is clear modern English; the more specific nuance of lament is possible
    but not required in the main text.
- source_word: וּלְקָבְרוֹ
  chosen: and to bury him
  alternatives:
  - and to inter him
  lexicon: HALOT
  rationale: קבר means 'to bury.' The suffix refers to the man of God. 'Bury' is the
    plain and natural English equivalent.
