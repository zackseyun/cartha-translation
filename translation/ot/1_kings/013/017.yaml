id: 1KI.13.17
reference: 1 Kings 13:17
source:
  edition: WLC
  text: כִּֽי דָבָ֤ר אֵלַ/י֙ בִּ/דְבַ֣ר יְהוָ֔ה לֹֽא תֹאכַ֣ל לֶ֔חֶם וְ/לֹֽא תִשְׁתֶּ֥ה שָׁ֖ם מָ֑יִם לֹא תָשׁ֣וּב לָ/לֶ֔כֶת בַּ/דֶּ֖רֶךְ אֲשֶׁר הָלַ֥כְתָּ בָּֽ/הּ־־־־־׃
translation:
  text: 'For a word came to me by the word of Yahweh: ‘You shall not eat bread, and you shall not drink water there; you shall not return by the way that you came.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'you shall not go back by the same way that you came.' The Hebrew more literally says, 'you shall not return by going on the way by which you went.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the speaker's refusal in the previous verse. 'For' fits the discourse flow better than the more causal 'because' in English narrative dialogue.
- source_word: דָבָר אֵלַי
  chosen: a word came to me
  alternatives:
  - it was said to me
  - a message came to me
  lexicon: HALOT
  rationale: The noun דָבָר can mean 'word' or 'message.' Here the idiom with אֶל marks reception of divine communication. 'A word came to me' preserves the Hebrew idiom and prophetic tone.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - through the word of the LORD
  - by a word from the LORD
  lexicon: HALOT
  rationale: This phrase specifies the means or authority of the communication. 'By the word of the LORD' closely reflects the Hebrew and preserves the repeated דָבָר/wordplay with דָבָר earlier in the clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא תֹאכַל לֶחֶם
  chosen: You shall not eat bread
  alternatives:
  - you must not eat food
  lexicon: HALOT
  rationale: Retains the concrete Hebrew expression 'eat bread' rather than generalizing to 'eat food.' In context it refers to taking a meal, but the literal wording is natural enough in English and preserves the source texture.
- source_word: וְלֹא תִשְׁתֶּה שָׁם מָיִם
  chosen: and you shall not drink water there
  alternatives:
  - nor shall you drink water there
  lexicon: HALOT
  rationale: Directly reflects the prohibition and keeps שָׁם explicit as 'there,' emphasizing the location-specific command.
- source_word: לֹא תָשׁוּב לָלֶכֶת
  chosen: you shall not return by going
  alternatives:
  - you shall not go back
  - you shall not return to go
  lexicon: HALOT
  rationale: The Hebrew combines שׁוּב ('return') with an infinitive of הלך ('to go'). English smooths this awkwardly; 'return by going' preserves the sense that he must not retrace his route while remaining readable.
- source_word: בַּדֶּרֶךְ אֲשֶׁר הָלַכְתָּ בָּהּ
  chosen: on the way by which you went
  alternatives:
  - by the same way that you came
  - on the road you traveled
  lexicon: HALOT
  rationale: A fairly literal rendering of the relative clause. 'By which you went' avoids importing 'came,' though that is the contextual sense from the destination's perspective.
