id: 1KI.13.2
reference: 1 Kings 13:2
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א עַל הַ/מִּזְבֵּ֨חַ֙ בִּ/דְבַ֣ר יְהוָ֔ה וַ/יֹּ֨אמֶר֙ מִזְבֵּ֣חַ מִזְבֵּ֔חַ כֹּ֖ה אָמַ֣ר יְהוָ֑ה הִנֵּֽה בֵ֞ן נוֹלָ֤ד לְ/בֵית דָּוִד֙ יֹאשִׁיָּ֣הוּ שְׁמ֔/וֹ וְ/זָבַ֣ח עָלֶ֗י/ךָ אֶת כֹּהֲנֵ֤י הַ/בָּמוֹת֙ הַ/מַּקְטִרִ֣ים עָלֶ֔י/ךָ וְ/עַצְמ֥וֹת אָדָ֖ם יִשְׂרְפ֥וּ עָלֶֽי/ךָ־־־־׃
translation:
  text: 'And he cried out against the altar by the word of Yahweh and said, “Altar, altar, thus says Yahweh: Behold, a son will be born to the house of David, Josiah by name, and he will sacrifice on you the priests of the high places who burn incense on you, and human bones will be burned on you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the word of the LORD' or 'according to the word of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he will slaughter on you.' The Hebrew verb is sacrificial in tone, which may intentionally underscore the desecration of the altar.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'bones of אדם'; here אדם is used generically, hence 'human bones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא עַל
  chosen: cried out against
  alternatives:
  - proclaimed against
  - called out against
  lexicon: HALOT
  rationale: קרא with עַל in prophetic contexts commonly conveys a loud proclamation directed against someone or something, not merely speaking to it. 'Cried out against' preserves both the force and the adversative sense.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מזבח. The direct address that follows confirms the altar is personified rhetorically, but the noun itself remains 'altar.'
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - at the word of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: This phrase indicates prophetic authorization or agency. 'By the word of the LORD' is idiomatic and preserves the sense that the action is performed under divine commission.
- source_word: מִזְבֵּחַ מִזְבֵּחַ
  chosen: Altar, altar
  lexicon: HALOT
  rationale: The repetition is retained to preserve the prophetic vocative force and solemnity.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says the LORD' is both accurate and recognizable in English.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Behold' preserves the elevated, attention-directing force better than flatter alternatives.
- source_word: בֵן נוֹלָד לְבֵית דָּוִד
  chosen: a son will be born to the house of David
  alternatives:
  - a son is to be born to the house of David
  lexicon: HALOT
  rationale: Though נולד is formally a passive participle, in prophetic announcement it naturally points to a future event. 'Will be born' gives clear English sense without over-literal awkwardness.
- source_word: יֹאשִׁיָּהוּ שְׁמוֹ
  chosen: Josiah by name
  alternatives:
  - his name will be Josiah
  - Josiah is his name
  lexicon: HALOT
  rationale: The Hebrew appositional naming formula is concise. 'Josiah by name' is natural English and preserves the prophetic specificity.
- source_word: וְזָבַח עָלֶיךָ
  chosen: he will sacrifice on you
  alternatives:
  - he will slaughter on you
  lexicon: HALOT
  rationale: זבח can denote slaughtering for sacrifice. Because the object is the priests and the location is the altar, 'sacrifice on you' preserves the cultic irony and horror of the act. 'Slaughter' is possible but loses the deliberate sacrificial register.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  chosen: the priests of the high places
  alternatives:
  - the high-place priests
  lexicon: HALOT
  rationale: במות refers to local cult sites. 'High places' is the established and accurate rendering in Kings.
- source_word: הַמַּקְטִרִים עָלֶיךָ
  chosen: who burn incense on you
  alternatives:
  - who make offerings smoke on you
  - who offer incense on you
  lexicon: HALOT
  rationale: קטר in the Hiphil commonly refers to making sacrificial smoke rise, often by burning incense or offerings. Given altar context and common English usage, 'burn incense on you' is clear, though broader sacrificial smoke is possible.
- source_word: וְעַצְמוֹת אָדָם
  chosen: human bones
  alternatives:
  - the bones of man
  - human remains
  lexicon: HALOT
  rationale: אָדָם here is generic, referring to human beings rather than a male individual. Per doctrine, gender-accurate context favors 'human' rather than 'man' in English.
- source_word: יִשְׂרְפוּ עָלֶיךָ
  chosen: will be burned on you
  alternatives:
  - they will burn on you
  - they will burn upon you
  lexicon: HALOT
  rationale: The verb is 3mp with an unspecified subject; English passive best captures the sense naturally in context, focusing on the fate of the bones rather than an unnamed agent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
