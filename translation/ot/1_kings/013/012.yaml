id: 1KI.13.12
reference: 1 Kings 13:12
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר אֲלֵ/הֶם֙ אֲבִי/הֶ֔ם אֵֽי זֶ֥ה הַ/דֶּ֖רֶךְ הָלָ֑ךְ וַ/יִּרְא֣וּ
    בָנָ֗י/ו אֶת הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֤ר הָלַךְ֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים אֲשֶׁר בָּ֖א מִ/יהוּדָֽה־־־׃
translation:
  text: And their father said to them, “Which way did he go?” Now his sons had seen
    the way that the man of God, who came from Judah, had gone.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Though the verb is literally 'spoke,' idiomatic English in direct discourse
    is 'said.' This preserves the narrative function without unnecessary stiffness.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - his father
  lexicon: HALOT
  rationale: The pronominal suffix is 3mp ('their'), referring to the sons just mentioned
    in context. 'Their father' is the natural and contextually precise rendering.
- source_word: אֵי זֶה
  chosen: Which
  alternatives:
  - Where
  - Which of these
  lexicon: HALOT
  rationale: The interrogative phrase asks for identification of a route, not merely
    location. 'Which' best fits the following 'way/path' in English.
- source_word: הַדֶּרֶךְ
  chosen: way
  alternatives:
  - road
  - path
  lexicon: HALOT
  rationale: '''Way'' is a natural rendering here for a route taken. It also works
    smoothly in both occurrences in the verse.'
- source_word: הָלָךְ
  chosen: did he go / had gone
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: The same Hebrew verb occurs twice. In the father's question, English
    idiom prefers 'did he go'; in the relative clause, past perfect 'had gone' clarifies
    sequence in English. This is a documented contextual variation of the same lexeme.
- source_word: וַיִּרְאוּ
  chosen: had seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Although formally a simple past, English past perfect better conveys
    that the sons' seeing preceded the father's question.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - the sons
  lexicon: HALOT
  rationale: The suffix is singular ('his'), referring to the father. 'His sons' preserves
    the relationship explicitly.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew expression and should be preserved rather
    than interpreted more narrowly as 'prophet.'
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - out of Judah
  lexicon: HALOT
  rationale: '''From Judah'' is the most natural modern English rendering of the place
    of origin.'
