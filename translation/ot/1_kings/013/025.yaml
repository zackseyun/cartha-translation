id: 1KI.13.25
reference: 1 Kings 13:25
source:
  edition: WLC
  text: וְ/הִנֵּ֧ה אֲנָשִׁ֣ים עֹבְרִ֗ים וַ/יִּרְא֤וּ אֶת הַ/נְּבֵלָה֙ מֻשְׁלֶ֣כֶת
    בַּ/דֶּ֔רֶךְ וְ/אֶת הָ֣/אַרְיֵ֔ה עֹמֵ֖ד אֵ֣צֶל הַ/נְּבֵלָ֑ה וַ/יָּבֹ֨אוּ֙ וַ/יְדַבְּר֣וּ
    בָ/עִ֔יר אֲשֶׁ֛ר הַ/נָּבִ֥יא הַ/זָּקֵ֖ן יֹשֵׁ֥ב בָּֽ/הּ־־׃
translation:
  text: And behold, men were passing by and saw the corpse thrown on the road, and
    the lion standing beside the corpse; and they came and reported it in the city
    where the old prophet lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke of it in the city.' The Hebrew verb is simply 'spoke,' but in
      context it refers to reporting the incident.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the narrative attention-marker and suddenness of the Hebrew rather
    than omitting it. 'Behold' is slightly formal but still clear and preserves the
    discourse force.
- source_word: אֲנָשִׁים עֹבְרִים
  chosen: men were passing by
  alternatives:
  - people were passing by
  - some men passed by
  lexicon: HALOT
  rationale: אֲנָשִׁים is grammatically masculine plural and naturally rendered 'men'
    under the gender-accurate policy. The participle עֹבְרִים conveys ongoing action,
    hence 'were passing by' rather than simple past.
- source_word: וַיִּרְאוּ
  chosen: and saw
  alternatives:
  - and they saw
  - and noticed
  lexicon: HALOT
  rationale: Simple narrative preterite; 'saw' is the plain sense.
- source_word: הַנְּבֵלָה
  chosen: the corpse
  alternatives:
  - the carcass
  - the dead body
  lexicon: HALOT
  rationale: In context of a human death, 'corpse' is more precise than 'carcass'
    and more concise than 'dead body.'
- source_word: מֻשְׁלֶכֶת
  chosen: thrown
  alternatives:
  - cast
  - lying
  lexicon: HALOT
  rationale: The passive participle from שלך indicates being thrown/cast down. 'Thrown'
    preserves the force better than the weaker 'lying.'
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - in the road
  - on the way
  lexicon: HALOT
  rationale: Concrete spatial sense fits the scene. 'Road' is natural modern English
    for דֶּרֶךְ here.
- source_word: הָאַרְיֵה עֹמֵד אֵצֶל הַנְּבֵלָה
  chosen: the lion standing beside the corpse
  alternatives:
  - the lion standing next to the corpse
  - the lion standing by the corpse
  lexicon: HALOT
  rationale: עֹמֵד plus אֵצֶל describes position; 'standing beside' is natural and
    vivid.
- source_word: וַיָּבֹאוּ
  chosen: and they came
  alternatives:
  - then they came
  - and they went
  lexicon: HALOT
  rationale: Standard narrative movement verb. In context it introduces their arrival
    at the city to report what they saw.
- source_word: וַיְדַבְּרוּ בָעִיר
  chosen: and reported it in the city
  alternatives:
  - and spoke of it in the city
  - and told it in the city
  lexicon: HALOT
  rationale: דבר can mean 'speak,' but in this context it refers to relaying news.
    'Reported it' makes the implied object explicit in idiomatic English without adding
    foreign content.
- source_word: אֲשֶׁר הַנָּבִיא הַזָּקֵן יֹשֵׁב בָּהּ
  chosen: where the old prophet lived
  alternatives:
  - in which the old prophet was living
  - where the old prophet dwelt
  lexicon: HALOT
  rationale: יֹשֵׁב with בָּהּ denotes residence. 'Lived' is clear modern English;
    'old prophet' preserves the attributive adjective.
