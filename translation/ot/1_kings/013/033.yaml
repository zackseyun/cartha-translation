theological_decisions:
- issue: Whether to render שׁוּב in a moral-religious sense as 'repent'
  chosen_reading: did not turn from his evil way
  alternative_readings:
  - did not repent of his evil way
  rationale: The verse describes moral reversal, but the Hebrew verb itself is 'turn/return.'
    To avoid importing a more developed theological term than the text explicitly
    uses, the main text keeps the concrete metaphor.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to render the priestly installation idiom יְמַלֵּא אֶת יָדוֹ
  chosen_reading: he ordained him
  alternative_readings:
  - he consecrated him
  - he filled his hand
  rationale: The idiom denotes installation into priestly service. 'Ordained' communicates
    the function clearly for modern readers, while the literal expression is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §6, §5
