id: 1KI.13.33
reference: 1 Kings 13:33
source:
  edition: WLC
  text: אַחַר֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה לֹֽא שָׁ֥ב יָרָבְעָ֖ם מִ/דַּרְכּ֣/וֹ הָ/רָעָ֑ה
    וַ֠/יָּשָׁב וַ/יַּ֜עַשׂ מִ/קְצ֤וֹת הָ/עָם֙ כֹּהֲנֵ֣י בָמ֔וֹת הֶֽ/חָפֵץ֙ יְמַלֵּ֣א
    אֶת יָד֔/וֹ וִ/יהִ֖י כֹּהֲנֵ֥י בָמֽוֹת־־׃
translation:
  text: After this event, Jeroboam did not turn from his evil way, but again made
    priests of high places from among all the people. Whoever desired it, he ordained
    him, and he became one of the priests of the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he filled his hand,' a Hebrew idiom for installing or consecrating
      someone to priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדָּבָר הַזֶּה
  chosen: After this event
  alternatives:
  - After this thing
  - After this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this narrative summary,
    'event' communicates the referent naturally in modern English without over-paraphrasing.
- source_word: לֹא שָׁב
  chosen: did not turn
  alternatives:
  - did not return
  - did not repent
  lexicon: HALOT
  rationale: שׁוּב literally means 'turn/return.' Here it governs מִדַּרְכּוֹ הָרָעָה
    ('from his evil way'), so 'did not turn' best preserves the idiom. 'Repent' is
    interpretive and therefore avoided in the main text.
- source_word: מִדַּרְכּוֹ הָרָעָה
  chosen: from his evil way
  alternatives:
  - from his evil path
  - from his wicked course
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the moral metaphor of 'way' common
    in Hebrew narrative and theology.
- source_word: וַיָּשָׁב
  chosen: again
  alternatives:
  - and he returned
  - and he turned back
  lexicon: HALOT
  rationale: The second שׁוּב here functions idiomatically with the following verb
    to indicate repetition/resumption. Rendering it as 'again' gives the sense in
    natural English.
- source_word: וַיַּעַשׂ מִקְצוֹת הָעָם כֹּהֲנֵי בָמוֹת
  chosen: made priests of high places from among all the people
  alternatives:
  - made some of the people priests of high places
  - appointed priests of high places from the extremities/lowest of the people
  lexicon: HALOT
  rationale: מִקְצוֹת הָעָם is idiomatic and difficult. In context and in light of
    the repeated formula in Kings, it refers broadly to people taken from the populace
    without proper restriction. 'From among all the people' captures that he appointed
    them indiscriminately. A more literal 'from the ends of the people' would be obscure
    in English.
- source_word: כֹּהֲנֵי בָמוֹת
  chosen: priests of high places
  alternatives:
  - priests for the high places
  lexicon: HALOT
  rationale: בָּמוֹת refers to illicit local shrines/high places in this context.
    The genitival rendering is straightforward and idiomatic.
- source_word: הֶחָפֵץ
  chosen: Whoever desired it
  alternatives:
  - Whoever wished
  - Anyone who wanted
  lexicon: HALOT
  rationale: 'The singular participle with article functions generically: ''the one
    who desires.'' ''Whoever desired it'' preserves the open-ended, indiscriminate
    sense.'
- source_word: יְמַלֵּא אֶת יָדוֹ
  chosen: he ordained him
  alternatives:
  - he filled his hand
  - he consecrated him
  - he installed him
  lexicon: HALOT
  rationale: The idiom 'fill the hand' is used for installation/consecration to priestly
    office. 'Ordained him' is concise and understandable in modern English, while
    a footnote preserves the more literal idiom.
- source_word: וִיהִי כֹּהֲנֵי בָמוֹת
  chosen: and he became one of the priests of the high places
  alternatives:
  - and he became a priest of the high places
  lexicon: HALOT
  rationale: The Hebrew has a plural predicate ('priests of high places') after a
    singular verb, an idiom indicating entry into that class. English requires smoothing;
    'one of the priests' makes the sense explicit.
