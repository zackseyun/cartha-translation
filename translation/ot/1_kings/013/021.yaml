id: 1KI.13.21
reference: 1 Kings 13:21
source:
  edition: WLC
  text: וַ/יִּקְרָ֞א אֶל אִ֣ישׁ הָ/אֱלֹהִ֗ים אֲשֶׁר בָּ֤א מִֽ/יהוּדָה֙ לֵ/אמֹ֔ר כֹּ֖ה
    אָמַ֣ר יְהוָ֑ה יַ֗עַן כִּ֤י מָרִ֨יתָ֙ פִּ֣י יְהוָ֔ה וְ/לֹ֤א שָׁמַ֨רְתָּ֙ אֶת הַ/מִּצְוָ֔ה
    אֲשֶׁ֥ר צִוְּ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ־־־׃
translation:
  text: 'And he cried out to the man of God who had come from Judah, saying, “Thus
    says the LORD: Because you have rebelled against the word of the LORD and have
    not kept the command that the LORD your God commanded you,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you have rebelled against the mouth of the LORD,' an idiom meaning
      against what the LORD spoke.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he cried out
  alternatives:
  - he called
  - he proclaimed
  lexicon: HALOT
  rationale: קרא can mean call, proclaim, or cry out. In this prophetic denunciation
    context, the speech is forceful and public-sounding, so 'cried out' best captures
    the intensity without overparaphrasing.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title and should be preserved literally. 'Prophet
    of God' is interpretive and less textually transparent.
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - out of Judah
  lexicon: HALOT
  rationale: Simple geographic source; 'from Judah' is the most natural modern English
    rendering.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the conventional prophetic messenger formula. 'Thus says the
    LORD' is both accurate and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' following
    Jewish reverence tradition and LXX pattern.
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Because indeed
  - Since
  lexicon: HALOT
  rationale: The pair introduces the reason for judgment. 'Because' is concise and
    natural in English.
- source_word: מָרִיתָ
  chosen: you have rebelled
  alternatives:
  - you have been rebellious
  - you have defied
  - you have disobeyed
  lexicon: HALOT
  rationale: מרה denotes rebellion or defiance, stronger than mere failure to obey.
    'You have rebelled' preserves the covenantal seriousness.
- source_word: פִּי יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the mouth of the LORD
  - the command of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' an idiom for what the LORD has spoken.
    'The word of the LORD' is the clearest idiomatic equivalent in English while preserving
    the source sense.
- source_word: שָׁמַרְתָּ
  chosen: have not kept
  alternatives:
  - have not observed
  - have not obeyed
  - have not guarded
  lexicon: HALOT
  rationale: שׁמר with command language commonly means keep/observe. 'Kept' is concise
    and standard in covenantal contexts.
- source_word: הַמִּצְוָה
  chosen: the command
  alternatives:
  - the commandment
  lexicon: HALOT
  rationale: '''Command'' is more readable modern English than ''commandment'' while
    retaining the singular force of the Hebrew.'
- source_word: צִוְּךָ
  chosen: commanded you
  alternatives:
  - gave you
  - charged you
  lexicon: HALOT
  rationale: The verb צוה is straightforwardly 'command.' 'Charged' is possible but
    less direct.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - the LORD God of you
  lexicon: HALOT
  rationale: Standard covenant expression; 'the LORD your God' is the natural and
    accurate English rendering.
