theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the prophetic formula and broader translation consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of מָרִיתָ in relation to covenant obedience
  chosen_reading: you have rebelled
  alternative_readings:
  - you have disobeyed
  - you have defied
  rationale: The Hebrew verb conveys more than simple noncompliance; it signals rebellion
    against divine speech. Rendering it strongly preserves the moral and theological
    weight of the accusation without adding doctrinal interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
