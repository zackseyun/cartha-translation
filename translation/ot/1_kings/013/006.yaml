theological_decisions:
- issue: Reference to YHWH as 'your God' in the king's speech
  chosen_reading: Retain 'the LORD your God' exactly, without softening to 'our God.'
  alternative_readings:
  - the LORD our God
  rationale: The king's wording distances himself from covenant fidelity and recognizes
    the prophet's special standing. Altering to 'our God' would import a theological
    solidarity not expressed in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
