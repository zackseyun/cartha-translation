id: 1KI.13.6
reference: 1 Kings 13:6
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַ/מֶּ֜לֶךְ וַ/יֹּ֣אמֶר אֶל אִ֣ישׁ הָ/אֱלֹהִ֗ים חַל נָ֞א אֶת פְּנֵ֨י
    יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ וְ/הִתְפַּלֵּ֣ל בַּעֲדִ֔/י וְ/תָשֹׁ֥ב יָדִ֖/י אֵלָ֑/י וַ/יְחַ֤ל
    אִישׁ הָֽ/אֱלֹהִים֙ אֶת פְּנֵ֣י יְהוָ֔ה וַ/תָּ֤שָׁב יַד הַ/מֶּ֨לֶךְ֙ אֵלָ֔י/ו
    וַ/תְּהִ֖י כְּ/בָ/רִֽאשֹׁנָֽה׀־־־־־־׃
translation:
  text: Then the king answered and said to the man of God, “Please entreat the favor
    of the LORD your God, and pray for me, that my hand may be restored to me.” So
    the man of God entreated the favor of the LORD, and the king’s hand was restored
    to him and became as it was before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seek the favor of the LORD.' The Hebrew idiom is literally 'entreat
      the face of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַל ... אֶת־פְּנֵי יְהוָה / וַיְחַל ... אֶת־פְּנֵי יְהוָה
  chosen: entreat the favor of the LORD / entreated the favor of the LORD
  alternatives:
  - implore the LORD
  - seek the favor of the LORD
  - appease the LORD
  lexicon: HALOT
  rationale: The idiom חלה את־פני means to seek or entreat someone's favor, not literally
    to 'soften the face.' 'Entreat the favor of' preserves the idiomatic sense while
    remaining transparent to the Hebrew expression. 'Appease' is too strong and may
    imply propitiation beyond the context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: In context Jeroboam addresses the prophet and acknowledges YHWH as the
    prophet's God. Capitalized 'God' is appropriate in English because the referent
    is the God of Israel, not a generic deity.
- source_word: וְהִתְפַּלֵּל בַּעֲדִי
  chosen: and pray for me
  alternatives:
  - and intercede for me
  - and pray on my behalf
  lexicon: HALOT
  rationale: The hitpael of פלל with בעד indicates intercessory prayer. 'Pray for
    me' is natural modern English; 'intercede' is possible but slightly more interpretive
    and formal.
- source_word: וְתָשֹׁב יָדִי אֵלָי
  chosen: that my hand may be restored to me
  alternatives:
  - that my hand may return to me
  - and let my hand come back to me
  lexicon: HALOT
  rationale: The Hebrew literally says 'and my hand may return to me,' referring to
    recovery from the withered/paralyzed condition in the prior verse. 'Be restored
    to me' communicates the idiomatic sense clearly in English while preserving the
    passive-result idea.
- source_word: וַתָּשָׁב יַד־הַמֶּלֶךְ אֵלָיו
  chosen: the king’s hand was restored to him
  alternatives:
  - the king's hand returned to him
  lexicon: HALOT
  rationale: This mirrors the earlier request and keeps the restoration language consistent.
    'Returned to him' is more literal but less idiomatic in English.
- source_word: וַתְּהִי כְּבָרִאשֹׁנָה
  chosen: and became as it was before
  alternatives:
  - and was as at first
  - and became as formerly
  lexicon: HALOT
  rationale: The phrase means restoration to the former condition. 'As it was before'
    is clear, natural English and avoids archaic phrasing.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: The source text uses the title 'man of God,' a standard prophetic designation.
    It should be preserved rather than replaced with the more interpretive 'prophet'.
- source_word: וַיַּעַן ... וַיֹּאמֶר
  chosen: answered and said
  alternatives:
  - said
  - responded
  lexicon: HALOT
  rationale: The Hebrew uses the common narrative pair 'answered and said.' Retaining
    both reflects the source without sounding overly wooden in this context.
