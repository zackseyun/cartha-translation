id: 1KI.13.14
reference: 1 Kings 13:14
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ אַֽחֲרֵי֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים וַ/יִּ֨מְצָאֵ֔/הוּ יֹשֵׁ֖ב תַּ֣חַת
    הָ/אֵלָ֑ה וַ/יֹּ֣אמֶר אֵלָ֗י/ו הַ/אַתָּ֧ה אִישׁ הָ/אֱלֹהִ֛ים אֲשֶׁר בָּ֥אתָ מִֽ/יהוּדָ֖ה
    וַ/יֹּ֥אמֶר אָֽנִי־־׃
translation:
  text: So he went after the man of God and found him sitting under the terebinth
    tree, and he said to him, “Are you the man of God who came from Judah?” And he
    said, “I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “under the oak.” The Hebrew אֵלָה more specifically refers to a terebinth
      tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ אַחֲרֵי
  chosen: went after
  alternatives:
  - went after in pursuit of
  - followed
  lexicon: HALOT
  rationale: The idiom combines הלך with אַחֲרֵי to express going after someone. 'Went
    after' preserves the narrative movement plainly; 'followed' is possible but slightly
    less concrete in this immediate pursuit context.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew title used throughout the passage. 'Man of
    God' is the direct and established rendering and should be kept consistently rather
    than interpreting it as 'prophet of God.'
- source_word: וַיִּמְצָאֵהוּ
  chosen: found him
  alternatives:
  - came upon him
  lexicon: HALOT
  rationale: The verb מצא in narrative commonly means 'find.' 'Found him' is the most
    natural and direct English equivalent.
- source_word: יֹשֵׁב
  chosen: sitting
  alternatives:
  - dwelling
  - remaining seated
  lexicon: HALOT
  rationale: The participle describes his posture at the moment he was found. 'Sitting'
    is the straightforward contextual sense.
- source_word: תַּחַת הָאֵלָה
  chosen: under the terebinth tree
  alternatives:
  - under the oak
  - under the great tree
  lexicon: HALOT
  rationale: אֵלָה most specifically denotes a terebinth. While some English versions
    use 'oak,' the source term is better represented by 'terebinth'; adding 'tree'
    makes the phrase natural in English.
- source_word: הַאַתָּה
  chosen: Are you
  alternatives:
  - Is it you who are
  lexicon: HALOT
  rationale: The interrogative with the pronoun introduces a direct identification
    question. 'Are you' is idiomatic and accurate.
- source_word: אֲשֶׁר בָּאתָ מִיהוּדָה
  chosen: who came from Judah
  alternatives:
  - who came out of Judah
  lexicon: HALOT
  rationale: The relative clause identifies the man by his origin. 'From Judah' is
    natural English for מִן with a place name; 'out of Judah' is possible but less
    smooth here.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - It is I
  - I am he
  lexicon: HALOT
  rationale: The verbless Hebrew reply is simply 'I.' In English dialogue, 'I am'
    best conveys the elliptical affirmative response to the question. 'I am he' is
    more formal and less natural in contemporary English.
