theological_decisions:
- issue: Rendering of אִישׁ הָאֱלֹהִים as a title
  chosen_reading: the man of God
  alternative_readings:
  - the prophet of God
  rationale: The phrase is a recognized title in the Hebrew Bible and should be translated
    directly rather than interpreted through a narrower office term. This preserves
    the source wording without importing additional claims.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
