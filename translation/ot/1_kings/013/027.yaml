id: 1KI.13.27
reference: 1 Kings 13:27
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר אֶל בָּנָי/ו֙ לֵ/אמֹ֔ר חִבְשׁוּ לִ֖/י אֶֽת הַ/חֲמ֑וֹר וַֽ/יַּחֲבֹֽשׁוּ־־־׃
translation:
  text: Then he spoke to his sons, saying, “Saddle the donkey for me.” So they saddled
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “So they saddled the donkey.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then he spoke
  alternatives:
  - And he spoke
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'spoke' reflects דבר
    straightforwardly. 'Then' gives natural English narrative flow; 'said' is possible
    but less directly tied to the verb used.
- source_word: אֶל בָּנָיו
  chosen: to his sons
  alternatives:
  - to his children
  lexicon: HALOT
  rationale: בָּנִים here is masculine plural with 3ms suffix and refers specifically
    to male offspring in the immediate context, so 'sons' is the gender-accurate rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct introducing direct speech is idiomatically rendered
    'saying' in English and preserves the formal structure without awkwardness.
- source_word: חִבְשׁוּ לִי
  chosen: Saddle ... for me
  alternatives:
  - Bind on for me
  - Prepare for me
  lexicon: HALOT
  rationale: חבשׁ with a donkey means to saddle or put the saddle on. 'For me' preserves
    the dative לִי, indicating the action is done for his use/benefit.
- source_word: אֶת הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: חֲמוֹר is the ordinary term for a donkey. 'Ass' is traditional but less
    natural in contemporary English and can distract modern readers.
- source_word: וַיַּחֲבֹשׁוּ
  chosen: So they saddled it
  alternatives:
  - And they saddled the donkey
  - Then they saddled it
  lexicon: HALOT
  rationale: The verb repeats חבשׁ, so 'saddled' should be retained for consistency.
    English naturally uses 'it' rather than repeating 'the donkey,' since the object
    is immediately antecedent.
