id: 1KI.13.10
reference: 1 Kings 13:10
source:
  edition: WLC
  text: וַ/יֵּ֖לֶךְ בְּ/דֶ֣רֶךְ אַחֵ֑ר וְ/לֹֽא שָׁ֣ב בַּ/דֶּ֔רֶךְ אֲשֶׁ֛ר בָּ֥א בָ֖/הּ
    אֶל בֵּֽית אֵֽל־־־׃פ
translation:
  text: So he went by another way and did not return by the way he had come to Bethel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he went' gives natural
    English narrative flow while preserving the sequential sense of the Hebrew verb
    הלך.
- source_word: בְּדֶרֶךְ אַחֵר
  chosen: by another way
  alternatives:
  - on another road
  - by a different route
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, route.' 'By another way' is idiomatic
    and preserves the contrast with the route by which he came.
- source_word: וְלֹא שָׁב
  chosen: and did not return
  alternatives:
  - and he did not go back
  lexicon: HALOT
  rationale: שׁוּב in this context means 'return/go back.' 'Did not return' is concise
    and fits the travel context.
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּא בָהּ
  chosen: by the way he had come
  alternatives:
  - by the road on which he came
  - by the way he came
  lexicon: HALOT
  rationale: The relative clause specifies the original route. English past perfect
    ('had come') clarifies prior action relative to his not returning. The feminine
    pronominal suffix in בָהּ refers back to דֶּרֶךְ and is naturally absorbed in
    English.
- source_word: אֶל בֵּית אֵל
  chosen: to Bethel
  alternatives:
  - to Beth-el
  lexicon: HALOT
  rationale: בֵּית אֵל is the place name Bethel, which should be transliterated as
    a proper name per the translation philosophy. 'To Bethel' reflects the destination
    of his earlier coming.
