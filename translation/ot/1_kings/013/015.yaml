id: 1KI.13.15
reference: 1 Kings 13:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֔י/ו לֵ֥ךְ אִתִּ֖/י הַ/בָּ֑יְתָ/ה וֶ/אֱכֹ֖ל לָֽחֶם׃
translation:
  text: Then he said to him, “Come home with me and eat bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go with me to the house and eat food/a meal.' Hebrew 'bread' can function
      more broadly for food, and 'go' is the more literal verb, though English idiom
      in an invitation often uses 'come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    modern English while preserving the sequential force of the Hebrew wayyiqtol.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard rendering of the preposition plus 3ms suffix, indicating the
    indirect object of speech.
- source_word: לֵךְ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Although the verb literally means 'go/walk,' English idiom from the speaker's
    perspective is 'come with me.' This is a common optimal-equivalence adjustment
    that preserves the invitation's sense.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Direct rendering of the preposition with 1cs suffix.
- source_word: הַבָּיְתָה
  chosen: home
  alternatives:
  - to the house
  - to my house
  lexicon: HALOT
  rationale: The directional he on 'house' yields 'homeward/to the house.' In this
    invitation context, 'home' is the most natural English equivalent. 'To my house'
    is implied by 'with me' but not explicitly stated in the noun itself, so it is
    not added to the main text.
- source_word: וֶאֱכֹל
  chosen: and eat
  alternatives:
  - and have a meal
  lexicon: HALOT
  rationale: Straightforward imperative/jussive-like invitation following the first
    imperative. 'Eat' preserves the verbal simplicity of the Hebrew.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  - a meal
  lexicon: HALOT
  rationale: Hebrew 'bread' can metonymically refer to food or a meal, but the base
    term is 'bread.' Retaining 'bread' preserves the Hebrew wording while remaining
    idiomatic in the invitation 'eat bread.'
