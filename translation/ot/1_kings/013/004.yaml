id: 1KI.13.4
reference: 1 Kings 13:4
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ הַ/מֶּ֜לֶךְ אֶת דְּבַ֣ר אִישׁ הָ/אֱלֹהִ֗ים אֲשֶׁ֨ר קָרָ֤א
    עַל הַ/מִּזְבֵּ֨חַ֙ בְּ/בֵֽית אֵ֔ל וַ/יִּשְׁלַ֨ח יָרָבְעָ֧ם אֶת יָד֛/וֹ מֵ/עַ֥ל
    הַ/מִּזְבֵּ֖חַ לֵ/אמֹ֣ר תִּפְשֻׂ֑/הוּ וַ/תִּיבַ֤שׁ יָד/וֹ֙ אֲשֶׁ֣ר שָׁלַ֣ח עָלָ֔י/ו
    וְ/לֹ֥א יָכֹ֖ל לַ/הֲשִׁיבָ֥/הּ אֵלָֽי/ו־־־־־׀׃
translation:
  text: And when the king heard the word of the man of God, who cried out against
    the altar at Bethel, Jeroboam stretched out his hand from the altar, saying, “Seize
    him!” But his hand, which he stretched out against him, dried up, and he could
    not draw it back to himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “withered.” Hebrew: “dried up.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the saying
  lexicon: HALOT
  rationale: דבר commonly means 'word, matter, message.' 'The word' preserves the
    concrete singular expression and fits prophetic speech idiom without unnecessary
    paraphrase.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title. 'Man of God' preserves the source expression
    more closely than the interpretive 'prophet of God.'
- source_word: קָרָא עַל
  chosen: cried out against
  alternatives:
  - proclaimed against
  - called out against
  lexicon: HALOT
  rationale: In this context of prophetic denunciation directed at the altar, 'cried
    out against' captures both the vocal force of קרא and the adversative sense of
    על.
- source_word: בְּבֵית אֵל
  chosen: at Bethel
  alternatives:
  - in Bethel
  - at Beth-el
  lexicon: HALOT
  rationale: With the altar as the immediate referent, English idiom prefers 'at Bethel.'
    The place name is transliterated by standard convention.
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ מֵעַל הַמִּזְבֵּחַ
  chosen: stretched out his hand from the altar
  alternatives:
  - put out his hand from the altar
  - sent out his hand from the altar
  lexicon: HALOT
  rationale: שׁלח יד is an idiom for extending the hand, often in hostile action.
    'Stretched out his hand' is natural English and preserves the gesture. 'From the
    altar' reflects מֵעַל הַמִּזְבֵּחַ, indicating his position at or over it.
- source_word: תִּפְשֻׂהוּ
  chosen: Seize him!
  alternatives:
  - Arrest him!
  - Take hold of him!
  lexicon: HALOT
  rationale: The plural imperative addresses attendants. 'Seize him!' is direct and
    forceful, matching the king's command without importing modern legal nuance.
- source_word: וַתִּיבַשׁ יָדוֹ
  chosen: his hand ... dried up
  alternatives:
  - his hand withered
  - his hand shriveled
  lexicon: HALOT
  rationale: יבש literally means 'be dry.' 'Dried up' preserves the lexical image;
    'withered' is possible but slightly more interpretive. The result is clearly a
    sudden disabling judgment.
- source_word: אֲשֶׁר שָׁלַח עָלָיו
  chosen: which he stretched out against him
  alternatives:
  - which he sent against him
  - that he had extended toward him
  lexicon: HALOT
  rationale: This relative clause identifies the specific hand and repeats the hostile
    gesture. 'Against him' best reflects על in context of aggression toward the man
    of God.
- source_word: לַהֲשִׁיבָהּ אֵלָיו
  chosen: draw it back to himself
  alternatives:
  - bring it back to himself
  - return it to himself
  lexicon: HALOT
  rationale: The hiphil of שוב means 'cause to return.' In idiomatic English for a
    hand rendered immobile, 'draw it back to himself' communicates the physical inability
    clearly while staying close to the Hebrew sense.
