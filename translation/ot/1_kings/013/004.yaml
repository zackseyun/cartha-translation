theological_decisions:
- issue: Nature of the judgment on Jeroboam's hand
  chosen_reading: Render the physical effect straightforwardly as a sudden disabling
    drying up of the hand, without specifying a medical diagnosis or softening the
    miraculous judgment.
  alternative_readings:
  - Translate more interpretively as 'withered' to echo traditional English renderings.
  rationale: The narrative presents an immediate divine judgment in response to Jeroboam's
    hostile command. A plain rendering preserves the event's force without adding
    explanatory theology beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
