id: 1KI.13.3
reference: 1 Kings 13:3
source:
  edition: WLC
  text: וְ/נָתַן֩ בַּ/יּ֨וֹם הַ/ה֤וּא מוֹפֵת֙ לֵ/אמֹ֔ר זֶ֣ה הַ/מּוֹפֵ֔ת אֲשֶׁ֖ר דִּבֶּ֣ר יְהוָ֑ה הִנֵּ֤ה הַ/מִּזְבֵּ֨חַ֙ נִקְרָ֔ע וְ/נִשְׁפַּ֖ךְ הַ/דֶּ֥שֶׁן אֲשֶׁר עָלָֽי/ו־׃
translation:
  text: 'And on that day he gave a sign, saying, “This is the sign that Yahweh has spoken: behold, the altar will be torn apart, and the ashes that are on it will be poured out.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “wonder” or “portent” for “sign” (Hebrew מוֹפֵת).
    reason: lexical_alternative
  - marker: b
    text: “Ashes” translates a Hebrew term that can refer more specifically to the fatty ashes/remains from sacrifices.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַן
  chosen: he gave
  alternatives:
  - he set
  - he provided
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set.' In this idiom with מוֹפֵת, 'gave a sign' is natural English and preserves the sense that the man of God furnished an authenticating token.
- source_word: מוֹפֵת
  chosen: sign
  alternatives:
  - wonder
  - portent
  lexicon: HALOT
  rationale: מוֹפֵת can denote a sign, wonder, or portent. Here it functions as an immediate validating token for the prophetic word, so 'sign' best fits the context without overstating the miraculous aspect.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech; 'saying' is idiomatic in English narrative.
- source_word: זֶה הַמּוֹפֵת
  chosen: This is the sign
  alternatives:
  - This is the portent
  - This is the token
  lexicon: HALOT
  rationale: Keeps the demonstrative emphasis and repeats the same English gloss for מוֹפֵת for consistency within the verse.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD has spoken
  alternatives:
  - the LORD spoke
  - the LORD declared
  lexicon: HALOT
  rationale: English present perfect works well in this formula to indicate a word already uttered whose confirming sign is now being identified. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. Though somewhat elevated, it remains readable and signals the immediacy of the announced sign.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward rendering of the cultic object in view.
- source_word: נִקְרָע
  chosen: will be torn apart
  alternatives:
  - will be split
  - is torn apart
  lexicon: HALOT
  rationale: The Niphal conveys a passive/resultative sense. In context the sign is predictive, so future English is appropriate. 'Torn apart' reflects the force of קרע more vividly than the milder 'split.'
- source_word: וְנִשְׁפַּךְ
  chosen: will be poured out
  alternatives:
  - will be spilled
  - will be emptied out
  lexicon: HALOT
  rationale: The Niphal of שׁפך means 'be poured out/spilled.' 'Poured out' is the most neutral and idiomatic choice for the ashes falling from the altar.
- source_word: הַדֶּשֶׁן
  chosen: the ashes
  alternatives:
  - the fat ashes
  - the ash
  lexicon: HALOT
  rationale: In sacrificial context דֶּשֶׁן refers to the fatty ashes/remains from offerings. 'Ashes' is the clearest natural English rendering; the more technical nuance can be preserved in a footnote.
- source_word: אֲשֶׁר עָלָיו
  chosen: that are on it
  alternatives:
  - which is upon it
  - on top of it
  lexicon: HALOT
  rationale: Natural relative clause referring to the ashes resting on the altar. Plural agreement in English follows 'ashes.'
