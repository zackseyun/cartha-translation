id: 1KI.13.28
reference: 1 Kings 13:28
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ וַ/יִּמְצָ֤א אֶת נִבְלָת/וֹ֙ מֻשְׁלֶ֣כֶת בַּ/דֶּ֔רֶךְ וַֽ/חֲמוֹר֙
    וְ/הָ֣/אַרְיֵ֔ה עֹמְדִ֖ים אֵ֣צֶל הַ/נְּבֵלָ֑ה לֹֽא אָכַ֤ל הָֽ/אַרְיֵה֙ אֶת הַ/נְּבֵלָ֔ה
    וְ/לֹ֥א שָׁבַ֖ר אֶֽת הַ/חֲמֽוֹר־־־־׃
translation:
  text: He went and found his corpse thrown on the road, with the donkey and the lion
    standing beside the corpse. The lion had not eaten the corpse, nor had it torn
    apart the donkey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'body' or 'carcass' for 'corpse' (Hebrew נְבֵלָה); the Hebrew term is
      stark and emphasizes the reality of death.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'had not broken the donkey'; the sense in context is that
      the lion had not torn it apart or mauled it.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלָתוֹ / הַנְּבֵלָה
  chosen: corpse
  alternatives:
  - body
  - carcass
  lexicon: HALOT
  rationale: נְבֵלָה denotes a dead body/carcass. 'Corpse' fits a human referent naturally
    in English while preserving the starkness of the Hebrew. 'Carcass' is possible
    but sounds more animal-oriented in contemporary English; 'body' is less vivid.
- source_word: מֻשְׁלֶכֶת
  chosen: thrown
  alternatives:
  - cast
  - lying
  lexicon: HALOT
  rationale: Passive participle from שלך, indicating that the corpse had been cast/thrown
    down. 'Thrown' preserves the force better than the weaker 'lying.' 'Cast' is possible
    but less natural in modern English.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - in the road
  - by the road
  - on the way
  lexicon: HALOT
  rationale: דֶּרֶךְ here refers to the roadway itself. 'On the road' is the most
    idiomatic and contextually precise rendering.
- source_word: עֹמְדִים אֵצֶל
  chosen: standing beside
  alternatives:
  - standing by
  - standing next to
  lexicon: HALOT
  rationale: The participle plus preposition depicts the donkey and lion remaining
    positioned near the corpse. 'Standing beside' is natural English and preserves
    the visual detail.
- source_word: לֹא אָכַל
  chosen: had not eaten
  alternatives:
  - did not eat
  - had not devoured
  lexicon: HALOT
  rationale: אָכַל is the ordinary verb 'eat.' English past perfect fits the narrative
    result being observed when he arrived. 'Devoured' would over-interpret the lexical
    force.
- source_word: שָׁבַר אֶת הַחֲמוֹר
  chosen: had it torn apart the donkey
  alternatives:
  - had broken the donkey
  - had mauled the donkey
  - had attacked the donkey
  lexicon: HALOT
  rationale: שׁבר literally means 'break,' but with an animal as object in this context
    it idiomatically conveys breaking/crushing/tearing apart. 'Torn apart' communicates
    the likely sense in readable English without flattening the vividness. 'Broken
    the donkey' is too wooden in English; 'mauled' or 'attacked' are interpretive
    but less directly tied to the Hebrew image of breaking.
- source_word: וַיֵּלֶךְ וַיִּמְצָא
  chosen: He went and found
  alternatives:
  - He went and discovered
  - He went and saw
  lexicon: HALOT
  rationale: The sequential wayyiqtol verbs are straightforward narrative progression.
    'Went and found' preserves the Hebrew flow without unnecessary embellishment.
