id: 1KI.13.1
reference: 1 Kings 13:1
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה אִ֣ישׁ אֱלֹהִ֗ים בָּ֧א מִ/יהוּדָ֛ה בִּ/דְבַ֥ר יְהוָ֖ה אֶל בֵּֽית אֵ֑ל וְ/יָרָבְעָ֛ם עֹמֵ֥ד עַל הַ/מִּזְבֵּ֖חַ לְ/הַקְטִֽיר׀־־־׃
translation:
  text: And behold, a man of God came from Judah to Bethel by the word of Yahweh, while Jeroboam was standing by the altar to burn incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the word of the LORD' or 'according to the word of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and Jeroboam was standing at the altar.' The Hebrew conjunction can be read simply as 'and,' and 'by the altar' may also be rendered 'at the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Now behold
  - And look
  lexicon: HALOT
  rationale: Retains the discourse-marking and attention-directing force of הִנֵּה. 'Behold' is slightly elevated but still natural enough here and preserves the narrative vividness better than omitting it.
- source_word: אִישׁ אֱלֹהִים
  chosen: a man of God
  alternatives:
  - a prophet
  - a divine man
  lexicon: HALOT
  rationale: This is a recognized Hebrew expression for a messenger/prophet of God, but the text itself says 'man of God,' so the more literal rendering is preferred over the interpretive 'prophet.'
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple past narrative rendering of the qatal verb; 'came' is the most direct and idiomatic choice.
- source_word: מִיהוּדָה
  chosen: from Judah
  lexicon: HALOT
  rationale: Straightforward geographic source; 'Judah' is the standard English transliteration of the place name.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - at the word of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: 'The preposition plus דָּבָר here indicates agency/authorization: his coming was in response to and under the commission of YHWH''s word. ''By the word of the LORD'' is concise and idiomatic. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving the conventional small-caps covenantal rendering in English.
- source_word: אֶל בֵּית אֵל
  chosen: to Bethel
  alternatives:
  - to Beth-el
  lexicon: HALOT
  rationale: Standard English place-name form. The preposition אֶל is naturally rendered 'to' with a destination.
- source_word: וְיָרָבְעָם
  chosen: while Jeroboam
  alternatives:
  - and Jeroboam
  lexicon: HALOT
  rationale: Although waw can be rendered simply 'and,' English style and the clause relationship favor 'while' to show the simultaneous circumstance introduced by the following participle.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle conveys ongoing action/backgrounded circumstance in the narrative, best represented by the English past progressive.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: by the altar
  alternatives:
  - at the altar
  - upon the altar
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with עמד and altar in this ritual context it can denote position at or by the altar rather than literally on top of it. 'By the altar' avoids an implausibly wooden sense while preserving proximity.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - to make an offering by fire
  - to offer incense
  lexicon: HALOT
  rationale: In cultic contexts this verb commonly refers to turning an offering into smoke, and here the setting in Jeroboam's illicit worship strongly supports the specific sense 'burn incense.' This is more precise than the broader 'make an offering by fire.'
