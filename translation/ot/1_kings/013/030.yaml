id: 1KI.13.30
reference: 1 Kings 13:30
source:
  edition: WLC
  text: וַ/יַּנַּ֥ח אֶת נִבְלָת֖/וֹ בְּ/קִבְר֑/וֹ וַ/יִּסְפְּד֥וּ עָלָ֖י/ו ה֥וֹי אָחִֽ/י־׃
translation:
  text: And he laid his corpse in his own tomb, and they mourned over him, saying,
    “Alas, my brother!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they lamented over him.” The Hebrew verb refers to mourning for the
      dead, often in a formal lament.
    reason: lexical_alternative
  - marker: b
    text: “My brother” is likely a lament formula expressing kinship or solidarity,
      not necessarily a statement of biological relation.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּנַּח
  chosen: laid
  alternatives:
  - placed
  - set down
  lexicon: HALOT
  rationale: The verb from נוח in the Hiphil here means to place or lay something
    down. 'Laid' is natural English and fits burial context without over-paraphrasing.
- source_word: נִבְלָתוֹ
  chosen: his corpse
  alternatives:
  - his body
  - his carcass
  lexicon: HALOT
  rationale: נְבֵלָה commonly denotes a dead body/corpse, often with a stark or lifeless
    sense. 'Corpse' preserves that force better than the softer 'body,' while avoiding
    the harsher English connotations of 'carcass' for a human.
- source_word: בְּקִבְרוֹ
  chosen: in his own tomb
  alternatives:
  - in his grave
  - in his tomb
  lexicon: HALOT
  rationale: קֶבֶר can mean grave or tomb. 'Tomb' fits the burial setting well, and
    'his own' makes explicit the possessive suffix, indicating the old prophet's own
    burial place.
- source_word: וַיִּסְפְּדוּ
  chosen: they mourned
  alternatives:
  - they lamented
  - they wailed
  lexicon: HALOT
  rationale: The verb ספד refers to mourning/lamenting for the dead, often in formal
    lament. 'Mourned' is clear modern English; the direct speech that follows supplies
    the lament content.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - for him
  - concerning him
  lexicon: HALOT
  rationale: The preposition עַל with ספד commonly yields 'mourn over' or 'lament
    over' someone. 'Over him' is idiomatic and close to the Hebrew.
- source_word: הוֹי
  chosen: Alas
  alternatives:
  - Ah
  - Woe
  lexicon: HALOT
  rationale: הוֹי is an interjection of lament. 'Alas' best conveys funeral grief
    in contemporary literary English without importing prophetic judgment nuance that
    'Woe' can carry.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - my kinsman
  lexicon: HALOT
  rationale: אָח literally means 'brother,' and in this context functions as a term
    of solidarity and affection in lament. 'My brother' preserves the familial language
    and emotional force.
