id: 1KI.13.23
reference: 1 Kings 13:23
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵ֛י אָכְל֥/וֹ לֶ֖חֶם וְ/אַחֲרֵ֣י שְׁתוֹת֑/וֹ וַ/יַּחֲבָשׁ ל֣/וֹ
    הַ/חֲמ֔וֹר לַ/נָּבִ֖יא אֲשֶׁ֥ר הֱשִׁיבֽ/וֹ־׃
translation:
  text: And it happened, after he had eaten bread and after he had drunk, that he
    saddled the donkey for him—for the prophet whom he had brought back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whom he had caused to return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew discourse marker without archaic English.
- source_word: אַחֲרֵי אָכְלוֹ לֶחֶם
  chosen: after he had eaten bread
  alternatives:
  - after he had eaten
  - after eating bread
  lexicon: HALOT
  rationale: אַחֲרֵי with infinitive construct plus suffix marks temporal sequence.
    'Eaten bread' is retained rather than reduced to simply 'eaten' because לֶחֶם
    is explicit in the Hebrew and often idiomatic for taking a meal.
- source_word: וְאַחֲרֵי שְׁתוֹתוֹ
  chosen: and after he had drunk
  alternatives:
  - and after drinking
  - and after he had had something to drink
  lexicon: HALOT
  rationale: Parallel temporal clause to the previous phrase. The object is unstated
    in Hebrew, so English should not supply 'water' or 'wine'.
- source_word: וַיַּחֲבָשׁ
  chosen: he saddled
  alternatives:
  - he bound on
  - he prepared
  lexicon: HALOT
  rationale: חבש in this context refers to saddling an animal. 'Saddled' is the natural
    and precise English equivalent.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here is best rendered 'for him,'
    indicating the donkey was saddled for the other man's use rather than merely 'to
    him.'
- source_word: הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: Standard modern English rendering for חמור. 'Ass' is avoided as archaic
    and potentially distracting.
- source_word: לַנָּבִיא
  chosen: for the prophet
  alternatives:
  - for the man of God
  lexicon: HALOT
  rationale: The Hebrew here specifically says 'the prophet,' not 'the man of God.'
    The translation should reflect the actual noun used in this clause.
- source_word: אֲשֶׁר הֱשִׁיבוֹ
  chosen: whom he had brought back
  alternatives:
  - whom he had turned back
  - whom he had caused to return
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return or bring back. 'Brought back'
    is idiomatic and fits the narrative context of the older prophet having persuaded
    the man to return.
