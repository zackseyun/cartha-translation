id: 1KI.13.24
reference: 1 Kings 13:24
source:
  edition: WLC
  text: וַ/יֵּ֕לֶךְ וַ/יִּמְצָאֵ֧/הוּ אַרְיֵ֛ה בַּ/דֶּ֖רֶךְ וַ/יְמִיתֵ֑/הוּ וַ/תְּהִ֤י
    נִבְלָת/וֹ֙ מֻשְׁלֶ֣כֶת בַּ/דֶּ֔רֶךְ וְ/הַ/חֲמוֹר֙ עֹמֵ֣ד אֶצְלָ֔/הּ וְ/הָ֣/אַרְיֵ֔ה
    עֹמֵ֖ד אֵ֥צֶל הַ/נְּבֵלָֽה׃
translation:
  text: And he went, and a lion found him on the road and killed him. And his corpse
    was thrown on the road, and the donkey was standing beside it, and the lion was
    standing beside the corpse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his dead body was lying thrown on the road'; the Hebrew passive participle
      emphasizes that the body had been cast down there rather than merely lying there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: And he went
  alternatives:
  - Then he went
  - So he went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he went' preserves the
    Hebrew sequence without overinterpreting the connective.
- source_word: וַיִּמְצָאֵהוּ
  chosen: found him
  alternatives:
  - met him
  - came upon him
  lexicon: HALOT
  rationale: מצא commonly means 'find.' 'Found him' is the most direct rendering and
    fits the sudden encounter in narrative.
- source_word: אַרְיֵה
  chosen: a lion
  lexicon: HALOT
  rationale: Indefinite in sense here on first mention in the clause; standard rendering
    of the animal term.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - on the way
  - in the road
  lexicon: HALOT
  rationale: '''Road'' is a natural modern English rendering of דרך in this travel
    context. Repeated consistently in the verse.'
- source_word: וַיְמִיתֵהוּ
  chosen: killed him
  alternatives:
  - put him to death
  lexicon: HALOT
  rationale: The hiphil of מות here denotes causing death. 'Killed him' is the plain,
    idiomatic English equivalent.
- source_word: נִבְלָתוֹ
  chosen: his corpse
  alternatives:
  - his carcass
  - his dead body
  lexicon: HALOT
  rationale: נבלה refers to a dead body/corpse. 'Corpse' is clear and suitably grave
    without sounding overly technical or animal-specific like 'carcass.'
- source_word: מֻשְׁלֶכֶת
  chosen: was thrown
  alternatives:
  - was cast
  - was lying thrown
  - was left thrown down
  lexicon: HALOT
  rationale: The hophal/passive participial form from שלך conveys being thrown or
    cast down. 'Was thrown' preserves the passive force better than simply 'lay,'
    while remaining readable.
- source_word: וְהַחֲמוֹר עֹמֵד אֶצְלָהּ
  chosen: and the donkey was standing beside it
  alternatives:
  - and the donkey stood beside it
  - and the donkey was standing next to it
  lexicon: HALOT
  rationale: The participle עֹמֵד gives a stative scene-setting sense; 'was standing'
    reflects the ongoing posture. The feminine suffix in אצלהּ refers back to the
    feminine noun 'corpse/body,' rendered with English 'it.'
- source_word: וְהָאַרְיֵה עֹמֵד אֵצֶל הַנְּבֵלָה
  chosen: and the lion was standing beside the corpse
  alternatives:
  - and the lion stood beside the corpse
  - and the lion was standing next to the corpse
  lexicon: HALOT
  rationale: Again, the participle is best represented as scene description. Repeating
    'the corpse' mirrors the Hebrew's explicit noun rather than replacing it with
    a pronoun.
