id: 1KI.13.7
reference: 1 Kings 13:7
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר הַ/מֶּ֨לֶךְ֙ אֶל אִ֣ישׁ הָ/אֱלֹהִ֔ים בֹּאָ/ה אִתִּ֥/י הַ/בַּ֖יְתָ/ה
    וּֽ/סְעָ֑דָ/ה וְ/אֶתְּנָ֥ה לְ/ךָ֖ מַתָּֽת־־׃
translation:
  text: Then the king said to the man of God, “Come home with me and refresh yourself,
    and I will give you a gift.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and eat” / “and take food”; the Hebrew verb can mean to strengthen or
      sustain oneself, often by a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... said
  alternatives:
  - And ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In natural English narrative,
    'Then ... said' captures the sequential force better than a wooden 'And ... spoke.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with article.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew expression and should be preserved rather
    than interpreted as 'prophet,' since the source text uses the idiom directly.
- source_word: בֹּאָה
  chosen: Come
  alternatives:
  - Please come
  - Enter
  lexicon: HALOT
  rationale: Imperative of בוא with paragogic he functioning politely or idiomatically;
    'Come' is the natural English imperative here without overtranslating politeness.
- source_word: אִתִּי הַבַּיְתָה
  chosen: home with me
  alternatives:
  - with me to the house
  - to my house with me
  lexicon: HALOT
  rationale: The directional ending on הַבַּיְתָה means 'to the house/homeward.' In
    idiomatic English invitation language, 'come home with me' best conveys the sense.
- source_word: וּסְעָדָה
  chosen: and refresh yourself
  alternatives:
  - and sustain yourself
  - and eat
  - and take food
  lexicon: HALOT
  rationale: The verb סעד can denote strengthening or sustaining oneself, often by
    food. 'Refresh yourself' captures the broader sense naturally in English without
    reducing it only to eating, though a meal is implied.
- source_word: וְאֶתְּנָה לְךָ
  chosen: and I will give you
  alternatives:
  - and let me give you
  lexicon: HALOT
  rationale: Simple first-person cohortative/future sense in context of an offer.
    'I will give you' is clear and idiomatic.
- source_word: מַתָּת
  chosen: a gift
  alternatives:
  - a present
  - a reward
  lexicon: HALOT
  rationale: The noun denotes a gift or present. 'Gift' is the most neutral choice;
    'reward' could imply compensation not explicit in the Hebrew.
