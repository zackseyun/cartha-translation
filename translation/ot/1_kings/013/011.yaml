id: 1KI.13.11
reference: 1 Kings 13:11
source:
  edition: WLC
  text: וְ/נָבִ֤יא אֶחָד֙ זָקֵ֔ן יֹשֵׁ֖ב בְּ/בֵֽית אֵ֑ל וַ/יָּב֣וֹא בְנ֡/וֹ וַ/יְסַפֶּר
    ל֣/וֹ אֶת כָּל הַ/מַּעֲשֶׂ֣ה אֲשֶׁר עָשָׂה֩ אִישׁ הָ/אֱלֹהִ֨ים הַ/יּ֜וֹם בְּ/בֵֽית
    אֵ֗ל אֶת הַ/דְּבָרִים֙ אֲשֶׁ֣ר דִּבֶּ֣ר אֶל הַ/מֶּ֔לֶךְ וַֽ/יְסַפְּר֖וּ/ם לַ/אֲבִי/הֶֽם־־־־־־׀־־־׃
translation:
  text: Now an old prophet was living in Bethel, and his son came and told him all
    the deed that the man of God had done that day in Bethel, and the words that he
    had spoken to the king; they told them to their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from singular ('his son came and told him') to plural ('they
      told them to their father'). This may imply more than one son or reflect a textual/narrative
      irregularity; the translation preserves the shift rather than harmonizing it.
    reason: textual_variant
  - marker: b
    text: Or 'a certain old prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבִיא אֶחָד זָקֵן
  chosen: an old prophet
  alternatives:
  - one old prophet
  - a certain old prophet
  lexicon: HALOT
  rationale: אֶחָד with an indefinite noun can mark an indefinite individual ('a certain/one').
    English idiom is best served by 'an old prophet,' while the indefiniteness is
    preserved without overformal awkwardness.
- source_word: יֹשֵׁב בְּבֵית־אֵל
  chosen: was living in Bethel
  alternatives:
  - was dwelling in Bethel
  - sat in Bethel
  lexicon: HALOT
  rationale: יֹשֵׁב literally means 'sitting/dwelling,' but in this narrative setting
    it denotes residence. 'Was living in Bethel' gives natural English while preserving
    the stative sense.
- source_word: וַיָּבֹא בְנוֹ
  chosen: his son came
  alternatives:
  - his sons came
  lexicon: HALOT
  rationale: The ketiv/qere-like tension in the verse is reflected later by the plural
    verb and suffix ('they told them'). Here בְנוֹ is morphologically singular, so
    the main text keeps 'his son came' and preserves the later plural as written rather
    than harmonizing.
- source_word: וַיְסַפֶּר לוֹ
  chosen: told him
  alternatives:
  - recounted to him
  - reported to him
  lexicon: HALOT
  rationale: ספר in the piel commonly means to recount or tell. 'Told him' is concise,
    natural, and fits the narrative flow.
- source_word: אֶת כָּל הַמַּעֲשֶׂה
  chosen: all the deed
  alternatives:
  - all the act
  - everything that happened
  - all the thing done
  lexicon: HALOT
  rationale: מַעֲשֶׂה is singular here, referring collectively to the notable action
    performed by the man of God. 'Deed' preserves the singular and the sense of a
    significant act better than the more diffuse 'everything that happened.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is a standard prophetic title in the Former Prophets and should
    be preserved consistently.
- source_word: הַיּוֹם
  chosen: that day
  alternatives:
  - today
  lexicon: HALOT
  rationale: In past narrative, 'that day' is the natural English equivalent of הַיּוֹם,
    avoiding an overly immediate 'today'.
- source_word: אֶת הַדְּבָרִים אֲשֶׁר דִּבֶּר אֶל הַמֶּלֶךְ
  chosen: and the words that he had spoken to the king
  alternatives:
  - and what he had said to the king
  lexicon: HALOT
  rationale: דְּבָרִים is literally 'words,' and retaining it preserves the textual
    emphasis on the prophetic speech as distinct from the deed.
- source_word: וַיְסַפְּרוּם לַאֲבִיהֶם
  chosen: they told them to their father
  alternatives:
  - they told their father
  - they recounted them to their father
  lexicon: HALOT
  rationale: 'The Hebrew as pointed is plural verb with plural object suffix: ''they
    told them to their father.'' This likely reflects multiple sons or a resumptive
    plural after singular בְנוֹ. Rather than silently smoothing the text, the translation
    preserves the plural and the object, with a footnote noting the singular/plural
    tension.'
