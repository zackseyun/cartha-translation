id: 1KI.13.19
reference: 1 Kings 13:19
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב אִתּ֗/וֹ וַ/יֹּ֥אכַל לֶ֛חֶם בְּ/בֵית֖/וֹ וַ/יֵּ֥שְׁתְּ מָֽיִם׃
translation:
  text: So he went back with him and ate bread in his house and drank water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ate bread,' an idiom that can mean taking a meal; the more literal
      wording is retained here because 'bread' and 'water' are thematically important
      in the surrounding narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: went back
  alternatives:
  - returned
  - turned back
  lexicon: HALOT
  rationale: From שוב in the wayyiqtol, indicating a completed narrative action of
    returning. 'Went back' is natural modern English and fits the movement implied
    in context better than the more wooden 'returned' or 'turned back.'
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition with 3ms suffix, indicating
    accompaniment.
- source_word: וַיֹּאכַל לֶחֶם
  chosen: ate bread
  alternatives:
  - ate a meal
  - ate food
  lexicon: HALOT
  rationale: Literally 'ate bread.' In Hebrew this can function idiomatically for
    taking a meal, but here retaining 'bread' preserves the concrete wording and echoes
    the prohibition in the surrounding narrative.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - at his house
  - in his home
  lexicon: HALOT
  rationale: Literal and clear rendering of 'in his house.' 'His' refers to the older
    prophet in context.
- source_word: וַיֵּשְׁתְּ מָיִם
  chosen: drank water
  alternatives:
  - had a drink of water
  lexicon: HALOT
  rationale: Direct rendering of the verbal phrase. Keeping 'water' is important because
    it repeats the specific forbidden act from the larger episode.
