id: 1KI.13.20
reference: 1 Kings 13:20
source:
  edition: WLC
  text: וַ/יְהִ֕י הֵ֥ם יֹשְׁבִ֖ים אֶל הַ/שֻּׁלְחָ֑ן וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל הַ/נָּבִ֖יא אֲשֶׁ֥ר הֱשִׁיבֽ/וֹ־פ־־׃
translation:
  text: And it happened, as they were sitting at the table, that the word of Yahweh came to the prophet who had brought him back.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And it happened' preserves the Hebrew discourse function in readable modern English without archaic 'came to pass.'
- source_word: הֵם יֹשְׁבִים
  chosen: as they were sitting
  alternatives:
  - while they sat
  - as they sat
  lexicon: HALOT
  rationale: The pronoun plus participle expresses ongoing action/state. 'As they were sitting' captures the durative sense naturally in English.
- source_word: אֶל הַשֻּׁלְחָן
  chosen: at the table
  alternatives:
  - to the table
  - around the table
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in this idiom with ישב and table fellowship it denotes being seated for a meal. 'At the table' is the most natural English equivalent.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. The construct phrase is best rendered literally here. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving the covenant name through the small-caps convention in English.
- source_word: אֶל הַנָּבִיא
  chosen: to the prophet
  alternatives:
  - upon the prophet
  lexicon: HALOT
  rationale: אֶל with דבר יהוה marks the recipient of divine revelation. 'To the prophet' is the normal and clear rendering.
- source_word: אֲשֶׁר הֱשִׁיבוֹ
  chosen: who had brought him back
  alternatives:
  - who had caused him to return
  - who had turned him back
  lexicon: HALOT
  rationale: 'Hiphil of שוב with 3ms suffix indicates causative action: the prophet caused the man of God to return. ''Brought him back'' is idiomatic and fits the narrative context of returning to the older prophet''s house.'
