id: 1KI.13.34
reference: 1 Kings 13:34
source:
  edition: WLC
  text: וַ/יְהִי֙ בַּ/דָּבָ֣ר הַ/זֶּ֔ה לְ/חַטַּ֖את בֵּ֣ית יָרָבְעָ֑ם וּ/לְ/הַכְחִיד֙
    וּ/לְ/הַשְׁמִ֔יד מֵ/עַ֖ל פְּנֵ֥י הָ/אֲדָמָֽה׃פ
translation:
  text: And this matter became sin for the house of Yarovam, to wipe it out and to
    destroy it from the face of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this thing.' The Hebrew דָּבָר can refer broadly to a matter, affair,
      or thing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the face of the ground'; an idiom meaning complete removal
      from the earth/land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: 'The wayyiqtol of היה here introduces result: the preceding matter came
    to function as sin for Jeroboam''s house. ''Became'' captures the consequential
    sense better than the flatter ''was.'''
- source_word: בַּדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this event
  lexicon: HALOT
  rationale: דבר in this context refers broadly to the affair or course of action
    just narrated, not merely a spoken 'word.' 'This matter' is natural modern English
    and preserves the referential breadth.
- source_word: לְחַטַּאת
  chosen: sin
  alternatives:
  - a sin
  - sinful offense
  lexicon: HALOT
  rationale: The phrase היה לְחַטָּאת commonly indicates becoming sin or a cause/occasion
    of sin. 'Sin' is concise and idiomatic here; the anarthrous English avoids over-specifying.
- source_word: בֵּית יָרָבְעָם
  chosen: the house of Yarovam
  alternatives:
  - Jeroboam's house
  - the dynasty of Yarovam
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew idiom, which can denote family line or
    dynasty. The transliterated personal name follows the project''s policy to transliterate
    names rather than substitute traditional English forms.'
- source_word: וּלְהַכְחִיד
  chosen: to wipe it out
  alternatives:
  - to cut off
  - to exterminate
  lexicon: HALOT
  rationale: כחד in the Hiphil conveys causing to disappear or be wiped out. 'To wipe
    it out' is readable modern English and fits the object implied from 'the house
    of Yarovam.'
- source_word: וּלְהַשְׁמִיד
  chosen: to destroy it
  alternatives:
  - to annihilate it
  - to exterminate it
  lexicon: HALOT
  rationale: שמד in the Hiphil intensifies the judgment language. Rendering it distinctly
    from הכחיד preserves the Hebrew's paired verbs without collapsing them into one
    English term.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the ground
  alternatives:
  - from the face of the earth
  - from the land
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for removal from the earth/land. 'Ground'
    reflects אֲדָמָה more literally, while 'from the face of' preserves the idiom's
    solemn force.
