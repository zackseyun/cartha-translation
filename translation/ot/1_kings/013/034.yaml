theological_decisions:
- issue: Referent of the destruction verbs
  chosen_reading: The implied object is the house of Yarovam/dynasty, carried over
    from the previous phrase.
  alternative_readings:
  - The verbs refer more generally to the sinful matter itself.
  rationale: Syntactically, the nearest and most coherent implied object is 'the house
    of Yarovam.' This also matches the narrative context of dynastic judgment. The
    English supplies 'it' to make the implied object explicit without adding a new
    theological claim.
