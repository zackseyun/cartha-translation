id: 1KI.13.5
reference: 1 Kings 13:5
source:
  edition: WLC
  text: וְ/הַ/מִּזְבֵּ֣חַ נִקְרָ֔ע וַ/יִּשָּׁפֵ֥ךְ הַ/דֶּ֖שֶׁן מִן הַ/מִּזְבֵּ֑חַ
    כַּ/מּוֹפֵ֗ת אֲשֶׁ֥ר נָתַ֛ן אִ֥ישׁ הָ/אֱלֹהִ֖ים בִּ/דְבַ֥ר יְהוָֽה־׃
translation:
  text: And the altar was torn open, and the ashes were poured out from the altar,
    according to the sign that the man of God had given by the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as the sign' or 'in accordance with the wonder/portent.' The Hebrew
      מוֹפֵת can denote a sign, wonder, or portent.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ as 'altar.' The context is cultic, but
    'altar' is sufficient and natural in English without over-specifying.
- source_word: נִקְרָע
  chosen: was torn open
  alternatives:
  - was split apart
  - was torn
  lexicon: HALOT
  rationale: From קרע, 'to tear/split.' 'Was torn open' captures the passive/resultative
    sense and the dramatic physical rupture better than the flatter 'was torn.'
- source_word: וַיִּשָּׁפֵךְ
  chosen: were poured out
  alternatives:
  - spilled out
  - was poured out
  lexicon: HALOT
  rationale: The verb שׁפך commonly means 'pour out.' Because the following subject
    in English is plural/mass-like ('ashes'), plural agreement is idiomatic. 'Spilled
    out' is possible but less neutral and less tied to the Hebrew verb's common sense.
- source_word: הַדֶּשֶׁן
  chosen: the ashes
  alternatives:
  - the fat ashes
  - the ash
  lexicon: HALOT
  rationale: In altar context דֶּשֶׁן refers to the ashes/fatty residue from sacrifice.
    'Ashes' is the clearest natural English rendering; 'fat ashes' is overly technical
    here.
- source_word: מִן הַמִּזְבֵּחַ
  chosen: from the altar
  alternatives:
  - off the altar
  lexicon: HALOT
  rationale: Simple spatial source is intended. 'From the altar' is the most direct
    rendering of the preposition מן.
- source_word: כַּמּוֹפֵת
  chosen: according to the sign
  alternatives:
  - as the sign
  - in accordance with the wonder
  lexicon: HALOT
  rationale: מוֹפֵת can denote a sign, portent, or wonder. Here it refers back to
    the validating miracle announced by the man of God. 'According to the sign' best
    conveys correspondence/fulfillment signaled by כְּ.
- source_word: אֲשֶׁר נָתַן
  chosen: that ... had given
  alternatives:
  - that ... had set forth
  - that ... had announced
  lexicon: HALOT
  rationale: נתן literally 'gave.' In English, 'had given' works idiomatically with
    'sign' and preserves the Hebrew wording without unnecessary paraphrase.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title and should be preserved rather than interpreted
    as 'prophet,' though prophetic function is involved.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - by the command of the LORD
  - through the word of the LORD
  lexicon: HALOT
  rationale: דבר can mean word/matter/command. 'By the word of the LORD' preserves
    the formulaic expression and avoids narrowing it to command alone. Per doctrine,
    יְהוָה is rendered 'the LORD'.
