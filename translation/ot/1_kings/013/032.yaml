id: 1KI.13.32
reference: 1 Kings 13:32
source:
  edition: WLC
  text: כִּי֩ הָיֹ֨ה יִהְיֶ֜ה הַ/דָּבָ֗ר אֲשֶׁ֤ר קָרָא֙ בִּ/דְבַ֣ר יְהוָ֔ה עַל הַ/מִּזְבֵּ֖חַ
    אֲשֶׁ֣ר בְּ/בֵֽית אֵ֑ל וְ/עַל֙ כָּל בָּתֵּ֣י הַ/בָּמ֔וֹת אֲשֶׁ֖ר בְּ/עָרֵ֥י שֹׁמְרֽוֹן־־־׃פ
translation:
  text: For the word that he cried out by the word of the LORD against the altar that
    is in Bethel, and against all the houses of the high places that are in the cities
    of Samaria, will surely happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will certainly come to pass.' The Hebrew uses an infinitive absolute
      with an imperfect verb to intensify certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the shrines of the high places.' Literally, 'all the houses of the
      high places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding request about burial; 'for' fits
    the explanatory force in context.
- source_word: הָיֹה יִהְיֶה
  chosen: will surely happen
  alternatives:
  - will certainly come to pass
  - shall indeed be
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of היה intensifies certainty.
    'Will surely happen' is natural modern English that preserves the emphatic force.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the thing
  - the matter
  lexicon: HALOT
  rationale: In prophetic context דָּבָר commonly refers to the spoken message/oracle,
    not merely an abstract 'thing.' 'The word' also coheres with the following relative
    clause.
- source_word: אֲשֶׁר קָרָא
  chosen: that he cried out
  alternatives:
  - that he proclaimed
  - that he called out
  lexicon: HALOT
  rationale: קרא here describes the prophet's public denunciation. 'Cried out' preserves
    the vividness and oral force better than the flatter 'proclaimed.'
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - by the command of the LORD
  - through the word of the LORD
  lexicon: HALOT
  rationale: 'This phrase indicates agency/instrumentality: the prophet spoke on the
    basis of divine revelation. ''By the word of the LORD'' is both idiomatic and
    formally close. YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project's default rendering for the divine name is 'the LORD,' following
    the stated doctrine and established English convention.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - upon
  lexicon: HALOT
  rationale: In this prophetic judgment context, עַל with 'cried out' marks the target
    of denunciation. 'Against' best conveys hostile prophetic speech.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward cultic reference to Jeroboam's altar at Bethel.
- source_word: בְּבֵית אֵל
  chosen: in Bethel
  alternatives:
  - at Bethel
  - in Beth-el
  lexicon: HALOT
  rationale: As a place name, בית אל is transliterated as Bethel. 'In Bethel' is idiomatic
    with the relative clause 'that is in Bethel.'
- source_word: כָּל בָּתֵּי הַבָּמוֹת
  chosen: all the houses of the high places
  alternatives:
  - all the shrines of the high places
  - all the temple-houses of the high places
  lexicon: HALOT
  rationale: Literally 'houses of the high places.' While 'shrines' is interpretive
    and may be smoother, the Hebrew retains both 'houses' and 'high places'; the chosen
    rendering preserves that structure while remaining understandable.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill-shrines
  lexicon: HALOT
  rationale: Standard rendering for בָּמוֹת, referring to illicit or local cult sites.
    'High places' is established and sufficiently transparent.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  chosen: in the cities of Samaria
  alternatives:
  - in Samaria's cities
  lexicon: HALOT
  rationale: A straightforward construct chain. Although historically anachronistic
    relative to the city's later founding, the phrase in Kings refers to the region/territory
    as presented in the canonical text; translation should not smooth this away.
