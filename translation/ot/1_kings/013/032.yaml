theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Prophetic certainty in הָיֹה יִהְיֶה
  chosen_reading: will surely happen
  alternative_readings:
  - will certainly come to pass
  rationale: The Hebrew construction emphasizes certainty of fulfillment without adding
    theological interpretation beyond the text. The chosen English preserves that
    certainty in readable modern form.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source plain sense'
