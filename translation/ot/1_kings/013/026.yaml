id: 1KI.13.26
reference: 1 Kings 13:26
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע הַ/נָּבִיא֮ אֲשֶׁ֣ר הֱשִׁיב֣/וֹ מִן הַ/דֶּרֶךְ֒ וַ/יֹּ֨אמֶר֙
    אִ֣ישׁ הָ/אֱלֹהִ֣ים ה֔וּא אֲשֶׁ֥ר מָרָ֖ה אֶת פִּ֣י יְהוָ֑ה וַ/יִּתְּנֵ֨/הוּ יְהוָ֜ה
    לָ/אַרְיֵ֗ה וַֽ/יִּשְׁבְּרֵ֨/הוּ֙ וַ/יְמִתֵ֔/הוּ כִּ/דְבַ֥ר יְהוָ֖ה אֲשֶׁ֥ר דִּבֶּר
    לֽ/וֹ־־־׃
translation:
  text: When the prophet who had brought him back from the way heard it, he said,
    “It is the man of God who rebelled against the mouth of the LORD; therefore the
    LORD gave him to the lion, and it mauled him and killed him, according to the
    word of the LORD that he spoke to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rebelled against the command of the LORD” or “defied the word of the
      LORD.” The Hebrew literally says “rebelled against the mouth of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱשִׁיבוֹ מִן הַדֶּרֶךְ
  chosen: had brought him back from the way
  alternatives:
  - had turned him back from the road
  - had brought him back from the road
  lexicon: HALOT
  rationale: The Hiphil of שוב with מן + דרך indicates causing someone to return from
    his route. 'Brought him back' is idiomatic and preserves the causative sense.
    'Way' is retained rather than 'road' to echo the narrative's repeated motif, though
    'road' is a viable alternative.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is the standard Hebrew designation for a prophet or divinely commissioned
    figure. 'Man of God' preserves the title-like force and narrative continuity.
- source_word: מָרָה אֶת־פִּי יְהוָה
  chosen: rebelled against the mouth of the LORD
  alternatives:
  - rebelled against the command of the LORD
  - defied the word of the LORD
  lexicon: HALOT
  rationale: מרה commonly means 'be rebellious' or 'rebel.' The idiom 'mouth of the
    LORD' is semantically equivalent to his spoken command. I retained 'mouth' in
    the main text to preserve the Hebrew concreteness and audibility of the command,
    while smoother alternatives are preserved in a footnote.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וַיִּתְּנֵהוּ ... לָאַרְיֵה
  chosen: gave him to the lion
  alternatives:
  - handed him over to the lion
  lexicon: HALOT
  rationale: נתן + ל here conveys delivering someone over to the lion's power. 'Gave
    him to the lion' is close to the Hebrew and natural in English.
- source_word: וַיִּשְׁבְּרֵהוּ
  chosen: mauled him
  alternatives:
  - tore him
  - broke him
  lexicon: HALOT
  rationale: שבר literally means 'break,' but with a lion as subject in this context
    it refers to violent tearing or crushing. 'Mauled' communicates the animal attack
    clearly in modern English without wooden literalism.
- source_word: וַיְמִתֵהוּ
  chosen: killed him
  alternatives:
  - put him to death
  lexicon: HALOT
  rationale: The Hiphil of מות means 'cause to die, kill.' 'Killed him' is the most
    direct and natural rendering.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: This phrase marks fulfillment in line with what the LORD had spoken.
    'According to' is concise and faithful.
- source_word: אֲשֶׁר דִּבֶּר לוֹ
  chosen: that he spoke to him
  alternatives:
  - which he had spoken to him
  lexicon: HALOT
  rationale: The relative clause refers back to the LORD's prior word to the man of
    God. Simple past is acceptable in English narrative sequence; the referents remain
    clear from context.
