theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatic expression פִּי יְהוָה
  chosen_reading: the mouth of the LORD
  alternative_readings:
  - the command of the LORD
  - the word of the LORD
  rationale: The Hebrew literally says 'the mouth of the LORD.' Retaining the idiom
    in the main text preserves the vividness of divine speech and avoids over-interpreting,
    while smoother explanatory alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
