id: 1KI.13.22
reference: 1 Kings 13:22
source:
  edition: WLC
  text: וַ/תָּ֗שָׁב וַ/תֹּ֤אכַל לֶ֨חֶם֙ וַ/תֵּ֣שְׁתְּ מַ֔יִם בַּ/מָּקוֹם֙ אֲשֶׁ֣ר
    דִּבֶּ֣ר אֵלֶ֔י/ךָ אַל תֹּ֥אכַל לֶ֖חֶם וְ/אַל תֵּ֣שְׁתְּ מָ֑יִם לֹֽא תָב֥וֹא נִבְלָתְ/ךָ֖
    אֶל קֶ֥בֶר אֲבֹתֶֽי/ךָ־־־־׃
translation:
  text: but you came back and ate bread and drank water in the place of which he said
    to you, ‘Do not eat bread, and do not drink water’—your corpse shall not come
    to the tomb of your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your corpse shall not enter the grave of your fathers.' The Hebrew
      literally says 'shall not come to the tomb of your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשָׁב
  chosen: you came back
  alternatives:
  - you returned
  - you turned back
  lexicon: HALOT
  rationale: From שוב in the waw-consecutive narrative sequence, addressing the man
    of God directly. 'Came back' is idiomatic modern English and fits the rebuke context.
- source_word: וַתֹּאכַל לֶחֶם
  chosen: ate bread
  alternatives:
  - ate food
  lexicon: HALOT
  rationale: Retains the concrete Hebrew expression rather than generalizing to 'ate
    food.' 'Bread' is the stated object and echoes the prior prohibition.
- source_word: וַתֵּשְׁתְּ מַיִם
  chosen: drank water
  lexicon: HALOT
  rationale: Straightforward rendering preserving the repeated wording of the prohibition.
- source_word: בַּמָּקוֹם אֲשֶׁר דִּבֶּר אֵלֶיךָ
  chosen: in the place of which he said to you
  alternatives:
  - in the place about which he spoke to you
  - in the place where he told you
  lexicon: HALOT
  rationale: The relative clause refers to the place concerning which the command
    was given. 'Of which he said to you' is slightly formal but preserves the Hebrew
    linkage between the place and the spoken prohibition better than a looser paraphrase.
- source_word: אַל תֹּאכַל לֶחֶם וְאַל תֵּשְׁתְּ מָיִם
  chosen: ‘Do not eat bread, and do not drink water’
  alternatives:
  - ‘You must not eat bread or drink water’
  lexicon: HALOT
  rationale: Uses direct prohibition language matching the Hebrew negatives and preserves
    the repeated nouns for rhetorical force.
- source_word: נִבְלָתְךָ
  chosen: your corpse
  alternatives:
  - your carcass
  - your dead body
  lexicon: HALOT
  rationale: נבלה denotes a dead body/carcass. 'Corpse' is clear, dignified enough
    for modern English, and conveys the starkness of the judgment without sounding
    either overly clinical or crude.
- source_word: לֹא תָבֹא נִבְלָתְךָ אֶל קֶבֶר אֲבֹתֶיךָ
  chosen: your corpse shall not come to the tomb of your fathers
  alternatives:
  - your corpse shall not enter the grave of your fathers
  - your dead body shall not be brought to your fathers' tomb
  lexicon: HALOT
  rationale: Keeps the Hebrew imagery of 'coming' rather than making the passive action
    explicit. 'Tomb of your fathers' preserves the familial burial-place sense of
    קבר אבתיך better than the more generic 'grave of your ancestors.'
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is retained. Here
    it refers specifically to paternal forebears/family burial line, not merely a
    generic ancestry.
