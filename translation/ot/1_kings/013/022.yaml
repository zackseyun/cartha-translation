theological_decisions:
- issue: Nature of the judgment statement
  chosen_reading: A literal pronouncement that the man of God's body will not receive
    burial in his ancestral tomb
  alternative_readings:
  - A broader figurative statement of dishonor after death
  rationale: The Hebrew wording centers on the corpse not coming to the fathers' tomb,
    which most naturally refers to denied family burial, a concrete covenantal and
    social disgrace. The translation preserves this without expanding into theological
    implications the text itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it
