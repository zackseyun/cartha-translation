id: 1KI.13.9
reference: 1 Kings 13:9
source:
  edition: WLC
  text: כִּֽי כֵ֣ן צִוָּ֣ה אֹתִ֗/י בִּ/דְבַ֤ר יְהוָה֙ לֵ/אמֹ֔ר לֹא תֹ֥אכַל לֶ֖חֶם
    וְ/לֹ֣א תִשְׁתֶּה מָּ֑יִם וְ/לֹ֣א תָשׁ֔וּב בַּ/דֶּ֖רֶךְ אֲשֶׁ֥ר הָלָֽכְתָּ־׀־־׃
translation:
  text: For this is what he commanded me by the word of the LORD, saying, ‘You shall
    not eat bread, nor drink water, nor return by the way that you went.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, “by the way you came.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כֵן
  chosen: For this is what
  alternatives:
  - Because thus
  - For thus
  lexicon: HALOT
  rationale: Introduces the explanation for the prophet's refusal. The idiom כִּי
    כֵן is more natural in English as 'For this is what' than the wooden 'For thus,'
    while preserving the explanatory force.
- source_word: צִוָּה אֹתִי
  chosen: he commanded me
  alternatives:
  - he gave me orders
  - he instructed me
  lexicon: HALOT
  rationale: צוה is a strong verb of command, not mere advice. 'Commanded me' preserves
    the authoritative force.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - by a word of the LORD
  - through the word of the LORD
  lexicon: HALOT
  rationale: דבר here denotes the medium or authority of the command. 'By the word
    of the LORD' is idiomatic and preserves the covenantal formula. 'the LORD' follows
    the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the command.
- source_word: לֹא תֹאכַל לֶחֶם
  chosen: You shall not eat bread
  alternatives:
  - Do not eat bread
  - You must not eat food
  lexicon: HALOT
  rationale: The imperfect with לא in reported command is well represented by 'You
    shall not.' 'Bread' is retained rather than generalized to 'food,' since לֶחֶם
    is the actual lexical item and no contextual pressure requires broadening.
- source_word: וְלֹא תִשְׁתֶּה מָּיִם
  chosen: nor drink water
  alternatives:
  - and you shall not drink water
  lexicon: HALOT
  rationale: Coordinates the second prohibition smoothly in English while preserving
    the parallel structure.
- source_word: וְלֹא תָשׁוּב
  chosen: nor return
  alternatives:
  - and do not go back
  - nor turn back
  lexicon: HALOT
  rationale: שוב here means to return/go back. 'Return' is concise and fits the formal
    sequence of prohibitions.
- source_word: בַּדֶּרֶךְ אֲשֶׁר הָלָכְתָּ
  chosen: by the way that you went
  alternatives:
  - by the road on which you came
  - by the way you came
  lexicon: HALOT
  rationale: Literally, 'in/by the way which you went.' 'By the way that you went'
    stays close to the Hebrew while remaining natural. 'By the way you came' is a
    valid dynamic alternative but slightly interprets the perspective.
