id: 1KI.13.16
reference: 1 Kings 13:16
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לֹ֥א אוּכַ֛ל לָ/שׁ֥וּב אִתָּ֖/ךְ וְ/לָ/ב֣וֹא אִתָּ֑/ךְ וְ/לֹֽא
    אֹ֣כַל לֶ֗חֶם וְ/לֹֽא אֶשְׁתֶּ֤ה אִתְּ/ךָ֙ מַ֔יִם בַּ/מָּק֖וֹם הַ/זֶּֽה־־׃
translation:
  text: And he said, “I cannot return with you or go in with you, and I will not eat
    bread or drink water with you in this place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew uses a feminine 'with you' in the first two clauses and a masculine
      'with you' in the eating and drinking clause. English does not preserve this
      gender distinction.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - So he said
  - But he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And he said'
    preserves Hebrew narrative flow without overinterpreting the conjunction.
- source_word: לֹא אוּכַל
  chosen: I cannot
  alternatives:
  - I am not able to
  - I will not be able to
  lexicon: HALOT
  rationale: יכל in the imperfect with negation expresses inability. 'I cannot' is
    natural English and fits the speaker's stated constraint.
- source_word: לָשׁוּב
  chosen: return
  alternatives:
  - turn back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return/turn back.' Here 'return' is the most idiomatic
    with the following 'with you' in context.
- source_word: אִתָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Preposition with 2fs suffix; the addressee in this clause is grammatically
    feminine, matching the immediately preceding speaker's address to the old prophet's
    household context. English does not mark the gender in 'you.'
- source_word: וְלָבוֹא
  chosen: or go in
  alternatives:
  - or come
  - or enter
  lexicon: HALOT
  rationale: בוא often means 'come/go/enter' depending on viewpoint. Because the invitation
    concerns accompanying the other party to his place, 'go in' best reflects movement
    into the destination and preserves the distinction from 'return.'
- source_word: וְלֹא אֹכַל לֶחֶם
  chosen: and I will not eat bread
  alternatives:
  - and I will not eat food
  lexicon: HALOT
  rationale: Although 'bread' can metonymically mean food, retaining 'bread' preserves
    the Hebrew wording and matches the repeated formulation in the surrounding passage.
- source_word: וְלֹא אֶשְׁתֶּה ... מַיִם
  chosen: or drink water
  alternatives:
  - and I will not drink water
  lexicon: HALOT
  rationale: The second prohibition is coordinated closely with the first. In English,
    'or drink water' avoids awkward repetition while preserving the sense. 'Water'
    is kept literal.
- source_word: אִתְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: Preposition with 2ms suffix. The shift from feminine suffix earlier to
    masculine here is present in the Hebrew text; English cannot reflect the gender
    distinction in the main text.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  - here
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In this place' preserves the formal
    force better than the flatter 'here.'
