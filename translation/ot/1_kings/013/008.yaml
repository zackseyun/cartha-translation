id: 1KI.13.8
reference: 1 Kings 13:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אִישׁ הָֽ/אֱלֹהִים֙ אֶל הַ/מֶּ֔לֶךְ אִם תִּתֶּן לִ/י֙ אֶת חֲצִ֣י
    בֵיתֶ֔/ךָ לֹ֥א אָבֹ֖א עִמָּ֑/ךְ וְ/לֹֽא אֹ֤כַל לֶ֨חֶם֙ וְ/לֹ֣א אֶשְׁתֶּה מַּ֔יִם
    בַּ/מָּק֖וֹם הַ/זֶּֽה־־־־־־־׃
translation:
  text: But the man of God said to the king, “If you were to give me half your house,
    I would not go with you, nor would I eat bread or drink water in this place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''half your house.'' The phrase may idiomatically imply a very
      large reward or estate, but the translation keeps the literal wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: A standard Hebrew expression for a divinely commissioned messenger. 'Man
    of God' preserves the source wording and its established biblical force better
    than the more interpretive 'prophet of God.'
- source_word: אִם תִּתֶּן לִי אֶת חֲצִי בֵיתֶךָ
  chosen: If you were to give me half your house
  alternatives:
  - If you give me half your house
  - If you were to give me half your possessions
  lexicon: HALOT
  rationale: The idiom is literally 'half your house.' In context it refers to a lavish
    offer from the king. 'House' is retained rather than expanded to 'possessions'
    to preserve the Hebrew image, while 'were to give' conveys the conditional force
    naturally in English.
- source_word: בֵיתֶךָ
  chosen: your house
  alternatives:
  - your household
  - your possessions
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or estate. Here the hyperbolic royal
    offer could imply estate/possessions, but the literal 'house' is clear and idiomatic
    enough in English, preserving the Hebrew wording without over-interpreting.
- source_word: לֹא אָבֹא עִמָּךְ
  chosen: I would not go with you
  alternatives:
  - I will not go with you
  - I would not come with you
  lexicon: HALOT
  rationale: The verb is literally 'come,' but in English after an invitation from
    the king, 'go with you' is the more natural deictic equivalent. 'Would not' matches
    the conditional protasis smoothly.
- source_word: לֹא אֹכַל לֶחֶם
  chosen: nor would I eat bread
  alternatives:
  - and I would not eat food
  - nor would I eat a meal
  lexicon: HALOT
  rationale: '''Bread'' is retained because לֶחֶם commonly stands for food/meal, yet
    the literal term is natural in English and preserves the Hebrew texture.'
- source_word: לֹא אֶשְׁתֶּה מַּיִם
  chosen: or drink water
  alternatives:
  - nor would I drink water
  lexicon: HALOT
  rationale: A straightforward rendering. Coordinated with the previous clause for
    natural English rhythm.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - here
  - at this place
  lexicon: HALOT
  rationale: A close, readable rendering that preserves the demonstrative emphasis
    better than the simpler 'here'.
