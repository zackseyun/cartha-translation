id: 1KI.13.18
reference: 1 Kings 13:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ גַּם אֲנִ֣י נָבִיא֮ כָּמוֹ/ךָ֒ וּ/מַלְאָ֡ךְ דִּבֶּ֣ר אֵלַ/י֩ בִּ/דְבַ֨ר יְהוָ֜ה לֵ/אמֹ֗ר הֲשִׁבֵ֤/הוּ אִתְּ/ךָ֙ אֶל בֵּיתֶ֔/ךָ וְ/יֹ֥אכַל לֶ֖חֶם וְ/יֵ֣שְׁתְּ מָ֑יִם כִּחֵ֖שׁ לֽ/וֹ־־׃
translation:
  text: And he said to him, “I also am a prophet like you, and an angel spoke to me by the word of Yahweh, saying, ‘Bring him back with you to your house, that he may eat bread and drink water.’” But he lied to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a messenger spoke to me by the word of the LORD.' The Hebrew word can mean either 'angel' or 'messenger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: Standard rendering for one who speaks as a messenger of God; no contextual reason to vary.
- source_word: מַלְאָךְ
  chosen: angel
  alternatives:
  - messenger
  lexicon: HALOT
  rationale: Although מַלְאָךְ can mean either 'messenger' or 'angel,' the immediate claim is that the message came 'by the word of the LORD,' which naturally supports a supernatural messenger in this narrative context. The alternative is preserved because the Hebrew term itself is broader.
- source_word: דִּבֶּר אֵלַי
  chosen: spoke to me
  alternatives:
  - said to me
  lexicon: HALOT
  rationale: Natural English rendering of the verbal clause, preserving direct communication without overformal wording.
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - at the word of the LORD
  - through the word of the LORD
  lexicon: HALOT
  rationale: Retains the instrumental sense of ב and the prophetic idiom. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: הֲשִׁבֵהוּ
  chosen: Bring him back
  alternatives:
  - Return him
  - Cause him to return
  lexicon: HALOT
  rationale: Hiphil of שוב expresses causing someone to return. 'Bring him back' is idiomatic and accurately captures the causative force.
- source_word: אִתְּךָ אֶל־בֵּיתֶךָ
  chosen: with you to your house
  alternatives:
  - with you to your home
  lexicon: HALOT
  rationale: Keeps the concrete movement and destination of the Hebrew while using natural English.
- source_word: וְיֹאכַל לֶחֶם
  chosen: so that he may eat bread
  alternatives:
  - and let him eat bread
  - that he may eat food
  lexicon: HALOT
  rationale: The yiqtol here expresses intended result/purpose after the command. 'Eat bread' preserves the Hebrew idiom rather than generalizing to 'food.'
- source_word: וְיֵשְׁתְּ מָיִם
  chosen: and drink water
  alternatives:
  - and let him drink water
  lexicon: HALOT
  rationale: Paired with the previous clause as the purpose/result of bringing him back; straightforward literal rendering.
- source_word: כִּחֵשׁ לוֹ
  chosen: But he lied to him
  alternatives:
  - He deceived him
  - He spoke falsely to him
  lexicon: HALOT
  rationale: The verb denotes falsehood/deception. 'Lied to him' is the clearest and most direct rendering in context, and the adversative 'But' brings out the narrator's exposure of the false claim.
