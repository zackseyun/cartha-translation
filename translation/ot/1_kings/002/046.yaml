id: 1KI.2.46
reference: 1 Kings 2:46
source:
  edition: WLC
  text: וַ/יְצַ֣ו הַ/מֶּ֗לֶךְ אֶת בְּנָיָ֨הוּ֙ בֶּן יְה֣וֹיָדָ֔ע וַ/יֵּצֵ֕א וַ/יִּפְגַּע
    בּ֖/וֹ וַ/יָּמֹ֑ת וְ/הַ/מַּמְלָכָ֥ה נָכ֖וֹנָה בְּ/יַד שְׁלֹמֹֽה־־־־׃
translation:
  text: Then the king commanded Benaiah son of Jehoiada, and he went out and struck
    him down, and he died. So the kingdom was established in the hand of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was firmly established under Solomon' / 'in Solomon’s hand.' The Hebrew
      idiom 'in the hand of' expresses control or possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave orders to
  lexicon: HALOT
  rationale: צוה commonly means to command or give an order. 'Commanded' is concise
    and preserves the royal authority in the narrative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Solomon in context; standard rendering is
    straightforward.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah, the son of Jehoiada
  rationale: Personal names are transliterated per project philosophy. The construct
    'son of' is retained in natural English biblical style.
- source_word: וַיֵּצֵא
  chosen: he went out
  alternatives:
  - he went forth
  lexicon: HALOT
  rationale: יצא is literally 'go out.' 'Went out' preserves the sequence of action
    without archaic diction.
- source_word: וַיִּפְגַּע בּוֹ
  chosen: struck him down
  alternatives:
  - fell upon him
  - attacked him
  - killed him
  lexicon: HALOT
  rationale: פגע with ב can mean to strike, attack, or fall upon. In this execution
    context, 'struck him down' communicates the violent act while allowing the following
    'and he died' to carry the explicit result, avoiding redundancy if rendered simply
    'killed him'.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: 'מות is rendered directly. Keeping it explicit preserves the Hebrew narrative
    sequence: action followed by result.'
- source_word: וְהַמַּמְלָכָה
  chosen: So the kingdom
  alternatives:
  - And the kingdom
  - Thus the kingdom
  - the royal rule
  lexicon: HALOT
  rationale: ממלכה denotes kingdom or reign/royal dominion. 'Kingdom' is the most
    natural and sufficiently broad here. 'So' brings out the consequential force of
    the clause in readable English.
- source_word: נָכוֹנָה
  chosen: was established
  alternatives:
  - was firmly established
  - was secured
  lexicon: HALOT
  rationale: כון in the Niphal conveys being established, made firm, or secured. 'Was
    established' is accurate and idiomatic; the sense of firmness is already implied,
    though an alternative could emphasize it more explicitly.
- source_word: בְּיַד שְׁלֹמֹה
  chosen: in the hand of Solomon
  alternatives:
  - under Solomon's control
  - under Solomon
  - in Solomon's hand
  lexicon: HALOT
  rationale: The idiom literally reads 'in the hand of Solomon,' expressing control
    or possession of rule. Retaining 'in the hand of Solomon' preserves the Hebrew
    imagery while remaining understandable in English.
