id: 1KI.2.17
reference: 1 Kings 2:17
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אִמְרִי נָא֙ לִ/שְׁלֹמֹ֣ה הַ/מֶּ֔לֶךְ כִּ֥י לֹֽא יָשִׁ֖יב אֶת
    פָּנָ֑יִ/ךְ וְ/יִתֶּן לִ֛/י אֶת אֲבִישַׁ֥ג הַ/שּׁוּנַמִּ֖ית לְ/אִשָּֽׁה־־־־־׃
translation:
  text: And he said, “Please speak to King Solomon, for he will not refuse you, and
    let him give me Abishag the Shunammite as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he will not turn back your face,' a Hebrew idiom meaning 'he
      will not refuse you' or 'he will not deny your request.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרִי נָא
  chosen: Please speak
  alternatives:
  - Please say
  - Pray, say
  lexicon: HALOT
  rationale: Imperative feminine singular of אמר with particle נָא expresses a polite
    request. 'Please speak' is natural modern English and fits the indirect request
    to Bathsheba.
- source_word: לִשְׁלֹמֹה הַמֶּלֶךְ
  chosen: to King Solomon
  alternatives:
  - to Solomon the king
  lexicon: HALOT
  rationale: English idiom prefers the royal title before the name. The Hebrew apposition
    is preserved in sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'For' is concise and fits the
    explanatory force.
- source_word: לֹא יָשִׁיב אֶת פָּנָיִךְ
  chosen: he will not refuse you
  alternatives:
  - he will not turn away your face
  - he will not reject your request
  lexicon: HALOT
  rationale: The idiom literally involves 'turning back the face,' but in context
    means refusing or denying a petitioner. 'Refuse you' gives the plain sense in
    readable English.
- source_word: וְיִתֶּן לִי
  chosen: and let him give me
  alternatives:
  - and may he give me
  - that he give me
  lexicon: HALOT
  rationale: Following the request formula, the prefixed verb expresses the content
    of what Bathsheba is to ask. 'Let him give me' is idiomatic English for the requested
    action.
- source_word: אֲבִישַׁג הַשּׁוּנַמִּית
  chosen: Abishag the Shunammite
  lexicon: HALOT
  rationale: Personal name is transliterated; the gentilic/title is translated in
    standard form.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be my wife
  lexicon: HALOT
  rationale: This construction commonly indicates taking a woman in marriage. 'As
    a wife' is concise and idiomatic while preserving the marital sense.
