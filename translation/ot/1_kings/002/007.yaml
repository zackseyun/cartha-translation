id: 1KI.2.7
reference: 1 Kings 2:7
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֨י בַרְזִלַּ֤י הַ/גִּלְעָדִי֙ תַּֽעֲשֶׂה חֶ֔סֶד וְ/הָי֖וּ בְּ/אֹכְלֵ֣י
    שֻׁלְחָנֶ֑/ךָ כִּי כֵן֙ קָרְב֣וּ אֵלַ֔/י בְּ/בָרְחִ֕/י מִ/פְּנֵ֖י אַבְשָׁל֥וֹם
    אָחִֽי/ךָ־־׃
translation:
  text: But show kindness to the sons of Barzillai the Gileadite, and let them be
    among those who eat at your table, for they came near to me in this way when I
    fled from Absalom your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deal loyally with the sons of Barzillai'; the Hebrew phrase 'do/show
      hesed' can carry the sense of loyal kindness, not mere sentiment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'let them be among the eaters of your table,' an idiom for ongoing
      royal provision and favor.
    reason: cultural_note
  - marker: c
    text: Or 'they came to me' / 'they stood by me'; the Hebrew verb is literally
      'came near,' here implying support during David's flight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  chosen: But ... to the sons of
  alternatives:
  - And to the sons of
  - But to the children of
  lexicon: HALOT
  rationale: The conjunction waw here continues David's instructions with a contrastive/additive
    force in context after the previous negative command, so 'But' reads naturally
    in English. בנים in construct with a personal name is rendered 'sons of' rather
    than the broader 'children of' because the referents are Barzillai's male descendants
    in the narrative setting.
- source_word: בַרְזִלַּי הַגִּלְעָדִי
  chosen: Barzillai the Gileadite
  rationale: Personal name is transliterated; the gentilic/title is translated as
    'the Gileadite' per the translation philosophy to transliterate names but translate
    descriptors.
- source_word: תַּעֲשֶׂה חֶסֶד
  chosen: show kindness
  alternatives:
  - deal loyally
  - show covenant loyalty
  - do kindness
  lexicon: HALOT
  rationale: עשה חסד is an idiomatic collocation meaning to act with kindness/loyalty.
    'Show kindness' is natural modern English and preserves the benevolent action
    without overloading the phrase with covenantal terminology that the immediate
    context does not require, though חֶסֶד can carry loyal-love nuances.
- source_word: וְהָיוּ
  chosen: and let them be
  alternatives:
  - and they shall be
  - so that they may be
  lexicon: HALOT
  rationale: Though formally a qatal with waw, in this instructional context it functions
    jussively/resultatively. 'Let them be' best conveys David's command to Solomon
    in idiomatic English.
- source_word: בְּאֹכְלֵי שֻׁלְחָנֶךָ
  chosen: among those who eat at your table
  alternatives:
  - among the eaters of your table
  - at your table
  lexicon: HALOT
  rationale: The participial construction literally denotes those eating one's table/food.
    'Among those who eat at your table' preserves the image of ongoing royal provision
    and fellowship more fully than the compressed 'at your table' alone.
- source_word: כִּי כֵן
  chosen: for ... in this way
  alternatives:
  - for thus
  - because this is how
  lexicon: HALOT
  rationale: כִּי introduces the reason; כֵן points back to the manner just commanded
    or to the corresponding kindness they showed. 'For ... in this way' preserves
    the explanatory and comparative force in readable English.
- source_word: קָרְבוּ אֵלַי
  chosen: they came near to me
  alternatives:
  - they stood by me
  - they came to help me
  - they approached me
  lexicon: HALOT
  rationale: קרב literally means 'come near/approach.' In context it implies supportive
    assistance during David's flight, but the translation keeps the more literal wording
    'came near to me' and lets the context supply the supportive sense.
- source_word: בְּבָרְחִי
  chosen: when I fled
  alternatives:
  - in my fleeing
  - as I was fleeing
  lexicon: HALOT
  rationale: The infinitive construct with preposition and suffix is naturally temporal
    here. 'When I fled' is concise and idiomatic.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - from before
  - because of
  lexicon: HALOT
  rationale: The preposition literally has the sense 'from before/from the presence
    of,' but in flight contexts standard English simply uses 'from.'
- source_word: אַבְשָׁלוֹם אָחִיךָ
  chosen: Absalom your brother
  rationale: Name is transliterated; the kinship term is retained explicitly because
    David's wording reminds Solomon of the family relationship and the political context.
