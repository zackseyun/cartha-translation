theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the one who has returned Shimei's
    evil upon him. Following project doctrine, the Tetragrammaton is rendered 'the
    LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Agency in divine retribution
  chosen_reading: the LORD has brought back your evil on your own head
  alternative_readings:
  - the LORD has repaid your evil upon your head
  rationale: The Hebrew explicitly attributes the return of Shimei's evil to the LORD.
    The translation preserves that claim without softening divine agency or expanding
    it into a broader doctrinal statement about providence beyond the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
