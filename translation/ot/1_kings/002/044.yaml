theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency in divine retribution
  chosen_reading: the LORD has brought back your evil on your own head
  alternative_readings:
  - the LORD has repaid your evil upon your head
  rationale: The Hebrew explicitly attributes the return of Shimei's evil to the LORD. The translation preserves that claim without softening divine agency or expanding it into a broader doctrinal statement about providence beyond the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
