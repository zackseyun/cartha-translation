id: 1KI.2.44
reference: 1 Kings 2:44
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶל שִׁמְעִ֗י אַתָּ֤ה יָדַ֨עְתָּ֙ אֵ֣ת כָּל הָ/רָעָ֗ה
    אֲשֶׁ֤ר יָדַע֙ לְבָ֣בְ/ךָ֔ אֲשֶׁ֥ר עָשִׂ֖יתָ לְ/דָוִ֣ד אָבִ֑/י וְ/הֵשִׁ֧יב יְהוָ֛ה
    אֶת רָעָתְ/ךָ֖ בְּ/רֹאשֶֽׁ/ךָ־־־׃
translation:
  text: Then the king said to Shimei, “You know all the evil that your heart knows,
    which you did to David my father; and the LORD has brought back your evil on your
    own head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that you know in your heart.” The Hebrew literally says, “that your
      heart knows,” emphasizing Shimei’s inward awareness of his guilt.
    reason: lexical_alternative
  - marker: b
    text: Or, “has returned” or “has repaid.” The Hebrew verb carries the sense of
      causing Shimei’s evil to come back upon him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to Solomon in context; standard rendering.
- source_word: אַתָּה יָדַעְתָּ
  chosen: You know
  alternatives:
  - You yourself know
  - You have known
  lexicon: HALOT
  rationale: Direct address with emphatic pronoun. English can carry the emphasis
    without overtranslating; present 'know' fits the discourse better than a wooden
    perfect.
- source_word: כָּל הָרָעָה
  chosen: all the evil
  alternatives:
  - all the harm
  - all the wrong
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil/wrongdoing done against David, not merely
    misfortune. 'Evil' preserves the moral force.
- source_word: אֲשֶׁר יָדַע לְבָבְךָ
  chosen: that your heart knows
  alternatives:
  - of which your heart is aware
  - that you know in your heart
  lexicon: HALOT
  rationale: The Hebrew literally attributes knowledge to the heart. Retaining 'your
    heart knows' preserves the idiom and the inward moral awareness being emphasized.
- source_word: אֲשֶׁר עָשִׂיתָ לְדָוִד אָבִי
  chosen: which you did to David my father
  alternatives:
  - that you did to David my father
  - which you committed against David my father
  lexicon: HALOT
  rationale: Straightforward rendering of the relative clause. 'Did to' is idiomatic
    and sufficiently weighty in context.
- source_word: וְהֵשִׁיב
  chosen: has brought back
  alternatives:
  - has returned
  - has repaid
  lexicon: HALOT
  rationale: The Hiphil of שוב here expresses causing something to return upon someone.
    'Has brought back' preserves the imagery of retribution returning; 'repaid' would
    be more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: אֶת רָעָתְךָ
  chosen: your evil
  alternatives:
  - your wrongdoing
  - your harm
  lexicon: HALOT
  rationale: The same noun רָעָה recurs; rendering it consistently as 'evil' highlights
    the correspondence between Shimei's deed and its return upon him.
- source_word: בְּרֹאשֶׁךָ
  chosen: on your own head
  alternatives:
  - upon your head
  lexicon: HALOT
  rationale: This is a standard idiom for guilt or retribution returning to the perpetrator.
    'On your own head' is natural English and preserves the idiom's force.
