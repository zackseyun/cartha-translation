id: 1KI.2.41
reference: 1 Kings 2:41
source:
  edition: WLC
  text: וַ/יֻּגַּ֖ד לִ/שְׁלֹמֹ֑ה כִּי הָלַ֨ךְ שִׁמְעִ֧י מִ/ירוּשָׁלִַ֛ם גַּ֖ת וַ/יָּשֹֽׁב־׃
translation:
  text: And it was reported to Solomon that Shimei had gone from Jerusalem to Gath
    and had returned.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/narrative form of נגד conveys that information was made known
    to Solomon without specifying the messenger. 'It was reported' is natural English
    and preserves the passive sense.
- source_word: לִשְׁלֹמֹה
  chosen: to Solomon
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object, the recipient of the report.
- source_word: כִּי
  chosen: that
  alternatives:
  - how
  lexicon: HALOT
  rationale: Introduces the content of the report in indirect discourse; 'that' is
    the most straightforward English complementizer here.
- source_word: הָלַךְ
  chosen: had gone
  alternatives:
  - went
  - had traveled
  lexicon: HALOT
  rationale: הלך denotes going/traveling. Pluperfect English fits the reported-speech
    context followed by a second completed action, 'had returned.'
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: The preposition מ marks movement away from Jerusalem.
- source_word: גַּת
  chosen: to Gath
  alternatives:
  - as far as Gath
  lexicon: HALOT
  rationale: Although no explicit preposition appears before 'Gath,' the place name
    functions as the destination of 'had gone.' English idiom requires 'to Gath.'
- source_word: וַיָּשֹׁב
  chosen: and had returned
  alternatives:
  - and returned
  - and came back
  lexicon: HALOT
  rationale: שׁוב means return/turn back. 'Had returned' matches the prior perfective
    action in English and clearly completes the report.
