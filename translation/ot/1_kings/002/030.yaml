id: 1KI.2.30
reference: 1 Kings 2:30
source:
  edition: WLC
  text: וַ/יָּבֹ֨א בְנָיָ֜הוּ אֶל אֹ֣הֶל יְהוָ֗ה וַ/יֹּ֨אמֶר אֵלָ֜י/ו כֹּֽה אָמַ֤ר הַ/מֶּ֨לֶךְ֙ צֵ֔א וַ/יֹּ֥אמֶר לֹ֖א כִּ֣י פֹ֣ה אָמ֑וּת וַ/יָּ֨שֶׁב בְּנָיָ֤הוּ אֶת הַ/מֶּ֨לֶךְ֙ דָּבָ֣ר לֵ/אמֹ֔ר כֹּֽה דִבֶּ֥ר יוֹאָ֖ב וְ/כֹ֥ה עָנָֽ/נִי־־׀־־׃
translation:
  text: 'Then Benaiah came to the tent of Yahweh and said to him, “Thus says the king: ‘Come out.’” But he said, “No, for I will die here.” And Benaiah brought word back to the king, saying, “Thus Joab spoke, and thus he answered me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the tabernacle of the LORD.” The Hebrew reads “the tent of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֶל יְהוָה
  chosen: the tent of the LORD
  alternatives:
  - the tabernacle of the LORD
  - the house of the LORD
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' In this narrative setting Joab has fled to the sanctuary area and the Hebrew does not use 'house' here. 'Tabernacle' is possible as an interpretive traditional term, but 'tent' more directly reflects the Hebrew wording while remaining clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: Thus says the king
  alternatives:
  - This is what the king says
  - Thus the king has said
  lexicon: HALOT
  rationale: This is a standard messenger formula. 'Thus says' preserves the formal force and recognizable idiom without undue archaism.
- source_word: צֵא
  chosen: Come out
  alternatives:
  - Go out
  - Exit
  lexicon: HALOT
  rationale: The imperative from יצא means to go/come out. In English direct speech addressed to someone inside a place, 'Come out' is the most natural equivalent.
- source_word: לֹא כִּי פֹה אָמוּת
  chosen: No, for I will die here
  alternatives:
  - No, but here I will die
  - No; rather, I will die here
  lexicon: HALOT
  rationale: כִּי here introduces Joab's resolve/explanation. 'For I will die here' gives natural English while preserving the sense that he refuses to leave and expects or chooses death at that spot.
- source_word: וַיָּשֶׁב ... דָּבָר
  chosen: brought word back
  alternatives:
  - reported the matter back
  - returned word
  lexicon: HALOT
  rationale: The idiom שׁוּב + דָּבָר conveys returning with a report. 'Brought word back' is idiomatic modern English and reflects the Hebrew construction.
- source_word: כֹּה דִבֶּר יוֹאָב וְכֹה עָנָנִי
  chosen: Thus Joab spoke, and thus he answered me
  alternatives:
  - This is what Joab said, and this is how he answered me
  - So Joab spoke, and so he answered me
  lexicon: HALOT
  rationale: The repeated כֹּה marks a formal report of exact words or substance. Retaining 'thus ... and thus' preserves the repetitive reporting style of the Hebrew narrative.
