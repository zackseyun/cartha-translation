id: 1KI.2.37
reference: 1 Kings 2:37
source:
  edition: WLC
  text: וְ/הָיָ֣ה בְּ/י֣וֹם צֵאתְ/ךָ֗ וְ/עָֽבַרְתָּ֙ אֶת נַ֣חַל קִדְר֔וֹן יָדֹ֥עַ
    תֵּדַ֖ע כִּ֣י מ֣וֹת תָּמ֑וּת דָּמְ/ךָ֖ יִהְיֶ֥ה בְ/רֹאשֶֽׁ/ךָ׀־׃
translation:
  text: For on the day you go out and cross the Kidron Valley, know for certain that
    you shall surely die; your blood shall be on your own head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cross the brook Kidron.' The Hebrew נחל can refer to a valley, wadi,
      or seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''your blood shall be on your head,'' meaning you yourself
      will bear responsibility for your death.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: For
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Here the clause introduces the condition and consequence of Shimei's
    violation. In idiomatic English, 'For on the day...' naturally conveys the warning
    force better than a wooden 'And it shall be.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: The Hebrew temporal expression is formally 'on the day,' which in context
    means the time when the action occurs. Retaining 'on the day' preserves the solemn
    legal tone.
- source_word: צֵאתְךָ
  chosen: you go out
  alternatives:
  - your going out
  - you leave
  lexicon: HALOT
  rationale: The infinitive construct with suffix denotes Shimei's act of going out
    from the restricted area. 'You go out' is clear modern English and preserves the
    verbal force.
- source_word: וְעָבַרְתָּ אֶת נַחַל קִדְרוֹן
  chosen: and cross the Kidron Valley
  alternatives:
  - and pass over the brook Kidron
  - and cross the Wadi Kidron
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or brook/valley. 'Kidron Valley' is natural
    English and fits the geographic reference without sounding archaic. 'Cross' renders
    עבר straightforwardly.
- source_word: יָדֹעַ תֵּדַע
  chosen: know for certain
  alternatives:
  - you shall surely know
  - know well
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command/assurance.
    'Know for certain' communicates the emphatic force in contemporary English.
- source_word: כִּי מוֹת תָּמוּת
  chosen: that you shall surely die
  alternatives:
  - that you will certainly die
  - that dying you shall die
  lexicon: HALOT
  rationale: The infinitive absolute with the finite verb marks emphatic certainty.
    'You shall surely die' is a standard and accurate English rendering that preserves
    the gravity of the sentence.
- source_word: דָּמְךָ יִהְיֶה בְרֹאשֶׁךָ
  chosen: your blood shall be on your own head
  alternatives:
  - your blood shall be on your head
  - you will bear responsibility for your death
  lexicon: HALOT
  rationale: This idiom assigns responsibility for the resulting death to the person
    himself. 'On your own head' preserves the Hebrew image while making the reflexive
    responsibility explicit.
