theological_decisions:
- issue: Rendering of legal-death idiom and culpability formula
  chosen_reading: Retain the idiomatic expression 'your blood shall be on your own
    head' in the main text.
  alternative_readings:
  - you will bear responsibility for your death
  rationale: The verse concerns judicial warning and personal liability, not a disputed
    doctrinal issue. Preserving the Hebrew idiom maintains the text's legal and moral
    force while remaining understandable in English.
  doctrine_reference: Translation philosophy §§1, 5, 6
