theological_decisions:
- issue: Rendering the contrast between Joab's line and David's line
  chosen_reading: Use 'but for David...' to make explicit the adversative sense between
    bloodguilt on Joab and peace for David.
  alternative_readings:
  - Use simple 'and for David...' without explicit contrast
  rationale: 'The Hebrew conjunction is formally ''and,'' but the sense is clearly
    contrastive: judgment on Joab versus peace for David. Making the contrast explicit
    serves optimal equivalence without adding new theology.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
- issue: Meaning of שָׁלוֹם in dynastic context
  chosen_reading: Render as 'peace' and leave its fuller covenantal/dynastic implications
    implicit.
  alternative_readings:
  - well-being
  - prosperity
  rationale: The verse speaks of enduring divine favor and stability for David's house
    and throne. 'Peace' preserves the theological breadth of שָׁלוֹם better than narrower
    alternatives.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight.'
