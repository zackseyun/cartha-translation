id: 1KI.2.33
reference: 1 Kings 2:33
source:
  edition: WLC
  text: וְ/שָׁ֤בוּ דְמֵי/הֶם֙ בְּ/רֹ֣אשׁ יוֹאָ֔ב וּ/בְ/רֹ֥אשׁ זַרְע֖/וֹ לְ/עֹלָ֑ם
    וּ/לְ/דָוִ֡ד וּ֠/לְ/זַרְע/וֹ וּ/לְ/בֵית֨/וֹ וּ/לְ/כִסְא֜/וֹ יִהְיֶ֥ה שָׁל֛וֹם
    עַד עוֹלָ֖ם מֵ/עִ֥ם יְהוָֽה־׃
translation:
  text: So their blood shall return on the head of Joab and on the head of his offspring
    forever, but for David and for his offspring and for his house and for his throne,
    there shall be peace forever from the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their blood,' an idiom referring to responsibility for the blood
      they shed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ
  chosen: shall return
  alternatives:
  - will return
  - shall come back
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context functions as a
    jussive/declarative future in Solomon's pronouncement. 'Shall return' preserves
    the judicial sense of bloodguilt coming back upon the guilty party.
- source_word: דְמֵיהֶם
  chosen: their blood
  alternatives:
  - their bloodguilt
  - their bloodshed
  lexicon: HALOT
  rationale: Literally 'their bloods/blood.' In context it refers to responsibility
    for the blood of those murdered. The idiom is preserved as 'their blood,' while
    the judicial force is carried by the surrounding phrase 'on the head of.'
- source_word: בְּרֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for guilt or consequences resting on
    someone. 'On the head of' keeps the metaphor and legal resonance.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and can denote posterity collectively.
    ''Seed'' is too wooden here; ''descendants'' is possible but slightly more interpretive.'
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: In royal/judicial contexts עוֹלָם commonly denotes enduring duration.
    'Forever' is the most natural and sufficiently weighty rendering.
- source_word: יִהְיֶה שָׁלוֹם
  chosen: there shall be peace
  alternatives:
  - peace shall be
  - there will be well-being
  lexicon: HALOT
  rationale: The clause is existential/predicative. 'There shall be peace' is idiomatic
    English and preserves שָׁלוֹם as 'peace' rather than reducing it to mere prosperity,
    while still allowing its broader covenantal sense.
- source_word: לְדָוִד וּלְזַרְעוֹ וּלְבֵיתוֹ וּלְכִסְאוֹ
  chosen: for David and for his offspring and for his house and for his throne
  alternatives:
  - to David and to his offspring and to his house and to his throne
  lexicon: HALOT
  rationale: Repeated ל marks benefit or relation. 'For' reads more naturally in English
    in this blessing formula. 'House' and 'throne' are retained literally because
    they carry dynastic significance.
- source_word: מֵעִם יְהוָה
  chosen: from the LORD
  alternatives:
  - from before the LORD
  - from Yahweh
  lexicon: HALOT
  rationale: The source of the promised peace is explicitly the covenant God. Per
    doctrine, יְהוָה is rendered 'the LORD.' 'From the LORD' is the clearest idiomatic
    rendering of מֵעִם here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
