theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of the blood-on-head idiom
  chosen_reading: A statement of divinely requited bloodguilt returning upon the murderer
  alternative_readings:
  - A more literal but potentially opaque statement about his blood being on his head
  rationale: The idiom concerns culpability and just recompense, not the victim's
    literal blood. The translation preserves the idiom while keeping it intelligible
    in English.
