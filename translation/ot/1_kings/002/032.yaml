id: 1KI.2.32
reference: 1 Kings 2:32
source:
  edition: WLC
  text: וְ/הֵשִׁיב֩ יְהוָ֨ה אֶת דָּמ֜/וֹ עַל רֹאשׁ֗/וֹ אֲשֶׁ֣ר פָּגַ֣ע בִּ/שְׁנֵֽי
    אֲ֠נָשִׁים צַדִּקִ֨ים וְ/טֹבִ֤ים מִמֶּ֨/נּוּ֙ וַ/יַּהַרְגֵ֣/ם בַּ/חֶ֔רֶב וְ/אָבִ֥/י
    דָוִ֖ד לֹ֣א יָדָ֑ע אֶת אַבְנֵ֤ר בֶּן נֵר֙ שַׂר צְבָ֣א יִשְׂרָאֵ֔ל וְ/אֶת עֲמָשָׂ֥א
    בֶן יֶ֖תֶר שַׂר צְבָ֥א יְהוּדָֽה־־־־־־־־־׃
translation:
  text: 'And the LORD will return his blood on his own head, because he struck down
    two men more righteous and better than he, and killed them with the sword while
    my father David did not know it: Abner son of Ner, commander of Israel’s army,
    and Amasa son of Jether, commander of Judah’s army.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his bloodguilt on his head.' The Hebrew idiom speaks of responsibility
      for bloodshed returning upon the guilty person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב
  chosen: will return
  alternatives:
  - will bring back
  - will repay
  lexicon: HALOT
  rationale: Hiphil of שוב here carries the idiom of requital or causing guilt/bloodshed
    to come back upon the perpetrator. 'Will return' preserves the Hebrew image and
    fits the following idiom 'on his head.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, render as 'the LORD' rather than transliterating
    the divine name.
- source_word: דָּמוֹ ... עַל רֹאשׁוֹ
  chosen: his blood on his own head
  alternatives:
  - his bloodguilt on his head
  - the blood he shed on his head
  lexicon: HALOT
  rationale: The Hebrew idiom places blood responsibility on the guilty person's head.
    'His blood on his own head' keeps the compact idiom; 'own' clarifies reflexive
    force in English without adding new content.
- source_word: פָּגַע
  chosen: struck down
  alternatives:
  - fell upon
  - attacked
  lexicon: HALOT
  rationale: In this violent context, the verb denotes hostile assault leading to
    death. 'Struck down' is natural English and prepares for the explicit killing
    verb that follows.
- source_word: שְׁנֵי אֲנָשִׁים
  chosen: two men
  alternatives:
  - two persons
  lexicon: HALOT
  rationale: Gender-accurate and contextually specific; the referents are male military
    leaders.
- source_word: צַדִּקִים וְטֹבִים מִמֶּנּוּ
  chosen: more righteous and better than he
  alternatives:
  - more righteous and better than him
  - more innocent and better than he was
  lexicon: HALOT
  rationale: צַדִּיקִים is best rendered 'righteous' here in a moral/legal sense;
    טוֹבִים as 'better' preserves the comparative evaluation. 'Than he' is slightly
    more formal and suits the elevated register.
- source_word: וַיַּהַרְגֵם בַּחֶרֶב
  chosen: and killed them with the sword
  alternatives:
  - and put them to death by the sword
  - and slew them with the sword
  lexicon: HALOT
  rationale: Direct and clear rendering of the explicit killing statement; 'with the
    sword' preserves the instrumental phrase.
- source_word: וְאָבִי דָוִד לֹא יָדָע
  chosen: while my father David did not know it
  alternatives:
  - though my father David did not know
  - and my father David did not know
  lexicon: HALOT
  rationale: The conjunction here is best taken in context as circumstantial rather
    than merely additive. 'Did not know it' makes explicit that David was unaware
    of the act, not ignorant in general.
- source_word: שַׂר צְבָא יִשְׂרָאֵל
  chosen: commander of Israel’s army
  alternatives:
  - captain of the army of Israel
  - commander of the host of Israel
  lexicon: HALOT
  rationale: Readable modern English for a military title; 'army' is the natural rendering
    of צבא in this context.
- source_word: שַׂר צְבָא יְהוּדָה
  chosen: commander of Judah’s army
  alternatives:
  - captain of the army of Judah
  - commander of the host of Judah
  lexicon: HALOT
  rationale: Same title rendered consistently with the previous phrase.
