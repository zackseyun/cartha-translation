id: 1KI.2.20
reference: 1 Kings 2:20
source:
  edition: WLC
  text: וַ/תֹּ֗אמֶר שְׁאֵלָ֨ה אַחַ֤ת קְטַנָּה֙ אָֽנֹכִי֙ שֹׁאֶ֣לֶת מֵֽ/אִתָּ֔/ךְ אַל
    תָּ֖שֶׁב אֶת פָּנָ֑/י וַ/יֹּֽאמֶר לָ֤/הּ הַ/מֶּ֨לֶךְ֙ שַׁאֲלִ֣י אִמִּ֔/י כִּ֥י
    לֹֽא אָשִׁ֖יב אֶת פָּנָֽיִ/ךְ־־־־־׃
translation:
  text: She said, “I am asking one small request of you; do not turn away my face.”
    And the king said to her, “Ask, my mother, for I will not turn away your face.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''do not turn away my face'' / ''I will not turn away your
      face,'' meaning ''do not refuse me'' / ''I will not refuse you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאֵלָה אַחַת קְטַנָּה
  chosen: one small request
  alternatives:
  - one little request
  - one small petition
  lexicon: HALOT
  rationale: שְׁאֵלָה denotes a request/petition; אַחַת marks 'one,' and קְטַנָּה
    idiomatically softens the request as modest. 'Small request' preserves the rhetorical
    minimization without sounding archaic.
- source_word: שֹׁאֶלֶת מֵאִתָּךְ
  chosen: I am asking ... of you
  alternatives:
  - I ask ... from you
  - I am requesting ... from you
  lexicon: HALOT
  rationale: The participle expresses ongoing/present action in direct speech. 'Asking
    ... of you' is natural English and preserves the personal appeal.
- source_word: אַל תָּשֶׁב אֶת פָּנַי
  chosen: do not turn away my face
  alternatives:
  - do not refuse me
  - do not turn back my face
  lexicon: HALOT
  rationale: Literally the idiom is 'do not turn back/away my face.' It means not
    to reject the petitioner. I retained the Hebrew idiom in English because the king
    repeats it in the next clause, and preserving the repetition aids auditability
    and literary cohesion.
- source_word: שַׁאֲלִי
  chosen: Ask
  alternatives:
  - Make your request
  - Request it
  lexicon: HALOT
  rationale: Imperative of שאל. 'Ask' is concise and mirrors the Hebrew directly.
- source_word: אִמִּי
  chosen: my mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The possessive suffix is explicit and carries filial respect in the court
    setting; 'my mother' preserves that nuance.
- source_word: לֹא אָשִׁיב אֶת פָּנָיִךְ
  chosen: I will not turn away your face
  alternatives:
  - I will not refuse you
  - I will not turn back your face
  lexicon: HALOT
  rationale: This repeats the earlier idiom with the second-person suffix. Preserving
    the same English wording reflects the deliberate verbal echo in Hebrew, while
    a footnote can clarify the idiomatic sense.
