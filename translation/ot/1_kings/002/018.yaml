id: 1KI.2.18
reference: 1 Kings 2:18
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר בַּת שֶׁ֖בַע ט֑וֹב אָנֹכִ֕י אֲדַבֵּ֥ר עָלֶ֖י/ךָ אֶל הַ/מֶּֽלֶךְ־־׃
translation:
  text: Bathsheba said, “Good; I will speak to the king for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “about you” or “on your behalf.” The Hebrew phrase can denote speaking
      concerning someone, and in context likely implies intercession for Adonijah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; 'said' is the natural
    English narrative rendering.
- source_word: בַּת שֶׁבַע
  chosen: Bathsheba
  alternatives:
  - Bat-sheba
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy rather than translated
    literally ('daughter of oath'/'daughter of seven'). Standard English form is 'Bathsheba'.
- source_word: טוֹב
  chosen: Good
  alternatives:
  - Very well
  - It is good
  lexicon: HALOT
  rationale: Here טוב functions as a brief approving response. 'Good' preserves the
    concise force of the Hebrew while sounding natural in dialogue. 'Very well' is
    possible but slightly more interpretive.
- source_word: אָנֹכִי
  chosen: I
  lexicon: HALOT
  rationale: Independent pronoun adds explicit subject emphasis in Hebrew, but English
    normally includes the subject pronoun with the verb. No extra emphasis marker
    is required in translation.
- source_word: אֲדַבֵּר
  chosen: will speak
  alternatives:
  - will talk
  - will make a request
  lexicon: HALOT
  rationale: Piel imperfect of דבר here means to speak or address. 'Will speak' is
    the most direct rendering; 'make a request' would over-specify what is only implied
    by context.
- source_word: עָלֶיךָ
  chosen: for you
  alternatives:
  - about you
  - concerning you
  - on your behalf
  lexicon: HALOT
  rationale: The preposition על with דבר can mean 'speak concerning/about,' but in
    this court-intercession context the sense is beneficial representation. 'For you'
    is idiomatic and captures the likely force without excessive formality; 'on your
    behalf' is a viable but more formal alternative.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to the King
  lexicon: HALOT
  rationale: Literal rendering of the prepositional phrase. Lowercase 'king' is appropriate
    because this is a royal office, not a divine title.
