id: 1KI.2.6
reference: 1 Kings 2:6
source:
  edition: WLC
  text: וְ/עָשִׂ֖יתָ כְּ/חָכְמָתֶ֑/ךָ וְ/לֹֽא תוֹרֵ֧ד שֵׂיבָת֛/וֹ בְּ/שָׁלֹ֖ם שְׁאֹֽל־׃ס
translation:
  text: Act according to your wisdom, and do not let his gray head go down to Sheol
    in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not bring his gray head down to Sheol in peace.'
    reason: lexical_alternative
  - marker: b
    text: '''Sheol'' is the Hebrew term for the realm of the dead; alternatively,
      ''the grave.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: Act
  alternatives:
  - Do
  - You shall do
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). In this context of David charging
    Solomon how to deal with Joab, concise imperative-like English 'Act' best captures
    the practical force without over-specifying the action.
- source_word: כְּחָכְמָתֶךָ
  chosen: according to your wisdom
  alternatives:
  - with your wisdom
  - as your wisdom dictates
  lexicon: HALOT
  rationale: The preposition כ plus 'your wisdom' indicates conformity to Solomon's
    discernment. 'According to your wisdom' is natural English and preserves the sense
    of acting in line with his judgment.
- source_word: וְלֹא תוֹרֵד
  chosen: do not let ... go down
  alternatives:
  - do not bring ... down
  - you must not send ... down
  lexicon: HALOT
  rationale: The Hiphil of ירד is causative, literally 'cause to go down.' In idiomatic
    English with the object 'his gray head,' 'do not let ... go down' preserves the
    causative sense while sounding natural. 'Bring down' is possible but can suggest
    merely lowering rather than causing death/judgment.
- source_word: שֵׂיבָתוֹ
  chosen: his gray head
  alternatives:
  - his gray hair
  - his old age
  lexicon: HALOT
  rationale: The noun refers to gray hair/old age. In this idiom, 'gray head' is a
    conventional and vivid English equivalent that preserves the Hebrew imagery of
    an elderly man.
- source_word: בְּשָׁלֹם
  chosen: in peace
  alternatives:
  - peacefully
  - unharmed
  lexicon: HALOT
  rationale: שלום here denotes a peaceful condition or peaceful end. 'In peace' preserves
    the Hebrew prepositional phrase and fits the idiom of dying without punitive reckoning.
- source_word: שְׁאֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best retained as 'Sheol' rather than flattened to 'the grave,'
    since the Hebrew term can denote the underworld/the realm of the dead more broadly.
    Transliteration preserves the source-world concept and avoids over-interpretation.
