theological_decisions:
- issue: Rendering of שְׁאֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: This is not a direct doctrinally contested term in the provided table,
    but it carries theological freight. Transliteration preserves the Hebrew concept
    without forcing a narrower interpretation such as mere burial place. The context
    is David's charge that Joab not die a peaceful, unpunished death.
  doctrine_reference: Translation philosophy §1, §3
