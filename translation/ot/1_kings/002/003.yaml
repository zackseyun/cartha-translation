theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of לְמַעַן תַּשְׂכִּיל
  chosen_reading: so that you may prosper
  alternative_readings:
  - so that you may act wisely
  - so that you may succeed
  rationale: 'This is not a doctrinal dispute but a semantic-theological nuance: the
    verse links covenant obedience with wise, successful kingship. ''Prosper'' communicates
    the result without importing a later prosperity-gospel framework, since the context
    is covenantal fidelity under Mosaic law.'
