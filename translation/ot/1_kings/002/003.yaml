id: 1KI.2.3
reference: 1 Kings 2:3
source:
  edition: WLC
  text: וְ/שָׁמַרְתָּ֞ אֶת מִשְׁמֶ֣רֶת יְהוָ֣ה אֱלֹהֶ֗י/ךָ לָ/לֶ֤כֶת בִּ/דְרָכָי/ו֙
    לִ/שְׁמֹ֨ר חֻקֹּתָ֤י/ו מִצְוֺתָי/ו֙ וּ/מִשְׁפָּטָ֣י/ו וְ/עֵדְוֺתָ֔י/ו כַּ/כָּת֖וּב
    בְּ/תוֹרַ֣ת מֹשֶׁ֑ה לְמַ֣עַן תַּשְׂכִּ֗יל אֵ֚ת כָּל אֲשֶׁ֣ר תַּֽעֲשֶׂ֔ה וְ/אֵ֛ת
    כָּל אֲשֶׁ֥ר תִּפְנֶ֖ה שָֽׁם־׀־־׃
translation:
  text: And keep the charge of the LORD your God by walking in his ways and by keeping
    his statutes, his commandments, his judgments, and his testimonies, as it is written
    in the Law of Moses, so that you may prosper in all that you do and wherever you
    turn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that you may act wisely' or 'so that you may succeed.' The Hebrew
      verb can emphasize wise conduct or the success that flows from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  chosen: And keep
  alternatives:
  - And you shall keep
  - And observe
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this exhortational context functions
    as an imperative-like continuation of David's charge. 'Keep' preserves the covenantal
    obedience sense better than a more generic 'observe'.
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the requirement
  - the obligation
  - what is to be kept
  lexicon: HALOT
  rationale: The noun denotes an entrusted duty or charge. 'Charge' is idiomatic in
    covenantal/legal contexts and fits the following infinitives that unpack what
    the charge consists of.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; paired with the divine name
    in standard covenantal formula.
- source_word: לָלֶכֶת בִּדְרָכָיו
  chosen: by walking in his ways
  alternatives:
  - to walk in his ways
  - by following his ways
  lexicon: HALOT
  rationale: The infinitive explains how the charge is kept. 'Walking in his ways'
    preserves the Hebrew metaphor and remains natural English.
- source_word: לִשְׁמֹר
  chosen: and by keeping
  alternatives:
  - to keep
  - and to keep
  lexicon: HALOT
  rationale: Coordinates with the previous infinitive phrase and expresses means.
    'By keeping' makes the syntax smooth in English while preserving the infinitival
    force.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal/covenantal lists; preserves
    distinction from the other legal terms in the sequence.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' is the conventional and precise rendering in Torah
    contexts.'
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: The term often refers to judicial decisions or legal judgments. 'Judgments'
    preserves the lexical distinction from statutes and commandments, though 'ordinances'
    is possible.
- source_word: עֵדְוֺתָיו
  chosen: his testimonies
  alternatives:
  - his decrees
  - his covenant stipulations
  lexicon: HALOT
  rationale: Though somewhat formal, 'testimonies' is the established rendering for
    עֵדוֹת and preserves its distinct covenant-witness nuance in legal lists.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  lexicon: HALOT
  rationale: Passive participial expression introducing scriptural norm; 'as it is
    written' is natural and accurate.
- source_word: בְּתוֹרַת מֹשֶׁה
  chosen: in the Law of Moses
  alternatives:
  - in the instruction of Moses
  - in Moses' law
  lexicon: HALOT
  rationale: תוֹרָה can mean 'instruction,' but in this royal-covenantal context referring
    to the Mosaic written corpus, 'Law of Moses' is the clearest established English
    rendering.
- source_word: לְמַעַן תַּשְׂכִּיל
  chosen: so that you may prosper
  alternatives:
  - so that you may act wisely
  - so that you may succeed
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can denote acting wisely or having success/prosperity
    as the result of wise action. In this context, with the following comprehensive
    phrases about all David/Solomon does, 'prosper' best captures the practical outcome
    emphasized in many similar Deuteronomistic contexts.
- source_word: אֵת כָּל אֲשֶׁר תַּעֲשֶׂה
  chosen: in all that you do
  alternatives:
  - in everything that you do
  lexicon: HALOT
  rationale: Idiomatic rendering of the object marker plus relative clause; preserves
    the comprehensive scope.
- source_word: וְאֵת כָּל אֲשֶׁר תִּפְנֶה שָׁם
  chosen: and wherever you turn
  alternatives:
  - and in all that you turn to there
  - and wherever you go
  lexicon: HALOT
  rationale: The idiom with פנה plus שׁם conveys turning oneself toward some direction
    or undertaking. 'Wherever you turn' is concise and natural, preserving the metaphor
    of direction rather than flattening it to mere movement.
