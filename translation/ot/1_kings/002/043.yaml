id: 1KI.2.43
reference: 1 Kings 2:43
source:
  edition: WLC
  text: וּ/מַדּ֕וּעַ לֹ֣א שָׁמַ֔רְתָּ אֵ֖ת שְׁבֻעַ֣ת יְהוָ֑ה וְ/אֶת הַ/מִּצְוָ֖ה אֲשֶׁר צִוִּ֥יתִי עָלֶֽי/ךָ־־׃
translation:
  text: Why then have you not kept the oath of Yahweh and the command that I commanded you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the oath to the LORD'—that is, the oath made in the LORD's name or under his authority.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the command that I commanded you.' The Hebrew literally says 'the command that I commanded upon you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַדּוּעַ
  chosen: Why then
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: Interrogative adverb meaning 'why?'; the prefixed conjunction can be represented idiomatically as 'then' in English to connect with the preceding accusation rather than woodenly 'and why.'
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation directly modifying the verb.
- source_word: שָׁמַרְתָּ
  chosen: have you not kept
  alternatives:
  - did you not keep
  - have you not observed
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, observe, guard.' 'Kept' is natural with both 'oath' and 'command' in English and preserves the covenantal-obligational sense.
- source_word: אֵת שְׁבֻעַת יְהוָה
  chosen: the oath of the LORD
  alternatives:
  - the oath to the LORD
  - the sworn oath of the LORD
  lexicon: HALOT
  rationale: Construct phrase most naturally rendered 'the oath of the LORD,' i.e., the oath invoking/bound before YHWH. In context this refers to the oath made under the LORD's authority, not an oath spoken by the LORD himself. The traditional covenant-name rendering follows doctrine guidance for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֶת הַמִּצְוָה
  chosen: and the command
  alternatives:
  - and the commandment
  - and the order
  lexicon: HALOT
  rationale: מִצְוָה denotes a command or injunction. 'Command' is more natural modern English than 'commandment' here and fits royal speech.
- source_word: אֲשֶׁר צִוִּיתִי
  chosen: that I laid on you
  alternatives:
  - that I commanded you
  - which I commanded you
  lexicon: HALOT
  rationale: Although צוה straightforwardly means 'command,' the following עָלֶיךָ literally has the sense 'upon you.' 'Laid on you' preserves that nuance of an imposed obligation while remaining idiomatic. The alternative 'commanded you' is possible but less reflective of the prepositional phrase.
- source_word: עָלֶיךָ
  chosen: on you
  alternatives:
  - upon you
  - to you
  lexicon: HALOT
  rationale: The preposition עַל with second masculine singular suffix is best preserved as 'on/upon you,' conveying obligation placed upon the person rather than merely speech directed 'to' him.
