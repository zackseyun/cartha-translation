id: 1KI.2.8
reference: 1 Kings 2:8
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה עִ֠מְּ/ךָ שִֽׁמְעִ֨י בֶן גֵּרָ֥א בֶן הַ/יְמִינִי֮ מִ/בַּחֻרִים֒
    וְ/ה֤וּא קִֽלְלַ֨/נִי֙ קְלָלָ֣ה נִמְרֶ֔צֶת בְּ/י֖וֹם לֶכְתִּ֣/י מַחֲנָ֑יִם וְ/הֽוּא
    יָרַ֤ד לִ/קְרָאתִ/י֙ הַ/יַּרְדֵּ֔ן וָ/אֶשָּׁ֨בַֽע ל֤/וֹ בַֽ/יהוָה֙ לֵ/אמֹ֔ר אִם
    אֲמִֽיתְ/ךָ֖ בֶּ/חָֽרֶב־־־־׃
translation:
  text: And look, with you is Shimei son of Gera, the Benjaminite from Bahurim, and
    he cursed me with a grievous curse on the day I went to Mahanaim. But he came
    down to meet me at the Jordan, and I swore to him by the LORD, saying, ‘I will
    not put you to death with the sword.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'if I put you to death with the sword,' an elliptical
      oath formula meaning 'I will not put you to death with the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  - See
  lexicon: HALOT
  rationale: Introduces attention to a significant person/situation. 'And look' preserves
    the deictic force in readable modern English better than the more archaic 'behold.'
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - by you
  - in your company
  lexicon: HALOT
  rationale: The preposition with 2ms suffix indicates Shimei is presently among Solomon's
    sphere or court; 'with you' is the most natural and sufficiently literal rendering.
- source_word: שִׁמְעִי בֶן־גֵּרָא בֶן־הַיְמִינִי
  chosen: Shimei son of Gera, the Benjaminite
  alternatives:
  - Shimei the son of Gera, son of the Benjaminite
  - Shimei son of Gera, son of a man of Benjamin
  lexicon: HALOT
  rationale: Transliterates the personal names and renders the gentilic הימיני idiomatically
    as 'the Benjaminite.' The repeated 'son of' before the gentilic is naturally compressed
    in English.
- source_word: מִבַּחֻרִים
  chosen: from Bahurim
  alternatives:
  - of Bahurim
  lexicon: HALOT
  rationale: Marks place of origin; 'from Bahurim' is standard and clear.
- source_word: קִלְּלַנִי קְלָלָה
  chosen: cursed me with a ... curse
  alternatives:
  - uttered a curse against me
  - reviled me with a ... curse
  lexicon: HALOT
  rationale: Preserves the Hebrew cognate construction for emphasis while keeping
    idiomatic English. The repetition intensifies the act rather than merely stating
    'he cursed me.'
- source_word: נִמְרֶצֶת
  chosen: grievous
  alternatives:
  - harsh
  - violent
  - painful
  - vehement
  lexicon: HALOT
  rationale: The adjective conveys severity/intensity. 'Grievous' captures the weight
    of the denunciation without over-specifying physical violence.
- source_word: בְּיוֹם לֶכְתִּי מַחֲנָיִם
  chosen: on the day I went to Mahanaim
  alternatives:
  - when I was going to Mahanaim
  - on the day of my going to Mahanaim
  lexicon: HALOT
  rationale: A straightforward temporal clause. 'Went to Mahanaim' is natural English
    and preserves the directional sense.
- source_word: יָרַד לִקְרָאתִי
  chosen: came down to meet me
  alternatives:
  - went down to meet me
  - came to meet me
  lexicon: HALOT
  rationale: '''Came down'' preserves the motion verb ירד while fitting the narrator''s
    perspective. ''To meet me'' accurately renders לקראתי.'
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The river name is commonly rendered 'the Jordan'; 'River' is unnecessary
    in context.
- source_word: וָאֶשָּׁבַע לוֹ בַיהוָה
  chosen: I swore to him by the LORD
  alternatives:
  - I took an oath to him by the LORD
  - I swore to him in the LORD's name
  lexicon: HALOT
  rationale: Retains the oath formula and follows the project default rendering of
    יהוה as 'the LORD.'
- source_word: אִם אֲמִיתְךָ בֶּחָרֶב
  chosen: I will not put you to death with the sword
  alternatives:
  - surely I will not kill you with the sword
  - if I put you to death with the sword
  lexicon: HALOT
  rationale: Although אִם literally reads 'if,' in oath contexts it functions elliptically,
    with the imprecation omitted; the sense is a strong negative oath. English should
    make the intended meaning explicit rather than preserve a misleading literal 'if.'
    'Put you to death' is slightly more formal and fits royal/judicial context.
