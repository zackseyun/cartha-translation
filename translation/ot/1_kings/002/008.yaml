theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible convention while remaining transparent
    in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of oath formula אִם אֲמִיתְךָ בֶּחָרֶב
  chosen_reading: 'explicit negative oath: ''I will not put you to death with the
    sword'''
  alternative_readings:
  - more literal but potentially misleading 'if I put you to death with the sword'
  rationale: The Hebrew oath formula is elliptical and idiomatically expresses a negative
    commitment. Rendering the implied negation in the main text preserves the actual
    force of David's sworn statement for modern readers.
