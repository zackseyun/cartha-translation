id: 1KI.2.24
reference: 1 Kings 2:24
source:
  edition: WLC
  text: וְ/עַתָּ֗ה חַי יְהוָה֙ אֲשֶׁ֣ר הֱכִינַ֗/נִי ו/יושיבי/ני עַל כִּסֵּא֙ דָּוִ֣ד אָבִ֔/י וַ/אֲשֶׁ֧ר עָֽשָׂה לִ֛/י בַּ֖יִת כַּ/אֲשֶׁ֣ר דִּבֵּ֑ר כִּ֣י הַ/יּ֔וֹם יוּמַ֖ת אֲדֹנִיָּֽהוּ־־־׃
translation:
  text: And now, as Yahweh lives, who has established me and seated me on the throne of David my father, and who has made for me a house as he promised, surely Adonijah shall be put to death today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has established a dynasty for me.' The Hebrew 'house' here likely carries the royal sense of a lasting family line, not merely a physical building.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: as the LORD lives
  alternatives:
  - by the life of the LORD
  - the LORD lives
  lexicon: HALOT
  rationale: Standard Hebrew oath formula. Rendering with 'as the LORD lives' preserves the idiomatic force in natural English while keeping the explicit appeal to YHWH's living reality. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֱכִינַנִי
  chosen: has established me
  alternatives:
  - has confirmed me
  - has made me secure
  lexicon: HALOT
  rationale: The verb כון in the Hiphil commonly carries the sense of establishing, making firm, or confirming. 'Has established me' fits the royal context and pairs well with the following enthronement clause.
- source_word: וַיּוֹשִׁיבֵנִי עַל כִּסֵּא
  chosen: and seated me on the throne
  alternatives:
  - and caused me to sit on the throne
  - and set me on the throne
  lexicon: HALOT
  rationale: The causative sense of ישׁב in Hiphil is preserved by 'seated me.' This is idiomatic English and clearly conveys enthronement.
- source_word: כִּסֵּא דָּוִד אָבִי
  chosen: the throne of David my father
  alternatives:
  - David my father's throne
  lexicon: HALOT
  rationale: Both are possible in English; the chosen rendering stays closer to the Hebrew construct chain while remaining natural.
- source_word: עָשָׂה לִי בַּיִת
  chosen: has made for me a house
  alternatives:
  - has established a house for me
  - has made me a dynasty
  lexicon: HALOT
  rationale: In royal covenantal contexts, 'house' can denote a dynastic line rather than a physical building. Here the idiom likely refers to dynastic establishment, but the Hebrew says 'house.' To preserve that theological and lexical texture without over-paraphrasing, the main text keeps 'house,' while an explanatory alternative is preserved in a footnote.
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: as he promised
  alternatives:
  - as he spoke
  - just as he said
  lexicon: HALOT
  rationale: Although the verb is literally 'spoke,' in this context of divine commitment 'promised' best conveys the force in clear modern English.
- source_word: כִּי
  chosen: surely
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the emphatic content of Solomon's oath and declaration. 'Surely' captures the asseverative force better than a wooden 'for.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent.'
- source_word: יוּמַת
  chosen: shall be put to death
  alternatives:
  - shall surely die
  - must be executed
  lexicon: HALOT
  rationale: 'The Hophal of מות is causative/passive: ''be put to death'' or ''be executed.'' ''Shall be put to death'' is both accurate and formal enough for a royal death sentence. ''Shall surely die'' would obscure the passive-causative nuance.'
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy.
