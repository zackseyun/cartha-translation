theological_decisions:
- issue: Meaning of 'house' in royal covenant language
  chosen_reading: Retain 'house' in the main text while allowing dynastic sense to remain implicit
  alternative_readings:
  - Render directly as 'dynasty'
  - Render as 'royal house'
  rationale: The Hebrew idiom בַּיִת in Davidic/royal contexts often refers to a dynastic line. However, the source text itself uses 'house,' and the translation philosophy forbids paraphrasing beyond what the source warrants. Keeping 'house' preserves intertextual links to the Davidic promise while a footnote can clarify the dynastic nuance.
  doctrine_reference: Translation philosophy §§1, 3, 5
