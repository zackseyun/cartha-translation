id: 1KI.2.22
reference: 1 Kings 2:22
source:
  edition: WLC
  text: וַ/יַּעַן֩ הַ/מֶּ֨לֶךְ שְׁלֹמֹ֜ה וַ/יֹּ֣אמֶר לְ/אִמּ֗/וֹ וְ/לָ/מָה֩ אַ֨תְּ
    שֹׁאֶ֜לֶת אֶת אֲבִישַׁ֤ג הַ/שֻּׁנַמִּית֙ לַ/אֲדֹ֣נִיָּ֔הוּ וְ/שַֽׁאֲלִי ל/וֹ֙
    אֶת הַ/מְּלוּכָ֔ה כִּ֛י ה֥וּא אָחִ֖/י הַ/גָּד֣וֹל מִמֶּ֑/נִּי וְ/ל/וֹ֙ וּ/לְ/אֶבְיָתָ֣ר
    הַ/כֹּהֵ֔ן וּ/לְ/יוֹאָ֖ב בֶּן צְרוּיָֽה־־־־׃פ
translation:
  text: King Solomon answered and said to his mother, “And why are you asking for
    Abishag the Shunammite for Adonijah? Ask for the kingship for him as well, since
    he is my older brother—and for him, and for Abiathar the priest, and for Joab
    son of Zeruiah!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the kingdom” or “the throne.” The Hebrew term can denote royal rule
      more broadly; here “the kingship” highlights Solomon’s point that Adonijah’s
      request carries dynastic implications.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative verb for responding in speech. 'Answered' preserves
    the Hebrew discourse pattern and pairs naturally with the following 'said.'
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English naturally renders the appositional phrase as the title plus name.
    This preserves both the office and the personal name.
- source_word: וַיֹּאמֶר לְאִמּוֹ
  chosen: said to his mother
  alternatives:
  - said to his mother Bathsheba
  lexicon: HALOT
  rationale: The Hebrew says only 'to his mother'; supplying Bathsheba would add information
    from context rather than this verse.
- source_word: וְלָמָה
  chosen: And why
  alternatives:
  - Why then
  - Why
  lexicon: HALOT
  rationale: The prefixed conjunction is retained because it contributes to the rhetorical
    force and continuity of Solomon's response.
- source_word: אַתְּ שֹׁאֶלֶת
  chosen: are you asking
  alternatives:
  - do you ask
  - are you requesting
  lexicon: HALOT
  rationale: The participle conveys an ongoing or immediate action in direct speech;
    English present progressive captures this well.
- source_word: אֶת אֲבִישַׁג הַשֻּׁנַמִּית
  chosen: Abishag the Shunammite
  alternatives:
  - Abishag of Shunem
  lexicon: HALOT
  rationale: The gentilic is most idiomatically rendered 'the Shunammite' in English
    Bible style and clearly identifies her.
- source_word: לַאֲדֹנִיָּהוּ
  chosen: for Adonijah
  alternatives:
  - on behalf of Adonijah
  lexicon: HALOT
  rationale: The preposition marks the beneficiary of the request. 'For Adonijah'
    is concise and natural.
- source_word: וְשַׁאֲלִי לוֹ
  chosen: Ask for him as well
  alternatives:
  - Then ask for him
  - Ask also for him
  lexicon: HALOT
  rationale: Imperative plus indirect object in a sarcastic/rhetorical context. 'As
    well' brings out the additive force of the conjunction and the escalating irony.
- source_word: אֶת הַמְּלוּכָה
  chosen: the kingship
  alternatives:
  - the kingdom
  - the throne
  - the royal rule
  lexicon: HALOT
  rationale: In this context the issue is royal authority/right to reign, not merely
    territory. 'Kingship' best captures the political claim implied by Solomon's response.
- source_word: כִּי הוּא אָחִי הַגָּדוֹל מִמֶּנִּי
  chosen: since he is my older brother
  alternatives:
  - for he is my elder brother
  - because he is my older brother than I
  lexicon: HALOT
  rationale: This gives Solomon's stated rationale in idiomatic modern English. 'Older
    brother' is natural and preserves the birth-order emphasis.
- source_word: וְלוֹ וּלְאֶבְיָתָר הַכֹּהֵן וּלְיוֹאָב בֶּן צְרוּיָה
  chosen: —and for him, and for Abiathar the priest, and for Joab son of Zeruiah!
  alternatives:
  - and for him, for Abiathar the priest, and for Joab son of Zeruiah
  - for him indeed, and for Abiathar the priest, and for Joab son of Zeruiah
  lexicon: HALOT
  rationale: The Hebrew is elliptical, continuing the object of 'ask' and naming Adonijah's
    apparent allies. Repeating 'for' in English preserves the structure and rhetorical
    indignation. The dash reflects the abrupt, climactic addition.
- source_word: בֶּן צְרוּיָה
  chosen: son of Zeruiah
  lexicon: HALOT
  rationale: Standard literal rendering of the patronymic/matronymic expression; no
    reason to paraphrase.
