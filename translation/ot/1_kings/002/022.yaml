theological_decisions:
- issue: Political-theological implication of Abishag request
  chosen_reading: Render Solomon's response as implying that requesting Abishag amounts
    to seeking royal authority.
  alternative_readings:
  - Render more neutrally and leave the implication entirely implicit.
  rationale: The Hebrew itself makes the implication explicit through 'Ask for him
    the kingship as well.' Translating הַמְּלוּכָה as 'the kingship' preserves the
    political significance without adding extra explanation beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
