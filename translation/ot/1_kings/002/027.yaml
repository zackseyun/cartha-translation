id: 1KI.2.27
reference: 1 Kings 2:27
source:
  edition: WLC
  text: וַ/יְגָ֤רֶשׁ שְׁלֹמֹה֙ אֶת אֶבְיָתָ֔ר מִ/הְי֥וֹת כֹּהֵ֖ן לַֽ/יהוָ֑ה לְ/מַלֵּא֙
    אֶת דְּבַ֣ר יְהוָ֔ה אֲשֶׁ֥ר דִּבֶּ֛ר עַל בֵּ֥ית עֵלִ֖י בְּ/שִׁלֹֽה־־־׃פ
translation:
  text: So Solomon drove Abiathar out from being priest to the LORD, fulfilling the
    word of the LORD that he had spoken concerning the house of Eli in Shiloh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in order to fulfill the word of the LORD.' The Hebrew may express purpose
      or result.
    reason: alternative_reading
  - marker: b
    text: See 1 Samuel 2:27–36 and 3:11–14 regarding the word spoken against the house
      of Eli.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  chosen: drove ... out
  alternatives:
  - banished
  - expelled
  - cast out
  lexicon: HALOT
  rationale: The verb גרשׁ commonly denotes driving out or expelling. 'Drove ... out'
    preserves the force of removal more vividly than the softer 'dismissed' and fits
    the direct object Abiathar.
- source_word: מִהְיוֹת כֹּהֵן
  chosen: from being priest
  alternatives:
  - so that he would no longer be priest
  - from serving as priest
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive of היה marks removal from a state
    or role. 'From being priest' is close to the Hebrew structure while remaining
    natural English.
- source_word: כֹּהֵן לַיהוָה
  chosen: priest to the LORD
  alternatives:
  - priest of the LORD
  - the LORD's priest
  lexicon: HALOT
  rationale: The lamed here marks relation/service. 'Priest to the LORD' is a fairly
    literal rendering that preserves the sense of priestly service directed toward
    YHWH; 'priest of the LORD' would also be acceptable but is slightly less transparent
    to the Hebrew construction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' This also matches established English Bible convention while respecting
    the source term.
- source_word: לְמַלֵּא
  chosen: fulfilling
  alternatives:
  - to fulfill
  - in order to fulfill
  lexicon: HALOT
  rationale: The infinitive with ל expresses result or purpose in context. 'Fulfilling'
    connects Solomon's action with the outworking of the prior divine word in smooth
    English without overstating intentionality.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the promise of the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: '''Word of the LORD'' is the standard and contextually appropriate rendering
    for divine speech, especially where a prior pronouncement is being brought to
    completion.'
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had spoken
  alternatives:
  - which he spoke
  - that he said
  lexicon: HALOT
  rationale: English past perfect clarifies that the divine speech preceded Solomon's
    action. The pronoun refers back to the LORD.
- source_word: עַל בֵּית עֵלִי
  chosen: concerning the house of Eli
  alternatives:
  - against the house of Eli
  - about Eli's house
  lexicon: HALOT
  rationale: The preposition עַל can mean 'concerning' or, in judgment contexts, 'against.'
    Here 'concerning' is broad and accurate, while the judgmental force is supplied
    by the larger narrative context.
- source_word: בְּשִׁלֹה
  chosen: in Shiloh
  alternatives:
  - at Shiloh
  lexicon: HALOT
  rationale: Both are possible for ב with a place name. 'In Shiloh' is straightforward
    and idiomatic enough in English, while preserving the locative sense.
