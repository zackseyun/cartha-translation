theological_decisions:
- issue: Relationship between Solomon's action and divine prophecy
  chosen_reading: Solomon's expulsion of Abiathar is presented as the fulfillment
    of a prior word from the LORD concerning Eli's house.
  alternative_readings:
  - The clause could be read more strictly as purpose ('in order to fulfill') rather
    than result ('fulfilling').
  rationale: The Hebrew infinitive לְמַלֵּא can express purpose or result. In narrative
    context, the verse highlights that Solomon's action brought to completion the
    previously spoken judgment on Eli's house. Rendering it as 'fulfilling' preserves
    this theological connection without asserting Solomon's inner motive beyond the
    text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
