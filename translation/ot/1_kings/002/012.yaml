id: 1KI.2.12
reference: 1 Kings 2:12
source:
  edition: WLC
  text: וּ/שְׁלֹמֹ֕ה יָשַׁ֕ב עַל כִּסֵּ֖א דָּוִ֣ד אָבִ֑י/ו וַ/תִּכֹּ֥ן מַלְכֻת֖/וֹ
    מְאֹֽד־׃
translation:
  text: And Solomon sat on the throne of David his father, and his kingdom was firmly
    established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his reign was very secure' or 'his kingship was firmly established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  chosen: sat on
  alternatives:
  - took his seat on
  - dwelt on
  lexicon: HALOT
  rationale: In royal succession context with עַל כִּסֵּא ('on the throne'), the verb
    denotes enthronement/occupying the royal seat. 'Sat on' is a natural, sufficiently
    formal rendering that preserves the imagery without over-paraphrasing.
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: In combination with royal language and Davidic succession, 'throne' is
    the clear contextual sense rather than the more generic 'seat'.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: The immediate referent is David, Solomon's literal father, so the straightforward
    familial rendering is best.
- source_word: וַתִּכֹּן
  chosen: was firmly established
  alternatives:
  - was established
  - was made secure
  - was confirmed
  lexicon: HALOT
  rationale: כון in the Niphal commonly conveys being established, fixed, or made
    secure. The adverb מְאֹד intensifies the statement, so 'firmly established' captures
    both the passive/resultative sense and the strengthening nuance in idiomatic English.
- source_word: מַלְכֻתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingship, reign, or kingdom. Here the statement concerns
    the stability of Solomon's royal rule after accession. 'His kingdom' is idiomatic
    and broad enough to include both realm and royal dominion; 'his reign' is possible
    but slightly more interpretive.
- source_word: מְאֹד
  chosen: firmly
  alternatives:
  - greatly
  - very
  - exceedingly
  lexicon: HALOT
  rationale: 'Rather than rendering מְאֹד woodenly as a separate ''very,'' English
    expresses the intensification more naturally by modifying the predicate: ''was
    firmly established.'' This preserves the force without awkwardness.'
