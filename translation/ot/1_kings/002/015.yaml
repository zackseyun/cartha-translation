id: 1KI.2.15
reference: 1 Kings 2:15
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אַ֤תְּ יָדַ֨עַתְּ֙ כִּי לִ/י֙ הָיְתָ֣ה הַ/מְּלוּכָ֔ה וְ/עָלַ֞/י שָׂ֧מוּ כָֽל יִשְׂרָאֵ֛ל פְּנֵי/הֶ֖ם לִ/מְלֹ֑ךְ וַ/תִּסֹּ֤ב הַ/מְּלוּכָה֙ וַ/תְּהִ֣י לְ/אָחִ֔/י כִּ֥י מֵ/יְהוָ֖ה הָ֥יְתָה לּֽ/וֹ־־׃
translation:
  text: And he said, “You know that the kingdom was mine, and that all Israel had set their faces on me to reign; but the kingdom turned and became my brother’s, for it was his from Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all Israel had looked to me to reign.” The Hebrew idiom is literally “had set their faces on me.”
    reason: lexical_alternative
  - marker: b
    text: Or “for it came to him from the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: Refers to the royal office/reign. 'Kingdom' is the most natural English rendering here and fits the political succession context, though 'kingship' is a possible more formal alternative.
- source_word: וְעָלַי שָׂמוּ כָל־יִשְׂרָאֵל פְּנֵיהֶם
  chosen: all Israel had set their faces on me
  alternatives:
  - all Israel had fixed their attention on me
  - all Israel had looked to me
  lexicon: HALOT
  rationale: The idiom שׂוּם פָּנִים עַל means to direct oneself toward someone or something with intention/expectation. 'Set their faces on me' preserves the Hebrew imagery while remaining understandable in English.
- source_word: לִמְלֹךְ
  chosen: to reign
  alternatives:
  - to become king
  - to rule as king
  lexicon: HALOT
  rationale: Infinitive of מלך in this context denotes exercising kingship. 'To reign' is concise and idiomatic after 'set their faces on me.'
- source_word: וַתִּסֹּב
  chosen: turned
  alternatives:
  - changed course
  - shifted
  lexicon: HALOT
  rationale: From סבב/סוּב, here describing a reversal or transfer in the course of events. 'Turned' preserves the metaphor without overinterpreting the mechanism.
- source_word: וַתְּהִי לְאָחִי
  chosen: became my brother’s
  alternatives:
  - came to my brother
  - belonged to my brother
  lexicon: HALOT
  rationale: Expresses transfer of the kingdom to Solomon. 'Became my brother’s' is natural English and keeps the possessive force of לְ.
- source_word: כִּי מֵיְהוָה הָיְתָה לּוֹ
  chosen: for it was his from the LORD
  alternatives:
  - for it came to him from the LORD
  - for it belonged to him by the LORD's will
  lexicon: HALOT
  rationale: The clause grounds the transfer in divine determination. 'From the LORD' preserves the preposition מִן and avoids adding interpretive wording beyond the text. The pronoun 'it' refers back to the kingdom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָחִי
  chosen: my brother
  lexicon: HALOT
  rationale: Straightforward familial term referring to Solomon from Adonijah's perspective.
