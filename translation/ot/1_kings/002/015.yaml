theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of explicitness in the final clause about divine appointment
  chosen_reading: for it was his from the LORD
  alternative_readings:
  - for it came to him from the LORD
  - for the LORD gave it to him
  rationale: The Hebrew states that the kingdom 'was to him/from the LORD' without explicitly using a verb of giving. The chosen wording preserves the theological claim of divine source without importing a stronger paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
