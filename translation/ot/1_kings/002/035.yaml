id: 1KI.2.35
reference: 1 Kings 2:35
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן הַ/מֶּ֜לֶךְ אֶת בְּנָיָ֧הוּ בֶן יְהוֹיָדָ֛ע תַּחְתָּ֖י/ו עַל הַ/צָּבָ֑א
    וְ/אֶת צָד֤וֹק הַ/כֹּהֵן֙ נָתַ֣ן הַ/מֶּ֔לֶךְ תַּ֖חַת אֶבְיָתָֽר־־־־׃
translation:
  text: And the king appointed Benaiah son of Jehoiada in his place over the army,
    and the king appointed Zadok the priest in place of Abiathar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in his place''; the pronoun refers to the previously displaced
      commander, Joab, from the immediate context.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  chosen: appointed
  alternatives:
  - set
  - put
  - placed
  - gave
  lexicon: HALOT
  rationale: Although the verb is literally 'gave/put,' in this administrative context
    it denotes installing someone into office. 'Appointed' communicates the idiomatic
    sense in natural English without over-paraphrasing.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the previously removed officeholder
    in context, here Joab. 'In his place' is concise and natural, preserving the substitution
    idea.
- source_word: עַל הַצָּבָא
  chosen: over the army
  alternatives:
  - over the host
  - over the military
  lexicon: HALOT
  rationale: צָבָא here refers to the military force, not a heavenly host. 'Over the
    army' clearly expresses Benaiah's command role.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: The appositional title identifies Zadok's office. 'The priest' is the
    straightforward rendering.
- source_word: תַּחַת אֶבְיָתָר
  chosen: in place of Abiathar
  alternatives:
  - instead of Abiathar
  lexicon: HALOT
  rationale: תַּחַת marks replacement in office. 'In place of Abiathar' preserves
    the succession sense.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  rationale: Standard Hebrew patronymic construction rendered directly and naturally
    in English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title rendered straightforwardly. Repeated in Hebrew before
    the second clause, and retained in English for fidelity and rhythm.
