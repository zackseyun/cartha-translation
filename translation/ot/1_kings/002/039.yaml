id: 1KI.2.39
reference: 1 Kings 2:39
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קֵּץ֙ שָׁלֹ֣שׁ שָׁנִ֔ים וַ/יִּבְרְח֤וּ שְׁנֵֽי עֲבָדִים֙ לְ/שִׁמְעִ֔י
    אֶל אָכִ֥ישׁ בֶּֽן מַעֲכָ֖ה מֶ֣לֶךְ גַּ֑ת וַ/יַּגִּ֤ידוּ לְ/שִׁמְעִי֙ לֵ/אמֹ֔ר
    הִנֵּ֥ה עֲבָדֶ֖י/ךָ בְּ/גַֽת־־־׃
translation:
  text: Now at the end of three years, two slaves of Shimei ran away to Achish son
    of Maacah, king of Gath. And they told Shimei, saying, “Look, your slaves are
    in Gath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' for 'slaves' (עֲבָדִים / עֲבָדֶיךָ); 'slaves' is used here
      because their bonded status is contextually prominent in their running away
      from their master.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שָׁלֹשׁ שָׁנִים
  chosen: at the end of three years
  alternatives:
  - after three years
  lexicon: HALOT
  rationale: The construct phrase literally denotes the end-point of a three-year
    period. 'At the end of three years' is slightly more formal and preserves the
    temporal contour better than the smoother 'after three years.'
- source_word: וַיִּבְרְחוּ
  chosen: ran away
  alternatives:
  - fled
  - escaped
  lexicon: HALOT
  rationale: The verb ברח means to flee/run away. 'Ran away' is natural modern English
    in the context of slaves leaving their master, while still accurately reflecting
    the motion and breach involved.
- source_word: עֲבָדִים / עֲבָדֶיךָ
  chosen: slaves
  alternatives:
  - servants
  lexicon: HALOT
  rationale: Although עבד can mean servant or slave depending on context, here the
    persons are explicitly Shimei's owned household laborers who can 'run away' and
    be retrieved. Per translation philosophy, 'slave' is preferred where bonded status
    is salient.
- source_word: אֶל אָכִישׁ
  chosen: to Achish
  alternatives:
  - unto Achish
  lexicon: HALOT
  rationale: The preposition marks movement toward a person. 'To Achish' is the natural
    modern rendering.
- source_word: בֶּן מַעֲכָה
  chosen: son of Maacah
  alternatives: []
  lexicon: HALOT
  rationale: Standard rendering of patronymic/filial identification. The proper names
    are transliterated per project philosophy.
- source_word: מֶלֶךְ גַּת
  chosen: king of Gath
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Achish's office and realm.
- source_word: וַיַּגִּידוּ לְשִׁמְעִי לֵאמֹר
  chosen: And they told Shimei, saying
  alternatives:
  - And it was reported to Shimei, saying
  - And they informed Shimei
  lexicon: HALOT
  rationale: The 3mp verb naturally takes an unspecified plural subject ('they told').
    Hebrew narrative often uses this idiom for reported information. Retaining 'saying'
    preserves the direct-speech introduction without sounding overly archaic.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the immediacy better than the archaic 'Behold.'
- source_word: בְּגַת
  chosen: in Gath
  alternatives:
  - at Gath
  lexicon: HALOT
  rationale: The preposition ב here marks location. 'In Gath' is the standard English
    rendering for residence/presence within a city.
