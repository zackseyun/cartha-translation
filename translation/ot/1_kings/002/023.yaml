id: 1KI.2.23
reference: 1 Kings 2:23
source:
  edition: WLC
  text: וַ/יִּשָּׁבַע֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה בַּֽ/יהוָ֖ה לֵ/אמֹ֑ר כֹּ֣ה יַֽעֲשֶׂה לִּ֤/י אֱלֹהִים֙ וְ/כֹ֣ה יוֹסִ֔יף כִּ֣י בְ/נַפְשׁ֔/וֹ דִּבֶּר֙ אֲדֹ֣נִיָּ֔הוּ אֶת הַ/דָּבָ֖ר הַ/זֶּֽה־־׃
translation:
  text: Then King Solomon swore by Yahweh, saying, “May God do so to me, and more also, for Adonijah has spoken this word against his own life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Yahweh.' The Hebrew divine name is יְהוָה.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew idiom: ''has spoken this word with/against his life,'' meaning he has said something that puts his life in jeopardy or costs him his life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  lexicon: HALOT
  rationale: The verb means to swear or take an oath. 'Swore' is the most natural concise English rendering in narrative context.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: The preposition with the divine name marks the one by whom the oath is sworn. Per doctrine, יְהוָה is rendered 'the LORD,' while 'Yahweh' is preserved as an alternative.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִיף
  chosen: May God do so to me, and more also
  alternatives:
  - Thus may God do to me, and thus may he add
  - May God do this to me and even more
  lexicon: HALOT
  rationale: This is a fixed oath formula invoking unspecified judgment. The idiomatic English 'May God do so to me, and more also' preserves both the imprecatory force and the conventional formula without over-paraphrasing.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this oath formula, אֱלֹהִים functions as a singular reference to God despite plural morphology, so singular English is required.
- source_word: כִּי
  chosen: if
  alternatives:
  - surely
  - that
  lexicon: HALOT
  rationale: In oath contexts, כִּי can introduce the content in a conditional-like way best rendered in English as 'if,' often implying the apodosis of self-curse if the statement is false or violated.
- source_word: בְנַפְשׁוֹ
  chosen: against his own life
  alternatives:
  - at the cost of his life
  - on pain of his life
  - with his life
  lexicon: HALOT
  rationale: The phrase literally involves 'his life/soul' and here idiomatically means that Adonijah has spoken in a way that endangers or forfeits his life. 'Against his own life' preserves the reflexive and judicial force without flattening it to a mere consequence statement.
- source_word: דִּבֶּר ... אֶת־הַדָּבָר הַזֶּה
  chosen: has spoken this word
  alternatives:
  - has said this
  - has spoken this matter
  lexicon: HALOT
  rationale: The Hebrew is literally 'spoken this word/thing.' 'Spoken this word' keeps the formal texture while remaining intelligible in English.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  rationale: Personal names are transliterated by standard English convention.
