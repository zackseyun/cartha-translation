id: 1KI.2.25
reference: 1 Kings 2:25
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה בְּ/יַ֖ד בְּנָיָ֣הוּ בֶן יְהוֹיָדָ֑ע וַ/יִּפְגַּע
    בּ֖/וֹ וַ/יָּמֹֽת־־׃ס
translation:
  text: So King Solomon sent Benaiah son of Jehoiada, and he struck him down, and
    he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'sent by the hand of Benaiah son of Jehoiada,' an idiom meaning
      he sent him as his agent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative form straightforwardly
    means 'sent.' 'Dispatched' is possible in context of an execution order, but 'sent'
    preserves the Hebrew's ordinary wording while allowing the following action to
    convey the lethal outcome.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as 'King Solomon.'
    This preserves both the royal title and the personal name without awkwardness.
- source_word: בְּיַד
  chosen: sent Benaiah son of Jehoiada
  alternatives:
  - sent by the hand of Benaiah son of Jehoiada
  - sent through Benaiah son of Jehoiada
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of' and commonly indicates
    agency or instrumentality. In natural English here, the sense is best conveyed
    by making Benaiah the direct object of 'sent.' The more literal alternative is
    preserved in a footnote.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Standard English biblical style often omits the article in patronymics
    while preserving the Hebrew relationship clearly.
- source_word: וַיִּפְגַּע בּוֹ
  chosen: he struck him down
  alternatives:
  - he attacked him
  - he fell upon him
  - he struck him
  lexicon: HALOT
  rationale: The verb פגע with ב can mean to meet, encounter, attack, or strike. In
    this execution context, 'struck him down' best captures the hostile, lethal force
    implied by the immediate sequel 'and he died,' without overtranslating to 'killed
    him' where the Hebrew expresses the death in the next clause.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: A simple sequential rendering matches the Hebrew narrative chain. 'And
    he died' preserves the explicit statement of death rather than absorbing it into
    the previous verb.
