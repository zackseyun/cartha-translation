theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern. No contextual
    factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the blessing statement בָּרוּךְ
  chosen_reading: future-oriented 'will be blessed'
  alternative_readings:
  - present 'is blessed'
  rationale: The verse forms part of Solomon's judicial pronouncement contrasting
    Shimei's fate with Solomon's and David's throne. A future-oriented rendering preserves
    the performative and promissory force of the statement in context without turning
    it into a mere static description.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
