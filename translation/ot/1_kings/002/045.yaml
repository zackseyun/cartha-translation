id: 1KI.2.45
reference: 1 Kings 2:45
source:
  edition: WLC
  text: וְ/הַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה בָּר֑וּךְ וְ/כִסֵּ֣א דָוִ֗ד יִהְיֶ֥ה נָכ֛וֹן לִ/פְנֵ֥י
    יְהוָ֖ה עַד עוֹלָֽם־׃
translation:
  text: But King Solomon will be blessed, and the throne of David will be established
    before the LORD forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'King Solomon is blessed.' The Hebrew predicate can be read as a present
      declaration, though the context also supports the future-oriented rendering
      used in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  chosen: But King
  alternatives:
  - And the king
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in context it marks
    a contrast with the curse/judgment falling on Shimei in the preceding verse, so
    'But' best reflects the discourse flow. 'King' translates מֶלֶךְ directly, with
    the article carried naturally into English by the proper-name apposition.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: בָּרוּךְ
  chosen: will be blessed
  alternatives:
  - is blessed
  - blessed
  lexicon: HALOT
  rationale: The predicate adjective/passive participle means 'blessed.' Because the
    verbless clause stands alongside the following yiqtol clause ('will be established')
    in a future-oriented royal pronouncement, rendering it as 'will be blessed' gives
    natural English and matches the prospective sense of the context.
- source_word: וְ/כִסֵּא
  chosen: and the throne
  alternatives:
  - and David's throne
  lexicon: HALOT
  rationale: כִּסֵּא means 'throne.' The conjunction is retained as simple coordination.
    The construct relationship with 'David' is expressed in English as 'the throne
    of David.'
- source_word: דָוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: יִהְיֶה נָכוֹן
  chosen: will be established
  alternatives:
  - will be secure
  - will stand firm
  - will be steadfast
  lexicon: HALOT
  rationale: The combination of היה with נכון conveys being established, secure, or
    firmly set. 'Will be established' fits royal/throne language in English and preserves
    the dynastic nuance without over-paraphrasing.
- source_word: לִ/פְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' 'Before the
    LORD' is concise and idiomatic, preserving the covenantal/judicial sense. Per
    doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the traditional small-caps covenant rendering in standard English form.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - unto eternity
  lexicon: HALOT
  rationale: The phrase means 'forever' or 'for all time.' 'Forever' is the clearest
    modern English equivalent and suits the royal promise context.
