theological_decisions:
- issue: Implied bloodguilt and royal house liability
  chosen_reading: Render the idiom as removal of 'innocent blood' from Solomon and
    his father's house, implying release from culpability for Joab's unjust killings.
  alternative_readings:
  - Render more abstractly as removal of 'bloodguilt'
  rationale: The Hebrew speaks concretely of 'innocent blood' being removed from upon
    persons/household. This preserves the Old Testament legal-theological concept
    of guilt attached to unjust bloodshed without importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
