id: 1KI.2.31
reference: 1 Kings 2:31
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר ל֣/וֹ הַ/מֶּ֗לֶךְ עֲשֵׂה֙ כַּ/אֲשֶׁ֣ר דִּבֶּ֔ר וּ/פְגַע בּ֖/וֹ
    וּ/קְבַרְתּ֑/וֹ וַ/הֲסִירֹ֣תָ דְּמֵ֣י חִנָּ֗ם אֲשֶׁר֙ שָׁפַ֣ךְ יוֹאָ֔ב מֵ/עָלַ֕/י
    וּ/מֵ/עַ֖ל בֵּ֥ית אָבִֽ/י־׀׃
translation:
  text: Then the king said to him, “Do as he has said, and strike him down and bury
    him, so that you may remove from me and from my father’s house the innocent blood
    that Joab shed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kill him”; the Hebrew idiom literally means “fall upon him” and in this
      context refers to executing him.
    reason: lexical_alternative
  - marker: b
    text: “Innocent blood” is a Hebrew legal-moral expression for bloodshed committed
      without just cause, carrying the sense of bloodguilt.
    reason: cultural_note
lexical_decisions:
- source_word: עֲשֵׂה
  chosen: Do
  alternatives:
  - Carry out
  lexicon: HALOT
  rationale: Imperative of עשה here introduces compliance with the prior request/order.
    'Do as he has said' is idiomatic and preserves the directness of the command.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: as he has said
  alternatives:
  - as he said
  - according to what he said
  lexicon: HALOT
  rationale: The phrase refers back to the words just spoken by Benaiah's interlocutor.
    Present perfect English ('has said') fits the immediate prior speech and reads
    naturally.
- source_word: וּפְגַע בּוֹ
  chosen: strike him down
  alternatives:
  - fall upon him
  - kill him
  lexicon: HALOT
  rationale: פגע with ב can mean to attack violently, even kill in context. Since
    the command concerns execution, 'strike him down' conveys the lethal force without
    over-paraphrasing. 'Kill him' is possible but less tied to the Hebrew idiom.
- source_word: וּקְבַרְתּוֹ
  chosen: and bury him
  alternatives:
  - and then bury him
  lexicon: HALOT
  rationale: Straightforward sequential command. No need to make the sequence more
    explicit than the Hebrew does.
- source_word: וַהֲסִירֹתָ
  chosen: so that you may remove
  alternatives:
  - and remove
  - thus remove
  - take away
  lexicon: HALOT
  rationale: The prefixed form after the chain of imperatives expresses intended result/purpose.
    'So that you may remove' captures the purpose nuance better than a simple coordinate
    'and remove'.
- source_word: דְּמֵי חִנָּם
  chosen: the innocent blood
  alternatives:
  - the bloodshed without cause
  - the blood of innocence
  lexicon: HALOT
  rationale: Hebrew idiom for bloodguilt arising from unjust killing. 'Innocent blood'
    is the established and accurate English equivalent, preserving both legal and
    moral force.
- source_word: שָׁפַךְ
  chosen: shed
  alternatives:
  - poured out
  lexicon: HALOT
  rationale: Standard English rendering for blood violently spilled; preserves the
    judicial sense in context.
- source_word: מֵעָלַי וּמֵעַל בֵּית אָבִי
  chosen: from me and from my father’s house
  alternatives:
  - off me and off my father’s house
  - from upon me and from upon my father’s house
  lexicon: HALOT
  rationale: The preposition על in this idiom marks guilt resting upon someone. English
    'from me and from my father's house' communicates removal of bloodguilt naturally.
