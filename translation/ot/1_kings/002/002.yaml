id: 1KI.2.2
reference: 1 Kings 2:2
source:
  edition: WLC
  text: אָנֹכִ֣י הֹלֵ֔ךְ בְּ/דֶ֖רֶךְ כָּל הָ/אָ֑רֶץ וְ/חָזַקְתָּ֖ וְ/הָיִ֥יתָֽ לְ/אִֽישׁ־׃
translation:
  text: I am going the way of all the earth. So be strong, and be a man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show yourself a man' or 'be manly.' The Hebrew expression combines the
      idea of being a man with acting courageously and responsibly.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: First-person singular independent pronoun; simple 'I' is sufficient in
    English since no special emphasis needs to be marked beyond the clause itself.
- source_word: הֹלֵךְ
  chosen: am going
  alternatives:
  - am about to go
  - go
  lexicon: HALOT
  rationale: Qal participle with pronoun conveys an imminent or ongoing movement toward
    death; 'am going' preserves the idiomatic force without overinterpreting temporality.
- source_word: בְּדֶרֶךְ
  chosen: the way
  alternatives:
  - on the path
  - by the way
  lexicon: HALOT
  rationale: In the idiom 'go the way of,' 'way' is the natural English equivalent
    and preserves the metaphorical expression for dying.
- source_word: כָּל הָאָרֶץ
  chosen: of all the earth
  alternatives:
  - of all the world
  - of everyone on earth
  lexicon: HALOT
  rationale: Literally 'all the earth.' In this idiom it refers to the common destiny
    of all who live on the earth, namely death. 'Of all the earth' keeps the Hebrew
    wording while remaining intelligible.
- source_word: וְחָזַקְתָּ
  chosen: So be strong
  alternatives:
  - and be strong
  - therefore be strong
  lexicon: HALOT
  rationale: Though formally a perfect with conjunction, in context it functions as
    an exhortation following David's announcement of impending death. 'So be strong'
    gives good English discourse flow while preserving the imperative sense.
- source_word: וְהָיִיתָ
  chosen: and be
  alternatives:
  - and show yourself to be
  - and become
  lexicon: HALOT
  rationale: Here the verb introduces the resulting state expected of Solomon. English
    idiom prefers 'be' before the predicate noun, though the nuance 'show yourself
    to be' is possible and worth preserving in a footnote.
- source_word: לְאִישׁ
  chosen: a man
  alternatives:
  - manly
  - a mature man
  lexicon: HALOT
  rationale: Masculine singular noun. Per the project's gender-accurate policy, 'a
    man' should be retained rather than neutralized. In context it carries connotations
    of courage and mature responsibility, but the main text should not paraphrase
    beyond the source.
