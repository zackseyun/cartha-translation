theological_decisions:
- issue: Gendered expression in exhortation
  chosen_reading: be a man
  alternative_readings:
  - be manly
  - show yourself a man
  rationale: The Hebrew is grammatically masculine and addressed specifically to Solomon.
    The project's policy prefers gender-accurate renderings over neutralization. 'Be
    a man' preserves both the lexical form and the father-to-son exhortational force
    without importing a modern stereotype.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
