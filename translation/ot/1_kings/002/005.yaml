id: 1KI.2.5
reference: 1 Kings 2:5
source:
  edition: WLC
  text: וְ/גַ֣ם אַתָּ֣ה יָדַ֡עְתָּ אֵת֩ אֲשֶׁר עָ֨שָׂה לִ֜/י יוֹאָ֣ב בֶּן צְרוּיָ֗ה
    אֲשֶׁ֣ר עָשָׂ֣ה לִ/שְׁנֵֽי שָׂרֵ֣י צִבְא֣וֹת יִ֠שְׂרָאֵל לְ/אַבְנֵ֨ר בֶּן נֵ֜ר
    וְ/לַ/עֲמָשָׂ֤א בֶן יֶ֨תֶר֙ וַ/יַּ֣הַרְגֵ֔/ם וַ/יָּ֥שֶׂם דְּמֵֽי מִלְחָמָ֖ה בְּ/שָׁלֹ֑ם
    וַ/יִּתֵּ֞ן דְּמֵ֣י מִלְחָמָ֗ה בַּ/חֲגֹֽרָת/וֹ֙ אֲשֶׁ֣ר בְּ/מָתְנָ֔י/ו וּֽ/בְ/נַעֲל֖/וֹ
    אֲשֶׁ֥ר בְּ/רַגְלָֽי/ו־־־־־־׃
translation:
  text: 'And you also know what Joab son of Zeruiah did to me, what he did to the
    two commanders of the armies of Israel, to Abner son of Ner and to Amasa son of
    Jether: he killed them and shed the blood of war in peace, and put the blood of
    war on the belt that was around his waist and on the sandals that were on his
    feet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, "and set the blood of war in peace"; the Hebrew idiom
      means that Joab committed wartime bloodshed under peaceful conditions.
    reason: lexical_alternative
  - marker: b
    text: The imagery of blood on Joab's belt and sandals likely signifies bloodguilt
      visibly clinging to him because of these killings.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/גַם אַתָּה
  chosen: And you also
  alternatives:
  - And also you
  - You too
  lexicon: HALOT
  rationale: Captures both conjunction and additive emphasis in natural English while
    preserving the direct address to Solomon.
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  - knew
  lexicon: HALOT
  rationale: English present fits the discourse sense of an existing shared knowledge
    better than a more wooden perfect.
- source_word: אֵת אֲשֶׁר עָשָׂה לִי
  chosen: what ... did to me
  alternatives:
  - that which ... did to me
  - what ... did for me
  lexicon: HALOT
  rationale: The idiom marks the content of knowledge. לִי here is adversative/dative
    of disadvantage in context, so 'to me' is preferable to 'for me'.
- source_word: יוֹאָב בֶּן צְרוּיָה
  chosen: Joab son of Zeruiah
  alternatives:
  - Joab the son of Zeruiah
  rationale: Standard transliteration of personal names; construct rendered naturally
    in English.
- source_word: לִשְׁנֵי שָׂרֵי צִבְאוֹת יִשְׂרָאֵל
  chosen: to the two commanders of the armies of Israel
  alternatives:
  - to the two commanders of Israel's armies
  - to the two army commanders of Israel
  lexicon: HALOT
  rationale: שָׂרֵי צִבְאוֹת denotes military leaders; plural 'armies' reflects the
    Hebrew plural צִבְאוֹת without becoming awkward.
- source_word: לְאַבְנֵר בֶּן נֵר וְלַעֲמָשָׂא בֶן יֶתֶר
  chosen: to Abner son of Ner and to Amasa son of Jether
  alternatives:
  - namely, Abner son of Ner and Amasa son of Jether
  rationale: Retains the repeated preposition and appositional identification of the
    two victims.
- source_word: וַיַּהַרְגֵם
  chosen: he killed them
  alternatives:
  - and killed them
  - he struck them down
  lexicon: HALOT
  rationale: Simple and direct rendering of the narrative verb with object suffix.
- source_word: וַיָּשֶׂם דְּמֵי מִלְחָמָה בְּשָׁלֹם
  chosen: and shed the blood of war in peace
  alternatives:
  - and brought war-blood in peace
  - and made bloodshed of war in peace
  lexicon: HALOT
  rationale: Although literally 'set/put the blood of war in peace,' the idiom refers
    to treating peacetime as wartime by bloodshed. 'Shed' communicates the sense clearly
    while preserving the contrast between war and peace.
- source_word: דְּמֵי מִלְחָמָה
  chosen: the blood of war
  alternatives:
  - bloodshed of war
  - war blood
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the rhetorical force of David's
    accusation; the phrase is then clarified by context.
- source_word: בְּשָׁלֹם
  chosen: in peace
  alternatives:
  - in peacetime
  - during peace
  lexicon: HALOT
  rationale: Keeps the compact Hebrew contrast with 'blood of war' while remaining
    idiomatic.
- source_word: וַיִּתֵּן דְּמֵי מִלְחָמָה בַּחֲגֹרָתוֹ אֲשֶׁר בְּמָתְנָיו וּבְנַעֲלוֹ
    אֲשֶׁר בְּרַגְלָיו
  chosen: and put the blood of war on the belt that was around his waist and on the
    sandals that were on his feet
  alternatives:
  - and put the blood of war on his belt and on his sandals
  - and stained the belt at his waist and the sandals on his feet with the blood of
    war
  lexicon: HALOT
  rationale: Keeps the concrete imagery of blood on Joab's clothing/gear. 'Belt' for
    חֲגוֹרָה is more natural than 'girdle'; the relative clauses are smoothed slightly
    for readable English.
