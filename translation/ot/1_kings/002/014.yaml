id: 1KI.2.14
reference: 1 Kings 2:14
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר דָּבָ֥ר לִ֖/י אֵלָ֑יִ/ךְ וַ/תֹּ֖אמֶר דַּבֵּֽר׃
translation:
  text: Then he said, “I have something to say to you.” And she said, “Speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'A word/matter is to me to you.' The idiom means, 'I have
      something to say to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  - So he said
  lexicon: HALOT
  rationale: Wayyiqtol of אָמַר introduces the next action in narrative sequence.
    'Then he said' gives natural English narrative flow while preserving the consecutive
    sense.
- source_word: דָּבָר
  chosen: something
  alternatives:
  - a word
  - a matter
  - a thing
  lexicon: HALOT
  rationale: 'Though literally ''word/matter/thing,'' in the idiom דָּבָר לִי אֵלַיִךְ
    the sense is indefinite: ''I have something/a matter to say to you.'' ''Something''
    is the most natural English equivalent here without loss of meaning.'
- source_word: לִי
  chosen: I have
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: The preposition with first-person suffix is part of the Hebrew idiom
    'there is to me ...' meaning possession or personal intent. In English this is
    best expressed as 'I have' in the clause 'I have something to say.'
- source_word: אֵלַיִךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Preposition אֶל with 2fs suffix marks direction toward Bathsheba as the
    addressee. 'To you' is the direct and idiomatic English rendering.
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Narrative wayyiqtol of אָמַר continues the dialogue. 'And she said' preserves
    the simple sequential response.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Say it
  - Go ahead, speak
  lexicon: HALOT
  rationale: Imperative of דָּבַר. 'Speak' is concise and faithful; expanded conversational
    renderings would add nuance not explicit in the Hebrew.
