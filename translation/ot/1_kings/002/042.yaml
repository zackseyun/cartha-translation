id: 1KI.2.42
reference: 1 Kings 2:42
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח הַ/מֶּ֜לֶךְ וַ/יִּקְרָ֣א לְ/שִׁמְעִ֗י וַ/יֹּ֨אמֶר אֵלָ֜י/ו הֲ/ל֧וֹא הִשְׁבַּעְתִּ֣י/ךָ בַֽ/יהוָ֗ה וָ/אָעִ֤ד בְּ/ךָ֙ לֵ/אמֹ֔ר בְּ/י֣וֹם צֵאתְ/ךָ֗ וְ/הָֽלַכְתָּ֙ אָ֣נֶה וָ/אָ֔נָה יָדֹ֥עַ תֵּדַ֖ע כִּ֣י מ֣וֹת תָּמ֑וּת וַ/תֹּ֧אמֶר אֵלַ֛/י ט֥וֹב הַ/דָּבָ֖ר שָׁמָֽעְתִּי׃
translation:
  text: Then the king sent and called for Shimei and said to him, “Did I not make you swear by Yahweh and warn you, saying, ‘On the day you go out and go anywhere at all, know for certain that you shall surely die’? And you said to me, ‘The word is good; I have heard.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “testify against you” or “solemnly charge you” for “warn you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “go here or there,” an idiom meaning “go anywhere at all.”
    reason: lexical_alternative
  - marker: c
    text: Or, “The matter is good.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּעְתִּיךָ בַיהוָה
  chosen: make you swear by the LORD
  alternatives:
  - put you under oath by the LORD
  - adjure you by the LORD
  lexicon: HALOT
  rationale: The Hiphil of שבע here means to cause someone to swear or place under oath. 'Make you swear' is natural modern English and preserves the causative force. The divine name follows project policy as 'the LORD.'
- source_word: בַיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: The preposition marks the oath formula, and the divine name יְהוָה is rendered 'the LORD' per doctrine policy on the Tetragrammaton.
- source_word: וָאָעִד בְּךָ
  chosen: warn you
  alternatives:
  - testify against you
  - solemnly charge you
  lexicon: HALOT
  rationale: The verb עוד in Hiphil can mean to warn, testify, or solemnly charge. In this context Solomon is reminding Shimei of a formal warning attached to an oath. 'Warn you' best fits the immediate sense in readable English, while the more forensic nuance is preserved as an alternative.
- source_word: בְּיוֹם צֵאתְךָ
  chosen: On the day you go out
  alternatives:
  - On the day of your going out
  lexicon: HALOT
  rationale: This keeps the temporal idiom intact while using idiomatic English. The infinitive construct with suffix is naturally rendered as a finite clause.
- source_word: וְהָלַכְתָּ אָנֶה וָאָנָה
  chosen: and go anywhere at all
  alternatives:
  - and go here or there
  - and go wherever
  lexicon: HALOT
  rationale: The paired adverbs אָנֶה וָאָנָה express indefinite destination, literally 'here or there/wherever.' 'Anywhere at all' captures the breadth and emphasis in natural English.
- source_word: יָדֹעַ תֵּדַע
  chosen: know for certain
  alternatives:
  - you shall surely know
  - know surely
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the certainty. English expresses this well with 'know for certain' rather than a wooden repetition.
- source_word: מוֹת תָּמוּת
  chosen: you shall surely die
  alternatives:
  - you will certainly die
  - dying you shall die
  lexicon: HALOT
  rationale: This standard infinitive absolute construction intensifies the verb. 'You shall surely die' is both accurate and idiomatic in solemn legal speech.
- source_word: טוֹב הַדָּבָר
  chosen: The word is good
  alternatives:
  - The matter is good
  - What you say is good
  lexicon: HALOT
  rationale: דבר can mean word, matter, or statement. Since Shimei is responding to Solomon's stated condition, 'word' preserves the speech-act sense, though 'matter' is possible.
- source_word: שָׁמָעְתִּי
  chosen: I have heard
  alternatives:
  - I hear and accept
  - I have obeyed
  lexicon: HALOT
  rationale: The verb is literally 'I have heard.' In covenantal/legal contexts hearing can imply acceptance or obedience, but the text itself says only 'heard,' so the translation preserves that wording without importing a stronger claim.
