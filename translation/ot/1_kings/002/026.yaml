id: 1KI.2.26
reference: 1 Kings 2:26
source:
  edition: WLC
  text: וּ/לְ/אֶבְיָתָ֨ר הַ/כֹּהֵ֜ן אָמַ֣ר הַ/מֶּ֗לֶךְ עֲנָתֹת֙ לֵ֣ךְ עַל שָׂדֶ֔י/ךָ
    כִּ֛י אִ֥ישׁ מָ֖וֶת אָ֑תָּה וּ/בַ/יּ֨וֹם הַ/זֶּ֜ה לֹ֣א אֲמִיתֶ֗/ךָ כִּֽי נָשָׂ֜אתָ
    אֶת אֲר֨וֹן אֲדֹנָ֤/י יְהֹוִה֙ לִ/פְנֵי֙ דָּוִ֣ד אָבִ֔/י וְ/כִ֣י הִתְעַנִּ֔יתָ
    בְּ/כֹ֥ל אֲשֶֽׁר הִתְעַנָּ֖ה אָבִֽ/י־־־־׃
translation:
  text: And to Abiathar the priest the king said, “Go to Anathoth, to your field,
    for you are a man of death; but on this day I will not put you to death, because
    you carried the ark of the Lord GOD before David my father, and because you shared
    in all the affliction with which my father was afflicted.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''a man of death,'' that is, one deserving death or liable
      to execution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָתֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Proper place name; transliterated per philosophy to transliterate names
    rather than translate them.
- source_word: עַל שָׂדֶיךָ
  chosen: to your field
  alternatives:
  - to your estate
  - to your land
  - upon your fields
  lexicon: HALOT
  rationale: Literally 'upon your field(s).' In context Solomon banishes Abiathar
    back to his property at Anathoth. Singular 'field' gives natural English while
    preserving the concrete sense better than the broader 'estate' or 'land.'
- source_word: אִישׁ מָוֶת
  chosen: a man of death
  alternatives:
  - a man deserving death
  - a dead man
  lexicon: HALOT
  rationale: The Hebrew idiom denotes one liable to death. I preserved the idiomatic
    force in the main text with a relatively formal rendering, since the following
    clause explains that execution is being withheld for now. A more interpretive
    gloss is preserved as an alternative.
- source_word: אֲמִיתֶךָ
  chosen: I will not put you to death
  alternatives:
  - I will not kill you
  lexicon: HALOT
  rationale: Hiphil of מות means 'cause to die, put to death.' 'Put you to death'
    fits the judicial context better than the more general 'kill you.'
- source_word: נָשָׂאתָ אֶת אֲרוֹן אֲדֹנָי יְהוִה
  chosen: you carried the ark of the Lord GOD
  alternatives:
  - you bore the ark of the Lord GOD
  lexicon: HALOT
  rationale: נשא here refers to physically bearing/carrying the ark. 'Carried' is
    clear modern English. For יְהוָה the doctrinal default is 'the LORD'; because
    it follows אֲדֹנָי, rendering as 'the Lord GOD' avoids the awkward 'Lord LORD'
    while preserving both elements of the Hebrew title.
- source_word: לִפְנֵי דָוִד אָבִי
  chosen: before David my father
  alternatives:
  - in the presence of David my father
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational 'before, in the presence of.' 'Before'
    is concise and natural here.
- source_word: הִתְעַנִּיתָ ... הִתְעַנָּה
  chosen: you shared in all the affliction with which my father was afflicted
  alternatives:
  - you suffered in all that my father suffered
  - you were afflicted in everything in which my father was afflicted
  lexicon: HALOT
  rationale: The Hitpael of ענה here conveys experiencing affliction/humiliation.
    The paired forms create a deliberate echo; 'shared in all the affliction with
    which my father was afflicted' preserves that repetition while remaining readable.
    'Suffered' is possible, but 'shared in affliction' better captures Abiathar's
    solidarity with David.
- source_word: כִּי ... וְכִי
  chosen: because ... and because
  alternatives:
  - for ... and because
  lexicon: HALOT
  rationale: Both clauses give reasons for Solomon's clemency. Rendering both with
    causal 'because' makes the logic explicit in English.
