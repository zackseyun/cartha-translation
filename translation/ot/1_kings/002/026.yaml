theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default renders יְהוָה as 'the LORD.' In the compound אֲדֹנָי
    יְהוִה, English convention often uses 'Lord GOD' to represent both terms without
    producing 'Lord LORD.' This follows the doctrinal default while respecting the
    Hebrew construction.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
