id: 1KI.2.19
reference: 1 Kings 2:19
source:
  edition: WLC
  text: וַ/תָּבֹ֤א בַת שֶׁ֨בַע֙ אֶל הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה לְ/דַבֶּר ל֖/וֹ עַל אֲדֹנִיָּ֑הוּ
    וַ/יָּקָם֩ הַ/מֶּ֨לֶךְ לִ/קְרָאתָ֜/הּ וַ/יִּשְׁתַּ֣חוּ לָ֗/הּ וַ/יֵּ֨שֶׁב֙ עַל
    כִּסְא֔/וֹ וַ/יָּ֤שֶׂם כִּסֵּא֙ לְ/אֵ֣ם הַ/מֶּ֔לֶךְ וַ/תֵּ֖שֶׁב לִֽ/ימִינֽ/וֹ־־־־־׃
translation:
  text: Then Bathsheba came to King Solomon to speak to him about Adonijah. And the
    king rose to meet her and bowed down to her, then sat on his throne and had a
    throne set for the king’s mother, and she sat at his right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paid homage to her' or 'prostrated himself before her.' The Hebrew verb
      can denote a deep bowing gesture of honor; here it does not necessarily imply
      worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - So ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: בַת שֶׁבַע
  chosen: Bathsheba
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy rather than translated
    etymologically.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - to the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as 'to King Solomon'
    while preserving both title and name.
- source_word: לְדַבֶּר לוֹ
  chosen: to speak to him
  alternatives:
  - to speak with him
  lexicon: HALOT
  rationale: Infinitive of דבר with ל conveys purpose. 'To speak to him' is the most
    direct and natural rendering.
- source_word: עַל אֲדֹנִיָּהוּ
  chosen: about Adonijah
  alternatives:
  - concerning Adonijah
  - on behalf of Adonijah
  lexicon: HALOT
  rationale: עַל here most straightforwardly means 'about/concerning.' Although the
    context involves intercession, the preposition itself does not require 'on behalf
    of,' so 'about' avoids over-interpretation.
- source_word: וַיָּקָם ... לִקְרָאתָהּ
  chosen: the king rose to meet her
  alternatives:
  - the king stood up to meet her
  lexicon: HALOT
  rationale: קום plus לקראת expresses rising in order to meet someone. 'Rose to meet
    her' is idiomatic and preserves the honor shown.
- source_word: וַיִּשְׁתַּחוּ לָהּ
  chosen: bowed down to her
  alternatives:
  - paid homage to her
  - prostrated himself before her
  lexicon: HALOT
  rationale: The verb שׁחה can denote bowing/prostration as an act of respect or homage.
    'Bowed down to her' preserves the physical gesture without implying worship in
    this human court setting.
- source_word: וַיֵּשֶׁב עַל כִּסְאוֹ
  chosen: then sat on his throne
  alternatives:
  - and sat on his throne
  lexicon: HALOT
  rationale: The verb simply means 'sat/dwelt'; here 'sat on his throne' fits the
    enthronement context. 'Then' helps sequence the actions in English.
- source_word: וַיָּשֶׂם כִּסֵּא
  chosen: had a throne set
  alternatives:
  - placed a seat
  - set a throne
  lexicon: HALOT
  rationale: שׂים means 'set/place.' Because attendants likely executed the action,
    English idiom 'had a throne set' communicates the king's directive role without
    distorting the Hebrew narrative. 'Throne' is retained because כסא is the same
    word used for Solomon's own throne, signaling formal honor.
- source_word: לְאֵם הַמֶּלֶךְ
  chosen: for the king’s mother
  alternatives:
  - for his mother
  lexicon: HALOT
  rationale: The fuller phrase is preserved because it highlights Bathsheba's official
    status, not merely her biological relation.
- source_word: וַתֵּשֶׁב לִימִינוֹ
  chosen: and she sat at his right hand
  alternatives:
  - and she sat on his right
  lexicon: HALOT
  rationale: '''At his right hand'' is the standard English idiom for the place of
    honor indicated by לימין.'
