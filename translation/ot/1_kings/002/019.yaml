theological_decisions:
- issue: Meaning of וַיִּשְׁתַּחוּ in a human royal setting
  chosen_reading: Rendered as an act of royal respect ('bowed down to her'), not worship.
  alternative_readings:
  - worshiped her
  - paid homage to her
  rationale: In Hebrew narrative, השתחוה can describe reverential bowing before humans
    as well as worship before God. Here the courtly context and Solomon's honoring
    of his mother favor 'bowed down to her.' This avoids importing idolatrous implications
    while preserving the striking deference of the scene.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
