id: 1KI.2.1
reference: 1 Kings 2:1
source:
  edition: WLC
  text: וַ/יִּקְרְב֥וּ יְמֵֽי דָוִ֖ד לָ/מ֑וּת וַ/יְצַ֛ו אֶת שְׁלֹמֹ֥ה בְנ֖/וֹ לֵ/אמֹֽר־־׃
translation:
  text: As the days of David drew near for him to die, he commanded Solomon his son,
    saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'David’s days came near to die'; the Hebrew idiom means that the time
      of David’s death was approaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  chosen: drew near
  alternatives:
  - came near
  - approached
  lexicon: HALOT
  rationale: From קרב in the qal/wayyiqtol plural with יְמֵי as subject. 'Drew near'
    is idiomatic English for time approaching and preserves the metaphor of nearness
    without over-literal awkwardness.
- source_word: יְמֵי דָוִד
  chosen: the days of David
  alternatives:
  - David's days
  lexicon: HALOT
  rationale: Construct phrase literally 'days of David.' Retained in a natural but
    still formally close English expression to preserve the Hebrew temporal idiom.
- source_word: לָמוּת
  chosen: for him to die
  alternatives:
  - to die
  - for dying
  lexicon: HALOT
  rationale: 'Infinitive construct of מות with prefixed ל expressing purpose/result
    in context: David''s days drew near with respect to death. ''For him to die''
    makes explicit the subject implied by context and yields smooth English.'
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he charged
  - he instructed
  lexicon: HALOT
  rationale: צוה commonly means 'command/charge.' 'Commanded' best reflects the verb's
    force here as David gives solemn final directives to Solomon. 'Charged' is possible
    but slightly more archaic in contemporary English.
- source_word: אֶת שְׁלֹמֹה בְנוֹ
  chosen: Solomon his son
  alternatives:
  - his son Solomon
  lexicon: HALOT
  rationale: Direct object marker plus apposition/construct phrase. 'Solomon his son'
    follows Hebrew order more closely while remaining natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: Standard introductory infinitive for direct speech. 'Saying' preserves
    the formal linkage to the following speech without unnecessary expansion.
