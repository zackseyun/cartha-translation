id: 1KI.2.10
reference: 1 Kings 2:10
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב דָּוִ֖ד עִם אֲבֹתָ֑י/ו וַ/יִּקָּבֵ֖ר בְּ/עִ֥יר דָּוִֽד־׃פ
translation:
  text: Then David slept with his fathers and was buried in the city of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a customary expression for dying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'to lie down' or 'to sleep.' In this royal
    obituary formula, 'slept with his fathers' is a conventional idiom for death.
    Retaining 'slept' preserves the Hebrew idiom and its literary continuity, while
    the context makes the meaning clear.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: The phrase is a standard Hebrew expression in death notices. 'Fathers'
    is more formally faithful than 'ancestors' and preserves the idiomatic and genealogical
    resonance of the source.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: 'The Niphal form is passive/reflexive in sense here: ''was buried.''
    This is the plain and natural English equivalent.'
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard designation for Jerusalem's Davidic stronghold/burial
    area. 'The city of David' is the established and transparent rendering, preserving
    the title-like place name.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw advances the narrative. 'Then' gives natural English
    narrative flow while preserving the sequential sense better than a mechanically
    repeated 'And'.
