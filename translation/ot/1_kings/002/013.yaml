id: 1KI.2.13
reference: 1 Kings 2:13
source:
  edition: WLC
  text: וַ/יָּבֹ֞א אֲדֹנִיָּ֣הוּ בֶן חַגֵּ֗ית אֶל בַּת שֶׁ֨בַע֙ אֵם שְׁלֹמֹ֔ה וַ/תֹּ֖אמֶר
    הֲ/שָׁל֣וֹם בֹּאֶ֑/ךָ וַ/יֹּ֖אמֶר שָׁלֽוֹם־־־־׃
translation:
  text: Then Adonijah son of Haggith came to Bathsheba, the mother of Solomon, and
    she said, “Do you come in peace?” And he said, “In peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Is your coming peace?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. English
    'came' fits the narrative perspective toward Bathsheba and is idiomatic with 'to
    Bathsheba.'
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  rationale: Personal name is transliterated per project philosophy.
- source_word: בֶן חַגִּית
  chosen: son of Haggith
  rationale: Standard filial construction identifying Adonijah by his mother; 'son
    of' is the natural formal rendering.
- source_word: בַּת שֶׁבַע
  chosen: Bathsheba
  alternatives:
  - Bat-sheba
  rationale: Personal name is transliterated by standard English convention.
- source_word: אֵם שְׁלֹמֹה
  chosen: the mother of Solomon
  alternatives:
  - Solomon's mother
  lexicon: HALOT
  rationale: The construct phrase appositionally identifies Bathsheba. 'The mother
    of Solomon' preserves the Hebrew structure and the narrative emphasis on her royal
    relationship.
- source_word: הֲשָׁלוֹם בֹּאֶךָ
  chosen: Do you come in peace?
  alternatives:
  - Is your coming peaceful?
  - Do you come peaceably?
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes peaceful intent/well-being in a greeting colored
    by suspicion. Rendering as a direct question about peaceful intent best captures
    the idiom in natural English.
- source_word: שָׁלוֹם
  chosen: In peace
  alternatives:
  - Peace
  - Peaceably
  lexicon: HALOT
  rationale: Adonijah's reply is elliptical, matching Bathsheba's wording. 'In peace'
    preserves the Hebrew terseness while sounding natural in English dialogue.
