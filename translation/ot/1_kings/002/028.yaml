id: 1KI.2.28
reference: 1 Kings 2:28
source:
  edition: WLC
  text: וְ/הַ/שְּׁמֻעָה֙ בָּ֣אָה עַד יוֹאָ֔ב כִּ֣י יוֹאָ֗ב נָטָה֙ אַחֲרֵ֣י אֲדֹנִיָּ֔ה
    וְ/אַחֲרֵ֥י אַבְשָׁל֖וֹם לֹ֣א נָטָ֑ה וַ/יָּ֤נָס יוֹאָב֙ אֶל אֹ֣הֶל יְהוָ֔ה וַֽ/יַּחֲזֵ֖ק
    בְּ/קַרְנ֥וֹת הַ/מִּזְבֵּֽחַ־־׃
translation:
  text: And the report came to Joab, for Joab had turned after Adonijah, though he
    had not turned after Absalom. So Joab fled to the tent of the LORD and took hold
    of the horns of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had sided with Adonijah ... had not sided with Absalom.' The Hebrew
      literally says 'had turned after.'
    reason: lexical_alternative
  - marker: b
    text: The 'horns' were the horn-like projections at the altar's corners; grasping
      them was an appeal for sanctuary or mercy.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְּׁמֻעָה
  chosen: the report
  alternatives:
  - the news
  - the rumor
  lexicon: HALOT
  rationale: The noun denotes a report or news that reaches someone. 'The report'
    is slightly more formal and fits the narrative context of information arriving
    about recent events; 'rumor' is possible but too uncertain in tone here.
- source_word: בָּאָה עַד
  chosen: came to
  alternatives:
  - reached
  lexicon: HALOT
  rationale: The idiom literally means 'came as far as' someone. 'Came to' preserves
    the movement metaphor in natural English; 'reached' is also viable but slightly
    less transparent to the Hebrew wording.
- source_word: נָטָה אַחֲרֵי
  chosen: had turned after
  alternatives:
  - had sided with
  - had followed
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'turned after' and in context refers
    to political alignment. 'Had turned after' keeps the metaphor and allows readers
    to sense the repeated wording with the later clause about Absalom. The more interpretive
    'had sided with' is possible but less formally tied to the source.
- source_word: אֲדֹנִיָּה
  chosen: Adonijah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וְאַחֲרֵי אַבְשָׁלוֹם לֹא נָטָה
  chosen: though he had not turned after Absalom
  alternatives:
  - but he had not turned after Absalom
  - yet he had not followed Absalom
  lexicon: HALOT
  rationale: The clause is somewhat parenthetical, explaining Joab's prior political
    behavior. 'Though' captures the concessive force naturally in English while preserving
    the repeated idiom 'turned after.'
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: '''Fled'' is the standard narrative rendering for this verb and suits
    the urgent context.'
- source_word: אֹהֶל יְהוָה
  chosen: the tent of the LORD
  alternatives:
  - the tabernacle of the LORD
  - the LORD's tent
  lexicon: HALOT
  rationale: The Hebrew is literally 'tent of YHWH.' 'The tent of the LORD' is transparent
    and avoids importing the more technical term 'tabernacle' unless context requires
    it. The divine name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וַיַּחֲזֵק בְּקַרְנוֹת הַמִּזְבֵּחַ
  chosen: took hold of the horns of the altar
  alternatives:
  - grasped the horns of the altar
  - seized the horns of the altar
  lexicon: HALOT
  rationale: This is a concrete cultic action. 'Took hold of' is idiomatic English
    and preserves the physical gesture without overinterpreting its legal or symbolic
    significance.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  chosen: the horns of the altar
  lexicon: HALOT
  rationale: This is the standard literal rendering for the altar's horn-like projections.
    Because modern readers may not immediately recognize the cultic feature, a brief
    cultural footnote is appropriate rather than replacing the expression.
