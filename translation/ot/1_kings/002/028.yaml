theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the literal political idiom נָטָה אַחֲרֵי or interpret
    it more dynamically
  chosen_reading: had turned after
  alternative_readings:
  - had sided with
  - had followed
  rationale: The verse repeats the same idiom for Adonijah and Absalom. Preserving
    the repeated wording maintains the narrative's rhetorical texture and avoids overexplaining
    the political allegiance in one clause but not the other.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; consistency
    of key terms, or documented exception'
