id: 1KI.2.11
reference: 1 Kings 2:11
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֗ים אֲשֶׁ֨ר מָלַ֤ךְ דָּוִד֙ עַל יִשְׂרָאֵ֔ל אַרְבָּעִ֖ים שָׁנָ֑ה
    בְּ/חֶבְר֤וֹן מָלַךְ֙ שֶׁ֣בַע שָׁנִ֔ים וּ/בִ/ירוּשָׁלִַ֣ם מָלַ֔ךְ שְׁלֹשִׁ֥ים
    וְ/שָׁלֹ֖שׁ שָׁנִֽים־׃
translation:
  text: The days that David reigned over Israel were forty years. In Hebron he reigned
    seven years, and in Jerusalem he reigned thirty-three years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהַיָּמִים
  chosen: The days
  alternatives:
  - The time
  - The length of time
  lexicon: HALOT
  rationale: A literal rendering of the Hebrew idiom 'the days' is natural enough
    in English here and preserves the biblical style. The following clause clarifies
    that it refers to the duration of David's reign.
- source_word: אֲשֶׁר מָלַךְ
  chosen: that David reigned
  alternatives:
  - during which David reigned
  - that David was king
  lexicon: HALOT
  rationale: The relative clause is best rendered straightforwardly as 'that David
    reigned.' 'Was king' is possible, but 'reigned' more directly reflects מָלַךְ
    and fits the regnal context.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  - as king over Israel
  lexicon: HALOT
  rationale: The preposition עַל with מלך commonly indicates rule over a people. 'Over
    Israel' is idiomatic and preserves the sense of kingship.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Standard rendering of the numeral plus time expression.
- source_word: בְּחֶבְרוֹן
  chosen: In Hebron
  alternatives:
  - At Hebron
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Hebron' is the most natural English
    rendering for the city name.
- source_word: מָלַךְ שֶׁבַע שָׁנִים
  chosen: he reigned seven years
  alternatives:
  - he was king seven years
  lexicon: HALOT
  rationale: Repeating 'he reigned' mirrors the Hebrew structure and keeps the regnal
    summary explicit.
- source_word: וּבִירוּשָׁלִַם
  chosen: and in Jerusalem
  alternatives:
  - and at Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering with the conjunction preserved.
- source_word: שְׁלֹשִׁים וְשָׁלֹשׁ שָׁנִים
  chosen: thirty-three years
  alternatives:
  - thirty and three years
  lexicon: HALOT
  rationale: Modern English expresses the compound number as 'thirty-three.' This
    preserves the exact total while avoiding archaic phrasing.
