id: 1KI.2.34
reference: 1 Kings 2:34
source:
  edition: WLC
  text: וַ/יַּ֗עַל בְּנָיָ֨הוּ֙ בֶּן יְה֣וֹיָדָ֔ע וַ/יִּפְגַּע בּ֖/וֹ וַ/יְמִתֵ֑/הוּ
    וַ/יִּקָּבֵ֥ר בְּ/בֵית֖/וֹ בַּ/מִּדְבָּֽר־־׃
translation:
  text: Then Benaiah son of Jehoiada went up, struck him down, and put him to death;
    and he was buried at his house in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell upon him and killed him.' The Hebrew uses two verbs, one for the
      assault and one for the killing, which the main text preserves distinctly.
    reason: lexical_alternative
  - marker: b
    text: '''At his house'' may refer more broadly to burial on his family property
      or estate in the wilderness.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went up against
  - came up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' In narrative context it
    can imply going up to carry out the king's command, but the plain spatial/narrative
    sense is best preserved as 'went up' rather than paraphrasing more heavily.
- source_word: וַיִּפְגַּע בּוֹ
  chosen: struck him down
  alternatives:
  - fell upon him
  - attacked him
  - struck him
  lexicon: HALOT
  rationale: פגע with ב can mean to meet, encounter, attack, or strike. In this execution
    context, 'struck him down' conveys the hostile action clearly in natural English
    without collapsing it into the following explicit killing verb.
- source_word: וַיְמִתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, 'cause to die/put to death.' 'Put him
    to death' preserves the causative force and the judicial-execution context better
    than the flatter 'killed him.'
- source_word: וַיִּקָּבֵר
  chosen: he was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Niphal is passive, so 'he was buried' is the natural rendering. The
    subject shifts from Benaiah's actions to Joab's burial, which English expresses
    clearly with the passive.
- source_word: בְּבֵיתוֹ
  chosen: at his house
  alternatives:
  - in his house
  - at his home
  - on his property
  lexicon: HALOT
  rationale: בית can denote house, household, or estate. In a burial notice, 'at his
    house' most naturally suggests burial at or by his residence/property, fitting
    the context better than the potentially misleading 'in his house.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: מדבר commonly denotes wilderness/desert land. 'Wilderness' is the standard
    biblical English rendering and fits the likely location of Joab's house without
    over-specifying terrain.
