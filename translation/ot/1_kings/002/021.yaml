id: 1KI.2.21
reference: 1 Kings 2:21
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר יֻתַּ֖ן אֶת אֲבִישַׁ֣ג הַ/שֻּׁנַמִּ֑ית לַ/אֲדֹנִיָּ֥הוּ אָחִ֖י/ךָ
    לְ/אִשָּֽׁה־׃
translation:
  text: And she said, “Let Abishag the Shunammite be given to Adonijah your brother
    as a wife.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  - So she said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And she said' preserves
    the simple Hebrew narrative flow without overinterpreting the conjunction.
- source_word: יֻתַּן
  chosen: Let ... be given
  alternatives:
  - May ... be given
  - '... should be given'
  lexicon: HALOT
  rationale: The passive jussive expresses a request or proposal. 'Let ... be given'
    is idiomatic English that preserves the volitional nuance better than a flat future
    passive.
- source_word: אֶת אֲבִישַׁג
  chosen: Abishag
  rationale: אֶת marks the definite direct object and is not translated independently
    in English. The personal name is transliterated per translation philosophy.
- source_word: הַשֻּׁנַמִּית
  chosen: the Shunammite
  alternatives:
  - the woman from Shunem
  lexicon: HALOT
  rationale: The gentilic/title identifies Abishag by origin. 'The Shunammite' is
    concise, natural, and preserves the Hebrew designation.
- source_word: לַאֲדֹנִיָּהוּ
  chosen: to Adonijah
  alternatives:
  - for Adonijah
  rationale: The preposition ל marks the indirect object/recipient. 'To Adonijah'
    is the most direct rendering in this marriage-giving construction.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: The 2ms suffix addresses Solomon directly. 'Your brother' preserves both
    the familial relation and the rhetorical force of the appeal.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - as wife
  lexicon: HALOT
  rationale: In marital contexts this construction means taking a woman in marriage.
    'As a wife' is clear modern English and preserves the formal marital sense without
    paraphrase.
