id: 1KI.2.36
reference: 1 Kings 2:36
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח הַ/מֶּ֨לֶךְ֙ וַ/יִּקְרָ֣א לְ/שִׁמְעִ֔י וַ/יֹּ֣אמֶר ל֗/וֹ בְּֽנֵה
    לְ/ךָ֥ בַ֨יִת֙ בִּ/יר֣וּשָׁלִַ֔ם וְ/יָשַׁבְתָּ֖ שָׁ֑ם וְ/לֹֽא תֵצֵ֥א מִ/שָּׁ֖ם
    אָ֥נֶה וָ/אָֽנָה־־׃
translation:
  text: Then the king sent and called for Shimei and said to him, “Build yourself
    a house in Jerusalem and live there, and do not go out from there anywhere.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''here or there,'' that is, ''anywhere.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח in this narrative formula naturally means 'sent,' with
    the following וַיִּקְרָא supplying the content that he sent and summoned Shimei.
    'Sent for' is possible in English, but retaining 'sent and called for' better
    reflects the two Hebrew verbs.
- source_word: וַיִּקְרָא לְשִׁמְעִי
  chosen: called for Shimei
  alternatives:
  - summoned Shimei
  - called Shimei
  lexicon: HALOT
  rationale: קרא with ל can mean to call to or summon someone. 'Called for' preserves
    the sense of royal summons in idiomatic English without overstating formality.
    'Summoned' is viable but slightly more interpretive.
- source_word: בְּנֵה לְךָ בַיִת
  chosen: Build yourself a house
  alternatives:
  - Build a house for yourself
  - Build yourself a home
  lexicon: HALOT
  rationale: 'בנה is a direct imperative, and לְךָ marks personal benefit: ''for yourself.''
    ''House'' is preferred over ''home'' because the Hebrew noun בית denotes the physical
    dwelling here.'
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
- source_word: וְיָשַׁבְתָּ שָׁם
  chosen: and live there
  alternatives:
  - and dwell there
  - and stay there
  lexicon: HALOT
  rationale: ישׁב commonly means sit, dwell, remain, or live. In this command about
    residence restriction, 'live there' is natural modern English and captures ongoing
    residence better than the more archaic 'dwell there.'
- source_word: וְלֹא תֵצֵא מִשָּׁם
  chosen: and do not go out from there
  alternatives:
  - and do not leave there
  - and you must not go out from there
  lexicon: HALOT
  rationale: יצא means 'go out' or 'go forth.' 'Go out from there' stays close to
    the Hebrew wording and prepares for the following distributive phrase. 'Leave'
    is smoother but slightly less literal.
- source_word: אָנֶה וָאָנָה
  chosen: anywhere
  alternatives:
  - here or there
  - to this place or that
  - in any direction
  lexicon: HALOT
  rationale: The idiom אנה ואנה is distributive, meaning 'here and there' or 'anywhere.'
    'Anywhere' is the clearest natural English equivalent in this prohibition, while
    the alternatives preserve the more literal distributive nuance.
