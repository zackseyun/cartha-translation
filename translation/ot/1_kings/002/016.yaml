id: 1KI.2.16
reference: 1 Kings 2:16
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שְׁאֵלָ֤ה אַחַת֙ אָֽנֹכִי֙ שֹׁאֵ֣ל מֵֽ/אִתָּ֔/ךְ אַל תָּשִׁ֖בִי
    אֶת פָּנָ֑/י וַ/תֹּ֥אמֶר אֵלָ֖י/ו דַּבֵּֽר־־׃
translation:
  text: And now I am asking one request of you; do not turn away my face. And she
    said to him, “Speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''do not turn away my face,'' meaning ''do not refuse me''
      or ''do not deny my request.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the next move in the conversation; 'And
    now' preserves the connective ו plus temporal/adversative force of עתה.
- source_word: שְׁאֵלָה אַחַת
  chosen: one request
  alternatives:
  - one petition
  - one thing
  lexicon: HALOT
  rationale: The noun שְׁאֵלָה denotes a request/petition. 'One request' is natural
    English and preserves the quantified expression.
- source_word: אָנֹכִי שֹׁאֵל מֵאִתָּךְ
  chosen: I am asking of you
  alternatives:
  - I ask from you
  - I am requesting from you
  lexicon: HALOT
  rationale: The participle שֹׁאֵל with independent pronoun אָנֹכִי gives an immediate,
    present request. 'I am asking of you' reflects the ongoing/requestive sense in
    idiomatic English.
- source_word: אַל תָּשִׁבִי אֶת פָּנַי
  chosen: do not turn away my face
  alternatives:
  - do not refuse me
  - do not turn back my face
  - do not deny me
  lexicon: HALOT
  rationale: Literally the idiom is 'do not turn back/away my face.' It means not
    to reject the petitioner. I retained the Hebrew image in the main text for auditability
    and literary flavor, while preserving more idiomatic alternatives in a footnote.
- source_word: וַתֹּאמֶר אֵלָיו
  chosen: And she said to him
  alternatives:
  - Then she said to him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol sequence; straightforwardly rendered.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Say it
  - Go ahead, speak
  lexicon: HALOT
  rationale: Imperative inviting him to state the request. 'Speak' is concise and
    close to the Hebrew.
