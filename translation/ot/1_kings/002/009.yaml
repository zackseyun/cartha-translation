- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: This is not a doctrinally contested term in the provided table, but it
    carries theological and cosmological nuance. Transliteration preserves the Hebrew
    worldview without forcing a narrower interpretation such as mere burial place.
  doctrine_reference: Preserve theological tension rather than resolve it.
