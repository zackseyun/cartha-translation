id: 1KI.2.9
reference: 1 Kings 2:9
source:
  edition: WLC
  text: וְ/עַתָּה֙ אַל תְּנַקֵּ֔/הוּ כִּ֛י אִ֥ישׁ חָכָ֖ם אָ֑תָּה וְ/יָֽדַעְתָּ֙ אֵ֣ת
    אֲשֶׁ֣ר תַּֽעֲשֶׂה לּ֔/וֹ וְ/הוֹרַדְתָּ֧ אֶת שֵׂיבָת֛/וֹ בְּ/דָ֖ם שְׁאֽוֹל־־־׃
translation:
  text: But now, do not let him go unpunished, for you are a wise man, and you will
    know what you should do to him; and you shall bring his gray head down to Sheol
    with blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנַקֵּהוּ
  chosen: do not let him go unpunished
  alternatives:
  - do not hold him guiltless
  - do not acquit him
  - do not leave him unpunished
  lexicon: HALOT
  rationale: From נקה in the Piel with object suffix, meaning to declare innocent,
    leave unpunished, or acquit. In this context David is instructing Solomon not
    to treat Shimei as exempt from penalty. 'Do not let him go unpunished' communicates
    the judicial force in natural English.
- source_word: אִישׁ חָכָם
  chosen: a wise man
  alternatives:
  - a wise person
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred. The address is to Solomon as
    a male individual, so 'wise man' is more precise than a neutral alternative.
- source_word: וְיָדַעְתָּ אֵת אֲשֶׁר תַּעֲשֶׂה לוֹ
  chosen: and you will know what you should do to him
  alternatives:
  - and you know what you will do to him
  - and you will know what to do to him
  lexicon: HALOT
  rationale: 'The qatal followed by imperfect can function with future force in context:
    David expresses confidence in Solomon''s discernment. ''Should do'' brings out
    prudent obligation implied by the royal-judicial setting without overparaphrasing.'
- source_word: וְהוֹרַדְתָּ
  chosen: and you shall bring down
  alternatives:
  - and bring down
  - and make go down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative, 'cause to go down' or 'bring down.' The form
    continues the instruction to Solomon and is rendered as a direct future/imperatival
    statement.
- source_word: שֵׂיבָתוֹ
  chosen: his gray head
  alternatives:
  - his gray hair
  - his old age
  lexicon: HALOT
  rationale: The noun refers to gray hair, often metonymically old age. In execution/judgment
    contexts the idiom 'bring his gray head down' is well established and preserves
    the Hebrew imagery.
- source_word: בְּדָם
  chosen: with blood
  alternatives:
  - in blood
  - bloodily
  lexicon: HALOT
  rationale: The preposition ב with דם here most naturally indicates violent death
    accompanied by bloodshed. 'With blood' is a fairly literal rendering that preserves
    the starkness of the Hebrew idiom.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best transliterated here to preserve the Hebrew concept rather
    than flattening it to merely 'grave.' A lexical alternative is worth preserving
    because English readers may otherwise miss the semantic range.
