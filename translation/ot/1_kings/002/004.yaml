theological_decisions:
- issue: Conditionality of the Davidic promise
  chosen_reading: The verse is rendered with an explicit condition ('If your sons...'), preserving the text's stated conditional form without harmonizing it with unconditional formulations elsewhere.
  alternative_readings:
  - Treat the promise as effectively unconditional in translation by smoothing the condition into a general exhortation
  rationale: The Hebrew plainly presents a condition tied to David's descendants' conduct. The translation preserves that tension rather than resolving broader theological debates about the Davidic covenant.
  doctrine_reference: Preserve theological tension rather than resolve it.
