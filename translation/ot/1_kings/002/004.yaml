id: 1KI.2.4
reference: 1 Kings 2:4
source:
  edition: WLC
  text: לְמַעַן֩ יָקִ֨ים יְהוָ֜ה אֶת דְּבָר֗/וֹ אֲשֶׁ֨ר דִּבֶּ֣ר עָלַ/י֮ לֵ/אמֹר֒ אִם יִשְׁמְר֨וּ בָנֶ֜י/ךָ אֶת דַּרְכָּ֗/ם לָ/לֶ֤כֶת לְ/פָנַ/י֙ בֶּ/אֱמֶ֔ת בְּ/כָל לְבָבָ֖/ם וּ/בְ/כָל נַפְשָׁ֑/ם לֵ/אמֹ֕ר לֹֽא יִכָּרֵ֤ת לְ/ךָ֙ אִ֔ישׁ מֵ/עַ֖ל כִּסֵּ֥א יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: so that Yahweh may establish his word that he spoke concerning me, saying, ‘If your sons keep their way, to walk before me in truth with all their heart and with all their soul,’ saying, ‘You shall not lack a man on the throne of Israel.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'you shall not lack a man on the throne of Israel.' The Hebrew is literally, 'a man of yours shall not be cut off from upon the throne of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''In truth'' can also be rendered ''faithfully'' or ''with integrity.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'he spoke concerning me'; some translations render 'he spoke to me.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - so that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the purposive force.
- source_word: יָקִים
  chosen: may establish
  alternatives:
  - may confirm
  - may fulfill
  - may uphold
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to stand, i.e., establish/confirm a spoken word. 'Establish' fits covenant-promise language well.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - what he said
  lexicon: HALOT
  rationale: The noun is literally 'word'; in context it refers to a promise, but 'word' preserves the Hebrew while remaining idiomatic.
- source_word: דִּבֶּר עָלַי
  chosen: he spoke concerning me
  alternatives:
  - he spoke about me
  - he spoke to me
  lexicon: HALOT
  rationale: The preposition עַל with דבר commonly means 'concerning/about.' Although some English versions render 'to me' from contextual expectation, the Hebrew here points to speech concerning David.
- source_word: אִם
  chosen: If
  alternatives:
  - provided that
  - when
  lexicon: HALOT
  rationale: Introduces the condition attached to the promise.
- source_word: יִשְׁמְרוּ
  chosen: keep
  alternatives:
  - guard
  - observe
  - watch over
  lexicon: HALOT
  rationale: In covenantal/ethical contexts שׁמר commonly means to keep or observe. 'Keep' is concise and idiomatic.
- source_word: בָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, referring to David's dynastic descendants. Per gender-accurate policy, 'sons' is retained.
- source_word: אֶת דַּרְכָּם
  chosen: their way
  alternatives:
  - their path
  - their conduct
  lexicon: HALOT
  rationale: Hebrew 'way' is a common metaphor for manner of life. Singular with plural suffix is naturally rendered 'their way' here.
- source_word: לָלֶכֶת לְפָנַי
  chosen: by walking before me
  alternatives:
  - to walk before me
  - by living before me
  lexicon: HALOT
  rationale: Infinitive construction explains how they keep their way. 'Walking before me' preserves the covenantal metaphor.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - faithfully
  - with integrity
  lexicon: HALOT
  rationale: אמת can denote truth, faithfulness, or reliability. 'In truth' is formally close and leaves the semantic richness intact.
- source_word: בְּכָל לְבָבָם
  chosen: with all their heart
  alternatives:
  - with their whole heart
  lexicon: HALOT
  rationale: Standard idiomatic rendering of total inner devotion.
- source_word: וּבְכָל נַפְשָׁם
  chosen: and with all their soul
  alternatives:
  - and with all their life
  - and with all their being
  lexicon: HALOT
  rationale: נפש can mean soul, life, self. 'Soul' preserves the familiar covenantal phrasing and pairs naturally with 'heart.'
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  chosen: A man of yours shall not be cut off
  alternatives:
  - You shall not lack a man
  - there shall not be cut off for you a man
  lexicon: HALOT
  rationale: The Niphal of כרת is literally 'be cut off.' This preserves the Hebrew idiom and dynastic force more transparently than the smoother but more interpretive 'you shall not lack a man.'
- source_word: מֵעַל כִּסֵּא יִשְׂרָאֵל
  chosen: from upon the throne of Israel
  alternatives:
  - from the throne of Israel
  - to sit on the throne of Israel
  lexicon: HALOT
  rationale: מֵעַל is literally 'from upon.' The phrase refers to removal from royal rule; the chosen rendering stays close to the Hebrew structure.
