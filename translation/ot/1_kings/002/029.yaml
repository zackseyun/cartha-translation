id: 1KI.2.29
reference: 1 Kings 2:29
source:
  edition: WLC
  text: וַ/יֻּגַּ֞ד לַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה כִּ֣י נָ֤ס יוֹאָב֙ אֶל אֹ֣הֶל יְהוָ֔ה וְ/הִנֵּ֖ה
    אֵ֣צֶל הַ/מִּזְבֵּ֑חַ וַ/יִּשְׁלַ֨ח שְׁלֹמֹ֜ה אֶת בְּנָיָ֧הוּ בֶן יְהוֹיָדָ֛ע
    לֵ/אמֹ֖ר לֵ֥ךְ פְּגַע בּֽ/וֹ־־־־׃
translation:
  text: And it was reported to King Solomon that Joab had fled to the tent of the
    LORD, and behold, he was beside the altar. So Solomon sent Benaiah son of Jehoiada,
    saying, “Go, strike him down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “tabernacle of the LORD.” The Hebrew says “tent of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “Go, fall upon him” / “Go, attack him.” The Hebrew verb can denote striking
      or assaulting; here it carries the sense of a lethal blow in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal of נגד indicates information being made known to someone.
    'It was reported' is natural modern English and preserves the passive sense.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - to the king, Solomon
  lexicon: HALOT
  rationale: The phrase identifies the recipient with title plus name. English idiom
    prefers 'to King Solomon' rather than a more wooden apposition.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the content of the report; 'that' best fits English indirect
    discourse.
- source_word: נָס
  chosen: had fled
  alternatives:
  - fled
  - had escaped
  lexicon: HALOT
  rationale: 'The qatal after the reporting verb is well represented by English pluperfect
    in narrative sequence: Joab''s flight preceded the report.'
- source_word: אֶל אֹהֶל יְהוָה
  chosen: to the tent of the LORD
  alternatives:
  - to the tabernacle of the LORD
  - to the LORD's tent
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' Although 'tabernacle' is traditional, 'tent'
    is more transparent to the Hebrew. יְהוָה follows the project's default as 'the
    LORD'.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there he was
  - and look
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Behold' preserves
    the vividness and abruptness without paraphrase.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  chosen: he was beside the altar
  alternatives:
  - he was by the altar
  - he was near the altar
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity. 'Beside' is a clear, natural rendering and fits
    the sanctuary setting.
- source_word: וַיִּשְׁלַח
  chosen: So Solomon sent
  alternatives:
  - And Solomon sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' captures the consequential
    flow from the report to Solomon's action.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Standard English rendering of Hebrew patronymic; concise and natural.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Introduces direct speech following the sending. 'Saying' closely reflects
    the Hebrew construction.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative of הלך; 'Go' is direct and sufficient.
- source_word: פְּגַע בּוֹ
  chosen: strike him down
  alternatives:
  - fall upon him
  - attack him
  - kill him
  lexicon: HALOT
  rationale: פגע with ב can mean to strike, attack, or fall upon. In this execution
    context, 'strike him down' conveys the lethal force intended without overinterpreting
    beyond the verb's range. 'Kill him' is interpretive; 'fall upon him' is too wooden
    for modern English.
