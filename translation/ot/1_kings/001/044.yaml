id: 1KI.1.44
reference: 1 Kings 1:44
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח אִתּֽ/וֹ הַ֠/מֶּלֶךְ אֶת צָד֨וֹק הַ/כֹּהֵ֜ן וְ/אֶת נָתָ֣ן הַ/נָּבִ֗יא
    וּ/בְנָיָ֨הוּ֙ בֶּן יְה֣וֹיָדָ֔ע וְ/הַ/כְּרֵתִ֖י וְ/הַ/פְּלֵתִ֑י וַ/יַּרְכִּ֣בוּ
    אֹת֔/וֹ עַ֖ל פִּרְדַּ֥ת הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: And the king sent with him Zadok the priest, Nathan the prophet, Benaiah son
    of Jehoiada, and the Cherethites and the Pelethites; and they mounted him on the
    king’s mule.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'on the king’s she-mule.' The Hebrew noun can denote
      a female mule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The wayyiqtol of שׁלח is straightforward narrative past, 'sent.' 'Dispatched'
    is possible but slightly more marked in English than the Hebrew requires.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates accompaniment. 'With
    him' is the most direct and natural rendering.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context, David.
    The Hebrew uses the title, not the personal name, so 'the king' is retained.
- source_word: צָדוֹק הַכֹּהֵן
  chosen: Zadok the priest
  lexicon: HALOT
  rationale: Name is transliterated; title is translated per project philosophy. The
    appositional construction is naturally rendered 'Zadok the priest.'
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  lexicon: HALOT
  rationale: Name is transliterated; title is translated. 'Prophet' accurately reflects
    נביא.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Standard Hebrew patronymic. 'Son of Jehoiada' is concise and natural
    modern English.
- source_word: הַכְּרֵתִי
  chosen: the Cherethites
  alternatives:
  - the Kerethites
  lexicon: HALOT
  rationale: This is a group designation, traditionally rendered 'Cherethites.' The
    transliteration preserves the ethnic/proper-name character better than attempting
    an interpretive gloss.
- source_word: הַפְּלֵתִי
  chosen: the Pelethites
  lexicon: HALOT
  rationale: Likewise a group designation best preserved by transliteration. This
    keeps parallelism with 'Cherethites' and avoids overinterpretation.
- source_word: וַיַּרְכִּבוּ
  chosen: they mounted him
  alternatives:
  - they had him ride
  - they set him on
  lexicon: HALOT
  rationale: Hiphil of רכב means to cause to ride. 'Mounted him' is concise and preserves
    the causative sense better than the looser 'had him ride.'
- source_word: עַל פִּרְדַּת הַמֶּלֶךְ
  chosen: on the king’s mule
  alternatives:
  - on the king's she-mule
  lexicon: HALOT
  rationale: פִּרְדָּה denotes a mule, often specifically a female mule. English 'mule'
    is idiomatic and sufficient in context; specifying 'she-mule' would be more biologically
    precise but unnecessarily prominent unless the sex is contextually important.
