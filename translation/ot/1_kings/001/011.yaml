theological_decisions:
- issue: Rendering of אֲדֹנֵינוּ for David
  chosen_reading: our lord David
  alternative_readings:
  - our master David
  rationale: The term is a human honorific for the king, not a divine title. Lowercase
    'lord' preserves the courtly register without confusing it with the covenant name
    or a christological title.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord; analogous title logic
    applied here with lowercase for human referent.'
