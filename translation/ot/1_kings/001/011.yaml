id: 1KI.1.11
reference: 1 Kings 1:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר נָתָ֗ן אֶל בַּת שֶׁ֤בַע אֵם שְׁלֹמֹה֙ לֵ/אמֹ֔ר הֲ/ל֣וֹא שָׁמַ֔עַתְּ
    כִּ֥י מָלַ֖ךְ אֲדֹנִיָּ֣הוּ בֶן חַגִּ֑ית וַ/אֲדֹנֵ֥י/נוּ דָוִ֖ד לֹ֥א יָדָֽע־־־־׃
translation:
  text: Then Nathan said to Bathsheba, Solomon’s mother, “Have you not heard that
    Adonijah son of Haggith has become king, and our lord David does not know it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has made himself king.” The Hebrew says literally “has become king/reigned”;
      the context may imply self-exaltation, but the wording here does not explicitly
      state it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: בַּת שֶׁבַע
  chosen: Bathsheba
  lexicon: HALOT
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אֵם שְׁלֹמֹה
  chosen: Solomon’s mother
  alternatives:
  - the mother of Solomon
  lexicon: HALOT
  rationale: Construct phrase identifying Bathsheba. The possessive form is smoother
    modern English while preserving the relationship.
- source_word: לֵאמֹר
  chosen: omitted as redundant in English quotation introduction
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew speech-introduction formula is commonly implicit in idiomatic
    English once direct speech is introduced by 'said.' Its force is preserved by
    the quotation marks and following speech.
- source_word: הֲלוֹא
  chosen: Have you not
  alternatives:
  - Surely you have not
  - Is it not the case that you have
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting confirmation. 'Have you not'
    captures the rhetorical force naturally.
- source_word: שָׁמַעַתְּ
  chosen: heard
  alternatives:
  - heard about
  - learned
  lexicon: HALOT
  rationale: The verb means 'hear'; in context it refers to receiving news. 'Heard'
    is concise and idiomatic.
- source_word: כִּי
  chosen: that
  alternatives:
  - how
  lexicon: HALOT
  rationale: Introduces the content of what Bathsheba should have heard.
- source_word: מָלַךְ
  chosen: has become king
  alternatives:
  - has reigned
  - has made himself king
  - is king
  lexicon: HALOT
  rationale: The verb denotes becoming/reigning as king. In this immediate context
    of Adonijah's attempted accession, 'has become king' best reflects the eventive
    sense without over-interpreting with 'made himself king,' which the Hebrew here
    does not explicitly state.
- source_word: אֲדֹנִיָּהוּ בֶן חַגִּית
  chosen: Adonijah son of Haggith
  alternatives:
  - Adonijah, the son of Haggith
  lexicon: HALOT
  rationale: Names are transliterated; 'son of' is the straightforward rendering of
    the filial expression.
- source_word: וַאֲדֹנֵינוּ דָוִד
  chosen: and our lord David
  alternatives:
  - while our lord David
  - and David our lord
  lexicon: HALOT
  rationale: אדון with 1cp suffix is a courtly title for the king. Lowercase 'lord'
    is appropriate because this is not the divine name or title. Word order is adjusted
    for natural English while preserving the honorific.
- source_word: לֹא יָדָע
  chosen: does not know it
  alternatives:
  - does not know
  - has not known
  - is unaware
  lexicon: HALOT
  rationale: The perfect can be rendered with present relevance in English here. Adding
    'it' makes the object clear in English though implicit in Hebrew. 'Is unaware'
    is possible but less direct.
