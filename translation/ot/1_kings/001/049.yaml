id: 1KI.1.49
reference: 1 Kings 1:49
source:
  edition: WLC
  text: וַ/יֶּֽחֶרְדוּ֙ וַ/יָּקֻ֔מוּ כָּל הַ֨/קְּרֻאִ֔ים אֲשֶׁ֖ר לַ/אֲדֹנִיָּ֑הוּ
    וַ/יֵּלְכ֖וּ אִ֥ישׁ לְ/דַרְכּֽ/וֹ־׃
translation:
  text: Then all Adonijah’s invited guests trembled and rose, and each man went on
    his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'each man to his way,' an idiom meaning that they dispersed
      individually.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֶרְדוּ
  chosen: trembled
  alternatives:
  - were terrified
  - shuddered
  lexicon: HALOT
  rationale: From חרד, denoting trembling from fear or alarm. 'Trembled' preserves
    the physical and emotional sense without overstating it; 'were terrified' is interpretive,
    while 'shuddered' is less idiomatic here.
- source_word: וַיָּקֻמוּ
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: From קום, a common verb meaning to arise/stand. 'Rose' is concise and
    natural in narrative sequence, matching the sudden reaction of the guests.
- source_word: כָּל הַקְּרֻאִים אֲשֶׁר לַאֲדֹנִיָּהוּ
  chosen: all Adonijah’s invited guests
  alternatives:
  - all who had been invited by Adonijah
  - all the invited ones who belonged to Adonijah
  lexicon: HALOT
  rationale: הַקְּרֻאִים is the passive participle 'the invited ones.' In context
    these are attendees at Adonijah's feast, so 'invited guests' is the most natural
    English rendering. The ל preposition with Adonijah indicates association ('belonging
    to/for Adonijah'), idiomatically rendered as possession in English.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: From הלך, basic motion verb. 'Went' is sufficient and keeps the narrative
    plain; the following phrase specifies destination idiomatically.
- source_word: אִישׁ לְדַרְכּוֹ
  chosen: each man went on his way
  alternatives:
  - each one went his own way
  - each man went to his way
  lexicon: HALOT
  rationale: The idiom literally means 'a man to his way.' 'Each man went on his way'
    preserves the distributive force of אִישׁ and follows the project's gender-accurate
    principle, since the referents are male banquet guests in context.
