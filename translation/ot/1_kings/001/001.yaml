id: 1KI.1.1
reference: 1 Kings 1:1
source:
  edition: WLC
  text: וְ/הַ/מֶּ֤לֶךְ דָּוִד֙ זָקֵ֔ן בָּ֖א בַּ/יָּמִ֑ים וַ/יְכַסֻּ֨/הוּ֙ בַּ/בְּגָדִ֔ים
    וְ/לֹ֥א יִחַ֖ם לֽ/וֹ׃
translation:
  text: Now King David was old, advanced in days; and though they covered him with
    garments, he could not get warm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'advanced in days,' an idiom meaning very old or well along in years.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  chosen: Now King
  alternatives:
  - And the king
  - The king
  lexicon: HALOT
  rationale: The conjunction וְ at the start of a narrative unit is naturally rendered
    'Now' in English to mark scene-setting rather than simple coordination. 'King'
    translates מֶלֶךְ directly, and with the following proper name forms the title
    'King David.'
- source_word: דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - was elderly
  - had grown old
  lexicon: HALOT
  rationale: The adjective/verb conveys old age plainly. 'Was old' is the most direct
    and idiomatic English rendering without softening the statement.
- source_word: בָּא בַּיָּמִים
  chosen: advanced in days
  alternatives:
  - well along in years
  - stricken in years
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'come into days' and denotes advanced
    age. 'Advanced in days' preserves the idiomatic flavor while remaining understandable.
    'Stricken in years' is traditional but sounds archaic; 'well along in years' is
    more dynamic.
- source_word: וַיְכַסֻּהוּ
  chosen: though they covered him
  alternatives:
  - and they covered him
  - they covered him
  lexicon: HALOT
  rationale: The verb means 'covered him.' In context, the following clause expresses
    an unsuccessful result, so 'though they covered him' brings out the concessive
    sense implicit in the sequence for natural English. The subject is indefinite
    plural in Hebrew and is best left as 'they.'
- source_word: בַּבְּגָדִים
  chosen: with garments
  alternatives:
  - with clothes
  - with blankets
  lexicon: HALOT
  rationale: בְּגָדִים normally means garments/clothes. 'Garments' is slightly more
    formal and fits the royal setting. 'Blankets' is interpretive and not warranted
    by the lexical form.
- source_word: וְלֹא יִחַם לוֹ
  chosen: he could not get warm
  alternatives:
  - he was not warm
  - warmth did not come to him
  - he could not be warmed
  lexicon: HALOT
  rationale: The verb חם here refers to becoming warm. The idiom with לּוֹ indicates
    that warmth did not come to him. 'He could not get warm' is idiomatic modern English
    and conveys the ongoing inability implied by the context better than a wooden
    rendering.
