id: 1KI.1.52
reference: 1 Kings 1:52
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁלֹמֹ֔ה אִ֚ם יִהְיֶ֣ה לְ/בֶן חַ֔יִל לֹֽא יִפֹּ֥ל מִ/שַּׂעֲרָת֖/וֹ
    אָ֑רְצָ/ה וְ/אִם רָעָ֥ה תִמָּצֵא ב֖/וֹ וָ/מֵֽת־־־־׃
translation:
  text: And Solomon said, “If he proves to be a worthy man, not one of his hairs will
    fall to the ground; but if evil is found in him, he shall die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a son of valor/strength.' The Hebrew idiom can mean a man of
      worth, capability, or valor depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''not one hair of him will fall to the ground,'' an idiom meaning
      he will come to no harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן־חַיִל
  chosen: a worthy man
  alternatives:
  - a man of valor
  - a capable man
  - a man of worth
  lexicon: HALOT
  rationale: The idiom literally reads 'son of valor/strength,' but in this context
    it evaluates Adonijah's character rather than military prowess. 'Worthy man' preserves
    the moral sense in natural English while avoiding over-militarizing the phrase.
- source_word: יִהְיֶה
  chosen: proves to be
  alternatives:
  - is
  - becomes
  lexicon: HALOT
  rationale: Though formally 'is/will be,' the conditional concerns demonstrated character
    under future testing. 'Proves to be' brings out the pragmatic force without departing
    far from the Hebrew.
- source_word: מִשַּׂעֲרָתוֹ
  chosen: of his hairs
  alternatives:
  - from his hair
  - a hair of his head
  lexicon: HALOT
  rationale: The singular collective 'his hair' in Hebrew is idiomatically rendered
    in English as 'his hairs' or 'a hair of his head.' The chosen wording keeps close
    to the Hebrew while preserving the familiar idiom.
- source_word: לֹא יִפֹּל ... אָרְצָה
  chosen: not one of his hairs will fall to the ground
  alternatives:
  - not a hair of his head will fall to the earth
  - no hair of his will fall groundward
  lexicon: HALOT
  rationale: This is a stock idiom for complete preservation from harm. 'To the ground'
    is the most natural English equivalent of אָרְצָה here.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - wickedness
  - wrongdoing
  - harm
  lexicon: HALOT
  rationale: The noun denotes moral evil in this judicial setting. 'Evil' is broad
    enough to preserve the Hebrew's moral force without narrowing it to a specific
    offense.
- source_word: תִמָּצֵא בוֹ
  chosen: is found in him
  alternatives:
  - is found on him
  - is discovered in him
  lexicon: HALOT
  rationale: The passive construction indicates that culpable evil is discovered as
    belonging to him. 'In him' is slightly more literal than 'on him' and fits English
    idiom.
- source_word: וָמֵת
  chosen: he shall die
  alternatives:
  - then he will die
  - he must die
  lexicon: HALOT
  rationale: The clause states the consequence of discovered evil. 'He shall die'
    preserves the judicial solemnity without over-specifying whether this is prediction
    or sentence.
