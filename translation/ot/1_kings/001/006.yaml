id: 1KI.1.6
reference: 1 Kings 1:6
source:
  edition: WLC
  text: וְ/לֹֽא עֲצָב֨/וֹ אָבִ֤י/ו מִ/יָּמָי/ו֙ לֵ/אמֹ֔ר מַדּ֖וּעַ כָּ֣כָה עָשִׂ֑יתָ
    וְ/גַם ה֤וּא טֽוֹב תֹּ֨אַר֙ מְאֹ֔ד וְ/אֹת֥/וֹ יָלְדָ֖ה אַחֲרֵ֥י אַבְשָׁלֽוֹם־־־׃
translation:
  text: His father had never displeased him at any time by saying, “Why have you done
    thus?” He was also very handsome, and his mother had borne him after Absalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “had never grieved him” or “had never rebuked him.” The Hebrew verb can
      denote causing pain or vexation; in context it refers to David’s failure to
      check or confront Adonijah.
    reason: lexical_alternative
  - marker: b
    text: Literally “from his days,” an idiom meaning “at any time in his life.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָבוֹ
  chosen: displeased him
  alternatives:
  - grieved him
  - rebuked him
  - crossed him
  lexicon: HALOT
  rationale: The verb עצב in this stem can denote causing pain, grief, or vexation.
    In context, with the following direct speech of correction, the sense is that
    David never confronted or checked Adonijah in a way that caused him displeasure.
    'Displeased him' captures the parental-indulgence context more naturally than
    the more emotional 'grieved him,' while avoiding overinterpretive 'rebuked him'
    in the main text.
- source_word: מִיָּמָיו
  chosen: at any time
  alternatives:
  - all his days
  - from his days
  - ever in his life
  lexicon: HALOT
  rationale: Literally 'from his days.' In idiomatic English here it means never at
    any point in his life. 'At any time' conveys the force clearly in modern English.
- source_word: לֵאמֹר
  chosen: by saying
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Introduces the content of the father's unspoken correction. 'By saying'
    fits the English syntax after 'had never displeased him'.
- source_word: מַדּוּעַ כָּכָה עָשִׂיתָ
  chosen: Why have you done thus?
  alternatives:
  - Why have you done so?
  - Why did you do this?
  lexicon: HALOT
  rationale: A direct parental challenge. 'Thus' preserves the formal flavor of ככה
    while remaining understandable; 'so' is a viable smoother alternative.
- source_word: טוֹב תֹּאַר מְאֹד
  chosen: very handsome
  alternatives:
  - very good in appearance
  - very fine in form
  lexicon: HALOT
  rationale: The phrase refers to physical appearance. 'Very handsome' is the natural
    idiomatic English rendering for a male subject.
- source_word: וְאֹתוֹ יָלְדָה
  chosen: his mother had borne him
  alternatives:
  - she had borne him
  lexicon: HALOT
  rationale: Hebrew leaves the subject implicit in the verb, but English benefits
    from making the maternal subject explicit. 'His mother' is contextually inferred
    from 'bore him' and clarifies the sentence without adding new information.
- source_word: אַחֲרֵי אַבְשָׁלוֹם
  chosen: after Absalom
  alternatives:
  - next after Absalom
  lexicon: HALOT
  rationale: 'Most naturally indicates birth order: Adonijah was born after Absalom.
    ''After Absalom'' is concise and standard.'
