id: 1KI.1.34
reference: 1 Kings 1:34
source:
  edition: WLC
  text: וּ/מָשַׁ֣ח אֹת֣/וֹ שָׁ֠ם צָד֨וֹק הַ/כֹּהֵ֜ן וְ/נָתָ֧ן הַ/נָּבִ֛יא לְ/מֶ֖לֶךְ
    עַל יִשְׂרָאֵ֑ל וּ/תְקַעְתֶּם֙ בַּ/שּׁוֹפָ֔ר וַ/אֲמַרְתֶּ֕ם יְחִ֖י הַ/מֶּ֥לֶךְ
    שְׁלֹמֹֽה־׃
translation:
  text: There Zadok the priest and Nathan the prophet shall anoint him king over Israel,
    and you shall blow the trumpet and say, ‘Long live King Solomon!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shofar, a horn used for public signal or proclamation; traditionally
      rendered 'trumpet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁח
  chosen: shall anoint
  alternatives:
  - must anoint
  - are to anoint
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instruction sequence functions
    with imperative/jussive force in context; English future-like 'shall anoint' naturally
    conveys the directive without flattening the formal structure.
- source_word: שָׁם
  chosen: There
  alternatives:
  - there at that place
  lexicon: HALOT
  rationale: Locative adverb points to the previously specified location; simple 'There'
    is sufficient and idiomatic.
- source_word: צָדוֹק הַכֹּהֵן
  chosen: Zadok the priest
  lexicon: HALOT
  rationale: Name transliterated per philosophy; title translated.
- source_word: וְנָתָן הַנָּבִיא
  chosen: and Nathan the prophet
  lexicon: HALOT
  rationale: Coordinates the second agent of anointing; 'prophet' is the standard
    rendering of נָבִיא.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: The lamed marks result/office after anointing. English 'anoint him king'
    is concise and natural; 'as king' is possible but slightly more interpretive.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with royal office denotes rule or authority over the people; 'over
    Israel' best reflects enthronement language.
- source_word: וּתְקַעְתֶּם בַּשּׁוֹפָר
  chosen: you shall blow the trumpet
  alternatives:
  - you shall sound the horn
  - you shall blow the ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn, often ram's horn, but 'trumpet' is the
    most idiomatic established English in royal proclamation contexts. The more specific
    lexical alternative is worth preserving in a footnote.
- source_word: וַאֲמַרְתֶּם
  chosen: and say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: Second-person plural continues the chain of instructions; English can
    omit the repeated subject for smoother style.
- source_word: יְחִי
  chosen: Long live
  alternatives:
  - May ... live
  - Let ... live
  lexicon: HALOT
  rationale: Jussive of חיה in acclamation formula is best rendered idiomatically
    in English as 'Long live ...' rather than a wooden 'May ... live.'
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: 'In the acclamation formula, English idiom places the royal title before
    the name: ''King Solomon.'''
