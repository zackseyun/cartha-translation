id: 1KI.1.12
reference: 1 Kings 1:12
source:
  edition: WLC
  text: וְ/עַתָּ֕ה לְכִ֛י אִיעָצֵ֥/ךְ נָ֖א עֵצָ֑ה וּ/מַלְּטִי֙ אֶת נַפְשֵׁ֔/ךְ וְ/אֶת
    נֶ֥פֶשׁ בְּנֵ֖/ךְ שְׁלֹמֹֽה־־׃
translation:
  text: Now come, please let me advise you, and save your life and the life of your
    son Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go'; rendered 'come' because the expression functions idiomatically
      here as an urgent summons in direct speech.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'advise you counsel,' a cognate construction meaning 'give you advice'
      or 'counsel you.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'save your נפשׁ'; here נפשׁ means 'life' rather than 'soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces an urgent transition in the discourse. 'Now' is natural English;
    'And now' is possible but the conjunction is often discourse-linking rather than
    requiring explicit representation.
- source_word: לְכִי
  chosen: come
  alternatives:
  - go
  lexicon: HALOT
  rationale: Though the verb is from 'go/walk,' in direct address it often functions
    idiomatically as an invitation or summons. 'Come' fits the immediate conversational
    force in English better than the more wooden 'go.'
- source_word: אִיעָצֵךְ נָא עֵצָה
  chosen: please let me advise you
  alternatives:
  - let me give you counsel, please
  - let me counsel you
  lexicon: HALOT
  rationale: The Hebrew combines the verb 'advise/counsel' with the cognate noun 'counsel'
    for emphasis. English normally avoids the cognate repetition, so 'let me advise
    you' captures the sense, while 'please' renders נָא as a polite urgent particle.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Marks entreaty/politeness rather than time. 'Please' is the clearest
    modern English equivalent.
- source_word: וּמַלְּטִי
  chosen: and save
  alternatives:
  - and escape with
  - and deliver
  lexicon: HALOT
  rationale: The imperative from מלט calls for securing escape/deliverance. In context
    Bathsheba is being urged to act so as to preserve life; 'save' communicates the
    practical force clearly in idiomatic English.
- source_word: נַפְשֵׁךְ
  chosen: your life
  alternatives:
  - your soul
  - your self
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life, not an abstract immaterial soul.
    'Your life' best fits the threatened political context.
- source_word: וְאֶת נֶפֶשׁ בְּנֵךְ שְׁלֹמֹה
  chosen: and the life of your son Solomon
  alternatives:
  - and your son Solomon's life
  lexicon: HALOT
  rationale: Maintains the parallel with 'your life' and keeps Solomon explicitly
    named as in the Hebrew.
