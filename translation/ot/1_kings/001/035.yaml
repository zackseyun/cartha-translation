theological_decisions:
- issue: Royal office term נָגִיד in relation to kingship
  chosen_reading: rendered as 'ruler' while retaining 'he shall reign' for מלך
  alternative_readings:
  - prince
  - leader
  rationale: The verse uses both מלך ('reign') and נָגִיד ('ruler/leader/prince').
    Rendering them with distinct English terms preserves the nuance rather than flattening
    both into 'king.' This is a lexical-contextual decision, not a doctrinal one,
    but it affects how royal authority is portrayed.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
