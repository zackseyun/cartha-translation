id: 1KI.1.35
reference: 1 Kings 1:35
source:
  edition: WLC
  text: וַ/עֲלִיתֶ֣ם אַחֲרָ֗י/ו וּ/בָא֙ וְ/יָשַׁ֣ב עַל כִּסְאִ֔/י וְ/ה֥וּא יִמְלֹ֖ךְ
    תַּחְתָּ֑/י וְ/אֹת֤/וֹ צִוִּ֨יתִי֙ לִֽ/הְי֣וֹת נָגִ֔יד עַל יִשְׂרָאֵ֖ל וְ/עַל
    יְהוּדָֽה־־־׃
translation:
  text: Then you shall go up after him, and he shall come and sit on my throne, and
    he shall reign in my place; and I have appointed him to be ruler over Israel and
    over Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have commanded him to be prince/leader over Israel and over Judah.'
      The Hebrew verb often means 'command,' and נָגִיד can also be rendered 'prince'
      or 'leader.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲלִיתֶם
  chosen: you shall go up
  alternatives:
  - you shall come up
  - you shall escort him up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In this royal procession context,
    'go up' preserves the directional sense without over-paraphrasing. The prefixed
    waw with the sequence of commands is naturally rendered with future force in English.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: The phrase marks following in procession. 'After him' is idiomatic and
    preserves the sequence and honor implied.
- source_word: וּבָא
  chosen: he shall come
  alternatives:
  - he shall enter
  lexicon: HALOT
  rationale: בוא is broadly 'come/enter.' Since the next clause specifies sitting
    on the throne, 'come' is the least interpretive and lets the sequence unfold naturally.
- source_word: וְיָשַׁב עַל כִּסְאִי
  chosen: sit on my throne
  alternatives:
  - sit upon my throne
  - take his seat on my throne
  lexicon: HALOT
  rationale: ישב על כסא is standard enthronement language. 'Sit on my throne' is clear
    modern English and preserves the royal succession imagery.
- source_word: וְהוּא יִמְלֹךְ תַּחְתָּי
  chosen: he shall reign in my place
  alternatives:
  - he shall reign after me
  - he shall reign instead of me
  lexicon: HALOT
  rationale: תחת with a pronominal suffix here indicates succession/substitution in
    office. 'In my place' communicates royal replacement more naturally than the more
    temporal 'after me,' while avoiding the potentially adversative sense of 'instead
    of me.'
- source_word: צִוִּיתִי
  chosen: I have appointed
  alternatives:
  - I have commanded
  - I have charged
  lexicon: HALOT
  rationale: While צוה often means 'command,' in this context David is not merely
    issuing an order to Solomon but designating him for office. 'Appointed' best captures
    the performative force in context. The alternative sense is preserved in a footnote
    because the lexical base is 'command.'
- source_word: לִהְיוֹת נָגִיד
  chosen: to be ruler
  alternatives:
  - to be prince
  - to be leader
  - to be governor
  lexicon: HALOT
  rationale: נָגִיד often denotes a leader/prince appointed over a people, sometimes
    with emphasis on divinely or royally designated rule. Here 'ruler' is accessible
    and fits the immediate royal context without implying a lesser status than the
    following 'he shall reign.'
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה
  chosen: over Israel and over Judah
  alternatives:
  - over Israel and Judah
  lexicon: HALOT
  rationale: Repeating 'over' reflects the Hebrew's repeated עַל and preserves the
    formal designation of authority over both entities.
