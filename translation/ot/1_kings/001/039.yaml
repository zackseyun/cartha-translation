id: 1KI.1.39
reference: 1 Kings 1:39
source:
  edition: WLC
  text: וַ/יִּקַּח֩ צָד֨וֹק הַ/כֹּהֵ֜ן אֶת קֶ֤רֶן הַ/שֶּׁ֨מֶן֙ מִן הָ/אֹ֔הֶל וַ/יִּמְשַׁ֖ח
    אֶת שְׁלֹמֹ֑ה וַֽ/יִּתְקְעוּ֙ בַּ/שּׁוֹפָ֔ר וַ/יֹּֽאמְרוּ֙ כָּל הָ/עָ֔ם יְחִ֖י
    הַ/מֶּ֥לֶךְ שְׁלֹמֹֽה־־־־׃
translation:
  text: Then Zadok the priest took the horn of oil from the tent and anointed Solomon.
    Then they blew the ram’s horn, and all the people said, “Long live King Solomon!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they blew the trumpet”; Hebrew shofar, a horn trumpet, often a ram’s
      horn.
    reason: lexical_alternative
  - marker: b
    text: Or “from the tabernacle”; Hebrew simply “from the tent.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took up
  - fetched
  lexicon: HALOT
  rationale: Standard wayyiqtol of לקח, narrating the next action in sequence. 'Took'
    is the plain English equivalent.
- source_word: צָדוֹק הַכֹּהֵן
  chosen: Zadok the priest
  alternatives:
  - Zadok, the priest
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy; הַכֹּהֵן is a
    title/apposition best rendered directly as 'the priest'.
- source_word: קֶרֶן הַשֶּׁמֶן
  chosen: the horn of oil
  alternatives:
  - the horn filled with oil
  - the flask of oil
  lexicon: HALOT
  rationale: קֶרֶן is literally 'horn.' Retaining 'horn of oil' preserves the concrete
    ritual image of an anointing vessel made from a horn. 'Flask' is interpretive
    and less transparent to the Hebrew.
- source_word: מִן הָאֹהֶל
  chosen: from the tent
  alternatives:
  - from the tabernacle
  - from the sacred tent
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent.' While the referent is likely the sanctuary
    tent, 'the tent' best reflects the Hebrew wording without importing a more specific
    term not used here.
- source_word: וַיִּמְשַׁח
  chosen: anointed
  alternatives:
  - poured oil on and consecrated
  lexicon: HALOT
  rationale: משׁח is the standard verb for ritual anointing. 'Anointed' is both accurate
    and idiomatic, and preserves the royal-consecration sense.
- source_word: וַיִּתְקְעוּ בַּשּׁוֹפָר
  chosen: they blew the ram’s horn
  alternatives:
  - they blew the trumpet
  - they sounded the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn trumpet, typically a ram's horn. 'Ram’s horn'
    communicates the concrete object in accessible English better than the more generic
    'trumpet,' while avoiding unnecessary transliteration in the main text.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - the whole people
  lexicon: HALOT
  rationale: A straightforward rendering of the collective expression, preserving
    the public and communal nature of the acclamation.
- source_word: יְחִי הַמֶּלֶךְ שְׁלֹמֹה
  chosen: Long live King Solomon!
  alternatives:
  - May King Solomon live!
  - Let King Solomon live!
  lexicon: HALOT
  rationale: The jussive יְחִי expresses an acclamation or wish for the king's life.
    'Long live King Solomon!' is the natural English equivalent for this royal formula.
