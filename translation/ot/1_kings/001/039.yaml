theological_decisions:
- issue: Specificity of הָאֹהֶל in a royal-anointing context
  chosen_reading: the tent
  alternative_readings:
  - the tabernacle
  - the sacred tent
  rationale: The Hebrew uses the common noun 'tent' with the article. Although the
    referent is likely the sanctuary structure associated with worship, the translation
    preserves the source wording rather than specifying 'tabernacle' in the main text.
    This avoids importing a technical term beyond the text while leaving the cultic
    setting intelligible.
  doctrine_reference: Translation philosophy §1, §6
