id: 1KI.1.21
reference: 1 Kings 1:21
source:
  edition: WLC
  text: וְ/הָיָ֕ה כִּ/שְׁכַ֥ב אֲדֹנִֽ/י הַ/מֶּ֖לֶךְ עִם אֲבֹתָ֑י/ו וְ/הָיִ֗יתִי אֲנִ֛י
    וּ/בְנִ֥/י שְׁלֹמֹ֖ה חַטָּאִֽים־־׃
translation:
  text: And when my lord the king lies down with his fathers, I and my son Solomon
    will be counted as offenders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "sinners." The Hebrew term can denote those regarded as guilty or culpable;
      here the context suggests a legal-political status rather than a general moral
      description.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will
  alternatives:
  - And it will happen
  - Then it will be
  lexicon: HALOT
  rationale: Introduces the result/apodosis of Bathsheba's concern. In English, the
    idiom is best carried by a smooth future construction rather than a wooden 'and
    it will be.'
- source_word: כִּשְׁכַב
  chosen: when ... lies down
  alternatives:
  - when ... has lain down
  - when ... sleeps
  lexicon: HALOT
  rationale: שׁכב with 'with his fathers' is a standard idiom for death. 'Lies down'
    preserves the Hebrew imagery while allowing the following phrase to signal the
    meaning.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  - my lord, the king
  lexicon: HALOT
  rationale: Courtly address to David. 'My lord the king' is the most natural English
    equivalent and preserves the deferential tone.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  - with his forefathers
  lexicon: HALOT
  rationale: Traditional Hebrew idiom for joining one's dead ancestors. 'With his
    fathers' keeps the idiomatic and familial force of the Hebrew.
- source_word: וְהָיִיתִי אֲנִי
  chosen: I ... will be counted
  alternatives:
  - I will become
  - I will be
  lexicon: HALOT
  rationale: 'The simple verb ''be'' here functions predicatively with חטאים in a
    legal/social sense. English idiom benefits from making explicit the implied status
    or reckoning: Bathsheba and Solomon will be regarded as such.'
- source_word: וּבְנִי שְׁלֹמֹה
  chosen: and my son Solomon
  alternatives:
  - and Solomon my son
  lexicon: HALOT
  rationale: Straightforward rendering preserving both filial relationship and personal
    name.
- source_word: חַטָּאִים
  chosen: offenders
  alternatives:
  - sinners
  - criminals
  - guilty ones
  lexicon: HALOT
  rationale: In this succession context, the sense is not primarily moral-spiritual
    ('sinners') but people treated as culpable or liable to punishment. 'Offenders'
    captures the legal-political force without over-specifying the charge.
