id: 1KI.1.36
reference: 1 Kings 1:36
source:
  edition: WLC
  text: וַ/יַּ֨עַן בְּנָיָ֧הוּ בֶן יְהֽוֹיָדָ֛ע אֶת הַ/מֶּ֖לֶךְ וַ/יֹּ֣אמֶר אָמֵ֑ן
    כֵּ֚ן יֹאמַ֣ר יְהוָ֔ה אֱלֹהֵ֖י אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־׀׃
translation:
  text: Benaiah son of Jehoiada answered the king and said, “Amen! May the LORD, the
    God of my lord the king, say so as well.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Amen! So may the LORD, the God of my lord the king, say.' The Hebrew
      verb can be rendered more literally as 'say,' with the sense of confirming or
      ordaining the king's wish.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply. 'Answered' is the
    most direct and idiomatic rendering in this court dialogue.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  rationale: Personal names are transliterated per project philosophy; 'son of' preserves
    the Hebrew patronymic construction.
- source_word: אֶת הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct-object marker אֶת is not represented in English; הַמֶּלֶךְ is
    rendered straightforwardly as 'the king'.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Common Hebrew narrative sequencing; 'and said' is natural English and
    preserves the formal structure.
- source_word: אָמֵן
  chosen: Amen!
  alternatives:
  - So be it!
  - Truly!
  lexicon: HALOT
  rationale: אָמֵן here is an acclamation of assent and wish. 'Amen' preserves the
    liturgical and emphatic force familiar in English, while remaining transparent
    to the Hebrew.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: In this optative context, כֵּן points to agreement with the king's stated
    intention; 'so' is the most idiomatic concise rendering.
- source_word: יֹאמַר
  chosen: may ... say
  alternatives:
  - let ... say
  - will say
  lexicon: HALOT
  rationale: Though formally imperfect, in context after 'Amen' it expresses a wish/jussive
    nuance rather than simple future. English 'may ... say' best captures the volitional
    force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: אֱלֹהֵי
  chosen: the God of
  lexicon: HALOT
  rationale: Construct form with following genitive/pronominal phrase; 'the God of'
    is the natural English equivalent.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address uses אֲדֹנִי as a term of respect toward the monarch.
    'My lord the king' preserves both the possessive and the deferential register
    without importing more than the Hebrew states.
