id: 1KI.1.10
reference: 1 Kings 1:10
source:
  edition: WLC
  text: וְֽ/אֶת נָתָן֩ הַ/נָּבִ֨יא וּ/בְנָיָ֜הוּ וְ/אֶת הַ/גִּבּוֹרִ֛ים וְ/אֶת שְׁלֹמֹ֥ה
    אָחִ֖י/ו לֹ֥א קָרָֽא־־־׃
translation:
  text: But he did not invite Nathan the prophet, Benaiah, the mighty men, or Solomon
    his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he did not call Nathan the prophet, Benaiah, the mighty men, or
      Solomon his brother.' The Hebrew verb literally means 'call,' here in the sense
      of inviting or summoning to Adonijah's feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction continues the narrative list from the previous verse.
    English 'But' brings out the adversative force implied by the contrast with those
    Adonijah did invite in v. 9 and those he excluded here. The object marker itself
    is not translated directly.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  alternatives:
  - Nathan, the prophet
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy, and the title
    נָבִיא is translated straightforwardly as 'prophet.' Appositional English without
    comma is natural here.
- source_word: וּבְנָיָהוּ
  chosen: Benaiah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction is absorbed into the series in English.
- source_word: הַגִּבּוֹרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the valiant men
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly denotes mighty or valiant warriors in royal/military
    contexts. 'The mighty men' preserves the established sense while remaining readable
    and suitably specific to David's elite fighters.
- source_word: שְׁלֹמֹה אָחִיו
  chosen: Solomon his brother
  alternatives:
  - his brother Solomon
  lexicon: HALOT
  rationale: Hebrew places the proper name before the kinship term with suffix. 'Solomon
    his brother' follows the source order more closely while remaining natural English.
    The pronoun refers to Adonijah in context.
- source_word: לֹא קָרָא
  chosen: did not invite
  alternatives:
  - did not call
  - did not summon
  lexicon: HALOT
  rationale: קרא literally means 'call,' but in the banquet/invitation context of
    vv. 9–10 the idiomatic sense is 'invite.' This is an optimal-equivalence rendering
    that communicates the social action intended by the Hebrew.
