id: 1KI.1.31
reference: 1 Kings 1:31
source:
  edition: WLC
  text: וַ/תִּקֹּ֨ד בַּת שֶׁ֤בַע אַפַּ֨יִם֙ אֶ֔רֶץ וַ/תִּשְׁתַּ֖חוּ לַ/מֶּ֑לֶךְ וַ/תֹּ֕אמֶר
    יְחִ֗י אֲדֹנִ֛/י הַ/מֶּ֥לֶךְ דָּוִ֖ד לְ/עֹלָֽם־׃פ
translation:
  text: Then Bathsheba bowed with her face to the ground and prostrated herself before
    the king, and said, “May my lord King David live forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Long live my lord King David forever.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקֹּד
  chosen: bowed
  alternatives:
  - knelt
  - inclined herself
  lexicon: HALOT
  rationale: קָדַד denotes bowing or bending low. 'Bowed' is natural English and preserves
    the gesture without over-specifying posture.
- source_word: אַפַּיִם אֶרֶץ
  chosen: with her face to the ground
  alternatives:
  - with her nostrils to the earth
  - to the ground
  lexicon: HALOT
  rationale: The idiom literally involves 'face/nose' and 'earth,' expressing deep
    obeisance. 'With her face to the ground' communicates the idiomatic sense in clear
    English.
- source_word: וַתִּשְׁתַּחוּ
  chosen: prostrated herself
  alternatives:
  - bowed down
  - paid homage
  lexicon: HALOT
  rationale: שׁחה in the Hishtaphel/Hishtafel stem commonly denotes prostration or
    bowing low in reverence. 'Prostrated herself' distinguishes it from the previous
    verb and preserves the intensity of the action.
- source_word: לַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: Although the preposition is literally 'to,' English idiom with gestures
    of obeisance is better expressed as 'before the king.'
- source_word: יְחִי
  chosen: May ... live
  alternatives:
  - Long live ...
  lexicon: HALOT
  rationale: The jussive expresses a wish or blessing. 'May ... live' is a transparent
    rendering of the Hebrew form.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In royal address, אֲדֹנִי is a respectful title. 'My lord' fits the courtly
    context and standard English biblical usage.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: English naturally combines the title and name as 'King David,' preserving
    both elements without awkwardness.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: עוֹלָם here expresses an enduring wish in royal acclamation. 'Forever'
    is idiomatic modern English.
