id: 1KI.1.13
reference: 1 Kings 1:13
source:
  edition: WLC
  text: לְכִ֞י וּ/בֹ֣אִי אֶל הַ/מֶּ֣לֶךְ דָּוִ֗ד וְ/אָמַ֤רְתְּ אֵלָי/ו֙ הֲ/לֹֽא אַתָּ֞ה
    אֲדֹנִ֣/י הַ/מֶּ֗לֶךְ נִשְׁבַּ֤עְתָּ לַ/אֲמָֽתְ/ךָ֙ לֵ/אמֹ֔ר כִּֽי שְׁלֹמֹ֤ה בְנֵ/ךְ֙
    יִמְלֹ֣ךְ אַחֲרַ֔/י וְ/ה֖וּא יֵשֵׁ֣ב עַל כִּסְאִ֑/י וּ/מַדּ֖וּעַ מָלַ֥ךְ אֲדֹנִיָֽהוּ׀־־־־׃
translation:
  text: Please go in to King David and say to him, ‘My lord the king, did you not
    swear to your servant, saying, “Surely Solomon your son shall reign after me,
    and he shall sit on my throne”? Why then has Adonijah become king?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to your maidservant.” The Hebrew term is specifically feminine and is
      Bathsheba’s deferential self-reference before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי וּבֹאִי
  chosen: Please go in
  alternatives:
  - Go
  - Come, go in
  lexicon: HALOT
  rationale: The sequence of two feminine singular imperatives intensifies the command
    ('go, enter'). In idiomatic English, 'Please go in' captures the urgent but courtly
    instruction to Bathsheba without awkward redundancy.
- source_word: אֶל הַמֶּלֶךְ דָּוִד
  chosen: to King David
  alternatives:
  - to the king, David
  lexicon: HALOT
  rationale: Constructed naturally in English as a title plus name. The definite article
    on 'king' is absorbed into standard English titulature.
- source_word: וְאָמַרְתְּ אֵלָיו
  chosen: and say to him
  alternatives:
  - and you shall say to him
  lexicon: HALOT
  rationale: A straightforward imperative continuation. English imperative style is
    smoother than preserving the Hebrew sequential form woodenly.
- source_word: הֲלֹא
  chosen: did you not
  alternatives:
  - have you not
  - was it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Did you not' fits
    the past oath context.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: My lord the king
  alternatives:
  - My lord, O king
  - my master the king
  lexicon: HALOT
  rationale: A standard court address. 'Lord' here is a human honorific, not the divine
    name; 'my master' is possible but less idiomatic in contemporary English.
- source_word: נִשְׁבַּעְתָּ
  chosen: swear
  alternatives:
  - take an oath
  - promise under oath
  lexicon: HALOT
  rationale: The verb specifically denotes swearing an oath. 'Swear' is concise and
    preserves the solemnity.
- source_word: לַאֲמָתְךָ
  chosen: to your servant
  alternatives:
  - to your maidservant
  - to your female servant
  lexicon: HALOT
  rationale: The noun is specifically feminine ('maidservant'), referring to Bathsheba's
    deferential self-reference. 'Your servant' is chosen for natural English court
    speech, while the feminine nuance is preserved as an alternative.
- source_word: לֵאמֹר כִּי
  chosen: saying, “Surely
  alternatives:
  - saying that
  - saying, 'Indeed'
  lexicon: HALOT
  rationale: This introduces the content of the oath. 'Surely' reflects the emphatic
    force naturally in English, though the Hebrew particle can also be rendered more
    minimally.
- source_word: שְׁלֹמֹה בְנֵךְ
  chosen: Solomon your son
  alternatives:
  - your son Solomon
  lexicon: HALOT
  rationale: Both are possible; this order follows the Hebrew more closely while remaining
    natural.
- source_word: יִמְלֹךְ אַחֲרַי
  chosen: shall reign after me
  alternatives:
  - shall become king after me
  - shall reign in my place
  lexicon: HALOT
  rationale: The verb means 'reign/be king.' 'Shall reign after me' preserves both
    succession and royal office without overinterpreting.
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי
  chosen: and he shall sit on my throne
  alternatives:
  - and he shall sit upon my throne
  lexicon: HALOT
  rationale: A literal and idiomatic rendering of enthronement language.
- source_word: וּמַדּוּעַ
  chosen: Why then
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: The conjunction plus interrogative marks a consequential challenge based
    on the prior oath. 'Why then' brings out that inferential force.
- source_word: מָלַךְ אֲדֹנִיָהוּ
  chosen: has Adonijah become king
  alternatives:
  - is Adonijah king
  - has Adonijah reigned
  lexicon: HALOT
  rationale: The perfect verb here points to the accomplished fact of usurpation.
    'Has become king' communicates accession more clearly than the less idiomatic
    'has reigned.'
