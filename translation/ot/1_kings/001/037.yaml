id: 1KI.1.37
reference: 1 Kings 1:37
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר הָיָ֤ה יְהוָה֙ עִם אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ כֵּ֖ן יהי עִם שְׁלֹמֹ֑ה
    וִֽ/יגַדֵּל֙ אֶת כִּסְא֔/וֹ מִ֨/כִּסֵּ֔א אֲדֹנִ֖/י הַ/מֶּ֥לֶךְ דָּוִֽד־־־׃
translation:
  text: Just as the LORD has been with my lord the king, so may he be with Solomon
    and make his throne greater than the throne of my lord King David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so may the LORD be with Solomon.' The Hebrew jussive 'may he be' leaves
      the subject implicit, referring back to the LORD in the previous clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per project default for the divine name, following
    established English convention that reflects the Hebrew Tetragrammaton without
    transliteration.
- source_word: כַּאֲשֶׁר ... כֵּן
  chosen: Just as ... so
  alternatives:
  - As ... so
  - Just as ... thus
  lexicon: HALOT
  rationale: This correlative construction marks comparison between the LORD's past
    presence with David and the wish for Solomon; 'Just as ... so' is natural modern
    English and preserves the formal parallel.
- source_word: הָיָה ... עִם
  chosen: has been with
  alternatives:
  - was with
  lexicon: HALOT
  rationale: The perfect verb with עִם expresses prior and continuing divine accompaniment.
    'Has been with' reads naturally in English and captures the retrospective force
    better than a simple past.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  - my lord, the king
  lexicon: HALOT
  rationale: A courtly address formula. 'My lord the king' preserves both the possessive
    honorific and royal title without over-paraphrase.
- source_word: יהי
  chosen: may he be
  alternatives:
  - let him be
  - may the LORD be
  lexicon: HALOT
  rationale: The jussive expresses a wish or blessing. Because the subject is implied
    from the prior clause and is clearly the LORD, 'may he be' preserves the Hebrew
    flow while remaining clear in context.
- source_word: וִיגַדֵּל
  chosen: and make ... greater
  alternatives:
  - and magnify
  - and exalt
  - and enlarge
  lexicon: HALOT
  rationale: 'From גדל in the causative sense: to make great. With ''throne'' as object,
    ''make his throne greater'' is the most idiomatic English expression and preserves
    the comparative sense developed by the following מן phrase.'
- source_word: כִּסְאוֹ
  chosen: his throne
  alternatives:
  - his kingship
  - his royal throne
  lexicon: HALOT
  rationale: The noun literally denotes 'throne.' While it can metonymically imply
    reign or kingship, the concrete image should be retained here.
- source_word: מִכִּסֵּא
  chosen: greater than the throne of
  alternatives:
  - above the throne of
  - more than the throne of
  lexicon: HALOT
  rationale: 'The preposition מן marks comparison after ''make great.'' English requires
    the comparative to be expressed explicitly: ''greater than the throne of.'''
- source_word: אֲדֹנִי הַמֶּלֶךְ דָּוִד
  chosen: my lord King David
  alternatives:
  - my lord the king David
  - my lord, King David
  lexicon: HALOT
  rationale: In English, 'King David' is the natural appositional form. Retaining
    'my lord' preserves Benaiah's deferential speech toward David.
