id: 1KI.1.19
reference: 1 Kings 1:19
source:
  edition: WLC
  text: וַ֠/יִּזְבַּח שׁ֥וֹר וּֽ/מְרִיא וְ/צֹאן֮ לָ/רֹב֒ וַ/יִּקְרָא֙ לְ/כָל בְּנֵ֣י
    הַ/מֶּ֔לֶךְ וּ/לְ/אֶבְיָתָר֙ הַ/כֹּהֵ֔ן וּ/לְ/יֹאָ֖ב שַׂ֣ר הַ/צָּבָ֑א וְ/לִ/שְׁלֹמֹ֥ה
    עַבְדְּ/ךָ֖ לֹ֥א קָרָֽא־־׃
translation:
  text: And he sacrificed oxen, fattened cattle, and sheep in abundance, and he invited
    all the king’s sons, Abiathar the priest, and Joab the commander of the army;
    but he did not invite Solomon your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he called' / 'he summoned' in both occurrences of the verb; the translation
      uses 'invited' because the context is attendance at a sacrificial feast.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' translates a Hebrew term that can more broadly refer to flock
      animals, including goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: he sacrificed
  alternatives:
  - he slaughtered for sacrifice
  lexicon: HALOT
  rationale: The verb זבח in this narrative context refers specifically to sacrificial
    slaughter, not merely ordinary butchering. 'Sacrificed' is the most natural and
    accurate English rendering.
- source_word: שׁוֹר
  chosen: oxen
  alternatives:
  - bulls
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר is a bovine term that can be rendered broadly, but 'oxen' works
    well as a collective sacrificial animal term in English and avoids over-specifying
    sex as 'bulls'.
- source_word: מְרִיא
  chosen: fattened cattle
  alternatives:
  - fatted calf
  - stall-fed cattle
  lexicon: HALOT
  rationale: מְרִיא denotes fattened livestock. Because the noun is singular in Hebrew
    but part of a list of sacrificial animals with collective force, 'fattened cattle'
    communicates the category naturally in English.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock animals
  - small livestock
  lexicon: HALOT
  rationale: צֹאן can include sheep and goats collectively, but 'sheep' is a conventional
    and sufficiently accurate rendering in sacrificial lists unless the broader category
    must be emphasized.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase indicates large quantity. 'In abundance' is idiomatic and
    preserves the sense of lavish scale.
- source_word: וַיִּקְרָא
  chosen: he invited
  alternatives:
  - he called
  - he summoned
  lexicon: HALOT
  rationale: Although the verb literally means 'called,' in this banquet/sacrificial
    setting it means inviting persons to attend. 'Invited' best conveys the social
    function in context.
- source_word: לְכָל בְּנֵי הַמֶּלֶךְ
  chosen: all the king’s sons
  alternatives:
  - all the sons of the king
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase. 'Sons' should
    be retained rather than neutralized, since the Hebrew is specifically male and
    refers to royal sons.
- source_word: אֶבְיָתָר הַכֹּהֵן
  chosen: Abiathar the priest
  lexicon: HALOT
  rationale: Name transliterated, title translated, following the project's policy
    to transliterate names and translate titles.
- source_word: יֹאָב שַׂר הַצָּבָא
  chosen: Joab the commander of the army
  alternatives:
  - Joab the captain of the army
  - Joab the army commander
  lexicon: HALOT
  rationale: שַׂר הַצָּבָא denotes military leadership. 'Commander of the army' is
    clear modern English and preserves the official sense.
- source_word: וְלִשְׁלֹמֹה עַבְדְּךָ
  chosen: but he did not invite Solomon your servant
  alternatives:
  - and Solomon your servant he did not invite
  lexicon: HALOT
  rationale: The phrase עַבְדְּךָ is Bathsheba's deferential self-positioning of Solomon
    relative to David ('your servant'). English places it naturally after Solomon.
    The adversative sense is brought out in context by 'but' to mark the contrast
    with those invited.
- source_word: לֹא קָרָא
  chosen: he did not invite
  alternatives:
  - he did not call
  - he did not summon
  lexicon: HALOT
  rationale: Repeats קרא from earlier in the verse; for consistency within context,
    'invite' is retained. The negation highlights deliberate exclusion from the event.
