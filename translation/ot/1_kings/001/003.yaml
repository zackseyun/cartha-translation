id: 1KI.1.3
reference: 1 Kings 1:3
source:
  edition: WLC
  text: וַ/יְבַקְשׁוּ֙ נַעֲרָ֣ה יָפָ֔ה בְּ/כֹ֖ל גְּב֣וּל יִשְׂרָאֵ֑ל וַֽ/יִּמְצְא֗וּ
    אֶת אֲבִישַׁג֙ הַ/שּׁ֣וּנַמִּ֔ית וַ/יָּבִ֥אוּ אֹתָ֖/הּ לַ/מֶּֽלֶךְ־׃
translation:
  text: So they searched throughout all the territory of Israel for a beautiful young
    woman, and they found Abishag the Shunammite and brought her to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sought a beautiful young woman in all the land of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''The Shunammite'' means she was a woman from Shunem.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבַקְשׁוּ
  chosen: they searched
  alternatives:
  - they sought
  - they looked for
  lexicon: HALOT
  rationale: The verb בקשׁ means to seek or search for. 'Searched' fits the narrative
    sense of an active search mission better than the slightly more formal 'sought.'
- source_word: נַעֲרָה
  chosen: young woman
  alternatives:
  - girl
  - maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female, often of marriageable age. 'Young woman'
    is natural modern English and avoids the archaic 'maiden' and the potentially
    too-young implication of 'girl.'
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - attractive
  - fair
  lexicon: HALOT
  rationale: The adjective straightforwardly describes physical beauty. 'Beautiful'
    is the most direct and idiomatic rendering.
- source_word: בְּכֹל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - in all the territory of Israel
  - through all the borders of Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. In this context it refers
    to the extent of the land under Israel, not merely boundary lines. 'Throughout
    all the territory of Israel' conveys a search across the whole land.
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they discovered
  lexicon: HALOT
  rationale: A simple narrative verb; 'found' is the plain and natural equivalent.
- source_word: אֶת אֲבִישַׁג הַשּׁוּנַמִּית
  chosen: Abishag the Shunammite
  alternatives:
  - Abishag from Shunem
  lexicon: HALOT
  rationale: The personal name is transliterated per project policy. The gentilic
    is best rendered 'the Shunammite,' preserving the Hebrew designation and familiar
    narrative style.
- source_word: וַיָּבִאוּ אֹתָהּ לַמֶּלֶךְ
  chosen: brought her to the king
  alternatives:
  - brought her in to the king
  lexicon: HALOT
  rationale: בוא in the hiphil commonly means 'bring.' The direct object plus ל marks
    movement to the king. 'Brought her to the king' is clear and sufficient without
    adding 'in,' which is not required by the Hebrew.
