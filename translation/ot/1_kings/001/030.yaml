id: 1KI.1.30
reference: 1 Kings 1:30
source:
  edition: WLC
  text: כִּ֡י כַּ/אֲשֶׁר֩ נִשְׁבַּ֨עְתִּי לָ֜/ךְ בַּ/יהוָ֨ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ לֵ/אמֹ֔ר
    כִּֽי שְׁלֹמֹ֤ה בְנֵ/ךְ֙ יִמְלֹ֣ךְ אַחֲרַ֔/י וְ/ה֛וּא יֵשֵׁ֥ב עַל כִּסְאִ֖/י תַּחְתָּ֑/י
    כִּ֛י כֵּ֥ן אֶעֱשֶׂ֖ה הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: As I swore to you by the LORD, the God of Israel, saying, ‘Surely Solomon
    your son will reign after me, and he will sit on my throne in my place,’ so I
    will do this today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by Yahweh''; rendered ''the LORD'' in keeping with the project’s
      standard for the divine name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he will sit on my throne instead of me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כַּאֲשֶׁר
  chosen: As
  alternatives:
  - For as
  - Indeed, as
  lexicon: HALOT
  rationale: The combination introduces the basis and manner of David's pledge. In
    English, 'As' naturally carries the comparative force that is completed by 'so
    I will do,' preserving the oath logic without awkwardness.
- source_word: נִשְׁבַּעְתִּי לָךְ
  chosen: I swore to you
  alternatives:
  - I have sworn to you
  lexicon: HALOT
  rationale: The perfect verb refers to a prior completed oath. Simple past fits the
    narrative context better than English present perfect.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: The preposition marks the one by whom the oath was sworn. Per doctrine,
    יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering identifying the LORD covenantally and nationally.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Introduces the content of the oath in idiomatic narrative English.
- source_word: כִּי
  chosen: Surely
  alternatives:
  - that
  - indeed
  lexicon: HALOT
  rationale: Here the particle introduces the substance of the oath with emphatic
    force. 'Surely' conveys solemn assurance better than a bare 'that' in English.
- source_word: שְׁלֹמֹה בְנֵךְ
  chosen: Solomon your son
  lexicon: HALOT
  rationale: Direct, natural rendering of the proper name plus construct with pronominal
    suffix.
- source_word: יִמְלֹךְ אַחֲרַי
  chosen: will reign after me
  alternatives:
  - will become king after me
  - will reign in succession to me
  lexicon: HALOT
  rationale: The verb means 'reign/be king.' 'After me' preserves the succession language
    without overexpanding it.
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי תַּחְתָּי
  chosen: and he will sit on my throne in my place
  alternatives:
  - and he will sit on my throne after me
  - and he will sit on my throne instead of me
  lexicon: HALOT
  rationale: יֵשֵׁב עַל כִּסְאִי is a royal enthronement idiom. תַּחְתָּי here denotes
    succession/substitution; 'in my place' is idiomatic and clear in English.
- source_word: כִּי כֵן אֶעֱשֶׂה
  chosen: so I will do this
  alternatives:
  - surely so I will do
  - thus I will do
  lexicon: HALOT
  rationale: The clause answers the opening 'As...,' yielding 'so I will do.' Adding
    'this' makes the English object explicit from context without changing the sense.
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern-English equivalent of the deictic phrase
    while preserving immediacy.'
