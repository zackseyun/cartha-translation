theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in an oath formula. Per project
    doctrine, the default rendering is 'the LORD,' following Jewish reverence tradition
    and common biblical English usage while preserving the distinction from 'God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
