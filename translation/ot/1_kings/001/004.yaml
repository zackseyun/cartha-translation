theological_decisions:
- issue: Sexual euphemism in narrative description
  chosen_reading: Retain the idiomatic expression 'did not know her' in the main text,
    with explanatory footnote.
  alternative_readings:
  - did not have sexual relations with her
  - did not sleep with her
  rationale: This preserves the source-text idiom and literary register while making
    the intended meaning auditable through a footnote. The verse is narratively significant
    because it states that no sexual union occurred between David and Abishag; the
    translation should neither obscure nor overstate that point.
  doctrine_reference: Translation philosophy §§1, 3, 6
