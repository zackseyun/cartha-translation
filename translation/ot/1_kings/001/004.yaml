id: 1KI.1.4
reference: 1 Kings 1:4
source:
  edition: WLC
  text: וְ/הַֽ/נַּעֲרָ֖ה יָפָ֣ה עַד מְאֹ֑ד וַ/תְּהִ֨י לַ/מֶּ֤לֶךְ סֹכֶ֨נֶת֙ וַ/תְּשָׁ֣רְתֵ֔/הוּ
    וְ/הַ/מֶּ֖לֶךְ לֹ֥א יְדָעָֽ/הּ־׃
translation:
  text: The young woman was very beautiful, and she became the king’s attendant and
    served him, but the king did not know her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not have sexual relations with her.' The Hebrew 'know' here is
      a euphemism for sexual intercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female; 'young woman' is natural modern English
    and avoids the potentially too-young nuance of 'girl' and the archaic tone of
    'maiden'.
- source_word: יָפָה עַד מְאֹד
  chosen: was very beautiful
  alternatives:
  - was exceedingly beautiful
  - was extremely beautiful
  lexicon: HALOT
  rationale: The phrase intensifies her beauty strongly. 'Very beautiful' is idiomatic
    modern English and preserves the emphasis without sounding wooden.
- source_word: סֹכֶנֶת
  chosen: attendant
  alternatives:
  - caretaker
  - companion
  - nurse
  lexicon: HALOT
  rationale: The term refers to one attached to the king in a supportive, service
    role. 'Attendant' best fits the immediate context and avoids over-specifying medical
    care ('nurse') or implying romantic partnership ('companion').
- source_word: וַתְּשָׁרְתֵהוּ
  chosen: and served him
  alternatives:
  - and ministered to him
  - and attended him
  lexicon: HALOT
  rationale: שרת commonly means to serve or minister. 'Served him' is straightforward
    and readable; 'ministered to him' may sound overly formal or ecclesiastical in
    this narrative context.
- source_word: יְדָעָהּ
  chosen: did not know her
  alternatives:
  - did not have sexual relations with her
  - did not sleep with her
  lexicon: HALOT
  rationale: ידע here is a well-known euphemism for sexual relations. The main text
    preserves the Hebrew idiom with 'know her,' while the sexual sense is clarified
    in a footnote for transparency and readability.
