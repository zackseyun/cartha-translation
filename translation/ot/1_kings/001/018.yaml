id: 1KI.1.18
reference: 1 Kings 1:18
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הִנֵּ֥ה אֲדֹנִיָּ֖ה מָלָ֑ךְ וְ/עַתָּ֛ה אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ לֹ֥א
    יָדָֽעְתָּ׃
translation:
  text: And now, look, Adonijah has become king, and now, my lord the king, you do
    not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Adonijah has reigned' or 'Adonijah is king.' The Hebrew verb denotes
      becoming or acting as king; in context it refers to Adonijah's assumption of
      royal status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the urgent present situation. Rendering
    both occurrences as 'and now' preserves the Hebrew repetition and rhetorical force.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' is readable modern English and
    preserves the deictic force better than omitting it; 'behold' would sound archaic.
- source_word: אֲדֹנִיָּה
  chosen: Adonijah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מָלָךְ
  chosen: has become king
  alternatives:
  - has reigned
  - has made himself king
  - is king
  lexicon: HALOT
  rationale: Qal perfect of מלך here denotes accession/assumption of kingship. 'Has
    become king' communicates the event that Adonijah has taken the throne claim.
    'Has made himself king' would import reflexive nuance not explicit in this verb
    alone, though context suggests self-exaltation.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Courtly address to the king. 'My lord' is the natural English equivalent
    in royal speech and should not be confused with the divine title here because
    it is immediately qualified by 'the king'.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: 'Appositional title identifying the addressee: ''my lord, the king.''
    Retained explicitly to preserve the formal court address.'
- source_word: לֹא יָדָעְתָּ
  chosen: you do not know it
  alternatives:
  - you have not known
  - you do not know
  lexicon: HALOT
  rationale: The perfect with negation in context conveys David's lack of awareness
    of the present development. Adding 'it' makes the English idiomatic and clarifies
    the implied object without adding new content.
