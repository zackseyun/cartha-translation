id: 1KI.1.43
reference: 1 Kings 1:43
source:
  edition: WLC
  text: וַ/יַּ֨עַן֙ יוֹנָתָ֔ן וַ/יֹּ֖אמֶר לַ/אֲדֹנִיָּ֑הוּ אֲבָ֕ל אֲדֹנֵ֥י/נוּ הַ/מֶּֽלֶךְ
    דָּוִ֖ד הִמְלִ֥יךְ אֶת שְׁלֹמֹֽה־־׃
translation:
  text: Jonathan answered and said to Adonijah, “On the contrary, our lord King David
    has made Solomon king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “But our lord King David has made Solomon king.” The Hebrew adversative
      אֲבָל can be rendered more minimally as “but,” though here it carries a corrective
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol commonly introduces a reply in dialogue. 'Answered'
    is the standard and natural English rendering here.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the normal speech verb. Rendering both verbs ('answered and said')
    preserves the Hebrew narrative style without awkwardness.
- source_word: לַאֲדֹנִיָּהוּ
  chosen: to Adonijah
  rationale: Personal name is transliterated per project philosophy; the prefixed
    ל is rendered with 'to'.
- source_word: אֲבָל
  chosen: On the contrary
  alternatives:
  - But
  - Indeed
  lexicon: HALOT
  rationale: אֲבָל here marks strong correction or contradiction to Adonijah's apparent
    assumption. 'On the contrary' brings out the adversative force more clearly than
    a bare 'but'.
- source_word: אֲדֹנֵינוּ
  chosen: our lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: The noun means 'lord/master.' In royal court context, 'our lord' is the
    idiomatic address for the king and fits the following apposition 'King David.'
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'With the following proper name, English idiom prefers the title before
    the name: ''King David.'' This preserves the definite royal title while reading
    naturally.'
- source_word: הִמְלִיךְ
  chosen: has made Solomon king
  alternatives:
  - has anointed Solomon king
  - has proclaimed Solomon king
  - has made Solomon reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to be king, i.e., install or
    make king. 'Has made Solomon king' is a clear optimal-equivalence rendering. 'Anointed'
    is too specific for this verb alone, and 'proclaimed' is narrower than the causative
    sense.
- source_word: אֵת שְׁלֹמֹה
  chosen: Solomon
  rationale: Direct-object marker אֵת is untranslated in English; the personal name
    is transliterated.
