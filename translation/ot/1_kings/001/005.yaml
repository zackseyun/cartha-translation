theological_decisions:
- issue: Portrayal of Adonijah's action
  chosen_reading: Rendered מִתְנַשֵּׂא as 'exalted himself' to preserve the text's
    implicit criticism of self-exaltation without adding explicit moral commentary.
  alternative_readings:
  - '''promoted himself'''
  - '''set himself up as king'''
  rationale: The verse itself signals wrongful ambition through the reflexive verb
    and his royal preparations. The translation should preserve that tension without
    importing a fuller judgment than the Hebrew states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered language in the royal entourage
  chosen_reading: Retained 'fifty men' rather than a gender-neutral substitute.
  alternative_readings:
  - '''fifty people'''
  - '''fifty runners'''
  rationale: The Hebrew אִישׁ is explicitly masculine here and refers to male attendants
    in a royal procession. This follows the gender-accurate principle.
  doctrine_reference: Translation philosophy §4
