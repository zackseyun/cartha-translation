id: 1KI.1.5
reference: 1 Kings 1:5
source:
  edition: WLC
  text: וַ/אֲדֹנִיָּ֧ה בֶן חַגִּ֛ית מִתְנַשֵּׂ֥א לֵ/אמֹ֖ר אֲנִ֣י אֶמְלֹ֑ךְ וַ/יַּ֣עַשׂ
    ל֗/וֹ רֶ֚כֶב וּ/פָ֣רָשִׁ֔ים וַ/חֲמִשִּׁ֥ים אִ֖ישׁ רָצִ֥ים לְ/פָנָֽי/ו־׃
translation:
  text: Now Adonijah son of Haggith exalted himself, saying, “I will reign.” So he
    prepared for himself a chariot, horsemen, and fifty men running before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “set himself up,” or “made himself great.” The Hebrew verb carries the
      sense of self-exaltation.
    reason: lexical_alternative
  - marker: b
    text: Or “I will be king.”
    reason: alternative_reading
lexical_decisions:
- source_word: מִתְנַשֵּׂא
  chosen: exalted himself
  alternatives:
  - was exalting himself
  - set himself up
  - made himself great
  lexicon: HALOT
  rationale: The Hitpael of נשׂא here conveys self-exaltation or self-promotion. 'Exalted
    himself' preserves the reflexive force and the negative nuance better than a flatter
    'promoted himself.'
- source_word: לֵאמֹר אֲנִי אֶמְלֹךְ
  chosen: saying, “I will reign.”
  alternatives:
  - saying, “I will be king.”
  - declaring, “I will rule.”
  lexicon: HALOT
  rationale: The infinitive plus quotation introduces his claim. מלך in the first
    person can be rendered 'reign' or 'be king'; 'I will reign' keeps the verbal force
    and matches the royal ambition in context.
- source_word: וַיַּעַשׂ לוֹ
  chosen: he prepared for himself
  alternatives:
  - he made for himself
  - he acquired for himself
  lexicon: HALOT
  rationale: עשה literally means 'made/did,' but in this context of royal display
    and entourage, 'prepared for himself' is natural English that still reflects the
    source without over-interpreting how he obtained them.
- source_word: רֶכֶב
  chosen: a chariot
  alternatives:
  - chariots
  - a chariot team
  lexicon: HALOT
  rationale: The singular noun is best represented as singular here. In context it
    likely denotes a royal vehicle rather than the abstract concept of chariotry.
- source_word: פָרָשִׁים
  chosen: horsemen
  alternatives:
  - horsemen troops
  - cavalry
  lexicon: HALOT
  rationale: The plural refers to mounted attendants. 'Horsemen' is more formally
    transparent than 'cavalry,' which can sound more technical and collective than
    the Hebrew requires.
- source_word: חֲמִשִּׁים אִישׁ
  chosen: fifty men
  alternatives:
  - fifty men in number
  lexicon: HALOT
  rationale: This is a standard Hebrew number-plus-noun expression. 'Men' should be
    retained rather than neutralized, since the text refers to male runners in a royal
    procession.
- source_word: רָצִים לְפָנָיו
  chosen: running before him
  alternatives:
  - who ran before him
  - to run before him
  lexicon: HALOT
  rationale: The participle רָצִים describes their function as runners preceding him.
    'Running before him' is concise and preserves the image of a royal escort.
- source_word: וַ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw advances the narrative. 'Now' is idiomatic English scene
    progression and avoids overly repetitive 'And' while preserving continuity.
