id: 1KI.1.28
reference: 1 Kings 1:28
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַ/מֶּ֤לֶךְ דָּוִד֙ וַ/יֹּ֔אמֶר קִרְאוּ לִ֖/י לְ/בַת שָׁ֑בַע וַ/תָּבֹא֙
    לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ וַֽ/תַּעֲמֹ֖ד לִ/פְנֵ֥י הַ/מֶּֽלֶךְ־־׃
translation:
  text: Then King David answered and said, “Call Bathsheba to me.” So she came before
    the king and stood before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “responded.” The Hebrew narrative formula often uses “answered” to introduce
      speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in narrative introduction commonly means 'answered/responded.' 'Answered'
    preserves the conventional Hebrew discourse formula, even though no direct question
    immediately precedes in English style.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: Constructing the title and name as 'King David' is natural English and
    accurately reflects the appositional Hebrew.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speech; 'said' is the most direct and idiomatic
    rendering.
- source_word: קִרְאוּ לִי
  chosen: Call ... to me
  alternatives:
  - Summon ... to me
  - Call for ...
  lexicon: HALOT
  rationale: קרא with ל conveys calling/summoning someone. 'Call ... to me' preserves
    the directness of the royal command without overformalizing it.
- source_word: לְבַת שָׁבַע
  chosen: Bathsheba
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy. Standard English
    form is 'Bathsheba.'
- source_word: וַתָּבֹא לִפְנֵי הַמֶּלֶךְ
  chosen: she came before the king
  alternatives:
  - she came into the king's presence
  lexicon: HALOT
  rationale: בוא + לפני literally indicates coming into someone's presence. 'Came
    before the king' is both faithful and readable.
- source_word: וַתַּעֲמֹד לִפְנֵי הַמֶּלֶךְ
  chosen: stood before the king
  alternatives:
  - took her stand before the king
  - remained standing before the king
  lexicon: HALOT
  rationale: עמד means 'stand.' Repeating 'before the king' reflects the Hebrew repetition,
    which marks formal courtly presence rather than being redundant to omit.
