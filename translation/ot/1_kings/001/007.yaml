id: 1KI.1.7
reference: 1 Kings 1:7
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ דְבָרָ֔י/ו עִ֚ם יוֹאָ֣ב בֶּן צְרוּיָ֔ה וְ/עִ֖ם אֶבְיָתָ֣ר הַ/כֹּהֵ֑ן
    וַֽ/יַּעְזְר֔וּ אַחֲרֵ֖י אֲדֹנִיָּֽה־׃
translation:
  text: And his words were with Joab son of Zeruiah and with Abiathar the priest,
    and they helped Adonijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they helped after Adonijah,' that is, they supported or followed
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבָרָיו
  chosen: his words
  alternatives:
  - his matter
  - his plans
  lexicon: HALOT
  rationale: The noun דבר commonly means 'word(s),' 'matter,' or 'affair.' In this
    context of political consultation, the idiom 'his words were with' indicates communication
    or counsel. 'His words' preserves the Hebrew expression more transparently than
    smoothing to 'he conferred,' while still making sense in English.
- source_word: עִם
  chosen: with
  alternatives:
  - in consultation with
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'with.' Retaining 'with' preserves
    the Hebrew syntax and leaves the relational nuance to context.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A definite title identifying Abiathar's office. 'The priest' is the plain
    sense and preserves the formal designation.
- source_word: וַיַּעְזְרוּ
  chosen: they helped
  alternatives:
  - they supported
  - they gave aid
  lexicon: HALOT
  rationale: From עזר, 'help, assist, support.' 'They helped' is the most direct rendering.
    In context it conveys political support for Adonijah without adding interpretive
    wording beyond the verb itself.
- source_word: אַחֲרֵי
  chosen: Adonijah
  alternatives:
  - after Adonijah
  lexicon: HALOT
  rationale: The preposition literally means 'after,' but with verbs of allegiance
    or movement it can indicate following someone, hence supporting them. English
    requires smoothing here; 'they helped Adonijah' communicates the idiomatic sense.
    The more literal alternative is preserved in a footnote.
- source_word: אֲדֹנִיָּה
  chosen: Adonijah
  lexicon: HALOT
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
