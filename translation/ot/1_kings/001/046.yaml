id: 1KI.1.46
reference: 1 Kings 1:46
source:
  edition: WLC
  text: וְ/גַם֙ יָשַׁ֣ב שְׁלֹמֹ֔ה עַ֖ל כִּסֵּ֥א הַ/מְּלוּכָֽה׃
translation:
  text: And Solomon has also sat on the royal throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the throne of the kingship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  chosen: And ... also
  alternatives:
  - Moreover
  - And indeed
  - Also
  lexicon: HALOT
  rationale: The conjunction plus additive particle links this statement to the preceding
    report and adds emphasis. Rendering both elements as 'And ... also' preserves
    the connective force and the additive sense without sounding overly wooden.
- source_word: יָשַׁב
  chosen: has sat
  alternatives:
  - sat
  - has taken his seat
  - is seated
  lexicon: HALOT
  rationale: 'The qatal form reports a completed action with present relevance in
    context: Solomon''s enthronement has now occurred. ''Has sat'' preserves the concrete
    enthronement idiom better than the more interpretive ''has taken his seat.'''
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition is spatial and straightforward here; 'on' is natural
    modern English.
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: In royal context, 'throne' is the idiomatic and semantically precise
    rendering, not merely a physical seat.
- source_word: הַמְּלוּכָה
  chosen: royal
  alternatives:
  - of the kingdom
  - of kingship
  - of the monarchy
  lexicon: HALOT
  rationale: The noun denotes kingship/royal rule. In construct with 'throne,' English
    idiom is best captured by the attributive 'royal throne.' This avoids the awkwardly
    literal 'throne of the kingdom' while preserving the sense of kingship.
