id: 1KI.1.23
reference: 1 Kings 1:23
source:
  edition: WLC
  text: וַ/יַּגִּ֤ידוּ לַ/מֶּ֨לֶךְ֙ לֵ/אמֹ֔ר הִנֵּ֖ה נָתָ֣ן הַ/נָּבִ֑יא וַ/יָּבֹא֙
    לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ וַ/יִּשְׁתַּ֧חוּ לַ/מֶּ֛לֶךְ עַל אַפָּ֖י/ו אָֽרְצָ/ה־׃
translation:
  text: And they told the king, saying, “Look, Nathan the prophet is here.” And he
    came before the king and bowed down to the king with his face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Behold, Nathan the prophet.”
    reason: lexical_alternative
  - marker: b
    text: Or “prostrated himself before the king, with his face to the ground.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  chosen: And they told
  alternatives:
  - And they reported
  - And they informed
  lexicon: HALOT
  rationale: The Hifil of נגד commonly means to tell, report, or declare. 'Told' is
    natural modern English and fits the court-announcement setting without overstating
    formality.
- source_word: לַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with prefixed preposition, rendered straightforwardly as
    the indirect object 'the king.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive construct introducing direct speech. 'Saying'
    preserves the Hebrew discourse structure with acceptable English readability.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Here is
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' preserves the immediacy in
    readable modern English; 'behold' is too archaic, while 'here is' is possible
    but less vivid.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy, and the title
    is translated. The appositional construction is naturally rendered 'Nathan the
    prophet.'
- source_word: וַיָּבֹא לִפְנֵי הַמֶּלֶךְ
  chosen: And he came before the king
  alternatives:
  - And he entered before the king
  - And he came into the king's presence
  lexicon: HALOT
  rationale: בוא plus לִפְנֵי denotes coming into someone's presence. 'Came before
    the king' is a clear, moderately formal rendering suited to royal court narrative.
- source_word: וַיִּשְׁתַּחוּ
  chosen: and bowed down
  alternatives:
  - and prostrated himself
  - and paid homage
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה denotes bowing oneself low, often
    in homage. 'Bowed down' is readable and accurate; 'prostrated himself' is more
    explicit but heavier. The following phrase 'with his face to the ground' supplies
    the full bodily posture.
- source_word: עַל אַפָּיו אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - on his face to the ground
  - face down to the ground
  lexicon: HALOT
  rationale: Literally 'upon his face earthward/to the ground.' The chosen rendering
    is idiomatic English that preserves the image of full prostration without awkwardness.
