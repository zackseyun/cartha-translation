theological_decisions:
- issue: Rendering of עבד in courtly self-reference
  chosen_reading: your servants
  alternative_readings:
  - your slaves
  rationale: The project's doctrine notes that terms like δοῦλος/related servant language
    should be rendered contextually. Here the Hebrew עבדיך is a conventional deferential
    court expression, not a statement foregrounding chattel bondage. 'Servants' best
    matches the source intent in this context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος analogously emphasizing context-dependent rendering
