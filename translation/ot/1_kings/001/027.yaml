id: 1KI.1.27
reference: 1 Kings 1:27
source:
  edition: WLC
  text: אִ֗ם מֵ/אֵת֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ נִהְיָ֖ה הַ/דָּבָ֣ר הַ/זֶּ֑ה וְ/לֹ֤א הוֹדַ֨עְתָּ֙
    אֶֽת עבדי/ך מִ֗י יֵשֵׁ֛ב עַל כִּסֵּ֥א אֲדֹנִֽ/י הַ/מֶּ֖לֶךְ אַחֲרָֽי/ו־־־׃ס
translation:
  text: If this thing has come from my lord the king, have you not made known to your
    servants who will sit on the throne of my lord the king after him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this affair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  - Is it that
  lexicon: HALOT
  rationale: Introduces a conditional or rhetorical protasis. In context Benaiah is
    asking a pointed question, so simple 'If' preserves the Hebrew form without over-interpreting
    the tone.
- source_word: מֵאֵת
  chosen: has come from
  alternatives:
  - is from
  - was from
  lexicon: HALOT
  rationale: With נִהְיָה, the phrase indicates source or authorization. 'Has come
    from' expresses that this matter originated with the king, fitting the perfective
    sense in context.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address to the king. 'My lord the king' is the natural English
    equivalent and preserves the deferential title.
- source_word: נִהְיָה
  chosen: has come
  alternatives:
  - has happened
  - has been
  lexicon: HALOT
  rationale: From היה, here indicating that the matter has come about or originated.
    'Has come' works idiomatically with מֵאֵת ('from').
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this affair
  lexicon: HALOT
  rationale: דבר is broad; here it refers to the reported royal action/decision. 'This
    thing' is slightly more formal and stays close to the Hebrew, while still natural.
- source_word: וְלֹא הוֹדַעְתָּ
  chosen: have you not made known
  alternatives:
  - and you have not told
  - and you did not inform
  lexicon: HALOT
  rationale: The Hiphil of ידע means to cause to know, inform, make known. The interrogative
    force is carried by the whole sentence, so 'have you not made known' preserves
    both formality and rhetorical force.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants/slaves
  lexicon: HALOT
  rationale: In royal court address, עבד commonly functions as a deferential self-designation
    by officials before the king. 'Servants' is preferable here because bonded status
    is not the salient point; courtly subordination is.
- source_word: מִי יֵשֵׁב
  chosen: who will sit
  alternatives:
  - who is to sit
  - who will reign
  lexicon: HALOT
  rationale: The idiom 'sit on the throne' should be preserved rather than collapsed
    into 'reign,' since the Hebrew explicitly uses ישב and throne imagery.
- source_word: עַל כִּסֵּא
  chosen: on the throne of
  alternatives:
  - upon the throne of
  lexicon: HALOT
  rationale: Standard enthronement idiom. 'On the throne of' is natural modern English
    and keeps the royal succession imagery.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - afterward
  - in his place
  lexicon: HALOT
  rationale: Refers to succession after the current king. 'After him' is the most
    direct rendering; 'in his place' would be interpretive.
