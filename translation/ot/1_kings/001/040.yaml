id: 1KI.1.40
reference: 1 Kings 1:40
source:
  edition: WLC
  text: וַ/יַּעֲל֤וּ כָל הָ/עָם֙ אַֽחֲרָ֔י/ו וְ/הָ/עָם֙ מְחַלְּלִ֣ים בַּ/חֲלִלִ֔ים
    וּ/שְׂמֵחִ֖ים שִׂמְחָ֣ה גְדוֹלָ֑ה וַ/תִּבָּקַ֥ע הָ/אָ֖רֶץ בְּ/קוֹלָֽ/ם־׃
translation:
  text: And all the people went up after him, and the people were playing flutes and
    rejoicing with great joy, so that the earth split apart at their sound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'playing pipes'; the Hebrew term can refer broadly to flute-like wind
      instruments.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the earth split apart' is likely hyperbolic, describing the
      overwhelming volume of the celebration.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - followed up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In narrative context it can reflect
    movement uphill or processionally upward. 'Went up' preserves the concrete motion
    without overinterpreting.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  - all the crowd
  lexicon: HALOT
  rationale: A straightforward rendering of the collective noun with כָל. 'People'
    is natural modern English and fits the public acclamation scene.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: HALOT
  rationale: The preposition indicates following in procession. 'After him' is formally
    close and idiomatic in English.
- source_word: מְחַלְּלִים בַּחֲלִלִים
  chosen: playing flutes
  alternatives:
  - piping on flutes
  - playing pipes
  lexicon: HALOT
  rationale: The participle from חלל here denotes playing a wind instrument, and חלילים
    are flutes/pipes. 'Playing flutes' is concise, natural, and preserves the instrumental
    celebration.
- source_word: וּשְׂמֵחִים שִׂמְחָה גְדוֹלָה
  chosen: rejoicing with great joy
  alternatives:
  - celebrating greatly
  - rejoicing with very great gladness
  lexicon: HALOT
  rationale: The Hebrew uses a verbal-adverbial cognate construction for emphasis.
    'Rejoicing with great joy' preserves the repetition and intensity better than
    a flattened idiom.
- source_word: וַתִּבָּקַע הָאָרֶץ
  chosen: the earth split apart
  alternatives:
  - the land was split
  - the earth was rent
  lexicon: HALOT
  rationale: בקע means 'split, cleave.' In context this is hyperbolic description
    of the noise's force, not a literal geological event. 'The earth split apart'
    keeps the vivid imagery while remaining readable.
- source_word: בְּקוֹלָם
  chosen: at their sound
  alternatives:
  - with their noise
  - because of their voice
  lexicon: HALOT
  rationale: קוֹל can mean sound, noise, or voice. Since instruments and crowd are
    both in view, 'sound' best captures the total uproar without narrowing it to speech
    alone.
