id: 1KI.1.8
reference: 1 Kings 1:8
source:
  edition: WLC
  text: וְ/צָד֣וֹק הַ֠/כֹּהֵן וּ/בְנָיָ֨הוּ בֶן יְהוֹיָדָ֜ע וְ/נָתָ֤ן הַ/נָּבִיא֙
    וְ/שִׁמְעִ֣י וְ/רֵעִ֔י וְ/הַ/גִּבּוֹרִ֖ים אֲשֶׁ֣ר לְ/דָוִ֑ד לֹ֥א הָי֖וּ עִם אֲדֹנִיָּֽהוּ־־׃
translation:
  text: But Zadok the priest, Benaiah son of Jehoiada, Nathan the prophet, Shimei,
    Rei, and the mighty men who belonged to David were not with Adonijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David’s mighty men.' The Hebrew reads literally, 'the mighty men who
      were/belonged to David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/צָדוֹק
  chosen: But Zadok
  alternatives:
  - And Zadok
  - Now Zadok
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply 'and,' but in context
    it marks contrast with the preceding list of those supporting Adonijah. 'But'
    brings out the adversative force naturally in English without over-paraphrasing.
    'Zadok' is transliterated as a personal name per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: The appositional title identifies Zadok's office. 'Priest' is the standard
    and contextually precise rendering of כֹּהֵן.
- source_word: וּ/בְנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - and Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Both names are transliterated. 'Son of' is retained as the normal Hebrew
    patronymic construction; omitting the article before 'son' yields smoother modern
    English.
- source_word: וְ/נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  alternatives:
  - and Nathan the prophet
  lexicon: HALOT
  rationale: The title הַנָּבִיא is rendered 'the prophet,' preserving the appositional
    identification.
- source_word: וְ/שִׁמְעִי וְ/רֵעִי
  chosen: Shimei, Rei
  alternatives:
  - and Shimei and Rei
  lexicon: HALOT
  rationale: These are personal names and are transliterated. In English a comma-separated
    list is more natural than repeating 'and' before each item, while preserving the
    list structure.
- source_word: וְ/הַגִּבּוֹרִים אֲשֶׁר לְדָוִד
  chosen: and the mighty men who belonged to David
  alternatives:
  - and David's mighty men
  - and the warriors who were David's
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly denotes mighty men/warriors. Because the phrase
    refers to David's known corps of elite fighters, 'the mighty men' is appropriate
    and preserves the traditional sense. אֲשֶׁר לְדָוִד is expressed as 'who belonged
    to David' to reflect the relational phrase explicitly rather than compressing
    it entirely into a possessive, though 'David's mighty men' remains a viable alternative.
- source_word: לֹא הָיוּ עִם
  chosen: were not with
  alternatives:
  - did not side with
  - were not on the side of
  lexicon: HALOT
  rationale: The Hebrew is the simple existential-plus-preposition construction 'were
    not with.' This can imply non-support, but the more literal wording preserves
    the text's restraint and lets the context convey political alignment.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
