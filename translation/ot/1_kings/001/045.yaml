id: 1KI.1.45
reference: 1 Kings 1:45
source:
  edition: WLC
  text: וַ/יִּמְשְׁח֣וּ אֹת֡/וֹ צָד֣וֹק הַ/כֹּהֵ֣ן וְ/נָתָן֩ הַ/נָּבִ֨יא לְ/מֶ֜לֶךְ
    בְּ/גִח֗וֹן וַ/יַּעֲל֤וּ מִ/שָּׁם֙ שְׂמֵחִ֔ים וַ/תֵּהֹ֖ם הַ/קִּרְיָ֑ה ה֥וּא הַ/קּ֖וֹל
    אֲשֶׁ֥ר שְׁמַעְתֶּֽם׃
translation:
  text: And Zadok the priest and Nathan the prophet have anointed him king at Gihon,
    and they have come up from there rejoicing, and the city is in an uproar. That
    is the sound you heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the city resounded' or 'the city was stirred'; the Hebrew verb conveys
      noisy commotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְשְׁחוּ אֹתוֹ
  chosen: have anointed him
  alternatives:
  - anointed him
  - have consecrated him
  lexicon: HALOT
  rationale: משׁח in royal contexts denotes anointing for office. English perfect
    ('have anointed') fits the reported-result sense in context, as Jonathan explains
    the cause of the present noise.
- source_word: צָדוֹק הַכֹּהֵן
  chosen: Zadok the priest
  rationale: Personal name transliterated; title translated per philosophy.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  rationale: Personal name transliterated; title translated. 'Prophet' is the standard
    and plain sense of נביא.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: The phrase marks the office to which Solomon was anointed. English 'anointed
    him king' is idiomatic and compact; 'as king' is possible but less direct.
- source_word: בְּגִחוֹן
  chosen: at Gihon
  alternatives:
  - in Gihon
  rationale: Place name transliterated. 'At' is the most natural English preposition
    for the location of the anointing site.
- source_word: וַיַּעֲלוּ מִשָּׁם
  chosen: they have come up from there
  alternatives:
  - they came up from there
  - they went up from there
  lexicon: HALOT
  rationale: עלה literally means 'go up/come up.' Because the speaker reports an event
    whose effects are now evident, present perfect is suitable in English. 'Come up'
    fits the deictic perspective toward the city.
- source_word: שְׂמֵחִים
  chosen: rejoicing
  alternatives:
  - joyful
  - with rejoicing
  lexicon: HALOT
  rationale: The participial/adjectival form describes their manner as they returned.
    'Rejoicing' is vivid and natural in English.
- source_word: וַתֵּהֹם הַקִּרְיָה
  chosen: the city is in an uproar
  alternatives:
  - the city resounded
  - the city was in turmoil
  - the city was stirred
  lexicon: HALOT
  rationale: The verb from הום conveys tumult/noise/commotion. Given the following
    reference to 'the sound,' 'is in an uproar' captures both noise and agitation
    better than a flatter 'resounded.'
- source_word: הוּא הַקּוֹל אֲשֶׁר שְׁמַעְתֶּם
  chosen: That is the sound you heard
  alternatives:
  - This is the noise that you heard
  - That is the noise you have heard
  lexicon: HALOT
  rationale: הוּא functions demonstratively here. קוֹל can mean 'sound,' 'noise,'
    or 'voice'; 'sound' is broad and fits the explanatory statement. Past 'heard'
    is natural after the explanatory clause.
