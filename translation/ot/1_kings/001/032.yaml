id: 1KI.1.32
reference: 1 Kings 1:32
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֣לֶךְ דָּוִ֗ד קִרְאוּ לִ֞/י לְ/צָד֤וֹק הַ/כֹּהֵן֙ וּ/לְ/נָתָ֣ן
    הַ/נָּבִ֔יא וְ/לִ/בְנָיָ֖הוּ בֶּן יְהוֹיָדָ֑ע וַ/יָּבֹ֖אוּ לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׀־־׃
translation:
  text: Then King David said, “Call Zadok the priest, Nathan the prophet, and Benaiah
    son of Jehoiada to me.” And they came before the king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  - David the king
  lexicon: HALOT
  rationale: Appositional construction identifying David by royal title. 'King David'
    is the most natural English equivalent.
- source_word: קִרְאוּ לִי
  chosen: Call ... to me
  alternatives:
  - Summon ... to me
  - Call for ... for me
  lexicon: HALOT
  rationale: Imperative plural of קרא with לִי expresses a command to bring persons
    into the speaker's presence. 'Call ... to me' is direct and close to the Hebrew.
- source_word: לְצָדוֹק
  chosen: Zadok
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Zadok's office. 'Priest' is the standard and
    contextually precise rendering.
- source_word: וּלְנָתָן הַנָּבִיא
  chosen: Nathan the prophet
  lexicon: HALOT
  rationale: Proper name plus definite title. 'Prophet' straightforwardly renders
    נביא.
- source_word: וְלִבְנָיָהוּ בֶּן יְהוֹיָדָע
  chosen: and Benaiah son of Jehoiada
  alternatives:
  - and Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Names are transliterated; 'son of' is the standard rendering of בן in
    genealogical identification.
- source_word: וַיָּבֹאוּ
  chosen: And they came
  alternatives:
  - Then they came
  lexicon: HALOT
  rationale: Narrative waw-consecutive with plural verb. 'And they came' preserves
    the simple sequential movement.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - into the presence of the king
  - before King David
  lexicon: HALOT
  rationale: לִפְנֵי commonly denotes presence before someone. 'Before the king' is
    idiomatic and sufficiently formal.
