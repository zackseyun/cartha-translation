id: 1KI.1.16
reference: 1 Kings 1:16
source:
  edition: WLC
  text: וַ/תִּקֹּ֣ד בַּת שֶׁ֔בַע וַ/תִּשְׁתַּ֖חוּ לַ/מֶּ֑לֶךְ וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ
    מַה לָּֽ/ךְ־־׃
translation:
  text: Bathsheba bowed down and prostrated herself before the king, and the king
    said, “What is it that you want?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What is it to you?'' An idiom meaning ''What do you want?'' or
      ''What troubles you?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקֹּד
  chosen: bowed down
  alternatives:
  - knelt
  - inclined herself
  lexicon: HALOT
  rationale: The verb קָדַד denotes bending or bowing low. 'Bowed down' preserves
    the physical gesture without over-specifying kneeling, and fits the courtly setting.
- source_word: בַּת שֶׁבַע
  chosen: Bathsheba
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַתִּשְׁתַּחוּ
  chosen: prostrated herself
  alternatives:
  - paid homage
  - bowed herself
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה commonly denotes prostration or
    deep obeisance. 'Prostrated herself' distinguishes it from the preceding verb
    and preserves the intensification of the two gestures.
- source_word: לַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: The preposition ל can mark direction toward a person, but in English
    with gestures of obeisance 'before the king' is the most natural and idiomatic
    rendering.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  chosen: and the king said
  rationale: Standard narrative wayyiqtol sequence; straightforwardly rendered.
- source_word: מַה לָּךְ
  chosen: What is it that you want?
  alternatives:
  - What troubles you?
  - What is the matter with you?
  - What do you want?
  lexicon: HALOT
  rationale: The idiom מַה־לָּךְ literally means 'What [is] to/for you?' and in context
    functions as a courteous inquiry about her request or concern. 'What is it that
    you want?' is natural modern English and fits the royal audience context better
    than the more adversarial-sounding 'What is the matter with you?'.
