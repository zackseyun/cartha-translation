id: 1KI.1.15
reference: 1 Kings 1:15
source:
  edition: WLC
  text: וַ/תָּבֹ֨א בַת שֶׁ֤בֶע אֶל הַ/מֶּ֨לֶךְ֙ הַ/חַ֔דְרָ/ה וְ/הַ/מֶּ֖לֶךְ זָקֵ֣ן
    מְאֹ֑ד וַֽ/אֲבִישַׁג֙ הַ/שּׁ֣וּנַמִּ֔ית מְשָׁרַ֖ת אֶת הַ/מֶּֽלֶךְ־־־׃
translation:
  text: So Bathsheba went in to the king in the chamber. Now the king was very old,
    and Abishag the Shunammite was attending the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'entered the room where the king was.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was serving the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: went in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא advances the narrative. 'Went in' fits the perspective
    of Bathsheba approaching the king's private space and is idiomatic in English;
    'entered' is possible but slightly stiffer.
- source_word: בַת־שֶׁבַע
  chosen: Bathsheba
  rationale: Personal name is transliterated per project philosophy.
- source_word: אֶל־הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - into the presence of the king
  lexicon: HALOT
  rationale: אֶל marks motion toward. 'To the king' is the plain sense; the fuller
    idea of audience is conveyed by the context without expansion.
- source_word: הַחַדְרָה
  chosen: in the chamber
  alternatives:
  - into the room
  - into the inner room
  lexicon: HALOT
  rationale: חֶדֶר denotes a room/chamber, often an interior or private room. The
    directional he indicates motion into it, but English expresses the full clause
    more naturally as 'went in to the king in the chamber' rather than repeating 'into.'
    'Chamber' preserves the sense of a private royal room better than the generic
    'room'.
- source_word: וְהַמֶּלֶךְ זָקֵן מְאֹד
  chosen: Now the king was very old
  alternatives:
  - and the king was very old
  lexicon: HALOT
  rationale: The waw here is best rendered as a parenthetical/backgrounding note rather
    than simple coordination. 'Now' signals explanatory background in smooth English.
    זָקֵן מְאֹד is straightforwardly 'very old.'
- source_word: וַאֲבִישַׁג הַשּׁוּנַמִּית
  chosen: and Abishag the Shunammite
  rationale: Name is transliterated; the gentilic is rendered 'the Shunammite,' the
    standard English form for a woman from Shunem.
- source_word: מְשָׁרַת
  chosen: was attending
  alternatives:
  - was serving
  - was ministering to
  lexicon: HALOT
  rationale: The participle expresses ongoing action. 'Was attending' fits the immediate
    courtly/caregiving context of Abishag's service to the aged king. 'Ministering'
    would sound overly ecclesiastical here.
- source_word: אֶת־הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct-object marker plus noun; rendered simply as the object of 'was
    attending.'
