id: 1KI.1.9
reference: 1 Kings 1:9
source:
  edition: WLC
  text: וַ/יִּזְבַּ֣ח אֲדֹנִיָּ֗הוּ צֹ֤אן וּ/בָקָר֙ וּ/מְרִ֔יא עִ֚ם אֶ֣בֶן הַזֹּחֶ֔לֶת
    אֲשֶׁר אֵ֖צֶל עֵ֣ין רֹגֵ֑ל וַ/יִּקְרָ֗א אֶת כָּל אֶחָי/ו֙ בְּנֵ֣י הַ/מֶּ֔לֶךְ
    וּ/לְ/כָל אַנְשֵׁ֥י יְהוּדָ֖ה עַבְדֵ֥י הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: Adonijah sacrificed sheep, cattle, and fattened calves by the stone of Zoheleth,
    which is beside En-rogel, and he invited all his brothers, the king’s sons, and
    all the men of Judah, the king’s servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fatted cattle' or 'stall-fed cattle' for 'fattened calves.'
    reason: lexical_alternative
  - marker: b
    text: Zoheleth is a place-name; its exact meaning is uncertain.
    reason: cultural_note
  - marker: c
    text: Or 'called' or 'summoned' instead of 'invited.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the people of Judah,' though the Hebrew says 'the men of Judah.'
    reason: lexical_alternative
  - marker: e
    text: '''The king’s servants'' may refer to royal attendants or officials.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - slaughtered
  lexicon: HALOT
  rationale: The verb זבח in this context refers to ritual slaughter for a sacrificial
    feast, not merely butchering animals. 'Sacrificed' preserves the cultic/political
    significance of Adonijah's action.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - small livestock
  - flock animals
  lexicon: HALOT
  rationale: Though the Hebrew can denote small livestock collectively (sheep/goats),
    'sheep' is a natural English representative rendering in a sacrificial list and
    matches common usage unless goats are explicitly mentioned.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: A broad term for bovines. 'Cattle' best matches the collective sense
    here better than the narrower 'oxen.'
- source_word: מְרִיא
  chosen: fattened calves
  alternatives:
  - fatted cattle
  - stall-fed cattle
  lexicon: HALOT
  rationale: The term denotes fattened livestock prepared for special consumption.
    'Fattened calves' is idiomatic English and conveys the celebratory, lavish nature
    of the feast.
- source_word: עִם אֶבֶן הַזֹּחֶלֶת
  chosen: by the stone of Zoheleth
  alternatives:
  - at the stone of Zoheleth
  - with the stone of Zoheleth
  lexicon: HALOT
  rationale: The preposition with a place marker here is best rendered locatively.
    'By' is natural English for the sacrificial location. 'Zoheleth' is transliterated
    as a place-name rather than translated, since the exact meaning is uncertain and
    names are transliterated by policy.
- source_word: עֵין רֹגֵל
  chosen: En-rogel
  alternatives:
  - the spring of Rogel
  lexicon: HALOT
  rationale: This is a place-name, so transliteration is preferred. A literal translation
    would obscure that it is a known geographic location.
- source_word: וַיִּקְרָא
  chosen: invited
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: In the context of a feast/sacrificial gathering, the sense is not merely
    vocal calling but inviting people to attend. 'Invited' communicates the social-political
    action clearly.
- source_word: אֶת כָּל אֶחָיו בְּנֵי הַמֶּלֶךְ
  chosen: all his brothers, the king’s sons
  alternatives:
  - all his brothers—the sons of the king
  lexicon: HALOT
  rationale: The appositional phrase identifies which brothers are meant. Retaining
    both expressions preserves the Hebrew emphasis and clarifies the royal family
    setting.
- source_word: אַנְשֵׁי יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the people of Judah
  - the leaders of Judah
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'men.' Per translation policy,
    gender-accurate rendering is preferred unless context clearly demands a broader
    sense. Here it likely refers to male Judean attendees/officials.
- source_word: עַבְדֵי הַמֶּלֶךְ
  chosen: the king’s servants
  alternatives:
  - the king’s officials
  - the king’s servants/attendants
  lexicon: HALOT
  rationale: עבדים can denote servants in a royal administrative sense. 'Servants'
    is the more direct rendering; 'officials' is interpretive and therefore left as
    an alternative.
