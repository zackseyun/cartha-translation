theological_decisions:
- issue: Gendered language in אַנְשֵׁי יְהוּדָה
  chosen_reading: the men of Judah
  alternative_readings:
  - the people of Judah
  rationale: The Hebrew is grammatically and semantically masculine. Following the
    project's gender-accurate policy, the masculine form is retained rather than neutralized,
    while acknowledging a broader social reference as a possible interpretive alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
