id: 1KI.1.20
reference: 1 Kings 1:20
source:
  edition: WLC
  text: וְ/אַתָּה֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ עֵינֵ֥י כָל יִשְׂרָאֵ֖ל עָלֶ֑י/ךָ לְ/הַגִּ֣יד
    לָ/הֶ֔ם מִ֗י יֵשֵׁ֛ב עַל כִּסֵּ֥א אֲדֹנִֽ/י הַ/מֶּ֖לֶךְ אַחֲרָֽי/ו־־־׃
translation:
  text: And you, my lord the king, the eyes of all Israel are on you, to tell them
    who will sit on the throne of my lord the king after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all Israel's eyes are upon you.'
    reason: lexical_alternative
  - marker: b
    text: That is, after King David.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my lord, O king
  - my master the king
  lexicon: HALOT
  rationale: אֲדֹנִי is a deferential address meaning 'my lord'; with הַמֶּלֶךְ it
    functions as a courtly title of address. 'My lord the king' preserves both the
    possessive politeness and the royal title in natural English.
- source_word: עֵינֵי כָל יִשְׂרָאֵל עָלֶיךָ
  chosen: the eyes of all Israel are on you
  alternatives:
  - all Israel is looking to you
  - all Israel's eyes are upon you
  lexicon: HALOT
  rationale: The idiom literally speaks of the eyes of all Israel being upon the king,
    expressing expectation and attention. 'Are on you' keeps the imagery while remaining
    readable modern English.
- source_word: לְהַגִּיד לָהֶם
  chosen: to tell them
  alternatives:
  - to declare to them
  - to make known to them
  lexicon: HALOT
  rationale: The Hiphil infinitive of נגד conveys causing information to be known,
    often 'tell' or 'declare.' 'To tell them' is concise and fits the direct royal
    context.
- source_word: מִי יֵשֵׁב
  chosen: who will sit
  alternatives:
  - who is to sit
  - who shall sit
  lexicon: HALOT
  rationale: ישב with throne language denotes enthronement or succession. 'Will sit'
    is natural English future in this context of expected designation.
- source_word: עַל כִּסֵּא
  chosen: on the throne
  alternatives:
  - upon the throne
  - on the seat of rule
  lexicon: HALOT
  rationale: כִּסֵּא is literally 'throne.' The preposition עַל is straightforwardly
    rendered 'on' in idiomatic English.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - afterward
  - after him as successor
  lexicon: HALOT
  rationale: The pronominal suffix is third masculine singular. In context Bathsheba
    is asking who will reign after David. 'After him' preserves the explicit pronoun
    and succession sense without over-expansion.
