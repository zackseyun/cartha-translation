theological_decisions:
- issue: Referent of the pronoun in אַחֲרָיו
  chosen_reading: after him = after King David
  alternative_readings:
  - after this
  - afterward
  rationale: The Hebrew form is a preposition with 3ms suffix, most naturally referring
    to the king just addressed. In context the issue is royal succession after David,
    so the personal referent should be retained rather than generalized temporally.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently resolves the referent, so no ambiguity needs to be forced
    into the main text.
