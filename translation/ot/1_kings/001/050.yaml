id: 1KI.1.50
reference: 1 Kings 1:50
source:
  edition: WLC
  text: וַ/אֲדֹ֣נִיָּ֔הוּ יָרֵ֖א מִ/פְּנֵ֣י שְׁלֹמֹ֑ה וַ/יָּ֣קָם וַ/יֵּ֔לֶךְ וַֽ/יַּחֲזֵ֖ק
    בְּ/קַרְנ֥וֹת הַ/מִּזְבֵּֽחַ׃
translation:
  text: And Adonijah was afraid because of Solomon, so he arose and went and took
    hold of the horns of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Taking hold of the horns of the altar was a gesture of seeking sanctuary
      or mercy at the sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: יָרֵא
  chosen: was afraid
  alternatives:
  - feared
  - was fearful
  lexicon: HALOT
  rationale: The qatal form describes Adonijah's state in view of Solomon. 'Was afraid'
    is natural modern English and preserves the straightforward sense without adding
    interpretive nuance.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from the presence of
  - for fear of
  lexicon: HALOT
  rationale: Here the idiom with ירא conveys the cause/object of fear rather than
    literal spatial presence. 'Because of Solomon' communicates the sense clearly
    in idiomatic English.
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he rose
  lexicon: HALOT
  rationale: A conventional narrative verb. 'He arose' preserves the formal narrative
    sequence while remaining readable.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Simple movement verb in Hebrew narrative; 'went' is the most direct equivalent.
- source_word: וַיַּחֲזֵק
  chosen: took hold of
  alternatives:
  - seized
  - grasped
  - held fast to
  lexicon: HALOT
  rationale: In context of seeking sanctuary at the altar, 'took hold of' is idiomatic
    and precise without overstating violence implied by 'seized'.
- source_word: קַרְנוֹת
  chosen: horns
  lexicon: HALOT
  rationale: Literal rendering is appropriate for the altar's projecting corners/horns;
    this is standard cultic terminology and should not be paraphrased away.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח in sacrificial/cultic contexts.
- source_word: וַאֲדֹנִיָּהוּ
  chosen: And Adonijah
  rationale: Personal names are transliterated by standard convention per project
    philosophy; the prefixed waw is carried by 'And' to preserve Hebrew narrative
    flow.
