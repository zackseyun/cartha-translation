theological_decisions:
- issue: Cultic asylum gesture at the altar
  chosen_reading: Rendered the action literally as taking hold of the horns of the
    altar without explicating its legal or symbolic significance in the main text.
  alternative_readings:
  - Expanded paraphrase such as 'fled to the altar for refuge'
  rationale: The Hebrew states the physical act; while the act implies appeal for
    sanctuary, importing that explanation into the main text would go beyond the wording.
    The cultural significance is better preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
