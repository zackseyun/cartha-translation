id: 1KI.1.51
reference: 1 Kings 1:51
source:
  edition: WLC
  text: וַ/יֻּגַּ֤ד לִ/שְׁלֹמֹה֙ לֵ/אמֹ֔ר הִנֵּה֙ אֲדֹ֣נִיָּ֔הוּ יָרֵ֖א אֶת הַ/מֶּ֣לֶךְ
    שְׁלֹמֹ֑ה וְ֠/הִנֵּה אָחַ֞ז בְּ/קַרְנ֤וֹת הַ/מִּזְבֵּ֨חַ֙ לֵ/אמֹ֔ר יִשָּֽׁבַֽע
    לִ֤/י כַ/יּוֹם֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה אִם יָמִ֥ית אֶת עַבְדּ֖/וֹ בֶּ/חָֽרֶב־־־־׃
translation:
  text: And it was reported to Solomon, saying, “Look, Adonijah fears King Solomon,
    and look, he has taken hold of the horns of the altar, saying, ‘Let King Solomon
    swear to me today that he will not put his servant to death with the sword.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “if he puts his servant to death with the sword,” an
      oath formula expressing the request that Solomon swear not to execute him.
    reason: lexical_alternative
  - marker: b
    text: Taking hold of the horns of the altar was an appeal for sanctuary or mercy
      at the altar.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal of נגד indicates information being reported to Solomon.
    'It was reported' is natural modern English while preserving the passive sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - with these words
  lexicon: HALOT
  rationale: Retains the Hebrew quotative structure and keeps the report vivid without
    over-paraphrase.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: '''Look'' preserves the deictic attention-getting force in readable modern
    English; ''Behold'' is too archaic.'
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: יָרֵא
  chosen: fears
  alternatives:
  - is afraid of
  lexicon: HALOT
  rationale: The verb denotes fear. 'Fears' is concise and preserves the directness
    of the Hebrew; context implies fear of royal retaliation.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as the title
    plus name.
- source_word: אָחַז
  chosen: has taken hold of
  alternatives:
  - has grasped
  - is holding onto
  lexicon: HALOT
  rationale: Conveys a deliberate act of seizing for refuge; the perfect is well represented
    by English present perfect in reported speech.
- source_word: בְּקַרְנוֹת הַמִּזְבֵּחַ
  chosen: of the horns of the altar
  alternatives:
  - to the horns of the altar
  lexicon: HALOT
  rationale: With אחז, English idiom prefers 'take hold of.' 'Horns of the altar'
    preserves the concrete cultic image rather than paraphrasing it away.
- source_word: יִשָּׁבַע לִי
  chosen: Let ... swear to me
  alternatives:
  - May ... swear to me
  - Let ... give me his oath
  lexicon: HALOT
  rationale: Jussive nuance is captured by 'Let ... swear to me.' This reflects Adonijah's
    plea/request.
- source_word: כַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic temporal expression; 'today' is clear modern English.
- source_word: אִם יָמִית
  chosen: that he will not put ... to death
  alternatives:
  - surely he will not kill
  - if he puts ... to death
  lexicon: HALOT
  rationale: After a verb of swearing, אִם introduces the content of the oath in a
    negative/conditional idiom. In context the sense is a requested oath of non-execution,
    best rendered explicitly in English as 'that he will not put ... to death.'
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Here Adonijah refers to himself deferentially before the king. 'Servant'
    better captures courtly self-abasement than 'slave,' where bonded-status is not
    the salient point.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: A standard idiom for execution by violent death; 'with the sword' is
    a natural literal rendering.
