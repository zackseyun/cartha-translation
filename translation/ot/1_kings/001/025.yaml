id: 1KI.1.25
reference: 1 Kings 1:25
source:
  edition: WLC
  text: כִּ֣י יָרַ֣ד הַ/יּ֗וֹם וַ֠/יִּזְבַּח שׁ֥וֹר וּֽ/מְרִיא וְ/צֹאן֮ לָ/רֹב֒ וַ/יִּקְרָא֩
    לְ/כָל בְּנֵ֨י הַ/מֶּ֜לֶךְ וּ/לְ/שָׂרֵ֤י הַ/צָּבָא֙ וּ/לְ/אֶבְיָתָ֣ר הַ/כֹּהֵ֔ן
    וְ/הִנָּ֛/ם אֹכְלִ֥ים וְ/שֹׁתִ֖ים לְ/פָנָ֑י/ו וַ/יֹּ֣אמְר֔וּ יְחִ֖י הַ/מֶּ֥לֶךְ
    אֲדֹנִיָּֽהוּ׀־־׃
translation:
  text: For he has gone down today and sacrificed oxen, fattened cattle, and sheep
    in abundance, and he has invited all the king’s sons, the commanders of the army,
    and Abiathar the priest. And look, they are eating and drinking before him, and
    they are saying, ‘Long live King Adonijah!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he went down today.' The Hebrew verb preserves the directional
      idea 'went/came down.'
    reason: lexical_alternative
  - marker: b
    text: '''Long live King Adonijah!'' is the idiomatic rendering of the Hebrew acclamation
      ''May the king live, Adonijah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding warning/report. 'For' fits
    the discourse flow in English without over-specifying causation.
- source_word: יָרַד הַיּוֹם
  chosen: he has gone down today
  alternatives:
  - he went down today
  - he has come down today
  lexicon: HALOT
  rationale: יָרַד literally means 'went down/came down.' In this narrative report,
    English present perfect ('has gone down') conveys a recent action with present
    relevance. 'Gone down' preserves the directional verb rather than paraphrasing
    it away.
- source_word: וַיִּזְבַּח
  chosen: and sacrificed
  alternatives:
  - and slaughtered
  - and offered sacrifices
  lexicon: HALOT
  rationale: זבח in this context refers to sacrificial slaughter associated with a
    feast. 'Sacrificed' preserves the cultic sense better than the merely culinary
    'slaughtered,' while remaining concise.
- source_word: שׁוֹר
  chosen: oxen
  alternatives:
  - bulls
  - cattle
  lexicon: HALOT
  rationale: Collective singular after a verb of sacrifice is naturally rendered as
    a plural class noun in English. 'Oxen' is a standard rendering and distinguishes
    this term from the following מְרִיא.
- source_word: מְרִיא
  chosen: fattened cattle
  alternatives:
  - fatted calves
  - fatlings
  lexicon: HALOT
  rationale: The term denotes fattened livestock. 'Fattened cattle' is natural modern
    English and avoids implying only young animals, which 'calves' might suggest.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock animals
  - small livestock
  lexicon: HALOT
  rationale: Though צֹאן can include sheep and goats collectively, 'sheep' is the
    conventional concise rendering in sacrificial lists unless the broader category
    must be emphasized.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: This idiom modifies the sacrificial animals, indicating large quantity.
    'In abundance' is idiomatic and preserves the sense of lavish scale.
- source_word: וַיִּקְרָא
  chosen: and he has invited
  alternatives:
  - and he invited
  - and he called
  lexicon: HALOT
  rationale: קרא with ל marks summoning/inviting persons. 'Invited' fits the banquet
    setting better than the more wooden 'called,' while preserving the social action.
- source_word: לְכָל בְּנֵי הַמֶּלֶךְ
  chosen: all the king’s sons
  alternatives:
  - all the sons of the king
  lexicon: HALOT
  rationale: Gender-accurate rendering is required; the referent is specifically male
    royal offspring, not generic children.
- source_word: שָׂרֵי הַצָּבָא
  chosen: the commanders of the army
  alternatives:
  - the captains of the army
  - the officials of the host
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; with הַצָּבָא the military sense is clear.
    'Commanders of the army' is readable modern English.
- source_word: אֶבְיָתָר הַכֹּהֵן
  chosen: Abiathar the priest
  lexicon: HALOT
  rationale: Personal name is transliterated; title is translated per project philosophy.
- source_word: וְהִנָּם
  chosen: And look
  alternatives:
  - And behold
  - and see
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם draws attention to the present scene. 'And look' is readable
    modern English; 'behold' would sound archaic.
- source_word: אֹכְלִים וְשֹׁתִים
  chosen: they are eating and drinking
  alternatives:
  - they eat and drink
  - they are feasting
  lexicon: HALOT
  rationale: The participles depict ongoing action. Rendering both verbs explicitly
    preserves the Hebrew picture better than compressing to 'feasting.'
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literal relational phrase indicating they are dining in Adonijah's presence.
    'Before him' is concise and sufficiently clear.
- source_word: יְחִי הַמֶּלֶךְ
  chosen: Long live King
  alternatives:
  - May the king live
  lexicon: HALOT
  rationale: This is the standard acclamatory formula in English for the Hebrew jussive
    construction. It preserves the public royal shout idiomatically.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
