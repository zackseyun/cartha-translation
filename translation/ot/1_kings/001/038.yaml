id: 1KI.1.38
reference: 1 Kings 1:38
source:
  edition: WLC
  text: וַ/יֵּ֣רֶד צָד֣וֹק הַ֠/כֹּהֵן וְ/נָתָ֨ן הַ/נָּבִ֜יא וּ/בְנָיָ֣הוּ בֶן יְהוֹיָדָ֗ע
    וְ/הַ/כְּרֵתִי֙ וְ/הַ/פְּלֵתִ֔י וַ/יַּרְכִּ֨בוּ֙ אֶת שְׁלֹמֹ֔ה עַל פִּרְדַּ֖ת
    הַ/מֶּ֣לֶךְ דָּוִ֑ד וַ/יֹּלִ֥כוּ אֹת֖/וֹ עַל גִּחֽוֹן־־־־׃
translation:
  text: So Zadok the priest, Nathan the prophet, Benaiah son of Jehoiada, and the
    Cherethites and the Pelethites went down and mounted Solomon on King David’s mule,
    and they led him to Gihon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the royal guard' for 'the Cherethites and the Pelethites';
      the Hebrew uses the group names themselves.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the mule of King David.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew noun for 'mule' is grammatically feminine and may denote a female
      mule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Went down' preserves
    the directional sense in natural English and fits the narrative movement from
    the royal presence to Gihon.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כהן. With the personal name, 'Zadok the priest'
    is the natural appositional English form.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. 'Nathan the prophet' preserves the title
    as given in Hebrew.
- source_word: בֶן יְהוֹיָדָע
  chosen: son of Jehoiada
  alternatives:
  - the son of Jehoiada
  lexicon: HALOT
  rationale: A straightforward patronymic. English commonly omits the repeated article
    in apposition.
- source_word: הַכְּרֵתִי וְהַפְּלֵתִי
  chosen: the Cherethites and the Pelethites
  alternatives:
  - the Kerethites and the Pelethites
  - the royal guard
  lexicon: HALOT
  rationale: These are best treated as group names and transliterated rather than
    interpreted, since their exact ethnic or functional nuance is debated. 'Royal
    guard' captures probable function but goes beyond the lexical form, so it is not
    used in the main text.
- source_word: וַיַּרְכִּבוּ
  chosen: mounted
  alternatives:
  - caused to ride
  - set ... on
  lexicon: HALOT
  rationale: The hiphil of רכב means to cause someone to ride. 'Mounted Solomon on'
    is concise, idiomatic English that preserves the causative sense.
- source_word: פִּרְדַּת
  chosen: mule
  alternatives:
  - female mule
  lexicon: HALOT
  rationale: The noun refers specifically to a female mule. English usually uses the
    generic 'mule' unless the sex is contextually important; here the narrative emphasis
    is on the king's own riding animal, not the animal's sex.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David’s
  alternatives:
  - the mule of King David
  - the king, David's
  lexicon: HALOT
  rationale: 'The construct chain indicates possession: ''the mule of King David.''
    Rendering it as ''King David’s mule'' is natural English and preserves the royal
    association.'
- source_word: וַיֹּלִכוּ אֹתוֹ
  chosen: they led him
  alternatives:
  - they brought him
  - they took him
  lexicon: HALOT
  rationale: The hiphil of הלך here is causative, 'cause to go,' often 'lead' or 'bring.'
    'Led him' best fits the ceremonial procession context.
- source_word: עַל גִּחוֹן
  chosen: to Gihon
  alternatives:
  - onto Gihon
  - down to Gihon
  lexicon: HALOT
  rationale: Although the preposition is על, in this motion context with a place name
    it is idiomatically rendered 'to' in English. This avoids awkwardness while preserving
    destination.
