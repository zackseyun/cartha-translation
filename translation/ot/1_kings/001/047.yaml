id: 1KI.1.47
reference: 1 Kings 1:47
source:
  edition: WLC
  text: וְ/גַם בָּ֜אוּ עַבְדֵ֣י הַ/מֶּ֗לֶךְ לְ֠/בָרֵךְ אֶת אֲדֹנֵ֜י/נוּ הַ/מֶּ֣לֶךְ
    דָּוִד֮ לֵ/אמֹר֒ יֵיטֵ֨ב אלהי/ך אֶת שֵׁ֤ם שְׁלֹמֹה֙ מִ/שְּׁמֶ֔/ךָ וִֽ/יגַדֵּ֥ל
    אֶת כִּסְא֖/וֹ מִ/כִּסְאֶ֑/ךָ וַ/יִּשְׁתַּ֥חוּ הַ/מֶּ֖לֶךְ עַל הַ/מִּשְׁכָּֽב־־־־־׃
translation:
  text: And the king’s servants also came to bless our lord King David, saying, ‘May
    your God make Solomon’s name better than your name, and may he make his throne
    greater than your throne.’ And the king bowed himself on the bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the king worshiped on the bed.' The Hebrew verb can mean either 'bowed
      himself' or 'worshiped,' depending on context.
    reason: alternative_reading
  - marker: b
    text: '''Name'' here carries the sense of reputation or renown.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Moreover
  - And also
  lexicon: HALOT
  rationale: Conveys additive force linking this report with the previous one. Splitting
    the sense across 'And' and 'also' yields natural English while preserving the
    Hebrew conjunction plus adverb.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - have come
  - arrived
  lexicon: HALOT
  rationale: Simple past fits the narrative wayyiqtol/sequential reporting context
    in English.
- source_word: עַבְדֵי הַמֶּלֶךְ
  chosen: the king’s servants
  alternatives:
  - the king’s officials
  - the king’s servants/slaves
  lexicon: HALOT
  rationale: In this court setting עבד often denotes royal attendants or officials.
    'Servants' is the most natural and sufficiently broad rendering here; the bonded-status
    nuance of 'slave' is not foregrounded in this context.
- source_word: לְבָרֵךְ
  chosen: to bless
  alternatives:
  - to congratulate
  - to pay homage to
  lexicon: HALOT
  rationale: The verb ברך here introduces a formal blessing spoken over David. 'Bless'
    preserves the lexical and theological sense better than a flatter social term.
- source_word: אֶת אֲדֹנֵינוּ הַמֶּלֶךְ דָּוִד
  chosen: our lord King David
  alternatives:
  - our master, King David
  lexicon: HALOT
  rationale: אדון in royal address is well rendered 'lord.' This preserves courtly
    honorific language without importing more than the Hebrew states.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with these words
  - to say
  lexicon: HALOT
  rationale: Standard speech introducer; 'saying' is concise and transparent.
- source_word: יֵיטֵב אֱלֹהֶיךָ
  chosen: May your God make
  alternatives:
  - May your God do good to
  - May your God make good/prosper
  lexicon: HALOT
  rationale: The Hiphil of יטב here is causative and governs 'the name of Solomon';
    idiomatic English expresses the blessing as 'make Solomon’s name better than your
    name.'
- source_word: אֶת שֵׁם שְׁלֹמֹה מִשְּׁמֶךָ
  chosen: Solomon’s name better than your name
  alternatives:
  - the name of Solomon better than your name
  - Solomon’s renown greater than your renown
  lexicon: HALOT
  rationale: '''Name'' in Hebrew often carries the sense of reputation or renown,
    but retaining ''name'' preserves the source image and remains understandable in
    English. ''Better than'' reflects the comparative force of מן with יטב.'
- source_word: וִיגַדֵּל
  chosen: and may he make ... greater
  alternatives:
  - and may he magnify
  - and may he exalt
  lexicon: HALOT
  rationale: גדל in Hiphil here means to make great. 'Make ... greater' fits the comparative
    construction and reads naturally.
- source_word: אֶת כִּסְאוֹ מִכִּסְאֶךָ
  chosen: his throne greater than your throne
  alternatives:
  - his throne above your throne
  - his royal seat greater than your royal seat
  lexicon: HALOT
  rationale: כסא is literally 'throne' and in context refers to royal rule. Retaining
    'throne' preserves the political and dynastic imagery.
- source_word: וַיִּשְׁתַּחוּ הַמֶּלֶךְ
  chosen: And the king bowed himself
  alternatives:
  - And the king worshiped
  - And the king prostrated himself
  lexicon: HALOT
  rationale: The verb can denote bowing down in reverence or worship. Here David responds
    to the blessing while on his bed; 'bowed himself' preserves the physical act without
    over-specifying whether the object is God explicitly in this clause.
- source_word: עַל הַמִּשְׁכָּב
  chosen: on the bed
  alternatives:
  - upon the bed
  - on his bed
  lexicon: HALOT
  rationale: Literal rendering is straightforward. The possessive 'his' is implied
    by context but not explicit, so 'the bed' is slightly more transparent to the
    Hebrew.
