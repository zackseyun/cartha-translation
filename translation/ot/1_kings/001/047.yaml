theological_decisions:
- issue: Whether וַיִּשְׁתַּחוּ should be rendered as explicit worship or as bowing
  chosen_reading: Rendered as 'the king bowed himself'
  alternative_readings:
  - the king worshiped
  rationale: The Hebrew verb can denote worship before God or a physical act of prostration/bowing.
    Since this clause does not explicitly state the object and the immediate scene
    emphasizes David's bodily response on the bed, the translation preserves the gesture
    without resolving beyond the text. The broader context may imply worship toward
    God, but the verse itself leaves that implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
