id: 1KI.1.29
reference: 1 Kings 1:29
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֥ע הַ/מֶּ֖לֶךְ וַ/יֹּאמַ֑ר חַי יְהוָ֕ה אֲשֶׁר פָּדָ֥ה אֶת נַפְשִׁ֖/י מִ/כָּל צָרָֽה־־־־׃
translation:
  text: And the king swore and said, “As Yahweh lives, who has redeemed my life from every distress,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my soul.” Hebrew nephesh can mean soul, self, or life; here it most naturally refers to David’s life preserved from danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  lexicon: HALOT
  rationale: The verb from שׁבע in the Niphal denotes taking an oath. 'Swore' is the most natural concise English rendering in narrative, while 'took an oath' is a viable but less direct alternative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly rendered 'the king.' Context identifies David, but the Hebrew uses the title rather than the personal name here, so the translation preserves that.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'Said' preserves the simple discourse introduction without adding rhetorical force.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is idiomatic English that preserves the oath sense. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to the personal subject 'the LORD'; 'who' is better English for a personal antecedent.
- source_word: פָּדָה
  chosen: has redeemed
  alternatives:
  - redeemed
  - delivered
  - ransomed
  lexicon: HALOT
  rationale: פדה commonly carries the sense of redeeming or ransoming by intervention. 'Has redeemed' fits the perfect aspect in an oath recalling completed divine action and preserves the theological weight better than the flatter 'delivered.'
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - myself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to David's life/person rather than an immaterial 'soul' in a later theological sense. 'My life' is the clearest contextually accurate rendering.
- source_word: מִכָּל צָרָה
  chosen: from every distress
  alternatives:
  - from every trouble
  - from all adversity
  - from every affliction
  lexicon: HALOT
  rationale: The phrase denotes rescue from every kind of trouble or adversity. 'From every distress' is natural English and preserves the breadth of כָּל with the singular collective noun.
