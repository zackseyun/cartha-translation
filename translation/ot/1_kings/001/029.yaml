theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy. This preserves continuity with Jewish
    reverence tradition and the Septuagintal pattern while remaining readable in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering נַפְשִׁי in this context
  chosen_reading: my life
  alternative_readings:
  - my soul
  - myself
  rationale: To avoid importing a more dualistic or later theological sense not required
    by the Hebrew, נֶפֶשׁ is rendered according to contextual sense as 'life.' The
    verse speaks of rescue from danger, not specifically the inner soul.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
