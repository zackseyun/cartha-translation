id: 1KI.1.2
reference: 1 Kings 1:2
source:
  edition: WLC
  text: וַ/יֹּ֧אמְרוּ ל֣/וֹ עֲבָדָ֗י/ו יְבַקְשׁ֞וּ לַ/אדֹנִ֤/י הַ/מֶּ֨לֶךְ֙ נַעֲרָ֣ה
    בְתוּלָ֔ה וְ/עָֽמְדָה֙ לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ וּ/תְהִי ל֖/וֹ סֹכֶ֑נֶת וְ/שָׁכְבָ֣ה
    בְ/חֵיקֶ֔/ךָ וְ/חַ֖ם לַ/אדֹנִ֥/י הַ/מֶּֽלֶךְ־׃
translation:
  text: So his servants said to him, “Let them seek for my lord the king a young virgin
    woman, and let her attend the king and be his caregiver, and let her lie in your
    bosom, so that my lord the king may be warm.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let her stand before the king'; the Hebrew idiom can mean to attend
      or wait on someone in service.
    reason: lexical_alternative
  - marker: b
    text: Or 'attendant' or 'nurse' for 'caregiver'; the Hebrew term is rare and denotes
      one who ministers to or cares for another.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in your bosom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his slaves
  lexicon: HALOT
  rationale: In royal court context, עבד often denotes court servants/official attendants.
    'Servants' is natural English and does not overstate bonded status here, unlike
    contexts where slavery is salient.
- source_word: יְבַקְשׁוּ
  chosen: Let them seek
  alternatives:
  - Let us seek
  - They should seek
  lexicon: HALOT
  rationale: The 3mp imperfect is best taken as a jussive-like proposal, 'let them
    seek.' Although some English versions smooth to 'let there be sought' or 'let
    us seek,' the Hebrew form is active plural and is preserved transparently.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  chosen: for my lord the king
  alternatives:
  - for the lord my king
  lexicon: HALOT
  rationale: Retains the deferential court formula with first-person possessive 'my
    lord' and appositional 'the king.'
- source_word: נַעֲרָה בְתוּלָה
  chosen: a young virgin woman
  alternatives:
  - a young woman, a virgin
  - a virgin girl
  lexicon: HALOT
  rationale: 'Both nouns are significant: נַעֲרָה indicates a young woman, and בְתוּלָה
    specifies virginity. ''Young virgin woman'' preserves both without collapsing
    one into the other.'
- source_word: וְעָמְדָה לִפְנֵי הַמֶּלֶךְ
  chosen: let her attend the king
  alternatives:
  - let her stand before the king
  - let her wait on the king
  lexicon: HALOT
  rationale: Literally 'stand before' can denote service/attendance in courtly contexts.
    'Attend' captures the idiomatic sense while remaining close to the Hebrew.
- source_word: סֹכֶנֶת
  chosen: caregiver
  alternatives:
  - attendant
  - nurse
  - companion
  lexicon: HALOT
  rationale: The rare term likely denotes one who ministers to or cares for someone.
    'Caregiver' best fits the immediate context of warming and tending the aged king
    without importing sexual implications not explicit in the term itself.
- source_word: וְשָׁכְבָה בְחֵיקֶךָ
  chosen: let her lie in your bosom
  alternatives:
  - let her lie in your arms
  - let her lie by your side
  lexicon: HALOT
  rationale: חֵיק literally means bosom/lap. 'Bosom' preserves the concrete Hebrew
    image and the physical closeness intended for warmth, though it may sound slightly
    formal in English.
- source_word: וְחַם
  chosen: so that my lord the king may be warm
  alternatives:
  - and my lord the king will be warm
  - that the king may become warm
  lexicon: HALOT
  rationale: The clause expresses intended result. Rendering with 'so that ... may
    be warm' communicates purpose clearly in English.
