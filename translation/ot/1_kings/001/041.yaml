id: 1KI.1.41
reference: 1 Kings 1:41
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע אֲדֹנִיָּ֗הוּ וְ/כָל הַ/קְּרֻאִים֙ אֲשֶׁ֣ר אִתּ֔/וֹ וְ/הֵ֖ם
    כִּלּ֣וּ לֶ/אֱכֹ֑ל וַ/יִּשְׁמַ֤ע יוֹאָב֙ אֶת ק֣וֹל הַ/שּׁוֹפָ֔ר וַ/יֹּ֕אמֶר מַדּ֥וּעַ
    קֽוֹל הַ/קִּרְיָ֖ה הוֹמָֽה־־־׃
translation:
  text: Adonijah and all the invited guests who were with him heard it as they were
    finishing eating. And when Joab heard the sound of the trumpet, he said, “Why
    is the sound of the city in an uproar?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as soon as they had finished eating.” The Hebrew clause may be understood
      as marking either the completion of the meal or the moment they were just finishing
      it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn trumpet used for public signaling.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard it
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb means 'heard.' English idiom benefits from supplying the object
    'it' from context, referring to the noise/celebration just mentioned in the narrative.
- source_word: הַקְּרֻאִים
  chosen: the invited guests
  alternatives:
  - those who were invited
  - the invited ones
  lexicon: HALOT
  rationale: Passive participle from קרא, 'called/invited.' In banquet context, 'invited
    guests' is the most natural and specific English rendering.
- source_word: וְהֵם כִּלּוּ לֶאֱכֹל
  chosen: as they were finishing eating
  alternatives:
  - when they had finished eating
  - and they finished eating
  lexicon: HALOT
  rationale: The clause marks the timing of when they heard the noise. The construction
    can be rendered temporally; 'as they were finishing eating' captures the sense
    that the meal was just ending when the sound was heard.
- source_word: קוֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the ram's horn
  - the voice/sound of the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר is the horn used for public announcement. 'Trumpet' is standard,
    clear modern English; 'ram's horn' is more specific but less idiomatic here, and
    'shofar' would transliterate a common noun contrary to the translation philosophy.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the natural concise English equivalent.
- source_word: קוֹל הַקִּרְיָה
  chosen: the sound of the city
  alternatives:
  - the noise of the city
  - the sound from the city
  lexicon: HALOT
  rationale: קִרְיָה means 'city/town.' Because קוֹל already supplies the idea of
    noise/sound, 'the sound of the city' preserves the Hebrew structure while remaining
    intelligible.
- source_word: הוֹמָה
  chosen: in an uproar
  alternatives:
  - in turmoil
  - in commotion
  - roaring
  lexicon: HALOT
  rationale: The participial form conveys noisy agitation or tumult. 'In an uproar'
    is idiomatic English that matches the public, celebratory disturbance implied
    by the context.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  rationale: Personal name is transliterated according to the project's philosophy.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal name is transliterated according to the project's philosophy.
