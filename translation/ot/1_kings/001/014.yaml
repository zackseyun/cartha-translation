id: 1KI.1.14
reference: 1 Kings 1:14
source:
  edition: WLC
  text: הִנֵּ֗ה עוֹדָ֛/ךְ מְדַבֶּ֥רֶת שָׁ֖ם עִם הַ/מֶּ֑לֶךְ וַ/אֲנִי֙ אָב֣וֹא אַחֲרַ֔יִ/ךְ
    וּ/מִלֵּאתִ֖י אֶת דְּבָרָֽיִ/ךְ־־׃
translation:
  text: Look, while you are still speaking there with the king, I will come in after
    you and confirm your words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'complete your words' or 'fill out what you say'; the Hebrew idiom can
      mean to add confirming detail to another's statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the plan's timing. 'Look' is natural
    modern English and preserves the immediacy better than the more archaic 'Behold.'
- source_word: עוֹדָךְ
  chosen: while you are still
  alternatives:
  - yet
  - still
  lexicon: HALOT
  rationale: The adverb with 2fs suffix conveys ongoing action at the time Nathan
    will act. In English this is best expressed idiomatically as 'while you are still'
    rather than a wooden 'yet you.'
- source_word: מְדַבֶּרֶת
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: Participle indicating ongoing speech by Bathsheba. 'Speaking' fits the
    courtly setting better than the more casual 'talking.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; retained to reflect the scene in the king's presence.
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - to the king
  - before the king
  lexicon: HALOT
  rationale: עִם normally means 'with.' In context it denotes speaking in the king's
    presence/conversation with him. 'With the king' is sufficiently natural and close
    to the Hebrew.
- source_word: וַאֲנִי אָבוֹא אַחֲרַיִךְ
  chosen: I will come in after you
  alternatives:
  - I will come after you
  - I will enter after you
  lexicon: HALOT
  rationale: The verb בוא in this palace setting likely implies entering the king's
    presence. 'Come in after you' makes the movement into the room explicit in idiomatic
    English without overparaphrasing.
- source_word: וּמִלֵּאתִי
  chosen: confirm
  alternatives:
  - fulfill
  - complete
  - support
  lexicon: HALOT
  rationale: The idiom מלא את־דברי can mean to fill out, complete, or confirm someone's
    words by adding corroboration. Here Nathan intends to substantiate Bathsheba's
    report before David, so 'confirm' best captures the pragmatic sense.
- source_word: אֶת דְּבָרָיִךְ
  chosen: your words
  alternatives:
  - what you say
  - your message
  lexicon: HALOT
  rationale: Literal plural 'your words' is natural in English and preserves the Hebrew
    expression.
