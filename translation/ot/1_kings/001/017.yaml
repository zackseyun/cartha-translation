id: 1KI.1.17
reference: 1 Kings 1:17
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר ל֗/וֹ אֲדֹנִ/י֙ אַתָּ֨ה נִשְׁבַּ֜עְתָּ בַּֽ/יהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לַֽ/אֲמָתֶ֔/ךָ כִּֽי שְׁלֹמֹ֥ה בְנֵ֖/ךְ יִמְלֹ֣ךְ אַחֲרָ֑/י וְ/ה֖וּא יֵשֵׁ֥ב עַל כִּסְאִֽ/י־־׃
translation:
  text: She said to him, “My lord, you swore by Yahweh your God to your female servant, ‘Solomon your son will reign after me, and he will sit on my throne.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to your maidservant.” The Hebrew specifically uses a feminine term for a servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: My lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In direct address to the king, אֲדֹנִי is a respectful title. 'My lord' preserves courtly deference without overstating ownership implied by 'master.'
- source_word: נִשְׁבַּעְתָּ בַּיהוָה אֱלֹהֶיךָ
  chosen: you swore by the LORD your God
  alternatives:
  - you took an oath by the LORD your God
  lexicon: HALOT
  rationale: The Niphal of שׁבע here denotes taking an oath. 'Swore by' is idiomatic and direct. יְהוָה follows the doctrinal default 'the LORD,' and אֱלֹהֶיךָ is retained as 'your God' to preserve the full oath formula.
- source_word: לַאֲמָתֶךָ
  chosen: to your female servant
  alternatives:
  - to your maidservant
  - to your servant
  lexicon: HALOT
  rationale: אָמָה specifically denotes a female servant/slave woman. 'Female servant' is clear modern English and preserves the gendered self-humbling address better than the less transparent 'maidservant.'
- source_word: כִּי
  chosen: Surely
  alternatives:
  - that
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the oath with emphatic force rather than merely a bare complementizer. 'Surely' reflects the solemnity of the sworn promise in natural English.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention.
- source_word: בְנֵךְ
  chosen: your son
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; retained explicitly to preserve the dynastic emphasis.
- source_word: יִמְלֹךְ אַחֲרַי
  chosen: will reign after me
  alternatives:
  - will become king after me
  - will reign in my place
  lexicon: HALOT
  rationale: מלך is best rendered 'reign' here, and אַחֲרַי indicates succession. 'After me' preserves the temporal/dynastic wording more closely than the interpretive 'in my place.'
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי
  chosen: and he will sit on my throne
  alternatives:
  - and he will sit upon my throne
  lexicon: HALOT
  rationale: '''Sit on my throne'' is the standard idiom for royal accession in English and preserves the concrete enthronement imagery.'
