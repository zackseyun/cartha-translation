id: 1KI.1.26
reference: 1 Kings 1:26
source:
  edition: WLC
  text: וְ/לִ֣/י אֲנִֽי עַ֠בְדֶּ/ךָ וּ/לְ/צָדֹ֨ק הַ/כֹּהֵ֜ן וְ/לִ/בְנָיָ֧הוּ בֶן יְהוֹיָדָ֛ע
    וְ/לִ/שְׁלֹמֹ֥ה עַבְדְּ/ךָ֖ לֹ֥א קָרָֽא־־׃
translation:
  text: But me—your servant—and Zadok the priest, and Benaiah son of Jehoiada, and
    Solomon your servant, he did not invite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not call' or 'he has not summoned.' The Hebrew verb can denote
      calling, summoning, or inviting; 'invite' fits the immediate context of Adonijah's
      sacrificial feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִי
  chosen: But me
  alternatives:
  - And me
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus preposition with first-person suffix introduces
    contrast with those previously invited. 'But me' captures the adversative force
    in context better than a simple 'and me.'
- source_word: אֲנִי עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - I, your servant
  lexicon: HALOT
  rationale: 'The independent pronoun plus noun apposition is emphatic: ''me, I your
    servant.'' In natural English, ''your servant'' preserves the deferential court
    language while the emphasis is carried by ''But me—''.'
- source_word: צָדֹק
  chosen: Zadok
  rationale: Personal name transliterated according to project policy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Zadok's office; straightforwardly rendered
    'the priest.'
- source_word: בְנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  rationale: Standard Hebrew patronymic rendered naturally in English without unnecessary
    expansion.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention.
- source_word: עַבְדְּךָ
  chosen: your servant
  lexicon: HALOT
  rationale: Repeated courtly self-designation for Solomon in relation to the king;
    retained consistently.
- source_word: לֹא קָרָא
  chosen: he did not invite
  alternatives:
  - he did not call
  - he has not summoned
  lexicon: HALOT
  rationale: קרא with persons as object in banquet/ceremonial context means to call
    or invite. 'Invite' best fits the feast-and-coronation setting and is idiomatic
    in English.
