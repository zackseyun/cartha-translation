id: 1KI.1.22
reference: 1 Kings 1:22
source:
  edition: WLC
  text: וְ/הִנֵּ֛ה עוֹדֶ֥/נָּה מְדַבֶּ֖רֶת עִם הַ/מֶּ֑לֶךְ וְ/נָתָ֥ן הַ/נָּבִ֖יא בָּֽא־׃
translation:
  text: And look, while she was still speaking with the king, Nathan the prophet came
    in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold'; the Hebrew discourse marker draws attention to the sudden development
      of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a new development.
    'And look' preserves the immediacy in readable modern English better than the
    more archaic 'behold.'
- source_word: עוֹדֶנָּה
  chosen: while she was still
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'With the following participle, the adverb plus pronominal suffix indicates
    continued action by the feminine subject: Bathsheba was still in the act of speaking.
    Rendering it with ''while she was still'' makes the temporal overlap explicit
    in natural English.'
- source_word: מְדַבֶּרֶת
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: The participle denotes ongoing action. 'Speaking' fits the courtly setting
    better than the more casual 'talking' and works naturally with 'was still.'
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - to the king
  - before the king
  lexicon: HALOT
  rationale: עִם normally means 'with.' Although English might idiomatically say 'speaking
    to the king,' the Hebrew preposition supports 'with,' which also suggests direct
    audience and interaction.
- source_word: וְנָתָן
  chosen: Nathan
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Appositional title identifying Nathan's role. 'The prophet' is the straightforward
    and contextually appropriate rendering.
- source_word: בָּא
  chosen: came in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb means 'came/entered.' In this palace-audience context, 'came
    in' best conveys arrival into the room or royal presence without overformalizing
    as 'entered.'
