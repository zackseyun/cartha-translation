id: 1KI.1.48
reference: 1 Kings 1:48
source:
  edition: WLC
  text: וְ/גַם כָּ֖כָה אָמַ֣ר הַ/מֶּ֑לֶךְ בָּר֨וּךְ יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל אֲשֶׁ֨ר
    נָתַ֥ן הַ/יּ֛וֹם יֹשֵׁ֥ב עַל כִּסְאִ֖/י וְ/עֵינַ֥/י רֹאֽוֹת־־׃
translation:
  text: 'And the king also said this: ‘Blessed be the LORD, the God of Israel, who
    today has given one to sit on my throne while my own eyes see it.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who today has given one sitting on my throne, and my eyes are seeing.'
      The Hebrew leaves the object of 'see' unstated; English supplies 'it' from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם כָּכָה
  chosen: And ... also ... this
  alternatives:
  - And moreover, thus
  - And also, thus
  lexicon: HALOT
  rationale: The combination introduces an additional report of what the king said,
    with כָּכָה pointing forward to the quoted words. In natural English, 'And the
    king also said this' preserves both additive force and deictic function better
    than a wooden 'And also thus said.'
- source_word: אָמַר הַמֶּלֶךְ
  chosen: the king ... said
  alternatives:
  - the king said
  - said the king
  lexicon: HALOT
  rationale: Standard narrative speech introduction. English word order is adjusted
    for readability while preserving the simple past sense.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: In blessing formulae, English idiom commonly uses 'Blessed be.' This
    preserves the doxological tone without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: This is the standard construct expression and is best rendered transparently
    in English.
- source_word: אֲשֶׁר נָתַן
  chosen: who ... has given
  alternatives:
  - who gave
  - who has appointed
  lexicon: HALOT
  rationale: The relative clause explains the reason for the blessing. Present perfect
    English ('has given') fits the immediate present relevance of the completed action.
    'Given' is preferred over 'appointed' because the Hebrew verb is the common נתן,
    and the context already specifies the result.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English and preserves the temporal emphasis.'
- source_word: יֹשֵׁב
  chosen: one to sit
  alternatives:
  - a sitter
  - someone sitting
  - one sitting
  lexicon: HALOT
  rationale: The participle functions substantivally for the person placed on the
    throne. 'One to sit' communicates the appointment/result sense in idiomatic English
    without adding a proper name not present in this verse.
- source_word: עַל כִּסְאִי
  chosen: on my throne
  alternatives:
  - upon my throne
  - on my seat of rule
  lexicon: HALOT
  rationale: '''Throne'' is the normal royal sense of כִּסֵּא here.'
- source_word: וְעֵינַי רֹאוֹת
  chosen: while my own eyes see it
  alternatives:
  - and my eyes are seeing
  - and my eyes see
  - while my eyes look on
  lexicon: HALOT
  rationale: The clause expresses David's personal witnessing of the event. 'While
    my own eyes see it' preserves the vividness and the emphatic first-person suffix.
    'It' is supplied in English because the object is implicit from context.
