id: 1KI.1.24
reference: 1 Kings 1:24
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ נָתָן֒ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ אַתָּ֣ה אָמַ֔רְתָּ אֲדֹנִיָּ֖הוּ
    יִמְלֹ֣ךְ אַחֲרָ֑/י וְ/ה֖וּא יֵשֵׁ֥ב עַל כִּסְאִֽ/י־׃
translation:
  text: Then Nathan said, “My lord the king, have you said, ‘Adonijah will reign after
    me, and he will sit on my throne’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “did you say.” The Hebrew perfect in this question can be represented
      in English either as present perfect or simple past.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'And' is possible but less idiomatic
    here.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: My lord the king
  alternatives:
  - My lord, O king
  - My lord king
  lexicon: HALOT
  rationale: This is a courtly form of address to David. 'My lord the king' preserves
    both the possessive honorific and the royal title in natural English.
- source_word: אַתָּה אָמַרְתָּ
  chosen: have you said
  alternatives:
  - you have said
  - did you say
  lexicon: HALOT
  rationale: Although formally a perfect, in this interrogative context Nathan is
    asking whether David has in fact issued such an order. English present perfect
    communicates that force well; 'did you say' is also possible.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: יִמְלֹךְ
  chosen: will reign
  alternatives:
  - will become king
  - will rule
  lexicon: HALOT
  rationale: The verb means 'reign/be king.' 'Will reign' is a direct and natural
    rendering in the succession context.
- source_word: אַחֲרַי
  chosen: after me
  alternatives:
  - after I am gone
  - after me as successor
  lexicon: HALOT
  rationale: The prepositional phrase straightforwardly indicates succession. 'After
    me' preserves the concise Hebrew sense without over-interpreting.
- source_word: יֵשֵׁב עַל כִּסְאִי
  chosen: he will sit on my throne
  alternatives:
  - he will sit upon my throne
  lexicon: HALOT
  rationale: This is standard royal succession language. 'Sit on my throne' is idiomatic
    modern English and preserves the image and political meaning.
