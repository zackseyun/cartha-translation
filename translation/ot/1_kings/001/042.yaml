id: 1KI.1.42
reference: 1 Kings 1:42
source:
  edition: WLC
  text: עוֹדֶ֣/נּוּ מְדַבֵּ֔ר וְ/הִנֵּ֧ה יוֹנָתָ֛ן בֶּן אֶבְיָתָ֥ר הַ/כֹּהֵ֖ן בָּ֑א
    וַ/יֹּ֤אמֶר אֲדֹנִיָּ֨הוּ֙ בֹּ֔א כִּ֣י אִ֥ישׁ חַ֛יִל אַ֖תָּה וְ/ט֥וֹב תְּבַשֵּֽׂר־׃
translation:
  text: While he was still speaking, behold, Jonathan son of Abiathar the priest came.
    And Adonijah said, “Come in, for you are a worthy man and bring good news.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a valiant man'' / ''a capable man'' for ''a worthy man'' (Hebrew:
      אִישׁ חַיִל). The phrase can denote valor, competence, or social standing depending
      on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶנּוּ מְדַבֵּר
  chosen: While he was still speaking
  alternatives:
  - While he was yet speaking
  - As he was still speaking
  lexicon: HALOT
  rationale: The idiom combines עוֹדֶנּוּ ('still/yet he') with the participle מְדַבֵּר
    ('speaking') to indicate ongoing action at the moment another event occurs. 'While
    he was still speaking' is natural modern English and preserves the temporal force.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a sudden or notable
    development. 'Behold' preserves the vividness and abruptness better than omitting
    it, though it is somewhat elevated; here it remains readable and faithful.
- source_word: יוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן אֶבְיָתָר הַכֹּהֵן
  chosen: son of Abiathar the priest
  alternatives:
  - the priest Abiathar's son
  lexicon: HALOT
  rationale: A straightforward construct chain with apposition/title. 'The priest'
    most naturally modifies Abiathar, not Jonathan, in this genealogical identification.
- source_word: בָּא
  chosen: came
  alternatives:
  - was coming
  - arrived
  lexicon: HALOT
  rationale: The qatal after הִנֵּה reports the event simply and vividly. 'Came' is
    the most direct narrative rendering.
- source_word: בֹּא
  chosen: Come in
  alternatives:
  - Come
  - Enter
  lexicon: HALOT
  rationale: The imperative invites Jonathan into the gathering. In English, 'Come
    in' best fits the situational sense of admission into a place.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the invitation. 'For' is concise and fits direct
    speech naturally.
- source_word: אִישׁ חַיִל
  chosen: a worthy man
  alternatives:
  - a valiant man
  - a man of standing
  - a capable man
  lexicon: HALOT
  rationale: אִישׁ חַיִל can denote valor, capability, wealth, or social standing
    depending on context. Here Adonijah expects Jonathan to be a reliable and respectable
    bearer of important news, not displaying military valor. 'A worthy man' captures
    character and status without over-specifying.
- source_word: וְטוֹב תְּבַשֵּׂר
  chosen: and bring good news
  alternatives:
  - and you bear good news
  - and you are bringing good news
  lexicon: HALOT
  rationale: The adjective טוֹב with the Piel verb בשר expresses the expectation that
    Jonathan comes as a bearer of favorable news. English idiom prefers 'bring good
    news' over a more wooden 'bear good news.'
