id: 1KI.1.53
reference: 1 Kings 1:53
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה וַ/יֹּרִדֻ֨/הוּ֙ מֵ/עַ֣ל הַ/מִּזְבֵּ֔חַ
    וַ/יָּבֹ֕א וַ/יִּשְׁתַּ֖חוּ לַ/מֶּ֣לֶךְ שְׁלֹמֹ֑ה וַ/יֹּֽאמֶר ל֥/וֹ שְׁלֹמֹ֖ה
    לֵ֥ךְ לְ/בֵיתֶֽ/ךָ־׃פ
translation:
  text: Then King Solomon sent, and they brought him down from the altar. And he came
    and bowed down to King Solomon, and Solomon said to him, “Go to your house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they led him down from upon the altar.” The Hebrew more literally reads
      “they caused him to come down from upon the altar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol sequence is straightforwardly 'sent.'
    English does not require an explicit object such as 'word'; the following clause
    supplies the effect of the sending.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: Constructing the title and name as 'King Solomon' is natural English
    and preserves the appositional force of the Hebrew.
- source_word: וַיֹּרִדֻהוּ
  chosen: they brought him down
  alternatives:
  - they led him down
  - they took him down
  lexicon: HALOT
  rationale: 'The Hophal form of ירד with 3mp subject and 3ms object indicates causative
    passive sense in context: unnamed agents caused Adonijah to come down. ''Brought
    him down'' is idiomatic and fits removal from a place of refuge.'
- source_word: מֵעַל הַמִּזְבֵּחַ
  chosen: from the altar
  alternatives:
  - from upon the altar
  - from beside the altar
  lexicon: HALOT
  rationale: מֵעַל is literally 'from upon/off of.' Since the prior context has Adonijah
    holding the horns of the altar, 'from the altar' is the most natural concise rendering
    in English while preserving the location.
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - he went in
  - he entered
  lexicon: HALOT
  rationale: בוא is the common verb 'come/enter.' 'He came' preserves the narrative
    flow without over-specifying destination.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה denotes an act of bowing/prostration.
    'Bowed down' is readable modern English and leaves open whether the gesture is
    full prostration or formal obeisance.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - before King Solomon
  lexicon: HALOT
  rationale: The preposition ל here marks the one before whom homage is made. 'To
    King Solomon' is a direct rendering; 'before' is possible but less formally aligned
    with the Hebrew preposition.
- source_word: וַיֹּאמֶר לוֹ שְׁלֹמֹה
  chosen: and Solomon said to him
  alternatives:
  - and King Solomon said to him
  lexicon: HALOT
  rationale: Repeating the proper name matches the Hebrew and keeps the subject clear.
    Omitting the title here avoids unnecessary stiffness in English while preserving
    clarity.
- source_word: לֵךְ לְבֵיתֶךָ
  chosen: Go to your house
  alternatives:
  - Go home
  - Go to your own house
  lexicon: HALOT
  rationale: This is a direct imperative plus destination phrase. 'Go to your house'
    preserves the formal tone of royal dismissal better than the more idiomatic 'Go
    home.'
