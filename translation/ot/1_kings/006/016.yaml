id: 1KI.6.16
reference: 1 Kings 6:16
source:
  edition: WLC
  text: וַ/יִּבֶן֩ אֶת עֶשְׂרִ֨ים אַמָּ֜ה מ/ירכותי הַ/בַּ֨יִת֙ בְּ/צַלְע֣וֹת אֲרָזִ֔ים
    מִן הַ/קַּרְקַ֖ע עַד הַ/קִּיר֑וֹת וַ/יִּ֤בֶן ל/וֹ֙ מִ/בַּ֣יִת לִ/דְבִ֔יר לְ/קֹ֖דֶשׁ
    הַ/קֳּדָשִֽׁים־־־׃
translation:
  text: He built twenty cubits at the rear of the house with cedar boards, from the
    floor to the walls, and he built it within as an inner sanctuary, as the Most
    Holy Place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the floor to the beams/rafters'; the Hebrew text reads 'to the
      walls,' which is retained here.
    reason: alternative_reading
  - marker: b
    text: Hebrew debir, the inner sanctuary of the temple.
    reason: cultural_note
  - marker: c
    text: 'Traditional rendering: ''the Holy of Holies.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִירְכְּתֵי הַבַּיִת
  chosen: at the rear of the house
  alternatives:
  - from the back part of the house
  - at the far end of the house
  lexicon: HALOT
  rationale: The construct with יַרְכָּה/יַרְכְּתַיִם refers to the remote or rear
    part of a structure. 'At the rear of the house' is natural English and preserves
    the spatial sense better than a wooden 'from the sides/back parts.'
- source_word: בְּצַלְעוֹת אֲרָזִים
  chosen: with cedar boards
  alternatives:
  - with cedar ribs
  - with cedar planks
  - with cedar side-structures
  lexicon: HALOT
  rationale: צֵלָעוֹת literally can denote side structures, ribs, or planks/boards
    depending on architectural context. Here it describes the cedar construction partitioning
    the inner room, so 'cedar boards' communicates the building material and function
    clearly in idiomatic English.
- source_word: מִן הַקַּרְקַע עַד הַקִּירוֹת
  chosen: from the floor to the walls
  alternatives:
  - from the floor to the rafters
  - from the floor to the beams
  - from the ground to the walls
  lexicon: HALOT
  rationale: The MT reads 'to the walls.' Some versions emend or interpret toward
    'beams/ceiling,' likely from contextual expectation, but the consonantal text
    supports קִירוֹת 'walls.' The translation keeps the MT in the main text and preserves
    the common alternative in a footnote because the phrase is architecturally difficult.
- source_word: וַיִּבֶן לוֹ מִבַּיִת
  chosen: and he built it within
  alternatives:
  - and he built for it an interior room
  - and he built for himself inside
  - and he built within the house
  lexicon: HALOT
  rationale: The idiom is compressed. The sense is that he constructed an interior
    space within the house. 'Built it within' is concise and fits the following apposition
    naming that space.
- source_word: לִדְבִיר
  chosen: as an inner sanctuary
  alternatives:
  - for the inner sanctuary
  - for the debir
  - for the inner room
  lexicon: HALOT
  rationale: דְּבִיר is the technical term for the inner shrine/innermost room of
    the temple. 'Inner sanctuary' translates the function rather than transliterating
    an unfamiliar Hebrew architectural term.
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  chosen: as the Most Holy Place
  alternatives:
  - for the Holy of Holies
  - as a most holy place
  lexicon: HALOT
  rationale: This is the standard superlative expression for the innermost sacred
    chamber. 'Most Holy Place' is clear modern English while preserving the cultic
    force. 'Holy of Holies' is preserved as a lexical alternative in a footnote because
    of its familiarity in English tradition.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits (about 30 feet total)
  lexicon: HALOT
  rationale: The source uses the ancient unit cubit. Retaining 'cubits' is more formally
    accurate than converting in the main text; approximate modern measurement is unnecessary
    here.
