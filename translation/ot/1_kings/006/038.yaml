id: 1KI.6.38
reference: 1 Kings 6:38
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָה֩ הָ/אַחַ֨ת עֶשְׂרֵ֜ה בְּ/יֶ֣רַח בּ֗וּל ה֚וּא הַ/חֹ֣דֶשׁ הַ/שְּׁמִינִ֔י
    כָּלָ֣ה הַ/בַּ֔יִת לְ/כָל דְּבָרָ֖י/ו וּ/לְ/כָל משפט/ו וַ/יִּבְנֵ֖/הוּ שֶׁ֥בַע
    שָׁנִֽים־־׃
translation:
  text: And in the eleventh year, in the month of Bul (that is, the eighth month),
    the house was finished in all its parts and according to all its specifications.
    So he built it in seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bul was the older name for the eighth month in the Israelite calendar.
    reason: cultural_note
  - marker: b
    text: Or “according to all its details and all its prescribed plan.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׁנָה הָאַחַת עֶשְׂרֵה
  chosen: in the eleventh year
  alternatives:
  - in year eleven
  - in the one-and-tenth year
  lexicon: HALOT
  rationale: Idiomatic English ordinal rendering of the Hebrew numeral expression;
    preserves the chronological notice without wooden phrasing.
- source_word: בְּיֶרַח בּוּל
  chosen: in the month of Bul
  alternatives:
  - in the moon/month Bul
  lexicon: HALOT
  rationale: יֶרַח is a poetic/older term for 'month'; 'Bul' is a proper month name
    and is transliterated per policy on names.
- source_word: הוּא הַחֹדֶשׁ הַשְּׁמִינִי
  chosen: that is, the eighth month
  alternatives:
  - it was the eighth month
  - which is the eighth month
  lexicon: HALOT
  rationale: The pronoun plus apposition explains the older month name for readers.
    'That is' communicates the explanatory force naturally in English.
- source_word: כָּלָה הַבַּיִת
  chosen: the house was finished
  alternatives:
  - the house was completed
  - the house was brought to completion
  lexicon: HALOT
  rationale: כלה in this context denotes completion of construction. 'House' refers
    specifically to the temple structure in context, but retaining 'house' reflects
    the Hebrew wording.
- source_word: לְכָל דְּבָרָיו
  chosen: in all its parts
  alternatives:
  - according to all its details
  - with respect to all its matters
  lexicon: HALOT
  rationale: דבר here refers not to 'words' but to the constituent details/items of
    the building project. 'In all its parts' is clear modern English and fits the
    construction context.
- source_word: וּלְכָל מִשְׁפָּטוֹ
  chosen: according to all its specifications
  alternatives:
  - according to all its ordinances
  - according to all its prescribed plan
  - according to all its regulations
  lexicon: HALOT
  rationale: מִשְׁפָּט in architectural/building context is best understood as prescribed
    procedure, rule, or specification rather than legal 'judgment.' 'Specifications'
    communicates the sense for modern readers.
- source_word: וַיִּבְנֵהוּ
  chosen: So he built it
  alternatives:
  - and he built it
  - thus he built it
  lexicon: HALOT
  rationale: The waw-consecutive resumes and sums up the building duration. 'So' gives
    the resultative/summative force in English.
- source_word: שֶׁבַע שָׁנִים
  chosen: in seven years
  alternatives:
  - for seven years
  - seven years
  lexicon: HALOT
  rationale: English idiom for duration of completed construction is 'in seven years.'
    This captures the total time taken.
