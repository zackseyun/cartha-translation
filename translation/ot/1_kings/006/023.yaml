id: 1KI.6.23
reference: 1 Kings 6:23
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ בַּ/דְּבִ֔יר שְׁנֵ֥י כְרוּבִ֖ים עֲצֵי שָׁ֑מֶן עֶ֥שֶׂר אַמּ֖וֹת
    קוֹמָתֽ/וֹ־׃
translation:
  text: In the inner sanctuary he made two cherubim of olivewood, each ten cubits
    high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'its height was ten cubits'; the singular is understood
      distributively, referring to each of the two cherubim.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the Most Holy Place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדְּבִיר
  chosen: in the inner sanctuary
  alternatives:
  - in the inner room
  - in the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר refers to the inner chamber of the temple, the innermost sanctuary.
    'Inner sanctuary' is clear modern English and avoids importing later technical
    phrasing too strongly, while still reflecting the temple setting.
- source_word: כְרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: The Hebrew plural כְרוּבִים is conventionally carried into English as
    'cherubim.' This preserves the specific biblical creature term better than the
    more colloquial 'cherubs.'
- source_word: עֲצֵי שָׁמֶן
  chosen: of olivewood
  alternatives:
  - of olive wood
  - of oil-tree wood
  lexicon: HALOT
  rationale: The phrase literally denotes wood from the olive tree. 'Olivewood' is
    natural English and accurately conveys the material.
- source_word: עֶשֶׂר אַמּוֹת
  chosen: ten cubits
  alternatives:
  - ten amots
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient cubit measure. 'Cubits' is the established
    and accurate English equivalent.
- source_word: קוֹמָתוֹ
  chosen: each ten cubits high
  alternatives:
  - its height was ten cubits
  - the height of one was ten cubits
  lexicon: HALOT
  rationale: The singular suffix literally reads 'its height,' though the verse speaks
    of two cherubim. In context the singular is distributive, referring to the height
    of each cherub. Rendering it as 'each ten cubits high' communicates the intended
    sense in idiomatic English.
- source_word: וַיַּעַשׂ
  chosen: he made
  alternatives:
  - he fashioned
  lexicon: HALOT
  rationale: עשה is the common verb 'make/do.' 'He made' is the most straightforward
    rendering here.
