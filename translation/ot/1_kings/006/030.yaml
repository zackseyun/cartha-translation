id: 1KI.6.30
reference: 1 Kings 6:30
source:
  edition: WLC
  text: וְ/אֶת קַרְקַ֥ע הַ/בַּ֖יִת צִפָּ֣ה זָהָ֑ב לִ/פְנִ֖ימָה וְ/לַ/חִיצֽוֹן־׃
translation:
  text: He overlaid the floor of the house with gold, on the inside and on the outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the floor of the temple.' Hebrew literally, 'the floor of the house.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'on the inside and on the outside' likely describes the floor
      as gold-covered throughout, from the inner part to the outer part.
    reason: cultural_note
lexical_decisions:
- source_word: קַרְקַע
  chosen: floor
  alternatives:
  - ground
  - pavement
  lexicon: HALOT
  rationale: In the temple-building context, קַרְקַע refers to the floor surface of
    the structure rather than generic ground. 'Floor' is the most natural architectural
    rendering in modern English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew uses 'the house' here, the standard designation in this context
    for the temple structure. The main text preserves the source wording rather than
    substituting the interpretive gloss 'temple.'
- source_word: צִפָּה
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb denotes overlaying or plating a surface with a material. 'Overlaid'
    best matches the construction details being described and is idiomatic in English
    for this kind of workmanship.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; no contextual reason to vary from the
    standard rendering 'gold.'
- source_word: לִפְנִימָה
  chosen: on the inside
  alternatives:
  - inward
  - within
  lexicon: HALOT
  rationale: The adverb/prepositional form indicates the inner side or interior extent.
    'On the inside' is clear modern English and fits the paired contrast with the
    following term.
- source_word: וְלַחִיצוֹן
  chosen: and on the outside
  alternatives:
  - and outward
  - and on the exterior
  lexicon: HALOT
  rationale: This term contrasts with 'inside' and denotes the outer side/exterior.
    'On the outside' preserves the spatial contrast in accessible English. Because
    the phrase is somewhat terse in Hebrew, this rendering communicates the likely
    sense without over-paraphrasing.
