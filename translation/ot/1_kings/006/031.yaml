id: 1KI.6.31
reference: 1 Kings 6:31
source:
  edition: WLC
  text: וְ/אֵת֙ פֶּ֣תַח הַ/דְּבִ֔יר עָשָׂ֖ה דַּלְת֣וֹת עֲצֵי שָׁ֑מֶן הָ/אַ֥יִל מְזוּז֖וֹת
    חֲמִשִֽׁית־׃
translation:
  text: For the entrance of the inner sanctuary he made doors of olivewood; the doorposts
    and jambs were five-sided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the frame and the doorposts were a fifth part,' a traditional but architecturally
      obscure rendering of the final phrase.
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - opening
  - doorway
  lexicon: HALOT
  rationale: פֶּתַח denotes the opening/entryway rather than the door leaves themselves.
    'Entrance' fits the architectural context and distinguishes it from the following
    דַּלְתּוֹת ('doors').
- source_word: הַדְּבִיר
  chosen: the inner sanctuary
  alternatives:
  - the inner room
  - the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר in temple contexts refers to the innermost chamber. 'Inner sanctuary'
    is clear modern English and avoids importing later liturgical terminology too
    strongly, while still conveying the sacred inner room.
- source_word: דַּלְתּוֹת
  chosen: doors
  alternatives:
  - door leaves
  lexicon: HALOT
  rationale: Plural 'doors' is the natural English rendering for the paired door panels.
    'Door leaves' is more technical but less readable.
- source_word: עֲצֵי שָׁמֶן
  chosen: olivewood
  alternatives:
  - wood of olive trees
  - olive wood
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods/wood of oil,' idiomatically
    olivewood. The compound form is idiomatic English for the material.
- source_word: הָאַיִל
  chosen: the doorposts
  alternatives:
  - the frame
  - the lintel/frame
  lexicon: HALOT
  rationale: In architectural usage אַיִל can denote a doorframe component or supporting
    structure. Here, paired with מְזוּזוֹת, it is best taken collectively for the
    main doorposts/frame elements.
- source_word: מְזוּזוֹת
  chosen: jambs
  alternatives:
  - doorposts
  - side posts
  lexicon: HALOT
  rationale: מְזוּזוֹת commonly refers to doorposts. Since הָאַיִל already covers
    the broader frame/post structure in this clause, 'jambs' helps preserve the distinction
    between the two architectural terms without collapsing them into one English gloss.
- source_word: חֲמִשִׁית
  chosen: were five-sided
  alternatives:
  - formed a pentagon
  - were a fifth part
  lexicon: HALOT
  rationale: The Hebrew is terse and architecturally elliptical. In this context it
    most likely describes the shape/proportion of the doorway structure. 'Were five-sided'
    communicates the likely sense in readable English. The traditional alternative
    'was a fifth part' is possible but obscure and depends on supplying more than
    the text states.
