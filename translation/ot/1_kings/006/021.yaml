id: 1KI.6.21
reference: 1 Kings 6:21
source:
  edition: WLC
  text: וַ/יְצַ֨ף שְׁלֹמֹ֧ה אֶת הַ/בַּ֛יִת מִ/פְּנִ֖ימָה זָהָ֣ב סָג֑וּר וַ/יְעַבֵּ֞ר
    ב/רתיקות זָהָב֙ לִ/פְנֵ֣י הַ/דְּבִ֔יר וַ/יְצַפֵּ֖/הוּ זָהָֽב־׃
translation:
  text: Solomon overlaid the inside of the house with pure gold, and he drew gold
    chains across the front of the inner sanctuary, and overlaid it with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refined gold.' The Hebrew phrase literally reads 'gold, closed/shut,'
      an idiom for high-quality gold.
    reason: lexical_alternative
  - marker: b
    text: Or 'before the inner sanctuary.' The Hebrew may describe gold chains placed
      in front of the inner sanctuary; 'across the front of' reflects the likely sense
      with the verb 'caused to pass.'
    reason: alternative_reading
  - marker: c
    text: '''Inner sanctuary'' refers to the debir, the innermost room of the temple,
      later called the Most Holy Place.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַף
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this temple-building context refers to covering a surface
    with a material layer, especially metal. 'Overlaid' is standard, precise English
    for architectural metal covering and fits the repeated use in this passage.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew literally says 'the house.' In the immediate context this refers
    to the temple structure, but retaining 'house' preserves the source wording and
    its established usage in Kings for the temple.
- source_word: מִפְּנִימָה
  chosen: the inside of
  alternatives:
  - within
  - inside
  lexicon: HALOT
  rationale: The adverbial form indicates the interior aspect of the house. 'The inside
    of' gives clear modern English while preserving the spatial sense.
- source_word: זָהָב סָגוּר
  chosen: pure gold
  alternatives:
  - refined gold
  - shut-up gold
  lexicon: HALOT
  rationale: The phrase denotes high-quality refined gold. 'Pure gold' is idiomatic
    and communicates the likely sense better than a wooden rendering of סגור.
- source_word: וַיְעַבֵּר
  chosen: he drew
  alternatives:
  - he caused to pass
  - he put in place
  - he ran
  lexicon: HALOT
  rationale: The verb עבר literally means 'to pass over/across.' With the following
    object and location, it describes extending or running the chains across the front.
    'Drew' is concise and natural in English for stretching chains across a space.
- source_word: בְּרַתּוּקוֹת
  chosen: chains
  alternatives:
  - bars
  - fetters
  - linked chains
  lexicon: HALOT
  rationale: The noun is rare and contextually refers to something made of gold placed
    before the inner sanctuary. 'Chains' is the most widely supported and contextually
    fitting rendering, likely decorative or partition-related.
- source_word: לִפְנֵי הַדְּבִיר
  chosen: across the front of the inner sanctuary
  alternatives:
  - before the inner sanctuary
  - in front of the inner sanctuary
  lexicon: HALOT
  rationale: דְּבִיר refers to the inner sanctuary/Most Holy Place. Because the verb
    suggests extending the chains across, 'across the front of' captures both the
    locative phrase and the likely arrangement.
- source_word: הַדְּבִיר
  chosen: the inner sanctuary
  alternatives:
  - the inner room
  - the Most Holy Place
  - the sanctuary
  lexicon: HALOT
  rationale: Debir is the inner chamber of the temple. 'Inner sanctuary' is accurate
    and understandable without importing later technical terminology into the main
    text.
- source_word: וַיְצַפֵּהוּ
  chosen: overlaid it
  alternatives:
  - covered it
  - plated it
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the inner sanctuary area just
    mentioned, or possibly the front/partition associated with it. 'Overlaid it' preserves
    the Hebrew's singular object without over-specifying beyond the text.
