id: 1KI.6.10
reference: 1 Kings 6:10
source:
  edition: WLC
  text: וַ/יִּ֤בֶן אֶת ה/יצוע עַל כָּל הַ/בַּ֔יִת חָמֵ֥שׁ אַמּ֖וֹת קֽוֹמָת֑/וֹ וַ/יֶּאֱחֹ֥ז
    אֶת הַ/בַּ֖יִת בַּ/עֲצֵ֥י אֲרָזִֽים־־־־׃פ
translation:
  text: He built the side structure against the whole house, five cubits high, and
    it was fastened to the house with cedar timbers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the side chambers”; the Hebrew term likely refers to the attached side
      construction running along the temple.
    reason: lexical_alternative
  - marker: b
    text: Or “was joined to the house with cedar beams.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Wayyiqtol of בנה, standard narrative past. English omits the conjunction
    for natural style while preserving sequential action.
- source_word: היצוע
  chosen: the side structure
  alternatives:
  - the side chambers
  - the platform
  - the annex
  lexicon: HALOT
  rationale: The noun refers to the surrounding side construction attached to the
    temple building. 'Side structure' is broad enough to cover the architectural unit
    without overcommitting to individual rooms, while fitting the immediate context
    of attached stories/chambers in this chapter.
- source_word: עַל כָּל הַבַּיִת
  chosen: against the whole house
  alternatives:
  - upon all the house
  - all around the house
  - along the whole house
  lexicon: HALOT
  rationale: עַל here is spatial, indicating attachment alongside/against the temple
    building. 'Whole house' preserves כָּל while avoiding an interpretive expansion
    beyond the Hebrew.
- source_word: חָמֵשׁ אַמּוֹת קֹמָתוֹ
  chosen: five cubits high
  alternatives:
  - its height was five cubits
  - five cubits was its height
  lexicon: HALOT
  rationale: A natural English rendering of the measurement phrase. The pronominal
    suffix on 'height' refers to the side structure, expressed idiomatically as 'five
    cubits high.'
- source_word: וַיֶּאֱחֹז
  chosen: it was fastened
  alternatives:
  - it was joined
  - it took hold of
  - it gripped
  lexicon: HALOT
  rationale: The verb אחז literally means 'grasp/hold,' but in this building context
    it describes structural attachment. Passive English best conveys the architectural
    sense without implying agency beyond the construction.
- source_word: אֶת הַבַּיִת
  chosen: to the house
  alternatives:
  - the house
  lexicon: HALOT
  rationale: 'With the preceding verb in context, English idiom requires the relational
    sense of attachment: the side structure was fastened ''to the house.'''
- source_word: בַּעֲצֵי אֲרָזִים
  chosen: with cedar timbers
  alternatives:
  - with cedar beams
  - by cedar wood
  - with cedar boards
  lexicon: HALOT
  rationale: עֲצֵי literally 'woods/timbers of.' In construction context, 'cedar timbers'
    is a clear modern rendering that reflects structural wood elements without narrowing
    too specifically to planks or paneling.
