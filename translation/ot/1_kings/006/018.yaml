id: 1KI.6.18
reference: 1 Kings 6:18
source:
  edition: WLC
  text: וְ/אֶ֤רֶז אֶל הַ/בַּ֨יִת֙ פְּנִ֔ימָה מִקְלַ֣עַת פְּקָעִ֔ים וּ/פְטוּרֵ֖י צִצִּ֑ים
    הַ/כֹּ֣ל אֶ֔רֶז אֵ֥ין אֶ֖בֶן נִרְאָֽה־׃
translation:
  text: The cedar on the inside of the house was carved with gourds and open flowers.
    Everything was cedar; no stone was visible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'buds' for 'gourds'; the Hebrew term refers to rounded ornamental forms
      and may denote gourd-shaped carvings in this temple context.
    reason: lexical_alternative
  - marker: b
    text: Or 'flower blossoms' for 'open flowers.' The Hebrew likely describes carved
      floral blooms.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶז
  chosen: cedar
  alternatives:
  - cedar wood
  lexicon: HALOT
  rationale: The noun denotes cedar timber/paneling. 'Cedar' is natural English here
    and covers the material used for the interior lining.
- source_word: אֶל־הַבַּיִת פְּנִימָה
  chosen: on the inside of the house
  alternatives:
  - inside the house
  - toward the interior of the house
  lexicon: HALOT
  rationale: The phrase locates the cedar work in the inner surface/interior of the
    temple structure. 'On the inside of the house' makes clear that the cedar is interior
    paneling, not merely cedar located indoors.
- source_word: מִקְלַעַת
  chosen: carved with
  alternatives:
  - engraved with
  - ornamented with
  lexicon: HALOT
  rationale: The term refers to carved or engraved decorative work. 'Carved with'
    is idiomatic in English for architectural ornamentation.
- source_word: פְּקָעִים
  chosen: gourds
  alternatives:
  - buds
  - knops
  - gourd-shaped ornaments
  lexicon: HALOT
  rationale: In temple-description contexts this word commonly refers to gourd-like
    decorative forms. 'Gourds' is clearer and more source-near than the archaic 'knops';
    'buds' is possible but less likely here given the paired floral imagery.
- source_word: וּפְטוּרֵי צִצִּים
  chosen: and open flowers
  alternatives:
  - and flower blossoms
  - and unfolding blooms
  lexicon: HALOT
  rationale: The construction denotes floral ornamentation, likely carved blossoms
    in relief. 'Open flowers' captures the sense of blossoming forms in readable modern
    English.
- source_word: הַכֹּל אֶרֶז
  chosen: Everything was cedar
  alternatives:
  - All of it was cedar
  - The whole thing was cedar
  lexicon: HALOT
  rationale: This summarizes that the visible interior surface was entirely cedar-covered.
    'Everything was cedar' is concise and natural.
- source_word: אֵין אֶבֶן נִרְאָה
  chosen: no stone was visible
  alternatives:
  - stone was not seen
  - not a stone could be seen
  lexicon: HALOT
  rationale: The clause states that the stone structure was completely concealed by
    the cedar lining. 'No stone was visible' is idiomatic and preserves the passive
    sense.
