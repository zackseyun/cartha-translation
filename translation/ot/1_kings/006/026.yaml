id: 1KI.6.26
reference: 1 Kings 6:26
source:
  edition: WLC
  text: קוֹמַת֙ הַ/כְּר֣וּב הָֽ/אֶחָ֔ד עֶ֖שֶׂר בָּֽ/אַמָּ֑ה וְ/כֵ֖ן הַ/כְּר֥וּב הַ/שֵּׁנִֽי׃
translation:
  text: The height of the one cherub was ten cubits, and so it was with the second
    cherub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A cubit was an ancient unit of length, roughly the distance from the elbow
      to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: קוֹמַת
  chosen: The height of
  alternatives:
  - The stature of
  - The size of
  lexicon: HALOT
  rationale: קוֹמָה denotes height or stature. In the architectural context of temple
    furnishings, 'height' is the most natural and precise English rendering.
- source_word: הַכְּרוּב
  chosen: the cherub
  alternatives:
  - the cherubim figure
  lexicon: HALOT
  rationale: The singular form refers to one individual cherub figure. 'Cherub' is
    standard English for the singular of כְּרוּב and fits the temple context.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - the first
  - one
  lexicon: HALOT
  rationale: The Hebrew says 'the one,' distinguishing this cherub from the other.
    'The first' is interpretive; 'the one' more closely follows the source while remaining
    natural in English.
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten cubits
  alternatives:
  - ten cubits high
  - ten cubits in height
  lexicon: HALOT
  rationale: The phrase gives the measurement directly. Since 'height' is already
    supplied by קוֹמַת, 'ten cubits' is sufficient and avoids redundancy.
- source_word: וְכֵן
  chosen: and so it was with
  alternatives:
  - and likewise was
  - and the same for
  - and so also
  lexicon: HALOT
  rationale: וְכֵן marks equivalence between the two cherubim. 'And so it was with'
    communicates the comparative force clearly in modern English.
- source_word: הַכְּרוּב הַשֵּׁנִי
  chosen: the second cherub
  alternatives:
  - the other cherub
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'the second,' not merely 'the other.' Retaining
    'second' preserves the formal correspondence with 'the one' earlier in the verse.
