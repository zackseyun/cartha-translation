id: 1KI.6.34
reference: 1 Kings 6:34
source:
  edition: WLC
  text: וּ/שְׁתֵּ֥י דַלְת֖וֹת עֲצֵ֣י בְרוֹשִׁ֑ים שְׁנֵ֨י צְלָעִ֜ים הַ/דֶּ֤לֶת הָֽ/אַחַת֙
    גְּלִילִ֔ים וּ/שְׁנֵ֧י קְלָעִ֛ים הַ/דֶּ֥לֶת הַ/שֵּׁנִ֖ית גְּלִילִֽים׃
translation:
  text: and two doors of cypress wood; the one door had two folding leaves, and the
    second door had two folding leaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two side pieces ... revolving'; the Hebrew architectural terms are rare,
      and the sense is commonly understood as folding door leaves.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'fir wood'; the Hebrew בְּרוֹשׁ likely refers to cypress or
      a similar conifer.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַלְתוֹת
  chosen: doors
  alternatives:
  - door leaves
  - panels
  lexicon: HALOT
  rationale: Plural noun referring to the two door structures being described. 'Doors'
    is the most natural English rendering here, while the subsequent singular הַדֶּלֶת
    marks each individual door.
- source_word: עֲצֵי בְרוֹשִׁים
  chosen: of cypress wood
  alternatives:
  - of fir wood
  - of juniper wood
  lexicon: HALOT
  rationale: בְּרוֹשׁ is traditionally rendered 'fir,' but in modern scholarship 'cypress'
    is often preferred for the timber in temple-building contexts. 'Of cypress wood'
    is clear modern English and reflects the construct phrase 'woods of cypress' idiomatically.
- source_word: צְלָעִים
  chosen: folding leaves
  alternatives:
  - side pieces
  - panels
  - leaves
  lexicon: HALOT
  rationale: Though צֵלָע often means 'side' or 'rib,' in this architectural context
    it refers to the sections of a folding door. 'Folding leaves' best captures the
    functional sense in English.
- source_word: גְּלִילִים
  chosen: had two folding leaves
  alternatives:
  - turning
  - revolving
  - folding
  lexicon: HALOT
  rationale: The term suggests something rolled, turning, or folding. In context of
    temple doors, the sense is that each door consisted of movable folding sections.
    Rendering the clause idiomatically as 'had two folding leaves' communicates the
    architectural function better than a wooden 'were revolving.'
- source_word: קְלָעִים
  chosen: folding leaves
  alternatives:
  - folds
  - panels
  lexicon: HALOT
  rationale: This noun is rare and contextually parallel to צְלָעִים in the first
    half of the verse. Because both halves describe the same kind of door construction,
    'folding leaves' preserves the parallelism in understandable English.
- source_word: הַדֶּלֶת הָאַחַת
  chosen: the one door
  alternatives:
  - the first door
  - one door
  lexicon: HALOT
  rationale: The phrase identifies the first of the two doors. 'The one door' preserves
    the Hebrew contrast with 'the second door' in the next clause.
- source_word: הַדֶּלֶת הַשֵּׁנִית
  chosen: the second door
  alternatives:
  - the other door
  lexicon: HALOT
  rationale: Straightforward ordinal contrast with the previous clause; 'the second
    door' is the clearest formal-equivalent rendering.
