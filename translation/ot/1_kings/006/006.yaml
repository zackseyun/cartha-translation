id: 1KI.6.6
reference: 1 Kings 6:6
source:
  edition: WLC
  text: ה/יצוע הַ/תַּחְתֹּנָ֜ה חָמֵ֧שׁ בָּ/אַמָּ֣ה רָחְבָּ֗/הּ וְ/הַ/תִּֽיכֹנָה֙ שֵׁ֤שׁ
    בָּֽ/אַמָּה֙ רָחְבָּ֔/הּ וְ/הַ֨/שְּׁלִישִׁ֔ית שֶׁ֥בַע בָּ/אַמָּ֖ה רָחְבָּ֑/הּ
    כִּ֡י מִגְרָעוֹת֩ נָתַ֨ן לַ/בַּ֤יִת סָבִיב֙ ח֔וּצָ/ה לְ/בִלְתִּ֖י אֲחֹ֥ז בְּ/קִֽירוֹת
    הַ/בָּֽיִת־׃
translation:
  text: The lowest story was five cubits wide, the middle one six cubits wide, and
    the third seven cubits wide; for he made offsets around the outside of the temple,
    so that the beams would not be inserted into the walls of the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ledges' or 'recesses' for the architectural feature in the wall.
    reason: lexical_alternative
  - marker: b
    text: Literally 'so as not to take hold in the walls of the house'; the sense
      is that the supporting beams of the side structure were not fastened into the
      temple walls.
    reason: lexical_alternative
lexical_decisions:
- source_word: היצוע
  chosen: story
  alternatives:
  - side chamber structure
  - tier
  lexicon: HALOT
  rationale: In this temple-building context the noun refers to the side structure
    arranged in levels/stories around the house. 'Story' communicates the architectural
    level clearly in modern English. 'Side chamber structure' is more technical but
    too cumbersome for the main text.
- source_word: התחתנה
  chosen: the lowest
  alternatives:
  - the lower
  - the bottom
  lexicon: HALOT
  rationale: Superlative sense fits the sequence lowest/middle/third and the architectural
    description.
- source_word: באמה
  chosen: cubits
  alternatives:
  - in cubits
  lexicon: HALOT
  rationale: The measure is retained rather than converted, preserving the ancient
    unit and formal correspondence.
- source_word: רחבה
  chosen: wide
  alternatives:
  - its width was
  lexicon: HALOT
  rationale: Predicate adjective sense is best rendered idiomatically in English as
    'was ... wide.'
- source_word: התיכנה
  chosen: the middle one
  alternatives:
  - the middle story
  - the second
  lexicon: HALOT
  rationale: The feminine adjective refers back to the architectural level. 'The middle
    one' is natural English and avoids overloading the sentence with repeated nouns
    while preserving the referent.
- source_word: השלישית
  chosen: the third
  alternatives:
  - the third story
  - the upper third
  lexicon: HALOT
  rationale: Ordinal reference to the third level/story in the sequence.
- source_word: כי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the increasing widths of the stories.
- source_word: מגרעות
  chosen: offsets
  alternatives:
  - ledges
  - recesses
  - narrowings
  lexicon: HALOT
  rationale: The term denotes set-backs or rebatements in the wall construction that
    allowed support without penetrating the temple walls. 'Offsets' best captures
    the architectural feature in concise modern English.
- source_word: נתן לבית סביב חוצה
  chosen: he made offsets around the outside of the temple
  alternatives:
  - he put ledges on the outside of the house all around
  - he provided setbacks for the house all around on the outside
  lexicon: HALOT
  rationale: Although literally 'gave to the house around outside,' idiomatic English
    in an architectural context is 'made/provided ... around the outside.' 'Temple'
    clarifies that הבית here is the sanctuary building.
- source_word: לבלתי אחז
  chosen: so that the beams would not be inserted
  alternatives:
  - so that they would not take hold
  - so that they would not be fastened
  - so that no attachment would be made
  lexicon: HALOT
  rationale: 'In context the infinitive expresses purpose: the side structure was
    supported without fastening into the temple walls. ''Beams'' is supplied from
    the architectural context to make explicit what would otherwise be left implicit
    in English.'
- source_word: בקירות הבית
  chosen: into the walls of the temple
  alternatives:
  - in the walls of the house
  lexicon: HALOT
  rationale: '''Temple'' clarifies the referent of הבית in context; ''into'' fits
    the construction of insertion/fastening.'
