id: 1KI.6.3
reference: 1 Kings 6:3
source:
  edition: WLC
  text: וְ/הָ/אוּלָ֗ם עַל פְּנֵי֙ הֵיכַ֣ל הַ/בַּ֔יִת עֶשְׂרִ֣ים אַמָּה֙ אָרְכּ֔/וֹ
    עַל פְּנֵ֖י רֹ֣חַב הַ/בָּ֑יִת עֶ֧שֶׂר בָּ/אַמָּ֛ה רָחְבּ֖/וֹ עַל פְּנֵ֥י הַ/בָּֽיִת־־־׃
translation:
  text: The portico in front of the nave of the house was twenty cubits long, across
    the width of the house, and ten cubits deep in front of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'porch' or 'vestibule' for 'portico.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the nave of the house'; that is, the main hall of the temple building.
    reason: lexical_alternative
  - marker: c
    text: Literally 'its width'; the sense here is the portico's depth extending outward
      in front of the house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאוּלָם
  chosen: the portico
  alternatives:
  - the porch
  - the vestibule
  lexicon: HALOT
  rationale: אוּלָם in temple architecture denotes the entrance structure before the
    main hall. 'Portico' is clear modern English and fits the architectural setting
    better than the more archaic 'porch,' while 'vestibule' may suggest an enclosed
    interior foyer.
- source_word: עַל־פְּנֵי
  chosen: in front of
  alternatives:
  - before
  - facing
  lexicon: HALOT
  rationale: The phrase indicates spatial position/orientation. 'In front of' communicates
    the architectural relation naturally in English.
- source_word: הֵיכַל
  chosen: the nave
  alternatives:
  - the main hall
  - the temple hall
  lexicon: HALOT
  rationale: Here הֵיכַל refers specifically to the main hall of the temple building,
    distinct from the portico and inner sanctuary. 'Nave' is a concise architectural
    term that captures a long main chamber; 'main hall' is possible but less precise.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת is literally 'house' and in this context refers to the temple
    structure. Retaining 'house' preserves the Hebrew wording while remaining intelligible
    in context.
- source_word: עֶשְׂרִים אַמָּה
  chosen: twenty cubits
  alternatives:
  - thirty feet
  lexicon: HALOT
  rationale: The text gives the measurement in cubits. Following optimal equivalence
    with original-language primacy, the ancient unit is retained rather than converted.
- source_word: אָרְכּוֹ
  chosen: long
  alternatives:
  - its length
  lexicon: HALOT
  rationale: English style reads more naturally as a predicate adjective after the
    measurement ('was twenty cubits long'), while preserving the sense of the Hebrew
    noun with pronominal suffix.
- source_word: עַל־פְּנֵי רֹחַב הַבָּיִת
  chosen: across the width of the house
  alternatives:
  - corresponding to the width of the house
  - along the front of the width of the house
  lexicon: HALOT
  rationale: This clause explains that the portico's length matched the house's width
    across its front. 'Across the width of the house' is idiomatic and conveys the
    dimensional relationship.
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten cubits
  alternatives:
  - ten cubits by the cubit
  lexicon: HALOT
  rationale: The prefixed ב here is idiomatic in measurements. The sense is simply
    the dimension 'ten cubits.'
- source_word: רָחְבּוֹ
  chosen: deep
  alternatives:
  - its width
  - broad
  lexicon: HALOT
  rationale: Although the Hebrew noun is 'width,' in relation to a portico situated
    'in front of the house' this dimension is the front-to-back extent. 'Deep' communicates
    the architectural sense more clearly in English than the potentially confusing
    'width.'
- source_word: עַל־פְּנֵי הַבָּיִת
  chosen: in front of the house
  alternatives:
  - before the house
  - facing the house
  lexicon: HALOT
  rationale: This final phrase locates the ten-cubit dimension as projecting outward
    before the house. 'In front of the house' is the clearest rendering.
