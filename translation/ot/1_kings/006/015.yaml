id: 1KI.6.15
reference: 1 Kings 6:15
source:
  edition: WLC
  text: וַ/יִּבֶן֩ אֶת קִיר֨וֹת הַ/בַּ֤יִת מִ/בַּ֨יְתָ/ה֙ בְּ/צַלְע֣וֹת אֲרָזִ֔ים
    מִ/קַּרְקַ֤ע הַ/בַּ֨יִת֙ עַד קִיר֣וֹת הַ/סִּפֻּ֔ן צִפָּ֥ה עֵ֖ץ מִ/בָּ֑יִת וַ/יְצַ֛ף
    אֶת קַרְקַ֥ע הַ/בַּ֖יִת בְּ/צַלְע֥וֹת בְּרוֹשִֽׁים־־־׃
translation:
  text: He built the walls of the house on the inside with cedar boards; from the
    floor of the house to the walls of the ceiling he covered them with wood on the
    inside, and he overlaid the floor of the house with boards of cypress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with cypress planks'; traditionally, 'with fir boards.' The Hebrew tree
      name may refer to a conifer such as cypress or juniper.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'to the walls of the ceiling' likely means up to the interior
      ceiling or roof lining.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from בנה, introducing Solomon's construction
    activity. English omits the conjunction for smoother narrative flow while preserving
    sequence.
- source_word: קִירוֹת הַבַּיִת
  chosen: the walls of the house
  alternatives:
  - the sidewalls of the house
  lexicon: HALOT
  rationale: קִירוֹת is the normal term for walls. 'House' here refers to the temple
    structure in context, but retaining 'house' reflects the Hebrew wording and avoids
    over-specification.
- source_word: מִבַּיְתָה
  chosen: on the inside
  alternatives:
  - within
  - from the inside
  lexicon: HALOT
  rationale: The form indicates the interior direction/location of the paneling work.
    'On the inside' communicates that the walls were lined internally.
- source_word: בְּצַלְעוֹת אֲרָזִים
  chosen: with cedar boards
  alternatives:
  - with cedar planks
  - with cedar ribs
  - with cedar side-chambers
  lexicon: HALOT
  rationale: צַלְעוֹת literally can denote side pieces/ribs/planks. In this construction
    context it refers to wooden boards or planking used to line surfaces. 'Boards'
    is natural English and fits the architectural setting better than the overly literal
    'ribs.'
- source_word: מִקַּרְקַע הַבַּיִת
  chosen: from the floor of the house
  alternatives:
  - from the ground of the house
  lexicon: HALOT
  rationale: קַרְקַע denotes floor or ground surface. In a building interior context,
    'floor' is the appropriate architectural term.
- source_word: עַד קִירוֹת הַסִּפֻּן
  chosen: to the walls of the ceiling
  alternatives:
  - to the ceiling beams
  - to the wall of the roof
  - up to the rafters
  lexicon: HALOT
  rationale: הַסִּפֻּן refers to the covered/roofed upper structure, likely the ceiling
    or roof lining. Because קִירוֹת is repeated, the phrase is somewhat unusual; 'walls
    of the ceiling' preserves the Hebrew structure while conveying the upper interior
    limit of the paneling.
- source_word: צִפָּה עֵץ מִבָּיִת
  chosen: he covered them with wood on the inside
  alternatives:
  - he paneled the inside with wood
  - it was covered with wood within
  lexicon: HALOT
  rationale: צפה in this context means to overlay or cover. The object is implicit
    from the preceding walls. 'Covered them with wood on the inside' makes the implied
    object explicit in idiomatic English while preserving the sense of interior wood
    paneling.
- source_word: וַיְצַף
  chosen: and he overlaid
  alternatives:
  - and he covered
  - and he paneled
  lexicon: HALOT
  rationale: Same root as earlier, but here with the floor as explicit object. 'Overlaid'
    fits the sense of applying a wooden covering to an existing surface.
- source_word: קַרְקַע הַבַּיִת
  chosen: the floor of the house
  alternatives:
  - the pavement of the house
  lexicon: HALOT
  rationale: Again, קַרְקַע in this interior architectural context is best rendered
    'floor.'
- source_word: בְּצַלְעוֹת בְּרוֹשִׁים
  chosen: with boards of cypress
  alternatives:
  - with cypress planks
  - with juniper boards
  - with fir boards
  lexicon: HALOT
  rationale: צַלְעוֹת again denotes boards/planks. בְּרוֹשִׁים is a conifer term traditionally
    rendered 'fir,' but many modern lexicons favor cypress or juniper depending on
    context. 'Cypress' is a common modern rendering in temple-building passages and
    avoids the less certain traditional 'fir.'
