id: 1KI.6.2
reference: 1 Kings 6:2
source:
  edition: WLC
  text: וְ/הַ/בַּ֗יִת אֲשֶׁ֨ר בָּנָ֜ה הַ/מֶּ֤לֶךְ שְׁלֹמֹה֙ לַֽ/יהוָ֔ה שִׁשִּֽׁים
    אַמָּ֥ה אָרְכּ֖/וֹ וְ/עֶשְׂרִ֤ים רָחְבּ֑/וֹ וּ/שְׁלֹשִׁ֥ים אַמָּ֖ה קוֹמָתֽ/וֹ־׃
translation:
  text: Now the house that King Solomon built for the LORD was sixty cubits long,
    twenty wide, and thirty cubits high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the house ...''; the opening conjunction can also be rendered
      ''And'' rather than ''Now.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'its width was twenty cubits'; the Hebrew does not repeat 'cubits' in
      this phrase, but the unit is understood from the context.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַבַּיִת
  chosen: Now the house
  alternatives:
  - And the house
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this temple-building context it refers
    to the temple structure, but 'house' preserves the Hebrew wording and its theological
    resonance ('house' for the LORD's dwelling). The prefixed conjunction is rendered
    'Now' for natural English narrative flow.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause; 'that' is idiomatic
    modern English.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - was building
  - constructed
  lexicon: HALOT
  rationale: Qal perfect 3ms indicates completed action in narrative description;
    'built' is the straightforward rendering.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: Appositional royal title plus proper name is best rendered in standard
    English order as 'King Solomon.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - for Yahweh
  lexicon: HALOT
  rationale: 'The preposition ל here marks dedication/purpose: the house was built
    for the LORD. Per doctrine, יהוה is rendered ''the LORD,'' with ''Yahweh'' preserved
    only as an alternative, not in the main text.'
- source_word: שִׁשִּׁים אַמָּה אָרְכּוֹ
  chosen: sixty cubits long
  alternatives:
  - its length was sixty cubits
  lexicon: HALOT
  rationale: The Hebrew gives number + unit + 'its length.' English commonly compresses
    this to an adjectival measurement phrase while preserving the sense exactly.
- source_word: וְעֶשְׂרִים רָחְבּוֹ
  chosen: twenty wide
  alternatives:
  - twenty cubits wide
  - its width was twenty cubits
  lexicon: HALOT
  rationale: Although אַמָּה is not repeated here, it is understood from the measurement
    sequence. 'Twenty wide' is concise and natural; the unit is implied from the parallel
    measurements. The omitted unit is not supplied in the main text to avoid overtranslation.
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתוֹ
  chosen: thirty cubits high
  alternatives:
  - its height was thirty cubits
  lexicon: HALOT
  rationale: קוֹמָה denotes height. English measurement style naturally renders this
    as 'thirty cubits high.'
