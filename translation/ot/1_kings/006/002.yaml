theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names the covenant God of Israel. Per project doctrine, יהוה
    is rendered 'the LORD' in the main text, following established reverential convention
    and the pattern reflected in many English translations and the LXX's treatment.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
