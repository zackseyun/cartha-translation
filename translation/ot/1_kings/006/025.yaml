id: 1KI.6.25
reference: 1 Kings 6:25
source:
  edition: WLC
  text: וְ/עֶ֨שֶׂר֙ בָּֽ/אַמָּ֔ה הַ/כְּר֖וּב הַ/שֵּׁנִ֑י מִדָּ֥ה אַחַ֛ת וְ/קֶ֥צֶב
    אֶחָ֖ד לִ/שְׁנֵ֥י הַ/כְּרֻבִֽים׃
translation:
  text: And the second cherub was ten cubits; both cherubim had one measure and one
    form.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'both cherubim were of the same measure and proportion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֶשֶׂר בָּאַמָּה
  chosen: was ten cubits
  alternatives:
  - measured ten cubits
  - was ten cubits high
  lexicon: HALOT
  rationale: The phrase literally gives the dimension as 'and ten in the cubit/cubits.'
    In context, continuing the description of the cherubim's size from the previous
    verse, idiomatic English supplies 'was' to express measurement. 'High' is possible
    by contextual inference, but the Hebrew here does not explicitly specify height,
    so the more neutral 'was ten cubits' best preserves the source.
- source_word: הַכְּרוּב הַשֵּׁנִי
  chosen: the second cherub
  lexicon: HALOT
  rationale: Straightforward definite noun plus ordinal adjective. Singular 'cherub'
    matches the Hebrew form.
- source_word: מִדָּה אַחַת
  chosen: one measure
  alternatives:
  - the same measure
  - one size
  lexicon: HALOT
  rationale: מִדָּה denotes measure or dimension. 'One measure' is formally close
    and prepares for the parallel phrase that follows. 'The same measure' is interpretive
    but accurate; the more literal wording is retained in the main text.
- source_word: וְקֶצֶב אֶחָד
  chosen: and one form
  alternatives:
  - and one proportion
  - and one shape
  - and one outline
  lexicon: HALOT
  rationale: קֶצֶב here refers to form, proportion, or overall shape/pattern. 'Form'
    is clear modern English and fits the statement that the two cherubim matched each
    other. 'Proportion' is possible, but 'form' is broader and more natural.
- source_word: לִשְׁנֵי הַכְּרֻבִים
  chosen: both cherubim had
  alternatives:
  - for the two cherubim
  - belonged to the two cherubim
  lexicon: HALOT
  rationale: The Hebrew literally says 'for the two cherubim,' indicating that the
    identical measure and form applied to both. English idiom is improved by restructuring
    as 'both cherubim had,' which preserves the sense without awkwardness.
