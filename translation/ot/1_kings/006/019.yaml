id: 1KI.6.19
reference: 1 Kings 6:19
source:
  edition: WLC
  text: וּ/דְבִ֧יר בְּ/תוֹךְ הַ/בַּ֛יִת מִ/פְּנִ֖ימָה הֵכִ֑ין לְ/תִתֵּ֣ן שָׁ֔ם אֶת
    אֲר֖וֹן בְּרִ֥ית יְהוָֽה־־׃
translation:
  text: And he prepared the inner sanctuary within the house, to place there the ark
    of the covenant of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew debir, traditionally 'oracle'; here it refers to the inner sanctuary,
      the innermost room of the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבִיר
  chosen: inner sanctuary
  alternatives:
  - inner room
  - oracle
  - sanctuary
  lexicon: HALOT
  rationale: In temple-context דְבִיר refers to the innermost chamber, the Most Holy
    Place. 'Inner sanctuary' communicates the function and location in readable modern
    English better than the traditional but opaque 'oracle.'
- source_word: בְּתוֹךְ הַבַּיִת
  chosen: within the house
  alternatives:
  - inside the house
  - in the midst of the house
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'House' is retained rather than 'temple'
    because בַּיִת is the actual term used here, while the temple referent is clear
    from context.
- source_word: מִפְּנִימָה
  chosen: inner
  alternatives:
  - inward
  - on the inside
  - innermost
  lexicon: HALOT
  rationale: This adverbial form intensifies the inward/internal location of the דְבִיר.
    In English it is best absorbed into the phrase 'inner sanctuary' rather than rendered
    woodenly as a separate adverb.
- source_word: הֵכִין
  chosen: prepared
  alternatives:
  - made ready
  - established
  - set up
  lexicon: HALOT
  rationale: The verb denotes making something ready or arranging it for a purpose.
    'Prepared' fits the construction with the infinitive 'to place' and avoids over-specifying
    construction details.
- source_word: לְתִתֵּן
  chosen: to place
  alternatives:
  - to put
  - to set
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To place' is slightly more formal
    and fitting for the placement of the ark in the sanctuary.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  - the covenant ark of the LORD
  lexicon: HALOT
  rationale: This preserves the construct chain transparently. 'The LORD' follows
    the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering for the
    divine name is 'the LORD,' preserving established reverential convention and LXX-influenced
    usage.
