id: 1KI.6.4
reference: 1 Kings 6:4
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ לַ/בָּ֔יִת חַלּוֹנֵ֖י שְׁקֻפִ֥ים אֲטֻמִֽים׃
translation:
  text: He made for the house windows with recessed frames that were closed in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew terms here are architecturally rare and uncertain. The phrase traditionally
      rendered 'windows with recessed frames that were closed in' may also be understood
      as 'windows with beveled frames,' 'windows of narrowing jambs,' or 'windows
      broad within and narrow without.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - He constructed
  lexicon: HALOT
  rationale: Wayyiqtol of עשה, the standard narrative verb 'and/he made.' English
    drops the conjunction for natural style while preserving the simple past narrative
    sense.
- source_word: לַבָּיִת
  chosen: for the house
  alternatives:
  - in the house
  - for the temple
  lexicon: HALOT
  rationale: 'בית here refers to the temple structure in context, but ''house'' preserves
    the Hebrew term and its architectural sense. The preposition ל is best taken as
    ''for'' with עשה: he made something for the house.'
- source_word: חַלּוֹנֵי
  chosen: windows
  alternatives:
  - window openings
  lexicon: HALOT
  rationale: Standard plural construct of חלון, meaning 'windows.' 'Windows' is the
    natural English rendering.
- source_word: שְׁקֻפִים
  chosen: with recessed frames
  alternatives:
  - with beveled frames
  - with narrowing jambs
  - broad within and narrow without
  lexicon: HALOT
  rationale: This rare architectural term is difficult. Traditional renderings include
    'windows of narrow lights' or 'beveled/recessed windows.' The sense appears to
    be windows constructed with slanting or recessed frames/jambs rather than simply
    transparent panes. 'With recessed frames' gives a readable architectural sense
    without overclaiming a precise technical reconstruction.
- source_word: אֲטֻמִים
  chosen: that were closed in
  alternatives:
  - fixed
  - shut
  - sealed
  lexicon: HALOT
  rationale: Passive participle from אטם, 'to shut/close up.' In architectural context
    it likely describes the windows as closed, fixed, or screened rather than open
    apertures. 'Closed in' preserves the basic verbal idea while fitting the construction.
