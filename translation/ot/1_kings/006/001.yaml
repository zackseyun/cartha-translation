theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the masculine familial idiom בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over flattening
    masculine forms into neutral collectives when the source uses a familial term.
    Here the phrase is corporate and covenantal, and 'sons of Israel' preserves that
    texture.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
