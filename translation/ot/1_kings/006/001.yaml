id: 1KI.6.1
reference: 1 Kings 6:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בִ/שְׁמוֹנִ֣ים שָׁנָ֣ה וְ/אַרְבַּ֣ע מֵא֣וֹת שָׁנָ֡ה לְ/צֵ֣את בְּנֵֽי
    יִשְׂרָאֵ֣ל מֵ/אֶֽרֶץ מִצְרַיִם֩ בַּ/שָּׁנָ֨ה הָ/רְבִיעִ֜ית בְּ/חֹ֣דֶשׁ זִ֗ו ה֚וּא
    הַ/חֹ֣דֶשׁ הַ/שֵּׁנִ֔י לִ/מְלֹ֥ךְ שְׁלֹמֹ֖ה עַל יִשְׂרָאֵ֑ל וַ/יִּ֥בֶן הַ/בַּ֖יִת
    לַ/יהוָֽה־־־׃
translation:
  text: And it came about in the four hundred eightieth year after the sons of Israel
    came out from the land of Egypt, in the fourth year, in the month of Ziv (that
    is, the second month), of Solomon’s reign over Israel, that he began to build
    the house for the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions render 'the Israelites'
      or 'the people of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Ziv was the old name of the second month in the Hebrew calendar.
    reason: cultural_note
  - marker: c
    text: Or 'he built the house for the LORD.' The Hebrew verb itself is simply 'built';
      'began to build' makes explicit the commencement sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it came about
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a chronological notice. 'And it
    came about' preserves the formal narrative transition while using readable modern
    English.
- source_word: בִּשְׁמוֹנִים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: in the four hundred eightieth year
  alternatives:
  - in the 480th year
  - after four hundred and eighty years
  lexicon: HALOT
  rationale: The Hebrew idiom expresses a specific year count rather than a loose
    duration. 'In the four hundred eightieth year' best reflects the construction
    and the temporal framework of the verse.
- source_word: לְצֵאת
  chosen: after ... came out
  alternatives:
  - from the going out of
  - from the exodus of
  lexicon: HALOT
  rationale: The infinitive construct with ל marks the reference point in time. Rendering
    it with 'after ... came out' gives natural English while preserving the temporal
    relation. 'Exodus' would be interpretive shorthand rather than direct translation.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is retained where
    it refers to the covenant people corporately. 'The sons of Israel' is formally
    closer and preserves the familial/covenantal idiom.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes 'land,' which is worth preserving in this
    historical marker.
- source_word: בַּשָּׁנָה הָרְבִיעִית
  chosen: in the fourth year
  alternatives:
  - during the fourth year
  lexicon: HALOT
  rationale: Straightforward temporal designation tied to Solomon's reign.
- source_word: בְּחֹדֶשׁ זִו
  chosen: in the month of Ziv
  alternatives:
  - in Ziv
  lexicon: HALOT
  rationale: The Hebrew names the month explicitly. Retaining the proper name 'Ziv'
    preserves the historical-cultural detail.
- source_word: הוּא הַחֹדֶשׁ הַשֵּׁנִי
  chosen: that is, the second month
  alternatives:
  - which is the second month
  lexicon: HALOT
  rationale: The appositional clarification is explanatory. 'That is' communicates
    the parenthetical gloss naturally in English.
- source_word: לִמְלֹךְ שְׁלֹמֹה עַל יִשְׂרָאֵל
  chosen: of Solomon’s reign over Israel
  alternatives:
  - since Solomon became king over Israel
  - when Solomon reigned over Israel
  lexicon: HALOT
  rationale: The infinitive construct with ל plus 'fourth year' indicates regnal dating.
    'Of Solomon’s reign over Israel' is concise and accurate.
- source_word: וַיִּבֶן
  chosen: he began to build
  alternatives:
  - he built
  - he was building
  lexicon: HALOT
  rationale: In context this verse dates the commencement of the temple project, not
    its completion. English idiom commonly expresses this with 'began to build,' making
    explicit what the narrative context implies from the simple verb.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house,' the standard designation for the temple.
    Retaining 'house' preserves the source wording; the referent is clear from 'for
    the LORD.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
