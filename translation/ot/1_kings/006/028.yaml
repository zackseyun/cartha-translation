id: 1KI.6.28
reference: 1 Kings 6:28
source:
  edition: WLC
  text: וַ/יְצַ֥ף אֶת הַ/כְּרוּבִ֖ים זָהָֽב־׃
translation:
  text: And he overlaid the cherubim with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covered the cherubim with gold' or 'plated the cherubim with gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this temple-construction context refers to covering an
    object with a material layer, especially metal. 'Overlaid' is the standard natural
    English choice for architectural furnishing and best fits the direct object plus
    material construction here.
- source_word: אֶת
  chosen: the direct-object marker is untranslated
  rationale: אֶת marks 'the cherubim' as the definite direct object and has no independent
    English equivalent.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the established English plural for כְּרוּבִים
    and matches the temple/tabernacle imagery familiar in biblical English. ''Cherubs''
    would sound diminished or modernized inappropriately for this sacred architectural
    context.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: The noun names the material used for the overlay. In English, 'with gold'
    naturally expresses the Hebrew construction after 'overlaid'.
