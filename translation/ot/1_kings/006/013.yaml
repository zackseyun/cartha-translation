theological_decisions:
- issue: Divine indwelling language in temple context
  chosen_reading: Render שׁכן as 'dwell' and בְּתוֹךְ as 'among,' expressing God's
    covenant presence with Israel without over-specifying temple theology.
  alternative_readings:
  - I will live in the midst of the Israelites
  - I will reside among Israel
  rationale: The verse promises YHWH's presence with his people in connection with
    the temple, but the wording itself emphasizes presence among Israel rather than
    a metaphysical localization. The translation preserves that tension and does not
    import later doctrinal formulations.
  doctrine_reference: Preserve theological tension rather than resolve it.
