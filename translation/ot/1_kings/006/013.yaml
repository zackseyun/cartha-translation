id: 1KI.6.13
reference: 1 Kings 6:13
source:
  edition: WLC
  text: וְ/שָׁ֣כַנְתִּ֔י בְּ/ת֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/לֹ֥א אֶעֱזֹ֖ב אֶת עַמִּ֥/י
    יִשְׂרָאֵֽל־׃ס
translation:
  text: And I will dwell among the children of Israel, and I will not forsake my people
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַנְתִּי
  chosen: And I will dwell
  alternatives:
  - And I will live
  - And I will reside
  lexicon: HALOT
  rationale: שׁכן commonly denotes dwelling or settling, especially of God's presence
    among his people. 'Dwell' preserves the covenantal/theological resonance without
    becoming archaic.
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in
  lexicon: HALOT
  rationale: With a plural human object ('the children of Israel'), 'among' is the
    most natural English rendering of 'in the midst of' while preserving the sense
    of presence within the community.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the Israelites
  - the sons of Israel
  lexicon: HALOT
  rationale: Literally 'sons/children of Israel.' 'The children of Israel' preserves
    the traditional covenantal people-designation and reflects the Hebrew more closely
    than the more idiomatic 'Israelites.' 'Sons' would be overly male-specific here.
- source_word: וְלֹא אֶעֱזֹב
  chosen: and I will not forsake
  alternatives:
  - and I will not abandon
  - and I will not leave
  lexicon: HALOT
  rationale: עזב in covenant contexts often carries the sense of forsaking or abandoning.
    'Forsake' best preserves the relational and covenantal force of the promise.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive covenant formula; 'my people' is the standard
    and contextually weighty rendering.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated according to standard convention, in keeping
    with the translation philosophy.
