id: 1KI.6.11
reference: 1 Kings 6:11
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל שְׁלֹמֹ֖ה לֵ/אמֹֽר־־׃
translation:
  text: And the word of Yahweh came to Solomon, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of the LORD came to Solomon, saying.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh' for 'the LORD' (Hebrew יְהוָה).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as standard narrative progression. In English, rendering the idiom as 'And the word ... came' preserves the narrative flow without the wooden 'it happened' or archaic 'came to pass.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the conventional and semantically appropriate rendering, signaling a divine communication. 'Message' is possible but less formally tied to the recurring biblical formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word. 'To' is the natural modern English equivalent.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the next verse. 'Saying' is the standard, concise English rendering that preserves the formal linkage to the following quotation.
