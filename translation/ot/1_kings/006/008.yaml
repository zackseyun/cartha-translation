id: 1KI.6.8
reference: 1 Kings 6:8
source:
  edition: WLC
  text: פֶּ֗תַח הַ/צֵּלָע֙ הַ/תִּ֣יכֹנָ֔ה אֶל כֶּ֥תֶף הַ/בַּ֖יִת הַ/יְמָנִ֑ית וּ/בְ/לוּלִּ֗ים
    יַֽעֲלוּ֙ עַל הַ/תִּ֣יכֹנָ֔ה וּ/מִן הַ/תִּֽיכֹנָ֖ה אֶל הַ/שְּׁלִשִֽׁים־־־־׃
translation:
  text: The entrance to the middle side chamber was on the right side of the house,
    and by winding stairs they went up to the middle story, and from the middle to
    the third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by spiral stairs.' The Hebrew term likely refers to winding or spiral
      stairways.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the middle to the third,' that is, from the middle story
      to the third story.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  lexicon: HALOT
  rationale: Denotes the opening or entryway. 'Entrance' is natural English and fits
    the architectural description better than the more wooden 'opening.'
- source_word: הַצֵּלָע הַתִּיכֹנָה
  chosen: the middle side chamber
  alternatives:
  - the middle side room
  - the middle rib/side structure
  lexicon: HALOT
  rationale: צֵלָע in temple-building contexts refers to side chambers/side structures
    rather than a literal 'rib.' תִּיכֹנָה means 'middle.' Singular is retained because
    the Hebrew phrase is singular here, likely referring to the entry at the middle
    level/section.
- source_word: אֶל כֶּתֶף הַבַּיִת הַיְמָנִית
  chosen: was on the right side of the house
  alternatives:
  - was toward the shoulder of the house on the south/right
  - was at the right flank of the house
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder/side.' In architectural context, 'side'
    is the clearest idiomatic rendering. יְמָנִית is 'right(side),' not necessarily
    'south' in this immediate description, so 'right side' preserves the spatial wording.
- source_word: וּבְלוּלִּים
  chosen: by winding stairs
  alternatives:
  - by spiral stairs
  - by winding passages
  lexicon: HALOT
  rationale: The term is traditionally understood as spiral or winding stairs in this
    architectural context. 'Winding stairs' is clear modern English while preserving
    the likely sense.
- source_word: יַעֲלוּ
  chosen: they went up
  alternatives:
  - one went up
  - people went up
  - they ascended
  lexicon: HALOT
  rationale: The verb is 3mp and naturally rendered impersonally in English as 'they
    went up,' a common way to describe how ascent was made in a building.
- source_word: עַל הַתִּיכֹנָה
  chosen: to the middle story
  alternatives:
  - to the middle chamber
  - onto the middle level
  lexicon: HALOT
  rationale: Given the sequence of levels in the verse, תִּיכֹנָה here refers to the
    middle level/story rather than merely repeating 'middle chamber.' 'Story' communicates
    the architectural sense.
- source_word: וּמִן הַתִּיכֹנָה אֶל הַשְּׁלִשִׁים
  chosen: and from the middle to the third
  alternatives:
  - and from the middle story to the third
  - and from the second to the third
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the middle to the third.' English can
    leave 'story' implied in the second phrase for brevity, since the architectural
    referent is clear from context.
