id: 1KI.6.12
reference: 1 Kings 6:12
source:
  edition: WLC
  text: הַ/בַּ֨יִת הַ/זֶּ֜ה אֲשֶׁר אַתָּ֣ה בֹנֶ֗ה אִם תֵּלֵ֤ךְ בְּ/חֻקֹּתַ/י֙ וְ/אֶת
    מִשְׁפָּטַ֣/י תַּֽעֲשֶׂ֔ה וְ/שָׁמַרְתָּ֥ אֶת כָּל מִצְוֺתַ֖/י לָ/לֶ֣כֶת בָּ/הֶ֑ם
    וַ/הֲקִמֹתִ֤י אֶת דְּבָרִ/י֙ אִתָּ֔/ךְ אֲשֶׁ֥ר דִּבַּ֖רְתִּי אֶל דָּוִ֥ד אָבִֽי/ךָ־־־־־־־׃
translation:
  text: As for this house that you are building, if you walk in my statutes, carry
    out my judgments, and keep all my commandments by walking in them, then I will
    establish my word with you, which I spoke to David your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirm my word with you' or 'fulfill my promise with you.' The Hebrew
      idiom 'establish my word' refers to confirming what was previously spoken.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple
    structure, but 'house' preserves the Hebrew wording and allows the temple sense
    to arise from context.
- source_word: אֲשֶׁר אַתָּה בֹנֶה
  chosen: that you are building
  alternatives:
  - which you are building
  - that you are building now
  lexicon: HALOT
  rationale: The relative clause with the participle בֹנֶה naturally conveys ongoing
    action. 'That you are building' is idiomatic and reflects the present-progressive
    sense.
- source_word: אִם תֵּלֵךְ בְּחֻקֹּתַי
  chosen: if you walk in my statutes
  alternatives:
  - if you live by my statutes
  - if you follow my statutes
  lexicon: HALOT
  rationale: הלך with ב conveys conduct or manner of life. 'Walk in' preserves the
    covenantal idiom, while 'statutes' is a standard rendering for חֻקִּים.
- source_word: מִשְׁפָּטַי תַּעֲשֶׂה
  chosen: carry out my judgments
  alternatives:
  - do my judgments
  - carry out my ordinances
  - practice my rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can mean judgments, ordinances, or rules. 'Carry out my
    judgments' keeps the legal-covenantal force and avoids flattening the term. 'Do'
    is too wooden in English here.
- source_word: וְשָׁמַרְתָּ אֶת כָּל מִצְוֺתַי
  chosen: and keep all my commandments
  alternatives:
  - and observe all my commandments
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means keep/observe. 'Keep' is concise,
    natural, and preserves covenantal obedience language.
- source_word: לָלֶכֶת בָּהֶם
  chosen: by walking in them
  alternatives:
  - to walk in them
  - so as to walk in them
  - living by them
  lexicon: HALOT
  rationale: The infinitive expresses the manner or practical outworking of keeping
    the commandments. 'By walking in them' makes the relation clear in English while
    preserving the repeated walking metaphor.
- source_word: וַהֲקִמֹתִי אֶת דְּבָרִי אִתָּךְ
  chosen: then I will establish my word with you
  alternatives:
  - then I will confirm my word with you
  - then I will fulfill my promise with you
  - then I will establish my promise for you
  lexicon: HALOT
  rationale: הקים דבר is an idiom for confirming or establishing a spoken promise.
    'Establish my word with you' stays close to the Hebrew while remaining intelligible.
    'With you' reflects אִתָּךְ rather than shifting to 'for you'.
- source_word: דְּבָרִי
  chosen: my word
  alternatives:
  - my promise
  lexicon: HALOT
  rationale: דבר can mean word, matter, or promise. Because the following clause specifies
    'which I spoke,' 'word' preserves the lexical link; the promissory sense is still
    clear from context.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֶל דָּוִד אָבִיךָ
  chosen: which I spoke to David your father
  alternatives:
  - which I promised to David your father
  lexicon: HALOT
  rationale: דבר is literally 'spoke.' Since the previous phrase already uses 'word,'
    retaining 'spoke' preserves the verbal connection and avoids over-interpreting
    the content as promise in the main text.
