id: 1KI.6.7
reference: 1 Kings 6:7
source:
  edition: WLC
  text: וְ/הַ/בַּ֨יִת֙ בְּ/הִבָּ֣נֹת֔/וֹ אֶֽבֶן שְׁלֵמָ֥ה מַסָּ֖ע נִבְנָ֑ה וּ/מַקָּב֤וֹת
    וְ/הַ/גַּרְזֶן֙ כָּל כְּלִ֣י בַרְזֶ֔ל לֹֽא נִשְׁמַ֥ע בַּ/בַּ֖יִת בְּ/הִבָּנֹתֽ/וֹ־־־׃
translation:
  text: The house, when it was built, was built of finished stone quarried in advance;
    and no hammer or axe or any iron tool was heard in the house while it was being
    built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepared at the quarry.' The Hebrew term מַסָּע is specialized and may
      point either to quarrying or to the stones' being brought already prepared from
      the quarry.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The immediate Hebrew term is 'house.' In this context it refers to the
    temple structure, but 'house' preserves the source wording and echoes the broader
    biblical idiom 'house of the LORD' without importing words not present in this
    verse.
- source_word: בְּהִבָּנֹתוֹ
  chosen: when it was built / while it was being built
  alternatives:
  - in its being built
  - during its construction
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance.
    English idiom requires a temporal clause. The phrase occurs twice; the first is
    rendered more compactly ('when it was built') and the second more duratively ('while
    it was being built') to fit the sentence flow while preserving the same temporal
    sense.
- source_word: אֶבֶן שְׁלֵמָה
  chosen: finished stone
  alternatives:
  - whole stone
  - complete stone
  - dressed stone
  lexicon: HALOT
  rationale: שְׁלֵמָה conveys completeness or wholeness. In building context, 'finished
    stone' communicates stone prepared to completion before assembly. 'Whole stone'
    is too opaque in English, while 'dressed stone' is possible but less directly
    tied to the adjective's core sense.
- source_word: מַסָּע
  chosen: quarried in advance
  alternatives:
  - at the quarry
  - ready from the quarry
  - prepared at the quarry
  lexicon: HALOT
  rationale: The noun likely refers to quarrying or transport from the quarry, indicating
    the stones were prepared before arriving at the building site. 'Quarried in advance'
    captures the practical sense in clear English. Because the Hebrew term is somewhat
    specialized, an alternative is preserved in a footnote.
- source_word: נִבְנָה
  chosen: was built
  alternatives:
  - was being built
  lexicon: HALOT
  rationale: Nifal perfect here states the manner of construction. 'Was built' is
    the natural English rendering.
- source_word: מַקָּבוֹת
  chosen: hammer
  alternatives:
  - hammers
  - mallet
  lexicon: HALOT
  rationale: Although morphologically plural, the phrase lists classes of tools, and
    English idiom commonly uses the singular in such lists ('no hammer or axe'). 'Hammer'
    is the clearest equivalent; 'mallet' is possible but less certain.
- source_word: הַגַּרְזֶן
  chosen: axe
  alternatives:
  - adze
  lexicon: HALOT
  rationale: The standard sense is 'axe.' Some have suggested a woodworking implement
    such as an adze, but 'axe' remains the most straightforward rendering.
- source_word: כָּל כְּלִי בַרְזֶל
  chosen: any iron tool
  alternatives:
  - any כלי of iron
  - any tool of iron
  - any iron implement
  lexicon: HALOT
  rationale: כָּל with singular construct gives a distributive sense. 'Any iron tool'
    is idiomatic and preserves the comprehensiveness of the prohibition.
- source_word: לֹא נִשְׁמַע
  chosen: was heard
  alternatives:
  - was not heard
  - was audible
  lexicon: HALOT
  rationale: Passive Nifal of שמע means 'was heard.' In English the negation is naturally
    carried by 'no ... was heard' in the sentence structure.
