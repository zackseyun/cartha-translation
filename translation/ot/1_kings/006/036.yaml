id: 1KI.6.36
reference: 1 Kings 6:36
source:
  edition: WLC
  text: וַ/יִּ֨בֶן֙ אֶת הֶ/חָצֵ֣ר הַ/פְּנִימִ֔ית שְׁלֹשָׁ֖ה טוּרֵ֣י גָזִ֑ית וְ/ט֖וּר
    כְּרֻתֹ֥ת אֲרָזִֽים־׃
translation:
  text: And he built the inner court with three rows of cut stone and one row of cedar
    beams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three courses of hewn stone and one course of cedar beams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: And he built
  alternatives:
  - Then he built
  lexicon: HALOT
  rationale: Wayyiqtol of בנה introduces the next action in sequence. 'And he built'
    preserves the narrative flow without overinterpreting temporal nuance.
- source_word: הֶחָצֵר הַפְּנִימִית
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes a court/courtyard; 'inner court' is concise and idiomatic
    in temple-building context, and פְּנִימִית specifies the inner area.
- source_word: שְׁלֹשָׁה טוּרֵי
  chosen: three rows of
  alternatives:
  - three courses of
  lexicon: HALOT
  rationale: טוּר refers to a row or course in construction. 'Rows' is more accessible
    modern English; 'courses' is a valid architectural alternative preserved in a
    footnote.
- source_word: גָזִית
  chosen: cut stone
  alternatives:
  - hewn stone
  - dressed stone
  lexicon: HALOT
  rationale: גָזִית refers to worked/hewn masonry stone. 'Cut stone' is clear modern
    English and fits the construction context.
- source_word: וְטוּר
  chosen: and one row of
  alternatives:
  - and a row of
  lexicon: HALOT
  rationale: Though the numeral 'one' is not explicit, the singular noun after 'three
    rows' naturally indicates a single additional row. Supplying 'one' makes the construction
    pattern clear in English.
- source_word: כְּרֻתֹת אֲרָזִים
  chosen: cedar beams
  alternatives:
  - cut cedar beams
  - cedar timbers
  lexicon: HALOT
  rationale: The phrase denotes cut/trimmed cedar pieces used in construction. 'Cedar
    beams' best conveys the likely architectural function in idiomatic English; 'cut'
    is semantically present but can be left implicit because beams are already processed
    timber.
