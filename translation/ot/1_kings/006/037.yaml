id: 1KI.6.37
reference: 1 Kings 6:37
source:
  edition: WLC
  text: בַּ/שָּׁנָה֙ הָֽ/רְבִיעִ֔ית יֻסַּ֖ד בֵּ֣ית יְהוָ֑ה בְּ/יֶ֖רַח זִֽו׃
translation:
  text: In the fourth year, the house of the LORD was founded in the month of Ziv.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foundation of the house of the LORD was laid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׁנָה הָרְבִיעִית
  chosen: In the fourth year
  alternatives:
  - In the fourth year of [his reign]
  lexicon: HALOT
  rationale: The Hebrew phrase is a temporal expression with the definite article
    on 'fourth,' naturally rendered 'in the fourth year.' Although the broader context
    specifies Solomon's reign, that is not repeated in this verse, so it is not supplied
    in the main text.
- source_word: יֻסַּד
  chosen: was founded
  alternatives:
  - was laid
  - was established
  lexicon: HALOT
  rationale: The passive form of יסד denotes founding or laying a foundation. 'Was
    founded' is idiomatic English and fits the building context; 'was laid' is possible
    but in English usually requires an explicit object such as 'foundation.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in this context refers to the temple.
    'House of the LORD' preserves the Hebrew imagery while remaining clear. Per doctrine,
    יְהוָה is rendered 'the LORD,' not 'Yahweh' or 'Jehovah.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name יְהוָה.
- source_word: בְּיֶרַח זִו
  chosen: in the month of Ziv
  alternatives:
  - in the month Ziv
  - in Ziv, the second month
  lexicon: HALOT
  rationale: יֶרַח means 'month,' and זִו is the proper name of the month. The simple
    rendering 'in the month of Ziv' matches the Hebrew directly. The identification
    of Ziv as the second month is contextual knowledge from 1 Kings 6:1, not stated
    here, so it is not added to the main text.
