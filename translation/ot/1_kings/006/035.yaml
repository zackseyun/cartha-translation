id: 1KI.6.35
reference: 1 Kings 6:35
source:
  edition: WLC
  text: וְ/קָלַ֤ע כְּרוּבִים֙ וְ/תִ֣מֹר֔וֹת וּ/פְטֻרֵ֖י צִצִּ֑ים וְ/צִפָּ֣ה זָהָ֔ב
    מְיֻשָּׁ֖ר עַל הַ/מְּחֻקֶּֽה־׃
translation:
  text: He carved cherubim and palm trees and open flowers, and overlaid them with
    gold, fitted over the carved work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'engraved' or 'sculpted' for 'carved.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression rendered 'open flowers' refers to floral ornamentation,
      possibly blossoms or buds.
    reason: lexical_alternative
  - marker: c
    text: Or 'and overlaid it with gold, applied evenly over the carved work.' The
      final clause is difficult and describes the gold as carefully fitted to the
      carved surface.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָלַע
  chosen: He carved
  alternatives:
  - He engraved
  - He sculpted
  lexicon: HALOT
  rationale: In this temple-decoration context, the verb refers to making ornamental
    carved designs in wood. 'Carved' is natural modern English and fits the direct
    objects that follow.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliterated biblical term
    for these throne-associated heavenly beings and avoids reducing them to later
    popular imagery.'
- source_word: וְתִמֹרוֹת
  chosen: and palm trees
  alternatives:
  - and palm-tree figures
  - and palm motifs
  lexicon: HALOT
  rationale: The noun denotes palm-tree forms in the decorative scheme. 'Palm trees'
    is concise and idiomatic, while the architectural-artistic sense is clear from
    context.
- source_word: וּפְטֻרֵי צִצִּים
  chosen: and open flowers
  alternatives:
  - and flower blossoms
  - and floral buds
  lexicon: HALOT
  rationale: This expression refers to floral ornamentation. 'Open flowers' best captures
    the likely sense of blossoming floral forms in temple carving and matches common
    usage in this passage cluster.
- source_word: וְצִפָּה זָהָב
  chosen: and overlaid them with gold
  alternatives:
  - and covered them with gold
  - and plated them with gold
  lexicon: HALOT
  rationale: The verb means to overlay or plate with a material. 'Overlaid ... with
    gold' is the standard architectural sense and suits the temple furnishing context.
- source_word: מְיֻשָּׁר
  chosen: fitted
  alternatives:
  - applied evenly
  - smoothed
  - laid flat
  lexicon: HALOT
  rationale: The participle conveys the idea of being made level/straight or carefully
    adjusted. In context of gold over carved surfaces, 'fitted' communicates that
    the gold was worked to conform to the underlying carving.
- source_word: עַל הַמְּחֻקֶּה
  chosen: over the carved work
  alternatives:
  - upon the engraving
  - over the sculptured surface
  lexicon: HALOT
  rationale: The noun refers to what had been engraved or carved. 'Carved work' is
    clear, natural English for the decorated wooden surface.
