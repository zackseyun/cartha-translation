id: 1KI.6.22
reference: 1 Kings 6:22
source:
  edition: WLC
  text: וְ/אֶת כָּל הַ/בַּ֛יִת צִפָּ֥ה זָהָ֖ב עַד תֹּ֣ם כָּל הַ/בָּ֑יִת וְ/כָל הַ/מִּזְבֵּ֥חַ
    אֲֽשֶׁר לַ/דְּבִ֖יר צִפָּ֥ה זָהָֽב־־־־־־׃
translation:
  text: He overlaid the whole house with gold, until the whole house was finished;
    and he overlaid with gold the whole altar that belonged to the inner sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole altar of the inner sanctuary'; the Hebrew phrase may denote
      the altar's association with, or location relative to, the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Hebrew debir, the inner sanctuary, traditionally 'the Most Holy Place' or,
      in older English, 'the oracle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this temple-building context it refers
    to the temple structure, but 'house' preserves the Hebrew wording and echoes the
    broader usage of 'house' for the LORD's house in Kings.
- source_word: צִפָּה
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this construction refers to overlaying a surface with
    a material, here gold. 'Overlaid' is the most natural English rendering in temple-construction
    context and is more precise than the broader 'covered.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; no contextual reason to vary the standard
    gloss.
- source_word: עַד תֹּם
  chosen: until ... was finished
  alternatives:
  - completely
  - until the completion of
  lexicon: HALOT
  rationale: The phrase marks completion of the work on the whole house. Rendering
    it verbally in English ('until the whole house was finished') is idiomatic and
    preserves the sense of completed construction.
- source_word: כָּל
  chosen: whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: Used repeatedly for totality. 'Whole' reads more naturally with singular
    collectives like 'house' and 'altar' in English while preserving the emphasis
    on entirety.
- source_word: הַמִּזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מִזְבֵּחַ; context indicates the altar associated
    with the inner sanctuary.
- source_word: אֲשֶׁר לַדְּבִיר
  chosen: that belonged to the inner sanctuary
  alternatives:
  - that was in the inner sanctuary
  - before the inner sanctuary
  - of the inner sanctuary
  lexicon: HALOT
  rationale: דְּבִיר refers to the inner sanctuary/Most Holy Place. The lamed preposition
    can indicate relation or belonging. 'Belonged to the inner sanctuary' avoids over-specifying
    spatial location while conveying the altar's association with that sacred space.
- source_word: דְּבִיר
  chosen: inner sanctuary
  alternatives:
  - inner room
  - Most Holy Place
  - oracle
  lexicon: HALOT
  rationale: '''Inner sanctuary'' is clear modern English and fits temple architecture.
    ''Oracle'' is traditional but opaque; ''Most Holy Place'' may import later terminological
    specificity beyond the immediate lexical sense, though it is closely related.'
