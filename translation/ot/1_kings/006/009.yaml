id: 1KI.6.9
reference: 1 Kings 6:9
source:
  edition: WLC
  text: וַ/יִּ֥בֶן אֶת הַ/בַּ֖יִת וַ/יְכַלֵּ֑/הוּ וַ/יִּסְפֹּ֤ן אֶת הַ/בַּ֨יִת֙ גֵּבִ֔ים
    וּ/שְׂדֵרֹ֖ת בָּ/אֲרָזִֽים־־׃
translation:
  text: So he built the house and finished it, and he covered the house with beams
    and rows of cedar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'roofed the house with beams and rows of cedar,' or 'paneled the house
      with beams and rows of cedar.' The Hebrew verb can refer more generally to covering
      or paneling a structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - began building
  - constructed
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה, the standard verb for building/constructing. 'Built'
    is the most direct and natural rendering in narrative sequence.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  - the building
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the Hebrew wording and matches the established temple idiom
    ('the house of the LORD') without over-specifying in the verse itself.
- source_word: וַיְכַלֵּהוּ
  chosen: finished it
  alternatives:
  - completed it
  - brought it to completion
  lexicon: HALOT
  rationale: From כלה in the sense of completing/finishing. The suffix refers back
    to the house. 'Finished it' is concise, idiomatic, and faithful to the completion
    sense.
- source_word: וַיִּסְפֹּן
  chosen: covered
  alternatives:
  - roofed
  - paneled
  - ceiled
  lexicon: HALOT
  rationale: The verb ספן can denote covering or paneling a structure, especially
    with wood. 'Covered' is broad enough to include the architectural action here
    without prematurely narrowing it to only roofing or only interior paneling.
- source_word: גֵּבִים
  chosen: beams
  alternatives:
  - rafters
  - vaulted beams
  lexicon: HALOT
  rationale: This plural noun refers to structural members of the roof/ceiling area.
    'Beams' is the clearest general architectural term in modern English; 'rafters'
    is possible but somewhat narrower.
- source_word: שְׂדֵרֹת
  chosen: rows
  alternatives:
  - courses
  - ranks
  lexicon: HALOT
  rationale: The noun denotes rows or ordered courses. In combination with the cedar
    phrase, it likely describes arranged rows/layers of cedar construction. 'Rows'
    is natural and sufficiently literal.
- source_word: בָּאֲרָזִים
  chosen: of cedar
  alternatives:
  - with cedar
  - in cedar
  lexicon: HALOT
  rationale: The beth preposition here marks material or means. English idiom commonly
    expresses this as 'of cedar' after architectural nouns ('beams and rows of cedar'),
    though 'with cedar' is also possible.
