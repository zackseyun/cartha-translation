id: 1KI.6.32
reference: 1 Kings 6:32
source:
  edition: WLC
  text: וּ/שְׁתֵּי֮ דַּלְת֣וֹת עֲצֵי שֶׁמֶן֒ וְ/קָלַ֣ע עֲ֠לֵי/הֶם מִקְלְע֨וֹת כְּרוּבִ֧ים
    וְ/תִמֹר֛וֹת וּ/פְטוּרֵ֥י צִצִּ֖ים וְ/צִפָּ֣ה זָהָ֑ב וַ/יָּ֛רֶד עַל הַ/כְּרוּבִ֥ים
    וְ/עַל הַ/תִּֽמֹר֖וֹת אֶת הַ/זָּהָֽב־־־־׃
translation:
  text: Also, the two doors were of olivewood, and he carved on them engravings of
    cherubim and palm trees and open flowers, and overlaid them with gold; and he
    spread the gold over the cherubim and over the palm trees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carvings of cherubim and palm trees and flower blossoms.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb in the final clause is literally 'caused to go down' or
      'spread down,' describing the application of gold over the carved figures.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְתוֹת עֲצֵי שֶׁמֶן
  chosen: doors were of olivewood
  alternatives:
  - doors of olive wood
  - leaves of olivewood
  lexicon: HALOT
  rationale: דַּלְתוֹת refers to door-panels/doors; עֲצֵי שֶׁמֶן literally 'woods
    of oil,' an idiom for olivewood. 'Olivewood' is natural modern English while preserving
    the material.
- source_word: וּשְׁתֵּי
  chosen: Also, the two
  alternatives:
  - and the two
  lexicon: HALOT
  rationale: The conjunction links this verse to the prior architectural description.
    'Also' gives smooth English discourse connection without losing the additive force
    of ו.
- source_word: וְקָלַע
  chosen: he carved
  alternatives:
  - he engraved
  - he sculpted
  lexicon: HALOT
  rationale: In this temple-decor context the verb denotes carving/engraving ornamental
    designs into wood. 'Carved' is idiomatic and concrete.
- source_word: מִקְלְעוֹת
  chosen: engravings of
  alternatives:
  - carvings of
  - carved figures of
  lexicon: HALOT
  rationale: The noun denotes carved work or engraved patterns. 'Engravings of' pairs
    well with 'carved on them' and reflects ornamental workmanship.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliteration for these throne-guardian
    beings in temple imagery; ''cherubs'' would sound diminutive and misleading.'
- source_word: תִמֹרוֹת
  chosen: palm trees
  alternatives:
  - palm forms
  - palm motifs
  lexicon: HALOT
  rationale: In temple decoration the term refers to palm-tree representations. 'Palm
    trees' is the clearest natural rendering.
- source_word: פְּטוּרֵי צִצִּים
  chosen: open flowers
  alternatives:
  - flower blossoms
  - blooming flowers
  lexicon: HALOT
  rationale: This expression refers to floral ornamentation, likely blossom forms.
    'Open flowers' is a standard rendering that captures the visual sense without
    over-specifying the botany.
- source_word: וְצִפָּה זָהָב
  chosen: overlaid them with gold
  alternatives:
  - covered them with gold
  - plated them with gold
  lexicon: HALOT
  rationale: צפה in this construction means to overlay or plate with metal. 'Overlaid
    ... with gold' is standard and precise for architectural furnishing.
- source_word: וַיָּרֶד ... אֶת־הַזָּהָב
  chosen: he spread the gold over
  alternatives:
  - he hammered the gold onto
  - he applied the gold to
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down,' but in this unusual construction
    and context of gilding carved surfaces it conveys laying/spreading the gold down
    over the carved figures. 'Spread the gold over' preserves the imagery while making
    sense in English.
- source_word: עַל הַכְּרוּבִים וְעַל הַתִּמֹרוֹת
  chosen: over the cherubim and over the palm trees
  alternatives:
  - onto the cherubim and the palm trees
  lexicon: HALOT
  rationale: The repeated עַל marks the carved motifs specifically covered by the
    gold. Repeating 'over' reflects the Hebrew structure and emphasis.
