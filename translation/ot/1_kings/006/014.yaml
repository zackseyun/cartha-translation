id: 1KI.6.14
reference: 1 Kings 6:14
source:
  edition: WLC
  text: וַ/יִּ֧בֶן שְׁלֹמֹ֛ה אֶת הַ/בַּ֖יִת וַ/יְכַלֵּֽ/הוּ־׃
translation:
  text: So Solomon built the house and finished it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew literally says 'the house,' a common designation
      for the temple in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - was building
  - constructed
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה narrates a completed past action in sequence; 'built'
    is the natural English narrative rendering. 'Constructed' is possible but less
    idiomatic here.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name שְׁלֹמֹה, following
    the translation principle to transliterate names.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but the Hebrew uses 'the house,' and this expression is a standard designation
    for the temple in this chapter. To preserve source-text wording while remaining
    clear in context, the main text keeps 'the house' rather than importing the interpretive
    label 'temple'.
- source_word: וַיְכַלֵּהוּ
  chosen: finished it
  alternatives:
  - completed it
  - brought it to completion
  lexicon: HALOT
  rationale: From כלה in the Piel with 3ms suffix, meaning to complete/finish something.
    'Finished it' is concise, idiomatic, and accurately reflects the direct-object
    suffix referring back to 'the house'.
