id: 1KI.6.20
reference: 1 Kings 6:20
source:
  edition: WLC
  text: וְ/לִ/פְנֵ֣י הַ/דְּבִ֡יר עֶשְׂרִים֩ אַמָּ֨ה אֹ֜רֶךְ וְ/עֶשְׂרִ֧ים אַמָּ֣ה
    רֹ֗חַב וְ/עֶשְׂרִ֤ים אַמָּה֙ קֽוֹמָת֔/וֹ וַ/יְצַפֵּ֖/הוּ זָהָ֣ב סָג֑וּר וַ/יְצַ֥ף
    מִזְבֵּ֖חַ אָֽרֶז׃
translation:
  text: The inner sanctuary was twenty cubits long, twenty cubits wide, and twenty
    cubits high in front of it. He overlaid it with pure gold, and he overlaid the
    cedar altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine gold.' The Hebrew phrase זָהָב סָגוּר denotes high-quality refined
      gold.
    reason: lexical_alternative
  - marker: b
    text: Or 'an altar of cedar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי הַדְּבִיר
  chosen: The inner sanctuary was ... in front of it
  alternatives:
  - Before the inner sanctuary
  - The front of the inner sanctuary
  lexicon: HALOT
  rationale: דְּבִיר refers to the inner sanctuary/most holy place. לִפְנֵי literally
    means 'before/in front of.' The Hebrew syntax is compressed; in context the verse
    gives the dimensions of the debir and then notes what was before it. To preserve
    readability without over-paraphrasing, 'The inner sanctuary was ... in front of
    it' keeps both ideas, though the final phrase remains somewhat awkward because
    the Hebrew itself is elliptical.
- source_word: הַדְּבִיר
  chosen: the inner sanctuary
  alternatives:
  - the inner room
  - the Most Holy Place
  - the debir
  lexicon: HALOT
  rationale: דְּבִיר is the inner shrine of the temple. 'Inner sanctuary' is clear
    modern English and avoids importing later technical terminology too strongly,
    while still matching the referent.
- source_word: עֶשְׂרִים אַמָּה ... אֹרֶךְ / רֹחַב / קוֹמָתוֹ
  chosen: twenty cubits long, twenty cubits wide, and twenty cubits high
  alternatives:
  - its length was twenty cubits, its width twenty cubits, and its height twenty cubits
  lexicon: HALOT
  rationale: This is a straightforward dimensional formula. 'Cubits' is retained rather
    than converted to modern units to preserve the source measurement.
- source_word: וַיְצַפֵּהוּ
  chosen: He overlaid it
  alternatives:
  - He covered it
  - He plated it
  lexicon: HALOT
  rationale: The verb צפה in this construction refers to overlaying/plating a surface
    with a material. 'Overlaid' is standard and precise for temple furnishing descriptions.
- source_word: זָהָב סָגוּר
  chosen: pure gold
  alternatives:
  - fine gold
  - closed gold
  lexicon: HALOT
  rationale: The phrase denotes high-quality refined gold. 'Pure gold' is idiomatic
    modern English; 'fine gold' is also possible and traditional.
- source_word: וַיְצַף מִזְבֵּחַ אָרֶז
  chosen: and he overlaid the cedar altar
  alternatives:
  - and he overlaid an altar of cedar
  - and he covered the cedar altar
  lexicon: HALOT
  rationale: The Hebrew most naturally reads 'he overlaid the cedar altar,' i.e.,
    an altar made of cedar wood. This likely refers to the altar associated with the
    inner sanctuary. 'Cedar altar' is concise and faithful to the construct-like sequence
    in context.
