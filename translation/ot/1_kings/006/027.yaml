id: 1KI.6.27
reference: 1 Kings 6:27
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן אֶת הַ/כְּרוּבִ֜ים בְּ/ת֣וֹךְ הַ/בַּ֣יִת הַ/פְּנִימִ֗י וַֽ/יִּפְרְשׂוּ֮
    אֶת כַּנְפֵ֣י הַ/כְּרֻבִים֒ וַ/תִּגַּ֤ע כְּנַף הָֽ/אֶחָד֙ בַּ/קִּ֔יר וּ/כְנַף֙
    הַ/כְּר֣וּב הַ/שֵּׁנִ֔י נֹגַ֖עַת בַּ/קִּ֣יר הַ/שֵּׁנִ֑י וְ/כַנְפֵי/הֶם֙ אֶל תּ֣וֹךְ
    הַ/בַּ֔יִת נֹגְעֹ֖ת כָּנָ֥ף אֶל כָּנָֽף־׀־־־־׃
translation:
  text: He placed the cherubim inside the inner house, and the cherubim spread out
    their wings, so that the wing of the one touched the wall, and the wing of the
    second cherub touched the other wall; and their wings toward the middle of the
    house were touching wing to wing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the inner sanctuary' for 'inside the inner house.' The Hebrew is
      literally 'inside the inner house,' referring to the innermost part of the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He placed
  alternatives:
  - he put
  - he set
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set.' In this architectural context,
    'placed' is natural modern English and fits the act of positioning the cherubim
    in the inner sanctuary.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliterated plural for the
    heavenly beings and avoids flattening the cultic/theological register.'
- source_word: בְּתוֹךְ הַבַּיִת הַפְּנִימִי
  chosen: inside the inner house
  alternatives:
  - in the inner sanctuary
  - within the inner room
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' here referring to the temple structure.
    'Inner house' is a fairly formal rendering that stays close to the Hebrew while
    remaining intelligible. 'Sanctuary' is interpretive; 'house' better preserves
    the source wording.
- source_word: וַיִּפְרְשׂוּ אֶת כַּנְפֵי הַכְּרֻבִים
  chosen: and the cherubim spread out their wings
  alternatives:
  - and they spread out the wings of the cherubim
  lexicon: HALOT
  rationale: Although the Hebrew formally reads 'and they spread out the wings of
    the cherubim,' the subject is naturally the cherubim themselves in context. Rendering
    it actively in English avoids awkwardness while preserving the sense.
- source_word: וַתִּגַּע
  chosen: touched
  alternatives:
  - reached
  - came to
  lexicon: HALOT
  rationale: נגע denotes contact. 'Touched' is the most direct and consistent rendering
    in this spatial description.
- source_word: כְּנַף הָאֶחָד
  chosen: the wing of the one
  alternatives:
  - the wing of the first
  - one wing
  lexicon: HALOT
  rationale: The Hebrew says 'the wing of the one,' referring to one cherub. This
    is preserved rather than smoothing to 'first,' which the text does not explicitly
    say.
- source_word: בַּקִּיר
  chosen: the wall
  lexicon: HALOT
  rationale: קיר is straightforwardly 'wall' in this building context.
- source_word: הַכְּרוּב הַשֵּׁנִי
  chosen: the second cherub
  alternatives:
  - the other cherub
  lexicon: HALOT
  rationale: '''Second cherub'' closely reflects the Hebrew ordinal and maintains
    the paired description.'
- source_word: הַקִּיר הַשֵּׁנִי
  chosen: the other wall
  alternatives:
  - the second wall
  lexicon: HALOT
  rationale: While the Hebrew literally says 'the second wall,' idiomatic English
    in a two-wall contrast is 'the other wall.' This preserves the sense without sounding
    wooden.
- source_word: וְכַנְפֵיהֶם אֶל תּוֹךְ הַבַּיִת
  chosen: their wings toward the middle of the house
  alternatives:
  - their wings toward the interior of the house
  - their wings toward the inside of the house
  lexicon: HALOT
  rationale: תּוֹךְ denotes the midst/interior. Because the next clause describes
    the wings meeting each other, 'toward the middle of the house' makes the spatial
    relation clear in natural English.
- source_word: נֹגְעֹת כָּנָף אֶל כָּנָף
  chosen: were touching wing to wing
  alternatives:
  - touched one another
  - were touching one wing to another
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'touching wing to wing.' This is preserved
    with minimal smoothing to maintain the vivid architectural detail.
