id: 1KI.21.3
reference: 1 Kings 21:3
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר נָב֖וֹת אֶל אַחְאָ֑ב חָלִ֤ילָ/ה לִּ/י֙ מֵֽ/יהוָ֔ה מִ/תִּתִּ֛/י אֶת נַחֲלַ֥ת אֲבֹתַ֖/י לָֽ/ךְ־־׃
translation:
  text: But Naboth said to Ahab, “Far be it from me by Yahweh to give you the inheritance of my fathers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “The LORD forbid that I should give you the inheritance of my fathers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the immediate contrast with Ahab’s proposal in the preceding verse better than a mechanically sequential 'and,' while still reflecting the discourse function.
- source_word: נָבוֹת
  chosen: Naboth
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name is transliterated by standard English convention.
- source_word: חָלִילָה לִּי
  chosen: Far be it from me
  alternatives:
  - Profane be it for me
  - May it be unthinkable for me
  - The LORD forbid that I should
  lexicon: HALOT
  rationale: The idiom expresses strong repudiation or abhorrence. 'Far be it from me' is idiomatic modern English and preserves the force without importing 'forbid' into the verb itself.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - before the LORD
  - by the LORD
  - the LORD forbid
  lexicon: HALOT
  rationale: 'The preposition מִן with the divine name most naturally indicates source or relation: such an act would be far from Naboth as something prohibited in relation to the LORD. Rendering it explicitly as ''from the LORD'' preserves the Hebrew wording better than collapsing it into the English idiom ''The LORD forbid.'' ''the LORD'' follows the doctrinal default for YHWH.'
- source_word: מִתִּתִּי
  chosen: to give
  alternatives:
  - from giving
  - that I should give
  lexicon: HALOT
  rationale: The preposition plus infinitive construct expresses the action under repudiation. English infinitival 'to give' is smooth and accurate in this construction.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the hereditary property
  - the patrimony
  lexicon: HALOT
  rationale: נַחֲלָה in land contexts denotes inherited family possession, not merely generic property. 'Inheritance' preserves both legal and familial force.
- source_word: אֲבֹתַי
  chosen: of my fathers
  alternatives:
  - of my ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers.' Per gender-accurate philosophy, 'fathers' is retained rather than neutralizing to 'ancestors,' while still conveying lineage.
- source_word: לָךְ
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: English idiom after 'give' can omit the preposition while preserving the indirect-object sense. This is a natural rendering of the Hebrew dative.
