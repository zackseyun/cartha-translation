id: 1KI.21.25
reference: 1 Kings 21:25
source:
  edition: WLC
  text: רַ֚ק לֹֽא הָיָ֣ה כְ/אַחְאָ֔ב אֲשֶׁ֣ר הִתְמַכֵּ֔ר לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה אֲשֶׁר הֵסַ֥תָּה אֹת֖/וֹ אִיזֶ֥בֶל אִשְׁתּֽ/וֹ־־׃
translation:
  text: Surely there was no one like Ahab, who sold himself to do what was evil in the sight of Yahweh, because Jezebel his wife incited him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רַק
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Certainly
  lexicon: HALOT
  rationale: Here רַק functions as an asseverative or restrictive particle introducing an emphatic statement rather than a simple 'only.' 'Surely' captures the emphatic force in natural English.
- source_word: לֹא הָיָה כְאַחְאָב
  chosen: there was no one like Ahab
  alternatives:
  - there was none like Ahab
  - no one was like Ahab
  lexicon: HALOT
  rationale: This idiom expresses incomparability. Supplying 'one' makes the English idiomatic while preserving the Hebrew sense that no comparable person existed.
- source_word: הִתְמַכֵּר
  chosen: sold himself
  alternatives:
  - gave himself over
  - devoted himself
  lexicon: HALOT
  rationale: 'The hitpael of מכר is metaphorical: Ahab ''sold himself'' into evil. This vivid image should be preserved rather than flattened into a weaker paraphrase.'
- source_word: לַעֲשׂוֹת הָרַע
  chosen: to do what was evil
  alternatives:
  - to do evil
  - to do the evil
  lexicon: HALOT
  rationale: The infinitive phrase denotes practicing evil. 'To do what was evil' is idiomatic English and preserves the moral evaluation without awkward literalism.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the sight of the LORD' is clear, natural, and preserves the metaphor. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֵסַתָּה
  chosen: incited
  alternatives:
  - stirred up
  - urged on
  - enticed
  lexicon: HALOT
  rationale: The hiphil of סות conveys causing or provoking someone toward an action, often with a negative sense. 'Incited' best fits the context of being urged into evil.
- source_word: אֹתוֹ אִיזֶבֶל אִשְׁתּוֹ
  chosen: whom Jezebel his wife incited
  alternatives:
  - because Jezebel his wife incited him
  - as Jezebel his wife incited him
  lexicon: HALOT
  rationale: 'The relative clause most naturally modifies Ahab: he was the one whom Jezebel incited. Fronting ''whom'' preserves the Hebrew linkage and avoids making Jezebel the primary subject of the verse.'
