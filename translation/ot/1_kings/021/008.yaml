id: 1KI.21.8
reference: 1 Kings 21:8
source:
  edition: WLC
  text: וַ/תִּכְתֹּ֤ב סְפָרִים֙ בְּ/שֵׁ֣ם אַחְאָ֔ב וַ/תַּחְתֹּ֖ם בְּ/חֹתָמ֑/וֹ וַ/תִּשְׁלַ֣ח
    ה/ספרים אֶל הַ/זְקֵנִ֤ים וְ/אֶל הַֽ/חֹרִים֙ אֲשֶׁ֣ר בְּ/עִיר֔/וֹ הַ/יֹּשְׁבִ֖ים
    אֶת נָבֽוֹת־־־׃
translation:
  text: So she wrote letters in Ahab’s name, sealed them with his seal, and sent the
    letters to the elders and the nobles who were in his city, who lived with Naboth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were in Ahab’s city.' The Hebrew suffix in 'his city' could be
      understood to refer either to Naboth or to Ahab.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּכְתֹּב
  chosen: So she wrote
  alternatives:
  - And she wrote
  - Then she wrote
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving sequence; the feminine singular subject refers
    to Jezebel from context.
- source_word: סְפָרִים / הַסְּפָרִים
  chosen: letters / the letters
  alternatives:
  - documents
  - scrolls
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document; in this context of official written
    communication sent to local leaders, 'letters' is the most idiomatic and precise
    English rendering.
- source_word: בְּשֵׁם אַחְאָב
  chosen: in Ahab’s name
  alternatives:
  - under Ahab’s name
  - in the name of Ahab
  lexicon: HALOT
  rationale: This idiom indicates acting under Ahab's authority or representation.
    'In Ahab’s name' is standard English and preserves the sense of official authorization.
- source_word: וַתַּחְתֹּם בְּחֹתָמוֹ
  chosen: sealed them with his seal
  alternatives:
  - signed them with his signet
  - affixed his seal to them
  lexicon: HALOT
  rationale: חתם with חותם refers to sealing a document with an official seal. 'Sealed
    them with his seal' is clear and formally close to the Hebrew.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the city elders
  lexicon: HALOT
  rationale: זקנים commonly refers to civic leaders/elders. 'The elders' is the standard
    rendering; the local setting is supplied by the following phrase.
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the noblesmen
  - the officials
  lexicon: HALOT
  rationale: חֹרִים denotes persons of high status, often nobles or prominent men.
    'Nobles' is the most natural concise rendering in context.
- source_word: אֲשֶׁר בְּעִירוֹ
  chosen: who were in his city
  alternatives:
  - who were in the city
  - who were in his town
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to Naboth in the immediate
    context of the clause's endpoint, yielding 'his city.' This also fits the following
    participle describing those residing with Naboth.
- source_word: הַיֹּשְׁבִים אֶת נָבוֹת
  chosen: who lived with Naboth
  alternatives:
  - who dwelt with Naboth
  - inhabiting the same city as Naboth
  lexicon: HALOT
  rationale: ישב with אֶת can express dwelling with or alongside someone. 'Who lived
    with Naboth' preserves the relational-local sense without over-paraphrasing.
