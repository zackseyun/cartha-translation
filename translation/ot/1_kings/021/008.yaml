theological_decisions:
- issue: Referent of the pronominal suffix in בְּעִירוֹ
  chosen_reading: '''his city'' refers to Naboth'
  alternative_readings:
  - '''his city'' refers to Ahab'
  rationale: The nearest explicit personal referent in the clause is Naboth, and the
    phrase 'the ones living with Naboth' naturally describes local leaders in Naboth's
    city. Rendering it this way best preserves the syntax and narrative setting. The
    alternative is possible because the letters are written in Ahab's name, so it
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive
    tension rather than resolve it silently'
