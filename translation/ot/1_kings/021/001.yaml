id: 1KI.21.1
reference: 1 Kings 21:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה כֶּ֧רֶם הָיָ֛ה לְ/נָב֥וֹת הַ/יִּזְרְעֵאלִ֖י
    אֲשֶׁ֣ר בְּ/יִזְרְעֶ֑אל אֵ֚צֶל הֵיכַ֣ל אַחְאָ֔ב מֶ֖לֶךְ שֹׁמְרֽוֹן׃
translation:
  text: Now after these things, Naboth the Jezreelite had a vineyard in Jezreel, beside
    the palace of Ahab king of Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was a vineyard belonging to Naboth the Jezreelite.' The Hebrew
      expresses possession with 'there was ... to Naboth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative episode. 'Now'
    preserves the discourse function in natural modern English without the archaic
    feel of 'it came to pass.'
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: after these things
  alternatives:
  - after these events
  - after this
  lexicon: HALOT
  rationale: A standard temporal transition formula. 'After these things' is slightly
    more formal and closely reflects the Hebrew plural while remaining natural.
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vineyard plot
  lexicon: HALOT
  rationale: The normal sense of כרם is 'vineyard.' No expansion beyond the source
    is needed.
- source_word: הָיָה לְנָבוֹת
  chosen: Naboth ... had
  alternatives:
  - there was a vineyard belonging to Naboth
  - a vineyard belonged to Naboth
  lexicon: HALOT
  rationale: 'The Hebrew existential/possessive construction literally means ''a vineyard
    was to Naboth.'' English idiom is best expressed as possession: ''Naboth ... had
    a vineyard.'''
- source_word: נָבוֹת
  chosen: Naboth
  rationale: Personal name transliterated by standard English convention.
- source_word: הַיִּזְרְעֵאלִי
  chosen: the Jezreelite
  alternatives:
  - of Jezreel
  lexicon: HALOT
  rationale: The gentilic identifies Naboth by origin or association with Jezreel.
    'The Jezreelite' is the most direct rendering.
- source_word: אֲשֶׁר בְּיִזְרְעֶאל
  chosen: in Jezreel
  alternatives:
  - which was in Jezreel
  lexicon: HALOT
  rationale: This relative clause locates the vineyard. In English, the clause can
    be smoothed to 'in Jezreel' without loss of meaning.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - near
  lexicon: HALOT
  rationale: אצל denotes proximity. 'Beside' is concise and suitably formal; 'near'
    is possible but less exact.
- source_word: הֵיכַל
  chosen: palace
  alternatives:
  - house
  - hall
  lexicon: HALOT
  rationale: In royal context היכל refers to a palace or royal residence rather than
    a temple. 'Palace' best fits Ahab's residence here.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name transliterated by standard English convention.
- source_word: מֶלֶךְ שֹׁמְרוֹן
  chosen: king of Samaria
  alternatives:
  - the king of Samaria
  lexicon: HALOT
  rationale: The construct phrase identifies Ahab's royal domain. English apposition
    naturally renders it as 'Ahab king of Samaria' without adding an article.
