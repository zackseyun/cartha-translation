id: 1KI.21.17
reference: 1 Kings 21:17
source:
  edition: WLC
  text: וַ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל אֵלִיָּ֥הוּ הַ/תִּשְׁבִּ֖י לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Elijah the Tishbite, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it happened, the word of the LORD came to Elijah the Tishbite, saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, 'Then ... came' preserves the temporal progression naturally without
    archaic phrasing like 'it came to pass.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Word' preserves the conventional
    and theological force of divine revelation better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English Bible
    convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: In this context of speech/revelation directed to a person, 'to' is the
    natural English equivalent.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַתִּשְׁבִּי
  chosen: the Tishbite
  alternatives:
  - the man from Tishbe
  lexicon: HALOT
  rationale: The gentilic/title is conventionally rendered 'the Tishbite.' This preserves
    the compact Hebrew designation without over-expanding it.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive introduces the content of the divine speech in the next
    verse. 'Saying' is the most direct and formally transparent rendering.
