id: 1KI.21.18
reference: 1 Kings 21:18
source:
  edition: WLC
  text: ק֣וּם רֵ֗ד לִ/קְרַ֛את אַחְאָ֥ב מֶֽלֶךְ יִשְׂרָאֵ֖ל אֲשֶׁ֣ר בְּ/שֹׁמְר֑וֹן
    הִנֵּה֙ בְּ/כֶ֣רֶם נָב֔וֹת אֲשֶׁר יָ֥רַד שָׁ֖ם לְ/רִשְׁתּֽ/וֹ־־׃
translation:
  text: Arise, go down to meet Ahab king of Israel, who is in Samaria. Look, he is
    in the vineyard of Naboth, where he has gone down to take possession of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to possess it.' The Hebrew verb can denote taking possession, possessing,
      or inheriting, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום meaning to rise/get up. 'Arise' preserves the brisk
    prophetic command register better than the more colloquial 'get up.'
- source_word: רֵד
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: Imperative of ירד. 'Go down' is idiomatic modern English and preserves
    the directional sense present in the Hebrew.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to confront
  - toward
  lexicon: HALOT
  rationale: The preposition + infinitive commonly means 'to meet' or 'to encounter.'
    'Confront' would overinterpret the purpose; 'to meet' leaves the encounter itself
    primary.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward royal title in construct; translated directly.
- source_word: אֲשֶׁר בְּשֹׁמְרוֹן
  chosen: who is in Samaria
  alternatives:
  - who is at Samaria
  - who is in Samaria city
  lexicon: HALOT
  rationale: Relative clause identifying Ahab's location. Although the Hebrew is verbless,
    English naturally supplies 'is.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and preserves the immediacy without archaic tone.
- source_word: בְּכֶרֶם נָבוֹת
  chosen: in the vineyard of Naboth
  alternatives:
  - at Naboth's vineyard
  lexicon: HALOT
  rationale: ב marks location; 'in the vineyard of Naboth' is the most direct rendering.
- source_word: אֲשֶׁר יָרַד שָׁם
  chosen: where he has gone down
  alternatives:
  - to which he went down there
  - where he went down
  lexicon: HALOT
  rationale: Relative clause referring to the vineyard. Perfect verb can be rendered
    as English present perfect in context to connect his prior descent with his current
    presence there.
- source_word: לְרִשְׁתּוֹ
  chosen: to take possession of it
  alternatives:
  - to possess it
  - to seize it
  - to inherit it
  lexicon: HALOT
  rationale: From ירשׁ, which can mean possess/inherit/dispossess depending on context.
    Here Ahab is going to occupy and claim the vineyard as his own after Naboth's
    death; 'take possession of it' best captures the concrete legal-possessive sense
    without importing more violence than the verb itself states.
