id: 1KI.21.4
reference: 1 Kings 21:4
source:
  edition: WLC
  text: וַ/יָּבֹא֩ אַחְאָ֨ב אֶל בֵּית֜/וֹ סַ֣ר וְ/זָעֵ֗ף עַל הַ/דָּבָר֙ אֲשֶׁר דִּבֶּ֣ר
    אֵלָ֗י/ו נָבוֹת֙ הַ/יִּזְרְעֵאלִ֔י וַ/יֹּ֕אמֶר לֹֽא אֶתֵּ֥ן לְ/ךָ֖ אֶת נַחֲלַ֣ת
    אֲבוֹתָ֑/י וַ/יִּשְׁכַּב֙ עַל מִטָּת֔/וֹ וַ/יַּסֵּ֥ב אֶת פָּנָ֖י/ו וְ/לֹֽא אָ֥כַל
    לָֽחֶם־־־־־־־־׃
translation:
  text: So Ahab went into his house sullen and angry because of the word that Naboth
    the Jezreelite had spoken to him, when he said, “I will not give you the inheritance
    of my fathers.” And he lay down on his bed and turned his face away, and he would
    not eat bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of what Naboth the Jezreelite had said to him.” The Hebrew word
      can mean “word,” “matter,” or “thing.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “the inheritance of my ancestors.” Hebrew: “my fathers.”'
    reason: lexical_alternative
  - marker: c
    text: Hebrew “eat bread,” an idiom that can mean taking food generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַר
  chosen: sullen
  alternatives:
  - resentful
  - morose
  - vexed
  lexicon: HALOT
  rationale: In this context describing Ahab's mood, the adjective conveys a stubbornly
    ill-tempered, withdrawn state. 'Sullen' pairs naturally with the following וְזָעֵף
    and matches the narrative portrayal better than the more archaic 'vexed.'
- source_word: וְזָעֵף
  chosen: angry
  alternatives:
  - resentful
  - irritated
  - vexed
  lexicon: HALOT
  rationale: The term denotes being upset or embittered in countenance/disposition.
    'Angry' is clear modern English and preserves the emotional force without archaism.
- source_word: עַל הַדָּבָר אֲשֶׁר דִּבֶּר אֵלָיו
  chosen: because of the word that ... had spoken to him
  alternatives:
  - because of the thing that ... had said to him
  - over what ... had said to him
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to Naboth's
    statement. 'Because of the word that ... had spoken to him' stays close to the
    Hebrew while remaining idiomatic.
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  chosen: Naboth the Jezreelite
  rationale: Personal name is transliterated; gentilicial title is translated in standard
    English form.
- source_word: לֹא אֶתֵּן לְךָ אֶת נַחֲלַת אֲבוֹתָי
  chosen: I will not give you the inheritance of my fathers
  alternatives:
  - I will not give you my ancestral inheritance
  - I will not give you the inheritance of my ancestors
  lexicon: HALOT
  rationale: נחלה is more than generic property; it is inherited family land. 'Inheritance
    of my fathers' preserves the covenantal/familial sense and the masculine plural
    in the source.
- source_word: אֲבוֹתָי
  chosen: my fathers
  alternatives:
  - my ancestors
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is retained. 'Ancestors'
    is possible but smooths over the source's male-line inheritance language.
- source_word: וַיִּשְׁכַּב עַל מִטָּתוֹ
  chosen: he lay down on his bed
  alternatives:
  - he lay on his bed
  lexicon: HALOT
  rationale: The verb with על naturally describes lying down upon the bed. 'Lay down'
    better reflects the ingressive narrative action.
- source_word: וַיַּסֵּב אֶת פָּנָיו
  chosen: turned his face away
  alternatives:
  - turned his face
  - turned away his face
  lexicon: HALOT
  rationale: The idiom implies petulant withdrawal rather than mere physical movement.
    'Turned his face away' communicates the gesture idiomatically.
- source_word: וְלֹא אָכַל לָחֶם
  chosen: he would not eat bread
  alternatives:
  - he did not eat bread
  - he would not eat food
  lexicon: HALOT
  rationale: לחם literally means 'bread,' but can stand metonymically for food. The
    literal 'bread' is retained because it is natural enough in English biblical narrative
    and preserves the Hebrew expression; 'would not' captures his refusal rather than
    mere non-occurrence.
