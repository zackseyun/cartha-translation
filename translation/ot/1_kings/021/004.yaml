theological_decisions:
- issue: Gendered ancestral language in Naboth's quotation
  chosen_reading: my fathers
  alternative_readings:
  - my ancestors
  rationale: The Hebrew explicitly uses the masculine plural אבות. In this land-inheritance
    context, retaining 'fathers' preserves the source's familial and patrimonial emphasis
    rather than neutralizing it.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
