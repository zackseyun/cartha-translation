id: 1KI.21.29
reference: 1 Kings 21:29
source:
  edition: WLC
  text: הֲֽ/רָאִ֔יתָ כִּֽי נִכְנַ֥ע אַחְאָ֖ב מִ/לְּ/פָנָ֑/י יַ֜עַן כִּֽי נִכְנַ֣ע
    מִ/פָּנַ֗/י לֹֽא אבי הָֽ/רָעָה֙ בְּ/יָמָ֔י/ו בִּ/ימֵ֣י בְנ֔/וֹ אָבִ֥יא הָ/רָעָ֖ה
    עַל בֵּיתֽ/וֹ־־־־׃
translation:
  text: Have you seen that Ahab has humbled himself before me? Because he has humbled
    himself before me, I will not bring the disaster in his days; in his son's days
    I will bring the disaster on his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity'; Hebrew 'the evil/disaster.' In this judgment context the
      word refers to punitive disaster, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: '''On his house'' can mean on his household or dynasty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרָאִיתָ
  chosen: Have you seen
  alternatives:
  - Do you see
  - Have you noticed
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה used in a direct divine question to Elijah. English
    present perfect preserves the completed observation with present relevance better
    than a simple present.
- source_word: נִכְנַע
  chosen: has humbled himself
  alternatives:
  - has humbled himself in submission
  - has submitted himself
  - has become humble
  lexicon: HALOT
  rationale: The Niphal of כנע here denotes self-humbling/submission in response to
    divine judgment. 'Has humbled himself' is idiomatic and preserves the reflexive
    sense without overinterpreting repentance beyond the text.
- source_word: מִלְּפָנַי / מִפָּנַי
  chosen: before me
  alternatives:
  - from before me
  - in my presence
  lexicon: HALOT
  rationale: Though literally 'from before my face/presence,' the idiom in this context
    expresses posture before God. 'Before me' is natural English and captures the
    relational sense.
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Since
  - Because indeed
  lexicon: HALOT
  rationale: This conjunction gives the reason for the announced delay of judgment.
    'Because' is the clearest modern rendering.
- source_word: לֹא אָבִיא
  chosen: I will not bring
  alternatives:
  - I will not cause to come
  - I will not bring about
  lexicon: HALOT
  rationale: Hiphil of בוא with רָעָה as object means to bring or bring about. 'I
    will not bring' is concise and natural.
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: In judgment contexts רָעָה commonly refers to calamity/disaster rather
    than moral evil. 'Disaster' communicates punitive catastrophe without implying
    moral evil in God.
- source_word: בְּיָמָיו
  chosen: in his days
  alternatives:
  - during his lifetime
  lexicon: HALOT
  rationale: Literal temporal idiom retained in readable English. It refers to Ahab's
    lifetime.
- source_word: בִּימֵי בְנוֹ
  chosen: in his son's days
  alternatives:
  - during his son's lifetime
  - in the days of his son
  lexicon: HALOT
  rationale: Temporal phrase parallel to 'in his days.' 'In his son's days' preserves
    the Hebrew structure and contrast.
- source_word: עַל בֵּיתוֹ
  chosen: on his house
  alternatives:
  - against his house
  - upon his dynasty
  lexicon: HALOT
  rationale: '''House'' in royal contexts can imply dynasty/household. The main text
    keeps the concrete Hebrew ''house''; the dynastic implication is left implicit
    rather than expanded.'
