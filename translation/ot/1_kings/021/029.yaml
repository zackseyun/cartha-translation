theological_decisions:
- issue: Nature of Ahab's response
  chosen_reading: Render נכנע as 'has humbled himself' without explicitly calling
    it repentance.
  alternative_readings:
  - has repented
  - has submitted
  rationale: The verse states that Ahab humbled himself before God, and God therefore
    delays judgment. The text does not explicitly use standard repentance vocabulary,
    so the translation preserves the stated action without importing a fuller theological
    conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of רָעָה when brought by God
  chosen_reading: Translate as 'disaster' rather than 'evil.'
  alternative_readings:
  - evil
  - calamity
  rationale: This avoids suggesting moral evil in God while accurately reflecting
    judicial calamity announced against Ahab's house. The context is punitive judgment,
    not moral wrongdoing by God.
