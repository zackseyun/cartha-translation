id: 1KI.21.16
reference: 1 Kings 21:16
source:
  edition: WLC
  text: וַ/יְהִ֛י כִּ/שְׁמֹ֥עַ אַחְאָ֖ב כִּ֣י מֵ֣ת נָב֑וֹת וַ/יָּ֣קָם אַחְאָ֗ב לָ/רֶ֛דֶת
    אֶל כֶּ֛רֶם נָב֥וֹת הַ/יִּזְרְעֵאלִ֖י לְ/רִשְׁתּֽ/וֹ־׃ס
translation:
  text: And when Ahab heard that Naboth was dead, Ahab arose to go down to the vineyard
    of Naboth the Jezreelite, to take possession of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had died.' The Hebrew can be rendered either as a resulting state ('was
      dead') or as the completed event ('had died').
    reason: lexical_alternative
  - marker: b
    text: Or 'to possess it' or 'to inherit it.' The Hebrew verb can denote taking
      possession, possessing, or inheriting, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative transition. In modern
    English, a simple 'And' with the following temporal clause conveys the discourse
    function without archaic stiffness.
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - upon hearing
  - as soon as ... heard
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע introduces a temporal
    clause. 'When Ahab heard' is natural English and preserves the sequence without
    overstating immediacy.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Ahab heard, so 'that' best reflects
    the clause function.
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  - died
  lexicon: HALOT
  rationale: The qatal of מות reports Naboth's state/result as heard by Ahab. 'Was
    dead' closely matches the Hebrew and fits the reported information; 'had died'
    is possible but slightly shifts toward event rather than resultant state.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: קום in narrative often marks decisive movement. 'Arose' preserves the
    formal narrative tone better than the colloquial 'got up,' while avoiding interpretive
    expansion like 'set out.'
- source_word: לָרֶדֶת
  chosen: to go down
  alternatives:
  - to go
  - to descend
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Go down' preserves the directional
    nuance present in the Hebrew narrative.
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vineyard plot
  lexicon: HALOT
  rationale: The standard sense is 'vineyard.' No expansion is needed.
- source_word: הַיִּזְרְעֵאלִי
  chosen: the Jezreelite
  alternatives:
  - of Jezreel
  lexicon: HALOT
  rationale: The gentilic adjective identifies Naboth by origin or residence. 'The
    Jezreelite' is the most direct equivalent.
- source_word: לְרִשְׁתּוֹ
  chosen: to take possession of it
  alternatives:
  - to possess it
  - to seize it
  - to inherit it
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, inherit, or take possession depending
    on context. Here Ahab goes to claim Naboth's vineyard after Naboth's death; 'to
    take possession of it' captures the act of assuming control without importing
    the stronger violence of 'seize' into the verb itself, since the injustice is
    already established by context.
