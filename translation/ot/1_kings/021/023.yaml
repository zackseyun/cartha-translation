theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of לְאִיזֶבֶל with דִּבֶּר
  chosen_reading: concerning Jezebel
  alternative_readings:
  - to Jezebel
  - against Jezebel
  rationale: This avoids implying that Jezebel herself was the direct addressee of
    the speech event. In the narrative context, Elijah is recounting a divine pronouncement
    about her judgment.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, Original-language primacy
    over translation tradition
- issue: Interpretation of בְּחֵל יִזְרְעֶאל
  chosen_reading: in the territory of Jezreel
  alternative_readings:
  - by the rampart of Jezreel
  - in the outer wall area of Jezreel
  rationale: The Hebrew noun is lexically uncertain in this context. The main text
    preserves a clear locative judgment statement in readable English without claiming
    more precision than the evidence warrants; a footnote preserves the more architectural
    alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological
    tension rather than resolve it
