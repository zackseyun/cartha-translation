id: 1KI.21.23
reference: 1 Kings 21:23
source:
  edition: WLC
  text: וְ/גַ֨ם לְ/אִיזֶ֔בֶל דִּבֶּ֥ר יְהוָ֖ה לֵ/אמֹ֑ר הַ/כְּלָבִ֛ים יֹאכְל֥וּ אֶת
    אִיזֶ֖בֶל בְּ/חֵ֥ל יִזְרְעֶֽאל־־׃
translation:
  text: And also concerning Jezebel, the LORD spoke, saying, ‘The dogs will eat Jezebel
    in the territory of Jezreel.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by the rampart of Jezreel.” The Hebrew term here is difficult and may
      refer more specifically to the fortified outer area of the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Coordinates this statement with the preceding judgment and preserves
    the additive force of גַם with the conjunction.
- source_word: לְאִיזֶבֶל
  chosen: concerning Jezebel
  alternatives:
  - to Jezebel
  - against Jezebel
  lexicon: HALOT
  rationale: The preposition ל with דבר can mark the person/topic spoken about. In
    context Elijah is reporting YHWH's oracle about Jezebel, not narrating direct
    speech to her.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD spoke
  alternatives:
  - the LORD said
  - the LORD declared
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal clause; 'spoke' keeps the formal
    link with the infinitive לֵאמֹר that follows.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard introduction to quoted speech; natural and transparent in English.
- source_word: הַכְּלָבִים
  chosen: the dogs
  alternatives:
  - dogs
  lexicon: HALOT
  rationale: The article is present in Hebrew and can be retained naturally in English.
- source_word: יֹאכְלוּ
  chosen: will eat
  alternatives:
  - shall eat
  - will devour
  lexicon: HALOT
  rationale: Simple future sense fits the prophetic judgment. 'Eat' is the plain lexical
    value; 'devour' would heighten the diction beyond the source.
- source_word: אֶת אִיזֶבֶל
  chosen: Jezebel
  lexicon: HALOT
  rationale: Direct-object marking has no separate English equivalent; the object
    is represented by normal English word order.
- source_word: בְּחֵל יִזְרְעֶאל
  chosen: in the territory of Jezreel
  alternatives:
  - by the rampart of Jezreel
  - in the portion of Jezreel
  - in the area of Jezreel
  lexicon: HALOT
  rationale: חֵל is a difficult term here. It can denote a rampart/outer fortification
    area, but in this context many English readers would misconstrue a highly technical
    term. 'Territory' captures the locative sense without overcommitting to a narrow
    architectural reconstruction, while preserving that the event occurs at Jezreel.
