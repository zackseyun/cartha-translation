id: 1KI.21.26
reference: 1 Kings 21:26
source:
  edition: WLC
  text: וַ/יַּתְעֵ֣ב מְאֹ֔ד לָ/לֶ֖כֶת אַחֲרֵ֣י הַ/גִּלֻּלִ֑ים כְּ/כֹל֙ אֲשֶׁ֣ר עָשׂ֣וּ הָ/אֱמֹרִ֔י אֲשֶׁר֙ הוֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל׃ס
translation:
  text: He acted very abominably by going after idols, according to all that the Amorites had done, whom Yahweh drove out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלֻּלִים is a strongly contemptuous term for idols; alternatively, 'detestable idols' or more literally 'dung-idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּתְעֵב
  chosen: acted very abominably
  alternatives:
  - became very abominable
  - did abominably
  - committed abominations
  lexicon: HALOT
  rationale: The verb תעב in the Hithpael/waw-consecutive verbal form here describes conduct that is abhorrent or abominable. 'Acted very abominably' preserves the verbal force and moral evaluation better than the more stative 'became abominable.'
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier; 'very' is natural modern English and adequately conveys the emphasis.
- source_word: לָלֶכֶת אַחֲרֵי
  chosen: by going after
  alternatives:
  - in going after
  - to go after
  - by following
  lexicon: HALOT
  rationale: The infinitive construct with ל plus אַחֲרֵי expresses the manner/sphere of his abominable action. 'By going after' is idiomatic and preserves the Hebrew metaphor of pursuing allegiance.
- source_word: הַגִּלֻּלִים
  chosen: idols
  alternatives:
  - dung-idols
  - detestable idols
  lexicon: HALOT
  rationale: גִּלֻּלִים is a strongly pejorative term for idols. 'Idols' is the clearest main-text rendering in readable English; the stronger pejorative nuance is worth preserving in a footnote rather than overloading the line with an unusual expression like 'dung-idols.'
- source_word: כְּכֹל אֲשֶׁר עָשׂוּ
  chosen: just as all ... had done
  alternatives:
  - according to all that ... did
  - like everything that ... did
  lexicon: HALOT
  rationale: This comparative phrase links Ahab's conduct with that of the Amorites. 'Just as all ... had done' is idiomatic and preserves the comparison.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: 'Although morphologically singular, the noun functions collectively here for the pre-Israelite inhabitants. English naturally renders the collective as plural: ''the Amorites.'''
- source_word: הוֹרִישׁ
  chosen: drove out
  alternatives:
  - dispossessed
  - expelled
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ here refers to causing prior inhabitants to lose possession of the land. 'Drove out' is natural and fits the conquest context; 'dispossessed' is more formal but less readable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: In this context the preposition indicates removal from before Israel. 'Before' is concise and idiomatic in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate principle, this is retained in the main text rather than neutralized to 'Israelites,' though a more idiomatic alternative is worth noting in a footnote.
