id: 1KI.21.11
reference: 1 Kings 21:11
source:
  edition: WLC
  text: וַ/יַּעֲשׂוּ֩ אַנְשֵׁ֨י עִיר֜/וֹ הַ/זְּקֵנִ֣ים וְ/הַ/חֹרִ֗ים אֲשֶׁ֤ר הַ/יֹּֽשְׁבִים֙
    בְּ/עִיר֔/וֹ כַּ/אֲשֶׁ֛ר שָׁלְחָ֥ה אֲלֵי/הֶ֖ם אִיזָ֑בֶל כַּ/אֲשֶׁ֤ר כָּתוּב֙ בַּ/סְּפָרִ֔ים
    אֲשֶׁ֥ר שָׁלְחָ֖ה אֲלֵי/הֶֽם׃
translation:
  text: So the men of his city—the elders and the nobles who lived in his city—did
    as Jezebel had sent word to them, as it was written in the letters that she had
    sent to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dignitaries'; the Hebrew term for 'nobles' can denote socially prominent
      men or officials of high rank.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Common verb עשה here introduces compliance with Jezebel's instructions.
    'Did' is the most natural English equivalent and preserves the straightforward
    narrative force.
- source_word: אַנְשֵׁי עִירוֹ
  chosen: the men of his city
  alternatives:
  - the people of his city
  - the citizens of his city
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Because the following apposition specifies
    male civic leaders ('the elders and the nobles'), the gendered rendering 'men'
    is appropriate rather than a neutral collective.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the older men
  lexicon: HALOT
  rationale: In civic context this denotes recognized community leaders, not merely
    elderly males. 'Elders' is the standard and contextually accurate rendering.
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the dignitaries
  - the free men
  lexicon: HALOT
  rationale: In this administrative setting חֹרִים refers to persons of high social
    standing or rank. 'Nobles' best fits the civic-judicial context. 'Free men' is
    lexically possible in some contexts but is less suitable here.
- source_word: הַיֹּשְׁבִים בְּעִירוֹ
  chosen: who lived in his city
  alternatives:
  - who were dwelling in his city
  - who sat in his city
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell.' Here it identifies those resident in
    the city. 'Who lived in his city' is idiomatic modern English and preserves the
    sense.
- source_word: כַּאֲשֶׁר שָׁלְחָה אֲלֵיהֶם אִיזָבֶל
  chosen: as Jezebel had sent word to them
  alternatives:
  - as Jezebel had sent to them
  - according to what Jezebel had sent them
  lexicon: HALOT
  rationale: Since the object of שלחה is implicit and clarified by the later mention
    of letters, 'sent word' makes explicit that a message/instruction was sent without
    overparaphrasing.
- source_word: כָּתוּב בַּסְּפָרִים
  chosen: as it was written in the letters
  alternatives:
  - as was written in the documents
  - as written in the scrolls
  lexicon: HALOT
  rationale: סְפָרִים here refers to written correspondence just sent by Jezebel,
    so 'letters' is more precise than the broader 'documents' or 'scrolls.' The passive
    participle כָּתוּב is naturally rendered 'it was written.'
- source_word: אֲשֶׁר שָׁלְחָה אֲלֵיהֶם
  chosen: that she had sent to them
  alternatives:
  - which she had sent to them
  lexicon: HALOT
  rationale: This relative clause identifies the letters. 'That she had sent to them'
    is natural English and preserves the antecedent relationship.
