id: 1KI.21.6
reference: 1 Kings 21:6
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אֵלֶ֗י/הָ כִּֽי אֲ֠דַבֵּר אֶל נָב֨וֹת הַ/יִּזְרְעֵאלִ֜י וָ/אֹ֣מַר
    ל֗/וֹ תְּנָ/ה לִּ֤/י אֶֽת כַּרְמְ/ךָ֙ בְּ/כֶ֔סֶף א֚וֹ אִם חָפֵ֣ץ אַתָּ֔ה אֶתְּנָה
    לְ/ךָ֥ כֶ֖רֶם תַּחְתָּ֑י/ו וַ/יֹּ֕אמֶר לֹֽא אֶתֵּ֥ן לְ/ךָ֖ אֶת כַּרְמִֽ/י־־־־־־־־׃
translation:
  text: And he spoke to her, because I spoke to Naboth the Jezreelite and said to
    him, ‘Give me your vineyard for silver, or, if you prefer, I will give you a vineyard
    in place of it,’ but he said, ‘I will not give you my vineyard.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for money.” The Hebrew is literally “for silver.”
    reason: lexical_alternative
  - marker: b
    text: Or “if you are willing” / “if it pleases you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלֶיהָ
  chosen: And he spoke to her
  alternatives:
  - And he said to her
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' Since direct speech is not introduced
    until the following כִּי clause, 'spoke to her' preserves the narrative flow more
    closely than collapsing it into 'said to her,' though the latter is possible in
    English.
- source_word: כִּי
  chosen: because
  alternatives:
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Ahab's speaking to Jezebel in the
    previous clause. 'Because' best fits the explanatory sense in context. 'That'
    is possible in some translations but is less natural and less explicit about the
    causal relation.
- source_word: אֲדַבֵּר
  chosen: I spoke
  alternatives:
  - I was speaking
  - I said
  lexicon: HALOT
  rationale: Although formally imperfect, in this reported explanation it functions
    naturally as a past reference in English. 'I spoke' keeps the verbal distinction
    from the following וָאֹמַר ('and said') without overcomplicating the English.
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  chosen: Naboth the Jezreelite
  lexicon: HALOT
  rationale: Standard transliteration of the personal name and gentilic/title. 'Jezreelite'
    accurately renders the adjectival form indicating origin or association with Jezreel.
- source_word: תְּנָה לִּי אֶת כַּרְמְךָ
  chosen: Give me your vineyard
  alternatives:
  - Give your vineyard to me
  lexicon: HALOT
  rationale: Imperative plus indirect object is naturally rendered 'Give me your vineyard.'
    This preserves the directness of Ahab's request.
- source_word: בְּכֶסֶף
  chosen: for silver
  alternatives:
  - for money
  lexicon: HALOT
  rationale: The Hebrew literally says 'for silver.' Retaining 'silver' preserves
    the concrete economic language of the source, while still being understandable
    in modern English.
- source_word: א֚וֹ אִם חָפֵץ אַתָּה
  chosen: or, if you prefer
  alternatives:
  - or, if it is pleasing to you
  - or, if you are willing
  lexicon: HALOT
  rationale: חָפֵץ conveys desire, willingness, or pleasure. 'If you prefer' is idiomatic
    modern English that captures the conditional offer without sounding wooden.
- source_word: אֶתְּנָה לְךָ כֶרֶם תַּחְתָּיו
  chosen: I will give you a vineyard in place of it
  alternatives:
  - I will give you another vineyard for it
  - I will give you a vineyard instead of it
  lexicon: HALOT
  rationale: תַּחְתָּיו here indicates substitution. 'In place of it' is a clear and
    fairly formal rendering that preserves the exchange idea without adding 'another,'
    which is implied but not explicit.
- source_word: וַיֹּאמֶר לֹא אֶתֵּן לְךָ אֶת כַּרְמִי
  chosen: but he said, ‘I will not give you my vineyard.’
  alternatives:
  - and he said, ‘I will not give you my vineyard.’
  lexicon: HALOT
  rationale: The Hebrew waw-consecutive can be rendered simply 'and,' but in English
    'but' better conveys the adversative force of Naboth's refusal in response to
    Ahab's offer. The direct speech is kept straightforward and emphatic.
