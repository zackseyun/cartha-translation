id: 1KI.21.22
reference: 1 Kings 21:22
source:
  edition: WLC
  text: וְ/נָתַתִּ֣י אֶת בֵּיתְ/ךָ֗ כְּ/בֵית֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט וּ/כְ/בֵ֖ית בַּעְשָׁ֣א
    בֶן אֲחִיָּ֑ה אֶל הַ/כַּ֨עַס֙ אֲשֶׁ֣ר הִכְעַ֔סְתָּ וַֽ/תַּחֲטִ֖א אֶת יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And I will make your house like the house of Jeroboam son of Nebat and like
    the house of Baasha son of Ahijah, because of the provocation with which you have
    provoked me and caused Israel to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dynasty.' Hebrew 'house' here refers to Ahab's royal line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will make
  alternatives:
  - and I will give
  - and I will set
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this judgment formula with 'your house'
    and comparison to destroyed dynasties, idiomatic English is better served by 'make,'
    conveying the resulting state of Ahab's house.
- source_word: בֵּיתְךָ
  chosen: your house
  alternatives:
  - your dynasty
  - your household
  lexicon: HALOT
  rationale: בַּיִת can denote a physical house, household, or dynasty. In royal judgment
    contexts comparing one king's 'house' to prior exterminated royal lines, 'house'
    preserves the Hebrew metaphor while naturally implying dynasty.
- source_word: כְּבֵית ... וּכְבֵית
  chosen: like the house of ... and like the house of
  alternatives:
  - as the house of ... and as the house of
  lexicon: HALOT
  rationale: כְ marks comparison. 'Like' is the most natural modern English rendering
    here.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  rationale: Personal names are transliterated; 'son of' is retained as the standard
    Hebrew patronymic formula.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  chosen: Baasha son of Ahijah
  alternatives:
  - Baasha the son of Ahijah
  rationale: Personal names are transliterated; the patronymic is translated straightforwardly.
- source_word: אֶל הַכַּעַס
  chosen: because of the provocation
  alternatives:
  - for the anger
  - for the provocation
  - on account of the offense
  lexicon: HALOT
  rationale: The preposition אֶל in this construction is idiomatic and introduces
    the ground for judgment. הַכַּעַס derives from כעס and denotes provocation to
    anger rather than merely the emotion 'anger'; 'because of the provocation' best
    captures the causal sense in context.
- source_word: אֲשֶׁר הִכְעַסְתָּ
  chosen: with which you have provoked me
  alternatives:
  - that you have caused
  - by which you have provoked
  lexicon: HALOT
  rationale: The Hiphil of כעס means 'to provoke to anger.' The object 'me' is implicit
    from context and required in English for clarity, since the offense is against
    the LORD speaking through Elijah.
- source_word: וַתַּחֲטִא אֶת יִשְׂרָאֵל
  chosen: and caused Israel to sin
  alternatives:
  - and made Israel sin
  - and led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא means to cause someone to sin. 'Caused Israel to sin'
    is a clear and fairly formal rendering; 'made Israel sin' is possible but slightly
    harsher in English.
