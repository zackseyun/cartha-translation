theological_decisions:
- issue: Supplying the implicit divine object in 'you have provoked'
  chosen_reading: Explicitly render 'me' in English
  alternative_readings:
  - 'leave the object implicit: ''you have provoked'''
  rationale: Although the Hebrew clause does not state the object overtly, the speaker
    is the LORD and the idiom clearly refers to provoking him. Supplying 'me' avoids
    awkward English and does not add a new theological claim beyond what the context
    makes explicit.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering בֵּית ('house') in a royal judgment oracle
  chosen_reading: Retain 'house' rather than replacing it with 'dynasty' in the main
    text
  alternative_readings:
  - your dynasty
  - your household
  rationale: The Hebrew metaphor is important and intelligible in English, especially
    in a context of royal lineage. Retaining 'house' preserves the literary and theological
    resonance of covenantal/judgment language while remaining readable.
  doctrine_reference: Translation philosophy §1, §5
