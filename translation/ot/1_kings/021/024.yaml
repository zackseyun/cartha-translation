id: 1KI.21.24
reference: 1 Kings 21:24
source:
  edition: WLC
  text: הַ/מֵּ֤ת לְ/אַחְאָב֙ בָּ/עִ֔יר יֹאכְל֖וּ הַ/כְּלָבִ֑ים וְ/הַ/מֵּת֙ בַּ/שָּׂדֶ֔ה
    יֹאכְל֖וּ ע֥וֹף הַ/שָּׁמָֽיִם׃
translation:
  text: Anyone belonging to Ahab who dies in the city the dogs will eat, and anyone
    who dies in the field the birds of the sky will eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the one dead/of Ahab'; the expression means anyone belonging
      to Ahab's house who dies.
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת
  chosen: anyone ... who dies
  alternatives:
  - the one who dies
  - the dead one
  lexicon: HALOT
  rationale: The participle of מות with the article functions generically here, referring
    to any member of Ahab's house/line who dies, not a single specific corpse. English
    idiom is clearer with an indefinite-generic expression.
- source_word: לְאַחְאָב
  chosen: belonging to Ahab
  alternatives:
  - of Ahab
  - for Ahab
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/possession: those associated with
    or belonging to Ahab''s household/dynasty. ''Belonging to Ahab'' makes the sense
    explicit in natural English.'
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Straightforward locative use.
- source_word: יֹאכְלוּ
  chosen: will eat
  alternatives:
  - will devour
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat.' 'Devour' is possible for vividness,
    but 'eat' preserves the lexical form and the grim force remains clear from context.
- source_word: הַכְּלָבִים
  chosen: the dogs
  lexicon: HALOT
  rationale: Literal rendering; the image is one of disgraceful postmortem consumption.
- source_word: וְהַמֵּת
  chosen: and anyone who dies
  alternatives:
  - and the one who dies
  - and the dead one
  lexicon: HALOT
  rationale: Same generic participial construction as the first clause; repeated similarly
    in English for parallelism.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: Literal locative rendering. 'Field' preserves the Hebrew image and the
    city/field contrast.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds
  lexicon: HALOT
  rationale: A common Hebrew expression for birds. 'Of the sky' is natural modern
    English and preserves the genitive image more closely than simply 'birds'.
