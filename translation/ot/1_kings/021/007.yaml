id: 1KI.21.7
reference: 1 Kings 21:7
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר אֵלָי/ו֙ אִיזֶ֣בֶל אִשְׁתּ֔/וֹ אַתָּ֕ה עַתָּ֛ה תַּעֲשֶׂ֥ה מְלוּכָ֖ה
    עַל יִשְׂרָאֵ֑ל ק֤וּם אֱכָל לֶ֨חֶם֙ וְ/יִטַ֣ב לִבֶּ֔/ךָ אֲנִי֙ אֶתֵּ֣ן לְ/ךָ֔
    אֶת כֶּ֖רֶם נָב֥וֹת הַ/יִּזְרְעֵאלִֽי־־־׃
translation:
  text: Then Jezebel his wife said to him, “Are you now exercising kingship over Israel?
    Get up, eat bread, and let your heart be cheerful; I will give you the vineyard
    of Naboth the Jezreelite.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You are now exercising kingship over Israel'—the Hebrew can be read
      as an assertion or taunt rather than a question.
    reason: alternative_reading
  - marker: b
    text: '''Eat bread'' is a Hebrew idiom for taking a meal.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר אֵלָיו
  chosen: Then ... said to him
  alternatives:
  - And ... said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אִיזֶבֶל אִשְׁתּוֹ
  chosen: Jezebel his wife
  alternatives:
  - his wife Jezebel
  lexicon: HALOT
  rationale: Retains the Hebrew appositional structure and identifies the speaker
    with her relational role to Ahab.
- source_word: אַתָּה עַתָּה תַּעֲשֶׂה מְלוּכָה עַל יִשְׂרָאֵל
  chosen: Are you now exercising kingship over Israel?
  alternatives:
  - Do you now govern Israel as king?
  - Will you now reign over Israel?
  - You are the one ruling over Israel now!
  lexicon: HALOT
  rationale: The clause is best taken as a rhetorical question in context. תַּעֲשֶׂה
    with מְלוּכָה is literally 'do/make kingship,' an idiom for acting as king or
    exercising royal authority. 'Exercising kingship' preserves the force without
    over-paraphrase.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is idiomatic modern English.
- source_word: אֱכָל לֶחֶם
  chosen: eat bread
  alternatives:
  - eat
  - have something to eat
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'eat bread' for taking food. Keeping 'bread'
    preserves the source wording and remains understandable in English.
- source_word: וְיִטַב לִבֶּךָ
  chosen: and let your heart be cheerful
  alternatives:
  - and let your heart be glad
  - and be of good cheer
  - and let your heart be merry
  lexicon: HALOT
  rationale: Literally 'and let your heart be good/well.' The idiom refers to inward
    mood or encouragement. 'Be cheerful' communicates the sense while preserving 'heart'
    as the seat of disposition.
- source_word: אֲנִי אֶתֵּן לְךָ
  chosen: I will give you
  alternatives:
  - I myself will give you
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis, but normal English can carry this
    without awkwardness. The future promise is preserved.
- source_word: כֶּרֶם נָבוֹת הַיִּזְרְעֵאלִי
  chosen: the vineyard of Naboth the Jezreelite
  alternatives:
  - Naboth's vineyard, the Jezreelite
  - the vineyard belonging to Naboth the Jezreelite
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Jezreelite' is the standard
    gentilicial transliteration for הַיִּזְרְעֵאלִי.
