theological_decisions:
- issue: Force of Jezebel's opening clause
  chosen_reading: 'Rendered as a rhetorical question: ''Are you now exercising kingship
    over Israel?'''
  alternative_readings:
  - 'Rendered as an assertion or taunt: ''You are now the one exercising kingship
    over Israel.'''
  rationale: The Hebrew lacks an explicit interrogative marker, but in context Jezebel
    is rebuking Ahab's passivity and urging him to act like a king. English expresses
    this most clearly as a rhetorical question without adding doctrinal content.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it; here the context sufficiently favors the rhetorical-question reading, with
    the assertive nuance preserved in a footnote.
