id: 1KI.21.28
reference: 1 Kings 21:28
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל אֵלִיָּ֥הוּ הַ/תִּשְׁבִּ֖י לֵ/אמֹֽר־־׃
translation:
  text: And the word of Yahweh came to Elijah the Tishbite, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the formula ויהי דבר־יהוה אל..., idiomatic English is best expressed as 'the word of the LORD came to ...' rather than the more wooden 'and it was.' This preserves the standard prophetic revelation formula in readable English.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'message.' In prophetic formulae, 'the word of the LORD' is the established and accurate rendering, preserving both lexical sense and biblical intertextual resonance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward the recipient of revelation; 'to' is the natural modern English equivalent.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַתִּשְׁבִּי
  chosen: the Tishbite
  alternatives:
  - the man from Tishbe
  lexicon: HALOT
  rationale: The gentilic/title is conventionally rendered 'the Tishbite.' This is concise, accurate, and preserves the appositional identification used throughout the Elijah narratives.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse. 'Saying' is the standard concise rendering and preserves the linkage across the verse boundary.
