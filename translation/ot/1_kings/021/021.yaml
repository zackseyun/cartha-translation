theological_decisions:
- issue: Rendering רָעָה of divine judgment
  chosen_reading: disaster
  alternative_readings:
  - evil
  - harm
  rationale: To avoid suggesting moral evil in God while still preserving the severity
    of covenant judgment, 'disaster' best matches the contextual sense of punitive
    calamity.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text says without importing doctrinal claims.'
