id: 1KI.21.21
reference: 1 Kings 21:21
source:
  edition: WLC
  text: הִנְ/נִ֨י מבי אֵלֶ֨י/ךָ֙ רָעָ֔ה וּ/בִעַרְתִּ֖י אַחֲרֶ֑י/ךָ וְ/הִכְרַתִּ֤י
    לְ/אַחְאָב֙ מַשְׁתִּ֣ין בְּ/קִ֔יר וְ/עָצ֥וּר וְ/עָז֖וּב בְּ/יִשְׂרָאֵֽל׃
translation:
  text: Behold, I am bringing disaster upon you, and I will sweep away your posterity,
    and I will cut off from Ahab every male, both bond and free in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'every one who urinates against a wall,' a coarse idiom
      meaning every male.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic announcement formula with solemn force. 'Behold'
    is slightly elevated but still recognizable in judgment speech and preserves the
    immediacy better than a flatter 'I am about to.'
- source_word: מבי ... רָעָה
  chosen: I am bringing disaster
  alternatives:
  - I am bringing evil
  - I am bringing harm
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather
    than moral evil. 'Disaster' communicates divinely announced judgment without implying
    God commits moral evil.
- source_word: אֵלֶיךָ
  chosen: upon you
  alternatives:
  - against you
  - to you
  lexicon: HALOT
  rationale: In this context of announced judgment, 'upon you' is idiomatic English
    and conveys hostile impact.
- source_word: וּבִעַרְתִּי אַחֲרֶיךָ
  chosen: I will sweep away your posterity
  alternatives:
  - I will burn after you
  - I will consume after you
  - I will purge away what comes after you
  lexicon: HALOT
  rationale: The idiom means to remove what comes after someone, i.e., descendants/line.
    'Sweep away your posterity' expresses the idiomatic sense in natural English.
    'Posterity' is supplied to make explicit the object implied by the Hebrew idiom.
- source_word: וְהִכְרַתִּי לְאַחְאָב
  chosen: I will cut off from Ahab
  alternatives:
  - I will cut off belonging to Ahab
  - I will destroy from Ahab
  lexicon: HALOT
  rationale: כרת in judgment formulas often means 'cut off/destroy.' 'From Ahab' preserves
    the Hebrew construction and introduces the specific object of extermination.
- source_word: מַשְׁתִּין בְּקִיר
  chosen: every male
  alternatives:
  - everyone who urinates against a wall
  - every one pissing against the wall
  lexicon: HALOT
  rationale: This is a crude Hebrew idiom for males. The literal expression is preserved
    in a footnote, while the main text uses the clear idiomatic sense 'every male'
    for readable modern English.
- source_word: וְעָצוּר וְעָזוּב
  chosen: both bond and free
  alternatives:
  - the restrained and the left behind
  - helpless and free
  - protected and abandoned
  lexicon: HALOT
  rationale: In this recurring extermination formula, the pair is best understood
    as a merism meaning all without exception, traditionally rendered 'bond and free.'
    This communicates totality more clearly than overly literal but obscure renderings.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: Standard locative rendering fits the formula and reads naturally in English.
