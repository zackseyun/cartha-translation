id: 1KI.21.9
reference: 1 Kings 21:9
source:
  edition: WLC
  text: וַ/תִּכְתֹּ֥ב בַּ/סְּפָרִ֖ים לֵ/אמֹ֑ר קִֽרְאוּ צ֔וֹם וְ/הוֹשִׁ֥יבוּ אֶת נָב֖וֹת
    בְּ/רֹ֥אשׁ הָ/עָֽם־־׃
translation:
  text: She wrote in the letters, saying, “Proclaim a fast, and seat Naboth at the
    head of the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before the people” or “in a prominent place among the people.” The Hebrew
      literally says “at the head of the people,” which may indicate a conspicuous
      or leading position in the assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְתֹּב
  chosen: She wrote
  alternatives:
  - Then she wrote
  lexicon: HALOT
  rationale: Wayyiqtol 3fs of כתב narrates the next action with a feminine singular
    subject, here Jezebel from context. English can omit the explicit sequential 'then'
    without loss, but the feminine singular should be reflected by 'she.'
- source_word: בַּסְּפָרִים
  chosen: in the letters
  alternatives:
  - in the documents
  - on the letters
  lexicon: HALOT
  rationale: ספרים here refers to written letters sent to officials in the city (cf.
    surrounding context), not books in the modern sense. The preposition ב is naturally
    rendered 'in' with the idiom 'wrote in the letters.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing the content of the letters. 'Saying'
    is concise and natural while preserving the formal structure.
- source_word: קִרְאוּ
  chosen: Proclaim
  alternatives:
  - Call
  - Announce
  lexicon: HALOT
  rationale: Imperative plural of קרא. In context of summoning a public religious
    observance, 'proclaim a fast' is idiomatic English and matches the public, official
    force better than the more wooden 'call a fast.'
- source_word: צוֹם
  chosen: a fast
  alternatives:
  - a fasting observance
  lexicon: HALOT
  rationale: The noun denotes a communal fast. 'A fast' is the standard and sufficiently
    clear rendering.
- source_word: וְהוֹשִׁיבוּ
  chosen: and seat
  alternatives:
  - and set
  - and have seated
  lexicon: HALOT
  rationale: Hiphil imperative plural of ישב means to cause someone to sit, hence
    'seat.' This preserves the causative nuance better than simply 'set' while remaining
    natural.
- source_word: אֶת נָבוֹת
  chosen: Naboth
  lexicon: HALOT
  rationale: Direct-object marker plus the proper name. The name is transliterated
    per translation philosophy.
- source_word: בְּרֹאשׁ הָעָם
  chosen: at the head of the people
  alternatives:
  - before the people
  - in front of the people
  - in a prominent place among the people
  lexicon: HALOT
  rationale: Literally 'at the head of the people.' The phrase can denote a leading
    or conspicuous position in the assembly. The more literal rendering preserves
    the imagery and leaves the exact social nuance open, which suits the narrative
    setup.
