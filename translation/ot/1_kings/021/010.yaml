id: 1KI.21.10
reference: 1 Kings 21:10
source:
  edition: WLC
  text: וְ֠/הוֹשִׁיבוּ שְׁנַ֨יִם אֲנָשִׁ֥ים בְּנֵֽי בְלִיַּעַל֮ נֶגְדּ/וֹ֒ וִ/יעִדֻ֣/הוּ
    לֵ/אמֹ֔ר בֵּרַ֥כְתָּ אֱלֹהִ֖ים וָ/מֶ֑לֶךְ וְ/הוֹצִיאֻ֥/הוּ וְ/סִקְלֻ֖/הוּ וְ/יָמֹֽת־׃
translation:
  text: And seat two worthless men opposite him, and let them testify against him,
    saying, ‘You have cursed God and the king.’ Then bring him out and stone him,
    so that he dies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'You have blessed God and the king.' Here 'blessed' is
      a euphemistic way of saying 'cursed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשִׁיבוּ
  chosen: seat
  alternatives:
  - set
  - place
  lexicon: HALOT
  rationale: Hiphil imperative/jussive sense from ישׁב here means to cause to sit
    or seat. 'Seat' is concise and natural in English while preserving the causative
    force.
- source_word: שְׁנַיִם אֲנָשִׁים
  chosen: two ... men
  alternatives:
  - two men
  - two persons
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies two male witnesses. 'Two ... men' preserves
    the legal requirement and the masculine form.
- source_word: בְּנֵי בְלִיַּעַל
  chosen: worthless men
  alternatives:
  - scoundrels
  - base fellows
  - sons of worthlessness
  lexicon: HALOT
  rationale: This idiom denotes morally corrupt, lawless men. 'Worthless men' preserves
    the Hebrew characterization without over-paraphrase; 'sons of worthlessness' would
    be too wooden for main text.
- source_word: נֶגְדּוֹ
  chosen: opposite him
  alternatives:
  - before him
  - in front of him
  lexicon: HALOT
  rationale: The preposition indicates placement facing Naboth in a formal setting.
    'Opposite him' fits the courtroom-like scene and is slightly more precise than
    the broader 'before him.'
- source_word: וִיעִדֻהוּ
  chosen: let them testify against him
  alternatives:
  - let them bear witness against him
  - let them accuse him
  lexicon: HALOT
  rationale: From עוד in the Hiphil/jussive, in legal context it means to testify
    or bear witness. 'Testify against him' captures the forensic sense clearly in
    modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotative introduction; 'saying' is the natural English equivalent.
- source_word: בֵּרַכְתָּ
  chosen: have cursed
  alternatives:
  - have blessed
  lexicon: HALOT
  rationale: Although the verb ברך normally means 'bless,' in a few contexts it functions
    as a euphemism for 'curse,' especially when God is the object. Here the accusation
    clearly concerns blasphemy/treason, so 'cursed' is required by context. The literal
    alternative is preserved in a footnote because the euphemistic usage is significant.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: 'In this judicial accusation alongside ''the king,'' the singular referent
    is intended: Naboth is to be charged with cursing God and the king. ''God'' best
    fits the context.'
- source_word: וָמֶלֶךְ
  chosen: and the king
  lexicon: HALOT
  rationale: Straightforward coordination. The accusation combines offense against
    God with offense against royal authority.
- source_word: וְהוֹצִיאֻהוּ
  chosen: bring him out
  alternatives:
  - take him out
  - lead him out
  lexicon: HALOT
  rationale: The verb means to bring or take out, likely outside the city for execution.
    'Bring him out' is direct and idiomatic.
- source_word: וְסִקְלֻהוּ
  chosen: stone him
  alternatives:
  - pelt him with stones
  lexicon: HALOT
  rationale: Standard legal execution verb. 'Stone him' is the established and accurate
    English rendering.
- source_word: וְיָמֹת
  chosen: so that he dies
  alternatives:
  - and let him die
  - that he may die
  lexicon: HALOT
  rationale: The final verb expresses the intended result of the stoning. 'So that
    he dies' makes the purpose/result relation explicit in natural English.
