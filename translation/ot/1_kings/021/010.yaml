theological_decisions:
- issue: Euphemistic use of ברך with God as object
  chosen_reading: render as 'cursed' in the main text
  alternative_readings:
  - render literally as 'blessed' with explanatory note
  rationale: The Hebrew uses a reverential euphemism, but the narrative context is
    a fabricated capital charge equivalent to cursing/blaspheming God and the king.
    Translating 'blessed' in the main text would miscommunicate the accusation's meaning
    in English. The literal form is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering בְּנֵי בְלִיַּעַל
  chosen_reading: worthless men
  alternative_readings:
  - sons of Belial
  - scoundrels
  rationale: The phrase is an idiom for corrupt or lawless men, not necessarily a
    proper-name reference here. 'Worthless men' preserves the moral force without
    importing later demonological associations.
  doctrine_reference: Translation philosophy §1, §6
