theological_decisions:
- issue: Rendering the euphemistic verb בֵּרַךְ in a blasphemy accusation
  chosen_reading: Translate according to sense as 'cursed' in the main text
  alternative_readings:
  - Translate formally as 'blessed' and explain the euphemism
  rationale: The Hebrew uses a reverential euphemism, but the accusation's actual
    meaning is that Naboth allegedly cursed God and the king. Optimal equivalence
    favors the plain sense in the main text while preserving the literal euphemistic
    form in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3
