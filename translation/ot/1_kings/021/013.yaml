id: 1KI.21.13
reference: 1 Kings 21:13
source:
  edition: WLC
  text: וַ֠/יָּבֹאוּ שְׁנֵ֨י הָ/אֲנָשִׁ֥ים בְּנֵֽי בְלִיַּעַל֮ וַ/יֵּשְׁב֣וּ נֶגְדּ/וֹ֒
    וַ/יְעִדֻ/הוּ֩ אַנְשֵׁ֨י הַ/בְּלִיַּ֜עַל אֶת נָב֗וֹת נֶ֤גֶד הָ/עָם֙ לֵ/אמֹ֔ר בֵּרַ֥ךְ
    נָב֛וֹת אֱלֹהִ֖ים וָ/מֶ֑לֶךְ וַ/יֹּצִאֻ֨/הוּ֙ מִ/ח֣וּץ לָ/עִ֔יר וַ/יִּסְקְלֻ֥/הוּ
    בָ/אֲבָנִ֖ים וַ/יָּמֹֽת־־׃
translation:
  text: Then the two worthless men came in and sat opposite him, and the worthless
    men testified against Naboth before the people, saying, “Naboth cursed God and
    the king.” So they brought him outside the city and stoned him with stones, and
    he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'sons of Belial' / 'men of Belial,' an idiom for worthless
      or wicked men.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blessed,' used here as a euphemism for 'cursed' in an accusation
      of blasphemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי בְלִיַּעַל / אַנְשֵׁי הַבְּלִיַּעַל
  chosen: worthless men
  alternatives:
  - sons of Belial
  - scoundrels
  - wicked men
  lexicon: HALOT
  rationale: The idiom denotes morally base or lawless men, not biological descent.
    'Worthless men' preserves the Hebrew force without importing the later proper-name
    sense 'Belial' into the main text. Because 'sons of Belial' is a familiar literal
    alternative, it is preserved in a footnote.
- source_word: נֶגְדּוֹ
  chosen: opposite him
  alternatives:
  - before him
  - in front of him
  lexicon: HALOT
  rationale: The preposition indicates position facing Naboth. 'Opposite him' is natural
    English and fits the courtroom-like setting.
- source_word: וַיְעִדֻהוּ
  chosen: testified against
  alternatives:
  - bore witness against
  - accused
  lexicon: HALOT
  rationale: The Hiphil of עוּד here is legal testimony. 'Testified against' communicates
    formal witness in a judicial setting more clearly than the more wooden 'bore witness
    against,' though that remains a close alternative.
- source_word: נֶגֶד הָעָם
  chosen: before the people
  alternatives:
  - in the presence of the people
  - before the assembly
  lexicon: HALOT
  rationale: This phrase marks the public setting of the accusation. 'Before the people'
    is concise and natural.
- source_word: בֵּרַךְ
  chosen: cursed
  alternatives:
  - blessed (euphemistic writing for cursed)
  lexicon: HALOT
  rationale: In this legal accusation formula, ברך is a well-known euphemism for 'curse,'
    especially in contexts involving blasphemy against God or the king. Rendering
    it literally as 'blessed' would misrepresent the sense. The euphemistic literal
    form is preserved in a footnote for transparency.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: In this Israelite judicial context, the accusation concerns blasphemy
    against Israel's God, not plural gods. Singular 'God' best reflects the intended
    referent.
- source_word: וָמֶלֶךְ
  chosen: and the king
  lexicon: HALOT
  rationale: 'The conjunction links the two objects of the alleged cursing: God and
    the king. The phrase is rendered straightforwardly.'
- source_word: וַיֹּצִאֻהוּ מִחוּץ לָעִיר
  chosen: they brought him outside the city
  alternatives:
  - they led him out of the city
  - they took him outside the city
  lexicon: HALOT
  rationale: The clause describes removing Naboth from the city for execution. 'Brought
    him outside the city' is idiomatic and clear.
- source_word: וַיִּסְקְלֻהוּ בָאֲבָנִים
  chosen: stoned him with stones
  alternatives:
  - stoned him
  - pelted him with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with stones.' Retaining it preserves
    the concrete brutality and formal correspondence, even though English can omit
    it.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: The final wayyiqtol advances the narrative result. 'And he died' is the
    most direct rendering.
