id: 1KI.21.20
reference: 1 Kings 21:20
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אַחְאָב֙ אֶל אֵ֣לִיָּ֔הוּ הַֽ/מְצָאתַ֖/נִי אֹיְבִ֑/י וַ/יֹּ֣אמֶר
    מָצָ֔אתִי יַ֚עַן הִתְמַכֶּרְ/ךָ֔ לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־׃
translation:
  text: Ahab said to Elijah, “Have you found me, my enemy?” And he said, “I have found
    you, because you have sold yourself to do what is evil in the eyes of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatives include
      ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְצָאתַנִי
  chosen: Have you found me
  alternatives:
  - Have you discovered me
  - Have you come upon me
  lexicon: HALOT
  rationale: From מצא, here in a direct question from Ahab to Elijah. 'Found' is the
    most natural and direct English equivalent and preserves the confrontational tone.
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - enemy of mine
  lexicon: HALOT
  rationale: The noun with 1cs suffix is best rendered straightforwardly as 'my enemy,'
    preserving Ahab's hostile characterization of Elijah.
- source_word: מָצָאתִי
  chosen: I have found you
  alternatives:
  - I have discovered you
  lexicon: HALOT
  rationale: Repeats the same verb מצא from Ahab's question. Rendering it consistently
    as 'found' preserves the verbal echo in the dialogue.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for Elijah's declaration. 'Because' is clear modern
    English and fits the causal force.
- source_word: הִתְמַכֶּרְךָ
  chosen: you have sold yourself
  alternatives:
  - you have given yourself over
  - you have made yourself a slave
  lexicon: HALOT
  rationale: The hitpael of מכר is reflexive, literally 'sell oneself.' 'Sold yourself'
    preserves the metaphor of self-enslavement to evil better than a flattened dynamic
    rendering.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: to do what is evil
  alternatives:
  - to do evil
  - to do the evil
  lexicon: HALOT
  rationale: Infinitive plus adjective functions idiomatically for committing evil.
    'What is evil' is natural English and preserves the moral category without over-literal
    awkwardness.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for divine evaluation. 'In the eyes of'
    keeps the Hebrew imagery while remaining understandable. YHWH is rendered 'the
    LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of יְהוָה
    is 'the LORD,' while alternatives may be preserved in a footnote if useful.
