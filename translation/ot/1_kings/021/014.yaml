id: 1KI.21.14
reference: 1 Kings 21:14
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְח֖וּ אֶל אִיזֶ֣בֶל לֵ/אמֹ֑ר סֻקַּ֥ל נָב֖וֹת וַ/יָּמֹֽת־׃
translation:
  text: Then they sent word to Jezebel, saying, “Naboth has been stoned, and he is
    dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Naboth was stoned, and he died.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: Then they sent word
  alternatives:
  - And they sent
  - Then they sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, naturally rendered 'Then'
    in English. 'Sent word' brings out the idiomatic sense of sending a message in
    this context, since the following infinitive 'saying' introduces reported content.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: אִיזֶבֶל
  chosen: Jezebel
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Common Hebrew reporting formula introducing the message content; 'saying'
    is concise and idiomatic in narrative English.
- source_word: סֻקַּל
  chosen: has been stoned
  alternatives:
  - was stoned
  - has been stoned to death
  lexicon: HALOT
  rationale: 'The pual form is passive: ''was/has been stoned.'' ''Has been stoned''
    fits the message-reporting context and preserves the passive. ''To death'' is
    implied by the following clause but not stated in this verb itself, so it is not
    added to the main text.'
- source_word: נָבוֹת
  chosen: Naboth
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיָּמֹת
  chosen: and he is dead
  alternatives:
  - and he died
  - and is dead
  lexicon: HALOT
  rationale: Although formally a wayyiqtol ('and he died'), in the reported message
    after 'has been stoned' English often expresses the resulting state as 'and he
    is dead.' This preserves the sense of the report to Jezebel without awkwardness.
    The more formally sequential 'and he died' remains a viable alternative.
