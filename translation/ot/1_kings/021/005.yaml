id: 1KI.21.5
reference: 1 Kings 21:5
source:
  edition: WLC
  text: וַ/תָּבֹ֥א אֵלָ֖י/ו אִיזֶ֣בֶל אִשְׁתּ֑/וֹ וַ/תְּדַבֵּ֣ר אֵלָ֗י/ו מַה זֶּה֙
    רוּחֲ/ךָ֣ סָרָ֔ה וְ/אֵינְ/ךָ֖ אֹכֵ֥ל לָֽחֶם־׃
translation:
  text: Then Jezebel his wife came to him and said to him, “Why is your spirit so
    sullen, and why are you not eating bread?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “What is this—your spirit is sullen—and you are not eating
      bread?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving sequence.
- source_word: אִיזֶבֶל
  chosen: Jezebel
  rationale: Personal name is transliterated by standard English convention.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; identifies Jezebel's
    relation to Ahab.
- source_word: וַתְּדַבֵּר אֵלָיו
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: HALOT
  rationale: In direct-speech introduction, English idiom prefers 'said to him' over
    the more wooden 'spoke to him.'
- source_word: מַה זֶּה
  chosen: Why
  alternatives:
  - What is this
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'What is this...?' but in context introduces
    a question about his condition. 'Why' communicates the idiomatic force in natural
    English.
- source_word: רוּחֲךָ
  chosen: your spirit
  alternatives:
  - your mood
  - your mind
  lexicon: HALOT
  rationale: רוּחַ can denote inner disposition, temper, or spirit. 'Your spirit'
    preserves the Hebrew metaphor and avoids over-paraphrase; the context clarifies
    emotional state.
- source_word: סָרָה
  chosen: so sullen
  alternatives:
  - troubled
  - downcast
  - withdrawn
  - sad
  lexicon: HALOT
  rationale: The adjective conveys a turned-away, stubbornly gloomy, or morose state.
    'Sullen' captures the sense well in this narrative context, and 'so' reflects
    the emphatic force of the question.
- source_word: וְאֵינְךָ אֹכֵל לָחֶם
  chosen: and why are you not eating bread
  alternatives:
  - and you are not eating bread
  - and why are you not eating
  lexicon: HALOT
  rationale: Hebrew often uses 'eat bread' for taking a meal. Retaining 'bread' preserves
    the source wording and common biblical idiom, while adding 'why' in English matches
    the parallel interrogative force of the whole question.
