id: 1KI.21.27
reference: 1 Kings 21:27
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ אַחְאָ֜ב אֶת הַ/דְּבָרִ֤ים הָ/אֵ֨לֶּה֙ וַ/יִּקְרַ֣ע
    בְּגָדָ֔י/ו וַ/יָּֽשֶׂם שַׂ֥ק עַל בְּשָׂר֖/וֹ וַ/יָּצ֑וֹם וַ/יִּשְׁכַּ֣ב בַּ/שָּׂ֔ק
    וַ/יְהַלֵּ֖ךְ אַֽט־־־׃ס
translation:
  text: And it happened, when Ahab heard these words, that he tore his clothes and
    put sackcloth on his flesh and fasted and lay in sackcloth and went about softly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went about quietly,' 'walked softly,' or 'went about dejectedly.' The
      Hebrew suggests subdued, humbled movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִשְׁמֹעַ
  chosen: And it happened, when ... heard
  alternatives:
  - When ... heard
  - And when ... heard
  lexicon: HALOT
  rationale: Retains the Hebrew narrative formula with readable English. 'And it happened'
    reflects וַיְהִי, while 'when ... heard' captures the temporal infinitive construct
    כִשְׁמֹעַ.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: דָּבָר often means 'word(s),' 'matter,' or 'thing.' Here Elijah's spoken
    judgment is in view, so 'these words' best preserves the verbal force.
- source_word: וַיִּקְרַע בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: A standard mourning gesture. 'Clothes' is more natural modern English
    than 'garments' while preserving the act.
- source_word: וַיָּשֶׂם שַׂק עַל בְּשָׂרוֹ
  chosen: put sackcloth on his flesh
  alternatives:
  - put sackcloth on his body
  - put on sackcloth against his skin
  lexicon: HALOT
  rationale: שַׂק is the mourning garment 'sackcloth.' בָּשָׂר literally means 'flesh';
    retaining 'on his flesh' preserves the concrete Hebrew image of direct bodily
    contact, though 'against his skin' is a plausible dynamic alternative.
- source_word: וַיָּצֹם
  chosen: fasted
  lexicon: HALOT
  rationale: Straightforward rendering of the verb צום.
- source_word: וַיִּשְׁכַּב בַּשָּׂק
  chosen: lay in sackcloth
  alternatives:
  - lay down in sackcloth
  - slept in sackcloth
  lexicon: HALOT
  rationale: The verb means 'lie down/lie.' 'Lay in sackcloth' preserves the posture
    without over-specifying sleep.
- source_word: וַיְהַלֵּךְ אַט
  chosen: went about softly
  alternatives:
  - walked softly
  - went about dejectedly
  - went about quietly
  lexicon: HALOT
  rationale: אַט denotes gentleness, slowness, or subdued movement. 'Went about softly'
    captures ongoing subdued conduct and echoes the mourning/humbling context without
    importing a stronger interpretation than the Hebrew requires.
