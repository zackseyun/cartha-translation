theological_decisions:
- issue: Nature of Ahab's response
  chosen_reading: Render the verse as describing outward acts of mourning/humiliation
    without explicitly judging whether his repentance was sincere.
  alternative_readings:
  - Ahab truly repented
  - Ahab merely performed external mourning
  rationale: 'The Hebrew verse reports actions only: tearing clothes, wearing sackcloth,
    fasting, lying in sackcloth, and going softly. It does not itself resolve the
    inward sincerity question, so the translation preserves that tension rather than
    importing an interpretation.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
