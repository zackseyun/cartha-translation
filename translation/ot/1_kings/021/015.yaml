id: 1KI.21.15
reference: 1 Kings 21:15
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּ/שְׁמֹ֣עַ אִיזֶ֔בֶל כִּֽי סֻקַּ֥ל נָב֖וֹת וַ/יָּמֹ֑ת וַ/תֹּ֨אמֶר
    אִיזֶ֜בֶל אֶל אַחְאָ֗ב ק֣וּם רֵ֞שׁ אֶת כֶּ֣רֶם נָב֣וֹת הַ/יִּזְרְעֵאלִ֗י אֲשֶׁ֤ר
    מֵאֵן֙ לָ/תֶת לְ/ךָ֣ בְ/כֶ֔סֶף כִּ֣י אֵ֥ין נָב֛וֹת חַ֖י כִּי מֵֽת־־־׀־־׃
translation:
  text: When Jezebel heard that Naboth had been stoned and had died, Jezebel said
    to Ahab, “Get up, take possession of the vineyard of Naboth the Jezreelite, which
    he refused to give you for silver, because Naboth is not alive; he is dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which he refused to sell to you for money.' The Hebrew reads literally,
      'which he refused to give you for silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: When ... heard
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. In readable modern
    English, 'When ... heard' conveys the temporal force without woodenly preserving
    the idiom 'and it happened.'
- source_word: סֻקַּל
  chosen: had been stoned
  alternatives:
  - was stoned
  - had been executed by stoning
  lexicon: HALOT
  rationale: The passive of סקל specifically denotes death by stoning. 'Had been stoned'
    preserves both the passive voice and the concrete mode of execution.
- source_word: וַיָּמֹת
  chosen: and had died
  alternatives:
  - and died
  lexicon: HALOT
  rationale: 'The waw-consecutive advances the report Jezebel heard. Rendering with
    pluperfect in English fits the reported prior event sequence: Naboth had been
    stoned and had died before Jezebel spoke.'
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Go
  lexicon: HALOT
  rationale: Imperative of קום is naturally rendered 'Get up' in contemporary English;
    it preserves the command's immediacy without archaic tone.
- source_word: רֵשׁ
  chosen: take possession of
  alternatives:
  - possess
  - seize
  - inherit
  lexicon: HALOT
  rationale: ירש can mean possess, dispossess, inherit, or take possession. Here Jezebel
    urges Ahab to claim the property now available after Naboth's death. 'Take possession
    of' is idiomatic and reflects the action better than the more ambiguous 'inherit.'
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vineyard plot
  lexicon: HALOT
  rationale: Standard rendering for כרם in this context of agricultural property.
- source_word: הַיִּזְרְעֵאלִי
  chosen: the Jezreelite
  alternatives:
  - of Jezreel
  lexicon: HALOT
  rationale: The gentilic adjective identifies Naboth by origin/residence. 'The Jezreelite'
    is the most direct English equivalent.
- source_word: מֵאֵן לָתֵת לְךָ בְכֶסֶף
  chosen: which he refused to give you for silver
  alternatives:
  - which he refused to sell to you for money
  - which he refused to give you for payment
  lexicon: HALOT
  rationale: The Hebrew says literally 'refused to give to you for silver.' Since
    the transaction in view is purchase, 'for silver' preserves the source wording
    while remaining understandable. 'Sell' is interpretive and therefore kept as an
    alternative rather than the main text.
- source_word: בְכֶסֶף
  chosen: for silver
  alternatives:
  - for money
  lexicon: HALOT
  rationale: כסף literally means 'silver' and often functions metonymically for money.
    Here retaining 'silver' preserves the Hebrew texture while remaining clear in
    context.
- source_word: אֵין נָבוֹת חַי
  chosen: Naboth is not alive
  alternatives:
  - Naboth is no longer alive
  - Naboth is not living
  lexicon: HALOT
  rationale: The Hebrew negated existential plus adjective is slightly more emphatic
    than simply 'Naboth is dead.' Rendering it as 'is not alive' preserves the two-part
    statement before the final explicit 'he is dead.'
- source_word: כִּי מֵת
  chosen: he is dead
  alternatives:
  - for he is dead
  - because he is dead
  lexicon: HALOT
  rationale: The final clause gives the reason and sharpens the bluntness of Jezebel's
    statement. 'He is dead' is the plain sense; the conjunction is absorbed naturally
    into English punctuation after the preceding explanatory 'because'.
