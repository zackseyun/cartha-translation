id: 1KI.21.19
reference: 1 Kings 21:19
source:
  edition: WLC
  text: וְ/דִבַּרְתָּ֨ אֵלָ֜י/ו לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה הֲ/רָצַ֖חְתָּ וְ/גַם יָרָ֑שְׁתָּ וְ/דִבַּרְתָּ֨ אֵלָ֜י/ו לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה בִּ/מְק֗וֹם אֲשֶׁ֨ר לָקְק֤וּ הַ/כְּלָבִים֙ אֶת דַּ֣ם נָב֔וֹת יָלֹ֧קּוּ הַ/כְּלָבִ֛ים אֶת דָּמְ/ךָ֖ גַּם אָֽתָּה־־־־׃
translation:
  text: 'And you shall speak to him, saying, ‘Thus says Yahweh: Have you murdered and also taken possession?’ And you shall speak to him, saying, ‘Thus says Yahweh: In the place where the dogs licked the blood of Naboth, the dogs shall lick your blood—you also.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Have you killed and also taken possession?' The Hebrew verb can be rendered more broadly as 'kill,' but here likely carries the stronger sense 'murder.'
    reason: lexical_alternative
  - marker: b
    text: The final words 'you also' are emphatic in Hebrew, underscoring that the same disgrace that befell Naboth will come upon Ahab himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ אֵלָיו לֵאמֹר
  chosen: And you shall speak to him, saying
  alternatives:
  - And you shall say to him
  - Then speak to him, saying
  lexicon: HALOT
  rationale: The construction with דבר + אל + infinitive לאמר is a standard commissioning formula. 'Speak to him, saying' preserves the formal repetition in the Hebrew, which is significant in prophetic speech.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. YHWH is rendered 'the LORD' per doctrine guidance for יְהוָה.
- source_word: הֲרָצַחְתָּ
  chosen: Have you murdered
  alternatives:
  - Have you killed
  lexicon: HALOT
  rationale: רצח denotes unlawful killing/murder rather than generic killing. 'Murdered' best captures the moral and legal force of Elijah's accusation against Ahab.
- source_word: וְגַם יָרָשְׁתָּ
  chosen: and also taken possession
  alternatives:
  - and also seized the inheritance
  - and also taken it as your possession
  lexicon: HALOT
  rationale: ירש can mean possess, inherit, or dispossess/take possession depending on context. Here Ahab has appropriated Naboth's vineyard after his death, so 'taken possession' captures the wrongful acquisition without over-specifying 'inheritance,' which is not explicit in the immediate wording.
- source_word: בִּמְקוֹם אֲשֶׁר
  chosen: In the place where
  alternatives:
  - At the place where
  lexicon: HALOT
  rationale: A straightforward locative-relative construction. 'In the place where' is idiomatic and preserves the concrete setting of judgment.
- source_word: לָקְקוּ ... יָלֹקּוּ
  chosen: licked up ... shall lick up
  alternatives:
  - licked ... shall lick
  - lapped up ... shall lap up
  lexicon: HALOT
  rationale: The same verb is used for past and future, so the English repeats the same root for rhetorical force. 'Lick up' sounds natural in English while preserving the gruesome imagery.
- source_word: הַכְּלָבִים
  chosen: the dogs
  lexicon: HALOT
  rationale: Literal rendering is required; the image is central to the prophetic judgment.
- source_word: דַּם נָבוֹת
  chosen: the blood of Naboth
  lexicon: HALOT
  rationale: Construct chain rendered directly. Naboth is transliterated as a personal name.
- source_word: אֶת דָּמְךָ גַּם אָתָּה
  chosen: your blood—you also
  alternatives:
  - your blood, yes, yours
  - even your blood
  lexicon: HALOT
  rationale: 'The final גַּם אָתָּה adds emphatic personal application: the same fate will come upon Ahab himself. ''Your blood—you also'' preserves the abrupt emphasis better than smoothing it away.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
