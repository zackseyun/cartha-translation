theological_decisions:
- issue: Moral force of Elijah's accusation in הֲרָצַחְתָּ
  chosen_reading: Render as 'Have you murdered' rather than the broader 'Have you killed.'
  alternative_readings:
  - Have you killed
  rationale: The verse is a prophetic indictment of Ahab's culpability in Naboth's judicial murder. The Hebrew verb רצח normally carries the sense of murder/unlawful killing, and the stronger rendering preserves the ethical weight without adding doctrine beyond the text.
- issue: Rendering of the final emphatic phrase גַּם אָתָּה
  chosen_reading: Preserve the emphatic personal application with 'you also.'
  alternative_readings:
  - even you
  - yes, yours
  rationale: The Hebrew closes with an emphatic addition that intensifies the judgment. Retaining this emphasis preserves the text's rhetorical force rather than flattening it into a smoother but less pointed English sentence.
  doctrine_reference: Translation philosophy §3, §5
