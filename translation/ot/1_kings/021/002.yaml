id: 1KI.21.2
reference: 1 Kings 21:2
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אַחְאָ֣ב אֶל נָב֣וֹת לֵ/אמֹר֩ תְּנָ/ה לִּ֨/י אֶֽת כַּרְמְ/ךָ֜
    וִֽ/יהִי לִ֣/י לְ/גַן יָרָ֗ק כִּ֣י ה֤וּא קָרוֹב֙ אֵ֣צֶל בֵּיתִ֔/י וְ/אֶתְּנָ֤ה
    לְ/ךָ֙ תַּחְתָּ֔י/ו כֶּ֖רֶם ט֣וֹב מִמֶּ֑/נּוּ אִ֚ם ט֣וֹב בְּ/עֵינֶ֔י/ךָ אֶתְּנָה
    לְ/ךָ֥ כֶ֖סֶף מְחִ֥יר זֶֽה־׀׀־־־־־׃
translation:
  text: And Ahab spoke to Naboth, saying, “Give me your vineyard, so that it may become
    a vegetable garden for me, because it is near my house; and in its place I will
    give you a better vineyard than it. Or, if it seems good in your eyes, I will
    give you its price in silver.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''if it is good in your eyes,'' an idiom meaning ''if it seems
      good to you'' or ''if you approve.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly denotes speaking/addressing. 'Spoke to' fits the
    construction with אֶל and preserves the narrative introduction without over-specifying
    the manner of speech.
- source_word: תְּנָה לִּי
  chosen: Give me
  alternatives:
  - Give to me
  lexicon: HALOT
  rationale: Imperative of נתן with first-person indirect object. 'Give me' is idiomatic
    English and preserves the directness of Ahab's request.
- source_word: כַּרְמְךָ
  chosen: your vineyard
  alternatives:
  - your vine-garden
  lexicon: HALOT
  rationale: כֶּרֶם is the standard term for a vineyard. 'Vineyard' is the natural
    and accurate English equivalent.
- source_word: וִיהִי לִי
  chosen: so that it may become for me
  alternatives:
  - and let it be mine
  - that it may be for me
  lexicon: HALOT
  rationale: The jussive/imperfect of היה here expresses intended result or purpose.
    Rendering it as 'so that it may become for me' captures the purposive sense in
    smooth English.
- source_word: לְגַן יָרָק
  chosen: a vegetable garden
  alternatives:
  - a garden of greens
  - an herb garden
  lexicon: HALOT
  rationale: גַּן is 'garden' and יָרָק refers to green plants/vegetables. 'Vegetable
    garden' is clear modern English and better reflects produce cultivation than the
    somewhat archaic 'herb garden.'
- source_word: כִּי הוּא קָרוֹב אֵצֶל בֵּיתִי
  chosen: because it is near my house
  alternatives:
  - for it is close beside my house
  - because it is adjacent to my house
  lexicon: HALOT
  rationale: This clause gives Ahab's reason. 'Near my house' is natural English for
    קָרוֹב אֵצֶל בֵּיתִי and preserves the spatial motivation.
- source_word: וְאֶתְּנָה לְךָ תַּחְתָּיו
  chosen: and in its place I will give you
  alternatives:
  - and I will give you instead of it
  - and I will give you another in exchange for it
  lexicon: HALOT
  rationale: תַּחַת with suffix indicates substitution/exchange. 'In its place' is
    concise and idiomatic while preserving the exchange sense.
- source_word: כֶּרֶם טוֹב מִמֶּנּוּ
  chosen: a better vineyard than it
  alternatives:
  - a vineyard better than it
  - a vineyard superior to it
  lexicon: HALOT
  rationale: טוֹב with comparative מן expresses relative quality. 'Better vineyard
    than it' is straightforward and preserves the comparison.
- source_word: אִם טוֹב בְּעֵינֶיךָ
  chosen: if it seems good in your eyes
  alternatives:
  - if it is good in your eyes
  - if you prefer
  lexicon: HALOT
  rationale: This Hebrew idiom expresses personal approval. The main text keeps the
    idiom relatively transparent rather than flattening it to mere preference.
- source_word: כֶּסֶף מְחִיר זֶה
  chosen: its price in silver
  alternatives:
  - the price of this in silver
  - silver as the price for it
  - its purchase price in silver
  lexicon: HALOT
  rationale: The phrase denotes monetary payment equivalent to the vineyard's value.
    'Its price in silver' is clear and reflects the Hebrew components without awkwardness.
