id: 1KI.21.12
reference: 1 Kings 21:12
source:
  edition: WLC
  text: קָרְא֖וּ צ֑וֹם וְ/הֹשִׁ֥יבוּ אֶת נָב֖וֹת בְּ/רֹ֥אשׁ הָ/עָֽם־׃
translation:
  text: They proclaimed a fast and seated Naboth at the head of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the people' or 'in the foremost place among the people.' The
      Hebrew expression literally says 'at the head of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  chosen: They proclaimed
  alternatives:
  - They called
  - They announced
  lexicon: HALOT
  rationale: The verb קרא with צום as its object means to publicly declare or proclaim
    a fast. 'Proclaimed' is idiomatic in English for an official public summons and
    fits the civic action described.
- source_word: צום
  chosen: a fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: The noun denotes a formal fast, likely publicly observed. 'A fast' is
    the most natural English rendering after 'proclaimed' and preserves the institutional
    sense better than the more abstract 'fasting'.
- source_word: וְהֹשִׁיבוּ
  chosen: and seated
  alternatives:
  - and set
  - and placed
  lexicon: HALOT
  rationale: The Hiphil of ישב here means to cause someone to sit, that is, to seat
    or place him in a designated position. 'Seated' is both accurate and natural in
    context.
- source_word: אֶת נָבוֹת
  chosen: Naboth
  rationale: אֶת marks Naboth as the definite direct object of the verb. The personal
    name is transliterated according to the translation philosophy.
- source_word: בְּרֹאשׁ
  chosen: at the head of
  alternatives:
  - in front of
  - before
  - in the foremost place among
  lexicon: HALOT
  rationale: The phrase בְּרֹאשׁ literally means 'at the head/top of.' In this judicial-public
    setting it likely indicates a prominent leading position before the assembly.
    'At the head of' preserves the Hebrew image while remaining clear English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this context it refers to the gathered
    populace or civic assembly. 'The people' is the straightforward rendering; 'the
    assembly' is interpretive and therefore kept as an alternative only.
