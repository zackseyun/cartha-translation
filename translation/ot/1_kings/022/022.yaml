id: 1KI.22.22
reference: 1 Kings 22:22
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אֵצֵא֙ וְ/הָיִ֨יתִי֙ ר֣וּחַ שֶׁ֔קֶר בְּ/פִ֖י כָּל נְבִיאָ֑י/ו
    וַ/יֹּ֗אמֶר תְּפַתֶּה֙ וְ/גַם תּוּכָ֔ל צֵ֖א וַ/עֲשֵׂה כֵֽן־־־׃
translation:
  text: And he said, ‘I will go out and be a lying spirit in the mouth of all his
    prophets.’ And he said, ‘You will entice him, and you will also succeed. Go out
    and do so.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will deceive him' or 'you will persuade him.' The Hebrew verb can
      cover enticement, persuasion, or deception depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵצֵא
  chosen: I will go out
  alternatives:
  - I will go forth
  lexicon: HALOT
  rationale: Qal imperfect 1cs of יצא expresses future/intended action. 'Go out' is
    natural modern English and preserves the movement sense without archaizing.
- source_word: וְהָיִיתִי
  chosen: and be
  alternatives:
  - and I will become
  lexicon: HALOT
  rationale: From היה. In context the spirit proposes a role it will assume; English
    idiom prefers 'be' over the more wooden 'become' here.
- source_word: רוּחַ שֶׁקֶר
  chosen: a lying spirit
  alternatives:
  - a spirit of falsehood
  - a false spirit
  lexicon: HALOT
  rationale: Construct-like pairing conveys a spirit characterized by deceit. 'Lying
    spirit' is the most direct and idiomatic rendering in this narrative context.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom for speech proceeding through
    prophets. 'In the mouth of' is standard and understandable in English.
- source_word: כָּל נְבִיאָיו
  chosen: all his prophets
  alternatives:
  - all of his prophets
  lexicon: HALOT
  rationale: 'כָּל plus plural noun with 3ms suffix is straightforwardly comprehensive:
    the prophets belonging to or associated with the king in view.'
- source_word: תְּפַתֶּה
  chosen: you will entice him
  alternatives:
  - you will deceive him
  - you will persuade him
  lexicon: HALOT
  rationale: Piel of פתה can mean entice, persuade, or deceive depending on context.
    Here the object is implicit from the larger scene (Ahab), and 'entice' best captures
    inducement toward a doomed course without over-specifying the mechanism.
- source_word: וְגַם תּוּכָל
  chosen: and you will also succeed
  alternatives:
  - and you will prevail
  - and you can also do it
  lexicon: HALOT
  rationale: יכל denotes ability/success. In this commissioning context, 'you will
    also succeed' communicates both capability and effective outcome.
- source_word: צֵא
  chosen: Go out
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Imperative of יצא echoes the earlier 'I will go out' and should be preserved
    for verbal cohesion.
- source_word: וַעֲשֵׂה כֵן
  chosen: and do so
  alternatives:
  - and do thus
  - and do it
  lexicon: HALOT
  rationale: עשה כן is an idiomatic command meaning to act in the stated manner. 'Do
    so' is concise, natural, and sufficiently formal.
