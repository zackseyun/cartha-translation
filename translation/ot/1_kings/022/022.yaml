theological_decisions:
- issue: Rendering divine permission/commission in a scene involving deception
  chosen_reading: The verse is translated straightforwardly as a heavenly dialogue
    in which the spirit proposes to become 'a lying spirit' and is told it will entice
    and succeed.
  alternative_readings:
  - A more interpretive rendering that softens the language to mere permission rather
    than commission
  rationale: The Hebrew verbs are direct and should not be diluted to avoid theological
    tension. Per doctrine, the translation preserves the tension rather than resolving
    questions about divine sovereignty and secondary agency beyond what the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
