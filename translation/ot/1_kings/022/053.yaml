id: 1KI.22.53
reference: 1 Kings 22:53
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יֵּ֗לֶךְ בְּ/דֶ֤רֶךְ אָבִי/ו֙ וּ/בְ/דֶ֣רֶךְ אִמּ֔/וֹ וּ/בְ/דֶ֨רֶךְ֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־׃
translation:
  text: And he did what was evil in the eyes of Yahweh and walked in the way of his father, and in the way of his mother, and in the way of Jeroboam son of Nebat, who caused Israel to sin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  lexicon: HALOT
  rationale: The common idiom עשה + adjective is naturally rendered 'did' in English ('did what was evil'), preserving the Hebrew verbal construction without awkwardness.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: With עשה, the phrase הָרַע forms an idiom meaning 'do what is evil.' Rendering it as 'what was evil' communicates the sense clearly in modern English while retaining the moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative expression. 'In the eyes of the LORD' is transparent and close to the source. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּלֶךְ
  chosen: walked
  alternatives:
  - went
  - followed
  lexicon: HALOT
  rationale: In the idiom 'walk in the way of,' 'walked' preserves the metaphor of conduct and is standard, whereas 'went' is too literal and 'followed' smooths away the imagery.
- source_word: בְּדֶרֶךְ
  chosen: in the way of
  alternatives:
  - in the path of
  - according to the way of
  lexicon: HALOT
  rationale: דרך here denotes manner of life or pattern of conduct. 'In the way of' keeps the repeated Hebrew phrasing and moral metaphor.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward filial reference; no contextual reason to vary from the standard gloss.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Straightforward filial reference. The inclusion of both father and mother is preserved explicitly, reflecting the source text's emphasis.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of Nebat' is concise and natural while preserving the Hebrew patronymic.
- source_word: הֶחֱטִיא
  chosen: caused Israel to sin
  alternatives:
  - made Israel sin
  - led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' most directly reflects that causative force; 'made Israel sin' is possible but slightly harsher in English, and 'led ... into sin' is more interpretive.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Here Israel refers to the northern kingdom/people collectively. The simple proper name best matches the Hebrew.
