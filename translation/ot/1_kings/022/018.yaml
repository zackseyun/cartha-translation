id: 1KI.22.18
reference: 1 Kings 22:18
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֶֽלֶךְ יִשְׂרָאֵ֖ל אֶל יְהוֹשָׁפָ֑ט הֲ/לוֹא֙ אָמַ֣רְתִּי אֵלֶ֔י/ךָ
    לֽוֹא יִתְנַבֵּ֥א עָלַ֛/י ט֖וֹב כִּ֥י אִם רָֽע־־־־׃
translation:
  text: Then the king of Israel said to Jehoshaphat, “Did I not tell you that he would
    not prophesy good concerning me, but only evil?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “but only disaster.” The Hebrew says literally “good ... but only evil,”
      using a stark contrast that can refer here to an unfavorable or disastrous prophecy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    here.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying the speaker; retaining
    the title rather than supplying 'Ahab' keeps the source-text wording.
- source_word: אֶל יְהוֹשָׁפָט
  chosen: to Jehoshaphat
  alternatives:
  - to King Jehoshaphat
  lexicon: HALOT
  rationale: The preposition marks indirect address. The Hebrew gives the personal
    name only, so no royal title is added.
- source_word: הֲלוֹא
  chosen: Did I not
  alternatives:
  - Have I not
  - Surely I told you
  lexicon: HALOT
  rationale: This interrogative plus negation introduces a rhetorical question expecting
    agreement. 'Did I not' captures the rebuking tone in natural English.
- source_word: אָמַרְתִּי אֵלֶיךָ
  chosen: tell you
  alternatives:
  - say to you
  lexicon: HALOT
  rationale: English idiom prefers 'tell you' with a personal indirect object in this
    context, while preserving the sense of direct prior speech.
- source_word: לֹא יִתְנַבֵּא
  chosen: he would not prophesy
  alternatives:
  - he does not prophesy
  - he will not prophesy
  lexicon: HALOT
  rationale: 'The imperfect here is best rendered relative to the prior ''I told you''
    as future-in-the-past: ''would not prophesy.'' This reflects the king''s complaint
    about Micaiah''s habitual/predictable message.'
- source_word: עָלַי
  chosen: concerning me
  alternatives:
  - about me
  - for me
  lexicon: HALOT
  rationale: The preposition עַל with speech/prophecy can mean 'concerning/about.'
    'Concerning me' is slightly more formal and fits prophetic discourse well.
- source_word: טוֹב
  chosen: good
  alternatives:
  - anything good
  - what is favorable
  lexicon: HALOT
  rationale: 'The adjective stands substantivally: ''good.'' English can leave the
    object implicit, as Hebrew does. ''Anything good'' is interpretive and slightly
    expands the text.'
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - but rather
  - except
  lexicon: HALOT
  rationale: In this contrastive construction after negation, כִּי אִם means 'but
    rather / but only.' 'But only' clearly conveys exclusive contrast in contemporary
    English.
- source_word: רָע
  chosen: evil
  alternatives:
  - disaster
  - harm
  - bad
  lexicon: HALOT
  rationale: The term can denote moral evil or calamity/disaster depending on context.
    Here it refers to unfavorable prophetic announcement about the king. 'Evil' preserves
    the lexical contrast with 'good' most directly; 'disaster' is a plausible contextual
    alternative but more interpretive.
