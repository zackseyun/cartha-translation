theological_decisions:
- issue: Rendering of רָע in prophetic complaint
  chosen_reading: evil
  alternative_readings:
  - disaster
  - harm
  rationale: The verse contrasts טוֹב and רָע in the king's accusation that Micaiah
    never speaks favorably about him. 'Evil' preserves the Hebrew antonym pair without
    importing a more specific theological claim. Because English readers may hear
    moral evil rather than adverse outcome, the contextual alternative 'disaster'
    is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
