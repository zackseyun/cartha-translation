id: 1KI.22.42
reference: 1 Kings 22:42
source:
  edition: WLC
  text: יְהוֹשָׁפָ֗ט בֶּן שְׁלֹשִׁ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ בְּ/מָלְכ֔/וֹ וְ/עֶשְׂרִ֤ים
    וְ/חָמֵשׁ֙ שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ עֲזוּבָ֖ה בַּת שִׁלְחִֽי־־׃
translation:
  text: Jehoshaphat was thirty-five years old when he began to reign, and he reigned
    twenty-five years in Jerusalem. And his mother’s name was Azubah daughter of Shilhi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the project principle to transliterate names rather than translate them.
- source_word: בֶּן שְׁלֹשִׁים וְחָמֵשׁ שָׁנָה
  chosen: was thirty-five years old
  alternatives:
  - was a son of thirty-five years
  lexicon: HALOT
  rationale: Hebrew idiom literally reads 'a son of thirty-five years'; idiomatic
    English expresses age as 'was thirty-five years old.' This preserves the sense
    without wooden phrasing.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form here marks the time of accession.
    'When he began to reign' is a standard, clear rendering in English and fits the
    regnal formula context.
- source_word: וְעֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus 'years' in the duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb מלך in regnal notices is best rendered 'reigned,' which is both
    accurate and idiomatic in English historical narrative.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition with place name; standard rendering.
- source_word: וְשֵׁם אִמּוֹ
  chosen: And his mother’s name was
  alternatives:
  - And the name of his mother was
  lexicon: HALOT
  rationale: This is a common royal formula. The chosen wording is natural modern
    English while preserving the formal notice.
- source_word: עֲזוּבָה
  chosen: Azubah
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: בַּת שִׁלְחִי
  chosen: daughter of Shilhi
  lexicon: HALOT
  rationale: Standard genealogical expression; 'daughter of' is the direct and natural
    rendering, and 'Shilhi' is transliterated as a personal name.
