id: 1KI.22.13
reference: 1 Kings 22:13
source:
  edition: WLC
  text: וְ/הַ/מַּלְאָ֞ךְ אֲשֶׁר הָלַ֣ךְ לִ/קְרֹ֣א מִיכָ֗יְהוּ דִּבֶּ֤ר אֵלָי/ו֙ לֵ/אמֹ֔ר
    הִנֵּה נָ֞א דִּבְרֵ֧י הַ/נְּבִיאִ֛ים פֶּֽה אֶחָ֥ד ט֖וֹב אֶל הַ/מֶּ֑לֶךְ יְהִֽי
    נָ֣א דברי/ך כִּ/דְבַ֛ר אַחַ֥ד מֵ/הֶ֖ם וְ/דִבַּ֥רְתָּ טּֽוֹב־׀־־־־׃
translation:
  text: And the messenger who had gone to summon Micaiah spoke to him, saying, “Look
    now, the words of the prophets are with one mouth favorable to the king. Please
    let your word be like the word of one of them, and speak favorably.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “with one mouth,” an idiom meaning “with one voice” or
      “unanimously.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the angel
  - the envoy
  lexicon: HALOT
  rationale: In narrative context this refers to the human agent sent to call Micaiah,
    not a heavenly being. 'Messenger' is the most natural and contextually accurate
    English rendering.
- source_word: לִקְרֹא
  chosen: to summon
  alternatives:
  - to call
  - to invite
  lexicon: HALOT
  rationale: The verb means 'to call,' but in this setting of sending for a prophet
    before the king, 'summon' captures the official sense without overparaphrasing.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold now
  - See now
  lexicon: HALOT
  rationale: This combination draws attention and softens the appeal. 'Look now' preserves
    both the deictic force and the conversational tone in readable modern English.
- source_word: דִּבְרֵי הַנְּבִיאִים
  chosen: the words of the prophets
  alternatives:
  - the message of the prophets
  - the prophecies of the prophets
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Words' preserves
    the lexical form and avoids prematurely interpreting the content as a formal prophetic
    oracle.
- source_word: פֶּה אֶחָד
  chosen: with one mouth
  alternatives:
  - with one voice
  - unanimously
  lexicon: HALOT
  rationale: Literally 'one mouth.' The main text keeps the Hebrew imagery while remaining
    intelligible in English. A smoother idiomatic alternative is worth preserving
    in a footnote.
- source_word: טוֹב אֶל הַמֶּלֶךְ
  chosen: favorable to the king
  alternatives:
  - good for the king
  - good toward the king
  lexicon: HALOT
  rationale: The phrase indicates speech that is positive in relation to the king.
    'Favorable to the king' communicates the sense more naturally than the more wooden
    'good to the king.'
- source_word: יְהִי נָא דבריך
  chosen: Please let your word be
  alternatives:
  - Please let your words be
  - May your word please be
  lexicon: HALOT
  rationale: Though the Hebrew form can be read collectively, the singular 'your word'
    fits the following singular comparison and can function as a collective expression
    for Micaiah's message.
- source_word: כִּדְבַר אַחַד מֵהֶם
  chosen: like the word of one of them
  alternatives:
  - like one of their words
  - like the words of one of them
  lexicon: HALOT
  rationale: This closely follows the Hebrew singular construction and highlights
    conformity to any one of the prophets' favorable messages.
- source_word: וְדִבַּרְתָּ טּוֹב
  chosen: and speak favorably
  alternatives:
  - and speak good
  - and speak what is favorable
  lexicon: HALOT
  rationale: Idiomatic English requires an adverbial sense here. 'Speak favorably'
    preserves the force of the Hebrew while sounding natural.
