id: 1KI.22.34
reference: 1 Kings 22:34
source:
  edition: WLC
  text: וְ/אִ֗ישׁ מָשַׁ֤ךְ בַּ/קֶּ֨שֶׁת֙ לְ/תֻמּ֔/וֹ וַ/יַּכֶּה֙ אֶת מֶ֣לֶךְ יִשְׂרָאֵ֔ל
    בֵּ֥ין הַ/דְּבָקִ֖ים וּ/בֵ֣ין הַ/שִּׁרְיָ֑ן וַ/יֹּ֣אמֶר לְ/רַכָּב֗/וֹ הֲפֹ֥ךְ
    יָדְ/ךָ֛ וְ/הוֹצִיאֵ֥/נִי מִן הַֽ/מַּחֲנֶ֖ה כִּ֥י הָחֳלֵֽיתִי־־׃
translation:
  text: But a man drew his bow at random and struck the king of Israel between the
    scale armor and the breastplate. So he said to his charioteer, “Turn your hand
    and take me out of the camp, for I am badly wounded.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his innocence,” “without aiming,” or “at random” for the Hebrew לְתֻמּוֹ;
      here it likely means the archer shot without a specific target in mind.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “between the debaqim and the shiryan,” likely referring to a gap
      between pieces of armor; the exact technical terms are uncertain.
    reason: cultural_note
  - marker: c
    text: Hebrew “Turn your hand,” an idiom for maneuvering the chariot.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew verb can mean “be sick” or “be wounded”; in this context it refers
      to being wounded.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: But a man
  alternatives:
  - And a man
  - Now a man
  lexicon: HALOT
  rationale: אִישׁ is the ordinary term for 'man.' The prefixed conjunction is rendered
    'But' to mark the narrative turn and contrast with the preceding context, while
    still preserving the simple introduction of an unnamed individual.
- source_word: מָשַׁךְ בַּקֶּשֶׁת
  chosen: drew his bow
  alternatives:
  - drew with the bow
  - drew the bow
  lexicon: HALOT
  rationale: The idiom literally involves drawing with/in the bow, but in English
    the natural equivalent is 'drew his bow,' i.e., drew the bow to shoot. This preserves
    the action without awkward literalism.
- source_word: לְתֻמּוֹ
  chosen: at random
  alternatives:
  - in his innocence
  - without aiming
  - in his simplicity
  lexicon: HALOT
  rationale: In this battle context, לְתֻמּוֹ most naturally means without specific
    intent or aim, not moral innocence. 'At random' best captures the idiom in clear
    modern English while preserving the irony of the event.
- source_word: וַיַּכֶּה
  chosen: and struck
  alternatives:
  - and hit
  - and wounded
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Struck' is the most direct narrative
    rendering here; the resulting wound is made explicit later in the verse, so 'wounded'
    here would front-load an implication not yet stated by the verb alone.
- source_word: בֵּין הַדְּבָקִים
  chosen: between the scale armor
  alternatives:
  - between the joints of the armor
  - between the fastenings
  - between the armor-plates
  lexicon: HALOT
  rationale: The noun is difficult and refers to some joined or attached part of armor.
    In context it likely denotes the scaled or plated section. 'Between the scale
    armor' gives a concrete, readable sense while acknowledging the technical uncertainty.
- source_word: וּבֵין הַשִּׁרְיָן
  chosen: and the breastplate
  alternatives:
  - and the coat of mail
  - and the armor
  lexicon: HALOT
  rationale: שִׁרְיָן denotes body armor, often a coat of mail or breastpiece. 'Breastplate'
    is concise and intelligible in modern English, fitting the image of a vulnerable
    gap between armor components.
- source_word: לְרַכָּבוֹ
  chosen: to his charioteer
  alternatives:
  - to the driver of his chariot
  - to his chariot-driver
  lexicon: HALOT
  rationale: The form refers to the one driving or controlling the chariot rather
    than the vehicle itself. 'Charioteer' is the standard concise English equivalent.
- source_word: הֲפֹךְ יָדְךָ
  chosen: Turn your hand
  alternatives:
  - Turn around
  - Wheel about
  - Turn the reins
  lexicon: HALOT
  rationale: Literally the Hebrew says 'turn your hand.' Retaining 'hand' preserves
    the concrete idiom and likely refers to maneuvering the chariot by hand. A more
    interpretive rendering like 'turn around' is possible but less transparent to
    the source.
- source_word: וְהוֹצִיאֵנִי מִן הַמַּחֲנֶה
  chosen: and take me out of the camp
  alternatives:
  - and bring me out of the battle line
  - and carry me out of the army
  lexicon: HALOT
  rationale: הוֹצִיאֵנִי is straightforwardly 'bring/take me out.' מַחֲנֶה can mean
    camp or army encampment; in battle context it refers to the military host. 'Out
    of the camp' is the more literal rendering, with the military sense understood
    from context.
- source_word: כִּי הָחֳלֵיתִי
  chosen: for I am badly wounded
  alternatives:
  - for I am wounded
  - for I am sick
  - for I have been wounded
  lexicon: HALOT
  rationale: Though the verb can broadly denote sickness or weakness, in immediate
    context after being struck by an arrow it clearly means being wounded. 'Badly
    wounded' brings out the severity implied by the situation and common contextual
    usage, though the adverb is interpretive.
