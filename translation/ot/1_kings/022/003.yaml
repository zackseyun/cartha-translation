id: 1KI.22.3
reference: 1 Kings 22:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֶֽלֶךְ יִשְׂרָאֵל֙ אֶל עֲבָדָ֔י/ו הַ/יְדַעְתֶּ֕ם כִּֽי לָ֖/נוּ
    רָמֹ֣ת גִּלְעָ֑ד וַ/אֲנַ֣חְנוּ מַחְשִׁ֔ים מִ/קַּ֣חַת אֹתָ֔/הּ מִ/יַּ֖ד מֶ֥לֶךְ
    אֲרָֽם־־־׃
translation:
  text: And the king of Israel said to his servants, “Do you know that Ramoth-gilead
    belongs to us, yet we are doing nothing to take it from the hand of the king of
    Aram?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “we are silent from taking it.” The Hebrew idiom conveys
      culpable inaction.
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew name often rendered “Syria” in older English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: The noun עבד can denote servants or royal officials depending on context.
    Here the king addresses members of his court/council. 'Servants' preserves the
    Hebrew term and common royal idiom without over-specifying bureaucratic rank.
- source_word: הֲיְדַעְתֶּם
  chosen: Do you know
  alternatives:
  - Do you not know
  - Have you known
  lexicon: HALOT
  rationale: The interrogative with ידע naturally introduces a rhetorical question.
    'Do you know' is idiomatic modern English and fits the king's appeal to shared
    knowledge. The negative is not explicit in the Hebrew form here, so it is not
    supplied.
- source_word: כִּי לָנוּ רָמֹת גִּלְעָד
  chosen: that Ramoth-gilead belongs to us
  alternatives:
  - that Ramoth-gilead is ours
  - that we have Ramoth-gilead
  lexicon: HALOT
  rationale: The prepositional phrase לָנוּ with the place name expresses possession/claim.
    'Belongs to us' makes the possessive force explicit in natural English and suits
    the political context of territorial claim.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  rationale: A standard English transliteration of the place name is used. The hyphen
    reflects the compound toponym and aids readability.
- source_word: מַחְשִׁים
  chosen: we are doing nothing
  alternatives:
  - we are silent
  - we keep quiet
  - we are inactive
  lexicon: HALOT
  rationale: The participle from חרש literally relates to being silent, but in this
    context silence implies inaction in the face of a territorial claim. 'We are doing
    nothing' best captures the idiomatic force in contemporary English while preserving
    the rebuke.
- source_word: מִקַּחַת אֹתָהּ
  chosen: to take it
  alternatives:
  - from taking it
  - to seize it
  lexicon: HALOT
  rationale: The infinitive construct with מן after מַחְשִׁים expresses the neglected
    action. 'To take it' is straightforward and avoids the harsher nuance of 'seize'
    unless context demands it.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: '''From the hand of'' is a common Hebrew idiom for possession or control.
    Retaining it in English preserves the biblical texture while remaining intelligible.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical equivalents. 'Aram' is therefore preferred over 'Syria'.
