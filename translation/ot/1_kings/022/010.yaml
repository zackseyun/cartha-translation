id: 1KI.22.10
reference: 1 Kings 22:10
source:
  edition: WLC
  text: וּ/מֶ֣לֶךְ יִשְׂרָאֵ֡ל וִֽ/יהוֹשָׁפָ֣ט מֶֽלֶךְ יְהוּדָ֡ה יֹשְׁבִים֩ אִ֨ישׁ
    עַל כִּסְא֜/וֹ מְלֻבָּשִׁ֤ים בְּגָדִים֙ בְּ/גֹ֔רֶן פֶּ֖תַח שַׁ֣עַר שֹׁמְר֑וֹן
    וְ/כָ֨ל הַ/נְּבִיאִ֔ים מִֽתְנַבְּאִ֖ים לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: Now the king of Israel and Jehoshaphat king of Judah were sitting, each on
    his throne, clothed in royal garments, at the threshing floor at the entrance
    of the gate of Samaria, and all the prophets were prophesying before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'clothed in garments.' The Hebrew does not explicitly say 'royal,'
      though the royal setting strongly suggests ceremonial attire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ יִשְׂרָאֵל
  chosen: Now the king of Israel
  alternatives:
  - And the king of Israel
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in narrative English
    'now' smoothly marks scene-setting without departing from the connective force.
- source_word: וִיהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  chosen: and Jehoshaphat king of Judah
  alternatives:
  - and Jehoshaphat, the king of Judah
  lexicon: HALOT
  rationale: Name is transliterated; appositional royal title is retained straightforwardly.
    The article is absent in Hebrew, so the tighter apposition is acceptable in English.
- source_word: יֹשְׁבִים
  chosen: were sitting
  alternatives:
  - sat
  - were seated
  lexicon: HALOT
  rationale: The participle depicts ongoing posture/state in the scene; 'were sitting'
    preserves the durative descriptive force better than simple past.
- source_word: אִישׁ עַל כִּסְאוֹ
  chosen: each on his throne
  alternatives:
  - each on his seat
  - a man on his throne
  lexicon: HALOT
  rationale: אִישׁ in distributive usage means 'each'; כִּסֵּא here in royal context
    is best rendered 'throne' rather than the more generic 'seat'.
- source_word: מְלֻבָּשִׁים בְּגָדִים
  chosen: clothed in royal garments
  alternatives:
  - clothed in garments
  - wearing robes
  lexicon: HALOT
  rationale: Literally 'clothed with garments,' but in this courtly setting the garments
    are ceremonial/royal attire. 'Royal garments' makes explicit the contextual sense
    without over-paraphrasing.
- source_word: בְּגֹרֶן
  chosen: at the threshing floor
  alternatives:
  - in the threshing floor
  lexicon: HALOT
  rationale: גֹּרֶן is 'threshing floor'; English idiom prefers 'at' for location
    in a public setting.
- source_word: פֶּתַח שַׁעַר שֹׁמְרוֹן
  chosen: at the entrance of the gate of Samaria
  alternatives:
  - at the entrance to the gate of Samaria
  - at the opening of Samaria's gate
  lexicon: HALOT
  rationale: A formally close rendering preserves the layered construct chain. 'Gate
    of Samaria' is preferable to a more interpretive civic paraphrase.
- source_word: וְכָל הַנְּבִיאִים
  chosen: and all the prophets
  lexicon: HALOT
  rationale: Straightforward rendering; the universal 'all' is retained.
- source_word: מִתְנַבְּאִים
  chosen: were prophesying
  alternatives:
  - were acting as prophets
  - were speaking prophetically
  lexicon: HALOT
  rationale: The hitpael of נבא commonly means 'prophesy.' 'Were prophesying' preserves
    the verbal action and ongoing scene.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  - in their presence
  lexicon: HALOT
  rationale: '''Before them'' is both natural and suitably formal for a royal audience
    scene.'
