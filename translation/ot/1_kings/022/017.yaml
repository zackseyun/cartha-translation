id: 1KI.22.17
reference: 1 Kings 22:17
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר רָאִ֤יתִי אֶת כָּל יִשְׂרָאֵל֙ נְפֹצִ֣ים אֶל הֶ/הָרִ֔ים כַּ/צֹּ֕אן
    אֲשֶׁ֥ר אֵין לָ/הֶ֖ם רֹעֶ֑ה וַ/יֹּ֤אמֶר יְהוָה֙ לֹֽא אֲדֹנִ֣ים לָ/אֵ֔לֶּה יָשׁ֥וּבוּ
    אִישׁ לְ/בֵית֖/וֹ בְּ/שָׁלֽוֹם־־־־־־׃
translation:
  text: And he said, “I saw all Israel scattered on the mountains, like sheep that
    have no shepherd. And the LORD said, ‘These have no master; let each man return
    to his house in peace.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “These have no lords,” with the plural reflecting the Hebrew form; contextually
      it refers to Israel being without its ruling head.
    reason: lexical_alternative
  - marker: b
    text: Or, “let each one return to his house in peace.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נְפֹצִים
  chosen: scattered
  alternatives:
  - dispersed
  - scattered abroad
  lexicon: HALOT
  rationale: The participle from פוץ conveys being spread out or dispersed. 'Scattered'
    is natural modern English and preserves the image of a defeated, leaderless army.
- source_word: אֶל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the mountains
  - into the hills
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with verbs of dispersal and spatial
    description the sense here is locative in context. 'On the mountains' best fits
    the vision imagery and standard English idiom.
- source_word: כַּצֹּאן אֲשֶׁר אֵין לָהֶם רֹעֶה
  chosen: like sheep that have no shepherd
  alternatives:
  - like flock animals without a shepherd
  lexicon: HALOT
  rationale: This is a familiar biblical simile and should be preserved straightforwardly.
    'Sheep' is the natural rendering of צאן here, and 'have no shepherd' keeps the
    existential force of אֵין.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: אֲדֹנִים
  chosen: master
  alternatives:
  - lord
  - owner
  - leaders
  lexicon: HALOT
  rationale: The plural noun literally means 'lords/masters.' In this context it refers
    to the absent ruling figure over the army, most immediately the king. 'Master'
    preserves the singular collective sense in idiomatic English after 'these have
    no…' while avoiding confusion with the divine title 'Lord.' The plural form likely
    functions as an abstract/collective expression of authority rather than requiring
    a strictly plural English rendering.
- source_word: יָשׁוּבוּ אִישׁ לְבֵיתוֹ
  chosen: let each man return to his house
  alternatives:
  - each one should return to his home
  - let every man go back to his house
  lexicon: HALOT
  rationale: The imperfect here has jussive force in reported divine speech. 'Let
    each man return' captures the directive nuance. 'Man' reflects the distributive
    אִישׁ and follows the project's gender-accurate policy.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: HALOT
  rationale: '''In peace'' is the standard rendering of בְּשָׁלוֹם and preserves both
    the idiom and the irony of a defeated army being dismissed without further battle.'
