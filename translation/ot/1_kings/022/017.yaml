theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without importing additional theological
    claims.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Number and sense of אֲדֹנִים
  chosen_reading: These have no master
  alternative_readings:
  - These have no lords
  - These have no leader
  rationale: The Hebrew uses a plural form, but the context points to the loss of
    the king as the army's governing head. English idiom favors a collective singular
    here. 'Leader' is interpretive; 'master' stays closer to the lexical form while
    signaling authority.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Gendered distributive אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The source uses the masculine singular distributive noun אִישׁ. Per the
    project's gender-accurate policy, the translation retains the masculine form rather
    than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
