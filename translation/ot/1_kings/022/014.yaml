theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms guidance explicitly sets 'the LORD' as
    the default for יְהוָה, following Jewish reverence tradition and the Septuagintal
    pattern. The oath formula is therefore rendered 'As the LORD lives.'
