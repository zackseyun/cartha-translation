id: 1KI.22.14
reference: 1 Kings 22:14
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מִיכָ֑יְהוּ חַי יְהוָ֕ה כִּ֠י אֶת אֲשֶׁ֨ר יֹאמַ֧ר יְהוָ֛ה אֵלַ֖/י
    אֹת֥/וֹ אֲדַבֵּֽר־־׃
translation:
  text: And Micaiah said, “As the LORD lives, whatever the LORD says to me, that I
    will speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''As Yahweh lives.'' The main text follows the project''s standard
      rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form introducing direct speech; 'And ...
    said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a common oath formula. 'As the LORD lives' is idiomatic, natural
    English that preserves the solemn force of the Hebrew expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD' rather
    than a transliteration.
- source_word: כִּי
  chosen: whatever
  alternatives:
  - indeed
  - surely
  - for
  lexicon: HALOT
  rationale: 'In combination with אֵת אֲשֶׁר, the clause functions to introduce the
    content of the oath: ''whatever the LORD says...'' Rendering the whole construction
    smoothly in English best reflects the syntax.'
- source_word: אֵת אֲשֶׁר
  chosen: whatever
  alternatives:
  - that which
  - what
  lexicon: HALOT
  rationale: The object marker plus relative particle forms an object-relative construction,
    naturally rendered 'whatever' in English.
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - speaks
  lexicon: HALOT
  rationale: The imperfect here is contextually future-oriented, but in English a
    present-tense verb in this relative clause ('whatever the LORD says to me') is
    idiomatic and conveys the same sense.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: 'The preposition אֶל with first-person suffix here indicates direction
    of speech toward the prophet: ''to me.'''
- source_word: אֹתוֹ
  chosen: that
  alternatives:
  - it
  - the same
  lexicon: HALOT
  rationale: The resumptive object pronoun points back to the preceding relative clause.
    English idiom prefers 'that I will speak' rather than the more wooden 'it I will
    speak.'
- source_word: אֲדַבֵּר
  chosen: I will speak
  alternatives:
  - I will say
  lexicon: HALOT
  rationale: דבר commonly means 'speak.' 'I will speak' preserves the verbal correspondence
    with prophetic utterance and fits the solemn vow context.
