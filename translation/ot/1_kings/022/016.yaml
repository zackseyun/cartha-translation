id: 1KI.22.16
reference: 1 Kings 22:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ הַ/מֶּ֔לֶךְ עַד כַּ/מֶּ֥ה פְעָמִ֖ים אֲנִ֣י מַשְׁבִּעֶ֑/ךָ
    אֲ֠שֶׁר לֹֽא תְדַבֵּ֥ר אֵלַ֛/י רַק אֱמֶ֖ת בְּ/שֵׁ֥ם יְהוָֽה־־־׃
translation:
  text: Then the king said to him, “How many times must I make you swear that you
    speak to me nothing but the truth in the name of the LORD?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How often do I have to put you under oath…?” The Hebrew verb means
      to make someone swear or place him under oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; no reason to substitute the proper name
    since the Hebrew uses the title.
- source_word: עַד כַּמֶּה פְעָמִים
  chosen: How many times
  alternatives:
  - How often
  - Until how many times
  lexicon: HALOT
  rationale: Idiomatic expression of repeated frustration. 'How many times' is the
    most natural and sufficiently formal rendering.
- source_word: מַשְׁבִּעֶךָ
  chosen: must I make you swear
  alternatives:
  - do I adjure you
  - am I putting you under oath
  lexicon: HALOT
  rationale: Hiphil of שׁבע means to cause someone to swear, put under oath, or adjure.
    'Make you swear' is clear modern English and preserves the oath-setting force
    better than the more archaic 'adjure.' The modal 'must' reflects the king's exasperated
    rhetorical question in context.
- source_word: אֲשֶׁר לֹא תְדַבֵּר אֵלַי
  chosen: that you speak to me
  alternatives:
  - that you not speak to me except
  - that you tell me
  lexicon: HALOT
  rationale: The clause is governed by the oath formula and is completed by רַק אֱמֶת.
    In English, 'that you speak to me nothing but...' best captures the sense. 'Speak'
    is retained rather than 'tell' to stay closer to דִּבֵּר.
- source_word: רַק אֱמֶת
  chosen: nothing but the truth
  alternatives:
  - only truth
  - only what is true
  lexicon: HALOT
  rationale: This is the natural English equivalent of the restrictive particle plus
    'truth.' It preserves exclusivity and idiomatic force.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - in the name of Yahweh
  lexicon: HALOT
  rationale: בְּשֵׁם indicates speaking under the authority/invocation of the divine
    name. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
