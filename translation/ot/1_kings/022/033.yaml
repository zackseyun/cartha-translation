id: 1KI.22.33
reference: 1 Kings 22:33
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/רְאוֹת֙ שָׂרֵ֣י הָ/רֶ֔כֶב כִּֽי לֹא מֶ֥לֶךְ יִשְׂרָאֵ֖ל ה֑וּא
    וַ/יָּשׁ֖וּבוּ מֵ/אַחֲרָֽי/ו־־׃
translation:
  text: And it happened, when the commanders of the chariots saw that he was not the
    king of Israel, they turned back from pursuing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from after him,' a Hebrew idiom meaning they stopped following
      or chasing him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: כִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - as soon as ... saw
  - upon seeing
  lexicon: HALOT
  rationale: Infinitive construct with כ marks temporal circumstance. 'When ... saw'
    is natural English and adequately reflects the temporal sense.
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the captains of the chariots
  - the chariot commanders
  - the commanders of the chariot force
  lexicon: HALOT
  rationale: שָׂרֵי denotes military leaders/commanders. הָרֶכֶב refers to the chariot
    corps or chariots. 'Commanders of the chariots' is a close, readable rendering
    that fits the immediate military context.
- source_word: כִּי לֹא מֶלֶךְ יִשְׂרָאֵל הוּא
  chosen: that he was not the king of Israel
  alternatives:
  - that it was not the king of Israel
  - that he was not Israel's king
  lexicon: HALOT
  rationale: The clause gives the content of what they perceived. The pronoun הוּא
    is masculine singular and refers to the person they were chasing. 'He was not
    the king of Israel' is the most straightforward English rendering.
- source_word: וַיָּשׁוּבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they turned around
  lexicon: HALOT
  rationale: שׁוּב in this context means to turn back/return from an action already
    underway. 'Turned back' fits the military pursuit scene well.
- source_word: מֵאַחֲרָיו
  chosen: from pursuing him
  alternatives:
  - from behind him
  - from following him
  - from after him
  lexicon: HALOT
  rationale: Literally 'from after him,' an idiom meaning to cease following/chasing
    someone. In context the commanders had been attacking or chasing Jehoshaphat,
    so 'from pursuing him' expresses the idiomatic force in clear English.
