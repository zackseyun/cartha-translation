id: 1KI.22.52
reference: 1 Kings 22:52
source:
  edition: WLC
  text: אֲחַזְיָ֣הוּ בֶן אַחְאָ֗ב מָלַ֤ךְ עַל יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן בִּ/שְׁנַת֙
    שְׁבַ֣ע עֶשְׂרֵ֔ה לִ/יהוֹשָׁפָ֖ט מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּמְלֹ֥ךְ עַל יִשְׂרָאֵ֖ל
    שְׁנָתָֽיִם־־־׃
translation:
  text: Ahaziah son of Ahab became king over Israel in Samaria in the seventeenth
    year of Jehoshaphat king of Judah, and he reigned over Israel two years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: The qatal here marks Ahaziah's accession. 'Became king' communicates
    enthronement more naturally in English than simply 'reigned,' while preserving
    the royal sense of מלך.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition עַל with מלך regularly indicates rule over a people or
    territory; 'over Israel' is the standard and most precise rendering.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The beth preposition here indicates location. 'In Samaria' is idiomatic
    English and fits the sense of the royal seat/capital.
- source_word: בִּשְׁנַת שְׁבַע עֶשְׂרֵה
  chosen: in the seventeenth year
  alternatives:
  - in year seventeen
  lexicon: HALOT
  rationale: This is the standard regnal-year dating formula. 'In the seventeenth
    year' is clear, natural, and formally close to the Hebrew.
- source_word: לִיהוֹשָׁפָט
  chosen: of Jehoshaphat
  alternatives:
  - for Jehoshaphat
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks the reference king whose year
    is being counted. English idiom renders this as 'of Jehoshaphat,' not 'to/for
    Jehoshaphat.'
- source_word: וַיִּמְלֹךְ
  chosen: and he reigned
  alternatives:
  - and he became king
  - and he ruled as king
  lexicon: HALOT
  rationale: After the accession notice, the wayyiqtol plus duration clause naturally
    summarizes the length of his reign. Rendering it 'and he reigned' avoids awkward
    repetition of 'became king' and matches the narrative flow.
- source_word: שְׁנָתָיִם
  chosen: two years
  alternatives:
  - for two years
  lexicon: HALOT
  rationale: The dual form denotes a reign length of two years. English commonly expresses
    this as 'two years'; the duration is understood from the governing verb 'reigned.'
- source_word: אֲחַזְיָהוּ בֶן אַחְאָב
  chosen: Ahaziah son of Ahab
  alternatives:
  - Ahaziah, the son of Ahab
  rationale: Personal names are transliterated per project philosophy. The construct
    'son of' is retained rather than reduced to a patronymic adjective.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: This appositional title identifies Jehoshaphat in the regnal synchronism.
    'King of Judah' is the standard precise rendering.
