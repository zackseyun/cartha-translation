id: 1KI.22.46
reference: 1 Kings 22:46
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֧י יְהוֹשָׁפָ֛ט וּ/גְבוּרָת֥/וֹ אֲשֶׁר עָשָׂ֖ה וַ/אֲשֶׁ֣ר
    נִלְחָ֑ם הֲ/לֹֽא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י
    יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Jehoshaphat, and his might that he displayed,
    and how he fought—are they not written in the Book of the Chronicles of the Kings
    of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and his mighty deeds that he did.' The Hebrew combines 'his might'
      with 'that he did,' an idiom for demonstrated prowess or valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The rest of
  lexicon: HALOT
  rationale: יֶתֶר in this formulaic royal-summary context means 'the remainder/rest.'
    The prefixed conjunction can be rendered simply 'and,' but 'now' is a natural
    English discourse marker in this historiographic formula without changing sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the recurring regnal formula 'the
    rest of the words/matters of X' it idiomatically refers to the king's acts or
    deeds. 'Acts' is standard, clear English for the historical summary.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his mighty deeds
  - and his valor
  - and his power
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, valor, or mighty acts. Here, because it
    is followed by אֲשֶׁר עָשָׂה ('that he did'), the sense includes demonstrated
    prowess. 'His might' preserves the noun while remaining natural; the following
    clause clarifies that it was displayed in action.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he displayed
  alternatives:
  - that he did
  - which he did
  lexicon: HALOT
  rationale: Literally 'that he did.' In English, 'did his might' is awkward; 'displayed'
    brings out the idiomatic sense that his גְּבוּרָה was manifested in action, without
    over-paraphrasing.
- source_word: וַאֲשֶׁר נִלְחָם
  chosen: and how he fought
  alternatives:
  - and that he fought
  - and the wars he fought
  lexicon: HALOT
  rationale: נלחם means 'to fight, wage war.' The relative clause after the prior
    summary items is naturally rendered 'how he fought,' capturing the historiographic
    sense of military activity without adding 'wars' not explicit in the text.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the standard rhetorical formula introducing a source citation.
    'Are they not written' is both accurate and idiomatic, preserving the rhetorical
    question.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the book of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: Literally 'on/upon the book of the words/events of the days.' In this
    source-citation formula, 'Book of the Chronicles' is the established and accurate
    rendering for the royal annals.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  lexicon: HALOT
  rationale: 'The preposition ל in this title functions as a genitival marker in English:
    the chronicle pertaining to the kings of Judah. ''Of the Kings of Judah'' is the
    natural rendering of the title.'
