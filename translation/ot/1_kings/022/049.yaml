id: 1KI.22.49
reference: 1 Kings 22:49
source:
  edition: WLC
  text: יְהוֹשָׁפָ֡ט עשר אֳנִיּ֨וֹת תַּרְשִׁ֜ישׁ לָ/לֶ֧כֶת אוֹפִ֛ירָ/ה לַ/זָּהָ֖ב
    וְ/לֹ֣א הָלָ֑ךְ כִּֽי נשברה אֳנִיּ֖וֹת בְּ/עֶצְי֥וֹן גָּֽבֶר־׃
translation:
  text: Jehoshaphat made ships of Tarshish to go to Ophir for gold, but they did not
    go, because the ships were wrecked at Ezion-geber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tarshish ships,' possibly meaning a class of large seagoing vessels
      rather than ships literally from Tarshish.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'was broken' (singular); the sense is collective, referring to the
      ships/fleet.
    reason: lexical_alternative
lexical_decisions:
- source_word: עשר
  chosen: made
  alternatives:
  - constructed
  - prepared
  lexicon: HALOT
  rationale: The consonantal text reads עשר, understood in context as a verbal form
    meaning 'made/prepared' rather than the numeral 'ten.' This fits the syntax with
    Jehoshaphat as subject and 'ships of Tarshish' as object, and aligns with the
    parallel account in Chronicles.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: ships of Tarshish
  alternatives:
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew construct expression.
    It may denote ships associated with Tarshish or a class of large seagoing vessels;
    the traditional phrase is retained, with the broader sense noted in a footnote.
- source_word: לָלֶכֶת אוֹפִירָה
  chosen: to go to Ophir
  alternatives:
  - to sail to Ophir
  lexicon: HALOT
  rationale: The infinitive plus directional ending on Ophir straightforwardly indicates
    purpose and destination. 'Go' is formally closer to the Hebrew, while still natural
    in English.
- source_word: לַזָּהָב
  chosen: for gold
  alternatives:
  - to get gold
  - for the gold
  lexicon: HALOT
  rationale: 'The preposition ל marks purpose or goal here: the voyage was for obtaining
    gold. ''For gold'' is concise and idiomatic.'
- source_word: וְלֹא הָלָךְ
  chosen: but they did not go
  alternatives:
  - but it did not go
  - but he did not go
  lexicon: HALOT
  rationale: Although the verb is singular, the sense in context is collective, referring
    to the fleet/ships not making the voyage. English naturally uses a plural subject
    here. This avoids the misleading sense that Jehoshaphat himself failed to travel.
- source_word: נשברה
  chosen: were wrecked
  alternatives:
  - were broken
  - were shattered
  lexicon: HALOT
  rationale: The Niphal of שבר indicates being broken. In maritime context, 'were
    wrecked' communicates the event idiomatically and accurately in modern English.
- source_word: בְּעֶצְיוֹן גָּבֶר
  chosen: at Ezion-geber
  alternatives:
  - in Ezion-geber
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'at' for a port location in English.
    The place name is transliterated per translation policy.
