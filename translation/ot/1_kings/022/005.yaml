id: 1KI.22.5
reference: 1 Kings 22:5
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹשָׁפָ֖ט אֶל מֶ֣לֶךְ יִשְׂרָאֵ֑ל דְּרָשׁ נָ֥א כַ/יּ֖וֹם אֶת דְּבַ֥ר יְהוָֽה־־־׃
translation:
  text: And Jehoshaphat said to the king of Israel, “Please inquire today for the word of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seek the word of the LORD,” or “consult the LORD for a word.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural, sufficiently formal rendering in English narrative style; 'Then' is possible but not necessary here.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  chosen: to the king of Israel
  alternatives:
  - to Israel’s king
  lexicon: HALOT
  rationale: Straightforward prepositional phrase. The more literal royal title is preserved rather than smoothing to a possessive form.
- source_word: דְּרָשׁ
  chosen: inquire
  alternatives:
  - seek
  - consult
  lexicon: HALOT
  rationale: דרש in this context means to seek or consult divine guidance. 'Inquire' best fits the idiom with 'the word of the LORD' and preserves the formal sense of requesting revelation.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray you
  - now
  lexicon: HALOT
  rationale: נא marks politeness/entreaty. 'Please' is idiomatic modern English without archaic tone.
- source_word: כַיּוֹם
  chosen: today
  alternatives:
  - as of today
  - at once today
  lexicon: HALOT
  rationale: In this request, the phrase most naturally means 'today' or 'now, today,' urging immediate inquiry. 'Today' is concise and idiomatic while preserving temporal force.
- source_word: אֶת דְּבַר יְהוָה
  chosen: for the word of the LORD
  alternatives:
  - the word of the LORD
  - the counsel of the LORD
  - a word from the LORD
  lexicon: HALOT
  rationale: With דרש, the object is what is being sought from God. 'Inquire ... for the word of the LORD' reflects the Hebrew construction and keeps 'word' rather than interpreting it more loosely as 'will' or 'counsel.' 'A word from the LORD' is possible but less formally tied to the construct phrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
