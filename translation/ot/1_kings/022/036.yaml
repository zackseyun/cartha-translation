id: 1KI.22.36
reference: 1 Kings 22:36
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ר הָ/רִנָּה֙ בַּֽ/מַּחֲנֶ֔ה כְּ/בֹ֥א הַ/שֶּׁ֖מֶשׁ לֵ/אמֹ֑ר אִ֥ישׁ
    אֶל עִיר֖/וֹ וְ/אִ֥ישׁ אֶל אַרְצֽ/וֹ־־׃
translation:
  text: And a cry passed through the camp at sunset, saying, “Each man to his city,
    and each man to his land!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the shout,” “the cry,” or “the proclamation passed through the camp.”
      The Hebrew רִנָּה often denotes a loud cry or ringing shout; here it refers
      to the camp-wide announcement.
    reason: lexical_alternative
  - marker: b
    text: Literally, “Each man to his city, and each man to his land.” This is a formulaic
      dismissal after the battle.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed through
  alternatives:
  - went through
  - spread through
  lexicon: HALOT
  rationale: The verb עבר in this context describes movement through the camp of the
    reported cry. 'Passed through' preserves the concrete verbal sense while fitting
    idiomatic English for a message or shout moving among people.
- source_word: הָרִנָּה
  chosen: a cry
  alternatives:
  - the cry
  - the shout
  - the ringing cry
  - the proclamation
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, shout, or jubilant cry depending on
    context. Here the content is a camp-wide announcement after Ahab's death, not
    joyful praise, so 'a cry' is the most neutral and contextually fitting rendering.
    The article may function generically; English idiom prefers 'a cry passed through
    the camp' over the stiffer 'the cry passed through the camp.'
- source_word: בַּמַּחֲנֶה
  chosen: through the camp
  alternatives:
  - in the camp
  - throughout the camp
  lexicon: HALOT
  rationale: Although the preposition is literally 'in the camp,' with עבר the sense
    is movement through the camp. 'Through the camp' best reflects the combined force
    of verb and prepositional phrase in natural English.
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  chosen: at sunset
  alternatives:
  - when the sun went in
  - as the sun was setting
  - when the sun set
  lexicon: HALOT
  rationale: The infinitive construct with בוא plus 'the sun' is a standard idiom
    for sunset. 'At sunset' is concise, accurate, and natural.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - proclaiming
  - with the words
  lexicon: HALOT
  rationale: The infinitive introduces the content of the cry. 'Saying' is the standard
    transparent rendering.
- source_word: אִישׁ ... וְאִישׁ
  chosen: Each man ... and each man
  alternatives:
  - Every man ... and every man
  - Each one ... and each one
  lexicon: HALOT
  rationale: The Hebrew repeats אִישׁ for distributive force. In keeping with the
    project's gender-accurate policy, 'man' is retained rather than neutralizing to
    'one' or 'everyone,' since the phrase is a stock military dismissal formula addressed
    to fighting men.
- source_word: אֶל עִירוֹ
  chosen: to his city
  alternatives:
  - to his town
  lexicon: HALOT
  rationale: עִיר normally means 'city.' The phrase is formulaic and should remain
    straightforward.
- source_word: וְאִישׁ אֶל אַרְצוֹ
  chosen: and each man to his land
  alternatives:
  - and each man to his country
  - and each man to his homeland
  lexicon: HALOT
  rationale: אֶרֶץ here likely refers to one's home territory or native land rather
    than the whole nation in an abstract sense. 'Land' preserves the Hebrew term's
    breadth and matches the formulaic parallelism with 'city.'
