id: 1KI.22.1
reference: 1 Kings 22:1
source:
  edition: WLC
  text: וַ/יֵּשְׁב֖וּ שָׁלֹ֣שׁ שָׁנִ֑ים אֵ֚ין מִלְחָמָ֔ה בֵּ֥ין אֲרָ֖ם וּ/בֵ֥ין יִשְׂרָאֵֽל׃פ
translation:
  text: For three years they remained without war between Aram and Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There was no war between Aram and Israel for three years.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is the Hebrew name often rendered ''Syria'' in English versions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: they remained
  alternatives:
  - they sat
  - they dwelt
  - they continued
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit/dwell,' but in this temporal-historical
    construction with a duration ('three years') it idiomatically conveys continuing
    or remaining in a state. 'They remained' gives natural English while preserving
    the sense that the condition persisted over the period.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: for three years
  alternatives:
  - three years
  lexicon: HALOT
  rationale: Rendered as a duration phrase in idiomatic English. The Hebrew accusative
    of time indicates the length of the period.
- source_word: אֵין מִלְחָמָה
  chosen: without war
  alternatives:
  - there was no war
  - no warfare
  lexicon: HALOT
  rationale: The Hebrew states literally 'there is no war.' In English, after 'they
    remained,' 'without war' is concise and natural, preserving the state of peace/non-conflict.
    'War' is preferable to 'warfare' for readability.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  alternatives:
  - between ... and between ...
  lexicon: HALOT
  rationale: Standard English collapses the repeated preposition into a single 'between
    ... and ...' while fully representing the Hebrew relationship marker.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical equivalents. 'Aram' reflects the Hebrew proper name more
    directly than 'Syria'.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
