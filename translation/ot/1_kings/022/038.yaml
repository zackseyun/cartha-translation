theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of וְהַזֹּנוֹת רָחָצוּ
  chosen_reading: the prostitutes washed there
  alternative_readings:
  - the prostitutes bathed
  - the prostitutes washed themselves
  rationale: The clause is syntactically terse and has generated interpretive discussion,
    but the Hebrew plainly includes 'the prostitutes' as subject of רָחָצוּ. The translation
    preserves that reading without smoothing it away. A lexical footnote preserves
    the more explicit reflexive possibility.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological/interpretive
    tension rather than resolve it'
