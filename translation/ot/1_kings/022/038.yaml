id: 1KI.22.38
reference: 1 Kings 22:38
source:
  edition: WLC
  text: וַ/יִּשְׁטֹ֨ף אֶת הָ/רֶ֜כֶב עַ֣ל בְּרֵכַ֣ת שֹׁמְר֗וֹן וַ/יָּלֹ֤קּוּ הַ/כְּלָבִים֙
    אֶת דָּמ֔/וֹ וְ/הַ/זֹּנ֖וֹת רָחָ֑צוּ כִּ/דְבַ֥ר יְהוָ֖ה אֲשֶׁ֥ר דִּבֵּֽר־׀־׃
translation:
  text: And they washed the chariot by the pool of Samaria, and the dogs licked up
    his blood, and the prostitutes washed there, according to the word of the LORD
    that he had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prostitutes washed themselves' or 'bathed.' The Hebrew verb does
      not state the object explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁטֹף
  chosen: they washed
  alternatives:
  - one washed
  - he washed
  lexicon: HALOT
  rationale: The verb is 3ms, but in English an indefinite/impersonal plural ('they
    washed') is natural and idiomatic for an unspecified agent. This avoids awkward
    singular 'one washed' while preserving the sense that unnamed people washed the
    chariot.
- source_word: הָרֶכֶב
  chosen: the chariot
  alternatives:
  - the chariotry
  - the royal chariot
  lexicon: HALOT
  rationale: In context this refers to Ahab's bloodied war chariot, singular and definite.
- source_word: עַל בְּרֵכַת שֹׁמְרוֹן
  chosen: by the pool of Samaria
  alternatives:
  - at the pool of Samaria
  - over the pool of Samaria
  lexicon: HALOT
  rationale: The preposition עַל here is best rendered idiomatically as location near
    the pool rather than literally 'on/upon.' 'By' gives clear modern English while
    fitting the washing scene.
- source_word: וַיָּלֹקּוּ
  chosen: licked up
  alternatives:
  - licked
  - lapped up
  lexicon: HALOT
  rationale: The verb denotes licking/lapping. 'Licked up' conveys the vivid completion
    of the action in natural English.
- source_word: דָּמוֹ
  chosen: his blood
  lexicon: HALOT
  rationale: Straightforward pronominal suffix referring to Ahab.
- source_word: הַכְּלָבִים
  chosen: the dogs
  lexicon: HALOT
  rationale: Definite plural retained.
- source_word: וְהַזֹּנוֹת
  chosen: the prostitutes
  alternatives:
  - the harlots
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute. 'Prostitutes' is accurate modern English;
    'harlots' is archaic.
- source_word: רָחָצוּ
  chosen: washed there
  alternatives:
  - bathed
  - washed themselves
  lexicon: HALOT
  rationale: The verb can mean wash/bathe. Because the object is not explicit in Hebrew,
    'washed there' makes the scene intelligible in English without over-specifying.
    'Washed themselves' is possible, but the Hebrew leaves the reflexive object unstated.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the word of Yahweh
  - according to what the LORD had said
  lexicon: HALOT
  rationale: This preserves the formal prophetic-fulfillment formula. Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: אֲשֶׁר דִּבֵּר
  chosen: that he had spoken
  alternatives:
  - which he spoke
  - that he spoke
  lexicon: HALOT
  rationale: 'English past perfect fits the fulfillment context: the LORD had previously
    spoken this word.'
