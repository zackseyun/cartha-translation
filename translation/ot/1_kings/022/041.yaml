id: 1KI.22.41
reference: 1 Kings 22:41
source:
  edition: WLC
  text: וִ/יהֽוֹשָׁפָט֙ בֶּן אָסָ֔א מָלַ֖ךְ עַל יְהוּדָ֑ה בִּ/שְׁנַ֣ת אַרְבַּ֔ע לְ/אַחְאָ֖ב
    מֶ֥לֶךְ יִשְׂרָאֵֽל־־׃
translation:
  text: And Jehoshaphat son of Asa became king over Judah in the fourth year of Ahab
    king of Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וִ/יהֽוֹשָׁפָט
  chosen: And Jehoshaphat
  alternatives:
  - Now Jehoshaphat
  - Jehoshaphat
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as "And" to preserve the narrative
    linkage with the preceding context. The personal name is transliterated, following
    the translation philosophy of transliterating names rather than translating them.
- source_word: בֶּן אָסָא
  chosen: son of Asa
  alternatives:
  - the son of Asa
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies Jehoshaphat's lineage.
    "Son of Asa" is the natural English rendering and preserves the genealogical notice
    without unnecessary expansion.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The Qal perfect of מלך here marks accession to kingship. "Became king"
    captures the ingressive sense more precisely than "reigned," which can suggest
    the duration of rule rather than the beginning of it.
- source_word: עַל יְהוּדָה
  chosen: over Judah
  alternatives:
  - in Judah
  lexicon: HALOT
  rationale: The preposition עַל with מלך commonly indicates rule over a people or
    territory. "Over Judah" best reflects royal authority.
- source_word: בִּ/שְׁנַת אַרְבַּע
  chosen: in the fourth year
  alternatives:
  - in year four
  - in the fourth regnal year
  lexicon: HALOT
  rationale: This is the standard regnal dating formula. English idiom prefers the
    ordinal expression "in the fourth year." "Regnal" is implied by context and need
    not be added.
- source_word: לְ/אַחְאָב
  chosen: of Ahab
  alternatives:
  - of Ahab's reign
  - belonging to Ahab
  lexicon: HALOT
  rationale: The prefixed ל in this dating formula indicates reference to Ahab's regnal
    year. In English, "of Ahab" naturally conveys this when paired with "in the fourth
    year."
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: This appositional title identifies Ahab. The anarthrous Hebrew is naturally
    rendered in English without forcing emphasis; "king of Israel" is the standard
    and clear expression.
