id: 1KI.22.25
reference: 1 Kings 22:25
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מִיכָ֔יְהוּ הִנְּ/ךָ֥ רֹאֶ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא אֲשֶׁ֥ר תָּבֹ֛א
    חֶ֥דֶר בְּ/חֶ֖דֶר לְ/הֵחָבֵֽה׃
translation:
  text: And Micaiah said, “Look, you will see on that day when you go from room to
    room to hide.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into an inner room,” or “from chamber to chamber.” The Hebrew expression
      literally repeats “room” and conveys retreating inward to hide.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting sequence.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: הִנְּךָ
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention. 'Look' is readable modern English
    and preserves the force better than archaic 'Behold.'
- source_word: רֹאֶה
  chosen: you will see
  alternatives:
  - you are about to see
  - you are seeing
  lexicon: HALOT
  rationale: Although formally a participle ('seeing'), in context with הִנְּךָ and
    the future time reference 'on that day' it functions predictively. 'You will see'
    is the most natural English rendering.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression; 'on that day' is standard modern English.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - that
  - in which
  lexicon: HALOT
  rationale: Introduces the temporal circumstance of the seeing; English 'when' conveys
    the sense more naturally than a more wooden relative clause.
- source_word: תָּבֹא
  chosen: you go
  alternatives:
  - you enter
  - you come
  lexicon: HALOT
  rationale: The verb בוא can mean come/enter/go depending on viewpoint. Here, with
    'room to room' and the purpose 'to hide,' 'go' best captures movement through
    successive inner rooms.
- source_word: חֶדֶר בְּחֶדֶר
  chosen: from room to room
  alternatives:
  - into an inner room
  - room within room
  - from chamber to chamber
  lexicon: HALOT
  rationale: The repeated noun with preposition expresses movement deeper inward,
    idiomatically 'from room to room' or 'into an inner chamber.' The chosen rendering
    is clear and preserves the iterative/inward movement without sounding archaic.
- source_word: לְהֵחָבֵה
  chosen: to hide
  alternatives:
  - to conceal yourself
  lexicon: HALOT
  rationale: Infinitive of purpose. 'To hide' is concise and natural; reflexive force
    is implicit in English from the context.
