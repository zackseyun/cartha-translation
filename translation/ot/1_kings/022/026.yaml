id: 1KI.22.26
reference: 1 Kings 22:26
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל קַ֚ח אֶת מִיכָ֔יְהוּ וַ/הֲשִׁיבֵ֖/הוּ אֶל
    אָמֹ֣ן שַׂר הָ/עִ֑יר וְ/אֶל יוֹאָ֖שׁ בֶּן הַ/מֶּֽלֶךְ־־־־־׃
translation:
  text: Then the king of Israel said, “Take Micaiah and return him to Amon, the governor
    of the city, and to Joash the king’s son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the commander of the city” or “the chief official of the city.” The
      Hebrew title can denote a leading civic or military officer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct chain; this is the
    speaker in context (Ahab), but the Hebrew uses the title rather than the personal
    name.
- source_word: קַח
  chosen: Take
  alternatives:
  - Seize
  - Bring
  lexicon: HALOT
  rationale: Imperative of לקח commonly means 'take.' 'Seize' would overstate force
    not explicit in the verb itself, though the context is hostile.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַהֲשִׁיבֵהוּ
  chosen: return him
  alternatives:
  - bring him back
  - take him back
  lexicon: HALOT
  rationale: Hiphil of שוב here is causative, 'cause him to return' or 'bring back.'
    'Return him' is concise and preserves the sense that Micaiah is being sent back
    into custody.
- source_word: אֶל
  chosen: to
  alternatives:
  - back to
  lexicon: HALOT
  rationale: Standard directional preposition. The notion of 'back' is already conveyed
    by the verb, so 'to' avoids redundancy.
- source_word: אָמֹן
  chosen: Amon
  rationale: Personal name transliterated conventionally.
- source_word: שַׂר הָעִיר
  chosen: the governor of the city
  alternatives:
  - the commander of the city
  - the chief official of the city
  - the ruler of the city
  lexicon: HALOT
  rationale: שַׂר denotes an official, prince, commander, or leader. In this civic
    context, 'governor' best communicates an administrative official in readable modern
    English without implying specifically military command.
- source_word: וְאֶל יוֹאָשׁ
  chosen: and to Joash
  alternatives:
  - and [take him] to Joash
  lexicon: HALOT
  rationale: The second אֶל coordinates a second recipient/destination. English keeps
    the repeated preposition for clarity.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - son of the king
  - the royal prince
  lexicon: HALOT
  rationale: The construct phrase is rendered idiomatically. 'The king's son' is more
    natural than 'son of the king,' while 'prince' would add a title not explicitly
    used.
