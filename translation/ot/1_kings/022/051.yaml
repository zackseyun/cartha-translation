id: 1KI.22.51
reference: 1 Kings 22:51
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יְהֽוֹשָׁפָט֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵר֙ עִם אֲבֹתָ֔י/ו בְּ/עִ֖יר
    דָּוִ֣ד אָבִ֑י/ו וַ/יִּמְלֹ֛ךְ יְהוֹרָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃ס
translation:
  text: And Jehoshaphat slept with his fathers and was buried with his fathers in
    the city of David his father, and Jehoram his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a customary expression for dying.
    reason: lexical_alternative
  - marker: b
    text: '''His father'' here uses Hebrew genealogical language that can also mean
      ''forefather'' or ''ancestor.'''
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal obituary formulae, שׁכב with 'with his fathers' is the conventional
    idiom for death. 'Slept with his fathers' preserves the Hebrew wording and its
    literary formula better than the interpretive 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is a standard dynastic formula. 'Fathers' is more formally aligned
    with the Hebrew than 'ancestors,' while still intelligible in context.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as a passive, 'was buried.' 'Entombed'
    would add specificity not present in the Hebrew.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard place-name expression in English Bible style and
    accurately reflects the construct phrase.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Though David is a forefather rather than immediate father, Hebrew אָב
    commonly covers ancestor/forefather. The formulaic expression is best preserved
    as 'his father,' with the broader genealogical sense understood from context.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The verb marks accession rather than the whole duration of rule. 'Became
    king' communicates succession more precisely than 'reigned.'
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The phrase indicates succession to office. 'In his place' is idiomatic
    English and preserves the sense of replacement/succession.
