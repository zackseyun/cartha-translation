id: 1KI.22.45
reference: 1 Kings 22:45
source:
  edition: WLC
  text: וַ/יַּשְׁלֵ֥ם יְהוֹשָׁפָ֖ט עִם מֶ֥לֶךְ יִשְׂרָאֵֽל־׃
translation:
  text: And Jehoshaphat made peace with the king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jehoshaphat was at peace with the king of Israel.' The Hebrew verb
      can be understood as either entering into peace or being in a state of peace;
      the main text favors the eventive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יַּשְׁלֵם
  chosen: made peace
  alternatives:
  - was at peace
  - made peace with
  - entered into peace with
  lexicon: HALOT
  rationale: From the verb שׁלם in the Hiphil with waw-consecutive, here denoting
    establishing peaceful relations or concluding peace. 'Made peace' is idiomatic
    modern English and captures the eventive sense better than the stative 'was at
    peace.'
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: עִם
  chosen: with
  alternatives:
  - with regard to
  lexicon: HALOT
  rationale: Standard preposition meaning 'with' in the sense of relation/association;
    in this context it marks the party with whom peace was made.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. The definite sense is natural
    in context, referring to the reigning northern king.
