theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tone of Micaiah's initial reply
  chosen_reading: Translate the words straightforwardly without inserting explicit markers of sarcasm in the main text
  alternative_readings:
  - Add punctuation or wording to signal irony, e.g., 'Go up and triumph!'
  rationale: The Hebrew wording itself does not lexically mark sarcasm, even though the wider context strongly suggests irony. To preserve theological and narrative tension rather than resolve it interpretively, the main text remains semantically plain; the likely ironic force is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
