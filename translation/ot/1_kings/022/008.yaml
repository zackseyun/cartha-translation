id: 1KI.22.8
reference: 1 Kings 22:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֶֽלֶךְ יִשְׂרָאֵ֣ל אֶֽל יְהוֹשָׁפָ֡ט ע֣וֹד אִישׁ אֶחָ֡ד לִ/דְרֹשׁ֩ אֶת יְהוָ֨ה מֵ/אֹת֜/וֹ וַ/אֲנִ֣י שְׂנֵאתִ֗י/ו כִּ֠י לֹֽא יִתְנַבֵּ֨א עָלַ֥/י טוֹב֙ כִּ֣י אִם רָ֔ע מִיכָ֖יְהוּ בֶּן יִמְלָ֑ה וַ/יֹּ֨אמֶר֙ יְה֣וֹשָׁפָ֔ט אַל יֹאמַ֥ר הַ/מֶּ֖לֶךְ כֵּֽן־׀־־־־־־־׃
translation:
  text: 'And the king of Israel said to Jehoshaphat, “There is still one more man through whom to inquire of Yahweh, but I hate him, because he does not prophesy good concerning me, but only evil: Micaiah son of Imlah.” And Jehoshaphat said, “Let not the king say so.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to inquire of the LORD through him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while matching established English convention noted in DOCTRINE.md.
- source_word: עוֹד אִישׁ אֶחָד
  chosen: There is still one more man
  alternatives:
  - There is yet another man
  - There is still one man
  lexicon: HALOT
  rationale: עוֹד adds the sense of 'still/yet,' and אִישׁ אֶחָד indicates an additional individual. 'One more man' communicates the additive force naturally in English.
- source_word: לִדְרֹשׁ אֶת־יְהוָה מֵאֹתוֹ
  chosen: through whom to inquire of the LORD
  alternatives:
  - by whom to seek the LORD
  - to inquire of the LORD through him
  lexicon: HALOT
  rationale: דָּרַשׁ with אֶת־יְהוָה in prophetic context means to seek/inquire of the LORD. מֵאֹתוֹ indicates the inquiry is made by means of this man, so 'through whom' is idiomatic and preserves the mediating role.
- source_word: שְׂנֵאתִיו
  chosen: I hate him
  alternatives:
  - I have hated him
  - I am hostile to him
  lexicon: HALOT
  rationale: The perfect verb expresses Ahab's settled attitude. Simple present English best conveys the current force in direct speech.
- source_word: לֹא יִתְנַבֵּא עָלַי טוֹב כִּי אִם רָע
  chosen: he never prophesies good concerning me, but only evil
  alternatives:
  - he does not prophesy good about me, but evil
  - he prophesies nothing good concerning me, only bad
  lexicon: HALOT
  rationale: יִתְנַבֵּא is 'prophesy.' עָלַי here means 'concerning/about me.' כִּי אִם after negation has the exceptive sense 'but only.' 'Evil' is retained rather than 'disaster' or 'bad' because it reflects רָע broadly and matches the king's complaint without over-interpreting whether moral evil or calamity is meant.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: בֶּן־יִמְלָה
  chosen: son of Imlah
  alternatives:
  - the son of Imlah
  lexicon: HALOT
  rationale: Standard patronymic rendering; article omitted in English for natural style.
- source_word: אַל יֹאמַר הַמֶּלֶךְ כֵּן
  chosen: Let not the king say so
  alternatives:
  - The king should not say that
  - Do not let the king speak this way
  lexicon: HALOT
  rationale: אַל with the jussive expresses prohibition/wish. 'Let not the king say so' preserves the respectful, courtly tone of Jehoshaphat's response more closely than a flatter modern paraphrase.
