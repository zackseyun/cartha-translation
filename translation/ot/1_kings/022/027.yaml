theological_decisions:
- issue: Implication of בְשָׁלוֹם in Ahab's statement
  chosen_reading: rendered as 'in peace'
  alternative_readings:
  - safely
  - successfully
  rationale: The Hebrew שָׁלוֹם here can denote safe, unharmed return. Rendering it
    'in peace' preserves the idiom and the narrative irony without narrowing it to
    one interpretive nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
