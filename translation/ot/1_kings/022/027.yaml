id: 1KI.22.27
reference: 1 Kings 22:27
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ כֹּ֚ה אָמַ֣ר הַ/מֶּ֔לֶךְ שִׂ֥ימוּ אֶת זֶ֖ה בֵּ֣ית הַ/כֶּ֑לֶא
    וְ/הַאֲכִילֻ֨/הוּ לֶ֤חֶם לַ֨חַץ֙ וּ/מַ֣יִם לַ֔חַץ עַ֖ד בֹּאִ֥/י בְ/שָׁלֽוֹם־׃
translation:
  text: 'and say, ‘Thus says the king: Put this man in the prison, and feed him with
    bread of affliction and water of affliction until I come in peace.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread of distress' and 'water of distress'; the expression likely refers
      to harsh or meager prison rations.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: Thus says the king
  alternatives:
  - This is what the king says
  - Thus has the king said
  lexicon: HALOT
  rationale: Retains the standard messenger formula in natural English. 'Thus says'
    preserves the formal proclamation style better than the more conversational alternative.
- source_word: שִׂימוּ אֶת זֶה
  chosen: Put this man
  alternatives:
  - Place this one
  - Put this fellow
  lexicon: HALOT
  rationale: The demonstrative 'this' refers to Micaiah in context; 'this man' makes
    the referent idiomatic in English without adding content beyond the Hebrew.
- source_word: בֵּית הַכֶּלֶא
  chosen: in the prison
  alternatives:
  - in the house of confinement
  - in prison
  lexicon: HALOT
  rationale: The phrase literally means 'house of confinement/prison.' 'The prison'
    preserves the concrete noun and the article while remaining readable.
- source_word: וְהַאֲכִילֻהוּ
  chosen: and feed him
  alternatives:
  - and give him to eat
  - and nourish him
  lexicon: HALOT
  rationale: A straightforward causative imperative from אכל. 'Feed him' is concise
    and natural.
- source_word: לֶחֶם לַחַץ
  chosen: bread of affliction
  alternatives:
  - bread of distress
  - meager bread
  lexicon: HALOT
  rationale: Preserves the genitival force and the idiomatic severity of the expression.
    Although it likely implies scant or miserable rations, the more literal rendering
    keeps the metaphorical weight.
- source_word: וּמַיִם לַחַץ
  chosen: water of affliction
  alternatives:
  - water of distress
  - meager water
  lexicon: HALOT
  rationale: Kept parallel with 'bread of affliction.' The phrase likely denotes hardship
    rations, but the literal form best preserves the Hebrew expression.
- source_word: עַד בֹּאִי בְשָׁלוֹם
  chosen: until I come in peace
  alternatives:
  - until I return safely
  - until I come back in peace
  lexicon: HALOT
  rationale: Formally close to the Hebrew and preserves the king's confident claim.
    'In peace' can imply safe return; that nuance is left intact rather than interpreted
    away.
