id: 1KI.22.31
reference: 1 Kings 22:31
source:
  edition: WLC
  text: וּ/מֶ֣לֶךְ אֲרָ֡ם צִוָּ֣ה אֶת שָׂרֵי֩ הָ/רֶ֨כֶב אֲשֶׁר ל֜/וֹ שְׁלֹשִׁ֤ים וּ/שְׁנַ֨יִם֙
    לֵ/אמֹ֔ר לֹ֚א תִּלָּ֣חֲמ֔וּ אֶת קָטֹ֖ן וְ/אֶת גָּד֑וֹל כִּ֛י אִֽם אֶת מֶ֥לֶךְ
    יִשְׂרָאֵ֖ל לְ/בַדּֽ/וֹ־־־־־־׃
translation:
  text: Now the king of Aram had commanded the thirty-two chariot commanders who belonged
    to him, saying, “Do not fight with small or great, but only with the king of Israel
    alone.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not fight with anyone, small or great, except only the king of Israel.”
      The Hebrew idiom “small or great” means people of any rank or status.
    reason: lexical_alternative
  - marker: b
    text: “Aram” is the Hebrew place-name; traditionally rendered “Syria.”
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מֶלֶךְ אֲרָם
  chosen: Now the king of Aram
  alternatives:
  - And the king of Aram
  - the king of Syria
  lexicon: HALOT
  rationale: ו conjunction can be rendered simply as 'and,' but in narrative English
    'now' smoothly marks a scene-setting transition without adding content. אֲרָם
    is transliterated as the place-name 'Aram' rather than traditional 'Syria,' following
    original-language primacy and the policy to transliterate names.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  - gave orders to
  lexicon: HALOT
  rationale: The verb denotes issuing a command. English past perfect fits the narrative
    backgrounding relative to the ensuing battle scene.
- source_word: שָׂרֵי הָרֶכֶב
  chosen: chariot commanders
  alternatives:
  - captains of the chariots
  - officers of the chariots
  - chariot officers
  lexicon: HALOT
  rationale: שָׂרִים are officials/commanders; הָרֶכֶב refers to the chariot force.
    'Chariot commanders' is concise, natural English that preserves the military sense
    better than a wooden 'princes of the chariot.'
- source_word: אֲשֶׁר לוֹ
  chosen: who belonged to him
  alternatives:
  - who were his
  - under his command
  lexicon: HALOT
  rationale: The relative clause identifies these commanders as attached to the king.
    'Belonged to him' preserves possession/association without over-interpreting rank
    structure.
- source_word: שְׁלֹשִׁים וּשְׁנַיִם
  chosen: thirty-two
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' keeps the formal linkage
    to the quoted command.
- source_word: לֹא תִּלָּחֲמוּ
  chosen: Do not fight
  alternatives:
  - You shall not fight
  - Do not engage in battle
  lexicon: HALOT
  rationale: Imperatival force in direct speech is best rendered with natural English
    prohibition.
- source_word: אֶת קָטֹן וְאֶת גָּדוֹל
  chosen: with small or great
  alternatives:
  - with anyone, small or great
  - with lesser or greater
  - with young or old
  lexicon: HALOT
  rationale: The idiom contrasts insignificant and important persons, meaning no one
    of any rank. 'Small or great' preserves the Hebrew expression compactly; adding
    'anyone' would clarify but slightly expands beyond the source.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - but rather
  lexicon: HALOT
  rationale: The construction marks a strong exception/exclusivity. 'But only' communicates
    the adversative and restrictive force naturally.
- source_word: אֶת מֶלֶךְ יִשְׂרָאֵל
  chosen: with the king of Israel
  alternatives:
  - against the king of Israel
  lexicon: HALOT
  rationale: The object of fighting is marked by אֶת. In English, 'fight with' can
    mean 'fight against' in this context and matches the repeated preposition from
    the first clause; 'against' is a possible clarifying alternative.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'The adverb emphasizes exclusivity: the king of Israel is the sole target.'
