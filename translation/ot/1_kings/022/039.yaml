id: 1KI.22.39
reference: 1 Kings 22:39
source:
  edition: WLC
  text: וְ/יֶתֶר֩ דִּבְרֵ֨י אַחְאָ֜ב וְ/כָל אֲשֶׁ֣ר עָשָׂ֗ה וּ/בֵ֤ית הַ/שֵּׁן֙ אֲשֶׁ֣ר
    בָּנָ֔ה וְ/כָל הֶ/עָרִ֖ים אֲשֶׁ֣ר בָּנָ֑ה הֲ/לֽוֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר
    דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: Now the rest of the acts of Ahab, and all that he did, and the ivory house
    that he built, and all the cities that he built—are they not written in the Book
    of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of ivory.' The phrase likely refers to a royal building decorated
      with ivory rather than a structure made entirely of ivory.
    reason: lexical_alternative
  - marker: b
    text: '''The Book of the Chronicles of the Kings of Israel'' refers to a royal
      record source cited in Kings, not necessarily to the biblical book of Chronicles.'
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining account or remainder of a subject. 'The
    rest of' is the standard sense; 'Now' gives natural English discourse flow at
    the start of a regnal-summary formula without adding substantive content.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - matters
  - deeds
  - accounts
  lexicon: HALOT
  rationale: In the formula 'rest of the דברי X' in Kings, the sense is not merely
    'words' but the recorded acts/matters of a king. 'Acts' is idiomatic and fits
    the historiographic context.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Did' preserves the
    broad Hebrew verb עשה without over-specifying accomplishment or success.
- source_word: בֵּית הַשֵּׁן
  chosen: the ivory house
  alternatives:
  - the house of ivory
  - the palace of ivory
  lexicon: HALOT
  rationale: Literally 'house of the ivory/ivory house.' 'Ivory house' is concise
    and natural English, while preserving the likely sense of a royal building adorned
    with ivory. 'Palace' would interpret beyond the lexical data.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: Standard relative clause rendering; 'that' is more natural in contemporary
    English than 'which' here.
- source_word: וְכָל הֶעָרִים אֲשֶׁר בָּנָה
  chosen: and all the cities that he built
  alternatives:
  - and all the towns that he built
  lexicon: HALOT
  rationale: עָרִים normally means 'cities.' Although some may have been fortified
    towns, 'cities' is the default and avoids unnecessary interpretive narrowing.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - are they not indeed
  - is it not the case that they are
  lexicon: HALOT
  rationale: This particle introduces a rhetorical question expecting a positive answer.
    'Are they not' captures the conventional formula in English.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle literally means 'written.' 'Recorded' is possible,
    but 'written' better preserves the source wording in this archival formula.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Though literally 'on the book/scroll,' English archival idiom uses 'written
    in the Book.' This is a conventional and accurate rendering of the reference to
    an official written source.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: This is the standard title for the royal record source cited throughout
    Kings. 'Chronicles' is idiomatic and recognizable; 'annals' is also possible,
    but 'Chronicles' better reflects the established historiographic label without
    implying identity with the canonical book of Chronicles.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this title, ל marks relation/possession rather than benefit. 'Of the
    Kings of Israel' is the natural English rendering of the source title.
