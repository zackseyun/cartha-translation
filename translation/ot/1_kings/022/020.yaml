id: 1KI.22.20
reference: 1 Kings 22:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה מִ֤י יְפַתֶּה֙ אֶת אַחְאָ֔ב וְ/יַ֕עַל וְ/יִפֹּ֖ל בְּ/רָמֹ֣ת גִּלְעָ֑ד וַ/יֹּ֤אמֶר זֶה֙ בְּ/כֹ֔ה וְ/זֶ֥ה אֹמֵ֖ר בְּ/כֹֽה־׃
translation:
  text: And Yahweh said, “Who will entice Ahab, so that he may go up and fall at Ramoth-gilead?” And this one said one thing, and that one said another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “persuade”; the verb can also carry the sense “deceive,” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְפַתֶּה
  chosen: will entice
  alternatives:
  - will persuade
  - will deceive
  lexicon: HALOT
  rationale: The piel of פתה can mean entice, persuade, or deceive depending on context. 'Entice' best preserves the sense of inducing someone toward a course of action without over-specifying either benign persuasion or outright deception in the main text.
- source_word: וְיַעַל
  chosen: so that he may go up
  alternatives:
  - and he may go up
  - that he may go up
  lexicon: HALOT
  rationale: The conjunction plus imperfect here expresses the intended result/purpose of the enticement. 'So that he may go up' reads naturally in English while preserving the sequence and purpose nuance.
- source_word: וְיִפֹּל
  chosen: and fall
  alternatives:
  - and be struck down
  - and perish
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In this military context it implies defeat/death, but the Hebrew uses the more basic verb, so 'fall' preserves the source wording and leaves the implication intact.
- source_word: בְּרָמֹת גִּלְעָד
  chosen: at Ramoth-gilead
  alternatives:
  - in Ramoth-gilead
  lexicon: HALOT
  rationale: A place name, transliterated rather than translated. 'At' fits the battle-location sense in English better than 'in' while remaining faithful to the preposition.
- source_word: זֶה בְּכֹה וְזֶה אֹמֵר בְּכֹה
  chosen: And one said one thing, and another said another
  alternatives:
  - And this one said thus, and that one said thus
  - One said in this manner, and another said in that manner
  lexicon: HALOT
  rationale: The idiom indicates differing proposals from different speakers in the heavenly council. A more literal 'thus' is possible, but 'one said one thing, and another said another' communicates the contrast clearly in modern English without adding content.
