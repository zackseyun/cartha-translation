id: 1KI.22.4
reference: 1 Kings 22:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל יְה֣וֹשָׁפָ֔ט הֲ/תֵלֵ֥ךְ אִתִּ֛/י לַ/מִּלְחָמָ֖ה רָמֹ֣ת גִּלְעָ֑ד
    וַ/יֹּ֤אמֶר יְהֽוֹשָׁפָט֙ אֶל מֶ֣לֶךְ יִשְׂרָאֵ֔ל כָּמ֧וֹ/נִי כָמ֛וֹ/ךָ כְּ/עַמִּ֥/י
    כְ/עַמֶּ֖/ךָ כְּ/סוּסַ֥/י כְּ/סוּסֶֽי/ךָ־־׃
translation:
  text: And he said to Jehoshaphat, “Will you go with me to battle at Ramoth-gilead?”
    And Jehoshaphat said to the king of Israel, “I am as you are, my people as your
    people, my horses as your horses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my people are as your people, and my horses as your horses.” The Hebrew
      is a terse verbless expression of solidarity and alliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תֵלֵךְ
  chosen: Will you go
  alternatives:
  - Would you go
  - Will you come
  lexicon: HALOT
  rationale: The interrogative particle with Qal imperfect 2ms naturally yields a
    direct question, 'Will you go?' English 'go' preserves the motion verb without
    adding nuance. 'Come' would shift deictic perspective not explicit in the Hebrew.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward accompaniment marker with 1cs suffix; no reason to paraphrase.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - to the battle
  - to war
  lexicon: HALOT
  rationale: The phrase with הלך idiomatically means going to engage in warfare. 'To
    battle' is natural modern English and preserves the military sense without overexpansion.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; hyphenation helps
    readers recognize the compound toponym.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: The construct chain is best rendered formally here. The definite sense
    is clear in context even without the article on 'king' in Hebrew.
- source_word: כָּמוֹנִי כָמוֹךָ
  chosen: I am as you are
  alternatives:
  - I am like you
  - I am yours as you are
  lexicon: HALOT
  rationale: The paired comparative forms express solidarity and alliance. Supplying
    'I am' is required in English. 'I am as you are' preserves the terse parallelism
    better than a looser paraphrase.
- source_word: כְּעַמִּי כְעַמֶּךָ
  chosen: my people as your people
  alternatives:
  - my people are as your people
  - my people like your people
  lexicon: HALOT
  rationale: This continues the verbless comparative sequence. The chosen rendering
    keeps the compact poetic parallelism while remaining intelligible.
- source_word: כְּסוּסַי כְּסוּסֶיךָ
  chosen: my horses as your horses
  alternatives:
  - my horses are as your horses
  - my cavalry as your cavalry
  lexicon: HALOT
  rationale: סוּס means 'horse'; while military resources are implied, 'cavalry' would
    interpret beyond the lexical form. The phrase likely denotes military support,
    but the translation should preserve the concrete noun.
