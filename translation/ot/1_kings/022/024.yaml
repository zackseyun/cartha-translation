theological_decisions:
- issue: Rendering and capitalization of רוּחַ יְהוָה
  chosen_reading: the Spirit of the LORD
  alternative_readings:
  - the spirit of the LORD
  rationale: Because the phrase in this prophetic dispute refers to the divine prophetic
    Spirit rather than a mere disposition or wind, the personal/divine sense is best
    represented by 'Spirit.' This preserves the theological force of Zedekiah's sarcastic
    claim without adding doctrinal content beyond the text.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD; preserve theological
    tension rather than resolve it'
