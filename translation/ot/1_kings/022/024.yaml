id: 1KI.22.24
reference: 1 Kings 22:24
source:
  edition: WLC
  text: וַ/יִּגַּשׁ֙ צִדְקִיָּ֣הוּ בֶֽן כְּנַעֲנָ֔ה וַ/יַּכֶּ֥ה אֶת מִיכָ֖יְהוּ עַל
    הַ/לֶּ֑חִי וַ/יֹּ֕אמֶר אֵי זֶ֨ה עָבַ֧ר רֽוּחַ יְהוָ֛ה מֵ/אִתִּ֖/י לְ/דַבֵּ֥ר אוֹתָֽ/ךְ־־־־־׃
translation:
  text: Then Zedekiah son of Chenaanah came near and struck Micaiah on the cheek and
    said, “Which way did the Spirit of the LORD pass from me to speak to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By which way did the Spirit of the LORD pass from me to speak to you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - came forward
  lexicon: HALOT
  rationale: The verb נגשׁ in the wayyiqtol narrative form denotes approaching or
    coming near. 'Came near' preserves the physical movement and the confrontational
    tone without sounding overly formal.
- source_word: צִדְקִיָּהוּ בֶן כְּנַעֲנָה
  chosen: Zedekiah son of Chenaanah
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained as the standard Hebrew patronymic construction.
- source_word: וַיַּכֶּה ... עַל הַלֶּחִי
  chosen: struck Micaiah on the cheek
  alternatives:
  - slapped Micaiah on the cheek
  - struck Micaiah on the jaw
  lexicon: HALOT
  rationale: נכה is a broad verb for striking. 'Struck ... on the cheek' is the most
    textually secure and neutral rendering. 'Slapped' is possible in context but slightly
    more interpretive regarding manner; 'cheek' is the normal rendering of לֶחִי.
- source_word: אֵי זֶה
  chosen: Which way
  alternatives:
  - Where
  - By which way
  lexicon: HALOT
  rationale: The idiom asks about the route or manner by which the Spirit supposedly
    departed from Zedekiah to speak to Micaiah. 'Which way' captures the taunting
    force better than a bare 'where' while remaining natural English.
- source_word: עָבַר
  chosen: pass
  alternatives:
  - go
  - cross over
  lexicon: HALOT
  rationale: 'עבר commonly means ''pass over/by/from.'' Here ''pass from me'' reflects
    the sarcastic challenge: by what route did the Spirit leave Zedekiah and go to
    Micaiah?'
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the spirit of the LORD
  lexicon: HALOT
  rationale: In prophetic context this refers to the divine Spirit, so 'Spirit' is
    capitalized in English. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: The project's default rendering for the divine name is 'the LORD,' following
    the stated doctrine and translation policy.
- source_word: מֵאִתִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The prepositional phrase straightforwardly marks source. 'From me' is
    concise and preserves the sense of departure.
- source_word: לְדַבֵּר אֹתָךְ
  chosen: to speak to you
  alternatives:
  - to speak with you
  lexicon: HALOT
  rationale: 'Though the Hebrew construction is somewhat compressed, the sense is
    clearly directional: the Spirit speaking to Micaiah. ''To speak to you'' is idiomatic
    and fits the accusative pronoun usage in context.'
