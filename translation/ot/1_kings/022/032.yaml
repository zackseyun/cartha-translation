id: 1KI.22.32
reference: 1 Kings 22:32
source:
  edition: WLC
  text: וַ/יְהִ֡י כִּ/רְאוֹת֩ שָׂרֵ֨י הָ/רֶ֜כֶב אֶת יְהוֹשָׁפָ֗ט וְ/הֵ֤מָּה אָֽמְרוּ֙ אַ֣ךְ מֶֽלֶךְ יִשְׂרָאֵ֣ל ה֔וּא וַ/יָּסֻ֥רוּ עָלָ֖י/ו לְ/הִלָּחֵ֑ם וַ/יִּזְעַ֖ק יְהוֹשָׁפָֽט־־׃
translation:
  text: And it happened, when the commanders of the chariots saw Jehoshaphat, that they said, “Surely it is the king of Israel.” So they turned against him to fight, but Jehoshaphat cried out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they turned against him to attack.” The Hebrew verb can denote turning toward or against someone in order to engage in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'they turned aside against him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Retains the narrative wayyiqtol introduction without archaic diction. 'And it happened' preserves the Hebrew storytelling cadence better than omitting it entirely.
- source_word: כִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - as soon as ... saw
  - upon seeing
  lexicon: HALOT
  rationale: The infinitive construct with כ conveys temporal sense here. 'When ... saw' is natural English and adequately reflects the sequence.
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the captains of the chariots
  - the chariot commanders
  - the commanders of the chariot force
  lexicon: HALOT
  rationale: שָׂרֵי denotes military leaders/commanders. הָרֶכֶב refers to chariotry or chariot force; 'commanders of the chariots' is a close, readable rendering, though the sense is military officers over chariot units.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Certainly
  lexicon: HALOT
  rationale: 'Here אַךְ marks confident identification rather than restriction. ''Surely'' best captures their assumption: they were convinced this was the king of Israel.'
- source_word: מֶלֶךְ יִשְׂרָאֵל הוּא
  chosen: it is the king of Israel
  alternatives:
  - he is the king of Israel
  lexicon: HALOT
  rationale: English idiom prefers 'it is' in identification clauses of this kind, though the Hebrew pronoun is masculine singular. The referent remains Jehoshaphat as mistakenly identified.
- source_word: וַיָּסֻרוּ עָלָיו
  chosen: they turned aside against him
  alternatives:
  - they turned toward him
  - they closed in on him
  - they turned against him
  lexicon: HALOT
  rationale: סור with עַל can mean to turn toward/against someone. 'Turned aside against him' preserves the directional nuance of the verb while showing hostile intent from the prepositional phrase and following infinitive.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to attack
  - to wage war
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם here indicates engaging in battle. 'To fight' is broad and faithful; 'to attack' is interpretive but possible from context.
- source_word: וַיִּזְעַק
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: HALOT
  rationale: זעק often denotes a loud cry, often in distress. 'Cried out' preserves the urgency without specifying content not present in this verse.
