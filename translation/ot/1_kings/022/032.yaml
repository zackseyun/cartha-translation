  from: they turned aside against him
  to: they turned against him
  rationale: The phrase 'turned aside against him' is slightly redundant and a bit clunky. While 'turned aside' accurately reflects the Hebrew verb סור (sur) meaning to deviate or turn away, the hostile intent is fully conveyed by 'turned against him' in conjunction with 'to fight'. The current rendering is not incorrect, but 'turned against him' is more concise and equally clear, aligning with the 'optimal-equivalence' philosophy by prioritizing natural English without losing meaning. The footnote already offers 'they turned against him to attack' as an alternative, indicating this simpler phrasing is considered.
