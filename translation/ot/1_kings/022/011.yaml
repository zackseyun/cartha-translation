id: 1KI.22.11
reference: 1 Kings 22:11
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ ל֛/וֹ צִדְקִיָּ֥ה בֶֽן כְּנַעֲנָ֖ה קַרְנֵ֣י בַרְזֶ֑ל וַ/יֹּ֨אמֶר֙ כֹּֽה אָמַ֣ר יְהוָ֔ה בְּ/אֵ֛לֶּה תְּנַגַּ֥ח אֶת אֲרָ֖ם עַד כַּלֹּתָֽ/ם־־־־׃
translation:
  text: 'Then Zedekiah son of Chenaanah made horns of iron for himself and said, “Thus says Yahweh: With these you will gore Aram until they are finished off.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you will push Aram,” with the verb preserving the imagery of a horned animal striking.
    reason: lexical_alternative
  - marker: b
    text: Or “until you destroy them” / “until they are consumed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לּוֹ
  chosen: made for himself
  alternatives:
  - made for him
  - made
  lexicon: HALOT
  rationale: 'The verb עשה means ''make/do.'' The prepositional pronoun לוֹ is most naturally reflexive here in context: Zedekiah fashioned the symbolic horns for his own prophetic sign-act. ''Made for himself'' brings out the likely sense without overparaphrasing.'
- source_word: צִדְקִיָּה בֶן־כְּנַעֲנָה
  chosen: Zedekiah son of Chenaanah
  rationale: Personal names are transliterated by standard English conventions per project philosophy.
- source_word: קַרְנֵי בַרְזֶל
  chosen: horns of iron
  alternatives:
  - iron horns
  lexicon: HALOT
  rationale: A construct chain literally meaning 'horns of iron.' 'Horns of iron' is the more natural English order while preserving the imagery of power and attack.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH is rendered 'the LORD' in keeping with the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: בְּאֵלֶּה
  chosen: With these
  alternatives:
  - By these
  - With these horns
  lexicon: HALOT
  rationale: The preposition ב plus demonstrative points to the symbolic horns just made. 'With these' is concise and natural; the referent is clear from context.
- source_word: תְּנַגַּח
  chosen: you will gore
  alternatives:
  - you will push
  - you will gore with the horns
  lexicon: HALOT
  rationale: From נגח, used of horned animals but also metaphorically for forceful military defeat. 'Gore' preserves the horn imagery better than the flatter 'push.'
- source_word: אֶת־אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The object is the place/people name Aram. 'Aram' preserves the Hebrew designation better than the anachronistic 'Syria.' The collective national sense is clear in context.
- source_word: עַד כַּלֹּתָם
  chosen: until you have finished them off
  alternatives:
  - until they are consumed
  - until you destroy them
  - until their end
  lexicon: HALOT
  rationale: כלה here expresses bringing the enemy to completion/end in the sense of annihilating or finishing them. The 3mp suffix indicates the object ('them'), and the idiomatic English 'finished them off' conveys total defeat in readable modern English.
