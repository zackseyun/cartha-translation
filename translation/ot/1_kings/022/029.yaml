id: 1KI.22.29
reference: 1 Kings 22:29
source:
  edition: WLC
  text: וַ/יַּ֧עַל מֶֽלֶךְ יִשְׂרָאֵ֛ל וְ/יהוֹשָׁפָ֥ט מֶֽלֶךְ יְהוּדָ֖ה רָמֹ֥ת גִּלְעָֽד־־׃
translation:
  text: So the king of Israel and Jehoshaphat king of Judah went up to Ramoth-gilead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - marched up
  - came up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' With a destination place-name, 'went
    up' preserves the Hebrew directional idiom without overinterpreting it as specifically
    military movement, though the context is martial.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: The Hebrew uses the title rather than the personal name Ahab. Rendering
    it as 'the king of Israel' preserves the source wording and narrative style.
- source_word: וִיהוֹשָׁפָט
  chosen: and Jehoshaphat
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional title following the proper name; English idiom naturally
    renders it without repeating the article.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  rationale: Standard English place-name transliteration. Hyphenation helps signal
    the compound toponym and is common in English Bible usage.
