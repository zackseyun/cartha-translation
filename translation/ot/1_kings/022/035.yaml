id: 1KI.22.35
reference: 1 Kings 22:35
source:
  edition: WLC
  text: וַ/תַּעֲלֶ֤ה הַ/מִּלְחָמָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא וְ/הַ/מֶּ֗לֶךְ הָיָ֧ה מָעֳמָ֛ד
    בַּ/מֶּרְכָּבָ֖ה נֹ֣כַח אֲרָ֑ם וַ/יָּ֣מָת בָּ/עֶ֔רֶב וַ/יִּ֥צֶק דַּֽם הַ/מַּכָּ֖ה
    אֶל חֵ֥יק הָ/רָֽכֶב־־׃
translation:
  text: And the battle intensified that day, and the king was kept standing in the
    chariot facing Aram, and he died in the evening; and the blood from the wound
    ran into the bottom of the chariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the battle grew' or more literally 'the battle went up' that day.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king stood in the chariot'; the Hebrew form may imply that he was
      made to remain standing or was kept upright.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into the bosom/lap of the chariot,' an idiom for the inner or lower
      part of the chariot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲלֶה
  chosen: intensified
  alternatives:
  - grew
  - went up
  - increased
  lexicon: HALOT
  rationale: The verb עלה ('go up') with 'the battle' is idiomatic for escalation.
    'Intensified' conveys the plain sense in natural English better than the more
    literal but opaque 'went up.'
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the fighting
  - the war
  lexicon: HALOT
  rationale: In this immediate scene the reference is to the ongoing combat of the
    day, so 'the battle' is the most precise and natural rendering.
- source_word: מָעֳמָד
  chosen: was kept standing
  alternatives:
  - stood
  - was stationed
  - was propped up
  lexicon: HALOT
  rationale: The Hophal/Hophal-like passive participial form suggests a caused or
    maintained standing rather than merely 'stood.' Given the context of Ahab's injury,
    'was kept standing' preserves that nuance without over-specifying the means.
- source_word: בַּמֶּרְכָּבָה
  chosen: in the chariot
  alternatives:
  - on the chariot
  lexicon: HALOT
  rationale: Standard rendering for a person positioned within a war chariot.
- source_word: נֹכַח אֲרָם
  chosen: facing Aram
  alternatives:
  - opposite Aram
  - in front of Aram
  - toward the Arameans
  lexicon: HALOT
  rationale: נֹכַח denotes being opposite or facing. 'Facing Aram' is concise and
    idiomatic; 'Aram' is retained as the proper national name rather than replacing
    it with the interpretive 'the Arameans' in the main text.
- source_word: וַיָּמָת בָּעֶרֶב
  chosen: and he died in the evening
  alternatives:
  - and he died at evening
  - and he died that evening
  lexicon: HALOT
  rationale: A straightforward temporal clause; 'in the evening' is natural modern
    English.
- source_word: וַיִּצֶק
  chosen: ran
  alternatives:
  - poured
  - flowed
  - was poured out
  lexicon: HALOT
  rationale: The verb יצק often means 'pour,' but with blood from a wound into part
    of a chariot, English idiom favors 'ran' or 'flowed.' 'Ran' is vivid and natural
    while preserving the image of liquid movement.
- source_word: דַּם הַמַּכָּה
  chosen: the blood from the wound
  alternatives:
  - the blood of the wound
  - the wound's blood
  lexicon: HALOT
  rationale: 'An English genitive is best expressed as source: blood issuing from
    the wound.'
- source_word: חֵיק הָרָכֶב
  chosen: the bottom of the chariot
  alternatives:
  - the bosom of the chariot
  - the interior of the chariot
  - the lap of the chariot
  lexicon: HALOT
  rationale: חֵיק literally means 'bosom/lap,' but for a chariot this is metaphorical
    for the hollow, interior, or bottom area where blood would collect. 'Bottom of
    the chariot' communicates the concrete sense clearly in modern English.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical labels such as 'Syria.'
