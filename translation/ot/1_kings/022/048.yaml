id: 1KI.22.48
reference: 1 Kings 22:48
source:
  edition: WLC
  text: וּ/מֶ֥לֶךְ אֵ֛ין בֶּ/אֱד֖וֹם נִצָּ֥ב מֶֽלֶךְ׃
translation:
  text: And there was no king in Edom; a deputy served as king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a governor was king' or 'an appointed official was king.' The Hebrew
      נִצָּב literally refers to one who is stationed or appointed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֶלֶךְ
  chosen: And ... king
  alternatives:
  - Now ... king
  lexicon: HALOT
  rationale: The conjunction ו introduces the clause and is naturally rendered 'and'
    in narrative prose. The noun מֶלֶךְ is retained as 'king.'
- source_word: אֵין
  chosen: there was no
  alternatives:
  - there is no
  - no ... was
  lexicon: HALOT
  rationale: אֵין expresses nonexistence; in this historical narrative context, English
    past tense 'there was no' best fits the surrounding account.
- source_word: בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - among the Edomites
  lexicon: HALOT
  rationale: 'The preposition ב plus the place name אֱדוֹם is most straightforwardly
    locative: ''in Edom.'''
- source_word: נִצָּב
  chosen: deputy
  alternatives:
  - governor
  - prefect
  - appointed official
  - one stationed
  lexicon: HALOT
  rationale: The participle from נצב literally denotes one who is stationed or appointed.
    In this political context, it refers to an appointed ruler subordinate to another
    power, so 'deputy' captures the office idiomatically without overstating technical
    precision.
- source_word: מֶלֶךְ
  chosen: served as king
  alternatives:
  - was king
  - as king
  lexicon: HALOT
  rationale: The final מֶלֶךְ functions predicatively with נִצָּב, indicating the
    deputy's role. 'Served as king' makes clear that this was not an independent hereditary
    king but someone functioning in the king's place.
