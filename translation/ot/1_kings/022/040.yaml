id: 1KI.22.40
reference: 1 Kings 22:40
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב אַחְאָ֖ב עִם אֲבֹתָ֑י/ו וַ/יִּמְלֹ֛ךְ אֲחַזְיָ֥הוּ בְנ֖/וֹ
    תַּחְתָּֽי/ו־׃פ
translation:
  text: And Ahab slept with his fathers, and Ahaziah his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''slept with his fathers,'' a standard royal formula meaning he
      died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב עם־אבותיו is conventionally used for death/burial in royal
    notices. Rendering the verb as 'slept' preserves the Hebrew idiom and its formulaic
    character, while the context makes the meaning clear. 'Died' is interpretive and
    less transparent to the source wording.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard Hebrew royal-death formula. 'With his fathers' preserves
    the idiomatic and dynastic flavor of the source. 'Ancestors' is possible but less
    literal and loses the established biblical phrasing.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: In this succession formula, 'became king' clearly expresses accession
    to the throne. 'Reigned' can suggest the ongoing exercise of rule rather than
    the moment of succession.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition here marks succession. 'In his place' is natural English
    and accurately conveys replacement in office. 'After him' is possible but weaker,
    since the Hebrew implies succession to the same position.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name transliterated according to standard English convention,
    following the translation policy to transliterate names rather than translate
    them.
- source_word: אֲחַזְיָהוּ
  chosen: Ahaziah
  rationale: Personal name transliterated according to standard English convention,
    following the translation policy to transliterate names rather than translate
    them.
- source_word: בְנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly to preserve the
    dynastic succession notice in the Hebrew.
