theological_decisions:
- issue: Rendering of קָדֵשׁ in a morally and culturally charged context
  chosen_reading: cult prostitutes
  alternative_readings:
  - male cult prostitutes
  - sodomites
  - cult functionaries
  rationale: The term refers to persons associated with prohibited cultic sexual practice.
    'Cult prostitutes' communicates the cultic and sexual dimensions without importing
    later doctrinal polemics. Because the Hebrew form is singular collective, the
    plural English reflects the group sense in context. An alternative specifying
    'male' is lexically defensible and worth preserving in a footnote because the
    Hebrew term is masculine singular.
  doctrine_reference: Translation philosophy §§1, 5, 6
