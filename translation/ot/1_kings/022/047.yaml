id: 1KI.22.47
reference: 1 Kings 22:47
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ הַ/קָּדֵ֔שׁ אֲשֶׁ֣ר נִשְׁאַ֔ר בִּ/ימֵ֖י אָסָ֣א אָבִ֑י/ו בִּעֵ֖ר
    מִן הָ/אָֽרֶץ־׃
translation:
  text: And he removed from the land the rest of the cult prostitutes who remained
    in the days of Asa his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the male cult prostitutes.' The Hebrew קָדֵשׁ is a masculine term used
      for persons involved in illicit cultic sexual practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: And ... the rest of
  alternatives:
  - And the remainder of
  - And the remnant of
  lexicon: HALOT
  rationale: יֶתֶר denotes what is left over or remaining. In context it introduces
    the surviving group that had not yet been removed. Rendering with 'the rest of'
    is natural modern English and preserves the sense of remainder.
- source_word: הַקָּדֵשׁ
  chosen: the cult prostitutes
  alternatives:
  - the male cult prostitute
  - the sodomite
  - the consecrated one
  lexicon: HALOT
  rationale: קָדֵשׁ in this historical context refers to a male attached to illicit
    cultic sexual practice, not a generic 'holy one.' Because English singular collective
    can sound awkward here, 'the cult prostitutes' conveys the class represented by
    the singular collective noun. 'Sodomite' is avoided as inaccurate and tradition-bound
    rather than lexically precise.
- source_word: אֲשֶׁר נִשְׁאַר
  chosen: who remained
  alternatives:
  - that were left
  - who were left over
  lexicon: HALOT
  rationale: The relative clause identifies those still present from an earlier period.
    'Who remained' is concise and idiomatic, preserving the passive/resultative sense
    of נִשְׁאַר.
- source_word: בִּימֵי אָסָא אָבִיו
  chosen: in the days of Asa his father
  alternatives:
  - from the days of Asa his father
  - during the days of Asa his father
  lexicon: HALOT
  rationale: The phrase marks the time period from which these persons had remained.
    'In the days of Asa his father' is a close rendering of the Hebrew and preserves
    the temporal reference without over-interpreting the preposition.
- source_word: בִּעֵר
  chosen: he removed
  alternatives:
  - he purged
  - he burned away
  - he exterminated
  lexicon: HALOT
  rationale: בער can mean burn, consume, purge, or remove depending on context. Since
    the object is persons being expelled from the land, 'he removed' best fits the
    idiom מִן־הָאָרֶץ and avoids implying literal burning or execution where the text
    does not specify the method.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - out of the land
  - from the הארץ/land
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the territory/land of Judah rather than the whole
    earth. 'From the land' is the standard contextual rendering and fits the political-geographical
    setting.
