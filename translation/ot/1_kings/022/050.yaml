id: 1KI.22.50
reference: 1 Kings 22:50
source:
  edition: WLC
  text: אָ֠ז אָמַ֞ר אֲחַזְיָ֤הוּ בֶן אַחְאָב֙ אֶל יְה֣וֹשָׁפָ֔ט יֵלְכ֧וּ עֲבָדַ֛/י
    עִם עֲבָדֶ֖י/ךָ בָּ/אֳנִיּ֑וֹת וְ/לֹ֥א אָבָ֖ה יְהוֹשָׁפָֽט־־־׃
translation:
  text: Then Ahaziah son of Ahab said to Jehoshaphat, “Let my servants go with your
    servants in the ships,” but Jehoshaphat was not willing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “on the ships.” The Hebrew preposition can be rendered either way in
      English with seafaring contexts.
    reason: lexical_alternative
  - marker: b
    text: Or, “but Jehoshaphat refused.” The Hebrew more literally says he “was not
      willing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Temporal/sequential discourse marker introducing the next event. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct-speech narrative contexts.
- source_word: אֲחַזְיָהוּ בֶן אַחְאָב
  chosen: Ahaziah son of Ahab
  rationale: Personal names are transliterated by standard convention; בֶן is rendered
    relationally as 'son of'.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Normal directional preposition introducing the addressee of speech.
- source_word: יֵלְכוּ
  chosen: Let ... go
  alternatives:
  - May ... go
  - Should ... go
  lexicon: HALOT
  rationale: The imperfect/jussive-form verb here functions as a polite proposal or
    request. English 'Let my servants go' best captures the volitional nuance in idiomatic
    direct speech.
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my servants/slaves
  - my officials
  lexicon: HALOT
  rationale: עֶבֶד can denote servant, slave, or royal official depending on context.
    Here the reference is to the king's personnel accompanying a maritime venture;
    'servants' is the broadest and most contextually fitting rendering without overstating
    bonded status.
- source_word: עִם
  chosen: with
  alternatives:
  - alongside
  lexicon: HALOT
  rationale: Standard comitative preposition.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants/slaves
  - your men
  lexicon: HALOT
  rationale: Same lexical range as עֲבָדַי. 'Your servants' preserves the parallelism
    between the two kings' personnel.
- source_word: בָּאֳנִיּוֹת
  chosen: in the ships
  alternatives:
  - on the ships
  - in the vessels
  lexicon: HALOT
  rationale: אֳנִיּוֹת means ships. English can use either 'in' or 'on' with ships;
    'in the ships' follows the Hebrew preposition closely and is acceptable in context.
- source_word: וְלֹא אָבָה
  chosen: but ... was not willing
  alternatives:
  - but ... refused
  - but ... was unwilling
  lexicon: HALOT
  rationale: אָבָה means to be willing/consent. 'Was not willing' preserves the lexical
    sense more directly than the stronger 'refused,' while still reading naturally
    in English narrative.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name transliterated by standard convention.
