id: 1KI.22.19
reference: 1 Kings 22:19
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לָ/כֵ֖ן שְׁמַ֣ע דְּבַר יְהוָ֑ה רָאִ֤יתִי אֶת יְהוָה֙ יֹשֵׁ֣ב עַל כִּסְא֔/וֹ וְ/כָל צְבָ֤א הַ/שָּׁמַ֨יִם֙ עֹמֵ֣ד עָלָ֔י/ו מִ/ימִינ֖/וֹ וּ/מִ/שְּׂמֹאלֽ/וֹ־־־־׃
translation:
  text: 'Then he said, “Therefore hear the word of Yahweh: I saw Yahweh sitting on his throne, and all the host of heaven standing by him, on his right and on his left.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the heavenly host” or “all the army of heaven.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “standing over him”; in context, this likely means standing beside him in attendance, as clarified by “on his right and on his left.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential or consequential transition from the preceding exchange. 'Therefore' preserves the formal connection and the prophetic force better than the looser 'so.'
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative singular addressed directly to the hearer. 'Hear' is concise and idiomatic in prophetic speech, preserving the solemn register of the Hebrew.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Word' preserves the canonical idiom and theological resonance; YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Simple past fits the narrative report of Micaiah's vision in English. The perfect here introduces the content of the vision without requiring an English present perfect.
- source_word: יֹשֵׁב עַל כִּסְאוֹ
  chosen: sitting on his throne
  alternatives:
  - enthroned on his throne
  - seated on his throne
  lexicon: HALOT
  rationale: The participle depicts the LORD in a continuing enthroned posture. 'Sitting on his throne' is transparent and natural; 'enthroned' is possible but slightly more interpretive.
- source_word: כִּסְאוֹ
  chosen: his throne
  lexicon: HALOT
  rationale: Directly denotes the royal throne, central to the heavenly court imagery.
- source_word: כָל צְבָא הַשָּׁמַיִם
  chosen: all the host of heaven
  alternatives:
  - all the army of heaven
  - all the heavenly host
  lexicon: HALOT
  rationale: A conventional expression for the heavenly court/army. 'Host of heaven' preserves both the collective sense and the established biblical idiom without over-specifying whether the emphasis is military or courtly.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - were standing
  - stood
  lexicon: HALOT
  rationale: The singular participle with a collective subject is naturally rendered as a participial description in English. 'Standing' preserves the vivid scene.
- source_word: עָלָיו
  chosen: beside him
  alternatives:
  - by him
  - around him
  - over him
  lexicon: HALOT
  rationale: In this throne-room context, the preposition with 'standing' most naturally indicates attendance at his side rather than physical elevation. 'Beside him' fits the following specification 'on his right and on his left.'
- source_word: מִימִינוֹ וּמִשְּׂמֹאלוֹ
  chosen: on his right and on his left
  alternatives:
  - at his right hand and at his left hand
  lexicon: HALOT
  rationale: This preserves the spatial symmetry of the Hebrew and reads naturally in modern English. 'Right hand' is possible but slightly more idiomatic than the Hebrew requires here.
