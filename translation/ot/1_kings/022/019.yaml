theological_decisions:
- issue: Rendering the divine name יְהוָה in a vision of the heavenly throne room
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Depiction of the heavenly court in 'all the host of heaven'
  chosen_reading: Retain the imagery without narrowing it to angels alone
  alternative_readings:
  - all the angels of heaven
  - all the army of heaven
  rationale: The Hebrew phrase can denote the heavenly host broadly and in context portrays a divine council/throne-room scene. Rendering it as 'host of heaven' preserves the text's imagery and theological tension without importing a more specific ontology than the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
