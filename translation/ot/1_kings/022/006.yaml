theological_decisions:
- issue: Rendering of אֲדֹנָי in the prophets' response
  chosen_reading: the Lord
  alternative_readings:
  - my lord
  rationale: 'The form in the MT is best read as a divine title here, yielding an
    oracular statement: ''the Lord will give it...'' This avoids conflating the term
    with the divine name YHWH, which by doctrine is rendered ''the LORD'' when present.
    Because the phrase ''into the hand of the king'' creates some ambiguity about
    whether the final word could be addressed to the king as ''my lord,'' the alternative
    is preserved in a footnote rather than adopted in the main text.'
  doctrine_reference: 'Contested terms: κύριος / יְהוָה pattern; preserve ambiguity
    where genuine'
