id: 1KI.22.6
reference: 1 Kings 22:6
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֨ץ מֶֽלֶךְ יִשְׂרָאֵ֥ל אֶֽת הַ/נְּבִיאִים֮ כְּ/אַרְבַּ֣ע מֵא֣וֹת
    אִישׁ֒ וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם הַ/אֵלֵ֞ךְ עַל רָמֹ֥ת גִּלְעָ֛ד לַ/מִּלְחָמָ֖ה אִם
    אֶחְדָּ֑ל וַ/יֹּאמְר֣וּ עֲלֵ֔ה וְ/יִתֵּ֥ן אֲדֹנָ֖/י בְּ/יַ֥ד הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: Then the king of Israel gathered the prophets, about four hundred men, and
    said to them, “Should I go to battle against Ramoth-gilead, or should I refrain?”
    And they said, “Go up, and the Lord will give it into the hand of the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Go up, and my lord will give it into the hand of the king.' The Hebrew
      אֲדֹנָי can in some contexts be read as 'my lord,' though here it is more likely
      a divine title, 'the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: Qal wayyiqtol of קבץ denotes bringing persons together. 'Gathered' is
    natural modern English and preserves the action without overinterpreting formality.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  alternatives:
  - the prophetic men
  lexicon: HALOT
  rationale: Standard rendering of נביאים. The context is a royal consultation with
    recognized prophetic figures.
- source_word: כְּאַרְבַּע מֵאוֹת אִישׁ
  chosen: about four hundred men
  alternatives:
  - about four hundred
  - some four hundred men
  lexicon: HALOT
  rationale: The prefixed כ marks approximation here, so 'about four hundred men'
    best reflects the Hebrew rather than an exact count.
- source_word: הַאֵלֵךְ
  chosen: Should I go
  alternatives:
  - Am I to go
  - Shall I go
  lexicon: HALOT
  rationale: Interrogative ה with first-person imperfect expresses deliberative question.
    'Should I go' is idiomatic and preserves the consultative force.
- source_word: עַל רָמֹת גִּלְעָד לַמִּלְחָמָה
  chosen: to battle against Ramoth-gilead
  alternatives:
  - against Ramoth-gilead for battle
  - to Ramoth-gilead for war
  lexicon: HALOT
  rationale: The phrase indicates military action directed against/over Ramoth-gilead.
    'To battle against' communicates the sense smoothly in English without losing
    the martial context.
- source_word: אִם אֶחְדָּל
  chosen: or should I refrain
  alternatives:
  - or should I hold back
  - or should I desist
  lexicon: HALOT
  rationale: חדל means cease/refrain. In this deliberative question, 'should I refrain'
    is concise and idiomatic.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Attack
  - March up
  lexicon: HALOT
  rationale: עלה is the common military idiom 'go up.' Retaining 'Go up' preserves
    the Hebrew expression and its frequent warfare usage.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my lord
  lexicon: HALOT
  rationale: The consonantal text reads אֲדֹנָי, which normally yields 'Lord.' Since
    this is not YHWH, it should not be rendered 'the LORD.' In context the prophets
    give an oracular assurance, so 'the Lord' is the most likely sense. Because the
    form can also be read as 'my lord' in some contexts, that alternative is preserved
    in a footnote.
- source_word: בְּיַד הַמֶּלֶךְ
  chosen: into the hand of the king
  alternatives:
  - into the king's hand
  - to the king
  lexicon: HALOT
  rationale: '''Into the hand of'' is a standard Hebrew idiom for delivering into
    someone''s power. Keeping ''hand'' preserves the idiom while remaining understandable.'
