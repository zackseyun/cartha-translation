theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Speaker of the final clause ויאמר
  chosen_reading: 'Continue with Micaiah as the speaker: ''And he said, “Hear, all
    you peoples!”'''
  alternative_readings:
  - Treat the clause as an editorial aside or a different voice
  rationale: The most straightforward reading is that the same narrative subject continues,
    with Micaiah issuing a public summons. This fits the immediate context of prophetic
    declaration and preserves the Masoretic wording without conjectural reassignment.
