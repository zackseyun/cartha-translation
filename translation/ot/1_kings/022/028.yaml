id: 1KI.22.28
reference: 1 Kings 22:28
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מִיכָ֔יְהוּ אִם שׁ֤וֹב תָּשׁוּב֙ בְּ/שָׁל֔וֹם לֹֽא דִבֶּ֥ר יְהוָ֖ה
    בִּ֑/י וַ/יֹּ֕אמֶר שִׁמְע֖וּ עַמִּ֥ים כֻּלָּֽ/ם־־׃
translation:
  text: And Micaiah said, “If you indeed return in peace, the LORD has not spoken
    by me.” And he said, “Hear, all you peoples!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD has not spoken through me.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says “all you peoples,” using the plural form, a public summons
      addressed broadly rather than to one group alone.
    reason: cultural_note
lexical_decisions:
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: אִם שׁוֹב תָּשׁוּב
  chosen: If you indeed return
  alternatives:
  - If you surely return
  - If you return at all
  lexicon: HALOT
  rationale: The construction combines אִם with the infinitive absolute plus imperfect
    of שוב for emphatic conditional force. 'Indeed return' preserves the emphasis
    in natural English without over-paraphrase.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - whole
  lexicon: HALOT
  rationale: שָׁלוֹם here refers to returning unharmed/safely. 'In peace' preserves
    the Hebrew idiom and remains clear in English.
- source_word: לֹא דִבֶּר יְהוָה בִּי
  chosen: the LORD has not spoken by me
  alternatives:
  - the LORD has not spoken through me
  - the LORD did not speak by me
  lexicon: HALOT
  rationale: The idiom 'speak by/in someone' means to speak through that person as
    prophetic instrument. 'By me' is slightly more formal and closely reflects the
    Hebrew preposition while remaining intelligible. The divine name is rendered 'the
    LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Required default rendering in the doctrine excerpt for the divine name.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative calling for attention; 'Hear' preserves the prophetic and
    public proclamation tone.
- source_word: עַמִּים כֻּלָּם
  chosen: all you peoples
  alternatives:
  - all peoples
  - all of you people
  lexicon: HALOT
  rationale: Plural עַמִּים is best represented by 'peoples,' not singular 'people.'
    The vocative force is preserved with 'you.' This also echoes prophetic summons
    language.
