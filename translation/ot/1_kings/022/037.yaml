id: 1KI.22.37
reference: 1 Kings 22:37
source:
  edition: WLC
  text: וַ/יָּ֣מָת הַ/מֶּ֔לֶךְ וַ/יָּב֖וֹא שֹׁמְר֑וֹן וַ/יִּקְבְּר֥וּ אֶת הַ/מֶּ֖לֶךְ
    בְּ/שֹׁמְרֽוֹן־׃
translation:
  text: So the king died and was brought to Samaria, and they buried the king in Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and the king died, and he came to Samaria.' The sense
      is that the king's body was brought to Samaria after his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות denotes the event of death in narrative sequence;
    'died' is the natural English rendering.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known royal figure in context (Ahab);
    retaining 'the king' matches the Hebrew wording without importing the proper name
    into the verse.
- source_word: וַיָּבֹא שֹׁמְרוֹן
  chosen: was brought to Samaria
  alternatives:
  - came to Samaria
  - they came to Samaria
  lexicon: HALOT
  rationale: Although the verb is formally singular active ('and he came'), the subject
    after the king's death is awkward if rendered woodenly as 'and Samaria came' or
    'and he came.' In context, the sense is that the king's body arrived at Samaria.
    English idiom expresses this best as passive, making explicit the implied transport
    of the corpse while staying within the narrative sense.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וַיִּקְבְּרוּ
  chosen: they buried
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: Third person plural with unspecified agents is naturally rendered 'they
    buried,' preserving the Hebrew's indefinite subject.
- source_word: אֶת הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - him
  lexicon: HALOT
  rationale: The direct object marker plus repeated noun gives emphasis and clarity
    in Hebrew narrative; retaining 'the king' rather than reducing to 'him' reflects
    that repetition.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב here marks location of burial; 'in Samaria' is the
    most straightforward English equivalent.
