id: 1KI.22.23
reference: 1 Kings 22:23
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִנֵּ֨ה נָתַ֤ן יְהוָה֙ ר֣וּחַ שֶׁ֔קֶר בְּ/פִ֖י כָּל נְבִיאֶ֣י/ךָ אֵ֑לֶּה וַֽ/יהוָ֔ה דִּבֶּ֥ר עָלֶ֖י/ךָ רָעָֽה־׃
translation:
  text: And now, behold, Yahweh has put a lying spirit in the mouth of all these prophets of yours, and Yahweh has spoken disaster against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD has spoken calamity against you.' The Hebrew term can denote disaster or calamity in judgment contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Carries the discourse forward with an immediate transition; 'And now' preserves both conjunction and temporal/deictic force.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Marks emphatic attention. 'Behold' preserves the prophetic solemnity better than the more colloquial 'look' or 'see'.
- source_word: נָתַן
  chosen: has put
  alternatives:
  - has given
  - has placed
  lexicon: HALOT
  rationale: With 'spirit' and 'in the mouth,' English idiom favors 'put' over the more wooden 'given' while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: רוּחַ שֶׁקֶר
  chosen: a lying spirit
  alternatives:
  - a spirit of falsehood
  - a false spirit
  lexicon: HALOT
  rationale: The construct phrase denotes a spirit characterized by deception. 'Lying spirit' is concise, natural, and preserves the personal-agent sense better than the more abstract 'spirit of falsehood.'
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - in the mouths of
  lexicon: HALOT
  rationale: Although the Hebrew form is singular in construct, it functions distributively with the following plural group. 'In the mouth of' is a standard Hebrew idiom for speech placed in someone's utterance.
- source_word: כָּל נְבִיאֶיךָ אֵלֶּה
  chosen: all these prophets of yours
  alternatives:
  - all these your prophets
  - all your prophets here
  lexicon: HALOT
  rationale: Preserves the demonstrative emphasis ('these') and the second-person possessive. 'Of yours' communicates the pointed address to Ahab in natural English.
- source_word: דִּבֶּר עָלֶיךָ רָעָה
  chosen: has spoken disaster against you
  alternatives:
  - has spoken evil against you
  - has decreed calamity against you
  lexicon: HALOT
  rationale: רָעָה here refers to harmful judgment or calamity, not moral evil in God. 'Disaster' best conveys announced judgment in idiomatic modern English while avoiding theological misunderstanding.
