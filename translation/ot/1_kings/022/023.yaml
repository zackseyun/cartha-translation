theological_decisions:
- issue: Rendering רָעָה in relation to the LORD's action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: In this judgment context, the Hebrew term denotes impending harm/judgment rather than moral evil. Rendering it as 'disaster' preserves the text's force without implying that the LORD commits moral evil. 'Calamity' is also possible, but 'disaster' is slightly more natural in contemporary English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
- issue: Agency of the 'lying spirit' under divine sovereignty
  chosen_reading: the LORD has put a lying spirit
  alternative_readings:
  - the LORD has allowed a lying spirit
  - the LORD has permitted a lying spirit
  rationale: The Hebrew verb נָתַן straightforwardly states divine action, and the translation should not soften it to mere permission. The theological tension is preserved by translating the clause directly rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
