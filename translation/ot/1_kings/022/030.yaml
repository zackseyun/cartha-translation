id: 1KI.22.30
reference: 1 Kings 22:30
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ מֶ֨לֶךְ יִשְׂרָאֵ֜ל אֶל יְהוֹשָׁפָ֗ט הִתְחַפֵּשׂ֙ וָ/בֹ֣א בַ/מִּלְחָמָ֔ה
    וְ/אַתָּ֖ה לְבַ֣שׁ בְּגָדֶ֑י/ךָ וַ/יִּתְחַפֵּשׂ֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יָּב֖וֹא
    בַּ/מִּלְחָמָֽה־׃
translation:
  text: Then the king of Israel said to Jehoshaphat, “I will disguise myself and go
    into the battle, but you, put on your robes.” So the king of Israel disguised
    himself and went into the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew could be taken as an imperative, 'Disguise yourself and go into the
      battle,' but the following clause, 'So the king of Israel disguised himself,'
      strongly supports the sense 'I will disguise myself and go into the battle.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְחַפֵּשׂ
  chosen: I will disguise myself
  alternatives:
  - disguise yourself
  - go in disguise
  lexicon: HALOT
  rationale: The form is morphologically ambiguous in isolation, but in context it
    introduces the speaker's own plan, confirmed by the following narrative clause
    וַיִּתְחַפֵּשׂ ('so the king of Israel disguised himself'). Rendering it in the
    first person best matches the discourse flow and avoids implying that Ahab told
    Jehoshaphat to disguise himself.
- source_word: וָבֹא
  chosen: and go
  alternatives:
  - then I will enter
  - and come
  lexicon: HALOT
  rationale: With the preceding cohortative-like sense, this continues Ahab's stated
    intention. 'Go into the battle' is idiomatic English for entering combat.
- source_word: בַמִּלְחָמָה
  chosen: into the battle
  alternatives:
  - into battle
  - in the battle
  lexicon: HALOT
  rationale: The preposition with the noun denotes entering the combat setting. 'Into
    the battle' preserves the movement implied by בוא while remaining natural English.
- source_word: וְאַתָּה
  chosen: but you
  alternatives:
  - and you
  - while you
  lexicon: HALOT
  rationale: 'The pronoun is contrastive in context: Ahab will disguise himself, whereas
    Jehoshaphat is to remain in royal attire. ''But you'' brings out that contrast
    clearly.'
- source_word: לְבַשׁ בְּגָדֶיךָ
  chosen: put on your robes
  alternatives:
  - wear your garments
  - dress in your clothes
  lexicon: HALOT
  rationale: בְּגָדִים is a general term for garments/clothes, but in this royal military
    context 'robes' appropriately conveys visible royal dress, which is the point
    of the contrast with disguise.
- source_word: וַיִּתְחַפֵּשׂ
  chosen: disguised himself
  alternatives:
  - went in disguise
  lexicon: HALOT
  rationale: This narrative verb confirms the earlier intention and is best rendered
    straightforwardly as a reflexive action.
- source_word: וַיָּבֹא בַמִּלְחָמָה
  chosen: went into the battle
  alternatives:
  - entered the battle
  - went into battle
  lexicon: HALOT
  rationale: A direct narrative continuation of Ahab's action. 'Went into the battle'
    keeps the repeated wording visible in English.
