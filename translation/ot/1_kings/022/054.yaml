id: 1KI.22.54
reference: 1 Kings 22:54
source:
  edition: WLC
  text: וַֽ/יַּעֲבֹד֙ אֶת הַ/בַּ֔עַל וַ/יִּֽשְׁתַּחֲוֶ֖ה ל֑/וֹ וַ/יַּכְעֵ֗ס אֶת יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה אָבִֽי/ו־־־׃
translation:
  text: He served Baal and bowed down to him, and he provoked Yahweh, the God of Israel, just as his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped him'; the Hebrew verb literally refers to bowing down or prostrating oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: The verb עבד literally means 'to serve' and in idolatrous contexts can denote cultic service. 'Served' preserves the lexical link while allowing the following verb to specify the act of worship.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: As a proper divine name/title in this context, 'Baal' is the most natural English rendering. Retaining the article in English ('the Baal') would sound unnatural and is not required to convey the referent.
- source_word: וַיִּשְׁתַּחֲוֶה לוֹ
  chosen: bowed down to him
  alternatives:
  - worshiped him
  - prostrated himself to him
  lexicon: HALOT
  rationale: The verb שׁחה denotes bowing/prostration and often functions as an act of worship. 'Bowed down to him' preserves the concrete action and avoids collapsing it into the previous verb 'served.'
- source_word: וַיַּכְעֵס
  chosen: provoked
  alternatives:
  - angered
  - provoked to anger
  lexicon: HALOT
  rationale: The Hiphil of כעס means to provoke to anger. 'Provoked' is concise modern English and communicates causation; the object 'the LORD' makes the sense clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: This construct chain is straightforwardly rendered 'the God of Israel' and identifies the LORD covenantally.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה אָבִיו
  chosen: just as his father had done
  alternatives:
  - according to all that his father did
  - like everything his father did
  lexicon: HALOT
  rationale: The phrase means 'according to all that his father did.' 'Just as his father had done' is idiomatic English that preserves the comparative force without awkward literalism.
