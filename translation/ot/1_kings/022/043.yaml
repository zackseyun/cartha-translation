theological_decisions:
- issue: Evaluation formula for the king's conduct
  chosen_reading: The verse affirms that Jehoshaphat followed Asa's pattern of conduct
    and did what was right before the LORD.
  alternative_readings:
  - The verse could be paraphrased more dynamically as a general commendation of faithful
    kingship.
  rationale: The Hebrew uses standard Deuteronomistic royal-evaluation language. The
    translation preserves the moral and covenantal evaluation without expanding it
    into claims not explicit in the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
