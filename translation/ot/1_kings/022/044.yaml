theological_decisions:
- issue: Nature of worship at the high places
  chosen_reading: Render the verse descriptively without specifying whether the sacrifices
    were to the LORD or to other deities.
  alternative_readings:
  - The people were worshiping the LORD illegitimately at unauthorized sites
  - The people were engaged in broader syncretistic or idolatrous worship
  rationale: The Hebrew states only that the people were sacrificing and burning incense
    at the high places. The verse critiques the persistence of the high places but
    does not explicitly identify the object of worship here. The translation preserves
    that tension rather than importing a more specific theological judgment into the
    main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
