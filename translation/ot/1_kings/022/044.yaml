id: 1KI.22.44
reference: 1 Kings 22:44
source:
  edition: WLC
  text: אַ֥ךְ הַ/בָּמ֖וֹת לֹֽא סָ֑רוּ ע֥וֹד הָ/עָ֛ם מְזַבְּחִ֥ים וּֽ/מְקַטְּרִ֖ים
    בַּ/בָּמֽוֹת־׃
translation:
  text: However, the high places were not removed; the people still were sacrificing
    and burning incense on the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shrines.' The Hebrew term refers to local elevated cult sites, traditionally
      rendered 'high places.'
    reason: lexical_alternative
  - marker: b
    text: The verse does not specify whether these sacrifices were offered to the
      LORD at unauthorized sites or as part of broader idolatrous practice.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: Marks contrast with the preceding positive evaluation of the king; 'However'
    gives natural modern English while preserving the adversative force.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated cultic sites. 'High places' is the established
    and accurate rendering in Kings, preserving the historical-religious sense better
    than the more interpretive 'shrines'.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: With בָּמוֹת as subject, the idiom means the cult sites remained in place,
    not that they physically 'departed.' Passive English best conveys the sense.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - continuingly
  lexicon: HALOT
  rationale: Signals ongoing action despite reform; 'still' is concise and idiomatic.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward collective reference to the populace.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices
  lexicon: HALOT
  rationale: Participial form expresses ongoing customary action. 'Were sacrificing'
    keeps the verbal force and is readable; 'offering sacrifices' is possible but
    slightly more expanded.
- source_word: וּמְקַטְּרִים
  chosen: and burning incense
  alternatives:
  - and making offerings by smoke
  lexicon: HALOT
  rationale: In cultic contexts קטר commonly refers to burning incense or turning
    offerings into smoke. Here 'burning incense' is the most idiomatic and likely
    sense in the stereotyped formula used for illicit worship at high places.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: Repeats the key cultic location. 'On' follows the conventional rendering
    of the Hebrew preposition with בָּמוֹת and matches the elevated-site imagery.
