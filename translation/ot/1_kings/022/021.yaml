theological_decisions:
- issue: Identity of הָרוּחַ in the heavenly council
  chosen_reading: a particular spirit-being, rendered 'the spirit,' not the Holy Spirit
  alternative_readings:
  - the Spirit (Holy Spirit)
  - an indefinite spirit
  rationale: The narrative depicts one member of the heavenly host stepping forward
    to propose a means of judgment on Ahab. Rendering it 'the Spirit' would imply
    the Holy Spirit more strongly than the Hebrew requires, while 'a spirit' underplays
    the article and the scene's specificity. The translation preserves the text's
    portrayal without importing additional doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
