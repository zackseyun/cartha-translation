id: 1KI.22.21
reference: 1 Kings 22:21
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א הָ/ר֗וּחַ וַֽ/יַּעֲמֹד֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/יֹּ֖אמֶר אֲנִ֣י אֲפַתֶּ֑/נּוּ
    וַ/יֹּ֧אמֶר יְהוָ֛ה אֵלָ֖י/ו בַּ/מָּֽה׃
translation:
  text: Then the spirit came forward and stood before the LORD and said, ‘I will entice
    him.’ And the LORD said to him, ‘By what means?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit.' The Hebrew has 'the spirit,' likely referring to a specific
      spirit-being in the heavenly council, not necessarily the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'I will persuade him' or 'I will deceive him.' The verb can denote enticement
      or persuasion; the exact method is clarified in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרוּחַ
  chosen: the spirit
  alternatives:
  - the Spirit
  - a spirit
  lexicon: HALOT
  rationale: רוּחַ here refers to a personal spiritual being in the heavenly council
    scene. The article supports a definite reference in context, so 'the spirit' is
    preferred over 'a spirit.' 'The Spirit' could suggest the Holy Spirit, which the
    context does not require and would likely mislead.
- source_word: וַיֵּצֵא
  chosen: came forward
  alternatives:
  - went out
  - came out
  lexicon: HALOT
  rationale: The basic sense of יצא is 'go out/come out,' but in this courtlike scene
    the idiomatic force is that the spirit steps forth from among the heavenly host
    to present itself. 'Came forward' communicates the narrative action naturally
    in English without losing the movement implied by the Hebrew.
- source_word: וַיַּעֲמֹד לִפְנֵי
  chosen: stood before
  alternatives:
  - stood in the presence of
  - presented himself before
  lexicon: HALOT
  rationale: The collocation עמד לפני commonly denotes standing in someone's presence,
    especially before a superior. 'Stood before' is concise, natural, and preserves
    the formal audience setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' This follows established reverential convention and the stated translation
    policy.
- source_word: אֲפַתֶּנּוּ
  chosen: I will entice him
  alternatives:
  - I will persuade him
  - I will deceive him
  lexicon: HALOT
  rationale: פתה in the piel can mean entice, persuade, or lure. In this context of
    inducing Ahab to act to his ruin, 'entice' best preserves the sense of inducement
    without prematurely narrowing the mechanism to outright deception, which is specified
    more fully in the following verse.
- source_word: בַּמָּה
  chosen: By what means?
  alternatives:
  - How?
  - In what way?
  lexicon: HALOT
  rationale: The interrogative asks for the manner or means by which the spirit will
    carry out the proposal. 'By what means?' is slightly more formal and fits the
    deliberative heavenly-council setting.
