id: 1KI.22.12
reference: 1 Kings 22:12
source:
  edition: WLC
  text: וְ/כָל הַ/נְּבִאִ֔ים נִבְּאִ֥ים כֵּ֖ן לֵ/אמֹ֑ר עֲלֵ֞ה רָמֹ֤ת גִּלְעָד֙ וְ/הַצְלַ֔ח וְ/נָתַ֥ן יְהוָ֖ה בְּ/יַ֥ד הַ/מֶּֽלֶךְ־׃
translation:
  text: And all the prophets were prophesying thus, saying, “Go up to Ramoth-gilead and succeed, and Yahweh will give it into the hand of the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and prosper.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And all
  alternatives:
  - Now all
  lexicon: HALOT
  rationale: The conjunction plus כָּל introduces the collective subject in straightforward narrative sequence. 'And all' preserves the Hebrew coordination without overinterpreting discourse flow.
- source_word: הַ/נְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering of נביאים. The definite article is preserved.
- source_word: נִבְּאִים
  chosen: were prophesying
  alternatives:
  - prophesied
  lexicon: HALOT
  rationale: The participial form conveys ongoing or contemporaneous action; English progressive best reflects the scene of the prophets actively speaking.
- source_word: כֵּן
  chosen: in this way
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: כֵּן points to manner. 'In this way' is slightly fuller and natural in English while preserving the sense that their prophecy was uniformly of the same kind.
- source_word: לֵ/אמֹר
  chosen: saying
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Attack
  - March up
  lexicon: HALOT
  rationale: עלה literally means 'go up.' Since Ramoth-gilead is the destination and military action is implied by context, alternatives are possible, but the more literal 'Go up' best preserves the Hebrew wording without importing more than the text states.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: A standard English transliteration of the place name; hyphenation reflects common convention for the compound toponym.
- source_word: וְ/הַצְלַח
  chosen: and succeed
  alternatives:
  - and prosper
  - and be successful
  lexicon: HALOT
  rationale: The verb צלח in the Hiphil here expresses successful outcome. 'Succeed' is concise, natural modern English and fits the military context.
- source_word: וְ/נָתַן
  chosen: for ... will give it
  alternatives:
  - and the LORD will give
  - for the LORD has given
  lexicon: HALOT
  rationale: Though formally a waw + qatal, in this speech context it functions as the ground for the imperative and following encouragement. Rendering with 'for' makes the causal force clear in English. The object 'it' is supplied from context (Ramoth-gilead/battle outcome), which English requires.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּ/יַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering something into someone's control. The more literal 'into the hand of' is retained because it remains clear in English.
- source_word: הַ/מֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: The definite noun is rendered directly. Although the immediate referent is the king being addressed, the Hebrew uses the title rather than a pronoun, and the translation preserves that form.
