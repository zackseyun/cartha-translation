id: 1KI.11.17
reference: 1 Kings 11:17
source:
  edition: WLC
  text: וַ/יִּבְרַ֣ח אֲדַ֡ד הוּא֩ וַ/אֲנָשִׁ֨ים אֲדֹמִיִּ֜ים מֵ/עַבְדֵ֥י אָבִ֛י/ו
    אִתּ֖/וֹ לָ/ב֣וֹא מִצְרָ֑יִם וַ/הֲדַ֖ד נַ֥עַר קָטָֽן׃
translation:
  text: Hadad fled to Egypt, he and some Edomite men from among his father's servants
    with him; and Hadad was a small boy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to come to Egypt.' Hebrew often uses 'come' where English
      idiom would say 'go' or simply state the destination.
    reason: lexical_alternative
  - marker: b
    text: Or 'a little boy' or 'a young boy.' The Hebrew phrase emphasizes that Hadad
      was still very young.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: ברח in the qal commonly means 'flee' or 'run away.' 'Fled' is concise,
    natural English and fits the narrative context of escape to Egypt.
- source_word: אֲדַד
  chosen: Hadad
  rationale: Personal name is transliterated by standard convention, per translation
    philosophy.
- source_word: הוּא
  chosen: he
  rationale: 'The independent pronoun adds emphasis/apposition: ''Hadad, he...'' In
    English this is naturally represented by ''he'' in apposition with the following
    companions.'
- source_word: וַאֲנָשִׁים אֲדֹמִיִּים
  chosen: and some Edomite men
  alternatives:
  - and Edomite men
  - and men of Edom
  lexicon: HALOT
  rationale: אֲנָשִׁים means 'men,' and אֲדֹמִיִּים identifies them as Edomites. Because
    the phrase is indefinite and not all-inclusive, 'some Edomite men' reads naturally
    in English without overstating the number.
- source_word: מֵעַבְדֵי אָבִיו
  chosen: from among his father's servants
  alternatives:
  - from his father's servants
  - from among his father's retainers
  lexicon: HALOT
  rationale: עֶבֶד here refers to members of the father's household/service. 'Servants'
    is the most straightforward rendering in this royal context; 'from among' reflects
    the partitive force of מִן.
- source_word: אִתּוֹ
  chosen: with him
  rationale: Standard rendering of the preposition with pronominal suffix, clarifying
    that the Edomite men accompanied Hadad.
- source_word: לָבוֹא מִצְרָיִם
  chosen: to Egypt
  alternatives:
  - to come to Egypt
  - to go to Egypt
  lexicon: HALOT
  rationale: The infinitive construct of בוא with destination expresses purpose/result
    of the flight. English idiom prefers simply 'to Egypt' after 'fled'; the destination
    is preserved without awkward literalism.
- source_word: נַעַר קָטָן
  chosen: a small boy
  alternatives:
  - a little boy
  - a young boy
  - a young child
  lexicon: HALOT
  rationale: נַעַר denotes a boy/youth/young servant depending on context; with קָטָן
    it clearly emphasizes youthfulness. 'A small boy' preserves both the age and diminutive
    sense.
