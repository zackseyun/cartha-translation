theological_decisions:
- issue: Whether to render נָשִׁים as 'women' or 'wives'
  chosen_reading: women
  alternative_readings:
  - wives
  rationale: The Hebrew text explicitly says 'women,' and optimal equivalence favors
    preserving the lexical form unless context requires narrowing. Since the next
    verse explains the covenantal issue and the broader context makes the marital
    dimension clear, the main text keeps 'women' without importing a more specific
    term here.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether Pharaoh’s daughter is excluded from or included among the 'foreign
    women'
  chosen_reading: included among them
  alternative_readings:
  - set apart from them as a separate category
  rationale: 'The syntax most naturally reads as inclusion: Solomon loved many foreign
    women, and also Pharaoh''s daughter. The following list of nationalities then
    specifies the foreign origins involved. ''Along with Pharaoh’s daughter'' reflects
    this additive sense without overstating the grammar.'
  doctrine_reference: Translation philosophy §1, §3
