id: 1KI.11.1
reference: 1 Kings 11:1
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה אָהַ֞ב נָשִׁ֧ים נָכְרִיּ֛וֹת רַבּ֖וֹת וְ/אֶת בַּת
    פַּרְעֹ֑ה מוֹאֲבִיּ֤וֹת עַמֳּנִיּוֹת֙ אֲדֹ֣מִיֹּ֔ת צֵדְנִיֹּ֖ת חִתִּיֹּֽת־־׃
translation:
  text: 'Now King Solomon loved many foreign women, along with Pharaoh’s daughter:
    Moabite, Ammonite, Edomite, Sidonian, and Hittite women.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many foreign wives.' The Hebrew says 'many foreign women'; the context
      indicates these were women Solomon took in marriage or as consorts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  chosen: Now King
  alternatives:
  - And the king
  - But King
  lexicon: HALOT
  rationale: The conjunction וְ here advances the narrative. 'Now' gives natural English
    discourse flow while retaining the connective force; 'King' translates מֶלֶךְ
    directly with the article reflected by the title construction.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: אָהַב
  chosen: loved
  alternatives:
  - had affection for
  - desired
  lexicon: HALOT
  rationale: The verb אָהַב ordinarily means 'love.' In this context it introduces
    Solomon's attachment to these women, which becomes morally and spiritually significant
    in the following verses. 'Loved' is the plain lexical sense and should not be
    weakened.
- source_word: נָשִׁים נָכְרִיּוֹת רַבּוֹת
  chosen: many foreign women
  alternatives:
  - many foreign wives
  - many women from other nations
  lexicon: HALOT
  rationale: נָשִׁים is 'women,' נָכְרִיּוֹת means 'foreign/strange' in the sense
    of belonging to another people, and רַבּוֹת means 'many.' Although these women
    are wives/consorts in context, the Hebrew here says 'women,' so the main text
    preserves that wording rather than specifying 'wives' beyond the source text.
- source_word: וְאֶת בַּת פַּרְעֹה
  chosen: along with Pharaoh’s daughter
  alternatives:
  - and Pharaoh’s daughter
  - including Pharaoh’s daughter
  lexicon: HALOT
  rationale: The construction adds Pharaoh's daughter to the group already mentioned.
    'Along with' makes clear that she is included in addition to the many foreign
    women, not set in contrast to them.
- source_word: מוֹאֲבִיּוֹת
  chosen: Moabite
  alternatives:
  - women from Moab
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the standard English ethnic term. In
    the list it functions attributively with 'women' understood from the earlier noun.
- source_word: עַמֳּנִיּוֹת
  chosen: Ammonite
  alternatives:
  - women from Ammon
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the standard English ethnic term, with
    'women' carried over from the head noun.
- source_word: אֲדֹמִיֹּת
  chosen: Edomite
  alternatives:
  - women from Edom
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the standard English ethnic term, with
    'women' understood.
- source_word: צֵדְנִיֹּת
  chosen: Sidonian
  alternatives:
  - women from Sidon
  lexicon: HALOT
  rationale: The adjective refers specifically to women from Sidon, not generically
    all Phoenicians. 'Sidonian' preserves the source's specificity.
- source_word: חִתִּיֹּת
  chosen: Hittite
  alternatives:
  - women from the Hittites
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the standard English ethnic term, with
    'women' understood from the earlier noun.
