theological_decisions:
- issue: Rendering a violent historical statement without softening or expanding it
  chosen_reading: Retain the direct statement that every male in Edom was struck down
  alternative_readings:
  - Soften to 'defeated the Edomites'
  - Expand to explain this as total extermination in the main text
  rationale: The verse reports severe military violence. Optimal equivalence requires
    preserving the force of the Hebrew without euphemism, while also avoiding interpretive
    expansion beyond what the verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
