id: 1KI.11.15
reference: 1 Kings 11:15
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּֽ/הְי֤וֹת דָּוִד֙ אֶת אֱד֔וֹם בַּ/עֲל֗וֹת יוֹאָב֙ שַׂ֣ר הַ/צָּבָ֔א
    לְ/קַבֵּ֖ר אֶת הַ/חֲלָלִ֑ים וַ/יַּ֥ךְ כָּל זָכָ֖ר בֶּ/אֱדֽוֹם־־־׃
translation:
  text: For it happened, when David was in Edom, when Joab the commander of the army
    had gone up to bury the slain, that he struck down every male in Edom—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it happened.' The Hebrew uses a common narrative formula to introduce
      background explanation.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says 'when David was [with] Edom'; in context this
      refers to David's campaign or presence in Edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: For it happened
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing background explanation. 'For it
    happened' fits the explanatory flow into the following context better than a bare
    'and,' while preserving the formulaic narrative sense.
- source_word: בִּהְיוֹת דָּוִד אֶת אֱדוֹם
  chosen: when David was in Edom
  alternatives:
  - when David was with Edom
  - when David was against Edom
  lexicon: HALOT
  rationale: The infinitive construct with ב plus היה gives a temporal clause, 'when
    David was...'. The phrase אֶת אֱדוֹם here is idiomatic in context for David's
    presence/campaign in relation to Edom, not simple accompaniment. 'In Edom' is
    the most natural English rendering in light of the military setting.
- source_word: בַּעֲלוֹת יוֹאָב
  chosen: when Joab ... had gone up
  alternatives:
  - when Joab went up
  - at Joab's going up
  lexicon: HALOT
  rationale: Temporal infinitive construct with ב. The perfective sense in English
    is well conveyed by 'had gone up' within the larger past narrative.
- source_word: שַׂר הַצָּבָא
  chosen: the commander of the army
  alternatives:
  - the captain of the army
  - the commander of the host
  lexicon: HALOT
  rationale: A standard military title. 'Commander of the army' is clear modern English
    and preserves the official sense without archaic diction.
- source_word: לְקַבֵּר
  chosen: to bury
  alternatives:
  - for burying
  lexicon: HALOT
  rationale: 'Infinitive of purpose after ''had gone up'': Joab went up ''to bury''
    the dead.'
- source_word: הַחֲלָלִים
  chosen: the slain
  alternatives:
  - the dead
  - those killed
  lexicon: HALOT
  rationale: The term denotes those killed, especially in battle. 'The slain' preserves
    the martial nuance better than the more general 'dead'.
- source_word: וַיַּךְ
  chosen: he struck down
  alternatives:
  - he killed
  - he smote
  lexicon: HALOT
  rationale: נכה in military narrative often means to strike/defeat/kill. Here, with
    'every male in Edom,' the sense is lethal. 'Struck down' is idiomatic and grave
    without archaic tone.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all the males
  lexicon: HALOT
  rationale: זָכָר is specifically 'male,' not the more general אישׁ ('man'). 'Every
    male' preserves the stark comprehensiveness of the Hebrew.
- source_word: בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - among Edom
  - throughout Edom
  lexicon: HALOT
  rationale: The preposition ב is most straightforwardly locative here. 'In Edom'
    leaves the scope as stated in the Hebrew without over-interpreting distribution.
