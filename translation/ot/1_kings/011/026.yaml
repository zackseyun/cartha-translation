id: 1KI.11.26
reference: 1 Kings 11:26
source:
  edition: WLC
  text: וְ/יָרָבְעָם֩ בֶּן נְבָ֨ט אֶפְרָתִ֜י מִן הַ/צְּרֵדָ֗ה וְ/שֵׁ֤ם אִמּ/וֹ֙ צְרוּעָה֙
    אִשָּׁ֣ה אַלְמָנָ֔ה עֶ֖בֶד לִ/שְׁלֹמֹ֑ה וַ/יָּ֥רֶם יָ֖ד בַּ/מֶּֽלֶךְ־־׃
translation:
  text: Now Jeroboam son of Nebat, an Ephraimite from Zeredah—his mother's name was
    Zeruah, a widow woman—was a servant of Solomon, and he raised his hand against
    the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an Ephrathite,' though here the sense is most likely 'an Ephraimite.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a woman, a widow'; the translation preserves both elements with
      'a widow woman.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''he rebelled against the king.'' Hebrew: ''he raised his hand against
      the king.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרָתִי
  chosen: an Ephraimite
  alternatives:
  - an Ephrathite
  lexicon: HALOT
  rationale: In Kings, the term here most naturally denotes tribal affiliation with
    Ephraim rather than connection to Ephrath/Bethlehem. 'Ephraimite' is the clearest
    modern English rendering, while 'Ephrathite' is preserved as a lexical alternative
    because some English traditions use it.
- source_word: הַצְּרֵדָה
  chosen: Zeredah
  alternatives:
  - Zeredah
  lexicon: HALOT
  rationale: Rendered as a transliterated place name in keeping with the philosophy
    of transliterating names. English spelling varies slightly; 'Zeredah' is a standard
    convention.
- source_word: צְרוּעָה
  chosen: Zeruah
  alternatives:
  - Zeruah/Zeruahh transliteration variants
  lexicon: HALOT
  rationale: Personal name is transliterated rather than translated. Standard English
    form 'Zeruah' is used.
- source_word: אִשָּׁה אַלְמָנָה
  chosen: a widow woman
  alternatives:
  - a widow
  - a widowed woman
  lexicon: HALOT
  rationale: The Hebrew uses both 'woman' and 'widow.' Rendering both elements preserves
    the appositional fullness of the phrase without reducing it to a single word.
    'Widow woman' is slightly marked in English but remains understandable and closer
    to the source than simply 'widow'.
- source_word: עֶבֶד
  chosen: a servant
  alternatives:
  - a slave
  - an official
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, here it refers to Jeroboam's
    status under Solomon in a royal-administrative setting. The bonded nature is not
    foregrounded in this verse, so 'servant' fits the context better than 'slave'
    while remaining faithful to the source.
- source_word: וַיָּרֶם יָד בַּמֶּלֶךְ
  chosen: he raised his hand against the king
  alternatives:
  - he rebelled against the king
  - he lifted up his hand against the king
  lexicon: HALOT
  rationale: This Hebrew idiom can denote hostile action or rebellion. 'Raised his
    hand against' preserves the metaphor and the narrative force, while 'rebelled
    against' is a valid interpretive alternative but slightly more explicit than the
    idiom itself.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: At the start of a new development in narrative, initial waw is naturally
    rendered 'Now' in idiomatic English to signal transition rather than simple coordination.
