id: 1KI.11.20
reference: 1 Kings 11:20
source:
  edition: WLC
  text: וַ/תֵּ֨לֶד ל֜/וֹ אֲח֣וֹת תַּחְפְּנֵ֗יס אֵ֚ת גְּנֻבַ֣ת בְּנ֔/וֹ וַ/תִּגְמְלֵ֣/הוּ
    תַחְפְּנֵ֔ס בְּ/ת֖וֹךְ בֵּ֣ית פַּרְעֹ֑ה וַ/יְהִ֤י גְנֻבַת֙ בֵּ֣ית פַּרְעֹ֔ה בְּ/ת֖וֹךְ
    בְּנֵ֥י פַרְעֹֽה׃
translation:
  text: And the sister of Tahpenes bore him Genubath his son, and Tahpenes weaned
    him within Pharaoh’s house; and Genubath was in Pharaoh’s house among the sons
    of Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Tahpenes’s sister bore him a son, Genubath.' The Hebrew word order
      can be represented either way in English, but the sense is unchanged.
    reason: lexical_alternative
  - marker: b
    text: '''Weaned him'' refers to the child’s being brought to the stage of no longer
      nursing, after which he remained in Pharaoh’s household.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶד לּוֹ
  chosen: bore him
  alternatives:
  - gave birth to him
  - bore for him
  lexicon: HALOT
  rationale: The verb ילד with לּוֹ indicates that Tahpenes's sister gave birth to
    a son for Hadad. 'Bore him' is idiomatic English that preserves the dative sense
    without awkwardness.
- source_word: אֲחוֹת תַּחְפְּנֵיס
  chosen: the sister of Tahpenes
  alternatives:
  - Tahpenes's sister
  lexicon: HALOT
  rationale: Construct relationship is straightforward. 'The sister of Tahpenes' is
    slightly more formal and clear in narrative style.
- source_word: גְּנֻבַת
  chosen: Genubath
  lexicon: HALOT
  rationale: Proper personal name should be transliterated according to the translation
    philosophy.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - a son
  lexicon: HALOT
  rationale: The suffix refers to Hadad, identifying Genubath as his son. Retaining
    'his son' preserves the explicit filial relation in the Hebrew.
- source_word: וַתִּגְמְלֵהוּ
  chosen: weaned him
  alternatives:
  - nursed him until weaning
  - brought him up
  lexicon: HALOT
  rationale: ' גמל in this stem commonly refers to weaning a child. ''Weaned him''
    is the most direct and contextually appropriate rendering.'
- source_word: בְּתוֹךְ בֵּית פַּרְעֹה
  chosen: within Pharaoh’s house
  alternatives:
  - in the midst of Pharaoh's house
  - inside Pharaoh's household
  lexicon: HALOT
  rationale: בְּתוֹךְ here denotes location within the royal household/palace setting.
    'Within Pharaoh’s house' is natural English and preserves the spatial-social sense.
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - remained
  lexicon: HALOT
  rationale: In narrative summary, היה is best rendered simply as 'was,' indicating
    Genubath's place/status in Pharaoh's house.
- source_word: בֵּית פַּרְעֹה
  chosen: Pharaoh’s house
  alternatives:
  - the house of Pharaoh
  - Pharaoh's household
  lexicon: HALOT
  rationale: '''House'' can denote palace or household. Here the repeated phrase likely
    includes both residence and courtly household. ''Pharaoh’s house'' keeps the Hebrew
    image while remaining understandable.'
- source_word: בְּתוֹךְ בְּנֵי פַרְעֹה
  chosen: among the sons of Pharaoh
  alternatives:
  - among Pharaoh's sons
  - in the midst of Pharaoh's children
  lexicon: HALOT
  rationale: בני is literally 'sons,' and the context is the royal children raised
    in the palace. 'Among the sons of Pharaoh' preserves the masculine plural and
    the social setting.
