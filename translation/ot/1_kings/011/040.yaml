id: 1KI.11.40
reference: 1 Kings 11:40
source:
  edition: WLC
  text: וַ/יְבַקֵּ֥שׁ שְׁלֹמֹ֖ה לְ/הָמִ֣ית אֶת יָרָבְעָ֑ם וַ/יָּ֣קָם יָרָבְעָ֗ם וַ/יִּבְרַ֤ח
    מִצְרַ֨יִם֙ אֶל שִׁישַׁ֣ק מֶֽלֶךְ מִצְרַ֔יִם וַ/יְהִ֥י בְ/מִצְרַ֖יִם עַד מ֥וֹת
    שְׁלֹמֹֽה־־־־׃
translation:
  text: Then Solomon sought to put Jeroboam to death, but Jeroboam arose and fled
    to Egypt, to Shishak king of Egypt, and he was in Egypt until the death of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sought to kill Jeroboam.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and he remained in Egypt until Solomon died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  chosen: sought
  alternatives:
  - tried
  - attempted
  lexicon: HALOT
  rationale: בקש commonly means 'seek' or 'attempt.' 'Sought' preserves the Hebrew
    idiom and leaves the action as intention/pursuit rather than implying success.
- source_word: לְהָמִית
  chosen: to put ... to death
  alternatives:
  - to kill
  - to cause to die
  lexicon: HALOT
  rationale: The Hiphil infinitive of מות is causative. 'Put to death' is natural
    English that preserves the causative force and the gravity of an execution-like
    intent better than the flatter 'kill.'
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: קום in narrative often marks decisive action. 'Arose' is slightly formal
    but idiomatic in biblical narrative and preserves the transition to flight.
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: ברח denotes fleeing from danger. 'Fled' is concise and fits the royal-threat
    context.
- source_word: מִצְרַיִם ... אֶל שִׁישַׁק מֶלֶךְ מִצְרַיִם
  chosen: to Egypt, to Shishak king of Egypt
  alternatives:
  - to Egypt, to Shishak the king of Egypt
  lexicon: HALOT
  rationale: The first מִצְרַיִם functions as destination ('to Egypt') despite lacking
    a separate preposition in English; the following אֶל specifies Jeroboam's going
    to Shishak. Repeating 'Egypt' reflects the Hebrew wording and clarifies both the
    country and the ruler.
- source_word: וַיְהִי בְמִצְרַיִם
  chosen: and he was in Egypt
  alternatives:
  - and he remained in Egypt
  - and he stayed in Egypt
  lexicon: HALOT
  rationale: היה + location is literally 'was in.' 'He was in Egypt' keeps the simple
    Hebrew syntax; the temporal phrase that follows supplies the sense of continued
    residence.
- source_word: עַד מוֹת שְׁלֹמֹה
  chosen: until the death of Solomon
  alternatives:
  - until Solomon died
  - until Solomon's death
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'until the death of Solomon.'
    This preserves the nominal form of the Hebrew while remaining natural English.
