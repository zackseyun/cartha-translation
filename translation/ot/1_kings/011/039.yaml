id: 1KI.11.39
reference: 1 Kings 11:39
source:
  edition: WLC
  text: וַֽ/אעַנֶּ֛ה אֶת זֶ֥רַע דָּוִ֖ד לְמַ֣עַן זֹ֑את אַ֖ךְ לֹ֥א כָל הַ/יָּמִֽים־־׃ס
translation:
  text: And I will afflict the offspring of David because of this, but not for all
    days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'not forever.' Literally, 'not all the days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאעַנֶּה
  chosen: I will afflict
  alternatives:
  - I will humble
  - I will oppress
  lexicon: HALOT
  rationale: From ענה in the Piel, here with the sense of causing affliction/humiliation.
    'Afflict' best fits the judgment context while avoiding over-specification. 'Humble'
    is possible but can sound more inward or beneficial in English; 'oppress' is too
    strong and socially specific here.
- source_word: זֶרַע דָּוִד
  chosen: the offspring of David
  alternatives:
  - the seed of David
  - the descendants of David
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the collective
    sense and remains natural English. 'Seed' is more formal/literal but less idiomatic
    here; 'descendants' is acceptable but loses the singular collective nuance.
- source_word: לְמַעַן זֹאת
  chosen: because of this
  alternatives:
  - for this reason
  - on account of this
  lexicon: HALOT
  rationale: This phrase gives the reason or cause for the affliction, referring back
    to the preceding offense. 'Because of this' is clear, idiomatic, and suitably
    close to the Hebrew.
- source_word: אַךְ
  chosen: but
  alternatives:
  - however
  - nevertheless
  - only
  lexicon: HALOT
  rationale: אַךְ here marks an adversative limitation on the preceding judgment.
    'But' is the most natural English connector in this context. 'Only' is possible
    but less smooth in contemporary English here.
- source_word: לֹא כָל הַיָּמִים
  chosen: not for all days
  alternatives:
  - not forever
  - not all the time
  lexicon: HALOT
  rationale: Literally 'not all the days.' The phrase idiomatically means the affliction
    will not be perpetual. I retained a relatively formal rendering, 'not for all
    days,' to preserve the Hebrew imagery while remaining understandable. The more
    idiomatic 'not forever' is preserved in a footnote.
