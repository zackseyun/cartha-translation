id: 1KI.11.14
reference: 1 Kings 11:14
source:
  edition: WLC
  text: וַ/יָּ֨קֶם יְהוָ֤ה שָׂטָן֙ לִ/שְׁלֹמֹ֔ה אֵ֖ת הֲדַ֣ד הָ/אֲדֹמִ֑י מִ/זֶּ֧רַע הַ/מֶּ֛לֶךְ ה֖וּא בֶּ/אֱדֽוֹם׃
translation:
  text: Then Yahweh raised up an adversary against Solomon, Hadad the Edomite; he was of the royal line in Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew satan; here it means 'adversary' or 'opponent,' not the proper name Satan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: raised up
  alternatives:
  - caused to arise
  - appointed
  lexicon: HALOT
  rationale: The hiphil of קום here means to cause someone to arise or stand up in opposition. 'Raised up' is idiomatic English and preserves the sense of divine action without overinterpreting it as formal appointment.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׂטָן
  chosen: an adversary
  alternatives:
  - an opponent
  - a satan
  lexicon: HALOT
  rationale: In this context שָׂטָן is a common noun meaning an adversary or opponent, not the proper name Satan. The indefinite English article reflects the common-noun usage.
- source_word: לִשְׁלֹמֹה
  chosen: against Solomon
  alternatives:
  - for Solomon
  - to Solomon
  lexicon: HALOT
  rationale: With שָׂטָן, the preposition ל marks the person opposed. In English, 'against Solomon' best conveys the adversarial relationship.
- source_word: הֲדַד הָאֲדֹמִי
  chosen: Hadad the Edomite
  alternatives:
  - Hadad of Edom
  lexicon: HALOT
  rationale: Standard transliteration of the personal name is retained, and the gentilic adjective is naturally rendered 'the Edomite.'
- source_word: מִזֶּרַע הַמֶּלֶךְ
  chosen: of the royal line
  alternatives:
  - from the seed of the king
  - of the king's offspring
  - of the king's lineage
  lexicon: HALOT
  rationale: Literally 'from the seed of the king,' an idiom for royal descent. 'Of the royal line' communicates the meaning clearly in modern English while preserving the genealogical emphasis.
- source_word: הוּא בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - in the land of Edom
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis: ''he was in Edom'' or ''he was from/in Edom.'' Given the preceding statement about royal descent, the clause is best taken as specifying that this royal line was in Edom. English smooths the pronoun into the sentence: ''he was of the royal line in Edom.'''
