theological_decisions:
- issue: Meaning of שָׂטָן in this verse
  chosen_reading: common noun ('adversary'), not the personal name Satan
  alternative_readings:
  - Satan
  rationale: The syntax and context identify Hadad as the person whom the LORD raised up against Solomon. The verse speaks of a human political opponent, not the devil. Rendering it as 'an adversary' preserves the plain sense and avoids importing later theological associations not warranted by the Hebrew here.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
