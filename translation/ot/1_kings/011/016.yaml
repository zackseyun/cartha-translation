id: 1KI.11.16
reference: 1 Kings 11:16
source:
  edition: WLC
  text: כִּ֣י שֵׁ֧שֶׁת חֳדָשִׁ֛ים יָֽשַׁב שָׁ֥ם יוֹאָ֖ב וְ/כָל יִשְׂרָאֵ֑ל עַד הִכְרִ֥ית
    כָּל זָכָ֖ר בֶּ/אֱדֽוֹם־־־־׃
translation:
  text: For Joab and all Israel had remained there six months, until he had cut off
    every male in Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destroyed' or 'exterminated' every male. The Hebrew verb literally means
      'cut off,' an idiom for eliminating a population.
    reason: lexical_alternative
  - marker: b
    text: '''All Israel'' likely refers to the Israelite fighting force with Joab,
      not necessarily every individual in the nation.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory clause giving the reason/background
    for the preceding statement, so 'For' fits natural English while preserving the
    causal/explanatory force.
- source_word: שֵׁשֶׁת חֳדָשִׁים
  chosen: six months
  alternatives:
  - for six months
  lexicon: HALOT
  rationale: Construct numeral + noun is most naturally rendered 'six months.' The
    duration is then conveyed with the verb 'had remained.'
- source_word: יָשַׁב
  chosen: had remained
  alternatives:
  - dwelt
  - stayed
  - sat
  lexicon: HALOT
  rationale: יָשַׁב often means 'sit, dwell, remain.' In this military context, 'had
    remained' best conveys continued presence without implying settled residence.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Standard adverbial rendering indicating location.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: The Hebrew names the collective national force. 'All Israel' is a conventional
    and sufficiently clear rendering, likely referring to the Israelite army with
    Joab.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point that
  lexicon: HALOT
  rationale: Marks the endpoint of the action in straightforward temporal sequence.
- source_word: הִכְרִית
  chosen: he had cut off
  alternatives:
  - he had destroyed
  - he had exterminated
  lexicon: HALOT
  rationale: The hiphil of כרת commonly means 'cut off,' including in contexts of
    elimination. 'Cut off' preserves the Hebrew idiom and severity without overinterpreting
    beyond the lexical sense.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all the males
  lexicon: HALOT
  rationale: זָכָר denotes 'male.' 'Every male' is gender-accurate and avoids importing
    adulthood if the Hebrew does not specify it. This follows the project's gender-accurate
    principle.
- source_word: בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - among Edom
  - from Edom
  lexicon: HALOT
  rationale: 'The preposition ב is locative here: the action took place within Edom.'
