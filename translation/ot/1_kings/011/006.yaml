theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy. This preserves continuity with Jewish
    reverence tradition and common English Bible usage while remaining transparent
    in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of Solomon's failure in מִלֵּא אַחֲרֵי יְהוָה
  chosen_reading: did not fully follow the LORD
  alternative_readings:
  - was not wholly devoted to the LORD
  - did not go completely after the LORD
  rationale: The Hebrew idiom emphasizes incomplete following rather than explicit
    apostasy in this clause alone. 'Did not fully follow' preserves that nuance and
    avoids importing a stronger doctrinal conclusion than the text states here.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
