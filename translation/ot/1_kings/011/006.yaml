id: 1KI.11.6
reference: 1 Kings 11:6
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ שְׁלֹמֹ֛ה הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וְ/לֹ֥א מִלֵּ֛א אַחֲרֵ֥י
    יְהוָ֖ה כְּ/דָוִ֥ד אָבִֽי/ו׃ס
translation:
  text: So Solomon did what was evil in the eyes of the LORD, and he did not fully
    follow the LORD, as David his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not go fully after the LORD' or 'was not wholly devoted to the LORD.'
      The Hebrew idiom expresses incomplete loyalty or obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - made
  - acted
  lexicon: HALOT
  rationale: The common verb עשה here introduces Solomon's conduct. 'Did' is the most
    natural English equivalent in the idiom 'did what was evil,' preserving the Hebrew
    construction without unnecessary stiffness.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - what was bad/wrong
  lexicon: HALOT
  rationale: 'With the article, the adjective functions substantivally: ''the evil''
    or idiomatically ''what was evil.'' This is standard biblical English and clearly
    conveys moral evil rather than mere misfortune or poor quality.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a fixed Hebrew evaluative idiom. 'In the eyes of the LORD' preserves
    the metaphor and remains readable in modern English. YHWH is rendered 'the LORD'
    per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: מִלֵּא אַחֲרֵי
  chosen: fully follow
  alternatives:
  - go fully after
  - be wholly devoted to following
  - fulfill after
  lexicon: HALOT
  rationale: The idiom מלא אחרי means to follow fully or wholeheartedly. 'Fully follow'
    preserves the sense of complete allegiance without sounding wooden. 'Fulfill after'
    would be misleading in English.
- source_word: וְלֹא מִלֵּא אַחֲרֵי יְהוָה
  chosen: and he did not fully follow the LORD
  alternatives:
  - and he was not wholly devoted to the LORD
  - and he did not go fully after the LORD
  lexicon: HALOT
  rationale: The clause expresses deficient covenant loyalty. 'Did not fully follow
    the LORD' is both faithful to the Hebrew idiom and clear in modern English. It
    avoids over-interpreting the phrase as inward devotion alone while still conveying
    incomplete allegiance.
- source_word: כְּדָוִד אָבִיו
  chosen: as David his father had done
  alternatives:
  - like David his father
  - as David his father
  lexicon: HALOT
  rationale: The comparison is to David as Solomon's father/ancestor and exemplar.
    Adding 'had done' makes the English comparison smoother and clarifies that David's
    pattern of following the LORD is in view, though the verb is implied from context.
