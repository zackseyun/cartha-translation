id: 1KI.11.21
reference: 1 Kings 11:21
source:
  edition: WLC
  text: וַ/הֲדַ֞ד שָׁמַ֣ע בְּ/מִצְרַ֗יִם כִּֽי שָׁכַ֤ב דָּוִד֙ עִם אֲבֹתָ֔י/ו וְ/כִי
    מֵ֖ת יוֹאָ֣ב שַֽׂר הַ/צָּבָ֑א וַ/יֹּ֤אמֶר הֲדַד֙ אֶל פַּרְעֹ֔ה שַׁלְּחֵ֖/נִי וְ/אֵלֵ֥ךְ
    אֶל אַרְצִֽ/י־־־־־־׃
translation:
  text: Now when Hadad heard in Egypt that David had lain down with his fathers and
    that Joab, the commander of the army, was dead, Hadad said to Pharaoh, “Send me
    away, so that I may go to my own land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''had lain down with his fathers,'' a customary idiom for death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had died' for 'was dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - learned
  lexicon: HALOT
  rationale: The verb commonly means 'hear,' and in this narrative context it naturally
    carries the sense of receiving news. 'Heard' preserves the Hebrew idiom without
    unnecessary expansion.
- source_word: שָׁכַב ... עִם אֲבֹתָיו
  chosen: had lain down with his fathers
  alternatives:
  - slept with his fathers
  - died
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for death. Rendering it more literally
    as 'had lain down with his fathers' preserves the source imagery and conventional
    royal obituary formula better than flattening it to simply 'died.' 'Slept with
    his fathers' is traditional, but 'lain down' more directly reflects שָׁכַב.
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  lexicon: HALOT
  rationale: The stative perfect is well represented by 'was dead' in English here,
    especially following the report formula. 'Had died' is possible, but 'was dead'
    reflects the Hebrew adjective/verb form's resultant state.
- source_word: שַׂר הַצָּבָא
  chosen: the commander of the army
  alternatives:
  - captain of the army
  - commander of the host
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or commander. 'Commander of the army' is
    clear modern English and preserves the military office without archaic diction.
- source_word: שַׁלְּחֵנִי
  chosen: Send me away
  alternatives:
  - Let me go
  - Dismiss me
  lexicon: HALOT
  rationale: The imperative of שלח with first-person suffix asks Pharaoh to release
    or dispatch Hadad. 'Send me away' captures both the request for permission and
    the sense of being sent from Pharaoh's court.
- source_word: וְאֵלֵךְ
  chosen: so that I may go
  alternatives:
  - and let me go
  - that I may go
  lexicon: HALOT
  rationale: The cohortative expresses purpose or desired result following the imperative.
    'So that I may go' conveys the volitional nuance naturally in English.
- source_word: אַרְצִי
  chosen: my own land
  alternatives:
  - my land
  - my country
  lexicon: HALOT
  rationale: '''Land'' is the basic sense of אֶרֶץ. Adding ''own'' brings out the
    possessive suffix naturally in English and highlights Hadad''s desire to return
    to his homeland.'
