theological_decisions:
- issue: Meaning of 'house' in the promise
  chosen_reading: dynastic/royal house is intended, while retaining 'house' in the
    translation
  alternative_readings:
  - literal physical house/palace
  rationale: In the context of royal succession and the comparison with what God built
    for David, 'house' clearly refers to an enduring dynasty rather than merely a
    building. Retaining 'house' preserves the canonical idiom while a footnote clarifies
    the sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the conditional promise
  chosen_reading: a genuine conditional covenantal promise dependent on Jeroboam's
    obedience
  alternative_readings:
  - an unconditional grant
  rationale: The opening אִם and the sequence of obedience clauses make the promise
    explicitly conditional. The translation preserves this without softening or theological
    harmonization.
  doctrine_reference: Translation philosophy §3
