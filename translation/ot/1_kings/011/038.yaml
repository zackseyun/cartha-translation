id: 1KI.11.38
reference: 1 Kings 11:38
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם תִּשְׁמַע֮ אֶת כָּל אֲשֶׁ֣ר אֲצַוֶּ/ךָ֒ וְ/הָלַכְתָּ֣ בִ/דְרָכַ֗/י
    וְ/עָשִׂ֨יתָ הַ/יָּשָׁ֤ר בְּ/עֵינַ/י֙ לִ/שְׁמ֤וֹר חֻקּוֹתַ/י֙ וּ/מִצְוֺתַ֔/י כַּ/אֲשֶׁ֥ר
    עָשָׂ֖ה דָּוִ֣ד עַבְדִּ֑/י וְ/הָיִ֣יתִי עִמָּ֗/ךְ וּ/בָנִ֨יתִי לְ/ךָ֤ בַֽיִת נֶאֱמָן֙
    כַּ/אֲשֶׁ֣ר בָּנִ֣יתִי לְ/דָוִ֔ד וְ/נָתַתִּ֥י לְ/ךָ֖ אֶת יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And it shall be, if you listen to all that I command you, and walk in my ways,
    and do what is right in my eyes by keeping my statutes and my commandments, as
    David my servant did, then I will be with you and build for you a lasting house,
    just as I built for David, and I will give Israel to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an enduring house,' 'a sure house,' or 'a faithful house'; that is,
      a lasting dynasty.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the following
    clauses unpack covenant obedience, so 'listen' preserves the auditory verb while
    allowing the obedient sense to be carried by context rather than overtranslating
    it as 'obey'.
- source_word: אֲצַוֶּךָ
  chosen: I command you
  alternatives:
  - I will command you
  - I charge you
  lexicon: HALOT
  rationale: The imperfect in this conditional setting is naturally rendered as present/future-oriented
    direct speech. 'I command you' is idiomatic and keeps the force of divine instruction.
- source_word: וְהָלַכְתָּ בִדְרָכַי
  chosen: walk in my ways
  alternatives:
  - live according to my ways
  - follow my ways
  lexicon: HALOT
  rationale: This is a standard covenant idiom. 'Walk in my ways' preserves the metaphor
    and its biblical resonance better than a flattened dynamic equivalent.
- source_word: הַיָּשָׁר בְּעֵינַי
  chosen: what is right in my eyes
  alternatives:
  - the right in my sight
  - what is upright in my sight
  lexicon: HALOT
  rationale: The phrase denotes what is morally right from God's perspective. 'What
    is right in my eyes' is natural English and preserves the evaluative idiom.
- source_word: לִשְׁמֹר
  chosen: by keeping
  alternatives:
  - to keep
  - keeping
  lexicon: HALOT
  rationale: The infinitive expresses the manner in which the right is done. 'By keeping'
    makes the syntactic relationship clear in English.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and sufficiently transparent rendering for
    חֻקִּים in covenantal/legal contexts.'
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal register and distinguishes
    this term from the verbal ''I command'' earlier in the verse while remaining readable.'
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it functions as an honorific
    designation for David in covenant service to God. 'Servant' best fits the royal-theological
    context without importing the harsher social sense as the main emphasis.
- source_word: בַיִת נֶאֱמָן
  chosen: a lasting house
  alternatives:
  - a faithful house
  - an enduring house
  - a sure house
  lexicon: HALOT
  rationale: In this dynastic promise, 'house' means a royal line/dynasty, and נֶאֱמָן
    conveys firmness, reliability, and endurance. 'Lasting house' communicates the
    dynastic permanence idiomatically; the more literal alternatives are preserved
    in a footnote.
- source_word: בַיִת
  chosen: house
  alternatives:
  - dynasty
  lexicon: HALOT
  rationale: '''House'' is retained in the main text to preserve the biblical metaphor
    and intertextual connection to the Davidic promise, even though it refers to a
    dynasty rather than a building.'
- source_word: וְנָתַתִּי לְךָ אֶת יִשְׂרָאֵל
  chosen: I will give Israel to you
  alternatives:
  - I will give you Israel
  - I will grant Israel to you
  lexicon: HALOT
  rationale: The direct-object construction is straightforward. 'I will give Israel
    to you' preserves the emphasis on Israel as the object granted by God.
