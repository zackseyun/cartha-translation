id: 1KI.11.35
reference: 1 Kings 11:35
source:
  edition: WLC
  text: וְ/לָקַחְתִּ֥י הַ/מְּלוּכָ֖ה מִ/יַּ֣ד בְּנ֑/וֹ וּ/נְתַתִּ֣י/הָ לְּ/ךָ֔ אֵ֖ת
    עֲשֶׂ֥רֶת הַ/שְּׁבָטִֽים׃
translation:
  text: But I will take the kingdom from the hand of his son and give it to you—the
    ten tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the hand of his son,'' an idiom for removing rule or possession
      from his son''s control.'
    reason: cultural_note
  - marker: b
    text: Literally, 'and I will give it to you, ten tribes.' The phrase specifies
      that the kingdom given consists of ten tribes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  chosen: But I will take
  alternatives:
  - And I will take
  - I will take
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse functions
    as a future statement. The conjunction is rendered 'But' to reflect the contrast
    with the preceding context, while preserving the basic sense of לקח as 'take.'
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: Refers to the royal dominion/kingdom being removed from Solomon's line.
    'Kingdom' is the most natural and contextually fitting English rendering here.
- source_word: מִיַּד בְּנוֹ
  chosen: from the hand of his son
  alternatives:
  - from his son's hand
  - out of the hand of his son
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is retained because it is transparent in
    English and preserves the Hebrew image of possession/control. 'His son' refers
    to Solomon's son in context.
- source_word: וּנְתַתִּיהָ לְּךָ
  chosen: and give it to you
  alternatives:
  - and I will give it to you
  - and place it in your hand
  lexicon: HALOT
  rationale: נתן with the feminine suffix refers back to 'the kingdom.' English omits
    the repeated subject naturally while preserving the future sense. 'Give it to
    you' is the plain sense.
- source_word: אֵת עֲשֶׂרֶת הַשְּׁבָטִים
  chosen: the ten tribes
  alternatives:
  - namely, the ten tribes
  - even ten tribes
  lexicon: HALOT
  rationale: 'The direct-object marker plus appositional phrase specifies what is
    being given: ten of the tribes. English expresses this naturally as apposition
    to ''it'' with an em dash: ''give it to you—the ten tribes.'' This avoids the
    misleading sense that the entire kingdom is given, while preserving the Hebrew
    specification.'
