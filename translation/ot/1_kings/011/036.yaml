id: 1KI.11.36
reference: 1 Kings 11:36
source:
  edition: WLC
  text: וְ/לִ/בְנ֖/וֹ אֶתֵּ֣ן שֵֽׁבֶט אֶחָ֑ד לְמַ֣עַן הֱיֽוֹת נִ֣יר לְ/דָֽוִיד עַ֠בְדִּ/י
    כָּֽל הַ/יָּמִ֤ים לְ/פָנַ/י֙ בִּ/יר֣וּשָׁלִַ֔ם הָ/עִיר֙ אֲשֶׁ֣ר בָּחַ֣רְתִּי לִ֔/י
    לָ/שׂ֥וּם שְׁמִ֖/י שָֽׁם־־־־׀׃
translation:
  text: But to his son I will give one tribe, so that my servant David may always
    have a lamp before me in Jerusalem, the city that I have chosen for myself to
    put my name there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'light.' The Hebrew 'lamp' is a metaphor for the continuing Davidic line
      or enduring royal presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁבֶט אֶחָד
  chosen: one tribe
  alternatives:
  - one scepter
  lexicon: HALOT
  rationale: In the context of the division of the kingdom, שֵׁבֶט refers to a tribal/political
    unit rather than a royal staff. 'One tribe' is the plain contextual sense.
- source_word: לְמַעַן הֱיוֹת
  chosen: so that ... may
  alternatives:
  - in order that there be
  lexicon: HALOT
  rationale: This construction expresses purpose. 'So that ... may' gives natural
    English while preserving the purposive force.
- source_word: נִיר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: נִיר here is the dynastic metaphor found in Kings for an enduring line
    or continuing presence. 'Lamp' preserves the metaphor more concretely than 'light'
    and matches common biblical usage.
- source_word: לְדָוִיד עַבְדִּי
  chosen: my servant David
  alternatives:
  - David my servant
  lexicon: HALOT
  rationale: Either English order is possible; 'my servant David' is smooth and preserves
    the possessive relationship and honorific designation.
- source_word: כָּל הַיָּמִים
  chosen: always
  alternatives:
  - all the days
  - continually
  lexicon: HALOT
  rationale: The idiom means ongoing continuity. 'Always' is concise modern English
    that preserves the sense; the dynastic metaphor already carries the temporal continuity.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: '''Before me'' is a transparent and natural rendering of the Hebrew idiom
    and preserves covenantal/judicial overtones of standing in God''s sight.'
- source_word: בָּחַרְתִּי לִי
  chosen: I have chosen for myself
  alternatives:
  - I chose for myself
  - I have chosen
  lexicon: HALOT
  rationale: The perfect can be rendered as present-resultative in context. The reflexive
    dative לִי is significant and is best preserved with 'for myself' rather than
    omitted.
- source_word: לָשׂוּם שְׁמִי שָׁם
  chosen: to put my name there
  alternatives:
  - to place my name there
  - for my name to be there
  lexicon: HALOT
  rationale: This is standard covenant-temple language. 'Put my name there' is both
    literal and understandable, preserving the theological idiom without paraphrase.
- source_word: וְלִבְנוֹ
  chosen: But to his son
  alternatives:
  - And to his son
  lexicon: HALOT
  rationale: The conjunction links with contrast to the prior division of the kingdom;
    'But' brings out the adversative sense in context better than a bare 'And'.
