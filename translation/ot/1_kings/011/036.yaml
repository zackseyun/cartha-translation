theological_decisions:
- issue: Dynastic metaphor in נִיר
  chosen_reading: lamp as a metaphor for the continuing Davidic line/presence before
    God
  alternative_readings:
  - light as a more general metaphor
  rationale: The verse speaks of preserving a continuing Davidic remnant in Jerusalem.
    Retaining 'lamp' preserves the metaphor and allows readers to see the dynastic
    theology without flattening it into interpretation in the main text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Temple theology in 'put my name there'
  chosen_reading: retain the idiom rather than paraphrasing it as dwelling/presence
  alternative_readings:
  - to establish my presence there
  - to be worshiped there
  rationale: The Hebrew states the 'name' formula, a significant theological expression
    in Deuteronomistic history. The translation should preserve that tension and not
    collapse it into a fuller doctrinal explanation.
  doctrine_reference: Translation philosophy §1, §3
