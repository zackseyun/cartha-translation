id: 1KI.11.23
reference: 1 Kings 11:23
source:
  edition: WLC
  text: וַ/יָּ֨קֶם אֱלֹהִ֥ים ל/וֹ֙ שָׂטָ֔ן אֶת רְז֖וֹן בֶּן אֶלְיָדָ֑ע אֲשֶׁ֣ר בָּרַ֗ח
    מֵ/אֵ֛ת הֲדַדְעֶ֥זֶר מֶֽלֶךְ צוֹבָ֖ה אֲדֹנָֽי/ו־־־׃
translation:
  text: 'And God raised up for him an adversary: Rezon son of Eliada, who had fled
    from Hadadezer king of Zobah, his master.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew satan; here a common noun meaning 'adversary' or 'opponent,' not
      the proper name Satan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: raised up
  alternatives:
  - caused to arise
  - appointed
  lexicon: HALOT
  rationale: The hiphil of קום here means to cause someone to arise or stand up against
    another. 'Raised up' is idiomatic English and preserves the sense of God bringing
    an opponent onto the scene.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context the referent is the God of Israel, so 'God'
    is the natural English rendering.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix after 'raised up' can be rendered
    literally as 'for him,' but in context it indicates an opponent raised up in relation
    to Solomon, effectively against him. The main text keeps the more formally transparent
    'for him' while the adversarial force is carried by 'adversary'.
- source_word: שָׂטָן
  chosen: an adversary
  alternatives:
  - an opponent
  - a satan
  lexicon: HALOT
  rationale: Here שָׂטָן is a common noun meaning an adversary or opponent, not the
    later proper name 'Satan.' 'Adversary' best fits the political context and avoids
    importing demonological meaning not present in the text.
- source_word: רְזוֹן
  chosen: Rezon
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן אֶלְיָדָע
  chosen: son of Eliada
  rationale: Standard filial construction; names are transliterated.
- source_word: אֲשֶׁר בָּרַח
  chosen: who had fled
  alternatives:
  - who fled
  lexicon: HALOT
  rationale: 'English past perfect fits the narrative background sense: this flight
    occurred prior to the present action of God raising him up.'
- source_word: מֵאֵת הֲדַדְעֶזֶר
  chosen: from Hadadezer
  alternatives:
  - away from Hadadezer
  rationale: מֵאֵת marks separation from a person; 'from' is sufficient and natural.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  rationale: Construct chain rendered straightforwardly; Zobah is a place name and
    is transliterated.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In this political-servile context, 'master' better communicates personal
    subordination than 'lord' and avoids confusion with divine title usage.
