theological_decisions:
- issue: Meaning of שָׂטָן in context
  chosen_reading: common noun 'adversary'
  alternative_readings:
  - proper name 'Satan'
  rationale: The verse describes a human political opponent, Rezon son of Eliada.
    Rendering the term as the proper name 'Satan' would import a theological claim
    the text does not make. The narrative context controls the sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text states without importing doctrinal claims.'
