id: 1KI.11.3
reference: 1 Kings 11:3
source:
  edition: WLC
  text: וַ/יְהִי ל֣/וֹ נָשִׁ֗ים שָׂרוֹת֙ שְׁבַ֣ע מֵא֔וֹת וּ/פִֽלַגְשִׁ֖ים שְׁלֹ֣שׁ
    מֵא֑וֹת וַ/יַּטּ֥וּ נָשָׁ֖י/ו אֶת לִבּֽ/וֹ־־׃
translation:
  text: He had seven hundred wives, princesses, and three hundred concubines; and
    his wives turned away his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'women of rank' for 'princesses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  chosen: He had
  alternatives:
  - And there were to him
  - And he had
  lexicon: HALOT
  rationale: The idiom with היה + ל expresses possession. In natural English, 'He
    had' best conveys the sense without unnecessary literalism.
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: In this royal-marriage context, נָשִׁים refers specifically to wives,
    not merely women.
- source_word: שָׂרוֹת
  chosen: princesses
  alternatives:
  - noblewomen
  - women of rank
  lexicon: HALOT
  rationale: The noun indicates women of high status, here best rendered 'princesses,'
    fitting the political-marriage context of Solomon's foreign alliances.
- source_word: שְׁבַע מֵאוֹת
  chosen: seven hundred
  rationale: Straightforward cardinal number.
- source_word: וּפִלַגְשִׁים
  chosen: and three hundred concubines
  alternatives:
  - and three hundred secondary wives
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ is conventionally and accurately rendered 'concubine,' denoting
    a recognized but lower-status sexual/marital partner. The number is carried with
    the phrase in English for natural style.
- source_word: שְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  rationale: Straightforward cardinal number.
- source_word: וַיַּטּוּ
  chosen: turned away
  alternatives:
  - inclined
  - led astray
  - turned
  lexicon: HALOT
  rationale: From נטה, here in context of moral-religious deviation. 'Turned away'
    captures the directional sense and anticipates the following context of Solomon's
    heart being drawn from full loyalty.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: The subject of the final clause is specifically his wives; this matches
    the Hebrew and the narrative emphasis.
- source_word: אֶת לִבּוֹ
  chosen: his heart
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner self, will, and devotion. 'Heart'
    is the standard and sufficiently rich English equivalent here.
