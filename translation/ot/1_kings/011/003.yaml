theological_decisions:
- issue: Meaning of 'his heart' in context
  chosen_reading: The phrase denotes Solomon's inner loyalty, will, and devotion being
    turned away, especially in relation to covenant faithfulness.
  alternative_readings:
  - A purely emotional change of affection
  rationale: In Hebrew anthropology, 'heart' includes thought, will, and allegiance,
    not merely emotion. The translation preserves the literal term 'heart' while recognizing
    its fuller covenantal sense in context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
