theological_decisions:
- issue: Plural verbal forms in the final clauses though the broader narrative focuses
    on Rezon
  chosen_reading: 'Retain the plural subject in translation: ''They went... settled...
    reigned'''
  alternative_readings:
  - 'Smooth to singular with Rezon as the implied subject: ''He went... settled...
    reigned'''
  rationale: The Hebrew text uses plural wayyiqtol verbs throughout the latter half
    of the verse. Although some translations smooth to singular for contextual clarity,
    preserving the plural better reflects the source text and leaves the narrative
    tension intact rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3, §5
