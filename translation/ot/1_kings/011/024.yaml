id: 1KI.11.24
reference: 1 Kings 11:24
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֤ץ עָלָי/ו֙ אֲנָשִׁ֔ים וַ/יְהִ֣י שַׂר גְּד֔וּד בַּ/הֲרֹ֥ג דָּוִ֖ד
    אֹתָ֑/ם וַ/יֵּלְכ֤וּ דַמֶּ֨שֶׂק֙ וַ/יֵּ֣שְׁבוּ בָ֔/הּ וַֽ/יִּמְלְכ֖וּ בְּ/דַמָּֽשֶׂק־׃
translation:
  text: He gathered men to himself and became commander of a raiding band when David
    killed them. They went to Damascus, settled there, and reigned in Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has plural verbs throughout the latter half of the verse: ''they
      went ... settled ... reigned.'' Some translations smooth this to singular (''he'')
      because the context centers on Rezon.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ עָלָיו אֲנָשִׁים
  chosen: He gathered men to himself
  alternatives:
  - He collected men around him
  - He assembled men to join him
  lexicon: HALOT
  rationale: קבץ with עַל + pronominal suffix here denotes gathering people around
    oneself, i.e., attracting followers. 'To himself' makes the idiom natural in English
    while preserving the directional sense.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in this military context
    refers specifically to fighting men, so 'men' is more accurate than the generic
    'people,' in keeping with the gender-accurate policy.
- source_word: שַׂר גְּדוּד
  chosen: commander of a raiding band
  alternatives:
  - captain of a troop
  - leader of a band
  lexicon: HALOT
  rationale: שַׂר is a leader/commander, and גְּדוּד commonly denotes a troop, band,
    or marauding unit. 'Raiding band' fits the likely irregular military group in
    context better than the more formal 'troop.'
- source_word: בַּהֲרֹג דָּוִד אֹתָם
  chosen: when David killed them
  alternatives:
  - at the time David killed them
  - during David's killing of them
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct can mark temporal circumstance:
    ''when/as.'' The plural object most naturally refers back to the members of the
    band or their group. ''When David killed them'' is the clearest idiomatic rendering.'
- source_word: וַיֵּלְכוּ דַמֶּשֶׂק
  chosen: They went to Damascus
  alternatives:
  - Then they went to Damascus
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol sequence; 'went to Damascus' preserves the
    directional movement without overtranslating the conjunction.
- source_word: וַיֵּשְׁבוּ בָהּ
  chosen: settled there
  alternatives:
  - lived there
  - dwelt in it
  lexicon: HALOT
  rationale: ישב in settlement contexts often means to dwell or settle. 'Settled there'
    is natural modern English and fits the move into Damascus.
- source_word: וַיִּמְלְכוּ בְּדַמָּשֶׂק
  chosen: and reigned in Damascus
  alternatives:
  - and became kings in Damascus
  - and ruled in Damascus
  lexicon: HALOT
  rationale: מלך in the Qal commonly means 'reign/be king.' Because the plural subject
    is retained in the Hebrew, the translation preserves the plural 'reigned' rather
    than smoothing to singular, even though the broader context centers on Rezon.
