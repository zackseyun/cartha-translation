id: 1KI.11.12
reference: 1 Kings 11:12
source:
  edition: WLC
  text: אַךְ בְּ/יָמֶ֨י/ךָ֙ לֹ֣א אֶעֱשֶׂ֔/נָּה לְמַ֖עַן דָּוִ֣ד אָבִ֑י/ךָ מִ/יַּ֥ד
    בִּנְ/ךָ֖ אֶקְרָעֶֽ/נָּה־׃
translation:
  text: Nevertheless, in your days I will not do it, for the sake of David your father;
    from the hand of your son I will tear it away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the kingdom announced in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or 'out of your son's hand.' The Hebrew idiom literally says 'from the hand
      of your son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Nevertheless
  alternatives:
  - Only
  - However
  - Yet
  lexicon: HALOT
  rationale: אַךְ here marks a restrictive/adversative qualification to the prior
    judgment statement. 'Nevertheless' captures the concessive force in natural English
    better than the more wooden 'only.'
- source_word: בְּיָמֶיךָ
  chosen: in your days
  alternatives:
  - during your lifetime
  lexicon: HALOT
  rationale: The idiom literally means 'in your days' and refers to Solomon's lifetime/reign.
    The more literal rendering is clear in English and preserves the Hebrew temporal
    expression.
- source_word: לֹא אֶעֱשֶׂנָּה
  chosen: I will not do it
  alternatives:
  - I will not do this
  lexicon: HALOT
  rationale: The feminine pronominal suffix refers back to the previously announced
    act of tearing away the kingdom. 'Do it' is idiomatic English and preserves the
    anaphoric reference without over-specifying beyond the immediate context.
- source_word: לְמַעַן דָּוִד אָבִיךָ
  chosen: for the sake of David your father
  alternatives:
  - because of David your father
  lexicon: HALOT
  rationale: לְמַעַן commonly expresses motive or regard. 'For the sake of' best conveys
    covenantal regard shown to David without flattening it into mere causation.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - out of the hand of
  - from
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' often denotes removal from someone's
    power or possession. Retaining 'hand' preserves the vivid idiom and its sense
    of transferred rule.
- source_word: בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Straightforward filial term; no contextual reason to vary.
- source_word: אֶקְרָעֶנָּה
  chosen: I will tear it away
  alternatives:
  - I will tear it out
  - I will rend it
  lexicon: HALOT
  rationale: קָרַע means 'tear/rend.' 'Tear it away' fits the kingdom-schism imagery
    in context and reads naturally in English. The object is implicit from context
    and represented by 'it.'
