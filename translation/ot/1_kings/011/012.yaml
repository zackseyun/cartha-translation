theological_decisions:
- issue: Nature of the deferred judgment on Solomon
  chosen_reading: The verse states that the announced tearing away of the kingdom
    will be delayed until after Solomon's lifetime, specifically occurring in relation
    to his son.
  alternative_readings:
  - The verse could be rendered more explicitly as 'I will not do it in your lifetime
    ... from your son's hand I will tear it'
  rationale: The Hebrew leaves the object implicit, relying on the prior context (the
    kingdom). The translation preserves that contextual linkage without importing
    additional theological explanation. It also maintains the Davidic-mercy motif
    expressed by 'for the sake of David your father.'
  doctrine_reference: Translation philosophy §§1, 3, 5
