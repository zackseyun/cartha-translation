theological_decisions:
- issue: Rendering שָׁלֵם in relation to Solomon's heart
  chosen_reading: whole
  alternative_readings:
  - fully devoted
  - undivided
  - complete
  rationale: The verse contrasts Solomon's covenant loyalty with David's. 'Whole'
    preserves the metaphor of an undivided heart before God without importing a narrower
    denominational formulation. It leaves intact the theological tension between moral
    failure and covenantal orientation.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Reference to 'other gods'
  chosen_reading: other gods
  alternative_readings:
  - foreign gods
  rationale: The Hebrew אֱלֹהִים אֲחֵרִים is the standard expression 'other gods.'
    Rendering it directly avoids softening the text into merely ethnic or national
    categories ('foreign gods') and reflects the biblical portrayal of idolatry.
  doctrine_reference: Translation philosophy §1
