id: 1KI.11.4
reference: 1 Kings 11:4
source:
  edition: WLC
  text: וַ/יְהִ֗י לְ/עֵת֙ זִקְנַ֣ת שְׁלֹמֹ֔ה נָשָׁי/ו֙ הִטּ֣וּ אֶת לְבָב֔/וֹ אַחֲרֵ֖י
    אֱלֹהִ֣ים אֲחֵרִ֑ים וְ/לֹא הָיָ֨ה לְבָב֤/וֹ שָׁלֵם֙ עִם יְהוָ֣ה אֱלֹהָ֔י/ו כִּ/לְבַ֖ב
    דָּוִ֥יד אָבִֽי/ו־־־׃
translation:
  text: And when Solomon was old, his wives turned his heart after other gods, and
    his heart was not whole with the LORD his God, like the heart of David his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fully devoted to the LORD his God.' The Hebrew says literally that his
      heart was not 'whole' with the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵת זִקְנַת
  chosen: when ... was old
  alternatives:
  - at the time of Solomon's old age
  - in the time of Solomon's old age
  lexicon: HALOT
  rationale: The construct phrase literally means 'at the time of the old age of.'
    In idiomatic modern English, 'when Solomon was old' best preserves the temporal
    sense without awkwardness.
- source_word: נָשָׁיו
  chosen: his wives
  lexicon: HALOT
  rationale: Straightforward plural possessive; no reason to generalize or soften.
- source_word: הִטּוּ אֶת־לְבָבוֹ
  chosen: turned his heart
  alternatives:
  - inclined his heart
  - led his heart astray
  lexicon: HALOT
  rationale: The Hiphil of נטה here conveys causing the heart to turn/incline. 'Turned
    his heart' is both natural English and close to the Hebrew imagery. 'Led astray'
    is interpretive and stronger than the base verb.
- source_word: אַחֲרֵי אֱלֹהִים אֲחֵרִים
  chosen: after other gods
  alternatives:
  - toward other gods
  - to follow other gods
  lexicon: HALOT
  rationale: אַחֲרֵי commonly expresses following after. 'After other gods' preserves
    the Hebrew idiom and echoes the covenantal language of apostasy in the Former
    Prophets.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his inner self
  - his mind
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' includes will, thought, and devotion.
    Retaining 'heart' preserves the biblical idiom and theological resonance.
- source_word: שָׁלֵם
  chosen: whole
  alternatives:
  - complete
  - fully devoted
  - blameless
  lexicon: HALOT
  rationale: שָׁלֵם here denotes undivided completeness in covenant loyalty. 'Whole'
    preserves the metaphor and avoids over-interpreting as merely emotional devotion.
    'Fully devoted' is a plausible dynamic alternative but less formally transparent.
- source_word: עִם יְהוָה אֱלֹהָיו
  chosen: with the LORD his God
  alternatives:
  - toward the LORD his God
  - before the LORD his God
  lexicon: HALOT
  rationale: The preposition עִם with שָׁלֵם expresses relational alignment or fidelity.
    'With the LORD his God' is the most direct rendering. YHWH is rendered 'the LORD'
    per doctrine.
- source_word: כִּלְבַב דָּוִיד אָבִיו
  chosen: like the heart of David his father
  alternatives:
  - as the heart of David his father was
  - like David his father
  lexicon: HALOT
  rationale: The comparison is specifically between hearts, not merely persons. Keeping
    'heart' maintains the Hebrew's explicit focus on inward covenant loyalty.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, YHWH is rendered 'the LORD,' following
    Jewish reverence tradition and longstanding biblical English convention.
