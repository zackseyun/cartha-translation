id: 1KI.11.27
reference: 1 Kings 11:27
source:
  edition: WLC
  text: וְ/זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁר הֵרִ֥ים יָ֖ד בַּ/מֶּ֑לֶךְ שְׁלֹמֹה֙ בָּנָ֣ה אֶת
    הַ/מִּלּ֔וֹא סָגַ֕ר אֶת פֶּ֕רֶץ עִ֖יר דָּוִ֥ד אָבִֽי/ו־־־׃
translation:
  text: 'And this was the reason he raised his hand against King Solomon: Solomon
    had built the Millo and closed up the breach of the city of David his father.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'he rebelled against King Solomon.' The Hebrew
      idiom is literally 'he raised his hand against the king.'
    reason: alternative_reading
  - marker: b
    text: '''The Millo'' is likely a named fortification or terraced fill structure
      in Jerusalem.'
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the reason
  alternatives:
  - the matter
  - the thing
  lexicon: HALOT
  rationale: Though literally 'the matter/thing,' in the idiom וְזֶה הַדָּבָר אֲשֶׁר
    it introduces the explanation for Jeroboam's rebellion. 'Reason' communicates
    the explanatory force in natural English without excessive paraphrase.
- source_word: הֵרִים יָד
  chosen: raised his hand against
  alternatives:
  - lifted his hand against
  - rebelled against
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'raised the hand against' and denotes
    hostile action or rebellion. The main text preserves the idiom in understandable
    English; 'rebelled against' is interpretive and therefore kept as an alternative
    rather than the main rendering.
- source_word: בַּמֶּלֶךְ
  chosen: against King
  alternatives:
  - against the king
  lexicon: HALOT
  rationale: With the preceding idiom, the preposition marks the object of hostile
    action. 'King' is capitalized as a title before the proper name in English style.
- source_word: הַמִּלּוֹא
  chosen: the Millo
  alternatives:
  - the terraces
  - the fill
  lexicon: HALOT
  rationale: מִלּוֹא is a specific topographical/architectural term in Jerusalem and
    is best transliterated here rather than forced into an uncertain English equivalent.
    A lexical footnote preserves the likely sense.
- source_word: סָגַר
  chosen: closed up
  alternatives:
  - repaired
  - fortified
  - shut
  lexicon: HALOT
  rationale: The verb literally means 'shut/close.' In context of a city breach, 'closed
    up' is both natural and close to the Hebrew image. 'Repaired' is possible but
    slightly more interpretive.
- source_word: פֶּרֶץ
  chosen: the breach
  alternatives:
  - the gap
  - the break
  lexicon: HALOT
  rationale: In fortification context, פֶּרֶץ refers to a break or breach in a wall/defense.
    'Breach' is the most precise English term.
- source_word: עִיר דָּוִד
  chosen: the city of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: This is the standard designation for the Jerusalem stronghold associated
    with David. The more formal word order is clearer and conventional in English
    Bible style.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Refers to David as Solomon's father in the ordinary dynastic sense. 'His
    father' is the plain and accurate rendering.
