id: 1KI.11.33
reference: 1 Kings 11:33
source:
  edition: WLC
  text: יַ֣עַן אֲשֶׁ֣ר עֲזָב֗וּ/נִי וַ/יִּֽשְׁתַּחֲווּ֮ לְ/עַשְׁתֹּרֶת֮ אֱלֹהֵ֣י צִֽדֹנִין֒ לִ/כְמוֹשׁ֙ אֱלֹהֵ֣י מוֹאָ֔ב וּ/לְ/מִלְכֹּ֖ם אֱלֹהֵ֣י בְנֵֽי עַמּ֑וֹן וְ/לֹֽא הָלְכ֣וּ בִ/דְרָכַ֗/י לַ/עֲשׂ֨וֹת הַ/יָּשָׁ֧ר בְּ/עֵינַ֛/י וְ/חֻקֹּתַ֥/י וּ/מִשְׁפָּטַ֖/י כְּ/דָוִ֥ד אָבִֽי/ו׀־־׃
translation:
  text: because they have forsaken me and bowed down to Ashtoreth, the god of the Sidonians, to Chemosh, the god of Moab, and to Milcom, the god of the Ammonites, and have not walked in my ways by doing what is right in my eyes and keeping my statutes and my judgments, like David his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the goddess of the Sidonians.' The Hebrew phrase reads literally 'the god of the Sidonians' even though Ashtoreth is a female deity.
    reason: lexical_alternative
  - marker: b
    text: Milcom is the reading of the Hebrew text here; some associate this name with Molech.
    reason: alternative_reading
  - marker: c
    text: '''His father'' here refers to David as dynastic forefather, not Solomon''s immediate biological father.'
    reason: cultural_note
  - marker: d
    text: Or 'by doing what is right in my eyes and my statutes and my judgments'.
    reason: previous_rendering
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - inasmuch as
  - for that
  lexicon: HALOT
  rationale: Introduces the reason for the kingdom's division. 'Because' is natural modern English and preserves the causal force without archaic phrasing.
- source_word: עֲזָבוּנִי
  chosen: they have forsaken me
  alternatives:
  - they abandoned me
  - they left me
  lexicon: HALOT
  rationale: The verb עזב in covenantal contexts carries the weight of apostasy/covenant abandonment. 'Forsaken' preserves that gravity better than the flatter 'left.' The perfect is rendered with present relevance in English.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: and bowed down
  alternatives:
  - and worshiped
  - and prostrated themselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration in worship. 'Bowed down' preserves the physical and cultic sense; 'worshiped' is interpretive but possible. The prepositional objects make the idolatrous worship clear.
- source_word: לְעַשְׁתֹּרֶת
  chosen: to Ashtoreth
  alternatives:
  - to Astarte
  lexicon: HALOT
  rationale: A proper name is transliterated per project philosophy. 'Ashtoreth' follows common English biblical convention for this Hebrew form.
- source_word: אֱלֹהֵי צִדֹנִין
  chosen: the god of the Sidonians
  alternatives:
  - the goddess of the Sidonians
  - the god of Sidon
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'god of the Sidonians.' Although Ashtoreth is a female deity, the Hebrew phrase uses אֱלֹהֵי as the standard term in construct; the translation follows the wording of the Hebrew rather than smoothing to 'goddess.' The ethnic plural 'Sidonians' is retained.
- source_word: לִכְמוֹשׁ
  chosen: to Chemosh
  lexicon: HALOT
  rationale: Proper name transliterated.
- source_word: אֱלֹהֵי מוֹאָב
  chosen: the god of Moab
  lexicon: HALOT
  rationale: Straightforward construct chain; singular 'god' matches the Hebrew form.
- source_word: וּלְמִלְכֹּם
  chosen: and to Milcom
  alternatives:
  - and to Molech
  lexicon: HALOT
  rationale: The consonantal text here reads Milcom, the Ammonite deity. 'Molech' is a related/traditional association in some contexts, but this verse's form is best rendered 'Milcom,' with the alternative preserved in a footnote because readers may know the traditional identification.
- source_word: אֱלֹהֵי בְנֵי עַמּוֹן
  chosen: the god of the Ammonites
  alternatives:
  - the god of the sons of Ammon
  - the god of the children of Ammon
  lexicon: HALOT
  rationale: '''Sons/children of Ammon'' is an ethnic designation. ''The Ammonites'' is idiomatic English and preserves the referent.'
- source_word: וְלֹא הָלְכוּ בִדְרָכַי
  chosen: and have not walked in my ways
  alternatives:
  - and did not walk in my ways
  - and have not lived according to my ways
  lexicon: HALOT
  rationale: '''Walked in my ways'' is a standard covenantal idiom in Hebrew and remains understandable in modern English, so it is preserved rather than paraphrased.'
- source_word: לַעֲשׂוֹת הַיָּשָׁר בְּעֵינַי
  chosen: by doing what is right in my eyes
  alternatives:
  - to do what is right in my sight
  - to do the right thing in my eyes
  lexicon: HALOT
  rationale: The infinitive expresses the content/result of walking in God's ways. 'In my eyes' is a literal Hebrew idiom; it is still intelligible in English and preserves the evaluative perspective of God.
- source_word: וְחֻקֹּתַי
  chosen: and my statutes
  alternatives:
  - and my decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a standard rendering for חֻקִּים and helps maintain consistency with legal terminology.'
- source_word: וּמִשְׁפָּטַי
  chosen: and my judgments
  alternatives:
  - and my rules
  - and my ordinances
  lexicon: HALOT
  rationale: The term refers to judicial decisions/ordinances. 'Judgments' is somewhat formal but preserves the legal nuance and distinguishes it from 'statutes.'
- source_word: כְּדָוִד אָבִיו
  chosen: like David his father
  alternatives:
  - as David his father did
  lexicon: HALOT
  rationale: The comparison is to Solomon's ancestor David. 'His father' reflects Hebrew familial usage for forefather/dynastic predecessor, not necessarily immediate parentage in a modern narrow sense.
