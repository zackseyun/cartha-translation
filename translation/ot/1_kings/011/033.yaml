theological_decisions:
- issue: Rendering אֱלֹהֵי with Ashtoreth, a female deity
  chosen_reading: the god of the Sidonians
  alternative_readings:
  - the goddess of the Sidonians
  rationale: The Hebrew text uses אֱלֹהֵי in construct, and the translation follows the wording of the source rather than adjusting for the sex of the deity. This avoids importing an interpretive correction into the main text while preserving the likely sense in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identity of מִלְכֹּם
  chosen_reading: Milcom
  alternative_readings:
  - Molech
  rationale: The MT reads Milcom here. Because the identification with Molech is a known traditional alternative, it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
revisions:
- timestamp: '2026-04-21T17:11:18Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/random_sample/ot/1_kings/011/033.job-18907.json
  category: awkward_english
  tier: 1
  from: by doing what is right in my eyes and my statutes and my judgments
  to: by doing what is right in my eyes and keeping my statutes and my judgments
  rationale: 'The Hebrew uses the single verb `עשׂה` (''to do'') to govern three objects: ''what is right,'' ''my statutes,'' and ''my judgments.'' Applying the English verb ''doing'' to ''statutes'' and ''judgments'' is a literal but unidiomatic Hebraism. Supplying a more natural verb like ''keeping'' or ''observing'' for the legal terms, a common strategy in other major translations (e.g., ESV, NASB), improves the flow and clarity in English without changing the essential meaning.'
