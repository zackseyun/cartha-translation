id: 1KI.11.10
reference: 1 Kings 11:10
source:
  edition: WLC
  text: וְ/צִוָּ֤ה אֵלָי/ו֙ עַל הַ/דָּבָ֣ר הַ/זֶּ֔ה לְ/בִ֨לְתִּי לֶ֔כֶת אַחֲרֵ֖י אֱלֹהִ֣ים
    אֲחֵרִ֑ים וְ/לֹ֣א שָׁמַ֔ר אֵ֥ת אֲשֶׁר צִוָּ֖ה יְהוָֽה־־־׃פ
translation:
  text: and had commanded him about this matter not to go after other gods, but he
    did not keep what the LORD had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''go after other gods,'' a standard covenantal idiom for turning
      to and worshiping other deities.'
    reason: cultural_note
lexical_decisions:
- source_word: וְצִוָּה
  chosen: and had commanded
  alternatives:
  - and commanded
  lexicon: HALOT
  rationale: The waw + perfect here is best rendered in English as a prior action
    relative to the surrounding narrative context ('had commanded'), smoothing the
    sequence while preserving the verbal force of צוה, 'command.'
- source_word: אֵלָיו
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: English idiom prefers 'commanded him' rather than the more wooden 'commanded
    to him,' while preserving the indirect-object sense.
- source_word: עַל הַדָּבָר הַזֶּה
  chosen: about this matter
  alternatives:
  - concerning this thing
  - about this thing
  lexicon: HALOT
  rationale: דבר in this context refers to the issue just mentioned, not merely a
    spoken 'word.' 'Matter' is natural modern English and fits the contextual sense.
- source_word: לְבִלְתִּי לֶכֶת
  chosen: not to go
  alternatives:
  - so as not to go
  - that he should not go
  lexicon: HALOT
  rationale: The construction expresses prohibition/purpose. 'Not to go' is concise
    and accurate in English after 'commanded him.'
- source_word: אַחֲרֵי אֱלֹהִים אֲחֵרִים
  chosen: after other gods
  alternatives:
  - following other gods
  lexicon: HALOT
  rationale: The idiom 'go after' plus 'other gods' is a standard covenantal expression
    in the Hebrew Bible. Retaining 'after' preserves the biblical idiom without becoming
    unnatural.
- source_word: וְלֹא שָׁמַר
  chosen: but he did not keep
  alternatives:
  - and he did not keep
  - but he did not observe
  lexicon: HALOT
  rationale: 'Although waw can be rendered simply ''and,'' the contrastive sense is
    clear in context: despite the command, Solomon failed to obey. ''Keep'' is a standard
    rendering of שמר in covenant/command contexts.'
- source_word: אֵת אֲשֶׁר צִוָּה יְהוָה
  chosen: what the LORD had commanded
  alternatives:
  - that which the LORD had commanded
  - what the LORD commanded
  lexicon: HALOT
  rationale: This clause refers to the content of the divine command. 'What the LORD
    had commanded' is idiomatic and preserves the prior-action sense. YHWH is rendered
    'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of יְהוָה
    is 'the LORD.'
