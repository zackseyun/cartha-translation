id: 1KI.11.30
reference: 1 Kings 11:30
source:
  edition: WLC
  text: וַ/יִּתְפֹּ֣שׂ אֲחִיָּ֔ה בַּ/שַּׂלְמָ֥ה הַ/חֲדָשָׁ֖ה אֲשֶׁ֣ר עָלָ֑י/ו וַ/יִּ֨קְרָעֶ֔/הָ
    שְׁנֵ֥ים עָשָׂ֖ר קְרָעִֽים׃
translation:
  text: Then Ahijah took hold of the new cloak that was on him and tore it into twelve
    pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which he was wearing.' The Hebrew literally says 'that was on him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפֹּשׂ
  chosen: took hold of
  alternatives:
  - seized
  - grasped
  lexicon: HALOT
  rationale: The verb denotes physically taking hold of something. 'Took hold of'
    is natural modern English and preserves the concrete action without overstating
    violence as 'seized' might.
- source_word: שַׂלְמָה
  chosen: cloak
  alternatives:
  - garment
  - mantle
  lexicon: HALOT
  rationale: The noun refers to an outer garment. 'Cloak' is a clear, idiomatic rendering
    in modern English and fits the narrative action of tearing it into pieces.
- source_word: הַחֲדָשָׁה
  chosen: new
  alternatives:
  - fresh
  - newly made
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'new.' It is retained because the
    detail is narratively significant and should not be omitted.
- source_word: אֲשֶׁר עָלָיו
  chosen: that was on him
  alternatives:
  - which he was wearing
  - that was upon him
  lexicon: HALOT
  rationale: The phrase literally indicates the garment was on him. 'That was on him'
    stays close to the Hebrew while remaining readable; 'which he was wearing' is
    possible but slightly more interpretive.
- source_word: וַיִּקְרָעֶהָ
  chosen: tore it
  alternatives:
  - ripped it
  - tore it apart
  lexicon: HALOT
  rationale: The verb means to tear or rend. 'Tore it' is the most direct and idiomatic
    rendering; the object suffix is represented by 'it.'
- source_word: שְׁנֵים עָשָׂר קְרָעִים
  chosen: into twelve pieces
  alternatives:
  - twelve torn pieces
  - twelve fragments
  lexicon: HALOT
  rationale: The expression literally means 'twelve tears/ripped pieces.' 'Into twelve
    pieces' communicates the result naturally in English while preserving the number
    and the act's symbolic force.
