id: 1KI.11.41
reference: 1 Kings 11:41
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֧י שְׁלֹמֹ֛ה וְ/כָל אֲשֶׁ֥ר עָשָׂ֖ה וְ/חָכְמָת֑/וֹ הֲ/לֽוֹא
    הֵ֣ם כְּתֻבִ֔ים עַל סֵ֖פֶר דִּבְרֵ֥י שְׁלֹמֹֽה־־־׃
translation:
  text: Now the rest of the acts of Solomon, and all that he did, and his wisdom—are
    they not written in the Book of the Acts of Solomon?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Book of the Chronicles of Solomon.' The Hebrew title literally contains
      'the words/matters of Solomon,' an idiom for the record of his acts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material or remainder. 'The rest of' is
    the standard sense; 'Now' smoothly marks the transition in English at the close
    of the reign summary without adding content beyond the discourse function of waw.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the regnal-summary formula דִּבְרֵי
    often refers broadly to the recorded affairs or acts of a king. 'Acts' best matches
    the idiomatic sense in this historiographic context.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  - and everything he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Did' preserves the
    broad Hebrew verb עשה without over-specifying achievement or success.
- source_word: וְחָכְמָתוֹ
  chosen: and his wisdom
  alternatives:
  - and the wisdom he had
  lexicon: HALOT
  rationale: Direct and natural rendering of the noun with pronominal suffix. The
    verse highlights Solomon's wisdom as a notable category alongside his acts.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - surely they are
  lexicon: HALOT
  rationale: This interrogative particle expects an affirmative answer. 'Are they
    not' preserves the rhetorical question form found in the Hebrew.
- source_word: הֵם כְּתֻבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: Passive participial construction meaning 'are written/recorded.' 'Written'
    is the most direct rendering, while still fitting the archival context.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'upon the book/scroll,' but idiomatic English for archival
    citation is 'written in the Book.' 'Book' is acceptable as a conventional rendering
    of סֵפֶר here, though 'scroll' is a possible more concrete alternative.
- source_word: סֵפֶר דִּבְרֵי שְׁלֹמֹה
  chosen: the Book of the Acts of Solomon
  alternatives:
  - the Book of the Matters of Solomon
  - the Book of the Chronicles of Solomon
  lexicon: HALOT
  rationale: This title likely refers to a source document recording Solomon's reign.
    Rendering דִּבְרֵי again as 'acts' maintains consistency with its contextual sense
    earlier in the verse. 'Chronicles' is possible as an idiomatic title, but 'Acts'
    is more transparent to the Hebrew and avoids confusion with the biblical book
    Chronicles.
