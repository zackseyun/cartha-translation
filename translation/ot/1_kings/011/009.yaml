id: 1KI.11.9
reference: 1 Kings 11:9
source:
  edition: WLC
  text: וַ/יִּתְאַנַּ֥ף יְהוָ֖ה בִּ/שְׁלֹמֹ֑ה כִּֽי נָטָ֣ה לְבָב֗/וֹ מֵ/עִ֤ם יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הַ/נִּרְאָ֥ה אֵלָ֖י/ו פַּעֲמָֽיִם־׃
translation:
  text: And Yahweh became angry with Solomon, because his heart had turned away from Yahweh, the God of Israel, who had appeared to him twice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּתְאַנַּף
  chosen: became angry
  alternatives:
  - was angry
  - grew angry
  - was enraged
  lexicon: HALOT
  rationale: The hitpael/waw-consecutive form conveys the onset or expression of anger. 'Became angry' preserves the verbal force naturally in English without overstating it as 'was enraged'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּשְׁלֹמֹה
  chosen: with Solomon
  alternatives:
  - against Solomon
  - at Solomon
  lexicon: HALOT
  rationale: With verbs of anger, the preposition here is idiomatically rendered 'with' or 'against.' 'With Solomon' is natural English and preserves the relational sense of divine displeasure.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the LORD's anger; 'because' is the clearest contemporary rendering.
- source_word: נָטָה לְבָבוֹ
  chosen: his heart had turned away
  alternatives:
  - his heart had inclined away
  - his heart had bent away
  lexicon: HALOT
  rationale: The idiom literally involves the heart 'turning' or 'inclining.' 'Had turned away' communicates covenantal defection clearly in idiomatic English while retaining the heart-language.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - away from
  - from being with
  lexicon: HALOT
  rationale: In context it marks separation from allegiance/relationship with the LORD. The sense of departure is already carried by 'turned away,' so 'from' avoids redundancy.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Standard, transparent rendering of the construct phrase; preserves the covenantal identification of YHWH with Israel.
- source_word: הַנִּרְאָה אֵלָיו
  chosen: who had appeared to him
  alternatives:
  - who appeared to him
  - the one appearing to him
  lexicon: HALOT
  rationale: The participial form with article functions attributively, referring back to 'the LORD, the God of Israel.' English relative clause is the natural equivalent. Pluperfect 'had appeared' fits the prior events referenced.
- source_word: פַּעֲמָיִם
  chosen: twice
  alternatives:
  - two times
  lexicon: HALOT
  rationale: Idiomatic English adverbial rendering of the dual form.
