theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropopathic language of divine anger
  chosen_reading: became angry
  alternative_readings:
  - was angry
  - was enraged
  rationale: The text straightforwardly attributes anger to the LORD in response to Solomon's apostasy. The translation preserves the biblical expression without softening it into mere displeasure or intensifying it beyond the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
