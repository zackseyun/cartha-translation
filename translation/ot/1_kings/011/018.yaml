id: 1KI.11.18
reference: 1 Kings 11:18
source:
  edition: WLC
  text: וַ/יָּקֻ֨מוּ֙ מִ/מִּדְיָ֔ן וַ/יָּבֹ֖אוּ פָּארָ֑ן וַ/יִּקְחוּ֩ אֲנָשִׁ֨ים עִמָּ֜/ם
    מִ/פָּארָ֗ן וַ/יָּבֹ֤אוּ מִצְרַ֨יִם֙ אֶל פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם וַ/יִּתֶּן
    ל֣/וֹ בַ֗יִת וְ/לֶ֨חֶם֙ אָ֣מַר ל֔/וֹ וְ/אֶ֖רֶץ נָ֥תַן לֽ/וֹ־־־׃
translation:
  text: They arose from Midian and came to Paran, and they took men with them from
    Paran, and they came to Egypt, to Pharaoh king of Egypt, who gave him a house
    and assigned him food, and gave him land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and bread he said to him'; the sense is that Pharaoh
      ordered or assigned provisions for him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: they arose
  alternatives:
  - they set out
  - they departed
  lexicon: HALOT
  rationale: The verb קום literally means 'arise/stand up,' but in travel narrative
    it can function idiomatically for setting out. 'They arose' preserves the Hebrew
    movement idiom while remaining understandable in English.
- source_word: מִמִּדְיָן
  chosen: from Midian
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard convention per translation
    philosophy.
- source_word: פָּארָן
  chosen: Paran
  lexicon: HALOT
  rationale: Proper place name, transliterated rather than translated.
- source_word: וַיִּקְחוּ אֲנָשִׁים עִמָּם מִפָּארָן
  chosen: they took men with them from Paran
  alternatives:
  - they took people with them from Paran
  - they gathered men from Paran
  lexicon: HALOT
  rationale: אֲנָשִׁים is the ordinary masculine plural 'men.' In keeping with the
    gender-accurate principle, 'men' is preferred over the more neutral 'people.'
    The phrase likely means they added companions from Paran to their party.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English place name for the proper noun.
- source_word: אֶל פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: to Pharaoh king of Egypt
  alternatives:
  - to Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: This closely follows the Hebrew appositional construction while remaining
    natural English.
- source_word: וַיִּתֶּן לוֹ בַיִת
  chosen: who gave him a house
  alternatives:
  - and he gave him a house
  - who provided him a house
  lexicon: HALOT
  rationale: The subject is Pharaoh from the preceding clause. Rendering with 'who'
    makes the English flow naturally while preserving the referent. 'House' is retained
    rather than expanded to 'household' or 'residence' because the Hebrew noun is
    straightforward.
- source_word: וְלֶחֶם אָמַר לוֹ
  chosen: and assigned him food
  alternatives:
  - and appointed bread for him
  - and ordered bread for him
  lexicon: HALOT
  rationale: Literally, 'and bread he said to him,' an idiom meaning Pharaoh ordered
    or assigned provisions for him. 'Food' communicates לֶחֶם in its broader sense
    of sustenance rather than only literal bread, and 'assigned' captures the administrative
    nuance of אָמַר here.
- source_word: וְאֶרֶץ נָתַן לוֹ
  chosen: and gave him land
  alternatives:
  - and gave him territory
  - and gave him a country
  lexicon: HALOT
  rationale: אֶרֶץ here most naturally refers to land/property granted by Pharaoh,
    not an entire nation. 'Land' is the most natural and sufficiently broad rendering.
