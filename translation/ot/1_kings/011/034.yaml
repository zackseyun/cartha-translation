theological_decisions:
- issue: Status of Solomon during his lifetime
  chosen_reading: God leaves Solomon in place as ruler for life rather than immediately
    stripping the entire kingdom from him.
  alternative_readings:
  - God makes him merely a prince in a reduced sense for life
  rationale: The verse explains the delay and limitation of judgment on Solomon for
    David's sake. Rendering נָשִׂיא as 'ruler' preserves the idea of continued governing
    authority without forcing a technical distinction that the English word 'prince'
    might overread.
- issue: Ground of divine restraint
  chosen_reading: The restraint is for David's sake, specifically because David was
    chosen by God and kept God's commandments and statutes.
  rationale: The syntax ties Yahweh's decision to David my servant, whom I chose,
    who kept my commandments and my statutes. The translation preserves this covenantal
    rationale without importing broader doctrinal claims beyond the verse.
