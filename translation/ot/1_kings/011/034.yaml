id: 1KI.11.34
reference: 1 Kings 11:34
source:
  edition: WLC
  text: וְ/לֹֽא אֶקַּ֥ח אֶת כָּל הַ/מַּמְלָכָ֖ה מִ/יָּד֑/וֹ כִּ֣י נָשִׂ֣יא אֲשִׁתֶ֗/נּוּ
    כֹּ֚ל יְמֵ֣י חַיָּ֔י/ו לְמַ֨עַן דָּוִ֤ד עַבְדִּ/י֙ אֲשֶׁ֣ר בָּחַ֣רְתִּי אֹת֔/וֹ
    אֲשֶׁ֥ר שָׁמַ֖ר מִצְוֺתַ֥/י וְ/חֻקֹּתָֽ/י־־־׀׃
translation:
  text: But I will not take the whole kingdom out of his hand, because I will make
    him ruler all the days of his life, for the sake of David my servant, whom I chose,
    who kept my commandments and my statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prince.' The Hebrew נָשִׂיא can mean 'prince,' 'leader,' or 'ruler.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  chosen: I will take
  alternatives:
  - I will remove
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this context, with 'the whole
    kingdom' and 'from his hand,' 'take' is natural English and preserves the concrete
    royal-transfer imagery.
- source_word: כָּל הַמַּמְלָכָה
  chosen: the whole kingdom
  alternatives:
  - all the kingdom
  - the entire kingdom
  lexicon: HALOT
  rationale: מַמְלָכָה denotes the kingdom/realm. 'The whole kingdom' is idiomatic
    and reflects כָּל with the definite noun.
- source_word: מִיָּדוֹ
  chosen: out of his hand
  alternatives:
  - from his hand
  lexicon: HALOT
  rationale: The idiom 'from/out of his hand' expresses removal from one's power or
    possession. 'Out of his hand' sounds natural in English while preserving the Hebrew
    image.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Yahweh will not remove the whole kingdom.
    'Because' best signals the causal force.
- source_word: נָשִׂיא
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: HALOT
  rationale: נָשִׂיא can mean 'prince,' 'leader,' or 'ruler.' In this royal context,
    'ruler' communicates governing status clearly without implying a lesser hereditary
    title in modern English. 'Prince' is possible but may mislead readers into thinking
    of a king's son rather than a divinely appointed political head.
- source_word: אֲשִׁתֶנּוּ
  chosen: I will make him
  alternatives:
  - I will set him
  - I will appoint him
  lexicon: HALOT
  rationale: From שׂים, 'set/place/make.' With predicate נָשִׂיא, English idiom favors
    'make him ruler,' though 'appoint him ruler' is also possible.
- source_word: כֹּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - for his whole life
  - throughout his life
  lexicon: HALOT
  rationale: This is a standard Hebrew expression. 'All the days of his life' preserves
    the formal cadence and full temporal scope.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: לְמַעַן here expresses motive/consideration grounded in Yahweh's regard
    for David. 'For the sake of' is the most natural covenantal phrasing in English.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, in royal-covenantal contexts
    for David the established and contextually fitting sense is 'my servant.' The
    bonded-status nuance is not foregrounded here as it is in some New Testament δοῦλος
    contexts.
- source_word: בָּחַרְתִּי
  chosen: I chose
  alternatives:
  - I selected
  lexicon: HALOT
  rationale: בחר is the standard verb for divine choosing/election. 'I chose' is direct
    and preserves the theological weight without overtechnical wording.
- source_word: שָׁמַר
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: HALOT
  rationale: With commandments and statutes, שׁמר commonly means 'keep/observe.' 'Kept'
    is the most idiomatic and concise.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מִצְוָה is well rendered 'commandment' in covenantal/legal contexts.
    This preserves the formal register of divine instruction.
- source_word: וְחֻקֹּתַי
  chosen: and my statutes
  alternatives:
  - and my decrees
  lexicon: HALOT
  rationale: חֻקִּים are fixed prescriptions/statutes. 'Statutes' maintains useful
    distinction from 'commandments,' reflecting the Hebrew pair rather than collapsing
    them into one term.
