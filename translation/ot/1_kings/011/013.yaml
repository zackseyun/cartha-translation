id: 1KI.11.13
reference: 1 Kings 11:13
source:
  edition: WLC
  text: רַ֤ק אֶת כָּל הַ/מַּמְלָכָה֙ לֹ֣א אֶקְרָ֔ע שֵׁ֥בֶט אֶחָ֖ד אֶתֵּ֣ן לִ/בְנֶ֑/ךָ
    לְמַ֨עַן֙ דָּוִ֣ד עַבְדִּ֔/י וּ/לְמַ֥עַן יְרוּשָׁלִַ֖ם אֲשֶׁ֥ר בָּחָֽרְתִּי־־׃
translation:
  text: Yet I will not tear away the whole kingdom; I will give one tribe to your
    son, for the sake of David my servant and for the sake of Jerusalem, which I have
    chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only, I will not tear away all the kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Introduces a limitation/qualification to the prior judgment. 'Yet' captures
    the adversative force in smooth modern English better than the more wooden 'only'
    here.
- source_word: כָּל הַמַּמְלָכָה
  chosen: the whole kingdom
  alternatives:
  - all the kingdom
  - the entire kingdom
  lexicon: HALOT
  rationale: Refers to the full royal realm that could be torn away. 'Whole kingdom'
    is idiomatic and preserves the totality expressed by כָּל.
- source_word: אֶקְרָע
  chosen: I will tear away
  alternatives:
  - I will tear
  - I will rend
  lexicon: HALOT
  rationale: The verb קָרַע literally means 'tear/rend.' 'Tear away' makes explicit
    the political removal of the kingdom while retaining the vivid metaphor.
- source_word: שֵׁבֶט אֶחָד
  chosen: one tribe
  alternatives:
  - a single tribe
  - one scepter/tribal portion
  lexicon: HALOT
  rationale: In this context שֵׁבֶט denotes a tribal unit within Israel, not a literal
    rod/scepter. 'One tribe' is the natural political sense in the kingdom-division
    context.
- source_word: אֶתֵּן לִבְנֶךָ
  chosen: I will give to your son
  alternatives:
  - I will grant to your son
  lexicon: HALOT
  rationale: Straightforward future gift/grant language. Retained as 'give' for simplicity
    and fidelity.
- source_word: לְמַעַן דָּוִד עַבְדִּי
  chosen: for the sake of David my servant
  alternatives:
  - because of David my servant
  - on account of David my servant
  lexicon: HALOT
  rationale: לְמַעַן here expresses motive/consideration. 'For the sake of' best conveys
    covenantal regard without overinterpreting causation.
- source_word: וּלְמַעַן יְרוּשָׁלַם
  chosen: and for the sake of Jerusalem
  alternatives:
  - and because of Jerusalem
  lexicon: HALOT
  rationale: Parallel to the previous לְמַעַן phrase; preserving the repetition reflects
    the Hebrew emphasis.
- source_word: אֲשֶׁר בָּחָרְתִּי
  chosen: which I have chosen
  alternatives:
  - that I have chosen
  - which I chose
  lexicon: HALOT
  rationale: The perfect verb presents Jerusalem as the city of God's established
    choice. 'Have chosen' preserves the present relevance of that prior act.
