theological_decisions:
- issue: Reason for preserving one tribe
  chosen_reading: The verse grounds the partial preservation of the kingdom in God's
    regard for David and Jerusalem, without specifying a broader doctrinal mechanism
    beyond covenantal election and divine choice.
  alternative_readings:
  - The preservation is solely because of the Davidic covenant
  - The preservation is primarily for the temple/city rather than David
  rationale: 'The Hebrew gives two parallel reasons: ''for the sake of David my servant''
    and ''for the sake of Jerusalem, which I have chosen.'' The translation preserves
    both without collapsing one into the other or importing a denominational framework.'
  doctrine_reference: Preserve theological tension rather than resolve it.
