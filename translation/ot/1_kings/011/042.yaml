id: 1KI.11.42
reference: 1 Kings 11:42
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֗ים אֲשֶׁר֩ מָלַ֨ךְ שְׁלֹמֹ֤ה בִ/ירוּשָׁלִַ֨ם֙ עַל כָּל יִשְׂרָאֵ֔ל
    אַרְבָּעִ֖ים שָׁנָֽה־־׃
translation:
  text: And the days that Solomon reigned in Jerusalem over all Israel were forty
    years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/הַ/יָּמִים
  chosen: And the days
  alternatives:
  - Now the days
  - The days
  lexicon: HALOT
  rationale: The conjunction וְ is retained as 'And' to preserve the narrative linkage,
    and הימים is rendered literally as 'the days,' a common Hebrew idiom for the duration
    of a period of life or reign.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - during which
  lexicon: HALOT
  rationale: A simple relative 'that' gives natural modern English while preserving
    the clause structure.
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - ruled as king
  lexicon: HALOT
  rationale: מלך in the Qal here denotes exercising kingship; 'reigned' is the standard
    concise English equivalent in regnal summaries.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בִ/ירוּשָׁלִַם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב is locative here; 'in Jerusalem' is the natural modern
    English rendering.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  - over all the Israelites
  lexicon: HALOT
  rationale: עַל marks royal rule over a people; 'over all Israel' preserves both
    the political sense and the collective national reference.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward numeral-plus-noun expression for the length of Solomon's
    reign.
