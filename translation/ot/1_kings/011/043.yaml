id: 1KI.11.43
reference: 1 Kings 11:43
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב שְׁלֹמֹה֙ עִם אֲבֹתָ֔י/ו וַ/יִּ֨קָּבֵ֔ר בְּ/עִ֖יר דָּוִ֣ד אָבִ֑י/ו
    וַ/יִּמְלֹ֛ךְ רְחַבְעָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־׃ס
translation:
  text: And Solomon slept with his fathers and was buried in the city of David his
    father, and Rehoboam his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a customary expression for death and joining
      one's ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In the idiom שׁכב עם־אבות, the verb literally means 'slept/lay down'
    and functions as a conventional euphemism for death. 'Slept' preserves the Hebrew
    idiom in readable English better than the more wooden 'lay down,' while avoiding
    over-paraphrasing to simply 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard royal obituary formula. 'With his fathers' preserves
    the idiomatic and genealogical force of the Hebrew better than the more interpretive
    'with his ancestors.'
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was interred
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here; 'was buried' is the
    natural and accurate English rendering.
- source_word: בְּעִיר דָּוִד אָבִיו
  chosen: in the city of David his father
  alternatives:
  - in David's city, his father’s city
  lexicon: HALOT
  rationale: The phrase identifies the burial location as the Davidic royal city and
    appositionally identifies David as Solomon's father. Retaining 'his father' mirrors
    the Hebrew and preserves the dynastic emphasis.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: In succession notices, 'reigned' is the standard concise rendering and
    fits the royal formula. 'Became king' would emphasize accession rather than the
    formulaic notice of succession.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition here marks succession. 'In his place' is idiomatic English
    and preserves the sense of replacement more precisely than the temporally weaker
    'after him.'
