id: 1KI.11.22
reference: 1 Kings 11:22
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר ל֣/וֹ פַרְעֹ֗ה כִּ֠י מָה אַתָּ֤ה חָסֵר֙ עִמִּ֔/י וְ/הִנְּ/ךָ֥
    מְבַקֵּ֖שׁ לָ/לֶ֣כֶת אֶל אַרְצֶ֑/ךָ וַ/יֹּ֣אמֶר לֹ֔א כִּ֥י שַׁלֵּ֖חַ תְּשַׁלְּחֵֽ/נִי־־׀׃
translation:
  text: Then Pharaoh said to him, “But what do you lack with me, that now you are
    seeking to go to your own land?” And he said, “Nothing—but please let me go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''send, you must send me away''—an emphatic construction using
      an infinitive absolute with a finite verb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - For
  - Indeed
  - Why
  lexicon: HALOT
  rationale: Here כִּי introduces Pharaoh's question with a mildly adversative/explanatory
    force after Hadad's request to depart. 'But' fits natural English dialogue and
    the context better than a wooden 'for.'
- source_word: מָה אַתָּה חָסֵר עִמִּי
  chosen: what do you lack with me
  alternatives:
  - what have you lacked with me
  - what are you missing from me
  lexicon: HALOT
  rationale: חָסֵר denotes lacking or being in need. The phrase asks what deficiency
    Hadad has experienced while with Pharaoh. 'What do you lack with me' preserves
    the relational sense of עִמִּי and the directness of the Hebrew.
- source_word: וְהִנְּךָ
  chosen: that now you are
  alternatives:
  - and behold, you are
  - when look, you are
  lexicon: HALOT
  rationale: הִנֵּה often marks immediacy or draws attention. In idiomatic English
    within a question, 'that now you are' conveys the discourse function without overly
    literal 'behold.'
- source_word: מְבַקֵּשׁ
  chosen: seeking
  alternatives:
  - wanting
  - asking
  lexicon: HALOT
  rationale: בקש commonly means seek, desire, or request. 'Seeking' preserves the
    verbal nuance and works naturally with the infinitive 'to go.'
- source_word: לָלֶכֶת אֶל אַרְצֶךָ
  chosen: to go to your own land
  alternatives:
  - to go to your land
  - to return to your land
  lexicon: HALOT
  rationale: The Hebrew says 'to go to your land'; adding 'own' brings out the possessive
    suffix naturally in English. 'Return' is interpretive and not explicit in the
    verb הלך here.
- source_word: לֹא
  chosen: Nothing
  alternatives:
  - 'No'
  - Not so
  lexicon: HALOT
  rationale: 'In reply to Pharaoh''s question, bare לֹא functions elliptically: Hadad
    lacks nothing. ''Nothing'' makes the implied object explicit in clear English.'
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  - except that
  lexicon: HALOT
  rationale: In Hadad's reply, כִּי introduces the real point of his answer in contrast
    to 'Nothing.' 'But' best captures the turn in English.
- source_word: שַׁלֵּחַ תְּשַׁלְּחֵנִי
  chosen: please let me go
  alternatives:
  - surely send me away
  - you must send me away
  - send me away, I pray
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the request ('surely
    send/send me away'). In idiomatic English dialogue, 'please let me go' conveys
    the emphatic plea without sounding wooden. The core sense is permission/release
    to depart.
