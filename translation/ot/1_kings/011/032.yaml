theological_decisions:
- issue: Numerical tension between 'one tribe' here and passages/counts that imply
    Judah and Benjamin together under Rehoboam
  chosen_reading: 'Translate the Hebrew as written: ''one tribe'''
  alternative_readings:
  - Interpret 'one tribe' as a synecdoche with Benjamin subsumed into Judah/Jerusalem
  - Harmonize in translation as 'one kingdom' or 'two tribes'
  rationale: The Hebrew text explicitly says 'one tribe,' and the translation should
    preserve that wording rather than harmonize away the tension. Historical/interpretive
    explanations belong in notes, not the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
