id: 1KI.11.37
reference: 1 Kings 11:37
source:
  edition: WLC
  text: וְ/אֹתְ/ךָ֣ אֶקַּ֔ח וּ/מָ֣לַכְתָּ֔ בְּ/כֹ֥ל אֲשֶׁר תְּאַוֶּ֖ה נַפְשֶׁ֑/ךָ
    וְ/הָיִ֥יתָ מֶּ֖לֶךְ עַל יִשְׂרָאֵֽל־־׃
translation:
  text: And I will take you, and you shall reign over all that your soul desires,
    and you shall be king over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "all that you desire"; literally, "all that your soul desires."'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  chosen: I will take
  alternatives:
  - I will choose
  - I will seize
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this context of divine appointment, 'take'
    preserves the concrete verbal force without over-interpreting it as merely 'choose.'
- source_word: וּמָלַכְתָּ
  chosen: you shall reign
  alternatives:
  - you will rule as king
  - you shall become king
  lexicon: HALOT
  rationale: The verb מלך denotes exercising kingship/reigning, not merely accession.
    'You shall reign' best reflects the verbal action.
- source_word: בְּכֹל אֲשֶׁר
  chosen: over all that
  alternatives:
  - over everything that
  - according to all that
  lexicon: HALOT
  rationale: With מלך, the preposition ב here is idiomatic for the sphere/extent of
    rule. 'Over all that' gives natural English while preserving the scope.
- source_word: תְּאַוֶּה נַפְשֶׁךָ
  chosen: your soul desires
  alternatives:
  - you desire
  - your heart desires
  - your appetite longs for
  lexicon: HALOT
  rationale: The Hebrew literally says 'your soul desires.' Retaining 'soul' preserves
    the source imagery and avoids flattening the anthropological expression into a
    mere paraphrase, while remaining understandable in English.
- source_word: וְהָיִיתָ מֶּלֶךְ
  chosen: you shall be king
  alternatives:
  - you will become king
  lexicon: HALOT
  rationale: היה + noun here expresses resultant status. 'You shall be king' is idiomatic
    and keeps the formal declaration of office.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: עַל with kingship is standardly rendered 'over' to indicate authority
    over the people/nation.
