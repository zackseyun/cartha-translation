theological_decisions:
- issue: Anthropological expression נֶפֶשׁ
  chosen_reading: Rendered literally as 'soul' rather than interpretively as 'heart'
    or simply 'you.'
  alternative_readings:
  - your heart desires
  - you desire
  rationale: The verse does not make a technical theological claim about the soul,
    but the Hebrew idiom uses נֶפֶשׁ. Preserving 'soul' maintains lexical transparency
    and avoids unnecessary interpretive smoothing.
  doctrine_reference: 'Translation philosophy #1 and #5'
