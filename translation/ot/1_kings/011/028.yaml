id: 1KI.11.28
reference: 1 Kings 11:28
source:
  edition: WLC
  text: וְ/הָ/אִ֥ישׁ יָרָבְעָ֖ם גִּבּ֣וֹר חָ֑יִל וַ/יַּ֨רְא שְׁלֹמֹ֜ה אֶת הַ/נַּ֗עַר
    כִּֽי עֹשֵׂ֤ה מְלָאכָה֙ ה֔וּא וַ/יַּפְקֵ֣ד אֹת֔/וֹ לְ/כָל סֵ֖בֶל בֵּ֥ית יוֹסֵֽף־־־׃ס
translation:
  text: Now the man Jeroboam was a mighty man of valor, and Solomon saw that the young
    man was industrious, so he appointed him over all the forced labor of the house
    of Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a capable man' or 'a valiant man.' The Hebrew expression can denote
      strength, valor, or notable ability.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Joseph'' refers to the tribes descended from Joseph, especially
      Ephraim and Manasseh.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָאִישׁ
  chosen: Now the man
  alternatives:
  - And the man
  - Now this man
  lexicon: HALOT
  rationale: הָאִישׁ is the common noun 'the man.' With prefixed וְ it advances the
    narrative. 'Now the man' gives natural English discourse flow while preserving
    the individual reference.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: גִּבּוֹר חָיִל
  chosen: a mighty man of valor
  alternatives:
  - a capable man
  - a mighty warrior
  - a valiant man
  lexicon: HALOT
  rationale: The collocation often denotes strength, capability, or valor. Here Jeroboam
    is being introduced as notably able, not necessarily in a battlefield scene. 'Mighty
    man of valor' preserves the Hebrew idiom and its breadth better than flattening
    it to merely 'capable man.'
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - noticed
  - observed
  lexicon: HALOT
  rationale: The verb ראה is straightforwardly 'see.' In context it implies noticing
    Jeroboam's quality, but 'saw' keeps the source wording and lets the following
    clause explain what Solomon perceived.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the youth
  - the servant
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, young man, or servant depending on context.
    Here Jeroboam is an adult capable of administrative responsibility, so 'young
    man' fits better than 'boy'; 'servant' is possible but less likely as the focus
    is age/status rather than role.
- source_word: כִּי עֹשֵׂה מְלָאכָה הוּא
  chosen: that the young man was industrious
  alternatives:
  - that he did work
  - that he was doing the work
  - that he was a worker
  lexicon: HALOT
  rationale: Literally, 'that he was doing work / was one doing work.' In idiomatic
    English this points to diligence or competence. 'Was industrious' captures the
    evaluative sense that explains Solomon's appointment, while remaining close to
    the Hebrew idea of active work.
- source_word: וַיַּפְקֵד אֹתוֹ
  chosen: he appointed him
  alternatives:
  - he put him in charge
  - he assigned him
  lexicon: HALOT
  rationale: פקד in the Hiphil commonly means appoint, assign, or set over. 'Appointed
    him' is concise and fits the administrative context.
- source_word: לְכָל סֵבֶל
  chosen: over all the forced labor
  alternatives:
  - over all the labor burden
  - over all the labor gang
  - over all the burden-bearing labor
  lexicon: HALOT
  rationale: סֵבֶל refers to burden-bearing labor, especially corvée or forced labor
    in royal projects. 'Forced labor' best communicates the socio-political sense
    in clear modern English.
- source_word: בֵּית יוֹסֵף
  chosen: of the house of Joseph
  alternatives:
  - of the house of Ephraim and Manasseh
  - of Joseph's house
  lexicon: HALOT
  rationale: A tribal designation for the Joseph tribes, especially Ephraim and Manasseh.
    'House of Joseph' preserves the Hebrew expression; its referent can be clarified
    in a footnote.
