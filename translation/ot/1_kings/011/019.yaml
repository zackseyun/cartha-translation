id: 1KI.11.19
reference: 1 Kings 11:19
source:
  edition: WLC
  text: וַ/יִּמְצָא֙ הֲדַ֥ד חֵ֛ן בְּ/עֵינֵ֥י פַרְעֹ֖ה מְאֹ֑ד וַ/יִּתֶּן ל֤/וֹ אִשָּׁה֙
    אֶת אֲח֣וֹת אִשְׁתּ֔/וֹ אֲח֖וֹת תַּחְפְּנֵ֥יס הַ/גְּבִירָֽה־־׃
translation:
  text: Hadad found great favor in Pharaoh’s eyes, and he gave him as a wife the sister
    of his own wife, the sister of Tahpenes the queen mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'the sister of his wife' could be understood as referring
      to Hadad’s wife rather than Pharaoh’s wife.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the great lady'; the title likely refers to the queen mother or
      chief royal lady.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא ... חֵן בְּעֵינֵי
  chosen: found great favor in ... eyes
  alternatives:
  - found grace in the sight of
  - pleased
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'found favor in the eyes of.' 'Found
    great favor in Pharaoh’s eyes' preserves the idiom while remaining natural English.
    'Great' reflects מְאֹד intensifying the favor.
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration for the Egyptian royal title/name in
    biblical narrative.
- source_word: מְאֹד
  chosen: great
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Used adverbially to intensify the idiom. 'Great favor' is more idiomatic
    in English than 'favor very much' while preserving the force.
- source_word: וַיִּתֶּן לוֹ אִשָּׁה
  chosen: he gave him as a wife
  alternatives:
  - he gave him a wife
  - he gave him in marriage
  lexicon: HALOT
  rationale: The construction indicates Pharaoh gave a woman to Hadad in marriage.
    'As a wife' makes the marital sense explicit without over-paraphrasing.
- source_word: אֶת אֲחוֹת אִשְׁתּוֹ
  chosen: the sister of his own wife
  alternatives:
  - his wife’s sister
  - the sister of his wife
  lexicon: HALOT
  rationale: 'The suffix on ''his wife'' refers to Pharaoh, not Hadad, in context:
    Pharaoh gave Hadad the sister of Pharaoh’s wife. ''His own wife'' helps avoid
    ambiguity in English.'
- source_word: אֲחוֹת תַּחְפְּנֵיס
  chosen: the sister of Tahpenes
  lexicon: HALOT
  rationale: Appositional clarification identifying Pharaoh’s wife as Tahpenes, or
    at minimum linking the woman given to Hadad with Tahpenes.
- source_word: תַּחְפְּנֵיס
  chosen: Tahpenes
  alternatives:
  - Tahpenis
  lexicon: HALOT
  rationale: Standard transliteration of the personal name from Hebrew.
- source_word: הַגְּבִירָה
  chosen: the queen mother
  alternatives:
  - the great lady
  - the mistress
  lexicon: HALOT
  rationale: גבירה is a title for a high-ranking royal woman, often the queen mother
    or chief lady. In this court setting, 'queen mother' is the clearest idiomatic
    rendering and matches common usage for the title.
