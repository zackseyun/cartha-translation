theological_decisions:
- issue: Referent of the pronoun in 'the sister of his wife'
  chosen_reading: The pronoun refers to Pharaoh, so Pharaoh gave Hadad the sister
    of Pharaoh’s wife.
  alternative_readings:
  - The pronoun refers to Hadad, so Pharaoh gave Hadad the sister of Hadad’s wife.
  rationale: The narrative context and the following apposition 'the sister of Tahpenes'
    favor Pharaoh as the referent. The verse is introducing Hadad’s Egyptian marriage
    connection, not a second relation to an existing wife of Hadad.
- issue: Meaning of הַגְּבִירָה
  chosen_reading: Rendered as 'the queen mother.'
  alternative_readings:
  - Rendered as 'the chief lady'
  - Rendered as 'the queen'
  rationale: The title denotes a prominent royal woman. 'Queen mother' best captures
    the institutional role in many biblical contexts and is a widely recognized English
    equivalent, though the exact Egyptian court office may not be identical.
