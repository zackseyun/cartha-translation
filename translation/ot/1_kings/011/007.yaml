id: 1KI.11.7
reference: 1 Kings 11:7
source:
  edition: WLC
  text: אָז֩ יִבְנֶ֨ה שְׁלֹמֹ֜ה בָּמָ֗ה לִ/כְמוֹשׁ֙ שִׁקֻּ֣ץ מוֹאָ֔ב בָּ/הָ֕ר אֲשֶׁ֖ר
    עַל פְּנֵ֣י יְרוּשָׁלִָ֑ם וּ/לְ/מֹ֕לֶךְ שִׁקֻּ֖ץ בְּנֵ֥י עַמּֽוֹן־׃
translation:
  text: Then Solomon built a high place for Chemosh, the abomination of Moab, on the
    mountain that is opposite Jerusalem, and for Molech, the abomination of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Milcom' for 'Molech'; the Hebrew form here is traditionally read as
      'Molech,' but some connect it with the Ammonite deity Milcom.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the next event in the narrative sequence; 'Then'
    is natural modern English and preserves the flow.
- source_word: יִבְנֶה
  chosen: built
  alternatives:
  - would build
  - began to build
  lexicon: HALOT
  rationale: Though morphologically imperfect, in narrative sequence after אָז it
    functions as a past narrative verb; English simple past best conveys the sense.
- source_word: בָּמָה
  chosen: high place
  alternatives:
  - shrine
  - cultic height
  lexicon: HALOT
  rationale: Standard rendering for a cult site, often elevated and associated with
    illicit worship. 'High place' preserves the technical religious sense without
    over-paraphrase.
- source_word: לִכְמוֹשׁ
  chosen: for Chemosh
  lexicon: HALOT
  rationale: The preposition marks dedication of the cult site to the named deity;
    Chemosh is transliterated as a proper name.
- source_word: שִׁקֻּץ מוֹאָב
  chosen: the abomination of Moab
  alternatives:
  - the detestable god of Moab
  - the disgusting thing of Moab
  lexicon: HALOT
  rationale: שִׁקֻּץ is a strong pejorative term for an idol or detestable cult object/deity.
    'Abomination' preserves the moral-religious force and traditional recognizability
    while remaining accurate.
- source_word: בָּהָר אֲשֶׁר עַל פְּנֵי יְרוּשָׁלִָם
  chosen: on the mountain that is opposite Jerusalem
  alternatives:
  - on the hill that faces Jerusalem
  - on the mountain east of Jerusalem
  lexicon: HALOT
  rationale: הַר is 'mountain/hill'; 'mountain' is retained as the more direct gloss.
    עַל־פְּנֵי in this spatial context means 'in front of/opposite/facing.' 'Opposite
    Jerusalem' is accurate without importing a more specific geographical identification
    into the main text.
- source_word: וּלְמֹלֶךְ
  chosen: and for Molech
  alternatives:
  - and for Milcom
  lexicon: HALOT
  rationale: The consonantal text points to Molech/Molek, and the verse parallels
    Chemosh as another deity receiving a high place. The alternative 'Milcom' is text-traditionally
    discussed and should be preserved in a footnote rather than adopted in the main
    text.
- source_word: שִׁקֻּץ בְּנֵי עַמּוֹן
  chosen: the abomination of the Ammonites
  alternatives:
  - the detestable god of the sons of Ammon
  - the abomination of the sons of Ammon
  lexicon: HALOT
  rationale: Construct phrase parallel to 'the abomination of Moab.' 'Ammonites' is
    idiomatic English for בְּנֵי עַמּוֹן and preserves the ethnic reference.
