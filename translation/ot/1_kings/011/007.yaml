theological_decisions:
- issue: Pejorative designation of foreign deities
  chosen_reading: Render שִׁקֻּץ as 'abomination' in both occurrences
  alternative_readings:
  - detestable thing
  - detestable god
  rationale: The Hebrew text itself uses a condemnatory term for these deities/cults.
    Translating it directly preserves the narrator's theological evaluation without
    softening or expanding it.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s theological tension and force.'
- issue: Identity of מֹלֶךְ
  chosen_reading: Molech in the main text
  alternative_readings:
  - Milcom
  rationale: The MT vocalization supports 'Molech,' while some interpreters connect
    the name with Milcom/מלכם in related passages. Because the Hebrew here presents
    מֹלֶךְ and the issue is debated, the main text follows the source form and the
    alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; document contested alternatives in footnotes.'
