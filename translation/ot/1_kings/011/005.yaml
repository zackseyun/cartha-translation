id: 1KI.11.5
reference: 1 Kings 11:5
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ שְׁלֹמֹ֔ה אַחֲרֵ֣י עַשְׁתֹּ֔רֶת אֱלֹהֵ֖י צִדֹנִ֑ים וְ/אַחֲרֵ֣י
    מִלְכֹּ֔ם שִׁקֻּ֖ץ עַמֹּנִֽים׃
translation:
  text: Solomon went after Ashtoreth, the goddess of the Sidonians, and after Milcom,
    the abomination of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Astarte,' a more widely recognized form of the deity's name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the god(s) of the Sidonians'; with the named female deity Ashtoreth,
      the sense is 'the goddess of the Sidonians.'
    reason: lexical_alternative
  - marker: c
    text: Some associate Milcom with Molech, but the Hebrew text here reads 'Milcom.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went after
  alternatives:
  - followed
  lexicon: HALOT
  rationale: The idiom הלך אחרי in this context means more than physical movement;
    it denotes following in allegiance or worship. 'Went after' preserves the Hebrew
    imagery while remaining natural English.
- source_word: עַשְׁתֹּרֶת
  chosen: Ashtoreth
  alternatives:
  - Astarte
  lexicon: HALOT
  rationale: A proper name is transliterated per project philosophy. 'Ashtoreth' follows
    the Hebrew form in this verse; 'Astarte' reflects a more widely recognized ancient
    Near Eastern equivalent and is worth preserving as an alternative.
- source_word: אֱלֹהֵי צִדֹנִים
  chosen: the goddess of the Sidonians
  alternatives:
  - the god of the Sidonians
  - the gods of the Sidonians
  lexicon: HALOT
  rationale: Although אֱלֹהֵי is morphologically plural construct ('god/gods of'),
    with a singular named deity Ashtoreth it functions appositionally to identify
    her as the deity worshiped by the Sidonians. Because Ashtoreth is female, 'goddess'
    communicates the referent clearly in English. More literal options are possible
    but less clear.
- source_word: מִלְכֹּם
  chosen: Milcom
  alternatives:
  - Molech
  lexicon: HALOT
  rationale: The consonantal text here reads Milcom, and names are transliterated.
    'Molech' is a related or possibly overlapping figure in some contexts, but this
    verse specifically has Milcom.
- source_word: שִׁקֻּץ עַמֹּנִים
  chosen: the abomination of the Ammonites
  alternatives:
  - the detestable thing of the Ammonites
  - the disgusting idol of the Ammonites
  lexicon: HALOT
  rationale: שִׁקֻּץ is a strong pejorative term used for something ritually or morally
    detestable, often an idol. 'Abomination' is the established and suitably weighty
    English equivalent here, and the construct phrase identifies Milcom as the object
    detested/abhorred in Israelite evaluation, namely the Ammonites' deity.
