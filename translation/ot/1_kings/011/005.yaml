theological_decisions:
- issue: Whether to make explicit that Solomon's action was idolatrous worship rather
    than mere interest
  chosen_reading: Retain the Hebrew idiom 'went after' without expanding to 'worshiped'
    in the main text.
  alternative_readings:
  - Solomon followed
  - Solomon worshiped
  rationale: The context clearly concerns apostasy, but the verse itself uses the
    idiom הלך אחרי. Preserving that idiom avoids importing more than the text states
    while still conveying allegiance. The surrounding narrative supplies the idolatrous
    force.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
