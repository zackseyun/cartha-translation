id: 1KI.11.2
reference: 1 Kings 11:2
source:
  edition: WLC
  text: מִן הַ/גּוֹיִ֗ם אֲשֶׁ֣ר אָֽמַר יְהוָה֩ אֶל בְּנֵ֨י יִשְׂרָאֵ֜ל לֹֽא תָבֹ֣אוּ בָ/הֶ֗ם וְ/הֵם֙ לֹא יָבֹ֣אוּ בָ/כֶ֔ם אָכֵן֙ יַטּ֣וּ אֶת לְבַבְ/כֶ֔ם אַחֲרֵ֖י אֱלֹהֵי/הֶ֑ם בָּ/הֶ֛ם דָּבַ֥ק שְׁלֹמֹ֖ה לְ/אַהֲבָֽה־־־־־־׃
translation:
  text: from the nations concerning which Yahweh had said to the sons of Israel, “You shall not go in to them, and they shall not come in to you; surely they will turn your heart after their gods”—to these Solomon clung in love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly in context, “You shall not intermarry with them, and they with you.” The Hebrew says, more literally, “You shall not go in among them, and they shall not come in among you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַגּוֹיִם
  chosen: from the nations
  alternatives:
  - from the peoples
  - from among the nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' or 'peoples.' 'Nations' fits standard biblical usage here, referring to foreign peoples from whom Solomon took wives.
- source_word: אֲשֶׁר אָמַר יְהוָה
  chosen: about which the LORD had said
  alternatives:
  - concerning which the LORD said
  lexicon: HALOT
  rationale: אֲשֶׁר introduces the relative clause; 'about which' is natural English with the following divine speech. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew idiom and its masculine plural form. 'The Israelites' would be smoother but less formally aligned.
- source_word: לֹא תָבֹאוּ בָהֶם
  chosen: You shall not go in among them
  alternatives:
  - You shall not enter among them
  - You shall not intermarry with them
  lexicon: HALOT
  rationale: The verb בוא with ב can literally mean 'go/come in among.' In context it refers to entering into marital relations or alliances, but the Hebrew states it more generally. I preserve the literal expression in the main text rather than importing 'intermarry' directly.
- source_word: וְהֵם לֹא יָבֹאוּ בָכֶם
  chosen: and they shall not come in among you
  alternatives:
  - and they shall not enter among you
  - and they shall not intermarry with you
  lexicon: HALOT
  rationale: Parallel to the previous clause; keeping the same idiom preserves the rhetorical symmetry of the Hebrew.
- source_word: אָכֵן
  chosen: surely
  alternatives:
  - indeed
  - certainly
  lexicon: HALOT
  rationale: אָכֵן marks emphatic certainty, introducing the reason for the prohibition.
- source_word: יַטּוּ אֶת לְבַבְכֶם
  chosen: they will turn your heart
  alternatives:
  - they will incline your heart
  - they will turn away your heart
  lexicon: HALOT
  rationale: The Hiphil of נטה here means to turn or incline. 'Turn your heart' is idiomatic and preserves the metaphor.
- source_word: אַחֲרֵי אֱלֹהֵיהֶם
  chosen: after their gods
  alternatives:
  - to follow their gods
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after.' Retaining 'after their gods' preserves the Hebrew idiom of following in devotion.
- source_word: בָּהֶם
  chosen: to these
  alternatives:
  - to them
  - to those women
  lexicon: HALOT
  rationale: The preposition plus pronoun resumes the previously mentioned nations, but in context refers to the women from those nations. 'To these' preserves the resumptive force without over-specifying beyond the text.
- source_word: דָּבַק
  chosen: clung
  alternatives:
  - held fast
  - was attached
  lexicon: HALOT
  rationale: דבק often conveys strong attachment or cleaving. 'Clung' is vivid, natural, and preserves the intensity.
- source_word: לְאַהֲבָה
  chosen: in love
  alternatives:
  - to love
  - with love
  lexicon: HALOT
  rationale: The infinitive/noun-like form with ל expresses the manner or sphere of Solomon's attachment. 'In love' is concise and idiomatic, while preserving the lexical connection to love rather than lust or mere desire.
