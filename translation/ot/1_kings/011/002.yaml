theological_decisions:
- issue: Whether to make the prohibition explicitly about intermarriage in the main text
  chosen_reading: Retain the more literal 'go in among / come in among' wording
  alternative_readings:
  - Render explicitly as 'do not intermarry with them, and they with you'
  rationale: The context clearly concerns marriage, but the Hebrew wording is more general and idiomatic. Following optimal equivalence and original-language primacy, the main text preserves the source expression while allowing the contextual sense to remain evident. This avoids adding specificity not directly stated in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: How to render בְּנֵי יִשְׂרָאֵל with respect to gender
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural and refers to the covenant people representatively. Per the doctrine's gender-accurate principle, the translation keeps the masculine form rather than neutralizing it, while still being understandable in context.
  doctrine_reference: Translation philosophy §4
