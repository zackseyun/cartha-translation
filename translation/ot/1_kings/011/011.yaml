theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpreting the idiom הָיְתָה זֹּאת עִמָּךְ
  chosen_reading: a characterization of Solomon's conduct ('this has been your practice')
  alternative_readings:
  - a more literal but less clear 'this has been with you'
  - a state-oriented reading 'this has become your condition'
  rationale: The immediate context is Solomon's turning after other gods. The idiom points to an abiding state or pattern that grounds judgment. The chosen rendering preserves that force in intelligible English while avoiding speculative expansion.
