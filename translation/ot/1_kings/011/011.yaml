id: 1KI.11.11
reference: 1 Kings 11:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה לִ/שְׁלֹמֹ֗ה יַ֚עַן אֲשֶׁ֣ר הָֽיְתָה זֹּ֣את עִמָּ֔/ךְ וְ/לֹ֤א שָׁמַ֨רְתָּ֙ בְּרִיתִ֣/י וְ/חֻקֹּתַ֔/י אֲשֶׁ֥ר צִוִּ֖יתִי עָלֶ֑י/ךָ קָרֹ֨עַ אֶקְרַ֤ע אֶת הַ/מַּמְלָכָה֙ מֵֽ/עָלֶ֔י/ךָ וּ/נְתַתִּ֖י/הָ לְ/עַבְדֶּֽ/ךָ־־׃
translation:
  text: So Yahweh said to Solomon, “Because this has been with you, and you have not kept my covenant and my statutes that I commanded you, I will surely tear the kingdom away from you and give it to your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Because this has been with you.” The Hebrew expression is idiomatic and refers to Solomon’s settled conduct or condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The pair introduces the reason for the judgment. 'Because' is natural modern English and preserves the causal force without unnecessary formality.
- source_word: הָיְתָה זֹּאת עִמָּךְ
  chosen: this has been your practice
  alternatives:
  - this has been with you
  - this has happened with you
  - this is in you
  lexicon: HALOT
  rationale: The Hebrew idiom is compressed and somewhat elliptical. In context, referring back to Solomon's apostasy, it indicates that this state/behavior has characterized him. 'This has been your practice' makes the idiomatic sense explicit in readable English without over-paraphrasing.
- source_word: שָׁמַרְתָּ
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: HALOT
  rationale: '''Kept'' is the standard covenantal rendering in English Bible style and fits both covenant and statutes in this context.'
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Straightforward covenant terminology; 'covenant' preserves the theological and legal weight of בְּרִית.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional and sufficiently transparent rendering for חֻקִּים in legal/covenantal contexts. Alternatives are possible, but ''statutes'' best preserves continuity with biblical legal diction.'
- source_word: צִוִּיתִי עָלֶיךָ
  chosen: I commanded you
  alternatives:
  - I commanded for you
  - I charged you
  lexicon: HALOT
  rationale: 'The preposition with צוה can be rendered idiomatically in English simply as a direct object: ''I commanded you.'' This avoids wooden phrasing while preserving the force of divine command.'
- source_word: קָרֹעַ אֶקְרַע
  chosen: I will surely tear
  alternatives:
  - I will certainly tear
  - I will tear away
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will surely tear' captures the emphatic certainty. The following object and prepositional phrase complete the sense of removal.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal kingdom
  lexicon: HALOT
  rationale: In context this refers to Solomon's realm/royal dominion. 'The kingdom' is the most natural and established rendering.
- source_word: מֵעָלֶיךָ
  chosen: away from you
  alternatives:
  - from upon you
  - off you
  lexicon: HALOT
  rationale: The phrase expresses removal from Solomon's possession/rule. 'Away from you' is idiomatic and clear.
- source_word: וּנְתַתִּיהָ
  chosen: and give it
  alternatives:
  - and I will give it
  lexicon: HALOT
  rationale: English can omit the repeated subject pronoun naturally after the prior clause. The future sense remains clear from the verbal sequence.
- source_word: לְעַבְדֶּךָ
  chosen: to your servant
  alternatives:
  - to your slave
  - to your official
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here it refers to a royal subordinate (fulfilled in Jeroboam). 'Servant' best fits the courtly-political context without importing the stronger bonded nuance unnecessarily.
