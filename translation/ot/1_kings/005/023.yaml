id: 1KI.5.23
reference: 1 Kings 5:23
source:
  edition: WLC
  text: עֲ֠בָדַ/י יֹרִ֨דוּ מִן הַ/לְּבָנ֜וֹן יָ֗מָּ/ה וַ֠/אֲנִי אֲשִׂימֵ֨/ם דֹּבְר֤וֹת
    בַּ/יָּם֙ עַֽד הַ/מָּק֞וֹם אֲשֶׁר תִּשְׁלַ֥ח אֵלַ֛/י וְ/נִפַּצְתִּ֥י/ם שָׁ֖ם וְ/אַתָּ֣ה
    תִשָּׂ֑א וְ/אַתָּה֙ תַּעֲשֶׂ֣ה אֶת חֶפְצִ֔/י לָ/תֵ֖ת לֶ֥חֶם בֵּיתִֽ/י־־־־׃
translation:
  text: My servants will bring them down from Lebanon to the sea, and I will make
    them into rafts on the sea as far as the place you direct me, and I will break
    them apart there, and you will carry them away. And you shall do what I desire
    by giving food for my household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'log rafts' for 'rafts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'bread for my house'; here 'bread' likely means food or provisions
      for Hiram's royal household.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my workers
  - my slaves
  lexicon: HALOT
  rationale: In this royal-administrative context, the term refers to Hiram's laborers/official
    servants. 'Servants' is natural English and fits the context better than 'slaves,'
    since bonded status is not the point being emphasized here.
- source_word: יֹרִדוּ
  chosen: will bring ... down
  alternatives:
  - will take down
  - will bring down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative, so 'bring down' best reflects the sense of
    causing the timber to descend from Lebanon.
- source_word: יָמָּה
  chosen: to the sea
  alternatives:
  - seaward
  - westward to the sea
  lexicon: HALOT
  rationale: Although the form can carry an adverbial 'seaward' sense, in context
    with Lebanon and maritime transport the destination is concretely the coast/sea.
    'To the sea' is clear and faithful.
- source_word: אֲשִׂימֵם
  chosen: I will make them
  alternatives:
  - I will place them
  - I will set them
  lexicon: HALOT
  rationale: With the predicate noun דֹּבְרוֹת, the verb means 'make/set into' rather
    than merely 'place.'
- source_word: דֹּבְרוֹת
  chosen: rafts
  alternatives:
  - floats
  - log rafts
  lexicon: HALOT
  rationale: The word denotes timber bound together for floating transport. 'Rafts'
    is the most idiomatic and precise modern English rendering.
- source_word: בַּיָּם
  chosen: on the sea
  alternatives:
  - by sea
  - in the sea
  lexicon: HALOT
  rationale: The preposition is literally 'in/on the sea.' 'On the sea' preserves
    the image of floating rafts while remaining natural English.
- source_word: עַד הַמָּקוֹם אֲשֶׁר תִּשְׁלַח אֵלַי
  chosen: as far as the place you direct me
  alternatives:
  - to the place you send word to me about
  - to the place you appoint for me
  lexicon: HALOT
  rationale: שׁלח here likely has the sense of sending instructions or designating
    the destination. 'Direct me' communicates the practical force in smooth English
    without over-paraphrasing.
- source_word: וְנִפַּצְתִּים
  chosen: I will break them apart
  alternatives:
  - I will disperse them
  - I will unload them
  - I will separate them
  lexicon: HALOT
  rationale: The verb נָפַץ commonly means to shatter/scatter/break apart. In this
    timber-rafting context it refers to dismantling the rafts at the destination,
    so 'break them apart' is concrete and contextually apt.
- source_word: תִשָּׂא
  chosen: you will carry them away
  alternatives:
  - you will take them
  - you will transport them
  lexicon: HALOT
  rationale: נשא is broad ('lift, carry, take'). Since the timber has arrived and
    been dismantled, 'carry them away' best fits the logistics.
- source_word: חֶפְצִי
  chosen: what I desire
  alternatives:
  - my wish
  - my pleasure
  lexicon: HALOT
  rationale: The noun denotes desire, pleasure, or will. 'What I desire' is natural
    and preserves the personal request element.
- source_word: לָתֵת לֶחֶם בֵּיתִי
  chosen: by giving food for my household
  alternatives:
  - by providing bread for my household
  - to give provisions for my house
  lexicon: HALOT
  rationale: '''Bread'' can stand metonymically for food/provisions. In this supply
    arrangement, ''food for my household'' communicates the intended sense clearly
    for modern readers.'
