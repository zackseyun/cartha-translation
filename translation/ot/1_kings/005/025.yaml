id: 1KI.5.25
reference: 1 Kings 5:25
source:
  edition: WLC
  text: וּ/שְׁלֹמֹה֩ נָתַ֨ן לְ/חִירָ֜ם עֶשְׂרִים֩ אֶ֨לֶף כֹּ֤ר חִטִּים֙ מַכֹּ֣לֶת
    לְ/בֵית֔/וֹ וְ/עֶשְׂרִ֥ים כֹּ֖ר שֶׁ֣מֶן כָּתִ֑ית כֹּֽה יִתֵּ֧ן שְׁלֹמֹ֛ה לְ/חִירָ֖ם
    שָׁנָ֥ה בְ/שָׁנָֽה־׃פ
translation:
  text: And Solomon gave Hiram twenty thousand cors of wheat as food for his household,
    and twenty cors of beaten oil. Thus Solomon would give to Hiram year by year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provisions for his house.' The Hebrew likely refers to food supplied
      for Hiram's royal household.
    reason: lexical_alternative
  - marker: b
    text: '''Beaten oil'' refers to high-quality oil produced from olives by pounding
      or crushing rather than by a later pressing process.'
    reason: cultural_note
lexical_decisions:
- source_word: נָתַן / יִתֵּן
  chosen: gave / would give
  alternatives:
  - gave / gives
  - gave / used to give
  lexicon: HALOT
  rationale: The verse uses a qatal followed by an imperfect with כֹּה to describe
    both the specific arrangement and its customary repetition. Rendering the first
    as simple past ('gave') and the second as habitual past ('would give') best reflects
    the syntax and the concluding 'year by year'.
- source_word: כֹּר
  chosen: cors
  alternatives:
  - kor
  - measures
  lexicon: HALOT
  rationale: A כֹּר is a specific ancient dry/liquid measure. 'Cors' preserves the
    unit more transparently than a vague 'measures'; 'kor' is possible but less natural
    in English. The transliterated plural is appropriate for an ancient unit.
- source_word: חִטִּים
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: The noun specifically denotes wheat, not grain in general, so the more
    precise rendering is preferred.
- source_word: מַכֹּלֶת לְבֵיתוֹ
  chosen: as food for his household
  alternatives:
  - provisions for his house
  - food for his house
  lexicon: HALOT
  rationale: מַכֹּלֶת denotes food/provisions, and לְבֵיתוֹ refers to Hiram's household/court.
    'As food for his household' is idiomatic modern English while preserving the sense
    of provision.
- source_word: שֶׁמֶן כָּתִית
  chosen: beaten oil
  alternatives:
  - fine oil
  - olive oil from beaten olives
  lexicon: HALOT
  rationale: כָּתִית refers to oil produced by beating/crushing rather than pressing.
    'Beaten oil' is a relatively formal but accurate rendering; 'olive oil' is implied
    by שֶׁמֶן in this context but not explicitly stated in the Hebrew.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: HALOT
  rationale: כֹּה introduces the manner or pattern of the arrangement. 'Thus' neatly
    links the statement of quantities with the recurring practice described in the
    next clause.
- source_word: שָׁנָה בְשָׁנָה
  chosen: year by year
  alternatives:
  - every year
  - from year to year
  lexicon: HALOT
  rationale: The Hebrew idiom expresses regular annual repetition. 'Year by year'
    is both natural and close to the form of the source.
