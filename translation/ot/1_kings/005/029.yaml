id: 1KI.5.29
reference: 1 Kings 5:29
source:
  edition: WLC
  text: וַ/יְהִ֧י לִ/שְׁלֹמֹ֛ה שִׁבְעִ֥ים אֶ֖לֶף נֹשֵׂ֣א סַבָּ֑ל וּ/שְׁמֹנִ֥ים אֶ֖לֶף
    חֹצֵ֥ב בָּ/הָֽר׃
translation:
  text: And Solomon had seventy thousand burden-bearers, and eighty thousand stonecutters
    in the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewers in the mountains.' The Hebrew literally says 'cutters/hewers
      in the mountain,' likely referring to quarry workers in the mountainous region.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִשְׁלֹמֹה
  chosen: And Solomon had
  alternatives:
  - And there were for Solomon
  - And it came to be for Solomon
  lexicon: HALOT
  rationale: The Hebrew construction with היה + ל expresses possession/existence.
    In idiomatic English, 'Solomon had' best conveys the sense without wooden awkwardness,
    while retaining the narrative force of the waw-consecutive.
- source_word: שִׁבְעִים אֶלֶף
  chosen: seventy thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction; rendered directly.
- source_word: נֹשֵׂא סַבָּל
  chosen: burden-bearers
  alternatives:
  - laborers who carried loads
  - porters
  lexicon: HALOT
  rationale: The participle נֹשֵׂא ('bearing/carrying') with סַבָּל ('load, burden')
    denotes workers assigned to carry heavy loads. 'Burden-bearers' is concise, natural,
    and preserves the labor-specific sense better than the broader 'laborers.'
- source_word: וּשְׁמֹנִים אֶלֶף
  chosen: and eighty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction; rendered directly.
- source_word: חֹצֵב
  chosen: stonecutters
  alternatives:
  - hewers
  - quarry workers
  - cutters
  lexicon: HALOT
  rationale: The verb חצב means 'to hew/cut out,' often of stone in building contexts.
    Given the surrounding temple-building context, 'stonecutters' makes the implied
    object explicit in natural English. 'Hewers' is more formal but less transparent
    to modern readers.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountain
  - in the mountains
  lexicon: HALOT
  rationale: The singular הַר can function collectively/topographically. In this labor
    context, it refers to the mountainous region where quarrying occurred. 'Hill country'
    is idiomatic English for such terrain and avoids the misleadingly singular 'mountain.'
