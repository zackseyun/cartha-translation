id: 1KI.5.11
reference: 1 Kings 5:11
source:
  edition: WLC
  text: וַ/יֶּחְכַּם֮ מִ/כָּל הָֽ/אָדָם֒ מֵ/אֵיתָ֣ן הָ/אֶזְרָחִ֗י וְ/הֵימָ֧ן וְ/כַלְכֹּ֛ל
    וְ/דַרְדַּ֖ע בְּנֵ֣י מָח֑וֹל וַ/יְהִֽי שְׁמ֥/וֹ בְ/כָֽל הַ/גּוֹיִ֖ם סָבִֽיב־־־׃
translation:
  text: He was wiser than every man—than Ethan the Ezrahite, and Heman, Kalkol, and
    Darda, the sons of Mahol—and his name was in all the surrounding nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than all humankind.' Hebrew 'adam' can refer either to 'man' or to humanity
      more broadly; here the context of named male sages favors 'every man.'
    reason: lexical_alternative
  - marker: b
    text: '''Ezrahite'' may reflect an ethnic or family designation; some connect
      it with ''Zerahite.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his fame was among all the surrounding nations.' Literally, 'his name
      was in all the surrounding nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחְכַּם
  chosen: He was wiser
  alternatives:
  - He became wiser
  - He excelled in wisdom
  lexicon: HALOT
  rationale: The verb from חכם in the waw-consecutive imperfect here functions comparatively
    with מִן ('than'), expressing superiority in wisdom rather than a simple ingressive
    'became wise.' 'He was wiser' is idiomatic English and preserves the comparative
    force.
- source_word: מִכָּל הָאָדָם
  chosen: than every man
  alternatives:
  - than all mankind
  - than every person
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind' depending on context. Here it is
    followed by named male exemplars of wisdom, so 'every man' best matches the comparative
    frame and the doctrine's gender-accurate principle. A broader rendering is possible
    but less precise in context.
- source_word: מֵאֵיתָן הָאֶזְרָחִי
  chosen: than Ethan the Ezrahite
  alternatives:
  - than Ethan the native-born
  - than Ethan the Zerahite
  lexicon: HALOT
  rationale: The phrase is most naturally a personal name plus gentilic/title. 'Ezrahite'
    is the standard transliteration of the designation and avoids overinterpreting
    the uncertain ethnic derivation. 'Zerahite' reflects a possible traditional association
    but is not demanded by the consonantal form here.
- source_word: וְהֵימָן וְכַלְכֹּל וְדַרְדַּע
  chosen: and Heman, Kalkol, and Darda
  alternatives:
  - and Heman, Calcol, and Darda
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated. 'Kalkol' follows
    a straightforward transliteration from Hebrew; 'Calcol' is a traditional English
    spelling but less directly transparent to the source form.
- source_word: בְּנֵי מָחוֹל
  chosen: the sons of Mahol
  alternatives:
  - sons of Mahol
  - members of Mahol's guild
  - sons of dancing
  lexicon: HALOT
  rationale: The construct phrase most plainly reads as a patronymic or family designation.
    Because מָחוֹל can also be associated with 'dance,' some have proposed a descriptive
    sense, but the onomastic reading is more natural in a list of named wise men.
    The article in English helps appositionally identify the preceding names.
- source_word: וַיְהִי שְׁמוֹ
  chosen: his name was
  alternatives:
  - his fame was
  - he became known
  lexicon: HALOT
  rationale: Literally 'his name was.' In Hebrew this can imply reputation or fame,
    but retaining 'his name was' preserves the idiom with minimal interpretation.
    English readers can still infer renown from the context.
- source_word: בְּכָל הַגּוֹיִם סָבִיב
  chosen: in all the surrounding nations
  alternatives:
  - among all the surrounding nations
  - in all the nations around
  lexicon: HALOT
  rationale: גּוֹיִם here refers to neighboring peoples/nations, not 'Gentiles' in
    a later theological sense. 'Surrounding nations' is natural English for the geographic
    idea conveyed by סָבִיב.
