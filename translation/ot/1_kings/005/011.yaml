theological_decisions:
- issue: Rendering of אָדָם in a comparative statement
  chosen_reading: every man
  alternative_readings:
  - all humankind
  - every person
  rationale: Following the doctrine's gender-accurate principle, the masculine singular
    collective is rendered with 'man' where the context is a comparison with named
    male sages. This avoids flattening the source into generic modern neutral language
    where the Hebrew's form and context support a masculine reference.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
