id: 1KI.5.3
reference: 1 Kings 5:3
source:
  edition: WLC
  text: עֲשָׂרָ֨ה בָקָ֜ר בְּרִאִ֗ים וְ/עֶשְׂרִ֥ים בָּקָ֛ר רְעִ֖י וּ/מֵ֣אָה צֹ֑אן לְ֠/בַד
    מֵֽ/אַיָּ֤ל וּ/צְבִי֙ וְ/יַחְמ֔וּר וּ/בַרְבֻּרִ֖ים אֲבוּסִֽים׃
translation:
  text: ten fattened cattle, and twenty pasture-fed cattle, and a hundred sheep, besides
    deer and gazelles and roebucks and fattened fowl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fallow deer' for 'roebucks'; the exact identification of יַחְמוּר is
      uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'fattened geese' for 'fattened fowl'; the precise species denoted by
      בַרְבֻּרִים is uncertain.
    reason: lexical_alternative
  - marker: c
    text: צֹאן can refer more broadly to small livestock (sheep and goats), though
      'sheep' is used here for concise English.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָקָר בְּרִאִים
  chosen: fattened cattle
  alternatives:
  - stall-fed cattle
  - fat cattle
  lexicon: HALOT
  rationale: בקר is a collective noun for cattle/oxen; בְּרִיאִים denotes animals
    that are fat or well-fed. 'Fattened cattle' is natural modern English and preserves
    the sense of specially prepared livestock for consumption.
- source_word: בָּקָר רְעִי
  chosen: pasture-fed cattle
  alternatives:
  - grazing cattle
  - range-fed cattle
  lexicon: HALOT
  rationale: רְעִי relates to grazing/pasturing. 'Pasture-fed cattle' clearly contrasts
    with the previous fattened cattle and reflects the husbandry distinction in the
    Hebrew.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - small livestock
  - flock animals
  lexicon: HALOT
  rationale: Although צאן can include sheep and goats collectively, 'sheep' is the
    conventional and likely intended shorthand in this provisioning list. The narrower
    rendering keeps the English concise while matching many contextual translations.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces additional items beyond the main list. 'Besides' is idiomatic
    and compact.
- source_word: אַיָּל
  chosen: deer
  alternatives:
  - hart
  - stag
  lexicon: HALOT
  rationale: The term refers to a deer, often specifically a stag. 'Deer' is the most
    accessible modern English category term; the more specific male sense is not crucial
    in this food list.
- source_word: צְבִי
  chosen: gazelles
  alternatives:
  - gazelle
  - roe deer
  lexicon: HALOT
  rationale: צבי commonly denotes gazelle. The plural English reflects the list sense
    even though Hebrew uses a collective/singular form.
- source_word: יַחְמוּר
  chosen: roebucks
  alternatives:
  - fallow deer
  - antelope
  lexicon: HALOT
  rationale: The exact zoological identification is uncertain, but 'roebucks' is a
    long-standing and plausible rendering for this wild game animal. Because the identification
    is debated, an alternative is preserved in a footnote.
- source_word: בַרְבֻּרִים אֲבוּסִים
  chosen: fattened fowl
  alternatives:
  - fattened birds
  - fattened geese
  lexicon: HALOT
  rationale: בַרְבֻּרִים refers to birds/fowl, though the precise species is uncertain;
    אֲבוּסִים means fattened or stall-fed. 'Fattened fowl' is idiomatic English and
    avoids overprecision where the Hebrew is not fully certain.
