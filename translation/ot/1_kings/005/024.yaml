id: 1KI.5.24
reference: 1 Kings 5:24
source:
  edition: WLC
  text: וַ/יְהִ֨י חִיר֜וֹם נֹתֵ֣ן לִ/שְׁלֹמֹ֗ה עֲצֵ֧י אֲרָזִ֛ים וַ/עֲצֵ֥י בְרוֹשִׁ֖ים
    כָּל חֶפְצֽ/וֹ־׃
translation:
  text: And Hiram was giving Solomon cedar timber and cypress timber, all he desired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'juniper timber' or traditionally 'fir timber' for Hebrew beroshim; the
      exact tree species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - And it happened
  - And it came about
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. In English,
    rendering it with a simple narrative connector plus the following participial
    construction is more natural than the more wooden 'and it happened,' while still
    preserving the progression of the account.
- source_word: חִירוֹם
  chosen: Hiram
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: נֹתֵן
  chosen: was giving
  alternatives:
  - gave
  - provided
  lexicon: HALOT
  rationale: The participle after ויהי conveys ongoing or customary action in past
    narrative context. 'Was giving' preserves the durative sense better than the simple
    past 'gave.' 'Provided' is possible but slightly more interpretive than the basic
    verb 'give.'
- source_word: לִשְׁלֹמֹה
  chosen: Solomon
  alternatives:
  - to Solomon
  lexicon: HALOT
  rationale: The preposition is implicit in English syntax after 'was giving'; 'Solomon'
    naturally functions as the indirect object. The sense 'to Solomon' is fully preserved.
- source_word: עֲצֵי אֲרָזִים
  chosen: cedar timber
  alternatives:
  - cedar wood
  - cedars
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods/trees of cedars.' In this
    building-supply context, 'cedar timber' best conveys processed building material
    rather than living trees. 'Cedar wood' is also possible; 'cedars' is too bare
    in English for the context.
- source_word: וַעֲצֵי בְרוֹשִׁים
  chosen: and cypress timber
  alternatives:
  - and juniper timber
  - and fir timber
  lexicon: HALOT
  rationale: בְּרוֹשִׁים refers to a conifer used in construction; 'cypress' is a
    common modern rendering and likely best fit. Because the exact species is debated,
    alternatives such as 'juniper' or the traditional 'fir' are worth preserving.
    'Timber' matches the construction context and parallels the previous phrase.
- source_word: כָּל חֶפְצוֹ
  chosen: all he desired
  alternatives:
  - all his desire
  - everything he wanted
  lexicon: HALOT
  rationale: The phrase denotes the full extent of Solomon's wish/request. 'All he
    desired' is idiomatic, concise, and close to the Hebrew. 'Everything he wanted'
    is slightly more colloquial; 'all his desire' is too wooden in modern English.
