id: 1KI.5.32
reference: 1 Kings 5:32
source:
  edition: WLC
  text: וַֽ/יִּפְסְל֞וּ בֹּנֵ֧י שְׁלֹמֹ֛ה וּ/בֹנֵ֥י חִיר֖וֹם וְ/הַ/גִּבְלִ֑ים וַ/יָּכִ֛ינוּ
    הָ/עֵצִ֥ים וְ/הָ/אֲבָנִ֖ים לִ/בְנ֥וֹת הַ/בָּֽיִת׃פ
translation:
  text: So Solomon’s builders, Hiram’s builders, and the men of Gebal cut and prepared
    the timber and the stones to build the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gebalites' or 'the Giblites,' that is, workers from Gebal (Byblos).
    reason: lexical_alternative
  - marker: b
    text: That is, the house of the LORD, the temple.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּפְסְלוּ
  chosen: cut
  alternatives:
  - hewed
  - shaped
  - quarried
  lexicon: HALOT
  rationale: The verb פסל in this construction refers to cutting or shaping materials
    for construction. 'Cut' is natural modern English and can apply to both timber
    and stone in context; 'hewed' is more traditional but less current, while 'quarried'
    would fit stone better than timber and is too narrow for the combined objects
    implied by the verse.
- source_word: בֹּנֵי שְׁלֹמֹה
  chosen: Solomon’s builders
  alternatives:
  - the builders of Solomon
  - Solomon’s workmen
  lexicon: HALOT
  rationale: Although literally 'builders of Solomon,' the phrase denotes Solomon’s
    construction workers. 'Solomon’s builders' is concise and idiomatic while preserving
    the occupational sense of בנה in participial form.
- source_word: וּבֹנֵי חִירוֹם
  chosen: Hiram’s builders
  alternatives:
  - the builders of Hiram
  - Hiram’s workmen
  lexicon: HALOT
  rationale: Parallel to 'Solomon’s builders'; keeping the same rendering preserves
    the Hebrew symmetry.
- source_word: וְהַגִּבְלִים
  chosen: the men of Gebal
  alternatives:
  - the Gebalites
  - the Giblites
  lexicon: HALOT
  rationale: The gentilic refers to people from Gebal/Byblos. 'The men of Gebal' is
    clear to modern readers and avoids an opaque ethnonym in the main text. The more
    formal ethnics are worth preserving in a footnote.
- source_word: וַיָּכִינוּ
  chosen: prepared
  alternatives:
  - made ready
  - set in order
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means to prepare or make ready. 'Prepared'
    is straightforward modern English and fits the construction context.
- source_word: הָעֵצִים
  chosen: the timber
  alternatives:
  - the wood
  - the logs
  lexicon: HALOT
  rationale: In building context, 'timber' is more precise than the generic 'wood'
    and better reflects construction materials.
- source_word: וְהָאֲבָנִים
  chosen: the stones
  alternatives:
  - the stone blocks
  - the masonry stones
  lexicon: HALOT
  rationale: The Hebrew simply says 'the stones.' English can retain this without
    over-specifying, though the context implies worked building stones.
- source_word: לִבְנוֹת הַבָּיִת
  chosen: to build the house
  alternatives:
  - for building the house
  - to build the temple
  lexicon: HALOT
  rationale: בית here refers specifically to the temple, but the Hebrew term is 'house.'
    Following optimal equivalence, 'the house' preserves the source wording and its
    established temple idiom without importing an interpretive gloss into the main
    text.
