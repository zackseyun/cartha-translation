id: 1KI.5.8
reference: 1 Kings 5:8
source:
  edition: WLC
  text: וְ/הַ/שְּׂעֹרִ֣ים וְ/הַ/תֶּ֔בֶן לַ/סּוּסִ֖ים וְ/לָ/רָ֑כֶשׁ יָבִ֗אוּ אֶל הַ/מָּקוֹם֙
    אֲשֶׁ֣ר יִֽהְיֶה שָּׁ֔ם אִ֖ישׁ כְּ/מִשְׁפָּטֽ/וֹ־־׃ס
translation:
  text: And the barley and the straw for the horses and the swift steeds were brought
    to the place where each man was, according to his duty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the steeds'; the Hebrew term may refer more specifically to select
      riding animals, possibly including mules or chariot horses.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man,' used distributively for each responsible person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׂעֹרִים
  chosen: the barley
  alternatives:
  - barley grain
  lexicon: HALOT
  rationale: The noun denotes barley as fodder/provision. 'The barley' is the natural
    English rendering in this supply context.
- source_word: וְהַתֶּבֶן
  chosen: the straw
  alternatives:
  - straw fodder
  - chaff
  lexicon: HALOT
  rationale: תֶּבֶן commonly refers to straw or stubble used as fodder or building
    material. 'Straw' best fits the parallel with barley as feed for animals; 'chaff'
    is less precise here.
- source_word: לַסּוּסִים
  chosen: for the horses
  lexicon: HALOT
  rationale: 'Straightforward rendering of the preposition plus noun: supplies designated
    for horses.'
- source_word: וְלָרָכֶשׁ
  chosen: and the swift steeds
  alternatives:
  - and the steeds
  - and the mules
  - and the chariot horses
  lexicon: HALOT
  rationale: רֶכֶשׁ refers to riding animals/high-bred steeds in royal or military
    contexts. 'Swift steeds' captures the likely sense of select riding animals without
    overcommitting to a narrower species identification such as 'mules.'
- source_word: יָבִיאוּ
  chosen: were brought
  alternatives:
  - they brought
  - would bring
  lexicon: HALOT
  rationale: Although morphologically active plural ('they brought'), English idiom
    in this administrative context is smoother with an impersonal passive, and the
    unnamed agents are not in focus. This preserves the sense of regular delivery.
- source_word: אֶל־הַמָּקוֹם
  chosen: to the place
  alternatives:
  - to the location
  lexicon: HALOT
  rationale: Standard locative phrase; 'place' is natural and sufficiently formal.
- source_word: אֲשֶׁר יִהְיֶה שָּׁם אִישׁ
  chosen: where each man was
  alternatives:
  - where the man in charge was
  - where each one was stationed
  - to the place where each was
  lexicon: HALOT
  rationale: 'The clause is distributive: supplies went to whatever place each responsible
    person was. ''Each man'' preserves the singular אִישׁ used distributively and
    follows the project''s gender-accurate policy.'
- source_word: כְּמִשְׁפָּטוֹ
  chosen: according to his duty
  alternatives:
  - according to his ordinance
  - according to his custom
  - according to his allotment
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers not to legal judgment but to prescribed procedure,
    due, or assigned regulation. 'According to his duty' communicates the administrative
    sense in readable English.
