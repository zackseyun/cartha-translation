theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' rather than transliterating
    the name. This preserves established reverential convention and aligns with the
    stated doctrine guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether שָׂטָן should be read as the proper name Satan
  chosen_reading: common noun 'adversary'
  alternative_readings:
  - Satan
  rationale: The immediate context concerns political peace and absence of opposition,
    not a personal demonic figure. The Hebrew noun here functions as a common noun,
    so translating it as 'Satan' would import a claim the text does not make.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
