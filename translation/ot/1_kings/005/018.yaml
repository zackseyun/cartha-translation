id: 1KI.5.18
reference: 1 Kings 5:18
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הֵנִ֨יחַ יְהוָ֧ה אֱלֹהַ֛/י לִ֖/י מִ/סָּבִ֑יב אֵ֣ין שָׂטָ֔ן וְ/אֵ֖ין
    פֶּ֥גַע רָֽע׃
translation:
  text: But now the LORD my God has given me rest on every side; there is neither
    adversary nor evil occurrence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opponent' for 'adversary'; the Hebrew שָׂטָן here is a common noun,
      not necessarily the proper name Satan.
    reason: lexical_alternative
  - marker: b
    text: Or 'misfortune,' 'calamity,' or 'disaster' for 'evil occurrence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces a transition from prior circumstances to the present situation.
    'But now' best captures the contrastive force in context while remaining natural
    English.
- source_word: הֵנִיחַ
  chosen: has given me rest
  alternatives:
  - has given me relief
  - has settled me
  - has caused me to rest
  lexicon: HALOT
  rationale: From נוח in the Hiphil, meaning to cause rest or give repose. 'Has given
    me rest' is idiomatic English and preserves the causative sense better than a
    bare 'has rested me.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retains Solomon's personal confession
    of covenant relationship.
- source_word: לִי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: With הֵנִיחַ, the preposition marks the beneficiary. English idiom prefers
    'given me rest' rather than the more wooden 'given rest for me.'
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - from all around
  - round about
  lexicon: HALOT
  rationale: Idiomatic rendering of the spatial expression indicating rest from surrounding
    threats. 'On every side' is clear and conventional without being archaic.
- source_word: אֵין
  chosen: there is neither
  alternatives:
  - there is no
  lexicon: HALOT
  rationale: Used here with the following coordinated negative clause. 'There is neither
    ... nor ...' reflects the paired negation smoothly in English.
- source_word: שָׂטָן
  chosen: adversary
  alternatives:
  - opponent
  - accuser
  - Satan
  lexicon: HALOT
  rationale: In this context the noun denotes an opponent or hostile adversary, not
    the later proper name 'Satan.' 'Adversary' best fits the political-military setting.
- source_word: וְאֵין
  chosen: nor
  alternatives:
  - and there is no
  lexicon: HALOT
  rationale: Coordinates the second negated clause with the first in natural English.
- source_word: פֶּגַע רָע
  chosen: evil occurrence
  alternatives:
  - evil event
  - misfortune
  - calamity
  - disaster
  lexicon: HALOT
  rationale: The phrase denotes a harmful happening, blow, or misfortune. 'Evil occurrence'
    preserves the lexical force of רָע while avoiding over-interpretation toward either
    moral evil or only natural disaster. It also fits the broad context of trouble-free
    conditions.
