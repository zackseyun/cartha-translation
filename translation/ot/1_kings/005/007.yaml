id: 1KI.5.7
reference: 1 Kings 5:7
source:
  edition: WLC
  text: וְ/כִלְכְּלוּ֩ הַ/נִּצָּבִ֨ים הָ/אֵ֜לֶּה אֶת הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה וְ/אֵ֧ת
    כָּל הַ/קָּרֵ֛ב אֶל שֻׁלְחַ֥ן הַ/מֶּֽלֶךְ שְׁלֹמֹ֖ה אִ֣ישׁ חָדְשׁ֑/וֹ לֹ֥א יְעַדְּר֖וּ
    דָּבָֽר־־־־׃
translation:
  text: These deputies provided for King Solomon and for all who came near the table
    of King Solomon, each in his month; they lacked nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'officials' or 'governors' for 'deputies.' The Hebrew refers to appointed
      administrators over districts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all who came near the table of King Solomon,' an expression for
      those with access to the royal table.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלְכְּלוּ
  chosen: provided for
  alternatives:
  - sustained
  - supplied
  - supported
  lexicon: HALOT
  rationale: The piel of כלכל here refers to furnishing provisions or maintenance,
    especially in a royal administrative context. 'Provided for' is natural English
    and captures the sense of supplying necessities without over-specifying the mechanism.
- source_word: הַנִּצָּבִים
  chosen: deputies
  alternatives:
  - officials
  - governors
  - officers
  lexicon: HALOT
  rationale: In the Solomonic administrative lists, this term refers to appointed
    officials set over districts. 'Deputies' fits the delegated administrative role
    better than the broader 'officials,' while avoiding the potentially misleading
    modern political sense of 'governors'.
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Straightforward demonstrative modifying 'deputies.'
- source_word: אֶת הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as 'King Solomon.'
- source_word: וְאֵת כָּל הַקָּרֵב אֶל שֻׁלְחַן הַמֶּלֶךְ שְׁלֹמֹה
  chosen: and for all who came near the table of King Solomon
  alternatives:
  - and for all who came to King Solomon's table
  - and for everyone assigned to King Solomon's table
  lexicon: HALOT
  rationale: The participle הַקָּרֵב literally means 'the one(s) coming near/approaching.'
    In context it denotes those who had access to or ate at the royal table. 'Came
    near the table' preserves the Hebrew image while remaining understandable.
- source_word: אִישׁ חָדְשׁוֹ
  chosen: each in his month
  alternatives:
  - each man in his month
  - one man for his month
  lexicon: HALOT
  rationale: This idiom indicates the monthly rotation of responsibility among the
    officials. 'Each in his month' is concise and preserves the masculine singular
    distributive force of אִישׁ.
- source_word: לֹא יְעַדְּרוּ דָּבָר
  chosen: they lacked nothing
  alternatives:
  - they omitted nothing
  - nothing was missing
  - they left nothing lacking
  lexicon: HALOT
  rationale: The verb עדר in this stem conveys lack or absence. In context the sense
    is that no needed provision was missing. 'They lacked nothing' is idiomatic and
    reflects the result of the officials' provisioning.
