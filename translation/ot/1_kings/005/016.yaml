id: 1KI.5.16
reference: 1 Kings 5:16
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח שְׁלֹמֹ֔ה אֶל חִירָ֖ם לֵ/אמֹֽר־׃
translation:
  text: Then Solomon sent to Hiram, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Solomon sent to Hiram, saying.' The Hebrew narrative conjunction
      can be rendered either 'and' or 'then' in English.
    reason: lexical_alternative
  - marker: b
    text: Hiram is spelled 'Huram' in some other passages; here the Hebrew form is
      Hiram.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח introduces the next narrative action. English can render
    the conjunction as either 'and' or 'then'; 'then' preserves the sequential narrative
    force in natural modern English.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward a recipient. 'To' is the natural
    modern English equivalent.
- source_word: חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  rationale: Proper name transliterated from the Hebrew form here as 'Hiram.' 'Huram'
    reflects a variant form found elsewhere, but not this spelling in this verse.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct functions as a speech introducer after a verb
    of sending. 'Saying' is idiomatic English and preserves the formal linkage to
    the following quoted message.
