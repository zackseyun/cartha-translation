id: 1KI.5.30
reference: 1 Kings 5:30
source:
  edition: WLC
  text: לְ֠/בַד מִ/שָּׂרֵ֨י הַ/נִּצָּבִ֤ים לִ/שְׁלֹמֹה֙ אֲשֶׁ֣ר עַל הַ/מְּלָאכָ֔ה
    שְׁלֹ֥שֶׁת אֲלָפִ֖ים וּ/שְׁלֹ֣שׁ מֵא֑וֹת הָ/רֹדִ֣ים בָּ/עָ֔ם הָ/עֹשִׂ֖ים בַּ/מְּלָאכָֽה־׃
translation:
  text: besides Solomon’s chief deputies who were over the work, three thousand three
    hundred, who ruled over the people doing the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief officers' or 'chief overseers.' The Hebrew administrative terms
      combine ideas of rank and supervision.
    reason: lexical_alternative
  - marker: b
    text: '''Ruled over'' translates a verb that can denote exercising authority;
      in context it refers to oversight of laborers.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the people,' referring here to the labor force engaged in the project.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces an exception or addition to a previously stated total. 'Besides'
    is concise and natural in context.
- source_word: שָּׂרֵי
  chosen: chief deputies
  alternatives:
  - chief officers
  - chief officials
  - captains
  lexicon: HALOT
  rationale: שׂר can denote an official, ruler, or officer. In this administrative/building
    context, 'chief deputies' conveys subordinate but high-ranking administrators
    under Solomon.
- source_word: הַנִּצָּבִים
  chosen: deputies
  alternatives:
  - overseers
  - those stationed
  lexicon: HALOT
  rationale: From נצב in a participial/nominalized form, referring to those appointed
    or stationed in supervisory roles. Combined with שׂרי, it points to administrative
    overseers. 'Deputies' avoids redundancy with the later participle for ruling/overseeing.
- source_word: לִשְׁלֹמֹה
  chosen: Solomon’s
  alternatives:
  - belonging to Solomon
  - for Solomon
  lexicon: HALOT
  rationale: The lamed marks relation/possession here; the English possessive is the
    most natural rendering.
- source_word: אֲשֶׁר עַל הַמְּלָאכָה
  chosen: who were over the work
  alternatives:
  - who were in charge of the work
  - who supervised the work
  lexicon: HALOT
  rationale: עַל with מלאכה indicates authority over the labor/project. 'Were over
    the work' is close to the Hebrew while remaining idiomatic.
- source_word: שְׁלֹשֶׁת אֲלָפִים וּשְׁלֹשׁ מֵאוֹת
  chosen: three thousand three hundred
  alternatives:
  - 3,300
  lexicon: HALOT
  rationale: Cardinal number rendered in standard English words for literary readability.
- source_word: הָרֹדִים
  chosen: who ruled over
  alternatives:
  - who supervised
  - who directed
  lexicon: HALOT
  rationale: From רדה, literally 'to rule/have dominion.' In this labor-administration
    context it refers to exercising authority over workers. 'Ruled over' preserves
    the stronger lexical force better than the softer 'supervised.'
- source_word: בָּעָם
  chosen: the people
  alternatives:
  - the workforce
  - the laborers
  lexicon: HALOT
  rationale: The Hebrew says 'the people.' While it refers contextually to laborers,
    the more literal phrase should be retained in the main text.
- source_word: הָעֹשִׂים בַּמְּלָאכָה
  chosen: doing the work
  alternatives:
  - working on the project
  - performing the labor
  lexicon: HALOT
  rationale: A straightforward participial clause identifying the people as those
    engaged in the labor. 'Doing the work' is both literal and natural.
