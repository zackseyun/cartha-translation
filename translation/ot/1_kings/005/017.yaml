id: 1KI.5.17
reference: 1 Kings 5:17
source:
  edition: WLC
  text: אַתָּ֨ה יָדַ֜עְתָּ אֶת דָּוִ֣ד אָבִ֗/י כִּ֣י לֹ֤א יָכֹל֙ לִ/בְנ֣וֹת בַּ֗יִת לְ/שֵׁם֙ יְהוָ֣ה אֱלֹהָ֔י/ו מִ/פְּנֵ֥י הַ/מִּלְחָמָ֖ה אֲשֶׁ֣ר סְבָבֻ֑/הוּ עַ֤ד תֵּת יְהוָה֙ אֹתָ֔/ם תַּ֖חַת כַּפּ֥וֹת רגל/ו־־׃
translation:
  text: You know that David my father could not build a house for the name of Yahweh his God because of the warfare that surrounded him, until Yahweh put them under the soles of his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under his feet.' The Hebrew more fully says 'under the soles of his feet,' an image of subjugation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה יָדַעְתָּ
  chosen: You know
  alternatives:
  - You knew
  - You yourself know
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of ידע in direct address often has present force in English discourse: ''you know.'' The explicit pronoun adds emphasis, but normal English can carry this without an added ''yourself.'''
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - the house
  - a temple
  lexicon: HALOT
  rationale: The noun is anarthrous here and refers to the temple-to-be. 'A house' preserves the Hebrew expression 'build a house for the name of the LORD' without prematurely interpreting it as 'temple,' though that is the referent.
- source_word: לְשֵׁם יְהוָה אֱלֹהָיו
  chosen: for the name of the LORD his God
  alternatives:
  - for the LORD his God's name
  - for the honor of the LORD his God
  lexicon: HALOT
  rationale: This preserves the covenantal idiom 'for the name of' rather than flattening it to a more interpretive phrase like 'for the honor of.' YHWH is rendered by the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִפְּנֵי הַמִּלְחָמָה
  chosen: because of the warfare
  alternatives:
  - because of the war
  - because of the battles
  lexicon: HALOT
  rationale: The singular with the surrounding clause points to the state/pressure of ongoing conflict rather than one discrete battle. 'Warfare' captures the broader sense better than 'war' in modern English.
- source_word: אֲשֶׁר סְבָבֻהוּ
  chosen: that surrounded him
  alternatives:
  - that was around him
  - with which they surrounded him
  lexicon: HALOT
  rationale: The verb סבב with 3mp subject and 3ms object is naturally rendered as hostile conflicts encircling David. 'That surrounded him' is idiomatic and keeps the imagery.
- source_word: עַד תֵּת יְהוָה אֹתָם
  chosen: until the LORD put them
  alternatives:
  - until the LORD gave them
  - until the LORD placed them
  lexicon: HALOT
  rationale: נתן plus 'under the feet' is an idiom of subjugation. English 'put' communicates the idiomatic force more clearly than the more wooden 'gave.'
- source_word: תַּחַת כַּפּוֹת רַגְלוֹ
  chosen: under the soles of his feet
  alternatives:
  - under his feet
  - beneath the soles of his feet
  lexicon: HALOT
  rationale: כפות specifically refers to the soles/palms. 'Under the soles of his feet' preserves the fuller Hebrew image of conquest more closely than the abbreviated idiom 'under his feet.'
