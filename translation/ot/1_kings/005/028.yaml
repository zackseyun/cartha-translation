id: 1KI.5.28
reference: 1 Kings 5:28
source:
  edition: WLC
  text: וַ/יִּשְׁלָחֵ֣/ם לְבָנ֗וֹנָ/ה עֲשֶׂ֨רֶת אֲלָפִ֤ים בַּ/חֹ֨דֶשׁ֙ חֲלִיפ֔וֹת
    חֹ֚דֶשׁ יִהְי֣וּ בַ/לְּבָנ֔וֹן שְׁנַ֥יִם חֳדָשִׁ֖ים בְּ/בֵית֑/וֹ וַ/אֲדֹנִירָ֖ם
    עַל הַ/מַּֽס־׃ס
translation:
  text: He sent them to Lebanon, ten thousand a month in shifts; they would be in
    Lebanon one month and two months at his house, and Adoniram was over the forced
    labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by relays' or 'alternating groups' for 'in shifts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his house'; the sense is that each laborer spent two months
      at home between month-long terms in Lebanon.
    reason: lexical_alternative
  - marker: c
    text: Or 'labor levy'; the Hebrew term refers to compulsory state labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵם
  chosen: He sent them
  alternatives:
  - He dispatched them
  lexicon: HALOT
  rationale: The waw-consecutive verb from שלח with 3mp suffix straightforwardly means
    'he sent them.' 'Sent' is natural modern English and preserves the simple narrative
    action.
- source_word: לְבָנוֹנָה
  chosen: to Lebanon
  alternatives:
  - toward Lebanon
  lexicon: HALOT
  rationale: Directional ending on the place name indicates motion toward Lebanon.
    English idiom is simply 'to Lebanon.'
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: Cardinal number phrase rendered directly and idiomatically.
- source_word: בַּחֹדֶשׁ
  chosen: a month
  alternatives:
  - in the month
  - per month
  lexicon: HALOT
  rationale: 'With the numeric labor rotation context, the phrase is distributive:
    ten thousand each month. ''A month'' is concise English for this sense.'
- source_word: חֲלִיפוֹת
  chosen: in shifts
  alternatives:
  - by relays
  - alternating
  lexicon: HALOT
  rationale: The noun denotes succession/alternation. 'In shifts' communicates the
    labor-rotation system clearly in modern English.
- source_word: חֹדֶשׁ יִהְיוּ בַלְּבָנוֹן
  chosen: they would be in Lebanon one month
  alternatives:
  - for a month they would be in Lebanon
  lexicon: HALOT
  rationale: 'The singular חֹדֶשׁ here functions adverbially: one month in Lebanon.
    English requires supplying ''one'' for clarity because the following clause specifies
    ''two months'' at home.'
- source_word: שְׁנַיִם חֳדָשִׁים בְּבֵיתוֹ
  chosen: and two months at his house
  alternatives:
  - and two months at home
  - and two months in his house
  lexicon: HALOT
  rationale: בְּבֵיתוֹ literally means 'in his house,' but in this labor-rotation
    context it refers to each worker's home. 'At his house' preserves the singular
    suffix more closely than 'at home,' while remaining understandable.
- source_word: וַאֲדֹנִירָם
  chosen: and Adoniram
  lexicon: HALOT
  rationale: Personal name transliterated per project philosophy.
- source_word: עַל הַמַּס
  chosen: was over the forced labor
  alternatives:
  - was over the labor levy
  - was in charge of the corvée
  lexicon: HALOT
  rationale: מַס denotes compulsory labor/service imposed by the state. 'Forced labor'
    is the clearest modern rendering; 'labor levy' is more traditional but less transparent.
    This avoids softening the coercive sense.
