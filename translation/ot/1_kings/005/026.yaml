theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and
    does not introduce a doctrinal claim beyond the source text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בְרִית with explicitly covenantal language or as a political
    'treaty'
  chosen_reading: made a covenant
  alternative_readings:
  - made a treaty
  rationale: Although the context is international relations, the Hebrew uses the
    standard covenant term בְרִית. Preserving 'covenant' maintains lexical transparency
    and allows readers to see the continuity of this term across contexts.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms,
    or documented exception)'
