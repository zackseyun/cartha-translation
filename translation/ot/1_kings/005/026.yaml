id: 1KI.5.26
reference: 1 Kings 5:26
source:
  edition: WLC
  text: וַ/יהוָ֗ה נָתַ֤ן חָכְמָה֙ לִ/שְׁלֹמֹ֔ה כַּ/אֲשֶׁ֖ר דִּבֶּר ל֑/וֹ וַ/יְהִ֣י
    שָׁלֹ֗ם בֵּ֤ין חִירָם֙ וּ/בֵ֣ין שְׁלֹמֹ֔ה וַ/יִּכְרְת֥וּ בְרִ֖ית שְׁנֵי/הֶֽם־׃
translation:
  text: And the LORD gave wisdom to Solomon, just as he had spoken to him. And there
    was peace between Hiram and Solomon, and the two of them made a covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''cut a covenant,'' an idiom meaning to make a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he had promised him.' The Hebrew verb is literally 'spoke,' but in
      context it refers to the LORD's prior word to Solomon.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - granted
  lexicon: HALOT
  rationale: The verb straightforwardly means 'gave'; 'granted' is possible in context,
    but 'gave' preserves the simple verbal force and keeps the sentence close to the
    Hebrew.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה here, referring to the practical and royal
    wisdom God bestowed on Solomon.
- source_word: כַּאֲשֶׁר דִּבֶּר לוֹ
  chosen: just as he had spoken to him
  alternatives:
  - as he had promised him
  - just as he said to him
  lexicon: HALOT
  rationale: דִּבֶּר is literally 'spoke.' Because the reference is to a prior divine
    word, 'promised' is interpretively possible, but 'spoken' better preserves the
    lexical form without over-interpreting the speech act.
- source_word: וַיְהִי שָׁלוֹם
  chosen: there was peace
  alternatives:
  - peace came to be
  - there was friendship
  lexicon: HALOT
  rationale: The idiom is naturally rendered 'there was peace.' 'Friendship' is too
    interpretive for שָׁלוֹם in this political context, where peaceful relations are
    in view.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  lexicon: HALOT
  rationale: Standard relational construction indicating mutual relation between Hiram
    and Solomon.
- source_word: וַיִּכְרְתוּ בְרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  - made a treaty
  lexicon: HALOT
  rationale: Literally 'cut a covenant.' 'Made a covenant' is the best optimal-equivalence
    rendering in modern English. 'Cut a covenant' preserves the idiom more formally
    but is less natural; 'treaty' captures the political setting but loses the covenantal
    wording present in the Hebrew.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: This explicitly marks the mutual participation of the two parties. 'The
    two of them' is clear and slightly more concrete than 'both of them.'
