id: 1KI.5.31
reference: 1 Kings 5:31
source:
  edition: WLC
  text: וַ/יְצַ֣ו הַ/מֶּ֡לֶךְ וַ/יַּסִּעוּ֩ אֲבָנִ֨ים גְּדֹל֜וֹת אֲבָנִ֧ים יְקָר֛וֹת
    לְ/יַסֵּ֥ד הַ/בָּ֖יִת אַבְנֵ֥י גָזִֽית׃
translation:
  text: Then the king commanded, and they quarried great stones, costly stones, to
    lay the foundation of the house with cut stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewn stones' or 'dressed stones' for 'cut stones.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; Hebrew reads 'the house.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיְצַו
  chosen: Then ... commanded
  alternatives:
  - and ... commanded
  - ordered
  lexicon: HALOT
  rationale: Wayyiqtol of צוה introduces the next action in sequence. 'Commanded'
    is a clear, direct rendering; 'Then' captures the narrative progression naturally
    in English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Solomon in context; standard rendering is
    straightforward and sufficiently specific within the narrative.
- source_word: וַיַּסִּעוּ
  chosen: they quarried
  alternatives:
  - they moved
  - they pulled out
  lexicon: HALOT
  rationale: From נסע in a causative form, here in the context of stones for temple
    construction. While the verb can broadly mean 'set out' or 'pull up/remove,' in
    this building context 'quarried' best conveys extracting large stones for use
    in construction. This is an optimal-equivalence choice reflecting the probable
    sense in context.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: great stones
  alternatives:
  - large stones
  - big stones
  lexicon: HALOT
  rationale: Literal noun + adjective. 'Great stones' preserves the elevated register
    and traditional construction-language feel without becoming archaic.
- source_word: אֲבָנִים יְקָרוֹת
  chosen: costly stones
  alternatives:
  - precious stones
  - valuable stones
  lexicon: HALOT
  rationale: יקר often means valuable, precious, costly. Here the stones are building
    materials, not gemstones, so 'costly stones' better communicates expense/high
    quality without suggesting jewels.
- source_word: לְיַסֵּד
  chosen: to lay the foundation
  alternatives:
  - to found
  - to establish the foundation
  lexicon: HALOT
  rationale: Infinitive of יסד in a construction context refers to founding/laying
    a foundation. English idiom favors 'to lay the foundation.'
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew has 'the house.' In context this is the temple, but the source
    term itself is 'house'; retaining 'house' preserves the Hebrew diction while remaining
    intelligible.
- source_word: אַבְנֵי גָזִית
  chosen: with cut stones
  alternatives:
  - hewn stones
  - dressed stones
  lexicon: HALOT
  rationale: גזית denotes hewn/cut stone. 'Cut stones' is accessible modern English;
    'hewn stones' is more formal/traditional and remains a viable alternative. The
    prefixed phrase functions appositionally/specifically, describing the kind of
    foundation stones used.
