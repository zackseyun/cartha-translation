id: 1KI.5.20
reference: 1 Kings 5:20
source:
  edition: WLC
  text: וְ/עַתָּ֡ה צַוֵּה֩ וְ/יִכְרְתוּ לִ֨/י אֲרָזִ֜ים מִן הַ/לְּבָנ֗וֹן וַֽ/עֲבָדַ/י֙
    יִהְי֣וּ עִם עֲבָדֶ֔י/ךָ וּ/שְׂכַ֤ר עֲבָדֶ֨י/ךָ֙ אֶתֵּ֣ן לְ/ךָ֔ כְּ/כֹ֖ל אֲשֶׁ֣ר
    תֹּאמֵ֑ר כִּ֣י אַתָּ֣ה יָדַ֗עְתָּ כִּ֣י אֵ֥ין בָּ֛/נוּ אִ֛ישׁ יֹדֵ֥עַ לִ/כְרָת
    עֵצִ֖ים כַּ/צִּדֹנִֽים־־־׀־׃
translation:
  text: Now command that cedars from Lebanon be cut for me, and let my servants be
    with your servants, and I will give you the wages of your servants according to
    all that you say; for you know that among us there is no man who knows how to
    cut timber like the Sidonians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'no man among us.' The expression refers to the absence of anyone
      with comparable skill, not necessarily to gender exclusion as a social claim.
    reason: lexical_alternative
  - marker: b
    text: Or 'who knows how to cut trees.' The Hebrew literally says 'to cut woods/trees,'
      but the context is timber harvesting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing the request. 'Now' is natural modern English
    while preserving the transition.
- source_word: צַוֵּה
  chosen: command
  alternatives:
  - give orders
  - issue a command
  lexicon: HALOT
  rationale: Imperative of צוה. 'Command' preserves the direct royal request more
    formally than 'give orders.'
- source_word: וְיִכְרְתוּ לִי
  chosen: that ... be cut for me
  alternatives:
  - and let them cut for me
  - and they may cut for me
  lexicon: HALOT
  rationale: Jussive/request construction after 'command.' Passive-like English ('be
    cut for me') is smoother and keeps focus on the cedars as the object requested.
- source_word: אֲרָזִים מִן הַלְּבָנוֹן
  chosen: cedars from Lebanon
  alternatives:
  - cedar trees from Lebanon
  - cedars out of Lebanon
  lexicon: HALOT
  rationale: Standard rendering of the timber source. 'From Lebanon' is concise and
    idiomatic.
- source_word: וַעֲבָדַי יִהְיוּ עִם עֲבָדֶיךָ
  chosen: let my servants be with your servants
  alternatives:
  - my servants will be with your servants
  - let my workers be with your workers
  lexicon: HALOT
  rationale: Keeps the cohortative/jussive sense of arrangement and preserves the
    repeated עבד terminology consistently as 'servants' in this labor context, where
    bonded status is not the point.
- source_word: וּשְׂכַר עֲבָדֶיךָ אֶתֵּן לְךָ
  chosen: I will give you the wages of your servants
  alternatives:
  - I will pay you for your servants
  - I will give you the compensation for your servants
  lexicon: HALOT
  rationale: שׂכר denotes wages/pay. Rendering it explicitly as 'wages' clarifies
    that payment for labor is in view, not a gift.
- source_word: כְּכֹל אֲשֶׁר תֹּאמֵר
  chosen: according to all that you say
  alternatives:
  - whatever you say
  - according to whatever you request
  lexicon: HALOT
  rationale: Retains the breadth of כְּכֹל and the directness of the addressee's stated
    terms.
- source_word: כִּי אַתָּה יָדַעְתָּ
  chosen: for you know
  alternatives:
  - because you know
  - for you yourself know
  lexicon: HALOT
  rationale: Introduces the rationale for the request. The pronoun adds emphasis,
    but English need not mark it overtly here.
- source_word: אֵין בָּנוּ אִישׁ
  chosen: among us there is no man
  alternatives:
  - there is no one among us
  - there is no man among us
  lexicon: HALOT
  rationale: Gender-accurate rendering of אִישׁ as 'man' per project philosophy, while
    the phrase idiomatically means no person in their workforce has the skill. The
    representative sense is preserved without over-paraphrase.
- source_word: יֹדֵעַ לִכְרָת עֵצִים
  chosen: who knows how to cut timber
  alternatives:
  - who knows how to cut trees
  - who is skilled in felling timber
  lexicon: HALOT
  rationale: The infinitive phrase expresses skill. 'Cut timber' fits the context
    of logging better than the more literal but less idiomatic 'cut trees.'
- source_word: כַּצִּדֹנִים
  chosen: like the Sidonians
  alternatives:
  - as the Sidonians do
  - like the people of Sidon
  lexicon: HALOT
  rationale: Direct comparison to the renowned woodcutting skill of the Sidonians.
    'Like the Sidonians' is concise and faithful.
