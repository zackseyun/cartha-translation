id: 1KI.5.10
reference: 1 Kings 5:10
source:
  edition: WLC
  text: וַ/תֵּ֨רֶב֙ חָכְמַ֣ת שְׁלֹמֹ֔ה מֵֽ/חָכְמַ֖ת כָּל בְּנֵי קֶ֑דֶם וּ/מִ/כֹּ֖ל
    חָכְמַ֥ת מִצְרָֽיִם־־׃
translation:
  text: And Solomon’s wisdom surpassed the wisdom of all the sons of the east and
    all the wisdom of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the people of the east” or “the easterners”; Hebrew “the sons of the
      east,” an idiomatic regional designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶב
  chosen: surpassed
  alternatives:
  - increased beyond
  - became greater than
  - excelled
  lexicon: HALOT
  rationale: From רבה in the waw-consecutive imperfect, with comparative מן following.
    In this context it expresses superiority in degree, not merely growth in quantity.
    'Surpassed' gives clear modern English and fits the comparative construction.
- source_word: חָכְמַת
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: HALOT
  rationale: The repeated noun חָכְמָה in this context refers broadly to wisdom, learning,
    and intellectual excellence. 'Wisdom' is the standard and most contextually fitting
    rendering.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: מֵחָכְמַת
  chosen: the wisdom of
  alternatives:
  - more than the wisdom of
  - beyond the wisdom of
  lexicon: HALOT
  rationale: The preposition מן marks comparison after רבה. Rendering the phrase as
    'surpassed the wisdom of' in English naturally incorporates the comparative force.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew in both occurrences.
- source_word: בְּנֵי קֶדֶם
  chosen: the sons of the east
  alternatives:
  - the people of the east
  - the easterners
  - the men of the east
  lexicon: HALOT
  rationale: Literally 'sons of the east.' Because the phrase is an idiomatic ethnogeographic
    designation, the main text keeps the formal image while remaining understandable.
    This also preserves the Hebrew flavor better than flattening it to 'easterners.'
- source_word: וּמִכֹּל חָכְמַת מִצְרָיִם
  chosen: and all the wisdom of Egypt
  alternatives:
  - and the entire wisdom of Egypt
  - and all Egypt's wisdom
  lexicon: HALOT
  rationale: The second comparative phrase is coordinated with the first and depends
    on the same verb. English idiom omits repeating 'surpassed' before the second
    object while preserving the sense.
- source_word: מִצְרָיִם
  chosen: Egypt
  rationale: Standard English rendering of the place name.
