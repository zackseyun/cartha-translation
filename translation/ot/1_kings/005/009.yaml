theological_decisions:
- issue: Anthropological idiom in וְרֹחַב לֵב
  chosen_reading: Rendered idiomatically as 'breadth of mind' in the main text
  alternative_readings:
  - breadth of heart
  - largeness of heart
  rationale: The Hebrew 'heart' often denotes intellect, understanding, and inner
    capacity, not merely emotion. Rendering the idiom as 'mind' avoids misleading
    modern readers into hearing primarily emotional connotations, while a footnote
    preserves the more literal form.
  doctrine_reference: Translation philosophy §1, §6
