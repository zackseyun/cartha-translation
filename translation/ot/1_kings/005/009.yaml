id: 1KI.5.9
reference: 1 Kings 5:9
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ אֱלֹהִ֨ים חָכְמָ֧ה לִ/שְׁלֹמֹ֛ה וּ/תְבוּנָ֖ה הַרְבֵּ֣ה מְאֹ֑ד
    וְ/רֹ֣חַב לֵ֔ב כַּ/ח֕וֹל אֲשֶׁ֖ר עַל שְׂפַ֥ת הַ/יָּֽם־׃
translation:
  text: And God gave Solomon wisdom and very great understanding, and breadth of mind
    like the sand that is on the seashore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'breadth of heart' or 'largeness of heart.' In Hebrew, 'heart'
      can refer to the mind or understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - granted
  - bestowed
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן is straightforwardly rendered 'gave.'
    'Granted' or 'bestowed' are possible, but 'gave' is the plainest and most direct
    English equivalent.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form clearly takes singular verbal sense and refers to
    the God of Israel, so 'God' is the natural English rendering.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה, especially in Solomon contexts where practical
    and royal wisdom are in view.
- source_word: לִשְׁלֹמֹה
  chosen: Solomon
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וּתְבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: תבונה overlaps with discernment and insight, but 'understanding' pairs
    naturally with 'wisdom' and preserves the broad semantic range without over-specifying.
- source_word: הַרְבֵּה מְאֹד
  chosen: very great
  alternatives:
  - exceedingly much
  - abundantly
  lexicon: HALOT
  rationale: The combination intensifies the quantity/degree. 'Very great' reads naturally
    in English and modifies 'understanding' clearly without sounding wooden.
- source_word: וְרֹחַב לֵב
  chosen: breadth of mind
  alternatives:
  - largeness of heart
  - breadth of heart
  - vast understanding
  lexicon: HALOT
  rationale: Literally the phrase is 'breadth of heart,' but in Hebrew לב commonly
    denotes the inner mind/intellect as well as the heart. 'Breadth of mind' communicates
    the idiom's sense in modern English while preserving the metaphor of expansiveness.
    A more literal alternative is worth preserving in a footnote.
- source_word: כַּחוֹל
  chosen: like the sand
  alternatives:
  - as the sand
  lexicon: HALOT
  rationale: Standard simile marker with noun; 'like the sand' is idiomatic modern
    English.
- source_word: אֲשֶׁר עַל שְׂפַת הַיָּם
  chosen: that is on the seashore
  alternatives:
  - which is on the shore of the sea
  - that is on the shore of the sea
  lexicon: HALOT
  rationale: This relative clause identifies the familiar biblical image of innumerable
    sand. 'Seashore' is a natural compression of 'shore of the sea' in English and
    preserves the meaning accurately.
