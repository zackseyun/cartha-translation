id: 1KI.5.2
reference: 1 Kings 5:2
source:
  edition: WLC
  text: וַ/יְהִ֥י לֶֽחֶם שְׁלֹמֹ֖ה לְ/י֣וֹם אֶחָ֑ד שְׁלֹשִׁ֥ים כֹּר֙ סֹ֔לֶת וְ/שִׁשִּׁ֥ים
    כֹּ֖ר קָֽמַח־׃
translation:
  text: Now Solomon’s provision for one day was thirty cors of fine flour and sixty
    cors of meal,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread'; here used more broadly for Solomon’s daily food provision.
    reason: lexical_alternative
  - marker: b
    text: A cor was a large dry measure. The Hebrew reads 'thirty cors' and 'sixty
      cors.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - It came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the statement in narrative sequence.
    'Now ... was' gives natural modern English while preserving the discourse flow
    better than the archaic 'it came to pass.'
- source_word: לֶחֶם
  chosen: provision
  alternatives:
  - bread
  - food
  lexicon: HALOT
  rationale: Although literally 'bread,' in this administrative context with measured
    quantities of flour, the term refers more broadly to food/provisions for the royal
    household. 'Provision' best captures the idiomatic sense without flattening the
    concrete context.
- source_word: שְׁלֹמֹה
  chosen: Solomon’s
  rationale: Standard English transliteration of the personal name שְׁלֹמֹה. The construct
    relationship with לֶחֶם is naturally rendered with the English possessive.
- source_word: לְיוֹם אֶחָד
  chosen: for one day
  alternatives:
  - per day
  - for a single day
  lexicon: HALOT
  rationale: The phrase denotes the amount required on any given day. 'For one day'
    is a clear, natural rendering that preserves the temporal sense.
- source_word: שְׁלֹשִׁים כֹּר
  chosen: thirty cors
  alternatives:
  - thirty kor
  lexicon: HALOT
  rationale: The Hebrew unit כֹּר is best transliterated as 'cor/cors' rather than
    converted into an approximate modern measure in the main text, preserving the
    source's specificity.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: סֹלֶת refers to finely milled flour, a standard rendering in English
    Bible tradition and clear to modern readers.
- source_word: וְשִׁשִּׁים כֹּר
  chosen: and sixty cors
  alternatives:
  - and sixty kor
  lexicon: HALOT
  rationale: Same unit as above; consistency is maintained by rendering כֹּר as 'cors.'
- source_word: קָמַח
  chosen: meal
  alternatives:
  - flour
  lexicon: HALOT
  rationale: Since סֹלֶת has already been rendered 'fine flour,' rendering קָמַח as
    'meal' preserves the distinction between the finer and more ordinary ground grain
    products mentioned in the Hebrew.
