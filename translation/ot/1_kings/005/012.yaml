id: 1KI.5.12
reference: 1 Kings 5:12
source:
  edition: WLC
  text: וַ/יְדַבֵּ֕ר שְׁלֹ֥שֶׁת אֲלָפִ֖ים מָשָׁ֑ל וַ/יְהִ֥י שִׁיר֖/וֹ חֲמִשָּׁ֥ה וָ/אָֽלֶף׃
translation:
  text: He spoke three thousand proverbs, and his songs were one thousand and five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three thousand sayings' or 'three thousand parables'; the Hebrew מָשָׁל
      has a broader range than English 'proverb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: He spoke
  alternatives:
  - He uttered
  - He composed
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak' or 'declare.' 'He spoke'
    is the most direct and natural rendering here. 'Composed' is possible by implication
    in context, but the Hebrew verb itself denotes speaking rather than explicitly
    writing or composing.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction; rendered idiomatically
    in English as 'three thousand.'
- source_word: מָשָׁל
  chosen: proverbs
  alternatives:
  - proverb
  - parables
  - sayings
  lexicon: HALOT
  rationale: Although singular in form after a number, this is a collective/count
    usage and is best rendered in English plural after 'three thousand.' מָשָׁל can
    mean proverb, parable, or saying depending on context; here 'proverbs' best fits
    Solomon's wisdom tradition and standard English usage without overstating allegorical
    nuance.
- source_word: וַיְהִי
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: In this numerical statement, היה functions as a copular/existential verb
    indicating total number. English idiom prefers 'were' rather than a more wooden
    'came to be.'
- source_word: שִׁירוֹ
  chosen: his songs
  alternatives:
  - his song
  lexicon: HALOT
  rationale: Though שִׁיר is singular with a pronominal suffix, after a number it
    functions collectively. English requires the plural 'songs' to match the count
    of 1,005.
- source_word: חֲמִשָּׁה וָאָלֶף
  chosen: one thousand and five
  alternatives:
  - a thousand and five
  - one thousand five
  lexicon: HALOT
  rationale: The Hebrew order is literally 'five and a thousand.' Standard English
    reverses the order to 'one thousand and five.' This preserves the exact count
    while using natural English style.
