id: 1KI.5.1
reference: 1 Kings 5:1
source:
  edition: WLC
  text: וּ/שְׁלֹמֹ֗ה הָיָ֤ה מוֹשֵׁל֙ בְּ/כָל הַ/מַּמְלָכ֔וֹת מִן הַ/נָּהָר֙ אֶ֣רֶץ
    פְּלִשְׁתִּ֔ים וְ/עַ֖ד גְּב֣וּל מִצְרָ֑יִם מַגִּשִׁ֥ים מִנְחָ֛ה וְ/עֹבְדִ֥ים אֶת
    שְׁלֹמֹ֖ה כָּל יְמֵ֥י חַיָּֽי/ו־־־־׃פ
translation:
  text: And Solomon was ruling over all the kingdoms from the River, the land of the
    Philistines, and as far as the border of Egypt. They were bringing tribute and
    serving Solomon all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Euphrates River.
    reason: cross_reference
  - marker: b
    text: Or 'bringing gifts.' The Hebrew minḥah can denote a gift, offering, or tribute;
      here the political context favors 'tribute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשֵׁל
  chosen: was ruling
  alternatives:
  - ruled
  - was sovereign over
  - governing
  lexicon: HALOT
  rationale: The participle with היה expresses ongoing state/action in past time.
    'Was ruling' preserves the durative sense better than simple 'ruled,' while remaining
    natural English.
- source_word: בְּכָל הַמַּמְלָכוֹת
  chosen: over all the kingdoms
  alternatives:
  - among all the kingdoms
  - over every kingdom
  lexicon: HALOT
  rationale: The preposition with משל commonly marks dominion 'over.' The plural 'kingdoms'
    indicates multiple subordinate polities under Solomon's hegemony, not a single
    unified kingdom.
- source_word: מִן הַנָּהָר
  chosen: from the River
  alternatives:
  - from the Euphrates River
  - from the river
  lexicon: HALOT
  rationale: In this geopolitical context 'the River' is a conventional shorthand
    for the Euphrates. I retain the more literal 'the River' in the main text and
    preserve the explicit identification in a footnote.
- source_word: אֶרֶץ פְּלִשְׁתִּים
  chosen: the land of the Philistines
  alternatives:
  - Philistia
  - the territory of the Philistines
  lexicon: HALOT
  rationale: A formally transparent rendering of the construct phrase. 'Philistia'
    is idiomatic but less directly reflective of the Hebrew wording.
- source_word: וְעַד גְּבוּל מִצְרָיִם
  chosen: and as far as the border of Egypt
  alternatives:
  - to the border of Egypt
  - up to the border of Egypt
  lexicon: HALOT
  rationale: '''As far as'' clearly conveys the territorial extent. ''Border of Egypt''
    is the plain sense of the Hebrew construct.'
- source_word: מַגִּשִׁים מִנְחָה
  chosen: bringing tribute
  alternatives:
  - bringing gifts
  - presenting tribute
  - bringing offering
  lexicon: HALOT
  rationale: מִנְחָה can mean gift, offering, or tribute depending on context. Here
    the political setting of subject kingdoms under Solomon favors 'tribute' rather
    than cultic 'offering' or generic 'gift'.
- source_word: וְעֹבְדִים אֶת שְׁלֹמֹה
  chosen: serving Solomon
  alternatives:
  - working for Solomon
  - being subject to Solomon
  lexicon: HALOT
  rationale: עבד with a personal object often denotes service rendered to a superior.
    'Serving' preserves the political-vassal nuance without over-specifying forced
    labor.
- source_word: כָּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - throughout his life
  - all his lifetime
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom; the chosen rendering is both literal
    and clear in modern English.
