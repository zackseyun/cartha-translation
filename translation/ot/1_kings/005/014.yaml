id: 1KI.5.14
reference: 1 Kings 5:14
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ מִ/כָּל הָ֣/עַמִּ֔ים לִ/שְׁמֹ֕עַ אֵ֖ת חָכְמַ֣ת שְׁלֹמֹ֑ה מֵ/אֵת֙
    כָּל מַלְכֵ֣י הָ/אָ֔רֶץ אֲשֶׁ֥ר שָׁמְע֖וּ אֶת חָכְמָתֽ/וֹ־־־׃ס
translation:
  text: And people from all the peoples came to hear the wisdom of Solomon, from all
    the kings of the earth who had heard of his wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all the nations.' The Hebrew עַמִּים is plural and can denote peoples
      or nations.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from all the kings of the earth''; this likely means that such
      visitors came from, or were sent by, kings throughout the world who had heard
      of Solomon''s wisdom.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - would come
  - arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence is best rendered as simple past,
    continuing the report of Solomon's fame.
- source_word: מִכָּל הָעַמִּים
  chosen: from all the peoples
  alternatives:
  - from all the nations
  - from every people
  lexicon: HALOT
  rationale: עַמִּים is plural and refers to distinct peoples/groups. 'Peoples' preserves
    the plural better than the more interpretive 'nations,' though 'nations' is a
    viable contextual alternative.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: Infinitive of purpose after 'came'; 'to hear' is the most direct and
    idiomatic rendering.
- source_word: חָכְמַת שְׁלֹמֹה
  chosen: the wisdom of Solomon
  alternatives:
  - Solomon's wisdom
  lexicon: HALOT
  rationale: Construct chain rendered transparently; either English form is natural,
    but this preserves the Hebrew structure closely.
- source_word: מֵאֵת כָּל מַלְכֵי הָאָרֶץ
  chosen: from all the kings of the earth
  alternatives:
  - on behalf of all the kings of the earth
  - sent by all the kings of the earth
  lexicon: HALOT
  rationale: מֵאֵת can mark source/origin, here indicating that such visitors came
    from or at the instance of the world's kings. The phrase is somewhat compressed
    in Hebrew; 'from all the kings of the earth' keeps the wording close without over-interpreting
    agency.
- source_word: אֲשֶׁר שָׁמְעוּ אֶת חָכְמָתוֹ
  chosen: who had heard of his wisdom
  alternatives:
  - who had heard his wisdom
  - who had heard about his wisdom
  lexicon: HALOT
  rationale: English idiom normally requires 'heard of/about' when the object is reputation
    rather than direct auditory content. This brings out the sense that the kings
    had heard reports of Solomon's wisdom.
