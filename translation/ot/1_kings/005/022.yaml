id: 1KI.5.22
reference: 1 Kings 5:22
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח חִירָם֙ אֶל שְׁלֹמֹ֣ה לֵ/אמֹ֔ר שָׁמַ֕עְתִּי אֵ֥ת אֲשֶׁר שָׁלַ֖חְתָּ
    אֵלָ֑/י אֲנִ֤י אֶֽעֱשֶׂה֙ אֶת כָּל חֶפְצְ/ךָ֔ בַּ/עֲצֵ֥י אֲרָזִ֖ים וּ/בַ/עֲצֵ֥י
    בְרוֹשִֽׁים־־־־׃
translation:
  text: Then Hiram sent to Solomon, saying, “I have heard what you sent to me. I will
    do all your desire concerning cedar timber and cypress timber.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what you requested of me.' The Hebrew more literally says 'what you
      sent to me,' which may refer to Solomon's message as a request.
    reason: lexical_alternative
  - marker: b
    text: Hebrew בְּרוֹשִׁים; the species is uncertain. It is also rendered 'juniper'
      or 'fir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - and ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... sent' gives natural
    English narrative sequence while preserving the verbal action.
- source_word: חִירָם
  chosen: Hiram
  rationale: Personal name transliterated per translation philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect can be rendered as present-resultative in English; 'I have
    heard' fits the immediate response to Solomon's message.
- source_word: אֵת אֲשֶׁר שָׁלַחְתָּ אֵלַי
  chosen: what you sent to me
  alternatives:
  - the message that you sent to me
  - what you requested of me
  lexicon: HALOT
  rationale: Literally refers to what Solomon sent. 'What you sent to me' preserves
    the wording without over-interpreting it as either the physical dispatch or its
    content. 'Requested of me' is interpretive and better left out of the main text.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will act
  - I will provide
  lexicon: HALOT
  rationale: עשה is broad; 'do' best preserves the general commitment without narrowing
    it prematurely.
- source_word: כָּל חֶפְצְךָ
  chosen: all your desire
  alternatives:
  - all your wish
  - all your pleasure
  - everything you want
  lexicon: HALOT
  rationale: חֵפֶץ denotes desire, delight, or what one wishes. 'All your desire'
    is slightly formal but clear and stays close to the Hebrew; 'everything you want'
    is more colloquial.
- source_word: בַּעֲצֵי אֲרָזִים
  chosen: concerning cedar timber
  alternatives:
  - with cedar wood
  - in the matter of cedar trees
  lexicon: HALOT
  rationale: The preposition ב here is best taken as specifying the sphere or matter
    in which Hiram will fulfill Solomon's desire. 'Cedar timber' communicates wood
    prepared for building better than 'cedar trees' in context.
- source_word: וּבַעֲצֵי בְרוֹשִׁים
  chosen: and cypress timber
  alternatives:
  - and juniper timber
  - and fir timber
  lexicon: HALOT
  rationale: בְּרוֹשׁ is a debated tree term. 'Cypress' is a common modern rendering
    and likely fit in this construction context. Alternatives are worth preserving
    because English tradition varies.
