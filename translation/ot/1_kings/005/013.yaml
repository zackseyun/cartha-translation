id: 1KI.5.13
reference: 1 Kings 5:13
source:
  edition: WLC
  text: וַ/יְדַבֵּר֮ עַל הָֽ/עֵצִים֒ מִן הָ/אֶ֨רֶז֙ אֲשֶׁ֣ר בַּ/לְּבָנ֔וֹן וְ/עַד֙
    הָ/אֵז֔וֹב אֲשֶׁ֥ר יֹצֵ֖א בַּ/קִּ֑יר וַ/יְדַבֵּר֙ עַל הַ/בְּהֵמָ֣ה וְ/עַל הָ/ע֔וֹף
    וְ/עַל הָ/רֶ֖מֶשׂ וְ/עַל הַ/דָּגִֽים־־־־־־׃
translation:
  text: He spoke about the trees, from the cedar that is in Lebanon to the hyssop
    that grows out of the wall; he also spoke about the animals and the birds and
    the creeping things and the fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'a small aromatic plant'; the exact botanical identification
      of Hebrew אֵזוֹב is uncertain, though 'hyssop' is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: he spoke about
  alternatives:
  - he described
  - he discoursed on
  lexicon: HALOT
  rationale: The verb דבר with עַל commonly means to speak concerning or about something.
    'Spoke about' is natural modern English and preserves the topical sense without
    overstating it as technical instruction.
- source_word: הָעֵצִים
  chosen: the trees
  alternatives:
  - the plants
  - the wood
  lexicon: HALOT
  rationale: עֵץ in the plural here refers to trees/woody plants in a botanical survey.
    'Trees' best fits the range established by cedar and hyssop as endpoints.
- source_word: הָאֶרֶז
  chosen: the cedar
  alternatives:
  - the cedar tree
  lexicon: HALOT
  rationale: אֶרֶז is the cedar, famously associated with Lebanon. 'The cedar' is
    concise and idiomatic, and the following relative clause identifies its location.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: HALOT
  rationale: The phrase identifies the cedar as the one found in Lebanon. 'In Lebanon'
    is the most natural English rendering for the geographic reference.
- source_word: וְעַד
  chosen: to
  alternatives:
  - even to
  - as far as
  lexicon: HALOT
  rationale: In the correlative expression מִן ... וְעַד, English idiom is 'from ...
    to ...'. This preserves the merism from greatest to least.
- source_word: הָאֵזוֹב
  chosen: the hyssop
  alternatives:
  - marjoram
  - a small wall plant
  lexicon: HALOT
  rationale: Traditional and widely recognized rendering of אֵזוֹב is 'hyssop.' The
    exact botanical identification is debated, but 'hyssop' remains the standard translation;
    the uncertainty is worth preserving in a footnote rather than replacing the term
    in the main text.
- source_word: יֹצֵא בַּקִּיר
  chosen: grows out of the wall
  alternatives:
  - springs from the wall
  - comes out of the wall
  lexicon: HALOT
  rationale: The participle יצא literally means 'comes out,' but in botanical context
    'grows out of' communicates the sense clearly in English while remaining close
    to the Hebrew imagery.
- source_word: הַבְּהֵמָה
  chosen: the animals
  alternatives:
  - the beasts
  - the cattle
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beasts or animals generally. In this catalog alongside
    birds, creeping things, and fish, a broad zoological sense is most likely, so
    'animals' is preferable to the narrower 'cattle' or the more archaic 'beasts.'
- source_word: הָעוֹף
  chosen: the birds
  alternatives:
  - the flying creatures
  - the fowl
  lexicon: HALOT
  rationale: Though עוֹף can denote flying creatures broadly, 'birds' is the most
    natural and likely sense in this classification list.
- source_word: הָרֶמֶשׂ
  chosen: the creeping things
  alternatives:
  - the reptiles
  - the swarming things
  lexicon: HALOT
  rationale: רֶמֶשׂ covers creeping or crawling creatures more broadly than modern
    'reptiles.' 'Creeping things' preserves the Hebrew category without narrowing
    it.
- source_word: הַדָּגִים
  chosen: the fish
  alternatives:
  - the fishes
  lexicon: HALOT
  rationale: דָּגִים is the ordinary plural for fish. Modern English normally uses
    'fish' as the plural in a general category list.
