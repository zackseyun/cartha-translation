id: 1KI.5.19
reference: 1 Kings 5:19
source:
  edition: WLC
  text: וְ/הִנְ/נִ֣י אֹמֵ֔ר לִ/בְנ֣וֹת בַּ֔יִת לְ/שֵׁ֖ם יְהוָ֣ה אֱלֹהָ֑/י כַּ/אֲשֶׁ֣ר דִּבֶּ֣ר יְהוָ֗ה אֶל דָּוִ֤ד אָבִ/י֙ לֵ/אמֹ֔ר בִּנְ/ךָ֗ אֲשֶׁ֨ר אֶתֵּ֤ן תַּחְתֶּ֨י/ךָ֙ עַל כִּסְאֶ֔/ךָ הֽוּא יִבְנֶ֥ה הַ/בַּ֖יִת לִ/שְׁמִֽ/י׀־־־׃
translation:
  text: And behold, I intend to build a house for the name of Yahweh my God, just as Yahweh spoke to David my father, saying, ‘Your son, whom I will set in your place on your throne, he will build the house for my name.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to build a temple'; Hebrew literally 'to build a house.'
    reason: lexical_alternative
  - marker: b
    text: '''For the name of the LORD my God'' preserves the Hebrew temple formula, indicating the house dedicated to the LORD''s name and presence.'
    reason: cultural_note
  - marker: c
    text: Or 'whom I will appoint after you'; Hebrew literally 'whom I will set/give in your place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנְנִי
  chosen: And behold
  alternatives:
  - And now
  - Look
  lexicon: HALOT
  rationale: Introduces Solomon's declaration with an attention-marking particle plus pronoun. 'And behold' preserves the discourse force more transparently than smoothing it away, while remaining intelligible in modern English.
- source_word: אֹמֵר
  chosen: I intend
  alternatives:
  - I am saying
  - I plan
  lexicon: HALOT
  rationale: Here the participle with infinitive expresses present resolve or intention rather than mere speech content. 'I intend' captures the idiomatic force in context better than the overly literal 'I am saying'.
- source_word: לִבְנוֹת בַּיִת
  chosen: to build a house
  alternatives:
  - to build a temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although the referent is the temple, 'house' preserves the Hebrew wording and its theological resonance, while the context makes clear what kind of house is meant.
- source_word: לְשֵׁם יְהוָה אֱלֹהָי
  chosen: for the name of the LORD my God
  alternatives:
  - for the LORD my God's name
  - to honor the name of the LORD my God
  lexicon: HALOT
  rationale: The phrase is a standard temple formula. 'For the name of' preserves the covenantal-theological idiom without paraphrasing it into mere honor language. 'the LORD' follows the stated default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... spoke
  alternatives:
  - according as ... said
  lexicon: HALOT
  rationale: This comparative clause links Solomon's intention to prior divine promise. 'Just as ... spoke' is natural English and preserves the correspondence.
- source_word: אֶל דָּוִד אָבִי
  chosen: to David my father
  alternatives:
  - to my father David
  lexicon: HALOT
  rationale: Both are possible in English; this order stays close to the Hebrew while remaining natural.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotation introducer; 'saying' is concise and faithful.
- source_word: בִּנְךָ
  chosen: Your son
  alternatives:
  - the son of yours
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the possessive construction.
- source_word: אֲשֶׁר אֶתֵּן תַּחְתֶּיךָ
  chosen: whom I will set in your place
  alternatives:
  - whom I will give in your place
  - whom I will appoint after you
  lexicon: HALOT
  rationale: Literally 'whom I will give under/in place of you.' In royal succession context, 'set in your place' communicates appointment to succeed without obscuring the underlying replacement idea.
- source_word: עַל כִּסְאֶךָ
  chosen: on your throne
  alternatives:
  - upon your throne
  - over your throne
  lexicon: HALOT
  rationale: Standard royal idiom for succession and reign. 'On your throne' is the natural English equivalent.
- source_word: הוּא
  chosen: he
  alternatives:
  - that one
  lexicon: HALOT
  rationale: The pronoun is emphatic in Hebrew. Retaining 'he' in English preserves the emphasis on the designated son as the builder.
- source_word: יִבְנֶה הַבַּיִת
  chosen: will build the house
  alternatives:
  - will build the temple
  lexicon: HALOT
  rationale: Again, 'house' preserves the lexical consistency of בַּיִת and its theological resonance.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - in honor of my name
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom tied to the theology of the temple as the place of God's name.
