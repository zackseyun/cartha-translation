id: 1KI.5.15
reference: 1 Kings 5:15
source:
  edition: WLC
  text: וַ֠/יִּשְׁלַח חִירָ֨ם מֶֽלֶךְ צ֤וֹר אֶת עֲבָדָי/ו֙ אֶל שְׁלֹמֹ֔ה כִּ֣י שָׁמַ֔ע
    כִּ֥י אֹת֛/וֹ מָשְׁח֥וּ לְ/מֶ֖לֶךְ תַּ֣חַת אָבִ֑י/הוּ כִּ֣י אֹהֵ֗ב הָיָ֥ה חִירָ֛ם
    לְ/דָוִ֖ד כָּל הַ/יָּמִֽים־־־־׃ס
translation:
  text: Then Hiram king of Tyre sent his servants to Solomon, because he had heard
    that they had anointed him king in place of his father; for Hiram had always loved
    David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for Hiram was a friend to David all his days.' The Hebrew literally
      says 'for Hiram was loving David all the days,' expressing an enduring favorable
      relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from שלח, best rendered with simple
    past 'sent' in English narrative.
- source_word: חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name in Kings is 'Hiram';
    'Huram' appears in some parallel traditions but not preferred here.
- source_word: מֶלֶךְ צֹר
  chosen: king of Tyre
  alternatives:
  - the king of Tyre
  lexicon: HALOT
  rationale: Construct phrase identifying Hiram's royal office and realm. English
    idiom naturally renders without forcing the article.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his servants/slaves
  lexicon: HALOT
  rationale: עבד can denote servants, subjects, or royal officials. In this diplomatic
    context 'servants' is a natural, broad rendering that preserves the formal court
    sense without overstating chattel status.
- source_word: אֶל שְׁלֹמֹה
  chosen: to Solomon
  alternatives:
  - to visit Solomon
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward Solomon; 'to Solomon' is sufficient
    without adding purpose not explicit in the Hebrew.
- source_word: כִּי שָׁמַע
  chosen: because he had heard
  alternatives:
  - for he heard
  - when he heard
  lexicon: HALOT
  rationale: 'כִּי here gives the reason for the sending. Pluperfect ''had heard''
    fits the sequence in English: the hearing precedes the sending.'
- source_word: מָשְׁחוּ
  chosen: they had anointed
  alternatives:
  - they anointed
  lexicon: HALOT
  rationale: משׁח in royal context means anointing/installing as king. Pluperfect
    fits the reported prior event.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: English idiom after 'anointed' can take either 'king' or 'as king'; 'anointed
    him king' is concise and natural.
- source_word: תַּחַת אָבִיהוּ
  chosen: in place of his father
  alternatives:
  - instead of his father
  - after his father
  lexicon: HALOT
  rationale: תחת in succession context means replacement/succession. 'In place of'
    is the clearest idiomatic rendering.
- source_word: כִּי אֹהֵב הָיָה חִירָם לְדָוִד
  chosen: for Hiram had always loved David
  alternatives:
  - for Hiram was a friend to David
  - for Hiram loved David
  lexicon: HALOT
  rationale: The clause gives explanatory background. אֹהֵב + היה expresses an ongoing
    disposition; 'had always loved' captures the durative sense and the relational
    warmth without reducing it merely to political alliance.
- source_word: כָּל הַיָּמִים
  chosen: always
  alternatives:
  - all his days
  - all the days
  lexicon: HALOT
  rationale: Idiomatic summary of continual duration. 'Always' reads naturally in
    English while preserving the sense of ongoing relationship throughout David's
    lifetime.
