id: 1KI.5.21
reference: 1 Kings 5:21
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/שְׁמֹ֧עַ חִירָ֛ם אֶת דִּבְרֵ֥י שְׁלֹמֹ֖ה וַ/יִּשְׂמַ֣ח מְאֹ֑ד
    וַ/יֹּ֗אמֶר בָּר֤וּךְ יְהוָה֙ הַ/יּ֔וֹם אֲשֶׁ֨ר נָתַ֤ן לְ/דָוִד֙ בֵּ֣ן חָכָ֔ם
    עַל הָ/עָ֥ם הָ/רָ֖ב הַ/זֶּֽה־־׃
translation:
  text: And when Hiram heard the words of Solomon, he rejoiced greatly and said, “Blessed
    be the LORD today, who has given David a wise son over this great people.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The waw-consecutive plus infinitive construct introduces a temporal clause.
    In natural English, 'And when ... heard' best conveys the sequence without preserving
    the overly wooden 'and it happened.'
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - the words from
  lexicon: HALOT
  rationale: דבר commonly means 'word(s), matter, message.' Here it refers to Solomon's
    communicated proposal or statements. 'Words of' is sufficiently natural and stays
    close to the Hebrew.
- source_word: וַיִּשְׂמַח מְאֹד
  chosen: he rejoiced greatly
  alternatives:
  - he was very glad
  - he rejoiced very much
  lexicon: HALOT
  rationale: שׂמח denotes joy or gladness. 'Rejoiced greatly' preserves the verbal
    force and the intensifier מְאֹד in readable modern English.
- source_word: בָּרוּךְ יְהוָה
  chosen: Blessed be the LORD
  alternatives:
  - Blessed is the LORD
  - Praise be to the LORD
  lexicon: HALOT
  rationale: The passive participial blessing formula is idiomatically rendered 'Blessed
    be the LORD.' Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the
    main text.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Both are possible; 'today' is more natural contemporary English while
    preserving the temporal sense of immediate praise.
- source_word: נָתַן לְדָוִד בֵּן חָכָם
  chosen: has given David a wise son
  alternatives:
  - gave David a wise son
  - has given to David a wise son
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect in this blessing
    context, highlighting the present significance of God's gift. 'Wise son' straightforwardly
    reflects בן חכם.
- source_word: עַל
  chosen: over
  alternatives:
  - for
  - to rule
  lexicon: HALOT
  rationale: In context עַל marks authority or position over the people. 'Over' is
    concise and preserves the governance sense without adding an explicit verb not
    present in Hebrew.
- source_word: הָעָם הָרָב הַזֶּה
  chosen: this great people
  alternatives:
  - this numerous people
  - this large people
  lexicon: HALOT
  rationale: רב can mean many/numerous or great. In royal and covenantal contexts
    describing Israel, 'great people' is idiomatic and captures both size and significance.
