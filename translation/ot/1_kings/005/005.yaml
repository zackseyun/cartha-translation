id: 1KI.5.5
reference: 1 Kings 5:5
source:
  edition: WLC
  text: וַ/יֵּשֶׁב֩ יְהוּדָ֨ה וְ/יִשְׂרָאֵ֜ל לָ/בֶ֗טַח אִ֣ישׁ תַּ֤חַת גַּפְנ/וֹ֙ וְ/תַ֣חַת
    תְּאֵֽנָת֔/וֹ מִ/דָּ֖ן וְ/עַד בְּאֵ֣ר שָׁ֑בַע כֹּ֖ל יְמֵ֥י שְׁלֹמֹֽה־׃ס
translation:
  text: And Judah and Israel lived in safety, each man under his vine and under his
    fig tree, from Dan to Beer-sheba, all the days of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone under his vine and under his fig tree.' The Hebrew says 'each
      man,' using a masculine singular form distributively.
    reason: lexical_alternative
  - marker: b
    text: '''Under his vine and under his fig tree'' is a conventional image of peace,
      security, and prosperity in the land.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - sat
  lexicon: HALOT
  rationale: Although the verb is literally 'sat/dwelt,' in this idiom with a collective
    subject and לָבֶטַח it conveys settled living or dwelling securely. 'Lived' is
    natural modern English and preserves the durative sense.
- source_word: יְהוּדָה וְיִשְׂרָאֵל
  chosen: Judah and Israel
  lexicon: HALOT
  rationale: These are the two covenantal-political entities named in the Hebrew and
    should be preserved directly rather than generalized as 'the people.'
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: The noun denotes security/safety. 'In safety' is idiomatic in English
    and fits the picture of peaceful national stability.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man' used distributively. Per the gender-accurate
    philosophy, 'each man' best matches the source form and representative force,
    while still reading naturally.
- source_word: תַּחַת גַּפְנוֹ וְתַחַת תְּאֵנָתוֹ
  chosen: under his vine and under his fig tree
  alternatives:
  - beneath his vine and beneath his fig tree
  lexicon: HALOT
  rationale: This is a stock image of peace, prosperity, and unthreatened possession.
    The literal imagery should be retained rather than paraphrased away.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  chosen: from Dan to Beer-sheba
  alternatives:
  - from Dan to Beersheba
  lexicon: HALOT
  rationale: This is the standard geographic merism for the full extent of the land.
    The transliterated place names are retained; hyphenation in 'Beer-sheba' reflects
    the Hebrew compound more transparently.
- source_word: כֹּל יְמֵי שְׁלֹמֹה
  chosen: all the days of Solomon
  alternatives:
  - throughout Solomon's days
  - all Solomon's days
  lexicon: HALOT
  rationale: A formally close rendering that remains readable. It indicates the duration
    of this condition during Solomon's reign.
