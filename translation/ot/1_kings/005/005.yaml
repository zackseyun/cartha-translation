theological_decisions:
- issue: Rendering the distributive masculine אִישׁ
  chosen_reading: each man
  alternative_readings:
  - everyone
  - each person
  rationale: The Hebrew uses masculine singular distributively. Following the project's
    gender-accurate principle, the translation preserves 'man' rather than neutralizing
    it, while recognizing that the sense is representative of the populace.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Handling the prosperity idiom 'under his vine and under his fig tree'
  chosen_reading: Retain the literal image in the main text
  alternative_readings:
  - paraphrase as 'living in peace and prosperity'
  rationale: The phrase is culturally loaded and theologically evocative as an image
    of covenant peace; preserving the metaphor maintains the text's literary and intertextual
    force without over-interpreting it.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
