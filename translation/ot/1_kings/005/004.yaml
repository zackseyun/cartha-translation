id: 1KI.5.4
reference: 1 Kings 5:4
source:
  edition: WLC
  text: כִּי ה֞וּא רֹדֶ֣ה בְּ/כָל עֵ֣בֶר הַ/נָּהָ֗ר מִ/תִּפְסַח֙ וְ/עַד עַזָּ֔ה בְּ/כָל
    מַלְכֵ֖י עֵ֣בֶר הַ/נָּהָ֑ר וְ/שָׁל֗וֹם הָ֥יָה ל֛/וֹ מִ/כָּל עֲבָרָ֖י/ו מִ/סָּבִֽיב־׀־־־־׃
translation:
  text: For he was ruling over all the region beyond the River, from Tiphsah to Gaza,
    over all the kings beyond the River; and he had peace on every side around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Euphrates River.
    reason: cultural_note
  - marker: b
    text: Tiphsah is also often spelled Tiphsah in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹדֶה
  chosen: was ruling
  alternatives:
  - ruled
  - had dominion
  lexicon: HALOT
  rationale: The participle of רדה denotes ongoing rule or dominion. 'Was ruling'
    preserves the verbal aspect in natural English better than a simple stative, while
    avoiding an overly formal 'had dominion.'
- source_word: בְּכָל עֵבֶר הַנָּהָר
  chosen: over all the region beyond the River
  alternatives:
  - over all beyond the River
  - throughout all the region across the River
  lexicon: HALOT
  rationale: עֵבֶר הַנָּהָר is a geographic expression meaning the area beyond the
    Euphrates from the speaker's standpoint. Adding 'region' makes the English idiomatic
    while preserving the territorial sense of the construct phrase.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates
  lexicon: HALOT
  rationale: The Hebrew has the definite common noun 'the River,' a conventional shorthand
    for the Euphrates. The main text preserves the source wording; the referent can
    be clarified in a footnote.
- source_word: מִתִּפְסַח וְעַד עַזָּה
  chosen: from Tiphsah to Gaza
  alternatives:
  - from Tiphsah to Gaza
  lexicon: HALOT
  rationale: This marks the extent of Solomon's rule. 'Tiphsah' is a standard English
    transliteration of תפסח; the phrase is rendered straightforwardly as a geographic
    range.
- source_word: בְּכָל מַלְכֵי עֵבֶר הַנָּהָר
  chosen: over all the kings beyond the River
  alternatives:
  - over all the kings of the region beyond the River
  - over every king beyond the River
  lexicon: HALOT
  rationale: The preposition and phrase indicate suzerainty over the kings in that
    territory. 'Over all the kings beyond the River' is concise and preserves the
    political sense.
- source_word: וְשָׁלוֹם הָיָה לוֹ
  chosen: and he had peace
  alternatives:
  - and there was peace for him
  - and peace belonged to him
  lexicon: HALOT
  rationale: שָׁלוֹם here refers to political peace/security rather than merely inward
    well-being. 'He had peace' is idiomatic and fits the narrative context.
- source_word: מִכָּל עֲבָרָיו מִסָּבִיב
  chosen: on every side around him
  alternatives:
  - from all his surrounding regions
  - from all his neighbors round about
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. Given the context of surrounding powers
    and borders, 'on every side around him' communicates peace from all surrounding
    quarters without over-interpreting עֲבָרָיו as specifically 'neighbors.'
