id: 1KI.5.6
reference: 1 Kings 5:6
source:
  edition: WLC
  text: וַ/יְהִ֣י לִ/שְׁלֹמֹ֗ה אַרְבָּעִ֥ים אֶ֛לֶף אֻרְוֺ֥ת סוּסִ֖ים לְ/מֶרְכָּב֑/וֹ
    וּ/שְׁנֵים עָשָׂ֥ר אֶ֖לֶף פָּרָשִֽׁים־׃
translation:
  text: And Solomon had forty thousand stalls of horses for his chariots, and twelve
    thousand horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stables' instead of 'stalls'; the Hebrew more precisely refers to stalls
      or feeding places for horses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... had
  alternatives:
  - And it was
  - And there were for
  lexicon: HALOT
  rationale: The idiom ויהי ל plus a possessor commonly expresses possession/existence.
    In English, 'had' is the most natural rendering here while preserving the sense
    that these resources belonged to Solomon.
- source_word: לִשְׁלֹמֹה
  chosen: Solomon
  alternatives:
  - for Solomon
  lexicon: HALOT
  rationale: With ויהי, the prefixed ל marks possession ('belonging to Solomon').
    English expresses this naturally by making Solomon the subject of 'had.'
- source_word: אַרְבָּעִים אֶלֶף
  chosen: forty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: אֻרְוֺת
  chosen: stalls
  alternatives:
  - stables
  lexicon: HALOT
  rationale: The noun refers to stalls/feeding places rather than the larger building
    complex. 'Stalls' is the more precise lexical choice, though many English versions
    use 'stables' by tradition.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Standard rendering of the plural noun.
- source_word: לְמֶרְכָּבוֹ
  chosen: for his chariots
  alternatives:
  - for chariotry
  - for his chariot force
  lexicon: HALOT
  rationale: The singular with pronominal suffix functions collectively here, referring
    to Solomon's chariot establishment. 'For his chariots' is clear modern English
    and preserves the military sense.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף
  chosen: and twelve thousand
  lexicon: HALOT
  rationale: Straightforward number phrase.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  - charioteers
  lexicon: HALOT
  rationale: The term ordinarily denotes horsemen/riders. 'Horsemen' is the most direct
    rendering. 'Charioteers' is less likely lexically, though some contexts associate
    the term with mounted military personnel broadly.
