id: 1KI.14.20
reference: 1 Kings 14:20
source:
  edition: WLC
  text: וְ/הַ/יָּמִים֙ אֲשֶׁ֣ר מָלַ֣ךְ יָרָבְעָ֔ם עֶשְׂרִ֥ים וּ/שְׁתַּ֖יִם שָׁנָ֑ה
    וַ/יִּשְׁכַּב֙ עִם אֲבֹתָ֔י/ו וַ/יִּמְלֹ֛ךְ נָדָ֥ב בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: The days that Jeroboam reigned were twenty-two years. Then he lay down with
    his fathers, and Nadab his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'he slept with his fathers.' The Hebrew idiom refers
      to death in a royal succession formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיָּמִים אֲשֶׁר
  chosen: The days that
  alternatives:
  - Now the days that
  - And the days that
  lexicon: HALOT
  rationale: A standard Hebrew regnal-summary formula. English idiom is best served
    by rendering the phrase as 'The days that...' rather than preserving the conjunction
    woodenly.
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - ruled
  lexicon: HALOT
  rationale: In royal context מלך commonly means 'reign/be king.' 'Reigned' is the
    most natural English for a regnal notice.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: twenty-two years
  alternatives:
  - twenty and two years
  lexicon: HALOT
  rationale: Idiomatic modern English rendering of the Hebrew numeral expression.
- source_word: וַיִּשְׁכַּב עִם אֲבֹתָיו
  chosen: he lay down with his fathers
  alternatives:
  - he slept with his fathers
  - he died and was buried with his fathers
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for death in royal narratives. 'Lay
    down with his fathers' preserves the metaphor without importing more than the
    text states. 'Slept with his fathers' is traditional, but in contemporary English
    can be misunderstood sexually; 'died' is interpretive and flattens the idiom.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: In succession formulae, 'became king' clearly marks accession rather
    than the duration of rule.
- source_word: נָדָב בְּנוֹ
  chosen: Nadab his son
  alternatives:
  - his son Nadab
  rationale: Both are possible in English; this order reads smoothly while preserving
    the filial relationship explicit in Hebrew.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In royal succession contexts, תחתיו denotes replacement/succession. 'In
    his place' is clear and idiomatic.
