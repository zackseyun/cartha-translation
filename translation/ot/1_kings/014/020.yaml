theological_decisions:
- issue: Death idiom in royal formula
  chosen_reading: Retain the Hebrew idiom 'lay down with his fathers' rather than
    reducing it to 'died.'
  alternative_readings:
  - he slept with his fathers
  - he died
  rationale: The phrase is a conventional narrative idiom and not a developed doctrinal
    statement about the afterlife. Preserving the idiom maintains the source texture
    while avoiding misleading modern connotations of 'slept.'
  doctrine_reference: Translation philosophy §3, §6
