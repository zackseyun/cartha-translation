id: 1KI.14.26
reference: 1 Kings 14:26
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח אֶת אֹצְר֣וֹת בֵּית יְהוָ֗ה וְ/אֶת אֽוֹצְרוֹת֙ בֵּ֣ית הַ/מֶּ֔לֶךְ וְ/אֶת הַ/כֹּ֖ל לָקָ֑ח וַ/יִּקַּח֙ אֶת כָּל מָגִנֵּ֣י הַ/זָּהָ֔ב אֲשֶׁ֥ר עָשָׂ֖ה שְׁלֹמֹֽה־־־־־־׃
translation:
  text: He took the treasures of the house of Yahweh and the treasures of the king’s house; he took everything. He also took all the gold shields that Solomon had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the house of the LORD''; that is, the temple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח / לָקָח
  chosen: he took
  alternatives:
  - he seized
  - he carried off
  lexicon: HALOT
  rationale: The repeated verb לקח is straightforwardly 'take.' In this narrative context, 'he took' is natural English and preserves the repeated emphasis of the Hebrew without adding the stronger nuance of 'seized' unless context requires it.
- source_word: אֹצְרוֹת
  chosen: treasures
  alternatives:
  - storehouses
  - treasuries
  lexicon: HALOT
  rationale: Although the noun can refer to treasuries/storehouses, here the object taken is the valuable contents, not the buildings themselves. 'Treasures' best fits the immediate context and idiomatic English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear. 'Temple' is possible, but the more literal rendering better reflects the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the palace of the king
  lexicon: HALOT
  rationale: Literally 'the house of the king.' 'The king’s house' preserves the Hebrew phrasing; in context readers will understand it as the royal residence/palace.
- source_word: וְאֶת הַכֹּל לָקָח
  chosen: he took everything
  alternatives:
  - and he took it all
  - indeed, he took all
  lexicon: HALOT
  rationale: This clause is emphatic and summarizes the plundering. 'He took everything' is concise, natural, and preserves the totalizing force of הַכֹּל.
- source_word: מָגִנֵּי הַזָּהָב
  chosen: the gold shields
  alternatives:
  - the shields of gold
  - the golden shields
  lexicon: HALOT
  rationale: '''Gold shields'' is natural modern English and accurately reflects the construct phrase. It likely refers to ceremonial shields made of gold.'
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  chosen: that Solomon had made
  alternatives:
  - which Solomon made
  lexicon: HALOT
  rationale: The relative clause identifies the shields as those previously made by Solomon. English past perfect ('had made') fits the narrative sequence smoothly.
- source_word: וַיִּקַּח ... וַיִּקַּח
  chosen: He took ... He also took
  alternatives:
  - He took ... and took
  - He took ... He took
  lexicon: HALOT
  rationale: The Hebrew repeats the verb for narrative emphasis. Rendering the second occurrence as 'He also took' preserves the additive force and avoids awkward English repetition while still reflecting the Hebrew structure.
