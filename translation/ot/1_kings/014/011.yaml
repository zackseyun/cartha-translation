id: 1KI.14.11
reference: 1 Kings 14:11
source:
  edition: WLC
  text: הַ/מֵּ֨ת לְ/יָֽרָבְעָ֤ם בָּ/עִיר֙ יֹאכְל֣וּ הַ/כְּלָבִ֔ים וְ/הַ/מֵּת֙ בַּ/שָּׂדֶ֔ה יֹאכְל֖וּ ע֣וֹף הַ/שָּׁמָ֑יִם כִּ֥י יְהוָ֖ה דִּבֵּֽר׃
translation:
  text: Anyone belonging to Jeroboam who dies in the city, the dogs will eat; and anyone who dies in the field, the birds of the sky will eat, for Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the dead one of Jeroboam''; that is, anyone belonging to Jeroboam''s house who dies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of heaven' or, traditionally, 'the birds of the air.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת לְיָרָבְעָם
  chosen: Anyone belonging to Jeroboam who dies
  alternatives:
  - He who dies of Jeroboam
  - The dead of Jeroboam
  - Whoever of Jeroboam dies
  lexicon: HALOT
  rationale: The construction refers idiomatically to any member of Jeroboam's household/line who dies, not merely Jeroboam personally. 'Anyone belonging to Jeroboam who dies' brings out the distributive force in natural English while preserving the relation marked by לְ.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Straightforward locative; singular with article is best rendered generically as 'the city.'
- source_word: יֹאכְלוּ הַכְּלָבִים
  chosen: the dogs will eat
  alternatives:
  - the dogs will devour
  - dogs will eat
  lexicon: HALOT
  rationale: אָכַל literally means 'eat.' 'Devour' is possible contextually, but 'eat' preserves the lexical sense and the grim imagery without embellishment.
- source_word: וְהַמֵּת בַּשָּׂדֶה
  chosen: and anyone who dies in the field
  alternatives:
  - and the one who dies in the open country
  - and whoever dies in the countryside
  lexicon: HALOT
  rationale: Parallel to the first clause; rendered distributively for clarity. 'Field' is the direct gloss of שָׂדֶה and fits the contrast with 'city.'
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: HALOT
  rationale: עוֹף is a collective singular meaning flying creatures/birds. 'Birds of the sky' is a clear, fairly literal rendering. 'Birds of the air' is traditional but less directly tied to שָׁמַיִם.
- source_word: כִּי יְהוָה דִּבֵּר
  chosen: for the LORD has spoken
  alternatives:
  - because the LORD has spoken
  - for Yahweh has spoken
  lexicon: HALOT
  rationale: 'כִּי here gives the ground or certainty of the judgment: ''for.'' Per doctrine, יְהוָה is rendered ''the LORD.'' The perfect דִּבֵּר expresses the settled certainty of the divine pronouncement, well conveyed by ''has spoken''.'
