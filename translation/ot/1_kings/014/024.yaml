id: 1KI.14.24
reference: 1 Kings 14:24
source:
  edition: WLC
  text: וְ/גַם קָדֵ֖שׁ הָיָ֣ה בָ/אָ֑רֶץ עָשׂ֗וּ כְּ/כֹל֙ הַ/תּוֹעֲבֹ֣ת הַ/גּוֹיִ֔ם
    אֲשֶׁר֙ הוֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃פ
translation:
  text: There were also cult prostitutes in the land. They did according to all the
    abominations of the nations that the LORD had driven out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “male cult prostitute” or “temple prostitute.” The Hebrew קָדֵשׁ refers
      to a person associated with illicit cultic sexual practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: There were also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Combines the additive conjunction and adverb with the following existential
    clause into natural English while preserving the sense of an additional indictment.
- source_word: קָדֵשׁ
  chosen: cult prostitutes
  alternatives:
  - male cult prostitute
  - sodomite
  - temple prostitute
  lexicon: HALOT
  rationale: The singular noun is used collectively/existentially here with הָיָה,
    indicating the presence of such persons in the land. 'Cult prostitutes' best conveys
    persons attached to illicit worship practices without importing the misleading
    traditional rendering 'sodomite.' 'Male cult prostitute' is lexically possible,
    but the collective singular in English reads more naturally as a plural class
    term.
- source_word: הָיָה בָאָרֶץ
  chosen: were in the land
  alternatives:
  - was in the land
  - existed in the land
  lexicon: HALOT
  rationale: An existential use of היה with a locative phrase. English plural agreement
    is used because קָדֵשׁ is rendered as a collective plural class noun.
- source_word: עָשׂוּ
  chosen: They did
  alternatives:
  - they practiced
  - they committed
  lexicon: HALOT
  rationale: A broad verb preserved with a simple English equivalent. 'Did' allows
    the following comparative phrase to carry the force of imitation; 'practiced'
    is possible but slightly more interpretive.
- source_word: כְּכֹל
  chosen: according to all
  alternatives:
  - like all
  - just as all
  lexicon: HALOT
  rationale: Captures the comparative force of כ plus כל, indicating conformity to
    the full range of pagan practices.
- source_word: הַתּוֹעֲבֹת
  chosen: the abominations
  alternatives:
  - the detestable practices
  - the abhorrent things
  lexicon: HALOT
  rationale: '''Abominations'' is the standard rendering for תועבות in idolatry/sexual-sin
    contexts and preserves the moral-religious weight of the Hebrew.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context, 'nations' naturally refers to the non-Israelite
    peoples of Canaan without importing later NT-specific connotations of 'Gentiles.'
- source_word: הוֹרִישׁ
  chosen: had driven out
  alternatives:
  - had dispossessed
  - had expelled
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ here refers to causing prior inhabitants to lose possession
    and be removed. 'Driven out' is idiomatic and fits the conquest context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: Idiomatic English for removal from someone's presence/front in conquest
    formulas.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Rendered gender-accurately in keeping with project philosophy. The phrase
    is a standard ethnonym, but 'sons of Israel' preserves the source form here without
    obscuring meaning.
