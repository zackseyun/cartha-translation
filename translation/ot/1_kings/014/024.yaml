theological_decisions:
- issue: Rendering of קָדֵשׁ in a context of illicit worship and sexual practice
  chosen_reading: cult prostitutes
  alternative_readings:
  - male cult prostitute
  - temple prostitute
  rationale: The term denotes persons associated with prohibited cultic sexual practices.
    The translation avoids the traditional but inaccurate 'sodomite,' which imports
    later associations not demanded by the Hebrew. Because the verse uses a singular
    form in an existential/collective sense, the English plural class term is preferred
    for readability while preserving the social-religious indictment.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The project prefers gender-accurate renderings where the source is grammatically
    masculine and representative. Here the literal familial expression is retained
    rather than neutralized.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Uses the project's default covenant-name rendering.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
