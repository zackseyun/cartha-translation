id: 1KI.14.21
reference: 1 Kings 14:21
source:
  edition: WLC
  text: וּ/רְחַבְעָם֙ בֶּן שְׁלֹמֹ֔ה מָלַ֖ךְ בִּֽ/יהוּדָ֑ה בֶּן אַרְבָּעִ֣ים וְ/אַחַ֣ת שָׁנָה֩ רְחַבְעָ֨ם בְּ/מָלְכ֜/וֹ וּֽ/שֲׁבַ֨ע עֶשְׂרֵ֥ה שָׁנָ֣ה מָלַ֣ךְ בִּ/ירוּשָׁלִַ֗ם הָ֠/עִיר אֲשֶׁר בָּחַ֨ר יְהוָ֜ה לָ/שׂ֨וּם אֶת שְׁמ֥/וֹ שָׁם֙ מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל וְ/שֵׁ֣ם אִמּ֔/וֹ נַעֲמָ֖ה הָ/עַמֹּנִֽית־־׀־־׃
translation:
  text: Now Rehoboam the son of Solomon reigned in Judah. Rehoboam was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city that Yahweh had chosen from all the tribes of Israel to put his name there. And his mother’s name was Naamah the Ammonite woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over Judah' for 'in Judah.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to put his name there,'' a covenantal expression for the place specially associated with the LORD’s presence and worship.'
    reason: cultural_note
lexical_decisions:
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - became king
  - was king
  lexicon: HALOT
  rationale: The qatal verb here reports royal rule. 'Reigned' is idiomatic English for monarchical governance and fits both occurrences in the verse, while 'became king' is reserved for the infinitive phrase בְּמָלְכוֹ ('when he became king').
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - over Judah
  lexicon: HALOT
  rationale: The preposition ב normally means 'in'; in royal contexts English may also say 'over Judah.' 'In Judah' stays closer to the Hebrew while remaining natural.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at the time of his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The preposition plus infinitive construct with suffix marks the time of accession. 'When he became king' is clear modern English and distinguishes accession age from total years of reign.
- source_word: הָעִיר אֲשֶׁר בָּחַר יְהוָה
  chosen: the city that the LORD had chosen
  alternatives:
  - the city which the LORD chose
  lexicon: HALOT
  rationale: The relative clause identifies Jerusalem by divine election. The pluperfect 'had chosen' fits the retrospective narrative perspective in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָשׂוּם אֶת־שְׁמוֹ שָׁם
  chosen: to put his name there
  alternatives:
  - to place his name there
  - to cause his name to dwell there
  lexicon: HALOT
  rationale: The Hebrew literally says 'to put his name there.' This preserves the covenantal/tabernacling idiom without importing the fuller Deuteronomic paraphrase 'cause his name to dwell,' which is not the wording here.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - out of all the tribes of Israel
  lexicon: HALOT
  rationale: מִן here expresses selection from among the tribes. 'From all the tribes of Israel' is a natural rendering of the source.
- source_word: וְשֵׁם אִמּוֹ
  chosen: And his mother’s name was
  alternatives:
  - And the name of his mother was
  lexicon: HALOT
  rationale: This formula recurs in Kings. The chosen rendering is slightly smoother in modern English while preserving the formal notice of maternal identity.
- source_word: הָעַמֹּנִית
  chosen: the Ammonite
  alternatives:
  - the Ammonitess
  - an Ammonite woman
  lexicon: HALOT
  rationale: The feminine gentilic identifies Naamah's ethnic origin. 'The Ammonite' is concise and natural in apposition to a woman's name in English; 'Ammonitess' is archaic.
