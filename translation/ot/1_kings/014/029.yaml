id: 1KI.14.29
reference: 1 Kings 14:29
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י רְחַבְעָ֖ם וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣מָּה כְתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Rehoboam, and all that he did, are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Judah.' The Hebrew phrase rendered 'the Chronicles'
      refers to a royal record of events.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The rest of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' The prefixed conjunction often functions
    as a narrative transition; 'Now' captures the conventional historiographic shift
    in readable English without losing the connective sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of X, and all that he did,'
    דִּבְרֵי idiomatically refers to the record of a king's affairs or acts, not merely
    his spoken words. 'Acts' is standard and fits the royal annal context.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  - and everything he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Did' preserves the
    broad scope of עשה without over-specifying achievement or moral evaluation.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that they are
  - surely they are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Are
    they not' preserves the Hebrew interrogative-negative form and the annalistic
    formula.
- source_word: הֵמָּה כְתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְתוּבִים is the passive participle 'written.' 'Written' is the most
    direct rendering; the passive construction is retained in English.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on/upon the book(scroll),' but idiomatic English for documentary
    reference is 'written in the Book.' 'Book' is conventional for this archival formula,
    though the underlying object was likely a scroll.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This phrase in royal-source citations refers to a chronicle/annalistic
    record. 'Chronicles' is the established and accurate rendering in this formulaic
    context.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: 'The ל preposition here is best taken in the idiomatic title of the source
    work: ''the Chronicles of the Kings of Judah.'' This is the standard sense in
    Kings'' citation formulas.'
