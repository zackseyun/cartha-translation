theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reference of 'the River'
  chosen_reading: Retain 'the River' in the main text, with explanatory footnote identifying it as the Euphrates
  alternative_readings:
  - beyond the Euphrates
  rationale: The Hebrew uses the conventional title 'the River.' Preserving it in the main text respects the source wording, while a footnote supplies the historical referent for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Rendering אֲשֵׁרֵיהֶם
  chosen_reading: Asherah poles
  alternative_readings:
  - Asherim
  - images of Asherah
  rationale: The term refers to idolatrous cult objects associated with Asherah. 'Asherah poles' communicates the likely referent in accessible English without flattening the pagan religious context; a footnote preserves the transliterated alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
