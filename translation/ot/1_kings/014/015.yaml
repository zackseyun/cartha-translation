id: 1KI.14.15
reference: 1 Kings 14:15
source:
  edition: WLC
  text: וְ/הִכָּ֨ה יְהוָ֜ה אֶת יִשְׂרָאֵ֗ל כַּ/אֲשֶׁ֨ר יָנ֣וּד הַ/קָּנֶה֮ בַּ/מַּיִם֒ וְ/נָתַ֣שׁ אֶת יִשְׂרָאֵ֗ל מֵ֠/עַל הָ/אֲדָמָ֨ה הַ/טּוֹבָ֤ה הַ/זֹּאת֙ אֲשֶׁ֤ר נָתַן֙ לַ/אֲב֣וֹתֵי/הֶ֔ם וְ/זֵרָ֖/ם מֵ/עֵ֣בֶר לַ/נָּהָ֑ר יַ֗עַן אֲשֶׁ֤ר עָשׂוּ֙ אֶת אֲשֵׁ֣רֵי/הֶ֔ם מַכְעִיסִ֖ים אֶת יְהוָֽה־־־־׃
translation:
  text: And Yahweh will strike Israel, as a reed sways in the water, and he will uproot Israel from this good land that he gave to their fathers, and scatter them beyond the River, because they made their Asherim, provoking Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond the Euphrates'; in this context 'the River' refers to the Euphrates.
    reason: cross_reference
  - marker: b
    text: Hebrew 'their Asherim'; that is, cult objects associated with the goddess Asherah, often understood as wooden poles or images.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכָּה
  chosen: will strike
  alternatives:
  - will smite
  - will strike down
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in prophetic discourse has future force here. 'Strike' is clear modern English and preserves the sense of divine judgment without the archaic tone of 'smite.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר יָנוּד הַקָּנֶה בַּמַּיִם
  chosen: as a reed sways in the water
  alternatives:
  - as the reed shakes in the water
  - as a reed is shaken in the water
  lexicon: HALOT
  rationale: The image is comparative and vivid. 'Sways' communicates unstable motion naturally in English; 'is shaken' is more literal but less idiomatic here. 'A reed' rather than 'the reed' better reflects English usage for a generic simile.
- source_word: וְנָתַשׁ
  chosen: and he will uproot
  alternatives:
  - and he will tear away
  - and he will pluck up
  lexicon: HALOT
  rationale: The verb commonly conveys pulling up by the roots, especially in land/judgment contexts. 'Uproot' preserves the agricultural metaphor and fits the following phrase about removal from the land.
- source_word: הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  chosen: this good land
  alternatives:
  - this good ground
  - this fertile land
  lexicon: HALOT
  rationale: In covenantal context אֲדָמָה refers to the land given by God. 'This good land' is natural and preserves the evaluative adjective.
- source_word: אֲשֶׁר נָתַן לַאֲבוֹתֵיהֶם
  chosen: that he gave to their fathers
  alternatives:
  - which he gave to their ancestors
  lexicon: HALOT
  rationale: '''Fathers'' preserves the Hebrew wording and covenantal continuity. It is gender-accurate to the source and idiomatic in biblical English.'
- source_word: וְזֵרָם
  chosen: and scatter them
  alternatives:
  - and winnow them
  - and disperse them
  lexicon: HALOT
  rationale: The verb denotes scattering/dispersing. 'Scatter' is the clearest general rendering; 'winnow' is possible etymologically but too specific and potentially misleading in this exile context.
- source_word: מֵעֵבֶר לַנָּהָר
  chosen: beyond the River
  alternatives:
  - beyond the Euphrates
  - across the River
  lexicon: HALOT
  rationale: In this historical context 'the River' conventionally refers to the Euphrates. The Hebrew itself says 'the River,' so the main text preserves that expression while the more explicit identification is suitable for a footnote.
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - forasmuch as
  - since
  lexicon: HALOT
  rationale: This introduces the reason for judgment. 'Because' is straightforward modern English.
- source_word: עָשׂוּ אֶת אֲשֵׁרֵיהֶם
  chosen: they made their Asherah poles
  alternatives:
  - they made their Asherim
  - they made their Asherah images
  lexicon: HALOT
  rationale: אֲשֵׁרִים/אֲשֵׁרוֹת in many contexts refers to cultic wooden poles or symbols associated with Asherah. 'Asherah poles' is the most widely understood explanatory rendering in English; a footnote preserves the more transliterated alternative.
- source_word: מַכְעִיסִים אֶת יְהוָה
  chosen: provoking the LORD
  alternatives:
  - provoking the LORD to anger
  - offending the LORD
  lexicon: HALOT
  rationale: The participle expresses the effect of their idolatry. 'Provoking the LORD' is concise and faithful; 'to anger' is implicit in the verb and can be omitted in English without loss.
