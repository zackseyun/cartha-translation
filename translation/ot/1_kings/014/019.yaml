id: 1KI.14.19
reference: 1 Kings 14:19
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י יָֽרָבְעָ֔ם אֲשֶׁ֥ר נִלְחַ֖ם וַ/אֲשֶׁ֣ר מָלָ֑ךְ הִנָּ֣/ם
    כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Now the rest of the acts of Jeroboam—how he fought and how he reigned—behold,
    they are written in the Book of the Chronicles of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the rest of the matters of Jeroboam.' In this regnal
      formula, 'acts' conveys the sense of recorded deeds or affairs.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'behold, they are written,' a presentative expression drawing attention
      to the written record.
    reason: lexical_alternative
  - marker: c
    text: That is, an official royal annal or historical record, not the biblical
      book of 1–2 Chronicles.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר commonly introduces the remaining matters or remainder of a subject
    in royal-summary formulas. 'Now the rest of' is idiomatic English and preserves
    the transitional force of וְ plus the sense of remainder.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the regnal formula 'the rest of
    the words/matters of X' it refers broadly to the recorded deeds or acts of the
    king. 'Acts' best matches the idiomatic sense in this historical context.
- source_word: אֲשֶׁר נִלְחַם
  chosen: how he fought
  alternatives:
  - which he fought
  - that he waged war
  lexicon: HALOT
  rationale: נלחם means 'to fight, wage war.' With אֲשֶׁר introducing a specification
    of Jeroboam's acts, English idiom is best served by 'how he fought,' summarizing
    his military activity without adding content.
- source_word: וַאֲשֶׁר מָלָךְ
  chosen: and how he reigned
  alternatives:
  - and that he reigned
  - and how he became king
  lexicon: HALOT
  rationale: מלך in the Qal commonly means 'to reign, be king.' In parallel with 'how
    he fought,' the phrase points to the manner/fact of his reign as part of the historical
    record. 'How he reigned' is the most natural English rendering here.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - surely they are
  - they are
  lexicon: HALOT
  rationale: הִנָּם is a presentative particle with pronominal suffix, drawing attention
    to what follows. 'Behold' preserves the discourse force, though somewhat formal;
    it fits the elevated narrative register. The plural sense is carried by 'they
    are.'
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: כתב in the passive participle means 'written.' 'Written' is retained
    in the main text for transparency to the source, while the larger phrase naturally
    communicates archival record.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but in English archival idiom 'written
    in the Book' is standard and natural. 'Book' is acceptable for סֵפֶר in this formulaic
    reference to an official record.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the events of the days
  - the annals book
  lexicon: HALOT
  rationale: This fixed expression refers to an annalistic royal record. 'Chronicles'
    is the conventional and accurate rendering of דִּבְרֵי הַיָּמִים in such contexts,
    while capitalization signals a titled source.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  - belonging to the kings of Israel
  lexicon: HALOT
  rationale: The prefixed ל in this title functions idiomatically in relation to the
    royal annals. English title style is best represented by 'of the Kings of Israel,'
    the standard sense in this regnal formula.
