theological_decisions:
- issue: Rendering idolatry language without softening covenantal offense
  chosen_reading: other gods and cast images
  alternative_readings:
  - other gods and molten images
  - foreign gods and idols
  rationale: The verse condemns Jeroboam's idolatry in concrete terms. The translation
    keeps both the theological category ('other gods') and the physical cult objects
    ('cast images') rather than collapsing them into a generic 'idols.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Preserving the force of the rejection metaphor
  chosen_reading: you have thrown me behind your back
  alternative_readings:
  - you cast me behind your back
  - you disregarded me
  rationale: The Hebrew uses a strong embodied metaphor for rejecting God. The translation
    preserves the tension and severity rather than resolving it into an abstract paraphrase
    like 'disregarded me.'
  doctrine_reference: Translation philosophy §3
