id: 1KI.14.9
reference: 1 Kings 14:9
source:
  edition: WLC
  text: וַ/תָּ֣רַע לַ/עֲשׂ֔וֹת מִ/כֹּ֖ל אֲשֶׁר הָי֣וּ לְ/פָנֶ֑י/ךָ וַ/תֵּ֡לֶךְ וַ/תַּעֲשֶׂה
    לְּ/ךָ֩ אֱלֹהִ֨ים אֲחֵרִ֤ים וּ/מַסֵּכוֹת֙ לְ/הַכְעִיסֵ֔/נִי וְ/אֹתִ֥/י הִשְׁלַ֖כְתָּ
    אַחֲרֵ֥י גַוֶּֽ/ךָ־־׃ס
translation:
  text: and have done more evil than all who were before you. You went and made for
    yourself other gods and cast images to provoke me to anger, and you have thrown
    me behind your back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'molten images' for 'cast images'; the Hebrew refers to images made by
      casting, likely metal cult objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּרַע לַעֲשׂוֹת
  chosen: have done more evil
  alternatives:
  - have acted more wickedly
  - have done evil
  lexicon: HALOT
  rationale: The Hiphil/causative-like idiom with רעה + לעשות functions as 'to do
    evil' or 'to act wickedly.' Because it is followed by מִכֹּל ('more than all'),
    the comparative sense is brought into English as 'have done more evil' rather
    than a wooden 'have made evil to do.'
- source_word: מִכֹּל אֲשֶׁר הָיוּ לְפָנֶיךָ
  chosen: than all who were before you
  alternatives:
  - than all who came before you
  - more than all those before you
  lexicon: HALOT
  rationale: לְפָנֶיךָ here is temporal/rank language, not spatial only. 'Who were
    before you' preserves the Hebrew idiom while remaining natural English.
- source_word: וַתֵּלֶךְ
  chosen: You went
  alternatives:
  - you went away
  - you proceeded
  lexicon: HALOT
  rationale: הלך introducing the next action has an idiomatic sequential force. Retaining
    'You went' preserves the Hebrew narrative emphasis without over-paraphrasing.
- source_word: וַתַּעֲשֶׂה לְּךָ
  chosen: made for yourself
  alternatives:
  - made yourself
  - fashioned for yourself
  lexicon: HALOT
  rationale: The dative לְּךָ is reflexive/benefactive. 'Made for yourself' captures
    both the action and self-directed benefit.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  - other deities
  lexicon: HALOT
  rationale: This is the standard covenantal expression for illicit deities. 'Other
    gods' is the most direct and biblically recognizable rendering; 'foreign gods'
    would add a nuance not explicit here.
- source_word: וּמַסֵּכוֹת
  chosen: cast images
  alternatives:
  - molten images
  - metal idols
  lexicon: HALOT
  rationale: מַסֵּכָה refers to an image made by casting, often metal. 'Cast images'
    preserves the manufacturing sense more clearly than the traditional but less transparent
    'molten images.'
- source_word: לְהַכְעִיסֵנִי
  chosen: to provoke me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: The Hiphil of כעס means to provoke to anger. The fuller phrase makes
    the causative force explicit and preserves the personal object suffix.
- source_word: וְאֹתִי הִשְׁלַכְתָּ אַחֲרֵי גַוֶּךָ
  chosen: you have thrown me behind your back
  alternatives:
  - you cast me behind your back
  - you flung me behind your back
  lexicon: HALOT
  rationale: This vivid idiom expresses contemptuous rejection of God. 'Thrown me
    behind your back' is natural English and preserves the metaphor without interpretive
    flattening.
