id: 1KI.14.27
reference: 1 Kings 14:27
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/מֶּ֤לֶךְ רְחַבְעָם֙ תַּחְתָּ֔/ם מָגִנֵּ֖י נְחֹ֑שֶׁת וְ/הִפְקִ֗יד
    עַל יַד֙ שָׂרֵ֣י הָ/רָצִ֔ים הַ/שֹּׁ֣מְרִ֔ים פֶּ֖תַח בֵּ֥ית הַ/מֶּֽלֶךְ־׃
translation:
  text: So King Rehoboam made bronze shields in their place and entrusted them to
    the commanders of the runners, who guarded the entrance of the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the captains of the guard'; the Hebrew is literally
      'the commanders of the runners,' likely a royal bodyguard or courier corps.
    reason: lexical_alternative
  - marker: b
    text: '''The king’s house'' refers to the royal palace.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה in this narrative context straightforwardly means 'made'
    or 'produced.' 'Made' is the most natural modern English rendering.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  chosen: King Rehoboam
  alternatives:
  - Rehoboam the king
  lexicon: HALOT
  rationale: English idiom normally places the title before the name. This preserves
    the Hebrew sense without awkwardness.
- source_word: תַּחְתָּם
  chosen: in their place
  alternatives:
  - instead of them
  - in place of them
  lexicon: HALOT
  rationale: The suffix refers back to the gold shields taken away in the previous
    verse. 'In their place' is idiomatic and clearly expresses replacement.
- source_word: מָגִנֵּי נְחֹשֶׁת
  chosen: bronze shields
  alternatives:
  - shields of bronze
  - copper shields
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context; 'bronze' is
    the standard rendering for ancient metalwork in such contexts. The construct phrase
    is naturally rendered 'bronze shields.'
- source_word: וְהִפְקִיד
  chosen: entrusted
  alternatives:
  - appointed
  - committed
  lexicon: HALOT
  rationale: The hiphil of פקד here conveys placing something under someone's charge.
    'Entrusted' best fits the shields as the object being placed in custody.
- source_word: עַל יַד
  chosen: to
  alternatives:
  - into the charge of
  - under the authority of
  lexicon: HALOT
  rationale: Literally 'upon the hand of,' an idiom for placing under someone's control.
    In English, this is best absorbed into the verb phrase as 'entrusted ... to.'
- source_word: שָׂרֵי הָרָצִים
  chosen: the commanders of the runners
  alternatives:
  - the captains of the guard
  - the officers of the couriers
  lexicon: HALOT
  rationale: שָׂרֵי means 'chiefs/commanders.' הָרָצִים literally means 'the runners,'
    a royal corps often functioning as guards or messengers. To preserve source transparency,
    the main text keeps 'runners' rather than interpreting it fully as 'guard.'
- source_word: הַשֹּׁמְרִים
  chosen: who guarded
  alternatives:
  - who kept watch over
  - the ones guarding
  lexicon: HALOT
  rationale: The participle describes the ongoing duty of the runners. Rendering it
    as a relative clause gives smooth English while preserving the durative sense.
- source_word: פֶּתַח בֵּית הַמֶּלֶךְ
  chosen: the entrance of the king’s house
  alternatives:
  - the doorway of the king's house
  - the entrance of the royal palace
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' בֵּית הַמֶּלֶךְ literally means 'the house
    of the king,' which in context refers to the palace. The more literal 'king’s
    house' is retained in the main text for transparency, while still being understandable.
