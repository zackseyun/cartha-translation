id: 1KI.14.2
reference: 1 Kings 14:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יָרָבְעָ֜ם לְ/אִשְׁתּ֗/וֹ ק֤וּמִי נָא֙ וְ/הִשְׁתַּנִּ֔ית וְ/לֹ֣א
    יֵֽדְע֔וּ כִּי אתי אֵ֣שֶׁת יָרָבְעָ֑ם וְ/הָלַ֣כְתְּ שִׁלֹ֗ה הִנֵּה שָׁם֙ אֲחִיָּ֣ה
    הַ/נָּבִ֔יא הֽוּא דִבֶּ֥ר עָלַ֛/י לְ/מֶ֖לֶךְ עַל הָ/עָ֥ם הַ/זֶּֽה־־־־׃
translation:
  text: Jeroboam said to his wife, “Please get up and disguise yourself, so that they
    will not know that you are the wife of Jeroboam, and go to Shiloh. Look, Ahijah
    the prophet is there; he is the one who spoke about me becoming king over this
    people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and they will not know'; the Hebrew leaves the subject
      indefinite.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be king over this people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; 'said' is the natural English narrative
    equivalent.
- source_word: לְאִשְׁתּוֹ
  chosen: to his wife
  lexicon: HALOT
  rationale: Direct relational phrase; no reason to flatten to 'woman' since the possessive
    clearly indicates spouse.
- source_word: קוּמִי נָא
  chosen: Please get up
  alternatives:
  - Arise, please
  - Come now, get up
  lexicon: HALOT
  rationale: Imperative plus particle of entreaty/politeness. 'Please get up' preserves
    both the command and נָא without sounding archaic.
- source_word: וְהִשְׁתַּנִּית
  chosen: disguise yourself
  alternatives:
  - change your appearance
  - make yourself unrecognizable
  lexicon: HALOT
  rationale: Hitpael of שנה here means to alter oneself in appearance; 'disguise yourself'
    best captures the reflexive sense in context.
- source_word: וְלֹא יֵדְעוּ
  chosen: so that they will not know
  alternatives:
  - and they will not know
  - so no one will know
  lexicon: HALOT
  rationale: The clause expresses purpose/result following the disguise command. English
    idiom favors 'so that they will not know.' The plural subject is left indefinite
    as in Hebrew rather than specifying 'no one' in the main text.
- source_word: כִּי אַתְּ אֵשֶׁת יָרָבְעָם
  chosen: that you are the wife of Jeroboam
  alternatives:
  - that you are Jeroboam's wife
  lexicon: HALOT
  rationale: Both are accurate; the chosen wording stays close to the Hebrew construct
    phrase while remaining natural English.
- source_word: וְהָלַכְתְּ שִׁלֹה
  chosen: and go to Shiloh
  alternatives:
  - then go to Shiloh
  - and you shall go to Shiloh
  lexicon: HALOT
  rationale: Sequential perfect with imperative force in context; simple imperative-like
    English best reflects the instruction.
- source_word: הִנֵּה שָׁם
  chosen: Look, ... is there
  alternatives:
  - Behold, ... is there
  - Indeed, ... is there
  lexicon: HALOT
  rationale: הִנֵּה draws attention. 'Look' is readable modern English and preserves
    the deictic force without archaic tone.
- source_word: אֲחִיָּה הַנָּבִיא
  chosen: Ahijah the prophet
  lexicon: HALOT
  rationale: Name transliterated; title translated per project philosophy.
- source_word: הוּא דִבֶּר
  chosen: he is the one who spoke
  alternatives:
  - he spoke
  - he was the one who said
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'He is the one who spoke' preserves
    that emphasis better than a bare 'he spoke.'
- source_word: עָלַי
  chosen: about me
  alternatives:
  - concerning me
  - of me
  lexicon: HALOT
  rationale: With דבר, על can mean 'about/concerning.' Here it refers to Ahijah's
    prophetic word regarding Jeroboam.
- source_word: לְמֶלֶךְ
  chosen: becoming king
  alternatives:
  - to be king
  - as king
  lexicon: HALOT
  rationale: The lamed marks result/status. 'Becoming king' makes explicit in idiomatic
    English that the prophecy concerned Jeroboam's accession, not merely his abstract
    status.
- source_word: עַל הָעָם הַזֶּה
  chosen: over this people
  alternatives:
  - over these people
  lexicon: HALOT
  rationale: Singular עָם is collective; 'this people' is the more literal and biblically
    natural rendering.
