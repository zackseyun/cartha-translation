id: 1KI.14.10
reference: 1 Kings 14:10
source:
  edition: WLC
  text: לָ/כֵ֗ן הִנְ/נִ֨י מֵבִ֤יא רָעָה֙ אֶל בֵּ֣ית יָרָבְעָ֔ם וְ/הִכְרַתִּ֤י לְ/יָֽרָבְעָם֙
    מַשְׁתִּ֣ין בְּ/קִ֔יר עָצ֥וּר וְ/עָז֖וּב בְּ/יִשְׂרָאֵ֑ל וּ/בִֽעַרְתִּי֙ אַחֲרֵ֣י
    בֵית יָרָבְעָ֔ם כַּ/אֲשֶׁ֛ר יְבַעֵ֥ר הַ/גָּלָ֖ל עַד תֻּמּֽ/וֹ־־־׃
translation:
  text: Therefore, behold, I am bringing disaster on the house of Jeroboam, and I
    will cut off from Jeroboam every male, bond and free in Israel, and I will sweep
    away the house of Jeroboam, just as one sweeps away dung until it is all gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one who urinates against a wall,' a crude idiom for a
      male.
    reason: lexical_alternative
  - marker: b
    text: Or 'slave and free'; the Hebrew expression likely functions as a merism
      meaning all without exception.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - harm
  lexicon: HALOT
  rationale: In a judgment oracle, the noun denotes impending calamity brought upon
    a house, not moral evil in Jeroboam's house. 'Disaster' is idiomatic modern English
    and preserves the severity of divine judgment.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: כרת in judgment contexts often carries the sense of cutting off persons
    or lines. 'Cut off' preserves the covenant-judgment idiom and allows the following
    object phrase to specify the extent of removal.
- source_word: מַשְׁתִּין בְּקִיר
  chosen: every male
  alternatives:
  - everyone who urinates against a wall
  - every man-child
  lexicon: HALOT
  rationale: This Hebrew idiom is a coarse way of referring to males. Rendering it
    woodenly would sound bizarre in contemporary English; 'every male' communicates
    the referent clearly, while the idiomatic crudeness is preserved in a footnote
    for auditability.
- source_word: עָצוּר וְעָזוּב
  chosen: bond and free
  alternatives:
  - restrained and left
  - slave and free
  - helpless and abandoned
  lexicon: HALOT
  rationale: In this stock formula of totality, the pair denotes all classes without
    remainder. 'Bond and free' is a concise English equivalent that preserves the
    merism better than a hyper-literal rendering.
- source_word: וּבִעַרְתִּי אַחֲרֵי בֵית יָרָבְעָם
  chosen: I will sweep away the house of Jeroboam
  alternatives:
  - I will burn after the house of Jeroboam
  - I will purge the house of Jeroboam
  lexicon: HALOT
  rationale: בער here is clarified by the following simile about removing dung. 'Sweep
    away' fits the image of thorough removal better than 'burn' in English, even if
    the verb elsewhere can involve burning.
- source_word: הַגָּלָל
  chosen: dung
  alternatives:
  - filth
  - manure
  - refuse
  lexicon: HALOT
  rationale: The term is deliberately graphic and contemptuous. 'Dung' preserves the
    offensiveness and the force of the simile better than softened alternatives.
- source_word: עַד תֻּמּוֹ
  chosen: until it is all gone
  alternatives:
  - until its end
  - until it is finished
  - until it is consumed
  lexicon: HALOT
  rationale: The phrase expresses complete removal. 'Until it is all gone' is natural
    English that conveys total eradication in keeping with the simile.
