theological_decisions:
- issue: Rendering a divine judgment formula without softening its severity
  chosen_reading: The verse is translated with direct, forceful language of divine
    judgment ('bringing disaster,' 'cut off,' 'sweep away,' 'dung')
  alternative_readings:
  - Use softened language such as 'trouble' or 'remove'
  rationale: The Hebrew is intentionally severe and contemptuous. Optimal equivalence
    here requires preserving the gravity and offensiveness of the oracle rather than
    muting it for stylistic comfort.
  doctrine_reference: Translation philosophy §§1, 6
