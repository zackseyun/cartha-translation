id: 1KI.14.30
reference: 1 Kings 14:30
source:
  edition: WLC
  text: וּ/מִלְחָמָ֨ה הָיְתָ֧ה בֵין רְחַבְעָ֛ם וּ/בֵ֥ין יָרָבְעָ֖ם כָּל הַ/יָּמִֽים־־׃
translation:
  text: And there was war between Rehoboam and Jeroboam all their days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all the days.' The Hebrew idiom means the conflict persisted
      throughout their lives/reigns.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  chosen: And there was war
  alternatives:
  - And war continued
  - Now there was war
  - And there was continual war
  lexicon: HALOT
  rationale: 'מִלְחָמָה denotes war or warfare. With the prefixed conjunction ו and
    the following היה construction, the clause is naturally rendered existentially
    in English: ''and there was war.'' ''War'' is preferred over ''warfare'' for readability
    and because the verse states the state of conflict rather than describing military
    technique.'
- source_word: הָיְתָה
  chosen: there was
  alternatives:
  - continued
  - existed
  lexicon: HALOT
  rationale: The Qal perfect of היה in this context functions as a simple copular/existential
    verb. English idiom prefers 'there was' with the abstract noun 'war.' 'Continued'
    is interpretive and not required by the verb itself, though the duration is supplied
    later by 'all their days.'
- source_word: בֵין ... וּ/בֵין
  chosen: between ... and
  alternatives:
  - among
  lexicon: HALOT
  rationale: The paired prepositions mark reciprocal opposition between two parties.
    English 'between ... and' is the direct and natural equivalent.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention.
- source_word: כָּל הַיָּמִים
  chosen: all their days
  alternatives:
  - all the days
  - continually
  - all his days
  lexicon: HALOT
  rationale: Literally 'all the days.' In this context, with two named subjects in
    ongoing mutual conflict, idiomatic English is 'all their days,' meaning throughout
    their lifetimes/reigns. 'All the days' is less natural in English without a possessive,
    and 'all his days' would wrongly singularize the reference.
