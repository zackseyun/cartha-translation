id: 1KI.14.12
reference: 1 Kings 14:12
source:
  edition: WLC
  text: וְ/אַ֥תְּ ק֖וּמִי לְכִ֣י לְ/בֵיתֵ֑/ךְ בְּ/בֹאָ֥ה רַגְלַ֛יִ/ךְ הָ/עִ֖ירָ/ה
    וּ/מֵ֥ת הַ/יָּֽלֶד׃
translation:
  text: But as for you, arise, go to your house. When your feet enter the city, the
    child will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'when your feet enter the city.' The Hebrew uses 'your feet'
      idiomatically to mark the moment of arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתְּ
  chosen: But as for you
  alternatives:
  - And you
  - Now you
  lexicon: HALOT
  rationale: The conjunction plus independent 2fs pronoun marks a contrastive or emphatic
    shift addressed specifically to the woman. 'But as for you' captures both the
    connective and the emphasis better than a bare 'and you.'
- source_word: ק֖וּמִי
  chosen: arise
  alternatives:
  - get up
  - rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Arise' preserves the formal force and solemn tone
    of the prophetic command; 'get up' is possible but too colloquial here.
- source_word: לְכִ֣י
  chosen: go
  alternatives:
  - depart
  - be on your way
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the plain and natural rendering in English
    and fits the sequence of commands.
- source_word: לְ/בֵיתֵ֑/ךְ
  chosen: to your house
  alternatives:
  - to your home
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house' and can imply household/home. Here the
    directional sense is straightforward; 'house' stays closer to the Hebrew while
    remaining natural.
- source_word: בְּ/בֹאָ֥ה
  chosen: When ... enter
  alternatives:
  - at the entering of
  - as ... come
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of בוא introduces a temporal
    clause. Rendering it as 'When' gives idiomatic English while preserving the temporal
    force.
- source_word: רַגְלַ֛יִ/ךְ
  chosen: your feet
  alternatives:
  - you
  - your footsteps
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your feet,' a vivid idiom for arrival. Retaining
    the body-part imagery preserves the concreteness of the source text.
- source_word: הָ/עִ֖ירָ/ה
  chosen: the city
  alternatives:
  - into the city
  - the town
  lexicon: HALOT
  rationale: With the directional ending, the sense is motion toward/into the city.
    In English, 'enter the city' naturally incorporates that directional nuance without
    needing a separate gloss.
- source_word: וּ/מֵ֥ת
  chosen: will die
  alternatives:
  - then ... will die
  - shall die
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this prophetic context expresses
    a future result. 'Will die' communicates the prediction clearly in contemporary
    English.
- source_word: הַ/יָּֽלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: יֶלֶד can mean child, boy, or youth. Since the verse does not stress
    maleness but the child in question, 'the child' is the most contextually appropriate
    and natural rendering.
