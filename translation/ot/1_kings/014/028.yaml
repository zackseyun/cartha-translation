id: 1KI.14.28
reference: 1 Kings 14:28
source:
  edition: WLC
  text: וַ/יְהִ֛י מִ/דֵּי בֹ֥א הַ/מֶּ֖לֶךְ בֵּ֣ית יְהוָ֑ה יִשָּׂאוּ/ם֙ הָֽ/רָצִ֔ים
    וֶ/הֱשִׁיב֖וּ/ם אֶל תָּ֥א הָ/רָצִֽים־־׃
translation:
  text: And whenever the king entered the house of the LORD, the guards would carry
    them and then return them to the guards’ chamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the bronze shields made by Rehoboam in place of the gold shields
      taken by Shishak (see 1 Kings 14:27).
    reason: cross_reference
  - marker: b
    text: Hebrew 'the runners'; in this royal setting, the term refers to the king’s
      guards or bodyguards.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened / And
  alternatives:
  - Now it happened
  - And
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a customary situation. In English, a
    simple 'And' best carries the flow without woodenly preserving the idiom 'it happened.'
- source_word: מִדֵּי בֹא
  chosen: whenever ... entered
  alternatives:
  - as often as ... entered
  - from the time of entering
  lexicon: HALOT
  rationale: 'The construction מִדֵּי + infinitive expresses repeated occurrence,
    hence a habitual sense: ''whenever'' or ''as often as.'' ''Whenever'' is natural
    modern English and preserves the iterative force.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun referring to Rehoboam in context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת here denotes the temple/palace-like sanctuary building. 'House
    of the LORD' preserves the Hebrew expression, while 'the LORD' follows the project's
    default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: יִשָּׂאוּם
  chosen: would carry them
  alternatives:
  - carried them
  - would bear them
  lexicon: HALOT
  rationale: Imperfect with the preceding iterative construction gives habitual past
    action. The object suffix refers to the bronze shields mentioned in the previous
    verse. 'Would carry them' captures repeated customary action.
- source_word: הָרָצִים
  chosen: the guards
  alternatives:
  - the runners
  - the couriers
  lexicon: HALOT
  rationale: Though literally 'the runners,' in royal contexts רָצִים refers to royal
    guards/bodyguards who ran before or attended the king. 'Guards' communicates the
    function more clearly in contemporary English.
- source_word: וֶהֱשִׁיבוּם
  chosen: and then return them
  alternatives:
  - and brought them back
  - and restored them
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return/bring back. 'Return them' is concise
    and fits the repeated ceremonial action.
- source_word: אֶל תָּא הָרָצִים
  chosen: to the guards’ chamber
  alternatives:
  - to the room of the guards
  - to the guardroom
  lexicon: HALOT
  rationale: תָּא denotes a chamber/room. 'Guards’ chamber' is a natural rendering
    that preserves the possessive relation. 'Guardroom' is possible but slightly more
    interpretive.
