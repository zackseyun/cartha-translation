id: 1KI.14.25
reference: 1 Kings 14:25
source:
  edition: WLC
  text: וַ/יְהִ֛י בַּ/שָּׁנָ֥ה הַ/חֲמִישִׁ֖ית לַ/מֶּ֣לֶךְ רְחַבְעָ֑ם עָלָ֛ה שושק מֶֽלֶךְ
    מִצְרַ֖יִם עַל יְרוּשָׁלִָֽם־־׃
translation:
  text: Now in the fifth year of King Rehoboam, Shishak king of Egypt came up against
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up against Jerusalem.' The Hebrew idiom uses 'went/came up' for
      military advance, especially toward a prominent city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. 'Now'
    preserves the discourse function in natural modern English better than the more
    wooden 'and it happened' or archaic 'came to pass.'
- source_word: בַּשָּׁנָה הַחֲמִישִׁית
  chosen: in the fifth year
  alternatives:
  - in year five
  - during the fifth year
  lexicon: HALOT
  rationale: A standard regnal-year dating formula; 'in the fifth year' is the most
    idiomatic and sufficiently formal rendering.
- source_word: לַמֶּלֶךְ רְחַבְעָם
  chosen: of King Rehoboam
  alternatives:
  - of the reign of King Rehoboam
  - belonging to King Rehoboam
  lexicon: HALOT
  rationale: The lamed with 'king' in this dating formula marks reference to the reign
    of Rehoboam. English commonly expresses this as 'of King Rehoboam' without overtranslating
    the formula.
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up against
  - marched against
  - attacked
  lexicon: HALOT
  rationale: עלה with עַל in military contexts commonly means to advance against or
    campaign against a city. 'Came up against' preserves the directional idiom while
    making the hostile sense explicit. 'Attacked' would be slightly more interpretive
    than the Hebrew requires.
- source_word: שושק
  chosen: Shishak
  alternatives:
  - Shoshenq
  lexicon: HALOT
  rationale: Personal names are transliterated by standard biblical English conventions
    per project philosophy. 'Shishak' is the conventional transliteration of the Hebrew
    form, while 'Shoshenq' reflects the Egyptian historical identification rather
    than the Hebrew spelling.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: The construct phrase identifies Shishak's office and realm. English apposition
    naturally renders this as 'Shishak king of Egypt'; the article is not required
    in English.
- source_word: עַל יְרוּשָׁלִָם
  chosen: against Jerusalem
  alternatives:
  - upon Jerusalem
  - to Jerusalem
  lexicon: HALOT
  rationale: With military עלה, the preposition עַל is adversative here, so 'against
    Jerusalem' best conveys the sense. 'Upon Jerusalem' is possible but less natural
    in contemporary English, and 'to Jerusalem' would lose the hostile nuance.
