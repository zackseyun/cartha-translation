id: 1KI.14.14
reference: 1 Kings 14:14
source:
  edition: WLC
  text: וְ/הֵקִים֩ יְהוָ֨ה ל֥/וֹ מֶ֨לֶךְ֙ עַל יִשְׂרָאֵ֔ל אֲשֶׁ֥ר יַכְרִ֛ית אֶת בֵּ֥ית
    יָרָבְעָ֖ם זֶ֣ה הַ/יּ֑וֹם וּ/מֶ֖ה גַּם עָֽתָּה־־־׃
translation:
  text: And the LORD will raise up for himself a king over Israel who will cut off
    the house of Jeroboam this day. And what? Even now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew ending is abrupt and difficult: literally, ''and what? even
      now.'' Some understand it as an exclamation stressing the immediacy of the judgment,
      such as ''and what? even now!'' or ''but what more? already now.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵקִים
  chosen: will raise up
  alternatives:
  - will establish
  - will appoint
  lexicon: HALOT
  rationale: Hiphil of קום commonly means to raise up, establish, or appoint. 'Raise
    up' preserves the idiomatic sense of God bringing a ruler onto the scene without
    over-specifying enthronement mechanics.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers back to the subject, yielding
    the idiom 'raise up for himself.' This reflects the Hebrew construction and avoids
    an unclear third-person referent.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  chosen: a king over Israel
  alternatives:
  - a king for Israel
  lexicon: HALOT
  rationale: עַל with royal rule is naturally 'over.' This keeps the political sense
    of dominion.
- source_word: אֲשֶׁר יַכְרִית
  chosen: who will cut off
  alternatives:
  - who will destroy
  - who will wipe out
  lexicon: HALOT
  rationale: כרת in Hiphil often means to cut off, exterminate, or remove. 'Cut off'
    preserves the Hebrew idiom and its covenant-judgment force.
- source_word: בֵּית יָרָבְעָם
  chosen: the house of Jeroboam
  alternatives:
  - Jeroboam's house
  - Jeroboam's dynasty
  lexicon: HALOT
  rationale: '''House'' is the standard dynastic term in biblical narrative. ''Dynasty''
    is interpretive; ''house'' preserves the source wording while remaining understandable.'
- source_word: זֶה הַיּוֹם
  chosen: this day
  alternatives:
  - today
  - on this very day
  lexicon: HALOT
  rationale: The phrase is literally 'this day.' It can function adverbially as 'today,'
    but the more formal rendering better preserves the Hebrew emphasis and leaves
    the difficult syntax visible.
- source_word: וּמֶה גַּם עָתָּה
  chosen: And what? Even now.
  alternatives:
  - But what? Even now.
  - And what more? Even now.
  - But what indeed? Even now.
  lexicon: HALOT
  rationale: This closing clause is notoriously abrupt and elliptical in Hebrew. Rather
    than smoothing it into a paraphrase, the translation preserves the broken, emphatic
    force. 'Even now' reflects גַּם עָתָּה straightforwardly.
