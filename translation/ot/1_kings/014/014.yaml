theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Handling the difficult final clause וּמֶה גַּם עָתָּה
  chosen_reading: Preserve the Hebrew abruptness rather than resolve it into a smoother
    interpretive paraphrase.
  alternative_readings:
  - But what? Even now.
  - And what more? Even now.
  - The judgment is already beginning now.
  rationale: The text is syntactically compressed and uncertain. Following the translation
    philosophy, the draft preserves the tension and does not import a more definite
    meaning than the Hebrew warrants.
