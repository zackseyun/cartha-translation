id: 1KI.14.18
reference: 1 Kings 14:18
source:
  edition: WLC
  text: וַ/יִּקְבְּר֥וּ אֹת֛/וֹ וַ/יִּסְפְּדוּ ל֖/וֹ כָּל יִשְׂרָאֵ֑ל כִּ/דְבַ֤ר יְהוָה֙
    אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַד עַבְדּ֖/וֹ אֲחִיָּ֥הוּ הַ/נָּבִֽיא־־־׃
translation:
  text: They buried him, and all Israel mourned for him, according to the word of
    the LORD that he had spoken through his servant Ahijah the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of his servant Ahijah the prophet,'' an idiom meaning
      ''through his servant Ahijah the prophet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: They buried
  alternatives:
  - And they buried
  lexicon: HALOT
  rationale: Qal wayyiqtol plural of קבר, straightforward narrative past. English
    omits the repeated conjunction for natural style while preserving sequence.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the deceased son in context; standard
    English object pronoun.
- source_word: וַיִּסְפְּדוּ לוֹ
  chosen: mourned for him
  alternatives:
  - lamented for him
  - wailed for him
  lexicon: HALOT
  rationale: ספד denotes public mourning or lamentation, often at death. 'Mourned
    for him' is natural modern English and fits the burial context without overstating
    vocal expression.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Conventional collective expression for the people/nation. 'All Israel'
    is concise and idiomatic.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  - just as the LORD had said
  lexicon: HALOT
  rationale: כְּ plus דָבָר expresses conformity to what was spoken. 'According to
    the word of the LORD' preserves the formal prophetic-fulfillment wording. YHWH
    is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had spoken
  alternatives:
  - which he spoke
  - that he spoke
  lexicon: HALOT
  rationale: Relative clause referring back to 'the word of the LORD.' Pluperfect
    English ('had spoken') clarifies prior speech relative to the burial event.
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  - by
  lexicon: HALOT
  rationale: The idiom 'by the hand of' commonly marks agency/instrumentality in prophetic
    mediation. 'Through' communicates the sense clearly in modern English, while preserving
    mediated divine speech.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic and royal service
    formulas 'servant' is the most idiomatic and contextually appropriate English,
    emphasizing commissioned service rather than bonded status.
- source_word: אֲחִיָּהוּ
  chosen: Ahijah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per project
    philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Ahijah's role; retained directly in English.
