theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name, but the project default is to render
    it as 'the LORD' rather than transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Prophetic mediation formula בְּיַד עַבְדּוֹ
  chosen_reading: through his servant
  alternative_readings:
  - by the hand of his servant
  rationale: The text presents the LORD's word as mediated through Ahijah without
    adding doctrinal claims about inspiration beyond the wording itself. 'Through'
    preserves the agency clearly in contemporary English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
