id: 1KI.14.6
reference: 1 Kings 14:6
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ אֲחִיָּ֜הוּ אֶת ק֤וֹל רַגְלֶ֨י/הָ֙ בָּאָ֣ה בַ/פֶּ֔תַח
    וַ/יֹּ֕אמֶר בֹּ֖אִי אֵ֣שֶׁת יָרָבְעָ֑ם לָ֣/מָּה זֶּ֗ה אַ֚תְּ מִתְנַכֵּרָ֔ה וְ/אָ֣נֹכִ֔י
    שָׁל֥וּחַ אֵלַ֖יִ/ךְ קָשָֽׁה־׃
translation:
  text: And when Ahijah heard the sound of her feet as she came in at the doorway,
    he said, “Come in, wife of Jeroboam. Why are you disguising yourself? For I have
    been sent to you with a hard message.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you pretend to be another?'
    reason: lexical_alternative
  - marker: b
    text: Literally 'I am sent to you hard'; the Hebrew leaves the noun unstated,
      implying a severe message or news.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל רַגְלֶיהָ
  chosen: the sound of her feet
  alternatives:
  - the sound of her footsteps
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew imagery. 'Footsteps' is smoother
    English, but 'the sound of her feet' stays closer to the source while remaining
    understandable.
- source_word: בָּאָה בַפֶּתַח
  chosen: as she came in at the doorway
  alternatives:
  - as she came to the entrance
  - when she came in at the door
  lexicon: HALOT
  rationale: The participial/finite sequence is rendered naturally in English as ongoing
    action. 'Doorway' reflects פֶּתַח as entrance/opening rather than necessarily
    the physical door itself.
- source_word: בֹּאִי
  chosen: Come in
  alternatives:
  - Enter
  lexicon: HALOT
  rationale: An imperative addressed to a woman. 'Come in' is idiomatic modern English
    in this context and fits the scene better than the more formal 'Enter.'
- source_word: אֵשֶׁת יָרָבְעָם
  chosen: wife of Jeroboam
  alternatives:
  - Jeroboam's wife
  lexicon: HALOT
  rationale: Both are accurate; 'wife of Jeroboam' preserves the construct relationship
    more transparently and matches the direct address.
- source_word: לָמָּה זֶּה אַתְּ מִתְנַכֵּרָה
  chosen: Why are you disguising yourself?
  alternatives:
  - Why do you pretend to be another?
  - Why are you acting like a stranger?
  lexicon: HALOT
  rationale: The hitpael of נכר here refers to making oneself unrecognizable or assuming
    another identity. 'Disguising yourself' best fits the narrative context of Jeroboam's
    wife coming incognito (cf. v. 2).
- source_word: שָׁלוּחַ אֵלַיִךְ
  chosen: I have been sent to you
  alternatives:
  - I am sent to you
  - I am commissioned to you
  lexicon: HALOT
  rationale: The passive participle conveys a present state resulting from being sent.
    'I have been sent to you' is natural English and preserves the divine-commission
    sense without over-specifying the sender in this clause.
- source_word: קָשָׁה
  chosen: with a hard message
  alternatives:
  - with a harsh message
  - with grievous news
  lexicon: HALOT
  rationale: The adjective 'hard' stands elliptically after 'sent to you' and implies
    a severe or grievous word/message. Supplying 'message' is necessary in English.
    'Hard' preserves the Hebrew's terseness; 'harsh' and 'grievous' are viable interpretive
    alternatives.
