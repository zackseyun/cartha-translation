theological_decisions:
- issue: Implicit object after 'hard' (קָשָׁה)
  chosen_reading: 'Supply ''message'' in English: ''with a hard message'''
  alternative_readings:
  - '''with harsh news'''
  - '''for a hard task'''
  rationale: The Hebrew leaves the noun implicit, but in prophetic context the sense
    is that Ahijah has been sent with a severe word/oracle for her. 'Message' is the
    least interpretive supplied noun and avoids importing a narrower theological category
    than the text requires.
  doctrine_reference: Translation philosophy §1, §3, §6
