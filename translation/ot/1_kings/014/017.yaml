id: 1KI.14.17
reference: 1 Kings 14:17
source:
  edition: WLC
  text: וַ/תָּ֨קָם֙ אֵ֣שֶׁת יָרָבְעָ֔ם וַ/תֵּ֖לֶךְ וַ/תָּבֹ֣א תִרְצָ֑תָ/ה הִ֛יא בָּאָ֥ה
    בְ/סַף הַ/בַּ֖יִת וְ/הַ/נַּ֥עַר מֵֽת־׃
translation:
  text: Then Jeroboam’s wife arose and went and came to Tirzah. As she came to the
    threshold of the house, the boy died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when she came to the threshold of the house.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, narrating the next action in sequence. 'Arose'
    preserves the Hebrew narrative style better than the more colloquial 'got up,'
    while not overinterpreting it as departure alone.
- source_word: אֵשֶׁת יָרָבְעָם
  chosen: Jeroboam’s wife
  alternatives:
  - the wife of Jeroboam
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes marital relation. The possessive
    form is natural modern English.
- source_word: וַתֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - traveled
  lexicon: HALOT
  rationale: הלך in simple narrative sequence is best rendered 'went.' More specific
    travel nuance is not demanded by the context.
- source_word: וַתָּבֹא תִרְצָתָה
  chosen: came to Tirzah
  alternatives:
  - entered Tirzah
  - arrived at Tirzah
  lexicon: HALOT
  rationale: בוא with directional he on תִרְצָתָה indicates movement to Tirzah. 'Came
    to Tirzah' is idiomatic and preserves the destination sense without implying entry
    into a building or gate specifically.
- source_word: הִיא בָּאָה
  chosen: As she came
  alternatives:
  - when she came
  - she was coming
  lexicon: HALOT
  rationale: The independent pronoun plus participle gives a temporal/circumstantial
    sense introducing the decisive moment. 'As she came' captures the ongoing action
    at the point of arrival.
- source_word: בְסַף הַבַּיִת
  chosen: to the threshold of the house
  alternatives:
  - to the doorway of the house
  - at the threshold of the house
  lexicon: HALOT
  rationale: סַף denotes threshold/sill. 'Threshold' is the most precise lexical equivalent.
    The preposition with the participial clause is rendered naturally in English as
    movement reaching that point.
- source_word: וְהַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, servant, or child depending on context. Here
    it refers to Jeroboam's son in the immediate narrative, and 'the boy' is a clear,
    natural rendering.
- source_word: מֵת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: Though morphologically a qatal form of מות, in this narrative context
    it denotes the event occurring at that moment, fulfilling the prophecy from the
    previous verse. English 'died' best conveys the eventive force.
