id: 1KI.14.31
reference: 1 Kings 14:31
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ב רְחַבְעָ֜ם עִם אֲבֹתָ֗י/ו וַ/יִּקָּבֵ֤ר עִם אֲבֹתָי/ו֙ בְּ/עִ֣יר
    דָּוִ֔ד וְ/שֵׁ֣ם אִמּ֔/וֹ נַעֲמָ֖ה הָ/עַמֹּנִ֑ית וַ/יִּמְלֹ֛ךְ אֲבִיָּ֥ם בְּנ֖/וֹ
    תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Rehoboam slept with his fathers and was buried with his fathers in the
    city of David. And his mother's name was Naamah the Ammonite woman. And Abijam
    his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Naamah the Ammonite.' The Hebrew uses a feminine gentilic, explicitly
      identifying her as an Ammonite woman.
    reason: lexical_alternative
  - marker: b
    text: Abijam is called Abijah in some other passages; this verse specifically
      reads 'Abijam.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal death notices, שׁכב with 'with his fathers' is a conventional
    idiom for death. 'Slept' preserves the Hebrew wording and the formulaic character
    better than the interpretive 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard dynastic burial/death formula. 'Fathers' is retained
    for formal correspondence and because it refers to forefathers in the royal line,
    not merely generic ancestors.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: Straightforward passive rendering of קבר in the narrative sequence.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the conventional place-name expression in English Bible style
    and clearly identifies the royal burial location.
- source_word: וְשֵׁם אִמּוֹ
  chosen: And his mother's name was
  alternatives:
  - Now his mother's name was
  lexicon: HALOT
  rationale: This reproduces the Hebrew notice formula introducing the queen mother's
    identity, a recurring feature in Kings.
- source_word: נַעֲמָה הָעַמֹּנִית
  chosen: Naamah the Ammonite woman
  alternatives:
  - Naamah the Ammonitess
  - Naamah the Ammonite
  lexicon: HALOT
  rationale: The feminine gentilic is explicit in Hebrew. 'Ammonite woman' preserves
    both ethnicity and feminine reference in clear modern English; 'Ammonitess' is
    archaic.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in this succession formula is well rendered 'reigned'; the
    context already implies accession.
- source_word: אֲבִיָּם
  chosen: Abijam
  alternatives:
  - Abijah
  lexicon: HALOT
  rationale: The consonantal form here is אֲבִיָּם, conventionally transliterated
    'Abijam.' Although the same king is called Abijah elsewhere, this verse's form
    should be reflected in translation.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: This idiom marks royal succession. 'In his place' is natural English
    and preserves the sense of replacement/succession.
