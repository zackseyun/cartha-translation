id: 1KI.14.8
reference: 1 Kings 14:8
source:
  edition: WLC
  text: וָ/אֶקְרַ֤ע אֶת הַ/מַּמְלָכָה֙ מִ/בֵּ֣ית דָּוִ֔ד וָ/אֶתְּנֶ֖/הָ לָ֑/ךְ וְ/לֹֽא
    הָיִ֜יתָ כְּ/עַבְדִּ֣/י דָוִ֗ד אֲשֶׁר֩ שָׁמַ֨ר מִצְוֺתַ֜/י וַ/אֲשֶׁר הָלַ֤ךְ אַחֲרַ/י֙
    בְּ/כָל לְבָב֔/וֹ לַ/עֲשׂ֕וֹת רַ֖ק הַ/יָּשָׁ֥ר בְּ/עֵינָֽ/י־־־־׃
translation:
  text: and I tore the kingdom away from the house of David and gave it to you. But
    you have not been like my servant David, who kept my commandments and who walked
    after me with all his heart, doing only what was right in my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'followed me.' The Hebrew literally says 'walked after me.'
    reason: lexical_alternative
  - marker: b
    text: '''House of David'' is a dynastic expression, that is, David''s royal line.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶקְרַע
  chosen: I tore ... away
  alternatives:
  - I tore
  - I ripped away
  - I tore apart
  lexicon: HALOT
  rationale: The verb קרע literally means 'tear/rend.' With the kingdom as object
    and the following phrase 'from the house of David,' English idiom is best captured
    by 'tore ... away,' preserving the vivid metaphor of forcible removal.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal kingdom
  lexicon: HALOT
  rationale: מַמְלָכָה normally denotes the kingdom/reign as a political realm. 'Kingdom'
    is the most natural and sufficiently precise rendering here.
- source_word: מִבֵּית דָּוִד
  chosen: from the house of David
  alternatives:
  - from David's house
  - from the dynasty of David
  lexicon: HALOT
  rationale: '''House of David'' preserves the dynastic idiom of בַּיִת while remaining
    understandable. ''Dynasty'' is interpretive and therefore left as an alternative
    rather than main text.'
- source_word: וָאֶתְּנֶהָ לָךְ
  chosen: gave it to you
  alternatives:
  - have given it to you
  lexicon: HALOT
  rationale: The wayyiqtol sequence narrates past action. 'Gave it to you' fits the
    historical recounting. The pronoun 'it' refers back to 'the kingdom.'
- source_word: וְלֹא הָיִיתָ כְּעַבְדִּי דָוִד
  chosen: you have not been like my servant David
  alternatives:
  - you were not like my servant David
  lexicon: HALOT
  rationale: The perfect after waw + negation can be rendered as a present perfect
    in English to express the state up to the present accusation. 'Servant' is appropriate
    for עֶבֶד here because the covenantal relationship, not bonded status, is foregrounded.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, in royal-covenantal language
    for David the emphasis is honorific service before God. 'My servant' is the most
    contextually fitting rendering.
- source_word: שָׁמַר מִצְוֺתַי
  chosen: kept my commandments
  alternatives:
  - observed my commandments
  - guarded my commandments
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means keep/observe. 'Kept my commandments'
    is idiomatic and preserves covenantal obedience language.
- source_word: הָלַךְ אַחֲרַי
  chosen: walked after me
  alternatives:
  - followed me
  - walked behind me
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'walked after me.' Retaining 'walked after
    me' preserves the metaphor of covenantal following, while remaining intelligible.
    'Followed me' is a viable dynamic alternative.
- source_word: בְּכָל לְבָבוֹ
  chosen: with all his heart
  alternatives:
  - with his whole heart
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for undivided inner devotion. 'With all
    his heart' is the established and natural English equivalent.
- source_word: לַעֲשׂוֹת רַק הַיָּשָׁר
  chosen: doing only what was right
  alternatives:
  - to do only what was right
  - doing just what was right
  lexicon: HALOT
  rationale: The infinitive expresses manner/result relative to David's wholehearted
    devotion. 'Doing only what was right' reads smoothly in English while preserving
    רַק ('only').
- source_word: הַיָּשָׁר בְּעֵינַי
  chosen: what was right in my eyes
  alternatives:
  - what was upright in my sight
  - what was right in my sight
  lexicon: HALOT
  rationale: The idiom 'in my eyes' is common in Hebrew and can be preserved in English
    without obscurity. It emphasizes God's evaluative perspective.
