theological_decisions:
- issue: Agency and judgment wording
  chosen_reading: he will give up Israel
  alternative_readings:
  - he will hand Israel over
  - he will give Israel over
  rationale: The verse states divine judgment without specifying in this clause the
    exact historical instrument. 'Give up' preserves the solemnity and judicial force
    while avoiding interpretive expansion beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §6
- issue: Jeroboam's culpability and Israel's induced sin
  chosen_reading: which he committed and by which he caused Israel to sin
  alternative_readings:
  - that he sinned and that he made Israel sin
  rationale: The Hebrew presents both Jeroboam's personal guilt and his role in leading
    the nation into sin. The translation preserves both dimensions without softening
    the causative force of the Hiphil.
  doctrine_reference: Translation philosophy §3, §5
