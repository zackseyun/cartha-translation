id: 1KI.14.1
reference: 1 Kings 14:1
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֔יא חָלָ֖ה אֲבִיָּ֥ה בֶן יָרָבְעָֽם־׃
translation:
  text: At that time Abijah son of Jeroboam became sick.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - In that time
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'in/at that time.' 'At that
    time' is idiomatic modern English and preserves the narrative temporal marker
    without unnecessary stiffness.
- source_word: חָלָה
  chosen: became sick
  alternatives:
  - was sick
  - fell ill
  lexicon: HALOT
  rationale: The verb חלה commonly denotes becoming ill or being sick. In this narrative
    wayyiqtol/qatal-style report, 'became sick' best captures the onset of illness,
    which fits the story's progression better than the stative-sounding 'was sick.'
    'Fell ill' is possible but slightly more idiomatic than necessary.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Abijah' is the familiar and standard transliteration for
    אֲבִיָּה in this context.
- source_word: בֶן יָרָבְעָם
  chosen: son of Jeroboam
  alternatives:
  - Jeroboam's son
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'son of Jeroboam.' This
    preserves the formal relationship stated in the Hebrew while remaining natural
    English.
