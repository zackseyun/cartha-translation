id: 1KI.14.13
reference: 1 Kings 14:13
source:
  edition: WLC
  text: וְ/סָֽפְדוּ ל֤/וֹ כָל יִשְׂרָאֵל֙ וְ/קָבְר֣וּ אֹת֔/וֹ כִּֽי זֶ֣ה לְ/בַדּ֔/וֹ יָבֹ֥א לְ/יָרָבְעָ֖ם אֶל קָ֑בֶר יַ֣עַן נִמְצָא ב֞/וֹ דָּבָ֣ר ט֗וֹב אֶל יְהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל בְּ/בֵ֥ית יָרָבְעָֽם־־־־־־׃
translation:
  text: All Israel will mourn for him and bury him, because he alone of Jeroboam’s house will come to the grave, since in him something good toward Yahweh, the God of Israel, has been found in the house of Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he alone will come to Jeroboam, to the grave'—that is, he alone from Jeroboam’s house will receive burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'a good thing' instead of 'something good.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'toward the LORD'; this may mean a disposition or quality directed toward, or pleasing in relation to, the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפְדוּ
  chosen: will mourn
  alternatives:
  - will lament
  - will wail for
  lexicon: HALOT
  rationale: The verb ספד denotes mourning or lamentation for the dead. 'Will mourn' is natural modern English and fits the public grieving context without overstating the intensity.
- source_word: וְקָבְרוּ אֹתוֹ
  chosen: and bury him
  alternatives:
  - and they will bury him
  lexicon: HALOT
  rationale: The Hebrew verb with object suffix straightforwardly means 'bury him.' English can omit the explicit subject because 'All Israel' carries over naturally.
- source_word: כִּי זֶה לְבַדּוֹ
  chosen: because he alone
  alternatives:
  - for this one alone
  - because this one by himself
  lexicon: HALOT
  rationale: This idiom emphasizes exclusivity. 'He alone' is idiomatic and preserves the contrast with the rest of Jeroboam's household.
- source_word: יָבֹא לְיָרָבְעָם אֶל קָבֶר
  chosen: of Jeroboam’s house will come to the grave
  alternatives:
  - will come to a grave among Jeroboam's family
  - will be the only one belonging to Jeroboam to enter a grave
  lexicon: HALOT
  rationale: Literally, 'will come to Jeroboam to a grave' is awkward in English. In context the sense is that this is the only member of Jeroboam's line who will receive burial. 'Of Jeroboam’s house will come to the grave' makes the implied familial sense explicit while staying close to the Hebrew.
- source_word: קָבֶר
  chosen: the grave
  alternatives:
  - a grave
  - burial
  lexicon: HALOT
  rationale: The noun refers to a grave/tomb. 'The grave' works idiomatically in English for honorable burial; 'burial' would be more interpretive.
- source_word: יַעַן
  chosen: since
  alternatives:
  - because
  - inasmuch as
  lexicon: HALOT
  rationale: יַעַן introduces the reason for the preceding statement. 'Since' is clear, natural, and preserves the causal force.
- source_word: נִמְצָא בוֹ
  chosen: has been found in him
  alternatives:
  - was found in him
  lexicon: HALOT
  rationale: The passive perfect/niphal indicates discovery of a quality in the boy. Present perfect English reflects the resulting state naturally in this prophetic announcement.
- source_word: דָּבָר טוֹב
  chosen: something good
  alternatives:
  - a good thing
  - some good
  lexicon: HALOT
  rationale: The phrase is indefinite and broad, referring to some commendable quality or disposition. 'Something good' is idiomatic and preserves the indefiniteness.
- source_word: אֶל יְהוָה
  chosen: toward the LORD
  alternatives:
  - before the LORD
  - with respect to the LORD
  lexicon: HALOT
  rationale: The preposition אֶל after 'something good' suggests orientation toward or in relation to the LORD. 'Toward the LORD' preserves that directional nuance better than the more interpretive 'before the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּבֵית יָרָבְעָם
  chosen: in the house of Jeroboam
  alternatives:
  - in Jeroboam's household
  - among Jeroboam's house
  lexicon: HALOT
  rationale: '''House'' here denotes household/dynasty. Retaining ''house'' preserves the dynastic nuance common in biblical narrative while remaining understandable.'
