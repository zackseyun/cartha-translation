id: 1KI.14.5
reference: 1 Kings 14:5
source:
  edition: WLC
  text: וַ/יהוָ֞ה אָמַ֣ר אֶל אֲחִיָּ֗הוּ הִנֵּ֣ה אֵ֣שֶׁת יָרָבְעָ֡ם בָּאָ֣ה לִ/דְרֹשׁ֩ דָּבָ֨ר מֵ/עִמְּ/ךָ֤ אֶל בְּנָ/הּ֙ כִּֽי חֹלֶ֣ה ה֔וּא כָּ/זֹ֥ה וְ/כָ/זֶ֖ה תְּדַבֵּ֣ר אֵלֶ֑י/הָ וִ/יהִ֣י כְ/בֹאָ֔/הּ וְ/הִ֖יא מִתְנַכֵּרָֽה־־־׃
translation:
  text: And Yahweh said to Ahijah, “Behold, Jeroboam’s wife is coming to inquire of you concerning her son, for he is sick. Thus and thus you shall say to her. And when she comes, she will be disguising herself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''thus and thus''—an idiom meaning a specific message whose content is not yet stated explicitly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she will pretend to be another woman.' The Hebrew verb conveys making oneself unrecognized or disguised.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name יְהוָה as 'the LORD' per DOCTRINE.md.
- source_word: אָמַר אֶל
  chosen: said to
  alternatives:
  - spoke to
  lexicon: HALOT
  rationale: Standard idiomatic rendering of אמר אל in narrative discourse.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Marks attention and immediacy. 'Look' preserves the deictic force in readable modern English better than archaic 'Behold.'
- source_word: אֵשֶׁת יָרָבְעָם
  chosen: Jeroboam’s wife
  alternatives:
  - the wife of Jeroboam
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English while preserving possession.
- source_word: בָּאָה
  chosen: is coming
  alternatives:
  - is about to come
  - comes
  lexicon: HALOT
  rationale: The participle-like imminent sense in context is well conveyed by the progressive 'is coming.'
- source_word: לִדְרֹשׁ דָּבָר מֵעִמְּךָ
  chosen: to ask you about
  alternatives:
  - to inquire of you concerning
  - to seek a word from you about
  lexicon: HALOT
  rationale: דרשׁ דבר with מן/עם someone means to seek information or an oracle. 'Ask you about' is concise and natural, while still fitting the prophetic-consultation context.
- source_word: אֶל בְּנָהּ
  chosen: about her son
  alternatives:
  - concerning her son
  lexicon: HALOT
  rationale: Governed by the inquiry phrase; 'about' is idiomatic English.
- source_word: כִּי חֹלֶה הוּא
  chosen: because he is sick
  alternatives:
  - for he is ill
  lexicon: HALOT
  rationale: Direct and natural rendering of the causal clause.
- source_word: כָּזֹה וְכָזֶה
  chosen: like this and like that
  alternatives:
  - thus and thus
  - this and that
  lexicon: HALOT
  rationale: The Hebrew formula indicates specific but as-yet-unspecified content. 'Like this and like that' preserves the idiomatic sense in contemporary English better than the archaic 'thus and thus.'
- source_word: תְּדַבֵּר אֵלֶיהָ
  chosen: You shall speak to her
  alternatives:
  - you are to say to her
  - you shall tell her
  lexicon: HALOT
  rationale: Direct future/instructional force addressed to Ahijah.
- source_word: וִיהִי כְבֹאָהּ
  chosen: And when she comes
  alternatives:
  - And it shall be, when she comes
  - When she enters
  lexicon: HALOT
  rationale: Narrative formula simplified into natural English while preserving temporal sense.
- source_word: וְהִיא מִתְנַכֵּרָה
  chosen: she will be disguising herself
  alternatives:
  - she will pretend to be another woman
  - she will be unrecognizable
  - she is disguising herself
  lexicon: HALOT
  rationale: The hitpael of נכר here conveys making oneself unrecognized or disguised. 'Disguising herself' best captures the reflexive nuance. The future-progressive fits the predictive context at the moment of her arrival.
