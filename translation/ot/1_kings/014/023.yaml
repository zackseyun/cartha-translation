id: 1KI.14.23
reference: 1 Kings 14:23
source:
  edition: WLC
  text: וַ/יִּבְנ֨וּ גַם הֵ֧מָּה לָ/הֶ֛ם בָּמ֥וֹת וּ/מַצֵּב֖וֹת וַ/אֲשֵׁרִ֑ים עַ֚ל
    כָּל גִּבְעָ֣ה גְבֹהָ֔ה וְ/תַ֖חַת כָּל עֵ֥ץ רַעֲנָֽן־־־׃
translation:
  text: They too built for themselves high places, pillars, and Asherah poles on every
    high hill and under every green tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asherim' or 'sacred poles'; the Hebrew term refers to cult objects associated
      with Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְנוּ
  chosen: built
  alternatives:
  - made
  - set up
  lexicon: HALOT
  rationale: The verb בנה normally means 'build.' Here it governs cultic installations,
    so 'built' is the most direct rendering and fits English idiom for constructing
    worship sites.
- source_word: גַם הֵמָּה
  chosen: they too
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: The combination adds emphasis and continuity with the preceding context
    about Judah's sins. 'They too' is natural English and preserves the additive force.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition with pronoun is reflexive in sense here, indicating these
    were cultic sites established for their own use or benefit.
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - hill shrines
  - cultic high places
  lexicon: HALOT
  rationale: '''High places'' is the standard and accurate rendering for bamot, referring
    to local worship sites. Although somewhat traditional, it remains the clearest
    concise English equivalent.'
- source_word: מַצֵּבוֹת
  chosen: pillars
  alternatives:
  - sacred pillars
  - standing stones
  lexicon: HALOT
  rationale: The term denotes erected cultic stones or pillars. 'Pillars' is concise
    and readable; the cultic sense is clear from context. 'Standing stones' is possible
    but less idiomatic in this list.
- source_word: אֲשֵׁרִים
  chosen: Asherah poles
  alternatives:
  - Asherim
  - sacred poles
  lexicon: HALOT
  rationale: The plural can refer either to cult objects associated with Asherah or,
    less likely in some contexts, the goddess herself. 'Asherah poles' communicates
    the likely referent as wooden cult symbols without flattening the connection to
    Asherah.
- source_word: עַל כָּל גִּבְעָה גְבֹהָה
  chosen: on every high hill
  alternatives:
  - on every lofty hill
  - upon every high hill
  lexicon: HALOT
  rationale: This phrase is a stereotyped description of illicit worship locations.
    'On every high hill' is natural English and preserves both the topographical and
    rhetorical force.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  chosen: and under every green tree
  alternatives:
  - and under every leafy tree
  - and under every luxuriant tree
  lexicon: HALOT
  rationale: רַעֲנָן denotes freshness/luxuriance. 'Green tree' is a familiar biblical
    collocation and remains understandable in modern English, preserving the stock
    phrase used for idol worship settings.
