theological_decisions:
- issue: Whether אֲשֵׁרִים refers to the goddess Asherah or to cultic objects associated
    with her
  chosen_reading: cultic objects rendered as 'Asherah poles'
  alternative_readings:
  - Asherim
  - the Asherahs
  - images of Asherah
  rationale: In this construction alongside 'high places' and 'pillars,' the term
    most naturally denotes physical cult objects rather than the deity directly. Rendering
    it 'Asherah poles' preserves the religious specificity while making the object-reference
    explicit for English readers.
