id: 1KI.14.3
reference: 1 Kings 14:3
source:
  edition: WLC
  text: וְ/לָקַ֣חַתְּ בְּ֠/יָדֵ/ךְ עֲשָׂרָ֨ה לֶ֧חֶם וְ/נִקֻּדִ֛ים וּ/בַקְבֻּ֥ק דְּבַ֖שׁ
    וּ/בָ֣את אֵלָ֑י/ו ה֚וּא יַגִּ֣יד לָ֔/ךְ מַה יִּֽהְיֶ֖ה לַ/נָּֽעַר־׃
translation:
  text: And take in your hand ten loaves of bread, some cakes, and a jar of honey,
    and go to him. He will tell you what will happen to the boy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some biscuits' or 'wafer cakes'; the Hebrew term refers to a kind of
      baked food item, but the exact form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'what will become of the boy.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחַתְּ
  chosen: And take
  alternatives:
  - and you shall take
  - then take
  lexicon: HALOT
  rationale: Qal perfect 2fs with prefixed conjunction in instructional sequence;
    rendered as an imperative-like continuation in natural English.
- source_word: בְּיָדֵךְ
  chosen: in your hand
  alternatives:
  - with you
  - in your possession
  lexicon: HALOT
  rationale: Literal idiom retained because it is natural enough in English and preserves
    the concrete sense of carrying the items personally.
- source_word: עֲשָׂרָה לֶחֶם
  chosen: ten loaves of bread
  alternatives:
  - ten breads
  - ten pieces of bread
  lexicon: HALOT
  rationale: Though לֶחֶם is singular, English idiom requires a countable expression;
    'loaves of bread' best conveys ten bread items.
- source_word: נִקֻּדִים
  chosen: some cakes
  alternatives:
  - crackers
  - biscuits
  - wafer cakes
  lexicon: HALOT
  rationale: The term denotes a kind of marked or punctured baked item, likely small
    cakes or biscuits. 'Cakes' is understandable modern English without over-specifying
    the exact ancient form.
- source_word: בַקְבֻּק דְּבַשׁ
  chosen: a jar of honey
  alternatives:
  - a flask of honey
  - a bottle of honey
  lexicon: HALOT
  rationale: בַקְבֻּק refers to a small container or flask. 'Jar' is idiomatic and
    suitably general for a portable vessel.
- source_word: וּבָאת אֵלָיו
  chosen: and go to him
  alternatives:
  - and come to him
  - then go to him
  lexicon: HALOT
  rationale: Hebrew often uses 'come' from the speaker's perspective; in English narrative
    instruction, 'go to him' is more natural.
- source_word: הוּא יַגִּיד לָךְ
  chosen: He will tell you
  alternatives:
  - he will declare to you
  - he will make known to you
  lexicon: HALOT
  rationale: Hiphil of נגד means to tell, declare, or make known. 'Tell you' is clear,
    natural, and sufficient in context.
- source_word: מַה יִּהְיֶה
  chosen: what will happen
  alternatives:
  - what will be
  - what will become
  lexicon: HALOT
  rationale: Idiomatic future expression in context of the child's condition; 'what
    will happen' communicates the predictive sense better than the more wooden 'what
    will be.'
- source_word: לַנָּעַר
  chosen: to the boy
  alternatives:
  - to the child
  - for the boy
  - to the young man
  lexicon: HALOT
  rationale: נַעַר can range from child to young man. In this context, referring to
    Abijah, 'boy' best fits the parental concern and likely age implied by the narrative.
