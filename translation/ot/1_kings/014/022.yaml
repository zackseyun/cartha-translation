id: 1KI.14.22
reference: 1 Kings 14:22
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ יְהוּדָ֛ה הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יְקַנְא֣וּ אֹת֗/וֹ מִ/כֹּל֙
    אֲשֶׁ֣ר עָשׂ֣וּ אֲבֹתָ֔/ם בְּ/חַטֹּאתָ֖/ם אֲשֶׁ֥ר חָטָֽאוּ׃
translation:
  text: And Judah did what was evil in the eyes of the LORD, and they provoked him
    to jealousy more than all that their fathers had done, by the sins that they committed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they made him jealous' or 'they aroused his jealousy.' The Hebrew uses
      covenantal jealousy language for the LORD's response to Judah's unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  lexicon: HALOT
  rationale: Proper name for the southern kingdom/people. Singular form takes a collective
    sense in context, which explains the later plural verb.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: The idiom עשה + הרע is naturally rendered 'do what is evil' in English
    rather than the more wooden 'do the evil.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Standard Hebrew evaluative idiom. 'In the eyes of' preserves the metaphor
    while remaining clear. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: וַיְקַנְאוּ אֹתוֹ
  chosen: they provoked him to jealousy
  alternatives:
  - they made him jealous
  - they aroused his jealousy
  lexicon: HALOT
  rationale: The hiphil/piel usage of קנא with object refers to provoking divine jealousy,
    not envy in a sinful sense. This rendering preserves covenantal jealousy language
    without implying moral defect in God.
- source_word: מִכֹּל אֲשֶׁר עָשׂוּ אֲבֹתָם
  chosen: more than all that their fathers had done
  alternatives:
  - beyond everything their fathers did
  - more than anything their fathers did
  lexicon: HALOT
  rationale: מן with כל after a comparative sense is best expressed as 'more than
    all that.' 'Fathers' here means ancestors/forefathers, but 'fathers' is retained
    for source-near consistency.
- source_word: בְּחַטֹּאתָם אֲשֶׁר חָטָאוּ
  chosen: by the sins that they committed
  alternatives:
  - with their sins that they sinned
  - through the sins they committed
  lexicon: HALOT
  rationale: Hebrew uses cognate noun + verb for emphasis. English smooths this to
    'the sins that they committed' while preserving causative/instrumental בְּ as
    'by.'
