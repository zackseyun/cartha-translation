theological_decisions:
- issue: Divine jealousy language
  chosen_reading: provoked him to jealousy
  alternative_readings:
  - made him jealous
  - aroused his zeal
  rationale: The verse attributes covenantal jealousy to the LORD in response to Judah's
    sins. The translation preserves the biblical category of divine jealousy rather
    than softening it into mere anger or zeal, while avoiding any implication of sinful
    envy.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → the
    LORD'
