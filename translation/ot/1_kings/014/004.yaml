id: 1KI.14.4
reference: 1 Kings 14:4
source:
  edition: WLC
  text: וַ/תַּ֤עַשׂ כֵּן֙ אֵ֣שֶׁת יָרָבְעָ֔ם וַ/תָּ֨קָם֙ וַ/תֵּ֣לֶךְ שִׁלֹ֔ה וַ/תָּבֹ֖א
    בֵּ֣ית אֲחִיָּ֑ה וַ/אֲחִיָּ֨הוּ֙ לֹֽא יָכֹ֣ל לִ/רְא֔וֹת כִּ֛י קָ֥מוּ עֵינָ֖י/ו
    מִ/שֵּׂיבֽ/וֹ־׃ס
translation:
  text: Jeroboam’s wife did so. She arose and went to Shiloh, and came to Ahijah’s
    house. Now Ahijah could not see, because his eyes were fixed because of his old
    age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his eyes stood because of his old age,' an idiom describing
      age-related loss of sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַשׂ כֵּן
  chosen: did so
  alternatives:
  - did thus
  - did accordingly
  lexicon: HALOT
  rationale: Idiomatic Hebrew narrative formula meaning she acted in accordance with
    the prior instruction; 'did so' is natural modern English and sufficiently formal.
- source_word: אֵשֶׁת יָרָבְעָם
  chosen: Jeroboam’s wife
  alternatives:
  - the wife of Jeroboam
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered with English possessive for
    readability.
- source_word: וַתָּקָם
  chosen: she arose
  alternatives:
  - she got up
  - she rose
  lexicon: HALOT
  rationale: Retains the narrative sequence and slightly formal cadence common in
    Hebrew wayyiqtol storytelling without sounding archaic.
- source_word: וַתֵּלֶךְ שִׁלֹה
  chosen: went to Shiloh
  alternatives:
  - traveled to Shiloh
  lexicon: HALOT
  rationale: Simple motion verb with destination; 'went to' best matches the plain
    sense.
- source_word: וַתָּבֹא בֵּית אֲחִיָּה
  chosen: came to Ahijah’s house
  alternatives:
  - entered Ahijah’s house
  - came into the house of Ahijah
  lexicon: HALOT
  rationale: With בֵּית as destination, the phrase can denote arrival at the house
    rather than emphasizing entry into the interior. 'Came to' preserves the movement
    sequence naturally.
- source_word: וַאֲחִיָּהוּ
  chosen: Now Ahijah
  alternatives:
  - And Ahijah
  - As for Ahijah
  lexicon: HALOT
  rationale: The waw here shifts attention to Ahijah. 'Now Ahijah' marks the scene
    transition smoothly in English.
- source_word: לֹא יָכֹל לִרְאוֹת
  chosen: could not see
  alternatives:
  - was unable to see
  lexicon: HALOT
  rationale: Direct rendering of ability plus infinitive; concise and natural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Ahijah’s inability to see.
- source_word: קָמוּ עֵינָיו
  chosen: his eyes were fixed
  alternatives:
  - his eyes were set
  - his eyes had become immobile
  - his eyes were dim
  lexicon: HALOT
  rationale: Literally 'his eyes stood.' The idiom indicates loss of normal visual
    function in old age. 'Were fixed' preserves the concrete imagery better than the
    more interpretive 'were dim,' while still communicating impairment.
- source_word: מִשֵּׂיבוֹ
  chosen: because of his old age
  alternatives:
  - from his old age
  - due to his age
  lexicon: HALOT
  rationale: The preposition marks cause/source; 'because of his old age' is clear
    idiomatic English.
