id: 1KI.14.7
reference: 1 Kings 14:7
source:
  edition: WLC
  text: לְכִ֞י אִמְרִ֣י לְ/יָרָבְעָ֗ם כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל יַ֛עַן אֲשֶׁ֥ר הֲרִימֹתִ֖י/ךָ מִ/תּ֣וֹךְ הָ/עָ֑ם וָ/אֶתֶּנְ/ךָ֣ נָגִ֔יד עַ֖ל עַמִּ֥/י יִשְׂרָאֵֽל־׃
translation:
  text: 'Go and say to Jeroboam, ‘Thus says Yahweh, the God of Israel: Because I raised you up from among the people and made you ruler over my people Israel,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I exalted you” for “I raised you up.”
    reason: lexical_alternative
  - marker: b
    text: Or “appointed you leader” for “made you ruler.” The Hebrew literally says “gave you as ruler.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי
  chosen: Go
  alternatives:
  - Come/go
  lexicon: HALOT
  rationale: Imperative of הלך addressed to Ahijah's wife; in English, 'Go' is the natural directive in context.
- source_word: אִמְרִי
  chosen: say
  alternatives:
  - speak
  lexicon: HALOT
  rationale: Common imperative of אמר introducing the message to be delivered; 'say' fits standard prophetic speech formula.
- source_word: לְיָרָבְעָם
  chosen: to Jeroboam
  lexicon: HALOT
  rationale: Preposition ל marks the indirect object of the speech; personal name is transliterated per translation philosophy.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal force and recognizable discourse pattern.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally; straightforwardly rendered.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the ground for the coming judgment speech; 'Because' is clear modern English and preserves causal force.
- source_word: הֲרִימֹתִיךָ
  chosen: I raised you up
  alternatives:
  - I exalted you
  - I lifted you up
  lexicon: HALOT
  rationale: Hiphil of רום here refers to elevating Jeroboam to status/position; 'raised you up' preserves both literal metaphor and political elevation.
- source_word: מִתּוֹךְ הָעָם
  chosen: from among the people
  alternatives:
  - from the midst of the people
  - out of the people
  lexicon: HALOT
  rationale: Expresses selection from within the populace; 'from among the people' is idiomatic and accurate.
- source_word: וָאֶתֶּנְךָ
  chosen: and made you
  alternatives:
  - and gave you as
  - and appointed you
  lexicon: HALOT
  rationale: Literally 'and I gave you,' but with predicate accusative נָגִיד the sense is appointment to office; 'made you' communicates the idiom naturally without obscuring agency.
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in authority, often by divine appointment. 'Ruler' is clear and suitably weighty; 'prince' is archaic/misleading in modern English, and 'leader' can sound too informal.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - over Israel my people
  lexicon: HALOT
  rationale: Preserves divine possessive 'my people' and the object of Jeroboam's rule; natural English order is preferred.
