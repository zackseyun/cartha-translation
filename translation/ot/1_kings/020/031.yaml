id: 1KI.20.31
reference: 1 Kings 20:31
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָי/ו֮ עֲבָדָי/ו֒ הִנֵּֽה נָ֣א שָׁמַ֔עְנוּ כִּ֗י מַלְכֵי֙
    בֵּ֣ית יִשְׂרָאֵ֔ל כִּֽי מַלְכֵ֥י חֶ֖סֶד הֵ֑ם נָשִׂ֣ימָה נָּא֩ שַׂקִּ֨ים בְּ/מָתְנֵ֜י/נוּ
    וַ/חֲבָלִ֣ים בְּ/רֹאשֵׁ֗/נוּ וְ/נֵצֵא֙ אֶל מֶ֣לֶךְ יִשְׂרָאֵ֔ל אוּלַ֖י יְחַיֶּ֥ה
    אֶת נַפְשֶֽׁ/ךָ־־־־׃
translation:
  text: And his servants said to him, “Look, please, we have heard that the kings
    of the house of Israel are merciful kings. Please let us put sackcloth around
    our waists and ropes on our heads, and let us go out to the king of Israel; perhaps
    he will let you live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “perhaps he will spare your life.”
    reason: lexical_alternative
  - marker: b
    text: “Ropes on our heads” likely signifies a public gesture of surrender or submission.
    reason: cultural_note
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: In this royal court context, עבד commonly denotes attendants or court
    servants. 'Servants' is the most natural English rendering here without overstating
    bonded status.
- source_word: הִנֵּה נָא
  chosen: Look, please
  alternatives:
  - Behold, please
  - Please look
  lexicon: HALOT
  rationale: הִנֵּה introduces attention, while נָא adds politeness/urgency. 'Look,
    please' preserves both discourse force and natural modern English.
- source_word: כִּי מַלְכֵי בֵּית יִשְׂרָאֵל כִּי מַלְכֵי חֶסֶד הֵם
  chosen: that the kings of the house of Israel are merciful kings
  alternatives:
  - that the kings of the house of Israel are kind kings
  - that the kings of Israel are kings of mercy
  lexicon: HALOT
  rationale: חֶסֶד here describes a reputation for clemency/mercy. 'Merciful kings'
    is idiomatic and preserves the predicate emphasis. 'House of Israel' is retained
    rather than simplified to 'Israel' because it is explicit in the Hebrew.
- source_word: נָשִׂימָה נָּא
  chosen: Please let us put
  alternatives:
  - Let us please put
  - Please, let us place
  lexicon: HALOT
  rationale: Cohortative first person plural with נָא expresses a polite proposal.
    'Please let us put' captures both volition and politeness in readable English.
- source_word: שַׂקִּים בְּמָתְנֵינוּ
  chosen: sackcloth around our waists
  alternatives:
  - sackcloth on our loins
  - sackcloth around our loins
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the waist/loins. 'Around our waists' is more natural
    modern English while preserving the image of mourning garb.
- source_word: חֲבָלִים בְּרֹאשֵׁנוּ
  chosen: ropes on our heads
  alternatives:
  - ropes around our heads
  - cords on our heads
  lexicon: HALOT
  rationale: חבל can mean rope/cord. The phrase likely signifies a gesture of submission
    or captivity. 'Ropes on our heads' stays close to the Hebrew wording while remaining
    intelligible.
- source_word: וְנֵצֵא אֶל מֶלֶךְ יִשְׂרָאֵל
  chosen: and let us go out to the king of Israel
  alternatives:
  - and let us go to the king of Israel
  - and we will go out to the king of Israel
  lexicon: HALOT
  rationale: The cohortative continues the proposed course of action. 'Go out to'
    reflects יָצָא plus אֶל more closely than simply 'go to.'
- source_word: אוּלַי יְחַיֶּה אֶת נַפְשֶׁךָ
  chosen: perhaps he will let you live
  alternatives:
  - perhaps he will spare your life
  - perhaps he will keep you alive
  lexicon: HALOT
  rationale: The piel of חיה with נֶפֶשׁ means to preserve life. 'Let you live' is
    concise and natural; 'spare your life' is a valid interpretive alternative worth
    preserving.
