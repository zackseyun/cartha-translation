id: 1KI.20.22
reference: 1 Kings 20:22
source:
  edition: WLC
  text: וַ/יִּגַּ֤שׁ הַ/נָּבִיא֙ אֶל מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יֹּ֤אמֶר ל/וֹ֙ לֵ֣ךְ הִתְחַזַּ֔ק
    וְ/דַ֥ע וּ/רְאֵ֖ה אֵ֣ת אֲשֶֽׁר תַּעֲשֶׂ֑ה כִּ֚י לִ/תְשׁוּבַ֣ת הַ/שָּׁנָ֔ה מֶ֥לֶךְ
    אֲרָ֖ם עֹלֶ֥ה עָלֶֽי/ךָ־־׃ס
translation:
  text: Then the prophet came near to the king of Israel and said to him, “Go, strengthen
    yourself, and know and see what you should do, because at the turn of the year
    the king of Aram is coming up against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'at the turn/return of the year,' an idiom often referring to the
      season when military campaigns resumed; some translations render this more interpretively
      as 'next spring.'
    reason: cultural_note
  - marker: b
    text: Or 'what you will do.' The Hebrew form is literally future, but here likely
      carries the practical sense of what the king ought to do in preparation.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'the king of Syria'; Hebrew has 'Aram.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - came to
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' preserves
    the concrete movement and is slightly more formal than 'approached' while remaining
    natural in English narrative.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite noun with the article; the text refers to a known prophetic
    figure in the narrative, so 'the prophet' is the straightforward rendering.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English as 'the king of Israel.'
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come now, go
  - Proceed
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the plain and idiomatic command opening the
    sequence of imperatives.
- source_word: הִתְחַזַּק
  chosen: strengthen yourself
  alternatives:
  - be strong
  - take courage
  lexicon: HALOT
  rationale: Hitpael imperative of חזק is reflexive/inchoative. 'Strengthen yourself'
    best preserves the reflexive force and likely sense of preparing oneself for coming
    conflict, rather than merely feeling courageous.
- source_word: וְדַע
  chosen: know
  alternatives:
  - consider
  - understand
  lexicon: HALOT
  rationale: ידע in the imperative can mean know, understand, or take note. 'Know'
    keeps the lexical core and works in tandem with the following 'see' as a call
    to informed awareness.
- source_word: וּרְאֵה
  chosen: see
  alternatives:
  - look
  - observe
  lexicon: HALOT
  rationale: ראה is literally 'see.' Keeping both 'know and see' preserves the Hebrew
    pairing rather than collapsing it into a single English verb.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  chosen: what you should do
  alternatives:
  - what you will do
  - what you must do
  lexicon: HALOT
  rationale: Literally 'that which you will do,' but in context the prophet is urging
    preparation and prudent planning. 'What you should do' communicates the practical
    force in idiomatic English without excessive paraphrase.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the warning and commands. 'Because' makes the
    causal relationship explicit in natural English.
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  chosen: at the turn of the year
  alternatives:
  - at the return of the year
  - next year at this time
  - when the year turns
  lexicon: HALOT
  rationale: This idiom refers to the year's turning/return, often the season when
    kings resumed campaigns. 'At the turn of the year' is a clear, fairly literal
    rendering that preserves the temporal idiom better than the more interpretive
    'next spring,' though that seasonal nuance may be noted.
- source_word: מֶלֶךְ אֲרָם
  chosen: the king of Aram
  alternatives:
  - the king of Syria
  lexicon: HALOT
  rationale: Following the translation philosophy, names are transliterated rather
    than replaced by later geographic equivalents. 'Aram' reflects the Hebrew directly;
    'Syria' is a traditional but less source-transparent rendering.
- source_word: עֹלֶה עָלֶיךָ
  chosen: is coming up against you
  alternatives:
  - will come up against you
  - is attacking you
  lexicon: HALOT
  rationale: עלה על in military contexts means to march up against or attack. The
    participle gives an imminent/future sense; 'is coming up against you' preserves
    the verbal imagery and the military threat without flattening it to simply 'attack.'
