id: 1KI.20.15
reference: 1 Kings 20:15
source:
  edition: WLC
  text: וַ/יִּפְקֹ֗ד אֶֽת נַעֲרֵי֙ שָׂרֵ֣י הַ/מְּדִינ֔וֹת וַ/יִּהְי֕וּ מָאתַ֖יִם שְׁנַ֣יִם
    וּ/שְׁלֹשִׁ֑ים וְ/אַחֲרֵי/הֶ֗ם פָּקַ֧ד אֶת כָּל הָ/עָ֛ם כָּל בְּנֵ֥י יִשְׂרָאֵ֖ל
    שִׁבְעַ֥ת אֲלָפִֽים־־־־׃
translation:
  text: So he mustered the young men of the provincial commanders, and they were two
    hundred thirty-two; and after them he mustered all the people, all the sons of
    Israel, seven thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Israelites.' The Hebrew reads 'all the sons of Israel,' a masculine
      familial expression used for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד / פָּקַד
  chosen: mustered
  alternatives:
  - numbered
  - reviewed
  - appointed
  lexicon: HALOT
  rationale: In this military context, פקד refers to taking stock of troops for deployment
    rather than merely counting them. 'Mustered' captures both enumeration and military
    organization.
- source_word: נַעֲרֵי
  chosen: young men
  alternatives:
  - servants
  - attendants
  - youths
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    Here these are a defined military-support group attached to officials; 'young
    men' preserves the literal sense without over-specifying social status.
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - princes
  - officials
  - captains
  lexicon: HALOT
  rationale: שַׂר broadly denotes a leader or official. In a military setting tied
    to mobilization, 'commanders' best fits the function in context.
- source_word: הַמְּדִינוֹת
  chosen: provincial
  alternatives:
  - districts
  - provinces
  - regions
  lexicon: HALOT
  rationale: מְדִינָה refers to an administrative district or province. Rendering
    adjectivally in 'provincial commanders' produces natural English while preserving
    the administrative sense.
- source_word: מָאתַיִם שְׁנַיִם וּשְׁלֹשִׁים
  chosen: two hundred thirty-two
  alternatives:
  - two hundred and thirty-two
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The chosen English follows
    contemporary style.
- source_word: וְאַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - afterward
  - following them
  lexicon: HALOT
  rationale: The phrase most naturally indicates sequence after mustering the first
    group. 'After them' preserves the concrete Hebrew wording and the order of mobilization.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the army
  lexicon: HALOT
  rationale: Though the context is military, the Hebrew says 'all the people.' Retaining
    'people' avoids importing a narrower term not present in the text.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the masculine familial
    expression is preserved where it reflects the source wording. 'Sons of Israel'
    is more formally transparent than 'Israelites,' while remaining understandable.
- source_word: שִׁבְעַת אֲלָפִים
  chosen: seven thousand
  lexicon: HALOT
  rationale: Straightforward numeral phrase indicating the total of the second group
    mustered.
