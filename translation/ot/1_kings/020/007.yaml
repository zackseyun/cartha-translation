id: 1KI.20.7
reference: 1 Kings 20:7
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א מֶֽלֶךְ יִשְׂרָאֵל֙ לְ/כָל זִקְנֵ֣י הָ/אָ֔רֶץ וַ/יֹּ֨אמֶר֙ דְּעֽוּ
    נָ֣א וּ/רְא֔וּ כִּ֥י רָעָ֖ה זֶ֣ה מְבַקֵּ֑שׁ כִּֽי שָׁלַ֨ח אֵלַ֜/י לְ/נָשַׁ֤/י
    וּ/לְ/בָנַ/י֙ וּ/לְ/כַסְפִּ֣/י וְ/לִ/זְהָבִ֔/י וְ/לֹ֥א מָנַ֖עְתִּי מִמֶּֽ/נּוּ־־־־׃
translation:
  text: Then the king of Israel called all the elders of the land and said, “Please
    know and see that this man is seeking trouble, for he sent to me for my wives,
    my sons, my silver, and my gold, and I did not withhold them from him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “is seeking evil/harm.” The Hebrew רָעָה can denote evil, harm, or trouble;
      here it refers to hostile intent.
    reason: lexical_alternative
  - marker: b
    text: Literally “I did not withhold from him,” with the object understood from
      the preceding items.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי הָאָרֶץ
  chosen: the elders of the land
  alternatives:
  - the elders of the country
  - the elders of the land/earth
  lexicon: HALOT
  rationale: A standard political/social expression for the leading elders of the
    realm, not merely old men. 'Land' is the most natural rendering here and fits
    the national setting.
- source_word: דְּעוּ נָא וּרְאוּ
  chosen: Please know and see
  alternatives:
  - Take note and see
  - Recognize and see
  lexicon: HALOT
  rationale: The pair of imperatives calls for careful recognition. 'Please' reflects
    נָא as a polite or urgent particle. Retaining both verbs preserves the rhetorical
    force rather than collapsing them into a single English verb.
- source_word: רָעָה
  chosen: trouble
  alternatives:
  - evil
  - harm
  - disaster
  lexicon: HALOT
  rationale: In context Ahab is warning that Ben-hadad is looking for hostile action
    or mischief against him. 'Trouble' communicates the practical sense in idiomatic
    English without over-moralizing the noun as abstract 'evil.'
- source_word: זֶה
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: HALOT
  rationale: The demonstrative refers contemptuously to Ben-hadad. 'This man' preserves
    the deictic force in natural English; 'this fellow' would add a colloquial tone
    not required by the Hebrew.
- source_word: מְבַקֵּשׁ
  chosen: is seeking
  alternatives:
  - seeks
  - is looking for
  lexicon: HALOT
  rationale: The participle conveys ongoing intent. 'Is seeking' preserves the progressive
    nuance and the sense of active pursuit.
- source_word: שָׁלַח אֵלַי לְ...
  chosen: he sent to me for
  alternatives:
  - he sent to demand
  - he sent for
  lexicon: HALOT
  rationale: The Hebrew literally says he 'sent to me for' these items. In context
    it implies a demand, but 'sent to me for' stays closer to the wording while remaining
    understandable.
- source_word: לְנָשַׁי וּלְבָנַי
  chosen: my wives, my sons
  alternatives:
  - my women, my sons
  - my wives and children
  lexicon: HALOT
  rationale: The possessive plurals are explicit. 'Sons' is more accurate than the
    broader 'children,' following the gender-accurate principle.
- source_word: לְכַסְפִּי וְלִזְהָבִי
  chosen: my silver, and my gold
  alternatives:
  - my money and my gold
  - my silver and gold
  lexicon: HALOT
  rationale: The Hebrew names the precious metals directly. 'Silver' and 'gold' are
    more literal and historically fitting than 'money.'
- source_word: לֹא מָנַעְתִּי מִמֶּנּוּ
  chosen: I did not withhold them from him
  alternatives:
  - I did not refuse him
  - I did not hold them back from him
  lexicon: HALOT
  rationale: The verb means withhold or hold back. English requires an object, supplied
    from the preceding list. 'Them' makes explicit what was not withheld.
