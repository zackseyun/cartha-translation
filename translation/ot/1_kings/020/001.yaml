id: 1KI.20.1
reference: 1 Kings 20:1
source:
  edition: WLC
  text: וּ/בֶן הֲדַ֣ד מֶֽלֶךְ אֲרָ֗ם קָבַץ֙ אֶת כָּל חֵיל֔/וֹ וּ/שְׁלֹשִׁ֨ים וּ/שְׁנַ֥יִם
    מֶ֛לֶךְ אִתּ֖/וֹ וְ/ס֣וּס וָ/רָ֑כֶב וַ/יַּ֗עַל וַ/יָּ֨צַר֙ עַל שֹׁ֣מְר֔וֹן וַ/יִּלָּ֖חֶם
    בָּֽ/הּ־־־־־׃
translation:
  text: Now Ben-hadad king of Aram gathered all his army, with thirty-two kings with
    him, and horses and chariots; then he went up and besieged Samaria and fought
    against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Ben-hadad king of Aram gathered...' The opening conjunction can
      be rendered more formally as 'and.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is the Hebrew place-name; traditionally, ''Syria.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בֶן הֲדַד
  chosen: Now Ben-hadad
  alternatives:
  - And Ben-hadad
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at the start of
    a new narrative unit 'now' gives natural English discourse flow without losing
    the connective sense. The personal name is transliterated per project philosophy.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: אֲרָם is rendered 'Aram' rather than the traditional 'Syria' to reflect
    the Hebrew proper name directly and prioritize the source text over later geographic
    convention.
- source_word: קָבַץ אֶת כָּל חֵילוֹ
  chosen: gathered all his army
  alternatives:
  - assembled all his forces
  - gathered all his host
  lexicon: HALOT
  rationale: קבץ means 'gather/assemble.' חַיִל here refers to military force, so
    'army' is the most natural singular collective in English.
- source_word: וּשְׁלֹשִׁים וּשְׁנַיִם מֶלֶךְ אִתּוֹ
  chosen: with thirty-two kings with him
  alternatives:
  - and thirty-two kings were with him
  - along with thirty-two kings
  lexicon: HALOT
  rationale: The phrase apposes additional allies accompanying Ben-hadad. 'With thirty-two
    kings with him' preserves the Hebrew sense of accompaniment, though slightly smoothed
    in English syntax.
- source_word: וְסוּס וָרָכֶב
  chosen: and horses and chariots
  alternatives:
  - and horse and chariot
  - and cavalry and chariots
  lexicon: HALOT
  rationale: The Hebrew uses singular collectives, but English idiom normally pluralizes
    these military assets. 'Horses and chariots' is clear and natural while preserving
    the concrete imagery.
- source_word: וַיַּעַל
  chosen: then he went up
  alternatives:
  - and he went up
  - and he marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often for military advance toward a city
    or higher terrain. 'Went up' preserves the literal movement; 'then' reflects sequential
    narrative waw.
- source_word: וַיָּצַר עַל שֹׁמְרוֹן
  chosen: and besieged Samaria
  alternatives:
  - and laid siege to Samaria
  - and hemmed in Samaria
  lexicon: HALOT
  rationale: צור על in military context means to besiege. 'Besieged' is concise and
    idiomatic English.
- source_word: וַיִּלָּחֶם בָּהּ
  chosen: and fought against it
  alternatives:
  - and made war against it
  - and attacked it
  lexicon: HALOT
  rationale: לחם with ב marks engaging in battle against a target. 'Fought against
    it' preserves the verbal sense without overstating beyond the Hebrew.
