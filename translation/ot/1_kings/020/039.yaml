id: 1KI.20.39
reference: 1 Kings 20:39
source:
  edition: WLC
  text: וַ/יְהִ֤י הַ/מֶּ֨לֶךְ֙ עֹבֵ֔ר וְ/ה֖וּא צָעַ֣ק אֶל הַ/מֶּ֑לֶךְ וַ/יֹּ֜אמֶר
    עַבְדְּ/ךָ֣ יָצָ֣א בְ/קֶֽרֶב הַ/מִּלְחָמָ֗ה וְ/הִנֵּֽה אִ֨ישׁ סָ֜ר וַ/יָּבֵ֧א
    אֵלַ֣/י אִ֗ישׁ וַ/יֹּ֨אמֶר֙ שְׁמֹר֙ אֶת הָ/אִ֣ישׁ הַ/זֶּ֔ה אִם הִפָּקֵד֙ יִפָּקֵ֔ד
    וְ/הָיְתָ֤ה נַפְשְׁ/ךָ֙ תַּ֣חַת נַפְשׁ֔/וֹ א֥וֹ כִכַּר כֶּ֖סֶף תִּשְׁקֽוֹל־׀־־־־־׃
translation:
  text: As the king was passing by, he cried out to the king and said, “Your servant
    went out into the midst of the battle, and behold, a man turned aside and brought
    a man to me and said, ‘Guard this man. If he is ever missing, then your life shall
    be for his life, or you shall weigh out a talent of silver.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If he should be missing' / 'If he is in any way unaccounted for.' The
      Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your life under/in place of his life,' a legal formula of substitution.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵר
  chosen: was passing by
  alternatives:
  - passed by
  - was passing along
  lexicon: HALOT
  rationale: The participle with ויהי gives ongoing action in the background; 'was
    passing by' captures the durative sense naturally in English.
- source_word: צָעַק
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: HALOT
  rationale: The verb denotes a loud cry or urgent call. 'Cried out' preserves the
    urgency without over-specifying tone.
- source_word: עַבְדְּךָ
  chosen: Your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the noun can denote slave/servant, in courtly self-reference
    before a king 'your servant' is the idiomatic and contextually appropriate rendering.
- source_word: בְּקֶרֶב הַמִּלְחָמָה
  chosen: into the midst of the battle
  alternatives:
  - in the middle of the battle
  - into battle
  lexicon: HALOT
  rationale: קֶרֶב emphasizes the interior or midst; the fuller phrase preserves the
    vividness of being in the thick of combat.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - when suddenly
  lexicon: HALOT
  rationale: The particle marks vivid presentation. 'Behold' is slightly elevated
    but still readable and preserves the narrative force.
- source_word: אִישׁ סָר
  chosen: a man turned aside
  alternatives:
  - a man came aside
  - a man departed from the line
  lexicon: HALOT
  rationale: סוּר commonly means turn aside/deviate. Here it likely describes someone
    detaching from the action and approaching the speaker; 'turned aside' stays close
    to the Hebrew.
- source_word: וַיָּבֵא אֵלַי אִישׁ
  chosen: and brought a man to me
  alternatives:
  - and led a man to me
  lexicon: HALOT
  rationale: The direct object אִישׁ after 'brought to me' indicates that the first
    man delivered another man into the speaker's custody.
- source_word: שְׁמֹר
  chosen: Guard
  alternatives:
  - Keep watch over
  - Watch
  lexicon: HALOT
  rationale: The imperative calls for custodial protection/keeping. 'Guard' is concise
    and fits the military setting.
- source_word: אִם הִפָּקֵד יִפָּקֵד
  chosen: If he is ever missing
  alternatives:
  - If he should be missing
  - If he is in any way unaccounted for
  lexicon: HALOT
  rationale: The Niphal infinitive absolute plus finite verb intensifies the idea
    of being missing/unaccounted for. 'If he is ever missing' conveys both the passive
    sense and the emphasis in idiomatic English.
- source_word: נַפְשְׁךָ תַּחַת נַפְשׁוֹ
  chosen: your life shall be for his life
  alternatives:
  - your life in place of his life
  - you will pay with your life for his life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life, not soul. The construction תַּחַת expresses
    substitution or exchange; 'for his life' preserves the legal formula.
- source_word: כִּכַּר כֶּסֶף
  chosen: a talent of silver
  alternatives:
  - a silver talent
  lexicon: HALOT
  rationale: כִּכַּר is a weight measure conventionally rendered 'talent.' This is
    the clearest standard English equivalent.
- source_word: תִּשְׁקוֹל
  chosen: you shall weigh out
  alternatives:
  - you shall pay
  - you shall weigh
  lexicon: HALOT
  rationale: The verb literally means weigh, reflecting payment by weight of silver.
    'Weigh out' preserves the concrete economic imagery better than the more generic
    'pay'.
