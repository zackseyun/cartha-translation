id: 1KI.20.20
reference: 1 Kings 20:20
source:
  edition: WLC
  text: וַ/יַּכּוּ֙ אִ֣ישׁ אִישׁ֔/וֹ וַ/יָּנֻ֣סוּ אֲרָ֔ם וַֽ/יִּרְדְּפֵ֖/ם יִשְׂרָאֵ֑ל
    וַ/יִּמָּלֵ֗ט בֶּן הֲדַד֙ מֶ֣לֶךְ אֲרָ֔ם עַל ס֖וּס וּ/פָרָשִֽׁים־־׃
translation:
  text: And each man struck down his man, and Aram fled, and Israel pursued them.
    But Ben-hadad king of Aram escaped on a horse with horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'each man struck his man,' that is, each struck the man
      facing him.
    reason: lexical_alternative
  - marker: b
    text: Or 'escaped on horseback and with horsemen'; the Hebrew may describe Ben-hadad
      fleeing mounted and accompanied by riders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - struck
  - killed
  lexicon: HALOT
  rationale: From נכה in a battle context, the verb denotes a forceful blow resulting
    in defeat; 'struck down' fits the military scene better than the bare 'struck'
    while avoiding over-specifying death with 'killed.'
- source_word: אִישׁ אִישׁוֹ
  chosen: each man ... his man
  alternatives:
  - each one his opponent
  - each man his counterpart
  lexicon: HALOT
  rationale: The Hebrew is literally 'a man his man,' an idiom meaning each combatant
    struck the man facing him. To preserve the source texture and gender-accurate
    wording, the translation keeps 'man' rather than neutralizing to 'one,' while
    the sense of opponent is preserved by context.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The proper name can denote the kingdom or its forces. 'Aram' preserves
    the Hebrew name rather than using the later geographical label 'Syria.' In context
    the nation/army is personified as fleeing.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - retreated
  lexicon: HALOT
  rationale: A straightforward military flight verb; 'fled' is concise and natural.
- source_word: וַיִּרְדְּפֵם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף commonly means pursue, especially in military contexts. 'Pursued'
    is the standard and slightly more formal narrative choice.
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - slipped away
  - was delivered
  lexicon: HALOT
  rationale: In this context of battlefield survival, 'escaped' best captures the
    reflexive/passive nuance of being delivered from danger without importing theological
    overtones.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  lexicon: HALOT
  rationale: Personal name is transliterated per project policy.
- source_word: עַל סוּס
  chosen: on a horse
  alternatives:
  - on horseback
  lexicon: HALOT
  rationale: The singular סוס is best represented directly as 'on a horse.' 'On horseback'
    is possible but less formally tied to the singular noun.
- source_word: וּפָרָשִׁים
  chosen: with horsemen
  alternatives:
  - with cavalry
  - and horsemen
  lexicon: HALOT
  rationale: פָרָשִׁים refers to mounted riders. 'Horsemen' is a direct rendering;
    'cavalry' is smoother but more collective and interpretive. The prefixed conjunction
    here is rendered as accompaniment ('with') in English because the phrase describes
    the manner of escape.
