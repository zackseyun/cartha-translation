id: 1KI.20.41
reference: 1 Kings 20:41
source:
  edition: WLC
  text: וַ/יְמַהֵ֕ר וַ/יָּ֨סַר֙ אֶת הָ֣/אֲפֵ֔ר מ/על עֵינָ֑י/ו וַ/יַּכֵּ֤ר אֹת/וֹ֙
    מֶ֣לֶךְ יִשְׂרָאֵ֔ל כִּ֥י מֵֽ/הַ/נְּבִאִ֖ים הֽוּא־׃
translation:
  text: Then he quickly removed the bandage from over his eyes, and the king of Israel
    recognized him, that he was one of the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הָאֲפֵר is traditionally understood by some as 'the ashes,' but in
      this context it likely refers to a covering or bandage used as a disguise over
      the eyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: Then he quickly
  alternatives:
  - And he hurried
  - So he quickly
  lexicon: HALOT
  rationale: The verb from מהר conveys haste. Rendering with the adverb 'quickly'
    in English is natural and preserves the sense of immediate action; 'Then' reflects
    the narrative waw sequence.
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took away
  - took off
  lexicon: HALOT
  rationale: The verb סור/הסיר here means to remove or take away. 'Removed' is concise
    and idiomatic in context.
- source_word: הָאֲפֵר
  chosen: the bandage
  alternatives:
  - the ashes
  - the headband
  - the covering
  lexicon: HALOT
  rationale: Although אֵפֶר commonly means 'ashes,' in this narrative context the
    object is something worn over the eyes as a disguise and then removed. The immediate
    context in 1 Kings 20:38 strongly supports a cloth/bandage-like covering rather
    than literal ashes. 'Bandage' best communicates the functional sense in readable
    English while remaining tied to the disguise motif.
- source_word: מֵעַל עֵינָיו
  chosen: from over his eyes
  alternatives:
  - from his eyes
  - off his eyes
  lexicon: HALOT
  rationale: The preposition על with מן gives the sense 'from upon/over.' 'From over
    his eyes' preserves the spatial nuance more closely than simply 'from his eyes.'
- source_word: וַיַּכֵּר אֹתוֹ
  chosen: recognized him
  alternatives:
  - identified him
  - knew him
  lexicon: HALOT
  rationale: נכר in the hiphil commonly means to recognize or identify. 'Recognized
    him' is the most natural narrative rendering.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; retained formally.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of recognition rather than a causal
    clause. ''That'' best fits the syntax: the king recognized him, that he was one
    of the prophets.'
- source_word: מֵהַנְּבִאִים
  chosen: one of the prophets
  alternatives:
  - from the prophets
  - among the prophets
  lexicon: HALOT
  rationale: The partitive מן indicates membership in a group. 'One of the prophets'
    expresses this clearly in idiomatic English.
- source_word: הוּא
  chosen: he was
  alternatives:
  - he is
  lexicon: HALOT
  rationale: Although the pronoun is nominally verbless in Hebrew, English requires
    a copula. Past tense fits the narrative frame and the content of the king's recognition.
