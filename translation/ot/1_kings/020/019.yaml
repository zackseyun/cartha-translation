id: 1KI.20.19
reference: 1 Kings 20:19
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ יָצְא֣וּ מִן הָ/עִ֔יר נַעֲרֵ֖י שָׂרֵ֣י הַ/מְּדִינ֑וֹת וְ/הַ/חַ֖יִל
    אֲשֶׁ֥ר אַחֲרֵי/הֶֽם־׃
translation:
  text: 'These went out from the city: the young men of the provincial commanders,
    and the army that was behind them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the servants/attendants of the provincial commanders.' The Hebrew נַעֲרֵי
      can refer either to young men or to personal attendants, and the context may
      include both ideas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These
  alternatives:
  - And these
  - Now these
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the group just numbered in the
    previous verse. English can omit the conjunction for smoother style while preserving
    the referential force.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: HALOT
  rationale: Common verb of going out. 'Went out' is the most direct rendering; 'marched
    out' would add military nuance not explicit in the verb itself.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating point of departure. 'From
    the city' is concise and natural in English.
- source_word: נַעֲרֵי
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to the retainers/young men attached to the officials. 'Young men'
    preserves the lexical sense without over-specifying servile status; the alternative
    sense is preserved in a footnote.
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - princes
  - officials
  - leaders
  lexicon: HALOT
  rationale: שַׂר denotes a ruler, chief, or commander. In this military context,
    'commanders' best fits the narrative setting.
- source_word: הַמְּדִינוֹת
  chosen: provincial
  alternatives:
  - districts
  - provinces
  - regions
  lexicon: HALOT
  rationale: The noun refers to administrative districts or provinces. Rendering it
    adjectivally in English ('provincial commanders') produces natural syntax while
    preserving the sense of officials over provinces.
- source_word: וְהַחַיִל
  chosen: and the army
  alternatives:
  - and the force
  - and the troops
  lexicon: HALOT
  rationale: חַיִל in this context denotes the military force accompanying them. 'Army'
    is the clearest idiomatic rendering here.
- source_word: אֲשֶׁר אַחֲרֵיהֶם
  chosen: that was behind them
  alternatives:
  - which followed them
  - that came after them
  lexicon: HALOT
  rationale: The relative clause identifies the army as the force positioned after
    or following the young men. 'Behind them' is the most literal and fits the movement
    described.
