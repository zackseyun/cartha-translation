id: 1KI.20.43
reference: 1 Kings 20:43
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ מֶֽלֶךְ יִשְׂרָאֵ֛ל עַל בֵּית֖/וֹ סַ֣ר וְ/זָעֵ֑ף וַ/יָּבֹ֖א שֹׁמְרֽוֹנָ/ה־־׃פ
translation:
  text: So the king of Israel went to his house sullen and angry, and he came to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resentful and angry.' The Hebrew pair סַר וְזָעֵף combines terms of
      inward displeasure and visible vexation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, best rendered with the simple past
    'went' in natural English narrative style.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: Standard construct chain identifying the subject; 'the king of Israel'
    is the clearest and most idiomatic formal rendering.
- source_word: עַל בֵּיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  - to his palace
  lexicon: HALOT
  rationale: The preposition על with verbs of motion can function idiomatically for
    movement toward a destination. 'To his house' preserves the Hebrew image without
    overinterpreting as 'palace,' though the referent is royal residence.
- source_word: סַר
  chosen: sullen
  alternatives:
  - resentful
  - stubborn
  - turning aside
  lexicon: HALOT
  rationale: In context with וְזָעֵף, the adjective conveys a negative inward disposition.
    'Sullen' captures the brooding, displeased mood better than a wooden rendering
    like 'surly' or a literal but unclear 'turning aside.'
- source_word: וְזָעֵף
  chosen: angry
  alternatives:
  - vexed
  - resentful
  - upset
  lexicon: HALOT
  rationale: The adjective denotes being embittered or enraged. 'Angry' is clear modern
    English and pairs naturally with 'sullen' while preserving the twofold description.
- source_word: וַיָּבֹא
  chosen: and he came
  alternatives:
  - and he entered
  - and he arrived
  lexicon: HALOT
  rationale: Simple narrative continuation with בוא. 'Came' is the most direct equivalent;
    'arrived' is possible but slightly more interpretive.
- source_word: שֹׁמְרוֹנָה
  chosen: to Samaria
  alternatives:
  - Samaria-ward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Samaria. English expresses
    this naturally as 'to Samaria'.
