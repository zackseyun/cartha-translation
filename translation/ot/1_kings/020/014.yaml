id: 1KI.20.14
reference: 1 Kings 20:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אַחְאָב֙ בְּ/מִ֔י וַ/יֹּ֨אמֶר֙ כֹּֽה אָמַ֣ר יְהוָ֔ה בְּ/נַעֲרֵ֖י שָׂרֵ֣י הַ/מְּדִינ֑וֹת וַ/יֹּ֛אמֶר מִֽי יֶאְסֹ֥ר הַ/מִּלְחָמָ֖ה וַ/יֹּ֥אמֶר אָֽתָּה־־׃
translation:
  text: 'And Ahab said, “By whom?” And he said, “Thus says Yahweh: By the young men of the provincial officials.” Then he said, “Who will begin the battle?” And he said, “You.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By the attendants/servants of the provincial officials.” The Hebrew term for “young men” can also refer to retainers or aides in service to officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִי
  chosen: By whom?
  alternatives:
  - Through whom?
  lexicon: HALOT
  rationale: The preposition ב with the interrogative מִי asks for the agent or instrumentality. 'By whom?' is concise and idiomatic in English for asking who will carry out the action.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic tone, and יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּנַעֲרֵי
  chosen: By the young men
  alternatives:
  - By the servants
  - By the attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, attendant, or military aide depending on context. Here it refers to the retainers attached to the officials. 'Young men' preserves the lexical sense while remaining natural; the more functional sense is preserved in a footnote alternative.
- source_word: שָׂרֵי הַמְּדִינוֹת
  chosen: of the provincial officials
  alternatives:
  - of the princes of the provinces
  - of the commanders of the districts
  lexicon: HALOT
  rationale: שָׂרִים are officials, rulers, or commanders; מְדִינוֹת are administrative districts/provinces. 'Provincial officials' communicates the administrative setting in readable modern English without over-specifying military rank.
- source_word: מִי יֶאְסֹר הַמִּלְחָמָה
  chosen: Who will begin the battle?
  alternatives:
  - Who will bind the battle?
  - Who will initiate the fighting?
  lexicon: HALOT
  rationale: אָסַר literally means 'bind,' but in this idiom with מִלְחָמָה it means to engage, commence, or direct the battle. 'Begin the battle' best captures the sense in clear English.
- source_word: אָתָּה
  chosen: You
  lexicon: HALOT
  rationale: The emphatic second masculine singular pronoun gives a direct answer to Ahab's question. 'You' is the natural English equivalent and preserves the force.
