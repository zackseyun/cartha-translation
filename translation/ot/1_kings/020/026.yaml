id: 1KI.20.26
reference: 1 Kings 20:26
source:
  edition: WLC
  text: וַֽ/יְהִי֙ לִ/תְשׁוּבַ֣ת הַ/שָּׁנָ֔ה וַ/יִּפְקֹ֥ד בֶּן הֲדַ֖ד אֶת אֲרָ֑ם וַ/יַּ֣עַל
    אֲפֵ֔קָ/ה לַ/מִּלְחָמָ֖ה עִם יִשְׂרָאֵֽל־־־׃
translation:
  text: At the turn of the year, Ben-hadad mustered Aram and went up to Aphek for
    battle with Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'at the return of the year,' an idiom for when the annual
      cycle came around again; some render it 'in the spring.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Arameans.' Hebrew 'Aram' can refer to the kingdom or its people/army.
    reason: lexical_alternative
  - marker: c
    text: Or 'against Israel.' The Hebrew preposition is literally 'with,' used here
      in a battle context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  chosen: at the turn of the year
  alternatives:
  - at the return of the year
  - in the spring of the year
  - when the year came around
  lexicon: HALOT
  rationale: The idiom literally means 'at the return of the year' and refers to the
    yearly cycle coming around again. 'At the turn of the year' is natural English
    that preserves the temporal sense without overinterpreting it as specifically
    'spring,' though that is a common contextual inference in military settings.
- source_word: וַיִּפְקֹד
  chosen: mustered
  alternatives:
  - numbered
  - reviewed
  - assembled
  lexicon: HALOT
  rationale: פקד in military contexts commonly refers to mustering or reviewing troops.
    Since the object is Aram in the sense of its forces, 'mustered' best captures
    the military action in idiomatic English.
- source_word: אֶת אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as 'Aram.' Following the translation
    philosophy, names are transliterated rather than replaced with later geopolitical
    labels such as 'Syria.' In context this implies the Aramean forces, but retaining
    'Aram' stays closer to the source.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' 'Went up' preserves the Hebrew narrative
    idiom and may reflect either topography or military movement without adding nuance
    not explicit in the text.
- source_word: אֲפֵקָה
  chosen: to Aphek
  alternatives:
  - Aphekward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Aphek. Standard
    English expresses this simply as 'to Aphek.'
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to fight
  lexicon: HALOT
  rationale: The noun denotes warfare/battle. 'For battle' fits the immediate campaign
    context and reads naturally with the motion verb.
- source_word: עִם יִשְׂרָאֵל
  chosen: with Israel
  alternatives:
  - against Israel
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In battle contexts English often
    uses 'against,' but 'with Israel' can still idiomatically convey engagement in
    battle while remaining closer to the Hebrew wording.
