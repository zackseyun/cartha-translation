id: 1KI.20.5
reference: 1 Kings 20:5
source:
  edition: WLC
  text: וַ/יָּשֻׁ֨בוּ֙ הַ/מַּלְאָכִ֔ים וַ/יֹּ֣אמְר֔וּ כֹּֽה אָמַ֥ר בֶּן הֲדַ֖ד לֵ/אמֹ֑ר
    כִּֽי שָׁלַ֤חְתִּי אֵלֶ֨י/ךָ֙ לֵ/אמֹ֔ר כַּסְפְּ/ךָ֧ וּ/זְהָבְ/ךָ֛ וְ/נָשֶׁ֥י/ךָ
    וּ/בָנֶ֖י/ךָ לִ֥/י תִתֵּֽן־־־׃
translation:
  text: 'The messengers returned and said, “Thus says Ben-hadad: ‘Though I sent to
    you, saying, “You shall give me your silver and your gold and your wives and your
    sons,”’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For I sent to you, saying …” The Hebrew particle כי can be rendered
      in several ways; here it is taken concessively in light of the escalation completed
      in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of שוב narrates the next event in sequence.
    'Returned' is natural modern English and preserves the directional sense without
    unnecessary literalism.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the envoys
  - the angels
  lexicon: HALOT
  rationale: In this political and military context, מלאכים refers to human emissaries,
    not heavenly beings. 'Messengers' is the broad, accurate rendering; 'envoys' is
    possible but slightly more interpretive.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the standard messenger-formula. Present-tense 'says' is idiomatic
    in English for quoted proclamation formulas, even when embedded in past narrative.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  alternatives:
  - Ben-Hadad
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. Hyphenation varies in English; 'Ben-hadad' is a conventional transliteration.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive introduces direct speech. 'Saying' is the most natural
    English equivalent in this narrative frame.
- source_word: כִּי
  chosen: Though
  alternatives:
  - Surely
  - Indeed
  - For
  lexicon: HALOT
  rationale: 'Here כי introduces a concessive nuance in Ben-hadad''s message: despite
    the prior demand, a further escalation follows in the next verse. Rendering it
    ''Though'' best prepares the syntax and sense across verses 5–6. A more wooden
    ''for'' or ''indeed'' would be less clear in English.'
- source_word: שָׁלַחְתִּי אֵלֶיךָ
  chosen: I sent to you
  alternatives:
  - I have sent to you
  - I sent word to you
  lexicon: HALOT
  rationale: The perfect refers to Ben-hadad's prior dispatch of messengers. 'I sent
    to you' is sufficiently literal; 'sent word to you' is possible but adds an explanatory
    noun not present in the Hebrew.
- source_word: כַּסְפְּךָ וּזְהָבְךָ
  chosen: your silver and your gold
  alternatives:
  - your money and your gold
  lexicon: HALOT
  rationale: כסף and זהב are concrete valuables. 'Silver' and 'gold' preserve the
    lexical form and the formal tone of the demand.
- source_word: וְנָשֶׁיךָ
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: The plural construct with second masculine singular suffix clearly refers
    to Ahab's wives. 'Women' would be too vague and less contextually precise.
- source_word: וּבָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: בנים in this form is specifically 'sons,' not the gender-inclusive 'children.'
    This follows the project's gender-accurate principle.
- source_word: לִי תִתֵּן
  chosen: You shall give me
  alternatives:
  - you must give to me
  - you are to give me
  lexicon: HALOT
  rationale: The imperfect here expresses demanded obligation in direct speech. 'You
    shall give me' preserves the force and echoes the prior ultimatum without sounding
    archaic in this context.
