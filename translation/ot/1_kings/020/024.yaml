id: 1KI.20.24
reference: 1 Kings 20:24
source:
  edition: WLC
  text: וְ/אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה עֲשֵׂ֑ה הָסֵ֤ר הַ/מְּלָכִים֙ אִ֣ישׁ מִ/מְּקֹמ֔/וֹ
    וְ/שִׂ֥ים פַּח֖וֹת תַּחְתֵּי/הֶֽם־׃
translation:
  text: 'And do this thing: remove each king from his place, and put governors in
    their place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appoint provincial governors instead of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת הַדָּבָר הַזֶּה
  chosen: And do this thing
  alternatives:
  - And this thing do
  - And do this
  lexicon: HALOT
  rationale: The fronted object plus imperative עֲשֵׂה is naturally rendered idiomatically
    in English as an introductory command. 'Thing' preserves the broad sense of דָּבָר
    here as a matter/action rather than a spoken word.
- source_word: עֲשֵׂה
  chosen: do
  alternatives:
  - carry out
  - perform
  lexicon: HALOT
  rationale: A straightforward imperative of עשה. 'Do' is the most direct and natural
    English equivalent in this command context.
- source_word: הָסֵר
  chosen: remove
  alternatives:
  - take away
  - dismiss
  lexicon: HALOT
  rationale: The Hiphil imperative of סור/סיר conveys causing removal. 'Remove' fits
    the military-administrative context without overinterpreting whether the kings
    are deposed entirely or merely displaced from command.
- source_word: הַמְּלָכִים אִישׁ מִמְּקֹמוֹ
  chosen: each king from his place
  alternatives:
  - the kings, each from his place
  - every king from his position
  lexicon: HALOT
  rationale: אִישׁ after a plural commonly has a distributive sense, hence 'each king.'
    מָקוֹם can mean literal place or assigned station; 'place' preserves the Hebrew
    while still fitting the context of office or command.
- source_word: וְשִׂים
  chosen: and put
  alternatives:
  - and appoint
  - and set
  lexicon: HALOT
  rationale: The verb שים literally means 'put/set.' In context it refers to installing
    replacements, but 'put' keeps closer to the Hebrew while remaining clear.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - captains
  - officials
  lexicon: HALOT
  rationale: פַּחוֹת refers to administrative officials or provincial governors. 'Governors'
    is the clearest standard rendering. 'Captains' would narrow the term too much
    to military rank, while the context suggests replacing royal commanders with appointed
    officials.
- source_word: תַּחְתֵּיהֶם
  chosen: in their place
  alternatives:
  - instead of them
  - under them
  lexicon: HALOT
  rationale: Though literally 'under them' or 'in place of them,' the idiom here indicates
    replacement. 'In their place' communicates succession in office clearly in English.
