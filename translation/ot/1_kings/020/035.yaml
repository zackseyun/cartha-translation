theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: How interpretively to render בְּנֵי הַנְּבִיאִים
  chosen_reading: sons of the prophets
  alternative_readings:
  - company of the prophets
  - disciples of the prophets
  rationale: The phrase likely refers to a prophetic group or guild, but the main
    text preserves the Hebrew expression rather than resolving the social structure
    more interpretively.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
