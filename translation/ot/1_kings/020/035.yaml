id: 1KI.20.35
reference: 1 Kings 20:35
source:
  edition: WLC
  text: וְ/אִ֨ישׁ אֶחָ֜ד מִ/בְּנֵ֣י הַ/נְּבִיאִ֗ים אָמַ֧ר אֶל רֵעֵ֛/הוּ בִּ/דְבַ֥ר
    יְהוָ֖ה הַכֵּ֣י/נִי נָ֑א וַ/יְמָאֵ֥ן הָ/אִ֖ישׁ לְ/הַכֹּתֽ/וֹ־׃
translation:
  text: Now a certain man from the sons of the prophets said to his companion by the
    word of the LORD, “Please strike me.” But the man refused to strike him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the company of the prophets” or “from the disciples of the prophets.”
      The Hebrew reads “from the sons of the prophets,” a common expression for a
      prophetic group.
    reason: lexical_alternative
  - marker: b
    text: Or “at the word of the LORD” or “by the command of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ אֶחָד
  chosen: Now a certain man
  alternatives:
  - And one man
  - A certain man
  lexicon: HALOT
  rationale: אִישׁ אֶחָד idiomatically introduces an individual in narrative. 'A certain
    man' is natural English; adding 'Now' for initial וְ reflects narrative progression
    without woodenly preserving 'and.'
- source_word: מִבְּנֵי הַנְּבִיאִים
  chosen: from the sons of the prophets
  alternatives:
  - from the company of the prophets
  - from the disciples of the prophets
  lexicon: HALOT
  rationale: Formally, the phrase is 'from the sons of the prophets.' This likely
    denotes a prophetic guild, but the literal expression is retained in the main
    text for transparency, with more interpretive alternatives noted.
- source_word: רֵעֵהוּ
  chosen: his companion
  alternatives:
  - his friend
  - his fellow
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or fellow. 'Companion' fits the immediate
    context without overstating emotional closeness implied by 'friend.'
- source_word: בִּדְבַר יְהוָה
  chosen: by the word of the LORD
  alternatives:
  - at the word of the LORD
  - by the command of the LORD
  lexicon: HALOT
  rationale: The phrase indicates prophetic authorization or command. 'By the word
    of the LORD' preserves the Hebrew idiom while remaining clear. YHWH is rendered
    'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: הַכֵּינִי נָא
  chosen: Please strike me
  alternatives:
  - Strike me, please
  - Please wound me
  lexicon: HALOT
  rationale: נכה commonly means strike/smite. In context the requested blow results
    in injury in the next verse, but here 'strike' is the most direct and textually
    restrained rendering. נָא is represented by 'please.'
- source_word: וַיְמָאֵן
  chosen: refused
  alternatives:
  - was unwilling
  - declined
  lexicon: HALOT
  rationale: The verb denotes refusal, not mere hesitation. 'Refused' is concise and
    strong enough for the narrative consequence that follows.
- source_word: לְהַכֹּתוֹ
  chosen: to strike him
  alternatives:
  - to hit him
  - to wound him
  lexicon: HALOT
  rationale: Infinitive of נכה with object suffix. 'To strike him' keeps lexical consistency
    with the earlier imperative and avoids importing the stronger result 'wound' before
    the text states it.
