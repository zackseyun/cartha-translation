id: 1KI.20.12
reference: 1 Kings 20:12
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/שְׁמֹ֨עַ֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה וְ/ה֥וּא שֹׁתֶ֛ה ה֥וּא וְ/הַ/מְּלָכִ֖ים
    בַּ/סֻּכּ֑וֹת וַ/יֹּ֤אמֶר אֶל עֲבָדָי/ו֙ שִׂ֔ימוּ וַ/יָּשִׂ֖ימוּ עַל הָ/עִֽיר־־־׃
translation:
  text: And when he heard this message, while he and the kings were drinking in the
    booths, he said to his servants, “Take your positions.” So they took their positions
    against the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this word” or “this matter.”
    reason: lexical_alternative
  - marker: b
    text: Or “in the shelters” or, traditionally, “in the pavilions.”
    reason: lexical_alternative
  - marker: c
    text: The Hebrew command is literally “Set!”—a brief military order, likely meaning
      to take up positions against the city.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר הַזֶּה
  chosen: this message
  alternatives:
  - this word
  - this matter
  lexicon: HALOT
  rationale: דבר has a broad semantic range including 'word,' 'matter,' and 'message.'
    In this narrative context, Ben-hadad is reacting to Ahab's communicated reply,
    so 'message' is natural modern English while remaining faithful to the sense.
- source_word: שֹׁתֶה
  chosen: were drinking
  alternatives:
  - was drinking
  lexicon: HALOT
  rationale: The participle describes ongoing action at the time of hearing. Although
    the Hebrew explicitly says 'he was drinking, he and the kings,' English idiom
    smooths this to the plural 'he and the kings were drinking' while preserving the
    scene.
- source_word: בַּסֻּכּוֹת
  chosen: in the booths
  alternatives:
  - in the shelters
  - in the pavilions
  lexicon: HALOT
  rationale: סֻכּוֹת literally means temporary shelters or booths. 'Booths' is the
    most direct rendering; 'pavilions' is traditional in some English versions but
    less transparent to modern readers.
- source_word: שִׂימוּ
  chosen: Take your positions
  alternatives:
  - Set yourselves
  - Deploy
  - Prepare to attack
  lexicon: HALOT
  rationale: The verb שׂים literally means 'put, set.' Here it is a terse military
    command. 'Take your positions' captures the implied military deployment without
    over-specifying siege machinery not stated in the Hebrew.
- source_word: וַיָּשִׂימוּ עַל הָעִיר
  chosen: they took their positions against the city
  alternatives:
  - they set themselves against the city
  - they deployed against the city
  - they prepared an attack on the city
  lexicon: HALOT
  rationale: The phrase is elliptical in Hebrew. על with city in military context
    indicates hostile positioning against the city. 'Took their positions against
    the city' preserves the terseness and military sense better than the vaguer 'set
    themselves' and avoids adding details absent from the text.
