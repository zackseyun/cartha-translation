id: 1KI.20.2
reference: 1 Kings 20:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֧ח מַלְאָכִ֛ים אֶל אַחְאָ֥ב מֶֽלֶךְ יִשְׂרָאֵ֖ל הָ/עִֽירָ/ה־־׃
translation:
  text: And he sent messengers to Ahab king of Israel, into the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the city.” The Hebrew form includes a directional ending on “city,”
      indicating movement toward the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And he sent
  alternatives:
  - Then he sent
  - So he sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח normally advances the narrative with a past-tense verbal
    form. 'And he sent' preserves the sequential force without overinterpreting discourse
    nuance.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this political and military narrative context, the noun refers to
    human agents sent with a message, not heavenly beings. 'Messengers' is the most
    natural and sufficiently broad English rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the sending action; 'to' is the
    standard idiomatic rendering in English.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: Construct chain identifying Ahab's royal office. The anarthrous Hebrew
    does not require the English article here; 'Ahab king of Israel' is idiomatic
    apposition.
- source_word: הָעִירָה
  chosen: into the city
  alternatives:
  - to the city
  - cityward
  lexicon: HALOT
  rationale: 'The directional he on עִיר indicates motion toward/into the city. Since
    the messengers are sent to Ahab and the phrase is adverbial of destination, ''into
    the city'' best preserves the directional nuance in natural English. The article
    is retained: ''the city.'''
