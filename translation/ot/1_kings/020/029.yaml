id: 1KI.20.29
reference: 1 Kings 20:29
source:
  edition: WLC
  text: וַֽ/יַּחֲנ֧וּ אֵ֦לֶּה נֹ֥כַח אֵ֖לֶּה שִׁבְעַ֣ת יָמִ֑ים וַ/יְהִ֣י בַּ/יּ֣וֹם
    הַ/שְּׁבִיעִ֗י וַ/תִּקְרַב֙ הַ/מִּלְחָמָ֔ה וַ/יַּכּ֨וּ בְנֵֽי יִשְׂרָאֵ֧ל אֶת
    אֲרָ֛ם מֵאָה אֶ֥לֶף רַגְלִ֖י בְּ/י֥וֹם אֶחָֽד׀־־־׃
translation:
  text: And these camped opposite those for seven days. Then on the seventh day the
    battle drew near, and the sons of Israel struck down Aram—one hundred thousand
    foot soldiers in one day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew is literally “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “the Arameans.” Hebrew “Aram” can denote the Aramean kingdom/people.
    reason: lexical_alternative
  - marker: c
    text: Or “infantry.” Hebrew literally refers to troops “on foot.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: The verb from חנה denotes setting up camp. 'Camped' is natural modern
    English; 'encamped' is more formal but not necessary here.
- source_word: אֵלֶּה נֹכַח אֵלֶּה
  chosen: these ... opposite those
  alternatives:
  - these ... facing those
  - one side ... opposite the other
  lexicon: HALOT
  rationale: נֹכַח marks spatial opposition or facing. 'Opposite those' preserves
    the terse Hebrew contrast between the two armies.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration expression.
- source_word: וַיְהִי בַּיּוֹם הַשְּׁבִיעִי
  chosen: Then on the seventh day
  alternatives:
  - And it happened on the seventh day
  - And on the seventh day it came to pass
  lexicon: HALOT
  rationale: The Hebrew narrative formula ויהי is rendered idiomatically as 'Then'
    rather than with archaic filler, while retaining the temporal marker 'on the seventh
    day.'
- source_word: וַתִּקְרַב הַמִּלְחָמָה
  chosen: the battle drew near
  alternatives:
  - the battle began
  - the battle joined
  lexicon: HALOT
  rationale: קרב literally means 'draw near.' Here it signals the onset of engagement.
    'Drew near' preserves the imagery better than the more interpretive 'began.'
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - defeated
  - killed
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting, often with lethal result in
    battle. 'Struck down' preserves the martial force without over-specifying beyond
    the context.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate
    translation where the source is masculine, the literal form is retained here;
    it refers corporately to Israel's fighting force.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The object is the place/people name אֲרָם. 'Aram' preserves the Hebrew
    proper name; English readers can understand it as the Aramean kingdom. 'Syria'
    would be anachronistically interpretive.
- source_word: מֵאָה אֶלֶף
  chosen: one hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - on foot
  lexicon: HALOT
  rationale: The adjective/noun denotes those on foot in military context. 'Foot soldiers'
    is clear modern English and slightly more transparent than 'infantry.'
- source_word: בְּיוֹם אֶחָד
  chosen: in one day
  alternatives:
  - on one day
  - in a single day
  lexicon: HALOT
  rationale: This expresses the time span within which the defeat occurred. 'In one
    day' is idiomatic and preserves the force of the Hebrew.
