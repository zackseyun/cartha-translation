theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל with masculine language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source text uses the masculine plural construct 'sons of Israel.'
    Per the translation philosophy's gender-accurate principle, the masculine form
    is preserved where it reflects the source wording, especially in a military narrative
    referring to Israel's male fighting force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering אֲרָם as proper name rather than demonym
  chosen_reading: Aram
  alternative_readings:
  - the Arameans
  - Syria
  rationale: The Hebrew uses the proper name אֲרָם. Translating it as 'Aram' follows
    the principle of transliterating names rather than replacing them with later geopolitical
    labels.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
