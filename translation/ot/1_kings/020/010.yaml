theological_decisions:
- issue: Rendering אֱלֹהִים in a pagan royal oath
  chosen_reading: the gods
  alternative_readings:
  - God
  rationale: Because the speaker is Ben-hadad, a non-Israelite king, the plural form
    is best taken as a reference to his deities rather than Israel's God. This preserves
    the narrative setting and avoids importing monotheistic specificity not demanded
    by the text.
