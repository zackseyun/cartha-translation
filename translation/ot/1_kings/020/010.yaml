id: 1KI.20.10
reference: 1 Kings 20:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אֵלָי/ו֙ בֶּן הֲדַ֔ד וַ/יֹּ֕אמֶר כֹּֽה יַעֲשׂ֥וּ/ן לִ֛/י אֱלֹהִ֖ים
    וְ/כֹ֣ה יוֹסִ֑פוּ אִם יִשְׂפֹּק֙ עֲפַ֣ר שֹׁמְר֔וֹן לִ/שְׁעָלִ֕ים לְ/כָל הָ/עָ֖ם
    אֲשֶׁ֥ר בְּ/רַגְלָֽ/י־־־־׃
translation:
  text: Ben-hadad sent to him and said, “May the gods do so to me, and more also,
    if the dust of Samaria will be enough for handfuls for all the people who follow
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “if the dust of Samaria will suffice for hollows/handfuls
      for all the people at my feet.” The idiom means Ben-hadad boasts that Samaria
      is so small its dust would not provide even a handful for each of his followers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח אֵלָיו
  chosen: sent to him
  alternatives:
  - sent word to him
  - sent messengers to him
  lexicon: HALOT
  rationale: The verb שׁלח with אֶל can simply mean 'send to' in context of diplomatic
    communication. English idiom allows 'sent to him'; the following speech makes
    clear a message is intended. 'Sent word' is possible but adds an object not explicit
    in the Hebrew.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: כֹּה יַעֲשׂוּן לִי אֱלֹהִים וְכֹה יוֹסִפוּ
  chosen: May the gods do so to me, and more also
  alternatives:
  - Thus may the gods do to me, and thus may they add
  - May the gods do this to me and even more
  lexicon: HALOT
  rationale: This is a standard oath/curse formula. Rendering it idiomatically as
    'May the gods do so to me, and more also' preserves both the imprecatory force
    and the formulaic style. Plural 'gods' matches אֱלֹהִים here in a pagan speaker's
    mouth.
- source_word: אִם
  chosen: if
  alternatives:
  - surely not
  - indeed if
  lexicon: HALOT
  rationale: In oath contexts אִם can introduce the content of the curse elliptically
    ('if ...' = 'may I be cursed if ...'). English can preserve the surface form with
    'if,' letting the oath formula carry the sense. This avoids over-paraphrasing
    while remaining intelligible.
- source_word: יִשְׂפֹּק
  chosen: will be enough
  alternatives:
  - will suffice
  - will amount to enough
  lexicon: HALOT
  rationale: The verb ספק here conveys sufficiency. 'Will be enough' is natural modern
    English and fits the boastful hyperbole.
- source_word: עֲפַר שֹׁמְרוֹן
  chosen: the dust of Samaria
  alternatives:
  - Samaria's dust
  lexicon: HALOT
  rationale: 'Construct relationship is straightforward: the dust belonging to/from
    Samaria.'
- source_word: לִשְׁעָלִים
  chosen: for handfuls
  alternatives:
  - for the hollow of the hand
  - for foxes
  lexicon: HALOT
  rationale: The form is traditionally understood from שׁוּעָל/שֹׁעַל in the sense
    'handfuls' or 'hollows of the hands' in this idiom, not 'foxes.' The context is
    numerical insufficiency of dust for troops, which strongly supports 'handfuls.'
- source_word: לְכָל הָעָם אֲשֶׁר בְּרַגְלָי
  chosen: for all the people who follow me
  alternatives:
  - for all the troops at my feet
  - for all the people who are at my feet
  lexicon: HALOT
  rationale: The idiom 'at my feet' denotes those under one's command or in one's
    train. 'Who follow me' communicates the military-retinue sense in clear English
    without wooden literalism.
