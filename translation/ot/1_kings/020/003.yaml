id: 1KI.20.3
reference: 1 Kings 20:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ כֹּ֚ה אָמַ֣ר בֶּן הֲדַ֔ד כַּסְפְּ/ךָ֥ וּֽ/זְהָבְ/ךָ֖ לִֽ/י
    ה֑וּא וְ/נָשֶׁ֧י/ךָ וּ/בָנֶ֛י/ךָ הַ/טּוֹבִ֖ים לִ/י הֵֽם־־־׃
translation:
  text: 'And he said to him, “Thus says Ben-hadad: Your silver and your gold are mine;
    your wives and your best sons are mine.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your wives and your finest sons are mine.” The Hebrew adjective can
      mean “good,” “best,” or “choicest” in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  chosen: And he said to him
  alternatives:
  - And he told him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר with indirect object לּוֹ; 'said
    to him' is the most transparent rendering in English narrative style.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Prophetic/messenger formula introducing quoted speech. Present-tense
    'says' is idiomatic in English for formal proclamation, even within past narrative.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  alternatives:
  - Ben Hadad
  rationale: Personal name is transliterated per project philosophy. Hyphenated form
    is standard English convention for this name.
- source_word: כַּסְפְּךָ וּזְהָבְךָ
  chosen: Your silver and your gold
  alternatives:
  - Your money and your gold
  lexicon: HALOT
  rationale: Literal rendering preserves the concrete valuables named in the Hebrew
    rather than generalizing to 'money.'
- source_word: לִי הוּא
  chosen: are mine
  alternatives:
  - belongs to me
  - is mine
  lexicon: HALOT
  rationale: Though Hebrew has singular pronoun הוּא after a compound subject, the
    sense is possessive claim over both items. English plural 'are mine' is natural
    and accurately conveys the demand.
- source_word: וְנָשֶׁיךָ
  chosen: your wives
  alternatives:
  - and your women
  lexicon: HALOT
  rationale: In this possessive familial context, נָשִׁים clearly means 'wives,' not
    women generally.
- source_word: וּבָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: בָּנִים here specifically denotes male offspring, not children generically;
    gender-accurate rendering follows project philosophy.
- source_word: הַטּוֹבִים
  chosen: best
  alternatives:
  - goodly
  - finest
  - good
  lexicon: HALOT
  rationale: The adjective likely means the choicest or most desirable among the sons,
    not merely morally 'good.' 'Best' is concise, natural, and reflects the superlative
    sense in context of seizure.
- source_word: לִי הֵם
  chosen: are mine
  alternatives:
  - belong to me
  lexicon: HALOT
  rationale: Direct possessive claim repeated for emphasis. Repeating 'are mine' preserves
    the force and parallelism of the Hebrew.
