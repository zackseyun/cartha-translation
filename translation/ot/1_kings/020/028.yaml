id: 1KI.20.28
reference: 1 Kings 20:28
source:
  edition: WLC
  text: וַ/יִּגַּ֞שׁ אִ֣ישׁ הָ/אֱלֹהִ֗ים וַ/יֹּאמֶר֮ אֶל מֶ֣לֶךְ יִשְׂרָאֵל֒ וַ/יֹּ֜אמֶר כֹּֽה אָמַ֣ר יְהוָ֗ה יַ֠עַן אֲשֶׁ֨ר אָמְר֤וּ אֲרָם֙ אֱלֹהֵ֤י הָרִים֙ יְהוָ֔ה וְ/לֹֽא אֱלֹהֵ֥י עֲמָקִ֖ים ה֑וּא וְ֠/נָתַתִּי אֶת כָּל הֶ/הָמ֨וֹן הַ/גָּ֤דוֹל הַ/זֶּה֙ בְּ/יָדֶ֔/ךָ וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־־־־־־׃
translation:
  text: 'Then the man of God came near and said to the king of Israel, “Thus says Yahweh: Because Aram has said, ‘Yahweh is a god of the mountains, but he is not a god of the valleys,’ I will give all this great multitude into your hand, and you shall know that I am Yahweh.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; traditionally 'Syria' in some English versions.
    reason: alternative_reading
  - marker: b
    text: Or 'God of the hills ... God of the plains.' The Hebrew contrasts elevated terrain with lowlands/valleys.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb 'you shall know' is plural, extending the statement beyond the king to Israel collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  lexicon: HALOT
  rationale: The phrase is definite in context and functions as a recognized prophetic designation, so 'the man of God' best reflects the Hebrew construction and narrative specificity.
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - came forward
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' preserves the concrete movement without overinterpreting the manner.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD' is both accurate and idiomatic, and 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - On account of the fact that
  lexicon: HALOT
  rationale: The combination introduces the reason for the divine action. 'Because' is the most natural concise English equivalent.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as 'Aram.' Following the philosophy to transliterate names rather than substitute later geopolitical labels, 'Aram' is preferred over 'Syria.'
- source_word: אֱלֹהֵי הָרִים ... וְלֹא אֱלֹהֵי עֲמָקִים
  chosen: a god of the mountains, but he is not a god of the valleys
  alternatives:
  - God of the hills, but not God of the plains
  - god of the hills, and not god of the valleys
  lexicon: HALOT
  rationale: The singular predicate sense is preserved. The indefinite 'a god' reflects the Aramean claim that the LORD is merely a localized deity. 'Mountains' and 'valleys' are straightforward renderings of הָרִים and עֲמָקִים; 'hills/plains' are possible but less direct here.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'English requires an explicit copular expression for naturalness in this clause: ''he is not a god of the valleys.'''
- source_word: כָּל הֶהָמוֹן הַגָּדוֹל הַזֶּה
  chosen: all this great multitude
  alternatives:
  - all this great army
  - all this vast horde
  lexicon: HALOT
  rationale: הָמוֹן denotes a large crowd, mass, or multitude. In military context 'army' is possible, but 'multitude' preserves the lexical breadth while still fitting the scene.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: The idiom literally means giving into someone's hand, often for victory or control. Retaining 'into your hand' preserves the Hebrew imagery and remains understandable in English.
- source_word: וִידַעְתֶּם
  chosen: you shall know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: The plural verb addresses Israel more broadly through its king, not merely the singular king. 'You shall know' preserves the solemn result clause and the plural force better than a singular rendering.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: This covenantal self-identification formula is common in the Hebrew Bible. 'The LORD' follows the doctrinal default for the divine name while preserving the theological force of divine self-revelation.
