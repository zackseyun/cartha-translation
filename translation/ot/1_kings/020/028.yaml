theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to reflect the Aramean statement as implying localized pagan theology
  chosen_reading: a god of the mountains, but he is not a god of the valleys
  alternative_readings:
  - God of the mountains, but not God of the valleys
  rationale: Using the indefinite article in English best conveys the Arameans' mistaken conception of the LORD as one territorial deity among others, which is the theological point answered by the verse's conclusion.
- issue: Number of the addressee in וִידַעְתֶּם
  chosen_reading: 'plural: ''you shall know'' addressed to Israel collectively'
  alternative_readings:
  - 'singular: ''you shall know'' addressed only to the king'
  rationale: The Hebrew verb is second masculine plural. Although the speech is delivered to the king, the result extends to Israel as a whole. The English keeps 'you' while the rationale documents the plural force.
  doctrine_reference: 'Translation philosophy §5: consistency/documented exception'
