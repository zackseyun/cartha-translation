id: 1KI.20.21
reference: 1 Kings 20:21
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יַּ֥ךְ אֶת הַ/סּ֖וּס וְ/אֶת הָ/רָ֑כֶב וְ/הִכָּ֥ה
    בַ/אֲרָ֖ם מַכָּ֥ה גְדוֹלָֽה־־׃
translation:
  text: Then the king of Israel went out and struck the horses and the chariots, and
    inflicted a great blow on Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the Arameans'; Hebrew 'Aram' may refer to the kingdom or its forces.
      Traditional English versions often have 'Syria,' but the Hebrew proper name
      is Aram.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form is most naturally
    rendered 'went out.' 'Marched out' is possible in military context but adds specificity
    not explicit in the Hebrew.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying the subject; the article
    is supplied naturally in English.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - attacked
  - defeated
  lexicon: HALOT
  rationale: נכה has a broad range including 'strike, smite, defeat.' 'Struck' preserves
    the concrete verbal force without overstating the result.
- source_word: הַסּוּס
  chosen: the horses
  alternatives:
  - the horse
  lexicon: HALOT
  rationale: Although סוס is morphologically singular, it often functions collectively
    for cavalry/horses in military contexts. English plural best conveys the sense
    here alongside 'the chariots.'
- source_word: הָרָכֶב
  chosen: the chariots
  alternatives:
  - the chariotry
  - the chariot force
  lexicon: HALOT
  rationale: רכב in military narrative commonly denotes chariotry collectively. 'The
    chariots' is idiomatic modern English and preserves the military reference.
- source_word: וְהִכָּה
  chosen: inflicted
  alternatives:
  - struck
  - dealt
  lexicon: HALOT
  rationale: The second use of נכה is rendered with a different English verb for readability
    because it governs the cognate object 'a great blow.' 'Inflicted' fits the idiom
    'inflicted a great blow' while preserving the underlying sense.
- source_word: בַאֲרָם
  chosen: on Aram
  alternatives:
  - on the Arameans
  - against Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as Aram. Following the translation
    philosophy, the proper name is transliterated rather than replaced with the traditional
    but anachronizing 'Syria.' 'On Aram' reflects the preposition and allows the collective
    national sense.
- source_word: מַכָּה גְדוֹלָה
  chosen: a great blow
  alternatives:
  - a great slaughter
  - a great defeat
  lexicon: HALOT
  rationale: The phrase literally means 'a great blow/strike.' 'A great blow' preserves
    the metaphor and avoids specifying casualties beyond what the text states, though
    military defeat is clearly implied.
