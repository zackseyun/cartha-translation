id: 1KI.20.13
reference: 1 Kings 20:13
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה נָבִ֣יא אֶחָ֗ד נִגַּשׁ֮ אֶל אַחְאָ֣ב מֶֽלֶךְ יִשְׂרָאֵל֒ וַ/יֹּ֗אמֶר כֹּ֚ה אָמַ֣ר יְהוָ֔ה הְֽ/רָאִ֔יתָ אֵ֛ת כָּל הֶ/הָמ֥וֹן הַ/גָּד֖וֹל הַ/זֶּ֑ה הִנְ/נִ֨י נֹתְנ֤/וֹ בְ/יָֽדְ/ךָ֙ הַ/יּ֔וֹם וְ/יָדַעְתָּ֖ כִּֽי אֲנִ֥י יְהוָֽה׀־־־־׃
translation:
  text: 'And behold, a certain prophet came near to Ahab king of Israel and said, “Thus says Yahweh: Have you seen all this great multitude? Behold, I am giving it into your hand today, and you shall know that I am Yahweh.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all this vast army” or “all this great horde”; the Hebrew word can denote a large throng or host, here referring to the enemy forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Now behold
  - Look
  lexicon: HALOT
  rationale: Retains the discourse-marking force and vividness of the Hebrew particle. 'Behold' is slightly formal but still readable and preserves the narrative surprise better than omitting it.
- source_word: נָבִיא אֶחָד
  chosen: a certain prophet
  alternatives:
  - one prophet
  - a prophet
  lexicon: HALOT
  rationale: The combination literally means 'one prophet,' but idiomatically introduces an unspecified individual. 'A certain prophet' preserves the indefiniteness and narrative introduction better than the flatter 'a prophet.'
- source_word: נִגַּשׁ אֶל
  chosen: came near to
  alternatives:
  - approached
  - came to
  lexicon: HALOT
  rationale: This verb commonly means to approach or draw near. 'Came near to' reflects the Hebrew more transparently than the smoother 'approached,' while remaining natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic in English for prophetic speech. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while aligning with established English Bible convention.
- source_word: הֲרָאִיתָ
  chosen: Have you seen
  alternatives:
  - Do you see
  - Have you looked at
  lexicon: HALOT
  rationale: The perfect with interrogative force naturally renders as 'Have you seen...?' in English, pointing to the visible military threat already before Ahab.
- source_word: כָּל הֶהָמוֹן הַגָּדוֹל הַזֶּה
  chosen: all this great multitude
  alternatives:
  - all this great horde
  - all this vast army
  - all this great crowd
  lexicon: HALOT
  rationale: הָמוֹן denotes a large throng or mass. In this military context it refers to the enemy host. 'Multitude' preserves the broad Hebrew sense without over-specifying, while 'great' and 'this' reflect the modifiers.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - See, I am
  - Indeed, I am
  lexicon: HALOT
  rationale: This particle-plus-pronoun construction emphasizes imminent divine action. Rendering it with 'Behold, I am' preserves both emphasis and immediacy.
- source_word: נֹתְנוֹ
  chosen: giving it
  alternatives:
  - about to give it
  - delivering it
  - handing it over
  lexicon: HALOT
  rationale: The participle expresses imminent or certain action. 'I am giving it' captures the vivid present/future force without adding interpretive nuance beyond the Hebrew.
- source_word: בְיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - over to you
  lexicon: HALOT
  rationale: A common Hebrew idiom for delivering someone or something into another's power. The literal 'into your hand' is clear enough in English and preserves the idiom's texture.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Straightforward temporal adverb; 'today' is natural modern English.
- source_word: וְיָדַעְתָּ כִּי אֲנִי יְהוָה
  chosen: and you shall know that I am the LORD
  alternatives:
  - then you will know that I am the LORD
  lexicon: HALOT
  rationale: A frequent theological formula in the Hebrew Bible expressing recognition of YHWH's identity and sovereignty through his acts. 'Shall know' preserves the solemnity and resultative force.
