id: 1KI.20.38
reference: 1 Kings 20:38
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ הַ/נָּבִ֔יא וַ/יַּעֲמֹ֥ד לַ/מֶּ֖לֶךְ עַל הַ/דָּ֑רֶךְ וַ/יִּתְחַפֵּ֥שׂ
    בָּ/אֲפֵ֖ר עַל עֵינָֽי/ו־־׃
translation:
  text: So the prophet went and stood by the road for the king, and disguised himself
    with a bandage over his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with ashes over his eyes.' The phrase may refer either to literal
      ashes or, in context, to a covering or bandage used as a disguise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So ... went
  alternatives:
  - Then ... went
  - And ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving sequence.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - stationed himself
  - took his stand
  lexicon: HALOT
  rationale: Simple past 'stood' best fits the narrative and avoids over-interpretation.
- source_word: לַמֶּלֶךְ
  chosen: for the king
  alternatives:
  - before the king
  - for the king's arrival
  lexicon: HALOT
  rationale: In context the prophet positions himself in relation to the king's route
    in order to intercept him. 'For the king' communicates purpose more clearly in
    English than a wooden 'to the king.'
- source_word: עַל הַדָּרֶךְ
  chosen: by the road
  alternatives:
  - on the road
  - along the way
  lexicon: HALOT
  rationale: Given the ambush-like positioning, 'by the road' is more idiomatic than
    'on the road' and fits the scene of waiting for the king to pass.
- source_word: וַיִּתְחַפֵּשׂ
  chosen: disguised himself
  alternatives:
  - made himself unrecognizable
  - covered himself
  lexicon: HALOT
  rationale: The hitpael of חפשׂ here means to disguise oneself. This is the main
    verbal action of concealment.
- source_word: בָּאֲפֵר
  chosen: with a bandage
  alternatives:
  - with ashes
  - with a headband
  lexicon: HALOT
  rationale: Although אֵפֶר commonly means 'ashes,' the immediate phrase 'over his
    eyes' strongly favors the less common sense of a covering or bandage used as part
    of the disguise. This also coheres with the narrative context, where the king
    later fails to recognize him.
- source_word: עַל עֵינָיו
  chosen: over his eyes
  alternatives:
  - over his face
  - upon his eyes
  lexicon: HALOT
  rationale: Literal rendering retained. In English, 'over his eyes' naturally conveys
    a covering placed across the eye area.
