id: 1KI.20.18
reference: 1 Kings 20:18
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר אִם לְ/שָׁל֥וֹם יָצָ֖אוּ תִּפְשׂ֣וּ/ם חַיִּ֑ים וְ/אִ֧ם לְ/מִלְחָמָ֛ה
    יָצָ֖אוּ חַיִּ֥ים תִּפְשֽׂוּ/ם־׃
translation:
  text: And he said, “If they have come out for peace, seize them alive; and if they
    have come out for battle, seize them alive.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If they have come out peacefully … if they have come out for war.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech. 'And he
    said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אִם
  chosen: If
  alternatives:
  - Whether
  lexicon: HALOT
  rationale: Conditional particle introducing each alternative scenario; 'if' is the
    most natural and direct rendering in English.
- source_word: לְשָׁלוֹם
  chosen: for peace
  alternatives:
  - peacefully
  - with peaceful intent
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes peaceful purpose rather than merely the abstract
    state of peace. 'For peace' closely reflects the Hebrew preposition לְ plus noun
    while remaining idiomatic.
- source_word: יָצָאוּ
  chosen: have come out
  alternatives:
  - came out
  - have gone out
  lexicon: HALOT
  rationale: 'From the perspective of the speaker observing men emerging from the
    city, ''come out'' is idiomatic English. The perfect can be rendered as present-resultative
    in context: they have now come out.'
- source_word: תִּפְשׂוּם
  chosen: seize them
  alternatives:
  - capture them
  - take them
  lexicon: HALOT
  rationale: תפשׂ commonly means seize/capture. 'Seize' fits the military command
    context and preserves the forcefulness of the imperative.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Adverbial accusative indicating the manner/state in which they are to
    be taken. 'Alive' is the standard and natural English rendering.
- source_word: וְאִם
  chosen: and if
  alternatives:
  - but if
  lexicon: HALOT
  rationale: Coordinates the second condition with the first. 'And if' preserves the
    simple Hebrew conjunction without adding contrast beyond the text.
- source_word: לְמִלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to make war
  lexicon: HALOT
  rationale: מִלְחָמָה denotes warfare/battle. 'For battle' is concise and idiomatic
    here, matching the parallel 'for peace.'
- source_word: חַיִּים תִּפְשׂוּם
  chosen: seize them alive
  alternatives:
  - take them alive
  lexicon: HALOT
  rationale: In the second clause the word order is reversed for emphasis in Hebrew,
    but English preserves natural imperative order. The repeated command is retained
    rather than smoothed away, reflecting the source's rhetorical force.
