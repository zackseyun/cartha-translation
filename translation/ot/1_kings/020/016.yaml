id: 1KI.20.16
reference: 1 Kings 20:16
source:
  edition: WLC
  text: וַ/יֵּצְא֖וּ בַּֽ/צָּהֳרָ֑יִם וּ/בֶן הֲדַד֩ שֹׁתֶ֨ה שִׁכּ֜וֹר בַּ/סֻּכּ֗וֹת
    ה֧וּא וְ/הַ/מְּלָכִ֛ים שְׁלֹשִֽׁים וּ/שְׁנַ֥יִם מֶ֖לֶךְ עֹזֵ֥ר אֹתֽ/וֹ־־׃
translation:
  text: They went out at noon, while Ben-hadad was drinking himself drunk in the booths,
    he and the thirty-two kings who were helping him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the shelters' or 'in the pavilions.' The Hebrew literally says 'in
      the booths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: They went out
  alternatives:
  - They came out
  - They sallied out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, a straightforward narrative advance. 'Went out'
    is the plain sense and fits the military movement from the city in context without
    adding color beyond the Hebrew.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The dual/plural form denotes the middle of the day. 'At noon' is idiomatic
    modern English and preserves the temporal specificity.
- source_word: וּבֶן הֲדַד
  chosen: while Ben-hadad
  alternatives:
  - and Ben-hadad
  lexicon: HALOT
  rationale: The waw here is rendered contextually as a circumstantial connection
    rather than simple coordination, since the clause describes Ben-hadad's simultaneous
    condition when 'they went out.' The name is transliterated per project policy.
- source_word: שֹׁתֶה
  chosen: was drinking
  alternatives:
  - was drinking wine
  - drank
  lexicon: HALOT
  rationale: Qal participle gives ongoing action. English past progressive best captures
    the circumstantial participial sense. 'Wine' is not explicit and should not be
    added.
- source_word: שִׁכּוֹר
  chosen: himself drunk
  alternatives:
  - drunk
  - to drunkenness
  lexicon: HALOT
  rationale: The adjective 'drunk' functions predicatively with the participle, indicating
    the result/state of his drinking. 'Drinking himself drunk' is natural English
    that preserves both the action and the resulting intoxication.
- source_word: בַּסֻּכּוֹת
  chosen: in the booths
  alternatives:
  - in the shelters
  - in the pavilions
  lexicon: HALOT
  rationale: סֻכּוֹת literally denotes booths/shelters. 'Booths' keeps the concrete
    Hebrew image; more interpretive renderings like 'pavilions' smooth the text but
    move away from the lexical form.
- source_word: הוּא וְהַמְּלָכִים
  chosen: he and the ... kings
  alternatives:
  - he together with the ... kings
  lexicon: HALOT
  rationale: The pronoun explicitly includes Ben-hadad with the associated kings.
    English preserves this with 'he and the ... kings.'
- source_word: שְׁלֹשִׁים וּשְׁנַיִם מֶלֶךְ
  chosen: the thirty-two kings
  alternatives:
  - thirty-two kings
  lexicon: HALOT
  rationale: The numeral plus singular noun after a higher number is standard Hebrew
    syntax. English idiom requires plural 'kings.' The article on 'kings' is carried
    over naturally as 'the thirty-two kings.'
- source_word: עֹזֵר אֹתוֹ
  chosen: who were helping him
  alternatives:
  - helping him
  - supporting him
  - coming to his aid
  lexicon: HALOT
  rationale: Participle of עזר denotes ongoing assistance/support. Relative clause
    'who were helping him' reads naturally in English and reflects the attributive
    force toward the kings.
