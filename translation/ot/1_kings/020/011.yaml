id: 1KI.20.11
reference: 1 Kings 20:11
source:
  edition: WLC
  text: וַ/יַּ֤עַן מֶֽלֶךְ יִשְׂרָאֵל֙ וַ/יֹּ֣אמֶר דַּבְּר֔וּ אַל יִתְהַלֵּ֥ל חֹגֵ֖ר
    כִּ/מְפַתֵּֽחַ־־׃
translation:
  text: And the king of Israel answered and said, “Tell him, ‘Let not the one who
    straps on his armor boast like the one who takes it off.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Let not the one girding boast like the one unfastening.”
      The proverb contrasts preparing for battle with finishing it victoriously.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative use of ענה in dialogue introduction; 'answered' preserves
    the Hebrew discourse formula.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: Direct, natural rendering of the construct phrase while preserving the
    formal identification of the speaker.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Retains the common Hebrew narrative sequence 'answered and said' without
    over-smoothing; the repetition is idiomatic in Hebrew and acceptable in English
    here.
- source_word: דַּבְּרוּ
  chosen: Tell him
  alternatives:
  - Speak
  - Say
  lexicon: HALOT
  rationale: Second person plural imperative, likely addressed to the messengers.
    In English, 'Tell him' makes the implied indirect-address object explicit from
    context and fits the reported-message setting.
- source_word: אַל יִתְהַלֵּל
  chosen: Let not ... boast
  alternatives:
  - must not boast
  - should not brag
  lexicon: HALOT
  rationale: Jussive/negative prohibition with הלל in the hitpael here means to boast
    or glory in oneself. 'Boast' is the most idiomatic and appropriately weighty English
    choice.
- source_word: חֹגֵר
  chosen: the one who straps on his armor
  alternatives:
  - the one girding on armor
  - the one who puts on his belt
  lexicon: HALOT
  rationale: 'Literally ''one girding.'' In this martial proverb the object is implied
    by context: preparing for battle by girding on armor/weapons. ''Straps on his
    armor'' communicates the military image clearly in modern English.'
- source_word: כִּמְפַתֵּחַ
  chosen: like the one who takes it off
  alternatives:
  - like one who loosens it
  - like the one who ungirds
  lexicon: HALOT
  rationale: From פתח in the sense of loosening/unfastening. In contrast with חֹגֵר,
    it refers to removing battle gear after victory. 'Takes it off' is a clear idiomatic
    rendering, with 'it' referring back to the implied armor.
