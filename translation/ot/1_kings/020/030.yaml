id: 1KI.20.30
reference: 1 Kings 20:30
source:
  edition: WLC
  text: וַ/יָּנֻ֨סוּ הַ/נּוֹתָרִ֥ים אֲפֵקָ/ה֮ אֶל הָ/עִיר֒ וַ/תִּפֹּל֙ הַ/חוֹמָ֔ה
    עַל עֶשְׂרִ֨ים וְ/שִׁבְעָ֥ה אֶ֛לֶף אִ֖ישׁ הַ/נּוֹתָרִ֑ים וּ/בֶן הֲדַ֣ד נָ֔ס וַ/יָּבֹ֥א
    אֶל הָ/עִ֖יר חֶ֥דֶר בְּ/חָֽדֶר׀־־־־׃ס
translation:
  text: The survivors fled to Aphek, into the city, and the wall fell on twenty-seven
    thousand of the remaining men. Ben-hadad also fled and entered the city, into
    an inner room.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a room within a room,'' an idiom for an inner or innermost chamber.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָרִים
  chosen: the survivors
  alternatives:
  - those who remained
  - the remnant
  lexicon: HALOT
  rationale: From יתר/נותר, referring to those left alive after the battle. 'Survivors'
    is natural English and fits the military context better than the more wooden 'those
    who remained.'
- source_word: אֲפֵקָה
  chosen: to Aphek
  rationale: Directional he on the place name indicates motion toward Aphek. The place
    name is transliterated per translation philosophy for personal/place names.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: 'Straightforward rendering of עיר. Retained both occurrences to preserve
    the narrative movement: first the survivors flee into the city, then Ben-hadad
    enters the city.'
- source_word: וַתִּפֹּל הַחוֹמָה
  chosen: the wall fell
  alternatives:
  - a wall fell
  lexicon: HALOT
  rationale: The Hebrew has the article, so 'the wall' is preferred. It likely refers
    to the city wall or a section of it; English can preserve the definite form without
    over-specifying.
- source_word: עַל עֶשְׂרִים וְשִׁבְעָה אֶלֶף אִישׁ
  chosen: on twenty-seven thousand ... men
  alternatives:
  - upon twenty-seven thousand men
  - on twenty-seven thousand people
  lexicon: HALOT
  rationale: The numeral phrase is rendered idiomatically as 'twenty-seven thousand.'
    איש here is best represented by 'men' in a military context, consistent with gender-accurate
    translation.
- source_word: הַנּוֹתָרִים
  chosen: the remaining
  alternatives:
  - who were left
  - surviving
  lexicon: HALOT
  rationale: Second occurrence modifies 'men.' Rendering it as 'remaining' avoids
    awkward repetition of 'survivors' while preserving the same lexical idea; this
    is a documented contextual variation.
- source_word: וּבֶן הֲדַד
  chosen: Ben-hadad also
  alternatives:
  - and Ben-hadad
  rationale: The conjunction here is naturally rendered 'also' in English to mark
    Ben-hadad's parallel action after the others fled. The name is transliterated.
- source_word: נָס
  chosen: fled
  alternatives:
  - escaped
  lexicon: HALOT
  rationale: Same root as the opening verb; 'fled' preserves the lexical connection
    and the urgency of retreat.
- source_word: חֶדֶר בְּחָדֶר
  chosen: into an inner room
  alternatives:
  - from room to room
  - into a chamber within a chamber
  - into the innermost room
  lexicon: HALOT
  rationale: The idiom literally reads 'a room within a room.' In context it denotes
    retreat into a concealed interior chamber. 'Into an inner room' gives clear modern
    English without losing the sense of increasing interiority. The more literal alternative
    is preserved in a footnote because it may suggest hiding deeper within the house.
