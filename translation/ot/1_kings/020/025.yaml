id: 1KI.20.25
reference: 1 Kings 20:25
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תִֽמְנֶה לְ/ךָ֣ חַ֡יִל כַּ/חַיִל֩ הַ/נֹּפֵ֨ל מֵ/אוֹתָ֜/ךְ וְ/ס֣וּס
    כַּ/סּ֣וּס וְ/רֶ֣כֶב כָּ/רֶ֗כֶב וְ/נִֽלָּחֲמָ֤ה אוֹתָ/ם֙ בַּ/מִּישׁ֔וֹר אִם לֹ֥א
    נֶחֱזַ֖ק מֵ/הֶ֑ם וַ/יִּשְׁמַ֥ע לְ/קֹלָ֖/ם וַ/יַּ֥עַשׂ כֵּֽן־׀׀־׃פ
translation:
  text: And you, muster for yourself an army like the army that fell from you, and
    horse for horse and chariot for chariot; then let us fight against them on the
    plain. Surely we will be stronger than they are.” So he listened to their voice
    and did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'that fell from you' likely means 'that you lost'—that is, troops
      lost in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'on level ground.' The advisers assume Aram will fare better in the plain
      than in the hills.
    reason: cultural_note
  - marker: c
    text: The expression 'Surely' renders a Hebrew idiom (literally, 'if not') used
      for strong assertion.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמְנֶה
  chosen: muster
  alternatives:
  - number
  - appoint
  lexicon: HALOT
  rationale: מנה in this military context refers to organizing/counting troops for
    deployment, not merely arithmetic numbering. 'Muster' captures the sense of assembling
    and enrolling forces.
- source_word: חַיִל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: Here חַיִל denotes military force rather than wealth or valor. 'Army'
    is the clearest natural English equivalent in context.
- source_word: כַּחַיִל הַנֹּפֵל מֵאוֹתָךְ
  chosen: like the army that fell from you
  alternatives:
  - like the force you lost
  - equal to the army that fell away from you
  lexicon: HALOT
  rationale: The participle נֹפֵל with מִן conveys loss/falling away from one's ranks.
    'That fell from you' preserves the Hebrew image while remaining intelligible;
    the sense is replacement of losses.
- source_word: סוּס כַּסּוּס
  chosen: horse for horse
  alternatives:
  - horses equal to the horses lost
  - horse like horse
  lexicon: HALOT
  rationale: The singular distributive construction is naturally rendered 'horse for
    horse,' expressing one-for-one replacement.
- source_word: רֶכֶב כָּרֶכֶב
  chosen: chariot for chariot
  alternatives:
  - chariots equal to the chariots lost
  - chariot like chariot
  lexicon: HALOT
  rationale: As with 'horse for horse,' the singular distributive idiom indicates
    matching replacement of military assets.
- source_word: וְנִלָּחֲמָה אֹתָם
  chosen: then let us fight against them
  alternatives:
  - and we will fight them
  - and let us wage war with them
  lexicon: HALOT
  rationale: 'The cohortative expresses proposed action by the speakers: ''let us
    fight.'' ''Against them'' makes the adversarial sense explicit in idiomatic English.'
- source_word: בַּמִּישׁוֹר
  chosen: on the plain
  alternatives:
  - in the level country
  - on level ground
  lexicon: HALOT
  rationale: מִישׁוֹר denotes level land/plain country, important to the military
    logic of the advisers in contrast to hill country.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - if not
  - certainly
  lexicon: HALOT
  rationale: In oath-like or emphatic assertions, אִם לֹא functions idiomatically
    as a strong affirmation rather than a conditional clause. 'Surely' conveys the
    force in natural English.
- source_word: נֶחֱזַק מֵהֶם
  chosen: we will be stronger than they are
  alternatives:
  - we will prevail over them
  - we will be stronger than them
  lexicon: HALOT
  rationale: חזק in this comparative military context means being stronger/more powerful.
    The comparative with מִן is preserved directly.
- source_word: וַיִּשְׁמַע לְקֹלָם
  chosen: So he listened to their voice
  alternatives:
  - he listened to them
  - he heeded their advice
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listened to their voice,' meaning he accepted
    their counsel. The translation keeps some formal transparency while remaining
    readable.
- source_word: וַיַּעַשׂ כֵּן
  chosen: and did so
  alternatives:
  - and acted accordingly
  - and did thus
  lexicon: HALOT
  rationale: A concise idiomatic rendering of the Hebrew summary formula.
