id: 1KI.20.23
reference: 1 Kings 20:23
source:
  edition: WLC
  text: וְ/עַבְדֵ֨י מֶֽלֶךְ אֲרָ֜ם אָמְר֣וּ אֵלָ֗י/ו אֱלֹהֵ֤י הָרִים֙ אֱלֹ֣הֵי/הֶ֔ם
    עַל כֵּ֖ן חָזְק֣וּ מִמֶּ֑/נּוּ וְ/אוּלָ֗ם נִלָּחֵ֤ם אִתָּ/ם֙ בַּ/מִּישׁ֔וֹר אִם
    לֹ֥א נֶחֱזַ֖ק מֵ/הֶֽם־־־׃
translation:
  text: And the servants of the king of Aram said to him, “Their gods are gods of
    the hills; that is why they were stronger than we were. But if we fight against
    them on the plain, surely we will be stronger than they are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Their God is a god of the hills …” The Hebrew uses plural forms (“gods”),
      reflecting the Arameans’ pagan way of speaking about Israel’s God.
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  lexicon: HALOT
  rationale: In royal court context, עבד can denote servants or court officials. 'Servants'
    is the more direct rendering and fits the idiom 'servants of the king,' while
    not overstating bureaucratic office.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Translated as the proper name 'Aram' rather than the later geopolitical
    label 'Syria,' following original-language primacy and standard transliteration
    of names.
- source_word: אֱלֹהֵי הָרִים
  chosen: gods of the hills
  alternatives:
  - God of the hills
  lexicon: HALOT
  rationale: The plural construct plus plural noun naturally yields 'gods of the hills.'
    The Aramean speakers are describing Israel's deity in polytheistic terms, so preserving
    the plural reflects their mistaken theology rather than the narrator's view.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their God
  lexicon: HALOT
  rationale: Although אֱלֹהִים can refer to the one God, here the surrounding speech
    is pagan and uses plural predicates/conceptions. 'Their gods' best reproduces
    the speakers' perspective and matches the preceding plural expression.
- source_word: עַל כֵּן
  chosen: that is why
  alternatives:
  - therefore
  - for this reason
  lexicon: HALOT
  rationale: This idiom gives a causal explanation. 'That is why' is natural modern
    English and preserves the explanatory force.
- source_word: חָזְקוּ מִמֶּנּוּ
  chosen: they were stronger than we were
  alternatives:
  - they prevailed over us
  - they were stronger than us
  lexicon: HALOT
  rationale: The verb חזק with מן expresses comparative strength. Because the Hebrew
    subject is 'they' and the comparison is 'from us,' this is best rendered as comparative
    strength rather than a more interpretive 'prevailed.'
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - however
  - nevertheless
  lexicon: HALOT
  rationale: Marks a contrast between the previous explanation and the proposed new
    strategy. 'But' is concise and idiomatic.
- source_word: נִלָּחֵם אִתָּם
  chosen: if we fight against them
  alternatives:
  - if we battle them
  lexicon: HALOT
  rationale: The cohortative-like first person plural in context expresses proposed
    action. English conditional 'if we fight against them' captures the military sense
    naturally.
- source_word: בַּמִּישׁוֹר
  chosen: on the plain
  alternatives:
  - in the plain
  - on level ground
  lexicon: HALOT
  rationale: מִישׁוֹר denotes level land/plain country. 'On the plain' is idiomatic
    in English for battlefield terrain and contrasts well with 'hills.'
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - will we not?
  - certainly
  lexicon: HALOT
  rationale: Here אִם לֹא functions idiomatically as a strong asseveration rather
    than a literal negated condition. 'Surely' conveys the confidence of the speakers'
    claim.
- source_word: נֶחֱזַק מֵהֶם
  chosen: we will be stronger than they are
  alternatives:
  - we will prevail over them
  - we will be stronger than them
  lexicon: HALOT
  rationale: Again חזק with מן is comparative. Rendering it consistently as 'be stronger
    than' preserves the lexical repetition with the earlier clause and keeps the military
    boast transparent.
