theological_decisions:
- issue: Rendering the Arameans' description of Israel's deity
  chosen_reading: their gods are gods of the hills
  alternative_readings:
  - their God is a god of the hills
  rationale: The verse reports pagan speech, not theological truth. Preserving the
    plural reflects the speakers' polytheistic misunderstanding and avoids harmonizing
    their words with Israelite monotheism. This preserves the narrative's irony without
    importing doctrinal correction into the quotation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
