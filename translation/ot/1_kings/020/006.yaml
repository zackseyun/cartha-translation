id: 1KI.20.6
reference: 1 Kings 20:6
source:
  edition: WLC
  text: כִּ֣י אִם כָּ/עֵ֣ת מָחָ֗ר אֶשְׁלַ֤ח אֶת עֲבָדַ/י֙ אֵלֶ֔י/ךָ וְ/חִפְּשׂוּ֙
    אֶת בֵּ֣יתְ/ךָ֔ וְ/אֵ֖ת בָּתֵּ֣י עֲבָדֶ֑י/ךָ וְ/הָיָה֙ כָּל מַחְמַ֣ד עֵינֶ֔י/ךָ
    יָשִׂ֥ימוּ בְ/יָדָ֖/ם וְ/לָקָֽחוּ׀־־־־׃
translation:
  text: No, but about this time tomorrow I will send my servants to you, and they
    will search your house and the houses of your servants; and whatever is desirable
    in your eyes, they will put into their hands and take away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything precious to your eyes,' that is, everything you value highly.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'put into their hands and take'; the expression means to seize and
      carry off.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: No, but
  alternatives:
  - rather
  - indeed, but
  lexicon: HALOT
  rationale: In context this adversative combination rejects the previous limitation
    and intensifies the threat. 'No, but' captures the corrective force in natural
    English better than a wooden 'for if'.
- source_word: כָּעֵת מָחָר
  chosen: about this time tomorrow
  alternatives:
  - at this time tomorrow
  - tomorrow at this time
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning approximately the same time on
    the next day. 'About this time tomorrow' is standard and natural English.
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  - my officials
  lexicon: HALOT
  rationale: Here the term refers to the king's agents or attendants sent on official
    business. 'Servants' fits the political setting better than 'slaves,' since bonded
    status is not the salient point.
- source_word: וְחִפְּשׂוּ
  chosen: they will search
  alternatives:
  - they will inspect
  - they will ransack
  lexicon: HALOT
  rationale: The verb means to search/examine thoroughly. 'Search' preserves the lexical
    sense without overstating the violence implied.
- source_word: בֵּיתְךָ ... בָּתֵּי עֲבָדֶיךָ
  chosen: your house and the houses of your servants
  alternatives:
  - your palace and the houses of your servants
  - your house and your servants' houses
  lexicon: HALOT
  rationale: בַּיִת can mean house or palace, but 'house' keeps the Hebrew imagery
    and allows the parallel with the servants' houses to remain visible.
- source_word: כָּל מַחְמַד עֵינֶיךָ
  chosen: whatever is desirable in your eyes
  alternatives:
  - everything precious to your eyes
  - all that your eyes delight in
  - everything you value
  lexicon: HALOT
  rationale: The phrase denotes what is precious, desirable, or delightful to someone.
    'Desirable in your eyes' stays close to the Hebrew idiom while remaining understandable.
- source_word: יָשִׂימוּ בְיָדָם
  chosen: they will put into their hands
  alternatives:
  - they will seize in their hands
  - they will lay hands on
  lexicon: HALOT
  rationale: Literally 'put in their hand(s).' The phrase here describes taking possession.
    A relatively literal rendering preserves the sequence before the following verb
    'take away.'
- source_word: וְלָקָחוּ
  chosen: and take away
  alternatives:
  - and take
  - and carry off
  lexicon: HALOT
  rationale: The final verb completes the threat of confiscation. 'Take away' makes
    explicit the removal implied by the context.
