theological_decisions:
- issue: Rendering of אֲדֹנִי in address to a human king
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: Because the referent is Ben-hadad, a human monarch, the term is rendered
    as a courtly title rather than with any divine implication. This preserves the
    social hierarchy in the scene without importing theological meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy; translate
    titles according to context.'
