id: 1KI.20.4
reference: 1 Kings 20:4
source:
  edition: WLC
  text: וַ/יַּ֤עַן מֶֽלֶךְ יִשְׂרָאֵל֙ וַ/יֹּ֔אמֶר כִּ/דְבָרְ/ךָ֖ אֲדֹנִ֣/י הַ/מֶּ֑לֶךְ
    לְ/ךָ֥ אֲנִ֖י וְ/כָל אֲשֶׁר לִֽ/י־־־׃
translation:
  text: The king of Israel answered and said, “According to your word, my lord the
    king, I am yours, and all that is mine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “As you say, my lord the king, I and all that I have are yours.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative use of ענה in dialogue introduction; 'answered' preserves
    the formal exchange and pairs naturally with the following speech verb.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: The king of Israel
  alternatives:
  - Israel’s king
  lexicon: HALOT
  rationale: A straightforward construct chain; 'the king of Israel' is the most transparent
    and idiomatic rendering in narrative.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common narrative speech verb; 'said' is the default English equivalent
    and avoids unnecessary elevation.
- source_word: כִּדְבָרְךָ
  chosen: According to your word
  alternatives:
  - As you say
  - According to what you have said
  lexicon: HALOT
  rationale: Literally reflects the preposition כ plus 'your word.' This keeps the
    deferential, formulaic tone of submission better than the more idiomatic 'as you
    say.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: אדני here is a courtly address to a human ruler, not a divine title.
    'My lord the king' preserves both the possessive and the royal honorific in natural
    English.
- source_word: לְךָ אֲנִי
  chosen: I am yours
  alternatives:
  - I belong to you
  - I am for you
  lexicon: HALOT
  rationale: The dative pronoun with independent pronoun expresses possession/allegiance.
    'I am yours' is concise, idiomatic, and captures the king's capitulation.
- source_word: וְכָל אֲשֶׁר לִי
  chosen: and all that is mine
  alternatives:
  - and everything that I have
  - and all that belongs to me
  lexicon: HALOT
  rationale: This preserves the broad scope of כל אשר לי while maintaining a formal,
    compact style that matches the first clause.
