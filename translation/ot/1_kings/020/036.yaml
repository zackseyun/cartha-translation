theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the disobedience explicit as 'obey' or preserve the hearing idiom
  chosen_reading: have not listened to the voice of the LORD
  alternative_readings:
  - have not obeyed the voice of the LORD
  rationale: The Hebrew idiom carries obedience implications, but the text itself uses the hearing/listening expression. Preserving that wording maintains the source-text imagery and lets the judgment context communicate the disobedience.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
