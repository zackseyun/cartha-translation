id: 1KI.20.36
reference: 1 Kings 20:36
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ יַ֚עַן אֲשֶׁ֤ר לֹֽא שָׁמַ֨עְתָּ֙ בְּ/ק֣וֹל יְהוָ֔ה הִנְּ/ךָ֤ הוֹלֵךְ֙ מֵֽ/אִתִּ֔/י וְ/הִכְּ/ךָ֖ הָ/אַרְיֵ֑ה וַ/יֵּ֨לֶךְ֙ מֵֽ/אֶצְל֔/וֹ וַ/יִּמְצָאֵ֥/הוּ הָ/אַרְיֵ֖ה וַ/יַּכֵּֽ/הוּ־׃
translation:
  text: Then he said to him, “Because you have not listened to the voice of Yahweh, behold, when you depart from me, the lion will strike you down.” And when he departed from him, the lion found him and struck him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''have not listened to the voice of the LORD''; the phrase can also carry the sense ''have not obeyed the voice of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the lion will kill you' / 'the lion killed him'; the Hebrew verb means 'strike' and in this context implies a fatal blow.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Because that
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment. 'Because' is natural modern English and preserves the causal force.
- source_word: שָׁמַעְתָּ בְּקוֹל יְהוָה
  chosen: have not listened to the voice of the LORD
  alternatives:
  - have not obeyed the voice of the LORD
  - did not listen to the LORD's voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל can mean both hearing and obeying. 'Listened to' keeps the auditory idiom explicit while allowing the implied disobedience to remain evident from context. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: הִנְּךָ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks the immediacy and certainty of the pronouncement. 'Look' is readable modern English without archaic tone.
- source_word: הוֹלֵךְ מֵאִתִּי
  chosen: when you depart from me
  alternatives:
  - as you go from me
  - you are going away from me
  lexicon: HALOT
  rationale: The participle plus preposition indicates imminent departure from the speaker. 'When you depart from me' expresses the temporal sense naturally in English and fits the predictive warning.
- source_word: וְהִכְּךָ הָאַרְיֵה
  chosen: the lion will strike you down
  alternatives:
  - the lion will strike you
  - the lion will kill you
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting, often with lethal effect in context. 'Strike you down' preserves the verbal imagery and fits the outcome without over-paraphrasing.
- source_word: וַיֵּלֶךְ מֵאֶצְלוֹ
  chosen: when he departed from him
  alternatives:
  - he went away from him
  - he left his presence
  lexicon: HALOT
  rationale: Narrates the fulfillment immediately after the warning. 'Departed from him' echoes the prior clause and preserves the relational preposition.
- source_word: וַיִּמְצָאֵהוּ
  chosen: found him
  alternatives:
  - came upon him
  - encountered him
  lexicon: HALOT
  rationale: A straightforward rendering of מצא in narrative context.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - struck him
  - killed him
  lexicon: HALOT
  rationale: Repeats נכה from the warning, so the English repeats correspondingly. 'Struck him down' suggests the fatal result while preserving lexical consistency.
