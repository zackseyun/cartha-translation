id: 1KI.20.9
reference: 1 Kings 20:9
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר לְ/מַלְאֲכֵ֣י בֶן הֲדַ֗ד אִמְר֞וּ לַֽ/אדֹנִ֤/י הַ/מֶּ֨לֶךְ֙ כֹּל֩
    אֲשֶׁר שָׁלַ֨חְתָּ אֶל עַבְדְּ/ךָ֤ בָ/רִֽאשֹׁנָה֙ אֶעֱשֶׂ֔ה וְ/הַ/דָּבָ֣ר הַ/זֶּ֔ה
    לֹ֥א אוּכַ֖ל לַ/עֲשׂ֑וֹת וַ/יֵּֽלְכוּ֙ הַ/מַּלְאָכִ֔ים וַ/יְשִׁבֻ֖/הוּ דָּבָֽר־־־׃
translation:
  text: So he said to the messengers of Ben-hadad, “Say to my lord the king, ‘All
    that you sent to your servant the first time, I will do; but this thing I cannot
    do.’” And the messengers went and brought him back word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this matter”; Hebrew דָּבָר can mean “thing,” “matter,” or “word/message”
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאֲכֵי
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this political context, the term refers to royal representatives rather
    than supernatural beings. 'Messengers' is clear modern English; 'envoys' is possible
    but slightly more specialized.
- source_word: בֶן הֲדַד
  chosen: Ben-hadad
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative introducing direct reported speech. 'Say' preserves the straightforward
    force of the Hebrew.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  chosen: to my lord the king
  alternatives:
  - to my master the king
  lexicon: HALOT
  rationale: אדֹן here is a courtly title of deference. 'Lord' best preserves the
    formal honorific tone without implying divinity; 'master' is possible but less
    idiomatic in royal address.
- source_word: כֹּל אֲשֶׁר שָׁלַחְתָּ
  chosen: All that you sent
  alternatives:
  - Everything that you demanded
  lexicon: HALOT
  rationale: The verb is literally 'sent.' Since the object is an earlier demand conveyed
    by message, 'sent' is retained rather than interpreting it more dynamically as
    'demanded.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In royal self-reference this is a conventional expression of submission
    and humility. Although the Hebrew can denote a slave, here 'servant' better matches
    the diplomatic register and avoids overstating chattel status.
- source_word: בָרִאשֹׁנָה
  chosen: the first time
  alternatives:
  - at first
  - formerly
  lexicon: HALOT
  rationale: The phrase points back to Ben-hadad's earlier message. 'The first time'
    is the clearest idiomatic English rendering in context.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will comply with
  lexicon: HALOT
  rationale: A straightforward future of עשׂה. 'I will do' preserves the directness
    of the Hebrew; the compliance sense is contextually implied.
- source_word: וְהַדָּבָר הַזֶּה
  chosen: but this thing
  alternatives:
  - but this matter
  - but this demand
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to the newly
    added demand. 'This thing' is literal and natural enough; 'matter' is possible,
    while 'demand' would be more interpretive.
- source_word: לֹא אוּכַל לַעֲשׂוֹת
  chosen: I cannot do
  alternatives:
  - I am not able to do
  lexicon: HALOT
  rationale: יכל + infinitive expresses inability. 'I cannot do' is idiomatic modern
    English and preserves the force.
- source_word: וַיְשִׁבֻהוּ דָּבָר
  chosen: brought him back word
  alternatives:
  - returned him an answer
  - reported the message back to him
  lexicon: HALOT
  rationale: The idiom combines 'return' with 'word/message.' 'Brought him back word'
    is natural English that preserves the sense of delivering a reply to Ben-hadad.
