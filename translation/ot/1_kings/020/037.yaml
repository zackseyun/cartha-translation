id: 1KI.20.37
reference: 1 Kings 20:37
source:
  edition: WLC
  text: וַ/יִּמְצָא֙ אִ֣ישׁ אַחֵ֔ר וַ/יֹּ֖אמֶר הַכֵּ֣י/נִי נָ֑א וַ/יַּכֵּ֥/הוּ הָ/אִ֖ישׁ
    הַכֵּ֥ה וּ/פָצֹֽעַ׃
translation:
  text: Then he found another man and said, “Please strike me.” So the man struck
    him, striking and wounding him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the verb ''strike'' for emphasis: literally, ''the man struck
      him, striking and wounding.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  chosen: Then he found
  alternatives:
  - And he found
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the story. 'Then he found' gives natural
    English narrative sequence while preserving the simple sense of מצא.
- source_word: אִישׁ אַחֵר
  chosen: another man
  alternatives:
  - a different man
  - another person
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man'; אַחֵר adds 'another.' 'Another man'
    is the most direct and natural rendering, preserving gender-accurate language
    per translation philosophy.
- source_word: הַכֵּינִי נָא
  chosen: Please strike me
  alternatives:
  - Strike me, please
  - Please hit me
  lexicon: HALOT
  rationale: Imperative of נכה with 1cs suffix means 'strike me.' נָא adds entreaty/politeness,
    best represented by 'please.' 'Strike' fits the seriousness of the action better
    than the more colloquial 'hit.'
- source_word: וַיַּכֵּהוּ
  chosen: So the man struck him
  alternatives:
  - And the man struck him
  lexicon: HALOT
  rationale: Narrative continuation with explicit object suffix 'him.' 'So' reflects
    result from the request; 'the man' represents the following subject phrase in
    idiomatic English.
- source_word: הָאִישׁ
  chosen: the man
  lexicon: HALOT
  rationale: Definite noun identifies the second man as the one acting. Included explicitly
    in English for clarity.
- source_word: הַכֵּה וּפָצֹעַ
  chosen: striking and wounding him
  alternatives:
  - and wounded him
  - striking him so that he wounded him
  - with blows that wounded him
  lexicon: HALOT
  rationale: The infinitive absolute/finite-verb-like sequence intensifies or specifies
    the manner/result of the blow. Rendering it as 'striking and wounding him' preserves
    both the emphatic force of הַכֵּה and the resulting injury expressed by פצע without
    flattening the Hebrew repetition.
