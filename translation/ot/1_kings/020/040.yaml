id: 1KI.20.40
reference: 1 Kings 20:40
source:
  edition: WLC
  text: וַ/יְהִ֣י עַבְדְּ/ךָ֗ עֹשֵׂ֥ה הֵ֛נָּה וָ/הֵ֖נָּה וְ/ה֣וּא אֵינֶ֑/נּוּ וַ/יֹּ֨אמֶר
    אֵלָ֧י/ו מֶֽלֶךְ יִשְׂרָאֵ֛ל כֵּ֥ן מִשְׁפָּטֶ֖/ךָ אַתָּ֥ה חָרָֽצְתָּ־׃
translation:
  text: And as your servant was busy here and there, he was gone. Then the king of
    Israel said to him, “So shall your judgment be; you yourself have decided it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was doing this and that.” The Hebrew idiom means being occupied in various
      directions or tasks.
    reason: lexical_alternative
  - marker: b
    text: Literally, “and he was not,” meaning the man under guard was no longer present.
    reason: lexical_alternative
  - marker: c
    text: Or “your sentence” / “your verdict”; the line means the king accepts the
      speaker’s own stated standard of judgment against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: The speaker uses a deferential self-reference before the king. Although
    עבד can denote a slave, in royal address 'your servant' best captures the social-political
    humility without overstating chattel status in this immediate context.
- source_word: עֹשֵׂה הֵנָּה וָהֵנָּה
  chosen: was busy here and there
  alternatives:
  - was doing this and that
  - was occupied here and there
  lexicon: HALOT
  rationale: The participle עֹשֵׂה with the adverbial pair הֵנָּה וָהֵנָּה idiomatically
    conveys being occupied in various directions/tasks. 'Was busy here and there'
    is natural English and preserves the evasive sense of distraction.
- source_word: וְהוּא אֵינֶנּוּ
  chosen: he was gone
  alternatives:
  - he was not there
  - he was no more
  - he disappeared
  lexicon: HALOT
  rationale: Literally 'and he is not.' In context the guarded prisoner has escaped.
    'He was gone' communicates absence due to escape in idiomatic English without
    adding more than the context warrants.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Standard title construction; translated directly.
- source_word: כֵּן
  chosen: So shall
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces the king's judicial conclusion. 'So shall' gives the formal,
    verdict-like force in smooth English.
- source_word: מִשְׁפָּטְךָ
  chosen: your judgment
  alternatives:
  - your sentence
  - your verdict
  - your case
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the judicial decision or sentence that applies.
    'Judgment' preserves the legal tone and allows the next clause to explain that
    the man has pronounced it on himself.
- source_word: אַתָּה חָרָצְתָּ
  chosen: you yourself have decided it
  alternatives:
  - you yourself have determined it
  - you have pronounced it yourself
  lexicon: HALOT
  rationale: חרץ in this context means to decide/determine. The explicit pronoun אַתָּה
    is emphatic, so 'you yourself' preserves that emphasis. 'Decided it' fits the
    judicial setting and the trap of self-condemnation.
