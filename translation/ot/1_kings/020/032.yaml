theological_decisions:
- issue: Meaning of 'brother' in Ahab's response
  chosen_reading: 'Retain the kinship term literally: ''He is my brother.'''
  alternative_readings:
  - He is my ally
  - He is like a brother to me
  rationale: The Hebrew uses the ordinary kinship term אָחִי. In context it likely
    expresses political fraternity or magnanimity rather than literal sibling relation,
    but the text itself does not resolve that nuance. Preserving the literal term
    maintains the narrative tension and avoids interpretive overreach.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
