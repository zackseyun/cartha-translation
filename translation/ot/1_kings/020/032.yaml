id: 1KI.20.32
reference: 1 Kings 20:32
source:
  edition: WLC
  text: וַ/יַּחְגְּרוּ֩ שַׂקִּ֨ים בְּ/מָתְנֵי/הֶ֜ם וַ/חֲבָלִ֣ים בְּ/רָאשֵׁי/הֶ֗ם וַ/יָּבֹ֨אוּ֙
    אֶל מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יֹּ֣אמְר֔וּ עַבְדְּ/ךָ֧ בֶן הֲדַ֛ד אָמַ֖ר תְּחִֽי נָ֣א
    נַפְשִׁ֑/י וַ/יֹּ֛אמֶר הַ/עוֹדֶ֥/נּוּ חַ֖י אָחִ֥/י הֽוּא־־־׃
translation:
  text: So they tied sackcloth around their waists and ropes on their heads, and they
    came to the king of Israel and said, “Your servant Ben-hadad says, ‘Please let
    me live.’” And he said, “Is he still alive? He is my brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Spare my life, please.' Literally, 'May my life live, please.'
    reason: lexical_alternative
  - marker: b
    text: '''He is my brother'' likely expresses political or covenantal fraternity,
      not literal family relation.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּחְגְּרוּ
  chosen: they tied around
  alternatives:
  - they girded
  - they put on
  lexicon: HALOT
  rationale: The verb חגר commonly means to gird or bind on. In modern English, 'tied
    ... around' communicates the physical action naturally while preserving the concrete
    imagery.
- source_word: שַׂקִּים
  chosen: sackcloth
  alternatives:
  - sacks
  - coarse cloth
  lexicon: HALOT
  rationale: Standard rendering for the mourning/humiliation garment material. Singular
    mass noun in English is more idiomatic than 'sacks' here.
- source_word: בְּמָתְנֵיהֶם
  chosen: around their waists
  alternatives:
  - on their loins
  - around their loins
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the waist/loins. 'Waists' is readable modern English;
    'loins' is more formal but less natural for contemporary readers.
- source_word: וַחֲבָלִים
  chosen: ropes
  alternatives:
  - cords
  lexicon: HALOT
  rationale: חֲבָלִים denotes ropes/cords. 'Ropes' is the clearer common English term.
- source_word: בְּרָאשֵׁיהֶם
  chosen: on their heads
  alternatives:
  - around their heads
  lexicon: HALOT
  rationale: The preposition with 'heads' likely describes ropes placed as a sign
    of submission. 'On their heads' is the most straightforward rendering without
    over-specifying the exact arrangement.
- source_word: עַבְדְּךָ
  chosen: Your servant
  alternatives:
  - Your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in royal diplomatic speech
    it is a conventional self-humbling address. 'Servant' best fits the register here
    without importing bonded-status emphasis not foregrounded in this context.
- source_word: בֶן הֲדַד
  chosen: Ben-hadad
  rationale: Personal name is transliterated per project policy.
- source_word: תְּחִי נָא נַפְשִׁי
  chosen: Please let me live
  alternatives:
  - Please, let my life live
  - May my life live, please
  - Spare my life, please
  lexicon: HALOT
  rationale: Literally, 'may my life live, please.' The idiom is a plea for preservation
    of life. 'Please let me live' is concise, natural English that preserves the force
    of the request without unnecessary awkwardness.
- source_word: הַעוֹדֶנּוּ חַי
  chosen: Is he still alive?
  alternatives:
  - Is he yet alive?
  lexicon: HALOT
  rationale: The interrogative plus עוד and adjective חי asks whether Ben-hadad remains
    alive. 'Still alive' is idiomatic modern English.
- source_word: אָחִי הוּא
  chosen: He is my brother
  alternatives:
  - He is a brother to me
  lexicon: HALOT
  rationale: אָח can denote literal brotherhood or broader kinship/alliance language.
    The direct rendering 'He is my brother' preserves the ambiguity and rhetorical
    force.
