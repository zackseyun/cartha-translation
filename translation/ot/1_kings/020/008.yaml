id: 1KI.20.8
reference: 1 Kings 20:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ אֵלָ֛י/ו כָּל הַ/זְּקֵנִ֖ים וְ/כָל הָ/עָ֑ם אַל תִּשְׁמַ֖ע וְ/ל֥וֹא
    תֹאבֶֽה־־־׃
translation:
  text: Then all the elders and all the people said to him, “Do not listen, and do
    not consent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not obey, and do not agree.' The Hebrew verbs can carry the senses
      of listening/obeying (שׁמע) and being willing/consenting (אבה).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר commonly advances the narrative. 'Then' captures the
    sequential force in natural English, while 'said' preserves the speech verb.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Ahab
  lexicon: HALOT
  rationale: The pronominal object is explicit in Hebrew; the antecedent is the king
    in context, but the verse itself uses only the pronoun, so 'to him' is the most
    text-faithful rendering.
- source_word: כָּל הַזְּקֵנִים
  chosen: all the elders
  alternatives:
  - all the old men
  lexicon: HALOT
  rationale: זְקֵנִים in this context denotes community leaders/council elders, not
    merely aged males. 'Elders' is the standard contextual rendering.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  lexicon: HALOT
  rationale: עָם here refers to the broader body of people alongside the elders. 'People'
    is the natural and sufficiently broad English equivalent.
- source_word: אַל תִּשְׁמַע
  chosen: Do not listen
  alternatives:
  - Do not hear him
  - Do not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the counsel
    concerns responding to Ben-hadad's demand; 'listen' best preserves the immediate
    sense without over-interpreting as full obedience.
- source_word: וְלֹא תֹאבֶה
  chosen: and do not consent
  alternatives:
  - and do not be willing
  - and do not agree
  lexicon: HALOT
  rationale: אבה conveys willingness or consent. 'Consent' fits the political-negotiation
    context and pairs well with 'do not listen' as a second, climactic refusal.
