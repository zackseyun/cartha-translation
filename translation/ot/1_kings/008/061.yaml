id: 1KI.8.61
reference: 1 Kings 8:61
source:
  edition: WLC
  text: וְ/הָיָ֤ה לְבַבְ/כֶם֙ שָׁלֵ֔ם עִ֖ם יְהוָ֣ה אֱלֹהֵ֑י/נוּ לָ/לֶ֧כֶת בְּ/חֻקָּ֛י/ו וְ/לִ/שְׁמֹ֥ר מִצְוֺתָ֖י/ו כַּ/יּ֥וֹם הַ/זֶּֽה׃
translation:
  text: Let your heart therefore be wholly with Yahweh our God, to walk in his statutes and to keep his commandments, as at this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''undivided'': ''Let your heart therefore be undivided with the LORD our God.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''as on this day,'' referring to the present day as the pattern or witness of such devotion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Let ... be
  alternatives:
  - and let ... be
  - and may ... be
  lexicon: HALOT
  rationale: The waw + qatal of היה functions here as a jussive-like exhortation in context following Solomon's blessing/prayer. English idiom is best captured with an exhortational 'Let ... be' rather than a simple future 'and it will be.'
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner person, including will and devotion. Singular 'heart' with plural possessive matches the Hebrew collective sense and reads naturally in English.
- source_word: שָׁלֵם
  chosen: wholly
  alternatives:
  - whole
  - complete
  - blameless
  - undivided
  lexicon: HALOT
  rationale: In covenantal contexts שָׁלֵם describes completeness or undivided loyalty. 'Wholly' communicates adverbially the sense of full devotion to the LORD. 'Undivided' is a strong alternative, but 'wholly with' preserves the Hebrew construction more closely.
- source_word: עִם יְהוָה אֱלֹהֵינוּ
  chosen: with the LORD our God
  alternatives:
  - toward the LORD our God
  - devoted to the LORD our God
  lexicon: HALOT
  rationale: עִם is literally 'with.' Retaining 'with the LORD our God' preserves the relational/covenantal imagery. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to live
  - to conduct yourselves
  lexicon: HALOT
  rationale: הלך in covenantal idiom often means living or conducting oneself, but 'walk' is a standard and transparent biblical metaphor that preserves the source imagery.
- source_word: בְּחֻקָּיו
  chosen: in his statutes
  alternatives:
  - according to his statutes
  - in his decrees
  lexicon: HALOT
  rationale: חֻקִּים refers to prescribed statutes/decrees. 'In his statutes' follows the Hebrew preposition and pairs naturally with 'walk.'
- source_word: וְלִשְׁמֹר
  chosen: and to keep
  alternatives:
  - and to observe
  - and to guard
  lexicon: HALOT
  rationale: שׁמר in legal/covenantal contexts commonly means to keep or observe commandments. 'Keep' is concise and idiomatic.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוֹת are commandments/commands. 'Commandments' preserves the covenantal and scriptural register.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as at this day
  alternatives:
  - as on this day
  - as it is today
  lexicon: HALOT
  rationale: The phrase points to the present occasion as a standard or witness. 'As at this day' is slightly formal but accurately reflects the Hebrew idiom without over-paraphrasing.
