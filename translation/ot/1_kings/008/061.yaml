theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of covenantal completeness in שָׁלֵם
  chosen_reading: wholly
  alternative_readings:
  - undivided
  - complete
  rationale: The verse exhorts covenant loyalty without importing later theological categories such as sinless perfection. 'Wholly' conveys complete devotion while preserving the relational force of being 'with the LORD.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
