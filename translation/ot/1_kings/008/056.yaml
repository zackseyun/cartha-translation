  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render דָּבָר / דְּבָרוֹ as 'word' or 'promise'
  chosen_reading: word
  alternative_readings:
  - promise
  rationale: The context clearly concerns fulfilled divine promises, but the Hebrew repeatedly uses 'word.' To avoid importing a more interpretive theological gloss into the main text, 'word' is retained while the promissory nuance is preserved in a footnote.
