id: 1KI.8.56
reference: 1 Kings 8:56
source:
  edition: WLC
  text: בָּר֣וּךְ יְהוָ֗ה אֲשֶׁ֨ר נָתַ֤ן מְנוּחָה֙ לְ/עַמּ֣/וֹ יִשְׂרָאֵ֔ל כְּ/כֹ֖ל אֲשֶׁ֣ר דִּבֵּ֑ר לֹֽא נָפַ֞ל דָּבָ֣ר אֶחָ֗ד מִ/כֹּל֙ דְּבָר֣/וֹ הַ/טּ֔וֹב אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד מֹשֶׁ֥ה עַבְדּֽ/וֹ־׃
translation:
  text: Blessed be Yahweh, who has given rest to his people Israel, according to all that he spoke. Not one word has failed of all his good words that he spoke by the hand of Moses his servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Not one promise has failed of all his good promise,' since 'word' here carries the sense of a spoken promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - Praise be to
  lexicon: HALOT
  rationale: Predicate adjective used in a benedictory/exclamatory formula. 'Blessed be' preserves the doxological force in natural English better than the flatter 'Blessed is,' while avoiding the more interpretive 'Praise be to.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָתַן מְנוּחָה
  chosen: has given rest
  alternatives:
  - has given peace
  - has given a resting place
  lexicon: HALOT
  rationale: The collocation denotes granting settled rest from enemies and instability, not merely inward peace. 'Has given rest' is the most direct and contextually fitting rendering.
- source_word: לְעַמּוֹ יִשְׂרָאֵל
  chosen: to his people Israel
  alternatives:
  - to Israel his people
  - to his people, Israel
  lexicon: HALOT
  rationale: Construct and apposition are naturally rendered in English as 'to his people Israel.' This preserves covenantal language without overpunctuating the appositional relation.
- source_word: כְּכֹל אֲשֶׁר דִּבֵּר
  chosen: according to all that he spoke
  alternatives:
  - just as he promised
  - according to all that he said
  lexicon: HALOT
  rationale: The Hebrew says 'spoke,' not an explicit verb for promise, though the context concerns fulfillment. 'According to all that he spoke' preserves the wording while remaining idiomatic.
- source_word: לֹא נָפַל דָּבָר אֶחָד
  chosen: Not one word has failed
  alternatives:
  - Not one thing has fallen
  - Not one word has fallen to the ground
  lexicon: HALOT
  rationale: The idiom means that nothing spoken proved ineffective or unfulfilled. 'Has failed' communicates the idiomatic sense clearly in modern English.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - thing
  - matter
  lexicon: HALOT
  rationale: Although דָּבָר can mean 'thing' or 'matter,' in this context of divine speech and fulfillment, 'word' best preserves the verbal emphasis.
- source_word: מִכֹּל דְּבָרוֹ הַטּוֹב
  chosen: of all his good word
  alternatives:
  - of all his good promise
  - of all his good words
  lexicon: HALOT
  rationale: Singular דְּבָרוֹ with the collective sense can be rendered literally as 'his good word.' 'Promise' is contextually attractive but slightly interpretive; retaining 'word' preserves the Hebrew diction and links with the previous clause.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: This is a standard Hebrew agency formula. 'By the hand of' preserves the idiom and its formal register; it remains understandable in English and reflects prophetic mediation.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: While עֶבֶד can denote slave or servant, in honorific reference to Moses as YHWH's commissioned agent, 'servant' is the most natural and contextually appropriate English rendering.
