id: 1KI.8.14
reference: 1 Kings 8:14
source:
  edition: WLC
  text: וַ/יַּסֵּ֤ב הַ/מֶּ֨לֶךְ֙ אֶת פָּנָ֔י/ו וַ/יְבָ֕רֶךְ אֵ֖ת כָּל קְהַ֣ל יִשְׂרָאֵ֑ל
    וְ/כָל קְהַ֥ל יִשְׂרָאֵ֖ל עֹמֵֽד־־־׃
translation:
  text: Then the king turned his face around and blessed all the assembly of Israel,
    while all the assembly of Israel was standing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned' or 'turned about.' The Hebrew literally says 'turned his face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the congregation of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: turned ... around
  alternatives:
  - turned
  - turned about
  - faced
  lexicon: HALOT
  rationale: From סבב, here in the causative/turning sense with 'his face' as object.
    'Turned ... around' preserves the physical movement more clearly than the idiomatic
    but less literal 'faced.'
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his face toward
  - himself
  lexicon: HALOT
  rationale: Literally 'his face.' Retained rather than smoothing to 'himself' in
    order to preserve the Hebrew expression, while still reading naturally in English.
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: Standard rendering of ברך in this context. 'Blessed' is concise and natural,
    and in a royal-public setting can include spoken benediction without needing expansion.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - all the congregation of Israel
  - the whole gathered community of Israel
  lexicon: HALOT
  rationale: קהל denotes the assembled people. 'Assembly' is clear modern English
    and preserves the corporate, gathered sense better than the more tradition-bound
    'congregation' in this narrative context.
- source_word: וְכָל קְהַל יִשְׂרָאֵל עֹמֵד
  chosen: while all the assembly of Israel was standing
  alternatives:
  - and all the assembly of Israel stood
  - with all the assembly of Israel standing
  lexicon: HALOT
  rationale: The clause is verbless except for the participle עֹמֵד, describing the
    people's posture during the blessing. 'While ... was standing' best conveys the
    ongoing/background action in idiomatic English.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - standing
  lexicon: HALOT
  rationale: The masculine singular participle functions collectively with the singular
    collective noun קהל. Rendering it as progressive English reflects the participial
    aspect and the scene-setting force.
