id: 1KI.8.33
reference: 1 Kings 8:33
source:
  edition: WLC
  text: בְּֽ/הִנָּגֵ֞ף עַמְּ/ךָ֧ יִשְׂרָאֵ֛ל לִ/פְנֵ֥י אוֹיֵ֖ב אֲשֶׁ֣ר יֶחֶטְאוּ לָ֑/ךְ
    וְ/שָׁ֤בוּ אֵלֶ֨י/ךָ֙ וְ/הוֹד֣וּ אֶת שְׁמֶ֔/ךָ וְ/הִֽתְפַּֽלְל֧וּ וְ/הִֽתְחַנְּנ֛וּ
    אֵלֶ֖י/ךָ בַּ/בַּ֥יִת הַ/זֶּֽה־־׃
translation:
  text: When your people Israel are struck down before an enemy because they have
    sinned against you, and they turn back to you and confess your name and pray and
    plead for favor before you in this house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praise your name' or 'give thanks to your name.' The Hebrew verb can
      denote confession, praise, or thanksgiving depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִנָּגֵף
  chosen: are struck down
  alternatives:
  - are defeated
  - are smitten
  lexicon: HALOT
  rationale: Niphal infinitive construct of נָגַף in a military context commonly denotes
    being struck/defeated before an enemy. 'Are struck down' preserves the passive
    force and the severity without sounding archaic.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: HALOT
  rationale: Keeps the covenantal possessive and appositional identification of the
    people as Israel.
- source_word: לִפְנֵי אוֹיֵב
  chosen: before an enemy
  alternatives:
  - before the enemy
  - by an enemy
  lexicon: HALOT
  rationale: לִפְנֵי literally 'before/in the presence of'; in defeat formulas 'before
    an enemy' is idiomatic and close to the Hebrew. The noun lacks the article, so
    'an enemy' is preferable.
- source_word: אֲשֶׁר יֶחֶטְאוּ לָךְ
  chosen: because they have sinned against you
  alternatives:
  - when they sin against you
  - for they sin against you
  lexicon: HALOT
  rationale: The relative particle introduces the reason for the defeat. 'Because
    they have sinned against you' makes the causal sense explicit and natural in English.
- source_word: וְשָׁבוּ אֵלֶיךָ
  chosen: and they turn back to you
  alternatives:
  - and return to you
  - and repent and return to you
  lexicon: HALOT
  rationale: שׁוּב here denotes returning to God after sin. 'Turn back' preserves
    the metaphor of return without importing the fuller theological term 'repent'
    beyond the lexical content.
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  chosen: and confess your name
  alternatives:
  - and give thanks to your name
  - and praise your name
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean confess, praise, or give thanks depending
    on context. Here, in a sequence following sin and return, 'confess your name'
    best captures acknowledgment of God's character and lordship in penitential prayer.
    The alternatives remain possible and are preserved in a footnote.
- source_word: וְהִתְפַּלְלוּ
  chosen: and pray
  lexicon: HALOT
  rationale: Standard rendering of פלל in the Hitpael.
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  chosen: and plead for favor before you
  alternatives:
  - and make supplication to you
  - and seek your favor
  lexicon: HALOT
  rationale: חנן in the Hitpael expresses earnest entreaty for grace/favor. 'Plead
    for favor' is readable modern English and preserves the grace-oriented nuance.
- source_word: בַּבַּיִת הַזֶּה
  chosen: in this house
  alternatives:
  - toward this house
  - in this temple
  lexicon: HALOT
  rationale: The Hebrew preposition is plainly 'in,' and בַּיִת in this context refers
    to the temple as the house built for the LORD. 'House' preserves the source wording;
    'temple' is interpretive though contextually true.
