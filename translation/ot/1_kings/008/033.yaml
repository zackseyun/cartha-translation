theological_decisions:
- issue: Rendering penitential/restoration language without over-specifying repentance
  chosen_reading: turn back to you
  alternative_readings:
  - return to you
  - repent and return to you
  rationale: The verse describes covenant restoration after sin, but the Hebrew verb
    שׁוּב itself means 'turn/return.' Using 'turn back' preserves the theological
    movement without importing a fuller doctrinal formulation not explicit in the
    word itself.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering וְהוֹדוּ אֶת שְׁמֶךָ in a penitential context
  chosen_reading: confess your name
  alternative_readings:
  - praise your name
  - give thanks to your name
  rationale: Because the immediate context is sin, defeat, and return, the acknowledgment
    implied by ידה is best represented by 'confess' rather than thanksgiving alone.
    This preserves the theological tension of the verb's semantic range by noting
    alternatives in a footnote rather than flattening it.
  doctrine_reference: Translation philosophy §3, §5
