id: 1KI.8.65
reference: 1 Kings 8:65
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שְׁלֹמֹ֣ה בָֽ/עֵת הַ/הִ֣יא אֶת הֶ/חָ֡ג וְ/כָל יִשְׂרָאֵ֣ל עִמּ/וֹ֩
    קָהָ֨ל גָּד֜וֹל מִ/לְּב֥וֹא חֲמָ֣ת עַד נַ֣חַל מִצְרַ֗יִם לִ/פְנֵי֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ
    שִׁבְעַ֥ת יָמִ֖ים וְ/שִׁבְעַ֣ת יָמִ֑ים אַרְבָּעָ֥ה עָשָׂ֖ר יֽוֹם־׀־־׀־׃
translation:
  text: At that time Solomon held the feast, and all Israel with him—a great assembly,
    from Lebo-hamath to the Brook of Egypt—before the LORD our God, seven days and
    seven days, fourteen days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the entrance of Hamath.' The Hebrew may be read as a descriptive
      border expression or as the place-name Lebo-hamath.
    reason: alternative_reading
  - marker: b
    text: Or 'the Wadi of Egypt.' The Hebrew term often refers to a seasonal watercourse
      rather than a major river.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: held
  alternatives:
  - made
  - kept
  - celebrated
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with חָג ('feast/festival')
    the idiom means to observe or celebrate a festival. 'Held' is natural modern English
    and preserves the event-focused sense without over-paraphrasing.
- source_word: הֶחָג
  chosen: the feast
  alternatives:
  - the festival
  lexicon: HALOT
  rationale: חָג denotes a pilgrimage feast/festival. 'Feast' is concise and idiomatic
    in this temple-dedication context; 'festival' is possible but slightly less traditional
    here.
- source_word: קָהָל גָּדוֹל
  chosen: a great assembly
  alternatives:
  - a great congregation
  - a vast gathering
  lexicon: HALOT
  rationale: קָהָל is an assembled community. 'Assembly' preserves the formal communal
    sense better than the more ecclesiastically loaded 'congregation' or the more
    generic 'gathering'.
- source_word: מִלְּבֹא חֲמָת
  chosen: from Lebo-hamath
  alternatives:
  - from the entrance of Hamath
  lexicon: HALOT
  rationale: The phrase can function as a geographic place-name ('Lebo-hamath') or
    be rendered descriptively ('entrance of Hamath'). Because it commonly serves as
    a fixed territorial marker, the transliterated place-name is preferred in the
    main text, with the descriptive alternative preserved in a footnote.
- source_word: נַחַל מִצְרַיִם
  chosen: the Brook of Egypt
  alternatives:
  - the Wadi of Egypt
  - the River of Egypt
  lexicon: HALOT
  rationale: נַחַל usually denotes a wadi, torrent-bed, or brook rather than a major
    river. 'Brook of Egypt' is a familiar and defensible rendering; 'Wadi of Egypt'
    is more geographically precise but less natural for many readers. 'River of Egypt'
    could be confused with the Nile and is therefore avoided.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵינוּ
  chosen: before the LORD our God
  alternatives:
  - in the presence of the LORD our God
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational ('before/in the presence of'). 'Before
    the LORD our God' is direct and idiomatic. Per doctrine, יְהוָה is rendered 'the
    LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    reverential convention and alignment with the LXX/English Bible tradition as specified
    in DOCTRINE.md.
- source_word: שִׁבְעַת יָמִים וְשִׁבְעַת יָמִים
  chosen: seven days and seven days
  alternatives:
  - for seven days and seven days
  - seven days, and another seven days
  lexicon: HALOT
  rationale: The Hebrew repeats the phrase for emphasis and structure, likely referring
    to two consecutive seven-day observances. The translation preserves the repetition
    rather than collapsing it into a smoother but less transparent paraphrase.
- source_word: אַרְבָּעָה עָשָׂר יוֹם
  chosen: fourteen days
  alternatives:
  - fourteen day(s)
  lexicon: HALOT
  rationale: This appositional summary clarifies the total duration. Standard English
    idiom is 'fourteen days.'
