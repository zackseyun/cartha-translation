id: 1KI.8.29
reference: 1 Kings 8:29
source:
  edition: WLC
  text: לִ/הְיוֹת֩ עֵינֶ֨/ךָ פְתֻח֜וֹת אֶל הַ/בַּ֤יִת הַ/זֶּה֙ לַ֣יְלָה וָ/י֔וֹם אֶל
    הַ֨/מָּק֔וֹם אֲשֶׁ֣ר אָמַ֔רְתָּ יִהְיֶ֥ה שְׁמִ֖/י שָׁ֑ם לִ/שְׁמֹ֨עַ֙ אֶל הַ/תְּפִלָּ֔ה
    אֲשֶׁ֣ר יִתְפַּלֵּ֣ל עַבְדְּ/ךָ֔ אֶל הַ/מָּק֖וֹם הַ/זֶּֽה־־־־׃
translation:
  text: that your eyes may be open toward this house night and day, toward the place
    of which you said, ‘My name will be there,’ to hear the prayer that your servant
    prays toward this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''My name will be there'' is temple-language for God''s chosen association
      with this place, implying his covenantal presence without reducing the phrase
      to that single gloss.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  chosen: that ... may be
  alternatives:
  - to be
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל after the preceding request
    functions purposefully/resultatively in context. English idiom is best represented
    with a finite clause, 'that your eyes may be,' rather than a bare infinitive.
- source_word: עֵינֶךָ פְתֻחוֹת
  chosen: your eyes may be open
  alternatives:
  - your eyes being open
  - your eyes may remain open
  lexicon: HALOT
  rationale: A literal anthropomorphic expression for attentive regard. 'Open' preserves
    the metaphor without over-interpreting it as merely 'watchful' or 'attentive.'
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - upon this house
  - to this house
  lexicon: HALOT
  rationale: אֶל here marks direction/orientation. 'Toward' fits the imagery of God's
    eyes being directed at the temple better than the more spatially awkward 'to'
    or the interpretive 'upon.' 'House' preserves temple language in Solomon's prayer.
- source_word: לַיְלָה וָיוֹם
  chosen: night and day
  alternatives:
  - by night and by day
  - continually
  lexicon: HALOT
  rationale: The pair is idiomatic for continual duration. 'Night and day' preserves
    the Hebrew expression while remaining natural English.
- source_word: אֶל הַמָּקוֹם
  chosen: toward the place
  alternatives:
  - toward this place
  - toward the site
  lexicon: HALOT
  rationale: This occurrence points to the specific location God designated for his
    name. 'Place' is the standard rendering and preserves the repeated temple-location
    motif.
- source_word: אֲשֶׁר אָמַרְתָּ יִהְיֶה שְׁמִי שָׁם
  chosen: of which you said, ‘My name will be there,’
  alternatives:
  - where you said, 'My name shall be there,'
  - about which you said, 'My name will be there'
  lexicon: HALOT
  rationale: The clause identifies the temple as the place chosen for God's name.
    'My name will be there' preserves the covenantal/theological language without
    paraphrasing it into 'presence' in the main text.
- source_word: שְׁמִי
  chosen: My name
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'my name.' While this implies God's covenantal
    presence and ownership, the translation should preserve the source wording and
    theological tension rather than resolve it.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - so as to hear
  - to listen to
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To hear' is the straightforward rendering
    and in prayer contexts carries the sense of attentive hearing without needing
    expansion.
- source_word: אֶל הַתְּפִלָּה
  chosen: the prayer
  alternatives:
  - the plea
  - the petition
  lexicon: HALOT
  rationale: תְּפִלָּה is the standard term for prayer. 'Prayer' is broad enough to
    include petition and matches the context.
- source_word: יִתְפַּלֵּל
  chosen: prays
  alternatives:
  - will pray
  - may pray
  lexicon: HALOT
  rationale: 'The imperfect here is best rendered in context as a relative clause
    with present sense in English: ''that your servant prays.'' This avoids awkward
    futurity while still covering repeated prayer directed toward the temple.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, in royal-prayer address to God it
    is a conventional expression of humble service rather than emphasizing chattel
    status. 'Your servant' best fits the register and context.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: toward this place
  alternatives:
  - to this place
  lexicon: HALOT
  rationale: The repeated אֶל again indicates directional orientation in prayer. 'Toward
    this place' preserves the temple-facing posture central to the verse.
