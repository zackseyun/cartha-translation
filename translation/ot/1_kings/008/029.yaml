theological_decisions:
- issue: Anthropomorphic language about God’s eyes being open
  chosen_reading: 'Retain the anthropomorphic expression literally: ''your eyes may
    be open'''
  alternative_readings:
  - your attention may be on this house
  - watch over this house
  rationale: The Hebrew uses bodily imagery for divine attentiveness. Preserving the
    metaphor respects the source text and avoids flattening its theological-poetic
    force into abstraction.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of 'My name will be there'
  chosen_reading: Preserve 'My name will be there' in the main text
  alternative_readings:
  - my presence will be there
  - I will dwell there
  rationale: The phrase is theologically significant in temple theology and should
    not be collapsed into a single interpretive paraphrase. The wording allows readers
    to see the biblical idiom while a footnote can clarify the implication of covenantal
    presence.
  doctrine_reference: Translation philosophy §3
