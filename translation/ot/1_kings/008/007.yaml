id: 1KI.8.7
reference: 1 Kings 8:7
source:
  edition: WLC
  text: כִּ֤י הַ/כְּרוּבִים֙ פֹּרְשִׂ֣ים כְּנָפַ֔יִם אֶל מְק֖וֹם הָֽ/אָר֑וֹן וַ/יָּסֹ֧כּוּ
    הַ/כְּרֻבִ֛ים עַל הָ/אָר֥וֹן וְ/עַל בַּדָּ֖י/ו מִ/לְ/מָֽעְלָ/ה־־־׃
translation:
  text: For the cherubim were spreading out their wings over the place of the ark,
    and the cherubim covered the ark and its poles from above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the place of the ark.' The Hebrew preposition can be read more
      literally as directional, though the context favors the sense that the wings
      extended over the ark's location.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for the preceding
    statement about the poles' position. 'For' fits natural English while preserving
    the explanatory force.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Retains the established English plural borrowing 'cherubim' for כְּרוּבִים,
    appropriate in temple/tabernacle context and more precise than the colloquial
    'cherubs.'
- source_word: פֹּרְשִׂים כְּנָפַיִם
  chosen: were spreading out their wings
  alternatives:
  - spread out wings
  - had spread out wings
  lexicon: HALOT
  rationale: פֹּרְשִׂים is a participle describing ongoing posture/state. 'Were spreading
    out' conveys the durative descriptive sense in idiomatic English; 'their' is supplied
    naturally from the subject.
- source_word: אֶל מְקוֹם הָאָרוֹן
  chosen: over the place of the ark
  alternatives:
  - toward the place of the ark
  - to the place of the ark
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with פרשׂ כנפים in this spatial
    setting the sense is that the wings extend over the location occupied by the ark.
    'Over the place of the ark' best matches the spatial picture and the following
    clause about covering.
- source_word: וַיָּסֹכּוּ
  chosen: covered
  alternatives:
  - screened
  - overshadowed
  - sheltered
  lexicon: HALOT
  rationale: From סכך, denoting covering/sheltering. 'Covered' is the clearest modern
    English rendering and fits the physical imagery of the cherubim above the ark.
- source_word: עַל הָאָרוֹן
  chosen: the ark
  alternatives:
  - over the ark
  lexicon: HALOT
  rationale: The preposition's force is carried by the verb 'covered' and by 'from
    above' later in the clause, so English reads more naturally without repeating
    'over' here.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: Refers to the poles used to carry the ark. 'Poles' is clear modern English;
    'staves' is archaic.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - above
  - from overhead
  lexicon: HALOT
  rationale: Preserves the adverbial phrase indicating the direction/location of the
    covering action.
