theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention and aligns with the translation's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temple terminology for הַבַּיִת
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: Although the referent is the temple, the Hebrew uses 'house.' Retaining
    'house' preserves the canonical idiom 'house for your name' and avoids unnecessary
    interpretive substitution.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
