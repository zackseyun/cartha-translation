id: 1KI.8.44
reference: 1 Kings 8:44
source:
  edition: WLC
  text: כִּי יֵצֵ֨א עַמְּ/ךָ֤ לַ/מִּלְחָמָה֙ עַל אֹ֣יְב֔/וֹ בַּ/דֶּ֖רֶךְ אֲשֶׁ֣ר תִּשְׁלָחֵ֑/ם
    וְ/הִתְפַּֽלְל֣וּ אֶל יְהוָ֗ה דֶּ֤רֶךְ הָ/עִיר֙ אֲשֶׁ֣ר בָּחַ֣רְתָּ בָּ֔/הּ וְ/הַ/בַּ֖יִת
    אֲשֶׁר בָּנִ֥תִי לִ/שְׁמֶֽ/ךָ־־־־׃
translation:
  text: When your people go out to battle against their enemy by the way you send
    them, and they pray to the LORD toward the city that you have chosen and the house
    that I have built for your name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing the city.' The Hebrew says 'the way/direction of the city,' expressing
      orientation in prayer.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; Hebrew 'the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: In this prayer sequence, כִּי introduces a contingent circumstance ('when/if
    your people go out'). 'When' fits the idiomatic flow of Solomon's petitions better
    than the more causal 'for'.
- source_word: יֵצֵא
  chosen: go out
  alternatives:
  - march out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In military context it can imply
    marching out for war, but 'go out' preserves the Hebrew wording while remaining
    natural English.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Standard covenantal expression for Israel as belonging to God; 'people'
    is the natural rendering of עַם here.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - to war
  - for battle
  lexicon: HALOT
  rationale: The phrase 'go out to battle' is idiomatic English for military engagement
    and reflects the Hebrew prepositional phrase well.
- source_word: עַל אֹיְבוֹ
  chosen: against their enemy
  alternatives:
  - against its enemy
  - against his enemy
  lexicon: HALOT
  rationale: Although the suffix on 'enemy' is singular masculine, English naturally
    shifts to plural/generic agreement with the collective 'people.' 'Their enemy'
    best communicates the sense.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תִּשְׁלָחֵם
  chosen: by the way you send them
  alternatives:
  - on the way that you send them
  - wherever you send them
  lexicon: HALOT
  rationale: דֶּרֶךְ is literally 'way/path.' Here it likely means the course or campaign
    on which God commissions them. 'By the way you send them' preserves the concrete
    Hebrew image without over-paraphrasing.
- source_word: וְהִתְפַּלְלוּ אֶל יְהוָה
  chosen: and they pray to the LORD
  alternatives:
  - and they pray to Yahweh
  lexicon: HALOT
  rationale: Reflexive התפלל is the standard verb 'pray.' Per doctrine, יְהוָה is
    rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'This follows the project''s contested-terms policy for the divine name:
    ''the LORD'' in keeping with Jewish reverence tradition and longstanding English
    convention.'
- source_word: דֶּרֶךְ הָעִיר
  chosen: toward the city
  alternatives:
  - in the direction of the city
  - facing the city
  lexicon: HALOT
  rationale: דֶּרֶךְ here expresses orientation in prayer. 'Toward' is concise, natural,
    and captures the directional sense.
- source_word: הָעִיר אֲשֶׁר בָּחַרְתָּ בָּהּ
  chosen: the city that you have chosen
  alternatives:
  - the city in which you have chosen to place your name
  lexicon: HALOT
  rationale: The Hebrew states simply that God chose the city. The fuller theological
    idea of choosing it for his name appears in the broader context, but should not
    be imported into this clause.
- source_word: וְהַבַּיִת
  chosen: and the house
  alternatives:
  - and the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Though it refers to the temple, 'house'
    preserves the Hebrew diction and the temple sense remains clear from context.
- source_word: אֲשֶׁר בָּנִתִי לִשְׁמֶךָ
  chosen: that I have built for your name
  alternatives:
  - that I have built in honor of your name
  lexicon: HALOT
  rationale: '''For your name'' is a significant biblical expression tied to God''s
    presence and reputation; it should be preserved rather than paraphrased away.'
