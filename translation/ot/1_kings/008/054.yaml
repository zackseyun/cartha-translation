id: 1KI.8.54
reference: 1 Kings 8:54
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת שְׁלֹמֹ֗ה לְ/הִתְפַּלֵּל֙ אֶל יְהוָ֔ה אֵ֛ת כָּל הַ/תְּפִלָּ֥ה
    וְ/הַ/תְּחִנָּ֖ה הַ/זֹּ֑את קָ֞ם מִ/לִּ/פְנֵ֨י מִזְבַּ֤ח יְהוָה֙ מִ/כְּרֹ֣עַ עַל
    בִּרְכָּ֔י/ו וְ/כַפָּ֖י/ו פְּרֻשׂ֥וֹת הַ/שָּׁמָֽיִם׀־־־׃
translation:
  text: And when Solomon had finished praying to the LORD with all this prayer and
    plea for favor, he rose from before the altar of the LORD, from kneeling on his
    knees with his palms spread out toward heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supplication' for 'plea for favor.' The Hebrew term denotes an earnest
      plea for mercy or favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with his palms spread out toward heaven'; many translations render
      more generally, 'with his hands spread out to heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלּוֹת
  chosen: And when ... had finished
  alternatives:
  - And it happened, when ... finished
  - Now when ... had finished
  lexicon: HALOT
  rationale: The waw-consecutive with כְ plus infinitive construct introduces a temporal
    clause. English idiom is best served by 'And when ... had finished' rather than
    preserving the more wooden 'and it happened when.'
- source_word: לְהִתְפַּלֵּל
  chosen: praying
  alternatives:
  - to pray
  lexicon: HALOT
  rationale: 'The infinitive construct after כְּכַלּוֹת is naturally rendered in English
    as a verbal complement: ''had finished praying.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֵת כָּל הַתְּפִלָּה וְהַתְּחִנָּה הַזֹּאת
  chosen: with all this prayer and plea for favor
  alternatives:
  - all this prayer and supplication
  - this whole prayer and petition
  lexicon: HALOT
  rationale: תְּפִלָּה is the general term 'prayer'; תְּחִנָּה denotes an earnest
    plea for mercy/favor. 'Plea for favor' preserves the nuance more transparently
    than the more traditional but less immediately clear 'supplication.' The prepositionless
    object after 'praying' is smoothed in English with 'with.'
- source_word: קָם
  chosen: he rose
  alternatives:
  - he stood up
  - he arose
  lexicon: HALOT
  rationale: Qal perfect of קום here marks Solomon's change of posture after prayer.
    'He rose' is natural, concise modern English.
- source_word: מִלִּפְנֵי מִזְבַּח יְהוָה
  chosen: from before the altar of the LORD
  alternatives:
  - from before the LORD's altar
  - from in front of the altar of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'From before the
    altar of the LORD' preserves the formal spatial sense without over-paraphrase.
- source_word: מִכְּרֹעַ עַל בִּרְכָּיו
  chosen: from kneeling on his knees
  alternatives:
  - from kneeling
  - from being on his knees
  lexicon: HALOT
  rationale: The Hebrew is explicit and somewhat emphatic. Retaining 'on his knees'
    reflects the source wording, even though English could shorten it to simply 'kneeling.'
- source_word: וְכַפָּיו פְּרֻשׂוֹת הַשָּׁמָיִם
  chosen: with his palms spread out toward heaven
  alternatives:
  - and his hands spread out to heaven
  - with his hands stretched out toward the heavens
  lexicon: HALOT
  rationale: כַּף refers specifically to the palm/hand. 'Palms spread out' preserves
    the bodily posture more precisely than generic 'hands.' The directional sense
    is conveyed idiomatically by 'toward heaven.' 'Heaven' is preferred over 'the
    heavens' here for natural English in a prayer posture context.
