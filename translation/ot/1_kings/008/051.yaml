id: 1KI.8.51
reference: 1 Kings 8:51
source:
  edition: WLC
  text: כִּֽי עַמְּ/ךָ֥ וְ/נַחֲלָתְ/ךָ֖ הֵ֑ם אֲשֶׁ֤ר הוֹצֵ֨אתָ֙ מִ/מִּצְרַ֔יִם מִ/תּ֖וֹךְ
    כּ֥וּר הַ/בַּרְזֶֽל־׃
translation:
  text: For they are your people and your inheritance, whom you brought out of Egypt,
    out of the midst of the iron furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your possession' or 'your heritage' for 'your inheritance.'
    reason: lexical_alternative
  - marker: b
    text: '''The iron furnace'' is a metaphor for Egypt as a place of intense oppression
      and affliction; compare Deuteronomy 4:20.'
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for Solomon's appeal in the surrounding prayer.
    'For' fits the explanatory force in context and reads naturally in English.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'people' is the standard and
    contextually appropriate rendering.
- source_word: וְנַחֲלָתְךָ
  chosen: your inheritance
  alternatives:
  - your possession
  - your heritage
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance or allotted possession. 'Your
    inheritance' preserves the covenantal-theological sense that Israel belongs to
    God as his allotted people.
- source_word: הֵם
  chosen: they are
  lexicon: HALOT
  rationale: Explicit independent pronoun used predicatively; English requires the
    copula for natural sense.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Refers back to 'people'/'inheritance' as persons, so 'whom' is the most
    natural personal relative pronoun in English.
- source_word: הוֹצֵאתָ
  chosen: you brought out
  alternatives:
  - you led out
  lexicon: HALOT
  rationale: Hiphil of יצא here has causative exodus sense. 'Brought out' is idiomatic
    and preserves the established exodus wording.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With הוֹצֵאתָ, 'out of Egypt' best reflects the exodus formula and pairs
    well with the following repeated 'out of' phrase.
- source_word: מִתּוֹךְ
  chosen: out of the midst of
  alternatives:
  - from the midst of
  - out of
  lexicon: HALOT
  rationale: Retains the vivid spatial imagery of emergence from within something,
    rather than flattening it to a simple 'from.'
- source_word: כּוּר הַבַּרְזֶל
  chosen: the iron furnace
  alternatives:
  - the smelting furnace of iron
  - the iron-smelting furnace
  lexicon: HALOT
  rationale: A fixed biblical metaphor for Egypt as a place of severe affliction and
    refining oppression. 'The iron furnace' is both accurate and idiomatic, preserving
    the metaphor without over-explication.
