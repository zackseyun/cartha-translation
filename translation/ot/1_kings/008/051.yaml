theological_decisions:
- issue: Covenantal designation of Israel as God's 'inheritance'
  chosen_reading: Retain 'your inheritance' in the main text
  alternative_readings:
  - your possession
  - your heritage
  rationale: The Hebrew carries covenantal ownership/allotment language. 'Inheritance'
    preserves that theological weight without importing later doctrinal claims beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 5
