id: 1KI.8.57
reference: 1 Kings 8:57
source:
  edition: WLC
  text: יְהִ֨י יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ עִמָּ֔/נוּ כַּ/אֲשֶׁ֥ר הָיָ֖ה עִם אֲבֹתֵ֑י/נוּ אַל יַעַזְבֵ֖/נוּ וְ/אַֽל יִטְּשֵֽׁ/נוּ־־־׃
translation:
  text: May Yahweh our God be with us, as he was with our fathers. May he not forsake us or abandon us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew says 'our fathers,' referring to Israel's forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  - May ... be present
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish/prayer. 'May ... be' best captures the volitional force in natural English prayer language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with 1cp suffix straightforwardly means 'our God.'
- source_word: עִמָּנוּ
  chosen: with us
  alternatives:
  - among us
  lexicon: HALOT
  rationale: עם with pronominal suffix here denotes accompaniment/presence; 'with us' is the standard and most precise rendering.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with God's past presence with the ancestors. 'As' is concise and natural.
- source_word: הָיָה עִם אֲבֹתֵינוּ
  chosen: he was with our fathers
  alternatives:
  - he was with our ancestors
  lexicon: HALOT
  rationale: The phrase recalls covenantal faithfulness to prior generations. 'Fathers' preserves the source term אבותינו and matches the gender-accurate policy; 'ancestors' is possible but less formally tied to the Hebrew wording.
- source_word: אַל יַעַזְבֵנוּ
  chosen: May he not forsake us
  alternatives:
  - Do not let him leave us
  - May he not abandon us
  lexicon: HALOT
  rationale: Negative jussive with עזב conveys a plea that God not leave or forsake his people. 'Forsake' preserves the covenantal and relational weight common in biblical usage.
- source_word: וְאַל יִטְּשֵׁנוּ
  chosen: or abandon us
  alternatives:
  - or cast us off
  - or reject us
  - or leave us
  lexicon: HALOT
  rationale: נטש overlaps with עזב but is not identical; using 'abandon' avoids flattening the parallelism into exact repetition while preserving the sense of being left behind or cast off.
