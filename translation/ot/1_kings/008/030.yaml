id: 1KI.8.30
reference: 1 Kings 8:30
source:
  edition: WLC
  text: וְ/שָׁ֨מַעְתָּ֜ אֶל תְּחִנַּ֤ת עַבְדְּ/ךָ֙ וְ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל אֲשֶׁ֥ר
    יִֽתְפַּֽלְל֖וּ אֶל הַ/מָּק֣וֹם הַ/זֶּ֑ה וְ֠/אַתָּה תִּשְׁמַ֞ע אֶל מְק֤וֹם שִׁבְתְּ/ךָ֙
    אֶל הַ/שָּׁמַ֔יִם וְ/שָׁמַעְתָּ֖ וְ/סָלָֽחְתָּ־־־־׃
translation:
  text: And hear the plea of your servant and of your people Israel when they pray
    toward this place. And you, hear in the place of your dwelling, in heaven; hear
    and forgive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to this place.' The Hebrew expression can be rendered more literally
      this way, but 'toward this place' better conveys prayer directed toward the
      temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'your dwelling place in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִנַּת
  chosen: plea
  alternatives:
  - supplication
  - entreaty
  - prayer
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest request for favor or mercy. 'Plea' is natural
    modern English and preserves the urgent, petitionary sense better than the more
    formal 'supplication.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Though עֶבֶד can denote a slave, in royal-prayer address to God it commonly
    functions as a humble covenantal self-designation. 'Your servant' best fits the
    register here without losing the posture of submission.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying Israel as God's covenant
    people. The appositional sense is retained without needing extra punctuation in
    English.
- source_word: יִתְפַּלְלוּ
  chosen: they pray
  alternatives:
  - they pray for themselves
  - they make intercession
  lexicon: HALOT
  rationale: The hitpael of פלל is the standard verb for praying. 'They pray' is the
    clearest idiomatic rendering here.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: toward this place
  alternatives:
  - to this place
  - at this place
  lexicon: HALOT
  rationale: With prayer directed toward the temple, English 'toward this place' best
    captures directional orientation rather than physical location alone.
- source_word: מְקוֹם שִׁבְתְּךָ
  chosen: the place of your dwelling
  alternatives:
  - your dwelling place
  - the place where you dwell
  lexicon: HALOT
  rationale: This preserves the Hebrew construct relationship and the elevated style
    of Solomon's prayer while remaining readable.
- source_word: אֶל הַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - from heaven
  - to heaven
  lexicon: HALOT
  rationale: 'Although the preposition is literally ''to/unto,'' in this idiom with
    ''hear'' and ''the place of your dwelling'' the sense is locative: God''s dwelling
    place is heaven. ''In heaven'' is idiomatic and matches the clause''s meaning.'
- source_word: וְשָׁמַעְתָּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: שׁמע here means not merely auditory perception but attentive hearing
    in response to prayer. 'Hear' preserves the biblical prayer idiom and pairs naturally
    with 'forgive.'
- source_word: וְסָלָחְתָּ
  chosen: forgive
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: סלח is the standard verb for divine forgiveness. 'Forgive' is the clearest
    and most theologically transparent English equivalent.
