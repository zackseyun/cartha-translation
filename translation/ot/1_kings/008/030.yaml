theological_decisions:
- issue: God's dwelling and heaven in temple theology
  chosen_reading: Rendered both the temple-oriented prayer ('toward this place') and
    God's true dwelling ('in heaven') without harmonizing or diminishing either.
  alternative_readings:
  - Render more dynamically as 'when they pray in this temple'
  - Render 'from heaven' to emphasize divine action from above
  rationale: The verse intentionally holds together the earthly temple as the focal
    point of prayer and heaven as God's actual dwelling. The translation preserves
    that tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
