theological_decisions:
- issue: Gendered representative language in כָּל אִישׁ יִשְׂרָאֵל
  chosen_reading: all the men of Israel
  alternative_readings:
  - all Israel
  - all the people of Israel
  rationale: Following the stated gender-accurate policy, the masculine singular collective
    אִישׁ is represented with 'men' rather than neutralizing to 'people,' while still
    using idiomatic English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
