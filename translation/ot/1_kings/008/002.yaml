id: 1KI.8.2
reference: 1 Kings 8:2
source:
  edition: WLC
  text: וַ/יִּקָּ֨הֲל֜וּ אֶל הַ/מֶּ֤לֶךְ שְׁלֹמֹה֙ כָּל אִ֣ישׁ יִשְׂרָאֵ֔ל בְּ/יֶ֥רַח
    הָ/אֵֽתָנִ֖ים בֶּ/חָ֑ג ה֖וּא הַ/חֹ֥דֶשׁ הַ/שְּׁבִיעִֽי־־׃
translation:
  text: And all the men of Israel assembled before King Solomon at the festival, in
    the month of Ethanim, which is the seventh month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the feast.' The Hebrew חָג denotes a pilgrimage festival; the specific
      feast is not named here, though in context it is the autumn festival associated
      with the seventh month.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - were assembled
  lexicon: HALOT
  rationale: From קהל in the Niphal/waw-consecutive form, indicating coming together
    as an assembly. 'Assembled' is natural English and preserves the formal sense
    without unnecessary passivity.
- source_word: אֶל
  chosen: before
  alternatives:
  - to
  - unto
  lexicon: HALOT
  rationale: Although literally 'to,' in context with assembling to the king it idiomatically
    means appearing in the king's presence. 'Before' communicates the relational sense
    in clear English.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English normally expresses the appositional construction as the title
    plus name. This preserves both the office and the personal name.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israelite men
  lexicon: HALOT
  rationale: The Hebrew is singular collective 'every man of Israel,' but idiomatic
    English prefers 'all the men of Israel.' Per translation philosophy, the masculine
    term is retained rather than neutralized, since the source is grammatically masculine
    and representative.
- source_word: בְּיֶרַח
  chosen: in the month of
  alternatives:
  - in the lunar month of
  - in the month
  lexicon: HALOT
  rationale: יֶרַח can denote 'month' with lunar nuance, but standard English 'month'
    sufficiently conveys the time reference here.
- source_word: הָאֵתָנִים
  chosen: Ethanim
  alternatives:
  - the month of Ethanim
  lexicon: HALOT
  rationale: This is a month name and is therefore transliterated rather than translated,
    in keeping with the philosophy of transliterating names.
- source_word: בֶּחָג
  chosen: at the festival
  alternatives:
  - at the feast
  - during the festival
  lexicon: HALOT
  rationale: חָג refers to a pilgrimage feast/festival. 'Festival' is readable modern
    English; the definite article suggests a known feast, likely the autumn pilgrimage
    festival, but the Hebrew here does not specify beyond 'the festival.'
- source_word: הוּא הַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: which is the seventh month
  alternatives:
  - that is, the seventh month
  - it was the seventh month
  lexicon: HALOT
  rationale: This clause identifies Ethanim with the seventh month. 'Which is' smoothly
    conveys the explanatory apposition in English.
