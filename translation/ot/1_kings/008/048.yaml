id: 1KI.8.48
reference: 1 Kings 8:48
source:
  edition: WLC
  text: וְ/שָׁ֣בוּ אֵלֶ֗י/ךָ בְּ/כָל לְבָבָ/ם֙ וּ/בְ/כָל נַפְשָׁ֔/ם בְּ/אֶ֥רֶץ אֹיְבֵי/הֶ֖ם
    אֲשֶׁר שָׁב֣וּ אֹתָ֑/ם וְ/הִֽתְפַּֽלְל֣וּ אֵלֶ֗י/ךָ דֶּ֤רֶךְ אַרְצָ/ם֙ אֲשֶׁ֣ר
    נָתַ֣תָּה לַ/אֲבוֹתָ֔/ם הָ/עִיר֙ אֲשֶׁ֣ר בָּחַ֔רְתָּ וְ/הַ/בַּ֖יִת אֲשֶׁר בנית
    לִ/שְׁמֶֽ/ךָ־־־־׃
translation:
  text: and they return to you with all their heart and with all their soul in the
    land of their enemies who took them captive, and pray to you toward their land
    that you gave to their fathers, the city that you chose, and the house that I
    built for your name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back to you'; in this context the phrase can also carry the sense
      of repentance.
    reason: lexical_alternative
  - marker: b
    text: Or 'facing their land.' The Hebrew expression denotes praying in the direction
      of their land.
    reason: lexical_alternative
  - marker: c
    text: That is, the house/temple dedicated to your name.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁבוּ אֵלֶיךָ
  chosen: and they return to you
  alternatives:
  - and they turn back to you
  - and they repent before you
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In this prayer context it carries
    covenantal repentance, but the direct object 'to you' is best preserved as 'return
    to you' rather than making repentance explicit in the main text.
- source_word: בְּכָל לְבָבָם וּבְכָל נַפְשָׁם
  chosen: with all their heart and with all their soul
  alternatives:
  - with their whole heart and with their whole being
  lexicon: HALOT
  rationale: A conventional Hebrew expression of total devotion. 'Heart' and 'soul'
    are retained rather than flattened to 'being' in order to preserve the source
    imagery and intertextual resonance.
- source_word: בְּאֶרֶץ אֹיְבֵיהֶם
  chosen: in the land of their enemies
  alternatives:
  - in the country of their enemies
  lexicon: HALOT
  rationale: אֶרֶץ is rendered 'land' here for consistency with the later reference
    to 'their land' and to preserve the exile-land contrast.
- source_word: אֲשֶׁר שָׁבוּ אֹתָם
  chosen: who took them captive
  alternatives:
  - who carried them away captive
  - who captured them
  lexicon: HALOT
  rationale: The verb שׁבה in Qal means 'take captive.' 'Took them captive' is idiomatic
    modern English and preserves the coercive exile sense better than the more archaic
    'carried away captive.'
- source_word: וְהִתְפַּלְלוּ אֵלֶיךָ
  chosen: and pray to you
  alternatives:
  - and they pray to you
  lexicon: HALOT
  rationale: Straightforward rendering of the hitpael of פלל with the preposition
    אֶל. Present tense in English prayer-condition style reads naturally within the
    larger protasis.
- source_word: דֶּרֶךְ אַרְצָם
  chosen: toward their land
  alternatives:
  - in the direction of their land
  - facing their land
  lexicon: HALOT
  rationale: דֶּרֶךְ with a place can denote direction/orientation. 'Toward' is concise
    and natural, preserving the physical orientation of prayer without overexplaining.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבוֹתָם
  chosen: that you gave to their fathers
  alternatives:
  - which you gave to their ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is retained as the gender-accurate covenantal expression
    in line with the source and the project''s philosophy; ''ancestors'' is possible
    but less textually specific.'
- source_word: הָעִיר אֲשֶׁר בָּחַרְתָּ
  chosen: the city that you chose
  alternatives:
  - the city you have chosen
  lexicon: HALOT
  rationale: Simple past fits the Hebrew perfect in this retrospective prayer. 'Chose'
    preserves divine election language without importing later theological nuance.
- source_word: וְהַבַּיִת אֲשֶׁר בנית לִשְׁמֶךָ
  chosen: and the house that I built for your name
  alternatives:
  - and the temple that I built for your name
  lexicon: HALOT
  rationale: The consonantal text here is first person singular ('I built'), matching
    Solomon's speech context; this is therefore translated directly. 'House' is preferred
    over 'temple' to preserve the Hebrew term בַּיִת and its theological resonance
    as God's house, while 'for your name' keeps the covenantal idiom intact.
