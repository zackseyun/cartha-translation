theological_decisions:
- issue: Speaker reference in 'the house that I built for your name'
  chosen_reading: 'First person singular is retained: ''I built'''
  alternative_readings:
  - 'Third person plural/impersonal sense reflected in some translations: ''they built''
    or simply ''the house built for your name'''
  rationale: The MT consonantal form בנית in Solomon's prayer naturally reads as first
    person singular in context, and Solomon has already spoken of building the house.
    Retaining 'I built' preserves the speech situation and avoids smoothing away a
    meaningful textual detail.
  doctrine_reference: 'Translation philosophy #1, #5'
- issue: Covenantal repentance language in שׁוּב
  chosen_reading: Rendered as 'return to you' rather than explicit 'repent'
  alternative_readings:
  - repent before you
  - turn back to you
  rationale: The Hebrew verb can imply repentance in covenant contexts, but the text's
    wording is relational and directional. Rendering it as 'return to you' preserves
    the theological tension between inward repentance and covenant restoration without
    over-interpreting.
  doctrine_reference: 'Translation philosophy #3'
