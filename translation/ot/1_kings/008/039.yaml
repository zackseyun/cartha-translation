theological_decisions:
- issue: Anthropological expression in כָּל בְּנֵי הָאָדָם
  chosen_reading: all the sons of man
  alternative_readings:
  - all mankind
  - all humanity
  rationale: The Hebrew is grammatically masculine and representative. Following the
    doctrine's gender-accurate policy, the translation preserves the masculine form
    rather than flattening it to a neutral collective in the main text, while a footnote
    can clarify the inclusive sense.
