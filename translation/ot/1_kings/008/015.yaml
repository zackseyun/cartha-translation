id: 1KI.8.15
reference: 1 Kings 8:15
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר בָּר֤וּךְ יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר֙ דִּבֶּ֣ר בְּ/פִ֔י/ו
    אֵ֖ת דָּוִ֣ד אָבִ֑/י וּ/בְ/יָד֥/וֹ מִלֵּ֖א לֵ/אמֹֽר׃
translation:
  text: And he said, “Blessed be the LORD, the God of Israel, who spoke with his mouth
    to David my father and has fulfilled it with his hand, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praised be the LORD.' The Hebrew blessing formula is traditionally rendered
      'Blessed be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּר֤וּךְ
  chosen: Blessed be
  alternatives:
  - Praised be
  lexicon: HALOT
  rationale: Predicate passive participle used in a benedictory formula. 'Blessed
    be' preserves the formal blessing language better than the more interpretive 'Praised
    be.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct chain; straightforwardly identifies the covenant God
    in relation to Israel.
- source_word: אֲשֶׁר דִּבֶּר בְּפִיו
  chosen: who spoke with his mouth
  alternatives:
  - who spoke by his mouth
  - who spoke
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with/by his mouth.' Retaining the bodily
    idiom preserves the parallel with 'with his hand' in the next clause and highlights
    speech/action correspondence.
- source_word: אֵת דָּוִד אָבִי
  chosen: to David my father
  alternatives:
  - with David my father
  lexicon: HALOT
  rationale: With דבר, the marker אֵת can introduce the person addressed. 'To David
    my father' is the most natural English rendering in context.
- source_word: וּבְיָדוֹ מִלֵּא
  chosen: and has fulfilled it with his hand
  alternatives:
  - and by his hand has fulfilled it
  - and has carried it out with his hand
  lexicon: HALOT
  rationale: 'The idiom contrasts divine speech and divine action: what God spoke,
    he also brought to completion. ''Fulfilled it'' makes explicit the understood
    object from the previous clause and reads naturally in English while preserving
    the hand-idiom.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the following direct speech
    in the next verse; 'saying' preserves the discourse flow.
