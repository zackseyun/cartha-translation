theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew text uses 'house,' and the translation philosophy prioritizes
    original-language primacy over inherited interpretive tradition. Since 'house'
    is fully intelligible and theologically significant in temple theology, it is
    retained in the main text; the more explicit 'temple' is preserved as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
