id: 1KI.8.17
reference: 1 Kings 8:17
source:
  edition: WLC
  text: וַ/יְהִ֕י עִם לְבַ֖ב דָּוִ֣ד אָבִ֑/י לִ/בְנ֣וֹת בַּ֔יִת לְ/שֵׁ֥ם יְהוָ֖ה אֱלֹהֵ֥י
    יִשְׂרָאֵֽל־׃
translation:
  text: Now it was in the heart of David my father to build a house for the name of
    the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to build a temple for the name of the LORD.' The Hebrew literally says
      'to build a house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it was
  alternatives:
  - And it was
  - It was
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces a past-state formula rather than
    a simple event. 'Now it was' gives natural English while preserving the narrative
    linkage and stative sense.
- source_word: עִם לְבַב
  chosen: in the heart of
  alternatives:
  - with the heart of
  - on the heart of
  - it was with the heart of
  lexicon: HALOT
  rationale: The idiom עִם + לֵב/לְבַב expresses something being present in someone's
    heart, that is, intention or desire. 'In the heart of' is idiomatic English and
    preserves the Hebrew metaphor better than flattening to merely 'David intended.'
- source_word: דָּוִד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both English orders are possible. 'David my father' stays closer to the
    Hebrew sequence while remaining natural in English.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to construct
  lexicon: HALOT
  rationale: Standard rendering of בנה in temple-building contexts; clear and consistent.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a temple
  lexicon: HALOT
  rationale: Although the referent is the temple, the Hebrew says 'house.' Retaining
    'house' preserves the temple-as-house imagery central to the passage. 'Temple'
    is a possible interpretive gloss but is not required in the main text.
- source_word: לְשֵׁם
  chosen: for the name of
  alternatives:
  - for the honor of
  - for the renown of
  lexicon: HALOT
  rationale: The phrase 'for the name of' is a standard biblical expression, especially
    in temple contexts, and should be preserved rather than paraphrased away. It conveys
    dedication to YHWH's revealed identity and presence without over-interpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: The construct phrase identifies the LORD covenantally. Including the
    article yields natural English and reflects the appositional identification.
