id: 1KI.8.49
reference: 1 Kings 8:49
source:
  edition: WLC
  text: וְ/שָׁמַעְתָּ֤ הַ/שָּׁמַ֨יִם֙ מְכ֣וֹן שִׁבְתְּ/ךָ֔ אֶת תְּפִלָּתָ֖/ם וְ/אֶת
    תְּחִנָּתָ֑/ם וְ/עָשִׂ֖יתָ מִשְׁפָּטָֽ/ם־־׃
translation:
  text: then hear in heaven, the settled place of your dwelling, their prayer and
    their plea, and uphold their cause,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dwelling place.' The Hebrew expression emphasizes an established
      or fixed dwelling.
    reason: lexical_alternative
  - marker: b
    text: Or 'grant them justice' or 'vindicate them.' The Hebrew literally says 'do
      their justice/judgment,' an idiom for acting on behalf of their legal cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: then hear
  alternatives:
  - and hear
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of שׁמע in a petitionary sequence functions as a jussive-like
    request addressed to God: ''hear.'' Rendering the prefixed conjunction as ''then''
    reflects the flow from the preceding conditional clauses and keeps natural English
    while preserving the sequence.'
- source_word: הַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - from heaven
  - the heavens
  lexicon: HALOT
  rationale: Although literally 'the heavens,' in this idiom with the following construct
    phrase it denotes God's heavenly realm. 'In heaven' is idiomatic English and fits
    the syntax of the next phrase. 'From heaven' is possible by sense, but the preposition
    is not explicit here.
- source_word: מְכוֹן שִׁבְתְּךָ
  chosen: the settled place of your dwelling
  alternatives:
  - your dwelling place
  - the place where you dwell
  lexicon: HALOT
  rationale: מָכוֹן denotes an established or fixed place/foundation; with 'your dwelling'
    it emphasizes God's settled heavenly abode. 'The settled place of your dwelling'
    preserves that nuance better than the flatter traditional 'dwelling place,' while
    remaining readable.
- source_word: תְּפִלָּתָם
  chosen: their prayer
  alternatives:
  - their prayer petition
  lexicon: HALOT
  rationale: Standard rendering for תפלה, denoting prayer in general.
- source_word: תְּחִנָּתָם
  chosen: their plea
  alternatives:
  - their supplication
  - their entreaty
  lexicon: HALOT
  rationale: תחנה often carries the nuance of an earnest plea for favor or mercy.
    'Plea' is more natural modern English than 'supplication' while preserving the
    distinction from the more general 'prayer'.
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  chosen: and uphold their cause
  alternatives:
  - and execute their judgment
  - and grant them justice
  - and vindicate them
  lexicon: HALOT
  rationale: The idiom 'do/make their mishpat' means to act on behalf of someone judicially,
    i.e., to secure justice or vindicate their case. 'Uphold their cause' captures
    the forensic sense without sounding wooden. 'Execute their judgment' is too literal
    and awkward in English.
