theological_decisions:
- issue: Anthropomorphic/heavenly language for God's dwelling
  chosen_reading: Retain the language of God hearing 'in heaven' from 'the settled
    place of your dwelling' without flattening it into abstraction.
  alternative_readings:
  - hear from heaven, your dwelling place
  rationale: The verse speaks in temple-prayer idiom about God's heavenly dwelling.
    The translation preserves the biblical imagery without making a doctrinal claim
    that God is spatially confined to heaven.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
