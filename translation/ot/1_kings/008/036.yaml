id: 1KI.8.36
reference: 1 Kings 8:36
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תִּשְׁמַ֣ע הַ/שָּׁמַ֗יִם וְ/סָ֨לַחְתָּ֜ לְ/חַטַּ֤את עֲבָדֶ֨י/ךָ֙
    וְ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל כִּ֥י תוֹרֵ֛/ם אֶת הַ/דֶּ֥רֶךְ הַ/טּוֹבָ֖ה אֲשֶׁ֣ר יֵֽלְכוּ
    בָ֑/הּ וְ/נָתַתָּ֤ה מָטָר֙ עַל אַרְצְ/ךָ֔ אֲשֶׁר נָתַ֥תָּה לְ/עַמְּ/ךָ֖ לְ/נַחֲלָֽה׀־־־־׃ס
translation:
  text: then may you hear in heaven and forgive the sin of your servants, your people
    Israel, when you teach them the good way in which they should walk. And give rain
    on your land, which you have given to your people as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear from heaven.' The Hebrew idiom is literally 'hear heaven/the heavens,'
      and English commonly supplies either 'in' or 'from.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when you instruct them in the good way they should walk in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  chosen: hear in heaven
  alternatives:
  - hear from heaven
  - hear in the heavens
  lexicon: HALOT
  rationale: The idiom literally reads 'hear the heavens/heaven.' In context of prayer
    language, English normally supplies the preposition. 'In heaven' closely reflects
    the Hebrew construction and common biblical idiom, while remaining natural.
- source_word: וְסָלַחְתָּ לְחַטַּאת
  chosen: forgive the sin
  alternatives:
  - forgive the offense
  - forgive the guilt
  lexicon: HALOT
  rationale: חַטָּאת can denote sin, sin-offering, or guilt depending on context.
    Here the sense is the people's wrongdoing for which forgiveness is sought, so
    'sin' is the most direct rendering.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can mean 'slave' or 'servant,' here it refers to covenant
    subjects addressing God in prayer. The bonded-status nuance is not foregrounded
    as in some NT δοῦλος contexts, so 'servants' is the best contextual rendering.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: HALOT
  rationale: This appositional phrase identifies the servants specifically as Israel.
    The unpunctuated English phrase is natural and preserves the covenantal designation.
- source_word: כִּי תוֹרֵם
  chosen: when you teach them
  alternatives:
  - because you teach them
  - for you teach them
  - when you instruct them
  lexicon: HALOT
  rationale: 'כִּי can bear several senses, but in this prayer context it introduces
    the circumstance accompanying forgiveness and restored rain. The Hiphil of ירה
    means ''teach/instruct.'' ''When you teach them'' fits the flow: forgiveness is
    linked with God''s instructing them in the right way.'
- source_word: הַדֶּרֶךְ הַטּוֹבָה
  chosen: the good way
  alternatives:
  - the right way
  - the good path
  lexicon: HALOT
  rationale: דֶּרֶךְ is often metaphorical for manner of life. 'The good way' preserves
    the metaphor and the adjective טוֹבָה without over-interpreting it as merely 'right'
    or 'proper.'
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  chosen: in which they should walk
  alternatives:
  - wherein they should walk
  - that they should walk in
  - in which they are to walk
  lexicon: HALOT
  rationale: הלך 'walk' is a standard biblical metaphor for conduct. Retaining 'walk'
    preserves that imagery. 'Should walk' conveys expected covenantal conduct in idiomatic
    English.
- source_word: וְנָתַתָּה מָטָר
  chosen: And give rain
  alternatives:
  - and send rain
  - and grant rain
  lexicon: HALOT
  rationale: נתן plus 'rain' is literally 'give rain.' English allows this phrasing
    and it preserves the directness of the Hebrew without unnecessary paraphrase.
- source_word: עַל אַרְצְךָ
  chosen: on your land
  alternatives:
  - upon your land
  - on the land
  lexicon: HALOT
  rationale: The 2ms suffix refers to God's land, though given to Israel. 'Your land'
    preserves the theological point of divine ownership.
- source_word: אֲשֶׁר נָתַתָּה לְעַמְּךָ לְנַחֲלָה
  chosen: which you have given to your people as an inheritance
  alternatives:
  - which you gave to your people for an inheritance
  - which you have assigned to your people as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inheritance/heritage, especially covenant land
    allotment. 'As an inheritance' is clear modern English and preserves the covenantal
    land theme.
