theological_decisions:
- issue: Divine ownership and gift of the land
  chosen_reading: your land, which you have given to your people as an inheritance
  alternative_readings:
  - the land you gave your people as their inheritance
  rationale: The Hebrew explicitly uses the second-person suffix on 'land' and then
    states that God gave it to Israel. Preserving both elements maintains the theological
    tension that the land remains God's even while being Israel's inheritance.
  doctrine_reference: Translation philosophy §3, §5
