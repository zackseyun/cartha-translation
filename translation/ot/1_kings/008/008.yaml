id: 1KI.8.8
reference: 1 Kings 8:8
source:
  edition: WLC
  text: וַֽ/יַּאֲרִכוּ֮ הַ/בַּדִּים֒ וַ/יֵּרָאוּ֩ רָאשֵׁ֨י הַ/בַּדִּ֤ים מִן הַ/קֹּ֨דֶשׁ֙
    עַל פְּנֵ֣י הַ/דְּבִ֔יר וְ/לֹ֥א יֵרָא֖וּ הַ/ח֑וּצָ/ה וַ/יִּ֣הְיוּ שָׁ֔ם עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־׃
translation:
  text: And the poles were so long that the ends of the poles could be seen from the
    Holy Place before the inner sanctuary, but they could not be seen from outside;
    and they are there to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Most Holy Place.' The Hebrew term refers to the inner sanctuary
      of the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲרִכוּ
  chosen: were so long
  alternatives:
  - were extended
  - were lengthened
  lexicon: HALOT
  rationale: The verb from ארך in this context describes the poles as extending in
    length. English idiom is smoother with a stative/result sense ('were so long')
    rather than a more mechanical passive ('were lengthened'), while still preserving
    the idea that their length caused the visibility described next.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים refers to the poles used to carry the ark. 'Poles' is clear
    modern English; 'staves' is traditional but archaic.
- source_word: וַיֵּרָאוּ רָאשֵׁי הַבַּדִּים
  chosen: the ends of the poles could be seen
  alternatives:
  - the heads of the poles were visible
  - the tips of the poles were seen
  lexicon: HALOT
  rationale: 'רָאשֵׁי literally means ''heads,'' but for poles in English ''ends''
    is the natural equivalent. The Niphal of ראה is passive/reflexive in sense: ''could
    be seen'' or ''were visible.'''
- source_word: מִן הַקֹּדֶשׁ
  chosen: from the Holy Place
  alternatives:
  - from the sanctuary
  - from the holy place
  lexicon: HALOT
  rationale: In temple architecture, הַקֹּדֶשׁ here refers to the outer room of the
    temple, distinct from the inner sanctuary. 'Holy Place' best preserves that technical
    distinction in English.
- source_word: עַל פְּנֵי הַדְּבִיר
  chosen: before the inner sanctuary
  alternatives:
  - in front of the inner sanctuary
  - before the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר denotes the inner sanctuary/inner room where the ark was placed.
    'Before' reflects עַל־פְּנֵי idiomatically. 'Inner sanctuary' is accurate and
    readable; 'Most Holy Place' is interpretive but acceptable as a footnoted alternative.
- source_word: וְלֹא יֵרָאוּ הַחוּצָה
  chosen: but they could not be seen from outside
  alternatives:
  - but they were not visible outside
  - but they could not be seen from the outside
  lexicon: HALOT
  rationale: The phrase contrasts visibility from the Holy Place with non-visibility
    from outside. Rendering הַחוּצָה adverbially as 'from outside' communicates the
    sense naturally.
- source_word: וַיִּהְיוּ שָׁם עַד הַיּוֹם הַזֶּה
  chosen: and they are there to this day
  alternatives:
  - and they remained there to this day
  - and they have been there to this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking the continuing state from the
    narrator's perspective. Present-tense English idiom ('are there to this day')
    best matches common biblical English while remaining natural.
