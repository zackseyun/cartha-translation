id: 1KI.8.23
reference: 1 Kings 8:23
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ אֵין כָּמ֣וֹ/ךָ אֱלֹהִ֔ים בַּ/שָּׁמַ֣יִם מִ/מַּ֔עַל וְ/עַל הָ/אָ֖רֶץ מִ/תָּ֑חַת שֹׁמֵ֤ר הַ/בְּרִית֙ וְֽ/הַ/חֶ֔סֶד לַ/עֲבָדֶ֕י/ךָ הַ/הֹלְכִ֥ים לְ/פָנֶ֖י/ךָ בְּ/כָל לִבָּֽ/ם־־־׃
translation:
  text: And he said, “O Yahweh, God of Israel, there is no God like you in heaven above or on earth beneath, keeping the covenant and the steadfast love for your servants who walk before you with all their heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the heavens above and on the earth below.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew hesed, often denoting covenant loyalty, faithful love, or steadfast love.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: and he said
  alternatives:
  - then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Solomon's prayer. 'And he said' preserves the Hebrew sequence without overinterpreting discourse flow.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - God, the God of Israel
  lexicon: HALOT
  rationale: Construct phrase naturally rendered as title of address. 'God of Israel' is idiomatic and faithful.
- source_word: אֵין כָּמוֹךָ אֱלֹהִים
  chosen: there is no God like you
  alternatives:
  - there is none like you among the gods
  - there is no god like you
  lexicon: HALOT
  rationale: The clause asserts incomparability. Rendering אֱלֹהִים here as singular 'God' fits the sense in context of direct address to YHWH, while preserving the force of uniqueness.
- source_word: בַּשָּׁמַיִם מִמַּעַל וְעַל הָאָרֶץ מִתָּחַת
  chosen: in heaven above or on earth beneath
  alternatives:
  - in the heavens above and on the earth below
  lexicon: HALOT
  rationale: A merism expressing totality of cosmic scope. Singular 'heaven' is idiomatic in English though Hebrew is formally plural. 'Beneath' matches מִתָּחַת well.
- source_word: שֹׁמֵר
  chosen: keeping
  alternatives:
  - who keeps
  - guarding
  - observing
  lexicon: HALOT
  rationale: Participial form continuing the address by describing YHWH's character. 'Keeping' is concise and idiomatic in apposition to the vocative.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - covenant
  lexicon: HALOT
  rationale: Definite article retained. Refers to God's covenant commitment, likely in a general covenantal sense rather than one narrowly specified covenant only.
- source_word: וְהַחֶסֶד
  chosen: the steadfast love
  alternatives:
  - lovingkindness
  - faithful love
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenant loyalty and enduring love. 'Steadfast love' is the best established English rendering that preserves both affection and faithfulness.
- source_word: לַעֲבָדֶיךָ
  chosen: for your servants
  alternatives:
  - to your servants
  lexicon: HALOT
  rationale: The preposition here is naturally rendered 'for' with 'keeping the covenant and the steadfast love for your servants.' 'Servants' fits the relational and covenantal context better than 'slaves' here, since bonded status is not the salient emphasis.
- source_word: הַהֹלְכִים לְפָנֶיךָ
  chosen: who walk before you
  alternatives:
  - who live before you
  - who walk in your presence
  lexicon: HALOT
  rationale: Common Hebrew idiom for faithful conduct in God's presence. 'Walk before you' preserves the metaphor and biblical diction.
- source_word: בְּכָל לִבָּם
  chosen: with all their heart
  alternatives:
  - with their whole heart
  - with all their mind
  lexicon: HALOT
  rationale: Hebrew singular 'heart' with plural suffix is often rendered distributively in English. Singular 'heart' after 'their' is idiomatic collective English and preserves the covenantal sense of undivided inner devotion.
