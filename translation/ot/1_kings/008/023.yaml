theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by doctrine table for YHWH. This preserves reverential convention without obscuring that the covenant God of Israel is being addressed.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of חֶסֶד in covenant context
  chosen_reading: steadfast love
  alternative_readings:
  - faithful love
  - lovingkindness
  - mercy
  rationale: The verse pairs covenant and חֶסֶד, highlighting God's loyal covenant love. 'Steadfast love' preserves theological tension between affection and fidelity without narrowing to mere emotion or mere mercy.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, documented exception if needed)
