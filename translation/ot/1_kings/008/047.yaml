theological_decisions:
- issue: Repentance language in וְשָׁבוּ
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The verse describes exiles turning toward God with confession and supplication.
    Rendering שׁוב as 'return' preserves the Hebrew's relational and covenantal breadth,
    allowing both repentance and turning back to God to remain in view without importing
    a narrower doctrinal formula.
  doctrine_reference: Translation philosophy §3, §5
- issue: Idiomatic heart-language in וְהֵשִׁיבוּ אֶל־לִבָּם
  chosen_reading: come to their senses
  alternative_readings:
  - take it to heart
  - bring it back to their heart
  rationale: The Hebrew idiom points to inward recognition leading to repentance.
    The chosen rendering communicates the sense clearly in modern English while preserving
    the repentance context; a footnote retains the more literal heart-based alternatives
    for auditability.
  doctrine_reference: Translation philosophy §6, §5
