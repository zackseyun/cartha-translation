id: 1KI.8.47
reference: 1 Kings 8:47
source:
  edition: WLC
  text: וְ/הֵשִׁ֨יבוּ֙ אֶל לִבָּ֔/ם בָּ/אָ֖רֶץ אֲשֶׁ֣ר נִשְׁבּוּ שָׁ֑ם וְ/שָׁ֣בוּ
    וְ/הִֽתְחַנְּנ֣וּ אֵלֶ֗י/ךָ בְּ/אֶ֤רֶץ שֹֽׁבֵי/הֶם֙ לֵ/אמֹ֔ר חָטָ֥אנוּ וְ/הֶעֱוִ֖ינוּ
    רָשָֽׁעְנוּ־־׀׃
translation:
  text: and if they come to their senses in the land where they were taken captive,
    and return and plead with you in the land of those who took them captive, saying,
    ‘We have sinned and acted perversely; we have acted wickedly,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'bring it back to their heart' or 'take it to heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'turn back' / 'repent.'
    reason: alternative_reading
  - marker: c
    text: Or 'in the land of their captors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיבוּ אֶל־לִבָּם
  chosen: come to their senses
  alternatives:
  - bring it back to their heart
  - take it to heart
  lexicon: HALOT
  rationale: Literally 'bring back to their heart.' In this idiom, the sense is reflective
    repentance or recollection. 'Come to their senses' communicates the idiomatic
    force in natural English without over-paraphrasing; alternatives are preserved
    because the Hebrew imagery of the heart is significant.
- source_word: בָּאָרֶץ אֲשֶׁר נִשְׁבּוּ שָׁם
  chosen: in the land where they were taken captive
  alternatives:
  - in the land where they were carried captive
  - in the land where they were exiled
  lexicon: HALOT
  rationale: The Niphal of שׁבה denotes being taken captive. 'Taken captive' is the
    clearest modern rendering and fits the passive sense.
- source_word: וְשָׁבוּ
  chosen: return
  alternatives:
  - turn back
  - repent
  lexicon: HALOT
  rationale: שׁוב can mean either physical return or metaphorical turning/repentance.
    Here, in sequence with confession and supplication, it carries repentance-oriented
    turning back to God. 'Return' preserves the Hebrew's broader sense and theological
    resonance without narrowing it to a technical term.
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  chosen: plead with you
  alternatives:
  - make supplication to you
  - implore you
  lexicon: HALOT
  rationale: The Hitpael of חנן here expresses earnest entreaty for favor. 'Plead
    with you' is natural modern English and preserves the prayerful urgency.
- source_word: בְּאֶרֶץ שֹׁבֵיהֶם
  chosen: in the land of those who took them captive
  alternatives:
  - in the land of their captors
  lexicon: HALOT
  rationale: The participial form שֹׁבֵי־הֶם means 'their captors' or 'those taking
    them captive.' The fuller rendering makes the relation explicit and echoes the
    earlier clause.
- source_word: לֵאמֹר
  chosen: saying
  lexicon: HALOT
  rationale: Standard quotative introducing the content of their confession.
- source_word: חָטָאנוּ
  chosen: We have sinned
  lexicon: HALOT
  rationale: Basic confession formula from חטא, denoting sin or missing the mark.
- source_word: וְהֶעֱוִינוּ
  chosen: acted perversely
  alternatives:
  - committed iniquity
  - done wrong
  lexicon: HALOT
  rationale: From עוה in the Hiphil, conveying distortion, crookedness, or perversion.
    'Acted perversely' preserves the moral deformation more distinctly than the broader
    'done wrong,' while remaining readable.
- source_word: רָשָׁעְנוּ
  chosen: we have acted wickedly
  alternatives:
  - we have been wicked
  - we have done wickedly
  lexicon: HALOT
  rationale: From רשע, denoting wickedness or guilt. 'Acted wickedly' gives a natural
    English confession parallel to the preceding verbs and preserves the intensifying
    triad.
