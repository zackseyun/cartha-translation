id: 1KI.8.50
reference: 1 Kings 8:50
source:
  edition: WLC
  text: וְ/סָלַחְתָּ֤ לְ/עַמְּ/ךָ֙ אֲשֶׁ֣ר חָֽטְאוּ לָ֔/ךְ וּ/לְ/כָל פִּשְׁעֵי/הֶ֖ם
    אֲשֶׁ֣ר פָּשְׁעוּ בָ֑/ךְ וּ/נְתַתָּ֧/ם לְ/רַחֲמִ֛ים לִ/פְנֵ֥י שֹׁבֵי/הֶ֖ם וְ/רִֽחֲמֽוּ/ם־־־׃
translation:
  text: and forgive your people who have sinned against you, and all their transgressions
    that they have committed against you, and grant them compassion before those who
    took them captive, so that they may have compassion on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they will have compassion on them.' The final clause may be read
      as result as well as purpose.
    reason: alternative_reading
  - marker: b
    text: '''Transgressions'' could also be rendered ''rebellions,'' highlighting
      covenant breach against God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָלַחְתָּ
  chosen: and forgive
  alternatives:
  - and you shall forgive
  - and pardon
  lexicon: HALOT
  rationale: Qal perfect 2ms in prayer context functions as a petition/wish following
    the preceding requests in Solomon's prayer. English imperative/jussive sense 'forgive'
    best captures the discourse function; 'pardon' is possible but 'forgive' is the
    more standard and transparent rendering for סלח.
- source_word: לְעַמְּךָ
  chosen: your people
  alternatives:
  - to your people
  lexicon: HALOT
  rationale: עם with 2ms suffix means 'your people.' English omits the preposition
    after 'forgive' because 'forgive your people' is idiomatic, though the Hebrew
    marks the indirect object with ל.
- source_word: חָטְאוּ לָךְ
  chosen: have sinned against you
  alternatives:
  - have sinned to you
  lexicon: HALOT
  rationale: חטא with ל marks the offended party; idiomatic English is 'sin against.'
    Present perfect fits the completed action with present relevance in the prayer.
- source_word: וּלְכָל פִּשְׁעֵיהֶם
  chosen: and all their transgressions
  alternatives:
  - and all their rebellions
  - and all their offenses
  lexicon: HALOT
  rationale: פשע denotes rebellion/transgression, often covenantal breach. 'Transgressions'
    preserves the moral-theological weight without over-specifying political rebellion.
- source_word: אֲשֶׁר פָּשְׁעוּ בָךְ
  chosen: that they have committed against you
  alternatives:
  - whereby they rebelled against you
  - that they transgressed against you
  lexicon: HALOT
  rationale: The cognate verb פשע intensifies the noun phrase. Rendering with 'committed
    against you' avoids awkward repetition of 'transgressed transgressions' while
    preserving the offense as directed against God. 'Rebelled' is lexically possible,
    but the immediate parallel with 'sinned' favors a broader moral term in English.
- source_word: וּנְתַתָּם לְרַחֲמִים
  chosen: and grant them compassion
  alternatives:
  - and give them compassion
  - and cause them to receive mercy
  lexicon: HALOT
  rationale: נתן + ל + רחמים is an idiom meaning to place someone in a position to
    receive compassion/mercy. 'Grant them compassion' is concise and natural, while
    preserving God as the one who causes compassionate treatment.
- source_word: לִפְנֵי שֹׁבֵיהֶם
  chosen: before those who took them captive
  alternatives:
  - in the sight of their captors
  - before their captors
  lexicon: HALOT
  rationale: The participle from שבה refers to captors/captive-takers. Expanding to
    'those who took them captive' makes the relation explicit in natural English.
    'Before' here carries the sense of 'in the presence of/in relation to'.
- source_word: וְרִחֲמוּם
  chosen: so that they may have compassion on them
  alternatives:
  - and they will have compassion on them
  - that they may show them mercy
  lexicon: HALOT
  rationale: The final verb expresses the result/purpose of God's granting compassion
    before the captors. English 'so that they may have compassion on them' captures
    the intended outcome. 'Show them mercy' is also valid, but retaining the compassion/mercy
    wordplay with רחמים/רחם is preferable.
