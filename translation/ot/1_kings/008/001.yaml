theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the phrase 'ark of the covenant
    of the LORD.' The project default is to render יְהוָה as 'the LORD' rather than
    transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered national expression לִבְנֵי יִשְׂרָאֵל
  chosen_reading: of the sons of Israel
  alternative_readings:
  - of the children of Israel
  - of the people of Israel
  rationale: The Hebrew is grammatically masculine plural and part of a fixed covenantal/national
    expression. Per the project's gender-accurate principle, the masculine familial
    form is retained rather than neutralized, while the corporate sense remains clear
    from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
