id: 1KI.8.1
reference: 1 Kings 8:1
source:
  edition: WLC
  text: אָ֣ז יַקְהֵ֣ל שְׁלֹמֹ֣ה אֶת זִקְנֵ֣י יִשְׂרָאֵ֡ל אֶת כָּל רָאשֵׁ֣י הַ/מַּטּוֹת֩
    נְשִׂיאֵ֨י הָ/אָב֜וֹת לִ/בְנֵ֧י יִשְׂרָאֵ֛ל אֶל הַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה יְרוּשָׁלִָ֑ם
    לְֽ/הַעֲל֞וֹת אֶת אֲר֧וֹן בְּרִית יְהוָ֛ה מֵ/עִ֥יר דָּוִ֖ד הִ֥יא צִיּֽוֹן־־־־־־׃
translation:
  text: Then Solomon assembled the elders of Israel, all the heads of the tribes,
    the leaders of the fathers’ houses of the sons of Israel, before King Solomon
    in Jerusalem, to bring up the ark of the covenant of the LORD from the city of
    David, that is, Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel,' a familial-national expression often rendered 'children
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: יַקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: Hiphil of קהל means to cause to assemble or convene. 'Assembled' fits
    a formal royal gathering and reads naturally in English.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  lexicon: HALOT
  rationale: Standard socio-political term for recognized senior leaders; 'elders'
    is the established and accurate rendering.
- source_word: כָּל רָאשֵׁי הַמַּטּוֹת
  chosen: all the heads of the tribes
  alternatives:
  - all the tribal heads
  - all the heads of the staffs/tribal divisions
  lexicon: HALOT
  rationale: מַטּוֹת here refers to tribal groupings, not literal staffs. 'Heads of
    the tribes' communicates the referent clearly in context.
- source_word: נְשִׂיאֵי הָאָבוֹת
  chosen: the leaders of the fathers’ houses
  alternatives:
  - the chiefs of the fathers’ houses
  - the princes of the ancestral houses
  lexicon: HALOT
  rationale: נְשִׂיאִים are recognized leaders/chiefs. הָאָבוֹת in this context refers
    to ancestral/family houses or clans. 'Leaders of the fathers’ houses' preserves
    the social structure without over-paraphrase.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the children of Israel
  - of the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with the gender-accurate
    principle, the familial-national expression is preserved rather than flattened
    to 'people,' though the phrase functions corporately.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  chosen: before King Solomon
  alternatives:
  - to King Solomon
  - unto King Solomon
  lexicon: HALOT
  rationale: With a gathering context, אֶל can indicate coming into the presence of
    the king. 'Before King Solomon' best fits the scene in idiomatic English.
- source_word: לְהַעֲלוֹת
  chosen: to bring up
  alternatives:
  - to carry up
  - to take up
  lexicon: HALOT
  rationale: עלה literally means 'go up/bring up.' Because the ark is being moved
    up to Jerusalem, 'bring up' preserves both the literal movement and the conventional
    idiom.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This is the standard construct chain. Rendering יְהוָה as 'the LORD'
    follows the stated doctrine for the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: מֵעִיר דָּוִד
  chosen: from the city of David
  lexicon: HALOT
  rationale: Straightforward geographical designation; no reason to paraphrase.
- source_word: הִיא צִיּוֹן
  chosen: that is, Zion
  alternatives:
  - which is Zion
  lexicon: HALOT
  rationale: The pronoun plus proper name identifies the city of David with Zion.
    'That is, Zion' is clear and idiomatic apposition in modern English.
