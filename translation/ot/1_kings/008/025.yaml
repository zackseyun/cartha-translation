theological_decisions:
- issue: Conditionality of the Davidic promise in this verse
  chosen_reading: The verse presents the promise of dynastic continuity with an explicit
    condition on David's sons' conduct.
  alternative_readings:
  - An unconditional promise with the condition applying only to experiential enjoyment,
    not the promise itself
  rationale: The Hebrew explicitly includes רַק אִם ('if only/only if') followed by
    the sons' obedience. The translation should preserve that tension without importing
    a broader systematic resolution from other Davidic covenant texts.
  doctrine_reference: Preserve theological tension rather than resolve it.
