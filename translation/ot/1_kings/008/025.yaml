id: 1KI.8.25
reference: 1 Kings 8:25
source:
  edition: WLC
  text: וְ/עַתָּ֞ה יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל שְׁ֠מֹר לְ/עַבְדְּ/ךָ֨ דָוִ֤ד אָבִ/י֙
    אֵת֩ אֲשֶׁ֨ר דִּבַּ֤רְתָּ לּ/וֹ֙ לֵ/אמֹ֔ר לֹא יִכָּרֵ֨ת לְ/ךָ֥ אִישׁ֙ מִ/לְּ/פָנַ֔/י
    יֹשֵׁ֖ב עַל כִּסֵּ֣א יִשְׂרָאֵ֑ל רַ֠ק אִם יִשְׁמְר֨וּ בָנֶ֤י/ךָ אֶת דַּרְכָּ/ם֙
    לָ/לֶ֣כֶת לְ/פָנַ֔/י כַּ/אֲשֶׁ֥ר הָלַ֖כְתָּ לְ/פָנָֽ/י׀־־־־׃
translation:
  text: And now, LORD, God of Israel, keep for your servant David my father what you
    spoke to him, saying, ‘A man shall not be cut off from before me for you, one
    sitting on the throne of Israel, if only your sons keep their way by walking before
    me as you have walked before me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “You shall not lack a man before me to sit on the
      throne of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.' Here
    it is used in direct address, so 'LORD' preserves the covenant name according
    to English Bible convention without transliteration.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - fulfill
  - guard
  - observe
  lexicon: HALOT
  rationale: In prayer language with a promise as object, שׁמר can mean to keep/fulfill.
    'Keep' preserves the Hebrew verbal link and allows the following object clause
    to specify that what is kept is the promise spoken to David.
- source_word: לְעַבְדְּךָ
  chosen: for your servant
  alternatives:
  - for your slave
  - for your servant David
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, in royal prayer addressing God and
    referring to David, 'servant' is the most natural English rendering and matches
    covenantal humility rather than bonded-status emphasis.
- source_word: דָוִד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both are possible in English. 'David my father' follows the Hebrew order
    more closely while remaining natural.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  chosen: what you spoke to him
  alternatives:
  - that which you promised him
  - what you said to him
  lexicon: HALOT
  rationale: The Hebrew says literally 'what you spoke to him.' Because the content
    is a divine promise, 'spoke' preserves the wording without over-interpreting,
    while the following quotation makes the promise explicit.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  chosen: A man shall not be cut off from before me for you
  alternatives:
  - You shall not lack a man before me
  - There shall not be cut off for you a man before me
  lexicon: HALOT
  rationale: כרת in Niphal literally means 'be cut off.' The idiom refers to dynastic
    continuity. I retained the literal core 'be cut off' in the main text for auditability,
    while preserving the smoother dynastic sense in a footnote.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - before me
  lexicon: HALOT
  rationale: The phrase is spatial/relational and commonly rendered 'before me.' Including
    'from' reflects the prefixed מן in the idiom 'not be cut off from before me.'
- source_word: יֹשֵׁב עַל כִּסֵּא יִשְׂרָאֵל
  chosen: one sitting on the throne of Israel
  alternatives:
  - one to sit on the throne of Israel
  - one seated on Israel's throne
  lexicon: HALOT
  rationale: The participle יֹשֵׁב is rendered as a substantival participle, 'one
    sitting.' This keeps the Hebrew structure while clearly identifying the royal
    successor.
- source_word: רַק אִם
  chosen: if only
  alternatives:
  - only if
  - provided that
  lexicon: HALOT
  rationale: The combination introduces a strong condition. 'If only' captures the
    exhortational force in Solomon's prayer while remaining idiomatic.
- source_word: יִשְׁמְרוּ בָנֶיךָ אֶת דַּרְכָּם
  chosen: your sons keep their way
  alternatives:
  - your sons guard their way
  - your sons keep to their way
  lexicon: HALOT
  rationale: '''Keep their way'' is a natural rendering of the Hebrew idiom meaning
    to watch/guard one''s conduct. It prepares for the infinitive phrase explaining
    how: by walking before God.'
- source_word: לָלֶכֶת לְפָנַי
  chosen: by walking before me
  alternatives:
  - to walk before me
  - so as to walk before me
  lexicon: HALOT
  rationale: The infinitive expresses the manner/content of keeping their way. 'By
    walking before me' makes that relation clear in English.
- source_word: כַּאֲשֶׁר הָלַכְתָּ לְפָנָי
  chosen: as you have walked before me
  alternatives:
  - just as you walked before me
  lexicon: HALOT
  rationale: Addressed to David within the quoted promise, the perfect verb refers
    to David's established pattern of life. 'Have walked' conveys that completed-yet-relevant
    sense in English.
