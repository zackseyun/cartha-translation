theological_decisions:
- issue: Rendering ירא in relation to God
  chosen_reading: fear you
  alternative_readings:
  - revere you
  - stand in awe of you
  rationale: The verse speaks of covenantal piety before God. 'Fear you' preserves
    the biblical theological category of the fear of the LORD/God without reducing
    it to mere respect. The alternatives are semantically related but soften the term's
    force.
  doctrine_reference: Translation philosophy §3, §6
- issue: Scope of הָאֲדָמָה
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: Because the clause is immediately qualified by 'that you gave to our
    fathers,' the referent is not humanity's dwelling place in general but Israel's
    inherited land. This avoids importing a broader universal scope not demanded by
    the context.
  doctrine_reference: Translation philosophy §1
