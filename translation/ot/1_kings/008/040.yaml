id: 1KI.8.40
reference: 1 Kings 8:40
source:
  edition: WLC
  text: לְמַ֨עַן֙ יִֽרָא֔וּ/ךָ כָּל הַ֨/יָּמִ֔ים אֲשֶׁר הֵ֥ם חַיִּ֖ים עַל פְּנֵ֣י
    הָ/אֲדָמָ֑ה אֲשֶׁ֥ר נָתַ֖תָּה לַ/אֲבֹתֵֽי/נוּ־־־׃
translation:
  text: so that they may fear you all the days that they live on the face of the land
    that you gave to our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the face of the earth.' The Hebrew idiom can be rendered more broadly,
      but here 'land' fits the reference to what God gave to Israel's fathers.
    reason: lexical_alternative
  - marker: b
    text: Or 'as long as they live.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''to our ancestors.'' Hebrew: ''to our fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result in Solomon's prayer. 'So that' is natural modern
    English and preserves the purposive force.
- source_word: יִרָאוּךָ
  chosen: they may fear you
  alternatives:
  - they may revere you
  - they may stand in awe of you
  lexicon: HALOT
  rationale: From ירא, denoting fear/reverence toward God. 'Fear you' preserves the
    covenantal and theological weight better than the softer 'revere,' while the modal
    'may' reflects the imperfect/jussive-like purpose sense after לְמַעַן.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - all their days
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the idiom's temporal fullness.
    'Always' is smoother but less transparent to the Hebrew wording.
- source_word: אֲשֶׁר הֵם חַיִּים
  chosen: that they live
  alternatives:
  - while they are living
  - as long as they live
  lexicon: HALOT
  rationale: This relative clause specifies the duration of 'all the days.' 'That
    they live' is concise and faithful; the sense is effectively 'as long as they
    live,' but the chosen wording stays closer to the Hebrew structure.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the land
  alternatives:
  - on the land
  - upon the earth
  - on the face of the earth
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'on the face of the ground/land.' Here,
    because the following clause refers to the land given to the fathers, 'land' fits
    the immediate covenantal context better than 'earth.' Retaining 'on the face of'
    preserves the Hebrew imagery.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the earth
  lexicon: HALOT
  rationale: Although אֲדָמָה can mean 'ground' or 'earth,' in this context it points
    to the promised land given to Israel's fathers, so 'land' is the best contextual
    rendering.
- source_word: אֲשֶׁר נָתַתָּה
  chosen: that you gave
  alternatives:
  - which you have given
  lexicon: HALOT
  rationale: Simple past is natural in English and adequately reflects the completed
    divine gift in Israel's history.
- source_word: לַאֲבֹתֵינוּ
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'our fathers.' Per the translation philosophy,
    gender-accurate rendering is preferred where that matches the source. 'Ancestors'
    is possible interpretively, but 'fathers' better preserves the covenantal phrasing.
