theological_decisions:
- issue: Rendering the covenantal distinction between Israel and the non-Israelite
    petitioner
  chosen_reading: the foreigner, who is not from your people Israel
  alternative_readings:
  - the stranger, who is not of your people Israel
  rationale: The verse highlights that even a non-Israelite may come in relation to
    the LORD's name. The translation preserves the covenantal distinction without
    softening it into a merely social category.
  doctrine_reference: Translation philosophy §§1, 6
