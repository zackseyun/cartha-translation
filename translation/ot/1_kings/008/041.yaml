id: 1KI.8.41
reference: 1 Kings 8:41
source:
  edition: WLC
  text: וְ/גַם֙ אֶל הַ/נָּכְרִ֔י אֲשֶׁ֛ר לֹא מֵ/עַמְּ/ךָ֥ יִשְׂרָאֵ֖ל ה֑וּא וּ/בָ֛א
    מֵ/אֶ֥רֶץ רְחוֹקָ֖ה לְמַ֥עַן שְׁמֶֽ/ךָ־־׃
translation:
  text: And also concerning the foreigner, who is not from your people Israel, but
    comes from a distant land for the sake of your name—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stranger' or 'the outsider.' The Hebrew refers to a non-Israelite,
      not merely a traveler.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - And even
  lexicon: HALOT
  rationale: Carries an additive/emphatic force linking this case to the preceding
    prayer petitions. 'And also' preserves both conjunction and emphasis in natural
    English.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - to
  - toward
  - as for
  lexicon: HALOT
  rationale: In this prayer context, אֶל introduces the topic/case under consideration
    rather than simple motion. 'Concerning' fits the syntax of Solomon's petition
    in English.
- source_word: הַנָּכְרִי
  chosen: the foreigner
  alternatives:
  - the stranger
  - the outsider
  - the foreign man
  lexicon: HALOT
  rationale: נָכְרִי denotes a foreigner/non-Israelite. 'Foreigner' is clear modern
    English and preserves the ethnic/covenantal distinction without archaic tone.
- source_word: אֲשֶׁר לֹא מֵעַמְּךָ יִשְׂרָאֵל הוּא
  chosen: who is not from your people Israel
  alternatives:
  - who is not of your people Israel
  - who does not belong to your people Israel
  lexicon: HALOT
  rationale: This relative clause identifies the foreigner as outside Israel. 'From
    your people Israel' is idiomatic and preserves the covenantal reference to Israel
    as God's people.
- source_word: וּבָא
  chosen: but comes
  alternatives:
  - and comes
  - when he comes
  lexicon: HALOT
  rationale: 'The conjunction here advances the description: the foreigner is not
    from Israel yet comes from afar. ''But comes'' brings out the mild contrast naturally
    in English; the sense is not adversative in a strong way, but contrastive enough
    to justify ''but''.'
- source_word: מֵאֶרֶץ רְחוֹקָה
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: A standard Hebrew expression for geographic remoteness. 'Distant land'
    is natural modern English and preserves the sense.
- source_word: לְמַעַן שְׁמֶךָ
  chosen: for the sake of your name
  alternatives:
  - because of your name
  - on account of your name
  lexicon: HALOT
  rationale: This phrase expresses motive/ground tied to God's revealed reputation
    and renown. 'For the sake of your name' preserves the theological weight of 'name'
    in biblical idiom better than a flattened paraphrase.
