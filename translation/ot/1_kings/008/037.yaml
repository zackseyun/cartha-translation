id: 1KI.8.37
reference: 1 Kings 8:37
source:
  edition: WLC
  text: רָעָ֞ב כִּֽי יִהְיֶ֣ה בָ/אָ֗רֶץ דֶּ֣בֶר כִּֽי יִ֠הְיֶה שִׁדָּפ֨וֹן יֵרָק֜וֹן
    אַרְבֶּ֤ה חָסִיל֙ כִּ֣י יִהְיֶ֔ה כִּ֧י יָֽצַר ל֛/וֹ אֹיְב֖/וֹ בְּ/אֶ֣רֶץ שְׁעָרָ֑י/ו
    כָּל נֶ֖גַע כָּֽל מַחֲלָֽה־־־־־׃
translation:
  text: If there is famine in the land, if there is pestilence, blight, mildew, locust,
    or caterpillar; if his enemy besieges him in the land of his gates; whatever plague,
    whatever sickness—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caterpillar'; the Hebrew term may refer more broadly to a devouring
      locust or a particular stage/kind of locust.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the land of his gates,' with 'gates' standing for the cities
      or towns of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In disaster lists, רָעָב denotes famine rather than ordinary hunger;
    'famine' is the standard English equivalent in this covenantal/judgment context.
- source_word: דֶּבֶר
  chosen: pestilence
  alternatives:
  - plague
  lexicon: HALOT
  rationale: Refers to epidemic disease or pestilence. 'Pestilence' distinguishes
    it from the later broader term נֶגַע ('plague/affliction').
- source_word: שִׁדָּפוֹן
  chosen: blight
  alternatives:
  - scorching
  - blasting
  lexicon: HALOT
  rationale: Agricultural crop damage caused by scorching east wind or blight. 'Blight'
    is concise and idiomatic in an agricultural disaster list.
- source_word: יֵרָקוֹן
  chosen: mildew
  alternatives:
  - yellowing
  - paleness
  lexicon: HALOT
  rationale: In agricultural contexts this denotes a plant disease, traditionally
    'mildew.' This pairs naturally with שִׁדָּפוֹן.
- source_word: אַרְבֶּה
  chosen: locust
  alternatives:
  - swarming locust
  lexicon: HALOT
  rationale: Standard term for locust; singular in Hebrew used collectively, so English
    singular works in a list of calamities.
- source_word: חָסִיל
  chosen: caterpillar
  alternatives:
  - devouring locust
  - grasshopper
  lexicon: HALOT
  rationale: A crop-devouring insect, traditionally rendered 'caterpillar' in many
    English versions. The exact species is uncertain, so a footnote preserves the
    alternative understanding as a locust stage or kind.
- source_word: כִּי יִהְיֶה ... כִּי יָצַר לוֹ אֹיְבוֹ
  chosen: if his enemy besieges him
  alternatives:
  - if his enemy oppresses him
  - if his enemy shuts him in
  lexicon: HALOT
  rationale: The Hiphil of צור here conveys hemming in or besieging. 'Besieges' fits
    the military setting and the following phrase about the land/cities.
- source_word: בְּאֶרֶץ שְׁעָרָיו
  chosen: in the land of his gates
  alternatives:
  - in the land of his cities
  - in one of his cities
  lexicon: HALOT
  rationale: Literally 'in the land of his gates,' with 'gates' metonymically referring
    to city-gates and thus cities. I retained the more literal image in the main text
    for auditability, while preserving the smoother idiomatic alternative in a footnote.
- source_word: כָּל נֶגַע
  chosen: whatever plague
  alternatives:
  - any affliction
  - any blow
  lexicon: HALOT
  rationale: A broad term for plague, affliction, or stroke. 'Whatever plague' preserves
    the sweeping force of כָּל and matches the disaster catalogue.
- source_word: כָּל מַחֲלָה
  chosen: whatever sickness
  alternatives:
  - any disease
  lexicon: HALOT
  rationale: General term for illness or disease. 'Sickness' is readable modern English
    and pairs well with 'plague' without collapsing the distinction.
