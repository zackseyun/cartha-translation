id: 1KI.8.18
reference: 1 Kings 8:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל דָּוִ֣ד אָבִ֔/י יַ֗עַן אֲשֶׁ֤ר הָיָה֙ עִם לְבָ֣בְ/ךָ֔ לִ/בְנ֥וֹת בַּ֖יִת לִ/שְׁמִ֑/י הֱטִיבֹ֔תָ כִּ֥י הָיָ֖ה עִם לְבָבֶֽ/ךָ־־־׃
translation:
  text: But Yahweh said to David my father, ‘Because it was in your heart to build a house for my name, you did well that it was in your heart.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to build a temple for my name.' The Hebrew literally says 'to build a house for my name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; 'said' is the natural English rendering in direct discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: First-person singular suffix indicates Solomon is referring to David as his father.
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - inasmuch as
  - since
  lexicon: HALOT
  rationale: The paired particles introduce the reason clause; 'because' is clear modern English.
- source_word: הָיָה עִם לְבָבְךָ
  chosen: it was in your heart
  alternatives:
  - it was with your heart
  - you had it in mind
  lexicon: HALOT
  rationale: Hebrew idiom for intention or desire. 'It was in your heart' preserves the metaphor while remaining idiomatic in English.
- source_word: לִבְנוֹת בַּיִת
  chosen: to build a house
  alternatives:
  - to build a temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple, but 'house' preserves the source wording and biblical idiom; the referent is clear from context.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - to bear my name
  lexicon: HALOT
  rationale: Literal rendering preserves the covenantal/theological idiom of a sanctuary associated with God's name.
- source_word: הֱטִיבֹתָ
  chosen: you did well
  alternatives:
  - you have done well
  - it was good that you did this
  lexicon: HALOT
  rationale: Hiphil of יטב here expresses approval. 'You did well' is concise and natural in English.
- source_word: כִּי הָיָה עִם לְבָבֶךָ
  chosen: that it was in your heart
  alternatives:
  - because it was in your heart
  lexicon: HALOT
  rationale: The clause restates and grounds the divine approval. Rendering כִּי as 'that' avoids awkward repetition of 'because' while preserving the explanatory force.
