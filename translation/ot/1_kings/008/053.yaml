theological_decisions:
- issue: Rendering the divine name יְהוָה in the collocation אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The project default renders YHWH as 'the LORD.' In the fixed collocation
    אֲדֹנָי יְהוִה, however, a literal 'Lord the LORD' is awkward and unidiomatic
    in English. 'Lord GOD' preserves the distinction between the title and the divine
    name while following longstanding English convention for this specific combination.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
