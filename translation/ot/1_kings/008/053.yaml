id: 1KI.8.53
reference: 1 Kings 8:53
source:
  edition: WLC
  text: כִּֽי אַתָּ֞ה הִבְדַּלְתָּ֤/ם לְ/ךָ֙ לְֽ/נַחֲלָ֔ה מִ/כֹּ֖ל עַמֵּ֣י הָ/אָ֑רֶץ
    כַּ/אֲשֶׁ֨ר דִּבַּ֜רְתָּ בְּ/יַ֣ד מֹשֶׁ֣ה עַבְדֶּ֗/ךָ בְּ/הוֹצִיאֲ/ךָ֧ אֶת אֲבֹתֵ֛י/נוּ
    מִ/מִּצְרַ֖יִם אֲדֹנָ֥/י יְהוִֽה־׀־׃פ
translation:
  text: For you set them apart for yourself as an inheritance from all the peoples
    of the earth, just as you spoke by the hand of Moses your servant when you brought
    our fathers out from Egypt, Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Moses your servant' for 'by the hand of Moses your servant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors' for 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord YHWH'; English commonly renders this combination as 'Lord GOD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבְדַּלְתָּם
  chosen: set them apart
  alternatives:
  - separated them
  - distinguished them
  lexicon: HALOT
  rationale: The Hiphil of בדל means to separate or set apart. 'Set them apart' is
    natural modern English and preserves the covenantal sense of consecrated distinction
    without over-paraphrasing.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - to yourself
  lexicon: HALOT
  rationale: 'The dative marks possession/purpose: Israel has been separated as belonging
    to God. ''For yourself'' communicates divine possession more idiomatically in
    English than ''to yourself.'''
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance or allotted possession. 'As an inheritance'
    preserves the covenantal land/people language and fits the syntax with 'set them
    apart for yourself.'
- source_word: מִכֹּל עַמֵּי הָאָרֶץ
  chosen: from all the peoples of the earth
  alternatives:
  - out of all the peoples of the earth
  - from among all the peoples of the land
  lexicon: HALOT
  rationale: The phrase contrasts Israel with the nations generally. 'Peoples of the
    earth' best reflects the universal scope here; 'land' would sound too local in
    this context.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence between God's action and prior word. 'Just
    as' clearly conveys that relation in contemporary English.
- source_word: דִּבַּרְתָּ
  chosen: you spoke
  alternatives:
  - you said
  lexicon: HALOT
  rationale: '''Spoke'' better matches the formal register of divine speech and pairs
    well with the instrumental phrase that follows.'
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The Hebrew idiom literally means mediation through an agent. Retaining
    'by the hand of' preserves the biblical idiom while remaining intelligible in
    English.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific prophetic context
    'servant' is the most natural and established rendering; the bonded-status emphasis
    is not foregrounded here.
- source_word: בְּהוֹצִיאֲךָ
  chosen: when you brought
  alternatives:
  - in your bringing out
  - when you brought out
  lexicon: HALOT
  rationale: The prefixed infinitive construct with ב conveys temporal circumstance.
    'When you brought' is smooth English and preserves the temporal force.
- source_word: אֶת אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Per the gender-accurate policy, the masculine plural should be retained
    where the text refers specifically to the patriarchal forefathers/previous generations.
    'Ancestors' is possible but less textually specific.
- source_word: מִמִּצְרַיִם
  chosen: out from Egypt
  alternatives:
  - out of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: The exodus formula often uses 'out of Egypt.' Here 'out from Egypt' closely
    reflects the preposition while remaining natural enough; either is acceptable.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord the LORD
  - Lord Yahweh
  lexicon: HALOT
  rationale: Because the divine title אֲדֹנָי is followed by YHWH, English convention
    avoids 'Lord LORD.' 'Lord GOD' is the standard equivalent that preserves both
    elements while following the project's default of rendering YHWH as 'the LORD'
    in a form suitable to this collocation.
