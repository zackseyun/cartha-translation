id: 1KI.8.60
reference: 1 Kings 8:60
source:
  edition: WLC
  text: לְמַ֗עַן דַּ֚עַת כָּל עַמֵּ֣י הָ/אָ֔רֶץ כִּ֥י יְהוָ֖ה ה֣וּא הָ/אֱלֹהִ֑ים אֵ֖ין
    עֽוֹד־׃
translation:
  text: so that all the peoples of the earth may know that the LORD, he is God; there
    is no other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD, he is God''; the pronoun adds emphasis to the identification
      of the LORD as God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the peoples of the land,' if הָאָרֶץ is taken more locally; here
      the broader sense 'earth' fits the context of universal recognition.
    reason: lexical_alternative
  - marker: c
    text: The divine name יְהוָה is traditionally rendered 'the LORD'; alternatively,
      'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: דַּעַת
  chosen: may know
  alternatives:
  - to know
  lexicon: HALOT
  rationale: The infinitive construct after לְמַעַן expresses intended result/purpose;
    in English this is best rendered with a finite verb, 'may know.'
- source_word: כָּל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  - all the nations of the earth
  lexicon: HALOT
  rationale: עַמִּים is 'peoples' rather than specifically 'nations,' and הָאָרֶץ
    here is best taken globally ('the earth') in Solomon's universalizing statement,
    not merely 'the land' of Israel.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what the peoples are to know.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: הוּא
  chosen: he is
  alternatives:
  - is
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis in Hebrew. Retaining ''he is''
    preserves the emphatic identification: ''the LORD, he is God.'''
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the phrase identifies YHWH as the true God. English
    idiom prefers 'God' here rather than the less natural 'the God,' while preserving
    the exclusivist claim.
- source_word: אֵין עוֹד
  chosen: there is no other
  alternatives:
  - there is none else
  - there is no one else
  - there is no other god
  lexicon: HALOT
  rationale: This idiom expresses exclusivity. 'There is no other' is concise, natural,
    and avoids adding 'god,' which is not explicit in the Hebrew.
