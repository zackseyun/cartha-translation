theological_decisions:
- issue: Rendering of לַאֲבוֹתָם in covenantal promise language
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is grammatically masculine and contextually specific. Here the
    reference is to the patriarchal forefathers who received the land promise, so
    'fathers' best preserves the covenantal wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of restoration in וַהֲשֵׁבֹתָם
  chosen_reading: bring them back to the land
  alternative_readings:
  - restore them to the land
  rationale: The verse speaks concretely of return to the land after judgment, not
    merely abstract restoration. The chosen wording preserves the spatial and covenantal
    dimension without importing later theological systems.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
