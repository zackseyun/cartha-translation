id: 1KI.8.34
reference: 1 Kings 8:34
source:
  edition: WLC
  text: וְ/אַתָּה֙ תִּשְׁמַ֣ע הַ/שָּׁמַ֔יִם וְ/סָ֣לַחְתָּ֔ לְ/חַטַּ֖את עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל
    וַ/הֲשֵֽׁבֹתָ/ם֙ אֶל הָ֣/אֲדָמָ֔ה אֲשֶׁ֥ר נָתַ֖תָּ לַ/אֲבוֹתָֽ/ם־׃ס
translation:
  text: then may you hear in heaven and forgive the sin of your people Israel, and
    bring them back to the land that you gave to their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “hear from heaven.”
    reason: lexical_alternative
  - marker: b
    text: Or “restore them to the land.”
    reason: lexical_alternative
  - marker: c
    text: Lit. “their fathers”; that is, the forefathers to whom God gave the land.
    reason: cultural_note
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  chosen: hear in heaven
  alternatives:
  - hear from heaven
  - hear in the heavens
  lexicon: HALOT
  rationale: The idiom combines the verb 'hear' with 'the heavens/heaven' as the divine
    dwelling place. 'Hear in heaven' follows the Hebrew prepositionless construction
    naturally in English prayer language, while 'from heaven' is a common smoothing.
    Singular 'heaven' is idiomatic English for Hebrew plural שָׁמַיִם in this sense.
- source_word: וְסָלַחְתָּ
  chosen: and forgive
  alternatives:
  - then forgive
  lexicon: HALOT
  rationale: The verb סלח denotes divine forgiveness/remission of sin. 'And forgive'
    preserves the coordinate sequence of the Hebrew without overinterpreting the conjunction.
- source_word: לְחַטַּאת
  chosen: the sin
  alternatives:
  - the offense
  - the guilt
  lexicon: HALOT
  rationale: חטאת here refers to sin/offense rather than a sin offering. Singular
    'sin' works as a collective abstraction for Israel's wrongdoing in this prayer
    context.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: HALOT
  rationale: This construct chain identifies Israel as God's covenant people. The
    appositional proper name is rendered straightforwardly without adding punctuation-dependent
    nuance.
- source_word: וַהֲשֵׁבֹתָם
  chosen: and bring them back
  alternatives:
  - and restore them
  - and return them
  lexicon: HALOT
  rationale: The Hiphil of שוב means to cause to return. In context of exile/displacement
    and land, 'bring them back' is clear modern English and preserves the causative
    sense better than the less idiomatic 'return them.' 'Restore them' is possible
    but less explicit about return to the land.
- source_word: אֶל הָאֲדָמָה
  chosen: to the land
  alternatives:
  - to the ground
  - to the soil
  lexicon: HALOT
  rationale: אֲדָמָה can mean ground/soil/land; here covenantal territorial sense
    requires 'land.'
- source_word: אֲשֶׁר נָתַתָּ לַאֲבוֹתָם
  chosen: that you gave to their fathers
  alternatives:
  - which you gave to their ancestors
  lexicon: HALOT
  rationale: The relative clause recalls the ancestral land promise. 'Fathers' is
    retained as gender-accurate and covenantally specific, matching the Hebrew rather
    than neutralizing to 'ancestors.'
