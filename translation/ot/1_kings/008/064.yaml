id: 1KI.8.64
reference: 1 Kings 8:64
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא קִדַּ֨שׁ הַ/מֶּ֜לֶךְ אֶת תּ֣וֹךְ הֶ/חָצֵ֗ר אֲשֶׁר֙ לִ/פְנֵ֣י בֵית יְהוָ֔ה כִּי עָ֣שָׂה שָׁ֗ם אֶת הָֽ/עֹלָה֙ וְ/אֶת הַ/מִּנְחָ֔ה וְ/אֵ֖ת חֶלְבֵ֣י הַ/שְּׁלָמִ֑ים כִּֽי מִזְבַּ֤ח הַ/נְּחֹ֨שֶׁת֙ אֲשֶׁ֣ר לִ/פְנֵ֣י יְהוָ֔ה קָטֹ֗ן מֵֽ/הָכִיל֙ אֶת הָ/עֹלָ֣ה וְ/אֶת הַ/מִּנְחָ֔ה וְ/אֵ֖ת חֶלְבֵ֥י הַ/שְּׁלָמִֽים־־־־־־־־׃
translation:
  text: On that day the king consecrated the middle of the court that was before the house of Yahweh, because there he offered the burnt offering and the grain offering and the fat portions of the peace offerings, because the bronze altar that was before Yahweh was too small to contain the burnt offering and the grain offering and the fat portions of the peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the midst of the court.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD,' that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'the fat of the peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדַּשׁ
  chosen: consecrated
  alternatives:
  - made holy
  - sanctified
  - dedicated
  lexicon: HALOT
  rationale: The verb קדשׁ here denotes setting apart a space for sacred use. 'Consecrated' is natural modern English and preserves the cultic sense better than the more abstract 'made holy' or the broader 'dedicated'.
- source_word: תּוֹךְ הֶחָצֵר
  chosen: the middle of the court
  alternatives:
  - the midst of the court
  - the interior of the court
  lexicon: HALOT
  rationale: תּוֹךְ commonly means 'midst, middle.' Here it refers to the central area of the courtyard being set apart for sacrificial use. 'Middle' is clearer in modern English than 'midst' while preserving the spatial sense.
- source_word: לִפְנֵי בֵית יְהוָה
  chosen: before the house of the LORD
  alternatives:
  - in front of the house of the LORD
  - before the temple of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial, 'before/in front of.' 'House of the LORD' closely reflects בֵית יְהוָה and preserves the temple-as-house idiom rather than interpreting it directly as 'temple' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עָשָׂה שָׁם
  chosen: there he offered
  alternatives:
  - there he made
  - there he performed
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' in sacrificial contexts it idiomatically means to perform or offer a sacrifice. 'Offered' communicates the cultic action directly in idiomatic English without adding content beyond the context.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for a burnt offering. The conventional rendering is accurate and clear.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly/sacrificial context refers to the cereal/grain offering. 'Grain offering' is clearer for modern readers than the overly broad 'offering' and more contextually fitting than 'tribute offering' here.
- source_word: חֶלְבֵי הַשְּׁלָמִים
  chosen: the fat portions of the peace offerings
  alternatives:
  - the fat of the fellowship offerings
  - the choicest parts of the peace offerings
  lexicon: HALOT
  rationale: חֶלֶב in sacrificial law refers specifically to the fat portions reserved for altar burning, not merely figurative 'best parts.' שְׁלָמִים is traditionally 'peace offerings'; this remains the most recognizable and sufficiently precise rendering.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the altar of bronze
  - the copper altar
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote bronze or copper depending on context; 'bronze altar' is the standard and likely sense for the cultic furnishing.
- source_word: קָטֹן מֵהָכִיל
  chosen: was too small to contain
  alternatives:
  - was too small to hold
  - was insufficient to receive
  lexicon: HALOT
  rationale: The adjective plus infinitive construction expresses inadequacy of capacity. 'Too small to contain' is idiomatic and captures the sense that the altar could not accommodate the volume of sacrifices.
