id: 1KI.8.52
reference: 1 Kings 8:52
source:
  edition: WLC
  text: לִ/הְי֨וֹת עֵינֶ֤י/ךָ פְתֻחוֹת֙ אֶל תְּחִנַּ֣ת עַבְדְּ/ךָ֔ וְ/אֶל תְּחִנַּ֖ת
    עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל לִ/שְׁמֹ֣עַ אֲלֵי/הֶ֔ם בְּ/כֹ֖ל קָרְאָ֥/ם אֵלֶֽי/ךָ־־׃
translation:
  text: that your eyes may be open to the plea of your servant and to the plea of
    your people Israel, to listen to them whenever they call to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supplication' for 'plea.' The Hebrew term denotes an earnest request
      for favor or mercy.
    reason: lexical_alternative
  - marker: b
    text: Or 'to hear them.' The Hebrew verb can mean 'hear,' 'listen to,' or 'heed,'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  chosen: that ... may be
  alternatives:
  - to be
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל continues Solomon's petition
    from the preceding context and is best rendered idiomatically in English as a
    purpose/result clause, 'that ... may be,' rather than the more wooden 'to be.'
- source_word: עֵינֶיךָ פְתֻחוֹת
  chosen: your eyes may be open
  alternatives:
  - your eyes being open
  - your eyes open
  lexicon: HALOT
  rationale: A conventional anthropomorphic expression for attentive favor and readiness
    to hear prayer. 'May be open' preserves the petitionary force and the metaphor
    without over-paraphrasing.
- source_word: תְּחִנַּת
  chosen: plea
  alternatives:
  - supplication
  - prayer
  - entreaty
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest request for favor or mercy. 'Plea' is natural
    modern English and preserves the urgency better than the more formal 'supplication.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a royal-prayer self-designation
    by Solomon before God. 'Servant' is the most idiomatic and contextually appropriate
    rendering; the bonded-status nuance is not foregrounded here.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: HALOT
  rationale: Construct phrase identifying Israel as God's covenant people. The appositional
    proper name is smoothly rendered without an added comma in English.
- source_word: לִשְׁמֹעַ אֲלֵיהֶם
  chosen: to listen to them
  alternatives:
  - to hear them
  - to heed them
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or heed. In prayer context, 'listen to them'
    communicates attentive hearing while fitting the preceding metaphor of open eyes.
    'Hear' is possible but can sound merely auditory in modern English.
- source_word: בְּכֹל קָרְאָם אֵלֶיךָ
  chosen: whenever they call to you
  alternatives:
  - in all their calling to you
  - whenever they cry out to you
  lexicon: HALOT
  rationale: The preposition ב with כֹּל plus infinitive/construct-like verbal noun
    sense yields a temporal sense, 'whenever/in every instance that.' קרא in prayer
    contexts is 'call to' or 'cry out to.' 'Whenever they call to you' is clear and
    faithful.
