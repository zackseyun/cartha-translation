theological_decisions:
- issue: Anthropomorphic language about God ('your eyes may be open')
  chosen_reading: Retain the anthropomorphic metaphor in the main text
  alternative_readings:
  - Paraphrase as 'may you pay attention'
  rationale: The Hebrew explicitly uses bodily imagery for divine attentiveness. Preserving
    the metaphor maintains the text's literary and theological texture without implying
    corporeality in a crude sense.
  doctrine_reference: Translation philosophy §1, §3
