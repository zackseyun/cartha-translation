id: 1KI.8.11
reference: 1 Kings 8:11
source:
  edition: WLC
  text: וְ/לֹֽא יָכְל֧וּ הַ/כֹּהֲנִ֛ים לַ/עֲמֹ֥ד לְ/שָׁרֵ֖ת מִ/פְּנֵ֥י הֶֽ/עָנָ֑ן
    כִּי מָלֵ֥א כְבוֹד יְהוָ֖ה אֶת בֵּ֥ית יְהוָֽה־־־־׃פ
translation:
  text: and the priests were not able to stand to minister because of the cloud, for
    the glory of the LORD filled the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'could not stand to serve.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  chosen: were not able
  alternatives:
  - could not
  lexicon: HALOT
  rationale: The verb denotes ability/capacity. 'Were not able' is slightly more formal
    and preserves the sense of incapacity without adding interpretation.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for the Aaronic/temple ministers in this context.
- source_word: לַעֲמֹד
  chosen: to stand
  alternatives:
  - to remain standing
  lexicon: HALOT
  rationale: The infinitive literally means 'to stand.' In context it likely implies
    taking or maintaining one's position for service, but the simpler literal rendering
    is retained.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In priestly/temple contexts, 'minister' better conveys formal cultic
    service than the broader 'serve.'
- source_word: מִפְּנֵי הֶעָנָן
  chosen: because of the cloud
  alternatives:
  - from before the cloud
  - due to the cloud
  lexicon: HALOT
  rationale: The preposition with 'face/presence' idiomatically expresses causation
    here. 'Because of the cloud' is natural English and reflects the priests' inability
    caused by the divine cloud.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement. 'For' preserves
    the explanatory connection in a slightly more formal narrative style.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  lexicon: HALOT
  rationale: The perfect verb states the completed action explaining the present situation.
    English simple past is natural in narrative sequence.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: This preserves the construct relationship and the theological weight
    of כבוד as manifest divine glory. The divine name follows the project's default
    rendering 'the LORD' for יְהוָה.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' Although this refers to the temple, the
    more literal phrase preserves the Hebrew wording and its theological resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
