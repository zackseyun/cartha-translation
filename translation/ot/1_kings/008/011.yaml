theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. The project's doctrinal standard
    specifies 'the LORD' as the default rendering, and there is no contextual reason
    here to depart from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering כְבוֹד יְהוָה
  chosen_reading: the glory of the LORD
  alternative_readings:
  - the LORD's glory
  rationale: The phrase refers to the manifest divine presence filling the temple.
    The translation preserves the theological tension and imagery of divine glory
    without paraphrasing it into an interpretive expression such as 'presence.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
