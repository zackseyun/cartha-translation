theological_decisions:
- issue: Judicial idiom in petition to God
  chosen_reading: The final clause is rendered as a request for God to vindicate or
    grant justice to his people ('uphold their cause').
  alternative_readings:
  - execute justice for them
  - maintain their right
  rationale: The Hebrew idiom עשה משפט commonly means to carry out justice on behalf
    of someone. The translation avoids importing a narrower doctrinal claim and preserves
    the legal-relational sense of divine vindication in context.
  doctrine_reference: Translation philosophy §§1, 3, 6
