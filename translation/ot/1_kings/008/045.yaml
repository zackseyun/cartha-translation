id: 1KI.8.45
reference: 1 Kings 8:45
source:
  edition: WLC
  text: וְ/שָׁמַעְתָּ֙ הַ/שָּׁמַ֔יִם אֶת תְּפִלָּתָ֖/ם וְ/אֶת תְּחִנָּתָ֑/ם וְ/עָשִׂ֖יתָ
    מִשְׁפָּטָֽ/ם־־׃
translation:
  text: then hear in heaven their prayer and their plea, and uphold their cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and execute justice for them' or 'and maintain their right.' The Hebrew
      literally says 'and do their justice/judgment.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens'; rendered 'in heaven' for natural English in this prayer
      formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: then hear
  alternatives:
  - and hear
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of שׁמע in a prayer context functions as a petition
    directed to God: ''hear.'' The prefixed conjunction continues the sequence from
    the preceding conditional clauses; ''then hear'' brings out the sense in idiomatic
    English without overstating the Hebrew.'
- source_word: הַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - from heaven
  - the heavens
  lexicon: HALOT
  rationale: Literally 'the heavens,' but in this formulaic prayer context English
    idiom prefers 'in heaven.' 'From heaven' is also possible and appears in similar
    contexts, but the Hebrew here lacks the preposition מִן; 'in heaven' stays closer
    to the form while remaining natural.
- source_word: תְּפִלָּתָם
  chosen: their prayer
  alternatives:
  - their prayer petition
  lexicon: HALOT
  rationale: תְּפִלָּה is the general term for prayer. Singular with plural suffix
    is naturally rendered collectively as 'their prayer.'
- source_word: תְּחִנָּתָם
  chosen: their plea
  alternatives:
  - their supplication
  - their entreaty
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest plea for favor or mercy. 'Plea' is more
    readable modern English than 'supplication' while preserving the intensified nuance
    distinct from the more general 'prayer.'
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  chosen: and uphold their cause
  alternatives:
  - and do their justice
  - and execute justice for them
  - and maintain their right
  lexicon: HALOT
  rationale: Literally 'and do/make their judgment/justice.' The idiom means to act
    on someone's behalf by granting justice or vindicating them. 'Uphold their cause'
    is a natural English rendering that preserves the judicial sense without woodenly
    reproducing the Hebrew idiom.
