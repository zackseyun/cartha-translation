theological_decisions:
- issue: Anthropomorphic language for God's power
  chosen_reading: Retain 'hand' and 'arm' literally in the main text
  alternative_readings:
  - power
  - strength
  rationale: The Hebrew uses concrete anthropomorphic imagery that is theologically
    and literarily significant in the Old Testament. Rendering these as abstractions
    would flatten the text and import interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Shift from plural to singular subject
  chosen_reading: 'Preserve the Hebrew shift: ''they will hear ... and he will come'''
  alternative_readings:
  - 'Smooth to all-plural: ''they will hear ... and come and pray'''
  rationale: The text moves from foreigners as a class to the representative individual
    foreigner. Preserving the tension is more transparent to the source text than
    harmonizing the number.
  doctrine_reference: Translation philosophy §3
