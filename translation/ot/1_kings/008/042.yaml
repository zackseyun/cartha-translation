id: 1KI.8.42
reference: 1 Kings 8:42
source:
  edition: WLC
  text: כִּ֤י יִשְׁמְעוּ/ן֙ אֶת שִׁמְ/ךָ֣ הַ/גָּד֔וֹל וְ/אֶת יָֽדְ/ךָ֙ הַֽ/חֲזָקָ֔ה
    וּֽ/זְרֹעֲ/ךָ֖ הַ/נְּטוּיָ֑ה וּ/בָ֥א וְ/הִתְפַּלֵּ֖ל אֶל הַ/בַּ֥יִת הַ/זֶּֽה־־־׃
translation:
  text: for they will hear of your great name, and of your mighty hand and your outstretched
    arm, and he will come and pray toward this house—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from plural ('they will hear') to singular ('he will come
      and pray'), likely moving from foreigners in general to the representative individual
      foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the foreigner's prayer in the preceding
    verse. 'For' best preserves the causal/explanatory force in context.
- source_word: יִשְׁמְעוּן
  chosen: they will hear
  alternatives:
  - they hear
  - they shall hear
  lexicon: HALOT
  rationale: Imperfect plural fits future/general sense in Solomon's prayer. The plural
    matches the implied foreigners as a class.
- source_word: אֶת שִׁמְךָ הַגָּדוֹל
  chosen: of your great name
  alternatives:
  - your great name
  - about your great name
  lexicon: HALOT
  rationale: With שמע, English idiom commonly supplies 'hear of/about.' 'Name' here
    carries reputation and revealed renown, but should remain 'name' rather than be
    paraphrased.
- source_word: יָדְךָ הַחֲזָקָה
  chosen: your mighty hand
  alternatives:
  - your strong hand
  lexicon: HALOT
  rationale: A conventional biblical expression for divine power. 'Mighty' is natural
    English and preserves the force of חזקה without sounding wooden.
- source_word: זְרֹעֲךָ הַנְּטוּיָה
  chosen: your outstretched arm
  alternatives:
  - your extended arm
  lexicon: HALOT
  rationale: Established idiom for God's active power in deliverance and judgment.
    'Outstretched arm' is both accurate and readable.
- source_word: וּבָא
  chosen: and he will come
  alternatives:
  - and come
  - then he comes
  lexicon: HALOT
  rationale: The verb is singular, shifting from the plural general statement ('they
    will hear') to the representative individual foreigner who comes to pray. Preserving
    the singular reflects the Hebrew rather than smoothing it away.
- source_word: וְהִתְפַּלֵּל
  chosen: and pray
  alternatives:
  - and he will pray
  lexicon: HALOT
  rationale: Coordinated with the prior singular verb. English can omit the repeated
    pronoun while retaining the singular sense from 'he will come.'
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - to this house
  - at this house
  lexicon: HALOT
  rationale: In temple-prayer contexts, 'toward' best captures directional prayer
    orientation signaled by אֶל without implying physical entry is the main point.
