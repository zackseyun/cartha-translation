id: 1KI.8.22
reference: 1 Kings 8:22
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֣ד שְׁלֹמֹ֗ה לִ/פְנֵי֙ מִזְבַּ֣ח יְהוָ֔ה נֶ֖גֶד כָּל קְהַ֣ל יִשְׂרָאֵ֑ל
    וַ/יִּפְרֹ֥שׂ כַּפָּ֖י/ו הַ/שָּׁמָֽיִם־׃
translation:
  text: Then Solomon stood before the altar of the LORD in front of all the assembly
    of Israel and spread out his hands toward heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the heavens.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stood up
  lexicon: HALOT
  rationale: The waw-consecutive verb from עמד narrates a simple past action. 'Stood'
    is the most natural modern English rendering and fits the narrative sequence without
    adding emphasis not explicit in the Hebrew.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: With 'altar' as its object, לִפְנֵי is naturally rendered 'before.' This
    preserves the spatial sense succinctly.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'The LORD' follows the project's
    required default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text, preserving alternatives only as noted.
- source_word: נֶגֶד
  chosen: in front of
  alternatives:
  - before
  - opposite
  lexicon: HALOT
  rationale: נֶגֶד adds a public-facing spatial nuance relative to the assembly. Since
    'before' already renders לִפְנֵי earlier in the verse, 'in front of' avoids awkward
    repetition while preserving the sense.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - the whole assembly of Israel
  - all the congregation of Israel
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' is clear modern English
    and suits a formal public gathering. 'All the assembly' closely reflects כָּל.
- source_word: וַיִּפְרֹשׂ
  chosen: spread out
  alternatives:
  - spread forth
  - stretched out
  lexicon: HALOT
  rationale: פרשׂ with hands conveys extending/spreading the hands in prayer. 'Spread
    out' is idiomatic and visually clear.
- source_word: כַּפָּיו
  chosen: his hands
  alternatives:
  - his palms
  lexicon: HALOT
  rationale: Though כף can specifically mean 'palm,' in this idiom with prayer gesture
    English normally uses 'hands.' This communicates the action naturally.
- source_word: הַשָּׁמָיִם
  chosen: heaven
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: In this prayer context, singular 'heaven' is idiomatic English for the
    direction of prayer. 'The heavens' is possible but less natural here; 'sky' would
    flatten the reverential sense.
