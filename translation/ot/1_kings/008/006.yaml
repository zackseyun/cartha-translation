id: 1KI.8.6
reference: 1 Kings 8:6
source:
  edition: WLC
  text: וַ/יָּבִ֣אוּ הַ֠/כֹּהֲנִים אֶת אֲר֨וֹן בְּרִית יְהוָ֧ה אֶל מְקוֹמ֛/וֹ אֶל דְּבִ֥יר הַ/בַּ֖יִת אֶל קֹ֣דֶשׁ הַ/קֳּדָשִׁ֑ים אֶל תַּ֖חַת כַּנְפֵ֥י הַ/כְּרוּבִֽים־־־־־־׃
translation:
  text: Then the priests brought the ark of the covenant of Yahweh to its place, into the inner sanctuary of the house, into the Most Holy Place, under the wings of the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy of Holies.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house'; here referring to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  chosen: Then ... brought
  alternatives:
  - and ... brought
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence; 'Then' conveys the forward-moving narrative sense in natural English without over-literal repetition of 'and.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun for the temple ministers handling the ark.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Construct chain preserved clearly in English. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: מְקוֹמוֹ
  chosen: its place
  alternatives:
  - its proper place
  lexicon: HALOT
  rationale: The suffix refers to the ark. 'Its place' is the plain sense and avoids adding 'proper,' which is interpretive though contextually implied.
- source_word: דְּבִיר
  chosen: the inner sanctuary
  alternatives:
  - the inner room
  - the shrine
  - the oracle
  lexicon: HALOT
  rationale: In temple context דְּבִיר denotes the innermost chamber. 'Inner sanctuary' is clear modern English and more transparent than the traditional but opaque 'oracle.'
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew literally says 'the house.' Retained here because the temple setting is already clear, and the phrase 'inner sanctuary of the house' remains understandable while staying close to the source.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the Holy of Holies
  - the holiest place
  lexicon: HALOT
  rationale: This superlative sacred-space expression is idiomatically rendered 'the Most Holy Place' in accessible modern English. 'Holy of Holies' is preserved as a lexical alternative worth noting.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Simple spatial preposition; 'under' is the most natural English equivalent.
- source_word: כַּנְפֵי הַכְּרוּבִים
  chosen: the wings of the cherubim
  alternatives:
  - the wings of the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the established English borrowing for the plural and best preserves the specific temple imagery. ''Wings'' is the literal sense of כַּנְפֵי.'
