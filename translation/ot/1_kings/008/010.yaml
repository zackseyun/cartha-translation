id: 1KI.8.10
reference: 1 Kings 8:10
source:
  edition: WLC
  text: וַ/יְהִ֕י בְּ/צֵ֥את הַ/כֹּהֲנִ֖ים מִן הַ/קֹּ֑דֶשׁ וְ/הֶ/עָנָ֥ן מָלֵ֖א אֶת בֵּ֥ית יְהוָֽה־־׃
translation:
  text: And when the priests came out from the holy place, the cloud filled the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sanctuary' or 'from the Holy Place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next narrative event. In English, 'And when' naturally carries the temporal transition without the wooden 'and it happened,' preserving narrative flow in optimal equivalence.
- source_word: בְּצֵאת
  chosen: came out
  alternatives:
  - went out
  - as ... went out
  lexicon: HALOT
  rationale: 'From יצא, the infinitive construct with prefixed ב marks the time of the action: ''when ... came out.'' ''Came out'' is idiomatic in English narrative and fits movement from the sanctuary into the larger temple area.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun; no contextual reason to vary.
- source_word: מִן־הַקֹּדֶשׁ
  chosen: from the holy place
  alternatives:
  - from the sanctuary
  - from the Holy Place
  lexicon: HALOT
  rationale: קֹדֶשׁ here refers to the sacred inner area from which the priests emerged after placing the ark. 'Holy place' is clear and sufficiently formal. Capitalized 'Holy Place' is possible as a technical term, and 'sanctuary' is also viable, but the Hebrew itself is simply 'the holy [place/space].'
- source_word: וְהֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun with waw conjunction. The conjunction is not separately represented because English style naturally moves from the temporal clause to the main clause without repeating 'and' before the subject.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  - was filling
  lexicon: HALOT
  rationale: Qal perfect 3ms from מלא with 'the cloud' as subject and 'the house of the LORD' as object. Simple past best matches the Hebrew narrative sequence.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' The main text preserves the concrete temple imagery with 'house.' Per doctrine, יְהוָה is rendered 'the LORD,' while 'Yahweh' is preserved as an alternative only in documentation, not main text.
