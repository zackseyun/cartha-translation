id: 1KI.8.58
reference: 1 Kings 8:58
source:
  edition: WLC
  text: לְ/הַטּ֥וֹת לְבָבֵ֖/נוּ אֵלָ֑י/ו לָ/לֶ֣כֶת בְּ/כָל דְּרָכָ֗י/ו וְ/לִ/שְׁמֹ֨ר
    מִצְוֺתָ֤י/ו וְ/חֻקָּי/ו֙ וּ/מִשְׁפָּטָ֔י/ו אֲשֶׁ֥ר צִוָּ֖ה אֶת אֲבֹתֵֽי/נוּ־־׃
translation:
  text: that he may incline our hearts to himself, to walk in all his ways and to
    keep his commandments, his statutes, and his judgments, which he commanded our
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew reads 'our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַטּוֹת
  chosen: incline
  alternatives:
  - turn
  - bend
  lexicon: HALOT
  rationale: The Hiphil infinitive of נטה here means to cause to turn or incline.
    'Incline' preserves the metaphor of directing the inner person without sounding
    unnatural in English.
- source_word: לְבָבֵנוּ
  chosen: our hearts
  alternatives:
  - our mind
  - our inner being
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner will, thought, and affections. 'Heart'
    is the standard biblical English equivalent and preserves the Hebrew anthropology.
- source_word: אֵלָיו
  chosen: to himself
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates direction toward God.
    'To himself' is idiomatic in English after 'incline our hearts' and makes the
    reflexive sense natural.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to live
  - to go
  lexicon: HALOT
  rationale: הלך in covenantal contexts often carries the metaphor of conduct. 'Walk'
    preserves the biblical idiom and fits the following phrase 'in all his ways.'
- source_word: בְּכָל דְּרָכָיו
  chosen: in all his ways
  alternatives:
  - according to all his ways
  - in every path he sets
  lexicon: HALOT
  rationale: A conventional covenantal expression for living according to God's manner
    and commands. 'In all his ways' is both literal and clear.
- source_word: וְלִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep or observe. 'Keep' is concise
    and standard in covenant language.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוָה refers to commanded obligations. 'Commandments' preserves the
    formal covenantal register appropriate here.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: חֹק/חֻקָּה often denotes prescribed enactments. 'Statutes' is a conventional
    and suitably precise rendering when paired with other legal terms.
- source_word: וּמִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgments, ordinances, or legal decisions. 'Judgments'
    preserves the legal nuance and maintains distinction from 'statutes' and 'commandments.'
- source_word: אֲשֶׁר צִוָּה
  chosen: which he commanded
  alternatives:
  - that he commanded
  - which he gave
  lexicon: HALOT
  rationale: The relative clause directly modifies the legal terms. 'Which he commanded'
    is straightforward and formally close to the Hebrew.
- source_word: אֶת אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: אָבוֹתֵינוּ is grammatically masculine and refers to the forefathers/ancestors
    of Israel. Per gender-accurate policy, 'our fathers' best matches the source,
    while 'our ancestors' is a possible interpretive alternative.
