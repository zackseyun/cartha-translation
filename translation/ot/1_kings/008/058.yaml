theological_decisions:
- issue: Rendering of covenant-law terminology in a triad
  chosen_reading: his commandments, his statutes, and his judgments
  alternative_readings:
  - his commands, his decrees, and his ordinances
  rationale: The Hebrew uses three distinct legal terms. Preserving the distinctions
    reflects the source text's covenantal texture rather than flattening them into
    near-synonyms.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Gendered ancestral reference
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew explicitly uses a masculine kinship term. In line with the
    gender-accurate policy, the translation retains 'fathers' rather than neutralizing
    it, while recognizing that the referent is Israel's forebears generally.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
