theological_decisions:
- issue: Directional prayer toward the temple
  chosen_reading: pray toward this place
  alternative_readings:
  - pray to this place
  rationale: The text describes prayer oriented toward the temple as the place of
    God's name, not prayer offered to the temple itself. Rendering אֶל here as 'toward'
    preserves the Hebrew sense and avoids implying idolatrous address to a location.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of תַעֲנֵם in context
  chosen_reading: you afflict them
  alternative_readings:
  - you answer them
  rationale: Within Solomon's covenantal logic, drought comes because of sin, and
    repentance follows divine chastening. Thus the clause most naturally means they
    turn from sin because God has afflicted/humbled them. This preserves the theological
    pattern of discipline leading to repentance without importing later doctrinal
    categories.
  doctrine_reference: Translation philosophy §1, §3, §5
