id: 1KI.8.35
reference: 1 Kings 8:35
source:
  edition: WLC
  text: בְּ/הֵעָצֵ֥ר שָׁמַ֛יִם וְ/לֹא יִהְיֶ֥ה מָטָ֖ר כִּ֣י יֶחֶטְאוּ לָ֑/ךְ וְ/הִֽתְפַּֽלְל֞וּ
    אֶל הַ/מָּק֤וֹם הַ/זֶּה֙ וְ/הוֹד֣וּ אֶת שְׁמֶ֔/ךָ וּ/מֵ/חַטָּאתָ֥/ם יְשׁוּב֖וּ/ן
    כִּ֥י תַעֲנֵֽ/ם־־־־׃
translation:
  text: When the heavens are shut up and there is no rain because they have sinned
    against you, and they pray toward this place and give thanks to your name and
    turn from their sin because you afflict them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praise your name' or 'confess your name'; the Hebrew verb can carry
      senses of thankful praise or open acknowledgment/confession depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'because you humble them.' The Hebrew verb may denote afflicting or humbling;
      some take it differently as 'answer them,' but the context of drought as discipline
      favors 'afflict/humble.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּהֵעָצֵר שָׁמַיִם
  chosen: When the heavens are shut up
  alternatives:
  - When the sky is restrained
  - When the heavens are closed
  lexicon: HALOT
  rationale: The Niphal infinitive construct of עצר with ב temporal gives a circumstantial/temporal
    sense, 'when ... are shut up/restrained.' 'Heavens' preserves the Hebrew plural
    שָׁמַיִם and biblical idiom better than 'sky.' 'Shut up' is natural English for
    withheld rain in covenant-judgment contexts.
- source_word: וְלֹא יִהְיֶה מָטָר
  chosen: and there is no rain
  alternatives:
  - and rain does not fall
  - and there will be no rain
  lexicon: HALOT
  rationale: The clause states the result of the heavens being shut. Present English
    'there is no rain' works idiomatically within the conditional prayer formula.
    A future rendering is possible, but the temporal force is governed by the opening
    'when.'
- source_word: כִּי יֶחֶטְאוּ לָךְ
  chosen: because they have sinned against you
  alternatives:
  - for they sin against you
  - because they sinned against you
  lexicon: HALOT
  rationale: כִּי here is causal. 'Against you' is required by לָךְ in this context
    of offense directed toward God. English present perfect fits the protasis describing
    the condition that has led to drought.
- source_word: וְהִתְפַּלְלוּ אֶל הַמָּקוֹם הַזֶּה
  chosen: and they pray toward this place
  alternatives:
  - and they pray to this place
  - and they pray in the direction of this place
  lexicon: HALOT
  rationale: אֶל with 'this place' in Solomon's temple prayer denotes orientation
    toward the temple, not prayer addressed to the place itself. 'Toward' avoids theological
    misunderstanding while remaining faithful to the directional preposition.
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  chosen: and give thanks to your name
  alternatives:
  - and confess your name
  - and praise your name
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean give thanks, praise, or confess. In this penitential-prayer
    context, thanksgiving/praise to God's name is the most natural English rendering,
    while still allowing the broader sense of acknowledgment. 'To your name' is slightly
    less idiomatic than 'your name' as object, so 'give thanks to your name' preserves
    the Hebrew relation.
- source_word: וּמֵחַטָּאתָם יְשׁוּבוּן
  chosen: and turn from their sin
  alternatives:
  - and turn back from their sin
  - and repent of their sin
  lexicon: HALOT
  rationale: שׁוּב with מִן expresses turning away from sin. 'Turn from their sin'
    is a transparent rendering; 'repent' is interpretive and slightly less formally
    tied to the Hebrew verb.
- source_word: כִּי תַעֲנֵם
  chosen: because you afflict them
  alternatives:
  - when you afflict them
  - for you answer them
  lexicon: HALOT
  rationale: The verb ענה in the Hiphil commonly means 'afflict/humble.' In context,
    the people's turning from sin is prompted by divine chastening through drought.
    Although the consonants could suggest 'answer,' the immediate logic favors 'afflict/humble
    them' rather than 'answer them' before the request for God to hear in the next
    verse.
