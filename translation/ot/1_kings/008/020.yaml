id: 1KI.8.20
reference: 1 Kings 8:20
source:
  edition: WLC
  text: וַ/יָּ֣קֶם יְהוָ֔ה אֶת דְּבָר֖/וֹ אֲשֶׁ֣ר דִּבֵּ֑ר וָ/אָקֻ֡ם תַּחַת֩ דָּוִ֨ד אָבִ֜/י וָ/אֵשֵׁ֣ב עַל כִּסֵּ֣א יִשְׂרָאֵ֗ל כַּֽ/אֲשֶׁר֙ דִּבֶּ֣ר יְהוָ֔ה וָ/אֶבְנֶ֣ה הַ/בַּ֔יִת לְ/שֵׁ֥ם יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And Yahweh has fulfilled his word that he spoke, and I have risen in the place of David my father and sit on the throne of Israel, just as Yahweh spoke, and I have built the house for the name of Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has established his word' or 'has carried out his word.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: has fulfilled
  alternatives:
  - has established
  - has carried out
  - has confirmed
  lexicon: HALOT
  rationale: The verb קום in the Hiphil with 'word' commonly means to establish or bring to fulfillment a spoken promise. In English, 'fulfilled' best conveys that the LORD has brought his spoken word to pass in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דְּבָרוֹ אֲשֶׁר דִּבֵּר
  chosen: his word that he spoke
  alternatives:
  - the promise he made
  - what he said
  lexicon: HALOT
  rationale: Retains the Hebrew emphasis on the spoken word without over-paraphrasing to 'promise,' though promise is implied by context.
- source_word: וָאָקֻם
  chosen: I have arisen
  alternatives:
  - I arose
  - I have taken my place
  - I have succeeded
  lexicon: HALOT
  rationale: Keeps the verbal link with the earlier קום ('fulfilled/established') and preserves the sense of rising to succeed David. Present perfect English fits the speech context describing a present state resulting from past action.
- source_word: תַּחַת דָּוִד אָבִי
  chosen: in the place of David my father
  alternatives:
  - instead of David my father
  - after David my father
  lexicon: HALOT
  rationale: תחת here indicates succession in place of another. 'In the place of' is natural English and preserves the dynastic succession sense without implying hostility.
- source_word: וָאֵשֵׁב עַל כִּסֵּא יִשְׂרָאֵל
  chosen: and sit on the throne of Israel
  alternatives:
  - and have sat on the throne of Israel
  - and am seated on the throne of Israel
  lexicon: HALOT
  rationale: The verb ישב with throne denotes enthronement/reigning. 'Sit on the throne' is a clear, idiomatic rendering close to the Hebrew. Present tense works in English as a royal present within the speech.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD spoke
  alternatives:
  - as the LORD said
  - just as the LORD promised
  lexicon: HALOT
  rationale: Maintains consistency with the repeated דבר language in the verse. 'Spoke' preserves the lexical repetition better than 'promised,' though the promissory force is understood.
- source_word: וָאֶבְנֶה הַבַּיִת
  chosen: and I have built the house
  alternatives:
  - and I built the house
  - and I have built the temple
  lexicon: HALOT
  rationale: הבית literally means 'the house.' In this context it refers to the temple, but 'house' preserves the Hebrew wording and its theological resonance as the LORD's house.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - for the LORD's name
  - in honor of the LORD
  lexicon: HALOT
  rationale: Preserves the important biblical expression 'for the name of,' which carries covenantal and theological significance beyond mere honor language.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard and direct rendering of the covenant title.
