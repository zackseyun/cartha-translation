id: 1KI.8.24
reference: 1 Kings 8:24
source:
  edition: WLC
  text: אֲשֶׁ֣ר שָׁמַ֗רְתָּ לְ/עַבְדְּ/ךָ֙ דָּוִ֣ד אָבִ֔/י אֵ֥ת אֲשֶׁר דִּבַּ֖רְתָּ
    ל֑/וֹ וַ/תְּדַבֵּ֥ר בְּ/פִ֛י/ךָ וּ/בְ/יָדְ/ךָ֥ מִלֵּ֖אתָ כַּ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: who have kept for your servant David my father what you spoke to him; you
    spoke with your mouth, and with your hand you have fulfilled it, as it is this
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your servant David my father.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you spoke with your mouth, and with your hand you fulfilled it'—a
      vivid way of saying that what God said, he also accomplished.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַרְתָּ
  chosen: have kept
  alternatives:
  - have fulfilled
  - have observed
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' Here it refers to God keeping
    a promise previously spoken to David. 'Have kept' preserves the verbal distinction
    from מִלֵּאתָ later in the verse, which more specifically conveys bringing to
    fulfillment.
- source_word: לְעַבְדְּךָ
  chosen: for your servant
  alternatives:
  - to your servant
  lexicon: HALOT
  rationale: The preposition ל with עבד can be rendered 'to' or 'for.' 'For your servant'
    fits the idiom of keeping what was promised on behalf of David, while retaining
    the humble covenantal designation 'servant.'
- source_word: דָּוִד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both orders are natural in English. 'David my father' stays closer to
    the Hebrew sequence while remaining readable.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  chosen: what you spoke to him
  alternatives:
  - that which you promised him
  - what you said to him
  lexicon: HALOT
  rationale: The Hebrew says literally 'what you spoke to him.' 'Spoke' is retained
    rather than 'promised' so the verse can then intensify the same speech-act with
    'you spoke with your mouth' and 'with your hand you fulfilled it.'
- source_word: וַתְּדַבֵּר בְּפִיךָ
  chosen: you spoke with your mouth
  alternatives:
  - you have spoken with your mouth
  - you said it with your mouth
  lexicon: HALOT
  rationale: This expression is rhetorically emphatic. Retaining 'with your mouth'
    preserves the Hebrew parallelism between divine speech and divine action.
- source_word: וּבְיָדְךָ מִלֵּאתָ
  chosen: and with your hand you have fulfilled it
  alternatives:
  - and by your hand you have fulfilled it
  - and with your hand you have carried it out
  lexicon: HALOT
  rationale: 'The idiom contrasts God''s mouth and hand: what he said, he enacted.
    ''Fulfilled'' captures מלא in the sense of bringing a word or promise to completion.
    ''With your hand'' preserves the anthropomorphic metaphor.'
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as at this day
  - as is evident today
  lexicon: HALOT
  rationale: This common Hebrew idiom points to present, observable fulfillment. 'As
    it is this day' is clear modern English while staying close to the source.
