theological_decisions:
- issue: Anthropomorphic language for God ('mouth' and 'hand')
  chosen_reading: Retain the concrete anthropomorphic expressions in the main text.
  alternative_readings:
  - Paraphrase as 'you promised and you accomplished'
  rationale: The Hebrew intentionally pairs divine speech and action in embodied imagery.
    Preserving the imagery avoids flattening the rhetoric and does not imply a denial
    of God's transcendence; it reflects the text's own mode of speaking about God.
  doctrine_reference: Translation philosophy §1, §3, §6
