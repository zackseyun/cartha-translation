id: 1KI.8.5
reference: 1 Kings 8:5
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה וְ/כָל עֲדַ֤ת יִשְׂרָאֵל֙ הַ/נּוֹעָדִ֣ים עָלָ֔י/ו
    אִתּ֖/וֹ לִ/פְנֵ֣י הָֽ/אָר֑וֹן מְזַבְּחִים֙ צֹ֣אן וּ/בָקָ֔ר אֲשֶׁ֧ר לֹֽא יִסָּפְר֛וּ
    וְ/לֹ֥א יִמָּנ֖וּ מֵ/רֹֽב־־׃
translation:
  text: And King Solomon, and all the assembly of Israel who had gathered to him,
    were with him before the ark, sacrificing sheep and cattle that could not be counted
    or numbered because of their great number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who had assembled before him." The Hebrew expression may emphasize the
      people convened in relation to Solomon.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדַת
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: HALOT
  rationale: '"Assembly" fits the gathered national body in a public cultic setting
    without importing later ecclesial associations that "congregation" may carry in
    English.'
- source_word: הַנּוֹעָדִים עָלָיו
  chosen: who had gathered to him
  alternatives:
  - who had assembled before him
  - who met with him
  lexicon: HALOT
  rationale: The Niphal participle of יעד here denotes those convened or assembled
    in relation to Solomon. "Gathered to him" preserves the directional sense of עָלָיו
    in context and reads naturally in English.
- source_word: אִתּוֹ
  chosen: were with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: Though verbless in Hebrew, English requires a finite verb. "Were with
    him" makes explicit the predicative relation and preserves the sense that the
    assembly accompanied Solomon.
- source_word: לִפְנֵי הָאָרוֹן
  chosen: before the ark
  alternatives:
  - in front of the ark
  - before the chest
  lexicon: HALOT
  rationale: '"Before the ark" is the standard and natural rendering for the cultic
    spatial phrase. "Ark" is the established equivalent for אָרוֹן in this context.'
- source_word: מְזַבְּחִים
  chosen: sacrificing
  alternatives:
  - offering sacrifices
  - slaughtering as sacrifices
  lexicon: HALOT
  rationale: The participle indicates ongoing sacrificial action. "Sacrificing" is
    concise and adequately conveys ritual offering in context.
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  - small livestock and cattle
  lexicon: HALOT
  rationale: '"Sheep and cattle" gives a clear, idiomatic rendering of the two animal
    classes in sacrificial context. "Flocks and herds" is broader and less concrete
    here.'
- source_word: אֲשֶׁר לֹא יִסָּפְרוּ וְלֹא יִמָּנוּ
  chosen: that could not be counted or numbered
  alternatives:
  - which could not be counted
  - too many to count
  lexicon: HALOT
  rationale: The paired verbs intensify innumerability. Rendering both as "counted
    or numbered" preserves the Hebrew rhetorical fullness better than collapsing them
    into a single English expression.
- source_word: מֵרֹב
  chosen: because of their great number
  alternatives:
  - from abundance
  - because there were so many
  lexicon: HALOT
  rationale: This expresses the reason the animals were beyond counting. "Because
    of their great number" is natural English and preserves the causal force of מִן.
