theological_decisions:
- issue: Reference of "the ark"
  chosen_reading: Rendered simply as "the ark" without expanding to "the ark of the
    covenant."
  alternative_readings:
  - the ark of the covenant
  rationale: The Hebrew text in this verse has only "the ark." Expanding the phrase
    would import information from the broader context rather than translate the wording
    actually present.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
