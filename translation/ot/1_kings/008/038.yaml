theological_decisions:
- issue: Rendering of הָאָדָם in a representative singular context
  chosen_reading: man
  alternative_readings:
  - person
  - humankind
  rationale: The Hebrew is singular and representative, contrasted with the collective
    'all your people Israel.' Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language when the source uses masculine/generic
    singular. Inclusivity is preserved by the context ('or by all your people Israel'),
    but the singular form is retained in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Whether to render הַבַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: Although the referent is the temple, the Hebrew explicitly says 'house.'
    Retaining 'house' preserves the source wording and the theological resonance of
    the temple as the LORD's house without obscuring meaning in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
