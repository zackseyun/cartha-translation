id: 1KI.8.38
reference: 1 Kings 8:38
source:
  edition: WLC
  text: כָּל תְּפִלָּ֣ה כָל תְּחִנָּ֗ה אֲשֶׁ֤ר תִֽהְיֶה֙ לְ/כָל הָ֣/אָדָ֔ם לְ/כֹ֖ל
    עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל אֲשֶׁ֣ר יֵדְע֗וּ/ן אִ֚ישׁ נֶ֣גַע לְבָב֔/וֹ וּ/פָרַ֥שׂ כַּפָּ֖י/ו
    אֶל הַ/בַּ֥יִת הַ/זֶּֽה־־־־׃
translation:
  text: whatever prayer, whatever plea, may be made by any man or by all your people
    Israel, each knowing the affliction of his own heart and spreading out his hands
    toward this house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by any person' / 'for any man'; the Hebrew construction with 'to/for'
      can be understood in more than one way here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the plague of his heart.'
    reason: lexical_alternative
  - marker: c
    text: That is, the temple, here called 'this house.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּל תְּפִלָּה
  chosen: whatever prayer
  alternatives:
  - every prayer
  - any prayer
  lexicon: HALOT
  rationale: כָּל with an indefinite following clause ('which may be') is best carried
    into idiomatic English as 'whatever prayer,' preserving the comprehensive scope
    without sounding wooden.
- source_word: כָל תְּחִנָּה
  chosen: whatever plea
  alternatives:
  - every supplication
  - any plea for favor
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest entreaty or supplication. 'Plea' is readable
    modern English and preserves the intensified nuance alongside 'prayer.' 'Supplication'
    is possible but less natural.
- source_word: אֲשֶׁר תִהְיֶה
  chosen: may be made
  alternatives:
  - that may be
  - which may occur
  lexicon: HALOT
  rationale: The clause introduces any instance of prayer/plea. English idiom commonly
    supplies 'made' with prayer language; this is a light contextual completion rather
    than paraphrase.
- source_word: לְכָל הָאָדָם
  chosen: by any man
  alternatives:
  - for any man
  - by any person
  - for any person
  lexicon: HALOT
  rationale: The preposition ל can mark relation or possession here in a context of
    prayer belonging to or offered by someone. Given the following parallel 'or by
    all your people Israel' and the subsequent singular subject ('each knowing...
    and spreading out his hands'), 'by any man' best fits the syntax. 'Man' follows
    the doctrine's gender-accurate policy for אָדָם in a representative singular context.
- source_word: לְכֹל עַמְּךָ יִשְׂרָאֵל
  chosen: or by all your people Israel
  alternatives:
  - or for all your people Israel
  - or by all your people, Israel
  lexicon: HALOT
  rationale: This phrase is parallel to לְכָל הָאָדָם and broadens from the individual
    to the covenant people collectively. 'Your people Israel' is the standard covenantal
    expression; 'by' matches the chosen construal of the previous phrase.
- source_word: אֲשֶׁר יֵדְעוּן אִישׁ
  chosen: each knowing
  alternatives:
  - when each knows
  - since each knows
  - who each know
  lexicon: HALOT
  rationale: The relative clause shifts to the condition of the pray-er(s). Rendering
    אִישׁ distributively as 'each' captures the singular-individual force within the
    collective frame.
- source_word: נֶגַע לְבָבוֹ
  chosen: the affliction of his own heart
  alternatives:
  - the plague of his heart
  - the stroke of his heart
  - the wound of his heart
  lexicon: HALOT
  rationale: נֶגַע literally can mean 'plague' or 'affliction/strike.' In this introspective
    context, 'affliction' communicates inner distress or burden more naturally in
    modern English while preserving the metaphor of a personal inward blow. 'His own
    heart' makes explicit the reflexive sense.
- source_word: וּפָרַשׂ כַּפָּיו
  chosen: and spreading out his hands
  alternatives:
  - and spreads out his hands
  - and stretches out his palms
  lexicon: HALOT
  rationale: The verb denotes extending/spreading the hands in prayer. 'Spreading
    out his hands' is idiomatic and preserves the prayer gesture.
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - to this house
  - toward this temple
  lexicon: HALOT
  rationale: בַּיִת here refers to the temple building just dedicated. 'House' preserves
    the Hebrew term and its covenantal resonance ('house' of the LORD), while 'toward'
    fits the directional sense of אֶל in prayer orientation.
