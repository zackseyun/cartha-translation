id: 1KI.8.28
reference: 1 Kings 8:28
source:
  edition: WLC
  text: וּ/פָנִ֜יתָ אֶל תְּפִלַּ֧ת עַבְדְּ/ךָ֛ וְ/אֶל תְּחִנָּת֖/וֹ יְהוָ֣ה אֱלֹהָ֑/י לִ/שְׁמֹ֤עַ אֶל הָֽ/רִנָּה֙ וְ/אֶל הַ/תְּפִלָּ֔ה אֲשֶׁ֧ר עַבְדְּ/ךָ֛ מִתְפַּלֵּ֥ל לְ/פָנֶ֖י/ךָ הַ/יּֽוֹם־־־־׃
translation:
  text: Yet turn toward the prayer of your servant and to his plea for favor, O Yahweh my God, to hear the cry and the prayer that your servant is praying before you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his supplication.' The Hebrew term denotes an earnest plea for mercy or favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ringing cry.' The Hebrew word can refer to a loud cry or shout; here it is best understood as a cry to God in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתָ
  chosen: Yet turn toward
  alternatives:
  - and turn
  - have regard to
  - pay attention to
  lexicon: HALOT
  rationale: The verb פנה literally means 'turn' or 'turn toward.' In prayer context it idiomatically asks God to attend or regard. 'Turn toward' preserves the concrete Hebrew image while remaining natural English. 'Yet' reflects the conjunction in context as a mild adversative/continuative after Solomon's acknowledgment of God's transcendence in the previous verse.
- source_word: תְּפִלַּת
  chosen: the prayer
  alternatives:
  - the prayer request
  lexicon: HALOT
  rationale: Standard rendering of תפלה. Here it refers to Solomon's formal prayer, so 'prayer' is the most direct and natural equivalent.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in royal and covenant address to God it commonly expresses humble service rather than emphasizing bonded status. 'Your servant' is the best contextual rendering and is repeated consistently for both occurrences.
- source_word: תְּחִנָּתוֹ
  chosen: his plea for favor
  alternatives:
  - his supplication
  - his plea
  - his entreaty
  lexicon: HALOT
  rationale: תחנה denotes an earnest plea for mercy or favor. 'Plea for favor' makes the nuance accessible in modern English better than the more traditional but less common 'supplication.' The 3ms suffix refers to Solomon speaking of himself in the third person as 'your servant.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive rendering in direct address.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: שמע commonly means 'hear' or 'listen.' 'To hear' fits the infinitive of purpose after the request that God turn toward the prayer.
- source_word: הָרִנָּה
  chosen: the cry
  alternatives:
  - the plea
  - the ringing cry
  - the song
  lexicon: HALOT
  rationale: רנה can denote a ringing cry, shout, or joyful cry depending on context. In parallel with prayer and supplication here, it refers to an urgent vocal cry to God rather than singing; 'the cry' is concise and contextually apt.
- source_word: הַתְּפִלָּה
  chosen: the prayer
  lexicon: HALOT
  rationale: The repetition of תפלה is preserved in English to reflect the Hebrew parallelism rather than varying style unnecessarily.
- source_word: מִתְפַּלֵּל
  chosen: is praying
  alternatives:
  - prays
  lexicon: HALOT
  rationale: The participle expresses ongoing action; 'is praying' captures the present, durative sense better than a simple English present.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Literal and idiomatic in prayer context.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English and preserves the temporal reference.'
