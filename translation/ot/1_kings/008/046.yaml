theological_decisions:
- issue: Generic use of אָדָם
  chosen_reading: man
  alternative_readings:
  - human
  - one
  rationale: The Hebrew uses singular אָדָם generically for humanity. Following the
    project's gender-accurate policy, 'man' is retained in the main text because it
    matches the representative singular form of the source; an inclusive equivalent
    is preserved in a footnote for clarity.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
