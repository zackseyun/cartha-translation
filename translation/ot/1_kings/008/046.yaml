id: 1KI.8.46
reference: 1 Kings 8:46
source:
  edition: WLC
  text: כִּ֣י יֶֽחֶטְאוּ לָ֗/ךְ כִּ֣י אֵ֤ין אָדָם֙ אֲשֶׁ֣ר לֹא יֶחֱטָ֔א וְ/אָנַפְתָּ֣
    בָ֔/ם וּ/נְתַתָּ֖/ם לִ/פְנֵ֣י אוֹיֵ֑ב וְ/שָׁב֤וּ/ם שֹֽׁבֵי/הֶם֙ אֶל אֶ֣רֶץ הָ/אוֹיֵ֔ב
    רְחוֹקָ֖ה א֥וֹ קְרוֹבָֽה־־־׃
translation:
  text: When they sin against you—for there is no man who does not sin—and you become
    angry with them and give them over to an enemy, and their captors carry them away
    to the land of the enemy, whether far away or near,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is no human who does not sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: The opening כִּי introduces a conditional scenario within Solomon's prayer.
    English 'When' fits the discourse flow better than 'If' here, while still preserving
    the conditional sense.
- source_word: יֶחֶטְאוּ לָךְ
  chosen: they sin against you
  alternatives:
  - they sin to you
  lexicon: HALOT
  rationale: חטא with ל can denote sin committed against someone; 'against you' is
    idiomatic and reflects the relational offense against God.
- source_word: אֵין אָדָם אֲשֶׁר לֹא יֶחֱטָא
  chosen: there is no man who does not sin
  alternatives:
  - there is no human who does not sin
  - there is no one who does not sin
  lexicon: HALOT
  rationale: This preserves the Hebrew structure closely. Per doctrine, אָדָם is rendered
    gender-accurately; here 'man' carries representative/generic force for humanity.
    A more inclusive alternative is preserved in a footnote.
- source_word: וְאָנַפְתָּ בָם
  chosen: and you become angry with them
  alternatives:
  - and you are angry with them
  - and you are enraged against them
  lexicon: HALOT
  rationale: The verb conveys divine anger. 'Become angry' reflects the sequential
    narrative force in English without overstating the intensity.
- source_word: וּנְתַתָּם לִפְנֵי אוֹיֵב
  chosen: and give them over to an enemy
  alternatives:
  - and deliver them before an enemy
  - and hand them over to the enemy
  lexicon: HALOT
  rationale: '''Give them over'' is natural modern English for נתן + לפני in this
    hostile context, conveying surrender into enemy power.'
- source_word: אוֹיֵב
  chosen: an enemy
  alternatives:
  - the enemy
  lexicon: HALOT
  rationale: The noun is formally singular without article here, so 'an enemy' best
    reflects the Hebrew at this point; the later phrase with article is rendered 'the
    enemy.'
- source_word: וְשָׁבוּם שֹׁבֵיהֶם
  chosen: and their captors carry them away
  alternatives:
  - and their captors take them captive
  - and those who capture them carry them off
  lexicon: HALOT
  rationale: The construction uses the captors as subject and the captives as object,
    describing deportation. 'Carry them away' communicates the exile context clearly
    and avoids awkward repetition of 'captive/captors.'
- source_word: אֶל אֶרֶץ הָאוֹיֵב
  chosen: to the land of the enemy
  alternatives:
  - to the enemy's land
  - to the land of the foe
  lexicon: HALOT
  rationale: This is a straightforward formal rendering of the construct-like phrase
    in context, preserving the article on 'enemy' here.
- source_word: רְחוֹקָה אוֹ קְרוֹבָה
  chosen: whether far away or near
  alternatives:
  - far or near
  lexicon: HALOT
  rationale: The feminine adjectives agree with 'land.' 'Whether far away or near'
    reads naturally in English while preserving the contrast.
