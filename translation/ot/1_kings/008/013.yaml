id: 1KI.8.13
reference: 1 Kings 8:13
source:
  edition: WLC
  text: בָּנֹ֥ה בָנִ֛יתִי בֵּ֥ית זְבֻ֖ל לָ֑/ךְ מָכ֥וֹן לְ/שִׁבְתְּ/ךָ֖ עוֹלָמִֽים׃
translation:
  text: I have indeed built you an exalted house, a settled place for you to dwell
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lofty/majestic dwelling.' The Hebrew זְבֻל refers to an exalted abode.
    reason: lexical_alternative
  - marker: b
    text: Or 'a fixed place for your dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנֹה בָנִיתִי
  chosen: I have indeed built
  alternatives:
  - I have surely built
  - I have built, yes built
  lexicon: HALOT
  rationale: The infinitive absolute before the finite verb intensifies the action.
    'Indeed' conveys the emphatic force in natural English without awkward repetition.
- source_word: בֵּית
  chosen: house
  alternatives:
  - temple
  lexicon: HALOT
  rationale: Literally 'house.' Although the referent is the temple, 'house' preserves
    the Hebrew expression and its theological resonance as God's house.
- source_word: זְבֻל
  chosen: exalted
  alternatives:
  - lofty
  - majestic
  - dwelling
  lexicon: HALOT
  rationale: The noun can denote a lofty or exalted abode. Rendering it adjectivally
    with 'house' gives the sense of a lofty, fitting habitation while avoiding an
    overly opaque transliteration or a redundant 'house of dwelling.'
- source_word: לָךְ
  chosen: you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks benefit/direction. In English, 'built you an exalted
    house' is idiomatic and preserves the personal address to God.
- source_word: מָכוֹן
  chosen: a settled place
  alternatives:
  - a fixed place
  - an established place
  - a dwelling place
  lexicon: HALOT
  rationale: The term denotes an established or fixed place. 'Settled place' communicates
    stability and permanence in readable English, while the following infinitive supplies
    the dwelling nuance.
- source_word: לְשִׁבְתְּךָ
  chosen: for you to dwell
  alternatives:
  - for your dwelling
  - for your sitting/enthronement
  lexicon: HALOT
  rationale: From ישׁב, commonly 'to sit, dwell.' In temple context it can imply enthronement,
    but 'to dwell' is the clearest English rendering here and matches the house imagery.
- source_word: עוֹלָמִים
  chosen: forever
  alternatives:
  - for ages
  - for evermore
  - perpetually
  lexicon: HALOT
  rationale: The plural form intensifies duration. 'Forever' is natural modern English
    and adequately conveys enduring permanence without archaic phrasing.
