theological_decisions:
- issue: Whether to render the temple as God's literal permanent residence in a way
    that overstates the theology of divine presence
  chosen_reading: Retain the language of dwelling without qualifying it away
  alternative_readings:
  - Paraphrase to 'a place for your name to dwell'
  - Paraphrase to 'a place where you may be worshiped'
  rationale: The Hebrew explicitly speaks of a house and a place for God to dwell.
    The translation should preserve that covenantal temple language and not import
    later interpretive qualifications from the broader context into this verse itself.
  doctrine_reference: Translation philosophy §1, §3
