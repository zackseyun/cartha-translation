id: 1KI.8.66
reference: 1 Kings 8:66
source:
  edition: WLC
  text: בַּ/יּ֤וֹם הַ/שְּׁמִינִי֙ שִׁלַּ֣ח אֶת הָ/עָ֔ם וַֽ/יְבָרֲכ֖וּ אֶת הַ/מֶּ֑לֶךְ וַ/יֵּלְכ֣וּ לְ/אָהֳלֵי/הֶ֗ם שְׂמֵחִים֙ וְ/ט֣וֹבֵי לֵ֔ב עַ֣ל כָּל הַ/טּוֹבָ֗ה אֲשֶׁ֨ר עָשָׂ֤ה יְהוָה֙ לְ/דָוִ֣ד עַבְדּ֔/וֹ וּ/לְ/יִשְׂרָאֵ֖ל עַמּֽ/וֹ־־־׃
translation:
  text: On the eighth day he sent the people away, and they blessed the king and went to their tents, rejoicing and glad of heart because of all the good that Yahweh had done for David his servant and for Israel his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their homes'; literally 'to their tents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: On the eighth day
  alternatives:
  - On the eighth day of the festival
  lexicon: HALOT
  rationale: Temporal phrase rendered straightforwardly. 'Of the festival' is contextually inferable from the surrounding narrative but not explicit in this verse, so it is not added to the main text.
- source_word: שִׁלַּח אֶת הָעָם
  chosen: he sent the people away
  alternatives:
  - he dismissed the people
  - he sent off the people
  lexicon: HALOT
  rationale: The piel of שלח here denotes dismissal/departure authorization. 'Sent ... away' is natural English and preserves the causative sense without overformal wording.
- source_word: וַיְבָרֲכוּ אֶת הַמֶּלֶךְ
  chosen: they blessed the king
  alternatives:
  - they bid the king farewell
  - they thanked the king
  lexicon: HALOT
  rationale: ברך normally means 'bless.' In context it may include a farewell greeting, but 'blessed' best preserves the lexical form and the public act of invoking good upon the king.
- source_word: לְאָהֳלֵיהֶם
  chosen: to their tents
  alternatives:
  - to their homes
  lexicon: HALOT
  rationale: The Hebrew literally says 'to their tents.' Although idiomatically it can mean returning home, the literal image is retained in the main text for transparency, with the idiomatic alternative preserved in a footnote.
- source_word: שְׂמֵחִים
  chosen: rejoicing
  alternatives:
  - joyful
  - glad
  lexicon: HALOT
  rationale: A participial/adjectival form describing their manner of departure. 'Rejoicing' conveys active joy and reads smoothly with the following phrase.
- source_word: וְטוֹבֵי לֵב
  chosen: glad of heart
  alternatives:
  - with good hearts
  - cheerful
  - merry of heart
  lexicon: HALOT
  rationale: Hebrew idiom for inward gladness or cheer. 'Glad of heart' preserves the heart-language while remaining readable modern English.
- source_word: עַל כָּל הַטּוֹבָה
  chosen: because of all the good
  alternatives:
  - for all the goodness
  - over all the good things
  lexicon: HALOT
  rationale: The preposition marks the reason for their joy. 'All the good' is broad enough to include both beneficent acts and blessings received.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְדָוִד עַבְדּוֹ
  chosen: for David his servant
  alternatives:
  - for David his slave
  lexicon: HALOT
  rationale: עבד can denote servant/slave, but in royal-covenantal language for David, 'servant' is the established and contextually fitting rendering in English without importing chattel-slavery connotations.
- source_word: וּלְיִשְׂרָאֵל עַמּוֹ
  chosen: and for Israel his people
  alternatives:
  - and for Israel, his people
  lexicon: HALOT
  rationale: Simple covenantal designation. The appositional relationship is preserved directly.
