theological_decisions:
- issue: Rendering the idiom שִׁמְךָ נִקְרָא עַל הַבַּיִת הַזֶּה
  chosen_reading: your name is called upon this house
  alternative_readings:
  - this house bears your name
  - your name is proclaimed over this house
  rationale: The Hebrew idiom signals divine ownership/association with the temple.
    A more idiomatic English rendering like 'bears your name' is possible, but the
    main text preserves the biblical expression more transparently while allowing
    readers to infer the theological idea from the idiom.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
- issue: Rendering ירא as 'fear' rather than a softened equivalent
  chosen_reading: to fear you
  alternative_readings:
  - to revere you
  rationale: The verse speaks of the nations coming to know God's name in a way analogous
    to Israel's covenantal response. 'Fear' preserves the biblical tension of awe,
    reverence, and holy dread without reducing it to mere respect.
  doctrine_reference: 'Translation philosophy #3, #5'
