id: 1KI.8.43
reference: 1 Kings 8:43
source:
  edition: WLC
  text: אַתָּ֞ה תִּשְׁמַ֤ע הַ/שָּׁמַ֨יִם֙ מְכ֣וֹן שִׁבְתֶּ֔/ךָ וְ/עָשִׂ֕יתָ כְּ/כֹ֛ל
    אֲשֶׁר יִקְרָ֥א אֵלֶ֖י/ךָ הַ/נָּכְרִ֑י לְמַ֣עַן יֵדְעוּ/ן֩ כָּל עַמֵּ֨י הָ/אָ֜רֶץ
    אֶת שְׁמֶ֗/ךָ לְ/יִרְאָ֤ה אֹֽתְ/ךָ֙ כְּ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל וְ/לָ/דַ֕עַת כִּי
    שִׁמְ/ךָ֣ נִקְרָ֔א עַל הַ/בַּ֥יִת הַ/זֶּ֖ה אֲשֶׁ֥ר בָּנִֽיתִי־־־־־׃
translation:
  text: may you hear in heaven, the place where you dwell, and do according to all
    that the foreigner calls to you for, so that all the peoples of the earth may
    know your name, to fear you as your people Israel do, and to know that your name
    is called upon this house that I have built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calls on you for' or 'cries out to you for.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your name is called upon this house,' an idiom meaning the house
      belongs to you or bears your name.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: may you hear
  alternatives:
  - you shall hear
  - hear
  lexicon: HALOT
  rationale: 'Though morphologically imperfect 2ms, in this prayer context it functions
    jussively/wishfully: Solomon petitions God. ''May you hear'' best reflects the
    volitional force in natural English.'
- source_word: הַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - from heaven
  - the heavens
  lexicon: HALOT
  rationale: With the following apposition 'the place where you dwell,' the phrase
    denotes God's heavenly dwelling. 'In heaven' is idiomatic and fits the Hebrew
    sequence without over-literalizing.
- source_word: מְכוֹן שִׁבְתֶּךָ
  chosen: the place where you dwell
  alternatives:
  - your dwelling place
  - the established place of your dwelling
  lexicon: HALOT
  rationale: מָכוֹן can mean fixed place/dwelling place. The construct with 'your
    dwelling' is rendered smoothly as an appositional phrase. This preserves the sense
    without archaic stiffness.
- source_word: וְעָשִׂיתָ
  chosen: and do
  alternatives:
  - and act
  - and accomplish
  lexicon: HALOT
  rationale: A broad verb here referring to God's responsive action to prayer. 'Do'
    keeps the open-ended scope of the Hebrew and matches the following 'according
    to all that...'.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - according to everything that
  - just as all that
  lexicon: HALOT
  rationale: This is a standard comparative-totalizing expression. 'According to all
    that' is clear and fairly formal.
- source_word: יִקְרָא אֵלֶיךָ
  chosen: calls to you for
  alternatives:
  - cries out to you for
  - calls on you for
  - prays to you for
  lexicon: HALOT
  rationale: קרא אל often means call out to someone, especially in prayer. Adding
    'for' reflects the object/request implied by the context of petition without paraphrasing
    beyond the syntax.
- source_word: הַנָּכְרִי
  chosen: the foreigner
  alternatives:
  - the stranger
  - the foreign man
  - the alien
  lexicon: HALOT
  rationale: נכרי denotes one from another people, not merely an unfamiliar individual.
    'Foreigner' is the clearest modern English equivalent in this temple-prayer context.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: יֵדְעוּן
  chosen: may know
  alternatives:
  - will know
  - might know
  lexicon: HALOT
  rationale: In the purpose clause after לְמַעַן, the imperfect expresses intended
    result. 'May know' fits the prayerful, purposive sense.
- source_word: כָּל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  - all the nations of the earth
  lexicon: HALOT
  rationale: עמים is 'peoples,' emphasizing ethnic/national groups. 'Earth' is preferable
    here because the scope is universal, not merely local territory.
- source_word: אֶת שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: In biblical idiom, 'name' carries reputation/identity/renown, but the
    concrete expression should be preserved in the main text.
- source_word: לְיִרְאָה אֹתְךָ
  chosen: to fear you
  alternatives:
  - and fear you
  - to revere you
  lexicon: HALOT
  rationale: ירא in covenantal contexts includes reverence and awe, but 'fear' is
    the standard and should be retained to preserve theological texture. 'Revere'
    is interpretive and softer.
- source_word: כְּעַמְּךָ יִשְׂרָאֵל
  chosen: as your people Israel do
  alternatives:
  - like your people Israel
  - as your people Israel
  lexicon: HALOT
  rationale: The comparison is between the nations' fear of God and Israel's. English
    requires a verb for smoothness; 'do' is implied from the infinitive 'to fear you'
    and clarifies the comparison.
- source_word: וְלָדַעַת
  chosen: and to know
  alternatives:
  - and may know
  - so that they may know
  lexicon: HALOT
  rationale: A second purpose infinitive coordinated with 'to fear you.' Rendering
    it as infinitival keeps the Hebrew structure visible.
- source_word: כִּי שִׁמְךָ נִקְרָא עַל
  chosen: that your name is called upon
  alternatives:
  - that your name is proclaimed over
  - that this house bears your name
  - that your name is invoked over
  lexicon: HALOT
  rationale: The idiom נקרא על means to have someone's name called over/on something,
    indicating ownership, dedication, or association. 'Is called upon' preserves the
    Hebrew idiom more transparently than the smoother but more interpretive 'bears
    your name'.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Though it refers to the temple, בַּיִת is literally 'house.' Given the
    temple context is obvious, 'house' preserves the Hebrew metaphor and cultic diction.
- source_word: אֲשֶׁר בָּנִיתִי
  chosen: that I have built
  alternatives:
  - which I built
  lexicon: HALOT
  rationale: The perfect is naturally rendered in English as present perfect here,
    highlighting the completed building now standing before God.
