id: 1KI.8.9
reference: 1 Kings 8:9
source:
  edition: WLC
  text: אֵ֚ין בָּֽ/אָר֔וֹן רַ֗ק שְׁנֵי֙ לֻח֣וֹת הָ/אֲבָנִ֔ים אֲשֶׁ֨ר הִנִּ֥חַ שָׁ֛ם
    מֹשֶׁ֖ה בְּ/חֹרֵ֑ב אֲשֶׁ֨ר כָּרַ֤ת יְהוָה֙ עִם בְּנֵ֣י יִשְׂרָאֵ֔ל בְּ/צֵאתָ֖/ם
    מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: There was nothing in the ark except the two stone tablets that Moses had placed
    there at Horeb, where the LORD made a covenant with the sons of Israel when they
    came out from the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two tablets of stone.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'cut' a covenant; the idiom means 'made a covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There was nothing
  alternatives:
  - there was not
  - nothing was
  lexicon: HALOT
  rationale: Existential negation introducing the clause; idiomatic English is best
    expressed as 'There was nothing' rather than a wooden 'There was not.'
- source_word: בָּאָרוֹן
  chosen: in the ark
  alternatives:
  - inside the ark
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'Ark' is the established and accurate
    rendering for אָרוֹן in this cultic context.
- source_word: רַק
  chosen: except
  alternatives:
  - only
  lexicon: HALOT
  rationale: 'After a negated existential, רַק is most naturally rendered as an exception
    clause in English: ''nothing ... except.'''
- source_word: שְׁנֵי לֻחֹת הָאֲבָנִים
  chosen: the two stone tablets
  alternatives:
  - the two tablets of stone
  - the two stone slabs
  lexicon: HALOT
  rationale: Refers to the covenant tablets. 'Stone tablets' is clear modern English
    while remaining close to the Hebrew construction.
- source_word: אֲשֶׁר הִנִּחַ שָׁם מֹשֶׁה
  chosen: that Moses had placed there
  alternatives:
  - which Moses placed there
  - that Moses set there
  lexicon: HALOT
  rationale: הִנִּיחַ means 'place, set down, deposit.' Pluperfect 'had placed' fits
    the retrospective narrative relation to the present description of the ark's contents.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: Standard English preposition with a place name in this setting is 'at.'
    'Horeb' is transliterated as a proper name.
- source_word: אֲשֶׁר כָּרַת יְהוָה עִם
  chosen: where the LORD made a covenant with
  alternatives:
  - which the LORD cut with
  - where the LORD cut a covenant with
  lexicon: HALOT
  rationale: כָּרַת בְּרִית is the standard idiom 'make/cut a covenant.' Since בְּרִית
    is implied rather than repeated, English supplies 'made a covenant' for clarity.
    'Where' appropriately links the covenant-making event to Horeb.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the Hebrew expression literally.
    'Sons of Israel' reflects the source form better than the more idiomatic but less
    transparent 'Israelites.'
- source_word: בְּצֵאתָם מֵאֶרֶץ מִצְרַיִם
  chosen: when they came out from the land of Egypt
  alternatives:
  - when they went out of the land of Egypt
  - at their coming out from the land of Egypt
  lexicon: HALOT
  rationale: Temporal infinitive construct with suffix. 'When they came out from the
    land of Egypt' is natural English and preserves the exodus reference.
