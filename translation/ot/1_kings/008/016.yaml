theological_decisions:
- issue: Temple theology in 'house for my name'
  chosen_reading: Retain the Hebrew idiom 'house for my name' rather than substituting
    'temple' or expanding to a theological paraphrase.
  alternative_readings:
  - temple for my name
  - house where my name would dwell
  rationale: The verse participates in the Deuteronomistic theme of the place where
    the LORD sets his name. Preserving the idiom maintains the theological texture
    without importing later explanatory language beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Contrast between chosen city and chosen David
  chosen_reading: Render waw before 'I chose David' as adversative 'but.'
  alternative_readings:
  - and I chose David
  rationale: 'The verse contrasts two divine choices: no city had yet been chosen,
    but David had been chosen. This is a discourse-level decision, not a doctrinal
    one, and it helps preserve the text''s theological emphasis on Davidic election
    preceding temple-site election.'
  doctrine_reference: Translation philosophy §§1, 5, 6
