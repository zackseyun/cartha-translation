id: 1KI.8.16
reference: 1 Kings 8:16
source:
  edition: WLC
  text: מִן הַ/יּ֗וֹם אֲשֶׁ֨ר הוֹצֵ֜אתִי אֶת עַמִּ֣/י אֶת יִשְׂרָאֵל֮ מִ/מִּצְרַיִם֒
    לֹֽא בָחַ֣רְתִּי בְ/עִ֗יר מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל לִ/בְנ֣וֹת בַּ֔יִת לִ/הְי֥וֹת
    שְׁמִ֖/י שָׁ֑ם וָ/אֶבְחַ֣ר בְּ/דָוִ֔ד לִֽ/הְי֖וֹת עַל עַמִּ֥/י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: From the day that I brought my people Israel out of Egypt, I chose no city
    from all the tribes of Israel in which to build a house for my name to be there,
    but I chose David to be over my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''and I chose David.'' The Hebrew conjunction can be read coordinately,
      but the context favors a contrast: no city had been chosen, whereas David had
      been chosen.'
    reason: lexical_alternative
  - marker: b
    text: '''A house for my name'' is a Hebrew idiom for a sanctuary associated with
      the LORD''s name and presence; that is, the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: הוֹצֵאתִי
  chosen: I brought ... out
  alternatives:
  - I led ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out, commonly used of the exodus.
    'Brought ... out' is idiomatic modern English and preserves the causative sense
    without sounding wooden.
- source_word: עַמִּי אֶת־יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: The appositional construction identifies 'my people' as 'Israel.' The
    unpunctuated English phrase reads naturally while preserving the covenantal designation.
- source_word: בָחַרְתִּי
  chosen: I chose
  alternatives:
  - I selected
  lexicon: HALOT
  rationale: בחר is the standard verb for divine choosing/election. 'Chose' is the
    most direct and theologically transparent rendering.
- source_word: בְעִיר מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: no city from all the tribes of Israel
  alternatives:
  - no city out of all the tribes of Israel
  - no city among all the tribes of Israel
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed, with 'city' linked to 'from all the
    tribes of Israel,' meaning a city associated with any tribe. 'From all the tribes
    of Israel' keeps the source structure more closely than smoothing it to 'among.'
- source_word: לִבְנוֹת בַּיִת
  chosen: to build a house
  alternatives:
  - to build a temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although the referent is the temple,
    'house' preserves the Hebrew idiom 'house for my name' and avoids importing interpretation
    into the noun itself.
- source_word: לִהְיוֹת שְׁמִי שָׁם
  chosen: for my name to be there
  alternatives:
  - that my name might be there
  - for my name to dwell there
  lexicon: HALOT
  rationale: The infinitive construction with היה is rendered straightforwardly. 'For
    my name to be there' preserves the Hebrew wording; 'dwell' would be interpretive,
    since the verb is simply 'be.'
- source_word: וָאֶבְחַר בְּדָוִד
  chosen: but I chose David
  alternatives:
  - and I chose David
  lexicon: HALOT
  rationale: The prefixed waw can be rendered simply as 'and,' but in context it marks
    contrast between not choosing a city and choosing David. 'But' makes the discourse
    relation clear in natural English.
- source_word: לִהְיוֹת עַל־עַמִּי יִשְׂרָאֵל
  chosen: to be over my people Israel
  alternatives:
  - to rule over my people Israel
  - to be leader over my people Israel
  lexicon: HALOT
  rationale: The phrase literally means 'to be over.' 'To be over' preserves the source
    wording and leaves the nature of David's authority stated but not overinterpreted;
    'rule' is possible but more explicit than the Hebrew.
