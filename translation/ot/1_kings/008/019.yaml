theological_decisions:
- issue: Whether to render בַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The source text uses 'house,' and the translation philosophy prioritizes
    original-language primacy while preserving recognizable biblical idiom. Since
    the referent is the temple but the wording is metaphorically/theologically significant,
    the main text keeps 'house' rather than resolving it to 'temple.'
  doctrine_reference: Translation philosophy §1, §5
