id: 1KI.8.19
reference: 1 Kings 8:19
source:
  edition: WLC
  text: רַ֣ק אַתָּ֔ה לֹ֥א תִבְנֶ֖ה הַ/בָּ֑יִת כִּ֤י אִם בִּנְ/ךָ֙ הַ/יֹּצֵ֣א מֵ/חֲלָצֶ֔י/ךָ
    הֽוּא יִבְנֶ֥ה הַ/בַּ֖יִת לִ/שְׁמִֽ/י־־׃
translation:
  text: Nevertheless, you shall not build the house; rather, your son who will come
    from your own body—he shall build the house for my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'who comes out from your loins,' an idiom meaning your own physical
      offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Nevertheless
  alternatives:
  - Only
  - Yet
  - Except that
  lexicon: HALOT
  rationale: Here רַק introduces a limitation or qualification to the preceding approval
    of David's intention. 'Nevertheless' captures the concessive force in natural
    English better than the more restrictive 'only'.
- source_word: לֹא תִבְנֶה
  chosen: you shall not build
  alternatives:
  - you will not build
  - you must not build
  lexicon: HALOT
  rationale: The imperfect with negation in this divine declaration is best rendered
    as a future prohibition/prediction. 'You shall not build' preserves the solemnity
    and ambiguity between decree and prohibition.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house.' Although the referent is the temple, retaining
    'house' preserves the source wording and the theological idiom of a house built
    for the LORD's name.
- source_word: כִּי אִם
  chosen: rather
  alternatives:
  - but
  - except that
  - instead
  lexicon: HALOT
  rationale: 'In this context כִּי אִם marks contrast/correction: not you, but your
    son. ''Rather'' expresses that adversative force clearly in modern English.'
- source_word: בִּנְךָ
  chosen: your son
  alternatives:
  - a son of yours
  lexicon: HALOT
  rationale: The singular with suffix points to a specific descendant, here Solomon
    in context. 'Your son' is the most direct rendering.
- source_word: הַיֹּצֵא מֵחֲלָצֶיךָ
  chosen: who will come from your own body
  alternatives:
  - who will come from your loins
  - who will issue from your loins
  lexicon: HALOT
  rationale: The idiom literally refers to what comes from one's loins, meaning one's
    physical offspring. 'From your own body' communicates the biological descent clearly
    in contemporary English while avoiding archaic phrasing; the more literal alternative
    is worth preserving in a footnote.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic, underscoring that this son, not
    David, will build. English can reflect this with explicit 'he'; the dash structure
    also helps convey emphasis without overtranslation.
- source_word: יִבְנֶה הַבַּיִת
  chosen: he shall build the house
  alternatives:
  - he will build the house
  lexicon: HALOT
  rationale: Repeating 'build the house' mirrors the Hebrew repetition and keeps the
    formal correspondence. 'Shall' suits the solemn divine promise/decree.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - in honor of my name
  - for the sake of my name
  lexicon: HALOT
  rationale: This standard biblical expression refers to the temple as dedicated to
    and bearing the LORD's name. 'For my name' preserves the covenantal idiom without
    interpretive expansion.
