id: 1KI.8.3
reference: 1 Kings 8:3
source:
  edition: WLC
  text: וַ/יָּבֹ֕אוּ כֹּ֖ל זִקְנֵ֣י יִשְׂרָאֵ֑ל וַ/יִּשְׂא֥וּ הַ/כֹּהֲנִ֖ים אֶת הָ/אָרֽוֹן־׃
translation:
  text: And all the elders of Israel came, and the priests carried the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'lifted up' or 'bore' the ark.
    reason: lexical_alternative
  - marker: b
    text: That is, the ark of the covenant; the fuller title is not stated in this
      verse but is clear from the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence; 'came' is the natural, concise
    English rendering. 'Arrived' is possible but slightly more interpretive; 'entered'
    would require a specified destination not stated here.
- source_word: כֹּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Quantifies the following construct phrase 'elders of Israel'; 'all' is
    the straightforward idiomatic rendering.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Construct chain denoting the recognized leaders/older men of Israel.
    'The elders of Israel' is the standard and clear English expression.
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - lifted
  - bore
  lexicon: HALOT
  rationale: From נשׂא, literally 'lifted/carried.' In context of transporting the
    ark, 'carried' best conveys the intended action in natural English. 'Bore' is
    accurate but less current; 'lifted' under-translates the transport sense.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Definite plural noun referring specifically to the priestly group present.
    No reason to generalize or paraphrase.
- source_word: אֶת הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The direct object marker plus definite noun identifies the known ark
    in context. 'The ark' is sufficient here because the immediate narrative context
    concerns the ark's transfer; expanding to 'ark of the covenant' would add words
    not present in this verse, though that fuller expression is contextually understood.
