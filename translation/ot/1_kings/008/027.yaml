theological_decisions:
- issue: Divine transcendence versus temple presence
  chosen_reading: Render the verse as a rhetorical question followed by a declaration
    that even the highest heavens cannot contain God, without denying his covenantal
    presence in the temple.
  alternative_readings:
  - A flatter statement that God simply does not dwell on earth
  - A rendering that implies the temple literally contains God
  rationale: The Hebrew presents Solomon's astonishment that God would dwell on earth,
    while immediately affirming that no created space can contain him. The translation
    preserves this tension rather than resolving it away from either divine transcendence
    or real temple presence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
