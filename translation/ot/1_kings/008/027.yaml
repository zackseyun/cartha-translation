id: 1KI.8.27
reference: 1 Kings 8:27
source:
  edition: WLC
  text: כִּ֚י הַֽ/אֻמְנָ֔ם יֵשֵׁ֥ב אֱלֹהִ֖ים עַל הָ/אָ֑רֶץ הִ֠נֵּה הַ/שָּׁמַ֜יִם וּ/שְׁמֵ֤י
    הַ/שָּׁמַ֨יִם֙ לֹ֣א יְכַלְכְּל֔וּ/ךָ אַ֕ף כִּֽי הַ/בַּ֥יִת הַ/זֶּ֖ה אֲשֶׁ֥ר בָּנִֽיתִי־־׃
translation:
  text: For will God indeed dwell on the earth? Behold, the heavens, even the highest
    heavens, cannot contain you—how much less this house that I have built!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the heavens and the heaven of heavens,'' an idiom meaning the
      highest heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'cannot hold you.'
    reason: lexical_alternative
  - marker: c
    text: '''This house'' refers to the temple Solomon built.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - But
  - Indeed
  lexicon: HALOT
  rationale: Introduces Solomon's explanatory reflection following the preceding petition.
    'For' best preserves the logical connection in natural English.
- source_word: הַאֻמְנָם
  chosen: indeed
  alternatives:
  - really
  - truly
  lexicon: HALOT
  rationale: Marks astonishment and rhetorical emphasis. 'Indeed' preserves the solemn,
    reflective tone without sounding colloquial.
- source_word: יֵשֵׁב
  chosen: dwell
  alternatives:
  - sit
  - remain
  lexicon: HALOT
  rationale: Although the verb literally relates to sitting/dwelling, in this context
    of divine presence with a temple, 'dwell' is the idiomatic and contextually appropriate
    rendering.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Despite the plural form, the singular sense is required by the verb and
    context; this is the God of Israel addressed in prayer.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: HALOT
  rationale: The phrase contrasts earth with heaven. 'On the earth' is the most direct
    and natural rendering here.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Signals emphatic attention to the following statement. 'Behold' retains
    the elevated register suitable to prayer and poetry-like rhetoric.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural form is standard in Hebrew and fits the cosmic scope of the
    statement better than singular 'heaven'.
- source_word: וּשְׁמֵי הַשָּׁמַיִם
  chosen: even the highest heavens
  alternatives:
  - and the heaven of heavens
  - and the heavens of heavens
  lexicon: HALOT
  rationale: This Hebrew superlative idiom refers to the highest conceivable heavens.
    'Even the highest heavens' communicates the sense clearly in modern English while
    preserving the intensification.
- source_word: לֹא יְכַלְכְּלוּךָ
  chosen: cannot contain you
  alternatives:
  - cannot hold you
  - cannot sustain you
  lexicon: HALOT
  rationale: The verb conveys capacity to contain or hold. In context, Solomon is
    affirming God's transcendence over all created space; 'contain' is the clearest
    English choice.
- source_word: אַף כִּי
  chosen: how much less
  alternatives:
  - much less
  - let alone
  lexicon: HALOT
  rationale: 'This idiom introduces a fortiori reasoning: if even the highest heavens
    cannot contain God, then certainly the temple cannot. ''How much less'' makes
    that logic explicit and natural.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Hebrew uses 'house,' the standard temple term. Retaining 'house' preserves
    the source wording and the temple-as-house motif, while remaining understandable
    in context.
- source_word: אֲשֶׁר בָּנִיתִי
  chosen: that I have built
  alternatives:
  - which I built
  lexicon: HALOT
  rationale: The perfect verb naturally renders as 'have built' in English, highlighting
    the completed action with present relevance in Solomon's prayer.
