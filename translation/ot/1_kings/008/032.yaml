id: 1KI.8.32
reference: 1 Kings 8:32
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תִּשְׁמַ֣ע הַ/שָּׁמַ֗יִם וְ/עָשִׂ֨יתָ֙ וְ/שָׁפַטְתָּ֣ אֶת עֲבָדֶ֔י/ךָ
    לְ/הַרְשִׁ֣יעַ רָשָׁ֔ע לָ/תֵ֥ת דַּרְכּ֖/וֹ בְּ/רֹאשׁ֑/וֹ וּ/לְ/הַצְדִּ֣יק צַדִּ֔יק
    לָ֥/תֶת ל֖/וֹ כְּ/צִדְקָתֽ/וֹ׀־׃ס
translation:
  text: then you, hear in heaven and act, and judge your servants, condemning the
    wicked by bringing his way upon his own head, and justifying the righteous by
    giving to him according to his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear from heaven.' The Hebrew literally says 'hear the heavens/heaven,'
      a prayer formula that can be expressed in English either as God's hearing in
      heaven or from heaven.
    reason: lexical_alternative
  - marker: b
    text: '''Bringing his way upon his own head'' is a Hebrew idiom meaning to repay
      a person according to his conduct.'
    reason: cultural_note
  - marker: c
    text: Or 'declaring the righteous innocent' / 'vindicating the righteous.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  chosen: hear in heaven
  alternatives:
  - hear from heaven
  - hear the heavens
  lexicon: HALOT
  rationale: The idiom in this prayer context is that God hears while enthroned in
    heaven. English normally expresses this as 'hear in heaven' or 'hear from heaven.'
    'Hear in heaven' stays closer to the Hebrew wording here, where 'the heavens'
    functions adverbially/locatively.
- source_word: וְעָשִׂיתָ
  chosen: and act
  alternatives:
  - and do
  lexicon: HALOT
  rationale: עשה is broad ('do, act'). In this judicial prayer context, 'act' communicates
    responsive intervention more naturally than the overly generic 'do' while remaining
    faithful to the source.
- source_word: וְשָׁפַטְתָּ אֶת עֲבָדֶיךָ
  chosen: and judge your servants
  alternatives:
  - and vindicate your servants
  - and govern your servants
  lexicon: HALOT
  rationale: שׁפט here introduces judicial adjudication between parties under oath.
    'Judge your servants' preserves the legal setting without prematurely specifying
    the outcome, which the following infinitives then unpack.
- source_word: לְהַרְשִׁיעַ רָשָׁע
  chosen: condemning the wicked
  alternatives:
  - declaring the wicked guilty
  - bringing guilt on the wicked
  lexicon: HALOT
  rationale: The Hiphil of רשע in legal contexts means to declare guilty/condemn.
    'Condemning the wicked' is concise, idiomatic, and fits the parallel with 'justifying
    the righteous.'
- source_word: לָתֵת דַּרְכּוֹ בְּרֹאשׁוֹ
  chosen: by bringing his way upon his own head
  alternatives:
  - putting his conduct on his head
  - bringing his deeds back on his head
  lexicon: HALOT
  rationale: This is a Hebrew idiom for requiting a person according to his conduct.
    'Way' often denotes conduct or course of life; retaining 'way' keeps the idiomatic
    texture, while 'upon his own head' preserves the retributive imagery.
- source_word: וּלְהַצְדִּיק צַדִּיק
  chosen: and justifying the righteous
  alternatives:
  - and declaring the righteous innocent
  - and vindicating the righteous
  lexicon: HALOT
  rationale: The Hiphil of צדק in legal contexts means to declare righteous/justify.
    'Justifying the righteous' best preserves the forensic parallel with 'condemning
    the wicked.'
- source_word: לָתֶת לוֹ כְּצִדְקָתוֹ
  chosen: by giving to him according to his righteousness
  alternatives:
  - rewarding him according to his righteousness
  - giving him according to his justice
  lexicon: HALOT
  rationale: The phrase expresses recompense in accordance with the righteous person's
    uprightness. 'Giving to him according to his righteousness' stays close to the
    Hebrew while remaining clear; 'rewarding' is interpretive and therefore left as
    an alternative.
