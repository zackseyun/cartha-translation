theological_decisions:
- issue: Forensic versus transformative sense of the judicial verbs
  chosen_reading: 'Render the pair as legal/judicial: ''condemning'' and ''justifying.'''
  alternative_readings:
  - Render more generally as 'punishing' and 'vindicating'
  rationale: The verse is framed as a courtroom appeal involving oath and adjudication.
    The Hebrew causative verbs לְהַרְשִׁיעַ and לְהַצְדִּיק are standard legal terms
    for declaring guilty and declaring righteous. Preserving the forensic sense avoids
    importing a broader moral transformation idea not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
