id: 1KI.8.26
reference: 1 Kings 8:26
source:
  edition: WLC
  text: וְ/עַתָּ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל יֵאָ֤מֶן נָא֙ דברי/ך אֲשֶׁ֣ר דִּבַּ֔רְתָּ
    לְ/עַבְדְּ/ךָ֖ דָּוִ֥ד אָבִֽ/י׃
translation:
  text: And now, God of Israel, please let your word that you spoke to your servant
    David my father be confirmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "be established," "prove true," or more dynamically, "come to pass."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "your words"; English "your word" renders the collective sense naturally
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Retains the conjunction plus temporal adverb, marking continuation in
    Solomon's prayer while sounding natural in English.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - O God of Israel
  lexicon: HALOT
  rationale: Construct phrase is straightforwardly rendered as a vocative address.
    'O' is possible in prayer language, but omitted for readable modern English.
- source_word: יֵאָמֶן
  chosen: be confirmed
  alternatives:
  - be established
  - prove true
  - come to pass
  lexicon: HALOT
  rationale: Niphal of אמן here asks that God's spoken promise be shown firm/established.
    'Be confirmed' preserves the passive nuance and covenantal sense without over-paraphrasing.
    'Come to pass' is idiomatic but less tied to the root idea of firmness/confirmation.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: Polite particle of entreaty in prayer. 'Please' conveys the supplicatory
    force in contemporary English better than archaic 'I pray'.
- source_word: דבריך
  chosen: your word
  alternatives:
  - your words
  - your promise
  lexicon: HALOT
  rationale: Although morphologically plural/collective, English singular 'word' naturally
    represents a divine utterance or promise. 'Promise' captures the sense but is
    slightly more interpretive than the Hebrew noun itself.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: that you spoke
  alternatives:
  - which you spoke
  - that you promised
  lexicon: HALOT
  rationale: Directly reflects the relative clause with the common verb 'speak.' 'Promised'
    would frontload interpretation already implied by context.
- source_word: לְעַבְדְּךָ
  chosen: to your servant
  alternatives:
  - to your slave
  lexicon: HALOT
  rationale: While עבד can denote slave/servant, in royal-prayer address to God for
    David the relational and honorific sense is foregrounded rather than bonded-status
    emphasis. 'Servant' is the most contextually fitting rendering.
- source_word: דָּוִד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both English orders are natural. This order follows the Hebrew appositional
    sequence more closely while remaining readable.
