id: 1KI.8.4
reference: 1 Kings 8:4
source:
  edition: WLC
  text: וַֽ/יַּעֲל֞וּ אֶת אֲר֤וֹן יְהוָה֙ וְ/אֶת אֹ֣הֶל מוֹעֵ֔ד וְ/אֶֽת כָּל כְּלֵ֥י הַ/קֹּ֖דֶשׁ אֲשֶׁ֣ר בָּ/אֹ֑הֶל וַ/יַּעֲל֣וּ אֹתָ֔/ם הַ/כֹּהֲנִ֖ים וְ/הַ/לְוִיִּֽם־־־־׃
translation:
  text: They brought up the ark of Yahweh, the tent of meeting, and all the holy vessels that were in the tent; the priests and the Levites brought them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carried them up.' The Hebrew verb can denote bringing or carrying upward in procession.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the priests and the Levites.' Some understand this more specifically as the Levitical priesthood, but the Hebrew wording names both groups.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: They brought up
  alternatives:
  - they took up
  - they carried up
  - they brought
  lexicon: HALOT
  rationale: The verb עלה in the Hiphil commonly means 'bring up' or 'take up.' In this procession context, 'brought up' is idiomatic English and preserves the directional sense toward the temple mount without over-specifying the manner.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  - the LORD's ark
  lexicon: HALOT
  rationale: אֲרוֹן here refers specifically to the covenant ark. 'Ark of the LORD' is the standard and clear rendering. יְהוָה is rendered 'the LORD' per doctrine policy for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the meeting tent
  lexicon: HALOT
  rationale: This phrase is the standard designation for the sanctuary tent. 'Tent of meeting' is more directly tied to the Hebrew than 'tabernacle,' while remaining natural English.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  chosen: all the holy vessels
  alternatives:
  - all the holy furnishings
  - all the sacred articles
  - all the vessels of the sanctuary
  lexicon: HALOT
  rationale: כְּלִים is a broad term for implements/articles/vessels. 'Holy vessels' is concise and natural, and it preserves the cultic sense of consecrated objects. 'Furnishings' could imply larger items than the Hebrew requires.
- source_word: אֲשֶׁר בָּאֹהֶל
  chosen: that were in the tent
  alternatives:
  - which were in the tabernacle
  - that were in the tent of meeting
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the holy vessels. Rendering אֹהֶל simply as 'the tent' avoids unnecessary repetition while clearly referring back to the tent of meeting just mentioned.
- source_word: וַיַּעֲלוּ אֹתָם
  chosen: brought them up
  alternatives:
  - carried them up
  - took them up
  lexicon: HALOT
  rationale: The repeated verb is retained in translation to reflect the Hebrew structure. 'Brought them up' keeps the directional/processional nuance and links with the first clause.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests and the Levites
  alternatives:
  - the priests and levitical servants
  lexicon: HALOT
  rationale: The Hebrew explicitly names two groups. The wording is kept straightforward and literal. Although some interpreters take the phrase appositionally or distributively, the text itself presents both groups, so both are retained in the main text.
