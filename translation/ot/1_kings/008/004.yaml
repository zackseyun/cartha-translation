theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relationship of 'the priests and the Levites' to the transport action
  chosen_reading: Retain both groups explicitly in the main text without harmonizing away the wording
  alternative_readings:
  - Render more interpretively as 'the Levitical priests'
  - Treat as a hendiadys/apposition
  rationale: The Hebrew text names 'the priests and the Levites' after the object pronoun. Since the wording itself preserves a distinction or at least a dual designation, the translation should not collapse it into a single group unless context demands it. This preserves textual tension with other passages about priestly and Levitical duties rather than resolving it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
