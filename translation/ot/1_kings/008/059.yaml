id: 1KI.8.59
reference: 1 Kings 8:59
source:
  edition: WLC
  text: וְ/יִֽהְי֨וּ דְבָרַ֜/י אֵ֗לֶּה אֲשֶׁ֤ר הִתְחַנַּ֨נְתִּי֙ לִ/פְנֵ֣י יְהוָ֔ה
    קְרֹבִ֛ים אֶל יְהוָ֥ה אֱלֹהֵ֖י/נוּ יוֹמָ֣ם וָ/לָ֑יְלָה לַ/עֲשׂ֣וֹת מִשְׁפַּ֣ט
    עַבְדּ֗/וֹ וּ/מִשְׁפַּ֛ט עַמּ֥/וֹ יִשְׂרָאֵ֖ל דְּבַר י֥וֹם בְּ/יוֹמֽ/וֹ־׀־׃
translation:
  text: And may these words of mine, with which I have pleaded before the LORD, be
    near the LORD our God day and night, so that he may uphold the cause of his servant
    and the cause of his people Israel, as each day requires,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be close to the LORD our God'—the Hebrew speaks of these prayer-words
      remaining near God continually.
    reason: lexical_alternative
  - marker: b
    text: Or 'do justice for' / 'maintain the right of'; the Hebrew idiom refers to
      upholding a person's legal cause.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the matter of a day in its day,'' that is, what each day requires.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִהְיוּ
  chosen: And may ... be
  alternatives:
  - and let ... be
  - and they shall be
  lexicon: HALOT
  rationale: The jussive form expresses a wish/prayer rather than simple future. 'May
    ... be' best captures Solomon's petition in natural English.
- source_word: דְבָרַי אֵלֶּה
  chosen: these words of mine
  alternatives:
  - these my words
  lexicon: HALOT
  rationale: A straightforward possessive construction. 'These words of mine' is natural
    modern English while preserving the emphasis on Solomon's own spoken petition.
- source_word: אֲשֶׁר הִתְחַנַּנְתִּי
  chosen: with which I have pleaded
  alternatives:
  - which I have entreated
  - which I have made supplication with
  - which I have prayed
  lexicon: HALOT
  rationale: The hitpael of חנן here denotes making earnest supplication. 'Pleaded'
    preserves the intensity better than the flatter 'prayed,' while 'with which' reflects
    the instrumental sense tied to 'words.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for prayer offered in God's presence. YHWH is rendered
    'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: קְרֹבִים אֶל יְהוָה אֱלֹהֵינוּ
  chosen: be near the LORD our God
  alternatives:
  - be close to the LORD our God
  - remain before the LORD our God
  lexicon: HALOT
  rationale: קְרֹבִים means 'near/close.' The phrase expresses a request that Solomon's
    petition remain continually before God for attention. 'Be near' is the most direct
    rendering.
- source_word: יוֹמָם וָלָיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - continually
  lexicon: HALOT
  rationale: The Hebrew idiom denotes continual duration. 'Day and night' preserves
    the idiom without over-paraphrasing.
- source_word: לַעֲשׂוֹת מִשְׁפַּט
  chosen: so that he may uphold the cause
  alternatives:
  - to do justice for
  - to execute the judgment of
  - to maintain the right of
  lexicon: HALOT
  rationale: The idiom עשה משפט commonly means to carry out justice or maintain someone's
    legal cause. 'Uphold the cause' communicates the judicial-protective sense in
    idiomatic English.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal prayer language for Solomon
    before God, 'servant' is the established and contextually fitting rendering; the
    bonded-status nuance is not foregrounded here.
- source_word: וּמִשְׁפַּט עַמּוֹ יִשְׂרָאֵל
  chosen: and the cause of his people Israel
  alternatives:
  - and justice for his people Israel
  - and the right of his people Israel
  lexicon: HALOT
  rationale: The repeated משפט should be rendered consistently with the prior phrase.
    'Cause' preserves the legal-relational sense and avoids awkward repetition of
    'justice' in English.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: as each day requires
  alternatives:
  - the matter of a day in its day
  - each day's matter on its day
  - day by day
  lexicon: HALOT
  rationale: This idiom refers to what is needed or due on each particular day. 'As
    each day requires' captures the distributive sense more clearly than a wooden
    rendering.
