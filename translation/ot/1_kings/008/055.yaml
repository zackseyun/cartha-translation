id: 1KI.8.55
reference: 1 Kings 8:55
source:
  edition: WLC
  text: וַֽ/יַּעְמֹ֕ד וַ/יְבָ֕רֶךְ אֵ֖ת כָּל קְהַ֣ל יִשְׂרָאֵ֑ל ק֥וֹל גָּד֖וֹל לֵ/אמֹֽר־׃
translation:
  text: 'And he stood and blessed all the assembly of Israel with a loud voice, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the congregation of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with a great voice,' that is, 'with a loud voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעְמֹד
  chosen: And he stood
  alternatives:
  - Then he stood
  - And he arose
  lexicon: HALOT
  rationale: The waw-consecutive imperfect narrates the next action in sequence. 'Stood'
    is the plain sense of עמד here and fits the public liturgical setting. 'Arose'
    is possible but less direct in English for this context.
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing over
  lexicon: HALOT
  rationale: ברך in this context means to speak a blessing over the gathered people.
    'Blessed' is concise and idiomatic, while the fuller paraphrase is possible but
    unnecessary in the main text.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - all the congregation of Israel
  - the whole assembly of Israel
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English
    and preserves the corporate/public sense better than the more traditional but
    slightly ecclesiastical 'congregation.' כָּל is represented by 'all.'
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: HALOT
  rationale: The idiom literally reads 'great voice' and denotes volume. 'With a loud
    voice' is natural English and preserves the public, audible character of Solomon's
    speech.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'and said:'
  lexicon: HALOT
  rationale: The infinitive introduces the content of the speech that follows in the
    next verse. 'Saying:' preserves the formal linkage to the following quotation.
