theological_decisions:
- issue: Nature of 'blessed' in relation to Israel
  chosen_reading: Solomon pronounced a blessing over the gathered people, not that
    he conferred divine grace by his own power.
  alternative_readings:
  - A more sacramental or causative sense of 'blessed'
  rationale: The Hebrew ברך can denote speaking a blessing in a formal/public setting.
    In this narrative context, Solomon addresses the assembly in prayerful and royal-liturgical
    speech. The translation keeps the lexical term 'blessed' without importing a stronger
    theological mechanism than the text states.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
