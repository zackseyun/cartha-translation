id: 1KI.8.63
reference: 1 Kings 8:63
source:
  edition: WLC
  text: וַ/יִּזְבַּ֣ח שְׁלֹמֹ֗ה אֵ֣ת זֶ֣בַח הַ/שְּׁלָמִים֮ אֲשֶׁ֣ר זָבַ֣ח לַ/יהוָה֒ בָּקָ֗ר עֶשְׂרִ֤ים וּ/שְׁנַ֨יִם֙ אֶ֔לֶף וְ/צֹ֕אן מֵאָ֥ה וְ/עֶשְׂרִ֖ים אָ֑לֶף וַֽ/יַּחְנְכוּ֙ אֶת בֵּ֣ית יְהוָ֔ה הַ/מֶּ֖לֶךְ וְ/כָל בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: 'And Solomon sacrificed the sacrifice of peace offerings that he sacrificed to Yahweh: twenty-two thousand cattle and one hundred twenty thousand sheep. So the king and all the sons of Israel dedicated the house of Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - offered
  lexicon: HALOT
  rationale: The verb זבח in sacrificial context is best rendered 'sacrificed'; 'offered' is possible but less explicit about the cultic act.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the sacrifice of well-being offerings
  lexicon: HALOT
  rationale: Retains the formal structure 'sacrifice of...' while rendering שְׁלָמִים with the established cultic term 'peace offerings.' Alternatives such as 'fellowship offerings' or 'well-being offerings' capture aspects of the term but are less traditional and less immediately recognizable in this temple-dedication context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovines. 'Cattle' is natural modern English and fits the large numerical total better than 'oxen,' which is narrower.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock animals
  - small livestock
  lexicon: HALOT
  rationale: Though צֹאן can include sheep and goats collectively, 'sheep' is a common contextual rendering in English Bible tradition here. The paired categories cattle/sheep communicate the sacrificial scale clearly.
- source_word: וַיַּחְנְכוּ
  chosen: dedicated
  alternatives:
  - inaugurated
  - consecrated
  lexicon: HALOT
  rationale: חנך in this context refers to dedicating the temple for sacred use. 'Dedicated' is the most idiomatic and contextually precise English rendering.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formally preserves the Hebrew expression 'house of the LORD.' 'Temple' is interpretive and could be used, but the source wording is straightforward and important.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formal expression is retained as 'sons of Israel.' It is a standard ethnocovenantal designation; more idiomatic alternatives are possible but less formally transparent.
