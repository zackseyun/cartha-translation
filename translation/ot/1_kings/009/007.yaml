theological_decisions:
- issue: Rendering covenant-judgment language without overstating annihilation
  chosen_reading: then I will cut off Israel from the face of the land
  alternative_readings:
  - then I will destroy Israel from the land
  - then I will uproot Israel from the land
  rationale: The verse threatens expulsion and severe judgment tied to covenant unfaithfulness.
    'Cut off' preserves the Hebrew idiom and leaves the precise mode of judgment to
    the text rather than importing a stronger doctrinal claim of total extermination.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to translate הַבַּיִת as 'house' or 'temple'
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: The source text says 'house,' and retaining it respects original-language
    primacy while still being intelligible in context. This avoids flattening the
    theological motif of the house for God's name into a merely functional label.
  doctrine_reference: Translation philosophy §1, §5
