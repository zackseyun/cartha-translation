id: 1KI.9.7
reference: 1 Kings 9:7
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֣י אֶת יִשְׂרָאֵ֗ל מֵ/עַ֨ל פְּנֵ֤י הָ/אֲדָמָה֙ אֲשֶׁ֣ר נָתַ֣תִּי
    לָ/הֶ֔ם וְ/אֶת הַ/בַּ֨יִת֙ אֲשֶׁ֣ר הִקְדַּ֣שְׁתִּי לִ/שְׁמִ֔/י אֲשַׁלַּ֖ח מֵ/עַ֣ל
    פָּנָ֑/י וְ/הָיָ֧ה יִשְׂרָאֵ֛ל לְ/מָשָׁ֥ל וְ/לִ/שְׁנִינָ֖ה בְּ/כָל הָ/עַמִּֽים־־־׃
translation:
  text: then I will cut off Israel from the face of the land that I have given them,
    and the house that I have consecrated for my name I will cast out from before
    my face, and Israel will become a proverb and a taunt among all peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the temple.'' Hebrew: ''the house.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I will send away from my presence.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a proverb and a byword.'
    reason: lexical_alternative
  - marker: d
    text: '''For my name'' is a Hebrew idiom for what is dedicated to bear and honor
      God''s name.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will remove
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off, eliminate, or remove. 'Cut
    off' preserves the covenant-judgment force and echoes established biblical idiom
    without over-paraphrasing into total annihilation.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the land
  alternatives:
  - from upon the land
  - from the face of the earth
  lexicon: HALOT
  rationale: The phrase is literally 'from upon the face of the ground/land.' In this
    context, because the next clause specifies 'the land that I have given them,'
    'land' is preferable to the broader 'earth.' 'From the face of the land' keeps
    the Hebrew imagery.
- source_word: הָאֲדָמָה אֲשֶׁר נָתַתִּי לָהֶם
  chosen: the land that I have given them
  alternatives:
  - the ground that I gave them
  lexicon: HALOT
  rationale: Although אֲדָמָה can mean ground/soil, in this covenantal setting it
    refers to the land granted to Israel. The perfect 'I have given' works naturally
    in English while preserving the completed divine gift.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'house.' While it refers to the temple, retaining 'house'
    preserves the source wording and the theological resonance of the house dedicated
    to God's name. The context makes the referent clear.
- source_word: הִקְדַּשְׁתִּי
  chosen: I have consecrated
  alternatives:
  - I have sanctified
  - I have made holy
  lexicon: HALOT
  rationale: קדשׁ in the Hiphil means to set apart as holy. 'Consecrated' is clear
    modern English and fits a building dedicated for divine worship.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - to bear my name
  - for the sake of my name
  lexicon: HALOT
  rationale: The idiom of the temple being dedicated 'for my name' is important in
    Kings and should be preserved rather than paraphrased away.
- source_word: אֲשַׁלַּח מֵעַל פָּנָי
  chosen: I will cast out from before my face
  alternatives:
  - I will send away from my presence
  - I will reject from before me
  lexicon: HALOT
  rationale: שׁלח can mean send away, let go, or cast out depending on context. Here,
    with the temple as object and the phrase 'from before my face,' the sense is rejection/expulsion
    from God's presence. 'Cast out' communicates this force more clearly than the
    weaker 'send away.'
- source_word: מֵעַל פָּנָי
  chosen: from before my face
  alternatives:
  - from my presence
  - out of my sight
  lexicon: HALOT
  rationale: Literally 'from upon my face.' 'From before my face' preserves the anthropomorphic
    Hebrew idiom; the alternative 'from my presence' is interpretive and is preserved
    in a footnote-worthy alternative.
- source_word: וְהָיָה יִשְׂרָאֵל
  chosen: and Israel will become
  alternatives:
  - and Israel will be
  lexicon: HALOT
  rationale: English idiom prefers 'become' here to express the resulting state, though
    the Hebrew simply says 'will be.' This is a modest optimal-equivalence adjustment
    for readability.
- source_word: לְמָשָׁל
  chosen: a proverb
  alternatives:
  - a byword
  lexicon: HALOT
  rationale: מָשָׁל can mean proverb, byword, or taunting saying. Because the next
    noun covers the mocking dimension, 'proverb' best preserves the lexical distinction
    between the two terms.
- source_word: וְלִשְׁנִינָה
  chosen: and a taunt
  alternatives:
  - and a byword
  - and an object of scorn
  lexicon: HALOT
  rationale: This noun denotes derision or mocking talk. 'Taunt' is concise, natural
    English and complements rather than duplicates 'proverb.'
- source_word: בְּכָל הָעַמִּים
  chosen: among all peoples
  alternatives:
  - among all the nations
  lexicon: HALOT
  rationale: עַמִּים often means peoples/nations. 'Peoples' avoids confusion with
    modern nation-states and fits the plural ethnic sense.
