id: 1KI.9.28
reference: 1 Kings 9:28
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ אוֹפִ֔ירָ/ה וַ/יִּקְח֤וּ מִ/שָּׁם֙ זָהָ֔ב אַרְבַּע מֵא֥וֹת וְ/עֶשְׂרִ֖ים
    כִּכָּ֑ר וַ/יָּבִ֖אוּ אֶל הַ/מֶּ֥לֶךְ שְׁלֹמֹֽה־־׃פ
translation:
  text: They went to Ophir and took from there four hundred and twenty talents of
    gold, and brought it to King Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They came to Ophir.' The Hebrew verb can be rendered either way, but
      'went' fits the narrative viewpoint more naturally in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: They went
  alternatives:
  - They came
  lexicon: HALOT
  rationale: הלך/בוא motion verb in wayyiqtol narrative sequence; with the directional
    place-name that follows, idiomatic English prefers 'went' rather than the more
    literal but less natural 'came.'
- source_word: אוֹפִירָה
  chosen: to Ophir
  alternatives:
  - Ophirah
  lexicon: HALOT
  rationale: Proper place name Ophir with directional he ending, indicating motion
    toward the place. Standard English transliteration is 'Ophir'; the directional
    sense is conveyed by 'to.'
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - acquired
  - fetched
  lexicon: HALOT
  rationale: Common verb לקח in straightforward narrative context; 'took' is the plain
    and sufficiently formal rendering.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'The preposition מן is explicit and should be preserved: they took the
    gold from that location.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering for the noun; no contextual reason to vary.
- source_word: אַרְבַּע מֵאוֹת וְעֶשְׂרִים
  chosen: four hundred and twenty
  alternatives:
  - '420'
  lexicon: HALOT
  rationale: Numbers are rendered in words in the main text for literary readability
    while preserving exact quantity.
- source_word: כִּכָּר
  chosen: talents
  alternatives:
  - talent
  lexicon: HALOT
  rationale: Standard English rendering for the ancient weight unit ככר. Since the
    quantity is plural in sense, English requires 'talents.'
- source_word: וַיָּבִאוּ
  chosen: brought
  alternatives:
  - carried
  - brought in
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring'; this fits the transfer of the gold
    to Solomon.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - to the king, Solomon
  - to Solomon the king
  lexicon: HALOT
  rationale: 'English naturally renders the appositional phrase as the royal title
    before the name: ''to King Solomon.'''
