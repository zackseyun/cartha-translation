id: 1KI.9.15
reference: 1 Kings 9:15
source:
  edition: WLC
  text: וְ/זֶ֨ה דְבַר הַ/מַּ֜ס אֲשֶֽׁר הֶעֱלָ֣ה הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה לִ/בְנוֹת֩ אֶת
    בֵּ֨ית יְהוָ֤ה וְ/אֶת בֵּית/וֹ֙ וְ/אֶת הַ/מִּלּ֔וֹא וְ/אֵ֖ת חוֹמַ֣ת יְרוּשָׁלִָ֑ם
    וְ/אֶת חָצֹ֥ר וְ/אֶת מְגִדּ֖וֹ וְ/אֶת גָּֽזֶר־־׀־־־־־־׃
translation:
  text: Now this was the account of the forced labor that King Solomon levied to build
    the house of the LORD, his own house, the Millo, the wall of Jerusalem, Hazor,
    Megiddo, and Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'labor levy' or 'corvée,' that is, compulsory state labor rather than
      a monetary tax.
    reason: lexical_alternative
  - marker: b
    text: '''The Millo'' is likely a known fortification or terraced fill structure
      in Jerusalem; the Hebrew term may mean ''the fill'' or refer to terraces.'
    reason: cultural_note
lexical_decisions:
- source_word: דְבַר
  chosen: account
  alternatives:
  - matter
  - record
  - statement
  lexicon: HALOT
  rationale: In the construction וְזֶה דְבַר הַמַּס, the noun introduces an explanation
    or report about the levy. 'Account' fits idiomatic English better than the overly
    wooden 'matter' while preserving the sense of an explanatory notice.
- source_word: הַמַּס
  chosen: forced labor
  alternatives:
  - labor levy
  - corvée
  - tribute
  lexicon: HALOT
  rationale: In this context מַס refers not to monetary tax but to conscripted labor
    imposed for royal building projects. 'Forced labor' is the clearest modern rendering;
    'tribute' would mislead, and 'corvée' is accurate but too technical for the target
    audience.
- source_word: הֶעֱלָה
  chosen: levied
  alternatives:
  - raised
  - imposed
  lexicon: HALOT
  rationale: The Hiphil of עלה here idiomatically means to impose or raise a levy.
    'Levied' naturally collocates with labor/tax in English and preserves the administrative
    sense.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - for building
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To build' is straightforward and idiomatic
    in English after 'levied.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' Following doctrine, יְהוָה is
    rendered 'the LORD.' 'House' preserves the source wording and its covenantal resonance;
    'temple' is a possible interpretive gloss but less direct.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - the royal palace
  lexicon: HALOT
  rationale: Refers to Solomon's palace complex. 'His own house' keeps the literal
    wording while clarifying the possessive contrast with the house of the LORD.
- source_word: הַמִּלּוֹא
  chosen: the Millo
  alternatives:
  - the fill
  - the terraces
  lexicon: HALOT
  rationale: מִלּוֹא is a specific topographical/architectural term in Jerusalem,
    likely a known structure or earthwork. Transliteration avoids overclaiming a precise
    reconstruction; a lexical alternative is preserved in a footnote.
- source_word: חוֹמַת יְרוּשָׁלִָם
  chosen: the wall of Jerusalem
  alternatives:
  - the fortification wall of Jerusalem
  lexicon: HALOT
  rationale: A direct rendering of the construct phrase; singular 'wall' is natural
    and sufficient.
- source_word: חָצֹר
  chosen: Hazor
  rationale: Standard transliteration of the place name.
- source_word: מְגִדּוֹ
  chosen: Megiddo
  rationale: Standard transliteration of the place name.
- source_word: גָּזֶר
  chosen: Gezer
  rationale: Standard transliteration of the place name.
