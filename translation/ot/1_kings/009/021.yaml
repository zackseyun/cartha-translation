theological_decisions:
- issue: Rendering of החרים in a conquest/judgment context
  chosen_reading: devote to destruction
  alternative_readings:
  - utterly destroy
  - put under the ban
  rationale: The Hebrew carries both destruction and consecration-to-God/judgment
    overtones. The chosen rendering preserves that theological tension without flattening
    it into mere military killing or obscuring it behind technical jargon.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
