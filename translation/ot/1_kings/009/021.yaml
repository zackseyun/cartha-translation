id: 1KI.9.21
reference: 1 Kings 9:21
source:
  edition: WLC
  text: בְּנֵי/הֶ֗ם אֲשֶׁ֨ר נֹתְר֤וּ אַחֲרֵי/הֶם֙ בָּ/אָ֔רֶץ אֲשֶׁ֧ר לֹֽא יָכְל֛וּ
    בְּנֵ֥י יִשְׂרָאֵ֖ל לְ/הַֽחֲרִימָ֑/ם וַ/יַּעֲלֵ֤/ם שְׁלֹמֹה֙ לְ/מַס עֹבֵ֔ד עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: their children who were left after them in the land—those whom the sons of
    Israel had not been able to devote to destruction—Solomon conscripted for forced
    labor, and they remain so to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'devote to destruction'; alternatively, 'put under the ban' or 'utterly
      destroy.' The verb refers to placing people or things under חרם, a form of irrevocable
      dedication to judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  - their descendants
  lexicon: HALOT
  rationale: בֵּן in plural construct with 3mp suffix can mean literal sons or more
    broadly children/descendants. Here it refers to the next generation of the remaining
    peoples; 'children' is natural English and avoids implying only males while preserving
    filial sense.
- source_word: נֹתְרוּ אַחֲרֵיהֶם
  chosen: were left after them
  alternatives:
  - remained after them
  - survived them
  lexicon: HALOT
  rationale: From יתר/נותר, the sense is those remaining after the prior generation.
    'Were left after them' closely reflects the passive/resultative force and the
    temporal relation.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: Standard rendering of אֶרֶץ in this historical context is 'land,' referring
    to the land of Israel/Canaan rather than merely a generic country.
- source_word: לֹא יָכְלוּ ... לְהַחֲרִימָם
  chosen: had not been able to devote to destruction
  alternatives:
  - could not utterly destroy
  - could not put under the ban
  lexicon: HALOT
  rationale: החרים denotes placing under חרם, often involving destruction as something
    devoted to God. 'Devote to destruction' preserves the cultic/judicial nuance better
    than simple 'destroy,' while remaining readable. The alternative 'put under the
    ban' is more technical and less transparent in modern English.
- source_word: וַיַּעֲלֵם
  chosen: conscripted
  alternatives:
  - made them serve
  - brought them up
  - imposed on them
  lexicon: HALOT
  rationale: עלה in the Hiphil with object plus לְמַס conveys causing persons to be
    brought up/assigned to levy labor. 'Conscripted' captures the causative administrative
    action in idiomatic English.
- source_word: לְמַס עֹבֵד
  chosen: for forced labor
  alternatives:
  - for labor tribute
  - for corvée labor
  - as slave labor
  lexicon: HALOT
  rationale: מַס is levy/forced labor; עֹבֵד specifies laboring service. 'Forced labor'
    is the clearest modern equivalent. 'Slave labor' would over-specify legal status
    beyond the phrase itself, while 'corvée' is accurate but too technical for the
    target audience.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Conventional idiomatic rendering in English for this Hebrew temporal
    formula.
