id: 1KI.9.13
reference: 1 Kings 9:13
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מָ֚ה הֶ/עָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁר נָתַ֥תָּה לִּ֖/י אָחִ֑/י וַ/יִּקְרָ֤א
    לָ/הֶם֙ אֶ֣רֶץ כָּב֔וּל עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃פ
translation:
  text: And he said, “What are these cities that you have given me, my brother?” So
    he called them the land of Cabul to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cabul is likely a place-name, but the Hebrew may also suggest a disparaging
      wordplay, possibly implying something like 'good for nothing' or 'as if bound/limited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What are
  alternatives:
  - What kind of are
  - Why these are
  lexicon: HALOT
  rationale: 'In this exclamatory question, מָה introduces a qualitative complaint:
    ''What are these cities...?'' This is the most natural English equivalent and
    preserves Hiram''s displeased reaction without over-paraphrasing.'
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - these towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city' or 'town.' 'Cities' is the standard rendering
    and fits the narrative register.
- source_word: אֲשֶׁר נָתַתָּה לִּי
  chosen: that you have given me
  alternatives:
  - which you gave me
  lexicon: HALOT
  rationale: The perfect verb can be rendered with English present perfect in direct
    speech to reflect a completed action with present relevance. This is idiomatic
    and faithful.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: The possessive suffix is explicit. In royal-diplomatic speech, 'my brother'
    is both literal address formula and relational language; the translation preserves
    the wording without flattening it to a mere honorific.
- source_word: וַיִּקְרָא לָהֶם
  chosen: So he called them
  alternatives:
  - And he named them
  - And he called those places
  lexicon: HALOT
  rationale: קרא with ל can mean to call/name. 'Called them' is straightforward and
    leaves room for the following designation.
- source_word: אֶרֶץ כָּבוּל
  chosen: the land of Cabul
  alternatives:
  - the land of Kabul
  - the land of Cabul, that is, worthless land
  lexicon: HALOT
  rationale: אֶרֶץ is singular 'land,' not plural 'lands' or 'region' necessarily.
    כָּבוּל appears to function as a place-name here, so it is transliterated as 'Cabul'
    rather than interpreted in the main text. Because the term may carry a pejorative
    sense or wordplay, that alternative is preserved in a footnote rather than imported
    into the translation.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: '''To this day'' is the standard idiomatic English rendering of this
    Hebrew temporal formula and preserves the narrator''s perspective.'
