id: 1KI.9.16
reference: 1 Kings 9:16
source:
  edition: WLC
  text: פַּרְעֹ֨ה מֶֽלֶךְ מִצְרַ֜יִם עָלָ֗ה וַ/יִּלְכֹּ֤ד אֶת גֶּ֨זֶר֙ וַ/יִּשְׂרְפָ֣/הּ
    בָּ/אֵ֔שׁ וְ/אֶת הַֽ/כְּנַעֲנִ֛י הַ/יֹּשֵׁ֥ב בָּ/עִ֖יר הָרָ֑ג וַֽ/יִּתְּנָ/הּ֙
    שִׁלֻּחִ֔ים לְ/בִתּ֖/וֹ אֵ֥שֶׁת שְׁלֹמֹֽה־־־׃
translation:
  text: Pharaoh king of Egypt had gone up and captured Gezer and burned it with fire,
    and he killed the Canaanites who lived in the city, and gave it as a wedding gift
    to his daughter, Solomon’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as a dowry.” The Hebrew term refers to a marriage-related gift; the
      exact social nuance may overlap with what English calls a dowry.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: had gone up
  alternatives:
  - went up
  - came up
  lexicon: HALOT
  rationale: Rendered as pluperfect-like English ('had gone up') because in context
    this clause explains a prior event relative to Solomon's building activity; 'go
    up' preserves the Hebrew idiom of military movement without over-paraphrasing.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: A standard military sense for לכד in conquest contexts; 'captured' is
    clear modern English and fits the sequence of attack on a city.
- source_word: וַיִּשְׂרְפָהּ בָּאֵשׁ
  chosen: burned it with fire
  alternatives:
  - set it on fire
  - burned it
  lexicon: HALOT
  rationale: Keeps the emphatic Hebrew expression literally enough; 'with fire' reflects
    the explicit בָאֵשׁ rather than smoothing it away.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite population
  - the Canaanite inhabitants
  lexicon: HALOT
  rationale: Though morphologically singular, the term functions collectively here
    for the people group inhabiting the city; English plural communicates the collective
    ethnic sense naturally.
- source_word: הַיֹּשֵׁב בָּעִיר
  chosen: who lived in the city
  alternatives:
  - dwelling in the city
  - who were living in the city
  lexicon: HALOT
  rationale: Uses natural English for the participial phrase while preserving its
    descriptive force identifying the Canaanites as the city's inhabitants.
- source_word: הָרָג
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: Direct and unembellished rendering of הרג; 'slew' is archaic, and 'struck
    down' adds stylistic color not required by the Hebrew.
- source_word: וַיִּתְּנָהּ
  chosen: gave it
  alternatives:
  - gave Gezer
  - presented it
  lexicon: HALOT
  rationale: The feminine suffix refers back to the city Gezer; 'gave it' preserves
    the pronominal linkage and avoids unnecessary repetition.
- source_word: שִׁלֻּחִים
  chosen: as a wedding gift
  alternatives:
  - as a dowry
  - as a parting gift
  lexicon: HALOT
  rationale: In this marital context, the noun refers to a marriage-related gift.
    'Wedding gift' is understandable modern English and avoids importing the more
    technical and culturally loaded 'dowry' as the only possible nuance.
- source_word: לְבִתּוֹ אֵשֶׁת שְׁלֹמֹה
  chosen: to his daughter, Solomon’s wife
  alternatives:
  - for his daughter, the wife of Solomon
  - to his daughter, the wife of Solomon
  lexicon: HALOT
  rationale: This appositional phrase identifies the daughter as Solomon's wife. The
    chosen wording is natural English while preserving the relational identification.
