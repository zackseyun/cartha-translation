id: 1KI.9.27
reference: 1 Kings 9:27
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח חִירָ֤ם בָּֽ/אֳנִי֙ אֶת עֲבָדָ֔י/ו אַנְשֵׁ֣י אֳנִיּ֔וֹת יֹדְעֵ֖י
    הַ/יָּ֑ם עִ֖ם עַבְדֵ֥י שְׁלֹמֹֽה־׃
translation:
  text: And Hiram sent his servants on the ship with Solomon’s servants—men of ships,
    men who knew the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'sailors, men experienced at sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And ... sent
  alternatives:
  - and ... dispatched
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative with a simple past. 'Sent' is
    the most natural and direct English rendering.
- source_word: חִירָם
  chosen: Hiram
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: בָּאֳנִי
  chosen: on the ship
  alternatives:
  - in the ship
  - by ship
  lexicon: HALOT
  rationale: The preposition ב plus singular אֳנִי most naturally indicates location/instrument
    associated with the vessel prepared in the preceding context. 'On the ship' is
    idiomatic English for personnel serving aboard a vessel; 'by ship' is possible
    but less tied to the concrete noun here.
- source_word: אֶת עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/slaves
  - his men
  lexicon: HALOT
  rationale: עֶבֶד here refers to royal personnel in service to Hiram. The bonded
    nature is not foregrounded, so 'servants' fits the context better than 'slaves'
    under the project's context-sensitive policy.
- source_word: אַנְשֵׁי אֳנִיּוֹת
  chosen: men of ships
  alternatives:
  - sailors
  - seamen
  - shipmen
  lexicon: HALOT
  rationale: Literally 'men of ships.' I preserved the Hebrew flavor in the main text
    while keeping it intelligible. This phrase identifies the servants as maritime
    personnel. A smoother idiomatic equivalent is 'sailors,' preserved in a footnote.
- source_word: יֹדְעֵי הַיָּם
  chosen: men who knew the sea
  alternatives:
  - experienced at sea
  - familiar with the sea
  - skilled seamen
  lexicon: HALOT
  rationale: The participial construction literally means 'knowers of the sea,' an
    idiom for maritime expertise. 'Men who knew the sea' preserves the imagery and
    sense without over-paraphrasing.
- source_word: עִם עַבְדֵי שְׁלֹמֹה
  chosen: with Solomon’s servants
  alternatives:
  - along with Solomon’s servants
  lexicon: HALOT
  rationale: עִם straightforwardly means 'with.' 'Servants' is retained for consistency
    with עֲבָדָיו earlier in the verse, referring here to Solomon's personnel.
