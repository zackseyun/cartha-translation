id: 1KI.9.10
reference: 1 Kings 9:10
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קְצֵה֙ עֶשְׂרִ֣ים שָׁנָ֔ה אֲשֶׁר בָּנָ֥ה שְׁלֹמֹ֖ה אֶת שְׁנֵ֣י הַ/בָּתִּ֑ים אֶת בֵּ֥ית יְהוָ֖ה וְ/אֶת בֵּ֥ית הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: And it happened at the end of twenty years, in which Solomon had built the two houses—the house of Yahweh and the king's house—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after twenty years.' The Hebrew idiom marks the completion of a twenty-year period.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the two houses,' namely, the house of the LORD and the king's house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a narrative transition. 'And it happened' preserves the Hebrew discourse function in readable modern English without archaic phrasing like 'came to pass.'
- source_word: מִקְצֵה עֶשְׂרִים שָׁנָה
  chosen: at the end of twenty years
  alternatives:
  - after twenty years
  - from the end of twenty years
  lexicon: HALOT
  rationale: The preposition מִן with קֵץ/קָצֶה in this idiom marks the point reached at the completion of a period. 'At the end of twenty years' is the most natural and sufficiently formal rendering.
- source_word: אֲשֶׁר
  chosen: during which
  alternatives:
  - when
  - in which
  - that
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a relative clause tied to the twenty-year period, not merely to the noun 'years' in a wooden way. 'During which' makes explicit that the building activity occupied that span.
- source_word: בָּנָה
  chosen: had built
  alternatives:
  - built
  - was building
  lexicon: HALOT
  rationale: 'English past perfect best conveys the relative temporal relationship: by the end of the twenty years, Solomon had completed the building. Simple past is possible, but past perfect reads more naturally in English with the temporal frame.'
- source_word: שְׁנֵי הַבָּתִּים
  chosen: the two houses
  alternatives:
  - the two buildings
  - both houses
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in this context refers to major structures. 'The two houses' preserves the lexical link to the following appositional identification, while 'buildings' would be more interpretive.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: The phrase is literally 'house of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew wording; 'temple' is accurate by reference but less formally transparent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king's house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: Literally 'the house of the king.' 'The king's house' is natural English and preserves the lexical parallel with 'the house of the LORD.' 'Royal palace' is a valid contextual gloss but less formally aligned.
