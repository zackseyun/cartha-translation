id: 1KI.9.6
reference: 1 Kings 9:6
source:
  edition: WLC
  text: אִם שׁ֨וֹב תְּשֻׁב֜וּ/ן אַתֶּ֤ם וּ/בְנֵי/כֶם֙ מֵֽ/אַחֲרַ֔/י וְ/לֹ֤א תִשְׁמְרוּ֙
    מִצְוֺתַ֣/י חֻקֹּתַ֔/י אֲשֶׁ֥ר נָתַ֖תִּי לִ/פְנֵי/כֶ֑ם וַ/הֲלַכְתֶּ֗ם וַ/עֲבַדְתֶּם֙
    אֱלֹהִ֣ים אֲחֵרִ֔ים וְ/הִשְׁתַּחֲוִיתֶ֖ם לָ/הֶֽם־׃
translation:
  text: But if you or your sons turn away from following me, and do not keep my commandments
    and my statutes that I have set before you, and you go and serve other gods and
    bow down to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you and your sons.' The Hebrew can be understood as addressing Solomon
      together with his descendants; the main text brings out the conditional force
      toward either Solomon or his royal line.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - but if
  lexicon: HALOT
  rationale: Introduces the conditional clause. The adversative nuance is carried
    in English by the opening 'But' for discourse flow, though the particle itself
    is simply conditional.
- source_word: שׁוֹב תְּשֻׁבוּן
  chosen: turn away
  alternatives:
  - indeed turn back
  - surely turn
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    In context with מֵאַחֲרַי ('from after me'), the sense is apostasy or turning
    away from following the LORD, not repentance. 'Turn away' captures both the idiom
    and the emphatic force naturally in English.
- source_word: אַתֶּם וּבְנֵיכֶם
  chosen: you or your sons
  alternatives:
  - you and your sons
  - you yourselves and your children
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is reflected in many editions as either
    plural 'you' or singular with enclitic nun; the sense addresses Solomon and his
    descendants. 'You or your sons' fits the conditional warning to Solomon and his
    line. 'Sons' is retained as gender-accurate to the Hebrew בנים in dynastic context,
    rather than the broader 'children'.
- source_word: מֵאַחֲרַי
  chosen: from following me
  alternatives:
  - from after me
  - away from me
  lexicon: HALOT
  rationale: This is a common covenantal idiom for ceasing to follow the LORD. 'From
    following me' preserves the relational and covenantal nuance better than the more
    abstract 'away from me'.
- source_word: וְלֹא תִשְׁמְרוּ
  chosen: and do not keep
  alternatives:
  - and do not observe
  - and do not guard
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep/observe. 'Keep' is the
    most natural and standard covenantal rendering in English.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: A standard legal-covenantal term; 'commandments' preserves the formal
    register appropriate to divine stipulations.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חקים is distinct from commandments and should be rendered with a differentiated
    legal term. 'Statutes' is conventional and suitably precise.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  chosen: that I have set before you
  alternatives:
  - that I have given before you
  - which I placed before you
  lexicon: HALOT
  rationale: Although נתן often means 'give,' with לִפְנֵי it idiomatically means
    to set/place before someone. 'Set before you' is clear modern English and preserves
    the presentation of covenant obligations.
- source_word: וַהֲלַכְתֶּם
  chosen: and you go
  alternatives:
  - and walk
  - and proceed
  lexicon: HALOT
  rationale: הלך here introduces the subsequent acts of apostasy. 'Go' is idiomatic
    in English before paired verbs ('go and serve'), whereas 'walk' would sound overly
    literal and potentially misleading.
- source_word: וַעֲבַדְתֶּם אֱלֹהִים אֲחֵרִים
  chosen: and serve other gods
  alternatives:
  - and worship other gods
  lexicon: HALOT
  rationale: עבד means 'serve' and is distinct from the following השתחוה ('bow down').
    Rendering it as 'serve' preserves the twofold description of idolatry rather than
    collapsing both verbs into 'worship'.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  chosen: and bow down to them
  alternatives:
  - and worship them
  - and prostrate yourselves to them
  lexicon: HALOT
  rationale: The verb denotes physical prostration or obeisance. 'Bow down to them'
    preserves the concrete imagery and keeps it distinct from 'serve' in the previous
    clause.
