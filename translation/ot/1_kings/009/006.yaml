theological_decisions:
- issue: Dynastic scope of the warning
  chosen_reading: The warning is addressed to Solomon and his royal descendants, rendered
    'you or your sons.'
  alternative_readings:
  - The warning is addressed to the people more broadly, rendered 'you and your children.'
  rationale: In context, the LORD is speaking to Solomon about the Davidic house and
    the temple. The Hebrew phrase literally names 'you and your sons,' which in this
    royal context points to Solomon and his descendants rather than a generalized
    audience. This avoids flattening the dynastic dimension of the warning.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
