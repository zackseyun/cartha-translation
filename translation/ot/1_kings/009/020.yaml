theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: Per the translation philosophy's gender-accurate principle, the masculine
    plural construct is preserved where it reflects the source wording. 'Israelites'
    is idiomatic but less transparent to the Hebrew form; 'children of Israel' is
    traditional but less natural in modern English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
