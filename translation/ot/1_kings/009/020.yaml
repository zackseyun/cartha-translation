id: 1KI.9.20
reference: 1 Kings 9:20
source:
  edition: WLC
  text: כָּל הָ֠/עָם הַ/נּוֹתָ֨ר מִן הָ/אֱמֹרִ֜י הַ/חִתִּ֤י הַ/פְּרִזִּי֙ הַ/חִוִּ֣י
    וְ/הַ/יְבוּסִ֔י אֲשֶׁ֛ר לֹֽא מִ/בְּנֵ֥י יִשְׂרָאֵ֖ל הֵֽמָּה־־־׃
translation:
  text: All the people who remained from the Amorites, the Hittites, the Perizzites,
    the Hivites, and the Jebusites, who were not from the sons of Israel—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''were not from the Israelites.'' Hebrew: ''were not from the sons of
      Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole of
  lexicon: HALOT
  rationale: כָּל before a definite noun gives a totalizing sense, naturally rendered
    'All' here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the population
  - the folk
  lexicon: HALOT
  rationale: עָם commonly means 'people' as a collective group. Singular in Hebrew
    but collective in sense, so 'the people' is the most natural English rendering.
- source_word: הַנּוֹתָר
  chosen: who remained
  alternatives:
  - who were left
  - remaining
  lexicon: HALOT
  rationale: The Niphal participle of יתר denotes those left over or remaining. Rendered
    as a relative clause for smooth English after 'the people.'
- source_word: מִן
  chosen: from
  alternatives:
  - among
  - out of
  lexicon: HALOT
  rationale: 'Here מִן marks source/origin: the remaining people from these listed
    nations.'
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  lexicon: HALOT
  rationale: Standard English transliteration of the ethnonym in plural collective
    form.
- source_word: הַחִתִּי
  chosen: the Hittites
  lexicon: HALOT
  rationale: Standard English rendering of the ethnonym.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  lexicon: HALOT
  rationale: Standard English rendering of the ethnonym.
- source_word: הַחִוִּי
  chosen: the Hivites
  lexicon: HALOT
  rationale: Standard English rendering of the ethnonym.
- source_word: וְהַיְבוּסִי
  chosen: and the Jebusites
  lexicon: HALOT
  rationale: Conjunction preserved and ethnonym rendered by standard English transliteration.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to the people; 'who' is idiomatic for persons.
- source_word: לֹא מִבְּנֵי יִשְׂרָאֵל
  chosen: were not from the sons of Israel
  alternatives:
  - were not from the Israelites
  - were not of the children of Israel
  lexicon: HALOT
  rationale: The phrase is literally 'not from the sons of Israel.' Because the translation
    philosophy prefers gender-accurate renderings and the Hebrew explicitly uses 'sons,'
    the main text preserves that form rather than flattening to 'Israelites,' though
    that alternative is viable idiomatic English.
- source_word: הֵמָּה
  chosen: —
  alternatives:
  - they were
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis ('they themselves'). In English
    this is awkward if rendered explicitly at the end of this verbless clause, especially
    since the verse continues in the next verse. An em dash preserves the open-ended,
    resumptive feel without overtranslating.
