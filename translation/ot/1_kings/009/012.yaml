id: 1KI.9.12
reference: 1 Kings 9:12
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א חִירָם֙ מִ/צֹּ֔ר לִ/רְאוֹת֙ אֶת הֶ֣/עָרִ֔ים אֲשֶׁ֥ר נָתַן ל֖/וֹ
    שְׁלֹמֹ֑ה וְ/לֹ֥א יָשְׁר֖וּ בְּ/עֵינָֽי/ו־־׃
translation:
  text: So Hiram went out from Tyre to see the cities that Solomon had given him,
    but they were not pleasing in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but they did not please him.' The Hebrew idiom is literally 'they were
      not pleasing/right in his eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form normally denotes going
    out/departing. 'Went out' preserves the directional sense from Tyre without overinterpreting
    motive.
- source_word: מִצֹּר
  chosen: from Tyre
  alternatives:
  - out of Tyre
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From Tyre' is natural English
    and preserves the geographic point of departure.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to inspect
  - to look at
  lexicon: HALOT
  rationale: ראה is broadly 'see.' In context it implies examination of the cities,
    but 'to see' best preserves the Hebrew's plain sense without adding interpretive
    nuance.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עיר commonly means 'city/town.' 'Cities' is the standard gloss and fits
    the administrative/geographical context.
- source_word: אֲשֶׁר נָתַן לוֹ שְׁלֹמֹה
  chosen: that Solomon had given him
  alternatives:
  - which Solomon gave to him
  lexicon: HALOT
  rationale: 'The relative clause identifies the cities. English past perfect (''had
    given'') fits the sequence naturally: Solomon''s gift preceded Hiram''s inspection.'
- source_word: וְלֹא יָשְׁרוּ בְּעֵינָיו
  chosen: but they were not pleasing in his eyes
  alternatives:
  - but they did not please him
  - but they were not right in his eyes
  lexicon: HALOT
  rationale: The idiom ישר בעיני means being acceptable/pleasing in someone's judgment.
    'Were not pleasing in his eyes' preserves the Hebrew idiom while remaining readable.
    'Right in his eyes' in English can suggest moral correctness, which is less likely
    here than dissatisfaction with the gift.
