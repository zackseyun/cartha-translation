id: 1KI.9.14
reference: 1 Kings 9:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח חִירָ֖ם לַ/מֶּ֑לֶךְ מֵאָ֥ה וְ/עֶשְׂרִ֖ים כִּכַּ֥ר זָהָֽב׃
translation:
  text: And Hiram sent to the king one hundred and twenty talents of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A talent was a large unit of weight; the phrase refers to one hundred and
      twenty talents' worth of gold.
    reason: cultural_note
  - marker: b
    text: Or 'to King Solomon'; the Hebrew says simply 'to the king.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive imperfect advances the narrative with a simple past
    sense. 'Sent' is the natural, direct English equivalent for שלח here.
- source_word: חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  rationale: Personal names are transliterated by standard English convention. 'Hiram'
    matches the Hebrew form here and common English usage in Kings.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to King Solomon
  lexicon: HALOT
  rationale: The Hebrew reads literally 'to the king' with the definite article, referring
    contextually to Solomon. The more formal rendering preserves the source wording
    without adding the proper name into the main text.
- source_word: מֵאָה וְעֶשְׂרִים
  chosen: one hundred and twenty
  alternatives:
  - a hundred and twenty
  lexicon: HALOT
  rationale: This is the straightforward cardinal number expression; 'one hundred
    and twenty' is clear modern English.
- source_word: כִּכַּר
  chosen: talents
  alternatives:
  - talent
  lexicon: HALOT
  rationale: כִּכָּר is a standard ancient unit of weight, conventionally rendered
    'talent.' Because the number is plural in sense, English requires 'talents.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: The noun denotes gold; in construct with כִּכַּר it yields 'talents of
    gold.'
