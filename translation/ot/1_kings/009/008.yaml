theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and stylistic guidance specifies 'the LORD' as
    the default rendering of YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of עֶלְיוֹן in a judgment context
  chosen_reading: understood contextually as desolation/ruin rather than literal 'high/exalted'
  alternative_readings:
  - high
  - exalted
  rationale: A literal rendering creates a sense that conflicts with the surrounding
    curse context. The broader canonical parallel and ancient versions have led many
    translators to understand the line as describing the temple's ruin. The textual-literary
    tension is preserved in a footnote rather than flattened silently.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
