id: 1KI.9.8
reference: 1 Kings 9:8
source:
  edition: WLC
  text: וְ/הַ/בַּ֤יִת הַ/זֶּה֙ יִהְיֶ֣ה עֶלְי֔וֹן כָּל עֹבֵ֥ר עָלָ֖י/ו יִשֹּׁ֣ם וְ/שָׁרָ֑ק
    וְ/אָמְר֗וּ עַל מֶ֨ה עָשָׂ֤ה יְהוָה֙ כָּ֔כָה לָ/אָ֥רֶץ הַ/זֹּ֖את וְ/לַ/בַּ֥יִת
    הַ/זֶּֽה־־׃
translation:
  text: And this house will become a ruin. Everyone who passes by it will be appalled
    and will whistle, and they will say, ‘Why has the LORD done thus to this land
    and to this house?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''this house will be high/exalted.'' In context, many understand
      the sense to be that it will become a ruin or object of horror; compare 2 Chronicles
      7:21.'
    reason: textual_variant
  - marker: b
    text: Or 'hiss.' The Hebrew verb refers to making a sharp sound in astonishment
      or derision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבַּיִת הַזֶּה
  chosen: And this house
  alternatives:
  - And this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the Hebrew wording and the literary link to the 'house'
    built for the LORD, while remaining understandable in English.
- source_word: יִהְיֶה עֶלְיוֹן
  chosen: will become a ruin
  alternatives:
  - will be exalted/high
  - will become a heap
  lexicon: HALOT
  rationale: The consonantal text reads 'high/exalted,' but in context this yields
    poor sense. The parallel in 2 Chronicles 7:21 and the immediate context of judgment
    support understanding the phrase as referring to desolation/ruin. This is best
    rendered idiomatically as 'will become a ruin,' while preserving the textual issue
    in a footnote.
- source_word: כָּל עֹבֵר עָלָיו
  chosen: Everyone who passes by it
  alternatives:
  - Every passerby
  - Everyone passing over it
  lexicon: HALOT
  rationale: This idiom refers to passersby. 'Everyone who passes by it' is natural
    modern English and preserves the distributive force of כָּל.
- source_word: יִשֹּׁם
  chosen: will be appalled
  alternatives:
  - will be astonished
  - will be desolated
  lexicon: HALOT
  rationale: The verb here expresses stunned horror or desolation in reaction to devastation.
    'Will be appalled' best captures the emotional force in contemporary English.
- source_word: וְשָׁרָק
  chosen: and will whistle
  alternatives:
  - and hiss
  lexicon: HALOT
  rationale: The verb denotes making a sharp sound in astonishment or derision. 'Whistle'
    is the more direct lexical rendering; 'hiss' is a common interpretive alternative
    and is preserved in a footnote because English readers may associate the gesture
    with scorn.
- source_word: וְאָמְרוּ
  chosen: and they will say
  alternatives:
  - and people will say
  lexicon: HALOT
  rationale: Simple plural verb with indefinite subject; 'they will say' is idiomatic
    and sufficiently transparent.
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: The phrase asks the reason for the judgment. 'Why' is the most natural
    equivalent in English.
- source_word: עָשָׂה יְהוָה
  chosen: has the LORD done
  alternatives:
  - did the LORD do
  lexicon: HALOT
  rationale: English present perfect works naturally in a quoted question about an
    observed result. יְהוָה is rendered 'the LORD' per project doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD,' following Jewish reverence tradition and the Septuagintal
    pattern.
- source_word: כָּכָה
  chosen: thus
  alternatives:
  - like this
  - such a thing
  lexicon: HALOT
  rationale: כָּכָה points to the manner of judgment. 'Thus' is concise and suitably
    formal without sounding archaic in this context.
- source_word: לָאָרֶץ הַזֹּאת
  chosen: to this land
  alternatives:
  - to this country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land of Israel/Judah rather than the abstract
    earth. 'Land' is the standard and contextually appropriate rendering.
- source_word: וְלַבַּיִת הַזֶּה
  chosen: and to this house
  alternatives:
  - and to this temple
  lexicon: HALOT
  rationale: Again, 'house' preserves the Hebrew term and the rhetorical repetition,
    while the context makes clear that the temple is meant.
