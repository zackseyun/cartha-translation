id: 1KI.9.5
reference: 1 Kings 9:5
source:
  edition: WLC
  text: וַ/הֲקִ֨מֹתִ֜י אֶת כִּסֵּ֧א מַֽמְלַכְתְּ/ךָ֛ עַל יִשְׂרָאֵ֖ל לְ/עֹלָ֑ם כַּ/אֲשֶׁ֣ר
    דִּבַּ֗רְתִּי עַל דָּוִ֤ד אָבִ֨י/ךָ֙ לֵ/אמֹ֔ר לֹֽא יִכָּרֵ֤ת לְ/ךָ֙ אִ֔ישׁ מֵ/עַ֖ל
    כִּסֵּ֥א יִשְׂרָאֵֽל־־־־׃
translation:
  text: then I will establish the throne of your kingdom over Israel forever, just
    as I spoke concerning David your father, saying, ‘A man of yours will not be cut
    off from the throne of Israel.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You will not lack a man on the throne of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: then I will establish
  alternatives:
  - and I will establish
  - I will confirm
  lexicon: HALOT
  rationale: Hiphil of קום here has the sense of causing to stand/establish. The prefixed
    waw continues the conditional sequence from the previous verse, so 'then I will
    establish' brings out the apodosis naturally in English.
- source_word: כִּסֵּא מַמְלַכְתְּךָ
  chosen: the throne of your kingdom
  alternatives:
  - your royal throne
  - the throne of your reign
  lexicon: HALOT
  rationale: 'A fairly formal rendering preserves both nouns: ''throne'' and ''kingdom.''
    This keeps the dynastic-political emphasis of the Hebrew rather than collapsing
    it into a single idiom.'
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  - in Israel
  lexicon: HALOT
  rationale: עַל with royal rule commonly indicates authority over a people. 'Over
    Israel' is the most direct and idiomatic rendering in this context.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: '''Forever'' is the standard modern English equivalent for לְעוֹלָם here,
    expressing enduring dynastic permanence in the covenantal promise.'
- source_word: כַּאֲשֶׁר דִּבַּרְתִּי עַל
  chosen: just as I spoke concerning
  alternatives:
  - as I said to
  - just as I promised regarding
  lexicon: HALOT
  rationale: The preposition עַל after דבר can mean 'concerning/about.' 'Spoke concerning'
    is slightly formal but accurately reflects the Hebrew construction without importing
    'promise' directly into the verb.
- source_word: דָּוִד אָבִיךָ
  chosen: David your father
  lexicon: HALOT
  rationale: Straightforward rendering. 'Father' here denotes ancestor/immediate dynastic
    predecessor in the royal line; no expansion is needed in the main text.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when I said
  lexicon: HALOT
  rationale: Standard citation formula introducing the content of the prior divine
    speech.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  chosen: A man of yours will not be cut off
  alternatives:
  - You will not lack a man
  - there will not be cut off for you a man
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' Retaining that wording
    preserves the covenantal/judicial resonance of the Hebrew. 'A man of yours' reflects
    לְךָ idiomatically as a descendant belonging to David's line, though a smoother
    English alternative is preserved in a footnote.
- source_word: מֵעַל כִּסֵּא יִשְׂרָאֵל
  chosen: from the throne of Israel
  alternatives:
  - from upon the throne of Israel
  lexicon: HALOT
  rationale: מֵעַל is literally 'from upon,' but English normally says 'from the throne.'
    The phrase denotes removal from dynastic kingship over Israel.
