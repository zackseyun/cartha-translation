theological_decisions:
- issue: Dynastic promise language and conditional context
  chosen_reading: Render the promise in straightforward dynastic terms without resolving
    broader theological debates about unconditional versus conditional Davidic covenant
    fulfillment.
  alternative_readings:
  - Translate more absolutely as an unconditional guarantee
  - Paraphrase to stress the condition from the previous verse within this verse itself
  rationale: This verse states the promise in covenantal language, but its immediate
    context is conditional. The translation preserves the wording of the promise itself
    and lets the surrounding context carry the tension, in keeping with the instruction
    to preserve theological tension rather than resolve it.
  doctrine_reference: Translation philosophy §3
