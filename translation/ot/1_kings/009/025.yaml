theological_decisions:
- issue: Referent and sense of Solomon's cultic action
  chosen_reading: The verse describes Solomon's regular participation in temple worship by offering sacrifices and burning incense in connection with the altar before the LORD, without implying that Solomon personally performed priestly acts contrary to priestly regulations.
  alternative_readings:
  - The king himself directly performed the sacrificial and incense rites
  - The verbs are purely causative, meaning Solomon arranged for priests to perform them
  rationale: The Hebrew attributes the actions to Solomon in royal-summary style, which can denote sponsorship or authorized performance rather than hands-on priestly execution. The translation keeps the surface wording without importing a stronger doctrinal claim either way.
  doctrine_reference: Preserve theological tension rather than resolve it.
