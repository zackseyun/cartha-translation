id: 1KI.9.25
reference: 1 Kings 9:25
source:
  edition: WLC
  text: וְ/הֶעֱלָ֣ה שְׁלֹמֹ֡ה שָׁלֹשׁ֩ פְּעָמִ֨ים בַּ/שָּׁנָ֜ה עֹל֣וֹת וּ/שְׁלָמִ֗ים עַל הַ/מִּזְבֵּ֨חַ֙ אֲשֶׁ֣ר בָּנָ֣ה לַ/יהוָ֔ה וְ/הַקְטֵ֣יר אִתּ֔/וֹ אֲשֶׁ֖ר לִ/פְנֵ֣י יְהוָ֑ה וְ/שִׁלַּ֖ם אֶת הַ/בָּֽיִת־־׃
translation:
  text: And Solomon offered up burnt offerings and peace offerings on the altar that he had built for Yahweh three times a year, and he burned incense with it before Yahweh. Thus he completed the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made offerings smoke with it'; the Hebrew verb can refer more broadly to turning a sacrifice into smoke, not only to burning incense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house,' referring to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלָה
  chosen: offered up
  alternatives:
  - offered
  - caused to ascend
  lexicon: HALOT
  rationale: Hiphil of עלה in sacrificial context commonly means to offer up a sacrifice. 'Offered up' preserves the sacrificial idiom better than the flatter 'offered,' while avoiding an overly wooden 'caused to ascend.'
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard cultic term for sacrifices wholly burned on the altar. 'Burnt offerings' is the established and accurate English rendering.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - well-being offerings
  lexicon: HALOT
  rationale: The term denotes a class of communion/well-being sacrifices. 'Peace offerings' is traditional and recognizable; alternatives are possible, but this rendering remains sufficiently transparent in context.
- source_word: עַל הַמִּזְבֵּחַ אֲשֶׁר בָּנָה לַיהוָה
  chosen: on the altar that he had built for the LORD
  alternatives:
  - upon the altar that he built for the LORD
  lexicon: HALOT
  rationale: Straightforward rendering of the relative clause. 'Had built' fits the prior-completed action in English narrative style.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  chosen: three times a year
  alternatives:
  - three times in the year
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew temporal expression.
- source_word: וְהַקְטֵיר
  chosen: he burned incense
  alternatives:
  - he made offerings smoke
  - he burned as an offering
  lexicon: HALOT
  rationale: The Hiphil of קטר often refers to producing sacrificial smoke, including incense. Given the objectless construction here and the temple setting, 'he burned incense' is a natural and widely adopted rendering, though the Hebrew could more broadly denote making offerings smoke.
- source_word: אִתּוֹ
  chosen: with it
  alternatives:
  - with him
  - thereon
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the altar, yielding the sense of burning incense in connection with it. The form is syntactically difficult, and some take it adverbially or as referring to the altar rather than a person; 'with it' preserves the likely referent without overinterpreting.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - which was before the LORD
  lexicon: HALOT
  rationale: The relative clause likely further identifies the altar/ritual location as being before the LORD. English smooths the clause idiomatically as 'before the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשִׁלַּם אֶת הַבָּיִת
  chosen: So he completed the house
  alternatives:
  - and he finished the house
  - and he made the house complete
  lexicon: HALOT
  rationale: Piel of שלם can mean complete/finish. In this context it summarizes the completion of the temple project. 'House' is retained rather than expanded to 'temple' to reflect the Hebrew, while still understandable in context.
