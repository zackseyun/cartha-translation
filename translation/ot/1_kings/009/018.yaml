id: 1KI.9.18
reference: 1 Kings 9:18
source:
  edition: WLC
  text: וְ/אֶֽת בַּעֲלָ֛ת וְ/אֶת תמר בַּ/מִּדְבָּ֖ר בָּ/אָֽרֶץ־־׃
translation:
  text: and Baalath, and Tamar in the wilderness, in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Tamar''; the parallel passage in 2 Chronicles 8:4 reads ''Tadmor.'''
    reason: textual_variant
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - also
  - namely (object marker left untranslated)
  lexicon: HALOT
  rationale: The particle אֵת marks the definite direct object and is not normally
    represented in English; the prefixed conjunction ו is carried by 'and.' Since
    this verse continues a list from the previous verse, simple coordination is the
    most natural English rendering.
- source_word: בַּעֲלָת
  chosen: Baalath
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - also
  - namely (object marker left untranslated)
  lexicon: HALOT
  rationale: As with the first occurrence, אֵת is an untranslated object marker, while
    ו supplies the coordination in the city list.
- source_word: תמר
  chosen: Tamar
  alternatives:
  - Tadmor
  lexicon: HALOT
  rationale: The consonantal text here reads תמר, naturally transliterated 'Tamar.'
    Because the parallel in 2 Chronicles 8:4 reads 'Tadmor,' that alternative is preserved
    in a footnote rather than adopted in the main text.
- source_word: בַּ/מִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred as a standard biblical rendering and fits the geographic note.
- source_word: בָּ/אָֽרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here most naturally means 'land' in a geographic sense. Retaining
    'land' preserves the Hebrew's broad territorial reference and avoids over-specifying
    the referent.
