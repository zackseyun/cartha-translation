id: 1KI.9.22
reference: 1 Kings 9:22
source:
  edition: WLC
  text: וּ/מִ/בְּנֵי֙ יִשְׂרָאֵ֔ל לֹֽא נָתַ֥ן שְׁלֹמֹ֖ה עָ֑בֶד כִּי הֵ֞ם אַנְשֵׁ֣י
    הַ/מִּלְחָמָ֗ה וַ/עֲבָדָי/ו֙ וְ/שָׂרָ֣י/ו וְ/שָׁלִשָׁ֔י/ו וְ/שָׂרֵ֥י רִכְבּ֖/וֹ
    וּ/פָרָשָֽׁי/ו־־׃ס
translation:
  text: But from the sons of Israel Solomon made no slave laborers, for they were
    the men of war, his servants, his commanders, his officers, and the commanders
    of his chariots and his horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his adjutants' for 'his officers'; the Hebrew term likely refers to
      a specific class of high-ranking military aides or chariot officers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי יִשְׂרָאֵל
  chosen: But from the sons of Israel
  alternatives:
  - But from the Israelites
  - And from the sons of Israel
  lexicon: HALOT
  rationale: Literally 'and/from the sons of Israel.' 'Sons of Israel' preserves the
    Hebrew expression and its male-genealogical form; 'from the Israelites' is smoother
    English but less formally transparent. 'But' fits the contrast with the previous
    verse's forced labor from non-Israelites.
- source_word: לֹא נָתַן ... עָבֶד
  chosen: Solomon made no slave laborers
  alternatives:
  - Solomon did not make slaves
  - Solomon assigned no laborer
  - Solomon made no servant
  lexicon: HALOT
  rationale: The idiom 'give [someone] as עבד' here means to place into servile labor
    status. Given the immediate context of corvée/forced labor in the surrounding
    verses, 'made no slave laborers' best captures both the noun עָבֶד and the labor
    context. 'Servant' is too weak; 'slaves' alone misses the labor-service nuance.
- source_word: כִּי הֵם
  chosen: for they were
  alternatives:
  - because they were
  - for they themselves were
  lexicon: HALOT
  rationale: Introduces the reason Solomon did not assign Israelites to this status.
    'For' is natural and sufficiently formal.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - warriors
  - fighting men
  lexicon: HALOT
  rationale: A standard Hebrew expression for fighting personnel. 'Men of war' preserves
    the gendered and military sense of the source; 'warriors' is possible but slightly
    more interpretive/stylistic.
- source_word: וַעֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: Though עבד can denote officials in royal contexts, the term is broad.
    Rendering it 'servants' keeps the lexical link visible while allowing the following
    more specific ranks to narrow the sense.
- source_word: וְשָׂרָיו
  chosen: his commanders
  alternatives:
  - his princes
  - his officials
  - his captains
  lexicon: HALOT
  rationale: שׂר often denotes a leader, chief, or official. In this military-administrative
    list, 'commanders' best fits the context better than the archaic 'princes' or
    the overly broad 'officials'.
- source_word: וְשָׁלִשָׁיו
  chosen: his officers
  alternatives:
  - his adjutants
  - his captains
  - his third men
  lexicon: HALOT
  rationale: The precise historical referent of שָׁלִישׁ is debated, often a high-ranking
    military aide or officer associated with chariots. 'Officers' is a clear, non-technical
    rendering in modern English; a more specific alternative is worth preserving in
    a footnote.
- source_word: וְשָׂרֵי רִכְבּוֹ
  chosen: the commanders of his chariots
  alternatives:
  - the captains of his chariotry
  - the commanders of his chariot forces
  lexicon: HALOT
  rationale: Construct phrase indicating leaders over Solomon's chariot corps. 'Commanders
    of his chariots' is straightforward and readable.
- source_word: וּפָרָשָׁיו
  chosen: his horsemen
  alternatives:
  - his cavalrymen
  lexicon: HALOT
  rationale: Refers to mounted troops. 'Horsemen' is the most direct rendering; 'cavalrymen'
    is possible but slightly more anachronistic in tone.
