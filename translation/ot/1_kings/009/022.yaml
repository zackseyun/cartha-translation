theological_decisions:
- issue: Gendered military designation in אַנְשֵׁי הַמִּלְחָמָה
  chosen_reading: the men of war
  alternative_readings:
  - warriors
  - fighting men
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine expression is retained rather than neutralized, since the verse describes
    male military and royal service roles in ancient Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Social status implied by עָבֶד in this context
  chosen_reading: made no slave laborers
  alternative_readings:
  - made no slaves
  - made no servants
  rationale: The surrounding context concerns forced labor imposed on non-Israelite
    populations. To avoid softening the bonded nature of the labor, 'slave laborers'
    is preferred over 'servants,' while still reflecting the labor-service setting
    of the verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1; Contested terms
    table for δοῦλος by analogy of bonded service terminology
