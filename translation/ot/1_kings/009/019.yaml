id: 1KI.9.19
reference: 1 Kings 9:19
source:
  edition: WLC
  text: וְ/אֵ֨ת כָּל עָרֵ֤י הַֽ/מִּסְכְּנוֹת֙ אֲשֶׁ֣ר הָי֣וּ לִ/שְׁלֹמֹ֔ה וְ/אֵת֙
    עָרֵ֣י הָ/רֶ֔כֶב וְ/אֵ֖ת עָרֵ֣י הַ/פָּרָשִׁ֑ים וְ/אֵ֣ת חֵ֣שֶׁק שְׁלֹמֹ֗ה אֲשֶׁ֤ר
    חָשַׁק֙ לִ/בְנ֤וֹת בִּ/ירוּשָׁלִַ֨ם֙ וּ/בַ/לְּבָנ֔וֹן וּ/בְ/כֹ֖ל אֶ֥רֶץ מֶמְשַׁלְתּֽ/וֹ־׀׃
translation:
  text: also all the storage cities that belonged to Solomon, the chariot cities,
    the horsemen’s cities, and whatever Solomon desired to build in Jerusalem, in
    Lebanon, and in all the land of his dominion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'store cities' or 'supply cities.' The Hebrew refers to cities designated
      for storage or provisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'cities of the horsemen' or 'cavalry cities.' The Hebrew term refers
      more specifically to horsemen than to horses in general.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the desire of Solomon which he desired to build,' a Hebrew emphatic
      expression for what Solomon strongly wished to build.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמִּסְכְּנוֹת
  chosen: storage cities
  alternatives:
  - store cities
  - supply cities
  - treasure cities
  lexicon: HALOT
  rationale: The phrase denotes cities used for storage/supplies rather than ordinary
    settlements. 'Storage cities' is clear modern English and preserves the administrative
    sense better than the more traditional but less transparent 'store cities.'
- source_word: אֲשֶׁר הָיוּ לִשְׁלֹמֹה
  chosen: that belonged to Solomon
  alternatives:
  - that were Solomon's
  - that were for Solomon
  lexicon: HALOT
  rationale: The construction indicates possession or assignment. 'Belonged to Solomon'
    reads naturally in English while preserving the possessive sense.
- source_word: עָרֵי הָרֶכֶב
  chosen: the chariot cities
  alternatives:
  - cities for chariots
  - chariot towns
  lexicon: HALOT
  rationale: A fairly literal rendering that reflects cities designated for chariot
    forces or infrastructure.
- source_word: עָרֵי הַפָּרָשִׁים
  chosen: the horsemen’s cities
  alternatives:
  - cities of the horsemen
  - cavalry cities
  - horse cities
  lexicon: HALOT
  rationale: פָּרָשִׁים normally refers to horsemen/cavalry rather than horses themselves.
    'Horsemen’s cities' preserves the lexical distinction from chariots, though some
    translations simplify toward 'horse cities.'
- source_word: חֵשֶׁק שְׁלֹמֹה אֲשֶׁר חָשַׁק
  chosen: whatever Solomon desired
  alternatives:
  - all Solomon's desire that he desired
  - all that Solomon delighted to
  - all that Solomon longed
  lexicon: HALOT
  rationale: The Hebrew uses a cognate noun-verb construction for emphasis. English
    cannot reproduce this naturally without awkwardness, so 'whatever Solomon desired'
    captures the sense idiomatically while retaining the breadth of the expression.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to construct
  lexicon: HALOT
  rationale: Standard rendering of בנה in this context of royal building projects.
- source_word: בִּירוּשָׁלִַם וּבַלְּבָנוֹן
  chosen: in Jerusalem, in Lebanon
  alternatives:
  - at Jerusalem and in Lebanon
  lexicon: HALOT
  rationale: Straightforward locative rendering. Lebanon here likely refers to the
    region under Solomon's building activity, not merely the material cedar.
- source_word: בְּכֹל אֶרֶץ מֶמְשַׁלְתּוֹ
  chosen: in all the land of his dominion
  alternatives:
  - throughout all the land of his rule
  - in all the territory under his rule
  - in the whole land of his realm
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes rule/dominion. 'Land of his dominion' preserves the
    concrete-territorial sense of אֶרֶץ together with the abstract notion of royal
    rule.
