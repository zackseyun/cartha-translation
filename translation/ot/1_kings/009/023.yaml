id: 1KI.9.23
reference: 1 Kings 9:23
source:
  edition: WLC
  text: אֵ֣לֶּה שָׂרֵ֣י הַ/נִּצָּבִ֗ים אֲשֶׁ֤ר עַל הַ/מְּלָאכָה֙ לִ/שְׁלֹמֹ֔ה חֲמִשִּׁ֖ים
    וַ/חֲמֵ֣שׁ מֵא֑וֹת הָ/רֹדִ֣ים בָּ/עָ֔ם הָ/עֹשִׂ֖ים בַּ/מְּלָאכָֽה׀־׃
translation:
  text: 'These were the chief officers of the deputies who were over the work for
    Solomon: five hundred and fifty, ruling over the people who were doing the work.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the overseers' for 'the deputies'; the Hebrew term can denote appointed
      officials or those set over others.
    reason: lexical_alternative
  - marker: b
    text: Or 'supervising the people who were doing the work'; the verb can denote
      ruling, having charge, or exercising authority over.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: chief officers
  alternatives:
  - chiefs
  - officials
  - captains
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes officials or leaders. 'Chief officers' fits
    the administrative context of labor oversight better than military-sounding 'captains'
    and is more specific than simply 'chiefs'.
- source_word: הַנִּצָּבִים
  chosen: the deputies
  alternatives:
  - the overseers
  - the officers
  - those stationed
  lexicon: HALOT
  rationale: From נצב in a substantival participial form, likely referring to appointed
    officials or deputies. Because the next clauses already describe being 'over the
    work' and 'ruling over the people,' rendering this as 'deputies' avoids redundancy
    while preserving the sense of appointed subordinate administrators.
- source_word: אֲשֶׁר עַל הַמְּלָאכָה
  chosen: who were over the work
  alternatives:
  - who were in charge of the work
  - who supervised the work
  lexicon: HALOT
  rationale: The phrase literally indicates being over the labor/task. 'Who were over
    the work' preserves the Hebrew structure while remaining natural English.
- source_word: לִשְׁלֹמֹה
  chosen: for Solomon
  alternatives:
  - belonging to Solomon
  - under Solomon
  lexicon: HALOT
  rationale: The preposition ל here marks relation or service. 'For Solomon' naturally
    conveys that the work and its administration were in Solomon's service.
- source_word: חֲמִשִּׁים וַחֲמֵשׁ מֵאוֹת
  chosen: five hundred and fifty
  alternatives:
  - five hundred fifty
  lexicon: HALOT
  rationale: Standard English rendering of the numeral sequence.
- source_word: הָרֹדִים
  chosen: ruling over
  alternatives:
  - having charge over
  - supervising
  - taskmastering
  lexicon: HALOT
  rationale: From רדה, 'to rule/have dominion.' In this labor-administration context,
    'ruling over' is the most direct lexical equivalent. 'Supervising' is possible
    but somewhat softer than the Hebrew verb.
- source_word: בָּעָם
  chosen: the people
  alternatives:
  - the workforce
  - the laborers
  lexicon: HALOT
  rationale: The noun is simply 'the people.' Since the following participle specifies
    that these are the ones doing the work, the main text keeps the broader term rather
    than narrowing it prematurely to 'laborers.'
- source_word: הָעֹשִׂים בַּמְּלָאכָה
  chosen: who were doing the work
  alternatives:
  - who were engaged in the work
  - who were doing the labor
  lexicon: HALOT
  rationale: A straightforward rendering of the participial clause. 'Doing the work'
    is clear, natural, and close to the Hebrew.
