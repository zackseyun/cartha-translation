id: 1KI.9.1
reference: 1 Kings 9:1
source:
  edition: WLC
  text: וַ/יְהִי֙ כְּ/כַלּ֣וֹת שְׁלֹמֹ֔ה לִ/בְנ֥וֹת אֶת בֵּית יְהוָ֖ה וְ/אֶת בֵּ֣ית הַ/מֶּ֑לֶךְ וְ/אֵת֙ כָּל חֵ֣שֶׁק שְׁלֹמֹ֔ה אֲשֶׁ֥ר חָפֵ֖ץ לַ/עֲשֽׂוֹת־־־־׃פ
translation:
  text: And it happened, when Solomon had finished building the house of Yahweh and the king’s house, and all that Solomon desired to make,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all Solomon’s desire' or 'every project Solomon desired to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּכַלּוֹת
  chosen: when ... had finished
  alternatives:
  - as ... finished
  - after ... finished
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of כלה marks temporal circumstance. English pluperfect 'had finished' fits the sequence naturally.
- source_word: לִבְנוֹת
  chosen: building
  alternatives:
  - to build
  lexicon: HALOT
  rationale: With 'had finished,' English idiom prefers the gerund 'finished building' rather than the more wooden 'finished to build.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' 'House of the LORD' preserves the Hebrew expression; 'temple' is interpretive though contextually accurate. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: Literally 'the king's house.' This keeps the parallel with 'the house of the LORD'; 'palace' is a possible contextual gloss but less formally transparent.
- source_word: כָּל חֵשֶׁק שְׁלֹמֹה
  chosen: all that Solomon desired
  alternatives:
  - all Solomon's desire
  - every project Solomon desired
  lexicon: HALOT
  rationale: חֵשֶׁק denotes desire/delight/that which is desired. In this construction with the following relative clause, idiomatic English is 'all that Solomon desired.'
- source_word: חָפֵץ
  chosen: desired
  alternatives:
  - took pleasure
  - was pleased
  - wished
  lexicon: HALOT
  rationale: The verb expresses desire or delight. 'Desired' matches the semantic overlap with חֵשֶׁק and reads naturally in context.
- source_word: לַעֲשׂוֹת
  chosen: to make
  alternatives:
  - to do
  - to accomplish
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). Here it refers to carrying out building or other projects; 'to make' preserves the concrete sense without over-specifying.
