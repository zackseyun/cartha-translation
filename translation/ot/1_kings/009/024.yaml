id: 1KI.9.24
reference: 1 Kings 9:24
source:
  edition: WLC
  text: אַ֣ךְ בַּת פַּרְעֹ֗ה עָֽלְתָה֙ מֵ/עִ֣יר דָּוִ֔ד אֶל בֵּיתָ֖/הּ אֲשֶׁ֣ר בָּֽנָה
    לָ֑/הּ אָ֖ז בָּנָ֥ה אֶת הַ/מִּלּֽוֹא־־־־׃
translation:
  text: But Pharaoh’s daughter went up from the City of David to her house that he
    had built for her; then he built the Millo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the terraces' or 'the fill'; Hebrew Millo likely refers to
      a fortification or supporting earthwork/terrace structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - However
  - Only
  lexicon: HALOT
  rationale: Here the particle marks a transition or qualification relative to the
    surrounding narrative, best rendered with adversative 'But' in natural English.
    'Only' is possible in some contexts, but here it is less idiomatic.
- source_word: בַּת פַּרְעֹה
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies the woman by relation to
    Pharaoh. The possessive form is concise and natural in English.
- source_word: עָלְתָה
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves the Hebrew idiom
    and likely reflects movement in elevation/topography rather than implying a merely
    abstract promotion.
- source_word: מֵעִיר דָּוִד
  chosen: from the City of David
  alternatives:
  - out of the City of David
  lexicon: HALOT
  rationale: Proper place name should be retained. 'From' is the normal rendering
    of the preposition here.
- source_word: אֶל בֵּיתָהּ
  chosen: to her house
  alternatives:
  - to her palace
  - to her home
  lexicon: HALOT
  rationale: בַּיִת can denote house or palace, but the text simply says 'her house.'
    Since the context is royal, 'palace' is interpretive; 'house' preserves the source
    wording while remaining understandable.
- source_word: אֲשֶׁר בָּנָה לָהּ
  chosen: that he had built for her
  alternatives:
  - which he built for her
  lexicon: HALOT
  rationale: The relative clause modifies 'house.' English past perfect ('had built')
    clarifies that the building preceded her move there, though the Hebrew perfect
    itself does not grammatically require pluperfect; context supports it.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking sequence in the narrative. 'Then' is the most
    natural concise rendering.
- source_word: בָּנָה
  chosen: he built
  alternatives:
  - he began to build
  lexicon: HALOT
  rationale: Simple qatal narrative statement. No warrant for adding 'began'.
- source_word: הַמִּלּוֹא
  chosen: the Millo
  alternatives:
  - the fill
  - the terraces
  - the supporting terraces
  lexicon: HALOT
  rationale: This is a technical/topographical term and likely a known structure or
    fortification in Jerusalem. Transliteration best preserves the referent without
    overcommitting to a debated reconstruction of its exact architectural sense.
