id: 1KI.9.17
reference: 1 Kings 9:17
source:
  edition: WLC
  text: וַ/יִּ֤בֶן שְׁלֹמֹה֙ אֶת גָּ֔זֶר וְ/אֶת בֵּ֥ית חֹרֹ֖ן תַּחְתּֽוֹן־־׃
translation:
  text: And Solomon built Gezer and Lower Beth-horon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Beth-horon the lower.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fortified
  - rebuilt
  lexicon: HALOT
  rationale: The verb בנה in the qal wayyiqtol normally means 'built.' In this royal-building
    context it can imply construction or reconstruction/fortification, but the plain
    lexical sense should be retained in the main text.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name שְׁלֹמֹה, following
    the translation philosophy of transliterating names.
- source_word: גָּזֶר
  chosen: Gezer
  rationale: Standard transliteration of the place name גָּזֶר.
- source_word: בֵּית חֹרֹן תַּחְתּוֹן
  chosen: Lower Beth-horon
  alternatives:
  - Beth-horon the lower
  - Lower Beth Horon
  lexicon: HALOT
  rationale: The construct phrase with תַּחְתּוֹן identifies the lower of the two
    Beth-horons. 'Lower Beth-horon' is idiomatic modern English while preserving the
    geographic distinction.
- source_word: אֶת / וְאֶת
  chosen: '[not translated separately]'
  rationale: These are direct-object markers and are not represented by a separate
    English word; their function is reflected in the syntax of the translation.
