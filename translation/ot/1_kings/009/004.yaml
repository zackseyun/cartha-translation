id: 1KI.9.4
reference: 1 Kings 9:4
source:
  edition: WLC
  text: וְ/אַתָּ֞ה אִם תֵּלֵ֣ךְ לְ/פָנַ֗/י כַּ/אֲשֶׁ֨ר הָלַ֜ךְ דָּוִ֤ד אָבִ֨י/ךָ֙
    בְּ/תָם לֵבָ֣ב וּ/בְ/יֹ֔שֶׁר לַ/עֲשׂ֕וֹת כְּ/כֹ֖ל אֲשֶׁ֣ר צִוִּיתִ֑י/ךָ חֻקַּ֥/י
    וּ/מִשְׁפָּטַ֖/י תִּשְׁמֹֽר־־׃
translation:
  text: And as for you, if you walk before me as David your father walked, with integrity
    of heart and with uprightness, doing according to all that I have commanded you,
    and if you keep my statutes and my judgments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with blamelessness of heart.' The Hebrew term emphasizes wholeness or
      integrity, not necessarily absolute sinlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'my statutes and my ordinances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: And as for you
  alternatives:
  - And you
  - Now you
  lexicon: HALOT
  rationale: Marks a shift to direct address with mild emphasis. 'As for you' brings
    out the discourse contrast more naturally than a bare 'and you.'
- source_word: אִם
  chosen: if
  alternatives:
  - provided that
  lexicon: HALOT
  rationale: Introduces a straightforward condition; 'if' is the most natural and
    sufficiently formal rendering.
- source_word: תֵּלֵךְ לְפָנַי
  chosen: you walk before me
  alternatives:
  - you walk in my presence
  - you live before me
  lexicon: HALOT
  rationale: Retains the covenantal idiom of conduct before God without over-paraphrasing.
    'Walk before me' is established biblical English and still understandable.
- source_word: כַּאֲשֶׁר הָלַךְ דָּוִד אָבִיךָ
  chosen: as David your father walked
  alternatives:
  - just as David your father walked
  lexicon: HALOT
  rationale: Preserves the comparison with David's manner of life; 'walked' keeps
    the Hebrew verbal parallel with the prior clause.
- source_word: בְּתָם לֵבָב
  chosen: with integrity of heart
  alternatives:
  - with blamelessness of heart
  - with a whole heart
  lexicon: HALOT
  rationale: תָּם conveys completeness/integrity rather than sinless perfection. 'Integrity
    of heart' communicates moral wholeness and sincerity.
- source_word: וּבְיֹשֶׁר
  chosen: and with uprightness
  alternatives:
  - and with honesty
  - and with rectitude
  lexicon: HALOT
  rationale: A moral term denoting straightness/upright conduct. 'Uprightness' is
    clear, dignified, and close to the Hebrew image.
- source_word: לַעֲשׂוֹת כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  chosen: doing according to all that I have commanded you
  alternatives:
  - to do according to all that I have commanded you
  - doing all that I have commanded you
  lexicon: HALOT
  rationale: Links the manner of walking with obedient action. 'According to all that'
    preserves the comprehensive force of כְּכֹל.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  lexicon: HALOT
  rationale: Standard rendering for חֹק/חֻקִּים in legal/covenantal contexts; preserves
    distinction from the following term.
- source_word: וּמִשְׁפָּטַי
  chosen: and my judgments
  alternatives:
  - and my rules
  - and my ordinances
  lexicon: HALOT
  rationale: Keeps lexical distinction from 'statutes.' 'Judgments' is somewhat formal
    but reflects משפטים as judicial decisions/ordinances. 'Ordinances' is possible,
    but 'judgments' better preserves the Hebrew legal nuance.
- source_word: תִּשְׁמֹר
  chosen: you keep
  alternatives:
  - you observe
  - you guard
  lexicon: HALOT
  rationale: In covenant contexts שׁמר commonly means keep/observe. 'Keep' is idiomatic
    and concise.
