theological_decisions:
- issue: Characterization of David's example
  chosen_reading: Render David as walking 'with integrity of heart and with uprightness'
    without implying sinless perfection.
  alternative_readings:
  - Render more strongly as 'blameless heart'
  rationale: The verse presents David as a covenantal model of loyal devotion, not
    as morally flawless in every respect. 'Integrity' preserves the commendatory force
    while avoiding a doctrinally misleading implication of perfection.
  doctrine_reference: Preserve theological tension rather than resolve it.
