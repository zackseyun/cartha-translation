id: 1KI.9.9
reference: 1 Kings 9:9
source:
  edition: WLC
  text: וְ/אָמְר֗וּ עַל֩ אֲשֶׁ֨ר עָזְב֜וּ אֶת יְהוָ֣ה אֱלֹהֵי/הֶ֗ם אֲשֶׁ֨ר הוֹצִ֣יא אֶת אֲבֹתָ/ם֮ מֵ/אֶ֣רֶץ מִצְרַיִם֒ וַֽ/יַּחֲזִ֨קוּ֙ בֵּ/אלֹהִ֣ים אֲחֵרִ֔ים ו/ישתחו לָ/הֶ֖ם וַ/יַּעַבְדֻ֑/ם עַל כֵּ֗ן הֵבִ֤יא יְהוָה֙ עֲלֵי/הֶ֔ם אֵ֥ת כָּל הָ/רָעָ֖ה הַ/זֹּֽאת־־־־׃פ
translation:
  text: And they will say, ‘Because they abandoned Yahweh their God, who brought their fathers out of the land of Egypt, and they held fast to other gods and bowed down to them and served them, therefore Yahweh brought all this disaster on them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their ancestors.” The Hebrew reads “their fathers.”
    reason: lexical_alternative
  - marker: b
    text: Or “held fast to other gods.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “all this evil”; here the word refers to calamity or disaster brought in judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And they will say
  alternatives:
  - And people will say
  - Then they will say
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this explanatory context is best rendered as future-like narrative/report speech in English: a response observers will give when asked about the devastation (cf. preceding verse).'
- source_word: עַל אֲשֶׁר
  chosen: Because
  alternatives:
  - On account of which
  - For that
  lexicon: HALOT
  rationale: The preposition plus relative introduces the reason/cause for the judgment; idiomatic English compresses this to 'Because'.
- source_word: עָזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: '''Abandoned'' communicates covenantal desertion in clear modern English without the archaic tone of ''forsook''.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: With YHWH as the referent and the plural form functioning as Israel's singular designation for God, the singular sense is required.
- source_word: הוֹצִיא ... מֵאֶרֶץ מִצְרַיִם
  chosen: brought their fathers out of the land of Egypt
  alternatives:
  - brought out their ancestors from the land of Egypt
  - led their fathers out of Egypt
  lexicon: HALOT
  rationale: This preserves the exodus formula closely. 'Fathers' matches the Hebrew and the project's gender-accurate policy better than flattening to 'ancestors' in the main text.
- source_word: אֲבֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: Masculine plural with representative ancestral force; rendered gender-accurately as 'fathers' per translation philosophy.
- source_word: וַיַּחֲזִקוּ בֵּאלֹהִים אֲחֵרִים
  chosen: they clung to other gods
  alternatives:
  - they took hold of other gods
  - they held fast to other gods
  lexicon: HALOT
  rationale: חזק with ב can denote grasping/holding fast. 'Clung to' communicates deliberate attachment and covenantal allegiance in natural English.
- source_word: וישתחו להם
  chosen: bowed down to them
  alternatives:
  - prostrated themselves before them
  - worshiped them
  lexicon: HALOT
  rationale: The verb specifically denotes bowing/prostration. 'Bowed down to them' preserves the physical act, while worship is implied by the larger clause and following 'served them.'
- source_word: וַיַּעַבְדֻם
  chosen: served them
  alternatives:
  - worshiped them
  lexicon: HALOT
  rationale: עבד in idolatry contexts can mean religious service/worship. 'Served them' keeps the lexical distinction from the previous verb and preserves the progression of attachment, prostration, and cultic service.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks the consequence of Israel's apostasy in a concise and formal enough way for prophetic/judicial speech.
- source_word: הֵבִיא ... אֵת כָּל הָרָעָה הַזֹּאת
  chosen: brought all this disaster on them
  alternatives:
  - brought all this evil on them
  - brought all this calamity upon them
  lexicon: HALOT
  rationale: רָעָה here refers to covenantal calamity/judgment rather than moral evil. 'Disaster' is the clearest modern English choice.
