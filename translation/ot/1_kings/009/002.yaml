id: 1KI.9.2
reference: 1 Kings 9:2
source:
  edition: WLC
  text: וַ/יֵּרָ֧א יְהוָ֛ה אֶל שְׁלֹמֹ֖ה שֵׁנִ֑ית כַּ/אֲשֶׁ֛ר נִרְאָ֥ה אֵלָ֖י/ו בְּ/גִבְעֽוֹן־׃
translation:
  text: Then Yahweh appeared to Solomon a second time, as he had appeared to him at Gibeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again'; Hebrew literally 'a second time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: From ראה in the Niphal, here denoting a visible or manifest appearance. 'Appeared' is the most natural English rendering in this theophanic context and matches the parallel with the later Niphal form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: The adverb explicitly marks sequence. 'A second time' is slightly more precise than simply 'again' and preserves the narrative emphasis on this being Solomon's second divine appearance.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the prior appearance at Gibeon. 'As' is concise and natural while preserving the comparative force.
- source_word: נִרְאָה
  chosen: had appeared
  alternatives:
  - appeared
  - was seen
  lexicon: HALOT
  rationale: Also Niphal of ראה. Rendered with English past perfect ('had appeared') because it refers to the earlier event at Gibeon relative to the main clause.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - before him
  lexicon: HALOT
  rationale: 'The preposition אֶל with pronominal suffix is most straightforwardly directional/relational here: ''to him.'' ''Before him'' would overinterpret the mode of appearance.'
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - in Gibeon
  lexicon: HALOT
  rationale: For a place name with ב, English idiom favors 'at Gibeon' for the location of the prior appearance.
