id: 1KI.9.3
reference: 1 Kings 9:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלָ֗י/ו שָׁ֠מַעְתִּי אֶת תְּפִלָּתְ/ךָ֣ וְ/אֶת תְּחִנָּתְ/ךָ֮
    אֲשֶׁ֣ר הִתְחַנַּ֣נְתָּה לְ/פָנַ/י֒ הִקְדַּ֗שְׁתִּי אֶת הַ/בַּ֤יִת הַ/זֶּה֙ אֲשֶׁ֣ר
    בָּנִ֔תָה לָ/שֽׂוּם שְׁמִ֥/י שָׁ֖ם עַד עוֹלָ֑ם וְ/הָי֨וּ עֵינַ֧/י וְ/לִבִּ֛/י
    שָׁ֖ם כָּל הַ/יָּמִֽים־־־־־־׃
translation:
  text: And the LORD said to him, “I have heard your prayer and your plea for favor
    that you made before me. I have consecrated this house that you built, to put
    my name there forever, and my eyes and my heart will be there all the days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your supplication' or 'your entreaty' for תְּחִנָּה, a humble plea for
      favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this house'; that is, the temple Solomon built.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my eyes and my heart will be there all the days,' an anthropomorphic
      expression for the LORD's ongoing attention and concern.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and matching the DOCTRINE.md contested-terms guidance.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Rendered as present-result perfect in English to reflect the completed
    action with present relevance in God's response to Solomon's prayer.
- source_word: תְּפִלָּתְךָ
  chosen: your prayer
  lexicon: HALOT
  rationale: Standard rendering for תפלה in a petitionary context.
- source_word: תְּחִנָּתְךָ
  chosen: your plea for favor
  alternatives:
  - your supplication
  - your entreaty
  - your plea
  lexicon: HALOT
  rationale: 'Distinguished from ''prayer'' to preserve the paired nuance: a humble
    appeal for grace or favor, not merely a second synonym.'
- source_word: הִתְחַנַּנְתָּה
  chosen: that you made
  alternatives:
  - that you pleaded
  - that you entreated
  lexicon: HALOT
  rationale: The verb is cognate with תחנה and denotes earnest supplication. 'Made'
    keeps the English smooth with the object 'plea for favor,' while the nuance is
    preserved in the noun choice and documented here.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: A natural and sufficiently formal rendering of the idiom.
- source_word: הִקְדַּשְׁתִּי
  chosen: I have consecrated
  alternatives:
  - I have sanctified
  - I have made holy
  lexicon: HALOT
  rationale: Conveys setting apart as holy for divine use. 'Consecrated' is readable
    modern English while retaining cultic force.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Hebrew says 'house.' Although it refers to the temple, 'house' preserves
    the source wording and its theological resonance as the house for the LORD's name.
- source_word: לָשׂוּם שְׁמִי שָׁם
  chosen: to put my name there
  alternatives:
  - to place my name there
  - for my name to be there
  lexicon: HALOT
  rationale: Retains the covenantal-temple idiom without overinterpreting it. The
    phrase speaks of God's name dwelling there, not a crude physical localization
    of God himself.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Natural English for the idiom. In context it expresses enduring intent/covenantal
    permanence rather than requiring a philosophical claim about an unconditioned
    absolute apart from the broader narrative.
- source_word: עֵינַי וְלִבִּי
  chosen: my eyes and my heart
  alternatives:
  - my eyes and my mind
  - my attention and my heart
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic imagery of divine attention
    and affection/concern. Dynamic flattening would lose the force of the Hebrew expression.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - continually
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew idiom rather than smoothing it to an abstract
    adverb.
