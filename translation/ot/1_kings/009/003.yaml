theological_decisions:
- issue: Anthropomorphic language for God in 'my eyes and my heart will be there'
  chosen_reading: Retain the anthropomorphic expression literally
  alternative_readings:
  - Paraphrase as 'my attention and care will be there'
  rationale: The Hebrew intentionally uses embodied language to express the LORD's
    ongoing regard and covenantal concern for the temple. Preserving the imagery maintains
    the text's theological texture without implying creaturely limitation in God.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Meaning of 'to put my name there forever'
  chosen_reading: Preserve the temple-name idiom without expanding it into a doctrinal
    paraphrase
  alternative_readings:
  - '''to dwell there forever'''
  - '''to be worshiped there forever'''
  rationale: The text specifically says God places his name there. This covenantal
    formula should not be collapsed into a more interpretive statement, even if such
    implications are related.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
