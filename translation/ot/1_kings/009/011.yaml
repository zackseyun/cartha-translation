id: 1KI.9.11
reference: 1 Kings 9:11
source:
  edition: WLC
  text: חִירָ֣ם מֶֽלֶךְ צֹ֠ר נִשָּׂ֨א אֶת שְׁלֹמֹ֜ה בַּ/עֲצֵי֩ אֲרָזִ֨ים וּ/בַ/עֲצֵ֧י
    בְרוֹשִׁ֛ים וּ/בַ/זָּהָ֖ב לְ/כָל חֶפְצ֑/וֹ אָ֡ז יִתֵּן֩ הַ/מֶּ֨לֶךְ שְׁלֹמֹ֤ה
    לְ/חִירָם֙ עֶשְׂרִ֣ים עִ֔יר בְּ/אֶ֖רֶץ הַ/גָּלִֽיל־־־׃
translation:
  text: Hiram king of Tyre had supplied Solomon with cedar timber, cypress timber,
    and gold, according to all his desire; then King Solomon gave Hiram twenty cities
    in the land of Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'juniper,' 'fir,' or another conifer; the exact species denoted by Hebrew
      berosh is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשָּׂא
  chosen: had supplied
  alternatives:
  - supported
  - provided
  - furnished
  - lifted/carried
  lexicon: HALOT
  rationale: The verb נָשָׂא normally means 'lift, carry, bear,' but in this construction
    with a personal object and materials introduced by ב, the contextual sense is
    that Hiram furnished or supplied Solomon with resources. 'Had supplied' fits the
    narrative background and the pluperfect sense often conveyed in English for this
    circumstantial clause before the main action 'then ... gave'.
- source_word: בַּעֲצֵי אֲרָזִים
  chosen: with cedar timber
  alternatives:
  - with cedar wood
  - with cedars
  lexicon: HALOT
  rationale: עֵץ in construct with a tree species often refers to wood/timber rather
    than living trees. 'Cedar timber' is natural English and reflects building materials
    in context.
- source_word: וּבַעֲצֵי בְרוֹשִׁים
  chosen: and cypress timber
  alternatives:
  - and juniper timber
  - and fir timber
  - and pine timber
  lexicon: HALOT
  rationale: בְּרוֹשׁ is a debated tree term. 'Cypress' is a common modern rendering
    and likely fits the construction-material context better than older 'fir.' Because
    the exact species is uncertain, an alternative is preserved in a footnote.
- source_word: וּבַזָּהָב
  chosen: and gold
  lexicon: HALOT
  rationale: Straightforward material term; no expansion beyond the Hebrew.
- source_word: לְכָל חֶפְצוֹ
  chosen: according to all his desire
  alternatives:
  - for all he desired
  - according to all his pleasure
  - for all his wish
  lexicon: HALOT
  rationale: חֵפֶץ denotes desire, pleasure, or what one takes delight in. Here it
    refers to the full extent of Solomon's requested materials. 'According to all
    his desire' preserves the breadth without over-paraphrasing.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Simple temporal/sequential marker linking Hiram's supplying and Solomon's
    giving.
- source_word: יִתֵּן
  chosen: gave
  alternatives:
  - would give
  - then gave
  lexicon: HALOT
  rationale: Although morphologically imperfect, in narrative sequence after אָז it
    functions as a past narrative event. English idiom prefers simple past here.
- source_word: עֶשְׂרִים עִיר
  chosen: twenty cities
  alternatives:
  - twenty towns
  lexicon: HALOT
  rationale: עִיר commonly means city/town. 'Cities' is the standard rendering and
    suits the geopolitical context.
- source_word: בְּאֶרֶץ הַגָּלִיל
  chosen: in the land of Galilee
  alternatives:
  - in the region of Galilee
  - in the land of the Galil
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/region. 'Land of Galilee' is a transparent rendering
    of the Hebrew phrase and preserves the place-name without interpretive narrowing.
- source_word: חִירָם ... שְׁלֹמֹה ... צֹר ... הַגָּלִיל
  chosen: Hiram ... Solomon ... Tyre ... Galilee
  alternatives:
  - Huram for חִירָם
  rationale: Per translation philosophy, personal and place names are transliterated
    by standard English conventions. 'Hiram' is the conventional form for חִירָם in
    Kings.
