id: 1KI.9.26
reference: 1 Kings 9:26
source:
  edition: WLC
  text: וָ/אֳנִ֡י עָשָׂה֩ הַ/מֶּ֨לֶךְ שְׁלֹמֹ֜ה בְּ/עֶצְיֽוֹן גֶּ֨בֶר אֲשֶׁ֧ר אֶת
    אֵל֛וֹת עַל שְׂפַ֥ת יַם ס֖וּף בְּ/אֶ֥רֶץ אֱדֽוֹם־־־־׃
translation:
  text: King Solomon also built a fleet at Ezion-geber, which is near Eloth on the
    shore of the Red Sea, in the land of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds''; traditionally rendered ''Red Sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֳנִי
  chosen: also
  alternatives:
  - and a fleet
  - and ships
  lexicon: HALOT
  rationale: The noun אֳנִי denotes a ship or fleet. Because English idiom with עָשָׂה
    ('made') is awkward if rendered 'made a ship,' and the context concerns maritime
    enterprise, 'built a fleet' is a natural optimal-equivalence rendering. The prefixed
    conjunction is represented by 'also' to connect with the preceding narrative.
- source_word: עָשָׂה
  chosen: built
  alternatives:
  - made
  - constructed
  lexicon: HALOT
  rationale: Although the verb literally means 'made/did,' with אֳנִי in this context
    it refers to constructing ships. 'Built' is the clearest idiomatic English rendering.
- source_word: בְּעֶצְיוֹן גֶּבֶר
  chosen: at Ezion-geber
  alternatives:
  - in Ezion-geber
  lexicon: HALOT
  rationale: This is a place name and is transliterated. The preposition בְּ can be
    rendered 'at' for a specific port location in English.
- source_word: אֲשֶׁר אֶת אֵלוֹת
  chosen: which is near Eloth
  alternatives:
  - which is beside Eloth
  - which is with Eloth
  lexicon: HALOT
  rationale: The construction indicates proximity to Eloth. Since the Hebrew uses
    אֵת in a locative association sense here, 'near' communicates the relationship
    clearly in modern English.
- source_word: עַל שְׂפַת יַם סוּף
  chosen: on the shore of the Red Sea
  alternatives:
  - on the shore of the Sea of Reeds
  - by the shore of the Red Sea
  lexicon: HALOT
  rationale: שְׂפַת means 'lip/edge/shore,' so 'shore' is appropriate. יַם סוּף is
    traditionally 'Red Sea,' though literally it may mean 'Sea of Reeds.' In this
    geographic setting near Edom and Eloth, 'Red Sea' is the conventional and contextually
    intelligible rendering; the lexical alternative is preserved in a footnote.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The fuller phrase preserves the Hebrew wording and geographic emphasis
    better than the shorter 'in Edom.'
