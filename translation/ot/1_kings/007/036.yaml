id: 1KI.7.36
reference: 1 Kings 7:36
source:
  edition: WLC
  text: וַ/יְפַתַּ֤ח עַל הַ/לֻּחֹת֙ יְדֹתֶ֔י/הָ וְ/עַל֙ ו/מסגרתי/ה כְּרוּבִ֖ים אֲרָי֣וֹת
    וְ/תִמֹרֹ֑ת כְּ/מַֽעַר אִ֥ישׁ וְ/לֹי֖וֹת סָבִֽיב־־׃
translation:
  text: On the panels of its supports and on its frames he engraved cherubim, lions,
    and palm trees, according to the space of each, with wreaths all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wherever there was room for each figure.' The Hebrew phrase is difficult
      and likely describes the arrangement of the carvings according to the available
      space.
    reason: lexical_alternative
  - marker: b
    text: Or 'garlands' for 'wreaths.' The Hebrew term likely refers to ornamental
      festoons surrounding the figures.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְפַתַּח
  chosen: he engraved
  alternatives:
  - he carved
  - he cut in
  lexicon: HALOT
  rationale: In this architectural/decorative context, the verb refers to incising
    ornamental figures into metal or woodwork. 'Engraved' fits the craftsmanship setting
    better than the broader 'opened' sense of the root.
- source_word: הַלֻּחֹת
  chosen: the panels
  alternatives:
  - the tablets
  - the plates
  lexicon: HALOT
  rationale: Here the word refers to structural decorative surfaces on the stands,
    not writing tablets. 'Panels' best matches the furnishing context and readable
    modern English.
- source_word: יְדֹתֶיהָ
  chosen: its supports
  alternatives:
  - its hands
  - its sides
  lexicon: HALOT
  rationale: Literally 'its hands,' but in this description of the stand's construction
    the term is idiomatic for projecting supports or side-pieces. 'Supports' conveys
    the architectural function without wooden literalism.
- source_word: מַסְגְּרֹתֶיהָ
  chosen: its frames
  alternatives:
  - its borders
  - its moldings
  lexicon: HALOT
  rationale: The term denotes enclosing structural borders or frames on the stand.
    'Frames' is a natural English equivalent in this artisan context.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliterated form for these
    throne-guardian beings in temple/tabernacle imagery and avoids the misleading
    modern connotations of ''cherubs''.'
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward zoological/decorative term in the list of engraved figures.
- source_word: תִמֹרֹת
  chosen: palm trees
  alternatives:
  - palms
  lexicon: HALOT
  rationale: In temple decoration contexts this noun refers to palm-tree motifs. 'Palm
    trees' is explicit and clear.
- source_word: כְּמַעַר אִישׁ
  chosen: according to the space of each
  alternatives:
  - wherever there was room for each
  - according to each one's clear space
  lexicon: HALOT
  rationale: This difficult phrase most naturally indicates arrangement in keeping
    with the available space allotted to each figure. 'According to the space of each'
    preserves the distributive sense without over-paraphrasing.
- source_word: לֹיֹת
  chosen: wreaths
  alternatives:
  - garlands
  - spirals
  lexicon: HALOT
  rationale: The noun likely denotes decorative festoons or wreath-like ornaments
    accompanying the carved figures. 'Wreaths' is a standard rendering in this temple-furnishing
    context.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - surrounding
  lexicon: HALOT
  rationale: This adverb indicates encircling placement of the decorative elements;
    'all around' is idiomatic modern English.
