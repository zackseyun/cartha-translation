id: 1KI.7.28
reference: 1 Kings 7:28
source:
  edition: WLC
  text: וְ/זֶ֛ה מַעֲשֵׂ֥ה הַ/מְּכוֹנָ֖ה מִסְגְּרֹ֣ת לָ/הֶ֑ם וּ/מִסְגְּרֹ֖ת בֵּ֥ין
    הַ/שְׁלַבִּֽים׃
translation:
  text: 'And this was the construction of the stand: they had panels, and there were
    panels between the supports.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frames' for 'panels' (Hebrew מִסְגְּרֹת), referring to framed sections
      of the stand.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term translated 'supports' may also be rendered 'crossbars,'
      'uprights,' or 'rails'; the exact architectural feature is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה
  chosen: And this
  alternatives:
  - Now this
  - This
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a descriptive explanation
    of the stand's design. 'And this' preserves the Hebrew discourse flow naturally
    in English.
- source_word: מַעֲשֵׂה
  chosen: construction
  alternatives:
  - workmanship
  - structure
  - work
  lexicon: HALOT
  rationale: In this architectural context, the noun refers to the made form or construction
    details rather than abstract 'work.' 'Construction' is clear modern English and
    fits the technical description.
- source_word: הַמְּכוֹנָה
  chosen: the stand
  alternatives:
  - the base
  - the carriage
  lexicon: HALOT
  rationale: מְכוֹנָה in this passage denotes the wheeled stands/bases made for the
    lavers. 'Stand' is a clear, contextually appropriate rendering in modern English;
    'base' is possible but slightly less natural here.
- source_word: מִסְגְּרֹת
  chosen: panels
  alternatives:
  - frames
  - borders
  lexicon: HALOT
  rationale: The term refers to framed sections or inset side pieces in the stand's
    construction. 'Panels' best captures the likely architectural feature in readable
    English, while 'frames' is preserved as an alternative because the Hebrew can
    denote framing elements.
- source_word: לָהֶם
  chosen: they had
  alternatives:
  - belonged to them
  - for them
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix indicates possession: the stands
    had such panels. Rendering it idiomatically as ''they had'' communicates the sense
    better than a wooden ''for them.'''
- source_word: וּמִסְגְּרֹת
  chosen: and there were panels
  alternatives:
  - and panels
  - with panels
  lexicon: HALOT
  rationale: The repeated noun is retained to mirror the Hebrew description. Supplying
    'there were' makes the English sentence grammatical while preserving the descriptive
    force.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition marks location between structural elements; 'between'
    is the straightforward spatial sense.
- source_word: הַשְׁלַבִּים
  chosen: the supports
  alternatives:
  - the crossbars
  - the uprights
  - the rails
  lexicon: HALOT
  rationale: The noun denotes joining or connecting structural members in this architectural
    description. Because the exact form is somewhat technical and uncertain, 'supports'
    gives a cautious, comprehensible rendering. More specific options such as 'crossbars'
    or 'uprights' remain possible and are preserved in a footnote.
