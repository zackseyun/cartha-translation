id: 1KI.7.19
reference: 1 Kings 7:19
source:
  edition: WLC
  text: וְ/כֹֽתָרֹ֗ת אֲשֶׁר֙ עַל רֹ֣אשׁ הָ/עַמּוּדִ֔ים מַעֲשֵׂ֖ה שׁוּשַׁ֣ן בָּֽ/אוּלָ֑ם
    אַרְבַּ֖ע אַמּֽוֹת־׃
translation:
  text: And the capitals that were on the tops of the pillars were made like a lily
    blossom in the portico, four cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the vestibule' or 'on the porch.' The Hebrew אוּלָם denotes the entrance
      hall or portico of the temple structure.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'like a lily.' Some understand שׁוּשַׁן here as a lotus-shaped
      floral design in the pillar capitals.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''four cubits.'' The measurement likely describes the height of
      the lily-shaped portion of the capitals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּתָרֹת
  chosen: capitals
  alternatives:
  - crowns
  - chapiters
  lexicon: HALOT
  rationale: In architectural context referring to the tops of pillars, 'capitals'
    is the clearest modern English term. 'Chapiters' is traditional but archaic; 'crowns'
    is too general.
- source_word: רֹאשׁ
  chosen: tops
  alternatives:
  - heads
  lexicon: HALOT
  rationale: Although literally 'head,' in English architectural description 'tops'
    best conveys the sense naturally.
- source_word: הָעַמּוּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: Both are possible in architectural English; 'pillars' is retained for
    consistency with common temple-description usage and the likely broader structural
    sense.
- source_word: מַעֲשֵׂה
  chosen: were made like
  alternatives:
  - work of
  - design of
  - in the form of
  lexicon: HALOT
  rationale: The noun means 'work/design/made thing.' In this verbless clause, idiomatic
    English requires supplying a copular idea. 'Were made like' communicates form
    rather than manufacture alone.
- source_word: שׁוּשַׁן
  chosen: a lily blossom
  alternatives:
  - lily
  - lotus
  lexicon: HALOT
  rationale: The term denotes a flower, commonly rendered 'lily.' 'Lily blossom' makes
    explicit that the comparison is to floral form. 'Lotus' is proposed by some in
    architectural contexts, but 'lily' remains the standard and more direct rendering.
- source_word: בָּאוּלָם
  chosen: in the portico
  alternatives:
  - in the vestibule
  - on the porch
  lexicon: HALOT
  rationale: אוּלָם refers to the temple's entrance hall/portico. 'Portico' is clear
    modern architectural English; 'vestibule' is possible but less natural here, and
    'porch' may sound too domestic.
- source_word: אַרְבַּע אַמּוֹת
  chosen: four cubits
  alternatives:
  - four cubits high
  lexicon: HALOT
  rationale: The Hebrew gives the measurement directly without an explicit adjective.
    English can leave it as 'four cubits,' with the dimensional force understood from
    context. 'High' is interpretive and better left implicit.
