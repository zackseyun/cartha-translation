id: 1KI.7.9
reference: 1 Kings 7:9
source:
  edition: WLC
  text: כָּל אֵ֜לֶּה אֲבָנִ֤ים יְקָרֹת֙ כְּ/מִדֹּ֣ת גָּזִ֔ית מְגֹרָר֥וֹת בַּ/מְּגֵרָ֖ה
    מִ/בַּ֣יִת וּ/מִ/ח֑וּץ וּ/מִ/מַּסָּד֙ עַד הַ/טְּפָח֔וֹת וּ/מִ/ח֖וּץ עַד הֶ/חָצֵ֥ר
    הַ/גְּדוֹלָֽה־־־׃
translation:
  text: All these were costly stones, cut according to measure, sawed with a saw on
    the inner and outer faces, from the foundation to the coping, and on the outside
    as far as the great court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precious stones.' Here the sense is likely expensive, high-quality building
      stones rather than gemstones.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the tĕfaḥot'; the exact architectural feature is uncertain. It
      may refer to the upper finishing, such as the coping or top course.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים יְקָרֹת
  chosen: costly stones
  alternatives:
  - precious stones
  - valuable stones
  lexicon: HALOT
  rationale: יְקָרֹת can denote precious/valuable/costly. In this architectural context,
    the point is the high-quality, expensive building material rather than gemstones,
    so 'costly stones' best fits idiomatic English and the construction setting.
- source_word: כְּמִדֹּת גָּזִית
  chosen: cut according to measure
  alternatives:
  - according to the measurements of hewn stone
  - hewn to measure
  lexicon: HALOT
  rationale: The phrase combines the idea of standard dimensions (מִדּוֹת) with dressed/hewn
    stone (גָּזִית). 'Cut according to measure' communicates both the shaping and
    the precise sizing without becoming wooden.
- source_word: מְגֹרָרוֹת בַּמְּגֵרָה
  chosen: sawed with a saw
  alternatives:
  - cut with a saw
  - trimmed with a saw
  lexicon: HALOT
  rationale: The participle plus instrument noun is emphatic and concrete. 'Sawed
    with a saw' preserves the explicitness of the Hebrew, even if slightly repetitive
    in English, and reflects finished stonework.
- source_word: מִבַּיִת וּמִחוּץ
  chosen: on the inner and outer faces
  alternatives:
  - inside and outside
  - from within and from without
  lexicon: HALOT
  rationale: In context this likely describes the stone finishing on both exposed
    sides/surfaces of the masonry rather than merely spatial location. 'On the inner
    and outer faces' makes the architectural sense clearer in English.
- source_word: מִמַּסָּד
  chosen: from the foundation
  alternatives:
  - from the base
  lexicon: HALOT
  rationale: מַסָּד refers to a foundation/base in building context. 'Foundation'
    is the most natural architectural term here.
- source_word: עַד הַטְּפָחוֹת
  chosen: to the coping
  alternatives:
  - to the top course
  - to the roof-beams
  lexicon: HALOT
  rationale: הַטְּפָחוֹת is difficult and context-specific. In this building description
    it most plausibly refers to the upper finishing or coping/top edge of the structure.
    'Coping' is concise and architectural, while preserving the uncertainty better
    than a more specific but less secure term.
- source_word: וּמִחוּץ עַד הֶחָצֵר הַגְּדוֹלָה
  chosen: and on the outside as far as the great court
  alternatives:
  - and outside up to the great court
  - and from the outside to the great courtyard
  lexicon: HALOT
  rationale: The phrase extends the description outward to the larger court area.
    'Great court' is a straightforward rendering of חָצֵר הַגְּדוֹלָה and matches
    common architectural terminology in Kings.
