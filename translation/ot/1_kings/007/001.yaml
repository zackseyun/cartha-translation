id: 1KI.7.1
reference: 1 Kings 7:1
source:
  edition: WLC
  text: וְ/אֶת בֵּית/וֹ֙ בָּנָ֣ה שְׁלֹמֹ֔ה שְׁלֹ֥שׁ עֶשְׂרֵ֖ה שָׁנָ֑ה וַ/יְכַ֖ל אֶת
    כָּל בֵּיתֽ/וֹ־־־׃
translation:
  text: Solomon built his own house for thirteen years, and he finished all his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his palace.' The Hebrew 'house' can refer to a royal residence or palace
      complex in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - his palace
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house,' but in royal contexts can extend to a
    palace or household complex. Here the immediate contrast with the temple-building
    context supports a royal residence/palace sense, yet 'house' preserves the Hebrew
    term and allows the broader complex to remain implicit. 'Own' reflects the contrastive
    force of וְאֶת at the head of the clause.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - was building
  - constructed
  lexicon: HALOT
  rationale: 'Qal perfect 3ms gives the simple past narrative sense here: ''built.''
    ''Constructed'' is possible but less natural in readable modern English.'
- source_word: שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  chosen: for thirteen years
  alternatives:
  - thirteen years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration of time. The phrase
    denotes the length of the building project.
- source_word: וַיְכַל
  chosen: he finished
  alternatives:
  - he completed
  - he brought to completion
  lexicon: HALOT
  rationale: 'From כלה, the wayyiqtol advances the narrative: after building over
    thirteen years, Solomon ''finished'' the project. ''Finished'' is the most natural
    concise rendering.'
- source_word: כָּל בֵּיתוֹ
  chosen: all his house
  alternatives:
  - his whole house
  - all his palace complex
  - all his household
  lexicon: HALOT
  rationale: כָּל marks totality. Retaining 'house' preserves lexical continuity with
    the earlier בֵּיתוֹ. In context it refers to the entirety of the residence/building
    complex, not merely the people of his household.
- source_word: וְאֶת
  chosen: '[contrastive clause opening reflected by word order and ''own'']'
  alternatives:
  - and
  - now
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces a new but related topic
    in contrast with the temple account. English does not naturally render the particle
    directly, so its discourse force is conveyed by the clause structure and by 'his
    own house.'
