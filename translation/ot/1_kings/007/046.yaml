id: 1KI.7.46
reference: 1 Kings 7:46
source:
  edition: WLC
  text: בְּ/כִכַּ֤ר הַ/יַּרְדֵּן֙ יְצָקָ֣/ם הַ/מֶּ֔לֶךְ בְּ/מַעֲבֵ֖ה הָ/אֲדָמָ֑ה בֵּ֥ין
    סֻכּ֖וֹת וּ/בֵ֥ין צָרְתָֽן׃
translation:
  text: In the plain of the Jordan the king cast them, in the clay ground between
    Sukkoth and Zarethan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jordan Valley.' The Hebrew literally refers to the district/plain
      of the Jordan.
    reason: lexical_alternative
  - marker: b
    text: Or 'poured them'; the verb refers to casting metal objects.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in the thickness of the ground,' likely meaning dense clay soil
      suitable for casting.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכִכַּר הַיַּרְדֵּן
  chosen: In the plain of the Jordan
  alternatives:
  - In the circle of the Jordan
  - In the Jordan Valley
  lexicon: HALOT
  rationale: כִּכָּר in geographical contexts refers to a round district/plain, especially
    the Jordan plain. 'Plain' is natural English and sufficiently concrete; 'Jordan
    Valley' is possible but slightly more interpretive than the Hebrew wording.
- source_word: יְצָקָם
  chosen: cast them
  alternatives:
  - poured them
  - cast them in molds
  lexicon: HALOT
  rationale: The verb יצק commonly means 'pour' or 'cast' metal objects. Given the
    context of bronze furnishings, 'cast them' best conveys metal casting in idiomatic
    English. The 3mp suffix is represented by 'them,' referring to the items listed
    in the surrounding context.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King Solomon
  lexicon: HALOT
  rationale: The Hebrew has the common noun with article, not the personal name. 'The
    king' preserves the source text, while the referent is understood from context.
- source_word: בְּמַעֲבֵה הָאֲדָמָה
  chosen: in the clay ground
  alternatives:
  - in the thickness of the ground
  - in the dense soil
  - in the clay soil
  lexicon: HALOT
  rationale: מַעֲבֶה denotes thickness/density, and with הָאֲדָמָה here refers to
    thick or dense earth suitable for casting molds. 'Clay ground' communicates the
    likely sense in context more clearly than a woodenly literal rendering.
- source_word: בֵּין סֻכּוֹת וּבֵין צָרְתָן
  chosen: between Sukkoth and Zarethan
  alternatives:
  - between Succoth and Zarethan
  - between Sukkoth and Zarthan
  lexicon: HALOT
  rationale: These are place names, so transliteration is preferred. 'Sukkoth' reflects
    the Hebrew consonants more directly than the traditional 'Succoth.' 'Zarethan'
    follows a standard English transliteration of צָרְתָן.
