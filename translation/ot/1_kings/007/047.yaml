id: 1KI.7.47
reference: 1 Kings 7:47
source:
  edition: WLC
  text: וַ/יַּנַּ֤ח שְׁלֹמֹה֙ אֶת כָּל הַ/כֵּלִ֔ים מֵ/רֹ֖ב מְאֹ֣ד מְאֹ֑ד לֹ֥א נֶחְקַ֖ר
    מִשְׁקַ֥ל הַ/נְּחֹֽשֶׁת־־׃
translation:
  text: And Solomon left all the vessels unweighed because they were exceedingly many;
    the weight of the bronze was not determined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And Solomon left all the vessels because they were exceedingly many;
      the weight of the bronze was not investigated/searched out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח
  chosen: left ... unweighed
  alternatives:
  - set down
  - left
  - let alone
  lexicon: HALOT
  rationale: The verb from נוח/ינח in this context means Solomon refrained from further
    action regarding the items. Because the following clause explains that the bronze
    weight was not determined, 'left ... unweighed' makes explicit in natural English
    what was left undone without adding a new idea beyond the immediate context.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the articles
  - all the utensils
  - all the furnishings
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements/articles. In the temple-furnishings
    context, 'vessels' is a standard and suitably concrete rendering.
- source_word: מֵרֹב מְאֹד מְאֹד
  chosen: because they were exceedingly many
  alternatives:
  - because of the very great quantity
  - from the abundance, very, very much
  - because there were so many
  lexicon: HALOT
  rationale: 'The preposition מִן with רֹב gives the reason: because of the great
    abundance. The doubled מְאֹד intensifies strongly. ''Exceedingly many'' preserves
    the emphasis in readable English.'
- source_word: לֹא נֶחְקַר
  chosen: was not determined
  alternatives:
  - was not searched out
  - was not investigated
  - was not calculated
  lexicon: HALOT
  rationale: The Niphal of חקר here refers to something not being ascertained or determined.
    In context of weight, 'was not determined' communicates that no final reckoning
    was made.
- source_word: מִשְׁקַל
  chosen: the weight
  alternatives:
  - the weighing
  - the amount by weight
  lexicon: HALOT
  rationale: The noun denotes weight/amount by weight. 'The weight' is the most direct
    English equivalent here.
- source_word: הַנְּחֹשֶׁת
  chosen: the bronze
  alternatives:
  - the copper
  - the bronze alloy
  lexicon: HALOT
  rationale: In temple/tabernacle furnishing contexts, נְחֹשֶׁת conventionally refers
    to bronze rather than pure copper. 'Bronze' best fits the material of the vessels
    described.
