id: 1KI.7.34
reference: 1 Kings 7:34
source:
  edition: WLC
  text: וְ/אַרְבַּ֣ע כְּתֵפ֔וֹת אֶ֚ל אַרְבַּ֣ע פִּנּ֔וֹת הַ/מְּכֹנָ֖ה הָֽ/אֶחָ֑ת מִן
    הַ/מְּכֹנָ֖ה כְּתֵפֶֽי/הָ־׃
translation:
  text: And there were four supports at the four corners of the one stand; its supports
    were part of the stand itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'shoulders'; likely structural projections or support pieces at the
      corners of the stand.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפוֹת
  chosen: supports
  alternatives:
  - shoulders
  - side-pieces
  - projections
  lexicon: HALOT
  rationale: The noun literally means 'shoulders,' but in this architectural description
    it refers to structural projecting pieces or supports. 'Supports' communicates
    the functional sense in clear modern English without over-literal anthropomorphism.
- source_word: פִּנּוֹת
  chosen: corners
  alternatives:
  - sides
  - angles
  lexicon: HALOT
  rationale: In the context of a square or rectangular stand, 'corners' is the most
    natural rendering for the four extremities.
- source_word: מְּכֹנָה
  chosen: stand
  alternatives:
  - base
  - carriage
  lexicon: HALOT
  rationale: In 1 Kings 7 this term denotes the crafted wheeled structure holding
    the basin. 'Stand' is a clear, established rendering in context; 'base' is possible,
    but 'stand' better conveys a constructed support unit.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - each
  - one
  lexicon: HALOT
  rationale: The phrase modifies 'stand' and refers to an individual stand considered
    singly. In English, 'the one stand' preserves the specificity of the Hebrew, though
    the sense is distributive within the larger description.
- source_word: מִן
  chosen: part of
  alternatives:
  - from
  - out of
  lexicon: HALOT
  rationale: 'Here מִן indicates derivation or integral formation: the supports were
    made from or as part of the stand itself. ''Part of'' expresses the idiomatic
    sense more clearly than a wooden ''from.'''
- source_word: כְּתֵפֶיהָ
  chosen: its supports
  alternatives:
  - its shoulders
  - its side-pieces
  lexicon: HALOT
  rationale: The suffix is feminine singular, referring back to the stand. Repeating
    'supports' maintains consistency with the earlier occurrence and fits the technical
    architectural context.
