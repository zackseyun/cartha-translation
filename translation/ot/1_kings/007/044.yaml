id: 1KI.7.44
reference: 1 Kings 7:44
source:
  edition: WLC
  text: וְ/אֶת הַ/יָּ֖ם הָ/אֶחָ֑ד וְ/אֶת הַ/בָּקָ֥ר שְׁנֵים עָשָׂ֖ר תַּ֥חַת הַ/יָּֽם־־־׃
translation:
  text: the one Sea, and the twelve oxen under the Sea;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one basin, and the twelve oxen beneath the basin.' The Hebrew uses
      'Sea' for the large reservoir.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּם
  chosen: Sea
  alternatives:
  - basin
  lexicon: HALOT
  rationale: In the temple-furnishings context, יָם refers to the large cast-metal
    water reservoir traditionally called the 'Sea.' Capitalizing 'Sea' preserves its
    function as a recognized named object in this passage while retaining the literal
    Hebrew term rather than replacing it with a purely explanatory gloss.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - one
  lexicon: HALOT
  rationale: The adjective/numeral with article distinguishes this single Sea from
    the multiple stands and basins in the surrounding inventory. Rendering it as 'the
    one' preserves the Hebrew definiteness and enumerative force.
- source_word: הַבָּקָר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: In this architectural context, בָּקָר denotes the bovine figures supporting
    the Sea. 'Oxen' is the established and most precise English term for such large
    bovines in a formal inventory; 'bulls' would over-specify sex, and 'cattle' is
    too broad.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number; no expansion is needed.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition indicates physical position of the oxen supporting the
    Sea. 'Under' is the most natural modern English equivalent.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: The repeated object marker with conjunction continues the inventory list.
    English does not represent the object marker directly, so 'and' carries the connective
    force while the direct-object function is implicit in the noun phrase.
