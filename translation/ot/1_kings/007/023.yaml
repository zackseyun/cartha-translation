id: 1KI.7.23
reference: 1 Kings 7:23
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/יָּ֖ם מוּצָ֑ק עֶ֣שֶׂר בָּ֠/אַמָּה מִ/שְּׂפָת֨/וֹ עַד שְׂפָת֜/וֹ
    עָגֹ֣ל סָבִ֗יב וְ/חָמֵ֤שׁ בָּֽ/אַמָּה֙ קוֹמָת֔/וֹ ו/קוה שְׁלֹשִׁ֣ים בָּֽ/אַמָּ֔ה
    יָסֹ֥ב אֹת֖/וֹ סָבִֽיב־־׀׃
translation:
  text: Then he made the cast sea, ten cubits from its brim to its brim, round all
    around; its height was five cubits, and a line of thirty cubits went around it
    all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the basin.' The Hebrew calls this large temple vessel 'the sea,' a formal
      designation preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a line of thirty cubits'; that is, its circumference measured thirty
      cubits.
    reason: cultural_note
  - marker: c
    text: The written form here is קוה ('line'), traditionally read with the sense
      of measuring cord; compare the parallel in 2 Chronicles 4:2.
    reason: textual_variant
lexical_decisions:
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the basin
  lexicon: HALOT
  rationale: Though literally 'the sea,' the term refers to the large temple basin.
    Retaining 'sea' preserves the established metaphorical designation in the Hebrew
    text rather than flattening it to function alone.
- source_word: מוּצָק
  chosen: cast
  alternatives:
  - molten
  - cast metal
  lexicon: HALOT
  rationale: The passive participial form indicates something formed by casting metal.
    'Cast' is concise, natural English and fits the construction 'cast sea.'
- source_word: עֶשֶׂר בָּאַמָּה מִשְּׂפָתוֹ עַד שְׂפָתוֹ
  chosen: ten cubits from its brim to its brim
  alternatives:
  - ten cubits from one brim to the other
  - ten cubits from lip to lip
  lexicon: HALOT
  rationale: שָׂפָה here refers to the rim or edge of a vessel. 'Brim' is idiomatic
    for a large container and preserves the measurement across the opening.
- source_word: שָׂפָה
  chosen: brim
  alternatives:
  - rim
  - lip
  lexicon: HALOT
  rationale: For a vessel, 'brim' is the most natural modern English term. 'Lip' is
    possible but less idiomatic here; 'rim' is also viable.
- source_word: עָגֹל סָבִיב
  chosen: round all around
  alternatives:
  - circular all around
  - round about
  lexicon: HALOT
  rationale: The phrase emphasizes the object's circular shape. 'Round all around'
    preserves both the adjective and the adverbial emphasis without sounding archaic.
- source_word: קוֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In this architectural context, 'height' is the straightforward and accurate
    rendering.
- source_word: וְקוה
  chosen: and a line
  alternatives:
  - and a measuring line
  - and a cord
  lexicon: HALOT
  rationale: The ketiv points to קוה, understood as a measuring cord/line; 'line'
    is sufficiently clear in context and preserves the concise style of the Hebrew.
- source_word: יָסֹב אֹתוֹ סָבִיב
  chosen: went around it all around
  alternatives:
  - encircled it
  - surrounded it all around
  lexicon: HALOT
  rationale: The verb denotes surrounding or going around. 'Went around it all around'
    mirrors the Hebrew repetition for emphasis, which is characteristic of the measurement
    description.
- source_word: אַמָּה
  chosen: cubit
  alternatives:
  - about 18 inches
  - forearm-length
  lexicon: HALOT
  rationale: '''Cubit'' is the standard English rendering for the ancient unit and
    should be retained rather than converted in the main text.'
