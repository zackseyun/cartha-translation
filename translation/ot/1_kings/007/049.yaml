id: 1KI.7.49
reference: 1 Kings 7:49
source:
  edition: WLC
  text: וְ/אֶת הַ֠/מְּנֹרוֹת חָמֵ֨שׁ מִ/יָּמִ֜ין וְ/חָמֵ֧שׁ מִ/שְּׂמֹ֛אול לִ/פְנֵ֥י
    הַ/דְּבִ֖יר זָהָ֣ב סָג֑וּר וְ/הַ/פֶּ֧רַח וְ/הַ/נֵּרֹ֛ת וְ/הַ/מֶּלְקַחַ֖יִם זָהָֽב־׃
translation:
  text: and the lampstands, five on the right and five on the left, before the inner
    sanctuary, of pure gold; and the flowers, the lamps, and the tongs, of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Most Holy Place.' The Hebrew דְּבִיר refers to the temple's
      innermost room.
    reason: lexical_alternative
  - marker: b
    text: Or 'refined gold' for 'pure gold.'
    reason: lexical_alternative
  - marker: c
    text: Or 'snuffers' for 'tongs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּנֹרוֹת
  chosen: lampstands
  alternatives:
  - lamps
  - candlesticks
  lexicon: HALOT
  rationale: מְנוֹרָה denotes a lampstand rather than the individual lamps themselves.
    'Lampstands' is more precise than traditional 'candlesticks,' which suggests candles
    rather than oil lamps.
- source_word: מִיָּמִין ... מִשְּׂמֹאול
  chosen: on the right ... on the left
  alternatives:
  - to the south ... to the north
  lexicon: HALOT
  rationale: The terms are literally 'from/right' and 'from/left.' In temple orientation
    they may imply south/north, but the Hebrew itself uses relative spatial language,
    so 'on the right ... on the left' best preserves the source wording.
- source_word: לִפְנֵי הַדְּבִיר
  chosen: before the inner sanctuary
  alternatives:
  - in front of the inner sanctuary
  - before the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר refers to the inner room of the temple, the most holy inner sanctuary.
    'Inner sanctuary' is clear modern English and avoids importing later technical
    phrasing into the main text.
- source_word: זָהָב סָגוּר
  chosen: of pure gold
  alternatives:
  - of closed gold
  - of refined gold
  - of solid gold
  lexicon: HALOT
  rationale: The phrase denotes high-quality refined gold. 'Pure gold' is idiomatic
    English that captures the sense better than a wooden rendering of סָגוּר.
- source_word: הַפֶּרַח
  chosen: the flowers
  alternatives:
  - the blossom-work
  - the floral ornaments
  lexicon: HALOT
  rationale: פֶּרַח literally means 'flower/blossom' and here refers to the decorative
    floral elements associated with the lampstands. The plural in English reflects
    the likely collective/distributive sense in context, though the Hebrew form is
    singular collective.
- source_word: הַנֵּרֹת
  chosen: the lamps
  lexicon: HALOT
  rationale: These are the individual lamps associated with the lampstands; 'lamps'
    is the straightforward rendering.
- source_word: הַמֶּלְקַחַיִם
  chosen: the tongs
  alternatives:
  - snuffers
  - wick-trimmers
  lexicon: HALOT
  rationale: The implement is a pair of tongs used in tending the lamps. 'Tongs' is
    the most direct lexical equivalent; 'snuffers' is interpretive and more traditional.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: The final זָהָב applies to the flowers, lamps, and tongs. 'Of gold' preserves
    the nominal construction and matches the inventory style of the verse.
