id: 1KI.7.25
reference: 1 Kings 7:25
source:
  edition: WLC
  text: עֹמֵ֞ד עַל שְׁנֵ֧י עָשָׂ֣ר בָּקָ֗ר שְׁלֹשָׁ֣ה פֹנִ֣ים צָפ֡וֹנָ/ה וּ/שְׁלֹשָׁה֩
    פֹנִ֨ים יָ֜מָּ/ה וּ/שְׁלֹשָׁ֣ה פֹּנִ֣ים נֶ֗גְבָּ/ה וּ/שְׁלֹשָׁה֙ פֹּנִ֣ים מִזְרָ֔חָ/ה
    וְ/הַ/יָּ֥ם עֲלֵי/הֶ֖ם מִ/לְ/מָ֑עְלָ/ה וְ/כָל אֲחֹֽרֵי/הֶ֖ם בָּֽיְתָ/ה־׀׀׀־׃
translation:
  text: 'It stood on twelve oxen: three facing north, three facing west, three facing
    south, and three facing east; and the Sea was set on them above, and all their
    rear parts were inward.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'west' is literally 'sea-ward,' a standard biblical way of indicating
      the west.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their hindquarters were toward the inside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמֵד
  chosen: It stood
  alternatives:
  - standing
  - was standing
  lexicon: HALOT
  rationale: Qal participle of עמד functions predicatively/descriptively here, referring
    back to the Sea in the previous verse. English finite past 'stood' is the most
    natural narrative rendering.
- source_word: בָּקָר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: In this architectural description, the twelve bovine figures supporting
    the basin are best rendered 'oxen,' the standard English term for bovine support
    figures in temple-furnishing contexts. 'Bulls' is possible but less certain from
    the lexical form alone.
- source_word: פֹנִים
  chosen: facing
  alternatives:
  - turned toward
  - looking toward
  lexicon: HALOT
  rationale: Literally 'faces,' but idiomatically in this repeated directional construction
    it describes orientation. 'Facing' is concise and natural in English.
- source_word: צָפוֹנָה
  chosen: north
  alternatives:
  - northward
  lexicon: HALOT
  rationale: Directional he indicates motion/orientation toward a direction; in English
    architectural description, simple cardinal direction 'north' after 'facing' is
    idiomatic.
- source_word: יָמָּה
  chosen: west
  alternatives:
  - seaward
  - toward the sea
  lexicon: HALOT
  rationale: Though literally related to 'sea,' in biblical Hebrew directional usage
    it commonly means 'west.' Here it is one of four cardinal orientations, so 'west'
    best conveys the sense.
- source_word: נֶגְבָּה
  chosen: south
  alternatives:
  - southward
  - Negeb-ward
  lexicon: HALOT
  rationale: In this directional list the term functions as the cardinal direction
    'south,' not the geographic region Negeb.
- source_word: מִזְרָחָה
  chosen: east
  alternatives:
  - eastward
  - toward the sunrise
  lexicon: HALOT
  rationale: Directional form meaning 'east(ward)'; 'east' is the most natural complement
    to 'facing' in English.
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the basin
  - the sea
  lexicon: HALOT
  rationale: This is the technical name for the large cast basin described in context.
    Capitalizing 'Sea' preserves its status as a named temple furnishing while retaining
    the Hebrew term's imagery.
- source_word: עֲלֵיהֶם מִלְמָעְלָה
  chosen: was set on them above
  alternatives:
  - was above them
  - was upon them from above
  lexicon: HALOT
  rationale: The phrase indicates the Sea rested atop the oxen. 'Was set on them above'
    makes explicit the support relationship while staying close to the Hebrew.
- source_word: אֲחֹרֵיהֶם
  chosen: their rear parts
  alternatives:
  - their hindquarters
  - their backsides
  lexicon: HALOT
  rationale: Literally 'their back parts/behind parts.' Because the referent is animal
    figures, 'rear parts' is anatomically clear without sounding crude. 'Hindquarters'
    is possible but slightly more interpretive.
- source_word: בָּיְתָה
  chosen: inward
  alternatives:
  - toward the inside
  - inside
  lexicon: HALOT
  rationale: Directional form from 'house/inside' here means oriented inward, i.e.,
    toward the center beneath the basin. 'Inward' is concise and idiomatic.
