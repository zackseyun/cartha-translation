id: 1KI.7.39
reference: 1 Kings 7:39
source:
  edition: WLC
  text: וַ/יִּתֵּן֙ אֶת הַ/מְּכֹנ֔וֹת חָמֵ֞שׁ עַל כֶּ֤תֶף הַ/בַּ֨יִת֙ מִ/יָּמִ֔ין
    וְ/חָמֵ֛שׁ עַל כֶּ֥תֶף הַ/בַּ֖יִת מִ/שְּׂמֹאל֑/וֹ וְ/אֶת הַ/יָּ֗ם נָתַ֞ן מִ/כֶּ֨תֶף
    הַ/בַּ֧יִת הַ/יְמָנִ֛ית קֵ֖דְמָ/ה מִ/מּ֥וּל נֶֽגֶב־־־־׃ס
translation:
  text: He placed five stands on the right side of the house and five on the left
    side of the house, and he placed the Sea at the southeast side of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the right side of the house, eastward, opposite the south''—a
      compact spatial description indicating the southeast side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּכֹנוֹת
  chosen: stands
  alternatives:
  - carts
  - bases
  lexicon: HALOT
  rationale: In the temple-furnishing context of 1 Kings 7, this term refers to the
    wheeled bronze structures supporting the basins. 'Stands' is clear modern English
    and fits the object’s function without over-specifying mechanics. 'Bases' is traditional
    but less natural; 'carts' may overemphasize mobility.
- source_word: כֶּתֶף
  chosen: side
  alternatives:
  - shoulder
  - flank
  lexicon: HALOT
  rationale: Literally 'shoulder,' but in architectural description it idiomatically
    denotes the side of a structure. 'Side' best communicates the spatial sense in
    English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house.' In this context it refers to the temple
    building, but retaining 'house' preserves the source wording and the established
    biblical idiom for the temple.
- source_word: מִיָּמִין
  chosen: on the right side
  alternatives:
  - to the right
  - on the south side
  lexicon: HALOT
  rationale: The phrase is relative orientation from the front-facing/eastward perspective
    of the temple description. 'On the right side' is the most direct rendering of
    the Hebrew expression without prematurely converting it to a compass direction.
- source_word: מִשְּׂמֹאלוֹ
  chosen: on the left side
  alternatives:
  - to the left
  - on the north side
  lexicon: HALOT
  rationale: As with 'right side,' the Hebrew uses body-oriented spatial language.
    'Left side' preserves that idiom more transparently than converting immediately
    to a compass point.
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the basin
  - the great basin
  lexicon: HALOT
  rationale: This is the conventional designation for the large cast basin in the
    temple complex. Capitalizing 'Sea' signals that it is a named temple furnishing,
    not a natural body of water.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - southern
  lexicon: HALOT
  rationale: The adjective means 'right-hand/right side.' In temple orientation, 'right'
    corresponds to south when facing east, but the Hebrew itself retains the body-oriented
    term.
- source_word: קֵדְמָה
  chosen: eastward
  alternatives:
  - to the east
  - in front
  lexicon: HALOT
  rationale: The adverb indicates an eastward/frontward orientation. Here it helps
    specify the Sea’s placement toward the front/east side of the southern part of
    the house.
- source_word: מִמּוּל נֶגֶב
  chosen: toward the south
  alternatives:
  - opposite the south
  - on the south side
  lexicon: HALOT
  rationale: The phrase marks position in relation to the south. In combination with
    the preceding terms, the overall sense is the southeast side of the house. The
    English rendering smooths the Hebrew spatial sequence into natural English while
    preserving the location.
