id: 1KI.7.8
reference: 1 Kings 7:8
source:
  edition: WLC
  text: וּ/בֵית/וֹ֩ אֲשֶׁר יֵ֨שֶׁב שָׁ֜ם חָצֵ֣ר הָ/אַחֶ֗רֶת מִ/בֵּית֙ לָֽ/אוּלָ֔ם
    כַּ/מַּֽעֲשֶׂ֥ה הַ/זֶּ֖ה הָיָ֑ה וּ/בַ֜יִת יַעֲשֶׂ֤ה לְ/בַת פַּרְעֹה֙ אֲשֶׁ֣ר לָקַ֣ח
    שְׁלֹמֹ֔ה כָּ/אוּלָ֖ם הַ/זֶּֽה־־׃
translation:
  text: His house where he was to live was in the other court, set back from the Hall,
    and was of the same workmanship. He also made a house like this Hall for Pharaoh’s
    daughter, whom Solomon had taken as wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in another court, farther inward from the Hall.' The Hebrew spatial
      phrase is difficult, and translations vary in how they describe the residence’s
      position relative to the Hall.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'whom Solomon had taken'; that is, taken in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵיתוֹ
  chosen: His house
  alternatives:
  - And his house
  - Now his house
  lexicon: HALOT
  rationale: The conjunction plus noun with pronominal suffix introduces the next
    architectural feature. 'His house' is the natural English rendering; the prefixed
    conjunction is absorbed into the flow rather than separately rendered as 'and'
    at the head of the sentence.
- source_word: אֲשֶׁר יֵשֶׁב שָׁם
  chosen: where he was to live
  alternatives:
  - where he lived
  - where he would sit/dwell there
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, dwell, live.' In this building-description
    context, the clause describes the intended residential use of the house. 'Was
    to live' fits the prospective/descriptive sense better than a simple past 'lived.'
    'There' is implicit in English and need not be separately represented.
- source_word: חָצֵר הָאַחֶרֶת
  chosen: the other court
  alternatives:
  - another court
  - the other courtyard
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' 'Court' is concise and idiomatic in palace
    architecture. The article with אַחֶרֶת points to a specific second court already
    implied by the complex, so 'the other court' is preferable to the indefinite 'another
    court.'
- source_word: מִבֵּית לָאוּלָם
  chosen: set back from the Hall
  alternatives:
  - inside from the Hall
  - within, from the Hall
  - from the house of the Hall
  lexicon: HALOT
  rationale: The phrase is difficult and spatial. אוּלָם is the porch/hall structure.
    Given the architectural context and common understanding of the layout, the sense
    is that this residence was in the inner/other court, away from or behind the Hall.
    'Set back from the Hall' communicates the spatial relation in readable English
    without overcommitting to a more technical reconstruction.
- source_word: כַּמַּעֲשֶׂה הַזֶּה הָיָה
  chosen: was of the same workmanship
  alternatives:
  - was like this work
  - was according to this design
  - was of this workmanship
  lexicon: HALOT
  rationale: מַעֲשֶׂה here refers to workmanship/design rather than merely 'deed'
    or 'work.' The comparative כ plus demonstrative points back to the previously
    described construction. 'Of the same workmanship' is idiomatic and preserves the
    comparison.
- source_word: וּבַיִת יַעֲשֶׂה
  chosen: He also made a house
  alternatives:
  - And he made a house
  - He would make a house
  lexicon: HALOT
  rationale: The yiqtol in this narrative/building summary functions as past narrative
    or descriptive continuation. 'He also made a house' captures the sequential sense
    and the conjunction.
- source_word: לְבַת פַּרְעֹה
  chosen: for Pharaoh’s daughter
  alternatives:
  - for the daughter of Pharaoh
  lexicon: HALOT
  rationale: A straightforward construct relationship. 'Pharaoh’s daughter' is natural
    modern English.
- source_word: אֲשֶׁר לָקַח שְׁלֹמֹה
  chosen: whom Solomon had taken as wife
  alternatives:
  - whom Solomon had taken
  - whom Solomon married
  lexicon: HALOT
  rationale: לָקַח with a woman as object commonly means 'take in marriage.' Adding
    'as wife' makes the idiomatic sense explicit in English while remaining faithful
    to the Hebrew usage.
- source_word: כָּאוּלָם הַזֶּה
  chosen: like this Hall
  alternatives:
  - according to this Hall
  - like this porch
  lexicon: HALOT
  rationale: אוּלָם can be rendered 'porch' or 'hall.' In this royal-building context,
    'Hall' better conveys a substantial architectural structure than the more domestic-sounding
    'porch.' The comparative points to similarity with the hall just described.
