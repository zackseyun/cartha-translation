id: 1KI.7.15
reference: 1 Kings 7:15
source:
  edition: WLC
  text: וַ/יָּ֛צַר אֶת שְׁנֵ֥י הָ/עַמּוּדִ֖ים נְחֹ֑שֶׁת שְׁמֹנֶ֨ה עֶשְׂרֵ֜ה אַמָּ֗ה
    קוֹמַת֙ הָ/עַמּ֣וּד הָ/אֶחָ֔ד וְ/חוּט֙ שְׁתֵּים עֶשְׂרֵ֣ה אַמָּ֔ה יָסֹ֖ב אֶת הָ/עַמּ֥וּד
    הַ/שֵּׁנִֽי־־־׃
translation:
  text: He cast the two bronze pillars; the height of the one pillar was eighteen
    cubits, and a line of twelve cubits measured around the second pillar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a cord of twelve cubits encircled the second pillar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּצַר
  chosen: cast
  alternatives:
  - formed
  - fashioned
  lexicon: HALOT
  rationale: In the context of bronze temple furnishings, the verb is best rendered
    with metalworking sense, 'cast,' rather than the broader 'formed' or 'fashioned.'
    This fits the object material and the construction context.
- source_word: שְׁנֵי הָעַמּוּדִים
  chosen: the two ... pillars
  alternatives:
  - the two columns
  lexicon: HALOT
  rationale: '''Pillars'' is the standard and natural rendering for large freestanding
    architectural supports here; ''columns'' is possible but less idiomatic in this
    temple-description context.'
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In biblical architectural and cultic contexts, נְחֹשֶׁת commonly refers
    to bronze as the practical alloy intended. 'Brass' is anachronistic in many cases,
    and 'copper' is too narrow for the likely material.
- source_word: שְׁמֹנֶה עֶשְׂרֵה אַמָּה
  chosen: eighteen cubits
  lexicon: HALOT
  rationale: A straightforward numerical measurement; 'cubits' preserves the ancient
    unit rather than converting it.
- source_word: קוֹמַת הָעַמּוּד הָאֶחָד
  chosen: the height of the one pillar
  alternatives:
  - the height of one pillar
  - one pillar was eighteen cubits high
  lexicon: HALOT
  rationale: This preserves the Hebrew nominal construction while remaining natural
    English. 'The one pillar' reflects the definite phrasing and sets up the corresponding
    second pillar.
- source_word: וְחוּט
  chosen: and a line
  alternatives:
  - and a cord
  - and a measuring line
  lexicon: HALOT
  rationale: חוּט is literally a cord/thread/line. In this measurement context, 'line'
    is concise and natural; the measuring function is clarified by the following verb.
- source_word: שְׁתֵּים עֶשְׂרֵה אַמָּה
  chosen: twelve cubits
  lexicon: HALOT
  rationale: A direct rendering of the measurement phrase, again preserving the ancient
    unit.
- source_word: יָסֹב
  chosen: measured around
  alternatives:
  - encircled
  - went around
  - surrounded
  lexicon: HALOT
  rationale: Literally the line 'went around' or 'encircled' the pillar, but in English
    the intended sense is measurement of circumference. 'Measured around' makes the
    function explicit without over-paraphrasing.
- source_word: הָעַמּוּד הַשֵּׁנִי
  chosen: the second pillar
  alternatives:
  - the other pillar
  lexicon: HALOT
  rationale: A direct rendering of the ordinal expression; it naturally pairs with
    'the one pillar' earlier in the verse.
