id: 1KI.7.10
reference: 1 Kings 7:10
source:
  edition: WLC
  text: וּ/מְיֻסָּ֕ד אֲבָנִ֥ים יְקָר֖וֹת אֲבָנִ֣ים גְּדֹל֑וֹת אַבְנֵי֙ עֶ֣שֶׂר אַמּ֔וֹת
    וְ/אַבְנֵ֖י שְׁמֹנֶ֥ה אַמּֽוֹת׃
translation:
  text: And the foundation was of costly stones, large stones, stones of ten cubits
    and stones of eight cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precious stones.' The Hebrew emphasizes the stones' high value/quality;
      in this construction context, 'costly stones' is less likely to suggest gemstones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְיֻסָּד
  chosen: And the foundation was
  alternatives:
  - And it was founded with
  - And the base was
  lexicon: HALOT
  rationale: Passive participial form from יסד used substantivally/predicatively in
    context. Given the preceding architectural description, 'the foundation was' is
    the most natural English rendering, making explicit the implied architectural
    subject without overparaphrasing.
- source_word: אֲבָנִים יְקָרוֹת
  chosen: of costly stones
  alternatives:
  - of precious stones
  - of valuable stones
  lexicon: HALOT
  rationale: יְקָרוֹת denotes high value or costliness. In this building context,
    'costly stones' better conveys expensive, high-quality dressed stone rather than
    gemstone-like 'precious stones,' which could mislead modern readers.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: large stones
  alternatives:
  - great stones
  - big stones
  lexicon: HALOT
  rationale: גְּדֹלוֹת here describes physical size. 'Large stones' is idiomatic modern
    English and fits the architectural inventory.
- source_word: אַבְנֵי עֶשֶׂר אַמּוֹת
  chosen: stones of ten cubits
  alternatives:
  - ten-cubit stones
  - stones measuring ten cubits
  lexicon: HALOT
  rationale: Construct chain indicating the stones' dimension. 'Stones of ten cubits'
    stays close to the Hebrew while remaining clear. The exact dimension axis is unspecified
    in the Hebrew and should not be supplied.
- source_word: וְאַבְנֵי שְׁמֹנֶה אַמּוֹת
  chosen: and stones of eight cubits
  alternatives:
  - and eight-cubit stones
  - and stones measuring eight cubits
  lexicon: HALOT
  rationale: Parallel to the previous phrase; the same structure is preserved for
    consistency and readability.
- source_word: אַמּוֹת
  chosen: cubits
  alternatives:
  - about 18-inch units
  lexicon: HALOT
  rationale: Standard translation of the ancient unit אַמָּה. The conventional term
    'cubits' preserves the source measurement without interpretive conversion in the
    main text.
