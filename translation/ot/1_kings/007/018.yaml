id: 1KI.7.18
reference: 1 Kings 7:18
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אֶת הָ/עַמּוּדִ֑ים וּ/שְׁנֵי֩ טוּרִ֨ים סָבִ֜יב עַל הַ/שְּׂבָכָ֣ה
    הָ/אֶחָ֗ת לְ/כַסּ֤וֹת אֶת הַ/כֹּֽתָרֹת֙ אֲשֶׁר֙ עַל רֹ֣אשׁ הָֽ/רִמֹּנִ֔ים וְ/כֵ֣ן
    עָשָׂ֔ה לַ/כֹּתֶ֖רֶת הַ/שֵּׁנִֽית־־־־׃
translation:
  text: He made the pillars, and two rows all around on the one latticework to cover
    the capitals that were on top of the pomegranates; and so he did for the second
    capital.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pomegranate ornaments.' The Hebrew says 'the pomegranates,' likely
      referring to decorative pomegranate-shaped elements on the capitals.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of this verse is difficult, and some interpreters understand
      the rows as belonging to the pomegranate decoration around the latticework of
      each capital.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - He fashioned
  - He constructed
  lexicon: HALOT
  rationale: Common verb עשה in narrative sequence; 'made' is the most direct and
    natural rendering here.
- source_word: הָעַמּוּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: Architectural context supports 'pillars'; 'columns' is possible but 'pillars'
    is standard and clear.
- source_word: שְׁנֵי טוּרִים
  chosen: two rows
  alternatives:
  - two lines
  - two tiers
  lexicon: HALOT
  rationale: טוּר commonly denotes a row or arrangement in sequence. In this ornamental
    description, 'two rows' best fits the likely arrangement of decorative elements.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - encircling
  lexicon: HALOT
  rationale: Expresses circular surrounding placement on the structure; 'all around'
    is idiomatic and preserves the spatial sense.
- source_word: הַשְּׂבָכָה
  chosen: the latticework
  alternatives:
  - the network
  - the checkerwork
  lexicon: HALOT
  rationale: Refers to the netlike ornamental work associated with the capitals. 'Latticework'
    is readable modern English and suitably concrete.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - one
  - the first
  lexicon: HALOT
  rationale: The article plus numeral points to one of the two corresponding structures.
    'The one' preserves the Hebrew's specificity without overinterpreting as ordinal.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - to conceal
  - to overlay
  lexicon: HALOT
  rationale: The infinitive gives purpose. 'To cover' is the straightforward lexical
    sense and fits the ornamental function.
- source_word: הַכֹּתָרֹת
  chosen: the capitals
  alternatives:
  - the crowns
  - the capital-tops
  lexicon: HALOT
  rationale: In architectural context כותרת refers to the capital of a pillar. 'Capitals'
    is the standard English architectural term.
- source_word: אֲשֶׁר עַל רֹאשׁ
  chosen: that were on top of
  alternatives:
  - which were upon the top of
  - that were at the head of
  lexicon: HALOT
  rationale: This relative phrase locates the capitals spatially. 'On top of' is natural
    English for the Hebrew idiom.
- source_word: הָרִמֹּנִים
  chosen: the pomegranates
  alternatives:
  - the pomegranate ornaments
  lexicon: HALOT
  rationale: The Hebrew term is literally 'pomegranates,' often referring here to
    pomegranate-shaped decorations. The literal rendering is retained; the ornamental
    sense can be clarified in a footnote.
- source_word: וְכֵן עָשָׂה
  chosen: and so he did
  alternatives:
  - and he did likewise
  - and thus he made
  lexicon: HALOT
  rationale: Formula indicating repetition of the same work on the counterpart structure.
    'And so he did' is concise and natural.
- source_word: לַכֹּתֶרֶת הַשֵּׁנִית
  chosen: for the second capital
  alternatives:
  - for the second capital structure
  - for the other capital
  lexicon: HALOT
  rationale: Refers to the corresponding capital on the second pillar. 'Second capital'
    is the most direct rendering, though the broader architectural referent is somewhat
    compressed in Hebrew.
