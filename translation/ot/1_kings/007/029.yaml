id: 1KI.7.29
reference: 1 Kings 7:29
source:
  edition: WLC
  text: וְ/עַֽל הַ/מִּסְגְּר֞וֹת אֲשֶׁ֣ר בֵּ֣ין הַ/שְׁלַבִּ֗ים אֲרָי֤וֹת בָּקָר֙ וּ/כְרוּבִ֔ים
    וְ/עַל הַ/שְׁלַבִּ֖ים כֵּ֣ן מִ/מָּ֑עַל וּ/מִ/תַּ֨חַת֙ לַ/אֲרָי֣וֹת וְ/לַ/בָּקָ֔ר
    לֹי֖וֹת מַעֲשֵׂ֥ה מוֹרָֽד־׀׀־׃
translation:
  text: And on the panels that were between the frames were lions, oxen, and cherubim;
    and on the frames likewise above, and beneath the lions and the oxen were wreaths,
    a work of hanging relief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'garlands' for 'wreaths'; the Hebrew term is rare and its exact ornamental
      form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'a work of hanging relief' is difficult; it may refer
      to pendent or descending ornamental work beneath the lions and oxen.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּסְגְּרוֹת
  chosen: panels
  alternatives:
  - borders
  - frames
  lexicon: HALOT
  rationale: In the architectural description of the stands, this term refers to inset
    decorative sections rather than the whole structural frame. 'Panels' best distinguishes
    these from שְׁלַבִּים, which are rendered separately as 'frames'.
- source_word: שְׁלַבִּים
  chosen: frames
  alternatives:
  - crosspieces
  - uprights
  lexicon: HALOT
  rationale: The word denotes the structural members between or around which the decorative
    panels were set. 'Frames' is readable and fits the repeated contrast with the
    inset panels.
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural animal term in a decorative context.
- source_word: בָּקָר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: In temple furnishing descriptions, 'oxen' is the most idiomatic English
    rendering for bovine figures. 'Bulls' is possible but more specific than the Hebrew
    requires.
- source_word: כְרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: Traditional transliteration is preferable for this specific class of
    throne-associated heavenly beings; 'cherubs' sounds diminutive in modern English
    and is less suitable here.
- source_word: כֵּן
  chosen: likewise
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: This adverb signals correspondence between the decoration on the panels
    and that on the frames. 'Likewise' conveys the comparative force clearly.
- source_word: מִמָּעַל
  chosen: above
  alternatives:
  - upward
  - on the upper part
  lexicon: HALOT
  rationale: A simple spatial term; 'above' is the most natural rendering in the sequence
    of ornamental placement.
- source_word: מִתַּחַת
  chosen: beneath
  alternatives:
  - below
  - under
  lexicon: HALOT
  rationale: Pairs naturally with 'above' in describing the placement of the ornamentation.
- source_word: לֹיוֹת
  chosen: wreaths
  alternatives:
  - garlands
  - spirals
  lexicon: HALOT
  rationale: The noun is rare and denotes some kind of ornamental festoon or wreath-like
    decoration. 'Wreaths' is concise and fits the decorative setting, while preserving
    uncertainty through a footnote.
- source_word: מַעֲשֵׂה מוֹרָד
  chosen: a work of hanging relief
  alternatives:
  - beveled work
  - pendent work
  - descending work
  lexicon: HALOT
  rationale: This difficult phrase likely describes ornamentation that hung down or
    was worked in a descending relief beneath the figures. 'Hanging relief' captures
    both the artistic and spatial sense without overclaiming precision; the uncertainty
    is preserved in a footnote.
