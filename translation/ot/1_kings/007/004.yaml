id: 1KI.7.4
reference: 1 Kings 7:4
source:
  edition: WLC
  text: וּ/שְׁקֻפִ֖ים שְׁלֹשָׁ֣ה טוּרִ֑ים וּ/מֶחֱזָ֥ה אֶל מֶחֱזָ֖ה שָׁלֹ֥שׁ פְּעָמִֽים־׃
translation:
  text: There were three rows of window frames, with window facing window three times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with window opposite window at three levels.' The Hebrew literally says
      'window to window three times,' likely describing a repeated arrangement on
      three tiers.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁקֻפִים
  chosen: window frames
  alternatives:
  - windows
  - lintels
  lexicon: HALOT
  rationale: The noun refers to framed openings or casements rather than merely the
    abstract idea of windows. In this architectural context, 'window frames' best
    captures the structural sense, while 'windows' is possible as a simpler rendering
    and 'lintels' is a more specific but less likely option here.
- source_word: שְׁלֹשָׁה טוּרִים
  chosen: three rows
  alternatives:
  - three tiers
  - three courses
  lexicon: HALOT
  rationale: טוּר commonly denotes a row or arrangement in sequence. In describing
    the building's openings, 'three rows' is the most natural English architectural
    rendering.
- source_word: מֶחֱזָה
  chosen: window
  alternatives:
  - opening
  - outlook
  lexicon: HALOT
  rationale: The term denotes something seen through or an opening for viewing/light.
    In parallel with the previous architectural term, 'window' is the clearest idiomatic
    rendering.
- source_word: אֶל מֶחֱזָה
  chosen: facing window
  alternatives:
  - opposite window
  - toward window
  lexicon: HALOT
  rationale: The preposition אֶל here expresses correspondence or orientation between
    openings. 'Facing window' communicates the reciprocal arrangement more naturally
    than a wooden 'to window.'
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: three times
  alternatives:
  - at three levels
  - in three instances
  lexicon: HALOT
  rationale: Literally 'three times.' In this architectural description it likely
    means the facing arrangement was repeated on three levels/sets. The main text
    keeps the literal expression, while a footnote preserves the more interpretive
    architectural sense.
