id: 1KI.7.42
reference: 1 Kings 7:42
source:
  edition: WLC
  text: וְ/אֶת הָ/רִמֹּנִ֛ים אַרְבַּ֥ע מֵא֖וֹת לִ/שְׁתֵּ֣י הַ/שְּׂבָכ֑וֹת שְׁנֵֽי
    טוּרִ֤ים רִמֹּנִים֙ לַ/שְּׂבָכָ֣ה הָֽ/אֶחָ֔ת לְ/כַסּ֗וֹת אֶת שְׁתֵּי֙ גֻּלֹּ֣ת
    הַ/כֹּֽתָרֹ֔ת אֲשֶׁ֖ר עַל פְּנֵ֥י הָ/עַמּוּדִֽים־־־־׃
translation:
  text: and the four hundred pomegranates for the two latticeworks, two rows of pomegranates
    for each latticework, to cover the two bowl-shaped capitals that were on the tops
    of the pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'networks' instead of 'latticeworks.' The Hebrew term refers to ornamental
      openwork on the capitals.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the two bowls of the capitals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִמֹּנִים
  chosen: pomegranates
  alternatives:
  - ornamental pomegranates
  lexicon: HALOT
  rationale: The noun literally denotes pomegranates; in this temple-furnishing context
    they are decorative forms, but the text itself simply says 'pomegranates,' so
    the main text keeps the concrete term.
- source_word: שְׂבָכוֹת
  chosen: latticeworks
  alternatives:
  - networks
  - grilles
  lexicon: HALOT
  rationale: The word refers to netted or lattice-like ornamental work on the capitals.
    'Latticeworks' is natural modern English and preserves the crafted, openwork sense
    better than the less specific 'networks.'
- source_word: טוּרִים
  chosen: rows
  alternatives:
  - lines
  - tiers
  lexicon: HALOT
  rationale: The term denotes arranged rows. 'Rows' is the clearest idiomatic rendering
    for the arrangement of pomegranates on each latticework.
- source_word: לַשְּׂבָכָה הָאֶחָת
  chosen: for each latticework
  alternatives:
  - for the one latticework
  - for one latticework
  lexicon: HALOT
  rationale: Although literally 'for the one latticework,' the construction is distributive
    in context because there are two latticeworks and the verse is describing the
    arrangement on both. 'For each latticework' communicates the sense clearly in
    English.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - to conceal
  - to overlay
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the rows of pomegranates served to
    cover the capitals. ''To cover'' is the straightforward lexical equivalent.'
- source_word: גֻּלֹּת
  chosen: bowl-shaped capitals
  alternatives:
  - bowls of the capitals
  - globes of the capitals
  lexicon: HALOT
  rationale: The noun denotes a rounded, bowl-like form. Because English readers may
    not understand 'the two bowls of the capitals,' the translation slightly explicates
    the architectural sense as 'bowl-shaped capitals' while retaining the imagery.
- source_word: כֹּתָרֹת
  chosen: capitals
  alternatives:
  - crowns
  - capital tops
  lexicon: HALOT
  rationale: In architectural context this refers to the capitals atop the pillars,
    not royal crowns. 'Capitals' is the standard and precise rendering.
- source_word: עַל פְּנֵי הָעַמּוּדִים
  chosen: on the tops of the pillars
  alternatives:
  - on the faces of the pillars
  - before the pillars
  - upon the pillars
  lexicon: HALOT
  rationale: Literally 'on the face/front of the pillars,' but in this architectural
    description the phrase indicates the capitals' position on the pillars. 'On the
    tops of the pillars' gives the intended spatial sense in clear English.
