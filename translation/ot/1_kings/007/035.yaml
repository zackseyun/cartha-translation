id: 1KI.7.35
reference: 1 Kings 7:35
source:
  edition: WLC
  text: וּ/בְ/רֹ֣אשׁ הַ/מְּכוֹנָ֗ה חֲצִ֧י הָ/אַמָּ֛ה קוֹמָ֖ה עָגֹ֣ל סָבִ֑יב וְ/עַ֨ל
    רֹ֤אשׁ הַ/מְּכֹנָה֙ יְדֹתֶ֔י/הָ וּ/מִסְגְּרֹתֶ֖י/הָ מִמֶּֽ/נָּה׀׃
translation:
  text: And on the top of the stand there was a round band all around, half a cubit
    high; and on the top of the stand its supports and its panels were of one piece
    with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its handles'; the Hebrew יְדֹתֶיהָ literally means 'its hands' and may
      refer to projecting parts of the stand.
    reason: lexical_alternative
  - marker: b
    text: Or 'its frames' for 'its panels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרֹאשׁ הַמְּכוֹנָה
  chosen: on the top of the stand
  alternatives:
  - at the head of the stand
  - on the upper part of the stand
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head/top.' In this architectural context, 'top'
    is the most natural English rendering. מְכוֹנָה in this chapter refers to the
    wheeled bronze stand/base, commonly rendered 'stand.'
- source_word: חֲצִי הָאַמָּה קוֹמָה
  chosen: half a cubit high
  alternatives:
  - with a height of half a cubit
  - half a cubit in height
  lexicon: HALOT
  rationale: קוֹמָה denotes height or stature; here it specifies the vertical dimension
    of the upper feature. 'Half a cubit high' is concise and idiomatic while preserving
    the measurement.
- source_word: עָגֹל סָבִיב
  chosen: a round band all around
  alternatives:
  - round all around
  - circular all around
  lexicon: HALOT
  rationale: עָגֹל means 'round/circular' and סָבִיב adds the sense 'around/on all
    sides.' Because the Hebrew leaves the noun for the feature somewhat implicit,
    'band' supplies the architectural sense in readable English without over-paraphrasing.
- source_word: וְעַל רֹאשׁ הַמְּכֹנָה
  chosen: and on the top of the stand
  alternatives:
  - and upon the top of the stand
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently with the first occurrence.
- source_word: יְדֹתֶיהָ
  chosen: its supports
  alternatives:
  - its handles
  - its stays
  lexicon: HALOT
  rationale: יָד literally means 'hand,' but in object descriptions it can denote
    projecting parts, handles, or supports. In this complex architectural description,
    'supports' best fits the structural context, though 'handles' is a plausible alternative
    preserved in a footnote.
- source_word: וּמִסְגְּרֹתֶיהָ
  chosen: its panels
  alternatives:
  - its frames
  - its borders
  lexicon: HALOT
  rationale: מִסְגְּרוֹת in the description of the stands refers to framed sections
    or panels. 'Panels' communicates the likely visible sections of the stand more
    clearly in modern English, while 'frames' remains a viable alternative.
- source_word: מִמֶּנָּה
  chosen: were of one piece with it
  alternatives:
  - were from it
  - projected from it
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix here indicates that these features
    belonged integrally to the stand rather than being separate attachments. 'Were
    of one piece with it' makes the architectural force explicit and matches the likely
    sense in context.
