id: 1KI.7.33
reference: 1 Kings 7:33
source:
  edition: WLC
  text: וּ/מַֽעֲשֵׂה֙ הָ/א֣וֹפַנִּ֔ים כְּ/מַעֲשֵׂ֖ה אוֹפַ֣ן הַ/מֶּרְכָּבָ֑ה יְדוֹתָ֣/ם
    וְ/גַבֵּי/הֶ֗ם וְ/חִשֻּׁקֵי/הֶ֛ם וְ/חִשֻּׁרֵי/הֶ֖ם הַ/כֹּ֥ל מוּצָֽק׃
translation:
  text: The workmanship of the wheels was like the workmanship of a chariot wheel;
    their axles, their rims, their spokes, and their hubs were all cast metal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'handles' for 'axles' (יְדוֹתָם); the Hebrew term literally relates to
      'hands,' but in this wheel context it likely refers to axle-pieces or supports.
    reason: lexical_alternative
  - marker: b
    text: Or 'bands' for 'spokes' and 'struts' or 'fittings' for 'hubs'; both Hebrew
      terms are rare, and their exact technical sense is inferred from the context
      of wheel construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  chosen: workmanship
  alternatives:
  - construction
  - work
  lexicon: HALOT
  rationale: Refers to the crafted form or manner of construction. 'Workmanship' captures
    both the product and the skilled manufacture in this description of temple furnishings.
- source_word: הָאֹפַנִּים / אוֹפַן
  chosen: wheels / wheel
  lexicon: HALOT
  rationale: Standard sense of אוֹפַן in this architectural description. Singular
    in the comparison ('a chariot wheel') is preserved naturally in English.
- source_word: כְּמַעֲשֵׂה
  chosen: was like the workmanship of
  alternatives:
  - was like the construction of
  - was made like
  lexicon: HALOT
  rationale: The prefixed כ indicates comparison. This rendering preserves the formal
    comparison while remaining readable.
- source_word: הַמֶּרְכָּבָה
  chosen: chariot
  alternatives:
  - carriage
  lexicon: HALOT
  rationale: In biblical Hebrew this normally denotes a chariot. 'Chariot wheel' is
    the natural English equivalent and fits the ancient setting better than 'carriage
    wheel'.
- source_word: יְדוֹתָם
  chosen: axles
  alternatives:
  - handles
  - supports
  lexicon: HALOT
  rationale: Although יָד often means 'hand' or 'handle,' in this wheel context it
    most plausibly refers to the axle-pieces or structural members associated with
    the wheel assembly. 'Axles' best fits the immediate list of wheel parts.
- source_word: גַבֵּיהֶם
  chosen: rims
  alternatives:
  - backs
  - felloes
  lexicon: HALOT
  rationale: In context of wheel construction, this term is best understood as the
    raised outer part of the wheel, i.e., the rim. 'Felloes' is more technical/archaic;
    'rims' is clear modern English.
- source_word: חִשֻּׁקֵיהֶם
  chosen: spokes
  alternatives:
  - struts
  - bands
  lexicon: HALOT
  rationale: In the context of wheel anatomy, this term is commonly taken for the
    connecting members between hub and rim. 'Spokes' is the clearest idiomatic rendering.
- source_word: חִשֻּׁרֵיהֶם
  chosen: hubs
  alternatives:
  - naves
  - axle-housings
  lexicon: HALOT
  rationale: This rare term appears in a list of wheel parts and is best rendered
    as the central wheel-piece, the hub. 'Naves' is traditional but archaic; 'hubs'
    is accessible modern English.
- source_word: הַכֹּל
  chosen: all
  alternatives:
  - the whole of them
  lexicon: HALOT
  rationale: Summative term referring to all the listed components.
- source_word: מוּצָק
  chosen: cast metal
  alternatives:
  - cast
  - molten-work
  lexicon: HALOT
  rationale: Passive participial form from יצק indicates something cast in metal.
    Rendering as 'cast metal' makes explicit the material/manufacturing sense in natural
    English.
