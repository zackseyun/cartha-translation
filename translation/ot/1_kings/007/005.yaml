id: 1KI.7.5
reference: 1 Kings 7:5
source:
  edition: WLC
  text: וְ/כָל הַ/פְּתָחִ֥ים וְ/הַ/מְּזוּז֖וֹת רְבֻעִ֣ים שָׁ֑קֶף וּ/מ֧וּל מֶחֱזָ֛ה
    אֶל מֶחֱזָ֖ה שָׁלֹ֥שׁ פְּעָמִֽים־־׃
translation:
  text: All the doorways and the doorposts had square frames, and window faced window
    in three rows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All the openings and the doorposts had square lintels'; the Hebrew architectural
      term may refer more specifically to the upper frame or lintel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'window opposite window, three times'; that is, corresponding
      windows arranged in three tiers or rows.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתָחִים
  chosen: doorways
  alternatives:
  - openings
  - entrances
  - doors
  lexicon: HALOT
  rationale: פֶּתַח commonly denotes an opening or entrance. 'Doorways' fits the architectural
    context better than 'doors,' since the verse describes structural features rather
    than movable panels.
- source_word: מְּזוּזוֹת
  chosen: doorposts
  alternatives:
  - jambs
  - posts
  lexicon: HALOT
  rationale: מְזוּזָה refers to the side posts/jambs of a doorway. 'Doorposts' is
    clear modern English and preserves the architectural sense.
- source_word: רְבֻעִים
  chosen: square
  alternatives:
  - four-sided
  - rectangular
  lexicon: HALOT
  rationale: The adjective indicates a four-cornered/square shape. 'Square' is the
    most natural concise rendering in English for the frame shape being described.
- source_word: שָׁקֶף
  chosen: frames
  alternatives:
  - lintel
  - beveled frame
  - surround
  lexicon: HALOT
  rationale: שָׁקֶף is an architectural term often associated with the upper frame/lintel
    area. In this context, joined with 'square,' it likely describes the framed form
    of the openings and posts. 'Frames' communicates the structural idea without overcommitting
    to only the top beam.
- source_word: מ֧וּל
  chosen: faced
  alternatives:
  - opposite
  - in front of
  lexicon: HALOT
  rationale: מוּל expresses opposition or correspondence. 'Faced' gives idiomatic
    English for architectural alignment.
- source_word: מֶחֱזָה
  chosen: window
  alternatives:
  - opening
  - view-opening
  lexicon: HALOT
  rationale: In this building description, מֶחֱזָה most plausibly refers to a window
    or visible opening. 'Window' is the standard architectural rendering and matches
    the parallel phrase 'window faced window.'
- source_word: אֶל מֶחֱזָה
  chosen: window
  alternatives:
  - opening
  - another window
  lexicon: HALOT
  rationale: The repeated phrase expresses one window opposite another. English idiom
    compresses this as 'window faced window' while preserving the reciprocal arrangement.
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: in three rows
  alternatives:
  - three times
  - on three levels
  lexicon: HALOT
  rationale: Literally 'three times,' but in this architectural context it refers
    to a repeated arrangement in three tiers/rows, as in the surrounding description
    of the building. 'In three rows' best conveys the intended spatial repetition.
