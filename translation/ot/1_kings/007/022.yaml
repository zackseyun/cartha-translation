id: 1KI.7.22
reference: 1 Kings 7:22
source:
  edition: WLC
  text: וְ/עַ֛ל רֹ֥אשׁ הָ/עַמּוּדִ֖ים מַעֲשֵׂ֣ה שׁוֹשָׁ֑ן וַ/תִּתֹּ֖ם מְלֶ֥אכֶת הָ/עַמּוּדִֽים׃
translation:
  text: And on the top of the pillars was lily-work, and the work of the pillars was
    finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lily-shaped ornamentation' or 'lily design.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the workmanship of the pillars was completed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: top
  alternatives:
  - head
  - capital
  lexicon: HALOT
  rationale: In architectural context with pillars, רֹאשׁ refers to the upper part.
    'Top' is natural modern English and avoids over-specifying 'capital,' since the
    verse itself does not use the technical term for capital here.
- source_word: הָעַמּוּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: עַמּוּדִים denotes structural pillars/columns. 'Pillars' fits common
    English Bible usage and the temple-building context.
- source_word: מַעֲשֵׂה
  chosen: work
  alternatives:
  - craftsmanship
  - design
  lexicon: HALOT
  rationale: מַעֲשֵׂה broadly means work, workmanship, or crafted thing. Here it introduces
    the decorative form on the pillars. 'Work' preserves the concise Hebrew expression
    and allows the compound 'lily-work.'
- source_word: שׁוֹשָׁן
  chosen: lily
  alternatives:
  - lotus
  - lily-shaped ornament
  lexicon: HALOT
  rationale: שׁוֹשָׁן commonly denotes a lily and in temple-description contexts refers
    to lily-shaped ornamentation. 'Lily' is the standard lexical value; the ornamental
    sense is conveyed by the compound 'lily-work.'
- source_word: וַתִּתֹּם
  chosen: was finished
  alternatives:
  - was completed
  - came to an end
  lexicon: HALOT
  rationale: From תמם, the verb indicates completion. Rendering it passively in English
    reflects the idiomatic sense of the Hebrew wayyiqtol with the feminine subject
    'work' and yields natural English.
- source_word: מְלֶאכֶת
  chosen: the work
  alternatives:
  - the workmanship
  - the construction
  lexicon: HALOT
  rationale: מְלָאכָה refers to work or workmanship. 'The work of the pillars' is
    a close rendering that leaves the phrase broad enough to include their crafted
    production and ornamentation.
