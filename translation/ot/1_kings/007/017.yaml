id: 1KI.7.17
reference: 1 Kings 7:17
source:
  edition: WLC
  text: שְׂבָכִ֞ים מַעֲשֵׂ֣ה שְׂבָכָ֗ה גְּדִלִים֙ מַעֲשֵׂ֣ה שַׁרְשְׁר֔וֹת לַ/כֹּ֣תָרֹ֔ת
    אֲשֶׁ֖ר עַל רֹ֣אשׁ הָ/עַמּוּדִ֑ים שִׁבְעָה֙ לַ/כֹּתֶ֣רֶת הָ/אֶחָ֔ת וְ/שִׁבְעָ֖ה
    לַ/כֹּתֶ֥רֶת הַ/שֵּׁנִֽית־׃
translation:
  text: 'There were lattices of latticework and twisted cords of chainwork for the
    capitals that were on the tops of the pillars: seven for the one capital, and
    seven for the second capital.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'networks of network-work and braided strands of chain-work.' The Hebrew
      uses paired craft terms to describe the decorative metalwork on the pillar capitals.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂבָכִים
  chosen: lattices
  alternatives:
  - network patterns
  - grates
  lexicon: HALOT
  rationale: Plural noun denoting netlike or lattice structures in the pillar ornamentation.
    'Lattices' is natural English and preserves the concrete architectural image better
    than the more abstract 'network patterns.'
- source_word: מַעֲשֵׂה שְׂבָכָה
  chosen: of latticework
  alternatives:
  - of network work
  - made like a lattice
  lexicon: HALOT
  rationale: The construct phrase specifies workmanship or pattern. 'Of latticework'
    gives a concise architectural description in idiomatic English while retaining
    the formal sense of crafted design.
- source_word: גְּדִלִים
  chosen: twisted cords
  alternatives:
  - wreaths
  - braided strands
  lexicon: HALOT
  rationale: The noun can denote twisted or braided elements. 'Twisted cords' best
    fits the likely ornamental metalwork attached to the capitals and avoids overcommitting
    to a floral image such as 'wreaths.'
- source_word: מַעֲשֵׂה שַׁרְשְׁר֔וֹת
  chosen: of chainwork
  alternatives:
  - of chains
  - of chain-like work
  lexicon: HALOT
  rationale: This construct phrase describes the cords as fashioned in chain form.
    'Chainwork' is compact and suitably architectural/decorative.
- source_word: לַכֹּתָרֹת
  chosen: for the capitals
  alternatives:
  - for the crowns
  - for the chapiters
  lexicon: HALOT
  rationale: In this temple-building context the term refers to the ornamental tops
    of pillars. 'Capitals' is the clearest modern architectural equivalent; 'chapiters'
    is traditional but archaic, and 'crowns' is too general.
- source_word: אֲשֶׁר עַל רֹאשׁ הָעַמּוּדִים
  chosen: that were on the tops of the pillars
  alternatives:
  - which were on the heads of the pillars
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in architectural context 'top' is the
    natural English rendering. This preserves the spatial relation without wooden
    literalism.
- source_word: שִׁבְעָה לַכֹּתֶרֶת הָאֶחָת וְשִׁבְעָה לַכֹּתֶרֶת הַשֵּׁנִית
  chosen: seven for the one capital, and seven for the second capital
  alternatives:
  - seven for one capital and seven for the other
  - seven apiece for the two capitals
  lexicon: HALOT
  rationale: The Hebrew explicitly counts seven for each capital individually. The
    chosen wording preserves that distributive sense clearly and closely.
