id: 1KI.7.51
reference: 1 Kings 7:51
source:
  edition: WLC
  text: וַ/תִּשְׁלַם֙ כָּל הַ/מְּלָאכָ֔ה אֲשֶׁ֥ר עָשָׂ֛ה הַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה בֵּ֣ית
    יְהוָ֑ה וַ/יָּבֵ֨א שְׁלֹמֹ֜ה אֶת קָדְשֵׁ֣י דָּוִ֣ד אָבִ֗י/ו אֶת הַ/כֶּ֤סֶף וְ/אֶת
    הַ/זָּהָב֙ וְ/אֶת הַ/כֵּלִ֔ים נָתַ֕ן בְּ/אֹצְר֖וֹת בֵּ֥ית יְהוָֽה־־׀־־־׃פ
translation:
  text: So all the work that King Solomon did for the house of the LORD was finished.
    And Solomon brought in the holy things of David his father—the silver, the gold,
    and the vessels—and put them in the treasuries of the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dedicated things of David his father.' The Hebrew refers to items
      set apart as holy for the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַם
  chosen: was finished
  alternatives:
  - was completed
  - came to an end
  lexicon: HALOT
  rationale: 'From שלם in the sense of being complete/finished. Although the verb
    form is 3fs agreeing with מְלָאכָה (''work''), idiomatic English renders the result
    passively: ''the work ... was finished.'' This best reflects the Hebrew sense
    without awkwardness.'
- source_word: כָּל הַמְּלָאכָה
  chosen: all the work
  alternatives:
  - all the workmanship
  - the whole work
  lexicon: HALOT
  rationale: מְלָאכָה here denotes the total labor/project associated with temple
    construction and furnishing. 'All the work' is natural and sufficiently broad.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formally, the Hebrew says 'house of YHWH.' Per doctrine, יְהוָה is rendered
    'the LORD.' 'House' is retained rather than 'temple' to stay closer to the source
    while remaining clear in context.
- source_word: וַיָּבֵא
  chosen: brought in
  alternatives:
  - brought
  - caused to enter
  lexicon: HALOT
  rationale: The hiphil of בוא commonly means 'bring in/bring.' Because the destination
    is the temple treasuries, 'brought in' captures the directional nuance.
- source_word: קָדְשֵׁי דָּוִד אָבִיו
  chosen: the holy things of David his father
  alternatives:
  - the dedicated things of David his father
  - the consecrated gifts of David his father
  lexicon: HALOT
  rationale: קָדְשֵׁי refers to items set apart as holy/dedicated. 'Holy things' is
    the most direct rendering; the following apposition ('the silver, the gold, and
    the vessels') clarifies that these are consecrated objects. 'Dedicated things'
    is possible but less transparent to the lexical link with holiness.
- source_word: הַכֶּסֶף ... הַזָּהָב ... הַכֵּלִים
  chosen: the silver, the gold, and the vessels
  alternatives:
  - the silver, the gold, and the articles
  - the silver, the gold, and the utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/implements/vessels. In temple context,
    'vessels' is a standard and accurate rendering without over-specifying function.
- source_word: נָתַן
  chosen: put
  alternatives:
  - placed
  - deposited
  lexicon: HALOT
  rationale: נתן literally means 'gave/put.' In context of storing sacred items in
    treasuries, 'put' is idiomatic and clear.
- source_word: בְּאֹצְרוֹת
  chosen: in the treasuries
  alternatives:
  - in the storehouses
  - in the treasury chambers
  lexicon: HALOT
  rationale: The plural denotes storage rooms/treasuries associated with the temple.
    'Treasuries' is concise and contextually appropriate.
