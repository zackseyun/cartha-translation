id: 1KI.7.3
reference: 1 Kings 7:3
source:
  edition: WLC
  text: וְ/סָפֻ֣ן בָּ/אֶ֗רֶז מִ/מַּ֨עַל֙ עַל הַ/צְּלָעֹת֙ אֲשֶׁ֣ר עַל הָֽ/עַמּוּדִ֔ים
    אַרְבָּעִ֖ים וַ/חֲמִשָּׁ֑ה חֲמִשָּׁ֥ה עָשָׂ֖ר הַ/טּֽוּר־־׃
translation:
  text: It was paneled with cedar above, over the side chambers that were on the pillars,
    forty-five in all, fifteen to a row.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It was covered with cedar above, over the side structures that were
      on the pillars.' The Hebrew architectural terms are difficult, especially צלעות
      ('sides/ribs/side chambers').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפֻן
  chosen: It was paneled
  alternatives:
  - It was covered
  - It was roofed
  lexicon: HALOT
  rationale: Passive participle from ספן conveys being overlaid or covered with a
    finishing material. 'Paneled' fits the architectural context with cedar as interior
    cladding better than the broader 'covered,' while avoiding the narrower 'roofed.'
- source_word: בָּאֶרֶז
  chosen: with cedar
  alternatives:
  - in cedar
  - with cedar wood
  lexicon: HALOT
  rationale: The beth marks material; 'with cedar' is natural English for construction
    material and preserves the sense of cedar paneling.
- source_word: מִמַּעַל
  chosen: above
  alternatives:
  - from above
  - up above
  lexicon: HALOT
  rationale: Locative adverb indicating the upper part of the structure. 'Above' is
    concise and fits the architectural description.
- source_word: עַל הַצְּלָעוֹת
  chosen: over the side chambers
  alternatives:
  - over the ribs
  - over the side structures
  lexicon: HALOT
  rationale: צלעות literally means 'sides/ribs,' but in building contexts commonly
    refers to side rooms or side structures. 'Side chambers' best matches the likely
    architectural sense here.
- source_word: אֲשֶׁר עַל הָעַמּוּדִים
  chosen: that were on the pillars
  alternatives:
  - that were upon the pillars
  - which rested on the pillars
  lexicon: HALOT
  rationale: The relative clause modifies the side chambers/side structures and locates
    them in relation to the pillars. 'That were on the pillars' stays close to the
    Hebrew while remaining readable.
- source_word: אַרְבָּעִים וַחֲמִשָּׁה
  chosen: forty-five in all
  alternatives:
  - forty-five
  - forty and five
  lexicon: HALOT
  rationale: The number likely gives the total count of the structural elements just
    mentioned. 'In all' makes the summarizing force clear in English without adding
    new information.
- source_word: חֲמִשָּׁה עָשָׂר הַטּוּר
  chosen: fifteen to a row
  alternatives:
  - fifteen in a row
  - fifteen each row
  lexicon: HALOT
  rationale: הטור denotes a row or course. The phrase explains the distribution of
    the total forty-five as fifteen per row. 'To a row' is idiomatic and concise.
