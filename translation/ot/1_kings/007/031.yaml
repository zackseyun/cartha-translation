id: 1KI.7.31
reference: 1 Kings 7:31
source:
  edition: WLC
  text: וּ֠/פִי/הוּ מִ/בֵּ֨ית לַ/כֹּתֶ֤רֶת וָ/מַ֨עְלָ/ה֙ בָּֽ/אַמָּ֔ה וּ/פִ֨י/הָ֙
    עָגֹ֣ל מַעֲשֵׂה כֵ֔ן אַמָּ֖ה וַ/חֲצִ֣י הָֽ/אַמָּ֑ה וְ/גַם עַל פִּ֨י/הָ֙ מִקְלָע֔וֹת
    וּ/מִסְגְּרֹתֵי/הֶ֥ם מְרֻבָּע֖וֹת לֹ֥א עֲגֻלּֽוֹת־־־׃
translation:
  text: Its opening projected upward from within the capital by a cubit, and its opening
    was round, made like a pedestal, a cubit and a half; and also on its opening were
    carvings, and their panels were square, not round.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its mouth'; the Hebrew uses an architectural metaphor for the opening.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'made like a pedestal' is technically difficult; alternatives
      include 'the workmanship of a stand' or 'made like a base.'
    reason: lexical_alternative
  - marker: c
    text: Or 'engraved work,' 'wreaths,' or 'garlands' for the decorative term here.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִיהוּ / פִיהָ
  chosen: opening
  alternatives:
  - mouth
  - rim
  - top opening
  lexicon: HALOT
  rationale: In this architectural context, פֶּה refers to the mouth/opening of the
    structure rather than a literal mouth. 'Opening' is natural English and fits the
    repeated description of the top aperture of the stand/capital assembly.
- source_word: מִבֵּית לַכֹּתֶרֶת
  chosen: from within the capital
  alternatives:
  - inside the capital
  - from the interior of the capital
  lexicon: HALOT
  rationale: בַּיִת in construct with a following noun can denote the interior/inside
    of something. כֹּתֶרֶת here is the capital-like upper element of the stand. 'From
    within the capital' best captures the spatial relation.
- source_word: וָמַעְלָה
  chosen: projected upward
  alternatives:
  - and upward
  - rose upward
  - extended upward
  lexicon: HALOT
  rationale: The adverbial expression indicates upward extension. Because English
    normally requires a verbal idea here, 'projected upward' supplies the implied
    sense without over-paraphrasing.
- source_word: בָּאַמָּה
  chosen: by a cubit
  alternatives:
  - one cubit high
  - for a cubit
  lexicon: HALOT
  rationale: The phrase gives the measure of the upward extension. 'By a cubit' is
    concise and idiomatic in descriptive measurements.
- source_word: עָגֹל
  chosen: round
  alternatives:
  - circular
  lexicon: HALOT
  rationale: Straightforward shape term; 'round' is more readable than 'circular'
    in this descriptive prose.
- source_word: מַעֲשֵׂה כֵן
  chosen: made like a pedestal
  alternatives:
  - the workmanship of a stand
  - made like a base
  - work of a pedestal
  lexicon: HALOT
  rationale: כֵּן commonly denotes a stand/base/pedestal. In this technical description,
    the phrase likely compares the round opening's workmanship/form to that of a pedestal
    or stand. 'Made like a pedestal' gives a clear architectural comparison.
- source_word: אַמָּה וַחֲצִי הָאַמָּה
  chosen: a cubit and a half
  alternatives:
  - one and a half cubits
  lexicon: HALOT
  rationale: Standard rendering of the measurement phrase.
- source_word: מִקְלָעוֹת
  chosen: carvings
  alternatives:
  - wreaths
  - garlands
  - engraved work
  lexicon: HALOT
  rationale: The noun refers to ornamental worked decoration. Because the exact motif
    is uncertain in this difficult architectural passage, 'carvings' preserves the
    idea of decorative workmanship without over-specifying the pattern.
- source_word: מִסְגְּרֹתֵיהֶם
  chosen: their panels
  alternatives:
  - their frames
  - their borders
  lexicon: HALOT
  rationale: מִסְגֶּרֶת in these temple-furnishing descriptions often denotes framed
    sections or panels. 'Panels' fits the immediate contrast with square versus round
    forms.
- source_word: מְרֻבָּעוֹת לֹא עֲגֻלּוֹת
  chosen: were square, not round
  alternatives:
  - were rectangular, not circular
  lexicon: HALOT
  rationale: The contrast is explicit between four-sided/square and round. 'Square,
    not round' is the most direct rendering.
