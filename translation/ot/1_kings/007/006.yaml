id: 1KI.7.6
reference: 1 Kings 7:6
source:
  edition: WLC
  text: וְ/אֵ֨ת אוּלָ֤ם הָֽ/עַמּוּדִים֙ עָשָׂ֔ה חֲמִשִּׁ֤ים אַמָּה֙ אָרְכּ֔/וֹ וּ/שְׁלֹשִׁ֥ים
    אַמָּ֖ה רָחְבּ֑/וֹ וְ/אוּלָם֙ עַל פְּנֵי/הֶ֔ם וְ/עַמֻּדִ֥ים וְ/עָ֖ב עַל פְּנֵי/הֶֽם־־׃
translation:
  text: He made the Hall of Pillars fifty cubits long and thirty cubits wide, with
    a porch in front of them, and pillars and a canopy in front of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portico' for both occurrences of אוּלָם; the Hebrew uses the same term
      twice, but the second likely refers to a frontal porch-like feature attached
      to the Hall of Pillars.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'canopy' (עָב) is uncertain in this architectural
      context; alternatives include 'threshold,' 'beamwork,' or another covered structural
      element.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלָם
  chosen: Hall
  alternatives:
  - portico
  - vestibule
  - porch
  lexicon: HALOT
  rationale: In this architectural context, אוּלָם denotes a substantial entrance
    structure or hall. 'Hall' fits the scale better than 'porch' for the main structure
    here, while allowing the later וְאוּלָם to be rendered as a smaller frontal porch.
- source_word: הָעַמּוּדִים
  chosen: of Pillars
  alternatives:
  - of columns
  lexicon: HALOT
  rationale: The genitive identifies this structure as characterized by pillars. 'Pillars'
    is natural English and preserves the architectural sense.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - built
  - constructed
  lexicon: HALOT
  rationale: The verb is the common עשה, 'make/do.' 'Made' is a straightforward rendering;
    'built' would be interpretive though contextually possible.
- source_word: חֲמִשִּׁים אַמָּה אָרְכּוֹ
  chosen: fifty cubits long
  alternatives:
  - its length was fifty cubits
  lexicon: HALOT
  rationale: This compresses the Hebrew measurement idiom into natural English while
    preserving the exact dimensions.
- source_word: וּשְׁלֹשִׁים אַמָּה רָחְבּוֹ
  chosen: thirty cubits wide
  alternatives:
  - its width was thirty cubits
  lexicon: HALOT
  rationale: As with the previous phrase, this is a natural English rendering of the
    Hebrew dimension formula.
- source_word: וְאוּלָם עַל־פְּנֵיהֶם
  chosen: with a porch in front of them
  alternatives:
  - and a portico before them
  - and a vestibule in front of them
  lexicon: HALOT
  rationale: The repeated אוּלָם here appears to denote a frontal projecting entrance
    feature relative to the pillars. Rendering it 'porch' distinguishes it from the
    larger 'Hall' and suits the phrase 'in front of them.' The prepositional phrase
    עַל־פְּנֵי commonly means 'before/in front of.'
- source_word: וְעַמֻּדִים
  chosen: and pillars
  alternatives:
  - with pillars
  lexicon: HALOT
  rationale: The noun is retained explicitly, even though the syntax is terse. The
    Hebrew likely notes additional pillars associated with the porch/frontage, so
    the translation preserves the coordination rather than smoothing it away.
- source_word: וְעָב
  chosen: and a canopy
  alternatives:
  - and a threshold
  - and a beamwork
  - and a thick covering
  lexicon: HALOT
  rationale: The noun is difficult and contextually debated. In this architectural
    setting it likely refers to a projecting cover or roof-like element over the front.
    'Canopy' communicates a covering structure in readable English without overcommitting
    to a more technical reconstruction.
- source_word: עַל־פְּנֵיהֶם
  chosen: in front of them
  alternatives:
  - before them
  lexicon: HALOT
  rationale: This preserves the spatial relation in clear modern English.
