id: 1KI.7.37
reference: 1 Kings 7:37
source:
  edition: WLC
  text: כָּ/זֹ֣את עָשָׂ֔ה אֵ֖ת עֶ֣שֶׂר הַ/מְּכֹנ֑וֹת מוּצָ֨ק אֶחָ֜ד מִדָּ֥ה אַחַ֛ת
    קֶ֥צֶב אֶחָ֖ד לְ/כֻלָּֽ/הְנָה׃ס
translation:
  text: 'Thus he made the ten stands: one casting, one measure, one form for all of
    them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one cast work, one size, one design for all of them.' The Hebrew uses
      three compact parallel expressions to stress that all ten stands were made to
      the same specification.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּזֹאת
  chosen: Thus
  alternatives:
  - Like this
  - In this way
  lexicon: HALOT
  rationale: Introduces a summary statement referring back to the described design
    and workmanship. 'Thus' is concise and natural in English while preserving the
    demonstrative force.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  - he produced
  lexicon: HALOT
  rationale: Standard rendering of עשה in a craftsmanship context. 'Made' is straightforward
    and fits the summary description.
- source_word: הַמְּכֹנוֹת
  chosen: the ten stands
  alternatives:
  - the ten carts
  - the ten bases
  lexicon: HALOT
  rationale: מְכוֹנוֹת in this temple-furnishing context refers to the wheeled stands/bases
    for the basins. 'Stands' is clear modern English and avoids overcommitting to
    'carts' while still matching the object's function.
- source_word: מוּצָק אֶחָד
  chosen: one casting
  alternatives:
  - one cast work
  - one molten work
  - one casting pattern
  lexicon: HALOT
  rationale: מוּצָק denotes something cast or poured in metalwork. The phrase indicates
    uniformity of manufacture among the ten stands. 'One casting' preserves the terse
    Hebrew and the metallurgical sense.
- source_word: מִדָּה אַחַת
  chosen: one measure
  alternatives:
  - one size
  - the same dimensions
  lexicon: HALOT
  rationale: Literally 'one measure.' It refers to identical dimensions. 'One measure'
    keeps the formal parallelism of the Hebrew; the sense of same size is evident
    from context.
- source_word: קֶצֶב אֶחָד
  chosen: one form
  alternatives:
  - one shape
  - one design
  - one proportion
  lexicon: HALOT
  rationale: קֶצֶב here denotes pattern, form, or proportion. 'One form' preserves
    the concise parallel structure with the previous phrases while communicating uniform
    design.
- source_word: לְכֻלָּהְנָה
  chosen: for all of them
  alternatives:
  - for all ten
  - for them all
  lexicon: HALOT
  rationale: Refers back to the ten stands collectively. 'For all of them' is natural
    and preserves the distributive sense that the same specifications applied to each.
