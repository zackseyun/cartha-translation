id: 1KI.7.40
reference: 1 Kings 7:40
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ חִיר֔וֹם אֶת הַ֨/כִּיֹּר֔וֹת וְ/אֶת הַ/יָּעִ֖ים וְ/אֶת הַ/מִּזְרָק֑וֹת וַ/יְכַ֣ל חִירָ֗ם לַֽ/עֲשׂוֹת֙ אֶת כָּל הַ/מְּלָאכָ֔ה אֲשֶׁ֥ר עָשָׂ֛ה לַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה בֵּ֥ית יְהוָֽה־־־־־׃
translation:
  text: And Hiram made the basins, the shovels, and the bowls. So Hiram finished doing all the work that he did for King Solomon for the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sprinkling bowls,' referring to bowls used in sacrificial rites.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּיֹּרוֹת
  chosen: basins
  alternatives:
  - lavers
  lexicon: HALOT
  rationale: The noun refers to large wash vessels in temple furnishings. 'Basins' is clear modern English; 'lavers' is traditional but less accessible and more archaic.
- source_word: יָּעִים
  chosen: shovels
  alternatives:
  - scoops
  lexicon: HALOT
  rationale: This term denotes implements for removing ashes or coals. 'Shovels' is the standard and most natural rendering in this cultic context.
- source_word: מִּזְרָקוֹת
  chosen: bowls
  alternatives:
  - basins
  - sprinkling bowls
  lexicon: HALOT
  rationale: The word denotes vessels used for receiving or throwing sacrificial blood or liquids. 'Bowls' is the broad, readable rendering; more specific cultic nuance can be preserved in a footnote.
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - completed
  - brought to an end
  lexicon: HALOT
  rationale: The verb כלה here marks completion of the assigned work. 'Finished' is idiomatic and concise.
- source_word: כָּל הַמְּלָאכָה
  chosen: all the work
  alternatives:
  - all the craftsmanship
  - all the labor
  lexicon: HALOT
  rationale: מְלָאכָה is a broad term for work or workmanship. 'All the work' best fits the summary statement without over-specifying artistry.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following the doctrine default, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression more directly than 'temple,' though the referent is the temple.
- source_word: חִירוֹם / חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  lexicon: HALOT
  rationale: The proper name appears here in orthographic variation. 'Hiram' is the conventional English transliteration for this figure and fits both spellings in context.
- source_word: עָשָׂה ... לַמֶּלֶךְ שְׁלֹמֹה
  chosen: that he did for King Solomon
  alternatives:
  - that he made for King Solomon
  lexicon: HALOT
  rationale: The repeated עשה can mean 'do' or 'make.' Rendering the first occurrence as 'made' for the vessels and the summary clause as 'did' avoids awkward repetition while preserving sense.
