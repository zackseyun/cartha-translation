id: 1KI.7.48
reference: 1 Kings 7:48
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שְׁלֹמֹ֔ה אֵ֚ת כָּל הַ/כֵּלִ֔ים אֲשֶׁ֖ר בֵּ֣ית יְהוָ֑ה אֵ֚ת מִזְבַּ֣ח
    הַ/זָּהָ֔ב וְ/אֶת הַ/שֻּׁלְחָ֗ן אֲשֶׁ֥ר עָלָ֛י/ו לֶ֥חֶם הַ/פָּנִ֖ים זָהָֽב־־׃
translation:
  text: 'And Solomon made all the vessels that were in the house of the LORD: the
    golden altar, and the table on which was the bread of the Presence, of gold.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the showbread.' Literally, 'the bread of the Presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  - constructed
  lexicon: HALOT
  rationale: The verb עשה is broad ('make/do'). In this inventory context, 'made'
    is the most natural and sufficiently formal rendering without overstating craftsmanship.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the furnishings
  - all the utensils
  lexicon: HALOT
  rationale: כֵּלִים can denote articles, implements, vessels, or furnishings. Here
    it refers to temple items listed immediately after, so 'vessels' preserves the
    cultic/material sense better than the broader 'furnishings.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following the doctrine default, יְהוָה is
    rendered 'the LORD.' 'House' preserves the Hebrew expression more directly than
    'temple,' while remaining clear in context.
- source_word: מִזְבַּח הַזָּהָב
  chosen: the golden altar
  alternatives:
  - the altar of gold
  lexicon: HALOT
  rationale: An attributive English rendering is idiomatic and clear. The phrase refers
    to the altar overlaid or made with gold in the sanctuary context.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: A straightforward rendering of שֻׁלְחָן. The following relative clause
    identifies it specifically as the table associated with the bread of the Presence.
- source_word: אֲשֶׁר עָלָיו
  chosen: on which was
  alternatives:
  - upon it was
  - on it was
  lexicon: HALOT
  rationale: This relative-prepositional phrase is rendered idiomatically in English
    as 'on which was,' preserving the locative sense.
- source_word: לֶחֶם הַפָּנִים
  chosen: the bread of the Presence
  alternatives:
  - the showbread
  - the bread of the face/presence
  lexicon: HALOT
  rationale: This is the standard literal-modern rendering of the cultic term, preserving
    the Hebrew sense of bread set before the divine presence. 'Showbread' is traditional
    but less transparent to modern readers.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: 'The final זָהָב most naturally qualifies the table phrase in apposition:
    ''the table ... of gold.'' Rendering it as ''of gold'' preserves the Hebrew structure
    and avoids ambiguity about whether it modifies only the bread phrase.'
