id: 1KI.7.32
reference: 1 Kings 7:32
source:
  edition: WLC
  text: וְ/אַרְבַּ֣עַת הָ/אֽוֹפַנִּ֗ים לְ/מִ/תַּ֨חַת֙ לַֽ/מִּסְגְּר֔וֹת וִ/יד֥וֹת
    הָ/אֽוֹפַנִּ֖ים בַּ/מְּכוֹנָ֑ה וְ/קוֹמַת֙ הָ/אוֹפַ֣ן הָ/אֶחָ֔ד אַמָּ֖ה וַ/חֲצִ֥י
    הָ/אַמָּֽה׃
translation:
  text: And the four wheels were underneath the panels, and the axles of the wheels
    were on the stand; and the height of each wheel was a cubit and a half.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frames' or 'borders' for 'panels' (Hebrew מִסְגְּרוֹת).
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'hands of the wheels'; in context this likely refers to
      the wheel-axles or supporting shafts.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹפַנִּים / הָאוֹפַן
  chosen: wheels / wheel
  alternatives:
  - wheelwork
  lexicon: HALOT
  rationale: אוֹפַן in this architectural description plainly denotes literal wheels
    attached to the bronze stand. English 'wheel(s)' is the natural equivalent.
- source_word: לְמִתַּחַת
  chosen: underneath
  alternatives:
  - below
  - beneath
  lexicon: HALOT
  rationale: The compound prepositional form indicates position beneath something.
    'Underneath' is idiomatic and preserves the spatial relation.
- source_word: הַמִּסְגְּרוֹת
  chosen: the panels
  alternatives:
  - the frames
  - the borders
  lexicon: HALOT
  rationale: In the description of the stands, מִסְגְּרוֹת refers to the framed side
    structures or panel sections. 'Panels' best fits the immediate craftsmanship context
    in readable English, while 'frames' remains possible.
- source_word: וִידוֹת
  chosen: the axles
  alternatives:
  - the hands
  - the supports
  - the shafts
  lexicon: HALOT
  rationale: Though the noun is literally related to 'hands,' in this mechanical context
    it refers to the projecting parts by which the wheels were attached or supported.
    'Axles' best conveys the functional sense in context.
- source_word: בַּמְּכוֹנָה
  chosen: on the stand
  alternatives:
  - in the stand
  - on the base
  lexicon: HALOT
  rationale: מְכוֹנָה in this passage denotes the wheeled bronze stand/base. 'Stand'
    is a clear rendering consistent with the larger context of the laver stands; 'on'
    reflects the attachment of the wheel-axles to the structure.
- source_word: קוֹמַת
  chosen: the height of
  alternatives:
  - the elevation of
  - the stature of
  lexicon: HALOT
  rationale: קוֹמָה here gives a measurement of vertical size. 'The height of' is
    the straightforward English equivalent.
- source_word: הָאֶחָד
  chosen: each
  alternatives:
  - one
  - the one
  lexicon: HALOT
  rationale: Although literally 'the one,' in a distributive measurement statement
    referring to the wheels, idiomatic English is 'each wheel.' This preserves the
    sense without wooden phrasing.
- source_word: אַמָּה וַחֲצִי הָאַמָּה
  chosen: a cubit and a half
  alternatives:
  - one and a half cubits
  lexicon: HALOT
  rationale: The Hebrew gives the standard ancient measurement directly. Retaining
    'cubit' preserves source-language concreteness better than converting to modern
    units.
