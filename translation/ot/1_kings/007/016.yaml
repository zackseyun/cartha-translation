id: 1KI.7.16
reference: 1 Kings 7:16
source:
  edition: WLC
  text: וּ/שְׁתֵּ֨י כֹתָרֹ֜ת עָשָׂ֗ה לָ/תֵ֛ת עַל רָאשֵׁ֥י הָֽ/עַמּוּדִ֖ים מֻצַ֣ק נְחֹ֑שֶׁת
    חָמֵ֣שׁ אַמּ֗וֹת קוֹמַת֙ הַ/כֹּתֶ֣רֶת הָ/אֶחָ֔ת וְ/חָמֵ֣שׁ אַמּ֔וֹת קוֹמַ֖ת הַ/כֹּתֶ֥רֶת
    הַ/שֵּׁנִֽית־׃
translation:
  text: He made two capitals of cast bronze to set on the tops of the pillars. The
    height of the one capital was five cubits, and the height of the second capital
    was five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crowns' for 'capitals'; the Hebrew term denotes the top ornamental section
      of a pillar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹתָרֹת / הַכֹּתֶרֶת
  chosen: capitals / capital
  alternatives:
  - crowns
  - chapiters
  lexicon: HALOT
  rationale: In architectural context on top of pillars, the term refers to the ornamental
    top piece of a column. 'Capital' is the standard clear modern architectural term.
    'Crowns' is too literal and potentially misleading; 'chapiters' is archaic.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  - constructed
  lexicon: HALOT
  rationale: The common verb 'made' fits the straightforward narrative description
    without adding stylistic weight not present in the Hebrew.
- source_word: לָתֵת
  chosen: to set
  alternatives:
  - to place
  - to put
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: he made them in order to place them
    on the pillars. ''To set'' is natural in English for positioning architectural
    elements.'
- source_word: רָאשֵׁי הָעַמּוּדִים
  chosen: the tops of the pillars
  alternatives:
  - the heads of the pillars
  - the tops of the columns
  lexicon: HALOT
  rationale: '''Heads'' is a literal rendering of רָאשֵׁי but sounds unnatural in
    English here. ''Tops'' conveys the architectural sense accurately. ''Pillars''
    is retained for consistency with common temple-description usage, though ''columns''
    would also fit.'
- source_word: מֻצַק נְחֹשֶׁת
  chosen: of cast bronze
  alternatives:
  - of molten bronze
  - cast in bronze
  lexicon: HALOT
  rationale: 'The phrase describes the material/process: bronze that has been cast.
    ''Cast bronze'' is concise, idiomatic, and preserves the manufacturing sense better
    than a bare ''bronze.'''
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - seven and a half feet
  lexicon: HALOT
  rationale: The source uses the ancient unit cubits; preserving it is more textually
    transparent than converting to modern measurements.
- source_word: קוֹמַת
  chosen: the height of
  alternatives:
  - the stature of
  lexicon: HALOT
  rationale: In this architectural measurement context, 'height' is the natural and
    precise English equivalent.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - the first
  lexicon: HALOT
  rationale: The Hebrew says 'the one,' not explicitly 'the first.' English can preserve
    that distinction while remaining natural.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: The Hebrew explicitly marks the second of the pair. 'The second' is more
    precise than 'the other.'
