id: 1KI.7.13
reference: 1 Kings 7:13
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה וַ/יִּקַּ֥ח אֶת חִירָ֖ם מִ/צֹּֽר־׃
translation:
  text: Then King Solomon sent and brought Hiram from Tyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent for and took Hiram from Tyre.' The Hebrew verbs are literally 'sent'
      and 'took'; 'brought' in the main text expresses the sense idiomatically in
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח in the wayyiqtol sequence means 'sent.' In this context,
    English can imply the object of the sending by rendering 'sent for,' but the Hebrew
    itself simply says 'sent'; the following verb supplies the result. To avoid over-paraphrase
    while keeping natural English, the main text retains 'sent' and coordinates it
    with the next verb.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: The Hebrew apposition literally reads 'the king Solomon.' English idiom
    normally renders this as the title plus name, 'King Solomon.'
- source_word: וַיִּקַּח
  chosen: brought
  alternatives:
  - took
  - fetched
  lexicon: HALOT
  rationale: Although לקח commonly means 'take,' in this context after 'sent' and
    with a person brought from another city, idiomatic English 'brought' best conveys
    the resulting action. 'Took' is formally possible but sounds misleading in English,
    as if Solomon personally seized or accompanied Hiram. This is an optimal-equivalence
    adjustment grounded in context.
- source_word: אֶת חִירָם
  chosen: Hiram
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English. The personal name
    is transliterated as 'Hiram' in keeping with the philosophy of transliterating
    names.
- source_word: מִצֹּר
  chosen: from Tyre
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin, and צֹר is the place name Tyre.
    'From Tyre' is the straightforward rendering.
