id: 1KI.7.24
reference: 1 Kings 7:24
source:
  edition: WLC
  text: וּ/פְקָעִים֩ מִ/תַּ֨חַת לִ/שְׂפָת֤/וֹ סָבִיב֙ סֹבְבִ֣ים אֹת֔/וֹ עֶ֚שֶׂר בָּֽ/אַמָּ֔ה
    מַקִּפִ֥ים אֶת הַ/יָּ֖ם סָבִ֑יב שְׁנֵ֤י טוּרִים֙ הַ/פְּקָעִ֔ים יְצֻקִ֖ים בִּ/יצֻקָתֽ/וֹ׀־׃
translation:
  text: And gourds were under its rim all around, encircling it, ten to the cubit,
    surrounding the Sea all around. The gourds were in two rows, cast in one piece
    with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'buds' or 'knobs'; the Hebrew term refers to gourd-like ornamental forms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקָעִים
  chosen: gourds
  alternatives:
  - buds
  - knobs
  - colocynths
  lexicon: HALOT
  rationale: פְקָעִים denotes gourd-like ornamental forms; in this temple-furnishing
    context it refers to decorative projections shaped like gourds. 'Gourds' is concrete
    and traditional enough without over-specifying a botanical species.
- source_word: מִתַּחַת לִשְׂפָתוֹ
  chosen: under its rim
  alternatives:
  - beneath its lip
  - under its brim
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip' or 'edge'; for a large basin in natural
    English, 'rim' best conveys the vessel's upper edge.
- source_word: סָבִיב סֹבְבִים אֹתוֹ
  chosen: all around, encircling it
  alternatives:
  - round about surrounding it
  lexicon: HALOT
  rationale: The Hebrew uses cognate repetition for emphasis. The English preserves
    the sense with a natural double expression rather than flattening the repetition
    entirely.
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten to the cubit
  alternatives:
  - ten per cubit
  - ten in a cubit
  lexicon: HALOT
  rationale: The phrase most naturally gives the density/count along the circumference.
    'Ten to the cubit' is slightly formal but clear and avoids over-interpreting the
    exact measurement scheme.
- source_word: מַקִּפִים אֶת הַיָּם סָבִיב
  chosen: surrounding the Sea all around
  alternatives:
  - going around the Sea
  - encircling the Sea
  lexicon: HALOT
  rationale: הַיָּם here is the technical name for the large basin, so 'Sea' is capitalized
    as a named object. The participle indicates the ornaments encompassed it.
- source_word: שְׁנֵי טוּרִים
  chosen: in two rows
  alternatives:
  - two rows
  - double row
  lexicon: HALOT
  rationale: טוּרִים are rows. 'In two rows' fits the syntax with the following clause
    describing the arrangement of the gourds.
- source_word: יְצֻקִים בִּיצֻקָתוֹ
  chosen: cast in one piece with it
  alternatives:
  - cast when it was cast
  - cast as part of its casting
  - molten with it
  lexicon: HALOT
  rationale: The passive participle plus noun from the same root indicates that the
    ornaments were not attached later but formed integrally in the casting. 'Cast
    in one piece with it' makes that manufacturing detail explicit in idiomatic English.
