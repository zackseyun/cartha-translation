id: 1KI.7.50
reference: 1 Kings 7:50
source:
  edition: WLC
  text: וְ֠/הַ/סִּפּוֹת וְ/הַֽ/מְזַמְּר֧וֹת וְ/הַ/מִּזְרָק֛וֹת וְ/הַ/כַּפּ֥וֹת וְ/הַ/מַּחְתּ֖וֹת
    זָהָ֣ב סָג֑וּר וְ/הַ/פֹּת֡וֹת לְ/דַלְתוֹת֩ הַ/בַּ֨יִת הַ/פְּנִימִ֜י לְ/קֹ֣דֶשׁ
    הַ/קֳּדָשִׁ֗ים לְ/דַלְתֵ֥י הַ/בַּ֛יִת לַ/הֵיכָ֖ל זָהָֽב׃פ
translation:
  text: and the basins, the snuffers, the bowls, the cups, and the firepans, of pure
    gold; and the sockets for the doors of the inner house, for the Most Holy Place,
    and for the doors of the house, that is, the nave, of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sprinkling bowls' for 'bowls.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Holy of Holies.'''
    reason: lexical_alternative
  - marker: c
    text: The Hebrew likely refers to pivot-sockets or similar door fittings, not
      modern strap hinges.
    reason: cultural_note
  - marker: d
    text: Or 'main hall' for 'nave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפּוֹת
  chosen: the basins
  alternatives:
  - the bowls
  - the threshold bowls
  lexicon: HALOT
  rationale: In temple-vessel lists this noun most naturally refers to a container
    or basin. 'Basins' distinguishes it from מִזְרָקוֹת later in the verse, which
    are better rendered 'bowls.'
- source_word: הַמְזַמְּרוֹת
  chosen: the snuffers
  alternatives:
  - the pruning knives
  - the trimmers
  lexicon: HALOT
  rationale: In sanctuary/tabernacle-temple contexts this term denotes an implement
    for trimming lamp wicks, hence 'snuffers.' Although the root can refer to pruning
    in other contexts, the cultic setting favors the lamp-tool sense.
- source_word: הַמִּזְרָקוֹת
  chosen: the bowls
  alternatives:
  - the sprinkling bowls
  - the basins
  lexicon: HALOT
  rationale: This vessel is commonly used for ritual handling or sprinkling of liquids.
    'Bowls' is clear modern English; the more specific cultic nuance is preserved
    in a footnote alternative.
- source_word: הַכַּפּוֹת
  chosen: the cups
  alternatives:
  - the spoons
  - the censers
  lexicon: HALOT
  rationale: The noun often denotes a small hollow vessel, frequently rendered 'spoons'
    in older translations. 'Cups' better communicates the object in contemporary English
    without over-specifying shape.
- source_word: הַמַּחְתּוֹת
  chosen: the firepans
  alternatives:
  - the censers
  - the ash pans
  lexicon: HALOT
  rationale: This term denotes a pan for carrying coals or fire in cultic use. 'Firepans'
    is a standard and suitably precise rendering; 'censers' is possible but can imply
    incense use too narrowly.
- source_word: זָהָב סָגוּר
  chosen: of pure gold
  alternatives:
  - of refined gold
  - of closed gold
  lexicon: HALOT
  rationale: The collocation refers to high-quality refined gold. 'Pure gold' is idiomatic
    English and captures the sense better than a wooden rendering of סָגוּר.
- source_word: הַפֹּתוֹת
  chosen: the sockets
  alternatives:
  - the hinges
  - the pivot-sockets
  lexicon: HALOT
  rationale: The term refers to the fittings in which doors turn, likely pivot-sockets
    rather than modern side hinges. 'Sockets' keeps the architectural sense while
    remaining readable.
- source_word: לְדַלְתוֹת
  chosen: for the doors
  alternatives:
  - belonging to the doors
  - of the doors
  lexicon: HALOT
  rationale: 'The prefixed ל here marks relation or purpose with the fittings: they
    are for the doors.'
- source_word: הַבַּיִת הַפְּנִימִי
  chosen: the inner house
  alternatives:
  - the inner sanctuary
  - the inner room
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the temple-house imagery of בַּיִת
    while allowing the following phrase to specify that this is the Most Holy Place.
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  chosen: for the Most Holy Place
  alternatives:
  - for the Holy of Holies
  lexicon: HALOT
  rationale: '''Most Holy Place'' is clear modern English and accurately renders the
    superlative construction. The traditional ''Holy of Holies'' is preserved in a
    footnote.'
- source_word: לְדַלְתֵי הַבַּיִת לַהֵיכָל
  chosen: for the doors of the house, that is, the nave
  alternatives:
  - for the doors of the temple, the main hall
  - for the doors of the house, for the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל here denotes the main temple hall distinct from the inner sanctuary.
    'Nave' is an architectural term that neatly distinguishes the main hall from the
    inner room; 'that is' makes the apposition explicit in English.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - were of gold
  lexicon: HALOT
  rationale: The final noun resumes the material of the door fittings. English supplies
    'of' idiomatically to express the verbless Hebrew list.
