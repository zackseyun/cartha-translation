id: 1KI.7.43
reference: 1 Kings 7:43
source:
  edition: WLC
  text: וְ/אֶת הַ/מְּכֹנ֖וֹת עָ֑שֶׂר וְ/אֶת הַ/כִּיֹּרֹ֥ת עֲשָׂרָ֖ה עַל הַ/מְּכֹנֽוֹת־־־׃
translation:
  text: and the ten stands, and the ten basins on the stands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bases'; traditionally 'lavers' for 'basins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - and also
  - namely
  lexicon: HALOT
  rationale: Here אֵת marks the definite direct object within a continuing inventory
    list. In English, the object marker is not translated directly, but the conjunction
    וְ is carried by 'and' to preserve the additive list structure.
- source_word: הַ/מְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the carts
  lexicon: HALOT
  rationale: מְכוֹנוֹת in the temple-furnishing context refers to the wheeled supports
    described in the surrounding verses. 'Stands' is clear modern English and fits
    the function of supporting the basins. 'Bases' is traditional but less natural;
    'carts' over-specifies mobility.
- source_word: עָשֶׂר
  chosen: ten
  lexicon: HALOT
  rationale: Simple cardinal number modifying the feminine noun מְכֹנוֹת.
- source_word: הַ/כִּיֹּרֹת
  chosen: the basins
  alternatives:
  - the lavers
  lexicon: HALOT
  rationale: כִּיּוֹר denotes a basin for washing. 'Basins' is readable modern English
    and accurately conveys the object. 'Lavers' is traditional but archaic for the
    target audience.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Simple cardinal number modifying the masculine noun כִּיֹּרוֹת as counted
    in this construction.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition indicates placement of the basins atop their supporting
    stands. 'On' is the most natural modern equivalent.
- source_word: הַ/מְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  lexicon: HALOT
  rationale: Repeated term kept consistent within the verse per translation philosophy.
