id: 1KI.7.45
reference: 1 Kings 7:45
source:
  edition: WLC
  text: וְ/אֶת הַ/סִּיר֨וֹת וְ/אֶת הַ/יָּעִ֜ים וְ/אֶת הַ/מִּזְרָק֗וֹת וְ/אֵת֙ כָּל הַ/כֵּלִ֣ים ה/אהל אֲשֶׁ֨ר עָשָׂ֥ה חִירָ֛ם לַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה בֵּ֣ית יְהוָ֑ה נְחֹ֖שֶׁת מְמֹרָֽט־־־־׃
translation:
  text: and the pots, the shovels, the basins, and all these vessels that Hiram made for King Solomon for the house of the LORD were of burnished bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bowls' for 'basins.'
    reason: lexical_alternative
  - marker: b
    text: Or 'polished bronze.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and all these vessels that Hiram made for King Solomon for the house of the LORD, of burnished bronze.'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַסִּירוֹת
  chosen: the pots
  alternatives:
  - the pails
  - the cooking pots
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes pots or cauldrons. In this temple-furnishings list, 'pots' is the most natural and sufficiently broad English equivalent without over-specifying function.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יָעִים refers to implements for removing ashes or handling material from the altar. 'Shovels' is the standard and contextually fitting rendering.
- source_word: הַמִּזְרָקוֹת
  chosen: the basins
  alternatives:
  - the bowls
  lexicon: HALOT
  rationale: מִזְרָקוֹת are vessels used for receiving or sprinkling liquids. 'Basins' fits cultic usage well; 'bowls' is possible but slightly less specific in English.
- source_word: כָּל־הַכֵּלִים הָאֵלֶּה
  chosen: all these vessels
  alternatives:
  - all these utensils
  - all these articles
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements or vessels. 'Vessels' suits the temple context and matches the material-object inventory style. הָאֵלֶּה is best represented by 'these,' referring back to the listed items.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb 'made' is straightforward and idiomatic here; 'fashioned' is possible but adds stylistic color not required by the Hebrew.
- source_word: חִירָם
  chosen: Hiram
  alternatives:
  - Huram
  rationale: The consonantal form here supports the standard English transliteration 'Hiram.' 'Huram' appears in some parallel/traditional contexts, but this verse's form is well represented by 'Hiram.'
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: for King Solomon
  alternatives:
  - for the king, Solomon
  lexicon: HALOT
  rationale: The lamed here is naturally rendered 'for,' indicating the royal patron/beneficiary of the work. 'For King Solomon' is idiomatic English.
- source_word: בֵּית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  - in the house of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה literally means 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while remaining clear. The phrase is rendered with 'for' to reflect the sense that these items were made for use in the LORD's house.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the covenant name is rendered 'the LORD.'
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In temple/tabernacle furnishing contexts, נְחֹשֶׁת is conventionally and plausibly rendered 'bronze.' 'Brass' is traditional but historically less precise; 'copper' is possible but less likely for these crafted objects.
- source_word: מְמֹרָט
  chosen: burnished
  alternatives:
  - polished
  lexicon: HALOT
  rationale: The participle conveys metal that has been smoothed or polished to brightness. 'Burnished' captures both the polished finish and the elevated register appropriate to temple craftsmanship.
