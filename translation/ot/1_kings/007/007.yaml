id: 1KI.7.7
reference: 1 Kings 7:7
source:
  edition: WLC
  text: וְ/אוּלָ֤ם הַ/כִּסֵּא֙ אֲשֶׁ֣ר יִשְׁפָּט שָׁ֔ם אֻלָ֥ם הַ/מִּשְׁפָּ֖ט עָשָׂ֑ה
    וְ/סָפ֣וּן בָּ/אֶ֔רֶז מֵ/הַ/קַּרְקַ֖ע עַד הַ/קַּרְקָֽע־־׃
translation:
  text: And he made the Hall of the Throne, where he was to judge—the Hall of Judgment—and
    it was paneled with cedar from floor to floor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'from floor to ceiling.' The Hebrew literally reads
      'from the floor to the floor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: And ... Hall
  alternatives:
  - And ... porch
  - And ... vestibule
  lexicon: HALOT
  rationale: אוּלָם denotes a hall/portico-like architectural space. 'Hall' fits the
    palace-building context in modern English better than 'porch' or 'vestibule,'
    which can sound too small or domestic.
- source_word: הַכִּסֵּא
  chosen: the Throne
  alternatives:
  - the throne seat
  - the seat of judgment
  lexicon: HALOT
  rationale: כִּסֵּא is literally 'throne/seat.' In this royal context, 'Throne' is
    the most natural and concise rendering, preserving the regal sense.
- source_word: אֲשֶׁר יִשְׁפָּט שָׁם
  chosen: where he was to judge
  alternatives:
  - where he judged
  - where he would judge
  - where he gave judgment
  lexicon: HALOT
  rationale: The imperfect יִשְׁפָּט can express customary or intended action in context.
    'Where he was to judge' captures the function of the hall within the building
    description, though 'where he judged' is also possible.
- source_word: אֻלָם הַמִּשְׁפָּט
  chosen: the Hall of Judgment
  alternatives:
  - the judgment hall
  - the hall of justice
  lexicon: HALOT
  rationale: A construct phrase naming the room by function. 'Hall of Judgment' is
    transparent and preserves the formal tone. 'Justice' would be more interpretive
    than the Hebrew מִשְׁפָּט requires here.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he built
  - he constructed
  lexicon: HALOT
  rationale: עָשָׂה is broadly 'make/do.' 'He made' stays closer to the Hebrew while
    remaining idiomatic in this architectural list.
- source_word: וְסָפוּן בָּאֶרֶז
  chosen: and it was paneled with cedar
  alternatives:
  - and it was covered with cedar
  - and it was lined with cedar
  lexicon: HALOT
  rationale: סָפוּן conveys being overlaid, covered, or paneled. 'Paneled with cedar'
    suits an interior architectural description and communicates finished wood lining.
- source_word: מֵהַקַּרְקַע עַד הַקַּרְקָע
  chosen: from floor to floor
  alternatives:
  - from the floor to the floor
  - from floor to ceiling
  lexicon: HALOT
  rationale: The Hebrew literally repeats 'floor/ground.' In context many understand
    the phrase idiomatically to describe full vertical coverage, often rendered 'from
    floor to ceiling.' However, because the text as pointed reads 'floor ... floor,'
    the main text preserves the literal repetition in idiomatic English as 'from floor
    to floor,' with the common interpretive alternative preserved in a footnote.
