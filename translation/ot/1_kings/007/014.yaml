id: 1KI.7.14
reference: 1 Kings 7:14
source:
  edition: WLC
  text: בֶּן אִשָּׁה֩ אַלְמָנָ֨ה ה֜וּא מִ/מַּטֵּ֣ה נַפְתָּלִ֗י וְ/אָבִ֣י/ו אִישׁ צֹרִי֮
    חֹרֵ֣שׁ נְחֹשֶׁת֒ וַ֠/יִּמָּלֵא אֶת הַ/חָכְמָ֤ה וְ/אֶת הַ/תְּבוּנָה֙ וְ/אֶת הַ/דַּ֔עַת
    לַ/עֲשׂ֥וֹת כָּל מְלָאכָ֖ה בַּ/נְּחֹ֑שֶׁת וַ/יָּבוֹא֙ אֶל הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה
    וַ/יַּ֖עַשׂ אֶת כָּל מְלַאכְתּֽ/וֹ־־־־־־־־־׃
translation:
  text: He was the son of a widow from the tribe of Naphtali, and his father was a
    man of Tyre, a craftsman in bronze. He was filled with wisdom, understanding,
    and knowledge to do every kind of work in bronze. So he came to King Solomon and
    did all his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Tyrian man' for 'a man of Tyre.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew neḥoshet can denote copper or bronze; 'bronze' fits the temple-furnishings
      context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אִשָּׁה אַלְמָנָה
  chosen: the son of a widow
  alternatives:
  - a widow's son
  lexicon: HALOT
  rationale: Construct chain literally identifies his maternal status. 'The son of
    a widow' is clear modern English and preserves the Hebrew emphasis on his mother
    being widowed.
- source_word: מִמַּטֵּה נַפְתָּלִי
  chosen: from the tribe of Naphtali
  alternatives:
  - from Naphtali
  - of the tribe of Naphtali
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes 'tribe' in genealogical/ethnic contexts. 'From
    the tribe of Naphtali' makes the social identity explicit.
- source_word: אִישׁ צֹרִי
  chosen: a man of Tyre
  alternatives:
  - a Tyrian man
  - a man from Tyre
  lexicon: HALOT
  rationale: צֹרִי is the gentilic from Tyre. 'A man of Tyre' is idiomatic and preserves
    the place-based identity.
- source_word: חֹרֵשׁ נְחֹשֶׁת
  chosen: a craftsman in bronze
  alternatives:
  - a worker in bronze
  - an artisan in bronze
  - a bronze-worker
  lexicon: HALOT
  rationale: חֹרֵשׁ denotes a skilled worker/craftsman, not merely a laborer. נְחֹשֶׁת
    in this context refers to bronze/copper alloy used in temple furnishings; 'bronze'
    is the conventional and likely material sense here.
- source_word: וַיִּמָּלֵא
  chosen: He was filled
  alternatives:
  - and he was filled
  - he became full
  lexicon: HALOT
  rationale: Passive/Niphal sense indicates endowment rather than self-attainment.
    English passive 'was filled' best reflects the Hebrew verbal form.
- source_word: הַחָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for skillful wisdom; here it includes practical craftsmanship,
    not merely abstract insight.
- source_word: הַתְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: Pairs naturally with wisdom and knowledge in artisan-endowment formulas.
    'Understanding' is the most transparent English equivalent.
- source_word: הַדַּעַת
  chosen: knowledge
  lexicon: HALOT
  rationale: Completes the triad of capacities for skilled work. 'Knowledge' is the
    straightforward gloss.
- source_word: לַעֲשׂוֹת כָּל מְלָאכָה בַּנְּחֹשֶׁת
  chosen: to do every kind of work in bronze
  alternatives:
  - to perform all work in bronze
  - to make every kind of bronze work
  lexicon: HALOT
  rationale: כָּל מְלָאכָה is broad, covering all manner of skilled tasks. 'Every
    kind of work in bronze' communicates scope and material clearly in natural English.
- source_word: וַיָּבוֹא אֶל הַמֶּלֶךְ שְׁלֹמֹה
  chosen: So he came to King Solomon
  alternatives:
  - And he came to King Solomon
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' gives smooth English narrative
    flow without losing sequence.
- source_word: וַיַּעַשׂ אֶת כָּל מְלַאכְתּוֹ
  chosen: and did all his work
  alternatives:
  - and completed all his work
  - and did all the work assigned to him
  lexicon: HALOT
  rationale: The suffix most naturally refers to Hiram's work/task. 'Did all his work'
    stays close to the Hebrew without over-interpreting completion or assignment.
