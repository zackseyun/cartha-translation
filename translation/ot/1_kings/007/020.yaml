id: 1KI.7.20
reference: 1 Kings 7:20
source:
  edition: WLC
  text: וְ/כֹתָרֹ֗ת עַל שְׁנֵי֙ הָֽ/עַמּוּדִ֔ים גַּם מִ/מַּ֨עַל֙ מִ/לְּ/עֻמַּ֣ת הַ/בֶּ֔טֶן
    אֲשֶׁ֖ר לְ/עֵ֣בֶר שבכה וְ/הָ/רִמּוֹנִ֤ים מָאתַ֨יִם֙ טֻרִ֣ים סָבִ֔יב עַ֖ל הַ/כֹּתֶ֥רֶת
    הַ/שֵּׁנִֽית־־׃
translation:
  text: And the capitals were on the two pillars, also above, opposite the bulge that
    was beside the latticework; and the pomegranates were two hundred, in rows all
    around, on the second capital.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the other capital.' The Hebrew 'the second' may simply distinguish
      the matching capital of the second pillar in this architectural description.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally 'the belly,' likely referring to the rounded swelling part
      of the capital.
    reason: lexical_alternative
  - marker: c
    text: That is, the decorative net or latticework attached to the capitals.
    reason: cultural_note
lexical_decisions:
- source_word: כֹתָרֹת
  chosen: capitals
  alternatives:
  - crowns
  - chapiters
  lexicon: HALOT
  rationale: In architectural context on top of pillars, כֹּתֶרֶת refers to the capital
    of a column. 'Capitals' is standard modern architectural English and clearer than
    archaic 'chapiters.'
- source_word: עַל שְׁנֵי הָעַמּוּדִים
  chosen: on the two pillars
  alternatives:
  - upon the two pillars
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on' is natural modern English for the
    capitals' position relative to the pillars.
- source_word: גַּם מִמַּעַל
  chosen: also above
  alternatives:
  - also from above
  - indeed above
  lexicon: HALOT
  rationale: The phrase adds positional clarification. 'Also above' preserves the
    additive גַּם and the vertical sense of מִמַּעַל without overinterpreting.
- source_word: מִלְעֻמַּת הַבֶּטֶן
  chosen: opposite the bulge
  alternatives:
  - facing the rounded projection
  - opposite the belly
  lexicon: HALOT
  rationale: לְעֻמַּת means 'opposite/facing.' הַבֶּטֶן literally means 'belly,' but
    in this architectural description it denotes the rounded swelling part of the
    capital. 'Bulge' communicates the shape idiomatically in English without wooden
    anthropomorphism.
- source_word: אֲשֶׁר לְעֵבֶר שבכה
  chosen: that was beside the latticework
  alternatives:
  - that was beyond the network
  - that was across from the lattice
  lexicon: HALOT
  rationale: שבכה refers to the net/lattice decoration on the capitals. לְעֵבֶר can
    mean 'on the other side of/beside.' Given the difficult architectural syntax,
    'beside the latticework' gives a coherent spatial relation without overstating
    precision.
- source_word: הָרִמּוֹנִים
  chosen: the pomegranates
  lexicon: HALOT
  rationale: Refers to the ornamental pomegranate figures decorating the capitals,
    not literal fruit in this context.
- source_word: מָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Direct cardinal number.
- source_word: טֻרִים
  chosen: in rows
  alternatives:
  - rows
  - courses
  lexicon: HALOT
  rationale: The noun denotes arranged rows or courses. 'In rows' fits the syntax
    smoothly in English and describes the decorative arrangement.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: Expresses encircling placement of the pomegranates around the capital.
- source_word: עַל הַכֹּתֶרֶת הַשֵּׁנִית
  chosen: on the second capital
  alternatives:
  - on the other capital
  lexicon: HALOT
  rationale: שֵּׁנִית can mean 'second.' In context of the pair of pillars/capitals,
    this likely refers to the corresponding second capital. 'Second capital' is the
    most direct rendering; 'other capital' is possible and preserved in a footnote
    because the referent may be distributive or resumptive in this difficult description.
