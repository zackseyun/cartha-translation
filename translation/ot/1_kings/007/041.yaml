id: 1KI.7.41
reference: 1 Kings 7:41
source:
  edition: WLC
  text: עַמֻּדִ֣ים שְׁנַ֔יִם וְ/גֻלֹּ֧ת הַ/כֹּתָרֹ֛ת אֲשֶׁר עַל רֹ֥אשׁ הָֽ/עַמֻּדִ֖ים
    שְׁתָּ֑יִם וְ/הַ/שְּׂבָכ֣וֹת שְׁתַּ֔יִם לְ/כַסּ֗וֹת אֶת שְׁתֵּי֙ גֻּלֹּ֣ת הַ/כֹּֽתָרֹ֔ת
    אֲשֶׁ֖ר עַל רֹ֥אשׁ הָ/עַמּוּדִֽים־־־־׃
translation:
  text: the two pillars, and the two bowls of the capitals that were on the tops of
    the pillars, and the two latticeworks to cover the two bowls of the capitals that
    were on the tops of the pillars;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'globes' or 'rounded forms' for 'bowls'; the Hebrew term refers to rounded
      features of the capitals, and the exact architectural shape is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often use 'chapiters' for 'capitals.'
    reason: lexical_alternative
  - marker: c
    text: Or 'networks' for 'latticeworks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדִים
  chosen: pillars
  alternatives:
  - columns
  lexicon: HALOT
  rationale: Refers to the two large freestanding temple supports. 'Pillars' is the
    standard architectural term in English and fits the cultic/architectural context.
- source_word: גֻלֹּת
  chosen: bowls
  alternatives:
  - globes
  - rounded forms
  lexicon: HALOT
  rationale: The noun denotes rounded, bowl-like forms associated with the capitals.
    'Bowls' best captures the likely shape in accessible English without overcommitting
    to a more speculative architectural reconstruction.
- source_word: כֹּתָרֹת
  chosen: capitals
  alternatives:
  - crowns
  - chapiters
  lexicon: HALOT
  rationale: In architectural context this refers to the top ornamental section of
    a pillar. 'Capitals' is precise modern English; 'chapiters' is traditional but
    archaic, and 'crowns' is too metaphorical here.
- source_word: רֹאשׁ
  chosen: tops
  alternatives:
  - heads
  lexicon: HALOT
  rationale: Although literally 'head,' in this architectural setting idiomatic English
    is 'top' or 'tops.' This preserves the sense without wooden literalism.
- source_word: שְּׂבָכ֣וֹת
  chosen: latticeworks
  alternatives:
  - networks
  - grilles
  lexicon: HALOT
  rationale: The term denotes net-like ornamental work. 'Latticeworks' communicates
    an open, interwoven structure in natural English while remaining fairly formal.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - for covering
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To cover' is straightforward and idiomatic
    in an English inventory list.
- source_word: שְׁנַיִם / שְׁתָּיִם / שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: The repeated numerals structure the inventory and should be preserved
    consistently in translation.
- source_word: אֲשֶׁר עַל רֹאשׁ הָעַמּוּדִים
  chosen: that were on the tops of the pillars
  alternatives:
  - which were on top of the pillars
  lexicon: HALOT
  rationale: This relative clause identifies the location of the capitals/bowls. The
    fuller phrasing preserves the Hebrew syntax and repeated description in readable
    English.
