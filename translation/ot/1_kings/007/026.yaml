id: 1KI.7.26
reference: 1 Kings 7:26
source:
  edition: WLC
  text: וְ/עָבְי֣/וֹ טֶ֔פַח וּ/שְׂפָת֛/וֹ כְּ/מַעֲשֵׂ֥ה שְׂפַת כּ֖וֹס פֶּ֣רַח שׁוֹשָׁ֑ן
    אַלְפַּ֥יִם בַּ֖ת יָכִֽיל־׃פ
translation:
  text: Its thickness was a handbreadth, and its rim was made like the rim of a cup,
    like a lily blossom. It could hold two thousand baths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel description in 2 Chronicles 4:5 says the basin held three thousand
      baths. This may reflect a textual, transmissional, or interpretive difference
      between capacity and usual contents.
    reason: cross_reference
  - marker: b
    text: Or 'its lip ... like the lip of a cup.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְיוֹ
  chosen: its thickness
  alternatives:
  - its thickness thereof
  - its wall thickness
  lexicon: HALOT
  rationale: The noun refers to the thickness of the sea's material, with the 3ms
    suffix referring to the basin. 'Its thickness' is natural modern English and preserves
    the concrete measurement.
- source_word: טֶפַח
  chosen: a handbreadth
  alternatives:
  - a span
  lexicon: HALOT
  rationale: A tefaḥ is the standard handbreadth measure. 'Handbreadth' is more precise
    and conventional than 'span,' which can denote a larger measure.
- source_word: שְׂפָתוֹ
  chosen: its rim
  alternatives:
  - its lip
  - its edge
  lexicon: HALOT
  rationale: For a large metal basin, 'rim' best conveys the projecting upper edge.
    'Lip' is possible and traditional, but 'rim' is clearer in contemporary English.
- source_word: כְּמַעֲשֵׂה
  chosen: was made like
  alternatives:
  - like the work of
  - like the workmanship of
  lexicon: HALOT
  rationale: The phrase introduces a comparison to crafted form. 'Was made like' communicates
    the sense idiomatically without unnecessary stiffness.
- source_word: שְׂפַת כּוֹס
  chosen: the rim of a cup
  alternatives:
  - the lip of a cup
  lexicon: HALOT
  rationale: This repeats the 'rim/lip' imagery and compares the basin's edge to a
    cup's shaped brim. 'Rim of a cup' maintains lexical consistency with the previous
    choice.
- source_word: פֶּרַח שׁוֹשָׁן
  chosen: a lily blossom
  alternatives:
  - a lily flower
  - the blossom of a lily
  lexicon: HALOT
  rationale: The construct-like apposition describes a floral form, likely flared
    like a lily bloom. 'Lily blossom' is concise and vivid.
- source_word: אַלְפַּיִם בַּת
  chosen: two thousand baths
  alternatives:
  - two thousand bath-measures
  lexicon: HALOT
  rationale: The bath is a liquid measure and should be transliterated rather than
    converted, preserving the ancient unit. The plural 'baths' is standard in English
    Bible translation.
- source_word: יָכִיל
  chosen: It could hold
  alternatives:
  - it contained
  - it held
  lexicon: HALOT
  rationale: The Hiphil of כול here expresses capacity. 'Could hold' reflects potential
    capacity rather than necessarily current contents, fitting the vessel description.
