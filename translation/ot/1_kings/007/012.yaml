id: 1KI.7.12
reference: 1 Kings 7:12
source:
  edition: WLC
  text: וְ/חָצֵ֨ר הַ/גְּדוֹלָ֜ה סָבִ֗יב שְׁלֹשָׁה֙ טוּרִ֣ים גָּזִ֔ית וְ/ט֖וּר כְּרֻתֹ֣ת
    אֲרָזִ֑ים וְ/לַ/חֲצַ֧ר בֵּית יְהוָ֛ה הַ/פְּנִימִ֖ית וּ/לְ/אֻלָ֥ם הַ/בָּֽיִת־׃פ
translation:
  text: And the great court all around had three rows of cut stone and a row of cedar
    beams, like the inner court of the house of the LORD and the vestibule of the
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and for the inner court of the house of the LORD and for the vestibule
      of the house.'' The Hebrew preposition may be taken as indicating correspondence
      or relation; here it is rendered comparatively: ''like.'''
    reason: alternative_reading
  - marker: b
    text: Or 'three courses of hewn stone and a course of cedar beams.'
    reason: lexical_alternative
  - marker: c
    text: That is, the entrance hall of the temple building.
    reason: cultural_note
lexical_decisions:
- source_word: חָצֵר הַגְּדוֹלָה
  chosen: the great court
  alternatives:
  - the great courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes an enclosed court/courtyard. 'Court' is concise and natural
    in English temple-building context, while preserving the architectural sense.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - surrounding
  lexicon: HALOT
  rationale: Adverbial term indicating encirclement of the structure. 'All around'
    is idiomatic modern English and preserves the spatial force.
- source_word: שְׁלֹשָׁה טוּרִים
  chosen: three rows
  alternatives:
  - three courses
  lexicon: HALOT
  rationale: טוּר in construction contexts refers to a row or course of masonry. 'Rows'
    is more accessible; 'courses' is a viable technical alternative.
- source_word: גָּזִית
  chosen: cut stone
  alternatives:
  - hewn stone
  - dressed stone
  lexicon: HALOT
  rationale: Refers to worked/hewn masonry stones. 'Cut stone' is clear modern English
    and fits the building description.
- source_word: וְטוּר כְּרֻתֹת אֲרָזִים
  chosen: and a row of cedar beams
  alternatives:
  - and a course of cedar beams
  - and a row of cut cedar timbers
  lexicon: HALOT
  rationale: The phrase parallels the stone rows with a single row/course of cedar
    elements. כְּרֻתֹת literally means 'cut things'; in context these are cut cedar
    pieces used architecturally. 'Cedar beams' best conveys the building function
    in natural English.
- source_word: וְלַחֲצַר בֵּית יְהוָה הַפְּנִימִית
  chosen: like the inner court of the house of the LORD
  alternatives:
  - and for the inner court of the house of the LORD
  lexicon: HALOT
  rationale: The prefixed ל on both this phrase and the following likely marks comparison/accord
    ('as/like'), linking this court's construction to that of the temple complex.
    Rendering 'like' makes the elliptical comparison explicit in English. יְהוָה follows
    the doctrinal default 'the LORD'.
- source_word: אֻלָם
  chosen: vestibule
  alternatives:
  - portico
  - porch
  lexicon: HALOT
  rationale: Refers to the entrance hall/porch of a monumental building. 'Vestibule'
    is architecturally precise and avoids overly church-traditional phrasing.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת here refers to the temple building proper. 'The house' preserves
    the Hebrew wording and echoes the temple idiom, while context makes the referent
    clear.
