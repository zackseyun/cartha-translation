id: 1KI.7.30
reference: 1 Kings 7:30
source:
  edition: WLC
  text: וְ/אַרְבָּעָה֩ אוֹפַנֵּ֨י נְחֹ֜שֶׁת לַ/מְּכוֹנָ֤ה הָֽ/אַחַת֙ וְ/סַרְנֵ֣י נְחֹ֔שֶׁת
    וְ/אַרְבָּעָ֥ה פַעֲמֹתָ֖י/ו כְּתֵפֹ֣ת לָ/הֶ֑ם מִ/תַּ֤חַת לַ/כִּיֹּר֙ הַ/כְּתֵפֹ֣ת
    יְצֻק֔וֹת מֵ/עֵ֥בֶר אִ֖ישׁ לֹיֽוֹת׃
translation:
  text: And the one stand had four bronze wheels and bronze axles, and its four feet
    had supports for them; beneath the basin the supports were cast, each beside wreathwork.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'base' for 'stand' (Hebrew מְכוֹנָה), referring to the wheeled support
      structure beneath the basin.
    reason: lexical_alternative
  - marker: b
    text: Hebrew כְּתֵפֹת is literally 'shoulders'; here it likely means projecting
      support pieces.
    reason: lexical_alternative
  - marker: c
    text: The final term may refer to decorative garlands or festoons; 'wreathwork'
      reflects this likely sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹפַנֵּי נְחֹשֶׁת
  chosen: bronze wheels
  alternatives:
  - copper wheels
  lexicon: HALOT
  rationale: אוֹפַנִּים are wheels; נְחֹשֶׁת in this architectural/tabernacle-temple
    context is conventionally and plausibly rendered 'bronze' rather than the more
    generic 'copper.'
- source_word: לַמְּכוֹנָה הָאַחַת
  chosen: the one stand
  alternatives:
  - one stand
  - the one base
  lexicon: HALOT
  rationale: מְכוֹנָה in this passage refers to the movable stand/base supporting
    the basin. 'Stand' is more natural modern English, while retaining the object’s
    support function. The article + numeral is preserved as 'the one stand,' referring
    to each individual stand in description.
- source_word: סַרְנֵי נְחֹשֶׁת
  chosen: bronze axles
  alternatives:
  - bronze shafts
  - bronze poles
  lexicon: HALOT
  rationale: In the context of wheels, סַרְנִים most naturally denotes axle-components
    rather than generic rulers or lords (a different homonym). 'Axles' best fits the
    mechanical description.
- source_word: פַעֲמֹתָיו
  chosen: its four feet
  alternatives:
  - its four corners
  - its four supports
  - its four steps
  lexicon: HALOT
  rationale: Though the noun can relate to feet/steps, in this construction describing
    the lower structural parts of the stand, 'feet' best matches the likely sense
    of four lower support points.
- source_word: כְּתֵפֹת
  chosen: supports
  alternatives:
  - shoulders
  - side-pieces
  - projections
  lexicon: HALOT
  rationale: Literally 'shoulders,' but in an architectural/object description this
    refers to projecting support pieces. 'Supports' communicates function in readable
    English.
- source_word: מִתַּחַת לַכִּיֹּר
  chosen: beneath the basin
  alternatives:
  - under the laver
  lexicon: HALOT
  rationale: כִּיּוֹר is a basin/laver. 'Basin' is clearer modern English; 'beneath'
    preserves the spatial relation.
- source_word: יְצֻקוֹת
  chosen: were cast
  alternatives:
  - were molded
  lexicon: HALOT
  rationale: Passive participle from יצק in metalworking context; 'were cast' is the
    standard and precise rendering.
- source_word: מֵעֵבֶר אִישׁ
  chosen: each beside
  alternatives:
  - on each side of
  - one opposite another
  lexicon: HALOT
  rationale: The idiom indicates distributive placement relative to another feature.
    'Each beside' captures the individualized arrangement without over-specifying
    geometry.
- source_word: לֹיוֹת
  chosen: wreathwork
  alternatives:
  - garlands
  - festoons
  lexicon: HALOT
  rationale: This rare term in the temple furnishings context likely denotes decorative
    garland-like ornamentation. 'Wreathwork' is concise and suitably architectural/decorative.
