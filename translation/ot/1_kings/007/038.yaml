id: 1KI.7.38
reference: 1 Kings 7:38
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ עֲשָׂרָ֥ה כִיֹּר֖וֹת נְחֹ֑שֶׁת אַרְבָּעִ֨ים בַּ֜ת יָכִ֣יל הַ/כִּיּ֣וֹר
    הָ/אֶחָ֗ד אַרְבַּ֤ע בָּֽ/אַמָּה֙ הַ/כִּיּ֣וֹר הָ/אֶחָ֔ד כִּיּ֤וֹר אֶחָד֙ עַל הַ/מְּכוֹנָ֣ה
    הָ/אַחַ֔ת לְ/עֶ֖שֶׂר הַ/מְּכֹנֽוֹת׀־׃
translation:
  text: He made ten bronze basins. Each basin held forty baths, and each basin was
    four cubits across. One basin stood on each of the ten stands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A 'bath' was a Hebrew unit of liquid measure.
    reason: cultural_note
  - marker: b
    text: Or 'four cubits in diameter.' The Hebrew simply says 'four cubits' here.
    reason: lexical_alternative
  - marker: c
    text: Or 'lavers' for 'basins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִיֹּרוֹת
  chosen: basins
  alternatives:
  - lavers
  lexicon: HALOT
  rationale: Refers to large wash vessels in temple furnishings. 'Basins' is clear
    modern English; 'lavers' is traditional but less accessible.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In temple-furnishing contexts this term is conventionally rendered 'bronze,'
    reflecting the likely metal/alloy sense in English Bible usage.
- source_word: בַּת
  chosen: baths
  lexicon: HALOT
  rationale: A Hebrew liquid measure; retained as 'baths' rather than converted, to
    preserve the source unit and avoid false precision.
- source_word: יָכִיל
  chosen: held
  alternatives:
  - contained
  - could hold
  lexicon: HALOT
  rationale: The verb denotes capacity. 'Held' is natural English and accurately conveys
    volume capacity.
- source_word: אַרְבַּע בָּאַמָּה
  chosen: four cubits across
  alternatives:
  - four cubits
  - four cubits in diameter
  lexicon: HALOT
  rationale: The Hebrew gives the measurement without an explicit geometric term.
    'Across' communicates the likely sense in readable English without over-specifying
    as technical 'diameter,' though that is probably intended.
- source_word: מְכוֹנָה
  chosen: stands
  alternatives:
  - carts
  - bases
  lexicon: HALOT
  rationale: In this context the term denotes the wheeled supporting structures described
    in the surrounding verses. 'Stands' is a clear general rendering that fits the
    function without importing unnecessary specificity into this verse alone.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - stood on
  lexicon: HALOT
  rationale: Basic locative sense. In the final sentence it is smoothed as 'stood
    on' for idiomatic English while preserving the spatial relation.
- source_word: כִּיּוֹר אֶחָד עַל הַמְּכוֹנָה הָאַחַת לְעֶשֶׂר הַמְּכֹנוֹת
  chosen: One basin stood on each of the ten stands
  alternatives:
  - one basin on the one stand for the ten stands
  - one basin for each stand, for the ten stands
  lexicon: HALOT
  rationale: The Hebrew distributive construction expresses one basin per stand across
    all ten stands. The chosen rendering makes the distributive sense explicit in
    natural English.
