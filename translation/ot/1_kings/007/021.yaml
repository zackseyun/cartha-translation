id: 1KI.7.21
reference: 1 Kings 7:21
source:
  edition: WLC
  text: וַ/יָּ֨קֶם֙ אֶת הָֽ/עַמֻּדִ֔ים לְ/אֻלָ֖ם הַֽ/הֵיכָ֑ל וַ/יָּ֜קֶם אֶת הָ/עַמּ֣וּד
    הַ/יְמָנִ֗י וַ/יִּקְרָ֤א אֶת שְׁמ/וֹ֙ יָכִ֔ין וַ/יָּ֨קֶם֙ אֶת הָ/עַמּ֣וּד הַ/שְּׂמָאלִ֔י
    וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ בֹּֽעַז־־־־־׃
translation:
  text: He set up the pillars at the portico of the temple. He set up the right pillar
    and called its name Jachin; then he set up the left pillar and called its name
    Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jachin and Boaz are transliterations of the Hebrew pillar names, not translations
      of their possible meanings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: set up
  alternatives:
  - erected
  - raised
  lexicon: HALOT
  rationale: The verb קום in the Hiphil here means to cause to stand, i.e., to set
    in place or erect. 'Set up' is natural modern English and fits the repeated construction
    for the pillars.
- source_word: הָעַמֻּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: עַמּוּד refers to structural pillars/columns. 'Pillars' is the more traditional
    and slightly more concrete rendering in this temple-building context.
- source_word: לְאֻלָם הַהֵיכָל
  chosen: at the portico of the temple
  alternatives:
  - for the portico of the temple
  - in the portico of the temple vestibule
  lexicon: HALOT
  rationale: 'אוּלָם denotes the porch/portico/vestibule area at the front of the
    temple structure, and הֵיכָל here refers to the temple building. The preposition
    לְ is best taken locatively in context: the pillars were set up at the temple
    portico.'
- source_word: הָעַמּוּד הַיְמָנִי
  chosen: the right pillar
  alternatives:
  - the pillar on the right
  - the south-side pillar
  lexicon: HALOT
  rationale: יְמָנִי literally means 'right-hand/right side.' 'The right pillar' is
    concise and preserves the spatial orientation without over-interpreting compass
    direction.
- source_word: וַיִּקְרָא אֶת שְׁמוֹ
  chosen: called its name
  alternatives:
  - named it
  - called it
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called its name.' This is slightly more
    formal than simple 'named it' and preserves the naming formula while remaining
    understandable.
- source_word: יָכִין
  chosen: Jachin
  alternatives:
  - Yakin
  lexicon: HALOT
  rationale: This is a proper name, so it is transliterated rather than translated,
    in keeping with the translation philosophy. 'Jachin' follows standard English
    convention.
- source_word: הָעַמּוּד הַשְּׂמָאלִי
  chosen: the left pillar
  alternatives:
  - the pillar on the left
  lexicon: HALOT
  rationale: שְׂמָאלִי means 'left-side.' 'The left pillar' is the natural counterpart
    to 'the right pillar' and preserves the parallelism.
- source_word: בֹּעַז
  chosen: Boaz
  alternatives:
  - Boʿaz
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated. 'Boaz' is the
    standard English form.
