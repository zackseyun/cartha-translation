id: 1KI.7.2
reference: 1 Kings 7:2
source:
  edition: WLC
  text: וַ/יִּ֜בֶן אֶת בֵּ֣ית יַ֣עַר הַ/לְּבָנ֗וֹן מֵאָ֨ה אַמָּ֤ה אָרְכּ/וֹ֙ וַ/חֲמִשִּׁ֤ים אַמָּה֙ רָחְבּ֔/וֹ וּ/שְׁלֹשִׁ֥ים אַמָּ֖ה קוֹמָת֑/וֹ עַ֗ל אַרְבָּעָה֙ טוּרֵי֙ עַמּוּדֵ֣י אֲרָזִ֔ים וּ/כְרֻת֥וֹת אֲרָזִ֖ים עַל הָ/עַמּוּדִֽים־׀־׃
translation:
  text: He built the House of the Forest of Lebanon, one hundred cubits long, fifty cubits wide, and thirty cubits high, on four rows of cedar pillars, with cedar beams on the pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with four rows of cedar pillars'; the preposition may describe either support ('on') or arrangement ('with').
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'beams' is literally 'cut pieces' of cedar; it may refer to beams, rafters, or another hewn cedar structural element.
    reason: lexical_alternative
  - marker: c
    text: Or 'one hundred cubits its length, fifty cubits its width, and thirty cubits its height'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative with a simple past. English idiom does not require retaining 'and' at the start, so 'He built' gives natural narrative flow while preserving the action.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  chosen: the House of the Forest of Lebanon
  alternatives:
  - the palace of the Forest of Lebanon
  - the House of Lebanon Forest
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' and the construct chain is best preserved rather than paraphrased. This is the established name of the structure, likely so called because of its cedar-pillared appearance or Lebanese cedar materials. 'House' is retained rather than 'palace' because the Hebrew names the building rather than explicitly classifying its function here.
- source_word: מֵאָה אַמָּה אָרְכּוֹ
  chosen: one hundred cubits its length
  alternatives:
  - its length was one hundred cubits
  lexicon: HALOT
  rationale: The Hebrew gives a nominal measurement phrase. English can render this compactly while preserving the ancient unit 'cubits' rather than converting it.
- source_word: וַחֲמִשִּׁים אַמָּה רָחְבּוֹ
  chosen: fifty cubits its width
  alternatives:
  - its width was fifty cubits
  lexicon: HALOT
  rationale: Parallel to the previous measurement phrase; the concise rendering preserves the formal symmetry of the Hebrew description.
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתוֹ
  chosen: thirty cubits its height
  alternatives:
  - its height was thirty cubits
  lexicon: HALOT
  rationale: קוֹמָה here denotes height/stature of the building. 'Height' is the natural architectural equivalent.
- source_word: עַל אַרְבָּעָה טוּרֵי עַמּוּדֵי אֲרָזִים
  chosen: on four rows of cedar pillars
  alternatives:
  - with four rows of cedar pillars
  - upon four rows of cedar columns
  lexicon: HALOT
  rationale: טוּרֵי denotes rows/ranks, and עַמּוּדִים are pillars/columns. 'Pillars' is chosen as idiomatic and slightly more concrete. עַל likely describes the structure as resting on or being arranged with these rows; 'on' preserves the spatial sense.
- source_word: וּכְרֻתוֹת אֲרָזִים
  chosen: with cedar beams
  alternatives:
  - and cedar cuttings
  - and cedar rafters
  - and cedar capitals
  lexicon: HALOT
  rationale: The noun from כרת literally suggests cut pieces of cedar. In this architectural context, the most plausible referent is hewn cedar beams or joists rather than generic 'cuttings.' 'Beams' gives a clear modern architectural term without over-specifying beyond the context.
- source_word: עַל הָעַמּוּדִים
  chosen: on the pillars
  alternatives:
  - upon the pillars
  - over the pillars
  lexicon: HALOT
  rationale: The phrase most naturally indicates the cedar beams were placed on top of or supported by the pillars. 'On the pillars' is straightforward and preserves the spatial relation.
