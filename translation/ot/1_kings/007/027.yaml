id: 1KI.7.27
reference: 1 Kings 7:27
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ אֶת הַ/מְּכֹנ֛וֹת עֶ֖שֶׂר נְחֹ֑שֶׁת אַרְבַּ֣ע בָּ/אַמָּ֗ה אֹ֚רֶךְ
    הַ/מְּכוֹנָ֣ה הָֽ/אֶחָ֔ת וְ/אַרְבַּ֤ע בָּֽ/אַמָּה֙ רָחְבָּ֔/הּ וְ/שָׁלֹ֥שׁ בָּ/אַמָּ֖ה
    קוֹמָתָֽ/הּ־׃
translation:
  text: He made the ten bronze stands. The length of each stand was four cubits, its
    width four cubits, and its height three cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bases.' The Hebrew term refers to the bronze supports made for the basins
      in the temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - Then he made
  - And he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates the next action in sequence. English simple
    past 'He made' is natural and sufficient; the conjunction nuance can be absorbed
    into the flow without forcing 'and' or 'then'.
- source_word: הַמְּכֹנוֹת
  chosen: the ... stands
  alternatives:
  - bases
  - carts
  - frames
  lexicon: HALOT
  rationale: מְכוֹנוֹת in this temple-furnishing context refers to the wheeled supports
    for the basins described in the surrounding verses. 'Stands' is clear modern English
    and fits the object's function better than the more ambiguous 'bases' or misleading
    'carts'.
- source_word: עֶשֶׂר
  chosen: ten
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'stands'.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In temple-inventory contexts נְחֹשֶׁת conventionally denotes bronze as
    the worked metal of these furnishings. 'Bronze' is the standard and most likely
    sense in context, though the underlying term can broadly cover copper/bronze.
- source_word: אַרְבַּע בָּאַמָּה אֹרֶךְ
  chosen: The length ... was four cubits
  alternatives:
  - four cubits was the length
  lexicon: HALOT
  rationale: The Hebrew gives the measurement first, but idiomatic English expresses
    the dimension as 'The length ... was four cubits' while preserving the exact value.
- source_word: הַמְּכוֹנָה הָאֶחָת
  chosen: each stand
  alternatives:
  - the one stand
  - one stand
  lexicon: HALOT
  rationale: Literally 'the one stand,' an idiom meaning each individual unit. 'Each
    stand' communicates distributive force clearly in English.
- source_word: וְאַרְבַּע בָּאַמָּה רָחְבָּהּ
  chosen: its width four cubits
  alternatives:
  - and four cubits was its width
  lexicon: HALOT
  rationale: Rendered in natural English while preserving the possessive suffix and
    measurement.
- source_word: וְשָׁלֹשׁ בָּאַמָּה קוֹמָתָהּ
  chosen: its height three cubits
  alternatives:
  - and three cubits was its height
  lexicon: HALOT
  rationale: קוֹמָה here denotes vertical dimension. 'Height' is the plain contextual
    equivalent.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - about 18 inches each
  lexicon: HALOT
  rationale: The ancient unit is best preserved as 'cubits' in the main text rather
    than converted, since the source text uses the traditional measure and exact modern
    equivalence is approximate.
