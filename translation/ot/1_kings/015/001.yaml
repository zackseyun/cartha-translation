id: 1KI.15.1
reference: 1 Kings 15:1
source:
  edition: WLC
  text: וּ/בִ/שְׁנַת֙ שְׁמֹנֶ֣ה עֶשְׂרֵ֔ה לַ/מֶּ֖לֶךְ יָרָבְעָ֣ם בֶּן נְבָ֑ט מָלַ֥ךְ
    אֲבִיָּ֖ם עַל יְהוּדָֽה־־׃
translation:
  text: In the eighteenth year of King Jeroboam son of Nebat, Abijam became king over
    Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “Abijam”; the same king is called “Abijah” in other passages.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  chosen: In the ... year
  alternatives:
  - And in the ... year
  - In the year of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with 'year of' form a standard
    chronological notice. English idiom is best represented as 'In the ... year';
    the conjunction is not separately represented because it is conventional in Hebrew
    narrative dating formulas and would sound wooden in English.
- source_word: שְׁמֹנֶה עֶשְׂרֵה
  chosen: eighteenth
  alternatives:
  - eighteen
  lexicon: HALOT
  rationale: 'The cardinal expression in construct with ''year'' is most naturally
    rendered by the English ordinal in a regnal formula: ''the eighteenth year''.'
- source_word: לַ/מֶּלֶךְ
  chosen: of King
  alternatives:
  - belonging to the king
  - in the reign of the king
  lexicon: HALOT
  rationale: With the dating formula, the phrase marks the regnal year of the named
    monarch. 'Of King' is concise and natural in English while preserving the genitival
    relationship.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of Nebat'
    preserves the Hebrew patronymic without unnecessary expansion.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  - began to reign
  lexicon: HALOT
  rationale: The qatal of מלך in enthronement notices commonly indicates accession
    to kingship. 'Became king' clearly conveys accession here. 'Reigned' can suggest
    the whole duration of rule rather than the moment of enthronement; 'began to reign'
    is possible but slightly more interpretive.
- source_word: אֲבִיָּם
  chosen: Abijam
  alternatives:
  - Abijah
  lexicon: HALOT
  rationale: The Masoretic Text here reads אֲבִיָּם, conventionally transliterated
    'Abijam.' Although the same king is called 'Abijah' elsewhere, this verse's form
    should be reflected in the main text to preserve source-text specificity.
- source_word: עַל יְהוּדָה
  chosen: over Judah
  alternatives:
  - over the kingdom of Judah
  - in Judah
  lexicon: HALOT
  rationale: עַל with מלך marks rule over a people or territory. 'Over Judah' is the
    most direct and natural rendering.
