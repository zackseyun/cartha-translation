id: 1KI.15.7
reference: 1 Kings 15:7
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֤י אֲבִיָּם֙ וְ/כָל אֲשֶׁ֣ר עָשָׂ֔ה הֲ/לֽוֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֣י יְהוּדָ֑ה וּ/מִלְחָמָ֥ה הָיְתָ֛ה
    בֵּ֥ין אֲבִיָּ֖ם וּ/בֵ֥ין יָרָבְעָֽם־־־׃
translation:
  text: Now the rest of the acts of Abijam, and all that he did, are they not written
    in the Book of the Chronicles of the Kings of Judah? And there was war between
    Abijam and Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abijam is called Abijah in some parallel or related passages; the Hebrew
      text here reads Abijam.
    reason: alternative_reading
  - marker: b
    text: Or 'the annals of the kings of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Introduces the conventional summary formula for material not narrated
    in full; 'the rest of' is natural modern English and preserves the sense of what
    remains.
- source_word: דִּבְרֵי
  chosen: acts of
  alternatives:
  - words of
  - matters concerning
  lexicon: HALOT
  rationale: In royal annal formulas, דִּבְרֵי often refers broadly to deeds/events
    concerning a king, not merely his spoken words. 'Acts of' best fits the historiographical
    context.
- source_word: אֲבִיָּם
  chosen: Abijam
  alternatives:
  - Abijah
  rationale: The MT here reads אֲבִיָּם, so the personal name is transliterated directly
    from the source text rather than harmonized to the alternate form 'Abijah' found
    elsewhere.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause; 'did' is broad and
    preserves the Hebrew's generality.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - surely they are
  - is it not so that they are
  lexicon: HALOT
  rationale: This interrogative particle introduces a rhetorical question common in
    royal summaries. 'Are they not' preserves both the form and function.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle literally means 'written'; this is retained in
    the main text, with the broader sense of official recording carried by the context.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Though literally 'on the book/scroll,' idiomatic English for archival
    citation is 'in the Book.' This reflects standard English usage without losing
    the referential sense.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the events of the days
  - the annals
  lexicon: HALOT
  rationale: This is the established sense of the archival title in Kings. 'Chronicles'
    communicates an official historical record; 'annals' is possible but less familiar
    for general readers.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: 'The ל preposition in this title is best represented idiomatically in
    English as a genitival relation: the chronicles pertaining to the kings of Judah.'
- source_word: וּמִלְחָמָה הָיְתָה
  chosen: And there was war
  alternatives:
  - And war continued
  - And there was warfare
  lexicon: HALOT
  rationale: A simple existential clause. 'There was war' is the most direct rendering;
    'continued' would import duration more explicitly than the Hebrew states here.
- source_word: בֵּין...וּבֵין
  chosen: between ... and
  alternatives:
  - between ... and one another
  lexicon: HALOT
  rationale: Standard rendering of the paired preposition marking mutual opposition.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Standard English transliteration of the personal name from the Hebrew.
