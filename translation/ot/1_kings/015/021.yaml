id: 1KI.15.21
reference: 1 Kings 15:21
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּ/שְׁמֹ֣עַ בַּעְשָׁ֔א וַ/יֶּחְדַּ֕ל מִ/בְּנ֖וֹת אֶת הָֽ/רָמָ֑ה
    וַ/יֵּ֖שֶׁב בְּ/תִרְצָֽה־׃
translation:
  text: And when Baasha heard of it, he stopped building Ramah and remained in Tirzah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he ceased from building Ramah and lived in Tirzah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard of it
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי + infinitive construct of שׁמע introduces
    a temporal clause. In natural modern English, 'And when ... heard' conveys the
    function without woodenly preserving 'and it happened.' 'of it' is supplied idiomatically
    from context, since English normally requires an object for 'heard' here and the
    preceding narrative supplies the content.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וַיֶּחְדַּל
  chosen: he stopped
  alternatives:
  - he ceased
  - he desisted
  lexicon: HALOT
  rationale: חדל means to cease or stop. 'Stopped' is clear modern English and fits
    the narrative action.
- source_word: מִבְּנוֹת
  chosen: building
  alternatives:
  - from building
  - constructing
  lexicon: HALOT
  rationale: The preposition מִן with infinitive construct after חדל expresses cessation
    from an activity. English idiom renders this smoothly as 'stopped building.'
- source_word: אֶת הָרָמָה
  chosen: Ramah
  alternatives:
  - the Ramah
  lexicon: HALOT
  rationale: אֶת marks the direct object. הָרָמָה is the place name Ramah, not a common
    noun here, so it is transliterated without the article in English.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - dwelt
  - lived
  - stayed
  - settled
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or reside. In this context, after ceasing
    construction and returning to his base, 'remained in Tirzah' best captures the
    narrative sense without implying a permanent resettlement beyond the verse.
- source_word: בְּתִרְצָה
  chosen: in Tirzah
  rationale: Place name transliterated by standard convention; the preposition ב is
    naturally rendered 'in.'
