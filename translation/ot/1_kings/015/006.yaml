id: 1KI.15.6
reference: 1 Kings 15:6
source:
  edition: WLC
  text: וּ/מִלְחָמָ֨ה הָיְתָ֧ה בֵין רְחַבְעָ֛ם וּ/בֵ֥ין יָרָבְעָ֖ם כָּל יְמֵ֥י חַיָּֽי/ו־־׃
translation:
  text: And there was war between Rehoboam and Jeroboam all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the days of Rehoboam's life.' Some interpreters, in light of the
      surrounding context and textual discussion, understand the pronoun to refer
      instead to Abijah (Abijam).
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  chosen: And there was war
  alternatives:
  - Now there was war
  - And warfare continued
  lexicon: HALOT
  rationale: מִלְחָמָה means 'war' or 'battle/warfare.' The prefixed conjunction is
    rendered 'And' to preserve the narrative linkage. 'War' is the most natural singular
    English rendering here.
- source_word: הָיְתָה
  chosen: there was
  alternatives:
  - existed
  - continued
  lexicon: HALOT
  rationale: The Qal perfect of היה in this existential construction is idiomatically
    rendered 'there was.' Although the context implies ongoing hostility, the verb
    itself does not require 'continued.'
- source_word: בֵין ... וּ/בֵין
  chosen: between ... and
  alternatives:
  - between ... and between
  lexicon: HALOT
  rationale: The paired prepositions mark the two parties in conflict. Standard English
    collapses the repeated preposition to 'between ... and' for readability without
    loss of meaning.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout
  - for all the days of
  lexicon: HALOT
  rationale: This common Hebrew idiom denotes the duration of a person's lifetime.
    'All the days of' preserves the form and sense clearly.
- source_word: חַיָּיו
  chosen: his life
  alternatives:
  - his lifetime
  lexicon: HALOT
  rationale: The plural construct with pronominal suffix is idiomatically rendered
    in English as 'his life' or 'his lifetime.' 'His life' is concise and natural.
