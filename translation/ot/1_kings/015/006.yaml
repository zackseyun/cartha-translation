theological_decisions:
- issue: Referent of the pronoun in 'all the days of his life'
  chosen_reading: Rendered literally as 'his life' without specifying the antecedent
    in the main text.
  alternative_readings:
  - Rehoboam's life
  - Abijah's life
  rationale: The Hebrew suffix is singular masculine ('his'), and the immediate clause
    does not explicitly identify the referent. In the broader textual context, this
    verse is often discussed because some witnesses and parallel passages create tension
    over whether the reference is to Rehoboam or Abijah/Abijam. To preserve the source-text
    ambiguity rather than resolve it interpretively, the main text keeps the literal
    'his life,' with alternatives noted in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
