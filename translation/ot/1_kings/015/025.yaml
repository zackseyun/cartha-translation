id: 1KI.15.25
reference: 1 Kings 15:25
source:
  edition: WLC
  text: וְ/נָדָ֣ב בֶּן יָרָבְעָ֗ם מָלַךְ֙ עַל יִשְׂרָאֵ֔ל בִּ/שְׁנַ֣ת שְׁתַּ֔יִם לְ/אָסָ֖א
    מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּמְלֹ֥ךְ עַל יִשְׂרָאֵ֖ל שְׁנָתָֽיִם־־־׃
translation:
  text: Now Nadab son of Jeroboam became king over Israel in the second year of Asa
    king of Judah, and he reigned over Israel two years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/נָדָב
  chosen: Now Nadab
  alternatives:
  - And Nadab
  - Then Nadab
  lexicon: HALOT
  rationale: The prefixed conjunction introduces the next event in the regnal sequence.
    'Now' gives natural English narrative progression without overstating temporal
    force; the personal name is transliterated per policy.
- source_word: בֶּן יָרָבְעָם
  chosen: son of Jeroboam
  alternatives:
  - the son of Jeroboam
  lexicon: HALOT
  rationale: Standard filial construction. English omits the article for natural style
    while preserving the genealogical identification.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: 'This first occurrence marks accession (''became king'') rather than
    the duration of rule. Using a different English rendering from the later verb
    helps reflect the Hebrew sequence: accession date followed by length of reign.'
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: Standard idiom for royal rule; 'over Israel' is idiomatic and preserves
    the sense of dominion.
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  chosen: in the second year
  alternatives:
  - in year two
  - in the two-year mark
  lexicon: HALOT
  rationale: Hebrew regnal dating idiom uses cardinal 'two' in construct, but idiomatic
    English expresses this as the ordinal 'second year.'
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - belonging to Asa king of Judah
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: The lamed marks reference point in regnal dating. 'Of Asa king of Judah'
    is concise and standard in English regnal formulas.
- source_word: וַ/יִּמְלֹךְ
  chosen: he reigned
  alternatives:
  - and he became king
  - and he was king
  lexicon: HALOT
  rationale: Here the verb is followed by the duration 'two years,' so 'reigned' best
    conveys the period of rule rather than accession.
- source_word: שְׁנָתָיִם
  chosen: two years
  lexicon: HALOT
  rationale: Straightforward duration phrase indicating the length of Nadab's reign.
