id: 1KI.15.20
reference: 1 Kings 15:20
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֨ע בֶּן הֲדַ֜ד אֶל הַ/מֶּ֣לֶךְ אָסָ֗א וַ֠/יִּשְׁלַח אֶת שָׂרֵ֨י
    הַ/חֲיָלִ֤ים אֲשֶׁר ל/וֹ֙ עַל עָרֵ֣י יִשְׂרָאֵ֔ל וַ/יַּךְ֙ אֶת עִיּ֣וֹן וְ/אֶת
    דָּ֔ן וְ/אֵ֖ת אָבֵ֣ל בֵּֽית מַעֲכָ֑ה וְ/אֵת֙ כָּל כִּנְר֔וֹת עַ֖ל כָּל אֶ֥רֶץ
    נַפְתָּלִֽי־־־־־־־־־־׃
translation:
  text: Ben-hadad listened to King Asa and sent the commanders of the armies that
    were his against the cities of Israel, and he struck Ijon, Dan, Abel-beth-maacah,
    and all Chinneroth, along with all the land of Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heeded King Asa.' The Hebrew idiom can carry the sense of listening
      favorably and acting on the request.
    reason: lexical_alternative
  - marker: b
    text: Chinneroth is a place name here, likely referring to a district or region,
      not the common noun 'harps.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע אֶל
  chosen: listened to
  alternatives:
  - heeded
  - obeyed
  lexicon: HALOT
  rationale: The idiom שׁמע אל commonly means to listen to or heed someone. Here it
    indicates that Ben-hadad responded favorably to Asa's request. 'Listened to' is
    natural English and leaves the response explicit in the following action, while
    'obeyed' could overstate Asa's authority over him.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the armies
  alternatives:
  - the captains of the forces
  - the commanders of the troops
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials, and חַיִל in military context refers to
    army/force. The plural construct suggests military commanders. 'Commanders of
    the armies' preserves the military structure without archaic 'captains.'
- source_word: אֲשֶׁר לוֹ
  chosen: that were his
  alternatives:
  - who belonged to him
  - under his command
  lexicon: HALOT
  rationale: The phrase marks possession or subordination. 'That were his' is a concise
    rendering that preserves the Hebrew relation; the military sense is then clarified
    by context.
- source_word: עַל עָרֵי יִשְׂרָאֵל
  chosen: against the cities of Israel
  alternatives:
  - upon the cities of Israel
  - to the cities of Israel
  lexicon: HALOT
  rationale: With שלח plus על in military context, the sense is dispatching forces
    against a target. 'Against' makes the hostile action clear in idiomatic English.
- source_word: וַיַּךְ
  chosen: he struck
  alternatives:
  - he attacked
  - he defeated
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite/attack/defeat depending on context.
    'Struck' is a good optimal-equivalence choice that preserves the Hebrew's directness
    without specifying more than the text states.
- source_word: עִיּוֹן
  chosen: Ijon
  alternatives:
  - Ion
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אָבֵל בֵּית מַעֲכָה
  chosen: Abel-beth-maacah
  alternatives:
  - Abel Beth Maacah
  lexicon: HALOT
  rationale: Standard English transliteration of the compound place name; hyphenation
    improves readability while preserving the name form.
- source_word: כָּל כִּנְרוֹת
  chosen: all Chinneroth
  alternatives:
  - all Kinneroth
  - the whole region of Chinneroth
  lexicon: HALOT
  rationale: The term is a place name here, not the common noun 'harps.' 'All Chinneroth'
    preserves the Hebrew wording and likely refers to the district/region associated
    with that name.
- source_word: עַל כָּל אֶרֶץ נַפְתָּלִי
  chosen: along with all the land of Naphtali
  alternatives:
  - and all the land of Naphtali
  - throughout all the land of Naphtali
  lexicon: HALOT
  rationale: The preposition עַל here extends the list to include the broader territory.
    'Along with' captures the additive sense after the named cities and region. 'Land
    of Naphtali' is the standard territorial expression.
