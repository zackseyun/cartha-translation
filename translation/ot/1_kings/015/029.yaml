id: 1KI.15.29
reference: 1 Kings 15:29
source:
  edition: WLC
  text: וַ/יְהִ֣י כְ/מָלְכ֗/וֹ הִכָּה֙ אֶת כָּל בֵּ֣ית יָרָבְעָ֔ם לֹֽא הִשְׁאִ֧יר כָּל נְשָׁמָ֛ה לְ/יָרָבְעָ֖ם עַד הִשְׁמִד֑/וֹ כִּ/דְבַ֣ר יְהוָ֔ה אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַד עַבְדּ֖/וֹ אֲחִיָּ֥ה הַ/שִּׁילֹנִֽי־־־־־־׃
translation:
  text: And when he became king, he struck down all the house of Jeroboam. He did not leave to Jeroboam a single living thing, until he had destroyed him, according to the word of Yahweh that he had spoken by the hand of his servant Ahijah the Shilonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he did not leave ... any breath'; that is, he left no one alive.
    reason: lexical_alternative
  - marker: b
    text: Or 'until he had destroyed it,' referring to Jeroboam's house as a collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְמָלְכוֹ
  chosen: And when he became king
  alternatives:
  - And it happened, when he reigned
  - And as soon as he was king
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus temporal כְ + infinitive/verb is idiomatically rendered in English as a temporal clause. 'Became king' is more natural than the wooden 'when he reigned' and fits the accession context.
- source_word: הִכָּה
  chosen: he struck down
  alternatives:
  - he struck
  - he killed
  lexicon: HALOT
  rationale: נכה often means to strike, smite, or strike down. In this context of dynastic extermination, 'struck down' preserves the violent force without over-specifying beyond the Hebrew.
- source_word: אֶת כָּל בֵּית יָרָבְעָם
  chosen: all the house of Jeroboam
  alternatives:
  - all Jeroboam's house
  - the whole household of Jeroboam
  lexicon: HALOT
  rationale: '''House'' is retained because in royal contexts it denotes dynasty/household and is a standard biblical expression. This preserves the political-familial sense better than a purely domestic gloss.'
- source_word: לֹא הִשְׁאִיר כָּל נְשָׁמָה
  chosen: He did not leave ... a single breathing one
  alternatives:
  - He left no one alive
  - He did not leave any breath
  lexicon: HALOT
  rationale: נְשָׁמָה literally relates to breath/breathing. The idiom means no living survivor. 'A single breathing one' keeps the concrete Hebrew imagery while remaining intelligible; a more idiomatic alternative is preserved in a footnote.
- source_word: לְיָרָבְעָם
  chosen: to Jeroboam
  alternatives:
  - of Jeroboam
  - belonging to Jeroboam
  lexicon: HALOT
  rationale: 'The preposition ל marks relation or belonging here: no survivor was left ''to/for Jeroboam,'' i.e., none of his line remained. Retaining ''to Jeroboam'' reflects the Hebrew construction, though English readers may understand it as ''of Jeroboam'' by context.'
- source_word: עַד הִשְׁמִידוֹ
  chosen: until he had destroyed him
  alternatives:
  - until he had destroyed it
  - until he had exterminated him
  lexicon: HALOT
  rationale: The suffix is singular masculine, formally 'him,' likely referring collectively to Jeroboam's house/dynasty through its eponymous head. 'Destroyed him' preserves the Hebrew form; the collective sense is clear from context. 'Exterminated' is possible but somewhat more interpretive.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: This is a standard fulfillment formula. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר בְּיַד עַבְדּוֹ
  chosen: that he had spoken by the hand of his servant
  alternatives:
  - which he spoke through his servant
  - that he had declared by means of his servant
  lexicon: HALOT
  rationale: בְיַד literally means 'by the hand of' and is a common prophetic mediation formula. Retaining 'by the hand of' preserves biblical idiom while remaining understandable.
- source_word: אֲחִיָּה הַשִּׁילֹנִי
  chosen: Ahijah the Shilonite
  alternatives:
  - Ahijah from Shiloh
  lexicon: HALOT
  rationale: Personal names are transliterated; the gentilic is rendered in standard English form 'Shilonite.'
