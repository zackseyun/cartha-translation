id: 1KI.15.23
reference: 1 Kings 15:23
source:
  edition: WLC
  text: וְ/יֶ֣תֶר כָּל דִּבְרֵֽי אָ֠סָא וְ/כָל גְּב֨וּרָת֜/וֹ וְ/כָל אֲשֶׁ֣ר עָשָׂ֗ה
    וְ/הֶֽ/עָרִים֙ אֲשֶׁ֣ר בָּנָ֔ה הֲ/לֹֽא הֵ֣מָּה כְתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י
    הַ/יָּמִ֖ים לְ/מַלְכֵ֣י יְהוּדָ֑ה רַ֚ק לְ/עֵ֣ת זִקְנָת֔/וֹ חָלָ֖ה אֶת רַגְלָֽי/ו־־־־־־־׃
translation:
  text: Now the rest of all the acts of Asa, and all his might, and all that he did,
    and the cities that he built—are they not written in the Book of the Chronicles
    of the Kings of Judah? Yet in the time of his old age he became diseased in his
    feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded in the book of the annals of the kings of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he became ill in his feet.' The Hebrew specifies the body part affected
      without naming the exact disease.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: Introduces the standard regnal-summary formula. 'Now the rest of' is
    idiomatic modern English while preserving the transitional force of waw plus 'remainder/rest.'
- source_word: דִּבְרֵי אָסָא
  chosen: the acts of Asa
  alternatives:
  - the matters concerning Asa
  - the deeds of Asa
  lexicon: HALOT
  rationale: In royal summary formulas, דִּבְרֵי often refers broadly to recorded
    acts/events, not merely spoken 'words.' 'Acts' fits the historiographical context.
- source_word: גְּבוּרָתוֹ
  chosen: his might
  alternatives:
  - his power
  - his mighty deeds
  - his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, power, or mighty acts. 'His might' preserves
    the abstract noun and allows the following clause 'all that he did' to remain
    distinct.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: all that he did
  alternatives:
  - all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause, preserving the broad
    scope of Asa's actions.
- source_word: וְהֶעָרִים אֲשֶׁר בָּנָה
  chosen: and the cities that he built
  alternatives:
  - and the towns that he built
  - and the cities he fortified
  lexicon: HALOT
  rationale: עָרִים is best rendered 'cities' here. בָּנָה is literally 'built'; although
    fortification may be implied in context, the text itself says 'built,' so that
    wording is retained.
- source_word: הֲלֹא הֵמָּה כְתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the conventional rhetorical formula in Kings. 'Are they not written'
    preserves both the interrogative form and the passive participle.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the scroll of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: Though literally 'on/upon the book of the matters of the days,' the established
    sense is an official chronicle/annals source. 'Book of the Chronicles' is clear
    and sufficiently formal.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  lexicon: HALOT
  rationale: In this source-title formula, the lamed marks relation/possession rather
    than purpose; 'of the Kings of Judah' is the natural English rendering.
- source_word: רַק
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: רַק introduces an exception or limiting note. 'Yet' reads naturally in
    English while signaling the contrastive qualification that follows.
- source_word: לְעֵת זִקְנָתוֹ
  chosen: in the time of his old age
  alternatives:
  - in the time of his old age
  - when he was old
  - in his old age
  lexicon: HALOT
  rationale: This phrase marks the period of life in which the following event occurred.
    The fuller wording preserves the temporal nuance; it could be slightly compressed
    in English, but this keeps the Hebrew structure visible.
- source_word: חָלָה
  chosen: he became diseased
  alternatives:
  - he was sick
  - he became ill
  - he suffered an illness
  lexicon: HALOT
  rationale: The verb means to be/become sick or weak. 'Became diseased' reflects
    the onset implied by the perfect in context and fits the specific bodily reference
    that follows.
- source_word: אֶת רַגְלָיו
  chosen: in his feet
  alternatives:
  - in his legs
  - with respect to his feet
  - his feet
  lexicon: HALOT
  rationale: The direct-object marker with 'his feet' specifies the affected body
    part. English idiom commonly expresses this as illness 'in his feet,' which is
    clearer than a wooden 'he became sick his feet.'
