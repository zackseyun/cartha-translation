id: 1KI.15.30
reference: 1 Kings 15:30
source:
  edition: WLC
  text: עַל חַטֹּ֤אות יָרָבְעָם֙ אֲשֶׁ֣ר חָטָ֔א וַ/אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵ֑ל
    בְּ/כַעְס֕/וֹ אֲשֶׁ֣ר הִכְעִ֔יס אֶת יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: because of the sins of Jeroboam that he committed and by which he caused Israel
    to sin, by his provocation with which he provoked the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by his anger'; the Hebrew noun can denote anger or provocation, but
      here 'provocation' best matches the following verb 'provoked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: HALOT
  rationale: In this causal context, עַל introduces the reason for the preceding judgment/event,
    so 'because of' communicates the sense more naturally than a more literal 'upon'
    or 'for'.
- source_word: חַטֹּאות
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: HALOT
  rationale: Plural noun; 'sins' is the most direct and standard rendering, preserving
    the concrete plurality of Jeroboam's wrongdoing.
- source_word: חָטָא
  chosen: committed
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: 'The clause already contains the noun ''sins''; rendering the verb as
    ''committed'' avoids awkward repetition in English while preserving the sense:
    ''the sins ... that he committed.'''
- source_word: הֶחֱטִיא
  chosen: caused Israel to sin
  alternatives:
  - made Israel sin
  - led Israel into sin
  lexicon: HALOT
  rationale: Hiphil of חטא is causative. 'Caused Israel to sin' is a clear, accurate
    rendering that preserves the causative force without overinterpreting the mechanism.
- source_word: בְּכַעְסוֹ
  chosen: by his provocation
  alternatives:
  - by his anger
  - through his provocation
  lexicon: HALOT
  rationale: The noun כַּעַס can denote vexation, provocation, or anger. Here, because
    the following verb הִכְעִיס explicitly means 'provoked to anger,' 'provocation'
    best fits the idiom and avoids the misleading sense that Jeroboam's internal emotion
    alone is in view.
- source_word: הִכְעִיס
  chosen: provoked
  alternatives:
  - angered
  - provoked to anger
  lexicon: HALOT
  rationale: The Hiphil verb means to provoke to anger. 'Provoked' is concise and
    idiomatic; the object makes clear that the LORD is the one provoked.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: This construct phrase is rendered transparently and conventionally as
    'the God of Israel,' preserving the covenantal identification.
