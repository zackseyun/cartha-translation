id: 1KI.15.34
reference: 1 Kings 15:34
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יֵּ֨לֶךְ֙ בְּ/דֶ֣רֶךְ יָרָבְעָ֔ם וּ֨/בְ/חַטָּאת֔/וֹ אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־׃ס
translation:
  text: He did what was evil in the eyes of Yahweh and walked in the way of Jeroboam and in his sin by which he caused Israel to sin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English normally omits the conjunction at the start of a sentence for readable narrative flow.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע commonly means 'do what is evil' rather than the more wooden 'do the evil.' This preserves the established evaluative formula in Kings while remaining natural English.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and preserves the metaphor. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה.
- source_word: וַיֵּלֶךְ
  chosen: walked
  alternatives:
  - went
  - followed
  lexicon: HALOT
  rationale: In the idiom 'walk in the way of,' 'walked' best preserves the metaphor of conduct and covenantal patterning; 'went' is too literal and 'followed' slightly interpretive.
- source_word: בְּדֶרֶךְ יָרָבְעָם
  chosen: in the way of Jeroboam
  alternatives:
  - in Jeroboam's way
  - in the path of Jeroboam
  lexicon: HALOT
  rationale: A recurring Deuteronomistic formula for patterned behavior. 'Way' is the most idiomatic and consistent rendering.
- source_word: וּבְחַטָּאתוֹ
  chosen: and in his sin
  alternatives:
  - and in his sinful way
  - and in the sin he committed
  lexicon: HALOT
  rationale: The singular noun with suffix is best kept as 'his sin,' matching the formulaic language about Jeroboam's paradigmatic sin.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - with which he made Israel sin
  - which led Israel into sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: Jeroboam caused Israel to sin. ''By which'' links the relative clause naturally to ''his sin'' and preserves the causative force.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the people/nation name.
