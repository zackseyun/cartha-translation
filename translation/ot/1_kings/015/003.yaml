theological_decisions:
- issue: Meaning of 'his heart was not שָׁלֵם with the LORD'
  chosen_reading: His inner loyalty was not undivided/wholehearted toward the LORD,
    not a claim of absolute sinlessness.
  alternative_readings:
  - His heart was not perfect with the LORD
  rationale: The verse evaluates covenant fidelity by comparison with David. Rendering
    שָׁלֵם as 'wholly devoted' avoids implying metaphysical perfection while preserving
    the theological emphasis on wholehearted allegiance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering
    for YHWH, while alternatives may be preserved in notes if useful.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
