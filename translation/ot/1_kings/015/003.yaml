id: 1KI.15.3
reference: 1 Kings 15:3
source:
  edition: WLC
  text: וַ/יֵּ֕לֶךְ בְּ/כָל חַטֹּ֥אות אָבִ֖י/ו אֲשֶׁר עָשָׂ֣ה לְ/פָנָ֑י/ו וְ/לֹא הָיָ֨ה
    לְבָב֤/וֹ שָׁלֵם֙ עִם יְהוָ֣ה אֱלֹהָ֔י/ו כִּ/לְבַ֖ב דָּוִ֥ד אָבִֽי/ו־־־־׃
translation:
  text: He walked in all the sins of his father that he had committed before him,
    and his heart was not wholly devoted to the LORD his God, like the heart of David
    his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'before him' may mean either 'in his presence' or 'previously/before
      his time'; the wording may suggest that his father's sins stood before him as
      an example he followed.
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart was not fully loyal to the LORD his God.'
    reason: alternative_reading
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He lived
  lexicon: HALOT
  rationale: הלך with בְּ plus a moral object commonly expresses conduct or manner
    of life. 'Walked' preserves the Hebrew idiom and its ethical sense better than
    the flatter 'went'; 'lived' is possible but less textually transparent.
- source_word: בְּכָל חַטֹּאות
  chosen: in all the sins
  alternatives:
  - according to all the sins
  - in all the sinful ways
  lexicon: HALOT
  rationale: The preposition בְּ with הלך is idiomatic for walking in a course of
    conduct. 'In all the sins' is formally close and clear in English; 'sinful ways'
    is interpretive and therefore not preferred for the main text.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward filial reference to his immediate predecessor; no reason
    to generalize or paraphrase.
- source_word: אֲשֶׁר עָשָׂה לְפָנָיו
  chosen: that he had committed before him
  alternatives:
  - which he did before him
  - that he committed previously
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'his father' and refers to
    the father's sins done 'before him,' i.e., earlier/in his presence. 'Had committed'
    makes the temporal relation natural in English. 'Before him' is retained rather
    than paraphrased away, preserving the Hebrew wording and possible nuance of prior
    example.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - previously
  lexicon: HALOT
  rationale: לְפָנִים can denote spatial presence or temporal priority. Here it likely
    conveys that the father's sins preceded and stood before the son as pattern. 'Before
    him' preserves that ambiguity better than choosing only temporal or only spatial
    language.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: לֵבָב in Hebrew denotes the inner person, including will and loyalty.
    'Heart' is the standard and sufficiently broad English equivalent.
- source_word: שָׁלֵם
  chosen: wholly devoted
  alternatives:
  - whole
  - complete
  - blameless
  - fully loyal
  lexicon: HALOT
  rationale: In covenantal contexts, שָׁלֵם with 'heart' conveys undivided loyalty
    or full devotion rather than sinless perfection. 'Wholly devoted' communicates
    this relational-covenantal sense in readable English. 'Fully loyal' is also strong,
    but 'devoted' fits the Godward orientation with עִם יְהוָה.
- source_word: עִם יְהוָה אֱלֹהָיו
  chosen: to the LORD his God
  alternatives:
  - with the LORD his God
  lexicon: HALOT
  rationale: Although עִם is literally 'with,' English idiom with 'devoted' more naturally
    takes 'to.' The divine name follows the doctrinal default 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: כִּלְבַב דָּוִד אָבִיו
  chosen: like the heart of David his father
  alternatives:
  - as David his father’s heart was
  - like David his father
  lexicon: HALOT
  rationale: The comparison is specifically between hearts, not merely persons. Retaining
    'the heart of' preserves the Hebrew emphasis on inward loyalty and creates a deliberate
    contrast with Abijam's heart.
