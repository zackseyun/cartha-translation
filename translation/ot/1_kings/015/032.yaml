id: 1KI.15.32
reference: 1 Kings 15:32
source:
  edition: WLC
  text: וּ/מִלְחָמָ֨ה הָיְתָ֜ה בֵּ֣ין אָסָ֗א וּ/בֵ֛ין בַּעְשָׁ֥א מֶֽלֶךְ יִשְׂרָאֵ֖ל
    כָּל יְמֵי/הֶֽם־־׃פ
translation:
  text: And there was war between Asa and Baasha king of Israel all their days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'all their lives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  chosen: And there was war
  alternatives:
  - And war was
  - Now there was war
  - And there was conflict
  lexicon: HALOT
  rationale: מִלְחָמָה denotes war/battlefare. The existential English construction
    with the prefixed conjunction best reflects the Hebrew clause naturally while
    preserving the narrative linkage.
- source_word: הָיְתָה
  chosen: there was
  alternatives:
  - was
  - continued
  lexicon: HALOT
  rationale: 'Qal perfect of היה here functions existentially with מִלְחָמָה: ''there
    was war.'' ''Continued'' would over-interpret aspect not explicit in the verb
    itself.'
- source_word: בֵּין ... וּ/בֵין
  chosen: between ... and
  alternatives:
  - between ... and between
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the correlative prepositions. English
    normally omits the repeated 'between' in the second member.
- source_word: אָסָא
  chosen: Asa
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: 'Construct phrase identifying Baasha. English can omit the article naturally
    in apposition: ''Baasha king of Israel.'''
- source_word: כָּל יְמֵי/הֶם
  chosen: all their days
  alternatives:
  - all their lives
  - throughout their days
  - as long as they lived
  lexicon: HALOT
  rationale: Literally 'all their days.' This preserves the Hebrew idiom and its broad
    temporal scope. 'All their lives' is possible but slightly more interpretive.
