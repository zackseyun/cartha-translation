id: 1KI.15.2
reference: 1 Kings 15:2
source:
  edition: WLC
  text: שָׁלֹ֣שׁ שָׁנִ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ מַעֲכָ֖ה בַּת
    אֲבִישָׁלֽוֹם־׃
translation:
  text: He reigned three years in Jerusalem, and his mother’s name was Maacah daughter
    of Abishalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abishalom is the Hebrew name-form here; many English versions use 'Absalom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter of' can in some genealogical contexts refer more broadly
      to a female descendant.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: three years
  alternatives:
  - for three years
  lexicon: HALOT
  rationale: Cardinal number plus plural noun gives the duration of reign. English
    idiom naturally renders this as 'three years.'
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - became king
  lexicon: HALOT
  rationale: Qal of מלך here denotes exercising royal rule, not accession. 'Reigned'
    is the standard and most precise contextual rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Jerusalem' is natural modern English
    and fits the statement of the place of reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: and his mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common regnal formula in Kings. The construct phrase is slightly
    smoothed into natural English while preserving the formal notice about the king's
    mother.
- source_word: מַעֲכָה
  chosen: Maacah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The plain lexical sense of בת is 'daughter.' Although Hebrew genealogical
    usage can sometimes be broader, the translation should preserve the source term
    in the main text and note the broader possibility separately.
- source_word: אֲבִישָׁלוֹם
  chosen: Abishalom
  alternatives:
  - Absalom
  rationale: The Hebrew form here is אֲבִישָׁלוֹם, best represented by transliteration
    as 'Abishalom.' Because many English readers know the related name-form 'Absalom,'
    that alternative is worth preserving in a footnote.
