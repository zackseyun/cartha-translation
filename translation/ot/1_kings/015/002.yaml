theological_decisions:
- issue: Genealogical expression בַּת אֲבִישָׁלוֹם
  chosen_reading: Retain the literal familial expression 'daughter of Abishalom' in
    the main text.
  alternative_readings:
  - granddaughter/descendant of Abishalom
  rationale: The Hebrew text itself says 'daughter of.' Since the broader genealogical
    question is historical/interpretive rather than doctrinal, the translation preserves
    the lexical form and leaves the possible wider kinship sense to a footnote rather
    than resolving it in the main text.
  doctrine_reference: Translation philosophy §3, §5
