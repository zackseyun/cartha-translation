id: 1KI.15.14
reference: 1 Kings 15:14
source:
  edition: WLC
  text: וְ/הַ/בָּמ֖וֹת לֹא סָ֑רוּ רַ֣ק לְבַב אָסָ֗א הָיָ֥ה שָׁלֵ֛ם עִם יְהוָ֖ה כָּל יָמָֽי/ו־־־־׃
translation:
  text: But the high places were not removed; nevertheless, Asa’s heart was wholly devoted to Yahweh all his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his heart was undivided with the LORD all his days.' The Hebrew says literally 'Asa’s heart was whole with the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill shrines
  - the cultic high places
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to elevated local worship sites/shrines. 'High places' is the standard concise English rendering and remains understandable in modern English; the article is preserved with 'the.'
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: With בָּמוֹת as subject, סוּר here is idiomatic for removal/abolition rather than physical departure. Passive English ('were not removed') best conveys the sense in context of reform measures.
- source_word: רַק
  chosen: nevertheless
  alternatives:
  - only
  - except that
  - however
  lexicon: HALOT
  rationale: 'רַק introduces a concessive contrast: despite the failure to remove the high places, Asa''s inner loyalty is affirmed. ''Nevertheless'' captures that discourse function more naturally than the more literal ''only.'''
- source_word: לְבַב אָסָא
  chosen: Asa’s heart
  alternatives:
  - the heart of Asa
  lexicon: HALOT
  rationale: לְבַב denotes the inner person, will, and devotion. The construct is rendered naturally in English as a possessive.
- source_word: שָׁלֵם
  chosen: wholly devoted
  alternatives:
  - whole
  - blameless
  - fully committed
  - undivided
  lexicon: HALOT
  rationale: In covenantal context with 'heart' and 'with the LORD,' שָׁלֵם conveys completeness/undivided loyalty rather than sinless perfection. 'Wholly devoted' communicates full covenant allegiance in readable modern English.
- source_word: עִם יְהוָה
  chosen: to the LORD
  alternatives:
  - with the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: Although עִם is literally 'with,' English idiom with 'devoted' prefers 'to.' YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - all the days of his life
  - throughout his life
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew idiom, preserving its temporal comprehensiveness without unnecessary expansion.
