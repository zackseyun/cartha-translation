id: 1KI.15.22
reference: 1 Kings 15:22
source:
  edition: WLC
  text: וְ/הַ/מֶּ֨לֶךְ אָסָ֜א הִשְׁמִ֤יעַ אֶת כָּל יְהוּדָה֙ אֵ֣ין נָקִ֔י וַ/יִּשְׂא֞וּ
    אֶת אַבְנֵ֤י הָֽ/רָמָה֙ וְ/אֶת עֵצֶ֔י/הָ אֲשֶׁ֥ר בָּנָ֖ה בַּעְשָׁ֑א וַ/יִּ֤בֶן
    בָּ/ם֙ הַ/מֶּ֣לֶךְ אָסָ֔א אֶת גֶּ֥בַע בִּנְיָמִ֖ן וְ/אֶת הַ/מִּצְפָּֽה־־־־־־׃
translation:
  text: Then King Asa summoned all Judah—no one was exempt—and they carried away the
    stones of Ramah and its timber, with which Baasha had built, and King Asa built
    with them Geba of Benjamin and Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proclaimed to all Judah.' The Hebrew verb literally means 'caused to
      hear.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''there is no exempt one,'' meaning that no person was excused
      from the labor.'
    reason: lexical_alternative
  - marker: c
    text: The clause 'with which Baasha had built' refers to the stones and timber
      as the materials Baasha used in fortifying Ramah.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁמִיעַ
  chosen: summoned
  alternatives:
  - made heard
  - proclaimed
  - caused to hear
  lexicon: HALOT
  rationale: The Hiphil of שׁמע here means to make an announcement or issue a call
    throughout Judah. 'Summoned' captures the practical force in context better than
    the more wooden 'made heard' while remaining close to the source.
- source_word: אֵין נָקִי
  chosen: no one was exempt
  alternatives:
  - there was no exempt one
  - none was free
  - none was innocent/clear
  lexicon: HALOT
  rationale: In this mobilization context, נָקִי carries the sense of being free from
    obligation or exempt from service, not moral innocence. The idiomatic English
    'no one was exempt' best conveys the force.
- source_word: וַיִּשְׂאוּ
  chosen: they carried away
  alternatives:
  - they carried
  - they bore off
  - they removed
  lexicon: HALOT
  rationale: נשא with building materials here indicates transporting/removing them
    from Ramah for reuse. 'Carried away' reflects both movement and removal.
- source_word: אַבְנֵי הָרָמָה
  chosen: the stones of Ramah
  alternatives:
  - the stones from Ramah
  - Ramah's stones
  lexicon: HALOT
  rationale: A straightforward construct relationship. 'Of Ramah' is natural and preserves
    the link to the fortified site Baasha had built.
- source_word: עֵצֶיהָ
  chosen: its timber
  alternatives:
  - its wood
  - its beams
  lexicon: HALOT
  rationale: The plural 'woods' in Hebrew refers to wooden building materials. 'Timber'
    is idiomatic English for construction material and fits the context better than
    the overly generic 'wood.'
- source_word: אֲשֶׁר בָּנָה בַּעְשָׁא
  chosen: with which Baasha had built
  alternatives:
  - which Baasha had used to build
  - that Baasha built
  lexicon: HALOT
  rationale: The relative clause most naturally modifies both stones and timber as
    the materials Baasha used in building Ramah. Rendering it instrumentally in English
    avoids the misleading sense that Baasha 'built the timber.'
- source_word: וַיִּבֶן בָּם
  chosen: built with them
  alternatives:
  - rebuilt with them
  - used them to build
  lexicon: HALOT
  rationale: The preposition ב plus pronominal suffix refers back to the stones and
    timber as materials. 'Built with them' is concise and accurate.
- source_word: גֶּבַע בִּנְיָמִן
  chosen: Geba of Benjamin
  alternatives:
  - Geba in Benjamin
  lexicon: HALOT
  rationale: The place name is commonly distinguished as Geba in the territory of
    Benjamin. 'Of Benjamin' is a close rendering of the Hebrew apposition/genitival
    relation.
- source_word: הַמִּצְפָּה
  chosen: Mizpah
  alternatives:
  - the Mizpah
  - Mizpeh
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English place names normally omit
    it. 'Mizpah' is the standard transliteration.
