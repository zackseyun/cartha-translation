id: 1KI.15.24
reference: 1 Kings 15:24
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב אָסָא֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵר֙ עִם אֲבֹתָ֔י/ו בְּ/עִ֖יר
    דָּוִ֣ד אָבִ֑י/ו וַ/יִּמְלֹ֛ךְ יְהוֹשָׁפָ֥ט בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Asa slept with his fathers and was buried with his fathers in the city
    of David his father, and Jehoshaphat his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with his ancestors.' The Hebrew literally says 'with his fathers,' a
      standard royal formula for death and burial.
    reason: lexical_alternative
  - marker: b
    text: '''His father'' refers to David as Asa''s royal forefather, not his immediate
      parent.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a standard royal death formula
    in Kings. Rendering the verb as 'slept' preserves the Hebrew idiom and its literary
    continuity, while the surrounding context makes the meaning of death clear. Translating
    simply 'died' would flatten the formulaic expression.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This phrase belongs to the established burial/death formula. 'Fathers'
    is more formally faithful and preserves the dynastic/ancestral resonance better
    than the more interpretive 'ancestors'.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here; 'was buried' is the
    natural English rendering.
- source_word: בְּעִיר דָּוִד אָבִיו
  chosen: in the city of David his father
  alternatives:
  - in the city of David, his father
  - in David's city, his father
  lexicon: HALOT
  rationale: This closely follows the Hebrew syntax. 'His father' refers to David
    as royal ancestor rather than immediate parent. Retaining the phrase preserves
    the dynastic connection central to Kings.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In succession notices, 'reigned' is the standard concise rendering. 'Became
    king' is possible but less idiomatic in this formulaic context.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition here marks succession. 'In his place' is idiomatic English
    and accurately conveys royal replacement. 'After him' is possible but less precise,
    since the sense is not merely temporal.
