id: 1KI.15.27
reference: 1 Kings 15:27
source:
  edition: WLC
  text: וַ/יִּקְשֹׁ֨ר עָלָ֜י/ו בַּעְשָׁ֤א בֶן אֲחִיָּה֙ לְ/בֵ֣ית יִשָּׂשכָ֔ר וַ/יַּכֵּ֣/הוּ
    בַעְשָׁ֔א בְּ/גִבְּת֖וֹן אֲשֶׁ֣ר לַ/פְּלִשְׁתִּ֑ים וְ/נָדָב֙ וְ/כָל יִשְׂרָאֵ֔ל
    צָרִ֖ים עַֽל גִּבְּתֽוֹן־־־׃
translation:
  text: Then Baasha son of Ahijah, of the house of Issachar, conspired against him,
    and Baasha struck him down at Gibbethon, which belonged to the Philistines, while
    Nadab and all Israel were besieging Gibbethon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plotted against him' / 'formed a conspiracy against him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'killed him'; Hebrew literally 'struck him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which was held by the Philistines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  chosen: conspired against him
  alternatives:
  - plotted against him
  - formed a conspiracy against him
  lexicon: HALOT
  rationale: קשר with עַל commonly denotes entering into a conspiracy against someone,
    not merely a private plan. 'Conspired against him' is idiomatic and preserves
    the political sense.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  chosen: Baasha son of Ahijah
  rationale: Personal names are transliterated by standard convention, and בֶּן is
    rendered with the normal filial expression 'son of.'
- source_word: לְבֵית יִשָּׂשכָר
  chosen: of the house of Issachar
  alternatives:
  - from the house of Issachar
  - belonging to the house of Issachar
  lexicon: HALOT
  rationale: The phrase identifies clan/tribal lineage. 'Of the house of Issachar'
    is natural English and preserves the familial-household sense of בַּיִת in genealogical
    usage.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - killed him
  - smote him
  lexicon: HALOT
  rationale: נכה is broadly 'strike, smite.' In this context the blow is lethal, but
    'struck him down' preserves the verbal imagery while allowing the narrative context
    to imply death. 'Killed him' is possible but slightly more interpretive.
- source_word: בְּגִבְּתוֹן
  chosen: at Gibbethon
  alternatives:
  - in Gibbethon
  rationale: For an attack occurring at a town under siege, 'at Gibbethon' is idiomatic
    English and fits the event setting.
- source_word: אֲשֶׁר לַפְּלִשְׁתִּים
  chosen: which belonged to the Philistines
  alternatives:
  - which was the Philistines'
  - which was held by the Philistines
  lexicon: HALOT
  rationale: The lamed construction marks possession or control. 'Belonged to the
    Philistines' is the most straightforward rendering, though in military context
    it also implies their control of the city.
- source_word: וְנָדָב וְכָל יִשְׂרָאֵל
  chosen: while Nadab and all Israel
  alternatives:
  - and Nadab and all Israel
  rationale: The prefixed conjunction here introduces the circumstantial setting for
    the assassination. Rendering it as 'while' makes explicit the temporal/background
    force in smooth English.
- source_word: צָרִים עַל גִּבְּתוֹן
  chosen: were besieging Gibbethon
  alternatives:
  - were laying siege to Gibbethon
  - were encamped against Gibbethon
  lexicon: HALOT
  rationale: צור על in military contexts means to besiege or lay siege to. 'Were besieging'
    is concise, natural, and accurately conveys the ongoing participial action.
