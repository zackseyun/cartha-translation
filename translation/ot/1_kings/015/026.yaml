id: 1KI.15.26
reference: 1 Kings 15:26
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יֵּ֨לֶךְ֙ בְּ/דֶ֣רֶךְ אָבִ֔י/ו
    וּ֨/בְ/חַטָּאת֔/וֹ אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־׃
translation:
  text: He did what was evil in the sight of the LORD and walked in the way of his
    father and in his sin by which he caused Israel to sin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - He acted
  - He made
  lexicon: HALOT
  rationale: The verb עשה in this formulaic royal evaluation is best rendered simply
    as 'did,' preserving the idiom 'did what was evil' common in Kings.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: With the article, the adjective functions substantivally in the stock
    expression 'do the evil/what is evil.' English idiom is best served by 'what was
    evil.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the sight of' is natural
    English and preserves the metaphor. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: וַיֵּלֶךְ
  chosen: walked
  alternatives:
  - went
  - followed
  lexicon: HALOT
  rationale: In the moral idiom 'walk in the way of,' 'walked' preserves the metaphor
    of conduct better than the more generic 'went'.
- source_word: בְּדֶרֶךְ אָבִיו
  chosen: in the way of his father
  alternatives:
  - in his father's way
  - in the path of his father
  lexicon: HALOT
  rationale: A conventional expression for following a predecessor's pattern of behavior.
    'In the way of his father' is both clear and close to the Hebrew.
- source_word: וּבְחַטָּאתוֹ
  chosen: and in his sin
  alternatives:
  - and in his sinful way
  - and in the sin he committed
  lexicon: HALOT
  rationale: The singular noun with suffix points to the characteristic sin associated
    with his father/house. 'In his sin' keeps the Hebrew's compactness and links naturally
    with the following relative clause.
- source_word: אֲשֶׁר הֶחֱטִיא
  chosen: by which he caused
  alternatives:
  - with which he made
  - which led
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: ''cause to sin.'' Rendering the relative
    clause as ''by which he caused...'' expresses the instrumental force of אֲשֶׁר
    with the preceding noun.'
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object of the causative verb; no expansion is needed.
- source_word: הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: caused Israel to sin
  alternatives:
  - made Israel sin
  - led Israel into sin
  lexicon: HALOT
  rationale: This is the standard causative sense of the Hiphil of חטא in the Deuteronomistic
    history. 'Caused Israel to sin' is direct and transparent.
