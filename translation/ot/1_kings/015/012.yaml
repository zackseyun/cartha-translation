id: 1KI.15.12
reference: 1 Kings 15:12
source:
  edition: WLC
  text: וַ/יַּעֲבֵ֥ר הַ/קְּדֵשִׁ֖ים מִן הָ/אָ֑רֶץ וַ/יָּ֨סַר֙ אֶת כָּל הַ/גִּלֻּלִ֔ים
    אֲשֶׁ֥ר עָשׂ֖וּ אֲבֹתָֽי/ו־־־׃
translation:
  text: He removed the male cult prostitutes from the land, and he took away all the
    idols that his fathers had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drove out.' The verb can denote causing someone to pass from a place,
      hence removing or expelling them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew קְדֵשִׁים, males associated with illicit cultic sexual practice.
      Traditional English versions often have 'sodomites,' but that is not the most
      precise lexical rendering here.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term for 'idols' is contemptuous and may carry the sense of 'detestable
      idols' or even 'dung-idols.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his ancestors' / 'his forefathers.' Hebrew 'his fathers' is an idiom
      for earlier generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֵר
  chosen: removed
  alternatives:
  - drove out
  - caused to pass away
  lexicon: HALOT
  rationale: The Hiphil of עבר here means to cause to disappear/remove from a place.
    'Removed' is natural modern English and fits the object 'from the land' without
    over-specifying the method.
- source_word: הַקְּדֵשִׁים
  chosen: the male cult prostitutes
  alternatives:
  - the sodomites
  - the cult prostitutes
  - the consecrated ones
  lexicon: HALOT
  rationale: In this Deuteronomistic context, קְדֵשִׁים refers to males attached to
    illicit cultic sexual practice, not 'holy ones.' 'Male cult prostitutes' is the
    clearest accurate rendering in modern English. 'Sodomites' is traditional but
    misleading because it imports later moral categorization rather than the lexical
    sense.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - out of the land
  - from the הארץ/realm
  lexicon: HALOT
  rationale: '''From the land'' preserves the Hebrew wording and likely refers to
    the territory of Judah. ''Land'' is preferred over ''country'' for closer correspondence.'
- source_word: וַיָּסַר
  chosen: he took away
  alternatives:
  - removed
  - put away
  lexicon: HALOT
  rationale: סור in the Hiphil commonly means remove/turn aside. 'Took away' gives
    a smooth but still close rendering and avoids repeating 'removed' immediately
    after the first verb, while preserving the sense of elimination.
- source_word: כָּל הַגִּלֻּלִים
  chosen: all the idols
  alternatives:
  - all the dung-idols
  - all the detestable idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols, possibly carrying
    a contemptuous nuance. 'Idols' communicates the referent clearly in the main text;
    the stronger nuance is worth preserving in a footnote rather than forcing an awkward
    English expression.
- source_word: אֲשֶׁר עָשׂוּ אֲבֹתָיו
  chosen: that his fathers had made
  alternatives:
  - which his ancestors made
  - that his fathers made
  lexicon: HALOT
  rationale: The plural 'his fathers' idiomatically refers to forefathers/ancestors.
    'Had made' reflects the prior action relative to Asa's reforms. 'Fathers' is retained
    in the main text to stay gender-accurate and close to the Hebrew, while still
    being understandable.
