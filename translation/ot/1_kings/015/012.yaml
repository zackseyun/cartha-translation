- issue: Rendering of אֲבֹתָיו
  chosen_reading: his fathers
  alternative_readings:
  - his ancestors
  - his forefathers
  rationale: Per the translation philosophy's gender-accurate principle, the masculine
    plural is preserved rather than neutralized unless context requires otherwise.
    Here it refers to paternal predecessors, and 'fathers' remains intelligible in
    English.
