id: 1KI.15.33
reference: 1 Kings 15:33
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שָׁלֹ֔שׁ לְ/אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה מָ֠לַךְ בַּעְשָׁ֨א בֶן אֲחִיָּ֤ה
    עַל כָּל יִשְׂרָאֵל֙ בְּ/תִרְצָ֔ה עֶשְׂרִ֥ים וְ/אַרְבַּ֖ע שָׁנָֽה־־־׃
translation:
  text: In the third year of Asa king of Judah, Baasha son of Ahijah became king over
    all Israel in Tirzah, and he reigned twenty-four years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שָׁלֹשׁ
  chosen: In the third year
  alternatives:
  - In year three
  lexicon: HALOT
  rationale: The construct phrase with prefixed ב marks a temporal setting. 'In the
    third year' is idiomatic modern English and preserves the regnal-year formula.
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: The lamed marks reference to Asa's regnal year. English naturally renders
    this as 'of Asa king of Judah' within the dating formula.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: Here the verb introduces the accession event, while the duration of rule
    is stated later by 'he reigned twenty-four years.' Rendering the first occurrence
    as 'became king' avoids awkward repetition and reflects the ingressive sense in
    context.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  chosen: Baasha son of Ahijah
  alternatives:
  - Baasha, the son of Ahijah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of' is
    retained as the normal Hebrew patronymic expression.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over Israel as a whole
  lexicon: HALOT
  rationale: עַל with מלך indicates rule over a people. 'All Israel' is preserved
    formally, reflecting the northern kingdom in its full national scope.
- source_word: בְּ/תִרְצָה
  chosen: in Tirzah
  alternatives:
  - at Tirzah
  lexicon: HALOT
  rationale: The prefixed ב marks location. 'In Tirzah' is the most natural English
    rendering for the place of his reign/accession.
- source_word: עֶשְׂרִים וְאַרְבַּע שָׁנָה
  chosen: twenty-four years
  alternatives:
  - for twenty-four years
  lexicon: HALOT
  rationale: The numeral phrase gives the duration of Baasha's reign. 'Twenty-four
    years' is concise and idiomatic; the verbal idea 'he reigned' supplies the durative
    sense.
