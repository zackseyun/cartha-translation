id: 1KI.15.16
reference: 1 Kings 15:16
source:
  edition: WLC
  text: וּ/מִלְחָמָ֨ה הָיְתָ֜ה בֵּ֣ין אָסָ֗א וּ/בֵ֛ין בַּעְשָׁ֥א מֶֽלֶךְ יִשְׂרָאֵ֖ל
    כָּל יְמֵי/הֶֽם־־׃
translation:
  text: And there was war between Asa and Baasha king of Israel all their days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout their days' or 'all the days of their lives.' The Hebrew
      idiom literally reads 'all their days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  chosen: And there was war
  alternatives:
  - Now there was war
  - And warfare continued
  lexicon: HALOT
  rationale: מִלְחָמָה means 'war, battle, warfare.' The existential clause with prefixed
    conjunction is naturally rendered 'And there was war.' 'Warfare' is possible but
    'war' is the more idiomatic and direct English choice here.
- source_word: הָיְתָה
  chosen: there was
  alternatives:
  - existed
  - continued
  lexicon: HALOT
  rationale: Qal perfect of היה in an existential construction is best rendered 'there
    was.' Although the context implies an ongoing state, English does not need to
    force 'continued' here.
- source_word: בֵּין ... וּ/בֵין
  chosen: between ... and
  lexicon: HALOT
  rationale: 'The paired preposition construction straightforwardly marks mutual opposition:
    ''between Asa and Baasha.'''
- source_word: אָסָא
  chosen: Asa
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: 'Construct chain identifies Baasha''s royal office. English can omit
    the article naturally in apposition: ''Baasha king of Israel.'' Adding ''the''
    is possible but slightly heavier.'
- source_word: כָּל יְמֵי/הֶם
  chosen: all their days
  alternatives:
  - all their days long
  - throughout their days
  - all the days of their lives
  lexicon: HALOT
  rationale: The idiom literally means 'all their days' and refers to the duration
    of both men's lifetimes/reigns in context. The more literal rendering preserves
    the Hebrew phrasing without over-interpreting. 'All the days of their lives' is
    interpretive and more expansive than necessary.
