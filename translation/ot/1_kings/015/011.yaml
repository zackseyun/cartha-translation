theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of 'David his father' with Asa
  chosen_reading: retain 'father' in the main text as dynastic/ancestral language
  alternative_readings:
  - David his ancestor
  rationale: The Hebrew uses אָבִיו, and royal formulae often use 'father' for a forefather in the dynastic line. Retaining 'father' preserves the source wording and biblical idiom; the more explicit 'ancestor' is preserved in a footnote to avoid misunderstanding.
