id: 1KI.15.11
reference: 1 Kings 15:11
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ אָסָ֛א הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/דָוִ֖ד אָבִֽי/ו׃
translation:
  text: Asa did what was right in the eyes of Yahweh, as David his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as David his ancestor'; 'father' here reflects dynastic ancestry rather than immediate parentage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה commonly means 'do/make.' In this evaluative royal formula, 'did' is the most natural English rendering and fits the idiom 'did what was right.'
- source_word: אָסָא
  chosen: Asa
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: The adjective יָשָׁר means 'straight, right, upright.' In this construction with עשה, idiomatic English is 'did what was right,' preserving the moral evaluation without wooden literalism.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from someone's perspective. 'In the eyes of' is transparent and preserves the metaphor; 'in the sight of' is possible but slightly less direct here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּדָוִד
  chosen: as David
  alternatives:
  - like David
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As David' fits the comparative formula smoothly in English.
- source_word: אָבִיו
  chosen: his father had done
  alternatives:
  - his father
  - his ancestor
  lexicon: HALOT
  rationale: אָב can mean immediate father or ancestor. Since David is not Asa's immediate father, English 'father' here reflects dynastic ancestry in biblical idiom. Adding 'had done' makes explicit the comparison implied from the first clause and yields natural English. The ancestral sense is worth preserving in a footnote.
