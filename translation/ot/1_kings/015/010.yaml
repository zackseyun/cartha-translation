id: 1KI.15.10
reference: 1 Kings 15:10
source:
  edition: WLC
  text: וְ/אַרְבָּעִ֤ים וְ/אַחַת֙ שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ
    מַעֲכָ֖ה בַּת אֲבִישָׁלֽוֹם־׃
translation:
  text: He reigned forty-one years in Jerusalem, and his mother’s name was Maacah
    daughter of Abishalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Abishalom; many English versions have 'Absalom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter of'; the term can also be used more broadly for a female
      descendant in genealogical contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַרְבָּעִים וְ/אַחַת שָׁנָה
  chosen: forty-one years
  alternatives:
  - forty and one years
  - forty-one year
  lexicon: HALOT
  rationale: The Hebrew cardinal construction literally reads 'forty and one year,'
    but idiomatic modern English expresses this as 'forty-one years.' The plural 'years'
    is natural in English for a reign length.
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - became king
  lexicon: HALOT
  rationale: In context the verb denotes the duration of royal rule, not accession.
    'Reigned' is the standard and most precise English rendering for a king's exercise
    of rule.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Jerusalem' is the natural modern
    English rendering.
- source_word: וְשֵׁם אִמּוֹ
  chosen: and his mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The construct phrase is formally 'and the name of his mother,' but the
    chosen wording preserves the sense in readable modern English without loss of
    meaning.
- source_word: מַעֲכָה
  chosen: Maacah
  rationale: Personal names are transliterated rather than translated, following project
    policy.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - granddaughter of
  - descendant of
  lexicon: HALOT
  rationale: The plain lexical sense of בַּת is 'daughter of,' and this should remain
    in the main text. Because Hebrew kinship terms can sometimes denote a more remote
    female descendant and this genealogy is discussed elsewhere, the broader alternative
    is preserved in a footnote rather than imported into the main text.
- source_word: אֲבִישָׁלוֹם
  chosen: Abishalom
  alternatives:
  - Absalom
  rationale: The Hebrew form here is אֲבִישָׁלוֹם, best represented by the transliteration
    'Abishalom.' Since many English readers know the related name-form 'Absalom,'
    that alternative is worth preserving in a footnote.
