theological_decisions:
- issue: Kinship designation for Maacah
  chosen_reading: Retain the literal genealogical expression 'daughter of Abishalom'
    in the main text.
  alternative_readings:
  - granddaughter of Abishalom
  - descendant of Abishalom
  rationale: The Hebrew text explicitly says 'daughter of.' Although historical comparison
    may suggest a broader genealogical sense, the translation should not resolve that
    historical question by replacing the lexical form with an interpretive paraphrase.
    The alternative is preserved in a footnote to maintain transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than resolve it.'
