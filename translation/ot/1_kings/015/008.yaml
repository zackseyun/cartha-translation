id: 1KI.15.8
reference: 1 Kings 15:8
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב אֲבִיָּם֙ עִם אֲבֹתָ֔י/ו וַ/יִּקְבְּר֥וּ אֹת֖/וֹ בְּ/עִ֣יר
    דָּוִ֑ד וַ/יִּמְלֹ֛ךְ אָסָ֥א בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Abijam lay down with his fathers, and they buried him in the city of David.
    Then Asa his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lay down with his fathers,' a customary expression for death and
      burial among one's forefathers.
    reason: cultural_note
  - marker: b
    text: Abijam is called Abijah in some parallel or related passages; here the Hebrew
      text reads 'Abijam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The idiom 'lay down with his fathers' is a conventional Hebrew expression
    for death. 'Lay down' preserves the metaphor more transparently than flattening
    it to 'died,' while avoiding the potentially misleading English idiom 'slept with'.
- source_word: אֲבִיָּם
  chosen: Abijam
  alternatives:
  - Abijah
  rationale: The Hebrew form in this verse is אֲבִיָּם, best transliterated 'Abijam.'
    Since personal names are transliterated rather than translated, the form in the
    source text is preserved.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A standard burial/death formula. 'With his fathers' is a natural, fairly
    literal rendering that preserves the familial and dynastic nuance better than
    the more generalized 'ancestors.'
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: and they buried him
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural, not passive. English commonly uses
    an indefinite plural here; 'they buried him' preserves the form without forcing
    identification of the agents.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard biblical place-name expression. 'The city of David'
    is the established and clearest English rendering.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: In this succession notice, the verb marks accession to the throne. 'Became
    king' communicates the ingressive sense more precisely than the broader 'reigned.'
- source_word: אָסָא בְנוֹ
  chosen: Asa his son
  alternatives:
  - his son Asa
  rationale: Both are possible in English. 'Asa his son' follows the Hebrew order
    closely while remaining natural.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In royal succession formulas, תַּחַת commonly means succession in office.
    'In his place' is idiomatic and precise; 'after him' is possible but slightly
    less explicit about replacement.
