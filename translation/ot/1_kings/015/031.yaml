id: 1KI.15.31
reference: 1 Kings 15:31
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י נָדָ֖ב וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of the acts of Nadab, and all that he did, are they not written
    in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Israel.' The Hebrew expression refers to
      a royal record source, not necessarily the biblical book of Chronicles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' With prefixed וְ in this recurring
    regnal-summary formula, English idiom is best served by 'Now the rest of,' which
    preserves the transitional force without sounding wooden.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the words/matters
    of X, and all that he did,' the sense is a record of deeds or acts. 'Acts' is
    the most natural English rendering in this historiographic context.
- source_word: נָדָב
  chosen: Nadab
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'All that he did'
    is idiomatic, accurate, and preserves the formulaic style of the Hebrew narrative.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - were they not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. Because
    the predicate is plural ('written') and the implied subject is the preceding matters/acts,
    'are they not' matches the Hebrew number and English sense.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is literally 'written.' 'Written' preserves the formal wording
    of the source; 'recorded' is possible but slightly more interpretive.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on/upon the book/scroll.' In English, archival reference is
    naturally expressed as 'written in the Book.' 'Book' is conventional and understandable,
    while 'scroll' is possible but unnecessary here.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This phrase in royal-source citations refers to an annalistic record.
    'Chronicles' is the established and accurate rendering in this formula, though
    it should not be confused with the canonical books of Chronicles; here it denotes
    a royal record.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this source-title formula, לְ marks relation rather than benefit;
    'of the Kings of Israel' is the idiomatic title in English and matches the sense
    of a record concerning Israel's kings.
