id: 1KI.15.13
reference: 1 Kings 15:13
source:
  edition: WLC
  text: וְ/גַ֣ם אֶת מַעֲכָ֣ה אִמּ֗/וֹ וַ/יְסִרֶ֨/הָ֙ מִ/גְּבִירָ֔ה אֲשֶׁר עָשְׂתָ֥ה
    מִפְלֶ֖צֶת לָ/אֲשֵׁרָ֑ה וַ/יִּכְרֹ֤ת אָסָא֙ אֶת מִפְלַצְתָּ֔/הּ וַ/יִּשְׂרֹ֖ף
    בְּ/נַ֥חַל קִדְרֽוֹן׀־־־׃
translation:
  text: He also removed Maacah his mother from being queen mother, because she had
    made a dreadful image for Asherah. Asa cut down her image and burned it in the
    Kidron Valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his mother'; in royal usage this can sometimes refer to a grandmother
      or female ancestor.
    reason: lexical_alternative
  - marker: b
    text: Or 'an abominable image' / 'a horrid thing.' The exact nature of the cult
      object is uncertain.
    reason: lexical_alternative
  - marker: c
    text: '''Asherah'' may refer to the goddess Asherah or to her cult symbol, often
      rendered ''Asherah pole.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: He also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Conveys additive force linking this reform to the preceding actions.
    'He' is supplied naturally in English from the verbal context.
- source_word: מַעֲכָה אִמּוֹ
  chosen: Maacah his mother
  alternatives:
  - Maacah his grandmother
  lexicon: HALOT
  rationale: The Hebrew literally says 'his mother.' In royal Hebrew this can denote
    a female ancestor such as grandmother, but the translation keeps the source wording
    in the main text rather than harmonizing from broader context.
- source_word: וַיְסִרֶהָ
  chosen: removed
  alternatives:
  - deposed
  - took away
  lexicon: HALOT
  rationale: The verb from סור in hiphil indicates causing someone to be removed from
    a position. 'Removed' is clear modern English and fits the office context.
- source_word: מִגְּבִירָה
  chosen: from being queen mother
  alternatives:
  - from the position of queen mother
  - from being lady/ruling lady
  lexicon: HALOT
  rationale: גְּבִירָה denotes the queen mother or great lady in the royal court.
    'Queen mother' best captures the institutional role, not merely noble status.
- source_word: אֲשֶׁר עָשְׂתָה
  chosen: because she had made
  alternatives:
  - which she made
  - for she made
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the reason for her removal, not merely a descriptive
    relative clause. 'Because' makes the causal sense explicit in idiomatic English.
- source_word: מִפְלֶצֶת
  chosen: a dreadful image
  alternatives:
  - an abominable image
  - a horrid thing
  - an obscene image
  lexicon: HALOT
  rationale: The noun refers to a horrifying or repulsive cult object. 'Dreadful image'
    preserves the negative evaluative force without over-specifying its exact form,
    which is uncertain.
- source_word: לָאֲשֵׁרָה
  chosen: for Asherah
  alternatives:
  - for an Asherah pole
  - for the goddess Asherah
  lexicon: HALOT
  rationale: The term can refer either to the goddess Asherah or to her cult symbol.
    Because the object made is already described separately, 'for Asherah' preserves
    the ambiguity of the Hebrew rather than resolving it.
- source_word: וַיִּכְרֹת ... אֶת מִפְלַצְתָּהּ
  chosen: cut down her image
  alternatives:
  - cut off her dreadful image
  - destroyed her image
  lexicon: HALOT
  rationale: כרת literally means 'cut down/cut off.' Since the object may have been
    wooden or pole-like, 'cut down' preserves the concrete verbal force better than
    the more general 'destroyed.'
- source_word: וַיִּשְׂרֹף
  chosen: burned it
  alternatives:
  - set it on fire
  lexicon: HALOT
  rationale: Straightforward rendering of the verb 'burn.'
- source_word: בְּנַחַל קִדְרוֹן
  chosen: in the Kidron Valley
  alternatives:
  - at the brook Kidron
  - in the Wadi Kidron
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or brook-bed. 'Kidron Valley' is natural
    English and fits the known Jerusalem location.
