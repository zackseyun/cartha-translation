theological_decisions:
- issue: Referent of אֲשֵׁרָה
  chosen_reading: Rendered 'Asherah' without deciding between the goddess and her
    cult symbol.
  alternative_readings:
  - the goddess Asherah
  - an Asherah pole/cult object
  rationale: The Hebrew term is contextually debated. The verse already mentions a
    separate manufactured object (מִפְלֶצֶת), so translating אֲשֵׁרָה more specifically
    as either deity or cult pole would over-resolve the ambiguity. Preserving the
    term by transliteration best maintains the textual tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
