id: 1KI.15.17
reference: 1 Kings 15:17
source:
  edition: WLC
  text: וַ/יַּ֨עַל בַּעְשָׁ֤א מֶֽלֶךְ יִשְׂרָאֵל֙ עַל יְהוּדָ֔ה וַ/יִּ֖בֶן אֶת הָ/רָמָ֑ה
    לְ/בִלְתִּ֗י תֵּ֚ת יֹצֵ֣א וָ/בָ֔א לְ/אָסָ֖א מֶ֥לֶךְ יְהוּדָֽה־־־׃
translation:
  text: Then Baasha king of Israel went up against Judah and built Ramah, so as not
    to allow anyone to go out or come in to Asa king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortified Ramah'; the Hebrew verb is simply 'built,' but the context
      suggests a strategic military construction.
    reason: lexical_alternative
  - marker: b
    text: The expression 'go out or come in' is a Hebrew idiom for ordinary movement
      or access; the sense is that Baasha sought to block traffic to Asa king of Judah.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up against
  alternatives:
  - came up against
  - marched up against
  lexicon: HALOT
  rationale: עלה with עַל in a military context commonly denotes advancing against
    or attacking. 'Went up against' preserves the idiom while remaining natural English.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  rationale: Straightforward construct chain identifying Baasha's royal office and
    realm.
- source_word: עַל יְהוּדָה
  chosen: against Judah
  alternatives:
  - against the kingdom of Judah
  - toward Judah
  lexicon: HALOT
  rationale: In context of military movement, עַל is adversative rather than merely
    directional; 'against Judah' best reflects the hostile action.
- source_word: וַיִּבֶן אֶת־הָרָמָה
  chosen: built Ramah
  alternatives:
  - fortified Ramah
  - rebuilt Ramah
  lexicon: HALOT
  rationale: בנה normally means 'build.' Although the strategic context implies fortification,
    the Hebrew does not explicitly say 'fortify,' so 'built Ramah' is retained in
    the main text.
- source_word: הָרָמָה
  chosen: Ramah
  rationale: Place name transliterated in standard English form.
- source_word: לְבִלְתִּי תֵּת
  chosen: so as not to allow
  alternatives:
  - in order not to permit
  - to prevent
  lexicon: HALOT
  rationale: The construction expresses purpose of prevention. 'So as not to allow'
    is idiomatic and preserves the infinitival sense without over-paraphrasing.
- source_word: יֹצֵא וָבָא
  chosen: to go out or come in
  alternatives:
  - exit or enter
  - go out and come in
  lexicon: HALOT
  rationale: This Hebrew pair is a common merism for movement/access. 'Go out or come
    in' communicates the restriction on travel or access in natural English.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: to Asa king of Judah
  alternatives:
  - for Asa king of Judah
  - from and to Asa king of Judah
  lexicon: HALOT
  rationale: The preposition ל marks relation to Asa; in this context the blockade
    is aimed at preventing movement to Asa. 'To Asa king of Judah' is the most textually
    restrained rendering, while broader implications are left to context.
