id: 1KI.15.9
reference: 1 Kings 15:9
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֣ת עֶשְׂרִ֔ים לְ/יָרָבְעָ֖ם מֶ֣לֶךְ יִשְׂרָאֵ֑ל מָלַ֥ךְ אָסָ֖א
    מֶ֥לֶךְ יְהוּדָֽה׃
translation:
  text: In the twentieth year of Jeroboam king of Israel, Asa became king over Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Asa began to reign as king of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'king of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  chosen: In the ... year
  alternatives:
  - And in the ... year
  - In the year of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with שָׁנָה form a standard
    chronological formula. English idiom is best represented as 'In the ... year';
    the prefixed conjunction is not always carried with a separate 'and' in narrative
    regnal notices.
- source_word: עֶשְׂרִים
  chosen: twentieth
  alternatives:
  - twenty
  lexicon: HALOT
  rationale: 'Although the Hebrew cardinal literally reads ''twenty,'' in English
    regnal-year formulas the ordinal sense is natural and standard: ''the twentieth
    year.'''
- source_word: לְ/יָרָבְעָם
  chosen: of Jeroboam
  alternatives:
  - for Jeroboam
  - belonging to Jeroboam
  lexicon: HALOT
  rationale: The preposition ל marks the reference point for the regnal year count.
    In English chronology this is most naturally rendered 'of Jeroboam.'
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward royal title; retained formally.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: The qatal of מָלַךְ in regnal formulas commonly marks accession rather
    than the whole duration of rule. 'Became king' communicates accession clearly
    in modern English. 'Began to reign' is possible but slightly more cumbersome.
- source_word: אָסָא
  chosen: Asa
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king over Judah
  alternatives:
  - king of Judah
  lexicon: HALOT
  rationale: Hebrew construct literally gives 'king of Judah.' 'King over Judah' is
    a natural English rendering after 'became king' and clarifies the realm ruled.
    The sense is unchanged.
