theological_decisions:
- issue: Evaluation of David's obedience despite known sins
  chosen_reading: Retain the text's broad commendation with its explicit exception, without softening or expanding it.
  alternative_readings:
  - Paraphrasing to explain that David was generally faithful
  - Adding interpretive language about repentance or covenant faithfulness
  rationale: The verse itself presents David as having done what was right and not turned aside, with one stated exception. The translation should preserve that tension rather than resolve it by importing explanatory theology.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
