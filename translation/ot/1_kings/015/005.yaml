id: 1KI.15.5
reference: 1 Kings 15:5
source:
  edition: WLC
  text: אֲשֶׁ֨ר עָשָׂ֥ה דָוִ֛ד אֶת הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה וְ/לֹֽא סָ֞ר מִ/כֹּ֣ל אֲשֶׁר צִוָּ֗/הוּ כֹּ֚ל יְמֵ֣י חַיָּ֔י/ו רַ֕ק בִּ/דְבַ֖ר אוּרִיָּ֥ה הַ/חִתִּֽי־־־׃
translation:
  text: because David had done what was right in the eyes of Yahweh and had not turned aside from anything that he had commanded him all the days of his life, except in the matter of Uriah the Hittite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the case of Uriah the Hittite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - which
  - forasmuch as
  lexicon: HALOT
  rationale: In context this relative particle introduces the reason for the preceding statement in v. 4, so an explicit causal rendering in English is clearer than a bare relative 'that.'
- source_word: עָשָׂה ... אֶת הַיָּשָׁר
  chosen: had done what was right
  alternatives:
  - did the right
  - had done the upright
  lexicon: HALOT
  rationale: The idiom עשה את הישר means to do what is right/upright. 'What was right' is natural English and preserves the moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' preserves the metaphor while remaining idiomatic. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for יְהוָה.
- source_word: וְלֹא סָר
  chosen: and had not turned aside
  alternatives:
  - and did not depart
  - and did not turn away
  lexicon: HALOT
  rationale: סור here conveys deviation from commanded obedience. 'Turned aside' is a standard and clear rendering that fits the covenantal context.
- source_word: מִכֹּל אֲשֶׁר צִוָּהוּ
  chosen: from anything that he commanded him
  alternatives:
  - from all that he commanded him
  - from anything he had commanded him
  lexicon: HALOT
  rationale: The Hebrew literally says 'from all that he commanded him.' In English after 'not turned aside from,' 'anything that he commanded him' is more idiomatic while preserving the totality implied by כל.
- source_word: כֹּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - throughout his life
  - all his lifetime
  lexicon: HALOT
  rationale: This is a conventional Hebrew temporal expression. The chosen rendering is transparent and close to the source.
- source_word: רַק
  chosen: except
  alternatives:
  - only
  - save that
  lexicon: HALOT
  rationale: Here רק introduces the sole exception to the preceding commendation. 'Except' conveys that function more directly than 'only' in English.
- source_word: בִּדְבַר אוּרִיָּה
  chosen: in the matter of Uriah
  alternatives:
  - in the case of Uriah
  - concerning Uriah
  lexicon: HALOT
  rationale: דבר in this construction means 'matter/affair/case.' 'In the matter of' is concise and preserves the idiomatic sense.
- source_word: אוּרִיָּה הַחִתִּי
  chosen: Uriah the Hittite
  lexicon: HALOT
  rationale: Standard transliteration of the personal name with the ethnic designation translated straightforwardly.
