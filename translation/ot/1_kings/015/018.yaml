theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines specify 'the LORD'
    as the default rendering for YHWH, following Jewish reverence tradition and the
    Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אֲרָם
  chosen_reading: Aram
  alternative_readings:
  - Syria
  rationale: This is not a theological dispute but a translation-philosophy decision
    with interpretive significance. Using 'Aram' preserves the Hebrew historical-geographical
    designation rather than substituting the later conventional English 'Syria.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2
