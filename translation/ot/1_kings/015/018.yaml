id: 1KI.15.18
reference: 1 Kings 15:18
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אָ֠סָא אֶת כָּל הַ/כֶּ֨סֶף וְ/הַ/זָּהָ֜ב הַֽ/נּוֹתָרִ֣ים בְּ/אוֹצְר֣וֹת
    בֵּית יְהוָ֗ה וְ/אֶת אֽוֹצְרוֹת֙ בֵּ֣ית מלך וַֽ/יִּתְּנֵ֖/ם בְּ/יַד עֲבָדָ֑י/ו
    וַ/יִּשְׁלָחֵ֞/ם הַ/מֶּ֣לֶךְ אָסָ֗א אֶל בֶּן הֲ֠דַד בֶּן טַבְרִמֹּ֤ן בֶּן חֶזְיוֹן֙
    מֶ֣לֶךְ אֲרָ֔ם הַ/יֹּשֵׁ֥ב בְּ/דַמֶּ֖שֶׂק לֵ/אמֹֽר־־׀־־־־־־־׃
translation:
  text: Then Asa took all the silver and the gold that remained in the treasuries
    of the house of the LORD, and the treasuries of the king’s house, and put them
    into the hand of his servants. Then King Asa sent them to Ben-hadad son of Tabrimmon,
    son of Hezion, king of Aram, who lived in Damascus, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s palace' for 'the king’s house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then Asa took
  alternatives:
  - And Asa took
  - So Asa took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... took' gives natural
    English narrative sequence without losing the simple verbal sense of לקח.
- source_word: כָּל הַכֶּסֶף וְהַזָּהָב
  chosen: all the silver and the gold
  alternatives:
  - all the silver and gold
  lexicon: HALOT
  rationale: Retains the totalizing כָּל and the two specific valuables. Repeating
    the article in English is slightly more formal but reflects the Hebrew pairing
    well.
- source_word: הַנּוֹתָרִים
  chosen: that remained
  alternatives:
  - remaining
  - left over
  lexicon: HALOT
  rationale: The participle from יתר describes what was still left in the treasuries.
    'That remained' is idiomatic and preserves the sense of residue without sounding
    colloquial.
- source_word: בְּאֹצְרוֹת בֵּית יְהוָה
  chosen: in the treasuries of the house of the LORD
  alternatives:
  - in the treasuries of the LORD's house
  - in the storehouses of the house of the LORD
  lexicon: HALOT
  rationale: אוצרות commonly refers to treasuries/storehouses; here 'treasuries' fits
    precious metals. Per doctrine, יְהוָה is rendered 'the LORD.' 'House of the LORD'
    is a standard and clear rendering for the temple.
- source_word: וְאֶת אֹצְרוֹת בֵּית מלך
  chosen: and the treasuries of the king’s house
  alternatives:
  - and the treasuries of the royal palace
  - and the treasuries of the king's palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' In context this refers to the palace
    complex, but 'the king's house' stays closer to the Hebrew while remaining understandable.
- source_word: וַיִּתְּנֵם בְּיַד עֲבָדָיו
  chosen: and put them into the hand of his servants
  alternatives:
  - and gave them into the hand of his servants
  - and entrusted them to his servants
  lexicon: HALOT
  rationale: נתן plus 'into the hand' is an idiom for entrusting or placing under
    someone's control. 'Put them into the hand of' preserves the Hebrew image; 'servants'
    is appropriate for עבדים here since bonded status is not the point of the narrative.
- source_word: וַיִּשְׁלָחֵם
  chosen: Then King Asa sent them
  alternatives:
  - and King Asa sent them
  - sent them
  lexicon: HALOT
  rationale: The object suffix refers to the silver and gold. Repeating 'Then' helps
    the English narrative flow and clarifies the sequence of actions.
- source_word: בֶּן הֲדַד בֶּן טַבְרִמֹּן בֶּן חֶזְיוֹן
  chosen: Ben-hadad son of Tabrimmon, son of Hezion
  alternatives:
  - Ben-Hadad son of Tabrimmon son of Hezion
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained to preserve the genealogical identification.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew ethnogeographic term and should be transliterated
    rather than replaced with the later conventional 'Syria,' in keeping with original-language
    primacy.
- source_word: הַיֹּשֵׁב בְּדַמֶּשֶׂק
  chosen: who lived in Damascus
  alternatives:
  - who dwelt in Damascus
  - who was residing in Damascus
  lexicon: HALOT
  rationale: The participle of ישב here denotes residence. 'Who lived in Damascus'
    is natural modern English while preserving the locative sense.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'with this message:'
  - saying
  lexicon: HALOT
  rationale: This introduces the direct speech in the next verse. 'Saying,' is the
    standard concise rendering and preserves the linkage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
