id: 1KI.15.28
reference: 1 Kings 15:28
source:
  edition: WLC
  text: וַ/יְמִתֵ֣/הוּ בַעְשָׁ֔א בִּ/שְׁנַ֣ת שָׁלֹ֔שׁ לְ/אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה
    וַ/יִּמְלֹ֖ךְ תַּחְתָּֽי/ו׃
translation:
  text: Baasha put him to death in the third year of Asa king of Judah, and he reigned
    in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'killed him.' The Hebrew verb is causative ('caused him to die'), which
      can be rendered more literally as 'put him to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמִתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: Hiphil of מות is causative ('cause to die'). 'Put him to death' preserves
    the causative force and the narrative gravity better than the flatter 'killed
    him,' while remaining natural English.
- source_word: בַעְשָׁא
  chosen: Baasha
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בִּשְׁנַת שָׁלֹשׁ
  chosen: in the third year
  alternatives:
  - during the third year
  lexicon: HALOT
  rationale: 'The construct phrase with ב marks time: ''in the third year.'' This
    is the standard and clear temporal rendering.'
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: ל with regnal-year formulas indicates reference point ('of Asa'). 'King
    of Judah' is a straightforward rendering of the title and realm.
- source_word: וַיִּמְלֹךְ
  chosen: and he reigned
  alternatives:
  - and he became king
  - and he began to reign
  lexicon: HALOT
  rationale: מלך in the Qal wayyiqtol commonly means 'reigned/became king.' Here,
    because the following phrase specifies succession, 'reigned' is idiomatic and
    sufficient in English.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix denotes succession or replacement.
    'In his place' is natural English for royal succession and avoids awkwardness.
