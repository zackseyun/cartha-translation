id: 1KI.15.19
reference: 1 Kings 15:19
source:
  edition: WLC
  text: בְּרִית֙ בֵּינִ֣/י וּ/בֵינֶ֔/ךָ בֵּ֥ין אָבִ֖/י וּ/בֵ֣ין אָבִ֑י/ךָ הִנֵּה֩
    שָׁלַ֨חְתִּֽי לְ/ךָ֥ שֹׁ֨חַד֙ כֶּ֣סֶף וְ/זָהָ֔ב לֵ֣ךְ הָפֵ֗רָ/ה אֶת בְּרִֽיתְ/ךָ֙
    אֶת בַּעְשָׁ֣א מֶֽלֶךְ יִשְׂרָאֵ֔ל וְ/יַעֲלֶ֖ה מֵ/עָלָֽ/י־־־׃
translation:
  text: There is a covenant between me and you, between my father and your father.
    Look, I have sent you a bribe of silver and gold. Go, break your covenant with
    Baasha king of Israel, so that he may withdraw from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gift' or 'present'; the Hebrew term often carries the sense of a bribe,
      which fits the context of inducing Ben-hadad to break his treaty with Baasha.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - alliance
  lexicon: HALOT
  rationale: בְּרִית denotes a formal binding agreement. 'Covenant' preserves the
    formal and political weight better than the flatter 'alliance,' while still fitting
    an international pact in context.
- source_word: בֵּינִי וּבֵינֶךָ ... בֵּין אָבִי וּבֵין אָבִיךָ
  chosen: between me and you, between my father and your father
  alternatives:
  - between us ... between my father and your father
  lexicon: HALOT
  rationale: The repeated 'between' is retained for the formal, diplomatic style of
    the Hebrew rather than smoothing it into a more idiomatic but less explicit English
    phrasing.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' is readable modern
    English and preserves the deictic force without archaic tone.
- source_word: שָׁלַחְתִּי לְךָ
  chosen: I have sent you
  alternatives:
  - I am sending you
  - I sent you
  lexicon: HALOT
  rationale: The perfect is rendered as present-resultative in English ('have sent')
    to fit the immediate diplomatic action and the following imperative.
- source_word: שֹׁחַד
  chosen: bribe
  alternatives:
  - gift
  - present
  lexicon: HALOT
  rationale: שֹׁחַד commonly denotes a bribe rather than a neutral gift. Since Asa
    is attempting to induce Ben-hadad to break an existing treaty, 'bribe' best reflects
    the transactional and morally charged sense of the Hebrew.
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  lexicon: HALOT
  rationale: A straightforward rendering of the material terms; no contextual reason
    to generalize to 'money' or 'treasure.'
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come now, go
  - Go on
  lexicon: HALOT
  rationale: The imperative is retained explicitly rather than absorbed into the following
    verb, preserving the urgency and directness of the request.
- source_word: הָפֵרָה
  chosen: break
  alternatives:
  - annul
  - invalidate
  lexicon: HALOT
  rationale: The Hiphil of פרר here means to break or nullify a covenant. 'Break'
    is the most natural English collocation with 'covenant' and preserves the force
    of treaty violation.
- source_word: בְּרִיתְךָ אֶת־בַּעְשָׁא
  chosen: your covenant with Baasha
  alternatives:
  - your treaty with Baasha
  lexicon: HALOT
  rationale: The prepositionless object marker construction is idiomatically rendered
    'with Baasha' in English. 'Covenant' is kept consistent with the earlier בְּרִית
    in the verse.
- source_word: וְיַעֲלֶה מֵעָלָי
  chosen: so that he may withdraw from me
  alternatives:
  - and let him go up from against me
  - so that he may go away from me
  lexicon: HALOT
  rationale: עלה with מֵעַל in this military-political context means to move away
    or withdraw from pressure/hostility. 'Withdraw from me' communicates the intended
    cessation of aggression more clearly than a wooden 'go up from me.'
