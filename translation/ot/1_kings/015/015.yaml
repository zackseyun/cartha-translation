id: 1KI.15.15
reference: 1 Kings 15:15
source:
  edition: WLC
  text: וַ/יָּבֵא֙ אֶת קָדְשֵׁ֣י אָבִ֔י/ו ו/קדש/ו בֵּ֣ית יְהוָ֑ה כֶּ֥סֶף וְ/זָהָ֖ב
    וְ/כֵלִֽים־׃
translation:
  text: 'And he brought into the house of the LORD the holy things of his father and
    his own holy things: silver and gold and vessels.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things his father had dedicated, and the things he himself had dedicated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: he brought
  alternatives:
  - he brought in
  - he introduced
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' or 'bring in.' Because the destination
    phrase 'into the house of the LORD' is explicit in English, 'brought' is sufficient
    and natural.
- source_word: קָדְשֵׁי אָבִיו
  chosen: the holy things of his father
  alternatives:
  - his father's dedicated things
  - his father's consecrated gifts
  lexicon: HALOT
  rationale: The plural construct of קדשׁ here refers to items set apart as sacred/dedicated,
    not abstract holiness. 'Holy things' is a transparent rendering that preserves
    the cultic sense without over-specifying the exact type of donation.
- source_word: וְקָדְשׁוֹ
  chosen: and his own holy things
  alternatives:
  - and his dedicated things
  - and the things he had dedicated
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix functions collectively for what belonged
    to his own dedicated offerings. 'His own holy things' mirrors the Hebrew closely
    and keeps the parallel with 'the holy things of his father.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the standard literal rendering for the sanctuary.
    ''Temple'' is possible contextually, but ''house'' better preserves the Hebrew
    expression. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the reverential convention and established English pattern.
- source_word: כֶּסֶף וְזָהָב וְכֵלִים
  chosen: silver and gold and vessels
  alternatives:
  - silver and gold and utensils
  - silver and gold and articles
  lexicon: HALOT
  rationale: These nouns likely appose or specify the content of the dedicated items.
    'Vessels' is a standard rendering for כלים in temple contexts and is broad enough
    to include implements or articles without unnecessary interpretation.
