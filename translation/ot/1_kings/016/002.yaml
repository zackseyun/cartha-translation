id: 1KI.16.2
reference: 1 Kings 16:2
source:
  edition: WLC
  text: יַ֗עַן אֲשֶׁ֤ר הֲרִימֹתִ֨י/ךָ֙ מִן הֶ֣/עָפָ֔ר וָ/אֶתֶּנְ/ךָ֣ נָגִ֔יד עַ֖ל
    עַמִּ֣/י יִשְׂרָאֵ֑ל וַ/תֵּ֣לֶךְ בְּ/דֶ֣רֶךְ יָרָבְעָ֗ם וַֽ/תַּחֲטִא֙ אֶת עַמִּ֣/י
    יִשְׂרָאֵ֔ל לְ/הַכְעִיסֵ֖/נִי בְּ/חַטֹּאתָֽ/ם־׀־׃
translation:
  text: Because I raised you up from the dust and made you ruler over my people Israel,
    but you walked in the way of Jeroboam and caused my people Israel to sin, provoking
    me to anger by their sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and made my people Israel sin.' The Hebrew verb is causative.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The paired expression introduces the ground for the coming judgment in
    the next verse. 'Because' is natural modern English and preserves the causal force.
- source_word: הֲרִימֹתִיךָ
  chosen: I raised you up
  alternatives:
  - I exalted you
  - I lifted you up
  lexicon: HALOT
  rationale: רוּם in this context refers to elevating Baasha from low status to kingship.
    'Raised you up' is idiomatic and preserves both literal imagery and political
    elevation.
- source_word: מִן הֶעָפָר
  chosen: from the dust
  alternatives:
  - from the dirt
  lexicon: HALOT
  rationale: '''Dust'' is the standard and more biblically resonant rendering for
    עָפָר, conveying lowliness and humble origin.'
- source_word: וָאֶתֶּנְךָ נָגִיד
  chosen: and made you ruler
  alternatives:
  - and appointed you leader
  - and made you prince
  lexicon: HALOT
  rationale: נָגִיד often denotes one appointed as leader or ruler. 'Ruler' is clear
    modern English and fits the royal context better than the archaic-sounding 'prince.'
    'Made you' smoothly renders the verb-object construction in English.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - over my people, Israel
  lexicon: HALOT
  rationale: This preserves the possessive emphasis ('my people') and the object of
    rule. No added interpretation is required.
- source_word: וַתֵּלֶךְ בְּדֶרֶךְ יָרָבְעָם
  chosen: but you walked in the way of Jeroboam
  alternatives:
  - and you went in the way of Jeroboam
  - but you followed the path of Jeroboam
  lexicon: HALOT
  rationale: '''Walked in the way of'' is a standard biblical idiom for patterned
    conduct and should be preserved rather than flattened. ''But'' brings out the
    adversative sense implied by the contrast between divine elevation and Baasha''s
    response.'
- source_word: וַתַּחֲטִא אֶת עַמִּי יִשְׂרָאֵל
  chosen: and caused my people Israel to sin
  alternatives:
  - and made my people Israel sin
  - and led my people Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused ... to sin' most directly reflects
    that causative force.
- source_word: לְהַכְעִיסֵנִי
  chosen: provoking me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose. 'Provoking me to anger' preserves
    the personal divine offense and reads naturally in sequence with the previous
    clause.
- source_word: בְּחַטֹּאתָם
  chosen: by their sins
  alternatives:
  - with their sins
  - through their sins
  lexicon: HALOT
  rationale: The plural noun with 3mp suffix refers to the sins of the people whom
    Baasha caused to sin. 'By their sins' best captures the instrumental sense of
    בְ here.
