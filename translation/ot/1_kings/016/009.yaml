id: 1KI.16.9
reference: 1 Kings 16:9
source:
  edition: WLC
  text: וַ/יִּקְשֹׁ֤ר עָלָי/ו֙ עַבְדּ֣/וֹ זִמְרִ֔י שַׂ֖ר מַחֲצִ֣ית הָ/רָ֑כֶב וְ/ה֤וּא
    בְ/תִרְצָה֙ שֹׁתֶ֣ה שִׁכּ֔וֹר בֵּ֣ית אַרְצָ֔א אֲשֶׁ֥ר עַל הַ/בַּ֖יִת בְּ/תִרְצָֽה־׃
translation:
  text: But his servant Zimri, commander of half the chariots, conspired against him
    while he was in Tirzah, drinking himself drunk in the house of Arza, who was over
    the household in Tirzah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drinking to drunkenness.' The Hebrew expression is vivid, describing
      active drinking that resulted in intoxication.
    reason: lexical_alternative
  - marker: b
    text: '''Over the household'' is an administrative title, likely referring to
      the official in charge of the royal household or palace.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  chosen: conspired against him
  alternatives:
  - plotted against him
  - made a conspiracy against him
  lexicon: HALOT
  rationale: קשר with עַל in royal narrative commonly denotes entering into a conspiracy
    against a ruler, not merely a private plot. 'Conspired against him' is idiomatic
    and preserves the political sense.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his officer
  - his official
  lexicon: HALOT
  rationale: עבד literally means 'servant,' but in royal contexts can denote a court
    servant or official. 'His servant' keeps the Hebrew wording while remaining natural
    in English.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Personal name transliterated per translation philosophy.
- source_word: שַׂר מַחֲצִית הָרָכֶב
  chosen: commander of half the chariots
  alternatives:
  - captain of half the chariot force
  - officer over half the chariots
  lexicon: HALOT
  rationale: שַׂר is a leader/commander; רכב here refers to chariotry or chariot force.
    'Commander of half the chariots' is a close, readable rendering of the construct
    chain.
- source_word: וְהוּא
  chosen: while he was
  alternatives:
  - and he was
  lexicon: HALOT
  rationale: The pronoun introduces the circumstantial setting for the conspiracy.
    English idiom prefers 'while he was' to make the temporal/circumstantial relation
    explicit.
- source_word: בְתִרְצָה
  chosen: in Tirzah
  rationale: Place name transliterated; preposition rendered straightforwardly.
- source_word: שֹׁתֶה שִׁכּוֹר
  chosen: drinking himself drunk
  alternatives:
  - drinking to drunkenness
  - drinking and becoming drunk
  - drunk from drinking
  lexicon: HALOT
  rationale: The participle plus adjective conveys active drinking resulting in intoxication.
    'Drinking himself drunk' preserves the vividness and the ongoing action better
    than simply 'getting drunk' or statively 'was drunk.'
- source_word: בֵּית אַרְצָא
  chosen: in the house of Arza
  alternatives:
  - at Arza's house
  lexicon: HALOT
  rationale: בית + personal name is naturally 'house of' in formal narrative; 'in
    the house of Arza' fits the syntax after the circumstantial clause.
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: The idiom עַל־הַבַּיִת denotes an official in charge of the royal household/palace
    administration. 'Over the household' preserves the Hebrew idiom while communicating
    administrative authority.
- source_word: בְּתִרְצָה
  chosen: in Tirzah
  rationale: The final location marker most naturally modifies Arza's office/household
    setting in Tirzah; repeated in English to reflect the Hebrew repetition.
