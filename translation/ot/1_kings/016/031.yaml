id: 1KI.16.31
reference: 1 Kings 16:31
source:
  edition: WLC
  text: וַ/יְהִי֙ הֲ/נָקֵ֣ל לֶכְתּ֔/וֹ בְּ/חַטֹּ֖אות יָרָבְעָ֣ם בֶּן נְבָ֑ט וַ/יִּקַּ֨ח
    אִשָּׁ֜ה אֶת אִיזֶ֗בֶל בַּת אֶתְבַּ֨עַל֙ מֶ֣לֶךְ צִידֹנִ֔ים וַ/יֵּ֨לֶךְ֙ וַֽ/יַּעֲבֹ֣ד
    אֶת הַ/בַּ֔עַל וַ/יִּשְׁתַּ֖חוּ לֽ/וֹ־־־־׃
translation:
  text: And as if it were a light thing for him to walk in the sins of Jeroboam son
    of Nebat, he took Jezebel daughter of Ethbaal, king of the Sidonians, as his wife,
    and went and served Baal and bowed down to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Was it a trivial thing for him to walk in the sins of Jeroboam son
      of Nebat...?' The Hebrew opening is idiomatic and rhetorically emphasizes that
      Ahab treated those sins as insignificant.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנָקֵל
  chosen: as if it were a light thing
  alternatives:
  - was it a trivial thing
  - was it too light a thing
  lexicon: HALOT
  rationale: The idiom conveys that Ahab treated Jeroboam's sins as something insignificant,
    introducing an escalation. 'As if it were a light thing' preserves the rhetorical
    force better than a flat 'it was easy.'
- source_word: לֶכְתּוֹ בְּחַטֹּאות
  chosen: for him to walk in the sins
  alternatives:
  - to go in the sins
  - to live in the sins
  lexicon: HALOT
  rationale: הלך with ב plus 'sins' is a common Hebrew idiom for conduct or pattern
    of life. 'Walk in' preserves the biblical metaphor while remaining natural English.
- source_word: בְּחַטֹּאות יָרָבְעָם בֶּן נְבָט
  chosen: in the sins of Jeroboam son of Nebat
  alternatives:
  - according to the sins of Jeroboam son of Nebat
  lexicon: HALOT
  rationale: A standard Deuteronomistic formula referring to Jeroboam's idolatrous
    practices. 'In the sins of' is the most direct rendering.
- source_word: וַיִּקַּח אִשָּׁה אֶת אִיזֶבֶל
  chosen: he took Jezebel ... as his wife
  alternatives:
  - he married Jezebel
  lexicon: HALOT
  rationale: Literally 'he took a wife, Jezebel.' 'Took ... as his wife' preserves
    the Hebrew structure and avoids over-paraphrase, while still reading naturally.
- source_word: אֶתְבַּעַל
  chosen: Ethbaal
  alternatives:
  - Ithobaal
  lexicon: HALOT
  rationale: A standard English transliteration of the Phoenician royal name. Personal
    names are transliterated rather than translated.
- source_word: צִידֹנִים
  chosen: the Sidonians
  alternatives:
  - Sidonians
  - the people of Sidon
  lexicon: HALOT
  rationale: The plural gentilic is best represented as 'the Sidonians.' Including
    the article reflects the Hebrew phrase 'king of the Sidonians.'
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - then he went
  - and he proceeded
  lexicon: HALOT
  rationale: In sequence with the following verbs, 'went' retains the narrative progression
    and may imply movement into action without needing expansion.
- source_word: וַיַּעֲבֹד אֶת הַבַּעַל
  chosen: served Baal
  alternatives:
  - worshiped Baal
  lexicon: HALOT
  rationale: עבד in cultic contexts often means 'serve' in the sense of religious
    devotion. Since the next verb explicitly denotes prostration, 'served' preserves
    the distinction between service and bowing.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English convention treats Baal as
    a proper divine name without the article in most contexts.
- source_word: וַיִּשְׁתַּחוּ לוֹ
  chosen: bowed down to him
  alternatives:
  - prostrated himself to him
  - worshiped him
  lexicon: HALOT
  rationale: The verb specifically denotes bowing/prostration. 'Bowed down to him'
    preserves the physical act and avoids collapsing it into the broader 'served'
    of the previous clause.
