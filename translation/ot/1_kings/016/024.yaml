id: 1KI.16.24
reference: 1 Kings 16:24
source:
  edition: WLC
  text: וַ/יִּ֜קֶן אֶת הָ/הָ֥ר שֹׁמְר֛וֹן מֵ֥/אֶת שֶׁ֖מֶר בְּ/כִכְּרַ֣יִם כָּ֑סֶף
    וַ/יִּ֨בֶן֙ אֶת הָ/הָ֔ר וַ/יִּקְרָ֗א אֶת שֵׁ֤ם הָ/עִיר֙ אֲשֶׁ֣ר בָּנָ֔ה עַ֣ל שֶׁם
    שֶׁ֔מֶר אֲדֹנֵ֖י הָ/הָ֥ר שֹׁמְרֽוֹן־־־־׃
translation:
  text: He bought the hill of Samaria from Shemer for two talents of silver, built
    on the hill, and called the name of the city that he built Samaria, after the
    name of Shemer, the owner of the hill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, 'and named the city he built Samaria, after Shemer, the
      owner of the hill.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'two talents of silver,' a large weight-based sum.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקֶן
  chosen: He bought
  alternatives:
  - He purchased
  lexicon: HALOT
  rationale: The verb קנה in this context denotes acquiring property by payment. 'Bought'
    is the most natural modern English rendering and fits the following price clause.
- source_word: הָהָר
  chosen: the hill
  alternatives:
  - the mountain
  lexicon: HALOT
  rationale: הַר can mean 'mountain' or 'hill.' Given the topography of a city site
    and standard English usage for an urban elevation, 'hill' is more idiomatic here.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  rationale: Standard English transliteration/rendering of the place name. Here it
    first identifies the hill and then the city named from it.
- source_word: מֵאֵת שֶׁמֶר
  chosen: from Shemer
  lexicon: HALOT
  rationale: The preposition marks the seller/source of acquisition. 'From Shemer'
    is the straightforward sense.
- source_word: בְּכִכְּרַיִם כָּסֶף
  chosen: for two talents of silver
  alternatives:
  - for two shekels of silver
  lexicon: HALOT
  rationale: כִּכָּר in monetary contexts refers to a 'talent,' a large weight of
    precious metal. The dual form means 'two talents.' 'Shekels' would be lexically
    incorrect here.
- source_word: וַיִּבֶן אֶת הָהָר
  chosen: built on the hill
  alternatives:
  - fortified the hill
  - built the hill
  lexicon: HALOT
  rationale: Literally 'built the hill' is awkward in English; the sense is that he
    built a city/structures on the hill. 'Built on the hill' preserves the action
    without over-specifying beyond the Hebrew.
- source_word: וַיִּקְרָא אֶת שֵׁם הָעִיר
  chosen: and called the name of the city
  alternatives:
  - and named the city
  lexicon: HALOT
  rationale: This reflects the Hebrew idiom closely while remaining intelligible.
    It preserves the formal naming action.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he built
  alternatives:
  - which he had built
  lexicon: HALOT
  rationale: Simple past is sufficient in English and matches the narrative sequence.
- source_word: עַל שֵׁם
  chosen: after the name of
  alternatives:
  - after
  - according to the name of
  lexicon: HALOT
  rationale: The phrase explicitly indicates naming in reference to someone else's
    name. 'After the name of' preserves that explicitness.
- source_word: אֲדֹנֵי הָהָר
  chosen: the owner of the hill
  alternatives:
  - lord of the hill
  - master of the hill
  lexicon: HALOT
  rationale: אדון here refers to property ownership, not nobility or divine lordship.
    'Owner' best conveys the legal/property sense in modern English.
