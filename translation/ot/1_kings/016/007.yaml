id: 1KI.16.7
reference: 1 Kings 16:7
source:
  edition: WLC
  text: וְ/גַ֡ם בְּ/יַד יֵה֨וּא בֶן חֲנָ֜נִי הַ/נָּבִ֗יא דְּבַר יְהוָ֡ה הָיָה֩ אֶל בַּעְשָׁ֨א וְ/אֶל בֵּית֜/וֹ וְ/עַ֥ל כָּל הָ/רָעָ֣ה אֲשֶׁר עָשָׂ֣ה בְּ/עֵינֵ֣י יְהוָ֗ה לְ/הַכְעִיס/וֹ֙ בְּ/מַעֲשֵׂ֣ה יָדָ֔י/ו לִ/הְי֖וֹת כְּ/בֵ֣ית יָרָבְעָ֑ם וְ/עַ֥ל אֲשֶׁר הִכָּ֖ה אֹתֽ/וֹ־־־־־־׀־׀־׃פ
translation:
  text: And also through Jehu son of Hanani the prophet, the word of Yahweh came against Baasha and against his house, both because of all the evil that he did in the sight of Yahweh, provoking him to anger by the work of his hands, by becoming like the house of Jeroboam, and because he struck him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and because he struck him down.' The Hebrew suffix is singular masculine and may refer either to Jeroboam personally or, more likely in context, to his house/dynasty as a collective.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Moreover
  - And furthermore
  lexicon: HALOT
  rationale: Marks continuation and addition from the previous judgment context; 'And also' preserves the connective force without sounding overly formal.
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  - by
  lexicon: HALOT
  rationale: The idiom 'by the hand of' commonly means agency or instrumentality in prophetic mediation. 'Through' is natural English while preserving the sense that Jehu is the prophetic intermediary.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the formal biblical idiom and its covenantal weight. 'the LORD' follows the project's default for YHWH.
- source_word: אֶל ... וְאֶל
  chosen: against ... and against
  alternatives:
  - to ... and to
  - concerning ... and concerning
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this judgment setting the sense is adversative, especially with the following charges. 'Against' best fits the prophetic denunciation.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his dynasty
  - his household
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew term and can encompass both household and ruling line. Since the context concerns dynastic judgment, the nuance is broader than merely domestic family, but ''house'' keeps that breadth.'
- source_word: עַל כָּל הָרָעָה
  chosen: because of all the evil
  alternatives:
  - concerning all the evil
  - for all the evil
  lexicon: HALOT
  rationale: עַל here introduces grounds for judgment. 'Because of' makes the causal force explicit in idiomatic English.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common evaluative formula. 'In the sight of the LORD' is clear modern English and preserves the metaphor.
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose tied to Baasha's evil. 'Provoking him to anger' captures the causative nuance and makes the pronoun's referent clear from context.
- source_word: בְּמַעֲשֵׂה יָדָיו
  chosen: by the work of his hands
  alternatives:
  - by his deeds
  - through what his hands had made/done
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom while remaining understandable. It likely refers to his actions, possibly including idolatrous or political acts, so a somewhat literal rendering is preferable.
- source_word: לִהְיוֹת כְּבֵית יָרָבְעָם
  chosen: by becoming like the house of Jeroboam
  alternatives:
  - so as to be like the house of Jeroboam
  - in being like the house of Jeroboam
  lexicon: HALOT
  rationale: The infinitive expresses the outcome or manner of his provoking the LORD. 'By becoming like' communicates that Baasha came to resemble Jeroboam's dynasty in wickedness and fate.
- source_word: וְעַל אֲשֶׁר הִכָּה אֹתוֹ
  chosen: and because he struck it down
  alternatives:
  - and because he struck him down
  - and for having killed him
  lexicon: HALOT
  rationale: The suffix likely refers back to 'house' in a collective/dynastic sense, hence 'it.' This preserves the immediate antecedent while allowing the phrase to denote Baasha's destruction of Jeroboam's house. Because the masculine singular suffix could also be taken personally, that alternative is preserved in a footnote.
