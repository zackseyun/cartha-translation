id: 1KI.16.30
reference: 1 Kings 16:30
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ אַחְאָ֧ב בֶּן עָמְרִ֛י הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה מִ/כֹּ֖ל אֲשֶׁ֥ר
    לְ/פָנָֽי/ו־׃
translation:
  text: Ahab son of Omri did what was evil in the sight of the LORD, more than all
    who were before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the eyes of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'more than all who preceded him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - committed
  lexicon: HALOT
  rationale: The verb עשה ('to do/make') with the object 'the evil' is a standard
    Hebrew idiom for committing evil. 'Did' preserves the idiom naturally in English
    without over-paraphrasing.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: 'With the article, the adjective functions substantivally: ''the evil''
    or idiomatically ''what was evil.'' This is more natural English than the overly
    literal ''did the evil'' while preserving the moral evaluation.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This Hebrew idiom expresses evaluation from YHWH's perspective. 'In the
    sight of the LORD' is clear, idiomatic English and preserves the covenantal divine
    name according to doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, YHWH is rendered 'the LORD' in the main
    text.
- source_word: מִכֹּל אֲשֶׁר לְפָנָיו
  chosen: more than all who were before him
  alternatives:
  - more than all who preceded him
  - beyond all who were before him
  lexicon: HALOT
  rationale: The comparative מן with 'all who were before him' indicates that Ahab
    exceeded all prior kings in evil. 'More than all who were before him' is both
    faithful and natural.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - preceding him
  lexicon: HALOT
  rationale: Literally 'to his face/before him,' here used temporally for predecessors.
    'Before him' preserves the Hebrew expression and reads smoothly in context.
