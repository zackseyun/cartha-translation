id: 1KI.16.22
reference: 1 Kings 16:22
source:
  edition: WLC
  text: וַ/יֶּחֱזַ֤ק הָ/עָם֙ אֲשֶׁ֣ר אַחֲרֵ֣י עָמְרִ֔י אֶת הָ/עָ֕ם אֲשֶׁ֥ר אַחֲרֵ֖י
    תִּבְנִ֣י בֶן גִּינַ֑ת וַ/יָּ֣מָת תִּבְנִ֔י וַ/יִּמְלֹ֖ךְ עָמְרִֽי־־׃פ
translation:
  text: But the people who followed Omri prevailed over the people who followed Tibni
    son of Ginath. So Tibni died, and Omri became king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were stronger than' / 'grew stronger than.' The Hebrew verb can denote
      strength or superiority; here it refers to Omri's faction gaining the upper
      hand in the civil conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  chosen: prevailed
  alternatives:
  - were stronger than
  - grew stronger than
  - overpowered
  lexicon: HALOT
  rationale: The verb חזק in this construction with אֶת marks superiority or prevailing
    over another group, not merely internal strengthening. 'Prevailed' is idiomatic
    and fits the political struggle in context.
- source_word: הָעָם אֲשֶׁר אַחֲרֵי עָמְרִי
  chosen: the people who followed Omri
  alternatives:
  - the people who were after Omri
  - the people on Omri's side
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after,' but in this allegiance context it means
    following/supporting. 'Who followed Omri' preserves the political alignment clearly
    in modern English.
- source_word: אֶת הָעָם אֲשֶׁר אַחֲרֵי תִּבְנִי
  chosen: over the people who followed Tibni
  alternatives:
  - against the people who were after Tibni
  - the people on Tibni's side
  lexicon: HALOT
  rationale: The direct-object marker אֶת with חזק yields the sense of prevailing
    over a rival faction. Repeating 'who followed' maintains the parallel structure
    of the Hebrew.
- source_word: תִּבְנִי בֶן גִּינַת
  chosen: Tibni son of Ginath
  rationale: Personal names are transliterated per project philosophy; 'son of' is
    the standard rendering of בן in genealogical identification.
- source_word: וַיָּמָת תִּבְנִי
  chosen: So Tibni died
  alternatives:
  - and Tibni died
  - then Tibni died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    flow while preserving sequence and consequence without overstating causation.
- source_word: וַיִּמְלֹךְ עָמְרִי
  chosen: Omri became king
  alternatives:
  - Omri reigned
  - Omri began to reign
  - Omri was king
  lexicon: HALOT
  rationale: מלך in the waw-consecutive here marks accession following the rival's
    death. 'Became king' communicates enthronement more precisely than the broader
    'reigned.'
