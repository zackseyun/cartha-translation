id: 1KI.16.28
reference: 1 Kings 16:28
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב עָמְרִי֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֖ר בְּ/שֹׁמְר֑וֹן וַ/יִּמְלֹ֛ךְ
    אַחְאָ֥ב בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Omri slept with his fathers and was buried in Samaria, and Ahab his son
    reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a conventional expression for death in
      the royal narratives.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal narrative, שׁכב with 'with his fathers' is the conventional
    idiom for death. Rendering it as 'slept' preserves the Hebrew idiom and its recurring
    formulaic character, while the surrounding context makes the meaning clear.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is a standard dynastic burial/death formula. 'With his fathers'
    is the more literal and traditional rendering and preserves the familial and royal
    continuity expressed in the Hebrew.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was interred
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as a passive, 'was buried.' 'Interred'
    is possible but less natural in readable modern English.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב commonly marks location. 'In Samaria' is the most natural
    English rendering for the place of burial.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In this succession formula, 'reigned' is concise and idiomatic. 'Began
    to reign' would over-specify an inceptive nuance not required by the Hebrew wayyiqtol
    here.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The phrase marks dynastic succession. 'In his place' is idiomatic English
    and accurately conveys replacement/succession without awkwardness.
