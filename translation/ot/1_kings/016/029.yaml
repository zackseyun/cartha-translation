id: 1KI.16.29
reference: 1 Kings 16:29
source:
  edition: WLC
  text: וְ/אַחְאָ֣ב בֶּן עָמְרִ֗י מָלַךְ֙ עַל יִשְׂרָאֵ֔ל בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים
    וּ/שְׁמֹנֶה֙ שָׁנָ֔ה לְ/אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה וַ֠/יִּמְלֹךְ אַחְאָ֨ב בֶּן עָמְרִ֤י
    עַל יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן עֶשְׂרִ֥ים וּ/שְׁתַּ֖יִם שָׁנָֽה־־־־׃
translation:
  text: And Ahab son of Omri became king over Israel in the thirty-eighth year of
    Asa king of Judah, and Ahab son of Omri reigned over Israel in Samaria twenty-two
    years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: In regnal formulas, the qatal of מלך commonly marks accession to kingship
    rather than the whole duration of rule. 'Became king' distinguishes accession
    from the later summary statement of reign length.
- source_word: בִּשְׁנַת שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  chosen: in the thirty-eighth year
  alternatives:
  - in year thirty-eight
  lexicon: HALOT
  rationale: Standard English rendering of Hebrew dating formula with ordinal sense,
    preserving the synchronism with Asa's reign.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: This expresses the regnal reference point for the synchronism. The smoother
    English phrase preserves the Hebrew construct relationship without unnecessary
    stiffness.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - was king
  lexicon: HALOT
  rationale: Here the wayyiqtol introduces the duration statement that follows ('twenty-two
    years'), so English 'reigned' best conveys ongoing rule rather than accession.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Samaria' is natural English and
    fits the sense that Samaria was the royal seat from which he ruled.
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: twenty-two years
  alternatives:
  - for twenty-two years
  lexicon: HALOT
  rationale: This is the standard expression of reign length. English can omit 'for'
    without loss, yielding a more idiomatic regnal notice.
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding regnal sequence. 'And'
    preserves the narrative continuity more formally than 'Now'.
