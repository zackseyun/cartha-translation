id: 1KI.16.33
reference: 1 Kings 16:33
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אַחְאָ֖ב אֶת הָ/אֲשֵׁרָ֑ה וַ/יּ֨וֹסֶף אַחְאָ֜ב לַ/עֲשׂ֗וֹת לְ/הַכְעִיס֙ אֶת יְהֹוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל מִ/כֹּ֨ל מַלְכֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֥ר הָי֖וּ לְ/פָנָֽי/ו־־׃
translation:
  text: Ahab also made the Asherah, and Ahab went on to do more to provoke Yahweh, the God of Israel, than all the kings of Israel who were before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole.' The Hebrew אֲשֵׁרָה may refer to the goddess Asherah or to the cultic object associated with her.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - made for himself
  - set up
  lexicon: HALOT
  rationale: The common sense of עשה is 'make/do.' With אֶת הָאֲשֵׁרָה as object, 'made' is the most direct rendering. 'Set up' is possible contextually for cultic objects, but the Hebrew verb itself is broader and does not require that narrowing.
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - Asherah
  lexicon: HALOT
  rationale: אֲשֵׁרָה can refer either to the goddess Asherah or to the cultic object associated with her. Rendering it as 'the Asherah' preserves the Hebrew term and its ambiguity without over-interpreting. 'Asherah pole' is a common explanatory rendering but is more specific than the text itself here.
- source_word: וַיּוֹסֶף
  chosen: went on
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: יסף + infinitive often conveys continuation or increase. 'Went on' gives natural English while preserving the iterative force. 'Added' is more literal but less idiomatic in this construction.
- source_word: לַעֲשׂוֹת
  chosen: to do more
  alternatives:
  - to act
  - to do
  lexicon: HALOT
  rationale: In combination with יסף and the comparative phrase that follows, the sense is not merely continuation but exceeding prior kings in evil action. 'To do more' captures the comparative escalation implied by the clause.
- source_word: לְהַכְעִיס
  chosen: to provoke
  alternatives:
  - to anger
  - to provoke to anger
  lexicon: HALOT
  rationale: The Hiphil of כעס here means to provoke to anger. 'Provoke' is concise, natural English and retains the causative sense. The object of provocation is explicitly the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain; this appositional phrase identifies the LORD specifically as Israel's God.
- source_word: מִכֹּל מַלְכֵי יִשְׂרָאֵל
  chosen: than all the kings of Israel
  alternatives:
  - more than all the kings of Israel
  lexicon: HALOT
  rationale: 'The comparative מן after the provoking clause marks comparison: Ahab did more to provoke the LORD than all previous Israelite kings. English expresses this most naturally with ''than all the kings of Israel.'''
- source_word: אֲשֶׁר הָיוּ לְפָנָיו
  chosen: who were before him
  alternatives:
  - who preceded him
  - who were prior to him
  lexicon: HALOT
  rationale: The idiom 'were before him' refers to earlier kings. This rendering stays close to the Hebrew while remaining clear in English.
