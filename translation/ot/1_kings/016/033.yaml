theological_decisions:
- issue: Referent of אֲשֵׁרָה
  chosen_reading: Retain the term as 'the Asherah' without deciding between the goddess and the cultic symbol in the main text.
  alternative_readings:
  - the Asherah pole
  - Asherah (the goddess)
  rationale: The Hebrew term can denote either the deity or her cultic representation depending on context. Because the verse itself does not explicitly specify which nuance is intended, the translation preserves the ambiguity rather than resolving it. This follows the project's principle of preserving tension where the source permits more than one plausible reading.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
