id: 1KI.16.13
reference: 1 Kings 16:13
source:
  edition: WLC
  text: אֶ֚ל כָּל חַטֹּ֣אות בַּעְשָׁ֔א וְ/חַטֹּ֖אות אֵלָ֣ה בְנ֑/וֹ אֲשֶׁ֣ר חָטְא֗וּ וַ/אֲשֶׁ֤ר הֶחֱטִ֨יאוּ֙ אֶת יִשְׂרָאֵ֔ל לְ/הַכְעִ֗יס אֶת יְהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל בְּ/הַבְלֵי/הֶֽם־־־׃
translation:
  text: because of all the sins of Baasha and the sins of Elah his son, which they committed and by which they caused Israel to sin, provoking Yahweh, the God of Israel, with their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with their vanities' or 'with their worthless things,' a common polemical expression for idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל
  chosen: because of
  alternatives:
  - for
  - on account of
  - concerning
  lexicon: HALOT
  rationale: In this judgment formula, אֶל introduces the basis or cause of the preceding action/judgment, not direction ('to'). 'Because of' best conveys the causal force in natural English.
- source_word: כָּל חַטֹּאות
  chosen: all the sins
  alternatives:
  - all the offenses
  - all the sinful acts
  lexicon: HALOT
  rationale: חַטֹּאות is the plural of 'sins' and should be rendered straightforwardly. 'All' preserves the comprehensiveness of the indictment.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal name transliterated per project policy.
- source_word: וְחַטֹּאות אֵלָה בְנוֹ
  chosen: and the sins of Elah his son
  alternatives:
  - and the sins of his son Elah
  lexicon: HALOT
  rationale: The construct chain identifies Elah as Baasha's son. 'Elah his son' closely follows Hebrew order while remaining clear.
- source_word: אֲשֶׁר חָטְאוּ
  chosen: which they committed
  alternatives:
  - which they sinned
  - that they committed
  lexicon: HALOT
  rationale: English idiom prefers 'commit sins' rather than 'sin sins.' This preserves the relative clause's reference to the sins just mentioned.
- source_word: וַאֲשֶׁר הֶחֱטִיאוּ אֶת יִשְׂרָאֵל
  chosen: and by which they caused Israel to sin
  alternatives:
  - and by which they made Israel sin
  - and with which they led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' is both accurate and readable; 'by which' links the clause back to their sins/practices.
- source_word: לְהַכְעִיס
  chosen: provoking
  alternatives:
  - to provoke
  - so as to provoke
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose in relation to their sinful actions. 'Provoking' fits the English sentence flow while preserving the sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; identifies the covenant God whom they provoked.
- source_word: בְּהַבְלֵיהֶם
  chosen: with their idols
  alternatives:
  - with their vanities
  - with their worthless things
  lexicon: HALOT
  rationale: הֶבֶל literally denotes 'breath, vapor,' and by extension 'vanity, worthlessness.' In idolatry contexts it commonly refers metonymically to idols as worthless things. 'With their idols' makes the referent explicit in clear English while preserving the polemical force; lexical alternatives are preserved in a footnote.
