id: 1KI.16.4
reference: 1 Kings 16:4
source:
  edition: WLC
  text: הַ/מֵּ֤ת לְ/בַעְשָׁא֙ בָּ/עִ֔יר יֹֽאכְל֖וּ הַ/כְּלָבִ֑ים וְ/הַ/מֵּ֥ת ל/וֹ֙
    בַּ/שָּׂדֶ֔ה יֹאכְל֖וּ ע֥וֹף הַ/שָּׁמָֽיִם׃
translation:
  text: Whoever belonging to Baasha dies in the city, the dogs will eat; and whoever
    belonging to him dies in the field, the birds of the heavens will eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Baasha' / 'Baasha's.' The Hebrew uses a relational construction that
      refers to those belonging to Baasha, likely his household or dynasty.
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת
  chosen: whoever ... dies
  alternatives:
  - the one who dies
  - the dead one
  lexicon: HALOT
  rationale: The singular participle of מות functions generically here, referring
    to any member of Baasha's house who dies. English idiom is clearer with an indefinite
    relative construction ('whoever ... dies') rather than the wooden 'the dead one.'
- source_word: לְבַעְשָׁא
  chosen: belonging to Baasha
  alternatives:
  - of Baasha
  - Baasha's
  lexicon: HALOT
  rationale: 'The lamed marks relation/possession here: those associated with or belonging
    to Baasha, i.e., members of his household/dynasty. ''Belonging to Baasha'' makes
    the relation explicit without over-specifying ''household'' where the Hebrew leaves
    it implicit.'
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Straightforward locative use of עיר with prefixed beth.
- source_word: יֹאכְלוּ הַכְּלָבִים
  chosen: the dogs will eat
  alternatives:
  - dogs will devour
  - the dogs will consume
  lexicon: HALOT
  rationale: אָכַל literally means 'eat.' 'Devour' is possible by sense, but 'eat'
    preserves the lexical form and the grim force is already clear from context.
- source_word: וְהַמֵּת לוֹ
  chosen: and whoever belonging to him dies
  alternatives:
  - and whoever of his dies
  - and the one who dies to him
  lexicon: HALOT
  rationale: The pronoun shifts from Baasha's name to 'him,' still referring to Baasha.
    As in the first clause, the participle is generic. Rendering the relation similarly
    preserves the parallelism.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שׂדה commonly means 'field' or open country. 'Field' keeps the lexical
    correspondence and fits the city/field contrast.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the birds of heaven
  lexicon: HALOT
  rationale: עוֹף is a collective singular meaning flying creatures/birds. 'Birds
    of the heavens' is a fairly literal rendering that preserves the Hebrew genitive
    and echoes common biblical diction.
