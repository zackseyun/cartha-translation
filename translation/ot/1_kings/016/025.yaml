id: 1KI.16.25
reference: 1 Kings 16:25
source:
  edition: WLC
  text: וַ/יַּעֲשֶׂ֥ה עָמְרִ֛י הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יָּ֕רַע מִ/כֹּ֖ל אֲשֶׁ֥ר
    לְ/פָנָֽי/ו׃
translation:
  text: Omri did what was evil in the eyes of the LORD, and he did more evil than
    all who were before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he was more evil than all who were before him.' The Hebrew verb
      can be understood as describing Omri himself or his actions; the main text preserves
      the common evaluative sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה with the object הָרַע in this evaluative formula is idiomatically
    rendered 'did' rather than the more wooden 'made.' This preserves the standard
    Hebrew sense of performing actions characterized as evil.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: With the article, הָרַע functions substantivally in the stock expression
    'do the evil' meaning 'do what is evil.' English requires a smoother idiomatic
    rendering.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation from someone's perspective.
    'In the eyes of' is transparent and preserves the imagery better than the flatter
    'in the sight of.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: וַיָּרַע
  chosen: he did more evil
  alternatives:
  - he was more evil
  - he acted more wickedly
  lexicon: HALOT
  rationale: The Hiphil of רעע here is comparative in force in context with מִכֹּל
    אֲשֶׁר לְפָנָיו. 'Did more evil' best matches the narrative evaluation formula
    and keeps verbal continuity with the first clause.
- source_word: מִכֹּל אֲשֶׁר לְפָנָיו
  chosen: than all who were before him
  alternatives:
  - more than all before him
  - than all his predecessors
  lexicon: HALOT
  rationale: The phrase literally means 'from/all that were before him' and refers
    to prior kings/rulers. 'Than all who were before him' is faithful and clear; 'his
    predecessors' is possible but slightly more interpretive since 'kings' is not
    explicit in the Hebrew of this verse.
