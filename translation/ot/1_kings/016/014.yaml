id: 1KI.16.14
reference: 1 Kings 16:14
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י אֵלָ֖ה וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֽוֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: Now the rest of the acts of Elah, and all that he did—are they not written
    in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder, rest.' The prefixed conjunction often functions
    as a narrative transition; 'Now the rest of' is idiomatic in English for this
    recurring regnal formula while preserving the sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the דברי
    of X, and all that he did,' the sense is the record of his acts/deeds. 'Acts'
    is concise and idiomatic in English historical style.
- source_word: אֵלָה
  chosen: Elah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  - and everything he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause; 'did' best matches
    the broad Hebrew verb עשה in this formulaic context.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not true that they are
  - behold, are they not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. English
    preserves this naturally with 'are they not...?'.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: 'Passive participle with pronoun: ''they are written.'' ''Written'' keeps
    the formal archival sense and matches the stock formula.'
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but idiomatic English for contents recorded
    in a document is 'in the Book.' Capitalized because it refers to a specific titled
    record.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression denotes an official annalistic record. 'Chronicles' is
    the conventional and natural rendering in this formula; 'annals' is possible but
    less familiar.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this title formula, ל marks relation/possession rather than advantage.
    'Of the Kings of Israel' best reflects the sense of the record pertaining to Israel's
    kings.
