id: 1KI.16.19
reference: 1 Kings 16:19
source:
  edition: WLC
  text: עַל חטאת/ו אֲשֶׁ֣ר חָטָ֔א לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לָ/לֶ֨כֶת֙
    בְּ/דֶ֣רֶךְ יָרָבְעָ֔ם וּ/בְ/חַטָּאת/וֹ֙ אֲשֶׁ֣ר עָשָׂ֔ה לְ/הַחֲטִ֖יא אֶת יִשְׂרָאֵֽל־־׃
translation:
  text: because of the sins that he committed, doing what was evil in the eyes of
    the LORD, walking in the way of Jeroboam and in the sin that he caused Israel
    to commit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sin that he did, to cause Israel to sin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: HALOT
  rationale: In this judgment formula, עַל introduces the ground or cause of the preceding
    punishment/death notice. 'Because of' communicates causal force naturally in English.
- source_word: חטאתו אֲשֶׁר חָטָא
  chosen: the sins that he committed
  alternatives:
  - his sin that he sinned
  - the sin he committed
  lexicon: HALOT
  rationale: The Hebrew uses a cognate construction ('his sin which he sinned') that
    is idiomatic for actual acts of sinning. English prefers 'the sins that he committed.'
    The plural 'sins' reflects the collective/abstract force of חטאתו in context,
    especially since the verse then specifies multiple expressions of wrongdoing.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: doing what was evil
  alternatives:
  - to do evil
  - to do what was evil
  lexicon: HALOT
  rationale: This infinitive phrase explains the content of his sin. 'Doing what was
    evil' is idiomatic and preserves the verbal sense without sounding wooden.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard Hebrew evaluative idiom. 'In the eyes of the LORD' preserves
    the metaphor and remains clear in modern English. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine''s contested-terms table: the default rendering
    of the divine name is ''the LORD.'''
- source_word: לָלֶכֶת בְּדֶרֶךְ יָרָבְעָם
  chosen: walking in the way of Jeroboam
  alternatives:
  - to walk in the way of Jeroboam
  - following the way of Jeroboam
  lexicon: HALOT
  rationale: The infinitive construct continues the explanation of his evil. 'Walking
    in the way of Jeroboam' preserves the Hebrew metaphor of conduct/pattern of life.
- source_word: וּבְחַטָּאתוֹ אֲשֶׁר עָשָׂה
  chosen: and in the sin that he caused Israel to commit
  alternatives:
  - and in his sin that he did
  - and in the sin he committed
  lexicon: HALOT
  rationale: This phrase is tightly linked with the following infinitive לְהַחֲטִיא
    אֶת־יִשְׂרָאֵל. Rather than leave 'the sin that he did' awkwardly detached, the
    English brings out the full sense of the clause as the sin by which he led Israel
    into sin.
- source_word: לְהַחֲטִיא אֶת יִשְׂרָאֵל
  chosen: he caused Israel to commit
  alternatives:
  - to make Israel sin
  - causing Israel to sin
  - to lead Israel into sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: ''to cause to sin'' or ''make sin.''
    Because English requires an object after ''commit,'' the phrase is integrated
    with the previous noun: ''the sin that he caused Israel to commit.'' This preserves
    the causative force while reading naturally.'
