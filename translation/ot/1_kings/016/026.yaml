id: 1KI.16.26
reference: 1 Kings 16:26
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ בְּ/כָל דֶּ֨רֶךְ֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט ו/ב/חטאתי/ו אֲשֶׁ֥ר הֶחֱטִ֖יא
    אֶת יִשְׂרָאֵ֑ל לְ/הַכְעִ֗יס אֶת יְהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל בְּ/הַבְלֵי/הֶֽם־־־־׃
translation:
  text: For he walked in all the way of Jeroboam son of Nebat, and in his sins by
    which he caused Israel to sin, provoking the LORD, the God of Israel, with their
    idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with their vanities'' or ''with their worthless things''; the
      term is a common polemical word for idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: he walked
  alternatives:
  - he went
  - he lived
  lexicon: HALOT
  rationale: הלך in this idiom commonly denotes conduct or manner of life, not mere
    movement. 'Walked' preserves the biblical metaphor and fits the following phrase
    'in all the way of.'
- source_word: בְּכָל דֶּרֶךְ
  chosen: in all the way
  alternatives:
  - in every way
  - in all the ways
  lexicon: HALOT
  rationale: The singular 'way' with 'all' is a Hebrew idiom for complete conformity
    to a pattern of conduct. Retaining 'all the way' keeps the idiomatic force while
    remaining readable in English.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וּבְחַטֹּאתָיו
  chosen: and in his sins
  alternatives:
  - and in the sins he committed
  - and in his sinful acts
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix refers to Jeroboam's sins. 'His sins' is
    the most direct and natural rendering.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - with which he made Israel sin
  - whereby he led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' preserves the
    causative force more explicitly than the smoother 'led Israel into sin.'
- source_word: לְהַכְעִיס
  chosen: provoking
  alternatives:
  - to provoke
  - so as to provoke
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose relative to the preceding
    conduct. 'Provoking' gives good English flow while preserving the sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying the covenant God.
- source_word: בְּהַבְלֵיהֶם
  chosen: with their idols
  alternatives:
  - with their vanities
  - with their worthless things
  lexicon: HALOT
  rationale: הֶבֶל literally denotes vapor/vanity and by extension worthless idols
    in polemical contexts. Here the referent is the cultic objects or false gods associated
    with Jeroboam's sin. 'Idols' communicates the contextual meaning clearly; the
    more literal 'vanities' is preserved in a footnote because it reflects the Hebrew
    metaphor of emptiness/worthlessness.
