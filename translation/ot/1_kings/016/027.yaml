id: 1KI.16.27
reference: 1 Kings 16:27
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֤י עָמְרִי֙ אֲשֶׁ֣ר עָשָׂ֔ה וּ/גְבוּרָת֖/וֹ אֲשֶׁ֣ר עָשָׂ֑ה
    הֲ/לֹֽא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Now the rest of the acts of Omri, what he did, and his might that he displayed—are
    they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his mighty deeds.' The Hebrew גְּבוּרָה can refer either to might/strength
      or to acts that display such might.
    reason: lexical_alternative
  - marker: b
    text: '''The Book of the Chronicles of the Kings of Israel'' refers to a royal
      annalistic source, not the biblical book of Chronicles.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר in this regnal-summary formula refers to the remainder of a king's
    recorded deeds. 'Now the rest of' is idiomatic modern English and preserves the
    transitional force of וְ.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Although literally 'words/matters,' in the formula 'rest of the words/matters
    of X' the sense is the record of a ruler's deeds or acts. 'Acts' is standard and
    contextually precise.
- source_word: עָמְרִי
  chosen: Omri
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֲשֶׁר עָשָׂה
  chosen: what he did
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: This relative clause summarizes Omri's actions. 'What he did' is natural
    English while remaining close to the Hebrew sense.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might that he displayed
  alternatives:
  - and his might
  - and his mighty deeds
  - and his strength
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, might, or mighty acts. In royal annal
    formulas it often points to notable displays of power. 'His might that he displayed'
    preserves both the noun and the following relative clause אֲשֶׁר עָשָׂה without
    flattening it into a single abstract term.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - surely they are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Are
    they not' preserves the formulaic rhetorical force.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: Passive participle with pronoun in this formula means 'are written/recorded.'
    'Written' stays closer to the Hebrew, while the full phrase is idiomatic in English.
- source_word: עַל סֵפֶר
  chosen: in the Book of
  alternatives:
  - on the scroll of
  - upon the book of
  lexicon: HALOT
  rationale: Though עַל is literally 'on/upon,' in this archival formula English idiom
    prefers 'in the Book of.' 'Scroll' is possible for סֵפֶר, but 'Book' matches the
    established annalistic formula in readable modern English.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression denotes annalistic records. 'Chronicles' is the conventional
    concise rendering in this source-critical context; capitalization reflects the
    title-like function of the referenced record, not the canonical book of Chronicles.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this title formula, לְ marks relation/pertaining to rather than advantage.
    'Of the Kings of Israel' best conveys the sense of the royal annals concerning
    Israel's kings.
