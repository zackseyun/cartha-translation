id: 1KI.16.6
reference: 1 Kings 16:6
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב בַּעְשָׁא֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֖ר בְּ/תִרְצָ֑ה וַ/יִּמְלֹ֛ךְ
    אֵלָ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־׃
translation:
  text: Baasha slept with his fathers and was buried in Tirzah, and Elah his son reigned
    in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with his ancestors.' The Hebrew idiom 'slept with his fathers' is a
      conventional formula for a king's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In the formulaic royal obituary expression 'slept with his fathers,'
    the verb is literally 'slept.' Retaining 'slept' preserves the Hebrew idiom and
    its conventional use for death without flattening it to the interpretive gloss
    'died'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard burial/death formula in Kings. 'Fathers' is more
    formally aligned with the Hebrew and preserves the stock expression; 'ancestors'
    is possible but less literal and less recognizable as the recurring formula.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here. 'Was buried' is the
    natural English rendering.
- source_word: בְּתִרְצָה
  chosen: in Tirzah
  alternatives:
  - at Tirzah
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' with a city name. 'Tirzah'
    is transliterated as a personal/place name per translation philosophy.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In royal succession notices, 'reigned' is the standard concise rendering.
    'Became king' is possible but does not capture the conventional regnal formula
    as well.
- source_word: אֵלָה בְנוֹ
  chosen: Elah his son
  alternatives:
  - his son Elah
  lexicon: HALOT
  rationale: Both English orders are natural. 'Elah his son' follows the Hebrew sequence
    more closely while remaining readable.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly means replacement/succession.
    'In his place' expresses direct succession clearly and idiomatically; 'after him'
    is possible but slightly less explicit about replacement.
