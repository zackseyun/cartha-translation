id: 1KI.16.16
reference: 1 Kings 16:16
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע הָ/עָם֙ הַ/חֹנִ֣ים לֵ/אמֹ֔ר קָשַׁ֣ר זִמְרִ֔י וְ/גַ֖ם הִכָּ֣ה
    אֶת הַ/מֶּ֑לֶךְ וַ/יַּמְלִ֣כוּ כָֽל יִ֠שְׂרָאֵל אֶת עָמְרִ֨י שַׂר צָבָ֧א עַל יִשְׂרָאֵ֛ל
    בַּ/יּ֥וֹם הַ/ה֖וּא בַּֽ/מַּחֲנֶֽה־־־־־׃
translation:
  text: And the people who were camped there heard it said, “Zimri has conspired and
    has also struck down the king.” So all Israel made Omri, the commander of the
    army over Israel, king that day in the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “the troops who were encamped.” The Hebrew says “the
      people who were camped,” referring to those in the military camp.
    reason: lexical_alternative
  - marker: b
    text: “Struck down” renders a Hebrew verb meaning “struck”; in context it implies
      that Zimri killed the king.
    reason: lexical_alternative
  - marker: c
    text: Or “the commander of Israel’s army.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם הַחֹנִים
  chosen: the people who were camped there
  alternatives:
  - the people camping
  - the troops encamped
  lexicon: HALOT
  rationale: הָעָם is 'the people,' while הַחֹנִים is a participle from חנה, 'to camp/encamp.'
    In context this refers to the army/populace in the military camp. 'Who were camped
    there' is natural English and preserves the participial sense without over-specifying
    'troops' in the main text.
- source_word: לֵאמֹר
  chosen: heard it said
  alternatives:
  - heard, saying
  - heard the report
  lexicon: HALOT
  rationale: The infinitive construct of אמר after שמע introduces reported speech.
    'Heard it said' is idiomatic English that preserves the indirect-report function
    better than a wooden 'heard, saying.'
- source_word: קָשַׁר
  chosen: has conspired
  alternatives:
  - has plotted
  - has committed treason
  lexicon: HALOT
  rationale: קשר in royal narratives commonly denotes conspiracy or treason. 'Has
    conspired' is the most direct and standard rendering, preserving the political
    sense without importing a more interpretive legal term.
- source_word: וְגַם הִכָּה אֶת־הַמֶּלֶךְ
  chosen: and has also struck down the king
  alternatives:
  - and has also killed the king
  - and even attacked the king
  lexicon: HALOT
  rationale: נכה literally means 'strike/smite,' but in this context the result is
    fatal. 'Struck down' preserves the lexical imagery while clearly conveying the
    killing. 'Also' reflects וְגַם.
- source_word: וַיַּמְלִכוּ
  chosen: made ... king
  alternatives:
  - proclaimed ... king
  - crowned ... king
  lexicon: HALOT
  rationale: The hiphil of מלך means to cause someone to reign, i.e., make/proclaim
    king. 'Made ... king' is a straightforward rendering that avoids implying a formal
    coronation ceremony not stated in the text.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: The phrase is a standard collective designation. 'All Israel' preserves
    the idiom and likely refers to the assembled national force rather than every
    individual in the land.
- source_word: שַׂר צָבָא עַל־יִשְׂרָאֵל
  chosen: the commander of the army over Israel
  alternatives:
  - the commander of the army of Israel
  - the army commander over Israel
  lexicon: HALOT
  rationale: שַׂר צָבָא is 'commander/prince of the army.' The following עַל־יִשְׂרָאֵל
    can be rendered 'over Israel,' reflecting his authority in relation to Israel's
    forces. This keeps the Hebrew structure visible, though English readers may hear
    it as equivalent to 'commander of Israel's army.'
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'That day' is concise and idiomatic.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - at the camp
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp, especially a military encampment here. 'In the
    camp' is the most natural locative rendering in English.
