id: 1KI.16.10
reference: 1 Kings 16:10
source:
  edition: WLC
  text: וַ/יָּבֹ֤א זִמְרִי֙ וַ/יַּכֵּ֣/הוּ וַ/יְמִיתֵ֔/הוּ בִּ/שְׁנַת֙ עֶשְׂרִ֣ים
    וָ/שֶׁ֔בַע לְ/אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּמְלֹ֖ךְ תַּחְתָּֽי/ו׃
translation:
  text: Then Zimri came in, struck him down, and killed him, in the twenty-seventh
    year of Asa king of Judah; and he reigned in his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter.' In this assassination context, 'came
    in' naturally conveys entry into the place without over-specifying the location.
    'Then' reflects the narrative waw sequence in readable English.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - struck him
  - attacked him
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' Because it is followed immediately
    by 'and killed him,' 'struck him down' distinguishes the initial violent act while
    preserving the sequence without making the first verb redundant.
- source_word: וַיְמִיתֵהוּ
  chosen: and killed him
  alternatives:
  - put him to death
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die, kill.' 'Killed him' is the most
    direct and natural rendering in modern English.
- source_word: בִּשְׁנַת עֶשְׂרִים וָשֶׁבַע
  chosen: in the twenty-seventh year
  alternatives:
  - during the twenty-seventh year
  lexicon: HALOT
  rationale: This is the standard regnal-year dating formula. 'In the twenty-seventh
    year' is idiomatic and sufficiently formal.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - belonging to Asa king of Judah
  - of King Asa of Judah
  lexicon: HALOT
  rationale: The preposition ל marks the regnal reference point. 'Of Asa king of Judah'
    is a conventional and clear English rendering of the dating formula.
- source_word: וַיִּמְלֹךְ
  chosen: and he reigned
  alternatives:
  - and he became king
  - and he began to reign
  lexicon: HALOT
  rationale: מלך can mean 'reign' or 'become king.' Here the following phrase 'in
    his place' makes accession clear, and 'he reigned' preserves the Hebrew verbal
    choice while remaining natural.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחתיו literally means 'under him/in his place' and in royal succession
    contexts means succeeding someone. 'In his place' is the most transparent rendering.
