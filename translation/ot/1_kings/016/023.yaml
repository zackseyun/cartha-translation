id: 1KI.16.23
reference: 1 Kings 16:23
source:
  edition: WLC
  text: בִּ/שְׁנַת֩ שְׁלֹשִׁ֨ים וְ/אַחַ֜ת שָׁנָ֗ה לְ/אָסָא֙ מֶ֣לֶךְ יְהוּדָ֔ה מָלַ֤ךְ
    עָמְרִי֙ עַל יִשְׂרָאֵ֔ל שְׁתֵּ֥ים עֶשְׂרֵ֖ה שָׁנָ֑ה בְּ/תִרְצָ֖ה מָלַ֥ךְ שֵׁשׁ
    שָׁנִֽים־־׃
translation:
  text: In the thirty-first year of Asa king of Judah, Omri became king over Israel
    for twelve years; he reigned in Tirzah six years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Omri reigned over Israel twelve years; in Tirzah he
      reigned six years.' The verse distinguishes his total reign from the six years
      spent reigning in Tirzah.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת ... שְׁלֹשִׁים וְ/אַחַת שָׁנָה
  chosen: In the thirty-first year
  alternatives:
  - In year thirty-one
  - During the thirty-first year
  lexicon: HALOT
  rationale: The Hebrew dating formula literally says 'in the year, thirty and one
    year,' an idiomatic regnal-year expression best rendered in standard English as
    'In the thirty-first year.'
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - belonging to Asa king of Judah
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: The preposition ל marks reference to Asa's regnal year. English idiom
    expresses this naturally as 'of Asa king of Judah.'
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The first occurrence marks accession to kingship, not merely ongoing
    reign, so 'became king' better captures the ingressive sense in context.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  - for Israel
  lexicon: HALOT
  rationale: With מלך, על commonly indicates rule over a people; 'over Israel' is
    the natural English equivalent.
- source_word: שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: for twelve years
  alternatives:
  - twelve years
  - for a period of twelve years
  lexicon: HALOT
  rationale: This gives the total duration of Omri's reign. 'For twelve years' reads
    naturally in English while preserving the temporal force.
- source_word: בְּ/תִרְצָה
  chosen: in Tirzah
  alternatives:
  - at Tirzah
  lexicon: HALOT
  rationale: The preposition ב here is locative, indicating the place from which he
    reigned.
- source_word: מָלַךְ שֵׁשׁ שָׁנִים
  chosen: he reigned in Tirzah six years
  alternatives:
  - he was king in Tirzah six years
  - he reigned there six years
  lexicon: HALOT
  rationale: The second occurrence of מלך describes the duration of his reign at Tirzah
    specifically, so 'he reigned' is preferable to 'became king.' Retaining 'in Tirzah'
    in the clause preserves the Hebrew emphasis that only six of the twelve years
    were centered there.
