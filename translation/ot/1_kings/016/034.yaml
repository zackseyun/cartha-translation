theological_decisions:
- issue: Nature of the curse-fulfillment formula involving Hiel's sons
  chosen_reading: The verse states that Hiel rebuilt Jericho with the loss of his firstborn and youngest sons, fulfilling the LORD's word spoken through Joshua.
  alternative_readings:
  - The phrases could be read more woodenly as construction stages merely coinciding with the sons' lives rather than their deaths.
  rationale: The wording echoes Joshua 6:26 and is most naturally read as curse fulfillment involving the death of the sons. 'At the cost of' communicates this without adding details beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence with source-text primacy.
