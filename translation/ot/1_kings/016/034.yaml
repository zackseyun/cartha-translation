id: 1KI.16.34
reference: 1 Kings 16:34
source:
  edition: WLC
  text: בְּ/יָמָ֞י/ו בָּנָ֥ה חִיאֵ֛ל בֵּ֥ית הָאֱלִ֖י אֶת יְרִיחֹ֑ה בַּ/אֲבִירָ֨ם בְּכֹר֜/וֹ יִסְּדָ֗/הּ ו/ב/שגיב צְעִיר/וֹ֙ הִצִּ֣יב דְּלָתֶ֔י/הָ כִּ/דְבַ֣ר יְהוָ֔ה אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד יְהוֹשֻׁ֥עַ בִּן נֽוּן־־׃ס
translation:
  text: In his days Hiel of Bethel rebuilt Jericho. At the cost of Abiram his firstborn he laid its foundation, and at the cost of Segub his youngest he set up its gates, according to the word of Yahweh that he had spoken through Joshua son of Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'built Jericho.' 'Rebuilt' reflects the context that Jericho had previously been destroyed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in/with Abiram his firstborn ... and in/with Segub his youngest.' The sense is that the rebuilding came at the cost of these sons, in fulfillment of Joshua 6:26.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his reign
  - In his time
  lexicon: HALOT
  rationale: Idiomatic temporal expression referring to the period of the previously mentioned king's rule; 'In his days' preserves the Hebrew phrasing while remaining natural English.
- source_word: בָּנָה
  chosen: rebuilt
  alternatives:
  - built
  lexicon: HALOT
  rationale: Although the verb is simply 'built,' the object is Jericho, a previously destroyed city; 'rebuilt' brings out the contextual sense without over-paraphrasing.
- source_word: חִיאֵל בֵּית הָאֱלִי
  chosen: Hiel of Bethel
  alternatives:
  - Hiel the Bethelite
  lexicon: HALOT
  rationale: The gentilic phrase denotes origin or association with Bethel. 'Of Bethel' is clear modern English; the traditional 'the Bethelite' is possible but less natural.
- source_word: אֶת יְרִיחֹה
  chosen: Jericho
  lexicon: HALOT
  rationale: Direct object marker omitted in English; proper name transliterated by standard convention.
- source_word: בַּאֲבִירָם בְּכֹרוֹ
  chosen: At the cost of Abiram his firstborn
  alternatives:
  - With Abiram his firstborn
  - In Abiram his firstborn
  lexicon: HALOT
  rationale: The preposition ב here is instrumental/circumstantial in the curse-fulfillment formula. 'At the cost of' best conveys that the rebuilding entailed the loss of his son, matching the allusion to Joshua 6:26.
- source_word: יִסְּדָהּ
  chosen: he laid its foundation
  alternatives:
  - he founded it
  lexicon: HALOT
  rationale: The verb יסד with city-building language refers to laying foundations. 'Its' refers to Jericho, feminine in Hebrew.
- source_word: וּבִשְׂגוּב צְעִירוֹ
  chosen: and at the cost of Segub his youngest
  alternatives:
  - and with Segub his youngest
  - and in Segub his youngest
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'youngest' captures צעיר in familial birth-order context.
- source_word: הִצִּיב דְּלָתֶיהָ
  chosen: he set up its gates
  alternatives:
  - he erected its gates
  - he installed its doors
  lexicon: HALOT
  rationale: Though דלת can mean 'door/door-leaf,' in city context 'gates' is the natural rendering for the gate structures or doors of the city.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: Standard covenantal formula. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: אֲשֶׁר דִּבֶּר בְּיַד
  chosen: that he had spoken through
  alternatives:
  - which he spoke by the hand of
  lexicon: HALOT
  rationale: ביד is a common agency expression. 'Through' is idiomatic English while preserving prophetic mediation.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  lexicon: HALOT
  rationale: Standard English rendering of the patronymic; concise and natural.
