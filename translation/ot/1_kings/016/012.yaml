theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the prophetic formula regarding Baasha
  chosen_reading: that he had spoken against Baasha through Jehu the prophet
  alternative_readings:
  - that he had spoken to Baasha by the hand of Jehu the prophet
  rationale: The Hebrew preposition can be rendered more literally as 'to,' but the context is a judgment oracle. 'Against Baasha' makes the adverse force explicit without adding content foreign to the context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern English'
