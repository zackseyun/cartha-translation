id: 1KI.16.12
reference: 1 Kings 16:12
source:
  edition: WLC
  text: וַ/יַּשְׁמֵ֣ד זִמְרִ֔י אֵ֖ת כָּל בֵּ֣ית בַּעְשָׁ֑א כִּ/דְבַ֤ר יְהוָה֙ אֲשֶׁ֣ר דִּבֶּ֣ר אֶל בַּעְשָׁ֔א בְּ/יַ֖ד יֵה֥וּא הַ/נָּבִֽיא־־׃
translation:
  text: So Zimri destroyed all the house of Baasha, according to the word of Yahweh that he had spoken against Baasha through Jehu the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Baasha.' The Hebrew preposition is literally 'to,' but here it introduces a word of judgment directed against him.
    reason: lexical_alternative
  - marker: b
    text: '''House of Baasha'' refers to Baasha''s royal house or dynasty, not merely his physical household.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּשְׁמֵד
  chosen: destroyed
  alternatives:
  - wiped out
  - exterminated
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes causing destruction or annihilation. 'Destroyed' is clear modern English and fits the historical narrative without over-specifying the manner. 'Wiped out' is possible but more idiomatic; 'exterminated' may sound too clinical.
- source_word: כָּל בֵּית בַּעְשָׁא
  chosen: all the house of Baasha
  alternatives:
  - the whole house of Baasha
  - all Baasha's household
  lexicon: HALOT
  rationale: '''House'' in royal contexts commonly refers to a dynasty or ruling household, not merely a physical building. Retaining ''house'' preserves the dynastic sense and biblical idiom. ''All'' renders כָּל straightforwardly.'
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - in accordance with the word of
  - as the word of
  lexicon: HALOT
  rationale: This prepositional phrase marks conformity/fulfillment. 'According to the word of' is natural English and preserves the sense that events occurred in line with YHWH's prior declaration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had spoken
  alternatives:
  - which he spoke
  - that he spoke
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the LORD had spoken previously, and Zimri''s action now fulfills that word. The relative clause is smoothly rendered with ''that.'''
- source_word: אֶל בַּעְשָׁא
  chosen: against Baasha
  alternatives:
  - to Baasha
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in prophetic judgment contexts English 'against' better conveys that the oracle was directed adversely toward Baasha. This also aligns with the content of Jehu's prophecy in context.
- source_word: בְּיַד יֵהוּא הַנָּבִיא
  chosen: through Jehu the prophet
  alternatives:
  - by the hand of Jehu the prophet
  - by Jehu the prophet
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency or instrumentality. 'Through Jehu the prophet' is idiomatic modern English while preserving the mediating role of the prophet.
