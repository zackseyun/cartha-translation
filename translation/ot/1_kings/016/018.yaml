id: 1KI.16.18
reference: 1 Kings 16:18
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/רְא֤וֹת זִמְרִי֙ כִּֽי נִלְכְּדָ֣ה הָ/עִ֔יר וַ/יָּבֹ֖א אֶל אַרְמ֣וֹן
    בֵּית הַ/מֶּ֑לֶךְ וַ/יִּשְׂרֹ֨ף עָלָ֧י/ו אֶת בֵּֽית מֶ֛לֶךְ בָּ/אֵ֖שׁ וַ/יָּמֹֽת־־־־־׃
translation:
  text: And when Zimri saw that the city had been captured, he went into the citadel
    of the king’s house and burned the king’s house down over himself with fire, and
    died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress' or 'palace' for 'citadel'; the Hebrew אַרְמוֹן can refer to
      a fortified royal structure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'burned the king’s house over himself with fire,' describing Zimri’s
      self-destruction by setting the royal residence ablaze around himself.
    reason: cultural_note
lexical_decisions:
- source_word: כִּ/רְא֤וֹת
  chosen: when ... saw
  alternatives:
  - as ... saw
  - upon seeing
  lexicon: HALOT
  rationale: The infinitive construct with כ is temporal here, introducing the circumstance
    for the following actions. 'When ... saw' is natural modern English and preserves
    the sequence.
- source_word: נִלְכְּדָ֣ה
  chosen: had been captured
  alternatives:
  - was taken
  - had been taken
  lexicon: HALOT
  rationale: Nifal of לכד denotes being captured/taken. 'Had been captured' fits the
    pluperfect sense in English narrative after 'when Zimri saw'.
- source_word: הָ/עִ֔יר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר.
- source_word: אַרְמ֣וֹן
  chosen: citadel
  alternatives:
  - fortress
  - palace
  lexicon: HALOT
  rationale: אַרְמוֹן can denote a fortified palace or citadel. Because 'house of
    the king' follows, rendering this as 'citadel' avoids redundancy with 'palace'
    and preserves the sense of an inner fortified structure.
- source_word: בֵּית הַ/מֶּ֑לֶךְ
  chosen: the king’s house
  alternatives:
  - the royal house
  - the palace
  lexicon: HALOT
  rationale: Literally 'house of the king.' Kept relatively formal here; 'palace'
    is possible, but 'king’s house' preserves the Hebrew wording, especially since
    the verse uses both אַרְמוֹן and בֵּית.
- source_word: וַ/יִּשְׂרֹ֨ף
  chosen: burned ... down
  alternatives:
  - set ... on fire
  - burned
  lexicon: HALOT
  rationale: The verb means 'burn.' 'Burned ... down' communicates the destructive
    result implied by the context of suicide by fire.
- source_word: עָלָ֧י/ו
  chosen: over himself
  alternatives:
  - upon himself
  - around himself
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix is idiomatically used here
    for bringing the structure down in flames upon himself. 'Over himself' is the
    most literal idiomatic English choice and preserves the self-destructive action.
- source_word: אֶת בֵּֽית מֶ֛לֶךְ
  chosen: the king’s house
  alternatives:
  - the royal house
  - the palace
  lexicon: HALOT
  rationale: Repeated phrase retained consistently. The repetition is stylistically
    significant in Hebrew and should not be flattened away.
- source_word: בָּ/אֵ֖שׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: Instrumental beth is well rendered 'with fire.'
- source_word: וַ/יָּמֹֽת
  chosen: and died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: Simple narrative continuation with the expected result of the preceding
    action.
