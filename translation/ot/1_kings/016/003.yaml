id: 1KI.16.3
reference: 1 Kings 16:3
source:
  edition: WLC
  text: הִנְ/נִ֥י מַבְעִ֛יר אַחֲרֵ֥י בַעְשָׁ֖א וְ/אַחֲרֵ֣י בֵית֑/וֹ וְ/נָֽתַתִּי֙
    אֶת בֵּ֣יתְ/ךָ֔ כְּ/בֵ֖ית יָרָבְעָ֥ם בֶּן נְבָֽט־־׃
translation:
  text: Behold, I am sweeping away Baasha and his house, and I will make your house
    like the house of Jeroboam son of Nebat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I am burning/consuming after Baasha.' The Hebrew idiom
      means that the LORD will wipe out Baasha and his line.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the prophetic
    force and gravity better than the more colloquial 'look' or 'see'.
- source_word: מַבְעִיר
  chosen: am sweeping away
  alternatives:
  - am burning up
  - am consuming
  - am removing
  lexicon: HALOT
  rationale: The verb בער in the Hiphil can carry the sense of burning/consuming away,
    often idiomatically for eliminating or purging. In this judgment context with
    אַחֲרֵי + person, a wooden 'burning after' would be unclear in English. 'Am sweeping
    away' captures the idiomatic sense of total removal while remaining vivid. The
    more literal 'burning up' is possible but less natural here and may over-specify
    the mode rather than the result.
- source_word: אַחֲרֵי
  chosen: away
  alternatives:
  - after
  - from after
  lexicon: HALOT
  rationale: In the idiom מבעיר אחרי פלוני, the preposition contributes to the sense
    of removing what comes after someone, i.e., wiping out his line. English does
    not naturally preserve 'after' here, so the force is represented idiomatically
    in 'sweeping away Baasha and his house'.
- source_word: בַעְשָׁא
  chosen: Baasha
  rationale: Standard English transliteration of the personal name.
- source_word: בֵיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his dynasty
  lexicon: HALOT
  rationale: בַּיִת in royal judgment contexts can denote household or dynasty. 'House'
    preserves the Hebrew image and allows the dynastic sense to remain implicit, especially
    since the comparison to Jeroboam's house clarifies the royal/familial dimension.
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' in this construction it means to appoint
    or make something become like something else. 'I will make' is the clearest idiomatic
    English rendering.
- source_word: בֵּיתְךָ
  chosen: your house
  alternatives:
  - your household
  - your dynasty
  lexicon: HALOT
  rationale: Addressed to Baasha through the prophet, this refers to his royal line/household.
    'Your house' preserves the Hebrew wording and the dynastic resonance.
- source_word: כְּבֵית
  chosen: like the house of
  alternatives:
  - as the house of
  lexicon: HALOT
  rationale: Standard comparative use of כְּ. 'Like the house of' is natural English
    and preserves the comparison.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  rationale: Standard rendering of the proper name and patronymic, with concise modern
    English style.
