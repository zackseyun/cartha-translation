theological_decisions:
- issue: Nature of the judgment against Baasha's line
  chosen_reading: Render the idiom as total dynastic removal without specifying a
    literal mechanism of fire in the main text.
  alternative_readings:
  - Render more formally as 'I am burning up after Baasha' or 'I am consuming after
    Baasha'
  rationale: The Hebrew idiom communicates comprehensive divine judgment on Baasha
    and his house. A literalistic rendering would be obscure in English and could
    mislead readers into focusing on the mechanism rather than the announced extermination
    of his line. The chosen wording preserves the severity of judgment while remaining
    intelligible.
  doctrine_reference: Translation philosophy §1, §3, §6
