id: 1KI.16.5
reference: 1 Kings 16:5
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֥י בַעְשָׁ֛א וַ/אֲשֶׁ֥ר עָשָׂ֖ה וּ/גְבֽוּרָת֑/וֹ הֲ/לֹא הֵ֣ם
    כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Now the rest of the acts of Baasha, and what he did, and his might—are they
    not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book of the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining matters concerning Baasha. 'Now' is a
    natural discourse marker in English for this recurring regnal formula, while 'the
    rest of' preserves the substantive sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of' a king, דִּבְרֵי idiomatically
    refers to the record of his deeds or acts, not merely spoken words. 'Acts' is
    concise and idiomatic in English historical narrative.
- source_word: בַעְשָׁא
  chosen: Baasha
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: וַאֲשֶׁר עָשָׂה
  chosen: and what he did
  alternatives:
  - and all that he did
  - and what he accomplished
  lexicon: HALOT
  rationale: This relative clause is straightforwardly rendered. 'What he did' is
    faithful and avoids adding 'all' where the Hebrew does not explicitly include
    it.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his power
  - and his mighty deeds
  - and his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, might, or mighty acts. Here, in a royal
    annalistic summary, 'his might' preserves the abstract noun while allowing the
    sense of demonstrated power. 'Mighty deeds' is possible but more interpretive.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the standard rhetorical question formula in Kings. 'Are they
    not written' closely follows the Hebrew and preserves the formulaic style.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this idiom with כָּתוּב it refers
    to inscription or record in a written document. 'In the Book' is standard, natural
    English for the archival reference.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: This expression denotes an official chronicle/annalistic source. 'Book
    of the Chronicles' is the established and accurate rendering; 'annals' is also
    possible but less transparent for many readers.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: 'The ל preposition in this title is best understood as marking relation/possession
    in English idiom: the chronicle pertaining to the kings of Israel. ''Of the Kings
    of Israel'' is the conventional and clearest rendering.'
