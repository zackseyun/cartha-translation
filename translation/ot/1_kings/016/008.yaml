id: 1KI.16.8
reference: 1 Kings 16:8
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת עֶשְׂרִ֤ים וָ/שֵׁשׁ֙ שָׁנָ֔ה לְ/אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה מָ֠לַךְ
    אֵלָ֨ה בֶן בַּעְשָׁ֧א עַל יִשְׂרָאֵ֛ל בְּ/תִרְצָ֖ה שְׁנָתָֽיִם־־׃
translation:
  text: In the twenty-sixth year of Asa king of Judah, Elah son of Baasha became king
    over Israel in Tirzah for two years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּשְׁנַת עֶשְׂרִים וָשֵׁשׁ שָׁנָה
  chosen: In the twenty-sixth year
  alternatives:
  - In year twenty-six
  - During the twenty-sixth year
  lexicon: HALOT
  rationale: The Hebrew dating formula literally says 'in the year, twenty and six,
    year,' an idiomatic regnal-year expression. 'In the twenty-sixth year' is standard,
    clear English that preserves the chronological force without wooden repetition.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - belonging to Asa king of Judah
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: The preposition ל marks reference to Asa's regnal year. 'Of Asa king
    of Judah' is the natural English equivalent in this dating construction.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: The verb means 'to reign/be king.' In an accession notice, 'became king'
    best captures the ingressive sense in context. 'Reigned' could suggest the whole
    duration rather than the point of accession; 'began to reign' is possible but
    slightly less natural in modern English.
- source_word: אֵלָה
  chosen: Elah
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶן בַּעְשָׁא
  chosen: son of Baasha
  alternatives:
  - the son of Baasha
  lexicon: HALOT
  rationale: Standard filial construction. The anarthrous English 'son of Baasha'
    is concise and natural in a regnal formula.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over the kingdom of Israel
  - in Israel
  lexicon: HALOT
  rationale: עַל with מלך commonly indicates rule over a people or realm. 'Over Israel'
    is the most direct rendering and avoids adding 'kingdom,' which is not explicit.
- source_word: בְּתִרְצָה
  chosen: in Tirzah
  alternatives:
  - at Tirzah
  lexicon: HALOT
  rationale: The preposition ב here marks location. 'In Tirzah' is the most natural
    English rendering for the place of his reign/accession notice.
- source_word: שְׁנָתָיִם
  chosen: for two years
  alternatives:
  - two years
  lexicon: HALOT
  rationale: The dual form means 'two years.' In English regnal summaries, 'for two
    years' makes the duration explicit and idiomatic.
