id: 1KI.16.32
reference: 1 Kings 16:32
source:
  edition: WLC
  text: וַ/יָּ֥קֶם מִזְבֵּ֖חַ לַ/בָּ֑עַל בֵּ֣ית הַ/בַּ֔עַל אֲשֶׁ֥ר בָּנָ֖ה בְּ/שֹׁמְרֽוֹן׃
translation:
  text: He set up an altar for Baal in the house of Baal, which he had built in Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of Baal.' Hebrew literally says 'the house of Baal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: He set up
  alternatives:
  - He erected
  - He raised up
  lexicon: HALOT
  rationale: From קום in the Hiphil/wayyiqtol, here meaning to cause to stand or establish.
    'Set up' is natural modern English for establishing an altar, while remaining
    close to the Hebrew action.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the sacrificial altar. No contextual reason
    to vary.
- source_word: לַבָּעַל
  chosen: for Baal
  alternatives:
  - to Baal
  lexicon: HALOT
  rationale: The lamed marks dedication or direction. 'For Baal' reads idiomatically
    in English for an altar dedicated to Baal; 'to Baal' is possible but slightly
    less natural here.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: Literally 'house of Baal.' Although this refers to a temple/shrine, 'house
    of Baal' preserves the Hebrew wording more transparently. The meaning is still
    clear in context.
- source_word: אֲשֶׁר בָּנָה
  chosen: which he had built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: The relative clause refers back to 'the house of Baal.' English past
    perfect clarifies that the building of the house preceded the setting up of the
    altar.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  lexicon: HALOT
  rationale: Standard rendering of the place name שֹׁמְרוֹן. The preposition ב marks
    location.
