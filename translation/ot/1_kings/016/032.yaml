theological_decisions:
- issue: Rendering of בֵּית הַבַּעַל
  chosen_reading: the house of Baal
  alternative_readings:
  - the temple of Baal
  rationale: This is not a doctrinally contested term, but the choice affects transparency
    to the Hebrew. 'House of Baal' preserves the source wording and lets readers see
    the lexical connection to common 'house/temple' language in Hebrew, while still
    conveying a cultic structure.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
