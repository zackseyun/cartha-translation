id: 1KI.16.21
reference: 1 Kings 16:21
source:
  edition: WLC
  text: אָ֧ז יֵחָלֵ֛ק הָ/עָ֥ם יִשְׂרָאֵ֖ל לַ/חֵ֑צִי חֲצִ֨י הָ/עָ֜ם הָ֠יָה אַחֲרֵ֨י
    תִבְנִ֤י בֶן גִּינַת֙ לְ/הַמְלִיכ֔/וֹ וְ/הַ/חֲצִ֖י אַחֲרֵ֥י עָמְרִֽי־׃
translation:
  text: 'Then the people of Israel were divided into two parts: half of the people
    followed Tibni son of Ginath, to make him king, and half followed Omri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'half the people were for Tibni son of Ginath, to make him king, and
      half were for Omri.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵחָלֵק
  chosen: were divided
  alternatives:
  - was divided
  - split
  lexicon: HALOT
  rationale: 'Nifal imperfect of חלק conveys being divided/split. Although formally
    singular with the collective subject הָעָם, idiomatic English with ''the people''
    is best rendered as plural: ''were divided.'''
- source_word: הָעָם יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - the people, Israel
  - the people Israel
  lexicon: HALOT
  rationale: Construct-like apposition is most natural in English as 'the people of
    Israel,' identifying the national populace rather than an abstract entity.
- source_word: לַחֵצִי
  chosen: into two parts
  alternatives:
  - in half
  - to halves
  lexicon: HALOT
  rationale: The preposition with חֵצִי indicates division into halves. 'Into two
    parts' is clearer modern English while preserving the sense of bifurcation.
- source_word: חֲצִי הָעָם
  chosen: half of the people
  alternatives:
  - one half of the people
  - half the people
  lexicon: HALOT
  rationale: This phrase is repeated for emphasis and balance. 'Half of the people'
    preserves the distributive sense cleanly in English.
- source_word: הָיָה אַחֲרֵי
  chosen: followed
  alternatives:
  - was after
  - was on the side of
  lexicon: HALOT
  rationale: The idiom 'to be after' someone in this political context means to support
    or follow that claimant. 'Followed' is concise and natural without losing the
    allegiance sense.
- source_word: תִבְנִי בֶן גִּינַת
  chosen: Tibni son of Ginath
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: לְהַמְלִיכוֹ
  chosen: to make him king
  alternatives:
  - to proclaim him king
  - to crown him king
  lexicon: HALOT
  rationale: Hifil infinitive of מלך with pronominal suffix means causing him to reign,
    i.e., making him king. 'Crown' would add ceremony not explicit in the Hebrew.
- source_word: וְהַחֲצִי אַחֲרֵי עָמְרִי
  chosen: and half followed Omri
  alternatives:
  - and the other half followed Omri
  - and half was after Omri
  lexicon: HALOT
  rationale: The Hebrew simply says 'and the half after Omri.' English requires a
    finite verb supplied from the parallel clause. 'And half followed Omri' preserves
    the symmetry and sense.
