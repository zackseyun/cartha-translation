id: 1KI.16.17
reference: 1 Kings 16:17
source:
  edition: WLC
  text: וַ/יַּעֲלֶ֥ה עָמְרִ֛י וְ/כָל יִשְׂרָאֵ֥ל עִמּ֖/וֹ מִֽ/גִּבְּת֑וֹן וַ/יָּצֻ֖רוּ
    עַל תִּרְצָֽה־־׃
translation:
  text: Then Omri and all Israel with him went up from Gibbethon, and they laid siege
    to Tirzah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'they besieged Tirzah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלֶה
  chosen: went up
  alternatives:
  - marched up
  - came up
  lexicon: HALOT
  rationale: From עלה, the basic narrative sense is 'go up/ascend.' 'Went up' preserves
    the common Hebrew idiom of movement, which may reflect either topography or military
    advance, without over-specifying 'marched'.
- source_word: עָמְרִי
  chosen: Omri
  rationale: Standard English transliteration of the personal name.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all the Israelites with him
  lexicon: HALOT
  rationale: Keeps the collective national term 'Israel' as in the Hebrew, which in
    this context refers to the forces/people aligned with Omri. 'All the Israelites'
    is possible but slightly more interpretive than the source wording.
- source_word: מִגִּבְּתוֹן
  chosen: from Gibbethon
  rationale: Proper place name, transliterated in standard form; the preposition מן
    is straightforwardly 'from.'
- source_word: וַיָּצֻרוּ
  chosen: they laid siege
  alternatives:
  - they besieged
  - they encamped against
  lexicon: HALOT
  rationale: From צור in the military sense of besieging. 'Laid siege' is idiomatic
    modern English and makes explicit the military action implied by the verb. 'Encamped
    against' is too weak here.
- source_word: עַל
  chosen: to
  alternatives:
  - against
  - over
  lexicon: HALOT
  rationale: With the siege verb, על marks the target of the action. English idiom
    prefers 'laid siege to' rather than the more literal 'against.'
- source_word: תִּרְצָה
  chosen: Tirzah
  rationale: Proper place name, transliterated in standard English form.
