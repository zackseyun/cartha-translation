id: 1KI.16.11
reference: 1 Kings 16:11
source:
  edition: WLC
  text: וַ/יְהִ֨י בְ/מָלְכ֜/וֹ כְּ/שִׁבְתּ֣/וֹ עַל כִּסְא֗/וֹ הִכָּה֙ אֶת כָּל בֵּ֣ית
    בַּעְשָׁ֔א לֹֽא הִשְׁאִ֥יר ל֖/וֹ מַשְׁתִּ֣ין בְּ/קִ֑יר וְ/גֹאֲלָ֖י/ו וְ/רֵעֵֽ/הוּ־־־־׃
translation:
  text: And it happened that when he became king, as soon as he sat on his throne,
    he struck down all the house of Baasha. He did not leave him a single male, or
    any of his kinsmen or his friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one who urinates against a wall,' a coarse idiom meaning
      'male.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his avengers' or 'his redeemers'; the Hebrew term refers to a kinsman
      with family obligations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew narrative marker in readable modern English
    without archaic phrasing.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he reigned
  lexicon: HALOT
  rationale: The infinitive/verb form with prefixed ב marks the time of accession
    or reign. In context, the sense is the beginning of his kingship rather than a
    general period during his reign.
- source_word: כְשִׁבְתּוֹ עַל־כִּסְאוֹ
  chosen: as soon as he sat on his throne
  alternatives:
  - when he sat on his throne
  - upon his sitting on his throne
  lexicon: HALOT
  rationale: The construction marks immediate temporal sequence. 'As soon as' brings
    out the promptness implied by the context while remaining faithful to the Hebrew.
- source_word: הִכָּה
  chosen: he struck down
  alternatives:
  - he killed
  - he smote
  lexicon: HALOT
  rationale: נכה commonly means to strike, strike down, or kill depending on context.
    Here it refers to lethal violence against Baasha's house; 'struck down' is accurate
    and idiomatic without over-paraphrasing.
- source_word: אֶת כָּל בֵּית בַּעְשָׁא
  chosen: all the house of Baasha
  alternatives:
  - all Baasha's house
  - the entire household of Baasha
  lexicon: HALOT
  rationale: '''House'' here denotes dynasty/household rather than a physical building.
    Retaining ''house'' preserves the dynastic sense common in Kings.'
- source_word: לֹא הִשְׁאִיר לוֹ
  chosen: He did not leave him
  alternatives:
  - he left for him no
  - he did not spare for him
  lexicon: HALOT
  rationale: The idiom means he left none surviving to Baasha. The dative pronoun
    is retained as 'him' to reflect the Hebrew, though the sense is extinction of
    Baasha's line.
- source_word: מַשְׁתִּין בְּקִיר
  chosen: a single male
  alternatives:
  - anyone who urinates against a wall
  - any male
  lexicon: HALOT
  rationale: This is a crude Hebrew idiom for males. For main text readability and
    optimal equivalence, 'a single male' conveys the referent clearly; the more literal
    idiom is preserved in a footnote because it is a significant lexical feature.
- source_word: וְגֹאֲלָיו
  chosen: his kinsmen
  alternatives:
  - his avengers
  - his redeemers
  - his blood-relatives
  lexicon: HALOT
  rationale: From גאל, the term can denote a kinsman with family obligations, including
    avenging or redeeming. In this context of wiping out Baasha's support network/line,
    'kinsmen' best captures the familial sense without importing a specific legal
    role.
- source_word: וְרֵעֵהוּ
  chosen: his friends
  alternatives:
  - his companions
  - his associates
  - his allies
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or associate. 'Friends' is the most
    straightforward rendering, though the term may include political associates as
    well.
