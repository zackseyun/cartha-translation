theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per DOCTRINE.md, the default
    rendering is 'the LORD,' not a direct transliteration, unless context requires
    otherwise. No such exception is present here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of עַל in the prophetic formula
  chosen_reading: against Baasha
  alternative_readings:
  - concerning Baasha
  - about Baasha
  rationale: Because this introduces a prophetic denunciation, translating עַל as
    'against' preserves the judicial force without importing extra content. This is
    a contextual-theological choice because it frames the oracle as judgment rather
    than neutral information.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
