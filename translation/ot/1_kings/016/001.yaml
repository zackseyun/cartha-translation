id: 1KI.16.1
reference: 1 Kings 16:1
source:
  edition: WLC
  text: וַ/יְהִ֤י דְבַר יְהוָה֙ אֶל יֵה֣וּא בֶן חֲנָ֔נִי עַל בַּעְשָׁ֖א לֵ/אמֹֽר־־־־׃
translation:
  text: Then the word of the LORD came to Jehu son of Hanani against Baasha, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "concerning Baasha." The Hebrew preposition can be broader, but here
      it introduces an oracle of judgment, so "against" is preferred.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    English, 'Then' naturally signals sequence without the archaic feel of 'it came
    to pass.' The verb is completed idiomatically with 'came' from the following clause
    structure.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Word' preserves the formal and theological
    resonance of divine revelation better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: In this revelation formula, אֶל marks the recipient of the divine word;
    'to' is the natural English equivalent.
- source_word: יֵהוּא בֶן חֲנָנִי
  chosen: Jehu son of Hanani
  alternatives:
  - Jehu, the son of Hanani
  lexicon: HALOT
  rationale: Names are transliterated per project policy. 'Son of Hanani' is the straightforward
    Hebrew filial expression; the appositional comma is unnecessary in the main text.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - about
  lexicon: HALOT
  rationale: In prophetic judgment contexts, עַל with a person commonly introduces
    an oracle directed against that person rather than merely 'about' them. 'Against'
    best anticipates the condemnatory content of the following speech.
- source_word: בַּעְשָׁא
  chosen: Baasha
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the next
    verse. 'Saying' is the conventional and clear English rendering.
