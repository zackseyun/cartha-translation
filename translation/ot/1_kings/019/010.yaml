id: 1KI.19.10
reference: 1 Kings 19:10
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ קַנֹּ֨א קִנֵּ֜אתִי לַ/יהוָ֣ה אֱלֹהֵ֣י צְבָא֗וֹת כִּֽי עָזְב֤וּ
    בְרִֽיתְ/ךָ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶת מִזְבְּחֹתֶ֣י/ךָ הָרָ֔סוּ וְ/אֶת נְבִיאֶ֖י/ךָ
    הָרְג֣וּ בֶ/חָ֑רֶב וָֽ/אִוָּתֵ֤ר אֲנִי֙ לְ/בַדִּ֔/י וַ/יְבַקְשׁ֥וּ אֶת נַפְשִׁ֖/י
    לְ/קַחְתָּֽ/הּ׀־־־־׃
translation:
  text: And he said, “I have been very zealous for the LORD, the God of hosts, because
    the sons of Israel have forsaken your covenant, torn down your altars, and killed
    your prophets with the sword. I alone am left, and they seek my life, to take
    it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in
      keeping with the project''s default practice.'
    reason: alternative_reading
  - marker: b
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'I have been exceedingly jealous for the LORD.' The Hebrew uses an intensive
      construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַנֹּא קִנֵּאתִי
  chosen: I have been very zealous
  alternatives:
  - I have been exceedingly jealous
  - I have been utterly zealous
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    In English, 'very zealous' conveys the emphatic force naturally. 'Jealous' is
    lexically possible, but in this context Elijah speaks of covenantal zeal for God
    rather than envy, so 'zealous' is clearer and more idiomatic.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project default 'the LORD'
    per doctrine guidelines, preserving the conventional covenantal rendering rather
    than transliteration in the main text.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - the God of armies
  - God Almighty
  lexicon: HALOT
  rationale: צְבָאוֹת literally denotes hosts/armies. 'God of hosts' is the established
    and semantically transparent rendering; 'God Almighty' would import a different
    title, and 'God of armies' is possible but less idiomatic in English Bible style.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Elijah's zeal. 'Because' is clearer in modern
    English than the more formal 'for'.
- source_word: עָזְבוּ בְרִיתְךָ
  chosen: have forsaken your covenant
  alternatives:
  - have abandoned your covenant
  lexicon: HALOT
  rationale: עָזַב commonly means 'forsake, abandon.' 'Forsaken' preserves covenantal
    gravity and matches the solemn register of the complaint.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate
    policy, the masculine form is preserved where it refers to the covenant people
    corporately. 'Israelites' is possible, but 'sons of Israel' more closely reflects
    the source wording here.
- source_word: מִזְבְּחֹתֶיךָ הָרָסוּ
  chosen: torn down your altars
  alternatives:
  - destroyed your altars
  - broken down your altars
  lexicon: HALOT
  rationale: הָרַס means to tear down/demolish. 'Torn down' is vivid and natural English
    for altars or structures.
- source_word: נְבִיאֶיךָ הָרְגוּ בֶחָרֶב
  chosen: killed your prophets with the sword
  alternatives:
  - slain your prophets with the sword
  lexicon: HALOT
  rationale: This is a straightforward rendering. 'With the sword' preserves the instrumental
    phrase and the violent concreteness of the Hebrew.
- source_word: וָאִוָּתֵר אֲנִי לְבַדִּי
  chosen: I alone am left
  alternatives:
  - I, I alone, remain
  - I alone have been left
  lexicon: HALOT
  rationale: The clause emphasizes Elijah's solitary survival. 'I alone am left' is
    idiomatic and preserves the emphasis of אֲנִי לְבַדִּי without awkwardness.
- source_word: וַיְבַקְשׁוּ אֶת נַפְשִׁי
  chosen: they seek my life
  alternatives:
  - they are seeking my life
  - they seek me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life rather than soul in a technical sense. 'Seek
    my life' is the standard idiom for an attempt to kill someone and best matches
    the Hebrew sense.
- source_word: לְקַחְתָּהּ
  chosen: to take it
  alternatives:
  - to take my life
  - to take it away
  lexicon: HALOT
  rationale: The feminine suffix refers back to נַפְשִׁי ('my life'). 'To take it'
    is concise and preserves the anaphoric structure; the antecedent is clear from
    the preceding phrase.
