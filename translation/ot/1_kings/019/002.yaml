id: 1KI.19.2
reference: 1 Kings 19:2
source:
  edition: WLC
  text: וַ/תִּשְׁלַ֤ח אִיזֶ֨בֶל֙ מַלְאָ֔ךְ אֶל אֵלִיָּ֖הוּ לֵ/אמֹ֑ר כֹּֽה יַעֲשׂ֤וּ/ן
    אֱלֹהִים֙ וְ/כֹ֣ה יוֹסִפ֔וּ/ן כִּֽי כָ/עֵ֤ת מָחָר֙ אָשִׂ֣ים אֶֽת נַפְשְׁ/ךָ֔ כְּ/נֶ֖פֶשׁ
    אַחַ֥ד מֵ/הֶֽם־־־־׃
translation:
  text: Then Jezebel sent a messenger to Elijah, saying, “So may the gods do to me,
    and more also, if by this time tomorrow I do not make your life like the life
    of one of them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'So may God do to me, and more also.' The Hebrew אֱלֹהִים can be read
      as singular 'God' or plural 'gods'; here the plural sense fits Jezebel's setting
      and the plural verbs in the oath formula.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    sequence while preserving the consecutive force better than a bare 'and' in modern
    English.
- source_word: מַלְאָךְ
  chosen: messenger
  alternatives:
  - angel
  lexicon: HALOT
  rationale: In this human court setting the word clearly refers to a human envoy,
    not a supernatural being, so 'messenger' is the contextually correct rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: כֹּה יַעֲשׂוּן אֱלֹהִים וְכֹה יוֹסִפוּן
  chosen: So may the gods do to me, and more also
  alternatives:
  - Thus may God do to me, and thus may he add
  - May the gods do so, and even more
  lexicon: HALOT
  rationale: This is a stock oath formula invoking divine punishment. Because Jezebel
    is a Phoenician royal and the noun is morphologically plural, 'the gods' best
    reflects the immediate speaker context. 'To me' is implicit in the idiom and required
    in English. 'And more also' captures the intensifying second clause idiomatically.
- source_word: אֱלֹהִים
  chosen: the gods
  alternatives:
  - God
  lexicon: HALOT
  rationale: Although אֱלֹהִים can denote the singular God of Israel, here Jezebel
    speaks in an oath formula and the plural verb forms יַעֲשׂוּן / יוֹסִפוּן support
    a plural sense in context.
- source_word: כִּי
  chosen: if
  alternatives:
  - surely that
  - for
  lexicon: HALOT
  rationale: 'In this oath construction כִּי introduces the condition/content of the
    curse: ''if by this time tomorrow...''. English oath idiom is best represented
    with ''if'' after the imprecation.'
- source_word: כָעֵת מָחָר
  chosen: by this time tomorrow
  alternatives:
  - about this time tomorrow
  - at this time tomorrow
  lexicon: HALOT
  rationale: The phrase denotes the corresponding time on the next day. 'By this time
    tomorrow' is natural English and fits the threat's deadline.
- source_word: אָשִׂים אֶת־נַפְשְׁךָ
  chosen: I do not make your life
  alternatives:
  - I do not set your life
  - I do not make you
  lexicon: HALOT
  rationale: שׂים with נֶפֶשׁ here means to make someone's life become like another's,
    i.e., to treat Elijah so that he dies as they did. 'Make your life' preserves
    the Hebrew object 'your life' more closely than simply 'kill you' while remaining
    intelligible.
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - your self
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ refers to life/person rather than the immaterial
    soul. 'Your life' is the clearest contextual rendering.
- source_word: כְּנֶפֶשׁ אַחַד מֵהֶם
  chosen: like the life of one of them
  alternatives:
  - like one of them
  - like the life of each one of them
  lexicon: HALOT
  rationale: The comparison is specifically with the life/fate of one of the prophets
    of Baal whom Elijah had slain. Retaining 'life' mirrors the Hebrew repetition
    of נֶפֶשׁ and preserves the threat's wording.
