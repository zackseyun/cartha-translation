theological_decisions:
- issue: Referent of אֱלֹהִים in Jezebel's oath
  chosen_reading: plural, 'the gods'
  alternative_readings:
  - singular, 'God'
  rationale: The immediate speaker is Jezebel, associated with Baal worship, and the
    accompanying verbs are plural. Rendering the term as plural avoids importing Israelite
    monotheistic language into her oath and best fits the narrative setting.
