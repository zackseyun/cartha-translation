id: 1KI.19.17
reference: 1 Kings 19:17
source:
  edition: WLC
  text: וְ/הָיָ֗ה הַ/נִּמְלָ֛ט מֵ/חֶ֥רֶב חֲזָאֵ֖ל יָמִ֣ית יֵה֑וּא וְ/הַ/נִּמְלָ֛ט
    מֵ/חֶ֥רֶב יֵה֖וּא יָמִ֥ית אֱלִישָֽׁע׃
translation:
  text: And it shall be that whoever escapes from the sword of Hazael, Jehu shall
    put to death; and whoever escapes from the sword of Jehu, Elisha shall put to
    death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Elisha shall kill.' The Hebrew verb is causative ('put to death').
      In context, Elisha's role may be understood directly or through the judgment
      effected by his prophetic ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Then it shall happen
  lexicon: HALOT
  rationale: The formulaic narrative/future expression introduces what will follow.
    'And it shall be' preserves the Hebrew idiom with readable English and signals
    a declared future outcome.
- source_word: הַנִּמְלָט
  chosen: whoever escapes
  alternatives:
  - the one who escapes
  - he who escapes
  lexicon: HALOT
  rationale: The participle with article functions substantivally and generically.
    'Whoever escapes' conveys the indefinite/generic force naturally in modern English
    better than the more wooden 'the one who escapes.'
- source_word: מֵחֶרֶב
  chosen: from the sword of
  alternatives:
  - from
  - from the violence of
  lexicon: HALOT
  rationale: '''Sword'' is retained literally because חֶרֶב commonly stands for lethal
    armed judgment/warfare. The construct with the following proper name is idiomatically
    rendered ''the sword of Hazael/Jehu.'''
- source_word: חֲזָאֵל
  chosen: Hazael
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: יָמִית
  chosen: shall put to death
  alternatives:
  - shall kill
  - will cause to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put to death' preserves the causative
    nuance and the judicial/agentive force better than the simpler 'kill,' while remaining
    natural English.
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal name transliterated by standard English convention.
- source_word: וְהַנִּמְלָט
  chosen: and whoever escapes
  alternatives:
  - and the one who escapes
  - and he who escapes
  lexicon: HALOT
  rationale: Same substantival participle as earlier in the verse; rendered consistently
    with natural generic English.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention.
