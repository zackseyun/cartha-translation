theological_decisions:
- issue: Agency of Elisha in 'shall put to death'
  chosen_reading: Retain the direct wording that Elisha shall put to death those escaping
    Jehu.
  alternative_readings:
  - Interpret figuratively as Elisha's prophetic word bringing judgment
  - Interpret metonymically as judgment associated with Elisha's ministry rather than
    personal killing
  rationale: The Hebrew syntax straightforwardly parallels Hazael, Jehu, and Elisha
    as agents of lethal judgment. To soften Elisha's role in the main text would import
    interpretation beyond the wording. Because readers may understand Elisha's agency
    through prophetic/judicial mediation in the broader narrative, that interpretive
    alternative is preserved in a footnote rather than adopted in the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
