theological_decisions:
- issue: Rendering the implied object after 'heard'
  chosen_reading: heard it
  alternative_readings:
  - heard the sound
  - heard the voice
  rationale: The Hebrew does not state the object explicitly in this verse, but the
    previous context supplies what Elijah heard. Using the minimal implied pronoun
    'it' avoids over-specifying whether the referent is the 'sound' of v.12 or the
    divine 'voice,' preserving the narrative tension.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
