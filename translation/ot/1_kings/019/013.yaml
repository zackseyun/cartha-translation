id: 1KI.19.13
reference: 1 Kings 19:13
source:
  edition: WLC
  text: וַ/יְהִ֣י כִּ/שְׁמֹ֣עַ אֵלִיָּ֗הוּ וַ/יָּ֤לֶט פָּנָי/ו֙ בְּ/אַדַּרְתּ֔/וֹ
    וַ/יֵּצֵ֕א וַֽ/יַּעֲמֹ֖ד פֶּ֣תַח הַ/מְּעָרָ֑ה וְ/הִנֵּ֤ה אֵלָי/ו֙ ק֔וֹל וַ/יֹּ֕אמֶר
    מַה לְּ/ךָ֥ פֹ֖ה אֵלִיָּֽהוּ׀־׃
translation:
  text: And when Elijah heard it, he wrapped his face in his cloak, and went out and
    stood at the entrance of the cave. And behold, a voice came to him and said, “What
    are you doing here, Elijah?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What is it to you here, Elijah?' The Hebrew idiom asks Elijah's business
      or purpose in this place.
    reason: lexical_alternative
  - marker: b
    text: The object of 'heard' is implicit in Hebrew; contextually it refers to what
      immediately preceded, often understood as the sound/voice from the prior verse.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard it
  alternatives:
  - when ... heard
  - as soon as ... heard
  lexicon: HALOT
  rationale: The infinitive construct with כ marks a temporal clause, naturally rendered
    'when.' The object 'it' is implied from the immediate context (the sound/voice
    just described) and is idiomatic in English.
- source_word: וַיָּלֶט
  chosen: he wrapped
  alternatives:
  - he covered himself
  - he veiled
  lexicon: HALOT
  rationale: The verb means to wrap or cover closely. 'Wrapped' fits the action with
    the following object 'his face' and instrument 'in his cloak' better than the
    more abstract 'veiled.'
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: Literal bodily sense is clearly intended in this narrative action.
- source_word: בְּאַדַּרְתּוֹ
  chosen: in his cloak
  alternatives:
  - in his mantle
  - with his robe
  lexicon: HALOT
  rationale: אַדֶּרֶת can denote a distinctive outer garment or mantle. 'Cloak' is
    readable modern English and suits the physical action. 'Mantle' is traditional
    but less natural for contemporary readers.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: Simple narrative movement away from the cave interior is best rendered
    'went out'; 'came out' would orient the motion toward the reader.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: The verb here denotes taking a position. 'Stood' is the natural English
    narrative equivalent.
- source_word: פֶּתַח הַמְּעָרָה
  chosen: the entrance of the cave
  alternatives:
  - the opening of the cave
  - the mouth of the cave
  lexicon: HALOT
  rationale: פֶּתַח is an opening/entrance. 'Entrance' is clear and idiomatic; 'mouth'
    is more literal but less natural in modern English here.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Then behold
  - Suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation. 'And behold' preserves the discourse
    effect without over-paraphrase. 'Suddenly' would add a nuance not explicit in
    the particle itself.
- source_word: אֵלָיו קוֹל
  chosen: a voice came to him
  alternatives:
  - a voice was to him
  - there was a voice to him
  lexicon: HALOT
  rationale: The verbless clause literally reads 'behold, to him a voice.' In English,
    'a voice came to him' best conveys the idiomatic sense that he heard a voice addressing
    him.
- source_word: מַה לְּךָ פֹה
  chosen: What are you doing here
  alternatives:
  - What is to you here
  - Why are you here
  lexicon: HALOT
  rationale: The idiom asks Elijah's business or purpose in that place. 'What are
    you doing here' captures the force more naturally than a wooden rendering. 'Why
    are you here' is possible but slightly narrows the idiom to motive alone.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
