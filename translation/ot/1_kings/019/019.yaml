id: 1KI.19.19
reference: 1 Kings 19:19
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ מִ֠/שָּׁם וַ/יִּמְצָ֞א אֶת אֱלִישָׁ֤ע בֶּן שָׁפָט֙ וְ/ה֣וּא חֹרֵ֔שׁ
    שְׁנֵים עָשָׂ֤ר צְמָדִים֙ לְ/פָנָ֔י/ו וְ/ה֖וּא בִּ/שְׁנֵ֣ים הֶ/עָשָׂ֑ר וַ/יַּעֲבֹ֤ר
    אֵלִיָּ֨הוּ֙ אֵלָ֔י/ו וַ/יַּשְׁלֵ֥ךְ אַדַּרְתּ֖/וֹ אֵלָֽי/ו־־־׃
translation:
  text: So he went from there and found Elisha son of Shaphat, while he was plowing
    with twelve yoke-pairs before him, and he was with the twelfth. Elijah passed
    by him and threw his cloak over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twelve yokes of oxen'; the Hebrew refers to twelve paired teams for
      plowing.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''and threw his mantle over him.'' The garment signifies Elijah''s
      prophetic office in the surrounding context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ מִשָּׁם
  chosen: So he went from there
  alternatives:
  - Then he went from there
  - He departed from there
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    continuity without overformal stiffness; 'from there' preserves מִשָּׁם.
- source_word: וַיִּמְצָא אֶת אֱלִישָׁע בֶּן שָׁפָט
  chosen: and found Elisha son of Shaphat
  alternatives:
  - and came upon Elisha son of Shaphat
  lexicon: HALOT
  rationale: מָצָא is straightforwardly 'find.' Personal names are transliterated
    per philosophy.
- source_word: וְהוּא חֹרֵשׁ
  chosen: while he was plowing
  alternatives:
  - and he was plowing
  - as he was plowing
  lexicon: HALOT
  rationale: The participle gives ongoing action in scene-setting. 'While he was plowing'
    reads naturally in English and preserves the durative sense.
- source_word: שְׁנֵים עָשָׂר צְמָדִים
  chosen: twelve yoke-pairs
  alternatives:
  - twelve yokes of oxen
  - twelve pairs
  lexicon: HALOT
  rationale: צֶמֶד can denote a pair, especially a pair of animals under a yoke. 'Yoke-pairs'
    preserves the agricultural image without adding 'oxen' explicitly, though that
    is likely implied by context.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - in front of him
  lexicon: HALOT
  rationale: A formal but clear rendering that preserves the spatial relation of the
    teams ahead of Elisha.
- source_word: וְהוּא בִּשְׁנֵים הֶעָשָׂר
  chosen: and he was with the twelfth
  alternatives:
  - and he was at the twelfth
  - and he was among the twelfth pair
  lexicon: HALOT
  rationale: The phrase indicates Elisha's position with the twelfth team/pair. 'With
    the twelfth' is concise and preserves the Hebrew's elliptical style.
- source_word: וַיַּעֲבֹר אֵלִיָּהוּ אֵלָיו
  chosen: Elijah passed by him
  alternatives:
  - Elijah passed over to him
  - Elijah went past him
  lexicon: HALOT
  rationale: עָבַר with אֶל here describes Elijah's approach/passing by in a symbolic
    action. 'Passed by him' is idiomatic and fits the narrative gesture that follows.
- source_word: וַיַּשְׁלֵךְ אַדַּרְתּוֹ אֵלָיו
  chosen: and threw his cloak over him
  alternatives:
  - and cast his mantle upon him
  - and threw his robe over him
  lexicon: HALOT
  rationale: אַדֶּרֶת here is Elijah's distinctive outer garment. 'Cloak' is readable
    modern English; 'mantle' is traditional and meaningful but less accessible, so
    it is preserved in a footnote as a lexical alternative.
