theological_decisions:
- issue: Symbolic significance of Elijah's garment
  chosen_reading: Render the action plainly as 'threw his cloak over him' without
    importing an interpretive explanation into the main text.
  alternative_readings:
  - Use 'mantle' to foreground prophetic succession symbolism
  - Paraphrase as 'appointed him as successor'
  rationale: The Hebrew narrates a symbolic act but does not explicitly explain it
    in this verse. Optimal equivalence preserves the act itself and leaves the theological
    implication to context rather than paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
