id: 1KI.19.14
reference: 1 Kings 19:14
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ קַנֹּ֨א קִנֵּ֜אתִי לַ/יהוָ֣ה אֱלֹהֵ֣י צְבָא֗וֹת כִּֽי עָזְב֤וּ בְרִֽיתְ/ךָ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶת מִזְבְּחֹתֶ֣י/ךָ הָרָ֔סוּ וְ/אֶת נְבִיאֶ֖י/ךָ הָרְג֣וּ בֶ/חָ֑רֶב וָ/אִוָּתֵ֤ר אֲנִי֙ לְ/בַדִּ֔/י וַ/יְבַקְשׁ֥וּ אֶת נַפְשִׁ֖/י לְ/קַחְתָּֽ/הּ׀־־־־׃ס
translation:
  text: And he said, “I have been very zealous for Yahweh, the God of hosts, because the sons of Israel have forsaken your covenant, torn down your altars, and killed your prophets with the sword. I alone am left, and they seek my life, to take it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have been exceedingly jealous for the LORD.” The Hebrew uses an infinitive absolute with the finite verb to intensify the statement.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the sons of Israel”; many translations render this more idiomatically as “the Israelites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קַנֹּא קִנֵּאתִי
  chosen: I have been very zealous
  alternatives:
  - I have been exceedingly jealous
  - I have been very jealous
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. In English, 'very zealous' communicates the emphatic force naturally. 'Jealous' is more formally literal, but in this context Elijah speaks of ardent covenant loyalty rather than envy, so 'zealous' better matches idiomatic sense while preserving intensity.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the object or direction of Elijah's zeal. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - the God of armies
  - the God of heavenly armies
  lexicon: HALOT
  rationale: This is a fixed divine title. 'Hosts' preserves the breadth of צבאות, which can include heavenly and earthly armies, without over-specifying.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces Elijah's explanation for his zeal. 'Because' is clearer in modern English than the more formal 'for'.
- source_word: עָזְבוּ בְרִיתְךָ
  chosen: have forsaken your covenant
  alternatives:
  - have abandoned your covenant
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon.' 'Forsaken' fits covenantal language well and preserves the gravity of Israel's breach.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following gender-accurate principles, this is retained where natural English allows it. It also preserves the corporate, covenantal designation of the nation.
- source_word: מִזְבְּחֹתֶיךָ הָרָסוּ
  chosen: torn down your altars
  alternatives:
  - broken down your altars
  - destroyed your altars
  lexicon: HALOT
  rationale: הרס means to tear down or demolish. 'Torn down' is vivid and idiomatic in modern English.
- source_word: נְבִיאֶיךָ הָרְגוּ בֶחָרֶב
  chosen: killed your prophets with the sword
  alternatives:
  - put your prophets to death by the sword
  - slain your prophets with the sword
  lexicon: HALOT
  rationale: This phrase is straightforward. 'With the sword' preserves the instrumental phrase and the violent concreteness of the Hebrew.
- source_word: וָאִוָּתֵר אֲנִי לְבַדִּי
  chosen: I alone am left
  alternatives:
  - I, I alone, remain
  - I am left by myself alone
  lexicon: HALOT
  rationale: The clause emphasizes Elijah's isolation. 'I alone am left' is concise, natural, and preserves the emphatic sense of אני לבדי.
- source_word: וַיְבַקְשׁוּ אֶת נַפְשִׁי
  chosen: they seek my life
  alternatives:
  - they seek my soul
  - they are seeking my life
  lexicon: HALOT
  rationale: נפש in this idiom refers to life rather than the immaterial soul. 'Seek my life' is the standard English equivalent for an attempt to kill someone.
- source_word: לְקַחְתָּהּ
  chosen: to take it
  alternatives:
  - to take my life
  - to take it away
  lexicon: HALOT
  rationale: The feminine suffix refers back to נפשי. 'To take it' is a close rendering that avoids unnecessary repetition while preserving the infinitive of purpose.
