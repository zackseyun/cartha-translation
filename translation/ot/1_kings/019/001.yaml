theological_decisions:
- issue: Identification of 'the prophets'
  chosen_reading: Render simply as 'all the prophets' without specifying 'of Baal'
    in the main text.
  alternative_readings:
  - all the prophets of Baal
  rationale: Although the immediate context identifies them as Baal's prophets (1
    Kgs 18), this verse itself does not repeat that qualifier. To avoid importing
    contextual interpretation into the wording, the main text preserves the Hebrew
    expression as given.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
