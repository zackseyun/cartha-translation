id: 1KI.19.1
reference: 1 Kings 19:1
source:
  edition: WLC
  text: וַ/יַּגֵּ֤ד אַחְאָב֙ לְ/אִיזֶ֔בֶל אֵ֛ת כָּל אֲשֶׁ֥ר עָשָׂ֖ה אֵלִיָּ֑הוּ וְ/אֵ֨ת
    כָּל אֲשֶׁ֥ר הָרַ֛ג אֶת כָּל הַ/נְּבִיאִ֖ים בֶּ/חָֽרֶב־־־־׃
translation:
  text: Ahab told Jezebel all that Elijah had done, and how he had killed all the
    prophets with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the prophets of Baal in the immediately preceding context (see
      1 Kings 18:40).
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The Hiphil of נגד here means to make known or report. 'Told' is natural
    modern English and fits the narrative flow without sounding overly formal.
- source_word: לְאִיזֶבֶל
  chosen: to Jezebel
  rationale: The preposition ל marks the indirect object; standard English idiom is
    'told Jezebel' or 'told to Jezebel.' The name is transliterated per policy.
- source_word: כָּל אֲשֶׁר עָשָׂה
  chosen: all that ... had done
  alternatives:
  - everything that ... had done
  lexicon: HALOT
  rationale: כָּל אֲשֶׁר is a comprehensive relative expression, naturally rendered
    'all that.' The pluperfect sense in English ('had done') fits the prior action
    being reported.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name transliterated by standard English convention.
- source_word: וְאֵת כָּל אֲשֶׁר
  chosen: and how
  alternatives:
  - and all that
  - especially how
  lexicon: HALOT
  rationale: The second coordinated object restates the report with focus on the specific
    matter of the killings. English idiom is smoother with 'and how he had killed...'
    rather than repeating 'and all that.' This is an optimal-equivalence compression
    that preserves the full sense.
- source_word: הָרַג
  chosen: had killed
  alternatives:
  - had struck down
  - had slain
  lexicon: HALOT
  rationale: The verb plainly denotes killing. 'Had killed' is the clearest modern
    rendering; 'slain' is more literary, and 'struck down' is less direct.
- source_word: כָּל הַנְּבִיאִים
  chosen: all the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the quantified noun phrase. In context these
    are the prophets of Baal from the preceding narrative, but the verse itself simply
    says 'all the prophets,' so the translation does not import the fuller identification
    into the main text.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is well rendered 'with.' 'With the sword' is idiomatic
    and preserves the concrete means of execution.
