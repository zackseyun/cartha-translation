id: 1KI.19.20
reference: 1 Kings 19:20
source:
  edition: WLC
  text: וַ/יַּעֲזֹ֣ב אֶת הַ/בָּקָ֗ר וַ/יָּ֨רָץ֙ אַחֲרֵ֣י אֵֽלִיָּ֔הוּ וַ/יֹּ֗אמֶר
    אֶשְּׁקָה נָּא֙ לְ/אָבִ֣/י וּ/לְ/אִמִּ֔/י וְ/אֵלְכָ֖ה אַחֲרֶ֑י/ךָ וַ/יֹּ֤אמֶר
    ל/וֹ֙ לֵ֣ךְ שׁ֔וּב כִּ֥י מֶה עָשִׂ֖יתִי לָֽ/ךְ־־־׃
translation:
  text: So he left the oxen and ran after Elijah and said, “Please let me kiss my
    father and my mother, and then I will go after you.” And he said to him, “Go,
    return, for what have I done to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more generally, “Please let me bid farewell to my father and my mother.”
      The Hebrew verb is literally “kiss.”
    reason: lexical_alternative
  - marker: b
    text: Elijah’s reply is difficult and may mean, “Go back, for what have I done
      for you?” or function as an elliptical way of leaving the decision with Elisha.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: he left
  alternatives:
  - he forsook
  - he abandoned
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake.' In this narrative setting, 'left'
    is the most natural English rendering and does not overstate the action as permanent
    abandonment.
- source_word: הַבָּקָר
  chosen: the oxen
  alternatives:
  - the cattle
  - the herd
  lexicon: HALOT
  rationale: בקר can denote cattle broadly, but here the immediate context is plowing
    with twelve yoke, so 'oxen' best captures the draft animals in view.
- source_word: וַיָּרָץ אַחֲרֵי
  chosen: ran after
  alternatives:
  - ran behind
  - hurried after
  lexicon: HALOT
  rationale: The idiom straightforwardly expresses pursuit. 'Ran after' is both literal
    and idiomatic in English.
- source_word: אֶשְּׁקָה נָּא
  chosen: Please let me kiss
  alternatives:
  - Let me kiss, please
  - Please let me bid farewell to
  lexicon: HALOT
  rationale: נשק literally means 'kiss.' Although the sense is a farewell gesture,
    the concrete action should be preserved in the main text rather than generalized
    to 'bid farewell.' נָא is reflected by 'Please.'
- source_word: לְאָבִי וּלְאִמִּי
  chosen: my father and my mother
  alternatives:
  - my parents
  lexicon: HALOT
  rationale: The Hebrew names each parent individually; the English preserves that
    explicitness rather than compressing to 'parents.'
- source_word: וְאֵלְכָה אַחֲרֶיךָ
  chosen: and then I will go after you
  alternatives:
  - and I will follow you
  - then I will come after you
  lexicon: HALOT
  rationale: הלך אחרי can mean literal movement after someone and, in context, the
    beginning of discipleship/service. 'Go after you' preserves the Hebrew wording
    while remaining intelligible; 'then' is supplied for smooth English sequence.
- source_word: לֵךְ שׁוּב
  chosen: Go, return
  alternatives:
  - Go back
  - Go and return
  lexicon: HALOT
  rationale: The two imperatives are terse and somewhat elliptical. Rendering both
    verbs preserves the Hebrew's abruptness better than collapsing them into a single
    command.
- source_word: כִּי מֶה עָשִׂיתִי לָךְ
  chosen: for what have I done to you?
  alternatives:
  - for what have I done for you?
  - for what have I done to you, after all?
  lexicon: HALOT
  rationale: The phrase is idiomatic and somewhat difficult. The most direct rendering
    is retained in the main text. It likely means Elijah is not coercing Elisha and
    leaves the decision with him, but that interpretation should not be imported into
    the text itself.
