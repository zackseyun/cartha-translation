theological_decisions:
- issue: Interpretation of Elijah's reply כִּי מֶה עָשִׂיתִי לָךְ
  chosen_reading: Retain the literal question 'for what have I done to you?' without
    resolving its nuance in the main text.
  alternative_readings:
  - '''Go back, for what have I done for you?'''
  - '''Go back, for what have I done to you, that should stop you?'''
  - '''Go back, because consider what I have done to you.'''
  rationale: The clause is genuinely ambiguous and has been interpreted either as
    permission, rebuke, or reminder. Following the translation philosophy, the draft
    preserves the tension rather than selecting an interpretive paraphrase. The main
    text stays close to the Hebrew, and alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
