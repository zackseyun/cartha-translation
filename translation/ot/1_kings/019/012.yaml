theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה. This also aligns with the verse's emphasis on divine presence without
    foregrounding pronunciation debates.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the phrase קוֹל דְּמָמָה דַקָּה
  chosen_reading: a sound of a thin stillness
  alternative_readings:
  - a still small voice
  - a gentle whisper
  - a low whisper
  rationale: The Hebrew phrase is famously difficult and should not be overresolved.
    'Sound of a thin stillness' preserves the lexical tension and avoids importing
    explicit speech ('voice') or excessive interpretation ('whisper') into the main
    text. Well-known alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
