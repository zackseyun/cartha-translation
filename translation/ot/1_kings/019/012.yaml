id: 1KI.19.12
reference: 1 Kings 19:12
source:
  edition: WLC
  text: וְ/אַחַ֤ר הָ/רַ֨עַשׁ֙ אֵ֔שׁ לֹ֥א בָ/אֵ֖שׁ יְהוָ֑ה וְ/אַחַ֣ר הָ/אֵ֔שׁ ק֖וֹל דְּמָמָ֥ה דַקָּֽה׃
translation:
  text: And after the earthquake, a fire; Yahweh was not in the fire. And after the fire, a sound of a gentle whisper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a still small voice,' 'a gentle whisper,' or 'a low whisper.' The Hebrew literally reads 'a sound/voice of thin stillness,' an intentionally delicate and difficult expression.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַחַר
  chosen: And after
  alternatives:
  - After
  lexicon: HALOT
  rationale: Sequential discourse marker introducing the next event in the series. Rendering with 'And after' preserves the Hebrew narrative flow and coordination.
- source_word: הָ/רַעַשׁ
  chosen: the earthquake
  alternatives:
  - the shaking
  - the quake
  lexicon: HALOT
  rationale: רַעַשׁ commonly denotes an earthquake or violent shaking. In this theophanic sequence, 'earthquake' is the clearest natural English equivalent.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: 'Anarthrous אֵשׁ after ''after the earthquake'' introduces the next phenomenon: ''a fire.'' The indefinite article fits English idiom.'
- source_word: לֹא בָ/אֵשׁ יְהוָה
  chosen: the LORD was not in the fire
  alternatives:
  - the LORD was not with the fire
  - the LORD was not in the midst of the fire
  lexicon: HALOT
  rationale: The preposition ב here is best rendered locatively as 'in.' This preserves the repeated pattern of the verse without overinterpreting the mode of divine presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קוֹל
  chosen: a sound
  alternatives:
  - a voice
  - a noise
  - a whisper
  lexicon: HALOT
  rationale: קוֹל has a broad semantic range including 'sound' and 'voice.' Here the following genitive phrase is unusual and does not require a personal 'voice'; 'sound' preserves the ambiguity and avoids importing speech where the Hebrew does not explicitly state it.
- source_word: דְּמָמָה
  chosen: stillness
  alternatives:
  - silence
  - calm
  - quiet
  lexicon: HALOT
  rationale: דְּמָמָה denotes stillness, silence, or calm. 'Stillness' best captures the paradoxical phrase with קוֹל ('sound of stillness') without flattening it into a conventional idiom too quickly.
- source_word: דַקָּה
  chosen: thin
  alternatives:
  - small
  - gentle
  - fine
  lexicon: HALOT
  rationale: דַקָּה literally means thin, fine, or slight. 'Thin' preserves the concrete lexical force and the strangeness of the Hebrew expression better than the traditional but more interpretive 'gentle'.
