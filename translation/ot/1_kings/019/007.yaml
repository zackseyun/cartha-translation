id: 1KI.19.7
reference: 1 Kings 19:7
source:
  edition: WLC
  text: וַ/יָּשָׁב֩ מַלְאַ֨ךְ יְהוָ֤ה שֵׁנִית֙ וַ/יִּגַּע בּ֔/וֹ וַ/יֹּ֖אמֶר ק֣וּם אֱכֹ֑ל כִּ֛י רַ֥ב מִמְּ/ךָ֖ הַ/דָּֽרֶךְ׀־׃
translation:
  text: Then the angel of Yahweh returned a second time and touched him and said, “Get up and eat, because the journey is too much for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in this narrative context most naturally means 'returned' or 'came back.' 'Returned' is idiomatic and concise in English narrative style.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel'; in this narrative setting with a divine emissary, 'angel' is the standard and most natural rendering. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: The adverb explicitly marks repetition; 'a second time' preserves the specificity better than the more general 'again'.
- source_word: וַיִּגַּע בּוֹ
  chosen: touched him
  alternatives:
  - touched him again
  lexicon: HALOT
  rationale: The verb נגע with the preposition and pronoun means 'touched him.' The repetition is already conveyed by 'returned a second time,' so adding 'again' here would be redundant.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise
  lexicon: HALOT
  rationale: The imperative calls Elijah to stand or rise. 'Get up' is natural modern English and preserves the force without archaic tone.
- source_word: אֱכֹל
  chosen: eat
  lexicon: HALOT
  rationale: Direct imperative with no contextual reason to expand or soften.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in contemporary English than the more formal 'for.'
- source_word: רַב מִמְּךָ הַדָּרֶךְ
  chosen: the journey is too much for you
  alternatives:
  - the journey is too great for you
  - the way is too much for you
  - the journey is too long for you
  lexicon: HALOT
  rationale: The Hebrew literally says the הדרך is 'great/much' from or beyond Elijah. In context, the sense is that the journey exceeds his strength or capacity. 'The journey is too much for you' preserves that idiom better than reducing it merely to distance ('too long'). 'Journey' is preferable to the more literal 'way' in natural English.
