theological_decisions:
- issue: Whether מַלְאָךְ should be rendered 'angel' or 'messenger'
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: The immediate and broader context presents a supernatural visitation
    and provision in the wilderness, favoring 'angel' over a merely human 'messenger.'
    This is a lexical-contextual decision rather than a doctrinal imposition.
