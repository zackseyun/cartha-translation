id: 1KI.19.5
reference: 1 Kings 19:5
source:
  edition: WLC
  text: וַ/יִּשְׁכַּב֙ וַ/יִּישַׁ֔ן תַּ֖חַת רֹ֣תֶם אֶחָ֑ד וְ/הִנֵּֽה זֶ֤ה מַלְאָךְ֙
    נֹגֵ֣עַ בּ֔/וֹ וַ/יֹּ֥אמֶר ל֖/וֹ ק֥וּם אֱכֽוֹל־׃
translation:
  text: Then he lay down and slept under a broom tree. And behold, an angel touched
    him and said to him, “Get up, eat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger.' The Hebrew מַלְאָךְ can refer to either a human messenger
      or an angelic being; here the context favors 'angel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: Then he lay down
  alternatives:
  - And he lay down
  - So he lay down
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁכב, denoting lying down/reclining. 'Then' smoothly
    carries the narrative sequence in modern English without over-paraphrasing.
- source_word: וַיִּישַׁן
  chosen: and slept
  alternatives:
  - and fell asleep
  lexicon: HALOT
  rationale: Qal wayyiqtol of ישׁן, straightforwardly 'sleep.' 'Fell asleep' is possible
    but slightly more interpretive than the simple Hebrew verb.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Common preposition meaning 'under/beneath'; 'under' is the most natural
    modern rendering here.
- source_word: רֹתֶם אֶחָד
  chosen: a broom tree
  alternatives:
  - a broom bush
  - one broom tree
  lexicon: HALOT
  rationale: רֹתֶם refers to the desert broom/shrub (often identified as broom bush).
    English Bible tradition often uses 'broom tree,' which is recognizable; the Hebrew
    אֶחָד here functions idiomatically as an indefinite 'a certain/one,' best rendered
    simply as the article 'a' in English.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Suddenly
  - Look
  lexicon: HALOT
  rationale: Discourse marker introducing a vivid or surprising development. 'And
    behold' preserves the Hebrew's narrative force better than a fully flattened rendering.
- source_word: זֶה
  chosen: an
  alternatives:
  - behold, this was
  - there was
  lexicon: HALOT
  rationale: 'The demonstrative with הִנֵּה can function presentationally: ''behold,
    an angel...'' Rendering it idiomatically in English avoids awkward literalism
    while preserving the sudden introduction of the figure.'
- source_word: מַלְאָךְ
  chosen: angel
  alternatives:
  - messenger
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel.' In this context, given
    the supernatural provision that follows in the narrative, 'angel' is the most
    likely sense. The lexical alternative is preserved in a footnote for auditability.
- source_word: נֹגֵעַ בּוֹ
  chosen: touched him
  alternatives:
  - was touching him
  - was striking him
  lexicon: HALOT
  rationale: 'Participle of נגע with pronominal object, denoting contact. In narrative
    English, the participle is naturally rendered as a finite past action: ''touched
    him.'' ''Was touching him'' is possible but less idiomatic here.'
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard narrative formula; retaining 'to him' reflects the explicit
    pronoun in Hebrew.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is clear, natural modern English; 'Arise'
    is more formal/archaic.
- source_word: אֱכֹל
  chosen: eat
  alternatives:
  - have something to eat
  lexicon: HALOT
  rationale: Simple imperative of אכל. The bare command 'eat' best matches the concise
    Hebrew.
