theological_decisions:
- issue: Whether זבח should be rendered with explicit sacrificial language
  chosen_reading: Rendered as 'sacrificed them'
  alternative_readings:
  - Rendered as 'slaughtered them' without sacrificial nuance
  rationale: The Hebrew verb normally carries sacrificial associations, and the context
    of a communal meal after a decisive vocational break supports retaining that nuance.
    The translation does not specify to whom or in what formal cultic setting the
    sacrifice was made, avoiding overstatement beyond the text.
