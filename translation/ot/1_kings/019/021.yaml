id: 1KI.19.21
reference: 1 Kings 19:21
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב מֵ/אַחֲרָ֜י/ו וַ/יִּקַּ֣ח אֶת צֶ֧מֶד הַ/בָּקָ֣ר וַ/יִּזְבָּחֵ֗/הוּ
    וּ/בִ/כְלִ֤י הַ/בָּקָר֙ בִּשְּׁלָ֣/ם הַ/בָּשָׂ֔ר וַ/יִּתֵּ֥ן לָ/עָ֖ם וַ/יֹּאכֵ֑לוּ
    וַ/יָּ֗קָם וַ/יֵּ֛לֶךְ אַחֲרֵ֥י אֵלִיָּ֖הוּ וַ/יְשָׁרְתֵֽ/הוּ־׃פ
translation:
  text: Then he turned back from following him, took the pair of oxen, and sacrificed
    them. With the oxen’s equipment he boiled their flesh and gave it to the people,
    and they ate. Then he arose and went after Elijah and served him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the yoke of oxen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'With the yoke/implements of the oxen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב מֵאַחֲרָיו
  chosen: Then he turned back from following him
  alternatives:
  - Then he returned from after him
  - Then he turned back from him
  lexicon: HALOT
  rationale: The idiom literally reads 'turned back from after him.' In context, Elisha
    had run after Elijah in the previous verse, so 'turned back from following him'
    best captures the sense in natural English while preserving the directional nuance.
- source_word: צֶמֶד הַבָּקָר
  chosen: the pair of oxen
  alternatives:
  - the yoke of oxen
  lexicon: HALOT
  rationale: צֶמֶד can denote a pair, often a yoked pair. Since the next clause refers
    to slaughtering them, 'pair of oxen' is clearer in English, while the yoked sense
    is preserved by the footnote alternative.
- source_word: וַיִּזְבָּחֵהוּ
  chosen: and sacrificed them
  alternatives:
  - and slaughtered them
  lexicon: HALOT
  rationale: The verb זבח commonly refers to sacrificial slaughter. Here Elisha kills
    the oxen in a farewell act associated with a communal meal. 'Sacrificed them'
    preserves the cultic/sacrificial coloring better than the more generic 'slaughtered
    them.' The plural English object reflects the antecedent 'pair of oxen,' though
    the Hebrew suffix is singular collective.
- source_word: וּבִכְלִי הַבָּקָר
  chosen: With the oxen’s equipment
  alternatives:
  - With the yoke of the oxen
  - With the implements of the oxen
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, equipment'). In this setting it
    refers to the wooden gear associated with the oxen, used as fuel. 'Equipment'
    is natural and sufficiently broad; a footnote preserves the more specific alternatives.
- source_word: בִּשְּׁלָם הַבָּשָׂר
  chosen: he boiled their flesh
  alternatives:
  - he cooked the meat
  - he boiled the meat
  lexicon: HALOT
  rationale: בשל ordinarily means 'boil/cook.' 'Boiled' is more specific and closer
    to the Hebrew. 'Flesh' is formally closer to בשר, though in modern English it
    can sound stark; here it preserves the concreteness of the act.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - to the people there
  - to the folk
  lexicon: HALOT
  rationale: עם here refers to the local people/community who shared the meal. 'The
    people' is the most direct and neutral rendering.
- source_word: וַיָּקָם
  chosen: Then he arose
  alternatives:
  - Then he got up
  - Then he set out
  lexicon: HALOT
  rationale: '''Arose'' preserves the narrative sequence and slightly formal register
    of the Hebrew wayyiqtol chain. ''Set out'' would over-interpret because the next
    verb already states that he went.'
- source_word: וַיֵּלֶךְ אַחֲרֵי אֵלִיָּהוּ
  chosen: and went after Elijah
  alternatives:
  - and followed Elijah
  lexicon: HALOT
  rationale: Literally 'went after Elijah.' This keeps the physical-following imagery
    and echoes the earlier 'from following him.' 'Followed Elijah' is possible but
    slightly compresses the wording.
- source_word: וַיְשָׁרְתֵהוּ
  chosen: and served him
  alternatives:
  - and became his attendant
  - and ministered to him
  lexicon: HALOT
  rationale: שרת means to serve, often in an attendant role. 'Served him' is the most
    direct rendering and leaves the nature of the service broad, fitting the narrative
    context.
