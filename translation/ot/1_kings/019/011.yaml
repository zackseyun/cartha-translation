theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'the LORD was not in the wind / earthquake'
  chosen_reading: Retain the locative wording 'in' without interpretive expansion
  alternative_readings:
  - the LORD was not present in the wind
  - the LORD was not revealed in the wind
  rationale: The Hebrew states only that the LORD was not 'in' these phenomena. The translation preserves the theological tension and does not expand the statement into a fuller theory of divine absence or non-action.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
