id: 1KI.19.11
reference: 1 Kings 19:11
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר צֵ֣א וְ/עָמַדְתָּ֣ בָ/הָר֮ לִ/פְנֵ֣י יְהוָה֒ וְ/הִנֵּ֧ה יְהוָ֣ה עֹבֵ֗ר וְ/ר֣וּחַ גְּדוֹלָ֡ה וְ/חָזָ֞ק מְפָרֵק֩ הָרִ֨ים וּ/מְשַׁבֵּ֤ר סְלָעִים֙ לִ/פְנֵ֣י יְהוָ֔ה לֹ֥א בָ/ר֖וּחַ יְהוָ֑ה וְ/אַחַ֤ר הָ/ר֨וּחַ רַ֔עַשׁ לֹ֥א בָ/רַ֖עַשׁ יְהוָֽה׃
translation:
  text: And he said, “Go out and stand on the mountain before Yahweh.” And behold, Yahweh was passing by, and a great and strong wind was tearing apart the mountains and shattering rocks before Yahweh, but Yahweh was not in the wind. And after the wind, an earthquake, but Yahweh was not in the earthquake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the LORD was not in the wind.' This may imply not being revealed in it, but the translation keeps the more literal wording.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD was not in the earthquake.' The text does not deny the LORD's sovereignty over the event; it states that he was not in it in the sense expressed by the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צֵא
  chosen: Go out
  alternatives:
  - Come out
  lexicon: HALOT
  rationale: The imperative of יצא naturally means 'go out' from Elijah's current place of shelter. 'Come out' is possible in idiomatic English but is less directly tied to the Hebrew motion verb.
- source_word: וְעָמַדְתָּ
  chosen: stand
  alternatives:
  - take your stand
  lexicon: HALOT
  rationale: The verb עמד here is straightforwardly positional. 'Stand' is clear, natural, and sufficiently formal without adding emphasis not explicit in the text.
- source_word: בָהָר
  chosen: on the mountain
  alternatives:
  - upon the mountain
  - at the mountain
  lexicon: HALOT
  rationale: The preposition with 'mountain' is best rendered 'on the mountain' in idiomatic English for Elijah's location.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase literally means 'before the LORD.' This preserves the spatial and covenantal sense without over-expanding the wording.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - And see
  lexicon: HALOT
  rationale: '''Behold'' preserves the discourse-marking force of הִנֵּה and suits the elevated narrative register. It signals dramatic immediacy.'
- source_word: עֹבֵר
  chosen: was passing by
  alternatives:
  - passed by
  - was about to pass by
  lexicon: HALOT
  rationale: The participle עֹבֵר conveys ongoing or imminent action. 'Was passing by' captures the vividness better than a simple past and avoids overcommitting to futurity.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - blast
  lexicon: HALOT
  rationale: In this immediate context, the description of physical force tearing mountains and shattering rocks indicates a meteorological phenomenon, so 'wind' is the best contextual rendering.
- source_word: גְּדוֹלָה וְחָזָק
  chosen: great and strong
  alternatives:
  - great and mighty
  - powerful
  lexicon: HALOT
  rationale: Rendering both adjectives separately preserves the Hebrew intensification. 'Great and strong' is transparent and avoids collapsing the pair into a single English adjective.
- source_word: מְפָרֵק
  chosen: was tearing apart
  alternatives:
  - breaking apart
  - splitting
  lexicon: HALOT
  rationale: The participle depicts violent ongoing action. 'Was tearing apart' conveys force and aspect well in context.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: The article is present in Hebrew; 'the mountains' preserves the specificity of the scene.
- source_word: וּמְשַׁבֵּר סְלָעִים
  chosen: and shattering rocks
  alternatives:
  - and breaking rocks in pieces
  - and smashing crags
  lexicon: HALOT
  rationale: This keeps the participial sequence parallel and vivid. 'Rocks' is more accessible than 'crags' while still fitting סְלָעִים.
- source_word: לֹא בָרוּחַ יְהוָה
  chosen: but the LORD was not in the wind
  alternatives:
  - the LORD was not in the wind
  - the LORD was not with the wind
  lexicon: HALOT
  rationale: English idiom benefits from an adversative 'but' to mark the contrast. 'In the wind' is the most natural rendering of the Hebrew preposition here and preserves the theological point without overinterpretation.
- source_word: וְאַחַר הָרוּחַ רַעַשׁ
  chosen: And after the wind, an earthquake
  alternatives:
  - And after the wind came an earthquake
  lexicon: HALOT
  rationale: The Hebrew is verbless and terse. This rendering preserves the abrupt sequence while remaining readable English.
- source_word: רַעַשׁ
  chosen: earthquake
  alternatives:
  - trembling
  - shaking
  lexicon: HALOT
  rationale: In this narrative context רַעַשׁ refers to a seismic event rather than a general shaking. 'Earthquake' is the clearest contextual equivalent.
- source_word: לֹא בָרַעַשׁ יְהוָה
  chosen: but the LORD was not in the earthquake
  alternatives:
  - the LORD was not in the earthquake
  lexicon: HALOT
  rationale: As with the prior clause, supplying 'but' clarifies the contrast in natural English, and 'in the earthquake' preserves the Hebrew wording and theological restraint.
