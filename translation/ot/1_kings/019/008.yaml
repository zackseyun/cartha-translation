theological_decisions:
- issue: Rendering of הָאֱלֹהִים in the phrase הַר הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - divine
  rationale: Although אֱלֹהִים can occasionally function in ways that suggest majesty
    or intensity, in this established biblical place designation the personal reference
    is best rendered 'God.' This preserves the canonical association of Horeb with
    Israel's God without adding interpretive material beyond the text.
