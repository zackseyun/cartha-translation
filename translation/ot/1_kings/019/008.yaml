id: 1KI.19.8
reference: 1 Kings 19:8
source:
  edition: WLC
  text: וַ/יָּ֖קָם וַ/יֹּ֣אכַל וַ/יִּשְׁתֶּ֑ה וַ/יֵּ֜לֶךְ בְּ/כֹ֣חַ הָ/אֲכִילָ֣ה הַ/הִ֗יא
    אַרְבָּעִ֥ים יוֹם֙ וְ/אַרְבָּעִ֣ים לַ֔יְלָה עַ֛ד הַ֥ר הָ/אֱלֹהִ֖ים חֹרֵֽב׀׃
translation:
  text: So he arose and ate and drank, and went in the strength of that food forty
    days and forty nights to Horeb, the mountain of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the strength of that meal.' The Hebrew expression refers to the nourishment
      he received from what he had eaten.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: So he arose
  alternatives:
  - Then he got up
  - And he arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, a standard narrative sequence verb meaning 'arose/got
    up.' 'Arose' preserves the elevated but still readable narrative tone; 'So' reflects
    the forward movement of the waw-consecutive in context.
- source_word: וַיֹּאכַל
  chosen: ate
  alternatives:
  - did eat
  lexicon: HALOT
  rationale: Simple narrative verb from אכל. 'Ate' is the natural modern English equivalent
    without unnecessary archaism.
- source_word: וַיִּשְׁתֶּה
  chosen: drank
  alternatives:
  - did drink
  lexicon: HALOT
  rationale: Simple narrative verb from שׁתה. 'Drank' matches the straightforward
    Hebrew sequence.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: HALOT
  rationale: הלך in the narrative context most basically means 'went.' 'Journeyed'
    is possible, but 'went' better preserves the plain verbal sense while allowing
    the duration phrase to supply the travel nuance.
- source_word: בְּכֹחַ
  chosen: in the strength
  alternatives:
  - on the strength
  - with the strength
  lexicon: HALOT
  rationale: כֹּחַ denotes strength, power, or vigor. The preposition ב here is idiomatically
    rendered 'in' or 'on.' 'In the strength' is a natural English rendering that closely
    follows the Hebrew.
- source_word: הָאֲכִילָה הַהִיא
  chosen: of that food
  alternatives:
  - from that meal
  - of that eating
  lexicon: HALOT
  rationale: The noun אֲכִילָה literally refers to eating/food. In this context, the
    sense is the nourishment provided by what he had just eaten. 'That food' is more
    idiomatic than the overly literal 'that eating' and avoids narrowing to a formal
    'meal' beyond the text.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: Standard Hebrew duration expression. The traditional English form is
    also the most natural and precise rendering.
- source_word: עַד
  chosen: to
  alternatives:
  - until
  lexicon: HALOT
  rationale: With a destination, עַד can be rendered 'to' or 'until.' Here it marks
    the endpoint of Elijah's travel, and 'to' is the more idiomatic English choice.
- source_word: הַר הָאֱלֹהִים
  chosen: the mountain of God
  alternatives:
  - God's mountain
  lexicon: HALOT
  rationale: Construct phrase literally 'mountain of God.' Retaining the formal expression
    preserves the biblical idiom and its solemn resonance.
- source_word: חֹרֵב
  chosen: Horeb
  lexicon: HALOT
  rationale: Proper place name, transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
