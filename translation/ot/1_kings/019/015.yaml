id: 1KI.19.15
reference: 1 Kings 19:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלָ֔י/ו לֵ֛ךְ שׁ֥וּב לְ/דַרְכְּ/ךָ֖ מִדְבַּ֣רָ/ה דַמָּ֑שֶׂק
    וּ/בָ֗אתָ וּ/מָשַׁחְתָּ֧ אֶת חֲזָאֵ֛ל לְ/מֶ֖לֶךְ עַל אֲרָֽם־־׃
translation:
  text: And the LORD said to him, “Go, return on your way to the wilderness of Damascus;
    and when you arrive, you shall anoint Hazael as king over Aram.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the wilderness of Damascus.' The Hebrew form of 'wilderness'
      includes a directional ending.
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew name often rendered 'Syria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לֵךְ שׁוּב
  chosen: Go, return
  alternatives:
  - Go back
  - Leave here and return
  lexicon: HALOT
  rationale: The sequence of two imperatives is preserved rather than collapsed into
    a single English verb. 'Go, return' reflects both הלך and שוב while remaining
    natural English.
- source_word: לְדַרְכְּךָ
  chosen: on your way
  alternatives:
  - to your way
  - by your way
  lexicon: HALOT
  rationale: An idiomatic rendering is needed in English. 'On your way' preserves
    the sense of resuming Elijah's route without woodenly reproducing the preposition.
- source_word: מִדְבָּרָה דַמָּשֶׂק
  chosen: to the wilderness of Damascus
  alternatives:
  - toward the wilderness of Damascus
  - into the wilderness of Damascus
  lexicon: HALOT
  rationale: The directional ending on מִדְבָּרָה indicates motion toward the wilderness
    region associated with Damascus. 'To the wilderness of Damascus' is concise and
    clear.
- source_word: וּבָאתָ
  chosen: when you arrive
  alternatives:
  - and you shall come
  - and you shall go in
  lexicon: HALOT
  rationale: Although formally 'and you come/shall come,' in context it introduces
    the next action upon arrival. 'When you arrive' communicates the sequential force
    naturally in English.
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  alternatives:
  - anoint
  - you must anoint
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction continues the command sequence
    with future-like force. 'You shall anoint' fits English instructions and preserves
    the solemn commissioning tone.
- source_word: חֲזָאֵל
  chosen: Hazael
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לְמֶלֶךְ עַל אֲרָם
  chosen: as king over Aram
  alternatives:
  - to be king over Aram
  - for king over Syria
  lexicon: HALOT
  rationale: '''As king over Aram'' is the most natural rendering of the appointment
    formula. ''Aram'' is preferred over ''Syria'' because it reflects the Hebrew proper
    name directly rather than a later conventional equivalent.'
