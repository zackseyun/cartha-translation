id: 1KI.19.3
reference: 1 Kings 19:3
source:
  edition: WLC
  text: וַ/יַּ֗רְא וַ/יָּ֨קָם֙ וַ/יֵּ֣לֶךְ אֶל נַפְשׁ֔/וֹ וַ/יָּבֹ֕א בְּאֵ֥ר שֶׁ֖בַע
    אֲשֶׁ֣ר לִֽ/יהוּדָ֑ה וַ/יַּנַּ֥ח אֶֽת נַעֲר֖/וֹ שָֽׁם־־׃
translation:
  text: And he saw, and arose and went for his life, and came to Beersheba, which
    belongs to Judah, and left his servant there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and he saw''; many ancient witnesses and translations read ''and
      he feared.'''
    reason: textual_variant
  - marker: b
    text: Or 'went to save his life' or 'fled for his life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he feared
  - he looked
  lexicon: HALOT
  rationale: The consonantal text reads 'and he saw.' Some ancient versions and many
    modern translations reflect a different Vorlage or interpretive tradition yielding
    'he feared.' Since the provided source text is WLC, the main text follows the
    MT plainly with 'he saw,' while preserving the common alternative in a footnote.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: A standard narrative verb meaning 'rose/arose.' 'Arose' preserves the
    sequence and slightly elevated narrative tone without becoming archaic.
- source_word: וַיֵּלֶךְ אֶל־נַפְשׁוֹ
  chosen: went for his life
  alternatives:
  - went to save his life
  - fled for his life
  lexicon: HALOT
  rationale: The idiom literally involves 'his life/self.' 'Went for his life' keeps
    the Hebrew flavor and indicates flight for self-preservation. 'Fled for his life'
    is smoother English and likely the sense, but 'went' better reflects the source
    verb; the idiomatic force is explained by context and footnote-worthy alternatives
    are preserved here.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: 'Common motion verb rendered from the perspective of arrival: ''came
    to Beersheba.'''
- source_word: בְּאֵר שֶׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: which belongs to Judah
  alternatives:
  - which is in Judah
  - that belonged to Judah
  lexicon: HALOT
  rationale: The phrase marks territorial affiliation. 'Belongs to Judah' is a natural
    rendering that preserves the sense of belonging/jurisdiction.
- source_word: וַיַּנַּח
  chosen: left
  alternatives:
  - set down
  - caused to rest
  - abandoned
  lexicon: HALOT
  rationale: In context, the verb means he left his attendant behind there. 'Left'
    is the clearest idiomatic English equivalent.
- source_word: נַעֲרוֹ
  chosen: his servant
  alternatives:
  - his young man
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can mean a youth, servant, or attendant depending on context. Here
    it refers to Elijah's accompanying helper. 'Servant' is concise and idiomatic;
    'attendant' is possible but less natural in this narrative context.
