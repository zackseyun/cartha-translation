id: 1KI.19.18
reference: 1 Kings 19:18
source:
  edition: WLC
  text: וְ/הִשְׁאַרְתִּ֥י בְ/יִשְׂרָאֵ֖ל שִׁבְעַ֣ת אֲלָפִ֑ים כָּל הַ/בִּרְכַּ֗יִם
    אֲשֶׁ֤ר לֹֽא כָֽרְעוּ֙ לַ/בַּ֔עַל וְ/כָ֨ל הַ/פֶּ֔ה אֲשֶׁ֥ר לֹֽא נָשַׁ֖ק לֽ/וֹ־־־־׃
translation:
  text: Yet I have left for myself seven thousand in Israel—all the knees that have
    not bowed to Baal, and every mouth that has not kissed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have kept/reserved for myself seven thousand in Israel.'
    reason: lexical_alternative
  - marker: b
    text: Kissing an idol was an act of homage or worship.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִשְׁאַרְתִּי
  chosen: Yet I have left for myself
  alternatives:
  - But I have left
  - I have kept for myself
  - I will leave for myself
  lexicon: HALOT
  rationale: From שׁאר in Hiphil 1cs, expressing causing to remain/reserving. The
    perfect here is best rendered as a present-result perfect in context ('I have
    left/kept'). 'For myself' reflects the implied personal interest of the Hiphil
    form in this context and matches the sense echoed in Rom 11:4. 'Yet' captures
    the adversative force of the conjunction in response to Elijah's complaint.
- source_word: בְיִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Straightforward locative phrase.
- source_word: שִׁבְעַת אֲלָפִים
  chosen: seven thousand
  lexicon: HALOT
  rationale: Cardinal number construction; idiomatic English omits a literal rendering
    such as 'seven of thousands.'
- source_word: כָּל הַבִּרְכַּיִם
  chosen: all the knees
  alternatives:
  - every knee
  lexicon: HALOT
  rationale: Literal body-part expression retained. Although 'every knee' is idiomatic
    in English, 'all the knees' preserves the collective image tied to the following
    relative clause. The phrase refers metonymically to persons, but the bodily imagery
    is important and should remain visible.
- source_word: אֲשֶׁר לֹא כָרְעוּ לַבַּעַל
  chosen: that have not bowed to Baal
  alternatives:
  - that did not kneel to Baal
  - that have not bent the knee to Baal
  lexicon: HALOT
  rationale: כּרע means to kneel/bow. 'Bowed to Baal' is natural English and preserves
    the act of worshipful submission. 'To Baal' is preferable to 'before Baal' here
    because the lamed marks direction/object of homage.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English convention treats Baal as
    a proper divine name without the article. Retaining 'the Baal' would sound unnatural
    and could mislead readers.
- source_word: וְכָל הַפֶּה
  chosen: and every mouth
  alternatives:
  - and all the mouths
  lexicon: HALOT
  rationale: Singular collective after כָל is idiomatic in Hebrew. English 'every
    mouth' best conveys distributive force while preserving the concrete bodily image
    parallel to 'knees.'
- source_word: אֲשֶׁר לֹא נָשַׁק לוֹ
  chosen: that has not kissed him
  alternatives:
  - that has not kissed Baal
  - that did not kiss him
  lexicon: HALOT
  rationale: נשׁק means 'kiss.' In this cultic context it refers to an act of homage
    toward an idol. 'Him' follows the Hebrew pronominal suffix and keeps the parallel
    compact; the antecedent is clearly Baal. Perfect English aspect ('has not kissed')
    matches the preceding clause.
