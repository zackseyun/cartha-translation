theological_decisions:
- issue: Rendering the remnant statement without importing later doctrinal terminology
  chosen_reading: Yet I have left for myself seven thousand in Israel
  alternative_readings:
  - I have reserved for myself seven thousand in Israel
  rationale: The verse describes God's preservation of a faithful remnant, but the
    translation avoids importing technical theological language not explicit in the
    Hebrew. 'Left for myself' is faithful to the verbal form while still allowing
    the remnant theme to be recognized.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
