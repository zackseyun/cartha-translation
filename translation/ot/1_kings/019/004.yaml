id: 1KI.19.4
reference: 1 Kings 19:4
source:
  edition: WLC
  text: וְ/הֽוּא הָלַ֤ךְ בַּ/מִּדְבָּר֙ דֶּ֣רֶךְ י֔וֹם וַ/יָּבֹ֕א וַ/יֵּ֕שֶׁב תַּ֖חַת
    רֹ֣תֶם אחת וַ/יִּשְׁאַ֤ל אֶת נַפְשׁ/וֹ֙ לָ/מ֔וּת וַ/יֹּ֣אמֶר רַ֗ב עַתָּ֤ה יְהוָה֙
    קַ֣ח נַפְשִׁ֔/י כִּֽי לֹא ט֥וֹב אָנֹכִ֖י מֵ/אֲבֹתָֽ/י־־׀־־׃
translation:
  text: But he himself went a day's journey into the wilderness, and came and sat
    down under one broom tree. And he asked that he might die, and said, “It is enough;
    now, LORD, take my life, for I am no better than my fathers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The divine name יְהוָה is rendered ''LORD'' in keeping
      with the project''s default practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'a broom bush.' The Hebrew רֹתֶם refers to a desert shrub often rendered
      'broom tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - in the wilderness
  - into the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' fits standard
    biblical usage and the narrative setting. 'Into' reflects movement with הָלַךְ.
- source_word: דֶּרֶךְ יוֹם
  chosen: a day's journey
  alternatives:
  - the distance of a day
  - for a day
  lexicon: HALOT
  rationale: This construct idiom denotes the distance or travel of one day, not merely
    duration in abstraction. 'A day's journey' is idiomatic English and preserves
    the sense.
- source_word: רֹתֶם אֶחָת
  chosen: one broom tree
  alternatives:
  - a broom bush
  - one broom bush
  lexicon: HALOT
  rationale: רֹתֶם refers to the desert broom/shrub. 'Broom tree' is a familiar conventional
    rendering in English Bible tradition, though botanically it may be more shrub-like;
    'one' preserves אַחַת.
- source_word: וַיִּשְׁאַל אֶת־נַפְשׁוֹ לָמוּת
  chosen: he asked that he might die
  alternatives:
  - he asked for his life to die
  - he asked for death
  - he asked that his soul might die
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves asking with respect to his life/soul
    'to die.' In context it means he requested death for himself. 'He asked that he
    might die' is clear English without over-literal awkwardness.
- source_word: רַב עַתָּה
  chosen: It is enough; now
  alternatives:
  - Enough, now
  - This is too much; now
  - It is too much now
  lexicon: HALOT
  rationale: רַב here functions idiomatically as an exclamation meaning 'enough' or
    'it is enough.' Keeping 'now' separate preserves עַתָּה and the urgency of Elijah's
    plea.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and common English Bible convention.
- source_word: קַח נַפְשִׁי
  chosen: take my life
  alternatives:
  - take my soul
  - take my life away
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here Elijah
    is asking to die, so 'life' best conveys the sense in natural English without
    importing later anthropological distinctions.
- source_word: כִּי לֹא טוֹב אָנֹכִי מֵאֲבֹתָי
  chosen: for I am no better than my fathers
  alternatives:
  - for I am not better than my fathers
  - for I am no good compared with my fathers
  lexicon: HALOT
  rationale: טוֹב with comparative מִן here means 'better than,' not moral goodness
    in isolation. 'My fathers' refers to his predecessors/ancestors; preserving 'fathers'
    matches the Hebrew and the project's gender-accurate policy.
