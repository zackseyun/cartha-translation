theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the revelatory formula דְבַר יְהוָה
  chosen_reading: the word of the LORD
  alternative_readings:
  - a word from the LORD
  - the message of the LORD
  rationale: The traditional prophetic formula carries theological significance as
    divine speech. 'The word of the LORD' preserves that formulaic force better than
    a more interpretive paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
