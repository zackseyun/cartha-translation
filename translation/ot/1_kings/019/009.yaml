id: 1KI.19.9
reference: 1 Kings 19:9
source:
  edition: WLC
  text: וַ/יָּבֹא שָׁ֥ם אֶל הַ/מְּעָרָ֖ה וַ/יָּ֣לֶן שָׁ֑ם וְ/הִנֵּ֤ה דְבַר יְהוָה֙
    אֵלָ֔י/ו וַ/יֹּ֣אמֶר ל֔/וֹ מַה לְּ/ךָ֥ פֹ֖ה אֵלִיָּֽהוּ־־־־׃
translation:
  text: There he came to the cave and spent the night there. And behold, the word
    of the LORD came to him and said to him, “What are you doing here, Elijah?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why are you here, Elijah?” The Hebrew idiom literally reads, “What
      [is] to you here, Elijah?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - he entered
  - he went
  lexicon: HALOT
  rationale: From בוא, a common motion verb. 'He came' is natural English and preserves
    the narrative movement without over-specifying entry beyond what the clause with
    'to the cave' already conveys.
- source_word: הַמְּעָרָה
  chosen: the cave
  alternatives:
  - the cavern
  lexicon: HALOT
  rationale: מְעָרָה ordinarily means 'cave.' 'Cavern' is possible but less natural
    and unnecessarily elevated. The definite article is retained.
- source_word: וַיָּלֶן
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: From לון/לין, 'to lodge, spend the night.' 'Spent the night' is idiomatic
    modern English and communicates the temporal sense more clearly than the somewhat
    archaic 'lodged.'
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - then
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention or vividness. 'And behold' preserves the
    discourse force better than omitting it, while remaining understandable in modern
    English.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'The word of the LORD' preserves
    the recognizable idiom and its theological weight. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'The divine name is rendered according to the project''s stated default
    for יְהוָה: ''the LORD.'''
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: 'The preposition אֶל with pronominal suffix is straightforwardly directional:
    ''to him.'' This fits the revelatory formula naturally in English.'
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and he said to him
  - saying to him
  lexicon: HALOT
  rationale: The subject is the preceding 'word of the LORD.' English can retain the
    explicit indirect object for clarity, though it is somewhat repetitive; the repetition
    reflects the Hebrew sequence.
- source_word: מַה לְּךָ פֹה
  chosen: What are you doing here
  alternatives:
  - What is for you here
  - Why are you here
  - What do you have here
  lexicon: HALOT
  rationale: The idiom literally asks 'What [is] to you here?' In context it functions
    as a probing question about Elijah's presence. 'What are you doing here' is the
    clearest idiomatic rendering; 'Why are you here' is possible but narrows the question
    to motive rather than presence/situation.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
