id: 1KI.19.6
reference: 1 Kings 19:6
source:
  edition: WLC
  text: וַ/יַּבֵּ֕ט וְ/הִנֵּ֧ה מְרַאֲשֹׁתָ֛י/ו עֻגַ֥ת רְצָפִ֖ים וְ/צַפַּ֣חַת מָ֑יִם
    וַ/יֹּ֣אכַל וַ/יֵּ֔שְׁתְּ וַ/יָּ֖שָׁב וַ/יִּשְׁכָּֽב׃
translation:
  text: He looked, and behold, at his head was a cake baked on hot stones and a jar
    of water. He ate and drank, then lay down again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cake on coals.' The Hebrew רְצָפִים may refer to heated stones used
      for baking, though some translations render it more generally as 'coals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבֵּט
  chosen: He looked
  alternatives:
  - He looked around
  - He saw
  lexicon: HALOT
  rationale: The verb נבט commonly means to look or gaze. 'He looked' is a natural
    rendering that preserves the action without adding direction not explicit in the
    Hebrew.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there was
  - and suddenly
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what is seen. 'Behold'
    preserves the vividness and immediacy of the Hebrew better than a flatter 'there
    was,' while remaining readable.
- source_word: מְרַאֲשֹׁתָיו
  chosen: at his head
  alternatives:
  - by his head
  - at his place of lying
  lexicon: HALOT
  rationale: The noun refers to the place at or near the head. 'At his head' is concise
    and idiomatic in English, fitting the scene of provisions placed beside Elijah
    as he lies down.
- source_word: עֻגַת
  chosen: a cake
  alternatives:
  - a loaf
  - a round loaf
  lexicon: HALOT
  rationale: עֻגָה denotes a round cake or bread-cake. 'Cake' best matches the lexical
    sense here without implying sweet pastry in context because the modifying phrase
    clarifies the kind of bread.
- source_word: רְצָפִים
  chosen: baked on hot stones
  alternatives:
  - on coals
  - on heated stones
  lexicon: HALOT
  rationale: The term likely refers to heated stones or paving-stones used for baking,
    hence bread baked on hot stones. This avoids the less precise traditional 'on
    the coals' while conveying the probable cooking method from the Hebrew.
- source_word: וְצַפַּחַת מָיִם
  chosen: and a jar of water
  alternatives:
  - and a jug of water
  - and a flask of water
  lexicon: HALOT
  rationale: צַפַּחַת denotes a container such as a jar, jug, or flask. 'Jar' is clear
    modern English and fits the simple narrative setting.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ
  chosen: He ate and drank
  alternatives:
  - So he ate and drank
  lexicon: HALOT
  rationale: The paired wayyiqtol verbs narrate straightforward sequential action.
    'He ate and drank' preserves the simplicity and rhythm of the Hebrew.
- source_word: וַיָּשָׁב וַיִּשְׁכָּב
  chosen: then lay down again
  alternatives:
  - and returned and lay down
  - and lay down again
  lexicon: HALOT
  rationale: שׁוּב plus שׁכב idiomatically means to resume lying down. 'Lay down again'
    captures the sense; 'then' reflects narrative sequence. The explicit 'returned'
    would sound wooden in English.
