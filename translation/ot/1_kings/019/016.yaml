theological_decisions:
- issue: Nature of Elijah's relation to Elisha in תַּחְתֶּיךָ
  chosen_reading: Elisha is appointed as Elijah's prophetic successor, rendered 'in
    your place.'
  alternative_readings:
  - Elisha is prophet 'after you' in a primarily chronological sense
  - Elisha serves 'instead of you' with stronger replacement emphasis
  rationale: The verse concerns divinely appointed succession in prophetic office.
    'In your place' preserves the office-transfer idea without importing a more polemical
    or abrupt displacement than the Hebrew requires.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
