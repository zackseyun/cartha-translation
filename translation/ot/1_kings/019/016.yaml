id: 1KI.19.16
reference: 1 Kings 19:16
source:
  edition: WLC
  text: וְ/אֵת֙ יֵה֣וּא בֶן נִמְשִׁ֔י תִּמְשַׁ֥ח לְ/מֶ֖לֶךְ עַל יִשְׂרָאֵ֑ל וְ/אֶת
    אֱלִישָׁ֤ע בֶּן שָׁפָט֙ מֵ/אָבֵ֣ל מְחוֹלָ֔ה תִּמְשַׁ֥ח לְ/נָבִ֖יא תַּחְתֶּֽי/ךָ־־־־׃
translation:
  text: And you shall anoint Jehu son of Nimshi as king over Israel, and Elisha son
    of Shaphat from Abel-meholah you shall anoint as prophet in your place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after you' or 'instead of you'; the Hebrew can express succession or
      replacement.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשַׁח
  chosen: you shall anoint
  alternatives:
  - you are to anoint
  - you must anoint
  lexicon: HALOT
  rationale: Qal imperfect 2ms of משׁח in a commissioning context functions as a directive/future
    command. 'You shall anoint' preserves the formal force and biblical register without
    becoming archaic.
- source_word: לְמֶלֶךְ
  chosen: as king
  alternatives:
  - for king
  - to be king
  lexicon: HALOT
  rationale: The preposition ל with role/status is idiomatically rendered 'as king'
    in English. This communicates appointment to office more naturally than a wooden
    'for king.'
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: עַל with royal rule denotes authority over a people. 'Over Israel' is
    the standard natural rendering.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מֵאָבֵל מְחוֹלָה
  chosen: from Abel-meholah
  alternatives:
  - of Abel-meholah
  lexicon: HALOT
  rationale: The prefixed מִן marks origin or hometown. 'From Abel-meholah' is the
    most straightforward rendering, identifying Elisha by place of origin.
- source_word: לְנָבִיא
  chosen: as prophet
  alternatives:
  - for prophet
  - to be prophet
  lexicon: HALOT
  rationale: As with לְמֶלֶךְ, ל marks appointment to an office. 'As prophet' is idiomatic
    and clear.
- source_word: תַּחְתֶּיךָ
  chosen: in your place
  alternatives:
  - instead of you
  - after you
  lexicon: HALOT
  rationale: תחת can denote succession or replacement. In this context of prophetic
    succession, 'in your place' best captures replacement without overinterpreting
    chronology. 'After you' is possible but weaker on the substitution nuance.
- source_word: וְאֵת ... וְאֶת
  chosen: And ... and
  lexicon: HALOT
  rationale: The direct-object marker אֵת is not translated directly into English;
    the conjunctions structure the coordinated commands.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Patronymic identification is preserved formally as 'son of,' which is
    natural in English biblical style and more precise than reducing it to a surname-like
    construction.
