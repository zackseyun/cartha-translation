id: 1KI.10.19
reference: 1 Kings 10:19
source:
  edition: WLC
  text: שֵׁ֧שׁ מַעֲל֣וֹת לַ/כִּסֵּ֗ה וְ/רֹאשׁ עָגֹ֤ל לַ/כִּסֵּה֙ מֵ/אַֽחֲרָ֔י/ו וְ/יָדֹ֛ת
    מִ/זֶּ֥ה וּ/מִ/זֶּ֖ה אֶל מְק֣וֹם הַ/שָּׁ֑בֶת וּ/שְׁנַ֣יִם אֲרָי֔וֹת עֹמְדִ֖ים
    אֵ֥צֶל הַ/יָּדֽוֹת־־׃
translation:
  text: The throne had six steps, and the throne had a rounded top at its back, and
    armrests on this side and on that beside the seat, and two lions standing beside
    the armrests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the throne had a round top behind it.' The Hebrew phrase is concise
      and may be rendered more literally.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the place of sitting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  chosen: steps
  alternatives:
  - ascents
  - stairs
  lexicon: HALOT
  rationale: In the context of a throne structure, the noun refers to the ascending
    steps leading up to it. 'Steps' is natural modern English and sufficiently concrete.
- source_word: לַכִּסֵּה
  chosen: the throne
  alternatives:
  - for the throne
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken idiomatically with the architectural
    description: ''the throne had six steps,'' rather than a more wooden ''six steps
    for the throne.'' English idiom favors possession.'
- source_word: רֹאשׁ עָגֹל
  chosen: a rounded top
  alternatives:
  - a round top
  - a rounded headrest
  lexicon: HALOT
  rationale: Literally 'a round head/top.' In furniture context this describes the
    upper part of the throne. 'Rounded top' is clear and avoids over-specifying as
    'headrest,' which the Hebrew does not require.
- source_word: מֵאַחֲרָיו
  chosen: at its back
  alternatives:
  - behind it
  - at the back of it
  lexicon: HALOT
  rationale: This locative phrase modifies the rounded top, indicating its position
    at the rear of the throne. 'At its back' is concise and idiomatic.
- source_word: יָדֹת
  chosen: armrests
  alternatives:
  - arms
  - handholds
  - side supports
  lexicon: HALOT
  rationale: Although literally related to 'hands,' in throne/furniture context the
    plural denotes the side arms of the seat. 'Armrests' communicates the object clearly
    in modern English.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that
  alternatives:
  - on either side
  - on one side and on the other
  lexicon: HALOT
  rationale: The phrase marks bilateral placement. The chosen rendering preserves
    the Hebrew's distributive feel while remaining readable.
- source_word: אֶל מְקוֹם הַשָּׁבֶת
  chosen: beside the seat
  alternatives:
  - at the place of the seat
  - toward the sitting place
  lexicon: HALOT
  rationale: Literally 'to the place of sitting.' In context it describes the location
    of the armrests relative to the sitting area of the throne. 'Beside the seat'
    gives the functional sense in natural English.
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural noun referring to lion figures associated with
    the throne.
- source_word: עֹמְדִים
  chosen: standing
  alternatives:
  - were standing
  - stationed
  lexicon: HALOT
  rationale: The participle depicts the lions in an upright, fixed position. 'Standing'
    preserves the visual description without unnecessary expansion.
- source_word: אֵצֶל הַיָּדוֹת
  chosen: beside the armrests
  alternatives:
  - next to the arms
  - beside the side supports
  lexicon: HALOT
  rationale: This phrase locates the two lions adjacent to the throne's arms. Using
    'armrests' maintains consistency with the earlier rendering of יָדֹת.
