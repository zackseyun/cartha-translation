id: 1KI.10.29
reference: 1 Kings 10:29
source:
  edition: WLC
  text: וַֽ֠/תַּעֲלֶה וַ/תֵּצֵ֨א מֶרְכָּבָ֤ה מִ/מִּצְרַ֨יִם֙ בְּ/שֵׁ֣שׁ מֵא֣וֹת כֶּ֔סֶף
    וְ/ס֖וּס בַּ/חֲמִשִּׁ֣ים וּ/מֵאָ֑ה וְ֠/כֵן לְ/כָל מַלְכֵ֧י הַ/חִתִּ֛ים וּ/לְ/מַלְכֵ֥י
    אֲרָ֖ם בְּ/יָדָ֥/ם יֹצִֽאוּ־׃פ
translation:
  text: And a chariot was imported from Egypt for six hundred shekels of silver, and
    a horse for a hundred and fifty; and so they exported them by their hand to all
    the kings of the Hittites and to the kings of Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by their hand,'' that is, through them or through their agents.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was brought up from Egypt ... and they brought them out.' The Hebrew
      uses movement verbs that in this trade context refer to import and export.
    reason: lexical_alternative
  - marker: c
    text: That is, the kings of the Arameans; traditionally 'Syria.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּעֲלֶה
  chosen: was imported
  alternatives:
  - went up
  - was brought up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up,' but in this trade context with
    goods coming from Egypt it idiomatically refers to being brought up/imported.
    Passive English best reflects the item as subject.
- source_word: וַתֵּצֵא
  chosen: was imported
  alternatives:
  - went out
  - came out
  lexicon: HALOT
  rationale: Together with the preceding verb, יצא forms a commercial movement expression.
    Rendering both as a single smooth English idea ('was imported') captures the sense
    without wooden redundancy.
- source_word: מֶרְכָּבָה
  chosen: a chariot
  alternatives:
  - chariot
  lexicon: HALOT
  rationale: Singular indefinite matches the Hebrew and fits the pricing statement
    for each unit.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward source location for the trade goods.
- source_word: בְּשֵׁשׁ מֵאוֹת כֶּסֶף
  chosen: for six hundred shekels of silver
  alternatives:
  - for six hundred pieces of silver
  - at six hundred silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'for six hundred silver.' Supplying 'shekels'
    is standard and clarifies the monetary unit in idiomatic English, while retaining
    'silver' because the noun is explicit.
- source_word: וְסוּס
  chosen: and a horse
  alternatives:
  - and a warhorse
  lexicon: HALOT
  rationale: The basic meaning is 'horse.' Although military context may imply a warhorse,
    the Hebrew does not specify that more narrowly.
- source_word: בַּחֲמִשִּׁים וּמֵאָה
  chosen: for a hundred and fifty
  alternatives:
  - for one hundred fifty
  lexicon: HALOT
  rationale: This is the price of a horse. English reverses the Hebrew number order
    for natural style.
- source_word: וְכֵן
  chosen: and so
  alternatives:
  - and likewise
  - thus
  lexicon: HALOT
  rationale: 'Marks continuation from pricing to the broader trade practice: in the
    same way, these goods were supplied onward.'
- source_word: לְכָל מַלְכֵי הַחִתִּים
  chosen: to all the kings of the Hittites
  alternatives:
  - for all the kings of the Hittites
  lexicon: HALOT
  rationale: The lamed here indicates the recipients of the exported goods. 'Kings
    of the Hittites' preserves the ethnic-political designation used in the Hebrew
    text.
- source_word: וּלְמַלְכֵי אֲרָם
  chosen: and to the kings of Aram
  alternatives:
  - and to the kings of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew proper name; transliteration is preferred over the
    traditional but interpretive 'Syria' per the translation philosophy on names.
- source_word: בְּיָדָם
  chosen: by their hand
  alternatives:
  - through them
  - through their agents
  lexicon: HALOT
  rationale: Literally 'by their hand,' an idiom for agency. The main text keeps the
    idiom in understandable English while preserving auditability; a footnote gives
    the smoother alternative sense.
- source_word: יֹצִיאוּ
  chosen: they exported them
  alternatives:
  - they brought them out
  - they sent them out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'cause to go out.' In this commercial context
    'exported' best captures the sense of onward trade.
