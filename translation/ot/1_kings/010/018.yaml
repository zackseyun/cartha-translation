id: 1KI.10.18
reference: 1 Kings 10:18
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ הַ/מֶּ֛לֶךְ כִּסֵּא שֵׁ֖ן גָּד֑וֹל וַ/יְצַפֵּ֖/הוּ זָהָ֥ב מוּפָֽז־׃
translation:
  text: Then the king made a great ivory throne and overlaid it with refined gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pure gold' or 'fine gold' for 'refined gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: Then ... made
  alternatives:
  - and ... made
  - made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה advances the narrative. 'Then' captures the sequential
    force in natural English without over-literal repetition of 'and.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Solomon in context; standard rendering is
    straightforward and contextually clear.
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  - chair
  lexicon: HALOT
  rationale: In royal context, 'throne' is the appropriate English equivalent rather
    than the more generic 'seat' or 'chair.'
- source_word: שֵׁן
  chosen: ivory
  alternatives:
  - tooth
  lexicon: HALOT
  rationale: Although the noun literally denotes 'tooth,' in this construction with
    throne it idiomatically refers to ivory, the material made from tusk/tooth.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' preserves both size and grandeur, fitting the royal setting
    better than the merely dimensional ''large.'''
- source_word: וַיְצַפֵּהוּ
  chosen: overlaid it
  alternatives:
  - covered it
  - plated it
  lexicon: HALOT
  rationale: The verb צפה in this stem commonly means to overlay or plate with a material.
    'Overlaid it' is idiomatic and precise for craftsmanship language.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no ambiguity in context.
- source_word: מוּפָז
  chosen: refined
  alternatives:
  - pure
  - fine
  lexicon: HALOT
  rationale: The term denotes high-quality, refined gold. 'Refined gold' is clear
    modern English and avoids overstating technical specificity while preserving the
    sense of superior quality.
