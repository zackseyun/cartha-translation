id: 1KI.10.2
reference: 1 Kings 10:2
source:
  edition: WLC
  text: וַ/תָּבֹ֣א יְרוּשָׁלְַ֗מָ/ה בְּ/חַיִל֮ כָּבֵ֣ד מְאֹד֒ גְּ֠מַלִּים נֹשְׂאִ֨ים
    בְּשָׂמִ֧ים וְ/זָהָ֛ב רַב מְאֹ֖ד וְ/אֶ֣בֶן יְקָרָ֑ה וַ/תָּבֹא֙ אֶל שְׁלֹמֹ֔ה וַ/תְּדַבֵּ֣ר
    אֵלָ֔י/ו אֵ֛ת כָּל אֲשֶׁ֥ר הָיָ֖ה עִם לְבָבָֽ/הּ־־־־׃
translation:
  text: She came to Jerusalem with a very great retinue, with camels carrying spices
    and very much gold and precious stones. She came to Solomon and spoke with him
    about all that was in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a very large entourage' or, more literally, 'with very great wealth/force';
      the Hebrew חַיִל can denote wealth, strength, or a substantial company.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַיִל כָּבֵד מְאֹד
  chosen: with a very great retinue
  alternatives:
  - with a very great company
  - with a very large entourage
  - with a very great wealth
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, army, or a substantial company. In
    this travel-and-diplomatic context, the sense is not military force alone but
    an impressive accompanying train. 'Retinue' captures a large royal entourage without
    overstating militarization; 'very great' reflects כָּבֵד מְאֹד idiomatically as
    impressive magnitude.
- source_word: גְּמַלִּים נֹשְׂאִים בְּשָׂמִים
  chosen: camels carrying spices
  alternatives:
  - camels bearing spices
  - camels loaded with spices
  lexicon: HALOT
  rationale: A straightforward participial construction. 'Carrying' is natural modern
    English and preserves the ongoing descriptive force of נֹשְׂאִים.
- source_word: וְזָהָב רַב מְאֹד
  chosen: and very much gold
  alternatives:
  - and a great deal of gold
  - and very much gold in abundance
  lexicon: HALOT
  rationale: רַב מְאֹד intensifies quantity. 'Very much gold' is slightly literal
    yet still readable; it preserves the emphatic abundance without adding interpretive
    flourish.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and precious stones
  alternatives:
  - and precious stone
  - and costly stones
  - and jewels
  lexicon: HALOT
  rationale: Though אֶבֶן is singular, Hebrew often uses the singular collectively.
    English idiom prefers the plural 'precious stones' here for natural sense in a
    list of luxury goods. 'Jewels' is possible but slightly more interpretive.
- source_word: וַתָּבֹא אֶל שְׁלֹמֹה
  chosen: She came to Solomon
  alternatives:
  - She went to Solomon
  - She came before Solomon
  lexicon: HALOT
  rationale: 'The repeated וַתָּבֹא marks a new stage in the narrative: arrival in
    Jerusalem, then approach to Solomon. ''Came to'' preserves the repetition without
    awkwardness.'
- source_word: וַתְּדַבֵּר אֵלָיו
  chosen: and spoke with him
  alternatives:
  - and spoke to him
  - and talked with him
  lexicon: HALOT
  rationale: The preposition אֶל can be rendered 'to,' but in context of an exchange
    of hard questions, 'spoke with him' better fits idiomatic English while not requiring
    a fully reciprocal conversation.
- source_word: אֵת כָּל אֲשֶׁר הָיָה עִם לְבָבָהּ
  chosen: about all that was in her heart
  alternatives:
  - all that was on her heart
  - all that she had in mind
  - everything that was with her heart
  lexicon: HALOT
  rationale: The idiom עִם לֵבָב means what one has in one's inner thoughts or concerns.
    'In her heart' is the most natural and biblically resonant English rendering;
    'on her heart' is also possible but less standard in this narrative register.
