id: 1KI.10.7
reference: 1 Kings 10:7
source:
  edition: WLC
  text: וְ/לֹֽא הֶאֱמַ֣נְתִּי לַ/דְּבָרִ֗ים עַ֤ד אֲשֶׁר בָּ֨אתִי֙ וַ/תִּרְאֶ֣ינָה
    עֵינַ֔/י וְ/הִנֵּ֥ה לֹֽא הֻגַּד לִ֖/י הַ/חֵ֑צִי הוֹסַ֤פְתָּ חָכְמָה֙ וָ/ט֔וֹב
    אֶל הַ/שְּׁמוּעָ֖ה אֲשֶׁ֥ר שָׁמָֽעְתִּי־־־־־׃
translation:
  text: But I did not believe the reports until I came and my own eyes saw it; and
    behold, not even half was told to me. You surpass the report that I heard in wisdom
    and prosperity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You exceed the report I heard in wisdom and wealth.' The Hebrew טוֹב
      can denote general prosperity or well-being, and in this context may include
      wealth as part of Solomon's flourishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  chosen: I did not believe
  alternatives:
  - I did not trust
  - I could not believe
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to regard as true or credible. 'Believe'
    best fits the queen's response to what she had heard, without adding emotional
    nuance.
- source_word: לַדְּבָרִים
  chosen: the reports
  alternatives:
  - the words
  - the things
  lexicon: HALOT
  rationale: Though literally 'the words/things,' in context it refers to what had
    been said about Solomon. 'Reports' communicates hearsay content naturally in English
    while staying close to the sense.
- source_word: וַתִּרְאֶינָה עֵינַי
  chosen: my own eyes saw it
  alternatives:
  - my eyes saw
  - I saw with my own eyes
  lexicon: HALOT
  rationale: The Hebrew literally says 'my eyes saw.' Adding 'own' brings out the
    emphatic firsthand nature implicit in the idiom; singular 'it' is supplied naturally
    for English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - indeed
  lexicon: HALOT
  rationale: This discourse marker signals surprise and emphasis. 'Behold' preserves
    the rhetorical force better than a flatter connective.
- source_word: לֹא הֻגַּד לִי הַחֵצִי
  chosen: not even half was told to me
  alternatives:
  - the half was not told me
  - I was not told half of it
  lexicon: HALOT
  rationale: This is a common idiomatic expression of understatement. 'Not even half
    was told to me' is idiomatic English and preserves the emphatic negation.
- source_word: הוֹסַפְתָּ
  chosen: You surpass
  alternatives:
  - You have added
  - You exceed
  lexicon: HALOT
  rationale: The verb יסף in this comparative construction with אֶל conveys exceeding
    or going beyond, not merely addition. 'Surpass' captures the idiomatic sense clearly.
- source_word: חָכְמָה וָטוֹב
  chosen: in wisdom and prosperity
  alternatives:
  - in wisdom and goodness
  - in wisdom and wealth
  lexicon: HALOT
  rationale: חָכְמָה is straightforwardly 'wisdom.' טוֹב here denotes well-being/prosperity
    in the context of royal splendor and success, not merely moral goodness. 'Prosperity'
    best matches the context, though 'wealth' is a possible narrower alternative.
- source_word: אֶל הַשְּׁמוּעָה אֲשֶׁר שָׁמָעְתִּי
  chosen: the report that I heard
  alternatives:
  - the news that I heard
  - the rumor that I heard
  lexicon: HALOT
  rationale: שְׁמוּעָה refers to a report or news heard about someone. 'Report' is
    suitably neutral and fits the formal royal setting better than 'rumor.'
