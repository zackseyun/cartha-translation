id: 1KI.10.9
reference: 1 Kings 10:9
source:
  edition: WLC
  text: יְהִ֨י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בָּר֔וּךְ אֲשֶׁר֙ חָפֵ֣ץ בְּ/ךָ֔ לְ/תִתְּ/ךָ֖ עַל כִּסֵּ֣א יִשְׂרָאֵ֑ל בְּ/אַהֲבַ֨ת יְהוָ֤ה אֶת יִשְׂרָאֵל֙ לְ/עֹלָ֔ם וַ/יְשִֽׂימְ/ךָ֣ לְ/מֶ֔לֶךְ לַ/עֲשׂ֥וֹת מִשְׁפָּ֖ט וּ/צְדָקָֽה־־׃
translation:
  text: Blessed be Yahweh your God, who delighted in you to set you on the throne of Israel. Because Yahweh loved Israel forever, he has made you king to administer justice and righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because of the LORD's love for Israel forever.' The Hebrew phrase may be rendered more literally with 'love' as a noun rather than the verbal 'loves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי ... בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - May ... be blessed
  lexicon: HALOT
  rationale: The jussive of היה with the predicate בָּרוּךְ forms a benedictory expression. 'Blessed be' is idiomatic, natural English for this blessing formula and preserves the optative force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' is the natural equivalent.
- source_word: אֲשֶׁר חָפֵץ בְּךָ
  chosen: who delighted in you
  alternatives:
  - who took pleasure in you
  - who was pleased with you
  lexicon: HALOT
  rationale: חפץ with ב marks pleasure or delight in a person. 'Delighted in you' conveys warm favor more clearly than the flatter 'was pleased with you'.
- source_word: לְתִתְּךָ עַל כִּסֵּא יִשְׂרָאֵל
  chosen: to set you on the throne of Israel
  alternatives:
  - to place you on the throne of Israel
  lexicon: HALOT
  rationale: The infinitive with נתן plus עַל כִּסֵּא expresses appointment to royal rule. 'Set you on the throne' is idiomatic and preserves the enthronement imagery.
- source_word: בְּאַהֲבַת יְהוָה אֶת יִשְׂרָאֵל לְעֹלָם
  chosen: Because the LORD loves Israel forever
  alternatives:
  - In the LORD's love for Israel forever
  - Because of the LORD's love for Israel forever
  lexicon: HALOT
  rationale: The prefixed ב on the infinitive/abstract noun construction is best taken causally here in context, introducing the reason for Solomon's appointment. Rendering it as 'Because the LORD loves Israel forever' gives clear English while preserving the causal sense and ongoing force of לְעוֹלָם.
- source_word: וַיְשִׂימְךָ לְמֶלֶךְ
  chosen: he has made you king
  alternatives:
  - he made you king
  - he appointed you king
  lexicon: HALOT
  rationale: שׂים + ל marks appointment. 'Has made you king' fits the queen's present acknowledgment of a completed divine act; 'appointed' is possible but slightly more bureaucratic in tone.
- source_word: לַעֲשׂוֹת
  chosen: to administer
  alternatives:
  - to do
  - to carry out
  lexicon: HALOT
  rationale: Although עשה literally means 'to do,' with משפט וצדקה in royal context it refers to governing activity. 'Administer' captures the judicial-royal sense without over-paraphrasing.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this royal context, מִשְׁפָּט refers to just governance and legal judgment. 'Justice' is the clearest modern rendering.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness or right order. Paired with מִשְׁפָּט, 'justice and righteousness' preserves the established Hebrew collocation and its ethical breadth.
