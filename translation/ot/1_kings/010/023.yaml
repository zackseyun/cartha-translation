id: 1KI.10.23
reference: 1 Kings 10:23
source:
  edition: WLC
  text: וַ/יִּגְדַּל֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה מִ/כֹּ֖ל מַלְכֵ֣י הָ/אָ֑רֶץ לְ/עֹ֖שֶׁר
    וּ/לְ/חָכְמָֽה׃
translation:
  text: So King Solomon surpassed all the kings of the earth in wealth and wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And King Solomon became greater than all the kings of
      the earth in wealth and wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: surpassed
  alternatives:
  - became greater than
  - grew greater than
  - was greater than
  lexicon: HALOT
  rationale: The verb גדל in this comparative construction with מִן conveys becoming
    or being greater than others. In idiomatic English, 'surpassed' captures the comparative
    sense clearly and naturally without overstating the Hebrew.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English normally renders the appositional phrase as the title plus personal
    name. This preserves both the definite title and the proper name in readable form.
- source_word: מִכֹּל מַלְכֵי הָאָרֶץ
  chosen: all the kings of the earth
  alternatives:
  - all the kings of the land
  - all the kings of the world
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this royal-comparative context,
    the broader sense 'earth' best fits the conventional scope of international kingship
    claims and matches the likely intent of universal comparison.
- source_word: לְעֹשֶׁר
  chosen: in wealth
  alternatives:
  - in riches
  - for wealth
  lexicon: HALOT
  rationale: עֹשֶׁר denotes material wealth or riches. 'Wealth' is clear modern English
    and fits the comparative construction with the following noun.
- source_word: וּלְחָכְמָה
  chosen: and wisdom
  alternatives:
  - and in wisdom
  lexicon: HALOT
  rationale: 'חָכְמָה is straightforwardly ''wisdom.'' English can omit repeating
    ''in'' before the second coordinated noun while preserving the sense: ''in wealth
    and wisdom.'''
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw here advances the narrative/result. 'So' brings out
    the summarizing/resultative force in smooth English, though 'And' would also be
    possible in a more formal rendering.
