id: 1KI.10.26
reference: 1 Kings 10:26
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֣ף שְׁלֹמֹה֮ רֶ֣כֶב וּ/פָרָשִׁים֒ וַ/יְהִי ל֗/וֹ אֶ֤לֶף וְ/אַרְבַּע
    מֵאוֹת֙ רֶ֔כֶב וּ/שְׁנֵים עָשָׂ֥ר אֶ֖לֶף פָּֽרָשִׁ֑ים וַ/יַּנְחֵ/ם֙ בְּ/עָרֵ֣י
    הָ/רֶ֔כֶב וְ/עִם הַ/מֶּ֖לֶךְ בִּ/ירוּשָׁלִָֽם־־־־׃
translation:
  text: Solomon gathered chariots and horsemen, and he had 1,400 chariots and 12,000
    horsemen, and he stationed them in the chariot cities and with the king in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cavalry' for 'horsemen'; the Hebrew more literally refers to mounted
      riders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - collected
  - accumulated
  lexicon: HALOT
  rationale: The verb אסף here denotes assembling or accumulating military resources.
    'Gathered' is natural English and preserves the sense without overstating administrative
    nuance.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: Although the singular form can function collectively, in English the
    count later in the verse requires the plural 'chariots.' This keeps the military
    reference concrete and readable.
- source_word: פָרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  - horses
  lexicon: HALOT
  rationale: The noun ordinarily refers to horsemen/riders rather than the animals
    themselves. 'Horsemen' preserves the lexical sense better than 'horses,' while
    avoiding the more interpretive collective 'cavalry.'
- source_word: וַיְהִי לוֹ
  chosen: he had
  alternatives:
  - there were for him
  - it came to be for him
  lexicon: HALOT
  rationale: This idiom expresses possession. 'He had' is the clearest natural English
    equivalent.
- source_word: אֶלֶף וְאַרְבַּע מֵאוֹת רֶכֶב
  chosen: 1,400 chariots
  alternatives:
  - one thousand four hundred chariots
  lexicon: HALOT
  rationale: The numeral phrase is rendered directly and idiomatically in modern English.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף פָּרָשִׁים
  chosen: 12,000 horsemen
  alternatives:
  - twelve thousand horsemen
  - 12,000 cavalry
  lexicon: HALOT
  rationale: The number is straightforward; 'horsemen' is retained for consistency
    with פָרָשִׁים earlier in the verse.
- source_word: וַיַּנְחֵם
  chosen: he stationed them
  alternatives:
  - he placed them
  - he settled them
  lexicon: HALOT
  rationale: The verb נוח in the Hiphil can mean to set down or place. In this military
    context, 'stationed them' best conveys deliberate deployment.
- source_word: בְּעָרֵי הָרֶכֶב
  chosen: in the chariot cities
  alternatives:
  - in the cities for chariots
  - in the chariot towns
  lexicon: HALOT
  rationale: This phrase refers to designated cities associated with chariot forces.
    'Chariot cities' is concise and reflects established military-administrative terminology.
- source_word: וְעִם הַמֶּלֶךְ בִּירוּשָׁלָם
  chosen: and with the king in Jerusalem
  alternatives:
  - and with the king at Jerusalem
  lexicon: HALOT
  rationale: The phrase indicates that some of the forces were kept near Solomon himself
    in Jerusalem. 'With the king in Jerusalem' is a direct rendering.
