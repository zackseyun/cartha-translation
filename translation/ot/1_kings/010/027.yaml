id: 1KI.10.27
reference: 1 Kings 10:27
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן הַ/מֶּ֧לֶךְ אֶת הַ/כֶּ֛סֶף בִּ/ירוּשָׁלִַ֖ם כָּ/אֲבָנִ֑ים וְ/אֵ֣ת
    הָ/אֲרָזִ֗ים נָתַ֛ן כַּ/שִּׁקְמִ֥ים אֲשֶׁר בַּ/שְּׁפֵלָ֖ה לָ/רֹֽב־־׃
translation:
  text: The king made silver as common in Jerusalem as stones, and he made cedars
    as plentiful as the sycamore trees that are in the Shephelah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the lowland.' 'Shephelah' is the name of the Judean foothill region
      between the hill country and the coastal plain.
    reason: cultural_note
  - marker: b
    text: Hebrew 'sycamores,' referring to sycamore fig trees.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  chosen: made ... as common / made ... as plentiful
  alternatives:
  - gave
  - put
  - made
  lexicon: HALOT
  rationale: Although נתן is literally 'gave/put,' in this idiom it means to cause
    something to be abundant or commonplace. Rendering with 'made ... as common/as
    plentiful' communicates the comparative abundance naturally in English while preserving
    the causative sense.
- source_word: הַמֶּלֶךְ
  chosen: The king
  alternatives:
  - King Solomon
  lexicon: HALOT
  rationale: The Hebrew has the definite noun 'the king,' referring contextually to
    Solomon but not naming him in this verse. The translation keeps the explicit wording
    of the source.
- source_word: הַכֶּסֶף
  chosen: silver
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: English idiom prefers the mass noun 'silver' without the article here.
    The sense is silver in general as a commodity.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering of the place name.
- source_word: כָּאֲבָנִים
  chosen: as stones
  alternatives:
  - like stones
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As stones' fits the idiom 'as common
    in Jerusalem as stones' in natural English.
- source_word: הָאֲרָזִים
  chosen: cedars
  alternatives:
  - cedar wood
  - cedar trees
  lexicon: HALOT
  rationale: The plural noun refers to cedars generally; in context it likely implies
    cedar timber/material, but 'cedars' preserves the Hebrew wording and common biblical
    idiom.
- source_word: כַּשִּׁקְמִים
  chosen: as the sycamore trees
  alternatives:
  - like sycamore trees
  - as sycamores
  lexicon: HALOT
  rationale: שקמים refers to sycamore fig trees, a common lowland tree in the Levant.
    'Sycamore trees' is clear modern English and preserves the comparison.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  chosen: that are in the Shephelah
  alternatives:
  - that were in the lowland
  - that are in the foothills
  lexicon: HALOT
  rationale: שפלה denotes the Judean lowland region. 'Shephelah' preserves the geographic
    term more precisely than the generic 'lowland,' while remaining accessible enough
    in context.
- source_word: לָרֹב
  chosen: as plentiful
  alternatives:
  - in abundance
  - for abundance
  - very many
  lexicon: HALOT
  rationale: This phrase expresses great quantity. 'As plentiful' completes the comparison
    smoothly in English and matches the abundance motif of the verse.
