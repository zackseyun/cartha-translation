id: 1KI.10.21
reference: 1 Kings 10:21
source:
  edition: WLC
  text: וְ֠/כֹל כְּלֵ֞י מַשְׁקֵ֨ה הַ/מֶּ֤לֶךְ שְׁלֹמֹה֙ זָהָ֔ב וְ/כֹ֗ל כְּלֵ֛י בֵּֽית
    יַ֥עַר הַ/לְּבָנ֖וֹן זָהָ֣ב סָג֑וּר אֵ֣ין כֶּ֗סֶף לֹ֥א נֶחְשָׁ֛ב בִּ/ימֵ֥י שְׁלֹמֹ֖ה
    לִ/מְאֽוּמָה־׃
translation:
  text: All King Solomon’s drinking vessels were gold, and all the vessels of the
    House of the Forest of Lebanon were pure gold. Silver was not considered anything
    in the days of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “refined gold.”
    reason: lexical_alternative
  - marker: b
    text: Or “Silver was not considered of any value in the days of Solomon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי מַשְׁקֵה
  chosen: drinking vessels
  alternatives:
  - drinking utensils
  - cups
  lexicon: HALOT
  rationale: כְּלֵי is a broad term for articles/vessels, and מַשְׁקֵה specifies drinking.
    'Drinking vessels' preserves the formal sense without narrowing too specifically
    to 'cups,' since the Hebrew can include a range of tableware used for drink.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; repeated in the verse for emphasis on
    wealth and splendor.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  chosen: the House of the Forest of Lebanon
  alternatives:
  - the palace of the Forest of Lebanon
  lexicon: HALOT
  rationale: This is the established designation of a specific royal building from
    the Hebrew wording 'house of the forest of Lebanon.' Retaining 'House' rather
    than 'palace' preserves the proper-name-like force and matches the source structure
    more closely.
- source_word: זָהָב סָגוּר
  chosen: pure gold
  alternatives:
  - refined gold
  - solid gold
  lexicon: HALOT
  rationale: סָגוּר with gold denotes high-quality, refined/pure gold. 'Pure gold'
    is idiomatic modern English and communicates the likely sense better than the
    more opaque literal 'shut up gold.' 'Solid gold' could overstate the nuance toward
    composition rather than quality.
- source_word: אֵין כֶּסֶף
  chosen: Silver was not
  alternatives:
  - There was no silver
  lexicon: HALOT
  rationale: The clause is idiomatically completed by the following predicate. Rendering
    with 'Silver was not considered...' best reflects the full Hebrew sense rather
    than isolating אֵין as mere nonexistence.
- source_word: לֹא נֶחְשָׁב
  chosen: was not considered
  alternatives:
  - was not counted
  - was not regarded
  lexicon: HALOT
  rationale: The Niphal of חשׁב here conveys estimation/value judgment. 'Was not considered'
    communicates that silver was treated as insignificant in value, not absent.
- source_word: לִמְאוּמָה
  chosen: anything
  alternatives:
  - as anything
  - for anything
  - of any value
  lexicon: HALOT
  rationale: In context the phrase means 'as anything/of any account.' 'Anything'
    in English after 'was not considered' yields a natural rendering while preserving
    the idiom's force that silver counted for nothing.
- source_word: בִּימֵי שְׁלֹמֹה
  chosen: in the days of Solomon
  alternatives:
  - during Solomon's days
  - in Solomon's time
  lexicon: HALOT
  rationale: A standard temporal expression. 'In the days of Solomon' is both natural
    and slightly more formal, fitting the narrative style.
