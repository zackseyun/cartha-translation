id: 1KI.10.25
reference: 1 Kings 10:25
source:
  edition: WLC
  text: וְ/הֵ֣מָּה מְבִאִ֣ים אִ֣ישׁ מִנְחָת֡/וֹ כְּלֵ֣י כֶסֶף֩ וּ/כְלֵ֨י זָהָ֤ב וּ/שְׂלָמוֹת֙
    וְ/נֵ֣שֶׁק וּ/בְשָׂמִ֔ים סוּסִ֖ים וּ/פְרָדִ֑ים דְּבַר שָׁנָ֖ה בְּ/שָׁנָֽה־׃ס
translation:
  text: 'And they were bringing, each man his tribute: articles of silver, articles
    of gold, garments, weapons, spices, horses, and mules, year by year.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each his gift' or 'each man his present'; the Hebrew מִנְחָה can denote
      a gift, offering, or tribute. Here 'tribute' reflects the royal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'cloaks' or 'robes' for 'garments.'
    reason: lexical_alternative
  - marker: c
    text: Or 'armor' for 'weapons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבִאִים
  chosen: were bringing
  alternatives:
  - brought
  lexicon: HALOT
  rationale: The participle with הֵמָּה gives an ongoing/customary sense in context,
    describing repeated action during Solomon's reign. English past progressive captures
    the durative/habitual nuance better than a simple preterite, while remaining natural.
- source_word: אִישׁ מִנְחָתוֹ
  chosen: each man his tribute
  alternatives:
  - each his gift
  - each man his present
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man/each one.' מִנְחָה here is not a
    grain offering but a gift rendered to a king, so 'tribute' best fits the political
    context of rulers and visitors honoring Solomon. 'Gift' is possible but weaker
    in this royal setting.
- source_word: כְּלֵי כֶסֶף
  chosen: articles of silver
  alternatives:
  - vessels of silver
  - objects of silver
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, object, implement'). Since the exact
    type is unspecified, 'articles' preserves breadth better than the narrower 'vessels.'
- source_word: וּכְלֵי זָהָב
  chosen: articles of gold
  alternatives:
  - vessels of gold
  - objects of gold
  lexicon: HALOT
  rationale: Rendered consistently with כְּלֵי כֶסֶף to preserve the parallelism and
    broad semantic range.
- source_word: שְׂלָמוֹת
  chosen: garments
  alternatives:
  - cloaks
  - robes
  lexicon: HALOT
  rationale: The term refers to outer garments/cloaks. 'Garments' is slightly broader
    and more natural in a list of tribute items; 'cloaks' is a viable more specific
    alternative.
- source_word: נֵשֶׁק
  chosen: weapons
  alternatives:
  - armor
  - arms
  lexicon: HALOT
  rationale: נשק in this context denotes military equipment. 'Weapons' is clear modern
    English and likely fits better than 'armor,' which may be too narrow; 'arms' is
    possible but less immediately clear to contemporary readers.
- source_word: בְשָׂמִים
  chosen: spices
  alternatives:
  - balsam
  - aromatics
  lexicon: HALOT
  rationale: A common rendering for aromatic substances in trade/tribute contexts.
    'Spices' is idiomatic and sufficiently broad.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Standard lexical meaning.
- source_word: פְרָדִים
  chosen: mules
  lexicon: HALOT
  rationale: Standard lexical meaning.
- source_word: דְּבַר שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - the matter of a year in a year
  - annually
  lexicon: HALOT
  rationale: This idiom denotes regular annual recurrence. 'Year by year' preserves
    the Hebrew flavor better than the more compressed 'annually'.
