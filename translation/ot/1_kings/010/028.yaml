id: 1KI.10.28
reference: 1 Kings 10:28
source:
  edition: WLC
  text: וּ/מוֹצָ֧א הַ/סּוּסִ֛ים אֲשֶׁ֥ר לִ/שְׁלֹמֹ֖ה מִ/מִּצְרָ֑יִם וּ/מִ/קְוֵ֕ה סֹחֲרֵ֣י
    הַ/מֶּ֔לֶךְ יִקְח֥וּ מִ/קְוֵ֖ה בִּ/מְחִֽיר׃
translation:
  text: And the importation of the horses that belonged to Solomon was from Egypt
    and Kue; the king’s merchants would obtain them from Kue at a price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another reading of the difficult Hebrew: “and from a drove;
      the king’s merchants would obtain a drove at a price.”'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term מִקְוֶה/מִקְוֵה in this verse is uncertain; it may be a
      place-name (Kue, likely in Cilicia) or a common noun meaning something like
      “drove” or “collection.”
    reason: cultural_note
lexical_decisions:
- source_word: מוֹצָא
  chosen: importation
  alternatives:
  - export
  - source
  - going out
  lexicon: HALOT
  rationale: The noun can denote 'going out,' 'origin,' or commercial export/import
    context. In this verse, with horses coming to Solomon from Egypt and another place,
    a trade sense is most natural. 'Importation' makes clear the direction relative
    to Solomon without over-paraphrasing.
- source_word: הַסּוּסִים
  chosen: the horses
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for horses.
- source_word: אֲשֶׁר לִשְׁלֹמֹה
  chosen: that belonged to Solomon
  alternatives:
  - for Solomon
  - of Solomon
  lexicon: HALOT
  rationale: The lamed with Solomon can be rendered more literally 'for Solomon,'
    but in context it identifies the horses in Solomon's possession or under his trade
    network. 'Belonged to Solomon' is idiomatic English and fits the commercial setting.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: וּמִקְוֵה
  chosen: and Kue
  alternatives:
  - and from Keveh
  - and from a drove
  lexicon: HALOT
  rationale: The term מקוה here is difficult and disputed. In this context, many understand
    it as the place-name Kue/Cilicia, especially because the same form appears again
    and suits an additional source region alongside Egypt. This avoids the awkward
    repetition if both instances are taken as 'drove.' The alternative lexical reading
    is preserved in a footnote.
- source_word: סֹחֲרֵי הַמֶּלֶךְ
  chosen: the king’s merchants
  alternatives:
  - the king's traders
  lexicon: HALOT
  rationale: Commercial agents in royal service; 'merchants' is natural modern English.
- source_word: יִקְחוּ
  chosen: would obtain
  alternatives:
  - would take
  - would buy
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in a trade context 'obtain' better reflects
    the commercial action without adding more specificity than the text states. 'Buy'
    is possible but the price phrase already conveys the transaction.
- source_word: מִקְוֵה
  chosen: from Kue
  alternatives:
  - from a drove
  - from Keveh
  lexicon: HALOT
  rationale: For consistency with the earlier occurrence and the likely geographical
    sense, this is rendered as the place-name. The alternative understanding as 'from
    a drove' is preserved in a footnote because the Hebrew is genuinely difficult.
- source_word: בִּמְחִיר
  chosen: at a price
  alternatives:
  - for a price
  - at the price
  lexicon: HALOT
  rationale: Indicates commercial purchase. 'At a price' is idiomatic and preserves
    the sense without implying a specific fixed tariff unless context requires it.
