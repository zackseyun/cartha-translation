id: 1KI.10.1
reference: 1 Kings 10:1
source:
  edition: WLC
  text: וּ/מַֽלְכַּת שְׁבָ֗א שֹׁמַ֛עַת אֶת שֵׁ֥מַע שְׁלֹמֹ֖ה לְ/שֵׁ֣ם יְהוָ֑ה וַ/תָּבֹ֥א לְ/נַסֹּת֖/וֹ בְּ/חִידֽוֹת־־׃
translation:
  text: Now the queen of Sheba heard of Solomon’s fame concerning the name of Yahweh, and she came to test him with riddles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report about Solomon in relation to the name of the LORD.' The Hebrew phrase is compact and may indicate that Solomon’s fame was connected with the LORD’s name or reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'with hard questions.' The Hebrew more literally refers to 'riddles' or 'enigmas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַֽלְכַּת
  chosen: Now the queen of
  alternatives:
  - And the queen of
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but at the start of a new episode 'now' gives natural English discourse flow while preserving the narrative continuation. 'Queen of' directly reflects the construct form 'queen of Sheba.'
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Standard transliteration of the place name, following the principle to transliterate names rather than translate them.
- source_word: שֹׁמַעַת
  chosen: heard
  alternatives:
  - was hearing
  - heard about
  lexicon: HALOT
  rationale: 'The participle in narrative context functions backgroundedly: ''heard'' is idiomatic English and fits the sequence leading to her visit. ''Heard about'' is possible but the object is specified by the following phrase.'
- source_word: אֶת שֵׁ֥מַע שְׁלֹמֹה
  chosen: of Solomon’s fame
  alternatives:
  - the report about Solomon
  - Solomon's reputation
  lexicon: HALOT
  rationale: שֵׁמַע denotes a report, news, or fame. In this context, where a distant queen hears and comes to investigate, 'fame' is concise and idiomatic. The preposition 'of' in English captures the object relation naturally.
- source_word: לְ/שֵׁם
  chosen: concerning the name of
  alternatives:
  - for the sake of the name of
  - with regard to the name of
  - because of the name of
  lexicon: HALOT
  rationale: 'The phrase is syntactically difficult. Here ל is best taken as indicating relation/reference: Solomon''s fame was in connection with the LORD''s name. ''Concerning'' preserves that association without over-interpreting causation or purpose.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַ/תָּבֹא
  chosen: and she came
  alternatives:
  - so she came
  lexicon: HALOT
  rationale: Standard rendering of the wayyiqtol advancing the narrative.
- source_word: לְ/נַסֹּת֖/וֹ
  chosen: to test him
  alternatives:
  - to try him
  - to prove him
  lexicon: HALOT
  rationale: נסה commonly means 'test, try.' In this context of intellectual examination, 'test him' is the clearest modern English choice.
- source_word: בְּ/חִידֽוֹת
  chosen: with riddles
  alternatives:
  - with hard questions
  - with enigmas
  lexicon: HALOT
  rationale: חִידוֹת refers to riddles or enigmatic sayings. 'Riddles' is the most direct lexical equivalent; 'hard questions' is more interpretive and influenced by older English tradition.
