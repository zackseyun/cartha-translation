id: 1KI.10.8
reference: 1 Kings 10:8
source:
  edition: WLC
  text: אַשְׁרֵ֣י אֲנָשֶׁ֔י/ךָ אַשְׁרֵ֖י עֲבָדֶ֣י/ךָ אֵ֑לֶּה הָֽ/עֹמְדִ֤ים לְ/פָנֶ֨י/ךָ֙
    תָּמִ֔יד הַ/שֹּׁמְעִ֖ים אֶת חָכְמָתֶֽ/ךָ־׃
translation:
  text: Blessed are your men; blessed are these your servants, who stand before you
    continually and hear your wisdom.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: HALOT
  rationale: The interjection expresses a state of enviable blessedness or well-being.
    'Blessed are' preserves the elevated register and conventional beatitude-like
    force better than the flatter 'happy' or 'fortunate.'
- source_word: אֲנָשֶׁיךָ
  chosen: your men
  alternatives:
  - your people
  lexicon: HALOT
  rationale: The noun אֲנָשִׁים is the masculine plural of 'man' and here most naturally
    refers to the king's male attendants/courtiers. Per the gender-accurate policy,
    'your men' is preferred over the more generic 'your people,' which would blur
    the source wording.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, in a royal court setting
    this commonly refers to officials or attendants in service to the king. The bonded
    nature is not the focus here, so 'servants' best fits the context and English
    idiom.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - those
  lexicon: HALOT
  rationale: The demonstrative is proximal, and 'these' naturally introduces the specific
    servants then described.
- source_word: הָעֹמְדִים לְפָנֶיךָ
  chosen: who stand before you
  alternatives:
  - who attend you
  - who stand in your presence
  lexicon: HALOT
  rationale: The idiom literally means standing before the king, often with the sense
    of attendance or service. The translation keeps the concrete image while remaining
    idiomatic in English.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: The adverb indicates regular, ongoing attendance. 'Continually' preserves
    the formal tone and avoids overstating an absolute sense that 'always' might suggest.
- source_word: הַשֹּׁמְעִים
  chosen: and hear
  alternatives:
  - listening to
  lexicon: HALOT
  rationale: The participle describes the servants as those who hear the king's wisdom.
    'And hear' reads smoothly in English while preserving the participial description
    in relation to the prior clause.
- source_word: חָכְמָתֶךָ
  chosen: your wisdom
  alternatives:
  - the wisdom you speak
  lexicon: HALOT
  rationale: The direct object is simply 'your wisdom,' referring to Solomon's wise
    speech and counsel. A more expansive rendering would add content not explicit
    in the Hebrew.
