id: 1KI.10.17
reference: 1 Kings 10:17
source:
  edition: WLC
  text: וּ/שְׁלֹשׁ מֵא֤וֹת מָֽגִנִּים֙ זָהָ֣ב שָׁח֔וּט שְׁלֹ֤שֶׁת מָנִים֙ זָהָ֔ב יַעֲלֶ֖ה
    עַל הַ/מָּגֵ֣ן הָ/אֶחָ֑ת וַ/יִּתְּנֵ֣/ם הַ/מֶּ֔לֶךְ בֵּ֖ית יַ֥עַר הַ/לְּבָנֽוֹן־־׃פ
translation:
  text: and three hundred shields of beaten gold; three minas of gold went onto each
    shield. And the king put them in the House of the Forest of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hammered gold' or 'gold beaten thin.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'three minas of gold went up on the one shield,' that
      is, each shield had three minas of gold applied to it.
    reason: lexical_alternative
  - marker: c
    text: The House of the Forest of Lebanon was a named royal building or armory
      associated with Solomon's palace complex (cf. 1 Kgs 7:2).
    reason: cross_reference
lexical_decisions:
- source_word: מָגִנִּים
  chosen: shields
  alternatives:
  - bucklers
  lexicon: HALOT
  rationale: מָגֵן is the larger defensive shield. In this context it contrasts with
    the smaller shields in the previous verse, so 'shields' is preferred over 'bucklers'
    in modern English while preserving the distinction by context.
- source_word: זָהָב שָׁחוּט
  chosen: beaten gold
  alternatives:
  - hammered gold
  - gold beaten thin
  lexicon: HALOT
  rationale: שָׁחוּט describes gold worked by beating/hammering into thin plates.
    'Beaten gold' is concise, natural English and reflects the manufacturing sense.
- source_word: שְׁלֹשֶׁת מָנִים
  chosen: three minas
  alternatives:
  - three manehs
  lexicon: HALOT
  rationale: מָנֶה is a weight unit. 'Mina' is the standard English rendering for
    readability; transliterating as 'maneh' is possible but less familiar.
- source_word: יַעֲלֶה עַל
  chosen: went onto
  alternatives:
  - went up on
  - was used for
  - covered
  lexicon: HALOT
  rationale: The idiom literally says the gold 'went up on' each shield, indicating
    the amount applied to each one. 'Went onto' preserves the concrete imagery better
    than the more interpretive 'was used for' or 'covered'.
- source_word: הַמָּגֵן הָאֶחָת
  chosen: each shield
  alternatives:
  - one shield
  - the one shield
  lexicon: HALOT
  rationale: Though formally singular ('the one shield'), in distributive contexts
    English idiom is 'each shield.' This best conveys the per-item allocation of three
    minas.
- source_word: וַיִּתְּנֵם
  chosen: put them
  alternatives:
  - placed them
  - set them
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/set.' Here the sense is placement in a location,
    so 'put them' is straightforward modern English.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  chosen: the House of the Forest of Lebanon
  alternatives:
  - the palace of the Forest of Lebanon
  lexicon: HALOT
  rationale: This is the established name of a specific royal building. 'House' preserves
    the Hebrew construct phrase more directly, while 'of the Forest of Lebanon' reflects
    the full proper designation.
