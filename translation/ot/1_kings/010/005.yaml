id: 1KI.10.5
reference: 1 Kings 10:5
source:
  edition: WLC
  text: וּ/מַאֲכַ֣ל שֻׁלְחָנ֡/וֹ וּ/מוֹשַׁ֣ב עֲבָדָי/ו֩ וּ/מַעֲמַ֨ד משרת/ו וּ/מַלְבֻּֽשֵׁי/הֶם֙
    וּ/מַשְׁקָ֔י/ו וְ/עֹ֣לָת֔/וֹ אֲשֶׁ֥ר יַעֲלֶ֖ה בֵּ֣ית יְהוָ֑ה וְ/לֹא הָ֥יָה בָ֛/הּ
    ע֖וֹד רֽוּחַ־׃
translation:
  text: the food of his table, the seating of his servants, the attendance of his
    ministers, their clothing, his cupbearers, and his burnt offering that he offered
    at the house of the LORD, there was no more breath in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “his ascent to the house of the LORD,” possibly referring to the stairway
      or procession by which he went up.
    reason: alternative_reading
lexical_decisions:
- source_word: מַאֲכַל שֻׁלְחָנוֹ
  chosen: the food of his table
  alternatives:
  - the provision of his table
  - the fare of his table
  lexicon: HALOT
  rationale: מַאֲכַל denotes food/provision for eating. 'The food of his table' is
    a natural but still fairly formal rendering that preserves the concrete image
    of what the queen observed.
- source_word: מוֹשַׁב עֲבָדָיו
  chosen: the seating of his servants
  alternatives:
  - the sitting of his servants
  - the place of his servants
  lexicon: HALOT
  rationale: מוֹשָׁב can denote seat, sitting, dwelling, or arrangement. In this courtly
    inventory, 'seating' best captures the ordered placement of Solomon's servants
    at table or in court.
- source_word: מַעֲמַד מְשָׁרְתָיו
  chosen: the attendance of his ministers
  alternatives:
  - the standing of his attendants
  - the service of his ministers
  lexicon: HALOT
  rationale: מַעֲמָד literally relates to standing/station, and מְשָׁרְתִים are attendants/ministers.
    'Attendance' conveys their formal station and service in courtly context without
    sounding awkwardly literal.
- source_word: מְשָׁרְתָיו
  chosen: ministers
  alternatives:
  - attendants
  - servants
  lexicon: HALOT
  rationale: Here the term refers to royal functionaries serving in an official capacity.
    'Ministers' distinguishes them from the broader עֲבָדָיו ('his servants') in the
    previous phrase.
- source_word: מַלְבֻּשֵׁיהֶם
  chosen: their clothing
  alternatives:
  - their garments
  - their attire
  lexicon: HALOT
  rationale: The noun refers to clothing/garments. 'Clothing' is clear modern English;
    'garments' is possible but slightly more traditional.
- source_word: מַשְׁקָיו
  chosen: his cupbearers
  alternatives:
  - his drinking service
  - his stewards of drink
  lexicon: HALOT
  rationale: In royal context the plural noun commonly refers to those who serve drink,
    i.e., cupbearers, rather than merely beverages. This fits the sequence of court
    personnel and arrangements.
- source_word: עֹלָתוֹ אֲשֶׁר יַעֲלֶה בֵּית יְהוָה
  chosen: his burnt offering that he offered at the house of the LORD
  alternatives:
  - the ascent by which he went up to the house of the LORD
  - his ascent to the house of the LORD
  lexicon: HALOT
  rationale: The consonantal text can be understood as עֹלָה, 'burnt offering,' yielding
    the traditional sense. Because the phrase has long been discussed as possibly
    meaning 'his ascent' or 'the stairway by which he went up,' the alternative is
    preserved in a footnote. The main text follows the MT vocalization and the immediate
    list of impressive royal and cultic features.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.'
    'House' preserves the Hebrew expression more directly than 'temple,' though the
    referent is the temple.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - spirit
  - composure
  lexicon: HALOT
  rationale: In the idiom 'there was no more רוּחַ in her,' the sense is that she
    was left breathless or overwhelmed. 'Breath' preserves the Hebrew image while
    remaining intelligible in English.
- source_word: וְלֹא הָיָה בָּהּ עוֹד רוּחַ
  chosen: there was no more breath in her
  alternatives:
  - she was breathless
  - her spirit left her
  lexicon: HALOT
  rationale: This clause is idiomatic for astonishment. The chosen rendering stays
    close to the Hebrew while allowing readers to infer the sense of being overwhelmed;
    a more dynamic paraphrase would risk over-interpretation.
