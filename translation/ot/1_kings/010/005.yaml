theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of עֹלָתוֹ in the final courtly list
  chosen_reading: his burnt offering that he offered at the house of the LORD
  alternative_readings:
  - his ascent to the house of the LORD
  - the stairway by which he went up to the house of the LORD
  rationale: The MT vocalization supports 'his burnt offering,' while some ancient
    versions and interpreters understand the consonants in relation to 'ascent.' Because
    the Hebrew has generated a genuine interpretive question, the main text follows
    the MT and a footnote preserves the alternative, in keeping with the principle
    of preserving tension where ambiguity is real.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
