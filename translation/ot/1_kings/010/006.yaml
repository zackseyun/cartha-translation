id: 1KI.10.6
reference: 1 Kings 10:6
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל הַ/מֶּ֔לֶךְ אֱמֶת֙ הָיָ֣ה הַ/דָּבָ֔ר אֲשֶׁ֥ר שָׁמַ֖עְתִּי
    בְּ/אַרְצִ֑/י עַל דְּבָרֶ֖י/ךָ וְ/עַל חָכְמָתֶֽ/ךָ־־־׃
translation:
  text: Then she said to the king, “The report that I heard in my own land about your
    words and your wisdom was true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about your affairs' or 'about your accomplishments.' The Hebrew 'your
      words' can also refer more broadly to matters concerning you.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then she said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then she said' is natural
    modern English while preserving the sequential force.
- source_word: אֶל־הַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; the definite article is preserved.
- source_word: אֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  - certainly
  lexicon: HALOT
  rationale: 'In the clause אֱמֶת הָיָה הַדָּבָר, the noun functions predicatively:
    ''the report was true.'' Rendering as the adjective ''true'' is idiomatic English
    and preserves the sense.'
- source_word: הָיָה הַדָּבָר
  chosen: the report ... was
  alternatives:
  - the matter ... was
  - the word ... was
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'report.' In context, the queen
    refers to what she had heard about Solomon, so 'report' best fits natural English
    and the discourse setting.
- source_word: אֲשֶׁר שָׁמַעְתִּי
  chosen: that I heard
  alternatives:
  - which I heard
  lexicon: HALOT
  rationale: Standard relative construction rendered idiomatically.
- source_word: בְּאַרְצִי
  chosen: in my own land
  alternatives:
  - in my land
  - in my country
  lexicon: HALOT
  rationale: '''Land'' is the more direct rendering of אֶרֶץ here. Adding ''own''
    reflects the first-person suffix naturally in English emphasis without changing
    meaning.'
- source_word: עַל־דְּבָרֶיךָ
  chosen: about your words
  alternatives:
  - about your matters
  - about your affairs
  - about your accomplishments
  lexicon: HALOT
  rationale: The plural דְּבָרִים can denote words, matters, or affairs. Here it likely
    refers to Solomon's sayings, reputation, or reported matters. 'Words' stays closer
    to the Hebrew while remaining intelligible alongside 'your wisdom.'
- source_word: וְעַל־חָכְמָתֶךָ
  chosen: and your wisdom
  lexicon: HALOT
  rationale: Direct and contextually central; preserves the coordinate structure with
    the previous phrase.
