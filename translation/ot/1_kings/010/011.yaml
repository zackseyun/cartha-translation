id: 1KI.10.11
reference: 1 Kings 10:11
source:
  edition: WLC
  text: וְ/גַם֙ אֳנִ֣י חִירָ֔ם אֲשֶׁר נָשָׂ֥א זָהָ֖ב מֵ/אוֹפִ֑יר הֵבִ֨יא מֵ/אֹפִ֜יר
    עֲצֵ֧י אַלְמֻגִּ֛ים הַרְבֵּ֥ה מְאֹ֖ד וְ/אֶ֥בֶן יְקָרָֽה־׃
translation:
  text: Also, Hiram’s fleet, which carried gold from Ophir, brought from Ophir a great
    quantity of almug wood and precious stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Hiram’s ship”; the Hebrew noun is singular, but it may function collectively
      for Hiram’s maritime enterprise.
    reason: lexical_alternative
  - marker: b
    text: “Almug wood” may also be rendered “algum wood”; the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces additional information connected to the preceding account.
    'Also' is concise and natural in English while preserving the additive force.
- source_word: אֳנִי חִירָם
  chosen: Hiram’s fleet
  alternatives:
  - the ship of Hiram
  - Hiram’s ship(s)
  lexicon: HALOT
  rationale: Although אֳנִי is morphologically singular, in context it functions collectively
    for seagoing transport associated with Hiram. English 'fleet' best captures the
    collective sense naturally, especially since the cargo described is substantial.
    'Ship of Hiram' would sound overly singular and potentially misleading.
- source_word: אֲשֶׁר נָשָׂא זָהָב
  chosen: which carried gold
  alternatives:
  - which bore gold
  - which transported gold
  lexicon: HALOT
  rationale: נָשָׂא literally means 'lift/carry/bear.' 'Carried gold' is idiomatic
    modern English and fits maritime cargo transport.
- source_word: מֵאוֹפִיר
  chosen: from Ophir
  lexicon: HALOT
  rationale: Standard rendering of the place name with prefixed preposition preserved.
- source_word: הֵבִיא
  chosen: brought
  alternatives:
  - imported
  - carried in
  lexicon: HALOT
  rationale: Common causative/ingressive sense of בוא in the Hiphil. 'Brought' is
    straightforward and contextually appropriate.
- source_word: עֲצֵי אַלְמֻגִּים
  chosen: almug wood
  alternatives:
  - algum wood
  - almug trees
  - sandalwood
  lexicon: HALOT
  rationale: The Hebrew term names a specific imported wood, but its exact botanical
    identification is uncertain. 'Almug wood' preserves the Hebrew-based traditional
    identification without over-specifying. 'Algum' reflects a variant form elsewhere;
    'sandalwood' is interpretive and too specific for the uncertainty.
- source_word: הַרְבֵּה מְאֹד
  chosen: a great quantity of
  alternatives:
  - very much
  - in great abundance
  lexicon: HALOT
  rationale: This idiom intensifies abundance. 'A great quantity of' reads naturally
    with a mass noun like 'wood' and preserves the emphasis.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and precious stones
  alternatives:
  - and precious stone
  - and costly stones
  - and valuable stone
  lexicon: HALOT
  rationale: Although אֶבֶן is singular in form, Hebrew often uses the singular collectively.
    English plural 'precious stones' best conveys the likely collective sense in a
    cargo list.
