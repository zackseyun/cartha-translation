id: 1KI.10.22
reference: 1 Kings 10:22
source:
  edition: WLC
  text: כִּי֩ אֳנִ֨י תַרְשִׁ֤ישׁ לַ/מֶּ֨לֶךְ֙ בַּ/יָּ֔ם עִ֖ם אֳנִ֣י חִירָ֑ם אַחַת֩
    לְ/שָׁלֹ֨שׁ שָׁנִ֜ים תָּב֣וֹא אֳנִ֣י תַרְשִׁ֗ישׁ נֹֽשְׂאֵת֙ זָהָ֣ב וָ/כֶ֔סֶף שֶׁנְהַבִּ֥ים
    וְ/קֹפִ֖ים וְ/תֻכִּיִּֽים׀׃
translation:
  text: For the king had ships of Tarshish at sea with Hiram’s ships. Once every three
    years the ships of Tarshish would come, carrying gold and silver, ivory, apes,
    and peacocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tarshish ships'; the phrase may refer either to ships associated with
      Tarshish or more generally to large seagoing vessels.
    reason: lexical_alternative
  - marker: b
    text: The exact identification of the animal is uncertain; traditionally 'peacocks,'
      but some understand it as 'parrots.'
    reason: lexical_alternative
  - marker: c
    text: '''Apes'' may also be rendered more broadly as ''monkeys.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for Solomon's abundance;
    'For' fits the discourse flow in English.
- source_word: אֳנִי תַרְשִׁישׁ
  chosen: ships of Tarshish
  alternatives:
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: The construct phrase is traditionally rendered 'ships of Tarshish.' It
    may denote ships associated with Tarshish or a class of large ocean-going vessels.
    The more literal rendering is kept in the main text, with the broader sense preserved
    in a footnote.
- source_word: לַמֶּלֶךְ
  chosen: the king had
  alternatives:
  - belonged to the king
  - for the king
  lexicon: HALOT
  rationale: The Hebrew preposition plus noun is idiomatically possessive in context.
    English requires an explicit verb, so 'had' conveys ownership/possession naturally
    without overtranslation.
- source_word: בַּיָּם
  chosen: at sea
  alternatives:
  - on the sea
  - in the sea
  lexicon: HALOT
  rationale: Idiomatic English for ships operating on the sea is 'at sea.'
- source_word: עִם אֳנִי חִירָם
  chosen: with Hiram’s ships
  alternatives:
  - with the ships of Hiram
  - together with Hiram's fleet
  lexicon: HALOT
  rationale: The singular אֳנִי functions collectively here in parallel with the earlier
    phrase; English plural 'ships' makes the sense clear.
- source_word: אַחַת לְשָׁלֹשׁ שָׁנִים
  chosen: Once every three years
  alternatives:
  - one time in three years
  - every third year
  lexicon: HALOT
  rationale: This is the natural English equivalent of the Hebrew idiom for periodic
    recurrence.
- source_word: תָּבֹא
  chosen: would come
  alternatives:
  - came
  - arrived
  lexicon: HALOT
  rationale: The imperfect here expresses customary action; 'would come' captures
    repeated past occurrence better than a simple preterite.
- source_word: נֹשֵׂאת
  chosen: carrying
  alternatives:
  - bringing
  - bearing
  lexicon: HALOT
  rationale: A participle describing what the ships customarily did upon arrival;
    'carrying' is straightforward modern English.
- source_word: זָהָב וָכֶסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Standard material terms with no special ambiguity.
- source_word: שֶׁנְהַבִּים
  chosen: ivory
  alternatives:
  - elephant tusks
  lexicon: HALOT
  rationale: The term conventionally denotes ivory; this is the clearest English rendering
    for modern readers.
- source_word: קֹפִים
  chosen: apes
  alternatives:
  - monkeys
  lexicon: HALOT
  rationale: The traditional and likely sense is nonhuman primates; 'apes' is retained
    as the conventional rendering, while acknowledging 'monkeys' as a possible broader
    alternative.
- source_word: תֻכִּיִּים
  chosen: peacocks
  alternatives:
  - parrots
  lexicon: HALOT
  rationale: The traditional rendering is 'peacocks,' though the exact species is
    uncertain and some suggest 'parrots.' The main text follows the longstanding probable
    sense, with the alternative preserved in a footnote.
