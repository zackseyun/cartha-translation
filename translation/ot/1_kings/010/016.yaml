id: 1KI.10.16
reference: 1 Kings 10:16
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/מֶּ֧לֶךְ שְׁלֹמֹ֛ה מָאתַ֥יִם צִנָּ֖ה זָהָ֣ב שָׁח֑וּט שֵׁשׁ
    מֵא֣וֹת זָהָ֔ב יַעֲלֶ֖ה עַל הַ/צִּנָּ֥ה הָ/אֶחָֽת־־׃
translation:
  text: King Solomon made two hundred large shields of beaten gold; six hundred shekels
    of gold went onto each shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'six hundred gold went up on the one shield'; 'shekels' is implied
      as the weight unit.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'shield' here refers to a large shield, likely distinct
      from the smaller shields mentioned in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb עשה here denotes producing or making the objects. 'Made'
    is natural modern English and sufficiently formal.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally combines the title and name as 'King Solomon'
    while preserving the referent.
- source_word: מָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: צִנָּה
  chosen: large shields
  alternatives:
  - shields
  lexicon: HALOT
  rationale: צִנָּה commonly refers to a large shield, distinct from smaller shield
    terms such as מָגֵן. 'Large shields' preserves the likely distinction, especially
    since the next verse mentions a different shield type.
- source_word: זָהָב שָׁחוּט
  chosen: beaten gold
  alternatives:
  - hammered gold
  - gold beaten thin
  lexicon: HALOT
  rationale: The participle שָׁחוּט describes gold worked by beating/hammering. 'Beaten
    gold' is concise, idiomatic, and reflects the manufacturing process.
- source_word: שֵׁשׁ מֵאוֹת זָהָב
  chosen: six hundred shekels of gold
  alternatives:
  - six hundred of gold
  - six hundred pieces of gold
  lexicon: HALOT
  rationale: The Hebrew omits the unit, but in this construction the weight unit 'shekels'
    is conventionally understood. Supplying 'shekels' makes the sense clear in English
    without over-paraphrasing.
- source_word: יַעֲלֶה עַל
  chosen: went onto
  alternatives:
  - was used for
  - went on
  lexicon: HALOT
  rationale: Literally 'went up on/upon.' In context of plating or overlaying a shield
    with gold, 'went onto' preserves the concrete imagery while remaining readable.
- source_word: הַצִּנָּה הָאֶחָת
  chosen: each shield
  alternatives:
  - one shield
  - the one shield
  lexicon: HALOT
  rationale: Although literally 'the one shield,' the distributive sense in English
    is best expressed as 'each shield,' since the statement specifies the amount for
    every shield among the two hundred.
