id: 1KI.10.4
reference: 1 Kings 10:4
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא֙ מַֽלְכַּת שְׁבָ֔א אֵ֖ת כָּל חָכְמַ֣ת שְׁלֹמֹ֑ה וְ/הַ/בַּ֖יִת אֲשֶׁ֥ר
    בָּנָֽה־־׃
translation:
  text: When the queen of Sheba saw all the wisdom of Solomon and the house that he
    had built,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace that he had built.' The Hebrew word 'house' can refer to
      a royal residence in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive on ראה advances the narrative. Rendering it as 'When
    ... saw' fits the verse's syntactic function as the beginning of a larger sentence
    continued in the next verse, better than a simple coordinate 'And saw' in English.
- source_word: מַלְכַּת שְׁבָא
  chosen: the queen of Sheba
  alternatives:
  - the Queen of Sheba
  lexicon: HALOT
  rationale: Construct phrase identifying the ruler of Sheba. Lowercase 'queen' follows
    normal English style for a descriptive title rather than a fixed proper name.
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: Marks the definite direct object and is not represented by a separate
    English word.
- source_word: כָּל חָכְמַת שְׁלֹמֹה
  chosen: all the wisdom of Solomon
  alternatives:
  - all Solomon's wisdom
  lexicon: HALOT
  rationale: כָּל plus construct noun gives the totality of Solomon's wisdom. 'Wisdom
    of Solomon' preserves the formal relationship while remaining natural English.
- source_word: וְהַבַּיִת
  chosen: and the house
  alternatives:
  - and the palace
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this royal context it likely refers
    to Solomon's palace complex, but 'house' is the more textually transparent rendering.
    The contextual alternative 'palace' is worth preserving in a footnote.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he had built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: Relative clause modifying 'house.' English past perfect ('had built')
    reads naturally in relation to her seeing what already stood completed.
