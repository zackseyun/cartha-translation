theological_decisions:
- issue: Rendering אֱלֹהִים in a non-covenant-name context
  chosen_reading: God
  rationale: The source uses אֱלֹהִים, not YHWH. Therefore the verse should read 'God,'
    not 'the LORD.' This preserves the lexical distinction in the Hebrew text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table
