id: 1KI.10.24
reference: 1 Kings 10:24
source:
  edition: WLC
  text: וְ/כָ֨ל הָ/אָ֔רֶץ מְבַקְשִׁ֖ים אֶת פְּנֵ֣י שְׁלֹמֹ֑ה לִ/שְׁמֹ֨עַ֙ אֶת חָכְמָת֔/וֹ
    אֲשֶׁר נָתַ֥ן אֱלֹהִ֖ים בְּ/לִבּֽ/וֹ־־־־׃
translation:
  text: And all the earth sought the presence of Solomon, to hear his wisdom that
    God had put in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sought the face of Solomon,'' an idiom for seeking his presence
      or audience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל הָ/אָרֶץ
  chosen: And all the earth
  alternatives:
  - And all the land
  - And the whole world
  lexicon: HALOT
  rationale: כָּל + הָאָרֶץ is a broad collective expression. In this royal-context
    hyperbolic idiom it refers to the peoples of the known world/earth rather than
    merely local territory. 'All the earth' preserves the Hebrew wording and the conventional
    ancient Near Eastern scope better than the more interpretive 'whole world.'
- source_word: מְבַקְשִׁים
  chosen: sought
  alternatives:
  - were seeking
  - looked for
  lexicon: HALOT
  rationale: The participle conveys ongoing/customary action; English simple past
    'sought' idiomatically captures the narrative summary sense. 'Were seeking' is
    possible but less natural in this context.
- source_word: אֶת פְּנֵי שְׁלֹמֹה
  chosen: the presence of Solomon
  alternatives:
  - the face of Solomon
  - an audience with Solomon
  lexicon: HALOT
  rationale: The idiom 'seek the face/presence of' means to seek access to or audience
    with someone. 'The presence of Solomon' preserves the Hebrew imagery while remaining
    natural English. 'An audience with Solomon' is slightly more dynamic and therefore
    not preferred for the main text.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To hear' is the straightforward rendering
    and works well with 'wisdom' in English.
- source_word: חָכְמָתוֹ
  chosen: his wisdom
  alternatives:
  - the wisdom he had
  lexicon: HALOT
  rationale: Simple possessive rendering matches the Hebrew suffix and keeps the focus
    on Solomon's God-given wisdom.
- source_word: אֲשֶׁר נָתַן אֱלֹהִים
  chosen: that God had put
  alternatives:
  - which God had given
  - that God gave
  lexicon: HALOT
  rationale: נָתַן literally means 'gave,' but with בְּלִבּוֹ the idiomatic English
    expression 'put in his heart' is more natural while remaining faithful to the
    Hebrew sense. The pluperfect 'had put' fits the prior bestowal of wisdom before
    the nations came to hear it.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - in his mind
  - within him
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew commonly denotes the inner person, including intellect
    and will. 'Heart' should be retained in the main text to preserve the Hebrew anthropology
    rather than reducing it to mere cognition with 'mind.'
