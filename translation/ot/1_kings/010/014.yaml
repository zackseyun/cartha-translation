id: 1KI.10.14
reference: 1 Kings 10:14
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִשְׁקַ֣ל הַ/זָּהָ֔ב אֲשֶׁר בָּ֥א לִ/שְׁלֹמֹ֖ה בְּ/שָׁנָ֣ה אֶחָ֑ת
    שֵׁ֥שׁ מֵא֛וֹת שִׁשִּׁ֥ים וָ/שֵׁ֖שׁ כִּכַּ֥ר זָהָֽב־׃
translation:
  text: Now the weight of the gold that came to Solomon in one year was six hundred
    sixty-six talents of gold,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A talent was a large unit of weight; the verse reports the annual amount
      by ancient measure rather than converting it into modern units.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - It came to pass that ... was
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a new narrative statement. 'Now
    ... was' is natural modern English and preserves the discourse shift without archaic
    padding.
- source_word: מִשְׁקַל
  chosen: weight
  alternatives:
  - amount by weight
  - weighing
  lexicon: HALOT
  rationale: The noun denotes weight/measure. 'Weight' is the most direct and idiomatic
    rendering in this accounting context.
- source_word: הַזָּהָב ... זָהָב
  chosen: the gold ... of gold
  alternatives:
  - gold ...
  - the gold ... gold
  lexicon: HALOT
  rationale: The first occurrence is definite and identifies the commodity; the second
    specifies the material after 'talents.' Retaining 'of gold' reflects the Hebrew
    construction and avoids leaving 'talents' unspecified.
- source_word: אֲשֶׁר בָּא לִשְׁלֹמֹה
  chosen: that came to Solomon
  alternatives:
  - that came in to Solomon
  - that was brought to Solomon
  - that accrued to Solomon
  lexicon: HALOT
  rationale: בוא with ל marks what came to or reached Solomon. 'Came to Solomon' is
    sufficiently literal and does not over-specify agency, unlike 'was brought.'
- source_word: בְּשָׁנָה אֶחָת
  chosen: in one year
  alternatives:
  - in a single year
  - yearly in one year
  lexicon: HALOT
  rationale: This phrase indicates the amount received within the span of a year.
    'In one year' is clear and close to the Hebrew.
- source_word: שֵׁשׁ מֵאוֹת שִׁשִּׁים וָשֵׁשׁ
  chosen: six hundred sixty-six
  alternatives:
  - six hundred and sixty-six
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The form without 'and' is
    standard contemporary English style.
- source_word: כִּכַּר
  chosen: talents
  alternatives:
  - talent-units
  - talent
  lexicon: HALOT
  rationale: כִּכָּר is the standard ancient weight unit commonly rendered 'talent.'
    The familiar term is retained rather than converted into modern measures in the
    main text.
