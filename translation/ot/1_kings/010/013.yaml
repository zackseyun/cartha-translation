id: 1KI.10.13
reference: 1 Kings 10:13
source:
  edition: WLC
  text: וְ/הַ/מֶּ֨לֶךְ שְׁלֹמֹ֜ה נָתַ֣ן לְ/מַֽלְכַּת שְׁבָ֗א אֶת כָּל חֶפְצָ/הּ֙ אֲשֶׁ֣ר
    שָׁאָ֔לָה מִ/לְּ/בַד֙ אֲשֶׁ֣ר נָֽתַן לָ֔/הּ כְּ/יַ֖ד הַ/מֶּ֣לֶךְ שְׁלֹמֹ֑ה וַ/תֵּ֛פֶן
    וַ/תֵּ֥לֶךְ לְ/אַרְצָ֖/הּ הִ֥יא וַ/עֲבָדֶֽי/הָ־־־־׃ס
translation:
  text: And King Solomon gave the queen of Sheba all that she desired, whatever she
    asked, besides what he gave her according to the bounty of King Solomon. Then
    she turned and went to her own land, she and her servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to the hand of King Solomon,'' an idiom meaning according
      to his means or generosity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  chosen: gave
  alternatives:
  - granted
  - presented
  lexicon: HALOT
  rationale: Common verb for giving; 'gave' is the plain and natural English equivalent
    here and fits both occurrences in the verse.
- source_word: מַלְכַּת שְׁבָא
  chosen: the queen of Sheba
  alternatives:
  - the queen of Sheba
  lexicon: HALOT
  rationale: Construct phrase with place name; standard English rendering preserves
    the title and transliterates the proper name per project policy.
- source_word: כָּל חֶפְצָהּ
  chosen: all that she desired
  alternatives:
  - all her desire
  - everything she wanted
  lexicon: HALOT
  rationale: חֵפֶץ denotes desire, pleasure, or that which is desired. The idiomatic
    English expression 'all that she desired' preserves the sense without awkward
    literalism.
- source_word: אֲשֶׁר שָׁאָלָה
  chosen: whatever she asked
  alternatives:
  - that she asked for
  - which she requested
  lexicon: HALOT
  rationale: שׁאל here means to ask/request. 'Whatever she asked' captures the relative
    clause naturally and emphasizes the comprehensiveness of Solomon's giving.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks addition or exception. 'Besides' is concise and fits the syntax
    well in modern English.
- source_word: כְּיַד הַמֶּלֶךְ שְׁלֹמֹה
  chosen: according to the bounty of King Solomon
  alternatives:
  - according to the hand of King Solomon
  - as befitted King Solomon
  - according to King Solomon's means
  lexicon: HALOT
  rationale: Literally 'according to the hand of King Solomon,' an idiom referring
    to what was in one's power, means, or generosity. 'According to the bounty of
    King Solomon' communicates the idiomatic sense in readable English while preserving
    the royal generosity implied.
- source_word: וַתֵּפֶן
  chosen: she turned
  alternatives:
  - she departed
  - she set out
  lexicon: HALOT
  rationale: The verb literally means to turn. Retaining 'she turned' preserves the
    narrative sequence before 'went' without collapsing the two verbs into one.
- source_word: וַתֵּלֶךְ לְאַרְצָהּ
  chosen: went to her own land
  alternatives:
  - went to her land
  - returned to her land
  lexicon: HALOT
  rationale: הלך plus destination indicates movement to her homeland. 'Her own land'
    makes the possessive sense natural in English without adding more than the Hebrew
    implies.
- source_word: הִיא וַעֲבָדֶיהָ
  chosen: she and her servants
  alternatives:
  - she and her attendants
  lexicon: HALOT
  rationale: עבדים can mean servants or attendants in royal contexts. 'Servants' is
    the more direct lexical equivalent and suits the court setting without implying
    slavery as the focus of this verse.
