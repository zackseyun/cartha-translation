theological_decisions:
- issue: Rendering the idiom כְּיַד הַמֶּלֶךְ שְׁלֹמֹה
  chosen_reading: according to the bounty of King Solomon
  alternative_readings:
  - according to the hand of King Solomon
  - according to King Solomon's means
  rationale: This is not a major doctrinal issue, but it is interpretively significant.
    The Hebrew idiom 'according to the hand' points to capacity, means, or generosity.
    The chosen rendering avoids wooden English while preserving the sense that Solomon
    gave gifts befitting his royal wealth and status.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering עֲבָדֶיהָ in a royal narrative
  chosen_reading: her servants
  alternative_readings:
  - her attendants
  rationale: The term can denote servants broadly and in some contexts slaves. Here
    the verse simply identifies the queen's accompanying personnel. 'Servants' is
    the most straightforward rendering and does not import a stronger social claim
    than the context requires.
  doctrine_reference: Translation philosophy §1, §5
