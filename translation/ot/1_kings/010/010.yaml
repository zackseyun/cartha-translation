id: 1KI.10.10
reference: 1 Kings 10:10
source:
  edition: WLC
  text: וַ/תִּתֵּ֨ן לַ/מֶּ֜לֶךְ מֵאָ֥ה וְ/עֶשְׂרִ֣ים כִּכַּ֣ר זָהָ֗ב וּ/בְשָׂמִ֛ים
    הַרְבֵּ֥ה מְאֹ֖ד וְ/אֶ֣בֶן יְקָרָ֑ה לֹא בָא֩ כַ/בֹּ֨שֶׂם הַ/ה֥וּא עוֹד֙ לָ/רֹ֔ב
    אֲשֶׁר נָתְנָ֥ה מַֽלְכַּת שְׁבָ֖א לַ/מֶּ֥לֶךְ שְׁלֹמֹֽה׀־־־׃
translation:
  text: And she gave the king one hundred and twenty talents of gold, and a very great
    quantity of spices, and precious stones. Never again did such an abundance of
    spices come as those that the queen of Sheba gave to King Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'spice' is singular in the comparison clause ('like that spice')
      but likely functions collectively, hence 'such an abundance of spices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: And she gave
  alternatives:
  - Then she gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן advances the narrative; 'And she gave' is natural English
    narrative sequence without overemphasizing temporality.
- source_word: לַמֶּלֶךְ
  chosen: the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: English idiom after 'gave' can omit repeated 'to'; the indirect object
    is still clearly represented.
- source_word: מֵאָה וְעֶשְׂרִים כִּכַּר זָהָב
  chosen: one hundred and twenty talents of gold
  alternatives:
  - 120 talents of gold
  lexicon: HALOT
  rationale: כִּכָּר is a weight measure, conventionally 'talent.' Retaining the ancient
    unit is more transparent than converting to modern weights.
- source_word: וּבְשָׂמִים הַרְבֵּה מְאֹד
  chosen: and a very great quantity of spices
  alternatives:
  - and very many spices
  - and spices in great abundance
  lexicon: HALOT
  rationale: בְשָׂמִים refers to aromatic spices/balsam-type goods. הַרְבֵּה מְאֹד
    intensifies quantity; 'a very great quantity' renders the sense idiomatically.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and precious stones
  alternatives:
  - and precious stone
  - and costly stones
  lexicon: HALOT
  rationale: Though אֶבֶן is singular, Hebrew often uses singular collectively; English
    plural 'stones' best conveys the likely collective sense in a gift list.
- source_word: לֹא בָא
  chosen: Never again did ... come
  alternatives:
  - there did not come again
  - never came again
  lexicon: HALOT
  rationale: בוא here means 'arrive/come' in the sense of being brought or appearing.
    The negative with עוֹד gives the force of 'never again.'
- source_word: כַבֹּשֶׂם הַהוּא
  chosen: such ... spices
  alternatives:
  - that spice
  - spices like that
  lexicon: HALOT
  rationale: Though בֹּשֶׂם is singular with article, it functions generically/collectively
    for aromatic spice. 'Such ... spices' captures the comparison naturally in English.
- source_word: לָרֹב
  chosen: an abundance
  alternatives:
  - in such quantity
  - so much
  lexicon: HALOT
  rationale: The phrase expresses extent/quantity. 'An abundance' gives a clear nominal
    expression in English and matches the comparative force of the clause.
- source_word: אֲשֶׁר נָתְנָה מַלְכַּת שְׁבָא
  chosen: as those that the queen of Sheba gave
  alternatives:
  - which the queen of Sheba gave
  - as the queen of Sheba gave
  lexicon: HALOT
  rationale: The relative clause specifies the benchmark for comparison. Adding 'those'
    smooths the English because the antecedent is a collective/generic noun.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - to the king, Solomon
  lexicon: HALOT
  rationale: English naturally renders the appositional title-name combination as
    'King Solomon.'
