id: 1KI.10.15
reference: 1 Kings 10:15
source:
  edition: WLC
  text: לְ/בַד֙ מֵ/אַנְשֵׁ֣י הַ/תָּרִ֔ים וּ/מִסְחַ֖ר הָ/רֹכְלִ֑ים וְ/כָל מַלְכֵ֥י
    הָ/עֶ֖רֶב וּ/פַח֥וֹת הָ/אָֽרֶץ־׃
translation:
  text: besides what came from the traveling merchants and from the trade of the merchants,
    and from all the kings of Arabia and the governors of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the men who traveled about'; the Hebrew phrase is difficult and
      may refer more generally to itinerant traders.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the kings of the mixed peoples'; the Hebrew עֶרֶב can carry that
      sense in some contexts, though 'Arabia' best fits here.
    reason: alternative_reading
  - marker: c
    text: Or 'provincial governors' or 'satraps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces an exception/addition to the previously stated total. 'Besides'
    is concise and idiomatic in context.
- source_word: מֵאַנְשֵׁי הַתָּרִים
  chosen: what came from the traveling merchants
  alternatives:
  - from the men who explored/traveled
  - from the traders
  lexicon: HALOT
  rationale: The phrase is difficult, but in this commercial context תָּרִים is best
    understood of those who travel about, likely itinerant traders. Rendering the
    whole phrase as a source of revenue ('what came from the traveling merchants')
    makes good English while preserving the sense of income derived from them.
- source_word: וּמִסְחַר
  chosen: and from the trade of
  alternatives:
  - and from the merchandise of
  - and from the business of
  lexicon: HALOT
  rationale: מִסְחַר denotes trade or commercial traffic. 'Trade' is the most natural
    modern English equivalent here.
- source_word: הָרֹכְלִים
  chosen: the merchants
  alternatives:
  - the traders
  - the peddlers
  lexicon: HALOT
  rationale: רֹכֵל refers to one engaged in trade. 'Merchants' fits the royal-economic
    context better than the narrower 'peddlers.'
- source_word: וְכָל מַלְכֵי הָעֶרֶב
  chosen: and from all the kings of Arabia
  alternatives:
  - and all the kings of the Arabians
  - and all the kings of the mixed peoples
  lexicon: HALOT
  rationale: עֶרֶב here is traditionally and plausibly understood as Arabia/Arabian
    peoples in this geopolitical list. 'Arabia' is the clearest modern geographic
    rendering. The alternative sense 'mixed peoples' is possible in other contexts
    but is less likely here.
- source_word: וּפַחוֹת הָאָרֶץ
  chosen: and the governors of the land
  alternatives:
  - and the provincial governors of the land
  - and the satraps of the land
  lexicon: HALOT
  rationale: פַּחוֹת denotes regional officials or governors under larger authority.
    'Governors' is clear and avoids the more historically specific 'satraps' unless
    the context demands Persian-period precision, which it does not here.
