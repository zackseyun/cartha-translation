id: 1KI.10.12
reference: 1 Kings 10:12
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ הַ֠/מֶּלֶךְ אֶת עֲצֵ֨י הָ/אַלְמֻגִּ֜ים מִסְעָ֤ד לְ/בֵית יְהוָה֙
    וּ/לְ/בֵ֣ית הַ/מֶּ֔לֶךְ וְ/כִנֹּר֥וֹת וּ/נְבָלִ֖ים לַ/שָּׁרִ֑ים לֹ֣א בָֽא כֵ֞ן
    עֲצֵ֤י אַלְמֻגִּים֙ וְ/לֹ֣א נִרְאָ֔ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: The king made the almug wood into supports for the house of the LORD and for
    the king’s house, and lyres and harps for the singers. Never before had such almug
    wood come, nor has any been seen to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “algum wood.” The related term appears with a variant spelling in parallel/tradition
      history.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered “supports” is rare and may also refer to architectural
      features such as steps or railings.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצֵי הָאַלְמֻגִּים
  chosen: the almug wood
  alternatives:
  - the algum wood
  - the almug trees
  lexicon: HALOT
  rationale: The term refers to a valuable imported wood species; English readers
    are best served by retaining the traditional species name in transliteration rather
    than guessing a modern botanical equivalent. Singular collective 'wood' is more
    natural in English than a literal plural 'trees/woods' in this construction. 'Algum'
    is a known textual/orthographic alternative elsewhere, but here the MT reads אַלְמֻגִּים.
- source_word: מִסְעָד
  chosen: supports
  alternatives:
  - steps
  - railing
  - pillars
  lexicon: HALOT
  rationale: The noun is rare and uncertain. 'Supports' is a cautious rendering broad
    enough to fit architectural use in both the temple and palace without overcommitting
    to 'steps,' which is traditional but less certain from the Hebrew alone.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew idiom בֵּית while remaining
    clear. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: וּלְבֵית הַמֶּלֶךְ
  chosen: and for the king’s house
  alternatives:
  - and for the royal palace
  lexicon: HALOT
  rationale: Keeps the parallel with 'house of the LORD' and reflects the Hebrew literally.
    'Palace' is possible but less formally parallel.
- source_word: וְכִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: כִּנּוֹר is commonly identified as a lyre-type stringed instrument. Rendering
    it distinctly from נְבָלִים avoids collapsing two different instruments into one
    English term.
- source_word: וּנְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - psalteries
  lexicon: HALOT
  rationale: A conventional modern rendering for נֵבֶל as a stringed instrument distinct
    from כִּנּוֹר. Exact instrument identification is uncertain, but 'harps' is readable
    and traditional enough without being archaic.
- source_word: לַשָּׁרִים
  chosen: for the singers
  alternatives:
  - for the musicians
  lexicon: HALOT
  rationale: From the participle of שׁיר, 'those who sing.' 'Singers' is more precise
    than the broader 'musicians.'
- source_word: לֹא בָא כֵן
  chosen: Never before had such ... come
  alternatives:
  - No such ... had come
  - There had not come thus
  lexicon: HALOT
  rationale: An idiomatic English rendering of the Hebrew negative plus perfect with
    כֵּן expressing unprecedented arrival/importation. 'Never before' captures the
    sense naturally.
- source_word: וְלֹא נִרְאָה עַד הַיּוֹם הַזֶּה
  chosen: nor has any been seen to this day
  alternatives:
  - nor was any seen until this day
  - nor has it appeared to this day
  lexicon: HALOT
  rationale: English present perfect best conveys the continuing force of the statement
    from the narrator's standpoint. 'Any' makes explicit the implied repetition of
    the wood/items in idiomatic English.
