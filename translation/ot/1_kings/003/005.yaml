id: 1KI.3.5
reference: 1 Kings 3:5
source:
  edition: WLC
  text: בְּ/גִבְע֗וֹן נִרְאָ֧ה יְהֹוָ֛ה אֶל שְׁלֹמֹ֖ה בַּ/חֲל֣וֹם הַ/לָּ֑יְלָה וַ/יֹּ֣אמֶר
    אֱלֹהִ֔ים שְׁאַ֖ל מָ֥ה אֶתֶּן לָֽ/ךְ־־׃
translation:
  text: At Gibeon the LORD appeared to Solomon in a dream by night, and God said,
    “Ask what I should give you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the dream of the night''; that is, in a dream during the night.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/גִבְעוֹן
  chosen: At Gibeon
  alternatives:
  - In Gibeon
  lexicon: HALOT
  rationale: The preposition ב marks location. 'At Gibeon' is idiomatic in English
    for a place-name and fits the narrative setting naturally, while preserving the
    locative sense.
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: Nifal of ראה here is the standard idiom for a divine appearance. 'Appeared'
    is the most natural and established English equivalent without overinterpreting
    the mode of revelation.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' to follow the stated default
    and preserve the conventional distinction for the divine name.
- source_word: אֶל שְׁלֹמֹה
  chosen: to Solomon
  alternatives:
  - before Solomon
  lexicon: HALOT
  rationale: אֶל marks the direction/recipient of the appearance. 'To Solomon' is
    the natural English rendering in this context.
- source_word: בַּ/חֲלֹם הַ/לָּיְלָה
  chosen: in a dream by night
  alternatives:
  - in a dream at night
  - in the dream of the night
  lexicon: HALOT
  rationale: The phrase is literally 'in the dream of the night.' 'In a dream by night'
    preserves the Hebrew flavor and the nocturnal setting while remaining readable
    modern English.
- source_word: וַ/יֹּאמֶר
  chosen: and ... said
  alternatives:
  - then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Simple 'and ... said' is
    sufficient and avoids adding temporal nuance beyond the Hebrew.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although the subject has just been named as YHWH, the Hebrew now uses
    אֱלֹהִים. Rendering it 'God' reflects the actual lexical shift in the source rather
    than smoothing it away.
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Request
  - Ask for
  lexicon: HALOT
  rationale: The imperative is direct and open-ended. 'Ask' is the simplest and most
    faithful rendering; 'ask for' would slightly over-specify the construction.
- source_word: מָה אֶתֶּן לָךְ
  chosen: what I should give you
  alternatives:
  - what I shall give you
  - what I may give you
  - what I am to give you
  lexicon: HALOT
  rationale: The Hebrew literally reads 'what shall I give you?' In English after
    'Ask,' the indirect-question form 'what I should give you' is idiomatic and preserves
    the sense without archaic stiffness.
