theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name, and the project's contested-terms
    table specifies 'the LORD' as the default rendering. The main text follows that
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Preserving the lexical shift from יהוה to אֱלֹהִים within the same verse
  chosen_reading: Render יהוה as 'the LORD' and אֱלֹהִים as 'God'
  alternative_readings:
  - Render both simply as 'God'
  - Harmonize the second term to 'the LORD' for stylistic smoothness
  rationale: The Hebrew intentionally uses two different divine designations in close
    succession. Preserving the shift maintains transparency to the source text and
    avoids interpretive smoothing.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Preserve theological tension rather than resolve it'
