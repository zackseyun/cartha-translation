theological_decisions:
- issue: Rendering of divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The source text uses אֲדֹנָי, not יהוה. Following the doctrine's principle
    of original-language primacy and its contested-terms table, 'the LORD' is reserved
    for YHWH, so 'the Lord' is required here.
