id: 1KI.3.17
reference: 1 Kings 3:17
source:
  edition: WLC
  text: וַ/תֹּ֜אמֶר הָ/אִשָּׁ֤ה הָֽ/אַחַת֙ בִּ֣י אֲדֹנִ֔/י אֲנִי֙ וְ/הָ/אִשָּׁ֣ה הַ/זֹּ֔את
    יֹשְׁבֹ֖ת בְּ/בַ֣יִת אֶחָ֑ד וָ/אֵלֵ֥ד עִמָּ֖/הּ בַּ/בָּֽיִת׃
translation:
  text: Then one woman said, “Please, my lord, I and this woman live in one house,
    and I gave birth while she was in the house with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I gave birth with her in the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  chosen: Please, my lord
  alternatives:
  - Oh, my lord
  - Pardon me, my lord
  lexicon: HALOT
  rationale: בִּי used idiomatically in direct address expresses entreaty or urgency
    rather than possession; 'Please' captures the polite appeal naturally in English
    while retaining the honorific 'my lord' for אֲדֹנִי.
- source_word: הָאִשָּׁה הָאַחַת
  chosen: one woman
  alternatives:
  - the one woman
  - one of the women
  lexicon: HALOT
  rationale: The phrase identifies one of the two women in the narrative. English
    idiom prefers 'one woman' here over the more wooden 'the one woman.'
- source_word: יֹשְׁבֹת
  chosen: live
  alternatives:
  - dwell
  - are living
  lexicon: HALOT
  rationale: The participle of ישׁב in this domestic context denotes residing rather
    than merely sitting. 'Live' is natural modern English and fits optimal equivalence.
- source_word: בְּבַיִת אֶחָד
  chosen: in one house
  alternatives:
  - in the same house
  - in one household
  lexicon: HALOT
  rationale: The Hebrew is literally 'in one house.' This is retained because it is
    clear in English and preserves the concrete setting. 'The same house' is interpretive
    but possible.
- source_word: וָאֵלֵד
  chosen: I gave birth
  alternatives:
  - I bore a child
  - I delivered
  lexicon: HALOT
  rationale: ילד in the Qal for a woman means to give birth. 'I gave birth' is the
    clearest contemporary rendering.
- source_word: עִמָּהּ
  chosen: while she was in the house with me
  alternatives:
  - with her
  - beside her
  lexicon: HALOT
  rationale: Literally 'with her,' but in English that could suggest the speaker was
    accompanying the other woman rather than both being present together. Expanding
    slightly with the following בַּבָּיִת makes the relation explicit without adding
    new information.
- source_word: בַּבָּיִת
  chosen: in the house
  alternatives:
  - at home
  - in the house
  lexicon: HALOT
  rationale: The repeated noun grounds the event in the shared dwelling. 'In the house'
    preserves the repetition and concreteness better than the more idiomatic but less
    literal 'at home.'
