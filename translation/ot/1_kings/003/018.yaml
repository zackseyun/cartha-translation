id: 1KI.3.18
reference: 1 Kings 3:18
source:
  edition: WLC
  text: וַ/יְהִ֞י בַּ/יּ֤וֹם הַ/שְּׁלִישִׁי֙ לְ/לִדְתִּ֔/י וַ/תֵּ֖לֶד גַּם הָ/אִשָּׁ֣ה
    הַ/זֹּ֑את וַ/אֲנַ֣חְנוּ יַחְדָּ֗ו אֵֽין זָ֤ר אִתָּ֨/נוּ֙ בַּ/בַּ֔יִת זוּלָתִ֥י
    שְׁתַּֽיִם אֲנַ֖חְנוּ בַּ/בָּֽיִת־־־׃
translation:
  text: And on the third day after I gave birth, this woman also gave birth. And we
    were together; there was no stranger with us in the house, only the two of us
    were in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no outsider with us in the house.' The Hebrew word can denote
      someone not belonging to the group or household.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, a simple narrative 'And' best preserves flow without the wooden 'and
    it happened.'
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on the third day afterward
  lexicon: HALOT
  rationale: A straightforward temporal expression. The following infinitive with
    suffix clarifies that the reference point is the speaker's giving birth.
- source_word: לְלִדְתִּי
  chosen: after I gave birth
  alternatives:
  - of my giving birth
  - when I gave birth
  lexicon: HALOT
  rationale: 'The preposition ל with the infinitive construct and 1cs suffix is most
    naturally rendered here as a temporal relation: ''after I gave birth.'' This is
    smoother and clearer in English than the more literal ''of my giving birth.'''
- source_word: וַתֵּלֶד גַּם הָאִשָּׁה הַזֹּאת
  chosen: this woman also gave birth
  alternatives:
  - the woman also gave birth
  - this woman too gave birth
  lexicon: HALOT
  rationale: הָאִשָּׁה הַזֹּאת is deictic and somewhat pointed in the legal setting,
    so 'this woman' preserves the speaker's reference. גַּם is conveyed by 'also.'
- source_word: וַאֲנַחְנוּ יַחְדָּו
  chosen: And we were together
  alternatives:
  - And we were alone together
  - And we were together there
  lexicon: HALOT
  rationale: יַחְדָּו means 'together.' The following clause specifies that no one
    else was present, so 'alone' is not imported here but left to be inferred from
    the next statement.
- source_word: אֵין זָר אִתָּנוּ בַּבַּיִת
  chosen: there was no stranger with us in the house
  alternatives:
  - there was no outsider with us in the house
  - no one else was with us in the house
  lexicon: HALOT
  rationale: זָר literally denotes a stranger/outsider, someone not belonging to the
    household pair. 'Stranger' preserves the lexical force better than the more interpretive
    'no one else,' while remaining natural enough in context.
- source_word: זוּלָתִי שְׁתַּיִם אֲנַחְנוּ
  chosen: only the two of us
  alternatives:
  - except for us two
  - besides us two
  lexicon: HALOT
  rationale: 'זוּלָתִי introduces an exception: no stranger was present except the
    two women themselves. ''Only the two of us'' is idiomatic English that captures
    the exclusivity.'
- source_word: בַּבָּיִת
  chosen: were in the house
  alternatives:
  - were in the house there
  lexicon: HALOT
  rationale: The repeated phrase reinforces the setting and exclusivity of witnesses.
    It is retained in English rather than omitted as redundant.
