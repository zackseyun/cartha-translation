theological_decisions:
- issue: Rendering the divine name/title in אֲרוֹן בְּרִית אֲדֹנָי
  chosen_reading: the LORD
  alternative_readings:
  - the Lord
  rationale: In line with the doctrine's contested-terms guidance for YHWH, covenantal
    divine-name language is rendered 'the LORD.' Although the form here is written
    אֲדֹנָי in the provided text, the phrase functions as standard covenantal reference
    to Israel's God, and 'the LORD' best matches project convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
