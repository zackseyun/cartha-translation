id: 1KI.3.15
reference: 1 Kings 3:15
source:
  edition: WLC
  text: וַ/יִּקַ֥ץ שְׁלֹמֹ֖ה וְ/הִנֵּ֣ה חֲל֑וֹם וַ/יָּב֨וֹא יְרוּשָׁלִַ֜ם וַֽ/יַּעֲמֹ֣ד
    לִ/פְנֵ֣י אֲר֣וֹן בְּרִית אֲדֹנָ֗/י וַ/יַּ֤עַל עֹלוֹת֙ וַ/יַּ֣עַשׂ שְׁלָמִ֔ים
    וַ/יַּ֥עַשׂ מִשְׁתֶּ֖ה לְ/כָל עֲבָדָֽי/ו׀׀־־׃פ
translation:
  text: Then Solomon awoke, and behold, it was a dream. And he came to Jerusalem and
    stood before the ark of the covenant of the LORD, and offered up burnt offerings
    and made peace offerings, and made a feast for all his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace offerings,' possibly emphasizing shared fellowship in the sacrificial
      meal; some translations render שְׁלָמִים as 'fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַץ
  chosen: awoke
  alternatives:
  - woke up
  - awakened
  lexicon: HALOT
  rationale: The verb means to awake from sleep. 'Awoke' is natural narrative English
    and preserves the simple past sequence.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  - and saw
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Behold' preserves
    the sudden realization and rhetorical force better than flattening it away.
- source_word: חֲלוֹם
  chosen: it was a dream
  alternatives:
  - a dream
  lexicon: HALOT
  rationale: Although the Hebrew is simply 'and behold, a dream,' idiomatic English
    commonly supplies 'it was.' This makes explicit Solomon's realization without
    adding meaning beyond the source.
- source_word: וַיָּבֹא יְרוּשָׁלִַם
  chosen: he came to Jerusalem
  alternatives:
  - he went to Jerusalem
  - he returned to Jerusalem
  lexicon: HALOT
  rationale: בוא normally means 'come/enter.' 'Came to Jerusalem' is a straightforward
    rendering. 'Returned' is interpretive and not stated explicitly.
- source_word: וַיַּעֲמֹד לִפְנֵי
  chosen: stood before
  alternatives:
  - took his stand before
  - stood in the presence of
  lexicon: HALOT
  rationale: A standard idiom for appearing in someone's presence. 'Stood before'
    is both literal and readable.
- source_word: אֲרוֹן בְּרִית אֲדֹנָי
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  - the covenant ark of the LORD
  lexicon: HALOT
  rationale: This preserves the construct chain clearly in English. Per doctrine,
    אֲדֹנָי/יהוה-title language is rendered 'the LORD' in continuity with covenantal
    usage.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: The standard sacrificial term for offerings wholly burned. 'Burnt offerings'
    is the clearest established English equivalent.
- source_word: וַיַּעַל
  chosen: offered up
  alternatives:
  - offered
  - caused to ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrifices reflects presenting them on the altar.
    'Offered up' preserves the sacrificial nuance better than the bare 'offered.'
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  lexicon: HALOT
  rationale: The traditional rendering 'peace offerings' is still transparent and
    maps closely to the sacrificial category. 'Fellowship offerings' captures one
    aspect of the rite but is more interpretive.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  lexicon: HALOT
  rationale: The noun denotes a drinking feast or banquet. 'Feast' is broad, natural
    English and fits the celebratory context following sacrifice.
- source_word: לְכָל עֲבָדָיו
  chosen: for all his servants
  alternatives:
  - for all his officials
  - for all his attendants
  lexicon: HALOT
  rationale: עבדים can denote servants or royal officials depending on context. Here
    it refers broadly to those in Solomon's service. 'Servants' is the more direct
    lexical rendering; 'officials' is possible but narrower and more interpretive.
