id: 1KI.3.27
reference: 1 Kings 3:27
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַ/מֶּ֜לֶךְ וַ/יֹּ֗אמֶר תְּנוּ לָ/הּ֙ אֶת הַ/יָּל֣וּד הַ/חַ֔י וְ/הָמֵ֖ת
    לֹ֣א תְמִיתֻ֑/הוּ הִ֖יא אִמּֽ/וֹ־־׃
translation:
  text: Then the king answered and said, “Give her the living child, and by no means
    put him to death; she is his mother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''dying you shall not cause him to die,'' an emphatic prohibition
      meaning ''you must certainly not kill him'' or ''by no means put him to death.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' preserves the formal courtroom-like exchange and matches the Hebrew
    idiom when followed by 'and said.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with article.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative speech introduction; 'said' is
    natural modern English and avoids overstating the force.
- source_word: תְּנוּ לָהּ
  chosen: Give her
  alternatives:
  - Give to her
  lexicon: HALOT
  rationale: Imperative plural of נתן with indirect object pronoun. English idiom
    prefers 'Give her' rather than the more wooden 'Give to her.'
- source_word: הַיָּלוּד הַחַי
  chosen: the living child
  alternatives:
  - the live-born child
  - the child who is alive
  lexicon: HALOT
  rationale: יַלוּד denotes one who has been born, here a newborn/child. In context
    'child' is the most natural English equivalent. הַחַי is adjectival, 'living/alive';
    'living child' is concise and idiomatic.
- source_word: וְהָמֵת לֹא תְמִיתֻהוּ
  chosen: and by no means put him to death
  alternatives:
  - and do not kill him
  - and you must certainly not kill him
  lexicon: HALOT
  rationale: The construction uses the infinitive absolute of מות with the Hiphil
    imperfect for emphatic prohibition/intensification. 'By no means put him to death'
    preserves the strong emphasis better than a simple 'do not kill him,' while remaining
    readable.
- source_word: הִיא אִמּוֹ
  chosen: she is his mother
  alternatives:
  - she is the one's mother
  - she is its mother
  lexicon: HALOT
  rationale: Simple verbless clause identifying the true mother. 'His mother' fits
    English usage for a male child and reflects the 3ms suffix.
