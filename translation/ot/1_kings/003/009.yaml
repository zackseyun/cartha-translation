theological_decisions:
- issue: Anthropological idiom in Solomon's request
  chosen_reading: a listening heart
  alternative_readings:
  - an understanding heart
  rationale: The Hebrew speaks of the 'heart' as the center of cognition and volition.
    Retaining 'heart' preserves the biblical anthropology and avoids flattening the
    expression into mere intellect. The alternative is preserved in a footnote because
    it reflects a longstanding interpretive translation tradition.
  doctrine_reference: Translation philosophy §§1, 3, 6
