id: 1KI.3.9
reference: 1 Kings 3:9
source:
  edition: WLC
  text: וְ/נָתַתָּ֨ לְ/עַבְדְּ/ךָ֜ לֵ֤ב שֹׁמֵ֨עַ֙ לִ/שְׁפֹּ֣ט אֶֽת עַמְּ/ךָ֔ לְ/הָבִ֖ין
    בֵּֽין ט֣וֹב לְ/רָ֑ע כִּ֣י מִ֤י יוּכַל֙ לִ/שְׁפֹּ֔ט אֶת עַמְּ/ךָ֥ הַ/כָּבֵ֖ד הַ/זֶּֽה־־־׃
translation:
  text: So give your servant a listening heart to judge your people, to discern between
    good and evil, for who is able to judge this great people of yours?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an understanding heart'; literally 'a hearing/listening heart.'
    reason: lexical_alternative
  - marker: b
    text: '''Great'' renders a Hebrew word literally meaning ''heavy'' or ''weighty,''
      here expressing the people''s significance or the burden of governing them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: So give
  alternatives:
  - And give
  - Therefore give
  lexicon: HALOT
  rationale: The waw plus perfect in this prayer functions as a request flowing from
    the preceding context. 'So give' captures the consequential sense in natural English
    while preserving the imperative-like petition.
- source_word: לְעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In Solomon's address to God, עבד is a conventional expression of humble
    royal self-designation before the divine king. 'Servant' is the most natural and
    contextually appropriate English rendering here; the bonded-status nuance of 'slave'
    is not foregrounded.
- source_word: לֵב שֹׁמֵעַ
  chosen: a listening heart
  alternatives:
  - an understanding heart
  - a hearing heart
  lexicon: HALOT
  rationale: Literally 'a hearing/listening heart.' This idiom expresses receptivity,
    attentiveness, and responsiveness needed for wise judgment. 'Listening heart'
    preserves the Hebrew imagery better than the traditional but more interpretive
    'understanding heart.'
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to govern
  - to administer justice
  lexicon: HALOT
  rationale: The verb שפט includes governing and judicial functions, but in this context
    of discerning between good and evil, 'to judge' best preserves the lexical core
    while allowing the broader royal sense to remain implicit.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Standard rendering of עם with second-person suffix; covenantal and political
    overtones are both retained by 'your people.'
- source_word: לְהָבִין
  chosen: to discern
  alternatives:
  - to understand
  - to perceive
  lexicon: HALOT
  rationale: בין in the hiphil often means to understand with discriminating insight.
    'To discern' fits the judicial context more precisely than the broader 'to understand.'
- source_word: בֵּין טוֹב לְרָע
  chosen: between good and evil
  alternatives:
  - between right and wrong
  lexicon: HALOT
  rationale: The Hebrew is literally moral/evaluative language, 'good and evil.' This
    phrase should be preserved rather than reduced to the more idiomatic but narrower
    'right and wrong.'
- source_word: כִּי מִי יוּכַל
  chosen: for who is able
  alternatives:
  - because who can
  - for who can
  lexicon: HALOT
  rationale: This introduces the rationale for the request. 'For who is able' is idiomatic
    and preserves the sense of insufficiency before the task.
- source_word: הַכָּבֵד
  chosen: great
  alternatives:
  - heavy
  - weighty
  - numerous
  lexicon: HALOT
  rationale: The adjective literally means 'heavy' and by extension 'weighty, burdensome,
    significant, great.' In reference to the people as the object of governance, 'great'
    communicates their magnitude and importance in idiomatic English. The more literal
    nuance is worth preserving in a footnote.
