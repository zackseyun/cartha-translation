id: 1KI.3.24
reference: 1 Kings 3:24
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ קְח֣וּ לִ/י חָ֑רֶב וַ/יָּבִ֥אוּ הַ/חֶ֖רֶב לִ/פְנֵ֥י
    הַ/מֶּֽלֶךְ־׃
translation:
  text: Then the king said, “Bring me a sword.” So they brought the sword before the
    king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'said.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with article.
- source_word: קְחוּ לִי
  chosen: Bring me
  alternatives:
  - Take for me
  - Get me
  lexicon: HALOT
  rationale: The imperative of לקח literally means 'take,' but in this context it
    functions idiomatically as a request to fetch or bring something to the speaker.
    'Bring me' is the most natural and contextually precise English rendering.
- source_word: חָרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: The first occurrence is anarthrous, so 'a sword' best reflects the indefinite
    sense in the request.
- source_word: וַיָּבִאוּ
  chosen: So they brought
  alternatives:
  - And they brought
  - Then they brought
  lexicon: HALOT
  rationale: Narrative waw with plural verb. 'So they brought' reads naturally in
    English and preserves the resulting action in response to the command.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: The second occurrence has the article, naturally referring back to the
    requested sword; therefore 'the sword' is appropriate.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - into the presence of the king
  - in front of the king
  lexicon: HALOT
  rationale: Standard idiomatic rendering of לִפְנֵי in court/narrative context. 'Before
    the king' is concise and natural while preserving the formal sense of being brought
    into his presence.
