id: 1KI.3.16
reference: 1 Kings 3:16
source:
  edition: WLC
  text: אָ֣ז תָּבֹ֗אנָה שְׁתַּ֛יִם נָשִׁ֥ים זֹנ֖וֹת אֶל הַ/מֶּ֑לֶךְ וַֽ/תַּעֲמֹ֖דְנָה
    לְ/פָנָֽי/ו־׃
translation:
  text: Then two women who were prostitutes came to the king and stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'two prostitutes came to the king and stood before him.' The
      Hebrew participle זֹנוֹת can be rendered directly as 'prostitutes' or more explicitly
      as 'women who were prostitutes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - Afterward
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next episode in the narrative.
    'Then' is natural modern English and preserves the sequential flow.
- source_word: תָּבֹאנָה
  chosen: came
  alternatives:
  - entered
  - went
  lexicon: HALOT
  rationale: Qal imperfect 3fp of בוא in past narrative context after אָז is best
    rendered as simple past in English. 'Came' fits movement toward the king.
- source_word: שְׁתַּיִם נָשִׁים
  chosen: two women
  lexicon: HALOT
  rationale: Straightforward numeral plus noun construction; no need to invert or
    expand.
- source_word: זֹנוֹת
  chosen: who were prostitutes
  alternatives:
  - prostitutes
  - harlots
  lexicon: HALOT
  rationale: The participial form functions attributively describing the women. Rendering
    it as a relative clause in English is smoother than 'two prostitute women' while
    preserving the lexical sense. 'Harlots' is archaic; bare 'prostitutes' is possible,
    but the clause better reflects the Hebrew syntax in readable English.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: אֶל marks motion toward; 'to the king' preserves the directional sense,
    while the following clause supplies the courtroom posture before him.
- source_word: וַתַּעֲמֹדְנָה
  chosen: and stood
  alternatives:
  - and took their stand
  - and presented themselves
  lexicon: HALOT
  rationale: Wayyiqtol of עמד continues the narrative sequence. 'Stood' is the plain
    sense and fits the legal/audience setting without overinterpreting.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Common idiom for appearing before a superior or judge. 'Before him' is
    concise and natural.
