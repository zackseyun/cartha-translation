theological_decisions:
- issue: Rendering the judicial idiom in Solomon's request
  chosen_reading: understanding to hear justice
  alternative_readings:
  - an understanding heart to judge
  - discernment to administer justice
  rationale: The Hebrew is compact and somewhat idiomatic. The chosen rendering stays
    close to the source while remaining intelligible, preserving the emphasis on discernment
    in judicial matters without importing extra wording from nearby verses.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence'
