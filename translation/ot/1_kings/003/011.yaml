id: 1KI.3.11
reference: 1 Kings 3:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֱלֹהִ֜ים אֵלָ֗י/ו יַעַן֩ אֲשֶׁ֨ר שָׁאַ֜לְתָּ אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה
    וְ/לֹֽא שָׁאַ֨לְתָּ לְּ/ךָ֜ יָמִ֣ים רַבִּ֗ים וְ/לֹֽא שָׁאַ֤לְתָּ לְּ/ךָ֙ עֹ֔שֶׁר
    וְ/לֹ֥א שָׁאַ֖לְתָּ נֶ֣פֶשׁ אֹיְבֶ֑י/ךָ וְ/שָׁאַ֧לְתָּ לְּ/ךָ֛ הָבִ֖ין לִ/שְׁמֹ֥עַ
    מִשְׁפָּֽט־־־׃
translation:
  text: And God said to him, “Because you have asked for this thing, and have not
    asked for yourself many days, nor have asked for yourself riches, nor have asked
    for the life of your enemies, but have asked for yourself understanding to hear
    justice,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'many days,' an idiom meaning 'long life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the death of your enemies'; literally 'the life of your enemies.'
    reason: lexical_alternative
  - marker: c
    text: Or 'judgment' or 'what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for God's response. 'Because' is natural modern
    English and preserves the causal force without sounding archaic.
- source_word: שָׁאַל
  chosen: asked
  alternatives:
  - requested
  lexicon: HALOT
  rationale: The repeated verb structures the verse rhetorically. 'Asked' preserves
    the repetition clearly and naturally in English.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this request
  lexicon: HALOT
  rationale: A fairly literal rendering that keeps the demonstrative emphasis. 'This
    request' is interpretive; 'this thing' better reflects the Hebrew while remaining
    understandable.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - long life
  - many years
  lexicon: HALOT
  rationale: Literally 'many days,' an idiom for longevity. The main text keeps the
    Hebrew imagery; the idiomatic English alternative is worth preserving in a footnote.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: '''Riches'' fits the elevated tone and is a standard rendering of the
    noun for material wealth.'
- source_word: נֶפֶשׁ אֹיְבֶיךָ
  chosen: the life of your enemies
  alternatives:
  - the lives of your enemies
  - the death of your enemies
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life/life-breath. In context, asking for an enemy's
    'life' means seeking their death or destruction, but 'the life of your enemies'
    stays closer to the Hebrew while allowing the idiom to stand.
- source_word: הָבִין
  chosen: understanding
  alternatives:
  - discernment
  - an understanding mind
  lexicon: HALOT
  rationale: The infinitive/abstract sense here points to the capacity for discernment.
    'Understanding' is concise and works well with the following infinitive phrase.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  - to obey
  lexicon: HALOT
  rationale: The Hebrew verb fundamentally means 'to hear/listen.' Here it likely
    carries the sense of attentive hearing in judicial discernment. 'To hear' preserves
    the lexical link and avoids over-interpreting.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In this royal-judicial context, the noun refers to legal judgment/justice.
    'Justice' communicates the sense clearly in modern English.
