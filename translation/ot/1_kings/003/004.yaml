id: 1KI.3.4
reference: 1 Kings 3:4
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ הַ/מֶּ֤לֶךְ גִּבְעֹ֨נָ/ה֙ לִ/זְבֹּ֣חַ שָׁ֔ם כִּ֥י הִ֖יא הַ/בָּמָ֣ה
    הַ/גְּדוֹלָ֑ה אֶ֤לֶף עֹלוֹת֙ יַעֲלֶ֣ה שְׁלֹמֹ֔ה עַ֖ל הַ/מִּזְבֵּ֥חַ הַ/הֽוּא׃
translation:
  text: And the king went to Gibeon to sacrifice there, for that was the great high
    place. Solomon used to offer a thousand burnt offerings on that altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the principal high place.' The Hebrew adjective can denote greatness
      in size or prominence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went up
  - traveled
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, best rendered simply as 'went' in natural
    English. 'Went up' is possible idiomatically for travel to a higher place, but
    the verb itself does not require it here.
- source_word: גִּבְעֹנָה
  chosen: to Gibeon
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward the city; standard
    English is 'to Gibeon.'
- source_word: לִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - to offer sacrifice
  lexicon: HALOT
  rationale: Infinitive of זבח denotes sacrificial action generally. 'To sacrifice'
    is concise and accurate; the more expanded 'to offer sacrifice' is possible but
    less direct.
- source_word: כִּי הִיא הַבָּמָה הַגְּדוֹלָה
  chosen: for that was the great high place
  alternatives:
  - for it was the principal high place
  - for it was the great shrine
  lexicon: HALOT
  rationale: בָּמָה is the standard term 'high place,' a cultic site. Retaining 'high
    place' preserves the historical-religious terminology. הַגְּדוֹלָה is rendered
    'great' rather than 'largest' because the adjective itself is qualitative; context
    implies prominence.
- source_word: אֶלֶף עֹלוֹת
  chosen: a thousand burnt offerings
  lexicon: HALOT
  rationale: עֹלוֹת refers specifically to whole burnt offerings, not sacrifices in
    general. The numeral is retained literally.
- source_word: יַעֲלֶה
  chosen: used to offer
  alternatives:
  - offered
  - would offer
  - caused to go up
  lexicon: HALOT
  rationale: Hiphil of עלה with עֹלוֹת idiomatically means 'offer up' burnt offerings.
    Given the yiqtol form in this narrative comment, 'used to offer' best captures
    customary/repeated action in idiomatic English. 'Offered' would flatten the aspect;
    'would offer' is possible but less clear for modern readers.
- source_word: עַל הַמִּזְבֵּחַ הַהוּא
  chosen: on that altar
  alternatives:
  - upon that altar
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'on that altar' is natural modern
    English while preserving the demonstrative emphasis.
