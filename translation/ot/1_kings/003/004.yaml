theological_decisions:
- issue: Rendering of בָּמָה in a context of pre-temple worship
  chosen_reading: high place
  alternative_readings:
  - shrine
  rationale: The verse describes Gibeon as a recognized cultic site before the temple's
    construction. 'High place' preserves the canonical and theological tension of
    worship at such sites without softening it into the more generic 'shrine.'
  doctrine_reference: Translation philosophy §3, §5
