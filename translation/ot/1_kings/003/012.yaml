id: 1KI.3.12
reference: 1 Kings 3:12
source:
  edition: WLC
  text: הִנֵּ֥ה עָשִׂ֖יתִי כִּ/דְבָרֶ֑י/ךָ הִנֵּ֣ה נָתַ֣תִּי לְ/ךָ֗ לֵ֚ב חָכָ֣ם וְ/נָב֔וֹן
    אֲשֶׁ֤ר כָּמ֨וֹ/ךָ֙ לֹא הָיָ֣ה לְ/פָנֶ֔י/ךָ וְ/אַחֲרֶ֖י/ךָ לֹא יָק֥וּם כָּמֽוֹ/ךָ׀־־׃
translation:
  text: Behold, I have done according to your words. Behold, I have given you a wise
    and discerning heart, so that no one like you has been before you, and no one
    like you shall arise after you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'understanding heart.' Hebrew 'heart' includes the inner faculty of thought,
      judgment, and discernment, not merely emotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retained as an attention-marking discourse particle rather than omitting
    it. 'Behold' preserves the solemn, declarative force of the divine speech better
    than the more colloquial 'look' or 'see.'
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I have acted
  - I have made
  lexicon: HALOT
  rationale: The verb עשה is broad, but here 'I have done' naturally matches the following
    prepositional phrase and reflects completed divine action in response to Solomon's
    request.
- source_word: כִּדְבָרֶיךָ
  chosen: according to your words
  alternatives:
  - according to your request
  - as you said
  lexicon: HALOT
  rationale: More formally tied to the Hebrew 'your words' while still idiomatic in
    English. 'Request' is interpretive; although contextually true, the Hebrew explicitly
    says 'words.'
- source_word: נָתַתִּי לְךָ
  chosen: I have given you
  alternatives:
  - I give you
  - I have granted you
  lexicon: HALOT
  rationale: The perfect is rendered as a completed gift already bestowed. 'Granted'
    is possible, but 'given' more directly reflects נתן.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the seat of thought and judgment as
    well as desire. 'Heart' should be preserved in the main text rather than reduced
    to 'mind,' which narrows the semantic range.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: In this royal context the adjective denotes wisdom, especially for governance
    and judgment. 'Wise' is the standard and clearest rendering.
- source_word: נָבוֹן
  chosen: discerning
  alternatives:
  - understanding
  - perceptive
  lexicon: HALOT
  rationale: Pairs naturally with 'wise' while distinguishing the nuance of insight
    and discernment. 'Understanding' is possible, but 'discerning' better suits Solomon's
    judicial context.
- source_word: אֲשֶׁר כָּמוֹךָ לֹא הָיָה לְפָנֶיךָ
  chosen: so that no one like you has been before you
  alternatives:
  - such as none like you was before you
  - than whom none like you was before you
  lexicon: HALOT
  rationale: This clause expresses the unparalleled nature of the gift. 'No one like
    you has been before you' is idiomatic English that preserves the comparative force
    without wooden syntax.
- source_word: וְאַחֲרֶיךָ לֹא יָקוּם כָּמוֹךָ
  chosen: and no one like you shall arise after you
  alternatives:
  - and after you none like you shall stand
  - and after you there shall not arise one like you
  lexicon: HALOT
  rationale: יקום literally means 'arise' here in the sense of coming forth or appearing
    in history. 'Arise' preserves the Hebrew imagery and the future-oriented promise.
