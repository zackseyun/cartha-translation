theological_decisions:
- issue: Nature of Solomon's promised superiority
  chosen_reading: The verse promises unparalleled wisdom and discernment to Solomon
    in context, not an absolute superiority in every respect.
  alternative_readings:
  - A broader claim of unmatched greatness
  rationale: The immediate context centers on the granted 'wise and discerning heart.'
    The translation keeps the comparison attached to that gift and avoids importing
    a wider doctrinal or historical claim than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
