id: 1KI.3.7
reference: 1 Kings 3:7
source:
  edition: WLC
  text: וְ/עַתָּה֙ יְהוָ֣ה אֱלֹהָ֔/י אַתָּה֙ הִמְלַ֣כְתָּ אֶֽת עַבְדְּ/ךָ֔ תַּ֖חַת דָּוִ֣ד אָבִ֑/י וְ/אָֽנֹכִי֙ נַ֣עַר קָטֹ֔ן לֹ֥א אֵדַ֖ע צֵ֥את וָ/בֹֽא־׃
translation:
  text: And now, O Yahweh my God, you have made your servant king in place of David my father, though I am a little child; I do not know how to go out or come in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a young man'; the Hebrew expression is a humble self-description emphasizing youth and inexperience.
    reason: lexical_alternative
  - marker: b
    text: '''Go out or come in'' is a Hebrew idiom for carrying out one''s duties, especially in public leadership.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project default for the divine name YHWH, following established English convention that signals the covenant name without transliteration.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'Straightforward possessive construction: ''my God.'' Combined with vocative force after YHWH: ''O LORD my God.'''
- source_word: הִמְלַכְתָּ
  chosen: have made ... king
  alternatives:
  - have caused ... to reign
  - have made ... reign
  lexicon: HALOT
  rationale: Hiphil of מלך means to cause someone to become king/reign. 'Have made your servant king' is idiomatic English and preserves the causative sense better than the less natural 'caused to reign.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal prayer language Solomon's self-designation is best rendered 'your servant,' expressing humility and covenantal service rather than emphasizing bonded status.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - after
  lexicon: HALOT
  rationale: 'Here תַּחַת marks succession: Solomon has been made king in David''s place, i.e., as his successor. ''In place of'' is the clearest idiomatic rendering.'
- source_word: נַעַר קָטֹן
  chosen: a little boy
  alternatives:
  - young boy
  - a young man
  - very young
  lexicon: HALOT
  rationale: The phrase is idiomatic and self-deprecating. נַעַר can range from child to young man/attendant, and קָטֹן adds smallness/youth. 'A little boy' preserves the humility rhetoric without forcing a precise age claim; context suggests inexperience more than literal infancy.
- source_word: לֹא אֵדַע
  chosen: I do not know how
  alternatives:
  - I do not know
  - I am not able to discern how
  lexicon: HALOT
  rationale: 'In English, the infinitive pair that follows is best introduced with ''how'': ''I do not know how to go out or come in.'' This makes explicit the idiomatic sense of lacking practical wisdom for leadership.'
- source_word: צֵאת וָבֹא
  chosen: to go out or come in
  alternatives:
  - to go out and come in
  - to conduct myself
  - to lead
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'go out and come in' and can refer to carrying out public/royal duties or leading a people. The main text keeps the literal idiom for transparency; the leadership nuance is preserved in a footnote.
