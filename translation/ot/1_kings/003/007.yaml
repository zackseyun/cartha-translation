theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of Solomon's self-description and incapacity
  chosen_reading: Retain the literal self-humbling language and the idiom 'go out or come in' in the main text
  alternative_readings:
  - Interpret more dynamically as 'I am very young and do not know how to lead'
  rationale: The verse expresses humility and inexperience, but the Hebrew does not explicitly say 'lead.' To avoid importing interpretation into the main text, the draft preserves the literal wording while noting the idiomatic leadership sense in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
