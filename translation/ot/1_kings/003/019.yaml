id: 1KI.3.19
reference: 1 Kings 3:19
source:
  edition: WLC
  text: וַ/יָּ֛מָת בֶּן הָ/אִשָּׁ֥ה הַ/זֹּ֖את לָ֑יְלָה אֲשֶׁ֥ר שָׁכְבָ֖ה עָלָֽי/ו־׃
translation:
  text: And this woman's son died in the night, because she lay on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at night.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'which/when she lay on him'; the clause is rendered causally
      here because the context indicates that her lying on him caused his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: And ... died
  alternatives:
  - and ... was dead
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת narrates a past event, best rendered as simple past
    'died' in English narrative.
- source_word: בֶּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The noun specifically means 'son'; although 'child' could fit contextually,
    the Hebrew is gender-specific and should be preserved.
- source_word: הָאִשָּׁה הַזֹּאת
  chosen: this woman's
  alternatives:
  - the son of this woman
  - this woman's son
  lexicon: HALOT
  rationale: The construct phrase means 'the son of this woman.' In English, possessive
    phrasing is the most natural and preserves the sense without unnecessary stiffness.
- source_word: לָיְלָה
  chosen: in the night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: The accusative of time indicates when the death occurred. 'In the night'
    is natural and slightly more formally aligned with the Hebrew than simply 'at
    night.'
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: 'Here אֲשֶׁר introduces the circumstance explaining the death, not merely
    a neutral relative clause. Rendering it causally as ''because'' makes explicit
    the sense conveyed by the context: the child died as a result of what follows.'
- source_word: שָׁכְבָה עָלָיו
  chosen: she lay on him
  alternatives:
  - she slept on him
  - she lay upon him
  lexicon: HALOT
  rationale: The verb שָׁכַב means 'to lie down/lie.' With עַל plus pronoun, it indicates
    physical pressure upon the child. 'Lay on him' is idiomatic modern English and
    communicates the cause clearly.
