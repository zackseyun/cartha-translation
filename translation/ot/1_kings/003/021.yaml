id: 1KI.3.21
reference: 1 Kings 3:21
source:
  edition: WLC
  text: וָ/אָקֻ֥ם בַּ/בֹּ֛קֶר לְ/הֵינִ֥יק אֶת בְּנִ֖/י וְ/הִנֵּה מֵ֑ת וָ/אֶתְבּוֹנֵ֤ן
    אֵלָי/ו֙ בַּ/בֹּ֔קֶר וְ/הִנֵּ֛ה לֹֽא הָיָ֥ה בְנִ֖/י אֲשֶׁ֥ר יָלָֽדְתִּי־־־׃
translation:
  text: When I got up in the morning to nurse my son, behold, he was dead. But when
    I looked closely at him in the morning, behold, he was not my son, whom I had
    borne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I examined him carefully.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'whom I bore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָקֻם
  chosen: When I got up
  alternatives:
  - And I arose
  - So I got up
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of קום, narrating the woman's action. 'Got up' is natural
    modern English; 'when' smoothly conveys the temporal relation to the following
    infinitive.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: HALOT
  rationale: Standard temporal expression. Repeated twice in the Hebrew; retained
    both times for fidelity to the narrative pacing.
- source_word: לְהֵינִיק
  chosen: to nurse
  alternatives:
  - to suckle
  - to breastfeed
  lexicon: HALOT
  rationale: Hiphil infinitive of ינק in context means to give suck to an infant.
    'Nurse' is idiomatic, accurate, and readable modern English.
- source_word: אֶת־בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: בן with 1cs suffix is specifically 'my son.' Gender-accurate rendering
    is required by the source.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there he was
  lexicon: HALOT
  rationale: The particle marks sudden realization. 'Behold' preserves the dramatic
    force without paraphrase; repeated both times as in Hebrew.
- source_word: מֵת
  chosen: he was dead
  alternatives:
  - dead
  - he had died
  lexicon: HALOT
  rationale: Predicate use of מות in participial/perfective form describing the infant's
    state when she rose. 'He was dead' is the clearest idiomatic rendering in context.
- source_word: וָאֶתְבּוֹנֵן
  chosen: I looked closely
  alternatives:
  - I examined
  - I considered carefully
  lexicon: HALOT
  rationale: Hitpolel/reflexive form of בין/בון conveys attentive inspection or careful
    looking. 'Looked closely' captures the deliberate examination that leads to recognition.
- source_word: אֵלָיו
  chosen: at him
  alternatives:
  - upon him
  - toward him
  lexicon: HALOT
  rationale: With the verb of close inspection, English idiom prefers 'looked closely
    at him.'
- source_word: לֹא הָיָה בְנִי
  chosen: he was not my son
  alternatives:
  - it was not my son
  - this was not my son
  lexicon: HALOT
  rationale: Hebrew literally 'he was not my son.' Using 'he' fits the personal referent
    and maintains the mother's recognition of the child as a person.
- source_word: אֲשֶׁר יָלָדְתִּי
  chosen: whom I had borne
  alternatives:
  - whom I bore
  - whom I had given birth to
  lexicon: HALOT
  rationale: ילד in first person refers to childbirth. 'Had borne' is concise, natural,
    and reflects prior action relative to her realization.
