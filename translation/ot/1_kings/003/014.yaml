id: 1KI.3.14
reference: 1 Kings 3:14
source:
  edition: WLC
  text: וְ/אִ֣ם תֵּלֵ֣ךְ בִּ/דְרָכַ֗/י לִ/שְׁמֹ֤ר חֻקַּ/י֙ וּ/מִצְוֺתַ֔/י כַּ/אֲשֶׁ֥ר
    הָלַ֖ךְ דָּוִ֣יד אָבִ֑י/ךָ וְ/הַאַרַכְתִּ֖י אֶת יָמֶֽי/ךָ׀־׃ס
translation:
  text: And if you walk in my ways, keeping my statutes and my commandments, as David
    your father walked, then I will lengthen your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will prolong your life' / 'I will prolong your days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a conditional continuation
    of the LORD's speech. 'And if' preserves the discourse flow from the previous
    verse better than a bare 'If'.
- source_word: תֵּלֵךְ
  chosen: you walk
  alternatives:
  - you go
  - you live
  lexicon: HALOT
  rationale: הלך in covenantal contexts commonly means to conduct oneself or live
    one's life. 'Walk' preserves the Hebrew metaphor and is natural English in biblical
    ethical contexts.
- source_word: בִּדְרָכַי
  chosen: in my ways
  alternatives:
  - according to my ways
  - on my paths
  lexicon: HALOT
  rationale: A standard covenantal idiom. 'In my ways' keeps the metaphor and reflects
    the preposition ב plus 'ways' without over-paraphrasing.
- source_word: לִשְׁמֹר
  chosen: keeping
  alternatives:
  - to keep
  - by keeping
  - observing
  lexicon: HALOT
  rationale: The infinitive expresses the manner/content of walking in God's ways.
    'Keeping' reads smoothly in English while preserving the close syntactic link
    to the preceding clause.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חקים is a standard legal/covenantal term. 'Statutes' is a clear and established
    rendering that distinguishes it from the next term, 'commandments.'
- source_word: וּמִצְוֺתַי
  chosen: and my commandments
  alternatives:
  - and my commands
  lexicon: HALOT
  rationale: מצות refers to commands/commandments. 'Commandments' preserves the covenantal
    register and maintains distinction from 'statutes.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with David's conduct. 'As' is concise and sufficient
    in modern English.
- source_word: הָלַךְ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: Repeating 'walked' preserves the Hebrew verbal echo with תֵּלֵךְ and
    keeps the ethical metaphor consistent.
- source_word: דָּוִיד אָבִיךָ
  chosen: David your father
  alternatives:
  - your father David
  lexicon: HALOT
  rationale: Both are possible in English; 'David your father' follows the Hebrew
    order more closely and sounds natural enough here.
- source_word: וְהַאַרַכְתִּי
  chosen: then I will lengthen
  alternatives:
  - and I will lengthen
  - I will prolong
  lexicon: HALOT
  rationale: The verb ארך in the Hiphil means to make long/prolong. 'Lengthen' is
    a direct rendering; adding 'then' makes the apodosis of the conditional explicit
    in idiomatic English.
- source_word: אֶת יָמֶיךָ
  chosen: your days
  alternatives:
  - the days of your life
  - your lifespan
  lexicon: HALOT
  rationale: A Hebrew idiom for prolonged life. 'Your days' is sufficiently transparent
    in English and preserves the biblical phrasing without unnecessary expansion.
