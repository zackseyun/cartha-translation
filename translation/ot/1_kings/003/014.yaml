theological_decisions:
- issue: Conditional promise of long life tied to covenant obedience
  chosen_reading: Render the condition straightforwardly without softening or importing
    later theological categories.
  alternative_readings:
  - Interpret as an unconditional dynastic promise
  - Paraphrase as general blessing rather than lengthened life
  rationale: 'The verse plainly presents a conditional promise to Solomon: if he walks
    in God''s ways as David did, God will lengthen his days. The translation should
    preserve the condition and the concrete promise of prolonged life.'
  doctrine_reference: Translation philosophy §1, §3
