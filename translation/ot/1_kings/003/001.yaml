id: 1KI.3.1
reference: 1 Kings 3:1
source:
  edition: WLC
  text: וַ/יִּתְחַתֵּ֣ן שְׁלֹמֹ֔ה אֶת פַּרְעֹ֖ה מֶ֣לֶךְ מִצְרָ֑יִם וַ/יִּקַּ֣ח אֶת בַּת פַּרְעֹ֗ה וַ/יְבִיאֶ֨/הָ֙ אֶל עִ֣יר דָּוִ֔ד עַ֣ד כַּלֹּת֗/וֹ לִ/בְנ֤וֹת אֶת בֵּית/וֹ֙ וְ/אֶת בֵּ֣ית יְהוָ֔ה וְ/אֶת חוֹמַ֥ת יְרוּשָׁלִַ֖ם סָבִֽיב־־־־־־־׃
translation:
  text: Solomon formed a marriage alliance with Pharaoh king of Egypt, and he took Pharaoh’s daughter and brought her into the city of David until he had finished building his own house, and the house of Yahweh, and the wall around Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'became related by marriage to Pharaoh.' The Hebrew verb can emphasize entering a marriage relationship, here likely with political alliance overtones.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the temple of the LORD' for 'the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַתֵּן
  chosen: formed a marriage alliance with
  alternatives:
  - became related by marriage to
  - made himself a son-in-law to
  lexicon: HALOT
  rationale: The hitpael of חתן here denotes entering into a marriage relationship/alliance, not merely the act of marrying in a narrow romantic sense. 'Formed a marriage alliance with' captures both the familial and political dimensions present in a royal context.
- source_word: אֶת פַּרְעֹה מֶלֶךְ מִצְרָיִם
  chosen: with Pharaoh king of Egypt
  alternatives:
  - with Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: This appositional construction identifies Pharaoh specifically as Egypt's king. The smoother English without the article before 'king' is natural and preserves the sense.
- source_word: וַיִּקַּח אֶת בַּת פַּרְעֹה
  chosen: and he took Pharaoh’s daughter
  alternatives:
  - and he married Pharaoh’s daughter
  lexicon: HALOT
  rationale: Hebrew לקח plus a woman as object is a standard idiom for taking in marriage. Retaining 'took' stays closer to the source while the prior clause already makes the marital sense explicit.
- source_word: וַיְבִיאֶהָ
  chosen: and brought her
  alternatives:
  - and brought her in
  lexicon: HALOT
  rationale: The verb means 'bring' or 'cause to come.' 'Brought her' is sufficient in English because the destination follows immediately.
- source_word: אֶל עִיר דָּוִד
  chosen: into the city of David
  alternatives:
  - to the city of David
  lexicon: HALOT
  rationale: '''Into'' fits the motion of bringing someone into a place of residence and reads naturally in context.'
- source_word: עַד כַּלֹּתוֹ
  chosen: until he had finished
  alternatives:
  - until he finished
  - while he was finishing
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix after עַד marks the endpoint of the situation. The pluperfect-style English 'had finished' clarifies the temporal relation to her staying in the city of David.
- source_word: לִבְנוֹת
  chosen: building
  alternatives:
  - to build
  lexicon: HALOT
  rationale: After 'finished,' English idiom prefers the gerund 'finished building,' though the Hebrew uses an infinitive construct.
- source_word: אֶת בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - his palace
  lexicon: HALOT
  rationale: '''House'' is the basic sense of בית. In royal context it likely refers to Solomon''s palace complex, but ''his own house'' preserves the Hebrew wording without over-specifying; ''own'' helps distinguish it from the LORD''s house in the same sentence.'
- source_word: וְאֶת בֵּית יְהוָה
  chosen: and the house of the LORD
  alternatives:
  - and the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following the doctrine default, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while remaining clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: וְאֶת חוֹמַת יְרוּשָׁלִַם סָבִיב
  chosen: and the wall around Jerusalem
  alternatives:
  - and Jerusalem’s surrounding wall
  - and the wall of Jerusalem all around
  lexicon: HALOT
  rationale: חוֹמָה is singular 'wall,' and סָבִיב indicates encircling extent. 'The wall around Jerusalem' is idiomatic and preserves the sense of a surrounding fortification.
