theological_decisions:
- issue: Rendering of חֶסֶד in a covenantal royal context
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - loyal love
  rationale: The verse recalls God's loyal dealings with David and their concrete
    continuation in the Davidic succession. 'Covenant faithfulness' foregrounds the
    covenantal and promissory dimension without denying affective overtones.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
