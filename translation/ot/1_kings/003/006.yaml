id: 1KI.3.6
reference: 1 Kings 3:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁלֹמֹ֗ה אַתָּ֨ה עָשִׂ֜יתָ עִם עַבְדְּ/ךָ֙ דָוִ֣ד אָבִ/י֮ חֶ֣סֶד
    גָּדוֹל֒ כַּ/אֲשֶׁר֩ הָלַ֨ךְ לְ/פָנֶ֜י/ךָ בֶּ/אֱמֶ֧ת וּ/בִ/צְדָקָ֛ה וּ/בְ/יִשְׁרַ֥ת
    לֵבָ֖ב עִמָּ֑/ךְ וַ/תִּשְׁמָר ל֗/וֹ אֶת הַ/חֶ֤סֶד הַ/גָּדוֹל֙ הַ/זֶּ֔ה וַ/תִּתֶּן
    ל֥/וֹ בֵ֛ן יֹשֵׁ֥ב עַל כִּסְא֖/וֹ כַּ/יּ֥וֹם הַ/זֶּֽה־־־־־׃
translation:
  text: And Solomon said, “You have shown great covenant faithfulness to your servant
    David my father, because he walked before you in truth, in righteousness, and
    in uprightness of heart with you; and you have kept for him this great covenant
    faithfulness and have given him a son sitting on his throne, as it is this day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “steadfast love” or “loyal love” for “covenant faithfulness.”
    reason: lexical_alternative
  - marker: b
    text: “In truth” may also be understood as “faithfully” or “with integrity.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: “as this day,” meaning the present situation visibly confirms
      it.'
    reason: cultural_note
lexical_decisions:
- source_word: חֶסֶד
  chosen: covenant faithfulness
  alternatives:
  - steadfast love
  - kindness
  - loyal love
  lexicon: HALOT, BDB
  rationale: חֶסֶד in covenantal contexts often denotes loyal, covenant-keeping love
    rather than mere kindness. Here Solomon speaks of God's treatment of David in
    relation to David's covenantal walk and the dynastic promise, so 'covenant faithfulness'
    best preserves the relational and covenantal force.
- source_word: עָשִׂיתָ עִם
  chosen: have shown
  alternatives:
  - have done for
  - have dealt with
  lexicon: HALOT, BDB
  rationale: The idiom 'do with' plus חֶסֶד is naturally rendered in English as 'show'
    or 'show toward.' 'Have shown' is idiomatic while preserving the action of extending
    covenant loyalty.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT, BDB
  rationale: Although עבד can mean 'slave,' in royal prayer language for David before
    God 'servant' is the natural and established sense, emphasizing status before
    God rather than bonded chattel imagery.
- source_word: כַּאֲשֶׁר
  chosen: because
  alternatives:
  - just as
  - according as
  lexicon: HALOT, BDB
  rationale: Here the clause gives the basis or occasion for God's shown חֶסֶד toward
    David. 'Because' communicates the causal nuance more clearly in modern English
    than a more wooden 'as'.
- source_word: הָלַךְ לְפָנֶיךָ
  chosen: he walked before you
  alternatives:
  - he lived before you
  - he conducted himself before you
  lexicon: HALOT, BDB
  rationale: This is a common Hebrew idiom for one's manner of life in God's presence.
    'Walked before you' preserves the biblical metaphor and remains understandable.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - faithfully
  - with integrity
  lexicon: HALOT, BDB
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. 'In truth' keeps
    the lexical connection while fitting the triad with righteousness and uprightness
    of heart.
- source_word: בִּצְדָקָה
  chosen: in righteousness
  alternatives:
  - in justice
  - rightly
  lexicon: HALOT, BDB
  rationale: צְדָקָה here describes David's moral rectitude before God. 'Righteousness'
    is the most direct rendering in this non-Pauline Hebrew context.
- source_word: וּבְיִשְׁרַת לֵבָב
  chosen: in uprightness of heart
  alternatives:
  - with integrity of heart
  - in straightness of heart
  lexicon: HALOT, BDB
  rationale: The phrase denotes inner sincerity and moral straightness. 'Uprightness
    of heart' is both natural and close to the Hebrew imagery.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - before you
  lexicon: HALOT, BDB
  rationale: The preposition is explicitly 'with,' not merely another repetition of
    'before you.' Retaining 'with you' preserves the relational nuance of David's
    life in fellowship with God.
- source_word: וַתִּשְׁמָר לוֹ
  chosen: you have kept for him
  alternatives:
  - you have preserved for him
  - you have maintained for him
  lexicon: HALOT, BDB
  rationale: שׁמר here means to keep or preserve in force the previously mentioned
    חֶסֶד. 'Kept for him' is concise and reflects continuation of divine loyalty.
- source_word: בֵן יֹשֵׁב עַל כִּסְאוֹ
  chosen: a son sitting on his throne
  alternatives:
  - a son to sit on his throne
  - an heir seated on his throne
  lexicon: HALOT, BDB
  rationale: The participle יֹשֵׁב depicts the son as presently enthroned. 'A son
    sitting on his throne' preserves the concrete image and the realized fulfillment
    in Solomon.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as is evident today
  lexicon: HALOT, BDB
  rationale: This Hebrew idiom points to present, visible confirmation. 'As it is
    this day' is a natural English equivalent that preserves the deictic force.
