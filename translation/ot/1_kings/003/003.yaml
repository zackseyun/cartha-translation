id: 1KI.3.3
reference: 1 Kings 3:3
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֤ב שְׁלֹמֹה֙ אֶת יְהוָ֔ה לָ/לֶ֕כֶת בְּ/חֻקּ֖וֹת דָּוִ֣ד אָבִ֑י/ו רַ֚ק בַּ/בָּמ֔וֹת ה֥וּא מְזַבֵּ֖חַ וּ/מַקְטִֽיר־׃
translation:
  text: Solomon loved Yahweh, walking in the statutes of David his father; only, he was sacrificing and burning incense at the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'except that he was sacrificing and burning incense at the high places.'
    reason: alternative_reading
  - marker: b
    text: '''High places'' refers to local elevated worship sites.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: loved
  alternatives:
  - showed love for
  lexicon: HALOT
  rationale: The verb from אהב straightforwardly denotes love/affection. 'Loved' is the most natural and direct English rendering and preserves the evaluative force of the narrator's statement.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: ללכת
  chosen: walking
  alternatives:
  - to walk
  - by walking
  - in that he walked
  lexicon: HALOT
  rationale: The infinitive construct expresses the manner or evidence of Solomon's love for the LORD. 'Walking' idiomatically conveys ongoing conduct while fitting smooth English after the main clause.
- source_word: בחקות
  chosen: in the statutes
  alternatives:
  - according to the statutes
  - in the ordinances
  lexicon: HALOT
  rationale: חֻקּוֹת commonly refers to prescribed statutes/decrees. 'Statutes' preserves the legal-covenantal nuance better than the broader 'ways.'
- source_word: דוד אביו
  chosen: of David his father
  alternatives:
  - of his father David
  lexicon: HALOT
  rationale: Both are possible in English; this order keeps the Hebrew apposition clear and reads naturally.
- source_word: רק
  chosen: only
  alternatives:
  - except that
  - nevertheless
  lexicon: HALOT
  rationale: רַק introduces a limitation on the positive assessment just given. 'Only' preserves the adversative qualification without overstating contrast.
- source_word: בבמות
  chosen: at the high places
  alternatives:
  - on the high places
  - at the shrines on the heights
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated worship sites. 'High places' is the standard concise rendering and remains understandable in context.
- source_word: מזבח
  chosen: was sacrificing
  alternatives:
  - sacrificed
  - was offering sacrifices
  lexicon: HALOT
  rationale: The participle depicts ongoing/customary action. 'Was sacrificing' preserves the durative sense better than a simple past.
- source_word: ומקטיר
  chosen: and burning incense
  alternatives:
  - and making offerings go up in smoke
  - and offering smoke offerings
  lexicon: HALOT
  rationale: The Hiphil of קטר in worship contexts commonly refers to burning incense or offerings. Here 'burning incense' is the clearest idiomatic rendering and distinguishes it from the previous sacrificial verb.
