id: 1KI.3.25
reference: 1 Kings 3:25
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ גִּזְר֛וּ אֶת הַ/יֶּ֥לֶד הַ/חַ֖י לִ/שְׁנָ֑יִם וּ/תְנ֤וּ
    אֶֽת הַ/חֲצִי֙ לְ/אַחַ֔ת וְ/אֶֽת הַ/חֲצִ֖י לְ/אֶחָֽת־־־׃
translation:
  text: Then the king said, “Cut the living child in two, and give half to the one
    woman and half to the other.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to one ... and to one,'' with feminine forms referring to the
      two women in the narrative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the article is preserved
    in English.
- source_word: גִּזְרוּ
  chosen: Cut
  alternatives:
  - Divide
  - Cut up
  lexicon: HALOT
  rationale: Imperative plural from גזר, here a command to sever physically. 'Cut'
    is direct and idiomatic; 'divide' is possible but less vivid, while the context
    clearly involves cutting the child.
- source_word: הַיֶּלֶד הַחַי
  chosen: the living child
  alternatives:
  - the live child
  - the child who is alive
  lexicon: HALOT
  rationale: The adjective הַחַי distinguishes this child from the dead one in the
    surrounding narrative. 'Living child' is concise and natural.
- source_word: לִשְׁנָיִם
  chosen: in two
  alternatives:
  - into two parts
  - in half
  lexicon: HALOT
  rationale: The prepositional phrase indicates division into two portions. 'In two'
    is idiomatic with the verb 'cut.' 'In half' would be acceptable but the Hebrew
    explicitly says 'into two.'
- source_word: וּתְנוּ
  chosen: and give
  alternatives:
  - then give
  lexicon: HALOT
  rationale: A second plural imperative coordinated with the first command. 'And give'
    preserves the sequence and coordination.
- source_word: הַחֲצִי
  chosen: half
  alternatives:
  - the half
  - one half
  lexicon: HALOT
  rationale: English idiom omits the article here. The sense is one half of the child.
- source_word: לְאַחַת ... לְאֶחָת
  chosen: to the one woman ... to the other
  alternatives:
  - to one ... to one
  - to one woman ... to one woman
  lexicon: HALOT
  rationale: Hebrew uses feminine singular 'to one' twice, referring to the two women
    already present in context. English requires disambiguation for clarity; 'the
    one woman ... the other' preserves the distributive sense without adding interpretive
    content beyond the immediate context.
