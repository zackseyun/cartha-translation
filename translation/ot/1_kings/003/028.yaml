theological_decisions:
- issue: Rendering אֱלֹהִים in a non-polemical royal wisdom context
  chosen_reading: God
  alternative_readings:
  - divine
  rationale: The Hebrew explicitly names אֱלֹהִים, and there is no contextual reason
    to dilute this to an impersonal adjective. The verse attributes Solomon's wisdom
    to God in a way consistent with the chapter's theology.
- issue: Nuance of וַיִּרְאוּ מִפְּנֵי הַמֶּלֶךְ
  chosen_reading: they stood in awe of the king
  alternative_readings:
  - they feared the king
  - they revered the king
  rationale: The text describes the people's response to perceived God-given wisdom
    in the king. 'Awe' preserves the tension between fear and reverence without reducing
    it to either cringing terror or merely polite respect.
  doctrine_reference: Translation philosophy §3
