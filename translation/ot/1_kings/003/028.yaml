id: 1KI.3.28
reference: 1 Kings 3:28
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֣וּ כָל יִשְׂרָאֵ֗ל אֶת הַ/מִּשְׁפָּט֙ אֲשֶׁ֣ר שָׁפַ֣ט הַ/מֶּ֔לֶךְ
    וַ/יִּֽרְא֖וּ מִ/פְּנֵ֣י הַ/מֶּ֑לֶךְ כִּ֣י רָא֔וּ כִּֽי חָכְמַ֧ת אֱלֹהִ֛ים בְּ/קִרְבּ֖/וֹ
    לַ/עֲשׂ֥וֹת מִשְׁפָּֽט־־־׃ס
translation:
  text: And all Israel heard of the judgment that the king had rendered, and they
    stood in awe of the king, because they saw that the wisdom of God was within him
    to administer justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they feared the king' or 'they revered the king.' The Hebrew can express
      fear, reverence, or awe in response to recognized authority.
    reason: lexical_alternative
  - marker: b
    text: Or, 'to do justice' or 'to render judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard of
  alternatives:
  - heard
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear,' but in English 'heard of the judgment' naturally
    conveys receiving news about the case/result. The direct object is 'the judgment,'
    so 'heard of' is idiomatic without significantly departing from the source sense.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: A conventional collective expression referring to the people/nation as
    a whole. 'All Israel' preserves the Hebrew idiom and narrative style better than
    the more expansive 'all the Israelites.'
- source_word: הַמִּשְׁפָּט
  chosen: the judgment
  alternatives:
  - the decision
  - the justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the judicial decision Solomon rendered in the
    case. 'Judgment' preserves the legal register and matches the following judicial
    language.
- source_word: שָׁפַט
  chosen: had rendered
  alternatives:
  - judged
  - decided
  lexicon: HALOT
  rationale: With מִשְׁפָּט as object, English idiom prefers 'rendered [judgment].'
    This keeps the legal sense explicit and readable.
- source_word: וַיִּרְאוּ מִפְּנֵי הַמֶּלֶךְ
  chosen: they stood in awe of the king
  alternatives:
  - they feared the king
  - they revered the king
  lexicon: HALOT
  rationale: ירא plus מִפְּנֵי can denote fear before someone, but in this context
    the response is respect arising from recognized wisdom, not mere terror. 'Stood
    in awe of' preserves the seriousness while avoiding an overly narrow emotional
    reading.
- source_word: כִּי רָאוּ
  chosen: because they saw
  alternatives:
  - for they saw
  lexicon: HALOT
  rationale: The first כִּי is causal, explaining why they were in awe. 'Because'
    is clear modern English.
- source_word: חָכְמַת אֱלֹהִים
  chosen: the wisdom of God
  alternatives:
  - godly wisdom
  - divine wisdom
  lexicon: HALOT
  rationale: The construct phrase most directly means 'the wisdom of God.' This preserves
    the explicit reference to God rather than generalizing to 'divine' or adjectival
    'godly.'
- source_word: בְּקִרְבּוֹ
  chosen: was within him
  alternatives:
  - was in him
  - was in his midst
  lexicon: HALOT
  rationale: With a singular personal suffix, the phrase indicates an internal quality
    residing in Solomon. 'Within him' is natural English and preserves the inward-location
    metaphor.
- source_word: לַעֲשׂוֹת מִשְׁפָּט
  chosen: to administer justice
  alternatives:
  - to do justice
  - to render judgment
  lexicon: HALOT
  rationale: 'The infinitive phrase expresses purpose or result: the wisdom enabled
    him in judicial action. ''Administer justice'' is idiomatic English for royal/judicial
    function and captures more than a single verdict.'
