theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret בַיִת as 'house' or explicitly as 'temple'
  chosen_reading: house in the main text, with temple sense left implicit in context
  alternative_readings:
  - temple
  rationale: The Hebrew lexeme is 'house,' and the phrase 'for the name of the LORD'
    identifies it as the temple. Retaining 'house' preserves the source wording without
    obscuring meaning.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
