id: 1KI.3.2
reference: 1 Kings 3:2
source:
  edition: WLC
  text: רַ֣ק הָ/עָ֔ם מְזַבְּחִ֖ים בַּ/בָּמ֑וֹת כִּ֠י לֹא נִבְנָ֥ה בַ֨יִת֙ לְ/שֵׁ֣ם
    יְהוָ֔ה עַ֖ד הַ/יָּמִ֥ים הָ/הֵֽם־׃פ
translation:
  text: Only the people were sacrificing at the high places, because no house had
    yet been built for the name of the LORD until those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple'; Hebrew 'house.' The phrase 'for the name of the LORD' refers
      to the temple to be built in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - However
  - Except that
  lexicon: HALOT
  rationale: Introduces a limitation or exception to the preceding positive assessment
    of Solomon. 'Only' is the most natural English marker of that concessive limitation
    here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  - the common people
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers broadly to the populace engaged
    in worship, not necessarily in contrast to leaders in a technical sense.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - sacrificed
  - were offering sacrifices
  lexicon: HALOT
  rationale: The participle conveys ongoing/customary action. 'Were sacrificing' preserves
    the verbal aspect in readable English better than a simple past.
- source_word: בַּבָּמוֹת
  chosen: at the high places
  alternatives:
  - on the high places
  - at the local shrines
  lexicon: HALOT
  rationale: במות refers to elevated cultic sites or shrine locations. 'High places'
    is the standard and sufficiently transparent rendering; 'at' fits English idiom
    for worship activity at cult sites.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Here the conjunction gives the reason the people were sacrificing at
    the high places: the temple had not yet been built. ''Because'' makes the causal
    force explicit.'
- source_word: לֹא נִבְנָה בַיִת
  chosen: no house had yet been built
  alternatives:
  - the house had not yet been built
  - no temple had yet been built
  lexicon: HALOT
  rationale: The passive perfect/niphal indicates that a house had not been built
    up to that time. 'House' is retained in the main text because the Hebrew says
    בית, while the following phrase 'for the name of the LORD' clarifies that this
    is the temple. 'Yet' appropriately captures the temporal sense in context.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - for the LORD's name
  - for the renown of the LORD
  lexicon: HALOT
  rationale: This is a standard temple expression in Kings. 'For the name of the LORD'
    preserves the covenantal/theological wording rather than flattening it to merely
    'for the LORD.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: עַד הַיָּמִים הָהֵם
  chosen: until those days
  alternatives:
  - up to that time
  - until then
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew temporal expression.
    Although 'until then' is smoother, 'until those days' better reflects the source
    wording while remaining intelligible.
