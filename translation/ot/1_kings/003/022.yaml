id: 1KI.3.22
reference: 1 Kings 3:22
source:
  edition: WLC
  text: וַ/תֹּאמֶר֩ הָ/אִשָּׁ֨ה הָ/אַחֶ֜רֶת לֹ֣א כִ֗י בְּנִ֤/י הַ/חַי֙ וּ/בְנֵ֣/ךְ
    הַ/מֵּ֔ת וְ/זֹ֤את אֹמֶ֨רֶת֙ לֹ֣א כִ֔י בְּנֵ֥/ךְ הַ/מֵּ֖ת וּ/בְנִ֣/י הֶ/חָ֑י וַ/תְּדַבֵּ֖רְנָה
    לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: But the other woman said, “No! My son is the living one, and your son is the
    dead one.” And this one said, “No! Your son is the dead one, and my son is the
    living one.” So they spoke before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'My son is alive, and your son is dead ... your
      son is dead, and my son is alive.' The main text preserves the Hebrew contrast
      'the living one / the dead one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Common narrative verb of speech; 'said' is the most natural English rendering
    in this courtroom-like exchange.
- source_word: הָאִשָּׁה הָאַחֶרֶת
  chosen: the other woman
  alternatives:
  - the other wife
  - the other woman involved
  lexicon: HALOT
  rationale: אִשָּׁה here refers to the other of the two women in the dispute; 'woman'
    is contextually clear and avoids importing marital sense.
- source_word: לֹא כִי
  chosen: No!
  alternatives:
  - No indeed
  - Not so
  lexicon: HALOT
  rationale: This combination functions as a forceful denial. 'No!' captures the sharp
    contradiction in idiomatic modern English.
- source_word: בְּנִי הַחַי
  chosen: my son is the living one
  alternatives:
  - my son is alive
  - my son is the live one
  lexicon: HALOT
  rationale: The Hebrew uses the adjective with article, contrasting two identified
    children. 'The living one' preserves the explicit contrast with 'the dead one'
    better than simply 'alive'.
- source_word: וּבְנֵךְ הַמֵּת
  chosen: and your son is the dead one
  alternatives:
  - and your son is dead
  - and your son is the one who died
  lexicon: HALOT
  rationale: Like the previous phrase, the article marks the contrasted child. 'The
    dead one' mirrors the Hebrew structure and the legal-dispute tone.
- source_word: וְזֹאת אֹמֶרֶת
  chosen: And this one said
  alternatives:
  - but this one said
  - and she said
  lexicon: HALOT
  rationale: זֹאת literally means 'this one' (feminine), pointing to the other woman
    in the alternating dispute. Preserving 'this one' reflects the deictic force better
    than a simple pronoun.
- source_word: הֶחָי
  chosen: the living one
  alternatives:
  - alive
  - the live one
  lexicon: HALOT
  rationale: Same adjective as earlier with article; consistency preserves the antithetical
    structure of the women's claims.
- source_word: וַתְּדַבֵּרְנָה
  chosen: So they spoke
  alternatives:
  - and they spoke
  - and they kept speaking
  - thus they spoke
  lexicon: HALOT
  rationale: Plural feminine verb summarizes the ongoing exchange before Solomon.
    'So they spoke' gives a natural narrative wrap-up while reflecting the waw-consecutive
    progression.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  - before King Solomon
  lexicon: HALOT
  rationale: Literal and idiomatic. The Hebrew says 'the king,' and the immediate
    context already identifies him, so adding 'Solomon' would be interpretive expansion.
