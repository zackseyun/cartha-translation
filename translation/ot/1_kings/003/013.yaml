id: 1KI.3.13
reference: 1 Kings 3:13
source:
  edition: WLC
  text: וְ/גַ֨ם אֲשֶׁ֤ר לֹֽא שָׁאַ֨לְתָּ֙ נָתַ֣תִּי לָ֔/ךְ גַּם עֹ֖שֶׁר גַּם כָּב֑וֹד
    אֲ֠שֶׁר לֹא הָיָ֨ה כָמ֥וֹ/ךָ אִ֛ישׁ בַּ/מְּלָכִ֖ים כָּל יָמֶֽי/ךָ־־־־־׃
translation:
  text: And I have also given you what you did not ask for—both riches and honor—so
    that there has not been any man like you among the kings all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that no one like you has been among the kings all your days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Moreover
  - And also
  lexicon: HALOT
  rationale: The conjunction plus additive particle continues God's speech and adds
    another gift beyond Solomon's request. Rendering with both 'And' and 'also' preserves
    the additive force without sounding wooden.
- source_word: אֲשֶׁר לֹא שָׁאַלְתָּ
  chosen: what you did not ask for
  alternatives:
  - that which you did not ask
  - what you have not asked
  lexicon: HALOT
  rationale: The relative clause is best rendered idiomatically in English as 'what
    you did not ask for.' Adding 'for' reflects normal English usage with 'ask' in
    this context and does not exceed the Hebrew sense.
- source_word: נָתַתִּי לָךְ
  chosen: I have also given you
  alternatives:
  - I gave you
  - I have given to you
  lexicon: HALOT
  rationale: The Hebrew perfect in direct divine speech can be rendered as an English
    present perfect to express a completed grant with present relevance. 'Given you'
    is natural English for the dative construction.
- source_word: גַּם עֹשֶׁר גַּם כָּבוֹד
  chosen: both riches and honor
  alternatives:
  - also wealth and also glory
  - both wealth and honor
  lexicon: HALOT
  rationale: The repeated גַּם marks addition of two distinct benefits; 'both ...
    and ...' captures this neatly. 'Riches' is a natural rendering of עֹשֶׁר, and
    'honor' fits כָּבוֹד here better than 'glory,' since the context is royal status
    among human kings.
- source_word: אֲשֶׁר לֹא הָיָה כָמוֹךָ אִישׁ
  chosen: so that there has not been any man like you
  alternatives:
  - such that no man has been like you
  - so that no one has been like you
  lexicon: HALOT
  rationale: This clause explains the result of the granted riches and honor. 'Any
    man like you' preserves אִישׁ explicitly, in line with the project's gender-accurate
    policy, while remaining idiomatic.
- source_word: בַּמְּלָכִים
  chosen: among the kings
  alternatives:
  - among kings
  - in the kings
  lexicon: HALOT
  rationale: 'The preposition with article is best expressed as a partitive/comparative
    phrase: Solomon is incomparable within the class of kings.'
- source_word: כָּל יָמֶיךָ
  chosen: all your days
  alternatives:
  - all your lifetime
  - all your life
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'All your days' preserves the source
    wording and remains understandable in modern English.
