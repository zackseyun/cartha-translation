theological_decisions:
- issue: Rendering אִישׁ in a comparative statement
  chosen_reading: any man like you
  alternative_readings:
  - anyone like you
  - no king like you
  rationale: The Hebrew explicitly uses אִישׁ ('man'), not merely an indefinite pronoun.
    Following the gender-accurate policy, the translation preserves the masculine
    singular while recognizing that English alternatives could smooth the expression.
    'No king like you' would over-assimilate the wording to the following phrase 'among
    the kings.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
