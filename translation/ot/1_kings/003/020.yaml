id: 1KI.3.20
reference: 1 Kings 3:20
source:
  edition: WLC
  text: וַ/תָּקָם֩ בְּ/ת֨וֹךְ הַ/לַּ֜יְלָה וַ/תִּקַּ֧ח אֶת בְּנִ֣/י מֵֽ/אֶצְלִ֗/י
    וַ/אֲמָֽתְ/ךָ֙ יְשֵׁנָ֔ה וַ/תַּשְׁכִּיבֵ֖/הוּ בְּ/חֵיקָ֑/הּ וְ/אֶת בְּנָ֥/הּ הַ/מֵּ֖ת
    הִשְׁכִּ֥יבָה בְ/חֵיקִֽ/י־־׃
translation:
  text: She got up in the middle of the night and took my son from beside me while
    your servant was sleeping, and she laid him in her bosom, and laid her dead son
    in my bosom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her lap ... in my lap.' The Hebrew חֵיק can refer to the bosom or
      lap; 'bosom' was chosen to preserve the intimate maternal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/ת֨וֹךְ הַ/לַּ֜יְלָה
  chosen: in the middle of the night
  alternatives:
  - during the night
  - in the midst of the night
  lexicon: HALOT
  rationale: בְּתוֹךְ with הַלַּיְלָה denotes the interior/middle of the night, not
    merely a general nighttime setting. 'In the middle of the night' is natural English
    and preserves the force.
- source_word: מֵֽ/אֶצְלִ֗/י
  chosen: from beside me
  alternatives:
  - from next to me
  - from my side
  lexicon: HALOT
  rationale: אֵצֶל commonly indicates proximity or position at someone's side. 'From
    beside me' is idiomatic and precise in context of sleeping arrangements.
- source_word: וַ/אֲמָֽתְ/ךָ֙
  chosen: your servant
  alternatives:
  - your maidservant
  - I, your servant
  lexicon: HALOT
  rationale: The speaker addresses the king with the conventional self-humbling term
    אֲמָה/אָמָה. 'Your servant' is the standard courtly rendering in English; 'maidservant'
    is possible but sounds overly marked here unless the female status is especially
    foregrounded.
- source_word: יְשֵׁנָ֔ה
  chosen: was sleeping
  alternatives:
  - slept
  - asleep
  lexicon: HALOT
  rationale: The adjective/participle-like form describes the speaker's state at the
    time. 'Was sleeping' best conveys the ongoing background action in English narrative.
- source_word: וַ/תַּשְׁכִּיבֵ֖/הוּ
  chosen: she laid him
  alternatives:
  - she put him down
  - she placed him
  lexicon: HALOT
  rationale: Hiphil of שׁכב means to cause to lie down. 'Laid him' is concise and
    fits the maternal/bed context better than the more generic 'placed him'.
- source_word: בְּ/חֵיקָ֑/הּ
  chosen: in her bosom
  alternatives:
  - in her lap
  - at her breast
  lexicon: HALOT
  rationale: חֵיק refers to the bosom/lap area. 'Bosom' preserves the intimate maternal
    sense and matches the parallel phrase in the verse. 'Lap' is possible but slightly
    less evocative of the close sleeping/nursing context.
- source_word: הַ/מֵּ֖ת
  chosen: dead
  alternatives:
  - the dead one
  lexicon: HALOT
  rationale: 'The attributive participle functions adjectivally with ''son'': ''her
    dead son.'' This is the most natural English rendering.'
- source_word: בְ/חֵיקִֽ/י
  chosen: in my bosom
  alternatives:
  - in my lap
  - at my breast
  lexicon: HALOT
  rationale: For consistency with בְחֵיקָהּ earlier in the verse, the same core gloss
    is retained. The phrase describes close bodily placement while sleeping.
