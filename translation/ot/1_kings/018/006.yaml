id: 1KI.18.6
reference: 1 Kings 18:6
source:
  edition: WLC
  text: וַֽ/יְחַלְּק֥וּ לָ/הֶ֛ם אֶת הָ/אָ֖רֶץ לַֽ/עֲבָר בָּ֑/הּ אַחְאָ֞ב הָלַ֨ךְ בְּ/דֶ֤רֶךְ
    אֶחָד֙ לְ/בַדּ֔/וֹ וְ/עֹֽבַדְיָ֛הוּ הָלַ֥ךְ בְּ/דֶרֶךְ אֶחָ֖ד לְ/בַדּֽ/וֹ־־־׃
translation:
  text: 'So they divided the land between themselves to pass through it: Ahab went
    one way by himself, and Obadiah went another way by himself.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally repeats ''one way'' for both men: ''Ahab went on one way
      by himself, and Obadiah went on one way by himself.'' The translation uses ''another
      way'' in the second clause to make the contrast explicit in natural English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַלְּקוּ
  chosen: they divided
  alternatives:
  - they apportioned
  - they split
  lexicon: HALOT
  rationale: Piel wayyiqtol of חלק indicates an active dividing or apportioning. 'They
    divided' is the most natural and sufficiently formal rendering in context.
- source_word: לָהֶם
  chosen: between themselves
  alternatives:
  - for themselves
  - to themselves
  lexicon: HALOT
  rationale: 'The dative pronoun here marks reciprocal distribution in context: the
    land was divided as between the two men. English idiom prefers ''between themselves''
    rather than the more wooden ''for themselves.'''
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the territory
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the region they intended to search, not the earth
    in a global sense. 'Land' is the standard and suitably broad rendering.
- source_word: לַעֲבָר בָּהּ
  chosen: to pass through it
  alternatives:
  - to go through it
  - to travel through it
  lexicon: HALOT
  rationale: Infinitive construct of עבר with בָּהּ expresses movement through the
    land. 'To pass through it' preserves the verbal sense without overinterpreting
    the purpose.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - walked
  - traveled
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' In narrative route description, 'went'
    is idiomatic English and avoids implying literal walking only.
- source_word: בְּדֶרֶךְ אֶחָד
  chosen: one way
  alternatives:
  - by one road
  - on one route
  lexicon: HALOT
  rationale: The phrase denotes one distinct route or direction. 'One way' is concise,
    natural English that captures the distributive contrast with Obadiah's route.
- source_word: לְבַדּוֹ
  chosen: by himself
  alternatives:
  - alone
  lexicon: HALOT
  rationale: The term means 'by himself/alone.' 'By himself' fits the narrative emphasis
    that each man went separately.
- source_word: וְעֹבַדְיָהוּ
  chosen: and Obadiah
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: בְּדֶרֶךְ אֶחָד
  chosen: another way
  alternatives:
  - one way
  lexicon: HALOT
  rationale: 'Although the Hebrew repeats ''one way,'' English idiom in a paired contrast
    is clearer with ''another way.'' This is an optimal-equivalence adjustment that
    preserves the distributive sense: each took a different route.'
