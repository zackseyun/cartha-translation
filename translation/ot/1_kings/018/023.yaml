theological_decisions:
- issue: Rendering of sacrificial-preparation language without importing later theological
    categories
  chosen_reading: Use ordinary sacrificial preparation terms ('cut it into pieces,'
    'place it on the wood,' 'put no fire under it')
  alternative_readings:
  - Use more technical cultic language such as 'arrange' or 'offer' throughout
  rationale: The verse describes the practical setup of the contest on Mount Carmel
    rather than expounding sacrificial theology. The translation therefore stays close
    to the concrete Hebrew actions and avoids importing doctrinally loaded terminology
    beyond what the text states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never import doctrinal
    claims the text does not make.'
