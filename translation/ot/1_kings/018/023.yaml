id: 1KI.18.23
reference: 1 Kings 18:23
source:
  edition: WLC
  text: וְ/יִתְּנוּ לָ֜/נוּ שְׁנַ֣יִם פָּרִ֗ים וְ/יִבְחֲר֣וּ לָ/הֶם֩ הַ/פָּ֨ר הָ/אֶחָ֜ד
    וִֽ/ינַתְּחֻ֗/הוּ וְ/יָשִׂ֨ימוּ֙ עַל הָ֣/עֵצִ֔ים וְ/אֵ֖שׁ לֹ֣א יָשִׂ֑ימוּ וַ/אֲנִ֞י
    אֶעֱשֶׂ֣ה אֶת הַ/פָּ֣ר הָ/אֶחָ֗ד וְ/נָֽתַתִּי֙ עַל הָ֣/עֵצִ֔ים וְ/אֵ֖שׁ לֹ֥א אָשִֽׂים־־׀־־׃
translation:
  text: Let them give us two bulls, and let them choose one bull for themselves, cut
    it into pieces, and place it on the wood, but put no fire under it. And I will
    prepare the other bull and place it on the wood, and I will put no fire under
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'put no fire.' 'Under it' is supplied in English from
      the sacrificial context, since the fire would be applied beneath the offering
      on the wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְּנוּ לָנוּ
  chosen: Let them give us
  alternatives:
  - Let them provide us
  - Let two bulls be given to us
  lexicon: HALOT
  rationale: 'The jussive/imperfect with prefixed conjunction functions as a proposal
    or challenge: ''let them give/provide.'' ''Give us'' is straightforward modern
    English and preserves the direct appeal.'
- source_word: שְׁנַיִם פָּרִים
  chosen: two bulls
  alternatives:
  - two oxen
  - two young bulls
  lexicon: HALOT
  rationale: פָּר commonly denotes a bull from the herd, especially in sacrificial
    contexts. 'Bulls' is the clearest natural rendering here; 'oxen' is too broad,
    and 'young bulls' adds specificity not explicit in the verse.
- source_word: וְיִבְחֲרוּ לָהֶם
  chosen: let them choose one bull for themselves
  alternatives:
  - let them select for themselves
  - let them choose for themselves
  lexicon: HALOT
  rationale: בחר means 'choose/select.' The dative לָהֶם indicates selection on their
    own side in the contest, best brought out by 'for themselves.'
- source_word: הַפָּר הָאֶחָד
  chosen: one bull
  alternatives:
  - the one bull
  - one of the bulls
  lexicon: HALOT
  rationale: With the article plus numeral, the phrase points to one of the two bulls.
    English idiom is smoother with 'one bull' rather than the more wooden 'the one
    bull.'
- source_word: וִינַתְּחֻהוּ
  chosen: cut it into pieces
  alternatives:
  - quarter it
  - cut it up
  lexicon: HALOT
  rationale: The verb נתּח in sacrificial preparation refers to dividing the animal
    into pieces. 'Cut it into pieces' is precise and readable; 'quarter' is too specific,
    and 'cut it up' is too colloquial.
- source_word: וְיָשִׂימוּ עַל הָעֵצִים
  chosen: place it on the wood
  alternatives:
  - lay it on the wood
  - put it on the pieces of wood
  lexicon: HALOT
  rationale: שׂים is a common verb 'put/place/set.' 'Place it on the wood' is natural
    in English. הָעֵצִים refers to the arranged fuel wood for sacrifice; singular
    'wood' is idiomatic collective English.
- source_word: וְאֵשׁ לֹא יָשִׂימוּ
  chosen: but put no fire under it
  alternatives:
  - but they must not set fire to it
  - but they must put no fire
  lexicon: HALOT
  rationale: The clause specifies that no fire is to be applied. Adding 'under it'
    clarifies the sacrificial setup and matches the implied sense in context, since
    the wood is beneath the offering.
- source_word: וַאֲנִי אֶעֱשֶׂה אֶת־הַפָּר הָאֶחָד
  chosen: And I will prepare the other bull
  alternatives:
  - And I will do the one bull
  - And I will prepare one bull
  lexicon: HALOT
  rationale: עשה with the sacrificial animal means to prepare/offer it, not merely
    'do.' Since one bull has already been assigned to them, English naturally renders
    the remaining one as 'the other bull.' This is an idiomatic contextual clarification,
    not an added idea.
- source_word: וְנָתַתִּי עַל הָעֵצִים
  chosen: and place it on the wood
  alternatives:
  - and lay it on the wood
  - and put it on the wood
  lexicon: HALOT
  rationale: נתן here overlaps semantically with שׂים in the previous clause. 'Place
    it on the wood' preserves the parallelism in smooth English.
- source_word: וְאֵשׁ לֹא אָשִׂים
  chosen: and I will put no fire under it
  alternatives:
  - and I will not set fire to it
  - and I will put no fire
  lexicon: HALOT
  rationale: As in the earlier clause, the sense is that Elijah will not ignite the
    offering. 'Under it' is supplied for clarity from the sacrificial context and
    to preserve the parallel challenge.
