id: 1KI.18.9
reference: 1 Kings 18:9
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מֶ֣ה חָטָ֑אתִי כִּֽי אַתָּ֞ה נֹתֵ֧ן אֶֽת עַבְדְּ/ךָ֛ בְּ/יַד אַחְאָ֖ב
    לַ/הֲמִיתֵֽ/נִי־־־׃
translation:
  text: And he said, “What have I sinned, that you are giving your servant into Ahab’s
    hand to put me to death?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to kill me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Obadiah’s reply. 'And he said'
    preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: מֶה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: Interrogative used idiomatically with the following verb to express 'What
    have I done wrong?' 'What' best reflects the Hebrew form.
- source_word: חָטָאתִי
  chosen: have I sinned
  alternatives:
  - have I done wrong
  - did I sin
  lexicon: HALOT
  rationale: From חטא, 'to sin, miss, do wrong.' 'Have I sinned' keeps the moral/religious
    force of the Hebrew rather than flattening it to mere offense.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the complaint: ''that you
    are giving...'' ''That'' is the most natural English connector in this construction.'
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis in Hebrew; English naturally conveys this
    with 'you' in the clause.
- source_word: נֹתֵן
  chosen: are giving
  alternatives:
  - would give
  - are handing over
  lexicon: HALOT
  rationale: Participle with present/imminent force in direct speech. 'Are giving'
    preserves the vividness; 'handing over' is possible but the following idiom 'into
    Ahab’s hand' already carries that sense.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in deferential self-reference
    to a superior 'your servant' is the idiomatic and contextually appropriate rendering;
    bonded-status emphasis is not foregrounded here.
- source_word: בְּיַד
  chosen: into Ahab’s hand
  alternatives:
  - into the hand of Ahab
  - over to Ahab
  lexicon: HALOT
  rationale: Hebrew idiom for power/control. 'Into Ahab’s hand' preserves the metaphor
    while remaining clear in English.
- source_word: לַהֲמִיתֵנִי
  chosen: to put me to death
  alternatives:
  - to kill me
  lexicon: HALOT
  rationale: Hiphil infinitive of מות, causative 'to cause to die.' 'To put me to
    death' captures the formal, lethal intent better than the more colloquial 'kill
    me.'
