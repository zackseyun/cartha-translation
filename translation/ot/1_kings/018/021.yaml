theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphor of divided allegiance in פֹּסְחִים עַל שְׁתֵּי הַסְּעִפִּים
  chosen_reading: retain the concrete metaphor ('limping between two branches') rather
    than resolve it into an abstract interpretation
  alternative_readings:
  - wavering between two opinions
  rationale: Optimal equivalence here favors preserving the Hebrew image rather than
    importing the traditional but more interpretive 'opinions.' This keeps the prophetic
    rebuke vivid and auditable without flattening the metaphor into a doctrinal paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Preserve theological tension rather than resolve it'
