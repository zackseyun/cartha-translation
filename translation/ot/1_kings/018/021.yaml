id: 1KI.18.21
reference: 1 Kings 18:21
source:
  edition: WLC
  text: וַ/יִּגַּ֨שׁ אֵלִיָּ֜הוּ אֶל כָּל הָ/עָ֗ם וַ/יֹּ֨אמֶר֙ עַד מָתַ֞י אַתֶּ֣ם
    פֹּסְחִים֮ עַל שְׁתֵּ֣י הַ/סְּעִפִּים֒ אִם יְהוָ֤ה הָֽ/אֱלֹהִים֙ לְכ֣וּ אַחֲרָ֔י/ו
    וְ/אִם הַ/בַּ֖עַל לְכ֣וּ אַחֲרָ֑י/ו וְ/לֹֽא עָנ֥וּ הָ/עָ֛ם אֹת֖/וֹ דָּבָֽר־־־־־־־׃
translation:
  text: Then Elijah came near to all the people and said, “How long will you keep
    limping between two branches? If the LORD is God, follow him; but if Baal, follow
    him.” But the people did not answer him a word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wobbling between two opinions.' The Hebrew more literally speaks of
      limping or hobbling 'upon/between two branches/forks,' a metaphor for divided
      loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' is
    natural English and preserves the physical, confrontational movement of Elijah
    toward the assembled people.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - the whole people
  lexicon: HALOT
  rationale: A straightforward rendering of the collective expression, preserving
    the comprehensiveness of Elijah's address.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic English equivalent for the Hebrew temporal challenge formula.
- source_word: פֹּסְחִים
  chosen: keep limping
  alternatives:
  - go limping
  - hobble
  - waver
  lexicon: HALOT
  rationale: The participle of פסח literally evokes limping or hopping. Because the
    same root is associated with limping imagery and likely carries a metaphor of
    unstable movement here, 'keep limping' preserves the concrete metaphor better
    than the interpretive 'waver.'
- source_word: עַל שְׁתֵּי הַסְּעִפִּים
  chosen: between two branches
  alternatives:
  - on two branches
  - between two opinions
  - between two forks
  lexicon: HALOT
  rationale: סְעִפִּים literally refers to divided branches, boughs, or forks. Traditional
    'between two opinions' is interpretive and not the plain lexical sense. 'Between
    two branches' preserves the metaphor of divided allegiance while staying closer
    to the Hebrew.
- source_word: אִם יְהוָה הָאֱלֹהִים
  chosen: If the LORD is God
  alternatives:
  - If the LORD is the God
  lexicon: HALOT
  rationale: Follows the doctrinal default rendering of יְהוָה as 'the LORD.' The
    predicate construction is naturally rendered in English as 'is God,' expressing
    the challenge of exclusive divine identity.
- source_word: לְכוּ אַחֲרָיו
  chosen: follow him
  alternatives:
  - go after him
  lexicon: HALOT
  rationale: The idiom 'go/walk after' in covenantal contexts means allegiance and
    discipleship. 'Follow him' is the clearest natural equivalent.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English usage treats Baal as a proper
    divine name, so 'Baal' is the most natural rendering.
- source_word: וְלֹא עָנוּ הָעָם אֹתוֹ דָּבָר
  chosen: But the people did not answer him a word
  alternatives:
  - And the people did not answer him a word
  - the people answered him not a word
  lexicon: HALOT
  rationale: This idiom means complete silence. 'Did not answer him a word' preserves
    the Hebrew emphasis while remaining readable. 'But' captures the adversative force
    in context, though the conjunction is formally 'and.'
