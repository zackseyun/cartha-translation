theological_decisions:
- issue: Rendering of אָדוֹן for a human superior
  chosen_reading: your lord
  alternative_readings:
  - your master
  rationale: This is not the divine name or title for God, so it should not be capitalized
    as 'Lord.' Lowercase 'lord' preserves the social-political sense in context and
    avoids importing theological meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    term κύριος/Lord applies to divine title contexts, not this human referent.'
