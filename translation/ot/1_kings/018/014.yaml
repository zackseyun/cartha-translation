id: 1KI.18.14
reference: 1 Kings 18:14
source:
  edition: WLC
  text: וְ/עַתָּה֙ אַתָּ֣ה אֹמֵ֔ר לֵ֛ךְ אֱמֹ֥ר לַֽ/אדֹנֶ֖י/ךָ הִנֵּ֣ה אֵלִיָּ֑הוּ
    וַ/הֲרָגָֽ/נִי׃ס
translation:
  text: And now you are saying, ‘Go, tell your lord, “Look, Elijah is here,”’ and
    he will kill me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your master.' The Hebrew refers to Obadiah's human superior, Ahab.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Here is Elijah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Introduces Obadiah's immediate objection with a temporal-discursive transition.
    'And now' preserves the conjunction plus adverb and reads naturally in English.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis in Hebrew; English retains it naturally
    as the subject 'you'.
- source_word: אֹמֵר
  chosen: are saying
  alternatives:
  - say
  lexicon: HALOT
  rationale: The participle conveys present/imperfective force in context. 'Are saying'
    captures the ongoing/immediate sense better than a simple present imperative report.
- source_word: לֵךְ אֱמֹר
  chosen: Go, tell
  alternatives:
  - Go, say
  lexicon: HALOT
  rationale: The paired imperatives are idiomatic for commissioning speech. 'Tell'
    is more natural English here while preserving the command sequence.
- source_word: לַאדֹנֶיךָ
  chosen: your lord
  alternatives:
  - your master
  lexicon: HALOT
  rationale: Refers to Ahab as Obadiah's human superior, not to God. 'Lord' here means
    ruler/master in courtly address; lowercase avoids confusion with the divine title.
    'Master' is possible, but 'lord' fits royal context and the Hebrew noun.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Here is
  lexicon: HALOT
  rationale: Deictic particle drawing attention to Elijah's presence. 'Look' is readable
    modern English; 'Behold' is too archaic, while 'Here is' is also possible but
    slightly less vivid.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with
    the philosophy of transliterating names.
- source_word: וַהֲרָגַנִי
  chosen: and he will kill me
  alternatives:
  - and he would kill me
  lexicon: HALOT
  rationale: The waw + qatal here expresses the feared consequence following the reported
    command. Future 'will kill me' best conveys Obadiah's expectation if he obeys.
    The subject is contextually Ahab, supplied in English because Hebrew leaves it
    implicit.
