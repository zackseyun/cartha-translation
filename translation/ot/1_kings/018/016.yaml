id: 1KI.18.16
reference: 1 Kings 18:16
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ עֹבַדְיָ֛הוּ לִ/קְרַ֥את אַחְאָ֖ב וַ/יַּגֶּד ל֑/וֹ וַ/יֵּ֥לֶךְ
    אַחְאָ֖ב לִ/קְרַ֥את אֵלִיָּֽהוּ־׃
translation:
  text: So Obadiah went to meet Ahab and told him, and Ahab went to meet Elijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported to him.' The Hebrew verb can mean 'told,' 'reported,' or 'informed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - proceeded
  lexicon: HALOT
  rationale: The wayyiqtol of הלך here simply advances the narrative with the basic
    sense 'went.' 'Went' is natural modern English and preserves the straightforward
    motion without adding nuance not explicit in the Hebrew.
- source_word: עֹבַדְיָהוּ
  chosen: Obadiah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to go to meet
  lexicon: HALOT
  rationale: The infinitive construction with לקראת denotes movement toward someone
    for an encounter. 'To meet' is concise, idiomatic, and accurately reflects the
    purpose of the going in both occurrences.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיַּגֶּד לוֹ
  chosen: told him
  alternatives:
  - reported to him
  - informed him
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means 'tell, report, declare.' Here the object
    of what was told is implicit from context (Obadiah's report concerning Elijah's
    presence). 'Told him' preserves the Hebrew's brevity without over-specifying the
    content.
- source_word: וַיֵּלֶךְ אַחְאָב
  chosen: and Ahab went
  alternatives:
  - then Ahab went
  lexicon: HALOT
  rationale: The repeated wayyiqtol continues the sequence of events. 'And Ahab went'
    preserves the narrative flow and coordination of the Hebrew.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name transliterated by standard English convention.
