id: 1KI.18.4
reference: 1 Kings 18:4
source:
  edition: WLC
  text: וַ/יְהִי֙ בְּ/הַכְרִ֣ית אִיזֶ֔בֶל אֵ֖ת נְבִיאֵ֣י יְהוָ֑ה וַ/יִּקַּ֨ח עֹבַדְיָ֜הוּ
    מֵאָ֣ה נְבִאִ֗ים וַֽ/יַּחְבִּיאֵ֞/ם חֲמִשִּׁ֥ים אִישׁ֙ בַּ/מְּעָרָ֔ה וְ/כִלְכְּלָ֖/ם
    לֶ֥חֶם וָ/מָֽיִם׃
translation:
  text: Now when Jezebel was cutting off the prophets of the LORD, Obadiah took a
    hundred prophets and hid them by fifties in a cave, and provided them with bread
    and water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was destroying' or more literally 'was cutting off' the prophets of
      the LORD.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fifty men in a cave'; the Hebrew likely means he hid them in
      groups of fifty, apparently in separate caves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בְּהַכְרִית
  chosen: Now when ... was cutting off
  alternatives:
  - And it happened when ... cut off
  - When ... was destroying
  lexicon: HALOT
  rationale: The waw + היה with infinitive construct introduces a temporal setting
    ('now when' / 'when'). The Hiphil of כרת literally means 'cut off'; here it idiomatically
    refers to eliminating or killing. 'Was cutting off' preserves the Hebrew imagery
    while sounding natural in English.
- source_word: אִיזֶבֶל
  chosen: Jezebel
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: נְבִיאֵי יְהוָה
  chosen: the prophets of the LORD
  alternatives:
  - the LORD's prophets
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. יְהוָה follows the doctrinal
    default 'the LORD' rather than 'Yahweh' or 'Jehovah'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by DOCTRINE.md contested terms table for the divine name.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took in
  - gathered
  lexicon: HALOT
  rationale: לקח straightforwardly means 'take.' Here it introduces Obadiah's action
    of taking charge of the prophets; 'took' is sufficiently clear without over-interpreting.
- source_word: עֹבַדְיָהוּ
  chosen: Obadiah
  rationale: Personal name transliterated by standard English convention.
- source_word: מֵאָה נְבִאִים
  chosen: a hundred prophets
  lexicon: HALOT
  rationale: Direct numerical phrase rendered formally and clearly.
- source_word: וַיַּחְבִּיאֵם
  chosen: hid them
  alternatives:
  - concealed them
  lexicon: HALOT
  rationale: חבא in Hiphil means to hide or conceal. 'Hid them' is the most natural
    and direct rendering.
- source_word: חֲמִשִּׁים אִישׁ בַּמְּעָרָה
  chosen: by fifties in a cave
  alternatives:
  - fifty men to a cave
  - fifty each in a cave
  lexicon: HALOT
  rationale: The phrase literally reads 'fifty man in the cave,' an idiom meaning
    groups of fifty in each cave. 'By fifties in a cave' is concise and idiomatic,
    though singular 'a cave' may function distributively.
- source_word: וְכִלְכְּלָם
  chosen: provided them with
  alternatives:
  - sustained them with
  - supplied them with
  - fed them with
  lexicon: HALOT
  rationale: The Pilpel of כול/כלכל means to sustain or provide for. Because bread
    and water follow, 'provided them with' captures the sense of ongoing provision
    without implying only solid food.
- source_word: לֶחֶם וָמָיִם
  chosen: bread and water
  lexicon: HALOT
  rationale: Standard concrete expression retained literally.
