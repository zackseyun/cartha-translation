id: 1KI.18.36
reference: 1 Kings 18:36
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/עֲל֣וֹת הַ/מִּנְחָ֗ה וַ/יִּגַּ֞שׁ אֵלִיָּ֣הוּ הַ/נָּבִיא֮ וַ/יֹּאמַר֒
    יְהוָ֗ה אֱלֹהֵי֙ אַבְרָהָם֙ יִצְחָ֣ק וְ/יִשְׂרָאֵ֔ל הַ/יּ֣וֹם יִוָּדַ֗ע כִּֽי
    אַתָּ֧ה אֱלֹהִ֛ים בְּ/יִשְׂרָאֵ֖ל וַ/אֲנִ֣י עַבְדֶּ֑/ךָ ו/ב/דברי/ך עָשִׂ֔יתִי
    אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה׀־־׃
translation:
  text: And it happened, at the offering up of the grain offering, that Elijah the
    prophet came near and said, “O LORD, God of Abraham, Isaac, and Israel, let it
    be known today that you are God in Israel, and that I am your servant, and that
    by your word I have done all these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Israel'; many readers may expect 'Jacob' from the more familiar
      patriarchal formula, but the text here specifically reads 'Israel.'
    reason: alternative_reading
  - marker: b
    text: Or 'according to your word' / 'at your word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלוֹת הַמִּנְחָה
  chosen: at the offering up of the grain offering
  alternatives:
  - at the time of the offering of the offering
  - when the grain offering was offered
  - at the time of the evening offering
  lexicon: HALOT
  rationale: עֲלוֹת is an infinitive construct of עלה, 'to go up,' used idiomatically
    for the presenting/offering of a sacrifice. מִנְחָה most basically denotes a grain
    offering/tribute offering. 'Grain offering' is more lexically precise than the
    traditional but broader 'sacrifice' or contextually inferred 'evening offering.'
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near, often with cultic
    or solemn nuance. 'Came near' preserves the concrete movement and the formal tone.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל
  chosen: God of Abraham, Isaac, and Israel
  alternatives:
  - God of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The Hebrew text here explicitly reads 'Israel,' not 'Jacob.' The translation
    follows the source text rather than harmonizing to more familiar formulae.
- source_word: הַיּוֹם יִוָּדַע
  chosen: let it be known today
  alternatives:
  - may it be known today
  - today let it be known
  lexicon: HALOT
  rationale: The Niphal imperfect of ידע here functions jussively in prayer. 'Let
    it be known today' captures the petitionary force in natural English.
- source_word: אֱלֹהִים בְּיִשְׂרָאֵל
  chosen: God in Israel
  alternatives:
  - God over Israel
  - God among Israel
  lexicon: HALOT
  rationale: The preposition ב is most straightforwardly rendered 'in.' 'God in Israel'
    expresses that the LORD is truly God within Israel's midst and sphere, without
    over-interpreting the relation.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic and royal service
    contexts 'servant' is the most idiomatic and contextually appropriate English
    rendering, emphasizing commissioned service rather than chattel status.
- source_word: וּבִדְבָרֶךָ
  chosen: by your word
  alternatives:
  - according to your word
  - at your word
  - by your command
  lexicon: HALOT
  rationale: The preposition ב with דבר can indicate instrumentality or norm. 'By
    your word' is concise and preserves both the authority and causative force of
    the phrase.
- source_word: עָשִׂיתִי אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: I have done all these things
  alternatives:
  - I did all these things
  - I have done all these words/matters
  lexicon: HALOT
  rationale: דברים here refers to matters/deeds rather than spoken words. The perfect
    is rendered with English present perfect to fit Elijah's present appeal grounded
    in completed obedience.
