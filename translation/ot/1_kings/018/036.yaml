theological_decisions:
- issue: Rendering the covenant name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse invokes Israel's covenant God by name. Following the project's
    doctrinal standard, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Patriarchal formula reads 'Israel' rather than 'Jacob'
  chosen_reading: God of Abraham, Isaac, and Israel
  alternative_readings:
  - God of Abraham, Isaac, and Jacob
  rationale: The Hebrew text intentionally says 'Israel.' Retaining 'Israel' avoids
    harmonization and preserves the narrative emphasis on covenant identity before
    the nation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy
    over translation tradition
