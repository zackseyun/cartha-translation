theological_decisions:
- issue: Tone and force of Ahab's accusation
  chosen_reading: 'A direct accusation: ''troubler of Israel'''
  alternative_readings:
  - '''destroyer of Israel'''
  - '''one who brings disaster on Israel'''
  rationale: The verse presents Ahab blaming Elijah for Israel's distress. The translation
    preserves the accusation without endorsing Ahab's theology or expanding the charge
    beyond the lexical force of עכר.
  doctrine_reference: Preserve theological tension rather than resolve it.
