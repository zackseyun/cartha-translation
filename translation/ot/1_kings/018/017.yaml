id: 1KI.18.17
reference: 1 Kings 18:17
source:
  edition: WLC
  text: וַ/יְהִ֛י כִּ/רְא֥וֹת אַחְאָ֖ב אֶת אֵלִיָּ֑הוּ וַ/יֹּ֤אמֶר אַחְאָב֙ אֵלָ֔י/ו
    הַ/אַתָּ֥ה זֶ֖ה עֹכֵ֥ר יִשְׂרָאֵֽל־׃
translation:
  text: And when Ahab saw Elijah, Ahab said to him, “Is that you, troubler of Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one who brings trouble on Israel' or 'one who brings disaster on Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative event. In modern
    English, the idiom is best carried by a simple narrative connector rather than
    the archaic 'it came to pass.'
- source_word: כִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - as soon as ... saw
  - at the seeing of
  lexicon: HALOT
  rationale: The infinitive construct with כ expresses temporal circumstance here.
    'When Ahab saw' is natural English and preserves the temporal sense without over-literalism.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no standalone English equivalent; its function
    is represented by normal English word order.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - said to
  - spoke
  lexicon: HALOT
  rationale: Standard narrative verb of speech; 'said' is the most direct and natural
    rendering.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks the indirect object of speech
    and is naturally rendered 'to him.'
- source_word: הַאַתָּה זֶה
  chosen: Is that you
  alternatives:
  - Are you this one
  - Is it you
  lexicon: HALOT
  rationale: The interrogative with independent pronoun and demonstrative forms an
    emphatic, confrontational question. 'Is that you' captures the pointed tone idiomatically.
- source_word: עֹכֵר
  chosen: troubler
  alternatives:
  - one who brings trouble
  - disturber
  lexicon: HALOT
  rationale: The participle from עכר denotes one who brings disaster or trouble. 'Troubler'
    preserves the compact, accusatory force and echoes the narrative usage associated
    with bringing calamity on Israel.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper national name, rendered by standard English form.
