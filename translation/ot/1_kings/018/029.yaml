id: 1KI.18.29
reference: 1 Kings 18:29
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כַּ/עֲבֹ֣ר הַֽ/צָּהֳרַ֔יִם וַ/יִּֽתְנַבְּא֔וּ עַ֖ד לַ/עֲל֣וֹת הַ/מִּנְחָ֑ה
    וְ/אֵֽין ק֥וֹל וְ/אֵין עֹנֶ֖ה וְ/אֵ֥ין קָֽשֶׁב־־׃
translation:
  text: And it happened, when noon had passed, that they kept prophesying until the
    offering up of the grain offering, but there was no voice, no one answering, and
    no attention.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they raved.' The Hebrew uses the usual verb for prophesying, here describing
      ecstatic behavior by Baal's prophets.
    reason: lexical_alternative
  - marker: b
    text: '''The offering up of the grain offering'' may also be understood as the
      time of the regular evening offering.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next stage of the scene. 'And
    it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כַּעֲבֹר הַצָּהֳרַיִם
  chosen: when noon had passed
  alternatives:
  - as noon passed
  - after midday
  lexicon: HALOT
  rationale: The infinitive construct with כ marks temporal sequence. 'Noon had passed'
    is natural English and reflects the sense of midday being over.
- source_word: וַיִּתְנַבְּאוּ
  chosen: they kept prophesying
  alternatives:
  - they prophesied
  - they raved
  lexicon: HALOT
  rationale: Hitpael of נבא here refers to the ecstatic prophetic behavior of Baal's
    prophets. 'Kept prophesying' preserves the lexical link to prophecy while conveying
    continued action. 'Raved' captures the ecstatic sense in context but is more interpretive,
    so it is preserved in a footnote rather than the main text.
- source_word: עַד לַעֲלוֹת הַמִּנְחָה
  chosen: until the offering up of the grain offering
  alternatives:
  - until the time of the evening offering
  - until the offering of the tribute offering
  lexicon: HALOT
  rationale: The phrase is literally 'until the going up/offering up of the minchah.'
    מִנְחָה commonly denotes a grain offering, though in narrative time-marking it
    can function as the regular offering period often associated with evening sacrifice.
    To avoid importing 'evening' where it is not explicit, the main text keeps 'grain
    offering,' with the temporal alternative preserved in a footnote.
- source_word: וְאֵין קוֹל
  chosen: there was no voice
  alternatives:
  - there was no sound
  lexicon: HALOT
  rationale: קוֹל is broadly 'voice/sound.' In this context of expected divine response,
    'voice' best fits the implied answer from Baal.
- source_word: וְאֵין עֹנֶה
  chosen: no one answering
  alternatives:
  - no one answered
  lexicon: HALOT
  rationale: ענה in the participial form expresses the absence of any responder. The
    participial nuance is represented with 'answering' rather than a simple finite
    verb.
- source_word: וְאֵין קָשֶׁב
  chosen: no attention
  alternatives:
  - no one paying attention
  - no response
  lexicon: HALOT
  rationale: קָשֶׁב denotes attentiveness or heed. The line climactically states not
    only that there was no audible answer, but also no sign that anyone was listening.
    'No attention' is concise and preserves that nuance.
