theological_decisions:
- issue: Rendering of ecstatic activity of Baal's prophets
  chosen_reading: they kept prophesying
  alternative_readings:
  - they raved
  rationale: The Hebrew verb is the standard verb for prophesying, even though the
    context is pagan ecstatic behavior. Using 'prophesying' preserves the lexical
    form of the Hebrew and lets the narrative context supply the irony; 'raved' is
    a contextually plausible but more interpretive rendering, so it is preserved in
    a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
