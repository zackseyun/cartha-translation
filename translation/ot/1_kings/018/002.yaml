id: 1KI.18.2
reference: 1 Kings 18:2
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ אֵֽלִיָּ֔הוּ לְ/הֵרָא֖וֹת אֶל אַחְאָ֑ב וְ/הָ/רָעָ֖ב חָזָ֥ק בְּ/שֹׁמְרֽוֹן־׃
translation:
  text: So Elijah went to show himself to Ahab. Now the famine was severe in Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to appear before Ahab' or 'to present himself to Ahab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the famine was intense in Samaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So ... went
  alternatives:
  - And ... went
  - Then ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving the sequential/resultative sense from the previous
    verse.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: לְהֵרָאוֹת אֶל אַחְאָב
  chosen: to show himself to Ahab
  alternatives:
  - to appear before Ahab
  - to present himself to Ahab
  lexicon: HALOT
  rationale: The Niphal infinitive of ראה here is reflexive/passive in sense, meaning
    'to appear' or 'show oneself.' 'Show himself to Ahab' is transparent and idiomatic,
    preserving the reflexive nuance.
- source_word: וְהָרָעָב
  chosen: Now the famine
  alternatives:
  - And the famine
  lexicon: HALOT
  rationale: The prefixed waw introduces a circumstantial/background clause rather
    than a simple next action. 'Now' signals this shift naturally in English.
- source_word: חָזָק
  chosen: was severe
  alternatives:
  - was strong
  - was intense
  - was grievous
  lexicon: HALOT
  rationale: With 'famine,' the adjective conveys intensity/severity rather than physical
    strength. 'Severe' is idiomatic modern English and accurately reflects the sense.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב commonly marks location. 'Samaria' may denote the city
    here; 'in Samaria' is the most natural English rendering and can encompass the
    locale without over-specifying.
