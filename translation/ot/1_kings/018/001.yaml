id: 1KI.18.1
reference: 1 Kings 18:1
source:
  edition: WLC
  text: וַ/יְהִי֙ יָמִ֣ים רַבִּ֔ים וּ/דְבַר יְהוָ֗ה הָיָה֙ אֶל אֵ֣לִיָּ֔הוּ בַּ/שָּׁנָ֥ה הַ/שְּׁלִישִׁ֖ית לֵ/אמֹ֑ר לֵ֚ךְ הֵרָאֵ֣ה אֶל אַחְאָ֔ב וְ/אֶתְּנָ֥ה מָטָ֖ר עַל פְּנֵ֥י הָ/אֲדָמָֽה־־־־׃
translation:
  text: And it happened after many days that the word of Yahweh came to Elijah in the third year, saying, “Go, show yourself to Ahab, and I will give rain upon the face of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I will send rain on the land.' The Hebrew says literally, 'I will give rain upon the face of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new episode. 'And it happened' preserves the Hebrew narrative flow without archaic English.
- source_word: יָמִים רַבִּים
  chosen: after many days
  alternatives:
  - many days later
  - after a long time
  lexicon: HALOT
  rationale: The phrase is idiomatic for an extended period. 'After many days' stays close to the Hebrew while remaining natural English.
- source_word: וּדְבַר יְהוָה הָיָה אֶל
  chosen: the word of the LORD came to
  alternatives:
  - the word of the LORD was to
  - the LORD's word came to
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Came to' is idiomatic in English and reflects the sense of divine revelation addressed to a prophet.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁית
  chosen: in the third year
  alternatives:
  - during the third year
  lexicon: HALOT
  rationale: Straightforward temporal expression. 'In the third year' is the most natural and sufficiently formal rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: Introduces direct speech. 'Saying' preserves the Hebrew structure cleanly.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative of הלך. No expansion is warranted.
- source_word: הֵרָאֵה אֶל
  chosen: show yourself to
  alternatives:
  - present yourself to
  - appear before
  lexicon: HALOT
  rationale: Niphal imperative of ראה here has the reflexive/passive sense 'be seen,' idiomatically 'show yourself.' This best captures the command to make himself visible to Ahab.
- source_word: וְאֶתְּנָה מָטָר
  chosen: and I will give rain
  alternatives:
  - and I will send rain
  lexicon: HALOT
  rationale: נתן literally means 'give.' While 'send rain' is idiomatic English, 'give rain' preserves the Hebrew wording and the theological emphasis on rain as God's gift.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: upon the face of the land
  alternatives:
  - on the land
  - upon the earth
  - over the ground
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'upon the face of the ground/land.' 'Upon the face of the land' preserves the imagery while remaining understandable. 'Land' fits the immediate drought context better than the more global 'earth'.
