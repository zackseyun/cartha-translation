id: 1KI.18.12
reference: 1 Kings 18:12
source:
  edition: WLC
  text: וְ/הָיָ֞ה אֲנִ֣י אֵלֵ֣ךְ מֵ/אִתָּ֗/ךְ וְ/ר֨וּחַ יְהוָ֤ה יִֽשָּׂאֲ/ךָ֙ עַ֚ל
    אֲשֶׁ֣ר לֹֽא אֵדָ֔ע וּ/בָ֨אתִי לְ/הַגִּ֧יד לְ/אַחְאָ֛ב וְ/לֹ֥א יִֽמְצָאֲ/ךָ֖ וַ/הֲרָגָ֑/נִי
    וְ/עַבְדְּ/ךָ֛ יָרֵ֥א אֶת יְהוָ֖ה מִ/נְּעֻרָֽ/י׀׀־־׃
translation:
  text: And when I go away from you, the Spirit of the LORD may carry you to somewhere
    I do not know. Then when I come and tell Ahab and he does not find you, he will
    kill me—though your servant has feared the LORD from my youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wind of the LORD may carry you'; Hebrew רוּחַ can mean 'spirit,'
      'wind,' or 'breath,' though 'Spirit' best fits the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - and it will happen
  - and it shall be
  lexicon: HALOT
  rationale: Idiomatic narrative/apodosis marker introducing a future contingency.
    Rendering as 'And when' gives natural English while preserving the temporal sense.
- source_word: אֵלֵךְ מֵאִתָּךְ
  chosen: I go away from you
  alternatives:
  - I leave you
  - I depart from you
  lexicon: HALOT
  rationale: הלך with מן/אתך indicates departing from Elijah's presence. 'Go away
    from you' is clear and close to the Hebrew.
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the wind/spirit of the LORD
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit, but in this prophetic context
    referring to divine agency transporting Elijah, 'Spirit' is the most natural and
    traditional sense. YHWH is rendered 'the LORD' per doctrine.
- source_word: יִשָּׂאֲךָ
  chosen: may carry you
  alternatives:
  - will carry you
  - take you up
  lexicon: HALOT
  rationale: נשא means lift, carry, bear. 'Carry you' fits the feared supernatural
    removal. 'May carry you' reflects the contingent fear Obadiah expresses in context,
    though the Hebrew form itself is simple imperfect.
- source_word: עַל אֲשֶׁר לֹא אֵדָע
  chosen: to somewhere I do not know
  alternatives:
  - to where I do not know
  - to a place I do not know
  lexicon: HALOT
  rationale: The phrase indicates an unknown destination. English idiom prefers supplying
    'somewhere' or 'a place' rather than the more wooden 'upon which I do not know.'
- source_word: וּבָאתִי לְהַגִּיד לְאַחְאָב
  chosen: Then when I come and tell Ahab
  alternatives:
  - and I come to tell Ahab
  - and when I go and report to Ahab
  lexicon: HALOT
  rationale: 'Sequential action: Obadiah goes to report to Ahab. ''Tell'' is the most
    natural gloss for הגיד here.'
- source_word: וְלֹא יִמְצָאֲךָ
  chosen: and he does not find you
  alternatives:
  - and he cannot find you
  - and he will not find you
  lexicon: HALOT
  rationale: מצא is straightforwardly 'find.' Present-style English within the conditional
    sequence reads naturally, though future sense is implied.
- source_word: וַהֲרָגָנִי
  chosen: he will kill me
  alternatives:
  - then he will kill me
  - and he will slay me
  lexicon: HALOT
  rationale: Direct consequence feared by Obadiah. 'Kill' is plain modern English.
- source_word: וְעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, here it functions as a deferential
    self-reference to Elijah rather than emphasizing bonded status. 'Your servant'
    best matches the discourse context.
- source_word: יָרֵא אֶת יְהוָה
  chosen: has feared the LORD
  alternatives:
  - fears the LORD
  - has revered the LORD
  lexicon: HALOT
  rationale: ירא with God denotes reverent fear. The perfect-like adjectival form
    here summarizes Obadiah's established character; English present perfect captures
    enduring past-to-present force.
- source_word: מִנְּעֻרָי
  chosen: from my youth
  alternatives:
  - since my youth
  - from my boyhood
  lexicon: HALOT
  rationale: Standard idiom for lifelong devotion beginning in youth. 'From my youth'
    is concise and faithful.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and LXX pattern.
