id: 1KI.18.8
reference: 1 Kings 18:8
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר ל֖/וֹ אָ֑נִי לֵ֛ךְ אֱמֹ֥ר לַ/אדֹנֶ֖י/ךָ הִנֵּ֥ה אֵלִיָּֽהוּ׃
translation:
  text: And he said to him, “I am he. Go, say to your master, ‘Look, Elijah is here.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is I.” The Hebrew simply has the emphatic pronoun “I,” functioning
      here as self-identification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next action in narrative sequence. 'And
    he said' preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: לוֹ
  chosen: to him
  lexicon: HALOT
  rationale: The preposition ל with 3ms suffix marks the indirect object of speech;
    'to him' is the straightforward rendering.
- source_word: אָ֑נִי
  chosen: I am he
  alternatives:
  - It is I
  - I am
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in context, answering Obadiah's recognition
    of Elijah in the previous verse. English idiom requires a predicate sense; 'I
    am he' preserves the emphatic self-identification more closely than the looser
    'It is I.'
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Be on your way
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the natural concise English equivalent.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - tell
  lexicon: HALOT
  rationale: Imperative of אמר. 'Say' keeps the direct-speech orientation of the Hebrew;
    'tell' is possible but slightly more interpretive.
- source_word: לַאדֹנֶיךָ
  chosen: to your master
  alternatives:
  - to your lord
  lexicon: HALOT
  rationale: אָדוֹן with 2ms suffix refers here to Obadiah's human superior, Ahab,
    not to God. 'Master' best distinguishes the human authority from the divine title
    'Lord' and fits the servant-master relationship in context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what follows. 'Look' is readable
    modern English and preserves the force better than archaic 'Behold.'
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
