theological_decisions:
- issue: Rendering of אָדוֹן in reference to a human superior
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: Because the referent is Ahab as Obadiah's earthly superior, 'master'
    avoids confusion with the divine title 'Lord' while accurately reflecting the
    social relationship in the narrative.
