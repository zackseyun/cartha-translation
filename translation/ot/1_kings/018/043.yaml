id: 1KI.18.43
reference: 1 Kings 18:43
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶֽל נַעֲר֗/וֹ עֲלֵֽה נָא֙ הַבֵּ֣ט דֶּֽרֶךְ יָ֔ם וַ/יַּ֨עַל֙ וַ/יַּבֵּ֔ט
    וַ/יֹּ֖אמֶר אֵ֣ין מְא֑וּמָה וַ/יֹּ֕אמֶר שֻׁ֖ב שֶׁ֥בַע פְּעָמִֽים־־־׃
translation:
  text: Then he said to his servant, “Please go up and look toward the sea.” So he
    went up and looked, and said, “There is nothing.” Then he said, “Go back seven
    times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his young man” or “his attendant.”
    reason: lexical_alternative
  - marker: b
    text: Literally “look in the direction of the sea.”
    reason: lexical_alternative
  - marker: c
    text: That is, repeat the trip and look again until seven times have been completed.
    reason: cultural_note
lexical_decisions:
- source_word: נַעֲרוֹ
  chosen: his servant
  alternatives:
  - his young man
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can mean a youth, young man, servant, or attendant depending on
    context. Here Elijah is giving instructions to one under his authority, so 'servant'
    best fits the narrative function in natural English.
- source_word: עֲלֵה נָא
  chosen: Please go up
  alternatives:
  - Go up, please
  - Come up, please
  lexicon: HALOT
  rationale: עֲלֵה is an imperative 'go up/ascend,' and נָא softens the command as
    a polite or urgent particle. 'Please go up' captures both the movement and the
    tone.
- source_word: הַבֵּט דֶּרֶךְ יָם
  chosen: look toward the sea
  alternatives:
  - look in the direction of the sea
  - look seaward
  lexicon: HALOT
  rationale: הביט means 'look' or 'gaze,' and דֶּרֶךְ with a destination can mean
    'toward/in the direction of.' 'Look toward the sea' is idiomatic and faithful.
- source_word: אֵין מְאוּמָה
  chosen: There is nothing
  alternatives:
  - There is nothing at all
  - There is not anything
  lexicon: HALOT
  rationale: The phrase is an emphatic negation meaning that nothing is visible. 'There
    is nothing' is concise, natural, and sufficient in context.
- source_word: שֻׁב
  chosen: Go back
  alternatives:
  - Return
  - Go again
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return' or 'go back.' In this immediate context
    Elijah is telling the servant to repeat the action, so 'Go back' communicates
    the sense clearly.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: A straightforward numerical expression indicating repeated action. No
    expansion beyond the Hebrew is needed.
