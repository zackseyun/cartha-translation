id: 1KI.18.18
reference: 1 Kings 18:18
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לֹ֤א עָכַ֨רְתִּי֙ אֶת יִשְׂרָאֵ֔ל כִּ֥י אִם אַתָּ֖ה וּ/בֵ֣ית אָבִ֑י/ךָ בַּֽ/עֲזָבְ/כֶם֙ אֶת מִצְוֺ֣ת יְהוָ֔ה וַ/תֵּ֖לֶךְ אַחֲרֵ֥י הַ/בְּעָלִֽים־־־׃
translation:
  text: And he said, “I have not troubled Israel, but you and your father's house have, because you have forsaken the commandments of Yahweh and have gone after the Baals.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; rendered ''the LORD'' following the translation''s standard practice for the divine name.'
    reason: alternative_reading
  - marker: b
    text: Or 'have brought trouble on Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is plural: ''the Baals,'' referring to Baal worship in its various local forms or manifestations.'
    reason: cultural_note
lexical_decisions:
- source_word: עָכַרְתִּי
  chosen: have not troubled
  alternatives:
  - have not brought trouble on
  - have not disturbed
  lexicon: HALOT
  rationale: The verb עכר in this context carries the sense of bringing calamity or trouble upon a community, echoing the accusation in the previous verse. 'Troubled' preserves the verbal link and remains natural English; 'brought trouble on' is slightly more explicit but less concise.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the covenant people/nation name.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: 'The paired particles function adversatively here: Elijah denies the charge and redirects it to Ahab. ''But'' is the most natural English equivalent in context.'
- source_word: וּבֵית אָבִיךָ
  chosen: and your father's house
  alternatives:
  - and your family
  - and your father's household
  lexicon: HALOT
  rationale: Literally 'and the house of your father.' 'Your father's house' preserves the idiom of dynastic/familial responsibility better than the flatter 'family.'
- source_word: בַּעֲזָבְכֶם
  chosen: because you have forsaken
  alternatives:
  - in that you have abandoned
  - when you abandoned
  lexicon: HALOT
  rationale: The prefixed ב plus infinitive construct gives the causal ground for the accusation. 'Because you have forsaken' expresses that causal force clearly in English.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: '''Commandments'' is the standard rendering for מִצְוֺת and preserves covenantal and legal weight in this context.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַתֵּלֶךְ אַחֲרֵי
  chosen: have gone after
  alternatives:
  - followed
  - walked after
  lexicon: HALOT
  rationale: The idiom means to follow in allegiance or worship. 'Gone after' preserves the metaphor and the sense of pursuing other gods, while remaining idiomatic English.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the Baals/gods called Baal
  lexicon: HALOT
  rationale: The plural is explicit in the Hebrew and should be preserved. 'The Baals' reflects the multiple manifestations or local cultic forms of Baal rather than flattening to singular 'Baal.'
