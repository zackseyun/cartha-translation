id: 1KI.18.15
reference: 1 Kings 18:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֵֽלִיָּ֔הוּ חַ֚י יְהוָ֣ה צְבָא֔וֹת אֲשֶׁ֥ר עָמַ֖דְתִּי לְ/פָנָ֑י/ו כִּ֥י הַ/יּ֖וֹם אֵרָאֶ֥ה אֵלָֽי/ו׃
translation:
  text: And Elijah said, “As Yahweh of hosts lives, before whom I stand, today I will surely present myself to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will appear before him” / “I will show myself to him.” The Hebrew verb can mean to be seen or to present oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. Rendering it as 'As the LORD lives' preserves both the idiomatic force and the solemnity of the oath in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established and sufficiently transparent rendering for the divine title יְהוָה צְבָאוֹת, preserving its breadth rather than narrowing it only to military forces.'
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  chosen: before whom I stand
  alternatives:
  - in whose presence I stand
  - whom I serve
  lexicon: HALOT
  rationale: The literal standing 'before' someone is an idiom for attendance and service in a superior's presence. 'Before whom I stand' preserves the Hebrew imagery and prophetic court-language without over-paraphrasing.
- source_word: כִּי הַיּוֹם
  chosen: today
  alternatives:
  - surely today
  - indeed today
  lexicon: HALOT
  rationale: Here כִּי introduces the content of Elijah's oath-assurance. In English, 'today' carries the temporal emphasis naturally; the asseverative force is conveyed by the overall oath and by 'surely' with the verb.
- source_word: אֵרָאֶה אֵלָיו
  chosen: I will surely present myself to him
  alternatives:
  - I will appear before him
  - I will show myself to him
  lexicon: HALOT
  rationale: The Niphal of ראה here has the reflexive/passive sense 'be seen, appear, present oneself.' 'Present myself to him' communicates intentional appearance before Ahab in clear modern English; 'surely' reflects the emphatic assurance in context.
