id: 1KI.18.22
reference: 1 Kings 18:22
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלִיָּ֨הוּ֙ אֶל הָ/עָ֔ם אֲנִ֞י נוֹתַ֧רְתִּי נָבִ֛יא לַ/יהוָ֖ה לְ/בַדִּ֑/י וּ/נְבִיאֵ֣י הַ/בַּ֔עַל אַרְבַּע מֵא֥וֹת וַ/חֲמִשִּׁ֖ים אִֽישׁ־־׃
translation:
  text: Then Elijah said to the people, “I, I alone, am left as a prophet of Yahweh, but the prophets of Baal are four hundred and fifty men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I alone remain a prophet of the LORD.' Elijah's statement reflects his present public standing in the confrontation, though elsewhere the narrative mentions other prophets hidden by Obadiah (1 Kgs 18:4, 13).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name is transliterated by standard English convention, per translation philosophy.
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the crowd
  lexicon: HALOT
  rationale: עָם here refers to the gathered people of Israel. 'The people' is the most direct and contextually appropriate rendering.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun retained because it contributes to the emphatic self-reference in the clause.
- source_word: נוֹתַרְתִּי
  chosen: am left
  alternatives:
  - remain
  - have been left
  lexicon: HALOT
  rationale: The verb denotes remaining or being left over. 'Am left' fits the present state Elijah is asserting in context, while staying close to the Hebrew sense.
- source_word: לְבַדִּי
  chosen: alone
  alternatives:
  - by myself
  lexicon: HALOT
  rationale: This adverbial expression intensifies Elijah's isolation. 'Alone' is concise and idiomatic.
- source_word: נָבִיא לַיהוָה
  chosen: as a prophet of the LORD
  alternatives:
  - a prophet for the LORD
  - the LORD's prophet
  lexicon: HALOT
  rationale: The phrase identifies Elijah as belonging to and speaking for YHWH. 'A prophet of the LORD' is standard, clear English. The preposition is represented idiomatically with 'of' rather than a more wooden 'for'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּנְבִיאֵי הַבַּעַל
  chosen: but the prophets of Baal
  alternatives:
  - and the prophets of Baal
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in English because the clause contrasts Elijah's solitary status with Baal's many prophets.
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים אִישׁ
  chosen: four hundred and fifty men
  alternatives:
  - four hundred fifty men
  - 450 men
  lexicon: HALOT
  rationale: The Hebrew gives the full number followed by אִישׁ, an individualizing/counting term. 'Men' preserves the gender-accurate wording and the explicit human count.
