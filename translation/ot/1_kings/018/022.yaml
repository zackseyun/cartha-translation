theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Elijah's claim to be the only remaining prophet
  chosen_reading: I alone am left as a prophet of the LORD
  alternative_readings:
  - I alone remain a prophet of the LORD
  rationale: The verse reports Elijah's rhetorical claim in context and should not be harmonized here with 1 Kings 18:4, 13, where other prophets had been hidden. The translation preserves the statement as spoken without importing explanatory qualification into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
