theological_decisions:
- issue: Rendering of sacrificial term עֹלָה
  chosen_reading: burnt offering
  alternative_readings:
  - whole burnt offering
  rationale: The term denotes the standard Israelite sacrifice wholly offered up by
    fire. 'Burnt offering' is the established and accurate English equivalent without
    adding explanatory wording not present in the verse.
