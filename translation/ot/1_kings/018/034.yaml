id: 1KI.18.34
reference: 1 Kings 18:34
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר מִלְא֨וּ אַרְבָּעָ֤ה כַדִּים֙ מַ֔יִם וְ/יִֽצְק֥וּ עַל הָ/עֹלָ֖ה
    וְ/עַל הָ/עֵצִ֑ים וַ/יֹּ֤אמֶר שְׁנוּ֙ וַ/יִּשְׁנ֔וּ וַ/יֹּ֥אמֶר שַׁלֵּ֖שׁוּ וַ/יְשַׁלֵּֽשׁוּ־־׃
translation:
  text: Then he said, “Fill four jars with water and pour it on the burnt offering
    and on the wood.” Then he said, “Do it a second time,” and they did it a second
    time. Then he said, “Do it a third time,” and they did it a third time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “four pitchers”; the Hebrew term refers to a vessel for carrying liquids.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    modern English while preserving sequential force better than a bare repeated 'and.'
- source_word: מִלְאוּ
  chosen: Fill
  alternatives:
  - Fill up
  lexicon: HALOT
  rationale: Imperative plural from מלא, directing the hearers to fill the containers.
    'Fill' is concise and sufficient in English.
- source_word: אַרְבָּעָה כַדִּים
  chosen: four jars
  alternatives:
  - four pitchers
  - four containers
  lexicon: HALOT
  rationale: כד commonly denotes a jar or pitcher used for carrying liquids. 'Jars'
    is clear, natural, and fits the likely vessel without over-specifying shape.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun.
- source_word: וְיִצְקוּ
  chosen: and pour it
  alternatives:
  - and let them pour
  - and they shall pour
  lexicon: HALOT
  rationale: 'Second masculine plural imperative/cohortative-like command in sequence.
    English idiom prefers continuing the direct command: ''and pour it.'' The singular
    object ''it'' refers collectively to the water.'
- source_word: עַל הָעֹלָה
  chosen: on the burnt offering
  alternatives:
  - over the burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term 'burnt offering.' 'On' best reflects
    עַל in this physical action context.
- source_word: וְעַל הָעֵצִים
  chosen: and on the wood
  alternatives:
  - and on the pieces of wood
  lexicon: HALOT
  rationale: עֵצִים here refers to the wood arranged for the sacrifice. 'The wood'
    is idiomatic and contextually precise.
- source_word: שְׁנוּ
  chosen: Do it a second time
  alternatives:
  - Repeat it
  - Do it again
  lexicon: HALOT
  rationale: Imperative from שנה 'to do again/repeat.' 'Do it a second time' makes
    explicit the counted repetition, which is confirmed by the following verb.
- source_word: וַיִּשְׁנוּ
  chosen: and they did it a second time
  alternatives:
  - and they repeated it
  - and they did it again
  lexicon: HALOT
  rationale: The verb reports compliance with the command to repeat the action. Rendering
    the ordinal explicitly preserves the narrative pattern.
- source_word: שַׁלֵּשׁוּ
  chosen: Do it a third time
  alternatives:
  - Do it three times
  - Repeat it a third time
  lexicon: HALOT
  rationale: Piel imperative from שלשׁ, here meaning to do something for the third
    time. 'Do it a third time' best matches the context after the second repetition.
- source_word: וַיְשַׁלֵּשׁוּ
  chosen: and they did it a third time
  alternatives:
  - and they did it three times
  - and they repeated it a third time
  lexicon: HALOT
  rationale: Narrative fulfillment of the third command. The English mirrors the Hebrew
    progression clearly and naturally.
