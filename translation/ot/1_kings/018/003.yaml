id: 1KI.18.3
reference: 1 Kings 18:3
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א אַחְאָ֔ב אֶל עֹבַדְיָ֖הוּ אֲשֶׁ֣ר עַל הַ/בָּ֑יִת וְ/עֹבַדְיָ֗הוּ הָיָ֥ה יָרֵ֛א אֶת יְהוָ֖ה מְאֹֽד־־־׃
translation:
  text: And Ahab called Obadiah, who was over the household. Now Obadiah feared Yahweh greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who was in charge of the palace.' The Hebrew literally says 'who was over the house,' an expression for a chief household official.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The wayyiqtol of קרא here introduces Ahab's act of calling for Obadiah. 'Called' is the most natural modern English rendering; 'summoned' is possible given royal authority, but the Hebrew itself does not require the stronger nuance.
- source_word: אֶל
  chosen: called Obadiah
  alternatives:
  - called for Obadiah
  - summoned Obadiah
  lexicon: HALOT
  rationale: With קרא + אֶל, English idiom is best expressed simply as 'called Obadiah' rather than the more wooden 'called to Obadiah.' 'Called for' is possible but slightly more interpretive.
- source_word: עֹבַדְיָהוּ
  chosen: Obadiah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: אֲשֶׁר עַל הַבָּיִת
  chosen: who was over the household
  alternatives:
  - who was in charge of the palace
  - who was over the house
  lexicon: HALOT
  rationale: This expression denotes an official set over the royal house/estate. 'Over the household' preserves the Hebrew structure while communicating administrative responsibility. 'Palace' is possible in context but narrows בית too much; 'house' alone is less clear in English.
- source_word: הַבָּיִת
  chosen: household
  alternatives:
  - house
  - palace
  lexicon: HALOT
  rationale: In this court setting, בית refers not merely to a building but to the royal household/estate. 'Household' best captures the institutional sense in readable English.
- source_word: וְעֹבַדְיָהוּ
  chosen: Now Obadiah
  alternatives:
  - and Obadiah
  rationale: The conjunction here introduces parenthetical background information about Obadiah. Rendering it as 'Now' reflects normal English discourse flow better than a mechanically repeated 'and.'
- source_word: הָיָה יָרֵא
  chosen: feared
  alternatives:
  - was fearing
  - was God-fearing
  lexicon: HALOT
  rationale: 'The construction expresses a characteristic state: Obadiah was one who feared the LORD. English idiom is best with the simple past ''feared.'' ''God-fearing'' is interpretive and less direct.'
- source_word: יָרֵא אֶת יְהוָה
  chosen: feared the LORD
  alternatives:
  - revered the LORD
  lexicon: HALOT
  rationale: ירא with God commonly denotes reverent fear. 'Feared the LORD' preserves the covenantal and theological weight of the Hebrew while remaining standard biblical English. 'Revered' captures part of the sense but softens the term.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies Obadiah's fear of the LORD. 'Greatly' is concise, natural, and preserves the force without sounding archaic.
