id: 1KI.18.45
reference: 1 Kings 18:45
source:
  edition: WLC
  text: וַ/יְהִ֣י עַד כֹּ֣ה וְ/עַד כֹּ֗ה וְ/הַ/שָּׁמַ֨יִם֙ הִֽתְקַדְּרוּ֙ עָבִ֣ים
    וְ/ר֔וּחַ וַ/יְהִ֖י גֶּ֣שֶׁם גָּד֑וֹל וַ/יִּרְכַּ֥ב אַחְאָ֖ב וַ/יֵּ֥לֶךְ יִזְרְעֶֽאלָ/ה׀־־׃
translation:
  text: And in a little while, the sky grew black with clouds and wind, and there
    was a heavy rain. Then Ahab mounted his chariot and went to Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''until thus and until thus,'' meaning ''meanwhile'' or ''in
      a little while.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the heavens grew dark.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'a great rain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי עַד כֹּה וְעַד כֹּה
  chosen: And in a little while
  alternatives:
  - And it happened meanwhile
  - And after a little while
  - And it came to pass in the meantime
  lexicon: HALOT
  rationale: The idiom עַד כֹּה וְעַד כֹּה is a temporal expression meaning roughly
    'meanwhile' or 'in a little while,' not a literal spatial 'thus and thus.' 'In
    a little while' gives natural English while preserving the sense of a short passage
    of time.
- source_word: הַשָּׁמַיִם
  chosen: the sky
  alternatives:
  - the heavens
  lexicon: HALOT
  rationale: In this weather context, 'sky' better matches English usage than the
    more literal 'heavens,' while still reflecting the Hebrew plural form used idiomatically
    for the visible heavens.
- source_word: הִתְקַדְּרוּ
  chosen: grew black
  alternatives:
  - became dark
  - were darkened
  lexicon: HALOT
  rationale: The verb conveys darkening or becoming gloomy. 'Grew black' vividly fits
    the storm context and naturally modifies 'the sky' in English.
- source_word: עָבִים וְרוּחַ
  chosen: with clouds and wind
  alternatives:
  - with thick clouds and wind
  - with clouds and a wind
  lexicon: HALOT
  rationale: The phrase names the means or accompaniment of the darkening. 'With clouds
    and wind' is concise and natural. Although עָבִים can suggest thick clouds, 'clouds'
    is sufficient here without over-specifying.
- source_word: וַיְהִי גֶּשֶׁם גָּדוֹל
  chosen: and there was a heavy rain
  alternatives:
  - and there was a great rain
  - and a great rain came
  lexicon: HALOT
  rationale: גָּדוֹל literally means 'great,' but in English weather idiom 'heavy
    rain' best conveys the sense of a strong downpour without sounding wooden.
- source_word: וַיִּרְכַּב
  chosen: mounted his chariot
  alternatives:
  - rode
  - got into his chariot
  lexicon: HALOT
  rationale: The verb means 'mounted/rode.' Because the object is implicit in English
    from the royal travel context, 'mounted his chariot' makes the action explicit
    and idiomatic. The broader narrative context involves chariot travel.
- source_word: יִזְרְעֶאלָה
  chosen: to Jezreel
  alternatives:
  - Jezreelward
  lexicon: HALOT
  rationale: The directional he indicates motion toward a place. Standard English
    expresses this simply as 'to Jezreel.'
