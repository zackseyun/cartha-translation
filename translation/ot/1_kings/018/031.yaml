id: 1KI.18.31
reference: 1 Kings 18:31
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֵלִיָּ֗הוּ שְׁתֵּ֤ים עֶשְׂרֵה֙ אֲבָנִ֔ים כְּ/מִסְפַּ֖ר שִׁבְטֵ֣י
    בְנֵֽי יַעֲקֹ֑ב אֲשֶׁר֩ הָיָ֨ה דְבַר יְהוָ֤ה אֵלָי/ו֙ לֵ/אמֹ֔ר יִשְׂרָאֵ֖ל יִהְיֶ֥ה
    שְׁמֶֽ/ךָ־־׃
translation:
  text: And Elijah took twelve stones, according to the number of the tribes of the
    sons of Jacob, to whom the word of the LORD had come, saying, “Israel shall be
    your name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the children of Jacob.” The Hebrew is literally “the sons of Jacob.”
    reason: lexical_alternative
  - marker: b
    text: 'This recalls God''s renaming of Jacob in Genesis 32:28; 35:10: “Israel
      shall be your name.”'
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - picked up
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח; 'took' is the standard, natural English
    rendering in this context.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁתֵּים עֶשְׂרֵה אֲבָנִים
  chosen: twelve stones
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun; concise and natural in English.
- source_word: כְּמִסְפַּר
  chosen: according to the number of
  alternatives:
  - corresponding to the number of
  - by the number of
  lexicon: HALOT
  rationale: Preserves the comparative sense of כ plus 'number' without sounding wooden.
- source_word: שִׁבְטֵי
  chosen: tribes
  alternatives:
  - tribal groups
  lexicon: HALOT
  rationale: Standard rendering for שבט in this genealogical-national sense.
- source_word: בְנֵי יַעֲקֹב
  chosen: the sons of Jacob
  alternatives:
  - the children of Jacob
  - the descendants of Jacob
  lexicon: HALOT
  rationale: Formally reflects the Hebrew construct and preserves the male-gendered
    familial expression present in the source. 'Descendants' is possible but less
    direct.
- source_word: אֲשֶׁר הָיָה דְבַר־יְהוָה אֵלָיו
  chosen: to whom the word of the LORD had come
  alternatives:
  - about whom the word of the LORD had come
  - to whom the LORD's word had come
  lexicon: HALOT
  rationale: The relative clause most naturally refers to Jacob, recalling the renaming
    scene. 'Had come' captures the prior divine address in idiomatic English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when he said
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech after a divine word formula.
- source_word: יִשְׂרָאֵל יִהְיֶה שְׁמֶךָ
  chosen: Israel shall be your name
  alternatives:
  - Your name shall be Israel
  - Israel will be your name
  lexicon: HALOT
  rationale: Keeps the Hebrew word order emphasis on 'Israel' while remaining natural
    English. 'Shall' fits the solemn naming declaration.
