id: 1KI.18.39
reference: 1 Kings 18:39
source:
  edition: WLC
  text: וַ/יַּרְא֙ כָּל הָ/עָ֔ם וַֽ/יִּפְּל֖וּ עַל פְּנֵי/הֶ֑ם וַ/יֹּ֣אמְר֔וּ יְהוָה֙
    ה֣וּא הָ/אֱלֹהִ֔ים יְהוָ֖ה ה֥וּא הָ/אֱלֹהִֽים־־׃
translation:
  text: When all the people saw it, they fell on their faces and said, “The LORD,
    he is God! The LORD, he is God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The LORD, he is the God! The LORD, he is the God!'' The article
      in ''the God'' marks YHWH as the true God in contrast to Baal; English commonly
      expresses this as ''God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw it
  alternatives:
  - saw
  - looked
  lexicon: HALOT
  rationale: The verb means 'saw.' English idiom benefits from supplying the implied
    object ('it'), referring to the fire and event just described in context, without
    adding interpretive content beyond the immediate narrative.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the crowd
  - all the people there
  lexicon: HALOT
  rationale: A straightforward rendering of the collective phrase. 'People' is the
    natural English equivalent for עָם here.
- source_word: וַיִּפְּלוּ עַל־פְּנֵיהֶם
  chosen: fell on their faces
  alternatives:
  - fell facedown
  - prostrated themselves
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for bodily prostration. 'Fell on their
    faces' preserves the concrete imagery and reverential force better than the more
    interpretive 'prostrated themselves.'
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - cried out
  - declared
  lexicon: HALOT
  rationale: The common speech verb does not itself specify volume or emotional intensity,
    so 'said' is the most textually restrained rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: הוּא
  chosen: he is
  alternatives:
  - is
  - he alone is
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and adds emphasis. Rendering it as
    'he is' preserves that emphasis better than omitting it in English.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  - God alone
  lexicon: HALOT
  rationale: With the article, the phrase identifies YHWH as the true God in contrast
    to Baal. In English, 'God' communicates the predicative force naturally; 'the
    God' would sound wooden, though it is a possible more formal alternative.
- source_word: יְהוָה הוּא הָאֱלֹהִים
  chosen: The LORD, he is God!
  alternatives:
  - The LORD is God!
  - The LORD, he is the God!
  lexicon: HALOT
  rationale: The repeated clause is rendered with retained pronoun emphasis and exclamatory
    force to reflect the people's climactic confession after the divine demonstration.
