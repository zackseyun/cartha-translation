id: 1KI.18.28
reference: 1 Kings 18:28
source:
  edition: WLC
  text: וַֽ/יִּקְרְאוּ֙ בְּ/ק֣וֹל גָּד֔וֹל וַ/יִּתְגֹּֽדְדוּ֙ כְּ/מִשְׁפָּטָ֔/ם בַּ/חֲרָב֖וֹת
    וּ/בָֽ/רְמָחִ֑ים עַד שְׁפָךְ דָּ֖ם עֲלֵי/הֶֽם־־׃
translation:
  text: So they cried out with a loud voice and cut themselves according to their
    custom with swords and spears until blood poured out on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gashed themselves' for 'cut themselves.' The Hebrew refers to ritual
      self-laceration.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their practice' or 'as was their manner.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they cried out
  alternatives:
  - they called
  - they proclaimed
  lexicon: HALOT
  rationale: קרא in this context of invoking Baal denotes loud calling or crying out
    rather than a neutral 'call.' 'Cried out' best fits the ritual desperation in
    context.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a loud voice
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom while remaining
    natural English. 'With a loud voice' keeps the concrete expression.
- source_word: וַיִּתְגֹּדְדוּ
  chosen: cut themselves
  alternatives:
  - gashed themselves
  - slashed themselves
  lexicon: HALOT
  rationale: The hitpolel/reflexive form indicates self-laceration in ritual mourning
    or cultic practice. 'Cut themselves' is clear and direct; 'gashed' is possible
    but slightly more interpretive.
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their custom
  alternatives:
  - according to their rule
  - according to their practice
  - as was their manner
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean ordinance, rule, or customary practice. Here it refers
    to established ritual behavior of Baal's prophets, so 'according to their custom'
    best conveys the sense.
- source_word: בַּחֲרָבוֹת
  chosen: with swords
  alternatives:
  - by swords
  lexicon: HALOT
  rationale: The beth marks instrument; 'with swords' is idiomatic English.
- source_word: וּבָרְמָחִים
  chosen: and spears
  alternatives:
  - and lances
  lexicon: HALOT
  rationale: רְמָחִים denotes spears or lances. 'Spears' is the more common modern
    English term and fits readable modern style.
- source_word: עַד שְׁפָךְ דָּם
  chosen: until blood poured out
  alternatives:
  - until blood gushed out
  - until blood was poured out
  lexicon: HALOT
  rationale: The infinitive construct with עַד marks result/extent. 'Poured out' preserves
    the imagery without over-intensifying; 'gushed' is possible but more vivid than
    necessary.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - over them
  lexicon: HALOT
  rationale: The preposition עַל here indicates blood coming upon their bodies. 'On
    them' is the most natural rendering.
