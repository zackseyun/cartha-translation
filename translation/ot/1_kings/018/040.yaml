id: 1KI.18.40
reference: 1 Kings 18:40
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ אֵלִיָּ֨הוּ לָ/הֶ֜ם תִּפְשׂ֣וּ אֶת נְבִיאֵ֣י הַ/בַּ֗עַל אִ֛ישׁ
    אַל יִמָּלֵ֥ט מֵ/הֶ֖ם וַֽ/יִּתְפְּשׂ֑וּ/ם וַ/יּוֹרִדֵ֤/ם אֵלִיָּ֨הוּ֙ אֶל נַ֣חַל
    קִישׁ֔וֹן וַ/יִּשְׁחָטֵ֖/ם שָֽׁם׀־־־׃
translation:
  text: Then Elijah said to them, “Seize the prophets of Baal; let not a man escape
    from them.” And they seized them, and Elijah brought them down to the Kishon Wadi
    and slaughtered them there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “let no one escape.” Hebrew: “let not a man escape.”'
    reason: lexical_alternative
  - marker: b
    text: Or “the Kishon Brook.” Hebrew naḥal can refer to a wadi, streambed, or brook.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְשׂוּ
  chosen: Seize
  alternatives:
  - Capture
  - Take hold of
  lexicon: HALOT
  rationale: Imperative plural of תפשׂ, calling for forceful apprehension. 'Seize'
    is concise and suitably urgent.
- source_word: נְבִיאֵי הַבַּעַל
  chosen: the prophets of Baal
  alternatives:
  - Baal's prophets
  lexicon: HALOT
  rationale: Construct chain naturally rendered 'the prophets of Baal.' Retains the
    identity of the group without paraphrase.
- source_word: אִישׁ אַל יִמָּלֵט
  chosen: let not a man escape
  alternatives:
  - let no one escape
  - not one man is to escape
  lexicon: HALOT
  rationale: Uses the singular noun אִישׁ with jussive negation אַל + ימלט. Per gender-accurate
    policy, 'man' is retained because the Hebrew explicitly uses the masculine singular
    distributively. The idiom means that not even one individual is to get away.
- source_word: וַיִּתְפְּשׂוּם
  chosen: they seized them
  alternatives:
  - they captured them
  lexicon: HALOT
  rationale: Narrative continuation of the same verb תפשׂ. 'Seized' preserves lexical
    consistency with the command.
- source_word: וַיּוֹרִדֵם
  chosen: brought them down
  alternatives:
  - led them down
  - took them down
  lexicon: HALOT
  rationale: Hiphil of ירד means to cause to go down. 'Brought them down' is natural
    English and preserves the causative sense without over-specifying method.
- source_word: נַחַל קִישׁוֹן
  chosen: the Kishon Wadi
  alternatives:
  - the brook Kishon
  - the Kishon Brook
  - the Kishon Valley
  lexicon: HALOT
  rationale: נחל denotes a wadi/streambed/ravine rather than necessarily a perennial
    brook. 'Wadi' better reflects the Hebrew geographical term in modern English,
    while preserving the proper name Kishon.
- source_word: וַיִּשְׁחָטֵם
  chosen: slaughtered them
  alternatives:
  - killed them
  - butchered them
  lexicon: HALOT
  rationale: שׁחט commonly denotes slaughter, often of animals in sacrificial or butchering
    contexts. 'Slaughtered' preserves the stark, violent force of the verb better
    than the more generic 'killed.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct equivalent.
