theological_decisions:
- issue: Rendering of violent judicial action against the prophets of Baal
  chosen_reading: Translate the event directly as Elijah's command and execution of
    the prophets without softening the violence or adding moral commentary.
  alternative_readings:
  - Use a softened rendering such as 'executed' or 'put them to death'
  - Add interpretive language implying divine authorization in the verse itself
  rationale: The Hebrew text plainly narrates seizure and slaughter. The translation
    should preserve the severity of the action while avoiding interpretive additions
    not stated in this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; never import
    doctrinal claims the text does not make.'
