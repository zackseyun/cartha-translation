id: 1KI.18.38
reference: 1 Kings 18:38
source:
  edition: WLC
  text: וַ/תִּפֹּ֣ל אֵשׁ יְהוָ֗ה וַ/תֹּ֤אכַל אֶת הָֽ/עֹלָה֙ וְ/אֶת הָ֣/עֵצִ֔ים וְ/אֶת
    הָ/אֲבָנִ֖ים וְ/אֶת הֶ/עָפָ֑ר וְ/אֶת הַ/מַּ֥יִם אֲשֶׁר בַּ/תְּעָלָ֖ה לִחֵֽכָה־־־־־־־׃
translation:
  text: Then the fire of the LORD fell and consumed the burnt offering, the wood,
    the stones, the dust, and licked up the water that was in the trench.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fire from the LORD fell.' The Hebrew can be understood as emphasizing
      the fire's divine source.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשׁ יְהוָה
  chosen: the fire of the LORD
  alternatives:
  - the LORD's fire
  - fire from the LORD
  lexicon: HALOT
  rationale: Construct-like juxtaposition indicates fire associated with YHWH. 'The
    fire of the LORD' is natural English and preserves the dramatic, direct divine
    agency. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.'
- source_word: וַתִּפֹּל
  chosen: fell
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb נפל literally means 'fell.' In context it describes fire falling
    from above, but 'fell' preserves the Hebrew image more directly than the interpretive
    'came down.'
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: Although the verb is literally 'ate,' English idiom for fire is 'consumed.'
    This is an optimal-equivalence rendering that preserves the force without awkwardness.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה in sacrificial context refers specifically to the burnt offering.
    'Burnt offering' is the standard and clear cultic term.
- source_word: הָעֵצִים
  chosen: the wood
  alternatives:
  - the pieces of wood
  - the firewood
  lexicon: HALOT
  rationale: The plural noun refers to the wood arranged on the altar. English commonly
    uses the collective singular 'wood' in this context.
- source_word: הָאֲבָנִים
  chosen: the stones
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the miracle's intensity is emphasized
    by the fire consuming even the stones.
- source_word: הֶעָפָר
  chosen: the dust
  alternatives:
  - the soil
  - the earth
  lexicon: HALOT
  rationale: עפר commonly means dust/loose earth. 'Dust' best matches the vividness
    and traditional sense here.
- source_word: לִחֵכָה
  chosen: licked up
  alternatives:
  - consumed
  - lapped up
  lexicon: HALOT
  rationale: The verb לחך means 'lick.' With water as object, 'licked up' is vivid,
    idiomatic, and preserves the anthropomorphic imagery of the fire.
- source_word: הַמַּיִם אֲשֶׁר בַּתְּעָלָה
  chosen: the water that was in the trench
  alternatives:
  - the water that was in the channel
  - the water in the trench
  lexicon: HALOT
  rationale: תעלה denotes a trench/channel dug around the altar. 'Trench' fits the
    narrative setting and is more concrete for modern readers than 'channel.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' communicates sequence
    more naturally in modern English than repeatedly using 'And.'
