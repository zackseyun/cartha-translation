id: 1KI.18.27
reference: 1 Kings 18:27
source:
  edition: WLC
  text: וַ/יְהִ֨י בַֽ/צָּהֳרַ֜יִם וַ/יְהַתֵּ֧ל בָּ/הֶ֣ם אֵלִיָּ֗הוּ וַ/יֹּ֨אמֶר֙ קִרְא֤וּ
    בְ/קוֹל גָּדוֹל֙ כִּֽי אֱלֹהִ֣ים ה֔וּא כִּ֣י שִׂ֧יחַ וְ/כִֽי שִׂ֛יג ל֖/וֹ וְ/כִֽי
    דֶ֣רֶךְ ל֑/וֹ אוּלַ֛י יָשֵׁ֥ן ה֖וּא וְ/יִקָֽץ־־־־׃
translation:
  text: And it happened at noon that Elijah mocked them and said, “Cry out with a
    loud voice, for he is a god. For he is musing, or he has gone aside, or he is
    on a journey. Perhaps he is sleeping and will wake up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'he is relieving himself.' The Hebrew expression is likely
      euphemistic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing a new scene. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בַצָּהֳרַיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The dual/plural form refers to the middle of the day. 'At noon' is the
    most natural modern English equivalent.
- source_word: וַיְהַתֵּל
  chosen: mocked
  alternatives:
  - taunted
  - made fun of
  lexicon: HALOT
  rationale: The verb denotes derisive mockery. 'Mocked' is concise and suitably weighty
    for Elijah's scornful speech.
- source_word: בָּהֶם
  chosen: them
  alternatives:
  - at them
  lexicon: HALOT
  rationale: 'The preposition with the verb of mockery is naturally rendered in English
    as a direct object: ''mocked them.'''
- source_word: קִרְאוּ בְקוֹל גָּדוֹל
  chosen: Cry out with a loud voice
  alternatives:
  - Call out loudly
  - Cry louder
  lexicon: HALOT
  rationale: Keeps the imperative force and the concrete Hebrew idiom 'with a loud
    voice.'
- source_word: כִּי אֱלֹהִים הוּא
  chosen: for he is a god
  alternatives:
  - for he is God
  - for he is divine
  lexicon: HALOT
  rationale: 'In context Elijah is speaking sarcastically about Baal, not confessing
    Israel''s God. The anarthrous/plural-form noun here is best rendered indefinitely:
    ''a god.'' This preserves the irony.'
- source_word: שִׂיחַ
  chosen: he is musing
  alternatives:
  - he is deep in thought
  - he is occupied in meditation
  lexicon: HALOT
  rationale: The noun likely refers to inward reflection or absorption in thought.
    'Musing' preserves the ambiguity and sarcastic tone better than an over-specific
    paraphrase.
- source_word: שִׂיג לוֹ
  chosen: he has gone aside
  alternatives:
  - he is relieving himself
  - he has withdrawn
  lexicon: HALOT
  rationale: This rare expression is widely understood as a euphemism, possibly for
    relieving oneself, but the Hebrew itself is indirect. Main text keeps the euphemistic
    force with 'gone aside'; the more explicit interpretation is preserved in a footnote.
- source_word: דֶרֶךְ לוֹ
  chosen: he is on a journey
  alternatives:
  - he has gone on the road
  - he is traveling
  lexicon: HALOT
  rationale: The idiom indicates being away on travel. 'He is on a journey' is idiomatic
    and preserves the nominal Hebrew expression.
- source_word: אוּלַי יָשֵׁן הוּא וְיִקָץ
  chosen: Perhaps he is sleeping and will wake up
  alternatives:
  - Maybe he is asleep and must be awakened
  lexicon: HALOT
  rationale: Captures the sarcastic suggestion plainly. 'Will wake up' is a natural
    rendering of the intransitive verb rather than the more interpretive 'must be
    awakened.'
