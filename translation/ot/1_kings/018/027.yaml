theological_decisions:
- issue: Rendering אֱלֹהִים in reference to Baal
  chosen_reading: a god
  alternative_readings:
  - God
  rationale: The context is Elijah's mockery of Baal's prophets, so the phrase is
    not a theological affirmation but ironic speech about a pagan deity. Rendering
    it 'a god' avoids implying identification with the God of Israel while preserving
    the sarcasm.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Handling the euphemistic phrase שִׂיג לוֹ
  chosen_reading: he has gone aside
  alternative_readings:
  - he is relieving himself
  rationale: The Hebrew likely uses euphemistic language. To preserve what the source
    text actually says without flattening it into a crude paraphrase, the main text
    keeps the euphemism and the probable sense is documented in a footnote.
  doctrine_reference: Translation philosophy §1; §3
