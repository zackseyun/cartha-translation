theological_decisions:
- issue: Meaning of אֲשֵׁרָה in this verse
  chosen_reading: Asherah is rendered as the name of the deity/goddess, yielding 'the
    prophets of Asherah.'
  alternative_readings:
  - Asherah refers to a cult object, hence 'prophets of the Asherah pole' or similar
  rationale: The parallelism with 'the prophets of Baal' strongly favors a personal
    or divine referent here rather than a wooden cult symbol. Rendering it as a proper
    name avoids importing a debated reconstruction into the text while remaining transparent
    to the Hebrew.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of 'all Israel'
  chosen_reading: '''All Israel'' is retained as a collective national expression.'
  alternative_readings:
  - '''All the Israelites'''
  rationale: The phrase functions as a conventional national designation and should
    not be flattened into a merely distributive paraphrase. The translation preserves
    the rhetorical breadth of Elijah's summons.
  doctrine_reference: Translation philosophy §1, §6
