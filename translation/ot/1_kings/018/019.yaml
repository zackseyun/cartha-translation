id: 1KI.18.19
reference: 1 Kings 18:19
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שְׁלַ֨ח קְבֹ֥ץ אֵלַ֛/י אֶת כָּל יִשְׂרָאֵ֖ל אֶל הַ֣ר הַ/כַּרְמֶ֑ל
    וְ/אֶת נְבִיאֵ֨י הַ/בַּ֜עַל אַרְבַּ֧ע מֵא֣וֹת וַ/חֲמִשִּׁ֗ים וּ/נְבִיאֵ֤י הָֽ/אֲשֵׁרָה֙
    אַרְבַּ֣ע מֵא֔וֹת אֹכְלֵ֖י שֻׁלְחַ֥ן אִיזָֽבֶל־־־־׃
translation:
  text: Now send and gather to me all Israel at Mount Carmel, along with the prophets
    of Baal, four hundred and fifty, and the prophets of Asherah, four hundred, who
    eat at Jezebel’s table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Mount Carmel.' The Hebrew preposition marks movement toward the gathering
      place.
    reason: lexical_alternative
  - marker: b
    text: Or 'who dine at Jezebel’s table,' referring to those maintained by her royal
      patronage.
    reason: lexical_alternative
  - marker: c
    text: '''Asherah'' may refer either to the goddess Asherah or, in some contexts,
      to a cult object associated with her. Here the parallel with ''Baal'' favors
      the deity.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing Elijah's immediate command. 'Now' is natural
    modern English; 'And now' is possible but not necessary in English style.
- source_word: שְׁלַח
  chosen: send
  alternatives:
  - dispatch
  lexicon: HALOT
  rationale: Imperative to Ahab to send out orders or messengers. 'Send' is the plain
    and idiomatic rendering.
- source_word: קְבֹץ
  chosen: gather
  alternatives:
  - assemble
  - bring together
  lexicon: HALOT
  rationale: Second imperative paired with 'send'; it expresses the result of the
    sending. 'Gather' preserves the concise force of the Hebrew.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: The preposition marks direction toward Elijah. 'To me' is the most direct
    rendering; 'before me' is interpretive and less literal.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Collective national designation. 'All Israel' is the standard and suitably
    formal rendering, without implying every individual must literally be present
    beyond the representative-national sense.
- source_word: אֶל הַר הַכַּרְמֶל
  chosen: at Mount Carmel
  alternatives:
  - to Mount Carmel
  - on Mount Carmel
  lexicon: HALOT
  rationale: Hebrew has 'to the mountain of Carmel,' indicating destination. In English
    command context, 'at Mount Carmel' reads naturally for the gathering location
    while preserving the place reference.
- source_word: נְבִיאֵי הַבַּעַל
  chosen: the prophets of Baal
  alternatives:
  - Baal's prophets
  lexicon: HALOT
  rationale: Construct phrase identifying prophets associated with/deputed to Baal.
    'The prophets of Baal' is clear and conventional.
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים
  chosen: four hundred and fifty
  alternatives:
  - '450'
  lexicon: HALOT
  rationale: Cardinal number rendered in words for literary style in Bible translation.
- source_word: נְבִיאֵי הָאֲשֵׁרָה
  chosen: the prophets of Asherah
  alternatives:
  - the prophets of the Asherah
  - the prophets of the Asherah pole
  lexicon: HALOT
  rationale: Here אֲשֵׁרָה is best taken as the deity/goddess name in parallel with
    Baal, not the cultic object. 'Asherah' preserves the proper-name force without
    importing a specific interpretive gloss like 'pole' into the main text.
- source_word: אַרְבַּע מֵאוֹת
  chosen: four hundred
  alternatives:
  - '400'
  lexicon: HALOT
  rationale: Cardinal number rendered in words for consistency and literary style.
- source_word: אֹכְלֵי שֻׁלְחַן אִיזָבֶל
  chosen: who eat at Jezebel’s table
  alternatives:
  - who dine at Jezebel's table
  - eaters of Jezebel's table
  lexicon: HALOT
  rationale: Participial phrase describing those supported by Jezebel's royal provision.
    'Eat at Jezebel's table' is idiomatic and preserves the patronage implication
    without over-paraphrasing.
