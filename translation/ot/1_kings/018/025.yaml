theological_decisions:
- issue: אֱלֹהֵיכֶם with reference to Baal
  chosen_reading: your god
  alternative_readings:
  - your gods
  rationale: Although אֱלֹהִים can be morphologically plural, here the referent is
    specifically Baal in the singular. Rendering 'your god' reflects the immediate
    context and avoids suggesting polytheistic plurality at this exact point beyond
    what the text states.
