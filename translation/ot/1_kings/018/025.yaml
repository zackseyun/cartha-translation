id: 1KI.18.25
reference: 1 Kings 18:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלִיָּ֜הוּ לִ/נְבִיאֵ֣י הַ/בַּ֗עַל בַּחֲר֨וּ לָ/כֶ֜ם הַ/פָּ֤ר
    הָֽ/אֶחָד֙ וַ/עֲשׂ֣וּ רִאשֹׁנָ֔ה כִּ֥י אַתֶּ֖ם הָ/רַבִּ֑ים וְ/קִרְאוּ֙ בְּ/שֵׁ֣ם
    אֱלֹהֵי/כֶ֔ם וְ/אֵ֖שׁ לֹ֥א תָשִֽׂימוּ׃
translation:
  text: Then Elijah said to the prophets of Baal, “Choose one bull for yourselves
    and prepare it first, because you are many; then call on the name of your god,
    but put no fire under it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''call on the name of your god''; the idiom means to invoke or
      appeal to the deity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'put no fire'; the Hebrew does not explicitly say 'under it,' though
      that is implied by the sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: לִנְבִיאֵי הַבַּעַל
  chosen: to the prophets of Baal
  alternatives:
  - to Baal's prophets
  lexicon: HALOT
  rationale: Construct chain is straightforwardly possessive. 'Prophets of Baal' is
    the standard clear rendering.
- source_word: בַּחֲרוּ לָכֶם הַפָּר הָאֶחָד
  chosen: Choose one bull for yourselves
  alternatives:
  - Choose the one bull for yourselves
  - Choose one of the bulls for yourselves
  lexicon: HALOT
  rationale: With the article plus 'one,' the phrase refers to one of the two bulls
    previously introduced in context. English idiom is best served by 'one bull' rather
    than the more wooden 'the one bull.' 'For yourselves' preserves לָכֶם.
- source_word: וַעֲשׂוּ
  chosen: prepare it
  alternatives:
  - do it
  - offer it
  - dress it
  lexicon: HALOT
  rationale: In sacrificial context, עשה here means to prepare the animal for offering
    rather than the overly vague 'do' or the too interpretive 'offer.' 'Prepare it'
    captures the practical action.
- source_word: רִאשֹׁנָה
  chosen: first
  alternatives:
  - first of all
  lexicon: HALOT
  rationale: 'Adverbial feminine form functions idiomatically: they are to act first
    in sequence.'
- source_word: כִּי אַתֶּם הָרַבִּים
  chosen: because you are many
  alternatives:
  - for you are the many
  - since you are more numerous
  lexicon: HALOT
  rationale: The clause gives the reason they should go first. 'You are many' is the
    most direct and natural rendering; it likely refers to their numerical majority.
- source_word: וְקִרְאוּ בְּשֵׁם אֱלֹהֵיכֶם
  chosen: then call on the name of your god
  alternatives:
  - and call in the name of your god
  - and invoke your god
  lexicon: HALOT
  rationale: The idiom קרא בשם means to invoke or call on. Because Baal is singular
    in context, 'your god' is preferable to the formally possible but misleading 'your
    gods.' Including 'the name of' preserves the Hebrew idiom.
- source_word: וְאֵשׁ לֹא תָשִׂימוּ
  chosen: but put no fire under it
  alternatives:
  - but do not set fire to it
  - but place no fire
  lexicon: HALOT
  rationale: The prohibition concerns not adding fire to ignite the sacrifice. 'Under
    it' is not explicit in Hebrew but is contextually implied by the altar/sacrifice
    setting and makes the English clear without distorting the sense.
