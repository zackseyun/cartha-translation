id: 1KI.18.37
reference: 1 Kings 18:37
source:
  edition: WLC
  text: עֲנֵ֤/נִי יְהוָה֙ עֲנֵ֔/נִי וְ/יֵֽדְעוּ֙ הָ/עָ֣ם הַ/זֶּ֔ה כִּֽי אַתָּ֥ה יְהוָ֖ה
    הָ/אֱלֹהִ֑ים וְ/אַתָּ֛ה הֲסִבֹּ֥תָ אֶת לִבָּ֖/ם אֲחֹרַנִּֽית־־׃
translation:
  text: Answer me, O LORD, answer me, so that this people may know that you, O LORD,
    are God, and that you have turned their heart back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that you, LORD, are the God.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their heart' (singular), a collective expression for the people
      as a whole; some translations render 'their hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנֵנִי
  chosen: Answer me
  alternatives:
  - Answer me
  - Respond to me
  lexicon: HALOT
  rationale: ענה in this prayer context asks for a divine response demonstrated by
    action (sending fire in the immediate context). 'Answer me' is the most natural
    and sufficiently formal English rendering; repetition is preserved for emphasis.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
    The vocative force is preserved with 'O LORD' in direct address.
- source_word: וְיֵדְעוּ
  chosen: so that ... may know
  alternatives:
  - and let ... know
  - that ... will know
  lexicon: HALOT
  rationale: The conjunction with imperfect here expresses purpose/result in Elijah's
    petition. 'So that ... may know' best captures the prayer's intended outcome in
    idiomatic English.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular collective עם is retained as 'this people,' which is both
    natural enough in biblical-style English and closer to the Hebrew than 'these
    people.'
- source_word: כִּי אַתָּה יְהוָה הָאֱלֹהִים
  chosen: that you, O LORD, are God
  alternatives:
  - that you, LORD, are the God
  - that you are the LORD God
  lexicon: HALOT
  rationale: The clause identifies YHWH as the true God in contrast to Baal. 'Are
    God' is concise and idiomatic; the article on האלהים can function definitively/generically
    in this confessional context. An alternative preserving 'the God' is worth noting
    but is less natural in English main text.
- source_word: הֲסִבֹּתָ
  chosen: have turned back
  alternatives:
  - have turned back
  - have brought back
  - have caused to turn back
  lexicon: HALOT
  rationale: 'Hiphil of סבב here is causative: God has caused a turning. ''Have turned
    back'' is a clear optimal-equivalence rendering that preserves divine agency without
    awkwardness.'
- source_word: אֶת לִבָּם
  chosen: their heart
  alternatives:
  - their heart
  - their hearts
  lexicon: HALOT
  rationale: Hebrew often uses a singular collective noun with plural suffix. 'Their
    heart' preserves the Hebrew number and the corporate sense of the people as one
    body; 'their hearts' is possible but less textually precise.
- source_word: אֲחֹרַנִּית
  chosen: back
  alternatives:
  - back
  - back again
  - backward
  lexicon: HALOT
  rationale: The adverb conveys reversal/return. In context, 'back' naturally expresses
    return to the LORD. 'Backward' would sound spatially awkward in English, and 'again'
    adds a nuance not explicit in the adverb alone.
