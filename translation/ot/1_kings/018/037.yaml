theological_decisions:
- issue: Divine action in Israel's turning
  chosen_reading: and that you have turned their heart back
  alternative_readings:
  - and that you have turned their hearts back
  - and that you are turning their heart back
  rationale: The perfect verb is rendered as completed divine action in Elijah's prayer,
    preserving the text's strong affirmation of God's agency in the people's return
    without softening it into mere permission. The translation avoids importing a
    broader doctrinal system beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
