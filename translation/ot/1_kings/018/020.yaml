id: 1KI.18.20
reference: 1 Kings 18:20
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח אַחְאָ֖ב בְּ/כָל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יִּקְבֹּ֥ץ אֶת הַ/נְּבִיאִ֖ים
    אֶל הַ֥ר הַ/כַּרְמֶֽל־־־׃
translation:
  text: So Ahab sent word to all the sons of Israel and gathered the prophets to Mount
    Carmel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the Israelites.' The Hebrew reads literally 'to all the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - summoned
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In this context with בְּכָל בְּנֵי
    יִשְׂרָאֵל, English idiom is clarified by 'sent word to,' making explicit that
    Ahab dispatched a message rather than physically sending the people. 'Summoned'
    is possible by implication but is more interpretive than the Hebrew itself.
- source_word: בְּכָל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - among all the sons of Israel
  lexicon: HALOT
  rationale: בְּ can mark the addressee after שׁלח in the sense 'send to/among.' בְּנֵי
    יִשְׂרָאֵל is literally 'sons of Israel.' Per the gender-accurate philosophy,
    the main text preserves the masculine familial expression rather than flattening
    it to 'Israelites,' though that alternative is natural English and worth preserving.
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: קבץ commonly means 'gather/assemble.' 'Gathered' is straightforward and
    idiomatic here.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: נביאים is the standard term for 'prophets.' In context this refers to
    the prophets Ahab was to assemble for the Carmel confrontation.
- source_word: אֶל הַר הַכַּרְמֶל
  chosen: to Mount Carmel
  alternatives:
  - to the mountain of Carmel
  - to the hill country of Carmel
  lexicon: HALOT
  rationale: הַר plus a place name is naturally rendered 'Mount Carmel' in English.
    This is the conventional and accurate geographic expression.
