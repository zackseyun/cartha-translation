id: 1KI.18.7
reference: 1 Kings 18:7
source:
  edition: WLC
  text: וַ/יְהִ֤י עֹבַדְיָ֨הוּ֙ בַּ/דֶּ֔רֶךְ וְ/הִנֵּ֥ה אֵלִיָּ֖הוּ לִ/קְרָאת֑/וֹ
    וַ/יַּכִּרֵ֨/הוּ֙ וַ/יִּפֹּ֣ל עַל פָּנָ֔י/ו וַ/יֹּ֕אמֶר הַ/אַתָּ֥ה זֶ֖ה אֲדֹנִ֥/י
    אֵלִיָּֽהוּ־׃
translation:
  text: As Obadiah was on the way, behold, Elijah came to meet him. When he recognized
    him, he fell on his face and said, “Is that you, my lord Elijah?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my master Elijah” or “sir Elijah.” The Hebrew אֲדֹנִי is a respectful
      form of address here, spoken to Elijah, not a divine title.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: As ... was
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative circumstance. In
    English, 'As ... was' conveys the temporal scene-setting naturally without the
    wooden 'and it happened.'
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - on the road
  - in the way
  lexicon: HALOT
  rationale: The phrase denotes being in transit along a route. 'On the way' is idiomatic
    modern English and fits the narrative context.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: The particle marks a vivid, attention-directing development in the narrative.
    'Behold' preserves that force better than omitting it, while remaining understandable
    in this context.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - toward him
  - to encounter him
  lexicon: HALOT
  rationale: The idiom לקראת commonly means going to meet someone. 'To meet him' is
    the clearest natural rendering.
- source_word: וַיַּכִּרֵהוּ
  chosen: he recognized him
  alternatives:
  - he knew him
  - he identified him
  lexicon: HALOT
  rationale: נכר in the Hiphil here means to recognize or identify. 'Recognized' best
    fits the immediate response of prostration and address.
- source_word: וַיִּפֹּל עַל פָּנָיו
  chosen: he fell on his face
  alternatives:
  - he bowed with his face to the ground
  - he prostrated himself
  lexicon: HALOT
  rationale: The expression is a standard Hebrew idiom for prostration. 'Fell on his
    face' is sufficiently literal and clear in English.
- source_word: הַאַתָּה זֶה
  chosen: Is that you
  alternatives:
  - Are you this one
  - Is it really you
  lexicon: HALOT
  rationale: The interrogative plus pronoun and demonstrative forms an emphatic recognition
    question. 'Is that you' captures the natural English sense of surprised identification.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here the term is a respectful address to Elijah, not the divine name.
    'My lord' preserves the deferential tone without flattening it to the more casual
    'sir.'
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
