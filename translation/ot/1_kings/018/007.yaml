theological_decisions:
- issue: Rendering of אֲדֹנִי in address to Elijah
  chosen_reading: my lord
  alternative_readings:
  - my master
  - sir
  rationale: The word refers to Elijah as a human superior and should not be confused
    with the divine title or name. Lowercase 'lord' preserves the honorific sense
    while distinguishing it from references to God.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table distinguishes divine renderings such as YHWH/the LORD and kyrios/Lord.'
