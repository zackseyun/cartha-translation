id: 1KI.18.26
reference: 1 Kings 18:26
source:
  edition: WLC
  text: וַ֠/יִּקְחוּ אֶת הַ/פָּ֨ר אֲשֶׁר נָתַ֣ן לָ/הֶם֮ וַֽ/יַּעֲשׂוּ֒ וַ/יִּקְרְא֣וּ
    בְ/שֵׁם הַ֠/בַּעַל מֵ/הַ/בֹּ֨קֶר וְ/עַד הַ/צָּהֳרַ֤יִם לֵ/אמֹר֙ הַ/בַּ֣עַל עֲנֵ֔/נוּ
    וְ/אֵ֥ין ק֖וֹל וְ/אֵ֣ין עֹנֶ֑ה וַֽ/יְפַסְּח֔וּ עַל הַ/מִּזְבֵּ֖חַ אֲשֶׁ֥ר עָשָֽׂה־־־־־׃
translation:
  text: So they took the bull that had been given to them, prepared it, and called
    on the name of Baal from morning until noon, saying, “O Baal, answer us!” But
    there was no voice, and no one answered. And they limped around the altar that
    he had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they danced around” or “they leaped around the altar.” The Hebrew verb
      likely denotes a limping or hopping ritual movement and may intentionally echo
      Elijah’s later use of the same root in verse 21.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they received
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of לקח, best rendered with the straightforward
    past 'took' in context.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull/young bull used for sacrifice. 'Bull' is
    natural English and sufficient here.
- source_word: אֲשֶׁר נָתַן לָהֶם
  chosen: that had been given to them
  alternatives:
  - which he gave them
  lexicon: HALOT
  rationale: The relative clause refers back to Elijah's provision in the prior verse.
    English passive smooths the clause while preserving sense.
- source_word: וַיַּעֲשׂוּ
  chosen: prepared it
  alternatives:
  - offered it
  - made it ready
  lexicon: HALOT
  rationale: 'עשה here is elliptical in sacrificial context: they prepared the bull
    for sacrifice. ''Offered it'' would overstate the action before the fire-sign;
    ''prepared it'' fits the sequence.'
- source_word: וַיִּקְרְאוּ בְשֵׁם הַבַּעַל
  chosen: called on the name of Baal
  alternatives:
  - called in the name of Baal
  - invoked Baal
  lexicon: HALOT
  rationale: The idiom קרא בשם means to invoke/call upon. 'Called on the name of Baal'
    preserves the Hebrew idiom and its cultic force.
- source_word: מֵהַבֹּקֶר וְעַד הַצָּהֳרַיִם
  chosen: from morning until noon
  alternatives:
  - from the morning until midday
  lexicon: HALOT
  rationale: Natural English rendering of the time span; 'noon' is the clearest equivalent
    for צָהֳרַיִם here.
- source_word: הַבַּעַל עֲנֵנוּ
  chosen: O Baal, answer us!
  alternatives:
  - Baal, answer us!
  - Baal, respond to us!
  lexicon: HALOT
  rationale: The vocative force is clear. 'Answer us' best matches ענה in prayer/invocation
    context.
- source_word: וְאֵין קוֹל וְאֵין עֹנֶה
  chosen: there was no voice, and no one answered
  alternatives:
  - there was no sound, and no one answered
  - there was no voice and no answer
  lexicon: HALOT
  rationale: Retains the Hebrew's emphatic two-part negation. 'Voice' is more literal
    than 'sound'; 'no one answered' makes the participle עֹנֶה idiomatic in English.
- source_word: וַיְפַסְּחוּ
  chosen: they limped around
  alternatives:
  - they danced around
  - they leaped around
  - they hobbled around
  lexicon: HALOT
  rationale: פסח here likely denotes a limping/leaping ritual movement. 'Limped around'
    preserves the lexical link with Elijah's later wordplay in v. 21 and avoids importing
    a smoother 'danced' that may flatten the irony.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: around the altar
  alternatives:
  - upon the altar
  - by the altar
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with פסח in this context it likely
    indicates movement at or around the altar rather than literally on top of it.
    'Around' best fits the ritual action in idiomatic English.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - that had been made
  lexicon: HALOT
  rationale: The singular verb naturally points to an unspecified singular antecedent,
    likely referring to the altar as made/prepared. 'He had made' preserves the Hebrew
    form without forcing identification.
