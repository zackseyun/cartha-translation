theological_decisions:
- issue: Rendering of Baal-invocation idiom
  chosen_reading: called on the name of Baal
  alternative_readings:
  - invoked Baal
  rationale: Preserves the same invocation idiom used elsewhere in Scripture for deity-address,
    without implying legitimacy; the narrative itself exposes Baal's impotence.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of וַיְפַסְּחוּ
  chosen_reading: they limped around the altar
  alternative_readings:
  - they danced around the altar
  - they leaped around the altar
  rationale: The chosen rendering preserves the probable lexical nuance and the literary
    irony connected to the same root later in the chapter, rather than smoothing it
    into a generic ritual dance.
  doctrine_reference: Translation philosophy §1, §5
