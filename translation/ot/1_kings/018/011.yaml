id: 1KI.18.11
reference: 1 Kings 18:11
source:
  edition: WLC
  text: וְ/עַתָּ֖ה אַתָּ֣ה אֹמֵ֑ר לֵ֛ךְ אֱמֹ֥ר לַ/אדֹנֶ֖י/ךָ הִנֵּ֥ה אֵלִיָּֽהוּ׃
translation:
  text: And now you are saying, ‘Go, say to your lord, “Look, Elijah is here.”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your master.' The Hebrew אֲדוֹן can denote a human superior as well
      as 'lord.' Here it refers to Ahab, Obadiah's master.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the present demand in contrast
    to the preceding situation. 'And now' preserves the connective ו plus עתה naturally
    in English.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis in Hebrew. English does not need separate
    emphasis marking beyond the wording 'you are saying,' which adequately carries
    the direct address.
- source_word: אֹמֵר
  chosen: are saying
  alternatives:
  - say
  - are telling me
  lexicon: HALOT
  rationale: The participle functions with present/imperfective force in direct speech.
    'Are saying' reflects the ongoing/immediate force better than a simple imperative-like
    paraphrase.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Qal imperative of הלך. Simple 'Go' is the direct and idiomatic rendering.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - tell
  lexicon: HALOT
  rationale: Imperative of אמר. 'Say' keeps closer formal correspondence; 'tell' is
    possible but slightly more interpretive.
- source_word: לַאדֹנֶיךָ
  chosen: to your lord
  alternatives:
  - to your master
  lexicon: HALOT
  rationale: אָדוֹן here refers to Obadiah's human superior, Ahab. For a human social
    superior, 'lord' is a natural rendering and distinguishes it from the divine title
    'the LORD.' 'Master' is possible but less fitting in this courtly context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Here is
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and preserves the force without archaic tone. 'Behold' is too archaic for the
    stated philosophy.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
