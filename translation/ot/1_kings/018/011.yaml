theological_decisions:
- issue: Rendering of אָדוֹן for a human superior
  chosen_reading: your lord
  alternative_readings:
  - your master
  rationale: This is not the divine name or title but a human superior (Ahab). 'Lord'
    here preserves the social hierarchy and matches the Hebrew noun without confusing
    it with YHWH, since the divine form in this translation is reserved as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for YHWH/the LORD'
