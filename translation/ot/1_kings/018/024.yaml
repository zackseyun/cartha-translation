theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly contrasts Elijah's invocation of Israel's covenant
    God with the prophets' invocation of their deity. Following the project's doctrinal
    standard, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render אֱלֹהֵיכֶם as singular or plural
  chosen_reading: your god
  alternative_readings:
  - your gods
  rationale: Though morphologically plural in form, אֱלֹהִים often functions as a
    singular for a deity. In this narrative contest the prophets of Baal are being
    challenged to call on their deity, and the singular framing of the verdict supports
    singular English.
