id: 1KI.18.24
reference: 1 Kings 18:24
source:
  edition: WLC
  text: וּ/קְרָאתֶ֞ם בְּ/שֵׁ֣ם אֱלֹֽהֵי/כֶ֗ם וַֽ/אֲנִי֙ אֶקְרָ֣א בְ/שֵׁם יְהוָ֔ה וְ/הָיָ֧ה
    הָ/אֱלֹהִ֛ים אֲשֶׁר יַעֲנֶ֥ה בָ/אֵ֖שׁ ה֣וּא הָ/אֱלֹהִ֑ים וַ/יַּ֧עַן כָּל הָ/עָ֛ם
    וַ/יֹּאמְר֖וּ ט֥וֹב הַ/דָּבָֽר־־־׃
translation:
  text: Then call on the name of your god, and I will call on the name of the LORD;
    and the god who answers by fire, he is God." And all the people answered and said,
    "The word is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your gods,' if אֱלֹהֵיכֶם is taken as a true plural rather than a singular
      reference to the deity represented in the contest.
    reason: lexical_alternative
  - marker: b
    text: Or, 'The proposal is good' or 'The thing is good.' Hebrew דָּבָר can mean
      'word,' 'matter,' or 'proposal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְרָאתֶם
  chosen: call on
  alternatives:
  - invoke
  - call
  lexicon: HALOT
  rationale: קרא with בְּשֵׁם commonly means to invoke or call on a deity by name.
    'Call on' is idiomatic English and preserves the cultic sense without over-paraphrase.
- source_word: בְּשֵׁם
  chosen: on the name of
  alternatives:
  - in the name of
  - by the name of
  lexicon: HALOT
  rationale: With קרא, the prepositional phrase is best rendered 'call on the name
    of,' the standard idiom for invocation.
- source_word: אֱלֹהֵיכֶם
  chosen: your god
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, here the singular predicate
    later in the verse ('he is God') and the contest setup point to each side calling
    on a single deity representative—Baal for the prophets versus the LORD for Elijah.
    Singular 'your god' best fits the immediate context.
- source_word: וַאֲנִי אֶקְרָא
  chosen: and I will call
  alternatives:
  - but I will call
  lexicon: HALOT
  rationale: The conjunction marks coordination with contrast implied by context.
    'And I will call' preserves the Hebrew structure while allowing the contrast to
    be felt naturally.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: וְהָיָה
  chosen: and ...
  alternatives:
  - then it shall be that
  - and it shall be
  lexicon: HALOT
  rationale: This introduces the result condition. In English, the sense is conveyed
    smoothly by continuing the sentence with 'and the god who answers...' without
    a wooden 'it shall be.'
- source_word: הָאֱלֹהִים אֲשֶׁר יַעֲנֶה בָאֵשׁ
  chosen: the god who answers by fire
  alternatives:
  - the God who answers with fire
  - the god who answers with fire
  lexicon: HALOT
  rationale: 'Because the contest is between claimed deities, ''the god'' is appropriate
    here rather than ''God.'' בָאֵשׁ is most naturally instrumental: ''by fire'' or
    ''with fire.'' ''By fire'' is concise and idiomatic.'
- source_word: הוּא הָאֱלֹהִים
  chosen: he is God
  alternatives:
  - he is the god
  - that one is God
  lexicon: HALOT
  rationale: The first occurrence refers to whichever deity answers; the second is
    definite and climactic, identifying the true God. Capitalizing 'God' in English
    reflects this predicative force. Retaining 'he' mirrors the Hebrew pronoun for
    emphasis.
- source_word: וַיַּעַן כָּל הָעָם
  chosen: And all the people answered
  alternatives:
  - Then all the people answered
  lexicon: HALOT
  rationale: ענה in narrative commonly means 'answer/respond.' 'All the people' preserves
    the collective scope.
- source_word: טוֹב הַדָּבָר
  chosen: The word is good
  alternatives:
  - The thing is good
  - The proposal is good
  - Good is the word
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'proposal.' Here the people approve
    Elijah's suggested test. 'The word is good' is a fairly literal rendering that
    remains understandable, though 'proposal' is a viable dynamic alternative.
