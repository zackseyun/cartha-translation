id: 1KI.18.41
reference: 1 Kings 18:41
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלִיָּ֨הוּ֙ לְ/אַחְאָ֔ב עֲלֵ֖ה אֱכֹ֣ל וּ/שְׁתֵ֑ה כִּי ק֖וֹל הֲמ֥וֹן
    הַ/גָּֽשֶׁם־׃
translation:
  text: And Elijah said to Ahab, “Go up, eat and drink, for there is the sound of
    a great rainstorm.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'for the sound of the roar of the rain.' The Hebrew phrase
      קול המון הגשם is compact and vivid; the main text renders it idiomatically as
      a coming great rainstorm.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: לְאַחְאָב
  chosen: to Ahab
  rationale: The preposition ל marks the indirect object of speech; standard rendering
    is 'to Ahab.' Personal name is transliterated.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Get up
  - Come up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In context Elijah is directing Ahab
    to go up from the wadi area to eat and drink. 'Go up' preserves the spatial sense
    better than the more generic 'get up.'
- source_word: אֱכֹל וּשְׁתֵה
  chosen: eat and drink
  alternatives:
  - eat and drink up
  lexicon: HALOT
  rationale: Straightforward imperatives. No need to expand beyond the Hebrew; the
    pair likely implies resuming normal royal activity after the drought crisis.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Elijah's command. 'For' is concise and fits
    the prophetic declaration.
- source_word: קוֹל
  chosen: the sound
  alternatives:
  - a sound
  - the noise
  lexicon: HALOT
  rationale: קול often means 'sound/voice/noise.' Here it refers to an audible indication
    associated with coming rain, so 'the sound' is the most natural collocation in
    English.
- source_word: הֲמוֹן
  chosen: great
  alternatives:
  - roar
  - rumbling
  - abundance
  - multitude
  lexicon: HALOT
  rationale: הֲמוֹן denotes a tumult, roar, or abundance. In construct with 'the rain'
    it conveys the heavy, tumultuous character of the coming rainfall. Rendering the
    phrase idiomatically as 'a great rainstorm' communicates both intensity and natural
    English style.
- source_word: הַגָּשֶׁם
  chosen: rainstorm
  alternatives:
  - rain
  - downpour
  lexicon: HALOT
  rationale: גשם means 'rain.' Because the Hebrew phrase קול המון הגשם is more than
    merely 'rain' and suggests the onset of heavy rain, 'rainstorm' captures the force
    without excessive paraphrase.
