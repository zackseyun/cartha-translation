id: 1KI.18.30
reference: 1 Kings 18:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלִיָּ֤הוּ לְ/כָל הָ/עָם֙ גְּשׁ֣וּ אֵלַ֔/י וַ/יִּגְּשׁ֥וּ כָל
    הָ/עָ֖ם אֵלָ֑י/ו וַ/יְרַפֵּ֛א אֶת מִזְבַּ֥ח יְהוָ֖ה הֶ/הָרֽוּס־־־׃
translation:
  text: Then Elijah said to all the people, “Come near to me.” So all the people came
    near to him, and he repaired the altar of the LORD that had been torn down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restored' the altar of the LORD; the Hebrew verb is literally 'healed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּשׁוּ
  chosen: Come near
  alternatives:
  - Come here
  - Approach me
  lexicon: HALOT
  rationale: נגשׁ in the imperative here calls the people to draw close physically.
    'Come near' is natural English and preserves the directional sense better than
    the flatter 'come here.'
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  lexicon: HALOT
  rationale: Uses the same English root as the imperative גְּשׁוּ for consistency,
    reflecting the narrative fulfillment of Elijah's command.
- source_word: וַיְרַפֵּא
  chosen: repaired
  alternatives:
  - healed
  - restored
  lexicon: HALOT
  rationale: The verb רפא literally means 'heal,' but with an altar as object it idiomatically
    refers to making it sound again. 'Repaired' is the clearest natural English rendering;
    'restored' is possible but slightly broader and less concrete.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct relationship is best represented by 'altar of the LORD.' This
    keeps the formal link to the covenant name while remaining readable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
- source_word: הֶהָרוּס
  chosen: that had been torn down
  alternatives:
  - which was in ruins
  - that had been broken down
  lexicon: HALOT
  rationale: The passive participle from הרס denotes something demolished or pulled
    down. 'That had been torn down' communicates prior destruction clearly in idiomatic
    English and fits the relative sense in context.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives smooth modern
    English narrative flow without losing the sequential force.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the collective phrase in English.
