theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names the altar as belonging to Israel's covenant God. Following
    the project's doctrinal and stylistic standard, the Tetragrammaton is rendered
    'the LORD' rather than transliterated.
