id: 1KI.18.10
reference: 1 Kings 18:10
source:
  edition: WLC
  text: חַ֣י יְהוָ֣ה אֱלֹהֶ֗י/ךָ אִם יֶשׁ גּ֤וֹי וּ/מַמְלָכָה֙ אֲ֠שֶׁר לֹֽא שָׁלַ֨ח אֲדֹנִ֥/י שָׁם֙ לְ/בַקֶּשְׁ/ךָ֔ וְ/אָמְר֖וּ אָ֑יִן וְ/הִשְׁבִּ֤יעַ אֶת הַ/מַּמְלָכָה֙ וְ/אֶת הַ/גּ֔וֹי כִּ֖י לֹ֥א יִמְצָאֶֽ/כָּה׀־־־־־׃
translation:
  text: As Yahweh your God lives, there is no nation or kingdom where my lord has not sent to seek you. When they said, ‘He is not here,’ he made the kingdom and the nation swear that they could not find you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חַי יְהוָה אֱלֹהֶיךָ
  chosen: As the LORD your God lives
  alternatives:
  - By the life of the LORD your God
  - The LORD your God lives
  lexicon: HALOT
  rationale: The Hebrew oath formula literally invokes the life of YHWH. 'As the LORD your God lives' is idiomatic, natural English that preserves the force of a solemn oath. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִם יֶשׁ גּוֹי וּמַמְלָכָה אֲשֶׁר לֹא
  chosen: there is no nation or kingdom where ... not
  alternatives:
  - if there is a nation or kingdom where ... not
  - surely there is no nation or kingdom where ... not
  lexicon: HALOT
  rationale: 'In oath contexts אִם can introduce an emphatic assertion with elliptical force rather than a simple conditional. The sense here is not uncertainty but strong affirmation: Obadiah is saying Ahab searched everywhere. Rendering as ''there is no nation or kingdom where'' communicates the idiomatic force clearly.'
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: In parallel with מַמְלָכָה, 'nation' best fits the geopolitical sense.
- source_word: מַמְלָכָה
  chosen: kingdom
  alternatives:
  - realm
  lexicon: HALOT
  rationale: Standard rendering in political context; pairs naturally with 'nation.'
- source_word: שָׁלַח ... לְבַקֶּשְׁךָ
  chosen: has not sent to seek you
  alternatives:
  - has not sent there to look for you
  - has not dispatched men to search for you
  lexicon: HALOT
  rationale: Preserves the verbal sequence 'sent ... to seek' without adding an explicit object not present in the Hebrew. Present perfect in English fits the retrospective summary of repeated action.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Here Obadiah refers respectfully to King Ahab, not to God. 'My lord' preserves the courtly address and avoids importing slavery language.
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: Although literally 'there,' English idiom prefers 'where' after 'nation or kingdom' to express destination/location smoothly.
- source_word: וְאָמְרוּ אָיִן
  chosen: When they said, ‘He is not here,’
  alternatives:
  - and they said, 'There is nothing'
  - and they said, 'He is absent'
  lexicon: HALOT
  rationale: אָיִן here functions as 'there is not / he is not there.' Supplying 'He is not here' makes the implied referent Elijah explicit in natural English.
- source_word: וְהִשְׁבִּיעַ
  chosen: he made ... swear
  alternatives:
  - he put ... under oath
  - he adjured
  lexicon: HALOT
  rationale: Hiphil of שבע means to cause to swear, i.e., impose an oath. 'Made ... swear' is clear modern English.
- source_word: אֶת הַמַּמְלָכָה וְאֶת הַגּוֹי
  chosen: the kingdom and the nation
  alternatives:
  - that kingdom and nation
  - the realm and the people
  lexicon: HALOT
  rationale: Retains the Hebrew pair and likely refers distributively to each political entity searched.
- source_word: כִּי לֹא יִמְצָאֶךָ
  chosen: that they could not find you
  alternatives:
  - that they did not find you
  - that they cannot find you
  lexicon: HALOT
  rationale: 'After a verb of swearing, כִּי introduces the content of the oath. The imperfect here is best rendered in context as inability/result in past search: ''could not find you.'' This communicates the practical sense of the oath better than a wooden future.'
