id: 1KI.18.44
reference: 1 Kings 18:44
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/שְּׁבִעִ֔ית וַ/יֹּ֗אמֶר הִנֵּה עָ֛ב קְטַנָּ֥ה כְּ/כַף אִ֖ישׁ
    עֹלָ֣ה מִ/יָּ֑ם וַ/יֹּ֗אמֶר עֲלֵ֨ה אֱמֹ֤ר אֶל אַחְאָב֙ אֱסֹ֣ר וָ/רֵ֔ד וְ/לֹ֥א
    יַעַצָרְ/כָ֖ה הַ/גָּֽשֶׁם־־־׃
translation:
  text: And it happened on the seventh time that he said, “Look, a small cloud, like
    a man’s palm, is rising from the sea.” Then he said, “Go up, say to Ahab, ‘Harness
    up and go down, so that the rain does not stop you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like the palm of a man’s hand.”
    reason: lexical_alternative
  - marker: b
    text: “Harness up” refers to hitching or preparing the chariot/team for travel.
    reason: cultural_note
  - marker: c
    text: Or “lest the rain detain you” or “hold you back.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בַּשְּׁבִעִית
  chosen: on the seventh time
  alternatives:
  - at the seventh time
  - on the seventh
  lexicon: HALOT
  rationale: In context Elijah’s servant has gone repeatedly to look; the phrase refers
    to the seventh occasion, not merely 'the seventh day.' Supplying 'time' makes
    the sense explicit from context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what is seen. 'Look' is natural
    modern English and preserves the immediacy.
- source_word: עָב קְטַנָּה
  chosen: a small cloud
  alternatives:
  - a little cloud
  - a tiny cloud
  lexicon: HALOT
  rationale: Straightforward nominal phrase. 'Small cloud' is clear and idiomatic.
- source_word: כְּכַף אִישׁ
  chosen: like a man’s palm
  alternatives:
  - like the palm of a man’s hand
  - like a human hand's palm
  lexicon: HALOT
  rationale: כַּף denotes palm/hand-shaped hollow. The comparison is to the size of
    a human palm. 'A man's palm' keeps the masculine singular of the Hebrew in line
    with the project's gender-accurate policy.
- source_word: עֹלָה מִיָּם
  chosen: is rising from the sea
  alternatives:
  - comes up from the sea
  - is coming up from the sea
  lexicon: HALOT
  rationale: Participle expressing action in progress. 'Is rising' fits the visual
    scene of a cloud appearing over the Mediterranean.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Go
  - Ascend
  lexicon: HALOT
  rationale: Imperative likely directed to Elijah’s servant to go up from the lookout
    and deliver the message. 'Go up' preserves the directional nuance.
- source_word: אֱמֹר אֶל אַחְאָב
  chosen: say to Ahab
  alternatives:
  - tell Ahab
  - speak to Ahab
  lexicon: HALOT
  rationale: Direct speech introduction. 'Say to Ahab' is slightly more formal and
    transparent to the Hebrew.
- source_word: אֱסֹר
  chosen: Harness up
  alternatives:
  - Prepare your chariot
  - Yoke up
  lexicon: HALOT
  rationale: The verb אסר literally means bind/tie; in this context it refers to hitching
    or harnessing the chariot/team for departure. 'Harness up' preserves the concrete
    action better than the more interpretive 'prepare your chariot.'
- source_word: וָרֵד
  chosen: and go down
  alternatives:
  - then go down
  - descend
  lexicon: HALOT
  rationale: Imperative with directional sense, likely from Carmel down before the
    storm. 'Go down' is idiomatic and preserves the topographical movement.
- source_word: וְלֹא יַעַצָרְכָה הַגָּשֶׁם
  chosen: so that the rain does not stop you
  alternatives:
  - lest the rain detain you
  - or the rain will hold you back
  lexicon: HALOT
  rationale: 'The verb עצר can mean restrain, detain, hold back. Here the warning
    is practical: leave quickly before the rain impedes travel. ''Stop you'' is natural
    modern English and captures the force.'
