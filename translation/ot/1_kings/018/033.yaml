id: 1KI.18.33
reference: 1 Kings 18:33
source:
  edition: WLC
  text: וַֽ/יַּעֲרֹ֖ךְ אֶת הָֽ/עֵצִ֑ים וַ/יְנַתַּח֙ אֶת הַ/פָּ֔ר וַ/יָּ֖שֶׂם עַל הָ/עֵצִֽים־־־׃
translation:
  text: Then he arranged the wood, cut the bull into pieces, and placed it on the
    wood.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲרֹךְ
  chosen: arranged
  alternatives:
  - laid out
  - set in order
  lexicon: HALOT
  rationale: The verb ערך in this sacrificial context means to arrange or set in order.
    'Arranged' is natural modern English and fits the preparation of the altar and
    wood.
- source_word: הָעֵצִים
  chosen: the wood
  alternatives:
  - the pieces of wood
  - the firewood
  lexicon: HALOT
  rationale: Though formally plural ('woods/sticks'), English idiom prefers the collective
    singular 'wood' for fuel laid on an altar. This preserves the sense without awkwardness.
- source_word: וַיְנַתַּח
  chosen: cut ... into pieces
  alternatives:
  - cut up
  - butchered
  lexicon: HALOT
  rationale: The verb נתּח refers to dividing an animal into pieces, especially in
    sacrificial preparation. 'Cut ... into pieces' is clear and sufficiently formal
    without sounding technical.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  - the ox
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull in sacrificial contexts. 'Bull' is the most
    straightforward rendering here; 'young bull' is possible but not required by this
    verse alone.
- source_word: וַיָּשֶׂם
  chosen: placed
  alternatives:
  - put
  - laid
  lexicon: HALOT
  rationale: A standard rendering of שׂים in narrative sequence. 'Placed' is slightly
    more deliberate and suits the ritual action.
- source_word: עַל הָעֵצִים
  chosen: on the wood
  alternatives:
  - upon the wood
  - on top of the wood
  lexicon: HALOT
  rationale: The preposition עַל is spatially straightforward here. 'On the wood'
    is idiomatic and matches the altar-preparation scene.
