theological_decisions:
- issue: Whether Elijah's posture should be interpreted explicitly as prayer in the
    main text
  chosen_reading: Retain the physical description without adding 'prayed.'
  alternative_readings:
  - He bowed in prayer
  - He prayed with his face between his knees
  rationale: The verse itself describes Elijah's bodily posture, while the broader
    context implies prayer. To avoid importing an interpretive expansion not stated
    explicitly in this verse, the translation preserves the concrete action only.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
