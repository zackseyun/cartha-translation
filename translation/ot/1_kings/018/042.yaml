id: 1KI.18.42
reference: 1 Kings 18:42
source:
  edition: WLC
  text: וַ/יַּעֲלֶ֥ה אַחְאָ֖ב לֶ/אֱכֹ֣ל וְ/לִ/שְׁתּ֑וֹת וְ/אֵ֨לִיָּ֜הוּ עָלָ֨ה אֶל
    רֹ֤אשׁ הַ/כַּרְמֶל֙ וַ/יִּגְהַ֣ר אַ֔רְצָ/ה וַ/יָּ֥שֶׂם פָּנָ֖י/ו בֵּ֥ין ברכ/ו־׃
translation:
  text: So Ahab went up to eat and to drink, but Elijah went up to the top of Carmel,
    and he bent down to the ground and put his face between his knees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and Elijah'; the Hebrew conjunction is simply 'and,' though the contrast
      with Ahab's action may be brought out in English as 'but.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the summit of Carmel' or 'to the top of Mount Carmel.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew describes Elijah's physical posture; the wider context suggests
      prayer, but the verse itself does not state it explicitly.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲלֶה
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: From עלה, the common narrative verb 'go up.' 'Went up' is natural English
    and preserves the directional sense, likely up from the wadi/scene to the place
    of eating.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  chosen: to eat and to drink
  alternatives:
  - to eat and drink
  lexicon: HALOT
  rationale: Infinitives expressing purpose. Repeating 'to' keeps the Hebrew coordination
    visible while remaining idiomatic.
- source_word: עָלָה אֶל רֹאשׁ הַכַּרְמֶל
  chosen: went up to the top of Carmel
  alternatives:
  - went up to the summit of Carmel
  - went up to the top of Mount Carmel
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head,' idiomatically 'top/summit.' 'Top of Carmel' is
    clear and close to the Hebrew. 'Mount' is not explicit in the Hebrew here, so
    it is omitted from the main text.
- source_word: הַכַּרְמֶל
  chosen: Carmel
  alternatives:
  - Mount Carmel
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. Since the Hebrew
    text itself has simply 'the Carmel,' the concise proper-name form is preferred.
- source_word: וַיִּגְהַר אַרְצָה
  chosen: he bent down to the ground
  alternatives:
  - he crouched down to the earth
  - he bowed himself down to the ground
  lexicon: HALOT
  rationale: The rare verb גהר conveys stooping/bending low. 'Bent down to the ground'
    communicates the physical posture without overinterpreting it as worship.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: Directional form of אֶרֶץ. In this bodily-action context, 'ground' is
    more idiomatic than 'earth' in modern English.
- source_word: וַיָּשֶׂם פָּנָיו בֵּין בִּרְכָּיו
  chosen: put his face between his knees
  alternatives:
  - placed his face between his knees
  lexicon: HALOT
  rationale: A concrete description of Elijah's posture. 'Put' is idiomatic and direct;
    no need to paraphrase the gesture's significance in the main text.
- source_word: וְאֵלִיָּהוּ
  chosen: but Elijah
  alternatives:
  - and Elijah
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but English narrative style often
    uses 'but' to mark the contrast between Ahab's going to eat and Elijah's going
    to pray/humble himself. This is an optimal-equivalence choice reflecting the discourse
    contrast.
