id: 1KI.18.32
reference: 1 Kings 18:32
source:
  edition: WLC
  text: וַ/יִּבְנֶ֧ה אֶת הָ/אֲבָנִ֛ים מִזְבֵּ֖חַ בְּ/שֵׁ֣ם יְהוָ֑ה וַ/יַּ֣עַשׂ תְּעָלָ֗ה
    כְּ/בֵית֙ סָאתַ֣יִם זֶ֔רַע סָבִ֖יב לַ/מִּזְבֵּֽחַ־׃
translation:
  text: And with the stones he built an altar in the name of the LORD, and he made
    a trench around the altar, large enough for two seahs of seed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like the measure of two seahs of seed,'' an idiom indicating
      the trench''s size or capacity.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבְנֶה אֶת־הָאֲבָנִים מִזְבֵּחַ
  chosen: with the stones he built an altar
  alternatives:
  - he built the stones into an altar
  - he rebuilt the altar with the stones
  lexicon: HALOT
  rationale: The Hebrew literally has 'he built the stones [as] an altar.' English
    idiom requires smoothing. 'With the stones he built an altar' preserves the instrumental
    sense of אֶת־הָאֲבָנִים without overinterpreting beyond the text. 'Rebuilt' would
    import information from the previous verse rather than this clause itself.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - for the name of the LORD
  - by the name of the LORD
  lexicon: HALOT
  rationale: בְּשֵׁם most naturally means 'in the name of.' Per doctrine, יְהוָה is
    rendered 'the LORD.' This phrasing preserves covenantal and cultic significance
    without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of the divine name
    as 'the LORD,' preserving Jewish reverence tradition and the LXX pattern.
- source_word: וַיַּעַשׂ תְּעָלָה
  chosen: he made a trench
  alternatives:
  - he made a channel
  - he made a ditch
  lexicon: HALOT
  rationale: תְּעָלָה denotes a trench/channel. 'Trench' is clear modern English and
    fits the narrative setting around an altar.
- source_word: כְּבֵית סָאתַיִם זֶרַע
  chosen: large enough for two seahs of seed
  alternatives:
  - like the area sown by two seahs of seed
  - of the capacity of two seahs of seed
  lexicon: HALOT
  rationale: The phrase is difficult and elliptical. Literally it is 'like the house/measure
    of two seahs of seed.' In context it describes the size/capacity of the trench.
    'Large enough for two seahs of seed' communicates the measure naturally while
    retaining the ancient unit 'seah' rather than flattening it into a modern approximation.
- source_word: סָבִיב לַמִּזְבֵּחַ
  chosen: around the altar
  alternatives:
  - surrounding the altar
  - all around the altar
  lexicon: HALOT
  rationale: סָבִיב indicates encircling position. 'Around the altar' is the most
    natural concise rendering.
