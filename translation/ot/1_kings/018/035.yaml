id: 1KI.18.35
reference: 1 Kings 18:35
source:
  edition: WLC
  text: וַ/יֵּלְכ֣וּ הַ/מַּ֔יִם סָבִ֖יב לַ/מִּזְבֵּ֑חַ וְ/גַ֥ם אֶת הַ/תְּעָלָ֖ה מִלֵּא
    מָֽיִם־־׃
translation:
  text: And the water ran all around the altar, and it also filled the trench with
    water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flowed all around the altar.' The Hebrew verb is literally 'went,' used
      here of the movement of water.
    reason: lexical_alternative
  - marker: b
    text: Or 'channel' or 'ditch' for 'trench.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: ran
  alternatives:
  - went
  - flowed
  lexicon: HALOT
  rationale: Though the verb is literally 'went,' with 'the water' as subject in this
    context it idiomatically describes movement of water. 'Ran' is natural modern
    English and preserves the vivid sense better than the overly wooden 'went,' while
    remaining closer than a freer paraphrase.
- source_word: הַמַּיִם
  chosen: the water
  lexicon: HALOT
  rationale: Standard rendering of the Hebrew plural-form noun for water as an English
    mass noun singular.
- source_word: סָבִיב לַמִּזְבֵּחַ
  chosen: all around the altar
  alternatives:
  - around the altar
  - surrounding the altar
  lexicon: HALOT
  rationale: סָבִיב denotes surrounding or encircling space. 'All around the altar'
    communicates the complete encirclement implied by the scene.
- source_word: וְגַם
  chosen: and it also
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: Adds emphasis to the second clause. 'It' is supplied in English because
    the Hebrew verb's subject is implicit; this makes the sentence grammatical and
    clear.
- source_word: אֶת־הַתְּעָלָה
  chosen: the trench
  alternatives:
  - the channel
  - the ditch
  lexicon: HALOT
  rationale: In the Elijah altar context, תְּעָלָה refers to the trench/channel dug
    around the altar. 'Trench' is the most natural and specific English choice here.
- source_word: מִלֵּא
  chosen: filled
  alternatives:
  - made full
  lexicon: HALOT
  rationale: Direct and standard rendering of the verb 'to fill.'
- source_word: מָיִם
  chosen: with water
  alternatives:
  - water
  lexicon: HALOT
  rationale: Although Hebrew can say literally 'filled ... water,' idiomatic English
    requires 'filled ... with water.' This is a necessary adjustment for natural syntax,
    not an interpretive expansion.
