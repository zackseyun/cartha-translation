id: 1KI.18.13
reference: 1 Kings 18:13
source:
  edition: WLC
  text: הֲ/לֹֽא הֻגַּ֤ד לַֽ/אדֹנִ/י֙ אֵ֣ת אֲשֶׁר עָשִׂ֔יתִי בַּ/הֲרֹ֣ג אִיזֶ֔בֶל אֵ֖ת
    נְבִיאֵ֣י יְהוָ֑ה וָ/אַחְבִּא֩ מִ/נְּבִיאֵ֨י יְהוָ֜ה מֵ֣אָה אִ֗ישׁ חֲמִשִּׁ֨ים
    חֲמִשִּׁ֥ים אִישׁ֙ בַּ/מְּעָרָ֔ה וָ/אֲכַלְכְּלֵ֖/ם לֶ֥חֶם וָ/מָֽיִם־־׃
translation:
  text: Has it not been told to my lord what I did when Jezebel was killing the prophets
    of the LORD—how I hid a hundred men from the prophets of the LORD, fifty men to
    a cave, and provided them with bread and water?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'fifty men each in a cave' or 'in two groups of fifty in caves.' The
      Hebrew expresses a distributive grouping by fifties.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Has it not
  alternatives:
  - Was it not
  - Hasn't it
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. 'Has it
    not' preserves the formal force while remaining natural English.
- source_word: הֻגַּד
  chosen: been told
  alternatives:
  - been reported
  - been made known
  lexicon: HALOT
  rationale: Passive of נגד, indicating information conveyed to someone. 'Been told'
    is idiomatic and fits Obadiah's appeal to Elijah.
- source_word: לַאדֹנִי
  chosen: to my lord
  alternatives:
  - to my master
  lexicon: HALOT
  rationale: אדֹן here is a respectful address to Elijah, not a divine title. 'My
    lord' preserves the deferential tone without implying deity.
- source_word: אֵת אֲשֶׁר עָשִׂיתִי
  chosen: what I did
  alternatives:
  - that which I did
  - what I have done
  lexicon: HALOT
  rationale: A natural rendering of the object marker plus relative clause. Simple
    past fits the narrative recounting.
- source_word: בַּהֲרֹג אִיזֶבֶל
  chosen: when Jezebel was killing
  alternatives:
  - when Jezebel killed
  - at Jezebel's killing
  lexicon: HALOT
  rationale: The preposition with infinitive construct gives a temporal sense, 'when/in
    the time of killing.' The progressive 'was killing' conveys the ongoing circumstance
    during which Obadiah acted.
- source_word: נְבִיאֵי יְהוָה
  chosen: the prophets of the LORD
  alternatives:
  - the LORD's prophets
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. YHWH follows the project's default
    as 'the LORD'.
- source_word: וָאַחְבִּא
  chosen: how I hid
  alternatives:
  - and I hid
  - how I concealed
  lexicon: HALOT
  rationale: Within indirect discourse after 'what I did,' English naturally supplies
    'how' to introduce the content of his action. 'Hid' is the straightforward sense.
- source_word: מִנְּבִיאֵי יְהוָה מֵאָה אִישׁ
  chosen: a hundred men from the prophets of the LORD
  alternatives:
  - a hundred of the prophets of the LORD
  - one hundred men of the prophets of the LORD
  lexicon: HALOT
  rationale: 'The מן construction is partitive: Obadiah hid one hundred from among
    the prophets. ''Men'' reflects אִישׁ explicitly and preserves the Hebrew counting
    expression.'
- source_word: חֲמִשִּׁים חֲמִשִּׁים אִישׁ
  chosen: fifty men to a cave
  alternatives:
  - fifty by fifty in a cave
  - fifty men each in a cave
  - in two groups of fifty
  lexicon: HALOT
  rationale: The distributive repetition indicates grouping by fifties. Given the
    singular 'the cave' in Hebrew can function generically/distributively in this
    construction, 'fifty men to a cave' preserves the distribution concisely. An alternative
    is preserved in a footnote because English readers may expect explicit 'each'
    or plural 'caves'.
- source_word: בַּמְּעָרָה
  chosen: to a cave
  alternatives:
  - in a cave
  - in the cave
  - in caves
  lexicon: HALOT
  rationale: With the distributive phrase, English 'to a cave' communicates assignment
    of each group. A more literal rendering would be 'in the cave,' but that is less
    clear in English and may misleadingly suggest a single cave for all one hundred.
- source_word: וָאֲכַלְכְּלֵם
  chosen: provided them with
  alternatives:
  - sustained them with
  - fed them with
  - supported them with
  lexicon: HALOT
  rationale: The verb means to sustain or provide for. 'Provided them with' is natural
    modern English and prepares for the explicit objects 'bread and water.'
- source_word: לֶחֶם וָמָיִם
  chosen: bread and water
  alternatives:
  - food and water
  lexicon: HALOT
  rationale: The Hebrew names the concrete provisions. 'Bread and water' preserves
    the text's simplicity and austerity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
