id: 1KI.18.46
reference: 1 Kings 18:46
source:
  edition: WLC
  text: וְ/יַד יְהוָ֗ה הָֽיְתָה֙ אֶל אֵ֣לִיָּ֔הוּ וַ/יְשַׁנֵּ֖ס מָתְנָ֑י/ו וַ/יָּ֨רָץ֙ לִ/פְנֵ֣י אַחְאָ֔ב עַד בֹּאֲ/כָ֖ה יִזְרְעֶֽאלָ/ה־־־׃
translation:
  text: And the hand of Yahweh was on Elijah, and he tucked up his loins and ran ahead of Ahab as far as the entrance to Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the hand of the LORD came upon Elijah.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he girded up his loins,' that is, he gathered up his garment for running.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: וְיָד יְהוָה הָיְתָה אֶל
  chosen: the hand of the LORD was on
  alternatives:
  - the hand of the LORD came upon
  - the power of the LORD was upon
  lexicon: HALOT
  rationale: The idiom denotes divine empowerment or influence. 'Was on' is a natural English rendering that stays close to the Hebrew while avoiding over-interpretation. 'Came upon' is possible, but the Hebrew verb is simply 'was.'
- source_word: וַיְשַׁנֵּס
  chosen: he tucked up
  alternatives:
  - he girded up
  - he gathered up
  lexicon: HALOT
  rationale: The verb refers to drawing up garments for swift movement. 'Tucked up' communicates the action clearly in modern English; 'girded up' is more traditional but less accessible.
- source_word: מָתְנָיו
  chosen: his loins
  alternatives:
  - his waist
  - the folds of his garment
  lexicon: HALOT
  rationale: Literally 'his loins.' Retained because it is the direct object of the idiom for preparing to run, and it remains understandable in context. A more interpretive rendering would shift from body part to clothing.
- source_word: וַיָּרָץ לִפְנֵי
  chosen: ran ahead of
  alternatives:
  - ran before
  - ran in front of
  lexicon: HALOT
  rationale: The phrase indicates running in front of Ahab. 'Ran ahead of' is idiomatic modern English and preserves the spatial sense without implying ceremonial service more strongly than the text itself states.
- source_word: עַד בֹּאֲכָה
  chosen: as far as the entrance to
  alternatives:
  - until you come to
  - up to the approach to
  lexicon: HALOT
  rationale: In this construction with a place name, the expression means the point of approach or entrance to a location. 'As far as the entrance to' fits the narrative context better than the more literal but awkward 'until your coming to.'
- source_word: יִזְרְעֶאלָה
  chosen: Jezreel
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
