id: 1KI.4.13
reference: 1 Kings 4:13
source:
  edition: WLC
  text: בֶּן גֶּ֖בֶר בְּ/רָמֹ֣ת גִּלְעָ֑ד ל֡/וֹ חַוֺּת֩ יָאִ֨יר בֶּן מְנַשֶּׁ֜ה אֲשֶׁ֣ר
    בַּ/גִּלְעָ֗ד ל֚/וֹ חֶ֤בֶל אַרְגֹּב֙ אֲשֶׁ֣ר בַּ/בָּשָׁ֔ן שִׁשִּׁים֙ עָרִ֣ים גְּדֹל֔וֹת
    חוֹמָ֖ה וּ/בְרִ֥יחַ נְחֹֽשֶׁת־־׃ס
translation:
  text: 'Ben-geber, in Ramoth-gilead—to him belonged the villages of Jair son of Manasseh,
    which are in Gilead; to him belonged the region of Argob, which is in Bashan:
    sixty large cities with walls and bronze bars.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent-settlements of Jair' or, by transliteration, 'Havvoth-jair.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the district/territory of Argob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן גֶּבֶר
  chosen: Ben-geber
  alternatives:
  - the son of Geber
  lexicon: HALOT
  rationale: In this administrative list, the expression functions as a proper name/title
    for an official rather than a generic filial description. Transliteration preserves
    the name-like usage and matches the pattern of the surrounding district governors.
- source_word: בְּרָמֹת גִּלְעָד
  chosen: in Ramoth-gilead
  alternatives:
  - at Ramoth-gilead
  - in Ramoth of Gilead
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'Ramoth-gilead' is the standard English
    form of the place name and reads naturally in English.
- source_word: לֹו
  chosen: to him belonged
  alternatives:
  - he had
  - his district included
  lexicon: HALOT
  rationale: The repeated לֹו marks possession/assignment within the administrative
    list. 'To him belonged' preserves the formal sense of allotted jurisdiction better
    than the looser 'he had.'
- source_word: חַוֺּת יָאִיר
  chosen: the villages of Jair
  alternatives:
  - the tent-settlements of Jair
  - the Havvoth-jair of Jair
  lexicon: HALOT
  rationale: The term refers to Jair's settlements/towns known from other OT passages.
    'Villages' is the clearest natural English rendering; a more literal transliteration
    would be opaque for modern readers.
- source_word: אֲשֶׁר בַּגִּלְעָד
  chosen: which are in Gilead
  alternatives:
  - that were in Gilead
  lexicon: HALOT
  rationale: The relative clause identifies the location of Jair's villages. Present
    tense is acceptable in English for a geographic description within a list.
- source_word: חֶבֶל אַרְגֹּב
  chosen: the region of Argob
  alternatives:
  - the district of Argob
  - the territory of Argob
  lexicon: HALOT
  rationale: חֶבֶל can denote a measured tract, district, or region. 'Region' is natural
    modern English and fits a territorial administrative context.
- source_word: אֲשֶׁר בַּבָּשָׁן
  chosen: which is in Bashan
  alternatives:
  - that was in Bashan
  lexicon: HALOT
  rationale: This clause locates Argob geographically. 'Which is in Bashan' is straightforward
    and idiomatic.
- source_word: שִׁשִּׁים עָרִים גְּדֹלוֹת
  chosen: sixty large cities
  alternatives:
  - sixty great cities
  lexicon: HALOT
  rationale: גְּדֹלוֹת can mean 'great' or 'large.' Here it likely emphasizes size/importance
    of fortified urban centers; 'large' is more concrete in contemporary English.
- source_word: חוֹמָה
  chosen: with walls
  alternatives:
  - fortified with a wall
  lexicon: HALOT
  rationale: Used appositionally with the following phrase to describe the cities'
    fortification. Pluralizing in English ('with walls') matches the collective reference
    to sixty cities.
- source_word: וּבְרִיחַ נְחֹשֶׁת
  chosen: and bronze bars
  alternatives:
  - and bronze gates
  - and bars of bronze
  lexicon: HALOT
  rationale: בְרִיחַ denotes a bar/bolt, not a gate. 'Bronze bars' preserves the concrete
    image of fortified city defenses.
