theological_decisions:
- issue: Meaning of כֹּהֵן in a royal-administrative context
  chosen_reading: Rendered as 'priest' in the main text, with possible 'chief minister/royal
    adviser' nuance preserved in a footnote.
  alternative_readings:
  - chief minister
  - royal adviser
  rationale: The Hebrew word's default sense is 'priest,' and no doctrinal issue requires
    reinterpretation here. Because the context is a court list and the term can sometimes
    extend to high royal office, the alternative is worth preserving in a footnote
    rather than importing an interpretive paraphrase into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
