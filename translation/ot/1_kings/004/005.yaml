id: 1KI.4.5
reference: 1 Kings 4:5
source:
  edition: WLC
  text: וַ/עֲזַרְיָ֥הוּ בֶן נָתָ֖ן עַל הַ/נִּצָּבִ֑ים וְ/זָב֧וּד בֶּן נָתָ֛ן כֹּהֵ֖ן
    רֵעֶ֥ה הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Azariahu son of Nathan was over the governors, and Zabud son of Nathan was
    priest, the king’s friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'chief minister' or 'royal adviser' for 'priest' in this court
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזַרְיָהוּ
  chosen: Azariahu
  alternatives:
  - Azariah
  rationale: Personal names are transliterated rather than translated. 'Azariahu'
    more closely reflects the Hebrew form ending in -yahu, though 'Azariah' is the
    more familiar anglicized form.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical/relational rendering in administrative lists.
- source_word: עַל
  chosen: was over
  alternatives:
  - was in charge of
  - over
  lexicon: HALOT
  rationale: In this administrative context, עַל marks authority or supervision. 'Was
    over' is concise and natural English while preserving the formal sense.
- source_word: הַנִּצָּבִים
  chosen: the governors
  alternatives:
  - the deputies
  - the officials
  - the prefects
  lexicon: HALOT
  rationale: In the Solomonic administrative context, נִצָּבִים refers to appointed
    officers set over districts or functions. 'Governors' best communicates regional
    administrative oversight in readable English.
- source_word: זָבוּד
  chosen: Zabud
  rationale: Personal name transliterated by standard convention.
- source_word: כֹּהֵן
  chosen: priest
  alternatives:
  - chief minister
  - royal adviser
  lexicon: HALOT
  rationale: The plain lexical sense of כֹּהֵן is 'priest.' Although in some royal
    contexts it may denote a high official or minister, the translation should not
    move beyond the source's wording without necessity. The possible court-official
    nuance is preserved in a footnote rather than replacing the main-text sense.
- source_word: רֵעֶה הַמֶּלֶךְ
  chosen: the king’s friend
  alternatives:
  - friend of the king
  - royal companion
  lexicon: HALOT
  rationale: This construct phrase denotes a close royal confidant or companion. 'The
    king’s friend' is both literal and idiomatic in English.
