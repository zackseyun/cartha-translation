id: 1KI.4.2
reference: 1 Kings 4:2
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה הַ/שָּׂרִ֖ים אֲשֶׁר ל֑/וֹ עֲזַרְיָ֥הוּ בֶן צָד֖וֹק הַ/כֹּהֵֽן־־׃ס
translation:
  text: 'And these were the officials who were his: Azariah son of Zadok, the priest;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princes' or 'the officers'; the Hebrew term can denote high-ranking
      rulers or administrators.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Azariah son of Zadok, the priest.' Some understand 'the priest'
      as identifying Zadok; others take it as Azariah's title. The text does not explicitly
      say 'high priest.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - Now these were
  - These were
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the following list. 'And
    these were' preserves the narrative linkage and list-introducing function in natural
    English.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the chief men
  - the officers
  lexicon: HALOT
  rationale: שָׂרִים can denote rulers, princes, or high officials. In this administrative
    context listing royal functionaries, 'officials' best conveys governmental office
    without implying hereditary nobility.
- source_word: אֲשֶׁר לוֹ
  chosen: who were his
  alternatives:
  - who belonged to him
  - who served him
  - who were over him
  lexicon: HALOT
  rationale: The relative clause with לּוֹ identifies these officials as belonging
    to Solomon's administration. 'Who were his' is concise and reflects possession/association
    without overinterpreting their exact function.
- source_word: עֲזַרְיָהוּ
  chosen: Azariah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶן צָדוֹק
  chosen: son of Zadok
  lexicon: HALOT
  rationale: Standard filial construction; 'son of' is the normal transparent rendering.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the chief priest
  lexicon: HALOT
  rationale: The Hebrew is singular with article, literally 'the priest.' Although
    context raises the question whether this apposition modifies Zadok or Azariah
    and whether it implies high-priestly status, the text itself simply says 'the
    priest,' so the translation preserves that wording without expansion.
