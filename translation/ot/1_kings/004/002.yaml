theological_decisions:
- issue: Referent and force of 'the priest' in the appositional phrase
  chosen_reading: Render straightforwardly as 'Azariah son of Zadok, the priest' without
    resolving whether 'the priest' functions as a formal title equivalent to 'high
    priest' or whether it appositionally identifies Zadok.
  alternative_readings:
  - Azariah son of Zadok the priest
  - Azariah son of Zadok, the chief priest
  rationale: The Hebrew permits the appositional identification but does not explicitly
    say 'high priest.' To avoid importing institutional or doctrinal claims beyond
    the text, the translation keeps the plain wording and punctuation that naturally
    links 'the priest' to the named lineage while not expanding the title.
  doctrine_reference: Translation philosophy §§1, 3, 5
