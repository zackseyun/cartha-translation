id: 1KI.4.6
reference: 1 Kings 4:6
source:
  edition: WLC
  text: וַ/אֲחִישָׁ֖ר עַל הַ/בָּ֑יִת וַ/אֲדֹנִירָ֥ם בֶּן עַבְדָּ֖א עַל הַ/מַּֽס־־־׃ס
translation:
  text: and Ahishar was over the household, and Adoniram son of Abda was over the
    forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was over the palace' / 'was in charge of the house.' The Hebrew literally
      says 'over the house,' a court title for oversight of the royal household.
    reason: lexical_alternative
  - marker: b
    text: Or 'was over the labor levy.' The Hebrew term refers to compulsory state
      labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲחִישָׁר
  chosen: and Ahishar
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names. The prefixed conjunction is carried by 'and'.
- source_word: עַל הַ/בָּיִת
  chosen: was over the household
  alternatives:
  - was over the palace
  - was in charge of the house
  lexicon: HALOT
  rationale: The preposition עַל in administrative lists commonly indicates oversight
    or authority, so 'was over' is idiomatic and sufficiently formal. הַבַּיִת literally
    means 'the house,' but in royal court context it refers to the royal household/palace
    administration. 'Household' best captures the office without over-specifying the
    physical building.
- source_word: וַ/אֲדֹנִירָם
  chosen: and Adoniram
  rationale: Proper personal name; transliterated. The conjunction is represented
    by 'and'.
- source_word: בֶּן עַבְדָּא
  chosen: son of Abda
  rationale: Standard genealogical expression identifying the official by patronymic.
- source_word: עַל הַ/מַּס
  chosen: was over the forced labor
  alternatives:
  - was over the labor levy
  - was over the corvée
  lexicon: HALOT
  rationale: מַס in royal administrative context denotes compulsory labor service
    or levy rather than merely taxation. 'Forced labor' is the clearest modern English
    rendering; 'labor levy' is more formal but less immediately clear, and 'corvée'
    is accurate but too technical for the target audience.
