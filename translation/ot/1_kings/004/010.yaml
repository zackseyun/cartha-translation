id: 1KI.4.10
reference: 1 Kings 4:10
source:
  edition: WLC
  text: בֶּן חֶ֖סֶד בָּֽ/אֲרֻבּ֑וֹת ל֥/וֹ שֹׂכֹ֖ה וְ/כָל אֶ֥רֶץ חֵֽפֶר־־׃ס
translation:
  text: Ben-hesed, in Arubboth; Socoh and all the land of Hepher belonged to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the son of Hesed, in Arubboth; to him belonged Socoh
      and all the land of Hepher.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן חֶסֶד
  chosen: Ben-hesed
  alternatives:
  - the son of Hesed
  lexicon: HALOT
  rationale: In this administrative list, the expression functions as a personal name
    rather than a descriptive phrase. Transliteration preserves the onomastic form
    used throughout the passage for Solomon's officials.
- source_word: בָּאֲרֻבּוֹת
  chosen: in Arubboth
  alternatives:
  - in Aruboth
  lexicon: HALOT
  rationale: The prefixed ב is locative ('in'). The place name is transliterated rather
    than translated, following the policy to transliterate names.
- source_word: לוֹ
  chosen: belonged to him
  alternatives:
  - was his
  - he had
  lexicon: HALOT
  rationale: The pronominal phrase marks territorial assignment within the district
    list. 'Belonged to him' makes the administrative sense explicit in natural English
    without adding beyond the context.
- source_word: שֹׂכֹה
  chosen: Socoh
  alternatives:
  - Sokoh
  - Soco
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention. Included as
    part of the territory under this official.
- source_word: וְכָל אֶרֶץ חֵפֶר
  chosen: and all the land of Hepher
  alternatives:
  - and the whole land of Hepher
  - and all the territory of Hepher
  lexicon: HALOT
  rationale: אֶרֶץ here denotes land/territory rather than the earth. 'Land of Hepher'
    is a natural rendering for a named region; 'all' preserves כָל.
