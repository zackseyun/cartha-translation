id: 1KI.4.14
reference: 1 Kings 4:14
source:
  edition: WLC
  text: אֲחִֽינָדָ֥ב בֶּן עִדֹּ֖א מַחֲנָֽיְמָ/ה־׃
translation:
  text: Ahinadab son of Iddo, in Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a directional ending on 'Mahanaim,' literally 'toward Mahanaim.'
      In this administrative context, the sense is likely the district centered in
      or at Mahanaim.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִינָדָב
  chosen: Ahinadab
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard construct usage indicating immediate filiation. 'Son of' is
    the natural English equivalent in genealogical/administrative lists.
- source_word: עִדֹּא
  chosen: Iddo
  rationale: Proper personal name; transliterated in standard English form.
- source_word: מַחֲנָיְמָה
  chosen: in Mahanaim
  alternatives:
  - to Mahanaim
  - Mahanaim-ward
  lexicon: HALOT
  rationale: The directional he on the place name can mark motion toward a place,
    but in this administrative list the implied sense is territorial assignment or
    location of jurisdiction. English idiom is best served by 'in Mahanaim,' matching
    the elliptical style of the surrounding district-governor notices.
