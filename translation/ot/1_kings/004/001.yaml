theological_decisions:
- issue: Rendering the duplicated מלך construction
  chosen_reading: 'Retain the emphasis by translating both occurrences: ''King Solomon
    was king over all Israel.'''
  alternative_readings:
  - Solomon was king over all Israel
  - King Solomon reigned over all Israel
  rationale: The Hebrew intentionally repeats מלך, first as title/apposition and then
    as predicate. Preserving both reflects the source text's emphasis on Solomon's
    established rule over the united nation without adding interpretive nuance.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
