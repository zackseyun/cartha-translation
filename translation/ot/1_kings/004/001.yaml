id: 1KI.4.1
reference: 1 Kings 4:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה מֶ֖לֶךְ עַל כָּל יִשְׂרָאֵֽל־־׃ס
translation:
  text: Now King Solomon was king over all Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as a narrative/discourse transition
    introducing a new section rather than emphasizing the event of 'happening.' 'Now'
    gives natural modern English while preserving the transitional force; 'was' carries
    the predication.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'The definite noun before the proper name functions appositionally: ''King
    Solomon.'' English idiom normally omits the article in such titular constructions.'
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
- source_word: מֶלֶךְ
  chosen: was king
  alternatives:
  - reigned
  lexicon: HALOT
  rationale: The second occurrence of מלך is predicative, stating Solomon's royal
    status over Israel. 'Was king' preserves the noun-based Hebrew structure more
    closely than the verbal alternative 'reigned,' while remaining natural English.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  lexicon: HALOT
  rationale: In royal/governing contexts על marks authority over a people; 'over'
    is the natural English equivalent.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Straightforward quantifier indicating the entirety of Israel under Solomon's
    kingship.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard English form of the national name.
