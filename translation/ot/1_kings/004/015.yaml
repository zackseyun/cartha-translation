id: 1KI.4.15
reference: 1 Kings 4:15
source:
  edition: WLC
  text: אֲחִימַ֖עַץ בְּ/נַפְתָּלִ֑י גַּם ה֗וּא לָקַ֛ח אֶת בָּשְׂמַ֥ת בַּת שְׁלֹמֹ֖ה
    לְ/אִשָּֽׁה־־־׃
translation:
  text: Ahimaaz, in Naphtali; he too took Basemath daughter of Solomon as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over Naphtali' or 'for Naphtali'; the Hebrew preposition can mark the
      territory assigned to Ahimaaz in this list of district officials.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'took Basemath daughter of Solomon as a wife,' a standard idiom meaning
      he married her.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִימַעַץ
  chosen: Ahimaaz
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    per project philosophy to transliterate names rather than translate them.
- source_word: בְּנַפְתָּלִי
  chosen: in Naphtali
  alternatives:
  - over Naphtali
  - for Naphtali
  lexicon: HALOT
  rationale: The preposition בְ with a tribal/geographical name in this administrative
    list indicates the district or territory of the official's jurisdiction. 'In Naphtali'
    is a natural English rendering that preserves the locative sense without over-interpreting.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - also he
  - he also
  lexicon: HALOT
  rationale: The combination adds Ahimaaz to the preceding pattern of officials who
    married Solomon's daughters. 'He too' is idiomatic and preserves the additive
    emphasis.
- source_word: לָקַח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'took.' In the idiom 'took ... as a wife'
    it denotes marriage. Retaining 'took' with the complement 'as a wife' preserves
    the Hebrew expression while remaining clear in English.
- source_word: בָּשְׂמַת
  chosen: Basemath
  alternatives:
  - Basmath
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Basemath' reflects a common English
    convention for this Hebrew name.
- source_word: בַּת שְׁלֹמֹה
  chosen: daughter of Solomon
  alternatives:
  - Solomon's daughter
  lexicon: HALOT
  rationale: Construct chain straightforwardly indicates filial relationship. 'Daughter
    of Solomon' stays close to the Hebrew while remaining natural English.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: Standard Hebrew marriage idiom with ל plus 'wife.' 'As a wife' is the
    most direct and idiomatic complement to 'took' in English.
