id: 1KI.4.18
reference: 1 Kings 4:18
source:
  edition: WLC
  text: שִׁמְעִ֥י בֶן אֵלָ֖א בְּ/בִנְיָמִֽן־׃ס
translation:
  text: Shimei son of Ela, in Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "over Benjamin" or "for Benjamin," reflecting the administrative sense
      of the preposition in this list of officials.
    reason: lexical_alternative
  - marker: b
    text: '"Ela" is also commonly spelled "Elah" in English translations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעִי
  chosen: Shimei
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy to transliterate names.
- source_word: בֶן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural
    concise English equivalent in administrative lists like this one.
- source_word: אֵלָא
  chosen: Ela
  alternatives:
  - Elah
  lexicon: HALOT
  rationale: Proper personal name. Rendered by transliteration. 'Elah' is a common
    English form, but 'Ela' more directly reflects the consonantal form here without
    importing a fixed traditional spelling.
- source_word: בְּ/בִנְיָמִן
  chosen: in Benjamin
  alternatives:
  - over Benjamin
  - for Benjamin
  lexicon: HALOT
  rationale: The preposition בְ commonly means 'in' or 'within.' In this list of district
    officials, it indicates the territory associated with the official. 'In Benjamin'
    is formally close and idiomatic, while 'over Benjamin' is interpretive and better
    left as an alternative sense.
