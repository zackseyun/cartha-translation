id: 1KI.4.3
reference: 1 Kings 4:3
source:
  edition: WLC
  text: אֱלִיחֹ֧רֶף וַ/אֲחִיָּ֛ה בְּנֵ֥י שִׁישָׁ֖א סֹפְרִ֑ים יְהוֹשָׁפָ֥ט בֶּן אֲחִיל֖וּד
    הַ/מַּזְכִּֽיר־׃
translation:
  text: Elihoreph and Ahijah, the sons of Shisha, were secretaries; Jehoshaphat the
    son of Ahilud was the recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Shisha.'' A parallel passage (2 Sam 8:17) has a related
      name form often rendered ''Shavsha.'''
    reason: alternative_reading
  - marker: b
    text: Or 'scribes' for 'secretaries'; the Hebrew term refers to royal writing
      officials.
    reason: lexical_alternative
  - marker: c
    text: Or 'the chronicler' or 'the remembrancer' for 'the recorder,' referring
      to a court official who maintained records and reported matters to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיחֹרֶף
  chosen: Elihoreph
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the philosophy to transliterate names.
- source_word: וַאֲחִיָּה
  chosen: and Ahijah
  alternatives:
  - and Ahiah
  rationale: Proper personal name with prefixed conjunction. 'Ahijah' is the standard
    English transliteration; 'Ahiah' is a possible spelling but less common.
- source_word: בְּנֵי שִׁישָׁא
  chosen: the sons of Shisha
  alternatives:
  - sons of Shavsha
  lexicon: HALOT
  rationale: Construct phrase identifying family relation. 'Sons of Shisha' is the
    straightforward rendering of the MT. Because the parallel in 2 Samuel 8:17 has
    a related but differently vocalized/spelled name, an alternative spelling is worth
    preserving in a footnote, but the present verse should follow its own Hebrew form.
- source_word: סֹפְרִים
  chosen: secretaries
  alternatives:
  - scribes
  - recorders
  lexicon: HALOT
  rationale: In this administrative list, the term denotes royal officials responsible
    for writing/documentation. 'Secretaries' communicates the court-office sense in
    clear modern English better than the more ambiguous 'scribes,' while avoiding
    confusion with the distinct office named later in the verse.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Proper personal name; transliterated by standard convention.
- source_word: בֶּן אֲחִילוּד
  chosen: the son of Ahilud
  rationale: Standard filial designation; rendered formally and naturally in English.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the remembrancer
  - the chronicler
  lexicon: HALOT
  rationale: This title refers to a royal official who kept records and brought matters
    to the king's attention. 'Recorder' is the established and still intelligible
    rendering, and it distinguishes the role from 'secretaries' earlier in the verse.
