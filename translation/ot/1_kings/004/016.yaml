id: 1KI.4.16
reference: 1 Kings 4:16
source:
  edition: WLC
  text: בַּֽעֲנָא֙ בֶּן חוּשָׁ֔י בְּ/אָשֵׁ֖ר וּ/בְעָלֽוֹת־׃ס
translation:
  text: Baana son of Hushai, in Asher and Bealoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “and Aloth.” The final place name is textually and geographically
      uncertain in translation tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּֽעֲנָא
  chosen: Baana
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard construct expression indicating filiation; 'son of' is the natural
    English equivalent in administrative lists like this.
- source_word: חוּשָׁי
  chosen: Hushai
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: בְּ/אָשֵׁר
  chosen: in Asher
  alternatives:
  - over Asher
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' In this list of Solomon's district
    officers, the phrase identifies the territory assigned to the official. 'In Asher'
    is formally closer to the Hebrew while still conveying administrative jurisdiction;
    'over Asher' is interpretive and smoother, but less literal.
- source_word: וּ/בְעָלֽוֹת
  chosen: and Bealoth
  alternatives:
  - and Aloth
  - and in Bealoth
  lexicon: HALOT
  rationale: The conjunction ו joins a second place name. The form is best taken as
    the toponym 'Bealoth' (or orthographic variant 'Aloth' in some traditions/translations).
    Because the Hebrew lacks a repeated preposition before this second term, 'and
    Bealoth' preserves the concise list style. The place identification is somewhat
    uncertain, so a lexical alternative is worth preserving in a footnote.
