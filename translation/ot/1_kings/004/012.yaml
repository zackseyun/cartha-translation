id: 1KI.4.12
reference: 1 Kings 4:12
source:
  edition: WLC
  text: בַּֽעֲנָא֙ בֶּן אֲחִיל֔וּד תַּעְנַ֖ךְ וּ/מְגִדּ֑וֹ וְ/כָל בֵּ֣ית שְׁאָ֡ן אֲשֶׁר֩
    אֵ֨צֶל צָרְתַ֜נָ/ה מִ/תַּ֣חַת לְ/יִזְרְעֶ֗אל מִ/בֵּ֤ית שְׁאָן֙ עַ֚ד אָבֵ֣ל מְחוֹלָ֔ה
    עַ֖ד מֵ/עֵ֥בֶר לְ/יָקְמֳעָֽם־־׃ס
translation:
  text: 'Baana son of Ahilud: Taanach and Megiddo, and all Beth-shean, which is beside
    Zarethan below Jezreel, from Beth-shean to Abel-meholah, as far as beyond Jokmeam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as the region beyond Jokmeam.' The Hebrew boundary expression
      is terse and somewhat difficult, so a slightly smoother geographical rendering
      is possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּֽעֲנָא֙ בֶּן אֲחִיל֔וּד
  chosen: Baana son of Ahilud
  alternatives:
  - Baanah son of Ahilud
  rationale: Personal names are transliterated rather than translated. English convention
    varies between 'Baana' and 'Baanah'; 'Baana' keeps the Hebrew form straightforwardly.
- source_word: תַּעְנַ֖ךְ
  chosen: Taanach
  alternatives:
  - Taanac
  - Ta'anach
  rationale: Place name transliterated by standard convention.
- source_word: וּ/מְגִדּ֑וֹ
  chosen: and Megiddo
  rationale: Simple conjunction plus place name; transliterated in standard English
    form.
- source_word: וְ/כָל בֵּ֣ית שְׁאָ֡ן
  chosen: and all Beth-shean
  alternatives:
  - and all of Beth-shean
  - and all the region of Beth-shean
  lexicon: HALOT
  rationale: כָל with a place name here denotes the whole locality/administrative
    area associated with Beth-shean. 'All Beth-shean' is concise and natural while
    preserving the territorial sense.
- source_word: אֲשֶׁר֩ אֵ֨צֶל צָרְתַ֜נָ/ה
  chosen: which is beside Zarethan
  alternatives:
  - which is near Zarethan
  - which is next to Zarethan
  lexicon: HALOT
  rationale: אֵצֶל commonly means 'beside, near.' 'Beside' preserves the spatial relation
    without over-specifying distance.
- source_word: מִ/תַּ֣חַת לְ/יִזְרְעֶ֗אל
  chosen: below Jezreel
  alternatives:
  - beneath Jezreel
  - south of Jezreel
  lexicon: HALOT
  rationale: The idiom מִתַּחַת לְ can indicate a lower geographical position. 'Below
    Jezreel' preserves the topographical wording better than the more interpretive
    'south of Jezreel.'
- source_word: מִ/בֵּ֤ית שְׁאָן֙ עַ֚ד אָבֵ֣ל מְחוֹלָ֔ה
  chosen: from Beth-shean to Abel-meholah
  alternatives:
  - from Beth-shean as far as Abel-meholah
  rationale: Marks the extent of the district. Abel-meholah is transliterated as a
    place name.
- source_word: עַ֖ד מֵ/עֵ֥בֶר לְ/יָקְמֳעָֽם
  chosen: as far as beyond Jokmeam
  alternatives:
  - as far as the region beyond Jokmeam
  - to the other side of Jokmeam
  lexicon: HALOT
  rationale: מֵעֵבֶר literally means 'from/beyond the other side of.' The phrase is
    somewhat awkward in English, but 'as far as beyond Jokmeam' best preserves the
    Hebrew boundary formula without paraphrastic expansion. A smoother alternative
    is preserved in a footnote.
