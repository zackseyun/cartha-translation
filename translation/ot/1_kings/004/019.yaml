id: 1KI.4.19
reference: 1 Kings 4:19
source:
  edition: WLC
  text: גֶּ֥בֶר בֶּן אֻרִ֖י בְּ/אֶ֣רֶץ גִּלְעָ֑ד אֶ֜רֶץ סִיח֣וֹן מֶ֣לֶךְ הָ/אֱמֹרִ֗י
    וְ/עֹג֙ מֶ֣לֶךְ הַ/בָּשָׁ֔ן וּ/נְצִ֥יב אֶחָ֖ד אֲשֶׁ֥ר בָּ/אָֽרֶץ־׀׃
translation:
  text: Geber son of Uri, in the land of Gilead, the land of Sihon king of the Amorites
    and of Og king of Bashan; and there was one governor who was in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who was over the land.' The Hebrew literally reads 'who was in the
      land,' but some take the phrase in an administrative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  chosen: Geber
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the philosophy of transliterating names.
- source_word: בֶּן אֻרִי
  chosen: son of Uri
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of' is the natural and sufficiently
    formal English rendering.
- source_word: בְּאֶרֶץ גִּלְעָד
  chosen: in the land of Gilead
  alternatives:
  - in Gilead
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land' because the verse then repeats אֶרֶץ
    appositionally; preserving the noun helps reflect the Hebrew structure.
- source_word: אֶרֶץ סִיחוֹן מֶלֶךְ הָאֱמֹרִי וְעֹג מֶלֶךְ הַבָּשָׁן
  chosen: the land of Sihon king of the Amorites and of Og king of Bashan
  alternatives:
  - the country of Sihon ... and Og ...
  lexicon: HALOT
  rationale: This appositional phrase further identifies Gilead by reference to the
    former territories of these kings. 'Land' is kept for consistency with אֶרֶץ and
    to preserve the territorial sense.
- source_word: נְצִיב
  chosen: governor
  alternatives:
  - deputy
  - district governor
  - official
  lexicon: HALOT
  rationale: In the administrative context of 1 Kings 4, נְצִיב refers to an appointed
    regional official. 'Governor' is clear modern English and fits the broader chapter.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: The numeral is retained because it is textually present and likely emphasizes
    that this region had one governor, unlike the preceding list of district officers.
- source_word: אֲשֶׁר בָּאָרֶץ
  chosen: who was in the land
  alternatives:
  - who was over the land
  - in the land
  lexicon: HALOT
  rationale: The Hebrew literally says 'who was in the land.' Although some understand
    an administrative sense ('over the land'), the preposition ב favors the more literal
    wording. The ambiguity is preserved rather than resolved.
