id: 1KI.4.8
reference: 1 Kings 4:8
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה שְׁמוֹתָ֔/ם בֶּן ח֖וּר בְּ/הַ֥ר אֶפְרָֽיִם־׃ס
translation:
  text: 'And these were their names: Ben-hur, in the hill country of Ephraim;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of Hur,' if taken as a patronymic rather than a personal name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these
  alternatives:
  - Now these
  - And these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the list of Solomon's officials.
    'And these' preserves the simple connective force and the deictic introduction
    without overinterpreting tense.
- source_word: שְׁמוֹתָם
  chosen: were their names
  alternatives:
  - are their names
  - their names were
  lexicon: HALOT
  rationale: Although the Hebrew is verbless ('these [are] their names'), English
    idiom in narrative commonly supplies 'were' for a past listing. This fits the
    surrounding administrative narrative while staying close to the source.
- source_word: בֶּן חוּר
  chosen: Ben-hur
  alternatives:
  - the son of Hur
  lexicon: HALOT
  rationale: Here בֶּן functions as part of a proper name in a list of district governors,
    not necessarily as an immediate patronymic statement. Following the translation
    philosophy, personal names are transliterated rather than translated.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  - in Mount Ephraim
  lexicon: HALOT
  rationale: הַר in territorial expressions often denotes hill country/highlands rather
    than a single mountain. 'Hill country of Ephraim' is natural modern English and
    accurately reflects the regional sense.
