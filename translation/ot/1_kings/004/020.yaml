id: 1KI.4.20
reference: 1 Kings 4:20
source:
  edition: WLC
  text: יְהוּדָ֤ה וְ/יִשְׂרָאֵל֙ רַבִּ֔ים כַּ/ח֥וֹל אֲשֶׁר עַל הַ/יָּ֖ם לָ/רֹ֑ב אֹכְלִ֥ים
    וְ/שֹׁתִ֖ים וּ/שְׂמֵחִֽים־־׃
translation:
  text: Judah and Israel were as numerous as the sand that is by the sea in multitude,
    eating and drinking and rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the sand on the seashore,' a common Hebrew expression for an exceedingly
      large population.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name for the southern tribal/kingdom entity; transliterated as
    a name per translation philosophy.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  lexicon: HALOT
  rationale: Proper name for the northern tribal collective here paired with Judah;
    rendered straightforwardly as a coordinate subject.
- source_word: רַבִּים
  chosen: were as numerous
  alternatives:
  - were many
  - were numerous
  lexicon: HALOT
  rationale: The adjective 'many/numerous' functions predicatively with Judah and
    Israel as the subject. English idiom prefers an explicit copular sense, supplied
    as 'were.' 'As numerous' anticipates the following comparison with sand.
- source_word: כַּחוֹל אֲשֶׁר עַל הַיָּם
  chosen: as the sand that is by the sea
  alternatives:
  - like the sand on the seashore
  - as the sand by the sea
  lexicon: HALOT
  rationale: This is a standard Hebrew simile for immense number. 'By the sea' stays
    close to עַל הַיָּם while remaining natural English. 'On the seashore' is idiomatic
    but slightly more interpretive.
- source_word: לָרֹב
  chosen: in multitude
  alternatives:
  - in great number
  - for abundance
  lexicon: HALOT
  rationale: This prepositional phrase intensifies the comparison and explains the
    respect in which they are like the sand. 'In multitude' preserves the formal sense
    without over-paraphrasing.
- source_word: אֹכְלִים וְשֹׁתִים
  chosen: eating and drinking
  alternatives:
  - they ate and drank
  lexicon: HALOT
  rationale: The participles depict ongoing or characteristic condition rather than
    a simple bounded event. Rendering them as participles preserves the descriptive
    flow of the Hebrew.
- source_word: וּשְׂמֵחִים
  chosen: and rejoicing
  alternatives:
  - and being glad
  - and happy
  lexicon: HALOT
  rationale: The adjective/participle-like form describes a state of gladness. 'Rejoicing'
    matches the verbal rhythm of the preceding participles and conveys celebratory
    well-being better than the flatter 'happy'.
