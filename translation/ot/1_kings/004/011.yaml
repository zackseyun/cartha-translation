id: 1KI.4.11
reference: 1 Kings 4:11
source:
  edition: WLC
  text: בֶּן אֲבִֽינָדָ֖ב כָּל נָ֣פַת דֹּ֑אר טָפַת֙ בַּת שְׁלֹמֹ֔ה הָ֥יְתָה לּ֖/וֹ
    לְ/אִשָּֽׁה־־־׃ס
translation:
  text: Ben-abinadab, over all the height of Dor; Taphath the daughter of Solomon
    was his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over all the district of Dor.' The Hebrew term can refer to a region
      or elevated tract.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אֲבִינָדָב
  chosen: Ben-abinadab
  alternatives:
  - the son of Abinadab
  - Ben Abinadab
  lexicon: HALOT
  rationale: Treated as a proper name in this administrative list rather than a descriptive
    phrase. Transliteration preserves the Hebrew name in keeping with the policy to
    transliterate personal names.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard sense of totality; here it modifies the following territorial
    expression.
- source_word: נָפַת
  chosen: height
  alternatives:
  - district
  - region
  - elevation
  lexicon: HALOT
  rationale: The noun can denote an elevated tract or district. In the phrase 'all
    the naphath of Dor,' the likely sense is the elevated region/heights associated
    with Dor. 'Height' preserves the concrete geographical nuance more closely than
    the more generic 'district,' though the latter is possible.
- source_word: דֹּאר
  chosen: Dor
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: טָפַת
  chosen: Taphath
  alternatives:
  - Tafat
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בַּת שְׁלֹמֹה
  chosen: the daughter of Solomon
  alternatives:
  - Solomon's daughter
  lexicon: HALOT
  rationale: Both are natural English equivalents. The fuller form was chosen to stay
    slightly closer to the Hebrew appositional structure while remaining readable.
- source_word: הָיְתָה לּוֹ לְאִשָּׁה
  chosen: was his wife
  alternatives:
  - became his wife
  - was for him as a wife
  lexicon: HALOT
  rationale: This idiom means that she was married to him. 'Was his wife' is idiomatic
    modern English and accurately conveys the marital relationship without wooden
    phrasing.
