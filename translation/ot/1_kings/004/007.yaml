id: 1KI.4.7
reference: 1 Kings 4:7
source:
  edition: WLC
  text: וְ/לִ/שְׁלֹמֹ֞ה שְׁנֵים עָשָׂ֤ר נִצָּבִים֙ עַל כָּל יִשְׂרָאֵ֔ל וְ/כִלְכְּל֥וּ
    אֶת הַ/מֶּ֖לֶךְ וְ/אֶת בֵּית֑/וֹ חֹ֧דֶשׁ בַּ/שָּׁנָ֛ה יִהְיֶ֥ה עַל אחד לְ/כַלְכֵּֽל־־־־־־׃ס
translation:
  text: And Solomon had twelve deputies over all Israel, and they provided for the
    king and his household; each one had to provide for one month in the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'officials,' 'governors,' or 'officers' for 'deputies.' The Hebrew term
      refers broadly to appointed administrators.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁלֹמֹה
  chosen: And Solomon had
  alternatives:
  - And for Solomon
  - Now Solomon had
  lexicon: HALOT
  rationale: The prefixed ל marks possession/dative here rather than simple direction,
    so idiomatic English expresses this as 'Solomon had.' The conjunction is retained
    as narrative linkage with 'And.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: נִצָּבִים
  chosen: deputies
  alternatives:
  - officials
  - governors
  - officers
  lexicon: HALOT
  rationale: The term denotes persons stationed or appointed in an administrative
    role. 'Deputies' fits the royal-administrative context and avoids implying provincial
    governorship too strongly, since the verse emphasizes appointed provisioners over
    Israel.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - throughout all Israel
  - in charge of all Israel
  lexicon: HALOT
  rationale: עַל with this administrative noun naturally conveys authority or assignment
    over the whole nation. 'Over all Israel' is both natural and close to the Hebrew.
- source_word: וְכִלְכְּלוּ
  chosen: they provided for
  alternatives:
  - they sustained
  - they supplied
  - they supported
  lexicon: HALOT
  rationale: The verb כלכל in this context refers to supplying provisions or maintenance.
    'Provided for' is idiomatic and suits the court-supply setting.
- source_word: אֶת הַמֶּלֶךְ וְאֶת בֵּיתוֹ
  chosen: the king and his household
  alternatives:
  - the king and his house
  lexicon: HALOT
  rationale: '''Household'' best conveys בית in the sense of the royal establishment,
    not merely the physical building.'
- source_word: חֹדֶשׁ בַּשָּׁנָה
  chosen: for one month in the year
  alternatives:
  - month by month in the year
  - a month in the year
  lexicon: HALOT
  rationale: The phrase specifies the duration of each official's annual obligation.
    English requires smoothing to make the distributive sense clear.
- source_word: יִהְיֶה עַל אֶחָד
  chosen: each one had to provide
  alternatives:
  - it was upon one
  - one was responsible
  lexicon: HALOT
  rationale: Literally, 'it would be upon one,' meaning the duty fell on each individual
    in turn. The chosen rendering makes the distributive administrative sense explicit
    in natural English.
- source_word: לְכַלְכֵּל
  chosen: to provide
  alternatives:
  - to supply
  - to sustain
  lexicon: HALOT
  rationale: Infinitive of the same provisioning verb as earlier in the verse; rendered
    consistently with the finite form.
