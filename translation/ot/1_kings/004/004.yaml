theological_decisions:
- issue: Whether כֹּהֲנִים should be rendered in a non-cultic sense such as 'chief
    ministers' because of the royal-administrative list context.
  chosen_reading: priests
  alternative_readings:
  - chief ministers
  - principal officers
  rationale: The Hebrew term's ordinary meaning is 'priests,' and both Zadok and Abiathar
    are elsewhere explicitly priestly figures. Retaining 'priests' avoids importing
    an interpretive solution not demanded by the text. The administrative setting
    does not override the lexical sense, though the broader court context makes the
    alternative worth preserving in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
