id: 1KI.4.4
reference: 1 Kings 4:4
source:
  edition: WLC
  text: וּ/בְנָיָ֥הוּ בֶן יְהוֹיָדָ֖ע עַל הַ/צָּבָ֑א וְ/צָד֥וֹק וְ/אֶבְיָתָ֖ר כֹּהֲנִֽים־־׃ס
translation:
  text: Benaiah son of Jehoiada was over the army, and Zadok and Abiathar were priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief ministers' or 'principal officers' for 'priests,' if כֹּהֲנִים
      is understood here in a broader court-administrative sense.
    reason: alternative_reading
lexical_decisions:
- source_word: עַל הַצָּבָא
  chosen: was over the army
  alternatives:
  - was in charge of the army
  - was commander over the army
  lexicon: HALOT
  rationale: The preposition עַל with an office or sphere commonly indicates authority
    or oversight. 'Was over the army' is a natural English rendering that preserves
    the administrative sense without over-specifying a military title not explicitly
    present in the Hebrew.
- source_word: הַצָּבָא
  chosen: the army
  alternatives:
  - the host
  - the military force
  lexicon: HALOT
  rationale: צָבָא here refers to the organized military forces, not a heavenly host.
    'The army' is the clearest modern equivalent.
- source_word: כֹּהֲנִים
  chosen: priests
  alternatives:
  - chief ministers
  lexicon: HALOT
  rationale: The normal and primary sense of כֹּהֲנִים is 'priests.' Although some
    have argued for a broader court-official sense in certain royal contexts, the
    lexical default should be retained here unless context clearly demands otherwise.
    Since Zadok and Abiathar are known priestly figures, 'priests' is the most textually
    grounded rendering.
- source_word: בְנָיָהוּ
  chosen: Benaiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal name transliterated by standard English convention.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated by standard English convention.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Personal name transliterated by standard English convention.
