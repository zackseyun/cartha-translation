id: 1KI.4.9
reference: 1 Kings 4:9
source:
  edition: WLC
  text: בֶּן דֶּ֛קֶר בְּ/מָקַ֥ץ וּ/בְ/שַֽׁעַלְבִ֖ים וּ/בֵ֣ית שָׁ֑מֶשׁ וְ/אֵיל֖וֹן
    בֵּ֥ית חָנָֽן־׃ס
translation:
  text: Ben-deker, in Makaz, in Shaalbim, in Beth-shemesh, and in Elon-beth-hanan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the son of Deker'; here the Hebrew naming form is preserved
      as the personal designation 'Ben-deker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן דֶּקֶר
  chosen: Ben-deker
  alternatives:
  - the son of Deker
  lexicon: HALOT
  rationale: In this administrative list, בֶּן + proper name functions as a personal
    name/designation rather than a full descriptive clause. Transliteration preserves
    the Hebrew naming form and matches the pattern of the surrounding officials' names.
- source_word: בְּ/מָקַץ
  chosen: in Makaz
  alternatives:
  - over Makaz
  lexicon: HALOT
  rationale: The preposition בְ here introduces the district/towns associated with
    this official. 'In' is the most direct locative rendering; 'over' would import
    the administrative sense from the broader context rather than from this word itself.
- source_word: וּ/בְ/שַׁעַלְבִים
  chosen: and in Shaalbim
  alternatives:
  - and in Shaalbim
  lexicon: HALOT
  rationale: The conjunction plus preposition is rendered straightforwardly. The place
    name is transliterated; 'Shaalbim' is a standard English form for שַׁעַלְבִים.
- source_word: וּ/בֵית שָׁמֶשׁ
  chosen: and in Beth-shemesh
  alternatives:
  - and in Beth Shemesh
  - and in House of the Sun
  lexicon: HALOT
  rationale: Although the preposition is not repeated explicitly before בֵית, the
    series continues the same locative force. The place name is transliterated rather
    than translated, following the principle to transliterate names.
- source_word: וְ/אֵילֹון בֵּית חָנָן
  chosen: and in Elon-beth-hanan
  alternatives:
  - and Elon-beth-hanan
  - and in Elon of Beth-hanan
  lexicon: HALOT
  rationale: This is best taken as a compound place name in the list of towns. Supplying
    'in' in English reflects the carried-over locative sense from the preceding items
    and yields natural English without adding new content.
