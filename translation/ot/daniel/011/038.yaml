theological_decisions:
- issue: Identity and characterization of the deity in 'god of fortresses'
  chosen_reading: Render the phrase descriptively as 'a god of fortresses' without
    identifying it with a specific historical or eschatological figure or deity.
  alternative_readings:
  - '''the god of fortresses'' as a specific known deity'
  - an interpretive identification with a war god such as Zeus/Jupiter/Mars
  - a symbolic reference to military power itself
  rationale: The Hebrew presents the phrase without enough internal data in this verse
    alone to justify a specific identification. The translation should preserve the
    text's ambiguity rather than import a debated historical or theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of עַל־כַּנּוֹ
  chosen_reading: Translate idiomatically as 'in his place.'
  alternative_readings:
  - '''upon his base/pedestal'''
  - '''instead of him'''
  rationale: The phrase is syntactically compressed and debated. 'In his place' best
    preserves the likely contrastive sense in context while avoiding an overconfident
    specification of the referent. A footnote preserves the more literal alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
