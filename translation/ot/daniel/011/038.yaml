id: DAN.11.38
reference: Daniel 11:38
source:
  edition: WLC
  text: וְ/לֶ/אֱלֹ֨הַּ֙ מָֽעֻזִּ֔ים עַל כַּנּ֖/וֹ יְכַבֵּ֑ד וְ/לֶ/אֱל֜וֹהַּ אֲשֶׁ֧ר
    לֹא יְדָעֻ֣/הוּ אֲבֹתָ֗י/ו יְכַבֵּ֛ד בְּ/זָהָ֥ב וּ/בְ/כֶ֛סֶף וּ/בְ/אֶ֥בֶן יְקָרָ֖ה
    וּ/בַ/חֲמֻדֽוֹת־־׃
translation:
  text: Instead, he will honor a god of fortresses in his place; he will honor a god
    whom his fathers did not know with gold, silver, precious stones, and desirable
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a god of strongholds.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'upon his base' or 'on his pedestal'; the phrase is difficult and
      may mean 'in his place' or 'instead of him.'
    reason: alternative_reading
  - marker: c
    text: Or 'precious things' or 'treasures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֶאֱלֹהַּ
  chosen: Instead, ... a god
  alternatives:
  - But ... a god
  - And ... a god
  lexicon: HALOT
  rationale: The prefixed conjunction with lamed here introduces contrast with the
    preceding verse, so 'Instead' best captures the discourse force in readable English
    while retaining the reference to honoring a deity.
- source_word: מָעֻזִּים
  chosen: fortresses
  alternatives:
  - strongholds
  - strong places
  lexicon: HALOT
  rationale: The plural noun denotes places of strength/defense. 'Fortresses' is natural
    modern English and fits the military-political context of the chapter. 'Strongholds'
    is viable and preserved as an alternative.
- source_word: עַל־כַּנּוֹ
  chosen: in his place
  alternatives:
  - upon his base
  - on his pedestal
  - in its place
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. In context it most likely means
    'in his place' or 'instead of [another god/normal object of honor].' This rendering
    communicates the likely sense without over-literal obscurity. A more literal spatial
    rendering is possible but less clear in English.
- source_word: יְכַבֵּד
  chosen: he will honor
  alternatives:
  - he will glorify
  - he will give honor to
  lexicon: HALOT
  rationale: Piel of כבד here means to honor or glorify. 'Honor' is concise, natural,
    and works consistently for both occurrences in the verse.
- source_word: וְלֶאֱלוֹהַּ אֲשֶׁר לֹא יְדָעֻהוּ אֲבֹתָיו
  chosen: a god whom his fathers did not know
  alternatives:
  - a god unknown to his fathers
  - a god his ancestors did not acknowledge
  lexicon: HALOT
  rationale: This clause straightforwardly describes a deity unfamiliar to his forefathers.
    'Fathers' preserves the Hebrew term and ancestral sense; 'ancestors' is possible
    but less formally aligned.
- source_word: אֲבֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural familial term is
    retained as 'fathers' here, where literal forefathers/ancestral lineage is intended
    rather than a generic mixed group.
- source_word: בְּזָהָב וּבְכֶסֶף
  chosen: with gold, silver
  alternatives:
  - by means of gold and silver
  lexicon: HALOT
  rationale: The beth preposition here is instrumental or associative; 'with' is idiomatic
    English for the means by which he honors this god.
- source_word: וּבְאֶבֶן יְקָרָה
  chosen: precious stones
  alternatives:
  - a precious stone
  - costly stones
  - precious stone
  lexicon: HALOT
  rationale: Although אבן is singular, the phrase functions collectively in English.
    'Precious stones' avoids awkward singular phrasing in a list of valuables.
- source_word: וּבַחֲמֻדוֹת
  chosen: desirable things
  alternatives:
  - treasures
  - costly gifts
  - precious things
  lexicon: HALOT
  rationale: The noun refers broadly to desirable or precious objects. 'Desirable
    things' stays close to the lexical sense; 'treasures' is interpretive and narrower.
