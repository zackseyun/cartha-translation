id: DAN.11.16
reference: Daniel 11:16
source:
  edition: WLC
  text: וְ/יַ֨עַשׂ הַ/בָּ֤א אֵלָי/ו֙ כִּ/רְצוֹנ֔/וֹ וְ/אֵ֥ין עוֹמֵ֖ד לְ/פָנָ֑י/ו וְ/יַעֲמֹ֥ד
    בְּ/אֶֽרֶץ הַ/צְּבִ֖י וְ/כָלָ֥ה בְ/יָדֽ/וֹ־׃
translation:
  text: And the one who comes against him will do as he pleases, and no one will stand
    before him. He will stand in the Beautiful Land, with destruction in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glorious land.' The Hebrew expression denotes a land of beauty or
      splendor and refers here to the land of Israel/Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'and he will bring destruction in his hand' / 'and it will be consumed
      in his hand.' The Hebrew phrase is compact and may emphasize either destructive
      power under his control or the land's being brought to ruin.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיַעַשׂ
  chosen: will do
  alternatives:
  - shall act
  - will act
  lexicon: HALOT
  rationale: Basic sense of עשה is 'do/make.' In this military-political context,
    'will do' is idiomatic and preserves the broad scope of action without over-specifying.
- source_word: הַבָּא אֵלָיו
  chosen: the one who comes against him
  alternatives:
  - the one coming to him
  - the one who comes to him
  lexicon: HALOT
  rationale: Although אֶל can mean 'to/toward,' in this hostile context within the
    campaign narrative, English requires the adversative sense 'against him.' This
    reflects the plain contextual force rather than a woodenly spatial rendering.
- source_word: כִּרְצוֹנוֹ
  chosen: as he pleases
  alternatives:
  - according to his will
  - as he wills
  lexicon: HALOT
  rationale: The phrase literally means 'according to his desire/will.' 'As he pleases'
    is natural modern English and accurately conveys unchecked freedom of action.
- source_word: וְאֵין עוֹמֵד לְפָנָיו
  chosen: and no one will stand before him
  alternatives:
  - and none can withstand him
  - and there is no one standing before him
  lexicon: HALOT
  rationale: The idiom 'stand before' in military contexts means to withstand or resist.
    The chosen rendering preserves the Hebrew image while remaining clear in English.
- source_word: וְיַעֲמֹד
  chosen: He will stand
  alternatives:
  - He will take his stand
  - He will establish himself
  lexicon: HALOT
  rationale: עמד literally means 'stand.' Here it likely implies taking position or
    establishing presence in the land. 'He will stand' keeps the verbal imagery and
    allows the context to supply the political-military nuance.
- source_word: בְּאֶרֶץ הַצְּבִי
  chosen: in the Beautiful Land
  alternatives:
  - in the glorious land
  - in the pleasant land
  lexicon: HALOT
  rationale: הַצְּבִי denotes beauty, splendor, or desirability. In Daniel it refers
    to the land of Israel/Judah. 'Beautiful Land' is a clear, direct rendering; 'glorious
    land' is traditional and possible, preserved in a footnote.
- source_word: וְכָלָה בְיָדוֹ
  chosen: with destruction in his hand
  alternatives:
  - and it will be consumed in his hand
  - and complete destruction will be in his hand
  - and he will bring destruction
  lexicon: HALOT
  rationale: כָלָה can denote completion, end, annihilation, or destruction. The phrase
    is terse and somewhat elliptical. 'With destruction in his hand' preserves the
    Hebrew imagery of destructive power under his control without forcing an interpretive
    expansion. An alternative more dynamic rendering is preserved in a footnote.
