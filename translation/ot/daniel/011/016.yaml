theological_decisions:
- issue: Referent of 'the Beautiful Land'
  chosen_reading: A designation for the land of Israel/Judah within Daniel's vision.
  alternative_readings:
  - A more general 'glorious land' without explicit identification
  rationale: The phrase functions as a geographic designation in Daniel's apocalyptic-historical
    narrative. Rendering it as 'Beautiful Land' preserves the metaphorical title without
    importing extra theological claims into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
