id: DAN.11.12
reference: Daniel 11:12
source:
  edition: WLC
  text: וְ/נִשָּׂ֥א הֶ/הָמ֖וֹן ירום לְבָב֑/וֹ וְ/הִפִּ֛יל רִבֹּא֖וֹת וְ/לֹ֥א יָעֽוֹז׃
translation:
  text: And when the multitude is carried away, his heart will be lifted up, and he
    will cast down tens of thousands, but he will not prevail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the multitude will be lifted up/taken away.' The Hebrew verb can
      be understood as 'be lifted up' or 'be carried away/removed'; the context of
      military defeat favors 'carried away.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his heart will be lifted up,' an idiom for becoming proud.
    reason: cultural_note
  - marker: c
    text: Or 'he will not become strong.' The Hebrew may emphasize either failure
      to prevail or failure to consolidate strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשָּׂא
  chosen: when ... is carried away
  alternatives:
  - and ... is lifted up
  - and ... is taken away
  lexicon: HALOT
  rationale: The Niphal of נשׂא can mean 'be lifted up,' 'be carried,' or 'be taken
    away.' In this context with הֶהָמוֹן as the subject, it most naturally refers
    to the multitude being swept away/removed after defeat. Rendering it temporally
    with 'when' fits the clause sequence in English while preserving the Hebrew sense.
- source_word: הֶהָמוֹן
  chosen: the multitude
  alternatives:
  - the crowd
  - the army
  lexicon: HALOT
  rationale: הָמוֹן commonly denotes a multitude, mass, or throng. In this military
    context it refers to a large body of people, likely troops, but 'multitude' preserves
    the lexical breadth without over-specifying.
- source_word: ירום לְבָבוֹ
  chosen: his heart will be lifted up
  alternatives:
  - his heart will be exalted
  - he will become proud
  lexicon: HALOT
  rationale: The idiom 'his heart will be lifted up' is a standard Hebrew expression
    for becoming proud or arrogant. The more literal rendering preserves the Hebrew
    imagery while remaining understandable in English.
- source_word: וְהִפִּיל
  chosen: he will cast down
  alternatives:
  - he will bring down
  - he will cause to fall
  - he will strike down
  lexicon: HALOT
  rationale: The Hiphil of נפל means 'cause to fall.' In battle context it can imply
    striking down or causing defeat. 'Cast down' keeps the causative force and works
    naturally with the following object.
- source_word: רִבֹּאוֹת
  chosen: tens of thousands
  alternatives:
  - myriads
  - many thousands
  lexicon: HALOT
  rationale: רִבֹּאות denotes very large numbers, often 'ten thousands' or 'myriads.'
    'Tens of thousands' is clear modern English and reflects the plural form.
- source_word: וְלֹא יָעוֹז
  chosen: but he will not prevail
  alternatives:
  - but he will not be strong
  - but he will not become strong
  lexicon: HALOT
  rationale: The verb עזז/עוז in the Qal conveys being strong or prevailing. In context
    the point is that despite military success and pride, he will not ultimately gain
    lasting strength or victory. 'Will not prevail' expresses the contextual force
    more idiomatically than a bare 'be strong.'
