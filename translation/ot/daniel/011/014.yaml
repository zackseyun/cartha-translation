id: DAN.11.14
reference: Daniel 11:14
source:
  edition: WLC
  text: וּ/בָ/עִתִּ֣ים הָ/הֵ֔ם רַבִּ֥ים יַֽעַמְד֖וּ עַל מֶ֣לֶךְ הַ/נֶּ֑גֶב וּ/בְנֵ֣י
    פָּרִיצֵ֣י עַמְּ/ךָ֗ יִֽנַּשְּׂא֛וּ לְ/הַעֲמִ֥יד חָז֖וֹן וְ/נִכְשָֽׁלוּ־׀׃
translation:
  text: And in those times many will rise up against the king of the South, and the
    violent ones among your people will lift themselves up to establish the vision,
    but they will stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of the violent among your people'; the Hebrew expression is
      literally more complex than the smooth English rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'to fulfill the vision.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָעִתִּים הָהֵם
  chosen: And in those times
  alternatives:
  - And at those times
  - And in those days
  lexicon: HALOT
  rationale: The plural עִתִּים with the demonstrative points to a period or seasons
    within the larger historical sequence, not necessarily literal 'days.' 'In those
    times' is natural English and preserves the temporal framing.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many people
  - multitudes
  lexicon: HALOT
  rationale: The adjective functions substantivally here. 'Many' is sufficiently idiomatic
    in English without adding 'people,' which the Hebrew does not state explicitly.
- source_word: יַעַמְדוּ עַל
  chosen: will rise up against
  alternatives:
  - will stand against
  - will arise against
  lexicon: HALOT
  rationale: The idiom עמד על in this conflict context conveys hostile opposition.
    'Rise up against' communicates active rebellion more clearly than the more wooden
    'stand against.'
- source_word: מֶלֶךְ הַנֶּגֶב
  chosen: the king of the South
  alternatives:
  - the king of the Negev
  - the southern king
  lexicon: HALOT
  rationale: Within Daniel 11, נֶגֶב functions as the geopolitical designation 'South,'
    not merely the Negev region. The established directional title best matches the
    chapter's usage.
- source_word: וּבְנֵי פָּרִיצֵי עַמְּךָ
  chosen: the violent ones among your people
  alternatives:
  - the sons of the violent among your people
  - the lawless among your people
  - the breakers among your people
  lexicon: HALOT
  rationale: The construct phrase is difficult. Literally it is 'sons of the violent/breakers
    of your people,' but in Hebrew 'sons of' can denote members characterized by a
    quality. 'The violent ones among your people' preserves the pejorative force of
    פָּרִיצִים without an awkwardly literal 'sons of.'
- source_word: יִנַּשְּׂאוּ
  chosen: will lift themselves up
  alternatives:
  - will exalt themselves
  - will be carried away
  lexicon: HALOT
  rationale: The Hitpael/iterative-reflexive sense here suggests self-exaltation or
    self-assertion. 'Lift themselves up' keeps the metaphor and allows the political-rebellious
    nuance to emerge from context.
- source_word: לְהַעֲמִיד חָזוֹן
  chosen: to establish the vision
  alternatives:
  - to fulfill the vision
  - to make the vision stand
  lexicon: HALOT
  rationale: העמיד literally means 'to cause to stand, establish.' 'Establish the
    vision' is closer to the Hebrew than the interpretive 'fulfill,' while still readable.
    The phrase likely means acting in relation to what has been revealed, without
    specifying whether their understanding is correct.
- source_word: חָזוֹן
  chosen: the vision
  alternatives:
  - prophecy
  - revelation
  lexicon: HALOT
  rationale: Daniel regularly uses חָזוֹן for prophetic vision. 'Vision' preserves
    the book's terminology and avoids narrowing the term to spoken prophecy alone.
- source_word: וְנִכְשָׁלוּ
  chosen: but they will stumble
  alternatives:
  - but they will fall
  - but they will fail
  lexicon: HALOT
  rationale: כשל commonly denotes stumbling, often metaphorically for coming to ruin.
    'Stumble' preserves the imagery and leaves open whether the result is failure,
    downfall, or both.
