theological_decisions:
- issue: Interpretation of וּבְנֵי פָּרִיצֵי עַמְּךָ
  chosen_reading: Rendered as 'the violent ones among your people' rather than a more
    literal 'sons of the violent of your people.'
  alternative_readings:
  - the sons of the violent among your people
  - the lawless among your people
  rationale: This is primarily a lexical-syntactic decision, but it affects how the
    group is characterized. The chosen rendering preserves the negative moral sense
    without over-specifying a sectarian identity. It avoids importing later theological
    identifications not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Interpretation of לְהַעֲמִיד חָזוֹן
  chosen_reading: Rendered as 'to establish the vision' in the main text.
  alternative_readings:
  - to fulfill the vision
  rationale: The Hebrew verb is 'establish/cause to stand,' not explicitly 'fulfill.'
    Because the phrase can be interpreted either as attempting to bring prophecy to
    realization or as confirming what was foreseen, the main text stays close to the
    source and the more interpretive alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
