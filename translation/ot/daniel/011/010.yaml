id: DAN.11.10
reference: Daniel 11:10
source:
  edition: WLC
  text: ו/בנ/ו יִתְגָּר֗וּ וְ/אָסְפוּ֙ הֲמוֹן֙ חֲיָלִ֣ים רַבִּ֔ים וּ/בָ֥א ב֖וֹא וְ/שָׁטַ֣ף
    וְ/עָבָ֑ר וְ/יָשֹׁ֥ב ו/יתגרו עַד מעז/ה־׃
translation:
  text: His sons will stir themselves up and assemble a multitude of great forces,
    and one will certainly come and overflow and pass through; then he will return
    and stir up war as far as his fortress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will surely come'; the Hebrew shifts from plural ('his sons') to
      singular, likely focusing on one son in particular.
    reason: alternative_reading
  - marker: b
    text: Or 'up to his stronghold.' The Hebrew leaves the owner of the fortress implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנָיו
  chosen: His sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here refers specifically to male royal descendants in the dynastic
    conflict context, so 'sons' is more accurate than the broader 'children.'
- source_word: יִתְגָּרוּ
  chosen: will stir themselves up
  alternatives:
  - will wage war
  - will engage in conflict
  - will provoke themselves
  lexicon: HALOT
  rationale: The hitpael of גרה conveys stirring oneself up or engaging in conflict.
    'Stir themselves up' preserves the reflexive nuance while fitting the military
    context.
- source_word: וְאָסְפוּ הֲמוֹן חֲיָלִים רַבִּים
  chosen: and assemble a multitude of great forces
  alternatives:
  - and gather a multitude of many troops
  - and muster a great army
  lexicon: HALOT
  rationale: הֲמוֹן is 'multitude' and חֲיָלִים refers to military forces/troops.
    'Assemble a multitude of great forces' keeps the massing sense without over-paraphrasing.
- source_word: וּבָא בּוֹא
  chosen: and one will certainly come
  alternatives:
  - and he will surely come
  - and he will keep coming
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. Because
    the subject shifts from plural sons to a singular actor, 'one will certainly come'
    makes the singular explicit while preserving the emphatic force.
- source_word: וְשָׁטַף
  chosen: and overflow
  alternatives:
  - and flood over
  - and sweep through
  lexicon: HALOT
  rationale: שטף is commonly used metaphorically of an overwhelming military advance.
    'Overflow' preserves the imagery and pairs naturally with the following verb.
- source_word: וְעָבָר
  chosen: and pass through
  alternatives:
  - and pass on
  - and sweep onward
  lexicon: HALOT
  rationale: עבר here continues the picture of military movement through territory.
    'Pass through' is the most direct rendering.
- source_word: וְיָשֹׁב
  chosen: then he will return
  alternatives:
  - and he will return
  - then he will turn back
  lexicon: HALOT
  rationale: שוב indicates returning. 'Then' helps the English sequence without adding
    content.
- source_word: וְיִתְגָּרוּ
  chosen: and stir up war
  alternatives:
  - and wage war
  - and stir themselves up again
  lexicon: HALOT
  rationale: The repeated hitpael of גרה again carries the sense of engaging in conflict.
    In English, 'stir up war' makes the military sense explicit and avoids an awkward
    repeated reflexive expression.
- source_word: עַד מָעֻזֹּה
  chosen: as far as his fortress
  alternatives:
  - up to his stronghold
  - to his place of strength
  lexicon: HALOT
  rationale: מָעוֹז denotes a fortress or stronghold. The suffix is singular masculine;
    'his fortress' is the most straightforward rendering, though the referent is contextually
    debated.
