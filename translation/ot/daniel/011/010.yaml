theological_decisions:
- issue: Referent of the singular subject after the plural 'his sons'
  chosen_reading: Render the singular explicitly as 'one will certainly come' without
    identifying which son in the translation.
  alternative_readings:
  - Render generically as 'he will surely come'
  - Interpret specifically as the more successful son and encode that in translation
  rationale: The Hebrew shifts from plural to singular. The translation preserves
    that grammatical shift but does not resolve the historical identification in the
    main text, since the text itself does not name the individual here.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it.
- issue: Referent of 'his fortress'
  chosen_reading: Keep the literal 'his fortress' and leave the antecedent implicit.
  alternative_readings:
  - '''their fortress'' by interpretive smoothing'
  - '''his stronghold'' with a specified historical referent in translation'
  rationale: The suffix is singular in the Hebrew, but commentators differ on whose
    fortress is meant. The translation preserves the source-text ambiguity rather
    than resolving it.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it.
