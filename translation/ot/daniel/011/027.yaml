id: DAN.11.27
reference: Daniel 11:27
source:
  edition: WLC
  text: וּ/שְׁנֵי/הֶ֤ם הַ/מְּלָכִים֙ לְבָבָ֣/ם לְ/מֵרָ֔ע וְ/עַל שֻׁלְחָ֥ן אֶחָ֖ד כָּזָ֣ב
    יְדַבֵּ֑רוּ וְ/לֹ֣א תִצְלָ֔ח כִּי ע֥וֹד קֵ֖ץ לַ/מּוֹעֵֽד־־׃
translation:
  text: As for both of them, the kings—their hearts are set on evil, and at one table
    they will speak lies, but it will not succeed, for the end is still for the appointed
    time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will speak falsehood' or 'they will tell lies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'but it will not prosper.' The Hebrew verb is feminine singular, likely
      referring impersonally to their scheme or outcome.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the end is yet for the appointed time.' The wording emphasizes that
      the outcome awaits a fixed time.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁנֵיהֶם
  chosen: As for both of them
  alternatives:
  - and both of them
  - both of them
  lexicon: HALOT
  rationale: The conjunction plus numeral with pronominal suffix introduces the two
    rulers already in view. 'As for both of them' brings out the topical force naturally
    in English while retaining the reference to the pair.
- source_word: הַמְּלָכִים
  chosen: the kings
  alternatives:
  - these kings
  lexicon: HALOT
  rationale: Definite plural noun referring specifically to the two royal figures
    in context. 'The kings' is the most direct rendering.
- source_word: לְבָבָם לְמֵרָע
  chosen: their hearts are set on evil
  alternatives:
  - their heart is for evil
  - their hearts are bent on evil
  lexicon: HALOT
  rationale: The idiom literally reads 'their heart to do evil/for evil.' 'Are set
    on evil' communicates settled malicious intent in idiomatic English without over-paraphrasing.
- source_word: וְעַל שֻׁלְחָן אֶחָד
  chosen: and at one table
  alternatives:
  - and at the same table
  - upon one table
  lexicon: HALOT
  rationale: The phrase is spatial and likely diplomatic/banqueting in setting. 'At
    one table' is a natural English equivalent that preserves the image of shared
    table fellowship despite hostility.
- source_word: כָּזָב יְדַבֵּרוּ
  chosen: they will speak lies
  alternatives:
  - they will speak falsehood
  - they will tell lies
  lexicon: HALOT
  rationale: כָּזָב denotes falsehood/deceit. 'Speak lies' is concise, idiomatic,
    and preserves the plural verbal action of mutual deception.
- source_word: וְלֹא תִצְלָח
  chosen: but it will not succeed
  alternatives:
  - but it will not prosper
  - but it will not come to success
  lexicon: HALOT
  rationale: The feminine singular verb has an impersonal sense here, referring to
    the scheme/plan/outcome of their deceit. 'It will not succeed' is clear modern
    English; 'prosper' is possible but can sound archaic or overly broad.
- source_word: כִּי עוֹד קֵץ
  chosen: for the end is still
  alternatives:
  - for there is yet an end
  - for the end is yet to come
  lexicon: HALOT
  rationale: This clause grounds the failure of their plotting in divine timing. 'The
    end is still' keeps the temporal force of עוֹד while preparing for the following
    phrase.
- source_word: לַמּוֹעֵד
  chosen: for the appointed time
  alternatives:
  - for the fixed time
  - for the appointed season
  lexicon: HALOT
  rationale: מוֹעֵד here denotes a fixed or appointed time rather than a festival.
    'Appointed time' is a standard and clear rendering in Daniel's apocalyptic context.
