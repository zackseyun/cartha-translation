theological_decisions:
- issue: Implication of divine sovereignty over historical events in 'for the end
    is still for the appointed time'
  chosen_reading: Retain the temporal statement without expanding it into explicit
    theological commentary.
  alternative_readings:
  - Interpretively expand to 'for the end awaits God's appointed time'
  rationale: The Hebrew implies fixed timing, and within Daniel this strongly suggests
    divine sovereignty, but the verse itself does not explicitly name God in this
    clause. The translation preserves the text's theological tension rather than making
    the implication more explicit than the wording warrants.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
