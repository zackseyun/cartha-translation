id: DAN.11.29
reference: Daniel 11:29
source:
  edition: WLC
  text: לַ/מּוֹעֵ֥ד יָשׁ֖וּב וּ/בָ֣א בַ/נֶּ֑גֶב וְ/לֹֽא תִהְיֶ֥ה כָ/רִאשֹׁנָ֖ה וְ/כָ/אַחֲרֹנָֽה־׃
translation:
  text: At the appointed time he will return and come into the south, but it will
    not be as the former or as the latter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but it will not be as before and as afterward.' The Hebrew leaves the
      comparison compressed and somewhat elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמּוֹעֵד
  chosen: At the appointed time
  alternatives:
  - At the time appointed
  - At the set time
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time or fixed occasion. The prefixed
    preposition and article yield 'at the appointed time.' This preserves the temporal
    specificity without overinterpreting it as a festival or meeting.
- source_word: יָשׁוּב
  chosen: he will return
  alternatives:
  - he will turn back
  lexicon: HALOT
  rationale: שׁוּב in the qal commonly means 'return' or 'turn back.' In this military-historical
    context, 'return' is the most natural English rendering.
- source_word: וּבָא
  chosen: and come
  alternatives:
  - and enter
  lexicon: HALOT
  rationale: בוא broadly means 'come' or 'enter.' Because the phrase is followed by
    'into the south,' 'come' keeps the movement idiomatic in English while preserving
    the Hebrew sequence.
- source_word: בַנֶּגֶב
  chosen: into the south
  alternatives:
  - into the Negev
  - into the South
  lexicon: HALOT
  rationale: Though נֶגֶב can denote the Negev region, in Daniel 11 the directional/geopolitical
    contrast between north and south strongly favors the broader sense 'south,' referring
    to the southern kingdom/territory rather than the Judean Negev specifically.
- source_word: וְלֹא תִהְיֶה
  chosen: but it will not be
  alternatives:
  - but it shall not be
  - yet it will not happen
  lexicon: HALOT
  rationale: The feminine singular verb likely refers to the campaign/expedition implicitly.
    English can preserve the impersonal sense with 'it will not be,' leaving the referent
    broad as in the Hebrew.
- source_word: כָרִאשֹׁנָה
  chosen: as the former
  alternatives:
  - as before
  - like the first
  lexicon: HALOT
  rationale: The adjective means 'first/former.' 'As the former' preserves the comparative
    structure and leaves implicit what is being compared, matching the Hebrew terseness.
- source_word: וְכָאַחֲרֹנָה
  chosen: or as the latter
  alternatives:
  - or as the last
  - or as afterward
  lexicon: HALOT
  rationale: אַחֲרוֹן means 'last/latter.' Paired with 'the former,' 'the latter'
    is the most natural and formally corresponding English rendering.
