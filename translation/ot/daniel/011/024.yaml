id: DAN.11.24
reference: Daniel 11:24
source:
  edition: WLC
  text: בְּ/שַׁלְוָ֞ה וּ/בְ/מִשְׁמַנֵּ֣י מְדִינָה֮ יָבוֹא֒ וְ/עָשָׂ֗ה אֲשֶׁ֨ר לֹא
    עָשׂ֤וּ אֲבֹתָי/ו֙ וַ/אֲב֣וֹת אֲבֹתָ֔י/ו בִּזָּ֧ה וְ/שָׁלָ֛ל וּ/רְכ֖וּשׁ לָ/הֶ֣ם
    יִבְז֑וֹר וְ/עַ֧ל מִבְצָרִ֛ים יְחַשֵּׁ֥ב מַחְשְׁבֹתָ֖י/ו וְ/עַד עֵֽת־־׃
translation:
  text: 'In a time of security he will come into the richest parts of the province,
    and he will do what neither his fathers nor his fathers’ fathers did: he will
    scatter among them plunder, spoil, and goods; and against fortresses he will devise
    his plans, but only until a time.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'peaceably' or 'unexpectedly' he will enter the richest parts of the
      province.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he will distribute to them plunder, spoil, and possessions.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'he will plot against strongholds,' or 'until the appointed time.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּשַׁלְוָה
  chosen: In a time of security
  alternatives:
  - peaceably
  - in tranquility
  - unexpectedly
  lexicon: HALOT
  rationale: שַׁלְוָה denotes quietness, ease, or security/prosperity. In this context
    of political-military maneuvering, 'in a time of security' captures both the calm
    setting and the opportunistic sense without overcommitting to the adverbial 'peaceably.'
- source_word: וּבְמִשְׁמַנֵּי מְדִינָה
  chosen: into the richest parts of the province
  alternatives:
  - into the fat places of the province
  - into the prosperous parts of the realm
  lexicon: HALOT
  rationale: מִשְׁמַנִּים literally refers to fatness/richness, idiomatically fertile
    or wealthy places. 'Richest parts' conveys the idiom naturally in English. מְדִינָה
    is rendered 'province' as the ordinary sense of an administrative region.
- source_word: יָבוֹא
  chosen: he will come into
  alternatives:
  - he will enter
  - he will invade
  lexicon: HALOT
  rationale: The verb is the common 'come/enter.' 'Come into' preserves the basic
    motion without importing the stronger military nuance 'invade,' which the context
    may imply but the verb itself does not require.
- source_word: וְעָשָׂה אֲשֶׁר לֹא עָשׂוּ
  chosen: and he will do what ... did not do
  alternatives:
  - and he will accomplish what ... had not done
  lexicon: HALOT
  rationale: A straightforward rendering preserves the emphatic comparison with his
    predecessors.
- source_word: אֲבֹתָיו וַאֲבוֹת אֲבֹתָיו
  chosen: his fathers nor his fathers’ fathers
  alternatives:
  - his fathers nor his forefathers
  - his ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his fathers and the fathers of his fathers.'
    The chosen rendering keeps the repetition and rhetorical force more closely than
    the flattened 'ancestors.'
- source_word: בִּזָּה וְשָׁלָל וּרְכוּשׁ
  chosen: plunder, spoil, and goods
  alternatives:
  - booty, spoil, and possessions
  - plunder, loot, and wealth
  lexicon: HALOT
  rationale: The three nouns are near-synonyms but not identical; the translation
    preserves the accumulation. 'Goods' for רְכוּשׁ avoids awkwardness while retaining
    the sense of property/wealth.
- source_word: לָהֶם יִבְזוֹר
  chosen: he will scatter among them
  alternatives:
  - he will distribute to them
  - he will lavish on them
  lexicon: HALOT
  rationale: בזר means scatter/disperse. In context it refers to distributing captured
    wealth to supporters. 'Scatter among them' preserves the vivid metaphor while
    making the indirect object natural in English.
- source_word: וְעַל מִבְצָרִים יְחַשֵּׁב מַחְשְׁבֹתָיו
  chosen: and against fortresses he will devise his plans
  alternatives:
  - he will plot against strongholds
  - he will scheme against fortresses
  lexicon: HALOT
  rationale: The cognate verb+noun construction ('think thoughts/plans') is idiomatic
    for devising schemes. 'Devise his plans' is readable modern English while preserving
    the deliberative sense. מִבְצָרִים is 'fortresses/strongholds'; 'fortresses' fits
    the military context.
- source_word: וְעַד עֵת
  chosen: but only until a time
  alternatives:
  - but only for a time
  - until the appointed time
  lexicon: HALOT
  rationale: 'The phrase is indefinite here: literally ''and until a time.'' ''But
    only until a time'' preserves the limitation without importing ''appointed,''
    which is not explicit in this phrase alone, though the broader chapter often uses
    divinely bounded times.'
