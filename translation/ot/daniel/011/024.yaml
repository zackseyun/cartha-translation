theological_decisions:
- issue: Whether to make the temporal limitation explicitly divine or merely indefinite
  chosen_reading: but only until a time
  alternative_readings:
  - until the appointed time
  - but only for a time
  rationale: The Hebrew עַד עֵת here lacks an explicit modifier such as 'appointed.'
    To preserve theological tension and avoid importing a stronger providential specification
    than the wording states, the main text keeps the indefinite expression while allowing
    the more interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
