theological_decisions:
- issue: Referent of 'the holy covenant'
  chosen_reading: Retain the covenant language without interpretive expansion.
  alternative_readings:
  - the Jewish religion
  - God's covenant people/order
  rationale: The phrase likely refers to the covenantal order centered on God's holy
    people, but the text itself uses covenant language. The translation preserves
    that theological category rather than narrowing it to a later interpretive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
