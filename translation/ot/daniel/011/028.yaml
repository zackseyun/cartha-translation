id: DAN.11.28
reference: Daniel 11:28
source:
  edition: WLC
  text: וְ/יָשֹׁ֤ב אַרְצ/וֹ֙ בִּ/רְכ֣וּשׁ גָּד֔וֹל וּ/לְבָב֖/וֹ עַל בְּרִ֣ית קֹ֑דֶשׁ
    וְ/עָשָׂ֖ה וְ/שָׁ֥ב לְ/אַרְצֽ/וֹ־׃
translation:
  text: Then he will return to his land with great wealth, but his heart will be set
    against the holy covenant; and he will act, and return to his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great possessions'; the Hebrew term can denote property, goods,
      or wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart will be against the holy covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֹׁב
  chosen: Then he will return
  alternatives:
  - And he will return
  - So he will return
  lexicon: HALOT
  rationale: Qal imperfect of שוב, here functioning in narrative sequence. 'Return'
    is the plain sense. 'Then' captures the forward movement of the narrative better
    than a bare 'and' in modern English.
- source_word: אַרְצוֹ
  chosen: to his land
  alternatives:
  - to his country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' or 'country.' 'Land' is slightly more formal
    and fits the geopolitical setting of Daniel.
- source_word: בִּרְכוּשׁ גָּדוֹל
  chosen: with great wealth
  alternatives:
  - with great possessions
  - with much plunder
  lexicon: HALOT
  rationale: רְכוּשׁ denotes property, goods, or wealth. 'With great wealth' is idiomatic
    and broad enough to include acquired riches without over-specifying 'plunder,'
    which the text itself does not explicitly state.
- source_word: וּלְבָבוֹ עַל
  chosen: but his heart will be set against
  alternatives:
  - and his heart will be against
  - with his heart against
  lexicon: HALOT
  rationale: לֵבָב with עַל here expresses inward disposition directed against something.
    'His heart will be set against' conveys hostile intent more naturally than a wooden
    literalism.
- source_word: בְּרִית קֹדֶשׁ
  chosen: the holy covenant
  alternatives:
  - the sacred covenant
  lexicon: HALOT
  rationale: בְּרִית is 'covenant'; קֹדֶשׁ functions adjectivally here. 'Holy covenant'
    is the standard and most transparent rendering in this context, likely referring
    to the covenant associated with the people of God.
- source_word: וְעָשָׂה
  chosen: and he will act
  alternatives:
  - and he will take action
  - and he will do as he pleases
  lexicon: HALOT
  rationale: עשה is semantically broad ('do, make, act'). Because the object is unstated,
    'act' preserves the terseness of the Hebrew without importing a more specific
    action than the text gives.
- source_word: וְשָׁב לְאַרְצוֹ
  chosen: and return to his land
  alternatives:
  - and go back to his land
  lexicon: HALOT
  rationale: A second use of שוב emphasizes the completion of his movement back home
    after the intervening hostile action. Repeating 'return' preserves the Hebrew's
    verbal repetition.
