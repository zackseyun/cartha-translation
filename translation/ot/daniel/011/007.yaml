id: DAN.11.7
reference: Daniel 11:7
source:
  edition: WLC
  text: וְ/עָמַ֛ד מִ/נֵּ֥צֶר שָׁרָשֶׁ֖י/הָ כַּנּ֑/וֹ וְ/יָבֹ֣א אֶל הַ/חַ֗יִל וְ/יָבֹא֙
    בְּ/מָעוֹז֙ מֶ֣לֶךְ הַ/צָּפ֔וֹן וְ/עָשָׂ֥ה בָ/הֶ֖ם וְ/הֶחֱזִֽיק־׃
translation:
  text: And one from a branch of her roots shall arise in his place, and he shall
    come against the army and enter the fortress of the king of the north, and he
    shall act against them and prevail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a shoot/offshoot of her roots,' that is, from her family line.
    reason: lexical_alternative
  - marker: b
    text: Or 'enter the stronghold of the king of the north.'
    reason: lexical_alternative
  - marker: c
    text: Or 'deal with them' or 'act among them'; the Hebrew idiom is broad.
    reason: lexical_alternative
  - marker: d
    text: Or 'show strength' or 'gain the upper hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  chosen: shall arise
  alternatives:
  - shall stand
  - shall appear
  lexicon: HALOT
  rationale: In prophetic/narrative succession contexts, עמד commonly means to arise
    or come forward as a successor rather than merely to stand physically. 'Shall
    arise' fits the dynastic sense here.
- source_word: מִנֵּצֶר שָׁרָשֶׁיהָ
  chosen: from a branch of her roots
  alternatives:
  - from a shoot from her roots
  - from an offshoot of her roots
  lexicon: HALOT
  rationale: נֵצֶר denotes a shoot/branch; with 'her roots' the image is genealogical,
    referring to a descendant from her family line. 'Branch' preserves the metaphor
    while remaining natural English.
- source_word: כַּנּוֹ
  chosen: in his place
  alternatives:
  - as his successor
  - in his station
  lexicon: HALOT
  rationale: The phrase indicates replacement or succession. 'In his place' is a clear,
    fairly formal rendering that preserves the ambiguity of the antecedent better
    than the more interpretive 'as his successor.'
- source_word: הַחַיִל
  chosen: the army
  alternatives:
  - the force
  - the host
  lexicon: HALOT
  rationale: חַיִל here refers to military force rather than wealth or valor. 'Army'
    is the most natural contextual rendering.
- source_word: בְּמָעוֹז מֶלֶךְ הַצָּפוֹן
  chosen: the fortress of the king of the north
  alternatives:
  - the stronghold of the king of the north
  - the strong fortress of the king of the north
  lexicon: HALOT
  rationale: מָעוֹז denotes a place of strength/fortification. 'Fortress' is idiomatic
    and concrete in English. The prefixed ב here is best taken with the motion verb
    in the sense of entering into/against the stronghold.
- source_word: וְעָשָׂה בָהֶם
  chosen: he shall act against them
  alternatives:
  - he shall deal with them
  - he shall act among them
  lexicon: HALOT
  rationale: The idiom עשה ב + pronoun is broad ('do/act against, deal with'). Given
    the military context, 'act against them' appropriately conveys hostile action
    without over-specifying the nature of the deed.
- source_word: וְהֶחֱזִיק
  chosen: and prevail
  alternatives:
  - and show strength
  - and be strong
  - and gain the upper hand
  lexicon: HALOT
  rationale: The Hiphil of חזק can mean to become strong, seize strength, or prevail.
    In this battle context, 'prevail' communicates the result of military success
    in concise modern English.
