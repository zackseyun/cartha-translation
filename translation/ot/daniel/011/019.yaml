id: DAN.11.19
reference: Daniel 11:19
source:
  edition: WLC
  text: וְ/יָשֵׁ֣ב פָּנָ֔י/ו לְ/מָעוּזֵּ֖י אַרְצ֑/וֹ וְ/נִכְשַׁ֥ל וְ/נָפַ֖ל וְ/לֹ֥א
    יִמָּצֵֽא׃
translation:
  text: Then he will turn his face toward the fortresses of his own land, but he will
    stumble and fall, and he will not be found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strongholds' instead of 'fortresses.' The Hebrew term refers broadly
      to places of strength or defense.
    reason: lexical_alternative
  - marker: b
    text: '''He will not be found'' is an idiomatic way of saying that he disappears
      from the scene, likely through death or overthrow, without stating the manner
      explicitly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֵׁב
  chosen: Then he will turn
  alternatives:
  - and he will turn back
  - and he will return
  lexicon: HALOT
  rationale: The verb שוב commonly means 'turn back/return.' With 'his face' as the
    object, the idiom is naturally rendered 'turn his face toward,' expressing a directional
    shift rather than merely physical return. 'Then' captures the narrative waw in
    smooth English.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his attention
  - his direction
  lexicon: HALOT
  rationale: Literally 'his face.' In Hebrew idiom this often denotes orientation
    or attention. Retaining 'face' preserves the imagery while remaining understandable
    in English.
- source_word: לְמָעוּזֵּי
  chosen: toward the fortresses
  alternatives:
  - to the strongholds
  - toward the strongholds
  lexicon: HALOT
  rationale: מָעוֹז denotes a place of strength, refuge, or fortification. 'Fortresses'
    fits the military-political context of Daniel 11 and reads naturally in modern
    English. 'Toward' is supplied from the preposition ל in connection with 'turn
    his face.'
- source_word: אַרְצוֹ
  chosen: of his own land
  alternatives:
  - of his land
  - of his country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to his territory or homeland. 'His own land' slightly
    clarifies possession and destination in idiomatic English without adding new content.
- source_word: וְנִכְשַׁל
  chosen: but he will stumble
  alternatives:
  - and he will stumble
  - and he will be overthrown
  lexicon: HALOT
  rationale: The Niphal of כשל means 'stumble' or 'be made to stumble.' 'Stumble'
    preserves the metaphor and pairs well with the following 'fall.' 'But' reflects
    the adversative sense in context, since the movement toward home ends in disaster.
- source_word: וְנָפַל
  chosen: and fall
  alternatives:
  - and he will fall
  lexicon: HALOT
  rationale: נפל is straightforwardly 'fall.' In English, after 'he will stumble,'
    the repeated subject can be omitted for style without loss of meaning.
- source_word: וְלֹא יִמָּצֵא
  chosen: and he will not be found
  alternatives:
  - and he will not be found anymore
  - and he will disappear
  lexicon: HALOT
  rationale: The Niphal of מצא means 'be found.' In this context it conveys disappearance
    from the scene, likely through death or removal, but the Hebrew states this indirectly.
    The translation preserves that restraint rather than making the implication explicit.
