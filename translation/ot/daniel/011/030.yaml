theological_decisions:
- issue: Referent of 'the holy covenant'
  chosen_reading: Retain the phrase as 'the holy covenant' without specifying beyond
    the text.
  alternative_readings:
  - the Jewish covenant
  - the covenant of God with Israel
  rationale: The verse clearly refers to the covenant associated with the holy people
    and worship, but the translation should not narrow the reference more than the
    Hebrew itself does.
  doctrine_reference: Preserve theological tension rather than resolve it.
