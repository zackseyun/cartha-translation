id: DAN.11.30
reference: Daniel 11:30
source:
  edition: WLC
  text: וּ/בָ֨אוּ ב֜/וֹ צִיִּ֤ים כִּתִּים֙ וְ/נִכְאָ֔ה וְ/שָׁ֛ב וְ/זָעַ֥ם עַל בְּרִֽית
    ק֖וֹדֶשׁ וְ/עָשָׂ֑ה וְ/שָׁ֣ב וְ/יָבֵ֔ן עַל עֹזְבֵ֖י בְּרִ֥ית קֹֽדֶשׁ־־־׃
translation:
  text: For ships of Kittim will come against him, and he will be disheartened. Then
    he will turn back and rage against the holy covenant, and he will act. He will
    turn back and pay attention to those who forsake the holy covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ships from Kittim'; Kittim can refer to Cyprus or, more broadly, western
      maritime powers.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will show regard for' those who forsake the holy covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיִּים כִּתִּים
  chosen: ships of Kittim
  alternatives:
  - coastlands of Kittim
  - western ships
  - ships from Cyprus
  lexicon: HALOT
  rationale: In context צִיִּים denotes seagoing vessels or maritime forces, and כִּתִּים
    refers to Kittim/Cyprus or western maritime powers. 'Ships of Kittim' preserves
    the traditional geographic expression while remaining intelligible and close to
    the Hebrew.
- source_word: וְנִכְאָה
  chosen: and he will be disheartened
  alternatives:
  - and he will be humbled
  - and he will be cowed
  - and he will be broken
  lexicon: HALOT
  rationale: The verb conveys being discouraged, intimidated, or humiliated by opposition.
    'Disheartened' fits the military-political context without overstating physical
    destruction.
- source_word: וְשָׁב
  chosen: he will turn back
  alternatives:
  - he will return
  lexicon: HALOT
  rationale: שׁוּב here marks reversal of course after setback. 'Turn back' is slightly
    more vivid in context than the more neutral 'return.'
- source_word: וְזָעַם
  chosen: and rage against
  alternatives:
  - and be enraged against
  - and show indignation against
  lexicon: HALOT
  rationale: The verb denotes anger or indignation expressed against an object. 'Rage
    against' communicates the hostile force of the action in natural English.
- source_word: בְּרִית קֹדֶשׁ / בְּרִית קוֹדֶשׁ
  chosen: the holy covenant
  alternatives:
  - the sacred covenant
  lexicon: HALOT
  rationale: This phrase refers to the covenant marked as holy, likely the covenant
    associated with Israel's worship and identity. 'Holy covenant' is the most direct
    and established rendering.
- source_word: וְעָשָׂה
  chosen: and he will act
  alternatives:
  - and he will take action
  - and he will do as he pleases
  lexicon: HALOT
  rationale: The verb is broad ('do/make/act'). In this compressed narrative sequence,
    'he will act' preserves the terseness of the Hebrew without importing a more specific
    object not stated in the text.
- source_word: וְיָבֵן
  chosen: and pay attention to
  alternatives:
  - and show regard for
  - and understand
  - and give consideration to
  lexicon: HALOT
  rationale: From בין in the Hiphil-like sense of considering or giving attention.
    Here it likely means he will take notice of or align himself with a group. 'Pay
    attention to' is readable and suitably broad.
- source_word: עֹזְבֵי
  chosen: those who forsake
  alternatives:
  - those who abandon
  - apostates from
  lexicon: HALOT
  rationale: The participle denotes people leaving or abandoning the covenant. 'Those
    who forsake' is faithful and avoids importing later technical terminology like
    'apostates' into the main text.
