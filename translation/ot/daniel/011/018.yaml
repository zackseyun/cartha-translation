id: DAN.11.18
reference: Daniel 11:18
source:
  edition: WLC
  text: ו/ישב פָּנָ֛י/ו לְ/אִיִּ֖ים וְ/לָכַ֣ד רַבִּ֑ים וְ/הִשְׁבִּ֨ית קָצִ֤ין חֶרְפָּת/וֹ֙
    ל֔/וֹ בִּלְתִּ֥י חֶרְפָּת֖/וֹ יָשִׁ֥יב לֽ/וֹ׀׃
translation:
  text: Then he will turn his face to the coastlands and capture many. But a commander
    will put an end to his reproach against him; indeed, he will repay his reproach
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the islands.' The Hebrew term can refer either to islands or more
      broadly to coastlands/maritime regions.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clauses is difficult. It may mean that a commander
      'will put an end to his reproach against him' and 'will turn his reproach back
      on him,' that is, repay the insult.
    reason: alternative_reading
lexical_decisions:
- source_word: וישב פניו
  chosen: he will turn his face
  alternatives:
  - he will turn his attention
  - he will set his face
  lexicon: HALOT
  rationale: The idiom literally means 'turn his face' and commonly denotes directing
    oneself toward a place or objective. Retaining 'face' preserves the Hebrew imagery
    while remaining understandable in English.
- source_word: לאיים
  chosen: to the coastlands
  alternatives:
  - to the islands
  - to the maritime lands
  lexicon: HALOT
  rationale: אִיִּים can denote islands or coastlands. In prophetic and historical
    contexts it often refers broadly to maritime/coastal regions. 'Coastlands' best
    fits the likely western campaign setting without over-specifying literal islands.
- source_word: ולכד רבים
  chosen: and capture many
  alternatives:
  - and seize many
  - and take many
  lexicon: HALOT
  rationale: לכד means to capture or seize. 'Capture' fits military conquest language
    naturally in English.
- source_word: רבים
  chosen: many
  alternatives:
  - many places
  - many people
  lexicon: HALOT
  rationale: The Hebrew adjective stands without an explicit noun. 'Many' preserves
    the terseness of the source and allows the object to remain contextually broad,
    likely referring to many territories or peoples subdued.
- source_word: והשבית
  chosen: will put an end to
  alternatives:
  - will cause to cease
  - will stop
  lexicon: HALOT
  rationale: The Hiphil of שבת here means to cause something to cease. 'Put an end
    to' is idiomatic and suitably forceful in context.
- source_word: קצין
  chosen: a commander
  alternatives:
  - a ruler
  - an officer
  - a captain
  lexicon: HALOT
  rationale: קצין denotes a leader or military official. 'Commander' best suits the
    martial context of Daniel 11.
- source_word: חרפתו לו
  chosen: his reproach against him
  alternatives:
  - the insult he inflicted on him
  - his taunt against him
  lexicon: HALOT
  rationale: חֶרְפָּה is reproach, disgrace, or insult. The pronominal construction
    is difficult; rendering it 'his reproach against him' preserves the relational
    sense without over-interpreting the syntax.
- source_word: בלתי חרפתו ישיב לו
  chosen: indeed, he will repay his reproach to him
  alternatives:
  - besides, he will turn back his reproach on him
  - without fail he will return his insult upon him
  lexicon: HALOT
  rationale: The clause is syntactically compressed and debated. יָשִׁיב in Hiphil
    commonly means 'cause to return/repay.' 'Repay his reproach to him' communicates
    reversal or requital while staying close to the Hebrew. 'Indeed' gives the force
    of בלתי here as emphatic rather than privative.
