id: DAN.11.39
reference: Daniel 11:39
source:
  edition: WLC
  text: וְ/עָשָׂ֞ה לְ/מִבְצְרֵ֤י מָֽעֻזִּים֙ עִם אֱל֣וֹהַּ נֵכָ֔ר אֲשֶׁ֥ר הכיר יַרְבֶּ֣ה
    כָב֑וֹד וְ/הִמְשִׁילָ/ם֙ בָּֽ/רַבִּ֔ים וַ/אֲדָמָ֖ה יְחַלֵּ֥ק בִּ/מְחִֽיר־׃
translation:
  text: And he will act against the strongest fortresses with a foreign god. Those
    whom he acknowledges, he will increase with honor, and he will make them rule
    over many, and he will divide land for a price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fortified strongholds' / 'for the fortresses of strongholds'; the
      Hebrew phrase is compressed and may be understood slightly differently.
    reason: lexical_alternative
  - marker: b
    text: Or 'by means of a foreign god.' The preposition 'with' may express either
      accompaniment or instrumentality.
    reason: lexical_alternative
  - marker: c
    text: Or 'those who acknowledge him.' The Hebrew could be taken differently, though
      'those whom he acknowledges' best fits the verbal form and following pronoun.
    reason: alternative_reading
  - marker: d
    text: Or 'he will apportion land for payment' or 'as a reward.' The phrase indicates
      a transactional distribution of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: And he will act
  alternatives:
  - And he will do
  - And he will deal
  lexicon: HALOT
  rationale: עשה is broad ('do/make/act'). In this military-political context, 'act'
    is idiomatic English and leaves the object/complement to specify hostile action
    without over-paraphrasing.
- source_word: לְמִבְצְרֵי מָעֻזִּים
  chosen: against the strongest fortresses
  alternatives:
  - against fortified strongholds
  - for the fortresses of strongholds
  lexicon: HALOT
  rationale: מִבְצָר denotes a fortified place/fortress; מָעוֹז denotes stronghold/strength.
    The lamed here is best taken in context as directional/adversative with the verb,
    yielding action directed against fortified strongholds. 'Strongest fortresses'
    captures the superlative-like force of the collocation in natural English.
- source_word: עִם אֱלוֹהַּ נֵכָר
  chosen: with a foreign god
  alternatives:
  - by means of a foreign god
  - together with a foreign god
  lexicon: HALOT
  rationale: עִם commonly means 'with.' Here it likely expresses accompaniment or
    instrumentality in relation to his campaign against fortresses. 'With a foreign
    god' preserves the ambiguity without forcing either 'by means of' or mere association.
- source_word: אֲשֶׁר הִכִּיר
  chosen: Those whom he acknowledges
  alternatives:
  - whomever he recognizes
  - those who acknowledge him
  lexicon: HALOT
  rationale: The Hiphil of נכר commonly means 'recognize/acknowledge.' Given the 3ms
    verbal form, the most straightforward sense is that he acknowledges certain persons,
    not that they acknowledge him. The plural object is then resumed by the pronominal
    suffix in הִמְשִׁילָם.
- source_word: יַרְבֶּה כָבוֹד
  chosen: he will increase with honor
  alternatives:
  - he will multiply honor
  - he will bestow great honor
  lexicon: HALOT
  rationale: The idiom is somewhat compressed. The sense is that he will cause honor
    to abound for them. 'Increase with honor' preserves the causative abundance idea
    while remaining readable.
- source_word: וְהִמְשִׁילָם בָּרַבִּים
  chosen: he will make them rule over many
  alternatives:
  - he will cause them to govern the many
  - he will appoint them over many people
  lexicon: HALOT
  rationale: משל in Hiphil means 'cause to rule/make ruler.' בָּרַבִּים is best rendered
    'over many' rather than a bare instrumental or locative phrase. This yields clear
    English and fits the political patronage context.
- source_word: וַאֲדָמָה יְחַלֵּק בִּמְחִיר
  chosen: he will divide land for a price
  alternatives:
  - he will apportion land for payment
  - he will parcel out land as a reward
  lexicon: HALOT
  rationale: אֲדָמָה is 'land/ground'; חלק in Piel is 'divide/apportion'; מְחִיר is
    'price/payment.' 'For a price' preserves the transactional sense without specifying
    whether the payment is literal money, bribery, or political compensation.
