id: DAN.11.41
reference: Daniel 11:41
source:
  edition: WLC
  text: וּ/בָא֙ בְּ/אֶ֣רֶץ הַ/צְּבִ֔י וְ/רַבּ֖וֹת יִכָּשֵׁ֑לוּ וְ/אֵ֨לֶּה֙ יִמָּלְט֣וּ
    מִ/יָּד֔/וֹ אֱד֣וֹם וּ/מוֹאָ֔ב וְ/רֵאשִׁ֖ית בְּנֵ֥י עַמּֽוֹן׃
translation:
  text: 'He will enter into the Beautiful Land, and many will fall; but these will
    escape from his hand: Edom, Moab, and the foremost of the sons of Ammon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glorious land' or 'the pleasant land.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'many'; the implied referent may be people or lands.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''the chief of the Ammonites.'' Hebrew: ''the foremost of the sons of
      Ammon.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: He will enter
  alternatives:
  - and he will come
  - and he will enter
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' With the following preposition
    בְּ ('into/in') plus 'land,' English idiom favors 'enter into'/'enter.' The subject
    continues from the preceding context, so 'He will enter' is the most natural rendering.
- source_word: בְּאֶרֶץ הַצְּבִי
  chosen: into the Beautiful Land
  alternatives:
  - into the glorious land
  - into the pleasant land
  lexicon: HALOT
  rationale: אֶרֶץ is 'land,' and צְבִי can denote beauty, splendor, or desirability.
    'Beautiful Land' preserves the Hebrew imagery without overinterpreting it, while
    remaining recognizable as a designation for the land of Israel/Judah in context.
- source_word: וְרַבּוֹת
  chosen: many
  alternatives:
  - many lands
  - many people
  lexicon: HALOT
  rationale: The feminine plural adjective stands substantivally here. Because no
    explicit noun is supplied, a concise English substantive is needed. 'Many' preserves
    the Hebrew's brevity and ambiguity better than supplying 'lands' or 'people,'
    either of which would interpret beyond the text.
- source_word: יִכָּשֵׁלוּ
  chosen: will fall
  alternatives:
  - will stumble
  - will be overthrown
  lexicon: HALOT
  rationale: The Niphal of כשל can mean 'stumble' or 'fall.' In this military-political
    context, 'will fall' communicates defeat/collapse naturally in English while retaining
    the metaphorical force.
- source_word: וְאֵלֶּה יִמָּלְטוּ
  chosen: but these will escape
  alternatives:
  - and these will escape
  - but these will be delivered
  lexicon: HALOT
  rationale: The conjunction marks contrast with the preceding clause in context,
    so 'but' is preferable to a merely additive 'and.' ימלטו means 'escape' or 'be
    delivered'; 'escape' fits the following phrase 'from his hand' idiomatically.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - out of his power
  - from his grasp
  lexicon: HALOT
  rationale: The Hebrew idiom 'from his hand' is transparent enough in English and
    preserves the concrete metaphor of power/control. A more dynamic rendering like
    'out of his power' is possible but less textually direct.
- source_word: אֱדוֹם וּמוֹאָב
  chosen: Edom, Moab
  lexicon: HALOT
  rationale: These are standard transliterations of the place/people names.
- source_word: וְרֵאשִׁית בְּנֵי עַמּוֹן
  chosen: and the foremost of the sons of Ammon
  alternatives:
  - and the chief of the Ammonites
  - and the remnant of the sons of Ammon
  lexicon: HALOT
  rationale: רֵאשִׁית here most naturally means 'first part,' 'beginning,' or by extension
    'foremost/chief part.' 'The foremost of the sons of Ammon' preserves the literal
    structure and avoids collapsing the phrase into the ethnic label 'Ammonites' without
    need. 'Remnant' is not the normal sense of רֵאשִׁית here.
