theological_decisions:
- issue: Referent of 'the Beautiful Land'
  chosen_reading: A designation for the land of Israel/Judah, left implicit in the
    translation
  alternative_readings:
  - a more general 'glorious land' without specific geographic identification
  rationale: The phrase functions as a geographic designation in Daniel's context,
    commonly understood as the land of Israel. The translation preserves the title-like
    expression rather than inserting an interpretive gloss such as 'Israel.'
- issue: Sense of the substantival feminine plural וְרַבּוֹת
  chosen_reading: Rendered generically as 'many' without specifying the implied noun
  alternative_readings:
  - many people
  - many countries/lands
  rationale: The Hebrew leaves the referent unstated. To preserve the text's ambiguity
    rather than resolve it, the main text uses 'many,' with alternatives noted in
    lexical documentation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
