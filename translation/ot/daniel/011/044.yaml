theological_decisions:
- issue: Rendering of חרם in a military-judgment context
  chosen_reading: to devote many to destruction
  alternative_readings:
  - to utterly destroy many
  - to put many under the ban
  rationale: The Hebrew distinguishes לְהַשְׁמִיד from וּלְהַחֲרִים, so the English
    should preserve a distinction rather than using two near-identical verbs. 'Devote
    ... to destruction' reflects the specialized חרם sense without importing later
    doctrinal claims.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
