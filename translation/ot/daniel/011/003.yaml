id: DAN.11.3
reference: Daniel 11:3
source:
  edition: WLC
  text: וְ/עָמַ֖ד מֶ֣לֶךְ גִּבּ֑וֹר וּ/מָשַׁל֙ מִמְשָׁ֣ל רַ֔ב וְ/עָשָׂ֖ה כִּ/רְצוֹנֽ/וֹ׃
translation:
  text: Then a mighty king will arise, and he will rule with great dominion and do
    as he pleases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and do according to his will.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  chosen: Then ... will arise
  alternatives:
  - And ... arose
  - And ... will stand up
  lexicon: HALOT
  rationale: The verb עמד in this prophetic narrative context commonly means 'arise'
    or 'appear on the scene' of a ruler, not merely 'stand.' The prefixed conjunction
    is rendered 'Then' rather than a bare 'And' to reflect sequential development
    in readable English while preserving the narrative flow.
- source_word: מֶלֶךְ גִּבּוֹר
  chosen: a mighty king
  alternatives:
  - a strong king
  - a warrior king
  lexicon: HALOT
  rationale: גִּבּוֹר denotes strength, might, or prowess. 'Mighty king' is the most
    natural and sufficiently broad rendering, preserving both political and martial
    force without over-specifying 'warrior.'
- source_word: וּמָשַׁל
  chosen: and he will rule
  alternatives:
  - and he will reign
  - and he will govern
  lexicon: HALOT
  rationale: משל emphasizes exercising rule or dominion. 'Rule' fits well with the
    following cognate noun and avoids the narrower dynastic nuance of 'reign.'
- source_word: מִמְשָׁל רַב
  chosen: with great dominion
  alternatives:
  - a great dominion
  - extensive rule
  - great authority
  lexicon: HALOT
  rationale: The cognate construction with משל intensifies the scope of rule. 'With
    great dominion' preserves the noun's force and the Hebrew emphasis better than
    a flatter adverbial rendering like 'mightily.'
- source_word: וְעָשָׂה כִּרְצוֹנוֹ
  chosen: and do as he pleases
  alternatives:
  - and do according to his will
  - and act according to his desire
  lexicon: HALOT
  rationale: The idiom means acting in accordance with one's own will or pleasure,
    often with the sense of unchecked power. 'Do as he pleases' is idiomatic modern
    English and captures the force without unnecessary stiffness.
