id: DAN.11.1
reference: Daniel 11:1
source:
  edition: WLC
  text: וַ/אֲנִי֙ בִּ/שְׁנַ֣ת אַחַ֔ת לְ/דָרְיָ֖וֶשׁ הַ/מָּדִ֑י עָמְדִ֛/י לְ/מַחֲזִ֥יק
    וּ/לְ/מָע֖וֹז לֽ/וֹ׃
translation:
  text: And as for me, in the first year of Darius the Mede, I stood up to strengthen
    and protect him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'I stood ... to strengthen and to be a stronghold for
      him.'
    reason: lexical_alternative
  - marker: b
    text: In the Hebrew tradition this is Daniel 11:1; in some English versifications
      it is counted as Daniel 10:21b–11:1 or Daniel 11:1 with slightly different chapter
      division.
    reason: textual_variant
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And as for me
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a shift back to the speaker
    with mild emphasis. 'And as for me' preserves the discourse transition more clearly
    than a bare 'And I.'
- source_word: בִּשְׁנַת אַחַת
  chosen: in the first year
  alternatives:
  - in year one
  - in one year
  lexicon: HALOT
  rationale: In regnal-year dating, the idiom means 'in the first year,' not merely
    'in one year.' This is the natural English equivalent of the Hebrew construct
    phrase.
- source_word: לְדָרְיָוֶשׁ הַמָּדִי
  chosen: of Darius the Mede
  alternatives:
  - for Darius the Mede
  lexicon: HALOT
  rationale: The preposition with a regnal year is idiomatically rendered 'of Darius
    the Mede.' The personal name is transliterated, and the ethnic title is translated.
- source_word: עָמְדִי
  chosen: I stood up
  alternatives:
  - I stood
  - I took my stand
  lexicon: HALOT
  rationale: The verb עמד commonly means 'stand' or 'take one's stand.' 'Stood up'
    fits the context of active support by the angelic speaker and leads naturally
    into the purpose clauses that follow.
- source_word: לְמַחֲזִיק
  chosen: to strengthen
  alternatives:
  - to support
  - to hold fast
  lexicon: HALOT
  rationale: From חזק in the causative sense, the infinitive expresses giving strength
    or support. 'Strengthen' is concise and fits both military and personal support
    contexts.
- source_word: וּלְמָעוֹז
  chosen: and protect
  alternatives:
  - and be a fortress
  - and be a stronghold
  - and give refuge
  lexicon: HALOT
  rationale: מָעוֹז literally denotes a place or means of strength/fortification.
    In smooth English with the preceding infinitive, 'and protect' conveys the functional
    sense, while the more literal 'be a stronghold' is preserved in a footnote.
- source_word: לוֹ
  chosen: him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronoun refers most naturally to Darius in context. English idiom
    after 'strengthen and protect' takes the object as 'him,' though 'for him' is
    a possible more literal rendering.
