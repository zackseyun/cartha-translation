theological_decisions:
- issue: Nature of the faithful response in the final clause
  chosen_reading: The verse contrasts apostates corrupted by the king with covenant-faithful
    people who remain steadfast and act decisively.
  alternative_readings:
  - The final verb could be left more formally as 'and do' without specifying decisive
    action.
  rationale: The Hebrew עשה is semantically broad, but in this context of persecution
    and resistance, an action-oriented rendering best reflects the narrative force
    while avoiding embellishment. This preserves the text's theological contrast between
    apostasy and fidelity without importing later doctrinal themes.
  doctrine_reference: Translation philosophy §§1, 3, 6
