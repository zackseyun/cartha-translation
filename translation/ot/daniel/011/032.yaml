id: DAN.11.32
reference: Daniel 11:32
source:
  edition: WLC
  text: וּ/מַרְשִׁיעֵ֣י בְרִ֔ית יַחֲנִ֖יף בַּ/חֲלַקּ֑וֹת וְ/עַ֛ם יֹדְעֵ֥י אֱלֹהָ֖י/ו
    יַחֲזִ֥קוּ וְ/עָשֽׂוּ׃
translation:
  text: He will corrupt with smooth words those who act wickedly against the covenant,
    but the people who know their God will stand firm and take action.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with flattery' or 'by flatteries.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be strong and act.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַרְשִׁיעֵי בְרִית
  chosen: those who act wickedly against the covenant
  alternatives:
  - those who violate the covenant wickedly
  - the wicked against the covenant
  - those who profane the covenant
  lexicon: HALOT
  rationale: The participial form from רשע denotes people acting wickedly or guilty
    ones. In construct with בְרִית, the sense is not merely 'wicked covenant-makers'
    but persons behaving wickedly in relation to the covenant. 'Against the covenant'
    best captures the relational force in clear English.
- source_word: יַחֲנִיף
  chosen: he will corrupt
  alternatives:
  - he will make godless
  - he will seduce
  - he will defile
  lexicon: HALOT
  rationale: The Hiphil of חנף can carry the sense of causing profaneness/godlessness
    or leading into impiety. In this context, with flattering speech as the means,
    'corrupt' captures moral/religious seduction without over-specifying the mechanism.
- source_word: בַּחֲלַקּוֹת
  chosen: with smooth words
  alternatives:
  - with flattery
  - with smooth things
  - by flatteries
  lexicon: HALOT
  rationale: The noun from חלק refers to smoothness and idiomatically to flattering
    or slippery speech. 'With smooth words' preserves the metaphor while remaining
    natural English; the more interpretive 'with flattery' is preserved as an alternative.
- source_word: וְעַם
  chosen: but the people
  alternatives:
  - and the people
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' the clause is strongly adversative
    in context, contrasting covenant violators with the faithful. 'But' communicates
    the discourse relation in idiomatic English.
- source_word: יֹדְעֵי אֱלֹהָיו
  chosen: who know their God
  alternatives:
  - knowing their God
  - who know his God
  lexicon: HALOT
  rationale: 'The participle denotes an ongoing relational knowledge. Because the
    antecedent is plural (''people''), English naturally shifts the 3ms suffix in
    אֱלֹהָיו to distributive plural sense: ''their God.'' This avoids awkwardness
    while preserving the covenantal relationship.'
- source_word: יַחֲזִקוּ
  chosen: will stand firm
  alternatives:
  - will be strong
  - will show strength
  lexicon: HALOT
  rationale: 'The Hiphil of חזק here likely has an intransitive/resultative sense
    in context: remaining strong or firm in resistance. ''Stand firm'' expresses steadfastness
    more idiomatically than the wooden ''be strong'' while retaining the force of
    resilience.'
- source_word: וְעָשׂוּ
  chosen: and take action
  alternatives:
  - and act
  - and do exploits
  - and accomplish
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, act, accomplish'). In this military-conflict
    context it implies decisive action rather than unspecified doing. 'Take action'
    is natural and contextually appropriate without importing the traditional but
    interpretive 'do exploits.'
