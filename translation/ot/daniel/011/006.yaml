id: DAN.11.6
reference: Daniel 11:6
source:
  edition: WLC
  text: וּ/לְ/קֵ֤ץ שָׁנִים֙ יִתְחַבָּ֔רוּ וּ/בַ֣ת מֶֽלֶךְ הַ/נֶּ֗גֶב תָּבוֹא֙ אֶל
    מֶ֣לֶךְ הַ/צָּפ֔וֹן לַ/עֲשׂ֖וֹת מֵישָׁרִ֑ים וְ/לֹֽא תַעְצֹ֞ר כּ֣וֹחַ הַ/זְּר֗וֹעַ
    וְ/לֹ֤א יַעֲמֹד֙ וּ/זְרֹע֔/וֹ וְ/תִנָּתֵ֨ן הִ֤יא וּ/מְבִיאֶ֨י/הָ֙ וְ/הַ/יֹּ֣לְדָ֔/הּ
    וּ/מַחֲזִקָ֖/הּ בָּ/עִתִּֽים־־־׃
translation:
  text: At the end of years they will join together, and the daughter of the king
    of the South will come to the king of the North to make an agreement. But she
    will not retain the strength of her arm, and he and his arm will not stand; and
    she will be given up, along with those who brought her, and the one who fathered
    her, and the one who supported her in those times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make equitable terms' or 'to bring about an upright settlement.'
      The Hebrew literally speaks of 'making uprightnesses/equities.'
    reason: lexical_alternative
  - marker: b
    text: '''The one who fathered her'' follows the masculine form of the Hebrew participle.
      Some translations render this as ''child'' or understand a different referent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקֵץ שָׁנִים
  chosen: At the end of years
  alternatives:
  - After some years
  - At the end of some years
  lexicon: HALOT
  rationale: קֵץ means 'end' or 'termination'; with שָׁנִים the phrase is idiomatic
    for the lapse of a period of years. 'At the end of years' preserves the Hebrew
    structure while remaining intelligible.
- source_word: יִתְחַבָּרוּ
  chosen: they will join together
  alternatives:
  - they will ally themselves
  - they will unite
  lexicon: HALOT
  rationale: The hitpael of חבר conveys joining or allying oneself. 'Join together'
    is broad enough to cover political alliance without over-specifying beyond the
    verb itself.
- source_word: וּבַת מֶלֶךְ הַנֶּגֶב
  chosen: the daughter of the king of the South
  alternatives:
  - a daughter of the king of the South
  lexicon: HALOT
  rationale: The construct chain is definite in context. 'King of the South' is the
    established directional-political designation in Daniel 11 and should be retained
    consistently.
- source_word: תָּבוֹא אֶל מֶלֶךְ הַצָּפוֹן
  chosen: will come to the king of the North
  alternatives:
  - will go to the king of the North
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. 'Come to' is natural
    English and does not distort the movement toward the northern king.
- source_word: לַעֲשׂוֹת מֵישָׁרִים
  chosen: to make an agreement
  alternatives:
  - to make terms
  - to bring about equity
  - to make peace
  lexicon: HALOT
  rationale: מֵישָׁרִים literally denotes uprightness/equity/rightness. In this diplomatic
    context it refers to establishing equitable terms or an agreement. 'Make an agreement'
    communicates the political sense clearly; the more literal nuance is preserved
    in a footnote.
- source_word: לֹא תַעְצֹר כּוֹחַ הַזְּרוֹעַ
  chosen: she will not retain the strength of her arm
  alternatives:
  - she will not keep the power of the arm
  - her strength will not endure
  lexicon: HALOT
  rationale: עצר here has the sense of holding fast/retaining. זְרוֹעַ is literally
    'arm' and often metaphorical for strength or power. The translation keeps the
    metaphor while clarifying it with 'strength'.
- source_word: וְלֹא יַעֲמֹד וּזְרֹעוֹ
  chosen: he and his arm will not stand
  alternatives:
  - he will not stand, nor his arm
  - he and his strength will not endure
  lexicon: HALOT
  rationale: The masculine singular likely refers to the northern king, followed by
    'his arm' as his power/support. 'Stand' preserves the Hebrew idiom of enduring
    or remaining established.
- source_word: וְתִנָּתֵן הִיא
  chosen: she will be given up
  alternatives:
  - she will be handed over
  - she will be delivered up
  lexicon: HALOT
  rationale: 'The nifal of נתן here is passive: she is surrendered/handed over. ''Given
    up'' is concise and fits the context of political collapse and betrayal.'
- source_word: וּמְבִיאֶיהָ
  chosen: those who brought her
  alternatives:
  - her attendants who brought her
  - those who escorted her
  lexicon: HALOT
  rationale: The participial form from בוא with suffix refers to the people who brought
    or escorted her. 'Those who brought her' is the most direct rendering.
- source_word: וְהַיֹּלְדָהּ
  chosen: the one who fathered her
  alternatives:
  - her father
  - the one who begot her
  lexicon: HALOT
  rationale: Although ילד can denote begetting or bearing, the masculine singular
    participle points to the male parent, not the mother. 'The one who fathered her'
    makes the grammatical gender explicit and avoids the misleading 'mother' found
    in some traditional renderings.
- source_word: וּמַחֲזִקָהּ
  chosen: the one who supported her
  alternatives:
  - the one who strengthened her
  - the one who upheld her
  lexicon: HALOT
  rationale: The hiphil participle of חזק means to make strong, support, or uphold.
    The referent is likely a political supporter or protector. 'Supported her' is
    idiomatic and suitably broad.
- source_word: בָּעִתִּים
  chosen: in those times
  alternatives:
  - at that time
  - in that period
  lexicon: HALOT
  rationale: The plural 'times' is retained, but English idiom prefers 'in those times'
    for a historical period.
