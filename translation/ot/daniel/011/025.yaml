id: DAN.11.25
reference: Daniel 11:25
source:
  edition: WLC
  text: וְ/יָעֵר֩ כֹּח֨/וֹ וּ/לְבָב֜/וֹ עַל מֶ֣לֶךְ הַ/נֶּגֶב֮ בְּ/חַ֣יִל גָּדוֹל֒
    וּ/מֶ֣לֶךְ הַ/נֶּ֗גֶב יִתְגָּרֶה֙ לַ/מִּלְחָמָ֔ה בְּ/חַֽיִל גָּד֥וֹל וְ/עָצ֖וּם
    עַד מְאֹ֑ד וְ/לֹ֣א יַעֲמֹ֔ד כִּֽי יַחְשְׁב֥וּ עָלָ֖י/ו מַחֲשָׁבֽוֹת־־־־׃
translation:
  text: And he will stir up his power and his heart against the king of the South
    with a great army, and the king of the South will engage in battle with a very
    great and mighty army, but he will not stand, for they will devise schemes against
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will not prevail' / 'he will not hold his ground.' The Hebrew literally
      reads 'he will not stand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will plot against him.' The Hebrew uses a cognate expression, literally
      'they will think thoughts against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָעֵר
  chosen: he will stir up
  alternatives:
  - he will arouse
  - he will rouse
  lexicon: HALOT
  rationale: The Hiphil of עור here conveys rousing or mobilizing. 'Stir up' is idiomatic
    in English and fits the military context without overparaphrasing.
- source_word: כֹּחוֹ
  chosen: his power
  alternatives:
  - his strength
  - his force
  lexicon: HALOT
  rationale: כֹּחַ commonly means strength or power. 'His power' works well with the
    verb 'stir up' and can include military capability.
- source_word: וּלְבָבוֹ
  chosen: and his heart
  alternatives:
  - and his courage
  - and his mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב often denotes the inner disposition, resolve, or courage. 'Heart'
    preserves the Hebrew imagery; the military sense of resolve is carried by context.
- source_word: עַל מֶלֶךְ הַנֶּגֶב
  chosen: against the king of the South
  alternatives:
  - against the king of the Negev
  lexicon: HALOT
  rationale: In Daniel 11, נֶגֶב functions as a geopolitical directional designation.
    'King of the South' is the clearest contextual rendering in English.
- source_word: בְּחַיִל גָּדוֹל
  chosen: with a great army
  alternatives:
  - with great force
  - with a large host
  lexicon: HALOT
  rationale: חַיִל in military contexts refers to army/forces. 'Great army' is natural
    and specific.
- source_word: יִתְגָּרֶה לַמִּלְחָמָה
  chosen: will engage in battle
  alternatives:
  - will wage war
  - will stir himself up for war
  - will provoke himself to war
  lexicon: HALOT
  rationale: The Hitpael of גרה means to engage or stir oneself up for conflict. 'Engage
    in battle' is readable modern English and preserves the military action.
- source_word: בְּחַיִל גָּדוֹל וְעָצוּם עַד מְאֹד
  chosen: with a very great and mighty army
  alternatives:
  - with a great and exceedingly strong army
  - with a very large and powerful force
  lexicon: HALOT
  rationale: The phrase intensifies the size and strength of the army. 'Very great
    and mighty army' preserves both גָּדוֹל and עָצוּם with the intensifier עַד מְאֹד.
- source_word: וְלֹא יַעֲמֹד
  chosen: but he will not stand
  alternatives:
  - but he will not prevail
  - but he will not hold his ground
  lexicon: HALOT
  rationale: The idiom literally says 'will not stand,' often meaning fail to endure
    or prevail. The more formal wording is retained in the main text because it is
    clear enough in context.
- source_word: יַחְשְׁבוּ עָלָיו מַחֲשָׁבוֹת
  chosen: they will devise schemes against him
  alternatives:
  - they will plot against him
  - they will devise plans against him
  lexicon: HALOT
  rationale: The cognate construction 'think thoughts' is idiomatic for plotting or
    devising schemes. 'Devise schemes' captures the hostile strategic sense without
    wooden repetition.
