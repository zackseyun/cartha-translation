id: DAN.11.11
reference: Daniel 11:11
source:
  edition: WLC
  text: וְ/יִתְמַרְמַר֙ מֶ֣לֶךְ הַ/נֶּ֔גֶב וְ/יָצָ֕א וְ/נִלְחַ֥ם עִמּ֖/וֹ עִם מֶ֣לֶךְ
    הַ/צָּפ֑וֹן וְ/הֶעֱמִיד֙ הָמ֣וֹן רָ֔ב וְ/נִתַּ֥ן הֶ/הָמ֖וֹן בְּ/יָדֽ/וֹ־׃
translation:
  text: Then the king of the South will become enraged, and he will go out and fight
    with him, with the king of the North; and he will raise up a great multitude,
    but the multitude will be given into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be stirred up' / 'will become embittered.' The Hebrew verb conveys
      intense inner agitation leading to action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fight with him, with the king of the North'—that is, engage in battle
      against him.
    reason: lexical_alternative
  - marker: c
    text: '''Into his hand'' is a Hebrew idiom meaning ''into his power.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְיִתְמַרְמַר
  chosen: will become enraged
  alternatives:
  - will be stirred up
  - will be embittered
  - will become provoked
  lexicon: HALOT
  rationale: The Hitpael of מרמר conveys strong inner agitation or bitterness leading
    to anger. 'Will become enraged' captures the emotional force in natural English
    better than the more wooden 'be stirred up,' while preserving the causative-reflexive
    sense.
- source_word: מֶלֶךְ הַנֶּגֶב
  chosen: the king of the South
  alternatives:
  - the southern king
  lexicon: HALOT
  rationale: This is the established directional royal title in Daniel 11. 'King of
    the South' preserves the formal geopolitical designation used throughout the chapter.
- source_word: וְיָצָא
  chosen: he will go out
  alternatives:
  - he will march out
  - he will come out
  lexicon: HALOT
  rationale: The verb literally means 'go out.' In military context 'march out' is
    possible, but 'go out' keeps the wording closer to the Hebrew while remaining
    clear.
- source_word: וְנִלְחַם עִמּוֹ
  chosen: fight with him
  alternatives:
  - wage war with him
  - fight against him
  lexicon: HALOT
  rationale: The idiom with עם can mean engage in battle with/against someone. 'Fight
    with him' is a close rendering, and the following apposition clarifies that the
    opponent is the king of the North.
- source_word: עִם מֶלֶךְ הַצָּפוֹן
  chosen: with the king of the North
  alternatives:
  - against the king of the North
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In English, 'fight with him, with
    the king of the North' preserves the Hebrew structure, though context clearly
    indicates hostile engagement rather than alliance.
- source_word: וְהֶעֱמִיד
  chosen: he will raise up
  alternatives:
  - he will muster
  - he will set in place
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to cause to stand, hence to set up or muster.
    'Raise up' preserves the verbal imagery and works well with 'a great multitude.'
- source_word: הָמוֹן רָב
  chosen: a great multitude
  alternatives:
  - a great army
  - a large multitude
  lexicon: HALOT
  rationale: המון denotes a mass, multitude, or crowd; in military context it can
    refer to a large host. 'Great multitude' stays closer to the Hebrew and allows
    the next clause to repeat the same noun for rhetorical continuity.
- source_word: וְנִתַּן הֶהָמוֹן בְּיָדוֹ
  chosen: but the multitude will be given into his hand
  alternatives:
  - and the multitude will be given into his hand
  - but that multitude will be handed over to him
  lexicon: HALOT
  rationale: 'The Niphal of נתן commonly expresses being handed over. ''Into his hand''
    is a standard Hebrew idiom for being delivered into someone''s power and should
    be preserved. I rendered the conjunction as ''but'' to reflect the adversative
    sense in context: despite the northern king''s raising a great multitude, that
    multitude is delivered to the southern king.'
