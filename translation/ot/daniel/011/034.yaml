id: DAN.11.34
reference: Daniel 11:34
source:
  edition: WLC
  text: וּ/בְ/הִכָּ֣שְׁלָ֔/ם יֵעָזְר֖וּ עֵ֣זֶר מְעָ֑ט וְ/נִלְו֧וּ עֲלֵי/הֶ֛ם רַבִּ֖ים
    בַּ/חֲלַקְלַקּֽוֹת׃
translation:
  text: When they stumble, they will receive a little help, and many will join themselves
    to them with smooth words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with flattery' / 'through flatteries.' The Hebrew literally refers to
      'smooth things/words,' a common image for deceptive or flattering speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהִכָּשְׁלָם
  chosen: When they stumble
  alternatives:
  - When they fall
  - In their stumbling
  lexicon: HALOT
  rationale: 'The Niphal infinitive construct of כשל with prefixed ב marks a temporal
    circumstance: ''when/in their stumbling.'' ''Stumble'' preserves the metaphor
    and avoids over-specifying a total collapse implied by ''fall,'' though ''fall''
    is a viable alternative in context.'
- source_word: יֵעָזְרוּ
  chosen: they will receive help
  alternatives:
  - they will be helped
  lexicon: HALOT
  rationale: Niphal imperfect of עזר is passive/reflexive in sense. English idiom
    is smoother with 'receive help,' while preserving the passive idea that aid comes
    to them rather than from them.
- source_word: עֵזֶר מְעָט
  chosen: a little help
  alternatives:
  - a small help
  - some slight help
  lexicon: HALOT
  rationale: The noun plus adjective expresses limited assistance. 'A little help'
    is natural modern English and keeps the minimization explicit.
- source_word: וְנִלְווּ עֲלֵיהֶם
  chosen: many will join themselves to them
  alternatives:
  - many will join them
  - many will attach themselves to them
  lexicon: HALOT
  rationale: The Niphal/Qal passive-like form of לוה here conveys attaching or joining
    oneself to a group. 'Join themselves to them' preserves the reflexive nuance more
    clearly than the simpler 'join them,' though the latter is idiomatic.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: Standard quantitative adjective; 'many' is the most direct and natural
    rendering.
- source_word: בַּחֲלַקְלַקּוֹת
  chosen: with smooth words
  alternatives:
  - with flattery
  - through flatteries
  - with slippery speech
  lexicon: HALOT
  rationale: The noun from חלקלק denotes smoothness metaphorically used for flattering
    or deceitful speech. 'With smooth words' preserves the underlying image and leaves
    room for the implied insincerity; 'with flattery' is a strong contextual alternative
    worth preserving.
