id: DAN.11.9
reference: Daniel 11:9
source:
  edition: WLC
  text: וּ/בָ֗א בְּ/מַלְכוּת֙ מֶ֣לֶךְ הַ/נֶּ֔גֶב וְ/שָׁ֖ב אֶל אַדְמָתֽ/וֹ־׃
translation:
  text: Then he will come into the realm of the king of the South, but he will return
    to his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And he will come into the kingdom of the king of the South, and he
      will return to his land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: Then he will come
  alternatives:
  - And he will come
  - He will come
  lexicon: HALOT
  rationale: The waw + qatal in this narrative-prophetic sequence is best rendered
    as a simple future/sequential action in English. 'Then' captures the progression
    from the prior verse more naturally than a bare 'and'.
- source_word: בְּמַלְכוּת
  chosen: into the realm
  alternatives:
  - into the kingdom
  - in the kingdom
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingship, kingdom, or realm. Here the sense is territorial-political
    domain, so 'realm' communicates the geographic-political idea clearly. The preposition
    בְ is taken in the directional sense with the verb 'come,' hence 'into' rather
    than merely 'in'.
- source_word: מֶלֶךְ הַנֶּגֶב
  chosen: the king of the South
  alternatives:
  - the king of the Negev
  - the southern king
  lexicon: HALOT
  rationale: This is the established contextual title in Daniel 11 for the southern
    ruler in the north/south conflict schema. 'South' is preferable to 'Negev' here
    because the phrase functions as a geopolitical designation, not merely a local
    toponym.
- source_word: וְשָׁב
  chosen: but he will return
  alternatives:
  - and he will return
  - then he will return
  lexicon: HALOT
  rationale: Though waw formally means 'and,' English style benefits from 'but' because
    the second clause marks a reversal or anticlimax after the incursion. This reflects
    discourse sense without adding content beyond the contrast implied by the sequence.
- source_word: אֶל אַדְמָתוֹ
  chosen: to his own land
  alternatives:
  - to his land
  - to his soil
  - to his ground
  lexicon: HALOT
  rationale: אַדָמָה literally denotes ground/land. In this political-military context,
    'land' is the natural English rendering. 'His own land' makes explicit the possessive
    force of the suffix in idiomatic English.
