id: DAN.11.40
reference: Daniel 11:40
source:
  edition: WLC
  text: וּ/בְ/עֵ֣ת קֵ֗ץ יִתְנַגַּ֤ח עִמּ/וֹ֙ מֶ֣לֶךְ הַ/נֶּ֔גֶב וְ/יִשְׂתָּעֵ֨ר עָלָ֜י/ו
    מֶ֣לֶךְ הַ/צָּפ֗וֹן בְּ/רֶ֨כֶב֙ וּ/בְ/פָ֣רָשִׁ֔ים וּ/בָ/אֳנִיּ֖וֹת רַבּ֑וֹת וּ/בָ֥א
    בַ/אֲרָצ֖וֹת וְ/שָׁטַ֥ף וְ/עָבָֽר׃
translation:
  text: At the time of the end, the king of the South will clash with him, and the
    king of the North will storm against him with chariots, horsemen, and many ships;
    he will enter into the lands and sweep through and pass on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will push at him.' The Hebrew verb literally evokes butting or goring
      and is used figuratively for hostile collision.
    reason: lexical_alternative
  - marker: b
    text: Or 'will come against him like a storm' / 'like a whirlwind.' The verb carries
      imagery of violent rushing.
    reason: lexical_alternative
  - marker: c
    text: Or 'countries' for 'lands.' The Hebrew plural can denote multiple territories
      or nations.
    reason: lexical_alternative
  - marker: d
    text: The pronoun 'him' is left unspecified in the Hebrew text; interpreters differ
      on its exact referent in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְעֵת קֵץ
  chosen: At the time of the end
  alternatives:
  - At the end time
  - At the time of the end
  lexicon: HALOT
  rationale: עֵת with קֵץ forms a temporal expression meaning the concluding period
    or appointed end. 'At the time of the end' is idiomatic and preserves the eschatological
    force without overinterpreting the exact chronology.
- source_word: יִתְנַגַּח
  chosen: will clash with
  alternatives:
  - will engage in combat with
  - will push at
  - will attack
  lexicon: HALOT
  rationale: The hitpael of נגח literally evokes butting/goring, used figuratively
    for hostile collision. 'Will clash with' preserves the reciprocal-combative sense
    better than the more wooden 'push at' while remaining close to the imagery.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' In this hostile context English
    'with him' after 'clash' naturally conveys opposition. 'Against him' is possible
    interpretively, but the more direct rendering is retained in the main text.
- source_word: מֶלֶךְ הַנֶּגֶב
  chosen: the king of the South
  alternatives:
  - the king of the Negev
  - the southern king
  lexicon: HALOT
  rationale: This is the established directional-political title in Daniel 11. 'South'
    is clearer in English than transliterating Negev here, since the phrase functions
    as a geopolitical designation.
- source_word: וְיִשְׂתָּעֵר עָלָיו
  chosen: will storm against him
  alternatives:
  - will come against him like a whirlwind
  - will rage against him
  - will attack him tempestuously
  lexicon: HALOT
  rationale: The verb conveys rushing or storming violently. 'Will storm against him'
    captures the force without importing the simile 'like a whirlwind,' which is not
    explicit in this verse though often inferred from the verb's imagery.
- source_word: מֶלֶךְ הַצָּפוֹן
  chosen: the king of the North
  alternatives:
  - the northern king
  lexicon: HALOT
  rationale: As with 'king of the South,' this is a recurring geopolitical title in
    Daniel 11 and is best rendered consistently.
- source_word: בְּרֶכֶב
  chosen: with chariots
  alternatives:
  - with chariotry
  lexicon: HALOT
  rationale: The singular collective noun is naturally rendered by the English plural
    'chariots' in military listing.
- source_word: וּבְפָרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: HALOT
  rationale: פָרָשִׁים denotes horsemen/riders. 'Horsemen' is slightly more formal-correspondent
    than 'cavalry' and fits the military inventory style.
- source_word: וּבָאֳנִיּוֹת רַבּוֹת
  chosen: and many ships
  alternatives:
  - and with many ships
  - and numerous ships
  lexicon: HALOT
  rationale: The preposition ב governs the whole military list, so English can smoothly
    render the final item as 'and many ships.' This preserves the sense of naval force
    without awkward repetition.
- source_word: וּבָא בָאֲרָצוֹת
  chosen: he will enter into the lands
  alternatives:
  - he will invade the countries
  - he will enter the lands
  lexicon: HALOT
  rationale: The plural אֲרָצוֹת is broad, 'lands/countries.' 'Enter into the lands'
    stays close to the Hebrew and leaves the scope somewhat open, whereas 'invade
    the countries' is more interpretive though contextually plausible.
- source_word: וְשָׁטַף
  chosen: and sweep through
  alternatives:
  - and overflow
  - and flood over
  lexicon: HALOT
  rationale: The verb literally suggests overflowing/flooding. In military context,
    'sweep through' communicates the metaphor naturally in modern English while preserving
    the image of overwhelming advance.
- source_word: וְעָבָר
  chosen: and pass on
  alternatives:
  - and pass through
  - and keep going
  lexicon: HALOT
  rationale: Following 'sweep through,' 'pass on' avoids redundancy while reflecting
    the sequential advance implied by עבר. 'Pass through' is possible but sounds repetitive
    beside the previous verb.
