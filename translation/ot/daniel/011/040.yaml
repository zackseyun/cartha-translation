theological_decisions:
- issue: Referent of the pronoun in 'with him' / 'against him'
  chosen_reading: Retain the pronoun as 'him' without identifying the figure
  alternative_readings:
  - the contemptible king of the previous context
  - a final eschatological ruler
  - the king of the North or South depending on interpretive scheme
  rationale: The Hebrew text gives only the pronoun and does not explicitly restate
    the antecedent here. To preserve interpretive openness and avoid importing a specific
    eschatological system, the translation leaves the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
