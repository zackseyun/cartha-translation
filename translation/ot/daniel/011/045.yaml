id: DAN.11.45
reference: Daniel 11:45
source:
  edition: WLC
  text: וְ/יִטַּע֙ אָהֳלֶ֣י אַפַּדְנ֔/וֹ בֵּ֥ין יַמִּ֖ים לְ/הַר צְבִי קֹ֑דֶשׁ וּ/בָא֙
    עַד קִצּ֔/וֹ וְ/אֵ֥ין עוֹזֵ֖ר לֽ/וֹ־־־׃
translation:
  text: He will pitch the tents of his royal pavilion between the seas and the beautiful
    holy mountain; yet he will come to his end, and there will be no one to help him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his palace,' 'his palatial tent,' or 'his pavilion.' The rare word likely
      refers to a royal residence or state pavilion.
    reason: lexical_alternative
  - marker: b
    text: Or 'the glorious holy mountain.' The Hebrew expression may denote the holy
      mountain in its beauty or splendor, likely referring to Zion/Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִטַּע
  chosen: He will pitch
  alternatives:
  - He will plant
  - He will set up
  lexicon: HALOT
  rationale: The verb נטע literally means 'plant,' but with tents as its object it
    idiomatically means to set up or pitch them. 'Pitch' is the most natural English
    collocation with tents while preserving the concrete imagery.
- source_word: אָהֳלֵי
  chosen: the tents of
  alternatives:
  - the tent(s) of
  lexicon: HALOT
  rationale: Plural construct 'tents of' is retained. The plural may reflect a royal
    encampment or pavilion complex rather than a single tent, so the plural should
    be preserved.
- source_word: אַפַּדְנוֹ
  chosen: his royal pavilion
  alternatives:
  - his palace
  - his palatial tent
  - his pavilion
  lexicon: HALOT
  rationale: This rare loanword likely denotes a palace or royal pavilion. In context
    with 'tents of,' 'royal pavilion' best captures the sense of an imperial encampment
    without flattening it to a permanent stone 'palace.'
- source_word: בֵּין יַמִּים
  chosen: between the seas
  alternatives:
  - between seas
  - between the sea and the sea
  lexicon: HALOT
  rationale: The Hebrew is literally plural, 'between seas.' 'Between the seas' is
    idiomatic English and preserves the plural geographical expression, likely referring
    to the region between major bodies of water.
- source_word: לְהַר צְבִי קֹדֶשׁ
  chosen: and the beautiful holy mountain
  alternatives:
  - at the mountain of holy beauty
  - and the glorious holy mountain
  - toward the beautiful holy mountain
  lexicon: HALOT
  rationale: צבי can mean beauty, glory, or splendor. 'Beautiful' is a clear modern
    rendering. The phrase likely refers to the holy mountain associated with Jerusalem/Zion.
    The preposition לְ after 'between the seas' is taken in a locative/directional
    sense within the larger phrase; in English, 'between the seas and the beautiful
    holy mountain' reads naturally.
- source_word: וּבָא עַד קִצּוֹ
  chosen: yet he will come to his end
  alternatives:
  - and he will come to his end
  - but he will come to his end
  lexicon: HALOT
  rationale: 'The clause marks the culmination of the king''s career. ''Come to his
    end'' is a close and idiomatic rendering. ''Yet'' brings out the adversative force
    in context: despite his encampment and apparent power, his end arrives.'
- source_word: וְאֵין עוֹזֵר לוֹ
  chosen: and there will be no one to help him
  alternatives:
  - and none will help him
  - with no helper for him
  lexicon: HALOT
  rationale: The participle עוזר means 'helping one/helper.' 'There will be no one
    to help him' is natural English that preserves the sense of utter abandonment.
