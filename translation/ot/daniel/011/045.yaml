theological_decisions:
- issue: Referent of the king in Daniel 11:45
  chosen_reading: The translation leaves the referent implicit as 'he' without identifying
    him in the text.
  alternative_readings:
  - Antiochus IV Epiphanes
  - an eschatological antichrist figure
  - a composite or typological ruler
  rationale: The Hebrew text itself uses only third-person verbal forms and suffixes.
    Because the identity of the figure is interpretively contested, the translation
    should not import a specific identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
