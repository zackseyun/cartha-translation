id: DAN.11.26
reference: Daniel 11:26
source:
  edition: WLC
  text: וְ/אֹכְלֵ֧י פַת בָּג֛/וֹ יִשְׁבְּר֖וּ/הוּ וְ/חֵיל֣/וֹ יִשְׁט֑וֹף וְ/נָפְל֖וּ
    חֲלָלִ֥ים רַבִּֽים־׃
translation:
  text: Those who eat his food will break him, and his army will be swept away, and
    many slain will fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who eat the bread of his table,' an idiom for close associates
      or dependents who betray him from within.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'break him,' a figurative expression for bringing about
      his ruin.
    reason: lexical_alternative
  - marker: c
    text: 'The verb evokes flood imagery: ''his army will overflow / be swept away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכְלֵי פַת בָּגוֹ
  chosen: those who eat his food
  alternatives:
  - those who eat his portion
  - those who eat his delicacies
  - those who eat the bread of his table
  lexicon: HALOT
  rationale: The idiom refers to those who partake of a ruler's provisions, that is,
    close associates or dependents at his table. 'Those who eat his food' is natural
    English and preserves the sense of intimate court association without over-specifying
    'table' where it is not explicit in the Hebrew.
- source_word: יִשְׁבְּרֻהוּ
  chosen: will break him
  alternatives:
  - will destroy him
  - will shatter him
  - will ruin him
  lexicon: HALOT
  rationale: שׁבר commonly means 'break' literally or figuratively. Here it describes
    betrayal leading to the king's undoing. 'Break him' keeps the metaphorical force
    of the Hebrew; stronger interpretive options like 'destroy' are possible but less
    transparent to the source image.
- source_word: חֵילוֹ
  chosen: his army
  alternatives:
  - his force
  - his troops
  - his military power
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or military force. In this war context,
    'army' best fits and is the clearest idiomatic rendering.
- source_word: יִשְׁטוֹף
  chosen: will be swept away
  alternatives:
  - will overflow
  - will be flooded over
  - will be overwhelmed
  lexicon: HALOT
  rationale: The verb שטף literally evokes overflowing or flooding. With 'his army'
    as the subject, passive English ('will be swept away') best conveys the military
    rout implied by the Hebrew image.
- source_word: וְנָפְלוּ חֲלָלִים רַבִּים
  chosen: and many slain will fall
  alternatives:
  - and many will fall slain
  - and many casualties will fall
  - and many pierced will fall
  lexicon: HALOT
  rationale: חֲלָלִים denotes the slain, those fatally struck down. Rendering it as
    'many slain will fall' preserves the noun and the starkness of the Hebrew, though
    'many will fall slain' is also idiomatic English.
