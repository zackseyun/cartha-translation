id: DAN.11.31
reference: Daniel 11:31
source:
  edition: WLC
  text: וּ/זְרֹעִ֖ים מִמֶּ֣/נּוּ יַעֲמֹ֑דוּ וְ/חִלְּל֞וּ הַ/מִּקְדָּ֤שׁ הַ/מָּעוֹז֙
    וְ/הֵסִ֣ירוּ הַ/תָּמִ֔יד וְ/נָתְנ֖וּ הַ/שִּׁקּ֥וּץ מְשׁוֹמֵֽם׃
translation:
  text: And forces from him will arise, and they will profane the sanctuary, the fortress,
    and remove the regular burnt offering, and set up the abomination that desolates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arms' or 'military forces' for 'forces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sanctuary, the fortress'; possibly 'the fortified sanctuary.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the regular/continual'; this refers to the regular daily burnt offering.
    reason: lexical_alternative
  - marker: d
    text: Or 'the abomination causing desolation.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּזְרֹעִים
  chosen: forces
  alternatives:
  - arms
  - military forces
  lexicon: HALOT
  rationale: זְרֹעִים literally means 'arms,' but in military/political contexts it
    commonly denotes armed strength or forces. 'Forces' communicates the idiomatic
    sense in clear modern English without over-literal obscurity.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - on his part
  - from him/it
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers back to the preceding kingly
    figure in the context. 'From him' preserves the personal reference while allowing
    the reader to infer agency from context.
- source_word: יַעֲמֹדוּ
  chosen: will arise
  alternatives:
  - will stand
  - will appear
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand,' but here in a military-political
    sequence it carries the sense of coming forward or taking position. 'Will arise'
    is idiomatic and preserves the future action.
- source_word: וְחִלְּלוּ
  chosen: they will profane
  alternatives:
  - they will defile
  - they will desecrate
  lexicon: HALOT
  rationale: חלל in the piel here means to treat as profane or desecrate. 'Profane'
    is slightly more formal but closely matches the lexical sense and fits sanctuary
    language.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'Sanctuary' is the most natural
    concise rendering in English and avoids over-specifying beyond the Hebrew.
- source_word: הַמָּעוֹז
  chosen: the fortress
  alternatives:
  - the stronghold
  - the place of refuge
  lexicon: HALOT
  rationale: מָעוֹז commonly means stronghold or fortress. In apposition to 'the sanctuary,'
    it likely characterizes the sanctuary as the fortified sanctuary/stronghold. 'The
    fortress' preserves the noun directly, though the relation is somewhat compressed
    in Hebrew.
- source_word: וְהֵסִירוּ
  chosen: and remove
  alternatives:
  - and take away
  - and abolish
  lexicon: HALOT
  rationale: סור in the hiphil means cause to depart, remove, take away. 'Remove'
    is a straightforward rendering that does not over-interpret whether the action
    is temporary or permanent.
- source_word: הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the regular offering
  - the continual offering
  lexicon: HALOT
  rationale: תָּמִיד by itself means 'regular/continual,' but in Daniel cultic context
    it is shorthand for the regular daily burnt offering. Rendering the implied sacrificial
    referent in English aids clarity while remaining faithful to established Hebrew
    usage.
- source_word: וְנָתְנוּ
  chosen: and set up
  alternatives:
  - and place
  - and put
  lexicon: HALOT
  rationale: נתן literally means 'give/put.' In context of installing an idolatrous
    object or sacrilegious thing, 'set up' is the most idiomatic English equivalent.
- source_word: הַשִּׁקּוּץ
  chosen: the abomination
  alternatives:
  - the detestable thing
  - the abominable thing
  lexicon: HALOT
  rationale: שִׁקּוּץ denotes something detestable, often idolatrous. 'Abomination'
    is the established and still intelligible English rendering, especially in Daniel's
    apocalyptic context.
- source_word: מְשׁוֹמֵם
  chosen: that desolates
  alternatives:
  - causing desolation
  - desolating
  lexicon: HALOT
  rationale: The participle from שׁמם can mean causing desolation or appalling devastation.
    'That desolates' yields a natural English relative clause and preserves the active
    force of the participle.
