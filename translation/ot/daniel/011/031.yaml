theological_decisions:
- issue: Relation of 'the sanctuary' and 'the fortress' (הַמִּקְדָּשׁ הַמָּעוֹז)
  chosen_reading: Render both nouns in sequence as 'the sanctuary, the fortress,'
    preserving the Hebrew appositional ambiguity.
  alternative_readings:
  - the fortified sanctuary
  - the sanctuary fortress
  rationale: The Hebrew juxtaposes the nouns without an explicit connector. Rather
    than resolve the syntax too tightly, the translation keeps both terms visible
    and allows the appositional sense to remain. This follows the doctrine's principle
    of preserving tension where the source is compact or ambiguous.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of הַתָּמִיד
  chosen_reading: Translate as 'the regular burnt offering' in the main text.
  alternative_readings:
  - the regular offering
  - the continual offering
  rationale: Although the noun 'offering' is implied rather than explicit, Daniel's
    cultic usage makes the sacrificial reference clear. Supplying 'burnt offering'
    communicates the referent for modern readers without importing extra theology.
  doctrine_reference: Translation philosophy §1, §6
