id: DAN.11.13
reference: Daniel 11:13
source:
  edition: WLC
  text: וְ/שָׁב֙ מֶ֣לֶךְ הַ/צָּפ֔וֹן וְ/הֶעֱמִ֣יד הָמ֔וֹן רַ֖ב מִן הָ/רִאשׁ֑וֹן וּ/לְ/קֵ֨ץ
    הָֽ/עִתִּ֤ים שָׁנִים֙ יָ֣בוֹא ב֔וֹא בְּ/חַ֥יִל גָּד֖וֹל וּ/בִ/רְכ֥וּשׁ רָֽב־׃
translation:
  text: Then the king of the north will return and raise a multitude greater than
    the former one; and at the end of the times, after some years, he will surely
    come with a great army and with much equipment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great multitude' for 'a multitude.' The Hebrew phrase can explicitly
      stress size as well as number.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the end of the appointed times, after years.' The Hebrew expression
      is compressed and may emphasize a set period having run its course.
    reason: lexical_alternative
  - marker: c
    text: Or 'with great supplies' for 'with much equipment.' The Hebrew can refer
      broadly to possessions or resources accompanying the campaign.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  chosen: Then ... will return
  alternatives:
  - and ... will return
  lexicon: HALOT
  rationale: שׁוּב in Qal commonly means 'return.' The prefixed conjunction advances
    the narrative; 'Then' gives natural English sequence while preserving the sense
    of continuation.
- source_word: מֶלֶךְ הַצָּפוֹן
  chosen: the king of the north
  alternatives:
  - the northern king
  lexicon: HALOT
  rationale: A literal rendering preserves the established directional royal title
    used throughout the chapter and avoids over-paraphrase.
- source_word: וְהֶעֱמִיד
  chosen: will raise
  alternatives:
  - will muster
  - will set up
  lexicon: HALOT
  rationale: Hiphil of עמד here has the sense of causing forces to stand or be assembled.
    'Raise' is concise and idiomatic for raising a force, while 'muster' is possible
    but slightly more interpretive.
- source_word: הָמוֹן רַב
  chosen: a multitude
  alternatives:
  - a great multitude
  - a large army
  - a great crowd
  lexicon: HALOT
  rationale: הָמוֹן denotes a mass, multitude, or throng; in military context it refers
    to a large host. 'A multitude' keeps the lexical breadth, while the military sense
    is clarified later by 'army.'
- source_word: מִן הָרִאשׁוֹן
  chosen: greater than the former one
  alternatives:
  - more than the first
  - greater than the former
  lexicon: HALOT
  rationale: The comparative use of מִן with הָרִאשׁוֹן points to comparison with
    the earlier force/campaign. 'Former one' makes the implied referent explicit in
    natural English.
- source_word: וּלְקֵץ הָעִתִּים שָׁנִים
  chosen: at the end of the times, after some years
  alternatives:
  - at the end of the appointed times, after years
  - after some years, at the end of the times
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. קֵץ is 'end'; עִתִּים are 'times'
    or 'appointed times'; שָׁנִים adds the sense of years having passed. The chosen
    rendering preserves both temporal elements without flattening them into a single
    vague phrase.
- source_word: יָבוֹא בּוֹא
  chosen: he will surely come
  alternatives:
  - he will come indeed
  - he will certainly come
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. 'Will
    surely come' is a standard English way to reflect that emphasis.
- source_word: בְּחַיִל גָּדוֹל
  chosen: with a great army
  alternatives:
  - with great force
  - with a great host
  lexicon: HALOT
  rationale: חַיִל can mean strength, wealth, or army; in this military context, especially
    paired with coming and with equipment, 'army' best fits.
- source_word: וּבִרְכוּשׁ רָב
  chosen: and with much equipment
  alternatives:
  - and with great supplies
  - and with much wealth
  lexicon: HALOT
  rationale: רְכוּשׁ often denotes goods, property, or possessions. In a campaign
    context, 'equipment' or 'supplies' best captures material resources accompanying
    the army. 'Equipment' is chosen as broad and military-appropriate.
