theological_decisions:
- issue: Historical-political language without importing later doctrinal interpretation
  chosen_reading: Render the verse as a description of the breakup and redistribution
    of a king's kingdom without specifying identities in the translation.
  alternative_readings:
  - Interpretively identifying the king and the fourfold division in the main text
  rationale: The verse itself describes the rise, breaking, and redistribution of
    a kingdom. Historical identifications may be correct in commentary, but the translation
    should not import them into the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
