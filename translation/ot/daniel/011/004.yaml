id: DAN.11.4
reference: Daniel 11:4
source:
  edition: WLC
  text: וּ/כְ/עָמְד/וֹ֙ תִּשָּׁבֵ֣ר מַלְכוּת֔/וֹ וְ/תֵחָ֕ץ לְ/אַרְבַּ֖ע רוּח֣וֹת הַ/שָּׁמָ֑יִם
    וְ/לֹ֣א לְ/אַחֲרִית֗/וֹ וְ/לֹ֤א כְ/מָשְׁל/וֹ֙ אֲשֶׁ֣ר מָשָׁ֔ל כִּ֤י תִנָּתֵשׁ֙
    מַלְכוּת֔/וֹ וְ/לַ/אֲחֵרִ֖ים מִ/לְּ/בַד אֵֽלֶּה־׃
translation:
  text: And as soon as he has arisen, his kingdom will be broken and divided toward
    the four winds of heaven, but not to his posterity, and not according to the dominion
    with which he ruled; for his kingdom will be uprooted and given to others besides
    these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants.' The Hebrew phrase 'not to his latter end' here refers
      to those who would come after him in dynastic succession.
    reason: lexical_alternative
  - marker: b
    text: '''Toward the four winds of heaven'' is a Hebrew idiom for being divided
      in every direction, that is, toward the four points of the compass.'
    reason: cultural_note
lexical_decisions:
- source_word: וּכְעָמְדוֹ
  chosen: And as soon as he has arisen
  alternatives:
  - And when he has arisen
  - And after he has stood up
  lexicon: HALOT
  rationale: The idiom combines conjunction + preposition + infinitive construct of
    עמד with pronominal suffix, marking temporal sequence. In this context it refers
    to the king's rise to power, not merely physical standing. 'As soon as he has
    arisen' captures the immediacy implied by the context of rapid downfall.
- source_word: תִּשָּׁבֵר
  chosen: will be broken
  alternatives:
  - will be shattered
  lexicon: HALOT
  rationale: Niphal of שבר is passive/reflexive, indicating the kingdom is broken
    apart. 'Broken' is the most direct and natural rendering; 'shattered' is possible
    but slightly more interpretive in intensity.
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his realm
  lexicon: HALOT
  rationale: מַלְכוּת can denote reign, kingship, or kingdom. Here the political domain
    being divided is in view, so 'kingdom' best fits.
- source_word: וְתֵחָץ
  chosen: and divided
  alternatives:
  - and parceled out
  - and split
  lexicon: HALOT
  rationale: From חצה in the Niphal/related passive sense, the kingdom is divided
    up. English supplies 'and divided' smoothly after 'will be broken.'
- source_word: לְאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  chosen: toward the four winds of heaven
  alternatives:
  - to the four winds of heaven
  - toward the four winds of the sky
  lexicon: HALOT
  rationale: A standard directional idiom for the four points of the compass. 'Toward'
    preserves the directional force of לְ, while 'of heaven' reflects the Hebrew expression
    without flattening it to a mere meteorological phrase.
- source_word: וְלֹא לְאַחֲרִיתוֹ
  chosen: but not to his posterity
  alternatives:
  - but not to his descendants
  - but not to his end
  lexicon: HALOT
  rationale: אַחֲרִית often means end or latter end, but with pronominal suffix in
    this dynastic context it refers to what comes after him, i.e., his posterity/descendants.
    'Posterity' is concise and fits the succession context.
- source_word: וְלֹא כְמָשְׁלוֹ אֲשֶׁר מָשָׁל
  chosen: and not according to the dominion with which he ruled
  alternatives:
  - and not according to the authority that he exercised
  - and not like the rule with which he ruled
  lexicon: HALOT
  rationale: The noun מָשְׁל and verb מָשַׁל are cognate, emphasizing the scale/character
    of his rule. 'Dominion' preserves the political force better than the flatter
    'rule,' while 'with which he ruled' keeps the Hebrew's cognate construction visible
    in readable English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for why the kingdom will not pass on in the
    same way. 'For' is the most natural explanatory connector here.
- source_word: תִנָּתֵשׁ
  chosen: will be uprooted
  alternatives:
  - will be torn away
  - will be plucked up
  lexicon: HALOT
  rationale: Niphal of נתש conveys being torn out/uprooted. 'Uprooted' vividly preserves
    the metaphor of forcible removal from established place.
- source_word: וְלַאֲחֵרִים
  chosen: and given to others
  alternatives:
  - and to others
  - and for others
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'and to others,' but English idiom benefits
    from supplying 'given' from the context of transfer of rule. This is a minimal,
    warranted expansion for clarity.
- source_word: מִלְּבַד אֵלֶּה
  chosen: besides these
  alternatives:
  - apart from these
  - beyond these
  lexicon: HALOT
  rationale: The phrase indicates persons other than the previously mentioned parties.
    'Besides these' is direct and idiomatic.
