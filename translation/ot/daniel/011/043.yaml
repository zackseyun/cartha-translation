id: DAN.11.43
reference: Daniel 11:43
source:
  edition: WLC
  text: וּ/מָשַׁ֗ל בְּ/מִכְמַנֵּי֙ הַ/זָּהָ֣ב וְ/הַ/כֶּ֔סֶף וּ/בְ/כֹ֖ל חֲמֻד֣וֹת מִצְרָ֑יִם
    וְ/לֻבִ֥ים וְ/כֻשִׁ֖ים בְּ/מִצְעָדָֽי/ו׃
translation:
  text: And he will rule over the hidden stores of gold and silver, and over all the
    precious things of Egypt; and the Libyans and Cushites will be in his train.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasures of gold and silver' for 'the hidden stores of gold and silver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Libyans and Ethiopians will follow at his steps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁל
  chosen: And he will rule over
  alternatives:
  - And he will have dominion over
  - And he will control
  lexicon: HALOT
  rationale: The verb משל in this context denotes exercising dominion or control.
    'Rule over' is natural modern English and preserves the governing sense without
    over-paraphrase.
- source_word: בְּמִכְמַנֵּי
  chosen: over the hidden stores of
  alternatives:
  - over the treasures of
  - over the secret stores of
  lexicon: HALOT
  rationale: מִכְמָן refers to something hidden away, a store or treasure kept in
    reserve. 'Hidden stores' preserves the nuance better than the flatter 'treasures,'
    while still reading naturally.
- source_word: הַזָּהָב וְהַכֶּסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Standard material terms; no special nuance requires expansion.
- source_word: וּבְכֹל חֲמֻדוֹת מִצְרָיִם
  chosen: and over all the precious things of Egypt
  alternatives:
  - and over all the desirable things of Egypt
  - and over all the treasures of Egypt
  lexicon: HALOT
  rationale: חֲמֻדוֹת denotes desirable or precious things. 'Precious things' captures
    value without narrowing the sense to monetary treasure alone.
- source_word: לֻבִים
  chosen: Libyans
  alternatives:
  - Lubim
  lexicon: HALOT
  rationale: This ethnonym conventionally refers to Libyans or Libyan peoples. Translating
    the people-group rather than transliterating aids readability while preserving
    referent.
- source_word: כֻשִׁים
  chosen: Cushites
  alternatives:
  - Ethiopians
  lexicon: HALOT
  rationale: '''Cushites'' is preferred because it preserves the historical-geographical
    term כוש without importing the potentially anachronistic modern-national sense
    of ''Ethiopians.'''
- source_word: בְּמִצְעָדָיו
  chosen: will be in his train
  alternatives:
  - will follow in his steps
  - will be at his steps
  - will be in his retinue
  lexicon: HALOT
  rationale: The noun relates to step, march, or procession. In context it likely
    means these peoples accompany or follow him as part of his advance. 'In his train'
    is concise, idiomatic, and preserves the image of following in attendance.
