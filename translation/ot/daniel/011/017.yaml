id: DAN.11.17
reference: Daniel 11:17
source:
  edition: WLC
  text: וְ/יָשֵׂ֣ם פָּ֠נָי/ו לָ/ב֞וֹא בְּ/תֹ֧קֶף כָּל מַלְכוּת֛/וֹ וִ/ישָׁרִ֥ים עִמּ֖/וֹ
    וְ/עָשָׂ֑ה וּ/בַ֤ת הַ/נָּשִׁים֙ יִתֶּן ל֣/וֹ לְ/הַשְׁחִיתָ֔/הּ וְ/לֹ֥א תַעֲמֹ֖ד
    וְ/לֹא ל֥/וֹ תִהְיֶֽה׀־־־׃
translation:
  text: He will set his face to come with the strength of his whole kingdom, and upright
    ones will be with him; and he will act. He will give him the daughter of women
    to destroy it, but she will not stand, and she will not be for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and equitable terms will be with him,' or 'and an agreement will be
      made with him.' The Hebrew phrase 'upright ones' is difficult in context and
      may refer either to persons with him or to fair terms/arrangements.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the daughter of women,' likely referring to a royal daughter given
      in marriage; many understand this historically as a political marriage alliance.
    reason: cultural_note
  - marker: c
    text: The Hebrew suffix in 'to destroy it/her' is feminine singular and may refer
      either to the woman ('to ruin her') or to a feminine antecedent such as a kingdom
      or plan.
    reason: lexical_alternative
  - marker: d
    text: Or 'but it will not stand' or 'but she will not succeed.' The feminine verb
      may refer to the woman or to the scheme.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשֵׂם פָּנָיו
  chosen: he will set his face
  alternatives:
  - he will turn his attention
  - he will determine
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning to direct oneself resolutely toward
    an action. Retaining 'set his face' preserves the force and imagery of determined
    intent while remaining understandable in English.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to enter
  - to invade
  lexicon: HALOT
  rationale: The infinitive of בוא is broad. 'To come' is the most direct rendering;
    more specific military senses such as 'invade' are interpretive and not required
    by the word itself.
- source_word: בְּתֹקֶף
  chosen: with the strength
  alternatives:
  - with force
  - with might
  lexicon: HALOT
  rationale: תֹּקֶף denotes strength or force. 'With the strength' fits the military-political
    context and pairs naturally with 'his whole kingdom.'
- source_word: כָּל מַלְכוּתוֹ
  chosen: of his whole kingdom
  alternatives:
  - of all his kingdom
  - of his entire realm
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Whole kingdom' is natural English
    and conveys the total resources of his rule.
- source_word: וִישָׁרִים עִמּוֹ
  chosen: and upright ones will be with him
  alternatives:
  - and equitable terms will be with him
  - and an agreement will be with him
  lexicon: HALOT
  rationale: The adjective יָשָׁר/יְשָׁרִים normally means 'upright, straight.' In
    this difficult context it may refer either to upright persons/allies or to equitable
    arrangements. The main text keeps the more lexical rendering 'upright ones,' while
    the alternative diplomatic sense is preserved in a footnote because the phrase
    is contextually disputed.
- source_word: וְעָשָׂה
  chosen: and he will act
  alternatives:
  - and he will do so
  - and he will carry it out
  lexicon: HALOT
  rationale: עשה is semantically broad. 'He will act' is concise and preserves the
    open-ended Hebrew without over-specifying the action.
- source_word: וּבַת הַנָּשִׁים
  chosen: the daughter of women
  alternatives:
  - a daughter of women
  - the daughter of womenfolk
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew expression. In context it likely
    refers to a woman of notable beauty or a royal daughter given in marriage, but
    the phrase itself is best retained rather than paraphrased.
- source_word: יִתֶּן לוֹ
  chosen: he will give him
  alternatives:
  - he will give to him
  - he will hand over to him
  lexicon: HALOT
  rationale: Simple causative transfer language; 'give him' is idiomatic English.
- source_word: לְהַשְׁחִיתָהּ
  chosen: to destroy it
  alternatives:
  - to ruin her
  - to corrupt it
  lexicon: HALOT
  rationale: The suffix is feminine singular, creating ambiguity because it could
    refer to the woman or to a feminine antecedent such as kingdom/plan. Given the
    political context, 'it' best preserves the likely reference without forcing a
    personal object; the personal alternative is preserved in a footnote.
- source_word: וְלֹא תַעֲמֹד
  chosen: but she will not stand
  alternatives:
  - but it will not stand
  - but she will not succeed
  lexicon: HALOT
  rationale: The feminine singular verb can refer to the woman or to the scheme. Because
    the immediately preceding subject is the daughter, 'she will not stand' is the
    most natural surface reading, while broader interpretive alternatives are noted
    in a footnote.
- source_word: וְלֹא לוֹ תִהְיֶה
  chosen: and she will not be for him
  alternatives:
  - and she will not belong to him
  - and she will not be on his side
  lexicon: HALOT
  rationale: The Hebrew is terse and relational. 'Will not be for him' preserves the
    ambiguity between allegiance and possession, which suits the political-marital
    context better than a narrower paraphrase.
