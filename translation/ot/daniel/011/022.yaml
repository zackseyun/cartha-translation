theological_decisions:
- issue: Identity and definiteness of 'the prince of the covenant'
  chosen_reading: Render the phrase transparently without identifying the figure in
    translation.
  alternative_readings:
  - the high priest Onias III
  - a covenantal ruler more generally
  - a messianic figure (less likely in this context)
  rationale: The Hebrew phrase itself does not specify the historical identity. To
    avoid importing a disputed interpretation, the translation keeps the title literal
    and leaves identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
