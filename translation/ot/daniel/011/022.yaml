id: DAN.11.22
reference: Daniel 11:22
source:
  edition: WLC
  text: וּ/זְרֹע֥וֹת הַ/שֶּׁ֛טֶף יִשָּׁטְפ֥וּ מִ/לְּ/פָנָ֖י/ו וְ/יִשָּׁבֵ֑רוּ וְ/גַ֖ם
    נְגִ֥יד בְּרִֽית׃
translation:
  text: The flood-like forces will be swept away from before him and be broken, and
    also the prince of the covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'arms of the flood'; likely an idiom for overwhelming military
      forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'the leader of the covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְרֹעוֹת
  chosen: forces
  alternatives:
  - arms
  lexicon: HALOT
  rationale: Literally 'arms,' but in military-political context this idiom commonly
    refers to armed strength or forces. 'Forces' communicates the likely sense in
    clear English while preserving the martial image in a footnote alternative.
- source_word: הַשֶּׁטֶף
  chosen: flood-like
  alternatives:
  - of the flood
  - overflowing
  lexicon: HALOT
  rationale: The noun denotes an overflowing flood. In construct with 'arms/forces,'
    the phrase is idiomatic and difficult; 'flood-like forces' preserves the imagery
    while making the expression readable in English.
- source_word: יִשָּׁטְפוּ
  chosen: will be swept away
  alternatives:
  - will overflow
  - will be flooded away
  lexicon: HALOT
  rationale: 'Nifal here is best taken as passive/reflexive: they are overwhelmed
    or swept away. ''Will be swept away'' fits the flood imagery and the immediate
    parallel with ''be broken.'''
- source_word: מִלְּפָנָיו
  chosen: from before him
  alternatives:
  - before him
  - from his presence
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the spatial-confrontational sense:
    these forces are removed from in front of him, i.e., before his advance.'
- source_word: וְיִשָּׁבֵרוּ
  chosen: and be broken
  alternatives:
  - and be shattered
  lexicon: HALOT
  rationale: The verb שבר in the Nifal commonly means 'be broken' or 'be shattered.'
    'Be broken' is slightly more formal and leaves the degree of destruction open.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: Adds an additional object affected by the preceding verbs. 'And also'
    is natural and preserves the additive force.
- source_word: נְגִיד
  chosen: prince
  alternatives:
  - leader
  - ruler
  lexicon: HALOT
  rationale: The term denotes a leader, ruler, or prince. 'Prince' is a conventional
    and suitably elevated rendering in Daniel, while not requiring royal sonship.
- source_word: בְּרִית
  chosen: of the covenant
  alternatives:
  - of a covenant
  lexicon: HALOT
  rationale: The anarthrous Hebrew can still be definite in context. 'The covenant'
    is the traditional and likely contextual sense in Daniel, especially given the
    book's covenantal framework.
