theological_decisions:
- issue: Historical-political sense of the final clause
  chosen_reading: The verse predicts that the wealthy fourth Persian king will mobilize
    or provoke all under his power against the Greek kingdom.
  alternative_readings:
  - He will stir up everything, including the kingdom of Greece
  - He will stir up all on behalf of the kingdom of Greece
  rationale: 'This is primarily a lexical-syntactic decision rather than a doctrinal
    one, but it affects interpretation. The combination of עור with הכל and the following
    את מַלְכוּת יָוָן is best taken adversatively in context: the king rouses all
    against Greece. This avoids an unnatural reading and fits the flow of the chapter''s
    historical forecast.'
