id: DAN.11.2
reference: Daniel 11:2
source:
  edition: WLC
  text: וְ/עַתָּ֕ה אֱמֶ֖ת אַגִּ֣יד לָ֑/ךְ הִנֵּה עוֹד֩ שְׁלֹשָׁ֨ה מְלָכִ֜ים עֹמְדִ֣ים
    לְ/פָרַ֗ס וְ/הָֽ/רְבִיעִי֙ יַעֲשִׁ֤יר עֹֽשֶׁר גָּדוֹל֙ מִ/כֹּ֔ל וּ/כְ/חֶזְקָת֣/וֹ
    בְ/עָשְׁר֔/וֹ יָעִ֣יר הַ/כֹּ֔ל אֵ֖ת מַלְכ֥וּת יָוָֽן־־׃
translation:
  text: 'And now I will tell you the truth: behold, three more kings will arise for
    Persia, and the fourth will become far richer than all of them; and when he becomes
    strong through his riches, he will stir up everyone against the kingdom of Greece.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three additional kings will stand up for Persia.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fourth will gain great wealth beyond all.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he will rouse all against the kingdom of Greece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the next stage of revelation. 'And now'
    preserves the connective ו plus temporal עתה more fully than simply 'Now.'
- source_word: אֱמֶת
  chosen: the truth
  alternatives:
  - truth
  lexicon: HALOT
  rationale: 'Used adverbially/objectively with אַגִּיד: ''I will tell you the truth.''
    The article is natural in English though absent in Hebrew.'
- source_word: אַגִּיד לָךְ
  chosen: I will tell you
  alternatives:
  - I will declare to you
  - I will make known to you
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, tell, make known.' 'Tell you'
    is clear modern English and fits optimal equivalence.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retained as 'behold' to preserve the prophetic/deictic force without
    paraphrase.
- source_word: עוֹד שְׁלֹשָׁה מְלָכִים
  chosen: three more kings
  alternatives:
  - yet three kings
  - three additional kings
  lexicon: HALOT
  rationale: עוֹד adds the sense of addition. 'Three more kings' is the most natural
    English expression.
- source_word: עֹמְדִים לְפָרַס
  chosen: will arise for Persia
  alternatives:
  - will stand for Persia
  - will arise in Persia
  lexicon: HALOT
  rationale: עמד in royal succession contexts can mean 'arise/stand up.' 'For Persia'
    reflects לְ most directly, indicating relation to the Persian realm; 'in Persia'
    is possible but less literal.
- source_word: וְהָרְבִיעִי
  chosen: and the fourth
  alternatives:
  - then the fourth
  lexicon: HALOT
  rationale: Straightforward ordinal with conjunction, preserving sequence.
- source_word: יַעֲשִׁיר עֹשֶׁר גָּדוֹל מִכֹּל
  chosen: will become far richer than all of them
  alternatives:
  - will gain great wealth beyond all
  - will make himself rich with great wealth more than all
  lexicon: HALOT
  rationale: The Hiphil plus cognate noun intensifies the idea of becoming very wealthy.
    'Far richer than all of them' communicates the comparative force naturally in
    English.
- source_word: וּכְחֶזְקָתוֹ בְעָשְׁרוֹ
  chosen: and when he becomes strong through his riches
  alternatives:
  - and by his strength in his wealth
  - and when he is strong in his wealth
  lexicon: HALOT
  rationale: כְ here is temporal/circumstantial ('when/as'). The phrase links his
    strength to his wealth. 'Through his riches' makes the instrumental nuance clear.
- source_word: יָעִיר
  chosen: he will stir up
  alternatives:
  - he will rouse
  - he will incite
  lexicon: HALOT
  rationale: Hiphil of עור means awaken, rouse, stir up. In this military-political
    context, 'stir up' is idiomatic and broad enough to cover mobilization or provocation.
- source_word: הַכֹּל
  chosen: everyone
  alternatives:
  - all
  - everything
  lexicon: HALOT
  rationale: In context of political/military action, the object is best understood
    as people rather than things. 'Everyone' gives the idiomatic sense of mobilizing
    all persons under his sway.
- source_word: אֵת מַלְכוּת יָוָן
  chosen: against the kingdom of Greece
  alternatives:
  - against the realm of Greece
  - with the kingdom of Greece
  lexicon: HALOT
  rationale: 'Although את is normally the direct-object marker, with עור in this context
    the sense is adversative: he stirs up all against Greece. This matches the historical
    and syntactic sense better than ''stir up all, namely the kingdom of Greece.''
    ''Kingdom'' is the standard rendering of מַלְכוּת; יָוָן is the proper name Greece.'
