theological_decisions:
- issue: Interpretation of חֶמְדַּת נָשִׁים
  chosen_reading: Retain the ambiguous phrase 'the desire of women' in the main text.
  alternative_readings:
  - '''what women desire'' (general desire for marriage/sexual relations/children)'
  - '''the one desired by women'' (possibly a specific deity or messianic expectation)'
  rationale: The Hebrew phrase is genuinely ambiguous and has received multiple interpretations
    in Jewish and Christian tradition. In keeping with the translation philosophy,
    the main text preserves the ambiguity rather than importing a specific doctrinal
    or historical interpretation. Alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Number of אֱלֹהֵי אֲבֹתָיו
  chosen_reading: Translate as plural, 'the gods of his fathers.'
  alternative_readings:
  - '''the God of his fathers'''
  rationale: Although 'God of his fathers' is a familiar biblical idiom, the Hebrew
    form here is morphologically plural and the surrounding references to other deities
    support retaining the plural in translation. The singular alternative is preserved
    in a footnote because it is a significant traditional reading with interpretive
    implications.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation
    tradition.'
