id: DAN.11.37
reference: Daniel 11:37
source:
  edition: WLC
  text: וְ/עַל אֱלֹהֵ֤י אֲבֹתָי/ו֙ לֹ֣א יָבִ֔ין וְ/עַל חֶמְדַּ֥ת נָשִׁ֛ים וְ/עַֽל
    כָּל אֱל֖וֹהַּ לֹ֣א יָבִ֑ין כִּ֥י עַל כֹּ֖ל יִתְגַּדָּֽל־־־־־׃
translation:
  text: He will show no regard for the gods of his fathers, or for the desire of women,
    or for any god, because he will magnify himself above all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of his fathers.' The Hebrew form is plural ('gods of'), but
      some take it as the familiar idiom for Israel's God.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the desire of women.' This may mean 'what women desire' or 'the
      one desired by women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי אֲבֹתָיו
  chosen: the gods of his fathers
  alternatives:
  - the God of his fathers
  - the gods of his ancestors
  lexicon: HALOT
  rationale: The plural construct אֱלֹהֵי most naturally yields 'gods of.' Although
    some English versions render the phrase as singular ('God of his fathers') in
    light of Israelite idiom, the immediate context also speaks of 'any god,' favoring
    a straightforward plural reading here. 'Fathers' preserves the Hebrew wording
    more closely than the more interpretive 'ancestors.'
- source_word: לֹא יָבִין
  chosen: he will show no regard for
  alternatives:
  - he will not understand
  - he will not pay attention to
  - he will not consider
  lexicon: HALOT
  rationale: The verb בין literally means 'understand/consider,' but with עַל in this
    context it carries the sense of giving attention or regard. 'Show no regard for'
    communicates the idiomatic force in natural English without over-paraphrasing.
- source_word: חֶמְדַּת נָשִׁים
  chosen: the desire of women
  alternatives:
  - what women desire
  - the one desired by women
  lexicon: HALOT
  rationale: The construct phrase is lexically ambiguous. The most direct rendering
    is 'the desire of women,' preserving the ambiguity rather than resolving it into
    either women's desire generally or a specific beloved figure. Because the phrase
    is debated, alternatives are preserved in a footnote.
- source_word: כָּל אֱלוֹהַּ
  chosen: any god
  alternatives:
  - every god
  - all gods
  lexicon: HALOT
  rationale: 'With כָּל plus singular אֱלוֹהַּ, the idiomatic sense is distributive:
    ''any god'' or ''every god.'' ''Any god'' reads naturally in English and fits
    the king''s total disregard for deity.'
- source_word: כִּי עַל כֹּל יִתְגַּדָּל
  chosen: because he will magnify himself above all
  alternatives:
  - for he will exalt himself above all
  - because he will make himself great over all
  lexicon: HALOT
  rationale: The Hitpael of גדל here conveys self-exaltation. 'Magnify himself above
    all' preserves the reflexive force and the comparative sense of עַל כֹּל. 'Above
    all' is smoother in English than the more wooden 'over all.'
