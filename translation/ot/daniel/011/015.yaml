id: DAN.11.15
reference: Daniel 11:15
source:
  edition: WLC
  text: וְ/יָבֹא֙ מֶ֣לֶךְ הַ/צָּפ֔וֹן וְ/יִשְׁפֹּךְ֙ סֽוֹלֲלָ֔ה וְ/לָכַ֖ד עִ֣יר מִבְצָר֑וֹת
    וּ/זְרֹע֤וֹת הַ/נֶּ֨גֶב֙ לֹ֣א יַעֲמֹ֔דוּ וְ/עַם֙ מִבְחָרָ֔י/ו וְ/אֵ֥ין כֹּ֖חַ
    לַ/עֲמֹֽד׃
translation:
  text: Then the king of the north will come and heap up a siege ramp and capture
    a fortified city, and the forces of the south will not stand, even his choice
    troops, for there will be no strength to stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arms of the south,' with 'arms' used metaphorically for military
      power or forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'his chosen people'; the phrase likely refers in context to the king
      of the south's select troops or elite forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָבֹא
  chosen: Then ... will come
  alternatives:
  - and ... will come
  lexicon: HALOT
  rationale: The prefixed waw with imperfect advances the narrative. 'Then' brings
    out the sequential force in English more naturally than a bare 'and' in this prophetic-historical
    context.
- source_word: מֶלֶךְ הַצָּפוֹן
  chosen: the king of the north
  alternatives:
  - the northern king
  lexicon: HALOT
  rationale: This is the established directional-political designation in Daniel 11.
    Retaining the genitival form preserves the text's repeated north/south contrast.
- source_word: וְיִשְׁפֹּךְ סֹלֲלָה
  chosen: heap up a siege ramp
  alternatives:
  - cast up a siege mound
  - pour out a siege ramp
  lexicon: HALOT
  rationale: The idiom refers to constructing siegeworks against a city. 'Heap up
    a siege ramp' is clear modern English and reflects the military sense better than
    a wooden 'pour out.'
- source_word: וְלָכַד
  chosen: and capture
  alternatives:
  - and seize
  - and take
  lexicon: HALOT
  rationale: The perfect with waw continues the sequence with future sense in context.
    'Capture' fits a military conquest of a city.
- source_word: עִיר מִבְצָרוֹת
  chosen: a fortified city
  alternatives:
  - the city of fortresses
  - a city of strongholds
  lexicon: HALOT
  rationale: The construct phrase is best rendered idiomatically in English as 'a
    fortified city.' The plural 'fortresses' functions adjectivally to describe the
    city's strength.
- source_word: וּזְרֹעוֹת הַנֶּגֶב
  chosen: the forces of the south
  alternatives:
  - the arms of the south
  lexicon: HALOT
  rationale: '''Arms'' is a common Hebrew metaphor for military power or forces. Rendering
    it as ''forces'' communicates the military sense clearly in English.'
- source_word: לֹא יַעֲמֹדוּ
  chosen: will not stand
  alternatives:
  - will not withstand
  - will not hold their ground
  lexicon: HALOT
  rationale: The verb literally means 'stand,' and in military context implies resistance.
    'Will not stand' preserves the metaphor while remaining natural.
- source_word: וְעַם מִבְחָרָיו
  chosen: even his choice troops
  alternatives:
  - and his chosen people
  - and the people of his choice
  lexicon: HALOT
  rationale: The suffix most naturally refers to the king of the south, and the phrase
    denotes his select or elite men in context, not the populace generally. 'Choice
    troops' captures the military setting and the adjectival force of 'chosen/choice.'
    The conjunction is rendered 'even' to appose and intensify the preceding clause.
- source_word: וְאֵין כֹּחַ לַעֲמֹד
  chosen: for there will be no strength to stand
  alternatives:
  - and there is no power to stand
  - and no one will have strength to resist
  lexicon: HALOT
  rationale: This clause gives the reason for the failure to stand. 'Strength' is
    the most natural rendering of כֹּחַ here, and retaining 'to stand' preserves the
    verbal link with the previous clause.
