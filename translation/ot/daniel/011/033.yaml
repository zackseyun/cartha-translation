theological_decisions:
- issue: Whether to render the suffering term נִכְשְׁלוּ as total destruction ('fall')
    or preserve the broader metaphor of persecution and setback.
  chosen_reading: but they will stumble
  alternative_readings:
  - but they will fall
  - but they will be overthrown
  rationale: The verse lists forms of persecution suffered by the insightful among
    the people. Rendering the verb as 'stumble' preserves the Hebrew metaphor and
    does not overstate the outcome as necessarily death in every instance, while still
    allowing severe suffering in context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
