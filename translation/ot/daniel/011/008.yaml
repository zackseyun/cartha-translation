theological_decisions:
- issue: Interpretation of וְהוּא שָׁנִים יַעֲמֹד מִמֶּלֶךְ הַצָּפוֹן
  chosen_reading: A period of standing aloof or refraining from engagement with the
    king of the north
  alternative_readings:
  - He will continue for some years more than the king of the north
  - He will remain stronger than the king of the north for years
  rationale: The clause is syntactically compressed and historically interpreted in
    more than one way. The main text preserves the verbal image of עמד with מן as
    separation/abstention rather than importing a stronger comparative claim. Because
    the alternatives are plausible, they are preserved in a footnote rather than resolved
    dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
