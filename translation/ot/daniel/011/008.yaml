id: DAN.11.8
reference: Daniel 11:8
source:
  edition: WLC
  text: וְ/גַ֣ם אֱֽלֹהֵי/הֶ֡ם עִם נְסִֽכֵי/הֶם֩ עִם כְּלֵ֨י חֶמְדָּתָ֜/ם כֶּ֧סֶף וְ/זָהָ֛ב
    בַּ/שְּׁבִ֖י יָבִ֣א מִצְרָ֑יִם וְ/הוּא֙ שָׁנִ֣ים יַעֲמֹ֔ד מִ/מֶּ֖לֶךְ הַ/צָּפֽוֹן־־׃
translation:
  text: He will also carry off to Egypt their gods, with their cast images, and with
    their precious vessels of silver and gold, as plunder; and for some years he will
    stand aloof from the king of the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for some years he will continue longer than the king of the north,'
      or 'he will remain stronger than the king of the north for years.' The Hebrew
      clause is compressed and may be read comparatively rather than as abstention.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: also
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: Adds an emphatic/additive sense to the preceding action. 'Also' is concise
    and natural in English while preserving the additive force.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their gods/idols
  lexicon: HALOT
  rationale: The plural construct with 3mp suffix plainly refers to the deities of
    the defeated people. 'Gods' is the direct lexical rendering; the idolatrous implication
    is already clear from context and need not be imported into the main text.
- source_word: נְסִכֵיהֶם
  chosen: their cast images
  alternatives:
  - their molten images
  - their metal images
  lexicon: HALOT
  rationale: The noun refers to images made by casting metal. 'Cast images' is readable
    modern English and preserves the manufacturing sense better than the more archaic
    'molten images.'
- source_word: כְּלֵי חֶמְדָּתָם
  chosen: their precious vessels
  alternatives:
  - their desirable articles
  - their valuable objects
  - their precious utensils
  lexicon: HALOT
  rationale: כְּלֵי is a broad term for articles/vessels/implements; in a temple-treasure
    context 'vessels' fits well. חֶמְדָּתָם conveys desirability/preciousness, so
    'precious vessels' captures both value and likely cultic or royal objects.
- source_word: כֶּסֶף וְזָהָב
  chosen: of silver and gold
  alternatives:
  - silver and gold
  lexicon: HALOT
  rationale: In English, attaching the material phrase to 'vessels' as 'vessels of
    silver and gold' is smoother and reflects the appositional listing of valuables.
- source_word: בַּשְּׁבִי
  chosen: as plunder
  alternatives:
  - into captivity
  - as captive spoil
  lexicon: HALOT
  rationale: Here the phrase modifies the act of bringing goods to Egypt and refers
    to spoil taken in war. 'As plunder' communicates the sense idiomatically in English.
    'Into captivity' would fit persons better than objects in this context.
- source_word: יָבִא מִצְרָיִם
  chosen: he will carry off to Egypt
  alternatives:
  - he will bring to Egypt
  - he will take to Egypt
  lexicon: HALOT
  rationale: The Hiphil of בוא can mean 'bring,' but in military context with spoil
    'carry off to Egypt' better conveys seizure and transport.
- source_word: שָׁנִים
  chosen: for some years
  alternatives:
  - for years
  - some years
  lexicon: HALOT
  rationale: The plural 'years' is indefinite here. 'For some years' makes the idiomatic
    temporal sense explicit without over-specifying a number.
- source_word: יַעֲמֹד
  chosen: he will stand aloof from
  alternatives:
  - he will refrain from attacking
  - he will remain stronger than
  - he will endure beyond
  lexicon: HALOT
  rationale: With מן after עמד, the sense can be separation, abstention, or maintaining
    oneself away from another. In this historical-military context, 'stand aloof from'
    preserves the Hebrew image while implying a period of non-engagement. More interpretive
    options like 'refrain from attacking' are possible but less formally transparent.
- source_word: מִמֶּלֶךְ הַצָּפוֹן
  chosen: from the king of the north
  alternatives:
  - than the king of the north
  lexicon: HALOT
  rationale: The preposition מן most naturally yields 'from' here, especially with
    the chosen rendering of יעמד. A comparative sense ('than') is possible in some
    interpretations, but the separation/abstention reading fits the syntax and immediate
    context well enough for the main text.
