id: DAN.11.5
reference: Daniel 11:5
source:
  edition: WLC
  text: וְ/יֶחֱזַ֥ק מֶֽלֶךְ הַ/נֶּ֖גֶב וּ/מִן שָׂרָ֑י/ו וְ/יֶחֱזַ֤ק עָלָי/ו֙ וּ/מָשָׁ֔ל
    מִמְשָׁ֥ל רַ֖ב מֶמְשַׁלְתּֽ/וֹ־־׃
translation:
  text: Then the king of the South will grow strong, but one of his commanders will
    grow stronger than he and will rule, and his dominion will be a great dominion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and from among his princes one will become strong over him.' The Hebrew
      can be rendered more literally, but the main text expresses the comparative
      force in clearer English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶחֱזַק
  chosen: will grow strong
  alternatives:
  - will become strong
  - will prevail
  lexicon: HALOT
  rationale: Qal imperfect of חזק here denotes becoming or proving strong in political/military
    power. 'Will grow strong' is natural English and preserves the future narrative
    force.
- source_word: מֶלֶךְ הַנֶּגֶב
  chosen: the king of the South
  alternatives:
  - the southern king
  lexicon: HALOT
  rationale: A standard directional-political title in Daniel's vision. 'King of the
    South' preserves the formal pattern used throughout the chapter and avoids over-paraphrase.
- source_word: וּמִן שָׂרָיו
  chosen: but one of his commanders
  alternatives:
  - and from his princes
  - and one from among his officials
  lexicon: HALOT
  rationale: The preposition מן with the plural construct plus suffix indicates one
    arising from among his officials. שַׂר in this context refers to a ruler/commander
    rather than a generic 'prince.' 'But' captures the adversative sense implied by
    the following contrast.
- source_word: וְיֶחֱזַק עָלָיו
  chosen: will grow stronger than he
  alternatives:
  - will prevail over him
  - will become strong over him
  lexicon: HALOT
  rationale: עַל with חזק in context expresses superiority over the prior king. English
    idiom favors 'grow stronger than he' rather than the more wooden 'be strong over
    him.'
- source_word: וּמָשָׁל
  chosen: will rule
  alternatives:
  - and he will govern
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction continues the sequence in prophetic
    narration. 'Will rule' is the clearest idiomatic rendering.
- source_word: מִמְשָׁל רַב
  chosen: a great dominion
  alternatives:
  - great rule
  - vast dominion
  lexicon: HALOT
  rationale: The noun phrase emphasizes the extent of rule. 'Great dominion' is concise
    and preserves the political sense.
- source_word: מֶמְשַׁלְתּוֹ
  chosen: his dominion
  alternatives:
  - his rule
  - his realm
  lexicon: HALOT
  rationale: The suffixed noun refers to the second ruler's sphere or exercise of
    authority. Repeating 'dominion' reflects the Hebrew wordplay and emphasis between
    מִמְשָׁל and מֶמְשָׁלָה.
