id: DAN.11.21
reference: Daniel 11:21
source:
  edition: WLC
  text: וְ/עָמַ֤ד עַל כַּנּ/וֹ֙ נִבְזֶ֔ה וְ/לֹא נָתְנ֥וּ עָלָ֖י/ו ה֣וֹד מַלְכ֑וּת
    וּ/בָ֣א בְ/שַׁלְוָ֔ה וְ/הֶחֱזִ֥יק מַלְכ֖וּת בַּ/חֲלַקְלַקּֽוֹת־־׃
translation:
  text: And in his place a despised man will arise, on whom they had not bestowed
    the majesty of kingship; he will come in quietly and seize the kingdom by intrigues.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peaceably' for 'quietly' (בְשַׁלְוָה), emphasizing an appearance of
      calm or security rather than open aggression.
    reason: lexical_alternative
  - marker: b
    text: Or 'by flatteries' for 'by intrigues' (בַּחֲלַקְלַקּוֹת), highlighting deceptive
      smooth speech as the means of gaining power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  chosen: will arise
  alternatives:
  - will stand
  - will take his stand
  lexicon: HALOT
  rationale: In succession contexts in Daniel, עמד commonly denotes arising or coming
    to power. 'Will arise' is idiomatic in English and preserves the predictive force
    without over-paraphrasing.
- source_word: עַל־כַּנּוֹ
  chosen: in his place
  alternatives:
  - in his stead
  - upon his base/estate
  lexicon: HALOT
  rationale: The idiom עַל־כֵּן/כַּן with pronominal suffix here refers to succession
    to another's position. 'In his place' best captures the dynastic/political sense
    in context.
- source_word: נִבְזֶה
  chosen: a despised man
  alternatives:
  - one despised
  - a contemptible person
  - a vile person
  lexicon: HALOT
  rationale: The passive/adjectival sense is 'despised' or 'held in contempt.' 'A
    despised man' is natural English and avoids the archaic/tradition-laden 'vile
    person,' while retaining the evaluative force.
- source_word: וְלֹא נָתְנוּ עָלָיו
  chosen: on whom they had not bestowed
  alternatives:
  - to whom they had not given
  - upon whom they had not conferred
  lexicon: HALOT
  rationale: The plural verb with על conveys conferral upon someone. 'Bestowed' fits
    the formal political context and pairs naturally with 'majesty of kingship.'
- source_word: הוֹד מַלְכוּת
  chosen: the majesty of kingship
  alternatives:
  - royal majesty
  - the splendor of the kingdom
  - the honor of kingship
  lexicon: HALOT
  rationale: הוֹד denotes splendor, majesty, or honor; מַלְכוּת here is royal rule/kingship
    rather than the territory. 'Majesty of kingship' preserves both the dignity and
    the office in view.
- source_word: וּבָא בְשַׁלְוָה
  chosen: he will come in quietly
  alternatives:
  - he will come in peaceably
  - he will come in at ease
  - he will come in during tranquility
  lexicon: HALOT
  rationale: בְשַׁלְוָה can denote quietness, ease, or security. In this political
    takeover context, 'quietly' communicates an unthreatening, unobtrusive approach
    better than the potentially misleading 'peaceably,' which may imply moral peacefulness.
- source_word: וְהֶחֱזִיק מַלְכוּת
  chosen: and seize the kingdom
  alternatives:
  - and obtain the kingdom
  - and become strong in the kingdom
  - and secure kingship
  lexicon: HALOT
  rationale: החזיק in the Hiphil can mean to make strong, secure, or gain firm hold
    of. In context of usurpation, 'seize the kingdom' conveys taking control decisively.
    'Kingdom' is retained as the conventional political object, though 'kingship'
    is possible.
- source_word: בַּחֲלַקְלַקּוֹת
  chosen: by intrigues
  alternatives:
  - by flatteries
  - by smooth words
  - through slippery schemes
  lexicon: HALOT
  rationale: The noun derives from the idea of smoothness and in context refers to
    deceptive persuasion. 'By intrigues' captures political manipulation in contemporary
    English; the more literal 'by flatteries' is preserved in a footnote because it
    is a viable lexical alternative.
