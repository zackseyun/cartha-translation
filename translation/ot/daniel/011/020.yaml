id: DAN.11.20
reference: Daniel 11:20
source:
  edition: WLC
  text: וְ/עָמַ֧ד עַל כַּנּ֛/וֹ מַעֲבִ֥יר נוֹגֵ֖שׂ הֶ֣דֶר מַלְכ֑וּת וּ/בְ/יָמִ֤ים
    אֲחָדִים֙ יִשָּׁבֵ֔ר וְ/לֹ֥א בְ/אַפַּ֖יִם וְ/לֹ֥א בְ/מִלְחָמָֽה־׃
translation:
  text: Then one will arise in his place who will send an exactor through the splendor
    of the kingdom; but within a few days he will be broken, though not in anger and
    not in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a tax collector' or 'an oppressor' for 'an exactor.' The Hebrew term
      denotes one who exacts tribute or payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the glory of the kingdom.' The phrase may refer to the most splendid
      part of the realm or to the kingdom's majesty more generally.
    reason: lexical_alternative
  - marker: c
    text: Or 'but not in anger' or 'not by wrath.' The Hebrew expression is somewhat
      compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  chosen: Then one will arise
  alternatives:
  - And he will arise
  - Then he will stand up
  lexicon: HALOT
  rationale: In Daniel 11 the verb עמד in this succession formula introduces the next
    ruler ('arise' in someone's place), not merely physical standing. 'Then' reflects
    the narrative progression signaled by waw.
- source_word: עַל כַּנּוֹ
  chosen: in his place
  alternatives:
  - in his position
  - upon his base
  lexicon: HALOT
  rationale: The idiom עמד על־כנו means to arise in another's stead or position. 'In
    his place' is the most natural English rendering in this dynastic context.
- source_word: מַעֲבִיר
  chosen: who will send
  alternatives:
  - causing to pass
  - making pass through
  lexicon: HALOT
  rationale: The Hiphil participle of עבר here governs נוגשׂ and indicates causing
    an official to pass through the land. English idiom is better served by 'send'
    rather than the more wooden 'cause to pass.'
- source_word: נוֹגֵשׂ
  chosen: an exactor
  alternatives:
  - a tax collector
  - an oppressor
  lexicon: HALOT
  rationale: נוגשׂ can denote one who exacts tribute or forced payment. In this historical-political
    context, 'exactor' preserves the broader sense of a revenue-enforcing official
    without over-specifying beyond the Hebrew. A more explicit alternative is preserved
    in a footnote.
- source_word: הֶדֶר מַלְכוּת
  chosen: the splendor of the kingdom
  alternatives:
  - the glory of the kingdom
  - the jewel of the kingdom
  lexicon: HALOT
  rationale: הדר denotes splendor, majesty, or beauty. 'Splendor of the kingdom' keeps
    the genitive relation and allows either the land's glory or the royal realm's
    magnificence to remain implicit, as in the Hebrew.
- source_word: וּבְיָמִים אֲחָדִים
  chosen: within a few days
  alternatives:
  - in a few days
  - after some days
  lexicon: HALOT
  rationale: The phrase is idiomatic for a short time rather than necessarily a literal
    count of days. 'Within a few days' communicates brevity while staying close to
    the Hebrew.
- source_word: יִשָּׁבֵר
  chosen: he will be broken
  alternatives:
  - he will be shattered
  - he will be destroyed
  lexicon: HALOT
  rationale: The Niphal of שבר is metaphorical here for being broken/ruined/removed.
    'Broken' preserves the imagery and avoids over-interpretation.
- source_word: וְלֹא בְאַפַּיִם
  chosen: though not in anger
  alternatives:
  - but not in anger
  - and not by anger
  - and not in wrath
  lexicon: HALOT
  rationale: אַפַּיִם literally 'nostrils' commonly denotes anger/wrath. The preposition
    ב is best taken adverbially/instrumentally. 'Not in anger' is a restrained rendering
    that preserves the ambiguity of whether his end is not by public rage, not in
    fury, or not through an outburst.
- source_word: וְלֹא בְמִלְחָמָה
  chosen: and not in battle
  alternatives:
  - and not in war
  lexicon: HALOT
  rationale: מלחמה can be 'war' or 'battle.' 'Battle' fits the immediate contrast
    with the manner of his downfall and reads naturally in English.
