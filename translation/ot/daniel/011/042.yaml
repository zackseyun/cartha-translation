id: DAN.11.42
reference: Daniel 11:42
source:
  edition: WLC
  text: וְ/יִשְׁלַ֥ח יָד֖/וֹ בַּ/אֲרָצ֑וֹת וְ/אֶ֣רֶץ מִצְרַ֔יִם לֹ֥א תִהְיֶ֖ה לִ/פְלֵיטָֽה׃
translation:
  text: He will stretch out his hand against the countries, and the land of Egypt
    will not escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will have no escape.' The Hebrew literally says 'will not be for escape.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׁלַח
  chosen: will stretch out
  alternatives:
  - will send
  - will extend
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'send' or 'stretch out.' With 'his hand'
    as the object, the idiom means to extend one's power or attack against others.
    'Stretch out' preserves the Hebrew imagery better than a more interpretive rendering
    like 'attack.'
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Kept literally because 'stretch out his hand' is a natural English expression
    and preserves the idiom of exerting power or aggression.
- source_word: בָּאֲרָצוֹת
  chosen: against the countries
  alternatives:
  - against the lands
  - into the countries
  lexicon: HALOT
  rationale: The preposition with 'lands/countries' in this military context is best
    rendered 'against.' 'Countries' is more idiomatic modern English than 'lands,'
    while still conveying multiple territories rather than the earth in general.
- source_word: וְאֶרֶץ מִצְרַיִם
  chosen: and the land of Egypt
  alternatives:
  - and Egypt
  lexicon: HALOT
  rationale: The construct is explicitly 'the land of Egypt,' so the fuller expression
    is retained rather than reduced to simply 'Egypt.' This preserves the Hebrew wording
    and geographic emphasis.
- source_word: לֹא תִהְיֶה לִפְלֵיטָה
  chosen: will not escape
  alternatives:
  - will have no escape
  - will not be for deliverance
  - will not survive
  lexicon: HALOT
  rationale: The noun פְּלֵיטָה denotes escape, deliverance, or survivors. In this
    clause, the idiomatic sense is that Egypt will not escape his reach. 'Will not
    escape' is clear, natural English and fits the military context better than the
    more wooden 'will not be for escape.'
