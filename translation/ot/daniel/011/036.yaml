id: DAN.11.36
reference: Daniel 11:36
source:
  edition: WLC
  text: וְ/עָשָׂ֨ה כִ/רְצוֹנ֜/וֹ הַ/מֶּ֗לֶךְ וְ/יִתְרוֹמֵ֤ם וְ/יִתְגַּדֵּל֙ עַל כָּל
    אֵ֔ל וְ/עַל֙ אֵ֣ל אֵלִ֔ים יְדַבֵּ֖ר נִפְלָא֑וֹת וְ/הִצְלִ֨יחַ֙ עַד כָּ֣לָה זַ֔עַם
    כִּ֥י נֶחֱרָצָ֖ה נֶעֱשָֽׂתָה־־־׃
translation:
  text: And the king will do as he pleases. He will exalt himself and magnify himself
    above every god, and against the God of gods he will speak astonishing things.
    And he will prosper until the indignation is finished, for what has been decreed
    will be done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marvelous things.' The Hebrew can denote extraordinary or wondrous things;
      here the context suggests shocking, arrogant speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'until the wrath is completed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for what is determined shall be done.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה כִרְצוֹנוֹ
  chosen: will do as he pleases
  alternatives:
  - will act according to his will
  - will do according to his desire
  lexicon: HALOT
  rationale: כִרְצוֹנוֹ is literally 'according to his will/desire.' In idiomatic
    English, 'do as he pleases' best captures the sense of autonomous self-will without
    unnecessary stiffness.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun retained straightforwardly; no contextual warrant to specify
    beyond the Hebrew.
- source_word: וְיִתְרוֹמֵם
  chosen: will exalt himself
  alternatives:
  - will raise himself up
  lexicon: HALOT
  rationale: Hitpael/reflexive sense indicates self-exaltation, not merely being exalted
    by others.
- source_word: וְיִתְגַּדֵּל
  chosen: magnify himself
  alternatives:
  - make himself great
  - aggrandize himself
  lexicon: HALOT
  rationale: Paired with 'exalt himself,' this preserves the rhetorical intensification.
    'Magnify himself' is natural and keeps the self-aggrandizing force.
- source_word: עַל כָּל אֵל
  chosen: above every god
  alternatives:
  - against every god
  - over every god
  lexicon: HALOT
  rationale: 'עַל with these exaltation verbs is best rendered spatially/metaphorically
    as superiority: ''above every god.'''
- source_word: וְעַל אֵל אֵלִים
  chosen: against the God of gods
  alternatives:
  - against the god of gods
  lexicon: HALOT
  rationale: The construct phrase naturally means 'God of gods.' Capitalization reflects
    that the referent in context is the supreme God, contrasted with 'every god' in
    the prior clause.
- source_word: יְדַבֵּר נִפְלָאוֹת
  chosen: he will speak astonishing things
  alternatives:
  - he will speak marvelous things
  - he will speak outrageous things
  lexicon: HALOT
  rationale: נִפְלָאוֹת can denote extraordinary/wondrous things, but in this hostile
    context the sense is shocking or astonishing speech. 'Astonishing things' preserves
    the lexical breadth without over-interpreting as either positive 'marvelous' or
    strongly pejorative 'outrageous.'
- source_word: וְהִצְלִיחַ
  chosen: he will prosper
  alternatives:
  - he will succeed
  lexicon: HALOT
  rationale: The verb commonly denotes prospering/succeeding. 'Prosper' fits the prophetic
    register and the context of temporary success.
- source_word: עַד כָּלָה זַעַם
  chosen: until the indignation is finished
  alternatives:
  - until the wrath is completed
  - until the fury comes to an end
  lexicon: HALOT
  rationale: זַעַם often denotes indignation/wrath, especially divine anger in prophetic
    contexts. 'Indignation' preserves the formal prophetic tone and likely divine
    referent.
- source_word: כִּי נֶחֱרָצָה נֶעֱשָׂתָה
  chosen: for what has been decreed will be done
  alternatives:
  - for what is determined shall be done
  - for the decreed thing will be carried out
  lexicon: HALOT
  rationale: נֶחֱרָצָה denotes something decided/decreed; נֶעֱשָׂתָה indicates its
    execution. The chosen rendering preserves both determination and fulfillment in
    clear English.
