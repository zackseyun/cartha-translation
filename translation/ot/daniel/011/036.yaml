theological_decisions:
- issue: Referent and capitalization of אֵל אֵלִים
  chosen_reading: Render as 'the God of gods' with capitalization indicating the true
    God.
  alternative_readings:
  - '''the god of gods'' with lower-case generic sense'
  rationale: In context the king exalts himself above all gods and then speaks against
    the supreme deity. English capitalization helps signal the contrast and likely
    intended referent without adding content beyond the Hebrew construct phrase.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Sense of זַעַם
  chosen_reading: Treat as divine indignation rather than unspecified anger.
  alternative_readings:
  - general wrath
  - human rage
  rationale: Within Daniel's apocalyptic-prophetic context, the term most naturally
    refers to a period of divine wrath/indignation that has a fixed endpoint. The
    translation keeps this as 'indignation' rather than making the subject explicit
    in the main text.
  doctrine_reference: Translation philosophy §3
