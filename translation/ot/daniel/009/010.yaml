id: DAN.9.10
reference: Daniel 9:10
source:
  edition: WLC
  text: וְ/לֹ֣א שָׁמַ֔עְנוּ בְּ/ק֖וֹל יְהוָ֣ה אֱלֹהֵ֑י/נוּ לָ/לֶ֤כֶת בְּ/תֽוֹרֹתָי/ו֙ אֲשֶׁ֣ר נָתַ֣ן לְ/פָנֵ֔י/נוּ בְּ/יַ֖ד עֲבָדָ֥י/ו הַ/נְּבִיאִֽים׃
translation:
  text: and we have not obeyed the voice of Yahweh our God, to walk in his laws, which he set before us through his servants the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of his servants the prophets,'' an idiom meaning ''through his servants the prophets.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  chosen: have not obeyed
  alternatives:
  - have not listened to
  - did not heed
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל ('in/to the voice of') commonly carries the sense of hearing with responsive obedience, not mere auditory perception. 'Obeyed' best captures the covenantal force in idiomatic English, while preserving the negative confession.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the command of
  - what ... said
  lexicon: HALOT
  rationale: Literally 'in/to the voice of.' Retaining 'voice' preserves the Hebrew expression and the personal dimension of divine address. English 'obeyed the voice of' is natural enough in biblical style.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; 'the LORD our God' is the natural covenantal expression.
- source_word: לָלֶכֶת
  chosen: by walking
  alternatives:
  - to walk
  - so as to walk
  - to live
  lexicon: HALOT
  rationale: The infinitive expresses the manner/result of obedience in relation to the preceding clause. 'By walking' makes explicit the instrumental nuance in smooth English while preserving the Hebrew metaphor of conduct.
- source_word: בְּתוֹרֹתָיו
  chosen: in his laws
  alternatives:
  - in his instruction
  - in his teachings
  lexicon: HALOT
  rationale: Though תּוֹרָה can mean 'instruction,' the plural here refers to the concrete bodies/directives God gave through the prophets. 'Laws' fits the covenantal and ethical context, while 'walk in' remains a standard biblical idiom.
- source_word: אֲשֶׁר נָתַן לְפָנֵינוּ
  chosen: which he set before us
  alternatives:
  - which he gave before us
  - which he placed before us
  lexicon: HALOT
  rationale: The idiom 'gave before us' means to present or set something before someone. 'Set before us' is idiomatic English and preserves the sense of divine presentation.
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  - by means of
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' denotes agency or mediation. 'Through' communicates this clearly in contemporary English; the more literal alternative is preserved in a footnote.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: While עבד can denote slave or servant, in prophetic commissioning formulas 'servants' is the established and contextually appropriate rendering, emphasizing official service to God rather than bonded status.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Definite plural noun identifying the prophetic messengers through whom God gave his laws.
