theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of תּוֹרָה in the plural
  chosen_reading: laws
  alternative_readings:
  - instruction
  - teachings
  rationale: The verse concerns covenant disobedience and conduct ('walking in'), and the plural form points to God's directives as given through prophetic mediation. 'Laws' best fits the context without excluding the broader instructional sense of torah.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
