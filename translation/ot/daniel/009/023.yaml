theological_decisions:
- issue: Nature of Daniel's status before God in חֲמוּדוֹת אָתָּה
  chosen_reading: you are greatly beloved
  alternative_readings:
  - you are highly esteemed
  - you are precious
  rationale: The phrase expresses divine favor toward Daniel without importing later
    doctrinal categories. 'Greatly beloved' best captures the relational force while
    remaining faithful to the Hebrew idiom.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
