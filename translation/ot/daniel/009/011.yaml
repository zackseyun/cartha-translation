id: DAN.9.11
reference: Daniel 9:11
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֗ל עָֽבְרוּ֙ אֶת תּ֣וֹרָתֶ֔/ךָ וְ/ס֕וֹר לְ/בִלְתִּ֖י שְׁמ֣וֹעַ
    בְּ/קֹלֶ֑/ךָ וַ/תִּתַּ֨ךְ עָלֵ֜י/נוּ הָ/אָלָ֣ה וְ/הַ/שְּׁבֻעָ֗ה אֲשֶׁ֤ר כְּתוּבָה֙
    בְּ/תוֹרַת֙ מֹשֶׁ֣ה עֶֽבֶד הָֽ/אֱלֹהִ֔ים כִּ֥י חָטָ֖אנוּ לֽ/וֹ־־־׃
translation:
  text: All Israel has transgressed your law and turned aside, refusing to listen
    to your voice. So the curse and the oath that are written in the law of Moses,
    the servant of God, have been poured out on us, because we have sinned against
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sworn curse.' The Hebrew reads 'the curse and the oath,' likely
      referring to the covenant sanctions sworn in the law of Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  chosen: All Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: כָל with the proper name Israel denotes the nation comprehensively. 'All
    Israel' is idiomatic and preserves the corporate scope of Daniel's confession.
- source_word: עָבְרוּ אֶת תּוֹרָתֶךָ
  chosen: has transgressed your law
  alternatives:
  - have crossed over your law
  - have violated your instruction
  lexicon: HALOT
  rationale: עבר with Torah in covenantal context means to overstep or transgress.
    Although the subject is grammatically plural in Hebrew, English treats 'Israel'
    as a collective singular naturally here; 'has transgressed' reads smoothly while
    preserving the corporate sense. 'Law' is preferred over 'instruction' because
    Torah here refers specifically to covenantal stipulations.
- source_word: וְסוֹר
  chosen: and turned aside
  alternatives:
  - and departed
  - and turned away
  lexicon: HALOT
  rationale: The infinitive/verb form from סור expresses deviation from the right
    path. 'Turned aside' preserves the metaphor of departure from obedience and fits
    the parallel with transgressing the law.
- source_word: לְבִלְתִּי שְׁמֹעַ בְּקוֹלֶךָ
  chosen: refusing to listen to your voice
  alternatives:
  - so as not to obey your voice
  - without listening to your voice
  lexicon: HALOT
  rationale: 'The construction expresses result/purpose in a negative sense: turning
    aside so as not to heed God. ''Listen to your voice'' keeps the Hebrew idiom,
    while ''refusing'' makes the volitional force clear in natural English.'
- source_word: וַתִּתַּךְ עָלֵינוּ
  chosen: have been poured out on us
  alternatives:
  - was poured out on us
  - has fallen on us
  lexicon: HALOT
  rationale: נתך in this context is used of something being poured out, often wrath
    or judgment. English passive best captures the sense with the following subject
    ('the curse and the oath'). Present perfect fits the confessional retrospective
    context.
- source_word: הָאָלָה
  chosen: the curse
  alternatives:
  - the curse-sanction
  lexicon: HALOT
  rationale: אָלָה commonly denotes a curse, especially a covenant curse. 'The curse'
    is clear and sufficient in English.
- source_word: וְהַשְּׁבֻעָה
  chosen: and the oath
  alternatives:
  - and the sworn judgment
  - and the sworn curse
  lexicon: HALOT
  rationale: שְׁבוּעָה is literally 'oath.' In this context it likely refers to the
    sworn sanctions attached to the covenant. The formal term 'oath' should be retained
    in the main text, with interpretive expansion avoided.
- source_word: אֲשֶׁר כְּתוּבָה בְּתוֹרַת מֹשֶׁה
  chosen: that are written in the law of Moses
  alternatives:
  - which is written in the law of Moses
  lexicon: HALOT
  rationale: Although כְּתוּבָה is singular feminine, the sense governs the compound
    subject of curse and oath; English naturally uses plural agreement with the nearest
    conceptual referents. 'Law of Moses' is the standard and accurate rendering of
    the covenant document in view.
- source_word: עֶבֶד הָאֱלֹהִים
  chosen: the servant of God
  alternatives:
  - God's servant
  lexicon: HALOT
  rationale: עבד here is an honorific title for Moses. 'The servant of God' is transparent
    and preserves the genitival relation.
- source_word: כִּי חָטָאנוּ לוֹ
  chosen: because we have sinned against him
  alternatives:
  - for we have sinned to him
  - because we sinned against him
  lexicon: HALOT
  rationale: חטא with ל can denote sinning against someone. English requires 'against
    him' for clarity. The pronoun refers to God, the addressee of the prayer.
