theological_decisions:
- issue: Corporate guilt and number agreement
  chosen_reading: Use collective singular English with 'All Israel has transgressed'
    while retaining first-person plural confession later ('on us ... we have sinned').
  alternative_readings:
  - 'Use plural throughout: ''All Israel have transgressed'''
  rationale: The Hebrew presents Israel as a corporate whole and then includes Daniel
    within the guilty community. Collective singular in English is natural and preserves
    the theological force of national solidarity in sin.
  doctrine_reference: Translation philosophy §6; §5
- issue: Meaning of 'the oath' in covenant context
  chosen_reading: Retain 'the oath' in the main text without collapsing it into 'curse.'
  alternative_readings:
  - Translate interpretively as 'the sworn curse'
  rationale: The verse likely alludes to covenant sanctions in Deuteronomy, where
    curse and oath are closely linked. Preserving both terms maintains the textual
    tension and avoids over-resolving the relationship between them.
  doctrine_reference: Translation philosophy §3
