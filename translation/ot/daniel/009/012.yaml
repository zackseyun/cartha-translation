id: DAN.9.12
reference: Daniel 9:12
source:
  edition: WLC
  text: וַ/יָּ֜קֶם אֶת דברי/ו אֲשֶׁר דִּבֶּ֣ר עָלֵ֗י/נוּ וְ/עַ֤ל שֹֽׁפְטֵ֨י/נוּ֙ אֲשֶׁ֣ר
    שְׁפָט֔וּ/נוּ לְ/הָבִ֥יא עָלֵ֖י/נוּ רָעָ֣ה גְדֹלָ֑ה אֲשֶׁ֣ר לֹֽא נֶעֶשְׂתָ֗ה תַּ֚חַת
    כָּל הַ/שָּׁמַ֔יִם כַּ/אֲשֶׁ֥ר נֶעֶשְׂתָ֖ה בִּ/ירוּשָׁלִָֽם־׀־־־׃
translation:
  text: He has confirmed his words that he spoke against us and against our judges
    who judged us, by bringing upon us a great disaster such as had not been done
    under all heaven, as it was done in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our rulers who ruled us' or 'our leaders who governed us.' The Hebrew
      terms for 'judges' can refer more broadly to governing authorities, not only
      courtroom judges.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: has confirmed
  alternatives:
  - has established
  - has carried out
  - has fulfilled
  lexicon: HALOT
  rationale: The hiphil of קום with 'words' commonly means to confirm, establish,
    or carry out words previously spoken. 'Has confirmed' preserves the sense that
    God made his spoken threat stand true, without over-paraphrasing.
- source_word: דבריו
  chosen: his words
  alternatives:
  - his word
  - what he said
  lexicon: HALOT
  rationale: Plural construct with 3ms suffix is most naturally 'his words.' Singular
    'word' is possible idiomatically, but the plural better reflects the Hebrew form.
- source_word: דִּבֶּר עָלֵינוּ
  chosen: he spoke against us
  alternatives:
  - he spoke concerning us
  - he pronounced against us
  lexicon: HALOT
  rationale: With דבר + על in this judgment context, 'against us' best captures the
    adversative force of the preposition and the context of threatened punishment.
- source_word: שֹׁפְטֵינוּ אֲשֶׁר שְׁפָטוּנוּ
  chosen: our judges who judged us
  alternatives:
  - our rulers who ruled us
  - our leaders who governed us
  lexicon: HALOT
  rationale: The noun and verb from שפט can denote judging or governing. In Daniel's
    historical context this likely refers broadly to governing authorities, but 'judges
    who judged us' keeps the lexical repetition and formal correspondence of the Hebrew.
    An alternative is worth preserving in a footnote because English 'judges' may
    sound narrower than the Hebrew office.
- source_word: לְהָבִיא עָלֵינוּ
  chosen: by bringing upon us
  alternatives:
  - to bring upon us
  - in bringing upon us
  lexicon: HALOT
  rationale: The infinitive expresses means or result relative to God's confirming
    his words. 'By bringing upon us' communicates the instrumental sense in natural
    English.
- source_word: רָעָה גְדֹלָה
  chosen: a great disaster
  alternatives:
  - great evil
  - great calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts often denotes calamity/disaster rather than
    moral evil. 'Great disaster' is clear modern English and fits the context of covenant
    punishment.
- source_word: אֲשֶׁר לֹא נֶעֶשְׂתָה
  chosen: such as had not been done
  alternatives:
  - which had not been done
  - the like of which had not been done
  lexicon: HALOT
  rationale: This relative clause compares the unprecedented nature of the disaster.
    'Such as had not been done' is idiomatic and preserves the comparative force.
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  chosen: under all heaven
  alternatives:
  - under the whole heaven
  - under all the heavens
  lexicon: HALOT
  rationale: This is a Hebrew idiom for the whole world. 'Under all heaven' is a fairly
    literal and still readable rendering; 'under the whole heaven' is also possible.
- source_word: כַּאֲשֶׁר נֶעֶשְׂתָה בִּירוּשָׁלָם
  chosen: as it was done in Jerusalem
  alternatives:
  - as was done in Jerusalem
  - as happened in Jerusalem
  lexicon: HALOT
  rationale: The feminine verb refers back to the disaster/calamity. Supplying 'it'
    makes the English clause complete while retaining the passive construction of
    the Hebrew.
