id: DAN.9.4
reference: Daniel 9:4
source:
  edition: WLC
  text: וָֽ/אֶתְפַּֽלְלָ֛/ה לַ/יהוָ֥ה אֱלֹהַ֖/י וָ/אֶתְוַדֶּ֑ה וָ/אֹֽמְרָ֗/ה אָנָּ֤א אֲדֹנָ/י֙ הָ/אֵ֤ל הַ/גָּדוֹל֙ וְ/הַ/נּוֹרָ֔א שֹׁמֵ֤ר הַ/בְּרִית֙ וְֽ/הַ/חֶ֔סֶד לְ/אֹהֲבָ֖י/ו וּ/לְ/שֹׁמְרֵ֥י מִצְוֺתָֽי/ו׃
translation:
  text: And I prayed to Yahweh my God and confessed and said, “Please, Lord, the great and awesome God, who keeps the covenant and steadfast love for those who love him and keep his commandments,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “awesome God.” The Hebrew term denotes one who inspires reverent fear.
    reason: lexical_alternative
  - marker: b
    text: Or “keeps the covenant and covenant faithfulness” / “lovingkindness.” The Hebrew חֶסֶד carries covenantal loyalty and mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְפַּלְלָה
  chosen: And I prayed
  alternatives:
  - And I was praying
  - So I prayed
  lexicon: HALOT
  rationale: Wayyiqtol of פלל narrates Daniel's action in sequence. Simple past fits the Hebrew narrative flow.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ל marks the addressee of prayer.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: First-person singular suffix is explicit and should be preserved.
- source_word: וָאֶתְוַדֶּה
  chosen: and confessed
  alternatives:
  - and made confession
  lexicon: HALOT
  rationale: ידה in the hitpael here means confessing sin. 'Confessed' is natural modern English and preserves the penitential sense.
- source_word: וָאֹמְרָה
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Continues the sequence of Daniel's prayer introduction. 'And said' is straightforward and idiomatic.
- source_word: אָנָּא
  chosen: Please
  alternatives:
  - Ah
  - O please
  lexicon: HALOT
  rationale: A particle of entreaty. 'Please' conveys earnest appeal in readable modern English without archaic tone.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord GOD
  lexicon: HALOT
  rationale: Address title distinct from the divine name earlier in the verse. 'Lord' is the natural rendering here; the 1cs form functions as the standard divine title rather than a possessive 'my Lord' in English.
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With following adjectives, this forms a titular description in direct address. English idiom prefers 'the great and fearsome God' rather than repeating 'the God' woodenly.
- source_word: הַגָּדוֹל
  chosen: great
  lexicon: HALOT
  rationale: Standard adjectival rendering; part of a fixed doxological description.
- source_word: וְהַנּוֹרָא
  chosen: fearsome
  alternatives:
  - awesome
  - dreadful
  lexicon: HALOT
  rationale: '''Fearsome'' preserves the sense of inspiring reverent fear better than the weakened modern colloquial ''awesome,'' while avoiding the misleadingly negative ''dreadful.'''
- source_word: שֹׁמֵר
  chosen: who keeps
  alternatives:
  - keeping
  - who guards
  lexicon: HALOT
  rationale: Participial form describes God's characteristic action. Relative clause in English is clear and natural.
- source_word: הַבְּרִית
  chosen: the covenant
  lexicon: HALOT
  rationale: Definite noun referring to God's covenantal commitment; standard biblical term should be retained.
- source_word: וְהַחֶסֶד
  chosen: and steadfast love
  alternatives:
  - and lovingkindness
  - and covenant faithfulness
  - and mercy
  lexicon: HALOT
  rationale: חסד is covenantally rich. 'Steadfast love' is the best established English rendering that preserves both affection and loyalty without excessive jargon.
- source_word: לְאֹהֲבָיו
  chosen: for those who love him
  alternatives:
  - to those who love him
  - for his lovers
  lexicon: HALOT
  rationale: The plural participle with pronominal suffix is best rendered as a generic personal clause. 'For' fits well with 'keeps the covenant and steadfast love for...' in English.
- source_word: וּלְשֹׁמְרֵי מִצְוֺתָיו
  chosen: and keep his commandments
  alternatives:
  - and for those who keep his commandments
  lexicon: HALOT
  rationale: 'The phrase coordinates with ''those who love him.'' English can compress the repeated preposition and article into a single relative construction: ''those who love him and keep his commandments.'' ''Commandments'' preserves the force of מצות.'
