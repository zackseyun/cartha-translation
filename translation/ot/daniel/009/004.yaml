theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering חֶסֶד in a covenant context
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - lovingkindness
  - mercy
  rationale: The verse links חסד with covenant-keeping. 'Steadfast love' preserves the covenantal and relational dimensions without narrowing the term to mere emotion or abstract fidelity.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
