id: DAN.9.16
reference: Daniel 9:16
source:
  edition: WLC
  text: אֲדֹנָ֗/י כְּ/כָל צִדְקֹתֶ֨/ךָ֙ יָֽשָׁב נָ֤א אַפְּ/ךָ֙ וַ/חֲמָ֣תְ/ךָ֔ מֵ/עִֽירְ/ךָ֥
    יְרוּשָׁלִַ֖ם הַר קָדְשֶׁ֑/ךָ כִּ֤י בַ/חֲטָאֵ֨י/נוּ֙ וּ/בַ/עֲוֺנ֣וֹת אֲבֹתֵ֔י/נוּ
    יְרוּשָׁלִַ֧ם וְ/עַמְּ/ךָ֛ לְ/חֶרְפָּ֖ה לְ/כָל סְבִיבֹתֵֽי/נוּ־־־־׃
translation:
  text: Lord, according to all your righteous acts, please let your anger and your
    wrath turn away from your city Jerusalem, your holy mountain; because through
    our sins and the iniquities of our fathers, Jerusalem and your people have become
    a reproach to all those around us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your acts of justice' or 'your righteousness.' The Hebrew is plural,
      likely pointing to God's righteous deeds rather than only an abstract attribute.
    reason: lexical_alternative
  - marker: b
    text: '''Our fathers'' refers to the prior generations/ancestors of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - My Lord
  - O Lord
  lexicon: HALOT
  rationale: Standard rendering of the divine title here in direct address. 'Lord'
    matches the doctrine default for κύριος analogously and fits readable modern English;
    the vocative force is carried by punctuation rather than adding 'O'.
- source_word: כְּכָל
  chosen: according to all
  alternatives:
  - in keeping with all
  - because of all
  lexicon: HALOT
  rationale: 'The preposition כְ with כָּל introduces the standard or measure appealed
    to in Daniel''s plea: God''s action is requested in accordance with all his righteous
    deeds.'
- source_word: צִדְקֹתֶיךָ
  chosen: your righteous acts
  alternatives:
  - your righteousnesses
  - your righteousness
  - your acts of righteousness
  lexicon: HALOT
  rationale: The plural noun naturally points to concrete manifestations of righteousness
    rather than an abstract quality alone. 'Righteous acts' is idiomatic English and
    preserves the plural sense better than a bare abstract singular.
- source_word: יָשָׁב נָא
  chosen: please let ... turn away
  alternatives:
  - please turn back
  - please be turned away
  - please withdraw
  lexicon: HALOT
  rationale: The jussive with particle נָא expresses entreaty. With anger/wrath as
    subject, שוב conveys turning back/away. English idiom favors 'let your anger ...
    turn away' rather than a wooden 'may your anger return'.
- source_word: אַפְּךָ
  chosen: your anger
  alternatives:
  - your nose
  - your wrath
  lexicon: HALOT
  rationale: Though literally 'your nose,' this is a standard Hebrew idiom for anger.
    'Anger' is the clear contextual rendering.
- source_word: וַחֲמָתְךָ
  chosen: and your wrath
  alternatives:
  - and your fury
  - and your heat
  lexicon: HALOT
  rationale: Pairs naturally with אַף as an intensified expression of divine displeasure.
    'Wrath' preserves the elevated tone and distinction from 'anger'.
- source_word: מֵעִירְךָ יְרוּשָׁלַם
  chosen: from your city Jerusalem
  alternatives:
  - away from Jerusalem your city
  - from Jerusalem, your city
  lexicon: HALOT
  rationale: The preposition מן marks the object from which anger is to turn away.
    The appositional structure is represented smoothly in English.
- source_word: הַר קָדְשֶׁךָ
  chosen: your holy mountain
  alternatives:
  - the mountain of your holiness
  - your sacred hill
  lexicon: HALOT
  rationale: Apposition to Jerusalem, highlighting Zion/temple mount as consecrated
    to God. 'Holy mountain' is the established and natural equivalent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason Jerusalem is in disgrace and why mercy is needed.
    'Because' makes the causal force explicit in contemporary English.
- source_word: בַחֲטָאֵינוּ
  chosen: through our sins
  alternatives:
  - because of our sins
  - in our sins
  lexicon: HALOT
  rationale: The beth here is causal/instrumental. 'Through our sins' preserves that
    nuance while remaining natural; the following clause explains the resulting condition
    of Jerusalem and the people.
- source_word: וּבַעֲוֹנוֹת אֲבֹתֵינוּ
  chosen: and the iniquities of our fathers
  alternatives:
  - and the sins of our fathers
  - and the guilt of our fathers
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt, not merely generic sin.
    'Fathers' is retained as gender-accurate and source-matching, referring to ancestors.
- source_word: יְרוּשָׁלַם וְעַמְּךָ
  chosen: Jerusalem and your people
  alternatives:
  - Jerusalem, even your people
  - Jerusalem and your people alike
  lexicon: HALOT
  rationale: The two subjects are joined and together described by the following predicate.
    The straightforward coordination is best in English.
- source_word: לְחֶרְפָּה
  chosen: have become a reproach
  alternatives:
  - are a reproach
  - have become an object of scorn
  - are disgraced
  lexicon: HALOT
  rationale: The lamed marks resultant state. English often supplies 'have become'
    to make the predication explicit. 'Reproach' preserves the covenant-shame dimension
    better than a flatter 'disgrace'.
- source_word: לְכָל סְבִיבֹתֵינוּ
  chosen: to all those around us
  alternatives:
  - to all our neighbors
  - to all our surrounding peoples
  - before all around us
  lexicon: HALOT
  rationale: Refers to surrounding peoples/nations. 'Those around us' is readable
    and broad enough without over-specifying ethnic identity not explicit in the Hebrew.
