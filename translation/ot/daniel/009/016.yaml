theological_decisions:
- issue: Rendering צִדְקֹתֶיךָ in appeal to God's character and deeds
  chosen_reading: your righteous acts
  alternative_readings:
  - your righteousness
  - your acts of justice
  rationale: The plural form suggests concrete deeds flowing from God's righteous
    character. 'Righteous acts' preserves both moral and covenantal dimensions without
    narrowing the term to forensic justice alone. Because 'righteousness/justice'
    can be theologically weighty, alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3; Contested terms table on δικαιοσύνη
    by analogy to preserving righteousness/justice tension where relevant
- issue: Corporate solidarity in guilt
  chosen_reading: our sins and the iniquities of our fathers
  alternative_readings:
  - our sins and the sins of our ancestors
  rationale: The Hebrew explicitly names both the present community and prior generations.
    The translation preserves this corporate and intergenerational confession without
    softening 'fathers' to a gender-neutral term, in keeping with gender-accurate
    policy.
  doctrine_reference: Translation philosophy §4
