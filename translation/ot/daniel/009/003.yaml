id: DAN.9.3
reference: Daniel 9:3
source:
  edition: WLC
  text: וָ/אֶתְּנָ֣/ה אֶת פָּנַ֗/י אֶל אֲדֹנָ/י֙ הָֽ/אֱלֹהִ֔ים לְ/בַקֵּ֥שׁ תְּפִלָּ֖ה
    וְ/תַחֲנוּנִ֑ים בְּ/צ֖וֹם וְ/שַׂ֥ק וָ/אֵֽפֶר־־׃
translation:
  text: So I turned my face to the Lord God, seeking him by prayer and pleas for mercy,
    with fasting, sackcloth, and ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I set my face toward the Lord God.' The Hebrew idiom is more literally
      'I gave/set my face to.'
    reason: lexical_alternative
  - marker: b
    text: Or 'supplications' for 'pleas for mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  chosen: I turned
  alternatives:
  - I set
  - I gave
  - I directed
  lexicon: HALOT
  rationale: The verb from נתן literally means 'I gave/set,' but in the idiom with
    'my face' and אֶל it means to direct oneself toward someone. 'I turned' gives
    natural English while preserving the intentional movement toward God.
- source_word: אֶת פָּנַי
  chosen: my face
  alternatives:
  - my attention
  - myself
  lexicon: HALOT
  rationale: The Hebrew idiom 'set/give one's face' conveys directed attention and
    resolve. Retaining 'my face' preserves the concrete imagery of the source text;
    the idiomatic force is carried by 'turned my face.'
- source_word: אֶל אֲדֹנָי הָאֱלֹהִים
  chosen: to the Lord God
  alternatives:
  - to the Lord, the God
  - to the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי with הָאֱלֹהִים is a reverential divine address. 'Lord God' is
    standard, clear English and preserves both titles. Small caps 'LORD' are not used
    because the Hebrew here is not YHWH but אֲדֹנָי.
- source_word: לְבַקֵּשׁ
  chosen: seeking him
  alternatives:
  - to seek
  - seeking
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: Daniel turned to God in order to seek
    him. Supplying ''him'' makes the English idiomatic and reflects the implied object
    from the context of turning to the Lord God.'
- source_word: תְּפִלָּה
  chosen: prayer
  alternatives:
  - prayerful petition
  lexicon: HALOT
  rationale: The basic sense is 'prayer.' This is the broad term in contrast with
    the more specific and urgent תחנונים that follows.
- source_word: וְתַחֲנוּנִים
  chosen: pleas for mercy
  alternatives:
  - supplications
  - pleas
  - entreaties
  lexicon: HALOT
  rationale: The noun denotes earnest petitions for favor or mercy. 'Pleas for mercy'
    is more accessible than 'supplications' and captures the humble, urgent tone.
- source_word: בְּצוֹם
  chosen: with fasting
  alternatives:
  - in fasting
  lexicon: HALOT
  rationale: The preposition ב marks attendant circumstance or means. 'With fasting'
    is natural English and fits the series that follows.
- source_word: וְשַׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: HALOT
  rationale: This is the conventional and accurate term for the garment associated
    with mourning and penitence.
- source_word: וָאֵפֶר
  chosen: ashes
  alternatives:
  - ash
  lexicon: HALOT
  rationale: The noun refers to ashes used as a sign of mourning and humiliation.
    The plural 'ashes' is idiomatic in English in this ritual context.
