theological_decisions:
- issue: Rendering of divine title אֲדֹנָי הָאֱלֹהִים
  chosen_reading: the Lord God
  alternative_readings:
  - the Lord, God
  - the Lord GOD
  rationale: The phrase contains the title אֲדֹנָי, not the divine name YHWH. Following
    the doctrine's contested-terms guidance, 'Lord' is the appropriate rendering for
    this title, while 'God' renders הָאֱלֹהִים. This avoids importing the covenant-name
    convention 'the LORD' where it is not present.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος/Kyrios → Lord; יְהוָה YHWH
    → the LORD'
