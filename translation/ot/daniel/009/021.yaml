id: DAN.9.21
reference: Daniel 9:21
source:
  edition: WLC
  text: וְ/ע֛וֹד אֲנִ֥י מְדַבֵּ֖ר בַּ/תְּפִלָּ֑ה וְ/הָ/אִ֣ישׁ גַּבְרִיאֵ֡ל אֲשֶׁר֩
    רָאִ֨יתִי בֶ/חָז֤וֹן בַּ/תְּחִלָּה֙ מֻעָ֣ף בִּ/יעָ֔ף נֹגֵ֣עַ אֵלַ֔/י כְּ/עֵ֖ת
    מִנְחַת עָֽרֶב־׃
translation:
  text: while I was still speaking in prayer, the man Gabriel, whom I had seen in
    the vision at the beginning, came to me in swift flight at the time of the evening
    offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'being wearied' or 'in weariness' instead of 'in swift
      flight.' The Hebrew phrase is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעוֹד
  chosen: while ... still
  alternatives:
  - and still
  - even while
  lexicon: HALOT
  rationale: With the following participle and pronoun, the phrase marks ongoing action
    contemporaneous with Gabriel's arrival. 'While ... still' captures the temporal
    force naturally in English.
- source_word: מְדַבֵּר בַּתְּפִלָּה
  chosen: speaking in prayer
  alternatives:
  - speaking in the prayer
  - praying
  lexicon: HALOT
  rationale: The Hebrew is literally 'speaking in the prayer.' 'Speaking in prayer'
    preserves both the verbal action and the prayer context without over-paraphrasing
    to simply 'praying,' though the sense overlaps.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the one
  - the male figure
  lexicon: HALOT
  rationale: The noun ordinarily means 'man.' Although Gabriel is an angelic messenger,
    Daniel describes him in human appearance; 'the man Gabriel' preserves the source
    wording and the visionary presentation.
- source_word: גַּבְרִיאֵל
  chosen: Gabriel
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: אֲשֶׁר רָאִיתִי בֶחָזוֹן בַּתְּחִלָּה
  chosen: whom I had seen in the vision at the beginning
  alternatives:
  - whom I had seen earlier in the vision
  - whom I had seen in the earlier vision
  lexicon: HALOT
  rationale: The clause points back to Gabriel's earlier appearance in the chapter.
    'At the beginning' is a close rendering of בַּתְּחִלָּה and leaves the temporal
    reference explicit.
- source_word: מֻעָף בִּיעָף
  chosen: in swift flight
  alternatives:
  - flying swiftly
  - wearied with weariness
  - in wearied exhaustion
  lexicon: HALOT
  rationale: The traditional and contextually strongest reading takes the phrase as
    describing rapid flight. The wording is difficult, and some have connected it
    with weariness, but Gabriel's movement toward Daniel favors 'swift flight.' 'In
    swift flight' keeps the participial/adverbial sense concise in English.
- source_word: נֹגֵעַ אֵלַי
  chosen: came to me
  alternatives:
  - touched me
  - reached me
  lexicon: HALOT
  rationale: נגע often means 'touch, reach.' In this context of arrival, English 'came
    to me' communicates the approach naturally; the more literal 'touched me' is possible
    but less certain here because the emphasis is on Gabriel's arrival at Daniel's
    location.
- source_word: כְּעֵת
  chosen: at the time of
  alternatives:
  - about the time of
  - around the time of
  lexicon: HALOT
  rationale: The preposition marks approximate temporal correspondence. 'At the time
    of' is idiomatic and sufficiently precise.
- source_word: מִנְחַת עָרֶב
  chosen: the evening offering
  alternatives:
  - the evening sacrifice
  - the evening grain offering
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift offering and often specifically a grain offering,
    but in temporal expressions it can function as the named time of the regular evening
    offering. 'Evening offering' is broad enough to reflect the Hebrew without over-specifying
    the material of the sacrifice.
