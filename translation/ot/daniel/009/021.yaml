theological_decisions:
- issue: Nature of Gabriel's movement in מֻעָף בִּיעָף
  chosen_reading: Gabriel is described as coming in swift flight.
  alternative_readings:
  - Gabriel came in weariness
  - Gabriel, being wearied, came
  rationale: The phrase is lexically difficult and has been read in more than one
    way. The immediate context of Gabriel's sudden arrival during Daniel's prayer
    and the long-standing understanding of the expression support a movement sense.
    To preserve the ambiguity without flattening the text, the alternative is retained
    in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
