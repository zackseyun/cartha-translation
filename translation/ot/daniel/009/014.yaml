theological_decisions:
- issue: Rendering רָעָה in relation to God's action
  chosen_reading: the disaster
  alternative_readings:
  - the evil
  - the calamity
  rationale: To avoid implying that God committed moral evil while still preserving
    that he brought covenant judgment, רָעָה is rendered as punitive disaster/calamity.
    This reflects common Hebrew usage in judgment contexts and preserves the text's
    theological claim that God's action was righteous.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension without importing claims the text does not make.'
