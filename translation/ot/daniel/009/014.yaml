id: DAN.9.14
reference: Daniel 9:14
source:
  edition: WLC
  text: וַ/יִּשְׁקֹ֤ד יְהוָה֙ עַל הָ֣/רָעָ֔ה וַ/יְבִיאֶ֖/הָ עָלֵ֑י/נוּ כִּֽי צַדִּ֞יק
    יְהוָ֣ה אֱלֹהֵ֗י/נוּ עַל כָּל מַֽעֲשָׂי/ו֙ אֲשֶׁ֣ר עָשָׂ֔ה וְ/לֹ֥א שָׁמַ֖עְנוּ
    בְּ/קֹלֽ/וֹ־־־־׃
translation:
  text: So the LORD kept watch over the disaster and brought it upon us, for the LORD
    our God is righteous in all the works that he has done, yet we have not listened
    to his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the calamity.' The Hebrew word can also mean 'evil,' but here it refers
      to the disaster of judgment brought on the people.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'kept watch over' can also be understood as 'was vigilant
      concerning' or, more interpretively, 'hastened.'
    reason: lexical_alternative
  - marker: c
    text: '''Listened to his voice'' carries the sense of obeying what he said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁקֹד
  chosen: kept watch over
  alternatives:
  - watched over
  - was vigilant concerning
  - hastened
  lexicon: HALOT
  rationale: The verb שׁקד commonly conveys wakefulness, watchfulness, or vigilance.
    In this context, with עַל הָרָעָה following, the sense is that God remained vigilant
    regarding the announced calamity until bringing it about. 'Kept watch over' preserves
    the metaphor better than the interpretive 'hastened,' while still making sense
    in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: In judgment contexts רָעָה often denotes calamity or disaster rather
    than moral evil. 'Disaster' communicates punitive catastrophe without implying
    moral evil in God.
- source_word: וַיְבִיאֶהָ עָלֵינוּ
  chosen: brought it upon us
  alternatives:
  - caused it to come upon us
  - brought it against us
  lexicon: HALOT
  rationale: A natural rendering of the causative verb בוא with the feminine suffix
    referring back to 'the disaster.' 'Upon us' reflects עָלֵינוּ idiomatically in
    judgment language.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for the preceding statement: God''s action is
    grounded in his righteousness.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: '''Righteous'' is the standard rendering and fits the covenantal-moral
    context. ''Just'' is possible, but ''righteous'' better matches the broader biblical
    diction.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  rationale: Straightforward possessive construction.
- source_word: עַל כָּל מַעֲשָׂיו אֲשֶׁר עָשָׂה
  chosen: in all the works that he has done
  alternatives:
  - in all his deeds that he has done
  - concerning all his works which he did
  lexicon: HALOT
  rationale: The preposition עַל here is taken in the sense 'with respect to/in regard
    to,' yielding the idiomatic English 'in all the works.' The phrase emphasizes
    that God's righteousness is seen in all his actions. 'Has done' gives good English
    while preserving the completed action.
- source_word: וְלֹא שָׁמַעְנוּ בְּקֹלוֹ
  chosen: yet we have not listened to his voice
  alternatives:
  - and we did not obey his voice
  - and we have not heeded him
  lexicon: HALOT
  rationale: שׁמע בקול often carries the sense of listening with obedience. 'Listened
    to his voice' preserves the Hebrew expression, while 'yet' brings out the adversative
    force naturally in English.
