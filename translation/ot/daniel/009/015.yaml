id: DAN.9.15
reference: Daniel 9:15
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אֲדֹנָ֣/י אֱלֹהֵ֗י/נוּ אֲשֶׁר֩ הוֹצֵ֨אתָ אֶֽת עַמְּ/ךָ֜ מֵ/אֶ֤רֶץ
    מִצְרַ֨יִם֙ בְּ/יָ֣ד חֲזָקָ֔ה וַ/תַּֽעַשׂ לְ/ךָ֥ שֵׁ֖ם כַּ/יּ֣וֹם הַ/זֶּ֑ה חָטָ֖אנוּ
    רָשָֽׁעְנוּ׀־־׃
translation:
  text: And now, Lord our God, who brought your people out from the land of Egypt
    with a strong hand and made for yourself a name as it is this day—we have sinned;
    we have acted wickedly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with a mighty hand.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'made yourself a name,' that is, gained renown.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to this day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי אֱלֹהֵינוּ
  chosen: Lord our God
  alternatives:
  - Lord God of us
  - my Lord, our God
  lexicon: HALOT
  rationale: Standard vocative rendering in prayer context. 'Lord' for אֲדֹנָי aligns
    with the project's default for divine title language and yields natural English.
- source_word: הוֹצֵאתָ
  chosen: brought ... out
  alternatives:
  - led ... out
  - caused ... to come out
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought ...
    out' is idiomatic and preserves the exodus allusion.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: In covenantal context עם refers to the people belonging to God; 'your
    people' is the natural and theologically appropriate English equivalent.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out from the land of Egypt
  alternatives:
  - from Egypt
  - from the land of Egypt
  lexicon: HALOT
  rationale: Retains the formal geographic phrase while remaining readable. 'Land
    of Egypt' preserves the exodus formula.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - with a mighty hand
  - by a strong hand
  lexicon: HALOT
  rationale: Literal rendering preserves the stock exodus expression. 'Strong hand'
    is close to the Hebrew; 'mighty hand' is possible but slightly more interpretive.
- source_word: וַתַּעַשׂ לְךָ שֵׁם
  chosen: made for yourself a name
  alternatives:
  - made yourself a name
  - won renown for yourself
  lexicon: HALOT
  rationale: The idiom means acquiring renown or reputation. 'Made for yourself a
    name' keeps the Hebrew imagery while remaining understandable.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as on this day
  - to this day
  lexicon: HALOT
  rationale: This common biblical idiom points to the continuing public reality of
    God's renown up to the speaker's present. 'As it is this day' is idiomatic modern
    English and preserves the temporal force better than the more interpretive 'to
    this day'.
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: HALOT
  rationale: The qatal here in confessional prayer is well rendered by English present
    perfect, expressing acknowledged guilt with present relevance.
- source_word: רָשָׁעְנוּ
  chosen: we have acted wickedly
  alternatives:
  - we have done wickedly
  - we have been wicked
  lexicon: HALOT
  rationale: Distinguishes this verb from the preceding 'sinned' while preserving
    the moral force. 'Acted wickedly' is readable modern English and reflects verbal
    action.
