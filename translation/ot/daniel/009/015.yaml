theological_decisions:
- issue: Exodus allusion and divine reputation idiom
  chosen_reading: Retain the exodus formula and the idiom of God making a name for
    himself in relatively literal form.
  alternative_readings:
  - Use more dynamic language such as 'rescued your people from Egypt by your power
    and gained renown'
  rationale: The verse intentionally echoes foundational covenant history. A more
    literal rendering preserves intertextual and theological weight without sacrificing
    readability.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
