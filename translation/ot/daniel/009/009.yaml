id: DAN.9.9
reference: Daniel 9:9
source:
  edition: WLC
  text: לַֽ/אדֹנָ֣/י אֱלֹהֵ֔י/נוּ הָ/רַחֲמִ֖ים וְ/הַ/סְּלִח֑וֹת כִּ֥י מָרַ֖דְנוּ בּֽ/וֹ׃
translation:
  text: To the Lord our God belong compassion and forgiveness, for we have rebelled
    against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercies and pardons.' The Hebrew uses plural forms for both nouns, which
      can express abundance or function as abstract nouns.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאדֹנָי
  chosen: To the Lord belong
  alternatives:
  - The Lord has
  - Belonging to the Lord is
  lexicon: HALOT
  rationale: 'The prefixed ל marks possession/dative: ''to the Lord'' in the sense
    of ''belong to the Lord.'' English idiom requires supplying ''belong'' to make
    the verbless clause natural while preserving the Hebrew sense.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Straightforward construct with 1cp suffix: ''our God.'' Kept with ''Lord''
    to preserve Daniel''s covenantal address.'
- source_word: הָרַחֲמִים
  chosen: compassion
  alternatives:
  - mercies
  - compassions
  lexicon: HALOT
  rationale: Though morphologically plural, the noun often functions as an abstract
    plural in Hebrew. 'Compassion' is more natural modern English than 'mercies' while
    retaining the sense of divine pity and tender mercy.
- source_word: וְהַסְּלִחוֹת
  chosen: forgiveness
  alternatives:
  - forgivenesses
  - pardons
  lexicon: HALOT
  rationale: Plural form paired with רחמים, but English normally uses the abstract
    singular 'forgiveness.' This preserves readability without losing meaning.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - although
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the appeal/confession: God''s compassion
    and forgiveness are relevant because the people have rebelled. ''For'' fits the
    explanatory force in context.'
- source_word: מָרַדְנוּ
  chosen: we have rebelled
  alternatives:
  - we rebelled
  - we have been rebellious
  lexicon: HALOT
  rationale: The verb מרד denotes rebellion, not merely sin in general. Present perfect
    English captures the completed act with continuing relevance in confession.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: With מרד, the preposition conveys rebellion directed against someone.
    English idiom requires 'against him,' not the more literal but misleading 'in
    him.'
