theological_decisions:
- issue: Divine titles in address
  chosen_reading: Lord ... God
  alternative_readings:
  - Master ... God
  rationale: אדני is best rendered 'Lord' as a divine title, consistent with the project's
    default for title language and with reverent covenantal address. 'Master' is possible
    lexically but less fitting in this prayer context.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy §2'
