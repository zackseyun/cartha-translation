theological_decisions:
- issue: Whether מָשִׁיחַ here should be rendered explicitly as 'Messiah' in the main
    text
  chosen_reading: Render as 'an anointed one' in the main text
  alternative_readings:
  - Messiah
  rationale: The translation philosophy prefers 'Messiah' where the title sense is
    contextually supported, but this verse is a major interpretive crux and the Hebrew
    lacks the article. Rendering 'an anointed one' preserves lexical transparency
    and avoids resolving a debated identification in translation. The messianic reading
    is important enough to preserve in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Preserve
    theological tension rather than resolve it.'
- issue: How to render the ambiguous clause וְאֵין לוֹ
  chosen_reading: Render as 'and will have nothing'
  alternative_readings:
  - and there is nothing for him
  - and no one will be for him
  rationale: The clause is syntactically compressed and has been understood as deprivation,
    abandonment, or lack of rightful possession. The chosen rendering preserves ambiguity
    rather than importing a specific theological interpretation about atonement, rejection,
    or succession.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
