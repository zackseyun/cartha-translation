id: DAN.9.26
reference: Daniel 9:26
source:
  edition: WLC
  text: וְ/אַחֲרֵ֤י הַ/שָּׁבֻעִים֙ שִׁשִּׁ֣ים וּ/שְׁנַ֔יִם יִכָּרֵ֥ת מָשִׁ֖יחַ וְ/אֵ֣ין
    ל֑/וֹ וְ/הָ/עִ֨יר וְ/הַ/קֹּ֜דֶשׁ יַ֠שְׁחִית עַ֣ם נָגִ֤יד הַ/בָּא֙ וְ/קִצּ֣/וֹ
    בַ/שֶּׁ֔טֶף וְ/עַד֙ קֵ֣ץ מִלְחָמָ֔ה נֶחֱרֶ֖צֶת שֹׁמֵמֽוֹת׃
translation:
  text: And after the sixty-two weeks, an anointed one will be cut off and will have
    nothing. And the city and the sanctuary the people of the coming ruler will destroy.
    Its end will come with a flood, and until the end there will be war; desolations
    are decreed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Messiah will be cut off.' The Hebrew reads 'an anointed one,' and interpreters
      differ on whether this refers specifically to the Messiah.
    reason: alternative_reading
  - marker: b
    text: Or 'and there will be nothing for him,' or 'and no one will be for him.'
      The Hebrew clause is terse and difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'the people of a coming prince.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his end will come with a flood.' The referent of 'his/its' is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking what occurs subsequent to the sixty-two
    weeks.
- source_word: הַשָּׁבֻעִים שִׁשִּׁים וּשְׁנַיִם
  chosen: the sixty-two weeks
  alternatives:
  - the sixty-two sevens
  lexicon: HALOT
  rationale: Retains the conventional and lexically defensible 'weeks' for שָׁבוּעַ
    while acknowledging the idiomatic sense of heptads/sevens in Daniel. 'Weeks' is
    readable and preserves the established temporal framework without over-interpreting
    the unit.
- source_word: יִכָּרֵת
  chosen: will be cut off
  alternatives:
  - will be cut down
  - will be eliminated
  lexicon: HALOT
  rationale: Niphal of כרת commonly carries the sense of being cut off, often violently
    or by judgment. This preserves the idiom and its solemn force better than a more
    interpretive paraphrase.
- source_word: מָשִׁיחַ
  chosen: an anointed one
  alternatives:
  - Messiah
  - an anointed leader
  lexicon: HALOT
  rationale: Although the Hebrew term can denote 'anointed one' generally and is not
    articular here, the context is debated. To avoid importing a specific messianic
    identification into the main text where the Hebrew itself is less explicit, the
    more lexical rendering is used. The christological alternative is preserved in
    a footnote.
- source_word: וְאֵין לוֹ
  chosen: and will have nothing
  alternatives:
  - and there is nothing for him
  - and no one will be for him
  lexicon: HALOT
  rationale: The phrase is terse and ambiguous. 'Will have nothing' captures the likely
    sense of deprivation/loss without specifying whether the lack is possessions,
    support, or rightful claim. Alternatives are preserved in a footnote because the
    clause is genuinely difficult.
- source_word: הָעִיר וְהַקֹּדֶשׁ
  chosen: the city and the sanctuary
  alternatives:
  - the city and the holy place
  lexicon: HALOT
  rationale: '''Sanctuary'' best conveys הַקֹּדֶשׁ here as the holy precinct/temple
    area in parallel with ''the city.'''
- source_word: יַשְׁחִית
  chosen: will destroy
  alternatives:
  - will ruin
  - will devastate
  lexicon: HALOT
  rationale: Hiphil of שׁחת here denotes destructive action against the city and sanctuary.
    'Destroy' is the clearest modern equivalent.
- source_word: עַם נָגִיד הַבָּא
  chosen: the people of the coming ruler
  alternatives:
  - the people of a ruler who is to come
  - the people of the prince who is coming
  lexicon: HALOT
  rationale: נָגִיד can mean ruler, leader, or prince. 'Ruler' is more accessible
    modern English while preserving the political authority sense. The participle
    הַבָּא is rendered 'coming' attributively.
- source_word: וְקִצּוֹ בַשֶּׁטֶף
  chosen: Its end will come with a flood
  alternatives:
  - And its end will be with a flood
  - and his end will be with a flood
  lexicon: HALOT
  rationale: The pronominal suffix on 'end' is ambiguous in referent. 'Its end' most
    naturally refers to the city/sanctuary complex or the destructive event just mentioned.
    'With a flood' preserves the metaphor or literal image without deciding beyond
    the text.
- source_word: וְעַד קֵץ מִלְחָמָה
  chosen: and until the end there will be war
  alternatives:
  - and until the end shall be war
  - and until the end is war
  lexicon: HALOT
  rationale: This yields natural English while preserving the ongoing state of warfare
    up to the end.
- source_word: נֶחֱרֶצֶת
  chosen: are decreed
  alternatives:
  - is decreed
  - is determined
  lexicon: HALOT
  rationale: From חרץ in the passive, conveying something decisively determined/decreed.
    In English it is linked with the plural 'desolations' that follows in sense.
- source_word: שֹׁמֵמוֹת
  chosen: desolations
  alternatives:
  - desolate things
  - devastations
  lexicon: HALOT
  rationale: A strong nominal-like participial expression indicating repeated or continuing
    desolating conditions. 'Desolations' is idiomatic and weighty.
