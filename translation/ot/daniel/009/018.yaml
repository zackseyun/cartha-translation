theological_decisions:
- issue: Anthropomorphic language for God ('ear,' 'eyes')
  chosen_reading: Retained as direct anthropomorphic prayer language
  alternative_readings:
  - Interpretive paraphrase such as 'pay attention' and 'take notice'
  rationale: The Hebrew uses embodied metaphors in prayer. Preserving them maintains
    the text's rhetoric and theological posture without implying creaturely limitation
    in God.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
- issue: Basis of Daniel's appeal
  chosen_reading: The prayer explicitly denies appeal on the basis of Israel's righteousness
    and grounds it in God's mercies
  alternative_readings:
  - Smoother paraphrase minimizing the plural 'righteousnesses' into generic moral
    worth
  rationale: The verse contrasts human merit with divine mercy. The translation keeps
    that theological contrast explicit while remaining readable.
  doctrine_reference: 'Translation philosophy: preserve theological tension and avoid
    importing claims not made by the text.'
