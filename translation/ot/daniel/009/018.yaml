id: DAN.9.18
reference: Daniel 9:18
source:
  edition: WLC
  text: הַטֵּ֨ה אֱלֹהַ֥/י אָזְנְ/ךָ֮ וּֽ/שֲׁמָע֒ פקח/ה עֵינֶ֗י/ךָ וּ/רְאֵה֙ שֹֽׁמְמֹתֵ֔י/נוּ
    וְ/הָ/עִ֕יר אֲשֶׁר נִקְרָ֥א שִׁמְ/ךָ֖ עָלֶ֑י/הָ כִּ֣י לֹ֣א עַל צִדְקֹתֵ֗י/נוּ
    אֲנַ֨חְנוּ מַפִּילִ֤ים תַּחֲנוּנֵ֨י/נוּ֙ לְ/פָנֶ֔י/ךָ כִּ֖י עַל רַחֲמֶ֥י/ךָ הָ/רַבִּֽים׀־׀־־׃
translation:
  text: Incline your ear, my God, and hear; open your eyes and see our desolations
    and the city that is called by your name. For we are not presenting our pleas
    before you because of our righteousnesses, but because of your great mercies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'our righteousnesses,' likely referring to righteous acts or
      claims of righteousness.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''the city over which your name is called.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  chosen: Incline
  alternatives:
  - Turn
  - Bend down
  lexicon: HALOT
  rationale: Imperative of נטה used idiomatically with 'ear' for attentive listening.
    'Incline' preserves the prayerful, elevated idiom without becoming archaic beyond
    comprehension.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct with 1cs suffix is direct address. 'My God' is the plain sense;
    the vocative force is clear from context without needing to add 'O'.
- source_word: אָזְנְךָ
  chosen: your ear
  lexicon: HALOT
  rationale: Singular 'ear' should be retained because the Hebrew idiom is singular.
- source_word: וּשֲׁמָע
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: Standard rendering of שמע in parallel with 'incline your ear.' 'Hear'
    keeps the concrete auditory metaphor and the prayer's urgency.
- source_word: פְּקַחָה
  chosen: open
  lexicon: HALOT
  rationale: Imperative of פקח, commonly used of opening eyes. Straightforward lexical
    sense.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Plural retained; part of the anthropomorphic appeal for divine attention.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look upon
  lexicon: HALOT
  rationale: Simple imperative of ראה. 'See' is direct and preserves the parallelism
    with 'hear.'
- source_word: שֹׁמְמֹתֵינוּ
  chosen: our desolations
  alternatives:
  - our devastated condition
  - the desolations upon us
  lexicon: HALOT
  rationale: Plural noun from שמם denotes devastated states/ruins. 'Our desolations'
    is formally close and allows both the people's condition and the ruined places
    to remain in view.
- source_word: וְהָעִיר
  chosen: and the city
  lexicon: HALOT
  rationale: Coordinates the city with 'our desolations' as the object of 'see.'
- source_word: אֲשֶׁר נִקְרָא שִׁמְךָ עָלֶיהָ
  chosen: that is called by your name
  alternatives:
  - over which your name is called
  - which bears your name
  lexicon: HALOT
  rationale: Hebrew idiom literally 'your name is called upon it/her.' In English,
    'called by your name' is the most natural equivalent while preserving covenantal
    ownership/association.
- source_word: כִּי לֹא עַל צִדְקֹתֵינוּ
  chosen: For we are not presenting our pleas before you because of our righteousnesses
  alternatives:
  - For not on account of our righteous deeds do we present our supplications before
    you
  - For it is not because of our righteousness
  lexicon: HALOT
  rationale: The clause introduces the basis of the petition. The plural 'righteousnesses'
    is somewhat unusual in English but reflects the Hebrew plural, likely referring
    to acts or claims of righteousness; retained for auditability, though the sentence
    is smoothed by 'because of.'
- source_word: מַפִּילִים
  chosen: are presenting
  alternatives:
  - are laying down
  - are casting down
  - are causing to fall
  lexicon: HALOT
  rationale: Hiphil participle of נפל with תחנונים and לפני forms an idiom for laying
    a petition before someone. 'Presenting' conveys the idiomatic force in natural
    English better than a wooden 'causing to fall.'
- source_word: תַּחֲנוּנֵינוּ
  chosen: our pleas
  alternatives:
  - our supplications
  - our petitions
  lexicon: HALOT
  rationale: Denotes earnest entreaties for mercy. 'Pleas' is accessible modern English
    and preserves the urgent tone.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Standard idiom for bringing a request into someone's presence.
- source_word: כִּי עַל רַחֲמֶיךָ הָרַבִּים
  chosen: but because of your great mercies
  alternatives:
  - but on account of your abundant compassion
  - but because of your many mercies
  lexicon: HALOT
  rationale: Contrastive force after negation is best expressed with 'but.' רחמים
    in plural often denotes compassion/mercies; 'great mercies' renders the adjective
    naturally and preserves the abundance motif.
