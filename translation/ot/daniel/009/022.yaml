id: DAN.9.22
reference: Daniel 9:22
source:
  edition: WLC
  text: וַ/יָּ֖בֶן וַ/יְדַבֵּ֣ר עִמִּ֑/י וַ/יֹּאמַ֕ר דָּנִיֵּ֕אל עַתָּ֥ה יָצָ֖אתִי
    לְ/הַשְׂכִּילְ/ךָ֥ בִינָֽה׃
translation:
  text: He gave me understanding, and spoke with me, and said, “Daniel, I have now
    come out to give you insight and understanding.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He made me understand.' The Hebrew verb can be read
      causatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have gone out' or 'I have come forth.' The Hebrew verb is literally
      'gone out/came out,' here referring to the speaker's being sent forth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֶן
  chosen: He gave me understanding
  alternatives:
  - he understood
  - he made me understand
  lexicon: HALOT
  rationale: 'From בין in the Hiphil-like sense common in context, the verb here is
    best taken causatively: the messenger enabled Daniel to understand. English ''gave
    me understanding'' is natural and reflects the effect on Daniel. ''He understood''
    would not fit the following direct address and context as well; ''he made me understand''
    is a viable more formal alternative.'
- source_word: וַיְדַבֵּר עִמִּי
  chosen: and spoke with me
  alternatives:
  - and spoke to me
  lexicon: HALOT
  rationale: דבר עם commonly means 'speak with.' Since עִם is explicit, 'with me'
    preserves the preposition more closely than 'to me,' while remaining idiomatic
    English.
- source_word: וַיֹּאמַר
  chosen: and said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'and said' is
    the natural English equivalent.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present moment of the angel's mission. 'Now'
    is concise and idiomatic.
- source_word: יָצָאתִי
  chosen: I have now come out
  alternatives:
  - I have gone out
  - I have come forth
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' In this context of heavenly dispatch
    toward Daniel, English often needs a deictic adjustment. 'Come out' preserves
    the source image while sounding natural from Daniel's perspective. 'Gone out'
    is more literal but less natural in English here.
- source_word: לְהַשְׂכִּילְךָ
  chosen: to give you insight
  alternatives:
  - to make you understand
  - to instruct you wisely
  lexicon: HALOT
  rationale: The Hiphil of שכל can mean to give insight, make prudent, or cause to
    understand. 'To give you insight' captures the causative sense and pairs well
    with the following noun בינה.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: 'בינה denotes understanding/discernment. ''Understanding'' is the most
    straightforward and idiomatic complement to the preceding infinitive, yielding
    a natural but still source-sensitive phrase: ''to give you insight and understanding.'''
