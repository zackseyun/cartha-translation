id: DAN.9.2
reference: Daniel 9:2
source:
  edition: WLC
  text: בִּ/שְׁנַ֤ת אַחַת֙ לְ/מָלְכ֔/וֹ אֲנִי֙ דָּֽנִיֵּ֔אל בִּינֹ֖תִי בַּ/סְּפָרִ֑ים
    מִסְפַּ֣ר הַ/שָּׁנִ֗ים אֲשֶׁ֨ר הָיָ֤ה דְבַר יְהוָה֙ אֶל יִרְמִיָ֣ה הַ/נָּבִ֔יא
    לְ/מַלֹּ֛אות לְ/חָרְב֥וֹת יְרוּשָׁלִַ֖ם שִׁבְעִ֥ים שָׁנָֽה־־׃
translation:
  text: 'In the first year of his reign, I, Daniel, understood from the books the
    number of the years about which the word of the LORD had come to Jeremiah the
    prophet, for the completion of the desolations of Jerusalem: seventy years.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the scrolls.' The Hebrew term can refer broadly to written documents;
      'books' is used in the main text for natural English, while 'scrolls' preserves
      the ancient medium more explicitly.
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/שְׁנַת אַחַת
  chosen: In the first year
  alternatives:
  - In year one
  - In one year
  lexicon: HALOT
  rationale: The construct phrase with cardinal אַחַת functions idiomatically as an
    ordinal expression, 'in the first year,' not 'in one year.' This is standard,
    natural English and reflects the temporal setting.
- source_word: לְ/מָלְכ/וֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - when he became king
  lexicon: HALOT
  rationale: The infinitive/verb form from מלך with pronominal suffix denotes the
    period of ruling. 'Of his reign' is idiomatic and fits the temporal phrase better
    than the more wooden 'of his kingship.'
- source_word: בִּינֹתִי
  chosen: understood
  alternatives:
  - gave attention
  - discerned
  lexicon: HALOT
  rationale: From בין, the verb here expresses Daniel's gaining insight or understanding.
    'Understood' is concise and natural in context.
- source_word: בַּ/סְּפָרִים
  chosen: from the books
  alternatives:
  - in the books
  - by the scrolls
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or locatively here.
    'From the books' best conveys that Daniel derived his understanding from written
    texts. 'Books' is retained in the main text as a broad, accessible rendering;
    'scrolls' is a plausible historical-cultural alternative preserved in a footnote.
- source_word: מִסְפַּר הַ/שָּׁנִים
  chosen: the number of the years
  alternatives:
  - the number of years
  - the count of the years
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew construct relationship
    and the sense that Daniel grasped the specific total of years spoken of.
- source_word: אֲשֶׁר הָיָה דְבַר יְהוָה אֶל יִרְמִיָה הַנָּבִיא
  chosen: about which the word of the LORD had come to Jeremiah the prophet
  alternatives:
  - which the word of the LORD came to Jeremiah the prophet concerning
  - of which the word of the LORD came to Jeremiah the prophet
  lexicon: HALOT
  rationale: This clause identifies the years as those specified in divine revelation
    to Jeremiah. 'Had come' appropriately reflects the prior revelation relative to
    Daniel's present understanding. 'The LORD' follows the project's default rendering
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' preserving reverential convention and broad Christian usage.
- source_word: לְ/מַלֹּאות
  chosen: for the completion of
  alternatives:
  - to fulfill
  - for fulfilling
  - to complete
  lexicon: HALOT
  rationale: The infinitive construct of מלא here points to the reaching of a full
    measure or completion. 'For the completion of' fits the syntax with the following
    noun phrase and avoids over-interpreting the subject of fulfillment.
- source_word: לְ/חָרְב֥וֹת יְרוּשָׁלִַם
  chosen: the desolations of Jerusalem
  alternatives:
  - the ruins of Jerusalem
  - Jerusalem's desolation
  lexicon: HALOT
  rationale: Plural חָרְבוֹת is best represented by 'desolations,' preserving the
    Hebrew plural and the prophetic register. 'Ruins' is possible but narrows the
    sense to physical remains, whereas the Hebrew can include the state of devastation.
- source_word: שִׁבְעִים שָׁנָה
  chosen: seventy years
  lexicon: HALOT
  rationale: Straightforward numerical expression; no expansion is needed.
