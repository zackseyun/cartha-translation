theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and stylistic guidance specifies 'the LORD' as
    the default rendering of YHWH. This also aligns with the prophetic citation context
    and established English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of לְמַלֹּאות with Jeremiah's prophecy
  chosen_reading: for the completion of the desolations of Jerusalem
  alternative_readings:
  - to fulfill the desolations of Jerusalem
  - for Jerusalem's desolations to be completed
  rationale: The phrase is rendered to express the completion of the prophesied period
    of desolation without importing a more specific theological interpretation than
    the Hebrew requires. This preserves the text's temporal focus on the seventy years.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
