id: DAN.9.1
reference: Daniel 9:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת אַחַ֗ת לְ/דָרְיָ֛וֶשׁ בֶּן אֲחַשְׁוֵר֖וֹשׁ מִ/זֶּ֣רַע מָדָ֑י אֲשֶׁ֣ר
    הָמְלַ֔ךְ עַ֖ל מַלְכ֥וּת כַּשְׂדִּֽים־׃
translation:
  text: In the first year of Darius son of Ahasuerus, from the offspring of the Medes,
    who was made king over the kingdom of the Chaldeans—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' 'Chaldeans' is the Hebrew term, but in this context
      it can function as a designation for the Babylonian kingdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת אַחַת
  chosen: In the first year
  alternatives:
  - In year one
  - In the year one
  lexicon: HALOT
  rationale: The construct phrase with cardinal אַחַת functions idiomatically for
    regnal dating, best rendered in natural English as 'the first year' rather than
    a more wooden 'year one.'
- source_word: לְדָרְיָוֶשׁ
  chosen: of Darius
  alternatives:
  - belonging to Darius
  lexicon: HALOT
  rationale: The prefixed ל marks relation in a dating formula; English idiom uses
    'of Darius' in regnal-year expressions.
- source_word: בֶּן אֲחַשְׁוֵרוֹשׁ
  chosen: son of Ahasuerus
  lexicon: HALOT
  rationale: בֶּן straightforwardly denotes filial descent here. Personal names are
    transliterated per project philosophy.
- source_word: מִזֶּרַע מָדָי
  chosen: from the offspring of the Medes
  alternatives:
  - of Median descent
  - from the seed of Media
  lexicon: HALOT
  rationale: זֶרַע here refers to lineage or descent, not literal seed. 'Offspring'
    preserves the genealogical sense while remaining readable. 'Medes' reflects the
    people-group מָדָי.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - who indeed
  - that
  lexicon: HALOT
  rationale: The relative pronoun introduces a clause describing Darius; 'who' is
    the natural English equivalent for a personal antecedent.
- source_word: הָמְלַךְ
  chosen: was made king
  alternatives:
  - became king
  - was crowned king
  - was caused to reign
  lexicon: HALOT
  rationale: The Hophal form is causative/passive, indicating that Darius received
    kingship rather than simply that he reigned. 'Was made king' preserves that nuance
    better than the simpler 'became king.'
- source_word: עַל מַלְכוּת
  chosen: over the kingdom
  alternatives:
  - over the realm
  - over the kingship
  lexicon: HALOT
  rationale: מַלְכוּת denotes kingdom/realm here, and עַל marks rule over it. 'Kingdom'
    is the most direct and conventional rendering.
- source_word: כַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - Babylonia
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although in context it can overlap
    with 'Babylonians,' the more literal ethnic term is retained in the main text,
    with the contextual alternative worth preserving in a footnote.
