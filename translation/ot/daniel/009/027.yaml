id: DAN.9.27
reference: Daniel 9:27
source:
  edition: WLC
  text: וְ/הִגְבִּ֥יר בְּרִ֛ית לָ/רַבִּ֖ים שָׁב֣וּעַ אֶחָ֑ד וַ/חֲצִ֨י הַ/שָּׁב֜וּעַ
    יַשְׁבִּ֣ית זֶ֣בַח וּ/מִנְחָ֗ה וְ/עַ֨ל כְּנַ֤ף שִׁקּוּצִים֙ מְשֹׁמֵ֔ם וְ/עַד כָּלָה֙
    וְ/נֶ֣חֱרָצָ֔ה תִּתַּ֖ךְ עַל שֹׁמֵֽם׀־־׃פ
translation:
  text: And he will make a firm covenant with the many for one week, and for half
    of the week he will put a stop to sacrifice and offering. And on the wing of abominations
    will come one who makes desolate, until the decreed end is poured out on the desolator.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will confirm a covenant' or 'will strengthen a covenant.' The Hebrew
      verb means to make strong or cause to prevail.
    reason: lexical_alternative
  - marker: b
    text: Or 'sacrifice and grain offering.' The second term can refer more specifically
      to a grain offering.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'on the wing of abominations.' The phrase is difficult; alternatives
      include 'on the pinnacle of abominations' or 'upon a wing of abominations.'
    reason: alternative_reading
  - marker: d
    text: Or 'a desolator' / 'one causing desolation.'
    reason: lexical_alternative
  - marker: e
    text: Or 'will be poured out on the one made desolate' or 'on the desolate place.'
      The final clause is textually stable but syntactically difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִגְבִּיר
  chosen: will make a firm
  alternatives:
  - will confirm
  - will strengthen
  - will cause to prevail
  lexicon: HALOT
  rationale: The Hiphil of גבר here most naturally conveys making something strong
    or prevailing. 'Make a firm' fits the collocation with 'covenant' in idiomatic
    English without importing the traditional but potentially over-specific 'confirm'
    if prior covenant ratification is assumed.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית is a weighty covenant term in biblical Hebrew and should be preserved
    rather than flattened to 'agreement.'
- source_word: לָרַבִּים
  chosen: with the many
  alternatives:
  - for many
  - with many
  lexicon: HALOT
  rationale: The preposition ל can be rendered in several ways here. 'With the many'
    best suits the covenantal sense in English while preserving the definite collective
    nuance of ה/implicit רבים as a group, not merely an indefinite 'many.'
- source_word: שָׁבוּעַ אֶחָד
  chosen: for one week
  alternatives:
  - for one seven
  - for one period of seven
  lexicon: HALOT
  rationale: In Daniel, שָׁבוּעַ in this context conventionally denotes a heptad/'week.'
    'One week' is the most readable and contextually established rendering, while
    the broader symbolic value is left to interpretation rather than built into the
    translation.
- source_word: וַחֲצִי הַשָּׁבוּעַ
  chosen: and for half of the week
  alternatives:
  - and in the middle of the week
  - and at half the week
  lexicon: HALOT
  rationale: The construct 'half of the week' is formally closest to the Hebrew. 'In
    the middle of the week' is interpretive and smoother, but the more literal rendering
    preserves the temporal expression without over-resolving it.
- source_word: יַשְׁבִּית
  chosen: he will put a stop to
  alternatives:
  - he will cause to cease
  - he will end
  lexicon: HALOT
  rationale: The Hiphil of שבת means to cause to cease. 'Put a stop to' is natural
    modern English and retains the causative force.
- source_word: זֶבַח וּמִנְחָה
  chosen: sacrifice and offering
  alternatives:
  - sacrifice and grain offering
  lexicon: HALOT
  rationale: זֶבַח is sacrificial slaughter; מִנְחָה can be more specifically a grain
    offering. 'Offering' keeps the pair readable in English, while the more specific
    alternative is worth preserving in a footnote.
- source_word: וְעַל כְּנַף שִׁקּוּצִים
  chosen: And on the wing of abominations
  alternatives:
  - And on the pinnacle of abominations
  - And upon a wing of abominations
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' and is notoriously difficult here. Retaining
    'wing' preserves the metaphor and ambiguity rather than resolving it to 'pinnacle'
    or another architectural term without sufficient lexical necessity.
- source_word: מְשֹׁמֵם
  chosen: will come one who makes desolate
  alternatives:
  - a desolator
  - one causing desolation
  lexicon: HALOT
  rationale: The participle from שׁמם denotes one who desolates or causes desolation.
    Supplying 'will come' is implicit for intelligible English after the prepositional
    phrase; 'one who makes desolate' preserves the verbal force better than the more
    nominal 'desolator' in the main text.
- source_word: וְעַד כָּלָה וְנֶחֱרָצָה
  chosen: until the decreed end
  alternatives:
  - until a complete end, one that is decreed
  - until destruction, as decreed
  lexicon: HALOT
  rationale: The pair expresses an end/consummation that has been determined. 'The
    decreed end' is concise and preserves both elements without overloading the English
    line.
- source_word: תִּתַּךְ
  chosen: is poured out
  alternatives:
  - will be poured out
  - shall be poured
  lexicon: HALOT
  rationale: The verb נתך commonly conveys pouring out, often of wrath or judgment.
    English present 'is poured out' after 'until' is idiomatic and conveys the certainty
    of the event.
- source_word: עַל שֹׁמֵם
  chosen: on the desolator
  alternatives:
  - on the one made desolate
  - on the desolate place
  lexicon: HALOT
  rationale: Given the masculine singular participial form, 'the desolator' is the
    most straightforward reading. Other proposals exist, but this best matches the
    morphology and the immediate context.
