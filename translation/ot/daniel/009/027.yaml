theological_decisions:
- issue: Identity of the subject 'he' throughout the verse
  chosen_reading: Retained as the ambiguous 'he' without identifying him as Messiah,
    Antiochus, Titus, or an end-time ruler.
  alternative_readings:
  - the anointed one/Messiah
  - the coming prince/ruler of the previous verse
  - a historical desecrator such as Antiochus IV
  - an eschatological antichrist figure
  rationale: The Hebrew text itself does not explicitly identify the antecedent in
    this verse, and major interpretive traditions differ sharply. Per translation
    philosophy, the rendering preserves the ambiguity rather than resolving a disputed
    theological interpretation in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the difficult phrase כְּנַף שִׁקּוּצִים
  chosen_reading: Rendered literally as 'the wing of abominations' with alternatives
    footnoted.
  alternative_readings:
  - pinnacle of abominations
  - extremity of abominations
  - upon/with abominable things
  rationale: The phrase is lexically and syntactically difficult and has generated
    divergent interpretations, including architectural and metaphorical readings.
    A more literal rendering best preserves the source ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of שֹׁמֵם at the end of the verse
  chosen_reading: Rendered 'the desolator.'
  alternative_readings:
  - the one desolated
  - the desolate place
  rationale: The masculine singular participle most naturally refers to an agent,
    but because the clause is difficult and debated, the alternative possibilities
    are preserved in notes rather than forced into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
