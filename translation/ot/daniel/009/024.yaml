id: DAN.9.24
reference: Daniel 9:24
source:
  edition: WLC
  text: שָׁבֻעִ֨ים שִׁבְעִ֜ים נֶחְתַּ֥ךְ עַֽל עַמְּ/ךָ֣ וְ/עַל עִ֣יר קָדְשֶׁ֗/ךָ לְ/כַלֵּ֨א
    הַ/פֶּ֜שַׁע ו/ל/חתם חטאות וּ/לְ/כַפֵּ֣ר עָוֺ֔ן וּ/לְ/הָבִ֖יא צֶ֣דֶק עֹֽלָמִ֑ים
    וְ/לַ/חְתֹּם֙ חָז֣וֹן וְ/נָבִ֔יא וְ/לִ/מְשֹׁ֖חַ קֹ֥דֶשׁ קָֽדָשִֽׁים־׀־׃
translation:
  text: 'Seventy weeks are decreed concerning your people and your holy city: to finish
    the transgression, to seal up sins, to make atonement for iniquity, to bring in
    everlasting righteousness, to seal up vision and prophet, and to anoint the most
    holy place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seventy sevens'; many understand this as seventy weeks of years.
    reason: lexical_alternative
  - marker: b
    text: Or 'to put an end to sins.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew reads 'vision and prophet'; some ancient and modern interpreters
      understand this as 'vision and prophecy.'
    reason: alternative_reading
  - marker: d
    text: Or 'to anoint a most holy one'; the Hebrew phrase can refer to the holiest
      place or thing, and some interpret it personally.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁבֻעִים שִׁבְעִים
  chosen: Seventy weeks
  alternatives:
  - Seventy sevens
  - Seventy weeks of years
  lexicon: HALOT
  rationale: שָׁבֻעִים literally denotes 'weeks' or 'units of seven.' In Daniel's
    context, many understand these as symbolic or sabbatical-year heptads, but the
    Hebrew expression itself is most naturally rendered 'seventy weeks.' The more
    interpretive alternatives are preserved in a footnote rather than imported into
    the main text.
- source_word: נֶחְתַּךְ
  chosen: are decreed
  alternatives:
  - are determined
  - are cut off
  lexicon: HALOT
  rationale: The Niphal of חתך here conveys something decided or apportioned. 'Are
    decreed' gives clear modern English while preserving the sense of a fixed divine
    determination. 'Cut off' is too opaque in English here, though it reflects the
    root more literally.
- source_word: עַל עַמְּךָ וְעַל עִיר קָדְשֶׁךָ
  chosen: concerning your people and your holy city
  alternatives:
  - for your people and for your holy city
  - upon your people and upon your holy city
  lexicon: HALOT
  rationale: עַל can be rendered in several ways. 'Concerning' communicates the scope
    of the decree naturally in English without losing the relation to Daniel's people
    and city.
- source_word: לְכַלֵּא הַפֶּשַׁע
  chosen: to finish the transgression
  alternatives:
  - to restrain the transgression
  - to bring the transgression to an end
  lexicon: HALOT
  rationale: כלה in this stem can mean complete, finish, or bring to an end. With
    the definite singular הַפֶּשַׁע, 'the transgression' is best retained. 'Finish'
    is concise and preserves the telic force.
- source_word: וְלַחְתֹּם חטאות
  chosen: to seal up sins
  alternatives:
  - to seal sins
  - to put an end to sins
  lexicon: HALOT
  rationale: חתם literally means 'seal.' The plural חטאות is best rendered 'sins.'
    'Seal up' preserves the metaphor while allowing the sense of closure or completion;
    'put an end to' is interpretive and therefore kept as an alternative only.
- source_word: וּלְכַפֵּר עָוֺן
  chosen: to make atonement for iniquity
  alternatives:
  - to atone for iniquity
  - to purge iniquity
  lexicon: HALOT
  rationale: כפר is a major theological verb commonly rendered 'make atonement.' This
    preserves sacrificial and reconciliation overtones without over-specifying mechanism.
    עָוֺן is well rendered 'iniquity' here, retaining moral weight distinct from the
    previous 'sins.'
- source_word: וּלְהָבִיא צֶדֶק עֹלָמִים
  chosen: to bring in everlasting righteousness
  alternatives:
  - to bring everlasting righteousness
  - to bring in eternal righteousness
  lexicon: HALOT
  rationale: The idiom with הביא naturally allows 'bring in.' צֶדֶק is 'righteousness'
    here, and עֹלָמִים carries the sense of enduring perpetuity. 'Everlasting righteousness'
    is the established and accurate rendering.
- source_word: וְלַחְתֹּם חָזוֹן וְנָבִיא
  chosen: to seal up vision and prophet
  alternatives:
  - to seal up vision and prophecy
  - to authenticate vision and prophet
  lexicon: HALOT
  rationale: The consonantal text reads נָבִיא ('prophet'), not the abstract noun
    'prophecy.' 'Vision and prophet' is therefore the more textually direct rendering.
    Because English readers may expect 'prophecy,' that alternative is preserved in
    a footnote. 'Seal up' may imply closure, completion, or authentication; the main
    text keeps the metaphor.
- source_word: וְלִמְשֹׁחַ
  chosen: to anoint
  lexicon: HALOT
  rationale: משׁח is the standard verb 'anoint.' No expansion is needed in the main
    text.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: the most holy place
  alternatives:
  - a most holy one
  - the Holy of Holies
  - most holy
  lexicon: HALOT
  rationale: The phrase often denotes something supremely holy, frequently a sanctuary
    space or sacred object. In this context, 'the most holy place' is the most natural
    English rendering, though some interpret it personally ('a most holy one'). Because
    the referent is debated, the personal alternative is preserved in a footnote and
    theological decisions.
