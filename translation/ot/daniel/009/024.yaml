theological_decisions:
- issue: Referent of קֹדֶשׁ קָדָשִׁים
  chosen_reading: the most holy place
  alternative_readings:
  - a most holy one
  - the Holy of Holies as a sanctuary/object
  rationale: The Hebrew phrase regularly designates the holiest sanctuary space or
    a supremely holy thing, and the immediate wording does not explicitly identify
    a person. Rendering it as 'the most holy place' avoids importing a specifically
    messianic identification into the main text while preserving the possibility in
    a footnote. This follows the instruction not to resolve theological ambiguity
    beyond what the Hebrew warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Nature of שָׁבֻעִים in this prophecy
  chosen_reading: weeks
  alternative_readings:
  - sevens
  - weeks of years
  rationale: The Hebrew term literally denotes units of seven. Because the verse itself
    does not explicitly say 'years,' the main text keeps the less interpretive 'weeks,'
    while a footnote preserves the common understanding of heptads or weeks of years.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve ambiguity where genuine.'
