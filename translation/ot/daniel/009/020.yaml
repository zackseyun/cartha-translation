id: DAN.9.20
reference: Daniel 9:20
source:
  edition: WLC
  text: וְ/ע֨וֹד אֲנִ֤י מְדַבֵּר֙ וּ/מִתְפַּלֵּ֔ל וּ/מִתְוַדֶּה֙ חַטָּאתִ֔/י וְ/חַטַּ֖את עַמִּ֣/י יִשְׂרָאֵ֑ל וּ/מַפִּ֣יל תְּחִנָּתִ֗/י לִ/פְנֵי֙ יְהוָ֣ה אֱלֹהַ֔/י עַ֖ל הַר קֹ֥דֶשׁ אֱלֹהָֽ/י־׃
translation:
  text: While I was still speaking and praying, confessing my sin and the sin of my people Israel, and presenting my plea before Yahweh my God concerning the holy mountain of my God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my supplication' or 'my petition.' The Hebrew idiom is literally 'causing my plea to fall before' the LORD.
    reason: lexical_alternative
  - marker: b
    text: The 'holy mountain of my God' refers to Zion/Jerusalem, the site of God's sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: וְעוֹד
  chosen: While I was still
  alternatives:
  - And still
  - Yet while
  lexicon: HALOT
  rationale: Introduces an action still in progress; in English, 'While I was still' naturally conveys the temporal sense with the following participles.
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: Straightforward participial sense; 'speaking' fits the solemn register better than 'talking'.
- source_word: וּמִתְפַּלֵּל
  chosen: praying
  lexicon: HALOT
  rationale: Standard rendering of the hitpael of פלל in this context of petition to God.
- source_word: וּמִתְוַדֶּה
  chosen: confessing
  alternatives:
  - giving thanks
  - praising
  lexicon: HALOT
  rationale: In the hitpael with sin as object, ידה means 'confess'; other senses of the root do not fit the immediate object 'my sin'.
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my sin offering
  lexicon: HALOT
  rationale: Although חטאת can mean 'sin offering' in sacrificial contexts, here the verbal object of 'confessing' clearly requires 'my sin'.
- source_word: וְחַטַּאת עַמִּי יִשְׂרָאֵל
  chosen: and the sin of my people Israel
  alternatives:
  - and the sin of Israel, my people
  lexicon: HALOT
  rationale: Preserves the construct relationship and apposition naturally in English.
- source_word: וּמַפִּיל
  chosen: presenting
  alternatives:
  - casting down
  - laying before
  - making fall
  lexicon: HALOT
  rationale: Literally 'causing to fall,' but idiomatically with תחנה before God it means to present or lay a supplication before him. 'Presenting' is clear modern English without losing the petitionary force.
- source_word: תְּחִנָּתִי
  chosen: my plea
  alternatives:
  - my supplication
  - my petition
  lexicon: HALOT
  rationale: '''Plea'' is readable modern English and preserves the earnest, mercy-seeking sense. ''Supplication'' is possible but more archaic.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard prepositional rendering in prayer contexts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Simple possessive form; retained both occurrences for emphasis and fidelity.
- source_word: עַל
  chosen: concerning
  alternatives:
  - for
  - on behalf of
  - toward
  lexicon: HALOT
  rationale: Here עַל marks the matter about which Daniel is pleading. 'Concerning' best captures the topical sense in context.
- source_word: הַר קֹדֶשׁ אֱלֹהָי
  chosen: the holy mountain of my God
  alternatives:
  - my God's holy mountain
  - the mountain of holiness of my God
  lexicon: HALOT
  rationale: A natural English rendering of the construct chain, likely referring to Zion/Jerusalem, while preserving the genitival relationship.
