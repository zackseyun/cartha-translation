id: DAN.9.7
reference: Daniel 9:7
source:
  edition: WLC
  text: לְ/ךָ֤ אֲדֹנָ/י֙ הַ/צְּדָקָ֔ה וְ/לָ֛/נוּ בֹּ֥שֶׁת הַ/פָּנִ֖ים כַּ/יּ֣וֹם הַ/זֶּ֑ה
    לְ/אִ֤ישׁ יְהוּדָה֙ וּ/לְ/יוֹשְׁבֵ֣י יְרֽוּשָׁלִַ֔ם וּֽ/לְ/כָל יִשְׂרָאֵ֞ל הַ/קְּרֹבִ֣ים
    וְ/הָ/רְחֹקִ֗ים בְּ/כָל הָֽ/אֲרָצוֹת֙ אֲשֶׁ֣ר הִדַּחְתָּ֣/ם שָׁ֔ם בְּ/מַעֲלָ֖/ם
    אֲשֶׁ֥ר מָֽעֲלוּ בָֽ/ךְ־־־׃
translation:
  text: To you, O Lord, belongs righteousness, but to us belongs shame of face, as
    it is this day—to the men of Judah, to the inhabitants of Jerusalem, and to all
    Israel, those who are near and those who are far away, in all the lands where
    you have driven them, because of their unfaithfulness that they committed against
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'open shame' / 'shame-facedness.' The Hebrew idiom is literally 'shame
      of face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to every man of Judah.' The Hebrew uses a masculine singular form distributively.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of their treachery' or 'because of their faithlessness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: O Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: Vocative address to God. Rendered 'O Lord' to reflect direct prayerful
    address in English. This is not the divine name YHWH, so the small-caps convention
    'the LORD' is not used here.
- source_word: הַצְּדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - the righteousness
  lexicon: HALOT
  rationale: In this confessional context the term denotes God's moral rightness and
    vindication. 'Righteousness' best preserves the covenantal and theological sense;
    'justice' is possible but narrower here.
- source_word: בֹּשֶׁת הַפָּנִים
  chosen: shame of face
  alternatives:
  - open shame
  - shame-facedness
  - shame
  lexicon: HALOT
  rationale: A Hebrew idiom for public disgrace or shame visible on the face. 'Shame
    of face' keeps the idiom more transparently than flattening to 'shame,' while
    remaining understandable in English.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as on this day
  - to this day
  lexicon: HALOT
  rationale: Idiomatic temporal expression pointing to the present, observable state
    of disgrace. 'As it is this day' is natural modern English while preserving the
    demonstrative force.
- source_word: לְאִישׁ יְהוּדָה
  chosen: to the men of Judah
  alternatives:
  - to every man of Judah
  - to the people of Judah
  - to Judah
  lexicon: HALOT
  rationale: The singular אִישׁ after לְ functions distributively/collectively. 'Men
    of Judah' preserves the masculine representative form more closely than the gender-neutral
    'people of Judah'.
- source_word: יוֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the participial construction for those living in
    a place. 'Inhabitants' is concise and natural.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Conventional and accurate rendering for the covenant people as a whole,
    here expanded by the following near/far language.
- source_word: הַקְּרֹבִים וְהָרְחֹקִים
  chosen: those who are near and those who are far away
  alternatives:
  - the near and the far
  - those nearby and those far off
  lexicon: HALOT
  rationale: Refers to Israelites geographically near and dispersed far away. The
    fuller phrasing is clear in modern English and preserves the contrast.
- source_word: בְּכָל הָאֲרָצוֹת
  chosen: in all the lands
  alternatives:
  - in all the countries
  - throughout all the lands
  lexicon: HALOT
  rationale: Plural 'lands' fits the exilic dispersion among multiple territories.
    'Countries' is possible but slightly more modern-political than the Hebrew requires.
- source_word: הִדַּחְתָּם
  chosen: you have driven them
  alternatives:
  - you have banished them
  - you have scattered them
  lexicon: HALOT
  rationale: The Hiphil of נדח emphasizes causing to be driven away/dispersed. 'Driven
    them' preserves divine agency and the force of exile; 'scattered' is interpretive
    but possible.
- source_word: בְּמַעֲלָם
  chosen: because of their unfaithfulness
  alternatives:
  - for their treachery
  - in their trespass
  - because of their faithlessness
  lexicon: HALOT
  rationale: The noun מעל denotes breach of faith, treachery, or unfaithfulness against
    God. 'Unfaithfulness' communicates covenant disloyalty clearly in modern English.
- source_word: אֲשֶׁר מָעֲלוּ בָךְ
  chosen: that they committed against you
  alternatives:
  - with which they acted treacherously against you
  - by which they were unfaithful to you
  lexicon: HALOT
  rationale: This relative clause restates and intensifies the offense. 'Committed
    against you' reads naturally with the preceding 'unfaithfulness' while retaining
    the personal object 'against you'.
