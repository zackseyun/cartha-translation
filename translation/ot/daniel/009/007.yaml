theological_decisions:
- issue: Divine righteousness versus Israel's shame
  chosen_reading: The verse contrasts God's righteous standing with the people's public
    disgrace without implying meritorious self-justification or denying divine mercy.
  alternative_readings:
  - Reading הַצְּדָקָה primarily as judicial 'justice'
  rationale: 'The prayer''s logic is confessional: God is in the right, and the exile-shame
    of the people is deserved because of covenant unfaithfulness. ''Righteousness''
    best preserves this theological contrast.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Contested terms table
    on δικαιοσύνη by analogy of semantic domain
- issue: Gendered collective language in לְאִישׁ יְהוּדָה
  chosen_reading: Retain masculine representative language with 'men of Judah' rather
    than neutralizing to 'people of Judah.'
  alternative_readings:
  - people of Judah
  - everyone in Judah
  rationale: The Hebrew uses masculine singular אִישׁ distributively. Per the gender-accurate
    principle, the translation keeps the source's representative masculine form rather
    than flattening it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
