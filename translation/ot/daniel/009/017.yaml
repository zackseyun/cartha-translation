id: DAN.9.17
reference: Daniel 9:17
source:
  edition: WLC
  text: וְ/עַתָּ֣ה שְׁמַ֣ע אֱלֹהֵ֗י/נוּ אֶל תְּפִלַּ֤ת עַבְדְּ/ךָ֙ וְ/אֶל תַּ֣חֲנוּנָ֔י/ו
    וְ/הָאֵ֣ר פָּנֶ֔י/ךָ עַל מִקְדָּשְׁ/ךָ֖ הַ/שָּׁמֵ֑ם לְמַ֖עַן אֲדֹנָֽ/י׀־־־׃
translation:
  text: And now, our God, hear the prayer of your servant and his pleas for mercy,
    and let your face shine upon your sanctuary, which lies desolate, for the Lord’s
    sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for your own sake, O Lord.” The Hebrew reads “for the sake of the Lord,”
      using a divine title in the third person within direct address.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing Daniel’s renewed petition; 'And now' preserves
    the connective ו plus the temporal adverb.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Common prayer language in direct address to God; 'hear' is idiomatic
    and sufficiently formal without paraphrase.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with 1cp suffix; preserves covenantal address.
- source_word: תְּפִלַּת עַבְדְּךָ
  chosen: the prayer of your servant
  alternatives:
  - your servant’s prayer
  lexicon: HALOT
  rationale: Formal construct chain retained. 'Servant' is appropriate for עבד here
    because the context is humble address to God, not emphasis on bonded status.
- source_word: תַּחֲנוּנָיו
  chosen: his pleas for mercy
  alternatives:
  - his supplications
  - his entreaties
  lexicon: HALOT
  rationale: The noun denotes earnest petitions for favor/mercy. 'Pleas for mercy'
    communicates the semantic force more clearly in modern English than the more formal
    'supplications'.
- source_word: וְהָאֵר פָּנֶיךָ
  chosen: let your face shine
  alternatives:
  - cause your face to shine
  - shine your face
  lexicon: HALOT
  rationale: Idiomatic covenant-blessing language. 'Let your face shine' is natural
    English while preserving the metaphor of divine favor.
- source_word: עַל מִקְדָּשְׁךָ
  chosen: upon your sanctuary
  alternatives:
  - on your holy place
  - upon your temple
  lexicon: HALOT
  rationale: מקדשׁ is broader than 'temple' and denotes the holy sanctuary belonging
    to God. 'Sanctuary' best preserves that sense.
- source_word: הַשָּׁמֵם
  chosen: which lies desolate
  alternatives:
  - that is desolate
  - the desolate one
  lexicon: HALOT
  rationale: Attributive adjective describing the sanctuary’s ruined state. Rendering
    as a relative clause is natural in English and preserves the predicative force.
- source_word: לְמַעַן אֲדֹנָי
  chosen: for the Lord’s sake
  alternatives:
  - for your own sake, O Lord
  - because of the Lord
  lexicon: HALOT
  rationale: למען expresses motive/basis. Although Daniel is addressing God directly,
    אֲדֹנָי here is best retained as the title 'Lord' rather than converted to a pronoun,
    preserving the third-person self-reference found in the Hebrew.
