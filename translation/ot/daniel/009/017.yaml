theological_decisions:
- issue: Divine self-reference in לְמַעַן אֲדֹנָי
  chosen_reading: for the Lord’s sake
  alternative_readings:
  - for your own sake, O Lord
  rationale: The Hebrew uses the title אֲדֹנָי rather than a direct pronominal form.
    Preserving 'the Lord' maintains the wording’s rhetorical force and avoids smoothing
    away the text’s form. Because English readers may expect direct address, the alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §1, §3, and Contested terms: κύριος/Kyrios
    → Lord (analogous title translation principle)'
