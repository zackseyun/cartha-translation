theological_decisions:
- issue: Rendering of divine judgment term רָעָה
  chosen_reading: calamity
  alternative_readings:
  - evil
  - disaster
  rationale: In this context the term refers to covenantal disaster that has befallen Judah, not moral evil in God. 'Calamity' preserves the severity while avoiding a misleading theological implication.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make.'
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
