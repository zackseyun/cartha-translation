id: DAN.9.13
reference: Daniel 9:13
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר כָּתוּב֙ בְּ/תוֹרַ֣ת מֹשֶׁ֔ה אֵ֛ת כָּל הָ/רָעָ֥ה הַ/זֹּ֖את בָּ֣אָה עָלֵ֑י/נוּ וְ/לֹֽא חִלִּ֜ינוּ אֶת פְּנֵ֣י יְהוָ֣ה אֱלֹהֵ֗י/נוּ לָ/שׁוּב֙ מֵֽ/עֲוֺנֵ֔/נוּ וּ/לְ/הַשְׂכִּ֖יל בַּ/אֲמִתֶּֽ/ךָ־־־׀׃
translation:
  text: Just as it is written in the Law of Moses, all this calamity has come upon us, yet we have not sought the favor of Yahweh our God by turning from our iniquities and by gaining insight into your truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this disaster' or 'all this evil.' The Hebrew term can denote calamity or disaster in contexts of judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'we have not entreated the face of the LORD our God.' The expression means to seek his favor or mercy.
    reason: lexical_alternative
  - marker: c
    text: Or 'in your truth' or 'by your truth.' The Hebrew can also carry the sense of 'your faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר כָּתוּב
  chosen: Just as it is written
  alternatives:
  - As it is written
  - According as it is written
  lexicon: HALOT
  rationale: Introduces correspondence between the written Torah warning and the present calamity. 'Just as' preserves the comparative force naturally in English.
- source_word: בְּתוֹרַת מֹשֶׁה
  chosen: in the Law of Moses
  alternatives:
  - in the instruction of Moses
  - in Moses' law
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this covenantal/judicial context it refers specifically to the Mosaic law corpus. 'Law of Moses' is the clearest idiomatic rendering.
- source_word: אֵת כָּל הָרָעָה הַזֹּאת
  chosen: all this calamity
  alternatives:
  - all this evil
  - all this disaster
  lexicon: HALOT
  rationale: רָעָה here denotes disastrous judgment rather than moral evil. 'Calamity' communicates covenant curse/judgment without implying God commits moral evil.
- source_word: בָּאָה עָלֵינוּ
  chosen: has come upon us
  alternatives:
  - came upon us
  - has overtaken us
  lexicon: HALOT
  rationale: A standard idiom for judgment arriving. Present perfect in English fits the prayer's retrospective-present perspective.
- source_word: וְלֹא חִלִּינוּ אֶת פְּנֵי
  chosen: yet we have not sought the favor of
  alternatives:
  - and we have not entreated
  - and we have not sought the face of
  - and we have not pleaded before
  lexicon: HALOT
  rationale: The piel of חלה with פני is an idiom meaning to appease, entreat, or seek favor from someone. 'Sought the favor of' makes the idiom clear in modern English while preserving the relational sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward covenantal designation; retained fully with the possessive.
- source_word: לָשׁוּב מֵעֲוֺנֵנוּ
  chosen: by turning from our iniquities
  alternatives:
  - to turn from our iniquity
  - by turning away from our sins
  lexicon: HALOT
  rationale: Expresses the means/content of seeking the LORD's favor. Plural 'iniquities' reflects the 1cp suffix on a collective noun in context and sounds natural in English. 'Iniquities' preserves the moral weight of עָוֹן better than the flatter 'wrongdoing.'
- source_word: וּלְהַשְׂכִּיל
  chosen: and by gaining insight
  alternatives:
  - and by acting wisely
  - and by giving heed
  - and by understanding
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can denote becoming prudent, understanding, or acting wisely. Here it pairs with repentance and truth, so 'gaining insight' captures reflective moral understanding rather than mere intellectual comprehension.
- source_word: בַּאֲמִתֶּךָ
  chosen: through your truth
  alternatives:
  - in your truth
  - by your truth
  - in faithfulness to you
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. 'Your truth' best fits the context of coming to right understanding before God; 'through' expresses the instrumental nuance of ב in idiomatic English.
