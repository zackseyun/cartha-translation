id: DAN.9.8
reference: Daniel 9:8
source:
  edition: WLC
  text: יְהוָ֗ה לָ֚/נוּ בֹּ֣שֶׁת הַ/פָּנִ֔ים לִ/מְלָכֵ֥י/נוּ לְ/שָׂרֵ֖י/נוּ וְ/לַ/אֲבֹתֵ֑י/נוּ אֲשֶׁ֥ר חָטָ֖אנוּ לָֽ/ךְ׃
translation:
  text: O Lord, to us belongs shame of face—to our kings, to our princes, and to our fathers—because we have sinned against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “shame of face,” an idiom for public disgrace or humiliation.
    reason: lexical_alternative
  - marker: b
    text: Or “and to our ancestors” for “our fathers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per project default for the divine name YHWH, following the stated doctrine and common English convention of small-caps covenant name representation.
- source_word: לָנוּ
  chosen: to us belongs
  alternatives:
  - to us
  - belongs to us
  - is ours
  lexicon: HALOT
  rationale: 'The prefixed ל with pronominal suffix here marks possession/dative: the shame pertains to or belongs to the people. English idiom requires supplying “belongs” for clarity.'
- source_word: בֹּשֶׁת הַפָּנִים
  chosen: shame of face
  alternatives:
  - open shame
  - shamefacedness
  - confusion of face
  - shame
  lexicon: HALOT
  rationale: This is a Hebrew idiom literally meaning “shame of face,” denoting public disgrace or humiliation. I retained the concrete expression rather than flattening it to simply “shame,” while avoiding the archaic KJV-like “confusion of face.”
- source_word: לִמְלָכֵינוּ
  chosen: to our kings
  alternatives:
  - for our kings
  lexicon: HALOT
  rationale: The repeated ל marks those to whom the shame belongs as well. “To our kings” preserves the parallel structure with the opening “to us belongs...” and the following groups.
- source_word: לְשָׂרֵינוּ
  chosen: to our princes
  alternatives:
  - to our officials
  - to our leaders
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes, rulers, or officials. “Princes” preserves the elevated courtly/political sense and matches the royal context of kings.
- source_word: וְלַאֲבֹתֵינוּ
  chosen: and to our fathers
  alternatives:
  - and to our ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means “fathers,” and in context refers to forefathers/ancestors. Per gender-accurate policy, the masculine term is retained rather than neutralized, since the Hebrew explicitly uses “fathers.”
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - for that
  lexicon: HALOT
  rationale: 'Here the relative particle introduces the reason for the shame: “because we have sinned.” English causal rendering best reflects the syntax and sense.'
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: HALOT
  rationale: The perfect verb summarizes the people's completed guilt with present relevance. English present perfect communicates that force naturally in prayer/confession context.
- source_word: לָךְ
  chosen: against you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the offended party; idiomatic English is “sin against” someone. This makes the relational offense explicit without adding content beyond normal Hebrew usage.
