id: DAN.9.25
reference: Daniel 9:25
source:
  edition: WLC
  text: וְ/תֵדַ֨ע וְ/תַשְׂכֵּ֜ל מִן מֹצָ֣א דָבָ֗ר לְ/הָשִׁיב֙ וְ/לִ/בְנ֤וֹת יְרֽוּשָׁלִַ֨ם֙
    עַד מָשִׁ֣יחַ נָגִ֔יד שָׁבֻעִ֖ים שִׁבְעָ֑ה וְ/שָׁבֻעִ֞ים שִׁשִּׁ֣ים וּ/שְׁנַ֗יִם
    תָּשׁוּב֙ וְ/נִבְנְתָה֙ רְח֣וֹב וְ/חָר֔וּץ וּ/בְ/צ֖וֹק הָ/עִתִּֽים־־׃
translation:
  text: 'So know and understand: from the issuing of the word to restore and rebuild
    Jerusalem until an anointed one, a ruler, there will be seven weeks; and for sixty-two
    weeks it will be restored and rebuilt, with plaza and moat, but in troubled times.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until Messiah, a ruler' or 'until Messiah the Prince.' The Hebrew reads
      'anointed one, ruler/prince.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'seven weeks' may also be rendered 'seven sevens.' Likewise 'sixty-two
      weeks' may be rendered 'sixty-two sevens.'
    reason: lexical_alternative
  - marker: c
    text: Or 'square and trench.' The Hebrew term rendered 'moat' is uncertain and
      may denote a trench or defensive ditch.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתֵדַע
  chosen: know
  alternatives:
  - you shall know
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms of ידע, here functioning as an exhortation/prediction
    to Daniel: ''know.'' English imperative-like wording after ''So'' is natural while
    preserving the force.'
- source_word: וְתַשְׂכֵּל
  chosen: understand
  alternatives:
  - discern
  - consider carefully
  lexicon: HALOT
  rationale: Hiphil of שכל conveys insight or understanding. 'Understand' pairs naturally
    with 'know' and preserves the cognitive emphasis.
- source_word: מִן מֹצָא דָבָר
  chosen: from the issuing of the word
  alternatives:
  - from the going out of the word
  - from the decree's issuance
  lexicon: HALOT
  rationale: מוצא literally 'going out/issuing forth'; דבר can mean 'word, matter,
    decree.' 'Issuing of the word' preserves the Hebrew image without over-specifying
    as an imperial 'decree' in the main text.
- source_word: לְהָשִׁיב וְלִבְנוֹת
  chosen: to restore and rebuild
  alternatives:
  - to return and build
  - to cause to return and to build
  lexicon: HALOT
  rationale: In context of Jerusalem, השיב is best taken as 'restore' rather than
    the more wooden 'cause to return'; paired with 'rebuild' it expresses the city's
    restoration.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: עַד מָשִׁיחַ נָגִיד
  chosen: until an anointed one, a ruler
  alternatives:
  - until Messiah the Prince
  - until an anointed one, a prince
  - until a consecrated ruler
  lexicon: HALOT
  rationale: מָשִׁיחַ in Hebrew means 'anointed one' and need not here be rendered
    as the title 'Messiah' in the main text, since the immediate Hebrew does not itself
    specify the eschatological identity. נָגִיד denotes a leader/ruler/prince. 'Anointed
    one, a ruler' preserves the lexical sense and leaves interpretive identification
    open.
- source_word: שָׁבֻעִים שִׁבְעָה
  chosen: seven weeks
  alternatives:
  - seven sevens
  lexicon: HALOT
  rationale: שבועים literally 'weeks' or 'sevens.' In Daniel 9 the idiom likely means
    heptads; 'weeks' is traditional and readable, while the alternative is preserved
    in a footnote because the unit is debated.
- source_word: וְשָׁבֻעִים שִׁשִּׁים וּשְׁנַיִם
  chosen: and for sixty-two weeks
  alternatives:
  - and sixty-two weeks
  lexicon: HALOT
  rationale: The phrase marks the subsequent span. Rendering with 'for' clarifies
    duration in English without adding interpretive content beyond the temporal sense.
- source_word: תָּשׁוּב וְנִבְנְתָה
  chosen: it will be restored and rebuilt
  alternatives:
  - it will return and be built
  - it will again be built
  lexicon: HALOT
  rationale: Feminine singular verbs refer back to Jerusalem. 'Restored and rebuilt'
    captures the city's renewed condition and construction.
- source_word: רְחוֹב
  chosen: plaza
  alternatives:
  - street
  - broad place
  - square
  lexicon: HALOT
  rationale: רחוב denotes an open public place rather than a narrow roadway. 'Plaza'
    best conveys an urban square in modern English.
- source_word: וְחָרוּץ
  chosen: moat
  alternatives:
  - trench
  - ditch
  lexicon: HALOT
  rationale: The noun is difficult; in city-building context it likely denotes a trench/moat-like
    defensive feature. 'Moat' is concise and intelligible, with alternatives preserved
    in a footnote due to lexical uncertainty.
- source_word: וּבְצוֹק הָעִתִּים
  chosen: but in troubled times
  alternatives:
  - and in distress of times
  - even in times of distress
  lexicon: HALOT
  rationale: The phrase conveys constricted/distressing circumstances during the rebuilding.
    'Troubled times' is idiomatic modern English and preserves the adversity.
