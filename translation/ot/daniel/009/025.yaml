theological_decisions:
- issue: Whether מָשִׁיחַ should be rendered as the christological title 'Messiah'
    in the main text
  chosen_reading: Render as 'an anointed one' in the main text, with 'Messiah' preserved
    in a footnote.
  alternative_readings:
  - Messiah the Prince
  - Messiah, a ruler
  rationale: The Hebrew lexeme means 'anointed one' and can refer more broadly than
    the uniquely messianic figure. Given the verse's major interpretive debates, the
    translation preserves the lexical sense in the main text and avoids importing
    a specific identification not explicit in the wording, while footnoting the traditional
    messianic rendering.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: Χριστός/Messiah
    principle applied analogically to Hebrew מָשִׁיחַ'
- issue: How to render שָׁבֻעִים in Daniel's prophecy
  chosen_reading: Use 'weeks' in the main text, with 'sevens' in a footnote.
  alternative_readings:
  - sevens
  - weeks of years
  rationale: The Hebrew term literally denotes a unit of seven and is contextually
    debated. 'Weeks' is the conventional and linguistically defensible rendering,
    but the more literal 'sevens' should be preserved for auditability and to avoid
    over-resolving the chronology.
  doctrine_reference: Translation philosophy §3
