id: DAN.9.5
reference: Daniel 9:5
source:
  edition: WLC
  text: חָטָ֥אנוּ וְ/עָוִ֖ינוּ ו/הרשענו וּ/מָרָ֑דְנוּ וְ/ס֥וֹר מִ/מִּצְוֺתֶ֖/ךָ וּ/מִ/מִּשְׁפָּטֶֽי/ךָ׃
translation:
  text: We have sinned and done wrong and acted wickedly and rebelled, turning aside
    from your commandments and your judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'committed iniquity' for 'done wrong.' The Hebrew verb carries the sense
      of acting crookedly or perversely.
    reason: lexical_alternative
  - marker: b
    text: Or 'your ordinances' for 'your judgments.' The Hebrew term can refer to
      legal decisions, judgments, or prescribed ordinances.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאנוּ
  chosen: We have sinned
  alternatives:
  - We sinned
  lexicon: HALOT
  rationale: Qal perfect 1cp of חטא, the standard verb for sinning or missing the
    mark morally. Present perfect English fits the confessional, retrospective force
    in Daniel's prayer.
- source_word: וְעָוִינוּ
  chosen: and done wrong
  alternatives:
  - and committed iniquity
  - and acted perversely
  lexicon: HALOT
  rationale: From עוה, conveying crookedness, guilt, or iniquity. 'Done wrong' is
    readable modern English; 'committed iniquity' is more formal but less natural.
    The distinct moral nuance is preserved without archaic diction.
- source_word: וְהִרְשַׁעְנוּ
  chosen: and acted wickedly
  alternatives:
  - and done wickedly
  - and been wicked
  lexicon: HALOT
  rationale: Hiphil of רשע, to act wickedly or do evil. 'Acted wickedly' preserves
    verbal force and distinguishes it from the prior confession terms.
- source_word: וּמָרָדְנוּ
  chosen: and rebelled
  alternatives:
  - and been rebellious
  lexicon: HALOT
  rationale: From מרד, to rebel. 'Rebelled' is the direct and idiomatic rendering,
    fitting covenantal defiance in context.
- source_word: וְסוֹר
  chosen: turning aside
  alternatives:
  - and turning aside
  - departing
  - turning away
  lexicon: HALOT
  rationale: Infinitive absolute/verb form from סור used after the finite verbs to
    continue the confession. 'Turning aside' captures deviation from God's revealed
    will. It is rendered as a participial continuation in English for natural flow.
- source_word: מִמִּצְוֺתֶיךָ
  chosen: from your commandments
  alternatives:
  - from your commands
  lexicon: HALOT
  rationale: מצוה commonly denotes commandment/command. 'Commandments' preserves the
    covenantal and scriptural register appropriate to Daniel's prayer.
- source_word: וּמִמִּשְׁפָּטֶיךָ
  chosen: and your judgments
  alternatives:
  - and your ordinances
  - and your rules
  lexicon: HALOT
  rationale: משפט can mean judgments, ordinances, or legal decisions. 'Judgments'
    keeps the juridical nuance and pairs well with 'commandments,' while remaining
    understandable in context.
