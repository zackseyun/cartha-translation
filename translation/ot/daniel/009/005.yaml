theological_decisions:
- issue: Rendering the cluster of confession verbs distinctly rather than collapsing
    them into a smoother English paraphrase
  chosen_reading: 'Preserve each verb with separate English expressions: sinned, done
    wrong, acted wickedly, rebelled, turning aside'
  alternative_readings:
  - We have sinned and done evil and rebelled, turning away...
  - We have sinned and committed iniquity and acted wickedly and rebelled...
  rationale: The Hebrew piles up near-synonymous but distinct confession terms for
    rhetorical and theological intensity. Optimal equivalence here favors preserving
    the accumulation rather than compressing it into fewer terms.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering מִשְׁפָּטִים as 'judgments' rather than 'ordinances'
  chosen_reading: your judgments
  alternative_readings:
  - your ordinances
  - your rules
  rationale: The term carries legal/judicial force. 'Judgments' best preserves that
    force in a prayer acknowledging covenant violation, while still being readable
    modern English.
  doctrine_reference: Translation philosophy §§1, 6
