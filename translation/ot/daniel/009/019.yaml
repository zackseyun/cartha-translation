id: DAN.9.19
reference: Daniel 9:19
source:
  edition: WLC
  text: אֲדֹנָ֤/י שְׁמָ֨עָ/ה֙ אֲדֹנָ֣/י סְלָ֔חָ/ה אֲדֹנָ֛/י הַֽקֲשִׁ֥יבָ/ה וַ/עֲשֵׂ֖ה
    אַל תְּאַחַ֑ר לְמַֽעֲנְ/ךָ֣ אֱלֹהַ֔/י כִּֽי שִׁמְ/ךָ֣ נִקְרָ֔א עַל עִירְ/ךָ֖ וְ/עַל
    עַמֶּֽ/ךָ׀׀־־־־׃
translation:
  text: Lord, hear! Lord, forgive! Lord, pay attention and act! Do not delay—for your
    own sake, my God, because your name is called upon your city and your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'your city and your people are called by your name.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: Vocative address to God. 'Lord' is the natural English rendering for
    the divine title here and aligns with the project's default handling of lordship
    titles. Although the form can be parsed as 'my Lord,' in direct prayer English
    normally omits the possessive and uses 'Lord' idiomatically.
- source_word: שְׁמָעָה
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Imperative plea from שׁמע. 'Hear' preserves both the auditory sense and
    the prayer-language force better than the more colloquial 'listen.'
- source_word: סְלָחָה
  chosen: forgive
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: Imperative from סלח in a penitential prayer context. 'Forgive' is the
    clearest and most standard English equivalent.
- source_word: הַקֲשִׁיבָה
  chosen: pay attention
  alternatives:
  - give heed
  - listen attentively
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב intensifies the appeal beyond simple hearing.
    'Pay attention' communicates the active, attentive sense in readable modern English.
- source_word: וַעֲשֵׂה
  chosen: and act
  alternatives:
  - and do
  - then act
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in this prayer sequence the sense is a
    plea for decisive intervention. 'And act' expresses the implied object without
    over-paraphrasing.
- source_word: אַל תְּאַחַר
  chosen: Do not delay
  alternatives:
  - do not postpone
  - do not be late
  lexicon: HALOT
  rationale: Negative jussive/imperfect from אחר in context means not to defer action.
    'Do not delay' is idiomatic and forceful.
- source_word: לְמַעַנְךָ
  chosen: for your own sake
  alternatives:
  - for your sake
  lexicon: HALOT
  rationale: The prepositional phrase grounds the request in God's own honor and reputation.
    'For your own sake' makes the reflexive force explicit in natural English.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form in direct address; retaining 'my God'
    preserves the personal covenantal appeal.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'Because' is slightly clearer than
    'for' in contemporary English while preserving the causal sense.
- source_word: שִׁמְךָ נִקְרָא עַל
  chosen: your name is called upon
  alternatives:
  - your name is called over
  - your name is invoked over
  - they are called by your name
  lexicon: HALOT
  rationale: The passive idiom literally says God's name is called over/upon the city
    and people, marking ownership and covenant identification. 'Is called upon' keeps
    the Hebrew imagery more transparently than the smoother idiom 'are called by your
    name,' while remaining understandable.
- source_word: עִירְךָ
  chosen: your city
  lexicon: HALOT
  rationale: Simple possessive noun; refers to Jerusalem in context.
- source_word: עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Simple possessive noun; refers to Israel/Judah in context.
