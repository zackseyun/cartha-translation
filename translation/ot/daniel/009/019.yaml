theological_decisions:
- issue: Rendering the covenant-identification idiom שִׁמְךָ נִקְרָא עַל
  chosen_reading: your name is called upon your city and your people
  alternative_readings:
  - your city and your people are called by your name
  rationale: The Hebrew passive with עַל is more literally 'your name is called upon/over.'
    The chosen rendering preserves the source-text imagery and theological notion
    of divine ownership/identification without collapsing it into a fully idiomatic
    English paraphrase. Because the alternative is common and clear, it is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
