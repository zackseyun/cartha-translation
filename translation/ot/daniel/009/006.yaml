theological_decisions:
- issue: Whether שָׁמַעְנוּ should be rendered as mere hearing or as obedience
  chosen_reading: have not listened
  alternative_readings:
  - have not obeyed
  rationale: Daniel's prayer confesses covenant unfaithfulness, so obedience is implicated;
    however, the Hebrew verb itself is broader. 'Listened' preserves the lexical sense
    while allowing the moral force to remain implicit in context.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Whether אֲבֹתֵינוּ should be modernized to 'ancestors'
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew is grammatically masculine plural and refers to prior generations.
    Following the gender-accurate principle, the masculine form is retained rather
    than neutralized, while the sense remains clear from context.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
