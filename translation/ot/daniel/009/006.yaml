id: DAN.9.6
reference: Daniel 9:6
source:
  edition: WLC
  text: וְ/לֹ֤א שָׁמַ֨עְנוּ֙ אֶל עֲבָדֶ֣י/ךָ הַ/נְּבִיאִ֔ים אֲשֶׁ֤ר דִּבְּרוּ֙ בְּ/שִׁמְ/ךָ֔
    אֶל מְלָכֵ֥י/נוּ שָׂרֵ֖י/נוּ וַ/אֲבֹתֵ֑י/נוּ וְ/אֶ֖ל כָּל עַ֥ם הָ/אָֽרֶץ־־־׃
translation:
  text: We have not listened to your servants the prophets, who spoke in your name
    to our kings, our officials, our fathers, and to all the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not obeyed.' The Hebrew verb can carry the sense of heeding responsively,
      not merely hearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' Literally 'our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  chosen: have not listened
  alternatives:
  - did not listen
  - have not obeyed
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. In this confessional
    context, 'listened' preserves both hearing and implied responsiveness without
    over-specifying 'obeyed' in the main text.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: With שׁמע, אֶל marks the object listened to; in English this is naturally
    rendered within 'listen to.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it refers honorifically
    to prophets in divine service. 'Servants' is the most natural and contextually
    appropriate rendering; the bonded-status nuance is not foregrounded here.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the appositional phrase 'your servants,
    the prophets.' The article is retained in English.
- source_word: דִּבְּרוּ בְּשִׁמְךָ
  chosen: spoke in your name
  alternatives:
  - spoke by your authority
  - spoke on your behalf
  lexicon: HALOT
  rationale: The idiom בְּשֵׁם conveys speaking under divine authorization and representation.
    'In your name' is both idiomatic and formally close, while preserving the covenantal-prophetic
    force.
- source_word: מְלָכֵינוּ
  chosen: our kings
  lexicon: HALOT
  rationale: Direct rendering of the first audience named.
- source_word: שָׂרֵינוּ
  chosen: our officials
  alternatives:
  - our princes
  - our leaders
  lexicon: HALOT
  rationale: שׂרים refers to ruling officials or princes. 'Officials' communicates
    governing authority in clear modern English without implying hereditary nobility
    too narrowly.
- source_word: אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Literally 'our fathers.' Per gender-accurate philosophy, the masculine
    form is preserved. In context it refers to forefathers/previous generations, but
    the literal rendering is retained in the main text.
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the הארץ
  - all the people of the country
  lexicon: HALOT
  rationale: עַם is singular collective, best rendered 'people.' הָאָרֶץ here most
    naturally means the land/country, referring to the populace broadly. 'Of the land'
    preserves the Hebrew expression and avoids over-interpretation.
