id: DAN.12.10
reference: Daniel 12:10
source:
  edition: WLC
  text: יִ֠תְבָּֽרֲרוּ וְ/יִֽתְלַבְּנ֤וּ וְ/יִצָּֽרְפוּ֙ רַבִּ֔ים וְ/הִרְשִׁ֣יעוּ
    רְשָׁעִ֔ים וְ/לֹ֥א יָבִ֖ינוּ כָּל רְשָׁעִ֑ים וְ/הַ/מַּשְׂכִּלִ֖ים יָבִֽינוּ־׃
translation:
  text: Many will purify themselves and make themselves white and be refined, but
    the wicked will act wickedly; and none of the wicked will understand, but those
    who have insight will understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Many will be purified and made white and refined.' The first two Hebrew
      verbs can be understood with a passive sense, though their forms also allow
      the reflexive nuance reflected in the main text.
    reason: alternative_reading
  - marker: b
    text: Or, 'the wise will understand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְבָּרֲרוּ
  chosen: will purify themselves
  alternatives:
  - will be purified
  - will cleanse themselves
  lexicon: HALOT
  rationale: The Hitpael of ברר can denote becoming/presenting oneself as pure or
    being purified. Given the reflexive stem and the sequence with other transformative
    verbs, 'will purify themselves' preserves the stem's force while remaining natural
    English.
- source_word: יִתְלַבְּנוּ
  chosen: make themselves white
  alternatives:
  - be made white
  - be whitened
  lexicon: HALOT
  rationale: From לבן in the Hitpael, literally 'make themselves white' or 'be whitened.'
    The imagery likely conveys cleansing/purification. The chosen rendering keeps
    the concrete metaphor rather than flattening it to a purely abstract term.
- source_word: יִצָּרְפוּ
  chosen: be refined
  alternatives:
  - be smelted
  - be tested/purged
  lexicon: HALOT
  rationale: Niphal of צרף commonly refers to refining metals and by extension purifying
    through testing. 'Be refined' preserves the metaphor in idiomatic English.
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - many people
  - multitudes
  lexicon: HALOT
  rationale: The adjective/substantive here functions as an indefinite plural subject.
    'Many' is concise and natural.
- source_word: הִרְשִׁיעוּ רְשָׁעִים
  chosen: the wicked will act wickedly
  alternatives:
  - the wicked will do wickedly
  - wicked people will behave wickedly
  lexicon: HALOT
  rationale: The Hiphil of רשע with the cognate adjective/noun creates an emphatic
    expression of wicked conduct. 'Act wickedly' is idiomatic modern English and preserves
    the cognate emphasis without awkwardness.
- source_word: יָבִינוּ
  chosen: will understand
  alternatives:
  - will have insight
  - will discern
  lexicon: HALOT
  rationale: בין in Qal commonly means understand/discern. 'Understand' is the most
    straightforward rendering and allows the contrast with the final clause to stand
    clearly.
- source_word: כָּל רְשָׁעִים
  chosen: none of the wicked
  alternatives:
  - all the wicked ... not
  - no wicked ones
  lexicon: HALOT
  rationale: Hebrew expresses total negation with 'all' plus negated verb. In idiomatic
    English this is best rendered 'none of the wicked.'
- source_word: הַמַּשְׂכִּלִים
  chosen: those who have insight
  alternatives:
  - the wise
  - those who are discerning
  lexicon: HALOT
  rationale: The participial form from שכל denotes those who are insightful/discerning.
    'Those who have insight' preserves the verbal nuance better than the more generalized
    'the wise,' though that remains a viable alternative.
