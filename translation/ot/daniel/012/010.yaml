theological_decisions:
- issue: Whether to render the first three verbs as passive divine action or as reflexive/self-involving
    action
  chosen_reading: 'Reflexive/self-involving language in the main text: ''purify themselves''
    and ''make themselves white,'' with ''be refined'' for the Niphal third verb'
  alternative_readings:
  - Many will be purified and made white and refined
  rationale: 'The Hebrew stems matter: the first two are Hitpael forms, which naturally
    suggest reflexive or middle force, while the third is Niphal, naturally passive/middle.
    The verse portrays a process of purification without explicitly naming God as
    subject in these verbs. The translation preserves that grammatical texture rather
    than smoothing all three into passives.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether הַמַּשְׂכִּלִים should be rendered more interpretively as 'the wise'
  chosen_reading: those who have insight
  alternative_readings:
  - the wise
  rationale: The term can overlap with 'wise,' but in Daniel it often carries the
    sense of those who are discerning/instructive. 'Those who have insight' keeps
    the lexical connection to understanding in the final verb and avoids importing
    a broader wisdom category than the immediate context requires.
  doctrine_reference: Translation philosophy §§1, 5
