theological_decisions:
- issue: Nature of Michael's action
  chosen_reading: Michael 'will arise' as a heavenly protector taking decisive action
    on behalf of God's people
  alternative_readings:
  - Michael 'will stand' in a more static sense
  - Michael 'will stand up' with emphasis on legal or military defense
  rationale: The Hebrew permits several closely related nuances. The translation preserves
    the action-oriented sense without resolving detailed angelological debates beyond
    what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of deliverance in יִמָּלֵט
  chosen_reading: physical/historical escape-deliverance is foregrounded in the wording
    'will escape'
  alternative_readings:
  - eschatological salvation
  - divine deliverance in a broader theological sense
  rationale: The immediate context is apocalyptic and national, so 'escape' best reflects
    the lexical sense while leaving room for broader theological implications in context.
    The translation avoids importing a narrower soteriological claim into the verse
    itself.
  doctrine_reference: Do not import doctrinal claims the text does not make.
