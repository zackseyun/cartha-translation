id: DAN.12.1
reference: Daniel 12:1
source:
  edition: WLC
  text: וּ/בָ/עֵ֣ת הַ/הִיא֩ יַעֲמֹ֨ד מִֽיכָאֵ֜ל הַ/שַּׂ֣ר הַ/גָּד֗וֹל הָ/עֹמֵד֮ עַל
    בְּנֵ֣י עַמֶּ/ךָ֒ וְ/הָיְתָה֙ עֵ֣ת צָרָ֔ה אֲשֶׁ֤ר לֹֽא נִהְיְתָה֙ מִֽ/הְי֣וֹת
    גּ֔וֹי עַ֖ד הָ/עֵ֣ת הַ/הִ֑יא וּ/בָ/עֵ֤ת הַ/הִיא֙ יִמָּלֵ֣ט עַמְּ/ךָ֔ כָּל הַ/נִּמְצָ֖א
    כָּת֥וּב בַּ/סֵּֽפֶר־־־׃
translation:
  text: And at that time Michael, the great prince who stands over the sons of your
    people, will arise. And there will be a time of distress such as has not happened
    since there was a nation until that time. But at that time your people will escape,
    everyone who is found written in the book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who stands for the sons of your people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a time of trouble.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲמֹד
  chosen: will arise
  alternatives:
  - will stand
  - will stand up
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand,' but in this apocalyptic context
    with Michael as heavenly protector it likely carries the idiomatic sense of rising
    to act or take one's stand. 'Will arise' is natural English and preserves the
    sense of decisive intervention without over-paraphrasing.
- source_word: הַשַּׂר הַגָּדוֹל
  chosen: the great prince
  alternatives:
  - the great ruler
  - the great commander
  lexicon: HALOT
  rationale: שַׂר commonly denotes a prince, ruler, or chief official. In Daniel's
    angelic-political context, 'prince' is the established and contextually fitting
    rendering, and 'great' straightforwardly renders גָּדוֹל.
- source_word: הָעֹמֵד עַל
  chosen: who stands over
  alternatives:
  - who stands for
  - who watches over
  - who has charge over
  lexicon: HALOT
  rationale: The participle plus עַל literally means 'standing over.' In context it
    conveys protective or representative oversight. 'Who stands over' keeps the Hebrew
    image in the main text while remaining intelligible; the more interpretive 'stands
    for' is preserved as an alternative.
- source_word: בְּנֵי עַמֶּךָ
  chosen: the sons of your people
  alternatives:
  - the children of your people
  - your people
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Per gender-accurate philosophy, the masculine
    form is retained rather than flattened. In Hebrew this can denote members/descendants
    of the people collectively, but the formal expression is preserved here.
- source_word: עֵת צָרָה
  chosen: a time of distress
  alternatives:
  - a time of trouble
  - a time of anguish
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or anguish. 'Distress' is clear modern
    English and carries the severity of the term without sounding archaic.
- source_word: אֲשֶׁר לֹא נִהְיְתָה מִהְיוֹת גּוֹי
  chosen: such as has not happened since there was a nation
  alternatives:
  - such as never has been since a nation came to be
  - such as has never occurred since nations began
  lexicon: HALOT
  rationale: The clause compares the coming distress with all prior history from the
    existence of a nation. 'Since there was a nation' closely follows the Hebrew syntax
    and avoids importing interpretive expansions.
- source_word: יִמָּלֵט
  chosen: will escape
  alternatives:
  - will be delivered
  - will be rescued
  lexicon: HALOT
  rationale: The Niphal of מלט can mean escape or be delivered. 'Will escape' preserves
    the passive-reflexive nuance of coming through safely, while avoiding a more theologically
    loaded term unless context requires it.
- source_word: כָּל הַנִּמְצָא כָּתוּב
  chosen: everyone who is found written
  alternatives:
  - everyone found written
  - everyone who is found recorded
  lexicon: HALOT
  rationale: 'The participle plus passive adjective yields a straightforward sense:
    those found to be written/recorded. ''Everyone who is found written'' is slightly
    formal but transparent to the Hebrew structure.'
- source_word: בַּסֵּפֶר
  chosen: in the book
  alternatives:
  - in the scroll
  lexicon: HALOT
  rationale: סֵפֶר can denote book or scroll. 'Book' is standard in English biblical
    usage and works idiomatically here, especially given the likely heavenly register
    motif.
