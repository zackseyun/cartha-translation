id: DAN.12.11
reference: Daniel 12:11
source:
  edition: WLC
  text: וּ/מֵ/עֵת֙ הוּסַ֣ר הַ/תָּמִ֔יד וְ/לָ/תֵ֖ת שִׁקּ֣וּץ שֹׁמֵ֑ם יָמִ֕ים אֶ֖לֶף
    מָאתַ֥יִם וְ/תִשְׁעִֽים׃
translation:
  text: And from the time that the regular offering is removed and the abomination
    that desolates is set up, there will be 1,290 days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the daily sacrifice.' The Hebrew תָּמִיד is a cultic
      shorthand for the regular/continual temple offering.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the abomination of desolation' or 'the desolating abomination.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מֵ/עֵת
  chosen: And from the time
  alternatives:
  - And from the time when
  - From the time
  lexicon: HALOT
  rationale: מִן + עֵת marks a temporal starting point, and the prefixed conjunction
    links this statement to the preceding context. 'And from the time' preserves both
    the conjunction and the temporal force naturally in English.
- source_word: הוּסַר
  chosen: is removed
  alternatives:
  - is taken away
  - has been removed
  lexicon: HALOT
  rationale: Hophal of סור conveys passive removal. Present tense in English works
    idiomatically in a future-oriented prophetic statement introduced by 'from the
    time that.' 'Removed' is slightly more formal and broad than 'taken away' while
    remaining clear.
- source_word: הַתָּמִיד
  chosen: the regular offering
  alternatives:
  - the regular burnt offering
  - the continual offering
  - the daily sacrifice
  lexicon: HALOT
  rationale: תָּמִיד here is a cultic shorthand for the regular/continual temple offering.
    'The regular offering' is accurate and readable without importing 'burnt' where
    the noun is elliptical in Hebrew. 'Daily sacrifice' is traditional but more interpretive
    and can over-specify.
- source_word: וְ/לָ/תֵת
  chosen: and ... is set up
  alternatives:
  - and to set up
  - and for the setting up of
  lexicon: HALOT
  rationale: 'Literally ''and to give/set,'' but in this construction it introduces
    the placement/establishment of what follows. In idiomatic English, this is best
    represented by supplying the passive verbal sense with the following noun phrase:
    ''and the abomination ... is set up.'' This reflects the clause''s temporal reference
    rather than a wooden infinitive.'
- source_word: שִׁקּוּץ
  chosen: the abomination
  alternatives:
  - a detestable thing
  - the abhorrent thing
  lexicon: HALOT
  rationale: שִׁקּוּץ commonly denotes something detestable, especially in idolatrous/profaning
    contexts. 'Abomination' preserves the established biblical register and fits the
    Danielic context.
- source_word: שֹׁמֵם
  chosen: that desolates
  alternatives:
  - causing desolation
  - desolating
  lexicon: HALOT
  rationale: The participle from שמם modifies שִׁקּוּץ and denotes its desolating
    effect. 'That desolates' is natural English and preserves the active force. It
    also maintains the recognizable Danielic phrasing without forcing a more technical
    expression.
- source_word: יָמִים אֶלֶף מָאתַיִם וְתִשְׁעִים
  chosen: there will be 1,290 days
  alternatives:
  - will be 1,290 days
  - 1,290 days
  lexicon: HALOT
  rationale: 'The Hebrew gives the duration/result succinctly: ''days, one thousand
    two hundred and ninety.'' Supplying ''there will be'' makes the English clause
    complete and clear while preserving the numerical statement.'
