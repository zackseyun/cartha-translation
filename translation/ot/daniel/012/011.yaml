theological_decisions:
- issue: Rendering of הַתָּמִיד in an apocalyptic-temple context
  chosen_reading: the regular offering
  alternative_readings:
  - the daily sacrifice
  - the continual burnt offering
  rationale: The Hebrew term is elliptical and refers to the ongoing temple rite.
    'The regular offering' preserves the cultic reference without overcommitting to
    a narrower specification not explicit in the verse itself. Traditional 'daily
    sacrifice' is preserved as an alternative because of its strong interpretive and
    intertextual history in Daniel.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of שִׁקּוּץ שֹׁמֵם
  chosen_reading: the abomination that desolates
  alternative_readings:
  - the abomination of desolation
  - the desolating abomination
  rationale: The Hebrew construction can be rendered in more than one idiomatic way.
    'The abomination that desolates' more directly reflects the participial force
    of שֹׁמֵם, while the traditional 'abomination of desolation' is preserved in a
    footnote because of its established biblical-theological resonance, especially
    in later scriptural usage.
  doctrine_reference: Translation philosophy §3, §5
