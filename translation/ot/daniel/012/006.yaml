theological_decisions:
- issue: Referent of the speaker and visionary figure
  chosen_reading: Retain the Hebrew's simple narrative reference ('he said') and the
    descriptive title ('the man clothed in linen') without identifying the figures
    beyond the text.
  alternative_readings:
  - Interpret the speaker explicitly as one angel addressing another angelic being
  - Interpret the man clothed in linen as a Christophany
  rationale: The verse itself does not explicitly identify the speaker or require
    a christological identification of the linen-clothed man. To preserve theological
    tension and avoid importing doctrinal claims the text does not make, the translation
    leaves the referents as described in the Hebrew narrative.
  doctrine_reference: Preserve theological tension rather than resolve it.
