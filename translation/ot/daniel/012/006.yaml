id: DAN.12.6
reference: Daniel 12:6
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לָ/אִישׁ֙ לְב֣וּשׁ הַ/בַּדִּ֔ים אֲשֶׁ֥ר מִ/מַּ֖עַל לְ/מֵימֵ֣י
    הַ/יְאֹ֑ר עַד מָתַ֖י קֵ֥ץ הַ/פְּלָאֽוֹת־׃
translation:
  text: And he said to the man clothed in linen, who was above the waters of the river,
    “How long until the end of these wonders?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who was over the waters of the river.”
    reason: lexical_alternative
  - marker: b
    text: Or “How long until the end of the astonishing things?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, rendered with simple past.
    'And' preserves the Hebrew narrative linkage without overinterpreting temporal
    sequence.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to a man
  lexicon: HALOT
  rationale: The prefixed article indicates a definite referent already identifiable
    in context, so 'the man' is preferable.
- source_word: לְבוּשׁ הַבַּדִּים
  chosen: clothed in linen
  alternatives:
  - dressed in linen
  - wearing linen garments
  lexicon: HALOT
  rationale: The participial construction plus object denotes attire. 'Clothed in
    linen' is natural English and preserves the elevated tone of the vision.
- source_word: הַבַּדִּים
  chosen: linen
  alternatives:
  - linen garments
  - linen cloth
  lexicon: HALOT
  rationale: בַּדִּים refers to linen fabric/garments. English idiom normally says
    'clothed in linen' rather than repeating 'garments' unless needed.
- source_word: אֲשֶׁר מִמַּעַל לְמֵימֵי הַיְאֹר
  chosen: who was above the waters of the river
  alternatives:
  - who was over the waters of the river
  - who was above the waters of the Nile/stream
  lexicon: HALOT
  rationale: מִמַּעַל indicates position above/over. יְאֹר can denote a river or canal
    and is often used of the Nile, but in Daniel's setting 'the river' best fits the
    immediate visionary scene and avoids importing Egypt-specific associations not
    required by the context.
- source_word: עַד מָתַי
  chosen: How long until
  alternatives:
  - Until when
  - How long
  lexicon: HALOT
  rationale: This idiom asks the duration remaining until an event. 'How long until'
    is idiomatic modern English and preserves the prospective force.
- source_word: קֵץ
  chosen: the end
  alternatives:
  - an end
  - the completion
  lexicon: HALOT
  rationale: קֵץ here denotes the terminus or completion point of the events in view.
    The construct relation with what follows is naturally rendered 'the end of...'.
- source_word: הַפְּלָאוֹת
  chosen: these wonders
  alternatives:
  - these astonishing things
  - the wonders
  lexicon: HALOT
  rationale: From פלא, denoting extraordinary or wondrous acts/events. 'These wonders'
    brings out the deictic sense implied by the article in context and fits the speaker's
    reference to the remarkable end-time events just described.
