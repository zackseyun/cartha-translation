id: DAN.12.3
reference: Daniel 12:3
source:
  edition: WLC
  text: וְ/הַ֨/מַּשְׂכִּלִ֔ים יַזְהִ֖רוּ כְּ/זֹ֣הַר הָ/רָקִ֑יעַ וּ/מַצְדִּיקֵי֙ הָֽ/רַבִּ֔ים
    כַּ/כּוֹכָבִ֖ים לְ/עוֹלָ֥ם וָ/עֶֽד׃פ
translation:
  text: And those who have insight will shine like the brightness of the expanse,
    and those who lead the many to righteousness, like the stars forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wise' for 'those who have insight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who turn the many to righteousness'; the Hebrew may also be understood
      more literally as 'those who make the many righteous' or 'those who justify
      the many.'
    reason: alternative_reading
  - marker: c
    text: '''The expanse'' refers to the broad dome of the heavens; traditional English
      often has ''firmament.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂכִּלִים
  chosen: those who have insight
  alternatives:
  - the wise
  - those who are discerning
  - those who have understanding
  lexicon: HALOT
  rationale: The participial form from שכל denotes people characterized by understanding
    or discernment. 'Those who have insight' preserves the verbal/participial nuance
    better than the more traditional but slightly flatter 'the wise.'
- source_word: יַזְהִרוּ
  chosen: will shine
  alternatives:
  - will gleam
  - will give brightness
  - will be radiant
  lexicon: HALOT
  rationale: The Hiphil of זהר here expresses shining or radiance. 'Will shine' is
    natural English and fits the simile that follows.
- source_word: כְּזֹהַר
  chosen: like the brightness
  alternatives:
  - like the radiance
  - like the shining
  lexicon: HALOT
  rationale: זֹהַר denotes brightness/radiance. 'Brightness' is clear modern English
    and pairs well with 'shine.'
- source_word: הָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the sky
  lexicon: HALOT
  rationale: רָקִיעַ refers to the spread-out heavenly expanse. 'The expanse' follows
    modern source-oriented rendering better than the archaic 'firmament,' while remaining
    more precise than simply 'sky.'
- source_word: וּמַצְדִּיקֵי
  chosen: those who lead ... to righteousness
  alternatives:
  - those who justify
  - those who make righteous
  - those who turn ... to righteousness
  lexicon: HALOT
  rationale: The Hiphil participle of צדק can mean to declare righteous, make righteous,
    or cause to be righteous/right. In this context with 'the many,' the sense is
    best captured as bringing others into righteousness. 'Lead ... to righteousness'
    avoids importing a narrowly forensic sense while preserving causative force.
- source_word: הָרַבִּים
  chosen: the many
  alternatives:
  - many
  - the multitude
  lexicon: HALOT
  rationale: The article is present, so 'the many' is retained rather than the more
    indefinite 'many.' This also preserves the phrase's weight in apocalyptic usage.
- source_word: כַּכּוֹכָבִים
  chosen: like the stars
  alternatives:
  - as the stars
  lexicon: HALOT
  rationale: A straightforward simile; 'like the stars' is idiomatic and accurate.
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for everlasting duration
  lexicon: HALOT
  rationale: The paired expression intensifies perpetuity. 'Forever and ever' preserves
    the emphatic force better than a simple 'forever.'
