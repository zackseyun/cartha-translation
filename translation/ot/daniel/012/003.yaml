theological_decisions:
- issue: Sense of מַצְדִּיקֵי הָרַבִּים
  chosen_reading: those who lead the many to righteousness
  alternative_readings:
  - those who justify the many
  - those who make many righteous
  - those who turn many to righteousness
  rationale: The Hebrew causative participle from צדק can be read in more than one
    way. Because the context is apocalyptic reward for faithful teachers or righteous
    influencers, the rendering should preserve the ethical-transformative sense without
    forcing later doctrinal categories of forensic justification into the text. 'Lead
    the many to righteousness' best preserves the causative idea in accessible English
    while leaving theological tension intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
