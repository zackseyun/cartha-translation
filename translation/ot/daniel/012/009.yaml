id: DAN.12.9
reference: Daniel 12:9
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר לֵ֣ךְ דָּנִיֵּ֑אל כִּֽי סְתֻמִ֧ים וַ/חֲתֻמִ֛ים הַ/דְּבָרִ֖ים עַד
    עֵ֥ת קֵֽץ־־׃
translation:
  text: And he said, “Go your way, Daniel, because the words are concealed and sealed
    until the time of the end.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “shut up and sealed.” The Hebrew uses two passive participles to describe
      the words as inaccessible until the appointed end.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves the Hebrew
    sequence naturally in English.
- source_word: לֵךְ
  chosen: Go your way
  alternatives:
  - Go
  - Be on your way
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go your way' captures the dismissive/continuative
    force in context better than the bare 'Go' while remaining idiomatic.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in modern
    English than 'for' while preserving the causal sense.
- source_word: סְתֻמִים
  chosen: concealed
  alternatives:
  - shut up
  - closed up
  - hidden
  lexicon: HALOT
  rationale: Passive participle from סתם. Traditional 'shut up' is archaic/misleading
    in modern English. 'Concealed' preserves the sense that the message is not presently
    open to understanding or disclosure.
- source_word: וַחֲתֻמִים
  chosen: and sealed
  alternatives:
  - and closed
  - and shut
  lexicon: HALOT
  rationale: Passive participle from חתם, commonly used of sealing a document. 'Sealed'
    is the most direct and idiomatic rendering and pairs naturally with 'concealed.'
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - these words
  - the matters
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'matter.' Here the reference is to the revelatory
    message just given; 'the words' is the more transparent and traditional rendering.
- source_word: עַד עֵת קֵץ
  chosen: until the time of the end
  alternatives:
  - until the end time
  - until the time of the end
  lexicon: HALOT
  rationale: This phrase is a key Danielic expression. 'The time of the end' preserves
    the formal structure and eschatological weight better than the smoother but less
    literal 'end time'.
