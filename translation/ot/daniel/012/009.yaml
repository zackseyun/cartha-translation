theological_decisions:
- issue: Eschatological force of עֵת קֵץ
  chosen_reading: the time of the end
  alternative_readings:
  - the end time
  rationale: The Hebrew phrase in Daniel has a marked eschatological sense. Retaining
    'the time of the end' preserves that theological tension and intertextual consistency
    within Daniel without over-specifying chronology.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
