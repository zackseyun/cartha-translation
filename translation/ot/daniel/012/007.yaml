theological_decisions:
- issue: Interpretation of the apocalyptic time formula לְמוֹעֵד מוֹעֲדִים וָחֵצִי
  chosen_reading: Rendered formally as 'for a time, times, and half a time' without
    specifying exact chronological units.
  alternative_readings:
  - for an appointed time, appointed times, and half
  - for a year, two years, and half a year
  rationale: The phrase is intentionally preserved in its traditional ambiguity. The
    Hebrew permits an apocalyptic idiom that many interpret as years, but the text
    itself does not explicitly define the units here. Preserving the tension aligns
    with the translation philosophy.
  doctrine_reference: Translation philosophy §3
- issue: Metonymic force of יַד in נַפֵּץ יַד עַם קֹדֶשׁ
  chosen_reading: Rendered 'the power of the holy people' rather than 'the hand of
    the holy people.'
  alternative_readings:
  - the hand of the holy people
  - the strength of the holy people
  rationale: This is a lexical-semantic decision with theological implications for
    how the suffering of God's people is understood. 'Power' best communicates the
    Hebrew metonymy in readable English without reducing the severity of the oppression.
  doctrine_reference: Translation philosophy §6
