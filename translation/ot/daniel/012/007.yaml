id: DAN.12.7
reference: Daniel 12:7
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֞ע אֶת הָ/אִ֣ישׁ לְב֣וּשׁ הַ/בַּדִּ֗ים אֲשֶׁ֣ר מִ/מַּעַל֮ לְ/מֵימֵ֣י
    הַ/יְאֹר֒ וַ/יָּ֨רֶם יְמִינ֤/וֹ וּ/שְׂמֹאל/וֹ֙ אֶל הַ/שָּׁמַ֔יִם וַ/יִּשָּׁבַ֖ע
    בְּ/חֵ֣י הָ/עוֹלָ֑ם כִּי֩ לְ/מוֹעֵ֨ד מֽוֹעֲדִ֜ים וָ/חֵ֗צִי וּ/כְ/כַלּ֛וֹת נַפֵּ֥ץ
    יַד עַם קֹ֖דֶשׁ תִּכְלֶ֥ינָה כָל אֵֽלֶּה־׀־־־־׃
translation:
  text: Then I heard the man clothed in linen, who was above the waters of the river,
    and he raised his right hand and his left hand to heaven and swore by him who
    lives forever that it would be for a time, times, and half a time; and when the
    shattering of the power of the holy people is finished, all these things will
    be completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for an appointed time, appointed times, and half';
      many understand this as 'for a year, two years, and half a year.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the hand of the holy people'; 'hand' here likely means power or
      strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְב֣וּשׁ הַבַּדִּים
  chosen: clothed in linen
  alternatives:
  - wearing linen
  - dressed in linen garments
  lexicon: HALOT
  rationale: A natural English rendering of the passive participial construction that
    preserves the concrete imagery without over-literal awkwardness.
- source_word: הַיְאֹר
  chosen: the river
  alternatives:
  - the Nile
  - the stream
  lexicon: HALOT
  rationale: In Daniel this term refers to the great river seen in the vision context,
    not necessarily the Nile specifically. 'The river' fits the immediate setting
    and avoids importing Egyptian specificity not demanded by this context.
- source_word: וַיָּרֶם יְמִינוֹ וּשְׂמֹאלוֹ
  chosen: he raised his right hand and his left hand
  alternatives:
  - he lifted both his hands
  lexicon: HALOT
  rationale: The Hebrew explicitly names both hands; the translation preserves that
    solemn oath gesture rather than compressing it.
- source_word: אֶל הַשָּׁמַיִם
  chosen: to heaven
  alternatives:
  - to the heavens
  - toward heaven
  lexicon: HALOT
  rationale: Singular 'heaven' is idiomatic in English for oath language while still
    representing the Hebrew directional phrase.
- source_word: בְּחֵי הָעוֹלָם
  chosen: by him who lives forever
  alternatives:
  - by the Ever-Living One
  - by the one living forever
  lexicon: HALOT
  rationale: 'The Hebrew oath formula literally invokes ''the living one of eternity/forever.''
    English idiom normally supplies the personal referent: ''by him who lives forever.''
    This preserves the solemn divine reference without unnecessary paraphrase.'
- source_word: לְמוֹעֵד מוֹעֲדִים וָחֵצִי
  chosen: for a time, times, and half a time
  alternatives:
  - for an appointed time, appointed times, and half
  - for a year, two years, and half a year
  lexicon: HALOT
  rationale: This is the conventional and lexically defensible rendering of the enigmatic
    expression. 'Appointed time(s)' is possible from מועד, but in this apocalyptic
    idiom 'a time, times, and half a time' best preserves the wording and interpretive
    openness. The more specific 'year(s)' interpretation is possible but too interpretive
    for the main text.
- source_word: וּכְכַלּוֹת
  chosen: and when ... is finished
  alternatives:
  - and at the completion of
  - and when ... comes to an end
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed כ conveys temporal sense here:
    ''when/as ... is finished.'' This yields clear English while preserving the sequence.'
- source_word: נַפֵּץ יַד
  chosen: the shattering of the power
  alternatives:
  - the breaking of the hand
  - the smashing of the strength
  lexicon: HALOT
  rationale: '''Hand'' often metonymically denotes power or strength in Hebrew. Rendering
    it as ''power'' communicates the sense in idiomatic English, while ''shattering''
    preserves the violent force of נפּץ.'
- source_word: עַם קֹדֶשׁ
  chosen: the holy people
  alternatives:
  - the holy nation
  - the people of holiness
  lexicon: HALOT
  rationale: A standard and contextually clear rendering for God's consecrated people
    in Daniel.
- source_word: תִּכְלֶינָה כָל אֵלֶּה
  chosen: all these things will be completed
  alternatives:
  - all these things will come to an end
  - all these things will be finished
  lexicon: HALOT
  rationale: The feminine plural verb agrees with 'these things.' 'Will be completed'
    fits the eschatological sequence and avoids suggesting annihilation; the sense
    is that the foretold events reach their full end.
