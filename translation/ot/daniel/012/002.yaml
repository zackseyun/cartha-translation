theological_decisions:
- issue: Scope of the resurrection implied by 'many'
  chosen_reading: Translate רַבִּים as 'many' without expanding it to 'all.'
  alternative_readings:
  - '''all'' as an interpretive sense referring to the general resurrection'
  - '''multitudes'' to emphasize large number'
  rationale: The Hebrew says 'many,' and the translation should preserve that wording
    rather than resolve the interpretive question of whether 'many' is a Semitic way
    of referring to all the dead in view. This preserves theological tension rather
    than importing a systematic conclusion.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Nature of the negative destiny
  chosen_reading: Render the second outcome as 'to reproaches, to everlasting contempt.'
  alternative_readings:
  - '''to shame and everlasting contempt'''
  - '''to disgrace and everlasting abhorrence'''
  rationale: The Hebrew presents two linked terms, one plural and one singular, describing
    the negative outcome. The translation should preserve both terms distinctly rather
    than collapsing them into a single concept. This avoids importing later doctrinal
    formulations while still allowing the verse's solemn force to stand.
  doctrine_reference: Translation philosophy §1 and §3
