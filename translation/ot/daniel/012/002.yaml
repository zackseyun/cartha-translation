id: DAN.12.2
reference: Daniel 12:2
source:
  edition: WLC
  text: וְ/רַבִּ֕ים מִ/יְּשֵׁנֵ֥י אַדְמַת עָפָ֖ר יָקִ֑יצוּ אֵ֚לֶּה לְ/חַיֵּ֣י עוֹלָ֔ם
    וְ/אֵ֥לֶּה לַ/חֲרָפ֖וֹת לְ/דִרְא֥וֹן עוֹלָֽם־׃ס
translation:
  text: And many of those sleeping in the dust of the earth will awake, these to everlasting
    life, and those to reproaches, to everlasting contempt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'multitudes of those sleeping in the dust of the earth.' The Hebrew says
      'many,' not explicitly 'all.'
    reason: alternative_reading
  - marker: b
    text: Or 'to shame' for 'to reproaches.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to everlasting abhorrence.' Compare Isaiah 66:24, where a related idea
      appears in a judgment context.
    reason: cross_reference
lexical_decisions:
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: The adjective/noun means 'many.' While some argue it can imply a great
    multitude or function inclusively, the plain lexical sense is 'many,' and this
    should not be expanded to 'all' in translation. 'Multitudes' is possible but less
    direct.
- source_word: מִיְּשֵׁנֵי
  chosen: of those sleeping
  alternatives:
  - of those who sleep
  - from the sleepers
  lexicon: HALOT
  rationale: The participial form from ישׁן denotes those who are sleeping. Rendering
    it as 'sleeping' preserves the metaphor for death without over-interpreting it.
    'Of those who sleep' is also viable; 'from the sleepers' is more wooden.
- source_word: אַדְמַת עָפָר
  chosen: the dust of the earth
  alternatives:
  - the dusty ground
  - the ground of dust
  lexicon: HALOT
  rationale: The construct phrase literally refers to dusty ground/soil. 'The dust
    of the earth' is idiomatic in English and preserves the imagery of burial and
    mortality better than more awkwardly literal options.
- source_word: יָקִיצוּ
  chosen: will awake
  alternatives:
  - will wake up
  - will arise
  lexicon: HALOT
  rationale: The Hiphil of קוץ here means 'awake' or 'rouse.' 'Will awake' preserves
    the sleep metaphor and the resurrection context. 'Will arise' would import a different
    verb idea not present in the Hebrew.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - some
  lexicon: HALOT
  rationale: The demonstrative is literally 'these.' Keeping 'these ... and those'
    reflects the Hebrew contrast more closely than smoothing to 'some ... others.'
- source_word: לְחַיֵּי עוֹלָם
  chosen: to everlasting life
  alternatives:
  - to eternal life
  - for everlasting life
  lexicon: HALOT
  rationale: The phrase denotes life of unending duration. 'Everlasting life' is a
    natural and established English rendering; 'eternal life' is also possible, but
    'everlasting' pairs well with the repeated עוֹלָם later in the verse.
- source_word: חֲרָפוֹת
  chosen: reproaches
  alternatives:
  - shame
  - disgrace
  lexicon: HALOT
  rationale: The plural noun commonly denotes reproaches, taunts, or objects of shame.
    Many English versions compress the phrase to 'shame,' but 'reproaches' better
    reflects the plural form and the social dimension of disgrace.
- source_word: דִרְאוֹן
  chosen: contempt
  alternatives:
  - abhorrence
  lexicon: HALOT
  rationale: This rare noun denotes abhorrence or contempt. 'Contempt' is clear modern
    English and fits the collocation with עוֹלָם. 'Abhorrence' is a strong alternative
    worth preserving in a footnote because of its use in some traditional renderings
    and its connection with Isaiah 66:24.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - eternal
  lexicon: HALOT
  rationale: The noun denotes enduring, perpetual duration. Rendering both occurrences
    consistently as 'everlasting' preserves the parallelism of the verse.
