theological_decisions:
- issue: Referent of אֲדֹנִי
  chosen_reading: A respectful address to the heavenly messenger/interpreter, rendered
    'My lord' without capitalization.
  alternative_readings:
  - A direct address to God, rendered 'Lord'
  rationale: The immediate context presents Daniel speaking to the revealing figure.
    Rendering with lowercase avoids importing a stronger theological identification
    than the text requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
