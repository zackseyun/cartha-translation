id: DAN.12.4
reference: Daniel 12:4
source:
  edition: WLC
  text: וְ/אַתָּ֣ה דָֽנִיֵּ֗אל סְתֹ֧ם הַ/דְּבָרִ֛ים וַ/חֲתֹ֥ם הַ/סֵּ֖פֶר עַד עֵ֣ת
    קֵ֑ץ יְשֹׁטְט֥וּ רַבִּ֖ים וְ/תִרְבֶּ֥ה הַ/דָּֽעַת־׃
translation:
  text: But you, Daniel, shut up the words and seal the book until the time of the
    end. Many will roam about, and knowledge will increase.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scroll.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Many will run to and fro'; the Hebrew may also suggest searching through
      something, yielding the sense 'Many will search through, and knowledge will
      increase.'
    reason: alternative_reading
lexical_decisions:
- source_word: סְתֹם
  chosen: shut up
  alternatives:
  - close up
  - conceal
  lexicon: HALOT
  rationale: Imperative from סתם in the sense of closing up or keeping inaccessible.
    'Shut up' preserves the concrete metaphor and traditional apocalyptic sense without
    overinterpreting it as total secrecy.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - these words
  - the matters
  lexicon: HALOT
  rationale: דבר commonly means 'word(s)' or 'matter(s)'; here 'the words' fits the
    immediate referent, namely the revealed message Daniel has received.
- source_word: חֲתֹם
  chosen: seal
  alternatives:
  - seal up
  - secure
  lexicon: HALOT
  rationale: The imperative denotes sealing a document. 'Seal' is concise and idiomatic
    in English; the object 'the book' carries the sense of preserving and restricting
    access.
- source_word: הַסֵּפֶר
  chosen: the book
  alternatives:
  - the scroll
  - the document
  lexicon: HALOT
  rationale: ספר can denote a written document or scroll. 'Book' is the conventional
    and sufficiently broad rendering in English, while a footnote preserves 'scroll'
    as a material-culture alternative.
- source_word: עַד עֵת קֵץ
  chosen: until the time of the end
  alternatives:
  - until the end time
  - until the time of the end-time
  lexicon: HALOT
  rationale: A temporal phrase marking the eschatological endpoint. 'The time of the
    end' is the most natural and established rendering and avoids unnecessary paraphrase.
- source_word: יְשֹׁטְטוּ רַבִּים
  chosen: Many will roam about
  alternatives:
  - Many will run to and fro
  - Many will search through
  lexicon: HALOT
  rationale: The verb שוטט can mean moving about, going here and there, or ranging
    through. The phrase is debated between physical movement and searching inquiry.
    'Roam about' preserves the broad sense without prematurely resolving the interpretive
    question; alternatives are preserved in a footnote.
- source_word: וְתִרְבֶּה הַדָּעַת
  chosen: and knowledge will increase
  alternatives:
  - and knowledge will be multiplied
  - and understanding will increase
  lexicon: HALOT
  rationale: The verb רבה with דעת naturally yields 'knowledge will increase/multiply.'
    'Knowledge' is preferred over 'understanding' because דעת more directly denotes
    knowledge here, while the English remains readable.
