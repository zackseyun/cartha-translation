theological_decisions:
- issue: Interpretation of יְשֹׁטְטוּ רַבִּים וְתִרְבֶּה הַדָּעַת
  chosen_reading: A general statement that many will move about and that knowledge
    will increase as the end approaches, without specifying whether this is travel,
    investigative searching, or growth in understanding of the prophecy.
  alternative_readings:
  - Many will run to and fro in a literal sense, and general human knowledge will
    increase.
  - Many will search through the book, and understanding of the prophecy will increase.
  rationale: The Hebrew permits more than one plausible nuance, and the verse has
    long been interpreted in different ways. In keeping with the translation philosophy,
    the main text preserves the ambiguity rather than resolving it into either technological
    progress or specifically exegetical study.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
