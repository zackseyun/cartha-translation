id: DAN.12.5
reference: Daniel 12:5
source:
  edition: WLC
  text: וְ/רָאִ֨יתִי֙ אֲנִ֣י דָנִיֵּ֔אל וְ/הִנֵּ֛ה שְׁנַ֥יִם אֲחֵרִ֖ים עֹמְדִ֑ים אֶחָ֥ד
    הֵ֨נָּה֙ לִ/שְׂפַ֣ת הַ/יְאֹ֔ר וְ/אֶחָ֥ד הֵ֖נָּה לִ/שְׂפַ֥ת הַ/יְאֹֽר׃
translation:
  text: 'Then I, Daniel, looked, and behold, two others were standing: one on this
    bank of the river, and one on that bank of the river.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one on this side of the riverbank, and one on that side of the riverbank.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  chosen: Then I ... looked
  alternatives:
  - And I saw
  - Then I saw
  lexicon: HALOT
  rationale: The waw + qatal advances the narrative. 'Looked' fits the immediate visual
    scene naturally in English, while preserving the first-person act of seeing. 'Then'
    captures the sequential force of the conjunction.
- source_word: אֲנִי דָנִיֵּאל
  chosen: I, Daniel
  alternatives:
  - I Daniel
  - I, Daniel, myself
  lexicon: HALOT
  rationale: The explicit pronoun with the proper name is emphatic/self-identifying.
    'I, Daniel' preserves the emphasis in idiomatic English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and behold
  - look
  - suddenly
  lexicon: HALOT
  rationale: This discourse marker draws attention to a new sight in the vision. 'Behold'
    preserves the deictic vividness without over-paraphrasing.
- source_word: שְׁנַיִם אֲחֵרִים
  chosen: two others
  alternatives:
  - two other ones
  - two more
  lexicon: HALOT
  rationale: אֲחֵרִים distinguishes these figures from the one already present in
    the preceding context. 'Two others' is concise and accurate.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  - standing
  lexicon: HALOT
  rationale: The participle denotes a continuing posture. 'Were standing' conveys
    the durative scene-setting force better than the simple past 'stood'.
- source_word: הֵנָּה
  chosen: this bank / that bank
  alternatives:
  - here
  - on this side / on that side
  lexicon: HALOT
  rationale: The adverb points to location relative to the riverbanks. In English,
    the contrast is best made explicit as 'this bank' and 'that bank' to avoid awkward
    repetition of 'here' and to reflect the two opposed positions.
- source_word: לִשְׂפַת
  chosen: on ... bank
  alternatives:
  - at the edge of
  - on the shore of
  - on the lip of
  lexicon: HALOT
  rationale: The noun means edge, lip, or bank. With a river, 'bank' is the natural
    contextual rendering.
- source_word: הַיְאֹר
  chosen: the river
  alternatives:
  - the stream
  - the Nile
  lexicon: HALOT
  rationale: Although יְאֹר can denote the Nile in some contexts, here it refers to
    the river of Daniel's vision rather than requiring the proper name 'Nile.' 'River'
    is the most contextually appropriate and least interpretively loaded rendering.
