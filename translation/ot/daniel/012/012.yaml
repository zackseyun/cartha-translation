theological_decisions:
- issue: Meaning of the beatitude in an apocalyptic timetable
  chosen_reading: Retain the temporal statement without interpreting the 1,335 days
    symbolically or literally in the translation itself.
  alternative_readings:
  - A strictly literal chronological period
  - A symbolic or stylized apocalyptic number
  rationale: The verse pronounces blessing on the one who endures until a specified
    time marker, but the translation should not resolve debated eschatological interpretations
    that the Hebrew itself does not explain.
  doctrine_reference: Preserve theological tension rather than resolve it.
