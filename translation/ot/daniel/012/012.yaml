id: DAN.12.12
reference: Daniel 12:12
source:
  edition: WLC
  text: אַשְׁרֵ֥י הַֽ/מְחַכֶּ֖ה וְ/יַגִּ֑יעַ לְ/יָמִ֕ים אֶ֕לֶף שְׁלֹ֥שׁ מֵא֖וֹת שְׁלֹשִׁ֥ים
    וַ/חֲמִשָּֽׁה׃
translation:
  text: Blessed is the one who waits and reaches the 1,335 days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the one who waits and arrives at the 1,335 days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The interjection/noun expresses a state of blessedness or enviable fortune.
    'Blessed is' preserves the elevated, beatitude-like tone better than 'happy' or
    'fortunate' in this prophetic context.
- source_word: הַמְחַכֶּה
  chosen: the one who waits
  alternatives:
  - the one who keeps waiting
  - the one who expects
  lexicon: HALOT
  rationale: The participle of חכה denotes waiting with expectancy. 'The one who waits'
    gives a natural English representative singular while preserving the ongoing sense
    of the participle.
- source_word: וְיַגִּיעַ
  chosen: and reaches
  alternatives:
  - and arrives
  - and attains
  lexicon: HALOT
  rationale: The Hiphil of נגע here means to come to or reach a specified point in
    time. 'Reaches' fits the temporal object 'days' idiomatically in English.
- source_word: לְיָמִים
  chosen: the days
  alternatives:
  - to the days
  - to days
  lexicon: HALOT
  rationale: With the preceding verb, the preposition marks arrival at a specified
    number of days. In English, 'reaches the ... days' is smoother than a more wooden
    'arrives to the days' while retaining the temporal milestone sense.
- source_word: אֶלֶף שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וַחֲמִשָּׁה
  chosen: 1,335
  alternatives:
  - one thousand three hundred thirty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,335. Numerals are rendered in standard
    modern English figure style for readability.
