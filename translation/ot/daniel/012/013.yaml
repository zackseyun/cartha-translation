id: DAN.12.13
reference: Daniel 12:13
source:
  edition: WLC
  text: וְ/אַתָּ֖ה לֵ֣ךְ לַ/קֵּ֑ץ וְ/תָנ֛וּחַ וְ/תַעֲמֹ֥ד לְ/גֹרָלְ/ךָ֖ לְ/קֵ֥ץ הַ/יָּמִֽין׃
translation:
  text: But as for you, go to the end; and you will rest and stand in your allotted
    place at the end of the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the end.'
    reason: lexical_alternative
  - marker: b
    text: '''You will rest'' likely refers to Daniel''s death before the final consummation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'stand for your lot'—that is, receive your allotted portion or inheritance.
    reason: lexical_alternative
  - marker: d
    text: The phrase 'at the end of the days' is an eschatological expression; compare
      Daniel 12:2.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive shift back
    to Daniel personally after the preceding revelations. 'But as for you' brings
    out the discourse contrast more clearly than a bare 'and you' while remaining
    faithful to the Hebrew.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: HALOT
  rationale: הלך in the imperative here is a straightforward command to proceed on
    one's way. 'Go' is the most natural and sufficiently formal rendering.
- source_word: לַ/קֵּץ
  chosen: to the end
  alternatives:
  - until the end
  lexicon: HALOT
  rationale: קֵץ means 'end.' With ל it can denote movement or extension toward an
    endpoint. 'To the end' preserves the Hebrew wording; 'until the end' is possible
    interpretively, but the main text keeps the more literal phrasing.
- source_word: וְ/תָנ֛וּחַ
  chosen: and you will rest
  alternatives:
  - and rest
  - and you will repose
  lexicon: HALOT
  rationale: 'The form is best taken as an imperfect with future sense in sequence
    after the imperative: Daniel is told what will happen to him. ''Rest'' naturally
    conveys death/rest prior to final vindication without over-specifying the state.'
- source_word: וְ/תַעֲמֹד
  chosen: and stand
  alternatives:
  - and arise
  - and take your stand
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In this eschatological context it likely
    implies arising to receive one's appointed inheritance, but 'stand' preserves
    the lexical image and allows the resurrection implication to remain implicit rather
    than paraphrased.
- source_word: לְ/גֹרָלְ/ךָ
  chosen: in your allotted place
  alternatives:
  - for your lot
  - for your allotted portion
  - in your inheritance
  lexicon: HALOT
  rationale: גּוֹרָל is literally 'lot,' often by extension an allotted share or portion.
    In English, 'stand for your lot' is opaque, so 'stand in your allotted place'
    communicates the idea of receiving one's assigned portion while preserving the
    imagery of allotment.
- source_word: לְ/קֵץ הַ/יָּמִין
  chosen: at the end of the days
  alternatives:
  - at the end of days
  - at the end of these days
  lexicon: HALOT
  rationale: The phrase is literally 'at the end of the days.' Retaining the article
    reflects the Hebrew more closely. The expression is eschatological but should
    not be over-interpreted beyond what the text states.
