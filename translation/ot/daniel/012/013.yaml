theological_decisions:
- issue: Whether וְתָנוּחַ refers explicitly to death or more generally to rest
  chosen_reading: Rendered 'you will rest' without making death explicit in the main
    text.
  alternative_readings:
  - you will die and rest
  - you will rest in death
  rationale: The context strongly suggests Daniel's death before final vindication,
    but the Hebrew verb נוח itself means 'rest.' The translation preserves the text's
    own wording and lets the implication stand without interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether וְתַעֲמֹד should be rendered explicitly as resurrection
  chosen_reading: Rendered 'stand' rather than 'rise again' or 'be resurrected.'
  alternative_readings:
  - you will arise
  - you will rise again
  rationale: In Daniel 12's context, resurrection is a natural implication, especially
    after 12:2, but עמד here literally means 'stand.' The main text keeps the lexical
    form while allowing readers to hear the eschatological resonance.
  doctrine_reference: Preserve theological tension rather than resolve it.
