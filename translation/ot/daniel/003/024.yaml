id: DAN.3.24
reference: Daniel 3:24
source:
  edition: WLC
  text: אֱדַ֨יִן֙ נְבוּכַדְנֶצַּ֣ר מַלְכָּ֔/א תְּוַ֖הּ וְ/קָ֣ם בְּ/הִתְבְּהָלָ֑ה עָנֵ֨ה
    וְ/אָמַ֜ר לְ/הַדָּֽבְר֗וֹ/הִי הֲ/לָא֩ גֻבְרִ֨ין תְּלָתָ֜א רְמֵ֤ינָא לְ/גוֹא נוּרָ/א֙
    מְכַפְּתִ֔ין עָנַ֤יִן וְ/אָמְרִין֙ לְ/מַלְכָּ֔/א יַצִּיבָ֖א מַלְכָּֽ/א־׃
translation:
  text: Then King Nebuchadnezzar was astonished and rose up in haste. He answered
    and said to his counselors, “Did we not throw three men, bound, into the midst
    of the fire?” They answered and said to the king, “Certainly, O king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his officials' or 'to his ministers' for the Aramaic term referring
      to those serving in the king's court.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'into the fire'; the Aramaic more fully says 'into the midst of
      the fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: תְּוַהּ
  chosen: was astonished
  alternatives:
  - was alarmed
  - was appalled
  lexicon: HALOT
  rationale: The verb conveys being startled or alarmed. In context Nebuchadnezzar
    reacts in shock to what he sees in the furnace; 'was astonished' fits the immediate
    narrative surprise and common English idiom.
- source_word: בְּהִתְבְּהָלָה
  chosen: in haste
  alternatives:
  - in alarm
  - hurriedly
  lexicon: HALOT
  rationale: The noun denotes haste with an element of agitation. 'In haste' is concise
    and idiomatic, while the prior verb already carries the emotional shock.
- source_word: עָנֵה וְאָמַר
  chosen: He answered and said
  alternatives:
  - He said
  - He responded and said
  lexicon: HALOT
  rationale: This is a standard Semitic speech formula. Retaining both verbs keeps
    the source texture without becoming unnatural in English.
- source_word: לְהַדָּבְרוֹהִי
  chosen: to his counselors
  alternatives:
  - to his officials
  - to his ministers
  lexicon: HALOT
  rationale: The noun refers to those associated with the king in an advisory or administrative
    capacity. 'Counselors' best fits the immediate scene of the king addressing attendants
    who can confirm his command.
- source_word: הֲלָא
  chosen: Did we not
  alternatives:
  - Was it not
  - Did not we
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting confirmation. 'Did we not'
    is the most natural English equivalent.
- source_word: גֻבְרִין תְּלָתָא
  chosen: three men
  alternatives:
  - three males
  lexicon: HALOT
  rationale: Straightforward rendering of the numeral plus noun for men. 'Men' is
    gender-accurate and contextually appropriate.
- source_word: רְמֵינָא
  chosen: throw
  alternatives:
  - cast
  - hurl
  lexicon: HALOT
  rationale: The verb means to throw or cast. 'Throw' is readable modern English;
    'cast' is possible but more traditional/archaic in tone here.
- source_word: לְגוֹא נוּרָא
  chosen: into the midst of the fire
  alternatives:
  - into the fire
  - into the interior of the fire
  lexicon: HALOT
  rationale: לְגוֹא means 'into the midst/interior of.' Including 'midst' preserves
    the fuller spatial force of the Aramaic.
- source_word: מְכַפְּתִין
  chosen: bound
  alternatives:
  - tied up
  - fettered
  lexicon: HALOT
  rationale: Participle describing their state when thrown in. 'Bound' is concise,
    accurate, and fits the narrative register.
- source_word: עָנַיִן וְאָמְרִין
  chosen: They answered and said
  alternatives:
  - They said
  - They replied and said
  lexicon: HALOT
  rationale: Again a standard speech formula; retained for consistency with the source
    style.
- source_word: יַצִּיבָא
  chosen: Certainly
  alternatives:
  - 'True'
  - Surely
  lexicon: HALOT
  rationale: Affirmation meaning 'true' or 'certain.' 'Certainly' gives a natural
    English response to the king's rhetorical question.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative use in direct address. 'O king' preserves the courtly address
    and the deference of the speakers.
