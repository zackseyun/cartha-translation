id: DAN.3.8
reference: Daniel 3:8
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֤ל דְּנָה֙ בֵּ/הּ זִמְנָ֔/א קְרִ֖בוּ גֻּבְרִ֣ין כַּשְׂדָּאִ֑ין וַ/אֲכַ֥לוּ
    קַרְצֵי/ה֖וֹן דִּ֥י יְהוּדָיֵֽ/א־־׃
translation:
  text: For this reason, at that time certain Chaldean men came forward and maliciously
    accused the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Judeans." The Aramaic term can denote the people of Judah in ethnic-geographic
      terms as well as "the Jews."
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: HALOT
  rationale: Aramaic idiom meaning 'for this reason/therefore.' 'For this reason'
    preserves the causal connection clearly in natural English.
- source_word: בֵּהּ זִמְנָא
  chosen: at that time
  alternatives:
  - at that moment
  - then
  lexicon: HALOT
  rationale: Temporal phrase marking the occasion. 'At that time' is idiomatic and
    suitably formal without being stiff.
- source_word: קְרִבוּ
  chosen: came forward
  alternatives:
  - approached
  - came near
  lexicon: HALOT
  rationale: The verb means to come near/approach. 'Came forward' fits the court setting
    and leads naturally into the accusation.
- source_word: גֻּבְרִין כַּשְׂדָּאִין
  chosen: certain Chaldean men
  alternatives:
  - some Chaldeans
  - certain Chaldean officials
  lexicon: HALOT
  rationale: Literally 'Chaldean men.' 'Certain' reflects the indefinite sense in
    context; 'men' preserves the explicit masculine noun without overinterpreting
    them as officials, though they likely function as court figures.
- source_word: וַאֲכַלוּ קַרְצֵיהוֹן
  chosen: maliciously accused
  alternatives:
  - slandered
  - brought charges against
  - ate their pieces
  lexicon: HALOT
  rationale: This Aramaic idiom literally involves 'eating the pieces' of someone
    and means to denounce or accuse maliciously. 'Maliciously accused' captures both
    the forensic and hostile sense better than a wooden literalism.
- source_word: דִּי יְהוּדָיֵא
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: The term can denote Judeans/Jews. In the exilic court context, it refers
    to the Jewish people represented here by Daniel's companions. 'The Jews' is the
    conventional and contextually clear rendering; 'Judeans' is a viable ethnic-geographic
    alternative preserved in a footnote.
