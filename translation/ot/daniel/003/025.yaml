theological_decisions:
- issue: Identity of the fourth figure in Nebuchadnezzar's description
  chosen_reading: 'Render the king''s words phenomenologically and from his own perspective:
    ''like a son of the gods.'''
  alternative_readings:
  - like the Son of God
  - an angelic/divine being
  rationale: The verse reports Nebuchadnezzar's observation before his later reference
    to God's angel in v. 28. The Aramaic wording does not require an explicit messianic
    identification, and the translation should not import a later Christian conclusion
    into the pagan king's speech. At the same time, historic Christian interpretation
    that sees a christological foreshadowing is worth preserving in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6; Affirmations (Nicene/Chalcedonian
    orthodoxy without importing claims the text itself does not make)
