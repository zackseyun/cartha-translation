id: DAN.3.25
reference: Daniel 3:25
source:
  edition: WLC
  text: עָנֵ֣ה וְ/אָמַ֗ר הָֽא אֲנָ֨ה חָזֵ֜ה גֻּבְרִ֣ין אַרְבְּעָ֗ה שְׁרַ֨יִן֙ מַהְלְכִ֣ין
    בְּ/גֽוֹא נוּרָ֔/א וַ/חֲבָ֖ל לָא אִיתַ֣י בְּ/ה֑וֹן וְ/רֵוֵ/הּ֙ דִּ֣י רביעי/א דָּמֵ֖ה
    לְ/בַר אֱלָהִֽין־־־־׃ס
translation:
  text: He answered and said, “Look! I see four men unbound, walking in the midst
    of the fire, and there is no harm on them; and the appearance of the fourth is
    like a son of the gods.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following traditional Christian interpretation, 'like the Son of God.'
      The Aramaic more literally reads 'like a son of the gods,' reflecting Nebuchadnezzar's
      own perspective.
    reason: alternative_reading
lexical_decisions:
- source_word: הָא
  chosen: Look!
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Aramaic deictic/interjection introducing an emphatic observation. 'Look!'
    is natural modern English and preserves the suddenness better than archaic 'Behold.'
- source_word: חָזֵה
  chosen: I see
  alternatives:
  - I am seeing
  - I behold
  lexicon: HALOT
  rationale: Simple present best fits the king's immediate report of what is before
    him.
- source_word: גֻּבְרִין
  chosen: men
  alternatives:
  - persons
  - mighty men
  lexicon: HALOT
  rationale: The Aramaic term denotes men/males here, not a gender-neutral group.
    'Men' is gender-accurate and straightforward.
- source_word: שְׁרַיִן
  chosen: unbound
  alternatives:
  - loosed
  - free
  lexicon: HALOT
  rationale: The term contrasts with the men having been bound before being thrown
    into the furnace. 'Unbound' is clear modern English and preserves the specific
    image of released bonds better than the broader 'free.'
- source_word: מַהְלְכִין
  chosen: walking
  alternatives:
  - moving about
  - going about
  lexicon: HALOT
  rationale: A participial form describing ongoing action. 'Walking' is the most direct
    and idiomatic rendering.
- source_word: בְּגֽוֹא נוּרָא
  chosen: in the midst of the fire
  alternatives:
  - in the middle of the fire
  - inside the fire
  lexicon: HALOT
  rationale: This preserves the vivid locative force of 'in the midst of' while remaining
    readable.
- source_word: וַחֲבָל לָא אִיתַי בְּהוֹן
  chosen: and there is no harm on them
  alternatives:
  - and no injury is in them
  - and they are unharmed
  lexicon: HALOT
  rationale: The clause states absence of injury. 'There is no harm on them' stays
    close to the Aramaic structure while remaining intelligible; a more idiomatic
    paraphrase like 'they are unharmed' was possible but slightly less transparent.
- source_word: רֵוֵהּ
  chosen: appearance
  alternatives:
  - look
  - form
  lexicon: HALOT
  rationale: The noun refers to visible appearance or aspect. 'Appearance' is standard
    and precise in this context.
- source_word: דִּי רביעיא
  chosen: of the fourth
  alternatives:
  - of the fourth one
  lexicon: HALOT
  rationale: A straightforward genitival construction referring to the fourth figure
    among the men.
- source_word: דָּמֵה
  chosen: is like
  alternatives:
  - resembles
  - is similar to
  lexicon: HALOT
  rationale: The verb expresses comparison, not identity. 'Is like' preserves the
    king's observational language without overinterpreting.
- source_word: לְבַר אֱלָהִין
  chosen: like a son of the gods
  alternatives:
  - like the Son of God
  - like a son of God
  - like a divine being
  lexicon: HALOT
  rationale: The Aramaic phrase is indefinite ('a son of') with plural אֱלָהִין most
    naturally read from Nebuchadnezzar's pagan perspective as 'gods,' not a confessional
    Christian identification. This preserves original-language primacy and the speaker's
    viewpoint. Because Christian tradition often understands the figure christologically,
    that alternative is preserved in a footnote rather than placed in the main text.
