id: DAN.3.28
reference: Daniel 3:28
source:
  edition: WLC
  text: עָנֵ֨ה נְבֽוּכַדְנֶצַּ֜ר וְ/אָמַ֗ר בְּרִ֤יךְ אֱלָהֲ/הוֹן֙ דִּֽי שַׁדְרַ֤ךְ
    מֵישַׁךְ֙ וַ/עֲבֵ֣ד נְג֔וֹ דִּֽי שְׁלַ֤ח מַלְאֲכֵ/הּ֙ וְ/שֵׁיזִ֣ב לְ/עַבְד֔וֹ/הִי
    דִּ֥י הִתְרְחִ֖צוּ עֲל֑וֹ/הִי וּ/מִלַּ֤ת מַלְכָּ/א֙ שַׁנִּ֔יו וִ/יהַ֣בוּ גשמי/הון
    דִּ֠י לָֽא יִפְלְח֤וּן וְ/לָֽא יִסְגְּדוּן֙ לְ/כָל אֱלָ֔הּ לָהֵ֖ן לֵ/אלָֽהֲ/הֽוֹן־־־־־׃
translation:
  text: Nebuchadnezzar answered and said, “Blessed be the God of Shadrach, Meshach,
    and Abed-nego, who sent his angel and delivered his servants, who trusted in him,
    and set aside the king’s word, and gave up their bodies so that they might not
    serve or worship any god except their own God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his messenger.” Some interpreters identify the figure more specifically,
      but the Aramaic term itself means either “angel” or “messenger.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “changed the king’s word,” meaning they refused or set aside
      the king’s command.
    reason: lexical_alternative
  - marker: c
    text: Or “bow down to.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - responded and said
  - declared
  lexicon: HALOT
  rationale: This Aramaic narrative formula is idiomatic and commonly rendered 'answered
    and said.' Even without an explicit prior question, it functions as a discourse
    marker introducing a solemn statement.
- source_word: בְּרִיךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - Praised be
  lexicon: HALOT
  rationale: A predicative passive/benedictory form. 'Blessed be' preserves the doxological
    force and natural English liturgical cadence better than the flatter 'blessed
    is.'
- source_word: אֱלָהֲהוֹן
  chosen: the God of ...
  alternatives:
  - their God
  lexicon: HALOT
  rationale: Here the suffix is specified by the following names ('of Shadrach, Meshach,
    and Abed-nego'), so 'the God of' is the clearest English rendering.
- source_word: שְׁלַח מַלְאֲכֵהּ
  chosen: sent his angel
  alternatives:
  - sent his messenger
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel,' but in this miraculous deliverance
    context and in continuity with the narrative, 'angel' is the most natural and
    traditional sense.
- source_word: וְשֵׁיזִב
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: The verb denotes rescue from danger. 'Delivered' fits both the immediate
    context of rescue from the furnace and broader biblical diction without overstating
    soteriological implications.
- source_word: לְעַבְדוהִי
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although the term can denote servants/slaves, in this court-and-worship
    context 'servants' is the most idiomatic English and does not obscure a theologically
    salient bondage nuance.
- source_word: הִתְרְחִצוּ עֲלֹוהִי
  chosen: who trusted in him
  alternatives:
  - who relied on him
  - who had confidence in him
  lexicon: HALOT
  rationale: The reflexive form conveys placing confidence in or relying upon someone.
    'Trusted in him' is concise, natural, and preserves the relational sense.
- source_word: וּמִלַּת מַלְכָּא שַׁנִּיו
  chosen: and set aside the king’s word
  alternatives:
  - and changed the king's word
  - and disregarded the king's command
  lexicon: HALOT
  rationale: Literally the phrase involves changing/altering the king's word. In context
    it means refusing compliance with the royal decree. 'Set aside the king’s word'
    preserves the verbal imagery while remaining intelligible.
- source_word: וִיהַבוּ גשמי/הון
  chosen: and gave up their bodies
  alternatives:
  - and yielded their bodies
  - and surrendered their bodies
  lexicon: HALOT
  rationale: The phrase expresses handing over their bodies to danger/death rather
    than obeying idolatry. 'Gave up' is idiomatic and captures their willing self-offering
    to suffering.
- source_word: לָא יִפְלְחוּן
  chosen: serve
  alternatives:
  - minister to
  lexicon: HALOT
  rationale: The verb commonly denotes service rendered to a deity in Daniel. 'Serve'
    is the standard and clearest rendering in this worship context.
- source_word: וְלָא יִסְגְּדוּן
  chosen: worship
  alternatives:
  - bow down to
  lexicon: HALOT
  rationale: The verb can more literally mean prostrate oneself/bow down, but paired
    with 'serve' in an idolatry context, 'worship' communicates the religious act
    clearly in modern English.
- source_word: לָהֵן
  chosen: except
  alternatives:
  - unless
  - but
  lexicon: HALOT
  rationale: 'The particle marks exception: they would not worship any god except
    their own God.'
- source_word: לֵאלָהֲהוֹן
  chosen: their own God
  alternatives:
  - their God
  lexicon: HALOT
  rationale: 'Adding ''own'' brings out the contrastive force in English: no god except
    the God belonging to them, i.e., the God they worship.'
