theological_decisions:
- issue: Identity of מַלְאֲכֵהּ in the deliverance account
  chosen_reading: his angel
  alternative_readings:
  - his messenger
  - a theophanic figure identified christologically by some interpreters
  rationale: The Aramaic term itself supports 'angel/messenger.' This verse reports
    Nebuchadnezzar's speech and does not require importing a later christological
    identification. To preserve theological restraint, the main text uses 'angel'
    and leaves stronger identifications out of the translation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
