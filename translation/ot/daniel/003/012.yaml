theological_decisions:
- issue: Distinguishing two different verbs for religious action
  chosen_reading: Render פָלְחִין as 'serve' and סָגְדִין as 'worship'
  alternative_readings:
  - Render both as 'worship'
  rationale: 'The verse intentionally uses two distinct Aramaic verbs: one for cultic
    service to the gods and another for bowing/worshiping the image. Preserving the
    distinction reflects the source text more accurately and avoids flattening the
    accusation.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
