id: DAN.3.12
reference: Daniel 3:12
source:
  edition: WLC
  text: אִיתַ֞י גֻּבְרִ֣ין יְהוּדָאיִ֗ן דִּֽי מַנִּ֤יתָ יָתְ/הוֹן֙ עַל עֲבִידַת֙ מְדִינַ֣ת
    בָּבֶ֔ל שַׁדְרַ֥ךְ מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ גֻּבְרַיָּ֣/א אִלֵּ֗ךְ לָא שָׂ֨מֽוּ
    עלי/ך מַלְכָּ/א֙ טְעֵ֔ם ל/אלהי/ך לָ֣א פָלְחִ֔ין וּ/לְ/צֶ֧לֶם דַּהֲבָ֛/א דִּ֥י
    הֲקֵ֖ימְתָּ לָ֥א סָגְדִֽין־־־׃ס
translation:
  text: 'There are certain Jewish men whom you have appointed over the administration
    of the province of Babylon—Shadrach, Meshach, and Abed-nego. These men have paid
    no attention to you, O king: they do not serve your gods, and they do not worship
    the golden image that you have set up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have shown no regard for you' or 'have not heeded you.' The Aramaic
      idiom literally says they have not 'set' regard/attention toward the king.
    reason: lexical_alternative
  - marker: b
    text: 'The Aramaic uses different verbs here: they do not ''serve'' the king''s
      gods, and they do not ''worship'' the golden image.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִיתַי
  chosen: There are
  alternatives:
  - There exist
  - There are certain
  lexicon: HALOT
  rationale: Aramaic existential particle introducing the accusation. In English,
    'There are' is the natural equivalent; the following 'certain' is supplied from
    context with גֻּבְרִין to reflect the accusatory force.
- source_word: גֻּבְרִין יְהוּדָאיִן
  chosen: certain Jewish men
  alternatives:
  - certain Jews
  - some Jewish men
  lexicon: HALOT
  rationale: גֻּבְרִין means 'men,' and יְהוּדָאיִן identifies them as Judeans/Jews.
    'Jewish men' preserves both ethnicity and the explicit masculine noun; 'certain'
    reflects the idiomatic force of the existential accusation.
- source_word: דִּי מַנִּיתָ יָתְהוֹן עַל עֲבִידַת מְדִינַת בָּבֶל
  chosen: whom you have appointed over the administration of the province of Babylon
  alternatives:
  - whom you set over the affairs of the province of Babylon
  - whom you appointed over the service of the province of Babylon
  lexicon: HALOT
  rationale: מַנִּיתָ is 'you appointed/set'; עַל marks authority over; עֲבִידַת can
    denote work, service, or administration. In this governmental context, 'administration'
    best conveys official duties without woodenly rendering 'service.' מְדִינַת בָּבֶל
    is 'the province of Babylon.'
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  rationale: Personal names are transliterated per project philosophy.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: These men
  alternatives:
  - those men
  - these men here
  lexicon: HALOT
  rationale: Demonstrative phrase resumes the named individuals emphatically. 'These
    men' is idiomatic and preserves the deictic force.
- source_word: לָא שָׂמוּ עֲלַיִךְ ... טְעֵם
  chosen: have paid no attention to you
  alternatives:
  - have not regarded you
  - have not set regard upon you
  - have not heeded your command
  lexicon: HALOT
  rationale: Literally 'have not set upon you regard/decree.' טְעֵם can mean command,
    decree, or regard/discretion depending on context. Because the object is 'you,
    O king' rather than an explicit edict, the idiom is best rendered 'paid no attention
    to you' or 'shown no regard for you.' This avoids over-specifying 'command' while
    preserving the insult.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative form in direct address; 'O king' preserves the courtly address
    naturally in English.
- source_word: לֵאלָהַיִךְ לָא פָלְחִין
  chosen: they do not serve your gods
  alternatives:
  - they do not worship your gods
  lexicon: HALOT
  rationale: פְלַח in Biblical Aramaic commonly denotes cultic service rendered to
    a deity. 'Serve' preserves the lexical distinction from סְגַד ('worship/bow down')
    later in the verse.
- source_word: וּלְצֶלֶם דַּהֲבָא
  chosen: the golden image
  alternatives:
  - the image of gold
  - the gold statue
  lexicon: HALOT
  rationale: Construct phrase meaning an image/statue made of gold. 'Golden image'
    is concise and idiomatic while retaining the traditional sense.
- source_word: דִּי הֲקֵימְתָּ
  chosen: that you have set up
  alternatives:
  - that you erected
  - that you established
  lexicon: HALOT
  rationale: הֲקֵים means to raise, set up, or erect. 'Set up' is natural English
    and matches the narrative refrain in this chapter.
- source_word: לָא סָגְדִין
  chosen: they do not worship
  alternatives:
  - they do not bow down to
  - they do not pay homage to
  lexicon: HALOT
  rationale: סְגַד denotes prostration or worshipful homage. Because the object is
    the image, 'worship' communicates the cultic act clearly; the more physical nuance
    'bow down' is a viable alternative but less comprehensive in English here.
