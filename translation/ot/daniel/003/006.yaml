id: DAN.3.6
reference: Daniel 3:6
source:
  edition: WLC
  text: וּ/מַן דִּי לָ֥א יִפֵּ֖ל וְ/יִסְגֻּ֑ד בַּ/הּ שַׁעֲתָ֣/א יִתְרְמֵ֔א לְ/גֽוֹא
    אַתּ֥וּן נוּרָ֖/א יָקִֽדְתָּֽ/א־־־־׃
translation:
  text: And whoever does not fall down and worship shall immediately be thrown into
    the midst of a furnace of blazing fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aramaic: ''in that hour,'' an idiom meaning immediately or at once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַן דִּי
  chosen: And whoever
  alternatives:
  - And anyone who
  - And whoever it is that
  lexicon: HALOT
  rationale: The Aramaic indefinite relative expression introduces a general condition.
    'Whoever' is natural modern English and preserves the universal force.
- source_word: לָא יִפֵּל
  chosen: does not fall down
  alternatives:
  - does not fall
  - does not prostrate himself
  lexicon: HALOT
  rationale: The verb literally means 'fall,' but in this idolatry context it refers
    to falling down in obeisance. 'Fall down' preserves the idiom without over-paraphrasing.
- source_word: וְיִסְגֻּד
  chosen: and worship
  alternatives:
  - and bow down
  - and pay homage
  lexicon: HALOT
  rationale: The Aramaic verb denotes prostration or worshipful homage. Since the
    object in context is the image, 'worship' best conveys the religious act, while
    'fall down' already captures the bodily posture.
- source_word: בַּהּ שַׁעֲתָא
  chosen: immediately
  alternatives:
  - in that moment
  - at that time
  - that very hour
  lexicon: HALOT
  rationale: The idiom literally means 'in that hour/moment.' In context it signals
    instant enforcement of the decree. 'Immediately' communicates the temporal force
    in clear English.
- source_word: יִתְרְמֵא
  chosen: shall ... be thrown
  alternatives:
  - shall be cast
  - will be hurled
  lexicon: HALOT
  rationale: The passive sense is clear. 'Thrown' is idiomatic modern English; 'cast'
    is traditional but more archaic.
- source_word: לְגוֹא
  chosen: into the midst of
  alternatives:
  - into
  - into the inside of
  lexicon: HALOT
  rationale: The noun means 'midst' or 'interior.' 'Into the midst of' preserves the
    vividness of being thrown into the interior, not merely toward it.
- source_word: אַתּוּן
  chosen: a furnace
  alternatives:
  - an oven
  - a kiln
  lexicon: HALOT
  rationale: The term refers to a large industrial or execution furnace. 'Furnace'
    is the standard and clearest rendering in this narrative context.
- source_word: נוּרָא יָקִדְתָּא
  chosen: of blazing fire
  alternatives:
  - of burning fire
  - of a fire that is burning
  - fiery
  lexicon: HALOT
  rationale: 'The phrase intensifies the image: literally ''fire, burning.'' ''Blazing
    fire'' is natural English that preserves the emphatic description better than
    the flatter adjective ''fiery''.'
