theological_decisions:
- issue: Divine referent in Nebuchadnezzar's doxology
  chosen_reading: Render the pronouns straightforwardly as referring to the Most High
    God without adding interpretive expansion.
  alternative_readings:
  - Explicitly identify the referent as 'his [that is, God's]' in the main text
  rationale: The antecedent is clear from context, and the verse itself is a doxological
    statement about God's acts and reign. No doctrinal clarification beyond the text
    is needed.
