id: DAN.3.33
reference: Daniel 3:33
source:
  edition: WLC
  text: אָת֨וֹ/הִי֙ כְּ/מָ֣ה רַבְרְבִ֔ין וְ/תִמְה֖וֹ/הִי כְּ/מָ֣ה תַקִּיפִ֑ין מַלְכוּתֵ/הּ֙
    מַלְכ֣וּת עָלַ֔ם וְ/שָׁלְטָנֵ֖/הּ עִם דָּ֥ר וְ/דָֽר־׃
translation:
  text: How great are his signs, and how mighty are his wonders! His kingdom is an
    everlasting kingdom, and his dominion is from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his marvels.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an eternal kingdom.'
    reason: lexical_alternative
  - marker: c
    text: 'Aramaic: ''with generation and generation,'' an idiom meaning enduring
      through all generations.'
    reason: cultural_note
lexical_decisions:
- source_word: אָתוֹהִי
  chosen: his signs
  alternatives:
  - his tokens
  lexicon: HALOT
  rationale: In Biblical Aramaic this noun denotes signs or miraculous signs. 'Signs'
    is the most natural modern English rendering and pairs well with 'wonders' in
    the next colon.
- source_word: כְּמָה
  chosen: how
  alternatives:
  - how very
  - to what degree
  lexicon: HALOT
  rationale: 'Exclamatory particle introducing admiration: ''How great...'' rather
    than a wooden ''as what''.'
- source_word: רַבְרְבִין
  chosen: great
  alternatives:
  - many
  - magnificent
  lexicon: HALOT
  rationale: Though the form can carry the sense of greatness or largeness, in this
    exclamatory praise context 'great' best captures qualitative magnitude rather
    than mere number.
- source_word: תִמְהוֹהִי
  chosen: his wonders
  alternatives:
  - his marvels
  lexicon: HALOT
  rationale: Refers to wondrous acts that evoke astonishment. 'Wonders' is idiomatic
    in the biblical collocation 'signs and wonders' and preserves the elevated tone.
- source_word: תַקִּיפִין
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: HALOT
  rationale: Describes the force or potency of the wonders. 'Mighty' is concise, natural,
    and fitting for doxological praise.
- source_word: מַלְכוּתֵהּ
  chosen: his kingdom
  lexicon: HALOT
  rationale: Possessive form referring to God's reign/kingdom.
- source_word: מַלְכוּת עָלַם
  chosen: an everlasting kingdom
  alternatives:
  - an eternal kingdom
  - a kingdom forever
  lexicon: HALOT
  rationale: The construct phrase denotes enduring perpetuity. 'Everlasting kingdom'
    is standard, clear English and preserves the formal parallelism.
- source_word: שָׁלְטָנֵהּ
  chosen: his dominion
  alternatives:
  - his rule
  - his sovereignty
  lexicon: HALOT
  rationale: Refers to ruling authority or dominion. 'Dominion' best preserves the
    regal nuance and parallelism with 'kingdom'.
- source_word: עִם דָּר וְדָר
  chosen: from generation to generation
  alternatives:
  - with every generation
  - throughout every generation
  lexicon: HALOT
  rationale: Idiomatic expression for continuity across successive generations. 'From
    generation to generation' is the most natural biblical English equivalent.
