id: DAN.3.2
reference: Daniel 3:2
source:
  edition: WLC
  text: וּ/נְבוּכַדְנֶצַּ֣ר מַלְכָּ֡/א שְׁלַ֡ח לְ/מִכְנַ֣שׁ לַֽ/אֲחַשְׁדַּרְפְּנַיָּ֡/א
    סִגְנַיָּ֣/א וּֽ/פַחֲוָתָ֡/א אֲדַרְגָּזְרַיָּ/א֩ גְדָ֨בְרַיָּ֤/א דְּתָבְרַיָּ/א֙
    תִּפְתָּיֵ֔/א וְ/כֹ֖ל שִׁלְטֹנֵ֣י מְדִֽינָתָ֑/א לְ/מֵתֵא֙ לַ/חֲנֻכַּ֣ת צַלְמָ֔/א
    דִּ֥י הֲקֵ֖ים נְבוּכַדְנֶצַּ֥ר מַלְכָּֽ/א׀׃
translation:
  text: Then King Nebuchadnezzar sent to assemble the satraps, the prefects, and the
    governors, the counselors, the treasurers, the judges, the magistrates, and all
    the officials of the provinces, to come to the dedication of the image that King
    Nebuchadnezzar had set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the statue.' The Aramaic term can refer to an image in general or, in
      this context, a monumental statue.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - issued orders
  lexicon: HALOT
  rationale: The verb plainly means 'sent.' In this administrative context, English
    idiom supplies the infinitive phrase 'to assemble' as the purpose of the sending.
- source_word: לְמִכְנַשׁ
  chosen: to assemble
  alternatives:
  - to gather
  - to convene
  lexicon: HALOT
  rationale: The infinitive denotes gathering persons together. 'To assemble' fits
    the formal governmental setting better than the more general 'to gather.'
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: This is a Persian administrative loanword conventionally rendered 'satraps.'
    Retaining the historical term preserves the imperial setting more accurately than
    flattening it to a generic office.
- source_word: סִגְנַיָּא
  chosen: prefects
  alternatives:
  - deputies
  - officials
  lexicon: HALOT
  rationale: A high administrative title subordinate to the satraps. 'Prefects' is
    a standard and suitably formal English equivalent.
- source_word: פַחֲוָתָא
  chosen: governors
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: A recognized governmental office. 'Governors' is the clearest modern
    equivalent and distinguishes the term from the transliterated 'satraps.'
- source_word: אֲדַרְגָּזְרַיָּא
  chosen: counselors
  alternatives:
  - advisers
  lexicon: HALOT
  rationale: The exact office is somewhat uncertain, but it denotes a class of high
    officials. 'Counselors' is a conventional rendering that communicates advisory
    governmental function.
- source_word: גְדָבְרַיָּא
  chosen: treasurers
  alternatives:
  - financial officers
  lexicon: HALOT
  rationale: This term is commonly understood as treasury officials. 'Treasurers'
    is concise and standard.
- source_word: דְּתָבְרַיָּא
  chosen: judges
  alternatives:
  - legal officials
  lexicon: HALOT
  rationale: The term is associated with legal decision-makers. 'Judges' is the most
    direct English equivalent.
- source_word: תִּפְתָּיֵא
  chosen: magistrates
  alternatives:
  - jurists
  - officials
  lexicon: HALOT
  rationale: Though the precise nuance is debated, it refers to another class of legal/civil
    authorities. 'Magistrates' preserves the official judicial-administrative sense
    without overprecision.
- source_word: שִׁלְטֹנֵי מְדִינָתָא
  chosen: the officials of the provinces
  alternatives:
  - the rulers of the provinces
  - the authorities of the provinces
  lexicon: HALOT
  rationale: A broad summary phrase covering governing authorities in the provinces.
    'Officials' is broad enough to match the collective sense after the list of specific
    offices.
- source_word: לְמֵתֵא
  chosen: to come
  alternatives:
  - to attend
  lexicon: HALOT
  rationale: The verb means 'to come.' 'Attend' would be interpretive; 'to come' stays
    closer to the source while remaining natural in English.
- source_word: חֲנֻכַּת
  chosen: the dedication
  alternatives:
  - the inauguration
  lexicon: HALOT
  rationale: The noun denotes a dedicatory ceremony. 'Dedication' is the standard
    and most transparent rendering.
- source_word: צַלְמָא
  chosen: the image
  alternatives:
  - the statue
  lexicon: HALOT
  rationale: The Aramaic term can denote an image or statue. 'Image' preserves the
    broader lexical sense and echoes the wording used elsewhere in the chapter, while
    'statue' remains a viable contextual alternative.
- source_word: הֲקֵים
  chosen: had set up
  alternatives:
  - set up
  - erected
  lexicon: HALOT
  rationale: The verb means to raise or set up. 'Had set up' reflects the prior action
    relative to the summons and reads naturally in English narrative sequence.
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Used appositionally with Nebuchadnezzar. English idiom naturally renders
    this as the title before the name: ''King Nebuchadnezzar.'''
