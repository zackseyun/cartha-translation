theological_decisions:
- issue: Rendering of סגד in an idolatry context
  chosen_reading: pay homage
  alternative_readings:
  - worship
  - bow down
  rationale: The verb denotes prostration/obeisance and can function in religious
    worship contexts. Here the command is directed toward an image and is clearly
    idolatrous in the narrative, but the lexical value itself is best represented
    by 'pay homage,' with 'worship' preserved as an alternative because readers may
    expect that rendering.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
