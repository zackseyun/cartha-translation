id: DAN.3.5
reference: Daniel 3:5
source:
  edition: WLC
  text: בְּ/עִדָּנָ֡/א דִּֽי תִשְׁמְע֡וּן קָ֣ל קַרְנָ֣/א מַ֠שְׁרוֹקִיתָ/א קיתרוס סַבְּכָ֤א
    פְּסַנְתֵּרִין֙ סוּמְפֹּ֣נְיָ֔ה וְ/כֹ֖ל זְנֵ֣י זְמָרָ֑/א תִּפְּל֤וּן וְ/תִסְגְּדוּן֙
    לְ/צֶ֣לֶם דַּהֲבָ֔/א דִּ֥י הֲקֵ֖ים נְבוּכַדְנֶצַּ֥ר מַלְכָּֽ/א־׃
translation:
  text: At the time when you hear the sound of the horn, pipe, lyre, trigon, psaltery,
    bagpipe, and every kind of music, you are to fall down and pay homage to the golden
    image that King Nebuchadnezzar has set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship'; the Aramaic verb can denote bowing in reverence and, in this
      context, carries the sense of idolatrous homage.
    reason: alternative_reading
  - marker: b
    text: The identification of 'symphonia' (here rendered 'bagpipe') is uncertain;
      alternatives such as 'double pipe' are also proposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעִדָּנָא דִּי
  chosen: At the time when
  alternatives:
  - When
  - At the moment that
  lexicon: HALOT
  rationale: The Aramaic idiom literally means 'in the time that.' 'At the time when'
    preserves the formal temporal construction while remaining natural English.
- source_word: תִשְׁמְעוּן
  chosen: you hear
  alternatives:
  - you hear it
  - you listen to
  lexicon: HALOT
  rationale: Simple second person plural imperfect in a temporal clause. English present
    'you hear' is the most natural equivalent in this instruction context.
- source_word: קָל
  chosen: the sound
  alternatives:
  - the noise
  - the voice
  lexicon: HALOT
  rationale: Here קָל introduces the audible signal made by the instruments. 'Sound'
    is the clearest contextual rendering.
- source_word: קַרְנָא
  chosen: horn
  alternatives:
  - ram's horn
  - cornet
  lexicon: HALOT
  rationale: A wind instrument; 'horn' is the broad, transparent rendering without
    importing a more specific identification than the text warrants.
- source_word: מַשְׁרוֹקִיתָא
  chosen: pipe
  alternatives:
  - flute
  - whistle
  lexicon: HALOT
  rationale: The term denotes a reed or pipe-type wind instrument. 'Pipe' is slightly
    more neutral than 'flute' and avoids overprecision.
- source_word: קיתרוס
  chosen: lyre
  alternatives:
  - cithara
  - harp
  lexicon: HALOT
  rationale: This loanword refers to a stringed instrument akin to a lyre/kithara.
    'Lyre' gives readers a meaningful English equivalent rather than mere transliteration.
- source_word: סַבְּכָא
  chosen: trigon
  alternatives:
  - trigonon
  - triangle harp
  lexicon: HALOT
  rationale: The exact instrument is uncertain, but traditionally understood as a
    triangular stringed instrument. 'Trigon' preserves specificity without pretending
    certainty.
- source_word: פְּסַנְתֵּרִין
  chosen: psaltery
  alternatives:
  - zither
  - harp
  lexicon: HALOT
  rationale: A traditional English rendering for this stringed instrument. While somewhat
    specialized, it remains recognizable and distinguishes it from the other string
    instruments in the list.
- source_word: סוּמְפֹּנְיָה
  chosen: bagpipe
  alternatives:
  - double pipe
  - symphonia
  lexicon: HALOT
  rationale: The exact identification is debated. 'Bagpipe' is a common modern rendering
    in this context, but because certainty is limited, an alternative is preserved
    in a footnote.
- source_word: וְכֹל זְנֵי זְמָרָא
  chosen: and every kind of music
  alternatives:
  - and all kinds of music
  - and every sort of musical instrument
  lexicon: HALOT
  rationale: The phrase is broad and summarizes the musical ensemble. 'Every kind
    of music' is natural and sufficiently inclusive.
- source_word: תִּפְּלוּן
  chosen: you are to fall down
  alternatives:
  - you shall fall down
  - you must fall down
  lexicon: HALOT
  rationale: The imperative force in context is clear though expressed with the imperfect.
    'You are to' communicates royal command in contemporary English.
- source_word: וְתִסְגְּדוּן
  chosen: pay homage
  alternatives:
  - worship
  - bow down
  lexicon: HALOT
  rationale: The verb means to prostrate oneself in reverence. 'Pay homage' captures
    the act of obeisance without prematurely importing the fuller theological sense
    of worship, which in this royal-idolatrous setting is related but not lexically
    required.
- source_word: לְצֶלֶם דַּהֲבָא
  chosen: to the golden image
  alternatives:
  - before the image of gold
  - to the gold statue
  lexicon: HALOT
  rationale: '''Golden image'' is idiomatic English and preserves the object as an
    image/statue made of gold.'
- source_word: הֲקֵים
  chosen: has set up
  alternatives:
  - set up
  - erected
  lexicon: HALOT
  rationale: The perfect can be rendered naturally in English as 'has set up' because
    the completed action has present relevance to the command.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  chosen: King Nebuchadnezzar
  alternatives:
  - Nebuchadnezzar the king
  lexicon: HALOT
  rationale: English title-before-name order is the most natural rendering while preserving
    the royal designation.
