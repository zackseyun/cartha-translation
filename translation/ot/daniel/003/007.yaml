theological_decisions:
- issue: Rendering of the act toward the image
  chosen_reading: worshiped
  alternative_readings:
  - paid homage to
  - bowed down to
  rationale: Because the object is an image in a commanded cultic setting, the act
    is more than civil obeisance. 'Worshiped' preserves the religious force without
    adding interpretation beyond the context.
  doctrine_reference: Translation philosophy §1, §3
