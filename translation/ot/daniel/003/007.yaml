id: DAN.3.7
reference: Daniel 3:7
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דְּנָ֡ה בֵּ/הּ זִמְנָ֡/א כְּ/דִ֣י שָֽׁמְעִ֣ין כָּֽל עַמְמַיָּ֡/א
    קָ֣ל קַרְנָ/א֩ מַשְׁר֨וֹקִיתָ֜/א קיתרס שַׂבְּכָא֙ פְּסַנְטֵרִ֔ין וְ/כֹ֖ל זְנֵ֣י
    זְמָרָ֑/א נָֽפְלִ֨ין כָּֽל עַֽמְמַיָּ֜/א אֻמַיָּ֣/א וְ/לִשָּׁנַיָּ֗/א סָֽגְדִין֙
    לְ/צֶ֣לֶם דַּהֲבָ֔/א דִּ֥י הֲקֵ֖ים נְבוּכַדְנֶצַּ֥ר מַלְכָּֽ/א־־־־׃
translation:
  text: Therefore, at that time, when all the peoples heard the sound of the horn,
    pipe, lyre, trigon, psaltery, and every kind of music, all the peoples, nations,
    and languages fell down and worshiped the golden image that King Nebuchadnezzar
    had set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of several instrument names is uncertain. 'Trigon'
      may refer to a triangular harp, and 'psaltery' may denote a kind of zither or
      harp.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Therefore
  alternatives:
  - For this reason
  - Accordingly
  lexicon: HALOT
  rationale: Aramaic idiom introducing the consequence of the king's decree. 'Therefore'
    is concise and natural in English while preserving the inferential force.
- source_word: בֵּהּ זִמְנָא
  chosen: at that time
  alternatives:
  - in that moment
  - at that moment
  lexicon: HALOT
  rationale: Temporal expression marking the occasion when the command was carried
    out. 'At that time' is idiomatic and sufficiently formal.
- source_word: כְּדִי שָׁמְעִין
  chosen: when ... heard
  alternatives:
  - as soon as ... heard
  lexicon: HALOT
  rationale: The conjunction plus participle gives a temporal sense. 'When' preserves
    the sequence without overstating immediacy, though the context implies prompt
    response.
- source_word: כָּל עַמְמַיָּא
  chosen: all the peoples
  alternatives:
  - all the peoples groups
  - all the peoples of the empire
  lexicon: HALOT
  rationale: Plural 'peoples' reflects the ethnic-group sense better than singular
    'people' and matches the repeated triad in the verse.
- source_word: קָל
  chosen: the sound
  alternatives:
  - the voice
  - the noise
  lexicon: HALOT
  rationale: Here it refers to the audible sound produced by instruments, not a spoken
    voice.
- source_word: קַרְנָא
  chosen: horn
  alternatives:
  - ram's horn
  - cornet
  lexicon: HALOT
  rationale: Generic 'horn' is the safest rendering for the instrument name without
    importing a more specific identification.
- source_word: מַשְׁרוֹקִיתָא
  chosen: pipe
  alternatives:
  - flute
  - whistle
  lexicon: HALOT
  rationale: A wind instrument; 'pipe' is broad and avoids overprecision, while remaining
    readable.
- source_word: קיתרס
  chosen: lyre
  alternatives:
  - zither
  - cithara
  lexicon: HALOT
  rationale: This loanword denotes a stringed instrument cognate with Greek kithara;
    'lyre' is the most familiar accessible equivalent.
- source_word: שַׂבְּכָא
  chosen: trigon
  alternatives:
  - harp
  - triangular harp
  - sambuca
  lexicon: HALOT
  rationale: The exact instrument is uncertain. 'Trigon' preserves a traditional,
    instrument-specific rendering without falsely specifying a modern instrument;
    an alternative is preserved in a footnote.
- source_word: פְּסַנְטֵרִין
  chosen: psaltery
  alternatives:
  - zither
  - dulcimer
  - psanterin
  lexicon: HALOT
  rationale: Another likely loanword for a stringed instrument. 'Psaltery' is a conventional
    English equivalent; exact identification remains uncertain, so an alternative
    note is appropriate.
- source_word: וְכֹל זְנֵי זְמָרָא
  chosen: and every kind of music
  alternatives:
  - and all kinds of musical instruments
  - and every sort of music
  lexicon: HALOT
  rationale: The phrase is a broad summary after the listed instruments. 'Every kind
    of music' is natural English and includes the totality signaled by the Aramaic.
- source_word: נָפְלִין
  chosen: fell down
  alternatives:
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb literally means 'fell,' here in the idiom of bodily prostration.
    'Fell down' preserves the concrete action.
- source_word: אֻמַיָּא
  chosen: nations
  alternatives:
  - tribes
  - peoples
  lexicon: HALOT
  rationale: Within the triad 'peoples, nations, and languages,' 'nations' distinguishes
    this term from the preceding 'peoples' while preserving the stock imperial formula.
- source_word: לִשָּׁנַיָּא
  chosen: languages
  alternatives:
  - tongues
  lexicon: HALOT
  rationale: Refers to language groups. 'Languages' is clear modern English; 'tongues'
    is possible but more archaic.
- source_word: סָגְדִין
  chosen: worshiped
  alternatives:
  - paid homage to
  - bowed down to
  lexicon: HALOT
  rationale: The verb denotes reverential prostration before an image. 'Worshiped'
    best conveys the cultic act in context, while 'fell down' already renders the
    physical posture.
- source_word: צֶלֶם דַּהֲבָא
  chosen: the golden image
  alternatives:
  - the image of gold
  - the gold statue
  lexicon: HALOT
  rationale: Standard and natural rendering of the construct phrase; 'image' preserves
    the broader sense of an erected idol/statue.
- source_word: הֲקֵים
  chosen: had set up
  alternatives:
  - set up
  - erected
  lexicon: HALOT
  rationale: 'Pluperfect English fits the narrative sequence: the image had already
    been erected before the peoples responded.'
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Placed before the proper name in English as a title: ''King Nebuchadnezzar.'''
