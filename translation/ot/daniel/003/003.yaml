id: DAN.3.3
reference: Daniel 3:3
source:
  edition: WLC
  text: בֵּ/אדַ֡יִן מִֽתְכַּנְּשִׁ֡ין אֲחַשְׁדַּרְפְּנַיָּ֡/א סִגְנַיָּ֣/א וּֽ/פַחֲוָתָ֡/א
    אֲדַרְגָּזְרַיָּ֣/א גְדָבְרַיָּ/א֩ דְּתָ֨בְרַיָּ֜/א תִּפְתָּיֵ֗/א וְ/כֹל֙ שִׁלְטֹנֵ֣י
    מְדִֽינָתָ֔/א לַ/חֲנֻכַּ֣ת צַלְמָ֔/א דִּ֥י הֲקֵ֖ים נְבוּכַדְנֶצַּ֣ר מַלְכָּ֑/א
    ו/קאמין לָ/קֳבֵ֣ל צַלְמָ֔/א דִּ֥י הֲקֵ֖ים נְבוּכַדְנֶצַּֽר׃
translation:
  text: Then the satraps, the prefects, and the governors, the counselors, the treasurers,
    the judges, the magistrates, and all the officials of the provinces were assembled
    for the dedication of the image that King Nebuchadnezzar had set up, and they
    stood before the image that Nebuchadnezzar had set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'statue' for 'image' (Aramaic צַלְמָא); the term can denote a physical
      image or monumental figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: מִתְכַּנְּשִׁין
  chosen: were assembled
  alternatives:
  - gathered together
  - were gathered
  lexicon: HALOT
  rationale: Passive/reflexive participial form indicating collective gathering. 'Were
    assembled' fits the formal public setting and reads smoothly with the list of
    officials.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: Established rendering for the Persian administrative title; transliteration
    is preferable because it is a specific office rather than a generic function.
- source_word: סִגְנַיָּא
  chosen: prefects
  alternatives:
  - deputies
  - officials
  lexicon: HALOT
  rationale: A governmental office below the highest rank. 'Prefects' is a standard
    English equivalent in Daniel and preserves administrative specificity.
- source_word: פַחֲוָתָא
  chosen: governors
  alternatives:
  - provincial rulers
  lexicon: HALOT
  rationale: Common rendering for this imperial administrative title; distinct enough
    from 'satraps' while still intelligible.
- source_word: אֲדַרְגָּזְרַיָּא
  chosen: counselors
  alternatives:
  - advisers
  lexicon: HALOT
  rationale: The exact office is somewhat uncertain, but it denotes a class of high
    officials. 'Counselors' is conventional and suitably broad without overclaiming
    precision.
- source_word: גְדָבְרַיָּא
  chosen: treasurers
  alternatives:
  - financial officers
  lexicon: HALOT
  rationale: This term is commonly understood as treasury officials. 'Treasurers'
    is concise and standard.
- source_word: דְּתָבְרַיָּא
  chosen: judges
  alternatives:
  - legal officials
  lexicon: HALOT
  rationale: Likely denotes judicial officers. 'Judges' is the clearest direct rendering
    in context.
- source_word: תִּפְתָּיֵא
  chosen: magistrates
  alternatives:
  - jurists
  - officials
  lexicon: HALOT
  rationale: Another legal-administrative office. 'Magistrates' preserves the governmental/judicial
    nuance and distinguishes it from 'judges'.
- source_word: כֹל שִׁלְטֹנֵי מְדִינָתָא
  chosen: all the officials of the provinces
  alternatives:
  - all the rulers of the provinces
  - all the authorities of the provinces
  lexicon: HALOT
  rationale: Broad summary phrase covering the rest of the governing authorities.
    'Officials' is readable and appropriately inclusive of the listed offices.
- source_word: לַחֲנֻכַּת
  chosen: for the dedication of
  alternatives:
  - for the inauguration of
  lexicon: HALOT
  rationale: Refers to a formal dedicatory ceremony. 'Dedication' is the most direct
    and idiomatic rendering.
- source_word: צַלְמָא
  chosen: image
  alternatives:
  - statue
  lexicon: HALOT
  rationale: The Aramaic term can denote an image or statue. 'Image' preserves the
    lexical link across the passage and leaves open both representational and monumental
    nuance.
- source_word: הֲקֵים
  chosen: had set up
  alternatives:
  - set up
  - erected
  lexicon: HALOT
  rationale: The verb denotes causing to stand/erect. 'Had set up' reflects the prior
    action relative to the assembly and matches the repeated refrain in the narrative.
- source_word: וְקָאמִין לָקֳבֵל
  chosen: and they stood before
  alternatives:
  - and they were standing in front of
  - and they took their stand before
  lexicon: HALOT
  rationale: The phrase indicates taking position in front of the image. 'Stood before'
    is concise, natural, and preserves the ceremonial posture.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  chosen: King Nebuchadnezzar
  alternatives:
  - Nebuchadnezzar the king
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. This preserves
    the source meaning in natural English.
