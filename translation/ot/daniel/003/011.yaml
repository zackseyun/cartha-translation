id: DAN.3.11
reference: Daniel 3:11
source:
  edition: WLC
  text: וּ/מַן דִּי לָ֥א יִפֵּ֖ל וְ/יִסְגֻּ֑ד יִתְרְמֵ֕א לְ/גֽוֹא אַתּ֥וּן נוּרָ֖/א
    יָקִֽדְתָּֽ/א־־־׃
translation:
  text: And whoever does not fall down and worship shall be thrown into the midst
    of a furnace of blazing fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'shall be cast into the midst of a burning fiery furnace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַן
  chosen: And whoever
  alternatives:
  - and whoever
  - but whoever
  lexicon: HALOT
  rationale: 'Aramaic מַן functions as an indefinite relative/interrogative here,
    introducing a general condition: ''whoever.'' The prefixed conjunction is retained
    as ''And'' to reflect the decree''s continued sequence from the previous verse.'
- source_word: דִּי
  chosen: whoever
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: דִּי marks the relative clause. In English it is absorbed into the idiomatic
    'whoever' with מַן rather than translated separately.
- source_word: לָא
  chosen: does not
  alternatives:
  - will not
  - shall not
  lexicon: HALOT
  rationale: The negation governs the following imperfect verbs in a legal/decretal
    setting. 'Does not' gives natural English for the general condition without overstating
    futurity.
- source_word: יִפֵּל
  chosen: fall down
  alternatives:
  - fall
  - prostrate himself
  lexicon: HALOT
  rationale: In the context of commanded homage before an image, the verb means to
    fall down in obeisance, not merely to fall physically. 'Fall down' is the standard
    and sufficiently clear English rendering.
- source_word: וְיִסְגֻּד
  chosen: and worship
  alternatives:
  - and bow down
  - and pay homage
  lexicon: HALOT
  rationale: The Aramaic verb denotes worshipful prostration/obeisance. Because 'fall
    down' already renders the physical act, 'worship' best captures the act's religious-political
    significance without redundancy.
- source_word: יִתְרְמֵא
  chosen: shall be thrown
  alternatives:
  - will be cast
  - shall be cast
  lexicon: HALOT
  rationale: The passive/imperfect in a royal decree expresses the prescribed penalty.
    'Shall be thrown' preserves the legal force and uses contemporary English.
- source_word: לְגוֹא
  chosen: into the midst of
  alternatives:
  - into
  - into the inside of
  lexicon: HALOT
  rationale: The noun/preposition combination literally points to the interior or
    midst. 'Into the midst of' preserves the vividness of being cast into the interior,
    not merely toward it.
- source_word: אַתּוּן
  chosen: a furnace
  alternatives:
  - the furnace
  - an oven
  lexicon: HALOT
  rationale: The noun denotes a furnace/oven. Since the decree states the general
    penalty rather than introducing a previously specified furnace in this verse alone,
    the indefinite 'a furnace' reads naturally in English.
- source_word: נוּרָא יָקִדְתָּא
  chosen: of blazing fire
  alternatives:
  - of burning fire
  - of fiery burning
  - of a burning fire
  lexicon: HALOT
  rationale: The phrase intensifies the furnace as characterized by burning fire.
    'Blazing fire' is idiomatic modern English that preserves the emphatic sense without
    awkward literalism.
