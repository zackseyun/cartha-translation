id: DAN.3.20
reference: Daniel 3:20
source:
  edition: WLC
  text: וּ/לְ/גֻבְרִ֤ין גִּבָּֽרֵי חַ֨יִל֙ דִּ֣י בְ/חַיְלֵ֔/הּ אֲמַר֙ לְ/כַפָּתָ֔ה
    לְ/שַׁדְרַ֥ךְ מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ לְ/מִרְמֵ֕א לְ/אַתּ֥וּן נוּרָ֖/א יָקִֽדְתָּֽ/א־׃
translation:
  text: And he commanded certain mighty men of valor who were in his army to bind
    Shadrach, Meshach, and Abednego, to throw them into the blazing furnace of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'into the burning fiery furnace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגֻבְרִין
  chosen: And [to] men / certain men
  alternatives:
  - and to men
  - and some men
  lexicon: HALOT
  rationale: The preposition with conjunction introduces the indirect object of the
    command. In idiomatic English, the sense is best carried by 'he commanded certain
    ... men,' making explicit the object of the command without woodenly preserving
    the preposition.
- source_word: גִּבָּרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - strong men
  - warriors
  - valiant men
  lexicon: HALOT
  rationale: This stock expression denotes powerful, capable fighting men. 'Mighty
    men of valor' preserves both strength and martial quality and fits the military
    setting.
- source_word: דִּי בְחַיְלֵהּ
  chosen: who were in his army
  alternatives:
  - who were in his force
  - who were in his might
  lexicon: HALOT
  rationale: חיל here refers to military force rather than abstract strength. 'In
    his army' gives the contextual sense naturally in English.
- source_word: אֲמַר
  chosen: he commanded
  alternatives:
  - he said
  - he ordered
  lexicon: HALOT
  rationale: Although the verb can mean 'said,' the following infinitives show a directive
    speech act. 'Commanded' best reflects the force in context.
- source_word: לְכַפָּתָה
  chosen: to bind
  alternatives:
  - to tie up
  - to fetter
  lexicon: HALOT
  rationale: The verb means to bind or tie. 'Bind' is concise, formal enough for the
    narrative, and standard in this context.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abednego
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: לְמִרְמֵא
  chosen: to throw
  alternatives:
  - to cast
  lexicon: HALOT
  rationale: The verb means to throw/cast. 'Throw' is more readable modern English;
    'cast' is possible but more traditional than necessary.
- source_word: לְאַתּוּן נוּרָא יָקִדְתָּא
  chosen: into the blazing furnace of fire
  alternatives:
  - into the burning fiery furnace
  - into the furnace of blazing fire
  lexicon: HALOT
  rationale: אַתּוּן is 'furnace'; נוּרָא is 'fire'; יָקִדְתָּא denotes burning/blazing.
    'Blazing furnace of fire' preserves all three elements while avoiding the archaic-sounding
    traditional double adjective 'burning fiery.'
