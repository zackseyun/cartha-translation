theological_decisions:
- issue: Rendering the divine title אֱלָהָא עליא
  chosen_reading: the Most High God
  alternative_readings:
  - God Most High
  rationale: This is a recognized title for Israel's God and should be translated
    as a title rather than paraphrased. The wording preserves Nebuchadnezzar's acknowledgment
    of God's supremacy without importing later doctrinal elaboration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
