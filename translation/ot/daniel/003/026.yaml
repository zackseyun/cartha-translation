id: DAN.3.26
reference: Daniel 3:26
source:
  edition: WLC
  text: בֵּ/אדַ֜יִן קְרֵ֣ב נְבוּכַדְנֶצַּ֗ר לִ/תְרַע֮ אַתּ֣וּן נוּרָ֣/א יָקִֽדְתָּ/א֒
    עָנֵ֣ה וְ/אָמַ֗ר שַׁדְרַ֨ךְ מֵישַׁ֧ךְ וַ/עֲבֵד נְג֛וֹ עַבְד֛וֹ/הִי דִּֽי אֱלָהָ֥/א
    עלי/א פֻּ֣קוּ וֶ/אֱת֑וֹ בֵּ/אדַ֣יִן נָֽפְקִ֗ין שַׁדְרַ֥ךְ מֵישַׁ֛ךְ וַ/עֲבֵ֥ד
    נְג֖וֹ מִן גּ֥וֹא נוּרָֽ/א־־־׃
translation:
  text: Then Nebuchadnezzar came near to the door of the blazing fiery furnace. He
    answered and said, “Shadrach, Meshach, and Abed-nego, servants of the Most High
    God, come out and come here.” Then Shadrach, Meshach, and Abed-nego came out from
    the midst of the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the burning fiery furnace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the opening/entrance of the furnace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: קְרֵב
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb denotes physical approach. 'Came near' is slightly more formal
    and matches the scene of Nebuchadnezzar moving toward the furnace opening.
- source_word: לִתְרַע
  chosen: to the door
  alternatives:
  - to the opening
  - to the entrance
  lexicon: HALOT
  rationale: The noun refers to a gate, door, or entrance. 'Door' is a straightforward
    rendering, though the structure may have had more of an opening or entrance; that
    nuance is preserved as an alternative.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  chosen: the blazing fiery furnace
  alternatives:
  - the burning fiery furnace
  - the furnace of blazing fire
  lexicon: HALOT
  rationale: This phrase combines 'furnace' with 'fire' and a participial/adjectival
    form meaning 'burning/blazing.' 'Blazing fiery furnace' preserves the emphatic
    description without sounding wooden. 'Burning fiery furnace' is traditional and
    viable.
- source_word: עָנֵה וְאָמַר
  chosen: He answered and said
  alternatives:
  - He said
  - He responded and said
  lexicon: HALOT
  rationale: This is a common Semitic speech formula. It can be reduced idiomatically
    to 'said,' but retaining 'answered and said' preserves the source texture and
    the dramatic response to what he has seen.
- source_word: עַבְדֹוהִי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: The noun can denote servants or slaves. Here the emphasis is on their
    belonging to and service of God, not on human chattel status, so 'servants' best
    fits the reverential context while remaining faithful to the term's broad semantic
    range.
- source_word: אֱלָהָא עליא
  chosen: the Most High God
  alternatives:
  - God Most High
  - the highest God
  lexicon: HALOT
  rationale: A standard biblical title for God. 'The Most High God' is idiomatic English
    and preserves the superlative divine title.
- source_word: פֻּקוּ
  chosen: come out
  alternatives:
  - go out
  - come forth
  lexicon: HALOT
  rationale: Imperative of 'go/come out.' Because Nebuchadnezzar is calling them toward
    himself from outside the furnace, 'come out' is the most natural deictic choice
    in English.
- source_word: וֶאֱתוֹ
  chosen: come here
  alternatives:
  - come
  - approach
  lexicon: HALOT
  rationale: A second imperative following 'come out,' specifying movement toward
    the speaker. 'Come here' makes the directional force explicit in natural English.
- source_word: נָפְקִין
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: HALOT
  rationale: Narrative plural verb corresponding to the king's command. 'Came out'
    matches the prior imperative and reads naturally.
- source_word: מִן גּוֹא נוּרָא
  chosen: from the midst of the fire
  alternatives:
  - from inside the fire
  - out of the fire
  lexicon: HALOT
  rationale: גּוֹא denotes the interior or midst. 'From the midst of the fire' preserves
    the vividness that they emerged from within it, not merely from near it.
