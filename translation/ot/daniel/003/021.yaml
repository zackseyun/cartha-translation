id: DAN.3.21
reference: Daniel 3:21
source:
  edition: WLC
  text: בֵּ/אדַ֜יִן גֻּבְרַיָּ֣/א אִלֵּ֗ךְ כְּפִ֨תוּ֙ בְּ/סַרְבָּלֵי/הוֹן֙ פטישי/הון
    וְ/כַרְבְּלָתְ/ה֖וֹן וּ/לְבֻשֵׁי/ה֑וֹן וּ/רְמִ֕יו לְ/גֽוֹא אַתּ֥וּן נוּרָ֖/א יָקִֽדְתָּֽ/א־׃
translation:
  text: Then these men were bound in their trousers, their tunics, their cloaks, and
    their other garments, and they were thrown into the midst of the blazing furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their turbans' for the second clothing term; the Aramaic word is rare,
      and its exact referent is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the furnace of burning fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: Demonstrative plus plural noun refers back to the three Judean officials
    already in view. 'These men' is a straightforward rendering of the proximal demonstrative.
- source_word: כְּפִתוּ
  chosen: were bound
  alternatives:
  - were tied up
  lexicon: HALOT
  rationale: Passive verbal form indicates they were restrained before being cast
    in. 'Bound' is slightly more formal and fits the judicial-execution setting.
- source_word: סַרְבָּלֵיהוֹן
  chosen: their trousers
  alternatives:
  - their robes
  - their mantles
  - their outer garments
  lexicon: HALOT
  rationale: The term is a Persian loanword for lower-body clothing, commonly understood
    as trousers. 'Trousers' best reflects the likely referent rather than the traditional
    but less precise 'coats' or 'robes'.
- source_word: פטישי/הון
  chosen: their tunics
  alternatives:
  - their turbans
  - their undergarments
  - their shirts
  lexicon: HALOT
  rationale: This rare term is uncertain. In the clothing list it likely denotes a
    principal article of dress distinct from trousers and cloaks. 'Tunics' is a cautious,
    readable choice that avoids overconfidence; the alternative 'turbans' is preserved
    in a footnote because many translations take it as headwear.
- source_word: כַרְבְּלָתְהוֹן
  chosen: their cloaks
  alternatives:
  - their mantles
  - their robes
  lexicon: HALOT
  rationale: This term denotes an outer wrap or cloak. 'Cloaks' gives a clear modern
    equivalent and distinguishes it from the other garments in the list.
- source_word: לְבֻשֵׁיהוֹן
  chosen: their other garments
  alternatives:
  - their clothing
  - their garments
  lexicon: HALOT
  rationale: A broader term for clothing/apparel. Because the verse already lists
    specific items, 'other garments' communicates the summarizing function of the
    final term.
- source_word: וּרְמִיו
  chosen: and they were thrown
  alternatives:
  - and they cast them
  - and they hurled them
  lexicon: HALOT
  rationale: 'The form is passive in sense within the narrative context: the men are
    the ones cast into the furnace by others. English passive best matches the focus
    on the victims.'
- source_word: לְגוֹא
  chosen: into the midst of
  alternatives:
  - into
  - inside
  lexicon: HALOT
  rationale: The noun means interior/midst, not merely directional entry. 'Into the
    midst of' preserves the vividness of being cast into the interior of the furnace.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  chosen: the blazing furnace
  alternatives:
  - the furnace of burning fire
  - the burning fiery furnace
  lexicon: HALOT
  rationale: The phrase literally stacks terms for furnace, fire, and burning. 'The
    blazing furnace' is an optimal-equivalence rendering that is natural English while
    preserving the intensity of the image.
