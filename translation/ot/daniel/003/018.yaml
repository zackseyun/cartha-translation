id: DAN.3.18
reference: Daniel 3:18
source:
  edition: WLC
  text: וְ/הֵ֣ן לָ֔א יְדִ֥יעַ לֶהֱוֵא לָ֖/ךְ מַלְכָּ֑/א דִּ֤י ל/אלהי/ך לָא איתי/נא
    פָֽלְחִ֔ין וּ/לְ/צֶ֧לֶם דַּהֲבָ֛/א דִּ֥י הֲקֵ֖ימְתָּ לָ֥א נִסְגֻּֽד־־׃ס
translation:
  text: But if not, let it be known to you, O king, that we will not serve your gods,
    and we will not bow down to the golden image that you have set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''But even if not,'' with the implied sense from the previous verse:
      ''even if he does not deliver us.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵן לָא
  chosen: But if not
  alternatives:
  - But even if not
  - And if not
  lexicon: HALOT
  rationale: Aramaic idiom introducing the contrary case after the prior statement
    of confidence in God's deliverance. 'But if not' is concise and natural in English
    while preserving the conditional force. 'Even if not' is a plausible interpretive
    expansion but slightly more explicit than the source requires.
- source_word: יְדִיעַ לֶהֱוֵא לָךְ
  chosen: let it be known to you
  alternatives:
  - be it known to you
  - know this
  lexicon: HALOT
  rationale: This is a standard impersonal expression meaning that something should
    be made known. 'Let it be known to you' preserves the formal declarative tone
    addressed to the king.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative address. 'O king' reflects the direct courtly address and matches
    the solemn tone of the speech.
- source_word: דִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here the particle introduces the content of what is to be known. 'That'
    best fits the clause structure in English.
- source_word: לֶאֱלָהָיִךְ
  chosen: your gods
  alternatives:
  - to your gods
  lexicon: HALOT
  rationale: The lamed marks the object of service with the following verb. In idiomatic
    English the preposition is absorbed into the verbal phrase 'serve your gods' rather
    than rendered separately.
- source_word: אִיתַנָא פָלְחִין
  chosen: we will not serve
  alternatives:
  - we are not serving
  - we do not serve
  lexicon: HALOT
  rationale: The participial construction with the negative expresses their settled
    refusal in the present-future context. English future 'we will not serve' best
    conveys the volitional resolve before the king.
- source_word: וּלְצֶלֶם דַּהֲבָא
  chosen: and ... to the golden image
  alternatives:
  - and ... to the image of gold
  - and ... to the gold statue
  lexicon: HALOT
  rationale: צֶלֶם is 'image' and דַּהֲבָא is 'gold/golden.' 'Golden image' is natural
    English and preserves the cultic object without over-specifying 'statue,' though
    that is possible in context.
- source_word: הֲקֵימְתָּ
  chosen: you have set up
  alternatives:
  - you set up
  - you erected
  lexicon: HALOT
  rationale: The perfect refers to the king's completed action of establishing the
    image. 'You have set up' is idiomatic and keeps the completed aspect in relation
    to the present refusal.
- source_word: נִסְגֻּד
  chosen: we will not bow down
  alternatives:
  - we will not worship
  - we will not prostrate ourselves
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in homage. 'Bow down' preserves the
    physical act, while the context already makes its worshipful significance clear.
    'Worship' would interpret rather than translate the more concrete verb.
