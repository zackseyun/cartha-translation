theological_decisions:
- issue: Whether צְלֵם should be rendered with explicitly religious language
  chosen_reading: image
  alternative_readings:
  - idol
  - statue
  rationale: The verse itself describes the object's material, dimensions, and location,
    but does not yet explicitly label it as an idol. Rendering it 'image' preserves
    narrative neutrality and avoids importing a theological judgment earlier than
    the text states, while still allowing the later context to define its function.
  doctrine_reference: Translation philosophy §1, §3
