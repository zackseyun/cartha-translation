id: DAN.3.1
reference: Daniel 3:1
source:
  edition: WLC
  text: נְבוּכַדְנֶצַּ֣ר מַלְכָּ֗/א עֲבַד֙ צְלֵ֣ם דִּֽי דְהַ֔ב רוּמֵ/הּ֙ אַמִּ֣ין
    שִׁתִּ֔ין פְּתָיֵ֖/הּ אַמִּ֣ין שִׁ֑ת אֲקִימֵ/הּ֙ בְּ/בִקְעַ֣ת דּוּרָ֔א בִּ/מְדִינַ֖ת
    בָּבֶֽל־׃
translation:
  text: King Nebuchadnezzar made an image of gold, its height sixty cubits and its
    width six cubits. He set it up in the plain of Dura, in the province of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'statue of gold.' The Aramaic term can denote an image or statue; 'idol'
      is also possible in light of the later context, but the main text preserves
      the more neutral wording of the verse itself.
    reason: lexical_alternative
  - marker: b
    text: A cubit was a standard ancient unit of length, roughly the distance from
      the elbow to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: עֲבַד
  chosen: made
  alternatives:
  - made for himself
  - constructed
  lexicon: HALOT
  rationale: The Aramaic verb commonly means 'made' or 'did.' Here it introduces the
    fabrication of the image. 'Made' is idiomatic and sufficiently formal without
    over-specifying the production method.
- source_word: צְלֵם
  chosen: image
  alternatives:
  - statue
  - idol
  lexicon: HALOT
  rationale: The term denotes an image or statue. 'Image' is the broadest and most
    textually neutral rendering; 'idol' would import the object's cultic function
    before the narrative explicitly states it, while 'statue' is possible but slightly
    narrower.
- source_word: דִּי דְהַב
  chosen: of gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: The genitival construction is most naturally rendered 'of gold.' 'Golden'
    is acceptable English, but 'of gold' better preserves the material sense and leaves
    open whether the object was solid gold or gold-covered.
- source_word: רוּמֵהּ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: The noun refers to height/elevation. 'Its height' is the standard, clear
    rendering for dimensions.
- source_word: אַמִּין שִׁתִּין
  chosen: sixty cubits
  alternatives:
  - sixty cubits high
  lexicon: HALOT
  rationale: אַמִּין is the unit 'cubits' and שִׁתִּין is 'sixty.' The dimensional
    phrase is rendered directly; the height relation is already conveyed by 'its height.'
- source_word: פְּתָיֵהּ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: The noun denotes breadth/width. 'Width' is more natural in contemporary
    English than 'breadth' while preserving the dimensional sense.
- source_word: אַמִּין שִׁת
  chosen: six cubits
  alternatives:
  - six cubits wide
  lexicon: HALOT
  rationale: Direct rendering of the measurement phrase; the relation to width is
    already explicit in the preceding noun.
- source_word: אֲקִימֵהּ
  chosen: He set it up
  alternatives:
  - he erected it
  - he established it
  lexicon: HALOT
  rationale: The verb means to raise or set up. 'Set it up' is natural modern English
    and fits the context of installing a large image. 'Erected it' is possible but
    slightly stiffer.
- source_word: בְּבִקְעַת
  chosen: in the plain
  alternatives:
  - in the valley
  lexicon: HALOT
  rationale: The noun usually denotes a broad plain or valley plain. 'Plain' best
    fits the likely geographic sense here and traditional understanding of a level
    area suitable for a monumental image.
- source_word: דּוּרָא
  chosen: Dura
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: בִּמְדִינַת בָּבֶל
  chosen: in the province of Babylon
  alternatives:
  - in the province of Babylonia
  lexicon: HALOT
  rationale: מְדִינָה denotes an administrative district or province. 'Province of
    Babylon' is the most straightforward rendering of the construct phrase and matches
    the imperial-administrative setting.
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Placed appositionally with the proper name, it functions as a title:
    ''King Nebuchadnezzar.'' This is more idiomatic in English than ''Nebuchadnezzar
    the king'' in this narrative opening.'
