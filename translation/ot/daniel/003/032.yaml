id: DAN.3.32
reference: Daniel 3:32
source:
  edition: WLC
  text: אָֽתַיָּ/א֙ וְ/תִמְהַיָּ֔/א דִּ֚י עֲבַ֣ד עִמִּ֔/י אֱלָהָ֖/א עלי/א שְׁפַ֥ר
    קָֽדָמַ֖/י לְ/הַחֲוָיָֽה׃
translation:
  text: It has seemed good to me to declare the signs and wonders that the Most High
    God has done for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "It seemed good to me to make known"; the Aramaic expression is a formal
      idiom of royal approval or resolve.
    reason: lexical_alternative
  - marker: b
    text: Literally "has done with me"; the sense is what God has done in relation
      to or for Nebuchadnezzar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָתַיָּא
  chosen: the signs
  alternatives:
  - signs
  lexicon: HALOT
  rationale: Aramaic plural noun meaning 'signs.' The article is not explicit in English
    syntax here, but 'the signs and wonders' is a natural rendering for the paired
    expression and reflects the definite, known acts Nebuchadnezzar is about to recount.
- source_word: וְתִמְהַיָּא
  chosen: and wonders
  alternatives:
  - and marvels
  lexicon: HALOT
  rationale: Common paired term with 'signs' for extraordinary divine acts. 'Wonders'
    is the standard, readable English equivalent and preserves the elevated tone.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the signs and wonders.
- source_word: עֲבַד
  chosen: has done
  alternatives:
  - did
  - performed
  - worked
  lexicon: HALOT
  rationale: 'Verb ''to do/make.'' English present perfect fits the proclamation context:
    Nebuchadnezzar is announcing acts with present relevance. ''Done'' is simpler
    and more idiomatic than ''performed'' here.'
- source_word: עִמִּי
  chosen: for me
  alternatives:
  - with me
  - toward me
  lexicon: HALOT
  rationale: Literally 'with me,' but in this idiom the sense is what God has done
    in relation to Nebuchadnezzar. 'For me' communicates benefactive involvement more
    naturally in English without overstating the theology.
- source_word: אֱלָהָא עִלָּיָא
  chosen: the Most High God
  alternatives:
  - God Most High
  - the high God
  lexicon: HALOT
  rationale: Standard Aramaic title for Israel's God in Daniel. 'The Most High God'
    is idiomatic English and preserves the superlative divine title.
- source_word: שְׁפַר
  chosen: It has seemed good to me
  alternatives:
  - It seemed good to me
  - I was pleased
  lexicon: HALOT
  rationale: Idiomatic expression of approval or fittingness. 'It has seemed good
    to me' preserves the formal royal-proclamation tone while remaining readable.
    Present perfect suits the decree-like setting.
- source_word: קֳדָמַי
  chosen: to me
  alternatives:
  - before me
  - in my sight
  lexicon: HALOT
  rationale: Literally 'before me,' but in this idiom with שְׁפַר it means 'seemed
    good to me.' The literal spatial sense is subordinated to the idiomatic English
    expression.
- source_word: לְהַחֲוָיָה
  chosen: to declare
  alternatives:
  - to make known
  - to show
  lexicon: HALOT
  rationale: Infinitive meaning 'to make known, declare.' 'Declare' fits the royal
    edict context and the public nature of the statement.
