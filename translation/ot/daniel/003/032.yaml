theological_decisions:
- issue: Rendering the divine title אֱלָהָא עִלָּיָא
  chosen_reading: the Most High God
  alternative_readings:
  - God Most High
  rationale: This preserves the text's explicit exalted title for God without importing
    later doctrinal formulations. It is a straightforward title translation consistent
    with the source and with the translation philosophy of translating titles for
    meaning.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate
    names)'
