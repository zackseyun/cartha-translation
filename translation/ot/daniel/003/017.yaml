id: DAN.3.17
reference: Daniel 3:17
source:
  edition: WLC
  text: הֵ֣ן אִיתַ֗י אֱלָהַ֨/נָא֙ דִּֽי אֲנַ֣חְנָא פָֽלְחִ֔ין יָכִ֖ל לְ/שֵׁיזָבוּתַ֑/נָא
    מִן אַתּ֨וּן נוּרָ֧/א יָקִֽדְתָּ֛/א וּ/מִן יְדָ֥/ךְ מַלְכָּ֖/א יְשֵׁיזִֽב־־־׃
translation:
  text: If it is so, our God whom we serve is able to deliver us from the furnace
    of blazing fire, and he will deliver us from your hand, O king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'If there is [such a case].' The Aramaic opening is
      idiomatic and refers back to the king's threatened punishment.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the burning fiery furnace.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'he may deliver us' or 'may he deliver us.' The Aramaic form can be understood
      differently, though the main text takes it as a confident future assertion.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  chosen: If
  alternatives:
  - Behold
  - Indeed
  - If it is so
  lexicon: HALOT
  rationale: Introduces the conditional/apodosis setup in the youths' reply. In context,
    English needs a conditional opening rather than a bare interjection; this is completed
    idiomatically as 'If it is so' with the following אִיתַי.
- source_word: אִיתַי
  chosen: it is so
  alternatives:
  - there is
  - it be
  lexicon: HALOT
  rationale: Aramaic existential/copular form. With הֵן it yields an idiomatic conditional
    sense, 'If it is so,' referring back to the king's threat/challenge.
- source_word: אֱלָהַנָא
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase; retained formally.
- source_word: דִּי אֲנַחְנָא פָלְחִין
  chosen: whom we serve
  alternatives:
  - that we serve
  - whom we worship
  lexicon: HALOT
  rationale: פְּלַח in Biblical Aramaic can denote service rendered in worshipful
    devotion. 'Serve' preserves the lexical form and leaves the religious dimension
    intact in context without over-paraphrase.
- source_word: יָכִל
  chosen: is able
  alternatives:
  - can
  lexicon: HALOT
  rationale: '''Is able'' is slightly more formal and matches the emphasis on divine
    capability.'
- source_word: לְשֵׁיזָבוּתַנָא
  chosen: to deliver us
  alternatives:
  - to rescue us
  - to save us
  lexicon: HALOT
  rationale: The verb denotes rescue/deliverance from danger. 'Deliver' fits both
    the immediate physical rescue and the elevated register of the confession.
- source_word: מִן אַתּוּן נוּרָא יָקִדְתָּא
  chosen: from the furnace of blazing fire
  alternatives:
  - from the burning fiery furnace
  - from the furnace of burning fire
  lexicon: HALOT
  rationale: אַתּוּן is 'furnace'; נוּרָא is 'fire'; יָקִדְתָּא denotes burning/blazing.
    This rendering is natural modern English while preserving all three elements.
    Traditional 'burning fiery furnace' is possible but reflects English tradition
    more than current idiom.
- source_word: וּמִן יְדָךְ
  chosen: from your hand
  alternatives:
  - out of your hand
  lexicon: HALOT
  rationale: A common idiom for deliverance from someone's power/control. 'From your
    hand' preserves the metaphor directly.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative force is explicit in context; English marks direct address with
    'O king' or apposition. 'O king' preserves the formal address.
- source_word: יְשֵׁיזִב
  chosen: he will deliver
  alternatives:
  - he will rescue
  - may he deliver
  lexicon: HALOT
  rationale: 'Imperfect here is best taken as confident assertion rather than mere
    possibility or wish. The parallel with ''is able'' supports a declaration of trust:
    God both can and will deliver.'
