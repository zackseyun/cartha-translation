theological_decisions:
- issue: Force of the final imperfect יְשֵׁיזִב
  chosen_reading: 'confident future assertion: ''he will deliver us'''
  alternative_readings:
  - 'jussive/optative nuance: ''may he deliver us'''
  - 'more cautious modal: ''let him deliver us'''
  rationale: 'The syntax and discourse favor a bold confession before the king: God
    is able, and he will deliver. The following verse preserves theological tension
    by acknowledging that even if he does not, they still will not worship the image;
    thus this verse need not be weakened into a mere wish.'
  doctrine_reference: Preserve theological tension rather than resolve it
