id: DAN.3.23
reference: Daniel 3:23
source:
  edition: WLC
  text: וְ/גֻבְרַיָּ֤/א אִלֵּךְ֙ תְּלָ֣תֵּ/ה֔וֹן שַׁדְרַ֥ךְ מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ
    נְפַ֛לוּ לְ/גֽוֹא אַתּוּן נוּרָ֥/א יָֽקִדְתָּ֖/א מְכַפְּתִֽין־־׃פ
translation:
  text: And these three men—Shadrach, Meshach, and Abed-nego—fell bound into the midst
    of the blazing furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'were thrown into the midst of the blazing furnace.'
      The Aramaic verb itself is simply 'fell,' though the surrounding context explains
      that they had been cast in.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'the burning fiery furnace.' The
      Aramaic expression refers to a furnace characterized by blazing fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֻבְרַיָּא
  chosen: men
  alternatives:
  - mighty men
  - persons
  lexicon: HALOT
  rationale: In Biblical Aramaic גבר commonly denotes a man/person, often with emphasis
    on male individuals. Here it refers specifically to the three named Judean men,
    so 'men' is the most natural and accurate rendering. 'Mighty men' is not warranted
    in this context.
- source_word: אִלֵּךְ
  chosen: these
  alternatives:
  - those
  lexicon: HALOT
  rationale: The demonstrative points to the immediately referenced individuals in
    the narrative. 'These' fits the deictic force in English better than 'those' here.
- source_word: תְּלָתֵּהוֹן
  chosen: three
  lexicon: HALOT
  rationale: 'Straightforward cardinal number with 3mp suffix: ''the three of them''
    / ''three.'' In English, ''these three men'' captures the sense idiomatically.'
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  rationale: Personal names are transliterated per project philosophy. Standard English
    forms are retained for readability and recognizability.
- source_word: נְפַלוּ
  chosen: fell
  alternatives:
  - were thrown down
  - dropped
  lexicon: HALOT
  rationale: The verb is the simple verb 'fell.' Although the broader context involves
    being cast in, this verse itself states the result from the men's perspective
    rather than explicitly repeating the agents' action. 'Fell' preserves the source
    text more closely than importing 'were thrown' into the main text.
- source_word: לְגוֹא
  chosen: into the midst of
  alternatives:
  - into
  - inside
  lexicon: HALOT
  rationale: The noun means 'midst, interior.' 'Into the midst of' preserves the spatial
    vividness better than the flatter 'into' alone.
- source_word: אַתּוּן
  chosen: furnace
  alternatives:
  - oven
  lexicon: HALOT
  rationale: In this narrative the term denotes the large industrial fire-chamber
    used for execution. 'Furnace' is the established and contextually appropriate
    English term; 'oven' is possible but less precise in modern English.
- source_word: נוּרָא יָקִדְתָּא
  chosen: the blazing furnace
  alternatives:
  - the furnace of blazing fire
  - the burning fiery furnace
  lexicon: HALOT
  rationale: The phrase literally combines 'fire' with a participial/adjectival form
    meaning 'burning/blazing.' 'Blazing furnace' communicates the sense in natural
    modern English without the archaic redundancy of 'burning fiery furnace.' The
    fire element is still represented by 'blazing.'
- source_word: מְכַפְּתִין
  chosen: bound
  alternatives:
  - tied up
  - bound hand and foot
  lexicon: HALOT
  rationale: Passive participle meaning 'bound.' 'Bound' is concise and accurate.
    'Bound hand and foot' may reflect the manner but adds specificity not explicit
    in this word alone.
