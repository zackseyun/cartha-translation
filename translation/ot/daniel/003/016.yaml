id: DAN.3.16
reference: Daniel 3:16
source:
  edition: WLC
  text: עֲנ֗וֹ שַׁדְרַ֤ךְ מֵישַׁךְ֙ וַ/עֲבֵ֣ד נְג֔וֹ וְ/אָמְרִ֖ין לְ/מַלְכָּ֑/א נְבֽוּכַדְנֶצַּ֔ר
    לָֽא חַשְׁחִ֨ין אֲנַ֧חְנָה עַל דְּנָ֛ה פִּתְגָ֖ם לַ/הֲתָבוּתָֽ/ךְ־־׃
translation:
  text: Shadrach, Meshach, and Abed-nego answered and said to the king, Nebuchadnezzar,
    “We have no need to give you an answer concerning this matter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We are not anxious to answer you in this matter,' preserving a more
      literal sense of the Aramaic idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנוֹ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Common Aramaic verb for answering/responding. 'Answered' preserves the
    formal narrative style and matches the paired speech formula with וְאָמְרִין.
- source_word: וְאָמְרִין
  chosen: and said
  alternatives:
  - and spoke
  lexicon: HALOT
  rationale: Part of the standard biblical speech formula 'answered and said.' Retaining
    both verbs reflects the source text rather than collapsing them into a single
    English verb.
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - to King
  lexicon: HALOT
  rationale: The noun carries the definite sense 'the king.' The following proper
    name appositionally identifies him as Nebuchadnezzar.
- source_word: נְבוּכַדְנֶצַּר
  chosen: Nebuchadnezzar
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: לָא חַשְׁחִין אֲנַחְנָה
  chosen: We have no need
  alternatives:
  - We are not anxious
  - We are not careful
  - We do not need
  lexicon: HALOT
  rationale: The idiom expresses lack of necessity or obligation to reply, not primarily
    emotional anxiety. 'We have no need' communicates the Aramaic sense clearly in
    modern English while avoiding the archaic KJV-like 'careful.'
- source_word: עַל דְּנָה
  chosen: concerning this
  alternatives:
  - about this
  - regarding this
  lexicon: HALOT
  rationale: Preposition plus demonstrative points to the issue at hand; 'concerning
    this' is natural and suitably formal.
- source_word: פִּתְגָם
  chosen: matter
  alternatives:
  - word
  - decree
  - answer
  lexicon: HALOT
  rationale: The noun can denote a word, statement, or matter. In this context it
    refers to the issue/charge before the king, so 'matter' best fits the sense in
    idiomatic English.
- source_word: לַהֲתָבוּתָךְ
  chosen: to give you an answer
  alternatives:
  - to return you a word
  - to reply to you
  lexicon: HALOT
  rationale: Infinitive of returning/responding with 2ms suffix. 'To give you an answer'
    is a clear English equivalent that captures the responsive force of the verb in
    context.
