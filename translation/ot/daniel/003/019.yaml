id: DAN.3.19
reference: Daniel 3:19
source:
  edition: WLC
  text: בֵּ/אדַ֨יִן נְבוּכַדְנֶצַּ֜ר הִתְמְלִ֣י חֱמָ֗א וּ/צְלֵ֤ם אַנְפּ֨וֹ/הִי֙ אשתנו
    עַל שַׁדְרַ֥ךְ מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ עָנֵ֤ה וְ/אָמַר֙ לְ/מֵזֵ֣א לְ/אַתּוּנָ֔/א
    חַ֨ד שִׁבְעָ֔ה עַ֛ל דִּ֥י חֲזֵ֖ה לְ/מֵזְיֵֽ/הּ־־׃
translation:
  text: Then Nebuchadnezzar was filled with fury, and the expression of his face was
    changed against Shadrach, Meshach, and Abed-nego. He answered and said to heat
    the furnace seven times more than it was usually heated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sevenfold.' The Aramaic expression denotes heating the furnace to seven
      times its normal intensity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: הִתְמְלִי חֱמָא
  chosen: was filled with fury
  alternatives:
  - was filled with rage
  - was full of wrath
  lexicon: HALOT
  rationale: The passive/reflexive verbal form with חֱמָא conveys becoming full of
    anger. 'Fury' captures the intensity without sounding archaic.
- source_word: וּצְלֵם אַנְפּוֹהִי אשתנו
  chosen: the expression of his face was changed
  alternatives:
  - the appearance of his face changed
  - his facial expression changed
  lexicon: HALOT
  rationale: Literally 'the image/appearance of his face was changed.' The idiom refers
    to a visible change in facial expression. The chosen rendering keeps the concrete
    imagery while reading naturally in English.
- source_word: עַל
  chosen: against
  alternatives:
  - toward
  - toward in hostility to
  lexicon: HALOT
  rationale: In context the preposition marks hostile orientation toward the three
    Judeans, so 'against' best conveys the adversarial force.
- source_word: עָנֵה וְאָמַר
  chosen: He answered and said
  alternatives:
  - He responded and said
  - He declared
  lexicon: HALOT
  rationale: This is a common Semitic narrative formula. Retaining both verbs preserves
    the source texture; although somewhat formal, it remains understandable in English.
- source_word: לְמֵזֵא לְאַתּוּנָא
  chosen: to heat the furnace
  alternatives:
  - to make the furnace hot
  - to fire up the furnace
  lexicon: HALOT
  rationale: The infinitive expresses the command to increase the furnace's heat.
    'Heat the furnace' is concise and idiomatic.
- source_word: חַד שִׁבְעָה
  chosen: seven times
  alternatives:
  - sevenfold
  lexicon: HALOT
  rationale: Aramaic idiom for a sevenfold increase. 'Seven times' is the clearest
    contemporary rendering.
- source_word: עַל דִּי חֲזֵה לְמֵזְיֵהּ
  chosen: more than it was usually heated
  alternatives:
  - than it was fit to be heated
  - than one would normally heat it
  lexicon: HALOT
  rationale: 'The clause is idiomatic: literally ''beyond what it was seen/fitting
    to heat it.'' It means beyond the customary or proper degree. ''Usually heated''
    communicates the sense clearly without over-literal awkwardness.'
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy.
