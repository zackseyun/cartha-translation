id: DAN.3.22
reference: Daniel 3:22
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דְּנָ֗ה מִן דִּ֞י מִלַּ֤ת מַלְכָּ/א֙ מַחְצְפָ֔ה וְ/אַתּוּנָ֖/א
    אֵזֵ֣ה יַתִּ֑ירָא גֻּבְרַיָּ֣/א אִלֵּ֗ךְ דִּ֤י הַסִּ֨קוּ֙ לְ/שַׁדְרַ֤ךְ מֵישַׁךְ֙
    וַ/עֲבֵ֣ד נְג֔וֹ קַטִּ֣ל הִמּ֔וֹן שְׁבִיבָ֖/א דִּ֥י נוּרָֽ/א־־׃
translation:
  text: Because of this, since the king’s command was harsh and the furnace had been
    heated exceedingly, the flame of the fire killed those men who brought up Shadrach,
    Meshach, and Abed-nego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blaze of the fire killed them'; the Aramaic שְׁבִיבָא may be rendered
      'flame,' 'blaze,' or 'fiery burst.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'brought up' literally has an upward directional sense;
      it does not itself specify 'threw in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Because of this
  alternatives:
  - Therefore
  - For this reason
  lexicon: HALOT
  rationale: Aramaic causal expression introducing the consequence of the preceding
    command. 'Because of this' preserves the explicit causal force more clearly than
    a bare 'therefore.'
- source_word: מִן דִּי
  chosen: since
  alternatives:
  - because
  - inasmuch as
  lexicon: HALOT
  rationale: Introduces the explanatory clause giving the grounds for the result.
    'Since' reads naturally in English while retaining causal sense.
- source_word: מִלַּת מַלְכָּא
  chosen: the king’s command
  alternatives:
  - the king’s word
  - the king’s order
  lexicon: HALOT
  rationale: מִלָּה in Imperial Aramaic can mean word, matter, or command. In this
    execution context, 'command' best captures the royal decree being carried out.
- source_word: מַחְצְפָה
  chosen: harsh
  alternatives:
  - urgent
  - severe
  - strict
  lexicon: HALOT
  rationale: The adjective conveys something pressing or extreme. 'Harsh' fits the
    context of an excessively severe royal order better than 'hasty' or merely 'urgent.'
- source_word: אַתּוּנָא
  chosen: the furnace
  alternatives:
  - the oven
  - the fire furnace
  lexicon: HALOT
  rationale: Standard term in this narrative for Nebuchadnezzar’s blazing furnace.
    'Furnace' is the clearest established English equivalent.
- source_word: אֵזֵה יַתִּירָא
  chosen: had been heated exceedingly
  alternatives:
  - was made extremely hot
  - was heated more than enough
  - was heated excessively
  lexicon: HALOT
  rationale: The phrase intensifies the furnace’s heat. 'Had been heated exceedingly'
    preserves the stative/resultative sense and the strong adverbial intensification.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: those men
  alternatives:
  - these men
  lexicon: HALOT
  rationale: Demonstrative plus noun refers to the executioners just mentioned. 'Those
    men' works idiomatically in English narrative reference.
- source_word: הַסִּקוּ
  chosen: brought up
  alternatives:
  - took up
  - carried up
  lexicon: HALOT
  rationale: The verb denotes causing to go up/bringing up, likely toward the opening
    or approach of the furnace. 'Brought up' is natural and preserves the directional
    nuance better than simply 'threw in,' which is not the verb used here.
- source_word: קַטִּל
  chosen: killed
  alternatives:
  - slew
  lexicon: HALOT
  rationale: Simple past narrative verb of causing death. 'Killed' is clear modern
    English without archaic coloring.
- source_word: הִמּוֹן
  chosen: those men
  alternatives:
  - them
  lexicon: HALOT
  rationale: Pronominal object referring back to the executioners. In English, the
    antecedent is made explicit by retaining 'those men' in the clause structure for
    clarity.
- source_word: שְׁבִיבָא דִּי נוּרָא
  chosen: the flame of the fire
  alternatives:
  - the blaze of the fire
  - the sparks of the fire
  lexicon: HALOT
  rationale: שְׁבִיבָא can denote flame, blaze, or fiery burst. 'Flame of the fire'
    is the most straightforward rendering here, emphasizing the lethal outburst from
    the furnace rather than individual sparks.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  rationale: Personal names are transliterated per project philosophy.
