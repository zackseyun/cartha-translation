theological_decisions:
- issue: Rendering of generic masculine אֱנָשׁ
  chosen_reading: every man
  alternative_readings:
  - everyone
  - every person
  rationale: The source uses a grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Religious force of וְיִסְגֻּד
  chosen_reading: worship
  alternative_readings:
  - pay homage
  - bow down
  rationale: In context the act is directed toward the golden image in a cultic setting,
    so 'worship' better preserves the theological weight than a merely political 'pay
    homage.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
