id: DAN.3.10
reference: Daniel 3:10
source:
  edition: WLC
  text: אנתה מַלְכָּ/א֮ שָׂ֣מְתָּ טְּעֵם֒ דִּ֣י כָל אֱנָ֡שׁ דִּֽי יִשְׁמַ֡ע קָ֣ל קַרְנָ֣/א
    מַ֠שְׁרֹקִיתָ/א קיתרס שַׂבְּכָ֤א פְסַנְתֵּרִין֙ ו/סיפניה וְ/כֹ֖ל זְנֵ֣י זְמָרָ֑/א
    יִפֵּ֥ל וְ/יִסְגֻּ֖ד לְ/צֶ֥לֶם דַּהֲבָֽ/א־־׃
translation:
  text: You, O king, have issued a decree that every man who hears the sound of the
    horn, pipe, lyre, trigon, psaltery, and bagpipe, and every kind of music, must
    fall down and worship the golden image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'double pipe' for 'bagpipe'; the exact identification of the Aramaic
      instrument name is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone' / 'every person'; the Aramaic uses a masculine singular form
      with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְתָּה
  chosen: You
  alternatives:
  - You yourself
  lexicon: HALOT
  rationale: Second masculine singular independent pronoun used for direct address;
    English 'You' captures the address without unnecessary emphasis.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative force in direct speech is best represented in natural English
    as 'O king' or 'king'; 'O king' preserves the formal court address.
- source_word: שָׂמְתָּ טְּעֵם
  chosen: have issued a decree
  alternatives:
  - have set a decree
  - have made a decree
  - have given an order
  lexicon: HALOT
  rationale: The idiom literally means 'set a decree.' 'Have issued a decree' is idiomatic
    modern English while preserving the formal legal sense.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  - for
  lexicon: HALOT
  rationale: Aramaic דִּי functions here as a subordinator introducing the content
    of the decree.
- source_word: כָל אֱנָשׁ
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: HALOT
  rationale: The singular noun means 'man/person.' In keeping with the project's gender-accurate
    policy, 'every man' preserves the masculine/generic form of the source while still
    functioning representatively.
- source_word: יִשְׁמַע קָל
  chosen: hears the sound
  alternatives:
  - hears the noise
  - hears the music
  lexicon: HALOT
  rationale: Literal sense is 'hears the sound/voice.' 'Sound' is the most straightforward
    rendering before the list of instruments.
- source_word: קַרְנָא
  chosen: horn
  alternatives:
  - ram's horn
  lexicon: HALOT
  rationale: Generic term for horn instrument; 'horn' is sufficiently precise here.
- source_word: מַשְׁרֹקִיתָא
  chosen: pipe
  alternatives:
  - flute
  - whistle
  lexicon: HALOT
  rationale: Refers to a wind instrument; 'pipe' is a cautious rendering that avoids
    overprecision where the exact instrument is uncertain.
- source_word: קיתרס
  chosen: lyre
  alternatives:
  - cithara
  - zither
  - harp
  lexicon: HALOT
  rationale: A loanword for a stringed instrument cognate with Greek kithara; 'lyre'
    is the standard accessible English rendering.
- source_word: שַׂבְּכָא
  chosen: trigon
  alternatives:
  - trigonon
  - triangle harp
  - harp
  lexicon: HALOT
  rationale: The exact instrument is uncertain; 'trigon' preserves the traditional
    identification of a triangular stringed instrument without flattening the uncertainty
    into a generic term.
- source_word: פְסַנְתֵּרִין
  chosen: psaltery
  alternatives:
  - zither
  - harp
  lexicon: HALOT
  rationale: Traditional rendering for this stringed instrument. While somewhat specialized,
    it remains a recognized English term and distinguishes it from the other instruments
    in the list.
- source_word: סִיפֹנְיָה
  chosen: bagpipe
  alternatives:
  - double pipe
  - pipe
  lexicon: HALOT
  rationale: The exact identification is debated, but 'bagpipe' is the longstanding
    conventional rendering in Daniel and remains plausible; an alternative is preserved
    in a footnote because the instrument is uncertain.
- source_word: וְכֹל זְנֵי זְמָרָא
  chosen: and every kind of music
  alternatives:
  - and all kinds of music
  - and every sort of musical instrument
  lexicon: HALOT
  rationale: זְנֵי means 'kinds/sorts' and זְמָרָא refers to music. The phrase broadens
    the list beyond the named instruments.
- source_word: יִפֵּל
  chosen: must fall down
  alternatives:
  - shall fall down
  - is to fall down
  lexicon: HALOT
  rationale: Though formally imperfect, in the decree context it carries obligatory
    force. 'Must fall down' communicates the legal requirement clearly in modern English.
- source_word: וְיִסְגֻּד
  chosen: and worship
  alternatives:
  - and pay homage
  - and bow down
  lexicon: HALOT
  rationale: The verb denotes prostration or worshipful homage. Since 'fall down'
    already renders the bodily action, 'worship' captures the act's religious significance.
- source_word: לְצֶלֶם דַּהֲבָא
  chosen: the golden image
  alternatives:
  - the image of gold
  - the gold image
  lexicon: HALOT
  rationale: 'Standard English order is adjectival: ''golden image.'' This preserves
    the referent established in the narrative.'
