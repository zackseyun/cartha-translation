id: DAN.3.31
reference: Daniel 3:31
source:
  edition: WLC
  text: נְבוּכַדְנֶצַּ֣ר מַלְכָּ֗/א לְֽ/כָל עַֽמְמַיָּ֞/א אֻמַיָּ֧/א וְ/לִשָּׁנַיָּ֛/א
    דִּֽי דארין בְּ/כָל אַרְעָ֖/א שְׁלָמְ/כ֥וֹן יִשְׂגֵּֽא־־־׃
translation:
  text: 'King Nebuchadnezzar, to all peoples, nations, and languages that dwell in
    all the earth: May your peace abound.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May your peace be multiplied.'
    reason: lexical_alternative
  - marker: b
    text: '''In all the earth'' is a conventional imperial expression and may function
      rhetorically like ''throughout the whole realm.'''
    reason: cultural_note
lexical_decisions:
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The noun is in apposition to the proper name, yielding the titulary expression
    'King Nebuchadnezzar.' English idiom prefers the title before the name without
    the article in this kind of royal heading.
- source_word: לְכָל עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  chosen: to all peoples, nations, and languages
  alternatives:
  - to all peoples, ethnic groups, and tongues
  lexicon: HALOT
  rationale: This standard imperial triad denotes the full range of subject populations.
    'Languages' is retained rather than a more interpretive 'tongues' for modern readability,
    while preserving the concrete sense of linguistic groups.
- source_word: דִּי דארין
  chosen: that dwell
  alternatives:
  - who live
  - dwelling
  lexicon: HALOT
  rationale: The relative particle plus participle describes the addressed groups
    as those inhabiting the realm. 'That dwell' preserves the formal proclamation
    style better than the more colloquial 'who live.'
- source_word: בְּכָל אַרְעָא
  chosen: in all the earth
  alternatives:
  - in all the land
  - throughout the whole earth
  lexicon: HALOT
  rationale: Aramaic אַרְעָא can mean 'land' or 'earth.' In this imperial decree formula,
    the scope is universalized rhetorically, so 'all the earth' best reflects the
    idiom, though not necessarily a modern geographic claim.
- source_word: שְׁלָמְכוֹן
  chosen: your peace
  alternatives:
  - your welfare
  - your well-being
  lexicon: HALOT
  rationale: The noun is cognate with Hebrew shalom and includes peace, welfare, and
    wholeness. 'Peace' preserves the familiar Semitic greeting formula while remaining
    natural in English.
- source_word: יִשְׂגֵּא
  chosen: abound
  alternatives:
  - increase
  - be multiplied
  lexicon: HALOT
  rationale: The verb means to grow great or increase. 'Abound' communicates the optative
    blessing idiom smoothly in English; 'be multiplied' is more literal and traditional,
    but less natural for contemporary readers.
