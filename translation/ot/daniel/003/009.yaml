id: DAN.3.9
reference: Daniel 3:9
source:
  edition: WLC
  text: עֲנוֹ֙ וְ/אָ֣מְרִ֔ין לִ/נְבוּכַדְנֶצַּ֖ר מַלְכָּ֑/א מַלְכָּ֖/א לְ/עָלְמִ֥ין
    חֱיִֽי׃
translation:
  text: They answered and said to King Nebuchadnezzar, “O king, live forever!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aramaic: ''O king, live for ages.'' The expression is a standard courtly
      acclamation meaning ''live forever.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנוֹ
  chosen: They answered
  alternatives:
  - They responded
  lexicon: HALOT
  rationale: The Aramaic verb from ענה in the Peal perfect plural commonly introduces
    a reply formula. 'They answered' preserves the conventional narrative idiom and
    pairs naturally with the following verb 'said.'
- source_word: וְאָמְרִין
  chosen: and said
  alternatives:
  - and were saying
  - and spoke
  lexicon: HALOT
  rationale: This participial form in this formulaic construction functions as a finite
    narrative verb. 'And said' is idiomatic English and preserves the Hebrew-Aramaic
    reply formula 'answered and said.'
- source_word: לִנְבוּכַדְנֶצַּר
  chosen: to King Nebuchadnezzar
  alternatives:
  - to Nebuchadnezzar the king
  lexicon: HALOT
  rationale: The preposition marks the addressee. In English, moving the royal title
    before the name ('King Nebuchadnezzar') is natural while preserving the sense.
- source_word: מַלְכָּא (first occurrence)
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: This first occurrence appositionally identifies Nebuchadnezzar's title.
    English style favors 'King Nebuchadnezzar' rather than 'Nebuchadnezzar the king.'
- source_word: מַלְכָּא (second occurrence)
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: The repeated title functions as direct address. 'O king' best captures
    the courtly vocative force in natural English.
- source_word: לְעָלְמִין
  chosen: forever
  alternatives:
  - for ages
  - for ever
  lexicon: HALOT
  rationale: The Aramaic plural expression literally means 'for ages,' but in this
    royal acclamation it idiomatically means 'forever.'
- source_word: חֱיִי
  chosen: live
  alternatives:
  - may you live
  lexicon: HALOT
  rationale: This imperative in a blessing/acclamation context is naturally rendered
    'live.' In English the full idiom 'live forever' conveys the optative sense without
    needing an explicit 'may you.'
