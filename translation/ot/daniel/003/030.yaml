id: DAN.3.30
reference: Daniel 3:30
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן מַלְכָּ֗/א הַצְלַ֛ח לְ/שַׁדְרַ֥ךְ מֵישַׁ֛ךְ וַ/עֲבֵ֥ד נְג֖וֹ בִּ/מְדִינַ֥ת
    בָּבֶֽל׃פ
translation:
  text: Then the king caused Shadrach, Meshach, and Abednego to prosper in the province
    of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'promoted Shadrach, Meshach, and Abednego in the province of Babylon.'
      The Aramaic verb can denote making someone prosper or succeed, which in this
      context may include official advancement.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the result of the preceding event;
    'Then' is natural modern English and preserves the narrative sequence.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - King Nebuchadnezzar
  lexicon: HALOT
  rationale: The noun with emphatic state means 'the king.' The specific identity
    is clear from context, but the source text does not repeat the proper name here.
- source_word: הַצְלַח
  chosen: caused ... to prosper
  alternatives:
  - prospered
  - promoted
  - made successful
  lexicon: HALOT
  rationale: The Aramaic verb means to make successful or cause to prosper. Rendering
    it causatively reflects the verbal form and the king's agency better than the
    intransitive 'prospered.' 'Promoted' is possible contextually but is narrower
    than the lexical sense and may over-specify the action.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abednego
  rationale: These are personal names and are therefore transliterated according to
    the translation philosophy.
- source_word: בִּמְדִינַת בָּבֶל
  chosen: in the province of Babylon
  alternatives:
  - in Babylon province
  - in the province of Babylonia
  lexicon: HALOT
  rationale: מְדִינָה denotes an administrative district or province. 'Province of
    Babylon' is the most idiomatic English rendering and fits the imperial setting.
