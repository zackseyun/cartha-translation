id: DAN.3.13
reference: Daniel 3:13
source:
  edition: WLC
  text: בֵּ/אדַ֤יִן נְבוּכַדְנֶצַּר֙ בִּ/רְגַ֣ז וַ/חֲמָ֔ה אֲמַר֙ לְ/הַיְתָיָ֔ה לְ/שַׁדְרַ֥ךְ
    מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ בֵּ/אדַ֨יִן֙ גֻּבְרַיָּ֣/א אִלֵּ֔ךְ הֵיתָ֖יוּ קֳדָ֥ם
    מַלְכָּֽ/א׃
translation:
  text: Then Nebuchadnezzar, in rage and fury, commanded that Shadrach, Meshach, and
    Abed-nego be brought in. Then these men were brought before the king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow without unnecessary
    stiffness.
- source_word: בִּרְגַז וַחֲמָה
  chosen: in rage and fury
  alternatives:
  - with anger and wrath
  - in anger and wrath
  lexicon: HALOT
  rationale: The paired nouns intensify Nebuchadnezzar's emotional state. 'Rage and
    fury' preserves the force and rhetorical doubling better than the flatter 'anger
    and wrath.' The preposition is represented idiomatically by 'in' to reflect his
    state.
- source_word: אֲמַר לְהַיְתָיָה
  chosen: commanded that ... be brought in
  alternatives:
  - said to bring
  - ordered to bring
  lexicon: HALOT
  rationale: The idiom of 'said' plus infinitive/causative verb functions as a command.
    'Commanded that ... be brought in' gives clear English while preserving the causative/passive
    sense of having them brought before him.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  rationale: Personal names are transliterated by standard English conventions, in
    keeping with the project's policy to transliterate names rather than translate
    them.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: The phrase refers back to the three named Judeans now under discussion.
    'These men' matches the deictic force in the immediate narrative perspective and
    is the most natural rendering in English.
- source_word: הֵיתָיוּ קֳדָם מַלְכָּא
  chosen: were brought before the king
  alternatives:
  - were brought into the presence of the king
  - came before the king
  lexicon: HALOT
  rationale: The verb is passive/causative in context, not merely intransitive arrival.
    'Before the king' is a standard and clear rendering of קֳדָם in court setting
    language.
