id: DAN.3.27
reference: Daniel 3:27
source:
  edition: WLC
  text: וּ֠/מִֽתְכַּנְּשִׁין אֲחַשְׁדַּרְפְּנַיָּ֞/א סִגְנַיָּ֣/א וּ/פַחֲוָתָ/א֮ וְ/הַדָּבְרֵ֣י
    מַלְכָּ/א֒ חָזַ֣יִן לְ/גֻבְרַיָּ֣/א אִלֵּ֡ךְ דִּי֩ לָֽא שְׁלֵ֨ט נוּרָ֜/א בְּ/גֶשְׁמְ/ה֗וֹן
    וּ/שְׂעַ֤ר רֵֽאשְׁ/הוֹן֙ לָ֣א הִתְחָרַ֔ךְ וְ/סָרְבָּלֵי/ה֖וֹן לָ֣א שְׁנ֑וֹ וְ/רֵ֣יחַ
    נ֔וּר לָ֥א עֲדָ֖ת בְּ/הֽוֹן־׃
translation:
  text: And the satraps, the prefects, the governors, and the king’s counselors gathered
    together and saw concerning these men that the fire had no power over their bodies,
    and the hair of their heads was not singed, and their cloaks were not changed,
    and no smell of fire had come upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments'; the Aramaic term for the clothing item is somewhat
      uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתְכַּנְּשִׁין
  chosen: gathered together
  alternatives:
  - assembled
  lexicon: HALOT
  rationale: Aramaic participle from כנס conveys assembling/convening. 'Gathered together'
    is idiomatic modern English and preserves the collective action.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial officials
  lexicon: HALOT
  rationale: A Persian administrative loanword conventionally rendered 'satraps.'
    Retaining the historical title is more precise than flattening it to a generic
    office.
- source_word: סִגְנַיָּא
  chosen: prefects
  alternatives:
  - deputies
  - officials
  lexicon: HALOT
  rationale: Refers to high-ranking administrators. 'Prefects' fits the governmental
    context and distinguishes the office from the other listed ranks.
- source_word: פַחֲוָתָא
  chosen: governors
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: Standard rendering for this administrative term; clear and natural in
    English.
- source_word: הַדָּבְרֵי מַלְכָּא
  chosen: the king’s counselors
  alternatives:
  - the king’s advisers
  - the king’s ministers
  lexicon: HALOT
  rationale: Literally 'the king's officials/administrators/speakers.' In this court
    setting, 'counselors' best captures royal advisers without over-specifying a technical
    office.
- source_word: חָזַיִן
  chosen: saw concerning
  alternatives:
  - observed
  - looked at
  lexicon: HALOT
  rationale: The verb means 'saw.' Because it is followed by לְ plus the men, English
    needs a smoothing expression; 'saw concerning these men that...' preserves the
    evidential force.
- source_word: לְגֻבְרַיָּא אִלֵּךְ
  chosen: concerning these men
  alternatives:
  - these men
  - with regard to these men
  lexicon: HALOT
  rationale: The preposition לְ here marks reference rather than indirect object.
    'Concerning these men' reflects the syntax more closely than simply 'these men.'
- source_word: לָא שְׁלֵט נוּרָא
  chosen: the fire had no power
  alternatives:
  - the fire had no effect
  - the fire did not prevail
  lexicon: HALOT
  rationale: שׁלט denotes exercising dominion or power. 'Had no power' preserves the
    strong sense better than the weaker 'had no effect.'
- source_word: בְּגֶשְׁמְהוֹן
  chosen: over their bodies
  alternatives:
  - on their bodies
  - over their persons
  lexicon: HALOT
  rationale: גֶּשֶׁם in Biblical Aramaic refers to the body. 'Over their bodies' fits
    the collocation with 'had no power over.'
- source_word: שְׂעַר רֵאשְׁהוֹן
  chosen: the hair of their heads
  alternatives:
  - the hair on their heads
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the emphatic detail of total
    preservation.
- source_word: הִתְחָרַךְ
  chosen: was not singed
  alternatives:
  - was not scorched
  - was not burned
  lexicon: HALOT
  rationale: The hitpael/passive nuance here points to scorching or singeing, especially
    of hair. 'Singed' is the most natural and precise English equivalent.
- source_word: סָרְבָּלֵיהוֹן
  chosen: their cloaks
  alternatives:
  - their garments
  - their trousers
  lexicon: HALOT
  rationale: The exact garment is debated, but it denotes an article of clothing.
    'Cloaks' is a traditional and plausible rendering that avoids anachronistic specificity;
    the lexical uncertainty is preserved in a footnote.
- source_word: לָא שְׁנוֹ
  chosen: were not changed
  alternatives:
  - were not altered
  - showed no change
  lexicon: HALOT
  rationale: The verb means 'changed.' In context it indicates their clothing was
    unaffected by the fire.
- source_word: רֵיחַ נוּר
  chosen: smell of fire
  alternatives:
  - odor of fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering in clear modern English.
- source_word: לָא עֲדָת בְּהוֹן
  chosen: had come upon them
  alternatives:
  - was on them
  - clung to them
  lexicon: HALOT
  rationale: The verb conveys reaching/coming to. 'Had come upon them' preserves the
    verbal sense more fully than the static 'was on them.'
