id: DAN.3.4
reference: Daniel 3:4
source:
  edition: WLC
  text: וְ/כָרוֹזָ֖/א קָרֵ֣א בְ/חָ֑יִל לְ/כ֤וֹן אָֽמְרִין֙ עַֽמְמַיָּ֔/א אֻמַּיָּ֖/א
    וְ/לִשָּׁנַיָּֽ/א׃
translation:
  text: And the herald cried aloud, “To you it is proclaimed, peoples, nations, and
    languages:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with might' / 'with a loud voice.' The Aramaic expression literally
      refers to strength, here describing the force or volume of the herald's cry.
    reason: lexical_alternative
  - marker: b
    text: Aramaic 'they are saying' functions here as an impersonal official formula;
      hence 'it is proclaimed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרוֹזָא
  chosen: the herald
  alternatives:
  - the crier
  - the announcer
  lexicon: HALOT
  rationale: Aramaic term for an official public proclaimer. 'Herald' is idiomatic
    English and preserves the formal court setting better than the less natural 'crier.'
- source_word: קָרֵא
  chosen: cried
  alternatives:
  - called out
  - proclaimed
  lexicon: HALOT
  rationale: The verb denotes calling out loudly. 'Cried' fits the public announcement
    context; the content of the cry is then given in direct speech.
- source_word: בְחָיִל
  chosen: aloud
  alternatives:
  - with might
  - with a loud voice
  - forcefully
  lexicon: HALOT
  rationale: Literally 'with strength/might,' but in this idiom it refers to volume
    or force of speech. 'Aloud' gives natural English while preserving the sense of
    a loud proclamation.
- source_word: לְכוֹן
  chosen: To you
  alternatives:
  - Unto you
  - For you
  lexicon: HALOT
  rationale: Second person plural dative, introducing the audience being addressed.
    'To you' is the most natural modern English equivalent.
- source_word: אָמְרִין
  chosen: it is proclaimed
  alternatives:
  - it is said
  - they say
  - it is spoken
  lexicon: HALOT
  rationale: Although formally 'they are saying,' the Aramaic functions as an impersonal
    announcement formula. 'It is proclaimed' captures the official declarative force
    in context better than the more wooden 'they are saying.'
- source_word: עַמְמַיָּא
  chosen: peoples
  alternatives:
  - peoples groups
  - nations
  lexicon: HALOT
  rationale: Plural of 'people,' often denoting ethnic or political groups. 'Peoples'
    preserves the distributive plural better than collapsing it into 'people.'
- source_word: אֻמַּיָּא
  chosen: nations
  alternatives:
  - tribes
  - peoples
  lexicon: HALOT
  rationale: Distinct from the previous term and commonly rendered 'nations.' Keeping
    a separate gloss preserves the triadic listing.
- source_word: לִשָּׁנַיָּא
  chosen: languages
  alternatives:
  - tongues
  lexicon: HALOT
  rationale: Literally 'tongues,' but 'languages' is clearer in modern English and
    fits the stock imperial formula in Daniel.
