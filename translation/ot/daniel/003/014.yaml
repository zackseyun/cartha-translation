id: DAN.3.14
reference: Daniel 3:14
source:
  edition: WLC
  text: עָנֵ֤ה נְבֻֽכַדְנֶצַּר֙ וְ/אָמַ֣ר לְ/ה֔וֹן הַ/צְדָּ֕א שַׁדְרַ֥ךְ מֵישַׁ֖ךְ
    וַ/עֲבֵ֣ד נְג֑וֹ לֵֽ/אלָהַ֗/י לָ֤א אִֽיתֵי/כוֹן֙ פָּֽלְחִ֔ין וּ/לְ/צֶ֧לֶם דַּהֲבָ֛/א
    דִּ֥י הֲקֵ֖ימֶת לָ֥א סָֽגְדִֽין׃
translation:
  text: Nebuchadnezzar answered and said to them, “Is it true, Shadrach, Meshach,
    and Abed-nego, that you do not serve my god and do not bow down to the golden
    image that I have set up?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aramaic הַצְדָּא may also mean ''deliberately'' or ''on purpose'': ''Is
      it deliberate, Shadrach, Meshach, and Abed-nego, that you do not serve my god
      ... ?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - responded and said
  - answered, saying
  lexicon: HALOT
  rationale: This Aramaic narrative pair is a standard idiom introducing speech. 'Answered
    and said' preserves the formal texture of the source while remaining natural enough
    in English narrative.
- source_word: לְהוֹן
  chosen: to them
  alternatives:
  - to them all
  lexicon: HALOT
  rationale: Straightforward 3mp pronominal object referring to the three Judeans
    collectively.
- source_word: הַצְדָּא
  chosen: Is it true
  alternatives:
  - in truth
  - deliberately
  - is it on purpose
  lexicon: HALOT
  rationale: The term can express truth/reality or intentionality in this context.
    Given Nebuchadnezzar's question after hearing an accusation, 'Is it true' best
    fits the immediate discourse and common Aramaic usage here. The intentional nuance
    is worth preserving in a footnote.
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: לֵאלָהַי
  chosen: my god
  alternatives:
  - my gods
  lexicon: HALOT
  rationale: The form is singular with 1cs suffix in this clause. 'My god' matches
    the morphology and immediate syntax better than a plural rendering.
- source_word: פָּלְחִין
  chosen: serve
  alternatives:
  - worship
  - render service to
  lexicon: HALOT
  rationale: The verb denotes cultic service or worshipful service. 'Serve' preserves
    the lexical distinction from the following verb for prostration and avoids collapsing
    two different actions into one English term.
- source_word: וּלְצֶלֶם דַּהֲבָא
  chosen: the golden image
  alternatives:
  - the image of gold
  - the gold statue
  lexicon: HALOT
  rationale: '''Image'' is the standard rendering of צלם in this chapter and keeps
    consistency with the narrative''s idolatry theme. ''Golden image'' is idiomatic
    modern English for the construct phrase.'
- source_word: דִּי הֲקֵימֶת
  chosen: that I have set up
  alternatives:
  - that I set up
  - that I established
  lexicon: HALOT
  rationale: The relative clause refers to Nebuchadnezzar's prior action in erecting
    the image. English present perfect naturally conveys a completed action with present
    relevance in the ongoing scene.
- source_word: סָגְדִין
  chosen: bow down
  alternatives:
  - worship
  - prostrate yourselves
  lexicon: HALOT
  rationale: The verb specifically denotes the act of prostration or bowing in homage.
    'Bow down' preserves the physical act and keeps it distinct from 'serve' earlier
    in the verse.
