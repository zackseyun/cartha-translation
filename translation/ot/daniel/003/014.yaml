theological_decisions:
- issue: Whether to render the king's accusation with two distinct verbs for idolatrous
    action or collapse them into one worship term
  chosen_reading: Retained 'serve' and 'bow down' as separate actions
  alternative_readings:
  - use 'worship' for one or both verbs
  rationale: The Aramaic uses two different verbs, one for cultic service and one
    for prostration. Preserving both reflects the source text's rhetorical force and
    avoids importing a simplified theological category not explicit in the wording.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Interpretation of הַצְדָּא
  chosen_reading: Rendered as 'Is it true' in the main text
  alternative_readings:
  - '''Is it deliberate/on purpose?'''
  rationale: The term is contextually ambiguous between factual truth and intentional
    defiance. The main text favors the most immediate discourse sense, while the alternative
    is preserved in a footnote to maintain interpretive tension rather than over-resolve
    it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
