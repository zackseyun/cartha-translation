theological_decisions:
- issue: Rendering of סגד in an idolatry context
  chosen_reading: worship
  alternative_readings:
  - bow down
  - pay homage
  rationale: Because the command concerns an image and the narrative's theological
    conflict is over idolatrous devotion, 'worship' best conveys the religious act
    intended, while 'fall down' separately preserves the bodily posture.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of אֱלָהּ in Nebuchadnezzar's taunt
  chosen_reading: god
  alternative_readings:
  - God
  rationale: The king speaks generically and defiantly, not referring to the God of
    Israel by covenant name or as a confession of true deity. Lowercase 'god' preserves
    the speaker's perspective and the syntax of the challenge.
  doctrine_reference: Affirmations; Translation philosophy §1
