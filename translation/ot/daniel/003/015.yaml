id: DAN.3.15
reference: Daniel 3:15
source:
  edition: WLC
  text: כְּעַ֞ן הֵ֧ן אִֽיתֵי/כ֣וֹן עֲתִידִ֗ין דִּ֣י בְ/עִדָּנָ֡/א דִּֽי תִשְׁמְע֡וּן
    קָ֣ל קַרְנָ֣/א מַשְׁרוֹקִיתָ֣/א קיתרס שַׂבְּכָ֡א פְּסַנְתֵּרִין֩ וְ/סוּמְפֹּ֨נְיָ֜ה
    וְ/כֹ֣ל זְנֵ֣י זְמָרָ֗/א תִּפְּל֣וּן וְ/תִסְגְּדוּן֮ לְ/צַלְמָ֣/א דִֽי עַבְדֵת֒
    וְ/הֵן֙ לָ֣א תִסְגְּד֔וּן בַּ/הּ שַׁעֲתָ֣/ה תִתְרְמ֔וֹן לְ/גֽוֹא אַתּ֥וּן נוּרָ֖/א
    יָקִֽדְתָּ֑/א וּ/מַן ה֣וּא אֱלָ֔הּ דֵּ֥י יְשֵֽׁיזְבִנְ/כ֖וֹן מִן יְדָֽ/י־׀־־־־־׃
translation:
  text: Now if you are ready, when you hear the sound of the horn, pipe, lyre, trigon,
    harp, and bagpipe, and every kind of music, to fall down and worship the image
    that I have made, well. But if you do not worship, in that very hour you will
    be thrown into the midst of a blazing furnace of fire. And what god is there who
    will deliver you out of my hands?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'triangular harp' for 'trigon'; the exact instrument denoted by שַׂבְּכָא
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Traditional renderings often have 'psaltery' for 'harp' (פְּסַנְתֵּרִין).
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'double pipe'; the identification of סוּמְפֹּנְיָה is debated.
      Older English 'symphony' reflects the form of the word, not a modern orchestra.
    reason: lexical_alternative
  - marker: d
    text: 'The Aramaic is elliptical after ''that I have made''; ''well'' is supplied
      to complete the sense: if they comply, no punishment follows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore
  - So now
  lexicon: HALOT
  rationale: Aramaic discourse adverb introducing the king's renewed challenge. 'Now'
    is natural modern English and preserves the immediate rhetorical force.
- source_word: הֵן
  chosen: if
  alternatives:
  - behold
  - indeed if
  lexicon: HALOT
  rationale: Here הֵן functions conditionally with the following clause rather than
    as a mere interjection. 'If' best fits the syntax in English.
- source_word: אִיתֵיכון עֲתִידִין
  chosen: you are ready
  alternatives:
  - you are prepared
  - you are about to be ready
  lexicon: HALOT
  rationale: The idiom combines existential language with 'ready/prepared.' 'You are
    ready' is concise and idiomatic without losing the sense of preparedness for immediate
    action.
- source_word: בְעִדָּנָא דִּי
  chosen: when
  alternatives:
  - at the time that
  - at the moment when
  lexicon: HALOT
  rationale: The phrase marks the time of the commanded response. 'When' is a faithful
    and readable rendering.
- source_word: תִשְׁמְעוּן קָל
  chosen: you hear the sound
  alternatives:
  - you hear the noise
  - you hear the voice/sound
  lexicon: HALOT
  rationale: קָל commonly means 'sound/voice.' In context of instruments, 'sound'
    is clearly intended.
- source_word: קַרְנָא
  chosen: horn
  alternatives:
  - ram's horn
  - cornet
  lexicon: HALOT
  rationale: Generic 'horn' is the safest rendering for the instrument term without
    over-specifying its exact form.
- source_word: מַשְׁרוֹקִיתָא
  chosen: pipe
  alternatives:
  - flute
  - whistle
  lexicon: HALOT
  rationale: The term denotes a wind instrument. 'Pipe' is broad and avoids false
    precision, while remaining intelligible.
- source_word: קיתרס
  chosen: lyre
  alternatives:
  - zither
  - cithara
  lexicon: HALOT
  rationale: This loanword refers to a stringed instrument commonly rendered 'lyre'
    in English Bible tradition and modern scholarship.
- source_word: שַׂבְּכָא
  chosen: trigon
  alternatives:
  - triangular harp
  - trine
  lexicon: HALOT
  rationale: The exact instrument is uncertain. 'Trigon' preserves the likely instrument
    identity without pretending certainty; an explanatory alternative is preserved
    in a footnote.
- source_word: פְּסַנְתֵּרִין
  chosen: harp
  alternatives:
  - psaltery
  - zither
  lexicon: HALOT
  rationale: A stringed instrument, traditionally 'psaltery.' 'Harp' is more accessible
    modern English, with the traditional term preserved in a footnote.
- source_word: סוּמְפֹּנְיָה
  chosen: bagpipe
  alternatives:
  - double pipe
  - symphony
  lexicon: HALOT
  rationale: The exact identification is debated, but 'bagpipe' is a common modern
    rendering for the instrument term in this context. Because of uncertainty, alternatives
    are preserved in a footnote.
- source_word: כֹל זְנֵי זְמָרָא
  chosen: every kind of music
  alternatives:
  - all kinds of musical instruments
  - every sort of music
  lexicon: HALOT
  rationale: The phrase is comprehensive and refers broadly to musical kinds/sounds.
    'Every kind of music' is natural and sufficiently broad.
- source_word: תִּפְּלוּן
  chosen: to fall down
  alternatives:
  - you fall down
  - prostrate yourselves
  lexicon: HALOT
  rationale: Following 'you are ready ... when you hear,' the infinitive-like force
    in English is best conveyed as the expected action 'to fall down.' It also preserves
    the physical act preceding worship.
- source_word: תִסְגְּדוּן
  chosen: worship
  alternatives:
  - pay homage
  - bow down
  lexicon: HALOT
  rationale: The verb denotes prostration with reverential intent. Since the object
    is an image and the issue is religious allegiance, 'worship' best captures the
    force; the more physical nuance is already represented by 'fall down.'
- source_word: צַלְמָא
  chosen: image
  alternatives:
  - statue
  - idol
  lexicon: HALOT
  rationale: '''Image'' is the most direct equivalent. ''Statue'' is possible but
    less tied to the biblical diction; ''idol'' would import a more evaluative term
    than the noun itself requires.'
- source_word: דִּי עַבְדֵת
  chosen: that I have made
  alternatives:
  - which I made
  - that I made
  lexicon: HALOT
  rationale: Perfect first person singular. 'That I have made' is idiomatic and highlights
    Nebuchadnezzar's personal agency.
- source_word: וְהֵן
  chosen: But if
  alternatives:
  - and if
  - but if indeed
  lexicon: HALOT
  rationale: Marks the contrasting conditional branch. 'But if' clearly signals the
    threat that follows.
- source_word: שַׁעֲתָה
  chosen: in that very hour
  alternatives:
  - immediately
  - at that moment
  lexicon: HALOT
  rationale: The noun means 'hour/time.' The phrase emphasizes immediacy of judgment.
    'In that very hour' preserves the formal force better than a looser adverb alone.
- source_word: תִתְרְמוֹן
  chosen: you will be thrown
  alternatives:
  - you will be cast
  - you will be hurled
  lexicon: HALOT
  rationale: Passive sense of being cast into the furnace. 'Thrown' is vivid and natural
    modern English.
- source_word: לְגוֹא
  chosen: into the midst of
  alternatives:
  - into
  - inside
  lexicon: HALOT
  rationale: The term means interior/midst. 'Into the midst of' preserves the intensity
    of being cast deep inside, not merely near it.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  chosen: a blazing furnace of fire
  alternatives:
  - the burning fiery furnace
  - a furnace of blazing fire
  lexicon: HALOT
  rationale: The Aramaic expression is emphatic. 'A blazing furnace of fire' is clear
    modern English while retaining the doubled fire imagery.
- source_word: וּמַן הוּא אֱלָהּ
  chosen: And what god is there
  alternatives:
  - And who is the god
  - And what god
  lexicon: HALOT
  rationale: The wording is a taunt, not a neutral theological inquiry. 'What god
    is there' captures the dismissive challenge naturally in English.
- source_word: יְשֵׁיזְבִנְכוֹן
  chosen: will deliver you
  alternatives:
  - will rescue you
  - will save you
  lexicon: HALOT
  rationale: The verb means rescue/deliver. 'Deliver' fits the elevated challenge
    and echoes biblical diction without sounding archaic.
- source_word: מִן יְדָי
  chosen: out of my hands
  alternatives:
  - from my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom refers to power/control. 'Out of my hands' is the natural English
    equivalent and preserves the metaphor.
- source_word: וְהֵן ... well
  chosen: well
  alternatives:
  - good
  - so be it
  lexicon: HALOT
  rationale: The apodosis is elliptical in Aramaic; many English versions supply a
    brief acknowledgment. 'Well' preserves the abruptness without adding content beyond
    the implied acceptance of compliance.
