theological_decisions:
- issue: Rendering of Nebuchadnezzar's confession about God
  chosen_reading: there is no other god who is able to deliver like this
  alternative_readings:
  - there is no other God at all
  - there is no god besides him
  rationale: The verse states God's uniqueness with respect to this demonstrated power
    to deliver; it need not be expanded into a fully developed monotheistic confession
    beyond what the king explicitly says. The translation preserves the text's claim
    without importing later doctrinal precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
