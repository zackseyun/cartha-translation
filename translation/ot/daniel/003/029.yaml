id: DAN.3.29
reference: Daniel 3:29
source:
  edition: WLC
  text: וּ/מִ/נִּי֮ שִׂ֣ים טְעֵם֒ דִּי֩ כָל עַ֨ם אֻמָּ֜ה וְ/לִשָּׁ֗ן דִּֽי יֵאמַ֤ר
    שלה עַ֣ל אֱלָהֲ/ה֗וֹן דִּֽי שַׁדְרַ֤ךְ מֵישַׁךְ֙ וַ/עֲבֵ֣ד נְג֔וֹא הַדָּמִ֣ין
    יִתְעֲבֵ֔ד וּ/בַיְתֵ֖/הּ נְוָלִ֣י יִשְׁתַּוֵּ֑ה כָּ/ל קֳבֵ֗ל דִּ֣י לָ֤א אִיתַי֙
    אֱלָ֣ה אָחֳרָ֔ן דִּֽי יִכֻּ֥ל לְ/הַצָּלָ֖ה כִּ/דְנָֽה־־־־־׃
translation:
  text: 'And from me a decree is issued: any people, nation, or language that speaks
    anything offensive against the God of Shadrach, Meshach, and Abed-nego shall be
    torn limb from limb, and his house shall be made a ruin, because there is no other
    god who is able to deliver like this.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters blasphemy against' the God of Shadrach, Meshach, and Abed-nego.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall be made into pieces' / 'shall be dismembered.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his house shall be made a dunghill,' a traditional rendering of the
      Aramaic phrase for reducing a house to a disgraceful ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  chosen: a decree is issued
  alternatives:
  - I make a decree
  - an edict is set forth
  lexicon: HALOT
  rationale: The idiom literally involves 'setting' a 'decree/decision.' English 'a
    decree is issued' preserves the royal proclamation sense in natural modern English
    without over-paraphrasing.
- source_word: עַם אֻמָּה וְלִשָּׁן
  chosen: people, nation, or language
  alternatives:
  - people, nation, and tongue
  lexicon: HALOT
  rationale: This stock imperial triad denotes all ethnolinguistic groups in the realm.
    'Language' is clearer for modern readers than 'tongue' while preserving the formal
    structure.
- source_word: יֵאמַר שלה עַל
  chosen: speaks anything offensive against
  alternatives:
  - utters blasphemy against
  - speaks wrongly against
  lexicon: HALOT
  rationale: The noun שלה here denotes an error, wrong, or offensive word spoken against
    deity. 'Blasphemy' is possible, but 'anything offensive against' avoids importing
    a later technical theological category while still conveying the gravity of the
    offense.
- source_word: אֱלָהֲהוֹן
  chosen: the God of
  alternatives:
  - their God, the God of
  lexicon: HALOT
  rationale: The suffix is plural ('their God'), referring to Shadrach, Meshach, and
    Abed-nego. In English, 'the God of Shadrach, Meshach, and Abed-nego' naturally
    conveys the same relation without awkwardness.
- source_word: הַדָּמִין יִתְעֲבֵד
  chosen: shall be torn limb from limb
  alternatives:
  - shall be dismembered
  - shall be made into pieces
  lexicon: HALOT
  rationale: This is a severe judicial formula meaning to be cut into pieces. 'Torn
    limb from limb' is idiomatic, vivid, and faithful to the punitive force.
- source_word: נְוָלִי יִשְׁתַּוֵּה
  chosen: shall be made a ruin
  alternatives:
  - shall be made a dunghill
  - shall be reduced to rubble
  lexicon: HALOT
  rationale: The phrase refers to the offender's house being turned into a ruined,
    disgraceful heap. 'Made a ruin' preserves the destruction without overcommitting
    to the debated nuance 'dunghill' in the main text.
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - forasmuch as
  - inasmuch as
  lexicon: HALOT
  rationale: This Aramaic causal expression introduces the reason for the decree.
    'Because' is the most natural modern equivalent.
- source_word: לָא אִיתַי אֱלָה אָחֳרָן
  chosen: there is no other god
  alternatives:
  - there exists no other god
  lexicon: HALOT
  rationale: This straightforward existential clause is best rendered plainly. It
    reflects Nebuchadnezzar's confession of incomparable deliverance in this context.
- source_word: יִכֻּל לְהַצָּלָה כִּדְנָה
  chosen: who is able to deliver like this
  alternatives:
  - who can rescue in this way
  - who is able to save like this
  lexicon: HALOT
  rationale: The verb denotes ability to rescue/deliver. 'Deliver' fits the narrative
    context of rescue from the furnace and preserves biblical diction without sounding
    archaic.
