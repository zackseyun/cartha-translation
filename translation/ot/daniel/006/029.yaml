theological_decisions:
- issue: Relationship between Darius and Cyrus in the verse
  chosen_reading: Render both clauses straightforwardly without resolving whether
    Darius and Cyrus are the same person, co-rulers, or successive rulers.
  alternative_readings:
  - Darius and Cyrus refer to two successive rulers
  - Darius is another name/title for Cyrus
  rationale: The verse simply states that Daniel prospered in the reign of Darius
    and in the reign of Cyrus the Persian. The translation should preserve the wording
    without importing a harmonization of historical identifications not explicit in
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
