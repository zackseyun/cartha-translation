id: DAN.6.29
reference: Daniel 6:29
source:
  edition: WLC
  text: וְ/דָנִיֵּ֣אל דְּנָ֔ה הַצְלַ֖ח בְּ/מַלְכ֣וּת דָּרְיָ֑וֶשׁ וּ/בְ/מַלְכ֖וּת
    כּ֥וֹרֶשׁ פרסי/א׃פ
translation:
  text: And this Daniel prospered during the reign of Darius and during the reign
    of Cyrus the Persian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'during the reign of Darius, that is, the reign of Cyrus the
      Persian,' if the two names are understood to refer to the same ruler.
    reason: alternative_reading
lexical_decisions:
- source_word: דְּנָה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: The demonstrative points specifically to Daniel just mentioned. 'This
    Daniel' is a natural English rendering that preserves the emphatic, resumptive
    force of the Aramaic.
- source_word: הַצְלַח
  chosen: prospered
  alternatives:
  - was successful
  - flourished
  lexicon: HALOT
  rationale: The verb denotes succeeding or prospering. 'Prospered' is concise, idiomatic,
    and fits the narrative summary without overstating material wealth alone.
- source_word: בְּמַלְכוּת
  chosen: during the reign of
  alternatives:
  - in the kingdom of
  - under the reign of
  lexicon: HALOT
  rationale: 'Although literally ''in the reign/kingdom of,'' the temporal sense is
    primary here: Daniel prospered in the period of these rulers'' rule. ''During
    the reign of'' communicates that sense clearly in modern English.'
- source_word: דָּרְיָוֶשׁ
  chosen: Darius
  rationale: Standard English transliteration of the royal name.
- source_word: וּבְמַלְכוּת
  chosen: and during the reign of
  alternatives:
  - and in the kingdom of
  - and under the reign of
  lexicon: HALOT
  rationale: The repeated prepositional phrase is retained for clarity and rhythm,
    matching the source structure.
- source_word: כּוֹרֶשׁ
  chosen: Cyrus
  rationale: Standard English transliteration of the royal name.
- source_word: פרסי
  chosen: the Persian
  alternatives:
  - of Persia
  lexicon: HALOT
  rationale: The gentilic/title identifies Cyrus ethnically or imperially. 'The Persian'
    is the most direct rendering and matches common English usage for royal epithets.
