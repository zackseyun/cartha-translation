id: DAN.6.9
reference: Daniel 6:9
source:
  edition: WLC
  text: כְּעַ֣ן מַלְכָּ֔/א תְּקִ֥ים אֱסָרָ֖/א וְ/תִרְשֻׁ֣ם כְּתָבָ֑/א דִּ֣י לָ֧א לְ/הַשְׁנָיָ֛ה
    כְּ/דָת מָדַ֥י וּ/פָרַ֖ס דִּי לָ֥א תֶעְדֵּֽא־־׃
translation:
  text: Now, O king, establish the injunction and sign the document so that it cannot
    be changed, according to the law of the Medes and Persians, which cannot be revoked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which may not be altered.' The Aramaic emphasizes that the written edict
      is not to be changed.
    reason: lexical_alternative
  - marker: b
    text: Or 'which cannot be repealed.' Literally, 'which does not pass away,' an
      idiom for legal irrevocability.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore
  - So now
  lexicon: HALOT
  rationale: Discourse adverb introducing the advisers' urgent appeal. 'Now' is natural
    English and preserves the immediacy without overinterpreting the logical force.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative use in direct address. 'O king' reflects the courtly address
    more clearly than a bare 'king' in English.
- source_word: תְּקִים
  chosen: establish
  alternatives:
  - confirm
  - set up
  lexicon: HALOT
  rationale: The verb means to set up or make firm. 'Establish' fits the legal-administrative
    context of putting an edict into force.
- source_word: אֱסָרָא
  chosen: the injunction
  alternatives:
  - the interdict
  - the prohibition
  - the decree
  lexicon: HALOT
  rationale: Refers specifically to the prohibitory edict proposed in context. 'Injunction'
    communicates a binding legal prohibition better than the broader 'decree.'
- source_word: וְתִרְשֻׁם
  chosen: and sign
  alternatives:
  - and write down
  - and register
  lexicon: HALOT
  rationale: In this legal context the verb refers to formal written authorization.
    'Sign' captures the king's act of officially endorsing the written decree, especially
    in collocation with 'document.'
- source_word: כְּתָבָא
  chosen: the document
  alternatives:
  - the writing
  - the decree in writing
  lexicon: HALOT
  rationale: A written legal text is in view. 'Document' is readable modern English
    and preserves the written, official nature of the item.
- source_word: דִּי לָא לְהַשְׁנָיָה
  chosen: so that it cannot be changed
  alternatives:
  - which may not be altered
  - that it be not changed
  lexicon: HALOT
  rationale: Expresses the intended legal fixity of the written injunction. 'Cannot
    be changed' is idiomatic modern English and preserves the force of irrevocability.
- source_word: כְּדָת
  chosen: according to the law
  alternatives:
  - according to the statute
  - in keeping with the law
  lexicon: HALOT
  rationale: Denotes legal custom or statute. 'According to the law' is the most natural
    rendering in English legal style.
- source_word: מָדַי וּפָרַס
  chosen: the Medes and Persians
  alternatives:
  - Media and Persia
  lexicon: HALOT
  rationale: The gentilic expression refers to the peoples/kingdoms whose legal custom
    is being invoked. 'The Medes and Persians' is the standard and contextually clear
    rendering.
- source_word: דִּי לָא תֶעְדֵּא
  chosen: which cannot be revoked
  alternatives:
  - which does not pass away
  - which cannot be repealed
  lexicon: HALOT
  rationale: The idiom speaks of a law not passing away, i.e., not being annulled.
    'Revoked' is a precise legal English equivalent; 'repealed' is also possible but
    slightly more legislative than royal-edict language here.
