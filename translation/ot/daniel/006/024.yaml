id: DAN.6.24
reference: Daniel 6:24
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן מַלְכָּ֗/א שַׂגִּיא֙ טְאֵ֣ב עֲל֔וֹ/הִי וּ/לְ/דָ֣נִיֵּ֔אל אֲמַ֖ר
    לְ/הַנְסָקָ֣ה מִן גֻּבָּ֑/א וְ/הֻסַּ֨ק דָּנִיֵּ֜אל מִן גֻּבָּ֗/א וְ/כָל חֲבָל֙
    לָא הִשְׁתְּכַ֣ח בֵּ֔/הּ דִּ֖י הֵימִ֥ן בֵּ/אלָהֵֽ/הּ־־־־׃
translation:
  text: Then the king was very glad because of him, and he ordered that Daniel be
    brought up from the pit. So Daniel was brought up from the pit, and no kind of
    harm was found on him, because he had trusted in his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the den.' The Aramaic noun denotes a pit-like enclosure; in this
      context it is the lions' den.
    reason: lexical_alternative
  - marker: b
    text: Or 'because he had believed his God.' The verb can mean 'trust' or 'believe';
      'trusted' was chosen here to emphasize personal reliance in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - the king himself
  lexicon: HALOT
  rationale: Definite emphatic form; straightforwardly rendered 'the king'.
- source_word: שַׂגִּיא טְאֵב
  chosen: was very glad
  alternatives:
  - rejoiced greatly
  - was exceedingly pleased
  lexicon: HALOT
  rationale: The adjective plus verb intensifies the king's emotional response. 'Was
    very glad' is idiomatic and preserves the strong positive emotion without sounding
    archaic.
- source_word: עֲלֹוהִי
  chosen: because of him
  alternatives:
  - over him
  - concerning him
  lexicon: HALOT
  rationale: 'The preposition על with pronominal suffix here indicates the cause or
    occasion of the king''s gladness in relation to Daniel. ''Because of him'' best
    fits the context: the king rejoices on Daniel''s account.'
- source_word: וּלְדָנִיֵּאל אֲמַר
  chosen: and he ordered that Daniel
  alternatives:
  - and he said concerning Daniel
  - and he commanded regarding Daniel
  lexicon: HALOT
  rationale: 'Although literally ''and to Daniel he said,'' the following infinitive
    construction shows a command. English idiom requires an explicit command sense:
    ''he ordered that Daniel...''.'
- source_word: לְהַנְסָקָה
  chosen: be brought up
  alternatives:
  - be lifted up
  - be taken up
  lexicon: HALOT
  rationale: Causative infinitive of נסק, 'to bring up/lift out.' In context of extraction
    from the lions' den, 'be brought up' is clear and natural.
- source_word: מִן גֻּבָּא
  chosen: from the pit
  alternatives:
  - from the den
  - from the cistern
  lexicon: HALOT
  rationale: The Aramaic noun denotes a pit-like enclosure. Since the immediate context
    is the lions' enclosure, 'den' is contextually possible, but 'pit' more directly
    reflects the lexical sense and matches the repeated imagery of being brought up
    out of it.
- source_word: וְהֻסַּק
  chosen: was brought up
  alternatives:
  - was lifted up
  - was taken up
  lexicon: HALOT
  rationale: Passive/causative verbal form corresponding to the king's order. 'Was
    brought up' keeps the lexical link with the prior infinitive and reads smoothly.
- source_word: וְכָל חֲבָל לָא הִשְׁתְּכַח בֵּהּ
  chosen: and no kind of harm was found on him
  alternatives:
  - and no injury whatever was found on him
  - and no damage at all was found in him
  lexicon: HALOT
  rationale: חבל here refers to harm/injury. 'No kind of harm' reflects the comprehensive
    force of כל while remaining idiomatic. 'Was found on him' preserves the external
    examination sense.
- source_word: דִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Daniel's preservation. 'Because' makes the
    causal relation explicit in natural English.
- source_word: הֵימִן
  chosen: he had trusted
  alternatives:
  - he believed
  - he had faith
  lexicon: HALOT
  rationale: The verb means to trust/believe. 'Had trusted' best conveys personal
    reliance on God in this narrative context, while avoiding a merely intellectual
    sense.
- source_word: בֵּאלָהֵהּ
  chosen: in his God
  alternatives:
  - in the God of him
  - in his own God
  lexicon: HALOT
  rationale: Standard preposition plus noun with suffix. 'In his God' is the natural
    English rendering and preserves the personal covenantal relation implied by the
    suffix.
