theological_decisions:
- issue: Ground of Daniel's deliverance
  chosen_reading: because he had trusted in his God
  alternative_readings:
  - because he had believed his God
  rationale: The text explicitly grounds Daniel's preservation in his trust in God.
    The translation preserves that causal statement without importing a broader doctrinal
    formulation about merit or mechanism beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
