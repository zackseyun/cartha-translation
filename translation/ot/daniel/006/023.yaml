id: DAN.6.23
reference: Daniel 6:23
source:
  edition: WLC
  text: אֱלָהִ֞/י שְׁלַ֣ח מַלְאֲכֵ֗/הּ וּֽ/סֲגַ֛ר פֻּ֥ם אַרְיָוָתָ֖/א וְ/לָ֣א חַבְּל֑וּ/נִי
    כָּ/ל קֳבֵ֗ל דִּ֤י קָֽדָמ֨וֹ/הִי֙ זָכוּ֙ הִשְׁתְּכַ֣חַת לִ֔/י וְ/אַ֤ף קדמי/ך מַלְכָּ֔/א
    חֲבוּלָ֖ה לָ֥א עַבְדֵֽת־׃
translation:
  text: My God sent his angel and shut the lions’ mouths, and they have not harmed
    me, because innocence was found in me before him; and also before you, O king,
    I have done no harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his messenger.' The Aramaic term can denote either a messenger or an
      angel; here the miraculous context favors 'angel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blamelessness' or 'purity was found in me before him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I did no wrong before you, O king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלָהִי
  chosen: My God
  alternatives:
  - My god
  lexicon: HALOT
  rationale: Definite first-person possessive in Daniel’s confession; capitalized
    'God' in English to reflect reference to the true God in context, while preserving
    the personal possessive.
- source_word: שְׁלַח
  chosen: sent
  alternatives:
  - has sent
  lexicon: HALOT
  rationale: Aramaic perfect narrates completed action. English simple past fits the
    report of what God did in the lions’ den better than present perfect.
- source_word: מַלְאֲכֵהּ
  chosen: his angel
  alternatives:
  - his messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel'; in this miraculous deliverance
    context, a heavenly being is plainly intended, so 'angel' is the most natural
    rendering.
- source_word: וּסֲגַר
  chosen: and shut
  alternatives:
  - and closed
  lexicon: HALOT
  rationale: Straightforward verbal continuation of God's action through the angel.
    'Shut' is idiomatic with 'mouths' in English.
- source_word: פֻּם אַרְיָוָתָא
  chosen: the lions’ mouths
  alternatives:
  - the mouth of the lions
  lexicon: HALOT
  rationale: Collective plural sense is best expressed idiomatically in English as
    'the lions’ mouths.'
- source_word: וְלָא חַבְּלוּנִי
  chosen: and they have not harmed me
  alternatives:
  - and they did not injure me
  - and they have not hurt me
  lexicon: HALOT
  rationale: 'The plural verb refers to the lions. Present perfect in English conveys
    the resulting state at the time of speaking: Daniel remains unharmed.'
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for this reason that
  lexicon: HALOT
  rationale: This Aramaic expression introduces the reason for deliverance. 'Because'
    is clear modern English and preserves the causal force.
- source_word: קָדָמוֹהִי
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literally spatial-relational language meaning 'before him'; retained
    to preserve the judicial/moral setting of divine evaluation.
- source_word: זָכוּ
  chosen: innocence
  alternatives:
  - purity
  - blamelessness
  lexicon: HALOT
  rationale: The noun denotes innocence or purity in a judicial-moral sense. 'Innocence'
    best fits the legal context of vindication before God and king.
- source_word: הִשְׁתְּכַחַת לִי
  chosen: was found in me
  alternatives:
  - was found for me
  - was found to be mine
  lexicon: HALOT
  rationale: Passive idiom expressing that innocence was discovered/present in Daniel.
    'In me' is slightly wooden but preserves the source idiom and moral sense.
- source_word: וְאַף קֳדָמָיךְ
  chosen: and also before you
  alternatives:
  - and even before you
  lexicon: HALOT
  rationale: Adds a second sphere of vindication, now before the king. 'Also' is the
    most natural additive connector here.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative use is explicit in context; 'O king' preserves the direct address
    and courtly tone.
- source_word: חֲבוּלָה
  chosen: harm
  alternatives:
  - wrong
  - injury
  - damage
  lexicon: HALOT
  rationale: A broad term for injury or wrongdoing. 'Harm' matches the parallel earlier
    in the verse and keeps the statement general rather than narrowly legal.
- source_word: לָא עַבְדֵת
  chosen: I have done no harm
  alternatives:
  - I did no wrong
  - I have done no injury
  lexicon: HALOT
  rationale: Perfect first person summarizes Daniel’s conduct up to the present moment.
    Present perfect in English suits his defense before the king.
