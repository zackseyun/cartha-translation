theological_decisions:
- issue: Identity of מַלְאֲכֵהּ in a miraculous deliverance context
  chosen_reading: his angel
  alternative_readings:
  - his messenger
  rationale: The narrative context strongly indicates a supernatural agent sent by
    God, not a merely human envoy. Rendering 'angel' communicates the plain sense
    without importing further speculation about the angel’s identity.
  doctrine_reference: Translation philosophy §1, §3
