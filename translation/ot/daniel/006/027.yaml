id: DAN.6.27
reference: Daniel 6:27
source:
  edition: WLC
  text: מִן קֳדָמַ/י֮ שִׂ֣ים טְעֵם֒ דִּ֣י בְּ/כָל שָׁלְטָ֣ן מַלְכוּתִ֗/י לֶהֱוֺ֤ן
    זאעין וְ/דָ֣חֲלִ֔ין מִן קֳדָ֖ם אֱלָהֵ֣/הּ דִּי דָֽנִיֵּ֑אל דִּי ה֣וּא אֱלָהָ֣/א
    חַיָּ֗/א וְ/קַיָּם֙ לְ/עָ֣לְמִ֔ין וּ/מַלְכוּתֵ/הּ֙ דִּֽי לָ֣א תִתְחַבַּ֔ל וְ/שָׁלְטָנֵ֖/הּ
    עַד סוֹפָֽ/א־׀־־־־׀־־׃
translation:
  text: A decree has been issued by me, that in all the dominion of my kingdom people
    are to tremble and fear before the God of Daniel, for he is the living God, enduring
    forever; and his kingdom will not be destroyed, and his dominion will be to the
    end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere and fear before the God of Daniel.' The Aramaic pair expresses
      intense awe; the main text keeps the stronger sense 'tremble and fear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout all the realm of my kingdom.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his dominion is unto the end' or 'his rule lasts to the end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן קֳדָמַי
  chosen: by me
  alternatives:
  - from before me
  - before me
  lexicon: HALOT
  rationale: In imperial decree formulae, the idiom means the decree proceeds from
    the speaker's authority. 'By me' is natural English and preserves royal authorship
    better than the more wooden 'from before me.'
- source_word: שִׂים טְעֵם
  chosen: A decree has been issued
  alternatives:
  - I make a decree
  - a decree is set
  lexicon: HALOT
  rationale: This Aramaic administrative expression literally involves 'placing' a
    decree. The passive English 'has been issued' captures the formal proclamation
    style without over-literal awkwardness.
- source_word: בְּכָל שָׁלְטָן מַלְכוּתִי
  chosen: in all the dominion of my kingdom
  alternatives:
  - throughout all the realm of my kingdom
  - in all the rule of my kingdom
  lexicon: HALOT
  rationale: שָׁלְטָן denotes dominion, realm, or sphere of rule. 'Dominion' preserves
    the political scope, while 'of my kingdom' clarifies that the whole imperial realm
    is in view.
- source_word: לֶהֱוֺן
  chosen: people are to
  alternatives:
  - they are to
  - let them be
  lexicon: HALOT
  rationale: The verb introduces what subjects within the kingdom must do. Supplying
    'people' makes the English sentence complete and reflects the implied inhabitants
    under the decree.
- source_word: זאעין וְדָחֲלִין
  chosen: tremble and fear
  alternatives:
  - be trembling and fearing
  - revere and fear
  lexicon: HALOT
  rationale: The pair expresses strong awe before deity. 'Tremble and fear' preserves
    the intensity and the twofold expression better than flattening both into 'revere.'
- source_word: מִן קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  - from before
  lexicon: HALOT
  rationale: The preposition here marks posture in relation to God. 'Before' is concise
    and idiomatic in English for reverential stance.
- source_word: אֱלָהֵהּ דִּי דָנִיֵּאל
  chosen: the God of Daniel
  alternatives:
  - Daniel's God
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly possessive/associative. 'The
    God of Daniel' is the standard and most transparent rendering.
- source_word: אֱלָהָא חַיָּא
  chosen: the living God
  alternatives:
  - a living God
  lexicon: HALOT
  rationale: The phrase is qualitative and confessional, contrasting Daniel's God
    with lifeless idols. 'The living God' best reflects the definite, exalted sense
    in context.
- source_word: וְקַיָּם לְעָלְמִין
  chosen: enduring forever
  alternatives:
  - steadfast forever
  - existing forever
  - abiding for ages
  lexicon: HALOT
  rationale: קַיָּם conveys enduring, established, or permanent existence. 'Enduring
    forever' communicates both permanence and ongoing continuance in natural English.
- source_word: וּמַלְכוּתֵהּ דִּי לָא תִתְחַבַּל
  chosen: his kingdom will not be destroyed
  alternatives:
  - his kingdom will not be corrupted
  - his kingdom will not be ruined
  lexicon: HALOT
  rationale: The verb in this context refers to being brought to ruin or destroyed.
    'Will not be destroyed' is the clearest English expression for the permanence
    of God's reign.
- source_word: וְשָׁלְטָנֵהּ עַד סוֹפָא
  chosen: his dominion will be to the end
  alternatives:
  - his dominion is unto the end
  - his rule lasts to the end
  lexicon: HALOT
  rationale: שָׁלְטָן again denotes rule/dominion. 'Will be to the end' closely follows
    the Aramaic while remaining readable, expressing unending extent rather than merely
    duration.
