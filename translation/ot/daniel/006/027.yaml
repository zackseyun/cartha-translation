theological_decisions:
- issue: Rendering the response demanded by the decree toward Daniel's God
  chosen_reading: tremble and fear before the God of Daniel
  alternative_readings:
  - revere and fear before the God of Daniel
  rationale: The text uses two strong participles of dread/awe. Rendering one as 'revere'
    would soften the force and partially interpret the emotional posture. 'Tremble
    and fear' preserves the royal decree's intensity without importing later theological
    categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Description of God as enduring and his kingdom as indestructible
  chosen_reading: for he is the living God, enduring forever; and his kingdom will
    not be destroyed
  alternative_readings:
  - for he is the living God and steadfast forever; his kingdom is one that shall
    never be destroyed
  rationale: The wording preserves the text's direct affirmation of God's life, permanence,
    and everlasting reign without embellishment. It aligns with historic orthodoxy
    while remaining strictly within what the verse states.
  doctrine_reference: Do not import doctrinal claims the text does not make; readable
    modern English, not archaic or academic.
