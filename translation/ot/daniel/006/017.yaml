id: DAN.6.17
reference: Daniel 6:17
source:
  edition: WLC
  text: בֵּ/אדַ֜יִן מַלְכָּ֣/א אֲמַ֗ר וְ/הַיְתִיו֙ לְ/דָ֣נִיֵּ֔אל וּ/רְמ֕וֹ לְ/גֻבָּ֖/א
    דִּ֣י אַרְיָוָתָ֑/א עָנֵ֤ה מַלְכָּ/א֙ וְ/אָמַ֣ר לְ/דָנִיֵּ֔אל אֱלָהָ֗/ךְ דִּ֣י
    אנתה פָּֽלַֽח לֵ/הּ֙ בִּ/תְדִירָ֔/א ה֖וּא יְשֵׁיזְבִנָּֽ/ךְ־׃
translation:
  text: Then the king gave the command, and they brought Daniel and threw him into
    the den of lions. The king answered and said to Daniel, “Your God, whom you continually
    serve, he will deliver you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional English: “into the lions’ den.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “may he deliver you.” The Aramaic can be taken by some as expressing
      a wish, though the main text follows the more direct declarative sense, “he
      will deliver you.”
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined form in Aramaic; English normally expresses this as 'the king.'
- source_word: אֲמַר
  chosen: gave the command
  alternatives:
  - said
  - ordered
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' in this context it introduces
    a royal directive followed immediately by action. 'Gave the command' captures
    the idiomatic force without over-paraphrasing.
- source_word: וְהַיְתִיו
  chosen: they brought
  alternatives:
  - they caused to come
  - they led in
  lexicon: HALOT
  rationale: Causative form of 'come'; in context of officials acting on the king's
    order, 'they brought' is the most idiomatic equivalent.
- source_word: וּרְמוֹ
  chosen: threw
  alternatives:
  - cast
  - put
  lexicon: HALOT
  rationale: The verb denotes casting/throwing. 'Threw' preserves the force better
    than the softer 'put,' while remaining natural English.
- source_word: לְגֻבָּא דִּי אַרְיָוָתָא
  chosen: into the den of lions
  alternatives:
  - into the lions' den
  lexicon: HALOT
  rationale: Literally 'to/into the pit/den of lions.' 'Den of lions' is transparent
    and close to the Aramaic structure; the alternative traditional English order
    is preserved in a footnote.
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - said
  - responded and said
  lexicon: HALOT
  rationale: This is a common Semitic narrative formula. Retaining both verbs reflects
    the source text, though in smooth English it functions simply as an introduction
    to speech.
- source_word: אֱלָהָךְ
  chosen: Your God
  lexicon: HALOT
  rationale: Direct address with second masculine singular suffix; straightforward
    possessive rendering.
- source_word: דִּי אנתה פָּלַח לֵהּ
  chosen: whom you ... serve
  alternatives:
  - to whom you render service
  - whom you worship
  lexicon: HALOT
  rationale: פּלח in Biblical Aramaic can denote service rendered to a deity, overlapping
    with worship. 'Serve' preserves the lexical range and avoids narrowing the sense
    too quickly to cultic worship alone.
- source_word: בִּתְדִירָא
  chosen: continually
  alternatives:
  - constantly
  - regularly
  lexicon: HALOT
  rationale: The term denotes ongoing regularity or constancy. 'Continually' best
    conveys Daniel's persistent devotion.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis before the verb. English can preserve
    this with explicit 'he' before 'will deliver,' without requiring the heavier 'he
    himself.'
- source_word: יְשֵׁיזְבִנָּךְ
  chosen: will deliver you
  alternatives:
  - will rescue you
  - will save you
  lexicon: HALOT
  rationale: The verb means to deliver/rescue from danger. 'Deliver' fits both the
    immediate context and the elevated tone of the king's statement.
