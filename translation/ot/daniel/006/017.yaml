theological_decisions:
- issue: Force of the king's final statement
  chosen_reading: 'declarative confidence: ''he will deliver you'''
  alternative_readings:
  - 'jussive/wish-like sense: ''may he deliver you'''
  rationale: The Aramaic form is naturally read as an indicative/imperfect prediction
    or expression of confidence. Some English traditions render it as a wish ('may
    your God deliver you'), likely influenced by contextual uncertainty, but the form
    here supports a straightforward declarative. The translation preserves the king's
    expressed hope/confidence without importing stronger theological certainty than
    the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
