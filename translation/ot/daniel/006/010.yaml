id: DAN.6.10
reference: Daniel 6:10
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֖ל דְּנָ֑ה מַלְכָּ/א֙ דָּֽרְיָ֔וֶשׁ רְשַׁ֥ם כְּתָבָ֖/א וֶ/אֱסָרָֽ/א־׃
translation:
  text: Because of this, King Darius signed the document and the injunction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Therefore, King Darius wrote down the document and the interdict.' The
      Aramaic can be rendered more formally, but 'signed ... injunction' better conveys
      the legal force in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Because of this
  alternatives:
  - Therefore
  - For this reason
  - Accordingly
  lexicon: HALOT
  rationale: The Aramaic idiom introduces a result/consequence from the preceding
    narrative. 'Because of this' preserves the causal force naturally in English.
- source_word: מַלְכָּא דָּרְיָוֶשׁ
  chosen: King Darius
  alternatives:
  - Darius the king
  lexicon: HALOT
  rationale: The title-noun plus personal name is rendered in standard English order
    while preserving the royal title and transliterating the name per translation
    philosophy.
- source_word: רְשַׁם
  chosen: signed
  alternatives:
  - wrote
  - recorded
  - issued
  lexicon: HALOT
  rationale: In this legal-administrative context, the verb refers to formally setting
    down or endorsing the decree in writing. 'Signed' best fits the immediate context
    of a king putting the decree into force, especially with the following nouns 'document'
    and 'injunction'.
- source_word: כְּתָבָא
  chosen: the document
  alternatives:
  - the writing
  - the written decree
  lexicon: HALOT
  rationale: The noun denotes a written text/document. 'Document' is clear modern
    English and suits the legal setting without over-specifying beyond the source.
- source_word: וֶאֱסָרָא
  chosen: and the injunction
  alternatives:
  - and the interdict
  - and the prohibition
  - and the decree
  lexicon: HALOT
  rationale: The term denotes a binding prohibition or injunction. 'Injunction' communicates
    a formal legal restriction better than the broader 'decree,' especially since
    a separate word already covers the written document.
