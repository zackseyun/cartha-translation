id: DAN.6.20
reference: Daniel 6:20
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן מַלְכָּ֔/א בִּ/שְׁפַּרְפָּרָ֖/א יְק֣וּם בְּ/נָגְהָ֑/א וּ/בְ/הִ֨תְבְּהָלָ֔ה
    לְ/גֻבָּ֥/א דִֽי אַרְיָוָתָ֖/א אֲזַֽל־׃
translation:
  text: Then the king arose at dawn, at first light, and in haste went to the den
    of the lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at daybreak ... when it became light.' The verse uses two closely related
      dawn expressions for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''In haste'' may also carry the sense ''in alarm'' or ''in anxious urgency.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural English and preserves the narrative progression.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - King
  lexicon: HALOT
  rationale: Definite emphatic form; 'the king' reflects the marked definiteness and
    fits the narrative context.
- source_word: בִּשְׁפַּרְפָּרָא
  chosen: at dawn
  alternatives:
  - at daybreak
  - in the early morning
  lexicon: HALOT
  rationale: Refers to the break of day/early dawn. 'At dawn' is concise and idiomatic.
- source_word: יְקוּם
  chosen: arose
  alternatives:
  - got up
  - rose
  lexicon: HALOT
  rationale: Verb of rising/standing. 'Arose' preserves the elevated narrative tone
    without sounding archaic in context.
- source_word: בְּנָגְהָא
  chosen: at first light
  alternatives:
  - with the light
  - when it became light
  - at daybreak
  lexicon: HALOT
  rationale: Literally connected with shining/light. Because the verse contains both
    בִּשְׁפַּרְפָּרָא and בְּנָגְהָא, rendering them identically would flatten the
    Hebrew-Aramaic emphasis. 'At first light' preserves the second temporal expression
    distinctly while remaining natural.
- source_word: וּבְהִתְבְּהָלָה
  chosen: and in haste
  alternatives:
  - and hurriedly
  - and in alarm
  lexicon: HALOT
  rationale: The noun conveys haste, agitation, or anxious urgency. 'In haste' captures
    the manner of the king's movement; the emotional nuance of alarm is possible but
    not required by the immediate syntax.
- source_word: לְגֻבָּא
  chosen: to the den
  alternatives:
  - to the pit
  lexicon: HALOT
  rationale: In Daniel 6 this term denotes the lions' enclosure. 'Den' is the established
    and contextually precise English equivalent.
- source_word: דִי
  chosen: of
  alternatives:
  - that contained
  - where there were
  lexicon: HALOT
  rationale: Relative particle linking 'den' and 'lions.' In English, a simple genitival
    construction is the most natural equivalent here.
- source_word: אַרְיָוָתָא
  chosen: the lions
  alternatives:
  - lions
  lexicon: HALOT
  rationale: Plural emphatic form. 'The lions' reflects the definiteness and the known
    lions' den in the story.
- source_word: אֲזַל
  chosen: went
  alternatives:
  - came
  - proceeded
  lexicon: HALOT
  rationale: Common Aramaic verb of going. 'Went' is the straightforward narrative
    rendering.
