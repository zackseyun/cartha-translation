id: DAN.6.2
reference: Daniel 6:2
source:
  edition: WLC
  text: שְׁפַר֙ קֳדָ֣ם דָּרְיָ֔וֶשׁ וַ/הֲקִים֙ עַל מַלְכוּתָ֔/א לַ/אֲחַשְׁדַּרְפְּנַיָּ֖/א
    מְאָ֣ה וְ/עֶשְׂרִ֑ין דִּ֥י לֶהֱוֺ֖ן בְּ/כָל מַלְכוּתָֽ/א־־׃
translation:
  text: It seemed good to Darius to appoint over the kingdom one hundred and twenty
    satraps, who would be throughout the whole kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provincial governors' for 'satraps,' referring to high Persian administrative
      officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפַר
  chosen: It seemed good
  alternatives:
  - It pleased
  - It was good
  lexicon: HALOT
  rationale: Aramaic idiom meaning that the course of action appeared good or pleasing
    to the king. 'It seemed good' is natural modern English and preserves the evaluative
    sense without overstating emotion.
- source_word: קֳדָם
  chosen: to
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: With שְׁפַר and a personal object, the preposition functions idiomatically
    to mark the person to whom something seemed good. English 'to Darius' best conveys
    the sense.
- source_word: וַהֲקִים
  chosen: to appoint
  alternatives:
  - to set up
  - to establish
  lexicon: HALOT
  rationale: In administrative context over officials, the verb refers to installing
    or appointing persons to office rather than physically setting something up.
- source_word: עַל מַלְכוּתָא
  chosen: over the kingdom
  alternatives:
  - over the realm
  - over the royal kingdom
  lexicon: HALOT
  rationale: The phrase denotes jurisdiction over the kingdom's administration. 'Kingdom'
    is the straightforward rendering of מַלְכוּתָא here.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: This is the established term for Persian provincial officials. 'Satraps'
    is both historically precise and sufficiently accessible; a more explanatory alternative
    is preserved in a footnote.
- source_word: מְאָה וְעֶשְׂרִין
  chosen: one hundred and twenty
  alternatives:
  - '120'
  lexicon: HALOT
  rationale: The cardinal number is rendered in standard English words in running
    text.
- source_word: דִּי לֶהֱוֺן
  chosen: who would be
  alternatives:
  - that they should be
  - to be
  lexicon: HALOT
  rationale: The relative particle plus imperfect expresses purpose/result for the
    appointed officials. 'Who would be' reads naturally in English while preserving
    the prospective force.
- source_word: בְּכָל מַלְכוּתָא
  chosen: throughout the whole kingdom
  alternatives:
  - in all the kingdom
  - through all the kingdom
  lexicon: HALOT
  rationale: The phrase indicates distribution across the entire realm, not merely
    presence within it. 'Throughout the whole kingdom' makes the administrative scope
    clear.
