theological_decisions:
- issue: Nature of Daniel's faithfulness
  chosen_reading: Rendered מְהֵימַן as 'faithful' in the sense of trustworthy in office.
  alternative_readings:
  - trustworthy
  - reliable
  rationale: The verse concerns Daniel's public integrity before pagan officials,
    not an abstract theological statement. 'Faithful' preserves the moral weight without
    importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
