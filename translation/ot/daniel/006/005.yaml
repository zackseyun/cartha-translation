id: DAN.6.5
reference: Daniel 6:5
source:
  edition: WLC
  text: אֱדַ֨יִן סָֽרְכַיָּ֜/א וַ/אֲחַשְׁדַּרְפְּנַיָּ֗/א הֲו֨וֹ בָעַ֧יִן עִלָּ֛ה
    לְ/הַשְׁכָּחָ֥ה לְ/דָנִיֵּ֖אל מִ/צַּ֣ד מַלְכוּתָ֑/א וְ/כָל עִלָּ֨ה וּ/שְׁחִיתָ֜ה
    לָא יָכְלִ֣ין לְ/הַשְׁכָּחָ֗ה כָּ/ל קֳבֵל֙ דִּֽי מְהֵימַ֣ן ה֔וּא וְ/כָל שָׁלוּ֙
    וּ/שְׁחִיתָ֔ה לָ֥א הִשְׁתְּכַ֖חַת עֲלֽוֹ/הִי־־־־־׃
translation:
  text: Then the high officials and the satraps were seeking a charge against Daniel
    in matters of the kingdom, but they were unable to find any charge or corruption,
    because he was faithful, and no negligence or corruption was found in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ground for accusation' for 'charge.'
    reason: lexical_alternative
  - marker: b
    text: Or 'trustworthy' for 'faithful.'
    reason: lexical_alternative
  - marker: c
    text: Or 'error' or 'carelessness' for 'negligence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next development in the narrative;
    'Then' is natural modern English and preserves the flow.
- source_word: סָרְכַיָּא
  chosen: high officials
  alternatives:
  - commissioners
  - presidents
  lexicon: HALOT
  rationale: Administrative title in Imperial Aramaic. 'High officials' is clear modern
    English and avoids overly specific traditional renderings that may reflect later
    bureaucratic assumptions.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: A well-established historical term for Persian provincial rulers; retaining
    'satraps' preserves the setting and is sufficiently accessible.
- source_word: בָעַיִן
  chosen: were seeking
  alternatives:
  - were looking
  - were trying
  lexicon: HALOT
  rationale: Conveys active searching/attempting. 'Were seeking' fits the participial/imperfective
    sense in context.
- source_word: עִלָּה
  chosen: charge
  alternatives:
  - ground for accusation
  - pretext
  - cause
  lexicon: HALOT
  rationale: In this legal-administrative context the word denotes a basis for accusation.
    'Charge' is concise and idiomatic.
- source_word: לְהַשְׁכָּחָה
  chosen: to find
  alternatives:
  - to discover
  lexicon: HALOT
  rationale: Though the root can mean 'find/discover,' English requires a smoother
    idiom with 'seeking a charge ... to find'; later passive form is rendered 'was
    found' for consistency.
- source_word: מִצַּד מַלְכוּתָא
  chosen: in matters of the kingdom
  alternatives:
  - in connection with the kingdom
  - in regard to the administration of the kingdom
  lexicon: HALOT
  rationale: 'Specifies the sphere in which they sought grounds against Daniel: his
    governmental service. ''Matters of the kingdom'' is natural and sufficiently formal.'
- source_word: שְׁחִיתָה
  chosen: corruption
  alternatives:
  - wrongdoing
  - corrupt practice
  lexicon: HALOT
  rationale: The term denotes corrupt or damaging misconduct. 'Corruption' fits the
    administrative setting and pairs well with 'charge.'
- source_word: מְהֵימַן
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: Describes Daniel's dependable integrity. 'Faithful' preserves both reliability
    and moral steadfastness; in this context it refers to trustworthiness in office,
    not directly to a doctrinal category.
- source_word: שָׁלוּ
  chosen: negligence
  alternatives:
  - error
  - carelessness
  lexicon: HALOT
  rationale: The word here points to a lapse, oversight, or dereliction. 'Negligence'
    best suits the forensic-administrative context.
- source_word: הִשְׁתְּכַחַת עֲלֹוהִי
  chosen: was found in him
  alternatives:
  - was found against him
  - was found concerning him
  lexicon: HALOT
  rationale: The prepositional phrase indicates that no fault was discoverable with
    respect to Daniel. 'In him' is idiomatic and reflects the idea that no such defect
    existed in his conduct.
