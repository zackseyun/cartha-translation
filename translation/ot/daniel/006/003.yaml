id: DAN.6.3
reference: Daniel 6:3
source:
  edition: WLC
  text: וְ/עֵ֤לָּא מִנְּ/הוֹן֙ סָרְכִ֣ין תְּלָתָ֔א דִּ֥י דָנִיֵּ֖אל חַֽד מִנְּ/ה֑וֹן
    דִּֽי לֶהֱוֺ֞ן אֲחַשְׁדַּרְפְּנַיָּ֣/א אִלֵּ֗ין יָהֲבִ֤ין לְ/הוֹן֙ טַעְמָ֔/א וּ/מַלְכָּ֖/א
    לָֽא לֶהֱוֵ֥א נָזִֽק־־־׃
translation:
  text: And over them were three high officials, of whom Daniel was one, so that these
    satraps might give account to them and the king might suffer no loss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'might report to them'; the Aramaic phrase can denote giving an account
      or rendering a report in an administrative sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king might not be harmed'; here the sense is likely that the king
      would incur no administrative or financial loss.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֵלָּא
  chosen: And over them were
  alternatives:
  - And above them were
  - And over these were
  lexicon: HALOT
  rationale: The Aramaic expression introduces a higher administrative tier over the
    satraps. 'Over them' is natural English and preserves the hierarchical sense of
    עַל/עֵלָּא.
- source_word: סָרְכִין תְּלָתָא
  chosen: three high officials
  alternatives:
  - three presidents
  - three commissioners
  - three administrators
  lexicon: HALOT
  rationale: The term refers to senior overseers set above the satraps. 'High officials'
    avoids the anachronistic English political title 'presidents' while preserving
    rank and function.
- source_word: דִּי דָנִיֵּאל חַד מִנְּהוֹן
  chosen: of whom Daniel was one
  alternatives:
  - Daniel being one of them
  - one of whom was Daniel
  lexicon: HALOT
  rationale: This relative clause identifies Daniel as one member of the three. The
    chosen wording is idiomatic and precise.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: '''Satraps'' is the standard historical rendering for this Persian administrative
    title and best preserves the cultural setting.'
- source_word: יָהֲבִין לְהוֹן טַעְמָא
  chosen: might give account to them
  alternatives:
  - might render an account to them
  - might report to them
  - might give them an account
  lexicon: HALOT
  rationale: טַעְמָא can denote report, decision, or account in Imperial Aramaic administrative
    contexts. Here the sense is that the satraps were answerable to the three officials.
    'Give account' captures administrative accountability better than the vaguer 'report.'
- source_word: וּמַלְכָּא לָא לֶהֱוֵא נָזִק
  chosen: and the king might suffer no loss
  alternatives:
  - and the king might not be harmed
  - and the king might incur no damage
  lexicon: HALOT
  rationale: נזק in this context refers to loss or detriment to royal interests, likely
    financial or administrative. 'Suffer no loss' is idiomatic English and fits the
    bureaucratic setting better than physical 'harm'.
