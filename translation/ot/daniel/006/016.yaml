id: DAN.6.16
reference: Daniel 6:16
source:
  edition: WLC
  text: בֵּ/אדַ֨יִן֙ גֻּבְרַיָּ֣/א אִלֵּ֔ךְ הַרְגִּ֖שׁוּ עַל מַלְכָּ֑/א וְ/אָמְרִ֣ין
    לְ/מַלְכָּ֗/א דַּ֤ע מַלְכָּ/א֙ דִּֽי דָת֙ לְ/מָדַ֣י וּ/פָרַ֔ס דִּֽי כָל אֱסָ֥ר
    וּ/קְיָ֛ם דִּֽי מַלְכָּ֥/א יְהָקֵ֖ים לָ֥א לְ/הַשְׁנָיָֽה־־־־־׃
translation:
  text: Then these men pressed in upon the king and said to the king, "Know, O king,
    that it is a law of the Medes and Persians that any injunction or statute that
    the king establishes cannot be changed."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came by agreement against the king.' The Aramaic verb can suggest coordinated,
      insistent action, not merely approach.
    reason: lexical_alternative
  - marker: b
    text: Or 'decree' for 'injunction' and 'ordinance' for 'statute.' The pair emphasizes
      the full range of legally binding royal enactments.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - these men here
  - these persons
  lexicon: HALOT
  rationale: The phrase refers specifically to the hostile officials already in view.
    'Men' is the plain sense of the masculine plural noun and fits the gender-accurate
    policy.
- source_word: הַרְגִּשׁוּ עַל
  chosen: pressed in upon
  alternatives:
  - came by agreement against
  - thronged before
  - urged strongly against
  lexicon: HALOT
  rationale: This Aramaic idiom conveys forceful, coordinated pressure brought to
    bear on the king, not merely physical approach. 'Pressed in upon' captures the
    hostile insistence without overparaphrasing.
- source_word: וְאָמְרִין לְמַלְכָּא
  chosen: and said to the king
  alternatives:
  - and were saying to the king
  lexicon: HALOT
  rationale: Simple narrative continuation; English preterite is the natural rendering.
- source_word: דַּע מַלְכָּא
  chosen: Know, O king
  alternatives:
  - Know, king
  - Be aware, O king
  lexicon: HALOT
  rationale: Imperative plus vocative. 'O king' preserves the formal court address
    and rhetorical force.
- source_word: דִּי דָת לְמָדַי וּפָרַס
  chosen: that it is a law of the Medes and Persians
  alternatives:
  - that the law of the Medes and Persians
  - that there is a law of the Medes and Persians
  lexicon: HALOT
  rationale: The clause appeals to the fixed legal custom of the empire. Including
    'it is' makes the English idiomatic while preserving the assertion.
- source_word: כָל אֱסָר
  chosen: any injunction
  alternatives:
  - any interdict
  - any prohibition
  - any decree
  lexicon: HALOT
  rationale: אֱסָר denotes a binding prohibition or injunction. 'Injunction' best
    conveys a formally imposed restriction in this legal context.
- source_word: וּקְיָם
  chosen: or statute
  alternatives:
  - or ordinance
  - or decree
  lexicon: HALOT
  rationale: The noun refers to something established or fixed. 'Statute' distinguishes
    it from אֱסָר while keeping the legal register.
- source_word: דִּי מַלְכָּא יְהָקֵים
  chosen: that the king establishes
  alternatives:
  - that the king sets up
  - that the king enacts
  lexicon: HALOT
  rationale: The verb means to establish or set in force. 'Establishes' is broad enough
    for either injunction or statute and preserves the formal legal sense.
- source_word: לָא לְהַשְׁנָיָה
  chosen: cannot be changed
  alternatives:
  - may not be altered
  - is not to be changed
  lexicon: HALOT
  rationale: The phrase expresses the unalterable character of the law. 'Cannot be
    changed' communicates practical irrevocability in clear modern English.
