id: DAN.6.8
reference: Daniel 6:8
source:
  edition: WLC
  text: אִתְיָעַ֜טוּ כֹּ֣ל סָרְכֵ֣י מַלְכוּתָ֗/א סִגְנַיָּ֤/א וַֽ/אֲחַשְׁדַּרְפְּנַיָּ/א֙
    הַדָּֽבְרַיָּ֣/א וּ/פַחֲוָתָ֔/א לְ/קַיָּמָ֤ה קְיָם֙ מַלְכָּ֔/א וּ/לְ/תַקָּפָ֖ה
    אֱסָ֑ר דִּ֣י כָל דִּֽי יִבְעֵ֣ה בָ֠עוּ מִן כָּל אֱלָ֨הּ וֶֽ/אֱנָ֜שׁ עַד יוֹמִ֣ין
    תְּלָתִ֗ין לָהֵן֙ מִנָּ֣/ךְ מַלְכָּ֔/א יִתְרְמֵ֕א לְ/גֹ֖ב אַרְיָוָתָֽ/א׀־־־־־׃
translation:
  text: 'All the high officials of the kingdom, the prefects and satraps, the counselors
    and governors, have agreed together to establish a royal statute and to enforce
    an injunction: that whoever makes a petition to any god or man for thirty days,
    except to you, O king, shall be thrown into the lions’ den.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'from any god or man'; rendered 'to any god or man' in English because
      'make a petition' normally takes the addressee with 'to.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have consulted together.' The verb can emphasize joint deliberation
      as well as unified agreement.
    reason: lexical_alternative
  - marker: c
    text: Or 'royal decree' for 'royal statute.' The Aramaic legal terms here overlap
      in the field of decree, statute, and binding injunction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִתְיָעַטוּ
  chosen: have agreed together
  alternatives:
  - have consulted together
  - have taken counsel together
  lexicon: HALOT
  rationale: The Ithpael form conveys mutual deliberation/collusion. 'Have agreed
    together' captures both consultation and unified resolve in natural English.
- source_word: סָרְכֵי מַלְכוּתָא
  chosen: the high officials of the kingdom
  alternatives:
  - the administrators of the kingdom
  - the princes of the kingdom
  lexicon: HALOT
  rationale: An umbrella term for senior royal officials. 'High officials' is clear
    modern English and fits the list that follows.
- source_word: סִגְנַיָּא
  chosen: the prefects
  alternatives:
  - the deputies
  - the officials
  lexicon: HALOT
  rationale: A standard administrative title in Imperial Aramaic contexts; 'prefects'
    preserves official rank without archaic obscurity.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: This is the established historical term for Persian provincial rulers
    and is sufficiently familiar in English.
- source_word: הַדָּבְרַיָּא
  chosen: the counselors
  alternatives:
  - the advisers
  lexicon: HALOT
  rationale: Refers to royal advisers; 'counselors' is a natural rendering that preserves
    the advisory function.
- source_word: פַחֲוָתָא
  chosen: governors
  alternatives:
  - provincial governors
  - officials
  lexicon: HALOT
  rationale: A governmental office; 'governors' is the most straightforward English
    equivalent.
- source_word: לְקַיָּמָה קְיָם מַלְכָּא
  chosen: to establish a royal statute
  alternatives:
  - to set up a royal decree
  - to make firm a kingly statute
  lexicon: HALOT
  rationale: The verbal-nominal pairing intensifies the act of setting something in
    force. 'Establish a royal statute' reflects both the legal and royal dimensions.
- source_word: וּלְתַקָּפָה אֱסָר
  chosen: and to enforce an injunction
  alternatives:
  - and to make a prohibition binding
  - and to strengthen an interdict
  lexicon: HALOT
  rationale: The phrase denotes making a prohibition legally binding. 'Enforce an
    injunction' is readable modern legal English.
- source_word: יִבְעֵה בָעוּ
  chosen: makes a petition
  alternatives:
  - asks a request
  - seeks a petition
  - makes a plea
  lexicon: HALOT
  rationale: The idiom refers to formally requesting something. 'Makes a petition'
    fits the legal-political setting better than the more generic 'prays'.
- source_word: מִן כָּל אֱלָהּ וֶאֱנָשׁ
  chosen: to any god or man
  alternatives:
  - from any god or man
  lexicon: HALOT
  rationale: Although the preposition is literally 'from,' English idiom with 'petition'
    normally takes 'to' for the one addressed. This is an optimal-equivalence adjustment
    for naturalness while preserving sense.
- source_word: עַד יוֹמִין תְּלָתִין
  chosen: for thirty days
  alternatives:
  - until thirty days
  - within thirty days
  lexicon: HALOT
  rationale: The phrase marks the duration of the ban. 'For thirty days' is the clearest
    idiomatic rendering.
- source_word: לָהֵן מִנָּךְ
  chosen: except to you
  alternatives:
  - unless to you
  - other than to you
  lexicon: HALOT
  rationale: This expresses the sole exception to the prohibition. 'Except to you'
    is concise and natural.
- source_word: יִתְרְמֵא
  chosen: shall be thrown
  alternatives:
  - shall be cast
  lexicon: HALOT
  rationale: A passive/imperfect legal consequence. 'Shall be thrown' is contemporary
    and forceful.
- source_word: לְגֹב אַרְיָוָתָא
  chosen: into the lions’ den
  alternatives:
  - into the pit of lions
  lexicon: HALOT
  rationale: Traditional and accurate rendering for the place of punishment; 'den'
    is idiomatic English for this context.
