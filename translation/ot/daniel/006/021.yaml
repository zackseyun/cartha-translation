id: DAN.6.21
reference: Daniel 6:21
source:
  edition: WLC
  text: וּ/כְ/מִקְרְבֵ֣/הּ לְ/גֻבָּ֔/א לְ/דָ֣נִיֵּ֔אל בְּ/קָ֥ל עֲצִ֖יב זְעִ֑ק עָנֵ֨ה
    מַלְכָּ֜/א וְ/אָמַ֣ר לְ/דָנִיֵּ֗אל דָּֽנִיֵּאל֙ עֲבֵד֙ אֱלָהָ֣/א חַיָּ֔/א אֱלָהָ֗/ךְ
    דִּ֣י אנתה פָּֽלַֽח לֵ/הּ֙ בִּ/תְדִירָ֔/א הַ/יְכִ֥ל לְ/שֵׁיזָבוּתָ֖/ךְ מִן אַרְיָוָתָֽ/א־־׃
translation:
  text: And when he came near the den, he cried out to Daniel with a distressed voice.
    The king answered and said to Daniel, “Daniel, servant of the living God, has
    your God, whom you continually serve, been able to deliver you from the lions?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with a grieved/sorrowful voice.”
    reason: lexical_alternative
  - marker: b
    text: Or “whom you continually worship.” The Aramaic verb can denote religious
      service or worship.
    reason: lexical_alternative
  - marker: c
    text: Or “servant of the living God” could be rendered “slave of the living God,”
      though here the context favors the honorific sense of devoted service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְמִקְרְבֵהּ
  chosen: And when he came near
  alternatives:
  - And as he approached
  - And when he drew near
  lexicon: HALOT
  rationale: 'The compound conjunction plus infinitive/verb form marks temporal sequence:
    ''and when he came near/approached.'' ''Came near'' preserves the concrete motion
    while remaining natural English.'
- source_word: גֻבָּא
  chosen: den
  alternatives:
  - pit
  lexicon: HALOT
  rationale: In the Daniel lions narrative, 'den' is the most idiomatic and contextually
    precise rendering for the lions' enclosure. 'Pit' is possible more literally,
    but 'den' better matches the narrative setting without over-paraphrase.
- source_word: בְּקָל עֲצִיב
  chosen: with a distressed voice
  alternatives:
  - with a grieved voice
  - in a sorrowful voice
  lexicon: HALOT
  rationale: בְּקָל is 'with/in a voice,' and עֲצִיב conveys grief, pain, or distress.
    'Distressed voice' is readable modern English and preserves the king's emotional
    anguish.
- source_word: זְעִק
  chosen: he cried out
  alternatives:
  - he shouted
  - he called out
  lexicon: HALOT
  rationale: The verb denotes a loud cry. 'Cried out' captures both volume and urgency
    better than the flatter 'called out.'
- source_word: עָנֵה מַלְכָּא וְאָמַר
  chosen: The king answered and said
  alternatives:
  - The king spoke and said
  - The king responded and said
  lexicon: HALOT
  rationale: This is a standard Semitic speech formula. 'Answered and said' preserves
    the source structure and rhetorical force, even though no prior direct speech
    from Daniel is present in the immediate verse.
- source_word: עֲבֵד אֱלָהָא חַיָּא
  chosen: servant of the living God
  alternatives:
  - slave of the living God
  lexicon: HALOT
  rationale: עֲבֵד can denote servant/slave. Here it functions as a courtly-religious
    designation of Daniel's relation to God, not foregrounding bonded status in the
    way some NT δοῦλος contexts do. 'Servant' is therefore the best contextual rendering,
    while 'living God' straightforwardly renders the emphatic divine title.
- source_word: אֱלָהָךְ
  chosen: your God
  lexicon: HALOT
  rationale: Direct possessive form; simple and exact rendering.
- source_word: דִּי אנתה פָּלַח לֵהּ
  chosen: whom you ... serve
  alternatives:
  - whom you worship
  - to whom you render service
  lexicon: HALOT
  rationale: פָּלַח in Biblical Aramaic often denotes religious service/worship. 'Serve'
    preserves the lexical link with 'servant' and avoids narrowing the term to liturgical
    worship alone, while still fitting the religious context.
- source_word: בִּתְדִירָא
  chosen: continually
  alternatives:
  - constantly
  - persistently
  lexicon: HALOT
  rationale: The term denotes regular continuity. 'Continually' is natural and preserves
    the sense of ongoing habitual devotion.
- source_word: הַיְכִל
  chosen: has ... been able
  alternatives:
  - was ... able
  - could
  lexicon: HALOT
  rationale: 'The perfect in this question naturally looks to the completed event
    up to the present moment: whether God has proved able to rescue Daniel. ''Has
    been able'' best fits the English aspect in context.'
- source_word: לְשֵׁיזָבוּתָךְ
  chosen: to deliver you
  alternatives:
  - to rescue you
  - to save you
  lexicon: HALOT
  rationale: The verb means to deliver/rescue. 'Deliver' is a strong biblical English
    equivalent that preserves both physical rescue and possible theological resonance
    without overstating soteriological meaning.
- source_word: מִן אַרְיָוָתָא
  chosen: from the lions
  alternatives:
  - out of the lions' power
  lexicon: HALOT
  rationale: A direct and literal rendering of the prepositional phrase; no expansion
    is needed.
