theological_decisions:
- issue: Rendering Daniel's relation to God in עֲבֵד אֱלָהָא
  chosen_reading: servant of the living God
  alternative_readings:
  - slave of the living God
  rationale: Although the translation philosophy notes that bonded terms should sometimes
    be rendered 'slave' where that nuance is salient, this Aramaic term in this court
    narrative functions as an honorific description of loyal religious service. 'Servant'
    better reflects the contextual force without importing a stronger social-legal
    emphasis than the verse requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος by analogy for bonded-language sensitivity
- issue: Rendering פָּלַח as 'serve' rather than 'worship'
  chosen_reading: whom you continually serve
  alternative_readings:
  - whom you continually worship
  rationale: The verse emphasizes Daniel's ongoing faithful devotion to God in life,
    not merely cultic acts. 'Serve' preserves the broader semantic range and maintains
    the wordplay with 'servant,' while still allowing readers to hear the religious
    dimension.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 on consistency of key
    terms, documented exception not required here
