id: DAN.6.14
reference: Daniel 6:14
source:
  edition: WLC
  text: בֵּ֠/אדַיִן עֲנ֣וֹ וְ/אָמְרִין֮ קֳדָ֣ם מַלְכָּ/א֒ דִּ֣י דָנִיֵּ֡אל דִּי֩ מִן
    בְּנֵ֨י גָלוּתָ֜/א דִּ֣י יְה֗וּד לָא שָׂ֨ם עלי/ך מַלְכָּ/א֙ טְעֵ֔ם וְ/עַל אֱסָרָ֖/א
    דִּ֣י רְשַׁ֑מְתָּ וְ/זִמְנִ֤ין תְּלָתָה֙ בְּ/יוֹמָ֔/א בָּעֵ֖א בָּעוּתֵֽ/הּ־־־׃
translation:
  text: Then they answered and said before the king, “Daniel, who is one of the exiles
    from Judah, pays no attention to you, O king, or to the injunction that you have
    signed, but three times a day he makes his petition.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shows no regard for you.' The Aramaic idiom literally speaks of not
      setting attention or regard upon the king.
    reason: lexical_alternative
  - marker: b
    text: Or 'interdict' or 'decree' for 'injunction.' The term refers to a binding
      legal prohibition.
    reason: lexical_alternative
  - marker: c
    text: Literally 'he seeks his petition.' The expression means that he continues
      making his request in prayer; the recipient is not explicitly named in this
      clause, though the context identifies Daniel's God.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: עֲנוֹ וְאָמְרִין
  chosen: they answered and said
  alternatives:
  - they replied and said
  - they responded and said
  lexicon: HALOT
  rationale: A common Semitic speech formula. Retaining both verbs reflects the source
    rather than collapsing to a single English verb.
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - in the presence of the king
  - to the king
  lexicon: HALOT
  rationale: קֳדָם literally indicates being before someone/present to them. 'Before
    the king' preserves the formal court setting better than the simpler 'to the king'.
- source_word: דִּי דָנִיֵּאל
  chosen: Daniel
  lexicon: HALOT
  rationale: The relative particle introduces the content of their accusation; in
    English the name alone naturally carries the reference within direct speech.
- source_word: דִּי מִן בְּנֵי גָלוּתָא דִּי יְהוּד
  chosen: who is one of the exiles from Judah
  alternatives:
  - who is from the sons of the exile of Judah
  - who is one of the Judean exiles
  lexicon: HALOT
  rationale: בְּנֵי גָלוּתָא is an idiom for members of the deported community. 'One
    of the exiles from Judah' is idiomatic English while preserving the accusatory
    ethnic-political labeling.
- source_word: לָא שָׂם עֲלַיִךְ ... טְעֵם
  chosen: pays no attention to you
  alternatives:
  - has not set regard on you
  - shows no regard for you
  lexicon: HALOT
  rationale: The idiom 'set regard/attention upon' means to heed or pay attention.
    'Pays no attention to you' communicates the force clearly in modern English.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative repetition is explicit in the Aramaic and should be preserved
    to reflect the courtly address and rhetorical pressure.
- source_word: וְעַל אֱסָרָא דִּי רְשַׁמְתָּ
  chosen: or to the injunction that you have signed
  alternatives:
  - or to the interdict that you have signed
  - or to the decree that you have written down
  lexicon: HALOT
  rationale: אֱסָרָא denotes a binding prohibition or injunction in this context.
    'Injunction' captures the legal force without sounding overly technical. רְשַׁמְתָּ
    is rendered 'have signed' because the context is a formally enacted written edict.
- source_word: וְזִמְנִין תְּלָתָה בְּיוֹמָא
  chosen: but three times a day
  alternatives:
  - and three times in the day
  - and at three times in the day
  lexicon: HALOT
  rationale: Temporal phrase indicating repeated daily action. 'Three times a day'
    is the natural English equivalent.
- source_word: בָּעֵא בָּעוּתֵהּ
  chosen: he makes his petition
  alternatives:
  - he seeks his request
  - he prays his prayer
  - he asks his petition
  lexicon: HALOT
  rationale: The verb-noun combination intensifies the act of making a request. 'Makes
    his petition' preserves the formal sense of directed supplication without importing
    an explicit object not stated in this clause.
