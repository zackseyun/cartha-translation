theological_decisions:
- issue: Whether to make the object of Daniel's petition explicit as God
  chosen_reading: 'Leave the object implicit: ''he makes his petition'''
  alternative_readings:
  - he prays to his God
  - he makes his petition to God
  rationale: The immediate Aramaic clause does not explicitly state the recipient
    of the petition, though the broader context makes it clear. To avoid importing
    words not present in this verse, the translation preserves the clause as stated
    while allowing context to supply the referent.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
