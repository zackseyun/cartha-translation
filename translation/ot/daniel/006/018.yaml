id: DAN.6.18
reference: Daniel 6:18
source:
  edition: WLC
  text: וְ/הֵיתָ֨יִת֙ אֶ֣בֶן חֲדָ֔ה וְ/שֻׂמַ֖ת עַל פֻּ֣ם גֻּבָּ֑/א וְ/חַתְמַ֨/הּ מַלְכָּ֜/א
    בְּ/עִזְקְתֵ֗/הּ וּ/בְ/עִזְקָת֙ רַבְרְבָנ֔וֹ/הִי דִּ֛י לָא תִשְׁנֵ֥א צְב֖וּ בְּ/דָנִיֵּֽאל־־׃
translation:
  text: Then a single stone was brought and placed over the mouth of the pit, and
    the king sealed it with his signet ring and with the signet rings of his nobles,
    so that nothing concerning Daniel might be changed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that the matter concerning Daniel might not be altered.' The Aramaic
      צְבוּ can refer to a matter, intention, or decision.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן חֲדָה
  chosen: a single stone
  alternatives:
  - one stone
  - a certain stone
  lexicon: HALOT
  rationale: חֲדָה in Aramaic commonly means 'one.' In English, 'a single stone' conveys
    both the numeral and the sense of one stone being used to close the opening.
- source_word: וְשֻׂמַת עַל פֻּם גֻּבָּא
  chosen: placed over the mouth of the pit
  alternatives:
  - laid on the mouth of the den
  - set over the opening of the pit
  lexicon: HALOT
  rationale: פֻּם is literally 'mouth,' a common idiom for an opening; גֻּבָּא denotes
    a pit/cavity, here the lions' den. 'Pit' is closer to the Aramaic term, while
    'mouth' is retained because it is natural and concrete in English.
- source_word: וְחַתְמַהּ מַלְכָּא
  chosen: the king sealed it
  alternatives:
  - the king affixed his seal to it
  lexicon: HALOT
  rationale: The verb means to seal. English idiom prefers 'sealed it,' with the object
    supplied from context (the stone/opening).
- source_word: בְּעִזְקְתֵהּ
  chosen: with his signet ring
  alternatives:
  - with his seal
  - with his signet
  lexicon: HALOT
  rationale: עִזְקְתָא refers to a ring, here functioning as a sealing signet. 'Signet
    ring' makes the instrument explicit for modern readers.
- source_word: וּבְעִזְקָת רַבְרְבָנֹוהִי
  chosen: and with the signet rings of his nobles
  alternatives:
  - and with the seals of his lords
  - and with the signet rings of his officials
  lexicon: HALOT
  rationale: רַבְרְבָנִין/רַבְרְבָנֹוהִי refers to great men, nobles, or high officials.
    'Nobles' is concise and fits the courtly setting. Repeating 'signet rings' reflects
    the same noun as in the previous phrase.
- source_word: דִּי לָא תִשְׁנֵא צְבוּ בְדָנִיֵּאל
  chosen: so that nothing concerning Daniel might be changed
  alternatives:
  - so that the matter concerning Daniel might not be altered
  - so that no plan regarding Daniel might be changed
  lexicon: HALOT
  rationale: צְבוּ can denote will, intention, matter, or decision. In this context,
    the sealing prevents any alteration in Daniel's situation or the official arrangement.
    'Nothing concerning Daniel might be changed' captures the broad force without
    over-specifying.
- source_word: וְהֵיתָיִת
  chosen: Then ... was brought
  alternatives:
  - And ... was brought
  - There was brought
  lexicon: HALOT
  rationale: The form introduces the next event in narrative sequence. 'Then' gives
    natural English flow while preserving the conjunction's sequential force.
