theological_decisions:
- issue: Nature of Darius's accession
  chosen_reading: received the kingdom
  alternative_readings:
  - took the kingdom
  - became king over the kingdom
  rationale: The wording is kept close to the Aramaic and does not resolve historical
    or interpretive debates about whether Darius conquered, inherited, or was appointed
    over the realm. This preserves the text's limited claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
