id: DAN.6.1
reference: Daniel 6:1
source:
  edition: WLC
  text: וְ/דָרְיָ֨וֶשׁ֙ מָֽדָיָ֔/א קַבֵּ֖ל מַלְכוּתָ֑/א כְּ/בַ֥ר שְׁנִ֖ין שִׁתִּ֥ין
    וְ/תַרְתֵּֽין׃
translation:
  text: And Darius the Mede received the kingdom when he was about sixty-two years
    old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "took the kingdom." The Aramaic verb can be rendered more broadly, but
      "received" more closely reflects the wording and avoids implying a specific
      mechanism of accession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָרְיָוֶשׁ
  chosen: And Darius
  alternatives:
  - Now Darius
  - Then Darius
  lexicon: HALOT
  rationale: The conjunction וְ is rendered simply as "And," preserving the narrative
    linkage without overinterpreting the discourse relation. The proper name is transliterated
    per translation philosophy.
- source_word: מָדָיָא
  chosen: the Mede
  alternatives:
  - the Median
  lexicon: HALOT
  rationale: The gentilic is best rendered "the Mede" in idiomatic English, identifying
    Darius by ethnic/national origin. "The Median" is possible but less natural in
    modern English.
- source_word: קַבֵּל
  chosen: received
  alternatives:
  - took
  - accepted
  lexicon: HALOT
  rationale: The Aramaic verb commonly means "receive." "Received the kingdom" preserves
    the text's wording and avoids importing the stronger idea of seizing power that
    "took" might suggest.
- source_word: מַלְכוּתָא
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: '"Kingdom" is the most natural and contextually fitting rendering here,
    referring to royal dominion or rule. "Kingship" is possible but less idiomatic
    in this narrative context.'
- source_word: כְּבַר
  chosen: when he was about
  alternatives:
  - as a son of
  - at about
  lexicon: HALOT
  rationale: In this age formula, the idiom literally involving "son of" means "about
    ... years old" or "aged about." Rendering it idiomatically communicates the sense
    clearly in English while preserving the approximation signaled by the construction.
- source_word: שְׁנִין
  chosen: years old
  alternatives:
  - years
  lexicon: HALOT
  rationale: The plural noun means "years." In English age expressions, "years old"
    is the natural idiomatic completion.
- source_word: שִׁתִּין וְתַרְתֵּין
  chosen: sixty-two
  alternatives:
  - sixty and two
  lexicon: HALOT
  rationale: The cardinal numbers are rendered in standard contemporary English as
    "sixty-two."
