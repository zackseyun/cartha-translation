theological_decisions:
- issue: Daniel's prayer posture and practice under the royal decree
  chosen_reading: Rendered descriptively as Daniel continuing his established practice
    of kneeling, praying, and giving thanks toward Jerusalem.
  alternative_readings:
  - A more interpretive rendering could stress defiance against the king's edict.
  rationale: The verse narrates Daniel's actions without explicitly labeling them
    as protest. The translation preserves the text's emphasis on faithful continuity
    rather than importing a stronger ideological framing.
  doctrine_reference: Translation philosophy §1, §3
