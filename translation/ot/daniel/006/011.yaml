id: DAN.6.11
reference: Daniel 6:11
source:
  edition: WLC
  text: וְ֠/דָנִיֵּאל כְּ/דִ֨י יְדַ֜ע דִּֽי רְשִׁ֤ים כְּתָבָ/א֙ עַ֣ל לְ/בַיְתֵ֔/הּ
    וְ/כַוִּ֨ין פְּתִיחָ֥ן לֵ/הּ֙ בְּ/עִלִּיתֵ֔/הּ נֶ֖גֶד יְרוּשְׁלֶ֑ם וְ/זִמְנִין֩
    תְּלָתָ֨ה בְ/יוֹמָ֜/א ה֣וּא בָּרֵ֣ךְ עַל בִּרְכ֗וֹ/הִי וּ/מְצַלֵּ֤א וּ/מוֹדֵא֙
    קֳדָ֣ם אֱלָהֵ֔/הּ כָּ/ל קֳבֵל֙ דִּֽי הֲוָ֣א עָבֵ֔ד מִן קַדְמַ֖ת דְּנָֽה־׀־־־־׃ס
translation:
  text: And when Daniel knew that the document had been signed, he went to his house.
    Now the windows in his upper room were open toward Jerusalem, and three times
    a day he knelt on his knees and prayed and gave thanks before his God, just as
    he had been doing before this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the writing had been signed"; the Aramaic refers to the officially written
      decree being formally enacted.
    reason: lexical_alternative
  - marker: b
    text: Or "facing Jerusalem."
    reason: lexical_alternative
  - marker: c
    text: The phrase "he knelt on his knees" expresses Daniel's prayer posture; the
      underlying verb is associated with kneeling here in context.
    reason: cultural_note
lexical_decisions:
- source_word: כְּדִי
  chosen: when
  alternatives:
  - as soon as
  - after
  lexicon: HALOT
  rationale: 'Introduces the temporal circumstance: ''when Daniel knew.'' ''When''
    is natural English and preserves the Aramaic conjunction''s temporal force without
    over-specifying immediacy.'
- source_word: יְדַע
  chosen: knew
  alternatives:
  - learned
  - came to know
  lexicon: HALOT
  rationale: Simple past 'knew' fits the narrative sequence and reflects Daniel's
    awareness of the decree's status.
- source_word: רְשִׁים כְּתָבָא
  chosen: the document had been signed
  alternatives:
  - the writing had been signed
  - the decree had been registered
  lexicon: HALOT
  rationale: The Aramaic idiom refers to the official written injunction being formally
    signed/enacted. 'Document' is clearer modern English than 'writing,' while 'signed'
    preserves the legal-administrative sense.
- source_word: עַל לְבַיְתֵהּ
  chosen: he went to his house
  alternatives:
  - he entered his house
  - he came to his house
  lexicon: HALOT
  rationale: In context the phrase marks Daniel's movement home after learning of
    the decree. 'He went to his house' is idiomatic English and captures the narrative
    action.
- source_word: כַוִּין
  chosen: windows
  alternatives:
  - window openings
  - lattices
  lexicon: HALOT
  rationale: Standard rendering for the architectural openings. 'Windows' is the clearest
    natural equivalent.
- source_word: פְּתִיחָן
  chosen: were open
  alternatives:
  - stood open
  - had been opened
  lexicon: HALOT
  rationale: Predicate participial/adjectival sense describing the state of the windows.
    'Were open' is straightforward and avoids implying a recent action.
- source_word: עִלִּיתֵהּ
  chosen: his upper room
  alternatives:
  - his roof chamber
  - his upstairs room
  lexicon: HALOT
  rationale: Refers to an upper chamber. 'Upper room' is both accurate and familiar
    in English Bible style without being archaic.
- source_word: נֶגֶד יְרוּשְׁלֶם
  chosen: toward Jerusalem
  alternatives:
  - facing Jerusalem
  - in the direction of Jerusalem
  lexicon: HALOT
  rationale: Expresses orientation. 'Toward Jerusalem' is concise and natural.
- source_word: זִמְנִין תְּלָתָה בְיוֹמָא
  chosen: three times a day
  alternatives:
  - at three times in the day
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the temporal expression.
- source_word: בָּרֵךְ עַל בִּרְכֹוהִי
  chosen: he knelt on his knees
  alternatives:
  - he kneeled on his knees
  - he blessed on his knees
  lexicon: HALOT
  rationale: Although the verb can be associated with blessing, in this idiom with
    'on his knees' it denotes kneeling. This best fits the physical posture described
    in context.
- source_word: מְצַלֵּא
  chosen: prayed
  alternatives:
  - was praying
  lexicon: HALOT
  rationale: Core verbal action in the sequence. Simple past suits the narrative.
- source_word: מוֹדֵא
  chosen: gave thanks
  alternatives:
  - made confession
  - praised
  lexicon: HALOT
  rationale: In this context before God, the verb most naturally conveys thanksgiving.
    'Gave thanks' preserves the devotional nuance.
- source_word: קֳדָם אֱלָהֵהּ
  chosen: before his God
  alternatives:
  - in the presence of his God
  - to his God
  lexicon: HALOT
  rationale: קֳדָם is spatial/relational, 'before.' This preserves the reverential
    posture of prayer.
- source_word: כָּל־קֳבֵל דִּי
  chosen: just as
  alternatives:
  - because
  - inasmuch as
  lexicon: HALOT
  rationale: Here the phrase introduces comparison with Daniel's prior custom, not
    causation. 'Just as' best fits the syntax with the following clause.
- source_word: הֲוָא עָבֵד מִן קַדְמַת דְּנָה
  chosen: he had been doing before this
  alternatives:
  - he had done previously
  - he was accustomed to doing before this
  lexicon: HALOT
  rationale: The periphrastic construction indicates customary prior action. 'Had
    been doing before this' clearly conveys ongoing prior practice.
