id: DAN.6.4
reference: Daniel 6:4
source:
  edition: WLC
  text: אֱדַ֨יִן֙ דָּנִיֵּ֣אל דְּנָ֔ה הֲוָ֣א מִתְנַצַּ֔ח עַל סָרְכַיָּ֖/א וַ/אֲחַשְׁדַּרְפְּנַיָּ֑/א
    כָּ/ל קֳבֵ֗ל דִּ֣י ר֤וּחַ יַתִּירָא֙ בֵּ֔/הּ וּ/מַלְכָּ֣/א עֲשִׁ֔ית לַ/הֲקָמוּתֵ֖/הּ
    עַל כָּל מַלְכוּתָֽ/א־־־־׃
translation:
  text: Then this Daniel distinguished himself above the high officials and the satraps,
    because an extraordinary spirit was in him, and the king planned to set him over
    the whole kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an excellent spirit was in him.' The phrase may refer broadly to Daniel's
      exceptional inner quality, wisdom, or disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king intended to appoint him over the whole kingdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next development in the narrative.
    'Then' is natural modern English and preserves the narrative flow.
- source_word: דָּנִיֵּאל דְּנָה
  chosen: this Daniel
  alternatives:
  - Daniel himself
  - Daniel
  lexicon: HALOT
  rationale: The demonstrative adds emphasis, not merely identification. 'This Daniel'
    preserves the marked Aramaic phrasing better than a bare 'Daniel'.
- source_word: הֲוָא מִתְנַצַּח
  chosen: distinguished himself
  alternatives:
  - was distinguishing himself
  - was surpassing
  - was excelling
  lexicon: HALOT
  rationale: The construction conveys ongoing or characteristic superiority/excellence.
    'Distinguished himself' captures the idiomatic sense in clear English without
    woodenly reproducing the participial form.
- source_word: עַל
  chosen: above
  alternatives:
  - over
  - beyond
  lexicon: HALOT
  rationale: Here the preposition marks comparative superiority relative to the other
    officials, not yet appointment to authority. 'Above' fits the comparison.
- source_word: סָרְכַיָּא
  chosen: the high officials
  alternatives:
  - the commissioners
  - the administrators
  - the presidents
  lexicon: HALOT
  rationale: The Aramaic term refers to senior officials in the imperial administration.
    'High officials' is readable modern English and avoids overly traditional but
    potentially misleading institutional labels like 'presidents.'
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: the satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: '''Satraps'' is the standard historical term for this Persian office
    and is sufficiently established in English Bible usage. It preserves the specific
    administrative title better than a generalized gloss.'
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for that
  lexicon: HALOT
  rationale: This Aramaic expression gives the reason for Daniel's superiority. 'Because'
    is the clearest modern rendering.
- source_word: רוּחַ יַתִּירָא
  chosen: an extraordinary spirit
  alternatives:
  - an excellent spirit
  - an exceptional spirit
  lexicon: HALOT
  rationale: The phrase denotes exceptional quality in Daniel. 'Extraordinary spirit'
    communicates the sense in contemporary English while preserving the metaphorical
    'spirit' language rather than flattening it to mere ability.
- source_word: בֵּהּ
  chosen: was in him
  alternatives:
  - was within him
  lexicon: HALOT
  rationale: The prepositional phrase indicates that this extraordinary spirit characterized
    Daniel internally. 'Was in him' is the most natural rendering.
- source_word: וּמַלְכָּא עֲשִׁית
  chosen: and the king planned
  alternatives:
  - and the king intended
  - and the king was minded
  lexicon: HALOT
  rationale: The idiom expresses the king's resolve or intention rather than completed
    action. 'Planned' is concise and natural, though 'intended' is also possible.
- source_word: לַהֲקָמוּתֵהּ
  chosen: to set him
  alternatives:
  - to appoint him
  - to establish him
  lexicon: HALOT
  rationale: The causative infinitive means to cause him to stand, idiomatically to
    place or appoint him in office. 'Set him' preserves the broad sense without over-specifying
    bureaucratic procedure.
- source_word: עַל כָּל מַלְכוּתָא
  chosen: over the whole kingdom
  alternatives:
  - over all the kingdom
  - over the entire realm
  lexicon: HALOT
  rationale: The phrase indicates authority over the entire royal domain. 'Whole kingdom'
    is idiomatic and clear.
