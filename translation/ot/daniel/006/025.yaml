id: DAN.6.25
reference: Daniel 6:25
source:
  edition: WLC
  text: וַ/אֲמַ֣ר מַלְכָּ֗/א וְ/הַיְתִ֞יו גֻּבְרַיָּ֤/א אִלֵּךְ֙ דִּֽי אֲכַ֤לוּ קַרְצ֨וֹ/הִי֙
    דִּ֣י דָֽנִיֵּ֔אל וּ/לְ/גֹ֤ב אַרְיָוָתָ/א֙ רְמ֔וֹ אִנּ֖וּן בְּנֵי/ה֣וֹן וּ/נְשֵׁי/ה֑וֹן
    וְ/לָֽא מְט֞וֹ לְ/אַרְעִ֣ית גֻּבָּ֗/א עַ֠ד דִּֽי שְׁלִ֤טֽוּ בְ/הוֹן֙ אַרְיָ֣וָתָ֔/א
    וְ/כָל גַּרְמֵי/ה֖וֹן הַדִּֽקוּ־־־־׃
translation:
  text: Then the king commanded, and those men who had maliciously accused Daniel
    were brought and thrown into the lions’ den—they, their sons, and their wives.
    And before they reached the bottom of the den, the lions overpowered them and
    crushed all their bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic idiom, literally 'ate his pieces'; that is, they slandered or maliciously
      accused Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַר
  chosen: Then ... commanded
  alternatives:
  - said
  - ordered
  lexicon: HALOT
  rationale: Although the lemma is 'say,' in royal narrative with the following execution
    of judgment it functions idiomatically as a command. 'Then' reflects the waw-consecutive
    narrative progression.
- source_word: וְהַיְתִיו
  chosen: were brought
  alternatives:
  - were caused to come
  - were brought in
  lexicon: HALOT
  rationale: The causative form indicates that the men were made to come before the
    king or to the place of execution. 'Were brought' is natural English and preserves
    the passive/causative sense.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: those men
  alternatives:
  - these men
  lexicon: HALOT
  rationale: Demonstrative plus noun points to a specific previously mentioned group,
    namely Daniel's accusers. 'Those men' fits English narrative reference.
- source_word: אֲכַלוּ קַרְצֹוהִי דִּי דָנִיֵּאל
  chosen: had maliciously accused Daniel
  alternatives:
  - had slandered Daniel
  - had eaten his pieces/charges against Daniel
  - had denounced Daniel
  lexicon: HALOT
  rationale: The Aramaic idiom 'eat the pieces of' means to slander, accuse, or inform
    against someone. 'Maliciously accused' captures both the forensic and hostile
    sense in context.
- source_word: וּלְגֹב אַרְיָוָתָא רְמוֹ
  chosen: were ... thrown into the lions’ den
  alternatives:
  - cast into the pit of lions
  - thrown into the den of lions
  lexicon: HALOT
  rationale: גּוֹב denotes a pit/den; in this chapter 'den' is the established contextual
    sense. 'Thrown' is vivid and matches the violent judicial action.
- source_word: אִנּוּן בְּנֵיהוֹן וּנְשֵׁיהוֹן
  chosen: they, their sons, and their wives
  alternatives:
  - them, their children, and their wives
  lexicon: HALOT
  rationale: The pronoun plus family members is emphatic. 'Sons' is more precise than
    'children' because the source specifically says sons.
- source_word: וְלָא מְטוֹ לְאַרְעִית גֻּבָּא
  chosen: before they reached the bottom of the den
  alternatives:
  - before they reached the floor of the den
  - and they had not reached the ground of the den
  lexicon: HALOT
  rationale: Literally 'they had not reached the ground/bottom of the den.' 'Before
    they reached the bottom' is idiomatic and preserves the temporal force.
- source_word: עַד דִּי
  chosen: before
  alternatives:
  - until
  lexicon: HALOT
  rationale: 'In this negative-temporal construction, English ''before'' best conveys
    the sense: the lions attacked prior to the victims'' reaching the bottom.'
- source_word: שְׁלִטוּ בְהוֹן אַרְיָוָתָא
  chosen: the lions overpowered them
  alternatives:
  - the lions had mastery over them
  - the lions seized them
  lexicon: HALOT
  rationale: The verb conveys domination or mastery. 'Overpowered' is strong, natural
    English that fits the immediate violent context.
- source_word: וְכָל גַּרְמֵיהוֹן הַדִּקוּ
  chosen: and crushed all their bones
  alternatives:
  - and broke all their bones
  - and shattered all their bones
  lexicon: HALOT
  rationale: The phrase describes total bone-crushing. 'Crushed' communicates the
    brutality clearly; 'all their bones' preserves the comprehensiveness.
