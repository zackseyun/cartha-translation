theological_decisions:
- issue: Corporate punishment of the accusers' families
  chosen_reading: 'Retain the text''s plain historical statement: ''they, their sons,
    and their wives,'' without softening or moral commentary.'
  alternative_readings:
  - Render more generally as 'their children'
  - Omit family members for ethical discomfort
  rationale: The verse explicitly includes the families in the king's judgment. Translation
    should not mute the severity of the narrative or import a theological justification/condemnation
    not stated in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
