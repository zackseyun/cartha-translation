id: DAN.6.7
reference: Daniel 6:7
source:
  edition: WLC
  text: אֱ֠דַיִן סָרְכַיָּ֤/א וַ/אֲחַשְׁדַּרְפְּנַיָּ/א֙ אִלֵּ֔ן הַרְגִּ֖שׁוּ עַל
    מַלְכָּ֑/א וְ/כֵן֙ אָמְרִ֣ין לֵ֔/הּ דָּרְיָ֥וֶשׁ מַלְכָּ֖/א לְ/עָלְמִ֥ין חֱיִֽי־׃
translation:
  text: 'Then these high officials and satraps came as a group to the king and said
    this to him: “King Darius, live forever!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “assembled before the king,” “came by agreement to the king,” or “came
      tumultuously to the king.” The Aramaic idiom emphasizes a coordinated collective
      approach and may imply conspiratorial intent from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally, “King Darius, live for ages.” This is a conventional court acclamation,
      not a literal claim of immortality.
    reason: cultural_note
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next event in the narrative.
    'Then' is natural modern English and preserves the narrative flow.
- source_word: סָרְכַיָּא
  chosen: high officials
  alternatives:
  - commissioners
  - presidents
  - officials
  lexicon: HALOT
  rationale: Aramaic administrative title for senior imperial officers. 'High officials'
    communicates rank clearly in modern English without relying on archaic or tradition-bound
    terminology like 'presidents.'
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: Established historical term for Persian provincial rulers/administrators.
    Here transliterated as a recognized English historical word rather than paraphrased,
    preserving the Persian administrative setting.
- source_word: אִלֵּן
  chosen: these
  alternatives:
  - those
  lexicon: HALOT
  rationale: Demonstrative referring to the immediately mentioned officials. 'These'
    fits the deictic force in context.
- source_word: הַרְגִּשׁוּ עַל
  chosen: came as a group to
  alternatives:
  - assembled before
  - came tumultuously to
  - thronged around
  - came by agreement to
  lexicon: HALOT
  rationale: The idiom in Daniel conveys coordinated, collective approach, often with
    a sense of conspiring or pressing in together. 'Came as a group to' preserves
    the collective force without overinterpreting motive in the main text. The more
    loaded possibilities are preserved in a footnote.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Definite royal title in narrative reference. Standard rendering.
- source_word: וְכֵן
  chosen: this
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: Introduces the content of their speech. In idiomatic English, 'said this
    to him' is smoother than the more wooden 'and thus they said to him.'
- source_word: אָמְרִין
  chosen: said
  alternatives:
  - were saying
  lexicon: HALOT
  rationale: Historical present/participle-like form rendered with simple past for
    natural English narrative sequence.
- source_word: לֵהּ
  chosen: to him
  lexicon: HALOT
  rationale: Indirect object pronoun referring to the king; explicit in English for
    clarity.
- source_word: דָּרְיָוֶשׁ
  chosen: Darius
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: מַלְכָּא
  chosen: King
  lexicon: HALOT
  rationale: 'Vocative royal title in direct address. English idiom places the title
    before the name: ''King Darius.'''
- source_word: לְעָלְמִין
  chosen: forever
  alternatives:
  - for ages
  - for ever
  lexicon: HALOT
  rationale: Idiomatic expression in royal acclamation meaning enduring life/reign.
    'Forever' is clear modern English.
- source_word: חֱיִי
  chosen: live
  alternatives:
  - may you live
  lexicon: HALOT
  rationale: Imperative in a conventional blessing/acclamation. English idiom commonly
    renders the formula as 'live forever'; the optative nuance is understood and can
    be noted in a footnote if needed.
