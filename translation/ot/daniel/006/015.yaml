id: DAN.6.15
reference: Daniel 6:15
source:
  edition: WLC
  text: אֱדַ֨יִן מַלְכָּ֜/א כְּ/דִ֧י מִלְּתָ֣/א שְׁמַ֗ע שַׂגִּיא֙ בְּאֵ֣שׁ עֲל֔וֹ/הִי
    וְ/עַ֧ל דָּנִיֵּ֛אל שָׂ֥ם בָּ֖ל לְ/שֵׁיזָבוּתֵ֑/הּ וְ/עַד֙ מֶֽעָלֵ֣י שִׁמְשָׁ֔/א
    הֲוָ֥א מִשְׁתַּדַּ֖ר לְ/הַצָּלוּתֵֽ/הּ׃
translation:
  text: Then the king, when he heard the statement, was greatly distressed, and he
    set his mind on delivering Daniel; and until the going down of the sun he kept
    striving to rescue him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was very displeased with himself'; the Aramaic idiom is literally 'was
      very distressed/displeased upon himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined noun with emphatic state; 'the king' reflects the definite
    reference in context.
- source_word: כְּדִי
  chosen: when
  alternatives:
  - as soon as
  - that
  lexicon: HALOT
  rationale: Here the conjunction introduces a temporal clause with the following
    verb 'heard'; 'when' best fits the syntax.
- source_word: מִלְּתָא
  chosen: the statement
  alternatives:
  - the word
  - the matter
  - the report
  lexicon: HALOT
  rationale: The term can mean 'word, matter, statement.' In this legal-court setting,
    'the statement' captures the specific pronouncement just delivered without sounding
    archaic.
- source_word: שְׁמַע
  chosen: he heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: Simple past narrative rendering of the Aramaic perfect in context.
- source_word: שַׂגִּיא בְּאֵשׁ עֲלֹוהִי
  chosen: was greatly distressed
  alternatives:
  - was very displeased with himself
  - was exceedingly grieved
  lexicon: HALOT
  rationale: The idiom literally conveys being very distressed/displeased upon himself.
    English 'was greatly distressed' communicates the king's strong inner agitation
    without over-literal awkwardness. Because the reflexive nuance may suggest self-directed
    displeasure, that alternative is preserved in a footnote.
- source_word: וְעַל דָּנִיֵּאל
  chosen: and ... Daniel
  alternatives:
  - concerning Daniel
  - for Daniel
  lexicon: HALOT
  rationale: The preposition marks the object of the king's concern and action. In
    idiomatic English this is best absorbed into the clause 'he set his mind on delivering
    Daniel.'
- source_word: שָׂם בָּל
  chosen: he set his mind
  alternatives:
  - he fixed his heart
  - he determined
  lexicon: HALOT
  rationale: Aramaic idiom literally 'he set heart.' 'Set his mind' is a readable
    modern equivalent expressing deliberate resolve.
- source_word: לְשֵׁיזָבוּתֵהּ
  chosen: on delivering him
  alternatives:
  - to save him
  - to rescue him
  lexicon: HALOT
  rationale: The verb denotes deliverance/rescue. 'Delivering' fits the legal-danger
    context and pairs well with the following clause; the pronoun refers to Daniel.
- source_word: וְעַד מֶעָלֵי שִׁמְשָׁא
  chosen: and until the going down of the sun
  alternatives:
  - until sunset
  - until sundown
  lexicon: HALOT
  rationale: Literally 'until the going up/over of the sun' in idiomatic Aramaic for
    sunset. A more formal rendering preserves the imagery while remaining understandable.
- source_word: הֲוָא מִשְׁתַּדַּר
  chosen: he kept striving
  alternatives:
  - he was making every effort
  - he continued exerting himself
  lexicon: HALOT
  rationale: Periphrastic construction expressing ongoing effort. 'Kept striving'
    captures the durative sense succinctly.
- source_word: לְהַצָּלוּתֵהּ
  chosen: to rescue him
  alternatives:
  - to save him
  - to deliver him
  lexicon: HALOT
  rationale: A second rescue/deliverance term. 'Rescue' provides natural variation
    in English while preserving the semantic field of saving from danger; the variation
    from 'delivering' is contextual and documented here.
