id: DAN.6.12
reference: Daniel 6:12
source:
  edition: WLC
  text: אֱ֠דַיִן גֻּבְרַיָּ֤/א אִלֵּךְ֙ הַרְגִּ֔שׁוּ וְ/הַשְׁכַּ֖חוּ לְ/דָנִיֵּ֑אל
    בָּעֵ֥א וּ/מִתְחַנַּ֖ן קֳדָ֥ם אֱלָהֵֽ/הּ׃
translation:
  text: Then these men came by agreement and found Daniel petitioning and pleading
    for favor before his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'came together' or 'came tumultuously.' The Aramaic verb likely carries
      the sense that these men assembled in concert, with a coordinated purpose.
    reason: lexical_alternative
  - marker: b
    text: Or, 'praying and making supplication before his God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic temporal adverb introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: Demonstrative + plural noun in Aramaic. 'These men' fits the immediate
    narrative reference to the conspirators just mentioned.
- source_word: הַרְגִּשׁוּ
  chosen: came by agreement
  alternatives:
  - came tumultuously
  - came together
  - assembled
  lexicon: HALOT
  rationale: In Daniel's Aramaic this verb commonly carries the sense of acting in
    concert or assembling with a coordinated purpose (cf. repeated usage in the chapter).
    'Came by agreement' best captures the conspiratorial nuance without over-paraphrase.
- source_word: וְהַשְׁכַּחוּ
  chosen: and found
  alternatives:
  - and discovered
  lexicon: HALOT
  rationale: Straightforward narrative verb meaning they found/discovered Daniel in
    the act. 'Found' is idiomatic and sufficiently precise.
- source_word: לְדָנִיֵּאל
  chosen: Daniel
  rationale: Standard English transliteration of the proper name.
- source_word: בָּעֵא
  chosen: petitioning
  alternatives:
  - asking
  - seeking
  lexicon: HALOT
  rationale: Participle denoting making a request. 'Petitioning' preserves the prayer/request
    sense in a reverent register appropriate to prayer.
- source_word: וּמִתְחַנַּן
  chosen: and pleading for favor
  alternatives:
  - and making supplication
  - and imploring mercy
  lexicon: HALOT
  rationale: Reflexive/intensive participle from a root associated with seeking favor
    or mercy. 'Pleading for favor' is readable modern English and preserves the earnestness
    of supplication.
- source_word: קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Common preposition meaning 'before' or 'in the presence of.' 'Before'
    is concise and natural in English prayer language.
- source_word: אֱלָהֵהּ
  chosen: his God
  lexicon: HALOT
  rationale: Construct form with 3ms suffix. Lowercase 'God' is appropriate here as
    an English common noun with possessive, referring truly to Daniel's God without
    needing the covenant name in the source text.
