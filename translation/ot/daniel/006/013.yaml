theological_decisions:
- issue: Generic masculine אֱנָשׁ in legal formulation
  chosen_reading: any man
  alternative_readings:
  - any person
  - anyone
  rationale: The source uses a grammatically masculine singular noun with generic
    force. Per translation philosophy, the rendering remains gender-accurate rather
    than neutralized, since the legal formula is not explicitly inclusive language
    in the source.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of אֱסָר in this context
  chosen_reading: injunction
  alternative_readings:
  - decree
  - interdict
  rationale: The term refers to a binding prohibition rather than a general royal
    decree. 'Injunction' preserves the legal and restrictive force without over-paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
