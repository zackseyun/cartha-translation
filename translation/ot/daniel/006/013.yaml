id: DAN.6.13
reference: Daniel 6:13
source:
  edition: WLC
  text: בֵּ֠/אדַיִן קְרִ֨יבוּ וְ/אָמְרִ֥ין קֳדָם מַלְכָּ/א֮ עַל אֱסָ֣ר מַלְכָּ/א֒
    הֲ/לָ֧א אֱסָ֣ר רְשַׁ֗מְתָּ דִּ֣י כָל אֱנָ֡שׁ דִּֽי יִבְעֵה֩ מִן כָּל אֱלָ֨הּ וֶֽ/אֱנָ֜שׁ
    עַד יוֹמִ֣ין תְּלָתִ֗ין לָהֵן֙ מִנָּ֣/ךְ מַלְכָּ֔/א יִתְרְמֵ֕א לְ/ג֖וֹב אַרְיָותָ֑/א
    עָנֵ֨ה מַלְכָּ֜/א וְ/אָמַ֗ר יַצִּיבָ֧א מִלְּתָ֛/א כְּ/דָת מָדַ֥י וּ/פָרַ֖ס דִּי
    לָ֥א תֶעְדֵּֽא־־־־־־־־־׃
translation:
  text: 'Then they came near and spoke before the king concerning the king’s injunction:
    “Did you not sign an injunction that any man who makes a petition to any god or
    man for thirty days, except to you, O king, shall be thrown into the lions’ den?”
    The king answered and said, “The matter is certain, according to the law of the
    Medes and Persians, which cannot be changed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “decree” or “interdict” for “injunction”; the Aramaic term refers specifically
      to a binding prohibition.
    reason: lexical_alternative
  - marker: b
    text: “Any man” renders a grammatically masculine singular term used generically
      in this legal statement; alternatively, “any person.”
    reason: lexical_alternative
  - marker: c
    text: Or “which cannot be revoked” or “which cannot be altered.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: קְרִיבוּ
  chosen: they came near
  alternatives:
  - they approached
  lexicon: HALOT
  rationale: The verb denotes drawing near/approaching. 'Came near' keeps the concrete
    movement before the king.
- source_word: וְאָמְרִין קֳדָם מַלְכָּא
  chosen: and spoke before the king
  alternatives:
  - and said before the king
  - and spoke in the presence of the king
  lexicon: HALOT
  rationale: The participial form in narrative functions verbally. 'Spoke before the
    king' reflects both the speech act and the formal court setting indicated by קֳדָם.
- source_word: עַל אֱסָר מַלְכָּא
  chosen: concerning the king’s injunction
  alternatives:
  - about the king's interdict
  - regarding the king's decree
  lexicon: HALOT
  rationale: אֱסָר here refers specifically to the prohibitory edict just issued.
    'Injunction' captures the binding, restrictive sense better than the broader 'decree.'
- source_word: הֲלָא
  chosen: Did you not
  alternatives:
  - Have you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Did you not'
    fits the past action of signing the edict.
- source_word: רְשַׁמְתָּ
  chosen: sign
  alternatives:
  - record
  - inscribe
  lexicon: HALOT
  rationale: In this legal context the verb refers to formally putting the decree
    into written force. 'Sign' is idiomatic and legally clear in English.
- source_word: כָל אֱנָשׁ
  chosen: any man
  alternatives:
  - any person
  - anyone
  lexicon: HALOT
  rationale: The Aramaic noun is singular 'man/person.' Following the project's gender-accurate
    principle, 'any man' preserves the source form while still functioning generically
    in context.
- source_word: יִבְעֵה
  chosen: makes a petition
  alternatives:
  - asks
  - makes request
  - seeks
  lexicon: HALOT
  rationale: The verb here refers to making a formal request or petition. 'Makes a
    petition' matches the legal-court context better than the more general 'asks.'
- source_word: מִן כָּל אֱלָהּ וֶאֱנָשׁ
  chosen: to any god or man
  alternatives:
  - from any god or man
  lexicon: HALOT
  rationale: Though מִן often means 'from,' with verbs of requesting English idiom
    normally uses 'to' for the one petitioned. This best conveys the sense without
    woodenness.
- source_word: עַד יוֹמִין תְּלָתִין
  chosen: for thirty days
  alternatives:
  - until thirty days
  - within thirty days
  lexicon: HALOT
  rationale: Idiomatic expression marking the duration of the ban. 'For thirty days'
    is the clearest natural rendering.
- source_word: לָהֵן מִנָּךְ
  chosen: except to you
  alternatives:
  - unless it is from you
  - other than from you
  lexicon: HALOT
  rationale: The phrase sets an exception to the prohibition. In English, because
    the petition is directed toward the recipient, 'except to you' communicates the
    intended sense most clearly.
- source_word: יִתְרְמֵא
  chosen: shall be thrown
  alternatives:
  - shall be cast
  - is to be thrown
  lexicon: HALOT
  rationale: Passive/imperfect in legal consequence clause. 'Shall be thrown' preserves
    the formal penal force.
- source_word: לְגוֹב אַרְיָותָא
  chosen: into the lions’ den
  alternatives:
  - into the pit of lions
  lexicon: HALOT
  rationale: Traditional and accurate rendering for the place of punishment; 'den'
    is idiomatic English for this expression.
- source_word: יַצִּיבָא מִלְּתָא
  chosen: The matter is certain
  alternatives:
  - The word is firm
  - The statement is certain
  - The thing stands firm
  lexicon: HALOT
  rationale: The king affirms the validity/fixedness of the decree. 'The matter is
    certain' is natural English and preserves the sense of firmness.
- source_word: כְּדָת מָדַי וּפָרַס
  chosen: according to the law of the Medes and Persians
  alternatives:
  - according to the law of Media and Persia
  lexicon: HALOT
  rationale: Refers to the established legal custom of the empire. 'Medes and Persians'
    is the standard people-group expression in English and fits the context.
- source_word: דִּי לָא תֶעְדֵּא
  chosen: which cannot be changed
  alternatives:
  - which does not pass away
  - which cannot be revoked
  - which cannot be altered
  lexicon: HALOT
  rationale: The clause describes the irrevocability of the law. 'Cannot be changed'
    is broad, clear, and contextually precise.
