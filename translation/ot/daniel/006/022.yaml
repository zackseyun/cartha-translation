id: DAN.6.22
reference: Daniel 6:22
source:
  edition: WLC
  text: אֱדַ֨יִן֙ דָּנִיֶּ֔אל עִם מַלְכָּ֖/א מַלִּ֑ל מַלְכָּ֖/א לְ/עָלְמִ֥ין חֱיִֽי־׃
translation:
  text: 'Then Daniel spoke with the king: “O king, live forever!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “May the king live forever!” The Aramaic uses a conventional
      royal blessing formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse adverb marking sequence in narrative. 'Then' is the
    most natural modern English connector and preserves the temporal progression.
- source_word: דָּנִיֶּאל
  chosen: Daniel
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: עִם
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: The preposition literally means 'with,' and in this idiom with a verb
    of speaking it can indicate the person addressed. 'Spoke with the king' preserves
    the source wording more closely than simply 'said to the king,' while remaining
    natural English.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - O king
  lexicon: HALOT
  rationale: First occurrence is the object of Daniel's speaking and is best rendered
    as the definite noun phrase 'the king.' The vocative force belongs more clearly
    to the second occurrence.
- source_word: מַלִּל
  chosen: spoke
  alternatives:
  - said
  - answered and said
  lexicon: HALOT
  rationale: Peal perfect of 'to speak/say.' 'Spoke' fits well with the accompanying
    preposition 'with' and avoids importing 'answered,' which is not present in this
    verse.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Second occurrence functions vocatively in direct address. English idiom
    naturally supplies 'O' in elevated speech, especially in royal address, matching
    the tone without becoming archaic.
- source_word: לְעָלְמִין
  chosen: forever
  alternatives:
  - for ages
  - for ever
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression meaning enduring duration. 'Forever' is
    the standard natural English rendering in royal blessing formulas.
- source_word: חֱיִי
  chosen: live
  alternatives:
  - may you live
  lexicon: HALOT
  rationale: Imperative/jussive-like formula in blessing. English idiom in this stock
    expression is 'live forever!' even though the sense is optative ('may you live
    forever').
