id: DAN.6.6
reference: Daniel 6:6
source:
  edition: WLC
  text: אֱ֠דַיִן גֻּבְרַיָּ֤/א אִלֵּךְ֙ אָֽמְרִ֔ין דִּ֣י לָ֧א נְהַשְׁכַּ֛ח לְ/דָנִיֵּ֥אל
    דְּנָ֖ה כָּל עִלָּ֑א לָהֵ֕ן הַשְׁכַּ֥חְנָֽה עֲל֖וֹ/הִי בְּ/דָ֥ת אֱלָהֵֽ/הּ־׃ס
translation:
  text: Then these men said, ‘We will not find any charge against this Daniel unless
    we find it against him in the law of his God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “any ground for accusation” for “any charge.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next development in the narrative.
    'Then' is natural modern English and preserves the flow.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - those men
  - these officials
  lexicon: HALOT
  rationale: Literally 'these men.' Although the broader context identifies them as
    royal officials, the source here uses the ordinary term for men, so the main text
    keeps that wording rather than importing a more specific title.
- source_word: אָמְרִין
  chosen: said
  alternatives:
  - were saying
  lexicon: HALOT
  rationale: Narrative verb of speech. Simple past fits English storytelling style
    without overtranslating aspect.
- source_word: דִּי לָא נְהַשְׁכַּח
  chosen: We will not find
  alternatives:
  - We cannot find
  - We would not find
  lexicon: HALOT
  rationale: The Aramaic imperfect here expresses expected future result from their
    search. 'Will not find' best captures their conclusion and plan in context.
- source_word: לְדָנִיֵּאל דְּנָה
  chosen: against this Daniel
  alternatives:
  - concerning this Daniel
  - in this Daniel
  lexicon: HALOT
  rationale: The preposition with Daniel in this legal setting is best rendered idiomatically
    as 'against.' 'This Daniel' preserves the demonstrative, which can carry a slightly
    dismissive or pointed tone.
- source_word: כָּל עִלָּא
  chosen: any charge
  alternatives:
  - any ground for accusation
  - any occasion
  - any pretext
  lexicon: HALOT
  rationale: The phrase denotes a legal basis or cause for accusation. 'Any charge'
    is concise, idiomatic, and fits the judicial context.
- source_word: לָהֵן
  chosen: unless
  alternatives:
  - therefore
  - except that
  lexicon: HALOT
  rationale: Here the conjunction introduces the sole exception to the preceding statement.
    'Unless' captures the logic clearly in English.
- source_word: הַשְׁכַּחְנָה
  chosen: we find it
  alternatives:
  - we discover one
  - we find something
  lexicon: HALOT
  rationale: Repeats the same root 'find' for rhetorical consistency with the first
    clause. The supplied object 'it' is natural in English and refers back to the
    charge/ground for accusation.
- source_word: עֲלֹוהִי
  chosen: against him
  alternatives:
  - concerning him
  - upon him
  lexicon: HALOT
  rationale: 'In context this prepositional phrase is adversative/legal: a basis of
    accusation directed at Daniel. ''Against him'' is the clearest idiomatic rendering.'
- source_word: בְּדָת אֱלָהֵהּ
  chosen: in the law of his God
  alternatives:
  - in the law of his god
  - by the law of his God
  - in relation to the law of his God
  lexicon: HALOT
  rationale: דָת denotes law/decree; here it refers to the religious law associated
    with Daniel's God. Capitalizing 'God' reflects that Daniel's God is the true God
    in the narrative, while preserving the possessive construction of the source.
