theological_decisions:
- issue: Capitalization of אֱלָהֵהּ
  chosen_reading: his God
  alternative_readings:
  - his god
  rationale: The Aramaic noun itself does not mark capitalization, but in context
    the referent is Daniel's actual deity, not a generic or false god. English capitalization
    helps readers identify the personal referent without adding doctrinal content
    beyond the narrative's perspective.
  doctrine_reference: 'DOCTRINE.md: readable modern English; do not import doctrinal
    claims the text does not make'
