id: DAN.6.28
reference: Daniel 6:28
source:
  edition: WLC
  text: מְשֵׁיזִ֣ב וּ/מַצִּ֗ל וְ/עָבֵד֙ אָתִ֣ין וְ/תִמְהִ֔ין בִּ/שְׁמַיָּ֖/א וּ/בְ/אַרְעָ֑/א
    דִּ֚י שֵׁיזִ֣יב לְ/דָֽנִיֵּ֔אל מִן יַ֖ד אַרְיָוָתָֽ/א־׃
translation:
  text: who rescues and delivers, and works signs and wonders in heaven and on earth—he
    who rescued Daniel from the power of the lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the hand of the lions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֵׁיזִב
  chosen: rescues
  alternatives:
  - saves
  lexicon: HALOT
  rationale: Aramaic participle from שיזב denotes rescuing/delivering from danger.
    'Rescues' is vivid and idiomatic in English, while preserving the ongoing descriptive
    force of the participle.
- source_word: וּמַצִּל
  chosen: delivers
  alternatives:
  - snatches away
  - saves
  lexicon: HALOT
  rationale: Paired with מְשֵׁיזִב, this near-synonym is best rendered with a distinct
    but overlapping English verb to preserve the Hebrew/Aramaic rhetorical doubling
    rather than collapsing both into one term.
- source_word: וְעָבֵד
  chosen: works
  alternatives:
  - does
  - performs
  lexicon: HALOT
  rationale: The participle means 'does/makes.' 'Works' fits naturally with the following
    objects 'signs and wonders' in biblical English without sounding archaic.
- source_word: אָתִין
  chosen: signs
  alternatives:
  - tokens
  lexicon: HALOT
  rationale: Standard rendering for this Aramaic cognate of Hebrew אות, especially
    in the collocation 'signs and wonders.'
- source_word: וְתִמְהִין
  chosen: wonders
  alternatives:
  - marvels
  lexicon: HALOT
  rationale: Conventional and accurate rendering in the fixed pair 'signs and wonders,'
    preserving the miraculous sense.
- source_word: בִּשְׁמַיָּא וּבְאַרְעָא
  chosen: in heaven and on earth
  alternatives:
  - in the heavens and on the earth
  lexicon: HALOT
  rationale: This is the natural English rendering of the merism. Singular 'heaven'
    is idiomatic in English, while still representing the Aramaic form.
- source_word: דִּי
  chosen: he who
  alternatives:
  - who
  - for
  lexicon: HALOT
  rationale: The relative particle introduces the clause identifying God as the one
    who rescued Daniel. 'He who' makes the appositional force explicit in smooth English
    after the dash.
- source_word: שֵׁיזִיב
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: HALOT
  rationale: Past verbal form referring to the specific historical act toward Daniel.
    'Rescued' matches the earlier participle and keeps the concrete sense of deliverance
    from mortal danger.
- source_word: מִן יַד
  chosen: from the power of
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: Literally 'from the hand of,' but in English this idiom is better conveyed
    as 'from the power of' when the referent is animals. This preserves the sense
    of control or deadly grasp without wooden literalism.
- source_word: אַרְיָוָתָא
  chosen: the lions
  alternatives:
  - lions
  lexicon: HALOT
  rationale: Determined plural noun. 'The lions' reflects the emphatic/definite form
    and the specific lions in the narrative.
