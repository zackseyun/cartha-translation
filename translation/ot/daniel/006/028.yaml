theological_decisions:
- issue: Divine description through participles and relative clause
  chosen_reading: 'Render as a doxological description of God: ''who rescues and delivers,
    and works signs and wonders... he who rescued Daniel...'''
  alternative_readings:
  - Render with more literal repetition and less smoothing
  rationale: The verse is part of Darius's proclamation about Daniel's God. The translation
    preserves the exalted theological tone without adding doctrinal content beyond
    the text.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense;
    readable modern English.'
