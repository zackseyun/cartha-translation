id: DAN.6.26
reference: Daniel 6:26
source:
  edition: WLC
  text: בֵּ/אדַ֜יִן דָּרְיָ֣וֶשׁ מַלְכָּ֗/א כְּ֠תַב לְֽ/כָל עַֽמְמַיָּ֞/א אֻמַיָּ֧/א
    וְ/לִשָּׁנַיָּ֛/א דִּֽי דארין בְּ/כָל אַרְעָ֖/א שְׁלָמְ/כ֥וֹן יִשְׂגֵּֽא־־־׃
translation:
  text: 'Then King Darius wrote to all the peoples, nations, and languages that dwell
    in all the earth: “May your peace abound.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “May your peace be multiplied.”
    reason: lexical_alternative
  - marker: b
    text: “In all the earth” reflects the Aramaic wording; in context it refers to
      the full extent of Darius’s imperial domain.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - After that
  - At that time
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  chosen: King Darius
  alternatives:
  - Darius the king
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. The construct
    is preserved in sense without awkwardness.
- source_word: כְּתַב
  chosen: wrote
  alternatives:
  - issued a written decree
  - wrote out
  lexicon: HALOT
  rationale: The verb plainly means 'wrote.' Although the context is a royal proclamation,
    the source text here states the act of writing rather than using a more specific
    noun for decree.
- source_word: לְכָל עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  chosen: to all the peoples, nations, and languages
  alternatives:
  - to all the peoples, ethnic groups, and tongues
  - to all peoples, nations, and languages
  lexicon: HALOT
  rationale: This triad is conventional in Daniel for the full range of imperial subjects.
    'Languages' is retained literally rather than paraphrased as 'language groups,'
    preserving the stock formula while remaining intelligible.
- source_word: דִּי דארין
  chosen: that dwell
  alternatives:
  - who live
  - who are dwelling
  lexicon: HALOT
  rationale: Relative clause describing the addressed groups. 'Dwell' preserves the
    slightly elevated register suitable to a royal edict and matches the participial
    sense.
- source_word: בְּכָל אַרְעָא
  chosen: in all the earth
  alternatives:
  - in all the land
  - throughout the whole kingdom
  lexicon: HALOT
  rationale: Aramaic אַרְעָא can mean 'earth' or 'land.' In Daniel's imperial formula,
    the scope is universalized rhetoric for the king's realm and subjects. 'In all
    the earth' preserves the wording of the proclamation without narrowing it interpretively
    to 'kingdom.'
- source_word: שְׁלָמְכוֹן
  chosen: your peace
  alternatives:
  - peace to you
  - your welfare
  lexicon: HALOT
  rationale: The noun denotes peace, well-being, or welfare. 'Your peace' keeps the
    possessive explicit and fits the blessing formula.
- source_word: יִשְׂגֵּא
  chosen: abound
  alternatives:
  - be multiplied
  - increase greatly
  lexicon: HALOT
  rationale: The verb means to grow great or increase. 'Abound' gives idiomatic modern
    English in a blessing formula while preserving the sense of increase. The more
    traditional 'be multiplied' is possible and worth preserving in a footnote because
    of its familiarity in royal greetings.
