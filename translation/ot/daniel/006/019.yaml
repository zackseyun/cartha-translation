id: DAN.6.19
reference: Daniel 6:19
source:
  edition: WLC
  text: אֱ֠דַיִן אֲזַ֨ל מַלְכָּ֤/א לְ/הֵֽיכְלֵ/הּ֙ וּ/בָ֣ת טְוָ֔ת וְ/דַחֲוָ֖ן לָא
    הַנְעֵ֣ל קָֽדָמ֑וֹ/הִי וְ/שִׁנְתֵּ֖/הּ נַדַּ֥ת עֲלֽוֹ/הִי־׃
translation:
  text: Then the king went to his palace and spent the night fasting; no entertainment
    was brought before him, and sleep fled from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no musicians were brought before him.' The Aramaic term is uncertain
      and may refer more specifically to entertainers or diversions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - After that
  - At that time
  lexicon: HALOT
  rationale: Common Aramaic narrative adverb marking the next event in sequence; 'Then'
    is the natural English narrative connector.
- source_word: אֲזַל
  chosen: went
  alternatives:
  - departed
  - came
  lexicon: HALOT
  rationale: Basic verb of motion in Biblical Aramaic. 'Went' fits the context of
    the king returning from the den to his residence.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article-like ending in Aramaic; straightforwardly
    'the king.'
- source_word: לְהֵיכְלֵהּ
  chosen: to his palace
  alternatives:
  - to his temple
  - to his hall
  lexicon: HALOT
  rationale: הֵיכַל can denote a palace or temple complex. In the context of a pagan
    king returning to his residence for the night, 'palace' best matches the referent.
- source_word: וּבָת
  chosen: and spent
  alternatives:
  - and passed
  - and remained
  lexicon: HALOT
  rationale: Here the verb conveys spending or passing the night. English idiom prefers
    'spent the night' rather than a more wooden 'passed the night.'
- source_word: טְוָת
  chosen: fasting
  alternatives:
  - in fasting
  lexicon: HALOT
  rationale: Adverbial noun indicating the manner in which he spent the night. 'Spent
    the night fasting' is idiomatic and preserves the sense.
- source_word: וְדַחֲוָן
  chosen: entertainment
  alternatives:
  - musicians
  - diversions
  - concubines
  lexicon: HALOT
  rationale: The term is difficult and has been variously understood as table-companions,
    musicians, or diversions. In context it denotes things brought in to relieve or
    entertain the king. 'Entertainment' captures the broader sense without overcommitting
    to one specific proposal.
- source_word: לָא הַנְעֵל קָדָמוֹהִי
  chosen: was brought before him
  alternatives:
  - he did not bring before himself
  - they did not bring before him
  lexicon: HALOT
  rationale: 'Passive/causative sense in context: no entertainments were brought into
    the king''s presence. English passive best reflects the event-focused wording.'
- source_word: וְשִׁנְתֵּהּ
  chosen: and sleep
  alternatives:
  - and his sleep
  lexicon: HALOT
  rationale: The possessive is naturally rendered in English without awkwardness;
    'sleep' is sufficient in the clause 'sleep fled from him.'
- source_word: נַדַּת עֲלוהִי
  chosen: fled from him
  alternatives:
  - departed from him
  - was driven away from him
  lexicon: HALOT
  rationale: The verb indicates removal or fleeing away. 'Sleep fled from him' is
    vivid, idiomatic English and preserves the personified force of the Aramaic.
