id: DAN.8.20
reference: Daniel 8:20
source:
  edition: WLC
  text: הָ/אַ֥יִל אֲשֶׁר רָאִ֖יתָ בַּ֣עַל הַ/קְּרָנָ֑יִם מַלְכֵ֖י מָדַ֥י וּ/פָרָֽס־׃
translation:
  text: The ram that you saw, the one with the two horns, represents the kings of
    Media and Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the ram that you saw, possessor of the two horns, [is] the kings
      of Media and Persia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אַיִל denotes a ram. 'Ram' is the natural and precise English equivalent
    in this vision context.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'ram'; 'that' is idiomatic
    modern English.
- source_word: רָאִיתָ
  chosen: you saw
  alternatives:
  - you have seen
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה. In narrative explanation of the vision, simple
    past 'you saw' is the most natural rendering.
- source_word: בַּעַל הַקְּרָנַיִם
  chosen: the one with the two horns
  alternatives:
  - possessing the two horns
  - owner of the two horns
  - having the two horns
  lexicon: HALOT
  rationale: בעל literally means 'possessor/master of,' but in this attributive construction
    with horns it idiomatically means 'having' or 'with.' The article on קְּרָנַיִם
    and the dual form support 'the two horns.' 'The one with the two horns' is clear,
    natural, and preserves the identifying force.
- source_word: מַלְכֵי
  chosen: represents the kings of
  alternatives:
  - are the kings of
  - means the kings of
  lexicon: HALOT
  rationale: 'The Hebrew is verbless: literally ''kings of Media and Persia.'' English
    normally requires a copular or explanatory supplement. ''Represents'' makes explicit
    the angelic interpretation of the symbolic ram without adding doctrinal content.'
- source_word: מָדַי
  chosen: Media
  alternatives:
  - the Medes
  lexicon: HALOT
  rationale: As part of the genitival expression with 'kings of,' the place/people
    name is well rendered by the conventional English proper noun 'Media.'
- source_word: וּפָרָס
  chosen: and Persia
  alternatives:
  - and Paras
  - and the Persians
  lexicon: HALOT
  rationale: Standard English transliteration/rendering of the proper noun is 'Persia.'
    Coordinated with 'Media' in the genitival phrase.
