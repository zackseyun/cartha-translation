theological_decisions:
- issue: Supplying the implied copular/explanatory sense in a symbolic interpretation
  chosen_reading: represents the kings of Media and Persia
  alternative_readings:
  - is the kings of Media and Persia
  rationale: Because the Hebrew clause is verbless and occurs in an angelic explanation
    of symbolic imagery, English benefits from an interpretive copular supplement.
    'Represents' communicates the symbol-to-referent relationship more naturally than
    the wooden 'is,' while remaining faithful to the sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without unnecessary paraphrase.'
