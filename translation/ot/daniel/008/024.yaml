theological_decisions:
- issue: Referent and nuance of וְעַם קְדֹשִׁים
  chosen_reading: the people of the holy ones
  alternative_readings:
  - the holy people
  - the people of the saints
  rationale: The Hebrew plural קְדֹשִׁים can denote 'holy ones' and in Daniel may
    refer to the holy people in relation to heavenly holy ones or function as a designation
    for the saints. To preserve theological tension rather than resolve it, the main
    text keeps the more literal construct, while a footnote preserves the more traditional
    interpretive rendering.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
