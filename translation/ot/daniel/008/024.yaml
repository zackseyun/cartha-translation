id: DAN.8.24
reference: Daniel 8:24
source:
  edition: WLC
  text: וְ/עָצַ֤ם כֹּח/וֹ֙ וְ/לֹ֣א בְ/כֹח֔/וֹ וְ/נִפְלָא֥וֹת יַשְׁחִ֖ית וְ/הִצְלִ֣יחַ
    וְ/עָשָׂ֑ה וְ/הִשְׁחִ֥ית עֲצוּמִ֖ים וְ/עַם קְדֹשִֽׁים־׃
translation:
  text: His power will become strong, but not by his own power. He will bring about
    extraordinary destruction, and he will succeed and act; he will destroy the mighty
    and the people of the holy ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the holy people' or 'the people of the saints.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָצַם כֹּחוֹ
  chosen: His power will become strong
  alternatives:
  - his power will be mighty
  - his strength will grow strong
  lexicon: HALOT
  rationale: עָצַם with כֹּחַ expresses becoming strong or mighty. Rendering the clause
    verbally ('will become strong') preserves the Hebrew predicative force better
    than a static adjective alone.
- source_word: וְלֹא בְכֹחוֹ
  chosen: but not by his own power
  alternatives:
  - but not through his own power
  - though not by his power
  lexicon: HALOT
  rationale: ב marks means or instrument here. 'His own power' makes explicit the
    contrast with the preceding suffix and communicates that the source of his strength
    is external to him.
- source_word: וְנִפְלָאוֹת יַשְׁחִית
  chosen: He will bring about extraordinary destruction
  alternatives:
  - he will destroy in astonishing ways
  - he will cause wondrous things to be ruined
  lexicon: HALOT
  rationale: נִפְלָאוֹת literally denotes extraordinary, astonishing, or wondrous
    things/deeds. In collocation with שׁחת, the sense is not positive 'wonders' but
    destruction of an extraordinary or appalling kind. The chosen rendering captures
    the adverbial force in natural English while preserving the shock value.
- source_word: וְהִצְלִיחַ
  chosen: he will succeed
  alternatives:
  - he will prosper
  lexicon: HALOT
  rationale: The Hiphil of צלח commonly means to prosper or succeed. 'Succeed' is
    more idiomatic in this sequence and avoids suggesting moral approval.
- source_word: וְעָשָׂה
  chosen: and act
  alternatives:
  - and do as he pleases
  - and accomplish
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). The text does not explicitly add 'as
    he pleases,' so the simpler 'act' avoids importing interpretive expansion while
    fitting the context of effective activity.
- source_word: וְהִשְׁחִית
  chosen: he will destroy
  alternatives:
  - he will ruin
  - he will corrupt
  lexicon: HALOT
  rationale: In this military-oppressive context, 'destroy' best fits שׁחת and maintains
    consistency with the verse's theme of devastation.
- source_word: עֲצוּמִים
  chosen: the mighty
  alternatives:
  - powerful ones
  - strong ones
  lexicon: HALOT
  rationale: The adjective used substantivally refers to strong or mighty persons.
    'The mighty' is concise and natural English.
- source_word: וְעַם קְדֹשִׁים
  chosen: the people of the holy ones
  alternatives:
  - the holy people
  - the people of the saints
  lexicon: HALOT
  rationale: The construct chain is literally 'people of holy ones,' with קְדֹשִׁים
    plural. Rather than flattening it to 'holy people,' the chosen rendering preserves
    the plural form and the syntactic relationship. Because the phrase may also be
    understood idiomatically as God's holy people, that alternative is preserved in
    a footnote.
