theological_decisions:
- issue: Meaning of וְנִצְדַּק קֹדֶשׁ in relation to the temple
  chosen_reading: the sanctuary will be restored to its rightful state
  alternative_readings:
  - the sanctuary will be cleansed
  - the sanctuary will be vindicated
  - the sanctuary will be justified
  rationale: The Hebrew uses צדק rather than the more expected טהר ('cleanse'). To
    avoid importing a specific theological or historical interpretation, the main
    text preserves the broader 'set right/restored' sense, while notable traditional
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether עֶרֶב בֹּקֶר denotes 2,300 full days or 2,300 evening-morning offerings
  chosen_reading: retain the literal phrase '2,300 evenings and mornings' without
    resolving the chronology
  alternative_readings:
  - 2,300 days
  - 1,150 days if counted as twice-daily offerings
  rationale: The Hebrew phrase is ambiguous enough in interpretation that the translation
    should preserve the wording rather than decide the chronology in the main text.
    This maintains theological tension rather than resolving it.
  doctrine_reference: Translation philosophy §3
