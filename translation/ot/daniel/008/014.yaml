id: DAN.8.14
reference: Daniel 8:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י עַ֚ד עֶ֣רֶב בֹּ֔קֶר אַלְפַּ֖יִם וּ/שְׁלֹ֣שׁ מֵא֑וֹת וְ/נִצְדַּ֖ק
    קֹֽדֶשׁ׃
translation:
  text: And he said to me, “For 2,300 evenings and mornings; then the sanctuary will
    be restored to its rightful state.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Until evening-morning, 2,300'; the phrase may refer either to 2,300
      full days or to 2,300 evening-morning offerings (about 1,150 days).
    reason: alternative_reading
  - marker: b
    text: Or 'then the sanctuary will be cleansed,' 'vindicated,' or 'justified.'
      The Hebrew verb is literally 'be put right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the reply in straightforward narrative sequence.
    'And he said' preserves the Hebrew flow without overinterpreting temporal nuance.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct object of speech with first-person singular suffix; standard rendering
    is 'to me.'
- source_word: עַד
  chosen: For
  alternatives:
  - Until
  lexicon: HALOT
  rationale: Although עַד often means 'until,' in this elliptical answer to 'How long?'
    it introduces the duration/limit of the period. English 'For 2,300...' communicates
    the sense naturally while preserving the temporal endpoint idea in context.
- source_word: עֶרֶב בֹּקֶר
  chosen: evenings and mornings
  alternatives:
  - evening-morning
  - evening and morning
  lexicon: HALOT
  rationale: The pair is a distinctive Hebrew expression here. Rendering both nouns
    in the plural in English matches the counted total and avoids the misleadingly
    singular idiom 'evening and morning.' It also leaves open the debated question
    whether these are full days or daily offerings.
- source_word: אַלְפַּיִם וּשְׁלֹשׁ מֵאוֹת
  chosen: 2,300
  alternatives:
  - two thousand three hundred
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of the 'evenings and mornings.'
    Numerals are rendered in standard modern English form for readability.
- source_word: וְנִצְדַּק
  chosen: will be restored to its rightful state
  alternatives:
  - will be justified
  - will be vindicated
  - will be cleansed
  lexicon: HALOT
  rationale: Nifal of צדק literally relates to being put right, shown right, or vindicated.
    In this sanctuary context, 'restored to its rightful state' captures the broader
    sense of being set right without importing the narrower cultic term 'cleansed,'
    which reflects interpretation more than the Hebrew verb itself.
- source_word: קֹדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy thing
  lexicon: HALOT
  rationale: In Daniel 8's temple context, קֹדֶשׁ most naturally refers to the sanctuary/holy
    place rather than holiness in the abstract. 'Sanctuary' is clear modern English
    and fits the desecration-restoration theme.
