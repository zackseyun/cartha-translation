id: DAN.8.25
reference: Daniel 8:25
source:
  edition: WLC
  text: וְ/עַל שִׂכְל֗/וֹ וְ/הִצְלִ֤יחַ מִרְמָה֙ בְּ/יָד֔/וֹ וּ/בִ/לְבָב֣/וֹ יַגְדִּ֔יל
    וּ/בְ/שַׁלְוָ֖ה יַשְׁחִ֣ית רַבִּ֑ים וְ/עַ֤ל שַׂר שָׂרִים֙ יַעֲמֹ֔ד וּ/בְ/אֶ֥פֶס
    יָ֖ד יִשָּׁבֵֽר־־־׃
translation:
  text: And through his shrewdness he will make deceit prosper in his hand; and in
    his heart he will magnify himself. In a time of security he will destroy many,
    and he will rise up against the Prince of princes; but he will be broken without
    hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without human hand,' that is, not by ordinary human power.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂכְלוֹ
  chosen: his shrewdness
  alternatives:
  - his understanding
  - his cunning
  - his skill
  lexicon: HALOT
  rationale: The noun can denote insight or prudence, but in this hostile context
    it carries a negative or at least morally ambiguous sense. 'Shrewdness' preserves
    intelligence without overstating with 'cunning,' while fitting the following success
    of deceit.
- source_word: וְהִצְלִיחַ
  chosen: he will make ... prosper
  alternatives:
  - he will cause ... to succeed
  - he will prosper
  lexicon: HALOT
  rationale: Hiphil of צלח is causative. The object is מִרְמָה, so the sense is that
    he causes deceit to succeed, not merely that he himself prospers.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  lexicon: HALOT
  rationale: '''Deceit'' is the broadest natural English equivalent and matches the
    moral force of the Hebrew in context.'
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - by his hand
  - under his power
  lexicon: HALOT
  rationale: The idiom can indicate agency or sphere of control. 'In his hand' preserves
    the Hebrew image while remaining understandable in English, especially with 'make
    deceit prosper'.
- source_word: וּבִלְבָבוֹ יַגְדִּיל
  chosen: in his heart he will magnify himself
  alternatives:
  - he will become great in his own mind
  - he will exalt himself in his heart
  lexicon: HALOT
  rationale: The reflexive object is implied by context rather than stated. 'Magnify
    himself' preserves the Hebrew verb גדל and the inward pride indicated by 'in his
    heart.'
- source_word: וּבְשַׁלְוָה
  chosen: in a time of security
  alternatives:
  - in peace
  - while they are at ease
  - in tranquility
  lexicon: HALOT
  rationale: The noun denotes quietness, ease, or security. Here it likely describes
    the unsuspecting condition in which many are destroyed. 'In a time of security'
    communicates that nuance better than the potentially misleading 'in peace.'
- source_word: יַשְׁחִית רַבִּים
  chosen: he will destroy many
  alternatives:
  - he will ruin many
  - he will corrupt many
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here most naturally means to destroy or bring to ruin.
    Given the apocalyptic-political context, 'destroy many' is the clearest rendering.
- source_word: שַׂר שָׂרִים
  chosen: the Prince of princes
  alternatives:
  - the ruler of rulers
  - the chief of princes
  lexicon: HALOT
  rationale: The construct chain is superlative or hierarchical. 'Prince of princes'
    is a transparent rendering and preserves the elevated title. Capitalization reflects
    its use as a title for the supreme ruler in context.
- source_word: יַעֲמֹד
  chosen: he will rise up against
  alternatives:
  - he will stand against
  - he will oppose
  lexicon: HALOT
  rationale: With עַל, the verb conveys hostile opposition. 'Rise up against' is idiomatic
    and preserves the adversarial force.
- source_word: וּבְאֶפֶס יָד
  chosen: without hand
  alternatives:
  - without human hand
  - by no hand
  - apart from hand
  lexicon: HALOT
  rationale: The phrase is elliptical and idiomatic, indicating destruction not accomplished
    by ordinary human agency. 'Without hand' is the most literal and biblically resonant
    main-text rendering; the fuller interpretive sense is preserved in a footnote.
- source_word: יִשָּׁבֵר
  chosen: he will be broken
  alternatives:
  - he will be shattered
  - he will be destroyed
  lexicon: HALOT
  rationale: 'Niphal of שׁבר is passive: ''be broken.'' This preserves the metaphor
    and leaves the mode of judgment implicit, as in the Hebrew.'
