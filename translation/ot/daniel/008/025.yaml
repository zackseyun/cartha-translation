theological_decisions:
- issue: Referent and capitalization of שַׂר שָׂרִים
  chosen_reading: the Prince of princes
  alternative_readings:
  - the prince of princes
  rationale: The phrase denotes the highest ruler over all lesser rulers. In Daniel's
    theological context this is best treated as a divine or transcendent title, so
    capitalization is appropriate in English. This preserves the text's exalted claim
    without over-specifying the referent beyond the verse.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Meaning of וּבְאֶפֶס יָד
  chosen_reading: but he will be broken without hand
  alternative_readings:
  - but he will be broken without human hand
  rationale: The Hebrew does not explicitly say 'human,' but the idiom strongly implies
    a nonhuman or divinely effected overthrow. The main text keeps the concise Hebrew
    expression; the footnote preserves the interpretive expansion.
  doctrine_reference: 'Translation philosophy 3: Preserve theological tension rather
    than resolve it'
