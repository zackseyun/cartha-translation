id: DAN.8.6
reference: Daniel 8:6
source:
  edition: WLC
  text: וַ/יָּבֹ֗א עַד הָ/אַ֨יִל֙ בַּ֣עַל הַ/קְּרָנַ֔יִם אֲשֶׁ֣ר רָאִ֔יתִי עֹמֵ֖ד
    לִ/פְנֵ֣י הָ/אֻבָ֑ל וַ/יָּ֥רָץ אֵלָ֖י/ו בַּ/חֲמַ֥ת כֹּחֽ/וֹ־׃
translation:
  text: He came up to the ram with the two horns, which I had seen standing before
    the canal, and ran at him in the fury of his power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stream.' The Hebrew אוּבָל refers to a watercourse; 'canal' is chosen
      here because it best fits the setting in Daniel 8.
    reason: lexical_alternative
  - marker: b
    text: Or 'rushed at him in the wrath of his strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: He came up
  alternatives:
  - he came
  - he approached
  lexicon: HALOT
  rationale: The verb בוא means 'to come/enter.' With עַד ('up to, as far as'), the
    sense is movement toward and arrival at the ram. 'Came up to' is natural English
    that preserves the directional force better than the flatter 'came.'
- source_word: עַד
  chosen: to
  alternatives:
  - up to
  - as far as
  lexicon: HALOT
  rationale: In combination with ויבא, עַד marks movement up to the object. In English
    this is absorbed into 'came up to.'
- source_word: הָאַיִל
  chosen: the ram
  lexicon: HALOT
  rationale: אַיִל here denotes the male sheep in Daniel's vision, conventionally
    and accurately rendered 'ram.'
- source_word: בַּעַל הַקְּרָנַיִם
  chosen: with the two horns
  alternatives:
  - owner of the two horns
  - possessing the two horns
  lexicon: HALOT
  rationale: בעל literally means 'owner/possessor of,' but in English idiom for animals
    'with' best conveys the attributive sense without awkwardness. The dual form קְּרָנַיִם
    is preserved as 'two horns.'
- source_word: אֲשֶׁר רָאִיתִי עֹמֵד
  chosen: which I had seen standing
  alternatives:
  - that I saw standing
  lexicon: HALOT
  rationale: The relative clause refers back to the ram previously seen in the vision.
    English past perfect ('had seen') clarifies the prior action relative to the current
    narrative moment.
- source_word: לִפְנֵי הָאֻבָל
  chosen: before the canal
  alternatives:
  - before the stream
  - in front of the canal
  lexicon: HALOT
  rationale: אוּבָל denotes a watercourse/canal in this context, likely an artificial
    channel or riverbank feature. 'Canal' fits the usage in Daniel 8 and distinguishes
    it from more generic terms for river or stream.
- source_word: וַיָּרָץ אֵלָיו
  chosen: and ran at him
  alternatives:
  - and rushed at him
  - and ran toward him
  lexicon: HALOT
  rationale: רוץ means 'run,' but in this hostile encounter the idiomatic English
    'ran at him' conveys aggressive motion. 'Rushed at him' is possible, but 'ran
    at him' stays closer to the lexical core.
- source_word: בַּחֲמַת כֹּחוֹ
  chosen: in the fury of his power
  alternatives:
  - in the wrath of his strength
  - with furious power
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes heat, fury, wrath; כֹּחַ is strength/power. 'In the
    fury of his power' preserves both nouns and the vivid intensity of the Hebrew
    better than a more compressed paraphrase.
