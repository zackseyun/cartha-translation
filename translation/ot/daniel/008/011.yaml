theological_decisions:
- issue: Referent of 'the Prince of the host'
  chosen_reading: Rendered neutrally as 'the Prince of the host' without identifying
    the figure in the main text.
  alternative_readings:
  - a heavenly prince/angelic ruler
  - God himself
  - the high priest Onias III in historical interpretation
  - the Messiah in some Christian readings
  rationale: The Hebrew title is elevated but does not itself specify the identity.
    To preserve theological tension and avoid importing a specific interpretive tradition,
    the translation keeps the title literal and leaves identification to interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Antecedent of the pronoun in 'from him'
  chosen_reading: Kept as 'from him' in the main text.
  alternative_readings:
  - '''from it'' if referred to the host'
  - understood idiomatically with an impersonal sense
  rationale: The masculine singular suffix allows more than one possible antecedent
    in the discourse. The main text preserves the ambiguity rather than selecting
    a debated interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
