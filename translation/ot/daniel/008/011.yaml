id: DAN.8.11
reference: Daniel 8:11
source:
  edition: WLC
  text: וְ/עַ֥ד שַֽׂר הַ/צָּבָ֖א הִגְדִּ֑יל וּ/מִמֶּ֨/נּוּ֙ הרים הַ/תָּמִ֔יד וְ/הֻשְׁלַ֖ךְ
    מְכ֥וֹן מִקְדָּשֽׁ/וֹ־׃
translation:
  text: It even magnified itself up to the Prince of the host, and from him the regular
    offering was taken away, and the place of his sanctuary was cast down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual offering' or 'the daily offering'; in temple context הַתָּמִיד
      refers to the regular ongoing sacrificial service, traditionally understood
      as the regular burnt offering.
    reason: lexical_alternative
  - marker: b
    text: '''From him'' follows the Hebrew pronoun literally; the antecedent is debated.'
    reason: alternative_reading
  - marker: c
    text: Or 'the foundation of his sanctuary was cast down.' The Hebrew word may
      denote 'place/site' or 'foundation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד
  chosen: even ... up to
  alternatives:
  - and up to
  - as far as
  lexicon: HALOT
  rationale: The preposition עַד marks extent ('up to/as far as'), and with prefixed
    וְ in this context continues and intensifies the previous description. 'Even ...
    up to' captures both continuation and the surprising height of the horn's self-exaltation
    in readable English.
- source_word: שַׂר הַצָּבָא
  chosen: the Prince of the host
  alternatives:
  - the commander of the host
  - the prince of the army
  lexicon: HALOT
  rationale: שַׂר commonly means 'prince, ruler, commander.' 'Prince' preserves the
    elevated title and leaves open the referent's identity, while 'host' reflects
    צָבָא in its broad biblical sense of heavenly host/army rather than narrowing
    it prematurely to a merely human army.
- source_word: הִגְדִּיל
  chosen: magnified itself
  alternatives:
  - grew great
  - made itself great
  - exalted itself
  lexicon: HALOT
  rationale: In this chapter גדל in the Hiphil describes arrogant self-exaltation.
    'Magnified itself' preserves the reflexive sense implied by context and echoes
    the repeated motif of becoming great without over-paraphrasing.
- source_word: וּמִמֶּנּוּ
  chosen: from him
  alternatives:
  - from it
  - by him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular. 'From him' is the most straightforward
    rendering syntactically, though the antecedent is debated. The translation preserves
    the Hebrew ambiguity rather than resolving it interpretively.
- source_word: הרים
  chosen: was taken away
  alternatives:
  - was removed
  - he took away
  - was lifted up
  lexicon: HALOT
  rationale: Though the consonantal form is from רום ('lift up'), in context with
    הַתָּמִיד the sense is removal of the regular offering. English passive 'was taken
    away' best conveys the idiomatic force in context and matches the clause sequence
    naturally.
- source_word: הַתָּמִיד
  chosen: the regular offering
  alternatives:
  - the regular burnt offering
  - the continual offering
  - the daily offering
  lexicon: HALOT
  rationale: תָּמִיד literally means 'regular/continual,' and in cultic context it
    refers elliptically to the regular temple offering. 'Regular offering' preserves
    the cultic reference without adding 'burnt' where the noun is not explicit; alternatives
    are worth preserving because of established translation tradition.
- source_word: וְהֻשְׁלַךְ
  chosen: was cast down
  alternatives:
  - was thrown down
  - was overthrown
  lexicon: HALOT
  rationale: The Hophal gives a passive sense. 'Was cast down' is a natural formal-equivalent
    rendering that preserves the violent imagery.
- source_word: מְכוֹן
  chosen: the place
  alternatives:
  - the foundation
  - the fixed place
  - the established site
  lexicon: HALOT
  rationale: מָכוֹן can denote a fixed place, site, or foundation. Here with 'his
    sanctuary' it most naturally refers to the sanctuary's established place/site.
    'Place' is idiomatic and avoids overcommitting to a structural sense like 'foundation'
    where the context may be broader.
- source_word: מִקְדָּשׁוֹ
  chosen: his sanctuary
  alternatives:
  - his holy place
  - his temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ is 'sanctuary/holy place.' 'Sanctuary' is the standard cultic
    term and preserves the sacred nuance without narrowing to the whole temple complex.
