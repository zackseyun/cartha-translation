id: DAN.8.2
reference: Daniel 8:2
source:
  edition: WLC
  text: וָֽ/אֶרְאֶה֮ בֶּ/חָזוֹן֒ וַ/יְהִי֙ בִּ/רְאֹתִ֔/י וַ/אֲנִי֙ בְּ/שׁוּשַׁ֣ן הַ/בִּירָ֔ה
    אֲשֶׁ֖ר בְּ/עֵילָ֣ם הַ/מְּדִינָ֑ה וָ/אֶרְאֶה֙ בֶּֽ/חָז֔וֹן וַ/אֲנִ֥י הָיִ֖יתִי
    עַל אוּבַ֥ל אוּלָֽי־׃
translation:
  text: And I saw in the vision, and when I saw, I was in Susa the citadel, which
    is in the province of Elam; and I saw in the vision that I was beside the Ulai
    Canal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'river Ulai' or 'stream Ulai.' The Hebrew term for the watercourse can
      be rendered more broadly, but 'Canal' best fits the likely setting near Susa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: And I saw
  alternatives:
  - And I looked
  - And I was seeing
  lexicon: HALOT
  rationale: The waw-consecutive form of ראה narrates a past event. 'Saw' is the natural
    English narrative equivalent and fits both occurrences in the verse.
- source_word: בֶּחָזוֹן
  chosen: in the vision
  alternatives:
  - in a vision
  lexicon: HALOT
  rationale: The prefixed preposition with the noun חָזוֹן indicates the visionary
    setting. 'The vision' fits the article-like force of the pointed form here and
    coheres with Daniel's specific revelatory experience.
- source_word: וַיְהִי בִּרְאֹתִי
  chosen: and when I saw
  alternatives:
  - and it happened when I saw
  - and as I was looking
  lexicon: HALOT
  rationale: This idiom introduces a temporal clause. Rendering the full idiom woodenly
    as 'and it happened in my seeing' is unnatural in English; 'and when I saw' preserves
    the temporal sense with readable modern style.
- source_word: בְּשׁוּשַׁן
  chosen: in Susa
  alternatives:
  - in Shushan
  lexicon: HALOT
  rationale: Personal and place names are transliterated by standard English conventions.
    'Susa' is the standard modern English form.
- source_word: הַבִּירָה
  chosen: the citadel
  alternatives:
  - the fortress
  - the palace
  lexicon: HALOT
  rationale: בִּירָה denotes a fortified royal complex or citadel. 'Citadel' best
    captures the fortified administrative center without overcommitting to 'palace'
    alone.
- source_word: אֲשֶׁר בְּעֵילָם הַמְּדִינָה
  chosen: which is in the province of Elam
  alternatives:
  - which is in Elam the province
  - which was in the province of Elam
  lexicon: HALOT
  rationale: The relative clause identifies Susa geographically. 'Province of Elam'
    is idiomatic English for הַמְּדִינָה here, reflecting an administrative region.
- source_word: וַאֲנִי הָיִיתִי
  chosen: that I was
  alternatives:
  - and I was
  - while I was
  lexicon: HALOT
  rationale: 'After the repeated ''I saw in the vision,'' this clause reports the
    content of what was seen: Daniel perceived himself to be at a location. English
    often supplies ''that'' to make this relation clear.'
- source_word: עַל
  chosen: beside
  alternatives:
  - by
  - 'on'
  - upon
  lexicon: HALOT
  rationale: With a watercourse, עַל can indicate position at or by it rather than
    literally on top of it. 'Beside' is the clearest idiomatic choice in English.
- source_word: אוּבַל
  chosen: Canal
  alternatives:
  - stream
  - river
  lexicon: HALOT
  rationale: אוּבַל refers to a watercourse, often understood as an artificial canal
    or channel in this setting. 'Canal' fits the likely geography of Susa better than
    the broader 'river'.
- source_word: אוּלָי
  chosen: Ulai
  lexicon: HALOT
  rationale: This is a proper place-name and is therefore transliterated rather than
    translated.
