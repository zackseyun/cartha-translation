theological_decisions:
- issue: Symbolic imagery retained versus interpreted in the main text
  chosen_reading: Retain 'horn' and 'winds of heaven' as the vision's symbolic language
    without inserting historical interpretation.
  alternative_readings:
  - Interpret the horn as a king/kingdom directly in translation
  - Render 'winds' as 'directions' in the main text
  rationale: The verse is part of apocalyptic vision language. The translation should
    preserve the imagery and allow the interpretation supplied by the chapter itself
    rather than importing explanatory glosses into the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
