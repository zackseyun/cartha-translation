id: DAN.8.8
reference: Daniel 8:8
source:
  edition: WLC
  text: וּ/צְפִ֥יר הָ/עִזִּ֖ים הִגְדִּ֣יל עַד מְאֹ֑ד וּ/כְ/עָצְמ֗/וֹ נִשְׁבְּרָה֙
    הַ/קֶּ֣רֶן הַ/גְּדוֹלָ֔ה וַֽ/תַּעֲלֶ֜נָה חָז֤וּת אַרְבַּע֙ תַּחְתֶּ֔י/הָ לְ/אַרְבַּ֖ע
    רוּח֥וֹת הַ/שָּׁמָֽיִם־׃
translation:
  text: And the male goat grew exceedingly great, but when he was strong, the great
    horn was broken, and in its place four conspicuous horns came up toward the four
    winds of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four notable ones'; the Hebrew term describes what is visible or prominent,
      and English supplies 'horns' from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under it'; here the sense is 'in its place' or 'instead of it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צְפִיר הָעִזִּים
  chosen: the male goat
  alternatives:
  - the goat
  - the he-goat
  lexicon: HALOT
  rationale: The phrase denotes a male goat specifically, not merely a generic goat.
    'Male goat' is clear modern English and preserves the zoological specificity of
    the Hebrew.
- source_word: הִגְדִּיל עַד מְאֹד
  chosen: grew exceedingly great
  alternatives:
  - became very great
  - magnified himself greatly
  lexicon: HALOT
  rationale: The Hiphil of גדל here expresses becoming/growing great in power or prominence.
    'Grew exceedingly great' preserves the intensification of עַד מְאֹד while reading
    naturally in English.
- source_word: וּכְעָצְמוֹ
  chosen: when he was strong
  alternatives:
  - at the height of his power
  - as he became mighty
  lexicon: HALOT
  rationale: The phrase literally refers to his strength/power. 'When he was strong'
    is a concise rendering that preserves the temporal sense introduced by כ and the
    noun עצם in context of political/military strength.
- source_word: נִשְׁבְּרָה
  chosen: was broken
  alternatives:
  - was shattered
  lexicon: HALOT
  rationale: The Niphal of שבר is straightforwardly passive here. 'Was broken' is
    the most direct and transparent rendering.
- source_word: הַקֶּרֶן הַגְּדוֹלָה
  chosen: the great horn
  alternatives:
  - the large horn
  lexicon: HALOT
  rationale: '''Horn'' is the standard literal rendering and carries the symbolic
    force of power/kingdom in apocalyptic imagery. ''Great'' fits both size and significance.'
- source_word: וַתַּעֲלֶנָה
  chosen: came up
  alternatives:
  - arose
  - grew up
  lexicon: HALOT
  rationale: עלה in visionary contexts commonly describes the arising or emergence
    of powers. 'Came up' is vivid and close to the Hebrew imagery.
- source_word: חָזוּת אַרְבַּע
  chosen: four conspicuous horns
  alternatives:
  - four notable ones
  - four visible horns
  lexicon: HALOT
  rationale: חָזוּת here functions adjectivally for something visible/prominent/conspicuous.
    Because the referent is clearly horns replacing the broken horn, English supplies
    'horns' for clarity. 'Conspicuous' captures prominence better than the traditional
    'notable' while remaining faithful.
- source_word: תַּחְתֶּיהָ
  chosen: in its place
  alternatives:
  - under it
  - beneath it
  lexicon: HALOT
  rationale: Though the preposition literally means 'under/beneath,' in replacement
    contexts it idiomatically means 'in place of.' This best fits the image of four
    horns replacing the broken great horn.
- source_word: לְאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  chosen: toward the four winds of heaven
  alternatives:
  - to the four winds of the heavens
  - toward the four directions of heaven
  lexicon: HALOT
  rationale: This is a standard biblical idiom for the four directions of the sky/world.
    'Toward the four winds of heaven' preserves the imagery without flattening it
    into mere compass directions.
