id: DAN.8.16
reference: Daniel 8:16
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֥ע קוֹל אָדָ֖ם בֵּ֣ין אוּלָ֑י וַ/יִּקְרָא֙ וַ/יֹּאמַ֔ר גַּבְרִיאֵ֕ל
    הָבֵ֥ן לְ/הַלָּ֖ז אֶת הַ/מַּרְאֶֽה־־׃
translation:
  text: And I heard the voice of a man between the banks of the Ulai, and he called
    out and said, “Gabriel, make this man understand the vision.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a human voice.' The Hebrew says literally 'the voice of a man.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'between Ulai' / 'between the sides of the Ulai,' likely referring to
      the space between its banks.
    reason: lexical_alternative
  - marker: c
    text: Or, 'make this one understand the vision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  chosen: And I heard
  alternatives:
  - Then I heard
  - I heard
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of שׁמע, narrating Daniel's experience in sequence.
    'And I heard' preserves the narrative flow without overinterpreting temporal force.
- source_word: קוֹל אָדָם
  chosen: the voice of a man
  alternatives:
  - a human voice
  - the voice of a human being
  lexicon: HALOT
  rationale: קוֹל is 'voice/sound' and אָדָם here most naturally denotes 'man' or
    'human being.' Following the doctrine's gender-accurate principle and the singular
    concrete context, 'the voice of a man' is preferred over the more abstract 'human
    voice.'
- source_word: בֵּין אוּלָי
  chosen: between the banks of the Ulai
  alternatives:
  - between the banks of Ulai
  - between the sides of the Ulai
  - over the middle of the Ulai
  lexicon: HALOT
  rationale: בֵּין means 'between.' אוּלָי is the proper name Ulai (the canal/river
    named in the context). Since 'between' with a waterway implies the space bounded
    by its sides, 'between the banks of the Ulai' makes the Hebrew idiom intelligible
    in English while staying close to the source.
- source_word: וַיִּקְרָא וַיֹּאמַר
  chosen: and he called out and said
  alternatives:
  - and he called and said
  - and he cried out and said
  lexicon: HALOT
  rationale: The paired verbs intensify the speech introduction. 'Called out and said'
    preserves both verbs in readable English rather than collapsing them into a single
    reporting clause.
- source_word: גַּבְרִיאֵל
  chosen: Gabriel
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: הָבֵן
  chosen: make ... understand
  alternatives:
  - cause ... to understand
  - give understanding to
  lexicon: HALOT
  rationale: 'Hiphil imperative of בין is causative: not merely ''understand'' but
    ''make/cause to understand.'' ''Make ... understand'' is natural modern English
    and preserves the causative force.'
- source_word: לְהַלָּז
  chosen: this man
  alternatives:
  - this one
  - that one
  lexicon: HALOT
  rationale: The demonstrative refers to Daniel as a male individual in the scene.
    'This man' is more idiomatic and contextually clear than the wooden 'this one.'
    It also aligns with the gender-accurate policy.
- source_word: אֶת הַמַּרְאֶה
  chosen: the vision
  alternatives:
  - the appearance
  - what was seen
  lexicon: HALOT
  rationale: מַרְאֶה can mean 'appearance' or 'vision.' In Daniel's apocalyptic context,
    'vision' best fits the revelatory content Gabriel is to explain.
