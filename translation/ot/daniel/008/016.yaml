theological_decisions:
- issue: Rendering of אָדָם in two occurrences within the verse
  chosen_reading: First occurrence as 'a man' in 'the voice of a man'; second as 'this
    man' referring to Daniel
  alternative_readings:
  - human voice
  - this one
  rationale: The verse presents concrete male referents in context rather than generic
    humanity. This follows the doctrine's gender-accurate-over-gender-neutral principle
    without importing extra theological meaning.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
