theological_decisions:
- issue: Whether to interpret 'host of heaven' and 'stars' as angels, saints, or literal
    celestial bodies in the main text
  chosen_reading: Retain the literal imagery 'host of heaven' and 'stars' without
    specifying the referents
  alternative_readings:
  - angels
  - the people of God/saints
  - celestial bodies as symbolic rulers
  rationale: The verse is apocalyptic and likely symbolic, but the Hebrew itself does
    not explicitly identify the referents here. Following the translation philosophy,
    the draft preserves the theological tension rather than resolving it interpretively
    in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
