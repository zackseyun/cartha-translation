id: DAN.8.10
reference: Daniel 8:10
source:
  edition: WLC
  text: וַ/תִּגְדַּ֖ל עַד צְבָ֣א הַ/שָּׁמָ֑יִם וַ/תַּפֵּ֥ל אַ֛רְצָ/ה מִן הַ/צָּבָ֥א
    וּ/מִן הַ/כּוֹכָבִ֖ים וַֽ/תִּרְמְסֵֽ/ם־־־׃
translation:
  text: It grew as high as the host of heaven, and it cast some of the host and some
    of the stars down to the earth, and trampled them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the army of heaven.' The phrase may refer symbolically to heavenly beings,
      God's people, or celestial powers; the Hebrew leaves the image open.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְדַּל
  chosen: It grew
  alternatives:
  - It became great
  - It magnified itself
  lexicon: HALOT
  rationale: From גדל in the Qal wayyiqtol, describing increase in greatness/extent.
    'It grew' is natural English and preserves the image of expansion without importing
    the more interpretive reflexive sense 'magnified itself,' which appears in nearby
    contexts but is not explicit here.
- source_word: עַד
  chosen: as high as
  alternatives:
  - up to
  - unto
  lexicon: HALOT
  rationale: The preposition marks extent toward a lofty object. 'As high as' brings
    out the vertical imagery in context ('host of heaven') more idiomatically than
    the wooden 'up to,' while remaining faithful to the sense of reaching to that
    level.
- source_word: צְבָא הַשָּׁמַיִם
  chosen: the host of heaven
  alternatives:
  - the host of the heavens
  - the army of heaven
  lexicon: HALOT
  rationale: צָבָא can denote host/army. 'Host of heaven' is the standard and contextually
    apt rendering for the heavenly multitude, preserving the ambiguity between celestial
    bodies and heavenly beings that the verse itself exploits by mentioning 'stars'
    next.
- source_word: וַתַּפֵּל
  chosen: it cast ... down
  alternatives:
  - it caused ... to fall
  - it threw down
  lexicon: HALOT
  rationale: 'Hiphil of נפל is causative: ''cause to fall.'' ''Cast ... down'' is
    idiomatic English that preserves the forceful action and pairs naturally with
    the following directional phrase.'
- source_word: אַרְצָה
  chosen: to the earth
  alternatives:
  - to the ground
  - earthward
  lexicon: HALOT
  rationale: The directional form of אֶרֶץ indicates motion downward to earth/ground.
    'To the earth' best matches the cosmic scope of the verse, since the objects are
    from the 'host of heaven.'
- source_word: מִן הַצָּבָא וּמִן הַכּוֹכָבִים
  chosen: some of the host and some of the stars
  alternatives:
  - from the host and from the stars
  - part of the host and of the stars
  lexicon: HALOT
  rationale: 'The preposition מִן after a verb of casting down is naturally partitive
    here: it cast down some from among the host and stars, not the entirety. Supplying
    ''some of'' makes the English explicit and avoids the misleading sense that the
    whole host fell.'
- source_word: הַכּוֹכָבִים
  chosen: the stars
  lexicon: HALOT
  rationale: Straightforward rendering of כּוֹכָבִים. In context the stars may function
    symbolically, but the lexical sense should remain 'stars' rather than an interpretive
    substitute.
- source_word: וַתִּרְמְסֵם
  chosen: and trampled them
  alternatives:
  - and trampled on them
  - and crushed them underfoot
  lexicon: HALOT
  rationale: רמס means to trample. 'Trampled them' is concise and forceful. The 3mp
    suffix refers back to those cast down from the host/stars.
