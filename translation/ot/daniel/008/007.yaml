id: DAN.8.7
reference: Daniel 8:7
source:
  edition: WLC
  text: וּ/רְאִיתִ֞י/ו מַגִּ֣יעַ אֵ֣צֶל הָ/אַ֗יִל וַ/יִּתְמַרְמַ֤ר אֵלָי/ו֙ וַ/יַּ֣ךְ
    אֶת הָ/אַ֔יִל וַ/יְשַׁבֵּר֙ אֶת שְׁתֵּ֣י קְרָנָ֔י/ו וְ/לֹא הָ֥יָה כֹ֛חַ בָּ/אַ֖יִל
    לַ/עֲמֹ֣ד לְ/פָנָ֑י/ו וַ/יַּשְׁלִיכֵ֤/הוּ אַ֨רְצָ/ה֙ וַֽ/יִּרְמְסֵ֔/הוּ וְ/לֹא
    הָיָ֥ה מַצִּ֛יל לָ/אַ֖יִל מִ/יָּדֽ/וֹ׀־־־־׃
translation:
  text: And I saw him come up to the ram, and he was enraged against him, and he struck
    the ram and broke its two horns. And there was no strength in the ram to stand
    before him; he threw him to the ground and trampled him, and there was no one
    to rescue the ram from his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approach the ram.' The Hebrew verb can denote coming near or reaching
      to.
    reason: lexical_alternative
  - marker: b
    text: Or 'he became bitter against him.' The Hebrew expression conveys intense
      hostility or embittered rage.
    reason: lexical_alternative
  - marker: c
    text: '''To stand before him'' can also mean ''to withstand him'' in this conflict
      setting.'
    reason: lexical_alternative
  - marker: d
    text: '''From his hand'' is a Hebrew idiom for being under someone''s power or
      control.'
    reason: cultural_note
lexical_decisions:
- source_word: וּרְאִיתִיו
  chosen: And I saw him
  alternatives:
  - And I watched him
  - And I saw it
  lexicon: HALOT
  rationale: First-person perfect with 3ms suffix, continuing Daniel's vision report.
    'Saw him' is the most direct rendering; 'watched' is possible but less literal.
    Masculine singular object fits the male goat in context.
- source_word: מַגִּיעַ אֵצֶל
  chosen: come up to
  alternatives:
  - approach
  - reach
  lexicon: HALOT
  rationale: The participle of נגע with אֵצֶל expresses coming near or reaching up
    to someone/something. 'Come up to' preserves the vivid motion in the vision better
    than the flatter 'approach,' while remaining natural English.
- source_word: הָאַיִל
  chosen: the ram
  lexicon: HALOT
  rationale: Standard rendering of אַיִל in this animal-vision context; context confirms
    the symbolic animal rather than a leader directly.
- source_word: וַיִּתְמַרְמַר אֵלָיו
  chosen: he was enraged against him
  alternatives:
  - he became bitter against him
  - he was embittered toward him
  - he charged at him in fury
  lexicon: HALOT
  rationale: The Hitpael of מרר conveys embitterment or intense provocation. In this
    combat context, 'was enraged against him' captures the hostile emotional force
    without overparaphrasing into mere action.
- source_word: וַיַּךְ
  chosen: he struck
  alternatives:
  - he attacked
  - he smote
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'smite.' 'Struck' is clear modern English
    and leaves the degree of violence to the surrounding clauses.
- source_word: וַיְשַׁבֵּר אֶת שְׁתֵּי קְרָנָיו
  chosen: and broke its two horns
  alternatives:
  - and shattered its two horns
  lexicon: HALOT
  rationale: שבר means 'break.' 'Broke' is the straightforward choice. The suffix
    refers back to the ram, so English uses 'its' for the animal.
- source_word: וְלֹא הָיָה כֹחַ בָּאַיִל
  chosen: And there was no strength in the ram
  alternatives:
  - And the ram had no power
  - And there was no power in the ram
  lexicon: HALOT
  rationale: כֹּחַ can mean strength or power. 'Strength' fits the immediate combat
    imagery and avoids sounding abstract or political here.
- source_word: לַעֲמֹד לְפָנָיו
  chosen: to stand before him
  alternatives:
  - to withstand him
  - to stand against him
  lexicon: HALOT
  rationale: The idiom literally means 'to stand before.' In conflict contexts it
    implies resistance, but the more literal wording preserves the Hebrew expression
    while remaining idiomatic in English.
- source_word: וַיַּשְׁלִיכֵהוּ אַרְצָה
  chosen: he threw him to the ground
  alternatives:
  - he cast him down to the earth
  - he hurled him to the ground
  lexicon: HALOT
  rationale: השליך means 'throw/cast,' and אַרְצָה indicates downward motion to the
    ground/earth. 'To the ground' is the most natural English in this scene.
- source_word: וַיִּרְמְסֵהוּ
  chosen: and trampled him
  alternatives:
  - and trampled on him
  - and crushed him underfoot
  lexicon: HALOT
  rationale: רמס denotes trampling. 'Trampled him' is concise and forceful, matching
    the violent imagery.
- source_word: וְלֹא הָיָה מַצִּיל לָאַיִל מִיָּדוֹ
  chosen: and there was no one to rescue the ram from his hand
  alternatives:
  - and no one could deliver the ram from his power
  - and there was no rescuer for the ram from his hand
  lexicon: HALOT
  rationale: מַצִּיל is an active participle, 'one rescuing/delivering.' 'No one to
    rescue' is idiomatic. 'From his hand' is retained because the Hebrew idiom conveys
    control or power through the image of the hand.
