theological_decisions:
- issue: Nature of הַזָּעַם in apocalyptic context
  chosen_reading: Rendered as 'the indignation' without explicitly specifying 'God's
    wrath' in the main text.
  alternative_readings:
  - the wrath
  - the period of wrath
  rationale: The context likely points to a divinely ordained period of wrath/judgment,
    but the Hebrew noun itself does not explicitly state the subject. To avoid importing
    a fuller theological interpretation than the wording itself makes explicit, the
    translation preserves the term's gravity while leaving the referent implicit.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
- issue: Force of לְמוֹעֵד קֵץ
  chosen_reading: Rendered 'for the appointed time' in the clause 'for the end is
    for the appointed time.'
  alternative_readings:
  - for it concerns the appointed time of the end
  - for the end will be at the appointed time
  rationale: The Hebrew is compressed and can be understood in more than one closely
    related way. The chosen rendering stays close to the syntax while remaining intelligible.
    A smoother interpretive expansion is preserved in a footnote rather than moved
    into the main text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
