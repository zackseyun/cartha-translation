id: DAN.8.19
reference: Daniel 8:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הִנְ/נִ֣י מוֹדִֽיעֲ/ךָ֔ אֵ֥ת אֲשֶׁר יִהְיֶ֖ה בְּ/אַחֲרִ֣ית הַ/זָּ֑עַם
    כִּ֖י לְ/מוֹעֵ֥ד קֵֽץ־׃
translation:
  text: Then he said, “Look, I am making known to you what will happen in the latter
    part of the indignation, for the end is for the appointed time.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the wrath' for 'the indignation.' The Hebrew term can denote intense
      anger or wrath, likely in a divinely appointed judgment context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for it concerns the appointed time of the end,' reflecting the compressed
      Hebrew expression.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר commonly advances the narrative. 'Then he said' gives
    natural English narrative flow while preserving sequence.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: Deictic particle introducing solemn attention. 'Look' is readable modern
    English and preserves the force better than archaic 'Behold'; 'Here I am' would
    be too literal for this discourse marker use.
- source_word: מוֹדִיעֲךָ
  chosen: I am making known to you
  alternatives:
  - I will make known to you
  - I am informing you
  lexicon: HALOT
  rationale: Hiphil participle of ידע with 2ms suffix expresses the speaker's act
    of disclosure. 'Making known' preserves the causative nuance better than the flatter
    'informing.' Present progressive works idiomatically in English for the immediate
    speech act.
- source_word: אֵת אֲשֶׁר יִהְיֶה
  chosen: what will happen
  alternatives:
  - that which will be
  - what will be
  lexicon: HALOT
  rationale: The object marker plus relative clause introduces the content of revelation.
    'What will happen' is natural English and captures future eventfulness implied
    by יהיה in context.
- source_word: בְּאַחֲרִית
  chosen: in the latter part of
  alternatives:
  - at the latter end of
  - in the latter end of
  - in the final part of
  lexicon: HALOT
  rationale: אַחֲרִית denotes latter end/outcome. 'In the latter part of' is idiomatic
    and avoids overly wooden phrasing while preserving temporal sequence.
- source_word: הַזָּעַם
  chosen: the indignation
  alternatives:
  - the wrath
  - the fury
  lexicon: HALOT
  rationale: זעם denotes indignation/anger, often divine wrath in prophetic contexts.
    'Indignation' preserves the formal prophetic tone and leaves the object/source
    of wrath implicit as in the Hebrew.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory ground for the preceding statement.
    'For' best preserves the explanatory linkage.
- source_word: לְמוֹעֵד
  chosen: for the appointed time
  alternatives:
  - for an appointed time
  - at the appointed time
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time/season. The preposition ל marks
    relation or destination; 'for the appointed time' preserves the concise Hebrew
    linkage to the end.
- source_word: קֵץ
  chosen: the end
  alternatives:
  - an end
  - the final end
  lexicon: HALOT
  rationale: קֵץ denotes end/termination. In English, supplying the article yields
    a natural clause, 'the end is for the appointed time,' matching the definite sense
    implied by context.
