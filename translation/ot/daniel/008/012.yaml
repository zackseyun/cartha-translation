theological_decisions:
- issue: Referent and agency of the feminine singular verbs
  chosen_reading: Render the verbs with the generic pronoun 'it' rather than specifying
    the little horn, the host, or another referent.
  alternative_readings:
  - he threw truth to the ground
  - the horn threw truth to the ground
  rationale: The Hebrew uses feminine singular verbal forms, creating a syntactic
    difficulty if one tries to align them with a masculine personal referent. Using
    'it' preserves the ambiguity of the vision's imagery and avoids resolving an interpretive
    question the text itself leaves compressed.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of תָּמִיד in this context
  chosen_reading: Translate as 'the regular burnt offering' in the main text.
  alternative_readings:
  - the daily sacrifice
  - the continual offering
  rationale: The term refers to the regular temple sacrifice. 'Regular burnt offering'
    communicates the cultic sense in accessible English while avoiding dependence
    on traditional phrasing that may obscure the sacrificial reference.
  doctrine_reference: Original-language primacy over translation tradition.
