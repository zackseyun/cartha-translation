id: DAN.8.12
reference: Daniel 8:12
source:
  edition: WLC
  text: וְ/צָבָ֛א תִּנָּתֵ֥ן עַל הַ/תָּמִ֖יד בְּ/פָ֑שַׁע וְ/תַשְׁלֵ֤ךְ אֱמֶת֙ אַ֔רְצָ/ה
    וְ/עָשְׂתָ֖ה וְ/הִצְלִֽיחָה־׃
translation:
  text: And a host was given over with the regular burnt offering because of transgression;
    and it threw truth to the ground, and it acted and prospered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the daily sacrifice' or 'the continual offering.' Hebrew tamid refers
      to the regular temple offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the regular burnt offering' for the preposition linking 'host'
      and 'the regular burnt offering'; the Hebrew construction is difficult.
    reason: alternative_reading
  - marker: c
    text: The Hebrew verbs are feminine singular; the precise referent is compressed
      in the vision and may point to the hostile power symbolized in the preceding
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְצָבָא
  chosen: a host
  alternatives:
  - the host
  - an army
  lexicon: HALOT
  rationale: צָבָא can denote an army/host. Here the singular collective sense fits
    the vision context. I chose 'a host' to preserve the Hebrew's ambiguity between
    military force and a body of people, rather than narrowing to 'army.'
- source_word: תִּנָּתֵן
  chosen: was given over
  alternatives:
  - was given
  - was handed over
  lexicon: HALOT
  rationale: Niphal of נתן is passive, 'be given.' 'Was given over' brings out the
    sense of being delivered into another's power, which fits the hostile context
    better than the flatter 'was given.'
- source_word: עַל
  chosen: with
  alternatives:
  - against
  - over
  - together with
  lexicon: HALOT
  rationale: The preposition עַל here is difficult. In this clause it likely links
    the host with the regular offering in a shared fate. 'With' preserves that association
    without overcommitting to a more interpretive sense such as 'against.'
- source_word: הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the regular offering
  - the continual burnt offering
  - the daily offering
  lexicon: HALOT
  rationale: In cultic context תָּמִיד refers to the regular/continual temple offering.
    'Regular burnt offering' is clear modern English and reflects the sacrificial
    reference better than the traditional but potentially vague 'daily sacrifice.'
- source_word: בְּפָשַׁע
  chosen: because of transgression
  alternatives:
  - in transgression
  - through transgression
  - by reason of rebellion
  lexicon: HALOT
  rationale: The beth preposition here is causal or circumstantial. 'Because of transgression'
    is the clearest English rendering and avoids prematurely specifying whose transgression
    is in view.
- source_word: וְתַשְׁלֵךְ
  chosen: it threw
  alternatives:
  - it cast down
  - it hurled
  lexicon: HALOT
  rationale: Hiphil of שלך means 'throw/cast.' 'Threw' is direct and natural; 'cast
    down' is possible but slightly more interpretive.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - what is true
  lexicon: HALOT
  rationale: אֱמֶת commonly means 'truth' or 'faithfulness.' In this apocalyptic context,
    'truth' best captures the suppression of what is true/right, while preserving
    the term's broad moral-religious force.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: The directional form of אֶרֶץ here idiomatically means 'to the ground/earth.'
    'To the ground' is the more natural English expression in this context.
- source_word: וְעָשְׂתָה
  chosen: it acted
  alternatives:
  - it did as it pleased
  - it acted effectively
  - it accomplished
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, act, make'). Since the object is unstated,
    'it acted' preserves the Hebrew terseness without importing 'as it pleased,' which
    is interpretive though contextually plausible.
- source_word: וְהִצְלִיחָה
  chosen: prospered
  alternatives:
  - succeeded
  - thrived
  lexicon: HALOT
  rationale: Hiphil of צלח often means 'prosper, succeed.' 'Prospered' is a standard
    rendering in this kind of narrative-prophetic summary and pairs well with the
    preceding verb.
