theological_decisions:
- issue: Meaning of the command to seal the vision
  chosen_reading: A command to preserve/conceal the revelation because its fulfillment
    lies in the more distant future.
  alternative_readings:
  - A command merely to authenticate the vision
  - A command to stop speaking about the vision
  rationale: The verb סתם in prophetic/apocalyptic context most naturally carries
    the sense of closing up or sealing for later, not denying its truth. The following
    clause about 'many days' supports delayed relevance/future fulfillment.
