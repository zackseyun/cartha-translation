id: DAN.8.26
reference: Daniel 8:26
source:
  edition: WLC
  text: וּ/מַרְאֵ֨ה הָ/עֶ֧רֶב וְ/הַ/בֹּ֛קֶר אֲשֶׁ֥ר נֶאֱמַ֖ר אֱמֶ֣ת ה֑וּא וְ/אַתָּה֙
    סְתֹ֣ם הֶֽ/חָז֔וֹן כִּ֖י לְ/יָמִ֥ים רַבִּֽים׃
translation:
  text: And the vision of the evening and the morning that was spoken is true; but
    you, seal up the vision, for it concerns many days from now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the evenings and mornings.' The Hebrew expression closely echoes the
      earlier time reference and may be understood collectively.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for many days.' The sense is that the vision pertains to a time
      far off.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  chosen: vision
  alternatives:
  - appearance
  - what was seen
  lexicon: HALOT
  rationale: In Daniel's apocalyptic context, מַרְאֵה refers to the revelatory sight/vision
    rather than mere visual appearance. 'Vision' fits both context and standard prophetic
    usage.
- source_word: הָעֶרֶב וְהַבֹּקֶר
  chosen: the evening and the morning
  alternatives:
  - the evenings and mornings
  - the evening-morning
  lexicon: HALOT
  rationale: A formally close rendering preserves the wording that echoes the earlier
    explanation of the time period. Singular forms with articles are best represented
    as 'the evening and the morning' rather than smoothing to a paraphrase.
- source_word: אֲשֶׁר נֶאֱמַר
  chosen: that was spoken
  alternatives:
  - which was told
  - that was said
  lexicon: HALOT
  rationale: The Niphal of אמר here is naturally rendered passively. 'Was spoken'
    preserves the formal sense while remaining idiomatic.
- source_word: אֱמֶת הוּא
  chosen: is true
  alternatives:
  - is truth
  - is certain
  lexicon: HALOT
  rationale: The clause affirms the reliability of the revelation. 'Is true' is idiomatic
    English and preserves the force of אֱמֶת without sounding abstract or wooden.
- source_word: סְתֹם
  chosen: seal up
  alternatives:
  - shut up
  - close up
  lexicon: HALOT
  rationale: The imperative means to close or seal. 'Seal up' best conveys the prophetic
    sense of preserving/concealing the revelation for a future time, and is more natural
    in modern English than 'shut up'.
- source_word: הֶחָזוֹן
  chosen: the vision
  alternatives:
  - the revelation
  lexicon: HALOT
  rationale: חָזוֹן is the standard term for prophetic vision. Keeping 'vision' also
    distinguishes it from מַרְאֵה only minimally; both refer to revelatory sight here,
    and English can naturally repeat the term.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for sealing the vision. 'For' is concise
    and suitably formal without being archaic in this context.
- source_word: לְיָמִים רַבִּים
  chosen: for it concerns many days from now
  alternatives:
  - for it is for many days
  - for many days remain until it
  lexicon: HALOT
  rationale: The phrase literally means 'for many days,' but in context it indicates
    futurity/remoteness. 'Concerns many days from now' makes the temporal force clear
    in natural English without overinterpreting.
