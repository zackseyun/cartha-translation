id: DAN.8.23
reference: Daniel 8:23
source:
  edition: WLC
  text: וּֽ/בְ/אַחֲרִית֙ מַלְכוּתָ֔/ם כְּ/הָתֵ֖ם הַ/פֹּשְׁעִ֑ים יַעֲמֹ֛ד מֶ֥לֶךְ עַז
    פָּנִ֖ים וּ/מֵבִ֥ין חִידֽוֹת־׃
translation:
  text: And at the latter end of their kingdom, when the transgressors have reached
    their full measure, a king will arise, fierce in countenance and skilled in intrigue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and understanding riddles' or 'and understanding dark sayings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאַחֲרִית
  chosen: And at the latter end of
  alternatives:
  - And in the latter part of
  - And at the end of
  lexicon: HALOT
  rationale: אַחֲרִית denotes the latter part or end of a period. 'Latter end' preserves
    the temporal sense with elevated but still readable English; the prefixed conjunction
    is carried by 'And.'
- source_word: מַלְכוּתָם
  chosen: their kingdom
  alternatives:
  - their reign
  - their kingship
  - their kingdoms
  lexicon: HALOT
  rationale: The singular noun with 3mp suffix is best rendered 'their kingdom,' referring
    collectively to the realm/dominion associated with the preceding rulers/horns.
    'Kingdoms' would overread the singular form.
- source_word: כְּהָתֵם
  chosen: when ... have reached their full measure
  alternatives:
  - when ... are finished
  - as ... come to an end
  - when ... have completed
  lexicon: HALOT
  rationale: From תמם, the form conveys completion/fullness. In context with 'the
    transgressors,' the sense is not that the sinners cease to exist but that their
    rebellion reaches its full extent. This avoids a misleadingly wooden 'are finished'
    while staying close to the Hebrew idea of completion.
- source_word: הַפֹּשְׁעִים
  chosen: the transgressors
  alternatives:
  - the rebels
  - the sinners
  lexicon: HALOT
  rationale: פשׁע commonly denotes rebellion/transgression, often with covenantal
    overtones. 'Transgressors' preserves that moral-rebellious nuance better than
    the broader 'sinners.'
- source_word: יַעֲמֹד
  chosen: will arise
  alternatives:
  - will stand up
  - will appear
  lexicon: HALOT
  rationale: In royal-political contexts עמד often means to arise or come on the scene.
    'Will arise' is idiomatic and preserves the emergence of a ruler.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - one king
  - a ruler
  lexicon: HALOT
  rationale: The straightforward sense is 'a king.' 'Ruler' is possible dynamically
    but less precise than the Hebrew noun.
- source_word: עַז פָּנִים
  chosen: fierce in countenance
  alternatives:
  - bold-faced
  - stern-faced
  - hard-faced
  lexicon: HALOT
  rationale: Literally 'strong of face.' The idiom conveys audacity, hardness, or
    fierce demeanor. 'Fierce in countenance' preserves the facial idiom while communicating
    severity and boldness.
- source_word: וּמֵבִין חִידוֹת
  chosen: and skilled in intrigue
  alternatives:
  - and understanding riddles
  - and skilled in riddles
  - and understanding dark sayings
  lexicon: HALOT
  rationale: בין + חידות can denote understanding riddles, enigmatic sayings, or subtle/obscure
    matters. In this apocalyptic-political context, the phrase likely points to shrewdness
    in enigmatic or crafty dealings. 'Skilled in intrigue' communicates that practical
    nuance in natural English, while the more literal 'understanding riddles' is preserved
    in a footnote.
