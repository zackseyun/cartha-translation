theological_decisions:
- issue: Interpretive force of וּמֵבִין חִידוֹת
  chosen_reading: The phrase is rendered as political/crafty shrewdness ('skilled
    in intrigue') rather than merely intellectual ability with puzzles.
  alternative_readings:
  - understanding riddles
  - understanding dark sayings
  rationale: The immediate context describes the character and rise of a hostile king.
    Rendering the phrase as practical cunning fits the portrait of a dangerous ruler
    better than a narrow reference to puzzle-solving. Because the Hebrew can also
    be read more literally, that alternative is preserved in a footnote rather than
    excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
