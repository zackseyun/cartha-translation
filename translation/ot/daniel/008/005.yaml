theological_decisions:
- issue: Symbolic-animal imagery in apocalyptic vision
  chosen_reading: Retain the literal animal imagery ('male goat,' 'horn') without
    importing the later interpretation into the translation.
  alternative_readings:
  - Translate interpretively in light of later explanation (e.g., implying a kingdom
    or ruler)
  rationale: The verse itself presents the vision symbolically and does not yet identify
    the referents. Preserving the imagery rather than resolving it respects the text's
    sequence and avoids importing interpretation into translation.
  doctrine_reference: Translation philosophy §1, §3
