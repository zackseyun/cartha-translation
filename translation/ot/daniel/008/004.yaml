id: DAN.8.4
reference: Daniel 8:4
source:
  edition: WLC
  text: רָאִ֣יתִי אֶת הָ/אַ֡יִל מְנַגֵּחַ֩ יָ֨מָּ/ה וְ/צָפ֜וֹנָ/ה וָ/נֶ֗גְבָּ/ה וְ/כָל
    חַיּוֹת֙ לֹֽא יַֽעַמְד֣וּ לְ/פָנָ֔י/ו וְ/אֵ֥ין מַצִּ֖יל מִ/יָּד֑/וֹ וְ/עָשָׂ֥ה
    כִ/רְצֹנ֖/וֹ וְ/הִגְדִּֽיל־־־׃
translation:
  text: I saw the ram charging westward and northward and southward, and no beasts
    could stand before him, and there was no one who could rescue from his hand. He
    did as he pleased and became great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and magnified himself' or 'and grew great.' The Hebrew can express
      either becoming great or making oneself great.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I was watching
  - I looked
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of ראה is straightforward past narrative: ''I saw.'''
- source_word: הָאַיִל
  chosen: the ram
  lexicon: HALOT
  rationale: אַיִל denotes a ram. The article is retained in English as a definite
    referent within the vision.
- source_word: מְנַגֵּחַ
  chosen: charging
  alternatives:
  - butting
  - goring
  - pushing
  lexicon: HALOT
  rationale: The participle of נגח refers to the forceful action of a horned animal.
    'Charging' is natural modern English and fits the ram imagery better than the
    more wooden 'pushing.'
- source_word: יָמָּה וְצָפוֹנָה וָנֶגְבָּה
  chosen: westward and northward and southward
  alternatives:
  - to the west and to the north and to the south
  lexicon: HALOT
  rationale: The directional he ending indicates motion toward a direction. The adverbial
    '-ward' form preserves that nuance compactly.
- source_word: וְכָל חַיּוֹת
  chosen: and no beasts
  alternatives:
  - and none of the beasts
  - and no living creatures
  lexicon: HALOT
  rationale: חַיּוֹת here refers to animals/beasts in the visionary context, not generic
    living beings. Because it is followed by negation, idiomatic English expresses
    the sense as 'no beasts.'
- source_word: לֹא יַעַמְדוּ לְפָנָיו
  chosen: could stand before him
  alternatives:
  - stood before him
  - could withstand him
  lexicon: HALOT
  rationale: The imperfect with negation in context expresses inability/resistance.
    'Could stand before him' preserves the idiom while conveying defeat.
- source_word: וְאֵין מַצִּיל מִיָּדוֹ
  chosen: and there was no one who could rescue from his hand
  alternatives:
  - and none could deliver from his hand
  - and there was no rescuer from his power
  lexicon: HALOT
  rationale: נצל in the Hiphil means rescue/deliver. 'From his hand' is retained as
    a Hebrew idiom for power/control rather than paraphrased away.
- source_word: וְעָשָׂה כִרְצֹנוֹ
  chosen: He did as he pleased
  alternatives:
  - he acted according to his will
  - he did according to his desire
  lexicon: HALOT
  rationale: This idiom commonly means acting according to one's own will or pleasure.
    'As he pleased' is idiomatic and concise.
- source_word: וְהִגְדִּיל
  chosen: and became great
  alternatives:
  - and magnified himself
  - and grew great
  - and exalted himself
  lexicon: HALOT
  rationale: The Hiphil of גדל can mean to make great or to magnify oneself. In this
    context, the resultative sense 'became great' fits the sequence of conquest and
    expansion without over-interpreting reflexively.
