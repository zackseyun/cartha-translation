theological_decisions:
- issue: Rendering of בֶּן אָדָם in an apocalyptic context
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: Although the phrase can function idiomatically for a human being, the
    translation retains the literal 'son of man' because it is the source wording,
    preserves intertextual resonance within Daniel, and avoids prematurely resolving
    whether only generic humanity or a more literary/thematic nuance is intended.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    theological tension rather than resolve it.'
- issue: Sense of לְעֵת קֵץ
  chosen_reading: the vision is for the time of the end
  alternative_readings:
  - the vision concerns the appointed end
  - the vision is for the end time
  rationale: The phrase is rendered straightforwardly without importing a detailed
    eschatological scheme. This preserves the text's claim that the vision pertains
    to an end-point/time of culmination, while avoiding doctrinal over-specification.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not
    make; preserve theological tension rather than resolve it.'
