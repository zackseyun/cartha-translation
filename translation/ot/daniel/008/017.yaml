id: DAN.8.17
reference: Daniel 8:17
source:
  edition: WLC
  text: וַ/יָּבֹא֙ אֵ֣צֶל עָמְדִ֔/י וּ/בְ/בֹא֣/וֹ נִבְעַ֔תִּי וָ/אֶפְּלָ֖/ה עַל פָּנָ֑/י
    וַ/יֹּ֤אמֶר אֵלַ/י֙ הָבֵ֣ן בֶּן אָדָ֔ם כִּ֖י לְ/עֶת קֵ֥ץ הֶ/חָזֽוֹן־־־׃
translation:
  text: So he came near where I was standing, and when he came, I was terrified and
    fell on my face. Then he said to me, “Understand, son of man, that the vision
    is for the time of the end.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “human one” or “mortal.” Hebrew: “son of man.”'
    reason: lexical_alternative
  - marker: b
    text: Or “the vision concerns the appointed end.”
    reason: alternative_reading
lexical_decisions:
- source_word: אֵצֶל עָמְדִי
  chosen: near where I was standing
  alternatives:
  - beside my standing place
  - to where I stood
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity ('near, beside'). With עָמְדִי ('my standing'),
    the idiom refers to Daniel's location as he stood. 'Near where I was standing'
    is natural English while preserving the spatial sense.
- source_word: נִבְעַתִּי
  chosen: I was terrified
  alternatives:
  - I was frightened
  - I was startled
  lexicon: HALOT
  rationale: The Niphal of בעת conveys being overcome with fear or terror. 'Terrified'
    best captures the intensity of Daniel's reaction in context.
- source_word: וָאֶפְּלָה עַל־פָּנַי
  chosen: and fell on my face
  alternatives:
  - and fell facedown
  - and fell upon my face
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for falling prostrate. 'Fell on
    my face' preserves the idiom clearly in English.
- source_word: הָבֵן
  chosen: Understand
  alternatives:
  - Perceive
  - Consider carefully
  lexicon: HALOT
  rationale: The Hiphil imperative of בין calls for understanding or discernment.
    'Understand' is direct and idiomatic in address.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Literally 'son of man.' In Daniel this address to Daniel emphasizes his
    humanity. Per doctrine, gender-accurate rendering is preferred; the literal form
    is retained rather than a flattened paraphrase.
- source_word: לְעֵת קֵץ
  chosen: for the time of the end
  alternatives:
  - for the end time
  - for the appointed time of the end
  lexicon: HALOT
  rationale: The phrase points to the time characterized by the end/termination in
    view. 'For the time of the end' is both natural and close to the Hebrew wording.
- source_word: הֶחָזוֹן
  chosen: the vision
  alternatives:
  - this vision
  lexicon: HALOT
  rationale: The definite noun refers back to the revelatory vision Daniel has received.
    'The vision' is sufficient in English without adding emphasis not explicit in
    the Hebrew.
