id: DAN.8.3
reference: Daniel 8:3
source:
  edition: WLC
  text: וָ/אֶשָּׂ֤א עֵינַ/י֙ וָ/אֶרְאֶ֔ה וְ/הִנֵּ֣ה אַ֣יִל אֶחָ֗ד עֹמֵ֛ד לִ/פְנֵ֥י
    הָ/אֻבָ֖ל וְ/ל֣/וֹ קְרָנָ֑יִם וְ/הַ/קְּרָנַ֣יִם גְּבֹה֗וֹת וְ/הָ/אַחַת֙ גְּבֹהָ֣ה
    מִן הַ/שֵּׁנִ֔ית וְ/הַ֨/גְּבֹהָ֔ה עֹלָ֖ה בָּ/אַחֲרֹנָֽה׀־׃
translation:
  text: Then I lifted up my eyes and saw, and behold, one ram was standing before
    the canal, and it had two horns. The horns were high, but one was higher than
    the other, and the higher one came up last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stream' or 'river' for 'canal'; the Hebrew term refers to a watercourse
      and in Daniel likely denotes a canal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the higher one arose later.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא עֵינַי
  chosen: Then I lifted up my eyes
  alternatives:
  - I raised my eyes
  - I looked up
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for directing one's gaze. Rendering it fairly
    literally preserves the visionary style without becoming unnatural in English.
- source_word: וָאֶרְאֶה וְהִנֵּה
  chosen: and saw, and behold
  alternatives:
  - and I saw, and look
  - and saw, and there was
  lexicon: HALOT
  rationale: The sequence marks vivid perception in a vision report. 'Behold' preserves
    the deictic force of הִנֵּה and the elevated narrative tone.
- source_word: אַיִל אֶחָד
  chosen: one ram
  alternatives:
  - a ram
  - a single ram
  lexicon: HALOT
  rationale: אַיִל specifically denotes a ram, not a generic male animal. Including
    'one' reflects אֶחָד and matches the introduction of a symbolic figure in the
    vision.
- source_word: עֹמֵד לִפְנֵי הָאֻבָל
  chosen: was standing before the canal
  alternatives:
  - was standing in front of the stream
  - stood before the river
  lexicon: HALOT
  rationale: עֹמֵד is a participle describing the ram's position. אֻבָל in Daniel
    refers to a watercourse/canal; 'canal' fits the likely setting better than the
    broader 'river' and avoids overtranslation.
- source_word: וְלוֹ קְרָנָיִם
  chosen: and it had two horns
  alternatives:
  - with two horns
  lexicon: HALOT
  rationale: 'The pronominal construction literally ''and to it [were] two horns''
    is best rendered idiomatically in English as possession: ''it had two horns.'''
- source_word: וְהַקְּרָנַיִם גְּבֹהוֹת
  chosen: The horns were high
  alternatives:
  - the horns were tall
  - the horns were prominent
  lexicon: HALOT
  rationale: גָּבֹהַּ denotes height. 'High' is the most direct rendering for the
    physical description of the horns.
- source_word: וְהָאַחַת גְּבֹהָה מִן הַשֵּׁנִית
  chosen: but one was higher than the other
  alternatives:
  - and one was higher than the second
  - and one was taller than the other
  lexicon: HALOT
  rationale: English idiom prefers 'the other' rather than the more wooden 'the second.'
    'Higher' maintains lexical continuity with the previous clause.
- source_word: וְהַגְּבֹהָה עֹלָה בָּאַחֲרֹנָה
  chosen: and the higher one came up last
  alternatives:
  - and the higher one arose later
  - and the taller one was coming up afterward
  lexicon: HALOT
  rationale: עֹלָה here describes emergence/growth rather than upward motion alone.
    'Came up last' is natural English and preserves the temporal sense of בָּאַחֲרֹנָה,
    indicating that the more prominent horn appeared later.
