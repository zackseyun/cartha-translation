theological_decisions:
- issue: Symbolic-animal imagery in apocalyptic vision
  chosen_reading: Retain the concrete imagery ('ram,' 'horns') without interpretive
    expansion in the main text.
  alternative_readings:
  - Translate with explanatory interpretation in the verse itself
  rationale: The verse presents symbolic imagery whose interpretation is given later
    in the chapter. To avoid importing interpretation into the translation, the main
    text stays with the literal visionary description.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
