theological_decisions:
- issue: Referent of the symbolic goat and horn
  chosen_reading: 'The verse is rendered as the angelic interpretation of the vision:
    the goat represents the king of Greece, and the great horn represents the first
    king.'
  alternative_readings:
  - The goat represents the Greek kingdom collectively rather than its king alone.
  rationale: The Hebrew explicitly says מֶלֶךְ יָוָן ('king of Greece') and then identifies
    the horn as 'the first king.' The translation preserves the text's own symbolic
    interpretation without importing later historical identification into the main
    text.
  doctrine_reference: Translation philosophy §1, §3
