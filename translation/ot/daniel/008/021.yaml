id: DAN.8.21
reference: Daniel 8:21
source:
  edition: WLC
  text: וְ/הַ/צָּפִ֥יר הַ/שָּׂעִ֖יר מֶ֣לֶךְ יָוָ֑ן וְ/הַ/קֶּ֤רֶן הַ/גְּדוֹלָה֙ אֲשֶׁ֣ר
    בֵּין עֵינָ֔י/ו ה֖וּא הַ/מֶּ֥לֶךְ הָ/רִאשֽׁוֹן־׃
translation:
  text: And the shaggy male goat is the king of Greece, and the great horn that is
    between his eyes is the first king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the he-goat' or simply 'the goat.' The Hebrew expression is more vivid,
      describing a male goat with shaggy hair.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Javan,' a term commonly referring here to Greece or the Greek realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצָּפִיר הַשָּׂעִיר
  chosen: the shaggy male goat
  alternatives:
  - the goat
  - the he-goat
  - the buck
  lexicon: HALOT
  rationale: The paired expression combines terms for a male goat and its shaggy/hairy
    character. Rendering both elements as 'the shaggy male goat' preserves the descriptive
    force better than flattening to simply 'the goat,' while remaining natural English.
- source_word: מֶלֶךְ יָוָן
  chosen: the king of Greece
  alternatives:
  - the king of Javan
  - the kingdom of Greece
  lexicon: HALOT
  rationale: יָוָן in this context refers to Greece/Greek power, not merely the personal
    name Javan. מֶלֶךְ is singular and personal, so 'the king of Greece' is preferable
    to 'the kingdom of Greece.'
- source_word: הַקֶּרֶן הַגְּדוֹלָה
  chosen: the great horn
  alternatives:
  - the large horn
  lexicon: HALOT
  rationale: '''Great horn'' is the most natural and established equivalent for the
    symbolic image, preserving both size and prominence.'
- source_word: אֲשֶׁר בֵּין עֵינָיו
  chosen: that is between his eyes
  alternatives:
  - which was between his eyes
  - that was between its eyes
  lexicon: HALOT
  rationale: The relative clause is straightforward. Present tense 'is' matches the
    verbless Hebrew description in context. 'His' follows the masculine singular pronominal
    suffix and keeps the personified symbolism coherent in English.
- source_word: הוּא הַמֶּלֶךְ הָרִאשׁוֹן
  chosen: is the first king
  alternatives:
  - is the former king
  - is the first ruler
  lexicon: HALOT
  rationale: רִאשׁוֹן here denotes first in sequence, not merely former. 'King' should
    be retained for consistency with מֶלֶךְ earlier in the verse and the political
    interpretation being given.
