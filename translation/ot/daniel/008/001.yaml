id: DAN.8.1
reference: Daniel 8:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שָׁל֔וֹשׁ לְ/מַלְכ֖וּת בֵּלְאשַׁצַּ֣ר הַ/מֶּ֑לֶךְ חָז֞וֹן נִרְאָ֤ה
    אֵלַ/י֙ אֲנִ֣י דָנִיֵּ֔אל אַחֲרֵ֛י הַ/נִּרְאָ֥ה אֵלַ֖/י בַּ/תְּחִלָּֽה׃
translation:
  text: In the third year of the reign of Belshazzar the king, a vision appeared to
    me—I, Daniel—after the one that had appeared to me at the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'after the vision that had appeared to me at the first.'
      The Hebrew refers back to an earlier appearing and likely alludes to Daniel's
      previous vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the ... year of
  alternatives:
  - During the ... year of
  lexicon: HALOT
  rationale: Temporal beth with שָׁנָה introduces the time setting idiomatically in
    English as 'In the ... year of.'
- source_word: שָׁלוֹשׁ
  chosen: third
  alternatives:
  - three
  lexicon: HALOT
  rationale: 'With שְׁנַת in a dating formula, the cardinal functions idiomatically
    as an ordinal in English: ''third year.'''
- source_word: לְמַלְכוּת
  chosen: of the reign of
  alternatives:
  - of the kingship of
  - when ... reigned
  lexicon: HALOT
  rationale: The noun מַלְכוּת here denotes royal rule/reign in a chronological formula.
    'Reign' is the most natural English equivalent in this context.
- source_word: בֵּלְאשַׁצַּר
  chosen: Belshazzar
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King Belshazzar
  lexicon: HALOT
  rationale: The appositional title is retained explicitly from the Hebrew. Although
    English could compress to 'King Belshazzar,' preserving 'Belshazzar the king'
    more closely reflects the source order and emphasis.
- source_word: חָזוֹן
  chosen: a vision
  alternatives:
  - vision
  lexicon: HALOT
  rationale: 'Indefinite in sense here: Daniel introduces a visionary experience,
    not yet specifying its content. ''A vision'' is natural English.'
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - was revealed
  lexicon: HALOT
  rationale: Niphal of ראה commonly conveys 'appear' in contexts of visions. 'Appeared'
    is idiomatic and preserves the passive/reflexive sense without awkwardness.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase indicating the recipient
    of the vision.
- source_word: אֲנִי דָנִיֵּאל
  chosen: I, Daniel
  alternatives:
  - to me, Daniel
  - to me, Daniel myself
  lexicon: HALOT
  rationale: The explicit pronoun plus name is emphatic/appositional. Rendering it
    as 'I, Daniel' preserves the self-identification and slight emphasis.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Simple temporal/sequential marker relating this vision to an earlier
    one.
- source_word: הַנִּרְאָה
  chosen: the one that had appeared
  alternatives:
  - the vision that had appeared
  - what had appeared
  lexicon: HALOT
  rationale: The article with the Niphal participial/verbal form points back to a
    prior appearing. English requires an explicit nominal support; 'the one that had
    appeared' avoids over-supplying 'vision' while still being clear.
- source_word: בַּתְּחִלָּה
  chosen: at the first
  alternatives:
  - at first
  - in the beginning
  - previously
  lexicon: HALOT
  rationale: Here the phrase points to the earlier vision previously received (likely
    the first one in the sequence). 'At the first' preserves the definite sense better
    than the more adverbial 'at first.'
