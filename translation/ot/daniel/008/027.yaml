theological_decisions:
- issue: Subject of וְאֵין מֵבִין
  chosen_reading: 'existential/impersonal: ''there was no one who understood it'''
  alternative_readings:
  - 'personal: ''but I did not understand it'''
  rationale: The Masoretic wording literally reads 'and there is not understanding/one
    understanding.' Because no explicit first-person pronoun appears, the impersonal
    rendering better reflects the Hebrew form. However, the immediate context of Daniel's
    reaction makes the personal sense plausible, so the alternative is preserved in
    a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
