id: DAN.8.27
reference: Daniel 8:27
source:
  edition: WLC
  text: וַ/אֲנִ֣י דָנִיֵּ֗אל נִהְיֵ֤יתִי וְ/נֶֽחֱלֵ֨יתִי֙ יָמִ֔ים וָ/אָק֕וּם וָ/אֶֽעֱשֶׂ֖ה
    אֶת מְלֶ֣אכֶת הַ/מֶּ֑לֶךְ וָ/אֶשְׁתּוֹמֵ֥ם עַל הַ/מַּרְאֶ֖ה וְ/אֵ֥ין מֵבִֽין־־׃פ
translation:
  text: And I, Daniel, was overcome and was sick for days. Then I rose and did the
    king’s work, but I was appalled by the vision, and there was no one who understood
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but I did not understand it.' The Hebrew expression is terse and may
      be taken either impersonally ('there was no one who understood it') or personally
      of Daniel himself.
    reason: alternative_reading
lexical_decisions:
- source_word: נִהְיֵיתִי
  chosen: was overcome
  alternatives:
  - became exhausted
  - fainted
  - was done in
  lexicon: HALOT
  rationale: From היה in this context the sense is not simple existence ('I was')
    but a resultant state after the vision. 'Was overcome' captures Daniel's collapse
    or depletion without over-specifying physical fainting.
- source_word: נֶחֱלֵיתִי
  chosen: was sick
  alternatives:
  - became ill
  - was weakened
  lexicon: HALOT
  rationale: The Niphal of חלה commonly denotes becoming sick or weak. 'Was sick'
    is the most natural modern English rendering and fits the following duration phrase
    'for days.'
- source_word: יָמִים
  chosen: for days
  alternatives:
  - for some days
  - for many days
  lexicon: HALOT
  rationale: The plural 'days' functions idiomatically for an unspecified span. 'For
    days' preserves the Hebrew's indefiniteness better than specifying 'some' or 'many.'
- source_word: וָאָקוּם
  chosen: Then I rose
  alternatives:
  - and I arose
  - afterward I got up
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I rose' gives natural
    English sequence while preserving the action of recovery and resumption.
- source_word: וָאֶעֱשֶׂה אֶת מְלֶאכֶת הַמֶּלֶךְ
  chosen: did the king’s work
  alternatives:
  - carried out the king's business
  - performed the king's service
  lexicon: HALOT
  rationale: מְלָאכָה is work/task/business. 'Did the king’s work' is concise and
    faithful, indicating Daniel resumed his royal duties without adding interpretive
    detail.
- source_word: וָאֶשְׁתּוֹמֵם
  chosen: I was appalled
  alternatives:
  - I was astonished
  - I was desolated
  - I was stunned
  lexicon: HALOT
  rationale: The reflexive form conveys being devastated, appalled, or stunned. 'Appalled'
    best reflects the troubling, disorienting impact of the revelation, stronger than
    mere surprise.
- source_word: הַמַּרְאֶה
  chosen: the vision
  alternatives:
  - the appearance
  - what was seen
  lexicon: HALOT
  rationale: In Daniel this noun commonly refers to the visionary sight/revelation,
    not merely visual appearance. 'The vision' matches the apocalyptic context.
- source_word: וְאֵין מֵבִין
  chosen: there was no one who understood it
  alternatives:
  - and I did not understand it
  - and there was no understanding
  - but none understood
  lexicon: HALOT
  rationale: 'The Hebrew is terse and somewhat ambiguous because the participle lacks
    an explicit subject. The most straightforward reading is impersonal/existential:
    no one understood it. This preserves the MT wording better than shifting to first
    person, while the alternative is worth noting in a footnote because some translations
    take Daniel himself as the implied subject.'
