theological_decisions:
- issue: Nature of Daniel's condition under the vision
  chosen_reading: physical collapse into deep sleep/stupor rather than a doctrinally
    loaded ecstatic state
  alternative_readings:
  - trance
  - visionary ecstasy
  rationale: The Hebrew רדם indicates deep sleep or stupor. The verse describes Daniel's
    bodily response to the angelic encounter without requiring a technical term such
    as 'trance.' The translation preserves the narrative description and avoids importing
    a more specialized theological category than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
