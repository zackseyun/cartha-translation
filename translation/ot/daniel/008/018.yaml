id: DAN.8.18
reference: Daniel 8:18
source:
  edition: WLC
  text: וּ/בְ/דַבְּר֣/וֹ עִמִּ֔/י נִרְדַּ֥מְתִּי עַל פָּנַ֖/י אָ֑רְצָ/ה וַ/יִּ֨גַּע
    בִּ֔/י וַ/יַּֽעֲמִידֵ֖/נִי עַל עָמְדִֽ/י־־־׃
translation:
  text: And while he was speaking with me, I fell into a deep sleep with my face to
    the ground; but he touched me and made me stand up where I had been standing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I was in a deep sleep' or 'I fell into a trance-like sleep.' The Hebrew
      describes being overcome by deep sleep or stupor.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and made me stand upon my standing.' The expression likely means
      he set me back on my feet, at my place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַבְּרוֹ
  chosen: while he was speaking
  alternatives:
  - as he spoke
  - during his speaking
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct plus suffix gives a temporal
    sense, 'while/in the course of his speaking.' 'While he was speaking' is idiomatic
    modern English and preserves the ongoing action.
- source_word: עִמִּי
  chosen: with me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' In English, 'speaking with
    me' is natural and reflects the Hebrew more closely than 'to me,' though the latter
    is possible in context.
- source_word: נִרְדַּמְתִּי
  chosen: I fell into a deep sleep
  alternatives:
  - I was in a deep sleep
  - I became numb with sleep
  lexicon: HALOT
  rationale: The Niphal of רדם commonly denotes falling into a deep sleep or being
    overcome by sleep/trance-like stupor. 'Fell into a deep sleep' captures the ingressive
    nuance better than a simple stative rendering.
- source_word: עַל־פָּנַי אָרְצָה
  chosen: with my face to the ground
  alternatives:
  - on my face to the earth
  - face down on the ground
  lexicon: HALOT
  rationale: Literally 'upon my face, earthward.' The chosen rendering is natural
    English while preserving the posture of prostration/collapse. 'Ground' is preferred
    over 'earth' here because the phrase describes physical position.
- source_word: וַיִּגַּע בִּי
  chosen: he touched me
  alternatives:
  - he struck me lightly
  - he reached me
  lexicon: HALOT
  rationale: נגע with ב commonly means 'touch.' No stronger sense is demanded here;
    the touch functions to rouse and restore Daniel.
- source_word: וַיַּעֲמִידֵנִי
  chosen: made me stand up
  alternatives:
  - set me upright
  - caused me to stand
  lexicon: HALOT
  rationale: 'The Hiphil of עמד is causative: ''cause to stand.'' ''Made me stand
    up'' is clear, natural, and preserves the causative force.'
- source_word: עַל־עָמְדִי
  chosen: where I had been standing
  alternatives:
  - on my standing place
  - to my station
  - upright
  lexicon: HALOT
  rationale: This idiom is somewhat compressed. Literally it is 'upon my standing.'
    In context it most likely means restoration to his standing position/place. 'Where
    I had been standing' conveys that he was set back on his feet in his place, avoiding
    an overly wooden phrase.
