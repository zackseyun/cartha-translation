id: DAN.8.9
reference: Daniel 8:9
source:
  edition: WLC
  text: וּ/מִן הָ/אַחַ֣ת מֵ/הֶ֔ם יָצָ֥א קֶֽרֶן אַחַ֖ת מִ/צְּעִירָ֑ה וַ/תִּגְדַּל יֶ֛תֶר
    אֶל הַ/נֶּ֥גֶב וְ/אֶל הַ/מִּזְרָ֖ח וְ/אֶל הַ/צֶּֽבִי־־־־־־׃
translation:
  text: And out of one of them came a small horn, and it grew exceedingly great toward
    the south, toward the east, and toward the Beautiful Land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a little horn."
    reason: lexical_alternative
  - marker: b
    text: Or "the glorious land" or "the pleasant land." The Hebrew expression is
      a descriptive title, likely referring to the land of Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן הָאַחַת מֵהֶם
  chosen: And out of one of them
  alternatives:
  - And from one of them
  - And from one of these
  lexicon: HALOT
  rationale: The preposition-min construction indicates origin/source. 'One of them'
    is the plain sense of הָאַחַת מֵהֶם. 'Out of' is idiomatic in English for emergence
    from among a group.
- source_word: יָצָא
  chosen: came
  alternatives:
  - went out
  - came forth
  lexicon: HALOT
  rationale: The verb means 'go out/come out.' In English, with the following source
    phrase, 'came' yields natural modern style without losing the emergence sense.
- source_word: קֶרֶן אַחַת
  chosen: a ... horn
  alternatives:
  - one horn
  lexicon: HALOT
  rationale: קֶרֶן is literally 'horn,' here in apocalyptic imagery for a ruler/power.
    The imagery should be preserved rather than interpreted. The numeral is rendered
    with the indefinite article in natural English.
- source_word: מִצְּעִירָה
  chosen: small
  alternatives:
  - little
  - insignificant
  lexicon: HALOT
  rationale: The adjective denotes smallness. 'Small' is clear modern English. 'Little
    horn' is traditional and possible, but 'small horn' better matches contemporary
    style while preserving the image.
- source_word: וַתִּגְדַּל יֶתֶר
  chosen: it grew exceedingly great
  alternatives:
  - it became very great
  - it grew more and more
  lexicon: HALOT
  rationale: גדל means 'grow/become great'; יתר intensifies the degree ('exceedingly,'
    'excessively'). The feminine verb agrees with קֶרֶן. 'Grew exceedingly great'
    preserves both the growth imagery and the intensification.
- source_word: אֶל הַנֶּגֶב
  chosen: toward the south
  alternatives:
  - to the south
  - toward the Negev
  lexicon: HALOT
  rationale: While נגב can denote the Negev region, in this directional sequence with
    east and the following destination it most naturally functions as the cardinal
    direction 'south.'
- source_word: וְאֶל הַמִּזְרָח
  chosen: toward the east
  alternatives:
  - to the east
  - toward the sunrise
  lexicon: HALOT
  rationale: מזרח commonly denotes 'east' or 'place of sunrise.' In this geographic
    progression, 'east' is the most natural rendering.
- source_word: וְאֶל הַצְּבִי
  chosen: toward the Beautiful Land
  alternatives:
  - toward the glorious land
  - toward the beauty
  - toward the glorious realm
  lexicon: HALOT
  rationale: צבי can mean 'beauty,' 'splendor,' or by extension a desirable/glorious
    land. In Daniel, the phrase points to the land of Israel/Judah, but the translation
    should preserve the Hebrew expression rather than replace it with an interpretation.
    'Beautiful Land' is clear and retains the metaphorical quality.
