theological_decisions:
- issue: Whether to interpret the apocalyptic symbol 'horn' as a king/kingdom in the
    main text
  chosen_reading: Preserve the symbol as 'horn' without interpretive expansion
  alternative_readings:
  - a king
  - a power
  - a kingdom
  rationale: The verse uses symbolic apocalyptic imagery. Expanding the symbol in
    translation would import interpretation beyond the Hebrew wording. This follows
    the stated philosophy of not paraphrasing beyond what the source warrants and
    preserving tension where the text itself is symbolic.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Whether הַצְּבִי should be rendered interpretively as 'the glorious land'
    or more literally as 'the Beautiful Land'
  chosen_reading: Render as 'the Beautiful Land' and preserve 'the glorious land'
    in a footnote
  alternative_readings:
  - the glorious land
  - the pleasant land
  rationale: The Hebrew noun denotes beauty/splendor/desirability. Because the phrase
    likely refers to the land of Israel but does so through a descriptive epithet,
    the main text keeps the descriptive force rather than replacing it with a more
    interpretive label. An alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
