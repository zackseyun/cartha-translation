theological_decisions:
- issue: Nature of the figure described as כְּמַרְאֵה גָבֶר
  chosen_reading: Render the phrase phenomenologically as 'one with the appearance
    of a man' without identifying the figure beyond the text.
  alternative_readings:
  - an angel in human form
  - a man
  - a preincarnate divine figure
  rationale: The verse itself only states that a figure stood before Daniel with the
    appearance of a man. The translation should preserve that observational description
    and not import a more specific theological identification from the wider context
    into this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
