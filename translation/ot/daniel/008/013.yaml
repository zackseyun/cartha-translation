id: DAN.8.13
reference: Daniel 8:13
source:
  edition: WLC
  text: וָ/אֶשְׁמְעָ֥/ה אֶֽחָד קָד֖וֹשׁ מְדַבֵּ֑ר וַ/יֹּאמֶר֩ אֶחָ֨ד קָד֜וֹשׁ לַ/פַּֽלְמוֹנִ֣י
    הַֽ/מְדַבֵּ֗ר עַד מָתַ֞י הֶ/חָז֤וֹן הַ/תָּמִיד֙ וְ/הַ/פֶּ֣שַׁע שֹׁמֵ֔ם תֵּ֛ת וְ/קֹ֥דֶשׁ
    וְ/צָבָ֖א מִרְמָֽס־־׃
translation:
  text: Then I heard a holy one speaking, and one holy one said to the one speaking,
    “How long is the vision concerning the regular burnt offering and the desolating
    transgression, the giving over of both the sanctuary and the host to be trampled?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'to Palmoni, the one speaking,' if לַפַּלְמוֹנִי is taken as
      a proper name or title rather than an indefinite expression.
    reason: alternative_reading
  - marker: b
    text: Traditionally, 'the daily sacrifice.' The Hebrew תָּמִיד refers to the regular
      continual offering in the temple service.
    reason: lexical_alternative
  - marker: c
    text: Or 'the transgression that desolates.'
    reason: lexical_alternative
  - marker: d
    text: '''Host'' may refer to the people associated with the sanctuary, an army,
      or another collective force; the Hebrew is not fully specific here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָדוֹשׁ
  chosen: holy one
  alternatives:
  - saint
  - holy being
  lexicon: HALOT
  rationale: In this vision context, the singular adjective used substantivally refers
    to a heavenly holy being. 'Holy one' is transparent and avoids importing later
    ecclesiastical connotations of 'saint'.
- source_word: לַפַּלְמוֹנִי
  chosen: to the one
  alternatives:
  - to a certain one
  - to that particular one
  - to Palmoni
  lexicon: HALOT
  rationale: The form is obscure and likely idiomatic for an unidentified or particular
    interlocutor rather than a proper name. Rendering it generically preserves the
    uncertainty without overcommitting to a name. The alternative of treating it as
    a name is preserved in a footnote.
- source_word: הַמְדַבֵּר
  chosen: speaking
  alternatives:
  - who was speaking
  - the speaker
  lexicon: HALOT
  rationale: The participle identifies the addressee as the one engaged in speaking.
    'The one speaking' is slightly formal but tracks the Hebrew closely and remains
    readable.
- source_word: הֶחָזוֹן
  chosen: the vision concerning
  alternatives:
  - the vision of
  lexicon: HALOT
  rationale: The following nouns specify the content of the vision. 'Concerning' makes
    the relation clear in English while staying close to the Hebrew sense.
- source_word: הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the regular offering
  - the continual burnt offering
  - the daily sacrifice
  lexicon: HALOT
  rationale: In Daniel this term refers to the regular cultic offering, traditionally
    the daily burnt offering. 'Regular burnt offering' is more precise than the traditional
    but less explicit 'daily sacrifice' and avoids adding more than the cultic context
    warrants.
- source_word: הַפֶּשַׁע שֹׁמֵם
  chosen: the desolating transgression
  alternatives:
  - the transgression that desolates
  - the rebellious act that causes desolation
  lexicon: HALOT
  rationale: The phrase joins rebellion/transgression with a desolating effect. 'Desolating
    transgression' preserves the compactness of the Hebrew and echoes the thematic
    language of desolation in Daniel without forcing a later technical formula.
- source_word: תֵּת
  chosen: the giving over
  alternatives:
  - to give
  - when ... is given over
  lexicon: HALOT
  rationale: The infinitive functions within the question to express the handing over
    that results in profanation. 'The giving over' preserves the infinitival force
    and connects naturally to the following objects.
- source_word: קֹדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - holiness
  lexicon: HALOT
  rationale: In this temple-vision context, 'sanctuary' best captures the concrete
    cultic referent rather than an abstract 'holiness'.
- source_word: צָבָא
  chosen: the host
  alternatives:
  - the army
  - the heavenly host
  lexicon: HALOT
  rationale: The noun can denote an army or host. Here it likely refers to the people/host
    associated with the sanctuary rather than specifying earthly or heavenly forces.
    'Host' preserves the breadth of the Hebrew.
- source_word: מִרְמָס
  chosen: to be trampled
  alternatives:
  - for trampling
  - as a trampling
  lexicon: HALOT
  rationale: The noun denotes trampling underfoot. Rendering it verbally in English
    produces a natural question while preserving the sense of desecration.
