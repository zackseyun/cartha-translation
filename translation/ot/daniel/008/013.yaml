theological_decisions:
- issue: Identity of the 'holy ones'
  chosen_reading: heavenly holy beings/angelic figures
  alternative_readings:
  - human saints
  rationale: Within Daniel's visionary setting, the speakers are best understood as
    heavenly beings. The translation 'holy one' preserves the lexical form without
    over-specifying 'angel' in the main text.
- issue: Reference of צָבָא
  chosen_reading: left as 'host' without interpretive narrowing
  alternative_readings:
  - the people of God
  - the heavenly host
  - the temple service/army
  rationale: The term is debated in context. To preserve theological and interpretive
    tension, the main text keeps the broader 'host' rather than resolving the referent.
  doctrine_reference: Translation philosophy §3
