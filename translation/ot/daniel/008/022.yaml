id: DAN.8.22
reference: Daniel 8:22
source:
  edition: WLC
  text: וְ/הַ֨/נִּשְׁבֶּ֔רֶת וַ/תַּֽעֲמֹ֥דְנָה אַרְבַּ֖ע תַּחְתֶּ֑י/הָ אַרְבַּ֧ע מַלְכֻי֛וֹת
    מִ/גּ֥וֹי יַעֲמֹ֖דְנָה וְ/לֹ֥א בְ/כֹחֽ/וֹ׃
translation:
  text: 'And as for the broken horn, in whose place four arose: four kingdoms will
    arise from that nation, but not with its power.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but not with his power,' referring to the power of the first king represented
      by the broken horn.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַנִּשְׁבֶּרֶת
  chosen: as for the broken horn
  alternatives:
  - the broken one
  - the one that was broken
  lexicon: HALOT
  rationale: The feminine singular participle 'the broken' refers back to the feminine
    noun 'horn' from the prior context (v. 21). English needs the implied referent
    supplied for clarity. 'As for' reflects the explanatory force in Gabriel's interpretation.
- source_word: וַתַּעֲמֹדְנָה אַרְבַּע תַּחְתֶּיהָ
  chosen: in whose place four arose
  alternatives:
  - and four stood up in its place
  - and four arose in place of it
  lexicon: HALOT
  rationale: עמד here means 'arise/stand up' in the sense of coming to power. תַּחְתֶּיהָ
    is best rendered 'in its place' or 'in whose place.' 'Whose' is used because the
    antecedent is the implied horn.
- source_word: אַרְבַּע מַלְכֻיּוֹת
  chosen: four kingdoms
  alternatives:
  - four kingships
  - four royal dominions
  lexicon: HALOT
  rationale: Though the noun can denote kingship/royal rule, 'four kingdoms' is the
    most natural English rendering in this apocalyptic-political context and matches
    the sense of successor realms rather than merely four individual kings.
- source_word: מִגּוֹי
  chosen: from that nation
  alternatives:
  - from the nation
  - from his nation
  lexicon: HALOT
  rationale: גּוֹי means 'nation/people.' The referent is the previously mentioned
    Greek realm/people. 'That nation' makes the backward reference clear without over-specifying
    beyond the text.
- source_word: יַעֲמֹדְנָה
  chosen: will arise
  alternatives:
  - will stand up
  - will come forth
  lexicon: HALOT
  rationale: Again from עמד, here indicating the emergence of political powers. 'Will
    arise' is idiomatic and fits prophetic discourse.
- source_word: וְלֹא בְכֹחוֹ
  chosen: but not with its power
  alternatives:
  - but not with his power
  - but not in his strength
  lexicon: HALOT
  rationale: כֹּחַ is 'power/strength.' The 3ms suffix likely refers back to the original
    king/horn represented in the vision. Because the immediate English antecedent
    is the horn/kingdom complex, 'its power' preserves the symbolic reference without
    forcing a personal reading. The alternative 'his power' is viable and worth preserving
    in a footnote.
