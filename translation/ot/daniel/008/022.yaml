theological_decisions:
- issue: Referent of the final pronominal suffix in וְלֹא בְכֹחוֹ
  chosen_reading: The clause refers to the successor kingdoms lacking the power of
    the original horn/kingdom, rendered 'not with its power.'
  alternative_readings:
  - not with his power (referring to the first king, Alexander)
  rationale: This is primarily an exegetical rather than doctrinal issue. The vision
    interprets symbolic horns as kingdoms and kings in close relation. Rendering the
    suffix with 'its' keeps the symbolic register and avoids overcommitting to a named
    historical individual in the main text, while preserving the personal alternative
    in a footnote.
