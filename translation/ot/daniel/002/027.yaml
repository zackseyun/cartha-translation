id: DAN.2.27
reference: Daniel 2:27
source:
  edition: WLC
  text: עָנֵ֧ה דָנִיֵּ֛אל קֳדָ֥ם מַלְכָּ֖/א וְ/אָמַ֑ר רָזָ/ה֙ דִּֽי מַלְכָּ֣/א שָׁאֵ֔ל
    לָ֧א חַכִּימִ֣ין אָֽשְׁפִ֗ין חַרְטֻמִּין֙ גָּזְרִ֔ין יָכְלִ֖ין לְ/הַֽחֲוָיָ֥ה
    לְ/מַלְכָּֽ/א־׃
translation:
  text: Daniel answered before the king and said, “The mystery that the king asks,
    no wise men, enchanters, magicians, or diviners are able to make known to the
    king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secret.' The Aramaic term is rendered 'mystery' here to preserve the
      chapter's repeated theme of a hidden matter disclosed only by God.
    reason: lexical_alternative
  - marker: b
    text: '''Enchanters'' translates a technical term for one class of Babylonian
      specialists; ''astrologers'' is a traditional alternative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Common Aramaic narrative verb introducing a reply. 'Answered' preserves
    the formal dialogue style and matches the immediate speech context.
- source_word: קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Spatial/relational preposition meaning 'before, in the presence of.'
    'Before' is concise and natural in English while preserving the court setting.
- source_word: רָזָה
  chosen: mystery
  alternatives:
  - secret
  lexicon: HALOT
  rationale: In Daniel this Aramaic term regularly denotes the hidden dream and its
    meaning as a concealed matter requiring divine disclosure. 'Mystery' best preserves
    that thematic usage across the chapter, while 'secret' remains a viable alternative.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle linking 'mystery' with the clause 'the king asks.'
    'That' is the most natural English relativizer here.
- source_word: שָׁאֵל
  chosen: asks
  alternatives:
  - has asked
  - seeks
  lexicon: HALOT
  rationale: The participial/finite form here presents the king's request as the matter
    at hand. English present 'asks' works idiomatically in direct speech; 'has asked'
    would also fit contextually.
- source_word: חַכִּימִין
  chosen: wise men
  alternatives:
  - sages
  lexicon: HALOT
  rationale: Standard court term in Daniel for the class of learned advisers. 'Wise
    men' preserves the established category in the narrative.
- source_word: אָשְׁפִין
  chosen: enchanters
  alternatives:
  - astrologers
  lexicon: HALOT
  rationale: The exact technical sense is somewhat uncertain, but it denotes a class
    of pagan specialists in occult/divinatory arts. 'Enchanters' is a cautious rendering
    that distinguishes the term from the other specialist groups listed. 'Astrologers'
    is traditional but less certain lexically.
- source_word: חַרְטֻמִּין
  chosen: magicians
  alternatives:
  - scribal magicians
  lexicon: HALOT
  rationale: A recognized class of Egyptian/Babylonian occult experts in biblical
    usage. 'Magicians' is the clearest standard English equivalent.
- source_word: גָּזְרִין
  chosen: diviners
  alternatives:
  - soothsayers
  - decree-makers
  lexicon: HALOT
  rationale: In Daniel this term refers to a class of practitioners associated with
    determining or pronouncing hidden matters. 'Diviners' best captures the functional
    sense in context. 'Soothsayers' is possible but more archaic.
- source_word: יָכְלִין
  chosen: are able
  alternatives:
  - can
  lexicon: HALOT
  rationale: Expresses capability. 'Are able' is slightly more formal and fits the
    elevated court speech.
- source_word: לְהַחֲוָיָה
  chosen: to make known
  alternatives:
  - to declare
  - to show
  lexicon: HALOT
  rationale: Causative infinitive meaning to cause to know, disclose, or reveal. 'Make
    known' is clear modern English and preserves the disclosure sense without overinterpreting.
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: Indirect object of disclosure. 'To the king' is the straightforward sense
    here and should be distinguished from the earlier prepositional phrase 'before
    the king'.
