id: DAN.2.45
reference: Daniel 2:45
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דִּֽי חֲזַ֡יְתָ דִּ֣י מִ/טּוּרָ/א֩ אִתְגְּזֶ֨רֶת אֶ֜בֶן דִּי
    לָ֣א בִ/ידַ֗יִן וְ֠/הַדֶּקֶת פַּרְזְלָ֨/א נְחָשָׁ֤/א חַסְפָּ/א֙ כַּסְפָּ֣/א וְ/דַהֲבָ֔/א
    אֱלָ֥הּ רַב֙ הוֹדַ֣ע לְ/מַלְכָּ֔/א מָ֛ה דִּ֥י לֶהֱוֵ֖א אַחֲרֵ֣י דְנָ֑ה וְ/יַצִּ֥יב
    חֶלְמָ֖/א וּ/מְהֵימַ֥ן פִּשְׁרֵֽ/הּ־־־׃פ
translation:
  text: Just as you saw that a stone was cut from the mountain not by hands, and that
    it crushed the iron, the bronze, the clay, the silver, and the gold, the great
    God has made known to the king what will happen after this. The dream is certain,
    and its interpretation is trustworthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without hands' / 'not with hands'; the Aramaic idiom indicates that
      the stone's cutting was not accomplished by human agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דִּי
  chosen: Just as
  alternatives:
  - Because
  - Inasmuch as
  lexicon: HALOT
  rationale: Aramaic idiom introducing the explanation corresponding to the dream
    detail. 'Just as' fits the comparative/explanatory force in context better than
    a more causal 'because,' while remaining natural English.
- source_word: חֲזַיְתָ
  chosen: you saw
  alternatives:
  - you looked at
  - you beheld
  lexicon: HALOT
  rationale: Direct address to the king; simple past 'you saw' is the most natural
    rendering of the vision report.
- source_word: מִטּוּרָא
  chosen: from the mountain
  alternatives:
  - out of the mountain
  - from a mountain
  lexicon: HALOT
  rationale: The emphatic/determined form favors 'the mountain.' 'From the mountain'
    is the standard spatial sense and matches the imagery already established in the
    vision.
- source_word: אִתְגְּזֶרֶת אֶבֶן
  chosen: a stone was cut
  alternatives:
  - a stone was cut out
  - a stone was quarried
  lexicon: HALOT
  rationale: Passive/reflexive verbal form with 'stone' as subject. 'Was cut' is concise
    and faithful; 'cut out' is possible but not necessary in English.
- source_word: דִּי לָא בִידַיִן
  chosen: not by hands
  alternatives:
  - without hands
  - not with hands
  lexicon: HALOT
  rationale: Literally 'not by hands.' This preserves the idiom of nonhuman agency
    and echoes the theological force of divine action without overexplaining it.
- source_word: וְהַדֶּקֶת
  chosen: and that it crushed
  alternatives:
  - and crushed
  - and that it broke in pieces
  lexicon: HALOT
  rationale: The verb denotes crushing/pulverizing. 'Crushed' is vivid and readable.
    Including 'that it' mirrors the subordinate structure after 'you saw that...'.
- source_word: פַּרְזְלָא נְחָשָׁא חַסְפָּא כַּסְפָּא וְדַהֲבָא
  chosen: the iron, the bronze, the clay, the silver, and the gold
  alternatives:
  - iron, bronze, clay, silver, and gold
  lexicon: HALOT
  rationale: The sequence follows the Aramaic list. Articles are supplied naturally
    in English for the known components of the statue. 'Bronze' is preferred over
    'brass' for נְחָשָׁא in this context.
- source_word: אֱלָהּ רַב
  chosen: the great God
  alternatives:
  - a great God
  - God Most Great
  lexicon: HALOT
  rationale: The phrase identifies Israel's God as supreme in Daniel's speech to the
    king. 'The great God' is the most straightforward rendering of adjective plus
    noun here.
- source_word: הוֹדַע לְמַלְכָּא
  chosen: has made known to the king
  alternatives:
  - has shown the king
  - has revealed to the king
  lexicon: HALOT
  rationale: The causative verb means to make known/inform. 'Has made known' preserves
    the formal sense while remaining idiomatic.
- source_word: מָה דִּי לֶהֱוֵא אַחֲרֵי דְנָה
  chosen: what will happen after this
  alternatives:
  - what is to be after this
  - what will come to pass after these things
  lexicon: HALOT
  rationale: Future-oriented clause. 'What will happen after this' is clear modern
    English and accurately conveys the predictive sense.
- source_word: וְיַצִּיב חֶלְמָא
  chosen: The dream is certain
  alternatives:
  - The dream is sure
  - The dream is firm
  lexicon: HALOT
  rationale: Predicate adjective meaning firm/established/certain. 'Certain' is natural
    modern English and conveys reliability.
- source_word: וּמְהֵימַן פִּשְׁרֵהּ
  chosen: and its interpretation is trustworthy
  alternatives:
  - and its interpretation is faithful
  - and its interpretation is reliable
  - and its interpretation is sure
  lexicon: HALOT
  rationale: מְהֵימַן carries the sense of trustworthy/reliable. 'Interpretation'
    is the standard rendering of פִּשְׁרֵהּ in Daniel. 'Trustworthy' avoids archaic
    diction while preserving the claim of dependability.
