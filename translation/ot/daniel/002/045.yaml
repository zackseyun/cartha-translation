theological_decisions:
- issue: Agency implied by 'not by hands'
  chosen_reading: 'Retain the idiom without explicit expansion: ''not by hands'''
  alternative_readings:
  - without human hands
  - by no human hand
  rationale: The phrase signals nonhuman, ultimately divine agency in the stone's
    origin. The translation preserves the theological tension and intertextual resonance
    rather than making the implication explicit in the main text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
