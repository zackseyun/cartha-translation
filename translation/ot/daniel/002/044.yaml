theological_decisions:
- issue: Nature of the final kingdom in Daniel's interpretation
  chosen_reading: Render the verse in a way that states the kingdom's divine origin,
    permanence, and triumph without specifying a later doctrinal identification in
    the translation itself.
  alternative_readings:
  - Explicitly identify the kingdom as the messianic kingdom of Christ in the main
    text
  - Render more generically as merely a future divine rule
  rationale: The verse itself says that the God of heaven will set up an everlasting
    kingdom that supersedes all others. Christian theology commonly identifies this
    with God's messianic kingdom, but the translation should not import that identification
    into the wording beyond what the Aramaic explicitly states.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Referent of 'those kings'
  chosen_reading: Translate anaphorically as 'those kings' without resolving whether
    this means the four kingdoms collectively, the kings represented by the divided
    kingdom, or rulers contemporaneous with the final phase.
  alternative_readings:
  - these kings
  - the kings of the divided kingdom
  rationale: The demonstrative refers back to the vision's royal figures, but interpreters
    differ on the precise historical scope. The translation should preserve the text's
    wording without narrowing the referent.
  doctrine_reference: Translation philosophy 3
