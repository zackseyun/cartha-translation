id: DAN.2.44
reference: Daniel 2:44
source:
  edition: WLC
  text: וּֽ/בְ/יוֹמֵי/ה֞וֹן דִּ֧י מַלְכַיָּ֣/א אִנּ֗וּן יְקִים֩ אֱלָ֨הּ שְׁמַיָּ֤/א
    מַלְכוּ֙ דִּ֤י לְ/עָלְמִין֙ לָ֣א תִתְחַבַּ֔ל וּ/מַ֨לְכוּתָ֔/ה לְ/עַ֥ם אָחֳרָ֖ן
    לָ֣א תִשְׁתְּבִ֑ק תַּדִּ֤ק וְ/תָסֵיף֙ כָּל אִלֵּ֣ין מַלְכְוָתָ֔/א וְ/הִ֖יא תְּק֥וּם
    לְ/עָלְמַיָּֽ/א־׃
translation:
  text: And in the days of those kings, the God of heaven will set up a kingdom that
    will never be destroyed, and its kingdom will not be left to another people. It
    will crush and put an end to all these kingdoms, and it will stand forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'break in pieces'; the Aramaic verb conveys crushing or shattering.
    reason: lexical_alternative
  - marker: b
    text: '''Those kings'' refers back to the kings/kingdoms represented in Nebuchadnezzar''s
      dream; interpreters differ on the precise historical referent.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְיוֹמֵיהוֹן
  chosen: And in the days of
  alternatives:
  - But in the days of
  - During the days of
  lexicon: HALOT
  rationale: Temporal prepositional phrase with prefixed conjunction. 'And in the
    days of' preserves the narrative linkage and the temporal sense without overinterpreting
    the conjunction as adversative.
- source_word: דִּי מַלְכַיָּא אִנּוּן
  chosen: those kings
  alternatives:
  - these kings
  - the kings
  lexicon: HALOT
  rationale: The demonstrative אִנּוּן points to the kings already identified in the
    vision sequence. 'Those kings' best reflects anaphoric reference in English.
- source_word: יְקִים
  chosen: will set up
  alternatives:
  - will raise up
  - will establish
  lexicon: HALOT
  rationale: The verb commonly means to set up or establish. 'Will set up' is idiomatic
    and preserves the concrete royal imagery of founding a kingdom.
- source_word: אֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  - the God of the heavens
  lexicon: HALOT
  rationale: Standard biblical title in Aramaic. 'The God of heaven' is natural English
    and preserves the definite, titular force.
- source_word: מַלְכוּ
  chosen: a kingdom
  alternatives:
  - the kingdom
  - royal dominion
  lexicon: HALOT
  rationale: 'Anarthrous singular here is best rendered indefinitely in English: God
    will set up ''a kingdom.'''
- source_word: דִּי לְעָלְמִין לָא תִתְחַבַּל
  chosen: that will never be destroyed
  alternatives:
  - which shall not be destroyed forever
  - that will not be ruined for ages
  lexicon: HALOT
  rationale: The relative clause plus negative imperfect expresses enduring indestructibility.
    'Never be destroyed' is clear modern English and captures the force of לְעָלְמִין
    with the negated verb.
- source_word: וּמַלְכוּתָהּ
  chosen: and its kingdom
  alternatives:
  - and its dominion
  - and this kingdom
  lexicon: HALOT
  rationale: The suffix refers back to the kingdom just mentioned. Retaining 'kingdom'
    rather than shifting to 'dominion' preserves lexical consistency with מַלְכוּ
    / מַלְכוּתָהּ.
- source_word: לְעַם אָחֳרָן לָא תִשְׁתְּבִק
  chosen: will not be left to another people
  alternatives:
  - will not be given over to another people
  - will not be abandoned to another nation
  lexicon: HALOT
  rationale: The passive/reflexive sense indicates that this kingdom will not pass
    into the possession of another people. 'Left to another people' is a close and
    readable rendering.
- source_word: תַּדִּק
  chosen: It will crush
  alternatives:
  - It will break in pieces
  - It will shatter
  lexicon: HALOT
  rationale: The Haphel of דק carries the sense of crushing or pulverizing. 'Crush'
    is vivid, concise, and fits the stone-kingdom imagery in the immediate context.
- source_word: וְתָסֵיף
  chosen: and put an end to
  alternatives:
  - and finish off
  - and destroy
  lexicon: HALOT
  rationale: From סוף in causative sense, meaning to bring to an end. 'Put an end
    to' distinguishes it from the previous verb rather than flattening both into 'destroy.'
- source_word: כָּל אִלֵּין מַלְכְוָתָא
  chosen: all these kingdoms
  alternatives:
  - all those kingdoms
  - all these reigns
  lexicon: HALOT
  rationale: The demonstrative points to the kingdoms represented in the dream. 'These
    kingdoms' is the most natural English rendering in this immediate explanatory
    context.
- source_word: וְהִיא תְּקוּם לְעָלְמַיָּא
  chosen: and it will stand forever
  alternatives:
  - and it will endure forever
  - and it will arise for ever
  lexicon: HALOT
  rationale: קום here conveys enduring continuance. 'Stand forever' preserves the
    metaphor and echoes the permanence contrast with the destroyed kingdoms.
