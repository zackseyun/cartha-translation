theological_decisions:
- issue: Rendering the divine title in וְגָלֵא רָזַיָּא
  chosen_reading: the Revealer of mysteries
  alternative_readings:
  - he who reveals mysteries
  - the one who reveals mysteries
  rationale: The Aramaic uses a participial/title-like expression for God rather than
    the explicit noun 'God' in this clause. Rendering it as 'the Revealer of mysteries'
    preserves the literary emphasis on God's identity as the one who discloses hidden
    things, without importing an explicit divine name absent from the text.
  doctrine_reference: Translation philosophy §§1, 5
