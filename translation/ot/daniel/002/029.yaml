id: DAN.2.29
reference: Daniel 2:29
source:
  edition: WLC
  text: אַ֣נְתְּה מַלְכָּ֗/א רַעְיוֹנָ/ךְ֙ עַל מִשְׁכְּבָ֣/ךְ סְלִ֔קוּ מָ֛ה דִּ֥י
    לֶהֱוֵ֖א אַחֲרֵ֣י דְנָ֑ה וְ/גָלֵ֧א רָזַיָּ֛/א הוֹדְעָ֖/ךְ מָה דִ֥י לֶהֱוֵֽא־־׃
translation:
  text: As for you, O king, your thoughts came up on your bed about what would happen
    after this, and the Revealer of mysteries has made known to you what would happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he who reveals mysteries has made known to you.' The Aramaic participle
      can be rendered more descriptively rather than as the title 'the Revealer of
      mysteries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣נְתְּה
  chosen: As for you
  alternatives:
  - You
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in Aramaic. 'As for you' preserves
    the topical emphasis better than a bare 'you' in natural English.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Direct address is in view; 'O king' reflects the vocative force naturally
    in English and matches the courtly register of the passage.
- source_word: רַעְיוֹנָךְ
  chosen: your thoughts
  alternatives:
  - your reflections
  - your ideas
  lexicon: HALOT
  rationale: The noun refers to thoughts or mental reflections. 'Thoughts' is the
    most natural and sufficiently broad rendering in context.
- source_word: עַל מִשְׁכְּבָךְ
  chosen: on your bed
  alternatives:
  - upon your bed
  - while on your bed
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On your bed' is idiomatic modern
    English and preserves the image of the king lying awake.
- source_word: סְלִקוּ
  chosen: came up
  alternatives:
  - arose
  - went up
  lexicon: HALOT
  rationale: The verb literally denotes going up/arising. 'Came up' works idiomatically
    with 'thoughts' in English while preserving the metaphor.
- source_word: מָה דִּי לֶהֱוֵא אַחֲרֵי דְנָה
  chosen: about what would happen after this
  alternatives:
  - concerning what would be after this
  - what would take place later
  lexicon: HALOT
  rationale: This clause expresses the content of the king's thoughts. 'Would happen
    after this' is clear modern English and keeps the future-oriented sense of the
    Aramaic.
- source_word: וְגָלֵא רָזַיָּא
  chosen: and the Revealer of mysteries
  alternatives:
  - and he who reveals mysteries
  - and the one revealing mysteries
  lexicon: HALOT
  rationale: The participial expression functions as a title for God. Capitalizing
    'Revealer' signals titular force without adding words not present in the text.
- source_word: הוֹדְעָךְ
  chosen: has made known to you
  alternatives:
  - made known to you
  - informed you
  lexicon: HALOT
  rationale: The causative verb means to make known. The perfect is well represented
    by 'has made known' in this narrative explanation.
- source_word: מָה דִי לֶהֱוֵא
  chosen: what would happen
  alternatives:
  - what would be
  - what would come to pass
  lexicon: HALOT
  rationale: The phrase repeats the future content of the revelation. 'What would
    happen' is natural English and matches the earlier clause consistently.
