id: DAN.2.19
reference: Daniel 2:19
source:
  edition: WLC
  text: אֱדַ֗יִן לְ/דָנִיֵּ֛אל בְּ/חֶזְוָ֥/א דִֽי לֵילְיָ֖/א רָזָ֣/ה גֲלִ֑י אֱדַ֨יִן֙
    דָּֽנִיֵּ֔אל בָּרִ֖ךְ לֶ/אֱלָ֥הּ שְׁמַיָּֽ/א־׃
translation:
  text: Then the mystery was revealed to Daniel in a vision of the night. Then Daniel
    blessed the God of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a night vision.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the secret was revealed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'praised the God of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker indicating sequence. 'Then' is natural modern
    English and preserves the narrative progression; repeated in both clauses to reflect
    the source text's repetition.
- source_word: בְּחֶזְוָא דִי לֵילְיָא
  chosen: in a vision of the night
  alternatives:
  - in a night vision
  - in the vision of the night
  lexicon: HALOT
  rationale: Formal enough to preserve the imagery and wording of the Aramaic while
    remaining readable. 'Vision of the night' closely reflects the construct-like
    phrase and avoids over-paraphrase.
- source_word: רָזָה
  chosen: the mystery
  alternatives:
  - the secret
  lexicon: HALOT
  rationale: In Daniel, רָז regularly refers to the hidden matter of the king's dream
    and its meaning. 'Mystery' is the established and contextually apt rendering for
    a divinely disclosed hidden matter, without implying something permanently unknowable.
- source_word: גֲלִי
  chosen: was revealed
  alternatives:
  - was uncovered
  - was disclosed
  lexicon: HALOT
  rationale: Passive revelation language fits the divine context and standard English
    idiom. 'Was revealed' preserves the theological sense that the hidden matter became
    known through disclosure rather than human discovery.
- source_word: בָּרִךְ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: The verb ברך in relation to God is commonly rendered 'bless.' Although
    English readers may more readily say humans 'praise' God, 'blessed' more directly
    reflects the source verb and biblical idiom.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  - the God of the heavens
  lexicon: HALOT
  rationale: This is a standard biblical title. Including the article in English reflects
    the determinate sense of the Aramaic phrase. 'Heaven' is more idiomatic than 'the
    heavens' in this title.
- source_word: דָנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
