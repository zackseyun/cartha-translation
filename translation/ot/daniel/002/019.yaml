theological_decisions:
- issue: Revelation language for the hidden matter
  chosen_reading: The mystery was revealed
  alternative_readings:
  - The secret was disclosed
  rationale: The verse presents the hidden matter as divinely disclosed in response
    to prayer. 'Revealed' preserves that theological nuance without adding interpretive
    material beyond the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Human response to God in ברך
  chosen_reading: Daniel blessed the God of heaven
  alternative_readings:
  - Daniel praised the God of heaven
  rationale: Retaining 'blessed' preserves the lexical form and biblical register.
    Although 'praised' is a possible contextual gloss, the source verb is better represented
    by 'blessed,' and the English phrase remains understandable.
  doctrine_reference: Translation philosophy §5
