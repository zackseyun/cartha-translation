theological_decisions:
- issue: Idiomatic phrase indicating non-human agency
  chosen_reading: not by hands
  alternative_readings:
  - without hands
  rationale: The phrase is significant in biblical theology as indicating action not
    accomplished by ordinary human manufacture or power. The main text keeps the close,
    literal wording while preserving the common alternative in a footnote.
  doctrine_reference: Translation philosophy §3, §6
