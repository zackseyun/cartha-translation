id: DAN.2.34
reference: Daniel 2:34
source:
  edition: WLC
  text: חָזֵ֣ה הֲוַ֗יְתָ עַ֠ד דִּ֣י הִתְגְּזֶ֤רֶת אֶ֨בֶן֙ דִּי לָ֣א בִ/ידַ֔יִן וּ/מְחָ֤ת
    לְ/צַלְמָ/א֙ עַל רַגְל֔וֹ/הִי דִּ֥י פַרְזְלָ֖/א וְ/חַסְפָּ֑/א וְ/הַדֵּ֖קֶת הִמּֽוֹן־־׃
translation:
  text: You were watching until a stone was cut out—not by hands—and it struck the
    statue on its feet of iron and clay and crushed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without hands.' The Aramaic idiom indicates that the stone was not cut
      out by human agency.
    reason: lexical_alternative
  - marker: b
    text: Or 'the image.' The Aramaic word can denote an image or statue; here it
      refers to the great figure seen in the dream.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוַיְתָ
  chosen: you were watching
  alternatives:
  - you were looking
  - you kept watching
  - you saw
  lexicon: HALOT
  rationale: The participial + היה construction conveys ongoing action in the past,
    not a simple punctiliar 'you saw.' 'You were watching' best reflects the durative
    sense in natural English.
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - until that
  - while
  lexicon: HALOT
  rationale: This common Aramaic sequence introduces the point up to which the watching
    continued. Simple 'until' is idiomatic and sufficient.
- source_word: הִתְגְּזֶרֶת אֶבֶן
  chosen: a stone was cut out
  alternatives:
  - a stone was cut
  - a stone was hewn out
  lexicon: HALOT
  rationale: The passive/reflexive verbal form indicates the stone came to be cut
    out. 'Cut out' is clear modern English; 'hewn out' is possible but more archaic.
- source_word: דִּי לָא בִידַיִן
  chosen: not by hands
  alternatives:
  - without hands
  - not with hands
  - apart from hands
  lexicon: HALOT
  rationale: The phrase denotes non-human agency. 'Not by hands' is a transparent
    rendering close to the Aramaic and preserves the idiom's force. 'Without hands'
    is also common and is preserved in a footnote as a lexical alternative.
- source_word: וּמְחָת
  chosen: and it struck
  alternatives:
  - and it hit
  - and it smote
  lexicon: HALOT
  rationale: The feminine singular verb refers back to 'stone.' 'Struck' is natural,
    dignified English and fits the violent impact better than 'hit'; 'smote' is archaic.
- source_word: לְצַלְמָא
  chosen: the statue
  alternatives:
  - the image
  lexicon: HALOT
  rationale: Aramaic צלם can mean image/statue. In this narrative context, the object
    seen in the dream is a large humanlike figure, so 'statue' is more concrete and
    readable, while 'image' is preserved as an alternative in a footnote.
- source_word: עַל רַגְלֹוהִי
  chosen: on its feet
  alternatives:
  - upon its feet
  - on its legs
  lexicon: HALOT
  rationale: The plural noun means 'feet.' 'On its feet' is the most direct rendering;
    'legs' would be less precise.
- source_word: דִּי פַרְזְלָא וְחַסְפָּא
  chosen: of iron and clay
  alternatives:
  - which were of iron and clay
  - made of iron and clay
  lexicon: HALOT
  rationale: This relative phrase modifies 'feet.' English can render it compactly
    as 'feet of iron and clay' without loss of meaning.
- source_word: וְהַדֵּקֶת הִמּוֹן
  chosen: and crushed them
  alternatives:
  - and broke them in pieces
  - and shattered them
  lexicon: HALOT
  rationale: The verb means crush/pulverize, and the pronoun refers to the feet. 'Crushed
    them' is concise and forceful; 'broke them in pieces' is possible but more expansive
    than the Aramaic requires.
