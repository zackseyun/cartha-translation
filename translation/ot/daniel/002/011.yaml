id: DAN.2.11
reference: Daniel 2:11
source:
  edition: WLC
  text: וּ/מִלְּתָ֨/א דִֽי מַלְכָּ֤/ה שָׁאֵל֙ יַקִּירָ֔ה וְ/אָחֳרָן֙ לָ֣א אִיתַ֔י
    דִּ֥י יְחַוִּנַּ֖/הּ קֳדָ֣ם מַלְכָּ֑/א לָהֵ֣ן אֱלָהִ֔ין דִּ֚י מְדָ֣רְ/ה֔וֹן עִם
    בִּשְׂרָ֖/א לָ֥א אִיתֽוֹ/הִי־־׃
translation:
  text: And the thing that the king asks is difficult, and there is no other who can
    declare it before the king except the gods, whose dwelling is not with flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter that the king asks is hard.'
    reason: lexical_alternative
  - marker: b
    text: Or 'except the gods, whose dwelling is not with humans' or 'with mortal
      flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּתָא
  chosen: the thing
  alternatives:
  - the matter
  - the word
  lexicon: HALOT
  rationale: In Imperial Aramaic, the term can denote a matter, word, or thing. Here
    it refers to the requested disclosure/interpretation, so 'the thing' is natural
    modern English while remaining close to the source.
- source_word: שָׁאֵל
  chosen: asks
  alternatives:
  - requests
  - demands
  lexicon: HALOT
  rationale: The participle denotes what the king is asking for. 'Asks' is the most
    direct rendering; 'demands' would overstate the lexical force, though the context
    is forceful.
- source_word: יַקִּירָה
  chosen: difficult
  alternatives:
  - rare
  - precious
  - hard
  lexicon: HALOT
  rationale: The adjective can carry the sense of something weighty, rare, or difficult.
    In context the Chaldeans mean the request is extraordinarily hard to meet, so
    'difficult' best captures the sense.
- source_word: וְאָחֳרָן לָא אִיתַי
  chosen: there is no other
  alternatives:
  - no one else exists
  - there is no other person
  lexicon: HALOT
  rationale: This idiom states the absence of any other qualified revealer. 'There
    is no other' is concise and idiomatic in English.
- source_word: יְחַוִּנַּהּ
  chosen: can declare it
  alternatives:
  - can show it
  - can make it known
  lexicon: HALOT
  rationale: The verb means to show, declare, or make known. 'Declare it' fits the
    court setting and the object being revealed before the king.
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - in the presence of the king
  lexicon: HALOT
  rationale: Standard prepositional phrase meaning in the king's presence. 'Before
    the king' is both accurate and natural.
- source_word: לָהֵן
  chosen: except
  alternatives:
  - unless
  lexicon: HALOT
  rationale: Here the particle introduces the sole exception to the statement. 'Except'
    is the clearest English equivalent.
- source_word: אֱלָהִין
  chosen: the gods
  alternatives:
  - God
  - divine beings
  lexicon: HALOT
  rationale: The form is plural, and in the mouth of Babylonian wise men it naturally
    refers to gods/divine beings rather than the God of Israel. 'The gods' preserves
    both grammar and setting.
- source_word: מְדָרְהוֹן
  chosen: whose dwelling
  alternatives:
  - whose abode
  - whose residence
  lexicon: HALOT
  rationale: The noun refers to dwelling place or habitation. 'Whose dwelling' yields
    clear English and preserves the relational clause.
- source_word: עִם בִּשְׂרָא
  chosen: with flesh
  alternatives:
  - with humans
  - with mortal flesh
  lexicon: HALOT
  rationale: The Aramaic literally says 'with flesh.' Retaining 'flesh' preserves
    the concrete wording and the contrast between divine beings and embodied mortals.
    'Humans' is interpretive and less textually transparent.
- source_word: לָא אִיתוֹהִי
  chosen: is not
  alternatives:
  - does not exist
  lexicon: HALOT
  rationale: Existential/copular expression here functions as a simple negated statement
    about dwelling. 'Is not' is the most natural fit in English.
