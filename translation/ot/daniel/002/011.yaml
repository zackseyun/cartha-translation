theological_decisions:
- issue: Referent of אֱלָהִין
  chosen_reading: the gods
  alternative_readings:
  - divine beings
  - God
  rationale: The plural form and pagan court context favor 'the gods.' Rendering it
    as singular 'God' would import Israelite monotheistic framing into the speech
    of Babylonian advisers. 'Divine beings' is possible but less direct than the ordinary
    plural noun.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); §3 (preserve tension rather than resolve it)
- issue: Rendering of בִּשְׂרָא
  chosen_reading: flesh
  alternative_readings:
  - humans
  - mortals
  rationale: The literal term is 'flesh.' Because no doctrinal issue requires smoothing
    it, the main text preserves the source imagery. More interpretive alternatives
    are preserved in a footnote.
  doctrine_reference: Translation philosophy §1 and §6
