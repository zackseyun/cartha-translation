id: DAN.2.6
reference: Daniel 2:6
source:
  edition: WLC
  text: וְ/הֵ֨ן חֶלְמָ֤/א וּ/פִשְׁרֵ/הּ֙ תְּֽהַחֲוֺ֔ן מַתְּנָ֤ן וּ/נְבִזְבָּה֙ וִ/יקָ֣ר
    שַׂגִּ֔יא תְּקַבְּל֖וּן מִן קֳדָמָ֑/י לָהֵ֕ן חֶלְמָ֥/א וּ/פִשְׁרֵ֖/הּ הַחֲוֺֽ/נִי־׃
translation:
  text: But if you make known the dream and its interpretation, you will receive from
    me gifts and a reward and great honor. Therefore make known to me the dream and
    its interpretation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show me' / 'declare to me' for the repeated Aramaic verb meaning 'make
      known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵן
  chosen: But if
  alternatives:
  - and if
  - now if
  lexicon: HALOT
  rationale: Introduces the contrasting conditional protasis over against the previous
    threat in v. 5. 'But if' captures both the conjunction and the conditional force
    naturally in English.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - a dream
  lexicon: HALOT
  rationale: The king refers to a specific dream already in view, so the definite
    rendering is appropriate.
- source_word: וּפִשְׁרֵהּ
  chosen: and its interpretation
  alternatives:
  - and its meaning
  - and its solution
  lexicon: HALOT
  rationale: Aramaic פשר commonly denotes the interpretation or explanation of a dream/mystery
    in Daniel. 'Interpretation' is the most contextually precise and consistent gloss.
- source_word: תְּהַחֲוֺן
  chosen: you make known
  alternatives:
  - you declare
  - you show
  lexicon: HALOT
  rationale: The Haphel form of חוה in Biblical Aramaic means to make known or declare.
    'Make known' preserves the causative nuance and matches the repeated imperative
    later in the verse.
- source_word: מַתְּנָן
  chosen: gifts
  alternatives:
  - presents
  lexicon: HALOT
  rationale: Plural noun referring to bestowed items of value. 'Gifts' is straightforward
    modern English.
- source_word: וּנְבִזְבָּה
  chosen: and a reward
  alternatives:
  - and recompense
  - and payment
  lexicon: HALOT
  rationale: Denotes a reward or bounty granted by the king. 'Reward' is idiomatic
    and fits the promise context.
- source_word: וִיקָר שַׂגִּיא
  chosen: and great honor
  alternatives:
  - and abundant honor
  - and high honor
  lexicon: HALOT
  rationale: יקָר denotes honor/prestige, modified by שַׂגִּיא 'great, much.' 'Great
    honor' is natural and preserves the intensification.
- source_word: תְּקַבְּלוּן
  chosen: you will receive
  alternatives:
  - you shall receive
  lexicon: HALOT
  rationale: Peal imperfect 2mp with future sense in this conditional apodosis. 'Will
    receive' is clear modern English.
- source_word: מִן קֳדָמַי
  chosen: from me
  alternatives:
  - before me
  - from before me
  lexicon: HALOT
  rationale: In this idiom, the sense is source/origin from the speaker's presence
    or authority. 'From me' best conveys the king as giver in idiomatic English.
- source_word: לָהֵן
  chosen: Therefore
  alternatives:
  - thus
  - so then
  lexicon: HALOT
  rationale: Draws an inference from the promised reward to the command that follows.
    'Therefore' gives the logical force clearly.
- source_word: הַחֲוֺנִי
  chosen: make known to me
  alternatives:
  - declare to me
  - show me
  lexicon: HALOT
  rationale: Imperative plus 1cs suffix. 'Make known to me' mirrors the earlier verb
    for consistency and preserves the direct demand.
