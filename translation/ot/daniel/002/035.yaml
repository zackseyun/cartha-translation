theological_decisions:
- issue: Scope of אַרְעָא
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In Daniel 2 the statue and stone symbolize successive kingdoms and a
    kingdom of universal scope; 'earth' best fits the vision's global horizon without
    adding doctrinal interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of conjunction before 'stone'
  chosen_reading: But the stone
  alternative_readings:
  - And the stone
  rationale: 'The conjunction is formally ''and,'' but optimal equivalence allows
    an adversative nuance where the discourse contrast is clear: the statue materials
    vanish, whereas the stone endures and expands.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
