id: DAN.2.35
reference: Daniel 2:35
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן דָּ֣קוּ כַ/חֲדָ֡ה פַּרְזְלָ/א֩ חַסְפָּ֨/א נְחָשָׁ֜/א כַּסְפָּ֣/א
    וְ/דַהֲבָ֗/א וַ/הֲווֹ֙ כְּ/ע֣וּר מִן אִדְּרֵי קַ֔יִט וּ/נְשָׂ֤א הִמּוֹן֙ רוּחָ֔/א
    וְ/כָל אֲתַ֖ר לָא הִשְׁתֲּכַ֣ח לְ/ה֑וֹן וְ/אַבְנָ֣/א דִּֽי מְחָ֣ת לְ/צַלְמָ֗/א
    הֲוָ֛ת לְ/ט֥וּר רַ֖ב וּ/מְלָ֥ת כָּל אַרְעָֽ/א־־־־׀־־׃
translation:
  text: Then the iron, the clay, the bronze, the silver, and the gold were crushed
    all at once and became like chaff from the summer threshing floors, and the wind
    carried them away so that no place was found for them. But the stone that struck
    the statue became a great mountain and filled the whole earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'together' / 'as one' for 'all at once.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like dust'; the Aramaic image is light refuse from threshing, hence
      'chaff.'
    reason: lexical_alternative
  - marker: c
    text: '''Earth'' could also be rendered ''land,'' but here the broader scope of
      the vision favors ''earth.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: דָּקוּ
  chosen: were crushed
  alternatives:
  - were pulverized
  - were broken in pieces
  lexicon: HALOT
  rationale: Passive plural verb indicating the materials were reduced by force. 'Were
    crushed' is clear and fits the ensuing image of chaff.
- source_word: כַחֲדָה
  chosen: all at once
  alternatives:
  - together
  - as one
  lexicon: HALOT
  rationale: Idiomatic Aramaic adverbial expression meaning simultaneously/together.
    'All at once' communicates both unity and suddenness in readable English.
- source_word: פַּרְזְלָא
  chosen: the iron
  lexicon: HALOT
  rationale: Definite noun referring back to the statue's material in the vision.
- source_word: חַסְפָּא
  chosen: the clay
  alternatives:
  - the pottery
  - the earthenware
  lexicon: HALOT
  rationale: Refers to the brittle clay component of the statue. 'Clay' is the most
    straightforward contextual rendering in this passage.
- source_word: נְחָשָׁא
  chosen: the bronze
  alternatives:
  - the copper
  lexicon: HALOT
  rationale: The Aramaic term can denote copper/bronze; in the statue sequence 'bronze'
    is the conventional and contextually likely alloy rendering.
- source_word: כַּסְפָּא
  chosen: the silver
  lexicon: HALOT
  rationale: Direct material term in the sequence of metals.
- source_word: דַּהֲבָא
  chosen: the gold
  lexicon: HALOT
  rationale: Direct material term in the sequence of metals.
- source_word: וַהֲווֹ כְּעוּר
  chosen: and became like chaff
  alternatives:
  - and became like dust
  - and became like husks
  lexicon: HALOT
  rationale: The comparison is to light agricultural refuse easily blown away. 'Chaff'
    best matches the threshing imagery and common English biblical usage.
- source_word: אִדְּרֵי קַיִט
  chosen: the summer threshing floors
  alternatives:
  - summer threshing floors
  - threshing floors in summer
  lexicon: HALOT
  rationale: Construct phrase referring to threshing floors in the dry summer season,
    when chaff would be winnowed by wind. Including 'the' makes the English idiomatic.
- source_word: וּנְשָׂא הִמּוֹן רוּחָא
  chosen: and the wind carried them away
  alternatives:
  - and a wind lifted them away
  - and the wind swept them away
  lexicon: HALOT
  rationale: Singular verb with 'wind' as subject and 3mp object pronoun. 'Carried
    them away' captures removal by wind without overinterpreting violence.
- source_word: וְכָל אֲתַר לָא הִשְׁתֲּכַח לְהוֹן
  chosen: so that no place was found for them
  alternatives:
  - and no place was found for them
  - and not any place was found for them
  lexicon: HALOT
  rationale: Idiomatic result clause expressing total disappearance. 'So that' makes
    the consequence explicit in smooth English.
- source_word: וְאַבְנָא
  chosen: But the stone
  alternatives:
  - And the stone
  lexicon: HALOT
  rationale: The conjunction can be rendered 'and,' but 'but' appropriately marks
    the contrast between the vanished statue materials and the enduring stone.
- source_word: דִּי מְחָת לְצַלְמָא
  chosen: that struck the statue
  alternatives:
  - that hit the statue
  - that smote the statue
  lexicon: HALOT
  rationale: Relative clause identifying the stone by its action. 'Struck' is dignified
    modern English and avoids archaic 'smote.'
- source_word: הֲוָת לְטוּר רַב
  chosen: became a great mountain
  alternatives:
  - became a large mountain
  lexicon: HALOT
  rationale: Simple predication; 'great mountain' preserves the grandeur and possible
    symbolic weight better than the flatter 'large mountain.'
- source_word: וּמְלָת כָּל אַרְעָא
  chosen: and filled the whole earth
  alternatives:
  - and filled all the earth
  - and filled the whole land
  lexicon: HALOT
  rationale: אַרְעָא can mean land/earth, but in the cosmic scope of the dream's interpretation
    'earth' is preferable. 'Whole earth' conveys total extent.
