id: DAN.2.3
reference: Daniel 2:3
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר לָ/הֶ֛ם הַ/מֶּ֖לֶךְ חֲל֣וֹם חָלָ֑מְתִּי וַ/תִּפָּ֣עֶם רוּחִ֔/י
    לָ/דַ֖עַת אֶֽת הַ/חֲלֽוֹם־׃
translation:
  text: And the king said to them, “I have dreamed a dream, and my spirit is troubled
    to know the dream.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I dreamed a dream.” The Hebrew more literally reads, “a dream I dreamed,”
      a cognate construction that adds emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, “my spirit was troubled” or “my spirit is agitated.”
    reason: lexical_alternative
  - marker: c
    text: “My spirit” may also be understood more idiomatically as “I” or “my mind,”
      but the translation preserves the Hebrew term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of אמר. 'And ... said' preserves Hebrew narrative
    flow without overinterpreting temporal sequence.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward preposition + pronominal suffix indicating the king's
    addressees.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Nebuchadnezzar in context; standard rendering.
- source_word: חֲלוֹם חָלָמְתִּי
  chosen: I have dreamed a dream
  alternatives:
  - I dreamed a dream
  - I had a dream
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('dream I dreamed'), which is rhetorically
    emphatic. 'I have dreamed a dream' preserves that emphasis more fully than the
    smoother 'I had a dream.'
- source_word: וַתִּפָּעֶם
  chosen: is troubled
  alternatives:
  - was troubled
  - is agitated
  - is disturbed
  lexicon: HALOT
  rationale: The verb conveys inner agitation or disturbance. Present English 'is
    troubled' fits the king's immediate reported state in direct speech and reads
    naturally while preserving the emotional force.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my mind
  - I
  lexicon: HALOT
  rationale: רוּחַ here denotes the king's inner spirit or animating inner self. 'My
    spirit' preserves the source term and its anthropological nuance better than flattening
    to 'my mind.'
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to understand
  - to learn
  lexicon: HALOT
  rationale: The infinitive of ידע most directly means 'to know.' In context it expresses
    the king's desire to know the content/significance of the dream; 'to know' keeps
    the wording broad enough to include that force.
- source_word: אֶת־הַחֲלוֹם
  chosen: the dream
  lexicon: HALOT
  rationale: Direct-object marker plus definite noun. Repeating 'the dream' rather
    than substituting 'it' preserves the Hebrew repetition and emphasis.
