id: DAN.2.16
reference: Daniel 2:16
source:
  edition: WLC
  text: וְ/דָ֣נִיֵּ֔אל עַ֖ל וּ/בְעָ֣ה מִן מַלְכָּ֑/א דִּ֚י זְמָ֣ן יִנְתֵּן לֵ֔/הּ
    וּ/פִשְׁרָ֖/א לְ/הַֽחֲוָיָ֥ה לְ/מַלְכָּֽ/א־־׃פ
translation:
  text: So Daniel went in and asked the king to give him time, so that he might make
    the interpretation known to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Daniel went in and requested of the king that time be given to him,
      and he would declare the interpretation to the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: went in
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: In Biblical Aramaic this verb here denotes Daniel's approach/entry into
    the king's presence. 'Went in' is idiomatic English and preserves the directional
    sense better than the bare 'went.'
- source_word: וּבְעָה
  chosen: asked
  alternatives:
  - requested
  - sought
  lexicon: HALOT
  rationale: The verb indicates making a request. 'Asked' is natural modern English
    and fits the court setting without overstating the formality.
- source_word: מִן מַלְכָּא
  chosen: the king
  alternatives:
  - from the king
  lexicon: HALOT
  rationale: English idiom with 'asked' normally takes the indirect object directly
    ('asked the king') rather than 'asked from the king,' though the source preposition
    is reflected in the sense.
- source_word: דִּי
  chosen: so that
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the content/purpose of the request. 'So that' makes the purposive
    nuance clear in English.
- source_word: זְמָן
  chosen: time
  alternatives:
  - a set time
  - an appointed time
  lexicon: HALOT
  rationale: The noun denotes time or a period allotted. 'Time' is the most natural
    rendering here; more specific options are possible but not required by the context.
- source_word: יִנְתֵּן לֵהּ
  chosen: to give him
  alternatives:
  - to grant him
  - that he be given
  lexicon: HALOT
  rationale: The verb 'give' with pronominal object is straightforward. 'Give him
    time' is idiomatic English; 'grant him' is a viable alternative but slightly more
    formal.
- source_word: וּפִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the explanation
  lexicon: HALOT
  rationale: In Daniel this noun regularly refers to the interpretation of a dream
    or mystery. 'Interpretation' preserves that technical sense better than the broader
    'explanation.'
- source_word: לְהַחֲוָיָה
  chosen: make known
  alternatives:
  - declare
  - show
  lexicon: HALOT
  rationale: The causative form means to cause to know, i.e., make known. This is
    clear modern English and preserves the verbal force.
- source_word: לְמַלְכָּא
  chosen: to the king
  lexicon: HALOT
  rationale: Straightforward indirect object marking the recipient of the interpretation.
- source_word: וְדָנִיֵּאל
  chosen: So Daniel
  alternatives:
  - And Daniel
  lexicon: HALOT
  rationale: The conjunction can be rendered 'and,' but in narrative English 'so'
    appropriately conveys the next consequential action after the prior decree.
