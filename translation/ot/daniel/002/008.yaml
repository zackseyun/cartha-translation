theological_decisions:
- issue: Ambiguity of מִלְּתָא / אַזְדָּא מִנִּי
  chosen_reading: the matter has gone from me
  alternative_readings:
  - the word has gone from me
  - the command is firm from me
  - the dream has gone from me
  - the matter has escaped me
  rationale: The Aramaic permits some ambiguity, and the wider passage has been understood
    either as the king having forgotten the dream or as his decree/word being fixed.
    This translation preserves the immediate lexical sense without forcing a harmonizing
    interpretation. The ambiguity is worth preserving rather than resolving beyond
    the wording of this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
