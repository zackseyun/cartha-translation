id: DAN.2.8
reference: Daniel 2:8
source:
  edition: WLC
  text: עָנֵ֤ה מַלְכָּ/א֙ וְ/אָמַ֔ר מִן יַצִּיב֙ יָדַ֣ע אֲנָ֔ה דִּ֥י עִדָּנָ֖/א אַנְתּ֣וּן
    זָבְנִ֑ין כָּ/ל קֳבֵל֙ דִּ֣י חֲזֵית֔וֹן דִּ֥י אַזְדָּ֖א מִנִּ֥/י מִלְּתָֽ/א־־׃
translation:
  text: The king answered and said, “I know for certain that you are trying to gain
    time, because you have seen that the matter has gone from me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the word has gone from me,” “the matter has escaped me,” or possibly
      “the command is firm from me.” The Aramaic wording is compact and has been understood
      in more than one way in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: מִן יַצִּיב
  chosen: for certain
  alternatives:
  - certainly
  - with certainty
  - of a certainty
  lexicon: HALOT/Aramaic lexicons
  rationale: 'The idiom combines the preposition with an adjective meaning firm/certain
    to express certainty: ''from certainty'' > ''for certain''/''certainly.'' ''For
    certain'' is natural modern English while preserving the king''s emphatic claim.'
- source_word: יָדַע אֲנָה
  chosen: I know
  alternatives:
  - I am aware
  - I perceive
  lexicon: HALOT/Aramaic lexicons
  rationale: Straightforward cognitive verb in first person singular. 'I know' is
    the plain and strongest rendering.
- source_word: עִדָּנָא
  chosen: time
  alternatives:
  - delay
  - a period of time
  lexicon: HALOT/Aramaic lexicons
  rationale: The noun denotes time/season. In this context it refers to time being
    bought or gained, so 'time' is the most direct rendering; the nuance of delay
    is carried by the verbal phrase rather than by the noun alone.
- source_word: אַנְתּוּן זָבְנִין
  chosen: you are trying to gain
  alternatives:
  - you are buying
  - you are buying up
  - you are seeking to gain
  lexicon: HALOT/Aramaic lexicons
  rationale: The participle from 'buy' is idiomatic here for buying/gaining time.
    English 'trying to gain time' communicates the sense clearly without woodenly
    preserving the commercial metaphor in a way that would sound unnatural.
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - since
  - inasmuch as
  - for this reason that
  lexicon: HALOT/Aramaic lexicons
  rationale: This Aramaic connective introduces the reason or grounds for the king's
    statement. 'Because' is the clearest modern equivalent.
- source_word: חֲזֵיתוֹן
  chosen: you have seen
  alternatives:
  - you saw
  - you realized
  - you perceived
  lexicon: HALOT/Aramaic lexicons
  rationale: Perfect second masculine plural. 'You have seen' preserves the completed
    action with present relevance in the king's accusation.
- source_word: אַזְדָּא מִנִּי
  chosen: has gone from me
  alternatives:
  - is gone from me
  - has departed from me
  - has escaped me
  lexicon: HALOT/Aramaic lexicons
  rationale: The phrase indicates that the matter/word has gone away from the king,
    i.e., is no longer available to him. 'Has gone from me' is formally close; 'has
    escaped me' is interpretive and possible, but the more literal wording better
    preserves the ambiguity of whether the issue is the king's command or the dream
    itself.
- source_word: מִלְּתָא
  chosen: the matter
  alternatives:
  - the word
  - the thing
  - the command
  lexicon: HALOT/Aramaic lexicons
  rationale: Aramaic מִלְּתָא can mean word, matter, affair, or command. Here it likely
    refers broadly to the matter at hand, allowing the verse to retain the ambiguity
    present in the source. 'The matter' is idiomatic and less over-specific than 'the
    command'.
- source_word: עָנֵה מַלְכָּא וְאָמַר
  chosen: The king answered and said
  alternatives:
  - The king replied and said
  - The king answered
  lexicon: HALOT/Aramaic lexicons
  rationale: This is a common narrative formula. Retaining both verbs reflects the
    source text and standard biblical narrative style without sounding overly archaic.
