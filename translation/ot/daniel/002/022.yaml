id: DAN.2.22
reference: Daniel 2:22
source:
  edition: WLC
  text: ה֛וּא גָּלֵ֥א עַמִּיקָתָ֖/א וּ/מְסַתְּרָתָ֑/א יָדַע֙ מָ֣ה בַ/חֲשׁוֹכָ֔/א ו/נהיר/א
    עִמֵּ֥/הּ שְׁרֵֽא׃
translation:
  text: He reveals deep and hidden things; he knows what is in the darkness, and light
    dwells with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secret things' for 'hidden things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'light is with him.' The Aramaic verb can be rendered more statively,
      but 'dwells' better preserves the imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלֵא
  chosen: reveals
  alternatives:
  - uncovers
  - discloses
  lexicon: HALOT
  rationale: The Aramaic participle denotes making something known or uncovered. 'Reveals'
    is natural modern English and fits the context of divine disclosure in Daniel
    2.
- source_word: עַמִּיקָתָא
  chosen: deep things
  alternatives:
  - deep matters
  - profound things
  lexicon: HALOT
  rationale: The plural adjective/substantive refers to things that are deep or profound.
    'Deep things' preserves the metaphor and pairs well with the following term.
- source_word: וּמְסַתְּרָתָא
  chosen: and hidden things
  alternatives:
  - and secret things
  - and concealed things
  lexicon: HALOT
  rationale: From a root meaning to hide or conceal. 'Hidden things' is the most transparent
    rendering; 'secret things' is possible but slightly more interpretive.
- source_word: יָדַע מָה
  chosen: he knows what
  alternatives:
  - he knows that which
  - he knows whatever
  lexicon: HALOT
  rationale: The idiom straightforwardly introduces the content of divine knowledge.
    'He knows what' is idiomatic and sufficiently formal.
- source_word: בַחֲשׁוֹכָא
  chosen: is in the darkness
  alternatives:
  - is in darkness
  - is in the dark
  lexicon: HALOT
  rationale: The noun means darkness. Supplying 'is' makes the English clause complete.
    'The darkness' preserves the definite Aramaic form and the concrete imagery.
- source_word: וְנְהִירָא
  chosen: and light
  alternatives:
  - and the light
  - illumination
  lexicon: HALOT
  rationale: The noun means light. Anarthrous English 'light' is more idiomatic here
    than 'the light,' while still preserving the contrast with darkness.
- source_word: עִמֵּהּ שְׁרֵא
  chosen: dwells with him
  alternatives:
  - abides with him
  - resides with him
  lexicon: HALOT
  rationale: The verb means to dwell, rest, or abide. 'Dwells with him' is clear,
    dignified, and preserves the personal association of light with God.
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: The pronoun is emphatic in position. English capitalizes the pronoun
    here because the referent is God in direct praise, while the emphasis is adequately
    conveyed by clause position and repetition.
