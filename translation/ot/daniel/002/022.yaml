theological_decisions:
- issue: Personification of light in relation to God
  chosen_reading: and light dwells with him
  alternative_readings:
  - and light is with him
  rationale: The Aramaic verb שְׁרֵא naturally conveys dwelling or abiding, not mere
    static location. Retaining 'dwells' preserves the poetic personification without
    importing additional doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
