id: DAN.2.5
reference: Daniel 2:5
source:
  edition: WLC
  text: עָנֵ֤ה מַלְכָּ/א֙ וְ/אָמַ֣ר ל/כשדי/א מִלְּתָ֖/א מִנִּ֣/י אַזְדָּ֑א הֵ֣ן לָ֤א
    תְהֽוֹדְעוּנַּ֨/נִי֙ חֶלְמָ֣/א וּ/פִשְׁרֵ֔/הּ הַדָּמִין֙ תִּתְעַבְד֔וּן וּ/בָתֵּי/כ֖וֹן
    נְוָלִ֥י יִתְּשָׂמֽוּן׃
translation:
  text: 'The king answered and said to the Chaldeans, “The word from me is firm: if
    you do not make known to me the dream and its interpretation, you will be made
    into limbs, and your houses will be made a refuse heap.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The word has gone out from me.”
    reason: alternative_reading
  - marker: b
    text: Traditionally, “you will be made into pieces.” The Aramaic term is more
      literally “limbs” or “members,” implying dismemberment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - the monarch
  lexicon: HALOT
  rationale: Standard rendering for the royal title; 'king' is the natural English
    equivalent and matches the narrative register.
- source_word: לכשדיא
  chosen: to the Chaldeans
  alternatives:
  - to the astrologers
  lexicon: HALOT
  rationale: Although in context this group functions as a class of court wise men,
    the lexical form denotes 'Chaldeans.' Following original-language primacy, the
    ethnic/professional designation is preserved rather than interpreted as a role
    title in the main text.
- source_word: מִלְּתָא
  chosen: the word
  alternatives:
  - the matter
  - the decree
  - the command
  lexicon: HALOT
  rationale: Aramaic מִלְּתָא can mean 'word,' 'matter,' or 'statement.' Here it introduces
    the king's fixed pronouncement. 'The word' keeps closer formal correspondence
    while remaining intelligible in English.
- source_word: מִנִּי אַזְדָּא
  chosen: from me is firm
  alternatives:
  - from me is final
  - has gone out from me
  - stands firm from me
  lexicon: HALOT
  rationale: This phrase is debated because אַזְדָּא may be understood as 'firm/certain'
    or as something like 'gone forth.' In this context the threat that follows favors
    the sense of a fixed royal decision. 'From me is firm' preserves the source structure
    while communicating that the king's word is settled.
- source_word: תְהוֹדְעוּנַּנִי
  chosen: make known to me
  alternatives:
  - tell me
  - inform me
  lexicon: HALOT
  rationale: The causative form of ידע is well represented by 'make known.' This is
    slightly more formal than 'tell me' and preserves the force of the stem.
- source_word: חֶלְמָא
  chosen: the dream
  lexicon: HALOT
  rationale: Direct and standard equivalent in the Daniel Aramaic context.
- source_word: פִשְׁרֵהּ
  chosen: its interpretation
  alternatives:
  - its meaning
  lexicon: HALOT
  rationale: In Daniel this term regularly refers to the interpretation of dreams
    or visions. 'Interpretation' preserves that technical sense better than the broader
    'meaning.'
- source_word: הַדָּמִין
  chosen: into limbs
  alternatives:
  - into pieces
  lexicon: HALOT
  rationale: The noun refers literally to limbs or members. Traditional English often
    has 'pieces,' which communicates the result but loses the bodily imagery. 'Into
    limbs' is more literal, though severe and idiomatic enough in context to convey
    dismemberment.
- source_word: תִּתְעַבְדוּן
  chosen: you will be made
  alternatives:
  - you will become
  lexicon: HALOT
  rationale: 'The passive sense fits the threat: the king''s subjects will be acted
    upon, not merely change state on their own.'
- source_word: נְוָלִי
  chosen: a refuse heap
  alternatives:
  - a dunghill
  - a ruin heap
  lexicon: HALOT
  rationale: The term likely denotes something disgraceful and desolated, traditionally
    rendered 'dunghill.' 'Refuse heap' communicates the image in readable modern English
    without archaic diction.
- source_word: יִתְּשָׂמוּן
  chosen: will be made
  alternatives:
  - will be turned into
  - will be set as
  lexicon: HALOT
  rationale: The verb means 'to be set/placed/made.' In idiomatic English with the
    predicate noun, 'will be made' is concise and natural.
