theological_decisions:
- issue: Interpretation of מִנִּי אַזְדָּא
  chosen_reading: The phrase expresses that the king's word is fixed or firm.
  alternative_readings:
  - The word has gone out from me.
  rationale: This clause is textually and lexically disputed in translation tradition.
    The immediate context emphasizes the irrevocability of the king's demand and threat,
    so the 'firm/fixed' sense best fits the discourse. The alternative is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the punishment term הַדָּמִין
  chosen_reading: A more literal bodily image ('into limbs') is retained in the main
    text.
  alternative_readings:
  - into pieces
  rationale: The verse threatens violent dismemberment. A literal rendering better
    reflects the source imagery, while the common smoother rendering is preserved
    in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §1, §5
