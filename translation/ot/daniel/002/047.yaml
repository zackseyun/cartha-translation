theological_decisions:
- issue: Whether Nebuchadnezzar's statement should be rendered in a way that implies
    full monotheistic conversion or a more limited acknowledgment of supremacy
  chosen_reading: Rendered as an exalted confession of Daniel's God—'your God is God
    of gods and Lord of kings'—without adding language implying exclusive worship
    or settled conversion.
  alternative_readings:
  - A stronger monotheistic paraphrase such as 'your God alone is God'
  - A weaker polytheistic rendering minimizing the force of the superlatives
  rationale: The Aramaic text presents a genuine acknowledgment of supremacy using
    superlative title language, but it does not explicitly state that Nebuchadnezzar
    has abandoned all other gods. The translation preserves that tension rather than
    resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
