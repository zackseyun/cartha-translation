id: DAN.2.47
reference: Daniel 2:47
source:
  edition: WLC
  text: עָנֵה֩ מַלְכָּ֨/א לְ/דָנִיֵּ֜אל וְ/אָמַ֗ר מִן קְשֹׁט֙ דִּ֣י אֱלָהֲ/כ֗וֹן ה֣וּא
    אֱלָ֧הּ אֱלָהִ֛ין וּ/מָרֵ֥א מַלְכִ֖ין וְ/גָלֵ֣ה רָזִ֑ין דִּ֣י יְכֵ֔לְתָּ לְ/מִגְלֵ֖א
    רָזָ֥/ה דְנָֽה־׃
translation:
  text: The king answered Daniel and said, “Truly, your God is God of gods and Lord
    of kings, and a revealer of mysteries, because you were able to reveal this mystery.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a revealer of secrets.' The Aramaic term can denote hidden matters generally,
      but 'mysteries' better preserves Daniel's recurring vocabulary of divine disclosure.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  chosen: answered ... and said
  alternatives:
  - responded ... and said
  - answered
  lexicon: HALOT
  rationale: Standard narrative formula in Aramaic; retaining both verbs reflects
    the source without awkwardness.
- source_word: מִן קְשֹׁט
  chosen: Truly
  alternatives:
  - Of a truth
  - Certainly
  - In truth
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression meaning 'truly' or 'certainly.' 'Truly'
    is natural modern English and preserves the emphatic force.
- source_word: אֱלָהֲכוֹן
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: Addressed to Daniel in the plural-respect/collective form referring to
    Daniel and his companions' God; capitalized 'God' in English because the speaker
    is identifying him as supreme in the following clause.
- source_word: אֱלָהּ אֱלָהִין
  chosen: God of gods
  alternatives:
  - god of gods
  lexicon: HALOT
  rationale: Construct chain expressing supremacy over all so-called gods. Capitalized
    in English because Nebuchadnezzar is here confessing the superiority of Daniel's
    God.
- source_word: וּמָרֵא מַלְכִין
  chosen: and Lord of kings
  alternatives:
  - and master of kings
  lexicon: HALOT
  rationale: מָרֵא denotes lord/master. 'Lord' best matches elevated royal-theological
    language and aligns with the project's default for cognate title language where
    appropriate.
- source_word: וְגָלֵה רָזִין
  chosen: and a revealer of mysteries
  alternatives:
  - and one who reveals mysteries
  - and the revealer of mysteries
  lexicon: HALOT
  rationale: Participial expression describing God's characteristic action. 'A revealer
    of mysteries' is idiomatic and preserves the predicative force.
- source_word: רָזִין
  chosen: mysteries
  alternatives:
  - secrets
  lexicon: HALOT
  rationale: In Daniel, רָז carries the sense of hidden matters disclosed by divine
    revelation. 'Mysteries' preserves the book's thematic vocabulary better than the
    flatter 'secrets.'
- source_word: דִּי יְכֵלְתָּ
  chosen: because you were able
  alternatives:
  - since you were able
  - for you were able
  lexicon: HALOT
  rationale: The conjunction introduces the ground for the king's confession. 'Because'
    clearly conveys the causal sense.
- source_word: לְמִגְלֵא רָזָה דְנָה
  chosen: to reveal this mystery
  alternatives:
  - to uncover this mystery
  - to reveal this secret
  lexicon: HALOT
  rationale: Infinitive plus object states Daniel's demonstrated ability. 'Reveal'
    maintains lexical consistency with גלה earlier in the verse; 'this mystery' points
    to the specific dream and its interpretation.
