theological_decisions:
- issue: Rendering אֱלָהּ with an indefinite expression in a monotheistic context
  chosen_reading: a God in heaven
  alternative_readings:
  - God in heaven
  - the God in heaven
  rationale: The Aramaic wording is formally indefinite, and in the narrative Daniel
    is speaking in a pagan court context, contrasting the true revealer with the impotence
    of other claimants. Rendering it as 'a God in heaven' preserves the source form
    and rhetorical setting while English capitalization still signals reference to
    Israel's God. This avoids importing a more explicit formulation than the text
    itself uses.
  doctrine_reference: Translation philosophy §1, §3
- issue: Temporal phrase בְּאַחֲרִית יוֹמַיָּא
  chosen_reading: in the latter days
  alternative_readings:
  - in the last days
  - at the end of days
  rationale: The phrase may bear eschatological significance, but the translation
    should preserve that tension rather than resolve it into a narrower end-times
    schema. 'Latter days' is sufficiently literal and theologically open-ended.
  doctrine_reference: Translation philosophy §3
