id: DAN.2.28
reference: Daniel 2:28
source:
  edition: WLC
  text: בְּרַ֡ם אִיתַ֞י אֱלָ֤הּ בִּ/שְׁמַיָּ/א֙ גָּלֵ֣א רָזִ֔ין וְ/הוֹדַ֗ע לְ/מַלְכָּ/א֙
    נְבֽוּכַדְנֶצַּ֔ר מָ֛ה דִּ֥י לֶהֱוֵ֖א בְּ/אַחֲרִ֣ית יוֹמַיָּ֑/א חֶלְמָ֨/ךְ וְ/חֶזְוֵ֥י
    רֵאשָׁ֛/ךְ עַֽל מִשְׁכְּבָ֖/ךְ דְּנָ֥ה הֽוּא־׃פ
translation:
  text: 'But there is a God in heaven who reveals mysteries, and he has made known
    to King Nebuchadnezzar what will happen in the latter days. Your dream, and the
    visions of your head as you lay on your bed, were these:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God in heaven' or 'the God in heaven.' The Aramaic expression is formally
      indefinite, though it clearly refers to the true God in context.
    reason: alternative_reading
  - marker: b
    text: Or 'in the last days.' The phrase can denote a future climactic period without
      specifying a particular eschatological system.
    reason: lexical_alternative
  - marker: c
    text: Literally 'the visions of your head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  chosen: But
  alternatives:
  - However
  - Nevertheless
  lexicon: HALOT
  rationale: Adversative particle introducing contrast with the inability of Babylonian
    wise men in the preceding context. 'But' is the most natural concise English equivalent.
- source_word: אִיתַי
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Existential Aramaic form; idiomatic English is 'there is,' preserving
    the emphatic assertion of God's existence/presence.
- source_word: אֱלָהּ בִּשְׁמַיָּא
  chosen: a God in heaven
  alternatives:
  - God in heaven
  - a god in heaven
  lexicon: HALOT
  rationale: The noun lacks the emphatic determination that would require 'the God,'
    and the phrase functions to identify the true divine revealer over against pagan
    claimants. 'A God in heaven' is the plain Aramaic sense in this court setting,
    without denying monotheistic intent in the broader book. Capitalized 'God' reflects
    reference to the true God of Israel in English convention.
- source_word: גָּלֵא
  chosen: who reveals
  alternatives:
  - revealing
  - who uncovers
  lexicon: HALOT
  rationale: Participial form describing God's characteristic action. Relative clause
    'who reveals' is natural English and preserves durative/characterizing force.
- source_word: רָזִין
  chosen: mysteries
  alternatives:
  - secrets
  lexicon: HALOT
  rationale: In Daniel, this term is a key motif for hidden matters disclosed by divine
    revelation. 'Mysteries' preserves that thematic weight better than the flatter
    'secrets.'
- source_word: וְהוֹדַע
  chosen: and he has made known
  alternatives:
  - and he made known
  - and he revealed
  lexicon: HALOT
  rationale: The verb denotes causing to know. 'Has made known' fits the completed
    action with present relevance in English and avoids collapsing it into the same
    gloss as גָּלֵא, preserving lexical distinction.
- source_word: לְמַלְכָּא נְבוּכַדְנֶצַּר
  chosen: to King Nebuchadnezzar
  alternatives:
  - to the king, Nebuchadnezzar
  lexicon: HALOT
  rationale: Smooth English rendering of indirect object plus royal title and name.
- source_word: מָה דִּי לֶהֱוֵא
  chosen: what will happen
  alternatives:
  - what is to be
  - what will come to pass
  lexicon: HALOT
  rationale: Future-oriented clause. 'What will happen' is clear modern English and
    accurately conveys the predictive sense.
- source_word: בְּאַחֲרִית יוֹמַיָּא
  chosen: in the latter days
  alternatives:
  - in the last days
  - at the end of days
  lexicon: HALOT
  rationale: This phrase can carry eschatological force, but the translation should
    preserve the source wording without over-specifying a later doctrinal framework.
    'In the latter days' is a standard, transparent rendering that retains the temporal
    and potentially eschatological tension.
- source_word: חֶלְמָךְ
  chosen: Your dream
  lexicon: HALOT
  rationale: Direct address to Nebuchadnezzar with second masculine singular suffix.
- source_word: וְחֶזְוֵי רֵאשָׁךְ
  chosen: and the visions of your head
  alternatives:
  - and the visions in your head
  - and your head-visions
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom and imagery. 'Visions
    in your head' is possible but interprets the genitive more dynamically; the chosen
    wording remains readable while closer to the Aramaic.
- source_word: עַל מִשְׁכְּבָךְ
  chosen: as you lay on your bed
  alternatives:
  - upon your bed
  - on your bed
  lexicon: HALOT
  rationale: The prepositional phrase modifies the dream-setting. 'As you lay on your
    bed' expresses the situational sense in natural English.
- source_word: דְּנָה הוּא
  chosen: 'were these:'
  alternatives:
  - 'this was it:'
  - 'this is it:'
  lexicon: HALOT
  rationale: This deictic summary introduces the content of the dream that follows
    in the next verse. Because English normally uses past reference here, 'were these:'
    best signals transition to the report of the dream.
