id: DAN.2.41
reference: Daniel 2:41
source:
  edition: WLC
  text: וְ/דִֽי חֲזַ֜יְתָה רַגְלַיָּ֣/א וְ/אֶצְבְּעָתָ֗/א מנ/הון חֲסַ֤ף דִּֽי פֶחָר֙
    ו/מנ/הון פַּרְזֶ֔ל מַלְכ֤וּ פְלִיגָה֙ תֶּהֱוֵ֔ה וּ/מִן נִצְבְּתָ֥/א דִ֥י פַרְזְלָ֖/א
    לֶֽהֱוֵא בַ֑/הּ כָּ/ל קֳבֵל֙ דִּ֣י חֲזַ֔יְתָה פַּ֨רְזְלָ֔/א מְעָרַ֖ב בַּ/חֲסַ֥ף
    טִינָֽ/א־־־־־׃
translation:
  text: And as you saw the feet and toes, partly of potter’s clay and partly of iron,
    the kingdom will be divided; yet some of the firmness of iron will be in it, just
    as you saw the iron mixed with clay mud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the strength of iron will be in it.' The Aramaic term can denote
      firmness, strength, or stability.
    reason: lexical_alternative
  - marker: b
    text: Or 'mixed with muddy clay.' The phrase combines terms for clay and mud,
      emphasizing the unstable mixture.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלַיָּא וְאֶצְבְּעָתָא
  chosen: the feet and toes
  alternatives:
  - the legs and toes
  lexicon: HALOT
  rationale: רַגְלַיָּא here refers to the lower extremities of the statue, and in
    context with toes clearly means 'feet,' not 'legs.' A natural paired rendering
    in English is 'feet and toes.'
- source_word: מנ/הון ... ו/מנ/הון
  chosen: partly ... and partly
  alternatives:
  - some of them ... and some of them
  lexicon: HALOT
  rationale: The idiom literally means 'from them ... and from them,' referring to
    the composition of the feet/toes. English expresses this most clearly as 'partly
    ... and partly.'
- source_word: חֲסַף דִּי פֶחָר
  chosen: potter’s clay
  alternatives:
  - clay of a potter
  - ceramic clay
  lexicon: HALOT
  rationale: חֲסַף is clay/earthenware material, and פֶחָר denotes a potter. 'Potter’s
    clay' preserves both the material and its crafted association in idiomatic English.
- source_word: פַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term in this vision context.
- source_word: מַלְכוּ
  chosen: the kingdom
  alternatives:
  - a kingdom
  - royal rule
  lexicon: HALOT
  rationale: The anarthrous Aramaic noun is definite in context, referring to the
    kingdom symbolized by this part of the statue. 'The kingdom' best reflects the
    specific referent.
- source_word: פְלִיגָה
  chosen: divided
  alternatives:
  - split
  - partitioned
  lexicon: HALOT
  rationale: The adjective/participle conveys a divided or partitioned state. 'Divided'
    is the most natural and standard English rendering here.
- source_word: וּמִן נִצְבְּתָא דִי פַרְזְלָא לֶהֱוֵא בַהּ
  chosen: yet some of the firmness of iron will be in it
  alternatives:
  - but from the firmness of iron it will have
  - and some of the strength of iron will be in it
  lexicon: HALOT
  rationale: נִצְבְּתָא denotes firmness/strength/stability. The phrase means that
    the kingdom retains something of iron's strength. 'Firmness' keeps the image concrete
    and close to the source, while 'some of' reflects וּמִן.
- source_word: כָּל־קֳבֵל דִּי
  chosen: just as
  alternatives:
  - because
  - inasmuch as
  lexicon: HALOT
  rationale: In this explanatory context the phrase introduces correspondence between
    what was seen and the interpretation. 'Just as' fits the comparison better than
    a strictly causal 'because.'
- source_word: מְעָרַב
  chosen: mixed
  alternatives:
  - mingled
  - combined
  lexicon: HALOT
  rationale: The participle indicates mixture of the materials. 'Mixed' is clear modern
    English.
- source_word: בַּחֲסַף טִינָא
  chosen: with clay mud
  alternatives:
  - with muddy clay
  - with clay
  lexicon: HALOT
  rationale: טִינָא adds the nuance of mud/wet clay to חֲסַף. Rendering both terms
    as 'clay mud' preserves the doubled material description, though somewhat unusual
    in English; it reflects the source's specificity better than reducing it to simply
    'clay'.
