id: DAN.2.14
reference: Daniel 2:14
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן דָּנִיֵּ֗אל הֲתִיב֙ עֵטָ֣א וּ/טְעֵ֔ם לְ/אַרְי֕וֹךְ רַב טַבָּחַיָּ֖/א
    דִּ֣י מַלְכָּ֑/א דִּ֚י נְפַ֣ק לְ/קַטָּלָ֔ה לְ/חַכִּימֵ֖י בָּבֶֽל־׃
translation:
  text: Then Daniel answered Arioch, the chief of the king’s executioners, with prudent
    counsel and discretion—the one who had gone out to kill the wise men of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the captain of the king’s guard.' The Aramaic title is literally 'chief
      of the slaughterers,' which in royal context can denote executioners or the
      royal guard.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: הֲתִיב
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: HALOT
  rationale: In Biblical Aramaic this verb commonly introduces a verbal response.
    'Answered' fits the idiom and keeps a slightly formal narrative tone.
- source_word: עֵטָא
  chosen: counsel
  alternatives:
  - advice
  lexicon: HALOT
  rationale: The noun denotes counsel/advice. 'Counsel' better matches the elevated
    court setting and pairs well with the following noun.
- source_word: וּטְעֵם
  chosen: discretion
  alternatives:
  - prudence
  - judgment
  - reason
  lexicon: HALOT
  rationale: The term conveys judgment, discernment, or tact. Rendered as 'discretion'
    to express Daniel's measured wisdom in speech.
- source_word: עֵטָא וּטְעֵם
  chosen: with prudent counsel and discretion
  alternatives:
  - with counsel and discretion
  - with wise and tactful words
  lexicon: HALOT
  rationale: The pair is somewhat idiomatic, describing the quality of Daniel's response.
    'With prudent counsel and discretion' preserves both nouns while reading naturally
    in English. 'Prudent' is supplied to bring out the wise nuance implicit in the
    phrase without collapsing the two terms into one.
- source_word: לְאַרְיוֹךְ
  chosen: Arioch
  rationale: Personal name is transliterated per translation philosophy.
- source_word: רַב טַבָּחַיָּא
  chosen: the chief of the king’s executioners
  alternatives:
  - the captain of the king's guard
  - the chief butcher/slaughterer of the king
  lexicon: HALOT
  rationale: The title literally involves those who slaughter, but in royal context
    it refers to officials charged with executions/bodyguard functions. Because the
    immediate context is the killing of the wise men, 'executioners' best fits the
    plain sense here. 'Chief' renders רַב as the head over this group.
- source_word: דִּי מַלְכָּא
  chosen: of the king’s
  alternatives:
  - belonging to the king
  - of the king
  lexicon: HALOT
  rationale: Genitival relation linking Arioch's office to the king; rendered idiomatically
    in English as possessive.
- source_word: דִּי נְפַק
  chosen: who had gone out
  alternatives:
  - who went out
  - who had set out
  lexicon: HALOT
  rationale: 'Relative clause describing Arioch. English past perfect fits the sequence
    from the prior verse: he had already gone out on the king''s order before Daniel
    addressed him.'
- source_word: לְקַטָּלָה
  chosen: to kill
  alternatives:
  - to execute
  - for killing
  lexicon: HALOT
  rationale: Infinitival purpose of Arioch's going out. 'Kill' is direct and matches
    the severity of the decree; 'execute' is possible but slightly more interpretive.
- source_word: לְחַכִּימֵי בָּבֶל
  chosen: the wise men of Babylon
  alternatives:
  - Babylon's wise men
  lexicon: HALOT
  rationale: Standard court designation in Daniel; straightforward genitival rendering.
