theological_decisions:
- issue: Whether סְגִד toward Daniel should be rendered as 'worshiped' or with a less
    theologically loaded term
  chosen_reading: paid homage
  alternative_readings:
  - worshiped
  - bowed down before
  rationale: To avoid implying that Daniel is being identified as divine, the translation
    preserves the act of prostration/reverence without resolving it into explicit
    divine worship. The narrative can describe royal obeisance to a human agent of
    revelation. This preserves theological tension rather than importing a stronger
    doctrinal conclusion than the Aramaic requires.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
