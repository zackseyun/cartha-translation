id: DAN.2.46
reference: Daniel 2:46
source:
  edition: WLC
  text: בֵּ֠/אדַיִן מַלְכָּ֤/א נְבֽוּכַדְנֶצַּר֙ נְפַ֣ל עַל אַנְפּ֔וֹ/הִי וּ/לְ/דָנִיֵּ֖אל
    סְגִ֑ד וּ/מִנְחָה֙ וְ/נִ֣יחֹחִ֔ין אֲמַ֖ר לְ/נַסָּ֥כָה לֵֽ/הּ־׃
translation:
  text: Then King Nebuchadnezzar fell on his face and paid homage to Daniel, and he
    ordered that an offering and incense be presented to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped Daniel' or 'bowed down before Daniel.' The Aramaic verb can
      denote prostration or reverential homage; here 'paid homage' avoids overstating
      the act as divine worship while preserving the king's extreme reverence.
    reason: alternative_reading
  - marker: b
    text: The verb behind 'be presented' more specifically suggests pouring out a
      libation for him.
    reason: lexical_alternative
  - marker: c
    text: Or 'pleasing aromas'/'sweet odors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: מַלְכָּא נְבוּכַדְנֶצַּר
  chosen: King Nebuchadnezzar
  alternatives:
  - the king, Nebuchadnezzar
  lexicon: HALOT
  rationale: Construct-like apposition is idiomatically rendered as title plus name
    in English.
- source_word: נְפַל עַל אַנְפּוֹהִי
  chosen: fell on his face
  alternatives:
  - fell upon his face
  - prostrated himself
  lexicon: HALOT
  rationale: The idiom is physically vivid and should be preserved rather than flattened;
    'fell on his face' is clear modern English.
- source_word: סְגִד
  chosen: paid homage
  alternatives:
  - worshiped
  - bowed down
  lexicon: HALOT
  rationale: The Aramaic verb can denote prostration or reverential homage. Because
    the object is Daniel, 'worshiped' could overstate the act as divine worship in
    English, while 'paid homage' preserves the courtly/reverential sense without importing
    a stronger theological claim than the text requires.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - a gift
  - a grain offering
  - tribute
  lexicon: HALOT
  rationale: Broad sacrificial/present term. In this courtly-religious context, 'offering'
    best preserves the cultic nuance without over-specifying the type.
- source_word: נִיחֹחִין
  chosen: incense
  alternatives:
  - pleasing aromas
  - sweet odors
  lexicon: HALOT
  rationale: In context with נסך and מִנְחָה, the plural noun refers to soothing/pleasing
    aromas associated with sacrificial presentation. 'Incense' is the most idiomatic
    concise rendering in English, though more literally it evokes pleasing aromas.
- source_word: אֲמַר לְנַסָּכָה לֵהּ
  chosen: he ordered that ... be presented to him
  alternatives:
  - he said to pour out for him
  - he commanded that they offer to him
  - he ordered a libation to be poured out to him
  lexicon: HALOT
  rationale: 'The construction is idiomatic: ''said/ordered to pour out for him.''
    English prefers an explicit command sense here. ''Be presented to him'' smoothly
    covers the offering language of the whole clause, though the underlying verb specifically
    suggests pouring out/libation.'
