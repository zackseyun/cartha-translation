id: DAN.2.26
reference: Daniel 2:26
source:
  edition: WLC
  text: עָנֵ֤ה מַלְכָּ/א֙ וְ/אָמַ֣ר לְ/דָנִיֵּ֔אל דִּ֥י שְׁמֵ֖/הּ בֵּלְטְשַׁאצַּ֑ר
    ה/איתי/ך כָּהֵ֗ל לְ/הוֹדָעֻתַ֛/נִי חֶלְמָ֥/א דִֽי חֲזֵ֖ית וּ/פִשְׁרֵֽ/הּ־׃
translation:
  text: The king answered and said to Daniel, whose name was Belteshazzar, “Are you
    able to make known to me the dream that I saw, and its interpretation?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עָנֵה
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Common Aramaic narrative verb introducing a reply. 'Answered' preserves
    the idiomatic biblical narrative pairing with the following 'said.'
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined form in Aramaic; 'the king' is the natural English equivalent
    in this narrative context.
- source_word: וְאָמַר
  chosen: and said
  alternatives:
  - and spoke
  lexicon: HALOT
  rationale: Standard narrative collocation with ענה. Retaining both verbs ('answered
    and said') reflects the source rather than collapsing them.
- source_word: לְדָנִיֵּאל
  chosen: to Daniel
  lexicon: HALOT
  rationale: Direct indirect-object marking with personal name; straightforward transliteration
    of the name per translation philosophy.
- source_word: דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  chosen: whose name was Belteshazzar
  alternatives:
  - who was named Belteshazzar
  - whose name is Belteshazzar
  lexicon: HALOT
  rationale: The relative particle plus 'his name' idiom is most naturally rendered
    in English as a relative clause. Past tense 'was' fits the narrative frame.
- source_word: הֲאִיתָךְ
  chosen: Are you
  alternatives:
  - Is it the case that you are
  lexicon: HALOT
  rationale: Interrogative particle plus pronoun yields a direct question addressed
    to Daniel.
- source_word: כָּהֵל
  chosen: able
  alternatives:
  - competent
  - capable
  lexicon: HALOT
  rationale: Conveys capability or power to do something. 'Able' is idiomatic and
    sufficiently broad.
- source_word: לְהוֹדָעֻתַנִי
  chosen: to make known to me
  alternatives:
  - to tell me
  - to inform me
  lexicon: HALOT
  rationale: Causative form of ידע in Aramaic means 'cause to know, make known.' 'Make
    known to me' preserves the causative nuance better than the simpler 'tell me.'
- source_word: חֶלְמָא
  chosen: the dream
  lexicon: HALOT
  rationale: Determined noun; refers to the specific dream under discussion.
- source_word: דִּי חֲזֵית
  chosen: that I saw
  alternatives:
  - which I saw
  - that I had seen
  lexicon: HALOT
  rationale: Relative clause modifying 'dream.' Simple past is natural in English
    and adequate for the narrative sequence.
- source_word: וּפִשְׁרֵהּ
  chosen: and its interpretation
  alternatives:
  - and its meaning
  lexicon: HALOT
  rationale: פשר in Daniel regularly denotes the interpretation of a dream or mystery.
    'Interpretation' preserves the technical sense better than the broader 'meaning.'
