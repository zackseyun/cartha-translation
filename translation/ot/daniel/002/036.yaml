id: DAN.2.36
reference: Daniel 2:36
source:
  edition: WLC
  text: דְּנָ֣ה חֶלְמָ֔/א וּ/פִשְׁרֵ֖/הּ נֵאמַ֥ר קֳדָם מַלְכָּֽ/א־׃
translation:
  text: This was the dream, and we will tell its interpretation before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the dream; now we will tell its interpretation before the king.'
      The Aramaic can be rendered with slightly different English punctuation and
      aspect without changing the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Aramaic demonstrative referring back to the dream just recounted. Rendered
    simply as 'This' to introduce the summary statement naturally in English.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - dream
  lexicon: HALOT
  rationale: Definite noun in Aramaic; 'the dream' fits the specific dream Nebuchadnezzar
    saw and that Daniel has just described.
- source_word: וּפִשְׁרֵהּ
  chosen: and its interpretation
  alternatives:
  - and its meaning
  - and its explanation
  lexicon: HALOT
  rationale: פִשְׁרָא denotes interpretation or explanation, especially of dreams
    and mysteries in Daniel. 'Interpretation' preserves the technical sense in context;
    suffix rendered as 'its' referring to the dream.
- source_word: נֵאמַר
  chosen: we will tell
  alternatives:
  - we will say
  - let us tell
  - we shall declare
  lexicon: HALOT
  rationale: First person plural imperfect of אמר in Biblical Aramaic. In context
    Daniel announces what he and his companions, or Daniel as representative of them,
    are about to present to the king. 'Tell' is idiomatic in English for reporting
    an interpretation, while preserving the future sense.
- source_word: קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  - to
  lexicon: HALOT
  rationale: Preposition meaning 'before' or 'in the presence of.' 'Before the king'
    is the most natural concise rendering and preserves the court setting.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - King Nebuchadnezzar
  lexicon: HALOT
  rationale: Definite noun; rendered 'the king' because the referent is obvious in
    context and the source text does not repeat the personal name.
