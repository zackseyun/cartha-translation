id: DAN.2.25
reference: Daniel 2:25
source:
  edition: WLC
  text: אֱדַ֤יִן אַרְיוֹךְ֙ בְּ/הִתְבְּהָלָ֔ה הַנְעֵ֥ל לְ/דָנִיֵּ֖אל קֳדָ֣ם מַלְכָּ֑/א
    וְ/כֵ֣ן אֲמַר לֵ֗/הּ דִּֽי הַשְׁכַּ֤חַת גְּבַר֙ מִן בְּנֵ֤י גָֽלוּתָ/א֙ דִּ֣י
    יְה֔וּד דִּ֥י פִשְׁרָ֖/א לְ/מַלְכָּ֥/א יְהוֹדַֽע־־־׃
translation:
  text: Then Arioch hurriedly brought Daniel before the king and said to him, “I have
    found a man from among the exiles of Judah who will make the interpretation known
    to the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the Jews” or “Judean.” The Aramaic identifies Daniel as belonging
      to the people of Judah in exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: בְּהִתְבְּהָלָה
  chosen: hurriedly
  alternatives:
  - in haste
  - with alarm
  lexicon: HALOT
  rationale: The form conveys haste/urgency. 'Hurriedly' fits the immediate narrative
    context of Arioch quickly bringing Daniel in. 'With alarm' is possible etymologically
    but less likely here than simple haste.
- source_word: הַנְעֵל
  chosen: brought
  alternatives:
  - led up
  - brought in
  lexicon: HALOT
  rationale: The causative verb means to bring/lead in. 'Brought' is idiomatic with
    'before the king' and captures the action without over-specifying motion.
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - into the presence of the king
  - in front of the king
  lexicon: HALOT
  rationale: Standard courtly idiom for appearing in royal presence. 'Before the king'
    is concise and natural.
- source_word: וְכֵן אֲמַר לֵהּ
  chosen: and said to him
  alternatives:
  - and thus said to him
  - and spoke to him as follows
  lexicon: HALOT
  rationale: The phrase introduces direct speech. English normally omits the more
    wooden 'thus' unless emphasis is needed.
- source_word: הַשְׁכַּחַת
  chosen: I have found
  alternatives:
  - I found
  - I have discovered
  lexicon: HALOT
  rationale: Perfect first person singular in context naturally renders as present
    perfect in English, highlighting Arioch's report of a completed successful search
    with present relevance.
- source_word: גְּבַר
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The noun specifically denotes a man/male person. Per translation philosophy,
    gender-accurate rendering is preferred over neutralizing.
- source_word: מִן בְּנֵי גָלוּתָא
  chosen: from among the exiles
  alternatives:
  - from the sons of the exile
  - from among the captives
  lexicon: HALOT
  rationale: Idiomatic expression for those in deportation/exile. 'From among the
    exiles' preserves the collective sense while avoiding overly wooden phrasing.
- source_word: דִּי יְהוּד
  chosen: of Judah
  alternatives:
  - of the Jews
  - Judean
  lexicon: HALOT
  rationale: In the exilic setting, the phrase identifies origin/peoplehood tied to
    Judah. 'Of Judah' is a transparent rendering of the gentilic/genitival expression
    and avoids importing later ethnic nuances of 'Jewish' where the immediate referent
    is Judean exiles.
- source_word: פִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the explanation
  lexicon: HALOT
  rationale: In Daniel, this term is a key technical word for the interpretation of
    dreams/mysteries. 'Interpretation' preserves that recurring Danielic usage better
    than the broader 'explanation'.
- source_word: יְהוֹדַע
  chosen: will make ... known
  alternatives:
  - will reveal
  - will tell
  lexicon: HALOT
  rationale: The causative verb means to make known/inform. 'Will make the interpretation
    known to the king' is both accurate and suitably formal for court speech; 'reveal'
    could overstate the lexical sense here.
