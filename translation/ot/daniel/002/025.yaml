theological_decisions:
- issue: Ethnic designation דִּי יְהוּד
  chosen_reading: of Judah
  alternative_readings:
  - of the Jews
  - Judean
  rationale: This is primarily a historical-ethnic designation in an exilic court
    narrative, not a doctrinally charged term. 'Of Judah' stays close to the Aramaic
    and the exile context, while alternatives are preserved because English readers
    may expect 'Jewish' or 'Judean.'
  doctrine_reference: Translation philosophy §1, §4, §5
