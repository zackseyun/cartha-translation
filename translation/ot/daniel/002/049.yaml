id: DAN.2.49
reference: Daniel 2:49
source:
  edition: WLC
  text: וְ/דָנִיֵּאל֙ בְּעָ֣א מִן מַלְכָּ֔/א וּ/מַנִּ֗י עַ֤ל עֲבִֽידְתָּ/א֙ דִּ֚י
    מְדִינַ֣ת בָּבֶ֔ל לְ/שַׁדְרַ֥ךְ מֵישַׁ֖ךְ וַ/עֲבֵ֣ד נְג֑וֹ וְ/דָנִיֵּ֖אל בִּ/תְרַ֥ע
    מַלְכָּֽ/א־׃פ
translation:
  text: And Daniel requested of the king, and he appointed Shadrach, Meshach, and
    Abed-nego over the administration of the province of Babylon. But Daniel remained
    at the king’s court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “at the king’s gate.” The phrase likely refers to Daniel’s place
      in the royal court or administrative presence before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָא
  chosen: requested
  alternatives:
  - asked
  - petitioned
  lexicon: HALOT
  rationale: The Aramaic verb means to ask or request. 'Requested' fits the court
    setting and preserves the formal sense of Daniel making a petition to the king
    without overstating it as a legal petition.
- source_word: מִן מַלְכָּא
  chosen: of the king
  alternatives:
  - from the king
  lexicon: HALOT
  rationale: With verbs of asking, English idiom prefers 'requested of the king' or
    'asked the king.' 'Of the king' preserves the source preposition more transparently
    while remaining natural enough in context.
- source_word: וּמַנִּי
  chosen: he appointed
  alternatives:
  - he set
  - he assigned
  lexicon: HALOT
  rationale: The verb denotes placing or appointing. The subject is naturally the
    king from context, since Daniel makes the request and the king responds. 'Appointed'
    best matches an official administrative action.
- source_word: עַל עֲבִידְתָּא
  chosen: over the administration
  alternatives:
  - over the affairs
  - over the work
  - in charge of the service
  lexicon: HALOT
  rationale: The noun refers broadly to work, service, or administration. In this
    governmental context, 'administration' best conveys official oversight rather
    than manual labor or generic activity.
- source_word: דִּי מְדִינַת בָּבֶל
  chosen: of the province of Babylon
  alternatives:
  - of Babylon province
  - of the state of Babylon
  lexicon: HALOT
  rationale: מְדִינָה in Imperial Aramaic commonly refers to an administrative province.
    'Province of Babylon' is the clearest natural English rendering.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  chosen: Shadrach, Meshach, and Abed-nego
  rationale: These are standard English transliterations of the personal names. The
    prefixed ל marks the persons to whom the appointments were given.
- source_word: בִּתְרַע מַלְכָּא
  chosen: at the king’s court
  alternatives:
  - in the king’s gate
  - at the gate of the king
  lexicon: HALOT
  rationale: Literally 'in/at the gate of the king.' In ancient Near Eastern court
    language, 'the gate' can denote the place of royal administration and access.
    'At the king’s court' communicates the idiomatic sense for modern readers, while
    the more literal alternative is worth preserving in a footnote.
- source_word: וְדָנִיֵּאל
  chosen: But Daniel
  alternatives:
  - And Daniel
  rationale: 'The repeated conjunction marks a contrast in sense: Daniel''s friends
    were appointed over provincial administration, whereas Daniel himself remained
    in the royal sphere. ''But'' brings out that discourse contrast in natural English.'
- source_word: implicit subject of וּמַנִּי
  chosen: he
  alternatives:
  - the king
  rationale: The verb is third masculine singular with no explicit subject. Context
    makes the king the actor. Using 'he' keeps the translation close to the source
    while allowing the antecedent to be inferred from the previous clause.
