id: DAN.2.4
reference: Daniel 2:4
source:
  edition: WLC
  text: וַֽ/יְדַבְּר֧וּ הַ/כַּשְׂדִּ֛ים לַ/מֶּ֖לֶךְ אֲרָמִ֑ית מַלְכָּ/א֙ לְ/עָלְמִ֣ין
    חֱיִ֔י אֱמַ֥ר חֶלְמָ֛/א ל/עבדי/ך וּ/פִשְׁרָ֥/א נְחַוֵּֽא׃
translation:
  text: 'Then the Chaldeans spoke to the king in Aramaic: “O king, live forever! Tell
    the dream to your servants, and we will show the interpretation.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic begins here and continues through Daniel 7:28.
    reason: cross_reference
  - marker: b
    text: Or “may you live forever.”
    reason: lexical_alternative
  - marker: c
    text: Or “we will make known the interpretation.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the astrologers
  lexicon: HALOT
  rationale: The noun denotes the Chaldeans as a class/group in the Babylonian court.
    Although in context it can refer to a guild of wise men, the lexical form is ethnic/title-like,
    so 'the Chaldeans' is retained rather than interpreted more dynamically.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - addressing the king
  lexicon: HALOT
  rationale: Directly reflects the prepositional phrase marking the addressee.
- source_word: אֲרָמִית
  chosen: in Aramaic
  alternatives:
  - in the Aramaic language
  lexicon: HALOT
  rationale: This adverbial marker signals the language of the speech and also marks
    the transition to the Aramaic section of Daniel. 'In Aramaic' is concise and accurate.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - King
  lexicon: HALOT
  rationale: Vocative address is best represented idiomatically in English with 'O
    king,' preserving the courtly tone.
- source_word: לְעָלְמִין חֱיִי
  chosen: live forever
  alternatives:
  - may you live forever
  lexicon: HALOT
  rationale: A conventional royal acclamation. English idiom normally omits the explicit
    optative auxiliary, though the sense is jussive/wish-like. The exclamation preserves
    the formulaic court style.
- source_word: אֱמַר
  chosen: Tell
  alternatives:
  - Say
  - Declare
  lexicon: HALOT
  rationale: In context the king is being asked to relate the content of the dream.
    'Tell' is the most natural English imperative for reporting a dream.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - your dream
  lexicon: HALOT
  rationale: The emphatic/determined form is adequately rendered as 'the dream.' English
    does not require the possessive because the context already identifies it as the
    king's dream.
- source_word: לְעַבְדָךְ
  chosen: to your servants
  alternatives:
  - to your slaves
  lexicon: HALOT
  rationale: In royal court address, the self-designation 'your servants' is the conventional
    deferential rendering. Although the underlying term can denote bonded service,
    here the courtly idiom rather than legal status is foregrounded.
- source_word: וּפִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the meaning
  - the explanation
  lexicon: HALOT
  rationale: In Daniel this term is a technical word for the interpretation of dreams
    and visions. 'Interpretation' preserves that recurring nuance better than the
    broader 'meaning' or 'explanation.'
- source_word: נְחַוֵּא
  chosen: we will show
  alternatives:
  - we will make known
  - we will declare
  lexicon: HALOT
  rationale: The verb means to show or make known. 'We will show' is a natural rendering
    and echoes the court's promise to present the interpretation.
