id: DAN.2.42
reference: Daniel 2:42
source:
  edition: WLC
  text: וְ/אֶצְבְּעָת֙ רַגְלַיָּ֔/א מנ/הון פַּרְזֶ֖ל ו/מנ/הון חֲסַ֑ף מִן קְצָ֤ת מַלְכוּתָ/א֙
    תֶּהֱוֵ֣ה תַקִּיפָ֔ה וּ/מִנַּ֖/הּ תֶּהֱוֵ֥ה תְבִירָֽה־׃
translation:
  text: And as the toes of the feet were partly iron and partly clay, so part of the
    kingdom will be strong, and part of it will be brittle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clay pottery' / 'earthenware' for the Aramaic term rendered 'clay.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fragile' or 'breakable' for 'brittle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶצְבְּעָת רַגְלַיָּא
  chosen: the toes of the feet
  alternatives:
  - the toes of the feet thereof
  - the toes of its feet
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'the toes of the feet.' In English,
    'toes' already implies feet, but retaining 'of the feet' preserves the image and
    the formal linkage to the statue vision.
- source_word: מנ/הון ... ו/מנ/הון
  chosen: partly ... and partly
  alternatives:
  - some ... and some
  - from them ... and from them
  lexicon: HALOT
  rationale: The repeated preposition with pronominal suffix literally means 'from
    them,' idiomatically indicating composition by parts. 'Partly ... and partly'
    is natural English and accurately conveys mixed composition.
- source_word: פַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal in the statue imagery.
- source_word: חֲסַף
  chosen: clay
  alternatives:
  - pottery
  - earthenware
  lexicon: HALOT
  rationale: In Daniel 2 this Aramaic term refers to ceramic/clay material. 'Clay'
    fits the immediate contrast with iron and matches the imagery already established
    in the chapter; 'pottery' is a viable alternative but slightly less natural here.
- source_word: מִן קְצָת
  chosen: part
  alternatives:
  - partly
  - in part
  - some of
  lexicon: HALOT
  rationale: The phrase marks a partial aspect of the kingdom. Rendering it as 'part'
    preserves the distributive sense that one portion has one quality and another
    portion another quality.
- source_word: מַלְכוּתָא
  chosen: the kingdom
  alternatives:
  - the kingdom realm
  - the royal dominion
  lexicon: HALOT
  rationale: The noun denotes the kingdom represented by the feet and toes in Nebuchadnezzar's
    dream. 'Kingdom' is the standard and contextually clear rendering.
- source_word: תֶּהֱוֵה
  chosen: will be
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: The verb 'to be' here predicts the future state of the kingdom. 'Will
    be' is clear modern English.
- source_word: תַקִּיפָה
  chosen: strong
  alternatives:
  - mighty
  - firm
  lexicon: HALOT
  rationale: The adjective denotes strength or firmness. 'Strong' is the most straightforward
    English equivalent in the iron/clay contrast.
- source_word: וּ/מִנַּהּ
  chosen: and part of it
  alternatives:
  - and from it
  - and some of it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to 'kingdom.' 'Part of it' makes
    the distributive contrast explicit in idiomatic English.
- source_word: תְבִירָה
  chosen: brittle
  alternatives:
  - fragile
  - broken
  - breakable
  lexicon: HALOT
  rationale: The adjective conveys brokenness or brittleness. In context, the contrast
    is not that the kingdom is already broken, but that one part is structurally weak
    and liable to fracture. 'Brittle' best matches the iron/clay imagery.
