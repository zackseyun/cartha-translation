theological_decisions:
- issue: Comparative sense of ארעא מִנָּךְ
  chosen_reading: inferior to yours
  alternative_readings:
  - lower than you
  - earthward from you
  rationale: The phrase is syntactically unusual, but the broader vision interprets
    successive kingdoms through diminishing metals in splendor/value. Rendering it
    as inferiority best fits the immediate and larger context without importing later
    historical identification into the translation.
