id: DAN.2.39
reference: Daniel 2:39
source:
  edition: WLC
  text: וּ/בָתְרָ֗/ךְ תְּק֛וּם מַלְכ֥וּ אָחֳרִ֖י ארע/א מִנָּ֑/ךְ וּ/מַלְכ֨וּ תליתיא
    אָחֳרִי֙ דִּ֣י נְחָשָׁ֔/א דִּ֥י תִשְׁלַ֖ט בְּ/כָל אַרְעָֽ/א־׃
translation:
  text: And after you another kingdom, inferior to yours, will arise; and yet a third
    kingdom, of bronze, which will rule over all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lower than you.' The Aramaic expression is difficult; the sense is that
      the next kingdom is less than Nebuchadnezzar's kingdom in rank or splendor.
    reason: lexical_alternative
  - marker: b
    text: Or 'over the whole land.' The term can mean either 'earth' or 'land,' but
      here likely refers to broad imperial dominion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָתְרָךְ
  chosen: And after you
  alternatives:
  - And after you there will arise
  - After you
  lexicon: HALOT
  rationale: The prepositional phrase marks succession in time after Nebuchadnezzar.
    'After you' is the plain sense; the conjunction is retained as 'And' for discourse
    continuity.
- source_word: תְּקוּם
  chosen: will arise
  alternatives:
  - will stand up
  - will come to power
  lexicon: HALOT
  rationale: The verb commonly means 'arise/stand up.' In kingdom succession context,
    'will arise' is natural English and preserves the imagery of emergence without
    over-interpreting.
- source_word: מַלְכוּ
  chosen: kingdom
  alternatives:
  - reign
  - royal dominion
  lexicon: HALOT
  rationale: Here the noun refers to a political realm or empire rather than merely
    the act of reigning. 'Kingdom' is the standard and clearest rendering in the statue-vision
    context.
- source_word: אָחֳרִי
  chosen: another
  alternatives:
  - subsequent
  - later
  lexicon: HALOT
  rationale: The adjective indicates a following kingdom distinct from the first.
    'Another' is idiomatic and sufficiently precise.
- source_word: ארעא מִנָּךְ
  chosen: inferior to yours
  alternatives:
  - lower than you
  - earthward from you
  lexicon: HALOT
  rationale: The Aramaic phrase is difficult, but in context it contrasts the next
    kingdom with Nebuchadnezzar's. Traditional and contextually strong sense is comparative
    inferiority, likely corresponding to the descending value of the metals in the
    dream. 'Inferior to yours' makes explicit that the comparison is to his kingdom,
    not his person in isolation.
- source_word: וּמַלְכוּ תליתיא
  chosen: and yet a third kingdom
  alternatives:
  - and a third kingdom
  - then a third kingdom
  lexicon: HALOT
  rationale: The conjunction continues the sequence. 'Yet' gives natural English progression
    without adding substantial meaning; the core sense is the arrival of a third kingdom.
- source_word: דִּי נְחָשָׁא
  chosen: of bronze
  alternatives:
  - which is bronze
  - made of bronze
  lexicon: HALOT
  rationale: The relative construction identifies the third kingdom with bronze, matching
    the statue imagery. 'Of bronze' is concise and natural.
- source_word: דִּי תִשְׁלַט
  chosen: which will rule
  alternatives:
  - which will have dominion
  - which will dominate
  lexicon: HALOT
  rationale: The verb denotes exercising dominion. 'Will rule' is readable modern
    English and preserves the political sense.
- source_word: בְּכָל אַרְעָא
  chosen: over all the earth
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: HALOT
  rationale: Aramaic אַרְעָא can mean 'earth' or 'land.' In the sweeping imperial
    context of Daniel 2, 'all the earth' best reflects the universalizing rhetoric
    of world empire.
