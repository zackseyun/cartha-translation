id: DAN.2.9
reference: Daniel 2:9
source:
  edition: WLC
  text: דִּ֣י הֵן חֶלְמָ/א֩ לָ֨א תְהֽוֹדְעֻנַּ֜/נִי חֲדָה הִ֣יא דָֽתְ/כ֗וֹן וּ/מִלָּ֨ה
    כִדְבָ֤ה וּ/שְׁחִיתָה֙ הזמנתון לְ/מֵאמַ֣ר קָֽדָמַ֔/י עַ֛ד דִּ֥י עִדָּנָ֖/א יִשְׁתַּנֵּ֑א
    לָהֵ֗ן חֶלְמָ/א֙ אֱמַ֣רוּ לִ֔/י וְֽ/אִנְדַּ֕ע דִּ֥י פִשְׁרֵ֖/הּ תְּהַחֲוֻנַּֽ/נִי־־׃
translation:
  text: But if you do not make the dream known to me, there is only one decree for
    you, for you have agreed to speak lying and corrupt words before me until the
    time changes. Therefore tell me the dream, and I will know that you can make its
    interpretation known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is one sentence for you' or 'there is one law for you.' The Aramaic
      דָּת can denote a decree, law, or judicial sentence in royal-court context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have prepared' or 'you have arranged' to speak false and corrupt
      words before me. The verb suggests deliberate preparation; 'agreed' brings out
      the collective sense in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'until the times change.' The singular 'time' is retained in the main
      text as the closer rendering of the Aramaic form.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּי הֵן
  chosen: But if
  alternatives:
  - for if
  - indeed if
  lexicon: HALOT
  rationale: Introduces a conditional clause with emphatic force. 'But if' fits the
    adversative connection to the previous verse while preserving the condition.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - a dream
  lexicon: HALOT
  rationale: The king refers to the specific dream already under discussion, so the
    definite rendering is appropriate.
- source_word: לָא תְהוֹדְעֻנַּנִי
  chosen: you do not make known to me
  alternatives:
  - you do not tell me
  - you do not inform me
  lexicon: HALOT
  rationale: The Haphil of ידע means 'make known' or 'inform.' 'Make known to me'
    preserves the causative nuance more closely than the simpler 'tell me,' though
    'tell me' appears later for smoother English in the imperative.
- source_word: חֲדָה הִיא דָתְכוֹן
  chosen: there is only one decree for you
  alternatives:
  - your decree is one
  - there is one law for you
  - there is one sentence for you
  lexicon: HALOT
  rationale: דָּת in this court setting refers to an official ruling or decree. The
    phrase means that a single verdict applies to all of them. 'Decree' is retained
    as the most natural formal equivalent in context.
- source_word: וּמִלָּה כִדְבָה וּשְׁחִיתָה
  chosen: lying and corrupt words
  alternatives:
  - false and wicked speech
  - deceitful and perverse words
  lexicon: HALOT
  rationale: מִלָּה is 'word/matter'; כִדְבָה denotes falsehood or lying; שְׁחִיתָה
    conveys corruption or ruinous distortion. 'Lying and corrupt words' preserves
    both descriptors without over-paraphrase.
- source_word: הזמנתון
  chosen: you have agreed
  alternatives:
  - you have prepared
  - you have arranged
  lexicon: HALOT
  rationale: The verb conveys arranging or making ready. In context the sense is conspiratorial
    preparation of a response, so 'you have agreed' brings out the collective intentionality
    implied by the accusation.
- source_word: לְמֵאמַר קָדָמַי
  chosen: to speak before me
  alternatives:
  - to say before me
  - to utter in my presence
  lexicon: HALOT
  rationale: Infinitive of אמר with 'before me' indicates the content they are prepared
    to present in the king's presence. 'Speak before me' is idiomatic and sufficiently
    close.
- source_word: עַד דִּי עִדָּנָא יִשְׁתַּנֵּא
  chosen: until the time changes
  alternatives:
  - until the times change
  - until circumstances change
  lexicon: HALOT
  rationale: עִדָּן can mean time or appointed time. Singular 'the time' matches the
    Aramaic form and suits the king's accusation that they are stalling for a change
    in circumstances.
- source_word: לָהֵן
  chosen: Therefore
  alternatives:
  - therefore then
  - so
  lexicon: HALOT
  rationale: Draws an inference from the preceding accusation. 'Therefore' preserves
    the formal logical connection.
- source_word: אֱמַרוּ לִי
  chosen: tell me
  alternatives:
  - say to me
  lexicon: HALOT
  rationale: Imperative of אמר. 'Tell me' is the natural English command in this context.
- source_word: וְאִנְדַּע
  chosen: and I will know
  alternatives:
  - so that I may know
  lexicon: HALOT
  rationale: A straightforward first-person imperfect/consecutive expressing the result
    the king expects. 'And I will know' is formally closer than making it explicitly
    purposive.
- source_word: פִשְׁרֵהּ
  chosen: its interpretation
  alternatives:
  - its meaning
  lexicon: HALOT
  rationale: In Daniel, פשר is a technical term for the interpretation of a dream
    or mystery. 'Interpretation' preserves that recurring terminology.
- source_word: תְּהַחֲוֻנַּנִי
  chosen: you can make known to me
  alternatives:
  - you will make known to me
  - you are able to tell me
  lexicon: HALOT
  rationale: The form again uses the causative of ידע with first-person object. In
    context the king is testing their ability, so English idiom is best captured by
    'you can make known to me,' expressing demonstrated capability.
