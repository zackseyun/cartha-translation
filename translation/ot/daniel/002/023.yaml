id: DAN.2.23
reference: Daniel 2:23
source:
  edition: WLC
  text: לָ֣/ךְ אֱלָ֣הּ אֲבָהָתִ֗/י מְהוֹדֵ֤א וּ/מְשַׁבַּח֙ אֲנָ֔ה דִּ֧י חָכְמְתָ֛/א
    וּ/גְבוּרְתָ֖/א יְהַ֣בְתְּ לִ֑/י וּ/כְעַ֤ן הֽוֹדַעְתַּ֨/נִי֙ דִּֽי בְעֵ֣ינָא מִנָּ֔/ךְ
    דִּֽי מִלַּ֥ת מַלְכָּ֖/א הוֹדַעְתֶּֽ/נָא׀־־׃
translation:
  text: To you, O God of my fathers, I give thanks and praise, because you have given
    me wisdom and might, and now you have made known to me what we asked from you,
    for you have made known to us the king’s matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God of my ancestors.' The Aramaic is literally 'God of my fathers,'
      a covenantal expression linking Daniel to those before him.
    reason: lexical_alternative
  - marker: b
    text: Or 'what we sought from you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s word' or 'the king’s affair.' The Aramaic term is broad and
      refers to the matter the king had set forth.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלָהּ אֲבָהָתִי
  chosen: O God of my fathers
  alternatives:
  - God of my ancestors
  lexicon: HALOT
  rationale: אֱלָהּ is 'God' in Aramaic; אֲבָהָתִי is literally 'my fathers.' 'God
    of my fathers' preserves the covenantal and familial continuity of the expression.
    'Ancestors' is possible in modern English, but 'fathers' better reflects the source
    and biblical idiom.
- source_word: מְהוֹדֵא וּמְשַׁבַּח אֲנָה
  chosen: I give thanks and praise
  alternatives:
  - I thank and praise
  - I am thanking and praising
  lexicon: HALOT
  rationale: The paired participles function verbally with emphatic first-person pronoun
    אֲנָה. 'I give thanks and praise' is natural English that preserves the two coordinated
    acts without flattening them into one.
- source_word: דִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here דִּי introduces the reason for Daniel's thanksgiving. 'Because'
    communicates the causal force clearly in modern English.
- source_word: חָכְמְתָא וּגְבוּרְתָא
  chosen: wisdom and might
  alternatives:
  - wisdom and power
  - wisdom and strength
  lexicon: HALOT
  rationale: חָכְמְתָא is straightforwardly 'wisdom.' גְבוּרְתָא can be 'might,' 'power,'
    or 'strength.' 'Might' fits the elevated tone and preserves the sense of divinely
    granted capability, not merely physical strength.
- source_word: יְהַבְתְּ לִי
  chosen: you have given me
  alternatives:
  - you gave me
  lexicon: HALOT
  rationale: The perfect is well represented by English present perfect in this prayer
    context, highlighting the completed gift with present relevance.
- source_word: וּכְעַן
  chosen: and now
  alternatives:
  - and at this time
  - now
  lexicon: HALOT
  rationale: This adverb marks the transition from God's prior gift to the immediate
    revelation. 'And now' is both accurate and idiomatic.
- source_word: הוֹדַעְתַּנִי
  chosen: you have made known to me
  alternatives:
  - you have revealed to me
  - you informed me
  lexicon: HALOT
  rationale: The causative verb from ידע means 'make known.' 'Revealed' is possible,
    but 'made known' stays closer to the lexical form and matches the repetition later
    in the verse.
- source_word: דִּי בְעֵינָא מִנָּךְ
  chosen: what we asked from you
  alternatives:
  - what we sought from you
  - that which we requested of you
  lexicon: HALOT
  rationale: בְעֵינָא is first person plural, 'we asked/sought.' Retaining 'we' is
    important because Daniel had prayed with his companions (2:17–18). 'Asked from
    you' is a clear rendering of the request language.
- source_word: מִלַּת מַלְכָּא
  chosen: the king’s matter
  alternatives:
  - the king's word
  - the king's affair
  - the king's matter and its interpretation
  lexicon: HALOT
  rationale: מִלָּה in Aramaic can mean 'word,' 'matter,' or 'thing.' Here it refers
    to the issue set by the king—his dream and its significance. 'Matter' is broad
    enough to preserve the source without over-specifying beyond the verse itself.
- source_word: הוֹדַעְתֶּנָא
  chosen: you have made known to us
  alternatives:
  - you made it known to us
  lexicon: HALOT
  rationale: 'The 1cp suffix must be preserved: God has made the matter known ''to
    us,'' not only to Daniel individually. This aligns with the earlier plural ''we
    asked'' and the communal context.'
