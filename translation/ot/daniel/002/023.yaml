theological_decisions:
- issue: Covenantal phrasing in address to God
  chosen_reading: O God of my fathers
  alternative_readings:
  - O God of my ancestors
  rationale: The phrase evokes continuity with Israel's covenant history. The translation
    preserves the traditional familial wording without importing extra theological
    claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Plural pronouns in the second half of the verse
  chosen_reading: what we asked from you ... you have made known to us
  alternative_readings:
  - what I asked from you ... you have made known to me
  rationale: The Aramaic explicitly shifts to first person plural in בְעֵינָא and
    הוֹדַעְתֶּנָא. Preserving the plural maintains the communal dimension of Daniel's
    prayer with his companions and avoids harmonizing the text to singular forms nearby.
  doctrine_reference: Translation philosophy §1, §5
