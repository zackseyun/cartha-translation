theological_decisions:
- issue: Daniel’s denial of personal superiority in receiving revelation
  chosen_reading: The verse states that the mystery was not revealed because Daniel
    possessed greater wisdom than all other living people.
  alternative_readings:
  - The verse could be read more loosely as denying wisdom in general without explicit
    comparison.
  rationale: The comparative phrase מִן כָּל חַיַּיָּא should be retained so the translation
    reflects Daniel’s explicit humility and the source of revelation in God rather
    than in human ability.
  doctrine_reference: Translation philosophy §1, §3
- issue: Anthropological language of 'heart'
  chosen_reading: Retain 'heart' rather than replacing it with 'mind.'
  alternative_readings:
  - mind
  rationale: Biblical 'heart' includes cognition and intention. Preserving 'heart'
    maintains the source-language anthropology and avoids importing a narrower modern
    psychological category.
  doctrine_reference: Translation philosophy §1, §6
