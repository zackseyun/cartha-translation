id: DAN.2.30
reference: Daniel 2:30
source:
  edition: WLC
  text: וַ/אֲנָ֗ה לָ֤א בְ/חָכְמָה֙ דִּֽי אִיתַ֥י בִּ/י֙ מִן כָּל חַיַּיָּ֔/א רָזָ֥/א
    דְנָ֖ה גֱּלִ֣י לִ֑/י לָהֵ֗ן עַל דִּבְרַת֙ דִּ֤י פִשְׁרָ/א֙ לְ/מַלְכָּ֣/א יְהוֹדְע֔וּן
    וְ/רַעְיוֹנֵ֥י לִבְבָ֖/ךְ תִּנְדַּֽע־־־־׃
translation:
  text: But as for me, this mystery has been revealed to me not because of wisdom
    that is in me more than in all the living, but so that the interpretation may
    be made known to the king, and that you may know the thoughts of your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this secret.' The Aramaic term can mean a hidden matter, but in Daniel
      it often carries the sense of a mystery disclosed by God.
    reason: lexical_alternative
  - marker: b
    text: Or 'the thoughts of your mind.' Literally, 'the thoughts of your heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנָה
  chosen: But as for me
  alternatives:
  - And as for me
  - But I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive topic shift
    from God’s revelation to Daniel’s role. 'But as for me' preserves the emphatic
    contrast naturally in English.
- source_word: לָא בְחָכְמָה דִּי אִיתַי בִּי
  chosen: not because of wisdom that is in me
  alternatives:
  - not through any wisdom in me
  - not by wisdom that I have
  lexicon: HALOT
  rationale: The preposition ב with חָכְמָה here expresses basis or cause. 'Because
    of wisdom that is in me' keeps Daniel’s denial that the revelation arose from
    his own superior insight.
- source_word: מִן כָּל חַיַּיָּא
  chosen: more than in all the living
  alternatives:
  - more than all living people
  - beyond all the living
  lexicon: HALOT
  rationale: The comparative use of מִן is preserved with 'more than.' חַיַּיָּא literally
    means 'the living'; in context it refers to living humans generally, but the more
    literal phrase is retained because it is clear in English and reflects the Aramaic
    wording.
- source_word: רָזָא דְנָה
  chosen: this mystery
  alternatives:
  - this secret
  lexicon: HALOT
  rationale: רָז in Daniel regularly refers to a hidden matter disclosed by divine
    revelation, especially Nebuchadnezzar’s dream and its meaning. 'Mystery' best
    preserves that revelatory sense in English.
- source_word: גֱּלִי לִי
  chosen: has been revealed to me
  alternatives:
  - was revealed to me
  - has been uncovered to me
  lexicon: HALOT
  rationale: 'The passive sense is clear: Daniel is the recipient, not the source,
    of disclosure. The English present perfect fits the explanatory discourse, though
    simple past would also be possible.'
- source_word: לָהֵן
  chosen: but so that
  alternatives:
  - therefore
  - for this reason
  lexicon: HALOT
  rationale: Here the particle introduces purpose/result in connection with the following
    clause. 'But so that' captures both the contrast with Daniel’s lack of personal
    wisdom and the purpose of the revelation.
- source_word: עַל דִּבְרַת דִּי
  chosen: so that
  alternatives:
  - for the sake that
  - for the reason that
  lexicon: HALOT
  rationale: This idiom introduces purpose. Rendering it idiomatically as 'so that'
    avoids awkwardness while preserving the clause’s function.
- source_word: פִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the explanation
  lexicon: HALOT
  rationale: In Daniel, פשר is the standard term for the interpretation of a dream
    or mystery. 'Interpretation' is the established and precise English equivalent.
- source_word: לְמַלְכָּא יְהוֹדְעוּן
  chosen: may be made known to the king
  alternatives:
  - may be known to the king
  - they may make known to the king
  lexicon: HALOT
  rationale: The plural verb is best taken as an impersonal/passive-like expression
    in context. English passive communicates the sense clearly without introducing
    an unspecified subject.
- source_word: וְרַעְיוֹנֵי לִבְבָךְ
  chosen: the thoughts of your heart
  alternatives:
  - the thoughts of your mind
  - the reflections of your heart
  lexicon: HALOT
  rationale: רַעְיוֹנִין/רַעְיוֹנֵי in Daniel refers to thoughts or mental reflections.
    לִבְבָךְ is literally 'your heart,' which in biblical usage includes the inner
    thought-life. 'Thoughts of your heart' preserves the Hebrew-Aramaic anthropology
    rather than flattening it to 'mind'.
- source_word: תִּנְדַּע
  chosen: you may know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: 'The imperfect here is well rendered as purpose: the revelation serves
    so that the king may know. ''May know'' fits the preceding purpose clause.'
