id: DAN.2.48
reference: Daniel 2:48
source:
  edition: WLC
  text: אֱדַ֨יִן מַלְכָּ֜/א לְ/דָנִיֵּ֣אל רַבִּ֗י וּ/מַתְּנָ֨ן רַבְרְבָ֤ן שַׂגִּיאָן֙
    יְהַב לֵ֔/הּ וְ/הַ֨שְׁלְטֵ֔/הּ עַ֖ל כָּל מְדִינַ֣ת בָּבֶ֑ל וְ/רַב סִגְנִ֔ין עַ֖ל
    כָּל חַכִּימֵ֥י בָבֶֽל־־־־׃
translation:
  text: Then the king made Daniel great and gave him many great gifts, and he made
    him ruler over the whole province of Babylon and chief prefect over all the wise
    men of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'promoted Daniel.' The Aramaic verb literally means 'made great' and
      in context refers to royal exaltation.
    reason: lexical_alternative
  - marker: b
    text: The title rendered 'chief prefect' refers to a high-ranking official set
      over other court officials or administrators.
    reason: cultural_note
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next action in narrative;
    'Then' is natural modern English and preserves the flow.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Definite emphatic form in Aramaic; standard rendering.
- source_word: לְדָנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated by standard English convention.
- source_word: רַבִּי
  chosen: made Daniel great
  alternatives:
  - promoted Daniel
  - magnified Daniel
  lexicon: HALOT
  rationale: From רבה 'to make great/become great.' In this court context it denotes
    exaltation/promotion. 'Made Daniel great' preserves the lexical sense while remaining
    idiomatic.
- source_word: וּמַתְּנָן רַבְרְבָן שַׂגִּיאָן
  chosen: and gave him many great gifts
  alternatives:
  - and gave him many abundant gifts
  - and gave him very great presents
  lexicon: HALOT
  rationale: מַתְּנָן means 'gifts/presents'; רַבְרְבָן and שַׂגִּיאָן are intensifying
    adjectives meaning great/many/abundant. 'Many great gifts' captures both quantity
    and impressiveness without over-paraphrase.
- source_word: יְהַב לֵהּ
  chosen: gave him
  lexicon: HALOT
  rationale: Simple verbal clause with indirect object suffix; straightforward rendering.
- source_word: וְהַשְׁלְטֵהּ
  chosen: and he made him ruler
  alternatives:
  - and appointed him to rule
  - and set him in authority
  lexicon: HALOT
  rationale: Causative of שלט, 'to cause to rule/have dominion.' 'Made him ruler'
    is concise and preserves the causative sense.
- source_word: עַל כָּל מְדִינַת בָּבֶל
  chosen: over the whole province of Babylon
  alternatives:
  - over all the province of Babylon
  - over the entire province of Babylon
  lexicon: HALOT
  rationale: מְדִינָה in imperial context is 'province.' כָּל with singular construct
    is naturally 'the whole province,' not multiple provinces.
- source_word: וְרַב סִגְנִין
  chosen: and chief prefect
  alternatives:
  - and chief administrator
  - and head of the prefects
  lexicon: HALOT
  rationale: רַב is 'chief/head'; סִגְנִין refers to officials/deputies/prefects.
    'Chief prefect' preserves the administrative title with minimal interpretation.
- source_word: עַל כָּל חַכִּימֵי בָבֶל
  chosen: over all the wise men of Babylon
  lexicon: HALOT
  rationale: Standard rendering of court sages/advisers in Daniel; 'wise men' is established
    and contextually accurate.
