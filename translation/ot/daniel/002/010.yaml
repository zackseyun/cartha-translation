id: DAN.2.10
reference: Daniel 2:10
source:
  edition: WLC
  text: עֲנ֨וֹ כשדי/א קֳדָם מַלְכָּ/א֙ וְ/אָ֣מְרִ֔ין לָֽא אִיתַ֤י אֲנָשׁ֙ עַל יַבֶּשְׁתָּ֔/א
    דִּ֚י מִלַּ֣ת מַלְכָּ֔/א יוּכַ֖ל לְ/הַחֲוָיָ֑ה כָּ/ל קֳבֵ֗ל דִּ֚י כָּל מֶ֨לֶךְ֙
    רַ֣ב וְ/שַׁלִּ֔יט מִלָּ֤ה כִ/דְנָה֙ לָ֣א שְׁאֵ֔ל לְ/כָל חַרְטֹּ֖ם וְ/אָשַׁ֥ף וְ/כַשְׂדָּֽי־־־־־־׃
translation:
  text: The Chaldeans answered before the king and said, “There is not a man on earth
    who can make known the king’s matter, because no great and powerful king has asked
    for a thing like this from any diviner-priest, enchanter, or Chaldean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the astrologers.” The Aramaic term “Chaldeans” can refer either to the
      ethnic group or to a class of Babylonian wise men in the royal court.
    reason: lexical_alternative
  - marker: b
    text: “Man” here is a representative singular meaning any human being.
    reason: lexical_alternative
  - marker: c
    text: Or “the king’s word” or “the king’s demand.”
    reason: lexical_alternative
  - marker: d
    text: Traditional renderings include “magician” for “diviner-priest.” The exact
      distinctions among these classes of Babylonian specialists are not fully certain.
    reason: cultural_note
lexical_decisions:
- source_word: כשדיא
  chosen: The Chaldeans
  alternatives:
  - the astrologers
  lexicon: HALOT
  rationale: In Daniel, כשדיא can denote the ethnic group 'Chaldeans' or, by extension,
    a class of Babylonian wise men. Here the speakers are that class within the court,
    but retaining 'Chaldeans' preserves the source term and the narrative's repeated
    designation. The functional sense 'astrologers' is possible but narrower and more
    interpretive.
- source_word: קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition marks presence before the king. 'Before' is idiomatic
    and concise in English.
- source_word: אִיתַי אֲנָשׁ עַל יַבֶּשְׁתָּא
  chosen: There is not a man on earth
  alternatives:
  - There is no person on earth
  - There is no man upon the dry land
  lexicon: HALOT
  rationale: אֲנָשׁ is singular 'man/person'; per gender-accurate policy, 'man' is
    retained because the idiom is generic and matches the source's representative
    singular. עַל יַבֶּשְׁתָּא is an idiom for 'on earth/on land'; 'on earth' is the
    natural English rendering.
- source_word: מִלַּת מַלְכָּא
  chosen: the king’s matter
  alternatives:
  - the king’s word
  - the king’s demand
  lexicon: HALOT
  rationale: מִלָּה can mean word, matter, or thing. Here it refers to the matter
    the king requires to be disclosed, not merely a spoken utterance. 'Matter' preserves
    breadth without over-specifying.
- source_word: יוּכַל לְהַחֲוָיָה
  chosen: can make known
  alternatives:
  - is able to declare
  - can show
  lexicon: HALOT
  rationale: The verb pair expresses ability to reveal or make something known. 'Can
    make known' is clear modern English and fits the context of disclosing the dream
    and its interpretation.
- source_word: כָּל קֳבֵל דִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for this reason that
  lexicon: HALOT
  rationale: This Aramaic connective introduces the grounds for the claim. 'Because'
    is the most natural causal rendering.
- source_word: מֶלֶךְ רַב וְשַׁלִּיט
  chosen: great and powerful king
  alternatives:
  - great and ruling king
  - great and mighty king
  lexicon: HALOT
  rationale: רַב denotes greatness; שַׁלִּיט conveys power, authority, or dominion.
    'Powerful' communicates the force of שַׁלִּיט in idiomatic English.
- source_word: מִלָּה כִדְנָה
  chosen: a thing like this
  alternatives:
  - such a matter
  - such a word
  lexicon: HALOT
  rationale: The phrase refers to the unprecedented nature of the request. 'A thing
    like this' is natural and sufficiently broad.
- source_word: שְׁאֵל
  chosen: has asked for
  alternatives:
  - has requested
  - has demanded of
  lexicon: HALOT
  rationale: The verb means ask/request. Given the king's tone in context, 'demanded'
    is possible, but the lexical value here is simply 'asked for'; the severity is
    supplied by context rather than forced into the verb.
- source_word: חַרְטֹּם
  chosen: diviner-priest
  alternatives:
  - magician
  - soothsayer
  lexicon: HALOT
  rationale: The term denotes one of the Egyptian/Babylonian learned occult specialists.
    Traditional 'magician' is familiar but can sound modern or trivialized; 'diviner-priest'
    better conveys a sacral expert, though somewhat interpretive. It distinguishes
    the class from the following terms.
- source_word: אָשַׁף
  chosen: enchanter
  alternatives:
  - conjurer
  - exorcist
  - astrologer
  lexicon: HALOT
  rationale: The exact class is debated, but it denotes another category of occult
    practitioner. 'Enchanter' is a readable, traditional-equivalent rendering that
    avoids collapsing it into the Chaldeans.
- source_word: כַשְׂדָּי
  chosen: Chaldean
  alternatives:
  - Chaldean sage
  - astrologer
  lexicon: HALOT
  rationale: Singular after לְכָל functions distributively with the preceding singular
    profession terms. 'Chaldean' preserves the source designation; adding 'sage' would
    interpret beyond the text.
