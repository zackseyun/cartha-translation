id: DAN.2.17
reference: Daniel 2:17
source:
  edition: WLC
  text: אֱדַ֥יִן דָּֽנִיֵּ֖אל לְ/בַיְתֵ֣/הּ אֲזַ֑ל וְ֠/לַ/חֲנַנְיָה מִֽישָׁאֵ֧ל וַ/עֲזַרְיָ֛ה
    חַבְר֖וֹ/הִי מִלְּתָ֥/א הוֹדַֽע׃
translation:
  text: Then Daniel went to his house and made the matter known to Hananiah, Mishael,
    and Azariah, his companions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friends.' The Aramaic term can denote associates or companions closely
      joined to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic adverb marking sequence in narrative. 'Then' is natural modern
    English and preserves the temporal progression.
- source_word: לְבַיְתֵהּ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: The preposition ל plus 'house' with 3ms suffix is straightforwardly directional.
    'House' is slightly more formal/literal than 'home' and fits the court narrative
    setting.
- source_word: אֲזַל
  chosen: went
  alternatives:
  - departed
  - came
  lexicon: HALOT
  rationale: Common Aramaic verb for going. 'Went' is the plain and contextually appropriate
    English equivalent.
- source_word: חַבְרוֹהִי
  chosen: his companions
  alternatives:
  - his friends
  - his associates
  lexicon: HALOT
  rationale: The term denotes those joined with him, here Daniel's close associates
    in the narrative. 'Companions' preserves the relational sense without sounding
    overly casual; 'friends' is possible but slightly more interpretive.
- source_word: מִלְּתָא
  chosen: the matter
  alternatives:
  - the thing
  - the word
  - the affair
  lexicon: HALOT
  rationale: In this context the noun refers to the issue just described—Nebuchadnezzar's
    decree and Daniel's request concerning the dream. 'The matter' is idiomatic English
    and broad enough to preserve the source term's semantic range.
- source_word: הוֹדַע
  chosen: made known
  alternatives:
  - told
  - informed
  lexicon: HALOT
  rationale: Causative form of 'know,' so 'made known' best reflects the verbal force
    while remaining readable. 'Told' is smoother but less formally transparent.
- source_word: וְלַחֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  chosen: to Hananiah, Mishael, and Azariah
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The prefixed
    conjunction and preposition are naturally represented by a single English 'to'
    governing the series.
