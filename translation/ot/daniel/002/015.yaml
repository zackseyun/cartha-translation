id: DAN.2.15
reference: Daniel 2:15
source:
  edition: WLC
  text: עָנֵ֣ה וְ/אָמַ֗ר לְ/אַרְיוֹךְ֙ שַׁלִּיטָ֣/א דִֽי מַלְכָּ֔/א עַל מָ֥ה דָתָ֛/א
    מְהַחְצְפָ֖ה מִן קֳדָ֣ם מַלְכָּ֑/א אֱדַ֣יִן מִלְּתָ֔/א הוֹדַ֥ע אַרְי֖וֹךְ לְ/דָנִיֵּֽאל־־־׃
translation:
  text: He answered and said to Arioch, the king’s commander, “Why is the decree so
    urgent from before the king?” Then Arioch made the matter known to Daniel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “so harsh,” “so severe,” or “so hasty” for “so urgent.” The Aramaic term
      conveys pressing severity; the context favors the sense of haste in carrying
      out the king’s decree.
    reason: lexical_alternative
  - marker: b
    text: Literally “from before the king,” an Aramaic idiom meaning that the decree
      came from the king’s presence or authority.
    reason: cultural_note
lexical_decisions:
- source_word: עָנֵה וְאָמַר
  chosen: He answered and said
  alternatives:
  - He replied and said
  - He answered
  lexicon: HALOT
  rationale: Retains the common Semitic narrative pairing rather than collapsing it
    entirely; this is natural enough in English and preserves the source texture.
- source_word: שַׁלִּיטָא דִי מַלְכָּא
  chosen: the king’s commander
  alternatives:
  - the captain of the king
  - the king’s official
  - the ruler of the king
  lexicon: HALOT
  rationale: In context Arioch is the royal officer charged with executing the wise
    men (cf. v. 14), so 'commander' best captures an authoritative military/executive
    role. 'Captain' is possible but sounds narrower or archaic in modern English.
- source_word: עַל מָה
  chosen: Why
  alternatives:
  - For what reason
  - On what account
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the interrogative phrase.
- source_word: דָתָא
  chosen: the decree
  alternatives:
  - the law
  - the edict
  - the command
  lexicon: HALOT
  rationale: In this court setting the term refers to a royal legal order already
    issued; 'decree' fits both the administrative context and standard usage in Daniel.
- source_word: מְהַחְצְפָה
  chosen: so urgent
  alternatives:
  - so harsh
  - so severe
  - so hasty
  lexicon: HALOT
  rationale: The form conveys pressing severity or harsh urgency. In context Daniel
    asks why the royal decree has been issued with such haste. 'Urgent' communicates
    the practical force clearly; alternatives are viable and preserved in a footnote.
- source_word: מִן קֳדָם מַלְכָּא
  chosen: from before the king
  alternatives:
  - from the king
  - in the king’s presence
  lexicon: HALOT
  rationale: A relatively literal rendering preserves the Aramaic idiom and indicates
    the decree proceeds from the king’s presence/authority. Though 'from the king'
    is smoother, the fuller phrase is understandable in English and more transparent
    to the source.
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Standard narrative connector in context.
- source_word: מִלְּתָא
  chosen: the matter
  alternatives:
  - the thing
  - the word
  - the situation
  lexicon: HALOT
  rationale: A broad Aramaic term; here it refers to the situation/explanation Arioch
    relays. 'The matter' is idiomatic and suitably neutral.
- source_word: הוֹדַע
  chosen: made known
  alternatives:
  - informed
  - told
  lexicon: HALOT
  rationale: Preserves the causative nuance of the verb while remaining natural English.
