id: DAN.2.40
reference: Daniel 2:40
source:
  edition: WLC
  text: וּ/מַלְכוּ֙ רביעיה תֶּהֱוֵ֥א תַקִּיפָ֖ה כְּ/פַרְזְלָ֑/א כָּ/ל קֳבֵ֗ל דִּ֤י
    פַרְזְלָ/א֙ מְהַדֵּ֤ק וְ/חָשֵׁל֙ כֹּ֔לָּ/א וּֽ/כְ/פַרְזְלָ֛/א דִּֽי מְרָעַ֥ע כָּל
    אִלֵּ֖ין תַּדִּ֥ק וְ/תֵרֹֽעַ־־־׃
translation:
  text: And the fourth kingdom will be strong like iron, because iron crushes and
    shatters everything; and like iron that breaks all these things, it will crush
    and break.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And a fourth kingdom.' The Aramaic lacks the English definite article,
      though in context the kingdom is clearly the fourth in sequence.
    reason: lexical_alternative
  - marker: b
    text: '''All these things'' likely refers to the earlier kingdoms represented
      in the statue vision.'
    reason: cross_reference
lexical_decisions:
- source_word: וּמַלְכוּ רביעיה
  chosen: And the fourth kingdom
  alternatives:
  - And a fourth kingdom
  lexicon: HALOT
  rationale: מַלְכוּ means 'kingdom,' and רביעיה marks it as 'fourth.' The conjunction
    וּ is naturally rendered 'and' in the sequence of the interpretation.
- source_word: תֶּהֱוֵא
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: 'Imperfect of היה in Biblical Aramaic indicates future state: ''will
    be.'' ''Shall'' is possible but less natural in modern English.'
- source_word: תַקִּיפָה
  chosen: strong
  alternatives:
  - mighty
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes strength or forcefulness. 'Strong' is the most
    direct and idiomatic choice here, especially in comparison with iron.
- source_word: כְּפַרְזְלָא
  chosen: like iron
  alternatives:
  - as iron
  lexicon: HALOT
  rationale: The comparative particle כְ plus 'iron' introduces the simile. 'Like
    iron' is standard modern English.
- source_word: כָּל קֳבֵל דִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for
  lexicon: HALOT
  rationale: This Aramaic expression introduces the reason for the comparison. 'Because'
    best captures the causal force in clear English.
- source_word: מְהַדֵּק
  chosen: crushes
  alternatives:
  - breaks in pieces
  - pulverizes
  lexicon: HALOT
  rationale: The verb conveys crushing or breaking down forcefully. 'Crushes' preserves
    the vivid destructive imagery and pairs well with the following verb.
- source_word: וְחָשֵׁל כֹּלָּא
  chosen: and shatters everything
  alternatives:
  - and smashes everything
  - and breaks everything
  lexicon: HALOT
  rationale: The phrase intensifies iron's destructive effect on 'everything.' 'Shatters'
    conveys violent fragmentation better than the more generic 'breaks.'
- source_word: וּכְפַרְזְלָא דִּי מְרָעַע
  chosen: and like iron that breaks
  alternatives:
  - and like iron that shatters
  - and as iron that crushes
  lexicon: HALOT
  rationale: מְרָעַע comes from a root meaning to break, smash, or crush. Here 'breaks'
    avoids overloading the line with too many near-synonyms while preserving the comparison.
- source_word: כָּל אִלֵּין
  chosen: all these things
  alternatives:
  - all these
  - all of these
  lexicon: HALOT
  rationale: The demonstrative likely points back to the preceding kingdoms/materials
    in the statue vision. 'All these things' makes the referent explicit in natural
    English without overinterpreting.
- source_word: תַּדִּק וְתֵרֹעַ
  chosen: it will crush and break
  alternatives:
  - it will crush and shatter
  - it will break in pieces and smash
  lexicon: HALOT
  rationale: The two verbs are closely related but distinct, expressing comprehensive
    destructive force. Rendering them as 'crush and break' preserves the parallelism
    and avoids flattening them into a single idea.
