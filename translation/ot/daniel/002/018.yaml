id: DAN.2.18
reference: Daniel 2:18
source:
  edition: WLC
  text: וְ/רַחֲמִ֗ין לְ/מִבְעֵא֙ מִן קֳדָם֙ אֱלָ֣הּ שְׁמַיָּ֔/א עַל רָזָ֖/ה דְּנָ֑ה
    דִּ֣י לָ֤א יְהֹֽבְדוּן֙ דָּנִיֵּ֣אל וְ/חַבְר֔וֹ/הִי עִם שְׁאָ֖ר חַכִּימֵ֥י בָבֶֽל־־־׃
translation:
  text: and to seek mercy from before the God of heaven concerning this mystery, so
    that Daniel and his companions might not be destroyed along with the rest of the
    wise men of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secret.' The Aramaic term refers to a hidden matter that requires revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרַחֲמִין
  chosen: mercy
  alternatives:
  - compassion
  - mercies
  lexicon: HALOT
  rationale: Aramaic plural noun from רחם used idiomatically for compassion/mercy.
    English singular 'mercy' is the most natural object of 'seek' here, while preserving
    the sense of divine compassion.
- source_word: לְמִבְעֵא
  chosen: to seek
  alternatives:
  - to ask
  - to request
  lexicon: HALOT
  rationale: The infinitive expresses purpose after the previous verb of Daniel's
    instruction. 'To seek' fits the idiom with 'mercy' and reflects earnest petition
    rather than a mere request.
- source_word: מִן קֳדָם
  chosen: from before
  alternatives:
  - from
  - before the presence of
  lexicon: HALOT
  rationale: The phrase literally means 'from before' and denotes petition directed
    to one in whose presence one stands. 'From before' preserves the source imagery
    while remaining intelligible in English.
- source_word: אֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  lexicon: HALOT
  rationale: Standard biblical title for God in Aramaic court narratives. Including
    the article reflects the determined form in context and idiomatic English.
- source_word: עַל רָזָה דְּנָה
  chosen: concerning this mystery
  alternatives:
  - about this mystery
  - regarding this secret
  lexicon: HALOT
  rationale: רָז in Daniel denotes a hidden matter revealed by God, often rendered
    'mystery' in this chapter. 'Concerning' is a natural rendering of עַל in this
    petitionary context.
- source_word: רָז
  chosen: mystery
  alternatives:
  - secret
  lexicon: HALOT
  rationale: In Daniel 2 the term refers not merely to a secret withheld by humans
    but to a hidden matter requiring divine revelation. 'Mystery' better carries that
    theological-literary force, while 'secret' remains a viable lexical alternative.
- source_word: דִּי לָא יְהֹבְדוּן
  chosen: so that ... might not be destroyed
  alternatives:
  - lest ... perish
  - that ... would not be killed
  lexicon: HALOT
  rationale: The conjunction plus negative and Haphil/imperfect expresses purpose
    or intended result. 'So that ... might not be destroyed' captures the clause's
    dependence and the passive-like sense of being made to perish.
- source_word: וְחַבְרוֹהִי
  chosen: his companions
  alternatives:
  - his friends
  - his associates
  lexicon: HALOT
  rationale: The term denotes Daniel's close associates in the narrative. 'Companions'
    is slightly more formal and contextually apt than 'friends,' while still natural
    English.
- source_word: עִם שְׁאָר
  chosen: along with the rest of
  alternatives:
  - with the remainder of
  - together with the rest of
  lexicon: HALOT
  rationale: This phrase marks inclusion with the larger group facing destruction.
    'Along with the rest of' is idiomatic and clear.
- source_word: חַכִּימֵי בָבֶל
  chosen: the wise men of Babylon
  alternatives:
  - Babylon's wise men
  lexicon: HALOT
  rationale: Conventional rendering in Daniel for the class of court sages. This preserves
    the narrative setting and recognizable terminology.
