theological_decisions:
- issue: Rendering רָז in Daniel's court narrative
  chosen_reading: mystery
  alternative_readings:
  - secret
  rationale: The chapter emphasizes that the hidden matter is inaccessible to human
    wisdom and must be disclosed by God. 'Mystery' preserves that revelatory dimension
    without importing later technical Pauline usage.
  doctrine_reference: Translation philosophy §1, §3, §5
