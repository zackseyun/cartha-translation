id: DAN.2.1
reference: Daniel 2:1
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֣ת שְׁתַּ֗יִם לְ/מַלְכוּת֙ נְבֻֽכַדְנֶצַּ֔ר חָלַ֥ם נְבֻֽכַדְנֶצַּ֖ר
    חֲלֹמ֑וֹת וַ/תִּתְפָּ֣עֶם רוּח֔/וֹ וּ/שְׁנָת֖/וֹ נִהְיְתָ֥ה עָלָֽי/ו׃
translation:
  text: In the second year of Nebuchadnezzar’s reign, Nebuchadnezzar dreamed dreams,
    and his spirit was troubled, and his sleep left him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'dreamed dreams.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his spirit was agitated.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'his sleep was gone from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת שְׁתַּיִם
  chosen: In the second year
  alternatives:
  - And in the second year
  - Now in the second year
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in the
    year two,' but idiomatic English is 'In the second year.' The conjunction is not
    semantically weighty enough to require 'and' in English narrative opening.
- source_word: לְמַלְכוּת
  chosen: of ... reign
  alternatives:
  - of ... kingship
  - of ... kingdom
  lexicon: HALOT
  rationale: Here מַלְכוּת refers to the period of royal rule, not the realm itself,
    so 'reign' best matches the temporal sense in context.
- source_word: נְבֻכַדְנֶצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration is 'Nebuchadnezzar.' Although other
    scholarly transliterations exist, this form is most familiar and readable while
    remaining accurate.
- source_word: חָלַם ... חֲלֹמוֹת
  chosen: dreamed dreams
  alternatives:
  - had dreams
  - dreamed
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('dreamed dreams'). Retaining it
    preserves the emphatic or vivid Hebrew expression better than flattening to 'had
    dreams,' while still sounding acceptable in English.
- source_word: וַתִּתְפָּעֶם רוּחוֹ
  chosen: his spirit was troubled
  alternatives:
  - his spirit was agitated
  - his mind was troubled
  lexicon: HALOT
  rationale: The verb conveys inner disturbance or agitation. 'His spirit was troubled'
    preserves the Hebrew noun רוּחַ and avoids over-psychologizing with 'mind,' while
    remaining natural English.
- source_word: וּשְׁנָתוֹ נִהְיְתָה עָלָיו
  chosen: his sleep left him
  alternatives:
  - his sleep was gone from him
  - his sleep fled from him
  lexicon: HALOT
  rationale: Literally, 'his sleep came to be upon/from him' is an idiom meaning sleep
    departed. 'His sleep left him' is a clear modern English rendering that captures
    the sense without wooden literalism.
