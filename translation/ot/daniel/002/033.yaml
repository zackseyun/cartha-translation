id: DAN.2.33
reference: Daniel 2:33
source:
  edition: WLC
  text: שָׁק֖וֹ/הִי דִּ֣י פַרְזֶ֑ל רַגְל֕וֹ/הִי מנ/הון דִּ֣י פַרְזֶ֔ל ו/מנ/הון דִּ֥י
    חֲסַֽף׃
translation:
  text: its legs were of iron, its feet partly of iron and partly of clay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earthenware' or 'pottery' for 'clay' (Aramaic חֲסַף).
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁקוֹהִי
  chosen: its legs
  alternatives:
  - its shins
  lexicon: HALOT
  rationale: The Aramaic noun refers to the lower legs/legs of the statue. 'Legs'
    is the most natural modern English rendering in this context, while 'shins' is
    more anatomically narrow and less idiomatic for describing the statue's composition.
- source_word: דִּי
  chosen: of
  alternatives:
  - which were
  lexicon: HALOT
  rationale: The relative particle links the body parts with their material composition.
    In English, 'of iron' is the most natural compressed rendering of the predicative
    relationship.
- source_word: פַרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the Aramaic term for the metal iron; no contextual
    reason to vary.
- source_word: רַגְלֹוהִי
  chosen: its feet
  alternatives:
  - its legs
  lexicon: HALOT
  rationale: This term specifically denotes feet, distinct from the earlier word for
    legs. Rendering it distinctly preserves the statue's anatomy and the progression
    in the vision.
- source_word: מִנְהוֹן
  chosen: partly
  alternatives:
  - some of them were
  - from them
  lexicon: HALOT
  rationale: Literally 'from them,' here idiomatically indicating that part of the
    feet consisted of one material and part of another. 'Partly' communicates the
    distributive sense clearly in natural English.
- source_word: וּמִנְהוֹן
  chosen: and partly
  alternatives:
  - and some of them were
  lexicon: HALOT
  rationale: The conjunction plus 'from them' continues the distributive description
    of the feet's mixed composition. 'And partly' is concise and idiomatic.
- source_word: חֲסַף
  chosen: clay
  alternatives:
  - pottery
  - earthenware
  lexicon: HALOT
  rationale: The Aramaic term denotes clay/ceramic material. 'Clay' fits the immediate
    imagery and aligns with the broader passage's conventional description of the
    statue's feet as a mixture of iron and clay; 'pottery' or 'earthenware' are possible
    but less straightforward here.
