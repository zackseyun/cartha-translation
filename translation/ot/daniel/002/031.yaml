id: DAN.2.31
reference: Daniel 2:31
source:
  edition: WLC
  text: אַ֣נְתְּה מַלְכָּ֗/א חָזֵ֤ה הֲוַ֨יְתָ֙ וַ/אֲל֨וּ צְלֵ֥ם חַד֙ שַׂגִּ֔יא צַלְמָ֨/א
    דִּכֵּ֥ן רַ֛ב וְ/זִיוֵ֥/הּ יַתִּ֖יר קָאֵ֣ם לְ/קָבְלָ֑/ךְ וְ/רֵוֵ֖/הּ דְּחִֽיל׃
translation:
  text: You, O king, were watching, and behold, there was one great statue. That statue,
    immense and with extraordinary splendor, was standing before you, and its appearance
    was terrifying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic צְלֵם can be rendered 'image' or 'statue'; 'statue' is chosen here
      because the context describes a large visible figure standing before the king.
    reason: lexical_alternative
  - marker: b
    text: Or 'its brightness was surpassing.' The phrase emphasizes the figure's exceptional
      radiance or splendor.
    reason: lexical_alternative
  - marker: c
    text: Or 'its aspect was dreadful.' The Aramaic describes an appearance that evokes
      fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣נְתְּה
  chosen: You
  alternatives:
  - You yourself
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressing Nebuchadnezzar directly.
    English does not require an emphatic reflexive, though the direct address is retained
    by following vocative 'O king.'
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined noun in direct address. 'O king' preserves the vocative force
    and elevated court style better than a bare 'king.'
- source_word: חָזֵה הֲוַיְתָ
  chosen: were watching
  alternatives:
  - were seeing
  - saw
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing past action in Biblical
    Aramaic. 'Were watching' captures the durative sense more naturally than simple
    'saw' while remaining idiomatic.
- source_word: וַאֲלוּ
  chosen: and behold
  alternatives:
  - and look
  - behold
  lexicon: HALOT
  rationale: Deictic/interjection introducing what appears in the vision. 'And behold'
    is slightly traditional but still readable and fitting for sudden presentation.
- source_word: צְלֵם חַד שַׂגִּיא
  chosen: one great statue
  alternatives:
  - a single great image
  - one enormous image
  lexicon: HALOT
  rationale: צְלֵם denotes an image, statue, or idol figure. In this dream context,
    'statue' best communicates a large humanlike figure in modern English. חַד is
    retained as 'one' rather than omitted, and שַׂגִּיא contributes 'great.'
- source_word: צַלְמָא דִּכֵּן
  chosen: That statue
  alternatives:
  - This statue
  - That image
  lexicon: HALOT
  rationale: Resumptive reference to the figure just introduced. 'That statue' is
    natural English and preserves the demonstrative force.
- source_word: רַב
  chosen: immense
  alternatives:
  - great
  - large
  lexicon: HALOT
  rationale: A second size adjective follows the earlier שַׂגִּיא. To avoid flattening
    the repetition into identical English while preserving emphasis, 'immense' renders
    the intensification idiomatically.
- source_word: וְזִיוֵהּ יַתִּיר
  chosen: with extraordinary splendor
  alternatives:
  - and its brightness was surpassing
  - and its appearance was exceptional in brightness
  lexicon: HALOT
  rationale: זִיו refers to brightness, radiance, or splendor; יַתִּיר intensifies
    it as exceeding/extraordinary. The prepositional English phrase reads smoothly
    while preserving the descriptive force.
- source_word: קָאֵם לְקָבְלָךְ
  chosen: was standing before you
  alternatives:
  - stood in front of you
  - was standing opposite you
  lexicon: HALOT
  rationale: The participle indicates a stative scene description. לְקָבְלָךְ means
    before, in front of, or opposite you. 'Before you' is idiomatic and suits the
    dream report.
- source_word: וְרֵוֵהּ דְּחִיל
  chosen: and its appearance was terrifying
  alternatives:
  - and its aspect was dreadful
  - and its form inspired fear
  lexicon: HALOT
  rationale: רֵו can denote appearance or aspect; דְּחִיל conveys fearfulness or something
    causing dread. 'Terrifying' communicates the effect clearly in modern English.
