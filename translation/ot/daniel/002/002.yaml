id: DAN.2.2
reference: Daniel 2:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ֠/מֶּלֶךְ לִ/קְרֹ֨א לַֽ/חַרְטֻמִּ֜ים וְ/לָֽ/אַשָּׁפִ֗ים וְ/לַֽ/מְכַשְּׁפִים֙
    וְ/לַ/כַּשְׂדִּ֔ים לְ/הַגִּ֥יד לַ/מֶּ֖לֶךְ חֲלֹמֹתָ֑י/ו וַ/יָּבֹ֕אוּ וַ/יַּֽעַמְד֖וּ
    לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: Then the king ordered the magicians, the enchanters, the sorcerers, and the
    Chaldeans to tell the king his dreams. So they came and stood before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Chaldeans'' may refer either to the ethnic Chaldeans or, in this context,
      to a class of Babylonian court wise men.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says 'the king said to call,' an idiom meaning that
      he gave the order to summon them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: ordered
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' in this construction with an infinitive
    ('said to call/summon') the sense is directive. 'Ordered' brings out the royal
    command more naturally in English than the wooden 'said to call,' while remaining
    close to the source.
- source_word: לִקְרֹא
  chosen: ordered ... [them]
  alternatives:
  - to summon
  - to call
  lexicon: HALOT
  rationale: The infinitive means 'to call/summon.' In idiomatic English the force
    is absorbed into 'ordered' plus the object list, avoiding awkward repetition.
    The summoning sense is still preserved by the following clause 'So they came and
    stood before the king.'
- source_word: חַרְטֻמִּים
  chosen: magicians
  alternatives:
  - scribal magicians
  - occult priests
  lexicon: HALOT
  rationale: This term commonly denotes court magicians/diviners. 'Magicians' is the
    standard accessible rendering and fits the Babylonian court context.
- source_word: אַשָּׁפִים
  chosen: enchanters
  alternatives:
  - astrologers
  - conjurers
  lexicon: HALOT
  rationale: The exact nuance is debated, but it refers to a class of occult specialists.
    'Enchanters' distinguishes them from the other groups without importing the more
    specific and possibly misleading 'astrologers.'
- source_word: מְכַשְּׁפִים
  chosen: sorcerers
  alternatives:
  - witchcraft practitioners
  - magicians
  lexicon: HALOT
  rationale: From the root for practicing sorcery; 'sorcerers' is the clearest natural
    English equivalent and preserves the negative occult sense.
- source_word: כַּשְׂדִּים
  chosen: Chaldeans
  alternatives:
  - Babylonian wise men
  lexicon: HALOT
  rationale: The term can denote either the ethnic Chaldeans or, in Daniel's court
    setting, a class of Babylonian wise men. 'Chaldeans' preserves the source term
    and its ambiguity; the contextual sense can be clarified in a footnote.
- source_word: לְהַגִּיד
  chosen: to tell
  alternatives:
  - to declare
  - to make known
  lexicon: HALOT
  rationale: '''Tell'' is straightforward modern English and fits the object ''his
    dreams'' naturally.'
- source_word: חֲלֹמֹתָיו
  chosen: his dreams
  alternatives:
  - the king's dreams
  lexicon: HALOT
  rationale: The suffix is third masculine singular, referring back to the king. 'His
    dreams' is concise and clear in context.
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they entered
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol; 'came' is the natural rendering.
- source_word: וַיַּעַמְדוּ לִפְנֵי הַמֶּלֶךְ
  chosen: stood before the king
  alternatives:
  - presented themselves before the king
  lexicon: HALOT
  rationale: This idiom denotes appearing in attendance before a superior. 'Stood
    before the king' is both literal and idiomatic enough in English.
