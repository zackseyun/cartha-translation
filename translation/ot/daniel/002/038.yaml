id: DAN.2.38
reference: Daniel 2:38
source:
  edition: WLC
  text: וּ/בְ/כָל דִּ֣י דארין בְּֽנֵי אֲ֠נָשָׁ/א חֵיוַ֨ת בָּרָ֤/א וְ/עוֹף שְׁמַיָּ/א֙
    יְהַ֣ב בִּ/ידָ֔/ךְ וְ/הַשְׁלְטָ֖/ךְ בְּ/כָלְּ/ה֑וֹן אַנְתְּה ה֔וּא רֵאשָׁ֖/ה דִּ֥י
    דַהֲבָֽ/א־־־־׃
translation:
  text: And wherever the children of men dwell, the beasts of the field and the birds
    of the heavens—he has given them into your hand and made you ruler over all of
    them. You are the head of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' for 'the children of men.'
    reason: lexical_alternative
  - marker: b
    text: The implied subject of 'has given' and 'made you ruler' is God, as stated
      in the previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל דִּי דארין
  chosen: And wherever ... dwell
  alternatives:
  - and in every place where ... dwell
  - and wherever ... are dwelling
  lexicon: HALOT
  rationale: 'The Aramaic construction combines ''in all/wherever'' with a relative
    particle and participle of dwelling, yielding a locative sense: ''wherever ...
    dwell.'' This is more natural in English than a wooden ''in every place that.'''
- source_word: בְּנֵי אֲנָשָׁא
  chosen: the children of men
  alternatives:
  - human beings
  - mankind
  lexicon: HALOT
  rationale: Literally 'sons/children of man/men.' Because the phrase refers to humanity
    in a representative sense, 'children of men' preserves the source imagery and
    remains understandable. This follows the gender-accurate principle rather than
    flattening to a neutral abstraction in the main text.
- source_word: חֵיוַת בָּרָא
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the beasts of the open country
  lexicon: HALOT
  rationale: The phrase denotes animals of the open land/countryside. 'Beasts of the
    field' is a clear, traditional English equivalent that fits the register and preserves
    the concrete imagery.
- source_word: וְעוֹף שְׁמַיָּא
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: HALOT
  rationale: Literally 'bird(s) of the heavens.' 'Birds of the heavens' preserves
    the elevated biblical diction while remaining readable; 'sky' would also be possible
    but slightly flattens the phrase.
- source_word: יְהַב בִּידָךְ
  chosen: he has given them into your hand
  alternatives:
  - he gave them into your hand
  - he has placed them in your hand
  lexicon: HALOT
  rationale: The verb means 'give,' and 'into your hand' is an idiom for entrusting
    power or dominion. The perfect is rendered 'has given' to reflect the completed
    grant from God in the interpretation.
- source_word: וְהַשְׁלְטָךְ
  chosen: and made you ruler
  alternatives:
  - and caused you to rule
  - and given you dominion
  lexicon: HALOT
  rationale: The causative form from the root for ruling/dominion indicates appointment
    to rule. 'Made you ruler' is concise and idiomatic, preserving the causative sense
    better than a bare 'ruled.'
- source_word: בְּכָלְּהוֹן
  chosen: over all of them
  alternatives:
  - over them all
  - over all
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the listed creatures and, by implication,
    the realm just described. 'Over all of them' makes the referent explicit in English.
- source_word: אַנְתְּה הוּא
  chosen: You are
  alternatives:
  - It is you who are
  - you yourself are
  lexicon: HALOT
  rationale: The pronoun plus copular element gives emphasis. English can convey this
    adequately with 'You are' in this context without overloading the sentence.
- source_word: רֵאשָׁה דִּי דַהֲבָא
  chosen: the head of gold
  alternatives:
  - that head of gold
  - the golden head
  lexicon: HALOT
  rationale: This directly identifies Nebuchadnezzar with the statue's head. 'Head
    of gold' is the most transparent rendering and preserves the imagery of the dream
    better than the adjectival 'golden head.'
