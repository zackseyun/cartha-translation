id: DAN.2.20
reference: Daniel 2:20
source:
  edition: WLC
  text: עָנֵ֤ה דָֽנִיֵּאל֙ וְ/אָמַ֔ר לֶהֱוֵ֨א שְׁמֵ֤/הּ דִּֽי אֱלָהָ/א֙ מְבָרַ֔ךְ
    מִן עָלְמָ֖/א וְ/עַ֣ד עָלְמָ֑/א דִּ֧י חָכְמְתָ֛/א וּ/גְבוּרְתָ֖/א דִּ֥י לֵֽ/הּ
    הִֽיא־־־־׃
translation:
  text: 'Daniel answered and said: “Blessed be the name of God from everlasting to
    everlasting, for wisdom and might belong to him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from age to age” or “forever and ever.”
    reason: lexical_alternative
  - marker: b
    text: Or “wisdom and power are his.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - responded and said
  - declared
  lexicon: HALOT
  rationale: The Aramaic idiom pairs 'answered' with 'said' as a standard narrative
    introduction. Retaining both reflects the source text without awkwardness in English.
- source_word: לֶהֱוֵא
  chosen: be
  alternatives:
  - let ... be
  - may ... be
  lexicon: HALOT
  rationale: This jussive/volitive form introduces a benedictory wish. English 'be'
    in 'Blessed be...' preserves the elevated blessing formula naturally.
- source_word: שְׁמֵהּ
  chosen: the name
  alternatives:
  - his name
  lexicon: HALOT
  rationale: With the following genitive 'of God,' the sense is 'the name of God.'
    This preserves the biblical idiom in which 'name' signifies God's revealed identity
    and honor.
- source_word: אֱלָהָא
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the form is determined, English idiom in this doxological context
    is best rendered simply 'God' rather than 'the God.'
- source_word: מְבָרַךְ
  chosen: Blessed
  alternatives:
  - praised
  - blessed
  lexicon: HALOT
  rationale: '''Blessed be'' is the standard doxological rendering and preserves the
    formal blessing language better than the flatter ''praised be.'''
- source_word: מִן עָלְמָא וְעַד עָלְמָא
  chosen: from everlasting to everlasting
  alternatives:
  - from age to age
  - forever and ever
  lexicon: HALOT
  rationale: The phrase denotes unbounded duration. 'From everlasting to everlasting'
    is idiomatic, reverent, and closely aligned with the source's temporal sweep.
- source_word: דִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Here the particle introduces the ground for the blessing: God is to
    be blessed because wisdom and might are his. ''For'' fits concise English doxology.'
- source_word: חָכְמְתָא
  chosen: wisdom
  lexicon: HALOT
  rationale: Direct rendering of the abstract noun; no contextual pressure suggests
    a different gloss.
- source_word: גְבוּרְתָא
  chosen: might
  alternatives:
  - power
  - strength
  lexicon: HALOT
  rationale: The term denotes strength or power. 'Might' pairs well with 'wisdom'
    in elevated English and suits the doxological style.
- source_word: דִּי לֵהּ הִיא
  chosen: belong to him
  alternatives:
  - are his
  - are his alone
  lexicon: HALOT
  rationale: This clause expresses possession. 'Belong to him' is clear modern English
    and preserves the sense without adding exclusivity not explicitly stated.
