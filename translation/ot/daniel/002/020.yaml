theological_decisions:
- issue: Doxological formula and divine attributes
  chosen_reading: Render the verse as a blessing upon God's name grounded in God's
    possession of wisdom and might.
  alternative_readings:
  - 'Render more woodenly: ''Let the name of God be blessed ... because wisdom and
    power are his.'''
  rationale: The verse is a doxology, not a metaphysical definition. The translation
    preserves the blessing formula and the attribution of wisdom and might to God
    without importing broader doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
