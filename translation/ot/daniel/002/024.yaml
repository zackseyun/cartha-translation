id: DAN.2.24
reference: Daniel 2:24
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דְּנָ֗ה דָּֽנִיֵּאל֙ עַ֣ל עַל אַרְי֔וֹךְ דִּ֚י מַנִּ֣י מַלְכָּ֔/א
    לְ/הוֹבָדָ֖ה לְ/חַכִּימֵ֣י בָבֶ֑ל אֲזַ֣ל וְ/כֵ֣ן אֲמַר לֵ֗/הּ לְ/חַכִּימֵ֤י בָבֶל֙
    אַל תְּהוֹבֵ֔ד הַעֵ֨לְ/נִי֙ קֳדָ֣ם מַלְכָּ֔/א וּ/פִשְׁרָ֖/א לְ/מַלְכָּ֥/א אֲחַוֵּֽא־־׀־־׃ס
translation:
  text: 'Therefore Daniel went in to Arioch, whom the king had appointed to destroy
    the wise men of Babylon. He went and said this to him: “Do not destroy the wise
    men of Babylon. Bring me in before the king, and I will show the interpretation
    to the king.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not kill the wise men of Babylon.' The Aramaic verb can denote causing
      to perish or destroying; here it refers to the execution order against them.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will make known the interpretation to the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: HALOT
  rationale: Aramaic causal/discourse marker meaning 'therefore/for this reason.'
    'Therefore' is concise and natural in English while preserving the logical connection
    to the preceding revelation.
- source_word: עַל עַל־אַרְיוֹךְ
  chosen: went in to Arioch
  alternatives:
  - went to Arioch
  - approached Arioch
  lexicon: HALOT
  rationale: The verb עַל in Biblical Aramaic can mean 'go in/enter' or 'go up to.'
    Given the following direct speech and court setting, 'went in to Arioch' best
    captures an audience/approach nuance without over-paraphrasing.
- source_word: דִּי מַנִּי מַלְכָּא
  chosen: whom the king had appointed
  alternatives:
  - whom the king had assigned
  - whom the king had commissioned
  lexicon: HALOT
  rationale: מני in the passive/participial sense denotes appointment or assignment.
    'Had appointed' is idiomatic and fits the official role Arioch has in the narrative.
- source_word: לְהוֹבָדָה
  chosen: to destroy
  alternatives:
  - to kill
  - to make perish
  lexicon: HALOT
  rationale: The causative of אבד means 'to destroy/cause to perish.' 'Destroy' matches
    the broader decree against the wise men and avoids narrowing the term too quickly,
    though execution is in view.
- source_word: לְחַכִּימֵי בָבֶל
  chosen: the wise men of Babylon
  alternatives:
  - Babylon's wise men
  lexicon: HALOT
  rationale: Standard rendering of the court sages in Daniel. The construct relation
    is naturally expressed in English as 'the wise men of Babylon.'
- source_word: אֲזַל וְכֵן אֲמַר לֵהּ
  chosen: He went and said this to him
  alternatives:
  - He went and spoke to him as follows
  - He said to him thus
  lexicon: HALOT
  rationale: The sequence repeats motion plus speech, with כֵן marking 'thus/this
    way.' 'He went and said this to him' preserves the narrative rhythm and the deictic
    force without sounding wooden.
- source_word: אַל תְּהוֹבֵד
  chosen: Do not destroy
  alternatives:
  - Do not kill
  - Do not put to death
  lexicon: HALOT
  rationale: Negative imperative of the same verb as above. Keeping 'destroy' maintains
    lexical consistency within the verse; the object is a group under sentence, so
    'kill' is possible but less consistent.
- source_word: הַעֵלְנִי
  chosen: Bring me in
  alternatives:
  - Take me up
  - Bring me before
  lexicon: HALOT
  rationale: 'Causative imperative from על with 1cs suffix: ''cause me to go in/up.''
    In court context, ''Bring me in'' is natural English and is clarified by the following
    ''before the king.'''
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - into the king's presence
  lexicon: HALOT
  rationale: קֳדָם commonly means 'before, in the presence of.' 'Before the king'
    is the most direct rendering.
- source_word: וּפִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the explanation
  lexicon: HALOT
  rationale: In Daniel, פשר is a key term for the interpretation of a dream or mystery.
    'Interpretation' preserves that technical narrative usage better than the broader
    'explanation.'
- source_word: אֲחַוֵּא
  chosen: I will show
  alternatives:
  - I will make known
  - I will declare
  lexicon: HALOT
  rationale: The verb means 'show, make known.' 'I will show' is a close formal equivalent
    and works well with 'the interpretation' in English.
