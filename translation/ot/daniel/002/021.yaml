theological_decisions:
- issue: Divine sovereignty over political rulers
  chosen_reading: Retain the direct statement that God removes and sets up kings without
    softening or expanding it.
  alternative_readings:
  - He permits kings to rise and fall
  - He influences political changes
  rationale: The verse explicitly attributes these actions to God. The translation
    should preserve that strong claim of divine sovereignty without importing a more
    deterministic or more permissive theological system than the text itself states.
  doctrine_reference: Affirmations; Translation philosophy §3
