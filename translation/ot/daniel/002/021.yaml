id: DAN.2.21
reference: Daniel 2:21
source:
  edition: WLC
  text: וְ֠/הוּא מְהַשְׁנֵ֤א עִדָּנַיָּ/א֙ וְ/זִמְנַיָּ֔/א מְהַעְדֵּ֥ה מַלְכִ֖ין וּ/מְהָקֵ֣ים
    מַלְכִ֑ין יָהֵ֤ב חָכְמְתָ/א֙ לְ/חַכִּימִ֔ין וּ/מַנְדְּעָ֖/א לְ/יָדְעֵ֥י בִינָֽה׃
translation:
  text: He changes times and seasons; he removes kings and sets up kings; he gives
    wisdom to the wise and knowledge to those who know understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed times' for 'seasons.' The Aramaic pair can denote both times
      in general and their fitting or appointed occasions.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to those who know understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהַשְׁנֵא
  chosen: changes
  alternatives:
  - alters
  lexicon: HALOT
  rationale: The participle denotes causing change. 'Changes' is natural English and
    preserves the active, ongoing sense better than a more formal but less idiomatic
    'alters'.
- source_word: עִדָּנַיָּא
  chosen: times
  alternatives:
  - periods
  lexicon: HALOT
  rationale: In Aramaic this term commonly refers to times or periods. 'Times' is
    the most direct and idiomatic rendering here.
- source_word: זִמְנַיָּא
  chosen: seasons
  alternatives:
  - appointed times
  lexicon: HALOT
  rationale: Paired with עִדָּנַיָּא, this term adds the nuance of set or fitting
    occasions. 'Seasons' preserves the distinction in a familiar English collocation,
    'times and seasons.'
- source_word: מְהַעְדֵּה
  chosen: removes
  alternatives:
  - deposes
  lexicon: HALOT
  rationale: The verb means to cause to pass away or remove. In relation to kings,
    'removes' is broad and faithful; 'deposes' is possible but slightly more interpretive
    politically.
- source_word: מַלְכִין
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: Straightforward plural noun; 'kings' is the plain sense and best matches
    the source.
- source_word: מְהָקֵים
  chosen: sets up
  alternatives:
  - establishes
  - raises up
  lexicon: HALOT
  rationale: The verb means to raise or establish. 'Sets up' is idiomatic in the paired
    expression 'removes kings and sets up kings' and avoids over-reading theological
    connotations that 'raises up' may carry in English.
- source_word: יָהֵב
  chosen: gives
  alternatives:
  - grants
  lexicon: HALOT
  rationale: Common Aramaic verb for giving. 'Gives' is the simplest and most direct
    rendering.
- source_word: חָכְמְתָא
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of the noun; no contextual pressure suggests a narrower
    gloss.
- source_word: לְחַכִּימִין
  chosen: to the wise
  alternatives:
  - to wise people
  lexicon: HALOT
  rationale: The adjective used substantivally refers to wise persons. 'To the wise'
    is concise, idiomatic, and preserves the literary style.
- source_word: מַנְדְּעָא
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: This noun denotes knowledge. Since בִינָה later supplies the idea of
    understanding/discernment, rendering this as 'knowledge' preserves the distinction
    between the two nouns.
- source_word: לְיָדְעֵי בִינָה
  chosen: to those who know understanding
  alternatives:
  - to those who have understanding
  - to those who know discernment
  lexicon: HALOT
  rationale: 'The phrase is somewhat emphatic and semitic in form: literally, ''to
    knowers of understanding.'' The chosen rendering stays close to the source while
    remaining intelligible. Smoother alternatives are possible but flatten the Hebrew-Aramaic
    texture and the distinction between knowing and understanding.'
