theological_decisions:
- issue: Interpretation of 'they will mix themselves with the seed of man'
  chosen_reading: Retain the ambiguous wording without specifying the referent of
    'they' or reducing the phrase to a single historical theory.
  alternative_readings:
  - they will intermarry with one another
  - the kingdoms will mix with common humanity
  - rulers will mingle with the populace
  rationale: The Aramaic phrase is notoriously difficult and has generated multiple
    interpretations. The text itself does not explicitly identify the parties beyond
    the symbolic materials/kingdoms. In keeping with the translation philosophy, the
    draft preserves the ambiguity rather than importing a specific eschatological
    or historical scheme into the translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
