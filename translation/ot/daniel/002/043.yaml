id: DAN.2.43
reference: Daniel 2:43
source:
  edition: WLC
  text: די חֲזַ֗יְתָ פַּרְזְלָ/א֙ מְעָרַב֙ בַּ/חֲסַ֣ף טִינָ֔/א מִתְעָרְבִ֤ין לֶהֱוֺן֙
    בִּ/זְרַ֣ע אֲנָשָׁ֔/א וְ/לָֽא לֶהֱוֺ֥ן דָּבְקִ֖ין דְּנָ֣ה עִם דְּנָ֑ה הֵֽא כְ/דִ֣י
    פַרְזְלָ֔/א לָ֥א מִתְעָרַ֖ב עִם חַסְפָּֽ/א־־־־׃
translation:
  text: As you saw iron mixed with clay, they will mix themselves with the seed of
    man, but they will not hold together, this one with that one, just as iron does
    not mix with pottery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with human seed'; many interpreters understand this as 'they will intermarry,'
      but the Aramaic is more literally 'they will mix themselves with the seed of
      man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one with another.'
    reason: lexical_alternative
  - marker: c
    text: The final term can also be rendered 'clay' or 'earthenware.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזַיְתָ
  chosen: you saw
  alternatives:
  - you looked at
  - you beheld
  lexicon: HALOT
  rationale: Direct second masculine singular perfect in Aramaic, referring to Nebuchadnezzar's
    vision. 'You saw' is the most natural and precise English rendering.
- source_word: פַּרְזְלָא
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the Aramaic noun for iron; consistent with the
    statue imagery throughout the chapter.
- source_word: מְעָרַב
  chosen: mixed
  alternatives:
  - mingled
  lexicon: HALOT
  rationale: From ערב in the sense of mixing or mingling. 'Mixed' is clear modern
    English and fits the material imagery.
- source_word: חֲסַף טִינָא
  chosen: clay
  alternatives:
  - potter's clay
  - earthenware clay
  lexicon: HALOT
  rationale: The paired expression denotes clay/earthen material in the statue's feet.
    'Clay' is concise in the main text, while the verse's closing חַסְפָּא is rendered
    more specifically as 'pottery' to preserve the contrast in English.
- source_word: מִתְעָרְבִין לֶהֱוֺן
  chosen: they will mix themselves
  alternatives:
  - they will mingle
  - they will become mixed
  lexicon: HALOT
  rationale: Reflexive/medio-passive participial-verbal construction indicating the
    subjects' intermixing. 'Mix themselves' preserves the reflexive nuance better
    than a simple passive.
- source_word: בִּזְרַע אֲנָשָׁא
  chosen: with the seed of man
  alternatives:
  - with human seed
  - through human offspring
  - by intermarriage
  lexicon: HALOT
  rationale: Literally 'in/with the seed of man.' The phrase is somewhat opaque and
    should not be overinterpreted. 'Seed of man' preserves the source imagery and
    ambiguity better than the interpretive gloss 'intermarriage.'
- source_word: אֲנָשָׁא
  chosen: man
  alternatives:
  - mankind
  - humanity
  - people
  lexicon: HALOT
  rationale: In this idiom the singular noun is retained as 'man' to reflect the source
    wording and preserve the phrase 'seed of man.' This follows the project's gender-accurate
    principle rather than flattening to a neutral abstraction.
- source_word: דָּבְקִין
  chosen: hold together
  alternatives:
  - cling together
  - adhere
  lexicon: HALOT
  rationale: The verb denotes sticking, cleaving, or adhering. 'Hold together' communicates
    the intended structural instability in idiomatic English.
- source_word: דְּנָה עִם דְּנָה
  chosen: this one with that one
  alternatives:
  - one with another
  - one to another
  lexicon: HALOT
  rationale: The demonstratives emphasize mutual relation of distinct parts. 'This
    one with that one' preserves the distributive force more closely than the smoother
    but less literal 'one with another.'
- source_word: הֵא כְדִי
  chosen: just as
  alternatives:
  - just as indeed
  - because just as
  lexicon: HALOT
  rationale: Introduces the comparison grounding the statement. 'Just as' is the natural
    comparative rendering.
- source_word: חַסְפָּא
  chosen: pottery
  alternatives:
  - earthenware
  - clay
  lexicon: HALOT
  rationale: This term can denote potsherd/earthenware rather than raw clay. Rendering
    it as 'pottery' sharpens the image of brittle fired ceramic in contrast with iron,
    while still matching the broader clay imagery of the statue.
