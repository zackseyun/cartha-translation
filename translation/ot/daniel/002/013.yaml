id: DAN.2.13
reference: Daniel 2:13
source:
  edition: WLC
  text: וְ/דָתָ֣/א נֶפְקַ֔ת וְ/חַכִּֽימַיָּ֖/א מִֽתְקַטְּלִ֑ין וּ/בְע֛וֹ דָּנִיֵּ֥אל
    וְ/חַבְר֖וֹ/הִי לְ/הִתְקְטָלָֽה׃פ
translation:
  text: So the decree went out, and the wise men were being killed; and they sought
    Daniel and his companions to kill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was issued.' The Aramaic literally says 'went out,' referring to the
      promulgation of the royal decree.
    reason: lexical_alternative
  - marker: b
    text: Or 'were being slain.' The form suggests the executions were already underway.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָתָא
  chosen: decree
  alternatives:
  - edict
  - order
  lexicon: HALOT
  rationale: In Imperial Aramaic, the term denotes an official legal decision or royal
    ordinance. 'Decree' fits the court setting and is natural English.
- source_word: נֶפְקַת
  chosen: went out
  alternatives:
  - was issued
  - went forth
  lexicon: HALOT
  rationale: Literally 'went out.' In context it refers to the promulgation of the
    royal decree. 'Went out' preserves the imagery while remaining idiomatic.
- source_word: חַכִּימַיָּא
  chosen: the wise men
  alternatives:
  - the sages
  lexicon: HALOT
  rationale: This is the standard court designation in Daniel for the king's learned
    advisors. 'Wise men' is the most recognizable and contextually accurate rendering.
- source_word: מִתְקַטְּלִין
  chosen: were being killed
  alternatives:
  - were being slain
  - were killed
  lexicon: HALOT
  rationale: The participial form conveys ongoing or incipient action in the narrative.
    'Were being killed' best reflects the process already underway rather than a simple
    completed event.
- source_word: וּבְעוֹ
  chosen: they sought
  alternatives:
  - they looked for
  - they searched for
  lexicon: HALOT
  rationale: The verb means to seek or request. Here the object is Daniel and his
    companions, so 'they sought' captures the official search in concise narrative
    English.
- source_word: חַבְרוֹהִי
  chosen: his companions
  alternatives:
  - his friends
  - his associates
  lexicon: HALOT
  rationale: The term refers to those associated with Daniel in the court context.
    'Companions' is broad enough to fit the narrative without sounding overly informal
    like 'friends.'
- source_word: לְהִתְקְטָלָה
  chosen: to kill them
  alternatives:
  - for execution
  - to have them killed
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: they were sought in order to be put
    to death. ''To kill them'' is direct and clear; the plural pronoun makes explicit
    that Daniel and his companions are all included.'
