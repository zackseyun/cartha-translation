id: DAN.2.32
reference: Daniel 2:32
source:
  edition: WLC
  text: ה֣וּא צַלְמָ֗/א רֵאשֵׁ/הּ֙ דִּֽי דְהַ֣ב טָ֔ב חֲד֥וֹ/הִי וּ/דְרָע֖וֹ/הִי דִּ֣י
    כְסַ֑ף מְע֥וֹ/הִי וְ/יַרְכָתֵ֖/הּ דִּ֥י נְחָֽשׁ־׃
translation:
  text: That image—its head was of fine gold, its chest and its arms of silver, its
    belly and its thighs of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'statue.' The Aramaic צַלְמָא can denote an image or a statue.
    reason: lexical_alternative
  - marker: b
    text: Or 'pure gold.' Literally 'good gold,' an idiom for high-quality gold.
    reason: lexical_alternative
  - marker: c
    text: Or 'copper.' The Aramaic נְחָשׁ often refers to bronze in context, though
      ancient metal terminology may overlap.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַלְמָא
  chosen: image
  alternatives:
  - statue
  lexicon: HALOT
  rationale: The Aramaic term denotes an image or statue. 'Image' is slightly broader
    and matches the immediate context of Nebuchadnezzar's dream image, while 'statue'
    remains a viable alternative.
- source_word: רֵאשֵׁהּ
  chosen: its head
  lexicon: HALOT
  rationale: Straightforward possessive rendering of 'its head,' referring back to
    the image.
- source_word: דִּי
  chosen: of
  alternatives:
  - which was
  - that was
  lexicon: HALOT
  rationale: Here the relative particle links each body part to its material composition.
    English idiom is best served by the compressed genitival sense 'of' rather than
    repeatedly using 'which was.'
- source_word: דְהַב טָב
  chosen: fine gold
  alternatives:
  - good gold
  - pure gold
  lexicon: HALOT
  rationale: טָב literally means 'good,' but in material description 'fine gold' is
    the most natural English equivalent, conveying high quality without overtranslating
    to a technical purity claim.
- source_word: חֲדוֹהִי
  chosen: its chest
  alternatives:
  - its breast
  lexicon: HALOT
  rationale: The noun refers to the front torso/chest area. 'Chest' is natural modern
    English; 'breast' is possible but sounds archaic or potentially misleading in
    contemporary usage.
- source_word: דְרָעוֹהִי
  chosen: its arms
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for arms.
- source_word: כְסַף
  chosen: silver
  lexicon: HALOT
  rationale: Direct material term; no contextual reason to vary.
- source_word: מְעוֹהִי
  chosen: its belly
  alternatives:
  - its inward parts
  - its abdomen
  lexicon: HALOT
  rationale: The term denotes the belly or midsection. 'Belly' is clear and idiomatic
    in English, fitting the anatomical sequence.
- source_word: יַרְכָתֵהּ
  chosen: its thighs
  alternatives:
  - its loins
  - its hips
  - its legs
  lexicon: HALOT
  rationale: The noun can refer to the upper leg/thigh region or flanks. In this body-part
    list, 'thighs' best matches the anatomy and avoids the overbroad 'legs.' 'Loins'
    is possible but less transparent in modern English.
- source_word: נְחָשׁ
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical metal lists this term commonly refers to bronze as the conventional
    English rendering, though the underlying ancient alloy terminology can overlap
    with copper. 'Bronze' preserves established material sense in context.
- source_word: הוּא
  chosen: That
  alternatives:
  - This
  lexicon: HALOT
  rationale: The pronoun resumes the previously described image. 'That image' fits
    the discourse reference to the dream object already introduced.
