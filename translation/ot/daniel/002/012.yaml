id: DAN.2.12
reference: Daniel 2:12
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דְּנָ֔ה מַלְכָּ֕/א בְּנַ֖ס וּ/קְצַ֣ף שַׂגִּ֑יא וַ/אֲמַר֙ לְ/ה֣וֹבָדָ֔ה
    לְ/כֹ֖ל חַכִּימֵ֥י בָבֶֽל־׃
translation:
  text: Because of this, the king became furious and very angry, and he commanded
    that all the wise men of Babylon be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For this reason' or 'Therefore.'
    reason: lexical_alternative
  - marker: b
    text: The verb is literally 'said,' but here it introduces a royal decree; hence
      'commanded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Because of this
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Aramaic causal expression meaning 'for this reason/because of this.'
    'Because of this' preserves the explicit causal force without sounding wooden.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Definite emphatic form in Biblical Aramaic; straightforwardly rendered
    'the king.'
- source_word: בְּנַס
  chosen: became furious
  alternatives:
  - was enraged
  - became angry
  lexicon: HALOT
  rationale: Verb denotes becoming angry or enraged. 'Became furious' fits the narrative
    escalation and pairs naturally with the following term for anger.
- source_word: וּקְצַף שַׂגִּיא
  chosen: and very angry
  alternatives:
  - and exceedingly wrathful
  - and greatly enraged
  lexicon: HALOT
  rationale: קצף conveys wrath/anger; שׂגיא intensifies it ('greatly, exceedingly').
    Rendering as 'and very angry' preserves the Hebrew-Aramaic style of piling up
    anger terms while remaining readable modern English.
- source_word: וַאֲמַר
  chosen: and he commanded
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Although the verb is formally 'said,' in context it introduces a royal
    order followed by an infinitive of result/content. English idiom is better served
    by 'commanded,' which makes the force explicit without adding content.
- source_word: לְהוֹבָדָה
  chosen: that ... be destroyed
  alternatives:
  - to destroy
  - that ... be killed
  lexicon: HALOT
  rationale: Passive/causative infinitival form from אבד in this context refers to
    causing the wise men to perish. 'Be destroyed' is broad enough to reflect the
    verb while fitting the royal decree context.
- source_word: לְכֹל חַכִּימֵי בָבֶל
  chosen: all the wise men of Babylon
  alternatives:
  - all Babylon's wise men
  lexicon: HALOT
  rationale: Construct phrase with totalizing לְכֹל. 'Wise men' is the standard contextual
    rendering for the class of court sages in Daniel.
