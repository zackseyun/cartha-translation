id: DAN.2.37
reference: Daniel 2:37
source:
  edition: WLC
  text: אַ֣נְתְּה מַלְכָּ֔/א מֶ֖לֶךְ מַלְכַיָּ֑/א דִּ֚י אֱלָ֣הּ שְׁמַיָּ֔/א מַלְכוּתָ֥/א
    חִסְנָ֛/א וְ/תָקְפָּ֥/א וִֽ/יקָרָ֖/א יְהַב לָֽ/ךְ־׃
translation:
  text: You, O king, are the king of kings, to whom the God of heaven has given the
    kingdom, the might, the power, and the glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the honor' or 'the splendor' for 'the glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣נְתְּה
  chosen: You
  alternatives:
  - You yourself
  lexicon: HALOT
  rationale: Second masculine singular independent pronoun used for direct address;
    English 'You' preserves the address, while the vocative force is reinforced by
    the following 'O king.'
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined singular noun in direct address. Rendering as vocative 'O
    king' reflects the courtly address naturally in English.
- source_word: מֶלֶךְ מַלְכַיָּא
  chosen: the king of kings
  alternatives:
  - king over kings
  - great king
  lexicon: HALOT
  rationale: Construct chain meaning 'king of kings,' a superlative royal title. 'The
    king of kings' is the most direct and idiomatic rendering.
- source_word: דִּי
  chosen: to whom
  alternatives:
  - for whom
  - because
  lexicon: HALOT
  rationale: Relative particle introducing the clause about what God has given. In
    English, 'to whom' best fits the verb 'has given' with indirect object sense.
- source_word: אֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  - the God of the heavens
  lexicon: HALOT
  rationale: Standard biblical title. 'The God of heaven' is idiomatic English and
    preserves the definite force without awkward literalism.
- source_word: מַלְכוּתָא
  chosen: the kingdom
  alternatives:
  - kingship
  - royal dominion
  lexicon: HALOT
  rationale: Refers to royal rule/realm granted by God. 'The kingdom' is the most
    natural and sufficiently broad rendering in this context.
- source_word: חִסְנָא
  chosen: the might
  alternatives:
  - strength
  - fortress-like strength
  lexicon: HALOT
  rationale: Denotes strength or might. 'Might' fits the regal context and pairs well
    with the following terms without over-specifying.
- source_word: תָקְפָּא
  chosen: the power
  alternatives:
  - the strength
  - the authority
  lexicon: HALOT
  rationale: A term for force, power, or potency. 'Power' distinguishes it from the
    previous noun while preserving the semantic overlap present in the source.
- source_word: וִיקָרָא
  chosen: the glory
  alternatives:
  - the honor
  - the splendor
  lexicon: HALOT
  rationale: Carries the sense of honor, glory, or splendor associated with royal
    majesty. 'Glory' best captures the elevated tone and common biblical usage.
- source_word: יְהַב לָךְ
  chosen: has given ... to you
  alternatives:
  - gave you
  lexicon: HALOT
  rationale: Peal perfect 3ms with second masculine singular object. Present perfect
    'has given' works well in English for a completed act with present significance;
    the indirect object is represented by 'to whom' in the relative clause.
