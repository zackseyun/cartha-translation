theological_decisions:
- issue: Source of Nebuchadnezzar's royal authority
  chosen_reading: Nebuchadnezzar's kingdom and royal greatness are presented as gifts
    from the God of heaven.
  alternative_readings:
  - Nebuchadnezzar possesses these inherently by conquest or status
  rationale: The verse explicitly attributes kingdom, might, power, and glory to divine
    gift. The translation preserves this theological claim without expanding it beyond
    the text.
  doctrine_reference: 'Translation philosophy: preserve the text''s plain sense without
    importing doctrinal claims.'
