theological_decisions:
- issue: Nature of the final ruler's distinction from the earlier kings
  chosen_reading: He will be different from the former ones
  alternative_readings:
  - He will be more severe than the former ones
  - He will change from the former ones
  rationale: The text states distinction, not a full theological profile of the ruler.
    The translation preserves the descriptive claim without importing later interpretive
    systems about the identity of the figure.
  doctrine_reference: Preserve theological tension rather than resolve it.
