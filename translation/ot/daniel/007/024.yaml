id: DAN.7.24
reference: Daniel 7:24
source:
  edition: WLC
  text: וְ/קַרְנַיָּ֣/א עֲשַׂ֔ר מִנַּ/הּ֙ מַלְכוּתָ֔/ה עַשְׂרָ֥ה מַלְכִ֖ין יְקֻמ֑וּן
    וְ/אָחֳרָ֞ן יְק֣וּם אַחֲרֵי/ה֗וֹן וְ/ה֤וּא יִשְׁנֵא֙ מִן קַדְמָיֵ֔/א וּ/תְלָתָ֥ה
    מַלְכִ֖ין יְהַשְׁפִּֽל־׃
translation:
  text: As for the ten horns, out of this kingdom ten kings will arise; and another
    will arise after them. He will be different from the former ones, and he will
    humble three kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "will be diverse from the former ones."
    reason: lexical_alternative
  - marker: b
    text: Or "will abase" or "put down" three kings.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַרְנַיָּא עֲשַׂר
  chosen: the ten horns
  alternatives:
  - ten horns
  lexicon: HALOT
  rationale: Retains the apocalyptic symbol 'horns' rather than interpreting it, since
    the verse itself explains their referent. 'As for' brings out the topical force
    of the initial waw + noun phrase in context.
- source_word: מִנַּהּ מַלְכוּתָה
  chosen: out of this kingdom
  alternatives:
  - from it, the kingdom
  - from this kingdom
  lexicon: HALOT
  rationale: The feminine pronominal suffix refers back to the kingdom represented
    by the beast. 'Out of this kingdom' is idiomatic English and preserves the source
    sense of emergence from the kingdom.
- source_word: מַלְכִין יְקֻמ֑וּן
  chosen: ten kings will arise
  alternatives:
  - ten kings will stand up
  - ten kings will come forth
  lexicon: HALOT
  rationale: קוּם in this context refers to the rise of rulers. 'Will arise' is both
    natural and close to the source.
- source_word: וְאָחֳרָן
  chosen: another
  alternatives:
  - another one
  - a later one
  lexicon: HALOT
  rationale: The adjective means 'another' or 'a subsequent one.' 'Another' is concise
    and fits the royal referent supplied by context.
- source_word: יְקוּם אַחֲרֵיהוֹן
  chosen: will arise after them
  alternatives:
  - will stand up after them
  - will come after them
  lexicon: HALOT
  rationale: Preserves both the verbal parallel with the previous clause and the temporal
    sequence indicated by 'after them.'
- source_word: יִשְׁנֵא מִן קַדְמָיֵא
  chosen: will be different from the former ones
  alternatives:
  - will be diverse from the former ones
  - will be changed from the former ones
  lexicon: HALOT
  rationale: The Aramaic verb here is commonly understood in context as denoting difference
    or distinctness rather than hatred. 'Former ones' refers to the earlier kings.
    'Different' is clear modern English and matches the contextual sense.
- source_word: קַדְמָיֵא
  chosen: the former ones
  alternatives:
  - the earlier ones
  - the previous ones
  lexicon: HALOT
  rationale: Refers to the preceding kings. 'Former ones' is slightly more formal
    but natural in prophetic discourse.
- source_word: וּתְלָתָה מַלְכִין יְהַשְׁפִּל
  chosen: and he will humble three kings
  alternatives:
  - and he will put down three kings
  - and he will abase three kings
  - and he will subdue three kings
  lexicon: HALOT
  rationale: The Haphel of שׁפל means to make low, humble, or abase. 'Humble' preserves
    the metaphor of lowering without over-specifying the political mechanism. 'Subdue'
    is possible but somewhat more interpretive.
