id: DAN.7.6
reference: Daniel 7:6
source:
  edition: WLC
  text: בָּאתַ֨ר דְּנָ֜ה חָזֵ֣ה הֲוֵ֗ית וַ/אֲר֤וּ אָֽחֳרִי֙ כִּ/נְמַ֔ר וְ/לַ֨/הּ גַּפִּ֥ין
    אַרְבַּ֛ע דִּי ע֖וֹף עַל גבי/ה וְ/אַרְבְּעָ֤ה רֵאשִׁין֙ לְ/חֵ֣יוְתָ֔/א וְ/שָׁלְטָ֖ן
    יְהִ֥יב לַֽ/הּ־־׃
translation:
  text: After this I kept looking, and behold, another, like a leopard; it had four
    wings of a bird on its back, and the beast had four heads, and dominion was given
    to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on its sides'; the Aramaic expression may denote the creature's back
      or upper body more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאתַר דְּנָה
  chosen: After this
  alternatives:
  - After that
  - Later than this
  lexicon: HALOT
  rationale: Temporal Aramaic expression introducing the next element in the vision
    sequence. 'After this' is idiomatic and preserves the narrative progression.
- source_word: חָזֵה הֲוֵית
  chosen: I kept looking
  alternatives:
  - I was looking
  - I saw
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing action in past time.
    'I kept looking' captures the durative force better than the simple 'I saw.'
- source_word: וַאֲרוּ
  chosen: and behold
  alternatives:
  - and look
  - then behold
  lexicon: HALOT
  rationale: Common Aramaic deictic/interjection in visionary narrative. 'And behold'
    preserves the vividness and discourse function.
- source_word: אָחֳרִי
  chosen: another
  alternatives:
  - another one
  - a different one
  lexicon: HALOT
  rationale: Refers to another beast in sequence. 'Another' is concise and natural
    in English.
- source_word: כִּנְמַר
  chosen: like a leopard
  alternatives:
  - as a leopard
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a leopard' is the standard and
    clear simile.
- source_word: גַּפִּין אַרְבַּע
  chosen: four wings
  lexicon: HALOT
  rationale: Straightforward nominal phrase; 'wings' is the normal gloss for גַּף
    in Biblical Aramaic.
- source_word: דִּי עוֹף
  chosen: of a bird
  alternatives:
  - bird's
  lexicon: HALOT
  rationale: Genitival relation specifying the kind of wings. 'Of a bird' is slightly
    more formal and transparent than the possessive.
- source_word: עַל גביּה
  chosen: on its back
  alternatives:
  - on its sides
  - upon its back
  lexicon: HALOT
  rationale: גַּב commonly denotes back or surface. 'On its back' is the most direct
    sense here for the location of the wings.
- source_word: וְאַרְבְּעָה רֵאשִׁין
  chosen: and ... had four heads
  alternatives:
  - and four heads belonged to it
  - with four heads
  lexicon: HALOT
  rationale: The verbless clause is naturally rendered with an implied English verb.
    Repeating 'had' yields readable English while preserving the description.
- source_word: לְחֵיוְתָא
  chosen: the beast
  alternatives:
  - the animal
  - this beast
  lexicon: HALOT
  rationale: Daniel 7 consistently uses 'beast' for the symbolic creatures; this maintains
    terminological consistency in the chapter.
- source_word: שָׁלְטָן
  chosen: dominion
  alternatives:
  - rule
  - authority
  - sovereignty
  lexicon: HALOT
  rationale: In Daniel this term often denotes ruling power or dominion. 'Dominion'
    fits the apocalyptic-political context and preserves the elevated register.
- source_word: יְהִיב לַהּ
  chosen: was given to it
  alternatives:
  - was granted to it
  - was bestowed on it
  lexicon: HALOT
  rationale: Passive English appropriately reflects the Aramaic verbal form in context
    and preserves the implied divine or external grant without over-specifying the
    giver.
