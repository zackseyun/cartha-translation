theological_decisions:
- issue: Implied giver of dominion
  chosen_reading: was given to it
  alternative_readings:
  - it received dominion from God
  rationale: The text states that dominion was given but does not explicitly name
    the giver in this verse. The translation preserves that theological reserve rather
    than making the divine agent explicit in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
