id: DAN.7.19
reference: Daniel 7:19
source:
  edition: WLC
  text: אֱדַ֗יִן צְבִית֙ לְ/יַצָּבָ֔א עַל חֵֽיוְתָ/א֙ רְבִיעָ֣יְתָ֔/א דִּֽי הֲוָ֥ת
    שָֽׁנְיָ֖ה מִן כל/הון דְּחִילָ֣ה יַתִּ֗ירָה שני/ה דִּֽי פַרְזֶל֙ וְ/טִפְרַ֣י/הּ
    דִּֽי נְחָ֔שׁ אָֽכְלָ֣ה מַדֲּקָ֔ה וּ/שְׁאָרָ֖/א בְּ/רַגְלַ֥י/הּ רָֽפְסָֽה־־־־־׃
translation:
  text: Then I wanted to know for certain about the fourth beast, which was different
    from all of them, exceedingly terrifying, with teeth of iron and claws of bronze,
    which devoured, crushed, and trampled what was left with its feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to ascertain the truth about the fourth beast.' The Aramaic expression
      conveys a desire to know something with certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'nails of bronze.' The term can denote claws or nails; 'claws' was chosen
      to fit the beast imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next stage of Daniel's inquiry;
    'Then' is natural English and preserves sequence.
- source_word: צְבִית
  chosen: I wanted
  alternatives:
  - I desired
  - I wished
  lexicon: HALOT
  rationale: Expresses Daniel's desire or resolve; 'I wanted' is readable modern English
    without overstating volition.
- source_word: לְיַצָּבָא
  chosen: to know for certain
  alternatives:
  - to be certain
  - to ascertain the truth
  lexicon: HALOT
  rationale: Aramaic form from יצב in this stem/context conveys certainty or making
    something sure. 'To know for certain' captures the idiom clearly in English.
- source_word: עַל
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: With verbs of inquiry, 'about' is the most idiomatic English preposition.
- source_word: חֵיוְתָא רְבִיעָיְתָא
  chosen: the fourth beast
  lexicon: HALOT
  rationale: Straightforward rendering of the noun phrase with ordinal.
- source_word: דִּי הֲוָת שָׁנְיָה מִן כָּלְהוֹן
  chosen: which was different from all of them
  alternatives:
  - which was distinct from them all
  lexicon: HALOT
  rationale: שָׁנְיָה denotes being changed/different/distinct. 'Different from all
    of them' is clear and preserves the comparative sense.
- source_word: דְּחִילָה יַתִּירָה
  chosen: exceedingly terrifying
  alternatives:
  - very dreadful
  - especially fearsome
  lexicon: HALOT
  rationale: The phrase intensifies the beast's fearfulness. 'Exceedingly terrifying'
    preserves the strong degree while using contemporary English.
- source_word: שִׁנַּיּהּ דִּי פַרְזֶל
  chosen: with teeth of iron
  alternatives:
  - whose teeth were iron
  - having iron teeth
  lexicon: HALOT
  rationale: Construct phrase describing the beast's features; 'with teeth of iron'
    fits the descriptive flow in English.
- source_word: וְטִפְרַיּהּ דִּי נְחָשׁ
  chosen: and claws of bronze
  alternatives:
  - and its nails of bronze
  lexicon: HALOT
  rationale: טפר means claw/nail. 'Claws' better suits a beast image in English. נְחָשׁ
    here denotes bronze/copper alloy, conventionally 'bronze' in this context.
- source_word: אָכְלָה
  chosen: devoured
  alternatives:
  - ate up
  - consumed
  lexicon: HALOT
  rationale: Standard vivid rendering for beast imagery and consistent with the sequence
    of violent actions.
- source_word: מַדֲּקָה
  chosen: crushed
  alternatives:
  - broke in pieces
  - pulverized
  lexicon: HALOT
  rationale: Conveys violent breaking or crushing; 'crushed' is concise and natural
    alongside 'devoured' and 'trampled'.
- source_word: וּשְׁאָרָא
  chosen: what was left
  alternatives:
  - the remainder
  - the rest
  lexicon: HALOT
  rationale: Refers to the remnant after devouring/crushing. 'What was left' is idiomatic
    and vivid in English.
- source_word: בְּרַגְלַיּהּ רָפְסָה
  chosen: trampled what was left with its feet
  alternatives:
  - stamped the rest with its feet
  lexicon: HALOT
  rationale: רפס means trample/stamp. 'Trampled ... with its feet' preserves the physical
    imagery and reads naturally.
