id: DAN.7.28
reference: Daniel 7:28
source:
  edition: WLC
  text: עַד כָּ֖ה סוֹפָ֣/א דִֽי מִלְּתָ֑/א אֲנָ֨ה דָֽנִיֵּ֜אל שַׂגִּ֣יא רַעְיוֹנַ֣/י
    יְבַהֲלֻנַּ֗/נִי וְ/זִיוַ/י֙ יִשְׁתַּנּ֣וֹן עֲלַ֔/י וּ/מִלְּתָ֖/א בְּ/לִבִּ֥/י
    נִטְרֵֽת־־׀׃פ
translation:
  text: This is the end of the matter. As for me, Daniel, my thoughts greatly terrified
    me, and my appearance changed because of it; but I kept the matter in my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the conclusion of the matter.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my countenance changed' or 'my brightness changed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד כָּה
  chosen: This is
  alternatives:
  - Until here is
  - Up to this point is
  lexicon: HALOT
  rationale: Idiomatic Aramaic discourse marker introducing a conclusion or stopping
    point. Rendered naturally in English as the opening of a summary statement rather
    than woodenly preserving the prepositional form.
- source_word: סוֹפָא דִי מִלְּתָא
  chosen: the end of the matter
  alternatives:
  - the end of the word
  - the conclusion of the matter
  lexicon: HALOT
  rationale: מִלְּתָא in Aramaic commonly means 'matter, thing, word.' In this context
    of concluding a vision report, 'matter' best captures the sense. 'End' is retained
    rather than paraphrased away.
- source_word: אֲנָה דָנִיֵּאל
  chosen: As for me, Daniel
  alternatives:
  - I, Daniel
  lexicon: HALOT
  rationale: The independent pronoun plus proper name is emphatic. 'As for me, Daniel'
    preserves the self-referential emphasis in readable English.
- source_word: שַׂגִּיא
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: Adverbial use modifying the effect of the thoughts on Daniel. 'Greatly'
    is natural modern English and preserves intensity.
- source_word: רַעְיוֹנַי
  chosen: my thoughts
  alternatives:
  - my reflections
  - my anxious thoughts
  lexicon: HALOT
  rationale: The noun denotes thoughts or mental reflections. 'Thoughts' is the most
    direct rendering; adding 'anxious' would overinterpret the cause from the following
    verb.
- source_word: יְבַהֲלֻנַּנִי
  chosen: terrified me
  alternatives:
  - alarmed me
  - troubled me
  lexicon: HALOT
  rationale: The verb conveys being disturbed, alarmed, or terrified. Given the visionary
    context and the intensifier שַׂגִּיא, 'terrified me' best reflects the force.
- source_word: וְזִיוַי
  chosen: my appearance
  alternatives:
  - my brightness
  - my countenance
  - my face
  lexicon: HALOT
  rationale: זִיו can denote brightness or appearance/countenance. In context with
    'changed,' it refers to Daniel's outward look or facial appearance. 'Appearance'
    is broader and idiomatic.
- source_word: יִשְׁתַּנּוֹן עֲלַי
  chosen: changed because of it
  alternatives:
  - was changed upon me
  - changed over me
  - changed on me
  lexicon: HALOT
  rationale: The Aramaic idiom literally says the appearance changed 'upon me.' English
    requires a smoother expression. 'Because of it' captures the resultant effect
    on Daniel without awkward literalism.
- source_word: וּמִלְּתָא
  chosen: but I kept the matter
  alternatives:
  - and the matter
  - but the matter
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English the clause
    contrasts Daniel's inner preservation of the revelation with his outward distress,
    so 'but' communicates the discourse relation well while retaining the noun 'matter'
    consistently.
- source_word: בְּלִבִּי
  chosen: in my heart
  alternatives:
  - in my mind
  - within me
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term and should be
    preserved rather than psychologized into ''mind.'''
- source_word: נִטְרֵת
  chosen: I kept
  alternatives:
  - I preserved
  - I guarded
  lexicon: HALOT
  rationale: The verb means to keep, guard, preserve. 'I kept' is concise, natural,
    and faithful; 'guarded' is possible but slightly too concrete in English for this
    context.
