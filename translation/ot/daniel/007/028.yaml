theological_decisions:
- issue: Anthropological language of לֵב/heart
  chosen_reading: Retain 'heart' in the main text
  alternative_readings:
  - mind
  - inner self
  rationale: The verse uses standard biblical inner-person language. Preserving 'heart'
    maintains the text's theological anthropology and avoids flattening it into a
    purely cognitive category.
  doctrine_reference: Translation philosophy §6; preserve source meaning in readable
    modern English
