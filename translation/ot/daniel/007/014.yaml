id: DAN.7.14
reference: Daniel 7:14
source:
  edition: WLC
  text: וְ/לֵ֨/הּ יְהִ֤יב שָׁלְטָן֙ וִ/יקָ֣ר וּ/מַלְכ֔וּ וְ/כֹ֣ל עַֽמְמַיָּ֗/א אֻמַיָּ֛/א
    וְ/לִשָּׁנַיָּ֖/א לֵ֣/הּ יִפְלְח֑וּן שָׁלְטָנֵ֞/הּ שָׁלְטָ֤ן עָלַם֙ דִּֽי לָ֣א
    יֶעְדֵּ֔ה וּ/מַלְכוּתֵ֖/הּ דִּי לָ֥א תִתְחַבַּֽל־־׃פ
translation:
  text: And to him was given dominion and glory and a kingdom, that all peoples, nations,
    and languages should serve him. His dominion is an everlasting dominion, which
    will not pass away, and his kingdom is one that will not be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship him' or 'pay homage to him.' The Aramaic verb can denote service,
      including religious service, so the exact nuance may include more than political
      submission.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִיב
  chosen: was given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: The Aramaic verb here is passive in sense ('was given'), matching the
    syntax with the indirect object 'to him.' This preserves the implied divine bestowal
    without making the giver explicit.
- source_word: שָׁלְטָן
  chosen: dominion
  alternatives:
  - authority
  - rule
  - sovereignty
  lexicon: HALOT
  rationale: '''Dominion'' best captures royal ruling power in this apocalyptic context
    and fits the repeated use later in the verse. ''Authority'' is possible but weaker
    in regal scope.'
- source_word: וִיקָר
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: The term denotes honor/splendor accorded to the figure. 'Glory' is the
    most natural English rendering in a royal-theological setting and preserves the
    elevated tone.
- source_word: מַלְכוּ
  chosen: a kingdom
  alternatives:
  - kingship
  - royal power
  lexicon: HALOT
  rationale: The noun can denote reign or kingdom. Here, alongside 'dominion' and
    followed by universal service, 'a kingdom' best conveys the realm and royal rule
    granted to him.
- source_word: עַמְמַיָּא
  chosen: peoples
  alternatives:
  - nations
  - ethnic groups
  lexicon: HALOT
  rationale: Using 'peoples' here allows the following paired terms to retain their
    distinct force rather than collapsing all three into near-synonyms.
- source_word: אֻמַיָּא
  chosen: nations
  alternatives:
  - tribes
  - peoples
  lexicon: HALOT
  rationale: This term commonly denotes national groupings. Rendering it 'nations'
    preserves the triad's breadth.
- source_word: לִשָּׁנַיָּא
  chosen: languages
  alternatives:
  - tongues
  lexicon: HALOT
  rationale: The literal sense is languages/tongues. 'Languages' is clear modern English
    and preserves the universal scope across speech communities.
- source_word: יִפְלְחוּן
  chosen: should serve him
  alternatives:
  - served him
  - worshiped him
  - paid homage to him
  lexicon: HALOT
  rationale: The Aramaic verb can denote service, including religious service in Daniel.
    'Serve him' preserves the lexical value without over-resolving whether the emphasis
    is political allegiance, cultic service, or both. 'Should serve' reflects the
    result/purpose nuance after the grant of kingdom.
- source_word: שָׁלְטָנֵהּ שָׁלְטָן עָלַם
  chosen: His dominion is an everlasting dominion
  alternatives:
  - His dominion is an eternal dominion
  lexicon: HALOT
  rationale: The repeated noun is preserved for emphasis. 'Everlasting' is idiomatic
    biblical English for עָלַם here and suits the contrast with transient earthly
    kingdoms in the chapter.
- source_word: יֶעְדֵּה
  chosen: will not pass away
  alternatives:
  - will not be removed
  - will not cease
  lexicon: HALOT
  rationale: The verb conveys passing away or being removed. 'Will not pass away'
    is natural English and echoes the permanence theme.
- source_word: תִתְחַבַּל
  chosen: will not be destroyed
  alternatives:
  - will not be corrupted
  - will not be ruined
  lexicon: HALOT
  rationale: In context of kingdoms, the sense is destruction/ruin rather than moral
    corruption. 'Will not be destroyed' is the clearest contextual rendering.
