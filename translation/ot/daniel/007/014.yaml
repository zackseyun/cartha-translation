theological_decisions:
- issue: Meaning of יִפְלְחוּן toward the son-of-man figure
  chosen_reading: serve him
  alternative_readings:
  - worship him
  - pay homage to him
  rationale: The verb can carry religious-service overtones in Daniel, which is theologically
    significant in this vision. However, translating it as 'worship' would resolve
    an interpretive question more strongly than the Aramaic alone requires. 'Serve
    him' preserves the lexical form and leaves intact the text's theological tension
    regarding the nature of the universal service rendered to this figure.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
