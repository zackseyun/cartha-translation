id: DAN.7.16
reference: Daniel 7:16
source:
  edition: WLC
  text: קִרְבֵ֗ת עַל חַד֙ מִן קָ֣אֲמַיָּ֔/א וְ/יַצִּיבָ֥א אֶבְעֵֽא מִנֵּ֖/הּ עַֽל
    כָּל דְּנָ֑ה וַ/אֲמַר לִ֕/י וּ/פְשַׁ֥ר מִלַּיָּ֖/א יְהוֹדְעִנַּֽ/נִי־־־־־־׃
translation:
  text: I approached one of those standing there and asked him for certainty about
    all this. So he told me and made known to me the interpretation of the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the truth about all this'; the Aramaic term carries the sense of what
      is firm, certain, or true.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the interpretation of the words.' Here 'words' likely refers
      to the content or matter of the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבֵת
  chosen: I approached
  alternatives:
  - I came near
  - I drew near
  lexicon: HALOT
  rationale: Aramaic cognate of קרב, first person singular perfect in narrative sequence.
    'Approached' is natural modern English while preserving the movement toward someone.
- source_word: עַל חַד מִן קָאֲמַיָּא
  chosen: one of those standing there
  alternatives:
  - one of those standing by
  - one of those who were standing
  lexicon: HALOT
  rationale: The phrase refers to one among those standing nearby/in attendance. 'Standing
    there' captures the participial sense in readable English without over-specifying
    identity.
- source_word: וְיַצִּיבָא
  chosen: for certainty
  alternatives:
  - the truth
  - certainty
  - the certainty
  lexicon: HALOT
  rationale: Aramaic יַצִּיבָא commonly carries the sense of what is firm, certain,
    or true. In the idiom with בעא מן, Daniel seeks reliable understanding. 'For certainty'
    best reflects the nuance of asking for a sure explanation rather than merely abstract
    truth.
- source_word: אֶבְעֵא מִנֵּהּ
  chosen: I asked him
  alternatives:
  - I sought from him
  - I inquired of him
  lexicon: HALOT
  rationale: בעא with מן marks requesting or inquiring from someone. 'Asked him' is
    concise and idiomatic; the object sought is supplied by the following phrase.
- source_word: עַל כָּל דְּנָה
  chosen: about all this
  alternatives:
  - concerning all this
  - about all these things
  lexicon: HALOT
  rationale: A broad demonstrative reference to the whole vision or its contents.
    'All this' is natural English and suitably comprehensive.
- source_word: וַאֲמַר לִי
  chosen: So he told me
  alternatives:
  - And he said to me
  - Then he said to me
  lexicon: HALOT
  rationale: Narrative waw plus אמר introduces the response. 'So he told me' smooths
    the transition in English while preserving sequence.
- source_word: וּפְשַׁר מִלַּיָּא
  chosen: the interpretation of the matter
  alternatives:
  - the interpretation of the words
  - the meaning of the matter
  - the interpretation of these things
  lexicon: HALOT
  rationale: פשר is 'interpretation/explanation.' Though מִלַּיָּא is literally 'words,'
    in Daniel it can denote the content or matter under discussion. 'Interpretation
    of the matter' communicates the sense clearly in context.
- source_word: יְהוֹדְעִנַּנִי
  chosen: made known to me
  alternatives:
  - informed me
  - caused me to know
  lexicon: HALOT
  rationale: Haphel/causative of ידע, 'to make known.' 'Made known to me' preserves
    the causative force and biblical register without sounding archaic.
