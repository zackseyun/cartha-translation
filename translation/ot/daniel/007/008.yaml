id: DAN.7.8
reference: Daniel 7:8
source:
  edition: WLC
  text: מִשְׂתַּכַּ֨ל הֲוֵ֜ית בְּ/קַרְנַיָּ֗/א וַ֠/אֲלוּ קֶ֣רֶן אָחֳרִ֤י זְעֵירָה֙
    סִלְקָ֣ת ביני/הון וּ/תְלָ֗ת מִן קַרְנַיָּ/א֙ קַדְמָ֣יָתָ֔/א אתעקרו מִן קדמי/ה
    וַ/אֲל֨וּ עַיְנִ֜ין כְּ/עַיְנֵ֤י אֲנָשָׁ/א֙ בְּ/קַרְנָ/א דָ֔א וּ/פֻ֖ם מְמַלִּ֥ל
    רַבְרְבָֽן־־־׃
translation:
  text: I was considering the horns, and behold, another horn, a little one, came
    up among them, and three of the first horns were uprooted before it. And behold,
    in this horn were eyes like the eyes of a man, and a mouth speaking great things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eyes like human eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a mouth speaking boastful things' or 'uttering great boasts.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִשְׂתַּכַּל הֲוֵית
  chosen: I was considering
  alternatives:
  - I was looking at
  - I kept watching
  lexicon: HALOT
  rationale: The participle with the auxiliary expresses ongoing past action in Daniel's
    vision. 'I was considering' preserves the reflective, attentive force better than
    the simpler 'I was looking at,' while remaining natural English.
- source_word: בְּקַרְנַיָּא
  chosen: the horns
  lexicon: HALOT
  rationale: Definite plural 'the horns' matches the Aramaic determined form and the
    immediate context of the beast's horns.
- source_word: וַאֲלוּ
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: HALOT
  rationale: This discourse particle marks a vivid visionary transition. 'Behold'
    preserves the elevated, apocalyptic tone better than more colloquial alternatives.
- source_word: קֶרֶן אָחֳרִי זְעֵירָה
  chosen: another horn, a little one
  alternatives:
  - another horn, a small one
  - a different little horn
  lexicon: HALOT
  rationale: אָחֳרִי means 'another/other,' and זְעֵירָה means 'small/little.' The
    appositional English 'another horn, a little one' closely reflects the Aramaic
    sequence and avoids importing later technical terminology beyond the text itself.
- source_word: סִלְקָת
  chosen: came up
  alternatives:
  - arose
  - went up
  lexicon: HALOT
  rationale: In this visionary context of horns emerging, 'came up' is idiomatic and
    visually clear. 'Arose' is possible, but 'came up' better matches the imagery.
- source_word: ביניהון
  chosen: among them
  alternatives:
  - between them
  lexicon: HALOT
  rationale: With a plural antecedent ('horns'), English idiom prefers 'among them.'
- source_word: וּתְלָת מִן קַרְנַיָּא קַדְמָיָתָא
  chosen: three of the first horns
  alternatives:
  - three of the former horns
  - three of the earlier horns
  lexicon: HALOT
  rationale: קַדְמָיָתָא denotes those earlier or first in sequence. 'First horns'
    is concise and fits the narrative order.
- source_word: אתעקרו
  chosen: were uprooted
  alternatives:
  - were pulled out by the roots
  - were torn out
  lexicon: HALOT
  rationale: The passive/reflexive form from the root 'uproot' is well represented
    by 'were uprooted,' preserving the force of violent removal.
- source_word: מִן קֳדָמֵיהּ
  chosen: before it
  alternatives:
  - from before it
  - in front of it
  lexicon: HALOT
  rationale: The phrase can denote position in front of or presence before. In context,
    'before it' is the most natural English rendering and leaves the exact nuance
    broad enough.
- source_word: עַיְנִין כְּעַיְנֵי אֲנָשָׁא
  chosen: eyes like the eyes of a man
  alternatives:
  - eyes like human eyes
  - eyes like a man's eyes
  lexicon: HALOT
  rationale: The simile is explicit and singular אֲנָשָׁא here is best rendered 'a
    man' rather than generalized 'human' in the main text, in keeping with the translation
    philosophy's gender-accurate principle. A more idiomatic alternative is preserved
    in a footnote.
- source_word: בְּקַרְנָא דָא
  chosen: in this horn were
  alternatives:
  - this horn had
  - in that horn there were
  lexicon: HALOT
  rationale: The prepositional phrase is literally 'in this horn.' Rendering it as
    'in this horn were' preserves the imagery of features appearing in the horn, rather
    than flattening it to simple possession.
- source_word: וּפֻם מְמַלִּל רַבְרְבָן
  chosen: and a mouth speaking great things
  alternatives:
  - and a mouth speaking boastful things
  - and a mouth uttering great boasts
  lexicon: HALOT
  rationale: Literally, the phrase is 'a mouth speaking great things.' Because 'great
    things' can carry either grandeur or arrogance depending on context, the more
    literal rendering is kept in the main text, with the interpretive alternative
    'boastful things' preserved in a footnote.
