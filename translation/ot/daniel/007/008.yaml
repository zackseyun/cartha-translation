theological_decisions:
- issue: Whether רַבְרְבָן should be rendered interpretively as arrogant speech
  chosen_reading: great things
  alternative_readings:
  - boastful things
  - great boasts
  rationale: The Aramaic expression is formally 'great things' and only contextually
    suggests arrogance or blasphemous boasting. To preserve the text's wording and
    avoid over-interpreting at this point in the verse, the main text keeps the literal
    expression, while a footnote preserves the contextual alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
