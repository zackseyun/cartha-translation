theological_decisions:
- issue: Referent of 'his dominion'
  chosen_reading: The pronoun refers to the arrogant end-time ruler/little horn represented
    in the preceding context, without expanding the text to identify him beyond Daniel's
    vision.
  alternative_readings:
  - The pronoun refers more broadly to the fourth beast's dominion as a whole
  rationale: The immediate context emphasizes judgment on the blasphemous horn, yet
    the horn is inseparable from the beastly kingdom. The translation keeps the singular
    pronoun as given and avoids importing a more specific theological identification
    than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
