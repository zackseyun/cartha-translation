id: DAN.7.26
reference: Daniel 7:26
source:
  edition: WLC
  text: וְ/דִינָ֖/א יִתִּ֑ב וְ/שָׁלְטָנֵ֣/הּ יְהַעְדּ֔וֹן לְ/הַשְׁמָדָ֥ה וּ/לְ/הוֹבָדָ֖ה
    עַד סוֹפָֽ/א־׃
translation:
  text: But the court will sit, and his dominion will be taken away, to be destroyed
    and to be annihilated to the end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the judgment will sit"; the Aramaic may emphasize either the convening
      of the court or the judicial session itself.
    reason: lexical_alternative
  - marker: b
    text: Or "his rule" or "his authority."
    reason: lexical_alternative
  - marker: c
    text: Or "until the end"; the phrase underscores the finality of the judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִינָא
  chosen: the court
  alternatives:
  - judgment
  - the tribunal
  lexicon: HALOT
  rationale: In Biblical Aramaic this noun can denote judicial process or the judicial
    body/session. Here, with the following verb 'will sit,' the sense is the heavenly
    court convening rather than an abstract 'judgment' alone.
- source_word: יִתִּב
  chosen: will sit
  alternatives:
  - will take its seat
  - shall sit
  lexicon: HALOT
  rationale: The verb literally means 'sit.' In this courtroom context it refers to
    the court taking its seat or convening. 'Will sit' preserves the imagery while
    remaining natural English.
- source_word: שָׁלְטָנֵהּ
  chosen: his dominion
  alternatives:
  - his rule
  - his authority
  lexicon: HALOT
  rationale: The noun denotes ruling power or dominion. 'Dominion' fits the royal-apocalyptic
    context and matches the repeated theme of transferred kingdoms in Daniel 7.
- source_word: יְהַעְדּוֹן
  chosen: will be taken away
  alternatives:
  - they will remove
  - will take away
  lexicon: HALOT
  rationale: 'The plural verb has an indefinite/impersonal force in context: the court''s
    action results in the removal of the beastly ruler''s dominion. English passive
    best captures the sense without forcing an explicit subject not stated in the
    text.'
- source_word: לְהַשְׁמָדָה
  chosen: to be destroyed
  alternatives:
  - for destruction
  - to destroy
  lexicon: HALOT
  rationale: This infinitival form expresses purpose/result following the removal
    of dominion. Passive English ('to be destroyed') reflects that the dominion is
    the object undergoing destruction.
- source_word: וּלְהוֹבָדָה
  chosen: and to be annihilated
  alternatives:
  - and to perish
  - and to be consumed
  - and to be ruined
  lexicon: HALOT
  rationale: The paired infinitives intensify the totality of the judgment. 'Annihilated'
    conveys the force of complete undoing more strongly than the broader 'ruined,'
    while preserving the climactic parallelism with 'destroyed.'
- source_word: עַד סוֹפָא
  chosen: to the end
  alternatives:
  - until the end
  - completely
  lexicon: HALOT
  rationale: Literally 'until the end.' In context it marks the finality and completeness
    of the judgment. 'To the end' is concise and preserves the phrase's eschatological
    tone.
