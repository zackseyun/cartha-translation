theological_decisions:
- issue: Referent of the fourth beast
  chosen_reading: Rendered as 'the fourth beast will be a fourth kingdom' following
    the angelic interpretation within the vision.
  alternative_readings:
  - The beast could be left less explicitly political in translation
  rationale: The Aramaic text itself identifies the beast as a kingdom, so the translation
    should preserve that interpretive identification rather than merely repeat the
    symbol.
