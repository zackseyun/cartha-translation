id: DAN.7.23
reference: Daniel 7:23
source:
  edition: WLC
  text: כֵּן֮ אֲמַר֒ חֵֽיוְתָ/א֙ רְבִיעָ֣יְתָ֔/א מַלְכ֤וּ רביעי/א תֶּהֱוֵ֣א בְ/אַרְעָ֔/א
    דִּ֥י תִשְׁנֵ֖א מִן כָּל מַלְכְוָתָ֑/א וְ/תֵאכֻל֙ כָּל אַרְעָ֔/א וּ/תְדוּשִׁנַּ֖/הּ
    וְ/תַדְּקִנַּֽ/הּ־־־׃
translation:
  text: 'Thus he said: ‘The fourth beast will be a fourth kingdom on the earth, which
    will be different from all the kingdoms; and it will devour the whole earth and
    trample it down and crush it.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which will differ from all the kingdoms.”
    reason: lexical_alternative
  - marker: b
    text: Or “and break it in pieces.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: Thus
  alternatives:
  - So
  lexicon: HALOT
  rationale: Introduces the explanation that follows. 'Thus' fits the formal explanatory
    tone of the vision report better than the more colloquial 'So.'
- source_word: אֲמַר
  chosen: he said
  alternatives:
  - said
  lexicon: HALOT
  rationale: Simple narrative reporting verb in the singular masculine; English supplies
    the subject naturally as 'he' from context.
- source_word: חֵיוְתָא רְבִיעָיְתָא
  chosen: the fourth beast
  alternatives:
  - the fourth animal
  lexicon: HALOT
  rationale: In Daniel 7 the visionary creatures are conventionally and accurately
    rendered 'beasts,' preserving the ominous apocalyptic force better than the broader
    'animal.'
- source_word: מַלְכוּ
  chosen: kingdom
  alternatives:
  - reign
  - royal dominion
  lexicon: HALOT
  rationale: Here the beast is explicitly interpreted as a political realm, so 'kingdom'
    is the most direct and idiomatic rendering.
- source_word: רביעיא
  chosen: a fourth
  alternatives:
  - the fourth
  lexicon: HALOT
  rationale: 'Used predicatively with ''kingdom'': ''will be a fourth kingdom.'' English
    idiom prefers the indefinite article in this construction.'
- source_word: תֶּהֱוֵא
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future/existential sense; 'will be' is clear modern English.
- source_word: בְאַרְעָא
  chosen: on the earth
  alternatives:
  - in the land
  - on the land
  lexicon: HALOT
  rationale: In the cosmic-imperial scope of Daniel 7, אַרְעָא refers broadly to the
    earth/world rather than a local land.
- source_word: דִּי תִשְׁנֵא
  chosen: which will be different
  alternatives:
  - which will differ
  - which will be changed
  lexicon: HALOT
  rationale: The verb conveys being different/distinct from others. 'Will be different'
    is natural English and preserves the comparative force.
- source_word: מִן כָּל מַלְכְוָתָא
  chosen: from all the kingdoms
  alternatives:
  - from every kingdom
  - than all the kingdoms
  lexicon: HALOT
  rationale: Plural is explicit. 'From all the kingdoms' works smoothly with 'different'
    in English; the sense is comparative distinction from all the others.
- source_word: וְתֵאכֻל כָּל אַרְעָא
  chosen: and it will devour the whole earth
  alternatives:
  - and it will consume the whole earth
  - and it will devour all the earth
  lexicon: HALOT
  rationale: The imagery is violent and beastly; 'devour' preserves that metaphor
    better than the flatter 'consume.' 'Whole earth' reflects כָּל with broad scope.
- source_word: וּתְדוּשִׁנַּהּ
  chosen: and trample it down
  alternatives:
  - and tread it down
  - and trample it
  lexicon: HALOT
  rationale: The verb denotes trampling/treading underfoot. 'Trample it down' captures
    both the action and its destructive force.
- source_word: וְתַדְּקִנַּהּ
  chosen: and crush it
  alternatives:
  - and break it in pieces
  - and pulverize it
  lexicon: HALOT
  rationale: The verb intensifies the destruction after trampling. 'Crush it' is strong,
    readable English; 'break it in pieces' is possible but more cumbersome here.
