id: DAN.7.27
reference: Daniel 7:27
source:
  edition: WLC
  text: וּ/מַלְכוּתָ֨/ה וְ/שָׁלְטָנָ֜/א וּ/רְבוּתָ֗/א דִּ֚י מַלְכְוָת֙ תְּח֣וֹת כָּל
    שְׁמַיָּ֔/א יְהִיבַ֕ת לְ/עַ֖ם קַדִּישֵׁ֣י עֶלְיוֹנִ֑ין מַלְכוּתֵ/הּ֙ מַלְכ֣וּת
    עָלַ֔ם וְ/כֹל֙ שָׁלְטָ֣נַיָּ֔/א לֵ֥/הּ יִפְלְח֖וּן וְ/יִֽשְׁתַּמְּעֽוּן־׃
translation:
  text: And the kingdom and the dominion and the greatness of the kingdoms under all
    heaven shall be given to the people of the saints of the Most High. His kingdom
    shall be an everlasting kingdom, and all dominions shall serve him and obey him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of the holy ones of the Most High' or 'the holy people of
      the Most High.'
    reason: lexical_alternative
  - marker: b
    text: 'The Aramaic has singular pronouns: ''His kingdom ... all dominions shall
      serve him and obey him.'' This may point to the representative ruler seen earlier
      in the vision, even as the kingdom is given to the saints.'
    reason: alternative_reading
  - marker: c
    text: '''Serve'' can also carry the sense ''worship'' in Daniel when the service
      is rendered to deity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכוּתָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: Aramaic מַלְכוּת can denote kingdom or kingship. Here, in a triad with
    dominion and greatness and followed by 'of the kingdoms under all heaven,' 'kingdom'
    best captures the concrete and abstract sense together in natural English.
- source_word: שָׁלְטָנָא
  chosen: the dominion
  alternatives:
  - the authority
  - the rule
  lexicon: HALOT
  rationale: The term denotes ruling power or dominion. 'Dominion' preserves the political-sovereign
    nuance and matches the repeated use later in the verse.
- source_word: רְבוּתָא
  chosen: the greatness
  alternatives:
  - the majesty
  - the grandeur
  lexicon: HALOT
  rationale: The noun refers to greatness or magnitude. 'Greatness' is straightforward
    and preserves the elevated register without overinterpreting as purely royal splendor.
- source_word: דִּי מַלְכְוָת תְּחוֹת כָּל שְׁמַיָּא
  chosen: of the kingdoms under all heaven
  alternatives:
  - belonging to the kingdoms under the whole heaven
  - of the kingdoms beneath all the heavens
  lexicon: HALOT
  rationale: This genitival/relative construction identifies the scope of world rule.
    'Under all heaven' is a natural English rendering of the idiom for the whole world
    order.
- source_word: יְהִיבַת
  chosen: shall be given
  alternatives:
  - was given
  - is given
  lexicon: HALOT
  rationale: Though formally a perfect, in this apocalyptic context it functions predictively
    in sequence with the vision's future outcome. English future best conveys the
    sense.
- source_word: לְעַם
  chosen: to the people
  alternatives:
  - to the nation
  - to the folk
  lexicon: HALOT
  rationale: עַם here is collective. 'People' is the most natural collective rendering
    in English and avoids implying a modern nation-state.
- source_word: קַדִּישֵׁי עֶלְיוֹנִין
  chosen: of the saints of the Most High
  alternatives:
  - of the holy ones of the Most High
  - of the holy people of the Most High
  lexicon: HALOT
  rationale: קַדִּישִׁין can mean holy ones/saints. In Daniel 7 the phrase is central
    and may denote the holy people belonging to God. 'Saints of the Most High' preserves
    the traditional and lexical sense while allowing the collective force to stand.
- source_word: מַלְכוּתֵהּ
  chosen: His kingdom
  alternatives:
  - their kingdom
  - its kingdom
  lexicon: HALOT
  rationale: The 3ms suffix is singular. Given the following singular pronouns ('serve
    him and obey him'), the most coherent referent in context is the representative
    ruler associated with the preceding vision, while the kingdom is also shared with
    the saints. The singular should be preserved rather than flattened.
- source_word: מַלְכוּת עָלַם
  chosen: an everlasting kingdom
  alternatives:
  - an eternal kingdom
  - a kingdom forever
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Everlasting kingdom' is idiomatic
    and weighty without sounding archaic.
- source_word: שָׁלְטָנַיָּא
  chosen: all dominions
  alternatives:
  - all rulers
  - all authorities
  - all powers
  lexicon: HALOT
  rationale: The plural noun most naturally refers to ruling authorities or dominions.
    'All dominions' keeps the lexical link with earlier שָׁלְטָנָא and leaves open
    whether the focus is on realms or their governing powers.
- source_word: יִפְלְחוּן
  chosen: shall serve him
  alternatives:
  - shall worship him
  - shall minister to him
  lexicon: HALOT
  rationale: The verb can denote service and, in Daniel, often service rendered to
    deity. Here 'serve' is the broadest rendering and avoids prematurely narrowing
    the sense to cultic worship, while still allowing that implication in context.
- source_word: וְיִשְׁתַּמְּעוּן
  chosen: and obey him
  alternatives:
  - and listen to him
  - and be subject to him
  lexicon: HALOT
  rationale: The verb literally involves hearing/listening, but in royal contexts
    carries the sense of obedience. 'Obey him' best fits the parallel with 'serve
    him' and the political setting.
