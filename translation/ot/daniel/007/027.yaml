theological_decisions:
- issue: Referent of the singular pronouns in the second sentence
  chosen_reading: 'Retain the singular: ''His kingdom ... serve him and obey him,''
    allowing the text''s tension between the saints receiving the kingdom and the
    singular ruler''s everlasting reign to remain.'
  alternative_readings:
  - 'Pluralize conceptually: ''their kingdom ... serve and obey them'' to align with
    ''the people of the saints'''
  - 'Impersonalize: ''the kingdom shall be everlasting, and all dominions shall serve
    and obey it'''
  rationale: The Aramaic uses singular suffixes/pronouns. In the broader chapter,
    dominion is given both to 'one like a son of man' and to 'the saints of the Most
    High.' Preserving the singular maintains the textual tension rather than resolving
    it by interpretation, in keeping with the translation philosophy.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Meaning of 'saints of the Most High'
  chosen_reading: Translate as 'the people of the saints of the Most High' with 'saints'
    retained in the main text.
  alternative_readings:
  - '''the holy people of the Most High'''
  - '''the people of the holy ones of the Most High'''
  rationale: The phrase may be understood corporately as God's holy people, but the
    lexical value of קַדִּישֵׁי is 'holy ones/saints.' Retaining 'saints' preserves
    the wording while the collective noun 'people' clarifies that a community is in
    view.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented
    exception.
