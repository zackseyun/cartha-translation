theological_decisions:
- issue: רוּחֵי in an apocalyptic vision
  chosen_reading: winds
  alternative_readings:
  - spirits
  rationale: The noun can denote either 'winds' or 'spirits.' In this immediate context,
    the image of four heavenly forces agitating the sea favors 'winds' as the main
    text rendering. Because Daniel 7 is apocalyptic and symbolic, 'spirits' remains
    a meaningful interpretive alternative and is preserved in a footnote rather than
    resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
