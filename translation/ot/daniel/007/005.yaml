id: DAN.7.5
reference: Daniel 7:5
source:
  edition: WLC
  text: וַ/אֲר֣וּ חֵיוָה֩ אָחֳרִ֨י תִנְיָנָ֜ה דָּמְיָ֣ה לְ/דֹ֗ב וְ/לִ/שְׂטַר חַד֙
    הֳקִמַ֔ת וּ/תְלָ֥ת עִלְעִ֛ין בְּ/פֻמַּ֖/הּ בֵּ֣ין שני/ה וְ/כֵן֙ אָמְרִ֣ין לַ֔/הּ
    ק֥וּמִֽי אֲכֻ֖לִי בְּשַׂ֥ר שַׂגִּֽיא־׃
translation:
  text: 'And look, another beast, a second one, resembling a bear; it was raised up
    on one side, and three ribs were in its mouth between its teeth. And this is what
    they were saying to it: “Arise, eat much flesh.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “three tusks” instead of “three ribs,” though “ribs” better
      fits the phrase “between its teeth.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “raised up on one side” may also be understood as “raised up
      on one flank,” emphasizing the beast’s uneven posture.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרוּ
  chosen: And look
  alternatives:
  - And behold
  - Then I saw
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing a new sight in the vision. 'And
    look' preserves the vivid deictic force in readable modern English better than
    the more archaic 'behold.'
- source_word: חֵיוָה
  chosen: beast
  alternatives:
  - living creature
  - animal
  lexicon: HALOT
  rationale: In Daniel 7 the term refers to symbolic empire-beasts, so 'beast' best
    matches the visionary and ominous context.
- source_word: אָחֳרִי תִנְיָנָה
  chosen: another beast, a second one
  alternatives:
  - another, a second beast
  - a second beast
  lexicon: HALOT
  rationale: 'Both adjectives are retained: one marks succession (''another''), the
    other ordinal position (''second''). The English phrasing preserves both without
    sounding wooden.'
- source_word: דָּמְיָה לְדֹב
  chosen: resembling a bear
  alternatives:
  - like a bear
  - similar to a bear
  lexicon: HALOT
  rationale: The participial form expresses resemblance. 'Resembling a bear' is slightly
    smoother than 'like a bear' while preserving the comparison.
- source_word: וְלִשְׂטַר חַד הֳקִמַת
  chosen: it was raised up on one side
  alternatives:
  - it was set up on one side
  - it was raised up on one flank
  lexicon: HALOT
  rationale: 'The phrase is difficult, but the plain sense is asymmetry: the beast
    is elevated on one side. ''Raised up'' reflects the passive/resultative sense
    of the Hoph''al, and ''one side'' is the most natural rendering of לִשְׂטַר חַד.'
- source_word: וּתְלָת עִלְעִין
  chosen: three ribs
  alternatives:
  - three tusks
  lexicon: HALOT
  rationale: The noun is commonly understood as 'ribs' in this context, fitting the
    image of prey remains in the beast's mouth. 'Tusks' is a minority lexical possibility
    but less likely with 'between its teeth.'
- source_word: בְּפֻמַּהּ בֵּין שניּה
  chosen: were in its mouth between its teeth
  alternatives:
  - were in its mouth among its teeth
  lexicon: HALOT
  rationale: 'This preserves both locative expressions: the ribs are in the mouth,
    specifically situated between the teeth.'
- source_word: וְכֵן אָמְרִין לַהּ
  chosen: And this is what they were saying to it
  alternatives:
  - And thus they said to it
  - And so they said to it
  lexicon: HALOT
  rationale: The plural verb has an indefinite subject ('they'). 'This is what they
    were saying' conveys the idiomatic force of וְכֵן in context without over-specifying
    the speakers.
- source_word: קוּמִי
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: An imperative addressed to the feminine beast. 'Arise' preserves the
    elevated tone of the vision better than the more colloquial 'get up.'
- source_word: אֲכֻלִי בְּשַׂר שַׂגִּיא
  chosen: eat much flesh
  alternatives:
  - devour much flesh
  - eat a great amount of flesh
  lexicon: HALOT
  rationale: בְּשַׂר is literally 'flesh,' and שַׂגִּיא means 'much/great.' 'Eat much
    flesh' stays close to the imagery without adding the stronger verb 'devour,' which
    the source does not explicitly use.
