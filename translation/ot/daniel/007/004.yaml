id: DAN.7.4
reference: Daniel 7:4
source:
  edition: WLC
  text: קַדְמָיְתָ֣/א כְ/אַרְיֵ֔ה וְ/גַפִּ֥ין דִּֽי נְשַׁ֖ר לַ֑/הּ חָזֵ֣ה הֲוֵ֡ית
    עַד֩ דִּי מְּרִ֨יטוּ גַפַּ֜י/הּ וּ/נְטִ֣ילַת מִן אַרְעָ֗/א וְ/עַל רַגְלַ֨יִן֙
    כֶּ/אֱנָ֣שׁ הֳקִימַ֔ת וּ/לְבַ֥ב אֱנָ֖שׁ יְהִ֥יב לַֽ/הּ־־־־׃
translation:
  text: The first was like a lion, and it had the wings of an eagle. I kept watching
    until its wings were plucked off, and it was lifted up from the earth and made
    to stand on two feet like a man, and a human heart was given to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its wings were torn off' or 'stripped off.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'made to stand on feet like a man.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a man's heart was given to it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדְמָיְתָא
  chosen: The first
  alternatives:
  - The first one
  - The former
  lexicon: HALOT
  rationale: Ordinal feminine singular referring to the first beast in the sequence.
    English supplies 'The first' naturally.
- source_word: כְאַרְיֵה
  chosen: was like a lion
  alternatives:
  - was like the lion
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, not identity. 'Like a lion' preserves
    the visionary simile.
- source_word: וְגַפִּין דִּי נְשַׁר לַהּ
  chosen: and it had the wings of an eagle
  alternatives:
  - and eagle's wings were to it
  - and it had eagle wings
  lexicon: HALOT
  rationale: The Aramaic construction literally means 'and wings of an eagle were
    to it.' Idiomatic English expresses possession with 'it had.' Singular 'eagle'
    after 'wings of' is natural and reflects the construct sense.
- source_word: חָזֵה הֲוֵית
  chosen: I kept watching
  alternatives:
  - I was watching
  - I watched
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing past action in the
    vision. 'I kept watching' captures the durative force better than simple past.
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - until that
  - while
  lexicon: HALOT
  rationale: Standard temporal conjunction introducing the point reached in the vision.
- source_word: מְּרִיטוּ גַפַּיהּ
  chosen: its wings were plucked off
  alternatives:
  - its wings were torn off
  - its wings were stripped off
  lexicon: HALOT
  rationale: The verb denotes plucking or pulling out/off. 'Plucked off' is vivid
    and fits the imagery of wings being removed.
- source_word: וּנְטִילַת מִן אַרְעָא
  chosen: and it was lifted up from the earth
  alternatives:
  - and it was taken up from the earth
  - and it was raised from the ground
  lexicon: HALOT
  rationale: Passive sense with feminine subject continuing the beast imagery. 'Lifted
    up' is straightforward and preserves the movement away from the earth.
- source_word: וְעַל רַגְלַיִן כֶּאֱנָשׁ הֳקִימַת
  chosen: and made to stand on two feet like a man
  alternatives:
  - and set on feet like a man
  - and caused to stand on feet like a human
  lexicon: HALOT
  rationale: The causative verb indicates the beast was caused to stand upright. 'Two
    feet' is supplied in idiomatic English because standing 'on two feet' is the natural
    sense of the dual/plural body-part expression in this context.
- source_word: אֱנָשׁ
  chosen: a man
  alternatives:
  - a human being
  lexicon: HALOT
  rationale: Here the comparison is to an individual human figure standing upright,
    so 'a man' is the most natural gender-accurate rendering. The following phrase
    uses 'human' in English to avoid awkward repetition while preserving sense.
- source_word: וּלְבַב אֱנָשׁ יְהִיב לַהּ
  chosen: and a human heart was given to it
  alternatives:
  - and the heart of a man was given to it
  - and a man's heart was given to it
  lexicon: HALOT
  rationale: The phrase denotes the granting of human-like inner disposition or mind.
    'Human heart' is idiomatic modern English and preserves the contrast with the
    beastly form.
