theological_decisions:
- issue: Anthropological wording in the beast-to-human comparison
  chosen_reading: Render כֶּאֱנָשׁ as 'like a man' and לְבַב אֱנָשׁ as 'a human heart'
  alternative_readings:
  - like a human being / a man's heart
  - like a man / a man's heart
  rationale: The verse contrasts beastly imagery with human characteristics. Following
    the project's gender-accurate policy, 'a man' is retained where the image is of
    an individual upright human figure, while 'human heart' is used in the final clause
    for natural English and to emphasize the human/beast contrast rather than male
    sex specifically.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
