id: DAN.7.3
reference: Daniel 7:3
source:
  edition: WLC
  text: וְ/אַרְבַּ֤ע חֵיוָן֙ רַבְרְבָ֔ן סָלְקָ֖ן מִן יַמָּ֑/א שָׁנְיָ֖ן דָּ֥א מִן
    דָּֽא־־׃
translation:
  text: And four great beasts were coming up from the sea, different from one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבַּע
  chosen: And four
  alternatives:
  - Then four
  lexicon: HALOT
  rationale: The conjunction plus numeral straightforwardly introduces the next element
    in the vision sequence. 'And four' preserves the simple connective without overinterpreting
    temporal nuance.
- source_word: חֵיוָן
  chosen: beasts
  alternatives:
  - living creatures
  - animals
  lexicon: HALOT
  rationale: In Daniel's apocalyptic vision, the term refers to monstrous animal-like
    entities representing kingdoms. 'Beasts' best captures both the zoological sense
    and the ominous symbolic force in natural English.
- source_word: רַבְרְבָן
  chosen: great
  alternatives:
  - large
  - huge
  lexicon: HALOT
  rationale: The adjective denotes greatness or largeness. 'Great' is idiomatic with
    'beasts' in English and preserves both size and grandeur/terribleness better than
    the flatter 'large.'
- source_word: סָלְקָן
  chosen: were coming up
  alternatives:
  - came up
  - were ascending
  lexicon: HALOT
  rationale: The participial/verbal form depicts ascent from the sea in the visionary
    scene. 'Were coming up' conveys ongoing action in context more naturally than
    the more wooden 'were ascending,' while preserving the movement imagery.
- source_word: מִן יַמָּא
  chosen: from the sea
  alternatives:
  - out of the sea
  lexicon: HALOT
  rationale: The preposition marks source. 'From the sea' is concise and natural;
    'out of the sea' is also possible, but the shorter form adequately preserves the
    sense.
- source_word: שָׁנְיָן
  chosen: different
  alternatives:
  - distinct
  - changing
  lexicon: HALOT
  rationale: Here the word means being different or altered in relation to another.
    'Different' is the clearest modern English rendering in this comparative construction.
- source_word: דָּא מִן דָּא
  chosen: from one another
  alternatives:
  - one from another
  - this from that
  lexicon: HALOT
  rationale: This idiom expresses mutual differentiation among the four beasts. 'From
    one another' is idiomatic English and accurately conveys the reciprocal comparison.
