theological_decisions:
- issue: Symbolic force of חֵיוָן in an apocalyptic context
  chosen_reading: Rendered as 'beasts' rather than a neutral zoological term
  alternative_readings:
  - living creatures
  - animals
  rationale: The verse introduces symbolic creatures arising from the sea, later interpreted
    as kingdoms. 'Beasts' preserves the apocalyptic and political symbolism without
    importing later theological interpretation into the text itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without flattening theological weight.'
