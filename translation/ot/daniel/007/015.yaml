id: DAN.7.15
reference: Daniel 7:15
source:
  edition: WLC
  text: אֶתְכְּרִיַּ֥ת רוּחִ֛/י אֲנָ֥ה דָנִיֵּ֖אל בְּ/ג֣וֹא נִדְנֶ֑ה וְ/חֶזְוֵ֥י רֵאשִׁ֖/י
    יְבַהֲלֻנַּֽ/נִי׃
translation:
  text: As for me, Daniel, my spirit was distressed within its sheath, and the visions
    of my head terrified me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within my body.' The Aramaic term rendered 'sheath' is a rare metaphor
      for the bodily frame enclosing the spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתְכְּרִיַּת
  chosen: was distressed
  alternatives:
  - was grieved
  - was pierced
  - was troubled
  lexicon: HALOT
  rationale: The verb denotes being troubled or pained inwardly. 'Was distressed'
    captures the emotional and internal agitation in natural English without overcommitting
    to a more literal but opaque image such as 'was pierced.'
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my spirit/wind
  - my mind
  lexicon: HALOT
  rationale: רוּחַ here refers to Daniel's inner spirit rather than wind or breath.
    'My spirit' preserves the anthropological sense and matches the inward disturbance
    described.
- source_word: בְּגוֹא
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: The preposition-noun combination indicates interior location. 'Within'
    is concise and idiomatic in English.
- source_word: נִדְנֶה
  chosen: its sheath
  alternatives:
  - its body
  - the sheath
  - the case
  lexicon: HALOT
  rationale: The Aramaic noun is a rare term commonly understood as a sheath or casing,
    metaphorically the bodily frame containing the spirit. 'Its sheath' preserves
    the vivid metaphor better than the interpretive 'body.' Because the image may
    be unfamiliar, an alternative is preserved in a footnote.
- source_word: חֶזְוֵי
  chosen: the visions
  alternatives:
  - visions
  - appearances
  lexicon: HALOT
  rationale: In Daniel's apocalyptic context, the term refers to visionary sights.
    'The visions' is the most natural and contextually precise rendering.
- source_word: רֵאשִׁי
  chosen: of my head
  alternatives:
  - in my head
  - of my mind
  lexicon: HALOT
  rationale: The phrase is formally 'of my head.' Retaining it reflects the source
    wording and fits Daniel's recurring idiom for visionary experience, rather than
    flattening it to 'in my mind.'
- source_word: יְבַהֲלֻנַּנִי
  chosen: terrified me
  alternatives:
  - alarmed me
  - troubled me
  - frightened me
  lexicon: HALOT
  rationale: The verb conveys strong fear or alarm. 'Terrified me' best matches the
    intensity of Daniel's reaction in this immediate context.
