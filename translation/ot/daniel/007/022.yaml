theological_decisions:
- issue: Sense of the legal clause וְדִינָא יְהִב לְקַדִּישֵׁי עֶלְיוֹנִין
  chosen_reading: judgment was given for the saints of the Most High
  alternative_readings:
  - judgment was given to the saints of the Most High
  - justice was done for the saints of the Most High
  rationale: The context is the vindication of the holy ones after persecution by
    the horn. Rendering the preposition as benefactive ('for,' i.e., in favor of)
    preserves that legal vindication without overinterpreting beyond the text. The
    alternative 'to' is grammatically possible and worth preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Referent of 'the saints'
  chosen_reading: the saints
  alternative_readings:
  - the holy ones
  rationale: The term is left broad enough to match the text's own designation for
    the covenant people without importing a narrower denominational or eschatological
    system.
  doctrine_reference: Within historic ecumenical orthodoxy; do not import doctrinal
    claims the text does not make
