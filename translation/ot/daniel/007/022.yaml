id: DAN.7.22
reference: Daniel 7:22
source:
  edition: WLC
  text: עַ֣ד דִּֽי אֲתָ֗ה עַתִּיק֙ יֽוֹמַיָּ֔/א וְ/דִינָ֣/א יְהִ֔ב לְ/קַדִּישֵׁ֖י
    עֶלְיוֹנִ֑ין וְ/זִמְנָ֣/א מְטָ֔ה וּ/מַלְכוּתָ֖/א הֶחֱסִ֥נוּ קַדִּישִֽׁין־׃
translation:
  text: until the Ancient of Days came, and judgment was given for the saints of the
    Most High, and the time arrived, and the saints took possession of the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment was given to the saints of the Most High.' The Aramaic preposition
      can be understood either as benefactive ('for,' in their favor) or as indirect
      object ('to').
    reason: alternative_reading
  - marker: b
    text: Or 'the holy ones of the Most High.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the saints possessed the kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - until that
  - until when
  lexicon: HALOT
  rationale: 'The Aramaic sequence introduces the temporal limit of the preceding
    oppression: ''until'' is the most natural English rendering and fits the clause
    structure.'
- source_word: אֲתָה
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The verb denotes coming/arrival. 'Came' is idiomatic and preserves the
    narrative force.
- source_word: עַתִּיק יוֹמַיָּא
  chosen: the Ancient of Days
  alternatives:
  - the Ancient One of Days
  lexicon: HALOT
  rationale: This is the established and accurate rendering of the divine title in
    Daniel 7. It preserves the imagery of venerable antiquity without paraphrase.
- source_word: וְדִינָא יְהִב
  chosen: and judgment was given
  alternatives:
  - and justice was given
  - and a judicial decision was rendered
  lexicon: HALOT
  rationale: דִּין can denote judgment, legal decision, or justice. 'Judgment was
    given' best reflects the passive-like Aramaic expression and keeps the forensic
    sense concise.
- source_word: לְקַדִּישֵׁי עֶלְיוֹנִין
  chosen: for the saints of the Most High
  alternatives:
  - to the holy ones of the Most High
  - for the holy ones of the Most High
  lexicon: HALOT
  rationale: 'The preposition here is best taken in a benefactive sense in context:
    the judgment is rendered in favor of God''s people. ''Saints'' is a standard rendering
    for קַדִּישִׁין/קַדִּישֵׁי and remains understandable in modern English. ''Most
    High'' is retained as the divine title reflected by עֶלְיוֹנִין.'
- source_word: וְזִמְנָא מְטָה
  chosen: and the time arrived
  alternatives:
  - and the time came
  - and the appointed time arrived
  lexicon: HALOT
  rationale: The clause marks the arrival of the decisive moment. 'Arrived' avoids
    repetition with the earlier 'came' while preserving the temporal sense. 'Appointed'
    is possible but not explicit in the Aramaic.
- source_word: וּמַלְכוּתָא
  chosen: the kingdom
  alternatives:
  - kingship
  - royal dominion
  lexicon: HALOT
  rationale: In Daniel 7 this noun commonly refers to kingdom/royal rule. 'Kingdom'
    is the most natural and contextually coherent rendering here.
- source_word: הֶחֱסִנוּ
  chosen: took possession of
  alternatives:
  - possessed
  - received possession of
  - held
  lexicon: HALOT
  rationale: The verb conveys taking or possessing. 'Took possession of' makes the
    transition into actual possession clear in English and fits the eschatological
    transfer of rule.
- source_word: קַדִּישִׁין
  chosen: the saints
  alternatives:
  - the holy ones
  lexicon: HALOT
  rationale: Consistent with the earlier related form in the verse and with Danielic
    usage for God's holy people.
