theological_decisions:
- issue: Rendering the judicial idiom דִּינָא יְתִב
  chosen_reading: The court sat
  alternative_readings:
  - The judgment sat
  - The tribunal took its seat
  rationale: The phrase is an idiom for the convening of a heavenly court. Rendering
    it as 'The court sat' communicates the legal scene clearly while avoiding a misleadingly
    abstract 'judgment sat.' This is a translational, not doctrinal, decision and
    does not resolve any contested theological issue beyond the text's courtroom imagery.
  doctrine_reference: Translation philosophy §1, §6
- issue: Numerical expressions for the heavenly attendants
  chosen_reading: a thousand thousands ... ten thousand times ten thousand
  alternative_readings:
  - thousands upon thousands ... myriads upon myriads
  rationale: The main text preserves the source's numerical imagery rather than flattening
    it into a generic statement of innumerability. This maintains the text's grandeur
    and apocalyptic specificity without importing symbolic interpretation.
  doctrine_reference: Translation philosophy §1, §5
