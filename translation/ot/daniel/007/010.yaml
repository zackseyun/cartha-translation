id: DAN.7.10
reference: Daniel 7:10
source:
  edition: WLC
  text: נְהַ֣ר דִּי נ֗וּר נָגֵ֤ד וְ/נָפֵק֙ מִן קֳדָמ֔וֹ/הִי אֶ֤לֶף אלפים יְשַׁמְּשׁוּנֵּ֔/הּ
    וְ/רִבּ֥וֹ רבון קָֽדָמ֣וֹ/הִי יְקוּמ֑וּן דִּינָ֥/א יְתִ֖ב וְ/סִפְרִ֥ין פְּתִֽיחוּ־־׃
translation:
  text: A river of fire was flowing and coming out from before him; a thousand thousands
    were serving him, and ten thousand times ten thousand were standing before him.
    The court sat, and the books were opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thousands upon thousands were serving him, and myriads upon myriads
      were standing before him.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the judgment sat'; the phrase refers to the heavenly court taking
      its seat for judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'scrolls were opened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְהַר
  chosen: river
  alternatives:
  - stream
  lexicon: HALOT
  rationale: The noun denotes a river or flowing stream. 'River' best preserves the
    vivid, substantial image in English and matches the apocalyptic scene.
- source_word: דִּי
  chosen: of
  alternatives:
  - that
  - which was
  lexicon: HALOT
  rationale: 'Here the relative particle links the two nouns in a genitival sense:
    ''river of fire.'' Rendering it idiomatically as ''of'' is more natural than a
    wooden relative clause.'
- source_word: נוּר
  chosen: fire
  lexicon: HALOT
  rationale: Standard Aramaic term for fire; no contextual reason to vary.
- source_word: נָגֵד וְנָפֵק
  chosen: was flowing and coming out
  alternatives:
  - was issuing forth
  - flowed out
  lexicon: HALOT
  rationale: 'The paired participles depict ongoing action: the fiery river was both
    flowing and proceeding outward from before the throne. The English progressive
    preserves the scene''s vividness.'
- source_word: מִן קֳדָמוֹהִי
  chosen: from before him
  alternatives:
  - from his presence
  - out from before him
  lexicon: HALOT
  rationale: Literally 'from before him,' referring to the figure on the throne. This
    keeps the spatial imagery and avoids over-interpreting as merely abstract 'presence.'
- source_word: אֶלֶף אלפים
  chosen: a thousand thousands
  alternatives:
  - thousands upon thousands
  - a thousand thousand
  lexicon: HALOT
  rationale: The Aramaic expression is literally multiplicative/reduplicative. 'A
    thousand thousands' preserves the formal force while remaining intelligible. A
    smoother idiom is possible, but the more literal rendering better reflects the
    source.
- source_word: יְשַׁמְּשׁוּנֵּהּ
  chosen: were serving him
  alternatives:
  - ministered to him
  lexicon: HALOT
  rationale: The verb means to serve or minister. 'Serving him' is clear modern English
    and broad enough to include courtly attendance without importing later technical
    liturgical nuance.
- source_word: וְרִבּוֹ רבון
  chosen: ten thousand times ten thousand
  alternatives:
  - myriads of myriads
  - ten thousand ten-thousands
  lexicon: HALOT
  rationale: The phrase intensifies the innumerable heavenly host. 'Ten thousand times
    ten thousand' is idiomatic, transparent, and preserves the numerical imagery better
    for modern readers than 'myriads.'
- source_word: קָדָמוֹהִי יְקוּמוּן
  chosen: were standing before him
  alternatives:
  - stood before him
  lexicon: HALOT
  rationale: The verb literally means 'stand' or 'arise.' In this court setting, 'were
    standing before him' best conveys attendance before the throne and matches the
    participial/imperfect scene-setting.
- source_word: דִּינָא יְתִב
  chosen: The court sat
  alternatives:
  - The judgment sat
  - The tribunal took its seat
  - Judgment was seated
  lexicon: HALOT
  rationale: Although literally 'the judgment sat,' the idiom refers to the judicial
    session taking its seat. 'The court sat' is concise, natural English that preserves
    the legal setting without paraphrasing too far.
- source_word: וְסִפְרִין פְּתִיחוּ
  chosen: and the books were opened
  alternatives:
  - and the scrolls were opened
  lexicon: HALOT
  rationale: The plural noun can denote books or written records. 'Books' is the conventional
    and likely sense in this judicial-apocalyptic context; 'scrolls' is possible but
    less certain and more interpretive.
