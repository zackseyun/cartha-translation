id: DAN.7.20
reference: Daniel 7:20
source:
  edition: WLC
  text: וְ/עַל קַרְנַיָּ֤/א עֲשַׂר֙ דִּ֣י בְ/רֵאשַׁ֔/הּ וְ/אָחֳרִי֙ דִּ֣י סִלְקַ֔ת
    ו/נפלו מִן קדמי/ה תְּלָ֑ת וְ/קַרְנָ֨/א דִכֵּ֜ן וְ/עַיְנִ֣ין לַ֗/הּ וְ/פֻם֙ מְמַלִּ֣ל
    רַבְרְבָ֔ן וְ/חֶזְוַ֖/הּ רַ֥ב מִן חַבְרָתַֽ/הּ־־־׃
translation:
  text: and about the ten horns that were on its head, and the other horn that came
    up, before which three fell—the horn that had eyes and a mouth speaking great
    things, and whose appearance was greater than that of its companions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mouth speaking boastful things' or 'uttering great boasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַרְנַיָּא עֲשַׂר
  chosen: the ten horns
  alternatives:
  - the ten horn[s]
  lexicon: HALOT
  rationale: Aramaic plural noun with numeral; rendered straightforwardly as 'the
    ten horns.' In Daniel's vision, 'horns' is the established symbolic image and
    should be preserved rather than interpreted.
- source_word: בְרֵאשַׁהּ
  chosen: on its head
  alternatives:
  - upon its head
  - at its head
  lexicon: HALOT
  rationale: Preposition ב with 'head' plus 3fs suffix refers back to the beast. 'On
    its head' is idiomatic and spatially clear in English.
- source_word: אָחֳרִי
  chosen: the other horn
  alternatives:
  - another horn
  - the later horn
  lexicon: HALOT
  rationale: Though the adjective can carry the sense 'another' or 'other/later,'
    here it distinguishes this horn from the ten already mentioned. 'The other horn'
    best preserves the contrast without over-interpreting temporality.
- source_word: סִלְקַת
  chosen: came up
  alternatives:
  - arose
  - went up
  lexicon: HALOT
  rationale: Common Danielic imagery for the emergence of a kingdom/ruler symbolized
    by a horn. 'Came up' is natural English and keeps the visual force.
- source_word: וְנפלו מִן קדמיה תְּלָת
  chosen: before which three fell
  alternatives:
  - and three fell before it
  - before whom three fell
  lexicon: HALOT
  rationale: The relative clause modifies the horn. 'Before which' fits the antecedent
    'horn' as an object/symbol, while preserving the Aramaic sense that three horns
    fell in its presence or before it.
- source_word: וְקַרְנָא דִכֵּן
  chosen: the horn that
  alternatives:
  - that horn which
  - and that horn
  lexicon: HALOT
  rationale: Resumptive expression re-identifying the specific horn under discussion.
    English smooths this to 'the horn that' while retaining the focus.
- source_word: וְעַיְנִין לַהּ
  chosen: had eyes
  alternatives:
  - with eyes
  - that had eyes
  lexicon: HALOT
  rationale: The clause describes a notable feature of the horn. 'Had eyes' is idiomatic
    and preserves the vivid symbolic detail.
- source_word: וְפֻם מְמַלִּל רַבְרְבָן
  chosen: a mouth speaking great things
  alternatives:
  - a mouth speaking boastful things
  - a mouth uttering great boasts
  lexicon: HALOT
  rationale: Literally 'a mouth speaking great things.' Because the Aramaic does not
    explicitly include a word for 'boasts' here, the more literal 'great things' is
    preferred in the main text; the interpretive nuance 'boastful things' is preserved
    as an alternative.
- source_word: וְחֶזְוַהּ
  chosen: whose appearance
  alternatives:
  - and its appearance
  - whose look
  lexicon: HALOT
  rationale: Refers to the visible aspect/appearance of the horn. 'Whose appearance'
    connects the clause smoothly to the horn in English.
- source_word: רַב מִן חַבְרָתַהּ
  chosen: was greater than that of its companions
  alternatives:
  - was larger than its companions
  - was more imposing than its companions
  lexicon: HALOT
  rationale: רַב here conveys greatness/prominence rather than merely physical size.
    'Greater than that of its companions' captures comparative prominence while preserving
    the symbolic register. 'Companions' reflects the related horns without flattening
    the relational term.
