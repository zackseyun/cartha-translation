theological_decisions:
- issue: Whether to render רַבְרְבָן interpretively as 'boastful things' or more literally
    as 'great things'
  chosen_reading: great things
  alternative_readings:
  - boastful things
  - great boasts
  rationale: The immediate Aramaic wording is literally 'great things.' While the
    broader context supports arrogant or boastful speech, the translation preserves
    the lexical form in the main text and leaves the interpretive sharpening to a
    footnote. This follows the project's aim to preserve theological tension rather
    than over-resolve it where the source itself is less explicit.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
