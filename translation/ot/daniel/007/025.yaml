theological_decisions:
- issue: Referent of 'the saints of the Most High'
  chosen_reading: God's holy people
  alternative_readings:
  - heavenly holy ones/angels
  rationale: In Daniel 7 the 'saints' are closely tied to the people who receive the
    kingdom (vv. 18, 22, 27). The main text uses 'saints' without specifying beyond
    the source, while the rationale notes that the referent is best understood as
    God's people in this context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the final time expression
  chosen_reading: retain the idiomatic apocalyptic formula without converting it into
    exact calendar units
  alternative_readings:
  - three and a half years
  - a symbolic limited period
  rationale: The phrase may be interpreted numerically or symbolically, but the source
    text itself uses the formulaic expression. The translation preserves that wording
    rather than importing a specific eschatological scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
