id: DAN.7.25
reference: Daniel 7:25
source:
  edition: WLC
  text: וּ/מִלִּ֗ין לְ/צַ֤ד עלי/א יְמַלִּ֔ל וּ/לְ/קַדִּישֵׁ֥י עֶלְיוֹנִ֖ין יְבַלֵּ֑א
    וְ/יִסְבַּ֗ר לְ/הַשְׁנָיָה֙ זִמְנִ֣ין וְ/דָ֔ת וְ/יִתְיַהֲב֣וּן בִּ/ידֵ֔/הּ עַד
    עִדָּ֥ן וְ/עִדָּנִ֖ין וּ/פְלַ֥ג עִדָּֽן־׃
translation:
  text: He will speak words against the Most High, and he will wear out the saints
    of the Most High. He will intend to change times and law, and they will be given
    into his hand for a time, times, and half a time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed times' for 'times,' possibly referring to fixed seasons or
      festival times.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be handed over to him'; the implied referent is most naturally
      the saints.
    reason: alternative_reading
  - marker: c
    text: Literally, 'for a time, times, and half a time'; this may denote a limited
      period, often understood as three and a half times/years.
    reason: alternative_reading
lexical_decisions:
- source_word: מִלִּין
  chosen: words
  alternatives:
  - things
  - utterances
  lexicon: HALOT
  rationale: Aramaic plural noun meaning 'words' or 'matters.' In this context of
    hostile speech, 'words' is the most direct and natural rendering.
- source_word: לְצַד עֶלְיָא
  chosen: against the Most High
  alternatives:
  - beside the Most High
  - against the Highest
  lexicon: HALOT
  rationale: 'The prepositional phrase here carries adversative force in context:
    the horn speaks in opposition to God. ''Most High'' is the standard rendering
    of the divine title and fits Danielic usage.'
- source_word: יְמַלִּל
  chosen: he will speak
  alternatives:
  - he will utter
  - he will say
  lexicon: HALOT
  rationale: The verb denotes speaking or uttering. 'He will speak' is idiomatic and
    preserves the predictive force.
- source_word: קַדִּישֵׁי עֶלְיוֹנִין
  chosen: the saints of the Most High
  alternatives:
  - the holy ones of the Most High
  - the holy people of the Most High
  lexicon: HALOT
  rationale: '''Holy ones'' is formally possible, but in Daniel this expression commonly
    refers to God''s consecrated people. ''Saints'' preserves the traditional and
    concise sense without over-interpreting as angelic beings here.'
- source_word: יְבַלֵּא
  chosen: he will wear out
  alternatives:
  - he will harass
  - he will oppress
  - he will wear down
  lexicon: HALOT
  rationale: The verb can convey wearing out or exhausting. 'Wear out' captures the
    sustained oppressive action and matches the metaphorical force of the Aramaic.
- source_word: יִסְבַּר
  chosen: he will intend
  alternatives:
  - he will think
  - he will plan
  - he will presume
  lexicon: HALOT
  rationale: The verb denotes thinking or intending. 'He will intend' fits the following
    infinitive and avoids overstating success, since the clause describes his attempt.
- source_word: לְהַשְׁנָיָה
  chosen: to change
  alternatives:
  - to alter
  lexicon: HALOT
  rationale: 'Straightforward causative sense: he seeks to alter established realities.'
- source_word: זִמְנִין
  chosen: times
  alternatives:
  - appointed times
  - seasons
  lexicon: HALOT
  rationale: The noun can mean times or appointed times. 'Times' is concise in the
    main text; the possibility of cultic or calendrical 'appointed times' is worth
    preserving in a footnote.
- source_word: דָת
  chosen: law
  alternatives:
  - decree
  - religious law
  lexicon: HALOT
  rationale: The Aramaic term often denotes law or decree. 'Law' best fits the paired
    expression 'times and law' and the broader context of attempted religious-political
    alteration.
- source_word: יִתְיַהֲבוּן
  chosen: they will be given
  alternatives:
  - they will be handed over
  lexicon: HALOT
  rationale: Passive sense is clear. The plural subject is implicit from context,
    referring most naturally to the saints rather than to the times and law.
- source_word: בִּידֵהּ
  chosen: into his hand
  alternatives:
  - into his power
  - under his control
  lexicon: HALOT
  rationale: The idiom literally refers to the hand as a symbol of power. 'Into his
    hand' preserves the biblical idiom in readable English.
- source_word: עַד עִדָּן וְעִדָּנִין וּפְלַג עִדָּן
  chosen: for a time, times, and half a time
  alternatives:
  - for a year, two years, and half a year
  lexicon: HALOT
  rationale: This is the established literal rendering of the apocalyptic expression.
    Because the exact temporal value is debated, the more formal 'time, times, and
    half a time' preserves the text's imagery without prematurely resolving it.
