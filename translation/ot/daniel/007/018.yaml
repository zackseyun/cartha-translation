id: DAN.7.18
reference: Daniel 7:18
source:
  edition: WLC
  text: וִֽ/יקַבְּלוּן֙ מַלְכוּתָ֔/א קַדִּישֵׁ֖י עֶלְיוֹנִ֑ין וְ/יַחְסְנ֤וּן מַלְכוּתָ/א֙
    עַֽד עָ֣לְמָ֔/א וְ/עַ֖ד עָלַ֥ם עָלְמַיָּֽ/א־׃
translation:
  text: But the holy ones of the Most High will receive the kingdom and possess the
    kingdom forever—forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints of the Most High.' The Aramaic expression may refer to God's
      holy people; some interpreters also understand a heavenly reference in this
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיקַבְּלוּן
  chosen: will receive
  alternatives:
  - will take
  - will be given
  lexicon: HALOT
  rationale: The Peal imperfect of קבל in Biblical Aramaic commonly means 'receive'
    or 'accept.' 'Will receive' best reflects the verb's straightforward sense here
    without implying seizure by force ('take') or making the passive idea explicit
    ('be given'), which the form itself does not state.
- source_word: מַלְכוּתָא
  chosen: the kingdom
  alternatives:
  - kingship
  - royal dominion
  lexicon: HALOT
  rationale: The noun can denote either the realm or the rule. In Daniel 7, the term
    carries both territorial and dominion connotations, but 'the kingdom' is the most
    natural English rendering and preserves the apocalyptic contrast with beastly
    kingdoms.
- source_word: קַדִּישֵׁי
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy people
  lexicon: HALOT
  rationale: The Aramaic adjective used substantivally means 'holy ones.' This is
    more transparent in modern English than 'saints' and avoids importing later ecclesiastical
    associations, while still fitting the heavenly/people-of-God context.
- source_word: עֶלְיוֹנִין
  chosen: of the Most High
  alternatives:
  - of the Highest One
  lexicon: HALOT
  rationale: This is a divine title in Daniel. 'The Most High' is the established
    and accurate English equivalent, preserving the superlative force and theological
    title usage.
- source_word: וְיַחְסְנוּן
  chosen: and possess
  alternatives:
  - and hold
  - and inherit
  lexicon: HALOT
  rationale: The verb חסן in this stem/context conveys possessing or holding as property.
    'Possess' fits the parallel with 'receive' and preserves the sense of enduring
    ownership better than the more interpretive 'inherit.'
- source_word: עַד עָלְמָא
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: HALOT
  rationale: This idiom denotes unending duration. 'Forever' is idiomatic modern English
    and captures the temporal force without woodenly reproducing the Semitic form.
- source_word: וְעַד עָלַם עָלְמַיָּא
  chosen: forever and ever
  alternatives:
  - even to the age of ages
  - for ages upon ages
  lexicon: HALOT
  rationale: The doubled expression intensifies the permanence of the kingdom. 'Forever
    and ever' is the clearest idiomatic rendering in English and preserves the emphatic
    escalation from the preceding phrase.
