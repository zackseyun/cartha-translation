theological_decisions:
- issue: Identity of קַדִּישֵׁי עֶלְיוֹנִין
  chosen_reading: Rendered generically as 'the holy ones of the Most High' without
    specifying whether they are angelic beings, faithful Israelites, or the people
    of God more broadly.
  alternative_readings:
  - the saints as God's people
  - heavenly holy ones/angels
  rationale: The phrase in Daniel 7 is interpretively debated, and this verse alone
    does not require resolving the referent. The translation preserves the wording's
    ambiguity rather than importing a narrower theological interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
