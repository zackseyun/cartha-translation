theological_decisions:
- issue: Referent of 'four kings' in apocalyptic symbolism
  chosen_reading: Translate the explicit lexical form 'four kings' in the main text
    without expanding it to 'kingdoms.'
  alternative_readings:
  - Interpretively render as 'four kingdoms'
  - Translate 'kings' and explain kingdom-reference in notes
  rationale: The source text uses מַלְכִין ('kings'). Optimal equivalence favors preserving
    the wording of the interpretation rather than importing a harmonizing interpretation
    from nearby verses. The symbolic relation to kingdoms can be handled by readers
    and cross-context, not by altering the lexical content of this verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
