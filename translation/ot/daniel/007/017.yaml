id: DAN.7.17
reference: Daniel 7:17
source:
  edition: WLC
  text: אִלֵּין֙ חֵיוָתָ֣/א רַבְרְבָתָ֔/א דִּ֥י אִנִּ֖ין אַרְבַּ֑ע אַרְבְּעָ֥ה מַלְכִ֖ין
    יְקוּמ֥וּן מִן אַרְעָֽ/א־׃
translation:
  text: These great beasts, which are four, are four kings who will arise from the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the land.' The Aramaic אַרְעָא can denote either 'earth' or 'land';
      'earth' is preferred here because of the chapter's broad apocalyptic scope.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִלֵּין
  chosen: These
  alternatives:
  - Those
  lexicon: HALOT
  rationale: Aramaic demonstrative plural; 'these' fits the immediate explanatory
    reference to the beasts just seen in the vision.
- source_word: חֵיוָתָא
  chosen: beasts
  alternatives:
  - animals
  - living creatures
  lexicon: HALOT
  rationale: In Daniel's apocalyptic context, 'beasts' is the natural English rendering
    and preserves the ominous, symbolic force better than the more neutral 'animals'
    or broader 'living creatures'.
- source_word: רַבְרְבָתָא
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness or largeness. 'Great' is idiomatic with
    'beasts' in English and can carry both size and significance in apocalyptic description.
- source_word: דִּי אִנִּין
  chosen: which are
  alternatives:
  - that are
  - for they are
  lexicon: HALOT
  rationale: This relative construction links the beasts to their interpretation.
    'Which are' is smooth modern English while remaining close to the source syntax.
- source_word: אַרְבַּע
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number modifying the beasts; straightforwardly rendered 'four'.
- source_word: אַרְבְּעָה מַלְכִין
  chosen: four kings
  alternatives:
  - four kingdoms
  lexicon: HALOT
  rationale: The text explicitly says 'kings' (מַלְכִין), not 'kingdoms.' Although
    in the wider vision kings may stand for kingdoms, the translation should preserve
    the lexical form here and leave broader interpretation to context.
- source_word: יְקוּמוּן
  chosen: will arise
  alternatives:
  - will stand up
  - shall arise
  lexicon: HALOT
  rationale: The verb means to arise or stand up. 'Will arise' is idiomatic in prophetic/apocalyptic
    contexts for the emergence of rulers.
- source_word: מִן אַרְעָא
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אַרְעָא can mean 'earth' or 'land.' In this cosmic-vision setting, 'earth'
    better matches the broad scope and contrasts naturally with the heavenly perspective
    of the chapter.
