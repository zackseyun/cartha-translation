id: DAN.7.7
reference: Daniel 7:7
source:
  edition: WLC
  text: בָּאתַ֣ר דְּנָה֩ חָזֵ֨ה הֲוֵ֜ית בְּ/חֶזְוֵ֣י לֵֽילְיָ֗/א וַ/אֲר֣וּ חֵיוָ֣ה
    רביעיה דְּחִילָה֩ וְ/אֵֽימְתָנִ֨י וְ/תַקִּיפָ֜א יַתִּ֗ירָא וְ/שִׁנַּ֨יִן דִּֽי
    פַרְזֶ֥ל לַ/הּ֙ רַבְרְבָ֔ן אָֽכְלָ֣ה וּ/מַדֱּקָ֔ה וּ/שְׁאָרָ֖/א ב/רגלי/ה רָפְסָ֑ה
    וְ/הִ֣יא מְשַׁנְּיָ֗ה מִן כָּל חֵֽיוָתָ/א֙ דִּ֣י קָֽדָמַ֔י/הּ וְ/קַרְנַ֥יִן עֲשַׂ֖ר
    לַֽ/הּ־־־׃
translation:
  text: After this I kept looking in the visions of the night, and behold, a fourth
    beast—terrifying and dreadful and exceedingly strong. It had large iron teeth;
    it devoured and crushed, and it trampled what was left with its feet. It was different
    from all the beasts that were before it, and it had ten horns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearsome' for 'terrifying,' and 'extremely powerful' for 'exceedingly
      strong.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the remainder it trampled with its feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאתַר דְּנָה
  chosen: After this
  alternatives:
  - After that
  - Later than this
  lexicon: HALOT
  rationale: Temporal transition introducing the next scene in Daniel's vision report.
    'After this' is idiomatic and preserves sequence without over-literal awkwardness.
- source_word: חָזֵה הֲוֵית
  chosen: I kept looking
  alternatives:
  - I was looking
  - I saw
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing action in past time.
    'I kept looking' captures the durative force better than the simple 'I saw.'
- source_word: בְּחֶזְוֵי לֵילְיָא
  chosen: in the visions of the night
  alternatives:
  - in the night visions
  - in visions by night
  lexicon: HALOT
  rationale: A close but natural rendering of the Aramaic construct phrase. 'Visions
    of the night' is clear modern English while preserving the nocturnal visionary
    setting.
- source_word: וַאֲרוּ
  chosen: and behold
  alternatives:
  - and look
  - then behold
  lexicon: HALOT
  rationale: Standard deictic marker in Aramaic narrative/vision reporting. 'And behold'
    preserves the suddenness and vividness of the scene.
- source_word: חֵיוָה רביעיה
  chosen: a fourth beast
  alternatives:
  - a fourth living creature
  lexicon: HALOT
  rationale: In Daniel 7 the term refers to symbolic beasts/kingdom-powers, not generic
    living creatures. 'Beast' is the established and contextually precise sense.
- source_word: דְּחִילָה
  chosen: terrifying
  alternatives:
  - fearsome
  - dreadful
  lexicon: HALOT
  rationale: Conveys that the beast inspires fear. 'Terrifying' is vivid and contemporary.
- source_word: וְאֵימְתָנִי
  chosen: dreadful
  alternatives:
  - awesome in terror
  - frightening
  lexicon: HALOT
  rationale: Paired with דְּחִילָה, this intensifies the description. 'Dreadful' preserves
    the elevated tone and avoids flattening the double description into mere repetition.
- source_word: וְתַקִּיפָא יַתִּירָא
  chosen: exceedingly strong
  alternatives:
  - extremely powerful
  - very strong
  lexicon: HALOT
  rationale: The adjective plus intensifier expresses exceptional strength. 'Exceedingly
    strong' is concise and suitably weighty.
- source_word: וְשִׁנַּיִן דִּי פַרְזֶל לַהּ רַבְרְבָן
  chosen: It had large iron teeth
  alternatives:
  - and it had great teeth of iron
  - with huge iron teeth
  lexicon: HALOT
  rationale: The clause describes a notable feature of the beast. 'Large iron teeth'
    is natural English and preserves both material and size.
- source_word: אָכְלָה
  chosen: it devoured
  alternatives:
  - it ate up
  - it consumed
  lexicon: HALOT
  rationale: A standard metaphor for destructive conquest. 'Devoured' fits beast imagery
    and English literary register.
- source_word: וּמַדֱּקָה
  chosen: and crushed
  alternatives:
  - and broke in pieces
  - and crushed to pieces
  lexicon: HALOT
  rationale: The verb denotes pulverizing or crushing. 'Crushed' is strong and readable;
    the sense of violent destruction is maintained.
- source_word: וּשְׁאָרָא בְּרַגְלַיּה רָפְסָה
  chosen: and it trampled what was left with its feet
  alternatives:
  - and the remainder it trampled with its feet
  - and it stamped the rest with its feet
  lexicon: HALOT
  rationale: This clause contrasts what was devoured/crushed with the remnant that
    was trampled. 'What was left' makes the referent explicit in natural English.
- source_word: וְהִיא מְשַׁנְּיָה מִן כָּל חֵיוָתָא דִּי קָדָמַיּהּ
  chosen: It was different from all the beasts that were before it
  alternatives:
  - It was changed from all the beasts before it
  - It differed from all the beasts preceding it
  lexicon: HALOT
  rationale: The participle here expresses distinction rather than transformation.
    'Different from' is the clearest contextual sense.
- source_word: וְקַרְנַיִן עֲשַׂר לַהּ
  chosen: and it had ten horns
  alternatives:
  - and ten horns were to it
  lexicon: HALOT
  rationale: Existential possession is best rendered idiomatically in English as 'it
    had ten horns.'
