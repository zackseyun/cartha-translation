theological_decisions:
- issue: Nature of the fourth beast's description
  chosen_reading: Render the imagery straightforwardly as a symbolic beast without
    importing an identification of the kingdom into the translation.
  alternative_readings:
  - Interpretive identifications such as Rome, a Hellenistic empire, or a composite
    end-time kingdom
  rationale: The verse itself describes the beast's terrifying character and distinctiveness
    but does not name the kingdom. The translation therefore preserves the imagery
    and leaves historical/theological identification to interpretation rather than
    embedding it in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
