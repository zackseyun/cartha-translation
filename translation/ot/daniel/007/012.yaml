theological_decisions:
- issue: Temporal expression for the continued existence of the beasts after loss
    of dominion
  chosen_reading: for a time and a season
  alternative_readings:
  - until a time and a season
  - for an appointed time and season
  rationale: The text emphasizes that the beasts' life continued only for a limited
    period. The main rendering preserves the temporal limitation without importing
    a more technical eschatological scheme than the Aramaic itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
