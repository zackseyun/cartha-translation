id: DAN.7.12
reference: Daniel 7:12
source:
  edition: WLC
  text: וּ/שְׁאָר֙ חֵֽיוָתָ֔/א הֶעְדִּ֖יו שָׁלְטָנְ/ה֑וֹן וְ/אַרְכָ֧ה בְ/חַיִּ֛ין
    יְהִ֥יבַת לְ/ה֖וֹן עַד זְמַ֥ן וְ/עִדָּֽן־׃
translation:
  text: As for the rest of the beasts, their dominion was taken away, but an extension
    of life was given to them for a time and a season.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until a time and a season.' The Aramaic expression can be understood
      as marking the limit of the extension granted to them.
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: As for the rest of
  alternatives:
  - and the rest of
  - the remainder of
  lexicon: HALOT
  rationale: Introduces a contrastive shift from the previous beast to the remaining
    beasts. 'As for' brings out the discourse function while preserving the sense
    of 'the rest of.'
- source_word: חֵיוָתָא
  chosen: the beasts
  alternatives:
  - the living creatures
  - the animals
  lexicon: HALOT
  rationale: In Daniel 7 the term refers to the symbolic beasts of the vision, so
    'beasts' is the established and contextually precise rendering.
- source_word: הֶעְדִּיו
  chosen: was taken away
  alternatives:
  - they removed
  - was caused to pass away
  lexicon: HALOT
  rationale: 'The verb means to remove or take away. An English passive best matches
    the clause as expressed here: the beasts'' dominion is removed.'
- source_word: שָׁלְטָנְהוֹן
  chosen: their dominion
  alternatives:
  - their rule
  - their authority
  - their sovereignty
  lexicon: HALOT
  rationale: '''Dominion'' fits Daniel''s apocalyptic-political vocabulary and aligns
    with the term''s sense of ruling power or authority.'
- source_word: וְאַרְכָה
  chosen: but an extension
  alternatives:
  - and lengthening
  - and prolongation
  lexicon: HALOT
  rationale: 'The conjunction here is adversative in sense relative to the prior clause:
    although dominion was removed, life was prolonged. ''Extension'' is natural English
    for the noun ''length/prolongation.'''
- source_word: בְחַיִּין
  chosen: of life
  alternatives:
  - in life
  - of their lives
  lexicon: HALOT
  rationale: The phrase with אַרְכָה denotes prolongation of life. 'Of life' is idiomatic
    English and captures the genitival sense.
- source_word: יְהִיבַת לְהוֹן
  chosen: was given to them
  alternatives:
  - was granted to them
  lexicon: HALOT
  rationale: A straightforward passive rendering preserves the verbal idea without
    adding interpretive detail about the giver.
- source_word: עַד זְמַן וְעִדָּן
  chosen: for a time and a season
  alternatives:
  - until a time and a season
  - for a set time and season
  lexicon: HALOT
  rationale: The paired temporal nouns indicate a limited, appointed duration. 'For
    a time and a season' is natural and preserves the distinction between the two
    terms without over-specifying.
