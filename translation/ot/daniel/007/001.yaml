id: DAN.7.1
reference: Daniel 7:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת חֲדָ֗ה לְ/בֵלְאשַׁצַּר֙ מֶ֣לֶךְ בָּבֶ֔ל דָּנִיֵּאל֙ חֵ֣לֶם חֲזָ֔ה
    וְ/חֶזְוֵ֥י רֵאשֵׁ֖/הּ עַֽל מִשְׁכְּבֵ֑/הּ בֵּ/אדַ֨יִן֙ חֶלְמָ֣/א כְתַ֔ב רֵ֥אשׁ
    מִלִּ֖ין אֲמַֽר־׃
translation:
  text: In the first year of Belshazzar king of Babylon, Daniel saw a dream and visions
    in his head while on his bed. Then he wrote down the dream—the summary of the
    words he told.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Then he wrote the dream; he said the head of the words.'
      The Aramaic idiom likely means he recorded the main points or summary of the
      matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת חֲדָה
  chosen: In the first year
  alternatives:
  - In year one
  - In the one year
  lexicon: HALOT
  rationale: The Aramaic construct with cardinal/adjectival form functions idiomatically
    as an ordinal dating formula, best rendered 'in the first year' in natural English.
- source_word: לְבֵלְאשַׁצַּר
  chosen: of Belshazzar
  alternatives:
  - belonging to Belshazzar
  lexicon: HALOT
  rationale: 'The preposition marks the regnal reference in the dating formula: the
    year is reckoned to Belshazzar.'
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: HALOT
  rationale: Standard construct chain identifying Belshazzar's royal office; the anarthrous
    English appositional form is most natural after the name.
- source_word: חֵלֶם חֲזָה
  chosen: saw a dream
  alternatives:
  - had a dream
  - beheld a dream
  lexicon: HALOT
  rationale: Literally 'saw a dream.' English often says 'had a dream,' but 'saw'
    preserves the visionary emphasis of the Aramaic and fits the surrounding apocalyptic
    context.
- source_word: וְחֶזְוֵי רֵאשֵׁהּ
  chosen: and visions in his head
  alternatives:
  - and visions of his head
  - and visions in his mind
  lexicon: HALOT
  rationale: The phrase is idiomatic for mental/inner visions accompanying the dream.
    'In his head' is a close, readable rendering; 'of his head' is too wooden, while
    'in his mind' is interpretive.
- source_word: עַל מִשְׁכְּבֵהּ
  chosen: while on his bed
  alternatives:
  - upon his bed
  - as he lay on his bed
  lexicon: HALOT
  rationale: Locative phrase indicating the setting of the dream. 'While on his bed'
    is concise and natural; 'as he lay on his bed' is possible but adds a verbal idea
    not explicit in the text.
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Common Aramaic narrative sequencer. 'Then' fits the flow of events in
    straightforward English.
- source_word: חֶלְמָא כְתַב
  chosen: he wrote down the dream
  alternatives:
  - he wrote the dream
  - he recorded the dream
  lexicon: HALOT
  rationale: The verb means 'wrote'; 'wrote down' communicates the act of recording
    in idiomatic English without overinterpreting.
- source_word: רֵאשׁ מִלִּין
  chosen: the summary of the words
  alternatives:
  - the beginning of the words
  - the substance of the matter
  - the head of the words
  lexicon: HALOT
  rationale: Literally 'head of words.' In context this denotes the chief content
    or summary rather than merely the first words. 'Summary' best captures the idiom
    in readable English.
- source_word: אֲמַר
  chosen: he told
  alternatives:
  - he said
  - he spoke
  lexicon: HALOT
  rationale: The verb is simply 'said,' but after 'wrote down the dream' English benefits
    from a smoother completion. 'He told' conveys reported expression of the dream's
    contents. The alternative 'he said' is more formally literal and worth preserving
    in a footnote.
