theological_decisions:
- issue: Whether to interpret 'great words' as explicitly blasphemous or boastful
    in the main text
  chosen_reading: Retain the more literal 'great words' in the main text
  alternative_readings:
  - boastful words
  - arrogant words
  - blasphemous words
  rationale: The immediate context in Daniel supports an arrogant, even blasphemous
    sense, but the phrase itself is literally 'great words.' Following optimal equivalence
    and preserving theological tension, the main text keeps the lexical form while
    an explanatory alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Whether to preserve the symbolic imagery of the beast's judgment or interpret
    it more abstractly
  chosen_reading: Keep 'the beast,' 'its body,' and 'given over to the burning of
    fire' as vision imagery
  alternative_readings:
  - the kingdom was destroyed
  - it was completely judged
  rationale: The verse narrates Daniel's vision in symbolic terms. Translating the
    symbols directly avoids importing an interpretive identification into the text.
  doctrine_reference: Translation philosophy §1, §3
