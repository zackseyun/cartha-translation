id: DAN.7.11
reference: Daniel 7:11
source:
  edition: WLC
  text: חָזֵ֣ה הֲוֵ֔ית בֵּ/אדַ֗יִן מִן קָל֙ מִלַּיָּ֣/א רַבְרְבָתָ֔/א דִּ֥י קַרְנָ֖/א
    מְמַלֱּלָ֑ה חָזֵ֣ה הֲוֵ֡ית עַד֩ דִּ֨י קְטִילַ֤ת חֵֽיוְתָ/א֙ וְ/הוּבַ֣ד גִּשְׁמַ֔/הּ
    וִ/יהִיבַ֖ת לִ/יקֵדַ֥ת אֶשָּֽׁא־׃
translation:
  text: I kept watching then because of the sound of the great words that the horn
    was speaking. I kept watching until the beast was killed, and its body was destroyed
    and given over to the burning of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boastful words' or 'the arrogant words'; literally 'the great words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  chosen: I kept watching
  alternatives:
  - I was watching
  - I watched
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing past action in Biblical
    Aramaic. 'I kept watching' captures the durative force more naturally than a simple
    past.
- source_word: בֵּאדַיִן
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking sequence in the vision. 'Then' is concise and
    natural in English while preserving the narrative flow.
- source_word: מִן
  chosen: because of
  alternatives:
  - from
  - on account of
  lexicon: HALOT
  rationale: Here מִן introduces the cause or occasion for Daniel's continued watching,
    not simple separation. 'Because of' best fits the syntax and sense.
- source_word: קָל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: The noun denotes audible sound. 'Sound' fits the context of hearing the
    horn's boastful speech; 'voice' would overpersonalize the noun here.
- source_word: מִלַּיָּא רַבְרְבָתָא
  chosen: the great words
  alternatives:
  - the boastful words
  - the arrogant words
  lexicon: HALOT
  rationale: Literally 'great words.' In Daniel this idiom can imply arrogant or boastful
    speech, but the text itself says 'great,' so the main text preserves the lexical
    form and lets context supply the force.
- source_word: קַרְנָא
  chosen: the horn
  lexicon: HALOT
  rationale: Standard rendering for the symbolic figure in Daniel's vision. The imagery
    should be preserved rather than interpreted in translation.
- source_word: מְמַלֱּלָה
  chosen: was speaking
  alternatives:
  - spoke
  - was saying
  lexicon: HALOT
  rationale: Participle indicates ongoing action. 'Was speaking' matches the progressive
    aspect and the repeated visionary observation.
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - up to the point that
  lexicon: HALOT
  rationale: Standard temporal construction marking the endpoint of Daniel's watching.
- source_word: קְטִילַת חֵיוְתָא
  chosen: the beast was killed
  alternatives:
  - the beast was slain
  lexicon: HALOT
  rationale: Passive sense from the verbal form with the beast as subject. 'Killed'
    is clear modern English; 'slain' is more traditional but less natural.
- source_word: וְהוּבַד
  chosen: was destroyed
  alternatives:
  - perished
  - was done away with
  lexicon: HALOT
  rationale: The verb denotes destruction or annihilation. 'Was destroyed' is the
    most direct and transparent rendering.
- source_word: גִּשְׁמַהּ
  chosen: its body
  alternatives:
  - its corpse
  - its physical body
  lexicon: HALOT
  rationale: The noun refers to the beast's body. 'Its body' is straightforward; 'corpse'
    would add an interpretive nuance not explicit in the noun itself.
- source_word: וִיהִיבַת
  chosen: was given over
  alternatives:
  - was given
  - was handed over
  lexicon: HALOT
  rationale: Passive sense in context. 'Given over' conveys transfer into judgment
    more idiomatically than bare 'given.'
- source_word: לִיקֵדַת אֶשָּׁא
  chosen: to the burning of fire
  alternatives:
  - to be burned with fire
  - to the fire's burning
  lexicon: HALOT
  rationale: The Aramaic construction is formally nominal, literally 'to the burning
    of fire.' This rendering preserves the vividness and avoids over-paraphrase, while
    remaining intelligible in English.
