theological_decisions:
- issue: Referent of קַדִּישִׁין
  chosen_reading: the holy ones
  alternative_readings:
  - the saints
  - God's holy people
  rationale: The term can denote the saints/holy ones without forcing a narrower ecclesiological
    interpretation. Rendering it literally preserves the theological tension of Daniel's
    vision rather than resolving whether the emphasis is on the covenant people specifically
    or holy ones more broadly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
