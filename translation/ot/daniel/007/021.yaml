id: DAN.7.21
reference: Daniel 7:21
source:
  edition: WLC
  text: חָזֵ֣ה הֲוֵ֔ית וְ/קַרְנָ֣/א דִכֵּ֔ן עָבְדָ֥ה קְרָ֖ב עִם קַדִּישִׁ֑ין וְ/יָכְלָ֖ה
    לְ/הֽוֹן־׃
translation:
  text: I kept watching, and that horn was making war with the holy ones and was prevailing
    over them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints' or 'God’s holy people.' The Aramaic literally says 'the
      holy ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  chosen: I kept watching
  alternatives:
  - I was watching
  - I looked
  lexicon: HALOT
  rationale: The Aramaic participle plus the verb of being expresses ongoing past
    action. 'I kept watching' captures the durative sense more naturally than a simple
    past while remaining close to the form.
- source_word: וְקַרְנָא דִכֵּן
  chosen: and that horn
  alternatives:
  - and this horn
  - and the same horn
  lexicon: HALOT
  rationale: דִכֵּן is a demonstrative meaning 'that/this' in context, referring back
    to the previously described horn. 'That horn' is idiomatic in English for anaphoric
    reference.
- source_word: עָבְדָה קְרָב
  chosen: was making war
  alternatives:
  - made war
  - was waging war
  - was fighting
  lexicon: HALOT
  rationale: The idiom literally combines 'do/make' with 'battle/war.' 'Was making
    war' preserves the Hebrew-Aramaic idiom in understandable English and reflects
    the participial/imperfective sense of the scene.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In English, 'make war with' can
    imply hostile engagement; retaining 'with' stays closer to the source while the
    hostile sense is clear from the idiom.
- source_word: קַדִּישִׁין
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy people
  lexicon: HALOT
  rationale: The Aramaic adjective used substantivally means 'holy ones.' 'Saints'
    is traditional, but 'holy ones' is more transparent and avoids importing later
    ecclesiastical associations. In Daniel this refers to God's consecrated people/heavenly
    holy ones in contextually debated fashion, so the more literal term preserves
    the text's breadth.
- source_word: וְיָכְלָה לְהוֹן
  chosen: and was prevailing over them
  alternatives:
  - and overcame them
  - and was stronger than them
  lexicon: HALOT
  rationale: The verb means 'to be able, prevail, overcome.' 'Was prevailing over
    them' fits the ongoing visionary description and avoids sounding too punctiliar;
    it also matches the hostile context.
