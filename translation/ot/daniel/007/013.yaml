theological_decisions:
- issue: Rendering of כְּבַר אֱנָשׁ in a messianically significant vision
  chosen_reading: one like a son of man
  alternative_readings:
  - one like a human being
  - one like a man
  rationale: Because the phrase is formally comparative and grammatically singular
    masculine, the translation preserves both the likeness ('one like') and the traditional/theologically
    significant expression 'son of man.' This avoids flattening the wording into a
    merely generic anthropological statement while not importing later christological
    conclusions into the translation itself.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Rendering of עִם עֲנָנֵי שְׁמַיָּא
  chosen_reading: with the clouds of heaven
  alternative_readings:
  - on the clouds of heaven
  rationale: The source preposition means 'with.' Given the instruction to prioritize
    original-language primacy over translation tradition, the main text keeps 'with'
    rather than the more interpretive 'on,' while preserving the traditional alternative
    in a footnote because of its importance in reception history and intertextual
    theology.
  doctrine_reference: Translation philosophy §§1, 3
