id: DAN.7.13
reference: Daniel 7:13
source:
  edition: WLC
  text: חָזֵ֤ה הֲוֵית֙ בְּ/חֶזְוֵ֣י לֵֽילְיָ֔/א וַ/אֲרוּ֙ עִם עֲנָנֵ֣י שְׁמַיָּ֔/א
    כְּ/בַ֥ר אֱנָ֖שׁ אָתֵ֣ה הֲוָ֑ה וְ/עַד עַתִּ֤יק יֽוֹמַיָּ/א֙ מְטָ֔ה וּ/קְדָמ֖וֹ/הִי
    הַקְרְבֽוּ/הִי־־׃
translation:
  text: I kept looking in the visions of the night, and behold, with the clouds of
    heaven one like a son of man was coming, and he came to the Ancient of Days, and
    they brought him near before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one like a human being.' The Aramaic literally says 'like a son of
      man,' an expression that can denote a human figure and later becomes a significant
      messianic title in biblical interpretation.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'on the clouds of heaven.' The Aramaic preposition here is
      'with,' which may describe accompaniment rather than explicitly stating motion
      upon the clouds.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  chosen: I kept looking
  alternatives:
  - I was seeing
  - I watched
  lexicon: HALOT
  rationale: The participle plus היה construction conveys ongoing past action in Aramaic.
    'I kept looking' captures the durative force more naturally than the wooden 'I
    was seeing,' while preserving the visionary observation.
- source_word: בְּחֶזְוֵי לֵילְיָא
  chosen: in the visions of the night
  alternatives:
  - in the night visions
  - in visions by night
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the plural 'visions' and the genitival
    relation with 'night.' 'Of the night' is slightly more literal than the smoother
    traditional 'night visions' and remains clear.
- source_word: וַאֲרוּ
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: This discourse marker introduces a striking new scene in the vision.
    'And behold' preserves the vividness and apocalyptic tone.
- source_word: עִם עֲנָנֵי שְׁמַיָּא
  chosen: with the clouds of heaven
  alternatives:
  - with heaven's clouds
  - on the clouds of heaven
  lexicon: HALOT
  rationale: The preposition is עִם, 'with,' not explicitly 'on.' The translation
    therefore follows the source wording rather than importing the more interpretive
    'on the clouds,' while still allowing the imagery of heavenly accompaniment.
- source_word: כְּבַר אֱנָשׁ
  chosen: one like a son of man
  alternatives:
  - one like a human being
  - one like a man
  lexicon: HALOT
  rationale: Literally 'like a son of man/man.' This phrase is theologically weighty
    in biblical usage, especially in later reception, so the more formal 'son of man'
    is retained in the main text. 'One like' preserves the comparative כְ and avoids
    over-identifying the figure beyond the text's wording.
- source_word: אָתֵה הֲוָה
  chosen: was coming
  alternatives:
  - came
  - was arriving
  lexicon: HALOT
  rationale: The participial verbal expression suggests an ongoing approach in the
    visionary scene. 'Was coming' preserves that aspect better than the simple past
    'came'.
- source_word: וְעַד עַתִּיק יוֹמַיָּא
  chosen: to the Ancient of Days
  alternatives:
  - up to the Ancient of Days
  lexicon: HALOT
  rationale: '''Ancient of Days'' is the established and semantically transparent
    rendering of the Aramaic title. ''To'' is idiomatic for the directional preposition
    here.'
- source_word: מְטָה
  chosen: he came
  alternatives:
  - he reached
  - he arrived
  lexicon: HALOT
  rationale: A simple past is appropriate for the completed arrival after the prior
    progressive approach. 'He came' is natural and fits the narrative sequence.
- source_word: וּקְדָמוֹהִי
  chosen: before him
  alternatives:
  - before his presence
  - in front of him
  lexicon: HALOT
  rationale: This prepositional phrase indicates presentation in the presence of the
    Ancient of Days. 'Before him' is concise and accurate.
- source_word: הַקְרְבוּהִי
  chosen: they brought him near
  alternatives:
  - they presented him
  - he was brought near
  lexicon: HALOT
  rationale: The causative verb means to bring near/approach. The active plural with
    unspecified agents is retained as 'they brought him near,' matching the Aramaic
    better than smoothing to a passive.
