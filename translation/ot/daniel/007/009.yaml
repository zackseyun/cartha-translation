theological_decisions:
- issue: Rendering of עַתִּיק יוֹמִין as a divine title
  chosen_reading: the Ancient of Days
  alternative_readings:
  - the Ancient One
  - one ancient of days
  rationale: The phrase functions here as a reverent title within Daniel's heavenly
    court vision. The traditional rendering is also the most transparent and least
    interpretively reductive in English.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
