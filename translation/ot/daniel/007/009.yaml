id: DAN.7.9
reference: Daniel 7:9
source:
  edition: WLC
  text: חָזֵ֣ה הֲוֵ֗ית עַ֣ד דִּ֤י כָרְסָוָן֙ רְמִ֔יו וְ/עַתִּ֥יק יוֹמִ֖ין יְתִ֑ב לְבוּשֵׁ֣/הּ
    כִּ/תְלַ֣ג חִוָּ֗ר וּ/שְׂעַ֤ר רֵאשֵׁ/הּ֙ כַּ/עֲמַ֣ר נְקֵ֔א כָּרְסְיֵ/הּ֙ שְׁבִיבִ֣ין
    דִּי נ֔וּר גַּלְגִּלּ֖וֹ/הִי נ֥וּר דָּלִֽק׀־׃
translation:
  text: I kept watching until thrones were set in place, and the Ancient of Days took
    his seat. His clothing was white as snow, and the hair of his head was like pure
    wool. His throne was flames of fire; its wheels were a burning fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'thrones were placed.' The traditional rendering 'thrones were cast
      down' is less likely here because the scene immediately depicts the heavenly
      court being convened.
    reason: alternative_reading
  - marker: b
    text: Aramaic 'Ancient of Days,' a title emphasizing great age and eternal majesty.
    reason: cultural_note
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  chosen: I kept watching
  alternatives:
  - I was watching
  - I watched
  lexicon: HALOT
  rationale: The participle with the auxiliary conveys ongoing past action in Daniel's
    vision. 'I kept watching' captures the durative force more naturally than a simple
    past.
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - as
  - while
  lexicon: HALOT
  rationale: This Aramaic sequence introduces the point up to which Daniel continued
    watching.
- source_word: כָרְסָוָן
  chosen: thrones
  alternatives:
  - seats
  lexicon: HALOT
  rationale: The plural noun refers to royal/judicial thrones, not ordinary seats.
    'Thrones' preserves the court imagery.
- source_word: רְמִיו
  chosen: were set in place
  alternatives:
  - were placed
  - were cast down
  lexicon: HALOT
  rationale: In context of the heavenly court scene, the verb is best understood as
    setting or placing thrones. The traditional 'cast down' is possible from the root
    in other contexts, but here it poorly fits the immediate scene of enthronement
    and judgment.
- source_word: וְעַתִּיק יוֹמִין
  chosen: and the Ancient of Days
  alternatives:
  - and one ancient of days
  - and the Ancient One
  lexicon: HALOT
  rationale: This established title is a close rendering of the Aramaic phrase and
    preserves its solemn, descriptive force.
- source_word: יְתִב
  chosen: took his seat
  alternatives:
  - sat down
  - was seated
  lexicon: HALOT
  rationale: The verb denotes sitting/being seated. 'Took his seat' fits enthronement
    and judicial context in idiomatic English.
- source_word: לְבוּשֵׁהּ כִּתְלַג חִוָּר
  chosen: His clothing was white as snow
  alternatives:
  - His garment was white like snow
  lexicon: HALOT
  rationale: Singular collective 'clothing' reads naturally in English while preserving
    the simile and visual imagery.
- source_word: וּשְׂעַר רֵאשֵׁהּ כַּעֲמַר נְקֵא
  chosen: and the hair of his head was like pure wool
  alternatives:
  - clean wool
  - white wool
  lexicon: HALOT
  rationale: נְקֵא carries the sense of cleanness/purity. 'Pure wool' is idiomatic
    and preserves the image without overinterpreting it as explicitly 'white,' though
    whiteness is implied by the parallel.
- source_word: כָּרְסְיֵהּ שְׁבִיבִין דִּי נוּר
  chosen: His throne was flames of fire
  alternatives:
  - His throne was fiery flames
  - His throne was sparks of fire
  lexicon: HALOT
  rationale: שְׁבִיבִין can denote flames or fiery sparks. 'Flames of fire' is vivid,
    natural English and suits the elevated style.
- source_word: גַּלְגִּלּוֹהִי נוּר דָּלִק
  chosen: its wheels were a burning fire
  alternatives:
  - its wheels were blazing fire
  - his wheels were burning fire
  lexicon: HALOT
  rationale: The suffix refers back to the throne. 'A burning fire' preserves the
    nominal expression and the chariot-throne imagery.
