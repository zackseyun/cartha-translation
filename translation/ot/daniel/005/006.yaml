id: DAN.5.6
reference: Daniel 5:6
source:
  edition: WLC
  text: אֱדַ֤יִן מַלְכָּ/א֙ זִיוֺ֣/הִי שְׁנ֔וֹ/הִי וְ/רַעיֹנֹ֖/הִי יְבַהֲלוּנֵּ֑/הּ
    וְ/קִטְרֵ֤י חַרְצֵ/הּ֙ מִשְׁתָּרַ֔יִן וְ/אַ֨רְכֻבָּתֵ֔/הּ דָּ֥א לְ/דָ֖א נָֽקְשָֽׁן׃
translation:
  text: Then the king’s color changed, and his thoughts terrified him; the joints
    of his hips gave way, and his knees knocked against each other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his brightness changed.' The Aramaic idiom refers to
      his appearance or complexion changing from fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'the joints of his loins were loosened.' The expression describes physical
      weakness or collapse brought on by terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Immediately
  lexicon: HALOT
  rationale: Common Aramaic temporal adverb marking the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Determined noun with emphatic state; 'the king' fits the narrative reference
    to Belshazzar.
- source_word: זִיוֹהִי שְׁנוֹהִי
  chosen: his color changed
  alternatives:
  - his brightness changed
  - his face changed color
  - his appearance changed
  lexicon: HALOT
  rationale: The idiom refers to visible complexion or appearance changing from fear.
    'His color changed' is concise modern English that preserves the sense better
    than the more literal but opaque 'his brightness changed.'
- source_word: רַעְיוֹנֹהִי
  chosen: his thoughts
  alternatives:
  - his mind
  - his reflections
  lexicon: HALOT
  rationale: The noun denotes thoughts or mental impressions. 'Thoughts' is the most
    direct rendering in context.
- source_word: יְבַהֲלוּנֵּהּ
  chosen: terrified him
  alternatives:
  - alarmed him
  - troubled him
  - dismayed him
  lexicon: HALOT
  rationale: The verb conveys sudden fear or alarm. Given the dramatic scene and bodily
    reaction, 'terrified him' best matches the intensity.
- source_word: קִטְרֵי חַרְצֵהּ
  chosen: the joints of his hips
  alternatives:
  - the joints of his loins
  - the knots of his loins
  - his hip joints
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. חַרְץ here refers to the loins/hips
    region, and קִטְרֵי suggests joints or connecting parts. 'The joints of his hips'
    communicates the bodily collapse clearly without over-paraphrasing.
- source_word: מִשְׁתָּרַיִן
  chosen: gave way
  alternatives:
  - were loosened
  - came apart
  - were unfastened
  lexicon: HALOT
  rationale: The participial/verbal form indicates loosening or slackening. In English
    idiom for fear-induced weakness, 'gave way' is natural and faithful.
- source_word: אַרְכֻבָּתֵהּ
  chosen: his knees
  alternatives:
  - his kneecaps
  lexicon: HALOT
  rationale: The noun refers to knees. 'Knees' is standard and sufficient.
- source_word: דָּא לְדָא
  chosen: against each other
  alternatives:
  - one against another
  - this against that
  lexicon: HALOT
  rationale: Aramaic reciprocal expression; 'against each other' is idiomatic modern
    English.
- source_word: נָקְשָׁן
  chosen: knocked
  alternatives:
  - struck
  - clattered
  lexicon: HALOT
  rationale: The verb means to strike or knock. With knees as subject, 'knocked' preserves
    the familiar image of fear.
