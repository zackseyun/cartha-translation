id: DAN.5.27
reference: Daniel 5:27
source:
  edition: WLC
  text: תְּקֵ֑ל תְּקִ֥ילְתָּה בְ/מֹֽאזַנְיָ֖/א וְ/הִשְׁתְּכַ֥חַתְּ חַסִּֽיר׃
translation:
  text: 'Tekel: you have been weighed in the balances and found lacking.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic Tekel is the written word Daniel interprets; it is related to the
      idea of being weighed.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the scales.'
    reason: lexical_alternative
  - marker: c
    text: Or 'found deficient' or 'found wanting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּקֵל
  chosen: Tekel
  alternatives:
  - A mina/weight term
  - Weighed
  lexicon: HALOT
  rationale: This is the inscribed Aramaic word being interpreted, so transliteration
    best preserves the form of the omen-word while allowing the explanation to follow.
    Translating it outright would blur the distinction between the written term and
    Daniel's interpretation.
- source_word: תְּקִילְתָּה
  chosen: you have been weighed
  alternatives:
  - you were weighed
  - you are weighed
  lexicon: HALOT
  rationale: Passive verbal form addressed to Belshazzar. English present perfect
    captures the completed evaluative action with present relevance in the judgment
    context.
- source_word: בְמֹאזַנְיָא
  chosen: in the balances
  alternatives:
  - on the scales
  - in the scales
  lexicon: HALOT
  rationale: Refers to weighing instruments. 'Balances' is a natural and slightly
    more formal rendering that fits the judicial metaphor and traditional imagery;
    'scales' is possible but less evocative here.
- source_word: וְהִשְׁתְּכַחַתְּ
  chosen: and found
  alternatives:
  - and you were found
  - and it was found
  lexicon: HALOT
  rationale: In context the sense is resultative discovery after examination. English
    idiom prefers 'found' following 'weighed' in this judicial metaphor.
- source_word: חַסִּיר
  chosen: lacking
  alternatives:
  - deficient
  - wanting
  - short
  lexicon: HALOT
  rationale: Conveys deficiency after assessment. 'Lacking' is clear modern English
    and preserves the metaphor of being underweight or falling short without sounding
    archaic like 'wanting'.
