theological_decisions:
- issue: Nature of the judgment metaphor
  chosen_reading: A divine evaluative judgment is expressed through the imagery of
    weighing and deficiency, without expanding the text into a fuller doctrinal explanation.
  alternative_readings:
  - A purely literal reference to commercial weighing
  - An interpretive paraphrase such as 'God has judged you and found you guilty'
  rationale: The verse itself uses metaphorical courtroom/measurement language. The
    translation preserves that imagery rather than flattening it into an explanatory
    paraphrase or reducing it to literal weighing.
  doctrine_reference: Translation philosophy items 1, 3, and 6
