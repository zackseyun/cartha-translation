id: DAN.5.19
reference: Daniel 5:19
source:
  edition: WLC
  text: וּ/מִן רְבוּתָ/א֙ דִּ֣י יְהַב לֵ֔/הּ כֹּ֣ל עַֽמְמַיָּ֗/א אֻמַיָּ/א֙ וְ/לִשָּׁ֣נַיָּ֔/א
    הֲו֛וֹ זאעין וְ/דָחֲלִ֖ין מִן קֳדָמ֑וֹ/הִי דִּֽי הֲוָ֨ה צָבֵ֜א הֲוָ֣א קָטֵ֗ל וְ/דִֽי
    הֲוָ֤ה צָבֵא֙ הֲוָ֣ה מַחֵ֔א וְ/דִֽי הֲוָ֤ה צָבֵא֙ הֲוָ֣ה מָרִ֔ים וְ/דִֽי הֲוָ֥ה
    צָבֵ֖א הֲוָ֥ה מַשְׁפִּֽיל־־־־־־־׃
translation:
  text: And because of the greatness that he gave him, all peoples, nations, and languages
    were trembling and fearing before him. Whomever he wanted, he killed; and whomever
    he wanted, he let live; and whomever he wanted, he raised up; and whomever he
    wanted, he humbled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he kept alive' or 'he spared.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he exalted' or 'he promoted.'
    reason: lexical_alternative
  - marker: c
    text: The subject of 'he gave him' is implicit here and refers back to God in
      the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: רְבוּתָא
  chosen: the greatness
  alternatives:
  - the majesty
  - the greatness of rank
  lexicon: HALOT
  rationale: The noun denotes greatness or exalted status. 'Greatness' is natural
    English and fits the context of royal grandeur bestowed by God.
- source_word: יְהַב לֵהּ
  chosen: he gave him
  alternatives:
  - was given to him
  lexicon: HALOT
  rationale: The active verbal form with indirect object is straightforwardly 'he
    gave him.' In context, the antecedent is God from the previous verse, but the
    clause itself keeps the subject implicit.
- source_word: עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  chosen: peoples, nations, and languages
  alternatives:
  - peoples, ethnic groups, and tongues
  lexicon: HALOT
  rationale: This triad is conventional in Daniel for the full range of human groups
    under imperial rule. 'Languages' is preferred over the more archaic 'tongues'
    for readable modern English while preserving the literal sense.
- source_word: זאעין וְדָחֲלִין
  chosen: were trembling and fearing
  alternatives:
  - were in dread and fear
  - were trembling and terrified
  lexicon: HALOT
  rationale: The paired participles intensify the response of the subject peoples.
    Rendering both terms preserves the rhetorical force rather than collapsing them
    into a single English verb.
- source_word: מִן קֳדָמוֹהִי
  chosen: before him
  alternatives:
  - from before him
  - in his presence
  lexicon: HALOT
  rationale: The idiom expresses being in the presence of and under the power of the
    king. 'Before him' is concise and idiomatic.
- source_word: דִּי הֲוָה צָבֵא
  chosen: whomever he wanted
  alternatives:
  - whoever he wished
  - anyone he desired
  lexicon: HALOT
  rationale: The repeated construction introduces each exercise of royal will. 'Whomever
    he wanted' is natural English and preserves the emphasis on arbitrary personal
    desire.
- source_word: קָטֵל
  chosen: he killed
  alternatives:
  - he put to death
  lexicon: HALOT
  rationale: The verb means to kill. 'He killed' is direct and forceful; 'put to death'
    is possible but slightly more interpretive and formalized.
- source_word: מַחֵא
  chosen: he let live
  alternatives:
  - he kept alive
  - he spared
  lexicon: HALOT
  rationale: In this antithetical sequence to 'he killed,' the sense is preserving
    life. 'He let live' mirrors the concise structure of the Aramaic and the common
    English rendering of the contrast.
- source_word: מָרִים
  chosen: he raised up
  alternatives:
  - he exalted
  - he promoted
  lexicon: HALOT
  rationale: The verb literally means to raise or lift up, here in the figurative
    sense of elevating status. 'Raised up' preserves the metaphor and prepares for
    the balancing 'humbled' in the next clause.
- source_word: מַשְׁפִּיל
  chosen: he humbled
  alternatives:
  - he brought low
  - he abased
  lexicon: HALOT
  rationale: The verb means to make low or humble. 'He humbled' is clear, modern,
    and preserves the theological and literary contrast with 'raised up'.
