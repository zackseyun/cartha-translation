theological_decisions:
- issue: Agency of the greatness bestowed on Nebuchadnezzar
  chosen_reading: The main text leaves the subject of 'gave' implicit as in the Aramaic,
    while the translation contextually assumes God from the previous verse rather
    than inserting 'God' here.
  alternative_readings:
  - Explicitly supplying 'God gave him' in the verse
  rationale: The source text does not repeat the divine subject in this clause, though
    the antecedent is clear from the preceding context. To avoid adding words not
    present while preserving sense, the translation keeps 'he gave him.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
