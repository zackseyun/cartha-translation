id: DAN.5.8
reference: Daniel 5:8
source:
  edition: WLC
  text: אֱדַ֨יִן֙ עללין כֹּ֖ל חַכִּימֵ֣י מַלְכָּ֑/א וְ/לָֽא כָהֲלִ֤ין כְּתָבָ/א֙ לְ/מִקְרֵ֔א
    ו/פשר/א לְ/הוֹדָעָ֥ה לְ/מַלְכָּֽ/א־׃
translation:
  text: Then all the king’s wise men came in, but they were not able to read the writing
    or make its interpretation known to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'read the inscription.' The Aramaic term can refer to the written message
      itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'tell the king its meaning.' The Aramaic word for 'interpretation' is
      a recurring term in Daniel for explaining a mysterious message or dream.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: עללין
  chosen: came in
  alternatives:
  - entered
  lexicon: HALOT
  rationale: Aramaic plural verb from עלל, used here for entering/presenting themselves
    before the king. 'Came in' is idiomatic and fits the court setting.
- source_word: כֹּל חַכִּימֵי מַלְכָּא
  chosen: all the king’s wise men
  alternatives:
  - all the wise men of the king
  lexicon: HALOT
  rationale: Construct chain indicating the full group attached to the king's court.
    'The king’s wise men' is the most natural English possessive rendering.
- source_word: וְלָא כָהֲלִין
  chosen: but they were not able
  alternatives:
  - and they were not able
  - but they could not
  lexicon: HALOT
  rationale: The conjunction plus negated participial form expresses contrast with
    their entrance and inability to perform the task. 'But they were not able' captures
    both the adversative sense and durative/state nuance.
- source_word: כְּתָבָא לְמִקְרֵא
  chosen: to read the writing
  alternatives:
  - to read the inscription
  lexicon: HALOT
  rationale: כְּתָבָא denotes the written text/message. 'Writing' is straightforward
    and slightly broader; 'inscription' is possible but more interpretive. The infinitive
    construction is rendered idiomatically in English.
- source_word: וּפִשְׁרָא
  chosen: its interpretation
  alternatives:
  - the interpretation
  - its meaning
  lexicon: HALOT
  rationale: פְּשַׁר in Daniel commonly refers to the interpretation or explanation
    of a mysterious message. 'Its interpretation' links the explanation directly to
    the writing and preserves Danielic terminology.
- source_word: לְהוֹדָעָה לְמַלְכָּא
  chosen: to make its interpretation known to the king
  alternatives:
  - to tell the king its interpretation
  - to declare its interpretation to the king
  lexicon: HALOT
  rationale: Causative infinitive of ידע means to make known, inform, or declare.
    'Make known' is slightly more formal and matches the court-report style.
