id: DAN.5.30
reference: Daniel 5:30
source:
  edition: WLC
  text: בֵּ֚/הּ בְּ/לֵ֣ילְיָ֔/א קְטִ֕יל בֵּלְאשַׁצַּ֖ר מַלְכָּ֥/א כשדי/א׃פ
translation:
  text: That very night Belshazzar, the Chaldean king, was killed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'In that night Belshazzar the king of the Chaldeans was
      slain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּהּ
  chosen: that very
  alternatives:
  - in it
  - in that
  lexicon: HALOT
  rationale: Aramaic preposition with 3ms suffix, functioning idiomatically with the
    following time expression to mean 'in that same/very.' In English, 'that very'
    naturally conveys the emphatic deictic force when paired with 'night.'
- source_word: בְּלֵילְיָא
  chosen: night
  alternatives:
  - the night
  lexicon: HALOT
  rationale: Aramaic noun 'night' with prefixed preposition 'in/on' and determined
    state. Combined with בֵּהּ, the phrase is best rendered idiomatically as 'that
    very night' rather than a more wooden 'in that night.'
- source_word: קְטִיל
  chosen: was killed
  alternatives:
  - was slain
  - was put to death
  lexicon: HALOT
  rationale: Aramaic verbal form from קטל in the passive/resultative sense. 'Was killed'
    is clear modern English and preserves the passive force without archaic tone;
    'was slain' is possible but less natural for the stated translation philosophy.
- source_word: בֵּלְאשַׁצַּר
  chosen: Belshazzar
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מַלְכָּא
  chosen: king
  lexicon: HALOT
  rationale: Straightforward rendering of the Aramaic noun in determined state. In
    apposition with the following gentilic, it yields 'the Chaldean king.'
- source_word: כשדיא
  chosen: the Chaldean
  alternatives:
  - of the Chaldeans
  - the Babylonian
  lexicon: HALOT
  rationale: Gentilic/plural form referring to the Chaldeans. In English apposition
    with 'king,' 'the Chaldean king' is the most natural equivalent. 'King of the
    Chaldeans' is more formal and also possible; 'Babylonian' is interpretive and
    broader than the lexical form.
