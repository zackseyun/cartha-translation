id: DAN.5.12
reference: Daniel 5:12
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֡ל דִּ֣י ר֣וּחַ יַתִּירָ֡ה וּ/מַנְדַּ֡ע וְ/שָׂכְלְתָנ֡וּ מְפַשַּׁ֣ר
    חֶלְמִין֩ וַֽ/אַֽחֲוָיַ֨ת אֲחִידָ֜ן וּ/מְשָׁרֵ֣א קִטְרִ֗ין הִשְׁתְּכַ֤חַת בֵּ/הּ֙
    בְּ/דָ֣נִיֵּ֔אל דִּֽי מַלְכָּ֥/א שָׂם שְׁמֵ֖/הּ בֵּלְטְשַׁאצַּ֑ר כְּעַ֛ן דָּנִיֵּ֥אל
    יִתְקְרֵ֖י וּ/פִשְׁרָ֥/ה יְהַֽחֲוֵֽה־׀־־׃פ
translation:
  text: because an extraordinary spirit, knowledge, and understanding to interpret
    dreams, explain riddles, and solve knots were found in him, in Daniel, whom the
    king named Belteshazzar. Now let Daniel be called, and he will show the interpretation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an excellent spirit.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'solve knots,' a metaphor for resolving difficult problems.
    reason: cultural_note
  - marker: c
    text: Or 'he will make known the interpretation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - forasmuch as
  - since
  lexicon: HALOT
  rationale: Aramaic causal expression introducing the queen's reason for recommending
    Daniel. 'Because' is natural modern English and preserves the causal force.
- source_word: רוּחַ יַתִּירָה
  chosen: an extraordinary spirit
  alternatives:
  - an excellent spirit
  - an exceptional spirit
  lexicon: HALOT
  rationale: The phrase denotes an exceptional or surpassing spirit/disposition. 'Extraordinary
    spirit' communicates the superlative sense of יַתִּירָה in clear modern English
    without importing later theological meaning.
- source_word: מַנְדַּע
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Standard sense is 'knowledge.' Kept distinct from the following term
    to preserve the accumulation of qualities.
- source_word: שָׂכְלְתָנוּ
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: HALOT
  rationale: Refers to discernment or understanding. 'Understanding' pairs well with
    'knowledge' while maintaining a distinction in English.
- source_word: מְפַשַּׁר חֶלְמִין
  chosen: to interpret dreams
  alternatives:
  - interpreting dreams
  lexicon: HALOT
  rationale: Infinitive-like participial construction describing Daniel's capability.
    Rendered idiomatically in English as a purpose/ability phrase.
- source_word: אַחֲוָיַת אֲחִידָן
  chosen: explain riddles
  alternatives:
  - make known enigmas
  - interpret sayings
  lexicon: HALOT
  rationale: The expression refers to making difficult sayings or riddling matters
    clear. 'Explain riddles' is concise and contextually apt in a court-wisdom setting.
- source_word: מְשָׁרֵא קִטְרִין
  chosen: solve knots
  alternatives:
  - untie knots
  - resolve difficulties
  - solve problems
  lexicon: HALOT
  rationale: Literally 'loosing knots,' a metaphor for resolving difficult problems.
    'Solve knots' preserves the vivid metaphor more closely than flattening it to
    'solve problems.'
- source_word: הִשְׁתְּכַחַת בֵּהּ
  chosen: were found in him
  alternatives:
  - was found in him
  lexicon: HALOT
  rationale: Although the verb form is singular/feminine, the clause summarizes multiple
    qualities as being found in Daniel. English plural agrees naturally with the listed
    qualities.
- source_word: דִּי מַלְכָּא שָׂם שְׁמֵהּ בֵּלְטְשַׁאצַּר
  chosen: whom the king named Belteshazzar
  alternatives:
  - whose name the king set as Belteshazzar
  lexicon: HALOT
  rationale: Idiomatic rendering of the naming clause. 'Named' is the natural English
    equivalent of 'set his name'.
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - therefore
  - so now
  lexicon: HALOT
  rationale: Discourse marker moving from description to imperative recommendation.
    'Now' is natural and preserves the transition.
- source_word: יִתְקְרֵי
  chosen: let Daniel be called
  alternatives:
  - summon Daniel
  - let Daniel be summoned
  lexicon: HALOT
  rationale: Passive/jussive sense. 'Let Daniel be called' stays closer to the form
    while remaining readable.
- source_word: פִשְׁרָה יְהַחֲוֵה
  chosen: he will show the interpretation
  alternatives:
  - he will declare the interpretation
  - he will make known the interpretation
  lexicon: HALOT
  rationale: The phrase means to make the interpretation known. 'Show the interpretation'
    is a fairly literal but still natural rendering of the Aramaic verb.
