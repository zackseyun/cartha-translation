id: DAN.5.29
reference: Daniel 5:29
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן אֲמַ֣ר בֵּלְשַׁאצַּ֗ר וְ/הַלְבִּ֤ישׁוּ לְ/דָֽנִיֵּאל֙ אַרְגְּוָנָ֔/א
    ו/המונכ/א דִֽי דַהֲבָ֖/א עַֽל צַוְּארֵ֑/הּ וְ/הַכְרִ֣זֽוּ עֲל֔וֹ/הִי דִּֽי לֶהֱוֵ֥א
    שַׁלִּ֛יט תַּלְתָּ֖א בְּ/מַלְכוּתָֽ/א׀־־־׃
translation:
  text: Then Belshazzar gave the command, and they clothed Daniel with purple, put
    a chain of gold around his neck, and proclaimed concerning him that he should
    be the third ruler in the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they dressed Daniel in purple.' The Aramaic term can refer to purple
      clothing or purple cloth as a mark of royal honor.
    reason: lexical_alternative
  - marker: b
    text: Or 'the third ruler in the realm.' The phrase denotes rank within the kingdom,
      likely reflecting Daniel's position as third in authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Immediately then
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: אֲמַר
  chosen: gave the command
  alternatives:
  - said
  - ordered
  lexicon: HALOT
  rationale: Although the verb literally means 'said,' in this context with following
    plural executors it functions as a royal directive. 'Gave the command' brings
    out the performative force without over-paraphrasing.
- source_word: בֵּלְשַׁאצַּר
  chosen: Belshazzar
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וְהַלְבִּישׁוּ לְדָנִיֵּאל אַרְגְּוָנָא
  chosen: they clothed Daniel with purple
  alternatives:
  - they dressed Daniel in purple
  - they clothed Daniel in purple garments
  lexicon: HALOT
  rationale: The causative plural verb means 'they clothed/dressed.' אַרְגְּוָנָא
    denotes purple cloth or royal purple attire. 'Clothed Daniel with purple' is concise
    and preserves the royal honor connotation.
- source_word: ו/המונכא דִי דַהֲבָא
  chosen: a chain of gold
  alternatives:
  - a gold chain
  - a necklace of gold
  lexicon: HALOT
  rationale: The noun refers to an ornamental chain worn as a mark of honor. 'Chain
    of gold' is idiomatic and fits the following phrase 'around his neck.'
- source_word: עַל צַוְּארֵהּ
  chosen: around his neck
  alternatives:
  - on his neck
  lexicon: HALOT
  rationale: English idiom prefers 'around his neck' for an ornament placed on the
    neck, though the preposition is literally 'upon/on.'
- source_word: וְהַכְרִזוּ עֲלֹוהִי
  chosen: and proclaimed concerning him
  alternatives:
  - and proclaimed about him
  - and made proclamation concerning him
  lexicon: HALOT
  rationale: The verb means to herald or proclaim publicly. The prepositional phrase
    indicates the proclamation was about Daniel's status. 'Proclaimed concerning him'
    is formal but clear.
- source_word: דִּי לֶהֱוֵא
  chosen: that he should be
  alternatives:
  - that he was to be
  - that he would be
  lexicon: HALOT
  rationale: This construction introduces the content of the proclamation with a modal/resultative
    nuance. 'Should be' fits the declarative appointment context.
- source_word: שַׁלִּיט
  chosen: ruler
  alternatives:
  - one having authority
  - governor
  lexicon: HALOT
  rationale: The adjective/noun denotes one exercising authority. 'Ruler' is the most
    natural English equivalent in this court setting.
- source_word: תַּלְתָּא
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective indicating rank. 'Third' preserves the plain sense
    and matches the earlier promise in the chapter.
- source_word: בְּמַלְכוּתָא
  chosen: in the kingdom
  alternatives:
  - in the realm
  - in the royal kingdom
  lexicon: HALOT
  rationale: Refers to the kingdom/realm over which royal authority is exercised.
    'In the kingdom' is straightforward and consistent.
