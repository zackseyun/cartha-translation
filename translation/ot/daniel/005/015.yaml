id: DAN.5.15
reference: Daniel 5:15
source:
  edition: WLC
  text: וּ/כְעַ֞ן הֻעַ֣לּוּ קָֽדָמַ֗/י חַכִּֽימַיָּ/א֙ אָֽשְׁפַיָּ֔/א דִּֽי כְתָבָ֤/ה
    דְנָה֙ יִקְר֔וֹן וּ/פִשְׁרֵ֖/הּ לְ/הוֹדָעֻתַ֑/נִי וְ/לָֽא כָהֲלִ֥ין פְּשַֽׁר מִלְּתָ֖/א
    לְ/הַחֲוָיָֽה־־־׃
translation:
  text: And now the wise men, the enchanters, have been brought before me to read
    this writing and make its interpretation known to me, but they were not able to
    show the interpretation of the message.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this inscription.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the interpretation of the matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעַן
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the present situation; 'And now'
    preserves the connective force of ו plus the temporal adverb.
- source_word: הֻעַלּוּ קָדָמַי
  chosen: have been brought before me
  alternatives:
  - were brought before me
  - have been ushered in before me
  lexicon: HALOT
  rationale: Passive/causative form indicates they were caused to come into the king's
    presence. Present perfect in English fits the current-result sense in context.
- source_word: חַכִּימַיָּא
  chosen: the wise men
  alternatives:
  - the sages
  lexicon: HALOT
  rationale: Standard court title in Daniel for the learned advisors; 'wise men' is
    the most transparent and contextually established rendering.
- source_word: אָשְׁפַיָּא
  chosen: the enchanters
  alternatives:
  - the astrologers
  - the conjurers
  lexicon: HALOT
  rationale: Refers to a class of Babylonian occult specialists. 'Enchanters' avoids
    over-specifying astronomy while preserving the magical/divinatory sense.
- source_word: דִּי
  chosen: to
  alternatives:
  - that
  lexicon: HALOT
  rationale: 'Introduces the content/purpose of why they were brought: to read the
    writing and explain it. English infinitive construction is smoother while faithful
    to the sense.'
- source_word: כְתָבָה דְנָה
  chosen: this writing
  alternatives:
  - this inscription
  - this text
  lexicon: HALOT
  rationale: Refers to the written message on the wall. 'Writing' is direct and broad;
    'inscription' is possible but slightly more interpretive.
- source_word: יִקְרוֹן
  chosen: read
  alternatives:
  - proclaim
  - call out
  lexicon: HALOT
  rationale: Basic sense is to read aloud or call out. In this context 'read' best
    matches the king's request regarding the written words.
- source_word: וּפִשְׁרֵהּ לְהוֹדָעוּתַנִי
  chosen: and make its interpretation known to me
  alternatives:
  - and tell me its interpretation
  - and reveal its meaning to me
  lexicon: HALOT
  rationale: פְשַׁר in Daniel regularly denotes interpretation/explanation, especially
    of enigmatic revelations. 'Make known' reflects the causative infinitive of ידע.
- source_word: וְלָא כָהֲלִין
  chosen: but they were not able
  alternatives:
  - but they could not
  lexicon: HALOT
  rationale: Expresses inability. Expanded English subject clarifies the contrast
    with the previously mentioned wise men and enchanters.
- source_word: פְּשַׁר מִלְּתָא
  chosen: the interpretation of the message
  alternatives:
  - the interpretation of the matter
  - the meaning of the word
  lexicon: HALOT
  rationale: מִלְּתָא can mean word, matter, or message. Here it refers to the written
    communication, so 'message' is the clearest idiomatic choice in English.
- source_word: לְהַחֲוָיָה
  chosen: to show
  alternatives:
  - to declare
  - to explain
  lexicon: HALOT
  rationale: Common Aramaic verb meaning to show, make known, or declare. 'Show' preserves
    the verbal distinction from the earlier 'make known' while fitting the idiom.
