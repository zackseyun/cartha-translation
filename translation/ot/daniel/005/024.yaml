id: DAN.5.24
reference: Daniel 5:24
source:
  edition: WLC
  text: בֵּ/אדַ֨יִן֙ מִן קֳדָמ֔וֹ/הִי שְׁלִ֖יַחַ פַּסָּ֣/א דִֽי יְדָ֑/א וּ/כְתָבָ֥/א
    דְנָ֖ה רְשִֽׁים־־׃
translation:
  text: Then from before him the palm of a hand was sent, and this writing was inscribed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Aramaic is literally 'from before him,' indicating
      origin from the presence of the one just mentioned.
    reason: lexical_alternative
  - marker: b
    text: Or 'this inscription was written.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative progression.
- source_word: מִן קֳדָמוֹהִי
  chosen: from before him
  alternatives:
  - from his presence
  - from before him
  lexicon: HALOT
  rationale: Literally 'from before him,' referring to the divine figure just mentioned
    in context. Kept relatively formal to preserve the spatial/personal imagery of
    origin from the presence of God rather than paraphrasing simply as 'from him.'
- source_word: שְׁלִיחַ
  chosen: was sent
  alternatives:
  - was dispatched
  lexicon: HALOT
  rationale: Passive verbal form from the root 'send.' 'Was sent' is the most direct
    and idiomatic rendering.
- source_word: פַּסָּא
  chosen: the palm
  alternatives:
  - the extremity
  - the fingers/palm region
  lexicon: HALOT
  rationale: In this context the term denotes the palm or extremity of the hand. 'The
    palm' fits the construct relationship with 'of a hand' and avoids overinterpreting
    the exact anatomy.
- source_word: יְדָא
  chosen: of a hand
  alternatives:
  - of the hand
  lexicon: HALOT
  rationale: The noun is in the determined state, but English idiom in this expression
    is better represented by the indefinite 'of a hand,' matching the sudden appearance
    of a hand-part rather than a previously identified hand.
- source_word: וּכְתָבָא
  chosen: and this writing
  alternatives:
  - and this inscription
  - and the writing
  lexicon: HALOT
  rationale: Refers to the written message itself. 'Writing' is slightly broader and
    more natural in context, while still allowing the sense of an inscription.
- source_word: דְנָה
  chosen: this
  alternatives:
  - this very
  lexicon: HALOT
  rationale: Demonstrative pointing to the writing Daniel is about to quote. Simple
    'this' is sufficient.
- source_word: רְשִׁים
  chosen: was inscribed
  alternatives:
  - was written
  - was recorded
  lexicon: HALOT
  rationale: The verb can mean 'to write/inscribe.' 'Was inscribed' fits the scene
    of writing appearing on the wall and distinguishes it from a more ordinary act
    of writing.
