theological_decisions:
- issue: Referent of the sender in 'from before him'
  chosen_reading: The phrase refers to the Most High God whose presence is the source
    of the hand.
  alternative_readings:
  - The phrase could be rendered more generically as 'from him' without specifying
    the divine-presence nuance.
  rationale: The immediate context identifies the source as God, but the translation
    avoids importing an explicit divine subject beyond what the Aramaic states. Retaining
    'from before him' preserves the text's imagery and theological restraint.
  doctrine_reference: Translation philosophy §1, §3
