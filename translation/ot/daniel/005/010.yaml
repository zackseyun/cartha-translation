id: DAN.5.10
reference: Daniel 5:10
source:
  edition: WLC
  text: מַלְכְּתָ֕/א לָ/קֳבֵ֨ל מִלֵּ֤י מַלְכָּ/א֙ וְ/רַבְרְבָנ֔וֹ/הִי לְ/בֵ֥ית מִשְׁתְּיָ֖/א
    עללת עֲנָ֨ת מַלְכְּתָ֜/א וַ/אֲמֶ֗רֶת מַלְכָּ/א֙ לְ/עָלְמִ֣ין חֱיִ֔י אַֽל יְבַהֲלוּ/ךְ֙
    רַעְיוֹנָ֔/ךְ וְ/זִיוָ֖י/ךְ אַל יִשְׁתַּנּֽוֹ־־׃
translation:
  text: Because of the words of the king and his nobles, the queen entered the banquet
    hall. The queen spoke and said, “O king, live forever! Do not let your thoughts
    terrify you, and do not let your face grow pale.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'answered and said.' The Aramaic idiom can introduce speech either as
      a response or simply as the beginning of a statement.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your brightnesses do not change,' an idiom referring to the appearance
      of the face; compare the similar expression in this chapter for a face changing
      color from fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָ/קֳבֵל
  chosen: Because of
  alternatives:
  - in response to
  - before
  lexicon: HALOT
  rationale: 'In Biblical Aramaic this preposition commonly marks cause or occasion
    here: the queen comes in on account of what she heard from the king and his nobles.
    ''Because of'' best fits the narrative flow.'
- source_word: מִלֵּי
  chosen: words
  alternatives:
  - matter
  - report
  lexicon: HALOT
  rationale: The plural construct with 'king' naturally refers to the spoken words
    or outcry of the king and his nobles. 'Words' is the most direct rendering.
- source_word: רַבְרְבָנ֔וֹ/הִי
  chosen: his nobles
  alternatives:
  - his lords
  - his great men
  lexicon: HALOT
  rationale: The term denotes high-ranking officials or grandees. 'Nobles' is clear
    modern English and preserves status without archaic tone.
- source_word: לְ/בֵית מִשְׁתְּיָא
  chosen: the banquet hall
  alternatives:
  - the house of the feast
  - the banquet house
  lexicon: HALOT
  rationale: Literally 'to the house of drinking/feast.' 'Banquet hall' communicates
    the setting idiomatically in readable English while preserving the formal scene.
- source_word: עללת
  chosen: entered
  alternatives:
  - came in
  lexicon: HALOT
  rationale: The verb means to go in/enter. 'Entered' is slightly more formal and
    suits the courtly context.
- source_word: עֲנָת ... וַאֲמֶרֶת
  chosen: spoke and said
  alternatives:
  - answered and said
  lexicon: HALOT
  rationale: Although the idiom can be rendered 'answered and said,' there is no explicit
    prior direct address to her in this verse. 'Spoke and said' avoids implying a
    formal reply while preserving the Semitic double-verb style.
- source_word: לְ/עָלְמִין חֱיִי
  chosen: O king, live forever!
  alternatives:
  - May the king live forever!
  lexicon: HALOT
  rationale: This is a standard court formula. Including 'O king' reflects the vocative
    and keeps the idiomatic blessing natural in English.
- source_word: רַעְיוֹנָךְ
  chosen: your thoughts
  alternatives:
  - your thoughts of mind
  - your anxieties
  lexicon: HALOT
  rationale: The noun refers to thoughts or mental reflections. In context these thoughts
    are troubling, but the terror comes from the verb, so 'thoughts' preserves the
    lexical distinction.
- source_word: יְבַהֲלוּךְ
  chosen: terrify you
  alternatives:
  - alarm you
  - trouble you
  lexicon: HALOT
  rationale: The verb conveys being disturbed, alarmed, or terrified. Given the king's
    visible distress in context, 'terrify you' captures the intensity.
- source_word: זִיוָיָךְ
  chosen: your face
  alternatives:
  - your brightness
  - your countenance
  lexicon: HALOT
  rationale: Literally the term relates to brightness or appearance; in this idiom
    it refers to facial appearance/color. 'Your face' is the clearest natural English
    equivalent.
- source_word: יִשְׁתַּנּוֹ
  chosen: grow pale
  alternatives:
  - change
  - be altered
  lexicon: HALOT
  rationale: Literally 'change,' but with 'your face/brightness' the idiom points
    to a change of facial color from fear. 'Grow pale' makes the sense explicit in
    natural English.
