theological_decisions:
- issue: Royal kinship term for Nebuchadnezzar
  chosen_reading: Retain the literal 'his father' in the main text
  alternative_readings:
  - his predecessor
  - his ancestor
  rationale: The Aramaic uses the ordinary kinship term. Since the issue is historical/idiomatic
    rather than doctrinal, the translation preserves the source wording and notes
    the broader royal usage in a footnote rather than resolving it interpretively
    in the text.
  doctrine_reference: Translation philosophy §1, §3, §5
