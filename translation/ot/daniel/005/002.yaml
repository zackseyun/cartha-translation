id: DAN.5.2
reference: Daniel 5:2
source:
  edition: WLC
  text: בֵּלְשַׁאצַּ֞ר אֲמַ֣ר בִּ/טְעֵ֣ם חַמְרָ֗/א לְ/הַיְתָיָה֙ לְ/מָאנֵי֙ דַּהֲבָ֣/א
    וְ/כַסְפָּ֔/א דִּ֤י הַנְפֵּק֙ נְבוּכַדְנֶצַּ֣ר אֲב֔/וּהִי מִן הֵיכְלָ֖/א דִּ֣י
    בִ/ירוּשְׁלֶ֑ם וְ/יִשְׁתּ֣וֹן בְּ/ה֗וֹן מַלְכָּ/א֙ וְ/רַבְרְבָנ֔וֹ/הִי שֵׁגְלָתֵ֖/הּ
    וּ/לְחֵנָתֵֽ/הּ׀־׃
translation:
  text: Belshazzar gave the order, as he tasted the wine, to bring the vessels of
    gold and silver that Nebuchadnezzar his father had taken out of the temple that
    was in Jerusalem, so that the king and his nobles, his wives and his concubines,
    might drink from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'his father'; in royal usage this can also mean 'his ancestor' or
      'predecessor.'
    reason: alternative_reading
  - marker: b
    text: Or 'while under the influence of the wine'; the Aramaic idiom is literally
      'in the taste of the wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמַר
  chosen: gave the order
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: In Imperial Aramaic this verb can mean 'say' broadly, but here it introduces
    an infinitive-like directive ('to bring'), so English 'gave the order' captures
    the performative force more naturally than the bare 'said' while avoiding overstatement
    beyond the context.
- source_word: בִּטְעֵם חַמְרָא
  chosen: as he tasted the wine
  alternatives:
  - under the influence of the wine
  - while tasting the wine
  lexicon: HALOT
  rationale: The phrase is literally 'in the taste of the wine.' It can denote the
    moment of tasting/drinking and may imply intoxication by context. 'As he tasted
    the wine' preserves the concrete idiom without importing a stronger claim of drunkenness
    into the main text.
- source_word: לְהַיְתָיָה
  chosen: to bring
  alternatives:
  - to fetch
  lexicon: HALOT
  rationale: The causative infinitive/verb form here calls for the vessels to be brought
    in. 'Bring' is idiomatic and sufficiently formal.
- source_word: מָאנֵי דַּהֲבָא וְכַסְפָּא
  chosen: the vessels of gold and silver
  alternatives:
  - the articles of gold and silver
  - the cups of gold and silver
  lexicon: HALOT
  rationale: מָאן/מָאנֵי is a broad term for vessels/implements. 'Vessels' preserves
    the temple-cultic sense without narrowing prematurely to drinking cups, though
    they will be used for drinking in the verse.
- source_word: הַנְפֵּק
  chosen: had taken out
  alternatives:
  - had brought out
  - had removed
  lexicon: HALOT
  rationale: The verb means 'bring out/take out.' 'Had taken out' fits the context
    of removing sacred vessels from the Jerusalem temple.
- source_word: אֲבוּהִי
  chosen: his father
  alternatives:
  - his predecessor
  - his ancestor
  lexicon: HALOT
  rationale: The Aramaic term literally reads 'his father.' In royal usage it can
    denote ancestor or predecessor, but the translation keeps the literal familial
    term in the main text and leaves historical nuance to annotation.
- source_word: הֵיכְלָא
  chosen: the temple
  alternatives:
  - the palace-temple
  - the sanctuary
  lexicon: HALOT
  rationale: In this context, referring to Jerusalem, 'temple' is the clear and standard
    sense.
- source_word: וְיִשְׁתּוֹן בְּהוֹן
  chosen: might drink from them
  alternatives:
  - should drink from them
  - drink from them
  lexicon: HALOT
  rationale: The imperfect expresses intended result/purpose after the order to bring
    the vessels. 'Might drink from them' communicates that purpose naturally in English.
- source_word: רַבְרְבָנוֹהִי
  chosen: his nobles
  alternatives:
  - his great men
  - his lords
  lexicon: HALOT
  rationale: The term denotes high officials or grandees. 'Nobles' is clear modern
    English and fits the court setting.
- source_word: שֵׁגְלָתֵהּ
  chosen: his wives
  alternatives:
  - his queens
  - his consorts
  lexicon: HALOT
  rationale: The word refers to royal women/wives. 'Wives' is the broadest accurate
    rendering here; 'queens' could imply each held formal queenly rank, which is less
    certain.
- source_word: לְחֵנָתֵהּ
  chosen: his concubines
  alternatives:
  - his secondary wives
  lexicon: HALOT
  rationale: This term refers to women of lower status than wives in the royal household.
    'Concubines' is the standard and precise English equivalent.
