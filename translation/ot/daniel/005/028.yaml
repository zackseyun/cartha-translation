id: DAN.5.28
reference: Daniel 5:28
source:
  edition: WLC
  text: פְּרֵ֑ס פְּרִיסַת֙ מַלְכוּתָ֔/ךְ וִ/יהִיבַ֖ת לְ/מָדַ֥י וּ/פָרָֽס׃
translation:
  text: 'Peres: your kingdom has been divided and given to the Medes and Persians.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Aramaic inscription term 'Peres' sounds like the verb 'divided' and
      also echoes 'Persia/Persians,' preserving Daniel's wordplay in the interpretation.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרֵס
  chosen: Peres
  alternatives:
  - A division
  - Divided
  lexicon: HALOT
  rationale: Rendered as a transliteration of the inscription term rather than translating
    it outright, since in context Daniel is interpreting the written word itself.
    This preserves the wordplay with the following verb and with 'Persia/Persians'
    in the final phrase.
- source_word: פְּרִיסַת
  chosen: has been divided
  alternatives:
  - is divided
  - broken in pieces
  lexicon: HALOT
  rationale: The verb from the same root as פְּרֵס denotes division. The perfect is
    rendered with English present perfect ('has been divided') to convey the announced,
    decisive judgment already determined.
- source_word: מַלְכוּתָךְ
  chosen: your kingdom
  alternatives:
  - your kingship
  - your royal dominion
  lexicon: HALOT
  rationale: '''Kingdom'' is the most natural rendering for the realm under Belshazzar''s
    rule; ''kingship'' would emphasize office rather than the realm being transferred.'
- source_word: וִיהִיבַת
  chosen: and given
  alternatives:
  - and handed over
  - and delivered
  lexicon: HALOT
  rationale: 'A straightforward rendering of the passive/resultative sense in context:
    the kingdom is transferred to new rulers.'
- source_word: לְמָדַי
  chosen: to the Medes
  alternatives:
  - to Media
  - to the Mede
  lexicon: HALOT
  rationale: The gentilic is best rendered as the people group 'the Medes' in parallel
    with 'Persians.'
- source_word: וּפָרָס
  chosen: and Persians
  alternatives:
  - and Persia
  - and Paras
  lexicon: HALOT
  rationale: Rendered as the people group in coordination with 'the Medes.' Although
    the form also echoes the sound of פְּרֵס/פְּרִיסַת, translating it as 'Persians'
    communicates the historical referent while the footnote preserves the wordplay.
