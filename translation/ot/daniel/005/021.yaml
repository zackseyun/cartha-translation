id: DAN.5.21
reference: Daniel 5:21
source:
  edition: WLC
  text: וּ/מִן בְּנֵי֩ אֲנָשָׁ֨/א טְרִ֜יד וְ/לִבְבֵ֣/הּ עִם חֵיוְתָ֣/א שוי וְ/עִם
    עֲרָֽדַיָּ/א֙ מְדוֹרֵ֔/הּ עִשְׂבָּ֤/א כְ/תוֹרִין֙ יְטַ֣עֲמוּנֵּ֔/הּ וּ/מִ/טַּ֥ל
    שְׁמַיָּ֖/א גִּשְׁמֵ֣/הּ יִצְטַבַּ֑ע עַ֣ד דִּֽי יְדַ֗ע דִּֽי שַׁלִּ֞יט אֱלָהָ֤/א
    עלי/א בְּ/מַלְכ֣וּת אֲנָשָׁ֔/א וּ/לְ/מַן דִּ֥י יִצְבֵּ֖ה יְהָקֵ֥ים עלי/ה־׀־־־־־׃
translation:
  text: He was driven away from the sons of men, and his heart was made like the beasts,
    and his dwelling was with the wild donkeys. They fed him grass like oxen, and
    his body was drenched with the dew of heaven, until he knew that the Most High
    God rules over the kingdom of mankind and sets over it whomever he wills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from human beings' for 'from the sons of men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his mind was made like the beasts'; the Aramaic literally says 'his
      heart was made like [the beasts].'
    reason: lexical_alternative
  - marker: c
    text: '''Wild donkeys'' refers to onagers; older English versions often have ''wild
      asses.'''
    reason: cultural_note
  - marker: d
    text: Or 'over the kingdom of men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טְרִיד
  chosen: was driven away
  alternatives:
  - was expelled
  - was driven out
  lexicon: HALOT
  rationale: Passive/resultative sense in context of Nebuchadnezzar's humiliation;
    'driven away' is natural English and preserves the force of removal.
- source_word: בְּנֵי אֲנָשָׁא
  chosen: the sons of men
  alternatives:
  - human beings
  - mankind
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom and the contrast with
    beasts. Because the phrase is gender-representative rather than specifically male,
    the broader sense is reflected later with 'mankind' where the context is generic.
- source_word: לִבְבֵהּ ... שוי
  chosen: his heart was made like
  alternatives:
  - his mind was made like
  - his heart was set with
  lexicon: HALOT
  rationale: '''Heart'' is the direct lexical equivalent and in Biblical Aramaic can
    include the inner mind/disposition. Retaining ''heart'' preserves the source imagery
    without over-interpreting it as merely psychological.'
- source_word: חֵיוְתָא
  chosen: the beasts
  alternatives:
  - animals
  - beasts of the field
  lexicon: HALOT
  rationale: '''Beasts'' fits the royal-humiliation context and matches the animal
    imagery of the verse.'
- source_word: עֲרָדַיָּא
  chosen: the wild donkeys
  alternatives:
  - wild asses
  lexicon: HALOT
  rationale: The noun refers specifically to wild donkeys/onagers. 'Wild donkeys'
    is accurate modern English; 'wild asses' is archaic and potentially distracting.
- source_word: מְדוֹרֵהּ
  chosen: his dwelling
  alternatives:
  - his habitation
  - his abode
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for dwelling place; readable
    modern English.
- source_word: עִשְׂבָּא
  chosen: grass
  alternatives:
  - vegetation
  - herbage
  lexicon: HALOT
  rationale: In this feeding context, 'grass' is the natural and sufficiently precise
    English equivalent.
- source_word: כְתוֹרִין
  chosen: like oxen
  alternatives:
  - like cattle
  lexicon: HALOT
  rationale: The term denotes oxen/bulls. 'Like oxen' preserves the comparison more
    concretely than the broader 'cattle.'
- source_word: יְטַעֲמוּנֵּהּ
  chosen: They fed him
  alternatives:
  - he was made to eat
  - they made him taste
  lexicon: HALOT
  rationale: 'Though the verb is literally related to tasting/eating, in this construction
    the sense is causative: he was given grass to eat. ''They fed him'' is idiomatic
    and concise.'
- source_word: גִּשְׁמֵהּ
  chosen: his body
  alternatives:
  - his frame
  - his person
  lexicon: HALOT
  rationale: The noun refers to the body. 'Body' is the clearest modern equivalent.
- source_word: יִצְטַבַּע
  chosen: was drenched
  alternatives:
  - was wet
  - was soaked
  lexicon: HALOT
  rationale: The reflexive/passive form conveys being thoroughly moistened. 'Was drenched'
    captures the intensity better than the weaker 'was wet.'
- source_word: אֱלָהָא עליא
  chosen: the Most High God
  alternatives:
  - God Most High
  - the high God
  lexicon: HALOT
  rationale: This is the standard and natural English rendering of the divine title
    in this context.
- source_word: שַׁלִּיט
  chosen: rules over
  alternatives:
  - is sovereign over
  - has dominion over
  lexicon: HALOT
  rationale: The adjective/participle expresses ruling authority. 'Rules over' is
    clear, direct, and preserves the statement of divine sovereignty without importing
    extra abstraction.
- source_word: בְּמַלְכוּת אֲנָשָׁא
  chosen: over the kingdom of mankind
  alternatives:
  - over the kingdom of men
  - over human kingship
  lexicon: HALOT
  rationale: The phrase refers to human rule/realm in general. 'Mankind' communicates
    the representative sense of אֲנָשָׁא in contemporary English while preserving
    the singular 'kingdom' of human dominion.
- source_word: וּלְמַן דִּי יִצְבֵּה יְהָקֵים עליה
  chosen: and sets over it whomever he wills
  alternatives:
  - and appoints over it anyone he desires
  - and raises up over it whom he wishes
  lexicon: HALOT
  rationale: This clause emphasizes God's freedom in appointing rulers. 'Sets over
    it whomever he wills' is faithful, idiomatic, and preserves the personal volition
    expressed by יִצְבֵּה.
