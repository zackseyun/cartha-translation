theological_decisions:
- issue: Rendering the divine sovereignty statement without softening or over-systematizing
    it
  chosen_reading: the Most High God rules over the kingdom of mankind and sets over
    it whomever he wills
  alternative_readings:
  - the Most High God is sovereign over the kingdom of men and appoints over it whomever
    he desires
  rationale: The verse plainly asserts God's active rule and appointment of rulers.
    The translation preserves that force directly while avoiding more technical theological
    wording than the Aramaic itself requires.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender-representative language in אֲנָשָׁא
  chosen_reading: mankind
  alternative_readings:
  - men
  - humanity
  rationale: The source term is grammatically masculine but generic in sense. 'Mankind'
    preserves the representative force more accurately than a narrowly male reading,
    in line with the project's gender-accurate policy.
  doctrine_reference: Translation philosophy §4
