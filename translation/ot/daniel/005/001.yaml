id: DAN.5.1
reference: Daniel 5:1
source:
  edition: WLC
  text: בֵּלְשַׁאצַּ֣ר מַלְכָּ֗/א עֲבַד֙ לְחֶ֣ם רַ֔ב לְ/רַבְרְבָנ֖וֹ/הִי אֲלַ֑ף וְ/לָ/קֳבֵ֥ל
    אַלְפָּ֖/א חַמְרָ֥/א שָׁתֵֽה׃
translation:
  text: King Belshazzar made a great feast for a thousand of his nobles, and in the
    presence of the thousand he was drinking wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and before the thousand he drank wine.' The Aramaic expression can be
      rendered more literally with 'before,' but here likely means that he was drinking
      publicly in the presence of the thousand guests.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'The emphatic/state-marked noun functions appositionally with the proper
    name: ''King Belshazzar.'' English idiom prefers the title before the name without
    the article.'
- source_word: עֲבַד
  chosen: made
  alternatives:
  - held
  - prepared
  lexicon: HALOT
  rationale: The Aramaic verb literally means 'did/made.' In context of a banquet,
    'made' is a natural English equivalent that preserves the source wording better
    than the more interpretive 'held.'
- source_word: לְחֶם רַב
  chosen: a great feast
  alternatives:
  - a great banquet
  - a great meal
  lexicon: HALOT
  rationale: Although לְחֶם is literally 'bread/food,' in banquet contexts it denotes
    a feast or banquet meal. 'Great feast' captures both the noun and the adjective
    רַב while sounding natural in English.
- source_word: לְרַבְרְבָנֹוהִי
  chosen: for ... his nobles
  alternatives:
  - for ... his great men
  - for ... his lords
  lexicon: HALOT
  rationale: The term refers to high-ranking officials or grandees. 'Nobles' is idiomatic
    modern English and fits the courtly setting without importing feudal specificity
    too strongly.
- source_word: אֲלַף
  chosen: a thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: וְלָקֳבֵל
  chosen: and in the presence of
  alternatives:
  - and before
  - and opposite
  - while facing
  lexicon: HALOT
  rationale: The prepositional expression means 'before/in front of/in the presence
    of.' Here it most naturally indicates that Belshazzar drank publicly before the
    assembled thousand, not merely spatial opposition.
- source_word: חַמְרָא
  chosen: wine
  lexicon: HALOT
  rationale: Standard Aramaic term for wine.
- source_word: שָׁתֵה
  chosen: he was drinking
  alternatives:
  - he drank
  - drinking
  lexicon: HALOT
  rationale: The participial form conveys ongoing action. 'He was drinking' reflects
    the progressive sense better than a simple past 'he drank.'
