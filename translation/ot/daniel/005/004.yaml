id: DAN.5.4
reference: Daniel 5:4
source:
  edition: WLC
  text: אִשְׁתִּ֖יו חַמְרָ֑/א וְ֠/שַׁבַּחוּ לֵֽ/אלָהֵ֞י דַּהֲבָ֧/א וְ/כַסְפָּ֛/א נְחָשָׁ֥/א
    פַרְזְלָ֖/א אָעָ֥/א וְ/אַבְנָֽ/א׃
translation:
  text: They drank the wine and praised the gods of gold and silver, bronze, iron,
    wood, and stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze.' The Aramaic term can denote copper or bronze;
      'bronze' best fits the conventional material list for idols here.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשְׁתִּיו
  chosen: They drank
  alternatives:
  - They were drinking
  lexicon: HALOT
  rationale: Aramaic verb from שתה, peal perfect 3mp, narrating the action straightforwardly.
    English simple past fits the sequence of events better than a progressive form
    here.
- source_word: חַמְרָא
  chosen: the wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Definite singular noun in Aramaic. Rendering with the article reflects
    the emphatic state and the specific wine being consumed at the feast.
- source_word: וְשַׁבַּחוּ
  chosen: and praised
  alternatives:
  - and glorified
  - and lauded
  lexicon: HALOT
  rationale: The verb denotes giving praise. 'Praised' is the most natural modern
    English equivalent and preserves the cultic sense without overtranslation.
- source_word: לֵאלָהֵי
  chosen: the gods of
  alternatives:
  - to the gods of
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of praise. In idiomatic English,
    'praised the gods of...' is smoother than 'praised to the gods of...' while preserving
    the sense.
- source_word: דַּהֲבָא
  chosen: gold
  lexicon: HALOT
  rationale: 'Material descriptor for the idols/gods. Kept as the bare material noun
    in a genitival chain: ''gods of gold.'''
- source_word: וְכַסְפָּא
  chosen: and silver
  lexicon: HALOT
  rationale: Second item in the material list; rendered coordinate with the same structure.
- source_word: נְחָשָׁא
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical material lists this term commonly refers to bronze rather
    than pure copper in English translation tradition and likely sense.
- source_word: פַרְזְלָא
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term.
- source_word: אָעָא
  chosen: wood
  lexicon: HALOT
  rationale: Standard rendering of the material term in idol lists.
- source_word: וְאַבְנָא
  chosen: and stone
  alternatives:
  - and rock
  lexicon: HALOT
  rationale: In this context of idol materials, 'stone' is the natural English equivalent.
