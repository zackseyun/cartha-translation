theological_decisions:
- issue: Whether אֱלָהֵי here should be rendered 'gods' or 'God'
  chosen_reading: gods
  alternative_readings:
  - God
  rationale: The plural form and the following list of idol materials clearly indicate
    pagan deities/images, not the God of Israel. The context is polemical against
    idolatry, so 'gods' is required by the source text.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
