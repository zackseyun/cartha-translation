id: DAN.5.20
reference: Daniel 5:20
source:
  edition: WLC
  text: וּ/כְ/דִי֙ רִ֣ם לִבְבֵ֔/הּ וְ/רוּחֵ֖/הּ תִּֽקְפַ֣ת לַ/הֲזָדָ֑ה הָנְחַת֙ מִן
    כָּרְסֵ֣א מַלְכוּתֵ֔/הּ וִֽ/יקָרָ֖/ה הֶעְדִּ֥יוּ מִנֵּֽ/הּ־׃
translation:
  text: But when his heart was lifted up and his spirit was hardened into arrogance,
    he was brought down from his royal throne, and his glory was taken away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his spirit grew arrogant' or 'his spirit became strong in presumption.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his honor' or 'his majesty was taken away from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְדִי
  chosen: But when
  alternatives:
  - and when
  - now when
  lexicon: HALOT
  rationale: Aramaic temporal conjunction introducing the circumstance for the following
    judgment. 'But when' fits the contrastive flow from the previous verse while preserving
    the temporal sense.
- source_word: רִם לִבְבֵהּ
  chosen: his heart was lifted up
  alternatives:
  - his heart was exalted
  - his heart became proud
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart being raised. 'Was lifted up'
    preserves the metaphor and its moral sense of pride better than a flattened paraphrase.
- source_word: וְרוּחֵהּ תִּקְפַת לַהֲזָדָה
  chosen: his spirit was hardened into arrogance
  alternatives:
  - his spirit became strong in presumption
  - his spirit was emboldened to act proudly
  - his spirit grew arrogant
  lexicon: HALOT
  rationale: תִּקְפַת conveys becoming strong/hard, and לַהֲזָדָה denotes presumptuous
    pride or arrogance. 'Was hardened into arrogance' captures both the internal stiffening
    and the resulting insolence.
- source_word: הָנְחַת
  chosen: he was brought down
  alternatives:
  - he was deposed
  - he was made to go down
  lexicon: HALOT
  rationale: 'Passive/causative sense in context: Nebuchadnezzar was removed from
    his exalted position. ''Brought down'' preserves the humiliation motif and echoes
    the prior ''lifted up''.'
- source_word: מִן כָּרְסֵא מַלְכוּתֵהּ
  chosen: from his royal throne
  alternatives:
  - from the throne of his kingdom
  - from his kingdom's throne
  lexicon: HALOT
  rationale: כָּרְסֵא is 'throne'; מַלְכוּתֵהּ specifies kingship/royal rule. 'Royal
    throne' is natural English while retaining the regal sense.
- source_word: וִיקָרֵהּ
  chosen: his glory
  alternatives:
  - his honor
  - his majesty
  - his splendor
  lexicon: HALOT
  rationale: Aramaic יְקָר can denote honor, glory, or majesty. 'Glory' matches the
    royal context and the loss of regal dignity.
- source_word: הֶעְדִּיוּ מִנֵּהּ
  chosen: was taken away from him
  alternatives:
  - they removed from him
  - was stripped from him
  lexicon: HALOT
  rationale: The plural verb functions idiomatically with an indefinite subject. English
    passive best conveys the sense without introducing an unnecessary explicit agent.
