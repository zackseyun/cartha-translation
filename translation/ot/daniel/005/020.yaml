theological_decisions:
- issue: Nature of Nebuchadnezzar's downfall
  chosen_reading: The verse describes divine humbling through royal deposition without
    explicitly naming God in this line.
  alternative_readings:
  - An explicit divine passive could be inferred from the broader context.
  rationale: The immediate clause uses passive/indefinite-agent forms. The translation
    preserves the text's wording and lets the wider context supply that God is the
    ultimate actor, rather than importing that explicitly here.
  doctrine_reference: Translation philosophy §1, §3
