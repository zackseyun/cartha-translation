id: DAN.5.17
reference: Daniel 5:17
source:
  edition: WLC
  text: בֵּ/אדַ֜יִן עָנֵ֣ה דָנִיֵּ֗אל וְ/אָמַר֙ קֳדָ֣ם מַלְכָּ֔/א מַתְּנָתָ/ךְ֙ לָ֣/ךְ
    לֶֽהֶוְיָ֔ן וּ/נְבָ֥זְבְּיָתָ֖/ךְ לְ/אָחֳרָ֣ן הַ֑ב בְּרַ֗ם כְּתָבָ/א֙ אֶקְרֵ֣א
    לְ/מַלְכָּ֔/א וּ/פִשְׁרָ֖/א אֲהוֹדְעִנֵּֽ/הּ׃
translation:
  text: Then Daniel answered and said before the king, “Let your gifts remain yours,
    and give your rewards to another. Nevertheless, I will read the writing for the
    king and make its interpretation known to him.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next action in sequence. 'Then'
    is natural modern English and preserves narrative flow.
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - answered
  - responded and said
  lexicon: HALOT
  rationale: This common Semitic narrative pair is retained rather than collapsed,
    since both verbs are present and the English remains readable.
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - in the presence of the king
  - to the king
  lexicon: HALOT
  rationale: קֳדָם literally indicates presence/before. 'Before the king' preserves
    the courtly setting better than the flatter 'to the king.'
- source_word: מַתְּנָתָךְ
  chosen: your gifts
  alternatives:
  - your gift
  lexicon: HALOT
  rationale: The form is plural/collective with 2ms suffix. 'Your gifts' fits the
    context of promised royal rewards.
- source_word: לָךְ לֶהֶוְיָן
  chosen: remain yours
  alternatives:
  - be for yourself
  - be yours
  lexicon: HALOT
  rationale: Idiomatic expression meaning the gifts may stay with the king. 'Remain
    yours' communicates Daniel's refusal clearly in natural English.
- source_word: נְבָזְבְּיָתָךְ
  chosen: your rewards
  alternatives:
  - your presents
  - your honors
  lexicon: HALOT
  rationale: Refers to distributions or rewards bestowed by the king. 'Rewards' best
    fits the immediate context of promised compensation for interpretation.
- source_word: לְאָחֳרָן הַב
  chosen: give ... to another
  alternatives:
  - give ... to others
  - give ... to someone else
  lexicon: HALOT
  rationale: Singular 'another' matches the Aramaic adjective used substantivally
    and keeps the statement pointed.
- source_word: בְּרַם
  chosen: Nevertheless
  alternatives:
  - But
  - However
  lexicon: HALOT
  rationale: 'Marks contrast: Daniel refuses payment yet agrees to interpret. ''Nevertheless''
    captures the concessive force well.'
- source_word: כְּתָבָא
  chosen: the writing
  alternatives:
  - the inscription
  - the text
  lexicon: HALOT
  rationale: In context this is the mysterious writing on the wall. 'The writing'
    is straightforward and traditional without being archaic.
- source_word: אֶקְרֵא לְמַלְכָּא
  chosen: I will read the writing for the king
  alternatives:
  - I will read it to the king
  lexicon: HALOT
  rationale: Keeps both the explicit object and recipient. 'For the king' reflects
    the lamed while sounding natural in English.
- source_word: פִשְׁרָא
  chosen: its interpretation
  alternatives:
  - the interpretation
  - its meaning
  lexicon: HALOT
  rationale: Technical term in Daniel for the interpretation of a dream or enigmatic
    message. 'Interpretation' preserves that established sense.
- source_word: אֲהוֹדְעִנֵּהּ
  chosen: make its interpretation known to him
  alternatives:
  - tell him its interpretation
  - make known to him the interpretation
  lexicon: HALOT
  rationale: 'Causative of ''know'': Daniel will cause the king to know the interpretation.
    The chosen rendering preserves both causative force and the final pronoun referring
    to the king.'
