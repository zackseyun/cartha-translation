id: DAN.5.14
reference: Daniel 5:14
source:
  edition: WLC
  text: וְ/שִׁמְעֵ֣ת עלי/ך דִּ֛י ר֥וּחַ אֱלָהִ֖ין בָּ֑/ךְ וְ/נַהִיר֧וּ וְ/שָׂכְלְתָנ֛וּ
    וְ/חָכְמָ֥ה יַתִּירָ֖ה הִשְׁתְּכַ֥חַת בָּֽ/ךְ׃
translation:
  text: And I have heard about you that the spirit of the gods is in you, and that
    illumination, insight, and extraordinary wisdom are found in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the spirit of God' or 'the Spirit of God.' The Aramaic is literally
      'the spirit of the gods,' reflecting the king's wording.
    reason: alternative_reading
  - marker: b
    text: '''Illumination'' is literally ''light/brightness,'' used here metaphorically
      for mental clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁמְעֵת
  chosen: And I have heard
  alternatives:
  - And I heard
  - Now I have heard
  lexicon: HALOT
  rationale: Perfect first person singular in Biblical Aramaic reports received information.
    Present perfect English ('have heard') fits the discourse context of the king
    reporting what has come to his attention.
- source_word: עֲלָיִךְ
  chosen: about you
  alternatives:
  - concerning you
  - of you
  lexicon: HALOT
  rationale: The preposition with pronoun after 'heard' naturally means 'about/concerning
    you' in English.
- source_word: דִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here דִּי introduces the content of what was heard, best rendered by
    'that.'
- source_word: רוּחַ אֱלָהִין
  chosen: the spirit of the gods
  alternatives:
  - a spirit of the gods
  - the Spirit of God
  - the spirit of God
  lexicon: HALOT
  rationale: In Daniel 5 the pagan king speaks from a Babylonian perspective, and
    אֱלָהִין is morphologically plural. The phrase echoes 4:8-9, 18 in Aramaic court
    speech. Rendering it as 'the spirit of the gods' preserves the speaker's viewpoint
    without importing later theological interpretation.
- source_word: בָּךְ
  chosen: is in you
  alternatives:
  - is within you
  lexicon: HALOT
  rationale: Simple locative expression; 'in you' is natural and direct.
- source_word: נַהִירוּ
  chosen: illumination
  alternatives:
  - light
  - brightness
  - enlightenment
  lexicon: HALOT
  rationale: The noun denotes light/brightness metaphorically associated with mental
    clarity in this context. 'Illumination' preserves the metaphor while fitting the
    list of intellectual qualities.
- source_word: שָׂכְלְתָנוּ
  chosen: insight
  alternatives:
  - understanding
  - intelligence
  - prudence
  lexicon: HALOT
  rationale: The term refers to understanding or good sense. 'Insight' reads smoothly
    alongside 'illumination' and 'wisdom' while preserving distinctiveness.
- source_word: חָכְמָה יַתִּירָה
  chosen: extraordinary wisdom
  alternatives:
  - surpassing wisdom
  - excellent wisdom
  - abundant wisdom
  lexicon: HALOT
  rationale: חָכְמָה is 'wisdom'; יַתִּירָה intensifies it as exceeding the ordinary.
    'Extraordinary wisdom' is idiomatic modern English and reflects the superlative
    force.
- source_word: הִשְׁתְּכַחַת
  chosen: are found
  alternatives:
  - has been found
  - were found
  lexicon: HALOT
  rationale: The verb means 'to be found/discovered.' With the series of feminine
    singular nouns treated collectively in English, 'are found' gives a natural rendering.
