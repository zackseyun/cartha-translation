theological_decisions:
- issue: Whether to render אֱלָהִין as singular ('God') or plural ('gods') in a pagan
    king's speech
  chosen_reading: the spirit of the gods
  alternative_readings:
  - the spirit of God
  - the Spirit of God
  rationale: The immediate speaker is Belshazzar, not the narrator, and the Aramaic
    court setting regularly reflects Babylonian idiom. Preserving the plural respects
    original-language primacy and avoids smoothing the king's pagan formulation into
    Israelite or Christian theological language. The alternative is worth preserving
    because some translations construe the phrase monotheistically in light of Daniel's
    God-given wisdom.
  doctrine_reference: Translation philosophy §1, §3
