id: DAN.5.3
reference: Daniel 5:3
source:
  edition: WLC
  text: בֵּ/אדַ֗יִן הַיְתִיו֙ מָאנֵ֣י דַהֲבָ֔/א דִּ֣י הַנְפִּ֗קוּ מִן הֵֽיכְלָ֛/א
    דִּֽי בֵ֥ית אֱלָהָ֖/א דִּ֣י בִ/ירֽוּשְׁלֶ֑ם וְ/אִשְׁתִּ֣יו בְּ/ה֗וֹן מַלְכָּ/א֙
    וְ/רַבְרְבָנ֔וֹ/הִי שֵׁגְלָתֵ֖/הּ וּ/לְחֵנָתֵֽ/הּ־־׃
translation:
  text: Then they brought in the gold vessels that had been taken out of the temple,
    the house of God, which was in Jerusalem, and the king and his nobles, his wives
    and his concubines drank from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which they had brought out of the temple.' The Aramaic verb can be rendered
      more actively, but the passive-style English keeps the focus on the vessels.
    reason: lexical_alternative
  - marker: b
    text: '''His wives'' translates an Aramaic term that can refer to royal consorts;
      some render it ''his queens.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative progression.
- source_word: הַיְתִיו
  chosen: they brought in
  alternatives:
  - they came with
  - they caused to be brought
  lexicon: HALOT
  rationale: In context with the following object 'gold vessels,' the verb denotes
    bringing the items in. 'They brought in' is idiomatic and reflects the causative/resultative
    sense in narrative context.
- source_word: מָאנֵי דַהֲבָא
  chosen: the gold vessels
  alternatives:
  - the vessels of gold
  - the gold articles
  lexicon: HALOT
  rationale: מָאנֵי refers to vessels/utensils/articles; 'vessels' fits temple ware
    well and preserves the cultic setting better than the broader 'articles.'
- source_word: דִּי הַנְפִּקוּ
  chosen: that had been taken out
  alternatives:
  - which they had brought out
  - that were removed
  lexicon: HALOT
  rationale: Relative clause referring to the vessels previously removed from the
    Jerusalem temple. The passive-like English phrasing keeps focus on the vessels
    rather than introducing an unnecessary subject.
- source_word: מִן הֵיכְלָא
  chosen: out of the temple
  alternatives:
  - from the palace-temple
  - from the sanctuary
  lexicon: HALOT
  rationale: הֵיכְלָא here refers to the temple building in Jerusalem. 'Temple' is
    the standard and clearest rendering in this context.
- source_word: דִּי בֵית אֱלָהָא
  chosen: the house of God
  alternatives:
  - the house of the God
  - God's house
  lexicon: HALOT
  rationale: Appositional clarification of 'the temple.' 'The house of God' preserves
    the formal biblical expression while remaining readable.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: which was in Jerusalem
  alternatives:
  - that was in Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative particle links the house of God to its location. 'Which
    was in Jerusalem' is smooth and explicit in English.
- source_word: וְאִשְׁתִּיו בְּהוֹן
  chosen: and ... drank from them
  alternatives:
  - and drank with them
  - and drank out of them
  lexicon: HALOT
  rationale: The verb means 'drank,' and the preposition indicates use of the vessels
    as drinking containers. 'Drank from them' is idiomatic modern English.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - the king himself
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with article/state marking.
- source_word: רַבְרְבָנוֹהִי
  chosen: his nobles
  alternatives:
  - his great men
  - his lords
  lexicon: HALOT
  rationale: Refers to the king's high officials or magnates. 'Nobles' is clear, dignified,
    and contextually appropriate.
- source_word: שֵׁגְלָתֵהּ
  chosen: his wives
  alternatives:
  - his queens
  - his consorts
  lexicon: HALOT
  rationale: The term refers to royal women/wives. 'His wives' is the most transparent
    rendering in this banquet context; 'queens' could misleadingly suggest only principal
    queens.
- source_word: וּלְחֵנָתֵהּ
  chosen: his concubines
  alternatives:
  - his secondary wives
  lexicon: HALOT
  rationale: Standard rendering for women of lower marital status in a royal harem.
    'Concubines' is the established and precise English equivalent.
