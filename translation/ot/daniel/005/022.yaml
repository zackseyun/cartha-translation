theological_decisions:
- issue: Meaning of 'his son' in relation to Nebuchadnezzar and Belshazzar
  chosen_reading: Retain the dynastic expression 'his son' in the main text without
    resolving whether it means literal son or descendant/successor.
  alternative_readings:
  - his descendant
  - his successor
  rationale: The Aramaic term can function broadly for lineage or royal succession.
    The translation preserves the source expression rather than importing a historical
    harmonization into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
