id: DAN.5.22
reference: Daniel 5:22
source:
  edition: WLC
  text: ו/אנתה בְּרֵ/הּ֙ בֵּלְשַׁאצַּ֔ר לָ֥א הַשְׁפֵּ֖לְתְּ לִבְבָ֑/ךְ כָּ/ל קֳבֵ֕ל
    דִּ֥י כָל דְּנָ֖ה יְדַֽעְתָּ־־׃
translation:
  text: But you, his son, Belshazzar, have not humbled your heart, even though you
    knew all this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'his son' can also mean 'his descendant' or 'his successor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a strong contrast with
    the preceding account of Nebuchadnezzar. 'But you' best captures the adversative
    force in natural English.
- source_word: בְּרֵהּ
  chosen: his son
  alternatives:
  - his descendant
  - his successor
  lexicon: HALOT
  rationale: In Biblical Aramaic, 'son' can denote a literal son or a broader dynastic
    descendant/successor. 'His son' preserves the source wording most directly, while
    the broader sense remains possible from context.
- source_word: בֵּלְשַׁאצַּר
  chosen: Belshazzar
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: לָא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation of the following verb.
- source_word: הַשְׁפֵּלְתְּ
  chosen: have not humbled
  alternatives:
  - did not humble
  - have not brought low
  lexicon: HALOT
  rationale: The verb means to humble or make low. 'Have not humbled' fits the direct
    object 'your heart' idiomatically in English and reflects Daniel's accusation
    of moral pride.
- source_word: לִבְבָךְ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term for the inner
    person, including will and understanding. Retaining ''heart'' preserves the biblical
    idiom and theological resonance.'
- source_word: כָּל־קֳבֵל דִּי
  chosen: even though
  alternatives:
  - although
  - because
  lexicon: HALOT
  rationale: 'This Aramaic expression introduces concession here: despite the fact
    that Belshazzar knew what happened before, he still did not humble himself. ''Even
    though'' makes the concessive sense clear in modern English.'
- source_word: כָל־דְּנָה
  chosen: all this
  alternatives:
  - all these things
  - all of this
  lexicon: HALOT
  rationale: Refers back to the preceding events involving Nebuchadnezzar. 'All this'
    is concise and natural while preserving the demonstrative force.
- source_word: יְדַעְתָּ
  chosen: you knew
  alternatives:
  - you have known
  lexicon: HALOT
  rationale: Simple past is the most natural English rendering in context, referring
    to Belshazzar's prior knowledge of the narrated events.
