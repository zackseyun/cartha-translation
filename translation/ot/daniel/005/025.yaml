id: DAN.5.25
reference: Daniel 5:25
source:
  edition: WLC
  text: וּ/דְנָ֥ה כְתָבָ֖/א דִּ֣י רְשִׁ֑ים מְנֵ֥א מְנֵ֖א תְּקֵ֥ל וּ/פַרְסִֽין׃
translation:
  text: 'And this is the inscription that was written: MENE, MENE, TEKEL, and PARSIN.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Aramaic words are left transliterated because Daniel interprets them
      in the following verse(s) with wordplay: MENE sounds like ''numbered,'' TEKEL
      like ''weighed,'' and PARSIN/PERES like ''divided'' and also echoes ''Persians.'''
    reason: lexical_alternative
  - marker: b
    text: '''The inscription'' could also be rendered ''the writing.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְנָה
  chosen: And this
  alternatives:
  - Now this
  - And this is
  lexicon: HALOT
  rationale: Aramaic demonstrative phrase introducing what follows. 'And this' preserves
    the connective ו and the deictic force of דנה in natural English.
- source_word: כְתָבָא
  chosen: the inscription
  alternatives:
  - the writing
  - the written text
  lexicon: HALOT
  rationale: Refers to the written message on the wall. 'Inscription' fits the context
    of a displayed written message better than the more generic 'writing,' while remaining
    faithful to the noun.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle linking 'inscription' with the clause that follows.
    'That' is the most natural English equivalent here.
- source_word: רְשִׁים
  chosen: was written
  alternatives:
  - was inscribed
  - had been written
  lexicon: HALOT
  rationale: Passive verbal form indicating the inscription's having been set down.
    'Was written' is straightforward and idiomatic; 'was inscribed' is possible but
    less necessary since 'inscription' already conveys that nuance.
- source_word: מְנֵא
  chosen: MENE
  alternatives:
  - numbered
  - mina
  lexicon: HALOT
  rationale: The term is intentionally preserved in transliteration because the following
    verse interprets it with a wordplay ('God has numbered'). Translating it here
    would flatten the dramatic effect and obscure the interpretation structure.
- source_word: מְנֵא
  chosen: MENE
  alternatives:
  - numbered
  - mina
  lexicon: HALOT
  rationale: Repeated for emphasis in the source text; the repetition should be preserved
    exactly in English.
- source_word: תְּקֵל
  chosen: TEKEL
  alternatives:
  - weighed
  - shekel
  lexicon: HALOT
  rationale: Preserved in transliteration to maintain the enigmatic form of the inscription
    and the later interpretive wordplay ('you have been weighed').
- source_word: וּפַרְסִין
  chosen: and PARSIN
  alternatives:
  - and PERES
  - and divisions
  - and half-minas
  lexicon: HALOT
  rationale: The conjunction ו is explicit, so 'and' is retained. The noun is transliterated
    because the narrative immediately interprets it with a pun involving division
    and Persia; translating here would preempt that explanation. 'PARSIN' reflects
    the plural/conjunctive form in this verse, while the interpretation in the next
    verse uses the singular form PERES.
