id: DAN.5.5
reference: Daniel 5:5
source:
  edition: WLC
  text: בַּ/הּ שַׁעֲתָ֗/ה נפקו אֶצְבְּעָן֙ דִּ֣י יַד אֱנָ֔שׁ וְ/כָֽתְבָן֙ לָ/קֳבֵ֣ל
    נֶבְרַשְׁתָּ֔/א עַל גִּירָ֕/א דִּֽי כְתַ֥ל הֵיכְלָ֖/א דִּ֣י מַלְכָּ֑/א וּ/מַלְכָּ֣/א
    חָזֵ֔ה פַּ֥ס יְדָ֖/ה דִּ֥י כָתְבָֽה־־־־׃
translation:
  text: At that moment the fingers of a human hand came out and wrote opposite the
    lampstand on the plaster of the wall of the king’s palace, and the king saw the
    palm of the hand that was writing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fingers of a man’s hand.' The Aramaic אֱנָשׁ can mean 'man' or more
      generally 'human being.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in front of the lampstand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on the lime plaster' or 'whitewash' of the wall.
    reason: lexical_alternative
  - marker: d
    text: Or 'the king’s hall'; the Aramaic term can denote a palace or a grand hall
      within it.
    reason: lexical_alternative
  - marker: e
    text: Or possibly 'the hand' more generally; the exact nuance of פַּס is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהּ שַׁעֲתָה
  chosen: At that moment
  alternatives:
  - In that hour
  - At that time
  lexicon: HALOT
  rationale: Aramaic idiom meaning the immediate point in time; 'At that moment' is
    natural modern English and preserves the suddenness.
- source_word: נפקו
  chosen: came out
  alternatives:
  - appeared
  - went out
  lexicon: HALOT
  rationale: The verb literally means 'came out/went out.' 'Came out' keeps the vividness
    of emergence better than the more interpretive 'appeared'.
- source_word: אֶצְבְּעָן דִּי יַד אֱנָשׁ
  chosen: the fingers of a human hand
  alternatives:
  - fingers of a man's hand
  - human fingers
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'fingers of a human hand.'
    'Human' avoids implying a specific male individual while preserving the contrast
    with a non-human or supernatural phenomenon.
- source_word: וְכָתְבָן
  chosen: and wrote
  alternatives:
  - and were writing
  lexicon: HALOT
  rationale: The form denotes the action of writing by the fingers. English simple
    past fits the narrative sequence well.
- source_word: לָקֳבֵל נֶבְרַשְׁתָּא
  chosen: opposite the lampstand
  alternatives:
  - in front of the lampstand
  - facing the lampstand
  lexicon: HALOT
  rationale: לָקֳבֵל indicates position opposite or in front of; 'opposite' is concise
    and spatially clear. נברשתא refers to a lampstand/candelabrum; 'lampstand' is
    the most straightforward modern rendering.
- source_word: עַל גִּירָא
  chosen: on the plaster
  alternatives:
  - on the lime plaster
  - on the whitewash
  lexicon: HALOT
  rationale: The noun refers to plaster or lime coating on a wall. 'Plaster' is clear
    and idiomatic; 'lime plaster' is possible but more technical than needed in the
    main text.
- source_word: דִּי כְתַל הֵיכְלָא דִּי מַלְכָּא
  chosen: of the wall of the king’s palace
  alternatives:
  - of the wall of the king's hall
  - of the wall of the royal palace
  lexicon: HALOT
  rationale: כְתַל is 'wall.' הֵיכְלָא can denote palace or great hall/temple-like
    structure; in this court setting 'palace' best fits the royal residence context.
- source_word: וּמַלְכָּא חָזֵה
  chosen: and the king saw
  alternatives:
  - and the king was watching
  lexicon: HALOT
  rationale: Simple narrative past is the natural rendering of the participial/verbal
    sequence here.
- source_word: פַּס יְדָה
  chosen: the palm of the hand
  alternatives:
  - the back of the hand
  - the hand
  lexicon: HALOT
  rationale: פַּס here denotes the extremity or palm of the hand. 'Palm' is the most
    common specific rendering and matches the image of the visible writing hand.
- source_word: דִּי כָתְבָה
  chosen: that was writing
  alternatives:
  - which wrote
  - that wrote
  lexicon: HALOT
  rationale: The relative clause presents the hand in the act of writing; English
    progressive best captures the ongoing visual scene.
