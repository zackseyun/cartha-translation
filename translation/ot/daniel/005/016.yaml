id: DAN.5.16
reference: Daniel 5:16
source:
  edition: WLC
  text: וַ/אֲנָה֙ שִׁמְעֵ֣ת עלי/ך דִּֽי תוכל פִּשְׁרִ֛ין לְ/מִפְשַׁ֖ר וְ/קִטְרִ֣ין
    לְ/מִשְׁרֵ֑א כְּעַ֡ן הֵן֩ תוכל כְּתָבָ֜/א לְ/מִקְרֵ֗א וּ/פִשְׁרֵ/הּ֙ לְ/הוֹדָ֣עֻתַ֔/נִי
    אַרְגְּוָנָ֣/א תִלְבַּ֗שׁ ו/המונכ/א דִֽי דַהֲבָ/א֙ עַֽל צַוְּארָ֔/ךְ וְ/תַלְתָּ֥א
    בְ/מַלְכוּתָ֖/א תִּשְׁלַֽט־־־׃פ
translation:
  text: But I have heard about you that you are able to give interpretations and to
    solve difficulties. Now, if you are able to read the writing and make its interpretation
    known to me, you shall be clothed with purple, and a chain of gold shall be put
    around your neck, and you shall rule as third in the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic literally, 'to loose knots,' an idiom for solving difficult problems
      or resolving perplexities.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall be the third ruler in the kingdom.' The phrase likely refers
      to third rank in the realm.
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנָה
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive/personal
    transition in Belshazzar's speech. 'But I' captures the discourse shift more naturally
    than a simple 'And I.'
- source_word: שִׁמְעֵת
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: Perfect verb in context refers to information the speaker has received
    prior to this moment; English present perfect fits the current relevance.
- source_word: עֲלָיִךְ
  chosen: about you
  alternatives:
  - concerning you
  - of you
  lexicon: HALOT
  rationale: The preposition here introduces the content of report concerning Daniel.
    'About you' is idiomatic modern English.
- source_word: דִּי תוכל
  chosen: that you are able
  alternatives:
  - that you can
  lexicon: HALOT
  rationale: The particle introduces reported content; 'are able' preserves the sense
    of capability with slightly more formal clarity in this court setting.
- source_word: פִּשְׁרִין לְמִפְשַׁר
  chosen: to give interpretations
  alternatives:
  - to interpret interpretations
  - to interpret
  lexicon: HALOT
  rationale: The noun-verb pairing is idiomatic Aramaic for providing interpretations.
    'Give interpretations' preserves the plural noun and reads naturally in English.
- source_word: וְקִטְרִין לְמִשְׁרֵא
  chosen: to solve difficulties
  alternatives:
  - to untie knots
  - to resolve problems
  - to explain riddles
  lexicon: HALOT
  rationale: Literally the expression involves 'knots' being loosed, a metaphor for
    resolving hard matters. 'Solve difficulties' communicates the idiom's sense in
    clear English without over-literal obscurity.
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore now
  - So now
  lexicon: HALOT
  rationale: This adverb marks the transition from report to immediate proposal. 'Now'
    is concise and natural.
- source_word: הֵן תוכל
  chosen: if you are able
  alternatives:
  - if indeed you can
  - if now you can
  lexicon: HALOT
  rationale: הֵן here introduces a conditional clause. 'If you are able' matches the
    repeated emphasis on Daniel's capability.
- source_word: כְּתָבָא
  chosen: the writing
  alternatives:
  - the inscription
  lexicon: HALOT
  rationale: In this narrative the mysterious text on the wall is best rendered 'the
    writing,' echoing the immediate context and avoiding unnecessary specificity.
- source_word: לְמִקְרֵא
  chosen: to read
  alternatives:
  - to proclaim
  lexicon: HALOT
  rationale: The basic sense in context is reading the written message aloud or intelligibly.
    'Read' is the straightforward rendering.
- source_word: וּפִשְׁרֵהּ לְהוֹדָעוּתַנִי
  chosen: and make its interpretation known to me
  alternatives:
  - and tell me its interpretation
  - and reveal its interpretation to me
  lexicon: HALOT
  rationale: This preserves both the noun 'interpretation' and the causative sense
    of making known, while remaining readable.
- source_word: אַרְגְּוָנָא תִלְבַּשׁ
  chosen: you shall be clothed with purple
  alternatives:
  - you shall wear purple
  - you shall be clothed in purple
  lexicon: HALOT
  rationale: The passive-like English expression reflects the honorific bestowal of
    royal clothing. 'Purple' denotes the prestigious garment/color associated with
    rank.
- source_word: וְהַמּוֹנְכָא דִי דַהֲבָא עַל צַוְּארָךְ
  chosen: and a chain of gold shall be put around your neck
  alternatives:
  - and a gold necklace shall be around your neck
  - and a chain of gold on your neck
  lexicon: HALOT
  rationale: The term denotes an ornamental chain/necklace of gold as a mark of honor.
    This rendering makes the implied bestowal explicit in idiomatic English.
- source_word: וְתַלְתָּא בְמַלְכוּתָא תִּשְׁלַט
  chosen: and you shall rule as third in the kingdom
  alternatives:
  - and you shall be the third ruler in the kingdom
  - and you shall have authority as third in the kingdom
  lexicon: HALOT
  rationale: The phrase indicates rank or authority as third in the realm, fitting
    the historical setting in which Belshazzar could offer the third place. 'Rule
    as third in the kingdom' is concise and faithful.
