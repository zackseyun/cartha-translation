id: DAN.5.13
reference: Daniel 5:13
source:
  edition: WLC
  text: בֵּ/אדַ֨יִן֙ דָּֽנִיֵּ֔אל הֻעַ֖ל קֳדָ֣ם מַלְכָּ֑/א עָנֵ֨ה מַלְכָּ֜/א וְ/אָמַ֣ר
    לְ/דָנִיֵּ֗אל אנתה ה֤וּא דָנִיֵּאל֙ דִּֽי מִן בְּנֵ֤י גָלוּתָ/א֙ דִּ֣י יְה֔וּד
    דִּ֥י הַיְתִ֛י מַלְכָּ֥/א אַ֖בִ/י מִן יְהֽוּד־־־־׃
translation:
  text: Then Daniel was brought in before the king. The king answered and said to
    Daniel, “Are you that Daniel, one of the exiles of Judah, whom the king my father
    brought from Judah?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my predecessor'; in royal usage 'father' can refer to an ancestor or
      earlier king, not only an immediate biological father.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: הֻעַל
  chosen: was brought in
  alternatives:
  - was brought up
  - was caused to come in
  lexicon: HALOT
  rationale: Passive/causative form indicates Daniel is brought into the king's presence
    by others. 'Brought in' fits the court setting better than the more literal 'brought
    up.'
- source_word: קֳדָם מַלְכָּא
  chosen: before the king
  alternatives:
  - into the presence of the king
  lexicon: HALOT
  rationale: Idiomatic Aramaic for appearing in someone's presence. 'Before the king'
    is concise and natural.
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - responded and said
  - said
  lexicon: HALOT
  rationale: This common Semitic narrative pairing is retained rather than reduced
    to 'said' alone, since both verbs are present in the source. English keeps the
    formula without sounding overly wooden.
- source_word: אַנְתָּה הוּא
  chosen: Are you that
  alternatives:
  - You are that
  - Are you the
  lexicon: HALOT
  rationale: In context the king is asking a question, and the pronoun plus copular
    element has an identificational force. 'That Daniel' preserves the slightly distancing
    or recognitional tone better than simply 'the Daniel.'
- source_word: דִּי מִן בְּנֵי גָלוּתָא
  chosen: one of the exiles
  alternatives:
  - from the sons of the exile
  - from the exiled people
  lexicon: HALOT
  rationale: Literally 'from the sons/children of the exile.' In idiomatic English,
    'one of the exiles' conveys membership in the deported Judean community without
    unnecessary literalism.
- source_word: יְהוּד
  chosen: Judah
  alternatives:
  - the Jews
  - Judea
  lexicon: HALOT
  rationale: In Daniel's exilic setting, the term refers to Judah/Judeans. 'Judah'
    fits the geographic-ethnic sense here better than the later term 'Jews' or the
    anachronistic 'Judea.'
- source_word: דִּי הַיְתִי מַלְכָּא אַבִי מִן יְהוּד
  chosen: whom the king my father brought from Judah
  alternatives:
  - whom my father the king brought from Judah
  - whom the king, my father, brought out of Judah
  lexicon: HALOT
  rationale: The relative clause identifies Daniel as among those deported by the
    king's predecessor. 'The king my father' follows the Aramaic order closely while
    remaining intelligible; 'father' here reflects royal predecessor language, not
    necessarily immediate biological paternity.
