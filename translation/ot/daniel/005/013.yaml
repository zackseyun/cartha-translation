theological_decisions:
- issue: Meaning of 'my father' (אַבִי) in royal speech
  chosen_reading: Rendered as 'my father' in the main text while understanding it
    as a royal predecessor term.
  alternative_readings:
  - my predecessor
  rationale: The source text explicitly says 'my father,' and the translation preserves
    that wording rather than interpreting it in the main text. Because in ancient
    Near Eastern royal usage 'father' can denote an ancestor or predecessor, that
    nuance is best explained in documentation rather than replacing the term in translation.
  doctrine_reference: Preserve theological/historical tension rather than resolve
    it.
