id: DAN.5.7
reference: Daniel 5:7
source:
  edition: WLC
  text: קָרֵ֤א מַלְכָּ/א֙ בְּ/חַ֔יִל לְ/הֶֽעָלָה֙ לְ/אָ֣שְׁפַיָּ֔/א כשדי/א וְ/גָזְרַיָּ֑/א
    עָנֵ֨ה מַלְכָּ֜/א וְ/אָמַ֣ר לְ/חַכִּימֵ֣י בָבֶ֗ל דִּ֣י כָל אֱ֠נָשׁ דִּֽי יִקְרֵ֞ה
    כְּתָבָ֣/ה דְנָ֗ה וּ/פִשְׁרֵ/הּ֙ יְחַוִּנַּ֔/נִי אַרְגְּוָנָ֣/א יִלְבַּ֗שׁ ו/המונכ/א
    דִֽי דַהֲבָ/א֙ עַֽל צַוְּארֵ֔/הּ וְ/תַלְתִּ֥י בְ/מַלְכוּתָ֖/א יִשְׁלַֽט׀־־־־׃ס
translation:
  text: The king called out loudly to bring in the enchanters, the Chaldeans, and
    the diviners. The king answered and said to the wise men of Babylon, “Any man
    who reads this writing and makes its interpretation known to me shall be clothed
    with purple, have a chain of gold around his neck, and rule as third in the kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the astrologers” for “the Chaldeans,” since the term can denote a class
      of Babylonian court sages rather than the ethnic group alone.
    reason: lexical_alternative
  - marker: b
    text: “Any man” renders a grammatically masculine singular expression used generically
      here; the sense is “anyone.”
    reason: lexical_alternative
  - marker: c
    text: Or “be the third ruler in the kingdom.” The Aramaic likely refers to rank
      as third in authority.
    reason: alternative_reading
lexical_decisions:
- source_word: קָרֵא ... בְּחַיִל
  chosen: called out loudly
  alternatives:
  - cried aloud
  - called with might
  lexicon: HALOT
  rationale: The verb קרא with the idiom בְּחַיִל conveys a forceful public cry. 'Called
    out loudly' is natural modern English while preserving the intensity better than
    a flat 'called.'
- source_word: לְהֶעָלָה
  chosen: to bring in
  alternatives:
  - to bring up
  - to cause to come up
  lexicon: HALOT
  rationale: In this court setting the causative infinitive means summoning persons
    into the king's presence. 'Bring in' fits the context more idiomatically than
    the more literal 'bring up.'
- source_word: אָשְׁפַיָּא
  chosen: the enchanters
  alternatives:
  - the conjurers
  - the magicians
  lexicon: HALOT
  rationale: This Aramaic term denotes a class of occult specialists. 'Enchanters'
    distinguishes them from the broader 'wise men' later in the verse and avoids flattening
    all such terms into 'magicians.'
- source_word: כשדי/א
  chosen: the Chaldeans
  alternatives:
  - the astrologers
  lexicon: HALOT
  rationale: The term can denote either ethnic Chaldeans or a professional class of
    Babylonian sages. In Daniel it often functions as a technical designation within
    the court. 'Chaldeans' preserves the source term and traditional identification
    without over-interpreting.
- source_word: גָזְרַיָּא
  chosen: the diviners
  alternatives:
  - the soothsayers
  - the astrologers
  lexicon: HALOT
  rationale: The word refers to those who determine or pronounce interpretations/omens.
    'Diviners' is a clear modern rendering that captures the occult interpretive role.
- source_word: עָנֵה מַלְכָּא וְאָמַר
  chosen: The king answered and said
  alternatives:
  - The king responded and said
  - The king declared
  lexicon: HALOT
  rationale: This is a common Semitic narrative formula. Retaining both verbs preserves
    the source texture; 'answered and said' is acceptable English in biblical narrative.
- source_word: לְחַכִּימֵי בָבֶל
  chosen: to the wise men of Babylon
  alternatives:
  - to Babylon's wise men
  lexicon: HALOT
  rationale: A straightforward rendering of the court-sage designation, preserving
    the formal address.
- source_word: כָל אֱנָשׁ
  chosen: Any man
  alternatives:
  - Whoever
  - Any person
  lexicon: HALOT
  rationale: The singular 'man' reflects the grammatically masculine/generic Aramaic
    and follows the project's gender-accurate policy. 'Whoever' is possible but less
    formally tied to the source wording.
- source_word: יִקְרֵה כְּתָבָה דְנָה
  chosen: reads this writing
  alternatives:
  - reads this inscription
  lexicon: HALOT
  rationale: כְּתָב here refers to the written message on the wall. 'Writing' is broad
    and faithful; 'inscription' is possible but slightly more interpretive.
- source_word: וּפִשְׁרֵהּ יְחַוִּנַּנִי
  chosen: and makes its interpretation known to me
  alternatives:
  - and tells me its interpretation
  - and shows me its meaning
  lexicon: HALOT
  rationale: פִשְׁרֵהּ is 'its interpretation,' and the verb means to make known or
    declare. This rendering preserves both elements clearly.
- source_word: אַרְגְּוָנָא יִלְבַּשׁ
  chosen: shall be clothed with purple
  alternatives:
  - shall wear purple
  - shall be clothed in purple
  lexicon: HALOT
  rationale: Purple clothing signifies royal honor. 'Shall be clothed with purple'
    closely follows the passive-like sense of the Aramaic while remaining readable.
- source_word: ו/המונכא די דהבא על צוארהּ
  chosen: have a chain of gold around his neck
  alternatives:
  - have a necklace of gold on his neck
  - wear a gold chain on his neck
  lexicon: HALOT
  rationale: The noun denotes an ornamental chain or necklace bestowed as an honor.
    'Chain of gold around his neck' is idiomatic and fits the reward context.
- source_word: וְתַלְתִּי בְמַלְכוּתָא יִשְׁלַט
  chosen: and rule as third in the kingdom
  alternatives:
  - and be the third ruler in the kingdom
  - and have authority as the third in the kingdom
  lexicon: HALOT
  rationale: The phrase indicates rank or authority as third after the top two rulers.
    'Rule as third in the kingdom' is concise and preserves the ordinal force without
    over-specifying office.
