id: DAN.5.11
reference: Daniel 5:11
source:
  edition: WLC
  text: אִיתַ֨י גְּבַ֜ר בְּ/מַלְכוּתָ֗/ךְ דִּ֠י ר֣וּחַ אֱלָהִ֣ין קַדִּישִׁין֮ בֵּ/הּ֒
    וּ/בְ/יוֹמֵ֣י אֲב֗/וּךְ נַהִיר֧וּ וְ/שָׂכְלְתָנ֛וּ וְ/חָכְמָ֥ה כְּ/חָכְמַת אֱלָהִ֖ין
    הִשְׁתְּכַ֣חַת בֵּ֑/הּ וּ/מַלְכָּ֤/א נְבֻֽכַדְנֶצַּר֙ אֲב֔/וּךְ רַ֧ב חַרְטֻמִּ֣ין
    אָֽשְׁפִ֗ין כַּשְׂדָּאִין֙ גָּזְרִ֔ין הֲקִימֵ֖/הּ אֲב֥/וּךְ מַלְכָּֽ/א־׃
translation:
  text: There is a man in your kingdom in whom is a spirit of the holy gods, and in
    the days of your father light and understanding and wisdom like the wisdom of
    the gods were found in him. And King Nebuchadnezzar, your father, appointed him
    chief of the magicians, enchanters, Chaldeans, and diviners—your father, the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the holy God' / 'the spirit of the holy God.' The Aramaic
      is plural ('gods'), but some understand the queen's wording as referring to
      the one true God.
    reason: alternative_reading
  - marker: b
    text: '''Your father'' may also mean ''your ancestor'' or ''your predecessor''
      in this courtly/dynastic context.'
    reason: cultural_note
lexical_decisions:
- source_word: אִיתַי
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle in Biblical Aramaic introducing the existence of
    a person; 'There is' is natural modern English and preserves the simple assertion.
- source_word: גְּבַר
  chosen: a man
  alternatives:
  - a certain man
  lexicon: HALOT
  rationale: Basic noun for an adult male/person. 'A man' is the most direct rendering
    here; 'certain man' would add specificity not required by the text.
- source_word: בְּמַלְכוּתָךְ
  chosen: in your kingdom
  alternatives:
  - in your realm
  lexicon: HALOT
  rationale: Refers to the king's dominion or kingdom. 'Kingdom' is the standard and
    sufficiently clear rendering.
- source_word: דִּי
  chosen: in whom
  alternatives:
  - who has
  - that
  lexicon: HALOT
  rationale: Relative particle linking the man with the following clause. 'In whom'
    preserves the syntax created by בֵּהּ later in the clause.
- source_word: רוּחַ אֱלָהִין קַדִּישִׁין
  chosen: a spirit of the holy gods
  alternatives:
  - the spirit of the holy gods
  - a spirit of holy gods
  - the Spirit of the holy God
  lexicon: HALOT
  rationale: In Aramaic court speech in Daniel, אֱלָהִין is morphologically plural
    and commonly refers to 'gods' from the pagan speaker's perspective. The adjective
    קַדִּישִׁין is also plural. Rendering it 'a spirit of the holy gods' best reflects
    the speaker's idiom without importing later theological interpretation. The singular
    alternative 'the Spirit of the holy God' is preserved in a footnote because some
    translations construe the phrase monotheistically in light of Daniel's God.
- source_word: בֵּהּ
  chosen: in him
  alternatives:
  - within him
  lexicon: HALOT
  rationale: Preposition plus pronominal suffix indicating indwelling or presence;
    'in him' is idiomatic and sufficiently literal.
- source_word: וּבְיוֹמֵי אֲבוּךְ
  chosen: and in the days of your father
  alternatives:
  - and in your father's days
  lexicon: HALOT
  rationale: Temporal phrase. 'In the days of your father' is a standard English equivalent.
- source_word: נַהִירוּ
  chosen: light
  alternatives:
  - illumination
  - brightness
  lexicon: HALOT
  rationale: The noun denotes illumination or brightness metaphorically for intellectual
    clarity. 'Light' preserves the metaphor and matches the Danielic idiom.
- source_word: שָׂכְלְתָנוּ
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: HALOT
  rationale: Refers to discernment or understanding. 'Understanding' pairs well with
    the surrounding wisdom language and remains accessible.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for the noun; no contextual reason to vary.
- source_word: כְּחָכְמַת אֱלָהִין
  chosen: like the wisdom of the gods
  alternatives:
  - like divine wisdom
  - like the wisdom of God
  lexicon: HALOT
  rationale: Comparative phrase intensifying Daniel's wisdom from the queen's pagan
    perspective. 'Of the gods' matches the plural form and court setting. 'Divine
    wisdom' is smoother but less transparent to the wording.
- source_word: הִשְׁתְּכַחַת
  chosen: were found
  alternatives:
  - was found
  lexicon: HALOT
  rationale: 'Passive/reflexive verb with a compound subject of three feminine nouns
    (''light and understanding and wisdom''). English plural agreement is natural:
    these qualities ''were found'' in him.'
- source_word: וּמַלְכָּא נְבֻכַדְנֶצַּר
  chosen: And King Nebuchadnezzar
  alternatives:
  - And the king, Nebuchadnezzar
  lexicon: HALOT
  rationale: Construct-like apposition identifying the king by name. 'And King Nebuchadnezzar'
    is natural English.
- source_word: אֲבוּךְ
  chosen: your father
  alternatives:
  - your predecessor
  lexicon: HALOT
  rationale: Literally 'your father.' In Daniel, the term can denote ancestor/predecessor
    as well as immediate father, but the text's wording should be preserved in the
    main text. The broader dynastic sense is noted theologically.
- source_word: רַב
  chosen: chief
  alternatives:
  - master
  - head
  lexicon: HALOT
  rationale: Title indicating leadership over a class of officials. 'Chief' is concise
    and idiomatic.
- source_word: חַרְטֻמִּין
  chosen: magicians
  alternatives:
  - scribal magicians
  lexicon: HALOT
  rationale: Traditional court specialists associated with occult or interpretive
    arts. 'Magicians' is the standard English rendering in Daniel.
- source_word: אָשְׁפִין
  chosen: enchanters
  alternatives:
  - astrologers
  lexicon: HALOT
  rationale: A class of wise men/occult practitioners. English tradition varies; 'enchanters'
    avoids collapsing this term into the next categories and preserves distinction
    among the groups.
- source_word: כַּשְׂדָּאִין
  chosen: Chaldeans
  alternatives:
  - Chaldean sages
  lexicon: HALOT
  rationale: In Daniel often denotes a class of Babylonian wise men, though ethnically
    it can mean Chaldeans. Retaining 'Chaldeans' preserves the source term and Daniel's
    usage.
- source_word: גָּזְרִין
  chosen: diviners
  alternatives:
  - soothsayers
  - decreers
  lexicon: HALOT
  rationale: Refers to those who determine or pronounce interpretations/divinations.
    'Diviners' best fits the court-wise-men context.
- source_word: הֲקִימֵהּ
  chosen: appointed him
  alternatives:
  - set him up
  - established him
  lexicon: HALOT
  rationale: Causative verb meaning to set or appoint someone to an office. 'Appointed
    him' communicates the administrative action clearly.
- source_word: אֲבוּךְ מַלְכָּא
  chosen: your father, the king
  alternatives:
  - your father the king
  lexicon: HALOT
  rationale: Appositional repetition for emphasis. Retaining the repeated phrase reflects
    the source's rhetorical style; punctuation smooths it in English.
