theological_decisions:
- issue: Rendering of אֱלָהִין קַדִּישִׁין / אֱלָהִין in the queen's speech
  chosen_reading: plural 'the holy gods' / 'the gods'
  alternative_readings:
  - singular 'the holy God' / 'God'
  - '''divine'' as an adjectival paraphrase'
  rationale: The speaker is a Babylonian queen speaking in a pagan court context,
    and the Aramaic forms are plural. Translating plurally preserves the narrative
    viewpoint and avoids harmonizing the queen's words with Daniel's theology. Because
    some interpreters understand the phrase as a monotheistic acknowledgment of Daniel's
    God, that alternative is preserved in a footnote rather than adopted in the main
    text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of 'your father' for Nebuchadnezzar in relation to Belshazzar
  chosen_reading: retain literal 'your father' in the main text
  alternative_readings:
  - your predecessor
  - your ancestor
  rationale: The Aramaic repeatedly says 'your father.' In ancient Near Eastern usage
    this can denote ancestor or dynastic predecessor, not only immediate biological
    father. The main text keeps the literal wording for transparency; explanatory
    nuance is appropriate in a footnote rather than replacing the source expression.
  doctrine_reference: Translation philosophy §1, §5
