theological_decisions:
- issue: Meaning of 'your father' in royal/dynastic usage
  chosen_reading: Retain the literal expression 'your father' in the main text while
    recognizing it can mean ancestor/predecessor.
  alternative_readings:
  - your ancestor
  - your predecessor
  rationale: The source text uses the ordinary kinship term, and optimal equivalence
    favors preserving it in the main text. Historically and contextually, ancient
    Near Eastern royal language often uses 'father' for a forefather or dynastic predecessor,
    so that nuance is preserved in a footnote rather than resolved in translation.
  doctrine_reference: Translation philosophy §3, §5
