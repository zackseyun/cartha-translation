id: DAN.5.18
reference: Daniel 5:18
source:
  edition: WLC
  text: אנתה מַלְכָּ֑/א אֱלָהָ/א֙ עלי/א מַלְכוּתָ֤/א וּ/רְבוּתָ/א֙ וִ/יקָרָ֣/א וְ/הַדְרָ֔/ה
    יְהַ֖ב לִ/נְבֻכַדְנֶצַּ֥ר אֲבֽ/וּךְ׃
translation:
  text: As for you, O king, the Most High God gave kingship and greatness and glory
    and majesty to Nebuchadnezzar your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestor' or 'your predecessor'; the Aramaic term literally means
      'your father' but can be used more broadly in royal lineage language.
    reason: lexical_alternative
lexical_decisions:
- source_word: אנתה
  chosen: As for you
  alternatives:
  - You
  lexicon: HALOT
  rationale: Fronted independent pronoun gives emphatic address; 'As for you' reflects
    the discourse contrast more naturally than a bare 'You.'
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative form in direct address is best represented with 'O king' in
    English to preserve the formal court setting.
- source_word: אֱלָהָא עִלָּיָא
  chosen: the Most High God
  alternatives:
  - God Most High
  - the high God
  lexicon: HALOT
  rationale: Standard Aramaic title for God; 'the Most High God' is idiomatic English
    and preserves the superlative divine title.
- source_word: מַלְכוּתָא
  chosen: kingship
  alternatives:
  - kingdom
  - royal power
  lexicon: HALOT
  rationale: Here the gift is what God bestowed on Nebuchadnezzar personally, so 'kingship'
    better captures royal rule/status than the territorial sense 'kingdom.'
- source_word: רְבוּתָא
  chosen: greatness
  alternatives:
  - great power
  - magnificence
  lexicon: HALOT
  rationale: Denotes greatness or exalted status; 'greatness' fits the series of bestowed
    royal honors.
- source_word: יְקָרָא
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: In this royal context the term denotes honor/glory; 'glory' works well
    in the accumulating list and preserves the elevated tone.
- source_word: הַדְרָה
  chosen: majesty
  alternatives:
  - splendor
  - honor
  lexicon: HALOT
  rationale: Conveys regal magnificence; 'majesty' distinguishes it from the preceding
    'glory' while maintaining the royal register.
- source_word: יְהַב
  chosen: gave
  alternatives:
  - granted
  - bestowed
  lexicon: HALOT
  rationale: Simple past verb of giving; 'gave' is direct and sufficient, with the
    elevated object list carrying the formality.
- source_word: לִנְבֻכַדְנֶצַּר
  chosen: to Nebuchadnezzar
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֲבוּךְ
  chosen: your father
  alternatives:
  - your ancestor
  lexicon: HALOT
  rationale: Aramaic/Hebrew 'father' can denote forefather or predecessor. Main text
    keeps the literal 'your father' for formal correspondence; the broader dynastic
    sense is worth preserving in a footnote because Belshazzar was likely not Nebuchadnezzar's
    immediate son.
