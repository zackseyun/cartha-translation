id: DAN.5.23
reference: Daniel 5:23
source:
  edition: WLC
  text: וְ/עַ֣ל מָרֵֽא שְׁמַיָּ֣/א הִתְרוֹמַ֡מְתָּ וּ/לְ/מָֽאנַיָּ֨/א דִֽי בַיְתֵ֜/הּ
    הַיְתִ֣יו קדמי/ך ו/אנתה ו/רברבני/ך שֵֽׁגְלָתָ֣/ךְ וּ/לְחֵנָתָ/ךְ֮ חַמְרָ/א֮ שָׁתַ֣יִן
    בְּ/הוֹן֒ וְ/לֵֽ/אלָהֵ֣י כַסְפָּֽ/א וְ֠/דַהֲבָ/א נְחָשָׁ֨/א פַרְזְלָ֜/א אָעָ֣/א
    וְ/אַבְנָ֗/א דִּ֠י לָֽא חָזַ֧יִן וְ/לָא שָׁמְעִ֛ין וְ/לָ֥א יָדְעִ֖ין שַׁבַּ֑חְתָּ
    וְ/לֵֽ/אלָהָ֞/א דִּֽי נִשְׁמְתָ֥/ךְ בִּ/ידֵ֛/הּ וְ/כָל אֹרְחָתָ֥/ךְ לֵ֖/הּ לָ֥א
    הַדַּֽרְתָּ־׀־־־־־־׃
translation:
  text: But you have exalted yourself against the Lord of heaven, and the vessels
    of his house were brought before you, and you and your nobles, your wives, and
    your concubines have been drinking wine from them. And you have praised the gods
    of silver and gold, bronze, iron, wood, and stone, which do not see or hear or
    know; but the God in whose hand is your breath, and to whom belong all your ways,
    you have not honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Master of heaven.' The Aramaic title can denote either 'lord' or
      'master'; 'Lord' was chosen as the more natural elevated English rendering for
      God here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the God who holds your breath in his hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you have not glorified' or 'you have not given glory to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָרֵא שְׁמַיָּא
  chosen: the Lord of heaven
  alternatives:
  - the Master of heaven
  - the Lord of the heavens
  lexicon: HALOT
  rationale: מָרֵא denotes lord/master. 'Lord' is the most natural elevated English
    title here, and 'of heaven' reflects the singular collective sense of שְׁמַיָּא
    in this context.
- source_word: הִתְרוֹמַמְתָּ
  chosen: have exalted yourself
  alternatives:
  - have lifted yourself up
  - have magnified yourself
  lexicon: HALOT
  rationale: The reflexive stem indicates self-exaltation. 'Have exalted yourself'
    is idiomatic and preserves the arrogant upward sense.
- source_word: מָאנַיָּא
  chosen: the vessels
  alternatives:
  - the articles
  - the utensils
  lexicon: HALOT
  rationale: Refers to temple implements taken from Jerusalem. 'Vessels' is a standard
    and suitably dignified rendering in cultic context.
- source_word: בַיְתֵהּ
  chosen: his house
  alternatives:
  - his temple
  lexicon: HALOT
  rationale: Literally 'his house.' Because the referent is God's temple, 'house'
    preserves the source wording while remaining clear in context.
- source_word: רַבְרְבָנַיִךְ
  chosen: your nobles
  alternatives:
  - your lords
  - your great men
  lexicon: HALOT
  rationale: Denotes high-ranking officials. 'Nobles' is concise, natural English
    for court elites.
- source_word: שֵׁגְלָתָךְ
  chosen: your wives
  alternatives:
  - your queens
  - your consorts
  lexicon: HALOT
  rationale: The term can denote royal wives/consorts. 'Your wives' is the broad,
    clear rendering here, with the royal setting already supplied by context.
- source_word: לְחֵנָתָךְ
  chosen: your concubines
  alternatives:
  - your secondary wives
  lexicon: HALOT
  rationale: This term refers to women of lower marital status in the royal household.
    'Concubines' is the established and accurate English equivalent.
- source_word: חַמְרָא שָׁתַיִן בְּהוֹן
  chosen: have been drinking wine from them
  alternatives:
  - drank wine from them
  lexicon: HALOT
  rationale: The participial form with context can be rendered as ongoing/resultative
    action. 'Have been drinking' captures the scene's active profanation; 'from them'
    makes explicit the instrumental sense.
- source_word: שַׁבַּחְתָּ
  chosen: have praised
  alternatives:
  - have glorified
  - have lauded
  lexicon: HALOT
  rationale: The verb means to praise or extol. 'Praised' is the most direct and natural
    equivalent.
- source_word: אֱלָהֵי כַסְפָּא וְדַהֲבָא נְחָשָׁא פַרְזְלָא אָעָא וְאַבְנָא
  chosen: the gods of silver and gold, bronze, iron, wood, and stone
  alternatives:
  - gods made of silver and gold, bronze, iron, wood, and stone
  lexicon: HALOT
  rationale: The genitive chain lists the materials of the idols. 'Gods of ...' is
    formally closer; the material sense is obvious in context.
- source_word: דִּי לָא חָזַיִן וְלָא שָׁמְעִין וְלָא יָדְעִין
  chosen: which do not see or hear or know
  alternatives:
  - that cannot see or hear or understand
  lexicon: HALOT
  rationale: The relative clause describes the impotence of idols. 'Know' is retained
    rather than 'understand' to stay close to יָדְעִין and preserve the triadic rhythm.
- source_word: אֱלָהָא דִּי נִשְׁמְתָךְ בִּידֵהּ
  chosen: the God in whose hand is your breath
  alternatives:
  - the God who holds your breath in his hand
  - the God in whose power is your life-breath
  lexicon: HALOT
  rationale: This is a vivid idiom of divine sovereignty over life. 'In whose hand
    is your breath' preserves the metaphor and the concrete noun 'breath' rather than
    expanding to 'life'.
- source_word: וְכָל אֹרְחָתָךְ לֵהּ
  chosen: to whom belong all your ways
  alternatives:
  - and all your ways are his
  - and all your paths belong to him
  lexicon: HALOT
  rationale: אֹרְחָתָךְ refers to one's ways/paths/course of life. 'To whom belong
    all your ways' expresses the dative possession naturally in English and links
    with the following accusation.
- source_word: לָא הַדַּרְתָּ
  chosen: you have not honored
  alternatives:
  - you have not glorified
  - you have not given glory to
  lexicon: HALOT
  rationale: The verb means to honor/glorify. 'Honored' is clear modern English and
    avoids overusing 'glory' after 'praised' while preserving the contrast with idolatrous
    praise.
