theological_decisions:
- issue: Rendering of divine title for מָרֵא
  chosen_reading: the Lord of heaven
  alternative_readings:
  - the Master of heaven
  rationale: This is a title for Israel's God in Daniel's rebuke. 'Lord' best conveys
    divine sovereignty in idiomatic biblical English without importing a specifically
    NT christological title.
  doctrine_reference: Translation philosophy §2; Contested terms table on κύριος by
    analogy for divine title rendering
- issue: Contrast between idols and the true God
  chosen_reading: retain concrete language 'your breath' and 'all your ways'
  alternative_readings:
  - expand to 'your life' and 'your destiny'
  rationale: The verse's theology emphasizes God's direct sovereignty over life and
    conduct. The translation preserves the source imagery rather than interpreting
    it more abstractly.
  doctrine_reference: Translation philosophy §1 and §3
