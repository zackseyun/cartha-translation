id: DAN.5.26
reference: Daniel 5:26
source:
  edition: WLC
  text: דְּנָ֖ה פְּשַֽׁר מִלְּתָ֑/א מְנֵ֕א מְנָֽה אֱלָהָ֥/א מַלְכוּתָ֖/ךְ וְ/הַשְׁלְמַֽ/הּ־־׃
translation:
  text: 'This is the interpretation of the message: MENE—God has numbered your kingdom
    and brought it to an end.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic MENE sounds like the verb meaning 'numbered' or 'counted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the word,' 'the matter,' or 'the inscription.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Aramaic demonstrative introducing Daniel's explanation. In English, 'This
    is' naturally supplies the copula implied by the nominal clause.
- source_word: פְּשַׁר
  chosen: interpretation
  alternatives:
  - explanation
  lexicon: HALOT
  rationale: In Daniel, פְּשַׁר regularly refers to the interpretation of dreams or
    enigmatic writing. 'Interpretation' best fits the revelatory context.
- source_word: מִלְּתָא
  chosen: the message
  alternatives:
  - the word
  - the matter
  - the inscription
  lexicon: HALOT
  rationale: The Aramaic term can mean 'word,' 'matter,' or 'thing.' Here it refers
    to the written words on the wall as a meaningful communication. 'Message' is clear
    modern English and captures the sense without over-literal awkwardness.
- source_word: מְנֵא
  chosen: MENE
  alternatives:
  - Numbered
  - Mena
  lexicon: HALOT
  rationale: This is the inscribed term being interpreted, so it is best preserved
    by transliteration in the main text rather than translated away. Daniel then explains
    its meaning with the following verb.
- source_word: מְנָה
  chosen: has numbered
  alternatives:
  - has counted
  lexicon: HALOT
  rationale: The verb explains מְנֵא by wordplay. 'Numbered' preserves the lexical
    connection to MENE better than 'counted' and matches the sense of reckoning the
    fixed duration of Belshazzar's reign.
- source_word: אֱלָהָא
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: The emphatic/determined form can be rendered simply 'God' in English.
    In context Daniel refers to the true God as the actor behind the judgment.
- source_word: מַלְכוּתָךְ
  chosen: your kingdom
  alternatives:
  - your kingship
  - your reign
  lexicon: HALOT
  rationale: The noun denotes royal dominion/kingdom. 'Your kingdom' is the most natural
    rendering here, referring to Belshazzar's royal rule and realm.
- source_word: וְהַשְׁלְמַהּ
  chosen: and brought it to an end
  alternatives:
  - and finished it
  - and completed it
  lexicon: HALOT
  rationale: From a verb meaning to complete or bring to an end. In this judgment
    context, 'brought it to an end' communicates termination rather than successful
    completion, which 'completed it' might misleadingly suggest.
