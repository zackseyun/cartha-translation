theological_decisions:
- issue: Nature of divine action in the interpretation of MENE
  chosen_reading: God has determined and ended Belshazzar's kingdom
  alternative_readings:
  - God has counted the days of your kingdom and finished it
  rationale: The verse presents God's sovereign judgment on the kingdom. Rendering
    the final verb as 'brought it to an end' preserves the judicial force without
    adding theological claims beyond the text. 'Numbered' also retains the metaphor
    of reckoning the kingdom's allotted span.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
