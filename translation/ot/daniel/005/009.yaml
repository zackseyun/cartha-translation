id: DAN.5.9
reference: Daniel 5:9
source:
  edition: WLC
  text: אֱ֠דַיִן מַלְכָּ֤/א בֵלְשַׁאצַּר֙ שַׂגִּ֣יא מִתְבָּהַ֔ל וְ/זִיוֺ֖/הִי שָׁנַ֣יִן
    עֲל֑וֹ/הִי וְ/רַבְרְבָנ֖וֹ/הִי מִֽשְׁתַּבְּשִֽׁין׃
translation:
  text: Then King Belshazzar became greatly alarmed, his color changed, and his nobles
    were perplexed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his face grew pale' / 'the color of his face changed.' The Aramaic expression
      literally speaks of his splendor or appearance changing upon him, an idiom for
      visible loss of color from fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'his lords were bewildered.' The term refers to the king's leading officials
      or grandees.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: מַלְכָּא בֵלְשַׁאצַּר
  chosen: King Belshazzar
  alternatives:
  - Belshazzar the king
  lexicon: HALOT
  rationale: Construct/title plus personal name. English idiom prefers title before
    the transliterated name.
- source_word: שַׂגִּיא
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: Adverbial intensifier modifying the following participle; 'greatly' conveys
    the strong degree without sounding archaic.
- source_word: מִתְבָּהַל
  chosen: became greatly alarmed
  alternatives:
  - was terrified
  - was greatly troubled
  lexicon: HALOT
  rationale: The hitpael participle of בהל conveys being disturbed, alarmed, or terrified.
    'Became greatly alarmed' fits the immediate emotional reaction and avoids overstating
    to full terror while preserving the intensification from שַׂגִּיא.
- source_word: וְזִיוֹהִי
  chosen: his color
  alternatives:
  - his brightness
  - his appearance
  - the color of his face
  lexicon: HALOT
  rationale: זִיו in Biblical Aramaic can denote brightness, radiance, or facial appearance/color.
    In this context of fear, the idiom refers to his countenance changing color; 'his
    color' is concise and idiomatic in English.
- source_word: שָׁנַיִן עֲלוֹהִי
  chosen: changed
  alternatives:
  - was altered
  - changed upon him
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression meaning his appearance changed. English
    compresses the idiom naturally as 'changed' with the subject 'his color.'
- source_word: וְרַבְרְבָנוֹהִי
  chosen: his nobles
  alternatives:
  - his lords
  - his great men
  lexicon: HALOT
  rationale: Refers to the king's high officials or grandees. 'Nobles' is clear modern
    English and suits the court setting better than the more literal but potentially
    misleading 'lords.'
- source_word: מִשְׁתַּבְּשִׁין
  chosen: were perplexed
  alternatives:
  - were bewildered
  - were confounded
  lexicon: HALOT
  rationale: The participle denotes being confused or thrown into disorder. 'Were
    perplexed' captures the mental disorientation of the court officials in readable
    modern English.
