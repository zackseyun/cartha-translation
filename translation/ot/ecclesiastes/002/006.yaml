id: ECC.2.6
reference: Ecclesiastes 2:6
source:
  edition: WLC
  text: עָשִׂ֥יתִי לִ֖/י בְּרֵכ֣וֹת מָ֑יִם לְ/הַשְׁק֣וֹת מֵ/הֶ֔ם יַ֖עַר צוֹמֵ֥חַ עֵצִֽים׃
translation:
  text: I made for myself pools of water, to irrigate from them a grove sprouting
    trees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a forest growing trees' or 'a woodland with growing trees.' The Hebrew
      יַעַר can denote a forest or wooded area; 'grove' is chosen here because the
      context is cultivated and irrigated.
    reason: lexical_alternative
  - marker: b
    text: Or 'to water from them.' The verb can mean 'to give drink to' or 'to water';
      'to irrigate' makes explicit the agricultural setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׂיתִי
  chosen: I made
  alternatives:
  - I constructed
  - I made for myself
  lexicon: HALOT
  rationale: Qal perfect 1cs of עשה, straightforwardly 'I made' or 'I did.' Here with
    the following לִי, English naturally separates the reflexive nuance as 'for myself'
    rather than folding it into the verb.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל with 1cs suffix marks personal benefit/possession.
    'For myself' brings out the self-directed sense in Qoheleth's list of accomplishments.
- source_word: בְּרֵכוֹת מָיִם
  chosen: pools of water
  alternatives:
  - reservoirs of water
  - ponds
  lexicon: HALOT
  rationale: בְּרֵכוֹת denotes pools/reservoirs; with מָיִם the phrase is literally
    'pools of water.' 'Pools' is natural English and preserves the concrete image
    without over-specifying engineering.
- source_word: לְהַשְׁקוֹת
  chosen: to irrigate
  alternatives:
  - to water
  - to give drink to
  lexicon: HALOT
  rationale: Hiphil infinitive of שקה means to cause to drink, hence to water/irrigate.
    Given the context of constructed water pools and a wooded area, 'to irrigate'
    best captures intentional watering infrastructure.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - with them
  - from these
  lexicon: HALOT
  rationale: The preposition מן with 3mp suffix is most naturally 'from them,' referring
    back to the pools as the source of irrigation.
- source_word: יַעַר
  chosen: a grove
  alternatives:
  - a forest
  - woodland
  lexicon: HALOT
  rationale: יַעַר commonly means forest/woodland. In this cultivated royal-garden
    context, 'grove' better fits a planted wooded area being irrigated, while still
    reflecting a tree-filled tract.
- source_word: צוֹמֵחַ עֵצִים
  chosen: sprouting trees
  alternatives:
  - growing trees
  - where trees were growing
  lexicon: HALOT
  rationale: The participle צוֹמֵחַ modifies the wooded area as producing/growing
    trees. 'Sprouting trees' preserves the active participial imagery and the sense
    of ongoing growth.
