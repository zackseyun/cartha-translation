id: ECC.2.2
reference: Ecclesiastes 2:2
source:
  edition: WLC
  text: לִ/שְׂח֖וֹק אָמַ֣רְתִּי מְהוֹלָ֑ל וּ/לְ/שִׂמְחָ֖ה מַה זֹּ֥ה עֹשָֽׂה־׃
translation:
  text: I said of laughter, “It is madness,” and of pleasure, “What does this accomplish?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I said of laughter, “It is mad,” and of joy, “What does this do?”'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׂחוֹק
  chosen: of laughter
  alternatives:
  - to laughter
  - about laughter
  lexicon: HALOT
  rationale: שְׂחוֹק denotes laughter or mirth. With אמר, the prefixed ל often marks
    the object addressed or spoken of. 'Of laughter' is idiomatic in English alongside
    the repeated structure with the next clause.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I said to myself
  lexicon: HALOT
  rationale: Simple Qal perfect 1cs of אמר. The broader context is reflective self-speech,
    but the verse itself only states 'I said,' so the translation avoids adding 'to
    myself' beyond the source text.
- source_word: מְהוֹלָל
  chosen: It is madness
  alternatives:
  - mad
  - folly
  - insane
  lexicon: HALOT
  rationale: From הלל in the sense of being foolish, irrational, or mad. Because the
    predicate comments on 'laughter' as a phenomenon, English idiom is better served
    by the abstract 'madness' than the adjectival 'mad,' while still conveying Qoheleth's
    negative evaluation.
- source_word: וּלְשִׂמְחָה
  chosen: and of pleasure
  alternatives:
  - and of joy
  - and to pleasure
  - and of mirth
  lexicon: HALOT
  rationale: שִׂמְחָה commonly means joy, gladness, or pleasure. In this immediate
    context of testing enjoyment (vv. 1–3), 'pleasure' best captures experiential
    enjoyment rather than inward emotion alone.
- source_word: מַה זֹּה
  chosen: What does this
  alternatives:
  - What is this
  - What does this thing
  lexicon: HALOT
  rationale: The interrogative plus demonstrative forms an idiomatic question about
    the value or effect of the referent. Rendering as 'What does this...' prepares
    naturally for the following participle and reflects the evaluative thrust.
- source_word: עֹשָׂה
  chosen: accomplish
  alternatives:
  - do
  - produce
  - achieve
  lexicon: HALOT
  rationale: 'עשה is broadly ''do/make,'' but in this rhetorical question the sense
    is functional or resultative: what benefit does pleasure yield? ''Accomplish''
    expresses that nuance in natural English without overinterpreting.'
