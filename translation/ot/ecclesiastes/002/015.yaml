theological_decisions:
- issue: Rendering of הָבֶל in Ecclesiastes
  chosen_reading: vanity
  alternative_readings:
  - vapor
  - breath
  - meaninglessness
  - futility
  rationale: The term is not a doctrinally contested term in the provided table, but
    it is theologically and literarily significant in Ecclesiastes. 'Vanity' retains
    the traditional thematic resonance while avoiding the overly narrow existential
    claim of 'meaninglessness.' A lexical alternative is preserved in a footnote for
    transparency.
  doctrine_reference: Translation philosophy §1, §5
