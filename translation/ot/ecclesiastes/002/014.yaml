id: ECC.2.14
reference: Ecclesiastes 2:14
source:
  edition: WLC
  text: הֶֽ/חָכָם֙ עֵינָ֣י/ו בְּ/רֹאשׁ֔/וֹ וְ/הַ/כְּסִ֖יל בַּ/חֹ֣שֶׁךְ הוֹלֵ֑ךְ וְ/יָדַ֣עְתִּי
    גַם אָ֔נִי שֶׁ/מִּקְרֶ֥ה אֶחָ֖ד יִקְרֶ֥ה אֶת כֻּלָּֽ/ם־־׃
translation:
  text: The wise man has his eyes in his head, but the fool walks in darkness. Yet
    I also knew that one fate happens to them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one event befalls them all.' The Hebrew מִקְרֶה can denote what happens
      to someone, hence 'event,' 'fate,' or 'destiny' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָכָם
  chosen: The wise man
  alternatives:
  - the wise person
  - the wise one
  lexicon: HALOT
  rationale: חָכָם denotes a wise person; the Hebrew is grammatically masculine singular.
    Per gender-accurate policy, 'wise man' best matches the source form and the representative
    contrast with 'the fool.'
- source_word: עֵינָיו בְּרֹאשׁוֹ
  chosen: has his eyes in his head
  alternatives:
  - has eyes in his head
  - sees clearly
  lexicon: HALOT
  rationale: This is a concrete Hebrew idiom kept fairly literally. It contrasts the
    wise person's perceptiveness with the fool's blindness/darkness. A more interpretive
    rendering like 'sees clearly' captures sense but loses the vivid source imagery.
- source_word: וְהַכְּסִיל
  chosen: but the fool
  alternatives:
  - and the fool
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in this antithetical
    parallelism 'but' communicates the contrast naturally in English without adding
    meaning beyond the discourse function.
- source_word: בַּחֹשֶׁךְ הוֹלֵךְ
  chosen: walks in darkness
  alternatives:
  - goes in darkness
  - walks in the darkness
  lexicon: HALOT
  rationale: הלך is a common verb for going/walking; 'walks' works idiomatically in
    English and preserves the metaphorical force. 'Darkness' is left unexpanded, since
    the text itself does not specify moral, intellectual, or circumstantial darkness.
- source_word: וְיָדַעְתִּי גַם אֲנִי
  chosen: Yet I also knew
  alternatives:
  - And I also knew
  - I too came to know
  lexicon: HALOT
  rationale: 'The perfect verb marks the speaker''s realized conclusion. ''Yet'' reflects
    the adversative turn from the preceding contrast: despite wisdom''s advantage,
    Qoheleth recognizes a leveling reality. ''Also'' preserves גַם and the emphatic
    אֲנִי.'
- source_word: שֶׁמִּקְרֶה אֶחָד
  chosen: that one fate
  alternatives:
  - that one event
  - that the same fate
  - that one happening
  lexicon: HALOT
  rationale: מִקְרֶה in Ecclesiastes often refers to what befalls someone, commonly
    'fate' or 'same destiny.' 'One fate' is concise and idiomatic here, capturing
    the shared outcome in context.
- source_word: יִקְרֶה אֶת כֻּלָּם
  chosen: happens to them all
  alternatives:
  - befalls them all
  - happens to all of them
  lexicon: HALOT
  rationale: קרה means to happen or befall. 'Happens to them all' is natural modern
    English and preserves the universal scope of כֻּלָּם.
