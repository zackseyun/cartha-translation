id: ECC.2.5
reference: Ecclesiastes 2:5
source:
  edition: WLC
  text: עָשִׂ֣יתִי לִ֔/י גַּנּ֖וֹת וּ/פַרְדֵּסִ֑ים וְ/נָטַ֥עְתִּי בָ/הֶ֖ם עֵ֥ץ כָּל
    פֶּֽרִי־׃
translation:
  text: I made for myself gardens and parks, and I planted in them every kind of fruit
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'orchards' for 'parks' (Hebrew pardesim), referring to enclosed cultivated
      pleasure-grounds or orchard-parks.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׂיתִי
  chosen: I made
  alternatives:
  - I made for myself
  - I prepared
  lexicon: HALOT
  rationale: Qal perfect 1cs of עשה, here introducing the speaker's accomplishments.
    'I made' is the plain and natural rendering; the reflexive nuance is carried by
    the following לִי rather than folded into the verb itself.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks personal benefit or possession.
    English idiom favors 'for myself' to reflect the self-directed royal projects
    described in context.
- source_word: גַּנּוֹת
  chosen: gardens
  alternatives:
  - gardens/orchards
  lexicon: HALOT
  rationale: Plural of גן, the ordinary term for gardens. 'Gardens' distinguishes
    it from the following more specialized term פַרְדֵּסִים.
- source_word: פַרְדֵּסִים
  chosen: parks
  alternatives:
  - orchards
  - paradises
  lexicon: HALOT
  rationale: פַרְדֵּס denotes enclosed parks or pleasure-gardens, broader than a simple
    garden. 'Parks' best captures the larger cultivated estate sense in modern English.
    'Orchards' is possible in some contexts but is too narrow here since fruit trees
    are mentioned separately as planted within them.
- source_word: וְנָטַעְתִּי
  chosen: and I planted
  alternatives:
  - and planted
  lexicon: HALOT
  rationale: Qal perfect 1cs of נטע. The explicit subject 'I' is retained for rhythm
    and to mirror the first-person sequence of achievements in the passage.
- source_word: בָהֶם
  chosen: in them
  alternatives:
  - therein
  lexicon: HALOT
  rationale: Preposition ב with 3mp suffix referring back to the gardens and parks.
    'In them' is straightforward modern English.
- source_word: עֵץ כָּל פֶּרִי
  chosen: every kind of fruit tree
  alternatives:
  - trees of every fruit
  - all kinds of fruit trees
  - every fruit-bearing tree
  lexicon: HALOT
  rationale: Construct chain literally 'tree of every fruit.' In idiomatic English
    this is best rendered 'every kind of fruit tree,' preserving the distributive
    sense of כָּל and the horticultural meaning of the phrase.
