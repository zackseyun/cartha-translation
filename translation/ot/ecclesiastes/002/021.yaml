id: ECC.2.21
reference: Ecclesiastes 2:21
source:
  edition: WLC
  text: כִּי יֵ֣שׁ אָדָ֗ם שֶׁ/עֲמָל֛/וֹ בְּ/חָכְמָ֥ה וּ/בְ/דַ֖עַת וּ/בְ/כִשְׁר֑וֹן
    וּ/לְ/אָדָ֞ם שֶׁ/לֹּ֤א עָֽמַל בּ/וֹ֙ יִתְּנֶ֣/נּוּ חֶלְק֔/וֹ גַּם זֶ֥ה הֶ֖בֶל
    וְ/רָעָ֥ה רַבָּֽה־־־׃
translation:
  text: For there is a man whose labor is with wisdom and with knowledge and with
    skill, yet he must give his portion to a man who has not labored in it. This also
    is vapor and a great evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his toil.' The Hebrew עָמָל often carries the sense of wearisome toil
      in Ecclesiastes.
    reason: lexical_alternative
  - marker: b
    text: Or 'This too is vanity.' Traditional English versions often render הֶבֶל
      as 'vanity'; the translation 'vapor' preserves the Hebrew image of something
      fleeting and insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding reflection; 'For' fits the
    discourse flow in English.
- source_word: יֵשׁ אָדָם
  chosen: there is a man
  alternatives:
  - there is a person
  - someone exists
  lexicon: HALOT
  rationale: The idiom יֵשׁ + noun introduces an example or case. 'Man' preserves
    the singular masculine/generic force of אָדָם in line with the gender-accurate
    policy.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  lexicon: HALOT
  rationale: Here the noun is singular and refers to an individual case, not humanity
    in general. 'Man' is the most natural gender-accurate rendering in this context.
- source_word: עֲמָלוֹ
  chosen: his labor
  alternatives:
  - his toil
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes often carries the sense of burdensome work/toil.
    'Labor' is chosen here for readability while still conveying exertion; 'toil'
    remains a viable alternative and is preserved in a footnote.
- source_word: בְּחָכְמָה
  chosen: with wisdom
  alternatives:
  - in wisdom
  - wisely
  lexicon: HALOT
  rationale: The preposition ב marks the manner or sphere of the labor. 'With wisdom'
    is idiomatic and preserves the triadic structure.
- source_word: וּבְדַעַת
  chosen: and with knowledge
  alternatives:
  - and with understanding
  lexicon: HALOT
  rationale: דַּעַת commonly denotes knowledge. 'Knowledge' keeps the lexical distinction
    from חָכְמָה.
- source_word: וּבְכִשְׁרוֹן
  chosen: and with skill
  alternatives:
  - and with success
  - and with competence
  - and with aptitude
  lexicon: HALOT
  rationale: כִּשְׁרוֹן denotes skill, competence, or successful ability. 'Skill'
    best fits the sequence 'wisdom ... knowledge ... skill' and avoids overstating
    the result as 'success'.
- source_word: וּלְאָדָם שֶׁלֹּא עָמַל בּוֹ
  chosen: to a man who has not labored in it
  alternatives:
  - to someone who did not toil for it
  - to a man who has not worked for it
  lexicon: HALOT
  rationale: The phrase contrasts the laborer with the recipient. בּוֹ most naturally
    refers back to the labor/its fruits; 'in it' preserves the Hebrew linkage without
    overinterpreting.
- source_word: יִתְּנֶנּוּ
  chosen: he must give
  alternatives:
  - he gives
  - he will give
  lexicon: HALOT
  rationale: The imperfect here expresses the grim inevitability of the situation
    in context, not merely simple future. 'Must give' captures the compelled, unavoidable
    sense.
- source_word: חֶלְקוֹ
  chosen: his portion
  alternatives:
  - his share
  - his lot
  lexicon: HALOT
  rationale: חֵלֶק in Ecclesiastes often refers to one's allotted share or portion.
    'Portion' preserves that thematic resonance better than the flatter 'share'.
- source_word: גַּם זֶה הֶבֶל
  chosen: This also is vapor
  alternatives:
  - This too is vanity
  - This also is fleeting
  lexicon: HALOT
  rationale: הֶבֶל is a key term in Ecclesiastes. 'Vapor' preserves the metaphor of
    breath-like transience/insubstantiality better than the tradition-bound 'vanity'.
- source_word: וְרָעָה רַבָּה
  chosen: and a great evil
  alternatives:
  - and a great misfortune
  - and a grave wrong
  lexicon: HALOT
  rationale: רָעָה can denote evil, badness, or calamity. Here the speaker evaluates
    the situation as profoundly bad; 'a great evil' preserves the moral-existential
    weight without reducing it merely to inconvenience.
