theological_decisions:
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - fleetingness
  rationale: Following original-language primacy, 'vapor' better reflects the concrete
    Hebrew metaphor and preserves Ecclesiastes' thematic tension without importing
    the narrower English sense of 'vanity' as pride.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - person
  - humankind
  rationale: The verse presents an individual exemplar in singular masculine form.
    Per the gender-accurate policy, 'man' is retained rather than neutralizing to
    'person.'
  doctrine_reference: 'Translation philosophy §4; Contested terms table: אָדָם'
