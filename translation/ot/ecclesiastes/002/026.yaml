id: ECC.2.26
reference: Ecclesiastes 2:26
source:
  edition: WLC
  text: כִּ֤י לְ/אָדָם֙ שֶׁ/טּ֣וֹב לְ/פָנָ֔י/ו נָתַ֛ן חָכְמָ֥ה וְ/דַ֖עַת וְ/שִׂמְחָ֑ה
    וְ/לַ/חוֹטֶא֩ נָתַ֨ן עִנְיָ֜ן לֶ/אֱס֣וֹף וְ/לִ/כְנ֗וֹס לָ/תֵת֙ לְ/טוֹב֙ לִ/פְנֵ֣י
    הָֽ/אֱלֹהִ֔ים גַּם זֶ֥ה הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־׃
translation:
  text: For to the man who is good before him he has given wisdom and knowledge and
    joy, but to the sinner he has given the task of gathering and collecting, to give
    to the one who is good before God. This too is vanity and a chasing after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who pleases him' / 'who pleases God.' The Hebrew literally says 'who
      is good before him/God.'
    reason: alternative_reading
  - marker: b
    text: Or, 'striving after wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאָדָם
  chosen: to the man
  alternatives:
  - to a person
  - to humankind
  lexicon: HALOT
  rationale: אָדָם here refers to an individual in contrast with 'the sinner,' not
    humanity in general. Per doctrine, gender-accurate rendering is preferred where
    the source is masculine and representative; 'man' preserves the Hebrew form and
    the individualizing contrast.
- source_word: שֶׁטּוֹב לְפָנָיו
  chosen: who is good before him
  alternatives:
  - who pleases him
  - who is good in his sight
  lexicon: HALOT
  rationale: Literally 'who is good before him.' This idiom can mean pleasing to God,
    but 'good before him' preserves the evaluative language of טוב while remaining
    natural enough in English. A more interpretive 'pleases him' is possible but less
    transparent to the Hebrew wording.
- source_word: נָתַן
  chosen: has given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: 'The qatal form is rendered with English present perfect here to fit
    the reflective, gnomic style of Qoheleth in context: what God has allotted is
    a standing reality.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering; denotes practical and reflective wisdom in Ecclesiastes.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: '''Knowledge'' is the most direct gloss and pairs naturally with ''wisdom.''
    ''Understanding'' would overlap too much with wisdom here.'
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  lexicon: HALOT
  rationale: '''Joy'' is idiomatic and concise, fitting Qoheleth''s recurring theme
    of enjoyment as divine gift.'
- source_word: לַחוֹטֵא
  chosen: to the sinner
  alternatives:
  - to the one who sins
  lexicon: HALOT
  rationale: The participial form denotes a characteristic sinner, not merely an isolated
    act. 'The sinner' captures the contrast with the one good before God.
- source_word: עִנְיָן
  chosen: the task
  alternatives:
  - the business
  - the burden
  - the occupation
  lexicon: HALOT
  rationale: In Ecclesiastes this term often denotes an assigned occupation or preoccupation,
    sometimes burdensome. 'Task' fits the immediate sense of an imposed activity without
    overloading the term with negativity already conveyed by the context.
- source_word: לֶאֱסוֹף וְלִכְנוֹס
  chosen: of gathering and collecting
  alternatives:
  - to gather and heap up
  - to gather and accumulate
  lexicon: HALOT
  rationale: The paired infinitives are near-synonyms emphasizing accumulation. 'Gathering
    and collecting' preserves the parallelism without sounding overly idiomatic. 'Accumulate'
    is possible but slightly more interpretive.
- source_word: לָתֵת לְטוֹב לִפְנֵי הָאֱלֹהִים
  chosen: to give to the one who is good before God
  alternatives:
  - to give to the one who pleases God
  - to give to the man who is good before God
  lexicon: HALOT
  rationale: This repeats the earlier idea but now names God explicitly. 'The one
    who is good before God' preserves the Hebrew construction and avoids unnecessary
    repetition of 'man' in English while keeping the sense.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - vapor
  - breath
  - meaninglessness
  lexicon: HALOT
  rationale: Ecclesiastes uses הבל as a thematic keyword. 'Vanity' preserves traditional
    resonance and the sense of futility/insubstantiality better here than the more
    wooden 'vapor.' 'Meaninglessness' is too interpretive and absolute.
- source_word: רְעוּת רוּחַ
  chosen: a chasing after wind
  alternatives:
  - striving after wind
  - shepherding the wind
  lexicon: HALOT
  rationale: This idiom in Ecclesiastes conveys futile pursuit. 'A chasing after wind'
    is clear modern English and reflects the metaphor better than the less natural
    'striving after wind.'
