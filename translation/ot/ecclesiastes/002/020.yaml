id: ECC.2.20
reference: Ecclesiastes 2:20
source:
  edition: WLC
  text: וְ/סַבּ֥וֹתִֽי אֲנִ֖י לְ/יַאֵ֣שׁ אֶת לִבִּ֑/י עַ֚ל כָּל הֶ֣/עָמָ֔ל שֶׁ/עָמַ֖לְתִּי
    תַּ֥חַת הַ/שָּֽׁמֶשׁ־־׃
translation:
  text: So I turned to despair in my heart over all the labor at which I had labored
    under the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then I turned to make my heart despair' / 'Then I turned to give up
      in my heart.' The Hebrew idiom is compact and can be expressed in several close
      ways.
    reason: lexical_alternative
  - marker: b
    text: '''Under the sun'' is a recurring Ecclesiastes expression for life in the
      present world and its earthly sphere.'
    reason: cross_reference
lexical_decisions:
- source_word: וְסַבּוֹתִי
  chosen: So I turned
  alternatives:
  - Then I turned
  - So I went about
  lexicon: HALOT
  rationale: From סבב in the Qal perfect 1cs, here idiomatically marking a change
    of direction or course in thought. 'So I turned' is natural English and preserves
    the movement into the next response.
- source_word: לְיַאֵשׁ
  chosen: to despair
  alternatives:
  - to give up
  - to cause despair
  lexicon: HALOT
  rationale: From יאשׁ. With 'my heart' as object, the sense is that the speaker gave
    his heart over to despair or despondency. 'To despair' is concise and fits the
    emotional force better than the more colloquial 'give up.'
- source_word: אֶת־לִבִּי
  chosen: in my heart
  alternatives:
  - my heart
  - my mind
  lexicon: HALOT
  rationale: Literally 'my heart,' but in English 'despair in my heart' communicates
    the idiom smoothly. Hebrew לֵב often denotes the inner self, thought, and will;
    'mind' would narrow the sense too much.
- source_word: עַל
  chosen: over
  alternatives:
  - concerning
  - because of
  lexicon: HALOT
  rationale: Here introduces the matter that occasions despair. 'Over' is idiomatic
    in English for emotional distress regarding something.
- source_word: כָּל הֶעָמָל
  chosen: all the labor
  alternatives:
  - all the toil
  - all my work
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes regularly denotes burdensome labor/toil. 'Labor'
    preserves the work-focused sense while remaining readable. 'Toil' is possible
    but slightly more marked in English.
- source_word: שֶׁעָמַלְתִּי
  chosen: at which I had labored
  alternatives:
  - for which I toiled
  - that I had done
  lexicon: HALOT
  rationale: The cognate verb with עָמָל is preserved in English by repeating 'labored,'
    reflecting the Hebrew emphasis. 'At which' fits the construction with labor/work
    better than a flatter paraphrase.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a key recurring Ecclesiastes phrase and should be rendered consistently.
    'Under the sun' is the standard, clear English equivalent.
