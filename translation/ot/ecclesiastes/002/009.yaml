id: ECC.2.9
reference: Ecclesiastes 2:9
source:
  edition: WLC
  text: וְ/גָדַ֣לְתִּי וְ/הוֹסַ֔פְתִּי מִ/כֹּ֛ל שֶׁ/הָיָ֥ה לְ/פָנַ֖/י בִּ/ירוּשָׁלִָ֑ם
    אַ֥ף חָכְמָתִ֖/י עָ֥מְדָה לִּֽ/י׃
translation:
  text: So I became great and surpassed all who were before me in Jerusalem; also
    my wisdom remained with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I increased more than all who were before me in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my wisdom stood by me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגָדַלְתִּי
  chosen: So I became great
  alternatives:
  - And I became great
  - Thus I became great
  lexicon: HALOT
  rationale: The verb גדל in the Qal can denote becoming great in status, magnitude,
    or importance. 'Became great' preserves the personal/resultative sense better
    than a more interpretive 'prospered greatly.' 'So' reflects the discourse continuation
    naturally in English.
- source_word: וְהוֹסַפְתִּי
  chosen: and surpassed
  alternatives:
  - and increased
  - and added more than
  lexicon: HALOT
  rationale: The Hiphil of יסף literally means 'to add/increase,' but with the comparative
    phrase מִכֹּל it idiomatically expresses exceeding others. 'Surpassed' captures
    the comparative force in clear English without over-paraphrasing.
- source_word: מִכֹּל שֶׁהָיָה לְפָנַי
  chosen: all who were before me
  alternatives:
  - all that were before me
  - everyone who was before me
  lexicon: HALOT
  rationale: Though כֹּל is formally broad, in this royal-comparative context it refers
    to predecessors. 'All who were before me' is idiomatic and matches the likely
    personal reference better than the wooden 'all that was before me.'
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
- source_word: אַף
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'אַף here adds an additional assertion rather than intensifying strongly.
    ''Also'' fits the flow: despite all his increase, another fact remains true.'
- source_word: חָכְמָתִי
  chosen: my wisdom
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with first-person suffix.
- source_word: עָמְדָה לִּי
  chosen: remained with me
  alternatives:
  - stood by me
  - stayed with me
  lexicon: HALOT
  rationale: Literally 'stood to/for me,' but idiomatically it conveys that his wisdom
    persisted or stayed at his disposal. 'Remained with me' is natural English and
    preserves the sense of retained wisdom rather than physical posture.
