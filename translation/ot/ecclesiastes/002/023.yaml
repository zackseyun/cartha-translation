id: ECC.2.23
reference: Ecclesiastes 2:23
source:
  edition: WLC
  text: כִּ֧י כָל יָמָ֣י/ו מַכְאֹבִ֗ים וָ/כַ֨עַס֙ עִנְיָנ֔/וֹ גַּם בַּ/לַּ֖יְלָה לֹא
    שָׁכַ֣ב לִבּ֑/וֹ גַּם זֶ֖ה הֶ֥בֶל הֽוּא־־־־׃
translation:
  text: For all his days are pains, and his work is vexation; even in the night his
    heart does not lie down. This too is vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his heart does not rest.' The Hebrew reads literally, 'his heart does
      not lie down,' expressing inward unrest that continues through the night.
    reason: lexical_alternative
  - marker: b
    text: Or 'vanity' or 'breath.' The Hebrew הֶבֶל is rendered here as 'vapor' to
      preserve the book's recurring image of what is fleeting and insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding reflection; 'For' fits the
    discourse flow in English better than the more emphatic 'Indeed' or more narrowly
    causal 'Because'.
- source_word: כָל יָמָיו
  chosen: all his days
  alternatives:
  - all his life
  - all his days of life
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom while remaining
    natural English. 'All his life' is possible, but 'all his days' keeps the concrete
    temporal expression.
- source_word: מַכְאֹבִים
  chosen: pains
  alternatives:
  - sorrows
  - painful toil
  lexicon: HALOT
  rationale: The noun denotes pain or suffering. 'Pains' preserves the plural and
    matches the existential tone of Qoheleth. 'Sorrows' is possible but can sound
    more emotional than the Hebrew requires.
- source_word: וָכַעַס
  chosen: vexation
  alternatives:
  - grief
  - frustration
  - anger
  lexicon: HALOT
  rationale: In Ecclesiastes this term often carries the sense of inner vexation or
    provocation rather than simple anger. 'Vexation' best fits the context of burdensome
    labor and mental unrest.
- source_word: עִנְיָנוֹ
  chosen: his work
  alternatives:
  - his task
  - his business
  - his occupation
  lexicon: HALOT
  rationale: The term refers to one's occupation, task, or business. 'His work' is
    the most natural and concise English rendering in context, connecting with the
    chapter's repeated focus on labor.
- source_word: גַּם בַּלַּיְלָה
  chosen: even in the night
  alternatives:
  - also at night
  - even at night
  lexicon: HALOT
  rationale: Captures the emphatic additive force of גַּם and the temporal phrase
    naturally in English. 'In the night' slightly better reflects the Hebrew preposition
    than 'at night.'
- source_word: לֹא שָׁכַב לִבּוֹ
  chosen: his heart does not lie down
  alternatives:
  - his heart does not rest
  - his mind does not settle
  lexicon: HALOT
  rationale: The Hebrew is literally 'his heart does not lie down.' Retaining the
    metaphor preserves the anthropological imagery of the heart as the seat of inner
    thought and unrest. A more interpretive rendering like 'does not rest' is possible
    but less transparent to the source.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב often includes thought and inner life, but 'heart' is
    the standard and more source-transparent rendering. The mental nuance is preserved
    by context rather than replacing the term with 'mind'.
- source_word: גַּם זֶה
  chosen: This too
  alternatives:
  - This also
  - Even this
  lexicon: HALOT
  rationale: A standard Ecclesiastes refrain. 'This too' is idiomatic modern English
    and preserves the additive force.
- source_word: הֶבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - mere futility
  lexicon: HALOT
  rationale: Following source-oriented consistency in Ecclesiastes, 'vapor' preserves
    the metaphor of transience and insubstantiality better than the tradition-bound
    'vanity.' 'Breath' is also possible, but 'vapor' more clearly conveys ephemerality
    in contemporary English.
