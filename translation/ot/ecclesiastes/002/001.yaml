id: ECC.2.1
reference: Ecclesiastes 2:1
source:
  edition: WLC
  text: אָמַ֤רְתִּֽי אֲנִי֙ בְּ/לִבִּ֔/י לְכָ/ה נָּ֛א אֲנַסְּ/כָ֛ה בְ/שִׂמְחָ֖ה וּ/רְאֵ֣ה
    בְ/ט֑וֹב וְ/הִנֵּ֥ה גַם ה֖וּא הָֽבֶל־־׃
translation:
  text: I said in my heart, “Come now, I will test you with pleasure; so enjoy what
    is good.” But look, this too is vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mirth' or 'joy' for 'pleasure.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and see good'; the Hebrew idiom means to experience or enjoy
      what is good.
    reason: lexical_alternative
  - marker: c
    text: Or 'vanity' or 'breath'; Hebrew 'vapor' is a recurring metaphor in Ecclesiastes
      for what is fleeting or insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי אֲנִי בְּלִבִּי
  chosen: I said in my heart
  alternatives:
  - I said to myself
  - I said in my mind
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to speaking 'in/with my heart,' a standard
    way of expressing inward self-address. 'I said in my heart' preserves the metaphor
    and remains natural enough in English.
- source_word: לְכָה נָּא
  chosen: Come now
  alternatives:
  - Come, please
  - Go to now
  lexicon: HALOT
  rationale: An idiomatic exhortation to oneself. 'Come now' captures the discourse
    force in readable modern English better than the archaic 'Go to now,' while 'please'
    would sound overly polite rather than idiomatic.
- source_word: אֲנַסְּכָה
  chosen: I will test you
  alternatives:
  - I will try you
  - I will prove you
  lexicon: HALOT
  rationale: From נסה, 'to test/try.' Since the speaker addresses his own heart/self,
    'I will test you' is the most direct rendering and preserves the reflexive self-experiment
    motif of the verse.
- source_word: בְשִׂמְחָה
  chosen: with pleasure
  alternatives:
  - with mirth
  - with joy
  lexicon: HALOT
  rationale: In this context of experiential enjoyment, 'pleasure' fits the Qoheleth
    theme of testing delight and enjoyment. 'Mirth' is too archaic; 'joy' is possible
    but can sound more morally elevated than the experimental pursuit here.
- source_word: וּרְאֵה בְטוֹב
  chosen: so enjoy what is good
  alternatives:
  - and see good
  - and see what is good
  - and enjoy good
  lexicon: HALOT
  rationale: Literally 'and see in good/goodness.' In Hebrew idiom, 'see good' can
    mean experience or enjoy good. Rendering it as 'enjoy what is good' communicates
    the idiomatic sense in clear English while preserving the object 'good.'
- source_word: וְהִנֵּה
  chosen: But look
  alternatives:
  - And behold
  - And look
  lexicon: HALOT
  rationale: Introduces the narrator's evaluative conclusion. 'But look' reflects
    the adversative turn in context and is more natural in modern English than 'behold.'
- source_word: גַם הוּא
  chosen: this too
  alternatives:
  - that too
  - it too
  lexicon: HALOT
  rationale: Refers back to the pleasure-seeking experiment just described. 'This
    too' is idiomatic and points to the immediately preceding pursuit.
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - meaningless
  lexicon: HALOT
  rationale: Hebrew הבל denotes breath, vapor, or something fleeting/insubstantial.
    'Vapor' preserves the concrete metaphor better than the traditional but potentially
    misleading 'vanity' and avoids overinterpreting with 'meaningless.'
