id: ECC.2.18
reference: Ecclesiastes 2:18
source:
  edition: WLC
  text: וְ/שָׂנֵ֤אתִֽי אֲנִי֙ אֶת כָּל עֲמָלִ֔/י שֶׁ/אֲנִ֥י עָמֵ֖ל תַּ֣חַת הַ/שָּׁ֑מֶשׁ
    שֶׁ֣/אַנִּיחֶ֔/נּוּ לָ/אָדָ֖ם שֶׁ/יִּהְיֶ֥ה אַחֲרָֽ/י־־׃
translation:
  text: And I hated all my labor at which I toiled under the sun, because I must leave
    it to the man who will come after me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to a man who will be after me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂנֵאתִי
  chosen: And I hated
  alternatives:
  - So I hated
  - I also hated
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׂנא, expressing the speaker's settled reaction. The
    prefixed conjunction is rendered simply as 'And' to preserve discourse flow without
    overstating logical force.
- source_word: כָּל עֲמָלִי
  chosen: all my labor
  alternatives:
  - all my toil
  - all my work
  lexicon: HALOT
  rationale: עָמָל commonly denotes labor/toil, often with the nuance of burdensome
    effort in Ecclesiastes. 'Labor' preserves the broad sense while fitting the book's
    repeated vocabulary.
- source_word: שֶׁאֲנִי עָמֵל
  chosen: at which I toiled
  alternatives:
  - for which I labored
  - in which I was toiling
  lexicon: HALOT
  rationale: The relative clause restates and intensifies the idea of labor with the
    participle עָמֵל. 'At which I toiled' keeps the repetitive emphasis without sounding
    unnatural in English.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a characteristic Ecclesiastes idiom for life in the earthly realm.
    The standard rendering 'under the sun' is both accurate and recognizable.
- source_word: שֶׁאַנִּיחֶנּוּ
  chosen: because I must leave it
  alternatives:
  - that I will leave it
  - for I will have to leave it
  lexicon: HALOT
  rationale: Hiphil 1cs of נוח here means 'leave, set down, hand over.' The conjunction
    שֶׁ introduces the reason for the hatred in context, so 'because' best captures
    the sense. 'Must leave' brings out the inevitability implied by the context of
    death and succession.
- source_word: לָאָדָם
  chosen: to the man
  alternatives:
  - to a man
  - to the person
  lexicon: HALOT
  rationale: אָדָם here refers to an individual human successor, not humanity in general.
    Per the gender-accurate policy, 'the man' preserves the masculine singular form
    and the specific referent implied by the following clause.
- source_word: שֶׁיִּהְיֶה אַחֲרָי
  chosen: who will come after me
  alternatives:
  - who will be after me
  - who will succeed me
  lexicon: HALOT
  rationale: Literally 'who will be after me,' but in idiomatic English this refers
    to the successor. 'Who will come after me' is natural while preserving the temporal
    and personal sense.
