- issue: Rendering of אָדָם
  chosen_reading: the man
  alternative_readings:
  - the person
  - a man
  rationale: The noun is singular masculine and refers to the individual successor
    who inherits the speaker's accumulated labor. Following the translation philosophy's
    gender-accurate principle, the masculine form is retained rather than neutralized.
