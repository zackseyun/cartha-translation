id: ECC.2.17
reference: Ecclesiastes 2:17
source:
  edition: WLC
  text: וְ/שָׂנֵ֨אתִי֙ אֶת הַ֣/חַיִּ֔ים כִּ֣י רַ֤ע עָלַ/י֙ הַֽ/מַּעֲשֶׂ֔ה שֶׁ/נַּעֲשָׂ֖ה
    תַּ֣חַת הַ/שָּׁ֑מֶשׁ כִּֽי הַ/כֹּ֥ל הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־־׃
translation:
  text: So I hated life, because the work that is done under the sun was grievous
    to me; for everything is vapor and a chasing after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vanity' or 'breath'; the Hebrew hebel evokes something fleeting, insubstantial,
      or elusive.
    reason: lexical_alternative
  - marker: b
    text: Or 'striving after wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂנֵאתִי
  chosen: So I hated
  alternatives:
  - And I hated
  - Therefore I hated
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׂנא, expressing the speaker's settled reaction. The
    prefixed conjunction is rendered 'So' to carry the discourse progression from
    the preceding reflection rather than a mere additive 'and.'
- source_word: הַחַיִּים
  chosen: life
  alternatives:
  - the life
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as 'life' in English. 'Life' is the natural equivalent here for the object of
    the speaker's hatred.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the speaker's hatred of life. 'Because' makes
    the causal force explicit in contemporary English.
- source_word: רַע עָלַי
  chosen: was grievous to me
  alternatives:
  - was evil to me
  - was bad to me
  - was displeasing to me
  lexicon: HALOT
  rationale: The phrase literally means 'was evil/bad upon me,' but idiomatically
    conveys something oppressive, distressing, or grievous to the speaker. 'Grievous
    to me' preserves the negative experiential force without wooden awkwardness.
- source_word: הַמַּעֲשֶׂה
  chosen: the work
  alternatives:
  - the deed
  - what is done
  lexicon: HALOT
  rationale: Refers collectively to human activity or what is accomplished. 'The work'
    fits Qoheleth's repeated reflection on human labor and activity.
- source_word: שֶׁנַּעֲשָׂה
  chosen: that is done
  alternatives:
  - which is done
  - that was done
  lexicon: HALOT
  rationale: Niphal participial/passive sense modifying 'the work.' Present English
    'that is done' captures the general, ongoing character of activity under the sun.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: Standard Ecclesiastes idiom for life in the earthly realm. 'Under the
    sun' is both accurate and recognizable.
- source_word: כִּי הַכֹּל
  chosen: for everything
  alternatives:
  - for all
  - because everything
  lexicon: HALOT
  rationale: Introduces the explanatory summary. 'Everything' best conveys the comprehensive
    scope of הַכֹּל in idiomatic English.
- source_word: הֶבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - mere futility
  lexicon: HALOT
  rationale: Hebel literally denotes breath/vapor and in Ecclesiastes carries the
    sense of transience, insubstantiality, and elusiveness. 'Vapor' preserves the
    metaphor better than the traditional but potentially misleading 'vanity.'
- source_word: וּרְעוּת רוּחַ
  chosen: and a chasing after wind
  alternatives:
  - and striving after wind
  - and shepherding wind
  lexicon: HALOT
  rationale: Traditional rendering often takes the phrase as pursuit of what cannot
    be grasped. 'Chasing after wind' is idiomatic, vivid, and communicates futility.
    The alternative 'striving after wind' is possible, but 'chasing' better matches
    modern English while preserving the image.
