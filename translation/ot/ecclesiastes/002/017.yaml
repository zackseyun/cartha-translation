theological_decisions:
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - breath
  - mere futility
  rationale: This is not a doctrinally contested term in the provided table, but it
    is interpretively significant. 'Vapor' preserves the concrete Hebrew metaphor
    and avoids importing the narrower moral sense that 'vanity' can suggest in modern
    English.
  doctrine_reference: Translation philosophy §1, §5
