id: ECC.2.12
reference: Ecclesiastes 2:12
source:
  edition: WLC
  text: וּ/פָנִ֤יתִֽי אֲנִי֙ לִ/רְא֣וֹת חָכְמָ֔ה וְ/הוֹלֵל֖וֹת וְ/סִכְל֑וּת כִּ֣י
    מֶ֣ה הָ/אָדָ֗ם שֶׁ/יָּבוֹא֙ אַחֲרֵ֣י הַ/מֶּ֔לֶךְ אֵ֥ת אֲשֶׁר כְּבָ֖ר עָשֽׂוּ/הוּ׀־׃
translation:
  text: So I turned to consider wisdom, madness, and folly; for what can the man do
    who comes after the king? Only what has already been done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''what is the man who comes after the king—what they have already
      done him/it?'' The final clause is difficult and may also be understood as ''Only
      what has already been done.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָנִיתִי
  chosen: So I turned
  alternatives:
  - And I turned
  - Then I turned
  lexicon: HALOT
  rationale: The verb פנה in the Qal can mean 'turn' in a literal or figurative sense.
    Here it marks a shift in the speaker's inquiry. 'So I turned' gives natural English
    while preserving the movement to a new consideration.
- source_word: לִרְאוֹת
  chosen: to consider
  alternatives:
  - to see
  - to look at
  lexicon: HALOT
  rationale: Although literally 'to see,' ראה with an abstract object often means
    to examine or consider. 'Consider' best fits the intellectual context of Qoheleth's
    reflection.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה in Ecclesiastes; it denotes practical and
    intellectual wisdom.
- source_word: הוֹלֵלוֹת
  chosen: madness
  alternatives:
  - boastfulness
  - folly
  lexicon: HALOT
  rationale: This plural noun from הלל/הוללות in Ecclesiastes denotes irrational or
    deranged behavior, contrasted with wisdom. 'Madness' preserves the sharper contrast,
    while 'folly' is reserved for the following term.
- source_word: סִכְלוּת
  chosen: folly
  alternatives:
  - stupidity
  - foolishness
  lexicon: HALOT
  rationale: סכלות denotes foolishness or stupidity. 'Folly' is idiomatic and pairs
    well with 'wisdom' and 'madness' in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כּי introduces the reason for the preceding turn of thought. 'For'
    is concise and natural.
- source_word: מֶה הָאָדָם
  chosen: what can the man do
  alternatives:
  - what is the man
  - what can a man do
  - what can humankind do
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it introduces a rhetorical limitation
    on any successor to the king. Because the following verb is 'comes,' the sense
    is best completed idiomatically as 'what can the man do.' 'The man' preserves
    the singular masculine הָאָדָם in line with the project's gender-accurate policy.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - a man
  - humankind
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind' depending on context. Here the singular
    individual who comes after the king is in view, so 'the man' is the best contextual
    rendering.
- source_word: שיבוא אחרי המלך
  chosen: who comes after the king
  alternatives:
  - who will come after the king
  lexicon: HALOT
  rationale: The relative clause describes the successor. English present 'comes'
    works generically in a rhetorical question.
- source_word: אֵת אֲשֶׁר כְּבָר עָשׂוּהוּ
  chosen: Only what has already been done
  alternatives:
  - What they have already done to him
  - That which has already been done
  - Only what has already been made
  lexicon: HALOT
  rationale: This clause is notoriously compressed and textually awkward. The 3mp
    verb with 3ms suffix most naturally yields 'they have already done it/him,' but
    the sense in context is that a successor cannot surpass what has already been
    accomplished. 'Only what has already been done' gives the likely force in readable
    English while avoiding an overconfident specification of the ambiguous suffix.
