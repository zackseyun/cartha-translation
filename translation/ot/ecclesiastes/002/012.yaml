theological_decisions:
- issue: Rendering of אָדָם in a generic-yet-singular rhetorical statement
  chosen_reading: the man
  alternative_readings:
  - a man
  - humankind
  rationale: The Hebrew is grammatically singular and refers to the individual successor
    to the king, not humanity in the abstract. This follows the doctrine's gender-accurate
    principle while preserving the representative force of the singular.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
