theological_decisions:
- issue: Whether to preserve a more literal commercial nuance for יתרון in Ecclesiastes
  chosen_reading: Rendered יתרון as 'advantage' rather than 'profit' in this comparative
    statement.
  alternative_readings:
  - profit
  - gain
  rationale: The verse contrasts wisdom and folly by analogy to light and darkness.
    'Advantage' best communicates the comparative superiority in natural English without
    importing a narrowly economic sense, while still remaining faithful to the Hebrew
    term's semantic range in Ecclesiastes.
  doctrine_reference: Translation philosophy §1, §5
