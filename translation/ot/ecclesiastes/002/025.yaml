theological_decisions:
- issue: Referent of the final pronominal suffix מִמֶּנִּי
  chosen_reading: apart from him
  alternative_readings:
  - apart from me
  rationale: The Masoretic pointing yields 'from me,' which would make Qoheleth the
    speaker. However, the surrounding context emphasizes that enjoyment is from God
    (vv. 24, 26), and many interpreters and versions take the sense to be 'apart from
    him,' i.e., apart from God. To preserve the contextual sense without hiding the
    textual issue, the main text reads 'him' and the alternative is footnoted.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
