id: ECC.2.25
reference: Ecclesiastes 2:25
source:
  edition: WLC
  text: כִּ֣י מִ֥י יֹאכַ֛ל וּ/מִ֥י יָח֖וּשׁ ח֥וּץ מִמֶּֽ/נִּי׃
translation:
  text: For who can eat, and who can enjoy, apart from him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''apart from me.'' Many interpreters understand the sense as ''apart
      from him,'' referring to God, in light of the surrounding context.'
    reason: textual_variant
  - marker: b
    text: Or 'who can hasten?' or 'who can feel?' The Hebrew verb is difficult; here
      it is understood in the sense of enjoying or experiencing pleasure.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For/because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding statement. 'For' best preserves
    the explanatory force in natural English.
- source_word: מִי
  chosen: who
  alternatives:
  - what person
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; 'who' is the
    natural English equivalent.
- source_word: יֹאכַל
  chosen: can eat
  alternatives:
  - eats
  - may eat
  lexicon: HALOT
  rationale: Though formally an imperfect 'will eat/can eat,' in this rhetorical context
    it expresses possibility or capacity. 'Can eat' fits the sense of ability/privilege
    in context.
- source_word: וּמִי
  chosen: and who
  alternatives:
  - or who
  lexicon: HALOT
  rationale: Simple conjunction plus interrogative. 'And who' preserves the parallel
    structure of the Hebrew.
- source_word: יָחוּשׁ
  chosen: can enjoy
  alternatives:
  - can hasten
  - can feel
  - can have enjoyment
  lexicon: HALOT
  rationale: This verb is difficult and has been understood variously. In the context
    of eating and enjoyment in Ecclesiastes 2:24–26, the sense 'enjoy' or 'experience
    pleasure' best fits the discourse. The more literal possibilities ('hasten,' 'feel')
    are less coherent here and are preserved in a footnote.
- source_word: חוּץ
  chosen: apart from
  alternatives:
  - outside
  - except
  lexicon: HALOT
  rationale: With the following preposition/pronominal suffix, the phrase means 'apart
    from' or 'except for/from.' 'Apart from' is idiomatic and clear in English.
- source_word: מִמֶּנִּי
  chosen: him
  alternatives:
  - me
  lexicon: HALOT
  rationale: The consonantal text points to 'from me,' but in context many understand
    the referent to be God ('from him'), and this reading is reflected in many translations
    and ancient versions. Because the immediate context speaks of what comes from
    the hand of God (v. 24), 'him' best conveys the likely intended sense in English,
    while the alternative 'me' is preserved in a footnote as a textual/interpretive
    issue.
