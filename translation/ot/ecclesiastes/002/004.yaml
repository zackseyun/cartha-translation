id: ECC.2.4
reference: Ecclesiastes 2:4
source:
  edition: WLC
  text: הִגְדַּ֖לְתִּי מַעֲשָׂ֑/י בָּנִ֤יתִי לִ/י֙ בָּתִּ֔ים נָטַ֥עְתִּי לִ֖/י כְּרָמִֽים׃
translation:
  text: 'I made my works great: I built houses for myself; I planted vineyards for
    myself.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I enlarged my projects' or 'I increased my undertakings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגְדַּלְתִּי
  chosen: I made ... great
  alternatives:
  - I enlarged
  - I magnified
  - I increased
  lexicon: HALOT
  rationale: Hiphil of גדל here is causative, referring to making something great
    or extensive. 'I made ... great' preserves the causative sense and fits the following
    concrete examples of large undertakings.
- source_word: מַעֲשַׂי
  chosen: my works
  alternatives:
  - my deeds
  - my projects
  - my undertakings
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly means work, deed, or accomplishment. In this context
    of royal building and planting activity, 'works' is broad enough to cover the
    ensuing projects while retaining a close connection to the Hebrew.
- source_word: בָּנִיתִי
  chosen: I built
  alternatives:
  - I constructed
  lexicon: HALOT
  rationale: A straightforward rendering of the Qal perfect of בנה. 'Built' is natural
    modern English and formally close to the source.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with first-person suffix marks personal benefit or possession.
    'For myself' brings out the reflexive/self-benefiting nuance more clearly than
    the flatter 'for me.'
- source_word: בָּתִּים
  chosen: houses
  alternatives:
  - palaces
  - buildings
  lexicon: HALOT
  rationale: The ordinary sense is 'houses.' Although royal context could suggest
    grand residences, the Hebrew does not specify palaces, so the more basic term
    should stand.
- source_word: נָטַעְתִּי
  chosen: I planted
  alternatives: []
  lexicon: HALOT
  rationale: Standard rendering of נטע in agricultural contexts.
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vine-gardens
  lexicon: HALOT
  rationale: The normal English equivalent for כרמים is 'vineyards,' matching the
    agricultural and luxury context of the verse.
