theological_decisions:
- issue: Interpretation of the opening clause אֵין טוֹב בָּאָדָם
  chosen_reading: 'comparative: ''There is nothing better for a man than...'','' not
    absolute ''There is no good in man'''
  alternative_readings:
  - 'absolute: ''There is no good in man that he should eat and drink...'''
  rationale: The comparative reading best fits the immediate syntax, the broader argument
    of Ecclesiastes, and the concluding statement that such enjoyment is from God.
    The absolute reading would suggest an anthropological claim not warranted by the
    context.
  doctrine_reference: Translation philosophy §§1, 3, 4
