id: ECC.2.8
reference: Ecclesiastes 2:8
source:
  edition: WLC
  text: כָּנַ֤סְתִּי לִ/י֙ גַּם כֶּ֣סֶף וְ/זָהָ֔ב וּ/סְגֻלַּ֥ת מְלָכִ֖ים וְ/הַ/מְּדִינ֑וֹת
    עָשִׂ֨יתִי לִ֜/י שָׁרִ֣ים וְ/שָׁר֗וֹת וְ/תַעֲנוּגֹ֛ת בְּנֵ֥י הָ/אָדָ֖ם שִׁדָּ֥ה
    וְ/שִׁדּֽוֹת־׃
translation:
  text: I also gathered for myself silver and gold, and the treasure of kings and
    provinces. I acquired for myself male singers and female singers, and the delights
    of the sons of man—a concubine and concubines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the delights of humankind.' The Hebrew reads 'the delights of the sons
      of man.'
    reason: lexical_alternative
  - marker: b
    text: The meaning of the Hebrew word rendered 'a concubine and concubines' is
      uncertain; alternatives include 'a mistress and mistresses,' 'male and female
      cupbearers,' or more generally 'every kind of luxury.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּנַסְתִּי
  chosen: gathered
  alternatives:
  - collected
  - amassed
  lexicon: HALOT
  rationale: The verb denotes bringing together or collecting. 'Gathered' is natural
    English and preserves the active accumulation sense without overstating it as
    hoarding.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  rationale: The dative marks personal acquisition; 'for myself' brings out the self-directed
    accumulation emphasized in the context.
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  lexicon: HALOT
  rationale: Standard literal rendering for precious metals functioning as wealth.
- source_word: סְגֻלַּת מְלָכִים וְהַמְּדִינוֹת
  chosen: the treasure of kings and provinces
  alternatives:
  - the special treasure of kings and provinces
  - the wealth of kings and provinces
  lexicon: HALOT
  rationale: סְגֻלָּה denotes valued property or treasure. 'Treasure' is concise and
    idiomatic. מְדִינוֹת refers to administrative districts or provinces, not abstract
    'states'.
- source_word: עָשִׂיתִי לִי
  chosen: I acquired for myself
  alternatives:
  - I made for myself
  - I provided for myself
  lexicon: HALOT
  rationale: Although עשה is broadly 'make/do,' in this context of obtaining possessions
    and entertainments, 'acquired' best reflects the idiomatic sense in English.
- source_word: שָׁרִים וְשָׁרוֹת
  chosen: male singers and female singers
  alternatives:
  - singers, both men and women
  lexicon: HALOT
  rationale: The paired masculine and feminine participial forms explicitly distinguish
    male and female performers. This preserves the Hebrew gender distinction.
- source_word: תַעֲנוּגֹת בְּנֵי הָאָדָם
  chosen: the delights of the sons of man
  alternatives:
  - human delights
  - the pleasures of mankind
  - the delights of humankind
  lexicon: HALOT
  rationale: תַעֲנוּגֹת denotes luxuries or delights. בְּנֵי הָאָדָם is rendered gender-accurately
    as 'sons of man' to reflect the Hebrew form, in line with project policy, while
    remaining understandable in context.
- source_word: שִׁדָּה וְשִׁדּוֹת
  chosen: a concubine and concubines
  alternatives:
  - a mistress and mistresses
  - a wife and wives
  - male and female cupbearers
  - every kind of luxury
  lexicon: HALOT
  rationale: This rare term is notoriously uncertain. In this context following 'the
    delights of the sons of man,' a reference to women in a sexual or harem context
    is the most plausible traditional interpretation. Because the form is obscure
    and alternatives are significant, the uncertainty is preserved in a footnote.
