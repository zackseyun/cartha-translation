theological_decisions:
- issue: Rendering of בְּנֵי הָאָדָם
  chosen_reading: sons of man
  alternative_readings:
  - humankind
  - mankind
  rationale: The Hebrew is grammatically masculine and generic. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral term in the main text; a more
    inclusive alternative is preserved in a footnote where relevant.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Handling the obscure term שִׁדָּה וְשִׁדּוֹת
  chosen_reading: a concubine and concubines
  alternative_readings:
  - a mistress and mistresses
  - male and female cupbearers
  - every kind of luxury
  rationale: The term is lexically uncertain and has generated multiple interpretations.
    The main text adopts the reading that best fits the immediate context of royal
    luxury and human delights, while preserving major alternatives in a footnote rather
    than overstating certainty.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
