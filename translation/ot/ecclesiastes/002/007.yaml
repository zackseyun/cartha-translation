id: ECC.2.7
reference: Ecclesiastes 2:7
source:
  edition: WLC
  text: קָנִ֨יתִי֙ עֲבָדִ֣ים וּ/שְׁפָח֔וֹת וּ/בְנֵי בַ֖יִת הָ֣יָה לִ֑/י גַּ֣ם מִקְנֶה֩
    בָקָ֨ר וָ/צֹ֤אן הַרְבֵּה֙ הָ֣יָה לִ֔/י מִ/כֹּ֛ל שֶֽׁ/הָי֥וּ לְ/פָנַ֖/י בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: I acquired male slaves and female slaves, and homeborn slaves were mine; I
    also had great herds of cattle and flocks, more than all who were before me in
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'sons of the house,' referring to persons born into the household;
      in this context, likely household slaves born there.
    reason: cultural_note
  - marker: b
    text: Or 'livestock ... in abundance'; the Hebrew uses collective terms for animal
      holdings.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִיתִי
  chosen: I acquired
  alternatives:
  - I bought
  - I gained
  lexicon: HALOT
  rationale: The verb קנה commonly means to acquire or buy. 'Acquired' is broad enough
    to cover purchase/obtaining without over-specifying the means, and fits the catalog
    style of the passage.
- source_word: עֲבָדִים
  chosen: male slaves
  alternatives:
  - slaves
  - servants
  - male servants
  lexicon: HALOT
  rationale: Given the paired contrast with שְׁפָחוֹת ('female slaves') and the translation
    philosophy favoring 'slave' where bonded status is salient, 'male slaves' best
    preserves both gender and status.
- source_word: שְׁפָחוֹת
  chosen: female slaves
  alternatives:
  - maidservants
  - slave girls
  - female servants
  lexicon: HALOT
  rationale: This term denotes female slaves/maidservants. 'Female slaves' keeps the
    social status explicit and matches the paired structure with עֲבָדִים.
- source_word: וּבְנֵי בַיִת
  chosen: homeborn slaves
  alternatives:
  - members of the household
  - house-born servants
  - those born in my house
  lexicon: HALOT
  rationale: Literally 'sons of the house,' an idiom for those born into one's household,
    especially household slaves in this context. 'Homeborn slaves' is concise and
    contextually precise.
- source_word: הָיָה לִי
  chosen: were mine
  alternatives:
  - I had
  - belonged to me
  lexicon: HALOT
  rationale: This possession formula is rendered idiomatically. 'Were mine' preserves
    the emphatic possessive sense after listing acquisitions, while remaining natural
    English.
- source_word: מִקְנֶה
  chosen: herds
  alternatives:
  - livestock
  - property in livestock
  lexicon: HALOT
  rationale: מִקְנֶה refers to livestock possessions. Because it is immediately specified
    by cattle and flocks, 'herds' works naturally in English as a collective heading.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: Standard rendering for bovine livestock in a collective sense.
- source_word: צֹאן
  chosen: flocks
  alternatives:
  - sheep and goats
  - small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, often sheep and goats.
    'Flocks' is the most natural concise rendering in this livestock list.
- source_word: הַרְבֵּה
  chosen: great
  alternatives:
  - many
  - in abundance
  lexicon: HALOT
  rationale: Used adverbially/adjectivally here to indicate abundance. 'Great' in
    'great herds' gives idiomatic English while preserving the sense of large quantity.
- source_word: מִכֹּל שֶׁהָיוּ לְפָנַי
  chosen: more than all who were before me
  alternatives:
  - more than any who were before me
  - beyond all my predecessors
  lexicon: HALOT
  rationale: This comparative phrase expresses surpassing all predecessors. 'More
    than all who were before me' closely follows the Hebrew while remaining readable.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
