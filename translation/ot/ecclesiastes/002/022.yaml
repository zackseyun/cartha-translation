id: ECC.2.22
reference: Ecclesiastes 2:22
source:
  edition: WLC
  text: כִּ֠י מֶֽה הֹוֶ֤ה לָֽ/אָדָם֙ בְּ/כָל עֲמָל֔/וֹ וּ/בְ/רַעְי֖וֹן לִבּ֑/ו שֶׁ/ה֥וּא
    עָמֵ֖ל תַּ֥חַת הַ/שָּֽׁמֶשׁ־־׃
translation:
  text: For what does a man gain from all his labor and from the striving of his heart
    with which he toils under the sun?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vexation of his heart' or 'the pursuit/preoccupation of his heart.'
      The Hebrew term רַעְיוֹן can carry nuances of inner striving, mental pursuit,
      or troubled preoccupation in Ecclesiastes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits the argumentative flow in English and preserves the causal/explanatory force.
- source_word: מֶה
  chosen: what
  alternatives:
  - what indeed
  - what is there
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'what'
    is natural and sufficient in English.
- source_word: הֹוֶה
  chosen: does ... gain
  alternatives:
  - comes to be
  - happens
  - is there for
  lexicon: HALOT
  rationale: Although the verb fundamentally relates to being/becoming, in this idiom
    with לָאָדָם it asks what comes to a person from labor, i.e., what he gets or
    gains. 'Does ... gain' expresses the idiomatic sense clearly in modern English
    without over-paraphrase.
- source_word: לָאָדָם
  chosen: a man
  alternatives:
  - man
  - a person
  - humankind
  lexicon: HALOT
  rationale: אָדָם here refers to a human in general but in grammatically masculine
    singular form. Per doctrine, gender-accurate rendering is preferred where the
    source uses representative masculine. 'A man' preserves the singular rhetorical
    framing.
- source_word: בְּכָל עֲמָלוֹ
  chosen: from all his labor
  alternatives:
  - in all his labor
  - by all his toil
  - from all his toil
  lexicon: HALOT
  rationale: The phrase denotes the sphere/source from which any benefit would arise.
    'Labor' is a clear rendering of עָמָל here; 'from' brings out the sense of what
    accrues from such work.
- source_word: וּבְרַעְיוֹן לִבּוֹ
  chosen: and from the striving of his heart
  alternatives:
  - and from the vexation of his heart
  - and from the pursuit of his heart
  - and from the preoccupation of his heart
  lexicon: HALOT
  rationale: רַעְיוֹן in Ecclesiastes can denote mental striving, pursuit, or preoccupation.
    Given the context of labor and inner exertion, 'striving' best captures the active,
    restless sense without importing a stronger emotional judgment like 'vexation'
    into the main text.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: Hebrew 'heart' often includes thought and will, but retaining 'heart'
    preserves the Hebrew anthropology and the literary texture of Ecclesiastes.
- source_word: שֶׁהוּא עָמֵל
  chosen: with which he toils
  alternatives:
  - in which he labors
  - at which he toils
  lexicon: HALOT
  rationale: The relative clause links the inner striving to the man's ongoing labor.
    'With which he toils' idiomatically conveys that this heart-striving accompanies
    and characterizes his labor.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a key recurring Ecclesiastes expression for life in the earthly
    realm. 'Under the sun' is the standard and transparent rendering.
