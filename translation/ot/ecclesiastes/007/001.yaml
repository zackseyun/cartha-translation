theological_decisions:
- issue: Representative masculine suffix in the final word
  chosen_reading: his birth
  alternative_readings:
  - one's birth
  - birth
  rationale: The Hebrew uses a 3ms suffix. In wisdom literature this often functions
    representatively, but the translation philosophy prefers gender-accurate rendering
    where the source is grammatically masculine. Therefore 'his birth' is kept rather
    than neutralizing the expression.
