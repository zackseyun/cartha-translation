id: ECC.7.1
reference: Ecclesiastes 7:1
source:
  edition: WLC
  text: ט֥וֹב שֵׁ֖ם מִ/שֶּׁ֣מֶן ט֑וֹב וְ/י֣וֹם הַ/מָּ֔וֶת מִ/יּ֖וֹם הִוָּלְדֽ/וֹ׃
translation:
  text: A good name is better than good oil, and the day of death than the day of
    his birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than fine perfume' or 'than precious ointment'; the Hebrew literally
      says 'than good oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - better
  lexicon: HALOT
  rationale: The adjective means 'good,' but in this verbless comparative construction
    the comparison is carried by מִן ('than'). Rendering the first occurrence as 'good'
    preserves the Hebrew wording while allowing the clause as a whole to mean 'is
    better than.'
- source_word: שֵׁם
  chosen: name
  alternatives:
  - reputation
  lexicon: HALOT
  rationale: Hebrew 'name' can denote reputation or renown. 'Name' is retained in
    the main text because it is the direct lexical equivalent and idiomatic in English,
    while still naturally implying reputation in wisdom literature.
- source_word: מִשֶּׁמֶן טוֹב
  chosen: than good oil
  alternatives:
  - than fine perfume
  - than precious ointment
  lexicon: HALOT
  rationale: שֶׁמֶן is literally 'oil,' often perfumed oil in contexts of luxury,
    honor, or festivity. 'Good oil' preserves the Hebrew image more transparently
    than interpretive renderings like 'perfume,' while a footnote preserves the more
    idiomatic sense.
- source_word: וְיוֹם הַמָּוֶת
  chosen: and the day of death
  alternatives:
  - and a day of death
  lexicon: HALOT
  rationale: The definite article on 'death' is naturally rendered in English as 'the
    day of death,' a generic but definite expression. This preserves the proverbial
    force.
- source_word: מִיּוֹם
  chosen: than the day of
  alternatives:
  - better than the day of
  lexicon: HALOT
  rationale: The preposition marks comparison, parallel to the first colon. English
    requires supplying the comparative sense in the clause.
- source_word: הִוָּלְדוֹ
  chosen: his birth
  alternatives:
  - his being born
  - one's birth
  lexicon: HALOT
  rationale: The infinitive construct with 3ms suffix is literally 'his being born.'
    'His birth' is the most natural concise English equivalent. The masculine singular
    suffix is preserved as 'his' in keeping with the gender-accurate policy and the
    proverb's representative singular style.
