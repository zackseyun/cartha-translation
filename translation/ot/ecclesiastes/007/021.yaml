id: ECC.7.21
reference: Ecclesiastes 7:21
source:
  edition: WLC
  text: גַּ֤ם לְ/כָל הַ/דְּבָרִים֙ אֲשֶׁ֣ר יְדַבֵּ֔רוּ אַל תִּתֵּ֖ן לִבֶּ֑/ךָ אֲשֶׁ֥ר
    לֹֽא תִשְׁמַ֥ע אֶֽת עַבְדְּ/ךָ֖ מְקַלְלֶֽ/ךָ־־־־׃
translation:
  text: Also, do not give your heart to every word that people speak, lest you hear
    your servant cursing you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not take to heart everything that is said.' The Hebrew literally
      reads 'do not give your heart to every word that they speak.'
    reason: lexical_alternative
  - marker: b
    text: '''Your servant'' may also be rendered ''your slave''; the Hebrew עֶבֶד
      can refer to either, depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional piece of wisdom connected to the surrounding
    context. 'Also' is natural English and preserves the additive force without overemphasis.
- source_word: לְכָל הַדְּבָרִים אֲשֶׁר יְדַבֵּרוּ
  chosen: to every word that people speak
  alternatives:
  - to all the things that are said
  - to everything they say
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things'; here the following
    verb 'you hear' favors spoken utterances, so 'word'/'words' is best. The 3mp verb
    lacks an explicit subject in Hebrew; English idiom supplies 'people' to avoid
    an awkward bare passive or vague 'they'.
- source_word: אַל תִּתֵּן לִבֶּךָ
  chosen: do not give your heart
  alternatives:
  - do not pay attention
  - do not take to heart
  lexicon: HALOT
  rationale: Literally 'do not give your heart.' This Hebrew idiom means to direct
    inward attention or concern. Retaining 'heart' preserves the anthropological imagery
    of the source while remaining understandable in English.
- source_word: אֲשֶׁר לֹא תִשְׁמַע
  chosen: lest you hear
  alternatives:
  - so that you may not hear
  - otherwise you will hear
  lexicon: HALOT
  rationale: The clause expresses undesirable result/purpose after the prohibition.
    'Lest you hear' is concise and idiomatic, capturing the warning force better than
    a wooden relative-clause rendering.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave. In this wisdom context the bonded
    status is not theologically salient; the point is social subordination within
    a household. Per translation philosophy, 'servant' is preferable here, while 'slave'
    remains a viable lexical alternative.
- source_word: מְקַלְלֶךָ
  chosen: cursing you
  alternatives:
  - reviling you
  - speaking evil of you
  lexicon: HALOT
  rationale: From קלל in the sense 'to curse, treat with contempt.' 'Cursing you'
    is the most direct and natural rendering in context, matching the interpersonal
    offense envisioned.
