theological_decisions:
- issue: Interpretation of הֶבְלִי in Ecclesiastes
  chosen_reading: Rendered as 'my vanity' in continuity with Ecclesiastes' thematic
    keyword, understood as the speaker's fleeting, vapor-like life rather than moral
    vanity.
  alternative_readings:
  - my fleetingness
  - my vapor
  - my futility
  rationale: The verse is not making a theological claim about sinful self-regard.
    It reflects Qoheleth's recurring theme of life's elusive and transient character.
    Retaining 'vanity' preserves intertextual consistency within the book while a
    footnote clarifies the nuance.
  doctrine_reference: Translation philosophy §5
- issue: Force of ב in בְּצִדְקוֹ / בְּרָעָתוֹ
  chosen_reading: Kept as 'in his righteousness' / 'in his evil' without resolving
    whether the sense is circumstance, concession, or instrument.
  alternative_readings:
  - despite his righteousness / despite his evil
  - because of his righteousness / because of his evil
  rationale: The Hebrew preposition is semantically flexible, and the verse's point
    is the observed reversal of expected outcomes. Preserving the ambiguity avoids
    importing a stronger causal theological claim than the text states.
  doctrine_reference: Translation philosophy §3
