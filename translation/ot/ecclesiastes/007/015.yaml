id: ECC.7.15
reference: Ecclesiastes 7:15
source:
  edition: WLC
  text: אֶת הַ/כֹּ֥ל רָאִ֖יתִי בִּ/ימֵ֣י הֶבְלִ֑/י יֵ֤שׁ צַדִּיק֙ אֹבֵ֣ד בְּ/צִדְק֔/וֹ
    וְ/יֵ֣שׁ רָשָׁ֔ע מַאֲרִ֖יךְ בְּ/רָעָתֽ/וֹ־׃
translation:
  text: 'I have seen it all in the days of my vanity: there is a righteous man perishing
    in his righteousness, and there is a wicked man prolonging his life in his evil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the days of my fleetingness' or 'in the days of my vapor.' The Hebrew
      הֶבֶל, a key word in Ecclesiastes, suggests transience, elusiveness, and frustration.
    reason: lexical_alternative
  - marker: b
    text: Or 'perishing despite his righteousness.' The Hebrew can be read more than
      one way; the main text preserves the ambiguity.
    reason: alternative_reading
  - marker: c
    text: Or 'prolonging his life despite his evil' or 'lengthening his days in his
      evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶת הַכֹּל
  chosen: it all
  alternatives:
  - everything
  - all this
  lexicon: HALOT
  rationale: The idiom אֶת הַכֹּל with רָאִיתִי means 'I have seen everything/it all.'
    'It all' is natural English and preserves the comprehensive scope without over-specifying
    the referent.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past or present perfect in English.
    'I have seen' fits Qoheleth's reflective, experiential tone and connects his observation
    to present discourse.
- source_word: בִּימֵי הֶבְלִי
  chosen: in the days of my vanity
  alternatives:
  - in my fleeting days
  - in the days of my vapor
  - in the days of my futility
  lexicon: HALOT
  rationale: הֶבֶל in Ecclesiastes carries the book's thematic sense of vaporous transience
    and frustration. 'Vanity' preserves traditional resonance and the thematic keyword,
    while 'my vanity' here refers to the speaker's fleeting life rather than moral
    pride. A footnote preserves the more literal 'fleetingness' nuance.
- source_word: יֵשׁ ... וְיֵשׁ
  chosen: there is ... and there is
  alternatives:
  - one ... and another
  - there are cases where ... and where ...
  lexicon: HALOT
  rationale: The existential construction presents two observed cases. 'There is ...
    and there is' mirrors the Hebrew structure and keeps the aphoristic balance.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally. Per gender-accurate
    policy, 'man' is retained because the Hebrew is masculine singular and presents
    a representative individual case.
- source_word: אֹבֵד
  chosen: perishing
  alternatives:
  - dying
  - being destroyed
  lexicon: HALOT
  rationale: The participle denotes ongoing ruin or perishing. 'Perishing' preserves
    the broader sense better than 'dying' alone and avoids over-narrowing to immediate
    physical death.
- source_word: בְּצִדְקוֹ
  chosen: in his righteousness
  alternatives:
  - despite his righteousness
  - through his righteousness
  lexicon: HALOT
  rationale: The preposition ב here is best left relatively literal as 'in,' allowing
    the phrase to express the circumstance in which the righteous man perishes. More
    interpretive renderings like 'despite' or 'because of' resolve an ambiguity the
    Hebrew leaves open.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - a wicked person
  - the wicked
  lexicon: HALOT
  rationale: As with צַדִּיק, the masculine singular substantive is best represented
    by 'a wicked man' for a representative case.
- source_word: מַאֲרִיךְ
  chosen: prolonging his life
  alternatives:
  - living long
  - lengthening his days
  - continuing long
  lexicon: HALOT
  rationale: The Hiphil of ארך means to make long/prolong. Since English normally
    requires an object, 'his life' is supplied idiomatically to convey the sense of
    extended lifespan.
- source_word: בְּרָעָתוֹ
  chosen: in his evil
  alternatives:
  - in his wickedness
  - by his evil
  - despite his evil
  lexicon: HALOT
  rationale: '''In his evil'' keeps the same prepositional ambiguity as בְּצִדְקוֹ
    and preserves the parallelism. ''Wickedness'' is possible, but ''evil'' is more
    direct and closer to the lexical core of רָעָה here.'
