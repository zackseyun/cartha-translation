id: ECC.7.13
reference: Ecclesiastes 7:13
source:
  edition: WLC
  text: רְאֵ֖ה אֶת מַעֲשֵׂ֣ה הָ/אֱלֹהִ֑ים כִּ֣י מִ֤י יוּכַל֙ לְ/תַקֵּ֔ן אֵ֖ת אֲשֶׁ֥ר
    עִוְּתֽ/וֹ־׃
translation:
  text: Consider the work of God, for who can straighten what he has made crooked?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make straight what he has bent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: Consider
  alternatives:
  - See
  - Look at
  - Behold
  lexicon: HALOT
  rationale: The imperative of ראה here calls for reflective attention rather than
    mere physical sight. 'Consider' captures the contemplative force in wisdom literature
    while remaining natural English.
- source_word: מַעֲשֵׂה
  chosen: work
  alternatives:
  - deed
  - doing
  lexicon: HALOT
  rationale: The singular construct 'work of God' is idiomatic and broad, referring
    to what God does or has done. 'Work' is the most natural and sufficiently formal
    rendering in this context.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun refers to God generically here, not the divine name YHWH, so
    'God' is the appropriate rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the imperative: one should consider
    God''s work because no one can alter it. ''For'' preserves that explanatory connection
    concisely.'
- source_word: מִי יוּכַל
  chosen: who can
  alternatives:
  - who is able to
  lexicon: HALOT
  rationale: This idiom asks rhetorically about ability. 'Who can' is direct, idiomatic,
    and preserves the rhetorical force.
- source_word: לְתַקֵּן
  chosen: straighten
  alternatives:
  - make straight
  - correct
  - repair
  lexicon: HALOT
  rationale: In context, תקן stands in deliberate contrast to עִוְּתוֹ ('made crooked').
    'Straighten' best preserves the imagery and the antithetical parallelism better
    than the more abstract 'correct' or 'repair'.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - whatsoever
  lexicon: HALOT
  rationale: The relative particle introduces the object of the rhetorical question.
    'What' is idiomatic modern English and preserves the sense.
- source_word: עִוְּתוֹ
  chosen: he has made crooked
  alternatives:
  - he has bent
  - he has twisted
  - he has made perverse
  lexicon: HALOT
  rationale: The verb עוה commonly conveys making something crooked or bent. 'He has
    made crooked' preserves the concrete metaphor and matches the contrast with 'straighten.'
    The 3ms suffix is best taken as referring to God in context, so the clause means
    what God has made crooked, not an impersonal passive idea.
