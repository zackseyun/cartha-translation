theological_decisions:
- issue: Referent and theological force of the 3ms suffix in עִוְּתוֹ
  chosen_reading: 'The subject is God: the verse states that no one can straighten
    what God has made crooked.'
  alternative_readings:
  - what has been made crooked
  - what he has bent
  rationale: The immediate context names 'the work of God,' and the rhetorical question
    grounds reflection on divine sovereignty over circumstances. Rendering the suffix
    with explicit personal reference ('he has made crooked') preserves the Hebrew
    grammar and the theological tension of the text without softening it into an impersonal
    passive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
