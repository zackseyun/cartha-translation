id: ECC.7.3
reference: Ecclesiastes 7:3
source:
  edition: WLC
  text: ט֥וֹב כַּ֖עַס מִ/שְּׂחֹ֑ק כִּֽי בְ/רֹ֥עַ פָּנִ֖ים יִ֥יטַב לֵֽב־׃
translation:
  text: Sorrow is better than laughter, for by a sad face the heart is made better.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Anger is better than laughter,' since Hebrew כַּעַס can also mean 'anger'
      or 'vexation.' Here it is rendered 'sorrow' because the context emphasizes the
      beneficial effect of grief or seriousness rather than anger itself.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for by the badness of face the heart becomes good.' The Hebrew
      idiom refers to a sad or troubled countenance.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: In the comparative construction with מִן ('than'), טוֹב is best rendered
    'better' rather than the more absolute 'good.'
- source_word: כַּעַס
  chosen: sorrow
  alternatives:
  - vexation
  - grief
  - anger
  lexicon: HALOT
  rationale: Although כעס can denote 'anger' or 'vexation,' in this wisdom context
    contrasted with 'laughter' and explained by the beneficial effect of a troubled
    countenance, 'sorrow' best captures the emotional state intended in idiomatic
    modern English without implying sinful anger.
- source_word: מִשְּׂחוֹק
  chosen: than laughter
  alternatives:
  - than mirth
  lexicon: HALOT
  rationale: שְׂחוֹק denotes laughter or mirth. 'Laughter' is the most direct and
    natural English rendering here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the preceding comparison; 'for' preserves the
    concise explanatory force.
- source_word: בְּרֹעַ פָּנִים
  chosen: by a sad face
  alternatives:
  - through a troubled face
  - by sadness of face
  - by a gloomy countenance
  lexicon: HALOT
  rationale: Literally 'by the badness/evil of face.' In Hebrew idiom this refers
    to a sad, troubled, or downcast expression. 'By a sad face' keeps the concrete
    imagery while using clear modern English.
- source_word: יִיטַב
  chosen: is made better
  alternatives:
  - is improved
  - becomes glad
  - is benefited
  lexicon: HALOT
  rationale: From יטב, 'to be good / become good / be well.' Here it expresses beneficial
    effect on the heart. 'Is made better' preserves the comparative logic of the verse
    and avoids the narrower emotional reading 'becomes glad.'
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the inner self
  - the mind
  lexicon: HALOT
  rationale: לֵב in wisdom literature commonly denotes the inner person, including
    thought and disposition. 'Heart' is the standard and sufficiently broad English
    equivalent.
