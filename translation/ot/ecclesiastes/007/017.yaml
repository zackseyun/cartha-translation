theological_decisions:
- issue: Whether the verse should be rendered in a way that appears to endorse moderate
    wickedness
  chosen_reading: The wording preserves the Hebrew's rhetorical tension without implying
    approval of any degree of wickedness.
  alternative_readings:
  - Do not be wicked at all
  - Do not be too wicked
  rationale: The immediate Hebrew says 'do not be wicked excessively,' parallel to
    the prior verse's warning against being 'overly righteous.' Ecclesiastes often
    uses provocative wisdom formulations. To preserve the text's tension rather than
    flatten it, the translation keeps the degree language ('excessively') while avoiding
    a colloquial phrasing that could sound like advice to sin in moderation. This
    aligns with the translation philosophy of preserving tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
