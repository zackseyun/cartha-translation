id: ECC.7.17
reference: Ecclesiastes 7:17
source:
  edition: WLC
  text: אַל תִּרְשַׁ֥ע הַרְבֵּ֖ה וְ/אַל תְּהִ֣י סָכָ֑ל לָ֥/מָּה תָמ֖וּת בְּ/לֹ֥א עִתֶּֽ/ךָ־־׃
translation:
  text: Do not be excessively wicked, and do not be a fool. Why should you die before
    your time?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be too wicked.' The Hebrew includes a degree term, creating a
      deliberate tension with the surrounding context rather than approving any amount
      of wickedness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in not your time.' That is, before your proper or expected time.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְשַׁע
  chosen: be wicked
  alternatives:
  - act wickedly
  - be guilty
  lexicon: HALOT
  rationale: From רשע in the Qal, here functioning as a prohibition against wicked
    conduct or character. 'Be wicked' is concise and natural in English while preserving
    the moral category.
- source_word: הַרְבֵּה
  chosen: excessively
  alternatives:
  - much
  - greatly
  - too much
  lexicon: HALOT
  rationale: Adverbial intensifier modifying the prohibition. 'Excessively' captures
    the sense of doing something to an undue degree in readable modern English.
- source_word: תְּהִי סָכָל
  chosen: be a fool
  alternatives:
  - be foolish
  - be stupid
  lexicon: HALOT
  rationale: The construction with היה + noun is best rendered idiomatically in English
    as 'be a fool.' This preserves the nominal force of סכל better than the adjectival
    'be foolish,' though that remains a viable alternative.
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - why
  - for what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question with admonitory force. 'Why should'
    fits the following imperfect verb naturally in English.
- source_word: תָמוּת
  chosen: you die
  alternatives:
  - you should die
  lexicon: HALOT
  rationale: Straightforward rendering of מות in the Qal imperfect, here in a rhetorical
    question warning of premature death.
- source_word: בְּלֹא עִתֶּךָ
  chosen: before your time
  alternatives:
  - not in your time
  - without your time
  - apart from your appointed time
  lexicon: HALOT
  rationale: An idiomatic English rendering of 'in/at not your time,' conveying premature
    death. 'Before your time' is the clearest natural equivalent. 'Appointed time'
    is possible interpretively, but the Hebrew itself simply says 'your time.'
