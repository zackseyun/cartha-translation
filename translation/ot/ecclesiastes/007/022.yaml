id: ECC.7.22
reference: Ecclesiastes 7:22
source:
  edition: WLC
  text: כִּ֛י גַּם פְּעָמִ֥ים רַבּ֖וֹת יָדַ֣ע לִבֶּ֑/ךָ אֲשֶׁ֥ר גַּם את קִלַּ֥לְתָּ
    אֲחֵרִֽים־־׃
translation:
  text: For your heart also knows that many times you yourself have also cursed others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reviled others' or 'spoken evil of others.' The Hebrew verb can denote
      cursing in speech, but in context it may refer more broadly to insulting or
      speaking against others.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding admonition; 'for' fits the explanatory
    force in context better than the more explicit 'because' while remaining natural
    English.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: The first גַּם adds emphasis to the clause ('your heart also knows');
    rendered 'also' to preserve the additive force without overtranslation.
- source_word: פְּעָמִים רַבּוֹת
  chosen: many times
  alternatives:
  - often
  - on many occasions
  lexicon: HALOT
  rationale: This idiom literally means 'many times/occasions.' 'Many times' preserves
    the Hebrew structure more closely than the smoother adverb 'often'.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - has known
  - is aware
  lexicon: HALOT
  rationale: Though morphologically perfect, the verb here expresses settled personal
    knowledge. Present-tense English communicates the gnomic, experiential sense naturally
    in context.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - you inwardly
  - your mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner self, including thought and
    conscience. Retaining 'heart' preserves the Hebrew anthropology and the verse's
    introspective tone.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - how
  - when
  lexicon: HALOT
  rationale: Introduces the content of what the heart knows. English 'that' is the
    most straightforward complementizer here.
- source_word: גַּם אַתָּה
  chosen: you yourself have also
  alternatives:
  - you too have
  - even you have
  lexicon: HALOT
  rationale: 'The second גַּם with the independent pronoun intensifies the point:
    the hearer too has done this. ''You yourself have also'' preserves both emphasis
    and inclusion.'
- source_word: קִלַּלְתָּ
  chosen: cursed
  alternatives:
  - reviled
  - spoken evil of
  lexicon: HALOT
  rationale: The verb means 'to curse' or 'to treat with contempt by speech.' 'Cursed'
    is the most direct rendering and matches the moral symmetry with being cursed
    by others in the surrounding context. A milder alternative is worth preserving
    in a footnote because English 'curse' can sound stronger than some contextual
    uses.
- source_word: אֲחֵרִים
  chosen: others
  alternatives:
  - other people
  lexicon: HALOT
  rationale: An indefinite plural referring to other persons. 'Others' is concise
    and natural.
