id: ECC.7.5
reference: Ecclesiastes 7:5
source:
  edition: WLC
  text: ט֕וֹב לִ/שְׁמֹ֖עַ גַּעֲרַ֣ת חָכָ֑ם מֵ/אִ֕ישׁ שֹׁמֵ֖עַ שִׁ֥יר כְּסִילִֽים׃
translation:
  text: It is better to hear the rebuke of a wise man than for a man to hear the song
    of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It is better to hear the rebuke of a wise man than to hear the song
      of fools.' The Hebrew second line is literally 'than a man hearing the song
      of fools.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: The adjective functions predicatively in a comparative construction.
    English idiom is best expressed as 'It is better' rather than the more abrupt
    'Better' in this standalone verse.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: The infinitive construct after טוֹב expresses the preferable action.
    'Hear' preserves the Hebrew verbal link with the participle שֹׁמֵעַ later in the
    verse and keeps the comparison tight.
- source_word: גַּעֲרַת
  chosen: the rebuke
  alternatives:
  - the reproof
  - the reprimand
  lexicon: HALOT
  rationale: The noun denotes a verbal correction or scolding. 'Rebuke' is natural
    modern English and preserves the sharpness of the wise person's corrective speech.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - a wise person
  - the wise
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and here contrasts with
    אִישׁ later in the verse. Per the gender-accurate policy, 'wise man' best matches
    the source form and sense.
- source_word: מֵאִישׁ
  chosen: than for a man
  alternatives:
  - than a man
  - than for someone
  lexicon: HALOT
  rationale: 'The preposition מִן marks comparison: ''better ... than ...''. Because
    the second half is a nominal phrase with participle (''a man hearing...''), English
    requires slight smoothing. ''Than for a man'' preserves the comparative force
    without obscuring the syntax.'
- source_word: שֹׁמֵעַ
  chosen: to hear
  alternatives:
  - hearing
  - listening to
  lexicon: HALOT
  rationale: 'Though formally a participle (''hearing''), rendering it with an infinitive
    in English creates a balanced comparison with the first colon: ''to hear ... than
    ... to hear ...''. This is an optimal-equivalence adjustment for readability while
    preserving meaning.'
- source_word: שִׁיר
  chosen: the song
  alternatives:
  - the singing
  - a song
  lexicon: HALOT
  rationale: The singular noun likely functions collectively or generically for the
    fools' entertainment. 'The song' is a straightforward rendering and keeps the
    contrast with 'rebuke' vivid.
- source_word: כְּסִילִים
  chosen: of fools
  alternatives:
  - of foolish men
  - of the foolish
  lexicon: HALOT
  rationale: The plural adjective/substantive denotes morally dull or foolish people.
    'Fools' is the standard concise rendering in wisdom literature and preserves the
    ethical tone.
