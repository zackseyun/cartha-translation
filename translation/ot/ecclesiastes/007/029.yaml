theological_decisions:
- issue: Rendering of הָאָדָם in a generic statement about humanity
  chosen_reading: man
  alternative_readings:
  - humankind
  rationale: The Hebrew singular with article functions generically for humanity.
    Following the project's gender-accurate principle, 'man' is retained as representative
    language rather than flattened automatically to a gender-neutral term. Because
    modern readers may hear 'man' narrowly, the alternative 'humankind' is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
