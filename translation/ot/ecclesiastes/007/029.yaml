id: ECC.7.29
reference: Ecclesiastes 7:29
source:
  edition: WLC
  text: לְ/בַד֙ רְאֵה זֶ֣ה מָצָ֔אתִי אֲשֶׁ֨ר עָשָׂ֧ה הָ/אֱלֹהִ֛ים אֶת הָ/אָדָ֖ם יָשָׁ֑ר
    וְ/הֵ֥מָּה בִקְשׁ֖וּ חִשְּׁבֹנ֥וֹת רַבִּֽים־־׃
translation:
  text: 'Only see this: I have found that God made man upright, but they have sought
    out many schemes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''humankind'': ''God made humankind upright, but they have sought out
      many schemes.'''
    reason: alternative_reading
  - marker: b
    text: Or 'many devices,' 'many plans,' or 'many calculations' for 'many schemes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  chosen: Only
  alternatives:
  - alone
  - only this
  lexicon: HALOT
  rationale: Introduces a limiting or summarizing statement. 'Only' is concise modern
    English and fits the discourse function better than the more wooden 'alone'.
- source_word: רְאֵה
  chosen: see
  alternatives:
  - behold
  - consider
  lexicon: HALOT
  rationale: Imperative of ראה used as an attention-getter. 'See' preserves the directness
    of the Hebrew while avoiding archaic 'behold.'
- source_word: זֶה
  chosen: this
  alternatives:
  - this alone
  - this one thing
  lexicon: HALOT
  rationale: Demonstrative pointing to the conclusion the speaker has reached. Rendered
    simply as 'this' in natural English.
- source_word: מָצָאתִי
  chosen: I have found
  alternatives:
  - I found
  - I discovered
  lexicon: HALOT
  rationale: Perfect verb expressing the speaker's attained conclusion. Present perfect
    in English conveys a finding with present relevance.
- source_word: עָשָׂה ... אֶת־הָאָדָם יָשָׁר
  chosen: made man upright
  alternatives:
  - made humankind upright
  - made the man upright
  - made man straight
  lexicon: HALOT
  rationale: יָשָׁר carries the sense of straight, upright, morally right. 'Upright'
    best captures the ethical nuance. הָאָדָם here is generic humanity; per doctrine,
    'man' is retained as gender-accurate representative language, with 'humankind'
    as a viable contextual alternative.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for the definite האלהים in this context; no contextual
    reason to vary.
- source_word: וְהֵמָּה
  chosen: they
  alternatives:
  - but they themselves
  - while they
  lexicon: HALOT
  rationale: Refers back to humanity collectively. 'They' is the natural English resumptive
    pronoun for the collective singular 'man' used generically in the prior clause.
- source_word: בִּקְשׁוּ
  chosen: have sought out
  alternatives:
  - sought
  - searched for
  - devised
  lexicon: HALOT
  rationale: Basic sense is 'seek.' 'Sought out' reflects intentional pursuit and
    works idiomatically with the following object.
- source_word: חִשְּׁבֹנוֹת רַבִּים
  chosen: many schemes
  alternatives:
  - many devices
  - many calculations
  - many plans
  lexicon: HALOT
  rationale: חִשְּׁבֹנוֹת can denote contrivances, devices, plans, or calculations.
    In context of human departure from original uprightness, 'schemes' best conveys
    inventive but morally suspect contrivance in clear modern English. Traditional
    'devices' is possible but less transparent to contemporary readers.
