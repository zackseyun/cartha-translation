id: ECC.7.7
reference: Ecclesiastes 7:7
source:
  edition: WLC
  text: כִּ֥י הָ/עֹ֖שֶׁק יְהוֹלֵ֣ל חָכָ֑ם וִֽ/יאַבֵּ֥ד אֶת לֵ֖ב מַתָּנָֽה־׃
translation:
  text: For oppression drives a wise man mad, and a bribe destroys the heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gift destroys the heart.' The Hebrew word can mean 'gift' generally,
      but here the context strongly favors the negative sense 'bribe.'
    reason: lexical_alternative
  - marker: b
    text: '''The heart'' in Hebrew commonly refers to the inner person, including
      judgment, understanding, and will.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding thought; 'For' fits
    Qoheleth's argumentative flow better than the more emphatic 'Surely' or the more
    narrowly causal 'Because'.
- source_word: הָעֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - injustice
  lexicon: HALOT
  rationale: The noun denotes oppressive exploitation or extortionate abuse. 'Oppression'
    is broad enough to cover the social and moral force of the term and is the most
    natural English rendering here.
- source_word: יְהוֹלֵל
  chosen: drives ... mad
  alternatives:
  - makes ... foolish
  - makes ... rave
  lexicon: HALOT
  rationale: From הלל in a polel/causative sense, the verb here conveys causing someone
    to act irrationally or become deranged. 'Drives ... mad' captures the idiomatic
    force in clear modern English better than the more wooden 'makes foolish'.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise man
  - a wise person
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally. Per the project's
    gender-accurate policy, 'a wise man' preserves the grammatical form and proverbial
    singular better than the gender-neutral 'a wise person'.
- source_word: וִיאַבֵּד
  chosen: destroys
  alternatives:
  - ruins
  - perverts
  lexicon: HALOT
  rationale: The verb אבד in the causative means to cause to perish, ruin, or destroy.
    'Destroys' preserves the severity and works naturally with 'the heart' as the
    object.
- source_word: אֶת לֵב
  chosen: the heart
  alternatives:
  - the mind
  - good sense
  lexicon: HALOT
  rationale: Hebrew 'heart' often includes inner judgment, will, and understanding.
    The literal rendering should be retained in the main text, while the broader sense
    can be explained by context rather than replacing the metaphor.
- source_word: מַתָּנָה
  chosen: a bribe
  alternatives:
  - a gift
  - a present
  lexicon: HALOT
  rationale: Although the noun can mean 'gift,' in wisdom literature and especially
    in this collocation it commonly carries the negative sense of a corrupting gift,
    i.e., a bribe. This best fits the parallel with oppression and the warning about
    moral corruption.
