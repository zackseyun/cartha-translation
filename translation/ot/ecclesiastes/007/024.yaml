id: ECC.7.24
reference: Ecclesiastes 7:24
source:
  edition: WLC
  text: רָח֖וֹק מַה שֶּׁ/הָיָ֑ה וְ/עָמֹ֥ק עָמֹ֖ק מִ֥י יִמְצָאֶֽ/נּוּ־׀׃
translation:
  text: What has been is far off and very deep—who can find it out?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and deep, deep''—the repetition intensifies the sense: ''very
      deep'' or ''exceedingly deep.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רָחוֹק
  chosen: far off
  alternatives:
  - far away
  - remote
  lexicon: HALOT
  rationale: Adjectival predicate meaning distant/remote. 'Far off' is idiomatic modern
    English and preserves the metaphor of inaccessibility.
- source_word: מַה שֶּׁהָיָה
  chosen: what has been
  alternatives:
  - what is
  - that which exists
  - what came to be
  lexicon: HALOT
  rationale: The relative construction with היה in the qatal naturally points to 'what
    has been' or 'what came to be.' In context, Qoheleth reflects on the reality/order
    of things already existing or having come about. 'What has been' is concise and
    fits the discourse.
- source_word: וְעָמֹק עָמֹק
  chosen: and very deep
  alternatives:
  - and deep, deep
  - and exceedingly deep
  lexicon: HALOT
  rationale: The repeated adjective intensifies the sense. Rather than woodenly reproducing
    the repetition in the main text, 'very deep' communicates the Hebrew intensification
    in readable English; the more formal alternative is preserved in a footnote.
- source_word: מִי
  chosen: who
  alternatives:
  - who is able to
  lexicon: HALOT
  rationale: Standard interrogative pronoun introducing a rhetorical question.
- source_word: יִמְצָאֶנּוּ
  chosen: can find it out
  alternatives:
  - will find it
  - can discover it
  - can find him
  lexicon: HALOT
  rationale: מצא commonly means 'find/discover.' In wisdom literature, English 'find
    out' naturally conveys discovery or comprehension. The 3ms suffix most likely
    refers back to the matter/reality just described, so 'it' is preferable to 'him.'
    'Can' reflects the rhetorical force of the question in English.
