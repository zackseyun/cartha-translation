id: ECC.7.4
reference: Ecclesiastes 7:4
source:
  edition: WLC
  text: לֵ֤ב חֲכָמִים֙ בְּ/בֵ֣ית אֵ֔בֶל וְ/לֵ֥ב כְּסִילִ֖ים בְּ/בֵ֥ית שִׂמְחָֽה׃
translation:
  text: The heart of the wise is in the house of mourning, but the heart of fools
    is in the house of mirth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joy' or 'gladness' for 'mirth.' The Hebrew term can denote rejoicing
      more broadly, but here likely refers to festive merriment in contrast with mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard and sufficiently transparent rendering for
    לֵב, expressing the inner orientation or disposition rather than merely emotion.
    In this proverb-like statement, it refers to where one''s inward attention and
    concern reside.'
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - wise people
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'The wise' preserves the
    concise proverbial style and avoids adding 'men' where the Hebrew does not require
    a male-specific sense.
- source_word: בֵּית
  chosen: house
  alternatives:
  - home
  - place
  lexicon: HALOT
  rationale: '''House'' is the direct lexical equivalent and fits the idiomatic pair
    ''house of mourning'' / ''house of mirth.'' ''Place'' is possible interpretively,
    but ''house'' better preserves the Hebrew imagery.'
- source_word: אֵבֶל
  chosen: mourning
  alternatives:
  - grief
  - sorrow
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially in the context of bereavement or lament.
    'Mourning' matches the immediate context of Ecclesiastes 7, where the house of
    mourning is contrasted with feasting and levity.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' the sense here is contrastive
    in the paired antithesis. 'But' communicates the proverb's contrast in natural
    English without distorting the Hebrew logic.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  - stupid people
  lexicon: HALOT
  rationale: '''Fools'' is the standard wisdom-literature rendering for כְּסִילִים
    and preserves the moral-intellectual category used throughout Proverbs and Ecclesiastes.'
- source_word: שִׂמְחָה
  chosen: mirth
  alternatives:
  - gladness
  - joy
  - feasting
  lexicon: HALOT
  rationale: שִׂמְחָה can mean joy or gladness, but in this contrast 'mirth' best
    captures festive merriment set over against mourning. 'Joy' could sound too positive
    and broad; 'mirth' preserves the sharper contrast with the sober setting of mourning.
