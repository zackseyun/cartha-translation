id: ECC.7.28
reference: Ecclesiastes 7:28
source:
  edition: WLC
  text: אֲשֶׁ֛ר עוֹד בִּקְשָׁ֥ה נַפְשִׁ֖/י וְ/לֹ֣א מָצָ֑אתִי אָדָ֞ם אֶחָ֤ד מֵ/אֶ֨לֶף֙
    מָצָ֔אתִי וְ/אִשָּׁ֥ה בְ/כָל אֵ֖לֶּה לֹ֥א מָצָֽאתִי־־׃
translation:
  text: 'which my soul still sought, but I did not find: one man among a thousand
    I found, but a woman among all these I did not find.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one out of a thousand.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'among all these' likely refers to the whole group under consideration
      in Qoheleth's search; the verse reports his finding, not necessarily a universal
      statement about all women everywhere.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - what
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause continuing the thought from the previous
    verse. 'Which' fits the English syntax of a resumed relative statement ('which
    my soul still sought').
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - further
  lexicon: HALOT
  rationale: Conveys ongoing action from prior searching. 'Still' is natural modern
    English and preserves the sense of continued pursuit.
- source_word: בִּקְשָׁה נַפְשִׁי
  chosen: my soul sought
  alternatives:
  - I sought
  - my inner self sought
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'my soul' as the subject, a common idiom for
    the speaker's inner self. Retaining 'my soul' preserves the Hebrew texture without
    becoming unnatural.
- source_word: וְלֹא מָצָאתִי
  chosen: but I did not find
  alternatives:
  - and I did not find
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English 'but' better
    reflects the adversative force between seeking and not finding.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - human
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is contrasted
    directly with 'woman,' so the gender-specific 'man' is required rather than generic
    'person' or 'humankind'.
- source_word: אֶחָד מֵאֶלֶף
  chosen: one man among a thousand
  alternatives:
  - one out of a thousand
  - one man from a thousand
  lexicon: HALOT
  rationale: This preserves the numerical idiom while reading naturally in English.
    'Among' fits the comparative search context.
- source_word: מָצָאתִי
  chosen: I found
  lexicon: HALOT
  rationale: Straightforward rendering of the perfect verb in this autobiographical
    report.
- source_word: וְאִשָּׁה
  chosen: but a woman
  alternatives:
  - and a woman
  lexicon: HALOT
  rationale: Because the clause contrasts with the previous finding, 'but' brings
    out the contrast more clearly in English, though the Hebrew conjunction is simply
    waw.
- source_word: בְּכָל אֵלֶּה
  chosen: among all these
  alternatives:
  - in all these
  - among all of these
  lexicon: HALOT
  rationale: The phrase most naturally refers to the whole set under consideration.
    'Among all these' is idiomatic and preserves the search-within-a-group sense.
- source_word: לֹא מָצָאתִי
  chosen: I did not find
  alternatives:
  - I found none
  lexicon: HALOT
  rationale: A direct and transparent rendering of the Hebrew negated verb; it avoids
    adding interpretive compression.
