theological_decisions:
- issue: Potentially misogynistic or universalizing reading of the verse
  chosen_reading: Translate the speaker's statement as a limited report of his search
    experience, without softening or universalizing it.
  alternative_readings:
  - Paraphrase to reduce offense by making the statement less direct
  - Expand the text to imply a moral judgment on all women
  rationale: 'The Hebrew reports Qoheleth''s finding in his investigation: he found
    one man among a thousand, but no woman among ''all these.'' The translation should
    neither blunt the plain sense nor intensify it into a doctrinal claim about women
    in general. The wording stays close to the source and lets the literary and contextual
    tensions remain.'
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
