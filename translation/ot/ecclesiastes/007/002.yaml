id: ECC.7.2
reference: Ecclesiastes 7:2
source:
  edition: WLC
  text: ט֞וֹב לָ/לֶ֣כֶת אֶל בֵּֽית אֵ֗בֶל מִ/לֶּ֨כֶת֙ אֶל בֵּ֣ית מִשְׁתֶּ֔ה בַּ/אֲשֶׁ֕ר
    ה֖וּא ס֣וֹף כָּל הָ/אָדָ֑ם וְ/הַ/חַ֖י יִתֵּ֥ן אֶל לִבּֽ/וֹ־־־־־׃
translation:
  text: It is better to go to a house of mourning than to go to a house of feasting,
    because that is the end of every man, and the living should take it to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the end of all humankind.” Hebrew “every man” uses אָדָם generically
      for humanity.
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Comparative evaluative adjective introducing a wisdom judgment. English
    idiom naturally supplies 'it is' for a complete sentence.
- source_word: לָלֶכֶת / מִלֶּכֶת
  chosen: to go ... than to go
  alternatives:
  - to walk ... than to walk
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk'; in this context of attending places/events,
    'go' is the natural English equivalent.
- source_word: בֵּית אֵבֶל
  chosen: a house of mourning
  alternatives:
  - the house of mourning
  - a mourning house
  lexicon: HALOT
  rationale: Construct phrase literally 'house of mourning.' Indefinite 'a house'
    reads naturally in English and preserves the idiom without over-specifying a particular
    location.
- source_word: בֵּית מִשְׁתֶּה
  chosen: a house of feasting
  alternatives:
  - a banquet house
  - a house of drinking
  - a house of celebration
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking. 'Feasting' best
    captures the event-oriented contrast with mourning while remaining readable.
- source_word: בַּאֲשֶׁר
  chosen: because
  alternatives:
  - for
  - inasmuch as
  - in that
  lexicon: HALOT
  rationale: Introduces the reason for the comparison. 'Because' is clear modern English
    and preserves the causal force.
- source_word: סוֹף כָּל הָאָדָם
  chosen: the end of every man
  alternatives:
  - the end of all humankind
  - the end of every person
  lexicon: HALOT
  rationale: אָדָם here has representative generic force. Per doctrine, gender-accurate
    rendering is preferred where the source carries generic 'man' sense. 'Every man'
    preserves the Hebrew form while still meaning humanity generally.
- source_word: וְהַחַי
  chosen: and the living
  alternatives:
  - and whoever is alive
  - and the live one
  lexicon: HALOT
  rationale: Collective singular with article functioning generically. 'The living'
    is idiomatic English and preserves the class reference.
- source_word: יִתֵּן אֶל לִבּוֹ
  chosen: should take it to heart
  alternatives:
  - will lay it to his heart
  - will set it on his heart
  - will take this to heart
  lexicon: HALOT
  rationale: Hebrew idiom literally 'will give to his heart.' In English, 'take it
    to heart' best conveys serious inward reflection. 'Should' expresses the wisdom
    force better than a simple predictive 'will' in contemporary English.
