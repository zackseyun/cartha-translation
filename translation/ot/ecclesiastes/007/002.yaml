theological_decisions:
- issue: Rendering of אָדָם in a generic statement about mortality
  chosen_reading: every man
  alternative_readings:
  - all humankind
  - every person
  rationale: The Hebrew uses הָאָדָם generically for humanity. Following the doctrine's
    gender-accurate principle, 'man' is retained where the source intends representative
    humanity. Because modern readers may hear this as male-exclusive, an inclusive
    alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    *adam*'
