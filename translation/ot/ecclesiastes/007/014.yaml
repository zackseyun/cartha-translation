id: ECC.7.14
reference: Ecclesiastes 7:14
source:
  edition: WLC
  text: בְּ/י֤וֹם טוֹבָה֙ הֱיֵ֣ה בְ/ט֔וֹב וּ/בְ/י֥וֹם רָעָ֖ה רְאֵ֑ה גַּ֣ם אֶת זֶ֤ה
    לְ/עֻמַּת זֶה֙ עָשָׂ֣ה הָֽ/אֱלֹהִ֔ים עַל דִּבְרַ֗ת שֶׁ/לֹּ֨א יִמְצָ֧א הָֽ/אָדָ֛ם
    אַחֲרָ֖י/ו מְאֽוּמָה־־־׃
translation:
  text: 'In a day of prosperity, be in good spirits; and in a day of adversity, consider:
    God has made the one as well as the other, so that man may not find out anything
    that will come after him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'be joyful' or 'enjoy the good.' The Hebrew expression is idiomatic.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man,' used here in a representative sense for humanity.
    reason: lexical_alternative
  - marker: c
    text: Or, 'find out anything after him,' that is, discover what will happen in
      the future.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם טוֹבָה
  chosen: In a day of prosperity
  alternatives:
  - In the day of good
  - When times are good
  lexicon: HALOT
  rationale: יוֹם with an abstract noun can denote a time or circumstance, not merely
    a calendar day. טוֹבָה here refers to favorable circumstances/prosperity rather
    than moral goodness.
- source_word: הֱיֵה בְטוֹב
  chosen: be in good spirits
  alternatives:
  - be joyful
  - enjoy good
  lexicon: HALOT
  rationale: The imperative הֱיֵה plus בְטוֹב is idiomatic. A too-literal 'be in good'
    is unnatural in English; 'be in good spirits' captures the exhortation to respond
    positively in prosperous times without over-paraphrasing.
- source_word: וּבְיוֹם רָעָה
  chosen: and in a day of adversity
  alternatives:
  - and in the day of evil
  - and when trouble comes
  lexicon: HALOT
  rationale: רָעָה in wisdom literature often denotes calamity, misfortune, or adversity
    rather than moral evil. 'Adversity' best fits the contrast with prosperity.
- source_word: רְאֵה
  chosen: consider
  alternatives:
  - see
  - take note
  lexicon: HALOT
  rationale: The imperative of ראה often means more than visual seeing; here it calls
    for reflective perception. 'Consider' conveys the contemplative force in context.
- source_word: גַּם אֶת־זֶה לְעֻמַּת זֶה
  chosen: the one as well as the other
  alternatives:
  - this as well as that
  - this opposite that
  lexicon: HALOT
  rationale: לְעֻמַּת indicates correspondence or one thing set alongside another.
    The phrase refers to the paired realities of prosperity and adversity. 'The one
    as well as the other' is idiomatic English that preserves the balancing sense.
- source_word: עָשָׂה הָאֱלֹהִים
  chosen: God has made
  alternatives:
  - God made
  - God has done
  lexicon: HALOT
  rationale: עָשָׂה commonly means 'make/do.' Here 'made' fits the construction of
    God appointing or bringing about both conditions. Present perfect English suits
    the gnomic observation.
- source_word: עַל דִּבְרַת
  chosen: so that
  alternatives:
  - for the sake that
  - because of
  lexicon: HALOT
  rationale: The expression introduces purpose or result. 'So that' is the clearest
    natural rendering in context.
- source_word: שֶׁלֹּא יִמְצָא הָאָדָם
  chosen: that man may not find out
  alternatives:
  - that a man may not discover
  - that humankind may not find
  lexicon: HALOT
  rationale: יָמְצָא here means discover/find out. הָאָדָם is generic but grammatically
    singular masculine; per doctrine, gender-accurate rendering is retained as 'man'
    where representative humanity is intended.
- source_word: אַחֲרָיו
  chosen: that will come after him
  alternatives:
  - after him
  - afterward
  lexicon: HALOT
  rationale: The prepositional phrase likely refers to what comes after a person,
    especially the future beyond his knowledge. Expanding slightly to 'that will come
    after him' makes the sense explicit in English.
- source_word: מְאוּמָה
  chosen: anything
  alternatives:
  - anything at all
  - something
  lexicon: HALOT
  rationale: In negative contexts מְאוּמָה means 'anything' or 'anything at all.'
    'Anything' is sufficient and natural.
