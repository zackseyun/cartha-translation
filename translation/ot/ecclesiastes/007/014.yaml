theological_decisions:
- issue: Divine agency in prosperity and adversity
  chosen_reading: God has made both prosperity and adversity
  alternative_readings:
  - God has made one corresponding to the other without specifying direct causation
    of adversity in a stronger metaphysical sense
  rationale: The Hebrew explicitly attributes both contrasted conditions to God's
    action. The translation preserves that tension without softening the statement
    or importing a broader theodicy beyond the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - a person
  rationale: The noun is grammatically masculine singular and functions generically.
    Per doctrine, gender-accurate language is preferred over flattening to gender-neutral
    wording, while the generic sense can be clarified in a footnote.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם.
