id: ECC.7.26
reference: Ecclesiastes 7:26
source:
  edition: WLC
  text: וּ/מוֹצֶ֨א אֲנִ֜י מַ֣ר מִ/מָּ֗וֶת אֶת הָֽ/אִשָּׁה֙ אֲשֶׁר הִ֨יא מְצוֹדִ֧ים
    וַ/חֲרָמִ֛ים לִבָּ֖/הּ אֲסוּרִ֣ים יָדֶ֑י/הָ ט֞וֹב לִ/פְנֵ֤י הָ/אֱלֹהִים֙ יִמָּלֵ֣ט
    מִמֶּ֔/נָּה וְ/חוֹטֵ֖א יִלָּ֥כֶד בָּֽ/הּ־־׃
translation:
  text: And I find more bitter than death the woman whose heart is traps and nets,
    and whose hands are chains. The one who is good before God will escape from her,
    but the sinner will be caught by her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whose heart is snares and nets.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'The one who pleases God will escape from her.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמוֹצֶא אֲנִי
  chosen: And I find
  alternatives:
  - And I have found
  - And I am finding
  lexicon: HALOT
  rationale: Qoheleth's participial construction with explicit subject can function
    as a present-like statement in discourse. 'And I find' gives natural English while
    preserving the speaker's personal observation.
- source_word: מַר מִמָּוֶת
  chosen: more bitter than death
  alternatives:
  - bitterer than death
  lexicon: HALOT
  rationale: Comparative sense is conveyed by adjective + מן. 'More bitter than death'
    is idiomatic modern English and preserves the stark comparison.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - a woman
  - woman
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The woman' best reflects the syntax,
    even if the phrase is character-typological rather than identifying a specific
    individual.
- source_word: אֲשֶׁר הִיא
  chosen: whose
  alternatives:
  - who is she that
  - who
  lexicon: HALOT
  rationale: English possessive relative clauses naturally render the following body-part
    constructions ('whose heart... whose hands...'). This is a syntactic smoothing,
    not a semantic expansion.
- source_word: מְצוֹדִים וַחֲרָמִים
  chosen: traps and nets
  alternatives:
  - snares and nets
  - hunting nets and dragnets
  lexicon: HALOT
  rationale: Both nouns belong to capture imagery. 'Traps and nets' is clear, vivid,
    and avoids overly technical distinctions while preserving the metaphor of entanglement.
- source_word: לִבָּהּ
  chosen: whose heart is traps and nets
  alternatives:
  - her heart is traps and nets
  - whose heart is snares and nets
  lexicon: HALOT
  rationale: The Hebrew predicates the capture imagery of her heart. Retaining 'heart'
    preserves the anthropological center of intention/desire rather than paraphrasing
    to 'mind' or 'intentions.'
- source_word: אֲסוּרִים יָדֶיהָ
  chosen: whose hands are chains
  alternatives:
  - her hands are bonds
  - her hands are fetters
  lexicon: HALOT
  rationale: אֲסוּרִים denotes bonds or things bound. 'Chains' is concrete and readable,
    fitting the parallel with traps and nets.
- source_word: טוֹב לִפְנֵי הָאֱלֹהִים
  chosen: The one who is good before God
  alternatives:
  - He who is good before God
  - Whoever pleases God
  lexicon: HALOT
  rationale: Literally 'good before God.' This likely denotes one who stands favorably
    before God. 'The one who is good before God' keeps the lexical value of טוב and
    avoids importing the more interpretive 'pleases God' into the main text.
- source_word: יִמָּלֵט מִמֶּנָּה
  chosen: will escape from her
  alternatives:
  - will be delivered from her
  - will get away from her
  lexicon: HALOT
  rationale: Nifal of מלט commonly means escape/deliver oneself. 'Will escape from
    her' is direct and fits the entrapment imagery.
- source_word: וְחוֹטֵא
  chosen: but the sinner
  alternatives:
  - but he who sins
  - but a sinner
  lexicon: HALOT
  rationale: The participle is substantival. 'The sinner' is concise and preserves
    the moral contrast with the previous clause.
- source_word: יִלָּכֶד בָּהּ
  chosen: will be caught by her
  alternatives:
  - will be captured by her
  - will be caught in her
  lexicon: HALOT
  rationale: The passive of לכד means to be captured/caught. With בָּהּ, English idiom
    favors 'by her' in this context, since the woman is the agentive source of the
    entrapment imagery.
