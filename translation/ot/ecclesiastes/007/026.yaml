theological_decisions:
- issue: Whether to generalize or soften the verse's portrayal of 'the woman' to avoid
    a blanket statement about women
  chosen_reading: Retain the singular 'the woman' as stated in the Hebrew, without
    broadening to 'women' or paraphrasing away the imagery
  alternative_readings:
  - a woman
  - the seductive woman
  - folly personified
  rationale: The Hebrew text speaks of 'the woman' in the singular with vivid metaphorical
    description. The translation should preserve the text's wording and tension rather
    than resolve whether this is a specific immoral woman, a type, or an instance
    of personified folly. More interpretive options are better left to notes or commentary,
    not the main text.
  doctrine_reference: Translation philosophy §3, §6
- issue: How to render טוֹב לִפְנֵי הָאֱלֹהִים
  chosen_reading: The one who is good before God
  alternative_readings:
  - He who pleases God
  - The one who is pleasing before God
  rationale: The phrase can idiomatically mean one who pleases God, but the more lexical
    rendering preserves the Hebrew wording and avoids adding a stronger interpretive
    gloss in the main text. The idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
