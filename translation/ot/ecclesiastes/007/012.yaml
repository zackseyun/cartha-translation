id: ECC.7.12
reference: Ecclesiastes 7:12
source:
  edition: WLC
  text: כִּ֛י בְּ/צֵ֥ל הַֽ/חָכְמָ֖ה בְּ/צֵ֣ל הַ/כָּ֑סֶף וְ/יִתְר֣וֹן דַּ֔עַת הַֽ/חָכְמָ֖ה
    תְּחַיֶּ֥ה בְעָלֶֽי/הָ׃
translation:
  text: For wisdom is a shelter just as money is a shelter, but the advantage of knowledge
    is that wisdom preserves the life of its possessors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'For in the shadow of wisdom, in the shadow of money.' The Hebrew
      uses 'shadow' as an image of protection or shelter.
    reason: lexical_alternative
  - marker: b
    text: Or 'the profit of knowledge is that wisdom gives life to its possessors.'
      The verb can also be rendered 'gives life to' or 'keeps alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding statement. 'For' fits the
    discourse flow in English better than the more ambiguous 'because' here.
- source_word: בְּצֵל
  chosen: is a shelter
  alternatives:
  - is in the shadow of
  - is a protection
  - is a shade
  lexicon: HALOT
  rationale: Literally 'in the shadow of.' In this proverbial context the idiom denotes
    protective cover or refuge. 'Shelter' preserves the metaphorical sense in natural
    English without flattening it to an abstract term like 'protection.' The supplied
    verb 'is' is required in English.
- source_word: הַחָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of חָכְמָה in Ecclesiastes; the context concerns practical
    and existential wisdom.
- source_word: בְּצֵל הַכָּסֶף
  chosen: money is a shelter
  alternatives:
  - silver is a shelter
  - money is a protection
  lexicon: HALOT
  rationale: כֶּסֶף can mean 'silver' or, by extension, 'money/wealth.' In this comparison
    with wisdom's practical benefit, 'money' best communicates the economic sense
    to modern readers.
- source_word: וְיִתְרוֹן
  chosen: but the advantage
  alternatives:
  - and the profit
  - and the benefit
  - and the superiority
  lexicon: HALOT
  rationale: 'יִתְרוֹן is a key Ecclesiastes term for gain, profit, or advantage.
    Here it introduces a contrastive qualification: wisdom and money both provide
    shelter, yet wisdom has an added benefit. Rendering with ''but the advantage''
    brings out that contrast in idiomatic English.'
- source_word: דַּעַת
  chosen: of knowledge
  alternatives:
  - of understanding
  - of knowing
  lexicon: HALOT
  rationale: Construct relation with what follows is difficult, but 'the advantage
    of knowledge' is a natural rendering that preserves the noun's cognitive sense
    without overinterpreting.
- source_word: הַחָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Repeated term retained consistently. The clause explains the specific
    advantage associated with wisdom.
- source_word: תְּחַיֶּה
  chosen: preserves the life of
  alternatives:
  - gives life to
  - keeps alive
  - revives
  lexicon: HALOT
  rationale: The Piel of חיה can mean 'keep alive, preserve alive, give life.' In
    context, the point is not necessarily imparting life ex nihilo but sustaining
    or preserving life. 'Preserves the life of' fits the wisdom literature context
    and the comparison with protective shelter.
- source_word: בְעָלֶיהָ
  chosen: its possessors
  alternatives:
  - its owners
  - those who have it
  - its masters
  lexicon: HALOT
  rationale: Literally 'its owners/possessors,' with the feminine suffix referring
    back to wisdom. 'Its possessors' is concise and preserves the metaphor of having
    wisdom as something one holds.
