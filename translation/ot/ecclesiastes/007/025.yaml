theological_decisions:
- issue: Anthropological language of 'heart'
  chosen_reading: Retain 'heart' in the main text
  alternative_readings:
  - mind
  rationale: The verse uses Hebrew 'heart' for the inner faculty of thought and resolve.
    Retaining 'heart' preserves the source culture's anthropology rather than flattening
    it into a modern psychological term.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relationship between wickedness/folly and foolishness/madness
  chosen_reading: 'Render as appositional equations: ''wickedness as folly and foolishness
    as madness'''
  alternative_readings:
  - '''that wickedness is folly and foolishness is madness'''
  - '''the wickedness of folly and the foolishness of madness'''
  rationale: The infinitive 'to know' governs two compressed nominal expressions.
    The chosen rendering makes explicit the likely evaluative sense without over-paraphrasing,
    preserving the poetic terseness while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §3
