id: ECC.7.20
reference: Ecclesiastes 7:20
source:
  edition: WLC
  text: כִּ֣י אָדָ֔ם אֵ֥ין צַדִּ֖יק בָּ/אָ֑רֶץ אֲשֶׁ֥ר יַעֲשֶׂה טּ֖וֹב וְ/לֹ֥א יֶחֱטָֽא־׃
translation:
  text: For there is no righteous man on the earth who does good and does not sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'person'; Hebrew 'man' (אָדָם) is singular and representative here, expressing
      a universal statement about humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement,
    so 'For' best preserves the logical connection in natural English.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  lexicon: HALOT
  rationale: The noun is singular and generic. Per doctrine, gender-accurate rendering
    is preferred where the Hebrew uses representative masculine. 'Man' preserves the
    singular proverbial force better than 'person' or the collective 'humankind'.
- source_word: אֵין
  chosen: there is no
  alternatives:
  - there is not
  - no one is
  lexicon: HALOT
  rationale: Existential אֵין is most naturally rendered 'there is no' in this clause.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: HALOT
  rationale: '''Righteous'' is the standard and most theologically transparent rendering
    for צַדִּיק, especially in wisdom literature where moral rectitude before God
    is in view.'
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  - on earth
  lexicon: HALOT
  rationale: In Ecclesiastes this phrase commonly has a broad human-world sense rather
    than a specific territorial sense, so 'on the earth' is preferable to 'in the
    land.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - such that
  lexicon: HALOT
  rationale: The relative pronoun refers back to 'man'; 'who' is idiomatic English
    for a personal antecedent.
- source_word: יַעֲשֶׂה טּוֹב
  chosen: does good
  alternatives:
  - does what is good
  - acts well
  lexicon: HALOT
  rationale: The verbal phrase is concise and proverbial. 'Does good' preserves the
    Hebrew terseness and moral sense.
- source_word: וְלֹא יֶחֱטָא
  chosen: and does not sin
  alternatives:
  - without sinning
  - and never sins
  lexicon: HALOT
  rationale: The coordinate construction is best kept explicit. 'And does not sin'
    mirrors the Hebrew structure and avoids overinterpreting the aspect as 'never
    sins,' though that is the practical sense.
