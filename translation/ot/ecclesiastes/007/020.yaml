theological_decisions:
- issue: Generic masculine in proverbial anthropology
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: The verse states a universal truth using singular masculine אָדָם. Following
    the doctrine's gender-accurate principle, the translation keeps 'man' rather than
    neutralizing the form, while the sense remains representative of humanity generally.
