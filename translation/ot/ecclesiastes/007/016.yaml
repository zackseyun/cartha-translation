id: ECC.7.16
reference: Ecclesiastes 7:16
source:
  edition: WLC
  text: אַל תְּהִ֤י צַדִּיק֙ הַרְבֵּ֔ה וְ/אַל תִּתְחַכַּ֖ם יוֹתֵ֑ר לָ֖/מָּה תִּשּׁוֹמֵֽם־־׃
translation:
  text: Do not be overly righteous, and do not make yourself too wise. Why should
    you ruin yourself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be too righteous, and do not make yourself excessively wise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Why should you destroy yourself?' The Hebrew verb can also carry the
      sense of becoming desolated or appalled.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - should not
  lexicon: HALOT
  rationale: Negative particle used for prohibition; simple imperative-style English
    best matches the warning tone.
- source_word: תְּהִי
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: 'Qal imperfect of היה after אַל functions as a prohibition: ''do not
    be.'''
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - in the right
  lexicon: HALOT
  rationale: '''Righteous'' is the most direct rendering and preserves the moral/religious
    sense of the Hebrew adjective.'
- source_word: הַרְבֵּה
  chosen: overly
  alternatives:
  - much
  - excessively
  - too much
  lexicon: HALOT
  rationale: Adverbial intensifier modifying 'righteous'; 'overly' communicates excess
    in natural English without implying that righteousness itself is bad.
- source_word: תִּתְחַכַּם
  chosen: make yourself wise
  alternatives:
  - act wisely
  - become wise
  - show yourself wise
  lexicon: HALOT
  rationale: Hitpael of חכם is reflexive/iterative; 'make yourself wise' captures
    the self-regarding nuance better than a simple 'be wise.'
- source_word: יוֹתֵר
  chosen: too
  alternatives:
  - more
  - excessively
  lexicon: HALOT
  rationale: Used adverbially to mark excess; 'too' works idiomatically with 'make
    yourself wise.'
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - why
  - for what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question with an admonitory force; 'Why should'
    fits the English idiom.
- source_word: תִּשּׁוֹמֵם
  chosen: ruin yourself
  alternatives:
  - destroy yourself
  - be appalled
  - be desolated
  lexicon: HALOT
  rationale: From שמם, which can denote being desolated, devastated, or appalled.
    In this context of self-destructive excess, 'ruin yourself' communicates the likely
    sense clearly in modern English while preserving the reflexive outcome implied
    by the context.
