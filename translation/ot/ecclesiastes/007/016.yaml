theological_decisions:
- issue: Interpretation of the warning against being 'righteous' and 'wise' in excess
  chosen_reading: The verse warns against self-destructive excess or self-righteous
    pretension, not against genuine righteousness or wisdom themselves.
  alternative_readings:
  - A cynical rejection of righteousness and wisdom altogether
  - A warning only against public displays of piety
  rationale: The adverbial terms הַרְבֵּה and יוֹתֵר mark excess, and the parallel
    with the following verse (warning against excessive wickedness) suggests Qoheleth
    critiques extremes rather than virtue itself. The translation therefore preserves
    the warning's tension without implying that righteousness is inherently wrong.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
