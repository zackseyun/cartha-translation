id: ECC.7.11
reference: Ecclesiastes 7:11
source:
  edition: WLC
  text: טוֹבָ֥ה חָכְמָ֖ה עִֽם נַחֲלָ֑ה וְ/יֹתֵ֖ר לְ/רֹאֵ֥י הַ/שָּֽׁמֶשׁ־׃
translation:
  text: Wisdom is good with an inheritance, and an advantage to those who see the
    sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wisdom is as good as an inheritance'; the Hebrew construction may compare
      wisdom with inheritance or commend wisdom together with inheritance.
    reason: lexical_alternative
  - marker: b
    text: '''Those who see the sun'' is an idiom for the living, those who are alive
      in this world.'
    reason: cultural_note
lexical_decisions:
- source_word: טוֹבָה
  chosen: is good
  alternatives:
  - is better
  - is pleasant
  lexicon: HALOT
  rationale: Predicate adjective meaning 'good.' The clause is verbless in Hebrew,
    so 'is' is supplied naturally in English. 'Better' would normally suggest a comparative
    not explicit here.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Qoheleth; it denotes practical wisdom
    rather than merely abstract knowledge.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  - together with
  lexicon: HALOT
  rationale: 'The preposition most naturally expresses accompaniment/association here:
    wisdom in conjunction with inheritance.'
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - property
  - heritage
  - estate
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance or inherited possession. 'Inheritance'
    preserves the lexical sense better than the broader 'wealth,' while still fitting
    the wisdom context.
- source_word: וְיֹתֵר
  chosen: and an advantage
  alternatives:
  - and more advantageous
  - and profit
  - and better still
  lexicon: HALOT
  rationale: 'יֹתֵר can function substantivally/adverbially with the sense of surplus,
    advantage, or profit. Here a nominal rendering fits the terse Hebrew and the following
    לְ phrase: wisdom with inheritance is ''an advantage'' for a certain group.'
- source_word: לְרֹאֵי
  chosen: to those who see
  alternatives:
  - for those who see
  - for the living who see
  lexicon: HALOT
  rationale: The ל preposition here is rendered idiomatically as 'to' in apposition
    to 'advantage,' though 'for' is also possible. The participle רֹאֵי is best kept
    as 'those who see.'
- source_word: הַשָּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Literal rendering. In Ecclesiastes, 'seeing the sun' is an idiom for
    being alive in the world under the sun; the literal wording is preserved to retain
    the book's imagery.
