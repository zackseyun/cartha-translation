id: ECC.7.10
reference: Ecclesiastes 7:10
source:
  edition: WLC
  text: אַל תֹּאמַר֙ מֶ֣ה הָיָ֔ה שֶׁ֤/הַ/יָּמִים֙ הָ/רִ֣אשֹׁנִ֔ים הָי֥וּ טוֹבִ֖ים
    מֵ/אֵ֑לֶּה כִּ֛י לֹ֥א מֵ/חָכְמָ֖ה שָׁאַ֥לְתָּ עַל זֶֽה־־׃
translation:
  text: Do not say, “Why were the former days better than these?” For it is not from
    wisdom that you ask this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “For it is not from wisdom that you have asked about this.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “What was it that the former days were better than these?” an idiom
      meaning “Why were the former days better than these?”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition addressed to the second masculine
    singular. 'Do not' is the natural English imperative equivalent without adding
    emphasis not explicit in the Hebrew.
- source_word: תֹּאמַר
  chosen: say
  alternatives:
  - declare
  - ask
  lexicon: HALOT
  rationale: אָמַר is the common verb 'to say.' Here it introduces the quoted question.
    'Say' is more direct and idiomatic than 'declare.'
- source_word: מֶה הָיָה
  chosen: Why were
  alternatives:
  - What was it that made
  - How is it that were
  lexicon: HALOT
  rationale: The idiom מֶה הָיָה followed by a clause functions as an inquiry into
    cause or reason, effectively 'why was/why were.' Rendering it woodenly as 'what
    was' would sound unnatural and obscure the sense in English.
- source_word: הַיָּמִים הָרִאשֹׁנִים
  chosen: the former days
  alternatives:
  - the earlier days
  - the days of old
  lexicon: HALOT
  rationale: The phrase refers to previous times, likely earlier periods in life or
    history. 'Former days' is concise, natural, and preserves the comparative temporal
    sense without sounding archaic.
- source_word: הָיוּ טוֹבִים מֵאֵלֶּה
  chosen: better than these
  alternatives:
  - more pleasant than these
  - better than the present days
  lexicon: HALOT
  rationale: 'The comparative construction is straightforward: ''were good/better
    than these.'' English idiom prefers ''better than these.'' Supplying ''days''
    after ''these'' is possible but unnecessary because the referent is clear from
    context.'
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the prohibition. 'For' fits the explanatory
    relation and preserves the proverbial tone.
- source_word: לֹא מֵחָכְמָה
  chosen: it is not from wisdom
  alternatives:
  - it is not out of wisdom
  - not wisely
  lexicon: HALOT
  rationale: The preposition מִן with חָכְמָה indicates source or basis. 'It is not
    from wisdom' preserves that nuance better than the adverbial 'not wisely,' which
    shifts the construction.
- source_word: שָׁאַלְתָּ
  chosen: you ask
  alternatives:
  - you have asked
  - you inquire
  lexicon: HALOT
  rationale: 'Though morphologically perfect, the verb in this gnomic/proverbial context
    is well rendered as a present in English: ''you ask.'' This communicates the general
    principle rather than a single past event.'
- source_word: עַל זֶה
  chosen: this
  alternatives:
  - about this
  - concerning this
  lexicon: HALOT
  rationale: The prepositional phrase means 'about this/concerning this.' In idiomatic
    English after 'ask,' the object can be rendered simply as 'this' without loss
    of meaning; the fuller alternative is preserved in a footnote.
