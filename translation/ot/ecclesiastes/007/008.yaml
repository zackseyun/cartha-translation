id: ECC.7.8
reference: Ecclesiastes 7:8
source:
  edition: WLC
  text: ט֛וֹב אַחֲרִ֥ית דָּבָ֖ר מֵֽ/רֵאשִׁית֑/וֹ ט֥וֹב אֶֽרֶךְ ר֖וּחַ מִ/גְּבַהּ רֽוּחַ־־׃
translation:
  text: The end of a matter is better than its beginning; patience is better than
    a proud spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'long of spirit,' an idiom for patience or forbearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִית
  chosen: the end
  alternatives:
  - outcome
  - latter end
  lexicon: HALOT
  rationale: אַחֲרִית commonly denotes the end, latter part, or outcome of something.
    'The end' is natural English and fits the proverb's contrast with 'its beginning.'
    'Outcome' is possible, but 'the end' preserves the temporal contrast more directly.
- source_word: דָּבָר
  chosen: a matter
  alternatives:
  - thing
  - word
  - affair
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'thing,' and 'matter.'
    In wisdom literature, 'matter' idiomatically conveys an issue, affair, or course
    of events, which suits the comparison between beginning and end.
- source_word: מֵרֵאשִׁיתוֹ
  chosen: than its beginning
  alternatives:
  - than its start
  - from its beginning
  lexicon: HALOT
  rationale: The prefixed מ marks comparison here ('better than'), not simple separation.
    'Its beginning' closely reflects רֵאשִׁית with the 3ms suffix referring back to
    'matter.'
- source_word: אֶרֶךְ רוּחַ
  chosen: patience
  alternatives:
  - long of spirit
  - patient in spirit
  - forbearance
  lexicon: HALOT
  rationale: The idiom literally means 'long of spirit' and refers to patience or
    slowness to anger. 'Patience' gives clear modern English while preserving the
    proverb's ethical force. Because 'spirit' is explicit in Hebrew, an alternative
    is preserved in a footnote.
- source_word: מִגְּבַהּ רוּחַ
  chosen: than a proud spirit
  alternatives:
  - than haughtiness
  - than a high spirit
  - than arrogance
  lexicon: HALOT
  rationale: גְּבַהּ with רוּחַ expresses loftiness or haughtiness of spirit. 'A proud
    spirit' is idiomatic English and preserves the internal disposition indicated
    by רוּחַ. 'High spirit' could be misunderstood positively in English.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: 'In both clauses טוֹב functions comparatively in context: one thing is
    better than another. English requires ''better'' rather than the more wooden ''good
    ... than''.'
