id: ECC.7.9
reference: Ecclesiastes 7:9
source:
  edition: WLC
  text: אַל תְּבַהֵ֥ל בְּ/רֽוּחֲ/ךָ֖ לִ/כְע֑וֹס כִּ֣י כַ֔עַס בְּ/חֵ֥יק כְּסִילִ֖ים
    יָנֽוּחַ־׃
translation:
  text: Do not be quick in your spirit to become angry, for anger rests in the bosom
    of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the lap of fools.' The Hebrew image is of anger settling down close
      to a fool's inner life.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַהֵל
  chosen: be quick
  alternatives:
  - be hasty
  - be hurried
  - be alarmed
  lexicon: HALOT
  rationale: The piel/imperfect with אַל gives a prohibition against impulsive haste.
    In this context, the following infinitive 'to become angry' shows the sense is
    not fear or alarm but being too ready or hasty. 'Be quick' is idiomatic modern
    English and preserves the warning against rapid temper.
- source_word: בְּרוּחֲךָ
  chosen: in your spirit
  alternatives:
  - in your mind
  - in your temper
  - within yourself
  lexicon: HALOT
  rationale: רוּחַ here refers to the inner disposition or animating inner self, not
    wind or breath. 'In your spirit' keeps the Hebrew metaphor and preserves the anthropological
    nuance better than flattening it to 'temper,' though the context clearly concerns
    disposition.
- source_word: לִכְעוֹס
  chosen: to become angry
  alternatives:
  - to be angry
  - to vex yourself
  lexicon: HALOT
  rationale: The infinitive expresses entering into a state of anger. 'To become angry'
    captures the inceptive force more clearly than the stative 'to be angry.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition. 'For' is concise and natural
    in proverbial instruction.
- source_word: כַעַס
  chosen: anger
  alternatives:
  - vexation
  - resentment
  - provocation
  lexicon: HALOT
  rationale: The noun denotes anger or vexation. 'Anger' is the clearest and most
    direct rendering in this context, matching the verbal idea in the first colon.
- source_word: בְּחֵיק
  chosen: in the bosom
  alternatives:
  - in the lap
  - in the breast
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap, a figurative place of holding
    or cherishing something close. 'Bosom' preserves the metaphor of anger lodging
    intimately within fools. Though slightly elevated, it remains understandable and
    more precise than the flatter 'heart.'
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: A standard wisdom term for morally and intellectually dull persons. 'Fools'
    is the conventional and accurate rendering in Proverbs/Ecclesiastes contexts.
- source_word: יָנוּחַ
  chosen: rests
  alternatives:
  - settles
  - lodges
  - remains
  lexicon: HALOT
  rationale: The verb נוח means to rest, settle down, or remain. 'Rests' preserves
    the image of anger coming to repose in fools, implying it is at home there rather
    than merely passing through.
