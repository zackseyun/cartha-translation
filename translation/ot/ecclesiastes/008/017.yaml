theological_decisions:
- issue: Rendering of הָאָדָם in a generic statement about human limitation
  chosen_reading: man
  alternative_readings:
  - humankind
  - a person
  rationale: The Hebrew singular generic is preserved with 'man' in keeping with the
    project's gender-accurate policy. The verse speaks of humanity's inability to
    comprehend God's work, not of males specifically, but the representative singular
    is best matched by 'man.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
