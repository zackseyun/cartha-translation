theological_decisions:
- issue: Sense of רוּחַ in the opening clause
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: The immediate repetition of the noun with the verb 'restrain' and the
    sequence of uncontrollable realities (wind, death, war) favor the natural phenomenon
    'wind.' The alternative 'spirit' is preserved in a footnote because the Hebrew
    lexeme is genuinely multivalent and some interpreters take it as the human spirit
    or breath of life.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
