id: ECC.8.8
reference: Ecclesiastes 8:8
source:
  edition: WLC
  text: אֵ֣ין אָדָ֞ם שַׁלִּ֤יט בָּ/ר֨וּחַ֙ לִ/כְל֣וֹא אֶת הָ/ר֔וּחַ וְ/אֵ֤ין שִׁלְטוֹן֙
    בְּ/י֣וֹם הַ/מָּ֔וֶת וְ/אֵ֥ין מִשְׁלַ֖חַת בַּ/מִּלְחָמָ֑ה וְ/לֹֽא יְמַלֵּ֥ט רֶ֖שַׁע
    אֶת בְּעָלָֽי/ו־־־׃
translation:
  text: No man has power over the wind to restrain the wind, and there is no authority
    over the day of death, and there is no discharge in war, and wickedness will not
    deliver its master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''spirit'': ''No man has power over the spirit to restrain the spirit.''
      Hebrew רוּחַ can mean wind, spirit, or breath.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  lexicon: HALOT
  rationale: Rendered 'man' because the Hebrew singular generic refers representatively
    to a human being in general, and the doctrine calls for gender-accurate rendering
    where the source uses masculine generic force.
- source_word: שַׁלִּיט
  chosen: has power
  alternatives:
  - is master of
  - has authority over
  lexicon: HALOT
  rationale: The adjective denotes having dominion or power. 'Has power' is idiomatic
    in English and fits the existential construction 'there is no man who...' without
    sounding wooden.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In this context the paired phrase 'over the wind to restrain the wind'
    and the surrounding statements about death and war favor the concrete sense 'wind'
    as an image of what humans cannot control. The alternative 'spirit' is possible
    and worth preserving in a footnote because the Hebrew term can bear both senses.
- source_word: לִכְלוֹא
  chosen: to restrain
  alternatives:
  - to hold back
  - to imprison
  - to shut in
  lexicon: HALOT
  rationale: The verb means to confine or hold back. 'Restrain' communicates the sense
    naturally with 'wind' in English.
- source_word: שִׁלְטוֹן
  chosen: authority
  alternatives:
  - power
  - dominion
  lexicon: HALOT
  rationale: This noun is cognate with שַׁלִּיט and denotes ruling power or authority.
    'Authority' avoids repetition with the earlier 'power' while preserving the semantic
    field.
- source_word: בְּיוֹם הַמָּוֶת
  chosen: over the day of death
  alternatives:
  - on the day of death
  - against the day of death
  lexicon: HALOT
  rationale: The preposition with 'authority' is best represented as 'over.' The phrase
    refers to the time of one's death as something beyond human control.
- source_word: מִשְׁלַחַת
  chosen: discharge
  alternatives:
  - release
  - exemption
  lexicon: HALOT
  rationale: In military context the noun refers to being sent away or released from
    service. 'Discharge' is concise and idiomatic in English for military release.
- source_word: בַּמִּלְחָמָה
  chosen: in war
  alternatives:
  - in battle
  - during war
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'in war' is
    broad enough to match the Hebrew.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: 'The abstract noun is best kept abstract here: wickedness itself cannot
    rescue. This preserves the proverbial force better than personalizing it as ''the
    wicked.'''
- source_word: יְמַלֵּט
  chosen: will not deliver
  alternatives:
  - will not save
  - will not rescue
  lexicon: HALOT
  rationale: The verb means to bring to safety or rescue. 'Deliver' fits wisdom-style
    English and avoids overloading 'save' with theological associations not explicit
    here.
- source_word: בְּעָלָיו
  chosen: its master
  alternatives:
  - its owner
  - those who practice it
  lexicon: HALOT
  rationale: The noun means owner/master/lord. Because the antecedent is the abstract
    noun 'wickedness,' English idiom allows the personified expression 'its master,'
    meaning the one possessed by or devoted to wickedness.
