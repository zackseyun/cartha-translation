theological_decisions:
- issue: Interpretation of the difficult clause about the wicked and the holy place
  chosen_reading: The verse describes wicked people who participated in or frequented
    the holy place, then died and were forgotten in the city.
  alternative_readings:
  - The verse contrasts the wicked with the righteous implicitly.
  - The clause may suggest hypocritical religious participation by the wicked.
  rationale: No major doctrinal issue is at stake, but the syntax is difficult. The
    translation preserves the observational ambiguity rather than making the wicked's
    exact offense more explicit than the Hebrew does.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
