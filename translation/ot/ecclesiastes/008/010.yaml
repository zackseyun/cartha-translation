id: ECC.8.10
reference: Ecclesiastes 8:10
source:
  edition: WLC
  text: וּ/בְ/כֵ֡ן רָאִיתִי֩ רְשָׁעִ֨ים קְבֻרִ֜ים וָ/בָ֗אוּ וּ/מִ/מְּק֤וֹם קָדוֹשׁ֙
    יְהַלֵּ֔כוּ וְ/יִֽשְׁתַּכְּח֥וּ בָ/עִ֖יר אֲשֶׁ֣ר כֵּן עָשׂ֑וּ גַּם זֶ֖ה הָֽבֶל־־׃
translation:
  text: 'And so I saw the wicked buried: they had come and gone from the holy place,
    and they were forgotten in the city where they had done so. This too is vanity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient versions and a different understanding of the
      Hebrew, 'and they were praised in the city where they had done so.'
    reason: textual_variant
  - marker: b
    text: '''The holy place'' may refer to the temple precincts or another sacred
      place.'
    reason: cultural_note
  - marker: c
    text: Hebrew hebel, often rendered 'vanity'; also 'vapor,' suggesting something
      fleeting or elusive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכֵן
  chosen: And so
  alternatives:
  - Then
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces an observation/conclusion from the preceding reflection. 'And
    so' preserves both the connective waw and the inferential force of בכן in natural
    English.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Simple past fits Qoheleth's report of observation in context.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering that preserves the moral category without unnecessary
    expansion.
- source_word: קְבֻרִים
  chosen: buried
  alternatives:
  - being buried
  lexicon: HALOT
  rationale: Passive participle used predicatively after 'I saw'; 'buried' is the
    most concise natural English rendering.
- source_word: וָבָאוּ
  chosen: they had come
  alternatives:
  - they came
  - and they entered
  lexicon: HALOT
  rationale: Taken with the following verb as part of a sequence describing the wicked's
    prior activity. 'Had come' smooths the relation to the subsequent 'gone' in English.
    The verb can mean 'come/enter'; context suggests movement associated with the
    holy place.
- source_word: וּמִמְּקוֹם קָדוֹשׁ
  chosen: from the holy place
  alternatives:
  - from a holy place
  - from the sanctuary
  lexicon: HALOT
  rationale: מקום קדוש is most naturally 'holy place.' The phrase likely refers to
    a sacred precinct, but 'sanctuary' is slightly more interpretive, so 'holy place'
    better preserves the Hebrew wording.
- source_word: יְהַלֵּכוּ
  chosen: gone
  alternatives:
  - they went
  - they walked
  lexicon: HALOT
  rationale: הלך often means 'go/walk.' In this sequence, English idiom favors 'come
    and gone,' capturing repeated or completed movement without woodenly preserving
    'walk.'
- source_word: וְיִשְׁתַּכְּחוּ
  chosen: they were forgotten
  alternatives:
  - they were praised
  - they were overlooked
  lexicon: HALOT
  rationale: The consonantal text from שכח yields 'be forgotten,' the straightforward
    lexical sense. A known interpretive/textual difficulty exists because some ancient
    versions support a sense like 'praised'; that alternative is preserved in a footnote
    rather than adopted in the main text.
- source_word: בָעִיר
  chosen: in the city
  alternatives:
  - in a city
  lexicon: HALOT
  rationale: The article points to a definite city in the scene envisioned by Qoheleth.
- source_word: אֲשֶׁר כֵּן עָשׂוּ
  chosen: where they had done so
  alternatives:
  - where they had acted thus
  - where they had done these things
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. 'Done so' preserves the anaphoric
    force of כן without over-specifying the referent. 'Where' follows the relative
    construction with בעיר naturally in English.
- source_word: גַּם זֶה הָבֶל
  chosen: This too is vanity
  alternatives:
  - This also is vapor
  - This too is futile
  lexicon: HALOT
  rationale: Ecclesiastes' recurring הבל is traditionally rendered 'vanity'; while
    'vapor' is more concrete, 'vanity' remains idiomatic and captures the book's refrain
    in readable English.
