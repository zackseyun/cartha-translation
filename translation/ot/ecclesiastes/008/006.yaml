id: ECC.8.6
reference: Ecclesiastes 8:6
source:
  edition: WLC
  text: כִּ֣י לְ/כָל חֵ֔פֶץ יֵ֖שׁ עֵ֣ת וּ/מִשְׁפָּ֑ט כִּֽי רָעַ֥ת הָ/אָדָ֖ם רַבָּ֥ה
    עָלָֽי/ו־־׃
translation:
  text: For for every matter there is a time and a judgment, because the evil of man
    weighs heavily upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for every purpose' or 'for every matter/affair.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the misery of man' or 'the trouble of humankind is great upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The first כִּי introduces an explanation flowing from the previous verse,
    so 'For' best captures its discourse function in English.
- source_word: לְכָל חֵפֶץ
  chosen: for every matter
  alternatives:
  - for every delight
  - for every purpose
  - for every affair
  lexicon: HALOT
  rationale: חֵפֶץ can denote pleasure, desire, purpose, or matter/affair depending
    on context. In Ecclesiastes, especially near 3:1 and here with עֵת, it refers
    broadly to each matter or affair rather than subjective delight. 'Matter' is natural
    and sufficiently broad.
- source_word: יֵשׁ עֵת
  chosen: there is a time
  alternatives:
  - there is an appointed time
  lexicon: HALOT
  rationale: A straightforward existential clause. 'Time' preserves the Hebrew without
    over-specifying appointment, though appointment is contextually implied.
- source_word: וּמִשְׁפָּט
  chosen: and a judgment
  alternatives:
  - and a procedure
  - and justice
  - and a proper way
  lexicon: HALOT
  rationale: מִשְׁפָּט has a broad semantic range including judgment, justice, legal
    decision, and proper order. Here, paired with 'time,' it likely means a fitting
    judgment/decision or due process. 'Judgment' preserves the lexical core and the
    gravity of the term.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: The second כִּי gives the reason for the preceding statement. 'Because'
    makes the causal relation explicit in idiomatic English.
- source_word: רָעַת הָאָדָם
  chosen: the evil of man
  alternatives:
  - man's misery
  - the trouble of man
  - the wickedness of humankind
  lexicon: HALOT
  rationale: רָעָה can mean evil, trouble, misery, or calamity. In Ecclesiastes this
    term often carries the sense of grievous trouble or adversity, but 'evil' remains
    possible. Given the immediate syntax with רַבָּה עָלָיו, the phrase can denote
    the burdensome evil/trouble associated with man. I retained 'evil of man' as a
    more formal rendering while acknowledging alternatives.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' by context. Here
    the singular generic has representative force; 'man' preserves the Hebrew form
    and the traditional anthropological sense.
- source_word: רַבָּה עָלָיו
  chosen: weighs heavily upon him
  alternatives:
  - is great upon him
  - lies heavy on him
  - is abundant over him
  lexicon: HALOT
  rationale: The idiom conveys something becoming great/heavy upon a person. 'Weighs
    heavily upon him' communicates the burdened sense in natural English while staying
    close to the Hebrew image.
