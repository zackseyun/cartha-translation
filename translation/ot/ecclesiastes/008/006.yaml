theological_decisions:
- issue: Generic use of הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  rationale: The Hebrew is grammatically singular and generic. Following the gender-accurate
    policy, 'man' best matches the source form and representative force, while 'humankind'
    remains a viable contextual alternative.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)''.'
- issue: Sense of רָעָה in this context
  chosen_reading: evil
  alternative_readings:
  - misery
  - trouble
  - calamity
  rationale: The Hebrew term is semantically broad. The main text keeps the more literal
    'evil,' but the context in Ecclesiastes may point toward burdensome trouble or
    misery; this is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
