id: ECC.8.1
reference: Ecclesiastes 8:1
source:
  edition: WLC
  text: מִ֚י כְּ/הֶ֣/חָכָ֔ם וּ/מִ֥י יוֹדֵ֖עַ פֵּ֣שֶׁר דָּבָ֑ר חָכְמַ֤ת אָדָם֙ תָּאִ֣יר
    פָּנָ֔י/ו וְ/עֹ֥ז פָּנָ֖י/ו יְשֻׁנֶּֽא׃
translation:
  text: Who is like the wise man, and who knows the interpretation of a matter? A
    man's wisdom lights up his face, and the hardness of his face is changed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Human wisdom lights up the face.' The Hebrew has 'the wisdom of a man,'
      using singular generic language.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the boldness/ sternness of his face is changed.' The Hebrew expression
      is idiomatic and may refer to a hard or severe facial expression being altered
      by wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question.
- source_word: כְּהֶחָכָם
  chosen: like the wise man
  alternatives:
  - as wise as the wise man
  - like the wise
  lexicon: HALOT
  rationale: כְּ marks comparison ('like/as'), and הֶחָכָם is a definite singular
    masculine adjective/substantive. 'The wise man' preserves the singular, representative
    force better than a plural.
- source_word: יוֹדֵעַ
  chosen: knows
  alternatives:
  - understands
  lexicon: HALOT
  rationale: Common verb for knowing; 'knows' is the most direct rendering in this
    rhetorical parallelism.
- source_word: פֵּשֶׁר דָּבָר
  chosen: the interpretation of a matter
  alternatives:
  - the explanation of a thing
  - the meaning of a matter
  lexicon: HALOT
  rationale: פֵּשֶׁר denotes interpretation/explanation, and דָּבָר here is broad
    ('matter/thing'). 'Interpretation of a matter' fits wisdom-context usage and preserves
    the construct relationship.
- source_word: חָכְמַת אָדָם
  chosen: A man's wisdom
  alternatives:
  - The wisdom of a man
  - Human wisdom
  lexicon: HALOT
  rationale: אָדָם here is singular and generic. Per doctrine, gender-accurate rendering
    is preferred where representative force is present. 'A man's wisdom' preserves
    the singular generic sense better than the more abstract 'human wisdom'.
- source_word: תָּאִיר
  chosen: lights up
  alternatives:
  - makes shine
  - brightens
  lexicon: HALOT
  rationale: From אור in the Hiphil, causing light/brightness. 'Lights up' is readable
    modern English while preserving the causative sense.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his countenance
  lexicon: HALOT
  rationale: Literal rendering of 'his face' is clear and avoids archaic 'countenance'.
- source_word: עֹז פָּנָיו
  chosen: the hardness of his face
  alternatives:
  - the boldness of his face
  - the sternness of his face
  - the strength of his face
  lexicon: HALOT
  rationale: עֹז can denote strength, but in this collocation with 'face' the sense
    is the hard, severe, or stern look of one's face. 'Hardness' best captures the
    idiomatic force in context, where wisdom softens or alters one's expression.
- source_word: יְשֻׁנֶּא
  chosen: is changed
  alternatives:
  - is altered
  - is transformed
  lexicon: HALOT
  rationale: Passive/reflexive sense from שנה, 'to change.' 'Is changed' is the most
    straightforward rendering. 'Transformed' would overstate the verb.
