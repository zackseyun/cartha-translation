theological_decisions:
- issue: Rendering of אָדָם in a generic singular wisdom saying
  chosen_reading: A man's wisdom
  alternative_readings:
  - Human wisdom
  - The wisdom of a person
  rationale: The Hebrew uses singular אָדָם with representative/generic force. Following
    the doctrine's gender-accurate principle, the translation preserves the singular
    generic 'man' rather than neutralizing it, while the generic sense is noted by
    the article choice and context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
