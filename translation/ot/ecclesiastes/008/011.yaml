id: ECC.8.11
reference: Ecclesiastes 8:11
source:
  edition: WLC
  text: אֲשֶׁר֙ אֵין נַעֲשָׂ֣ה פִתְגָ֔ם מַעֲשֵׂ֥ה הָ/רָעָ֖ה מְהֵרָ֑ה עַל כֵּ֡ן מָלֵ֞א
    לֵ֧ב בְּֽנֵי הָ/אָדָ֛ם בָּ/הֶ֖ם לַ/עֲשׂ֥וֹת רָֽע־־־׃
translation:
  text: Because the sentence against an evil deed is not carried out quickly, therefore
    the heart of the sons of man is fully set in them to do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of man,' that is, humanity in general.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew idiom literally says the heart is 'full' in them to do evil,
      expressing a settled resolve or emboldened inclination.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִתְגָם
  chosen: sentence
  alternatives:
  - decree
  - judgment
  - verdict
  lexicon: HALOT
  rationale: In this context the term refers to an official pronouncement regarding
    wrongdoing. 'Sentence' fits the judicial sense in English and matches the following
    phrase 'against an evil deed'.
- source_word: מַעֲשֵׂה הָרָעָה
  chosen: an evil deed
  alternatives:
  - the evil act
  - evil work
  lexicon: HALOT
  rationale: Construct chain meaning 'the deed of evil' or 'evil deed.' Singular is
    retained to reflect the Hebrew while functioning generically.
- source_word: נַעֲשָׂה
  chosen: is carried out
  alternatives:
  - is done
  - is executed
  lexicon: HALOT
  rationale: The passive of עשה here refers not merely to happening but to the implementation
    of the judicial sentence. 'Carried out' communicates execution of a sentence more
    naturally than the bare 'done.'
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - speedily
  - swiftly
  lexicon: HALOT
  rationale: Adverbial sense indicating delay in enforcement; 'quickly' is clear modern
    English.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks consequence from delayed justice to emboldened evil; 'therefore'
    preserves the logical connection.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner volitional center. Retaining
    'heart' preserves the biblical anthropology without over-interpreting.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - human beings
  - humankind
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy for אָדָם, this phrase
    is rendered with its masculine representative form rather than neutralizing it.
    It is a stock expression for humanity in Ecclesiastes.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - within them
  - among them
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to 'the sons of man'; 'in them'
    preserves the Hebrew wording, expressing an internal disposition.
- source_word: מָלֵא ... לַעֲשׂוֹת רָע
  chosen: is fully set in them to do evil
  alternatives:
  - is filled ... to do evil
  - is emboldened to do evil
  - is fully determined to do evil
  lexicon: HALOT
  rationale: The idiom conveys that the human heart becomes full or resolute toward
    evil action. 'Fully set' captures the settled determination while preserving the
    metaphor better than a freer paraphrase.
- source_word: רָע
  chosen: evil
  alternatives:
  - wickedness
  - wrong
  lexicon: HALOT
  rationale: Keeps lexical consistency with the earlier 'evil deed' and preserves
    the moral force of the Hebrew.
