theological_decisions:
- issue: Rendering of אָדָם in a generic singular statement
  chosen_reading: for man
  alternative_readings:
  - for a person
  - for humankind
  rationale: The Hebrew singular generic is preserved with 'man' in keeping with the
    project's gender-accurate rather than gender-neutral policy. The sense is representative
    of humanity, not restricted to males.
