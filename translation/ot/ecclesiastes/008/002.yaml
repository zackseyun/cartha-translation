id: ECC.8.2
reference: Ecclesiastes 8:2
source:
  edition: WLC
  text: אֲנִי֙ פִּי מֶ֣לֶךְ שְׁמ֔וֹר וְ/עַ֕ל דִּבְרַ֖ת שְׁבוּעַ֥ת אֱלֹהִֽים־׃
translation:
  text: I say, keep the king’s command, because of your oath before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'keep the king’s command, and because of the oath of God'; the Hebrew
      is compressed and may be read with slightly different syntax.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, 'the mouth of a king.'
    reason: lexical_alternative
  - marker: c
    text: '''Oath before God'' may also be understood as ''oath to God'' or ''the
      oath of God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I say
  alternatives:
  - I
  - I myself
  lexicon: HALOT
  rationale: The Hebrew begins abruptly with the independent pronoun 'I,' and many
    interpreters understand an implied verb from context. Rendering simply 'I' is
    too elliptical in English, so 'I say' supplies the minimal sense needed for readable
    modern English while preserving the speaker's personal assertion.
- source_word: פִּי מֶלֶךְ
  chosen: the king’s command
  alternatives:
  - the king’s mouth
  - the king’s word
  - the king’s order
  lexicon: HALOT
  rationale: Literally 'the mouth of a king,' an idiom for what the king says or commands.
    'The king’s command' best conveys the idiomatic force in natural English without
    flattening the authority implied.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - obey
  - guard
  lexicon: HALOT
  rationale: The verb commonly means 'keep, guard, observe.' 'Keep' preserves the
    Hebrew's breadth and allows the object 'the king’s command' to carry the sense
    of obedience.
- source_word: וְעַל
  chosen: because of
  alternatives:
  - and because of
  - on account of
  - with regard to
  lexicon: HALOT
  rationale: The conjunction-preposition sequence is syntactically compressed. In
    context it introduces the ground or motive for keeping the king's command. 'Because
    of' gives the likely causal sense in smooth English; 'and because of' is possible
    but less natural in the compressed Hebrew construction.
- source_word: דִּבְרַת
  chosen: because of
  alternatives:
  - matter of
  - word of
  - account of
  lexicon: HALOT
  rationale: In construct with 'oath,' this noun contributes to the idiom 'because
    of / on account of the oath.' Rendering it separately as 'word' would sound wooden
    and obscure the phrase's function.
- source_word: שְׁבוּעַת אֱלֹהִים
  chosen: your oath before God
  alternatives:
  - the oath of God
  - God’s oath
  - an oath to God
  lexicon: HALOT
  rationale: 'The construct chain is ambiguous: it could mean an oath made in God''s
    presence, an oath sworn by God, or an oath to God. In context, the most likely
    sense is an oath binding the subject in relation to the king under divine witness.
    ''Your oath before God'' makes explicit the implied second-person reference from
    the imperative and communicates the covenantal seriousness without overstating
    possession.'
