theological_decisions:
- issue: Meaning of 'שְׁבוּעַת אֱלֹהִים' in relation to royal obedience
  chosen_reading: an oath made by the hearer in God's presence, grounding obedience
    to the king
  alternative_readings:
  - an oath made to God
  - a divine oath belonging to God
  rationale: The phrase is syntactically ambiguous, but within the verse's imperative
    context the most coherent reading is that the audience is to keep the king's command
    because of an oath sworn under God's witness. This preserves the text's political
    and religious tension without importing a stronger doctrine of unconditional royal
    authority than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it
