id: ECC.8.16
reference: Ecclesiastes 8:16
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר נָתַ֤תִּי אֶת לִבִּ/י֙ לָ/דַ֣עַת חָכְמָ֔ה וְ/לִ/רְאוֹת֙ אֶת הָ֣/עִנְיָ֔ן
    אֲשֶׁ֥ר נַעֲשָׂ֖ה עַל הָ/אָ֑רֶץ כִּ֣י גַ֤ם בַּ/יּוֹם֙ וּ/בַ/לַּ֔יְלָה שֵׁנָ֕ה
    בְּ/עֵינָ֖י/ו אֵינֶ֥/נּוּ רֹאֶֽה־־־׃
translation:
  text: When I applied my heart to know wisdom and to observe the activity that is
    done on the earth—for even by day and by night his eyes do not see sleep—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'he gets no sleep day or night.' The main text preserves
      the Hebrew image, literally, 'sleep his eyes do not see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: When
  alternatives:
  - As
  - Whenever
  lexicon: HALOT
  rationale: Introduces the circumstance under which the speaker made his observation.
    'When' is natural English and fits the temporal sense here better than a more
    wooden 'as.'
- source_word: נָתַתִּי אֶת־לִבִּי
  chosen: I applied my heart
  alternatives:
  - I gave my heart
  - I set my mind
  lexicon: HALOT
  rationale: This Hebrew idiom expresses deliberate mental focus. 'Applied my heart'
    preserves the metaphor of 'heart' while communicating intentional concentration.
    'Set my mind' is possible but loses the Hebrew anthropological imagery.
- source_word: לָדַעַת חָכְמָה
  chosen: to know wisdom
  alternatives:
  - to understand wisdom
  lexicon: HALOT
  rationale: A straightforward infinitive construction. 'Know wisdom' is sufficiently
    idiomatic in English and preserves the lexical link to ידע.
- source_word: וְלִרְאוֹת
  chosen: and to observe
  alternatives:
  - and to see
  - and to consider
  lexicon: HALOT
  rationale: Although literally 'to see,' in this context it denotes attentive examination.
    'Observe' captures that investigative nuance without over-paraphrasing.
- source_word: הָעִנְיָן
  chosen: the activity
  alternatives:
  - the business
  - the task
  - the matter
  lexicon: HALOT
  rationale: In Ecclesiastes this noun often refers to human occupation or business.
    'Activity' is readable modern English and fits the context of what is done on
    earth. 'Business' can sound too commercial; 'matter' is too vague.
- source_word: אֲשֶׁר נַעֲשָׂה עַל־הָאָרֶץ
  chosen: that is done on the earth
  alternatives:
  - that is done upon the earth
  - that is carried out on earth
  lexicon: HALOT
  rationale: A close rendering of the passive construction, preserving the broad scope
    of human affairs in the world.
- source_word: כִּי גַם
  chosen: for even
  alternatives:
  - because even
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory clause. 'For even' preserves both the causal/explanatory
    force of כִּי and the additive emphasis of גַם.
- source_word: בַּיּוֹם וּבַלַּיְלָה
  chosen: by day and by night
  alternatives:
  - in the day and in the night
  - day and night
  lexicon: HALOT
  rationale: An idiomatic English rendering of continual duration. 'By day and by
    night' retains the distributive feel of the Hebrew prepositions.
- source_word: שֵׁנָה
  chosen: sleep
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: בְּעֵינָיו אֵינֶנּוּ רֹאֶה
  chosen: his eyes do not see sleep
  alternatives:
  - he does not see sleep with his eyes
  - he gets no sleep
  lexicon: HALOT
  rationale: The Hebrew is vivid and somewhat awkward in a deliberate way. The chosen
    rendering preserves the imagery of sleepless eyes rather than flattening it to
    the idiom 'he gets no sleep.' The 3ms suffix is retained as 'his,' though it may
    function generically or refer back to the speaker.
