theological_decisions:
- issue: Referent of the 3ms suffix in 'his eyes do not see sleep'
  chosen_reading: Retain the singular masculine wording without specifying a new subject
  alternative_readings:
  - 'Interpret as referring specifically to Qoheleth: ''my eyes do not see sleep''
    in sense'
  - 'Interpret generically: ''one''s eyes do not see sleep'''
  rationale: The Masoretic text has a 3ms suffix, not 1cs. Rather than emending or
    over-interpreting, the translation preserves the Hebrew form in English. This
    maintains the text's ambiguity and unusual phrasing, consistent with preserving
    tension rather than resolving it beyond what the source warrants.
  doctrine_reference: Translation philosophy §3, §4
