theological_decisions:
- issue: Rendering of אָדָם in a representative/generic statement
  chosen_reading: man ... man
  alternative_readings:
  - one person ... another
  - humankind ... humankind
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    where the source uses grammatically masculine forms with representative force.
    Here the singular masculine noun is used proverbially of human beings in relation
    to one another, so 'man' best matches the source form while an inclusive alternative
    is preserved in a footnote.
