id: ECC.8.9
reference: Ecclesiastes 8:9
source:
  edition: WLC
  text: אֶת כָּל זֶ֤ה רָאִ֨יתִי֙ וְ/נָת֣וֹן אֶת לִבִּ֔/י לְ/כָֽל מַעֲשֶׂ֔ה אֲשֶׁ֥ר
    נַעֲשָׂ֖ה תַּ֣חַת הַ/שָּׁ֑מֶשׁ עֵ֗ת אֲשֶׁ֨ר שָׁלַ֧ט הָ/אָדָ֛ם בְּ/אָדָ֖ם לְ/רַ֥ע
    לֽ/וֹ־־־־׃
translation:
  text: All this I have seen, while applying my heart to every deed that is done under
    the sun, at a time when man has ruled over man to his harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “one person has ruled over another to his harm.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  - I observed
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to convey
    accumulated observation in Qoheleth's reflective style. 'Seen' is more direct
    than 'observed' and preserves the experiential force.
- source_word: וְנָתוֹן אֶת־לִבִּי
  chosen: while applying my heart
  alternatives:
  - and setting my heart
  - and giving my mind
  - and paying attention
  lexicon: HALOT
  rationale: This idiom means directing one's inner attention or thoughtful concern.
    'Applying my heart' preserves the Hebrew imagery better than the more interpretive
    'paying attention,' while 'while' smooths the verbless/participle-like construction
    into natural English.
- source_word: לֵב / לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly includes thought and reflection, not merely emotion.
    Retaining 'heart' preserves the source metaphor and biblical anthropology.
- source_word: מַעֲשֶׂה
  chosen: deed
  alternatives:
  - work
  - activity
  - thing done
  lexicon: HALOT
  rationale: In context it refers broadly to what is done under the sun. 'Deed' is
    concise and natural, without narrowing the sense to labor alone as 'work' might.
- source_word: נַעֲשָׂה
  chosen: is done
  alternatives:
  - is made
  - happens
  lexicon: HALOT
  rationale: The passive sense is straightforward here. 'Is done' matches the common
    Ecclesiastes formula and keeps the focus on human actions/events.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a characteristic Ecclesiastes expression and should be preserved
    consistently in familiar form.
- source_word: עֵת אֲשֶׁר
  chosen: at a time when
  alternatives:
  - when
  - there is a time when
  lexicon: HALOT
  rationale: The phrase introduces a circumstance or occasion. 'At a time when' preserves
    the temporal noun more explicitly than a simple 'when.'
- source_word: שָׁלַט
  chosen: has ruled over
  alternatives:
  - exercised authority over
  - dominated
  lexicon: HALOT
  rationale: The verb denotes exercising power or mastery. 'Ruled over' is idiomatic
    and neither too weak nor overly interpretive.
- source_word: הָאָדָם בְּאָדָם
  chosen: man has ruled over man
  alternatives:
  - one person has ruled over another
  - humankind has ruled over humankind
  lexicon: HALOT
  rationale: 'Per doctrine, gender-accurate rendering is preferred. Here אָדָם is
    singular and representative: one human over another. ''Man ... man'' preserves
    the Hebrew form and the aphoristic force; a more inclusive alternative is worth
    preserving in a footnote.'
- source_word: לְרַע לוֹ
  chosen: to his harm
  alternatives:
  - to his hurt
  - for his injury
  - to his own harm
  lexicon: HALOT
  rationale: The phrase most naturally means resulting in harm to the one being ruled
    over, though the pronoun could be read more generally. 'To his harm' is concise
    and preserves the ambiguity better than 'to his own harm,' which would force reflexive
    reference.
