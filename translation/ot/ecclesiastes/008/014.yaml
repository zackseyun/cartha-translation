theological_decisions:
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: vanity
  alternative_readings:
  - futility
  - vapor
  - meaninglessness
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it
    is theologically and thematically central in Ecclesiastes. 'Vanity' best preserves
    the book's repeated refrain and the sense of frustrating incongruity highlighted
    in this verse, where moral outcomes appear reversed.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
