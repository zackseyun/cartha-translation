id: ECC.8.14
reference: Ecclesiastes 8:14
source:
  edition: WLC
  text: יֶשׁ הֶבֶל֮ אֲשֶׁ֣ר נַעֲשָׂ֣ה עַל הָ/אָרֶץ֒ אֲשֶׁ֣ר יֵ֣שׁ צַדִּיקִ֗ים אֲשֶׁ֨ר
    מַגִּ֤יעַ אֲלֵ/הֶם֙ כְּ/מַעֲשֵׂ֣ה הָ/רְשָׁעִ֔ים וְ/יֵ֣שׁ רְשָׁעִ֔ים שֶׁ/מַּגִּ֥יעַ
    אֲלֵ/הֶ֖ם כְּ/מַעֲשֵׂ֣ה הַ/צַּדִּיקִ֑ים אָמַ֕רְתִּי שֶׁ/גַּם זֶ֖ה הָֽבֶל־־׀־׃
translation:
  text: 'There is a vanity that is done on the earth: there are righteous people to
    whom it happens according to the deeds of the wicked, and there are wicked people
    to whom it happens according to the deeds of the righteous. I said that this too
    is vanity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'futility' or 'vapor.' The Hebrew הֶבֶל is a key term in Ecclesiastes
      for what is fleeting, elusive, or frustratingly incongruous.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - futility
  - vapor
  - meaninglessness
  lexicon: HALOT
  rationale: In Ecclesiastes, הֶבֶל is a programmatic term denoting what is fleeting,
    elusive, or frustratingly incongruous. 'Vanity' preserves the traditional Qoheleth
    register and fits the repeated refrain in this verse. Alternatives like 'futility'
    or 'vapor' capture aspects of the term but are less idiomatic here.
- source_word: נַעֲשָׂה
  chosen: is done
  alternatives:
  - takes place
  - happens
  lexicon: HALOT
  rationale: The Niphal of עשה here is passive/reflexive, referring to something occurring
    in the world. 'Is done' stays close to the Hebrew while remaining natural enough
    in English.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  - under the sun
  lexicon: HALOT
  rationale: The phrase is literally 'on the earth.' 'In the land' would over-localize,
    and 'under the sun' is not the wording used here.
- source_word: צַדִּיקִים
  chosen: righteous people
  alternatives:
  - the righteous
  - righteous ones
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'Righteous people' is
    clear modern English and avoids sounding overly abstract while preserving the
    moral category.
- source_word: מַגִּיעַ אֲלֵהֶם
  chosen: it happens to them
  alternatives:
  - it reaches them
  - it comes upon them
  - it befalls them
  lexicon: HALOT
  rationale: The idiom with נגע in this stem conveys what comes to someone as an outcome
    or lot. 'It happens to them' is natural English and fits the context of apparent
    moral reversal.
- source_word: כְּמַעֲשֵׂה
  chosen: according to the deeds of
  alternatives:
  - as the work of
  - like the conduct of
  lexicon: HALOT
  rationale: מַעֲשֶׂה here refers to actions or conduct with corresponding outcome.
    'According to the deeds of' preserves the comparative and moral sense.
- source_word: הָרְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים in wisdom literature; it preserves the ethical
    contrast with the righteous.
- source_word: רְשָׁעִים
  chosen: wicked people
  alternatives:
  - the wicked
  - wicked ones
  lexicon: HALOT
  rationale: As with צדיקים, the plural adjective is substantival. 'Wicked people'
    is readable and parallel to 'righteous people' in the first clause.
- source_word: הַצַּדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the righteous ones
  lexicon: HALOT
  rationale: Used in the comparison phrase opposite 'the wicked.' 'The righteous'
    is concise and idiomatic in this slot.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I declared
  - I concluded
  lexicon: HALOT
  rationale: A simple first-person perfect of אמר. 'I said' is sufficiently direct
    and leaves interpretive force understated, as in the Hebrew.
- source_word: שֶׁגַּם זֶה הָבֶל
  chosen: that this too is vanity
  alternatives:
  - that this also is vanity
  - that even this is vanity
  lexicon: HALOT
  rationale: '''This too'' captures גם naturally in English and preserves the refrain-like
    cadence of Qoheleth.'
