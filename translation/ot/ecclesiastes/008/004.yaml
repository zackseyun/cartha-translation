id: ECC.8.4
reference: Ecclesiastes 8:4
source:
  edition: WLC
  text: בַּ/אֲשֶׁ֥ר דְּבַר מֶ֖לֶךְ שִׁלְט֑וֹן וּ/מִ֥י יֹֽאמַר ל֖/וֹ מַֽה תַּעֲשֶֽׂה־־־׃
translation:
  text: For the word of a king is authority, and who may say to him, “What are you
    doing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For where the word of the king is, there is authority.' The Hebrew opening
      can be construed more literally in that way.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּאֲשֶׁר
  chosen: For
  alternatives:
  - Where
  - Because
  - Inasmuch as
  lexicon: HALOT
  rationale: The compound preposition-relative introduces the ground or basis for
    the preceding admonition. In English, 'For' naturally conveys the explanatory
    force in context better than a more wooden 'where' or 'inasmuch as.'
- source_word: דְּבַר
  chosen: word
  alternatives:
  - command
  - decree
  - utterance
  lexicon: HALOT
  rationale: The noun commonly means 'word' or 'matter.' Here, in royal context, it
    can imply an authoritative command, but 'word' preserves the Hebrew expression
    while allowing the following predicate 'is authority' to carry the force.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Hebrew lacks the article here. 'A king' fits the proverbial, generalizing
    character of Ecclesiastes better than the more specific 'the king.'
- source_word: שִׁלְטוֹן
  chosen: authority
  alternatives:
  - power
  - dominion
  - rule
  lexicon: HALOT
  rationale: The noun denotes ruling power or authority. 'Authority' best fits the
    predicative construction 'the word of a king is authority,' expressing that a
    king's word carries binding force.
- source_word: וּמִי
  chosen: and who
  alternatives:
  - and who is there that
  - who
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus interrogative, preserving
    the rhetorical question.
- source_word: יֹאמַר לוֹ
  chosen: may say to him
  alternatives:
  - can say to him
  - will say to him
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question expresses possibility more
    than simple future. 'May say' idiomatically conveys the challengeability of royal
    authority.
- source_word: מַה תַּעֲשֶׂה
  chosen: What are you doing?
  alternatives:
  - What do you do?
  - What are you doing here?
  - What are you doing!
  lexicon: HALOT
  rationale: This is the natural English form of the direct challenge implied by the
    Hebrew. Present progressive best captures the confrontational sense of questioning
    a king's action.
