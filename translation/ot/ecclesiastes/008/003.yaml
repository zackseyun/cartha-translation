id: ECC.8.3
reference: Ecclesiastes 8:3
source:
  edition: WLC
  text: אַל תִּבָּהֵ֤ל מִ/פָּנָי/ו֙ תֵּלֵ֔ךְ אַֽל תַּעֲמֹ֖ד בְּ/דָבָ֣ר רָ֑ע כִּ֛י
    כָּל אֲשֶׁ֥ר יַחְפֹּ֖ץ יַעֲשֶֽׂה־־־׃
translation:
  text: Do not be hasty to leave his presence. Do not take your stand in an evil matter,
    for he does whatever he pleases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be alarmed and leave his presence.' The Hebrew verb can suggest
      agitation or alarm as well as rash haste.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not stand in a bad cause' or 'Do not persist in an evil matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּבָּהֵל
  chosen: be hasty
  alternatives:
  - be alarmed
  - be disturbed
  - be terrified
  lexicon: HALOT
  rationale: The verb בהל can denote being disturbed or acting in alarm. In this context
    with the following infinitive-like finite verb 'leave/go,' the sense is not primarily
    emotional terror but rash, hurried action in the king's presence. 'Be hasty' captures
    the practical force in idiomatic English.
- source_word: מִפָּנָיו תֵּלֵךְ
  chosen: to leave his presence
  alternatives:
  - to go from before him
  - to depart from his face/presence
  lexicon: HALOT
  rationale: Literally 'go from before him.' English idiom prefers 'leave his presence,'
    which preserves the courtly setting and the relational nuance of פניו ('his presence').
- source_word: תַּעֲמֹד
  chosen: take your stand
  alternatives:
  - stand
  - persist
  - remain
  lexicon: HALOT
  rationale: עמד here likely means more than physical standing; it conveys taking
    or maintaining a position. 'Take your stand' fits the admonitory context and pairs
    naturally with 'in an evil matter.'
- source_word: בְּדָבָר רָע
  chosen: in an evil matter
  alternatives:
  - in a bad cause
  - in an evil thing
  - in a wrong matter
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, affair'). Here 'matter' best preserves the
    ambiguity between a cause, plan, or course of action. 'Evil' retains the moral
    force of רע better than the weaker 'bad.'
- source_word: כִּי כָּל אֲשֶׁר יַחְפֹּץ יַעֲשֶׂה
  chosen: for he does whatever he pleases
  alternatives:
  - for whatever he desires, he does
  - for he does all that he wishes
  lexicon: HALOT
  rationale: The clause emphasizes the king's effective authority to carry out his
    will. 'Does whatever he pleases' is natural modern English and preserves the force
    of חפץ ('desire, take pleasure in, will').
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: '''For'' works well as an explanatory conjunction linking the prohibitions
    to the reason given in the final clause.'
