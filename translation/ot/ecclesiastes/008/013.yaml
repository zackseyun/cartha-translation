id: ECC.8.13
reference: Ecclesiastes 8:13
source:
  edition: WLC
  text: וְ/טוֹב֙ לֹֽא יִהְיֶ֣ה לָֽ/רָשָׁ֔ע וְ/לֹֽא יַאֲרִ֥יךְ יָמִ֖ים כַּ/צֵּ֑ל אֲשֶׁ֛ר
    אֵינֶ֥/נּוּ יָרֵ֖א מִ/לִּ/פְנֵ֥י אֱלֹהִֽים־־׃
translation:
  text: But it will not go well for the wicked, and he will not lengthen his days
    like a shadow, because he does not fear before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will not prolong his days.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'because he does not fear in the presence of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטוֹב
  chosen: But it will not go well
  alternatives:
  - And it will not be well
  - Yet good will not be
  lexicon: HALOT
  rationale: טוֹב with היה in this construction expresses well-being or favorable
    outcome rather than abstract 'good.' The prefixed conjunction is rendered 'But'
    to mark the contrast with the previous verse's positive statement about those
    who fear God.
- source_word: לָרָשָׁע
  chosen: for the wicked
  alternatives:
  - for the evil man
  - for the guilty
  lexicon: HALOT
  rationale: רָשָׁע commonly denotes the wicked person in wisdom literature. 'The
    wicked' is idiomatic and preserves the moral category without over-specifying
    legal guilt.
- source_word: וְלֹא יַאֲרִיךְ יָמִים
  chosen: and he will not lengthen his days
  alternatives:
  - and he will not prolong his days
  - and he will not live long
  lexicon: HALOT
  rationale: The Hiphil of ארך with ימים is literally 'lengthen/prolong days.' 'Lengthen
    his days' keeps the Hebrew imagery while remaining understandable; 'live long'
    is possible but less formally tied to the source.
- source_word: כַּצֵּל
  chosen: like a shadow
  alternatives:
  - as a shadow
  lexicon: HALOT
  rationale: The simile is retained directly. In Ecclesiastes, 'shadow' evokes transience
    and insubstantiality; preserving the image is preferable to paraphrase.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - who
  - since
  - for
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the reason for the wicked man's fate, not merely
    a relative clause modifying 'shadow.' Rendering it causally as 'because' best
    fits the syntax and sense of the verse.
- source_word: אֵינֶנּוּ יָרֵא
  chosen: he does not fear
  alternatives:
  - he is not fearing
  - he has no fear
  lexicon: HALOT
  rationale: This expresses the wicked person's ongoing lack of reverence. 'He does
    not fear' is natural English and preserves the verbal force.
- source_word: מִלִּפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  - before the face of God
  lexicon: HALOT
  rationale: Literally 'from before the face of God,' an idiom for being in God's
    presence. 'Before God' is concise, idiomatic, and preserves the reverential setting
    without awkward literalism.
