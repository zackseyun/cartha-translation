id: ECC.8.5
reference: Ecclesiastes 8:5
source:
  edition: WLC
  text: שׁוֹמֵ֣ר מִצְוָ֔ה לֹ֥א יֵדַ֖ע דָּבָ֣ר רָ֑ע וְ/עֵ֣ת וּ/מִשְׁפָּ֔ט יֵדַ֖ע לֵ֥ב
    חָכָֽם׃
translation:
  text: Whoever keeps a command will not know a harmful thing, and a wise heart knows
    the proper time and judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an evil thing' or 'a bad thing.' The Hebrew phrase is literally 'a bad/evil
      thing,' and may refer either to moral evil or, more likely here, to harmful
      consequence or trouble.
    reason: lexical_alternative
  - marker: b
    text: Or 'time and judgment,' that is, the proper time and the right decision/procedure.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹמֵר
  chosen: keeps
  alternatives:
  - guards
  - observes
  lexicon: HALOT
  rationale: The participle denotes one who keeps or observes. 'Keeps' is idiomatic
    in English for obeying a command and fits wisdom-context exhortation.
- source_word: מִצְוָה
  chosen: a command
  alternatives:
  - the commandment
  - an order
  lexicon: HALOT
  rationale: The singular noun can be generic. 'A command' preserves the indefinite/generic
    sense better than the more traditional but potentially over-specific 'the commandment.'
- source_word: לֹא יֵדַע
  chosen: will not know
  alternatives:
  - does not know
  - will not experience
  lexicon: HALOT
  rationale: The imperfect can express general consequence. 'Will not know' preserves
    the Hebrew idiom without over-interpreting it as purely experiential, though experiential
    nuance is possible.
- source_word: דָּבָר רָע
  chosen: a harmful thing
  alternatives:
  - an evil thing
  - a bad thing
  - harm
  lexicon: HALOT
  rationale: The phrase literally means 'an evil/bad thing,' but in context likely
    refers to adverse consequence or trouble befalling the obedient person. 'Harmful
    thing' communicates that sense in natural English while retaining the concrete
    noun 'thing.'
- source_word: וְעֵת
  chosen: the proper time
  alternatives:
  - time
  - season
  lexicon: HALOT
  rationale: In wisdom literature עֵת often means the fitting or appropriate time.
    'Proper time' brings out that nuance in relation to wise discernment.
- source_word: וּמִשְׁפָּט
  chosen: judgment
  alternatives:
  - procedure
  - justice
  - decision
  lexicon: HALOT
  rationale: מִשְׁפָּט here likely refers to judgment/decision or the right course,
    paired with 'time.' 'Judgment' preserves the lexical range and the traditional
    wisdom pairing without narrowing it too much.
- source_word: יֵדַע לֵב חָכָם
  chosen: a wise heart knows
  alternatives:
  - the heart of a wise man knows
  - a wise person knows in his heart
  lexicon: HALOT
  rationale: Hebrew 'heart' is the seat of understanding and discernment. Retaining
    'wise heart' preserves the Hebrew anthropology and imagery better than flattening
    it to 'wise person,' while remaining readable.
