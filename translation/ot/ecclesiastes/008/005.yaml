theological_decisions:
- issue: Anthropological idiom לֵב חָכָם
  chosen_reading: a wise heart
  alternative_readings:
  - the heart of a wise man
  - a wise person
  rationale: The verse is wisdom instruction, not a doctrinally contested passage,
    but preserving 'heart' maintains the Hebrew conception of inner discernment rather
    than reducing it to modern cognition alone.
  doctrine_reference: Translation philosophy §5, §6
- issue: Generic singular expression
  chosen_reading: Whoever keeps a command
  alternative_readings:
  - He who keeps the commandment
  rationale: The Hebrew participle is masculine singular but generic. 'Whoever' conveys
    representative force in natural English without implying male-only reference,
    while remaining faithful to source intent.
  doctrine_reference: Translation philosophy §4
