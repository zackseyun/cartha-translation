id: ECC.10.18
reference: Ecclesiastes 10:18
source:
  edition: WLC
  text: בַּ/עֲצַלְתַּ֖יִם יִמַּ֣ךְ הַ/מְּקָרֶ֑ה וּ/בְ/שִׁפְל֥וּת יָדַ֖יִם יִדְלֹ֥ף
    הַ/בָּֽיִת׃
translation:
  text: Through laziness the roof sags, and through idle hands the house leaks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By laziness the roof sinks'; the Hebrew verb can denote becoming low
      or giving way, and the noun for 'roof' may refer more specifically to the roof
      structure or rafters.
    reason: lexical_alternative
  - marker: b
    text: Literally 'through the lowness of hands,' an idiom for slackness or negligence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲצַלְתַּיִם
  chosen: Through laziness
  alternatives:
  - By laziness
  - Through sloth
  lexicon: HALOT
  rationale: The prefixed ב marks means or circumstance ('through/by'). עֲצַלְתַּיִם
    is a dual/abstract form from עצל referring to laziness or sloth. 'Through laziness'
    is natural modern English and preserves the causal sense.
- source_word: יִמַּךְ
  chosen: sags
  alternatives:
  - sinks
  - collapses
  - is brought low
  lexicon: HALOT
  rationale: From מוך in the Niphal, the verb conveys becoming low, sinking, or giving
    way. In the context of a building part, 'sags' best captures gradual structural
    deterioration rather than total collapse.
- source_word: הַמְּקָרֶה
  chosen: the roof
  alternatives:
  - the rafters
  - the ceiling
  - the beams
  lexicon: HALOT
  rationale: מְקָרֶה denotes the roof structure or covering. English 'roof' communicates
    the architectural referent clearly. 'Rafters' is possible but too specific; 'ceiling'
    is less likely in this context.
- source_word: וּבְשִׁפְלוּת יָדַיִם
  chosen: and through idle hands
  alternatives:
  - and through slack hands
  - and through the lowering of hands
  - and through negligence of hands
  lexicon: HALOT
  rationale: שִׁפְלוּת literally means lowness/lowering; with 'hands' it idiomatically
    refers to slackness, idleness, or negligent inactivity. 'Idle hands' is idiomatic
    English that preserves the image of neglected labor.
- source_word: יִדְלֹף
  chosen: leaks
  alternatives:
  - drips
  - lets in rain
  - drops through
  lexicon: HALOT
  rationale: From דלף, 'to drip/leak.' With 'house' as subject, the sense is that
    the house leaks because of neglect. 'Leaks' is the most natural English rendering.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the building
  lexicon: HALOT
  rationale: Standard sense of בַּיִת. 'House' fits both the literal image and the
    proverb's concrete style.
