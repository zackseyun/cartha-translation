id: ECC.10.8
reference: Ecclesiastes 10:8
source:
  edition: WLC
  text: חֹפֵ֥ר גּוּמָּ֖ץ בּ֣/וֹ יִפּ֑וֹל וּ/פֹרֵ֥ץ גָּדֵ֖ר יִשְּׁכֶ֥/נּוּ נָחָֽשׁ׃
translation:
  text: Whoever digs a pit will fall into it, and a snake will bite whoever breaks
    through a wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a serpent will bite him.'
    reason: lexical_alternative
  - marker: b
    text: '''Wall'' may also be understood as a boundary fence, likely a stone enclosure
      wall in the ancient setting.'
    reason: cultural_note
lexical_decisions:
- source_word: חֹפֵר
  chosen: Whoever digs
  alternatives:
  - He who digs
  - One who digs
  lexicon: HALOT
  rationale: The Qal participle functions generically/proverbially. 'Whoever digs'
    gives natural modern English while preserving the indefinite subject force better
    than a wooden participial rendering.
- source_word: גּוּמָּץ
  chosen: a pit
  alternatives:
  - a hole
  - a ditch
  lexicon: HALOT
  rationale: Refers to a dug pit or trap-like hole. 'Pit' is the most idiomatic and
    proverbially fitting English equivalent in wisdom literature.
- source_word: בּוֹ
  chosen: into it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: With נפל ('fall'), English idiom prefers 'fall into it.' This slightly
    dynamic rendering preserves the sense of falling into the very pit dug.
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - falls
  lexicon: HALOT
  rationale: The imperfect in proverbial context can express a general consequence.
    English future 'will fall' is a standard way to render this gnomic result.
- source_word: וּפֹרֵץ
  chosen: and whoever breaks through
  alternatives:
  - and he who breaks through
  - and one breaking through
  lexicon: HALOT
  rationale: Like the first participle, this is a generic participle in a proverb.
    'Breaks through' captures the active force of פרץ in relation to a wall or barrier.
- source_word: גָּדֵר
  chosen: a wall
  alternatives:
  - a fence
  - a stone wall
  lexicon: HALOT
  rationale: The term can denote a wall or fence, often a stone boundary wall. 'Wall'
    is broad, natural, and fits the image of breaching a protective boundary.
- source_word: יִשְּׁכֶנּוּ
  chosen: will bite whoever breaks through
  alternatives:
  - will bite him
  - will strike him
  lexicon: HALOT
  rationale: From נשך, 'bite.' The suffix refers back to the wall-breaker. English
    restates the antecedent ('whoever breaks through') for clarity and naturalness
    rather than using an ambiguous 'him.'
- source_word: נָחָשׁ
  chosen: a snake
  alternatives:
  - a serpent
  lexicon: HALOT
  rationale: '''Snake'' is the clearest contemporary English equivalent. ''Serpent''
    is possible but sounds more elevated and may import associations not required
    by this proverb.'
