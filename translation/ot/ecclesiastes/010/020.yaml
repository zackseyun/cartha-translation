id: ECC.10.20
reference: Ecclesiastes 10:20
source:
  edition: WLC
  text: גַּ֣ם בְּ/מַדָּֽעֲ/ךָ֗ מֶ֚לֶךְ אַל תְּקַלֵּ֔ל וּ/בְ/חַדְרֵי֙ מִשְׁכָּ֣בְ/ךָ֔
    אַל תְּקַלֵּ֖ל עָשִׁ֑יר כִּ֣י ע֤וֹף הַ/שָּׁמַ֨יִם֙ יוֹלִ֣יךְ אֶת הַ/קּ֔וֹל וּ/בַ֥עַל
    ה/כנפים יַגֵּ֥יד דָּבָֽר־־־׃
translation:
  text: Even in your thoughts, do not curse a king, and in your bedroom do not curse
    a rich man, for a bird of the heavens may carry the sound, and a winged creature
    may report the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your mind' for 'in your thoughts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the chambers of your bed,' that is, in the privacy of your
      bedroom.
    reason: cultural_note
  - marker: c
    text: Hebrew 'a bird of the heavens'; compare the idiom behind the expression
      'a little bird told me.'
    reason: cross_reference
lexical_decisions:
- source_word: בְּמַדָּעֲךָ
  chosen: in your thoughts
  alternatives:
  - in your mind
  - in your knowledge
  - to yourself
  lexicon: HALOT
  rationale: מַדָּע can denote knowledge or thought. In this warning context, the
    sense is inward cognition rather than abstract knowledge, so 'in your thoughts'
    best captures the idiom naturally in English while preserving the internal/private
    setting.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The Hebrew lacks the article. 'A king' preserves the anarthrous form
    and keeps the proverb general rather than tying it to a specific monarch.
- source_word: תְּקַלֵּל
  chosen: curse
  alternatives:
  - revile
  - speak evil of
  lexicon: HALOT
  rationale: The verb קלל in the Piel commonly means 'curse' or 'treat with contempt.'
    'Curse' is the most direct rendering and fits the parallel prohibitions.
- source_word: בְחַדְרֵי מִשְׁכָּבְךָ
  chosen: in your bedroom
  alternatives:
  - in the chambers of your bed
  - in your bedchamber
  - in your sleeping room
  lexicon: HALOT
  rationale: Literally 'in the rooms/chambers of your bed.' The phrase refers idiomatically
    to the most private part of one's dwelling. 'In your bedroom' communicates that
    privacy in clear modern English without excessive paraphrase.
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich
  - a wealthy man
  - a rich person
  lexicon: HALOT
  rationale: The adjective functions substantivally for an individual wealthy person.
    'A rich man' is gender-accurate to the masculine singular form and matches the
    proverb's singular parallelism with 'a king.'
- source_word: עוֹף הַשָּׁמַיִם
  chosen: a bird of the heavens
  alternatives:
  - a bird of the air
  - a bird of the sky
  lexicon: HALOT
  rationale: Literally 'bird of the heavens.' This preserves the Hebrew imagery and
    echoes a familiar biblical expression, while remaining understandable in English.
- source_word: יוֹלִיךְ אֶת־הַקּוֹל
  chosen: may carry the sound
  alternatives:
  - will carry the voice
  - may carry the message
  lexicon: HALOT
  rationale: קוֹל is literally 'sound/voice.' Here it refers to what was spoken being
    conveyed. 'Carry the sound' stays close to the Hebrew image; 'may' reflects the
    proverbial warning force in English better than a rigid future.
- source_word: בַעַל הַכְּנָפַיִם
  chosen: a winged creature
  alternatives:
  - the possessor of wings
  - a winged one
  lexicon: HALOT
  rationale: Literally 'master/owner of wings,' an idiomatic expression for a winged
    being. 'A winged creature' is natural English and preserves the figurative parallel
    with the bird.
- source_word: יַגֵּיד דָּבָר
  chosen: may report the matter
  alternatives:
  - will tell the thing
  - may disclose the matter
  - may report the word
  lexicon: HALOT
  rationale: נגד means to tell or report; דָבָר here is best taken as 'matter' or
    'thing,' referring to the spoken curse. 'Report the matter' is idiomatic and fits
    the warning that private speech may become known.
