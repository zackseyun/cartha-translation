id: ECC.10.16
reference: Ecclesiastes 10:16
source:
  edition: WLC
  text: אִֽי לָ֣/ךְ אֶ֔רֶץ שֶׁ/מַּלְכֵּ֖/ךְ נָ֑עַר וְ/שָׂרַ֖יִ/ךְ בַּ/בֹּ֥קֶר יֹאכֵֽלוּ־׃
translation:
  text: Woe to you, O land, when your king is a youth and your princes eat in the
    morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Alas for you, O land, whose king is a child.' The Hebrew נַעַר can denote
      a child, youth, or young man; here it likely emphasizes immaturity in rule.
    reason: lexical_alternative
  - marker: b
    text: The statement that princes 'eat in the morning' likely implies self-indulgent
      feasting at an improper time, in contrast to the commendation in the following
      verse.
    reason: cultural_note
lexical_decisions:
- source_word: אִי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: Interjection of lament or denunciation. 'Woe' is the most idiomatic and
    forceful English equivalent in wisdom literature and prophetic-style warning contexts;
    'alas' is possible but weaker.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with second feminine singular suffix addresses the 'land'
    directly in a conventional exclamation. 'To you' fits the English idiom 'Woe to
    you'.
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - country
  - earth
  lexicon: HALOT
  rationale: Here the referent is a political realm or nation, not the whole earth.
    'Land' preserves the Hebrew term's breadth while fitting the address to a kingdom.
- source_word: שֶׁמַּלְכֵּךְ
  chosen: when your king
  alternatives:
  - whose king
  lexicon: HALOT
  rationale: 'The relative particle plus noun phrase can be rendered formally as ''whose
    king,'' but in English the following clause reads more naturally as a temporal-circumstantial
    statement: ''when your king...'' without loss of sense.'
- source_word: נָעַר
  chosen: a youth
  alternatives:
  - a child
  - young man
  lexicon: HALOT
  rationale: The noun can denote a child, servant, or young man depending on context.
    Here it characterizes immature rule rather than literal infancy. 'A youth' best
    conveys political immaturity without overstating literal age.
- source_word: וְשָׂרַיִךְ
  chosen: and your princes
  alternatives:
  - and your officials
  - and your nobles
  lexicon: HALOT
  rationale: שָׂרִים are rulers or high officials. 'Princes' is a traditional and
    still intelligible rendering for court leaders under a king; 'officials' is possible
    but flatter.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  lexicon: HALOT
  rationale: Straightforward temporal phrase. In context it implies untimely feasting
    rather than disciplined governance.
- source_word: יֹאכֵלוּ
  chosen: eat
  alternatives:
  - feast
  - indulge in eating
  lexicon: HALOT
  rationale: The verb's basic sense is 'eat.' Because the negative implication comes
    from the context and is made explicit in the following verse, the main text should
    not over-interpret with 'feast,' though that nuance is worth preserving in a footnote.
