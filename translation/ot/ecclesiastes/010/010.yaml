id: ECC.10.10
reference: Ecclesiastes 10:10
source:
  edition: WLC
  text: אִם קֵהָ֣ה הַ/בַּרְזֶ֗ל וְ/הוּא֙ לֹא פָנִ֣ים קִלְקַ֔ל וַ/חֲיָלִ֖ים יְגַבֵּ֑ר
    וְ/יִתְר֥וֹן הכשיר חָכְמָֽה־־׃
translation:
  text: If the iron is dull and one has not sharpened its edge, then he must use more
    strength; but wisdom brings success.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If the iron is dull and one has not sharpened the edge, then one must
      exert more force; and the advantage of wisdom is that it gives success.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the iron' likely refers to an iron blade or tool, not iron in the
      abstract.
    reason: cultural_note
lexical_decisions:
- source_word: קֵהָה
  chosen: is dull
  alternatives:
  - has become blunt
  - is blunt
  lexicon: HALOT
  rationale: The verb/adjective conveys bluntness or dullness of an edge. 'Is dull'
    is natural English and fits the image of an unsharpened iron tool.
- source_word: הַבַּרְזֶל
  chosen: the iron
  alternatives:
  - the axe iron
  - the metal
  lexicon: HALOT
  rationale: The Hebrew says 'the iron,' likely referring metonymically to an iron
    tool or blade. Retaining 'the iron' preserves the Hebrew expression while allowing
    the context to imply a cutting implement.
- source_word: פָנִים
  chosen: its edge
  alternatives:
  - its face
  - the surface
  lexicon: HALOT
  rationale: Literally 'face(s),' but in this context of a blade or tool it idiomatically
    refers to the working face/edge. 'Its edge' best communicates the practical sense
    in English.
- source_word: קִלְקַ֔ל
  chosen: has not sharpened
  alternatives:
  - has not prepared
  - has not polished
  - has not made smooth
  lexicon: HALOT
  rationale: In context with a dull iron and 'face/edge,' the verb most plausibly
    refers to putting the blade in order, i.e., sharpening or honing it. This is the
    standard contextual sense and makes coherent the contrast with exerting more force.
- source_word: וַחֲיָלִים יְגַבֵּר
  chosen: then he must use more strength
  alternatives:
  - then he increases his strength
  - then he must exert greater force
  lexicon: HALOT
  rationale: חַיִל can denote strength, power, or resources; גבר in the piel conveys
    making strong or increasing. The clause means that greater force is required when
    the tool is dull. 'Must use more strength' expresses the practical consequence
    clearly.
- source_word: וְיִתְרוֹן
  chosen: but
  alternatives:
  - and the advantage is
  - and profit is
  lexicon: HALOT
  rationale: Literally the noun means 'advantage, profit, gain.' In this proverb-like
    sentence it introduces the contrasting payoff of wisdom. Rendering it as 'but'
    in the main text yields idiomatic English, while the notion of advantage is carried
    by 'brings success.'
- source_word: הכשיר
  chosen: brings success
  alternatives:
  - makes fit
  - makes right
  - enables success
  - gives advantage
  lexicon: HALOT
  rationale: The hiphil infinitive/verb from כשר carries the sense of making suitable,
    successful, or effective. In context, wisdom is what enables effective action
    and favorable outcome.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering. Here it refers to practical skill and sound judgment,
    matching Qoheleth's theme that wisdom yields advantage in ordinary life.
