id: ECC.10.3
reference: Ecclesiastes 10:3
source:
  edition: WLC
  text: וְ/גַם בַּ/דֶּ֛רֶךְ כ/ש/ה/סכל הֹלֵ֖ךְ לִבּ֣/וֹ חָסֵ֑ר וְ/אָמַ֥ר לַ/כֹּ֖ל סָכָ֥ל
    הֽוּא־׃
translation:
  text: Even on the road, when the fool walks, his sense is lacking, and he says to
    everyone that he is a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and says to everyone, “He is a fool.”' The Hebrew may be taken either
      as the fool exposing himself as a fool, or as him calling others fools; the
      former best fits the context of self-disclosing folly.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: Even
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional observation with slight emphasis. 'Even' captures
    the sense that this is true in an ordinary/public setting as well.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - on the way
  - in the street
  lexicon: HALOT
  rationale: Literal spatial phrase. 'On the road' is natural modern English and preserves
    the image of public movement/life.
- source_word: כשהסכל
  chosen: when the fool
  alternatives:
  - as the fool
  - whenever the fool
  lexicon: HALOT
  rationale: The prefixed כ + ש functions idiomatically as a temporal conjunction
    here. 'When the fool' gives clear English sense without over-literal awkwardness.
- source_word: הֹלֵךְ
  chosen: walks
  alternatives:
  - goes
  - is walking
  lexicon: HALOT
  rationale: Common participial verb of movement. 'Walks' fits the road imagery and
    reads idiomatically.
- source_word: לִבּוֹ חָסֵר
  chosen: his sense is lacking
  alternatives:
  - his heart is lacking
  - he lacks sense
  - his mind fails him
  lexicon: HALOT
  rationale: Hebrew 'heart' often denotes intellect/judgment, not merely emotion.
    Rendering the idiom as 'his sense is lacking' communicates the intended meaning
    in readable English while preserving the predicate structure.
- source_word: וְאָמַר
  chosen: and he says
  alternatives:
  - and he tells
  - and he declares
  lexicon: HALOT
  rationale: Simple narrative continuation with direct/indirect speech force. 'Says'
    is the most straightforward rendering.
- source_word: לַכֹּל
  chosen: to everyone
  alternatives:
  - to all
  - to everybody
  lexicon: HALOT
  rationale: Refers to all those he encounters. 'To everyone' is natural and clear.
- source_word: סָכָל הוּא
  chosen: that he is a fool
  alternatives:
  - '''He is a fool'''
  - that he is foolish
  lexicon: HALOT
  rationale: Most naturally understood as the fool, by his speech/behavior, effectively
    announcing his own folly. The indirect form avoids ambiguity in English punctuation
    while preserving the sense. 'Fool' is preferable to adjectival 'foolish' because
    the Hebrew uses the noun.
