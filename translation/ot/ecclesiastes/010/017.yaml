id: ECC.10.17
reference: Ecclesiastes 10:17
source:
  edition: WLC
  text: אַשְׁרֵ֣י/ךְ אֶ֔רֶץ שֶׁ/מַּלְכֵּ֖/ךְ בֶּן חוֹרִ֑ים וְ/שָׂרַ֨יִ/ךְ֙ בָּ/עֵ֣ת
    יֹאכֵ֔לוּ בִּ/גְבוּרָ֖ה וְ/לֹ֥א בַ/שְּׁתִֽי־׃
translation:
  text: Happy are you, O land, when your king is a son of nobles, and your princes
    eat at the proper time, for strength and not for drunkenness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed are you, O land.' The Hebrew אַשְׁרֵי can also be rendered 'blessed'
      or 'fortunate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whose king is of noble birth' or, more literally, 'a son of nobles.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'for strength and not for drinking'; the sense is eating for vigor
      rather than for intoxication.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵיךְ
  chosen: Happy are you
  alternatives:
  - Blessed are you
  - Fortunate are you
  lexicon: HALOT
  rationale: The interjection אַשְׁרֵי expresses a state of enviable well-being or
    felicity. 'Happy are you' is natural modern English and fits wisdom-style beatitude
    language here. 'Blessed' is possible, but in this context the saying concerns
    civic flourishing rather than an explicit divine benediction.
- source_word: אֶרֶץ
  chosen: O land
  alternatives:
  - land
  - country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'country.' Here it addresses a political realm
    in parallel with king and princes. 'O land' preserves the direct address and the
    poetic tone better than a flatter 'country.'
- source_word: שֶׁמַּלְכֵּךְ
  chosen: when your king
  alternatives:
  - whose king
  lexicon: HALOT
  rationale: The relative particle plus noun phrase can be rendered literally as 'whose
    king,' but English idiom is smoother with 'when your king' in this beatitude construction,
    while preserving the conditional-descriptive sense.
- source_word: בֶּן חוֹרִים
  chosen: a son of nobles
  alternatives:
  - of noble birth
  - a son of free men
  lexicon: HALOT
  rationale: חוֹרִים denotes nobles/freeborn persons. The phrase points to honorable
    or noble lineage in contrast to the 'servant' imagery of the previous verse. 'A
    son of nobles' stays close to the Hebrew while remaining clear. 'Free men' is
    lexically possible but less idiomatic in this royal context.
- source_word: וְשָׂרַיִךְ
  chosen: and your princes
  alternatives:
  - and your officials
  - and your rulers
  lexicon: HALOT
  rationale: שָׂרִים commonly refers to princes, officials, or rulers. 'Princes' preserves
    the courtly-political setting and matches the royal context of Ecclesiastes 10:17.
- source_word: בָּעֵת
  chosen: at the proper time
  alternatives:
  - in due season
  - at the right time
  lexicon: HALOT
  rationale: The phrase indicates fitting or appropriate timing, especially in contrast
    to the previous verse's morning feasting. 'At the proper time' makes the moral
    contrast explicit without over-paraphrasing.
- source_word: יֹאכֵלוּ
  chosen: eat
  alternatives:
  - feast
  - dine
  lexicon: HALOT
  rationale: The basic verb is 'eat.' Although the context involves courtly banqueting,
    the simple gloss should be retained unless context requires expansion.
- source_word: בִּגְבוּרָה
  chosen: for strength
  alternatives:
  - with self-control
  - for vigor
  - in strength
  lexicon: HALOT
  rationale: גְּבוּרָה often denotes strength, might, or vigor. In this context it
    likely means eating for the sake of strength or sustenance rather than indulgence.
    'For strength' captures the purposive sense naturally in English.
- source_word: וְלֹא בַשְּׁתִי
  chosen: and not for drunkenness
  alternatives:
  - and not for drinking
  - and not in drunkenness
  lexicon: HALOT
  rationale: שְׁתִי is related to drinking, and in this contrastive wisdom context
    it points to drinking as indulgence, i.e., drunkenness. 'Not for drunkenness'
    brings out the vice being condemned more clearly than the overly literal 'not
    for drinking,' since drinking itself is not the issue but intemperance is.
