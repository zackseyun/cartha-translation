id: ECC.10.19
reference: Ecclesiastes 10:19
source:
  edition: WLC
  text: לִ/שְׂחוֹק֙ עֹשִׂ֣ים לֶ֔חֶם וְ/יַ֖יִן יְשַׂמַּ֣ח חַיִּ֑ים וְ/הַ/כֶּ֖סֶף יַעֲנֶ֥ה
    אֶת הַ/כֹּֽל־׃
translation:
  text: They make bread for laughter, and wine gladdens life, and money answers everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'money is the answer to everything'; the Hebrew literally says 'money
      answers everything.'
    reason: lexical_alternative
  - marker: b
    text: '''Bread'' here may stand for food or a meal more broadly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׂחוֹק
  chosen: for laughter
  alternatives:
  - for merriment
  - for amusement
  - for pleasure
  lexicon: HALOT
  rationale: The preposition ל marks purpose/result, and שְׂחוֹק denotes laughter
    or merriment. 'For laughter' is concise and preserves the Hebrew's somewhat aphoristic
    tone better than a more interpretive expansion.
- source_word: עֹשִׂים לֶחֶם
  chosen: they make bread
  alternatives:
  - bread is made
  - they prepare a feast
  lexicon: HALOT
  rationale: The plural verb naturally takes an indefinite subject, 'they.' לֶחֶם
    is literally 'bread,' though in context it can stand metonymically for food or
    a meal. I retain 'bread' to stay close to the Hebrew while allowing readers to
    infer the broader sense.
- source_word: וְיַיִן יְשַׂמַּח חַיִּים
  chosen: and wine gladdens life
  alternatives:
  - and wine makes life glad
  - and wine gladdens the living
  - and wine cheers life
  lexicon: HALOT
  rationale: יַיִן is straightforwardly 'wine.' The Piel of שׂמח means 'make glad/gladden.'
    חַיִּים can mean 'life' or 'the living'; here 'life' best fits the proverbial
    statement and avoids an awkward personal object in English.
- source_word: וְהַכֶּסֶף
  chosen: and money
  alternatives:
  - and silver
  lexicon: HALOT
  rationale: כֶּסֶף can mean either 'silver' or 'money.' In this wisdom context the
    economic sense is primary, so 'money' communicates the point more clearly in modern
    English.
- source_word: יַעֲנֶה אֶת־הַכֹּל
  chosen: answers everything
  alternatives:
  - meets every need
  - responds to everything
  - is the answer to everything
  lexicon: HALOT
  rationale: ענה ordinarily means 'answer, respond.' In this context it likely carries
    the idiomatic sense that money provides a response or solution in many situations.
    'Answers everything' preserves the Hebrew wording and the verse's sharp, possibly
    ironic, compression better than a fuller paraphrase.
