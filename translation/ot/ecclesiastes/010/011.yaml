id: ECC.10.11
reference: Ecclesiastes 10:11
source:
  edition: WLC
  text: אִם יִשֹּׁ֥ךְ הַ/נָּחָ֖שׁ בְּ/לוֹא לָ֑חַשׁ וְ/אֵ֣ין יִתְר֔וֹן לְ/בַ֖עַל הַ/לָּשֽׁוֹן־־׃
translation:
  text: If the snake bites before it is charmed, there is no advantage for the charmer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for the master/owner of the tongue.' The phrase likely refers
      to a snake charmer, that is, one skilled in spoken charm or incantation.
    reason: lexical_alternative
  - marker: b
    text: Or 'If the snake bites without an incantation, there is no profit for the
      master of the tongue.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely/indeed if
  - when
  lexicon: HALOT
  rationale: Introduces a conditional or illustrative case. 'If' is the most natural
    English rendering and fits the proverb-like observation.
- source_word: יִשֹּׁךְ
  chosen: bites
  alternatives:
  - strikes
  - bites someone
  lexicon: HALOT
  rationale: The verb נשׁך commonly means 'bite,' especially of a serpent. 'Bites'
    is direct and idiomatic.
- source_word: הַנָּחָשׁ
  chosen: the snake
  alternatives:
  - the serpent
  lexicon: HALOT
  rationale: Refers to a literal snake in the proverb's imagery. 'Snake' is more natural
    modern English than 'serpent' here, without theological overtones not present
    in context.
- source_word: בְּלוֹא לָחַשׁ
  chosen: before it is charmed
  alternatives:
  - without an incantation
  - without whispering
  - before the charm
  lexicon: HALOT
  rationale: לחש can denote whispering, enchantment, or charming in connection with
    snake charming. The preposition plus negation yields the sense 'without/before
    charm(ing).' 'Before it is charmed' best captures the temporal-practical sense
    in context.
- source_word: וְאֵין יִתְרוֹן
  chosen: there is no advantage
  alternatives:
  - there is no profit
  - there is no gain
  lexicon: HALOT
  rationale: יתרון is a key Qoheleth term meaning advantage, profit, or gain. 'Advantage'
    preserves the thematic vocabulary of Ecclesiastes while remaining readable.
- source_word: לְבַעַל הַלָּשׁוֹן
  chosen: for the charmer
  alternatives:
  - for the master of the tongue
  - for the master of speech
  - for the one with the tongue
  lexicon: HALOT
  rationale: Literally 'owner/master of the tongue.' In this context, the idiom most
    plausibly refers to the snake charmer, the one skilled in spoken charm or incantation.
    Rendering it idiomatically avoids misleading readers into taking 'tongue' as ordinary
    speech alone, while preserving the proverb's point.
