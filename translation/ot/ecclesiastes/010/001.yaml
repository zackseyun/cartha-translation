id: ECC.10.1
reference: Ecclesiastes 10:1
source:
  edition: WLC
  text: זְב֣וּבֵי מָ֔וֶת יַבְאִ֥ישׁ יַבִּ֖יעַ שֶׁ֣מֶן רוֹקֵ֑חַ יָקָ֛ר מֵ/חָכְמָ֥ה
    מִ/כָּב֖וֹד סִכְל֥וּת מְעָֽט׃
translation:
  text: Dead flies make a perfumer’s oil stink and bubble up; so a little folly outweighs
    wisdom and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ferment,' 'give off bubbles,' or more generally 'spoil.' The Hebrew
      verb suggests an active emission or bubbling from the ruined oil.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''is more precious than.'' The Hebrew can be read as a comparison of
      value: ''a little folly is weightier/more significant than wisdom and honor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבוּבֵי מָוֶת
  chosen: Dead flies
  alternatives:
  - flies of death
  - deadly flies
  lexicon: HALOT
  rationale: Construct phrase literally means 'flies of death.' In context it refers
    to flies associated with death/decay, best rendered idiomatically as 'dead flies'
    in English, matching the image of carrion flies contaminating ointment.
- source_word: יַבְאִישׁ
  chosen: make ... stink
  alternatives:
  - cause to stink
  - make foul
  lexicon: HALOT
  rationale: Hiphil of באש means to cause a bad smell or make stink. 'Make ... stink'
    is vivid, natural English and preserves the causative force.
- source_word: יַבִּיעַ
  chosen: bubble up
  alternatives:
  - ferment
  - give off bubbles
  - send forth
  lexicon: HALOT
  rationale: The verb can denote bubbling up, gushing, or causing to emit. In this
    proverb's imagery, spoiled oil producing an active, visible corruption is well
    conveyed by 'bubble up.' This also preserves the parallel with the preceding verb
    describing spoilage.
- source_word: שֶׁמֶן רוֹקֵחַ
  chosen: a perfumer’s oil
  alternatives:
  - perfumed oil
  - ointment of a perfumer
  - apothecary's ointment
  lexicon: HALOT
  rationale: Literally 'oil of a mixer/perfumer.' 'A perfumer’s oil' is clear modern
    English and keeps the artisan sense of רֹקֵחַ without archaic 'apothecary.'
- source_word: יָקָר
  chosen: outweighs
  alternatives:
  - is more precious than
  - is weightier than
  - is costlier than
  lexicon: HALOT
  rationale: Though the adjective commonly means 'precious/valuable,' in this comparative
    proverb it likely carries the sense of having greater weight or consequence. 'Outweighs'
    captures the evaluative comparison naturally in English and fits the proverb's
    point that a little folly can count for more, negatively, than wisdom and honor.
- source_word: מֵחָכְמָה מִכָּבוֹד
  chosen: wisdom and honor
  alternatives:
  - wisdom than honor
  - wisdom, than honor
  - wisdom and glory
  lexicon: HALOT
  rationale: The paired prepositional phrases are best taken together as the things
    surpassed in value/reputation by a little folly. 'Honor' is preferable to 'glory'
    in this human social context.
- source_word: סִכְלוּת מְעָט
  chosen: a little folly
  alternatives:
  - a small amount of folly
  - slight foolishness
  lexicon: HALOT
  rationale: 'Straightforward rendering of noun + adjective. The phrase is intentionally
    paradoxical: even a small amount of folly can have disproportionate effect.'
