id: ECC.10.2
reference: Ecclesiastes 10:2
source:
  edition: WLC
  text: לֵ֤ב חָכָם֙ לִֽ/ימִינ֔/וֹ וְ/לֵ֥ב כְּסִ֖יל לִ/שְׂמֹאלֽ/וֹ׃
translation:
  text: A wise man's heart is at his right hand, but a fool's heart at his left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his right ... to his left.' The Hebrew idiom uses right and left
      as symbolic orientations, likely implying sound judgment versus poor judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person, including thought and disposition.
    'Heart' is the standard and most transparent English rendering, preserving the
    Hebrew idiom rather than reducing it to merely 'mind'.
- source_word: חָכָם
  chosen: wise man
  alternatives:
  - wise person
  - the wise
  lexicon: HALOT
  rationale: The adjective functions substantivally here. Because the Hebrew is grammatically
    masculine singular and contrasts with כְּסִיל in the same form, 'wise man' best
    reflects the source in keeping with the project's gender-accurate policy.
- source_word: לִימִינוֹ
  chosen: at his right hand
  alternatives:
  - to his right
  - on his right side
  lexicon: HALOT
  rationale: The preposition ל with 'right' here expresses orientation or side. 'At
    his right hand' preserves the Hebrew imagery and the traditional symbolic contrast
    of right versus left without over-interpreting it.
- source_word: כְּסִיל
  chosen: fool
  alternatives:
  - stupid man
  - dullard
  lexicon: HALOT
  rationale: '''Fool'' is the standard wisdom-literature rendering for כְּסִיל and
    carries the moral-intellectual sense intended in Ecclesiastes better than more
    colloquial insults.'
- source_word: לִשְׂמֹאלוֹ
  chosen: at his left
  alternatives:
  - to his left
  - on his left side
  lexicon: HALOT
  rationale: As with 'at his right hand,' this preserves the Hebrew spatial metaphor
    and the rhetorical parallelism. 'At his left' is concise and natural in English.
