theological_decisions:
- issue: Gendered substantival adjectives in wisdom contrast
  chosen_reading: Render masculine singular forms as 'wise man' and 'fool'/'a fool's
    heart' rather than gender-neutral paraphrase.
  alternative_readings:
  - A wise person's heart is to the right, but a fool's heart to the left.
  rationale: The verse uses grammatically masculine singular forms in a representative
    wisdom saying. Per the project's gender-accurate policy, the translation should
    reflect the source's form and intent rather than flatten it into a neutral abstraction.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
