id: ECC.10.6
reference: Ecclesiastes 10:6
source:
  edition: WLC
  text: נִתַּ֣ן הַ/סֶּ֔כֶל בַּ/מְּרוֹמִ֖ים רַבִּ֑ים וַ/עֲשִׁירִ֖ים בַּ/שֵּׁ֥פֶל יֵשֵֽׁבוּ׃
translation:
  text: Folly is set in many high places, and the rich sit in a low place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Foolishness is placed in many exalted positions.' The Hebrew uses spatial
      language ('high places' / 'low place') metaphorically for social rank or office.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִתַּן
  chosen: is set
  alternatives:
  - is placed
  - is appointed
  lexicon: HALOT
  rationale: 'The Niphal perfect of נתן is passive: ''is given/placed/set.'' ''Is
    set'' is concise and idiomatic in English, preserving the passive sense without
    over-specifying agency.'
- source_word: הַסֶּכֶל
  chosen: folly
  alternatives:
  - the fool
  - stupidity
  - foolishness
  lexicon: HALOT
  rationale: The noun denotes folly/foolishness rather than a specific individual.
    'Folly' fits Qoheleth's thematic contrast with wisdom and works naturally as the
    subject of the passive verb.
- source_word: בַּמְּרוֹמִים רַבִּים
  chosen: in many high places
  alternatives:
  - in great heights
  - in many exalted positions
  - in high offices
  lexicon: HALOT
  rationale: מְרוֹמִים refers literally to heights or elevated places, here metaphorically
    to positions of prominence. 'High places' preserves the metaphor, while 'many'
    reflects רַבִּים modifying the phrase.
- source_word: וַעֲשִׁירִים
  chosen: and the rich
  alternatives:
  - and rich men
  - and wealthy people
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The rich' is
    natural English and preserves the social class reference without adding gendered
    specificity not required by the context.
- source_word: בַּשֵּׁפֶל
  chosen: in a low place
  alternatives:
  - in lowliness
  - in a humble place
  - in the low place
  lexicon: HALOT
  rationale: שֵׁפֶל denotes lowness or a low place/condition. 'In a low place' preserves
    the spatial metaphor corresponding to 'high places' in the first colon.
- source_word: יֵשֵׁבוּ
  chosen: sit
  alternatives:
  - dwell
  - remain seated
  - are seated
  lexicon: HALOT
  rationale: ישב commonly means 'sit' and here likely conveys occupying a social position.
    'Sit' keeps the parallelism vivid and avoids over-interpretation.
