id: ECC.10.12
reference: Ecclesiastes 10:12
source:
  edition: WLC
  text: דִּבְרֵ֥י פִי חָכָ֖ם חֵ֑ן וְ/שִׂפְת֥וֹת כְּסִ֖יל תְּבַלְּעֶֽ/נּוּ־׃
translation:
  text: The words from the mouth of a wise man are gracious, but the lips of a fool
    swallow him up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The words from the mouth of a wise man bring favor,' with חֵן understood
      more concretely as 'favor' or 'grace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here refers to spoken expressions; 'words'
    is the most natural and sufficiently formal rendering in English.
- source_word: פִי
  chosen: from the mouth of
  alternatives:
  - of the mouth of
  - from a wise man's mouth
  lexicon: HALOT
  rationale: The construct chain דִּבְרֵי פִי חָכָם is idiomatically rendered in English
    as 'words from the mouth of a wise man,' preserving the concrete imagery while
    reading naturally.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise man
  - a wise person
  lexicon: HALOT
  rationale: Masculine singular adjective used substantivally. 'A wise man' preserves
    the gender and singular form in keeping with the project's gender-accurate policy;
    the generic sense is still clear from context.
- source_word: חֵן
  chosen: gracious
  alternatives:
  - grace
  - favor
  - pleasant
  lexicon: HALOT
  rationale: Predicate noun literally 'grace/favor.' In idiomatic English, 'are gracious'
    best conveys that the wise man's words are characterized by grace or favorableness,
    rather than equating the words abstractly with 'grace.'
- source_word: שִׂפְתוֹת
  chosen: the lips of
  alternatives:
  - the speech of
  - the mouth of
  lexicon: HALOT
  rationale: Literal 'lips' is retained because it is natural in English and preserves
    the poetic parallel with 'mouth' in the first colon.
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - the fool
  - a stupid man
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and intellectually foolish
    person. 'A fool' is the established and accurate rendering.
- source_word: תְּבַלְּעֶנּוּ
  chosen: swallow him up
  alternatives:
  - devour him
  - consume him
  lexicon: HALOT
  rationale: From בלע 'swallow, engulf.' The feminine singular verb agrees with the
    plural/collective subject 'lips' as a grammatical unit. 'Swallow him up' preserves
    the vivid metaphor that the fool's own speech destroys him.
