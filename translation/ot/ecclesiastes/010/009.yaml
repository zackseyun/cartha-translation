id: ECC.10.9
reference: Ecclesiastes 10:9
source:
  edition: WLC
  text: מַסִּ֣יעַ אֲבָנִ֔ים יֵעָצֵ֖ב בָּ/הֶ֑ם בּוֹקֵ֥עַ עֵצִ֖ים יִסָּ֥כֶן בָּֽ/ם׃
translation:
  text: Whoever quarries stones may be hurt by them, and whoever splits logs may be
    endangered by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever moves/removes stones may be hurt by them.' The Hebrew verb can
      denote shifting or dislodging stones more generally, not only quarrying them.
    reason: lexical_alternative
  - marker: b
    text: Or 'wood' instead of 'logs.' The Hebrew can refer broadly to wood or trees;
      here it likely means pieces of wood being split.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַסִּיעַ
  chosen: quarries
  alternatives:
  - moves
  - removes
  - shifts
  lexicon: HALOT
  rationale: From נסע in the Hiphil participle, here in context with 'stones' it most
    naturally refers to dislodging or extracting stones rather than generic travel
    or movement. 'Quarries' gives the occupational/action sense in idiomatic English
    while preserving the concrete image and implied hazard.
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: Standard rendering of אבן in the plural. 'Stones' fits both literal sense
    and the likely quarrying/building context.
- source_word: יֵעָצֵב
  chosen: may be hurt
  alternatives:
  - will be pained
  - may be injured
  - will suffer
  lexicon: HALOT
  rationale: Niphal of עצב can denote being hurt, pained, or injured. In this proverb
    about occupational risk, physical harm is primary. 'May be hurt' preserves the
    generality without over-specifying the type of injury.
- source_word: בָּהֶם
  chosen: by them
  alternatives:
  - with them
  - through them
  lexicon: HALOT
  rationale: 'The preposition ב with the pronominal suffix here is best rendered instrumentally/causally:
    the stones are the means/source of the injury.'
- source_word: בּוֹקֵעַ
  chosen: splits
  alternatives:
  - cleaves
  - chops
  lexicon: HALOT
  rationale: From בקע, 'split' or 'cleave.' 'Splits' is natural modern English and
    matches the image of dividing wood.
- source_word: עֵצִים
  chosen: logs
  alternatives:
  - wood
  - trees
  lexicon: HALOT
  rationale: Although עֵצִים can mean 'wood' or 'trees,' in parallel with the participle
    'splits' the sense is cut timber or pieces of wood. 'Logs' makes the action and
    danger clearer in English without departing from the literal scene.
- source_word: יִסָּכֶן
  chosen: may be endangered
  alternatives:
  - may be put in danger
  - may be harmed
  - may be endangered thereby
  lexicon: HALOT
  rationale: 'From סכן in the Niphal, the sense is to be endangered or exposed to
    danger. This is slightly broader than direct injury and suits the parallelism:
    quarrying stones may hurt; splitting wood may expose one to danger.'
- source_word: בָּם
  chosen: by them
  alternatives:
  - with them
  - through them
  lexicon: HALOT
  rationale: 'As in the first colon, the preposition is best taken instrumentally:
    the wood/logs are the occasion or means of danger.'
