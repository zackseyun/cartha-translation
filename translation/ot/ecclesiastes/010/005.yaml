id: ECC.10.5
reference: Ecclesiastes 10:5
source:
  edition: WLC
  text: יֵ֣שׁ רָעָ֔ה רָאִ֖יתִי תַּ֣חַת הַ/שָּׁ֑מֶשׁ כִּ/שְׁגָגָ֕ה שֶׁ/יֹּצָ֖א מִ/לִּ/פְנֵ֥י
    הַ/שַּׁלִּֽיט׃
translation:
  text: 'There is an evil I have seen under the sun, like an error that goes out from
    before the ruler:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a mistake that proceeds from the presence of the ruler.' The Hebrew
      wording can suggest either an actual inadvertent error or something treated
      as though it were an error.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle introducing an observation; 'There is' is natural
    modern English and preserves the presentative force.
- source_word: רָעָה
  chosen: an evil
  alternatives:
  - a wrong
  - an evil thing
  - a misfortune
  lexicon: HALOT
  rationale: In Ecclesiastes this noun often denotes something bad or grievous observed
    in the world. 'An evil' preserves the moral/negative weight without over-specifying
    whether it is moral evil or calamity.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Perfect of ראה in Qoheleth commonly introduces reflective observation.
    English present perfect fits the discourse well, conveying a witnessed reality
    with present relevance.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: Stock Ecclesiastes expression for life in the earthly realm. Traditional
    and accurate idiom; no need to paraphrase.
- source_word: כִּשְׁגָגָה
  chosen: like an error
  alternatives:
  - like a mistake
  - as an inadvertence
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). שגגה denotes an error, inadvertence,
    or mistake. 'Like an error' preserves the simile and leaves open whether the act
    is truly accidental or only appears so.
- source_word: שֶׁיֹּצָא
  chosen: that goes out
  alternatives:
  - that proceeds
  - that comes forth
  lexicon: HALOT
  rationale: From יצא, 'go out/come forth.' 'Goes out' is a close rendering and works
    idiomatically with the following phrase 'from before the ruler.'
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from
  lexicon: HALOT
  rationale: Literally 'from before/from the presence of.' Retaining 'from before'
    keeps the concrete courtly imagery and the sense of origin in the ruler's presence.
- source_word: הַשַּׁלִּיט
  chosen: the ruler
  alternatives:
  - the one in power
  - the sovereign
  lexicon: HALOT
  rationale: שׁליט denotes one exercising authority. 'The ruler' is clear, natural,
    and suitably broad; 'sovereign' would sound more elevated than the context requires.
