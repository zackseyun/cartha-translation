id: ECC.10.7
reference: Ecclesiastes 10:7
source:
  edition: WLC
  text: רָאִ֥יתִי עֲבָדִ֖ים עַל סוּסִ֑ים וְ/שָׂרִ֛ים הֹלְכִ֥ים כַּ/עֲבָדִ֖ים עַל הָ/אָֽרֶץ־־׃
translation:
  text: I have seen slaves on horses, and princes walking on the ground like slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' for 'slaves' (Hebrew עֲבָדִים); 'slaves' is chosen here because
      the verse emphasizes a stark reversal of social rank.
    reason: lexical_alternative
  - marker: b
    text: Or 'nobles' for 'princes' (Hebrew שָׂרִים), referring to people of high
      rank or authority.
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the earth/land'; the sense here is that they are traveling
      unmounted, in contrast to those 'on horses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. In Qoheleth, the perfect often reports personal
    observation with present relevance; 'I have seen' preserves that experiential
    force in idiomatic English, though 'I saw' is possible.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  lexicon: HALOT
  rationale: 'Plural of עֶבֶד. Here the contrast is social status reversal: those
    of low status are elevated, while nobles are humiliated. ''Slaves'' better preserves
    the bonded/low-status sense than the softer ''servants,'' in line with the project''s
    handling of cognate contested terms where bonded status is salient.'
- source_word: עַל סוּסִים
  chosen: on horses
  alternatives:
  - riding on horses
  lexicon: HALOT
  rationale: Literally 'on horses.' In context it implies mounted status and privilege.
    'On horses' is sufficiently natural and stays close to the Hebrew; 'riding on
    horses' is interpretive but not necessary.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - officials
  - nobles
  - rulers
  lexicon: HALOT
  rationale: שָׂרִים denotes high-ranking persons, leaders, or nobles. 'Princes' is
    a traditional and still intelligible rendering that captures elevated rank without
    over-specifying governmental function. 'Nobles' is also viable; 'princes' best
    matches the social-status contrast with 'slaves.'
- source_word: הֹלְכִים
  chosen: walking
  alternatives:
  - going
  lexicon: HALOT
  rationale: Participle of הלך, describing ongoing action. 'Walking' fits the concrete
    image and sharpens the contrast with mounted slaves.
- source_word: כַּעֲבָדִים
  chosen: like slaves
  alternatives:
  - as slaves
  lexicon: HALOT
  rationale: 'Comparative כ plus noun: the princes are not identified as slaves but
    compared to them in condition or appearance. ''Like slaves'' is the clearest natural
    English equivalent.'
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - on the earth
  - on foot
  lexicon: HALOT
  rationale: Literally 'on the الأرض/land.' In this context the phrase contrasts with
    being mounted on horses. 'On the ground' preserves the concrete contrast better
    than the broader 'on the earth.' 'On foot' is idiomatic but slightly more interpretive
    than the Hebrew wording.
