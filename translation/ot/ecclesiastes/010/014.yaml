id: ECC.10.14
reference: Ecclesiastes 10:14
source:
  edition: WLC
  text: וְ/הַ/סָּכָ֖ל יַרְבֶּ֣ה דְבָרִ֑ים לֹא יֵדַ֤ע הָ/אָדָם֙ מַה שֶׁ/יִּֽהְיֶ֔ה
    וַ/אֲשֶׁ֤ר יִֽהְיֶה֙ מֵֽ/אַחֲרָ֔י/ו מִ֖י יַגִּ֥יד לֽ/וֹ־־׃
translation:
  text: And the fool multiplies words. A man does not know what will be, and who can
    tell him what will be after him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Man does not know' or 'Humankind does not know.' The Hebrew has the
      singular הָאָדָם, a representative singular for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or, 'what will happen after him' or 'what will be after he is gone.' The
      Hebrew may refer to what comes after a person in time, especially after his
      life.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַסָּכָל
  chosen: And the fool
  alternatives:
  - But the fool
  - And the foolish man
  lexicon: HALOT
  rationale: הַסָּכָל is a definite singular noun meaning 'the fool.' The conjunction
    וְ is retained as 'And' to preserve the discourse flow, though 'But' is possible
    contextually. 'The fool' is the most natural and direct rendering.
- source_word: יַרְבֶּה דְבָרִים
  chosen: multiplies words
  alternatives:
  - talks much
  - increases words
  - keeps talking
  lexicon: HALOT
  rationale: The Hiphil of רבה with דְבָרִים is idiomatic for speaking many words.
    'Multiplies words' preserves the Hebrew image while remaining understandable in
    modern English.
- source_word: לֹא יֵדַע הָאָדָם
  chosen: A man does not know
  alternatives:
  - Man does not know
  - Humankind does not know
  - No one knows
  lexicon: HALOT
  rationale: הָאָדָם here is generic rather than a specific individual. Per the doctrine's
    gender-accurate principle and the default handling of אָדָם, 'A man' preserves
    the representative singular. 'Humankind' is possible but less faithful to the
    singular form; 'No one' is too interpretive.
- source_word: מַה שֶׁיִּהְיֶה
  chosen: what will be
  alternatives:
  - what is to happen
  - what shall be
  lexicon: HALOT
  rationale: A straightforward future expression. 'What will be' is idiomatic and
    concise, matching the Hebrew's open-ended reference to the future.
- source_word: וַאֲשֶׁר יִהְיֶה מֵאַחֲרָיו
  chosen: what will be after him
  alternatives:
  - what will happen after him
  - what will be after he is gone
  - what comes after him
  lexicon: HALOT
  rationale: The phrase refers to what will occur after a person's time or after him.
    'What will be after him' stays close to the Hebrew and preserves the ambiguity
    between events after his life and events following him more generally.
- source_word: מִי יַגִּיד לוֹ
  chosen: who can tell him
  alternatives:
  - who will tell him
  - who can declare it to him
  lexicon: HALOT
  rationale: The interrogative plus Hiphil of נגד asks who is able to inform him.
    'Who can tell him' is natural English and captures the rhetorical force better
    than a wooden 'declare.'
