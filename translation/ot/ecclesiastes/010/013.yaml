id: ECC.10.13
reference: Ecclesiastes 10:13
source:
  edition: WLC
  text: תְּחִלַּ֥ת דִּבְרֵי פִ֖י/הוּ סִכְל֑וּת וְ/אַחֲרִ֣ית פִּ֔י/הוּ הוֹלֵל֖וּת רָעָֽה־׃
translation:
  text: The beginning of the words of his mouth is foolishness, and the end of his
    mouth is evil madness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end of his speech is harmful madness.' The Hebrew repeats 'his mouth'
      literally, and רָעָה can be understood as 'evil' or more broadly 'harmful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִלַּת
  chosen: the beginning of
  alternatives:
  - the start of
  lexicon: HALOT
  rationale: Construct form meaning 'beginning of' or 'first part of.' 'The beginning
    of' preserves the nominal construction naturally in English.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the speech of
  - the matters of
  lexicon: HALOT
  rationale: Plural construct of דָּבָר here refers to spoken words rather than 'matters'
    in the abstract. 'Words of' best fits the immediate context of speech.
- source_word: פִּיהוּ
  chosen: his mouth
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Literally 'his mouth.' Retaining the body-part idiom preserves the Hebrew
    imagery and the parallel repetition later in the verse.
- source_word: סִכְלוּת
  chosen: foolishness
  alternatives:
  - folly
  - stupidity
  lexicon: HALOT
  rationale: Denotes folly or foolishness. 'Foolishness' is clear modern English and
    matches Qoheleth's recurring wisdom/folly contrast.
- source_word: וְאַחֲרִית
  chosen: and the end of
  alternatives:
  - and the latter end of
  - and the outcome of
  lexicon: HALOT
  rationale: Means 'end,' 'latter end,' or 'outcome.' In this parallel line, 'the
    end of' best mirrors 'the beginning of' while allowing the sense of final result.
- source_word: פִּיהוּ
  chosen: his mouth
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Repeated literally in the Hebrew. Keeping 'his mouth' maintains the poetic
    parallelism, though English could smooth it to 'his speech.'
- source_word: הוֹלֵלוּת
  chosen: madness
  alternatives:
  - folly
  - senselessness
  lexicon: HALOT
  rationale: In Ecclesiastes this term often carries the sense of irrationality or
    madness rather than ordinary folly. 'Madness' preserves the intensification from
    the earlier 'foolishness.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harmful
  - wicked
  lexicon: HALOT
  rationale: Adjective qualifying 'madness.' 'Evil' preserves the moral force and
    the starkness of the Hebrew better than the softer 'harmful'.
