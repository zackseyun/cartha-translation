id: ECC.10.4
reference: Ecclesiastes 10:4
source:
  edition: WLC
  text: אִם ר֤וּחַ הַ/מּוֹשֵׁל֙ תַּעֲלֶ֣ה עָלֶ֔י/ךָ מְקוֹמְ/ךָ֖ אַל תַּנַּ֑ח כִּ֣י
    מַרְפֵּ֔א יַנִּ֖יחַ חֲטָאִ֥ים גְּדוֹלִֽים־־׃
translation:
  text: If the ruler’s anger rises against you, do not leave your post, for calmness
    puts great offenses to rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ruler’s spirit' or 'the ruler’s temper.' The Hebrew word רוּחַ literally
      means 'spirit' or 'wind' and here likely refers to an angry disposition.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'healing' or 'gentleness.' The Hebrew noun מַרְפֵּא carries the idea
      of a soothing or healing response.
    reason: lexical_alternative
  - marker: d
    text: Or 'great sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  chosen: anger
  alternatives:
  - spirit
  - temper
  lexicon: HALOT
  rationale: Although literally 'spirit/wind,' in this context with 'the ruler' and
    'rises against you' it idiomatically refers to the ruler's emotional outburst
    or temper. 'Anger' communicates the sense clearly in modern English.
- source_word: הַמּוֹשֵׁל
  chosen: the ruler
  alternatives:
  - the governor
  - the one in authority
  lexicon: HALOT
  rationale: The participle denotes one who rules or exercises authority. 'Ruler'
    is the most direct and contextually broad rendering.
- source_word: תַּעֲלֶה עָלֶיךָ
  chosen: rises against you
  alternatives:
  - comes up against you
  - is aroused against you
  lexicon: HALOT
  rationale: The verb 'go up/rise' with the preposition 'upon/against' naturally conveys
    hostile escalation directed toward the hearer.
- source_word: מְקוֹמְךָ
  chosen: your post
  alternatives:
  - your place
  - your position
  lexicon: HALOT
  rationale: Literally 'your place.' In context of service under a ruler, 'post' idiomatically
    conveys one's assigned station or role without over-paraphrasing.
- source_word: אַל תַּנַּח
  chosen: do not leave
  alternatives:
  - do not abandon
  - do not forsake
  lexicon: HALOT
  rationale: From נוח/הניח in this stem/context, the sense is to let go of or abandon.
    Combined with 'your post,' 'do not leave' is natural English.
- source_word: מַרְפֵּא
  chosen: calmness
  alternatives:
  - healing
  - gentleness
  - composure
  lexicon: HALOT
  rationale: The noun can denote healing or soothing. Here it refers metaphorically
    to a soothing, composed response that remedies a tense situation. 'Calmness' best
    fits the proverb's practical counsel.
- source_word: יַנִּיחַ
  chosen: puts ... to rest
  alternatives:
  - lays aside
  - causes to cease
  - appeases
  lexicon: HALOT
  rationale: The causative verb means to set down, let rest, or cause to subside.
    'Puts ... to rest' preserves the calming/restorative image and reads naturally
    with offenses.
- source_word: חֲטָאִים גְּדוֹלִים
  chosen: great offenses
  alternatives:
  - great sins
  - serious wrongs
  lexicon: HALOT
  rationale: The noun often means sins, but in wisdom literature and this administrative
    setting it can denote serious faults or offenses. 'Great offenses' fits the interpersonal-political
    context while preserving moral weight.
