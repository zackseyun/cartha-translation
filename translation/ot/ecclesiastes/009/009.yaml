id: ECC.9.9
reference: Ecclesiastes 9:9
source:
  edition: WLC
  text: רְאֵ֨ה חַיִּ֜ים עִם אִשָּׁ֣ה אֲשֶׁר אָהַ֗בְתָּ כָּל יְמֵי֙ חַיֵּ֣י הֶבְלֶ֔/ךָ
    אֲשֶׁ֤ר נָֽתַן לְ/ךָ֙ תַּ֣חַת הַ/שֶּׁ֔מֶשׁ כֹּ֖ל יְמֵ֣י הֶבְלֶ֑/ךָ כִּ֣י ה֤וּא
    חֶלְקְ/ךָ֙ בַּֽ/חַיִּ֔ים וּ/בַ/עֲמָ֣לְ/ךָ֔ אֲשֶׁר אַתָּ֥ה עָמֵ֖ל תַּ֥חַת הַ/שָּֽׁמֶשׁ־־־־־׃
translation:
  text: Enjoy life with the wife whom you love all the days of your fleeting life
    that he has given you under the sun—all your fleeting days—for that is your portion
    in life and in your labor at which you toil under the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'See life with the wife whom you love.' The Hebrew idiom 'see life' can
      mean to experience or enjoy life.
    reason: lexical_alternative
  - marker: b
    text: Hebrew hebel, often rendered 'vanity' or 'vapor'; here it conveys the fleeting,
      insubstantial character of life.
    reason: lexical_alternative
  - marker: c
    text: The subject of 'has given' is implicit in Hebrew; the wider context suggests
      God, though he is not named in this clause.
    reason: alternative_reading
lexical_decisions:
- source_word: רְאֵה
  chosen: Enjoy
  alternatives:
  - See
  - Look at
  - Experience
  lexicon: HALOT
  rationale: Although the verb literally means 'see,' in wisdom literature and in
    this collocation ('see life') it idiomatically carries the sense of experiencing
    or enjoying life. 'Enjoy' best communicates the idiomatic force in natural English
    without excessive paraphrase.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: The plural form often functions as a singular abstract noun in Hebrew.
    Here it refers to life as lived experience, so singular 'life' is the natural
    English equivalent.
- source_word: עִם אִשָּׁה
  chosen: with the wife
  alternatives:
  - with a wife
  - with the woman
  lexicon: HALOT
  rationale: Although אִשָּׁה lacks the article, the context strongly suggests one's
    own wife rather than women in general. 'The wife' in English idiom signals a specific
    spouse, matching the personal address and the following 'whom you love.'
- source_word: אֲשֶׁר אָהַבְתָּ
  chosen: whom you love
  alternatives:
  - whom you have loved
  - that you love
  lexicon: HALOT
  rationale: The perfect can be rendered as a present in this gnomic exhortation.
    'Whom you love' is smoother and captures the ongoing relational sense better than
    an English perfect.
- source_word: חַיֵּי הֶבְלֶךָ / יְמֵי הֶבְלֶךָ
  chosen: your fleeting life / your fleeting days
  alternatives:
  - your vain life / your vain days
  - your vapor-like life / your vapor-like days
  - your meaningless life / your meaningless days
  lexicon: HALOT
  rationale: הֶבֶל in Ecclesiastes denotes transience, insubstantiality, and frustration.
    'Fleeting' preserves the motif of brevity without overcommitting to 'meaningless,'
    which can flatten Qoheleth's nuance. The variation between 'life' and 'days' reflects
    the Hebrew constructions while keeping the repeated refrain audible.
- source_word: אֲשֶׁר נָתַן לְךָ
  chosen: that he has given you
  alternatives:
  - which God has given you
  - that was given to you
  lexicon: HALOT
  rationale: The Hebrew verb has an implicit third masculine singular subject. In
    context, God is the understood giver, but the text does not explicitly name him
    here. Retaining 'he' preserves the source's wording while allowing the contextual
    referent to remain implicit.
- source_word: תַּחַת הַשֶּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a signature Ecclesiastes expression for earthly life in the present
    world order. 'Under the sun' is the standard and transparent rendering.
- source_word: כִּי הוּא חֶלְקְךָ
  chosen: for that is your portion
  alternatives:
  - for this is your lot
  - for that is your share
  lexicon: HALOT
  rationale: חֵלֶק denotes one's allotted share or portion. 'Portion' preserves the
    metaphor of an assigned share in life, common in wisdom literature.
- source_word: בַּחַיִּים
  chosen: in life
  alternatives:
  - in this life
  - in your life
  lexicon: HALOT
  rationale: The phrase is general rather than explicitly demonstrative. 'In life'
    is concise and natural.
- source_word: וּבַעֲמָלְךָ
  chosen: and in your labor
  alternatives:
  - and in your toil
  - and in your work
  lexicon: HALOT
  rationale: עָמָל often carries the sense of laborious toil, but here the noun can
    be rendered 'labor' while the following participle supplies the stronger sense
    of toiling. This avoids redundancy while preserving the semantic field.
- source_word: אֲשֶׁר אַתָּה עָמֵל
  chosen: at which you toil
  alternatives:
  - in which you labor
  - for which you toil
  lexicon: HALOT
  rationale: The participle emphasizes ongoing exertion. 'At which you toil' preserves
    the strenuous nuance and fits the English rhythm of the sentence.
