theological_decisions:
- issue: Meaning of מִקְרֶה אֶחָד in Qoheleth's observation
  chosen_reading: one fate
  alternative_readings:
  - one event
  - the same destiny
  rationale: The verse emphasizes the same outcome befalling all classes of people,
    likely with death in view in the surrounding context. 'One fate' communicates
    this existential observation without importing a rigid doctrine of impersonal
    fatalism.
  doctrine_reference: Translation philosophy §1, §3
- issue: Clean/unclean language
  chosen_reading: retain ritual categories as 'clean' and 'unclean'
  alternative_readings:
  - pure/impure
  - morally clean/morally defiled
  rationale: The Hebrew likely includes cultic categories among broader moral and
    social contrasts. The translation preserves that tension rather than resolving
    the terms into purely moral language.
  doctrine_reference: Translation philosophy §3
- issue: Final comparison about oath-taking
  chosen_reading: preserve ambiguity with 'fears an oath' in main text
  alternative_readings:
  - is afraid to swear
  - reveres an oath
  rationale: The Hebrew can denote fear of taking an oath or a more reverential caution
    regarding oaths. The main text keeps the ambiguity; a footnote gives the more
    explicit idiomatic option.
  doctrine_reference: Translation philosophy §3
