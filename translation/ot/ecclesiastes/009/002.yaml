id: ECC.9.2
reference: Ecclesiastes 9:2
source:
  edition: WLC
  text: הַ/כֹּ֞ל כַּ/אֲשֶׁ֣ר לַ/כֹּ֗ל מִקְרֶ֨ה אֶחָ֜ד לַ/צַּדִּ֤יק וְ/לָ/רָשָׁע֙ לַ/טּוֹב֙
    וְ/לַ/טָּה֣וֹר וְ/לַ/טָּמֵ֔א וְ/לַ/זֹּבֵ֔חַ וְ/לַ/אֲשֶׁ֖ר אֵינֶ֣/נּוּ זֹבֵ֑חַ
    כַּ/טּוֹב֙ כַּֽ/חֹטֶ֔א הַ/נִּשְׁבָּ֕ע כַּ/אֲשֶׁ֖ר שְׁבוּעָ֥ה יָרֵֽא׃
translation:
  text: 'All is as it is for all: one fate comes to the righteous and to the wicked,
    to the good and to the clean and to the unclean, to the one who sacrifices and
    to the one who does not sacrifice; as the good one, so the sinner; the one who
    swears is as the one who fears an oath.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one event' or 'the same destiny.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who is afraid to swear.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַכֹּל
  chosen: All
  alternatives:
  - Everything
  lexicon: HALOT
  rationale: Used as a comprehensive summary term opening the verse. 'All' is concise
    and idiomatic, matching Qoheleth's sweeping statement.
- source_word: כַּאֲשֶׁר לַכֹּל
  chosen: as it is for all
  alternatives:
  - as for everyone
  - the same for all
  lexicon: HALOT
  rationale: This comparative-relative construction is elliptical. 'As it is for all'
    preserves the compressed Hebrew sense without over-paraphrasing.
- source_word: מִקְרֶה אֶחָד
  chosen: one fate
  alternatives:
  - one event
  - one happening
  - the same destiny
  lexicon: HALOT
  rationale: מִקְרֶה in Ecclesiastes refers to what befalls people, especially the
    common outcome of life and death. 'Fate' best captures the experiential sense
    here without implying a developed doctrine of determinism; 'event' is too flat
    in English.
- source_word: לַצַּדִּיק
  chosen: to the righteous
  alternatives:
  - to the just
  lexicon: HALOT
  rationale: Standard ethical-religious term; 'righteous' preserves the moral category
    used throughout Scripture.
- source_word: וְלָרָשָׁע
  chosen: and to the wicked
  alternatives:
  - and to the guilty
  - and to the evil
  lexicon: HALOT
  rationale: Pairs naturally with 'righteous' and reflects the moral contrast.
- source_word: לַטּוֹב
  chosen: to the good
  alternatives:
  - to the good person
  lexicon: HALOT
  rationale: Retained as a distinct category rather than collapsing it into 'righteous,'
    since the Hebrew lists multiple overlapping contrasts for rhetorical effect.
- source_word: וְלַטָּהוֹר
  chosen: and to the clean
  alternatives:
  - and to the pure
  - and to the ceremonially clean
  lexicon: HALOT
  rationale: '''Clean'' preserves the likely ritual dimension in contrast with ''unclean.''
    ''Pure'' would tilt more moral than cultic.'
- source_word: וְלַטָּמֵא
  chosen: and to the unclean
  alternatives:
  - and to the impure
  lexicon: HALOT
  rationale: Chosen to preserve the ritual contrast with 'clean' in accessible English.
- source_word: וְלַזֹּבֵחַ
  chosen: to the one who sacrifices
  alternatives:
  - to the sacrificer
  - to the one offering sacrifice
  lexicon: HALOT
  rationale: Verbal participle rendered with a natural English relative clause; keeps
    the cultic action explicit.
- source_word: וְלַאֲשֶׁר אֵינֶנּוּ זֹבֵחַ
  chosen: and to the one who does not sacrifice
  alternatives:
  - and to the one not sacrificing
  lexicon: HALOT
  rationale: Directly mirrors the participial contrast with clear modern English.
- source_word: כַּטּוֹב כַּחֹטֶא
  chosen: as the good one, so the sinner
  alternatives:
  - like the good, so the sinner
  - the good is like the sinner
  lexicon: HALOT
  rationale: Preserves the proverb-like comparative structure. 'Sinner' is the established
    biblical term for חֹטֶא.
- source_word: הַנִּשְׁבָּע
  chosen: the one who swears
  alternatives:
  - the one taking an oath
  lexicon: HALOT
  rationale: Niphal participle of שבע here denotes swearing/taking an oath. 'Swears'
    is concise and idiomatic.
- source_word: כַּאֲשֶׁר שְׁבוּעָה יָרֵא
  chosen: as the one who fears an oath
  alternatives:
  - as the one who is afraid to swear
  - as the one who reveres an oath
  lexicon: HALOT
  rationale: 'The phrase is somewhat compressed. ''Fears an oath'' preserves the Hebrew
    wording and ambiguity: either fear of taking an oath or reverence toward oath-taking.
    A footnote preserves the more explicit alternative.'
