id: ECC.9.17
reference: Ecclesiastes 9:17
source:
  edition: WLC
  text: דִּבְרֵ֣י חֲכָמִ֔ים בְּ/נַ֖חַת נִשְׁמָעִ֑ים מִ/זַּעֲקַ֥ת מוֹשֵׁ֖ל בַּ/כְּסִילִֽים׃
translation:
  text: The words of the wise are heard in quiet more than the shouting of a ruler
    among fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The words of the wise, heard quietly, are better than the shouting of
      a ruler among fools.' The Hebrew comparison can be expressed with 'more than'
      or with an implied sense of superiority ('better than').
    reason: lexical_alternative
  - marker: b
    text: '''Among fools'' may also be understood by some as ''over fools,'' but the
      preposition more naturally suggests location or association here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: words of
  alternatives:
  - sayings of
  - words
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here refers to spoken expressions or utterances;
    'words of' is the most natural English rendering in construct with 'the wise.'
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - wise people
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The wise' preserves
    the Hebrew's representative sense without over-specifying gender, while avoiding
    the slightly narrower 'wise men.'
- source_word: בְּנַחַת
  chosen: in quiet
  alternatives:
  - quietly
  - with calm
  - in tranquility
  lexicon: HALOT
  rationale: נַחַת denotes quietness, calmness, or gentleness. 'In quiet' preserves
    the nominal force after the preposition and fits the contrast with 'shouting.'
- source_word: נִשְׁמָעִים
  chosen: are heard
  alternatives:
  - are listened to
  - are heeded
  lexicon: HALOT
  rationale: Niphal participle/passive sense from שׁמע naturally yields 'are heard.'
    While 'are heeded' captures the implied value, 'are heard' stays closer to the
    Hebrew and leaves the implication to context.
- source_word: מִזַּעֲקַת
  chosen: more than the shouting of
  alternatives:
  - than the cry of
  - than the outcry of
  lexicon: HALOT
  rationale: 'With comparative מִן after ''are heard,'' the sense is comparative:
    the wise are heard more than the shouting of another. זַעֲקָה can mean cry, outcry,
    or shouting; ''shouting'' best fits the contrast with quiet speech.'
- source_word: מוֹשֵׁל
  chosen: a ruler
  alternatives:
  - one who rules
  - a governor
  lexicon: HALOT
  rationale: The participial noun denotes one exercising rule or authority. 'A ruler'
    is idiomatic and sufficiently broad in this wisdom context.
- source_word: בַּכְּסִילִים
  chosen: among fools
  alternatives:
  - among the fools
  - over fools
  lexicon: HALOT
  rationale: The preposition ב here is best taken as locative/social, 'among,' not
    dominative 'over.' The image is of a ruler situated in the company of fools, whose
    loudness contrasts with the quiet wisdom just mentioned.
