id: ECC.9.16
reference: Ecclesiastes 9:16
source:
  edition: WLC
  text: וְ/אָמַ֣רְתִּי אָ֔נִי טוֹבָ֥ה חָכְמָ֖ה מִ/גְּבוּרָ֑ה וְ/חָכְמַ֤ת הַ/מִּסְכֵּן֙
    בְּזוּיָ֔ה וּ/דְבָרָ֖י/ו אֵינָ֥/ם נִשְׁמָעִֽים׃
translation:
  text: And I said, “Wisdom is better than strength,” but the wisdom of the poor man
    is despised, and his words are not heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'might' or 'power' for 'strength.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the poor man'; this likely refers back to the poor wise man in the
      preceding verse.
    reason: cross_reference
  - marker: c
    text: Or 'are not listened to' or 'go unheard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתִּי אֲנִי
  chosen: And I said
  alternatives:
  - So I said
  - Then I said
  lexicon: HALOT
  rationale: The conjunction plus first-person perfect naturally introduces the speaker’s
    conclusion or reflection. 'And I said' preserves the Hebrew sequence without overinterpreting
    the discourse relation.
- source_word: טוֹבָה חָכְמָה מִגְּבוּרָה
  chosen: Wisdom is better than strength
  alternatives:
  - Wisdom is better than might
  - Wisdom is better than power
  lexicon: HALOT
  rationale: The predicate adjective with comparative מן expresses superiority. 'Strength'
    best captures גְּבוּרָה here in a general sense of force or might, fitting the
    contrast with wisdom in context.
- source_word: וְחָכְמַת
  chosen: but the wisdom of
  alternatives:
  - yet the wisdom of
  - and the wisdom of
  lexicon: HALOT
  rationale: 'Although the conjunction is formally ''and,'' the clause is adversative
    in context: the speaker affirms wisdom’s superiority, yet observes that this poor
    man’s wisdom is disregarded. Rendering ''but'' communicates the discourse contrast
    in natural English.'
- source_word: הַמִּסְכֵּן
  chosen: the poor man
  alternatives:
  - the poor
  - the needy man
  lexicon: HALOT
  rationale: The adjective/substantive refers to a poor person, and the masculine
    singular is specific in this context, referring back to the poor wise man of the
    preceding verse. 'Poor man' is gender-accurate and contextually precise.
- source_word: בְּזוּיָה
  chosen: is despised
  alternatives:
  - is scorned
  - is held in contempt
  lexicon: HALOT
  rationale: The passive participial/adjectival form denotes being treated with contempt.
    'Is despised' is concise, natural, and preserves the evaluative force.
- source_word: וּדְבָרָיו
  chosen: and his words
  alternatives:
  - and what he says
  - and his sayings
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter'; here the plural with suffix
    refers to his spoken counsel. 'His words' is the most direct rendering.
- source_word: אֵינָם נִשְׁמָעִים
  chosen: are not heard
  alternatives:
  - are not listened to
  - go unheard
  lexicon: HALOT
  rationale: The negative existential plus Niphal participle expresses that his words
    receive no hearing. 'Are not heard' is formally close and idiomatic; it can imply
    both literal hearing and heeding, which suits the Hebrew.
