theological_decisions:
- issue: Rendering of אָדָם in generic singular and collective idiom
  chosen_reading: Use 'man' for הָאָדָם and 'the sons of man' for בְּנֵי הָאָדָם
  alternative_readings:
  - humankind
  - people
  - human beings
  rationale: The verse uses both singular generic and collective idiom. Following
    the doctrine's gender-accurate principle, the translation preserves the masculine
    representative force rather than flattening both to gender-neutral terms. This
    also retains the literary texture of Ecclesiastes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
