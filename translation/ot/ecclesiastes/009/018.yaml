id: ECC.9.18
reference: Ecclesiastes 9:18
source:
  edition: WLC
  text: טוֹבָ֥ה חָכְמָ֖ה מִ/כְּלֵ֣י קְרָ֑ב וְ/חוֹטֶ֣א אֶחָ֔ד יְאַבֵּ֥ד טוֹבָ֥ה הַרְבֵּֽה׃
translation:
  text: Wisdom is better than weapons of war, but one sinner destroys much good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and one sinner destroys much good.' The Hebrew conjunction can be read
      simply as 'and,' but the sense in context is contrastive.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבָה
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: Predicate adjective used comparatively with מִן; in English the idiomatic
    sense is comparative, 'better,' not the bare adjective 'good.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Ecclesiastes; preserves the book's
    recurring theme of practical and reflective wisdom.
- source_word: מִכְּלֵי קְרָב
  chosen: than weapons of war
  alternatives:
  - than battle implements
  - than weapons for battle
  lexicon: HALOT
  rationale: כְּלֵי means 'vessels/implements/articles,' and with קְרָב denotes military
    equipment. 'Weapons of war' is natural modern English and preserves the martial
    sense.
- source_word: וְחוֹטֶא
  chosen: but one sinner
  alternatives:
  - and one sinner
  lexicon: HALOT
  rationale: Though וְ is formally 'and,' the clause is adversative in context, contrasting
    wisdom's value with the damage caused by a sinner. 'But' best conveys the discourse
    relation in English. חוֹטֶא is rendered 'sinner' as a substantival participle.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Retained explicitly to preserve the emphasis that a single individual
    can undo much benefit.
- source_word: יְאַבֵּד
  chosen: destroys
  alternatives:
  - ruins
  - causes to perish
  lexicon: HALOT
  rationale: Piel of אבד carries a causative/destructive sense. 'Destroys' is strong,
    clear, and fits the proverbial warning.
- source_word: טוֹבָה הַרְבֵּה
  chosen: much good
  alternatives:
  - much goodness
  - many good things
  lexicon: HALOT
  rationale: The phrase denotes a large amount of benefit or good accomplished. 'Much
    good' is idiomatic English and broad enough to include both moral and practical
    benefit.
