id: ECC.9.6
reference: Ecclesiastes 9:6
source:
  edition: WLC
  text: גַּ֣ם אַהֲבָתָ֧/ם גַּם שִׂנְאָתָ֛/ם גַּם קִנְאָתָ֖/ם כְּבָ֣ר אָבָ֑דָה וְ/חֵ֨לֶק
    אֵין לָ/הֶ֥ם עוֹד֙ לְ/עוֹלָ֔ם בְּ/כֹ֥ל אֲשֶֽׁר נַעֲשָׂ֖ה תַּ֥חַת הַ/שָּֽׁמֶשׁ־־־־׃
translation:
  text: Their love, their hatred, and their jealousy have already perished, and they
    no longer have a share forever in anything that is done under the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their zeal' or 'their envy' for 'their jealousy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: their ... their ... and their
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Repeated גַּם coordinates and emphasizes each noun in the series. In
    English, repeating 'their' with the final conjunction best preserves the cumulative
    force without woodenly repeating 'also' three times.
- source_word: אַהֲבָתָם
  chosen: their love
  lexicon: HALOT
  rationale: Straightforward nominal form with 3mp suffix; 'love' is the natural and
    consistent rendering.
- source_word: שִׂנְאָתָם
  chosen: their hatred
  alternatives:
  - their hate
  lexicon: HALOT
  rationale: '''Hatred'' better matches the abstract noun form and keeps the triad
    stylistically parallel with ''love'' and ''jealousy.'''
- source_word: קִנְאָתָם
  chosen: their jealousy
  alternatives:
  - their zeal
  - their envy
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy, zeal, or envy depending on context. Here,
    paired with love and hatred as human passions that cease at death, 'jealousy'
    best fits the relational-emotional sense.
- source_word: כְּבָר
  chosen: already
  alternatives:
  - long ago
  - by now
  lexicon: HALOT
  rationale: 'Marks completed prior state: these passions are already gone. ''Already''
    is idiomatic and concise.'
- source_word: אָבָדָה
  chosen: have already perished
  alternatives:
  - have vanished
  - are lost
  lexicon: HALOT
  rationale: Though morphologically singular feminine agreeing collectively with the
    preceding nouns, the sense applies to the whole triad. English plural verbal agreement
    is natural with the compound subject. 'Perished' preserves the stronger sense
    of אבד better than the softer 'vanished.'
- source_word: וְחֵלֶק
  chosen: a share
  alternatives:
  - a portion
  - an allotment
  lexicon: HALOT
  rationale: חֵלֶק in Ecclesiastes often denotes one's portion/share in life. 'Share'
    is idiomatic here and fits the construction 'have a share in.'
- source_word: אֵין לָהֶם עוֹד
  chosen: they no longer have
  alternatives:
  - there is no longer for them
  - they have no more
  lexicon: HALOT
  rationale: This renders the existential construction idiomatically in English while
    preserving the sense of cessation.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - ever again
  - for eternity
  lexicon: HALOT
  rationale: In this context לְעוֹלָם intensifies the permanence of exclusion from
    earthly affairs. 'Forever' is natural English and preserves the force.
- source_word: בְּכֹל אֲשֶׁר נַעֲשָׂה
  chosen: in anything that is done
  alternatives:
  - in all that is done
  - in everything that happens
  lexicon: HALOT
  rationale: The phrase is comprehensive. 'Anything that is done' reads naturally
    after 'have a share' and preserves the passive nuance of נַעֲשָׂה.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  lexicon: HALOT
  rationale: Established Ecclesiastes idiom for life in the earthly realm; the traditional
    rendering remains the plain sense and is readily understood.
