id: ECC.9.3
reference: Ecclesiastes 9:3
source:
  edition: WLC
  text: זֶ֣ה רָ֗ע בְּ/כֹ֤ל אֲשֶֽׁר נַעֲשָׂה֙ תַּ֣חַת הַ/שֶּׁ֔מֶשׁ כִּֽי מִקְרֶ֥ה אֶחָ֖ד
    לַ/כֹּ֑ל וְ/גַ֣ם לֵ֣ב בְּֽנֵי הָ֠/אָדָם מָלֵא רָ֨ע וְ/הוֹלֵל֤וֹת בִּ/לְבָבָ/ם֙
    בְּ/חַיֵּי/הֶ֔ם וְ/אַחֲרָ֖י/ו אֶל הַ/מֵּתִֽים׀־־־־־׃
translation:
  text: 'This is the evil in all that is done under the sun: that one fate comes to
    all. Also, the heart of the sons of man is full of evil, and madness is in their
    hearts during their lives—and after it, to the dead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heart of humankind' / 'the human heart.' The Hebrew phrase 'the
      sons of man' uses masculine representative language for humanity in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'that the same event happens to all.' The Hebrew מִקְרֶה can mean what
      befalls a person, an event, or a common fate.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is abrupt: literally, ''and after it, to the dead.'' This likely
      means that after life, people go to the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה רָע
  chosen: This is the evil
  alternatives:
  - This is an evil
  - This is the bad thing
  lexicon: HALOT
  rationale: 'The demonstrative plus adjective functions idiomatically to introduce
    the matter under discussion. ''The evil'' best captures the definite, evaluative
    force in context: a particular grievous feature of life under the sun.'
- source_word: בְּכֹל אֲשֶׁר נַעֲשָׂה תַּחַת הַשֶּׁמֶשׁ
  chosen: in all that is done under the sun
  alternatives:
  - among all that is done under the sun
  - in everything done under the sun
  lexicon: HALOT
  rationale: Retains the Ecclesiastes formula 'under the sun' and the passive/impersonal
    sense of נַעֲשָׂה. 'In all that is done' is natural English while preserving the
    broad scope.
- source_word: כִּי מִקְרֶה אֶחָד לַכֹּל
  chosen: that one fate comes to all
  alternatives:
  - that one event happens to all
  - that the same fate befalls all
  lexicon: HALOT
  rationale: מִקְרֶה in Ecclesiastes commonly denotes what befalls someone, often
    with the nuance of fate or common destiny. 'Fate' communicates the existential
    point better than the flatter 'event,' without importing a deterministic doctrine
    beyond the text.
- source_word: וְגַם
  chosen: Also
  alternatives:
  - Moreover
  - And also
  lexicon: HALOT
  rationale: Signals an added observation in straightforward modern English.
- source_word: לֵב בְּנֵי הָאָדָם
  chosen: the heart of the sons of man
  alternatives:
  - the heart of humankind
  - the human heart
  lexicon: HALOT
  rationale: The Hebrew is singular 'heart' with a collective genitive. Because DOCTRINE.md
    prefers gender-accurate renderings where the source uses masculine representative
    language, 'sons of man' preserves the form and echoes Ecclesiastes' anthropological
    diction. A more idiomatic inclusive alternative is preserved in a footnote.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: אָדָם here is generic humanity, but in the construct phrase בְּנֵי הָאָדָם
    the traditional and source-near sense is 'sons of man.' This follows the project's
    gender-accurate policy while allowing an inclusive alternative in a footnote.
- source_word: מָלֵא רָע
  chosen: is full of evil
  alternatives:
  - is filled with evil
  - is full of wickedness
  lexicon: HALOT
  rationale: A direct rendering of the predicate construction. 'Evil' is broad enough
    to include moral corruption and harmful intent without over-specifying.
- source_word: וְהוֹלֵלוֹת
  chosen: and madness
  alternatives:
  - and folly
  - and insanity
  lexicon: HALOT
  rationale: The plural abstract noun conveys irrational, reckless behavior. 'Madness'
    best matches Qoheleth's recurring contrast between wisdom and irrationality; 'folly'
    is possible but can sound too mild here.
- source_word: בִּלְבָבָם
  chosen: is in their hearts
  alternatives:
  - is in their mind
  - is within them
  lexicon: HALOT
  rationale: Though Hebrew 'heart' can include intellect and will, retaining 'hearts'
    preserves the anthropological imagery and parallelism with the prior clause.
- source_word: בְּחַיֵּיהֶם
  chosen: during their lives
  alternatives:
  - while they live
  - in their lifetime
  lexicon: HALOT
  rationale: Expresses the temporal force naturally in English.
- source_word: וְאַחֲרָיו
  chosen: and after it
  alternatives:
  - and afterward
  - and after that
  lexicon: HALOT
  rationale: The suffix is singular masculine, most naturally referring back to the
    preceding life-span or situation just described. 'After it' preserves the abruptness
    of the Hebrew and leaves the referent slightly compressed, as in the source.
- source_word: אֶל הַמֵּתִים
  chosen: to the dead
  alternatives:
  - they go to the dead
  - to the place of the dead
  lexicon: HALOT
  rationale: The Hebrew is terse and elliptical. 'To the dead' preserves that terseness
    without adding a verb not present in the text. A more explicit English expansion
    is preserved in a footnote.
