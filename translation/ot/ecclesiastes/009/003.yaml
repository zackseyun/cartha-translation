theological_decisions:
- issue: Anthropological/gender rendering of בְּנֵי הָאָדָם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - human beings
  rationale: The source uses masculine representative language. Per DOCTRINE.md, gender-accurate
    renderings are preferred over flattening to gender-neutral English, while inclusive
    alternatives may be noted. The phrase is generic, not male-exclusive, but the
    main text preserves the Hebrew form.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    *adam* → man / humankind (context)'
