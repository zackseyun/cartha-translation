id: ECC.9.5
reference: Ecclesiastes 9:5
source:
  edition: WLC
  text: כִּ֧י הַֽ/חַיִּ֛ים יוֹדְעִ֖ים שֶׁ/יָּמֻ֑תוּ וְ/הַ/מֵּתִ֞ים אֵינָ֧/ם יוֹדְעִ֣ים
    מְא֗וּמָה וְ/אֵֽין ע֤וֹד לָ/הֶם֙ שָׂכָ֔ר כִּ֥י נִשְׁכַּ֖ח זִכְרָֽ/ם־׃
translation:
  text: For the living know that they will die, but the dead know nothing at all,
    and there is no longer any reward for them, because their memory is forgotten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''know nothing.'' The Hebrew expression is emphatic: ''do not know
      anything at all.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement; 'for'
    preserves the discourse connection in natural English.
- source_word: הַחַיִּים
  chosen: the living
  alternatives:
  - those who are alive
  - the alive
  lexicon: HALOT
  rationale: Substantival adjective/plural referring collectively to living people;
    'the living' is idiomatic and concise.
- source_word: יוֹדְעִים
  chosen: know
  alternatives:
  - are aware
  lexicon: HALOT
  rationale: Basic sense of ידע; 'know' is the most direct and consistent rendering.
- source_word: שֶׁיָּמֻתוּ
  chosen: that they will die
  alternatives:
  - that they are going to die
  lexicon: HALOT
  rationale: The clause gives the content of what the living know; future 'will die'
    fits the imperfect and reads naturally.
- source_word: וְהַמֵּתִים
  chosen: but the dead
  alternatives:
  - and the dead
  lexicon: HALOT
  rationale: Though waw is formally 'and,' the clause is contrastive in context; 'but'
    best conveys the Hebrew sense in English.
- source_word: אֵינָם יוֹדְעִים מְאוּמָה
  chosen: know nothing at all
  alternatives:
  - know nothing
  - do not know anything
  lexicon: HALOT
  rationale: Combines the negation with מְאוּמָה ('anything, anything at all'). 'Nothing
    at all' preserves the emphatic force without awkwardness.
- source_word: וְאֵין עוֹד לָהֶם שָׂכָר
  chosen: there is no longer any reward for them
  alternatives:
  - they have no more reward
  - there is no more wages for them
  lexicon: HALOT
  rationale: שָׂכָר commonly means reward, recompense, wages. 'Reward' fits Qoheleth's
    broader idiom here better than the more economic 'wages.' 'No longer' captures
    עוֹד in context.
- source_word: כִּי נִשְׁכַּח זִכְרָם
  chosen: because their memory is forgotten
  alternatives:
  - for their remembrance is forgotten
  - because the memory of them is forgotten
  lexicon: HALOT
  rationale: זֵכֶר/זִכְרָם refers to remembrance or memory. 'Their memory is forgotten'
    is idiomatic and preserves the passive sense of נִשְׁכַּח.
