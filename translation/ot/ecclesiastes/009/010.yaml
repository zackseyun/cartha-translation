id: ECC.9.10
reference: Ecclesiastes 9:10
source:
  edition: WLC
  text: כֹּ֠ל אֲשֶׁ֨ר תִּמְצָ֧א יָֽדְ/ךָ֛ לַ/עֲשׂ֥וֹת בְּ/כֹחֲ/ךָ֖ עֲשֵׂ֑ה כִּי֩ אֵ֨ין
    מַעֲשֶׂ֤ה וְ/חֶשְׁבּוֹן֙ וְ/דַ֣עַת וְ/חָכְמָ֔ה בִּ/שְׁא֕וֹל אֲשֶׁ֥ר אַתָּ֖ה הֹלֵ֥ךְ
    שָֽׁמָּ/ה׃ס
translation:
  text: Whatever your hand finds to do, do it with your strength, for there is no
    work or planning or knowledge or wisdom in Sheol, where you are going.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' The Hebrew term 'Sheol' refers
      to the place/state of the dead in the Old Testament.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  chosen: Whatever
  alternatives:
  - Everything that
  - All that
  lexicon: HALOT
  rationale: 'The idiom introduces an unrestricted relative clause: ''whatever/all
    that.'' ''Whatever'' is idiomatic modern English and preserves the comprehensive
    force without sounding wooden.'
- source_word: תִּמְצָא יָדְךָ
  chosen: your hand finds
  alternatives:
  - your hand reaches
  - you find
  lexicon: HALOT
  rationale: Literally 'your hand finds.' Retaining 'hand' preserves the Hebrew idiom
    of practical ability/opportunity rather than flattening it to simply 'you find.'
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to accomplish
  lexicon: HALOT
  rationale: The infinitive of עשה is broad; 'to do' best matches the general scope
    here and fits the idiom 'finds to do.'
- source_word: בְּכֹחֲךָ
  chosen: with your strength
  alternatives:
  - with all your might
  - with your power
  lexicon: HALOT
  rationale: The phrase denotes exerting one's available strength. 'With your strength'
    is a clear, direct rendering. 'With all your might' is possible, but 'all' is
    not explicit in the Hebrew.
- source_word: עֲשֵׂה
  chosen: do it
  alternatives:
  - do
  - make it
  lexicon: HALOT
  rationale: The imperative resumes and intensifies the prior clause. English idiom
    naturally supplies the object as 'it' from the preceding relative clause.
- source_word: כִּי אֵין
  chosen: for there is no
  alternatives:
  - because there is no
  - since there is no
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the exhortation. 'For' is concise and
    natural in English.
- source_word: מַעֲשֶׂה
  chosen: work
  alternatives:
  - deed
  - activity
  lexicon: HALOT
  rationale: In this context of earthly action, 'work' best conveys practical activity.
    'Deed' is narrower and more moralized than the context requires.
- source_word: חֶשְׁבּוֹן
  chosen: planning
  alternatives:
  - device
  - calculation
  - thought
  lexicon: HALOT
  rationale: The noun can denote reckoning, calculation, or planning. 'Planning' fits
    the sequence of capacities absent in Sheol and reads naturally in contemporary
    English.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: A standard rendering that pairs well with the surrounding terms and preserves
    the cognitive sense.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  lexicon: HALOT
  rationale: Ecclesiastes frequently uses this term in its broad sapiential sense;
    'wisdom' is the established and contextually appropriate rendering.
- source_word: בִּשְׁאוֹל
  chosen: in Sheol
  alternatives:
  - in the grave
  - in the realm of the dead
  lexicon: HALOT
  rationale: Sheol is a distinct Hebrew term for the underworld/the realm of the dead.
    Transliteration preserves the source-world concept better than collapsing it into
    'grave.' Because readers may benefit from clarification, an explanatory footnote
    preserves the alternative sense.
- source_word: אֲשֶׁר אַתָּה הֹלֵךְ שָׁמָּה
  chosen: where you are going
  alternatives:
  - to which you are going
  - where you are headed
  lexicon: HALOT
  rationale: This relative clause identifies Sheol as the destination of the hearer.
    'Where you are going' is natural English and preserves the ongoing movement implied
    by the participle.
