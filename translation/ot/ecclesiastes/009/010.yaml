theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse speaks from the perspective of Ecclesiastes about the state
    of the dead and the cessation of earthly activity. Transliteration avoids importing
    a later, more developed concept such as 'hell' and preserves the Hebrew term's
    semantic range. A footnote preserves explanatory alternatives for reader clarity.
  doctrine_reference: Translation philosophy §1, §3
