id: ECC.9.11
reference: Ecclesiastes 9:11
source:
  edition: WLC
  text: שַׁ֜בְתִּי וְ/רָאֹ֣ה תַֽחַת הַ/שֶּׁ֗מֶשׁ כִּ֣י לֹא֩ לַ/קַּלִּ֨ים הַ/מֵּר֜וֹץ
    וְ/לֹ֧א לַ/גִּבּוֹרִ֣ים הַ/מִּלְחָמָ֗ה וְ֠/גַם לֹ֣א לַ/חֲכָמִ֥ים לֶ֨חֶם֙ וְ/גַ֨ם
    לֹ֤א לַ/נְּבֹנִים֙ עֹ֔שֶׁר וְ/גַ֛ם לֹ֥א לַ/יֹּדְעִ֖ים חֵ֑ן כִּי עֵ֥ת וָ/פֶ֖גַע
    יִקְרֶ֥ה אֶת כֻּלָּֽ/ם־־־׃
translation:
  text: I again saw under the sun that the race is not to the swift, nor the battle
    to the mighty, and also bread is not to the wise, nor riches to the discerning,
    nor favor to those who know; for time and chance happen to them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'time and happening,' 'time and mischance,' or 'time and occurrence.'
      The Hebrew expression emphasizes that unpredictable circumstances overtake everyone.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְתִּי
  chosen: I again
  alternatives:
  - I returned
  - I turned
  lexicon: HALOT
  rationale: The verb literally means 'I returned,' but in Qoheleth this idiom often
    introduces renewed observation rather than physical movement. 'I again' captures
    the discourse function in natural English while preserving the sense of repetition.
- source_word: וְרָאֹה
  chosen: saw
  alternatives:
  - and saw
  - and observed
  lexicon: HALOT
  rationale: From ראה, 'to see.' English smooths the Hebrew coordination into 'I again
    saw.' 'Observed' is possible, but 'saw' preserves the concrete simplicity of the
    Hebrew while fitting the reflective style of Ecclesiastes.
- source_word: תַּחַת הַשֶּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a characteristic Ecclesiastes expression for life in the earthly
    human sphere. 'Under the sun' is the standard and most transparent rendering.
- source_word: לַקַּלִּים
  chosen: the swift
  alternatives:
  - the fast
  lexicon: HALOT
  rationale: The adjective denotes those who are quick or swift. 'The swift' is idiomatic
    in the race metaphor.
- source_word: הַמֵּרוֹץ
  chosen: the race
  alternatives:
  - running
  - the contest
  lexicon: HALOT
  rationale: The noun refers to a race or running contest. 'The race' is the clearest
    English equivalent in this context.
- source_word: לַגִּבּוֹרִים
  chosen: the mighty
  alternatives:
  - the strong
  - the warriors
  lexicon: HALOT
  rationale: גבור often denotes strong or mighty persons, sometimes warriors. Since
    the next noun already specifies 'battle,' 'the mighty' preserves the broader quality
    of strength.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - war
  - the warfare
  lexicon: HALOT
  rationale: Although the noun can mean 'war,' in this parallel series 'the battle'
    better matches the singular event-like framing alongside 'the race.'
- source_word: לַחֲכָמִים לֶחֶם
  chosen: bread is not to the wise
  alternatives:
  - food is not to the wise
  - the wise do not necessarily have bread
  lexicon: HALOT
  rationale: לחם literally means 'bread,' often by extension food or livelihood. 'Bread'
    preserves the Hebrew image and allows readers to hear the concrete metaphor for
    sustenance.
- source_word: לַנְּבֹנִים
  chosen: the discerning
  alternatives:
  - the intelligent
  - the understanding
  lexicon: HALOT
  rationale: From בין, referring to those with discernment or understanding. 'The
    discerning' is natural and preserves the nuance of perceptive judgment.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: Both are possible; 'riches' fits the poetic cadence and parallelism of
    the verse.
- source_word: לַיֹּדְעִים
  chosen: those who know
  alternatives:
  - the knowledgeable
  - those with knowledge
  lexicon: HALOT
  rationale: The participle from ידע is broad. 'Those who know' is more literal and
    avoids over-specifying the kind of knowledge.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חן can mean favor, grace, or charm. Here it refers to favorable reception
    or social approval/success. 'Favor' is the most contextually fitting and least
    theologically overloaded in this wisdom context.
- source_word: עֵת
  chosen: time
  alternatives:
  - season
  lexicon: HALOT
  rationale: The noun denotes a time or appointed time. 'Time' is broad and works
    well in the collocation with the following noun.
- source_word: פֶגַע
  chosen: chance
  alternatives:
  - occurrence
  - misfortune
  - happening
  lexicon: HALOT
  rationale: The term can denote occurrence, chance event, or mischance. In this context
    Qoheleth emphasizes the unpredictability of outcomes. 'Chance' best captures that
    sense in idiomatic English, while not implying a metaphysical denial of providence.
- source_word: יִקְרֶה אֶת־כֻּלָּם
  chosen: happen to them all
  alternatives:
  - befall them all
  - meet them all
  lexicon: HALOT
  rationale: קרה means 'to happen, befall.' 'Happen to them all' is clear modern English
    and preserves the universal scope of the statement.
