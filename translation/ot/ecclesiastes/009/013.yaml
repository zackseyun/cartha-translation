id: ECC.9.13
reference: Ecclesiastes 9:13
source:
  edition: WLC
  text: גַּם זֹ֛ה רָאִ֥יתִי חָכְמָ֖ה תַּ֣חַת הַ/שָּׁ֑מֶשׁ וּ/גְדוֹלָ֥ה הִ֖יא אֵלָֽ/י־׃
translation:
  text: 'I also saw this wisdom under the sun, and it was great to me:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I observed this example of wisdom under the sun, and it seemed great
      to me.' The Hebrew keeps 'wisdom' as the object rather than explicitly saying
      'example of wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - indeed
  lexicon: HALOT
  rationale: Adds this observation to the preceding reflections. 'Also' is natural
    English and preserves the additive force.
- source_word: זֹה
  chosen: this
  alternatives:
  - this thing
  lexicon: HALOT
  rationale: Demonstrative referring forward to the instance of wisdom described in
    the following verses. English can leave the noun implicit.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  - I observed
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. 'I saw' fits Qoheleth's recurring observational
    style; 'observed' is possible but less direct.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - a wise thing
  - an instance of wisdom
  lexicon: HALOT
  rationale: The noun is abstract, but in context it refers to a concrete display
    of wisdom. Retaining 'wisdom' preserves the Hebrew wording while allowing the
    following narrative to specify the instance.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: Standard Ecclesiastes idiom for life in the earthly realm. 'Under the
    sun' is both literal and idiomatic in this book.
- source_word: וּגְדוֹלָה
  chosen: and it was great
  alternatives:
  - and it was impressive
  - and it was significant
  lexicon: HALOT
  rationale: Predicate adjective with following pronoun. 'Great' preserves the broad
    evaluative sense without over-interpreting whether the greatness is moral, intellectual,
    or emotional.
- source_word: הִיא
  chosen: it
  alternatives:
  - she
  lexicon: HALOT
  rationale: The pronoun is feminine singular agreeing with חָכְמָה. English uses
    'it' for the abstract noun 'wisdom' in this context.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - in my view
  - for me
  lexicon: HALOT
  rationale: 'The preposition marks personal evaluation: this wisdom appeared great
    to the speaker. ''To me'' is the most transparent rendering.'
