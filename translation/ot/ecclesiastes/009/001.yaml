id: ECC.9.1
reference: Ecclesiastes 9:1
source:
  edition: WLC
  text: כִּ֣י אֶת כָּל זֶ֞ה נָתַ֤תִּי אֶל לִבִּ/י֙ וְ/לָ/ב֣וּר אֶת כָּל זֶ֔ה אֲשֶׁ֨ר
    הַ/צַּדִּיקִ֧ים וְ/הַ/חֲכָמִ֛ים וַ/עֲבָדֵי/הֶ֖ם בְּ/יַ֣ד הָ/אֱלֹהִ֑ים גַּֽם אַהֲבָ֣ה
    גַם שִׂנְאָ֗ה אֵ֤ין יוֹדֵ֨עַ֙ הָֽ/אָדָ֔ם הַ/כֹּ֖ל לִ/פְנֵי/הֶֽם־־־־־־־׃
translation:
  text: 'For I laid all this to my heart, even to examine all this: that the righteous
    and the wise and their deeds are in the hand of God. Whether love or hate, man
    does not know; everything is before them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their servants.' The Hebrew form can be read that way, but many understand
      it here as 'their deeds' or 'works.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew of the final clause is difficult. It may mean that a person does
      not know in advance whether love or hate awaits them, or that present circumstances
      do not reveal whether one is loved or hated.
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתִּי אֶל לִבִּי
  chosen: I laid ... to my heart
  alternatives:
  - I took ... to heart
  - I gave my heart to
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for inward reflection or serious consideration.
    'Laid ... to my heart' preserves the metaphor while remaining understandable in
    English.
- source_word: וְלָבוּר
  chosen: even to examine
  alternatives:
  - and to explore
  - and to clarify
  lexicon: HALOT
  rationale: From ברר/בור in this context, conveying investigation or sorting out
    mentally. 'Examine' fits Qoheleth's reflective inquiry.
- source_word: הַצַּדִּיקִים
  chosen: the righteous
  alternatives:
  - the just
  lexicon: HALOT
  rationale: Standard rendering preserving moral/covenantal sense rather than reducing
    to merely forensic or civic justice.
- source_word: הַחֲכָמִים
  chosen: the wise
  alternatives:
  - the sages
  lexicon: HALOT
  rationale: Natural English equivalent in wisdom literature; broad enough to include
    practical and reflective wisdom.
- source_word: וַעֲבָדֵיהֶם
  chosen: their deeds
  alternatives:
  - their works
  - their servants
  lexicon: HALOT
  rationale: Although the consonants can suggest 'their servants,' the sense in context
    is best taken as 'their deeds/works,' i.e., what belongs to or is done by the
    righteous and wise. This yields the coherent statement that both persons and their
    actions are in God's hand.
- source_word: בְּיַד הָאֱלֹהִים
  chosen: in the hand of God
  alternatives:
  - under God's control
  - in God's power
  lexicon: HALOT
  rationale: Retains the concrete Hebrew metaphor of divine sovereignty and care without
    over-interpreting its nuance.
- source_word: גַּם אַהֲבָה גַם שִׂנְאָה
  chosen: Whether love or hate
  alternatives:
  - both love and hate
  - either love or hatred
  lexicon: HALOT
  rationale: The phrase introduces contrasting possible experiences or responses whose
    occurrence cannot be predicted by humans. 'Whether ... or ...' captures the uncertainty
    implied in context.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here the singular
    generic refers representatively to humanity; 'man' preserves the Hebrew form and
    proverbial tone.
- source_word: הַכֹּל לִפְנֵיהֶם
  chosen: everything is before them
  alternatives:
  - all lies before them
  - all is before them
  lexicon: HALOT
  rationale: A difficult clause. This rendering stays close to the Hebrew while allowing
    the sense that the full range of possible outcomes lies ahead of them, unknown
    in advance.
