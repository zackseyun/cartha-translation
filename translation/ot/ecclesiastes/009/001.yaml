theological_decisions:
- issue: Meaning of וַעֲבָדֵיהֶם
  chosen_reading: their deeds
  alternative_readings:
  - their servants
  rationale: The immediate context concerns the fate and condition of the righteous
    and wise under God's providence. Reading the term as 'their deeds/works' best
    fits the flow and avoids introducing a new social category without contextual
    support. The alternative is preserved in a footnote because the consonantal form
    naturally suggests 'servants.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Sense of the clause about love and hate
  chosen_reading: human beings do not know in advance whether love or hate awaits
    them
  alternative_readings:
  - humans do not know love or hate by all that is before them
  - humans cannot discern from present circumstances whether they are loved or hated
  rationale: 'The Hebrew is compressed and somewhat ambiguous. The chosen English
    reflects the common contextual sense in Ecclesiastes: outward circumstances do
    not reveal what lies ahead or how events will fall out. The ambiguity is preserved
    by a footnote rather than being fully resolved dogmatically.'
  doctrine_reference: Translation philosophy §3
