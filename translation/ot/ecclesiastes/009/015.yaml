theological_decisions:
- issue: Rendering of אָדָם in a generic negative clause
  chosen_reading: no man
  alternative_readings:
  - no one
  rationale: The Hebrew uses אָדָם generically. In line with the doctrine's gender-accurate
    policy and its specific guidance for אָדָם ('man / humankind' depending on context),
    'no man' best reflects the source form while remaining understandable. Because
    English readers may hear this as male-exclusive, the inclusive idiomatic alternative
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
