id: ECC.9.15
reference: Ecclesiastes 9:15
source:
  edition: WLC
  text: וּ/מָ֣צָא בָ֗/הּ אִ֤ישׁ מִסְכֵּן֙ חָכָ֔ם וּ/מִלַּט ה֥וּא אֶת הָ/עִ֖יר בְּ/חָכְמָת֑/וֹ
    וְ/אָדָם֙ לֹ֣א זָכַ֔ר אֶת הָ/אִ֥ישׁ הַ/מִּסְכֵּ֖ן הַ/הּֽוּא־־־׃
translation:
  text: And there was found in it a poor wise man, and he delivered the city by his
    wisdom; yet no man remembered that poor man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'yet no one remembered that poor man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָצָא בָהּ
  chosen: there was found in it
  alternatives:
  - he found in it
  - it was found in it
  lexicon: HALOT
  rationale: 'The verb מצא is Qal perfect 3ms with prefixed conjunction, but in this
    context it functions idiomatically with an indefinite sense: someone/such a man
    was found in the city. English passive ''there was found in it'' preserves the
    Hebrew sense without inventing an explicit subject.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: איש ordinarily means 'man' or 'male person.' Given the masculine singular
    form and the project's gender-accurate policy, 'man' is preferred over the more
    neutral 'person'.
- source_word: מִסְכֵּן
  chosen: poor
  alternatives:
  - needy
  - impoverished
  lexicon: HALOT
  rationale: The adjective denotes poverty or low social/economic status. 'Poor' is
    the most natural and direct rendering here and matches its repeated use later
    in the verse.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: The adjective here describes the man's wisdom in the ordinary sapiential
    sense. 'Wise' fits Ecclesiastes' recurring vocabulary and thematic emphasis.
- source_word: וּמִלַּט הוּא אֶת הָעִיר
  chosen: and he delivered the city
  alternatives:
  - and he saved the city
  - and he escaped the city
  lexicon: HALOT
  rationale: מלט in the Piel commonly means to deliver or rescue. With the city as
    direct object, the sense is that he rescued it. 'Delivered' preserves the formal
    sense; 'saved' is possible but slightly more interpretive in English.
- source_word: בְּחָכְמָתוֹ
  chosen: by his wisdom
  alternatives:
  - through his wisdom
  - with his wisdom
  lexicon: HALOT
  rationale: The preposition ב marks means or instrument here. 'By his wisdom' is
    concise and idiomatic, preserving the causal/instrumental force.
- source_word: וְאָדָם
  chosen: yet no man
  alternatives:
  - but no one
  - and no man
  lexicon: HALOT
  rationale: 'אָדָם can mean ''man'' or ''humankind.'' In this clause it has an indefinite
    generic sense: no human being. Because the Hebrew is singular masculine/generic
    and the project''s policy prefers gender-accurate renderings, ''no man'' is retained
    in the main text; the more idiomatic inclusive alternative is preserved in a footnote.'
- source_word: זָכַר
  chosen: remembered
  alternatives:
  - recalled
  - kept in mind
  lexicon: HALOT
  rationale: זכר straightforwardly means 'remember.' 'Remembered' is the natural English
    equivalent and preserves the contrast between the man's effective wisdom and society's
    failure to honor him.
- source_word: הָאִישׁ הַמִּסְכֵּן הַהוּא
  chosen: that poor man
  alternatives:
  - that impoverished man
  - that poor fellow
  lexicon: HALOT
  rationale: The full phrase is definite and demonstrative, literally 'that poor man.'
    This preserves the Hebrew emphasis on the specific individual who had delivered
    the city.
