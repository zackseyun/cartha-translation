id: ECC.9.14
reference: Ecclesiastes 9:14
source:
  edition: WLC
  text: עִ֣יר קְטַנָּ֔ה וַ/אֲנָשִׁ֥ים בָּ֖/הּ מְעָ֑ט וּ/בָֽא אֵלֶ֜י/הָ מֶ֤לֶךְ גָּדוֹל֙
    וְ/סָבַ֣ב אֹתָ֔/הּ וּ/בָנָ֥ה עָלֶ֖י/הָ מְצוֹדִ֥ים גְּדֹלִֽים־׃
translation:
  text: There was a small city, and few men were in it; and a great king came against
    it, surrounded it, and built great siegeworks against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'built great bulwarks against it' or 'built great siege ramps against
      it.' The Hebrew מְצוֹדִים can refer more broadly to siege structures or fortifications.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר קְטַנָּה
  chosen: a small city
  alternatives:
  - a little city
  lexicon: HALOT
  rationale: עִיר is the ordinary term for 'city,' and קְטַנָּה describes its small
    size. 'Small city' is natural modern English and preserves the straightforward
    description.
- source_word: וַאֲנָשִׁים בָּהּ מְעָט
  chosen: and few men were in it
  alternatives:
  - and few people were in it
  - and the men in it were few
  lexicon: HALOT
  rationale: אֲנָשִׁים is the plural of אִישׁ, commonly 'men.' Per the gender-accurate
    policy, 'men' is retained rather than neutralizing to 'people,' since the Hebrew
    form is masculine plural. The clause is idiomatically rendered in English as 'few
    men were in it.'
- source_word: וּבָא אֵלֶיהָ
  chosen: came against it
  alternatives:
  - came to it
  - came to attack it
  lexicon: HALOT
  rationale: בוא with אֶל can mean simply 'come to,' but in this military context,
    followed by surrounding and building siegeworks, the hostile sense is implicit.
    'Came against it' makes the contextual force explicit without over-paraphrasing.
- source_word: מֶלֶךְ גָּדוֹל
  chosen: a great king
  alternatives:
  - a mighty king
  lexicon: HALOT
  rationale: The phrase is literal and contrasts the city's smallness with the king's
    greatness. 'Great king' preserves the lexical correspondence and rhetorical contrast.
- source_word: וְסָבַב אֹתָהּ
  chosen: surrounded it
  alternatives:
  - encircled it
  lexicon: HALOT
  rationale: סבב means to go around or surround. 'Surrounded it' is the clearest natural
    English in a siege context.
- source_word: וּבָנָה עָלֶיהָ
  chosen: and built ... against it
  alternatives:
  - and built over it
  - and constructed against it
  lexicon: HALOT
  rationale: בנה is 'build,' and עַל in siege contexts can indicate hostile construction
    directed against a city. 'Built ... against it' fits the military setting and
    the following object מְצוֹדִים.
- source_word: מְצוֹדִים גְּדֹלִים
  chosen: great siegeworks
  alternatives:
  - great bulwarks
  - great siege ramps
  - great fortifications
  lexicon: HALOT
  rationale: מְצוֹדִים can denote siege structures or strongholds. In context of attacking
    a city, 'siegeworks' best captures the military engineering sense without committing
    too narrowly to one specific structure. 'Great' preserves גְּדֹלִים and echoes
    the earlier 'great king.'
