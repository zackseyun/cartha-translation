id: ECC.9.8
reference: Ecclesiastes 9:8
source:
  edition: WLC
  text: בְּ/כָל עֵ֕ת יִהְי֥וּ בְגָדֶ֖י/ךָ לְבָנִ֑ים וְ/שֶׁ֖מֶן עַל רֹאשְׁ/ךָ֥ אַל
    יֶחְסָֽר־־־׃
translation:
  text: Let your garments always be white, and do not let oil be lacking on your head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At all times let your garments be white.'
    reason: lexical_alternative
  - marker: b
    text: The imagery of white garments and oil on the head evokes festivity, joy,
      and well-being rather than mourning.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/כָל עֵת
  chosen: always
  alternatives:
  - at all times
  - at every time
  lexicon: HALOT
  rationale: The phrase literally means 'at every time.' In idiomatic English, 'always'
    best captures the continual force without sounding wooden.
- source_word: יִהְיוּ
  chosen: let ... be
  alternatives:
  - may ... be
  - shall ... be
  lexicon: HALOT
  rationale: The Hebrew imperfect here functions jussively in context, expressing
    exhortation rather than simple future. 'Let ... be' conveys the imperative-like
    force naturally in English.
- source_word: בְגָדֶיךָ
  chosen: your garments
  alternatives:
  - your clothes
  - your clothing
  lexicon: HALOT
  rationale: '''Garments'' preserves the concrete plural noun and fits the elevated
    but readable tone of wisdom literature better than the more casual ''clothes.'''
- source_word: לְבָנִים
  chosen: white
  alternatives:
  - bright
  - clean white
  lexicon: HALOT
  rationale: The adjective denotes whiteness. 'White' is the direct lexical equivalent
    and preserves the imagery without over-interpreting its symbolic value.
- source_word: וְשֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  - anointing oil
  lexicon: HALOT
  rationale: The Hebrew simply says 'oil.' While olive oil is culturally likely and
    anointing is part of the image, the text does not specify either, so the more
    general 'oil' is retained.
- source_word: עַל רֹאשְׁךָ
  chosen: on your head
  alternatives:
  - upon your head
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'on your head'
    is natural modern English.
- source_word: אַל יֶחְסָר
  chosen: do not let ... be lacking
  alternatives:
  - let ... not fail
  - do not lack
  - let ... not be absent
  lexicon: HALOT
  rationale: The negative particle with imperfect has prohibitive/jussive force. 'Do
    not let oil be lacking' preserves both the verbal sense of absence/lack and the
    exhortational tone better than the flatter 'do not lack oil.'
