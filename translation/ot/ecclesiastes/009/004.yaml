theological_decisions:
- issue: Meaning of the opening clause with יבחר
  chosen_reading: whoever is joined to all the living
  alternative_readings:
  - whoever is chosen among all the living
  - for who is excepted among all the living
  rationale: The Masoretic pointing yields a difficult reading if taken as 'chosen.'
    Context strongly favors the sense that anyone still counted among the living retains
    hope. This is an exegetical rather than doctrinal decision, and the translation
    preserves Qoheleth's emphasis on the advantage of life over death without importing
    theological claims beyond the text.
