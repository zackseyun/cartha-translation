id: ECC.9.4
reference: Ecclesiastes 9:4
source:
  edition: WLC
  text: כִּי מִי֙ אֲשֶׁ֣ר יבחר אֶ֥ל כָּל הַ/חַיִּ֖ים יֵ֣שׁ בִּטָּח֑וֹן כִּֽי לְ/כֶ֤לֶב
    חַי֙ ה֣וּא ט֔וֹב מִן הָ/אַרְיֵ֖ה הַ/מֵּֽת־־־־׃
translation:
  text: For whoever is joined to all the living has hope, because a living dog is
    better than a dead lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'whoever is chosen among all the living has confidence.' The
      Hebrew form in the opening clause is difficult, and some understand it differently.
    reason: alternative_reading
  - marker: b
    text: '''Hope'' could also be rendered ''confidence'' or ''security.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יבחר
  chosen: is joined
  alternatives:
  - is chosen
  - is united
  - belongs
  lexicon: HALOT
  rationale: Although the consonantal form could suggest the common verb 'choose,'
    the context and ancient versions support the sense of being attached or joined
    to the company of the living. 'Is joined' gives coherent sense in English and
    fits the contrast with the dead.
- source_word: אֶל כָּל הַחַיִּים
  chosen: to all the living
  alternatives:
  - among all the living
  - with all the living
  lexicon: HALOT
  rationale: The phrase denotes association with the living as a class. In idiomatic
    English, this is best represented in the full clause as 'is joined to all the
    living,' preserving the relational force of אֶל while remaining natural.
- source_word: בִּטָּחוֹן
  chosen: hope
  alternatives:
  - confidence
  - security
  lexicon: HALOT
  rationale: The noun can denote security or confidence, but in this context the point
    is that life still leaves open possibility, in contrast to death. 'Hope' captures
    Qoheleth's pragmatic sense better than the more static 'security.'
- source_word: לְכֶלֶב חַי
  chosen: a living dog
  alternatives:
  - a live dog
  lexicon: HALOT
  rationale: Rendered straightforwardly. The indefinite sense works best in English
    proverb form.
- source_word: טוֹב מִן
  chosen: is better than
  alternatives:
  - is preferable to
  lexicon: HALOT
  rationale: Standard comparative construction; 'is better than' preserves the proverbial
    simplicity.
- source_word: הָאַרְיֵה הַמֵּת
  chosen: a dead lion
  alternatives:
  - the dead lion
  lexicon: HALOT
  rationale: 'Although the Hebrew has articles, English proverbial comparison is more
    natural with an indefinite expression here. The contrast is qualitative: even
    a lowly living creature surpasses a noble dead one.'
