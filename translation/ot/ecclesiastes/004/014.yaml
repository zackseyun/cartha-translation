id: ECC.4.14
reference: Ecclesiastes 4:14
source:
  edition: WLC
  text: כִּֽי מִ/בֵּ֥ית הָ/סוּרִ֖ים יָצָ֣א לִ/מְלֹ֑ךְ כִּ֛י גַּ֥ם בְּ/מַלְכוּת֖/וֹ
    נוֹלַ֥ד רָֽשׁ־׃
translation:
  text: For he came out from the house of prisoners to reign, though even in his kingdom
    he had been born poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from prison'; Hebrew literally, 'from the house of prisoners.'
    reason: lexical_alternative
  - marker: b
    text: Or 'during his reign he was born poor,' with 'kingship/reign' as an alternative
      sense of 'kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֵּית הָסוּרִים
  chosen: from the house of prisoners
  alternatives:
  - from prison
  - from the house of confinement
  lexicon: HALOT
  rationale: Literally 'from the house of the bound/prisoners.' Retaining 'house'
    reflects the Hebrew idiom while remaining understandable; 'prison' is a smoother
    alternative but slightly less transparent to the source wording.
- source_word: יָצָא
  chosen: came out
  alternatives:
  - went out
  - emerged
  lexicon: HALOT
  rationale: Common verb 'go out/come out.' 'Came out' fits idiomatic English with
    the source image of leaving confinement.
- source_word: לִמְלֹךְ
  chosen: to reign
  alternatives:
  - to become king
  - to rule
  lexicon: HALOT
  rationale: Infinitive of מלך, 'to reign/be king.' 'To reign' preserves the royal
    sense without overexpanding the wording.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Here it intensifies the concessive force of the second clause: despite
    attaining kingship, he was ''even'' born poor.'
- source_word: בְּמַלְכוּתוֹ
  chosen: in his kingdom
  alternatives:
  - in his kingship
  - during his reign
  lexicon: HALOT
  rationale: The noun can denote kingship, reign, or kingdom. 'In his kingdom' is
    a close rendering of the form, though contextually it may overlap with 'during
    his reign.'
- source_word: נוֹלַד
  chosen: had been born
  alternatives:
  - was born
  lexicon: HALOT
  rationale: A passive perfective form referring to prior birth relative to his later
    reign. English past perfect clarifies the temporal relationship naturally.
- source_word: רָשׁ
  chosen: poor
  alternatives:
  - needy
  - destitute
  lexicon: HALOT
  rationale: Standard sense is 'poor' or 'impoverished.' 'Poor' is the most direct
    and idiomatic choice.
- source_word: כִּי ... כִּי
  chosen: For ... though
  alternatives:
  - For ... for
  - Indeed ... though
  lexicon: HALOT
  rationale: 'The first כִּי is causal/explanatory (''for''). The second is better
    taken concessively in context, yielding natural English: ''though even...'' This
    preserves the logic of the verse rather than woodenly repeating ''for.'''
