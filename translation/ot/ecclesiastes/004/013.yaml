id: ECC.4.13
reference: Ecclesiastes 4:13
source:
  edition: WLC
  text: ט֛וֹב יֶ֥לֶד מִסְכֵּ֖ן וְ/חָכָ֑ם מִ/מֶּ֤לֶךְ זָקֵן֙ וּ/כְסִ֔יל אֲשֶׁ֛ר לֹא
    יָדַ֥ע לְ/הִזָּהֵ֖ר עֽוֹד־׃
translation:
  text: Better is a poor but wise youth than an old and foolish king who no longer
    knows how to take warning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who no longer knows how to receive instruction' or 'how to be admonished.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Good is
  - Better
  lexicon: HALOT
  rationale: Used in the comparative construction with מִן ('than'), so idiomatic
    English requires 'Better is ... than ...' rather than a simple adjectival 'good.'
- source_word: יֶלֶד
  chosen: youth
  alternatives:
  - boy
  - child
  - young man
  lexicon: HALOT
  rationale: The term denotes a young person; 'youth' fits the proverbial contrast
    with 'old king' without over-specifying childhood ('boy') or adulthood ('young
    man').
- source_word: מִסְכֵּן
  chosen: poor
  alternatives:
  - needy
  - impoverished
  lexicon: HALOT
  rationale: The adjective most naturally denotes poverty or low status here. 'Poor'
    is concise and idiomatic in wisdom literature.
- source_word: וְחָכָם
  chosen: but wise
  alternatives:
  - and wise
  lexicon: HALOT
  rationale: 'The conjunction joins two adjectives describing the youth, but English
    idiom often uses ''but'' in a concessive sense after ''poor'' to highlight the
    contrast: poor yet wise. This preserves the sense without adding content.'
- source_word: מִמֶּלֶךְ
  chosen: than ... king
  alternatives:
  - than a king
  lexicon: HALOT
  rationale: Governed by the comparative מִן after טוֹב, so rendered with 'than.'
    The noun itself is straightforwardly 'king.'
- source_word: זָקֵן
  chosen: old
  alternatives:
  - aged
  - elderly
  lexicon: HALOT
  rationale: Simple, natural contrast with 'youth.'
- source_word: וּכְסִיל
  chosen: and foolish
  alternatives:
  - but foolish
  - stupid
  lexicon: HALOT
  rationale: כְּסִיל in wisdom literature denotes a morally and practically foolish
    person, not merely unintelligent. 'Foolish' preserves that register better than
    'stupid.'
- source_word: אֲשֶׁר לֹא יָדַע
  chosen: who ... no longer knows
  alternatives:
  - who does not know
  - who has not known
  lexicon: HALOT
  rationale: 'The relative clause describes the king''s present condition. Adding
    ''longer'' reflects the force of עוֹד with the negated verb: he no longer knows
    / does not know anymore.'
- source_word: לְהִזָּהֵר
  chosen: to take warning
  alternatives:
  - to be admonished
  - to receive instruction
  - to be careful
  lexicon: HALOT
  rationale: In this context the Niphal infinitive conveys allowing oneself to be
    warned or corrected. 'Take warning' is idiomatic English that captures receptivity
    to admonition better than the more generic 'be careful.'
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  - still
  lexicon: HALOT
  rationale: 'With the negated verb it marks continuation no more: ''no longer'' or
    ''anymore.'' ''No longer'' reads more smoothly in formal proverbial English.'
