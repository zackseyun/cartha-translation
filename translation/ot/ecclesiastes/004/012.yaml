id: ECC.4.12
reference: Ecclesiastes 4:12
source:
  edition: WLC
  text: וְ/אִֽם יִתְקְפ/וֹ֙ הָ/אֶחָ֔ד הַ/שְּׁנַ֖יִם יַעַמְד֣וּ נֶגְדּ֑/וֹ וְ/הַ/חוּט֙
    הַֽ/מְשֻׁלָּ֔שׁ לֹ֥א בִ/מְהֵרָ֖ה יִנָּתֵֽק־׃
translation:
  text: And if someone overpowers one, two will stand against him; and a threefold
    cord is not quickly broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a three-stranded cord.' The Hebrew describes a cord made threefold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  - But if
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the previous verse. 'And if'
    preserves the connective force of ו while remaining natural in English.
- source_word: יִתְקְפוֹ
  chosen: someone overpowers one
  alternatives:
  - someone prevails against one
  - someone attacks one
  - he overpowers him
  lexicon: HALOT
  rationale: From תקף, conveying being strong against or overpowering. The suffix
    points to a singular object ('him'), and in context with הָאֶחָד the sense is
    that one person is overpowered. 'Someone overpowers one' makes the implicit subject
    explicit in idiomatic English without over-specifying 'attack'.
- source_word: הָאֶחָד
  chosen: one
  alternatives:
  - the one
  - one person
  lexicon: HALOT
  rationale: Refers back to the solitary individual in the surrounding context. 'One'
    is concise and preserves the proverbial style.
- source_word: הַשְּׁנַיִם
  chosen: two
  alternatives:
  - the two
  - two people
  lexicon: HALOT
  rationale: The dual form contrasts with 'one' and is best preserved directly as
    'two' in the proverb.
- source_word: יַעַמְדוּ נֶגְדּוֹ
  chosen: will stand against him
  alternatives:
  - will withstand him
  - will resist him
  - will stand up to him
  lexicon: HALOT
  rationale: Literally 'will stand before/against him.' 'Stand against him' preserves
    the concrete imagery and the adversative sense of נֶגֶד in context.
- source_word: וְהַחוּט
  chosen: and a cord
  alternatives:
  - and the cord
  - and a thread
  lexicon: HALOT
  rationale: חוּט denotes a cord/thread. 'Cord' better fits the strength metaphor
    than 'thread.' The article is rendered idiomatically as indefinite in English
    proverbial style.
- source_word: הַמְשֻׁלָּשׁ
  chosen: threefold
  alternatives:
  - tripled
  - three-stranded
  - made into three
  lexicon: HALOT
  rationale: Describes something made threefold or consisting of three parts. 'Threefold'
    is idiomatic and traditional while accurately conveying the participial sense.
    'Three-stranded' is a plausible interpretive alternative preserved in a footnote.
- source_word: לֹא בִמְהֵרָה
  chosen: is not quickly
  alternatives:
  - is not easily
  - not soon
  lexicon: HALOT
  rationale: בִמְהֵרָה means 'quickly, speedily.' English idiom often uses 'easily'
    here, but 'quickly' stays closer to the Hebrew while still implying difficulty
    in context.
- source_word: יִנָּתֵק
  chosen: broken
  alternatives:
  - snapped
  - torn apart
  - severed
  lexicon: HALOT
  rationale: The Niphal of נתק conveys being pulled apart, snapped, or broken. 'Broken'
    is broad and natural in English for a cord, while avoiding over-precision.
