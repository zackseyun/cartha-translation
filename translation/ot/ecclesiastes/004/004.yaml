id: ECC.4.4
reference: Ecclesiastes 4:4
source:
  edition: WLC
  text: וְ/רָאִ֨יתִֽי אֲנִ֜י אֶת כָּל עָמָ֗ל וְ/אֵת֙ כָּל כִּשְׁר֣וֹן הַֽ/מַּעֲשֶׂ֔ה
    כִּ֛י הִ֥יא קִנְאַת אִ֖ישׁ מֵ/רֵעֵ֑/הוּ גַּם זֶ֥ה הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־־־־־׃
translation:
  text: And I saw that all labor and all skill in work come from a man's envy of his
    neighbor. This too is vanity and a chasing after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all success in work'; the Hebrew כִּשְׁרוֹן can refer to skill, competence,
      or the success that results from it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man's envy of his neighbor.' The singular masculine likely has
      representative force.
    reason: lexical_alternative
  - marker: c
    text: Or 'striving after wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָמָל
  chosen: labor
  alternatives:
  - toil
  lexicon: HALOT
  rationale: In Ecclesiastes, עָמָל regularly denotes burdensome human work or toil.
    'Labor' is natural modern English and preserves the sense of exertion without
    over-paraphrasing.
- source_word: כִּשְׁרוֹן
  chosen: skill
  alternatives:
  - success
  - advantage
  - competence
  lexicon: HALOT
  rationale: The noun can denote skillfulness or success/proficiency. In the phrase
    'all skill in work,' 'skill' best captures the quality of workmanship that leads
    to achievement, while avoiding an interpretive overreach toward mere outcomes.
- source_word: הַמַּעֲשֶׂה
  chosen: work
  alternatives:
  - deed
  - task
  lexicon: HALOT
  rationale: Here the term refers to human activity or workmanship generally. 'Work'
    fits the context of labor and achievement.
- source_word: כִּי הִיא
  chosen: come from
  alternatives:
  - is
  - amounts to
  lexicon: HALOT
  rationale: 'Literally, ''for it is.'' In English, an explicit predicate is needed
    to make sense of the clause. ''Come from'' expresses the causal force implied
    by the verbless Hebrew: labor and skill are driven by envy.'
- source_word: קִנְאַת
  chosen: envy
  alternatives:
  - jealousy
  - zeal
  lexicon: HALOT
  rationale: In this context of rivalry between people, 'envy' is the clearest English
    rendering. 'Jealousy' is possible, but 'envy' better conveys resentful desire
    provoked by another's success.
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - someone's
  - one person's
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per the project's gender-accurate policy,
    'a man's' preserves the source form and representative force better than a gender-neutral
    recasting.
- source_word: מֵרֵעֵהוּ
  chosen: of his neighbor
  alternatives:
  - toward his companion
  - because of his friend
  lexicon: HALOT
  rationale: The preposition with רֵעַ here marks the relational object provoking
    envy. 'Of his neighbor' is idiomatic English and preserves the interpersonal comparison
    in view.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - vapor
  - meaninglessness
  lexicon: HALOT
  rationale: Ecclesiastes uses הֶבֶל as a thematic term with a range including transience,
    futility, and insubstantiality. 'Vanity' preserves traditional resonance while
    remaining concise; alternatives are possible but context does not demand a narrower
    gloss.
- source_word: רְעוּת רוּחַ
  chosen: a chasing after wind
  alternatives:
  - striving after wind
  - shepherding the wind
  lexicon: HALOT
  rationale: This idiom in Ecclesiastes conveys futile pursuit. 'A chasing after wind'
    is idiomatic modern English and communicates the image clearly. 'Striving after
    wind' is traditional, but slightly less vivid for contemporary readers.
