theological_decisions:
- issue: Metaphorical force of 'eats his own flesh'
  chosen_reading: Retain the literal metaphor in the main text as an image of self-destructive
    folly.
  alternative_readings:
  - Render interpretively as 'ruins himself' or 'consumes himself'
  rationale: The Hebrew uses a striking bodily metaphor rather than an abstract explanation.
    Preserving the metaphor aligns with optimal equivalence and avoids importing a
    narrower interpretation while still allowing readers to perceive the sense of
    self-harm.
  doctrine_reference: Translation philosophy §1, §3, §6
