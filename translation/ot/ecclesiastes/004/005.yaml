id: ECC.4.5
reference: Ecclesiastes 4:5
source:
  edition: WLC
  text: הַ/כְּסִיל֙ חֹבֵ֣ק אֶת יָדָ֔י/ו וְ/אֹכֵ֖ל אֶת בְּשָׂרֽ/וֹ־־׃
translation:
  text: The fool folds his hands and eats his own flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'embraces/clasps his hands'; the image is of idle inactivity.
    reason: lexical_alternative
  - marker: b
    text: That is, he destroys himself by his folly or laziness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּסִיל
  chosen: the fool
  alternatives:
  - the stupid man
  - the dullard
  lexicon: HALOT
  rationale: כְּסִיל in wisdom literature denotes a morally and intellectually foolish
    person, not merely someone lacking intelligence. 'The fool' is the standard, natural
    English rendering and fits the proverbial tone.
- source_word: חֹבֵק
  chosen: folds
  alternatives:
  - embraces
  - clasps
  lexicon: HALOT
  rationale: The verb literally means 'embraces/clasps.' With 'hands' as its object,
    the idiom refers to folding or clasping one's hands, a gesture of idleness or
    inactivity. 'Folds' communicates the idiomatic sense in clear modern English.
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his arms
  lexicon: HALOT
  rationale: יָד is 'hand'; the dual/plural form with 3ms suffix here naturally means
    'his hands.' This preserves the concrete image.
- source_word: וְאֹכֵל
  chosen: and eats
  alternatives:
  - and is eating
  - so he eats
  lexicon: HALOT
  rationale: The participle continues the proverbial description. Simple present 'and
    eats' is idiomatic in English and preserves the gnomic force.
- source_word: בְּשָׂרוֹ
  chosen: his own flesh
  alternatives:
  - his flesh
  - himself
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In context it is metaphorical for self-destruction
    brought on by laziness or folly. The main text keeps the vivid literal image,
    while 'own' makes explicit the possessive suffix and the reflexive force.
