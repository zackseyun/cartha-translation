id: ECC.4.9
reference: Ecclesiastes 4:9
source:
  edition: WLC
  text: טוֹבִ֥ים הַ/שְּׁנַ֖יִם מִן הָ/אֶחָ֑ד אֲשֶׁ֧ר יֵשׁ לָ/הֶ֛ם שָׂכָ֥ר ט֖וֹב בַּ/עֲמָלָֽ/ם־־׃
translation:
  text: Two are better than one, because they have a good reward for their labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for they have a good return from their toil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבִים
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: Predicate adjective in a comparative construction with מִן; idiomatic
    English requires the comparative 'better' rather than the more wooden 'good.'
- source_word: הַשְּׁנַיִם
  chosen: two
  alternatives:
  - the two
  lexicon: HALOT
  rationale: The numeral with article is generic/proverbial here, not pointing to
    two previously identified individuals. English proverb style is more natural with
    'Two' rather than 'the two.'
- source_word: מִן הָאֶחָד
  chosen: than one
  alternatives:
  - than the one
  - than one person alone
  lexicon: HALOT
  rationale: 'Marks comparison: ''than one.'' The article on ''one'' is not best carried
    over woodenly in English; the sense is singularity/solitude rather than a specific
    previously mentioned individual.'
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - for
  - since
  - which
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'Because' makes the
    causal force explicit in clear modern English.
- source_word: יֵשׁ לָהֶם
  chosen: they have
  alternatives:
  - there is for them
  lexicon: HALOT
  rationale: 'Existential construction with ל expresses possession idiomatically in
    English: ''they have.'''
- source_word: שָׂכָר
  chosen: reward
  alternatives:
  - wages
  - profit
  - return
  lexicon: HALOT
  rationale: Denotes recompense or return for work. 'Reward' fits the wisdom context
    and pairs naturally with 'for their labor,' while remaining broad enough to include
    benefit/result, not merely salary.
- source_word: טוֹב
  chosen: good
  alternatives:
  - better
  - fitting
  - beneficial
  lexicon: HALOT
  rationale: 'Qualifies שָׂכָר directly: a ''good'' reward/return. Here simple qualitative
    ''good'' is preferable to more interpretive alternatives.'
- source_word: בַּעֲמָלָם
  chosen: for their labor
  alternatives:
  - from their labor
  - in their toil
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes commonly refers to labor/toil. The preposition
    ב can be rendered in context as the sphere/source of recompense; 'for their labor'
    is idiomatic English and captures the relation between work and reward.
