id: ECC.4.10
reference: Ecclesiastes 4:10
source:
  edition: WLC
  text: כִּ֣י אִם יִפֹּ֔לוּ הָ/אֶחָ֖ד יָקִ֣ים אֶת חֲבֵר֑/וֹ וְ/אִ֣י/ל֗/וֹ הָֽ/אֶחָד֙
    שֶׁ/יִּפּ֔וֹל וְ/אֵ֥ין שֵׁנִ֖י לַ/הֲקִימֽ/וֹ־־׃
translation:
  text: For if they fall, one will lift up his companion; but woe to the one who falls
    when there is not a second to lift him up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' for 'his companion.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and there is no second to lift him up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - If indeed
  - For when
  lexicon: HALOT
  rationale: The combination introduces an explanatory conditional clause. 'For if'
    preserves the connection to the preceding argument about the advantage of two
    over one while remaining natural in English.
- source_word: יִפֹּלוּ
  chosen: they fall
  alternatives:
  - they should fall
  - they stumble
  lexicon: HALOT
  rationale: Qal imperfect plural of נפל, here best rendered as a simple present/future-like
    conditional, 'if they fall.' 'Stumble' is possible contextually, but 'fall' preserves
    the concrete imagery and verbal link with the singular occurrence later in the
    verse.
- source_word: הָאֶחָד
  chosen: one
  alternatives:
  - the one
  - one of them
  lexicon: HALOT
  rationale: In context of two persons, 'one' is idiomatic English and captures the
    distributive sense without overloading the line. The article is not naturally
    reproduced as 'the one' in the first clause.
- source_word: יָקִים
  chosen: will lift up
  alternatives:
  - will raise up
  - will help up
  lexicon: HALOT
  rationale: Hiphil of קום means to cause to rise. 'Lift up' fits the physical image
    of someone fallen and is standard, clear English. 'Raise up' can sound more formal
    or metaphorical; 'help up' is interpretive.
- source_word: אֶת חֲבֵרוֹ
  chosen: his companion
  alternatives:
  - his friend
  - his fellow
  lexicon: HALOT
  rationale: חבר denotes an associate/companion. 'Companion' is broad and contextually
    apt, avoiding the potentially narrower emotional sense of 'friend' while sounding
    more natural than 'fellow'.
- source_word: וְאִילוֹ
  chosen: but woe
  alternatives:
  - but alas
  - but pity
  lexicon: HALOT
  rationale: This interjection introduces lament or warning. 'But woe' preserves the
    force and gravity of the Hebrew better than the softer 'alas,' while fitting wisdom-style
    admonition.
- source_word: הָאֶחָד שֶׁיִּפּוֹל
  chosen: to the one who falls
  alternatives:
  - to the one that falls
  - to him who falls
  lexicon: HALOT
  rationale: This phrase identifies the solitary person in contrast to the pair. 'The
    one who falls' is natural modern English and preserves the masculine singular
    reference.
- source_word: וְאֵין שֵׁנִי
  chosen: when there is not a second
  alternatives:
  - and there is no second
  - with no other person
  lexicon: HALOT
  rationale: The Hebrew states literally 'and there is no second.' Rendering it as
    'when there is not a second' makes the circumstance explicit in smooth English
    while preserving the numerical contrast central to the verse.
- source_word: לַהֲקִימוֹ
  chosen: to lift him up
  alternatives:
  - to raise him up
  - to help him up
  lexicon: HALOT
  rationale: Infinitive of קום with pronominal suffix repeats the earlier verb and
    should be rendered consistently. 'Lift him up' preserves the imagery and verbal
    repetition.
