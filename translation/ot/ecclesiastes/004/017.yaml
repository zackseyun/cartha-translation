id: ECC.4.17
reference: Ecclesiastes 4:17
source:
  edition: WLC
  text: שְׁמֹ֣ר רגלי/ך כַּ/אֲשֶׁ֤ר תֵּלֵךְ֙ אֶל בֵּ֣ית הָ/אֱלֹהִ֔ים וְ/קָר֣וֹב לִ/שְׁמֹ֔עַ
    מִ/תֵּ֥ת הַ/כְּסִילִ֖ים זָ֑בַח כִּֽי אֵינָ֥/ם יוֹדְעִ֖ים לַ/עֲשׂ֥וֹת רָֽע־־׃
translation:
  text: Guard your steps when you go to the house of God, and draw near to listen
    rather than to offer the sacrifice of fools, for they do not know that they are
    doing evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Guard your feet when you go to the house of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to hear' instead of 'to listen.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, 'for they do not know to do evil,' likely meaning they
      do not realize that their action is evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  chosen: Guard
  alternatives:
  - Keep
  - Watch
  lexicon: HALOT
  rationale: Imperative of שמר here calls for careful vigilance. 'Guard' fits the
    admonitory tone and works idiomatically with 'your steps' in English.
- source_word: רגליך
  chosen: your steps
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: Literally 'your feet,' but in this context the idiom concerns one's manner
    of approach or conduct. 'Your steps' preserves the concrete image while sounding
    natural in English.
- source_word: כַּאֲשֶׁר תֵּלֵךְ
  chosen: when you go
  alternatives:
  - as you go
  - whenever you go
  lexicon: HALOT
  rationale: 'Temporal sense is most natural here: the warning applies at the time
    of approaching worship.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple
  lexicon: HALOT
  rationale: Formal phrase retained. 'Temple' would be interpretive; 'house of God'
    preserves the Hebrew expression and its broader worship setting.
- source_word: וְקָרוֹב
  chosen: and draw near
  alternatives:
  - and be near
  - and come near
  lexicon: HALOT
  rationale: Though the form is terse, the sense is exhortational in sequence with
    the imperative. 'Draw near' is idiomatic English for reverent approach in worship.
- source_word: לִשְׁמֹעַ
  chosen: to listen
  alternatives:
  - to hear
  lexicon: HALOT
  rationale: '''Listen'' better conveys attentive, obedient hearing in wisdom literature
    than the more passive ''hear.'''
- source_word: מִתֵּת
  chosen: rather than to offer
  alternatives:
  - than to give
  lexicon: HALOT
  rationale: With זבח following, נתן functions in the sense of presenting/offering
    a sacrifice. 'Rather than to offer' makes the comparison explicit in natural English.
- source_word: הַכְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard wisdom-literature term for morally and spiritually dull persons,
    not merely intellectually deficient ones.
- source_word: זָבַח
  chosen: the sacrifice
  alternatives:
  - a sacrifice
  - sacrifice
  lexicon: HALOT
  rationale: 'Rendered with the article as a class expression: the kind of sacrifice
    fools offer. ''The sacrifice of fools'' is concise and preserves the Hebrew construction.'
- source_word: כִּי אֵינָם יוֹדְעִים
  chosen: for they do not know
  alternatives:
  - for they do not understand
  lexicon: HALOT
  rationale: ידע here denotes lack of moral/spiritual awareness. 'Do not know' is
    sufficiently broad and close to the Hebrew.
- source_word: לַעֲשׂוֹת רָע
  chosen: that they are doing evil
  alternatives:
  - to do evil
  - that they do wrong
  lexicon: HALOT
  rationale: The infinitive phrase is somewhat compressed in Hebrew. In English, 'that
    they are doing evil' best conveys the sense that the fools are unaware that their
    sacrificial behavior is itself evil.
