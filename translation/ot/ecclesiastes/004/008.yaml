theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: myself
  alternative_readings:
  - my soul
  rationale: In this wisdom context, נֶפֶשׁ functions idiomatically for the person/self.
    Rendering it 'myself' avoids suggesting a technical body-soul distinction not
    demanded by the text, while preserving the speaker's self-denial.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: vanity
  alternative_readings:
  - vapor
  - futility
  rationale: The term is programmatic in Ecclesiastes and carries layered connotations.
    'Vanity' best preserves the established thematic thread while remaining within
    optimal equivalence. Alternatives are noted because the Hebrew image of breath/vapor
    remains interpretively significant.
  doctrine_reference: Translation philosophy §5
