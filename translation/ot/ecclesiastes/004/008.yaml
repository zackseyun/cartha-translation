id: ECC.4.8
reference: Ecclesiastes 4:8
source:
  edition: WLC
  text: יֵ֣שׁ אֶחָד֩ וְ/אֵ֨ין שֵׁנִ֜י גַּ֣ם בֵּ֧ן וָ/אָ֣ח אֵֽין ל֗/וֹ וְ/אֵ֥ין קֵץ֙
    לְ/כָל עֲמָל֔/וֹ גַּם עיני/ו לֹא תִשְׂבַּ֣ע עֹ֑שֶׁר וּ/לְ/מִ֣י אֲנִ֣י עָמֵ֗ל וּ/מְחַסֵּ֤ר
    אֶת נַפְשִׁ/י֙ מִ/טּוֹבָ֔ה גַּם זֶ֥ה הֶ֛בֶל וְ/עִנְיַ֥ן רָ֖ע הֽוּא־־־־׀־־׃
translation:
  text: There is one man, and he has no second; he has neither son nor brother, and
    there is no end to all his labor. Yet his eyes are not satisfied with wealth,
    and he says, “For whom am I laboring and depriving myself of good?” This too is
    vanity and a grievous business.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There is one alone' or 'there is one, with no other.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'depriving my soul of good'; here 'soul' means the self or person.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word translated 'vanity' can also suggest 'vapor' or 'futility.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ אֶחָד
  chosen: There is one man
  alternatives:
  - There is one alone
  - There is a solitary person
  lexicon: HALOT
  rationale: The idiom introduces a solitary individual. 'One man' preserves the masculine
    singular and the representative force of אֶחָד in context, in line with the gender-accurate
    policy. 'Alone' is conceptually present from the larger clause but not explicit
    in these two words alone, so it is not placed in the main text here.
- source_word: וְאֵין שֵׁנִי
  chosen: and he has no second
  alternatives:
  - and there is not another
  - and he is alone
  lexicon: HALOT
  rationale: Literally 'and there is no second.' The phrase means he has no companion
    or counterpart. 'He has no second' keeps the Hebrew imagery and links naturally
    with the following lack of family relations. A smoother interpretive alternative
    like 'he is alone' is preserved conceptually but not chosen for the main text.
- source_word: גַּם בֵּן וָאָח אֵין לוֹ
  chosen: he has neither son nor brother
  alternatives:
  - also, he has no son or brother
  lexicon: HALOT
  rationale: The construction lists close kin he lacks. 'Neither...nor' is idiomatic
    English and accurately conveys the negated pair. 'Son' and 'brother' are retained
    literally rather than generalized to 'family'.
- source_word: וְאֵין קֵץ לְכָל עֲמָלוֹ
  chosen: and there is no end to all his labor
  alternatives:
  - and there is no end to all his toil
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes often carries the sense of burdensome labor/toil.
    'Labor' is chosen for readability and consistency with the later verbal form 'am
    I laboring'; 'toil' is a viable alternative with slightly stronger wearisome nuance.
- source_word: גַּם עֵינָיו לֹא תִשְׂבַּע עֹשֶׁר
  chosen: Yet his eyes are not satisfied with wealth
  alternatives:
  - Even his eyes are not satisfied with riches
  - his eye is never satisfied with wealth
  lexicon: HALOT
  rationale: 'The Hebrew literally says ''also his eyes are not satisfied [with] wealth.''
    The plural ''eyes'' is retained. ''Satisfied with wealth'' expresses the idiom
    naturally in English. ''Yet'' captures the adversative force in context: despite
    endless labor, satisfaction does not come.'
- source_word: וּלְמִי אֲנִי עָמֵל
  chosen: For whom am I laboring
  alternatives:
  - And for whom am I toiling
  lexicon: HALOT
  rationale: This is the man's reflective question. 'For whom' preserves the dative
    sense of benefit. 'Laboring' maintains lexical connection with עֲמָלוֹ earlier
    in the verse.
- source_word: וּמְחַסֵּר אֶת נַפְשִׁי מִטּוֹבָה
  chosen: and depriving myself of good
  alternatives:
  - and withholding good from myself
  - and depriving my soul of good
  lexicon: HALOT
  rationale: מְחַסֵּר means causing to lack, depriving, withholding. נֶפֶשׁ here refers
    to the self/person rather than an explicitly immaterial 'soul.' 'Depriving myself
    of good' is idiomatic and avoids importing a narrower anthropological claim. 'Good'
    is kept broad, matching Qoheleth's recurring theme of enjoying life's good gifts.
- source_word: גַּם זֶה הֶבֶל
  chosen: This too is vanity
  alternatives:
  - This too is vapor
  - This too is futile
  lexicon: HALOT
  rationale: הֶבֶל is a key Ecclesiastes term with a semantic range including vapor,
    transience, and futility. 'Vanity' preserves traditional resonance and the book's
    thematic diction, while remaining understandable in context. Alternatives are
    possible, but consistency favors 'vanity' unless context strongly demands otherwise.
- source_word: וְעִנְיַן רָע הוּא
  chosen: and a grievous business
  alternatives:
  - and a bad task
  - and a miserable occupation
  - and an unhappy affair
  lexicon: HALOT
  rationale: עִנְיָן in Ecclesiastes denotes an occupation, task, or business; רָע
    here carries the sense of grievous, distressing, or evil/bad. 'Grievous business'
    captures the burdensome character without sounding overly technical. 'Business'
    reflects the broad sense of human occupation in this book.
