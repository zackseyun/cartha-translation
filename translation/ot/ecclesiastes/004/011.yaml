id: ECC.4.11
reference: Ecclesiastes 4:11
source:
  edition: WLC
  text: גַּ֛ם אִם יִשְׁכְּב֥וּ שְׁנַ֖יִם וְ/חַ֣ם לָ/הֶ֑ם וּ/לְ/אֶחָ֖ד אֵ֥יךְ יֵחָֽם־׃
translation:
  text: Again, if two lie down together, they keep warm; but how can one keep warm
    alone?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are warm'; the Hebrew expression literally indicates that warmth
      is for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Again
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional supporting observation in the sequence of sayings.
    'Again' fits the discourse flow in English and reflects the additive force without
    sounding overly wooden.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Marks a conditional or situational clause. 'If' preserves the Hebrew
    construction straightforwardly.
- source_word: יִשְׁכְּבוּ
  chosen: lie down
  alternatives:
  - sleep
  - lay themselves down
  lexicon: HALOT
  rationale: The verb שׁכב commonly means 'lie down' and can imply sleeping, but the
    point here is the physical act of lying together for warmth. 'Lie down' preserves
    that broader sense.
- source_word: שְׁנַיִם
  chosen: two
  alternatives:
  - two people
  lexicon: HALOT
  rationale: The numeral stands substantively. 'Two' is concise and natural; English
    does not require repeating 'people' because the context makes it clear.
- source_word: וְחַם לָהֶם
  chosen: they keep warm
  alternatives:
  - they are warm
  - there is warmth for them
  lexicon: HALOT
  rationale: The Hebrew expresses that warmth belongs to them/results for them. 'They
    keep warm' communicates the practical sense idiomatically in modern English while
    staying close to the source idea.
- source_word: וּלְאֶחָד
  chosen: but how can one
  alternatives:
  - and for one
  - but for one person
  lexicon: HALOT
  rationale: The phrase sets up a contrast with the pair. Rendering with 'but' makes
    the adversative sense explicit in natural English, and 'one' preserves the singular
    contrast without unnecessary expansion.
- source_word: אֵיךְ
  chosen: how can
  alternatives:
  - how
  lexicon: HALOT
  rationale: In this rhetorical question, English idiom naturally uses 'how can' to
    express practical impossibility or difficulty.
- source_word: יֵחָם
  chosen: keep warm
  alternatives:
  - be warm
  - get warm
  lexicon: HALOT
  rationale: The verb refers to becoming or being warm. 'Keep warm' matches the preceding
    clause for clarity and cohesion, highlighting the ongoing practical benefit in
    context.
- source_word: לְבַד implied by context
  chosen: alone
  alternatives:
  - by himself
  lexicon: HALOT
  rationale: Although not expressed as a separate Hebrew word in this verse, English
    naturally supplies 'alone' to complete the contrast already implied by 'for one'
    over against 'two.' This is a minimal contextual addition required for idiomatic
    clarity, not a paraphrastic expansion.
