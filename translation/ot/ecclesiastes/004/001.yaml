theological_decisions:
- issue: Referent of הָעֲשֻׁקִים in the opening clause
  chosen_reading: Rendered as 'oppressions' rather than 'the oppressed' in the main
    text
  alternative_readings:
  - all the oppressed
  rationale: The Hebrew form can be read concretely as oppressed persons, but the
    collocation with 'that are done under the sun' more naturally points to acts or
    instances of oppression. The verse then narrows to the sufferers themselves in
    'the tears of the oppressed.' This preserves the rhetorical movement from oppressive
    realities in general to the victims' tears in particular.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tense/aspect in existential clauses
  chosen_reading: Used past-tense English narration ('they had no comforter')
  alternative_readings:
  - they have no comforter
  - there is no comforter for them
  rationale: Qoheleth narrates observed realities in a past-oriented report formula
    ('I turned and saw'). English past tense reads naturally while still expressing
    a general condition observed by the speaker.
  doctrine_reference: Translation philosophy §6
