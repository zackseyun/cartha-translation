id: ECC.4.1
reference: Ecclesiastes 4:1
source:
  edition: WLC
  text: וְ/שַׁ֣בְתִּֽי אֲנִ֗י וָ/אֶרְאֶה֙ אֶת כָּל הָ֣/עֲשֻׁקִ֔ים אֲשֶׁ֥ר נַעֲשִׂ֖ים
    תַּ֣חַת הַ/שָּׁ֑מֶשׁ וְ/הִנֵּ֣ה דִּמְעַ֣ת הָ/עֲשֻׁקִ֗ים וְ/אֵ֤ין לָ/הֶם֙ מְנַחֵ֔ם
    וּ/מִ/יַּ֤ד עֹֽשְׁקֵי/הֶם֙ כֹּ֔חַ וְ/אֵ֥ין לָ/הֶ֖ם מְנַחֵֽם־־׀׃
translation:
  text: 'Then I turned and saw all the oppressions that are done under the sun: and
    behold, the tears of the oppressed, and they had no comforter. Power was in the
    hand of their oppressors, and they had no comforter.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the oppressed that are under the sun.' The Hebrew passive participle
      can refer either to oppressed people or, by extension, to acts of oppression.
    reason: alternative_reading
  - marker: b
    text: Literally 'and from the hand of their oppressors, power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  chosen: Then I turned
  alternatives:
  - And I returned
  - Again I turned
  lexicon: HALOT
  rationale: The verb שוב in Qoheleth often introduces a renewed observation rather
    than literal physical return. 'Then I turned' preserves the discourse movement
    in natural English while keeping the concrete metaphor.
- source_word: וָאֶרְאֶה
  chosen: and saw
  alternatives:
  - and I saw
  - and considered
  lexicon: HALOT
  rationale: ראה here denotes direct observation. 'and saw' is the plain sense and
    fits the narrator's repeated observational formula.
- source_word: כָּל הָעֲשֻׁקִים
  chosen: all the oppressions
  alternatives:
  - all the oppressed
  - all the acts of oppression
  lexicon: HALOT
  rationale: Although the form is a passive participle ('the oppressed/oppressed ones'),
    the following phrase 'that are done' points toward oppressive acts or instances
    of oppression as the object of observation. Rendering it as 'oppressions' best
    fits the syntax in English and the broader sense of systemic injustice being surveyed.
- source_word: אֲשֶׁר נַעֲשִׂים
  chosen: that are done
  alternatives:
  - that are being done
  - which are committed
  lexicon: HALOT
  rationale: The passive participle/verb sequence is naturally rendered as ongoing
    actions occurring in the world. 'that are done' is idiomatic and sufficiently
    reflects the passive sense.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a signature Ecclesiastes expression and should be kept consistently
    in its familiar, literal form.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - behold
  lexicon: HALOT
  rationale: The particle marks vivid attention to what follows. 'and behold' preserves
    the rhetorical force without paraphrase.
- source_word: דִּמְעַת הָעֲשֻׁקִים
  chosen: the tears of the oppressed
  alternatives:
  - the tear of the oppressed
  lexicon: HALOT
  rationale: Though דמעת is formally singular construct, English idiom prefers the
    collective plural 'tears' for repeated or abundant weeping. Here it conveys the
    visible suffering of oppressed people.
- source_word: וְאֵין לָהֶם מְנַחֵם
  chosen: and they had no comforter
  alternatives:
  - and there was no one to comfort them
  - and they have no comforter
  lexicon: HALOT
  rationale: The existential construction states the absence of anyone who would console
    them. 'they had no comforter' is concise and preserves the nominal force of מנחם.
    Past tense matches the narrative survey.
- source_word: וּמִיַּד עֹשְׁקֵיהֶם כֹּחַ
  chosen: Power was in the hand of their oppressors
  alternatives:
  - and from the hand of their oppressors came power
  - and in the hand of their oppressors was power
  lexicon: HALOT
  rationale: The phrase highlights the power imbalance favoring the oppressors. English
    requires some restructuring; 'Power was in the hand of their oppressors' preserves
    the Hebrew imagery and emphasis.
- source_word: עֹשְׁקֵיהֶם
  chosen: their oppressors
  alternatives:
  - those who oppress them
  - their extortioners
  lexicon: HALOT
  rationale: The active participle from עשק denotes those who exploit or oppress.
    'oppressors' is the clearest contextual rendering and maintains lexical connection
    with 'oppressed/oppressions'.
- source_word: מְנַחֵם
  chosen: comforter
  alternatives:
  - one who comforts
  - consoler
  lexicon: HALOT
  rationale: The participle functions substantivally. 'comforter' is natural, concise,
    and preserves the repeated refrain exactly in both occurrences.
