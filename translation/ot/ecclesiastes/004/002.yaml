theological_decisions:
- issue: Existential comparison between dead and living
  chosen_reading: The verse states Qoheleth's observational judgment that the dead
    are better off than the living in the face of oppression, without making a systematic
    doctrinal claim about the afterlife.
  alternative_readings:
  - A statement about the blessed state of the dead after death
  - Hyperbolic despair with no comparative force beyond rhetoric
  rationale: The immediate context (4:1–3) concerns oppression 'under the sun.' The
    translation preserves the comparative statement without importing a doctrine of
    postmortem blessedness or flattening it into mere exaggeration.
  doctrine_reference: Preserve theological tension rather than resolve it.
