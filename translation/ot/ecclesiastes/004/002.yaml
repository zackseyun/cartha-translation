id: ECC.4.2
reference: Ecclesiastes 4:2
source:
  edition: WLC
  text: וְ/שַׁבֵּ֧חַ אֲנִ֛י אֶת הַ/מֵּתִ֖ים שֶׁ/כְּבָ֣ר מֵ֑תוּ מִן הַ֣/חַיִּ֔ים אֲשֶׁ֛ר
    הֵ֥מָּה חַיִּ֖ים עֲדֶֽנָ/ה־־׃
translation:
  text: And I declared the dead, who have already died, more fortunate than the living,
    who are still alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And I praised the dead ... more than the living.' The Hebrew verb can
      be rendered more literally as 'praised' or 'commended'; here it expresses Qoheleth's
      judgment that the dead are better off.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבֵּחַ
  chosen: declared ... more fortunate
  alternatives:
  - praised
  - considered blessed
  - commended
  lexicon: HALOT
  rationale: The piel of שׁבח commonly means 'praise/commend.' In this context, Qoheleth
    is not praising the dead morally but pronouncing them better off in comparison
    with the oppressed living (vv. 1–3). 'Declared ... more fortunate' captures the
    comparative evaluative force in idiomatic English while staying close to the Hebrew
    sense.
- source_word: אֲנִי
  chosen: I
  rationale: Explicit first-person pronoun retained for emphasis, matching Qoheleth's
    personal evaluation.
- source_word: אֶת הַמֵּתִים
  chosen: the dead
  alternatives:
  - those who are dead
  - the deceased
  lexicon: HALOT
  rationale: Substantival participle functions as a class designation. 'The dead'
    is the most natural and direct English equivalent.
- source_word: שֶׁכְּבָר מֵתוּ
  chosen: who have already died
  alternatives:
  - who died long ago
  - who are already dead
  lexicon: HALOT
  rationale: כבר adds the sense 'already/by now,' and the perfect of מות marks completed
    action. 'Have already died' preserves both the temporal nuance and the completed
    state.
- source_word: מִן הַחַיִּים
  chosen: more fortunate than the living
  alternatives:
  - better than the living
  - rather than the living
  lexicon: HALOT
  rationale: מן after a verb of praise/evaluation marks comparison. English requires
    the comparative idea to be made explicit. 'More fortunate than' fits the context
    of existential advantage under oppression better than a wooden 'from the living.'
- source_word: הַחַיִּים
  chosen: the living
  alternatives:
  - those who are alive
  lexicon: HALOT
  rationale: Substantival adjective referring to living people as a class; 'the living'
    is concise and idiomatic.
- source_word: אֲשֶׁר הֵמָּה חַיִּים
  chosen: who are still alive
  alternatives:
  - who are alive
  - who yet live
  lexicon: HALOT
  rationale: The relative clause restates and emphasizes their present condition.
    'Still alive' brings out the ongoing state in natural English without unnecessary
    redundancy.
- source_word: עֲדֶנָה
  chosen: still
  alternatives:
  - yet
  - until now
  - as yet
  lexicon: HALOT
  rationale: This adverb means 'still/yet/so far.' 'Still' is the clearest modern
    English choice in this clause.
