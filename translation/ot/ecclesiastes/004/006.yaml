id: ECC.4.6
reference: Ecclesiastes 4:6
source:
  edition: WLC
  text: ט֕וֹב מְלֹ֥א כַ֖ף נָ֑חַת מִ/מְּלֹ֥א חָפְנַ֛יִם עָמָ֖ל וּ/רְע֥וּת רֽוּחַ׃
translation:
  text: Better is a handful with rest than two handfuls with toil and a chasing after
    wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with quietness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and a striving/chasing after wind'; traditionally, 'and vexation
      of spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Better
  - It is better
  lexicon: HALOT
  rationale: Comparative evaluative adjective introducing a proverb-like comparison;
    English idiom naturally supplies 'is'.
- source_word: מְלֹא כַף
  chosen: a handful
  alternatives:
  - a full hand
  - the fullness of a hand
  lexicon: HALOT
  rationale: The construct phrase literally means 'fullness of a palm/hand,' but idiomatic
    English 'a handful' best conveys the measure while remaining close to the Hebrew.
- source_word: נָחַת
  chosen: rest
  alternatives:
  - quietness
  - tranquility
  lexicon: HALOT
  rationale: The noun denotes quietness or repose. 'Rest' is natural English and fits
    the contrast with labor, while preserving the sense of settled calm.
- source_word: מִמְלֹא חָפְנַיִם
  chosen: than two handfuls
  alternatives:
  - than the fullness of two fists
  - than both hands full
  lexicon: HALOT
  rationale: The preposition marks comparison ('than'). חָפְנַיִם is the dual, indicating
    two cupped hands/fists full. 'Two handfuls' is concise and idiomatic.
- source_word: עָמָל
  chosen: toil
  alternatives:
  - labor
  - trouble
  lexicon: HALOT
  rationale: In Ecclesiastes this term often carries the sense of wearisome labor.
    'Toil' preserves both work and its burdensome quality.
- source_word: וּרְעוּת רוּחַ
  chosen: and a chasing after wind
  alternatives:
  - and striving after wind
  - and feeding on wind
  - and vexation of spirit
  lexicon: HALOT
  rationale: This recurring Ecclesiastes expression is metaphorical. 'Chasing after
    wind' communicates futile pursuit in clear modern English. Traditional 'vexation
    of spirit' likely reflects later interpretive tradition more than the plain idiom
    here.
