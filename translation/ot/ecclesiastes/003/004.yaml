id: ECC.3.4
reference: Ecclesiastes 3:4
source:
  edition: WLC
  text: עֵ֤ת לִ/בְכּוֹת֙ וְ/עֵ֣ת לִ/שְׂח֔וֹק עֵ֥ת סְפ֖וֹד וְ/עֵ֥ת רְקֽוֹד׃
translation:
  text: A time to weep, and a time to laugh; a time to mourn, and a time to dance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a season' throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Mourn'' may also be rendered ''lament,'' especially in contexts of formal
      mourning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a time or occasion. 'A time' is the most direct and idiomatic
    rendering in this poem's repeated pattern. 'A season' is possible in English tradition,
    but here 'time' better matches the Hebrew and preserves the cadence of the list.
- source_word: לִבְכּוֹת
  chosen: to weep
  alternatives:
  - to cry
  lexicon: HALOT
  rationale: The infinitive construct of בכה means 'to weep/cry.' 'Weep' fits the
    elevated poetic register and pairs naturally with the contrasting 'laugh.' 'Cry'
    is possible but slightly less literary in this context.
- source_word: לִשְׂחוֹק
  chosen: to laugh
  alternatives:
  - to rejoice
  lexicon: HALOT
  rationale: שׂחק in this form most straightforwardly means 'to laugh.' Although the
    semantic range can include joyful play, 'laugh' is the plain sense and best preserves
    the antithesis with weeping.
- source_word: סְפוֹד
  chosen: to mourn
  alternatives:
  - mourning
  - to lament
  lexicon: HALOT
  rationale: The verb ספד refers specifically to lamenting or mourning, often in a
    funerary setting. Rendering it as 'to mourn' gives natural English parallelism
    with the surrounding infinitives and captures the grief-oriented sense without
    over-specifying ritual lamentation.
- source_word: רְקוֹד
  chosen: to dance
  alternatives:
  - dancing
  lexicon: HALOT
  rationale: רקד means 'to dance.' 'To dance' maintains the infinitive-like sequence
    established by the verse and preserves the contrast with mourning.
