id: ECC.3.17
reference: Ecclesiastes 3:17
source:
  edition: WLC
  text: אָמַ֤רְתִּֽי אֲנִי֙ בְּ/לִבִּ֔/י אֶת הַ/צַּדִּיק֙ וְ/אֶת הָ֣/רָשָׁ֔ע יִשְׁפֹּ֖ט
    הָ/אֱלֹהִ֑ים כִּי עֵ֣ת לְ/כָל חֵ֔פֶץ וְ/עַ֥ל כָּל הַֽ/מַּעֲשֶׂ֖ה שָֽׁם־־־־־׃
translation:
  text: I said in my heart, “God will judge the righteous and the wicked, for there
    is a time there for every matter and for every deed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for there is an appointed time for every purpose and for every work.'
      The Hebrew terms can also be rendered more formally as 'purpose' and 'work.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew includes 'there' at the end of the clause. It may point to the
      place or occasion of God's judgment; some translations smooth it out in English.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי אֲנִי בְּלִבִּי
  chosen: I said in my heart
  alternatives:
  - I said to myself
  - I said in my mind
  lexicon: HALOT
  rationale: The idiom literally refers to speaking in one's heart, a standard Hebrew
    expression for inward reflection. 'I said in my heart' preserves the metaphor
    and remains natural in English.
- source_word: הַצַּדִּיק
  chosen: the righteous
  alternatives:
  - the just
  - the righteous person
  lexicon: HALOT
  rationale: The adjective used substantivally denotes the righteous person/class.
    'The righteous' is the most natural collective singular in English and preserves
    the moral category.
- source_word: הָרָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked person
  - the guilty
  lexicon: HALOT
  rationale: This substantival adjective contrasts with 'the righteous' and denotes
    the wicked person/class. 'The wicked' preserves the ethical contrast without over-specifying
    legal guilt.
- source_word: יִשְׁפֹּט
  chosen: will judge
  alternatives:
  - judges
  - shall judge
  lexicon: HALOT
  rationale: 'The imperfect here expresses future sense in context: Qoheleth''s conclusion
    about God''s eventual adjudication. ''Will judge'' is clear modern English.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the divine being
  lexicon: HALOT
  rationale: 'With the article, the noun refers to the true God in context. Standard
    English idiom omits the article: ''God will judge.'''
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding assertion.
    'For' best preserves the explanatory connection in concise English.
- source_word: עֵת
  chosen: a time
  alternatives:
  - an appointed time
  - a season
  lexicon: HALOT
  rationale: The noun echoes the chapter's repeated theme of an appointed time/season.
    'A time' is simple and preserves the literary linkage to the surrounding context.
- source_word: לְכָל חֵפֶץ
  chosen: for every matter
  alternatives:
  - for every purpose
  - for every delight
  lexicon: HALOT
  rationale: חֵפֶץ can denote pleasure, desire, purpose, or matter/affair depending
    on context. In Ecclesiastes 3, it refers to each event or purpose under heaven.
    'Every matter' fits the judicial and reflective context and avoids sounding overly
    subjective.
- source_word: וְעַל כָּל הַמַּעֲשֶׂה
  chosen: and for every deed
  alternatives:
  - and concerning every work
  - and over every act
  lexicon: HALOT
  rationale: מַעֲשֶׂה denotes deed/work/action. In context of divine judgment, 'deed'
    best conveys morally assessable human action.
- source_word: שָׁם
  chosen: there
  alternatives:
  - then
  - in that place
  lexicon: HALOT
  rationale: The adverb literally means 'there.' In this difficult clause, retaining
    'there' preserves the Hebrew wording and ambiguity rather than resolving it interpretively.
    It may point to the place or occasion of judgment, but the text does not specify
    more fully.
