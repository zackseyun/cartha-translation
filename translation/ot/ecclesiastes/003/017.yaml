theological_decisions:
- issue: Interpretation of the difficult final adverb שָׁם in relation to divine judgment
  chosen_reading: 'Retain the literal ''there'' in the main text: ''for there is a
    time there for every matter and for every deed.'''
  alternative_readings:
  - '''for there is a time for every matter and for every deed'' (omitting or smoothing
    over ''there'')'
  - '''for there, at that place/then, is a time for every matter and for every deed'''
  rationale: The Hebrew text includes שָׁם, and the translation should preserve this
    rather than silently emending or flattening it. The adverb likely gestures to
    the sphere or occasion of God's judgment, but its precise force is debated. Preserving
    'there' maintains the text's tension and auditable ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
