theological_decisions:
- issue: Representative masculine language
  chosen_reading: he
  alternative_readings:
  - they
  - one
  rationale: The Hebrew uses masculine singular forms for a generic worker. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing when the
    source is grammatically masculine and representative.
