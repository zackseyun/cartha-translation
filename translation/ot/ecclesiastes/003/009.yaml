id: ECC.3.9
reference: Ecclesiastes 3:9
source:
  edition: WLC
  text: מַה יִּתְרוֹן֙ הָֽ/עוֹשֶׂ֔ה בַּ/אֲשֶׁ֖ר ה֥וּא עָמֵֽל־׃
translation:
  text: What profit has the worker from that in which he labors?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What gain has the worker from what he labors at?”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - What kind of
  - What is the
  lexicon: HALOT
  rationale: Interrogative opening introducing a rhetorical question. Simple 'What'
    best preserves the Hebrew's concise force.
- source_word: יִתְרוֹן
  chosen: profit
  alternatives:
  - gain
  - advantage
  lexicon: HALOT
  rationale: In Ecclesiastes this noun is a key term for surplus, advantage, or profit.
    'Profit' preserves the book's recurring economic metaphor and matches the rhetorical
    theme better than the broader 'advantage.'
- source_word: הָעֹשֶׂה
  chosen: the worker
  alternatives:
  - the one who does
  - the doer
  lexicon: HALOT
  rationale: The participle from עשה literally means 'the one doing/making.' In this
    context, paired with labor, it refers to the person engaged in work. 'The worker'
    is natural English while retaining the substantive force of the participle.
- source_word: בַּאֲשֶׁר
  chosen: from that in which
  alternatives:
  - in what
  - from what
  - by what
  lexicon: HALOT
  rationale: The preposition ב plus אשר yields an idiom referring to the sphere or
    matter in which the action occurs. Because יִתְרוֹן commonly takes the sense of
    advantage derived from something, 'from that in which' brings out the relation
    clearly without over-paraphrasing.
- source_word: הוּא
  chosen: he
  alternatives:
  - the worker
  - one
  lexicon: HALOT
  rationale: The explicit pronoun resumes the subject for emphasis. 'He' preserves
    the masculine singular form and follows the project's gender-accurate policy for
    representative masculine usage.
- source_word: עָמֵל
  chosen: labors
  alternatives:
  - toils
  - works
  lexicon: HALOT
  rationale: The adjective/participle from עמל denotes laboring or toiling. 'Labors'
    is readable modern English and keeps the verbal sense in relation to the worker's
    activity; 'toils' is possible but slightly more marked.
