id: ECC.3.10
reference: Ecclesiastes 3:10
source:
  edition: WLC
  text: רָאִ֣יתִי אֶת הָֽ/עִנְיָ֗ן אֲשֶׁ֨ר נָתַ֧ן אֱלֹהִ֛ים לִ/בְנֵ֥י הָ/אָדָ֖ם לַ/עֲנ֥וֹת
    בּֽ/וֹ־׃
translation:
  text: I have seen the task that God has given to the sons of man to be occupied
    with.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to be afflicted by it' or 'to labor in it.' The Hebrew expression is
      difficult and may emphasize either being occupied with the task or being burdened
      by it.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. In Ecclesiastes, the speaker often reports reflective
    observation; English present perfect captures the ongoing relevance of what has
    been observed, while remaining close to the Hebrew perfect.
- source_word: הָעִנְיָן
  chosen: the task
  alternatives:
  - the business
  - the occupation
  - the travail
  lexicon: HALOT
  rationale: עִנְיָן in Ecclesiastes commonly denotes an assigned matter, occupation,
    or task rather than merely an abstract 'affair.' 'Task' is concise, natural English
    and fits the idea of something given by God for humans to engage in.
- source_word: אֲשֶׁר נָתַן
  chosen: that ... has given
  alternatives:
  - which ... gave
  lexicon: HALOT
  rationale: Relative clause introducing the content of the observed matter. Present
    perfect in English matches the reflective tone and links naturally with 'I have
    seen.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים here, referring to the one true God in
    Qoheleth.
- source_word: לִבְנֵי הָאָדָם
  chosen: to the sons of man
  alternatives:
  - to the children of man
  - to humankind
  - to mankind
  lexicon: HALOT
  rationale: The phrase is formally masculine and idiomatic. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language. 'Sons of man'
    preserves the Hebrew form and the representative sense of humanity.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: אָדָם here is collective/generic. Within the idiom 'sons of man,' retaining
    'man' best reflects the source wording and accords with the project's gender-accurate
    policy.
- source_word: לַעֲנוֹת בּוֹ
  chosen: to be occupied with
  alternatives:
  - to be afflicted by it
  - to labor in it
  - to exercise themselves in it
  lexicon: HALOT
  rationale: The infinitive of ענה with ב can carry the sense of being occupied, busied,
    or exercised with something in this context. Given Ecclesiastes' theme of burdensome
    human activity, 'to be occupied with' preserves the experiential sense without
    overcommitting to the stronger 'afflicted' reading in the main text.
