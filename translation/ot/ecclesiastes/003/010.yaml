theological_decisions:
- issue: Rendering of לִבְנֵי הָאָדָם
  chosen_reading: to the sons of man
  alternative_readings:
  - to humankind
  - to mankind
  - to the children of humanity
  rationale: The Hebrew is grammatically masculine with representative force. Following
    the doctrine's gender-accurate principle, the translation preserves the masculine
    idiom rather than neutralizing it in the main text.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    *adam*'
- issue: Sense of לַעֲנוֹת בּוֹ
  chosen_reading: to be occupied with
  alternative_readings:
  - to be afflicted by it
  - to labor in it
  rationale: The clause is semantically difficult. The chosen rendering reflects the
    common contextual sense in Ecclesiastes of human beings being busied with an assigned
    burden, while preserving stronger alternatives in a footnote rather than resolving
    the ambiguity too sharply.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
