theological_decisions:
- issue: Moral force of 'hate' in wisdom contrast
  chosen_reading: Retain 'hate' in the main text without softening.
  alternative_readings:
  - Retain the Hebrew sense but paraphrase as 'to refrain from loving' or 'to oppose'
  rationale: The verse catalogs fitting times within life under God’s providence rather
    than issuing an unqualified moral command to hate. Preserving the stark antithesis
    reflects the Hebrew poetry and avoids importing interpretive mitigation into the
    translation itself.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
