id: ECC.3.8
reference: Ecclesiastes 3:8
source:
  edition: WLC
  text: עֵ֤ת לֶֽ/אֱהֹב֙ וְ/עֵ֣ת לִ/שְׂנֹ֔א עֵ֥ת מִלְחָמָ֖ה וְ/עֵ֥ת שָׁלֽוֹם׃ס
translation:
  text: a time to love, and a time to hate; a time for war, and a time for peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a season.' The Hebrew עֵת can denote a time or season, but 'time' best
      fits the poem's repeated cadence.
    reason: lexical_alternative
  - marker: b
    text: '''Hate'' here renders the Hebrew verb directly; in this wisdom context
      it expresses strong aversion or opposition in contrast with love, not necessarily
      sinful malice.'
    reason: lexical_alternative
  - marker: c
    text: '''Peace'' translates שָׁלוֹם, which can also mean ''well-being'' or ''wholeness'';
      here the contrast with war favors ''peace.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a point or period of time. 'A time' is the most natural and
    consistent rendering in this poem's repeated pattern, while 'season' is possible
    but less direct here.
- source_word: לֶאֱהֹב
  chosen: to love
  lexicon: HALOT
  rationale: 'Infinitive construct of אָהֵב, straightforwardly expressing the action
    paired with עֵת: ''a time to love.'''
- source_word: לִשְׂנֹא
  chosen: to hate
  alternatives:
  - to be hostile
  lexicon: HALOT
  rationale: The verb שָׂנֵא ordinarily means 'hate.' In wisdom literature it can
    denote strong aversion rather than sinful malice; the plain lexical sense should
    be preserved rather than softened.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: מִלְחָמָה most naturally refers to war or armed conflict. 'War' is the
    clearest idiomatic English equivalent in this merism.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: Though שָׁלוֹם can carry the broader sense of wholeness or well-being,
    in direct contrast with 'war' the contextual sense is 'peace.'
