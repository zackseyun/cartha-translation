id: ECC.3.7
reference: Ecclesiastes 3:7
source:
  edition: WLC
  text: עֵ֤ת לִ/קְר֨וֹעַ֙ וְ/עֵ֣ת לִ/תְפּ֔וֹר עֵ֥ת לַ/חֲשׁ֖וֹת וְ/עֵ֥ת לְ/דַבֵּֽר׃
translation:
  text: a time to tear, and a time to sew; a time to keep silent, and a time to speak;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'to tear' may allude to tearing garments as a sign of grief,
      shock, or mourning, though the object is not stated in the Hebrew.
    reason: cultural_note
  - marker: b
    text: Or 'a time to be silent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a point or period of time. 'A time' preserves the repeated
    cadence of the poem and is the most natural English equivalent here; 'season'
    is possible but less precise in this line-by-line pairing structure.
- source_word: לִקְרוֹעַ
  chosen: to tear
  alternatives:
  - to rend
  - to tear apart
  lexicon: HALOT
  rationale: The verb קרע commonly means 'tear' or 'rend,' often of garments. 'To
    tear' is clear modern English and preserves the likely allusion to tearing garments
    in grief or crisis without over-specifying the object.
- source_word: לִתְפּוֹר
  chosen: to sew
  alternatives:
  - to mend
  - to stitch
  lexicon: HALOT
  rationale: תפר means 'sew.' 'Mend' would interpret the action beyond the lexical
    sense, while 'sew' keeps the antithesis with 'tear' concise and direct.
- source_word: לַחֲשׁוֹת
  chosen: to keep silent
  alternatives:
  - to be silent
  - to be quiet
  lexicon: HALOT
  rationale: חשׁה means to be silent or keep quiet. 'Keep silent' works idiomatically
    in English and conveys deliberate restraint, fitting the wisdom context better
    than the flatter 'be quiet.'
- source_word: לְדַבֵּר
  chosen: to speak
  alternatives:
  - to talk
  lexicon: HALOT
  rationale: דבר is the standard verb 'speak.' 'Speak' is broader and more dignified
    than 'talk,' matching the poetic register and the contrast with silence.
