id: ECC.3.5
reference: Ecclesiastes 3:5
source:
  edition: WLC
  text: עֵ֚ת לְ/הַשְׁלִ֣יךְ אֲבָנִ֔ים וְ/עֵ֖ת כְּנ֣וֹס אֲבָנִ֑ים עֵ֣ת לַ/חֲב֔וֹק וְ/עֵ֖ת
    לִ/רְחֹ֥ק מֵ/חַבֵּֽק׃
translation:
  text: A time to throw stones, and a time to gather stones; a time to embrace, and
    a time to refrain from embracing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A time to cast stones, and a time to gather stones.' The Hebrew imagery
      may be read literally, though some interpreters understand it metaphorically
      in relation to human relationships, agriculture, or warfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a point or period of time. 'A time' is the most natural and
    consistent rendering in this poem's repeated pattern, while 'season' is possible
    but less precise in English here.
- source_word: לְהַשְׁלִיךְ
  chosen: to throw
  alternatives:
  - to cast
  - to hurl
  lexicon: HALOT
  rationale: The Hiphil infinitive of שלך means to throw/cast. 'Throw' is clear modern
    English and fits the concrete image without sounding archaic like 'cast'.
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: אֶבֶן is ordinarily 'stone.' 'Stones' preserves the Hebrew image and
    avoids the colloquial feel of 'rocks'.
- source_word: כְּנוֹס
  chosen: to gather
  alternatives:
  - to collect
  - to heap up
  lexicon: HALOT
  rationale: The infinitive from כנס means to gather or collect. 'Gather' matches
    the concise poetic parallel with 'throw stones' and is idiomatic.
- source_word: לַחֲבוֹק
  chosen: to embrace
  alternatives:
  - to hug
  lexicon: HALOT
  rationale: חבק means to embrace. 'Embrace' is more literary and suitably broad,
    covering both literal and relational senses, whereas 'hug' is too colloquial.
- source_word: לִרְחֹק מֵחַבֵּק
  chosen: to refrain from embracing
  alternatives:
  - to keep away from embracing
  - to be far from embracing
  lexicon: HALOT
  rationale: רחק means to be far/distant, and with מן plus the participle 'embracing'
    it idiomatically expresses abstaining or keeping away from the act. 'Refrain from
    embracing' communicates the sense naturally in English while preserving the contrast
    with 'embrace'.
