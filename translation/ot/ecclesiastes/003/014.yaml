theological_decisions:
- issue: Meaning of fearing God
  chosen_reading: retain 'fear' rather than soften to 'revere' or 'stand in awe' in
    the main text
  alternative_readings:
  - revere
  - stand in awe
  rationale: The Hebrew ירא includes reverence and awe, but 'fear' is the core lexical
    value and preserves the theological tension of Ecclesiastes' God-language. A softer
    rendering risks resolving that tension interpretively.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
