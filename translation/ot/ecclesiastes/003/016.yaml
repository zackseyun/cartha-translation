id: ECC.3.16
reference: Ecclesiastes 3:16
source:
  edition: WLC
  text: וְ/ע֥וֹד רָאִ֖יתִי תַּ֣חַת הַ/שָּׁ֑מֶשׁ מְק֤וֹם הַ/מִּשְׁפָּט֙ שָׁ֣מָּ/ה הָ/רֶ֔שַׁע
    וּ/מְק֥וֹם הַ/צֶּ֖דֶק שָׁ֥מָּ/ה הָ/רָֽשַׁע׃
translation:
  text: And I also saw under the sun that in the place of justice, there was wickedness,
    and in the place of righteousness, there was wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the place of justice' for 'in the place of righteousness'; Hebrew
      uses a different word here (צֶדֶק) than in the previous phrase (מִשְׁפָּט),
      though the meanings overlap.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְע֥וֹד
  chosen: And I also
  alternatives:
  - And again
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional observation in Qoheleth's sequence. 'Also' captures
    the additive force naturally in English; 'again' is possible but can suggest repetition
    more than addition.
- source_word: רָאִיתִי
  chosen: saw
  alternatives:
  - have seen
  - observed
  lexicon: HALOT
  rationale: The verb of seeing/reporting experience is straightforward here. 'Saw'
    keeps the concrete observational tone of Qoheleth; 'observed' is interpretive
    and slightly less direct.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a characteristic Ecclesiastes expression for life in the earthly
    realm. The established idiom 'under the sun' is both accurate and readable.
- source_word: מְקוֹם הַמִּשְׁפָּט
  chosen: the place of justice
  alternatives:
  - the place of judgment
  - the court of justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal decision. Here it refers
    to the sphere or venue where justice should be administered. 'Place of justice'
    preserves both the institutional and moral sense better than the narrower 'judgment.'
- source_word: שָׁמָּה
  chosen: there was
  alternatives:
  - there
  - therein was
  lexicon: HALOT
  rationale: 'The adverb ''there'' functions predicatively in context, pointing to
    what was found in that very place. English requires an existential expression
    for natural style: ''there was.'''
- source_word: הָרֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: The noun denotes wickedness or injustice. 'Wickedness' fits the moral
    corruption in a judicial setting and preserves the abstract noun form of the Hebrew.
- source_word: וּמְקוֹם הַצֶּדֶק
  chosen: and in the place of righteousness
  alternatives:
  - and in the place of justice
  - and in the place of what is right
  lexicon: HALOT
  rationale: צֶדֶק commonly means righteousness or justice. To preserve the rhetorical
    contrast with the previous מִשְׁפָּט, 'righteousness' is preferable in the main
    text; rendering both as 'justice' would flatten the Hebrew variation.
- source_word: הָרָשַׁע
  chosen: wickedness
  alternatives:
  - wickedness was there
  - a wicked man
  lexicon: HALOT
  rationale: Although the pointing matches a form that can be read in relation to
    'the wicked,' the parallelism with הָרֶשַׁע strongly supports the abstract sense
    'wickedness' here. This keeps the line balanced and reflects the likely intended
    wordplay/parallel structure.
