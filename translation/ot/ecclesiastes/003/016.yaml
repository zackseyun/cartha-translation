theological_decisions:
- issue: Rendering of צֶדֶק in relation to מִשְׁפָּט
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: No doctrinal dispute is at stake, but the Hebrew uses two related yet
    distinct terms. Rendering צֶדֶק as 'righteousness' preserves the lexical distinction
    and the broader moral sense, while a footnote preserves 'justice' as a viable
    contextual alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5 (Consistency of key terms,
    or documented exception)
