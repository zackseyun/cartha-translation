theological_decisions:
- issue: Meaning of רוּחַ in a verse comparing humans and animals
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The context emphasizes the common mortality of humans and beasts rather
    than distinguishing human spiritual constitution. Rendering רוּחַ as 'breath'
    preserves the observational perspective of Qoheleth and avoids resolving a debated
    anthropological question beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of אָדָם / בְנֵי הָאָדָם
  chosen_reading: the sons of man ... man
  alternative_readings:
  - human beings ... humanity
  - mankind
  rationale: The Hebrew uses masculine representative language. Per doctrine, the
    translation should be gender-accurate rather than automatically gender-neutral,
    while preserving the generic human reference.
  doctrine_reference: 'Contested terms table: אָדָם = man / humankind (context); Gender-accurate
    over gender-neutral.'
