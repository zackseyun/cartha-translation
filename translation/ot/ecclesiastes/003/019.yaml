id: ECC.3.19
reference: Ecclesiastes 3:19
source:
  edition: WLC
  text: כִּי֩ מִקְרֶ֨ה בְֽנֵי הָ/אָדָ֜ם וּ/מִקְרֶ֣ה הַ/בְּהֵמָ֗ה וּ/מִקְרֶ֤ה אֶחָד֙
    לָ/הֶ֔ם כְּ/מ֥וֹת זֶה֙ כֵּ֣ן מ֣וֹת זֶ֔ה וְ/ר֥וּחַ אֶחָ֖ד לַ/כֹּ֑ל וּ/מוֹתַ֨ר הָ/אָדָ֤ם
    מִן הַ/בְּהֵמָה֙ אָ֔יִן כִּ֥י הַ/כֹּ֖ל הָֽבֶל־־׃
translation:
  text: 'For the fate of the sons of man and the fate of the beast is the same fate
    for them: as this one dies, so dies that one, and one breath is for all. Man has
    no advantage over the beast, for all is vapor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one spirit is for all.' The Hebrew word רוּחַ can mean 'breath,' 'wind,'
      or 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְרֶה
  chosen: fate
  alternatives:
  - same event
  - same happening
  - same lot
  lexicon: HALOT
  rationale: In Qoheleth, מִקְרֶה refers to what befalls someone, especially the common
    outcome of death. 'Fate' best captures the existential sense here without over-paraphrasing.
- source_word: בְנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - human beings
  - the children of man
  - mankind
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural plus אדם. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral term when the source uses
    masculine representative language. 'Sons of man' preserves the form and Qoheleth's
    style.
- source_word: הַבְּהֵמָה
  chosen: the beast
  alternatives:
  - the animal
  - the cattle
  lexicon: HALOT
  rationale: Here the singular is collective, contrasting humanity with animals generally.
    'Beast' is a natural singular collective in English and preserves the rhetorical
    contrast.
- source_word: וּמִקְרֶה אֶחָד לָהֶם
  chosen: is the same fate for them
  alternatives:
  - they have one fate
  - one event happens to them both
  lexicon: HALOT
  rationale: This clause states the shared outcome of humans and animals. 'The same
    fate for them' is idiomatic English while retaining the singular 'one' idea.
- source_word: כְּמוֹת זֶה כֵּן מוֹת זֶה
  chosen: as this one dies, so dies that one
  alternatives:
  - as the one dies, so the other dies
  - just as this dies, so that dies
  lexicon: HALOT
  rationale: The Hebrew uses demonstratives in a balanced comparison. This rendering
    preserves the parallelism and the emphasis on identical mortality.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: In this immediate context of shared mortality between humans and animals,
    'breath' best fits the life-breath sense and avoids importing a stronger anthropological
    claim about the immaterial spirit than the verse itself requires.
- source_word: אֶחָד לַכֹּל
  chosen: one breath is for all
  alternatives:
  - the same breath belongs to all
  - one spirit is for all
  lexicon: HALOT
  rationale: This keeps the singular 'one' and the universal scope 'for all.' Combined
    with רוּחַ as 'breath,' it expresses the common life principle shared by both.
- source_word: מוֹתַר
  chosen: advantage
  alternatives:
  - profit
  - surplus
  - preeminence
  lexicon: HALOT
  rationale: In Ecclesiastes, מוֹתַר often carries the sense of gain or advantage.
    'Advantage' is clear modern English and fits the comparison being made.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the human
  lexicon: HALOT
  rationale: The singular אדם here contrasts with the collective beast. 'Man' preserves
    the representative singular and aligns with the doctrine's guidance on אדם as
    'man / humankind' according to context.
- source_word: אָיִן
  chosen: has no
  alternatives:
  - there is no
  - is not
  lexicon: HALOT
  rationale: English requires a smoother predication with 'advantage'; 'has no advantage'
    conveys the negation idiomatically.
- source_word: הַכֹּל
  chosen: all
  alternatives:
  - everything
  lexicon: HALOT
  rationale: The statement is broad and proverbial. 'All' is concise and preserves
    the aphoristic force.
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - mere futility
  lexicon: HALOT
  rationale: Ecclesiastes uses הבל for what is fleeting, insubstantial, and elusive.
    'Vapor' preserves the metaphor better than the traditional but potentially misleading
    'vanity.'
