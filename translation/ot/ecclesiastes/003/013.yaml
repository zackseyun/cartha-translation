theological_decisions:
- issue: Rendering of אָדָם in a generic statement about humanity
  chosen_reading: every man
  alternative_readings:
  - everyone
  - every person
  - all people
  rationale: The Hebrew uses grammatically masculine generic אָדָם. Following the
    project's gender-accurate principle, the translation keeps 'man' where the source
    intends representative humanity rather than neutralizing the form. A footnote
    preserves the inclusive sense for modern readers.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
