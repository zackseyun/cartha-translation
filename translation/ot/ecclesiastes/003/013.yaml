id: ECC.3.13
reference: Ecclesiastes 3:13
source:
  edition: WLC
  text: וְ/גַ֤ם כָּל הָ/אָדָם֙ שֶׁ/יֹּאכַ֣ל וְ/שָׁתָ֔ה וְ/רָאָ֥ה ט֖וֹב בְּ/כָל עֲמָל֑/וֹ
    מַתַּ֥ת אֱלֹהִ֖ים הִֽיא־־׃
translation:
  text: And also that every man should eat and drink and see good in all his labor—this
    is the gift of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone' / 'every person'; Hebrew 'every man' uses a generic singular
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'enjoy good' or 'experience good'; Hebrew literally, 'see good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And also that
  alternatives:
  - Moreover, that
  - Also, that
  lexicon: HALOT
  rationale: The conjunction plus adverb adds this statement to the preceding thought.
    Rendering with 'And also that' preserves the additive force and the clause linkage
    into the verbless conclusion.
- source_word: כָּל הָאָדָם
  chosen: every man
  alternatives:
  - everyone
  - every person
  - all humankind
  lexicon: HALOT
  rationale: The phrase is distributive ('every') with אָדָם used generically. Per
    doctrine, gender-accurate over gender-neutral, so 'every man' best reflects the
    representative generic sense while remaining natural in context.
- source_word: שֶׁיֹּאכַל וְשָׁתָה
  chosen: should eat and drink
  alternatives:
  - may eat and drink
  - eats and drinks
  lexicon: HALOT
  rationale: The relative particle with the imperfect/converted forms expresses the
    content of what is fitting or granted. 'Should eat and drink' conveys the sense
    of a general human good without over-specifying modality.
- source_word: וְרָאָה טוֹב
  chosen: and see good
  alternatives:
  - and enjoy good
  - and see what is good
  - and experience good
  lexicon: HALOT
  rationale: The Hebrew is literally 'see good.' In Ecclesiastes this idiom can mean
    to experience or enjoy good, but retaining 'see good' preserves the source imagery
    and avoids paraphrase beyond the text. The idiomatic sense is still understandable
    in English.
- source_word: בְּכָל עֲמָלוֹ
  chosen: in all his labor
  alternatives:
  - in all his toil
  - from all his labor
  - in all his work
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes often carries the sense of labor/toil. 'Labor'
    is chosen as a readable modern term that preserves the effortful nuance without
    sounding overly harsh in this positive context. 'In' follows the preposition directly,
    preserving the Hebrew construction.
- source_word: מַתַּת אֱלֹהִים הִיא
  chosen: this is the gift of God
  alternatives:
  - it is God's gift
  - this is a gift of God
  lexicon: HALOT
  rationale: The noun phrase is definite in sense in context, identifying the preceding
    reality as something given by God. 'This is the gift of God' makes the demonstrative
    force explicit in English and preserves the theological emphasis on divine givenness.
