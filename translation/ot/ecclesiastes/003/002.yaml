id: ECC.3.2
reference: Ecclesiastes 3:2
source:
  edition: WLC
  text: עֵ֥ת לָ/לֶ֖דֶת וְ/עֵ֣ת לָ/מ֑וּת עֵ֣ת לָ/טַ֔עַת וְ/עֵ֖ת לַ/עֲק֥וֹר נָטֽוּעַ׃
translation:
  text: A time to be born, and a time to die; a time to plant, and a time to uproot
    what is planted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a time to pluck up what is planted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a time or appointed time. 'A time' is the most natural and
    consistent rendering in this poem's repeated pattern, while 'season' is possible
    but less precise in English for each individual clause.
- source_word: לָלֶדֶת
  chosen: to be born
  alternatives:
  - to give birth
  lexicon: HALOT
  rationale: The infinitive of ילד can refer either to bearing/giving birth or being
    born depending on stem and context. In this paired sequence with 'to die,' the
    sense is the beginning of an individual's life, so English idiom favors the passive
    'to be born.'
- source_word: לָמוּת
  chosen: to die
  lexicon: HALOT
  rationale: מות straightforwardly means 'to die.' It forms the natural antithetical
    pair with 'to be born.'
- source_word: לָטַעַת
  chosen: to plant
  lexicon: HALOT
  rationale: נטע in the Qal infinitive means 'to plant.' The agricultural image is
    literal and should be preserved.
- source_word: לַעֲקוֹר
  chosen: to uproot
  alternatives:
  - to pluck up
  - to root out
  lexicon: HALOT
  rationale: עקר means to pull up by the roots or uproot. 'To uproot' is clear modern
    English and matches the agricultural metaphor better than the more traditional
    but less idiomatic 'pluck up.'
- source_word: נָטוּעַ
  chosen: what is planted
  alternatives:
  - the planted thing
  - what has been planted
  lexicon: HALOT
  rationale: The passive participle from נטע identifies the object of uprooting. Rendering
    it as 'what is planted' preserves the Hebrew sense without forcing an explicit
    noun not present in the text.
