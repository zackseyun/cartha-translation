id: ECC.3.18
reference: Ecclesiastes 3:18
source:
  edition: WLC
  text: אָמַ֤רְתִּֽי אֲנִי֙ בְּ/לִבִּ֔/י עַל דִּבְרַת֙ בְּנֵ֣י הָ/אָדָ֔ם לְ/בָרָ֖/ם
    הָ/אֱלֹהִ֑ים וְ/לִ/רְא֕וֹת שְׁ/הֶם בְּהֵמָ֥ה הֵ֖מָּה לָ/הֶֽם־־׃
translation:
  text: I said in my heart concerning the sons of man, that God is testing them, and
    to show them that they themselves are beasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' for 'the sons of man'; Hebrew uses a masculine expression
      with representative force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'and to see'; the clause may also be understood as 'and
      to let them see' or 'and to see that they themselves are beasts.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי אֲנִי בְּלִבִּי
  chosen: I said in my heart
  alternatives:
  - I said to myself
  - I said in my mind
  lexicon: HALOT
  rationale: Idiomatic Hebrew for inward reflection; 'in my heart' preserves the source
    image and remains natural in English.
- source_word: עַל דִּבְרַת
  chosen: concerning
  alternatives:
  - about
  - with regard to
  - because of
  lexicon: HALOT
  rationale: The phrase introduces the matter under consideration. 'Concerning' is
    concise and fits Qoheleth's reflective style without overinterpreting the prepositional
    nuance.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - human beings
  - mankind
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural plus 'the man/humanity.' Per
    doctrine, gender-accurate rendering is preferred over flattening to gender-neutral.
    'Sons of man' preserves the form and representative force; a more inclusive alternative
    is preserved in a footnote.
- source_word: לְבָרָם
  chosen: is testing them
  alternatives:
  - is proving them
  - is sifting them
  - to test them
  lexicon: HALOT
  rationale: 'From ברר in the sense of testing/refining/proving. The infinitive with
    following clauses is best represented in English as content of the reflection:
    God is testing them. ''Testing'' is the clearest modern rendering; ''proving''
    is possible but less immediately accessible.'
- source_word: וְלִרְאוֹת
  chosen: and to show
  alternatives:
  - and to let them see
  - and that he might show
  - and to see
  lexicon: HALOT
  rationale: Although formally 'and to see,' in context the clause expresses the result/purpose
    that humans come to perceive their condition. English 'to show them' makes the
    implied causative sense explicit and reads naturally. The more literal alternative
    is preserved in a footnote because the Hebrew can also be taken as 'and to see'
    or 'and to let them see.'
- source_word: שֶׁהֵם בְּהֵמָה הֵמָּה לָהֶם
  chosen: that they themselves are beasts
  alternatives:
  - that they are beasts
  - that they are like beasts
  - that they are animals
  lexicon: HALOT
  rationale: The repeated pronoun intensifies the statement. 'They themselves' captures
    the emphatic הֵמָּה. 'Beasts' preserves the stark, earthy force of בְּהֵמָה better
    than the more neutral 'animals.' 'Like beasts' would soften what the Hebrew states
    directly.
