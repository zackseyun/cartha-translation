theological_decisions:
- issue: Anthropological force of the comparison between humans and beasts
  chosen_reading: that humans, in the context of mortality and earthly condition,
    are described directly as beasts rather than merely 'like beasts'
  alternative_readings:
  - that they are like beasts
  rationale: The Hebrew predicate is direct, not comparative. The verse does not deny
    the broader biblical distinction between humans and animals as image-bearers;
    in Ecclesiastes' argument it underscores shared mortality and creatureliness.
    The translation preserves that tension rather than softening the statement.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Gendered expression in בְּנֵי הָאָדָם
  chosen_reading: the sons of man
  alternative_readings:
  - human beings
  - the children of man
  rationale: The source is grammatically masculine with representative force. Per
    doctrine, the translation keeps the gendered form in the main text and may annotate
    inclusively in a footnote rather than replacing it with a neutral collective.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral);
    Contested terms table for אָדָם
