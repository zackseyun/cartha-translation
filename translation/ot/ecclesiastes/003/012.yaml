theological_decisions:
- issue: Interpretation of וְלַעֲשׂוֹת טוֹב in Ecclesiastes
  chosen_reading: 'ethical sense: ''to do good'''
  alternative_readings:
  - 'experiential sense: ''to enjoy oneself'' or ''to fare well'''
  rationale: The Hebrew phrase lexically supports 'do good,' and no doctrinal issue
    requires softening it into mere enjoyment. Because Ecclesiastes can use טוב in
    experiential senses, the alternative is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §1, §3, §5
