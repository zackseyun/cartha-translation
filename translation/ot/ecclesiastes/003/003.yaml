theological_decisions:
- issue: Whether the verse's 'to kill' should be softened to avoid apparent moral
    difficulty
  chosen_reading: Retain 'to kill' as a descriptive element in Qoheleth's catalogue
    of times
  alternative_readings:
  - to slay
  - to put to death
  rationale: The poem catalogs realities and fitting times within life under the sun;
    it does not explicitly approve every action named. Softening the verb would obscure
    the starkness of the Hebrew and resolve a tension the text itself leaves in place.
  doctrine_reference: Preserve theological tension rather than resolve it.
