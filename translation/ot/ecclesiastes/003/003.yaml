id: ECC.3.3
reference: Ecclesiastes 3:3
source:
  edition: WLC
  text: עֵ֤ת לַ/הֲרוֹג֙ וְ/עֵ֣ת לִ/רְפּ֔וֹא עֵ֥ת לִ/פְר֖וֹץ וְ/עֵ֥ת לִ/בְנֽוֹת׃
translation:
  text: a time to kill, and a time to heal; a time to tear down, and a time to build
    up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a season' for each occurrence of 'a time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a time to break down, and a time to build.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a time, occasion, or appointed moment. 'A time' preserves
    the repeated cadence of the poem and is the most natural English equivalent here;
    'season' is possible but slightly more interpretive and less consistent with the
    verse's parallel structure.
- source_word: לַהֲרוֹג
  chosen: to kill
  alternatives:
  - to slay
  lexicon: HALOT
  rationale: The infinitive of הרג broadly means 'to kill' or 'to slay.' 'To kill'
    is the plain, unembellished English equivalent and avoids importing a more literary
    or martial nuance that 'slay' can carry. The verse states a polarity within Qoheleth's
    poem, not a moral endorsement.
- source_word: לִרְפּוֹא
  chosen: to heal
  alternatives:
  - to cure
  lexicon: HALOT
  rationale: רפא commonly means 'to heal.' 'To heal' is broader and more idiomatic
    in biblical and modern English than 'to cure,' and it matches the restorative
    contrast to killing.
- source_word: לִפְרֹוץ
  chosen: to tear down
  alternatives:
  - to break down
  - to breach
  lexicon: HALOT
  rationale: פרץ can mean to break through, burst out, or break down. In this paired
    contrast with 'to build up,' the sense is demolition rather than merely making
    a breach. 'Tear down' communicates that contrast clearly in natural English; 'break
    down' is possible, while 'breach' is too narrow here.
- source_word: לִבְנוֹת
  chosen: to build up
  alternatives:
  - to build
  lexicon: HALOT
  rationale: בנה means 'to build.' 'Build up' is chosen because it forms a crisp English
    antithesis with 'tear down' and reflects the constructive counterpart in the poetic
    pair. The added particle 'up' does not materially expand the sense but makes the
    parallelism more idiomatic.
