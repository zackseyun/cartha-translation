id: ECC.3.6
reference: Ecclesiastes 3:6
source:
  edition: WLC
  text: עֵ֤ת לְ/בַקֵּשׁ֙ וְ/עֵ֣ת לְ/אַבֵּ֔ד עֵ֥ת לִ/שְׁמ֖וֹר וְ/עֵ֥ת לְ/הַשְׁלִֽיךְ׃
translation:
  text: a time to seek, and a time to lose; a time to keep, and a time to throw away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a time to search for, and a time to give up as lost.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a time to keep, and a time to cast away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: a time
  alternatives:
  - a season
  lexicon: HALOT
  rationale: עֵת denotes a time or appointed occasion. 'A time' preserves the repeated
    cadence of the poem and is the most natural English equivalent here; 'season'
    is possible but less direct in this line-by-line antithetical structure.
- source_word: בקשׁ
  chosen: to seek
  alternatives:
  - to search for
  lexicon: HALOT
  rationale: The piel infinitive לְבַקֵּשׁ commonly means 'to seek' or 'to search
    for.' 'Seek' is concise, idiomatic, and matches the poetic parallelism.
- source_word: אבד
  chosen: to lose
  alternatives:
  - to give up as lost
  - to let perish
  lexicon: HALOT
  rationale: Although the verb can mean 'to perish' or 'to destroy' in some stems/contexts,
    in this Qoheleth pairing with 'seek' the sense is best taken as 'lose'—the counterpart
    to searching for something. This also fits common English renderings without over-interpreting
    agency.
- source_word: שׁמר
  chosen: to keep
  alternatives:
  - to preserve
  - to guard
  lexicon: HALOT
  rationale: שׁמר has a broad semantic range including keep, guard, preserve, observe.
    In contrast with 'throw away,' 'keep' is the most natural and economical English
    choice for retaining possessions or things.
- source_word: השליך
  chosen: to throw away
  alternatives:
  - to cast away
  - to throw out
  lexicon: HALOT
  rationale: The hiphil infinitive of שלך means to throw, cast, or hurl. 'Throw away'
    clearly conveys disposal in contemporary English and fits the practical contrast
    with 'keep.' 'Cast away' is possible but more archaic/literary.
