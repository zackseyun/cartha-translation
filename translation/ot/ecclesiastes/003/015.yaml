theological_decisions:
- issue: Interpretation of וְהָאֱלֹהִים יְבַקֵּשׁ אֶת נִרְדָּף
  chosen_reading: God seeks what has been driven away
  alternative_readings:
  - God seeks what is pursued
  - God calls the past to account / God seeks again what has passed
  rationale: The clause is semantically compressed and has received multiple interpretations.
    In keeping with the translation philosophy, the main text preserves the lexical
    ambiguity as much as possible rather than resolving it into a doctrinal or philosophical
    claim about judgment or eternal recurrence. Alternatives are preserved in a footnote
    because the Hebrew permits them and they materially affect interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
