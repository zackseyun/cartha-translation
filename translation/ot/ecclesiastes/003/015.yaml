id: ECC.3.15
reference: Ecclesiastes 3:15
source:
  edition: WLC
  text: מַה שֶּֽׁ/הָיָה֙ כְּבָ֣ר ה֔וּא וַ/אֲשֶׁ֥ר לִ/הְי֖וֹת כְּבָ֣ר הָיָ֑ה וְ/הָ/אֱלֹהִ֖ים
    יְבַקֵּ֥שׁ אֶת נִרְדָּֽף־־׃
translation:
  text: What has been already is, and what is to be has already been; and God seeks
    what has been driven away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God seeks what is pursued,' or 'God calls the past to account.' The
      Hebrew of the final clause is difficult and may refer either to what has been
      driven away/passed on or to what is pursued.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה שֶּׁהָיָה
  chosen: What has been
  alternatives:
  - Whatever has been
  - That which has been
  lexicon: HALOT
  rationale: The idiom introduces a generalizing statement about reality or events.
    'What has been' is natural English and preserves the abstract, comprehensive sense
    without over-paraphrasing.
- source_word: כְּבָר
  chosen: already
  alternatives:
  - long ago
  - formerly
  lexicon: HALOT
  rationale: כבר marks prior occurrence. 'Already' fits the parallel structure of
    the verse and keeps the aphoristic force concise.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  - exists
  lexicon: HALOT
  rationale: The pronoun functions predicatively in a verbless clause. In English,
    the sense is best conveyed simply by 'is' rather than a wooden 'it is.'
- source_word: וַאֲשֶׁר לִהְיוֹת
  chosen: what is to be
  alternatives:
  - what will be
  - that which is to come into being
  lexicon: HALOT
  rationale: The phrase points to what lies ahead. 'What is to be' preserves the infinitival
    construction's forward-looking sense and matches the first clause's style.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Ecclesiastes, הָאֱלֹהִים refers to the one true God. 'God' is the
    standard and contextually correct rendering.
- source_word: יְבַקֵּשׁ
  chosen: seeks
  alternatives:
  - requires
  - calls to account
  - searches out
  lexicon: HALOT
  rationale: The basic sense of בקשׁ is 'seek.' Here it likely carries judicial or
    restorative overtones, but 'seeks' preserves the lexical core while allowing the
    ambiguity to remain.
- source_word: אֶת נִרְדָּף
  chosen: what has been driven away
  alternatives:
  - what is pursued
  - the one pursued
  - what has passed by
  lexicon: HALOT
  rationale: 'נרדף, a Niphal participle from רדף (''pursue''), is notoriously difficult
    here. ''What has been driven away'' captures the passive/resultative sense and
    coheres with the context of recurring cycles: God seeks again what has been chased
    off or gone past. This avoids importing a more interpretive judicial gloss into
    the main text.'
