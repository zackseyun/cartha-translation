theological_decisions:
- issue: Anthropological scope of 'all' in context
  chosen_reading: The verse states the shared mortality of humans and animals without
    making a further doctrinal claim about the afterlife.
  alternative_readings:
  - The verse refers only to humans in a generalized sense
  - The verse implies a materialist denial of any distinction beyond death
  rationale: In the immediate context (Eccl 3:18–21), Qoheleth compares humans and
    beasts and emphasizes their common fate in death. The translation preserves that
    observation without importing a denial of spiritual distinction or afterlife doctrine
    not explicitly stated in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
