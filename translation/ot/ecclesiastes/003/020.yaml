id: ECC.3.20
reference: Ecclesiastes 3:20
source:
  edition: WLC
  text: הַ/כֹּ֥ל הוֹלֵ֖ךְ אֶל מָק֣וֹם אֶחָ֑ד הַ/כֹּל֙ הָיָ֣ה מִן הֶֽ/עָפָ֔ר וְ/הַ/כֹּ֖ל
    שָׁ֥ב אֶל הֶ/עָפָֽר־־־׃
translation:
  text: All go to one place. All came from the dust, and all return to the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All was from the dust.' The Hebrew more literally reads 'all was from
      the dust,' but 'came from the dust' expresses the sense of origin more naturally
      in English.
    reason: lexical_alternative
  - marker: b
    text: '''The dust'' echoes humanity''s mortality and recalls Genesis 3:19.'
    reason: cross_reference
lexical_decisions:
- source_word: הַכֹּל
  chosen: all
  alternatives:
  - everything
  - all things
  lexicon: HALOT
  rationale: The repeated noun with article functions comprehensively, referring back
    to both humans and animals in the immediate context. 'All' is concise and natural
    in English while preserving the universal scope.
- source_word: הוֹלֵךְ
  chosen: go
  alternatives:
  - are going
  - walks
  - goes
  lexicon: HALOT
  rationale: The participle expresses a general present reality. English simple present
    'go' fits proverbial discourse better than the more cumbersome 'are going.'
- source_word: מָקוֹם אֶחָד
  chosen: one place
  alternatives:
  - the same place
  - a single place
  lexicon: HALOT
  rationale: A straightforward rendering of the phrase. 'One place' preserves the
    Hebrew wording without over-interpreting; 'the same place' is interpretive but
    contextually similar.
- source_word: הָיָה מִן הֶעָפָר
  chosen: came from the dust
  alternatives:
  - was from the dust
  - came to be from the dust
  lexicon: HALOT
  rationale: Although the Hebrew verb is literally 'was,' idiomatic English in this
    context is better served by 'came from,' which expresses origin clearly and naturally.
    This remains within optimal equivalence and matches the verse's origin/return
    parallelism.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - soil
  - dry earth
  lexicon: HALOT
  rationale: '''Dust'' is the standard and contextually appropriate rendering, especially
    given the echo of Genesis 3:19 and the mortality theme.'
- source_word: שָׁב אֶל הֶעָפָר
  chosen: return to the dust
  alternatives:
  - turns back to the dust
  - goes back to the dust
  lexicon: HALOT
  rationale: '''Return'' is the most natural and semantically precise rendering of
    שוב in this context, preserving the reversal from origin to end.'
