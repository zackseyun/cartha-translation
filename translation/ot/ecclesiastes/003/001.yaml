theological_decisions:
- issue: Whether חֵפֶץ should be rendered 'purpose' in a way that implies strong teleological
    or providential intent
  chosen_reading: matter
  alternative_readings:
  - purpose
  rationale: The verse affirms fitting times for all affairs under the heavens, but
    the Hebrew noun itself need not explicitly assert a philosophical doctrine of
    purpose in every event. 'Matter' preserves the breadth and ambiguity of the source
    while allowing readers to infer theological implications from the wider context
    rather than from an overdetermined gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
