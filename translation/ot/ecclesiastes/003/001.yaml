id: ECC.3.1
reference: Ecclesiastes 3:1
source:
  edition: WLC
  text: לַ/כֹּ֖ל זְמָ֑ן וְ/עֵ֥ת לְ/כָל חֵ֖פֶץ תַּ֥חַת הַ/שָּׁמָֽיִם־׃ס
translation:
  text: For everything there is a season, and a time for every matter under the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''purpose'': the Hebrew חֵפֶץ can mean ''matter,'' ''activity,'' or
      ''purpose.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכֹּל
  chosen: for everything
  alternatives:
  - for all things
  - for every thing
  lexicon: HALOT
  rationale: 'The preposition ל plus כֹּל introduces the scope: ''for everything''
    or ''for every thing.'' ''For everything'' is idiomatic modern English and preserves
    the comprehensive sense without sounding wooden.'
- source_word: זְמָן
  chosen: season
  alternatives:
  - appointed time
  - time
  lexicon: HALOT
  rationale: זְמָן denotes a set or suitable time, often with the nuance of an appointed
    or fitting season. 'Season' preserves the distinction from the following עֵת,
    avoiding an English repetition of 'time ... time' and reflecting the poetic parallelism.
- source_word: וְעֵת
  chosen: and a time
  alternatives:
  - and a season
  lexicon: HALOT
  rationale: עֵת is the common term for 'time' or 'occasion.' Rendering it as 'time'
    maintains the natural pairing with זְמָן as a near-synonymous but not identical
    parallel term.
- source_word: לְכָל
  chosen: for every
  alternatives:
  - for all
  lexicon: HALOT
  rationale: Here לְ plus כָּל governs the following noun in a distributive sense.
    'For every' is the most natural English expression before a singular count noun.
- source_word: חֵפֶץ
  chosen: matter
  alternatives:
  - purpose
  - delight
  - activity
  - thing
  lexicon: HALOT
  rationale: חֵפֶץ can mean delight, desire, pleasure, or by extension a matter/affair/purpose.
    In this context, the verse introduces the catalog of human events in 3:2–8, so
    'matter' best captures the broad range of affairs without importing too much teleology.
    'Purpose' is traditional, but in modern English it can suggest intentional design
    more strongly than the Hebrew requires here.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'under' and is a characteristic
    Ecclesiastes expression for the earthly realm.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew form is plural. 'The heavens' preserves the form and the elevated
    register of Ecclesiastes better than 'the sky,' while avoiding the flattening
    effect of singular 'heaven'.
