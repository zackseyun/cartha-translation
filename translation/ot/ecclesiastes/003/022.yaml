theological_decisions:
- issue: Rendering of אָדָם in a generic singular statement
  chosen_reading: a man
  alternative_readings:
  - humankind
  - the human being
  rationale: The Hebrew uses grammatically masculine singular with representative
    force. Following the doctrine's gender-accurate principle, the translation keeps
    the singular masculine form rather than neutralizing it, while recognizing the
    statement applies generally to humanity.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
