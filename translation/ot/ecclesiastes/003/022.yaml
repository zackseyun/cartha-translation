id: ECC.3.22
reference: Ecclesiastes 3:22
source:
  edition: WLC
  text: וְ/רָאִ֗יתִי כִּ֣י אֵ֥ין טוֹב֙ מֵ/אֲשֶׁ֨ר יִשְׂמַ֤ח הָ/אָדָם֙ בְּֽ/מַעֲשָׂ֔י/ו
    כִּי ה֖וּא חֶלְק֑/וֹ כִּ֣י מִ֤י יְבִיאֶ֨/נּוּ֙ לִ/רְא֔וֹת בְּ/מֶ֖ה שֶׁ/יִּהְיֶ֥ה
    אַחֲרָֽי/ו־׃
translation:
  text: So I saw that there is nothing better than that a man should rejoice in his
    works, for that is his portion. For who can bring him to see what will be after
    him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what will happen after he is gone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  chosen: So I saw
  alternatives:
  - And I saw
  - Then I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה introduces the speaker's conclusion/observation.
    'So I saw' captures the inferential force in context while remaining close to
    the Hebrew.
- source_word: אֵין טוֹב מֵאֲשֶׁר
  chosen: there is nothing better than that
  alternatives:
  - there is nothing better than
  - there is no good except that
  lexicon: HALOT
  rationale: This idiom in Qoheleth expresses comparative evaluation rather than absolute
    moral good. 'There is nothing better than that' preserves the superlative-comparative
    sense without over-paraphrase.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - man
  - humankind
  - the man
  lexicon: HALOT
  rationale: אָדָם here is generic singular, referring representatively to a human
    being. Per doctrine, gender-accurate rendering is preferred where the source uses
    masculine generic force; 'a man' preserves the singular representative sense better
    than the abstract 'humankind'.
- source_word: יִשְׂמַח
  chosen: should rejoice
  alternatives:
  - rejoices
  - be glad
  lexicon: HALOT
  rationale: 'The imperfect after מֵאֲשֶׁר expresses the content of what is best:
    that one rejoice. ''Should rejoice'' conveys the evaluative nuance in idiomatic
    English without making it a command.'
- source_word: בְּמַעֲשָׂיו
  chosen: in his works
  alternatives:
  - in his labor
  - in what he does
  - in his deeds
  lexicon: HALOT
  rationale: מַעֲשֶׂה denotes deeds/work/activity. 'Works' is broad enough to include
    human activity generally and fits Ecclesiastes' recurring theme of one's toil
    and undertakings.
- source_word: חֶלְקוֹ
  chosen: his portion
  alternatives:
  - his lot
  - his share
  lexicon: HALOT
  rationale: חֵלֶק in Ecclesiastes often denotes one's allotted share in life. 'Portion'
    preserves that thematic and existential nuance better than the flatter 'share'.
- source_word: מִי יְבִיאֶנּוּ
  chosen: who can bring him
  alternatives:
  - who will bring him
  - who can cause him to come
  lexicon: HALOT
  rationale: Hiphil of בוא means to bring/cause to come. The rhetorical question points
    to human inability, so 'can bring him' best reflects the force in context.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to experience
  - to observe
  lexicon: HALOT
  rationale: ראה is retained literally here. In context it may imply coming to know
    or witness, but 'to see' preserves the Hebrew wording and the rhetorical vividness.
- source_word: בְּמֶה שֶׁיִּהְיֶה אַחֲרָיו
  chosen: what will be after him
  alternatives:
  - what will happen after him
  - what will be after he is gone
  lexicon: HALOT
  rationale: The phrase concerns what comes after a person's life. 'What will be after
    him' is formally close and leaves the scope broad, matching Qoheleth's ambiguity
    about posthumous events rather than explicitly paraphrasing 'after he is gone'
    in the main text.
