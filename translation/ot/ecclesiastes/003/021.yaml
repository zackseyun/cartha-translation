id: ECC.3.21
reference: Ecclesiastes 3:21
source:
  edition: WLC
  text: מִ֣י יוֹדֵ֗עַ ר֚וּחַ בְּנֵ֣י הָ/אָדָ֔ם הָ/עֹלָ֥ה הִ֖יא לְ/מָ֑עְלָ/ה וְ/ר֨וּחַ֙
    הַ/בְּהֵמָ֔ה הַ/יֹּרֶ֥דֶת הִ֖יא לְ/מַ֥טָּה לָ/אָֽרֶץ׃
translation:
  text: Who knows whether the spirit of the sons of man goes upward, and whether the
    spirit of the beast goes down to the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of human beings.' The Hebrew reads 'the spirit of the sons
      of man,' using a masculine expression with representative force for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'breath' instead of 'spirit' in both occurrences of רוּחַ; Ecclesiastes
      can use the term with overlapping senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  - Who can know
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'Who'
    preserves the Hebrew form and the verse's skeptical tone.
- source_word: יוֹדֵעַ
  chosen: knows
  alternatives:
  - can know
  - knows for certain
  lexicon: HALOT
  rationale: Qal participle of ידע functions verbally here. 'Knows' is the most direct
    rendering; stronger expansions like 'knows for certain' are interpretive and not
    required by the text.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: HALOT
  rationale: In this context, referring to humans and animals in relation to death
    and destiny, 'spirit' best captures the animating life-principle under discussion.
    'Breath' is possible in Ecclesiastes, but here the upward/downward contrast points
    beyond mere respiration.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - human beings
  - mankind
  - the children of man
  lexicon: HALOT
  rationale: This phrase literally means 'the sons of man/humankind.' Per doctrine,
    gender-accurate rendering is preferred where the source is masculine with representative
    force. 'The sons of man' preserves the Hebrew expression and its connection to
    אדם, while remaining understandable in context.
- source_word: הָעֹלָה הִיא לְמָעְלָה
  chosen: goes upward
  alternatives:
  - ascends upward
  - is the one that goes upward
  lexicon: HALOT
  rationale: The participial clause describes the spirit's direction. 'Goes upward'
    is natural English and preserves the motion without overformal redundancy. 'Ascends'
    is possible but slightly elevated in register.
- source_word: וְרוּחַ הַבְּהֵמָה
  chosen: and whether the spirit of the beast
  alternatives:
  - and the spirit of the animal
  - and whether the spirit of the animal
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective/singular for animal life in contrast with
    humanity. 'Beast' preserves the lexical distinction and the singular form, while
    fitting Ecclesiastes' style.
- source_word: הַיֹּרֶדֶת הִיא לְמַטָּה
  chosen: goes down
  alternatives:
  - descends
  - is the one that goes downward
  lexicon: HALOT
  rationale: Parallel to 'goes upward.' 'Goes down' is idiomatic and keeps the contrast
    clear.
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - to the ground
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land/ground.' In this mortality context, 'to
    the earth' best preserves the broader cosmological contrast with 'upward' and
    echoes return-to-dust themes.
