theological_decisions:
- issue: Meaning of הָעֹלָם in relation to human knowledge and divine sovereignty
  chosen_reading: Rendered as 'eternity' in the main text
  alternative_readings:
  - the world
  - the age
  - obscurity/hiddenness
  rationale: The verse juxtaposes a God-given awareness beyond the immediate present
    with humanity's inability to comprehend God's work exhaustively. 'Eternity' best
    preserves that tension without over-interpreting. Because the term is debated,
    alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
