theological_decisions:
- issue: Rendering of הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  rationale: The verse speaks of the generic human individual approaching death. Following
    the doctrine's gender-accurate principle for אָדָם, 'man' best matches the singular
    representative force without flattening it into an abstract collective.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (אָדָם), and Translation
    philosophy §4'
