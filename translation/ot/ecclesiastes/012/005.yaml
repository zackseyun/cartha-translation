id: ECC.12.5
reference: Ecclesiastes 12:5
source:
  edition: WLC
  text: גַּ֣ם מִ/גָּבֹ֤הַּ יִרָ֨אוּ֙ וְ/חַתְחַתִּ֣ים בַּ/דֶּ֔רֶךְ וְ/יָנֵ֤אץ הַ/שָּׁקֵד֙
    וְ/יִסְתַּבֵּ֣ל הֶֽ/חָגָ֔ב וְ/תָפֵ֖ר הָֽ/אֲבִיּוֹנָ֑ה כִּֽי הֹלֵ֤ךְ הָ/אָדָם֙
    אֶל בֵּ֣ית עוֹלָמ֔/וֹ וְ/סָבְב֥וּ בָ/שּׁ֖וּק הַ/סֹּפְדִֽים־־׃
translation:
  text: Also they are afraid of heights, and terrors are on the road; the almond tree
    blossoms, the grasshopper drags itself along, and the caper berry fails, because
    man is going to his eternal house, and the mourners go about in the street.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grasshopper becomes a burden.' The Hebrew expression is difficult,
      and the image may emphasize either feeble movement or the slightest thing becoming
      burdensome in old age.
    reason: lexical_alternative
  - marker: b
    text: Or 'desire fails.' The Hebrew literally refers to 'the caper berry,' likely
      an image connected with appetite or stimulation.
    reason: lexical_alternative
  - marker: c
    text: '''Mourners'' may include professional mourners who publicly lamented the
      dead.'
    reason: cultural_note
lexical_decisions:
- source_word: מִגָּבֹהַּ
  chosen: of heights
  alternatives:
  - of what is high
  - from a high place
  lexicon: HALOT
  rationale: The preposition מִן with גָּבֹהַּ yields the sense 'from/on account of
    height' idiomatically, hence 'afraid of heights' in natural English. This fits
    the aging/decrepitude context.
- source_word: יִרָאוּ
  chosen: they are afraid
  alternatives:
  - they fear
  lexicon: HALOT
  rationale: Qal imperfect of ירא here expresses fear rather than reverence. English
    present 'are afraid' best captures the gnomic description in context.
- source_word: חַתְחַתִּים
  chosen: terrors
  alternatives:
  - frights
  - dread things
  lexicon: HALOT
  rationale: A plural noun denoting terrors or frightful dangers. 'Terrors' preserves
    the vividness without over-paraphrase.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - in the way
  - on the path
  lexicon: HALOT
  rationale: Concrete travel imagery is likely intended; 'on the road' is idiomatic
    modern English.
- source_word: יָנֵאץ הַשָּׁקֵד
  chosen: the almond tree blossoms
  alternatives:
  - the almond tree is despised
  - the almond tree blooms
  lexicon: HALOT
  rationale: Though the verb is difficult, in this context the longstanding sense
    'blossoms/blooms' fits the sequence of aging images, likely alluding to white
    hair like almond blossoms. 'Blossoms' is slightly more vivid than 'blooms'.
- source_word: יִסְתַּבֵּל הֶחָגָב
  chosen: the grasshopper drags itself along
  alternatives:
  - the grasshopper becomes a burden
  - the locust drags itself along
  lexicon: HALOT
  rationale: The reflexive form is difficult. In context of bodily decline, 'drags
    itself along' conveys feebleness more naturally than the more obscure 'becomes
    a burden,' while still reflecting the image of diminished movement.
- source_word: הֶחָגָב
  chosen: the grasshopper
  alternatives:
  - the locust
  lexicon: HALOT
  rationale: Either insect is possible; 'grasshopper' is conventional here and suits
    the singular illustrative image.
- source_word: תָפֵר הָאֲבִיּוֹנָה
  chosen: the caper berry fails
  alternatives:
  - the caper berry bursts
  - desire fails
  lexicon: HALOT
  rationale: אֲבִיּוֹנָה most likely denotes the caper berry, traditionally associated
    with appetite or stimulation. Rendering the noun concretely preserves the Hebrew
    image; 'fails' communicates the likely sense that its stimulating effect is gone.
    The interpretive alternative 'desire fails' is preserved in a footnote.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - the man
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered gender-accurately by context. Here the
    singular generic individual in a mortality poem is best represented by 'man,'
    not the more abstract 'humankind'.
- source_word: בֵּית עוֹלָמוֹ
  chosen: his eternal house
  alternatives:
  - his everlasting home
  - his long home
  lexicon: HALOT
  rationale: Literally 'house of his eternity.' 'Eternal house' preserves the Hebrew
    metaphor and solemnity better than the idiomatic but less transparent 'long home.'
- source_word: סָבְבוּ
  chosen: go about
  alternatives:
  - circle
  - move around
  lexicon: HALOT
  rationale: The verb denotes going around or circulating. 'Go about' is idiomatic
    for mourners moving through public space.
- source_word: בַּשּׁוּק
  chosen: in the street
  alternatives:
  - in the market
  - in the marketplace
  lexicon: HALOT
  rationale: שׁוּק can denote market or street. Here public thoroughfare is the point,
    so 'street' reads naturally while preserving the public setting.
- source_word: הַסֹּפְדִים
  chosen: the mourners
  alternatives:
  - the professional mourners
  - those who lament
  lexicon: HALOT
  rationale: The participle refers to those lamenting the dead, likely including hired
    mourners. 'Mourners' is concise in the main text; the cultural nuance can be noted
    in a footnote.
