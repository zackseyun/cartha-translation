id: ECC.12.12
reference: Ecclesiastes 12:12
source:
  edition: WLC
  text: וְ/יֹתֵ֥ר מֵ/הֵ֖מָּה בְּנִ֣/י הִזָּהֵ֑ר עֲשׂ֨וֹת סְפָרִ֤ים הַרְבֵּה֙ אֵ֣ין
    קֵ֔ץ וְ/לַ֥הַג הַרְבֵּ֖ה יְגִעַ֥ת בָּשָֽׂר׃
translation:
  text: 'And beyond these, my son, be warned: of making many books there is no end,
    and much study is a weariness of the flesh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and much reading' or 'and much devotion'; the Hebrew term rendered 'study'
      is uncommon and may refer more broadly to absorption in books or words.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹתֵר מֵהֵמָּה
  chosen: And beyond these
  alternatives:
  - And furthermore, beyond them
  - And more than these
  lexicon: HALOT
  rationale: The phrase links this verse to the preceding sayings and warns against
    going past them. 'Beyond these' captures the comparative/prepositional sense more
    naturally than a bare 'more than these,' while preserving the admonitory force.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is literally 'my son.' Per gender-accurate policy, the masculine
    singular should be retained unless context clearly generalizes. Here it is a conventional
    paternal address, so 'my son' is preferred.
- source_word: הִזָּהֵר
  chosen: be warned
  alternatives:
  - take warning
  - beware
  lexicon: HALOT
  rationale: The Niphal imperative carries a reflexive/passive warning sense. 'Be
    warned' is concise and idiomatic in English, fitting the following caution. 'Beware'
    is possible but can sound more abrupt and less connected to the content that follows.
- source_word: עֲשׂוֹת סְפָרִים הַרְבֵּה
  chosen: of making many books
  alternatives:
  - in making many books
  - the making of many books
  lexicon: HALOT
  rationale: The infinitive construct with object is rendered as a verbal noun phrase
    after the warning. 'Of making many books' preserves the Hebrew structure and leads
    naturally into 'there is no end.'
- source_word: אֵין קֵץ
  chosen: there is no end
  alternatives:
  - there is no limit
  lexicon: HALOT
  rationale: A standard idiomatic rendering of the existential negative plus 'end.'
    'No end' fits both the Hebrew and established English usage without sounding archaic.
- source_word: וְלַהַג הַרְבֵּה
  chosen: and much study
  alternatives:
  - and much devotion
  - and much reading
  lexicon: HALOT
  rationale: לַהַג is a difficult term, often understood here as study, reading, or
    excessive devotion to books/words. In this context, following the mention of many
    books, 'much study' best conveys the practical sense in readable English. Because
    the term is somewhat uncertain, alternatives are preserved in a footnote.
- source_word: יְגִעַת בָּשָׂר
  chosen: is a weariness of the flesh
  alternatives:
  - is weariness to the body
  - is an exhaustion of the body
  lexicon: HALOT
  rationale: The construct phrase denotes bodily weariness or fatigue. 'Flesh' is
    retained as a more literal rendering of בָּשָׂר, since the context is physical
    rather than theological; 'weariness of the flesh' is understandable and preserves
    the Hebrew imagery.
