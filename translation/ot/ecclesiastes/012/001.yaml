theological_decisions:
- issue: Number of בּוֹרְאֶיךָ ('your Creator/creators')
  chosen_reading: 'Singular: ''your Creator'''
  alternative_readings:
  - 'Plural-form rendering: ''your creators'''
  rationale: Although the form is morphologically plural, the verse in Israel's monotheistic
    wisdom context addresses the one God. Rendering it as singular reflects the intended
    referent while documenting the unusual plural form. This is a lexical-theological
    decision because a literal plural in English could suggest a meaning the Hebrew
    context does not support.
  doctrine_reference: Affirmations; Translation philosophy 1, 3
