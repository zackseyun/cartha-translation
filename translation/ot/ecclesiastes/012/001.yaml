id: ECC.12.1
reference: Ecclesiastes 12:1
source:
  edition: WLC
  text: וּ/זְכֹר֙ אֶת בּ֣וֹרְאֶ֔י/ךָ בִּ/ימֵ֖י בְּחוּרֹתֶ֑י/ךָ עַ֣ד אֲשֶׁ֤ר לֹא יָבֹ֨אוּ֙
    יְמֵ֣י הָֽ/רָעָ֔ה וְ/הִגִּ֣יעוּ שָׁנִ֔ים אֲשֶׁ֣ר תֹּאמַ֔ר אֵֽין לִ֥/י בָ/הֶ֖ם
    חֵֽפֶץ־־־׃
translation:
  text: And remember your Creator in the days of your youth, before the evil days
    come and the years arrive of which you will say, “I have no pleasure in them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a plural-form expression, literally 'your creators'; here it
      refers to God as a singular title, 'your Creator.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/זְכֹר
  chosen: And remember
  alternatives:
  - Remember
  - So remember
  lexicon: HALOT
  rationale: Qal imperative 2ms of זכר, a direct exhortation. The prefixed conjunction
    is carried as 'And' to preserve discourse flow from the preceding context while
    keeping natural English.
- source_word: אֶת בּוֹרְאֶיךָ
  chosen: your Creator
  alternatives:
  - your creators
  lexicon: HALOT
  rationale: Though בּוֹרְאֶיךָ is morphologically plural in form, in this context
    it functions as a singular reference to God, a known usage in Hebrew. Singular
    'Creator' best reflects the intended sense and avoids implying polytheism. The
    plural-form alternative is preserved in a footnote because it is a notable lexical
    feature.
- source_word: בִּימֵי בְּחוּרֹתֶיךָ
  chosen: in the days of your youth
  alternatives:
  - in the days of your young manhood
  - during your youth
  lexicon: HALOT
  rationale: The construct phrase literally denotes the period of youthful vigor.
    'In the days of your youth' is idiomatic, close to the Hebrew, and preserves the
    temporal imagery.
- source_word: עַד אֲשֶׁר לֹא יָבֹאוּ
  chosen: before ... come
  alternatives:
  - until ... come
  lexicon: HALOT
  rationale: In context עַד אֲשֶׁר לֹא introduces a limit prior to an undesirable
    future event. English 'before' communicates the intended warning more naturally
    than a wooden 'until not'.
- source_word: יְמֵי הָרָעָה
  chosen: the evil days
  alternatives:
  - the bad days
  - the days of trouble
  - the days of adversity
  lexicon: HALOT
  rationale: רָעָה here refers to adversity, misery, or affliction associated with
    old age in the surrounding passage. 'Evil days' preserves the Hebrew wording and
    the somber tone, while allowing readers to infer hardship rather than moral evil
    alone.
- source_word: וְהִגִּיעוּ שָׁנִים
  chosen: and the years arrive
  alternatives:
  - and the years draw near
  - and the years come
  lexicon: HALOT
  rationale: The verb נגע/הגיע in Hiphil conveys reaching or arriving. 'Arrive' is
    natural and keeps the sense of the years coming upon a person.
- source_word: אֲשֶׁר תֹּאמַר
  chosen: of which you will say
  alternatives:
  - when you will say concerning them
  - about which you will say
  lexicon: HALOT
  rationale: This relative clause modifies 'years.' 'Of which you will say' is concise
    and preserves the forward-looking statement.
- source_word: אֵין לִי בָהֶם חֵפֶץ
  chosen: I have no pleasure in them
  alternatives:
  - I have no delight in them
  - I take no enjoyment in them
  - they give me no pleasure
  lexicon: HALOT
  rationale: חֵפֶץ denotes delight, pleasure, or desire. 'I have no pleasure in them'
    is a clear, fairly formal rendering that preserves the personal evaluation of
    those years.
