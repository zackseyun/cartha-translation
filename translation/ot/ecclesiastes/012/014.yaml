theological_decisions:
- issue: Scope of divine judgment
  chosen_reading: The verse states that God judges every deed, including hidden things,
    without specifying the mechanism or timing of judgment.
  alternative_readings:
  - Final judgment only
  - Providential judgment within history and final judgment
  rationale: The Hebrew affirms comprehensive divine judgment but does not explicitly
    resolve whether the focus is exclusively eschatological or also includes temporal
    judgment. The translation therefore preserves the statement without importing
    a narrower doctrinal scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
