id: ECC.12.14
reference: Ecclesiastes 12:14
source:
  edition: WLC
  text: כִּ֤י אֶת כָּל מַֽעֲשֶׂ֔ה הָ/אֱלֹהִ֛ים יָבִ֥א בְ/מִשְׁפָּ֖ט עַ֣ל כָּל נֶעְלָ֑ם
    אִם ט֖וֹב וְ/אִם רָֽע־־־־־׃
translation:
  text: For God will bring every deed into judgment, concerning every hidden thing,
    whether good or evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'including every hidden thing' or 'with respect to every secret thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the concluding exhortation in the
    previous verse. 'For' preserves the explanatory force in natural English.
- source_word: אֶת כָּל מַעֲשֶׂה
  chosen: every deed
  alternatives:
  - every act
  - every work
  lexicon: HALOT
  rationale: The direct-object marker plus 'all deed/work' is best rendered distributively
    as 'every deed.' 'Deed' fits moral evaluation in the context of judgment better
    than the broader 'work.'
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Definite 'the God' in Hebrew idiom is naturally rendered 'God' in English.
- source_word: יָבִא
  chosen: will bring
  alternatives:
  - will bring in
  - will cause to come
  lexicon: HALOT
  rationale: Hiphil of בוא here means to bring something into a setting, namely judgment.
    'Will bring' is idiomatic and sufficiently formal.
- source_word: בְמִשְׁפָּט
  chosen: into judgment
  alternatives:
  - to judgment
  - in judgment
  lexicon: HALOT
  rationale: The preposition with משפט after 'bring' is well conveyed by 'into judgment,'
    expressing entry into judicial evaluation. 'In judgment' could suggest manner
    rather than destination.
- source_word: עַל כָּל נֶעְלָם
  chosen: concerning every hidden thing
  alternatives:
  - including every hidden thing
  - even every hidden thing
  - with respect to every secret thing
  lexicon: HALOT
  rationale: נעלם denotes what is hidden or concealed. The preposition על here is
    taken in the sense 'concerning/with respect to.' 'Every hidden thing' preserves
    the broad scope without narrowing it only to 'secrets' of the heart.
- source_word: אִם טוֹב וְאִם רָע
  chosen: whether good or evil
  alternatives:
  - whether it is good or evil
  lexicon: HALOT
  rationale: This idiom expresses total moral range. The shorter English form is natural
    and preserves the binary evaluation implied by the Hebrew.
