id: ECC.12.13
reference: Ecclesiastes 12:13
source:
  edition: WLC
  text: ס֥וֹף דָּבָ֖ר הַ/כֹּ֣ל נִשְׁמָ֑ע אֶת הָ/אֱלֹהִ֤ים יְרָא֙ וְ/אֶת מִצְוֺתָ֣י/ו
    שְׁמ֔וֹר כִּי זֶ֖ה כָּל הָ/אָדָֽם־־־־׃
translation:
  text: 'The end of the matter, when all has been heard: fear God and keep his commandments,
    for this is the whole of man.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for this is the whole of man.' Or 'for this is the whole
      duty of man' or 'for this is for all humankind.'
    reason: alternative_reading
lexical_decisions:
- source_word: סוֹף דָּבָר
  chosen: The end of the matter
  alternatives:
  - The conclusion of the matter
  - The end of the word/thing
  lexicon: HALOT
  rationale: סוֹף denotes an end or conclusion, and דָּבָר here refers to the matter
    under discussion rather than a single spoken word. 'The end of the matter' is
    idiomatic and preserves the summarizing force.
- source_word: הַכֹּל נִשְׁמָע
  chosen: when all has been heard
  alternatives:
  - all has been heard
  - after all has been heard
  lexicon: HALOT
  rationale: The clause is elliptical and functions adverbially, marking the point
    at which the conclusion is stated. Rendering with 'when' makes the syntax natural
    in English while preserving the passive sense of נִשְׁמָע.
- source_word: אֶת הָאֱלֹהִים יְרָא
  chosen: fear God
  alternatives:
  - revere God
  lexicon: HALOT
  rationale: יָרֵא with God commonly carries the covenantal sense of reverent fear.
    'Fear God' is the standard and stronger rendering, preserving the theological
    weight without reducing it to mere respect.
- source_word: וְאֶת מִצְוֺתָיו שְׁמוֹר
  chosen: and keep his commandments
  alternatives:
  - and keep his commands
  - and guard his commandments
  lexicon: HALOT
  rationale: שָׁמַר often means keep/observe in relation to commandments. 'Keep his
    commandments' is clear, idiomatic, and preserves the ethical-obediential sense.
- source_word: כִּי זֶה
  chosen: for this is
  alternatives:
  - for this
  - because this is
  lexicon: HALOT
  rationale: כִּי introduces the ground or explanation for the exhortation. Supplying
    'is' is required in English and reflects the verbless Hebrew clause.
- source_word: כָּל הָאָדָם
  chosen: the whole of man
  alternatives:
  - the whole duty of man
  - the whole of humankind
  - the whole man
  lexicon: HALOT
  rationale: The Hebrew literally reads 'all the man' or 'the whole of man' and does
    not explicitly contain 'duty.' In line with original-language primacy, the translation
    avoids importing 'duty.' Because אָדָם is singular and grammatically masculine
    with representative force, 'man' is retained in the main text per the gender-accurate
    policy, while a more inclusive interpretive alternative is preserved in a footnote.
