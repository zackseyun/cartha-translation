theological_decisions:
- issue: Meaning of כָּל הָאָדָם
  chosen_reading: the whole of man
  alternative_readings:
  - the whole duty of man
  - the whole of humankind
  rationale: Traditional English versions often expand the phrase to 'the whole duty
    of man,' but 'duty' is not present in the Hebrew. The chosen rendering preserves
    the terseness and interpretive openness of the source. Because the phrase can
    be understood either as what constitutes a human being's whole obligation or as
    what applies to all humanity, alternatives are preserved in footnotes rather than
    resolved dogmatically.
  doctrine_reference: 'Translation philosophy §§1, 3, 4; Contested terms: אָדָם'
