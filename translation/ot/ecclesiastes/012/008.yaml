id: ECC.12.8
reference: Ecclesiastes 12:8
source:
  edition: WLC
  text: הֲבֵ֧ל הֲבָלִ֛ים אָמַ֥ר הַ/קּוֹהֶ֖לֶת הַ/כֹּ֥ל הָֽבֶל׃
translation:
  text: “Vapor of vapors,” says the Teacher; “everything is vapor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Vanity of vanities … all is vanity.” The traditional rendering preserves
      longstanding English usage, but the Hebrew הבל literally evokes something like
      vapor or breath—what is fleeting, insubstantial, or elusive.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵל הֲבָלִים
  chosen: Vapor of vapors
  alternatives:
  - Vanity of vanities
  - Utter vanity
  - Futility of futilities
  - Breath of breaths
  lexicon: HALOT, BDB
  rationale: The construct chain intensifies הבל in a superlative-like way, literally
    'vapor of vapors.' Traditional 'vanity' is well established in English but can
    suggest pride or self-admiration, which is too narrow and potentially misleading.
    'Vapor' preserves the concrete metaphor of something insubstantial, fleeting,
    and elusive, which fits Qoheleth's recurring use of הבל.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT, BDB
  rationale: Although the Hebrew perfect can be rendered as a simple past, in citation
    or refrain contexts English often uses the present for a vivid, proverbial declaration.
    Here it functions as a framing formula for the book's concluding refrain, so 'says'
    reads naturally while preserving the force of direct speech.
- source_word: הַקּוֹהֶלֶת
  chosen: the Teacher
  alternatives:
  - the Preacher
  - Qoheleth
  - the Assembler
  lexicon: HALOT, BDB
  rationale: Qoheleth is a title rather than a personal name in this context. 'The
    Teacher' is clear modern English and captures the role of one who addresses and
    instructs an assembly. 'The Preacher' is traditional but more ecclesiastical than
    the Hebrew requires; 'Qoheleth' would transliterate rather than translate a title,
    contrary to the project's philosophy.
- source_word: הַכֹּל
  chosen: everything
  alternatives:
  - all
  - the whole
  lexicon: HALOT, BDB
  rationale: The term denotes totality. 'Everything' is idiomatic modern English and
    fits the absolute summary statement better than the more wooden 'all.'
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - futility
  - breath
  lexicon: HALOT, BDB
  rationale: For consistency with the opening phrase and with Qoheleth's repeated
    key term, the same concrete image is retained. 'Vapor' communicates transience
    and insubstantiality without importing the narrower modern sense of 'vanity.'
