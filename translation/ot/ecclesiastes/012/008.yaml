theological_decisions:
- issue: Rendering the keynote term הבל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - futility
  - breath
  rationale: This is primarily a lexical and literary decision rather than a doctrinal
    one, but it significantly shapes interpretation. 'Vapor' best preserves the metaphorical
    texture of Ecclesiastes and avoids resolving the term into a single abstract concept
    such as moral vanity or philosophical futility. This preserves the book's tension
    and multivalence.
  doctrine_reference: Translation philosophy §§1, 3, 5
