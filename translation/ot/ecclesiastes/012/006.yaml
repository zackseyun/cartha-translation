id: ECC.12.6
reference: Ecclesiastes 12:6
source:
  edition: WLC
  text: עַ֣ד אֲשֶׁ֤ר לֹֽא ירחק חֶ֣בֶל הַ/כֶּ֔סֶף וְ/תָרֻ֖ץ גֻּלַּ֣ת הַ/זָּהָ֑ב וְ/תִשָּׁ֤בֶר
    כַּד֙ עַל הַ/מַּבּ֔וּעַ וְ/נָרֹ֥ץ הַ/גַּלְגַּ֖ל אֶל הַ/בּֽוֹר־־־׃
translation:
  text: before the silver cord is snapped, and the golden bowl is shattered, and the
    jar is broken at the spring, and the wheel is crushed into the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is removed,' 'is severed,' or traditionally 'is loosed'; the Hebrew
      verb here is difficult in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'pitcher' for 'jar.'
    reason: lexical_alternative
  - marker: c
    text: The 'wheel' may refer more specifically to a well-wheel or pulley.
    reason: lexical_alternative
  - marker: d
    text: Or 'well' or 'cistern' instead of 'pit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אֲשֶׁר לֹא
  chosen: before
  alternatives:
  - until not
  - before ... not
  lexicon: HALOT
  rationale: In context with the preceding exhortation ('remember your Creator'),
    the idiom introduces the time before death overtakes a person. English 'before'
    best captures the force naturally.
- source_word: ירחק
  chosen: is snapped
  alternatives:
  - is removed
  - is torn away
  - is severed
  lexicon: HALOT
  rationale: The verb רחק normally means 'be far/distant,' but in this difficult poetic
    context many understand a textual/semantic development reflected in traditional
    renderings like 'be loosed' or 'be snapped' for the cord. 'Snapped' fits the death
    imagery and parallels the following verbs of destruction. The uncertainty is preserved
    in a footnote.
- source_word: חֶבֶל הַכֶּסֶף
  chosen: the silver cord
  alternatives:
  - the cord of silver
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Silver cord' is idiomatic English
    and preserves the metaphorical image.
- source_word: וְתָרֻץ
  chosen: is shattered
  alternatives:
  - is crushed
  - is smashed
  - is broken
  lexicon: HALOT
  rationale: From רצץ, conveying violent breaking/crushing. 'Shattered' gives vivid
    poetic force and matches the fragile object in view.
- source_word: גֻּלַּת הַזָּהָב
  chosen: the golden bowl
  alternatives:
  - the bowl of gold
  - the golden lamp-bowl
  lexicon: HALOT
  rationale: גֻּלָּה can denote a bowl or basin, including a lamp reservoir in some
    contexts. Here 'golden bowl' is the most natural and traditional image without
    over-specifying function.
- source_word: וְתִשָּׁבֶר כַּד
  chosen: the jar is broken
  alternatives:
  - the pitcher is broken
  lexicon: HALOT
  rationale: כַּד is a jar/pitcher used for drawing water. 'Jar' is more accessible
    modern English; the water-drawing context is retained by 'at the spring.'
- source_word: עַל הַמַּבּוּעַ
  chosen: at the spring
  alternatives:
  - by the fountain
  - at the source
  lexicon: HALOT
  rationale: מַבּוּעַ denotes a spring or fountainhead. 'Spring' is clear modern English
    and suits the water imagery.
- source_word: וְנָרֹץ
  chosen: is crushed
  alternatives:
  - is shattered
  - is smashed
  lexicon: HALOT
  rationale: Again from רצץ, here with the wheel as subject. 'Crushed' avoids exact
    repetition while preserving the violent destruction.
- source_word: הַגַּלְגַּל
  chosen: the wheel
  alternatives:
  - the pulley
  - the water wheel
  lexicon: HALOT
  rationale: The noun can mean wheel and in this context may refer specifically to
    the well-wheel/pulley. Main text keeps the broader 'wheel'; the more specific
    possibility is preserved in a footnote.
- source_word: אֶל הַבּוֹר
  chosen: into the pit
  alternatives:
  - into the cistern
  - into the well
  lexicon: HALOT
  rationale: בּוֹר can denote pit, cistern, or well. Given the immediate water-drawing
    imagery, 'well' or 'cistern' is possible, but 'pit' preserves the broader lexical
    sense and the darker death resonance common in Hebrew poetry. The more concrete
    alternative is footnoted.
