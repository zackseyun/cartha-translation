theological_decisions:
- issue: Interpretation of the verse's imagery
  chosen_reading: Retain the sequence of broken household/well objects as poetic metaphors
    for death without explicating body-part allegories in the main text.
  alternative_readings:
  - Specific allegorical references to parts of the aging human body
  rationale: The verse is widely understood as metaphorical for the collapse of life,
    but the exact mapping of each image is debated. To preserve interpretive tension,
    the translation keeps the imagery literal and poetic rather than resolving it
    into a detailed allegory.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
