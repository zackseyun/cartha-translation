theological_decisions:
- issue: Interpretive imagery of cosmic darkening and returning clouds
  chosen_reading: Retain the poetic imagery without explicating it as old age, judgment,
    or emotional decline in the main text.
  alternative_readings:
  - A metaphor for the onset of old age and failing faculties
  - A broader image of life's decline and repeated troubles
  rationale: Ecclesiastes 12 uses vivid imagery that many interpreters connect to
    aging, but the verse itself states the imagery rather than its interpretation.
    To preserve theological and interpretive tension, the translation leaves the metaphor
    intact and does not resolve it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
