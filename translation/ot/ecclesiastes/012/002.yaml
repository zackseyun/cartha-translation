id: ECC.12.2
reference: Ecclesiastes 12:2
source:
  edition: WLC
  text: עַ֠ד אֲשֶׁ֨ר לֹֽא תֶחְשַׁ֤ךְ הַ/שֶּׁ֨מֶשׁ֙ וְ/הָ/א֔וֹר וְ/הַ/יָּרֵ֖חַ וְ/הַ/כּוֹכָבִ֑ים
    וְ/שָׁ֥בוּ הֶ/עָבִ֖ים אַחַ֥ר הַ/גָּֽשֶׁם־׃
translation:
  text: before the sun and the light and the moon and the stars grow dark, and the
    clouds return after the rain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the sun and the daylight and the moon and the stars are darkened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אֲשֶׁר לֹא
  chosen: before
  alternatives:
  - until not
  - while not yet
  lexicon: HALOT
  rationale: In this context introducing a warning about what should be done prior
    to old age and death, the idiom means 'before' rather than a wooden 'until not
    yet.' This is standard English for the Hebrew construction and fits the flow from
    the previous verse.
- source_word: תֶחְשַׁךְ
  chosen: grow dark
  alternatives:
  - be darkened
  - darken
  lexicon: HALOT
  rationale: The verb חשׁך in the Qal denotes becoming dark or growing dim. 'Grow
    dark' is natural English and preserves the intransitive sense better than a more
    passive-sounding 'be darkened.'
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: וְהָאוֹר
  chosen: the light
  alternatives:
  - the daylight
  - the brightness
  lexicon: HALOT
  rationale: אוֹר is broadly 'light.' Here it is listed alongside sun, moon, and stars,
    likely referring to daylight/brightness in general. 'The light' preserves the
    Hebrew's simplicity and poetic parallelism without over-interpreting.
- source_word: וְהַיָּרֵחַ
  chosen: the moon
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: וְהַכּוֹכָבִים
  chosen: the stars
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: וְשָׁבוּ
  chosen: return
  alternatives:
  - come back
  - turn back
  lexicon: HALOT
  rationale: 'שׁוּב commonly means ''return.'' Here the perfect with waw continues
    the poetic description: after rain, clouds return again. ''Return'' is concise
    and idiomatic.'
- source_word: הֶעָבִים
  chosen: the clouds
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: אַחַר הַגָּשֶׁם
  chosen: after the rain
  alternatives:
  - following the rain
  lexicon: HALOT
  rationale: Straightforward prepositional phrase. 'After the rain' preserves the
    image of recurring storminess, fitting the verse's metaphorical atmosphere.
