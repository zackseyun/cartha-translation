theological_decisions:
- issue: Meaning of רוּחַ in relation to human death
  chosen_reading: spirit
  alternative_readings:
  - breath
  rationale: The verse contrasts the body's return to dust with the non-material aspect
    returning to God. Rendering רוּחַ as 'spirit' best preserves that contrast without
    over-defining the anthropology beyond the text. Because Hebrew רוּחַ can also
    denote 'breath,' that alternative is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
