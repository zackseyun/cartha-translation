id: ECC.12.7
reference: Ecclesiastes 12:7
source:
  edition: WLC
  text: וְ/יָשֹׁ֧ב הֶ/עָפָ֛ר עַל הָ/אָ֖רֶץ כְּ/שֶׁ/הָיָ֑ה וְ/הָ/ר֣וּחַ תָּשׁ֔וּב אֶל
    הָ/אֱלֹהִ֖ים אֲשֶׁ֥ר נְתָנָֽ/הּ־־׃
translation:
  text: and the dust returns to the earth as it was, and the spirit returns to God
    who gave it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breath returns to God who gave it.' Hebrew רוּחַ can mean 'spirit,'
      'breath,' or 'wind'; here the context of death favors 'spirit,' though 'breath'
      remains a plausible lexical alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֹׁב
  chosen: and returns
  alternatives:
  - and will return
  - then returns
  lexicon: HALOT
  rationale: Qal imperfect of שוב can express future or modal nuance, but in this
    poetic context it states the inevitable result in a vivid, gnomic way. Present-tense
    English gives natural force while preserving the sequence marked by waw.
- source_word: הֶעָפָר
  chosen: the dust
  alternatives:
  - dust
  lexicon: HALOT
  rationale: Definite noun referring to the material substance of the human body,
    echoing creation/mortality language. 'The dust' preserves the Hebrew article and
    the likely allusion to Gen 3:19.
- source_word: עַל הָאָרֶץ
  chosen: to the earth
  alternatives:
  - upon the earth
  - to the ground
  lexicon: HALOT
  rationale: Although על commonly means 'upon/on,' with שוב it can denote return toward
    a place. 'To the earth' is idiomatic English and fits the sense of bodily return
    to the ground. 'Earth' is preferred over 'ground' because the Hebrew noun is אֶרֶץ,
    not אֲדָמָה, while still retaining the mortality image.
- source_word: כְּשֶׁהָיָה
  chosen: as it was
  alternatives:
  - as it had been
  - as before
  lexicon: HALOT
  rationale: This comparative clause marks restoration to a prior state. 'As it was'
    is the most direct and natural rendering.
- source_word: וְהָרוּחַ
  chosen: and the spirit
  alternatives:
  - and the breath
  - and the wind
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In parallel with the body's return
    to dust and with the following phrase 'to God who gave it,' 'spirit' best captures
    the immaterial life-principle in this context. The lexical overlap with 'breath'
    is worth preserving in a footnote because the term can carry both senses.
- source_word: תָּשׁוּב
  chosen: returns
  alternatives:
  - will return
  lexicon: HALOT
  rationale: Same verb שוב as earlier in the verse, so 'returns' preserves lexical
    consistency and the poetic parallelism between dust and spirit.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  lexicon: HALOT
  rationale: The preposition אֶל indicates movement toward. Although the noun is articular
    in Hebrew, English idiom normally omits the article before 'God' when referring
    to the true God.
- source_word: אֲשֶׁר נְתָנָהּ
  chosen: who gave it
  alternatives:
  - who had given it
  lexicon: HALOT
  rationale: The relative clause identifies God as the giver of the spirit. The suffix
    is feminine singular, agreeing with רוּחַ. Simple past 'gave' is clear and idiomatic.
