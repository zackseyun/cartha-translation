theological_decisions:
- issue: Interpretation of the aging allegory in Ecclesiastes 12
  chosen_reading: Preserve the poetic imagery literally rather than resolving each
    image into a specific bodily referent in the main text.
  alternative_readings:
  - '''doors'' = lips'
  - '''grinding'' = teeth'
  - '''daughters of song'' = vocal faculties or hearing/singing capacity'
  rationale: Ecclesiastes 12 is widely read as an allegory of old age, but the verse's
    individual correspondences are debated. Following the translation philosophy of
    preserving tension rather than resolving ambiguity, the main text keeps the Hebrew
    imagery and leaves more specific interpretive identifications to footnotes.
  doctrine_reference: Translation philosophy §3
