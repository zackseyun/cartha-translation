id: ECC.12.4
reference: Ecclesiastes 12:4
source:
  edition: WLC
  text: וְ/סֻגְּר֤וּ דְלָתַ֨יִם֙ בַּ/שּׁ֔וּק בִּ/שְׁפַ֖ל ק֣וֹל הַֽ/טַּחֲנָ֑ה וְ/יָקוּם֙
    לְ/ק֣וֹל הַ/צִּפּ֔וֹר וְ/יִשַּׁ֖חוּ כָּל בְּנ֥וֹת הַ/שִּֽׁיר־׃
translation:
  text: and the doors on the street are shut when the sound of the grinding is low,
    and one rises at the sound of the bird, and all the daughters of song are brought
    low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the double doors'; many interpreters understand 'the doors' here metaphorically
      as the lips or mouth in the poem's depiction of old age.
    reason: alternative_reading
  - marker: b
    text: Or 'when the sound of the mill grows faint'; many take this as an image
      for diminished chewing because the preceding and following lines are often read
      as bodily metaphors.
    reason: lexical_alternative
  - marker: c
    text: Literally 'all the daughters of song.' This may refer to singing women,
      the faculties of singing, or the sounds associated with song.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסֻגְּרוּ
  chosen: are shut
  alternatives:
  - are closed
  lexicon: HALOT
  rationale: 'Passive perfect/prophetic-style description from סגר, best rendered
    as a passive state/result: ''are shut.'' ''Closed'' is possible, but ''shut''
    is slightly more vivid and idiomatic here.'
- source_word: דְלָתַיִם
  chosen: the doors
  alternatives:
  - the double doors
  - the doors of the lips
  lexicon: HALOT
  rationale: The lexical sense is literally 'doors' or 'double doors.' In this poetic
    context, many interpreters take it metaphorically (e.g., lips), but the Hebrew
    text itself does not specify the metaphor, so the main text preserves the literal
    image.
- source_word: בַּשּׁוּק
  chosen: on the street
  alternatives:
  - toward the street
  - in the market
  lexicon: HALOT
  rationale: שׁוּק commonly denotes a street or marketplace. 'On the street' fits
    the image naturally in English while preserving the public/outside setting. 'Market'
    is possible but too specific here.
- source_word: בִּשְׁפַל קוֹל הַטַּחֲנָה
  chosen: when the sound of the grinding is low
  alternatives:
  - at the lowering of the sound of the mill
  - when the sound of the mill grows faint
  lexicon: HALOT
  rationale: שְׁפַל conveys lowness or diminution; טַחֲנָה here refers to grinding/milling.
    The phrase likely describes the weakening or quieting of grinding sound. 'Grinding'
    is more transparent than 'mill' in English while preserving the activity.
- source_word: וְיָקוּם
  chosen: one rises
  alternatives:
  - he rises
  - he gets up
  lexicon: HALOT
  rationale: The verb is 3ms singular. Because the surrounding poetry uses generalized
    imagery rather than naming a specific subject, 'one rises' preserves the indefinite/generic
    force better than 'he rises,' while avoiding over-interpretation.
- source_word: לְקוֹל הַצִּפּוֹר
  chosen: at the sound of the bird
  alternatives:
  - at the sound of a bird
  - at the sound of birdsong
  lexicon: HALOT
  rationale: 'The Hebrew is singular with article: literally ''to/at the sound of
    the bird.'' The phrase likely evokes waking at a slight sound. ''The bird'' keeps
    the formal singular image; ''birdsong'' is interpretive.'
- source_word: וְיִשַּׁחוּ
  chosen: are brought low
  alternatives:
  - are bowed down
  - grow faint
  lexicon: HALOT
  rationale: From שׁחח/שׁוח, the core idea is being bowed down or made low. 'Are brought
    low' works well for the passive-like sense in context and can cover either literal
    lowering or figurative weakening.
- source_word: כָּל בְּנוֹת הַשִּׁיר
  chosen: all the daughters of song
  alternatives:
  - all the daughters of singing
  - all the songstresses
  - all the sounds of song
  lexicon: HALOT
  rationale: Literally 'all the daughters of song,' a poetic expression. Many understand
    it as the organs/faculties of singing or as singing women/sounds associated with
    song. The main text preserves the Hebrew metaphor rather than collapsing it into
    one interpretation.
