theological_decisions:
- issue: Whether to interpret the verse's body-house allegory explicitly in the main
    text
  chosen_reading: Preserve the poetic household imagery without decoding it into body
    parts
  alternative_readings:
  - Interpret 'keepers of the house' as arms/hands, 'men of strength' as legs, 'grinders'
    as teeth, and 'those looking through the windows' as eyes
  rationale: The Hebrew presents an extended metaphor of decline, likely aging, but
    does not itself identify each image. Following optimal equivalence and the principle
    of not importing claims the text does not make explicitly, the translation keeps
    the imagery in the main text and leaves interpretive decoding to footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of אַנְשֵׁי הֶחָיִל
  chosen_reading: the men of strength
  alternative_readings:
  - the strong ones
  - the strong men
  rationale: The source uses a masculine human term, and the doctrine calls for gender-accurate
    rather than gender-neutral rendering where the source is gendered. Here the phrase
    functions poetically within the metaphor, so 'men of strength' preserves both
    form and force.
  doctrine_reference: Translation philosophy §4
