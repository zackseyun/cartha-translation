id: ECC.12.3
reference: Ecclesiastes 12:3
source:
  edition: WLC
  text: בַּ/יּ֗וֹם שֶׁ/יָּזֻ֨עוּ֙ שֹׁמְרֵ֣י הַ/בַּ֔יִת וְ/הִֽתְעַוְּת֖וּ אַנְשֵׁ֣י
    הֶ/חָ֑יִל וּ/בָטְל֤וּ הַ/טֹּֽחֲנוֹת֙ כִּ֣י מִעֵ֔טוּ וְ/חָשְׁכ֥וּ הָ/רֹא֖וֹת בָּ/אֲרֻבּֽוֹת׃
translation:
  text: on the day when the keepers of the house tremble, and the men of strength
    are bent, and the grinders cease because they are few, and those looking through
    the windows grow dark,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The imagery likely depicts the decline of old age: the ''keepers of the
      house'' may refer to the arms or hands, the ''men of strength'' to the legs,
      the ''grinders'' to the teeth, and those looking through the windows to the
      eyes.'
    reason: alternative_reading
  - marker: b
    text: Or 'through the lattices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: HALOT
  rationale: Retains the temporal frame formally while allowing the following clause
    to unfold as a vivid description.
- source_word: יָזֻעוּ
  chosen: tremble
  alternatives:
  - shake
  - quake
  lexicon: HALOT
  rationale: Conveys physical shaking in a natural English idiom; fits the aging imagery
    of the poem.
- source_word: שֹׁמְרֵי הַבַּיִת
  chosen: the keepers of the house
  alternatives:
  - the guards of the house
  - those who keep the house
  lexicon: HALOT
  rationale: A close rendering of the Hebrew expression. The phrase is likely metaphorical
    in context, but the translation preserves the image rather than interpreting it
    as specific body parts in the main text.
- source_word: הִתְעַוְּתוּ
  chosen: are bent
  alternatives:
  - are twisted
  - are stooped
  lexicon: HALOT
  rationale: Expresses the resulting bodily distortion in idiomatic English. 'Bent'
    is vivid and readable, while leaving the metaphor open.
- source_word: אַנְשֵׁי הֶחָיִל
  chosen: the men of strength
  alternatives:
  - the strong men
  - the mighty men
  lexicon: HALOT
  rationale: Preserves the Hebrew construction and its emphasis on strength. 'Men
    of strength' is slightly more formal but keeps the poetic force and gendered wording
    of the source.
- source_word: בָטְלוּ
  chosen: cease
  alternatives:
  - stop working
  - be idle
  lexicon: HALOT
  rationale: Captures the sense of coming to an end or becoming inactive without overexplaining
    the metaphor.
- source_word: הַטֹּחֲנוֹת
  chosen: the grinders
  alternatives:
  - the grinding women
  - those who grind
  lexicon: HALOT
  rationale: A literal rendering that preserves the feminine plural participial/noun
    form as an image. In context it may metaphorically refer to teeth, but that interpretation
    is not imported into the main text.
- source_word: כִּי מִעֵטוּ
  chosen: because they are few
  alternatives:
  - because they have become few
  - for they are diminished
  lexicon: HALOT
  rationale: Represents the causal clause naturally in English and fits the likely
    image of diminishing number.
- source_word: חָשְׁכוּ
  chosen: grow dark
  alternatives:
  - are darkened
  - become dim
  lexicon: HALOT
  rationale: Keeps the intransitive/resultative sense and suits the poetic imagery
    of failing sight.
- source_word: הָרֹאוֹת
  chosen: those looking
  alternatives:
  - the ones seeing
  - the watchers
  lexicon: HALOT
  rationale: Maintains the participial force without prematurely identifying the referent
    as eyes, though that is likely the metaphorical sense.
- source_word: בָּאֲרֻבּוֹת
  chosen: through the windows
  alternatives:
  - at the windows
  - through the lattices
  lexicon: HALOT
  rationale: '''Windows'' is the most straightforward rendering; ''through'' fits
    the act of looking out from within. ''Lattices'' is possible but less accessible
    in modern English.'
