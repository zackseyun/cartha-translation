theological_decisions:
- issue: Identity/rendering of קֹהֶלֶת
  chosen_reading: Qoheleth as a transliterated designation
  alternative_readings:
  - the Teacher
  - the Preacher
  rationale: This is not a doctrinally contested term, but it is interpretively significant.
    Transliteration avoids importing a specific functional interpretation into the
    text and keeps the Hebrew literary persona visible.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
