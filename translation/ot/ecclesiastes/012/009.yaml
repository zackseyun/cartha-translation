id: ECC.12.9
reference: Ecclesiastes 12:9
source:
  edition: WLC
  text: וְ/יֹתֵ֕ר שֶׁ/הָיָ֥ה קֹהֶ֖לֶת חָכָ֑ם ע֗וֹד לִמַּד דַּ֨עַת֙ אֶת הָ/עָ֔ם וְ/אִזֵּ֣ן
    וְ/חִקֵּ֔ר תִּקֵּ֖ן מְשָׁלִ֥ים הַרְבֵּֽה־־׃
translation:
  text: And beyond that, because Qoheleth was wise, he still taught the people knowledge;
    he also weighed, searched out, and arranged many proverbs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And moreover, because the Teacher was wise, he also taught the people
      knowledge; he pondered, searched out, and set in order many proverbs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹתֵר
  chosen: And beyond that
  alternatives:
  - And moreover
  - Besides
  lexicon: HALOT
  rationale: Introduces an additional commendation or concluding observation. 'And
    beyond that' preserves the connective force and the sense of adding something
    further, while sounding natural in modern English.
- source_word: שֶׁהָיָה
  chosen: because ... was
  alternatives:
  - that ... was
  - inasmuch as ... was
  lexicon: HALOT
  rationale: 'The particle שֶׁ can mark relation flexibly; here it plausibly gives
    the ground for the following statement. Rendering it as ''because'' yields a coherent
    sense: the Teacher''s wisdom explains his instruction and literary activity.'
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  lexicon: HALOT
  rationale: Following the philosophy 'translate titles; transliterate names,' this
    term in Ecclesiastes functions as a distinctive personal designation/name-like
    title. 'Qoheleth' preserves the Hebrew form without importing the interpretive
    narrowing of 'Preacher' or the smoothing of 'Teacher.'
- source_word: חָכָם
  chosen: wise
  alternatives:
  - a wise man
  lexicon: HALOT
  rationale: Simple predicate adjective matching the Hebrew and natural English syntax.
- source_word: עוֹד
  chosen: still
  alternatives:
  - also
  - further
  lexicon: HALOT
  rationale: 'Conveys continuation/additional action: beyond being wise, he continued
    to teach. ''Still'' captures the adverbial nuance well in context.'
- source_word: לִמַּד דַּעַת אֶת־הָעָם
  chosen: taught the people knowledge
  alternatives:
  - taught the people wisdom
  - taught knowledge to the people
  - instructed the people in knowledge
  lexicon: HALOT
  rationale: למד with דעת is most directly 'teach knowledge.' Retaining 'knowledge'
    rather than shifting to 'wisdom' respects the lexical distinction in the verse,
    since חכם already supplies 'wise.'
- source_word: וְאִזֵּן
  chosen: weighed
  alternatives:
  - pondered
  - gave careful thought
  lexicon: HALOT
  rationale: The verb likely carries the sense of weighing/evaluating. 'Weighed' preserves
    the metaphor and pairs well with the following verbs as part of a sequence of
    literary labor.
- source_word: וְחִקֵּר
  chosen: searched out
  alternatives:
  - investigated
  - explored
  lexicon: HALOT
  rationale: Expresses careful inquiry. 'Searched out' is idiomatic and preserves
    the active investigative sense.
- source_word: תִּקֵּן
  chosen: arranged
  alternatives:
  - set in order
  - composed
  lexicon: HALOT
  rationale: The verb can mean to make straight/order/arrange. In context of proverbs,
    'arranged' best captures editorial ordering without overcommitting to authorship
    alone.
- source_word: מְשָׁלִים הַרְבֵּה
  chosen: many proverbs
  alternatives:
  - a great many proverbs
  lexicon: HALOT
  rationale: Straightforward rendering of quantity plus object; concise and natural.
