id: ECC.5.16
reference: Ecclesiastes 5:16
source:
  edition: WLC
  text: גַּ֥ם כָּל יָמָ֖י/ו בַּ/חֹ֣שֶׁךְ יֹאכֵ֑ל וְ/כָעַ֥ס הַרְבֵּ֖ה וְ/חָלְי֥/וֹ
    וָ/קָֽצֶף־׃
translation:
  text: Also, all his days he eats in darkness, with much vexation and sickness and
    anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and much grief'; the Hebrew phrase is compressed and may denote vexation,
      frustration, or grief.
    reason: lexical_alternative
  - marker: b
    text: '''In darkness'' may be read literally or as a figure for a bleak, joyless
      life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Introduces an additional aspect of the miserable condition just described.
    'Also' is natural modern English and preserves the additive force.
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - all his life
  - throughout his days
  lexicon: HALOT
  rationale: A fairly literal rendering of the idiom. 'All his life' is possible,
    but 'all his days' preserves the Hebrew expression and fits Ecclesiastes' style.
- source_word: בַּחֹשֶׁךְ
  chosen: in darkness
  alternatives:
  - in the darkness
  - in gloom
  lexicon: HALOT
  rationale: The phrase is likely metaphorical for a joyless, obscured existence,
    but the Hebrew uses the concrete noun 'darkness.' 'In darkness' preserves the
    image without over-interpreting it.
- source_word: יֹאכֵל
  chosen: he eats
  alternatives:
  - he will eat
  - he consumes
  lexicon: HALOT
  rationale: 'The imperfect here expresses customary or characteristic action in context.
    Present-tense English communicates the gnomic sense well: this is how he lives.'
- source_word: וְכָעַס הַרְבֵּה
  chosen: with much vexation
  alternatives:
  - and much grief
  - and much frustration
  - and he is greatly vexed
  lexicon: HALOT
  rationale: The construction is compressed and difficult, but the sense is that his
    life is marked by considerable inner agitation or provocation. 'Vexation' fits
    Qoheleth's tone and pairs well with the following nouns. The preposition 'with'
    is supplied idiomatically to smooth the verbless/elliptical sequence in English.
- source_word: חָלְיוֹ
  chosen: sickness
  alternatives:
  - illness
  - affliction
  lexicon: HALOT
  rationale: The noun denotes sickness or malady. 'Sickness' is straightforward and
    preserves the concrete force better than the broader 'affliction.'
- source_word: וָקָצֶף
  chosen: and anger
  alternatives:
  - and wrath
  - and resentment
  lexicon: HALOT
  rationale: The noun can denote anger or wrath. Here it most naturally describes
    the man's embittered state rather than divine wrath, so 'anger' is the clearest
    choice.
