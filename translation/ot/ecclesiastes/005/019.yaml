theological_decisions:
- issue: Sense of divine action in מַעֲנֶה
  chosen_reading: God positively keeps the person occupied with joy
  alternative_readings:
  - God answers him with the joy of his heart
  - God afflicts/humbles him with joy
  rationale: In context (Eccl 5:18–20), the verse describes God's gift enabling enjoyment
    of life. A positive sense coheres with the immediate context of eating, drinking,
    and rejoicing as divine gifts. The more literal 'answers' is possible etymologically,
    but less natural in context and less likely to convey the intended sense in English.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; ambiguity preserved in footnote.
