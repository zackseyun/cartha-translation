id: ECC.5.11
reference: Ecclesiastes 5:11
source:
  edition: WLC
  text: מְתוּקָה֙ שְׁנַ֣ת הָ/עֹבֵ֔ד אִם מְעַ֥ט וְ/אִם הַרְבֵּ֖ה יֹאכֵ֑ל וְ/הַ/שָּׂבָע֙
    לֶֽ/עָשִׁ֔יר אֵינֶ֛/נּוּ מַנִּ֥יחַֽ ל֖/וֹ לִ/ישֽׁוֹן־־׃
translation:
  text: Sweet is the sleep of the worker, whether he eats little or much, but the
    abundance of the rich man does not let him sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fullness' or 'the satiety of the rich man does not let him sleep.'
      The Hebrew term can denote fullness or satisfaction, but here likely refers
      to the rich man's abundance or overfull state.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתוּקָה
  chosen: sweet
  alternatives:
  - pleasant
  lexicon: HALOT
  rationale: The adjective literally denotes sweetness, here used metaphorically of
    sleep being pleasant. 'Sweet' preserves the concrete Hebrew image better than
    the flatter 'pleasant.'
- source_word: שְׁנַת
  chosen: the sleep of
  alternatives:
  - the sleep
  lexicon: HALOT
  rationale: 'Construct form with הָעֹבֵד, so the phrase is rendered possessively:
    ''the sleep of the worker.'''
- source_word: הָעֹבֵד
  chosen: the worker
  alternatives:
  - the laborer
  - the servant
  lexicon: HALOT
  rationale: From עבד in the participial sense of one who works. 'Worker' is natural
    modern English and fits the contrast with the rich man. 'Laborer' is possible
    but slightly narrower and more socioeconomic in tone.
- source_word: אִם מְעַט וְאִם הַרְבֵּה יֹאכֵל
  chosen: whether he eats little or much
  alternatives:
  - if he eats little or if much
  - whether he eats little or whether much
  lexicon: HALOT
  rationale: This conditional-correlative construction expresses either/or quantity.
    Rendering with 'whether' gives idiomatic English while preserving the sense that
    the worker's sleep is sweet regardless of how much he has eaten.
- source_word: הַרְבֵּה
  chosen: much
  alternatives:
  - a lot
  - abundantly
  lexicon: HALOT
  rationale: In this context it modifies the amount eaten. 'Much' is concise and appropriately
    formal.
- source_word: וְהַשָּׂבָע
  chosen: the abundance
  alternatives:
  - the fullness
  - the plenty
  - the satiety
  lexicon: HALOT
  rationale: The noun can denote fullness/satiety, but in context it refers to the
    rich person's state of plenty or abundance that keeps him from rest. 'Abundance'
    best captures the likely sense in the proverb-like contrast.
- source_word: לֶעָשִׁיר
  chosen: of the rich man
  alternatives:
  - of the rich
  - for the rich man
  lexicon: HALOT
  rationale: 'The lamed here is rendered as a possessive relation in English: the
    abundance belonging to the rich man. ''Rich man'' preserves the masculine singular
    form and the individualized contrast with ''the worker,'' in line with the project''s
    gender-accurate policy.'
- source_word: אֵינֶנּוּ מַנִּיחַ לוֹ לִישׁוֹן
  chosen: does not let him sleep
  alternatives:
  - does not permit him to sleep
  - does not allow him to sleep
  lexicon: HALOT
  rationale: The causative of נוח/ניח with infinitive expresses preventing or not
    allowing. 'Does not let him sleep' is idiomatic, clear, and faithful to the syntax.
