theological_decisions:
- issue: Identity of הַמַּלְאָךְ in the vow context
  chosen_reading: the messenger
  alternative_readings:
  - the angel
  rationale: The verse warns against excusing a vow after speaking rashly. In Ecclesiastes'
    temple/vow setting, a human messenger who handles vow matters is contextually
    plausible, and the Hebrew lexeme itself does not require a heavenly being. To
    preserve interpretive tension rather than overresolve it, the main text uses 'messenger'
    and the alternative 'angel' is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
