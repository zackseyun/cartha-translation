id: ECC.5.5
reference: Ecclesiastes 5:5
source:
  edition: WLC
  text: אַל תִּתֵּ֤ן אֶת פִּ֨י/ךָ֙ לַ/חֲטִ֣יא אֶת בְּשָׂרֶ֔/ךָ וְ/אַל תֹּאמַר֙ לִ/פְנֵ֣י
    הַ/מַּלְאָ֔ךְ כִּ֥י שְׁגָגָ֖ה הִ֑יא לָ֣/מָּה יִקְצֹ֤ף הָֽ/אֱלֹהִים֙ עַל קוֹלֶ֔/ךָ
    וְ/חִבֵּ֖ל אֶת מַעֲשֵׂ֥ה יָדֶֽי/ךָ־־־־־־׃
translation:
  text: Do not let your mouth cause your flesh to sin, and do not say before the messenger,
    “It was a mistake.” Why should God be angry at your voice and destroy the work
    of your hands?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the angel.” The Hebrew מַלְאָךְ can refer to either a human messenger
      or a heavenly messenger.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתֵּן אֶת־פִּיךָ
  chosen: let your mouth
  alternatives:
  - give your mouth
  - allow your mouth
  lexicon: HALOT
  rationale: The idiom 'give your mouth' is unnatural in English. 'Let your mouth'
    preserves the causative sense in readable modern English.
- source_word: לַחֲטִיא
  chosen: cause ... to sin
  alternatives:
  - make ... sin
  - bring into guilt
  lexicon: HALOT
  rationale: Hiphil of חטא is causative. 'Cause to sin' best preserves the verbal
    force without overinterpreting the exact mechanism.
- source_word: בְּשָׂרֶךָ
  chosen: your flesh
  alternatives:
  - your body
  - yourself
  lexicon: HALOT
  rationale: The Hebrew is literally 'your flesh.' In Ecclesiastes this can refer
    concretely to one's embodied self. 'Your flesh' preserves the source wording and
    the moral-physical resonance better than the flatter 'yourself.'
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the angel
  - the priestly messenger
  lexicon: HALOT
  rationale: מלאך can mean either human 'messenger' or heavenly 'angel.' In this context
    of vows and temple oversight, many understand a human messenger associated with
    cultic administration. Because the Hebrew term itself is broader and the immediate
    context does not force a supernatural being, 'messenger' is preferred in the main
    text, with 'angel' preserved in a footnote.
- source_word: שְׁגָגָה
  chosen: a mistake
  alternatives:
  - an error
  - an inadvertence
  - an unintentional sin
  lexicon: HALOT
  rationale: The noun denotes an error or inadvertent wrong. 'A mistake' is natural
    English and fits the speaker's attempted excuse after a rash vow.
- source_word: קוֹלֶךָ
  chosen: your voice
  alternatives:
  - your words
  - what you said
  lexicon: HALOT
  rationale: The Hebrew is literally 'your voice.' Here it refers to the spoken vow
    or excuse. Retaining 'voice' preserves the concrete expression while remaining
    intelligible.
- source_word: וְחִבֵּל
  chosen: destroy
  alternatives:
  - ruin
  - spoil
  lexicon: HALOT
  rationale: The verb conveys damaging or ruining. 'Destroy' communicates the severity
    of divine judgment on one's labor in this wisdom context.
- source_word: מַעֲשֵׂה יָדֶיךָ
  chosen: the work of your hands
  alternatives:
  - what your hands have made
  - your handiwork
  - your labor
  lexicon: HALOT
  rationale: This is a common Hebrew expression for one's labor and its products.
    The traditional literal rendering is clear in modern English and preserves the
    idiom's texture.
