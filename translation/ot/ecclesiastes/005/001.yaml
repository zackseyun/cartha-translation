id: ECC.5.1
reference: Ecclesiastes 5:1
source:
  edition: WLC
  text: אַל תְּבַהֵ֨ל עַל פִּ֜י/ךָ וְ/לִבְּ/ךָ֧ אַל יְמַהֵ֛ר לְ/הוֹצִ֥יא דָבָ֖ר לִ/פְנֵ֣י
    הָ/אֱלֹהִ֑ים כִּ֣י הָ/אֱלֹהִ֤ים בַּ/שָּׁמַ֨יִם֙ וְ/אַתָּ֣ה עַל הָ/אָ֔רֶץ עַֽל
    כֵּ֛ן יִהְי֥וּ דְבָרֶ֖י/ךָ מְעַטִּֽים־־־־־׃
translation:
  text: Do not be hasty with your mouth, and do not let your heart be quick to bring
    forth a word before God, for God is in heaven and you are on earth. Therefore
    let your words be few.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to utter a word'; in context this may include rash vows, but the Hebrew
      here speaks more broadly of bringing forth speech before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַהֵל
  chosen: be hasty
  alternatives:
  - be rash
  - be hurried
  lexicon: HALOT
  rationale: The verb בהל in the piel/jussive context conveys acting hastily or rashly.
    'Be hasty' is natural English and preserves the warning against impulsive speech
    without overinterpreting emotional agitation.
- source_word: עַל פִּיךָ
  chosen: with your mouth
  alternatives:
  - with your speech
  - by your mouth
  lexicon: HALOT
  rationale: Literally 'upon your mouth,' but idiomatically this concerns speech.
    'With your mouth' keeps the bodily imagery while reading naturally in English.
- source_word: לִבְּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: Hebrew 'heart' includes the inner thought/will, not merely emotion. The
    literal rendering should be preserved because it is standard biblical anthropology
    and remains understandable in English.
- source_word: יְמַהֵר
  chosen: be quick
  alternatives:
  - hurry
  - be swift
  lexicon: HALOT
  rationale: The verb מהר means to hasten. 'Be quick' fits the parallel with 'be hasty'
    while avoiding awkward repetition and preserving the sense of undue readiness.
- source_word: לְהוֹצִיא דָבָר
  chosen: to bring forth a word
  alternatives:
  - to utter a word
  - to speak a word
  lexicon: HALOT
  rationale: Literally 'to bring out a word.' 'Bring forth a word' preserves the concrete
    Hebrew expression better than the more interpretive 'make a promise,' which some
    translations import from context but which is not explicit in this verse.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'Before God'
    is concise and idiomatic while preserving the solemn setting of speech addressed
    in God's presence.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God, not 'gods' or a generic
    divine being. The definite article in Hebrew does not require 'the God' in English.
- source_word: בַּשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: HALOT
  rationale: Though morphologically plural, שׁמים often functions idiomatically as
    a singular locale in English. 'In heaven' is the most natural equivalent here
    and preserves the heaven/earth contrast.
- source_word: עַל הָאָרֶץ
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: HALOT
  rationale: A direct and idiomatic rendering that preserves the spatial contrast
    with God's heavenly position.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: This inferential phrase draws the practical conclusion from the heaven/earth
    contrast. 'Therefore' is concise and suitably formal.
- source_word: יִהְיוּ דְבָרֶיךָ מְעַטִּים
  chosen: let your words be few
  alternatives:
  - may your words be few
  - keep your words few
  lexicon: HALOT
  rationale: The jussive sense is well conveyed by 'let your words be few.' This preserves
    both the imperative force and the emphasis on restraint in speech.
