id: ECC.5.10
reference: Ecclesiastes 5:10
source:
  edition: WLC
  text: בִּ/רְבוֹת֙ הַ/טּוֹבָ֔ה רַבּ֖וּ אוֹכְלֶ֑י/הָ וּ/מַה כִּשְׁרוֹן֙ לִ/בְעָלֶ֔י/הָ
    כִּ֖י אִם ראית עֵינָֽי/ו־־׃
translation:
  text: When goods increase, those who consume them increase; and what advantage is
    there to their owners except the seeing of their eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good things,' 'prosperity,' or 'wealth' for 'goods.' The Hebrew term
      can denote material good or prosperity more broadly; the immediate context favors
      possessions that can be consumed and owned.
    reason: lexical_alternative
  - marker: b
    text: Literally 'except the seeing of his eyes.' The Hebrew idiom suggests that
      the owner’s only benefit may be merely looking at what he has.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְבוֹת
  chosen: When ... increase
  alternatives:
  - As ... increase
  - In the increasing of
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct of רבה functions temporally
    here: ''when/in the multiplying of.'' English ''When ... increase'' is natural
    and preserves the temporal sense.'
- source_word: הַטּוֹבָה
  chosen: goods
  alternatives:
  - good things
  - prosperity
  - wealth
  lexicon: HALOT
  rationale: טוֹבָה literally denotes 'good(thing), benefit, prosperity.' In this
    economic context, paired with consumers and owners, 'goods' best captures material
    possessions without overinterpreting as abstract prosperity.
- source_word: רַבּוּ
  chosen: increase
  alternatives:
  - become many
  - multiply
  lexicon: HALOT
  rationale: 'A second use of רבה creates a wordplay/parallellism: as the goods multiply,
    the eaters multiply. ''Increase'' keeps the parallel concise in English.'
- source_word: אֹכְלֶיהָ
  chosen: those who consume them
  alternatives:
  - those who eat them
  - its eaters
  - those who devour them
  lexicon: HALOT
  rationale: The participle from אכל is literally 'eaters of it.' In context of possessions/wealth
    rather than literal food, 'those who consume them' idiomatically conveys dependents
    or users who use up the goods.
- source_word: וּמַה כִּשְׁרוֹן
  chosen: and what advantage is there
  alternatives:
  - and what profit is there
  - and what gain is there
  lexicon: HALOT
  rationale: כִּשְׁרוֹן denotes advantage, success, profit. Ecclesiastes often uses
    profit/gain language; here 'advantage' is slightly broader and fits the rhetorical
    question naturally.
- source_word: לִבְעָלֶיהָ
  chosen: to their owners
  alternatives:
  - for its possessors
  - to its masters
  lexicon: HALOT
  rationale: בעל in this nominal form means owner/possessor. Because הַטּוֹבָה is
    a collective singular rendered as plural 'goods,' the suffix is represented in
    English as plural 'their owners' for agreement and readability.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - unless
  - but only
  lexicon: HALOT
  rationale: 'In this idiom after a rhetorical question, כִּי אִם introduces the sole
    exception: ''except / but only.'' ''Except'' is the clearest concise rendering.'
- source_word: רְאִית
  chosen: the seeing
  alternatives:
  - seeing
  - a mere sight
  - beholding
  lexicon: HALOT
  rationale: The noun from ראה means sight/seeing. Rendering it as 'the seeing' preserves
    the nominal force and the slightly awkward, proverbial style of the Hebrew.
- source_word: עֵינָיו
  chosen: of their eyes
  alternatives:
  - with their eyes
  - by their eyes
  lexicon: HALOT
  rationale: Literally 'his eyes,' but in context referring back to owners of the
    goods. English pluralization smooths the collective sense. 'Seeing of their eyes'
    preserves the Hebrew idiom rather than flattening it to 'looking at it.'
