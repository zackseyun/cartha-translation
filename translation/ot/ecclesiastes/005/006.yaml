theological_decisions:
- issue: Rendering of ירא in wisdom context
  chosen_reading: fear God
  alternative_readings:
  - revere God
  - stand in awe of God
  rationale: The wisdom tradition regularly uses 'fear' as a compact theological term
    for reverent submission before God. Retaining 'fear' preserves that canonical
    resonance without reducing it to mere emotion or respect.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
