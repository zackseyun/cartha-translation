theological_decisions:
- issue: Generic masculine singular in wisdom literature
  chosen_reading: a man labors
  alternative_readings:
  - he labors
  - one labors
  - a person labors
  rationale: The Hebrew uses masculine singular forms with representative force. Per
    the translation philosophy, a gender-accurate rendering is preferred over a gender-neutral
    smoothing. 'A man' preserves the source form while still functioning generically
    in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatic expression וְלִרְאוֹת טוֹבָה
  chosen_reading: to see good
  alternative_readings:
  - to enjoy good
  - to experience good
  rationale: The phrase is idiomatic, but the literal rendering remains intelligible
    and preserves Ecclesiastes' repeated wording and thematic texture. The more interpretive
    alternatives are preserved in a footnote rather than replacing the source-shaped
    expression.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
