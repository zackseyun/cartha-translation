id: ECC.5.14
reference: Ecclesiastes 5:14
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר יָצָא֙ מִ/בֶּ֣טֶן אִמּ֔/וֹ עָר֛וֹם יָשׁ֥וּב לָ/לֶ֖כֶת כְּ/שֶׁ/בָּ֑א
    וּ/מְא֨וּמָה֙ לֹא יִשָּׂ֣א בַ/עֲמָל֔/וֹ שֶׁ/יֹּלֵ֖ךְ בְּ/יָדֽ/וֹ־׃
translation:
  text: As he came from his mother’s womb, naked he will return, going as he came;
    and he will carry away nothing from his labor that he may take in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will carry away nothing from his toil that he can carry in his
      hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - As when
  lexicon: HALOT
  rationale: Introduces a comparison with the manner of one's birth and departure.
    'As' is concise and natural in English while preserving the comparative force.
- source_word: יָצָא
  chosen: he came
  alternatives:
  - he went out
  - he came out
  lexicon: HALOT
  rationale: In context of birth from the womb, English idiom prefers 'came'/'came
    out' rather than the more wooden 'went out.' 'He came' works smoothly with the
    following phrase 'from his mother’s womb.'
- source_word: מִבֶּטֶן אִמּוֹ
  chosen: from his mother’s womb
  alternatives:
  - out of his mother’s womb
  lexicon: HALOT
  rationale: A direct and idiomatic rendering of the birth imagery; preserves the
    concrete maternal reference.
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - bare
  lexicon: HALOT
  rationale: The adjective denotes literal nakedness here, emphasizing human destitution
    at birth and death.
- source_word: יָשׁוּב
  chosen: he will return
  alternatives:
  - he returns
  - he will go back
  lexicon: HALOT
  rationale: Future sense fits the proverbial statement about death; 'return' preserves
    the lexical link to going back from life as one entered it.
- source_word: לָלֶכֶת
  chosen: going
  alternatives:
  - to go
  - as he goes
  lexicon: HALOT
  rationale: Used adverbially with 'he will return' to express manner/result. 'Going'
    gives natural English without over-paraphrasing.
- source_word: כְּשֶׁבָּא
  chosen: as he came
  alternatives:
  - just as he came
  - as when he came
  lexicon: HALOT
  rationale: 'Completes the comparison: his departure matches his arrival. ''As he
    came'' is concise and preserves the parallelism.'
- source_word: וּמְאוּמָה לֹא
  chosen: and ... nothing
  alternatives:
  - and not anything
  - and ... not the slightest thing
  lexicon: HALOT
  rationale: מְאוּמָה intensifies total negation. 'Nothing' is the most natural English
    equivalent.
- source_word: יִשָּׂא
  chosen: he will carry away
  alternatives:
  - he will carry
  - he will take up
  lexicon: HALOT
  rationale: In context of departing life, 'carry away' makes explicit the sense of
    taking something with oneself, which the following clause confirms.
- source_word: בַעֲמָלוֹ
  chosen: from his labor
  alternatives:
  - from his toil
  - from what he has worked for
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes often denotes labor/toil with an undertone of burdensome
    effort. 'Labor' preserves the lexical connection across the book while remaining
    readable.
- source_word: שֶׁיֹּלֵךְ בְּיָדוֹ
  chosen: that he may take in his hand
  alternatives:
  - for him to take in his hand
  - which can go in his hand
  - that he can carry in his hand
  lexicon: HALOT
  rationale: 'The clause explains the preceding ''nothing'': there is nothing from
    his labor that he can take with him. ''Take in his hand'' preserves the concrete
    Hebrew image better than a more abstract paraphrase.'
