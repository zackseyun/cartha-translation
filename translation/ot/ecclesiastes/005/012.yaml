id: ECC.5.12
reference: Ecclesiastes 5:12
source:
  edition: WLC
  text: יֵ֚שׁ רָעָ֣ה חוֹלָ֔ה רָאִ֖יתִי תַּ֣חַת הַ/שָּׁ֑מֶשׁ עֹ֛שֶׁר שָׁמ֥וּר לִ/בְעָלָ֖י/ו
    לְ/רָעָתֽ/וֹ׃
translation:
  text: 'There is a grievous evil that I have seen under the sun: wealth kept by its
    owner to his harm.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for its owner, to his hurt.' The Hebrew prepositions can be represented
      slightly differently in English without changing the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle introducing the observation; 'There is' is natural
    modern English and preserves the Hebrew construction.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - misfortune
  - bad thing
  lexicon: HALOT
  rationale: In Ecclesiastes this noun often denotes something grievously wrong or
    harmful in human experience. 'Evil' preserves the moral/experiential weight better
    than the flatter 'bad thing.'
- source_word: חוֹלָה
  chosen: grievous
  alternatives:
  - sick
  - serious
  - painful
  lexicon: HALOT
  rationale: Literally related to sickness, but idiomatically intensifies רָעָה as
    something severe or distressing. 'Grievous' captures the metaphorical force in
    idiomatic English without woodenly saying 'sick evil.'
- source_word: רָאִיתִי
  chosen: that I have seen
  alternatives:
  - which I saw
  lexicon: HALOT
  rationale: The perfect verb reports the speaker's observed experience. 'That I have
    seen' reads naturally in English and preserves the personal eyewitness emphasis.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a recurring Ecclesiastes formula and should be kept consistent.
    'Under the sun' is the standard idiomatic rendering.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: '''Wealth'' is natural modern English and fits the abstract noun better
    than the slightly archaic ''riches.'''
- source_word: שָׁמוּר
  chosen: kept
  alternatives:
  - guarded
  - stored up
  - preserved
  lexicon: HALOT
  rationale: Passive participle describing wealth being retained or hoarded. 'Kept'
    is concise and idiomatic; context implies protective retention without over-specifying
    motive.
- source_word: לִבְעָלָיו
  chosen: by its owner
  alternatives:
  - for its owner
  - by its master
  - for its possessor
  lexicon: HALOT
  rationale: בעל commonly means owner/possessor here. The preposition ל can indicate
    relation or advantage, but in English 'by its owner' best conveys possession plus
    agency in keeping it.
- source_word: לְרָעָתוֹ
  chosen: to his harm
  alternatives:
  - for his hurt
  - to his detriment
  - for his misfortune
  lexicon: HALOT
  rationale: The phrase expresses harmful result. 'To his harm' is clear, concise,
    and preserves the personal detrimental outcome.
