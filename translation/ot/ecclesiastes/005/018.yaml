theological_decisions:
- issue: Generic masculine הָאָדָם in wisdom literature
  chosen_reading: every man
  alternative_readings:
  - everyone
  - every person
  rationale: The Hebrew is grammatically masculine singular used representatively.
    Following the doctrine's gender-accurate principle, the translation preserves
    the masculine generic rather than neutralizing it in the main text.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    adam'
- issue: Nature of divine granting in וְהִשְׁלִיטוֹ
  chosen_reading: has empowered him
  alternative_readings:
  - has allowed him
  - has given him authority
  rationale: The verse teaches not only that God gives possessions but also the capacity
    to benefit from them. 'Empowered' preserves that theological emphasis without
    importing a stronger doctrine than the verb warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
