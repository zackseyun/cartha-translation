id: ECC.5.18
reference: Ecclesiastes 5:18
source:
  edition: WLC
  text: גַּ֣ם כָּֽל הָ/אָדָ֡ם אֲשֶׁ֣ר נָֽתַן ל֣/וֹ הָ/אֱלֹהִים֩ עֹ֨שֶׁר וּ/נְכָסִ֜ים
    וְ/הִשְׁלִיט֨/וֹ לֶ/אֱכֹ֤ל מִמֶּ֨/נּוּ֙ וְ/לָ/שֵׂ֣את אֶת חֶלְק֔/וֹ וְ/לִ/שְׂמֹ֖חַ
    בַּ/עֲמָל֑/וֹ זֹ֕ה מַתַּ֥ת אֱלֹהִ֖ים הִֽיא־־־׃
translation:
  text: Also, every man to whom God has given wealth and possessions, and has empowered
    him to eat from them, and to take up his portion, and to rejoice in his labor—this
    is the gift of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone' / 'every person.' The Hebrew reads 'every man' with a masculine
      singular noun used generically for human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'has given him power' or 'has enabled him.' The Hebrew verb emphasizes
      God-given ability to enjoy what one possesses.
    reason: lexical_alternative
  - marker: c
    text: Or 'to receive his lot' or 'to take his share.' 'Portion' is a key Ecclesiastes
      term for one's allotted share in life.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Connective/adverb continuing the reflection from the previous verse;
    'Also' preserves the additive force without sounding overly formal.
- source_word: כָּל הָאָדָם
  chosen: every man
  alternatives:
  - everyone
  - every person
  - all humankind
  lexicon: HALOT
  rationale: The phrase is distributive and generic. Per doctrine, gender-accurate
    rendering is preferred where Hebrew uses masculine representative language. 'Every
    man' preserves the singular-generic force better than the pluralizing 'everyone,'
    while still functioning idiomatically in English.
- source_word: נָתַן לוֹ הָאֱלֹהִים
  chosen: God has given
  alternatives:
  - God gave
  lexicon: HALOT
  rationale: The Hebrew perfect here states a completed act with present relevance
    in a general truth setting. English present perfect communicates that well in
    this wisdom context.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: '''Wealth'' is the most natural modern rendering for material abundance
    in wisdom literature.'
- source_word: נְכָסִים
  chosen: possessions
  alternatives:
  - property
  - assets
  lexicon: HALOT
  rationale: Distinguishes this term from עֹשֶׁר while keeping accessible modern English;
    it refers to owned goods/property.
- source_word: וְהִשְׁלִיטוֹ
  chosen: has empowered him
  alternatives:
  - has given him power
  - has enabled him
  - has allowed him
  lexicon: HALOT
  rationale: The Hiphil of שלט conveys causing someone to have mastery or authority.
    In context, the point is not mere permission but God-given ability/capacity to
    enjoy what one has. 'Empowered' captures that nuance concisely.
- source_word: לֶאֱכֹל מִמֶּנּוּ
  chosen: to eat from them
  alternatives:
  - to enjoy them
  - to partake of it
  lexicon: HALOT
  rationale: The idiom is literally 'to eat from it,' referring to deriving sustenance/enjoyment
    from one's wealth. I retained the concrete image rather than paraphrasing to 'enjoy,'
    since the following clauses already unpack the enjoyment theme. Number shifts
    to 'them' because the antecedent is the pair 'wealth and possessions' in English.
- source_word: וְלָשֵׂאת אֶת חֶלְקוֹ
  chosen: to take up his portion
  alternatives:
  - to receive his lot
  - to take his share
  - to accept his portion
  lexicon: HALOT
  rationale: חלק commonly means one's allotted share/portion in Ecclesiastes. For
    נשׂא, 'take up' preserves the verbal force without overinterpreting it as merely
    mental acceptance. The phrase conveys appropriating one's allotted share in life.
- source_word: וְלִשְׂמֹחַ בַּעֲמָלוֹ
  chosen: to rejoice in his labor
  alternatives:
  - to enjoy his toil
  - to be glad in his work
  lexicon: HALOT
  rationale: Ecclesiastes often uses עמל for labor/toil. 'Labor' preserves the weight
    of effort better than the lighter 'work,' while 'rejoice in' keeps the explicit
    joy language of שמח.
- source_word: זֹה מַתַּת אֱלֹהִים הִיא
  chosen: this is the gift of God
  alternatives:
  - this is God's gift
  - this is a gift of God
  lexicon: HALOT
  rationale: A straightforward predication. 'The gift of God' reads naturally and
    can denote the reality just described as divine gift without implying exclusivity
    beyond the context.
