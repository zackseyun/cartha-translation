id: ECC.5.4
reference: Ecclesiastes 5:4
source:
  edition: WLC
  text: ט֖וֹב אֲשֶׁ֣ר לֹֽא תִדֹּ֑ר מִ/שֶׁ/תִּדּ֖וֹר וְ/לֹ֥א תְשַׁלֵּֽם־׃
translation:
  text: It is better that you should not vow than that you should vow and not fulfill
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and not pay.' Here 'pay' refers to paying or fulfilling
      a vow.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Predicate adjective used idiomatically for comparative evaluation; English
    supplies 'it is' for natural syntax while preserving the comparative sense.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - when
  - which
  lexicon: HALOT
  rationale: Introduces the comparative clause after טוֹב; 'that' best fits the English
    construction 'better that... than that...'.
- source_word: לֹא תִדֹּר
  chosen: you should not vow
  alternatives:
  - you do not vow
  - you not vow
  lexicon: HALOT
  rationale: Qal imperfect 2ms of נדר in a general, gnomic statement. 'Should not
    vow' conveys the proverbial evaluative force more naturally in English than a
    bare future, without adding obligation beyond the comparison.
- source_word: מִשֶׁתִּדּוֹר
  chosen: than that you should vow
  alternatives:
  - than when you vow
  - than to vow
  lexicon: HALOT
  rationale: The prefixed מִן with אֲשֶׁר marks the second element of the comparison,
    'than that...'. Repeating 'you should vow' keeps the parallelism with the first
    clause.
- source_word: וְלֹא תְשַׁלֵּם
  chosen: and not fulfill it
  alternatives:
  - and not pay
  - and not perform it
  - and not complete it
  lexicon: HALOT
  rationale: Piel of שלם here refers to paying or fulfilling a vow. 'Fulfill it' communicates
    the idiomatic sense in contemporary English better than the more literal 'pay,'
    while retaining the object implied from the vow context.
