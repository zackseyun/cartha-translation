id: ECC.5.7
reference: Ecclesiastes 5:7
source:
  edition: WLC
  text: אִם עֹ֣שֶׁק רָ֠שׁ וְ/גֵ֨זֶל מִשְׁפָּ֤ט וָ/צֶ֨דֶק֙ תִּרְאֶ֣ה בַ/מְּדִינָ֔ה
    אַל תִּתְמַ֖הּ עַל הַ/חֵ֑פֶץ כִּ֣י גָבֹ֜הַּ מֵ/עַ֤ל גָּבֹ֨הַ֙ שֹׁמֵ֔ר וּ/גְבֹהִ֖ים
    עֲלֵי/הֶֽם־־־׃
translation:
  text: If you see the oppression of the poor and the robbery of justice and righteousness
    in the province, do not be astonished at the matter; for a high official is watched
    by one higher, and there are even higher ones over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'extortion of the poor.' The Hebrew terms can emphasize exploitative
      seizure as well as general oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plundering of justice and righteousness.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'for a high one is watching over a high one, and
      higher ones are over them,' which may refer to layers of human officials and
      may also imply ultimate divine oversight.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - oppression
  lexicon: HALOT
  rationale: The noun denotes oppressive exploitation or extortion. 'Oppression' is
    the broadest natural English rendering here and fits the social injustice context.
- source_word: רָשׁ
  chosen: the poor
  alternatives:
  - the needy
  - the destitute
  lexicon: HALOT
  rationale: The adjective/substantive refers to a poor person. 'The poor' is idiomatic
    and preserves the class reference rather than an individual case.
- source_word: גֵזֶל
  chosen: robbery
  alternatives:
  - plunder
  - violent seizure
  - deprivation
  lexicon: HALOT
  rationale: The term commonly refers to robbery or seizure by force. Here it modifies
    the denial of legal and moral order; 'robbery' vividly conveys that justice is
    being taken away.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal right
  lexicon: HALOT
  rationale: In this context of public administration and abuse, the word points to
    proper legal justice rather than merely a judicial decision.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - right
  - equity
  lexicon: HALOT
  rationale: Paired with מִשְׁפָּט, the term broadens the idea from legal justice
    to moral rightness. 'Righteousness' preserves that ethical dimension.
- source_word: מְדִינָה
  chosen: province
  alternatives:
  - district
  - realm
  - state
  lexicon: HALOT
  rationale: The term often denotes an administrative district or province. 'Province'
    best fits the bureaucratic setting implied by the verse.
- source_word: תִּתְמַהּ
  chosen: do not be astonished
  alternatives:
  - do not marvel
  - do not be appalled
  - do not be surprised
  lexicon: HALOT
  rationale: The verb expresses astonishment or wonder. 'Do not be astonished' is
    clear modern English and preserves the emotional reaction being prohibited.
- source_word: הַחֵפֶץ
  chosen: the matter
  alternatives:
  - the affair
  - the thing
  - the happening
  lexicon: HALOT
  rationale: Although the noun can mean delight, desire, or matter, in this context
    it most naturally refers to the situation/event just described. 'The matter' is
    concise and idiomatic.
- source_word: גָבֹהַּ מֵעַל גָּבֹהַ
  chosen: a high official ... one higher
  alternatives:
  - one high ... one higher
  - a high one ... a higher one
  lexicon: HALOT
  rationale: The repeated adjective 'high' is used substantivally for persons in elevated
    rank. Rendering it as 'official' makes the bureaucratic chain of oversight explicit
    in natural English without over-paraphrasing.
- source_word: שֹׁמֵר
  chosen: is watched
  alternatives:
  - keeps watch
  - watches
  - is guarded
  lexicon: HALOT
  rationale: The participle means 'watching/keeping watch.' In context it likely describes
    supervisory oversight within a hierarchy. The passive English expression 'is watched'
    best captures the relation between the two ranks.
- source_word: וּגְבֹהִים עֲלֵיהֶם
  chosen: there are even higher ones over them
  alternatives:
  - and higher ones are over them
  - and the highest are over them
  lexicon: HALOT
  rationale: The plural continues the theme of layered authority. 'Even higher ones'
    preserves the escalation without specifying whether the reference is merely human
    bureaucracy or includes divine oversight.
