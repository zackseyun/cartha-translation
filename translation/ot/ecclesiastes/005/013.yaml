id: ECC.5.13
reference: Ecclesiastes 5:13
source:
  edition: WLC
  text: וְ/אָבַ֛ד הָ/עֹ֥שֶׁר הַ/ה֖וּא בְּ/עִנְיַ֣ן רָ֑ע וְ/הוֹלִ֣יד בֵּ֔ן וְ/אֵ֥ין
    בְּ/יָד֖/וֹ מְאֽוּמָה׃
translation:
  text: And that wealth was lost in a bad venture, and he fathered a son and had nothing
    in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through a grievous business matter' or 'in an unfortunate affair.' The
      Hebrew phrase can denote a harmful enterprise or circumstance.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and there is nothing in his hand,' an idiom meaning he possesses
      nothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבַד
  chosen: was lost
  alternatives:
  - perished
  - was destroyed
  - vanished
  lexicon: HALOT
  rationale: Qal perfect 3ms of אבד here takes הָעֹשֶׁר as subject; passive-like English
    ('was lost') is natural and preserves the result without overstating agency.
- source_word: הָעֹשֶׁר הַהוּא
  chosen: that wealth
  alternatives:
  - those riches
  - that riches
  lexicon: HALOT
  rationale: עֹשֶׁר denotes wealth/riches. 'That wealth' reflects the article + demonstrative
    and reads naturally in English.
- source_word: בְּעִנְיַן רָע
  chosen: in a bad venture
  alternatives:
  - through a bad business matter
  - in an evil circumstance
  - through a grievous affair
  lexicon: HALOT
  rationale: עִנְיָן in Ecclesiastes often refers to an affair, task, or matter; with
    רָע it points to a harmful or unfortunate enterprise. 'Venture' captures the economic
    context of losing wealth.
- source_word: וְהוֹלִיד
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: Hiphil of ילד commonly means to beget/father. 'Fathered' is idiomatic
    modern English and preserves the male subject.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a child
  lexicon: HALOT
  rationale: The Hebrew specifically says 'son,' not a gender-neutral child. This
    follows the gender-accurate principle.
- source_word: וְאֵין בְּיָדוֹ מְאוּמָה
  chosen: and had nothing in his hand
  alternatives:
  - and there was nothing in his hand
  - and he had nothing at all
  lexicon: HALOT
  rationale: The idiom literally says 'there is nothing in his hand,' meaning he possesses
    nothing. 'Had nothing in his hand' keeps the concrete Hebrew image while remaining
    readable.
