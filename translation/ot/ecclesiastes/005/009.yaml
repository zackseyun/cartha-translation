theological_decisions:
- issue: Rendering of Ecclesiastes' refrain הָבֶל
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - breath
  - meaningless
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it
    is theologically and interpretively significant in Ecclesiastes. 'Vapor' best
    preserves the metaphor of fleeting insubstantiality without collapsing it into
    a single abstract interpretation such as 'meaningless.'
  doctrine_reference: Translation philosophy §1, §5
