id: ECC.5.9
reference: Ecclesiastes 5:9
source:
  edition: WLC
  text: אֹהֵ֥ב כֶּ֨סֶף֙ לֹא יִשְׂבַּ֣ע כֶּ֔סֶף וּ/מִֽי אֹהֵ֥ב בֶּ/הָמ֖וֹן לֹ֣א תְבוּאָ֑ה
    גַּם זֶ֖ה הָֽבֶל־־־׃
translation:
  text: Whoever loves silver will not be satisfied with silver, nor whoever loves
    abundance with income; this too is vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever loves wealth is not satisfied with income.' The second clause
      is syntactically difficult; 'abundance' may also be understood as 'wealth,'
      and 'income' as 'increase' or 'gain.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'vapor' (traditionally 'vanity'); a recurring Ecclesiastes term for
      what is fleeting, elusive, or insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  chosen: whoever loves
  alternatives:
  - he who loves
  - the one who loves
  lexicon: HALOT
  rationale: The participle functions generically, describing any person characterized
    by love of money. 'Whoever loves' gives natural modern English while preserving
    the generic force.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The Hebrew literally means 'silver,' which often functions metonymically
    for money. Retaining 'silver' preserves the source wording and the poetic repetition,
    while still being understandable in context as wealth.
- source_word: יִשְׂבַּע
  chosen: will not be satisfied
  alternatives:
  - will not have enough
  - will not be filled
  lexicon: HALOT
  rationale: The verb conveys being sated or satisfied. 'Will not be satisfied' is
    idiomatic and preserves the sense of insatiability.
- source_word: וּמִי
  chosen: nor whoever
  alternatives:
  - and whoever
  - or who
  lexicon: HALOT
  rationale: In this difficult clause, the conjunction plus interrogative is best
    taken idiomatically as introducing a parallel statement rather than a literal
    question. 'Nor whoever' fits the parallelism with the first colon and yields coherent
    English.
- source_word: בֶּהָמוֹן
  chosen: abundance
  alternatives:
  - wealth
  - multitude
  - plenty
  lexicon: HALOT
  rationale: הָמוֹן can denote abundance, wealth, or a great quantity. 'Abundance'
    preserves the broader sense and avoids over-specifying the object beyond the Hebrew.
- source_word: תְבוּאָה
  chosen: income
  alternatives:
  - increase
  - produce
  - gain
  lexicon: HALOT
  rationale: The noun often refers to produce or yield, but in this wisdom context
    about wealth it naturally extends to financial return or gain. 'Income' communicates
    the sense clearly in modern English.
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - meaningless
  - breath
  lexicon: HALOT
  rationale: Ecclesiastes uses הָבֶל as a key motif denoting transience, insubstantiality,
    and frustration. 'Vapor' preserves the metaphor better than the traditional but
    potentially misleading 'vanity' or the interpretively stronger 'meaningless'.
