id: ECC.5.3
reference: Ecclesiastes 5:3
source:
  edition: WLC
  text: כַּ/אֲשֶׁר֩ תִּדֹּ֨ר נֶ֜דֶר לֵֽ/אלֹהִ֗ים אַל תְּאַחֵר֙ לְ/שַׁלְּמ֔/וֹ כִּ֛י
    אֵ֥ין חֵ֖פֶץ בַּ/כְּסִילִ֑ים אֵ֥ת אֲשֶׁר תִּדֹּ֖ר שַׁלֵּֽם־־׃
translation:
  text: When you make a vow to God, do not delay in paying it, for he takes no pleasure
    in fools. What you vow, pay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not postpone fulfilling it.' The Hebrew verb can denote paying, completing,
      or fulfilling what was vowed.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''for there is no pleasure in fools,'' with the subject implied;
      the sense is that God takes no pleasure in fools.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: When
  alternatives:
  - Whenever
  - If
  lexicon: HALOT
  rationale: Introduces a temporal circumstance tied to the act of vowing. 'When'
    is natural English and fits the admonitory context better than the more conditional
    'if,' while preserving the sense of an occasion on which a vow is made.
- source_word: תִּדֹּר נֶדֶר
  chosen: you make a vow
  alternatives:
  - you vow a vow
  - you vow
  lexicon: HALOT
  rationale: The Hebrew uses the cognate verb+noun construction 'vow a vow.' English
    normally expresses this as 'make a vow.' This preserves the formal act without
    awkward literalism.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to God/gods
  lexicon: HALOT
  rationale: In Ecclesiastes this clearly refers to the God of Israel in worship context,
    so singular 'God' is required by context.
- source_word: אַל תְּאַחֵר
  chosen: do not delay
  alternatives:
  - do not be late
  - do not postpone
  lexicon: HALOT
  rationale: The prohibition concerns postponing fulfillment of the vow. 'Do not delay'
    is idiomatic and suitably direct.
- source_word: לְשַׁלְּמוֹ
  chosen: in paying it
  alternatives:
  - to pay it
  - to fulfill it
  lexicon: HALOT
  rationale: The verb שׁלם here refers to paying or completing what was vowed. 'Paying
    it' works naturally with 'delay' in English and preserves the concrete obligation.
    'Fulfill it' is possible but less closely tied to the lexical sense.
- source_word: כִּי אֵין חֵפֶץ
  chosen: for he takes no pleasure
  alternatives:
  - for there is no pleasure
  - for he has no delight
  lexicon: HALOT
  rationale: The clause is elliptical in Hebrew; English benefits from making the
    implied subject explicit from context. 'Takes no pleasure' is idiomatic and conveys
    divine displeasure.
- source_word: בַּכְּסִילִים
  chosen: in fools
  alternatives:
  - in the foolish
  - in fools' behavior
  lexicon: HALOT
  rationale: כְּסִילִים in wisdom literature denotes morally and spiritually foolish
    people, not merely the unintelligent. 'Fools' is the standard concise rendering.
- source_word: אֵת אֲשֶׁר תִּדֹּר
  chosen: What you vow
  alternatives:
  - That which you vow
  - What you have vowed
  lexicon: HALOT
  rationale: This fronted object phrase sets up the concluding imperative. 'What you
    vow' is clear, direct, and preserves the general force.
- source_word: שַׁלֵּם
  chosen: pay
  alternatives:
  - fulfill
  - perform
  lexicon: HALOT
  rationale: The imperative repeats the payment/completion idea for emphasis. 'Pay'
    preserves the lexical link with the earlier infinitive and keeps the terse force
    of the Hebrew conclusion.
