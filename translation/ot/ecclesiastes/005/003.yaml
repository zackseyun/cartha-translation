theological_decisions:
- issue: Implied subject in 'for there is no pleasure in fools'
  chosen_reading: 'Render the implied subject as God: ''for he takes no pleasure in
    fools.'''
  alternative_readings:
  - 'Render impersonally: ''for there is no pleasure in fools'''
  - 'Render with supplied generic subject: ''for no one delights in fools'''
  rationale: 'The immediate context concerns vows made ''to God,'' and the warning
    explains why one must not delay: God does not delight in fools. Supplying ''he''
    makes explicit what the Hebrew leaves implicit and best communicates the sense
    in natural English without adding new doctrine.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Moral sense of כְּסִילִים
  chosen_reading: Use 'fools' in the wisdom-literature sense.
  alternative_readings:
  - the foolish
  - stupid people
  rationale: The term in Ecclesiastes is ethically charged and should not be flattened
    into mere lack of intelligence. 'Fools' preserves the wisdom-category and avoids
    colloquial crudeness.
  doctrine_reference: Translation philosophy §6
