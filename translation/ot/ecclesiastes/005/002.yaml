id: ECC.5.2
reference: Ecclesiastes 5:2
source:
  edition: WLC
  text: כִּ֛י בָּ֥א הַ/חֲל֖וֹם בְּ/רֹ֣ב עִנְיָ֑ן וְ/ק֥וֹל כְּסִ֖יל בְּ/רֹ֥ב דְּבָרִֽים׃
translation:
  text: For a dream comes with much preoccupation, and a fool’s voice with many words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because a dream comes through much business/occupation, and a fool’s
      voice through many words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding warning. 'For'
    preserves the explanatory connection in concise English; 'because' is possible
    but slightly heavier stylistically.
- source_word: בָּא
  chosen: comes
  alternatives:
  - arrives
  lexicon: HALOT
  rationale: Qal perfect of בוא used in a gnomic/proverbial sense. Present-tense 'comes'
    communicates the general truth naturally in English.
- source_word: הַחֲלוֹם
  chosen: a dream
  alternatives:
  - the dream
  lexicon: HALOT
  rationale: 'Although marked with the article in Hebrew, the noun functions generically/proverbially
    here. English idiom prefers the indefinite for a general observation: ''a dream
    comes...'' rather than ''the dream comes...''.'
- source_word: בְּרֹב
  chosen: with much
  alternatives:
  - through much
  - from much
  - in much
  lexicon: HALOT
  rationale: The preposition ב with רֹב expresses accompanying abundance. 'With much'
    is idiomatic and preserves the causal/associative force without over-specifying.
- source_word: עִנְיָן
  chosen: preoccupation
  alternatives:
  - business
  - activity
  - anxiety
  - cares
  lexicon: HALOT
  rationale: In Ecclesiastes this term often denotes occupation, task, or matter of
    concern. Here the sense is the mental busyness or burden that gives rise to dreams.
    'Preoccupation' captures that better than the narrower 'business' and avoids importing
    purely emotional 'anxiety' as the only nuance.
- source_word: וְקוֹל
  chosen: and a fool’s voice
  alternatives:
  - and the voice of a fool
  - and the sound of a fool
  lexicon: HALOT
  rationale: 'Construct-like sense with following noun: ''voice of a fool.'' The chosen
    wording is natural English while preserving the Hebrew image of speech characterized
    by the fool.'
- source_word: כְּסִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: Standard wisdom-literature term for the morally and intellectually dull
    person. 'Fool' preserves the biblical wisdom category better than flatter modern
    substitutes.
- source_word: בְּרֹב דְּבָרִים
  chosen: with many words
  alternatives:
  - through many words
  - in many words
  - from many words
  lexicon: HALOT
  rationale: Parallel to the first colon. 'With many words' preserves the association
    between excessive speech and the fool's voice, matching the proverb's compact
    style.
