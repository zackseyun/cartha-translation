theological_decisions:
- issue: Meaning of רוּחַ in a wisdom/futility context
  chosen_reading: wind
  alternative_readings:
  - spirit
  - breath
  rationale: The verse concerns the futility of gain retained at death. Rendering
    רוּחַ as 'wind' preserves the concrete image of futile striving and avoids importing
    a spiritualized meaning absent from the immediate context.
