id: ECC.5.15
reference: Ecclesiastes 5:15
source:
  edition: WLC
  text: וְ/גַם זֹה֙ רָעָ֣ה חוֹלָ֔ה כָּ/ל עֻמַּ֥ת שֶׁ/בָּ֖א כֵּ֣ן יֵלֵ֑ךְ וּ/מַה יִּתְר֣וֹן
    ל֔/וֹ שֶֽׁ/יַּעֲמֹ֖ל לָ/רֽוּחַ־־־׃
translation:
  text: 'This too is a grievous evil: exactly as he came, so he will go. And what
    profit is there for him that he toils for the wind?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the spirit' or 'for the breath'; Hebrew רוּחַ can mean 'wind,' 'breath,'
      or 'spirit.' Here 'wind' best fits the context of futile toil.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה חוֹלָה
  chosen: a grievous evil
  alternatives:
  - a sickening evil
  - a severe evil
  - an evil disease
  lexicon: HALOT
  rationale: רָעָה means 'evil, bad thing,' and חוֹלָה literally relates to sickness/being
    diseased. In this idiom the sense is an especially painful or grievous evil rather
    than a literal illness. 'Grievous evil' preserves the metaphor while sounding
    natural in English.
- source_word: כָּל עֻמַּת שֶׁבָּא
  chosen: exactly as he came
  alternatives:
  - in full correspondence to how he came
  - just as he came
  lexicon: HALOT
  rationale: עֻמַּת conveys correspondence or exact parallel ('corresponding to, just
    as'). 'Exactly as he came' captures the comparative force concisely and naturally.
- source_word: יֵלֵךְ
  chosen: he will go
  alternatives:
  - he goes
  - he departs
  lexicon: HALOT
  rationale: The imperfect here expresses the general certainty of what happens to
    a person at death. 'He will go' preserves the verbal simplicity and proverbial
    tone.
- source_word: יִתְרוֹן
  chosen: profit
  alternatives:
  - gain
  - advantage
  lexicon: HALOT
  rationale: A key Qoheleth term for surplus, gain, or advantage. 'Profit' is traditional
    in Ecclesiastes and fits the book's recurring economic metaphor without sounding
    overly technical.
- source_word: שֶׁיַּעֲמֹל
  chosen: that he toils
  alternatives:
  - for which he labors
  - that he labors
  lexicon: HALOT
  rationale: עמל denotes laborious toil, often with wearisome or futile overtones
    in Ecclesiastes. 'Toils' better conveys the burdened nuance than the flatter 'labors.'
- source_word: לָרוּחַ
  chosen: for the wind
  alternatives:
  - for the spirit
  - for the breath
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In Ecclesiastes' idiom of futility,
    'for the wind' best matches the image of striving after what cannot be grasped.
    'Spirit' would suggest an inward or theological referent not demanded by the context.
