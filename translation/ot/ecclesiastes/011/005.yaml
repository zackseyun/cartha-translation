id: ECC.11.5
reference: Ecclesiastes 11:5
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר אֵֽינְ/ךָ֤ יוֹדֵ֨עַ֙ מַה דֶּ֣רֶךְ הָ/ר֔וּחַ כַּ/עֲצָמִ֖ים בְּ/בֶ֣טֶן
    הַ/מְּלֵאָ֑ה כָּ֗כָה לֹ֤א תֵדַע֙ אֶת מַעֲשֵׂ֣ה הָֽ/אֱלֹהִ֔ים אֲשֶׁ֥ר יַעֲשֶׂ֖ה
    אֶת הַ/כֹּֽל־־־׃
translation:
  text: Just as you do not know the way of the wind, or how the bones form in the
    womb of a pregnant woman, so you do not know the work of God, who makes everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the way of the spirit' or 'how the breath goes'; Hebrew רוּחַ can mean
      'wind,' 'breath,' or 'spirit.'
    reason: alternative_reading
  - marker: b
    text: Literally 'in the womb of the full one,' an idiom for a pregnant woman.
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ הָרוּחַ
  chosen: the way of the wind
  alternatives:
  - the path of the spirit
  - how the breath goes
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this wisdom context, paired
    with human ignorance of natural processes, 'wind' best fits the observable-yet-mysterious
    phenomenon. 'Way' preserves דֶּרֶךְ more literally than reducing it to merely
    'how.'
- source_word: כַּעֲצָמִים
  chosen: how the bones form
  alternatives:
  - as the bones
  - like the bones
  lexicon: HALOT
  rationale: The Hebrew phrase is elliptical. A strictly literal 'as the bones' is
    unclear in English. 'How the bones form' makes explicit the implied comparison
    to hidden development in the womb while staying within the semantic scope of the
    clause.
- source_word: בְּבֶטֶן הַמְּלֵאָה
  chosen: in the womb of a pregnant woman
  alternatives:
  - in a full womb
  - in the womb that is full
  lexicon: HALOT
  rationale: הַמְּלֵאָה literally means 'the full [one].' In context it refers idiomatically
    to a woman full with child, i.e., pregnant. This is clearer modern English and
    preserves the referent.
- source_word: מַעֲשֵׂה הָאֱלֹהִים
  chosen: the work of God
  alternatives:
  - the activity of God
  - what God does
  lexicon: HALOT
  rationale: '''Work of God'' is the most natural rendering of the construct phrase
    and preserves the thematic link with divine action in wisdom literature.'
- source_word: אֲשֶׁר יַעֲשֶׂה אֶת־הַכֹּל
  chosen: who makes everything
  alternatives:
  - who does all things
  - which he does in everything
  lexicon: HALOT
  rationale: The relative clause most naturally describes God as the one who makes/does
    everything. 'Makes everything' is idiomatic and captures the comprehensive force
    of אֶת־הַכֹּל.
