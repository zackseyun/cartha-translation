id: ECC.11.9
reference: Ecclesiastes 11:9
source:
  edition: WLC
  text: שְׂמַ֧ח בָּח֣וּר בְּ/יַלְדוּתֶ֗י/ךָ וִֽ/יטִֽיבְ/ךָ֤ לִבְּ/ךָ֙ בִּ/ימֵ֣י בְחוּרוֹתֶ֔/ךָ
    וְ/הַלֵּךְ֙ בְּ/דַרְכֵ֣י לִבְּ/ךָ֔ וּ/בְ/מַרְאֵ֖י עֵינֶ֑י/ךָ וְ/דָ֕ע כִּ֧י עַל
    כָּל אֵ֛לֶּה יְבִֽיאֲ/ךָ֥ הָ/אֱלֹהִ֖ים בַּ/מִּשְׁפָּֽט־־׃
translation:
  text: Rejoice, young man, in your youth, and let your heart cheer you in the days
    of your young manhood. Walk in the ways of your heart and in the sight of your
    eyes, but know that for all these things God will bring you into judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let your heart make you glad.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the days of your youth.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in the sight/appearance of your eyes.'
    reason: lexical_alternative
  - marker: d
    text: Ecclesiastes holds together the enjoyment of life and accountability before
      God; the verse may be read either as qualified permission or as warning-laden
      exhortation.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂמַח
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: HALOT
  rationale: Qal imperative 2ms calling for active joy. 'Rejoice' preserves the imperative
    force and fits Qoheleth's recurring exhortations to enjoy life.
- source_word: בָּחוּר
  chosen: young man
  alternatives:
  - youth
  - young person
  lexicon: HALOT
  rationale: The noun is masculine singular and addresses a male youth directly. Per
    gender-accurate policy, 'young man' best matches the source form and discourse
    situation.
- source_word: בְּיַלְדוּתֶיךָ
  chosen: in your youth
  alternatives:
  - in your childhood
  lexicon: HALOT
  rationale: Refers to the period of youthful life rather than early childhood in
    this context, especially paired with the following phrase about the days of vigor.
- source_word: וִיטִיבְךָ לִבְּךָ
  chosen: let your heart cheer you
  alternatives:
  - let your heart make you glad
  - let your heart do you good
  lexicon: HALOT
  rationale: The Hiphil of יטב with 'your heart' as subject conveys causing gladness
    or well-being. 'Cheer you' is idiomatic modern English while retaining the causative
    sense.
- source_word: בִּימֵי בְחוּרוֹתֶךָ
  chosen: in the days of your young manhood
  alternatives:
  - in the days of your youth
  - in the days of your prime
  lexicon: HALOT
  rationale: The plural abstract noun from the same root as 'young man' points to
    the season of youthful vigor. 'Young manhood' preserves the masculine address
    and avoids flattening the nuance into a generic repetition.
- source_word: וְהַלֵּךְ
  chosen: Walk
  alternatives:
  - Follow
  - Live
  lexicon: HALOT
  rationale: Imperative of הלך used metaphorically for conduct. 'Walk' preserves the
    Hebrew metaphor and common biblical idiom.
- source_word: בְּדַרְכֵי לִבְּךָ
  chosen: in the ways of your heart
  alternatives:
  - according to the ways of your heart
  - in your heart's ways
  lexicon: HALOT
  rationale: A fairly literal rendering that keeps the metaphor of 'ways' and the
    Hebrew anthropology of the heart as the center of desire and intention.
- source_word: וּבְמַרְאֵי עֵינֶיךָ
  chosen: in the sight of your eyes
  alternatives:
  - according to what your eyes see
  - in what appears to your eyes
  lexicon: HALOT
  rationale: Literally 'in the appearances/sight of your eyes.' The chosen rendering
    stays close to the Hebrew while remaining intelligible, preserving the parallel
    with 'ways of your heart.'
- source_word: וְדָע
  chosen: but know
  alternatives:
  - and know
  lexicon: HALOT
  rationale: Though formally conjunctive, in English the clause is adversative in
    force, introducing a balancing warning after the permissions. 'But know' best
    conveys the discourse movement without overstating contradiction.
- source_word: עַל כָּל אֵלֶּה
  chosen: for all these things
  alternatives:
  - because of all these things
  - concerning all these things
  lexicon: HALOT
  rationale: The preposition with the judicial context most naturally means accountability
    with respect to these behaviors. 'For all these things' is concise and idiomatic.
- source_word: יְבִיאֲךָ הָאֱלֹהִים
  chosen: God will bring you
  alternatives:
  - God will bring you in
  - God will cause you to come
  lexicon: HALOT
  rationale: Hiphil of בוא with object suffix means to bring someone into a state
    or setting. Straightforward future rendering fits the warning.
- source_word: בַּמִּשְׁפָּט
  chosen: into judgment
  alternatives:
  - into the judgment
  - to judgment
  lexicon: HALOT
  rationale: The phrase denotes being brought before divine judicial evaluation. 'Into
    judgment' is natural English and preserves the solemn forensic sense.
