id: ECC.11.6
reference: Ecclesiastes 11:6
source:
  edition: WLC
  text: בַּ/בֹּ֨קֶר֙ זְרַ֣ע אֶת זַרְעֶ֔/ךָ וְ/לָ/עֶ֖רֶב אַל תַּנַּ֣ח יָדֶ֑/ךָ כִּי֩
    אֵֽינְ/ךָ֨ יוֹדֵ֜ע אֵ֣י זֶ֤ה יִכְשָׁר֙ הֲ/זֶ֣ה אוֹ זֶ֔ה וְ/אִם שְׁנֵי/הֶ֥ם כְּ/אֶחָ֖ד
    טוֹבִֽים־־־־׃
translation:
  text: In the morning sow your seed, and in the evening do not let your hand rest,
    for you do not know which will succeed, this or that, or whether both alike will
    be good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will prosper' for 'will succeed.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'do not let your hand rest,' an idiom for not ceasing from work.
    reason: cultural_note
lexical_decisions:
- source_word: בַּבֹּקֶר
  chosen: In the morning
  alternatives:
  - In the morning time
  - At morning
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the first part of the day; 'In
    the morning' is natural modern English and preserves the temporal force.
- source_word: זְרַע
  chosen: sow
  alternatives:
  - plant
  lexicon: HALOT
  rationale: The verb specifically denotes sowing seed rather than the broader 'plant.'
    'Sow' preserves the agricultural imagery and verbal link with the following noun
    'seed.'
- source_word: אֶת זַרְעֶךָ
  chosen: your seed
  alternatives:
  - your grain
  - your sowing
  lexicon: HALOT
  rationale: Direct object with 2ms suffix. 'Seed' is the most straightforward rendering
    and keeps the proverb's literal agricultural image, while also allowing its broader
    wisdom application without paraphrase.
- source_word: וְלָעֶרֶב
  chosen: and in the evening
  alternatives:
  - and toward evening
  - and at evening
  lexicon: HALOT
  rationale: Parallel temporal phrase to 'in the morning.' Including 'and' preserves
    the Hebrew coordination and the balanced structure of the line.
- source_word: אַל תַּנַּח יָדֶךָ
  chosen: do not let your hand rest
  alternatives:
  - do not stop your hand
  - do not withdraw your hand
  - do not let your hand be idle
  lexicon: HALOT
  rationale: Literally 'do not cause your hand to rest/leave off.' The idiom refers
    to not ceasing from labor. 'Do not let your hand rest' preserves the concrete
    Hebrew image while remaining intelligible in English.
- source_word: כִּי אֵינְךָ יוֹדֵעַ
  chosen: for you do not know
  alternatives:
  - because you do not know
  lexicon: HALOT
  rationale: Introduces the rationale for the exhortation. 'For' fits English wisdom
    style and preserves the causal connection.
- source_word: אֵי זֶה
  chosen: which
  alternatives:
  - where
  - what
  lexicon: HALOT
  rationale: Interrogative expression here means 'which one.' Rendering as 'which'
    best fits the contrast between two possible outcomes.
- source_word: יִכְשָׁר
  chosen: will succeed
  alternatives:
  - will prosper
  - will be right
  - will turn out well
  lexicon: HALOT
  rationale: The verb carries the sense of proving successful or turning out well.
    'Will succeed' is concise, idiomatic, and well suited to the uncertainty about
    outcomes in context.
- source_word: הֲזֶה אוֹ זֶה
  chosen: this or that
  alternatives:
  - the one or the other
  lexicon: HALOT
  rationale: Demonstrative contrast between two possible efforts or outcomes. 'This
    or that' is natural English and preserves the open-ended comparison.
- source_word: וְאִם שְׁנֵיהֶם כְּאֶחָד
  chosen: or whether both alike
  alternatives:
  - or if both together
  - or whether the two of them equally
  lexicon: HALOT
  rationale: 'Introduces a further possibility: not one over the other, but both together/in
    the same way. ''Both alike'' captures כְּאֶחָד idiomatically.'
- source_word: טוֹבִים
  chosen: will be good
  alternatives:
  - will turn out well
  - will be successful
  lexicon: HALOT
  rationale: Predicate adjective describing the favorable outcome of both efforts.
    'Will be good' stays close to the Hebrew while fitting the future-oriented sense
    implied by context.
