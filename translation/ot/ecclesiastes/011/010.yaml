id: ECC.11.10
reference: Ecclesiastes 11:10
source:
  edition: WLC
  text: וְ/הָסֵ֥ר כַּ֨עַס֙ מִ/לִּבֶּ֔/ךָ וְ/הַעֲבֵ֥ר רָעָ֖ה מִ/בְּשָׂרֶ֑/ךָ כִּֽי
    הַ/יַּלְד֥וּת וְ/הַֽ/שַּׁחֲר֖וּת הָֽבֶל־׃
translation:
  text: So remove vexation from your heart, and put away harm from your flesh, for
    youth and the dawn of life are vapor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sorrow' or 'anger' for 'vexation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pain,' 'trouble,' or 'evil' for 'harm.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the dawn of life'; the rare term may also be understood as 'the
      prime of youth' or 'black-haired youth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'vanity' or 'breath' for 'vapor'; Ecclesiastes uses this word for what
      is fleeting and insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָסֵר
  chosen: remove
  alternatives:
  - put away
  - banish
  lexicon: HALOT
  rationale: Hiphil imperative of סור/הסר calls for active removal. 'Remove' is natural
    modern English and preserves the imperative force.
- source_word: כַּעַס
  chosen: vexation
  alternatives:
  - sorrow
  - anger
  - grief
  lexicon: HALOT
  rationale: In Ecclesiastes 11:10 the noun can denote inner irritation, grief, or
    vexation rather than outward wrath alone. 'Vexation' fits the internal location
    'from your heart' and coheres with the surrounding exhortation to enjoy life without
    anxious agitation.
- source_word: מִלִּבֶּךָ
  chosen: from your heart
  alternatives:
  - from your mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and emotion.
    'Heart' is the standard and sufficiently transparent English rendering.
- source_word: וְהַעֲבֵר
  chosen: put away
  alternatives:
  - remove
  - drive away
  - cause to pass away
  lexicon: HALOT
  rationale: Hiphil imperative of עבר here means to cause something to depart. Using
    'put away' gives good English variation while preserving the command to eliminate
    what follows.
- source_word: רָעָה
  chosen: harm
  alternatives:
  - evil
  - trouble
  - pain
  lexicon: HALOT
  rationale: The term can mean moral evil or experiential harm/trouble. Because it
    is removed 'from your flesh,' the sense is best taken as bodily harm, pain, or
    trouble rather than abstract moral evil. 'Harm' is concise and contextually fitting.
- source_word: מִבְּשָׂרֶךָ
  chosen: from your flesh
  alternatives:
  - from your body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' Since no Pauline-style theological contrast
    is in view, the literal rendering is preferred, while still naturally referring
    to the bodily self.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the commands. 'For' preserves the explanatory
    connection in concise English.
- source_word: הַיַּלְדוּת
  chosen: youth
  alternatives:
  - childhood
  - boyhood
  lexicon: HALOT
  rationale: The noun refers to the stage of being young. 'Youth' is broader and more
    idiomatic in parallel with the following term.
- source_word: וְהַשַּׁחֲרוּת
  chosen: the dawn of life
  alternatives:
  - the prime of youth
  - black-haired youth
  - morning
  lexicon: HALOT
  rationale: This rare noun is commonly understood metaphorically as the morning or
    dawn-time of life, that is, early youth. Rendering it 'the dawn of life' preserves
    the imagery and avoids overcommitting to the debated etymological sense 'black-haired
    youth.'
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - fleeting
  lexicon: HALOT
  rationale: Ecclesiastes uses הבל as a key motif for what is transient, insubstantial,
    and elusive. 'Vapor' preserves the concrete metaphor better than the traditional
    but potentially misleading 'vanity.'
