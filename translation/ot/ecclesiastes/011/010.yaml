theological_decisions:
- issue: Meaning of הבל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - mere breath
  - fleeting
  rationale: Following source-oriented optimal equivalence, the concrete metaphor
    is retained rather than the tradition-laden 'vanity.' This preserves Ecclesiastes'
    thematic tension without importing a narrower moralizing sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
