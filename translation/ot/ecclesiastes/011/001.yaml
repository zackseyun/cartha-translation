id: ECC.11.1
reference: Ecclesiastes 11:1
source:
  edition: WLC
  text: שַׁלַּ֥ח לַחְמְ/ךָ֖ עַל פְּנֵ֣י הַ/מָּ֑יִם כִּֽי בְ/רֹ֥ב הַ/יָּמִ֖ים תִּמְצָאֶֽ/נּוּ־־׃
translation:
  text: Cast your bread upon the surface of the waters, for after many days you will
    find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Send your bread upon the waters.' The Hebrew image may suggest generosity,
      investment, or both; the wording is left figurative in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלַּח
  chosen: Cast
  alternatives:
  - Send
  - Release
  lexicon: HALOT
  rationale: The imperative of שלח literally means 'send' or 'let go,' but in this
    idiom with 'bread' and 'upon the waters,' 'cast' best preserves the vivid metaphor
    in natural English without over-paraphrasing.
- source_word: לַחְמְךָ
  chosen: your bread
  alternatives:
  - your food
  - your grain
  lexicon: HALOT
  rationale: לֶחֶם commonly means 'bread' and can extend to food more generally. 'Bread'
    is retained because it is the concrete Hebrew term and preserves the proverb's
    imagery.
- source_word: עַל פְּנֵי הַמָּיִם
  chosen: upon the surface of the waters
  alternatives:
  - upon the waters
  - over the face of the waters
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface of.' 'Upon the surface of the waters'
    makes the Hebrew image explicit in readable English. 'Waters' is kept plural to
    reflect the Hebrew form.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or motivation for the imperative. 'For'
    is concise and fits proverbial style.
- source_word: בְרֹב הַיָּמִים
  chosen: after many days
  alternatives:
  - in the course of many days
  - after a long time
  lexicon: HALOT
  rationale: The phrase literally involves 'in/after many days.' 'After many days'
    is idiomatic English and preserves the temporal sense of delayed return.
- source_word: תִּמְצָאֶנּוּ
  chosen: you will find it
  alternatives:
  - you will find him
  - you will recover it
  lexicon: HALOT
  rationale: The verb means 'find,' with a 3ms suffix referring back most naturally
    to 'bread' as a masculine singular noun. 'It' is the natural English rendering.
    'Recover it' would over-interpret the proverb's application.
