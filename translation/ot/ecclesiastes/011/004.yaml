id: ECC.11.4
reference: Ecclesiastes 11:4
source:
  edition: WLC
  text: שֹׁמֵ֥ר ר֖וּחַ לֹ֣א יִזְרָ֑ע וְ/רֹאֶ֥ה בֶ/עָבִ֖ים לֹ֥א יִקְצֽוֹר׃
translation:
  text: Whoever watches the wind will not sow, and whoever looks at the clouds will
    not reap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who observes the wind will not sow, and the one who sees the
      clouds will not reap.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: watches
  alternatives:
  - observes
  - guards
  - keeps watch on
  lexicon: HALOT
  rationale: The participle denotes one who is watching or paying close attention.
    In this proverb context, 'watches' is natural modern English and preserves the
    ongoing, habitual sense better than the more wooden 'keeps' or the misleadingly
    protective 'guards'.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In context with sowing and clouds, the meteorological sense is primary.
    'Wind' fits the agricultural imagery and parallelism. 'Spirit' would import a
    theological sense not warranted here.
- source_word: יִזְרָע
  chosen: will not sow
  alternatives:
  - does not sow
  lexicon: HALOT
  rationale: The imperfect here expresses a general proverbial result. English future
    with 'will not' communicates the consequence idiomatically in wisdom literature.
- source_word: וְרֹאֶה
  chosen: and whoever looks
  alternatives:
  - and the one who sees
  - and whoever watches
  lexicon: HALOT
  rationale: The participle parallels שֹׁמֵר and introduces a second generic subject.
    'Whoever looks' makes the generic force explicit in smooth English and preserves
    the observational nuance distinct from the first clause.
- source_word: בֶעָבִים
  chosen: at the clouds
  alternatives:
  - the clouds
  - in the clouds
  lexicon: HALOT
  rationale: The preposition ב here is idiomatically rendered with English 'at' after
    a verb of seeing/looking. 'Clouds' is the straightforward lexical sense and suits
    the weather-based agricultural warning.
- source_word: יִקְצוֹר
  chosen: will not reap
  alternatives:
  - does not reap
  - will not harvest
  lexicon: HALOT
  rationale: The verb means 'reap/harvest.' 'Reap' preserves the sow/reap pairing
    and proverbial compactness. As with יזרע, 'will not' best conveys the general
    consequence.
