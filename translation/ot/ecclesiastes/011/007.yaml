id: ECC.11.7
reference: Ecclesiastes 11:7
source:
  edition: WLC
  text: וּ/מָת֖וֹק הָ/א֑וֹר וְ/ט֥וֹב לַֽ/עֵינַ֖יִם לִ/רְא֥וֹת אֶת הַ/שָּֽׁמֶשׁ־׃
translation:
  text: And the light is sweet, and it is good for the eyes to see the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''pleasant'': ''the light is pleasant.'''
    reason: lexical_alternative
  - marker: b
    text: '''To see the sun'' is a literal expression that can also imply being alive
      and enjoying earthly life.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמָתוֹק
  chosen: sweet
  alternatives:
  - pleasant
  lexicon: HALOT
  rationale: מָתוֹק literally denotes sweetness, often extended metaphorically to
    what is pleasant or delightful. 'Sweet' preserves the concrete metaphor and the
    terseness of the Hebrew better than the flatter 'pleasant.'
- source_word: הָאוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: With the article, the phrase is best rendered 'the light.' In context
    it refers to daylight/life-giving light rather than an abstract concept, but 'the
    light' preserves the Hebrew wording without over-specifying 'daylight' in the
    main text.
- source_word: וְטוֹב
  chosen: good
  alternatives:
  - pleasant
  - beautiful
  lexicon: HALOT
  rationale: טוֹב has a broad semantic range including good, pleasant, beneficial.
    'Good' is the most direct rendering and allows the idiom 'good for the eyes' to
    retain its Hebrew flavor.
- source_word: לָעֵינַיִם
  chosen: for the eyes
  alternatives:
  - to the eyes
  - for one's eyes
  lexicon: HALOT
  rationale: 'The lamed here is advantage/reference: ''for the eyes.'' This keeps
    the Hebrew idiom intact while remaining natural in English.'
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to behold
  - to look on
  lexicon: HALOT
  rationale: The infinitive of ראה is straightforwardly 'to see.' 'Behold' is too
    elevated for the translation philosophy, and 'look on' adds nuance not required
    by the text.
- source_word: אֶת־הַשמש
  chosen: the sun
  lexicon: HALOT
  rationale: Direct object marker plus noun with article yields 'the sun.' In Ecclesiastes,
    seeing the sun can connote being alive and experiencing earthly life, but the
    main text should preserve the literal expression.
