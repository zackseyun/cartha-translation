theological_decisions:
- issue: Whether to make explicit the idiomatic sense of 'seeing the sun' as enjoying
    life
  chosen_reading: Retain the literal expression 'to see the sun' in the main text
  alternative_readings:
  - to enjoy life
  - to look upon the sunlight
  rationale: Ecclesiastes often uses 'under the sun' and related solar imagery idiomatically
    for earthly life. Here, however, the Hebrew remains concrete and poetic. Preserving
    the literal wording maintains the imagery and lets the life-affirming implication
    remain implicit rather than interpreted for the reader.
  doctrine_reference: Translation philosophy §§1, 3, 6
