theological_decisions:
- issue: Generic masculine in הָאָדָם
  chosen_reading: a man
  alternative_readings:
  - a person
  - one
  - humankind
  rationale: The Hebrew singular masculine is representative/generic rather than specifically
    male-exclusive. Following the doctrine's gender-accurate principle, the translation
    retains 'man' rather than neutralizing it, while understanding the statement as
    generally applicable to humanity.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    adam'
- issue: Rendering of הָבֶל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - breath
  - meaningless
  rationale: The book's recurring term should be rendered consistently where possible.
    'Vapor' preserves the metaphor of transience and insubstantiality without importing
    the stronger interpretive claim 'meaningless.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
