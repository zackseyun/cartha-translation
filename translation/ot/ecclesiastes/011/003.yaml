id: ECC.11.3
reference: Ecclesiastes 11:3
source:
  edition: WLC
  text: אִם יִמָּלְא֨וּ הֶ/עָבִ֥ים גֶּ֨שֶׁם֙ עַל הָ/אָ֣רֶץ יָרִ֔יקוּ וְ/אִם יִפּ֥וֹל
    עֵ֛ץ בַּ/דָּר֖וֹם וְ/אִ֣ם בַּ/צָּפ֑וֹן מְק֛וֹם שֶׁ/יִּפּ֥וֹל הָ/עֵ֖ץ שָׁ֥ם יְהֽוּא־־־׃
translation:
  text: If the clouds are full of rain, they pour it out on the earth; and if a tree
    falls to the south or to the north, in the place where the tree falls, there it
    will lie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there it will be.' The Hebrew verb is simply 'be,'
      but 'lie' conveys the sense naturally in English for a fallen tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלְאוּ
  chosen: are full
  alternatives:
  - are filled
  lexicon: HALOT
  rationale: Nifal imperfect of מלא expresses becoming full or being filled. In English,
    'are full' is the most natural stative rendering in this conditional clause, while
    preserving the sense that the clouds have reached fullness.
- source_word: הֶעָבִים
  chosen: the clouds
  lexicon: HALOT
  rationale: Standard rendering of עבים in this weather context.
- source_word: גֶּשֶׁם
  chosen: rain
  alternatives:
  - with rain
  lexicon: HALOT
  rationale: 'Object/complement of fullness: the clouds are full of rain. English
    idiom requires ''of rain'' rather than a more wooden ''full rain.'''
- source_word: יָרִיקוּ
  chosen: pour it out
  alternatives:
  - empty themselves
  - pour out
  lexicon: HALOT
  rationale: Hifil of ריק means to empty out or pour out. 'Pour it out' makes explicit
    the implied object ('rain') in natural English while preserving the image of discharge
    from full clouds.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the land
  - on the land
  lexicon: HALOT
  rationale: Both 'earth' and 'land' are possible for ארץ. Here the broader sense
    fits the proverb-like observation about nature; 'on the earth' is idiomatic and
    traditional without being archaic.
- source_word: יִפּוֹל עֵץ
  chosen: a tree falls
  alternatives:
  - a tree should fall
  lexicon: HALOT
  rationale: Simple conditional with imperfect verb; English present 'falls' best
    matches proverbial force.
- source_word: בַּדָּרוֹם
  chosen: to the south
  alternatives:
  - in the south
  - southward
  lexicon: HALOT
  rationale: With נפל, the directional sense 'to the south' is most natural in English.
- source_word: בַּצָּפוֹן
  chosen: to the north
  alternatives:
  - in the north
  - northward
  lexicon: HALOT
  rationale: Parallel to 'to the south'; directional sense suits the falling tree
    image.
- source_word: מְקוֹם שֶׁיִּפּוֹל הָעֵץ
  chosen: in the place where the tree falls
  alternatives:
  - where the tree falls
  lexicon: HALOT
  rationale: Retains the explicit noun 'place' from the Hebrew rather than compressing
    the clause too much, preserving the aphoristic structure.
- source_word: שָׁם יְהוּא
  chosen: there it will lie
  alternatives:
  - there it will be
  - there it remains
  lexicon: HALOT
  rationale: The verb is simply 'be,' but in context of a fallen tree English idiom
    prefers 'lie.' This is a modest contextual specification rather than paraphrase,
    conveying the resultant state intended by the proverb.
