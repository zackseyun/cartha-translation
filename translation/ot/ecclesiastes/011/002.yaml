theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: This is not a doctrinally contested issue, but it affects the verse's
    scope. The broader 'earth' suits Qoheleth's general reflection on unpredictable
    calamity, while 'land' would localize it more narrowly. The main text keeps the
    broader sense and preserves the alternative in a footnote for auditability.
