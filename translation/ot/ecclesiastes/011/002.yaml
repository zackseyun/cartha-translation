id: ECC.11.2
reference: Ecclesiastes 11:2
source:
  edition: WLC
  text: תֶּן חֵ֥לֶק לְ/שִׁבְעָ֖ה וְ/גַ֣ם לִ/שְׁמוֹנָ֑ה כִּ֚י לֹ֣א תֵדַ֔ע מַה יִּהְיֶ֥ה
    רָעָ֖ה עַל הָ/אָֽרֶץ־־־׃
translation:
  text: Give a portion to seven, and even to eight, for you do not know what disaster
    will happen on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the land.' The Hebrew אֶרֶץ can mean either 'earth' or 'land' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּן
  chosen: Give
  alternatives:
  - Cast
  - Send
  - Distribute
  lexicon: HALOT
  rationale: Qal imperative 2ms of נתן, here a direct exhortation. 'Give' is the plain
    and natural imperative in context.
- source_word: חֵלֶק
  chosen: a portion
  alternatives:
  - share
  - part
  lexicon: HALOT
  rationale: חלק commonly denotes a portion or share. 'A portion' preserves the concrete
    sense while fitting the idiom of distributing resources.
- source_word: לְשִׁבְעָה ... וְגַם לִשְׁמוֹנָה
  chosen: to seven, and even to eight
  alternatives:
  - among seven, even among eight
  - to seven or even to eight
  lexicon: HALOT
  rationale: The Hebrew numeric formula 'to seven, and even to eight' is a known idiom
    for broad or generous distribution beyond a complete number. Retaining the numbers
    preserves the literary form rather than flattening it into paraphrase.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' is concise and natural
    in English.
- source_word: לֹא תֵדַע
  chosen: you do not know
  alternatives:
  - you cannot know
  - you never know
  lexicon: HALOT
  rationale: The imperfect with negation states lack of knowledge. 'You do not know'
    is more formally aligned than the idiomatic 'you never know.'
- source_word: מַה יִּהְיֶה
  chosen: what ... will happen
  alternatives:
  - what will be
  - what may come
  lexicon: HALOT
  rationale: היה here denotes future occurrence. 'Will happen' communicates eventive
    force more clearly in English than the wooden 'will be.'
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - misfortune
  lexicon: HALOT
  rationale: In this context רעה refers not to moral evil but harmful circumstance
    or calamity. 'Disaster' best conveys the concrete sense of adverse events coming
    upon the land/earth.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the land
  - in the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In Ecclesiastes' broad wisdom setting,
    'earth' fits the general scope, though 'land' remains possible. 'On the earth'
    is idiomatic with the preceding verb of happening.
