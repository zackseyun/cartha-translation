id: ECC.6.3
reference: Ecclesiastes 6:3
source:
  edition: WLC
  text: אִם יוֹלִ֣יד אִ֣ישׁ מֵאָ֡ה וְ/שָׁנִים֩ רַבּ֨וֹת יִֽחְיֶ֜ה וְ/רַ֣ב שֶׁ/יִּהְי֣וּ
    יְמֵֽי שָׁנָ֗י/ו וְ/נַפְשׁ/וֹ֙ לֹא תִשְׂבַּ֣ע מִן הַ/טּוֹבָ֔ה וְ/גַם קְבוּרָ֖ה
    לֹא הָ֣יְתָה לּ֑/וֹ אָמַ֕רְתִּי ט֥וֹב מִמֶּ֖/נּוּ הַ/נָּֽפֶל־׀־־־־־׃
translation:
  text: If a man fathers a hundred children and lives many years, however many the
    days of his years may be, but his soul is not satisfied with good, and he does
    not even have burial, I say that the stillborn child is better off than he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the miscarriage' or 'the untimely birth' for 'the stillborn child.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his soul is not satisfied with good'; 'soul' may also be understood
      as 'self' or, in context, 'appetite.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I said'; the Hebrew perfect may be rendered either as a past statement
      or as a present discourse formula here.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  lexicon: HALOT
  rationale: Introduces a hypothetical conditional scenario. 'If' is the most straightforward
    English equivalent here.
- source_word: יוֹלִיד אִישׁ מֵאָה
  chosen: a man fathers a hundred children
  alternatives:
  - a man begets a hundred children
  - a man has a hundred children
  lexicon: HALOT
  rationale: Hiphil of ילד is causative/generative, naturally rendered 'fathers' in
    idiomatic English. 'Begets' is more formal/archaic; 'has' is too weak and loses
    the procreative force.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Gender-accurate rendering per translation philosophy. The Hebrew is grammatically
    masculine singular and presents a representative case; 'a man' preserves the source
    form better than a neutral substitute.
- source_word: וְשָׁנִים רַבּוֹת יִחְיֶה
  chosen: and lives many years
  alternatives:
  - and lives long years
  - and lives for many years
  lexicon: HALOT
  rationale: Natural English rendering of the clause; preserves the emphasis on longevity
    without awkwardness.
- source_word: וְרַב שֶׁיִּהְיוּ יְמֵי שָׁנָיו
  chosen: however many the days of his years may be
  alternatives:
  - and numerous are the days of his years
  - and the days of his years are many
  lexicon: HALOT
  rationale: This clause intensifies the previous statement about long life. The chosen
    rendering captures the concessive/intensifying force in readable English while
    retaining the Hebrew imagery of 'days' and 'years.'
- source_word: וְנַפְשׁוֹ
  chosen: his soul
  alternatives:
  - he himself
  - his appetite
  - his life
  lexicon: HALOT
  rationale: נפשׁ can denote soul, self, life, or appetite depending on context. Here
    the phrase 'his soul is not satisfied' is idiomatic in Qoheleth and preserves
    the anthropological texture of the Hebrew better than flattening it to 'he.'
- source_word: לֹא תִשְׂבַּע מִן הַטּוֹבָה
  chosen: is not satisfied with good
  alternatives:
  - does not enjoy good things
  - is not satisfied from prosperity
  - is not filled with good
  lexicon: HALOT
  rationale: The verb שבע means 'be satisfied, filled.' הַטּוֹבָה in Ecclesiastes
    often refers broadly to what is good/enjoyable in life, not merely moral good.
    'Satisfied with good' preserves the wording while remaining understandable.
- source_word: וְגַם קְבוּרָה לֹא הָיְתָה לּוֹ
  chosen: and he does not even have burial
  alternatives:
  - and even burial is not his
  - and he is not granted burial
  - and he has no burial
  lexicon: HALOT
  rationale: The clause states the deprivation of burial as an additional indignity.
    'Does not even have burial' conveys both the simple predication and the force
    of גַם ('even/also').
- source_word: אָמַרְתִּי
  chosen: I say
  alternatives:
  - I said
  lexicon: HALOT
  rationale: Although morphologically perfect, Qoheleth often uses this form in a
    discourse-present sense introducing a judgment. 'I say' reads naturally in English
    and fits the immediate evaluative statement.
- source_word: טוֹב מִמֶּנּוּ
  chosen: is better off than he
  alternatives:
  - is better than he
  - is better off than him
  lexicon: HALOT
  rationale: The comparison concerns condition or state, not moral quality. 'Better
    off' makes the existential comparison explicit in idiomatic English.
- source_word: הַנָּפֶל
  chosen: the stillborn child
  alternatives:
  - the miscarriage
  - the untimely birth
  lexicon: HALOT
  rationale: נפל here refers to a miscarried or stillborn infant. 'Stillborn child'
    is clear, concrete, and fits the comparison in context; 'miscarriage' can sound
    more abstract, and 'untimely birth' is less immediately clear to modern readers.
