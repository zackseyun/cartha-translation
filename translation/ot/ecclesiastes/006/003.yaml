theological_decisions:
- issue: Anthropological nuance of נֶפֶשׁ in wisdom literature
  chosen_reading: Rendered as 'his soul' rather than reducing it to 'he' or 'his appetite.'
  alternative_readings:
  - he is not satisfied with good
  - his appetite is not satisfied with good
  rationale: The verse is not making a technical doctrinal statement about the soul,
    but the Hebrew term carries more depth than a mere pronoun. Preserving 'soul'
    maintains the literary and anthropological texture without importing later doctrinal
    precision.
  doctrine_reference: Translation philosophy §3, §6
- issue: Gendered representative language
  chosen_reading: Rendered אִישׁ as 'a man.'
  alternative_readings:
  - someone
  - a person
  rationale: The source uses masculine singular representative language. Per the stated
    philosophy, gender-accurate rendering is preferred over flattening to gender-neutral
    English unless context requires otherwise.
  doctrine_reference: Translation philosophy §4
