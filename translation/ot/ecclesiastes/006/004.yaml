id: ECC.6.4
reference: Ecclesiastes 6:4
source:
  edition: WLC
  text: כִּֽי בַ/הֶ֥בֶל בָּ֖א וּ/בַ/חֹ֣שֶׁךְ יֵלֵ֑ךְ וּ/בַ/חֹ֖שֶׁךְ שְׁמ֥/וֹ יְכֻסֶּֽה־׃
translation:
  text: For he comes in vanity and goes in darkness, and in darkness his name is covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in futility' or 'like a vapor.' The Hebrew הֶבֶל is a key term in Ecclesiastes,
      often expressing transience, emptiness, or futility.
    reason: lexical_alternative
  - marker: b
    text: '''His name is covered'' may mean that his identity or memory remains in
      obscurity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the prior statement. 'For' fits the discourse
    flow in English while preserving the causal/explanatory force.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - breath
  - vapor
  - futility
  lexicon: HALOT
  rationale: Ecclesiastes uses הבל as a thematic term with a semantic range including
    breath-like transience and futility. 'Vanity' preserves the traditional Qoheleth
    resonance and works idiomatically in this clause ('comes in vanity'), while alternatives
    such as 'vapor' are possible but less natural here.
- source_word: בָּא
  chosen: comes
  alternatives:
  - has come
  - enters
  lexicon: HALOT
  rationale: The qatal here states the manner of this one's arrival/existence. Present-tense
    English gives a gnomic sense appropriate to the context and pairs naturally with
    'goes'.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - obscurity
  - gloom
  lexicon: HALOT
  rationale: The noun is repeated twice for rhetorical effect. 'Darkness' is the most
    direct rendering and preserves both literal and metaphorical resonance of obscurity
    and non-remembrance.
- source_word: יֵלֵךְ
  chosen: goes
  alternatives:
  - departs
  - walks away
  lexicon: HALOT
  rationale: In context this refers to departure, likely from life/existence. 'Goes'
    is simple and preserves the Hebrew idiom without over-interpreting it as explicitly
    'dies'.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: A literal rendering is best. In context 'name' carries the sense of identity
    or remembrance, but the text itself says 'name' and should remain so.
- source_word: יְכֻסֶּה
  chosen: is covered
  alternatives:
  - will be covered
  - is hidden
  - is concealed
  lexicon: HALOT
  rationale: The passive conveys that his name is enveloped or obscured. 'Is covered'
    is the most direct equivalent and preserves the image. Present English matches
    the gnomic description of the stillborn child in context.
