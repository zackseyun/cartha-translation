theological_decisions:
- issue: Rendering of אָדָם in a generic singular context
  chosen_reading: man
  alternative_readings:
  - person
  - humankind
  rationale: The Hebrew uses generic singular אָדָם. Following the project's gender-accurate
    policy, 'man' best matches the representative singular while still referring to
    humanity generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: fleeting life
  alternative_readings:
  - vanity
  - vapor
  - breath
  rationale: The immediate context is the brevity and insubstantiality of human life.
    'Fleeting life' communicates the Qoheleth theme in idiomatic English while preserving
    the semantic force of transience. A more literal alternative is preserved in a
    footnote for auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
