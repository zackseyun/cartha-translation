id: ECC.6.9
reference: Ecclesiastes 6:9
source:
  edition: WLC
  text: ט֛וֹב מַרְאֵ֥ה עֵינַ֖יִם מֵֽ/הֲלָךְ נָ֑פֶשׁ גַּם זֶ֥ה הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־־׃
translation:
  text: Better is the sight of the eyes than the wandering of the appetite; this too
    is vapor and a chasing after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what the eyes see' instead of 'the sight of the eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the soul' or 'desire' for 'the appetite'; the Hebrew nephesh here likely
      refers to craving or the desiring self rather than the immaterial soul.
    reason: lexical_alternative
  - marker: c
    text: Or 'and striving after wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Good is
  lexicon: HALOT
  rationale: In a comparative construction with מִן implied by מֵהֲלָךְ, טוֹב is best
    rendered idiomatically as 'Better is' rather than the more wooden 'Good is.'
- source_word: מַרְאֵה עֵינַיִם
  chosen: the sight of the eyes
  alternatives:
  - what the eyes see
  - the seeing of the eyes
  lexicon: HALOT
  rationale: מַרְאֶה denotes appearance/sight/what is seen. The construct with 'eyes'
    is retained fairly closely as 'the sight of the eyes,' preserving the concrete
    imagery while remaining intelligible English.
- source_word: מֵהֲלָךְ
  chosen: than the wandering of
  alternatives:
  - than the going of
  - than the roaming of
  lexicon: HALOT
  rationale: From הלך, the noun conveys movement or going. In context it describes
    restless movement in contrast to present sight; 'wandering' captures the unsettled,
    roaming sense better than the overly literal 'going.'
- source_word: נָפֶשׁ
  chosen: the appetite
  alternatives:
  - the soul
  - the desire
  - the self
  lexicon: HALOT
  rationale: In Ecclesiastes, נֶפֶשׁ often refers to the desiring self or appetite
    rather than the immaterial soul in a later theological sense. 'Appetite' best
    fits the contrast between present enjoyment and restless craving.
- source_word: גַּם זֶה
  chosen: this too
  alternatives:
  - this also
  lexicon: HALOT
  rationale: A natural modern-English rendering of the discourse formula, preserving
    Qoheleth's repetitive evaluative style.
- source_word: הֶבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  lexicon: HALOT
  rationale: '''Vapor'' preserves the metaphor of transience/insubstantiality more
    concretely for modern readers than the tradition-bound ''vanity.'''
- source_word: וּרְעוּת רוּחַ
  chosen: and a chasing after wind
  alternatives:
  - and striving after wind
  - and shepherding wind
  lexicon: HALOT
  rationale: This recurring Ecclesiastes idiom likely conveys futile pursuit. 'Chasing
    after wind' is idiomatic and accessible, while preserving the image of futile
    effort. 'Shepherding wind' is more formally possible but obscure in English.
