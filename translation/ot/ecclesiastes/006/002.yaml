theological_decisions:
- issue: Rendering of לְנַפְשׁוֹ
  chosen_reading: for himself
  alternative_readings:
  - for his soul
  rationale: In this wisdom context, נֶפֶשׁ functions idiomatically for the person/self
    rather than making a technical statement about the immaterial soul. Rendering
    it 'for himself' avoids importing anthropological claims the text does not make
    while preserving the sense.
  doctrine_reference: Translation philosophy §1, §3
- issue: Representative masculine language
  chosen_reading: man
  alternative_readings:
  - person
  - someone
  rationale: The Hebrew uses masculine singular אִישׁ in a representative wisdom saying.
    Per the gender-accurate policy, 'man' is retained rather than neutralized to 'person.'
  doctrine_reference: Translation philosophy §4
