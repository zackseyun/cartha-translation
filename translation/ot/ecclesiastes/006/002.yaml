id: ECC.6.2
reference: Ecclesiastes 6:2
source:
  edition: WLC
  text: אִ֣ישׁ אֲשֶׁ֣ר יִתֶּן ל֣/וֹ הָ/אֱלֹהִ֡ים עֹשֶׁר֩ וּ/נְכָסִ֨ים וְ/כָב֜וֹד וְֽ/אֵינֶ֨/נּוּ
    חָסֵ֥ר לְ/נַפְשׁ֣/וֹ מִ/כֹּ֣ל אֲשֶׁר יִתְאַוֶּ֗ה וְ/לֹֽא יַשְׁלִיטֶ֤/נּוּ הָֽ/אֱלֹהִים֙
    לֶ/אֱכֹ֣ל מִמֶּ֔/נּוּ כִּ֛י אִ֥ישׁ נָכְרִ֖י יֹֽאכֲלֶ֑/נּוּ זֶ֥ה הֶ֛בֶל וָ/חֳלִ֥י
    רָ֖ע הֽוּא־׀־־׃
translation:
  text: There is a man to whom God gives riches, possessions, and honor, so that he
    lacks nothing for himself of all that he desires, yet God does not empower him
    to eat from them, because a foreign man eats them. This is vanity and a grievous
    sickness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foreigner' / 'a stranger.' The Hebrew says literally 'a foreign man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to eat from them,' a concrete expression for enjoying or benefiting
      from one's possessions.
    reason: lexical_alternative
  - marker: c
    text: Or 'vapor' or 'futility' for 'vanity' (Hebrew hebel), a key term in Ecclesiastes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֲשֶׁר
  chosen: There is a man to whom
  alternatives:
  - A man whom
  - A man to whom
  lexicon: HALOT
  rationale: The verse opens elliptically with אִישׁ אֲשֶׁר ('a man who/whom'). English
    reads more naturally by supplying 'There is' while preserving the indefinite singular
    'man,' consistent with gender-accurate policy for representative masculine usage.
- source_word: יִתֶּן לוֹ הָאֱלֹהִים
  chosen: God gives
  alternatives:
  - God has given
  - God grants
  lexicon: HALOT
  rationale: The imperfect here functions generically in a wisdom observation, so
    present tense in English best captures the proverbial force. 'Gives' is straightforward
    and avoids over-interpretation.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: '''Riches'' fits Qoheleth''s diction and pairs well with the following
    concrete terms. ''Wealth'' is possible, but ''riches'' better preserves the rhetorical
    accumulation.'
- source_word: נְכָסִים
  chosen: possessions
  alternatives:
  - property
  - assets
  lexicon: HALOT
  rationale: This term denotes material holdings. 'Possessions' is natural modern
    English and distinct enough from 'riches' to preserve the list's nuance.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this human social context, 'honor' better conveys status/prestige
    than the more exalted 'glory'.
- source_word: וְאֵינֶנּוּ חָסֵר לְנַפְשׁוֹ
  chosen: so that he lacks nothing for himself
  alternatives:
  - and he lacks nothing for his soul
  - and nothing is lacking to him
  lexicon: HALOT
  rationale: לְנַפְשׁוֹ here idiomatically refers to the person/self rather than an
    anthropological 'soul' in a technical sense. 'For himself' communicates the idiom
    clearly without importing a dualistic reading.
- source_word: מִכֹּל אֲשֶׁר יִתְאַוֶּה
  chosen: of all that he desires
  alternatives:
  - of all that he craves
  - of all that he longs for
  lexicon: HALOT
  rationale: This phrase qualifies the completeness of what he has. 'Desires' is broad
    and readable; 'craves' would sound more negative than the context requires.
- source_word: וְלֹא יַשְׁלִיטֶנּוּ הָאֱלֹהִים
  chosen: yet God does not empower him
  alternatives:
  - but God does not allow him
  - but God does not give him power
  lexicon: HALOT
  rationale: The Hiphil of שלט conveys causing to have mastery/power. 'Empower' captures
    the causative nuance better than the flatter 'allow,' while remaining idiomatic.
- source_word: לֶאֱכֹל מִמֶּנּוּ
  chosen: to eat from them
  alternatives:
  - to enjoy them
  - to consume from it
  lexicon: HALOT
  rationale: The Hebrew literally says 'to eat from it,' referring to enjoying the
    benefits of the possessions. I retained the concrete metaphor 'eat from' rather
    than interpretive 'enjoy,' since Ecclesiastes frequently uses eating language
    for enjoyment.
- source_word: אִישׁ נָכְרִי
  chosen: a foreign man
  alternatives:
  - a stranger
  - a foreigner
  lexicon: HALOT
  rationale: נָכְרִי denotes someone foreign/alien. Because אִישׁ is explicit, 'a
    foreign man' preserves both words. 'Foreigner' is smoother English and is preserved
    in a footnote as a lexical alternative.
- source_word: יֹאכֲלֶנּוּ
  chosen: eats them
  alternatives:
  - consumes it
  - enjoys it
  lexicon: HALOT
  rationale: The suffix is singular but refers collectively to the wealth/possessions/honor
    complex. English plural 'them' avoids awkwardness while preserving the concrete
    'eat' imagery.
- source_word: זֶה הֶבֶל
  chosen: This is vanity
  alternatives:
  - This is vapor
  - This is futility
  lexicon: HALOT
  rationale: Ecclesiastes' key term הֶבֶל is traditionally rendered 'vanity'; although
    'vapor' highlights transience and 'futility' highlights frustration, 'vanity'
    remains a concise, recognizable rendering here.
- source_word: וָחֳלִי רָע
  chosen: and a grievous sickness
  alternatives:
  - and an evil illness
  - and a severe affliction
  lexicon: HALOT
  rationale: חֳלִי is sickness/illness, and רָע intensifies it as bad/grievous. 'Grievous
    sickness' is idiomatic and preserves the metaphor of a deeply harmful condition.
