id: ECC.6.7
reference: Ecclesiastes 6:7
source:
  edition: WLC
  text: כָּל עֲמַ֥ל הָ/אָדָ֖ם לְ/פִ֑י/הוּ וְ/גַם הַ/נֶּ֖פֶשׁ לֹ֥א תִמָּלֵֽא־־׃
translation:
  text: All a man's labor is for his mouth, yet even his appetite is not filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''soul'': ''yet even the soul is not filled.'' Here נֶפֶשׁ likely refers
      to desire or appetite in the context of eating and satisfaction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier introducing the totality of what follows; 'All' is idiomatic
    and concise in English.
- source_word: עֲמַל
  chosen: labor
  alternatives:
  - toil
  - work
  lexicon: HALOT
  rationale: In Ecclesiastes this term often carries the sense of burdensome human
    exertion; 'labor' preserves that weight better than the flatter 'work.'
- source_word: הָאָדָם
  chosen: a man's
  alternatives:
  - humanity's
  - the man's
  lexicon: HALOT
  rationale: אָדָם here is generic rather than referring to a specific individual.
    Per doctrine, gender-accurate rendering is preferred where representative force
    is present, so 'a man's' preserves the generic singular better than an abstract
    plural or neutral paraphrase.
- source_word: לְפִיהוּ
  chosen: for his mouth
  alternatives:
  - for his appetite
  - for his food
  lexicon: HALOT
  rationale: Literally 'for his mouth.' The concrete image should be preserved in
    the main clause rather than immediately interpreted. It denotes what is consumed
    by the mouth, i.e., sustenance.
- source_word: וְגַם
  chosen: yet even
  alternatives:
  - and also
  - and even
  lexicon: HALOT
  rationale: 'The conjunction plus additive particle marks more than simple addition
    here; in context it introduces a contrastive irony. ''Yet even'' captures the
    rhetorical turn: despite all labor for the mouth, something remains unsatisfied.'
- source_word: הַנֶּפֶשׁ
  chosen: appetite
  alternatives:
  - soul
  - desire
  - self
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' 'self,' or the seat of desire. In this
    immediate context of mouth, eating, and satisfaction, 'appetite' best conveys
    the concrete sense without importing later dualistic connotations of 'soul.' The
    more literal alternative is preserved in a footnote.
- source_word: לֹא תִמָּלֵא
  chosen: is not filled
  alternatives:
  - is not satisfied
  - will not be filled
  lexicon: HALOT
  rationale: Niphal of מלא means 'be filled.' 'Is not filled' keeps the imagery of
    fullness and aligns with the concrete language of mouth/appetite. 'Satisfied'
    is interpretive and therefore left as an alternative rather than the main rendering.
