theological_decisions:
- issue: Rendering of אָדָם in a generic statement
  chosen_reading: a man's
  alternative_readings:
  - humankind's
  - the human person's
  rationale: The verse speaks proverbially about human labor in general. Following
    the doctrine's gender-accurate principle and the contested-terms guidance for
    אָדָם ('man / humankind' depending on context), the generic singular 'a man's'
    best matches the Hebrew form and representative force.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
- issue: Rendering of נֶפֶשׁ in a non-anthropological, appetite-related context
  chosen_reading: appetite
  alternative_readings:
  - soul
  - desire
  - self
  rationale: 'This is a lexical-contextual decision with theological implications:
    translating נֶפֶשׁ as ''soul'' here could suggest a body/soul contrast not demanded
    by the Hebrew. In context, Qoheleth speaks of bodily consumption and ongoing craving,
    so ''appetite'' preserves the sense without importing doctrinal anthropology beyond
    the text.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition'
