theological_decisions:
- issue: Generic sense of אָדָם
  chosen_reading: for man
  alternative_readings:
  - for humankind
  rationale: The Hebrew singular generic noun refers to humanity rather than an individual
    male. Following the stated gender-accurate policy, 'man' best matches the source
    form and representative force, while the inclusive sense is preserved in a footnote
    for clarity.
