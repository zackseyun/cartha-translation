theological_decisions:
- issue: Whether to identify the stronger one explicitly as God
  chosen_reading: 'Leave the referent implicit: ''one stronger than he'''
  alternative_readings:
  - Explicitly identify the referent as God
  rationale: The context strongly suggests a power greater than man, plausibly God,
    but the Hebrew does not name God here. To preserve the text's rhetorical force
    and avoid importing an explicit doctrinal identification beyond the wording, the
    translation keeps the referent implicit.
  doctrine_reference: Translation philosophy §1, §3
