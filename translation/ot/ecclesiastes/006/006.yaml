id: ECC.6.6
reference: Ecclesiastes 6:6
source:
  edition: WLC
  text: וְ/אִלּ֣וּ חָיָ֗ה אֶ֤לֶף שָׁנִים֙ פַּעֲמַ֔יִם וְ/טוֹבָ֖ה לֹ֣א רָאָ֑ה הֲ/לֹ֛א
    אֶל מָק֥וֹם אֶחָ֖ד הַ/כֹּ֥ל הוֹלֵֽךְ־׃
translation:
  text: Even if he should live a thousand years twice over and not see good, do not
    all go to one place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two thousand years'; literally, 'a thousand years twice.'
    reason: lexical_alternative
  - marker: b
    text: '''See good'' is a Hebrew idiom meaning to experience or enjoy what is good.'
    reason: lexical_alternative
  - marker: c
    text: That is, the same destination in death; the Hebrew says only 'one place.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִלּוּ
  chosen: Even if
  alternatives:
  - and if
  - even though
  lexicon: HALOT
  rationale: Introduces a concessive/hypothetical clause. 'Even if' captures the force
    naturally in English better than a simple 'and if.'
- source_word: חָיָה
  chosen: he should live
  alternatives:
  - he lived
  - he were to live
  lexicon: HALOT
  rationale: Qal perfect after concessive particle functions in a hypothetical sense.
    'Should live' conveys the unreal or concessive scenario smoothly in English.
- source_word: אֶלֶף שָׁנִים פַּעֲמַיִם
  chosen: a thousand years twice over
  alternatives:
  - two thousand years
  - a thousand years twice
  lexicon: HALOT
  rationale: Literally 'a thousand years twice.' 'Twice over' preserves the idiomatic
    emphasis while remaining readable. It avoids flattening the Hebrew expression
    into a bare numeral, though 'two thousand years' is a valid interpretive equivalent.
- source_word: וְטוֹבָה
  chosen: good
  alternatives:
  - prosperity
  - well-being
  - happiness
  lexicon: HALOT
  rationale: טוֹבָה here denotes experiential good or enjoyment of life's benefits
    in context. 'Good' preserves the broader semantic range and echoes Ecclesiastes'
    recurring vocabulary without over-specifying.
- source_word: לֹא רָאָה
  chosen: not see
  alternatives:
  - not experience
  - not enjoy
  lexicon: HALOT
  rationale: Hebrew 'see' often extends to experience, but the literal verb is important
    in Qoheleth's style. 'Not see good' preserves the idiom while remaining intelligible.
- source_word: הֲלֹא
  chosen: do not
  alternatives:
  - is it not that
  - surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Do not' in 'do
    not all go...' is idiomatic English for this function.
- source_word: אֶל מָקוֹם אֶחָד
  chosen: to one place
  alternatives:
  - to the same place
  lexicon: HALOT
  rationale: Literally 'to one place.' This likely refers to the common destination
    of death/the grave. 'One place' preserves the Hebrew wording and rhetorical force.
- source_word: הַכֹּל
  chosen: all
  alternatives:
  - everyone
  - everything
  lexicon: HALOT
  rationale: In context the referent is all people under discussion, not all things
    whatsoever. 'All' preserves the concise Hebrew while fitting the rhetorical question.
- source_word: הוֹלֵךְ
  chosen: go
  alternatives:
  - are going
  - walk
  lexicon: HALOT
  rationale: The participle expresses a general present reality. English simple present
    'go' works naturally in a gnomic statement.
