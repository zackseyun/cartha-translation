theological_decisions:
- issue: Implied destination of 'one place'
  chosen_reading: Retain the understated expression 'one place' without explicating
    it as Sheol, the grave, or death in the main text.
  alternative_readings:
  - the same place
  - the grave
  - death
  rationale: The Hebrew leaves the destination implicit, relying on context and rhetoric.
    To specify 'grave' or 'Sheol' would interpret beyond the wording. Preserving the
    ambiguity aligns with the philosophy of not importing claims the text does not
    make.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
