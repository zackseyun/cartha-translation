id: ECC.6.1
reference: Ecclesiastes 6:1
source:
  edition: WLC
  text: יֵ֣שׁ רָעָ֔ה אֲשֶׁ֥ר רָאִ֖יתִי תַּ֣חַת הַ/שָּׁ֑מֶשׁ וְ/רַבָּ֥ה הִ֖יא עַל הָ/אָדָֽם־׃
translation:
  text: 'There is an evil that I have seen under the sun, and it weighs heavily on
    man:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on humankind' / 'on mankind.' Hebrew 'man' (אָדָם) is generic here,
      referring to humanity in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle introducing the observation; 'There is' is the most
    natural modern English equivalent.
- source_word: רָעָה
  chosen: an evil
  alternatives:
  - a misfortune
  - an evil thing
  lexicon: HALOT
  rationale: In Ecclesiastes this noun can denote something bad, grievous, or calamitous.
    'An evil' preserves the Hebrew's moral/experiential weight without over-specifying.
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I have seen
  alternatives:
  - which I have seen
  - that I saw
  lexicon: HALOT
  rationale: Relative clause with Qal perfect 1cs. Present perfect in English fits
    Qoheleth's reflective observation naturally.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: Standard Ecclesiastes idiom for life in the earthly realm; 'under the
    sun' is both accurate and idiomatic.
- source_word: וְרַבָּה הִיא
  chosen: and it weighs heavily
  alternatives:
  - and it is great
  - and it is grievous
  - and it is widespread
  lexicon: HALOT
  rationale: The adjective רבה literally means 'great/much,' but in this construction
    with עַל it conveys burdensome severity or prevalence. 'Weighs heavily' captures
    the idiomatic force in readable English.
- source_word: עַל הָאָדָם
  chosen: on man
  alternatives:
  - upon man
  - on humankind
  - for mankind
  lexicon: HALOT
  rationale: אָדָם here is generic singular referring to humanity. Per doctrine, gender-accurate
    rendering is preferred where representative force is present; 'man' preserves
    the singular generic sense. The burden nuance of עַל is reflected by 'on.'
