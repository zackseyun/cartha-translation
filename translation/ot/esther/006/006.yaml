id: EST.6.6
reference: Esther 6:6
source:
  edition: WLC
  text: וַ/יָּבוֹא֮ הָמָן֒ וַ/יֹּ֤אמֶר ל/וֹ֙ הַ/מֶּ֔לֶךְ מַה לַ/עֲשׂ֕וֹת בָּ/אִ֕ישׁ
    אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֣ץ בִּ/יקָר֑/וֹ וַ/יֹּ֤אמֶר הָמָן֙ בְּ/לִבּ֔/וֹ לְ/מִ֞י
    יַחְפֹּ֥ץ הַ/מֶּ֛לֶךְ לַ/עֲשׂ֥וֹת יְקָ֖ר יוֹתֵ֥ר מִמֶּֽ/נִּי־׃
translation:
  text: So Haman came in, and the king said to him, “What should be done for the man
    whom the king delights to honor?” And Haman said in his heart, “Whom would the
    king delight to honor more than me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And Haman said to himself.' The Hebrew reads literally, 'said in his
      heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבוֹא
  chosen: So Haman came in
  alternatives:
  - Then Haman came in
  - And Haman entered
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Came in' is natural English for entering
    the king's presence; 'So' reflects the narrative continuation without sounding
    wooden.
- source_word: וַיֹּאמֶר לוֹ הַמֶּלֶךְ
  chosen: and the king said to him
  alternatives:
  - and the king asked him
  lexicon: HALOT
  rationale: אָמַר is the standard verb 'say.' Although the content is a question,
    retaining 'said to him' stays closer to the Hebrew while remaining idiomatic.
- source_word: מַה לַעֲשׂוֹת
  chosen: What should be done
  alternatives:
  - What is to be done
  - What ought to be done
  lexicon: HALOT
  rationale: The infinitive construction expresses what ought to be done in this circumstance.
    'Should be done' is idiomatic and preserves the passive sense implied by the context.
- source_word: בָּאִישׁ
  chosen: for the man
  alternatives:
  - for a man
  - to the man
  lexicon: HALOT
  rationale: With the preposition ב and this idiom after מַה לַעֲשׂוֹת, English naturally
    uses 'for the man.' The article points to a specific but as-yet-unnamed person.
- source_word: אֲשֶׁר הַמֶּלֶךְ חָפֵץ
  chosen: whom the king delights
  alternatives:
  - in whom the king takes pleasure
  - whom the king desires
  lexicon: HALOT
  rationale: חָפֵץ conveys pleasure or delight rather than mere desire here. 'Delights'
    fits the courtly context and pairs well with the following honor language.
- source_word: בִּיקָרוֹ
  chosen: to honor
  alternatives:
  - to show honor to him
  - to glorify him
  lexicon: HALOT
  rationale: יְקָר/יקר in this context denotes honor bestowed by the king. Rendering
    the phrase as 'delights to honor' is smoother English than a more literal 'delights
    in his honor' while preserving the sense.
- source_word: וַיֹּאמֶר הָמָן בְּלִבּוֹ
  chosen: And Haman said in his heart
  alternatives:
  - And Haman said to himself
  - And Haman thought
  lexicon: HALOT
  rationale: The Hebrew idiom is literally internal speech. 'Said in his heart' preserves
    the source imagery; it remains understandable in modern English.
- source_word: לְמִי יַחְפֹּץ הַמֶּלֶךְ
  chosen: Whom would the king delight
  alternatives:
  - For whom would the king desire
  - Whom would the king wish
  lexicon: HALOT
  rationale: Using 'delight' again preserves lexical consistency with חָפֵץ earlier
    in the verse. The modal 'would' reflects Haman's rhetorical inference.
- source_word: לַעֲשׂוֹת יְקָר
  chosen: to honor
  alternatives:
  - to bestow honor on
  - to do honor to
  lexicon: HALOT
  rationale: The collocation means to confer honor. 'To honor' is concise, natural,
    and semantically accurate.
- source_word: יוֹתֵר מִמֶּנִּי
  chosen: more than me
  alternatives:
  - more than I
  - more than myself
  lexicon: HALOT
  rationale: Comparative phrase expressing Haman's self-regard. 'More than me' is
    standard contemporary English and fits the internal monologue.
