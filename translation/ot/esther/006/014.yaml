id: EST.6.14
reference: Esther 6:14
source:
  edition: WLC
  text: עוֹדָ/ם֙ מְדַבְּרִ֣ים עִמּ֔/וֹ וְ/סָרִיסֵ֥י הַ/מֶּ֖לֶךְ הִגִּ֑יעוּ וַ/יַּבְהִ֨לוּ֙
    לְ/הָבִ֣יא אֶת הָמָ֔ן אֶל הַ/מִּשְׁתֶּ֖ה אֲשֶׁר עָשְׂתָ֥ה אֶסְתֵּֽר־־־׃
translation:
  text: While they were still speaking with him, the king’s eunuchs arrived and hurried
    to bring Haman to the banquet that Esther had prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s officials,' since the Hebrew term can denote court functionaries
      as well as eunuchs.
    reason: lexical_alternative
  - marker: b
    text: Or 'hastened' or 'rushed to bring Haman'; the Hebrew verb here conveys urgent
      speed.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדָם
  chosen: still
  alternatives:
  - yet
  - while still
  lexicon: HALOT
  rationale: 'With the participle מְדַבְּרִים, this adverbial form marks ongoing action
    not yet completed: ''while they were still...'' rather than a simple temporal
    ''again'' or ''yet'' standing alone.'
- source_word: מְדַבְּרִים
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: The participle conveys ongoing speech. 'Speaking' fits the narrative
    register better than the more casual 'talking'.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' In English, 'speaking with
    him' preserves the Hebrew relation more closely than 'speaking to him,' though
    the latter is possible idiomatically.
- source_word: סָרִיסֵי
  chosen: eunuchs
  alternatives:
  - officials
  - court officials
  lexicon: HALOT
  rationale: סָרִיס often denotes court officials and can in some contexts mean chamberlains,
    but its basic and common sense is 'eunuch.' In the Persian court setting of Esther,
    'the king’s eunuchs' is both natural and more transparent to the source than the
    generalized 'officials'.
- source_word: הִגִּיעוּ
  chosen: arrived
  alternatives:
  - came
  - reached
  lexicon: HALOT
  rationale: The verb indicates coming/arriving at the scene. 'Arrived' gives the
    narrative sense clearly in modern English.
- source_word: וַיַּבְהִלוּ
  chosen: hurried
  alternatives:
  - hastened
  - urged quickly
  - rushed
  lexicon: HALOT
  rationale: 'The Hiphil of בהל can mean to hurry or to terrify/alarm depending on
    context. Here, with the infinitive ''to bring Haman,'' the sense is causative
    haste: they acted quickly to bring him. ''Hurried'' is idiomatic and avoids implying
    emotional panic as the main point.'
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to take
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the eunuchs arrived and hurried in
    order to bring Haman. ''Bring'' is the standard rendering of בוא in Hiphil here.'
- source_word: הַמִּשְׁתֶּה
  chosen: the banquet
  alternatives:
  - the feast
  - the drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה refers to a feast/banquet, often with wine. In Esther, 'banquet'
    is the most natural English rendering for the royal setting.
- source_word: אֲשֶׁר עָשְׂתָה אֶסְתֵּר
  chosen: that Esther had prepared
  alternatives:
  - that Esther had made
  - which Esther had given
  lexicon: HALOT
  rationale: 'Although עשה is literally ''made/did,'' English idiom for a banquet
    is ''prepared.'' The pluperfect ''had prepared'' fits the sequence: the banquet
    was already arranged before the eunuchs came for Haman.'
