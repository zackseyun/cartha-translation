id: EST.6.11
reference: Esther 6:11
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח הָמָן֙ אֶת הַ/לְּב֣וּשׁ וְ/אֶת הַ/סּ֔וּס וַ/יַּלְבֵּ֖שׁ אֶֽת מָרְדֳּכָ֑י
    וַ/יַּרְכִּיבֵ֨/הוּ֙ בִּ/רְח֣וֹב הָ/עִ֔יר וַ/יִּקְרָ֣א לְ/פָנָ֔י/ו כָּ֚כָה יֵעָשֶׂ֣ה
    לָ/אִ֔ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֥ץ בִּ/יקָרֽ/וֹ־־־׃
translation:
  text: So Haman took the robe and the horse, clothed Mordecai, led him on horseback
    through the city square, and proclaimed before him, “This is what is done for
    the man whom the king delights to honor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “made him ride through the city square.” The Hebrew verb is causative:
      Haman caused Mordecai to ride in the public procession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְּבוּשׁ
  chosen: the robe
  alternatives:
  - the garment
  - the clothing
  lexicon: HALOT
  rationale: Definite singular noun referring back to the specific royal garment mentioned
    in the immediate context. 'Robe' is idiomatic and suitably dignified in context,
    better than the broader 'clothing.'
- source_word: הַסּוּס
  chosen: the horse
  alternatives:
  - the royal horse
  lexicon: HALOT
  rationale: The Hebrew says simply 'the horse' with the article. Because the royal
    association is established in the preceding verse, the main text keeps the simpler
    wording rather than importing 'royal' here.
- source_word: וַיַּלְבֵּשׁ אֶת מָרְדֳּכָי
  chosen: clothed Mordecai
  alternatives:
  - dressed Mordecai
  lexicon: HALOT
  rationale: The Hiphil of לבש means to clothe someone. 'Clothed' preserves the directness
    and formality of the Hebrew better than the more colloquial 'dressed.'
- source_word: וַיַּרְכִּיבֵהוּ
  chosen: led him on horseback
  alternatives:
  - made him ride
  - caused him to ride
  - mounted him
  lexicon: HALOT
  rationale: The causative verb from רכב means to cause someone to ride. In English
    narrative, 'led him on horseback' communicates the public procession naturally
    while implying Haman's attendant role. A more literal alternative like 'made him
    ride' is possible but less idiomatic in this context.
- source_word: בִּרְחוֹב הָעִיר
  chosen: through the city square
  alternatives:
  - in the open square of the city
  - through the plaza of the city
  - through the street of the city
  lexicon: HALOT
  rationale: רְחוֹב commonly denotes a broad public place or square rather than an
    ordinary street. 'City square' best captures the civic-public setting in natural
    English.
- source_word: וַיִּקְרָא לְפָנָיו
  chosen: and proclaimed before him
  alternatives:
  - and called out before him
  - and cried out ahead of him
  lexicon: HALOT
  rationale: קרא in this context is a public heralding cry. 'Proclaimed before him'
    conveys formal public announcement. 'Before him' preserves the spatial wording
    without over-specifying whether Haman walked ahead.
- source_word: כָּכָה יֵעָשֶׂה
  chosen: This is what is done
  alternatives:
  - Thus shall it be done
  - So it is done
  lexicon: HALOT
  rationale: This rendering preserves the passive sense and demonstrative force in
    clear modern English. It balances formal accuracy with readability.
- source_word: לָאִישׁ
  chosen: for the man
  alternatives:
  - for a man
  lexicon: HALOT
  rationale: 'The prefixed article indicates a definite/generic singular: ''the man.''
    This also aligns with the repeated court formula in the passage. It is gender-accurate
    to the Hebrew singular masculine.'
- source_word: חָפֵץ בִּיקָרוֹ
  chosen: delights to honor
  alternatives:
  - takes pleasure in honoring
  - desires to honor
  - wishes to honor
  lexicon: HALOT
  rationale: חפץ expresses pleasure or delight, and יקר here denotes honor bestowed.
    'Delights to honor' preserves both the king's favorable disposition and the honorific
    result in concise English.
