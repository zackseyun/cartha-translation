id: EST.6.4
reference: Esther 6:4
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ מִ֣י בֶ/חָצֵ֑ר וְ/הָמָ֣ן בָּ֗א לַ/חֲצַ֤ר בֵּית הַ/מֶּ֨לֶךְ֙
    הַ/חִ֣יצוֹנָ֔ה לֵ/אמֹ֣ר לַ/מֶּ֔לֶךְ לִ/תְלוֹת֙ אֶֽת מָרְדֳּכַ֔י עַל הָ/עֵ֖ץ אֲשֶׁר
    הֵכִ֥ין לֽ/וֹ־־־־׃
translation:
  text: And the king said, “Who is in the court?” Now Haman had come into the outer
    court of the king’s palace to speak to the king about hanging Mordecai on the
    gallows that he had prepared for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew עֵץ literally means 'tree' or 'wood'; here it refers to the execution
      structure Haman had prepared, hence 'gallows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶחָצֵר / לַחֲצַר
  chosen: court / court
  alternatives:
  - courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes an enclosed court or courtyard. 'Court' is concise and
    natural in English, while preserving the palace setting. The repeated noun is
    rendered consistently, with the second instance expanded by context as 'outer
    court' because of הַחִיצוֹנָה.
- source_word: וְהָמָן בָּא
  chosen: Now Haman had come
  alternatives:
  - And Haman came
  - Meanwhile, Haman had come
  lexicon: HALOT
  rationale: The clause supplies background to the king’s question. Rendering with
    past perfect ('had come') communicates the Hebrew narrative relation in idiomatic
    English. 'Now' marks the scene shift without overstating temporal sequence.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s palace
  alternatives:
  - the king’s house
  lexicon: HALOT
  rationale: Literally 'house of the king,' but in this royal context 'palace' is
    the natural English equivalent and avoids misleading domestic connotations of
    'house'.
- source_word: הַחִיצוֹנָה
  chosen: outer
  alternatives:
  - outside
  - external
  lexicon: HALOT
  rationale: The adjective distinguishes this court from an inner court. 'Outer' is
    the standard and clearest English rendering.
- source_word: לֵאמֹר לַמֶּלֶךְ
  chosen: to speak to the king
  alternatives:
  - to tell the king
  - to say to the king
  lexicon: HALOT
  rationale: The infinitive of אמר after a motion/background clause often indicates
    purpose of audience or speech. 'To speak to the king' is idiomatic and broad enough
    to cover the intended request.
- source_word: לִתְלוֹת
  chosen: about hanging
  alternatives:
  - to hang
  lexicon: HALOT
  rationale: Because it depends on 'to speak to the king,' English idiom prefers 'about
    hanging' rather than the more wooden 'to speak ... to hang.' The underlying action
    remains explicit.
- source_word: הָעֵץ
  chosen: the gallows
  alternatives:
  - the tree
  - the stake
  - the wooden pole
  lexicon: HALOT
  rationale: עֵץ literally means 'tree' or 'wood,' but in Esther it refers to an execution
    device prepared for impalement/hanging. 'Gallows' is the conventional and contextually
    intelligible rendering in English, though the Hebrew term is broader than a modern
    gallows.
- source_word: אֲשֶׁר הֵכִין לוֹ
  chosen: that he had prepared for him
  alternatives:
  - which he had prepared for him
  lexicon: HALOT
  rationale: 'The pronoun most naturally refers to Mordecai in context: Haman prepared
    the execution device for Mordecai. Past perfect fits the prior preparation relative
    to the current scene.'
