id: EST.6.10
reference: Esther 6:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ לְ/הָמָ֗ן מַ֠הֵר קַ֣ח אֶת הַ/לְּב֤וּשׁ וְ/אֶת הַ/סּוּס֙
    כַּ/אֲשֶׁ֣ר דִּבַּ֔רְתָּ וַֽ/עֲשֵׂה כֵן֙ לְ/מָרְדֳּכַ֣י הַ/יְּהוּדִ֔י הַ/יּוֹשֵׁ֖ב
    בְּ/שַׁ֣עַר הַ/מֶּ֑לֶךְ אַל תַּפֵּ֣ל דָּבָ֔ר מִ/כֹּ֖ל אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־־׃
translation:
  text: Then the king said to Haman, “Hurry, take the robe and the horse, just as
    you have said, and do so for Mordecai the Jew, who sits at the king’s gate. Leave
    out nothing from all that you have said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Do not let a thing fall from all that you have said,”
      an idiom meaning to omit nothing.
    reason: lexical_alternative
  - marker: b
    text: “The Jew” could also be rendered “the Judean,” but here it most likely marks
      Mordecai’s ethnic-religious identity within the story.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֵר
  chosen: Hurry
  alternatives:
  - Quickly
  - Make haste
  lexicon: HALOT
  rationale: Imperative calling for immediate action. 'Hurry' is natural modern English
    and preserves the urgency without archaic tone.
- source_word: קַח
  chosen: take
  alternatives:
  - fetch
  - get
  lexicon: HALOT
  rationale: Basic imperative of לקח. 'Take' is the most direct and formally close
    rendering in this command sequence.
- source_word: הַלְּבוּשׁ
  chosen: the robe
  alternatives:
  - the garment
  - the clothing
  lexicon: HALOT
  rationale: In context this refers to the royal garment described in the previous
    verse. 'Robe' is more idiomatic and contextually specific than the broader 'garment'
    or 'clothing'.
- source_word: הַסּוּס
  chosen: the horse
  alternatives:
  - the royal horse
  lexicon: HALOT
  rationale: The noun itself is simply 'the horse.' Although the context implies a
    royal horse, that modifier is not explicit here, so the main text keeps the simpler
    form.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: just as you have said
  alternatives:
  - as you said
  - according to what you said
  lexicon: HALOT
  rationale: This phrase explicitly ties the king's command to Haman's own proposal.
    'Just as you have said' preserves that rhetorical force and the perfect aspect
    naturally in English.
- source_word: וַעֲשֵׂה כֵן
  chosen: and do so
  alternatives:
  - and do this
  - and act accordingly
  lexicon: HALOT
  rationale: Compact idiomatic rendering of the imperative plus adverb. 'Do so' is
    natural and sufficiently formal.
- source_word: לְמָרְדֳּכַי
  chosen: for Mordecai
  alternatives:
  - to Mordecai
  lexicon: HALOT
  rationale: English idiom prefers 'do so for Mordecai' in this benefactive context.
- source_word: הַיְּהוּדִי
  chosen: the Jew
  alternatives:
  - the Judean
  lexicon: HALOT
  rationale: In Esther, יְהוּדִי conventionally denotes Jewish identity rather than
    merely geographic origin. 'The Jew' is the standard and clearest rendering here.
- source_word: הַיּוֹשֵׁב בְּשַׁעַר הַמֶּלֶךְ
  chosen: who sits at the king’s gate
  alternatives:
  - who is sitting at the king's gate
  - who dwells at the king's gate
  lexicon: HALOT
  rationale: The participle identifies Mordecai by his known position. 'Who sits at
    the king's gate' is a natural English relative clause and preserves the durative
    descriptive sense.
- source_word: אַל תַּפֵּל דָּבָר מִכֹּל אֲשֶׁר דִּבַּרְתָּ
  chosen: Leave out nothing from all that you have said
  alternatives:
  - Do not omit anything from all that you have said
  - Let nothing fall from all that you have said
  lexicon: HALOT
  rationale: The idiom with נפל literally suggests letting something fall, but in
    context means omitting nothing. 'Leave out nothing' communicates the force clearly
    in modern English while preserving the comprehensiveness of the command.
