id: EST.6.12
reference: Esther 6:12
source:
  edition: WLC
  text: וַ/יָּ֥שָׁב מָרְדֳּכַ֖י אֶל שַׁ֣עַר הַ/מֶּ֑לֶךְ וְ/הָמָן֙ נִדְחַ֣ף אֶל בֵּית֔/וֹ
    אָבֵ֖ל וַ/חֲפ֥וּי רֹֽאשׁ־־׃
translation:
  text: Then Mordecai returned to the king’s gate, but Haman hurried to his house,
    mourning and with his head covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was driven to his house,' preserving the passive force of the Hebrew
      verb.
    reason: lexical_alternative
  - marker: b
    text: Covering the head was a cultural sign of grief, humiliation, or mourning.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  lexicon: HALOT
  rationale: שׁוּב in the waw-consecutive narrative form here denotes returning to
    a prior place or station. 'Returned' is natural modern English and preserves the
    directional sense.
- source_word: שַׁעַר הַמֶּלֶךְ
  chosen: the king’s gate
  alternatives:
  - the royal gate
  lexicon: HALOT
  rationale: A straightforward construct chain meaning the gate associated with the
    king/palace complex. 'The king’s gate' is the established and plain sense.
- source_word: נִדְחַף
  chosen: hurried
  alternatives:
  - was driven
  - was pushed along
  - rushed
  lexicon: HALOT
  rationale: The Niphal of דחף can suggest being driven or impelled. In context Haman
    leaves in shame immediately after humiliation; English 'hurried' captures the
    resultant motion idiomatically without implying an external agent not stated explicitly
    in the verse. The stronger passive nuance is preserved as an alternative.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: Literal possessive noun; 'house' is slightly more formal and matches
    the narrative register.
- source_word: אָבֵל
  chosen: mourning
  alternatives:
  - grieving
  - in mourning
  lexicon: HALOT
  rationale: The adjective describes Haman's state of lament/distress. 'Mourning'
    works adverbially in English and fits the concise Hebrew style.
- source_word: חֲפוּי רֹאשׁ
  chosen: with his head covered
  alternatives:
  - his head covered
  lexicon: HALOT
  rationale: This idiom denotes public shame or grief expressed by covering the head.
    The translation keeps the concrete image rather than replacing it with an interpretive
    gloss such as 'in disgrace'.
