id: EST.6.1
reference: Esther 6:1
source:
  edition: WLC
  text: בַּ/לַּ֣יְלָה הַ/ה֔וּא נָדְדָ֖ה שְׁנַ֣ת הַ/מֶּ֑לֶךְ וַ/יֹּ֗אמֶר לְ/הָבִ֞יא
    אֶת סֵ֤פֶר הַ/זִּכְרֹנוֹת֙ דִּבְרֵ֣י הַ/יָּמִ֔ים וַ/יִּהְי֥וּ נִקְרָאִ֖ים לִ/פְנֵ֥י
    הַ/מֶּֽלֶךְ־׃
translation:
  text: On that night the king could not sleep, so he ordered the book of records,
    the chronicles, to be brought, and they were read before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the king's sleep fled.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the book of remembrances, the annals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּלַּיְלָה הַהוּא
  chosen: On that night
  alternatives:
  - During that night
  - That night
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the specific night in the narrative.
    'On that night' is natural English and preserves the demonstrative specificity.
- source_word: נָדְדָה שְׁנַת הַמֶּלֶךְ
  chosen: the king could not sleep
  alternatives:
  - the king's sleep fled
  - the sleep of the king was driven away
  lexicon: HALOT
  rationale: Literally, 'the king's sleep fled/wandered away.' English idiom favors
    'could not sleep,' which communicates the sense clearly without over-literal awkwardness.
    The underlying image is preserved in alternatives.
- source_word: וַיֹּאמֶר
  chosen: so he ordered
  alternatives:
  - and he said
  - and he commanded
  lexicon: HALOT
  rationale: Though formally 'and he said,' the verb introduces a directive. 'So he
    ordered' reflects the speech act in context and reads naturally in English narrative.
- source_word: לְהָבִיא
  chosen: to be brought
  alternatives:
  - to bring
  - to have brought
  lexicon: HALOT
  rationale: Infinitive after 'he ordered' expresses the content of the command. Passive
    English ('to be brought') is idiomatic because unnamed attendants would carry
    it out.
- source_word: סֵפֶר הַזִּכְרֹנוֹת
  chosen: the book of records
  alternatives:
  - the book of remembrances
  - the memorial book
  lexicon: HALOT
  rationale: זכרונות refers to records kept for remembrance. 'Book of records' is
    clear modern English and fits royal archival context.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the chronicles
  alternatives:
  - the events of the days
  - the daily annals
  - the annals
  lexicon: HALOT
  rationale: This construct phrase commonly denotes annalistic records. 'The chronicles'
    is a standard and accurate rendering here, functioning appositionally to 'the
    book of records.'
- source_word: וַיִּהְיוּ נִקְרָאִים
  chosen: and they were read
  alternatives:
  - and it was read
  - and they began to be read
  lexicon: HALOT
  rationale: Plural verb and participle agree with the plural sense of the records/chronicles
    being read aloud. 'They were read' preserves the passive ongoing action without
    unnecessary expansion.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  - to the king
  lexicon: HALOT
  rationale: לפני literally means 'before/in the presence of.' 'Before the king' is
    concise and idiomatic, while still implying a reading in his presence.
