id: EST.6.5
reference: Esther 6:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ נַעֲרֵ֤י הַ/מֶּ֨לֶךְ֙ אֵלָ֔י/ו הִנֵּ֥ה הָמָ֖ן עֹמֵ֣ד בֶּ/חָצֵ֑ר
    וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ יָבֽוֹא׃
translation:
  text: The king’s attendants said to him, “Look, Haman is standing in the court.”
    And the king said, “Let him come in.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the courtyard.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי הַמֶּלֶךְ
  chosen: the king’s attendants
  alternatives:
  - the king’s young men
  - the king’s servants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    In a royal court setting, 'attendants' best conveys palace function in natural
    English without implying age.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Here
  lexicon: HALOT
  rationale: הִנֵּה is a deictic/interjection drawing attention. 'Look' preserves
    the immediacy in readable modern English better than the archaic 'Behold.'
- source_word: עֹמֵד
  chosen: is standing
  alternatives:
  - stands
  - is waiting
  lexicon: HALOT
  rationale: The participle denotes a present state. 'Is standing' reflects the ongoing
    posture more directly than the simple present 'stands.' 'Is waiting' is interpretive
    and therefore avoided in the main text.
- source_word: בֶּחָצֵר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: חָצֵר refers to a court/courtyard. In a palace context, 'court' is idiomatic
    and concise, while 'courtyard' remains a viable alternative preserved in a footnote.
- source_word: יָבֹא
  chosen: Let him come in
  alternatives:
  - Let him enter
  - He may come in
  lexicon: HALOT
  rationale: The jussive/imperfect here expresses the king’s command or permission.
    'Let him come in' is natural English that preserves the directive force and the
    implied movement into the king’s presence.
- source_word: הָמָן
  chosen: Haman
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
