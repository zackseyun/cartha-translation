id: EST.6.7
reference: Esther 6:7
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הָמָ֖ן אֶל הַ/מֶּ֑לֶךְ אִ֕ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֥ץ בִּ/יקָרֽ/וֹ־׃
translation:
  text: And Haman said to the king, “For the man whom the king delights to honor—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'a man whom the king delights to honor.' The Hebrew אִישׁ
      is singular masculine and can be read indefinitely, but English idiom in this
      context favors 'the man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: הָמָן
  chosen: Haman
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense with indirect object of speech.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title with article; straightforwardly rendered 'the king' in
    both occurrences.
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - a man
  - the person
  lexicon: HALOT
  rationale: Although אִישׁ can be indefinite ('a man'), in this idiom introducing
    the object of the king's favor, English reads more naturally with 'the man whom
    the king delights to honor,' anticipating the specific though unnamed individual.
    'Person' would flatten the masculine singular form; gender-accurate policy favors
    'man'.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to a person; 'whom' is the most precise English
    equivalent in this construction.
- source_word: חָפֵץ
  chosen: delights
  alternatives:
  - takes pleasure
  - desires
  - wishes
  lexicon: HALOT
  rationale: The verb conveys pleasure or delight, not mere volition. 'Delights' preserves
    the nuance better than the flatter 'wants' or 'wishes.'
- source_word: בִּיקָרוֹ
  chosen: to honor
  alternatives:
  - to show honor to him
  - to glorify him
  lexicon: HALOT
  rationale: 'The noun יְקָר denotes honor, esteem, or distinction. In English this
    clause is most naturally expressed verbally: ''to honor.'' ''Glorify'' would be
    too elevated in this courtly context.'
