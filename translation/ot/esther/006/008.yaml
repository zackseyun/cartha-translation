id: EST.6.8
reference: Esther 6:8
source:
  edition: WLC
  text: יָבִ֨יאוּ֙ לְב֣וּשׁ מַלְכ֔וּת אֲשֶׁ֥ר לָֽבַשׁ בּ֖/וֹ הַ/מֶּ֑לֶךְ וְ/ס֗וּס
    אֲשֶׁ֨ר רָכַ֤ב עָלָי/ו֙ הַ/מֶּ֔לֶךְ וַ/אֲשֶׁ֥ר נִתַּ֛ן כֶּ֥תֶר מַלְכ֖וּת בְּ/רֹאשֽׁ/וֹ־׃
translation:
  text: Let them bring a royal robe that the king has worn, and a horse on which the
    king has ridden, and on whose head a royal crown has been placed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and which a royal crown was placed on its head.' The
      pronoun most naturally refers to the horse, though some readers have understood
      it to refer to the king.
    reason: alternative_reading
lexical_decisions:
- source_word: יָבִיאוּ
  chosen: Let them bring
  alternatives:
  - They should bring
  - Let them bring forth
  lexicon: HALOT
  rationale: Hiphil imperfect 3mp of בוא in this context expresses a jussive-like
    instruction within direct speech. 'Let them bring' captures the volitional force
    naturally in English.
- source_word: לְבוּשׁ מַלְכוּת
  chosen: a royal robe
  alternatives:
  - royal clothing
  - a garment of royalty
  lexicon: HALOT
  rationale: The construct phrase denotes clothing associated with kingship. Singular
    'robe' is idiomatic and fits the context of a specific honorific garment better
    than the more generic 'clothing.'
- source_word: אֲשֶׁר לָבַשׁ בּוֹ הַמֶּלֶךְ
  chosen: that the king has worn
  alternatives:
  - which the king wore
  - that the king put on
  lexicon: HALOT
  rationale: The relative clause identifies the robe as one actually worn by the king.
    English omits the literal preposition 'in it' as unidiomatic; 'has worn' gives
    a natural perfect sense with present relevance.
- source_word: וְסוּס
  chosen: and a horse
  alternatives:
  - and the horse
  lexicon: HALOT
  rationale: Although anarthrous, the noun introduces the second item requested. Indefinite
    'a horse' is natural in English while still allowing the following relative clause
    to specify it.
- source_word: אֲשֶׁר רָכַב עָלָיו הַמֶּלֶךְ
  chosen: on which the king has ridden
  alternatives:
  - that the king rode on
  - which the king rode
  lexicon: HALOT
  rationale: The clause parallels the previous one and marks the horse as one used
    by the king himself. 'On which' preserves the preposition עַל more explicitly
    than a flatter English rendering.
- source_word: וַאֲשֶׁר נִתַּן
  chosen: and on whose ... has been placed
  alternatives:
  - and which was given
  - and upon which was set
  lexicon: HALOT
  rationale: The conjunction plus relative introduces a further description of the
    horse. Because the passive verb with the following prepositional phrase refers
    to placement on the horse's head, English is best restructured as 'on whose head
    ... has been placed' for clarity.
- source_word: כֶּתֶר מַלְכוּת
  chosen: a royal crown
  alternatives:
  - the royal crown
  - a crown of royalty
  lexicon: HALOT
  rationale: The phrase denotes a crown associated with kingship. 'Royal crown' is
    concise and idiomatic. The Hebrew lacks the article, so 'a royal crown' is preferable
    to 'the royal crown.'
- source_word: בְּרֹאשׁוֹ
  chosen: on whose head
  alternatives:
  - on its head
  - upon his head
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers to the horse, not the king, in the
    immediate syntax. 'Whose' avoids awkward repetition and preserves the referent.
    This is the plain sense in context, where the horse is being specially adorned
    for the honor procession.
