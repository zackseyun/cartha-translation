id: EST.6.13
reference: Esther 6:13
source:
  edition: WLC
  text: וַ/יְסַפֵּ֨ר הָמָ֜ן לְ/זֶ֤רֶשׁ אִשְׁתּ/וֹ֙ וּ/לְ/כָל אֹ֣הֲבָ֔י/ו אֵ֖ת כָּל
    אֲשֶׁ֣ר קָרָ֑/הוּ וַ/יֹּ֩אמְרוּ֩ ל֨/וֹ חֲכָמָ֜י/ו וְ/זֶ֣רֶשׁ אִשְׁתּ֗/וֹ אִ֣ם
    מִ/זֶּ֣רַע הַ/יְּהוּדִ֡ים מָרְדֳּכַ֞י אֲשֶׁר֩ הַחִלּ֨וֹתָ לִ/נְפֹּ֤ל לְ/פָנָי/ו֙
    לֹא תוּכַ֣ל ל֔/וֹ כִּֽי נָפ֥וֹל תִּפּ֖וֹל לְ/פָנָֽי/ו־־־־׃
translation:
  text: Then Haman told Zeresh his wife and all his friends everything that had happened
    to him. Then his wise men and Zeresh his wife said to him, “If Mordecai, before
    whom you have begun to fall, is from the seed of the Jews, you will not prevail
    against him, for you will surely fall before him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “is of Jewish descent.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  chosen: told
  alternatives:
  - recounted
  - related
  lexicon: HALOT
  rationale: Narrative wayyiqtol of ספר introducing reported events; 'told' is natural
    modern English and adequately conveys recounting without sounding overly formal.
- source_word: אֹהֲבָיו
  chosen: his friends
  alternatives:
  - his loved ones
  - those who loved him
  lexicon: HALOT
  rationale: Though literally 'his lovers/loving ones,' in this courtly-social context
    it refers to his associates or companions rather than romantic partners; 'friends'
    best fits idiomatic English.
- source_word: כָּל אֲשֶׁר קָרָהוּ
  chosen: everything that had happened to him
  alternatives:
  - all that befell him
  - everything that happened to him
  lexicon: HALOT
  rationale: קרה in this construction denotes what has happened or befallen someone.
    Past perfect 'had happened' fits the narrative sequence after the preceding events.
- source_word: חֲכָמָיו
  chosen: his wise men
  alternatives:
  - his advisers
  - his sages
  lexicon: HALOT
  rationale: The term literally means 'his wise men.' Since Esther has a Persian court
    setting where such figures function as counselors, 'wise men' preserves the lexical
    form while remaining understandable.
- source_word: אִם מִזֶּרַע הַיְּהוּדִים
  chosen: is from the seed of the Jews
  alternatives:
  - is of Jewish descent
  - is from the offspring of the Jews
  lexicon: HALOT
  rationale: זֶרַע is literally 'seed' and here denotes lineage/descent. 'From the
    seed of the Jews' preserves the Hebrew imagery while remaining intelligible; a
    smoother alternative is preserved in a footnote.
- source_word: הַחִלּוֹתָ לִנְפֹּל לְפָנָיו
  chosen: before whom you have begun to fall
  alternatives:
  - before whom you have begun to stumble
  - before whom you have started to fall
  lexicon: HALOT
  rationale: 'The infinitive with החל conveys inception: Haman has begun a downfall
    in relation to Mordecai. ''Fall'' should be retained because the repetition with
    the next clause is rhetorically important.'
- source_word: לֹא תוּכַל לוֹ
  chosen: you will not prevail against him
  alternatives:
  - you will not overcome him
  - you will not be able to stand against him
  lexicon: HALOT
  rationale: יכל + ל conveys ability in relation to another; in context it means Haman
    will not be able to overcome Mordecai. 'Prevail against' captures the adversative
    force idiomatically.
- source_word: נָפוֹל תִּפּוֹל
  chosen: you will surely fall
  alternatives:
  - you will certainly fall
  - falling, you will fall
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the certainty of the
    action. 'You will surely fall' is the standard English way to preserve that emphasis.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: The repeated phrase marks subordination/defeat in relation to Mordecai.
    'Before him' is concise and preserves the repetition.
