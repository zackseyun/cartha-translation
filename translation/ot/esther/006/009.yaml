id: EST.6.9
reference: Esther 6:9
source:
  edition: WLC
  text: וְ/נָת֨וֹן הַ/לְּב֜וּשׁ וְ/הַ/סּ֗וּס עַל יַד אִ֞ישׁ מִ/שָּׂרֵ֤י הַ/מֶּ֨לֶךְ֙
    הַֽ/פַּרְתְּמִ֔ים וְ/הִלְבִּ֨ישׁוּ֙ אֶת הָ/אִ֔ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֣ץ בִּֽ/יקָר֑/וֹ
    וְ/הִרְכִּיבֻ֤/הוּ עַל הַ/סּוּס֙ בִּ/רְח֣וֹב הָ/עִ֔יר וְ/קָרְא֣וּ לְ/פָנָ֔י/ו
    כָּ֚כָה יֵעָשֶׂ֣ה לָ/אִ֔ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֥ץ בִּ/יקָרֽ/וֹ־־־־׃
translation:
  text: And let the robe and the horse be entrusted to the hand of one of the king’s
    noble officials, and let them clothe the man whom the king delights to honor,
    and let them mount him on the horse through the open square of the city, and proclaim
    before him, ‘Thus shall it be done for the man whom the king delights to honor.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the king’s princes' or 'one of the king’s most noble officials';
      the Persian loanword פַּרְתְּמִים denotes high-ranking royal dignitaries.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רְחוֹב refers to a broad public square or open place in the city,
      not necessarily a street in the modern sense.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתוֹן
  chosen: let ... be entrusted
  alternatives:
  - let ... be given
  - and it shall be given
  lexicon: HALOT
  rationale: Passive/impersonal giving formula introducing the procedure. 'Be entrusted'
    brings out the following idiom עַל יַד ('into the hand of') more naturally than
    a bare 'be given,' while preserving the formal sense.
- source_word: הַלְּבוּשׁ
  chosen: the robe
  alternatives:
  - the garment
  - the clothing
  lexicon: HALOT
  rationale: Singular with article refers to the royal garment mentioned in the previous
    verse. 'Robe' fits the courtly context better than the broader 'garment' or 'clothing.'
- source_word: הַסּוּס
  chosen: the horse
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with article; context
    indicates the royal horse already introduced.
- source_word: עַל יַד
  chosen: to the hand of
  alternatives:
  - into the charge of
  - under the authority of
  lexicon: HALOT
  rationale: Hebrew idiom for placing something in someone's control. Main text keeps
    the concrete image with idiomatic English support from 'entrusted.'
- source_word: אִישׁ מִשָּׂרֵי הַמֶּלֶךְ הַפַּרְתְּמִים
  chosen: one of the king’s noble officials
  alternatives:
  - one of the king's princes
  - one of the king's most noble princes
  lexicon: HALOT
  rationale: אִישׁ here means 'one' or 'a man,' and שָׂרֵי ... הַפַּרְתְּמִים denotes
    high-ranking court officials. 'Noble officials' is readable modern English and
    preserves elite rank without the potentially misleading hereditary nuance of 'princes.'
- source_word: וְהִלְבִּישׁוּ
  chosen: let them clothe
  alternatives:
  - and they shall dress
  - let them array
  lexicon: HALOT
  rationale: Hiphil causative of לבשׁ, here with plural agents implied from the entrusted
    official and attendants or as a generalized procedural plural. 'Clothe' is direct
    and natural.
- source_word: הָאִישׁ אֲשֶׁר הַמֶּלֶךְ חָפֵץ בִּיקָרוֹ
  chosen: the man whom the king delights to honor
  alternatives:
  - the man whom the king desires to honor
  - the man in whose honor the king delights
  lexicon: HALOT
  rationale: חָפֵץ conveys pleasure/delight/desire, and יקר here denotes honor. 'Delights
    to honor' is idiomatic and preserves the king's favorable intention.
- source_word: וְהִרְכִּיבֻהוּ
  chosen: let them mount him
  alternatives:
  - let them cause him to ride
  - let them seat him
  lexicon: HALOT
  rationale: Hiphil of רכב means to cause to ride. 'Mount him' is concise and natural
    in English while preserving the causative sense.
- source_word: בִּרְחוֹב הָעִיר
  chosen: through the open square of the city
  alternatives:
  - through the city square
  - in the broad place of the city
  lexicon: HALOT
  rationale: רְחוֹב refers to a broad public place or square, not merely a street.
    'Open square of the city' preserves the public ceremonial setting.
- source_word: וְקָרְאוּ לְפָנָיו
  chosen: and proclaim before him
  alternatives:
  - and call out before him
  - and announce ahead of him
  lexicon: HALOT
  rationale: קרא with לְפָנָיו indicates public proclamation in front of the honored
    man/procession. 'Proclaim before him' captures the heraldic force.
- source_word: כָּכָה יֵעָשֶׂה
  chosen: Thus shall it be done
  alternatives:
  - So shall it be done
  - This is what shall be done
  lexicon: HALOT
  rationale: Formulaic proclamation. 'Thus shall it be done' preserves the elevated
    public style appropriate to the scene.
