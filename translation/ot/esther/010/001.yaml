id: EST.10.1
reference: Esther 10:1
source:
  edition: WLC
  text: וַ/יָּשֶׂם֩ הַ/מֶּ֨לֶךְ אחשרש מַ֛ס עַל הָ/אָ֖רֶץ וְ/אִיֵּ֥י הַ/יָּֽם׀־׃
translation:
  text: King Ahasuerus imposed tribute on the land and the islands of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coastlands' for 'islands of the sea.' The Hebrew term can denote islands
      or maritime coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'tax' or 'levy.' The Hebrew word can also refer in some contexts to forced
      labor or corvée service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: imposed
  alternatives:
  - set
  - laid
  lexicon: HALOT
  rationale: In the idiom שׂוּם מַס עַל, the verb means to levy or impose a tax/tribute
    rather than merely 'set.' 'Imposed' captures the administrative action in natural
    English while staying close to the Hebrew.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: With the following proper name, English idiom normally renders the title
    anarthrously as 'King Ahasuerus' rather than 'the king Ahasuerus.'
- source_word: אחשרש
  chosen: Ahasuerus
  rationale: Personal names are transliterated by standard convention. 'Ahasuerus'
    is the established English form for אֲחַשְׁוֵרוֹשׁ in Esther.
- source_word: מַס
  chosen: tribute
  alternatives:
  - forced labor
  - tax
  - levy
  lexicon: HALOT
  rationale: מַס can denote corvée labor or tribute/levy depending on context. Here
    the object is imposed broadly on 'the land and the islands of the sea,' favoring
    a fiscal/political tribute rather than labor service. 'Tribute' preserves the
    imperial sense better than the more generic 'tax.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard rendering in the taxation idiom; 'on' is natural modern English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this context הָאָרֶץ refers to territory under imperial rule, not
    the whole earth. 'The land' is broad enough to preserve the geopolitical sense
    without over-specifying.
- source_word: וְאִיֵּי הַיָּם
  chosen: and the islands of the sea
  alternatives:
  - and the coastlands
  - and the islands
  lexicon: HALOT
  rationale: אִיִּים can refer to islands or coastlands. The literal phrase 'islands
    of the sea' is retained because it is clear in English and preserves the Hebrew
    expression's geographic breadth, including distant maritime regions.
