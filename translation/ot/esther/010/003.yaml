id: EST.10.3
reference: Esther 10:3
source:
  edition: WLC
  text: כִּ֣י מָרְדֳּכַ֣י הַ/יְּהוּדִ֗י מִשְׁנֶה֙ לַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ וְ/גָדוֹל֙
    לַ/יְּהוּדִ֔ים וְ/רָצ֖וּי לְ/רֹ֣ב אֶחָ֑י/ו דֹּרֵ֥שׁ טוֹב֙ לְ/עַמּ֔/וֹ וְ/דֹבֵ֥ר
    שָׁל֖וֹם לְ/כָל זַרְעֽ/וֹ׀־׃
translation:
  text: For Mordecai the Jew was second to King Ahasuerus, great among the Jews, and
    favored by the multitude of his brothers, seeking good for his people and speaking
    peace to all his offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by most of his brothers'; the Hebrew phrase can denote either a multitude
      or a majority of his fellow Jews.
    reason: lexical_alternative
  - marker: b
    text: '''His brothers'' here likely means his fellow Jews or kinsmen, not only
      literal male siblings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to all his descendants.' The Hebrew 'offspring/seed' is a collective
      term.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding summary of Mordecai's
    prominence; 'For' preserves the connective force in natural English.
- source_word: הַיְּהוּדִי
  chosen: the Jew
  alternatives:
  - the Judean
  lexicon: HALOT
  rationale: In Esther, the term marks Mordecai's ethnic-religious identity within
    the Persian setting. 'The Jew' is the conventional and contextually clear rendering;
    'Judean' is possible but less fitting here because the emphasis is not geographic.
- source_word: מִשְׁנֶה לַמֶּלֶךְ
  chosen: second to King Ahasuerus
  alternatives:
  - second only to King Ahasuerus
  - vizier to King Ahasuerus
  lexicon: HALOT
  rationale: The noun denotes one in second rank relative to the king. 'Second to'
    is concise and close to the Hebrew; 'second only to' is interpretive but valid.
    'Vizier' is culturally suggestive but imports a specific office term not present
    in the text.
- source_word: וְגָדוֹל לַיְּהוּדִים
  chosen: great among the Jews
  alternatives:
  - great to the Jews
  - prominent among the Jews
  lexicon: HALOT
  rationale: The phrase describes Mordecai's stature in relation to the Jewish people.
    'Great among' communicates social prominence naturally in English.
- source_word: וְרָצוּי
  chosen: favored
  alternatives:
  - accepted
  - well-pleasing
  - esteemed
  lexicon: HALOT
  rationale: The passive participial/adjectival form indicates being received with
    approval. 'Favored' captures broad communal approval in idiomatic English.
- source_word: לְרֹב אֶחָיו
  chosen: by the multitude of his brothers
  alternatives:
  - by most of his brothers
  - by the majority of his brothers
  - by many of his brothers
  lexicon: HALOT
  rationale: רֹב often means 'multitude' or 'majority.' The phrase likely means the
    larger body of his fellow Jews. 'Multitude' preserves the quantitative sense without
    forcing the narrower 'majority.' 'Brothers' is retained per gender-accurate philosophy,
    with representative communal force.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his fellow Jews
  lexicon: HALOT
  rationale: Literally 'his brothers.' In context it refers to his fellow Jews more
    broadly, but the translation keeps the familial term and preserves the broader
    sense in a footnote.
- source_word: דֹּרֵשׁ טוֹב
  chosen: seeking good
  alternatives:
  - working for the good
  - promoting welfare
  lexicon: HALOT
  rationale: The participle plus object expresses active pursuit of benefit. 'Seeking
    good' is close to the Hebrew while remaining clear.
- source_word: לְעַמּוֹ
  chosen: for his people
  alternatives:
  - for his own people
  lexicon: HALOT
  rationale: Refers to Mordecai's people, the Jews. 'For his people' is direct and
    natural.
- source_word: וְדֹבֵר שָׁלוֹם
  chosen: and speaking peace
  alternatives:
  - and speaking well-being
  - and speaking for peace
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Speaking peace' preserves
    the Hebrew idiom and its broad resonance.
- source_word: לְכָל זַרְעוֹ
  chosen: to all his offspring
  alternatives:
  - to all his descendants
  - to all his seed
  lexicon: HALOT
  rationale: זֶרַע can denote offspring/descendants collectively. 'Offspring' is clear
    modern English and preserves the collective sense; 'seed' is too opaque here,
    and 'descendants' is also possible.
