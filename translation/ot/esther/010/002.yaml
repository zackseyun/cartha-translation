id: EST.10.2
reference: Esther 10:2
source:
  edition: WLC
  text: וְ/כָל מַעֲשֵׂ֤ה תָקְפּ/וֹ֙ וּ/גְב֣וּרָת֔/וֹ וּ/פָרָשַׁת֙ גְּדֻלַּ֣ת מָרְדֳּכַ֔י
    אֲשֶׁ֥ר גִּדְּל֖/וֹ הַ/מֶּ֑לֶךְ הֲ/לוֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֨פֶר֙ דִּבְרֵ֣י
    הַ/יָּמִ֔ים לְ/מַלְכֵ֖י מָדַ֥י וּ/פָרָֽס־־־׃
translation:
  text: And all the acts of his power and might, and the full account of the greatness
    of Mordecai, to which the king raised him—are they not written in the Book of
    the Chronicles of the Kings of Media and Persia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book of the annals of the kings of Media and Persia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  chosen: acts
  alternatives:
  - deeds
  - works
  lexicon: HALOT
  rationale: A broad term for what was done. 'Acts' fits the annalistic style of royal
    summary better than 'works' and is idiomatic in English historical prose.
- source_word: תָקְפּוֹ
  chosen: his power
  alternatives:
  - his authority
  - his strength
  lexicon: HALOT
  rationale: The noun denotes force, validity, or strength. In this royal context
    it points to Ahasuerus's effective power. 'Power' best captures political potency
    without narrowing to physical strength.
- source_word: גְבוּרָתוֹ
  chosen: might
  alternatives:
  - valor
  - strength
  lexicon: HALOT
  rationale: Used alongside תָקְפּוֹ, this term adds the sense of might or prowess.
    'Might' preserves the elevated register and avoids flattening the paired expression
    into repetition.
- source_word: וּפָרָשַׁת
  chosen: the full account
  alternatives:
  - the detailed account
  - the exposition
  lexicon: HALOT
  rationale: The noun refers to a full or detailed statement/account. 'Full account'
    communicates that what follows was set out in detail in the official record.
- source_word: גְּדֻלַּת מָרְדֳּכַי
  chosen: the greatness of Mordecai
  alternatives:
  - Mordecai's greatness
  - the exaltation of Mordecai
  lexicon: HALOT
  rationale: The construct phrase naturally means Mordecai's greatness or high status.
    'The greatness of Mordecai' preserves the formal tone and mirrors the Hebrew structure.
- source_word: אֲשֶׁר גִּדְּלוֹ הַמֶּלֶךְ
  chosen: to which the king raised him
  alternatives:
  - with which the king made him great
  - how the king promoted him
  lexicon: HALOT
  rationale: The verb גדל in the piel here means to make great or promote. 'Raised
    him' idiomatically conveys elevation in rank while keeping the relative linkage
    to Mordecai's greatness.
- source_word: הֲלוֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - surely they are written
  lexicon: HALOT
  rationale: This is a conventional rhetorical formula in biblical historiography.
    'Are they not written' preserves the literary echo and rhetorical question form.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the daily records
  - the book of the annals
  lexicon: HALOT
  rationale: A standard expression for an official chronicle/annals source. 'Book
    of the Chronicles' is recognizable and suitably formal; 'annals' is a viable alternative
    preserved in a footnote.
- source_word: לְמַלְכֵי מָדַי וּפָרָס
  chosen: of the Kings of Media and Persia
  alternatives:
  - for the kings of Media and Persia
  lexicon: HALOT
  rationale: Although לְ can often mean 'for,' in this source-title formula English
    idiom is best served by 'of,' indicating the chronicle belonging to or concerning
    the reigns of the kings of Media and Persia.
