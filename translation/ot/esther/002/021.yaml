id: EST.2.21
reference: Esther 2:21
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם וּ/מָרְדֳּכַ֖י יֹשֵׁ֣ב בְּ/שַֽׁעַר הַ/מֶּ֑לֶךְ קָצַף֩
    בִּגְתָ֨ן וָ/תֶ֜רֶשׁ שְׁנֵֽי סָרִיסֵ֤י הַ/מֶּ֨לֶךְ֙ מִ/שֹּׁמְרֵ֣י הַ/סַּ֔ף וַ/יְבַקְשׁוּ֙
    לִ/שְׁלֹ֣חַ יָ֔ד בַּ/מֶּ֖לֶךְ אֲחַשְׁוֵֽרֹשׁ־־׃
translation:
  text: In those days, while Mordecai was sitting at the king’s gate, Bigthan and
    Teresh, two of the king’s eunuchs from those who guarded the threshold, became
    angry and sought to lay hands on King Ahasuerus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s court officials'; the Hebrew term can refer more broadly
      to royal officers, though 'eunuchs' is likely in this court setting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to send out a hand against'; that is, to attack or assassinate
      the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - During those days
  - At that time
  lexicon: HALOT
  rationale: Standard temporal frame formula in narrative Hebrew. 'In those days'
    is idiomatic and preserves the broad temporal setting without over-specifying.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - was dwelling
  - sat
  lexicon: HALOT
  rationale: The participle with Mordecai in this narrative setting naturally conveys
    ongoing circumstance. 'Was sitting' fits the scene at the gate better than the
    broader 'dwelling.'
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  chosen: at the king’s gate
  alternatives:
  - in the king’s gate
  - at the royal gate
  lexicon: HALOT
  rationale: Refers to the official gate area associated with royal administration.
    'At the king’s gate' is natural English and preserves the institutional setting.
- source_word: קָצַף
  chosen: became angry
  alternatives:
  - were enraged
  - grew furious
  lexicon: HALOT
  rationale: Though morphologically singular, the verb precedes a compound subject
    and is understood distributively with Bigthan and Teresh. 'Became angry' is a
    clear, direct rendering without overstating intensity.
- source_word: סָרִיסֵי הַמֶּלֶךְ
  chosen: the king’s eunuchs
  alternatives:
  - the king’s officials
  - the king’s court officers
  lexicon: HALOT
  rationale: סָרִיס often denotes eunuchs in royal courts, though it can extend to
    court officials. In the Persian court context of Esther, 'eunuchs' is the more
    concrete and historically likely sense; the broader alternative is preserved in
    a footnote.
- source_word: מִשֹּׁמְרֵי הַסַּף
  chosen: from those who guarded the threshold
  alternatives:
  - keepers of the door
  - guards of the entrance
  lexicon: HALOT
  rationale: The phrase identifies their role among palace personnel. הַסַּף is literally
    'threshold,' likely referring to the doorway/entrance area. This rendering keeps
    the concrete image while remaining readable.
- source_word: וַיְבַקְשׁוּ
  chosen: sought
  alternatives:
  - attempted
  - plotted
  lexicon: HALOT
  rationale: The verb means 'to seek' and here introduces hostile intent. 'Sought'
    is formally closer; 'plotted' would import more interpretation than the verb itself
    states.
- source_word: לִשְׁלֹחַ יָד
  chosen: to lay hands on
  alternatives:
  - to attack
  - to strike
  lexicon: HALOT
  rationale: This idiom literally means 'to send/stretch out a hand' against someone
    and often implies violent action. 'Lay hands on' preserves the idiomatic force
    without prematurely narrowing it to a specific act; the more explicit sense is
    preserved in a footnote.
- source_word: אֲחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  alternatives:
  - Xerxes
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than replaced with a historical identification. 'Ahasuerus' reflects the Hebrew
    form; 'Xerxes' is a common historical identification but not the form in the text.
