id: EST.2.6
reference: Esther 2:6
source:
  edition: WLC
  text: אֲשֶׁ֤ר הָגְלָה֙ מִ/יר֣וּשָׁלַ֔יִם עִם הַ/גֹּלָה֙ אֲשֶׁ֣ר הָגְלְתָ֔ה עִ֖ם
    יְכָנְיָ֣ה מֶֽלֶךְ יְהוּדָ֑ה אֲשֶׁ֣ר הֶגְלָ֔ה נְבוּכַדְנֶאצַּ֖ר מֶ֥לֶךְ בָּבֶֽל־־׃
translation:
  text: who had been taken into exile from Jerusalem with the exiles who had been
    carried away with Jeconiah king of Judah, whom Nebuchadnezzar king of Babylon
    had taken into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who' may refer to Kish, Mordecai's ancestor, rather than to Mordecai
      himself, since Jeconiah's exile occurred generations earlier.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - which
  - whom
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause about Mordecai's deportation;
    'who' is natural English for the personal antecedent.
- source_word: הָגְלָה
  chosen: had been taken into exile
  alternatives:
  - had been carried away
  - had been exiled
  lexicon: HALOT
  rationale: 'From גלה in the causative/passive exile context. English passive best
    reflects the sense here: the person was deported. ''Taken into exile'' is clear
    modern English and preserves the forced nature of the action.'
- source_word: מִירוּשָׁלַיִם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward source-oriented rendering of the preposition and place
    name.
- source_word: עִם הַגּוֹלָה
  chosen: with the exiles
  alternatives:
  - with the deportees
  - with the captivity
  lexicon: HALOT
  rationale: הַגּוֹלָה refers to the body of people in exile, not the abstract event
    alone. 'With the exiles' is idiomatic and concrete; 'captivity' is traditional
    but less precise in modern English.
- source_word: אֲשֶׁר הָגְלְתָה
  chosen: who had been carried away
  alternatives:
  - which had gone into exile
  - who had been exiled
  lexicon: HALOT
  rationale: The feminine singular verb agrees with הַגּוֹלָה as a collective noun.
    In English, a plural rendering ('the exiles who had been carried away') communicates
    the collective sense more naturally than a singular abstract noun.
- source_word: יְכָנְיָה
  chosen: Jeconiah
  alternatives:
  - Jehoiachin
  - Jechoniah
  lexicon: HALOT
  rationale: The Hebrew form here is יְכָנְיָה, most directly represented by 'Jeconiah.'
    This follows the stated principle to transliterate names rather than substitute
    a harmonized alternate royal name form.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard construct rendering.
- source_word: אֲשֶׁר הֶגְלָה
  chosen: whom ... had taken into exile
  alternatives:
  - whom ... had carried away
  - whom ... had exiled
  lexicon: HALOT
  rationale: Resumes the relative chain and specifies Nebuchadnezzar as the agent.
    Repeating 'taken into exile' maintains lexical consistency with the earlier use
    of גלה in this verse.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Conventional English transliteration for the Babylonian king; widely
    recognized and acceptable for readable modern English.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Standard construct rendering.
