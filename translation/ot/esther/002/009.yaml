id: EST.2.9
reference: Esther 2:9
source:
  edition: WLC
  text: וַ/תִּיטַ֨ב הַ/נַּעֲרָ֣ה בְ/עֵינָי/ו֮ וַ/תִּשָּׂ֣א חֶ֣סֶד לְ/פָנָי/ו֒ וַ֠/יְבַהֵל
    אֶת תַּמְרוּקֶ֤י/הָ וְ/אֶת מָנוֹתֶ֨/הָ֙ לָ/תֵ֣ת לָ֔/הּ וְ/אֵת֙ שֶׁ֣בַע הַ/נְּעָר֔וֹת
    הָ/רְאֻי֥וֹת לָֽ/תֶת לָ֖/הּ מִ/בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יְשַׁנֶּ֧/הָ וְ/אֶת נַעֲרוֹתֶ֛י/הָ
    לְ/ט֖וֹב בֵּ֥ית הַ/נָּשִֽׁים־־־־׃
translation:
  text: The young woman pleased him and found favor before him, and he quickly provided
    her with her beauty treatments and her portions, and with seven young women suitable
    to be given to her from the king’s palace; and he transferred her and her young
    women to the best place in the women’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the best quarters of the women’s house'; the phrase refers to a superior
      place within the royal women’s quarters, often understood as the harem.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female. 'Young woman' is natural modern English
    and avoids the potentially childish sense of 'girl' while remaining less archaic
    than 'maiden'.
- source_word: וַתִּיטַב ... בְעֵינָיו
  chosen: pleased him
  alternatives:
  - was good in his eyes
  - won his approval
  lexicon: HALOT
  rationale: The idiom literally means 'was good in his eyes.' 'Pleased him' captures
    the idiomatic sense in readable English without adding romantic or sexual nuance
    beyond the text.
- source_word: וַתִּשָּׂא חֶסֶד לְפָנָיו
  chosen: found favor before him
  alternatives:
  - obtained kindness from him
  - won favor in his presence
  lexicon: HALOT
  rationale: נשא חסד is an idiom for receiving favor or kindness. 'Found favor before
    him' preserves the Hebrew flavor and the important term חֶסֶד without over-paraphrasing.
- source_word: חֶסֶד
  chosen: favor
  alternatives:
  - kindness
  - steadfast love
  lexicon: HALOT
  rationale: In this courtly interpersonal context, חֶסֶד refers to favorable treatment
    rather than covenantal 'steadfast love.' 'Favor' fits the immediate narrative
    setting best.
- source_word: וַיְבַהֵל
  chosen: quickly provided
  alternatives:
  - hurried to provide
  - hastened to give
  lexicon: HALOT
  rationale: The verb conveys haste. Because it governs the giving of treatments and
    provisions, 'quickly provided' expresses both the urgency and the action in smooth
    English.
- source_word: תַּמְרוּקֶיהָ
  chosen: her beauty treatments
  alternatives:
  - her ointments
  - her cosmetics
  - her preparations
  lexicon: HALOT
  rationale: The term refers to cosmetic or purification treatments in the harem preparation
    process. 'Beauty treatments' is clear and contextually precise for modern readers.
- source_word: מָנוֹתֶיהָ
  chosen: her portions
  alternatives:
  - her provisions
  - her allotted food
  lexicon: HALOT
  rationale: מָנוֹת commonly refers to assigned portions, often of food or provisions.
    'Portions' stays close to the Hebrew while allowing the reader to infer courtly
    allotments.
- source_word: שֶׁבַע הַנְּעָרוֹת
  chosen: seven young women
  alternatives:
  - seven maids
  - seven female attendants
  lexicon: HALOT
  rationale: The feminine plural indicates female attendants. 'Young women' is a transparent
    rendering, while the attendant role is clarified by context.
- source_word: הָרְאֻיוֹת
  chosen: suitable
  alternatives:
  - fit
  - chosen
  - selected
  lexicon: HALOT
  rationale: The passive participle from ראה here means 'suitable' or 'appropriate'
    for assignment. 'Suitable' avoids implying a formal selection process not explicit
    in the word itself.
- source_word: מִבֵּית הַמֶּלֶךְ
  chosen: from the king’s palace
  alternatives:
  - from the king’s house
  lexicon: HALOT
  rationale: Although בַּיִת is literally 'house,' in royal context 'the king’s palace'
    communicates the institutional setting more naturally in English.
- source_word: וַיְשַׁנֶּהָ
  chosen: he transferred her
  alternatives:
  - he moved her
  - he advanced her
  lexicon: HALOT
  rationale: The verb means to change or transfer. In context, Hegai relocates Esther
    and her attendants within the women's quarters. 'Transferred' captures the administrative
    movement without overstating promotion.
- source_word: לְטוֹב בֵּית הַנָּשִׁים
  chosen: to the best place in the women’s house
  alternatives:
  - to the best part of the harem
  - to the best quarters of the women’s house
  lexicon: HALOT
  rationale: The phrase indicates a superior location within the women's quarters.
    'Best place in the women’s house' remains close to the Hebrew; 'harem' is interpretive
    and therefore left as an alternative rather than main text.
