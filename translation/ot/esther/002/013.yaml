id: EST.2.13
reference: Esther 2:13
source:
  edition: WLC
  text: וּ/בָ/זֶ֕ה הַֽ/נַּעֲרָ֖ה בָּאָ֣ה אֶל הַ/מֶּ֑לֶךְ אֵת֩ כָּל אֲשֶׁ֨ר תֹּאמַ֜ר
    יִנָּ֤תֵֽן לָ/הּ֙ לָ/ב֣וֹא עִמָּ֔/הּ מִ/בֵּ֥ית הַ/נָּשִׁ֖ים עַד בֵּ֥ית הַ/מֶּֽלֶךְ־־־׃
translation:
  text: 'And in this way the young woman went to the king: whatever she said would
    be given to her to take with her from the house of the women to the king’s house.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that she asked for' / 'everything she requested.' The Hebrew literally
      says 'all that she said,' but in context it refers to what she requested to
      take with her.
    reason: lexical_alternative
  - marker: b
    text: '''House of the women'' is a formal rendering of the Hebrew expression;
      it refers to the women’s quarters.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבָזֶה
  chosen: And in this way
  alternatives:
  - And with this
  - And thus
  lexicon: HALOT
  rationale: The preposition ב with the demonstrative זה is idiomatic here, introducing
    the procedure just described. 'In this way' best captures the transitional sense
    in natural English.
- source_word: הַנַּעֲרָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female. 'Young woman' is natural modern English
    and avoids the potentially too-young nuance of 'girl' and the archaic tone of
    'maiden'.
- source_word: בָּאָה אֶל־הַמֶּלֶךְ
  chosen: went to the king
  alternatives:
  - came to the king
  - entered to the king
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'go/come to.' In context of being brought
    for an audience with the king, 'went to the king' is idiomatic and clear.
- source_word: אֵת כָּל אֲשֶׁר תֹּאמַר
  chosen: whatever she said
  alternatives:
  - everything that she requested
  - all that she asked for
  lexicon: HALOT
  rationale: Literally, 'all that she says.' In context the sense is request rather
    than mere speech, but the Hebrew uses the common verb 'say.' 'Whatever she said'
    preserves the wording while allowing the context to imply request.
- source_word: יִנָּתֵן לָהּ
  chosen: would be given to her
  alternatives:
  - was given to her
  - would be granted to her
  lexicon: HALOT
  rationale: The Niphal of נתן is passive, 'be given.' The imperfect here has a customary/procedural
    force within the narrative description, well represented by 'would be given.'
- source_word: לָבוֹא עִמָּהּ
  chosen: to take with her
  alternatives:
  - to go in with her
  - for entering with her
  lexicon: HALOT
  rationale: Infinitive of בוא plus עִם indicates accompaniment in her going. In English,
    the object supplied from context is what is given to accompany her; 'to take with
    her' expresses the intended sense more naturally than a wooden 'to go in with
    her.'
- source_word: מִבֵּית הַנָּשִׁים
  chosen: from the house of the women
  alternatives:
  - from the women's house
  - from the harem
  lexicon: HALOT
  rationale: A formal rendering preserves the Hebrew expression. 'Harem' is contextually
    plausible but imports a culturally interpretive label not explicitly used in the
    text.
- source_word: עַד בֵּית הַמֶּלֶךְ
  chosen: to the king’s house
  alternatives:
  - as far as the king's house
  - to the palace
  lexicon: HALOT
  rationale: בֵּית הַמֶּלֶךְ literally means 'the king's house.' 'Palace' is possible,
    but 'king's house' keeps the lexical correspondence and remains understandable.
