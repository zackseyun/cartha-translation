id: EST.2.8
reference: Esther 2:8
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/הִשָּׁמַ֤ע דְּבַר הַ/מֶּ֨לֶךְ֙ וְ/דָת֔/וֹ וּֽ/בְ/הִקָּבֵ֞ץ נְעָר֥וֹת
    רַבּ֛וֹת אֶל שׁוּשַׁ֥ן הַ/בִּירָ֖ה אֶל יַ֣ד הֵגָ֑י וַ/תִּלָּקַ֤ח אֶסְתֵּר֙ אֶל
    בֵּ֣ית הַ/מֶּ֔לֶךְ אֶל יַ֥ד הֵגַ֖י שֹׁמֵ֥ר הַ/נָּשִֽׁים־־־־־׃
translation:
  text: And when the king’s command and his decree were heard, and when many young
    women were gathered to Susa the citadel into the custody of Hegai, Esther also
    was taken into the king’s house, into the custody of Hegai, keeper of the women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the charge of Hegai'; literally, 'to the hand of Hegai.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the king’s palace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  chosen: command
  alternatives:
  - word
  - order
  lexicon: HALOT
  rationale: In the collocation 'the king’s command and his decree,' 'command' best
    conveys an official royal directive in natural English. 'Word' would be too vague
    here, and 'order' is possible but less balanced alongside 'decree'.
- source_word: דָת
  chosen: decree
  alternatives:
  - edict
  - law
  lexicon: HALOT
  rationale: In Persian-court context, דָת refers to an official regulation or decree.
    'Decree' is idiomatic and suitably formal. 'Edict' is possible but slightly more
    marked; 'law' could overstate permanence or legal scope.
- source_word: נְעָרוֹת
  chosen: young women
  alternatives:
  - girls
  - maidens
  - virgins
  lexicon: HALOT
  rationale: The term denotes young females of marriageable age. 'Young women' is
    accurate and readable. 'Girls' may sound too juvenile, 'maidens' is archaic, and
    'virgins' imports a detail explicit in the broader context but not in this word
    itself in this verse.
- source_word: רַבּוֹת
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: '''Many'' is the most natural rendering for the adjective modifying ''young
    women'' and preserves the sense without unnecessary elevation.'
- source_word: שׁוּשַׁן הַבִּירָה
  chosen: Susa the citadel
  alternatives:
  - the citadel of Susa
  - Susa the fortress
  lexicon: HALOT
  rationale: This is the conventional and contextually clear rendering of the place
    designation. 'Citadel' captures the fortified royal complex better than the broader
    'fortress.'
- source_word: אֶל יַד
  chosen: into the custody of
  alternatives:
  - into the hand of
  - to the charge of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' means being placed under someone's authority
    or care. 'Into the custody of' communicates the institutional and coercive setting
    more clearly in English.
- source_word: וַתִּלָּקַח
  chosen: was taken
  alternatives:
  - was brought
  - was seized
  lexicon: HALOT
  rationale: The passive form indicates Esther did not initiate the action. 'Was taken'
    preserves that passivity and the likely coercive nuance. 'Was brought' is too
    neutral; 'was seized' may overstate the force.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the king’s palace
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of the king.' In this context it refers
    to the royal household/palace complex. 'The king’s house' preserves the source
    wording while remaining understandable. A more interpretive 'palace' is possible
    but less formally transparent.
- source_word: שֹׁמֵר הַנָּשִׁים
  chosen: keeper of the women
  alternatives:
  - guardian of the women
  - custodian of the women
  lexicon: HALOT
  rationale: The participle from שמר denotes one who keeps/guards. 'Keeper' is concise
    and close to the Hebrew. 'Guardian' sounds more benevolent than the context suggests;
    'custodian' is possible but less idiomatic in narrative.
- source_word: וַיְהִי בְּהִשָּׁמַע ... וּבְהִקָּבֵץ
  chosen: And when ... were heard, and when ... were gathered
  alternatives:
  - Now when ... was proclaimed, and ... were assembled
  lexicon: HALOT
  rationale: The paired infinitive constructions mark temporal circumstance. Rendering
    both with 'when' preserves the Hebrew narrative flow and sequence without overcomplicating
    the syntax.
