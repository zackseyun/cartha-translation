id: EST.2.7
reference: Esther 2:7
source:
  edition: WLC
  text: וַ/יְהִ֨י אֹמֵ֜ן אֶת הֲדַסָּ֗ה הִ֤יא אֶסְתֵּר֙ בַּת דֹּד֔/וֹ כִּ֛י אֵ֥ין לָ֖/הּ
    אָ֣ב וָ/אֵ֑ם וְ/הַ/נַּעֲרָ֤ה יְפַת תֹּ֨אַר֙ וְ/טוֹבַ֣ת מַרְאֶ֔ה וּ/בְ/מ֤וֹת אָבִ֨י/הָ֙
    וְ/אִמָּ֔/הּ לְקָחָ֧/הּ מָרְדֳּכַ֛י ל֖/וֹ לְ/בַֽת־־־׃
translation:
  text: He was bringing up Hadassah—that is, Esther—the daughter of his uncle, because
    she had neither father nor mother. The young woman was beautiful in form and attractive
    in appearance, and when her father and her mother died, Mordecai took her as his
    own daughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the daughter of his uncle'—that is, his cousin.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Mordecai adopted her as his daughter.' The Hebrew more literally says
      he 'took her to himself for a daughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמֵן
  chosen: was bringing up
  alternatives:
  - was fostering
  - was guardian of
  - was nursing
  lexicon: HALOT
  rationale: The participle from אמן here describes Mordecai's ongoing role in raising/caring
    for Esther. 'Bringing up' is idiomatic modern English and fits the later statement
    that he took her as his own daughter. 'Guardian of' is possible but slightly more
    interpretive than the participial sense.
- source_word: הֲדַסָּה הִיא אֶסְתֵּר
  chosen: Hadassah—that is, Esther
  alternatives:
  - Hadassah, who is Esther
  - Hadassah (that is, Esther)
  lexicon: HALOT
  rationale: The appositional pronoun הִיא identifies the same person by two names.
    An em-dash construction communicates the explanatory apposition naturally in English
    while preserving both names.
- source_word: בַּת דֹּדוֹ
  chosen: the daughter of his uncle
  alternatives:
  - his cousin
  - the daughter of his father's brother
  lexicon: HALOT
  rationale: Literally 'daughter of his uncle.' This yields the kinship relation 'cousin,'
    but the Hebrew expression itself is more explicit, so the translation preserves
    the underlying familial wording rather than collapsing it to the derived relationship.
- source_word: כִּי אֵין לָהּ אָב וָאֵם
  chosen: because she had neither father nor mother
  alternatives:
  - for she had no father or mother
  - because she was an orphan
  lexicon: HALOT
  rationale: The clause states directly that she lacked both parents. 'Neither father
    nor mother' is faithful and natural; 'orphan' is accurate by implication but less
    explicit than the Hebrew wording.
- source_word: הַנַּעֲרָה
  chosen: The young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה can mean girl/young woman. In this court-marriage context, 'young
    woman' is natural modern English and avoids the archaic tone of 'maiden' while
    not sounding overly juvenile like 'girl.'
- source_word: יְפַת תֹּאַר
  chosen: beautiful in form
  alternatives:
  - beautiful of figure
  - lovely in shape
  lexicon: HALOT
  rationale: This phrase refers to physical beauty with emphasis on figure/form. 'Beautiful
    in form' is a clear, fairly literal rendering.
- source_word: טוֹבַת מַרְאֶה
  chosen: attractive in appearance
  alternatives:
  - beautiful in appearance
  - good-looking
  lexicon: HALOT
  rationale: The phrase complements the previous one by referring to pleasing appearance.
    'Attractive in appearance' preserves the distinction without sounding wooden;
    using 'beautiful' again would flatten the two-part description.
- source_word: וּבְמוֹת אָבִיהָ וְאִמָּהּ
  chosen: and when her father and her mother died
  alternatives:
  - and at the death of her father and mother
  - after her father and mother died
  lexicon: HALOT
  rationale: The preposition with the infinitive/nominal form marks the circumstance
    or time. 'When ... died' is idiomatic English and preserves the temporal sense.
- source_word: לְקָחָהּ מָרְדֳּכַי לוֹ לְבַת
  chosen: Mordecai took her as his own daughter
  alternatives:
  - Mordecai adopted her as his daughter
  - Mordecai took her for a daughter to himself
  lexicon: HALOT
  rationale: The Hebrew literally says he took her to himself for a daughter. 'As
    his own daughter' expresses the sense naturally. 'Adopted' may be conceptually
    right but imports a more formal legal category than the text explicitly states.
