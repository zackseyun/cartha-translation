id: EST.2.17
reference: Esther 2:17
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֨ב הַ/מֶּ֤לֶךְ אֶת אֶסְתֵּר֙ מִ/כָּל הַ/נָּשִׁ֔ים וַ/תִּשָּׂא חֵ֥ן
    וָ/חֶ֛סֶד לְ/פָנָ֖י/ו מִ/כָּל הַ/בְּתוּלֹ֑ת וַ/יָּ֤שֶׂם כֶּֽתֶר מַלְכוּת֙ בְּ/רֹאשָׁ֔/הּ
    וַ/יַּמְלִיכֶ֖/הָ תַּ֥חַת וַשְׁתִּֽי־־־־־׃
translation:
  text: The king loved Esther more than all the women, and she found favor and kindness
    before him more than all the virgins. So he placed the royal crown on her head
    and made her queen instead of Vashti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she won favor and kindness before him.' The Hebrew idiom is literally
      'she bore favor and kindness before him.'
    reason: lexical_alternative
  - marker: b
    text: '''Virgins'' translates a more specific Hebrew term than ''women'' earlier
      in the verse; the distinction is preserved in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: loved
  alternatives:
  - came to love
  - favored
  lexicon: HALOT
  rationale: The verb אהב straightforwardly denotes love/affection. 'Loved' is the
    plain sense and fits the narrative statement without softening it to mere preference.
- source_word: מִכָּל הַנָּשִׁים
  chosen: more than all the women
  alternatives:
  - above all the women
  - more than any of the women
  lexicon: HALOT
  rationale: The comparative construction with מִן + כָּל is best rendered explicitly
    in English as 'more than all.' 'Women' is preferred here because נָשִׁים is the
    ordinary plural of 'woman/wife'; in this court setting it refers broadly to the
    women presented to the king, not specifically to wives at this point.
- source_word: וַתִּשָּׂא חֵן וָחֶסֶד
  chosen: she found favor and kindness
  alternatives:
  - she won favor and loyalty
  - she obtained grace and favor
  lexicon: HALOT
  rationale: 'Literally the idiom is ''she bore/carried favor and kindness,'' but
    idiomatic English requires ''found'' or ''won.'' ''Favor and kindness'' preserves
    both nouns distinctly: חֵן as favorable regard, חֶסֶד here as benevolent kindness
    rather than covenantal steadfast love.'
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his sight
  - with him
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before his face/presence.'
    'Before him' is natural English and preserves the relational nuance of standing
    in his favor.
- source_word: מִכָּל הַבְּתוּלֹת
  chosen: more than all the virgins
  alternatives:
  - more than all the young women
  - more than any of the virgins
  lexicon: HALOT
  rationale: בְּתוּלֹת specifically denotes virgins, narrower than 'women' in the
    first clause. The distinction in the Hebrew should be preserved rather than flattened
    to 'young women.'
- source_word: וַיָּשֶׂם כֶּתֶר מַלְכוּת
  chosen: he placed the royal crown
  alternatives:
  - he set the crown of royalty
  - he put the queenly crown
  lexicon: HALOT
  rationale: The phrase is literally 'crown of kingship/royalty.' 'Royal crown' is
    concise, natural, and preserves the regal sense without awkwardness.
- source_word: וַיַּמְלִיכֶהָ
  chosen: made her queen
  alternatives:
  - crowned her queen
  - caused her to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king/queen or cause to reign.
    In context, 'made her queen' is the clearest idiomatic rendering in English.
- source_word: תַּחַת וַשְׁתִּי
  chosen: instead of Vashti
  alternatives:
  - in place of Vashti
  - under Vashti
  lexicon: HALOT
  rationale: תַּחַת in succession/replacement contexts means 'in place of' or 'instead
    of.' 'Instead of Vashti' is the most natural English expression here.
