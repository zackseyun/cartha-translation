id: EST.2.4
reference: Esther 2:4
source:
  edition: WLC
  text: וְ/הַֽ/נַּעֲרָ֗ה אֲשֶׁ֤ר תִּיטַב֙ בְּ/עֵינֵ֣י הַ/מֶּ֔לֶךְ תִּמְלֹ֖ךְ תַּ֣חַת
    וַשְׁתִּ֑י וַ/יִּיטַ֧ב הַ/דָּבָ֛ר בְּ/עֵינֵ֥י הַ/מֶּ֖לֶךְ וַ/יַּ֥עַשׂ כֵּֽן׃ס
translation:
  text: And let the young woman who pleases the king become queen instead of Vashti.
    The proposal pleased the king, and he did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'finds favor in the king's eyes.' The Hebrew idiom literally says 'is
      good in the eyes of the king.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'reign instead of Vashti.'
    reason: lexical_alternative
  - marker: c
    text: Or 'The matter seemed good to the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female; 'young woman' is natural modern English
    and avoids the potentially too-young nuance of 'girl' while preserving the age-related
    sense better than the archaic 'maiden'.
- source_word: אֲשֶׁר תִּיטַב בְּעֵינֵי הַמֶּלֶךְ
  chosen: who pleases the king
  alternatives:
  - who is good in the eyes of the king
  - who finds favor in the king's eyes
  lexicon: HALOT
  rationale: The idiom טוֹב בְּעֵינֵי means to be pleasing or favorable in someone's
    judgment. 'Pleases the king' is concise, idiomatic English. 'Finds favor' is possible,
    but the verb here is from יטב ('be good/pleasing') rather than חנן.
- source_word: תִּמְלֹךְ
  chosen: become queen
  alternatives:
  - reign
  - be queen
  lexicon: HALOT
  rationale: The verb מלך literally means 'reign,' but in this context of selecting
    a replacement for Vashti, English idiom is best served by 'become queen,' which
    makes explicit the role implied by the feminine verbal form and the context.
- source_word: תַּחַת וַשְׁתִּי
  chosen: instead of Vashti
  alternatives:
  - in place of Vashti
  - under Vashti
  lexicon: HALOT
  rationale: תַּחַת here expresses replacement/substitution, not spatial position.
    'Instead of Vashti' is the clearest idiomatic rendering.
- source_word: וַיִּיטַב הַדָּבָר בְּעֵינֵי הַמֶּלֶךְ
  chosen: The proposal pleased the king
  alternatives:
  - The matter seemed good to the king
  - The thing was pleasing in the king's eyes
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'proposal' depending on context.
    Since the attendants have just suggested a course of action, 'proposal' captures
    the sense well in readable English. The repeated idiom בְּעֵינֵי is again rendered
    with 'pleased.'
- source_word: וַיַּעַשׂ כֵּן
  chosen: and he did so
  alternatives:
  - and he acted accordingly
  - and he did thus
  lexicon: HALOT
  rationale: 'A straightforward rendering of the narrative formula: the king carried
    out the proposal. ''He did so'' is natural modern English and sufficiently formal.'
