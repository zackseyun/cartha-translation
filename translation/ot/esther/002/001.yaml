id: EST.2.1
reference: Esther 2:1
source:
  edition: WLC
  text: אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה כְּ/שֹׁ֕ךְ חֲמַ֖ת הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֑וֹשׁ
    זָכַ֤ר אֶת וַשְׁתִּי֙ וְ/אֵ֣ת אֲשֶׁר עָשָׂ֔תָה וְ/אֵ֥ת אֲשֶׁר נִגְזַ֖ר עָלֶֽי/הָ־־־׃
translation:
  text: After these things, when the anger of King Ahasuerus had subsided, he remembered
    Vashti, what she had done, and what had been decreed against her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the anger of King Ahasuerus had abated.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what was decreed against her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: After these things
  alternatives:
  - After these events
  - After this
  lexicon: HALOT
  rationale: A standard temporal formula introducing a subsequent scene. 'After these
    things' preserves the Hebrew idiom closely while remaining natural English.
- source_word: כְּשֹׁךְ
  chosen: when ... had subsided
  alternatives:
  - when ... abated
  - after ... had quieted
  lexicon: HALOT
  rationale: The infinitive construct of שכך conveys calming or subsiding. Rendering
    it with a temporal clause in English is natural and preserves the sense of the
    king's wrath diminishing.
- source_word: חֲמַת
  chosen: the anger
  alternatives:
  - the wrath
  - the fury
  lexicon: HALOT
  rationale: חֵמָה denotes hot anger or wrath. 'Anger' is more readable modern English;
    'wrath' is possible but sounds elevated beyond the narrative register here.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. This preserves
    both the title and the transliterated personal name, in line with the translation
    philosophy.
- source_word: זָכַר
  chosen: he remembered
  alternatives:
  - he called to mind
  - he thought of
  lexicon: HALOT
  rationale: The verb means to remember or call to mind. 'He remembered' is the most
    direct and transparent rendering.
- source_word: אֶת וַשְׁתִּי
  chosen: Vashti
  lexicon: HALOT
  rationale: Direct object marker is not translated; the proper name is transliterated
    conventionally.
- source_word: וְאֵת אֲשֶׁר עָשָׂתָה
  chosen: what she had done
  alternatives:
  - what she did
  lexicon: HALOT
  rationale: The relative construction is naturally rendered 'what she had done.'
    The pluperfect fits the narrative retrospect from the point of the king's remembering.
- source_word: וְאֵת אֲשֶׁר נִגְזַר עָלֶיהָ
  chosen: what had been decreed against her
  alternatives:
  - what was decreed against her
  - what had been decided concerning her
  lexicon: HALOT
  rationale: נִגְזַר in the passive refers to an official decision or decree. 'Decreed
    against her' captures the juridical force and the adverse sense of עָלֶיהָ.
