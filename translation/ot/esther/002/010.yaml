id: EST.2.10
reference: Esther 2:10
source:
  edition: WLC
  text: לֹא הִגִּ֣ידָה אֶסְתֵּ֔ר אֶת עַמָּ֖/הּ וְ/אֶת מֽוֹלַדְתָּ֑/הּ כִּ֧י מָרְדֳּכַ֛י
    צִוָּ֥ה עָלֶ֖י/הָ אֲשֶׁ֥ר לֹא תַגִּֽיד־־־־׃
translation:
  text: Esther had not disclosed her people or her family line, because Mordecai had
    commanded her that she should not disclose it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her ancestry' for 'her family line.' The Hebrew term can refer to kinship,
      lineage, or place of origin; here it most likely refers to Esther's family descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּידָה
  chosen: had not disclosed
  alternatives:
  - had not made known
  - had not told
  lexicon: HALOT
  rationale: The Hifil of נגד means to make known or declare. 'Disclosed' fits the
    context of concealing identity in the royal court and reads naturally in English.
    The pluperfect sense ('had not disclosed') suits the narrative background.
- source_word: עַמָּהּ
  chosen: her people
  alternatives:
  - her nationality
  - her ethnic people
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the sense of one's ethnic or national
    group. 'Her people' preserves the broader communal sense without narrowing it
    merely to citizenship.
- source_word: מוֹלַדְתָּהּ
  chosen: her family line
  alternatives:
  - her kindred
  - her ancestry
  - her relatives
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote birth, kinship group, or lineage/origin. Here it
    is paired with 'her people,' so a distinct but related term is needed. 'Family
    line' captures descent/ancestry better than the broader 'birthplace' and avoids
    redundancy with 'her people'.
- source_word: צִוָּה עָלֶיהָ
  chosen: had commanded her
  alternatives:
  - had instructed her
  - had ordered her
  lexicon: HALOT
  rationale: צוה is a strong verb of command. 'Commanded' preserves that force. The
    preposition על with the pronominal suffix is idiomatically represented in English
    as the indirect object 'her'.
- source_word: אֲשֶׁר לֹא תַגִּיד
  chosen: that she should not disclose it
  alternatives:
  - not to disclose it
  - that she was not to tell
  lexicon: HALOT
  rationale: The clause gives the content of Mordecai's command. English requires
    an explicit object for smoothness; 'it' refers back to her people and family line.
    'Should not disclose' preserves the subordinate force and echoes the earlier verb
    for cohesion.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
