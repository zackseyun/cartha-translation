id: EST.2.2
reference: Esther 2:2
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ נַעֲרֵֽי הַ/מֶּ֖לֶךְ מְשָׁרְתָ֑י/ו יְבַקְשׁ֥וּ לַ/מֶּ֛לֶךְ נְעָר֥וֹת
    בְּתוּל֖וֹת טוֹב֥וֹת מַרְאֶֽה־׃
translation:
  text: Then the king’s young men who attended him said, “Let beautiful young virgins
    be sought for the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'young women, virgins, good in appearance.'
    reason: lexical_alternative
  - marker: b
    text: Or, more formally, 'Let them seek for the king young virgins beautiful in
      appearance.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: נַעֲרֵי הַמֶּלֶךְ
  chosen: the king’s young men
  alternatives:
  - the king's servants
  - the king's attendants
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young man or servant depending on context. Here,
    because מְשָׁרְתָיו separately specifies service/attendance, 'young men' best
    preserves the lexical distinction.
- source_word: מְשָׁרְתָיו
  chosen: who attended him
  alternatives:
  - his attendants
  - his servants
  - ministering to him
  lexicon: HALOT
  rationale: The participial form from שׁרת describes those serving in attendance
    on the king. Rendering it as a relative clause avoids awkward apposition in English
    and preserves the sense of personal service.
- source_word: יְבַקְשׁוּ
  chosen: Let ... be sought
  alternatives:
  - let them seek
  - let ... be looked for
  lexicon: HALOT
  rationale: Although morphologically active ('let them seek'), English idiom in this
    context naturally uses a passive for the proposed action concerning the women.
    This preserves the directive force without adding a specific unnamed subject beyond
    the court's implied agents.
- source_word: לַמֶּלֶךְ
  chosen: for the king
  alternatives:
  - for the king's use
  - for the king himself
  lexicon: HALOT
  rationale: Simple dative of advantage/purpose; 'for the king' is sufficient and
    avoids over-interpretation.
- source_word: נְעָרוֹת
  chosen: young
  alternatives:
  - girls
  - young women
  - maidens
  lexicon: HALOT
  rationale: In combination with בְּתוּלוֹת, the phrase refers to youthful females
    of marriageable age. 'Young' modifies 'virgins' naturally in English without the
    potentially misleading childish sense of 'girls' or archaic tone of 'maidens'.
- source_word: בְּתוּלוֹת
  chosen: virgins
  alternatives:
  - maidens
  lexicon: HALOT
  rationale: This term specifically denotes virgins; the more precise term should
    be retained rather than softened.
- source_word: טוֹבוֹת מַרְאֶה
  chosen: beautiful
  alternatives:
  - good in appearance
  - attractive in appearance
  - fair of appearance
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'good of appearance,' i.e., physically
    attractive. 'Beautiful' is concise, natural modern English and accurately conveys
    the sense.
