id: EST.2.16
reference: Esther 2:16
source:
  edition: WLC
  text: וַ/תִּלָּקַ֨ח אֶסְתֵּ֜ר אֶל הַ/מֶּ֤לֶךְ אֲחַשְׁוֵרוֹשׁ֙ אֶל בֵּ֣ית מַלְכוּת֔/וֹ
    בַּ/חֹ֥דֶשׁ הָ/עֲשִׂירִ֖י הוּא חֹ֣דֶשׁ טֵבֵ֑ת בִּ/שְׁנַת שֶׁ֖בַע לְ/מַלְכוּתֽ/וֹ־־־־׃
translation:
  text: So Esther was taken to King Ahasuerus, into his royal palace, in the tenth
    month, which is the month Tebeth, in the seventh year of his reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was brought to King Ahasuerus.' The Hebrew verb is passive, emphasizing
      that Esther was acted upon.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the month Tebeth,' the Babylonian name for the tenth month.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּלָּקַח
  chosen: was taken
  alternatives:
  - was brought
  - was received
  lexicon: HALOT
  rationale: Niphal wayyiqtol of לקח is passive/reflexive in sense here; 'was taken'
    preserves the passive force and the narrative's emphasis that Esther is acted
    upon rather than initiating the action.
- source_word: אֶל
  chosen: to
  alternatives:
  - before
  lexicon: HALOT
  rationale: The first אֶל marks movement toward the king; 'to' is the most direct
    and natural rendering.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: Combines title and personal name in standard English order while preserving
    both elements of the Hebrew.
- source_word: אֶל בֵּית מַלְכוּתוֹ
  chosen: into his royal palace
  alternatives:
  - to the house of his kingdom
  - into the house of his kingship
  - into the royal house
  lexicon: HALOT
  rationale: Literally 'to the house of his kingdom/royalty.' In context this denotes
    the king's royal residence; 'royal palace' gives clear modern English without
    losing the courtly setting. 'Into' reflects movement into the place.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  chosen: in the tenth month
  alternatives:
  - during the tenth month
  lexicon: HALOT
  rationale: Straightforward temporal expression; 'in the tenth month' is idiomatic
    and sufficiently formal.
- source_word: הוּא חֹדֶשׁ טֵבֵת
  chosen: which is the month Tebeth
  alternatives:
  - that is, the month Tebeth
  - namely, the month Tebeth
  lexicon: HALOT
  rationale: The appositional clause identifies the named month corresponding to the
    ordinal month. 'Which is' is smooth English while preserving the explanatory force.
- source_word: טֵבֵת
  chosen: Tebeth
  alternatives:
  - Tevet
  lexicon: HALOT
  rationale: A standard English transliteration of the Hebrew month name; personal
    and calendar names are transliterated rather than translated.
- source_word: בִּשְׁנַת שֶׁבַע לְמַלְכוּתוֹ
  chosen: in the seventh year of his reign
  alternatives:
  - in year seven of his reign
  - in the seventh year of his kingship
  lexicon: HALOT
  rationale: This is the normal regnal-year formula. 'Reign' is the idiomatic English
    equivalent for מלכות in this temporal construction.
