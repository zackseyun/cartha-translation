id: EST.2.19
reference: Esther 2:19
source:
  edition: WLC
  text: וּ/בְ/הִקָּבֵ֥ץ בְּתוּל֖וֹת שֵׁנִ֑ית וּ/מָרְדֳּכַ֖י יֹשֵׁ֥ב בְּ/שַֽׁעַר הַ/מֶּֽלֶךְ־׃
translation:
  text: Now when the virgins were gathered a second time, Mordecai was sitting at
    the king's gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again.' The Hebrew says literally 'a second time.'
    reason: lexical_alternative
  - marker: b
    text: '''The king''s gate'' likely refers to the gate area of the royal palace,
      a place associated with official service and administration.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְהִקָּבֵץ
  chosen: Now when ... were gathered
  alternatives:
  - And when ... were gathered
  - While ... were being gathered
  lexicon: HALOT
  rationale: The conjunction plus preposition with infinitive construct introduces
    a temporal clause. 'Now when' gives natural English narrative flow while preserving
    the temporal sense; the passive 'were gathered' reflects the Niphal form of קבץ.
- source_word: בְּתוּלוֹת
  chosen: the virgins
  alternatives:
  - the young women
  - the maidens
  lexicon: HALOT
  rationale: בְּתוּלוֹת most directly denotes virgins. Although 'young women' is smoother
    in modern English, the Hebrew term specifically marks virgin status in this court-selection
    context, so the more precise rendering is retained.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: The adverb means 'secondly/for the second time.' 'A second time' is idiomatic
    and explicit, avoiding the possible vagueness of 'again'.
- source_word: וּמָרְדֳּכַי
  chosen: Mordecai
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was staying
  lexicon: HALOT
  rationale: The Qal participle denotes an ongoing or durative state. 'Was sitting'
    preserves the participial aspect better than the simple past 'sat'.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  chosen: at the king's gate
  alternatives:
  - in the king's gate
  - at the royal gate
  lexicon: HALOT
  rationale: The phrase refers to the gate area of the royal complex, often associated
    with official business. 'At the king's gate' is the standard and sufficiently
    clear rendering; 'in' is more literal to the preposition but less natural in English
    here.
