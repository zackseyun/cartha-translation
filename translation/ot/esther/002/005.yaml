id: EST.2.5
reference: Esther 2:5
source:
  edition: WLC
  text: אִ֣ישׁ יְהוּדִ֔י הָיָ֖ה בְּ/שׁוּשַׁ֣ן הַ/בִּירָ֑ה וּ/שְׁמ֣/וֹ מָרְדֳּכַ֗י
    בֶּ֣ן יָאִ֧יר בֶּן שִׁמְעִ֛י בֶּן קִ֖ישׁ אִ֥ישׁ יְמִינִֽי־־׃
translation:
  text: There was a Jewish man in Susa the citadel, and his name was Mordecai son
    of Jair, son of Shimei, son of Kish, a Benjaminite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Judean man' for 'a Jewish man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the citadel of Susa.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'son of' may also indicate more distant ancestry in genealogical
      contexts.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ יְהוּדִי
  chosen: a Jewish man
  alternatives:
  - a Judean man
  lexicon: HALOT
  rationale: יְהוּדִי can denote either ethnic/religious identity ('Jewish') or geographic
    origin ('Judean'). In Esther's Persian-diaspora setting, 'Jewish' best communicates
    the people's identity in idiomatic English without implying only residence in
    Judah.
- source_word: הָיָה
  chosen: There was
  alternatives:
  - there lived
  - there was a man
  lexicon: HALOT
  rationale: The clause introduces a new character in narrative. English existential
    'There was' naturally reflects the Hebrew copular/existential use here.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  chosen: in Susa the citadel
  alternatives:
  - in the citadel of Susa
  - in Susa the fortress
  lexicon: HALOT
  rationale: שׁוּשַׁן is the place name Susa. הַבִּירָה refers to the fortified royal
    complex/citadel. 'Susa the citadel' is a conventional and concise rendering that
    preserves the appositional Hebrew construction.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: A straightforward narrative continuation. 'And his name was' mirrors
    the Hebrew coordination and keeps the cadence of the introduction.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בֶּן יָאִיר בֶּן שִׁמְעִי בֶּן קִישׁ
  chosen: son of Jair, son of Shimei, son of Kish
  alternatives:
  - descendant of Jair, descendant of Shimei, descendant of Kish
  lexicon: HALOT
  rationale: בֶּן literally means 'son' and can also mark descent more broadly. In
    genealogical notices, retaining 'son of' is the most transparent formal rendering;
    readers can infer ancestral lineage as needed.
- source_word: אִישׁ יְמִינִי
  chosen: a Benjaminite
  alternatives:
  - a man of Benjamin
  - a Benjamite
  lexicon: HALOT
  rationale: The phrase denotes tribal affiliation with Benjamin. 'Benjaminite' is
    clear modern English and avoids the less common spelling 'Benjamite' while preserving
    the meaning.
