id: EST.2.23
reference: Esther 2:23
source:
  edition: WLC
  text: וַ/יְבֻקַּ֤שׁ הַ/דָּבָר֙ וַ/יִּמָּצֵ֔א וַ/יִּתָּל֥וּ שְׁנֵי/הֶ֖ם עַל עֵ֑ץ
    וַ/יִּכָּתֵ֗ב בְּ/סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לִ/פְנֵ֥י הַ/מֶּֽלֶךְ־׃פ
translation:
  text: When the matter was investigated and found to be so, both of them were hanged
    on a tree, and it was written in the book of the chronicles in the presence of
    the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were impaled on a tree/stake.' The Hebrew says literally 'were hanged
      on a tree,' but the exact Persian method of execution may have involved impalement
      or public suspension.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבֻקַּשׁ הַדָּבָר
  chosen: When the matter was investigated
  alternatives:
  - And the matter was sought out
  - And the report was examined
  lexicon: HALOT
  rationale: The passive of בקש with הַדָּבָר refers to an inquiry into the reported
    plot. 'Investigated' gives clear modern English while preserving the passive sense
    and judicial nuance better than the overly literal 'was sought out.'
- source_word: וַיִּמָּצֵא
  chosen: and found to be so
  alternatives:
  - and it was found
  - and it was discovered
  lexicon: HALOT
  rationale: מצא in this passive narrative setting means the accusation was verified.
    'Found to be so' makes explicit in idiomatic English what is implied by the Hebrew
    result clause.
- source_word: וַיִּתָּלוּ
  chosen: were hanged
  alternatives:
  - were impaled
  - were hung up
  lexicon: HALOT
  rationale: תלה commonly denotes hanging up, often as a public execution display.
    In Esther, English tradition often uses 'hanged.' 'Impaled' is possible in Persian
    context, but the Hebrew verb itself does not require that more specific rendering
    here, so 'were hanged' best balances lexical fidelity and readability.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  lexicon: HALOT
  rationale: The dual expression explicitly refers to the two conspirators together;
    'both of them' is natural English and preserves the emphasis.
- source_word: עַל עֵץ
  chosen: on a tree
  alternatives:
  - on wood
  - on a stake
  lexicon: HALOT
  rationale: עֵץ literally means 'tree' or wood. In execution contexts it can denote
    a wooden structure. Following the Hebrew closely, 'on a tree' is retained in the
    main text; the more interpretive 'stake' is possible but less transparent to the
    source wording.
- source_word: וַיִּכָּתֵב
  chosen: and it was written
  alternatives:
  - and it was recorded
  lexicon: HALOT
  rationale: The passive of כתב straightforwardly means 'was written.' This also fits
    the formal court-record context.
- source_word: בְּסֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the book of the chronicles
  alternatives:
  - in the book of the daily records
  - in the book of the events of the days
  lexicon: HALOT
  rationale: This phrase denotes an official annalistic record. 'Book of the chronicles'
    is idiomatic and recognizable while still accurately reflecting the Hebrew construct
    phrase.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: in the presence of the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' The fuller
    English phrase clarifies the court setting without changing the sense.
