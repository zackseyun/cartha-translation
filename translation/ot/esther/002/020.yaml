id: EST.2.20
reference: Esther 2:20
source:
  edition: WLC
  text: אֵ֣ין אֶסְתֵּ֗ר מַגֶּ֤דֶת מֽוֹלַדְתָּ/הּ֙ וְ/אֶת עַמָּ֔/הּ כַּ/אֲשֶׁ֛ר צִוָּ֥ה
    עָלֶ֖י/הָ מָרְדֳּכָ֑י וְ/אֶת מַאֲמַ֤ר מָרְדֳּכַי֙ אֶסְתֵּ֣ר עֹשָׂ֔ה כַּ/אֲשֶׁ֛ר
    הָיְתָ֥ה בְ/אָמְנָ֖ה אִתּֽ/וֹ־־׃ס
translation:
  text: Esther had not made known her family line or her people, just as Mordecai
    had commanded her; and Esther kept doing what Mordecai said, as when she was under
    his care.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her ancestry' for 'her family line.' The Hebrew term can refer to birth,
      lineage, or kindred.
    reason: lexical_alternative
  - marker: b
    text: Or 'as when she was being brought up by him.' The Hebrew recalls Esther's
      earlier life under Mordecai's guardianship.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: had not
  alternatives:
  - did not
  lexicon: HALOT
  rationale: 'With the participle מַגֶּדֶת, אֵין forms a present-like negation in
    Hebrew narrative, but in English the surrounding narrative context is best conveyed
    with past perfect/pluperfect nuance: Esther had not disclosed this up to that
    point.'
- source_word: מַגֶּדֶת
  chosen: made known
  alternatives:
  - telling
  - declaring
  - revealing
  lexicon: HALOT
  rationale: From נגד, 'to tell/make known.' 'Made known' is idiomatic and preserves
    the sense of disclosure without overinterpreting motive.
- source_word: מוֹלַדְתָּהּ
  chosen: her family line
  alternatives:
  - her kindred
  - her ancestry
  - her birth/origin
  lexicon: HALOT
  rationale: The noun refers to birth, kinship, or lineage. 'Family line' communicates
    ancestry/kin-group clearly in modern English and fits the paired expression with
    'her people.'
- source_word: עַמָּהּ
  chosen: her people
  alternatives:
  - her nation
  - her ethnic people
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers to Esther's ethnic/national
    identity. 'Her people' is natural and sufficiently broad without importing modern
    ethnic terminology.
- source_word: כַּאֲשֶׁר צִוָּה עָלֶיהָ
  chosen: just as Mordecai had commanded her
  alternatives:
  - as Mordecai had ordered her
  - as Mordecai had instructed her
  lexicon: HALOT
  rationale: צוה is stronger than mere advice; 'commanded' preserves that force. 'Just
    as' reflects כַּאֲשֶׁר.
- source_word: מַאֲמַר מָרְדֳּכַי
  chosen: what Mordecai said
  alternatives:
  - Mordecai's command
  - Mordecai's instruction
  - the word of Mordecai
  lexicon: HALOT
  rationale: מַאֲמַר can mean word, saying, or command. Since צוה already supplied
    the stronger command language earlier in the verse, rendering this phrase as 'what
    Mordecai said' avoids unnecessary repetition while preserving the sense of obedient
    responsiveness.
- source_word: עֹשָׂה
  chosen: kept doing
  alternatives:
  - did
  - was doing
  - obeyed
  lexicon: HALOT
  rationale: The participle conveys ongoing or customary action. 'Kept doing' brings
    out Esther's continued pattern of obedience better than a simple past.
- source_word: בְאָמְנָה
  chosen: under his care
  alternatives:
  - in foster care with him
  - while being brought up by him
  - while in his guardianship
  lexicon: HALOT
  rationale: From אמן in the sense of being reared or fostered. The phrase recalls
    Esther's earlier upbringing by Mordecai. 'Under his care' is readable modern English
    and captures the guardian/foster relationship without awkwardness.
- source_word: אִתּוֹ
  chosen: his
  alternatives:
  - with him
  lexicon: HALOT
  rationale: Literally 'with him,' but in English the idiom 'under his care' naturally
    absorbs the relational sense of אִתּוֹ while preserving the meaning of the clause.
