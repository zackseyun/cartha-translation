id: EST.2.14
reference: Esther 2:14
source:
  edition: WLC
  text: בָּ/עֶ֣רֶב הִ֣יא בָאָ֗ה וּ֠/בַ/בֹּקֶר הִ֣יא שָׁבָ֞ה אֶל בֵּ֤ית הַ/נָּשִׁים֙
    שֵׁנִ֔י אֶל יַ֧ד שַֽׁעֲשְׁגַ֛ז סְרִ֥יס הַ/מֶּ֖לֶךְ שֹׁמֵ֣ר הַ/פִּֽילַגְשִׁ֑ים
    לֹא תָב֥וֹא עוֹד֙ אֶל הַ/מֶּ֔לֶךְ כִּ֣י אִם חָפֵ֥ץ בָּ֛/הּ הַ/מֶּ֖לֶךְ וְ/נִקְרְאָ֥ה
    בְ/שֵֽׁם׀־־־־־׃
translation:
  text: In the evening she would go in, and in the morning she would return to the
    second house of the women, into the care of Shaashgaz, the king’s eunuch, keeper
    of the concubines. She would not go in again to the king unless the king delighted
    in her and she was summoned by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the second harem.' The Hebrew reads literally
      'the second house of the women.'
    reason: lexical_alternative
  - marker: b
    text: '''Go in to the king'' is a Hebrew idiom for entering the king’s chamber/presence;
      the context implies sexual access without stating it explicitly.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֶרֶב
  chosen: In the evening
  alternatives:
  - At evening
  - In the evening time
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of her going. 'In the
    evening' is natural modern English and preserves the temporal sense.
- source_word: בָאָה
  chosen: she would go in
  alternatives:
  - she came
  - she went
  lexicon: HALOT
  rationale: Although the verb is literally 'came,' in context it refers to entering
    the king's presence/chamber. 'Go in' reflects the idiomatic sense in English and
    matches the later contrast with 'return' and 'go in again.' The habitual past
    is conveyed with 'would.'
- source_word: וּבַבֹּקֶר
  chosen: and in the morning
  alternatives:
  - but in the morning
  - then in the morning
  lexicon: HALOT
  rationale: Simple conjunction plus temporal phrase. 'And in the morning' preserves
    the sequence without overinterpreting contrast.
- source_word: שָׁבָה
  chosen: she would return
  alternatives:
  - she returned
  - she went back
  lexicon: HALOT
  rationale: The verb means 'return.' 'Would return' matches the narrative pattern
    of customary action in this setting.
- source_word: בֵּית הַנָּשִׁים שֵׁנִי
  chosen: the second house of the women
  alternatives:
  - the second women's house
  - the second harem
  lexicon: HALOT
  rationale: Formally, this is 'house of the women, second.' 'The second house of
    the women' preserves the structure and indicates a distinct women's quarters.
    'Harem' is interpretive; the more literal wording is preferred in the main text.
- source_word: אֶל יַד
  chosen: into the care of
  alternatives:
  - to the hand of
  - under the authority of
  lexicon: HALOT
  rationale: The idiom 'to the hand of' means being placed under someone's charge
    or care. 'Into the care of' is idiomatic English that preserves the administrative
    sense.
- source_word: שַׁעֲשְׁגַז
  chosen: Shaashgaz
  lexicon: HALOT
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: סְרִיס הַמֶּלֶךְ
  chosen: the king’s eunuch
  alternatives:
  - the king's official
  lexicon: HALOT
  rationale: In Persian court context, סריס commonly denotes a eunuch, and that sense
    fits the setting. 'Official' is possible in some contexts, but 'eunuch' is the
    more specific and likely meaning here.
- source_word: שֹׁמֵר הַפִּילַגְשִׁים
  chosen: keeper of the concubines
  alternatives:
  - guardian of the concubines
  - one in charge of the concubines
  lexicon: HALOT
  rationale: The participle denotes one who keeps/guards/has charge of. 'Keeper of
    the concubines' is concise and natural while preserving the role.
- source_word: לֹא תָבֹוא עוֹד אֶל הַמֶּלֶךְ
  chosen: She would not go in again to the king
  alternatives:
  - She would never again come to the king
  - She did not go again to the king
  lexicon: HALOT
  rationale: '''Go in to the king'' preserves the Hebrew idiom for entering his presence/chamber
    without making the sexual implication more explicit than the text does. ''Again''
    renders עוֹד.'
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - except if
  lexicon: HALOT
  rationale: This combination introduces the sole exception. 'Unless' is the most
    natural English equivalent.
- source_word: חָפֵץ בָּהּ
  chosen: delighted in her
  alternatives:
  - desired her
  - took pleasure in her
  lexicon: HALOT
  rationale: The verb denotes taking pleasure in or desiring. 'Delighted in her' is
    idiomatic and avoids reducing the phrase to merely sexual desire, while still
    fitting the courtly context.
- source_word: וְנִקְרְאָה בְשֵׁם
  chosen: and she was summoned by name
  alternatives:
  - and she was called by name
  - and she was specifically named
  lexicon: HALOT
  rationale: The passive of 'call' with 'by name' indicates a specific summons. 'Summoned
    by name' makes the court setting explicit in natural English while preserving
    the passive sense.
