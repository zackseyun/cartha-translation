id: EST.2.12
reference: Esther 2:12
source:
  edition: WLC
  text: וּ/בְ/הַגִּ֡יעַ תֹּר֩ נַעֲרָ֨ה וְ/נַעֲרָ֜ה לָ/ב֣וֹא אֶל הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֗וֹשׁ
    מִ/קֵּץ֩ הֱי֨וֹת לָ֜/הּ כְּ/דָ֤ת הַ/נָּשִׁים֙ שְׁנֵ֣ים עָשָׂ֣ר חֹ֔דֶשׁ כִּ֛י כֵּ֥ן
    יִמְלְא֖וּ יְמֵ֣י מְרוּקֵי/הֶ֑ן שִׁשָּׁ֤ה חֳדָשִׁים֙ בְּ/שֶׁ֣מֶן הַ/מֹּ֔ר וְ/שִׁשָּׁ֤ה
    חֳדָשִׁים֙ בַּ/בְּשָׂמִ֔ים וּ/בְ/תַמְרוּקֵ֖י הַ/נָּשִֽׁים׀־׃
translation:
  text: 'Now when the turn of each young woman came to go in to King Ahasuerus, after
    she had been under the regulation for the women for twelve months—for in this
    way the days of their beauty treatments were completed: six months with oil of
    myrrh, and six months with spices and with the cosmetics for women—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the law/custom for the women.' The Hebrew דָּת can denote
      an official regulation, law, or established rule.
    reason: lexical_alternative
  - marker: b
    text: Or 'the days of their cosmetic treatment' or, less likely here, 'the days
      of their purification.'
    reason: lexical_alternative
  - marker: c
    text: '''Spices'' here refers to aromatic substances used in beautification, not
      necessarily culinary spices.'
    reason: cultural_note
lexical_decisions:
- source_word: תֹּר
  chosen: turn
  alternatives:
  - appointed turn
  - order
  lexicon: HALOT
  rationale: תּוֹר here denotes the assigned turn or sequence in which each woman
    was brought to the king. 'Turn' is natural English and preserves the procedural
    sense.
- source_word: נַעֲרָה
  chosen: young woman
  alternatives:
  - girl
  - maiden
  - virgin
  lexicon: HALOT
  rationale: נַעֲרָה commonly means a young woman or girl. 'Young woman' is age-appropriate
    and avoids importing 'virgin,' which is not the lexical value of this noun in
    itself in this verse.
- source_word: לָבוֹא אֶל־הַמֶּלֶךְ
  chosen: to go in to the king
  alternatives:
  - to come to the king
  - to enter the king's presence
  lexicon: HALOT
  rationale: The infinitive בוא with אֶל is straightforwardly 'go/come in to.' 'Go
    in to' preserves the idiomatic courtly and sexual-context nuance without over-paraphrasing.
- source_word: מִקֵּץ הֱיוֹת לָהּ
  chosen: after she had been
  alternatives:
  - at the end of her being
  - after there had been for her
  lexicon: HALOT
  rationale: This construction marks the completion of a prior period before her approach
    to the king. 'After she had been' gives the temporal force in idiomatic English.
- source_word: כְּדָת הַנָּשִׁים
  chosen: under the regulation for the women
  alternatives:
  - according to the law for the women
  - according to the custom for the women
  lexicon: HALOT
  rationale: דָּת in Persian-period Hebrew often refers to a decree, regulation, or
    prescribed rule. 'Regulation' fits the administrative setting better than 'law'
    and is less vague than 'custom.'
- source_word: שְׁנֵים עָשָׂר חֹדֶשׁ
  chosen: twelve months
  alternatives:
  - a full twelve months
  - twelve-month period
  lexicon: HALOT
  rationale: A direct rendering is best; the phrase specifies the duration of preparation.
- source_word: כִּי כֵן יִמְלְאוּ
  chosen: for in this way ... were completed
  alternatives:
  - for thus ... were fulfilled
  - because this is how ... were filled up
  lexicon: HALOT
  rationale: The clause explains why the twelve-month period existed. 'In this way
    ... were completed' captures both כֵּן and the passive/resultative sense conveyed
    in English by יִמְלְאוּ with the following object.
- source_word: יְמֵי מְרוּקֵיהֶן
  chosen: the days of their beauty treatments
  alternatives:
  - the days of their anointing
  - the days of their purification
  - the days of their cosmetic treatment
  lexicon: HALOT
  rationale: מְרוּקִים refers to rubbing, polishing, or cosmetic treatment in this
    context. 'Beauty treatments' communicates the court-preparation sense clearly
    in modern English. 'Purification' is possible in some traditions but is less precise
    here given the listed substances.
- source_word: שֶׁמֶן הַמֹּר
  chosen: oil of myrrh
  alternatives:
  - myrrh oil
  lexicon: HALOT
  rationale: A transparent, essentially formal rendering of the substance used in
    the first six months.
- source_word: בְּשָׂמִים
  chosen: spices
  alternatives:
  - perfumes
  - balsam oils
  - fragrant substances
  lexicon: HALOT
  rationale: בְּשָׂמִים denotes aromatic substances. 'Spices' is a standard rendering,
    though in this cosmetic context it overlaps with perfumes; the broader phrase
    that follows clarifies the beautification setting.
- source_word: תַמְרוּקֵי הַנָּשִׁים
  chosen: the cosmetics for women
  alternatives:
  - women's ointments
  - beauty preparations for women
  - female adornments
  lexicon: HALOT
  rationale: תַּמְרוּקִים refers to cosmetic preparations or toiletries. 'Cosmetics
    for women' is clear, contemporary, and fits the explanatory list.
