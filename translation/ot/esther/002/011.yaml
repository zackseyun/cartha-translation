id: EST.2.11
reference: Esther 2:11
source:
  edition: WLC
  text: וּ/בְ/כָל י֣וֹם וָ/י֔וֹם מָרְדֳּכַי֙ מִתְהַלֵּ֔ךְ לִ/פְנֵ֖י חֲצַ֣ר בֵּית הַ/נָּשִׁ֑ים
    לָ/דַ֨עַת֙ אֶת שְׁל֣וֹם אֶסְתֵּ֔ר וּ/מַה יֵּעָשֶׂ֖ה בָּֽ/הּ־־־־׃
translation:
  text: And every single day Mordecai would walk back and forth in front of the courtyard
    of the women’s house, to learn how Esther was doing and what would be done with
    her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the courtyard of the harem.' The Hebrew reads
      more literally, 'the courtyard of the women’s house.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְכָל יוֹם וָיוֹם
  chosen: And every single day
  alternatives:
  - And day by day
  - And every day
  lexicon: HALOT
  rationale: The distributive expression literally 'in every day and day' is an idiom
    meaning continual daily repetition. 'Every single day' preserves the emphasis
    more clearly than a flatter 'every day,' while remaining natural English.
- source_word: מִתְהַלֵּךְ
  chosen: would walk back and forth
  alternatives:
  - was walking about
  - kept walking
  lexicon: HALOT
  rationale: The hitpael participle of הלך here conveys repeated or habitual movement,
    not merely a single act of walking. 'Would walk back and forth' captures the iterative
    sense and Mordecai's anxious pacing.
- source_word: לִפְנֵי
  chosen: in front of
  alternatives:
  - before
  - outside
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' 'In front of' is
    the clearest modern English rendering in this spatial context. 'Outside' is interpretive
    and less exact.
- source_word: חֲצַר בֵּית הַנָּשִׁים
  chosen: the courtyard of the women’s house
  alternatives:
  - the court of the house of the women
  - the courtyard of the harem
  lexicon: HALOT
  rationale: The Hebrew is formally 'courtyard of the house of the women.' 'Women’s
    house' preserves the source wording without importing the more interpretive term
    'harem' into the main text, though that is the likely referent culturally.
- source_word: לָדַעַת
  chosen: to learn
  alternatives:
  - to know
  - to find out
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To learn' gives natural English for
    seeking information, while still reflecting the ידע semantic range of knowing/finding
    out.
- source_word: אֶת שְׁלוֹם אֶסְתֵּר
  chosen: how Esther was doing
  alternatives:
  - Esther's welfare
  - Esther's well-being
  - the peace of Esther
  lexicon: HALOT
  rationale: שָׁלוֹם here refers to welfare or well-being, not merely peace in an
    abstract sense. 'How Esther was doing' is idiomatic English that communicates
    the concern for her condition.
- source_word: וּמַה יֵּעָשֶׂה בָּהּ
  chosen: and what would be done with her
  alternatives:
  - and what was being done with her
  - and what would happen to her
  lexicon: HALOT
  rationale: 'The nifal imperfect of עשה here is passive: ''what would be done with
    her.'' This preserves the passive nuance and the uncertainty about her treatment
    or outcome. ''What would happen to her'' is smoother but less formally tied to
    the verb ''do.'''
