id: EST.2.3
reference: Esther 2:3
source:
  edition: WLC
  text: וְ/יַפְקֵ֨ד הַ/מֶּ֣לֶךְ פְּקִידִים֮ בְּ/כָל מְדִינ֣וֹת מַלְכוּת/וֹ֒ וְ/יִקְבְּצ֣וּ
    אֶת כָּל נַעֲרָֽה בְ֠תוּלָה טוֹבַ֨ת מַרְאֶ֜ה אֶל שׁוּשַׁ֤ן הַ/בִּירָה֙ אֶל בֵּ֣ית
    הַ/נָּשִׁ֔ים אֶל יַ֥ד הֵגֶ֛א סְרִ֥יס הַ/מֶּ֖לֶךְ שֹׁמֵ֣ר הַ/נָּשִׁ֑ים וְ/נָת֖וֹן
    תַּמְרוּקֵי/הֶֽן־־־־־־־׃
translation:
  text: Let the king appoint officers in all the provinces of his kingdom, and let
    them gather every young virgin of beautiful appearance to Susa the citadel, to
    the house of the women, into the custody of Hegai the king’s eunuch, keeper of
    the women; and let their cosmetics be given to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the harem' for 'the house of the women.' The Hebrew is more literally
      'the house of the women.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beauty treatments be provided for them.' The Hebrew term can refer broadly
      to cosmetic preparations or beautifying treatments.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַפְקֵד
  chosen: appoint
  alternatives:
  - commission
  - set over
  lexicon: HALOT
  rationale: Hiphil of פקד here means to appoint or assign officials. 'Appoint' is
    idiomatic and fits the administrative context.
- source_word: פְּקִידִים
  chosen: officers
  alternatives:
  - officials
  - overseers
  lexicon: HALOT
  rationale: Refers to royal functionaries appointed for a task. 'Officers' conveys
    administrative agents without implying military rank.
- source_word: מְדִינוֹת מַלְכוּתוֹ
  chosen: the provinces of his kingdom
  alternatives:
  - the jurisdictions of his realm
  lexicon: HALOT
  rationale: Standard imperial-administrative language in Esther; 'provinces' is the
    natural English equivalent for מדינות in this setting.
- source_word: וְיִקְבְּצוּ
  chosen: let them gather
  alternatives:
  - let them collect
  - let them assemble
  lexicon: HALOT
  rationale: Jussive sequence continues the proposal. 'Gather' is natural for bringing
    persons together under royal order.
- source_word: כָּל נַעֲרָה בְתוּלָה
  chosen: every young virgin
  alternatives:
  - every young woman, a virgin
  - every maiden
  lexicon: HALOT
  rationale: 'Both nouns are significant: נערה marks youth, בתולה marks virginity.
    ''Young virgin'' preserves both elements more transparently than ''maiden''.'
- source_word: טוֹבַת מַרְאֶה
  chosen: of beautiful appearance
  alternatives:
  - beautiful
  - fair to look at
  lexicon: HALOT
  rationale: Literally 'good of appearance.' The chosen rendering preserves the visual
    emphasis while using readable modern English.
- source_word: שׁוּשַׁן הַבִּירָה
  chosen: Susa the citadel
  alternatives:
  - Susa the fortress
  - the citadel of Susa
  lexicon: HALOT
  rationale: הבירה denotes the fortified royal complex/citadel. 'Susa the citadel'
    is a conventional and accurate rendering in Esther.
- source_word: בֵּית הַנָּשִׁים
  chosen: the house of the women
  alternatives:
  - the women's house
  - the harem
  lexicon: HALOT
  rationale: A formally transparent rendering is preferred. 'Harem' may be contextually
    explanatory but is more interpretive than the Hebrew phrase.
- source_word: אֶל יַד הֵגֶא
  chosen: into the custody of Hegai
  alternatives:
  - to the charge of Hegai
  - into the hand of Hegai
  lexicon: HALOT
  rationale: The idiom 'into the hand of' means under someone's authority or care.
    'Into the custody of' communicates the idiomatic sense in natural English.
- source_word: סְרִיס
  chosen: eunuch
  alternatives:
  - court official
  lexicon: HALOT
  rationale: In Persian court contexts the term can sometimes broaden to court official,
    but 'eunuch' is the default lexical sense and fits the women's quarters context
    best.
- source_word: שֹׁמֵר הַנָּשִׁים
  chosen: keeper of the women
  alternatives:
  - guardian of the women
  - supervisor of the women
  lexicon: HALOT
  rationale: Participial title describing Hegai's role. 'Keeper' is concise and close
    to the Hebrew while remaining intelligible.
- source_word: וְנָתוֹן תַּמְרוּקֵיהֶן
  chosen: and let their cosmetics be given to them
  alternatives:
  - and let their beauty treatments be provided for them
  - and let their ointments be given to them
  lexicon: HALOT
  rationale: The infinitive absolute/verb form with the noun indicates provision of
    beautifying preparations. 'Cosmetics' is concise and understandable, while a footnote
    preserves 'beauty treatments' as an alternative nuance.
