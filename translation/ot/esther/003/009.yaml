id: EST.3.9
reference: Esther 3:9
source:
  edition: WLC
  text: אִם עַל הַ/מֶּ֣לֶךְ ט֔וֹב יִכָּתֵ֖ב לְ/אַבְּדָ֑/ם וַ/עֲשֶׂ֨רֶת אֲלָפִ֜ים כִּכַּר
    כֶּ֗סֶף אֶשְׁקוֹל֙ עַל יְדֵי֙ עֹשֵׂ֣י הַ/מְּלָאכָ֔ה לְ/הָבִ֖יא אֶל גִּנְזֵ֥י הַ/מֶּֽלֶךְ־־־־־׃
translation:
  text: If it seems good to the king, let it be written that they be destroyed, and
    I will weigh out ten thousand talents of silver into the hands of those who do
    the work, to bring it into the king’s treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If it pleases the king.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten thousand talents of silver,' a very large sum measured by weight
      rather than coined currency.
    reason: cultural_note
  - marker: c
    text: Or 'by the hands of those who do the work,' that is, through the agency
      of the officials carrying it out.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it pleases the king
  - If it is good to the king
  lexicon: HALOT
  rationale: The idiom expresses royal approval or pleasure. 'Seems good to the king'
    is natural modern English while staying close to the Hebrew wording.
- source_word: יִכָּתֵב
  chosen: let it be written
  alternatives:
  - let it be decreed
  - let an edict be written
  lexicon: HALOT
  rationale: The Niphal of כתב is literally 'be written.' In this court setting it
    implies an official written decree, but the more literal wording preserves the
    source text without over-specifying.
- source_word: לְאַבְּדָם
  chosen: that they be destroyed
  alternatives:
  - for their destruction
  - to destroy them
  - that they be annihilated
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix expresses the content of what is
    to be written. 'That they be destroyed' fits the passive-like English construction
    after 'let it be written' and reflects the lethal intent without adding interpretive
    flourish.
- source_word: וַעֲשֶׂרֶת אֲלָפִים
  chosen: and ... ten thousand
  alternatives:
  - even ten thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained plainly.
- source_word: כִּכַּר כֶּסֶף
  chosen: talents of silver
  alternatives:
  - silver talents
  lexicon: HALOT
  rationale: כִּכָּר is a large unit of weight conventionally rendered 'talent.' This
    is more transparent than converting to a speculative modern weight in the main
    text.
- source_word: אֶשְׁקוֹל
  chosen: I will weigh out
  alternatives:
  - I will pay out
  - I will weigh
  lexicon: HALOT
  rationale: The verb שקל literally means 'weigh.' Since precious metal was commonly
    measured by weight, 'weigh out' preserves the concrete sense and implies payment.
- source_word: עַל יְדֵי
  chosen: into the hands of
  alternatives:
  - by the hand of
  - through the agency of
  lexicon: HALOT
  rationale: The idiom can denote agency or entrusting something to someone. Here
    the silver is being placed under the control of officials for transfer, so 'into
    the hands of' best preserves the image and sense.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: those who do the work
  alternatives:
  - the workers
  - those in charge of the business
  - the officials carrying out the task
  lexicon: HALOT
  rationale: A fairly literal rendering that leaves the exact identity broad, as in
    the Hebrew. More specific options like 'officials' are possible but somewhat interpretive.
- source_word: לְהָבִיא
  chosen: to bring it
  alternatives:
  - to deposit it
  - to deliver it
  lexicon: HALOT
  rationale: The infinitive of בוא is simply 'to bring.' The object 'it' is supplied
    naturally in English from the silver just mentioned.
- source_word: גִּנְזֵי הַמֶּלֶךְ
  chosen: the king’s treasuries
  alternatives:
  - the royal treasury
  - the king's treasury
  lexicon: HALOT
  rationale: The noun is plural in Hebrew, so 'treasuries' preserves the form better
    than singular 'treasury,' while still sounding natural in English.
