id: EST.3.2
reference: Esther 3:2
source:
  edition: WLC
  text: וְ/כָל עַבְדֵ֨י הַ/מֶּ֜לֶךְ אֲשֶׁר בְּ/שַׁ֣עַר הַ/מֶּ֗לֶךְ כֹּרְעִ֤ים וּ/מִֽשְׁתַּחֲוִים֙
    לְ/הָמָ֔ן כִּי כֵ֖ן צִוָּה ל֣/וֹ הַ/מֶּ֑לֶךְ וּ/מָ֨רְדֳּכַ֔י לֹ֥א יִכְרַ֖ע וְ/לֹ֥א
    יִֽשְׁתַּחֲוֶֽה־־־־׃
translation:
  text: And all the king’s servants who were at the king’s gate were bowing down and
    paying homage to Haman, for the king had so commanded concerning him. But Mordecai
    would not bow down or pay homage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrating themselves to Haman'; the Hebrew verb can also be rendered
      'worshiping' in contexts where the object is divine.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the king had so commanded him,' though the pronoun is better understood
      as referring to Haman, that is, the command concerned the honor due to him.
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  - attendants
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave'; in a royal court setting,
    'the king’s servants' is the natural idiom for court personnel. 'Slave' would
    overstate bonded status here, while 'officials' is possible but narrower than
    the Hebrew.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  chosen: at the king’s gate
  alternatives:
  - in the king’s gate
  - at the royal gate
  lexicon: HALOT
  rationale: The phrase refers to the administrative/public location associated with
    royal business. 'At the king’s gate' is clear modern English and preserves the
    concrete setting better than a more interpretive rendering.
- source_word: כֹּרְעִים
  chosen: were bowing down
  alternatives:
  - were kneeling
  - bowed down
  lexicon: HALOT
  rationale: The participle denotes ongoing/customary action. 'Were bowing down' captures
    the repeated or customary practice in context better than a simple past. 'Kneeling'
    is too narrow, since the gesture is one of obeisance.
- source_word: וּמִשְׁתַּחֲוִים
  chosen: paying homage
  alternatives:
  - prostrating themselves
  - worshiping
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה can denote prostration, homage, or worship depending on
    context. Since the object is Haman, not God, 'paying homage' avoids importing
    specifically religious worship while still conveying reverential obeisance. The
    more physical nuance 'prostrating themselves' is possible but less idiomatic paired
    with 'bowing down' in English.
- source_word: לְהָמָן
  chosen: to Haman
  lexicon: HALOT
  rationale: Standard dative/object of obeisance; straightforwardly rendered 'to Haman.'
- source_word: כִּי כֵן צִוָּה לוֹ הַמֶּלֶךְ
  chosen: for the king had so commanded concerning him
  alternatives:
  - for the king had so commanded him
  - for this is what the king had commanded for him
  lexicon: HALOT
  rationale: The pronoun לוֹ is most naturally taken as referring to Haman ('concerning
    him' / 'with regard to him'), i.e., the king had issued this command regarding
    the honor due Haman. Rendering it as 'commanded him' would suggest Haman was the
    one commanded, which is less likely in context.
- source_word: וּמָרְדֳּכַי
  chosen: But Mordecai
  alternatives:
  - And Mordecai
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the discourse contrast with
    the preceding universal behavior is strong. 'But' communicates the adversative
    force naturally in English.
- source_word: לֹא יִכְרַע וְלֹא יִשְׁתַּחֲוֶה
  chosen: would not bow down or pay homage
  alternatives:
  - did not bow down or prostrate himself
  - would neither kneel nor bow himself
  lexicon: HALOT
  rationale: The imperfects here express Mordecai’s characteristic refusal in contrast
    to the others’ customary action. 'Would not' captures volitional refusal better
    than a bare past. Repeating 'pay homage' maintains lexical consistency with the
    earlier verb while fitting the human object.
