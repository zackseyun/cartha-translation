theological_decisions:
- issue: Whether הִשְׁתַּחֲוָה here should be rendered with explicitly religious language
    ('worship')
  chosen_reading: Rendered as 'paying homage' / 'pay homage' rather than 'worship.'
  alternative_readings:
  - worship
  - prostrate oneself
  rationale: The Hebrew verb can describe worship of God or obeisance before humans.
    In this context Haman is the recipient, so an explicitly religious rendering could
    import a theological claim not required by the text. The paired verbs indicate
    courtly submission/honor, though the narrative may later invite reflection on
    the limits of such honor.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
