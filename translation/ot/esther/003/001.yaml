id: EST.3.1
reference: Esther 3:1
source:
  edition: WLC
  text: אַחַ֣ר הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה גִּדַּל֩ הַ/מֶּ֨לֶךְ אֲחַשְׁוֵר֜וֹשׁ אֶת הָמָ֧ן
    בֶּֽן הַמְּדָ֛תָא הָ/אֲגָגִ֖י וַֽ/יְנַשְּׂאֵ֑/הוּ וַ/יָּ֨שֶׂם֙ אֶת כִּסְא֔/וֹ
    מֵ/עַ֕ל כָּל הַ/שָּׂרִ֖ים אֲשֶׁ֥ר אִתּֽ/וֹ׀־־־־׃
translation:
  text: After these things, King Ahasuerus promoted Haman son of Hammedatha the Agagite,
    exalted him, and set his throne above all the officials who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After these events.'
    reason: lexical_alternative
  - marker: b
    text: '''The Agagite'' preserves the Hebrew designation and may indicate a lineage
      or association connected with Agag.'
    reason: cultural_note
  - marker: c
    text: Or 'set his seat above all the officials who were with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: After these things
  alternatives:
  - After these events
  - After this
  lexicon: HALOT
  rationale: A standard temporal formula introducing the next development in the narrative.
    'After these things' preserves the Hebrew idiom closely while remaining natural
    English.
- source_word: גִּדַּל
  chosen: promoted
  alternatives:
  - made great
  - advanced
  - magnified
  lexicon: HALOT
  rationale: In context of court rank and office, the verb refers to elevating someone's
    status. 'Promoted' captures the administrative sense more idiomatically than the
    more literal 'made great.'
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - Ahasuerus the king
  lexicon: HALOT
  rationale: English title-before-name order is most natural. The personal name is
    transliterated in keeping with the translation philosophy.
- source_word: הָמָן
  chosen: Haman
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן הַמְּדָתָא
  chosen: son of Hammedatha
  alternatives:
  - the son of Hammedatha
  lexicon: HALOT
  rationale: The patronymic is retained explicitly; 'son of' is the normal and transparent
    rendering.
- source_word: הָאֲגָגִי
  chosen: the Agagite
  lexicon: HALOT
  rationale: A gentilicial/ethnic designation or clan identifier. 'Agagite' preserves
    the Hebrew form without over-interpreting its historical implications in the main
    text.
- source_word: וַיְנַשְּׂאֵהוּ
  chosen: exalted him
  alternatives:
  - lifted him up
  - raised him up
  lexicon: HALOT
  rationale: The verb continues the idea of elevation in rank. 'Exalted him' is idiomatic
    and preserves the honorific nuance without collapsing it into the previous verb.
- source_word: וַיָּשֶׂם אֶת כִּסְאוֹ
  chosen: set his throne
  alternatives:
  - set his seat
  - placed his chair of state
  lexicon: HALOT
  rationale: כִּסֵּא can denote a throne or seat of authority. 'Throne' best conveys
    official rank and precedence in this court setting.
- source_word: מֵעַל כָּל הַשָּׂרִים
  chosen: above all the officials
  alternatives:
  - higher than all the princes
  - above all the commanders
  lexicon: HALOT
  rationale: The phrase expresses superior rank over other court officers. 'Officials'
    is a clear modern rendering of שָׂרִים in a Persian court context.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with the king
  - in his service
  lexicon: HALOT
  rationale: The suffix most naturally refers to the king in context, describing the
    officials attached to his court. 'Who were with him' preserves the Hebrew wording
    while remaining intelligible.
