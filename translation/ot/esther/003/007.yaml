id: EST.3.7
reference: Esther 3:7
source:
  edition: WLC
  text: בַּ/חֹ֤דֶשׁ הָ/רִאשׁוֹן֙ הוּא חֹ֣דֶשׁ נִיסָ֔ן בִּ/שְׁנַת֙ שְׁתֵּ֣ים עֶשְׂרֵ֔ה
    לַ/מֶּ֖לֶךְ אֲחַשְׁוֵר֑וֹשׁ הִפִּ֣יל פּוּר֩ ה֨וּא הַ/גּוֹרָ֜ל לִ/פְנֵ֣י הָמָ֗ן
    מִ/יּ֧וֹם לְ/י֛וֹם וּ/מֵ/חֹ֛דֶשׁ לְ/חֹ֥דֶשׁ שְׁנֵים עָשָׂ֖ר הוּא חֹ֥דֶשׁ אֲדָֽר־׀־־׃ס
translation:
  text: In the first month, that is, the month of Nisan, in the twelfth year of King
    Ahasuerus, Pur—that is, the lot—was cast before Haman, from day to day and from
    month to month, until the twelfth month, that is, the month of Adar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from day to day and from month to month, twelve, that
      is, the month of Adar.' The sense is that the lot-casting extended through the
      calendar until the twelfth month.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: In the first month
  alternatives:
  - In month one
  - During the first month
  lexicon: HALOT
  rationale: Standard temporal expression with בְּ marking time. 'In the first month'
    is natural English and preserves the calendrical framing.
- source_word: הוּא חֹדֶשׁ נִיסָן
  chosen: that is, the month of Nisan
  alternatives:
  - which is the month Nisan
  - namely, Nisan
  lexicon: HALOT
  rationale: The pronoun plus noun apposition explains the month name. 'That is' clearly
    signals the explanatory gloss in readable English.
- source_word: בִּשְׁנַת שְׁתֵּים עֶשְׂרֵה
  chosen: in the twelfth year
  alternatives:
  - in year twelve
  - during the twelfth year
  lexicon: HALOT
  rationale: Idiomatic rendering of the regnal-year formula.
- source_word: לַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: of King Ahasuerus
  alternatives:
  - of the king, Ahasuerus
  - belonging to King Ahasuerus
  lexicon: HALOT
  rationale: English regnal dating is most naturally expressed as 'the twelfth year
    of King Ahasuerus.' The title is translated and the personal name transliterated
    per philosophy.
- source_word: הִפִּיל פּוּר
  chosen: Pur ... was cast
  alternatives:
  - they cast Pur
  - one cast Pur
  lexicon: HALOT
  rationale: The Hiphil of נפל here is the idiom for casting lots. An impersonal passive
    in English best reflects the Hebrew without inventing an explicit subject.
- source_word: פּוּר
  chosen: Pur
  alternatives:
  - pur
  lexicon: HALOT
  rationale: The text preserves the Persian loanword and immediately glosses it. Retaining
    'Pur' reflects the source and connects with the book's later explanation of Purim.
- source_word: הוּא הַגּוֹרָל
  chosen: that is, the lot
  alternatives:
  - that is, the casting of lots
  - meaning the lot
  lexicon: HALOT
  rationale: The Hebrew explicitly glosses the foreign term with the common Hebrew
    word גּוֹרָל. 'Lot' is the concise and standard equivalent.
- source_word: לִפְנֵי הָמָן
  chosen: before Haman
  alternatives:
  - in the presence of Haman
  - before the face of Haman
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in the presence of.' 'Before Haman' is
    both accurate and idiomatic.
- source_word: מִיּוֹם לְיוֹם
  chosen: from day to day
  alternatives:
  - day by day
  - for one day after another
  lexicon: HALOT
  rationale: This preserves the repetitive sequence of the lot-casting process. 'From
    day to day' mirrors the Hebrew structure more closely than the more interpretive
    'day by day.'
- source_word: וּמֵחֹדֶשׁ לְחֹדֶשׁ
  chosen: and from month to month
  alternatives:
  - and month by month
  - and from one month to another
  lexicon: HALOT
  rationale: Parallel to the previous phrase and preserves the progression in time.
- source_word: שְׁנֵים עָשָׂר
  chosen: the twelfth month
  alternatives:
  - month twelve
  lexicon: HALOT
  rationale: In context the numeral identifies the destination month in the sequence.
    Supplying 'until the twelfth month' makes explicit in English what is implied
    by the Hebrew temporal progression.
- source_word: הוּא חֹדֶשׁ אֲדָר
  chosen: that is, the month of Adar
  alternatives:
  - which is Adar
  - namely, Adar
  lexicon: HALOT
  rationale: As earlier in the verse, the pronoun introduces an explanatory apposition
    naming the month.
