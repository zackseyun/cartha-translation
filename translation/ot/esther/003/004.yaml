id: EST.3.4
reference: Esther 3:4
source:
  edition: WLC
  text: וַ/יְהִ֗י ב/אמר/ם אֵלָי/ו֙ י֣וֹם וָ/י֔וֹם וְ/לֹ֥א שָׁמַ֖ע אֲלֵי/הֶ֑ם וַ/יַּגִּ֣ידוּ
    לְ/הָמָ֗ן לִ/רְאוֹת֙ הֲ/יַֽעַמְדוּ֙ דִּבְרֵ֣י מָרְדֳּכַ֔י כִּֽי הִגִּ֥יד לָ/הֶ֖ם
    אֲשֶׁר ה֥וּא יְהוּדִֽי־־׃
translation:
  text: And when they spoke to him day after day and he would not listen to them,
    they told Haman, to see whether Mordecai’s words would stand, for he had told
    them that he was a Jew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether Mordecai’s explanation would hold up.' The Hebrew literally
      says 'whether Mordecai’s words would stand,' which may refer either to his stated
      reason for refusing to bow or to whether his stance would endure under pressure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בְאָמְרָם
  chosen: And when they spoke
  alternatives:
  - And it happened, when they said
  - Now when they spoke
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus infinitive construct with ב
    marks a temporal transition. In natural English, 'And when they spoke' preserves
    the sequence without woodenly reproducing 'and it happened.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Mordecai
  lexicon: HALOT
  rationale: The pronoun refers to Mordecai from context. The English keeps the pronoun,
    since the referent is clear from the preceding verse and immediate context.
- source_word: יוֹם וָיוֹם
  chosen: day after day
  alternatives:
  - day by day
  - every day
  lexicon: HALOT
  rationale: The idiom expresses repeated daily action. 'Day after day' captures the
    persistence more vividly than the flatter 'every day.'
- source_word: וְלֹא שָׁמַע אֲלֵיהֶם
  chosen: and he would not listen to them
  alternatives:
  - and he did not listen to them
  - and he would not heed them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Would not listen'
    conveys continued refusal in this repeated setting.
- source_word: וַיַּגִּידוּ לְהָמָן
  chosen: they told Haman
  alternatives:
  - they reported to Haman
  - they informed Haman
  lexicon: HALOT
  rationale: The verb נגד in Hiphil means to tell, report, or make known. 'Told' is
    simple and natural; the object and context make the reporting sense clear.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - in order to see
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To see' is idiomatic English and sufficiently
    conveys purpose without overloading the sentence.
- source_word: הֲיַעַמְדוּ דִּבְרֵי מָרְדֳּכַי
  chosen: whether Mordecai’s words would stand
  alternatives:
  - whether Mordecai's words would hold up
  - whether Mordecai's explanation would stand
  lexicon: HALOT
  rationale: עמד with 'words' conveys whether his stated position would remain valid
    or be upheld. 'Would stand' preserves the metaphor and leaves the nuance broad
    enough to include whether his stated reason would prove sustainable.
- source_word: כִּי הִגִּיד לָהֶם
  chosen: for he had told them
  alternatives:
  - because he had told them
  - for he told them
  lexicon: HALOT
  rationale: 'כִּי here gives the reason for their reporting to Haman. The pluperfect
    ''had told'' fits the sequence: his prior disclosure explains their present action.'
- source_word: אֲשֶׁר הוּא יְהוּדִי
  chosen: that he was a Jew
  alternatives:
  - that he was Jewish
  lexicon: HALOT
  rationale: יְהוּדִי is an ethnoreligious identity term. 'A Jew' is the standard
    nominal rendering and matches the Hebrew predicate construction more directly
    than the adjectival 'Jewish.'
