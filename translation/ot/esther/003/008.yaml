id: EST.3.8
reference: Esther 3:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הָמָן֙ לַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ יֶשְׁנ֣/וֹ עַם אֶחָ֗ד מְפֻזָּ֤ר
    וּ/מְפֹרָד֙ בֵּ֣ין הָֽ/עַמִּ֔ים בְּ/כֹ֖ל מְדִינ֣וֹת מַלְכוּתֶ֑/ךָ וְ/דָתֵי/הֶ֞ם
    שֹׁנ֣וֹת מִ/כָּל עָ֗ם וְ/אֶת דָּתֵ֤י הַ/מֶּ֨לֶךְ֙ אֵינָ֣/ם עֹשִׂ֔ים וְ/לַ/מֶּ֥לֶךְ
    אֵין שֹׁוֶ֖ה לְ/הַנִּיחָֽ/ם־־־־׃
translation:
  text: Then Haman said to King Ahasuerus, “There is a certain people, scattered and
    separated among the peoples in all the provinces of your kingdom. Their laws are
    different from those of every other people, and they do not keep the king’s laws,
    so it is not in the king’s interest to let them remain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to leave them alone' / 'to tolerate them.' The Hebrew verb can mean
      to let someone be or permit them to remain undisturbed.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶשְׁנוֹ עַם אֶחָד
  chosen: There is a certain people
  alternatives:
  - There is one people
  - There is a people
  lexicon: HALOT
  rationale: The idiom introduces an indefinite but pointed referent. 'A certain people'
    captures Haman’s deliberately vague, insinuating tone better than the more literal
    'one people,' while still reflecting the singular noun phrase.
- source_word: מְפֻזָּר וּמְפֹרָד
  chosen: scattered and separated
  alternatives:
  - scattered and dispersed
  - scattered and divided
  lexicon: HALOT
  rationale: Both participles should be represented. 'Scattered and separated' preserves
    the rhetorical piling up of terms without overinterpreting the second as internal
    division; it can denote being set apart/distributed among others.
- source_word: בֵּין הָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - among the other peoples
  lexicon: HALOT
  rationale: עַמִּים here refers to ethnic groups/populations within the empire. 'Peoples'
    is more precise than 'nations' in this imperial context and preserves the plural
    ethnic sense.
- source_word: בְּכֹל מְדִינוֹת מַלְכוּתֶךָ
  chosen: in all the provinces of your kingdom
  alternatives:
  - throughout all the provinces of your kingdom
  lexicon: HALOT
  rationale: מְדִינוֹת in Esther commonly refers to administrative provinces. 'Of
    your kingdom' is a natural rendering of the construct phrase and fits modern English
    style.
- source_word: דָתֵיהֶם
  chosen: their laws
  alternatives:
  - their customs
  - their decrees
  lexicon: HALOT
  rationale: In Esther, דָּת often denotes law/decree/custom in Persian court context.
    Here 'laws' best matches the contrast with 'the king’s laws,' while 'customs'
    would weaken the legal force of Haman’s accusation.
- source_word: שֹׁנוֹת מִכָּל עָם
  chosen: are different from those of every other people
  alternatives:
  - are different from every people
  - differ from those of all peoples
  lexicon: HALOT
  rationale: The comparison is between this people’s laws and the laws of all other
    peoples. Supplying 'those of' makes the English explicit without adding new content.
    'Every other people' clarifies the comparative force idiomatically.
- source_word: וְאֶת דָּתֵי הַמֶּלֶךְ אֵינָם עֹשִׂים
  chosen: and they do not keep the king’s laws
  alternatives:
  - and they do not do the king’s laws
  - and they do not observe the king’s laws
  lexicon: HALOT
  rationale: עָשָׂה with 'laws' means to practice/observe/keep. 'Keep' is concise
    and idiomatic; 'observe' is also possible but slightly more formal.
- source_word: וְלַמֶּלֶךְ אֵין שֹׁוֶה
  chosen: so it is not in the king’s interest
  alternatives:
  - and it is not worthwhile for the king
  - and it does not benefit the king
  lexicon: HALOT
  rationale: The expression conveys advantage or benefit. 'Not in the king’s interest'
    is natural modern English and preserves the pragmatic force of Haman’s appeal.
- source_word: לְהַנִּיחָם
  chosen: to let them remain
  alternatives:
  - to leave them alone
  - to tolerate them
  - to let them rest
  lexicon: HALOT
  rationale: The hiphil of נוח here means to leave, allow, or let be. In context Haman
    argues against permitting this people to continue undisturbed in the empire. 'Let
    them remain' captures that sense without importing excessive hostility beyond
    the context.
