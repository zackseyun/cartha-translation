id: EST.3.12
reference: Esther 3:12
source:
  edition: WLC
  text: וַ/יִּקָּרְאוּ֩ סֹפְרֵ֨י הַ/מֶּ֜לֶךְ בַּ/חֹ֣דֶשׁ הָ/רִאשׁ֗וֹן בִּ/שְׁלוֹשָׁ֨ה
    עָשָׂ֣ר יוֹם֮ בּ/וֹ֒ וַ/יִּכָּתֵ֣ב כְּֽ/כָל אֲשֶׁר צִוָּ֣ה הָמָ֡ן אֶ֣ל אֲחַשְׁדַּרְפְּנֵֽי
    הַ֠/מֶּלֶךְ וְֽ/אֶל הַ/פַּח֞וֹת אֲשֶׁ֣ר עַל מְדִינָ֣ה וּ/מְדִינָ֗ה וְ/אֶל שָׂ֤רֵי
    עַם֙ וָ/עָ֔ם מְדִינָ֤ה וּ/מְדִינָה֙ כִּ/כְתָבָ֔/הּ וְ/עַ֥ם וָ/עָ֖ם כִּ/לְשׁוֹנ֑/וֹ
    בְּ/שֵׁ֨ם הַ/מֶּ֤לֶךְ אֲחַשְׁוֵרֹשׁ֙ נִכְתָּ֔ב וְ/נֶחְתָּ֖ם בְּ/טַבַּ֥עַת הַ/מֶּֽלֶךְ־־־־׀־־׃
translation:
  text: Then the king’s scribes were summoned in the first month, on the thirteenth
    day of it, and an edict was written exactly as Haman commanded to the king’s satraps,
    to the governors who were over each province, and to the officials of each people,
    to every province in its own script and to every people in its own language. It
    was written in the name of King Ahasuerus and sealed with the king’s signet ring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'it was written according to all that Haman commanded.'
    reason: lexical_alternative
  - marker: b
    text: '''Script'' refers to the writing system used by each province.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקָּרְאוּ
  chosen: were summoned
  alternatives:
  - were called
  - they summoned
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here, referring to the
    scribes being called together. 'Were summoned' is natural modern English and preserves
    the formal administrative setting better than the flatter 'were called'.
- source_word: סֹפְרֵי הַמֶּלֶךְ
  chosen: the king’s scribes
  alternatives:
  - the royal scribes
  - the king’s secretaries
  lexicon: HALOT
  rationale: סֹפְרִים in this court context refers to official scribes. 'The king’s
    scribes' is transparent and sufficiently formal; 'secretaries' is possible but
    more interpretive.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  lexicon: HALOT
  rationale: A straightforward temporal phrase; no need to specify the month name
    since the Hebrew does not do so here.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר יוֹם בּוֹ
  chosen: on the thirteenth day of it
  alternatives:
  - on its thirteenth day
  - on the thirteenth day of that month
  lexicon: HALOT
  rationale: The Hebrew literally says 'on the thirteenth day in it,' referring back
    to the month. 'Of it' preserves the anaphoric force with minimal expansion.
- source_word: וַיִּכָּתֵב
  chosen: an edict was written
  alternatives:
  - it was written
  - it was drafted
  lexicon: HALOT
  rationale: The passive verb lacks an explicit subject, but the context is the royal
    decree/letters being composed. Supplying 'an edict' makes the English idiomatic
    and clear without materially adding content.
- source_word: כְּכָל אֲשֶׁר צִוָּה הָמָן
  chosen: exactly as Haman commanded
  alternatives:
  - according to all that Haman commanded
  - just as Haman ordered
  lexicon: HALOT
  rationale: כְּכָל stresses full conformity. 'Exactly as' captures the comprehensiveness
    in natural English.
- source_word: אֲחַשְׁדַּרְפְּנֵי הַמֶּלֶךְ
  chosen: the king’s satraps
  alternatives:
  - the king’s provincial governors
  lexicon: HALOT
  rationale: The Persian administrative title is best represented by the established
    term 'satraps,' which is more precise than the generic 'governors.'
- source_word: הַפַּחוֹת
  chosen: the governors
  alternatives:
  - the prefects
  - the provincial governors
  lexicon: HALOT
  rationale: A subordinate administrative office distinct from satraps. 'Governors'
    is the clearest general rendering in English.
- source_word: אֲשֶׁר עַל מְדִינָה וּמְדִינָה
  chosen: who were over each province
  alternatives:
  - who were over province after province
  - who ruled each province
  lexicon: HALOT
  rationale: The distributive repetition indicates jurisdiction over individual provinces.
    'Each province' conveys the sense idiomatically.
- source_word: שָׂרֵי עַם וָעָם
  chosen: the officials of each people
  alternatives:
  - the princes of every people
  - the leaders of each people
  lexicon: HALOT
  rationale: שָׂרִים can mean princes, officials, or leaders. In this bureaucratic
    list, 'officials' best fits the administrative context.
- source_word: מְדִינָה וּמְדִינָה כִּכְתָבָהּ
  chosen: to every province in its own script
  alternatives:
  - to each province according to its writing
  - to every province in its own writing
  lexicon: HALOT
  rationale: כְּתָב here refers to written script or writing system. 'Script' is more
    precise and natural than 'writing' in this multilingual imperial context.
- source_word: וְעַם וָעָם כִּלְשׁוֹנוֹ
  chosen: to every people in its own language
  alternatives:
  - to each people in its own tongue
  lexicon: HALOT
  rationale: לָשׁוֹן here denotes language. 'Language' is readable modern English;
    'tongue' is more literal but less natural.
- source_word: בְּשֵׁם הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  chosen: in the name of King Ahasuerus
  alternatives:
  - under the name of King Ahasuerus
  - by the authority of King Ahasuerus
  lexicon: HALOT
  rationale: '''In the name of'' is the direct and idiomatic rendering of בְּשֵׁם
    in royal-authorization contexts.'
- source_word: נִכְתָּב
  chosen: It was written
  alternatives:
  - it was inscribed
  lexicon: HALOT
  rationale: Resumes the passive description of the decree. 'It was written' is the
    standard rendering and fits the documentary context.
- source_word: וְנֶחְתָּם
  chosen: and sealed
  alternatives:
  - and stamped with a seal
  lexicon: HALOT
  rationale: The verb refers to affixing an official seal. 'Sealed' is concise and
    idiomatic.
- source_word: בְּטַבַּעַת הַמֶּלֶךְ
  chosen: with the king’s signet ring
  alternatives:
  - with the king’s seal ring
  - with the king’s signet
  lexicon: HALOT
  rationale: The instrument is specifically a signet ring used for sealing documents.
    Rendering the object explicitly helps modern readers understand the mechanism
    of authorization.
