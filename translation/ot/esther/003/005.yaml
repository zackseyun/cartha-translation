id: EST.3.5
reference: Esther 3:5
source:
  edition: WLC
  text: וַ/יַּ֣רְא הָמָ֔ן כִּי אֵ֣ין מָרְדֳּכַ֔י כֹּרֵ֥עַ וּ/מִֽשְׁתַּחֲוֶ֖ה ל֑/וֹ
    וַ/יִּמָּלֵ֥א הָמָ֖ן חֵמָֽה־׃
translation:
  text: When Haman saw that Mordecai was neither bowing down nor prostrating himself
    before him, Haman was filled with rage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bowing' and 'paying homage.' The Hebrew uses two related but distinct
      verbs for acts of obeisance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When Haman saw
  alternatives:
  - And Haman saw
  - Now Haman saw
  lexicon: HALOT
  rationale: The waw-consecutive with ראה advances the narrative. 'When Haman saw'
    captures both the temporal force in context and natural English narrative flow.
- source_word: כִּי אֵין מָרְדֳּכַי
  chosen: that Mordecai was ... not
  alternatives:
  - that there was no bowing by Mordecai
  lexicon: HALOT
  rationale: אֵין with the participles expresses the ongoing negated action of Mordecai.
    English idiom requires restructuring as 'that Mordecai was not...'.
- source_word: כֹּרֵעַ
  chosen: bowing down
  alternatives:
  - kneeling
  - bowing
  lexicon: HALOT
  rationale: כרע denotes bending the knee or bowing. 'Bowing down' fits the courtly
    homage context and pairs well with the following verb without over-specifying
    kneeling.
- source_word: וּמִשְׁתַּחֲוֶה
  chosen: nor prostrating himself
  alternatives:
  - nor paying homage
  - nor bowing himself
  lexicon: HALOT
  rationale: השתחוה commonly denotes prostration or an act of obeisance. 'Prostrating
    himself' preserves the stronger bodily sense and distinguishes it from כרע.
- source_word: לוֹ
  chosen: before him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: Although literally 'to him,' in English the gestures of obeisance are
    naturally directed 'before him,' which better conveys the relational sense in
    this context.
- source_word: וַיִּמָּלֵא ... חֵמָה
  chosen: was filled with rage
  alternatives:
  - was filled with fury
  - was full of wrath
  - became enraged
  lexicon: HALOT
  rationale: The idiom 'was filled with' should be preserved. חֵמָה here denotes intense
    anger; 'rage' is vivid, natural modern English without importing specifically
    divine-wrath connotations.
- source_word: חֵמָה
  chosen: rage
  alternatives:
  - fury
  - wrath
  - anger
  lexicon: HALOT
  rationale: In this narrative setting, 'rage' best conveys Haman's violent emotional
    response in readable modern English.
