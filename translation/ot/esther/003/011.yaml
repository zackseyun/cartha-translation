id: EST.3.11
reference: Esther 3:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ לְ/הָמָ֔ן הַ/כֶּ֖סֶף נָת֣וּן לָ֑/ךְ וְ/הָ/עָ֕ם לַ/עֲשׂ֥וֹת
    בּ֖/וֹ כַּ/טּ֥וֹב בְּ/עֵינֶֽי/ךָ׃
translation:
  text: Then the king said to Haman, “The silver is given to you, and the people also,
    to do with them as seems good in your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The money is given to you.' Hebrew כֶּסֶף can mean 'silver' literally
      or 'money' by extension.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people' is grammatically singular but collective; English renders
      the following pronoun as plural ('them') for natural sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; no reason to substitute the specific royal
    name here since the Hebrew uses the title.
- source_word: לְהָמָן
  chosen: to Haman
  lexicon: HALOT
  rationale: Preposition plus personal name marking indirect object; standard transliteration
    of the name.
- source_word: הַכֶּסֶף
  chosen: The silver
  alternatives:
  - The money
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and often by extension 'money.' Here
    the immediate context concerns the promised payment, but retaining 'silver' stays
    closer to the Hebrew while remaining intelligible.
- source_word: נָתוּן לָךְ
  chosen: is given to you
  alternatives:
  - is granted to you
  - is yours
  lexicon: HALOT
  rationale: Passive participial construction expresses something granted or placed
    at Haman's disposal. 'Is given to you' preserves the form and sense without overinterpreting.
- source_word: וְהָעָם
  chosen: and the people also
  alternatives:
  - and the people
  - as well as the people
  lexicon: HALOT
  rationale: The conjunction links a second object to the king's grant. 'Also' makes
    explicit in English that both the silver and the people are being handed over.
- source_word: לַעֲשׂוֹת בּוֹ
  chosen: to do with them
  alternatives:
  - to deal with them
  - to do with it
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: Haman may act upon the people.
    Although בּוֹ is morphologically singular (''with it/him''), in context it refers
    collectively to הָעָם, a singular collective noun best rendered in English by
    the plural pronoun ''them'' for natural sense.'
- source_word: כַּטּוֹב בְּעֵינֶיךָ
  chosen: as seems good in your eyes
  alternatives:
  - as is good in your eyes
  - as pleases you
  lexicon: HALOT
  rationale: This idiom denotes what appears good or acceptable to someone. 'As seems
    good in your eyes' preserves the Hebrew imagery while remaining readable.
