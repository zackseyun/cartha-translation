id: EST.3.10
reference: Esther 3:10
source:
  edition: WLC
  text: וַ/יָּ֧סַר הַ/מֶּ֛לֶךְ אֶת טַבַּעְתּ֖/וֹ מֵ/עַ֣ל יָד֑/וֹ וַֽ/יִּתְּנָ֗/הּ
    לְ/הָמָ֧ן בֶּֽן הַמְּדָ֛תָא הָ/אֲגָגִ֖י צֹרֵ֥ר הַ/יְּהוּדִֽים־־׃
translation:
  text: So the king took his signet ring from his hand and gave it to Haman son of
    Hammedatha the Agagite, the enemy of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Hebrew יְהוּדִים can denote the Jewish people more
      broadly or, in some contexts, people of Judah/Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: took
  alternatives:
  - removed
  - took off
  lexicon: HALOT
  rationale: The verb means to remove or take away. In idiomatic English, with the
    following phrase 'from his hand,' 'took' is natural and sufficiently reflects
    the action without overtranslating.
- source_word: טַבַּעְתּוֹ
  chosen: his signet ring
  alternatives:
  - his ring
  lexicon: HALOT
  rationale: In this court context the ring is not merely ornamental but an official
    seal-bearing ring. 'Signet ring' makes the political function explicit and matches
    the narrative significance.
- source_word: מֵעַל יָדוֹ
  chosen: from his hand
  alternatives:
  - off his hand
  lexicon: HALOT
  rationale: A direct, natural rendering of the prepositional phrase. 'From his hand'
    preserves the Hebrew image while remaining clear in English.
- source_word: וַיִּתְּנָהּ
  chosen: gave it
  alternatives:
  - handed it over
  lexicon: HALOT
  rationale: Standard rendering of נתן with the feminine pronominal suffix referring
    back to 'ring.' 'Gave it' is straightforward and formally close.
- source_word: לְהָמָן
  chosen: to Haman
  rationale: Personal name transliterated per translation philosophy.
- source_word: בֶּן הַמְּדָתָא
  chosen: son of Hammedatha
  rationale: Patronymic construction is rendered literally. The name is transliterated
    by standard convention.
- source_word: הָאֲגָגִי
  chosen: the Agagite
  lexicon: HALOT
  rationale: A gentilic or lineage designation, traditionally linked with Agag. 'The
    Agagite' preserves the Hebrew form and the narrative resonance without interpretive
    expansion.
- source_word: צֹרֵר
  chosen: the enemy
  alternatives:
  - the adversary
  - the foe
  lexicon: HALOT
  rationale: The participle denotes one who opposes or shows hostility. 'The enemy'
    is the most natural and forceful English rendering in context.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther, יְהוּדִים can be rendered 'Jews' or 'Judeans.' Here the reference
    is to the identifiable ethnic people targeted throughout the narrative, not merely
    residents of Judah, so 'the Jews' best fits the context and standard English understanding.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  rationale: The prefixed waw continues the narrative. 'So' captures the consequential
    flow from the previous verse in readable modern English, while remaining faithful
    to the discourse function.
