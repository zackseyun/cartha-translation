id: EST.3.13
reference: Esther 3:13
source:
  edition: WLC
  text: וְ/נִשְׁל֨וֹחַ סְפָרִ֜ים בְּ/יַ֣ד הָ/רָצִים֮ אֶל כָּל מְדִינ֣וֹת הַ/מֶּלֶךְ֒
    לְ/הַשְׁמִ֡יד לַ/הֲרֹ֣ג וּ/לְ/אַבֵּ֣ד אֶת כָּל הַ֠/יְּהוּדִים מִ/נַּ֨עַר וְ/עַד
    זָקֵ֜ן טַ֤ף וְ/נָשִׁים֙ בְּ/י֣וֹם אֶחָ֔ד בִּ/שְׁלוֹשָׁ֥ה עָשָׂ֛ר לְ/חֹ֥דֶשׁ שְׁנֵים
    עָשָׂ֖ר הוּא חֹ֣דֶשׁ אֲדָ֑ר וּ/שְׁלָלָ֖/ם לָ/בֽוֹז־־־־־־־׃
translation:
  text: Letters were sent by the hand of the couriers to all the provinces of the
    king, to destroy, to kill, and to annihilate all the Jews, from young man to old
    man, children and women, in one day, on the thirteenth day of the twelfth month,
    that is, the month Adar, and to plunder their spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by couriers'; literally, 'by the hand of the runners.'
    reason: lexical_alternative
  - marker: b
    text: The three verbs 'destroy,' 'kill,' and 'annihilate' are a deliberate intensification
      in the Hebrew decree.
    reason: lexical_alternative
  - marker: c
    text: Or 'from young to old.' The Hebrew is literally 'from young man to old man,'
      used distributively for the whole population.
    reason: lexical_alternative
  - marker: d
    text: Or 'to seize their goods as plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁלוֹחַ
  chosen: Letters were sent
  alternatives:
  - and letters were sent
  - dispatches were sent
  lexicon: HALOT
  rationale: Passive/impersonal infinitive construction introducing the decree's dissemination.
    English idiom requires an explicit subject with the following סְפָרִים, yielding
    'Letters were sent.'
- source_word: סְפָרִים
  chosen: Letters
  alternatives:
  - documents
  - dispatches
  lexicon: HALOT
  rationale: In Persian administrative context this refers to written royal communications.
    'Letters' is natural and sufficiently formal without over-specifying genre.
- source_word: בְּיַד הָרָצִים
  chosen: by the hand of the couriers
  alternatives:
  - by couriers
  - by the runners
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'by the hand of' while remaining intelligible.
    הָרָצִים literally means 'the runners,' i.e., royal couriers.
- source_word: אֶל כָּל מְדִינוֹת הַמֶּלֶךְ
  chosen: to all the provinces of the king
  alternatives:
  - to all the king's provinces
  lexicon: HALOT
  rationale: Both are accurate; the chosen wording stays closer to the Hebrew word
    order while remaining readable.
- source_word: לְהַשְׁמִיד לַהֲרֹג וּלְאַבֵּד
  chosen: to destroy, to kill, and to annihilate
  alternatives:
  - to destroy, to slay, and to exterminate
  - to wipe out, to kill, and to destroy
  lexicon: HALOT
  rationale: The Hebrew uses a forceful triad of near-synonyms to intensify the decree's
    totalizing violence. 'Destroy ... kill ... annihilate' preserves the rhetorical
    piling up without flattening the distinctions.
- source_word: אֶת כָּל הַיְּהוּדִים
  chosen: all the Jews
  alternatives:
  - the whole Jewish people
  lexicon: HALOT
  rationale: Direct and accurate rendering of the ethnic designation with totalizing
    כָּל preserved.
- source_word: מִנַּעַר וְעַד זָקֵן
  chosen: from young man to old man
  alternatives:
  - from youth to old age
  - from young to old
  lexicon: HALOT
  rationale: The singular forms function distributively. 'From young man to old man'
    preserves the gendered singular wording of the Hebrew more closely than the idiomatic
    but less precise 'young to old.'
- source_word: טַף וְנָשִׁים
  chosen: children and women
  alternatives:
  - little children and women
  - dependents and women
  lexicon: HALOT
  rationale: טַף commonly denotes children/little ones. 'Children and women' is the
    clearest modern rendering and preserves the decree's inclusion of noncombatants.
- source_word: בְּיוֹם אֶחָד
  chosen: in one day
  alternatives:
  - on a single day
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in one day' is idiomatic and preserves
    the concentrated timing.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר לְחֹדֶשׁ שְׁנֵים עָשָׂר
  chosen: on the thirteenth day of the twelfth month
  alternatives:
  - on the thirteenth of the twelfth month
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew date formula.
- source_word: הוּא חֹדֶשׁ אֲדָר
  chosen: that is, the month Adar
  alternatives:
  - which is the month Adar
  lexicon: HALOT
  rationale: Appositional clarification of the month name; 'that is' reads naturally
    in modern English.
- source_word: וּשְׁלָלָם לָבוֹז
  chosen: and to plunder their spoil
  alternatives:
  - and to seize their goods as plunder
  - and to take their possessions for plunder
  lexicon: HALOT
  rationale: Preserves the noun-verb combination 'their spoil/plunder' + 'to plunder.'
    Though somewhat tautological in English, it reflects the Hebrew emphasis on sanctioned
    looting.
