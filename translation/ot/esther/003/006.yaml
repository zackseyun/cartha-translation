id: EST.3.6
reference: Esther 3:6
source:
  edition: WLC
  text: וַ/יִּ֣בֶז בְּ/עֵינָ֗י/ו לִ/שְׁלֹ֤ח יָד֙ בְּ/מָרְדֳּכַ֣י לְ/בַדּ֔/וֹ כִּֽי
    הִגִּ֥ידוּ ל֖/וֹ אֶת עַ֣ם מָרְדֳּכָ֑י וַ/יְבַקֵּ֣שׁ הָמָ֗ן לְ/הַשְׁמִ֧יד אֶת כָּל
    הַ/יְּהוּדִ֛ים אֲשֶׁ֛ר בְּ/כָל מַלְכ֥וּת אֲחַשְׁוֵר֖וֹשׁ עַ֥ם מָרְדֳּכָֽי־־־־־׃
translation:
  text: But it seemed contemptible in his eyes to lay a hand on Mordecai alone, because
    they had told him what people Mordecai belonged to. So Haman sought to destroy
    all the Jews throughout the whole kingdom of Ahasuerus—the people of Mordecai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the people of Mordecai'; that is, the people to whom Mordecai
      belonged.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶז בְּעֵינָיו
  chosen: it seemed contemptible in his eyes
  alternatives:
  - he considered it beneath him
  - it was despicable in his eyes
  lexicon: HALOT
  rationale: The verb בזה with the idiom 'in his eyes' expresses disdain or contempt.
    'It seemed contemptible in his eyes' preserves the evaluative force and the Hebrew
    idiom more closely than a flatter 'he disdained.'
- source_word: לִשְׁלֹחַ יָד בְּ
  chosen: to lay a hand on
  alternatives:
  - to attack
  - to strike
  lexicon: HALOT
  rationale: The idiom 'send/stretch out a hand against' commonly means to act violently
    against someone. 'Lay a hand on' is a natural English idiom that preserves the
    concrete imagery.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: Here the sense is that Mordecai by himself was too limited a target.
    'Alone' best fits the contrast with the wider people-group Haman then targets.
- source_word: כִּי הִגִּידוּ לוֹ
  chosen: because they had told him
  alternatives:
  - for they had informed him
  - since they had made known to him
  lexicon: HALOT
  rationale: The clause gives the reason for Haman's broader plan. The pluperfect
    'had told' fits the narrative sequence in English.
- source_word: אֶת עַם מָרְדֳּכָי
  chosen: what people Mordecai belonged to
  alternatives:
  - Mordecai's people
  - the people of Mordecai
  lexicon: HALOT
  rationale: The Hebrew literally says 'the people of Mordecai,' meaning his ethnic/national
    people. In this first occurrence, the expanded rendering clarifies the sense for
    modern readers.
- source_word: וַיְבַקֵּשׁ
  chosen: sought
  alternatives:
  - tried
  - set out
  lexicon: HALOT
  rationale: בקש here denotes purposeful intent. 'Sought' is concise and preserves
    the deliberative force without overstating success at this stage.
- source_word: לְהַשְׁמִיד
  chosen: to destroy
  alternatives:
  - to annihilate
  - to exterminate
  lexicon: HALOT
  rationale: The Hiphil of שׁמד carries the sense of destroying utterly. 'Destroy'
    is the broad, standard rendering; stronger alternatives are possible, but 'destroy'
    avoids importing a more technical modern term while still conveying severity.
- source_word: כָּל הַיְּהוּדִים
  chosen: all the Jews
  alternatives:
  - all the Judeans
  lexicon: HALOT
  rationale: In Esther, יְהוּדִים refers to the Jewish people in the Persian diaspora,
    not merely inhabitants of Judah. 'Jews' is the most accurate contextual rendering.
- source_word: אֲשֶׁר בְּכָל מַלְכוּת אֲחַשְׁוֵרוֹשׁ
  chosen: throughout the whole kingdom of Ahasuerus
  alternatives:
  - who were in all the kingdom of Ahasuerus
  - throughout all Ahasuerus's kingdom
  lexicon: HALOT
  rationale: This phrase locates the Jews across the empire. 'Throughout the whole
    kingdom' communicates distributive scope in idiomatic English.
- source_word: עַם מָרְדֳּכָי
  chosen: the people of Mordecai
  alternatives:
  - Mordecai's people
  lexicon: HALOT
  rationale: The repeated phrase is retained more literally here as an appositional
    summary after 'all the Jews,' preserving the rhetorical emphasis of the Hebrew
    repetition.
