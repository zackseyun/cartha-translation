id: EST.3.14
reference: Esther 3:14
source:
  edition: WLC
  text: פַּתְשֶׁ֣גֶן הַ/כְּתָ֗ב לְ/הִנָּ֤תֵֽן דָּת֙ בְּ/כָל מְדִינָ֣ה וּ/מְדִינָ֔ה
    גָּל֖וּי לְ/כָל הָֽ/עַמִּ֑ים לִ/הְי֥וֹת עֲתִדִ֖ים לַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: A copy of the written decree was to be issued as law in every province and
    province, being made known to all the peoples, so that they would be ready for
    this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in each and every province.' The Hebrew repeats 'province' distributively
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'for that day,' referring to the specified day set by the decree.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתְשֶׁגֶן
  chosen: copy
  alternatives:
  - text
  - duplicate
  lexicon: HALOT
  rationale: The Persian loanword refers to a copy or transcript of an official document.
    'Copy' is idiomatic and fits the administrative context.
- source_word: הַכְּתָב
  chosen: the written decree
  alternatives:
  - the document
  - the writing
  lexicon: HALOT
  rationale: Literally 'the writing/document.' In context it is the written imperial
    order; 'written decree' makes the function clear without over-paraphrasing.
- source_word: לְהִנָּתֵן
  chosen: was to be issued
  alternatives:
  - to be given
  - to be promulgated
  lexicon: HALOT
  rationale: The infinitive passive of נתן here describes official publication/distribution
    of the decree. 'Was to be issued' captures the administrative passive naturally
    in English.
- source_word: דָּת
  chosen: law
  alternatives:
  - decree
  - edict
  lexicon: HALOT
  rationale: In Esther this Persian administrative term often denotes a binding legal
    decree. 'Law' reflects its force here, though 'decree' is also possible.
- source_word: בְּכָל מְדִינָה וּמְדִינָה
  chosen: in every province and province
  alternatives:
  - in every single province
  - in each and every province
  lexicon: HALOT
  rationale: The distributive repetition emphasizes comprehensiveness. The rendering
    stays close to the Hebrew repetition, though slightly wooden, to preserve the
    emphasis.
- source_word: גָּלוּי
  chosen: being made known
  alternatives:
  - openly displayed
  - published
  lexicon: HALOT
  rationale: The passive participle conveys public disclosure. 'Being made known'
    preserves the sense of open publication to the populace.
- source_word: לְכָל הָעַמִּים
  chosen: to all the peoples
  alternatives:
  - to all the nations
  - to all the peoples of the empire
  lexicon: HALOT
  rationale: '''Peoples'' is preferable to ''nations'' here because the reference
    is to the various ethnic populations within the empire.'
- source_word: לִהְיוֹת עֲתִדִים
  chosen: so that they would be ready
  alternatives:
  - to be prepared
  - to be in readiness
  lexicon: HALOT
  rationale: 'This infinitive plus adjective expresses purpose/result: the peoples
    were to be prepared. ''So that they would be ready'' is natural modern English.'
- source_word: לַיּוֹם הַזֶּה
  chosen: for this day
  alternatives:
  - for that day
  - for the appointed day
  lexicon: HALOT
  rationale: Formally the Hebrew reads 'for this day.' In context it points to the
    specified day announced in the decree. The more literal wording is retained in
    the main text, with the contextual alternative noted in a footnote.
