id: EST.3.15
reference: Esther 3:15
source:
  edition: WLC
  text: הָֽ/רָצִ֞ים יָצְא֤וּ דְחוּפִים֙ בִּ/דְבַ֣ר הַ/מֶּ֔לֶךְ וְ/הַ/דָּ֥ת נִתְּנָ֖ה
    בְּ/שׁוּשַׁ֣ן הַ/בִּירָ֑ה וְ/הַ/מֶּ֤לֶךְ וְ/הָמָן֙ יָשְׁב֣וּ לִ/שְׁתּ֔וֹת וְ/הָ/עִ֥יר
    שׁוּשָׁ֖ן נָבֽוֹכָה׃פ
translation:
  text: The couriers went out, hurried by the king’s command, and the decree was issued
    in Susa the citadel. And the king and Haman sat down to drink, but the city of
    Susa was thrown into confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law was given in Susa the citadel.' The Hebrew verb is literally
      'was given,' and דָּת can be rendered 'law' or 'decree' in this Persian administrative
      setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the city of Susa was bewildered' or 'was in turmoil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  chosen: the couriers
  alternatives:
  - the runners
  - the messengers
  lexicon: HALOT
  rationale: Refers to royal dispatch-bearers in the Persian administrative context.
    'Couriers' is idiomatic modern English and preserves the official function better
    than the more literal 'runners.'
- source_word: דְחוּפִים
  chosen: hurried
  alternatives:
  - driven on
  - pressed on
  - hastened
  lexicon: HALOT
  rationale: Conveys urgency imposed on the couriers. 'Hurried' is natural in English
    and fits the passive-like sense in context without overtranslating the participle.
- source_word: בִּדְבַר הַמֶּלֶךְ
  chosen: by the king’s command
  alternatives:
  - according to the king’s word
  - at the king’s word
  lexicon: HALOT
  rationale: דבר here denotes an authoritative order rather than mere speech. 'Command'
    best captures the force of the royal directive in context.
- source_word: הַדָּת
  chosen: the decree
  alternatives:
  - the law
  - the edict
  lexicon: HALOT
  rationale: In Esther, דָּת commonly denotes an official legal decree within the
    Persian court setting. 'Decree' is clear and suitably formal; 'law' could imply
    a more general legal code.
- source_word: נִתְּנָה
  chosen: was issued
  alternatives:
  - was given
  - was promulgated
  lexicon: HALOT
  rationale: Although literally 'was given,' the idiom in administrative context refers
    to formal publication or enactment. 'Was issued' communicates that sense in readable
    English.
- source_word: שׁוּשַׁן הַבִּירָה
  chosen: Susa the citadel
  alternatives:
  - Susa the fortress
  - the citadel of Susa
  lexicon: HALOT
  rationale: בירה denotes the fortified palace complex/citadel. 'Susa the citadel'
    follows established English convention and reflects the appositional Hebrew construction.
- source_word: יָשְׁבוּ לִשְׁתּוֹת
  chosen: sat down to drink
  alternatives:
  - sat down for drinking
  - began to drink
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew idiom, preserving the chilling
    contrast between official violence and royal feasting.
- source_word: נָבוֹכָה
  chosen: was thrown into confusion
  alternatives:
  - was bewildered
  - was in turmoil
  - was perplexed
  lexicon: HALOT
  rationale: The Niphal conveys a state of agitation, bewilderment, or disorientation.
    'Was thrown into confusion' captures both the passive/resultative nuance and the
    civic disturbance implied by the context.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: Hebrew syntax
  rationale: 'The final conjunction is formally ''and,'' but English style and the
    narrative contrast favor ''but'': the king and Haman drink while the city is in
    turmoil. This is an optimal-equivalence adjustment to preserve discourse force.'
