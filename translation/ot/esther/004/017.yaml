id: EST.4.17
reference: Esther 4:17
source:
  edition: WLC
  text: וַֽ/יַּעֲבֹ֖ר מָרְדֳּכָ֑י וַ/יַּ֕עַשׂ כְּ/כֹ֛ל אֲשֶׁר צִוְּתָ֥ה עָלָ֖י/ו אֶסְתֵּֽר־׃ס
translation:
  text: So Mordecai went away and did according to all that Esther had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went on' or 'passed on'; the Hebrew verb literally means 'passed over/through,'
      but here likely refers to Mordecai's departure to do what Esther instructed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: went away
  alternatives:
  - passed on
  - went on
  - crossed over
  lexicon: HALOT
  rationale: The verb עבר literally has a broad sense of passing over/through, but
    in this narrative context it idiomatically indicates departure to carry out Esther's
    instructions. 'Went away' is natural English and fits the immediate context better
    than the more wooden 'passed on' or the potentially misleading 'crossed over'.
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' Here 'did' preserves the straightforward
    narrative style and pairs naturally with 'according to all that...'. 'Carried
    out' is interpretive and slightly more expansive than the Hebrew requires.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: This construction expresses conformity to Esther's command. 'According
    to all that' is a clear, fairly formal rendering that preserves the comprehensive
    force of כֹּל without sounding awkward.
- source_word: צִוְּתָה
  chosen: had commanded
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: The verb צוה means 'command.' English past perfect ('had commanded')
    smooths the sequence by marking Esther's prior instruction relative to Mordecai's
    subsequent action. 'Ordered' is possible but slightly harsher and less neutral
    than the Hebrew requires.
- source_word: עָלָיו
  chosen: him
  alternatives:
  - to him
  - upon him
  lexicon: HALOT
  rationale: With צוה, על commonly marks the person commanded. In idiomatic English
    this is best rendered simply as the object 'him' rather than the more literal
    but less natural 'to him' or 'upon him'.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
