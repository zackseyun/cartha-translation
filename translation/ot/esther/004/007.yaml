id: EST.4.7
reference: Esther 4:7
source:
  edition: WLC
  text: וַ/יַּגֶּד ל֣/וֹ מָרְדֳּכַ֔י אֵ֖ת כָּל אֲשֶׁ֣ר קָרָ֑/הוּ וְ/אֵ֣ת פָּרָשַׁ֣ת
    הַ/כֶּ֗סֶף אֲשֶׁ֨ר אָמַ֤ר הָמָן֙ לִ֠/שְׁקוֹל עַל גִּנְזֵ֥י הַ/מֶּ֛לֶךְ ב/יהודיים
    לְ/אַבְּדָֽ/ם־־׀־׃
translation:
  text: Mordecai told him everything that had happened to him, and the exact amount
    of money that Haman had said he would weigh out into the king’s treasuries for
    the destruction of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the full account of the money' or 'the sum of money.' The Hebrew phrase
      refers to the specified amount Haman proposed to pay.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  chosen: told
  alternatives:
  - reported
  - declared
  - made known
  lexicon: HALOT
  rationale: The Hiphil of נגד means to make known or tell. 'Told' is natural modern
    English and fits the narrative setting without sounding overly formal.
- source_word: לוֹ
  chosen: him
  lexicon: HALOT
  rationale: Refers to Hathach in context; the pronoun is straightforwardly rendered
    'him'.
- source_word: אֵת כָּל אֲשֶׁר קָרָהוּ
  chosen: everything that had happened to him
  alternatives:
  - all that had befallen him
  - everything that had happened
  lexicon: HALOT
  rationale: קָרָה with pronominal suffix denotes what had happened or befallen Mordecai.
    Including 'to him' preserves the suffix explicitly present in Hebrew.
- source_word: פָּרָשַׁת הַכֶּסֶף
  chosen: the exact amount of money
  alternatives:
  - the full account of the money
  - the sum of money
  - the details concerning the money
  lexicon: HALOT
  rationale: פָּרָשָׁה can denote a specification, exact statement, or full account.
    In this context it refers not merely to money in general but to the specified
    sum Haman promised. 'The exact amount of money' conveys that specificity clearly
    in English.
- source_word: אָמַר ... לִשְׁקוֹל
  chosen: had said he would weigh out
  alternatives:
  - promised to pay
  - said to weigh out
  lexicon: HALOT
  rationale: The Hebrew literally says Haman 'said to weigh out.' In idiomatic English,
    'had said he would weigh out' preserves both the speech element and the intended
    payment action.
- source_word: לִשְׁקוֹל
  chosen: weigh out
  alternatives:
  - pay out
  - weigh
  lexicon: HALOT
  rationale: Silver was commonly measured by weight; 'weigh out' preserves the concrete
    economic imagery better than the more generalized 'pay out.'
- source_word: עַל גִּנְזֵי הַמֶּלֶךְ
  chosen: into the king’s treasuries
  alternatives:
  - for the king’s treasuries
  - to the king’s treasury
  lexicon: HALOT
  rationale: The phrase indicates deposit for royal treasuries. The plural construct
    גִּנְזֵי is best reflected by 'treasuries.' 'Into' captures the sense of payment
    being placed into the royal treasury system.
- source_word: בַּיְּהוּדִים
  chosen: for the destruction of the Jews
  alternatives:
  - against the Jews
  - concerning the Jews
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic with the following infinitive, indicating
    the target of the destructive action. Rendering the whole phrase smoothly in English
    requires bringing the sense forward as 'for the destruction of the Jews.'
- source_word: לְאַבְּדָם
  chosen: for the destruction of the Jews
  alternatives:
  - to destroy them
  - to annihilate them
  lexicon: HALOT
  rationale: The Piel infinitive of אבד here means to destroy or wipe out. Because
    the suffix refers back to 'the Jews,' the English phrase is integrated as 'for
    the destruction of the Jews.' 'Annihilate' is possible but slightly stronger and
    less directly lexical.
