id: EST.4.16
reference: Esther 4:16
source:
  edition: WLC
  text: לֵךְ֩ כְּנ֨וֹס אֶת כָּל הַ/יְּהוּדִ֜ים הַֽ/נִּמְצְאִ֣ים בְּ/שׁוּשָׁ֗ן וְ/צ֣וּמוּ
    עָ֠לַ/י וְ/אַל תֹּאכְל֨וּ וְ/אַל תִּשְׁתּ֜וּ שְׁלֹ֤שֶׁת יָמִים֙ לַ֣יְלָה וָ/י֔וֹם
    גַּם אֲנִ֥י וְ/נַעֲרֹתַ֖/י אָצ֣וּם כֵּ֑ן וּ/בְ/כֵ֞ן אָב֤וֹא אֶל הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר
    לֹֽא כַ/דָּ֔ת וְ/כַ/אֲשֶׁ֥ר אָבַ֖דְתִּי אָבָֽדְתִּי־־־־־־־׃
translation:
  text: Go, gather all the Jews who are found in Susa, and fast for me. Do not eat
    or drink for three days, night and day. I and my young women also will fast in
    the same way. Then I will go to the king, though it is not according to the law;
    and if I perish, I perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the Jews who are in Susa.' The Hebrew participle literally means
      'who are found' or 'who are present.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'fast on my behalf.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'my maids' or 'my female attendants.'
    reason: lexical_alternative
  - marker: d
    text: Or, 'contrary to the law.'
    reason: lexical_alternative
  - marker: e
    text: Or, 'and when I perish, I perish.' The Hebrew wording is terse and emphatic,
      expressing Esther's acceptance of the risk.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Qal imperative of הלך used as a direct command to Mordecai; simple 'Go'
    is natural and sufficiently formal.
- source_word: כְּנוֹס
  chosen: gather
  alternatives:
  - assemble
  - bring together
  lexicon: HALOT
  rationale: Imperative calling for collecting the Jews together. 'Gather' is idiomatic
    modern English and preserves the action without overformalizing.
- source_word: כָּל הַיְּהוּדִים הַנִּמְצְאִים בְּשׁוּשָׁן
  chosen: all the Jews who are found in Susa
  alternatives:
  - all the Jews who are in Susa
  - all the Jews present in Susa
  lexicon: HALOT
  rationale: הנמצאים literally 'who are found/present.' 'Who are found in Susa' keeps
    the participial nuance and the comprehensiveness of the appeal.
- source_word: שׁוּשָׁן
  chosen: Susa
  alternatives:
  - Shushan
  lexicon: HALOT
  rationale: Standard English transliteration is 'Susa'; 'Shushan' reflects older
    tradition more than current convention.
- source_word: וְצוּמוּ עָלַי
  chosen: and fast for me
  alternatives:
  - and fast on my behalf
  - and fast concerning me
  lexicon: HALOT
  rationale: The preposition עַל with 1cs here indicates fasting in relation to Esther's
    situation, best conveyed as 'for me' in clear English.
- source_word: וְאַל תֹּאכְלוּ וְאַל תִּשְׁתּוּ
  chosen: Do not eat or drink
  alternatives:
  - and do not eat and do not drink
  lexicon: HALOT
  rationale: The paired prohibitions define the fast. English naturally compresses
    the repeated negative while preserving full meaning.
- source_word: שְׁלֹשֶׁת יָמִים לַיְלָה וָיוֹם
  chosen: for three days, night and day
  alternatives:
  - for three days, night and day alike
  - for three days, by night and by day
  lexicon: HALOT
  rationale: This preserves the Hebrew sequence and emphasizes the uninterrupted duration
    of the fast. It is more natural than a hyper-literal 'night and day' without the
    preposition 'for' attached to the whole phrase.
- source_word: גַּם אֲנִי וְנַעֲרֹתַי
  chosen: I and my young women also
  alternatives:
  - I and my maids also
  - I and my female attendants also
  lexicon: HALOT
  rationale: נַעֲרוֹת can denote female servants/attendants. 'Young women' is a readable
    rendering that avoids archaic 'maids' while not overstating formal court rank.
- source_word: אָצוּם כֵּן
  chosen: will fast in the same way
  alternatives:
  - will fast likewise
  - will fast as you do
  lexicon: HALOT
  rationale: כֵּן points back to the manner just described. 'In the same way' makes
    the referent explicit in natural English.
- source_word: וּבְכֵן
  chosen: Then
  alternatives:
  - And thus
  - After that
  - Accordingly
  lexicon: HALOT
  rationale: This transitional expression marks consequence/result. 'Then' is concise
    and idiomatic in narrative sequence.
- source_word: אָבוֹא אֶל הַמֶּלֶךְ
  chosen: I will go to the king
  alternatives:
  - I will come to the king
  - I will enter before the king
  lexicon: HALOT
  rationale: בוא with אֶל here means to approach/go in to the king. 'Go to' is straightforward
    and avoids adding 'before' unless context requires it.
- source_word: אֲשֶׁר לֹא כַדָּת
  chosen: though it is not according to the law
  alternatives:
  - which is not according to the law
  - contrary to the law
  lexicon: HALOT
  rationale: כַדָּת means 'according to the law/custom.' The clause explains the risk
    of her action. 'Though it is not according to the law' captures the concessive
    force in context.
- source_word: וְכַאֲשֶׁר אָבַדְתִּי אָבָדְתִּי
  chosen: and if I perish, I perish
  alternatives:
  - and when I perish, I perish
  - and should I be destroyed, I am destroyed
  lexicon: HALOT
  rationale: The repeated perfect expresses resolute acceptance of possible loss.
    Traditional 'if I perish, I perish' is both faithful and idiomatic; 'if' best
    conveys the contingent resolve in context.
