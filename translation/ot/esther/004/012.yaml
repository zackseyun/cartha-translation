id: EST.4.12
reference: Esther 4:12
source:
  edition: WLC
  text: וַ/יַּגִּ֣ידוּ לְ/מָרְדֳּכָ֔י אֵ֖ת דִּבְרֵ֥י אֶסְתֵּֽר׃פ
translation:
  text: And they told Mordecai Esther’s words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Esther’s message' or 'Esther’s reply.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  chosen: And they told
  alternatives:
  - And they reported
  - And they declared
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of נגד here introduces the next narrative action
    with an unspecified plural subject. 'Told' is natural modern English and fits
    the direct communication context better than the more formal 'declared.' 'Reported'
    is possible but slightly more official in tone than the context requires.
- source_word: לְמָרְדֳּכָי
  chosen: Mordecai
  rationale: The preposition ל marks the indirect object, naturally expressed in English
    by word order as 'told Mordecai.' The personal name is transliterated per translation
    philosophy.
- source_word: אֵת
  chosen: '[not separately translated]'
  rationale: This is the direct-object marker in Hebrew and has no standalone English
    equivalent; its function is represented by the syntax of 'told Mordecai Esther’s
    words.'
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - message
  - reply
  lexicon: HALOT
  rationale: The construct plural of דָּבָר can mean 'words,' 'message,' or 'matter.'
    'Words' is the most formally transparent rendering and preserves the textual emphasis
    on Esther's actual speech. 'Message' and 'reply' are contextually possible but
    slightly more interpretive.
- source_word: אֶסְתֵּר
  chosen: Esther’s
  rationale: The proper name is transliterated, and the construct relationship with
    דִּבְרֵי is naturally rendered by the English possessive 'Esther’s.'
