id: EST.4.10
reference: Esther 4:10
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר אֶסְתֵּר֙ לַ/הֲתָ֔ךְ וַ/תְּצַוֵּ֖/הוּ אֶֽל מָרְדֳּכָֽי־׃
translation:
  text: Then Esther spoke to Hathach and commanded him to go to Mordecai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Then Esther said to Hathach and commanded him to Mordecai.'
      The Hebrew implies that she instructed Hathach to go to Mordecai.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then Esther spoke
  alternatives:
  - Then Esther said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, here rendered 'Then.' The
    verb אמר commonly means 'say,' but in English 'spoke to' fits naturally with the
    following indirect object 'to Hathach' and prepares for the subsequent command.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: לַהֲתָךְ
  chosen: to Hathach
  rationale: The preposition ל marks the indirect object of Esther's speech. The proper
    name is transliterated as 'Hathach.'
- source_word: וַתְּצַוֵּהוּ
  chosen: and commanded him
  alternatives:
  - and instructed him
  - and charged him
  lexicon: HALOT
  rationale: The piel of צוה denotes giving a command or charge. 'Commanded him' best
    preserves the force of the verb without softening it. The pronominal suffix refers
    to Hathach.
- source_word: אֶל
  chosen: to go to
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: The preposition literally means 'to/toward,' but in English after 'commanded
    him' the sense is naturally completed as 'commanded him to go to' Mordecai. This
    is a minimal contextual expansion required for idiomatic English and reflects
    the directional force of the preposition.
- source_word: מָרְדֳּכָי
  chosen: Mordecai
  rationale: Personal name transliterated by standard English convention.
