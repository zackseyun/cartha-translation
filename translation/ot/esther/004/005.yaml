id: EST.4.5
reference: Esther 4:5
source:
  edition: WLC
  text: וַ/תִּקְרָא֩ אֶסְתֵּ֨ר לַ/הֲתָ֜ךְ מִ/סָּרִיסֵ֤י הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר הֶעֱמִ֣יד
    לְ/פָנֶ֔י/הָ וַ/תְּצַוֵּ֖/הוּ עַֽל מָרְדֳּכָ֑י לָ/דַ֥עַת מַה זֶּ֖ה וְ/עַל מַה
    זֶּֽה־־־־׃
translation:
  text: Then Esther called for Hathach, one of the king’s eunuchs, whom he had appointed
    to attend her, and she commanded him concerning Mordecai, to learn what this was
    and why it was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the king’s court officials.' The Hebrew term can denote a eunuch
      specifically or, in some contexts, a royal officer more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: Then Esther called for
  alternatives:
  - And Esther called
  - So Esther summoned
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'Then' gives natural English sequence.
    'Called for' fits the construction with ל plus the personal name, indicating summoning
    someone into her presence.
- source_word: לַהֲתָךְ
  chosen: Hathach
  rationale: Personal name is transliterated per translation philosophy.
- source_word: מִסָּרִיסֵי הַמֶּלֶךְ
  chosen: one of the king’s eunuchs
  alternatives:
  - one of the king’s officials
  - one of the king’s court officers
  lexicon: HALOT
  rationale: סָרִיס often denotes a eunuch, especially in royal court settings, though
    it can broaden to court official. Here the more concrete sense is retained in
    the main text because that is the ordinary lexical value and fits Persian court
    context; a broader alternative is worth preserving in a footnote.
- source_word: אֲשֶׁר הֶעֱמִיד לְפָנֶיהָ
  chosen: whom he had appointed to attend her
  alternatives:
  - whom he had stationed before her
  - whom he had assigned to her service
  lexicon: HALOT
  rationale: The subject of הֶעֱמִיד is most naturally the king from the prior phrase.
    The idiom 'appointed to attend her' conveys both official assignment and personal
    attendance more idiomatically than the more literal 'stationed before her.'
- source_word: וַתְּצַוֵּהוּ עַל מָרְדֳּכָי
  chosen: and she commanded him concerning Mordecai
  alternatives:
  - and she ordered him about Mordecai
  - and she instructed him regarding Mordecai
  lexicon: HALOT
  rationale: צוה with עַל here introduces the matter about which he is commissioned.
    'Commanded' preserves the force of the verb; 'concerning Mordecai' is a natural
    rendering of the preposition.
- source_word: לָדַעַת
  chosen: to learn
  alternatives:
  - to know
  - to find out
  lexicon: HALOT
  rationale: Infinitive of purpose. 'To learn' is concise and natural in English,
    expressing the intended inquiry.
- source_word: מַה זֶּה
  chosen: what this was
  alternatives:
  - what this meant
  - what this was about
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the open-ended inquiry into the
    situation without over-interpreting it as merely symbolic meaning.
- source_word: וְעַל מַה זֶּה
  chosen: and why it was
  alternatives:
  - and for what reason it was so
  - and what this was about
  lexicon: HALOT
  rationale: The repeated phrase with עַל idiomatically asks the reason or cause.
    'Why it was' gives clear modern English while preserving the distinction from
    the previous 'what this was.'
