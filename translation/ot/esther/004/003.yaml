id: EST.4.3
reference: Esther 4:3
source:
  edition: WLC
  text: וּ/בְ/כָל מְדִינָ֣ה וּ/מְדִינָ֗ה מְקוֹם֙ אֲשֶׁ֨ר דְּבַר הַ/מֶּ֤לֶךְ וְ/דָת/וֹ֙
    מַגִּ֔יעַ אֵ֤בֶל גָּדוֹל֙ לַ/יְּהוּדִ֔ים וְ/צ֥וֹם וּ/בְכִ֖י וּ/מִסְפֵּ֑ד שַׂ֣ק
    וָ/אֵ֔פֶר יֻצַּ֖ע לָֽ/רַבִּֽים־־׃
translation:
  text: And in every province, wherever the king’s word and his decree reached, there
    was great mourning among the Jews, with fasting and weeping and lamentation; sackcloth
    and ashes were spread out for many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sackcloth and ashes were used by many.' The Hebrew לָרַבִּים after 'were
      spread out' is concise and may indicate either widespread use among many people
      or that these mourning items were spread out for many.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל מְדִינָה וּמְדִינָה
  chosen: in every province
  alternatives:
  - in each and every province
  lexicon: HALOT
  rationale: The distributive repetition 'province and province' is idiomatically
    rendered in English as 'every province' while preserving the sense of comprehensiveness.
- source_word: מְקוֹם אֲשֶׁר
  chosen: wherever
  alternatives:
  - every place where
  - in every place where
  lexicon: HALOT
  rationale: This combination introduces the locale in which the following condition
    applies. 'Wherever' is concise modern English that preserves the distributive
    force.
- source_word: דְּבַר הַמֶּלֶךְ
  chosen: the king’s word
  alternatives:
  - the king’s command
  - the king’s message
  lexicon: HALOT
  rationale: דבר is literally 'word/matter.' Here it refers to the royal communication
    itself. 'Word' preserves the Hebrew wording, while the accompanying 'decree' clarifies
    the legal force.
- source_word: וְדָתוֹ
  chosen: his decree
  alternatives:
  - his law
  - his edict
  lexicon: HALOT
  rationale: דת in Esther commonly refers to an official legal enactment. 'Decree'
    is natural English and fits the Persian-court setting better than the broader
    'law.' 'Edict' is possible but slightly more formal.
- source_word: מַגִּיעַ
  chosen: reached
  alternatives:
  - arrived
  - came
  lexicon: HALOT
  rationale: The participle denotes the royal word/decree coming to a place. 'Reached'
    idiomatically expresses dissemination through the provinces.
- source_word: אֵבֶל גָּדוֹל
  chosen: great mourning
  alternatives:
  - great grief
  - great lamentation
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially in response to calamity or deathlike
    loss. 'Great mourning' best matches the communal and ritual context.
- source_word: לַיְּהוּדִים
  chosen: among the Jews
  alternatives:
  - for the Jews
  - to the Jews
  lexicon: HALOT
  rationale: The preposition marks those experiencing the mourning. 'Among the Jews'
    communicates that this mourning was widespread within the Jewish community.
- source_word: וְצוֹם וּבְכִי וּמִסְפֵּד
  chosen: with fasting and weeping and lamentation
  alternatives:
  - and fasting and weeping and wailing
  lexicon: HALOT
  rationale: These nouns likely elaborate the forms that the mourning took. 'With'
    makes the relation clear in English. מִסְפֵּד is more formal public lament than
    simple sorrow, hence 'lamentation.'
- source_word: שַׂק וָאֵפֶר
  chosen: sackcloth and ashes
  alternatives:
  - sackcloth with ashes
  lexicon: HALOT
  rationale: This is a conventional mourning expression in Hebrew Bible contexts and
    should be preserved in its familiar English form.
- source_word: יֻצַּע
  chosen: were spread out
  alternatives:
  - were laid out
  - were put on
  lexicon: HALOT
  rationale: The Hophal of יצע literally means 'was spread/laid out.' This likely
    pictures sackcloth and ashes being laid out as mourning accoutrements. 'Were spread
    out' preserves the imagery without overinterpreting as clothing.
- source_word: לָרַבִּים
  chosen: for many
  alternatives:
  - by many
  - for the multitude
  lexicon: HALOT
  rationale: The phrase is somewhat terse. 'For many' fits the passive verb and suggests
    that these mourning signs were made available/used widely. Because 'by many' is
    also plausible, that alternative is preserved in a footnote.
