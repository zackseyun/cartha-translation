id: EST.4.8
reference: Esther 4:8
source:
  edition: WLC
  text: וְ/אֶת פַּתְשֶׁ֣גֶן כְּתָֽב הַ֠/דָּת אֲשֶׁר נִתַּ֨ן בְּ/שׁוּשָׁ֤ן לְ/הַשְׁמִידָ/ם֙
    נָ֣תַן ל֔/וֹ לְ/הַרְא֥וֹת אֶת אֶסְתֵּ֖ר וּ/לְ/הַגִּ֣יד לָ֑/הּ וּ/לְ/צַוּ֣וֹת עָלֶ֗י/הָ
    לָ/ב֨וֹא אֶל הַ/מֶּ֧לֶךְ לְ/הִֽתְחַנֶּן ל֛/וֹ וּ/לְ/בַקֵּ֥שׁ מִ/לְּ/פָנָ֖י/ו עַל
    עַמָּֽ/הּ־־־־־־־׃
translation:
  text: He also gave him a copy of the written decree that had been issued in Susa
    for their destruction, to show Esther and tell her, and to instruct her to go
    in to the king to plead with him and seek from before him concerning her people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a copy of the edict.' The Persian loanword פַּתְשֶׁגֶן refers to the
      text or copy of an official document.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seek from before him,' a courtly expression for making a petition
      in the king's presence.
    reason: cultural_note
  - marker: c
    text: Or 'for her people' / 'on behalf of her people.' The Hebrew preposition
      can express concern for or advocacy on behalf of her people.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתְשֶׁגֶן כְּתָב
  chosen: a copy of the written decree
  alternatives:
  - the text of the document
  - a copy of the edict
  lexicon: HALOT
  rationale: פַּתְשֶׁגֶן is a Persian loanword meaning a copy/document; paired with
    כְּתָב it refers to the written text/copy of an official document. 'Copy of the
    written decree' preserves both the documentary and official sense in natural English.
- source_word: הַדָּת
  chosen: decree
  alternatives:
  - law
  - edict
  lexicon: HALOT
  rationale: In Esther, דָּת often denotes an official royal regulation or decree
    in the Persian court setting. 'Decree' fits the immediate context of a promulgated
    order better than the broader 'law'.
- source_word: נִתַּן
  chosen: had been issued
  alternatives:
  - had been given
  - had been published
  lexicon: HALOT
  rationale: Although literally 'was given,' in administrative context the passive
    refers to the promulgation of a decree. 'Had been issued' communicates the official
    act idiomatically without losing the passive sense.
- source_word: בְּשׁוּשָׁן
  chosen: in Susa
  alternatives:
  - at Susa
  lexicon: HALOT
  rationale: Standard English rendering of the place name; 'in Susa' is the natural
    locative expression.
- source_word: לְהַשְׁמִידָם
  chosen: for their destruction
  alternatives:
  - to destroy them
  - for destroying them
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix expresses the purpose/content of
    the decree. 'For their destruction' reads smoothly in English while preserving
    the lethal intent of the edict.
- source_word: נָתַן לוֹ
  chosen: He also gave him
  alternatives:
  - And he gave him
  - He gave it to him
  lexicon: HALOT
  rationale: The second נָתַן resumes Hathach's receipt of the document. 'Also' captures
    the connective force in context, linking this action with the previous verse.
- source_word: לְהַרְאוֹת אֶת אֶסְתֵּר
  chosen: to show Esther
  alternatives:
  - to show it to Esther
  lexicon: HALOT
  rationale: The object is implicit from context (the copy of the decree). English
    can omit 'it' without obscuring meaning.
- source_word: וּלְהַגִּיד לָהּ
  chosen: and tell her
  alternatives:
  - and inform her
  - and explain it to her
  lexicon: HALOT
  rationale: הִגִּיד commonly means 'tell, declare, report.' 'Tell her' is simple
    and natural; fuller explanation is not explicit in the verb itself.
- source_word: וּלְצַוּוֹת עָלֶיהָ
  chosen: and to instruct her
  alternatives:
  - and to command her
  - and to charge her
  lexicon: HALOT
  rationale: צוה can mean command/charge. Because Mordecai is directing Esther urgently
    but not as a sovereign over a subject, 'instruct her' preserves the force without
    sounding overly harsh in English. The preposition עַל with the suffix supports
    the sense of laying a charge upon her.
- source_word: לָבוֹא אֶל הַמֶּלֶךְ
  chosen: to go in to the king
  alternatives:
  - to go to the king
  - to enter before the king
  lexicon: HALOT
  rationale: '''Go in to the king'' reflects court-access language and anticipates
    the danger of entering the royal presence in the following context.'
- source_word: לְהִתְחַנֶּן לוֹ
  chosen: to plead with him
  alternatives:
  - to implore him
  - to beg him for favor
  lexicon: HALOT
  rationale: The hitpael of חנן here conveys earnest supplication. 'Plead with him'
    is idiomatic and suitably urgent.
- source_word: וּלְבַקֵּשׁ מִלְּפָנָיו
  chosen: and seek from before him
  alternatives:
  - and request from him
  - and seek his favor
  lexicon: HALOT
  rationale: בקש means seek/request, and מִלְּפָנָיו is literally 'from before him,'
    an idiom of petition in royal presence. The translation keeps some of the formal
    courtly flavor rather than flattening it entirely to 'ask him.'
- source_word: עַל עַמָּהּ
  chosen: concerning her people
  alternatives:
  - for her people
  - on behalf of her people
  lexicon: HALOT
  rationale: עַל can mean concerning/on behalf of. 'Concerning her people' stays close
    to the preposition while fitting the petition context; the advocacy sense remains
    clear from the surrounding infinitives.
