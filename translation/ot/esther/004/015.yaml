id: EST.4.15
reference: Esther 4:15
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר אֶסְתֵּ֖ר לְ/הָשִׁ֥יב אֶֽל מָרְדֳּכָֽי־׃
translation:
  text: 'Then Esther told them to reply to Mordecai:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'And Esther said to return to Mordecai.' The sense is
      that she instructed a reply to be sent back to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... told
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. English 'Then' captures
    the sequential force naturally. 'Told' rather than bare 'said' anticipates the
    infinitive complement and yields idiomatic English.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: לְהָשִׁיב
  chosen: to reply
  alternatives:
  - to answer
  - to send back word
  - to return answer
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of שוב here functions idiomatically with אמר:
    ''to cause an answer to return,'' i.e., ''to reply'' or ''to send back an answer.''
    ''To reply'' is concise, natural English and preserves the responsive sense.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward Mordecai. In English, with 'reply,'
    the natural equivalent is 'to' rather than a more wooden 'unto'.
- source_word: מָרְדֳּכָי
  chosen: Mordecai
  rationale: Proper name transliterated by standard English convention.
