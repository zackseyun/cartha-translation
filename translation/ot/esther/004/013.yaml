id: EST.4.13
reference: Esther 4:13
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מָרְדֳּכַ֖י לְ/הָשִׁ֣יב אֶל אֶסְתֵּ֑ר אַל תְּדַמִּ֣י בְ/נַפְשֵׁ֔/ךְ
    לְ/הִמָּלֵ֥ט בֵּית הַ/מֶּ֖לֶךְ מִ/כָּל הַ/יְּהוּדִֽים־־־־׃
translation:
  text: Then Mordecai said to reply to Esther, “Do not imagine that you alone of all
    the Jews will escape in the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not think to yourself that in the king’s house you will escape more
      than all the Jews.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then Mordecai said
  alternatives:
  - And Mordecai said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'said' is the plain sense of אמר.
- source_word: לְהָשִׁיב
  chosen: to reply
  alternatives:
  - to answer
  - to send back word
  lexicon: HALOT
  rationale: Hiphil of שוב here functions idiomatically for giving a response/message
    back to Esther. 'To reply' is concise modern English and fits the indirect-speech
    construction.
- source_word: אֶל אֶסְתֵּר
  chosen: to Esther
  alternatives:
  - back to Esther
  lexicon: HALOT
  rationale: The preposition marks the addressee of the reply. 'To Esther' is sufficient
    in English; the sense of return is already carried by 'reply'.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect prohibition.
    'Do not' is the straightforward rendering.
- source_word: תְּדַמִּי
  chosen: imagine
  alternatives:
  - think
  - suppose
  lexicon: HALOT
  rationale: The verb דמה in this stem here conveys thinking/supposing. 'Imagine'
    captures the warning against a false assumption with natural English force.
- source_word: בְנַפְשֵׁךְ
  chosen: that you alone
  alternatives:
  - in yourself
  - to yourself
  lexicon: HALOT
  rationale: Literally 'in your soul/self,' but in this idiom it means 'in your own
    mind' or 'to yourself.' The sense is not about the soul as such but about personal
    supposition. 'That you alone' brings out the implied contrast in context without
    woodenly preserving the Hebrew idiom.
- source_word: לְהִמָּלֵט
  chosen: will escape
  alternatives:
  - to escape
  - will be delivered
  lexicon: HALOT
  rationale: Niphal infinitive of מלט expresses escaping/deliverance. In English,
    finite 'will escape' fits the clause naturally after 'Do not imagine that...'.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: in the king’s house
  alternatives:
  - in the palace
  - in the royal house
  lexicon: HALOT
  rationale: Literally 'house of the king.' 'In the king’s house' preserves the Hebrew
    image and can include the palace setting. 'Palace' is possible but slightly more
    interpretive.
- source_word: מִכָּל הַיְּהוּדִים
  chosen: you alone of all the Jews
  alternatives:
  - more than all the Jews
  - from among all the Jews
  lexicon: HALOT
  rationale: 'The מן with כל here marks separation/comparison: Esther should not think
    she will uniquely escape out of all the Jews. English requires restructuring,
    so the phrase is integrated as ''you alone of all the Jews'' to make the sense
    explicit.'
