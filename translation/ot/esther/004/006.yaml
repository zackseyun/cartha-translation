id: EST.4.6
reference: Esther 4:6
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א הֲתָ֖ךְ אֶֽל מָרְדֳּכָ֑י אֶל רְח֣וֹב הָ/עִ֔יר אֲשֶׁ֖ר לִ/פְנֵ֥י
    שַֽׁעַר הַ/מֶּֽלֶךְ־־־׃
translation:
  text: So Hathach went out to Mordecai, to the open square of the city that was in
    front of the king's gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the city square'; the Hebrew term refers to a broad public open area,
      not necessarily a street in the modern sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - went
  lexicon: HALOT
  rationale: The verb יצא in the wayyiqtol form narrates a completed past action.
    'Went out' preserves the directional nuance of leaving Esther's presence/interior
    space, which is more precise than simply 'went.'
- source_word: הֲתָךְ
  chosen: Hathach
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אֶל מָרְדֳּכָי
  chosen: to Mordecai
  alternatives:
  - toward Mordecai
  lexicon: HALOT
  rationale: The preposition אֶל commonly means 'to' or 'toward.' 'To Mordecai' is
    the natural English rendering in this narrative context.
- source_word: אֶל רְחוֹב הָעִיר
  chosen: to the open square of the city
  alternatives:
  - to the city square
  - to the broad place of the city
  - to the plaza of the city
  lexicon: HALOT
  rationale: רְחוֹב denotes a broad open area or square within an urban setting, not
    merely a roadway. 'Open square' preserves the sense of a public space better than
    'street.'
- source_word: אֲשֶׁר לִפְנֵי
  chosen: that was in front of
  alternatives:
  - which was before
  - that was opposite
  lexicon: HALOT
  rationale: The relative clause identifies the location of the square. 'In front
    of' is idiomatic modern English for לִפְנֵי here and preserves the spatial sense.
- source_word: שַׁעַר הַמֶּלֶךְ
  chosen: the king's gate
  alternatives:
  - the royal gate
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly possessive. 'The king's gate'
    is both literal and idiomatic, and it matches the recurring setting in Esther.
