id: EST.4.11
reference: Esther 4:11
source:
  edition: WLC
  text: כָּל עַבְדֵ֣י הַ/מֶּ֡לֶךְ וְ/עַם מְדִינ֨וֹת הַ/מֶּ֜לֶךְ יֽוֹדְעִ֗ים אֲשֶׁ֣ר
    כָּל אִ֣ישׁ וְ/אִשָּׁ֡ה אֲשֶׁ֣ר יָבֽוֹא אֶל הַ/מֶּלֶךְ֩ אֶל הֶ/חָצֵ֨ר הַ/פְּנִימִ֜ית
    אֲשֶׁ֣ר לֹֽא יִקָּרֵ֗א אַחַ֤ת דָּת/וֹ֙ לְ/הָמִ֔ית לְ֠/בַד מֵ/אֲשֶׁ֨ר יֽוֹשִׁיט
    ל֥/וֹ הַ/מֶּ֛לֶךְ אֶת שַׁרְבִ֥יט הַ/זָּהָ֖ב וְ/חָיָ֑ה וַ/אֲנִ֗י לֹ֤א נִקְרֵ֨אתי֙
    לָ/ב֣וֹא אֶל הַ/מֶּ֔לֶךְ זֶ֖ה שְׁלוֹשִׁ֥ים יֽוֹם־־־־־־־־־־׃
translation:
  text: 'All the king’s servants and the people of the king’s provinces know that
    for any man or woman who goes to the king in the inner court without being summoned,
    there is one law for him: to be put to death, except for the one to whom the king
    extends the golden scepter, so that he may live. But as for me, I have not been
    summoned to go in to the king these thirty days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without being called.' The Hebrew passive verb can be rendered more
      literally, but 'summoned' better conveys formal court protocol.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''there is but one decree: death.'' The Hebrew idiom literally speaks
      of ''one law'' applying in such a case.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  - attendants
  lexicon: HALOT
  rationale: In the Persian court setting, the term refers broadly to those in the
    king’s service. 'Servants' is the most natural and sufficiently formal rendering
    here; 'slaves' would overstate bonded status in this administrative context.
- source_word: וְעַם מְדִינוֹת הַמֶּלֶךְ
  chosen: and the people of the king’s provinces
  alternatives:
  - and the people of the royal provinces
  lexicon: HALOT
  rationale: This phrase expands beyond court personnel to the wider populace throughout
    the empire. 'Provinces' is the standard rendering of מְדִינוֹת in Esther.
- source_word: יֹדְעִים
  chosen: know
  alternatives:
  - are aware
  lexicon: HALOT
  rationale: A straightforward cognitive verb; 'know' preserves the directness of
    the Hebrew and the public notoriety of the law.
- source_word: כָּל אִישׁ וְאִשָּׁה
  chosen: any man or woman
  alternatives:
  - every man and woman
  - anyone, man or woman
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. 'Any man or woman' preserves
    the distributive force and the gender-accurate wording required by the source.
- source_word: יָבוֹא אֶל הַמֶּלֶךְ אֶל הֶחָצֵר הַפְּנִימִית
  chosen: goes to the king in the inner court
  alternatives:
  - enters the king’s inner court
  - comes to the king in the inner courtyard
  lexicon: HALOT
  rationale: The construction indicates approaching the king by entering the restricted
    inner court. 'Inner court' is idiomatic and fits palace terminology.
- source_word: אֲשֶׁר לֹא יִקָּרֵא
  chosen: without being summoned
  alternatives:
  - who is not called
  - without being called
  lexicon: HALOT
  rationale: The Niphal of קרא here denotes being officially called or summoned into
    the king’s presence. 'Summoned' best conveys court protocol in natural English.
- source_word: אַחַת דָּתוֹ
  chosen: there is one law for him
  alternatives:
  - his law is one
  - there is but one decree
  lexicon: HALOT
  rationale: The idiom means a single fixed legal outcome applies in every such case.
    'There is one law for him' preserves the force without awkward literalism.
- source_word: לְהָמִית
  chosen: to be put to death
  alternatives:
  - to die
  - death
  lexicon: HALOT
  rationale: The infinitive expresses the legal penalty. 'To be put to death' makes
    explicit that this is an imposed sentence, not merely the state of dying.
- source_word: לְבַד מֵאֲשֶׁר
  chosen: except for the one to whom
  alternatives:
  - unless it is the one to whom
  - except the one to whom
  lexicon: HALOT
  rationale: This introduces the sole exception to the law. The chosen wording is
    smooth and preserves the exclusivity of the exception.
- source_word: יוֹשִׁיט לוֹ
  chosen: extends
  alternatives:
  - holds out
  - stretches out toward him
  lexicon: HALOT
  rationale: The Hiphil here refers to extending the scepter toward someone. 'Extends'
    is concise and idiomatic in English courtly context.
- source_word: שַׁרְבִיט הַזָּהָב
  chosen: the golden scepter
  alternatives:
  - the gold scepter
  lexicon: HALOT
  rationale: Standard rendering for the emblem of royal favor in Esther. 'Golden scepter'
    is the established and natural English phrase.
- source_word: וְחָיָה
  chosen: so that he may live
  alternatives:
  - and he shall live
  - and live
  lexicon: HALOT
  rationale: The verb states the result of the king’s favorable gesture. 'So that
    he may live' makes the consequential sense explicit in clear English.
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The pronoun is emphatic, contrasting Esther’s personal situation with
    the general rule. 'But as for me' captures that emphasis well.
- source_word: לֹא נִקְרֵאתִי
  chosen: I have not been summoned
  alternatives:
  - I have not been called
  - I was not summoned
  lexicon: HALOT
  rationale: Using 'summoned' maintains consistency with the earlier passive and preserves
    the formal court setting.
- source_word: זֶה שְׁלוֹשִׁים יוֹם
  chosen: these thirty days
  alternatives:
  - for thirty days now
  - this thirty-day period
  lexicon: HALOT
  rationale: This idiom refers to the preceding span up to the present. 'These thirty
    days' is a natural, fairly literal English equivalent.
