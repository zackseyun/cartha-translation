id: EST.4.2
reference: Esther 4:2
source:
  edition: WLC
  text: וַ/יָּב֕וֹא עַ֖ד לִ/פְנֵ֣י שַֽׁעַר הַ/מֶּ֑לֶךְ כִּ֣י אֵ֥ין לָ/ב֛וֹא אֶל שַׁ֥עַר
    הַ/מֶּ֖לֶךְ בִּ/לְב֥וּשׁ שָֽׂק־־׃
translation:
  text: He came as far as the front of the king’s gate, because no one could enter
    the king’s gate clothed in sackcloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'up to the presence of the king’s gate' / 'before the king’s gate.' The
      Hebrew emphasizes that he approached only to the point in front of it.
    reason: lexical_alternative
  - marker: b
    text: The clause may also be expressed more formally as 'for there was no entering
      the king’s gate in sackcloth.' The sense is that entry in mourning attire was
      forbidden.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: He came
  alternatives:
  - he went
  - he arrived
  lexicon: HALOT
  rationale: The wayyiqtol of בוא narrates Mordecai’s movement. 'He came' is natural
    English in narrative and fits the perspective of approaching the gate.
- source_word: עַד לִפְנֵי
  chosen: as far as the front of
  alternatives:
  - up to
  - before
  - in front of
  lexicon: HALOT
  rationale: The combination marks approach up to a point immediately before the gate,
    without entering. 'As far as the front of' preserves both the limit and spatial
    sense better than a bare 'before'.
- source_word: שַׁעַר הַמֶּלֶךְ
  chosen: the king’s gate
  alternatives:
  - the royal gate
  - the gate of the king
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English. 'The king’s gate'
    is straightforward and preserves the specific court setting.
- source_word: כִּי אֵין לָבוֹא
  chosen: because no one could enter
  alternatives:
  - for it was not permitted to enter
  - because there was no entering
  lexicon: HALOT
  rationale: אֵין + infinitive expresses impossibility/prohibition in context. Since
    the following clause explains why he stopped at the gate, 'because no one could
    enter' communicates the practical force in readable English.
- source_word: אֶל שַׁעַר הַמֶּלֶךְ
  chosen: the king’s gate
  alternatives:
  - into the king’s gate
  - to the king’s gate
  lexicon: HALOT
  rationale: Although אֶל can be 'to/into,' in this court context the sense is entering
    through or into the gate precinct. English idiom prefers 'enter the king’s gate'
    rather than repeating the preposition.
- source_word: בִּלְבוּשׁ שָׂק
  chosen: clothed in sackcloth
  alternatives:
  - wearing sackcloth
  - in sackcloth garments
  lexicon: HALOT
  rationale: The phrase literally means 'in clothing of sackcloth.' 'Clothed in sackcloth'
    is idiomatic, preserves the mourning attire, and avoids over-specifying multiple
    garments.
