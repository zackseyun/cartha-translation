id: EST.4.9
reference: Esther 4:9
source:
  edition: WLC
  text: וַ/יָּב֖וֹא הֲתָ֑ךְ וַ/יַּגֵּ֣ד לְ/אֶסְתֵּ֔ר אֵ֖ת דִּבְרֵ֥י מָרְדֳּכָֽי׃
translation:
  text: So Hathach came and told Esther the words of Mordecai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message of Mordecai' or 'what Mordecai said.' The Hebrew literally
      reads 'the words of Mordecai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: From בוא, the basic motion verb 'come/go.' In English narrative, 'came'
    fits the perspective of Hathach returning to Esther after going out to Mordecai
    (cf. context in the surrounding verses). 'Arrived' is possible but less natural;
    'went' would obscure the return-to-Esther perspective.
- source_word: הֲתָךְ
  chosen: Hathach
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: From נגד in the Hiphil, 'make known, tell, report.' 'Told' is the most
    natural modern English rendering in this simple narrative setting. 'Reported'
    is possible but slightly more formal; 'declared' is too elevated for the context.
- source_word: לְאֶסְתֵּר
  chosen: Esther
  rationale: Indirect object marked by לְ; in idiomatic English this is expressed
    by word order ('told Esther') rather than a separate preposition ('told to Esther').
- source_word: אֵת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical content in English;
    its function is represented by English syntax.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - what ... said
  lexicon: HALOT
  rationale: Construct plural of דָּבָר. 'The words of Mordecai' is formally close
    and natural enough in English. 'The message of' is smoother but slightly more
    interpretive; 'what Mordecai said' is idiomatic but less formally transparent.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Personal name; transliterated by standard English convention.
