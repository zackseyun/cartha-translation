id: EST.5.11
reference: Esther 5:11
source:
  edition: WLC
  text: וַ/יְסַפֵּ֨ר לָ/הֶ֥ם הָמָ֛ן אֶת כְּב֥וֹד עָשְׁר֖/וֹ וְ/רֹ֣ב בָּנָ֑י/ו וְ/אֵת֩
    כָּל אֲשֶׁ֨ר גִּדְּל֤/וֹ הַ/מֶּ֨לֶךְ֙ וְ/אֵ֣ת אֲשֶׁ֣ר נִשְּׂא֔/וֹ עַל הַ/שָּׂרִ֖ים
    וְ/עַבְדֵ֥י הַ/מֶּֽלֶךְ־־־׃
translation:
  text: And Haman told them of the glory of his wealth, and the multitude of his sons,
    and all that the king had done to make him great, and how he had exalted him above
    the officials and servants of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the splendor of his riches.' The Hebrew phrase emphasizes the impressive
      magnificence associated with Haman's wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'his many sons.' The Hebrew specifically says 'sons,' not the more general
      'children.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all that the king had done to promote him.'
    reason: lexical_alternative
  - marker: d
    text: Or 'had raised him above' or 'had lifted him up over' the officials and
      servants of the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  chosen: told
  alternatives:
  - recounted
  - related
  lexicon: HALOT
  rationale: Narrative wayyiqtol of ספר introduces Haman's boasting speech to his
    audience. 'Told' is natural modern English and sufficiently preserves the reporting
    sense without overformalizing.
- source_word: כְּבוֹד עָשְׁרוֹ
  chosen: the glory of his wealth
  alternatives:
  - the splendor of his riches
  - his glorious wealth
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory, honor, or splendor; with wealth it conveys
    the impressive display or magnificence of his riches. 'The glory of his wealth'
    stays close to the Hebrew while remaining intelligible.
- source_word: רֹב בָּנָיו
  chosen: the multitude of his sons
  alternatives:
  - the number of his sons
  - his many sons
  lexicon: HALOT
  rationale: רֹב denotes abundance or multitude. Because בָּנִים is specifically 'sons,'
    not generic 'children,' the translation preserves the male reference in keeping
    with gender-accurate policy.
- source_word: גִּדְּלוֹ
  chosen: had done to make him great
  alternatives:
  - had promoted him
  - had magnified him
  lexicon: HALOT
  rationale: 'The Piel of גדל here means to make great, promote, or elevate. The construction
    with כָּל אֲשֶׁר favors a fuller clause in English: ''all that the king had done
    to make him great,'' which preserves both the causative sense and the king''s
    agency.'
- source_word: נִשְּׂאוֹ עַל
  chosen: had exalted him above
  alternatives:
  - had lifted him up over
  - had raised him above
  lexicon: HALOT
  rationale: נשא with עַל in this context expresses elevation in rank over others.
    'Exalted him above' is idiomatic and preserves the comparative hierarchy.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the nobles
  lexicon: HALOT
  rationale: שָׂרִים refers broadly to rulers, officials, or princes. In the Persian
    court setting, 'officials' is the clearest modern rendering without implying hereditary
    nobility.
- source_word: עַבְדֵי הַמֶּלֶךְ
  chosen: servants of the king
  alternatives:
  - the king's servants
  - the king's attendants
  lexicon: HALOT
  rationale: עֲבָדִים here refers to royal servants/court personnel. 'Servants of
    the king' is straightforward and fits the courtly context better than the more
    institutionally loaded 'slaves'.
