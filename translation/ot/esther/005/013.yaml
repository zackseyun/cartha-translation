id: EST.5.13
reference: Esther 5:13
source:
  edition: WLC
  text: וְ/כָל זֶ֕ה אֵינֶ֥/נּוּ שֹׁוֶ֖ה לִ֑/י בְּ/כָל עֵ֗ת אֲשֶׁ֨ר אֲנִ֤י רֹאֶה֙ אֶת
    מָרְדֳּכַ֣י הַ/יְּהוּדִ֔י יוֹשֵׁ֖ב בְּ/שַׁ֥עַר הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Yet all this is worth nothing to me whenever I see Mordecai the Jew sitting
    at the king’s gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And all this is of no value to me every time I see Mordecai the Jew
      sitting at the king’s gate.'
    reason: lexical_alternative
  - marker: b
    text: '''The Jew'' may also be rendered ''the Judean''; here it most likely emphasizes
      Mordecai’s Jewish ethnic identity within the Persian court setting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל זֶה
  chosen: Yet all this
  alternatives:
  - And all this
  - But all this
  lexicon: HALOT
  rationale: וְ can be rendered simply as 'and,' but in context it marks contrast
    with Haman's preceding boasts and satisfactions. 'Yet' brings out the adversative
    force naturally in English while preserving כָל זֶה as 'all this.'
- source_word: אֵינֶנּוּ שֹׁוֶה לִי
  chosen: is worth nothing to me
  alternatives:
  - does not profit me
  - is of no value to me
  - does not satisfy me
  lexicon: HALOT
  rationale: The idiom combines negation with שׁוה ('be worth, be equal, avail').
    In context Haman means that his honors count for nothing in his own estimation
    because of Mordecai. 'Is worth nothing to me' is idiomatic modern English and
    reflects the evaluative sense better than the more wooden 'is not equal to me.'
- source_word: בְּ/כָל עֵת אֲשֶׁר
  chosen: whenever
  alternatives:
  - at all times that
  - every time that
  - as long as
  lexicon: HALOT
  rationale: The phrase literally means 'at every time that.' In English, 'whenever'
    captures the repeated temporal force succinctly and naturally.
- source_word: רֹאֶה
  chosen: I see
  alternatives:
  - I look at
  - I behold
  lexicon: HALOT
  rationale: The participle with אֲנִי expresses ongoing/repeated action. 'I see'
    fits the temporal clause introduced by 'whenever' and is natural contemporary
    English.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Personal name transliterated according to standard English convention,
    following project policy to transliterate names rather than translate them.
- source_word: הַיְּהוּדִי
  chosen: the Jew
  alternatives:
  - the Judean
  lexicon: HALOT
  rationale: יְהוּדִי can denote either ethnic-religious identity ('Jew') or geographic
    identity ('Judean'). In Esther, the term functions as an ethnic designation in
    the Persian diaspora setting, and 'the Jew' matches standard English usage and
    the narrative's emphasis on Mordecai's Jewish identity.
- source_word: יוֹשֵׁב
  chosen: sitting
  alternatives:
  - sitting there
  - remaining seated
  - dwelling
  lexicon: HALOT
  rationale: The participle describes Mordecai's posture/location at the gate. 'Sitting'
    is the straightforward rendering and preserves the vividness of Haman repeatedly
    seeing him there.
- source_word: בְּ/שַׁעַר הַמֶּלֶךְ
  chosen: at the king’s gate
  alternatives:
  - in the king’s gate
  - at the royal gate
  lexicon: HALOT
  rationale: The phrase refers to the palace/city gate area associated with royal
    administration. 'At the king's gate' is idiomatic English and preserves the formal
    setting without overexplaining.
