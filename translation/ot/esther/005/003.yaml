id: EST.5.3
reference: Esther 5:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הּ֙ הַ/מֶּ֔לֶךְ מַה לָּ֖/ךְ אֶסְתֵּ֣ר הַ/מַּלְכָּ֑ה וּ/מַה
    בַּקָּשָׁתֵ֛/ךְ עַד חֲצִ֥י הַ/מַּלְכ֖וּת וְ/יִנָּ֥תֵֽן לָֽ/ךְ־־־׃
translation:
  text: Then the king said to her, “What is it, Queen Esther? And what is your request?
    Up to half the kingdom—it will be given to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What troubles you, Queen Esther?' The Hebrew idiom literally reads,
      'What is to you?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'petition' instead of 'request.'
    reason: lexical_alternative
  - marker: c
    text: A conventional royal expression of generous promise, not necessarily a literal
      offer to divide the kingdom.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: לָהּ
  chosen: to her
  lexicon: HALOT
  rationale: Directly reflects the preposition plus pronominal suffix.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: מַה לָּךְ
  chosen: What is it
  alternatives:
  - What troubles you
  - What is the matter with you
  - What is it with you
  lexicon: HALOT
  rationale: The idiom literally means 'What to/for you?' and asks what concerns her.
    'What is it' is concise, natural English that fits the courtly setting without
    over-interpreting the emotional nuance as distress.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - Esther the queen
  lexicon: HALOT
  rationale: English normally places the royal title before the name. This preserves
    both title and personal name in idiomatic order.
- source_word: וּמַה בַּקָּשָׁתֵךְ
  chosen: And what is your request
  alternatives:
  - And what is your petition
  lexicon: HALOT
  rationale: בַּקָּשָׁה denotes a request or petition. 'Request' is more readable
    modern English, while still fitting a royal audience context.
- source_word: עַד חֲצִי הַמַּלְכוּת
  chosen: Up to half the kingdom
  alternatives:
  - Even to half the kingdom
  - As much as half the kingdom
  lexicon: HALOT
  rationale: This phrase expresses the extent of the king's offer. 'Up to half the
    kingdom' is clear and idiomatic, preserving the hyperbolic royal formula.
- source_word: וְיִנָּתֵן לָךְ
  chosen: it will be given to you
  alternatives:
  - and it shall be given to you
  - and let it be given to you
  lexicon: HALOT
  rationale: The Niphal imperfect of נתן here functions as a passive promise. 'It
    will be given to you' communicates the sense naturally in English. The supplied
    object 'it' is required in English and refers back to the requested amount.
