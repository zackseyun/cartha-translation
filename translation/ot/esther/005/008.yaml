id: EST.5.8
reference: Esther 5:8
source:
  edition: WLC
  text: אִם מָצָ֨אתִי חֵ֜ן בְּ/עֵינֵ֣י הַ/מֶּ֗לֶךְ וְ/אִם עַל הַ/מֶּ֨לֶךְ֙ ט֔וֹב לָ/תֵת֙
    אֶת שְׁאֵ֣לָתִ֔/י וְ/לַ/עֲשׂ֖וֹת אֶת בַּקָּשָׁתִ֑/י יָב֧וֹא הַ/מֶּ֣לֶךְ וְ/הָמָ֗ן
    אֶל הַ/מִּשְׁתֶּה֙ אֲשֶׁ֣ר אֶֽעֱשֶׂ֣ה לָ/הֶ֔ם וּ/מָחָ֥ר אֶֽעֱשֶׂ֖ה כִּ/דְבַ֥ר
    הַ/מֶּֽלֶךְ־־־־־־׃
translation:
  text: If I have found favor in the eyes of the king, and if it pleases the king
    to grant my petition and fulfill my request, let the king and Haman come to the
    banquet that I will prepare for them, and tomorrow I will do according to the
    king’s word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'If I have found favor with the king.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'do according to the king’s word,' likely meaning Esther will respond
      to the king’s request and make her petition known on the next day.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי חֵן בְּעֵינֵי
  chosen: have found favor in the eyes of
  alternatives:
  - have found favor with
  - have found grace in the sight of
  lexicon: HALOT
  rationale: A standard Hebrew idiom for receiving favorable regard. 'In the eyes
    of' preserves the source imagery while remaining natural enough in English; 'favor'
    is preferable to 'grace' here because the courtly setting is not overtly theological.
- source_word: עַל הַמֶּלֶךְ טוֹב
  chosen: it pleases the king
  alternatives:
  - it is good to the king
  - it seems good to the king
  lexicon: HALOT
  rationale: This idiom expresses what is acceptable or pleasing to the king. 'It
    pleases the king' is idiomatic modern English and fits the deferential court speech
    better than the more wooden 'it is good to the king.'
- source_word: לָתֵת אֶת שְׁאֵלָתִי
  chosen: to grant my petition
  alternatives:
  - to give my request
  - to grant what I ask
  lexicon: HALOT
  rationale: The infinitive plus object literally means 'to give my petition.' In
    English, 'grant my petition' is the natural equivalent in royal-request language
    and preserves the formal tone.
- source_word: וְלַעֲשׂוֹת אֶת בַּקָּשָׁתִי
  chosen: and fulfill my request
  alternatives:
  - and do my request
  - and carry out my request
  lexicon: HALOT
  rationale: Hebrew uses 'do' with 'request,' but English normally says 'fulfill'
    or 'grant.' 'Fulfill' preserves the distinction between the two near-synonyms
    without sounding awkward.
- source_word: שְׁאֵלָתִי / בַּקָּשָׁתִי
  chosen: petition / request
  alternatives:
  - request / petition
  - appeal / request
  lexicon: HALOT
  rationale: The verse uses two related but distinct nouns. Rendering them with two
    different English terms reflects the Hebrew variation and the formal register
    of Esther's speech.
- source_word: יָבֹא
  chosen: let ... come
  alternatives:
  - may ... come
  - should ... come
  lexicon: HALOT
  rationale: Though morphologically imperfect, in context it functions jussively as
    a polite invitation/request. 'Let the king and Haman come' best captures the force
    in English.
- source_word: הַמִּשְׁתֶּה
  chosen: the banquet
  alternatives:
  - the feast
  - the drinking feast
  lexicon: HALOT
  rationale: The term often denotes a feast or banquet, frequently with drinking.
    'Banquet' suits the royal context and standard English usage in Esther better
    than the overly literal 'drinking feast.'
- source_word: אֲשֶׁר אֶעֱשֶׂה לָהֶם
  chosen: that I will prepare for them
  alternatives:
  - that I will make for them
  - that I will do for them
  lexicon: HALOT
  rationale: Hebrew 'make/do' with a banquet is naturally rendered 'prepare' in English.
    This avoids awkwardness while staying close to the sense.
- source_word: וּמָחָר אֶעֱשֶׂה כִּדְבַר הַמֶּלֶךְ
  chosen: and tomorrow I will do according to the king’s word
  alternatives:
  - and tomorrow I will do as the king has said
  - and tomorrow I will answer according to the king’s word
  lexicon: HALOT
  rationale: The phrase is somewhat elliptical, referring to Esther's response to
    the king's request that she state her petition. 'Do according to the king’s word'
    preserves the Hebrew wording and leaves the slight openness of the expression
    intact, rather than over-interpreting it as 'answer' or 'state my petition.'
