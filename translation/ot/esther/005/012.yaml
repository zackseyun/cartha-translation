id: EST.5.12
reference: Esther 5:12
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ הָמָן֒ אַ֣ף לֹא הֵבִיאָה֩ אֶסְתֵּ֨ר הַ/מַּלְכָּ֧ה עִם הַ/מֶּ֛לֶךְ
    אֶל הַ/מִּשְׁתֶּ֥ה אֲשֶׁר עָשָׂ֖תָה כִּ֣י אִם אוֹתִ֑/י וְ/גַם לְ/מָחָ֛ר אֲנִ֥י
    קָֽרוּא לָ֖/הּ עִם הַ/מֶּֽלֶךְ־־־־־־־־׃
translation:
  text: Then Haman said, “Even Queen Esther brought no one with the king to the banquet
    she prepared except me; and tomorrow also I am invited by her with the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the feast.' The Hebrew מִשְׁתֶּה can be rendered 'banquet' or 'feast.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I am called by her.' In context this means 'I am invited by
      her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אַף לֹא
  chosen: Even ... no one
  alternatives:
  - indeed not
  - also not
  lexicon: HALOT
  rationale: The combination adds emphatic force. In English, 'Even ... no one' captures
    Haman's boastful emphasis that Esther included nobody else.
- source_word: הֵבִיאָה
  chosen: brought
  alternatives:
  - caused to come
  - invited
  lexicon: HALOT
  rationale: The verb is literally 'brought.' In banquet context it can imply invitation,
    but 'brought' preserves the concrete Hebrew wording while remaining idiomatic
    with 'to the banquet.'
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - Esther the queen
  lexicon: HALOT
  rationale: English title order is more natural as 'Queen Esther' while fully preserving
    the referent and honorific.
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - along with the king
  lexicon: HALOT
  rationale: Straightforward rendering of the prepositional phrase; it indicates Haman's
    presence together with the king at Esther's banquet.
- source_word: אֶל הַמִּשְׁתֶּה
  chosen: to the banquet
  alternatives:
  - to the feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה commonly denotes a banquet/feast, often with drinking. 'Banquet'
    fits the courtly setting and modern English style.
- source_word: אֲשֶׁר עָשָׂתָה
  chosen: she prepared
  alternatives:
  - she made
  - she gave
  lexicon: HALOT
  rationale: Literally 'which she made/did.' For a banquet in English, 'prepared'
    is idiomatic and reflects Esther's hosting role without over-paraphrase.
- source_word: כִּי אִם אוֹתִי
  chosen: except me
  alternatives:
  - but me alone
  - only me
  lexicon: HALOT
  rationale: This construction expresses exception/exclusivity. 'Except me' is concise
    and natural after 'brought no one.'
- source_word: וְגַם לְמָחָר
  chosen: and tomorrow also
  alternatives:
  - and also tomorrow
  - even tomorrow
  lexicon: HALOT
  rationale: Preserves the additive force of וְגַם and the temporal reference לְמָחָר.
    The wording reflects Haman's continued self-importance.
- source_word: קָרוּא
  chosen: am invited
  alternatives:
  - am called
  - am summoned
  lexicon: HALOT
  rationale: Though literally 'called,' in meal or court context the passive participle
    means 'invited.' This is the clearest idiomatic English here.
- source_word: לָהּ
  chosen: by her
  alternatives:
  - to her
  lexicon: HALOT
  rationale: With קָרוּא in this context, the lamed marks the one issuing the invitation.
    'By her' makes the sense explicit in English.
