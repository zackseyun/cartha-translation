id: EST.5.10
reference: Esther 5:10
source:
  edition: WLC
  text: וַ/יִּתְאַפַּ֣ק הָמָ֔ן וַ/יָּב֖וֹא אֶל בֵּית֑/וֹ וַ/יִּשְׁלַ֛ח וַ/יָּבֵ֥א
    אֶת אֹהֲבָ֖י/ו וְ/אֶת זֶ֥רֶשׁ אִשְׁתּֽ/וֹ־־־׃
translation:
  text: But Haman restrained himself and went to his house. Then he sent and brought
    in his friends and Zeresh his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'controlled himself' or 'held himself back.'
    reason: lexical_alternative
  - marker: b
    text: Or 'went home.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַפַּק
  chosen: restrained himself
  alternatives:
  - controlled himself
  - held himself back
  lexicon: HALOT
  rationale: The hitpael of אפק here conveys self-restraint in the face of anger just
    mentioned in context. 'Restrained himself' is natural English and preserves the
    reflexive sense better than a flatter 'controlled himself.'
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  chosen: went to his house
  alternatives:
  - came to his house
  - went home
  lexicon: HALOT
  rationale: בוא with אֶל plus 'house' is literally movement to his house. 'Went to
    his house' stays close to the Hebrew while remaining idiomatic; 'went home' is
    possible but slightly more interpretive.
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he sent word
  lexicon: HALOT
  rationale: The verb simply states that he sent, with the object of the sending implied
    by the following causative verb. 'He sent' preserves the concise Hebrew sequence.
- source_word: וַיָּבֵא
  chosen: brought in
  alternatives:
  - gathered
  - brought
  lexicon: HALOT
  rationale: The hiphil of בוא is causative, 'caused to come' or 'brought.' 'Brought
    in' fits the context of summoning people into his house after sending for them.
- source_word: אֹהֲבָיו
  chosen: his friends
  alternatives:
  - those who loved him
  - his companions
  lexicon: HALOT
  rationale: Although from אהב ('love'), in this nominal/plural usage the sense is
    social associates or friends. 'His friends' is the most natural contextual rendering.
- source_word: זֶרֶשׁ אִשְׁתּוֹ
  chosen: Zeresh his wife
  alternatives:
  - his wife Zeresh
  lexicon: HALOT
  rationale: The Hebrew places the proper name before 'his wife.' 'Zeresh his wife'
    preserves that order and emphasis while remaining clear in English.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: Hebrew waw-consecutive usage
  rationale: 'Although the verse begins with narrative waw, the broader context is
    mildly adversative: despite his rage, Haman suppresses it. ''But'' brings out
    that contrast in idiomatic English without distorting the narrative flow.'
