id: EST.5.7
reference: Esther 5:7
source:
  edition: WLC
  text: וַ/תַּ֥עַן אֶסְתֵּ֖ר וַ/תֹּאמַ֑ר שְׁאֵלָתִ֖/י וּ/בַקָּשָׁתִֽ/י׃
translation:
  text: Then Esther answered and said, “My petition and my request are:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Esther answered and said, “My question and my request are:”' The
      Hebrew uses a formal pair of near-synonyms for Esther's appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  chosen: Then ... answered
  alternatives:
  - And ... answered
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'answered' reflects ענה in its standard
    speech-response sense.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וַתֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The Hebrew uses the common doublet 'answered and said.' Retaining both
    verbs reflects the source text rather than collapsing them into a single English
    verb.
- source_word: שְׁאֵלָתִי
  chosen: my petition
  alternatives:
  - my question
  - my request
  lexicon: HALOT
  rationale: Though the noun can denote a question or request depending on context,
    here Esther is presenting a formal appeal to the king, so 'petition' best captures
    the courtly and supplicatory sense.
- source_word: וּבַקָּשָׁתִי
  chosen: and my request
  alternatives:
  - and my desire
  - and my petition
  lexicon: HALOT
  rationale: בַּקָּשָׁה commonly denotes a request or entreaty. Rendering it as 'request'
    preserves the distinction from שְׁאֵלָה, which is rendered 'petition' to reflect
    the paired but not identical nouns.
