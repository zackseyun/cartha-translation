id: EST.5.6
reference: Esther 5:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֤לֶךְ לְ/אֶסְתֵּר֙ בְּ/מִשְׁתֵּ֣ה הַ/יַּ֔יִן מַה שְּׁאֵלָתֵ֖/ךְ
    וְ/יִנָּ֣תֵֽן לָ֑/ךְ וּ/מַה בַּקָּשָׁתֵ֛/ךְ עַד חֲצִ֥י הַ/מַּלְכ֖וּת וְ/תֵעָֽשׂ־־־׃
translation:
  text: And the king said to Esther at the wine banquet, “What is your petition? It
    will be granted to you. And what is your request? Even up to half the kingdom,
    it will be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it will be given to you' for 'It will be granted to you.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''up to half the kingdom''; the text does not explicitly say ''my
      kingdom.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִשְׁתֵּה הַיַּיִן
  chosen: at the wine banquet
  alternatives:
  - at the banquet of wine
  - during the drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking; הַיַּיִן specifies
    wine. 'Wine banquet' is natural English and preserves the setting more clearly
    than the overly literal 'banquet of wine'.
- source_word: שְּׁאֵלָתֵךְ
  chosen: your petition
  alternatives:
  - your request
  - your question
  lexicon: HALOT
  rationale: The noun from שאל here refers to something asked for, not a mere inquiry.
    'Petition' fits the royal-court context and distinguishes it from בַּקָּשָׁה later
    in the verse while remaining idiomatic.
- source_word: וְיִנָּתֵן לָךְ
  chosen: It will be granted to you
  alternatives:
  - and it will be given to you
  - and let it be given to you
  lexicon: HALOT
  rationale: The Niphal/jussive-like form of נתן in this formula expresses assurance
    that the request will be granted. 'Granted' conveys the idiomatic sense in English
    better than the more wooden 'given.'
- source_word: בַּקָּשָׁתֵךְ
  chosen: your request
  alternatives:
  - your petition
  - what you seek
  lexicon: HALOT
  rationale: בַּקָּשָׁה is a sought request or desire. Rendering it as 'request' preserves
    a slight distinction from שְׁאֵלָה ('petition') without sounding stilted.
- source_word: עַד חֲצִי הַמַּלְכוּת
  chosen: Even up to half the kingdom
  alternatives:
  - up to half my kingdom
  - up to half of the kingdom
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit possessive 'my.' 'The kingdom' is therefore
    retained. 'Even up to' captures the idiomatic force of עַד in this royal hyperbole.
- source_word: וְתֵעָשׂ
  chosen: it will be done
  alternatives:
  - and it shall be done
  - and it will be carried out
  lexicon: HALOT
  rationale: The passive-like sense in context refers to fulfilling Esther's request.
    'It will be done' is concise, idiomatic, and preserves the formal royal assurance.
