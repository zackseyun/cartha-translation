id: EST.5.2
reference: Esther 5:2
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/רְא֨וֹת הַ/מֶּ֜לֶךְ אֶת אֶסְתֵּ֣ר הַ/מַּלְכָּ֗ה עֹמֶ֨דֶת֙ בֶּֽ/חָצֵ֔ר
    נָשְׂאָ֥ה חֵ֖ן בְּ/עֵינָ֑י/ו וַ/יּ֨וֹשֶׁט הַ/מֶּ֜לֶךְ לְ/אֶסְתֵּ֗ר אֶת שַׁרְבִ֤יט
    הַ/זָּהָב֙ אֲשֶׁ֣ר בְּ/יָד֔/וֹ וַ/תִּקְרַ֣ב אֶסְתֵּ֔ר וַ/תִּגַּ֖ע בְּ/רֹ֥אשׁ הַ/שַּׁרְבִֽיט־־׃ס
translation:
  text: And when the king saw Esther the queen standing in the court, she found favor
    in his sight, and the king extended to Esther the golden scepter that was in his
    hand. Then Esther came near and touched the top of the scepter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyard' for 'court.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'she bore/carried favor in his eyes,' an idiom meaning she received
      his favorable regard.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''touched the tip of the scepter.'' Hebrew: ''the head of the scepter.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִרְאוֹת
  chosen: And when ... saw
  alternatives:
  - Now when ... saw
  - And it happened, when ... saw
  lexicon: HALOT
  rationale: The sequence וַיְהִי + infinitive construct introduces a temporal clause.
    In English, 'And when' preserves the narrative flow without the wooden 'and it
    happened.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ in this court narrative context.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Esther the queen
  alternatives:
  - Queen Esther
  lexicon: HALOT
  rationale: The Hebrew apposition is name followed by title. 'Esther the queen' follows
    the source order more closely than the more idiomatic but less formal 'Queen Esther.'
- source_word: עֹמֶדֶת בֶּחָצֵר
  chosen: standing in the court
  alternatives:
  - standing in the courtyard
  lexicon: HALOT
  rationale: עֹמֶדֶת is a participle describing Esther's posture. חָצֵר can be 'court'
    or 'courtyard'; 'court' fits the royal setting and reads naturally in English.
- source_word: נָשְׂאָה חֵן בְּעֵינָיו
  chosen: she found favor in his sight
  alternatives:
  - she won favor in his eyes
  - she obtained grace in his sight
  lexicon: HALOT
  rationale: This idiom means to receive favorable regard. 'Found favor in his sight'
    is clear, idiomatic, and preserves the metaphor of perception better than a flatter
    paraphrase.
- source_word: וַיּוֹשֶׁט
  chosen: extended
  alternatives:
  - held out
  - stretched out
  lexicon: HALOT
  rationale: The verb denotes extending something toward someone. 'Extended' is natural
    modern English and suitably formal for royal action.
- source_word: שַׁרְבִיט הַזָּהָב
  chosen: the golden scepter
  alternatives:
  - the gold scepter
  lexicon: HALOT
  rationale: Standard rendering of the royal emblem; 'golden scepter' is idiomatic
    English.
- source_word: אֲשֶׁר בְּיָדוֹ
  chosen: that was in his hand
  alternatives:
  - which was in his hand
  lexicon: HALOT
  rationale: This relative clause specifies the scepter the king was holding. 'That
    was in his hand' is natural and sufficiently formal.
- source_word: וַתִּקְרַב
  chosen: Then Esther came near
  alternatives:
  - and Esther approached
  - so Esther drew near
  lexicon: HALOT
  rationale: The verb marks Esther's responsive movement after the king's gesture.
    'Came near' is a clear rendering; 'Then' helps English narrative sequencing.
- source_word: וַתִּגַּע בְּרֹאשׁ הַשַּׁרְבִיט
  chosen: touched the top of the scepter
  alternatives:
  - touched the tip of the scepter
  - touched the head of the scepter
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but for an object like a scepter English
    normally uses 'top' or 'tip.' 'Top' is slightly broader and avoids over-specifying
    a pointed end not demanded by the Hebrew.
