id: EST.5.1
reference: Esther 5:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֗י וַ/תִּלְבַּ֤שׁ אֶסְתֵּר֙ מַלְכ֔וּת וַֽ/תַּעֲמֹ֞ד
    בַּ/חֲצַ֤ר בֵּית הַ/מֶּ֨לֶךְ֙ הַ/פְּנִימִ֔ית נֹ֖כַח בֵּ֣ית הַ/מֶּ֑לֶךְ וְ֠/הַ/מֶּלֶךְ
    יוֹשֵׁ֞ב עַל כִּסֵּ֤א מַלְכוּת/וֹ֙ בְּ/בֵ֣ית הַ/מַּלְכ֔וּת נֹ֖כַח פֶּ֥תַח הַ/בָּֽיִת׀־־׃
translation:
  text: Now on the third day, Esther put on her royal robes and stood in the inner
    court of the king’s palace, opposite the king’s house, while the king was sitting
    on his royal throne in the royal house, opposite the entrance of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put on royalty,' that is, royal attire or regalia.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house' can also mean 'palace' in this court setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the narrative development. In modern
    English, 'Now' carries the discourse-transition force naturally without archaic
    phrasing.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  lexicon: HALOT
  rationale: Straightforward temporal expression; formal rendering preserved.
- source_word: וַתִּלְבַּשׁ ... מַלְכוּת
  chosen: put on her royal robes
  alternatives:
  - put on royalty
  - put on royal attire
  lexicon: HALOT
  rationale: The noun מַלְכוּת literally denotes 'royalty/royal status/kingdom,' but
    in this idiom it refers to royal clothing or regalia. 'Royal robes' conveys the
    concrete sense required by context.
- source_word: וַתַּעֲמֹד
  chosen: stood
  alternatives:
  - took her stand
  lexicon: HALOT
  rationale: Simple narrative verb; 'stood' is the natural equivalent.
- source_word: בַּחֲצַר בֵּית־הַמֶּלֶךְ הַפְּנִימִית
  chosen: in the inner court of the king’s palace
  alternatives:
  - in the inner court of the king’s house
  lexicon: HALOT
  rationale: בֵּית can be rendered 'house,' but here refers to the palace complex.
    'Palace' communicates the setting clearly in contemporary English while preserving
    the courtly context.
- source_word: נֹכַח בֵּית הַמֶּלֶךְ
  chosen: opposite the king’s house
  alternatives:
  - facing the king’s house
  - in front of the king’s house
  lexicon: HALOT
  rationale: נֹכַח indicates position opposite or facing. 'Opposite' best preserves
    the spatial relation without overinterpreting.
- source_word: וְהַמֶּלֶךְ יֹשֵׁב
  chosen: while the king was sitting
  alternatives:
  - and the king was sitting
  - with the king sitting
  lexicon: HALOT
  rationale: The clause gives concurrent background information. 'While' makes the
    simultaneity clear in smooth English.
- source_word: עַל כִּסֵּא מַלְכוּתוֹ
  chosen: on his royal throne
  alternatives:
  - on the throne of his kingdom
  - on his throne of royalty
  lexicon: HALOT
  rationale: Construct phrase naturally refers to the king's royal throne. This is
    the most idiomatic English equivalent.
- source_word: בְּבֵית הַמַּלְכוּת
  chosen: in the royal house
  alternatives:
  - in the royal palace
  - in the palace
  lexicon: HALOT
  rationale: The phrase is distinct from the earlier 'king’s house' and is retained
    with a relatively formal gloss. 'Royal house' preserves the lexical link to מַלְכוּת
    while remaining understandable.
- source_word: נֹכַח פֶּתַח הַבָּיִת
  chosen: opposite the entrance of the house
  alternatives:
  - facing the entrance of the house
  - opposite the doorway of the house
  lexicon: HALOT
  rationale: Again נֹכַח marks spatial orientation. 'Entrance' is slightly broader
    and more natural than 'doorway' here.
