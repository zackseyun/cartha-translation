id: EST.5.9
reference: Esther 5:9
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א הָמָן֙ בַּ/יּ֣וֹם הַ/ה֔וּא שָׂמֵ֖חַ וְ/ט֣וֹב לֵ֑ב וְ/כִ/רְאוֹת֩
    הָמָ֨ן אֶֽת מָרְדֳּכַ֜י בְּ/שַׁ֣עַר הַ/מֶּ֗לֶךְ וְ/לֹא קָם֙ וְ/לֹא זָ֣ע מִמֶּ֔/נּוּ
    וַ/יִּמָּלֵ֥א הָמָ֛ן עַֽל מָרְדֳּכַ֖י חֵמָֽה־־־־׃
translation:
  text: Haman went out that day joyful and glad of heart. But when Haman saw Mordecai
    in the king’s gate, and that he did not rise or tremble before him, Haman was
    filled with rage against Mordecai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not rise or show fear before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂמֵחַ וְטוֹב לֵב
  chosen: joyful and glad of heart
  alternatives:
  - rejoicing and with a good heart
  - happy and in good spirits
  lexicon: HALOT
  rationale: The paired expression is idiomatic for a cheerful, elated state. 'Joyful
    and glad of heart' preserves the Hebrew parallelism and emotional intensity without
    sounding wooden.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are possible; 'that day' is natural modern English and retains the
    temporal specificity.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  chosen: in the king’s gate
  alternatives:
  - at the king’s gate
  - in the gate of the king
  lexicon: HALOT
  rationale: The Hebrew preposition ב can be rendered 'in' or 'at.' 'In the king’s
    gate' reflects the court setting and matches the likely sense of being stationed
    within the gate complex.
- source_word: וְלֹא קָם
  chosen: he did not rise
  alternatives:
  - he did not stand up
  lexicon: HALOT
  rationale: The verb קום here refers to rising in deference. 'Did not rise' is concise
    and preserves the social gesture implied.
- source_word: וְלֹא זָע מִמֶּנּוּ
  chosen: or tremble before him
  alternatives:
  - or move because of him
  - or show fear before him
  lexicon: HALOT
  rationale: The verb זוע can denote trembling, quaking, or being moved. In this context
    of expected homage, the sense is that Mordecai showed no fearful agitation before
    Haman. 'Tremble before him' best captures the affront Haman perceived.
- source_word: וַיִּמָּלֵא ... חֵמָה
  chosen: was filled with rage
  alternatives:
  - was filled with fury
  - became full of wrath
  lexicon: HALOT
  rationale: The construction 'be filled with' plus חֵמָה expresses intense anger.
    'Rage' is strong, idiomatic modern English without becoming overly archaic.
- source_word: עַל מָרְדֳּכַי
  chosen: against Mordecai
  alternatives:
  - toward Mordecai
  - because of Mordecai
  lexicon: HALOT
  rationale: With anger terms, עַל commonly marks the object or target of hostility.
    'Against Mordecai' makes the adversative force explicit in English.
