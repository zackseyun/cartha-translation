id: EST.1.14
reference: Esther 1:14
source:
  edition: WLC
  text: וְ/הַ/קָּרֹ֣ב אֵלָ֗י/ו כַּרְשְׁנָ֤א שֵׁתָר֙ אַדְמָ֣תָא תַרְשִׁ֔ישׁ מֶ֥רֶס
    מַרְסְנָ֖א מְמוּכָ֑ן שִׁבְעַ֞ת שָׂרֵ֣י פָּרַ֣ס וּ/מָדַ֗י רֹאֵי֙ פְּנֵ֣י הַ/מֶּ֔לֶךְ
    הַ/יֹּשְׁבִ֥ים רִאשֹׁנָ֖ה בַּ/מַּלְכֽוּת׀׃
translation:
  text: And those closest to him were Carshena, Shethar, Admatha, Tarshish, Meres,
    Marsena, and Memucan, the seven officials of Persia and Media who saw the king’s
    face and sat first in the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'who saw the king’s face,' a Persian court expression for those
      with direct access to the king’s presence.
    reason: cultural_note
  - marker: b
    text: Or 'and occupied the highest positions in the kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקָּרֹב אֵלָיו
  chosen: And those closest to him were
  alternatives:
  - And the one nearest to him was
  - And those near him were
  lexicon: HALOT
  rationale: Although קָרוֹב is morphologically singular, the construction introduces
    a list of seven court figures and functions collectively. English idiom is best
    served by a plural collective rendering, 'those closest to him,' rather than a
    wooden singular. The prefixed conjunction is carried by 'And.'
- source_word: כַּרְשְׁנָא שֵׁתָר אַדְמָתָא תַרְשִׁישׁ מֶרֶס מַרְסְנָא מְמוּכָן
  chosen: Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan
  lexicon: HALOT
  rationale: These are personal names, so per translation philosophy they are transliterated
    rather than translated. Standard English conventional spellings are used.
- source_word: שִׁבְעַת שָׂרֵי
  chosen: the seven officials
  alternatives:
  - the seven princes
  - the seven chief ministers
  lexicon: HALOT
  rationale: שָׂרִים denotes high-ranking rulers/officials. 'Officials' communicates
    court rank in clear modern English without implying hereditary nobility as strongly
    as 'princes.' The numeral is retained explicitly.
- source_word: פָּרַס וּמָדַי
  chosen: of Persia and Media
  alternatives:
  - of Persia and Medea
  - of the Persians and Medes
  lexicon: HALOT
  rationale: The phrase names the dual imperial realm. 'Persia and Media' is the standard
    geographic-political rendering in English. 'Persians and Medes' is possible, but
    the construct with שָׂרֵי works naturally as officials of the realm(s).
- source_word: רֹאֵי פְּנֵי הַמֶּלֶךְ
  chosen: who saw the king’s face
  alternatives:
  - who had access to the king
  - who were admitted to the king’s presence
  lexicon: HALOT
  rationale: Literally 'seeing the face of the king' is a court idiom for privileged
    access. The main text keeps the concrete imagery while remaining intelligible;
    the idiomatic sense is worth preserving in a footnote.
- source_word: הַיֹּשְׁבִים רִאשֹׁנָה בַּמַּלְכוּת
  chosen: and sat first in the kingdom
  alternatives:
  - and held the first seats in the kingdom
  - and occupied the highest positions in the kingdom
  lexicon: HALOT
  rationale: The participle plus רִאשֹׁנָה conveys precedence or highest rank within
    the royal administration. 'Sat first' preserves the seating/rank metaphor and
    the formal texture of the Hebrew, while 'in the kingdom' reflects בַּמַּלְכוּת
    as the sphere of rule or administration.
