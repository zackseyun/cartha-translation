id: EST.1.20
reference: Esther 1:20
source:
  edition: WLC
  text: וְ/נִשְׁמַע֩ פִּתְגָ֨ם הַ/מֶּ֤לֶךְ אֲשֶֽׁר יַעֲשֶׂה֙ בְּ/כָל מַלְכוּת֔/וֹ
    כִּ֥י רַבָּ֖ה הִ֑יא וְ/כָל הַ/נָּשִׁ֗ים יִתְּנ֤וּ יְקָר֙ לְ/בַעְלֵי/הֶ֔ן לְ/מִ/גָּד֖וֹל
    וְ/עַד קָטָֽן־־־־׃
translation:
  text: And when the king’s decree that he makes is heard throughout all his kingdom—for
    it is vast—all the women will give honor to their husbands, from great to small.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'edict.' The Hebrew term refers to an official royal pronouncement.
    reason: lexical_alternative
  - marker: b
    text: Or 'will show respect to their husbands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַע
  chosen: And when ... is heard
  alternatives:
  - and it is heard
  - then it will be heard
  lexicon: HALOT
  rationale: Nifal of שׁמע here is passive/reflexive, introducing the circumstance
    under which the result follows. English 'when ... is heard' captures the temporal
    sense naturally while preserving the passive idea.
- source_word: פִּתְגָם
  chosen: decree
  alternatives:
  - edict
  - decision
  - word
  lexicon: HALOT
  rationale: In Persian-court context, פִּתְגָם refers to an official pronouncement.
    'Decree' is idiomatic and suitably formal; 'edict' is possible but slightly more
    archaic.
- source_word: אֲשֶׁר יַעֲשֶׂה
  chosen: that he makes
  alternatives:
  - that he issues
  - which he will do
  lexicon: HALOT
  rationale: Although עשה often means 'do,' with פִּתְגָם it can denote producing
    or issuing an official act. 'Makes' stays close to the Hebrew while remaining
    intelligible in English.
- source_word: בְּכָל מַלְכוּתוֹ
  chosen: throughout all his kingdom
  alternatives:
  - in all his kingdom
  - through all his royal realm
  lexicon: HALOT
  rationale: The preposition and noun together indicate the full extent of the empire.
    'Throughout all his kingdom' expresses dissemination across the whole realm more
    naturally than a bare 'in.'
- source_word: כִּי רַבָּה הִיא
  chosen: for it is vast
  alternatives:
  - for it is great
  - because it is large
  lexicon: HALOT
  rationale: The clause explains why the decree's hearing matters across the realm.
    'Vast' conveys the size of the Persian kingdom in natural modern English better
    than the more generic 'great.'
- source_word: וְכָל הַנָּשִׁים
  chosen: all the women
  alternatives:
  - every woman
  - all wives
  lexicon: HALOT
  rationale: The Hebrew is plural and generic. 'All the women' preserves the wording;
    the following phrase 'to their husbands' clarifies the married relationship in
    view without changing נשים to 'wives' in the main text.
- source_word: יִתְּנוּ יְקָר
  chosen: will give honor
  alternatives:
  - will show respect
  - will give respect
  lexicon: HALOT
  rationale: The idiom literally involves giving honor/value. 'Give honor' is slightly
    more formal and closer to the Hebrew than 'show respect,' while still readable.
- source_word: לְבַעְלֵיהֶן
  chosen: to their husbands
  alternatives:
  - to their masters
  - to their lords
  lexicon: HALOT
  rationale: Though בעל can mean 'owner/master/lord,' in this domestic context with
    נשים it clearly means 'husbands.' This avoids importing a stronger hierarchical
    nuance than the context requires.
- source_word: לְמִגָּדוֹל וְעַד קָטָן
  chosen: from great to small
  alternatives:
  - from the great to the small
  - from greatest to least
  lexicon: HALOT
  rationale: This idiom denotes the full social range. 'From great to small' is concise
    and close to the Hebrew; 'greatest to least' is interpretive and more idiomatic
    than necessary.
