id: EST.1.22
reference: Esther 1:22
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח סְפָרִים֙ אֶל כָּל מְדִינ֣וֹת הַ/מֶּ֔לֶךְ אֶל מְדִינָ֤ה וּ/מְדִינָה֙
    כִּ/כְתָבָ֔/הּ וְ/אֶל עַ֥ם וָ/עָ֖ם כִּ/לְשׁוֹנ֑/וֹ לִ/הְי֤וֹת כָּל אִישׁ֙ שֹׂרֵ֣ר
    בְּ/בֵית֔/וֹ וּ/מְדַבֵּ֖ר כִּ/לְשׁ֥וֹן עַמּֽ/וֹ־־־־־׃פ
translation:
  text: And he sent letters to all the provinces of the king, to each province in
    its own script and to each people in its own language, that every man should be
    master in his own house and speak the language of his own people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the king's provinces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in its own script ... in its own language,' emphasizing that the
      decree was distributed in forms appropriate to each province and people.
    reason: cultural_note
  - marker: c
    text: Or 'that every husband should rule in his own house.' The Hebrew says 'every
      man,' but in context the decree concerns household authority in marriage.
    reason: lexical_alternative
  - marker: d
    text: The final clause may mean either that each man was to speak the language
      of his own people, or more broadly that household order should reflect the husband's
      linguistic identity.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And he sent
  alternatives:
  - Then he sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative with a past-tense mainline verb. 'And
    he sent' preserves the Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: סְפָרִים
  chosen: letters
  alternatives:
  - documents
  - dispatches
  lexicon: HALOT
  rationale: In this royal-administrative context, the term refers to written communications
    sent throughout the empire. 'Letters' is natural English and fits the context
    of official decrees.
- source_word: כָּל מְדִינוֹת הַמֶּלֶךְ
  chosen: all the provinces of the king
  alternatives:
  - all the king's provinces
  lexicon: HALOT
  rationale: The construct phrase denotes the provinces belonging to the king's realm.
    'Of the king' stays close to the Hebrew while remaining idiomatic.
- source_word: אֶל מְדִינָה וּמְדִינָה
  chosen: to each province
  alternatives:
  - to province after province
  - to every single province
  lexicon: HALOT
  rationale: The distributive repetition means each individual province. 'To each
    province' captures the distributive force succinctly.
- source_word: כִּכְתָבָהּ
  chosen: in its own script
  alternatives:
  - according to its writing
  - in its own writing
  lexicon: HALOT
  rationale: The phrase means according to each province's written script or orthographic
    form. 'In its own script' is the clearest modern rendering.
- source_word: וְאֶל עַם וָעָם
  chosen: and to each people
  alternatives:
  - and to every people group
  - and to each nation
  lexicon: HALOT
  rationale: The repeated singular has distributive force. 'People' is preferable
    to 'nation' here because the focus is linguistic/ethnic groups within the empire.
- source_word: כִּלְשׁוֹנוֹ
  chosen: in its own language
  alternatives:
  - according to its tongue
  lexicon: HALOT
  rationale: לשון commonly means language/tongue. 'Language' is idiomatic modern English
    and matches the administrative multilingual context.
- source_word: לִהְיוֹת
  chosen: that ... should be
  alternatives:
  - so that ... would be
  - for ... to be
  lexicon: HALOT
  rationale: The infinitive expresses the decree's intended result or content. 'That
    ... should be' fits English legal/decretal style.
- source_word: כָּל אִישׁ
  chosen: every man
  alternatives:
  - every husband
  - each man
  lexicon: HALOT
  rationale: The phrase is grammatically masculine singular with distributive force.
    In context it refers to male heads within households, not humanity in general,
    so 'every man' is gender-accurate.
- source_word: שֹׂרֵר
  chosen: master
  alternatives:
  - ruling
  - having authority
  - lord
  lexicon: HALOT
  rationale: The participle denotes exercising rule or dominance. 'Master' best conveys
    household authority in concise English; 'lord' would sound overly loaded, and
    'ruling' is less idiomatic here.
- source_word: בְּבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his household
  - over his house
  lexicon: HALOT
  rationale: The preposition plus noun can denote sphere or domain. 'In his own house'
    is a natural rendering and preserves the domestic setting.
- source_word: וּמְדַבֵּר
  chosen: and speak
  alternatives:
  - and speaking
  - and should speak
  lexicon: HALOT
  rationale: Though formally a participle, it continues the decree's content alongside
    the infinitive clause. English coordinates it naturally with 'should be master'
    as 'and speak.'
- source_word: כִּלְשׁוֹן עַמּוֹ
  chosen: the language of his own people
  alternatives:
  - according to the language of his people
  - in the tongue of his people
  lexicon: HALOT
  rationale: This phrase most naturally refers to a man's native ethnic or familial
    language. 'The language of his own people' is clear and preserves the possessive
    nuance.
