id: EST.1.15
reference: Esther 1:15
source:
  edition: WLC
  text: כְּ/דָת֙ מַֽה לַּ/עֲשׂ֔וֹת בַּ/מַּלְכָּ֖ה וַשְׁתִּ֑י עַ֣ל אֲשֶׁ֣ר לֹֽא עָשְׂתָ֗ה
    אֶֽת מַאֲמַר֙ הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ בְּ/יַ֖ד הַ/סָּרִיסִֽים־׀־־׃ס
translation:
  text: According to the law, what is to be done with Queen Vashti because she did
    not carry out the command of King Ahasuerus delivered by the eunuchs?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the eunuchs'; literally, 'by the hand of the eunuchs.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term can also refer more broadly to court officials, though 'eunuchs'
      is the more direct rendering.
    reason: cultural_note
  - marker: c
    text: Or 'because she did not obey the command of King Ahasuerus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדָת
  chosen: According to the law
  alternatives:
  - According to custom
  - By law
  lexicon: HALOT
  rationale: דָּת in Esther commonly refers to law/decree within the Persian court
    setting. 'According to the law' preserves the formal legal framing of the question
    better than the broader 'custom.'
- source_word: מַה לַּעֲשׂוֹת
  chosen: what is to be done
  alternatives:
  - what should be done
  - what to do
  lexicon: HALOT
  rationale: The infinitive construction asks what action ought to be taken. 'What
    is to be done' keeps the impersonal legal tone and reflects the deliberative force.
- source_word: בַּמַּלְכָּה וַשְׁתִּי
  chosen: with Queen Vashti
  alternatives:
  - to Queen Vashti
  - against Queen Vashti
  lexicon: HALOT
  rationale: The preposition with עשה in this context concerns treatment or action
    taken regarding someone. 'With Queen Vashti' is idiomatic in English for judicial
    disposition without over-specifying hostility.
- source_word: עַל אֲשֶׁר לֹא עָשְׂתָה
  chosen: because she did not carry out
  alternatives:
  - because she did not do
  - for that she did not obey
  lexicon: HALOT
  rationale: עַל אֲשֶׁר gives the grounds for the action. 'Carry out' fits the object
    'command' naturally in English and avoids importing a stronger interpretive term
    like 'obey' into the main text.
- source_word: מַאֲמַר
  chosen: the command
  alternatives:
  - the word
  - the order
  lexicon: HALOT
  rationale: מַאֲמַר denotes an utterance/command. In royal context, 'command' best
    captures the authoritative force.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  lexicon: HALOT
  rationale: Title translated, personal name transliterated, following project philosophy.
- source_word: בְּיַד הַסָּרִיסִים
  chosen: delivered by the eunuchs
  alternatives:
  - through the eunuchs
  - by the officials
  lexicon: HALOT
  rationale: Literally 'by the hand of the eunuchs,' an idiom for agency/mediation.
    'Delivered by the eunuchs' expresses the means naturally. סָרִיסִים in Persian
    court context commonly refers to eunuchs/court officials; 'eunuchs' is the more
    direct lexical rendering, with 'officials' preserved as an alternative.
