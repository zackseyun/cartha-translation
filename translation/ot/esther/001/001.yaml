id: EST.1.1
reference: Esther 1:1
source:
  edition: WLC
  text: וַ/יְהִ֖י בִּ/ימֵ֣י אֲחַשְׁוֵר֑וֹשׁ ה֣וּא אֲחַשְׁוֵר֗וֹשׁ הַ/מֹּלֵךְ֙ מֵ/הֹ֣דּוּ
    וְ/עַד כּ֔וּשׁ שֶׁ֛בַע וְ/עֶשְׂרִ֥ים וּ/מֵאָ֖ה מְדִינָֽה־׃
translation:
  text: Now it happened in the days of Ahasuerus—the Ahasuerus who reigned from India
    to Cush, over one hundred twenty-seven provinces—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Xerxes,' if the name is taken as the historically identified Persian
      king rather than transliterated directly from the Hebrew.
    reason: alternative_reading
  - marker: b
    text: '''Cush'' is the ancient regional name; some translations render it ''Ethiopia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came about
  lexicon: HALOT
  rationale: The waw-consecutive of היה is the standard narrative opener. 'Now it
    happened' preserves the Hebrew narrative transition in readable modern English
    without sounding archaic.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: A conventional temporal expression in Hebrew narrative; 'in the days
    of' is both natural and formally close.
- source_word: אֲחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  alternatives:
  - Xerxes
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than replaced with a historical identification. 'Xerxes' is an interpretive identification,
    not a direct rendering of the Hebrew form.
- source_word: הוּא אֲחַשְׁוֵרוֹשׁ
  chosen: the Ahasuerus
  alternatives:
  - that Ahasuerus
  - this was the Ahasuerus
  lexicon: HALOT
  rationale: The pronoun plus repeated name functions appositionally to specify which
    Ahasuerus is meant. 'The Ahasuerus' communicates this identifying force in concise
    English.
- source_word: הַמֹּלֵךְ
  chosen: who reigned
  alternatives:
  - who was reigning
  - the one reigning
  lexicon: HALOT
  rationale: The participle identifies Ahasuerus by his rule; relative clause English
    is the most natural equivalent.
- source_word: מֵהֹדּוּ וְעַד כּוּשׁ
  chosen: from India to Cush
  alternatives:
  - from Hodu to Cush
  - from India to Ethiopia
  lexicon: HALOT
  rationale: הֹדּוּ is conventionally understood as India; כּוּשׁ is best transliterated
    as Cush rather than updated to 'Ethiopia,' which can mislead by suggesting the
    modern nation-state. This preserves the ancient geographical term while remaining
    readable.
- source_word: שֶׁבַע וְעֶשְׂרִים וּמֵאָה
  chosen: one hundred twenty-seven
  alternatives:
  - a hundred and twenty-seven
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number sequence, reordered idiomatically.
- source_word: מְדִינָה
  chosen: provinces
  alternatives:
  - districts
  - administrative regions
  lexicon: HALOT
  rationale: In Persian imperial context, 'provinces' is the most established and
    intelligible rendering for מדינה.
