id: EST.1.21
reference: Esther 1:21
source:
  edition: WLC
  text: וַ/יִּיטַב֙ הַ/דָּבָ֔ר בְּ/עֵינֵ֥י הַ/מֶּ֖לֶךְ וְ/הַ/שָּׂרִ֑ים וַ/יַּ֥עַשׂ
    הַ/מֶּ֖לֶךְ כִּ/דְבַ֥ר מְמוּכָֽן׃
translation:
  text: The matter pleased the king and the officials, and the king did according
    to the word of Memucan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The proposal seemed good to the king and the officials.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the word of Memucan'; that is, in keeping with
      Memucan's counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  chosen: pleased
  alternatives:
  - was good
  - seemed good
  lexicon: HALOT
  rationale: The idiom טבב/יטב with בְּעֵינֵי means 'to be good in the eyes of' =
    'to please' or 'to seem good to.' 'Pleased' is natural English and preserves the
    evaluative sense without awkward literalism.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the proposal
  - the word
  lexicon: HALOT
  rationale: דָּבָר is broad ('word, matter, thing'). Here it refers to the counsel
    just given, so 'the matter' fits the narrative context better than the overly
    literal 'thing' or potentially too interpretive 'proposal.'
- source_word: בְּעֵינֵי
  chosen: pleased
  alternatives:
  - in the eyes of
  lexicon: HALOT
  rationale: This prepositional phrase is part of the Hebrew idiom 'good in the eyes
    of.' Its force is represented in English by 'pleased' rather than translated woodenly.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of מֶלֶךְ in context.
- source_word: וְהַשָּׂרִים
  chosen: and the officials
  alternatives:
  - and the princes
  - and the nobles
  lexicon: HALOT
  rationale: שָׂרִים denotes high-ranking rulers or court leaders. 'Officials' is
    clear modern English and fits the Persian court setting without sounding archaic
    like 'princes.'
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: עָשָׂה is the common verb 'do/make.' 'Did' keeps the wording close to
    the Hebrew; the following phrase supplies the content of the action.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - according to the advice of
  - as
  - according to what ... said
  lexicon: HALOT
  rationale: Literally 'according to the word of.' Because דָּבָר can mean speech,
    word, or matter, this rendering stays relatively formal while remaining intelligible.
    It also avoids over-interpreting the phrase as merely 'advice,' though that is
    the contextual sense.
- source_word: מְמוּכָן
  chosen: Memucan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
