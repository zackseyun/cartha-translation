id: EST.1.4
reference: Esther 1:4
source:
  edition: WLC
  text: בְּ/הַרְאֹת֗/וֹ אֶת עֹ֨שֶׁר֙ כְּב֣וֹד מַלְכוּת֔/וֹ וְ/אֶ֨ת יְקָ֔ר תִּפְאֶ֖רֶת
    גְּדוּלָּת֑/וֹ יָמִ֣ים רַבִּ֔ים שְׁמוֹנִ֥ים וּ/מְאַ֖ת יֽוֹם־־׃
translation:
  text: while he displayed the riches of the glory of his kingdom and the splendor
    of the honor of his greatness for many days—one hundred and eighty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he showed' or 'in showing'; the Hebrew infinitive with prefixed
      ב can mark temporal circumstance.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew piles up royal prestige terms: ''the riches of the glory of
      his kingdom'' and ''the splendor of the honor of his greatness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהַרְאֹתוֹ
  chosen: while he displayed
  alternatives:
  - when he showed
  - in showing
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of ראה plus pronominal
    suffix introduces a temporal circumstance. 'While he displayed' gives smooth English
    and preserves the durative sense in context of an extended feast/exhibition.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: '''Riches'' fits the concrete sense of abundant material wealth and pairs
    naturally with the following honor-language. ''Wealth'' is possible, but ''riches''
    better reflects the rhetorical flourish.'
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: כָּבוֹד often denotes glory, honor, or weightiness. Here 'glory' works
    well in the construct chain 'the glory of his kingdom,' preserving the elevated
    royal register.
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his royal realm
  lexicon: HALOT
  rationale: The noun can denote reign, kingship, or kingdom. In this Persian court
    setting, 'kingdom' best captures the visible imperial domain whose wealth is being
    displayed.
- source_word: יְקָר
  chosen: splendor
  alternatives:
  - preciousness
  - honor
  - majesty
  lexicon: HALOT
  rationale: יְקָר conveys value, honor, and magnificence. 'Splendor' fits the courtly
    display context and avoids awkward repetition with the next honor term.
- source_word: תִּפְאֶרֶת
  chosen: honor
  alternatives:
  - beauty
  - glory
  lexicon: HALOT
  rationale: In construct with גְּדוּלָּתוֹ, the phrase denotes the glorious magnificence
    attending his greatness. 'Honor' is chosen to keep the paired expression intelligible
    in English while distinguishing it from earlier 'glory' and 'splendor.'
- source_word: גְּדוּלָּתוֹ
  chosen: his greatness
  alternatives:
  - his majesty
  lexicon: HALOT
  rationale: The noun denotes greatness or magnitude. 'His greatness' is the most
    direct rendering and preserves the superlative royal self-exaltation of the verse.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - many days
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered with 'for' in English.
    This also prepares for the appositional specification of the exact number of days.
- source_word: שְׁמוֹנִים וּמְאַת יוֹם
  chosen: one hundred and eighty days
  alternatives:
  - a hundred and eighty days
  lexicon: HALOT
  rationale: The Hebrew number order is literally 'eighty and a hundred day,' idiomatically
    'one hundred and eighty days.' Standard English number order is required for clarity.
