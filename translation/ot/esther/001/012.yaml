id: EST.1.12
reference: Esther 1:12
source:
  edition: WLC
  text: וַ/תְּמָאֵ֞ן הַ/מַּלְכָּ֣ה וַשְׁתִּ֗י לָ/בוֹא֙ בִּ/דְבַ֣ר הַ/מֶּ֔לֶךְ אֲשֶׁ֖ר
    בְּ/יַ֣ד הַ/סָּרִיסִ֑ים וַ/יִּקְצֹ֤ף הַ/מֶּ֨לֶךְ֙ מְאֹ֔ד וַ/חֲמָת֖/וֹ בָּעֲרָ֥ה
    בֽ/וֹ׃
translation:
  text: But Queen Vashti refused to come at the king’s command, which was delivered
    by the eunuchs, and the king became very angry, and his wrath burned within him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by the hand of the eunuchs,' an idiom meaning the command was
      conveyed through them.
    reason: lexical_alternative
  - marker: b
    text: Or 'his fury burned in him.' The Hebrew preserves the imagery of anger as
      fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמָאֵן
  chosen: refused
  alternatives:
  - would not
  - declined
  lexicon: HALOT
  rationale: The verb מאן denotes refusal or unwillingness. 'Refused' is the most
    direct and natural English equivalent and preserves the force of deliberate noncompliance.
- source_word: הַמַּלְכָּה וַשְׁתִּי
  chosen: Queen Vashti
  alternatives:
  - the queen, Vashti
  lexicon: HALOT
  rationale: English idiom naturally renders the title plus name as 'Queen Vashti.'
    This preserves both her office and personal identity without awkward apposition.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' In this court setting, 'come' best
    fits the king's summons and standard English usage.
- source_word: בִּדְבַר הַמֶּלֶךְ
  chosen: at the king’s command
  alternatives:
  - by the king's word
  - according to the king's order
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'command' depending on context. Here
    it refers to the king's directive, so 'command' communicates the sense more clearly
    than the more literal but less idiomatic 'word.' The preposition is rendered idiomatically
    as 'at' in the phrase 'at the king’s command.'
- source_word: אֲשֶׁר בְּיַד הַסָּרִיסִים
  chosen: which was delivered by the eunuchs
  alternatives:
  - which came by the hand of the eunuchs
  - through the eunuchs
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency or mediation. 'Delivered by the
    eunuchs' expresses that the command was conveyed through them. 'Eunuchs' is retained
    rather than softened, since סריסים in Persian court context normally refers to
    court eunuchs.
- source_word: וַיִּקְצֹף
  chosen: became very angry
  alternatives:
  - was enraged
  - grew furious
  lexicon: HALOT
  rationale: The verb קצף denotes anger or wrath. Combined with מְאֹד, 'became very
    angry' is a clear, natural rendering that preserves the narrative progression.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the king's anger. 'Very' is the most natural modern
    English equivalent.
- source_word: וַחֲמָתוֹ בָּעֲרָה בוֹ
  chosen: his wrath burned within him
  alternatives:
  - his fury burned in him
  - his anger blazed within him
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/fury, and בערה literally means 'burned.' The phrase
    is metaphorical for intense anger. 'His wrath burned within him' preserves the
    imagery while remaining idiomatic. The pronoun בו is best taken as internal reference
    ('within him') rather than external object ('against him'), since no external
    male referent is in view.
