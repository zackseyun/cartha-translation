id: EST.1.5
reference: Esther 1:5
source:
  edition: WLC
  text: וּ/בִ/מְל֣וֹאת הַ/יָּמִ֣ים הָ/אֵ֗לֶּה עָשָׂ֣ה הַ/מֶּ֡לֶךְ לְ/כָל הָ/עָ֣ם הַ/נִּמְצְאִים֩
    בְּ/שׁוּשַׁ֨ן הַ/בִּירָ֜ה לְ/מִ/גָּ֧דוֹל וְ/עַד קָטָ֛ן מִשְׁתֶּ֖ה שִׁבְעַ֣ת יָמִ֑ים
    בַּ/חֲצַ֕ר גִּנַּ֥ת בִּיתַ֖ן הַ/מֶּֽלֶךְ׀־־׃
translation:
  text: And when these days were completed, the king gave a banquet for all the people
    who were present in Susa the citadel, from great to small, for seven days, in
    the court of the garden of the king’s palace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feast'; the Hebrew term often refers to a drinking banquet.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the citadel of Susa.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the greatest to the least,' an idiom meaning people of every rank.
    reason: lexical_alternative
  - marker: d
    text: The final term may also be rendered 'pavilion' or 'house'; 'palace' best
      fits the royal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִמְלֹאות
  chosen: And when ... were completed
  alternatives:
  - And at the completion of
  - And when ... had run their course
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of מלא marks temporal
    circumstance: ''when the days were completed'' or ''at the completion of the days.''
    ''When ... were completed'' is natural English and preserves the temporal sense
    without over-paraphrase.'
- source_word: הַיָּמִים הָאֵלֶּה
  chosen: these days
  alternatives:
  - those days
  lexicon: HALOT
  rationale: The demonstrative is proximal in Hebrew. 'These days' is the plain sense
    in context, referring back to the previously described period of feasting.
- source_word: עָשָׂה
  chosen: gave
  alternatives:
  - made
  - held
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with מִשְׁתֶּה it idiomatically
    means to make or give a feast/banquet. 'Gave' is idiomatic modern English while
    remaining close to the Hebrew event sense.
- source_word: מִשְׁתֶּה
  chosen: banquet
  alternatives:
  - feast
  - drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast, often with emphasis on drinking. 'Banquet'
    fits the royal setting and is readable. 'Drinking feast' is more wooden and potentially
    overemphasizes one aspect in English.
- source_word: לְכָל הָעָם
  chosen: for all the people
  alternatives:
  - for all the populace
  - for all the people group
  lexicon: HALOT
  rationale: עָם here refers broadly to the people present in the capital, not necessarily
    an ethnic people. 'All the people' is the most natural and sufficiently broad
    rendering.
- source_word: הַנִּמְצְאִים
  chosen: who were present
  alternatives:
  - who were found
  - who were there
  lexicon: HALOT
  rationale: The Niphal participle of מצא here means those found/present in a location.
    'Who were present' is idiomatic and precise.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  chosen: in Susa the citadel
  alternatives:
  - in Susa the fortress
  - in the citadel of Susa
  lexicon: HALOT
  rationale: בִּירָה denotes a fortified acropolis/citadel. 'Susa the citadel' follows
    the Hebrew appositional structure and is a common, clear English rendering.
- source_word: לְמִגָּדוֹל וְעַד קָטָן
  chosen: from great to small
  alternatives:
  - from the greatest to the least
  - from high to low
  lexicon: HALOT
  rationale: This idiom expresses all ranks or ages inclusively. 'From great to small'
    preserves the Hebrew wording and social breadth without interpretive expansion.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - lasting seven days
  lexicon: HALOT
  rationale: A straightforward duration phrase; 'for seven days' is the natural English
    equivalent.
- source_word: בַּחֲצַר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: חָצֵר can mean court or courtyard. 'Court' is concise and fits the following
    genitive chain; the sense is the palace courtyard area.
- source_word: גִּנַּת
  chosen: of the garden
  alternatives:
  - of the garden area
  - garden
  lexicon: HALOT
  rationale: The construct form links 'court' with 'garden.' Rendering the full chain
    preserves the Hebrew spatial description.
- source_word: בִּיתַן
  chosen: of the king’s palace
  alternatives:
  - of the king's pavilion
  - of the king's house
  lexicon: HALOT
  rationale: בִּיתַן is a Persian loanword often understood as palace/house/pavilion.
    In this royal context, 'palace' best communicates the setting in clear English.
    'Pavilion' is possible but less certain and less natural here.
