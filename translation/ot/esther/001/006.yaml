id: EST.1.6
reference: Esther 1:6
source:
  edition: WLC
  text: ח֣וּר כַּרְפַּ֣ס וּ/תְכֵ֗לֶת אָחוּז֙ בְּ/חַבְלֵי ב֣וּץ וְ/אַרְגָּמָ֔ן עַל
    גְּלִ֥ילֵי כֶ֖סֶף וְ/עַמּ֣וּדֵי שֵׁ֑שׁ מִטּ֣וֹת זָהָ֣ב וָ/כֶ֗סֶף עַ֛ל רִֽצְפַ֥ת
    בַּהַט וָ/שֵׁ֖שׁ וְ/דַ֥ר וְ/סֹחָֽרֶת׀־־׀־׃
translation:
  text: There were white cotton and blue hangings, fastened with cords of fine linen
    and purple to silver rings and marble pillars, and couches of gold and silver
    on a pavement of alabaster, marble, mother-of-pearl, and precious stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise materials named in the flooring list are uncertain. 'Alabaster,'
      'marble,' 'mother-of-pearl,' and 'precious stones' reflect common scholarly
      identifications, but some render the terms differently, such as 'porphyry,'
      'white marble,' or 'dark stone.'
    reason: lexical_alternative
  - marker: b
    text: Or 'silver rods' for 'silver rings'; the Hebrew term may refer more generally
      to rounded or rolled silver fixtures.
    reason: lexical_alternative
  - marker: c
    text: '''Couches'' refers to banquet couches for reclining at a feast, not ordinary
      sleeping beds.'
    reason: cultural_note
lexical_decisions:
- source_word: חוּר
  chosen: white
  alternatives:
  - linen
  lexicon: HALOT
  rationale: In this decorative context, the term most naturally denotes the color
    'white' rather than a fabric. It pairs with other color/material terms describing
    the palace drapery.
- source_word: כַּרְפַּס
  chosen: cotton
  alternatives:
  - fine cotton
  - carpas cloth
  lexicon: HALOT
  rationale: The loanword likely refers to cotton fabric. 'Cotton' is clear modern
    English and fits the list of luxury textiles.
- source_word: תְכֵלֶת
  chosen: blue
  alternatives:
  - violet
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a prestigious blue or blue-purple dye. 'Blue' is the
    most natural concise rendering in English here, while the more technical shade
    nuance is preserved as an alternative.
- source_word: אָחוּז
  chosen: fastened
  alternatives:
  - held
  - attached
  lexicon: HALOT
  rationale: Passive participle describing how the hangings were secured. 'Fastened'
    is idiomatic and suitably concrete.
- source_word: חַבְלֵי בּוּץ
  chosen: cords of fine linen
  alternatives:
  - cords of byssus
  - ropes of fine linen
  lexicon: HALOT
  rationale: בּוּץ refers to fine linen; 'cords' better suits the decorative fastening
    context than the heavier 'ropes,' though that remains possible.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering for the luxury dye/color term in textile contexts.
- source_word: גְּלִילֵי כֶסֶף
  chosen: silver rings
  alternatives:
  - silver rods
  - silver circles
  lexicon: HALOT
  rationale: The noun can denote something round or rolled. In context of hangings
    being fastened, 'rings' best explains the attachment point and is a common contextual
    rendering, though the exact object is uncertain.
- source_word: עַמּוּדֵי שֵׁשׁ
  chosen: marble pillars
  alternatives:
  - alabaster pillars
  - pillars of white marble
  lexicon: HALOT
  rationale: שֵׁשׁ here refers not to linen but to a white stone, commonly understood
    as marble or alabaster. 'Marble pillars' is the most idiomatic architectural rendering;
    the precise stone identification is uncertain.
- source_word: מִטּוֹת
  chosen: couches
  alternatives:
  - beds
  - divans
  lexicon: HALOT
  rationale: In banquet settings this refers to reclining couches rather than sleeping
    beds. 'Couches' communicates the ancient dining setting without over-paraphrase.
- source_word: רִצְפַת
  chosen: pavement
  alternatives:
  - mosaic floor
  - flooring
  lexicon: HALOT
  rationale: A straightforward rendering for the constructed floor surface. 'Mosaic
    floor' may be interpretive, so 'pavement' is safer in the main text.
- source_word: בַּהַט
  chosen: alabaster
  alternatives:
  - porphyry
  - marble
  lexicon: HALOT
  rationale: The exact stone is uncertain. 'Alabaster' is a common traditional identification
    and fits the luxury-material list, but uncertainty should be preserved in a footnote.
- source_word: שֵׁשׁ
  chosen: marble
  alternatives:
  - white marble
  - alabaster
  lexicon: HALOT
  rationale: In this flooring list the term denotes a white stone. Rendering it 'marble'
    maintains consistency with the architectural context, though the exact mineral
    identification remains debated.
- source_word: דַר
  chosen: mother-of-pearl
  alternatives:
  - pearl
  - nacre
  lexicon: HALOT
  rationale: A rare term for a precious decorative material. 'Mother-of-pearl' best
    fits a flooring inlay context better than 'pearl' alone.
- source_word: סֹחָרֶת
  chosen: precious stones
  alternatives:
  - black marble
  - dark stone
  - merchant stone
  lexicon: HALOT
  rationale: This rare word is highly uncertain. 'Precious stones' is a defensible
    contextual rendering for an opulent pavement list, but the uncertainty is significant
    enough to preserve in a footnote.
