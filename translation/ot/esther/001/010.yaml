id: EST.1.10
reference: Esther 1:10
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שְּׁבִיעִ֔י כְּ/ט֥וֹב לֵב הַ/מֶּ֖לֶךְ בַּ/יָּ֑יִן אָמַ֡ר לִ֠/מְהוּמָן
    בִּזְּתָ֨א חַרְבוֹנָ֜א בִּגְתָ֤א וַ/אֲבַגְתָא֙ זֵתַ֣ר וְ/כַרְכַּ֔ס שִׁבְעַת֙ הַ/סָּ֣רִיסִ֔ים
    הַ/מְשָׁ֣רְתִ֔ים אֶת פְּנֵ֖י הַ/מֶּ֥לֶךְ אֲחַשְׁוֵרֽוֹשׁ־־׃
translation:
  text: On the seventh day, when the king’s heart was merry with wine, he told Mehuman,
    Biztha, Harbona, Bigtha, Abagtha, Zethar, and Karkas—the seven eunuchs who attended
    King Ahasuerus—to
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the king was in good spirits from wine.' The Hebrew idiom speaks
      of the king’s heart being glad because of wine, without explicitly stating drunkenness.
    reason: lexical_alternative
  - marker: b
    text: '''Eunuchs'' can in some contexts refer more broadly to royal court officials,
      but the more direct lexical sense is retained here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: On the seventh day
  alternatives:
  - On day seven
  - On the seventh day of the feast
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of the action. 'On the
    seventh day' is the natural English equivalent. 'Of the feast' is not explicit
    in this verse and would over-specify.
- source_word: כְּטוֹב לֵב הַמֶּלֶךְ בַּיָּיִן
  chosen: when the king’s heart was merry with wine
  alternatives:
  - when the king was in good spirits from wine
  - when the king was drunk
  lexicon: HALOT
  rationale: The idiom literally refers to the king's heart being good with wine,
    meaning cheerful or merry because of wine. 'Merry with wine' preserves the idiomatic
    flavor without overstating the case as 'drunk,' which is interpretive beyond the
    wording.
- source_word: אָמַר
  chosen: he told
  alternatives:
  - he said to
  - he commanded
  lexicon: HALOT
  rationale: The verb is the common 'said,' but in English, because it introduces
    a list of court officials and an implied infinitive in the next verse, 'told'
    reads more naturally while remaining faithful to the speech-act.
- source_word: לִמְהוּמָן בִּזְּתָא חַרְבוֹנָא בִּגְתָא וַאֲבַגְתָא זֵתַר וְכַרְכַּס
  chosen: Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Karkas
  alternatives:
  - Mehuman, ביזתא, Harbona, Bigtha, Abagtha, Zethar, and Carcas
  lexicon: HALOT
  rationale: These are personal names and so are transliterated per translation philosophy.
    Spellings are standardized in readable English forms while staying close to the
    Hebrew/established conventions.
- source_word: שִׁבְעַת הַסָּרִיסִים
  chosen: the seven eunuchs
  alternatives:
  - the seven officials
  - the seven court officers
  lexicon: HALOT
  rationale: סָרִיס commonly denotes a eunuch, especially in royal court contexts,
    though it can extend to court official. Here the default sense 'eunuchs' is retained
    because it is the more direct lexical value and fits the Persian court setting.
- source_word: הַמְשָׁרְתִים אֶת פְּנֵי
  chosen: who attended
  alternatives:
  - who served before
  - who ministered in the presence of
  lexicon: HALOT
  rationale: The participle plus 'before the face of' is an idiom for personal attendance
    in the royal presence. 'Who attended' is concise, natural English that preserves
    the court-service sense.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: Appositional royal title plus name is best rendered in standard English
    order as 'King Ahasuerus.'
