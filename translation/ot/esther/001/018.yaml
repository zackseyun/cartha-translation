id: EST.1.18
reference: Esther 1:18
source:
  edition: WLC
  text: וְֽ/הַ/יּ֨וֹם הַ/זֶּ֜ה תֹּאמַ֣רְנָה שָׂר֣וֹת פָּֽרַס וּ/מָדַ֗י אֲשֶׁ֤ר שָֽׁמְעוּ֙
    אֶת דְּבַ֣ר הַ/מַּלְכָּ֔ה לְ/כֹ֖ל שָׂרֵ֣י הַ/מֶּ֑לֶךְ וּ/כְ/דַ֖י בִּזָּי֥וֹן וָ/קָֽצֶף׀־־׃
translation:
  text: And today the noblewomen of Persia and Media who have heard the queen’s word
    will say the same to all the king’s officials, and there will be enough contempt
    and wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princesses of Persia and Media.' The Hebrew term refers to high-ranking
      women; 'noblewomen' is chosen to avoid implying they were necessarily royal
      daughters.
    reason: lexical_alternative
  - marker: b
    text: Or 'what the queen said' / 'the matter of the queen.' The Hebrew 'word'
      can refer either to her statement or to the reported affair concerning her.
    reason: lexical_alternative
  - marker: c
    text: The final clause is elliptical in Hebrew, literally something like 'and
      enough contempt and wrath.' The translation supplies 'there will be' for clear
      English sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹם הַזֶּה
  chosen: And today
  alternatives:
  - And this very day
  - And on this day
  lexicon: HALOT
  rationale: Temporal expression marking immediacy. 'Today' is natural modern English;
    'this very day' is possible but slightly more emphatic than necessary.
- source_word: תֹּאמַרְנָה
  chosen: will say
  alternatives:
  - will speak
  - will reply
  lexicon: HALOT
  rationale: Qal imperfect 3fp of אמר commonly means 'say.' Future sense fits the
    predictive context of Memucan's counsel.
- source_word: שָׂרוֹת
  chosen: noblewomen
  alternatives:
  - princesses
  - ladies
  lexicon: HALOT
  rationale: Refers to high-ranking women corresponding to court officials, not necessarily
    royal daughters. 'Noblewomen' best conveys elite social status without implying
    direct royal lineage, whereas 'princesses' would overstate and 'ladies' would
    understate.
- source_word: פָּרַס וּמָדַי
  chosen: of Persia and Media
  alternatives:
  - Persian and Median
  - of Paras and Madai
  lexicon: HALOT
  rationale: Standard English geographical names are appropriate. The construct-like
    relation with שָׂרוֹת is naturally rendered 'of Persia and Media.'
- source_word: אֲשֶׁר שָׁמְעוּ
  chosen: who have heard
  alternatives:
  - who heard
  - who will hear
  lexicon: HALOT
  rationale: The perfect likely describes a completed action with present relevance
    in this predictive statement. English present perfect captures that these women
    are envisioned as already having heard the report.
- source_word: אֶת דְּבַר הַמַּלְכָּה
  chosen: the queen’s word
  alternatives:
  - the queen's report
  - the queen's matter
  - what the queen said
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, affair'). Here it refers to the report of
    the queen's action/statement. 'Word' preserves the Hebrew compactness while remaining
    intelligible; the fuller sense is reflected by context.
- source_word: לְכֹל שָׂרֵי הַמֶּלֶךְ
  chosen: to all the king’s officials
  alternatives:
  - to all the king's princes
  - to all the king's nobles
  lexicon: HALOT
  rationale: שָׂרֵי denotes rulers/officials/court leaders. 'Officials' is clear modern
    English and avoids the misleading hereditary nuance of 'princes.'
- source_word: וּכְדַי
  chosen: there will be enough
  alternatives:
  - and as enough
  - and sufficient
  lexicon: HALOT
  rationale: This expression conveys sufficiency/abundance. In idiomatic English,
    the clause is best completed as 'there will be enough...' to express the result.
- source_word: בִּזָּיוֹן
  chosen: contempt
  alternatives:
  - disgrace
  - despising
  lexicon: HALOT
  rationale: The noun denotes scorn or contemptuous treatment. 'Contempt' fits the
    social dishonor in view better than the more passive 'disgrace.'
- source_word: וָקָצֶף
  chosen: and wrath
  alternatives:
  - and anger
  - and fury
  lexicon: HALOT
  rationale: קצף denotes anger/wrath. 'Wrath' preserves the force and pairs well with
    'contempt' in a formal courtly context.
