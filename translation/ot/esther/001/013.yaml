id: EST.1.13
reference: Esther 1:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ לַ/חֲכָמִ֖ים יֹדְעֵ֣י הָֽ/עִתִּ֑ים כִּי כֵן֙ דְּבַ֣ר
    הַ/מֶּ֔לֶךְ לִ/פְנֵ֕י כָּל יֹדְעֵ֖י דָּ֥ת וָ/דִֽין־־׃
translation:
  text: Then the king said to the wise men who knew the times—for this was the king’s
    procedure before all who knew law and judgment—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who understood the times,” that is, men skilled in discerning the proper
      occasion or procedure.
    reason: lexical_alternative
  - marker: b
    text: Or “for this was the king’s custom/matter before all who knew law and judgment.”
      The Hebrew is somewhat compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: לַחֲכָמִים
  chosen: to the wise men
  alternatives:
  - to the sages
  - to the counselors
  lexicon: HALOT
  rationale: חֲכָמִים literally denotes 'wise ones/men.' In this court setting it
    likely refers to learned advisers, but 'wise men' preserves the lexical sense
    without over-specifying office.
- source_word: יֹדְעֵי הָעִתִּים
  chosen: who knew the times
  alternatives:
  - who understood the times
  - who knew the proper times
  lexicon: HALOT
  rationale: The participial phrase is rendered straightforwardly. עִתִּים can mean
    times/seasons or appointed occasions; in context it points to those skilled in
    discerning the appropriate time or circumstance for action. 'Knew the times' keeps
    the Hebrew image while remaining intelligible.
- source_word: כִּי כֵן דְּבַר הַמֶּלֶךְ
  chosen: for this was the king’s procedure
  alternatives:
  - for thus was the king's matter
  - for this was the king's custom
  lexicon: HALOT
  rationale: 'דָּבָר often means ''word/matter/affair,'' but here the clause explains
    customary process. ''Procedure'' best captures the idiomatic sense in context:
    the king''s way of handling such matters.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in the presence of.' 'Before' is concise
    and natural in English while preserving the relational sense.
- source_word: כָּל יֹדְעֵי דָּת וָדִין
  chosen: all who knew law and judgment
  alternatives:
  - all who knew law and justice
  - all who knew statute and legal decision
  lexicon: HALOT
  rationale: דָּת in Esther commonly refers to law/decree, and דִּין refers to judgment/legal
    decision. 'Law and judgment' preserves both terms distinctly and fits the judicial-administrative
    context. 'Justice' is possible for דִּין, but 'judgment' better reflects legal
    expertise rather than abstract moral principle.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
