id: EST.1.2
reference: Esther 1:2
source:
  edition: WLC
  text: בַּ/יָּמִ֖ים הָ/הֵ֑ם כְּ/שֶׁ֣בֶת הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֗וֹשׁ עַ֚ל כִּסֵּ֣א
    מַלְכוּת֔/וֹ אֲשֶׁ֖ר בְּ/שׁוּשַׁ֥ן הַ/בִּירָֽה׀׃
translation:
  text: In those days, when King Ahasuerus sat on his royal throne, which was in Susa
    the citadel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Shushan the citadel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: A standard temporal narrative formula. 'In those days' is idiomatic English
    and preserves the Hebrew demonstrative force.
- source_word: כְּשֶׁבֶת
  chosen: when ... sat
  alternatives:
  - as ... sat
  - while ... was sitting
  lexicon: HALOT
  rationale: The preposition כ with the infinitive construct of ישב introduces a temporal
    clause. 'When ... sat' gives natural English while preserving the temporal sense
    rather than a more wooden 'as the sitting of.'
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English normally places the title before the personal name. The name
    is transliterated in keeping with the translation philosophy to transliterate
    personal names.
- source_word: עַל כִּסֵּא מַלְכוּתוֹ
  chosen: on his royal throne
  alternatives:
  - on the throne of his kingdom
  - upon his kingdom's throne
  lexicon: HALOT
  rationale: Literally 'on the throne of his kingship/kingdom.' 'Royal throne' is
    a concise, natural rendering that preserves the regal sense without awkwardness.
    The possessive 'his' is retained from the suffix on מַלְכוּתוֹ.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying 'throne.' 'Which' fits the nonrestrictive
    flow in English.
- source_word: בְּשׁוּשַׁן
  chosen: in Susa
  alternatives:
  - in Shushan
  lexicon: HALOT
  rationale: The place name is rendered by the standard English form 'Susa,' which
    is more familiar in contemporary English than the older transliteration 'Shushan.'
- source_word: הַבִּירָה
  chosen: the citadel
  alternatives:
  - the fortress
  - the capital
  lexicon: HALOT
  rationale: בִּירָה refers to a fortified palace complex or citadel. 'The citadel'
    is the most precise and established rendering here; 'capital' is too broad, and
    'fortress' misses the likely royal-administrative nuance.
