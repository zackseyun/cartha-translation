id: EST.1.7
reference: Esther 1:7
source:
  edition: WLC
  text: וְ/הַשְׁקוֹת֙ בִּ/כְלֵ֣י זָהָ֔ב וְ/כֵלִ֖ים מִ/כֵּלִ֣ים שׁוֹנִ֑ים וְ/יֵ֥ין
    מַלְכ֛וּת רָ֖ב כְּ/יַ֥ד הַ/מֶּֽלֶךְ׃
translation:
  text: Drinks were served in vessels of gold, with vessels differing from vessel
    to vessel, and royal wine in abundance, according to the king’s bounty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the king’s generosity' or more literally, 'according to
      the hand of the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְׁקוֹת
  chosen: Drinks were served
  alternatives:
  - There was serving of drink
  - They gave drink
  lexicon: HALOT
  rationale: The infinitive/verb form from שׁקה in this context functions idiomatically
    to describe the serving of beverages at the banquet. 'Drinks were served' gives
    natural English while preserving the passive/event sense better than a more wooden
    nominal rendering.
- source_word: בִּכְלֵי זָהָב
  chosen: in vessels of gold
  alternatives:
  - in gold vessels
  - in golden goblets
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel/container/utensil. 'Vessels of gold'
    stays close to the Hebrew and avoids over-specifying the shape as cups or goblets,
    which the text itself does not explicitly state.
- source_word: וְכֵלִים מִכֵּלִים שׁוֹנִים
  chosen: with vessels differing from vessel to vessel
  alternatives:
  - and the vessels were all different
  - with one vessel unlike another
  lexicon: HALOT
  rationale: The construction emphasizes variety among the drinking vessels. 'Differing
    from vessel to vessel' preserves the distributive force of מִן plus repeated noun
    and the participle שׁוֹנִים.
- source_word: וְיֵין מַלְכוּת
  chosen: and royal wine
  alternatives:
  - and wine of the kingdom
  - and kingly wine
  lexicon: HALOT
  rationale: The genitive likely denotes wine befitting royalty or from the royal
    stores. 'Royal wine' is idiomatic and preserves the regal association without
    unnecessary expansion.
- source_word: רָב
  chosen: in abundance
  alternatives:
  - plentiful
  - abundant
  - much
  lexicon: HALOT
  rationale: רָב here modifies the supply of wine. 'In abundance' reads naturally
    in English and conveys plentiful quantity.
- source_word: כְּיַד הַמֶּלֶךְ
  chosen: according to the king’s bounty
  alternatives:
  - according to the king's hand
  - as the king could provide
  - according to the king's generosity
  lexicon: HALOT
  rationale: The idiom 'according to the hand of' often means according to the measure,
    means, or generosity of someone. In this banquet context, 'according to the king’s
    bounty' best captures lavish royal provision while remaining faithful to the idiom.
