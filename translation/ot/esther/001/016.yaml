id: EST.1.16
reference: Esther 1:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מומכן לִ/פְנֵ֤י הַ/מֶּ֨לֶךְ֙ וְ/הַ/שָּׂרִ֔ים לֹ֤א עַל הַ/מֶּ֨לֶךְ֙
    לְ/בַדּ֔/וֹ עָוְתָ֖ה וַשְׁתִּ֣י הַ/מַּלְכָּ֑ה כִּ֤י עַל כָּל הַ/שָּׂרִים֙ וְ/עַל
    כָּל הָ֣/עַמִּ֔ים אֲשֶׁ֕ר בְּ/כָל מְדִינ֖וֹת הַ/מֶּ֥לֶךְ אֲחַשְׁוֵרֽוֹשׁ־־־־־־׃
translation:
  text: Then Memucan said before the king and the officials, “Queen Vashti has done
    wrong not against the king alone, but against all the officials and all the peoples
    who are in all the provinces of King Ahasuerus.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Vashti the queen has not done wrong against the king alone, but also
      against all the officials and all the peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: מומכן
  chosen: Memucan
  rationale: Personal name is transliterated per project philosophy.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition indicates speaking in the presence of the king and officials.
    'Before' is concise and idiomatic.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of the common noun with article.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the nobles
  lexicon: HALOT
  rationale: שָׂרִים refers to high-ranking rulers/court officials. 'Officials' is
    clear modern English and fits the Persian court context better than the more archaic
    'princes.'
- source_word: לֹא עַל הַמֶּלֶךְ לְבַדּוֹ
  chosen: not against the king alone
  alternatives:
  - not against the king only
  lexicon: HALOT
  rationale: עַל with עָוְתָה here expresses wrongdoing directed against someone.
    'Against' makes the relational force explicit in English.
- source_word: עָוְתָה
  chosen: has done wrong
  alternatives:
  - has acted wrongly
  - has offended
  lexicon: HALOT
  rationale: The verb denotes acting wrongly or perversely. 'Has done wrong' is natural,
    morally weighted, and avoids overinterpreting the offense as merely personal insult.
- source_word: וַשְׁתִּי הַמַּלְכָּה
  chosen: Queen Vashti
  alternatives:
  - Vashti the queen
  rationale: English idiom normally places the title before the name; meaning is unchanged.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: 'Here כִּי introduces the corrective expansion of the previous negation:
    not only X, but also Y. ''But'' best captures the contrastive force in English.'
- source_word: עַל כָּל הַשָּׂרִים וְעַל כָּל הָעַמִּים
  chosen: against all the officials and all the peoples
  alternatives:
  - against all the princes and all the peoples
  - against all the officials and all the people
  lexicon: HALOT
  rationale: Repeating 'against' reflects the Hebrew עַל ... וְעַל structure and keeps
    the parallelism. 'Peoples' preserves the plural עַמִּים, fitting the multiethnic
    empire.
- source_word: אֲשֶׁר בְּכָל מְדִינוֹת
  chosen: who are in all the provinces
  alternatives:
  - who are throughout all the provinces
  - who are in every province
  lexicon: HALOT
  rationale: The relative clause modifies both officials and peoples as located throughout
    the empire. 'Who are in all the provinces' is straightforward and sufficiently
    formal.
- source_word: מְדִינוֹת
  chosen: provinces
  alternatives:
  - districts
  lexicon: HALOT
  rationale: Standard rendering for imperial administrative regions in Esther.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  rationale: Royal title translated; personal name transliterated, per project philosophy.
