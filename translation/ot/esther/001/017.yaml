id: EST.1.17
reference: Esther 1:17
source:
  edition: WLC
  text: כִּֽי יֵצֵ֤א דְבַר הַ/מַּלְכָּה֙ עַל כָּל הַ/נָּשִׁ֔ים לְ/הַבְז֥וֹת בַּעְלֵי/הֶ֖ן
    בְּ/עֵינֵי/הֶ֑ן בְּ/אָמְרָ֗/ם הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֡וֹשׁ אָמַ֞ר לְ/הָבִ֨יא אֶת
    וַשְׁתִּ֧י הַ/מַּלְכָּ֛ה לְ/פָנָ֖י/ו וְ/לֹא בָֽאָה־־־־־־׃
translation:
  text: For the queen’s matter will go out to all women, causing them to despise their
    husbands in their eyes, when they say, ‘King Ahasuerus said to bring Queen Vashti
    before him, but she did not come.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the queen’s report will spread' or 'the queen’s word will go out.' The
      Hebrew דָּבָר can mean 'word,' 'matter,' or 'report.'
    reason: lexical_alternative
  - marker: b
    text: Or 'commanded that Queen Vashti be brought before him.' The Hebrew more
      literally reads 'said to bring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵצֵא דְבַר הַמַּלְכָּה
  chosen: the queen’s matter will go out
  alternatives:
  - the queen’s report will spread
  - the queen’s word will go out
  lexicon: HALOT
  rationale: דָּבָר has a broad range including 'word,' 'matter,' 'affair,' or 'report.'
    In this context the sense is the account/news concerning the queen’s conduct becoming
    widely known. 'Matter' preserves the Hebrew breadth without over-specifying, while
    'will go out' reflects יֵצֵא idiomatically but still transparently.
- source_word: עַל כָּל הַנָּשִׁים
  chosen: to all women
  alternatives:
  - among all women
  - upon all women
  lexicon: HALOT
  rationale: עַל with verbs of dissemination can indicate extension over or to a group.
    'To all women' is natural English and captures the scope of the report.
- source_word: לְהַבְזוֹת
  chosen: causing them to despise
  alternatives:
  - so as to make them treat with contempt
  - leading them to scorn
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose. בזה denotes treating with contempt
    or despising. 'Causing them to despise' preserves the causal/result nuance in
    readable English.
- source_word: בַּעְלֵיהֶן
  chosen: their husbands
  alternatives:
  - their masters
  lexicon: HALOT
  rationale: Though בַּעַל can mean 'owner/master/lord,' in marital context with נשים
    it clearly means 'husbands.' This avoids importing a broader authority term than
    the context warrants.
- source_word: בְּעֵינֵיהֶן
  chosen: in their eyes
  alternatives:
  - in their sight
  - in their estimation
  lexicon: HALOT
  rationale: This Hebrew idiom indicates evaluation or regard. 'In their eyes' is
    a close and intelligible rendering that preserves the metaphor.
- source_word: בְּאָמְרָם
  chosen: when they say
  alternatives:
  - as they say
  - by saying
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/construct-like form here introduces
    the circumstance in which the despising occurs. 'When they say' fits the discourse
    flow naturally.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English normally renders the title-name sequence as 'King Ahasuerus.'
    The personal name is transliterated per project philosophy.
- source_word: אָמַר לְהָבִיא
  chosen: said to bring
  alternatives:
  - commanded that ... be brought
  - ordered them to bring
  lexicon: HALOT
  rationale: The Hebrew is literally 'said to bring.' While the force is effectively
    royal command, the text uses אמר rather than a stronger command verb. 'Said to
    bring' preserves the source wording without unnecessary paraphrase.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - into his presence
  lexicon: HALOT
  rationale: The phrase literally means 'before his face/presence.' 'Before him' is
    concise and natural while retaining the courtly sense.
- source_word: וְלֹא בָאָה
  chosen: but she did not come
  alternatives:
  - and she did not come
  lexicon: HALOT
  rationale: The conjunction here is simple waw, but in context it is adversative
    relative to the king’s order. 'But' makes the implied contrast explicit in natural
    English.
