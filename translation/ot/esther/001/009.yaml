id: EST.1.9
reference: Esther 1:9
source:
  edition: WLC
  text: גַּ֚ם וַשְׁתִּ֣י הַ/מַּלְכָּ֔ה עָשְׂתָ֖ה מִשְׁתֵּ֣ה נָשִׁ֑ים בֵּ֚ית הַ/מַּלְכ֔וּת
    אֲשֶׁ֖ר לַ/מֶּ֥לֶךְ אֲחַשְׁוֵרֽוֹשׁ׃ס
translation:
  text: Queen Vashti also gave a feast for the women in the royal house that belonged
    to King Ahasuerus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banquet'; the Hebrew term can denote a feast, often one associated with
      drinking.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the palace'; literally 'in the house of the kingdom/royalty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - likewise
  lexicon: HALOT
  rationale: Marks addition to the preceding description of the king's banquet; 'also'
    is the most natural concise English connective here.
- source_word: וַשְׁתִּי
  chosen: Vashti
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: הַמַּלְכָּה
  chosen: Queen
  alternatives:
  - the queen
  lexicon: HALOT
  rationale: Used as an appositional title with the name, best rendered in English
    as 'Queen Vashti' rather than the more wooden 'Vashti the queen.'
- source_word: עָשְׂתָה
  chosen: gave
  alternatives:
  - made
  - held
  lexicon: HALOT
  rationale: Although the verb literally means 'did/made,' English idiom with 'feast'
    is 'gave' or 'held.' 'Gave' preserves the sense naturally without over-paraphrase.
- source_word: מִשְׁתֵּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: Refers to a banquet/feast, often involving drinking. 'Feast' is clear
    modern English and fits the narrative context. The more specific nuance 'drinking
    feast' is possible but too narrow for the main text here.
- source_word: נָשִׁים
  chosen: for the women
  alternatives:
  - for women
  - for the ladies
  lexicon: HALOT
  rationale: The plural noun identifies the attendees of Vashti's feast. 'For the
    women' is the most straightforward rendering in context.
- source_word: בֵּית הַמַּלְכוּת
  chosen: the royal house
  alternatives:
  - the palace
  - the house of the kingdom
  lexicon: HALOT
  rationale: Literally 'the house of the kingdom/royalty.' 'The royal house' preserves
    the house imagery while communicating a palace setting. 'Palace' is possible but
    slightly interpretive.
- source_word: אֲשֶׁר לַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: that belonged to King Ahasuerus
  alternatives:
  - which was King Ahasuerus's
  - of King Ahasuerus
  lexicon: HALOT
  rationale: The relative clause identifies the royal house as belonging to the king.
    'That belonged to King Ahasuerus' is natural English and preserves the possessive
    sense.
- source_word: אֲחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  rationale: Standard English transliteration of the Persian royal name used in Esther.
