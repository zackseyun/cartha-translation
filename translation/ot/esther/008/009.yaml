  from: on the twenty-third day of it
  to: on its twenty-third day
  rationale: The current rendering is a very literal translation of the Hebrew phrase '...בּוֹ' ('...in it'). While grammatically correct and understandable, the phrasing 'of it' is slightly stilted in contemporary English. Changing to 'on its twenty-third day' offers a more natural and fluid reading while still accurately conveying the anaphoric reference to the previously mentioned month.
