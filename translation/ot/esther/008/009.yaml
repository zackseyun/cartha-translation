id: EST.8.9
reference: Esther 8:9
source:
  edition: WLC
  text: וַ/יִּקָּרְא֣וּ סֹפְרֵֽי הַ/מֶּ֣לֶךְ בָּֽ/עֵת הַ֠/הִיא בַּ/חֹ֨דֶשׁ הַ/שְּׁלִישִׁ֜י הוּא חֹ֣דֶשׁ סִיוָ֗ן בִּ/שְׁלוֹשָׁ֣ה וְ/עֶשְׂרִים֮ בּ/וֹ֒ וַ/יִּכָּתֵ֣ב כְּֽ/כָל אֲשֶׁר צִוָּ֣ה מָרְדֳּכַ֣י אֶל הַ/יְּהוּדִ֡ים וְ/אֶ֣ל הָ/אֲחַשְׁדַּרְפְּנִֽים וְ/הַ/פַּחוֹת֩ וְ/שָׂרֵ֨י הַ/מְּדִינ֜וֹת אֲשֶׁ֣ר מֵ/הֹ֣דּוּ וְ/עַד כּ֗וּשׁ שֶׁ֣בַע וְ/עֶשְׂרִ֤ים וּ/מֵאָה֙ מְדִינָ֔ה מְדִינָ֤ה וּ/מְדִינָה֙ כִּ/כְתָבָ֔/הּ וְ/עַ֥ם וָ/עָ֖ם כִּ/לְשֹׁנ֑/וֹ וְ/אֶ֨ל הַ/יְּהוּדִ֔ים כִּ/כְתָבָ֖/ם וְ/כִ/לְשׁוֹנָֽ/ם־־־־־־־׀־־׃
translation:
  text: Then the king’s scribes were summoned at that time, in the third month, that is, the month of Sivan, on its twenty-third day; and it was written exactly as Mordecai commanded, to the Jews and to the satraps, the governors, and the officials of the provinces from India to Cush, one hundred and twenty-seven provinces, to each province in its own script, to each people in its own language, and also to the Jews in their own script and their own language.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from India to Ethiopia.' The Hebrew reads 'from Hodu to Cush'; 'Cush' is retained in the main text to preserve the ancient geographical term more precisely.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the twenty-third day of it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקָּרְאוּ
  chosen: were summoned
  alternatives:
  - were called
  - they called
  lexicon: HALOT
  rationale: The Niphal wayyiqtol is passive/reflexive in sense here, referring to the king’s scribes being called into service. 'Were summoned' is natural modern English and preserves the official court setting better than the flatter 'were called.'
- source_word: סֹפְרֵי הַמֶּלֶךְ
  chosen: the king’s scribes
  alternatives:
  - royal scribes
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The king’s scribes' is slightly more formal and transparent to the Hebrew than 'royal scribes.'
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that moment
  - then
  lexicon: HALOT
  rationale: This temporal phrase is retained explicitly rather than absorbed entirely into 'Then,' since the Hebrew marks the timing. 'Then' is still reflected by the opening conjunction, while 'at that time' renders the phrase itself.
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי הוּא חֹדֶשׁ סִיוָן
  chosen: in the third month, that is, the month of Sivan
  alternatives:
  - in the third month, which is the month Sivan
  lexicon: HALOT
  rationale: The appositional clarification הוּא is naturally rendered 'that is.' 'Sivan' is transliterated as a month name.
- source_word: בִּשְׁלוֹשָׁה וְעֶשְׂרִים בּוֹ
  chosen: on the twenty-third day of it
  alternatives:
  - on the twenty-third day of the month
  - on the twenty-third of it
  lexicon: HALOT
  rationale: The Hebrew literally says 'on twenty-three in it,' referring back to the month. 'On the twenty-third day of it' preserves the anaphoric pronoun while remaining readable.
- source_word: וַיִּכָּתֵב
  chosen: it was written
  alternatives:
  - it was drafted
  - they wrote
  lexicon: HALOT
  rationale: The passive singular form is best represented by 'it was written,' referring to the edict/document. This avoids unnecessarily supplying an active subject.
- source_word: כְּכָל אֲשֶׁר צִוָּה מָרְדֳּכַי
  chosen: exactly as Mordecai commanded
  alternatives:
  - according to all that Mordecai commanded
  - just as Mordecai ordered
  lexicon: HALOT
  rationale: כְּכָל stresses full conformity. 'Exactly as' captures the comprehensiveness idiomatically without over-literal awkwardness.
- source_word: אֶל הַיְּהוּדִים
  chosen: to the Jews
  alternatives:
  - for the Jews
  lexicon: HALOT
  rationale: The preposition אֶל here marks the recipients of the written decree. 'To the Jews' is the most direct rendering.
- source_word: הָאֲחַשְׁדַּרְפְּנִים
  chosen: the satraps
  alternatives:
  - the chief satraps
  lexicon: HALOT
  rationale: This established Persian administrative term is best rendered by the conventional historical equivalent 'satraps.'
- source_word: הַפַּחוֹת
  chosen: the governors
  alternatives:
  - the prefects
  lexicon: HALOT
  rationale: In this administrative list, 'governors' is the clearest modern equivalent. 'Prefects' is possible but less familiar.
- source_word: שָׂרֵי הַמְּדִינוֹת
  chosen: the officials of the provinces
  alternatives:
  - the princes of the provinces
  - the leaders of the provinces
  lexicon: HALOT
  rationale: שָׂרִים can mean officials, princes, or leaders. In an imperial bureaucratic context, 'officials' best fits the administrative sense without implying royalty.
- source_word: מֵהֹדּוּ וְעַד כּוּשׁ
  chosen: from India to Cush
  alternatives:
  - from Hodu to Cush
  - from India to Ethiopia
  lexicon: HALOT
  rationale: הֹדּוּ conventionally refers to India. כּוּשׁ is more precisely 'Cush' than 'Ethiopia,' since the latter can import later geographical assumptions; the transliteration preserves the ancient referent more accurately.
- source_word: שֶׁבַע וְעֶשְׂרִים וּמֵאָה מְדִינָה
  chosen: one hundred and twenty-seven provinces
  alternatives:
  - a hundred twenty-seven provinces
  lexicon: HALOT
  rationale: This is the standard English rendering of the numeral phrase. 'One hundred and twenty-seven' is formal but natural in Bible style.
- source_word: מְדִינָה וּמְדִינָה כִּכְתָבָהּ
  chosen: to each province in its own script
  alternatives:
  - province by province in its own writing
  - to every province according to its script
  lexicon: HALOT
  rationale: The distributive repetition 'province and province' is idiomatically rendered 'to each province.' כְּתָב refers to written form/script here, not merely content.
- source_word: וְעַם וָעָם כִּלְשֹׁנוֹ
  chosen: to each people in its own language
  alternatives:
  - people by people in its own tongue
  lexicon: HALOT
  rationale: Again the distributive repetition is rendered idiomatically. 'Language' is clearer for modern readers than 'tongue,' while preserving the sense of לָשׁוֹן.
- source_word: וְאֶל הַיְּהוּדִים כִּכְתָבָם וְכִלְשׁוֹנָם
  chosen: and also to the Jews in their own script and their own language
  alternatives:
  - and to the Jews according to their script and according to their language
  lexicon: HALOT
  rationale: The final phrase singles out the Jews in parallel with the provinces and peoples. 'Also' brings out the additive force naturally in English. 'Script' and 'language' maintain the distinction between written form and spoken language.
