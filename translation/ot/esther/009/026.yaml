id: EST.9.26
reference: Esther 9:26
source:
  edition: WLC
  text: עַל כֵּ֡ן קָֽרְאוּ֩ לַ/יָּמִ֨ים הָ/אֵ֤לֶּה פוּרִים֙ עַל שֵׁ֣ם הַ/פּ֔וּר עַל
    כֵּ֕ן עַל כָּל דִּבְרֵ֖י הָ/אִגֶּ֣רֶת הַ/זֹּ֑את וּ/מָֽה רָא֣וּ עַל כָּ֔כָה וּ/מָ֥ה
    הִגִּ֖יעַ אֲלֵי/הֶֽם־־־־־־־׃
translation:
  text: Therefore they called these days Purim, after the name of Pur. Therefore,
    because of all the words of this letter, and what they had seen concerning this
    matter, and what had happened to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after Pur'; Hebrew literally 'after the name of Pur.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what had come upon them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  chosen: they called
  alternatives:
  - they named
  lexicon: HALOT
  rationale: Qal perfect 3cp of קרא in naming context; 'called' is idiomatic and close
    to the Hebrew, while 'named' is possible but slightly more interpretive.
- source_word: לַיָּמִים הָאֵלֶּה
  chosen: these days
  alternatives:
  - those days
  lexicon: HALOT
  rationale: Demonstrative with article points to the specific festival days under
    discussion; 'these days' matches the deictic force in context.
- source_word: פוּרִים
  chosen: Purim
  lexicon: HALOT
  rationale: Proper festival name derived from פּוּר; transliteration is appropriate
    for a named feast.
- source_word: עַל שֵׁם הַפּוּר
  chosen: after the name of Pur
  alternatives:
  - after Pur
  - from the word Pur
  lexicon: HALOT
  rationale: עַל שֵׁם is an idiom meaning 'after the name of'; retaining 'name' reflects
    the Hebrew expression and explains the etymological link to פּוּר.
- source_word: הַפּוּר
  chosen: Pur
  alternatives:
  - the lot
  lexicon: HALOT
  rationale: The immediate clause explains the feast name etymologically, so preserving
    the loanword 'Pur' is preferable here; its meaning as 'lot' has already been explained
    in the surrounding context.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: The phrase occurs twice in the verse. 'Therefore' preserves the causal-conclusive
    force and keeps the repetition visible in English.
- source_word: עַל כָּל דִּבְרֵי הָאִגֶּרֶת הַזֹּאת
  chosen: because of all the words of this letter
  alternatives:
  - on account of all that was written in this letter
  - concerning all the contents of this letter
  lexicon: HALOT
  rationale: דִּבְרֵי literally 'words/matters of'; 'words of this letter' is formally
    close, while 'because of' captures the causal use of עַל in this clause.
- source_word: וּמָה רָאוּ עַל כָּכָה
  chosen: and what they had seen concerning this matter
  alternatives:
  - and what they had seen in this regard
  - and what they experienced in relation to this
  lexicon: HALOT
  rationale: רָאוּ literally 'they saw,' but in Hebrew can include perceiving/observing.
    'Concerning this matter' renders עַל כָּכָה idiomatically without over-paraphrase.
- source_word: וּמָה הִגִּיעַ אֲלֵיהֶם
  chosen: and what had happened to them
  alternatives:
  - and what had come upon them
  - and what had reached them
  lexicon: HALOT
  rationale: הִגִּיעַ אֲלֵי often means 'befell, happened to, came upon.' 'Had happened
    to them' is natural English and fits the retrospective summary.
