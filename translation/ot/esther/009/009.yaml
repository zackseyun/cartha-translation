id: EST.9.9
reference: Esther 9:9
source:
  edition: WLC
  text: וְ/אֵ֤ת פַּרְמַ֨שְׁתָּא֙ וְ/אֵ֣ת אֲרִיסַ֔י וְ/אֵ֥ת אֲרִדַ֖י וְ/אֵ֥ת וַיְזָֽתָא׀׀׀׀׃
translation:
  text: Parmashtha, Arisai, Aridai, and Vaizatha,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''and'' with the object marker before each name: ''and Parmashtha,
      and Arisai, and Aridai, and Vaizatha.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְמַשְׁתָּא
  chosen: Parmashtha
  alternatives:
  - Parmashta
  rationale: Proper name in a list of Haman’s sons; per translation philosophy, personal
    names are transliterated rather than translated. 'Parmashtha' follows a standard
    English transliteration from the Hebrew form.
- source_word: אֲרִיסַי
  chosen: Arisai
  rationale: Proper name; transliterated directly from the Hebrew consonantal/vocalized
    form.
- source_word: אֲרִדַי
  chosen: Aridai
  rationale: Proper name; transliterated directly from the Hebrew form.
- source_word: וַיְזָתָא
  chosen: Vaizatha
  alternatives:
  - Vajezatha
  - Vayezatha
  rationale: Proper name; transliterated rather than translated. 'Vaizatha' reflects
    a conventional English representation of the Hebrew initial waw in this name.
- source_word: וְאֵת ... וְאֵת ... וְאֵת ... וְאֵת
  chosen: '[represented by English comma-separated list with final ''and'']'
  alternatives:
  - and Parmashtha and Arisai and Aridai and Vaizatha
  lexicon: HALOT
  rationale: The repeated object marker אֵת with conjunction waw introduces each item
    in the continuing list from the previous verse. English normally renders such
    catalogues with commas and a final 'and' rather than mechanically repeating 'and'
    before every name. This preserves the list function without unnatural English.
