id: EST.9.28
reference: Esther 9:28
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֣ים הָ֠/אֵלֶּה נִזְכָּרִ֨ים וְ/נַעֲשִׂ֜ים בְּ/כָל דּ֣וֹר וָ/ד֗וֹר
    מִשְׁפָּחָה֙ וּ/מִשְׁפָּחָ֔ה מְדִינָ֥ה וּ/מְדִינָ֖ה וְ/עִ֣יר וָ/עִ֑יר וִ/ימֵ֞י
    הַ/פּוּרִ֣ים הָ/אֵ֗לֶּה לֹ֤א יַֽעַבְרוּ֙ מִ/תּ֣וֹךְ הַ/יְּהוּדִ֔ים וְ/זִכְרָ֖/ם
    לֹא יָס֥וּף מִ/זַּרְעָֽ/ם־־׃ס
translation:
  text: And these days are remembered and observed in every generation, every family,
    every province, and every city; and these days of Purim shall not pass away from
    among the Jews, and their remembrance shall not cease from their offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are remembered and kept.' The Hebrew verb rendered 'observed' is literally
      'done/made' and refers to carrying out the festival in practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'from generation to generation, family by family, province by province,
      and city by city.' The Hebrew uses repeated singular nouns for distributive
      emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'their remembrance shall not cease from their descendants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִזְכָּרִים
  chosen: are remembered
  alternatives:
  - are commemorated
  - are called to mind
  lexicon: HALOT
  rationale: 'The Niphal of זכר here is passive/reflexive in sense: the days are kept
    in memory. ''Are remembered'' is the most direct and natural English rendering,
    while also allowing the following verb to carry the practical observance sense.'
- source_word: וְנַעֲשִׂים
  chosen: and observed
  alternatives:
  - and kept
  - and celebrated
  - and done
  lexicon: HALOT
  rationale: Although the verb is literally 'done/made,' in the context of festival
    days it refers to carrying them out in practice. 'Observed' captures ritual/social
    observance without over-specifying festivity.
- source_word: בְּכָל דּוֹר וָדוֹר
  chosen: in every generation
  alternatives:
  - throughout every generation
  - from generation to generation
  lexicon: HALOT
  rationale: The distributive pair means each successive generation. 'In every generation'
    is concise and idiomatic, while preserving the repeated scope of the Hebrew.
- source_word: מִשְׁפָּחָה וּמִשְׁפָּחָה
  chosen: every family
  alternatives:
  - family by family
  - each family
  lexicon: HALOT
  rationale: The repeated singular expresses distributive force. 'Every family' communicates
    that force in smooth English.
- source_word: מְדִינָה וּמְדִינָה
  chosen: every province
  alternatives:
  - province by province
  - every district
  lexicon: HALOT
  rationale: In Esther, מְדִינָה commonly refers to an administrative province of
    the empire. 'Province' fits the book's Persian imperial setting better than the
    broader 'district'.
- source_word: וְעִיר וָעִיר
  chosen: and every city
  alternatives:
  - city by city
  - and each city
  lexicon: HALOT
  rationale: Again distributive repetition is best represented by 'every city' in
    natural English.
- source_word: יְמֵי הַפּוּרִים
  chosen: days of Purim
  alternatives:
  - Purim days
  - days of the Purim
  lexicon: HALOT
  rationale: This preserves the construct relationship while using the established
    festival name 'Purim' as a transliterated proper name.
- source_word: לֹא יַעַבְרוּ מִתּוֹךְ הַיְּהוּדִים
  chosen: shall not pass away from among the Jews
  alternatives:
  - shall not cease among the Jews
  - shall not disappear from among the Jews
  lexicon: HALOT
  rationale: עבר with מן/מתוך here conveys passing away or disappearing from the community's
    practice. 'Shall not pass away from among the Jews' preserves the metaphor and
    solemn tone.
- source_word: וְזִכְרָם
  chosen: and their remembrance
  alternatives:
  - and their memory
  - and the memory of them
  lexicon: HALOT
  rationale: The suffix refers back to the days. 'Their remembrance' is slightly more
    formal than 'their memory' and fits the commemorative context.
- source_word: לֹא יָסוּף מִזַּרְעָם
  chosen: shall not cease from their offspring
  alternatives:
  - shall not come to an end among their descendants
  - shall not depart from their seed
  lexicon: HALOT
  rationale: יסוף means come to an end/cease. זֶרַע in this context refers to descendants
    rather than agricultural seed. 'Offspring' is natural and faithful, though 'descendants'
    is also possible.
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their descendants
  - their seed
  lexicon: HALOT
  rationale: The noun denotes posterity here. 'Offspring' is readable modern English;
    'seed' would be more formal but less natural in this context.
