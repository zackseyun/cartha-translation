id: EST.9.4
reference: Esther 9:4
source:
  edition: WLC
  text: כִּֽי גָ֤דוֹל מָרְדֳּכַי֙ בְּ/בֵ֣ית הַ/מֶּ֔לֶךְ וְ/שָׁמְע֖/וֹ הוֹלֵ֣ךְ בְּ/כָל
    הַ/מְּדִינ֑וֹת כִּֽי הָ/אִ֥ישׁ מָרְדֳּכַ֖י הוֹלֵ֥ךְ וְ/גָדֽוֹל־־־׃פ
translation:
  text: For Mordecai was great in the king’s house, and the report about him was spreading
    through all the provinces, for the man Mordecai was becoming greater and greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his fame was spreading through all the provinces.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the man Mordecai was going and growing great,' a Hebrew idiom
      for continual increase in prominence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason the Jews' fear fell on others
    in the surrounding context, so 'For' best preserves the explanatory force in natural
    English.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - important
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes prominence or high status. 'Great' preserves the
    broad sense without narrowing it only to political power.
- source_word: בְּבֵית הַמֶּלֶךְ
  chosen: in the king’s house
  alternatives:
  - in the royal palace
  - at the king’s court
  lexicon: HALOT
  rationale: Literally 'in the house of the king.' 'In the king’s house' keeps the
    Hebrew image while remaining clear; it can imply the royal court/palace setting
    without overinterpreting.
- source_word: שָׁמְעוֹ
  chosen: the report about him
  alternatives:
  - his fame
  - his reputation
  - the news of him
  lexicon: HALOT
  rationale: The noun from שמע can denote report, news, or fame. In context of influence
    spreading through the provinces, 'the report about him' captures both circulating
    news and growing renown without overstating celebrity.
- source_word: הוֹלֵךְ
  chosen: was spreading
  alternatives:
  - was going
  - kept going
  lexicon: HALOT
  rationale: With 'report' as subject, the participle expresses ongoing extension
    or movement. English idiom favors 'was spreading' over the more wooden 'was going.'
- source_word: בְּכָל הַמְּדִינוֹת
  chosen: through all the provinces
  alternatives:
  - in all the provinces
  - throughout all the provinces
  lexicon: HALOT
  rationale: '''Provinces'' is the standard rendering of מדינות in Esther''s Persian
    administrative context. ''Through all'' conveys the distributive spread of the
    report.'
- source_word: הָאִישׁ מָרְדֳּכַי
  chosen: the man Mordecai
  alternatives:
  - this man Mordecai
  - Mordecai himself
  lexicon: HALOT
  rationale: The Hebrew includes the article plus 'man' for emphasis. Retaining 'the
    man Mordecai' preserves the emphatic, somewhat formal style of the source.
- source_word: הוֹלֵךְ וְגָדוֹל
  chosen: was becoming greater and greater
  alternatives:
  - kept growing greater
  - went on and became great
  lexicon: HALOT
  rationale: This idiom combines the participle of הלך with a following adjective
    to express progressive increase. 'Was becoming greater and greater' communicates
    the iterative, intensifying sense naturally in English.
