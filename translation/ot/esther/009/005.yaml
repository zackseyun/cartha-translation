theological_decisions:
- issue: Rendering a violent wartime description without softening or exaggerating
    it
  chosen_reading: Retain the verse's stark description of lethal action in straightforward
    English
  alternative_readings:
  - Soften the violence with generalized language such as 'defeated'
  - Heighten it with more interpretive wording such as 'annihilated' throughout
  rationale: The Hebrew stacks terms for violent action ('blow of the sword,' 'slaughter,'
    'destruction'). Optimal equivalence requires preserving that severity while avoiding
    over-interpretation beyond the lexical data.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
