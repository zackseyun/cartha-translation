id: EST.9.18
reference: Esther 9:18
source:
  edition: WLC
  text: ו/ה/יהודיים אֲשֶׁר בְּ/שׁוּשָׁ֗ן נִקְהֲלוּ֙ בִּ/שְׁלֹשָׁ֤ה עָשָׂר֙ בּ֔/וֹ
    וּ/בְ/אַרְבָּעָ֥ה עָשָׂ֖ר בּ֑/וֹ וְ/נ֗וֹחַ בַּ/חֲמִשָּׁ֤ה עָשָׂר֙ בּ֔/וֹ וְ/עָשֹׂ֣ה
    אֹת֔/וֹ י֖וֹם מִשְׁתֶּ֥ה וְ/שִׂמְחָֽה־׃
translation:
  text: But the Jews who were in Susa assembled on the thirteenth day of it and on
    the fourteenth day of it, and rested on the fifteenth day of it, and made it a
    day of feasting and gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'on the thirteenth of it ... on the fourteenth of it ...
      on the fifteenth of it,' with 'it' referring to the month from context.
    reason: lexical_alternative
  - marker: b
    text: Or 'made it a day of banqueting and joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיְּהוּדִים
  chosen: But the Jews
  alternatives:
  - And the Jews
  - Now the Jews
  lexicon: HALOT
  rationale: The conjunction waw here marks contrast with the preceding description
    of Jews in the provinces (v. 17), so 'But' best brings out the discourse contrast
    in natural English. 'The Jews' straightforwardly renders the ethnonym.
- source_word: אֲשֶׁר בְּשׁוּשָׁן
  chosen: who were in Susa
  alternatives:
  - who were at Susa
  - who were in Shushan
  lexicon: HALOT
  rationale: Relative clause identifying the subset of Jews located in the capital.
    'Susa' is the standard English transliteration of שׁוּשָׁן; 'who were in' is smoother
    than a more wooden 'who in Susa'.
- source_word: נִקְהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - banded together
  lexicon: HALOT
  rationale: The Niphal of קהל here denotes gathering/assembling. 'Assembled' is concise
    and fits the repeated usage in the Esther context without overinterpreting motive.
- source_word: בִּשְׁלֹשָׁה עָשָׂר בּוֹ
  chosen: on the thirteenth day of it
  alternatives:
  - on the thirteenth day of the month
  - on the thirteenth
  lexicon: HALOT
  rationale: The Hebrew literally says 'on the thirteenth in it,' with the pronominal
    suffix referring back to the month understood from context. 'Day' is supplied
    for clear English. Retaining 'of it' reflects the suffix more closely than fully
    replacing it with 'of the month'.
- source_word: וּבְאַרְבָּעָה עָשָׂר בּוֹ
  chosen: and on the fourteenth day of it
  alternatives:
  - and on the fourteenth day of the month
  - and on the fourteenth
  lexicon: HALOT
  rationale: Same construction as the previous date phrase. The repeated full rendering
    preserves the Hebrew's deliberate sequence.
- source_word: וְנוֹחַ
  chosen: and rested
  alternatives:
  - and had rest
  - and were at rest
  lexicon: HALOT
  rationale: From נוח, indicating cessation/rest after conflict. 'Rested' is the most
    natural verbal rendering in sequence with the prior verbs.
- source_word: בַּחֲמִשָּׁה עָשָׂר בּוֹ
  chosen: on the fifteenth day of it
  alternatives:
  - on the fifteenth day of the month
  - on the fifteenth
  lexicon: HALOT
  rationale: Literal date expression parallel to the earlier phrases; 'day' is supplied
    for idiomatic English.
- source_word: וְעָשֹׂה אֹתוֹ
  chosen: and made it
  alternatives:
  - and observed it as
  - and appointed it as
  lexicon: HALOT
  rationale: עשה plus object pronoun here means they treated/designated that day in
    a certain way. 'Made it' is a close and natural rendering that preserves the Hebrew
    idiom without paraphrase.
- source_word: יוֹם מִשְׁתֶּה וְשִׂמְחָה
  chosen: a day of feasting and gladness
  alternatives:
  - a day of banqueting and rejoicing
  - a day of feasting and joy
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking; 'feasting' is
    idiomatic and broad enough. שִׂמְחָה is joy/gladness; 'gladness' preserves the
    celebratory tone and echoes Esther's festival language.
