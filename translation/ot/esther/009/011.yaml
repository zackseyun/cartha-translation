id: EST.9.11
reference: Esther 9:11
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא בָּ֣א מִסְפַּ֧ר הַֽ/הֲרוּגִ֛ים בְּ/שׁוּשַׁ֥ן הַ/בִּירָ֖ה
    לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃ס
translation:
  text: On that day the number of those killed in Susa the citadel came before the
    king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was brought before the king.' The Hebrew literally says 'came before
      the king,' with the report personified as coming into the royal presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - That same day
  - On that very day
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of the report. 'On that
    day' is the most natural modern English rendering and preserves the Hebrew deixis
    without unnecessary emphasis.
- source_word: בָּא
  chosen: came
  alternatives:
  - was brought
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא, literally 'came.' Although English might idiomatically
    say 'was reported' or 'was brought,' the Hebrew uses the simple active verb. 'Came'
    preserves the source wording while remaining understandable with the subject 'number.'
- source_word: מִסְפַּר
  chosen: the number
  alternatives:
  - the tally
  - the count
  lexicon: HALOT
  rationale: מִסְפַּר denotes a numerical total or count. 'The number' is the most
    direct and neutral rendering in narrative context.
- source_word: הַהֲרוּגִים
  chosen: of those killed
  alternatives:
  - of the slain
  - of the dead
  lexicon: HALOT
  rationale: Passive participial form from הרג, referring to people who had been killed.
    'Those killed' is clear modern English; 'the slain' is more traditional but less
    natural for the stated target style.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  chosen: in Susa the citadel
  alternatives:
  - in the citadel of Susa
  - in Susa the fortress
  lexicon: HALOT
  rationale: שׁוּשַׁן is the place name Susa. הַבִּירָה denotes the fortified royal
    complex/citadel. 'Susa the citadel' follows the Hebrew appositional structure
    and matches common usage in Esther.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - into the presence of the king
  - to the king
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' 'Before the
    king' preserves the formal court setting and the Hebrew idiom.
