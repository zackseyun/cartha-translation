id: EST.9.22
reference: Esther 9:22
source:
  edition: WLC
  text: כַּ/יָּמִ֗ים אֲשֶׁר נָ֨חוּ בָ/הֶ֤ם הַ/יְּהוּדִים֙ מֵ/א֣וֹיְבֵי/הֶ֔ם וְ/הַ/חֹ֗דֶשׁ
    אֲשֶׁר֩ נֶהְפַּ֨ךְ לָ/הֶ֤ם מִ/יָּגוֹן֙ לְ/שִׂמְחָ֔ה וּ/מֵ/אֵ֖בֶל לְ/י֣וֹם ט֑וֹב
    לַ/עֲשׂ֣וֹת אוֹתָ֗/ם יְמֵי֙ מִשְׁתֶּ֣ה וְ/שִׂמְחָ֔ה וּ/מִשְׁל֤וֹחַ מָנוֹת֙ אִ֣ישׁ
    לְ/רֵעֵ֔/הוּ וּ/מַתָּנ֖וֹת לָֽ/אֶבְיוֹנִֽים־׃
translation:
  text: as the days on which the Jews had rest from their enemies, and as the month
    that had been turned for them from sorrow to gladness and from mourning to a good
    day, to make them days of feasting and gladness, and of sending portions, each
    man to his neighbor, and gifts to the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each person to another.' The Hebrew reads literally 'a man to his neighbor,'
      a distributive expression for mutual giving.
    reason: lexical_alternative
  - marker: b
    text: Or 'to a festive day' or 'to a day of celebration.' Literally, 'to a good
      day.'
    reason: lexical_alternative
  - marker: c
    text: '''Sending portions'' likely refers to sending food portions as festival
      gifts.'
    reason: cultural_note
lexical_decisions:
- source_word: נָחוּ
  chosen: had rest
  alternatives:
  - rested
  - found relief
  lexicon: HALOT
  rationale: The verb from נוח denotes coming to rest or obtaining relief. 'Had rest'
    fits the past narrative context and idiomatic English while preserving the concrete
    sense of relief from enemies.
- source_word: מֵאֹיְבֵיהֶם
  chosen: from their enemies
  alternatives:
  - away from their enemies
  lexicon: HALOT
  rationale: 'The preposition מִן marks separation/source: the Jews experienced rest
    from the threat posed by their enemies. ''From their enemies'' is the natural
    and sufficiently literal rendering.'
- source_word: נֶהְפַּךְ
  chosen: had been turned
  alternatives:
  - was turned
  - was transformed
  - was changed
  lexicon: HALOT
  rationale: The Niphal of הפך conveys being turned/changed. 'Had been turned' reflects
    the completed reversal relative to the commemorative command and preserves the
    passive sense without overinterpreting.
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  lexicon: HALOT
  rationale: יָגוֹן denotes sorrow or grief. 'Sorrow' pairs well with 'gladness' and
    maintains the emotional contrast in clear modern English.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: HALOT
  rationale: Here the noun denotes festive joy. 'Gladness' preserves the lexical contrast
    with sorrow and avoids flattening both occurrences into the same English term
    where one can vary naturally.
- source_word: אֵבֶל
  chosen: mourning
  alternatives:
  - grief
  lexicon: HALOT
  rationale: אֵבֶל commonly refers to mourning, especially in a lamenting or bereavement
    context. 'Mourning' preserves the stronger, more public lament sense distinct
    from יָגוֹן.
- source_word: לְיוֹם טוֹב
  chosen: to a good day
  alternatives:
  - to a day of celebration
  - to a festive day
  lexicon: HALOT
  rationale: Formally the Hebrew says 'to a good day.' While idiomatic alternatives
    are possible, the phrase is understandable in English and preserves the source
    wording and the reversal motif. The festive nuance is then clarified by the following
    phrase about feasting and gladness.
- source_word: לַעֲשׂוֹת אוֹתָם
  chosen: to make them
  alternatives:
  - to observe them as
  - to appoint them as
  lexicon: HALOT
  rationale: The infinitive plus object literally means 'to make them.' In context
    it introduces the purpose/result of the commemoration. 'To make them' is sufficiently
    literal and clear.
- source_word: יְמֵי מִשְׁתֶּה
  chosen: days of feasting
  alternatives:
  - days of banqueting
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking. 'Feasting' is
    natural modern English and captures the celebratory observance without overemphasizing
    alcohol.
- source_word: וּמִשְׁלוֹחַ מָנוֹת
  chosen: and of sending portions
  alternatives:
  - and of sending food portions
  - and of sending gifts of food
  lexicon: HALOT
  rationale: The phrase refers to sending portions, likely food portions, as part
    of festival practice. 'Sending portions' stays close to the Hebrew while remaining
    intelligible; the more specific food sense is plausible but not required in the
    main text.
- source_word: אִישׁ לְרֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - each person to another
  - one man to another
  lexicon: HALOT
  rationale: Following the gender-accurate principle, אִישׁ is rendered 'man' here.
    In this distributive idiom it means each individual to his fellow/neighbor. 'Neighbor'
    is a natural rendering of רֵעַ in this social context.
- source_word: מַתָּנוֹת לָאֶבְיוֹנִים
  chosen: and gifts to the poor
  alternatives:
  - and presents to the needy
  lexicon: HALOT
  rationale: אֶבְיוֹנִים denotes poor/needy persons. 'The poor' is concise, idiomatic,
    and preserves the social-ethical emphasis of the verse.
