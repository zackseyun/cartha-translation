theological_decisions:
- issue: Gendered distributive expression אִישׁ לְרֵעֵהוּ
  chosen_reading: each man to his neighbor
  alternative_readings:
  - each person to another
  rationale: Per the translation philosophy's gender-accurate principle, the masculine
    singular distributive expression is retained with 'man' rather than neutralized.
    In context it functions representatively, but the source wording is masculine
    and does not require a gender-neutral main text rendering.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
