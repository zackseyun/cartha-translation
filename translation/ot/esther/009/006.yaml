id: EST.9.6
reference: Esther 9:6
source:
  edition: WLC
  text: וּ/בְ/שׁוּשַׁ֣ן הַ/בִּירָ֗ה הָרְג֤וּ הַ/יְּהוּדִים֙ וְ/אַבֵּ֔ד חֲמֵ֥שׁ מֵא֖וֹת
    אִֽישׁ׃
translation:
  text: And in Susa the citadel, the Jews killed and destroyed five hundred men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fortress.' The Hebrew term can denote a fortified palace complex
      or citadel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/שׁוּשַׁן
  chosen: And in Susa
  alternatives:
  - Now in Susa
  - In Susa
  lexicon: HALOT
  rationale: The conjunction with preposition is rendered naturally as 'And in' to
    connect with the preceding narrative while preserving the locative sense. 'Susa'
    is the standard English transliteration of the place name.
- source_word: הַ/בִּירָה
  chosen: the citadel
  alternatives:
  - the fortress
  - the palace
  lexicon: HALOT
  rationale: בִּירָה refers to the fortified acropolis/citadel area of the capital.
    'Citadel' best captures the architectural and administrative sense without narrowing
    it to a royal residence alone.
- source_word: הָרְגוּ
  chosen: killed
  alternatives:
  - slew
  lexicon: HALOT
  rationale: The qatal verb from הרג is straightforwardly 'killed.' 'Slew' is accurate
    but archaic; 'killed' fits readable modern English.
- source_word: הַ/יְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther, the ethnoreligious people group is conventionally and contextually
    best rendered 'the Jews.' 'Judeans' is possible in some contexts but here would
    sound overly geographic and less natural.
- source_word: וְ/אַבֵּד
  chosen: and destroyed
  alternatives:
  - and annihilated
  - and caused to perish
  lexicon: HALOT
  rationale: The verb אבד in the piel conveys causing destruction/perishing. Rendering
    it separately from 'killed' preserves the Hebrew's two-verb expression rather
    than collapsing it into a single English verb. 'Destroyed' is idiomatic and strong
    without overtranslation.
- source_word: חֲמֵשׁ מֵא֖וֹת אִישׁ
  chosen: five hundred men
  alternatives:
  - five hundred people
  lexicon: HALOT
  rationale: The Hebrew literally reads 'five hundred man/men,' an idiomatic count
    expression. Per the gender-accurate policy, 'men' is retained rather than neutralizing
    to 'people,' since אִישׁ here is the counted noun in a masculine form.
