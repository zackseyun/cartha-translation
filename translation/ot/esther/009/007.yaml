id: EST.9.7
reference: Esther 9:7
source:
  edition: WLC
  text: וְ/אֵ֧ת פַּרְשַׁנְדָּ֛תָא וְ/אֵ֥ת דַּֽלְפ֖וֹן וְ/אֵ֥ת אַסְפָּֽתָא׀׀׀׃
translation:
  text: Parshandatha, Dalphon, and Aspatha,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: These are the first three names in the list of Haman's sons, continued from
      the previous verse's statement that the Jews killed them.
    reason: cross_reference
lexical_decisions:
- source_word: וְאֵת
  chosen: '[not separately translated; represented by simple coordination/punctuation
    in the list]'
  alternatives:
  - and
  - also
  lexicon: HALOT
  rationale: The particle אֵת marks the definite direct object, and with repeated
    וְאֵת before each name it structures a list of objects continuing from the previous
    verse's verb ('they killed'). English does not normally render the object marker
    explicitly, so the sense is best conveyed by listing the names with commas and
    a final 'and.'
- source_word: פַּרְשַׁנְדָּתָא
  chosen: Parshandatha
  alternatives:
  - Parshandata
  lexicon: HALOT
  rationale: This is a proper personal name, likely of Persian origin. Per translation
    philosophy, personal names are transliterated rather than translated. 'Parshandatha'
    follows a standard English transliteration reflecting the Hebrew consonants and
    final aleph-vowel ending.
- source_word: דַּלְפוֹן
  chosen: Dalphon
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly into English in keeping
    with the policy to transliterate names.
- source_word: אַסְפָּתָא
  chosen: Aspatha
  alternatives:
  - Aspata
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Aspatha'
    preserves the Hebrew form in a standard English-friendly transliteration.
