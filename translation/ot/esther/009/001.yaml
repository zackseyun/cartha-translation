id: EST.9.1
reference: Esther 9:1
source:
  edition: WLC
  text: וּ/בִ/שְׁנֵים֩ עָשָׂ֨ר חֹ֜דֶשׁ הוּא חֹ֣דֶשׁ אֲדָ֗ר בִּ/שְׁלוֹשָׁ֨ה עָשָׂ֥ר
    יוֹם֙ בּ֔/וֹ אֲשֶׁ֨ר הִגִּ֧יעַ דְּבַר הַ/מֶּ֛לֶךְ וְ/דָת֖/וֹ לְ/הֵעָשׂ֑וֹת בַּ/יּ֗וֹם
    אֲשֶׁ֨ר שִׂבְּר֜וּ אֹיְבֵ֤י הַ/יְּהוּדִים֙ לִ/שְׁל֣וֹט בָּ/הֶ֔ם וְ/נַהֲפ֣וֹךְ
    ה֔וּא אֲשֶׁ֨ר יִשְׁלְט֧וּ הַ/יְּהוּדִ֛ים הֵ֖מָּה בְּ/שֹׂנְאֵי/הֶֽם־־׃
translation:
  text: 'Now in the twelfth month, that is, the month Adar, on the thirteenth day
    of it, when the king’s word and his decree were to be carried out, on the day
    when the enemies of the Jews had hoped to rule over them, the opposite happened:
    the Jews themselves ruled over those who hated them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it was reversed' or 'it was turned about' for 'the opposite happened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנֵים עָשָׂר חֹדֶשׁ
  chosen: Now in the twelfth month
  alternatives:
  - And in the twelfth month
  - In the twelfth month
  lexicon: HALOT
  rationale: Temporal opening with prefixed conjunction ו plus ב. 'Now' captures the
    narrative transition smoothly in modern English while preserving the temporal
    sense.
- source_word: הוּא חֹדֶשׁ אֲדָר
  chosen: that is, the month Adar
  alternatives:
  - which is the month Adar
  - it was the month Adar
  lexicon: HALOT
  rationale: Appositional clarification identifying the twelfth month. 'That is' naturally
    renders the explanatory הוּא construction.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר יוֹם בּוֹ
  chosen: on the thirteenth day of it
  alternatives:
  - on its thirteenth day
  - on the thirteenth day
  lexicon: HALOT
  rationale: Retains the explicit pronominal suffix 'of it,' referring back to the
    month, while remaining idiomatic English.
- source_word: אֲשֶׁר הִגִּיעַ דְּבַר הַמֶּלֶךְ וְדָתוֹ לְהֵעָשׂוֹת
  chosen: when the king’s word and his decree were to be carried out
  alternatives:
  - when the king's command and his law arrived to be done
  - when the king's word and his edict came to be executed
  lexicon: HALOT
  rationale: הִגִּיעַ literally 'reached/arrived' here marks the appointed time for
    implementation. 'Were to be carried out' expresses the infinitive לְהֵעָשׂוֹת
    in context. דָּבָר is rendered 'word' and דָּת 'decree' to preserve the distinction
    between the king's spoken/written directive and its formal legal status.
- source_word: בַּיּוֹם אֲשֶׁר
  chosen: on the day when
  alternatives:
  - on the day that
  - on the very day when
  lexicon: HALOT
  rationale: Straightforward temporal linkage preserving the repeated day emphasis.
- source_word: שִׂבְּרוּ
  chosen: had hoped
  alternatives:
  - expected
  - thought
  lexicon: HALOT
  rationale: The verb conveys expectation or hope. 'Had hoped' fits the enemies' anticipated
    success and the narrative irony that follows.
- source_word: אֹיְבֵי הַיְּהוּדִים
  chosen: the enemies of the Jews
  alternatives:
  - the Jews' enemies
  lexicon: HALOT
  rationale: Genitive construction rendered transparently and clearly.
- source_word: לִשְׁלֹט בָּהֶם
  chosen: to rule over them
  alternatives:
  - to dominate them
  - to gain mastery over them
  lexicon: HALOT
  rationale: שׁלט commonly denotes exercising dominion or rule. 'Rule over' is the
    most direct and contextually suitable rendering.
- source_word: וְנַהֲפוֹךְ הוּא
  chosen: the opposite happened
  alternatives:
  - it was turned around
  - it was reversed
  lexicon: HALOT
  rationale: Idiomatic expression indicating reversal. 'The opposite happened' communicates
    the dramatic narrative turn in natural English; 'reversed' is possible but less
    vivid here.
- source_word: אֲשֶׁר יִשְׁלְטוּ הַיְּהוּדִים הֵמָּה
  chosen: the Jews themselves ruled
  alternatives:
  - the Jews ruled
  - the Jews gained mastery
  lexicon: HALOT
  rationale: הֵמָּה adds emphasis; 'themselves' preserves that emphatic contrast with
    the enemies' expectation.
- source_word: בְּשֹׂנְאֵיהֶם
  chosen: over those who hated them
  alternatives:
  - over their haters
  - over their enemies
  lexicon: HALOT
  rationale: The participle 'those who hated them' preserves the verbal force of שֹׂנְאֵי
    rather than flattening it to a simple noun. 'Over' is supplied from the governing
    sense of שׁלט in the previous clause and carried into English for clarity.
