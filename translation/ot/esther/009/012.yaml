id: EST.9.12
reference: Esther 9:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ לְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֗ה בְּ/שׁוּשַׁ֣ן הַ/בִּירָ֡ה
    הָרְגוּ֩ הַ/יְּהוּדִ֨ים וְ/אַבֵּ֜ד חֲמֵ֧שׁ מֵא֣וֹת אִ֗ישׁ וְ/אֵת֙ עֲשֶׂ֣רֶת בְּנֵֽי
    הָמָ֔ן בִּ/שְׁאָ֛ר מְדִינ֥וֹת הַ/מֶּ֖לֶךְ מֶ֣ה עָשׂ֑וּ וּ/מַה שְּׁאֵֽלָתֵ/ךְ֙
    וְ/יִנָּ֣תֵֽן לָ֔/ךְ וּ/מַה בַּקָּשָׁתֵ֥/ךְ ע֖וֹד וְ/תֵעָֽשׂ־־־׃
translation:
  text: Then the king said to Esther the queen, “In Susa the citadel the Jews have
    killed and destroyed five hundred men, along with the ten sons of Haman. What
    then have they done in the rest of the king’s provinces? Now what is your petition?
    It will be granted to you. And what is your further request? It will be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What have they done in the rest of the king’s provinces?' The Hebrew
      question may be read more simply; 'then' in the main text brings out the king’s
      inference from the report in Susa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּשַׁן הַבִּירָה
  chosen: In Susa the citadel
  alternatives:
  - In the citadel of Susa
  - In Susa the fortress
  lexicon: HALOT
  rationale: בִּירָה denotes a fortified royal complex or citadel. 'Citadel' is natural
    modern English and preserves the sense better than the vaguer 'palace' or the
    less idiomatic 'fortress' here.
- source_word: הָרְגוּ ... וְאַבֵּד
  chosen: have killed and destroyed
  alternatives:
  - have killed and annihilated
  - killed ... and wiped out
  lexicon: HALOT
  rationale: The paired verbs intensify the report. Rendering both preserves the Hebrew's
    cumulative force. 'Destroyed' is broad enough to reflect אבד in this hostile context
    without over-paraphrasing.
- source_word: חֲמֵשׁ מֵאוֹת אִישׁ
  chosen: five hundred men
  alternatives:
  - five hundred people
  - five hundred persons
  lexicon: HALOT
  rationale: אִישׁ is singular used distributively after the number. 'Men' is the
    most direct gender-accurate rendering and fits the likely combatant context; this
    follows the stated preference for gender-accurate translation over flattening
    to neutral terms.
- source_word: וְאֵת עֲשֶׂרֶת בְּנֵי הָמָן
  chosen: along with the ten sons of Haman
  alternatives:
  - and the ten sons of Haman
  lexicon: HALOT
  rationale: אֵת marks the additional direct object. 'Along with' makes the additive
    force clear in smooth English while preserving the coordination.
- source_word: בִּשְׁאָר מְדִינוֹת הַמֶּלֶךְ
  chosen: in the rest of the king’s provinces
  alternatives:
  - in the other provinces of the king
  - throughout the remainder of the king’s provinces
  lexicon: HALOT
  rationale: מְדִינוֹת is best rendered 'provinces' in the Persian imperial setting.
    שְׁאָר means 'rest/remainder,' so 'the rest of the king’s provinces' is both accurate
    and idiomatic.
- source_word: מֶה עָשׂוּ
  chosen: What then have they done
  alternatives:
  - What have they done
  - What must they have done
  lexicon: HALOT
  rationale: The question is rhetorical/inferential in light of the events in Susa.
    Adding 'then' brings out the implied inference without adding content not warranted
    by the context.
- source_word: שְּׁאֵלָתֵךְ
  chosen: your petition
  alternatives:
  - your request
  - your question
  lexicon: HALOT
  rationale: In Esther, שאלה often refers to a formal request made to the king. 'Petition'
    preserves the courtly register and distinguishes it from the following near-synonym.
- source_word: וְיִנָּתֵן לָךְ
  chosen: It will be granted to you
  alternatives:
  - it will be given to you
  lexicon: HALOT
  rationale: The passive of נתן here idiomatically means a request will be granted.
    'Granted' is the natural English equivalent in this royal-request context.
- source_word: בַּקָּשָׁתֵךְ
  chosen: your further request
  alternatives:
  - your desire
  - your request
  lexicon: HALOT
  rationale: בַּקָּשָׁה overlaps with שאלה but is not identical; adding 'further'
    reflects the following עוֹד and helps preserve the progression of the king's offer.
- source_word: עוֹד
  chosen: further
  alternatives:
  - still
  - again
  - yet
  lexicon: HALOT
  rationale: עוֹד modifies the second request as an additional matter. 'Further' is
    concise and idiomatic in English.
- source_word: וְתֵעָשׂ
  chosen: It will be done
  alternatives:
  - it shall be done
  - it will be carried out
  lexicon: HALOT
  rationale: The passive-like sense in context is that Esther's request will be carried
    out. 'It will be done' is a close and readable rendering.
