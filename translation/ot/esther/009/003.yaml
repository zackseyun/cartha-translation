id: EST.9.3
reference: Esther 9:3
source:
  edition: WLC
  text: וְ/כָל שָׂרֵ֨י הַ/מְּדִינ֜וֹת וְ/הָ/אֲחַשְׁדַּרְפְּנִ֣ים וְ/הַ/פַּח֗וֹת וְ/עֹשֵׂ֤י
    הַ/מְּלָאכָה֙ אֲשֶׁ֣ר לַ/מֶּ֔לֶךְ מְנַשְּׂאִ֖ים אֶת הַ/יְּהוּדִ֑ים כִּֽי נָפַ֥ל
    פַּֽחַד מָרְדֳּכַ֖י עֲלֵי/הֶֽם־־־־׃
translation:
  text: And all the officials of the provinces, the satraps, the governors, and those
    doing the king’s work were supporting the Jews, because the fear of Mordecai had
    fallen on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were helping the Jews'; the Hebrew verb can also carry the sense 'were
      lifting up' or 'favoring' them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמְּדִינוֹת
  chosen: officials of the provinces
  alternatives:
  - princes of the provinces
  - leaders of the provinces
  lexicon: HALOT
  rationale: שָׂרִים denotes officials/rulers; 'officials' is natural modern English
    and fits the administrative list that follows.
- source_word: אֲחַשְׁדַּרְפְּנִים
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: A Persian administrative loanword conventionally rendered 'satraps';
    this preserves the historical setting more precisely than a generalized title.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - prefects
  lexicon: HALOT
  rationale: A regional administrative title distinct from satraps; 'governors' is
    the clearest standard English equivalent.
- source_word: עֹשֵׂי הַמְּלָאכָה אֲשֶׁר לַמֶּלֶךְ
  chosen: those doing the king’s work
  alternatives:
  - those who handled the king's business
  - the royal administrators
  lexicon: HALOT
  rationale: Literally 'doers of the work that belonged to the king.' The chosen rendering
    stays close to the Hebrew while remaining readable. It likely refers broadly to
    royal functionaries.
- source_word: מְנַשְּׂאִים אֶת־הַיְּהוּדִים
  chosen: were supporting the Jews
  alternatives:
  - were helping the Jews
  - were exalting the Jews
  - were lifting up the Jews
  lexicon: HALOT
  rationale: The Hiphil of נָשָׂא can mean 'lift, carry, support.' In this context
    of officials favoring the Jews in conflict, 'supporting' best captures practical
    assistance without overstating social exaltation.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the officials' support; 'because' is clearer
    in contemporary English than 'for.'
- source_word: נָפַל פַּחַד מָרְדֳּכַי עֲלֵיהֶם
  chosen: the fear of Mordecai had fallen on them
  alternatives:
  - dread of Mordecai had fallen on them
  - fear of Mordecai had come upon them
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for fear coming upon people. 'Had fallen
    on them' preserves the vivid metaphor and the perfect verb's completed sense in
    context.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
