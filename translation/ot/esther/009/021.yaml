id: EST.9.21
reference: Esther 9:21
source:
  edition: WLC
  text: לְ/קַיֵּם֮ עֲלֵי/הֶם֒ לִ/הְי֣וֹת עֹשִׂ֗ים אֵ֠ת י֣וֹם אַרְבָּעָ֤ה עָשָׂר֙ לְ/חֹ֣דֶשׁ
    אֲדָ֔ר וְ/אֵ֛ת יוֹם חֲמִשָּׁ֥ה עָשָׂ֖ר בּ֑/וֹ בְּ/כָל שָׁנָ֖ה וְ/שָׁנָֽה־־׃
translation:
  text: to establish among them that they should observe the fourteenth day of the
    month Adar, and the fifteenth day of it, every year and year,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'year by year' or 'every year.' The Hebrew repeats
      'year' for distributive emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקַיֵּם
  chosen: to establish
  alternatives:
  - to confirm
  - to institute
  lexicon: HALOT
  rationale: The infinitive of קום in the Piel here carries the sense of establishing
    or confirming an obligation/custom. 'Establish' fits the legal-administrative
    context of Mordecai's letter and works naturally with 'among them.'
- source_word: עֲלֵיהֶם
  chosen: among them
  alternatives:
  - upon them
  - for them
  lexicon: HALOT
  rationale: Literally 'upon them,' but in this context of imposing or establishing
    an observance for the Jewish community, 'among them' communicates the communal
    force in idiomatic English without losing the sense of obligation.
- source_word: לִהְיוֹת עֹשִׂים
  chosen: that they should observe
  alternatives:
  - to be doing
  - to keep
  lexicon: HALOT
  rationale: Literally 'to be doing,' but with festival days as the object, English
    idiom prefers 'observe' or 'keep.' 'Observe' preserves the sense of carrying out
    an annual commemorative practice.
- source_word: אֵת יוֹם אַרְבָּעָה עָשָׂר
  chosen: the fourteenth day
  alternatives:
  - day fourteen
  - the fourteenth
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew date expression.
- source_word: לְחֹדֶשׁ אֲדָר
  chosen: of the month Adar
  alternatives:
  - in the month Adar
  lexicon: HALOT
  rationale: The construct-like dating formula is most naturally rendered 'of the
    month Adar' in English, preserving the formal calendrical style.
- source_word: וְאֵת יוֹם חֲמִשָּׁה עָשָׂר בּוֹ
  chosen: and the fifteenth day of it
  alternatives:
  - and the fifteenth day of the same month
  - and the fifteenth day in it
  lexicon: HALOT
  rationale: בּוֹ refers back to the month just named. 'Of it' is concise and faithful,
    though somewhat formal; it preserves the anaphoric reference without repeating
    'month' unnecessarily.
- source_word: בְּכָל שָׁנָה וְשָׁנָה
  chosen: every year and year
  alternatives:
  - year by year
  - every single year
  - every year
  lexicon: HALOT
  rationale: The Hebrew distributive expression emphasizes annual repetition. A more
    idiomatic English rendering would be 'year by year' or 'every year'; however,
    'every year and year' preserves the repetitive force more transparently. The idiomatic
    alternative is preserved in a footnote.
