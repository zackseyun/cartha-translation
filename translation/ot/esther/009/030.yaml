id: EST.9.30
reference: Esther 9:30
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח סְפָרִ֜ים אֶל כָּל הַ/יְּהוּדִ֗ים אֶל שֶׁ֨בַע וְ/עֶשְׂרִ֤ים
    וּ/מֵאָה֙ מְדִינָ֔ה מַלְכ֖וּת אֲחַשְׁוֵר֑וֹשׁ דִּבְרֵ֥י שָׁל֖וֹם וֶ/אֱמֶֽת־־־׃
translation:
  text: And he sent letters to all the Jews in the one hundred twenty-seven provinces
    of the kingdom of Ahasuerus, words of peace and truth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a message of peace and truth.' The Hebrew literally reads 'words of
      peace and truth.'
    reason: lexical_alternative
  - marker: b
    text: '''Truth'' may also be understood as ''faithfulness'' or ''reliability''
      in this context.'
    reason: lexical_alternative
  - marker: c
    text: Ahasuerus is the Hebrew form of the royal name; some identify him historically
      with Xerxes I.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And he sent
  alternatives:
  - Then he sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline; 'And he sent' preserves
    the Hebrew narrative sequence without overinterpreting temporal nuance.
- source_word: סְפָרִים
  chosen: letters
  alternatives:
  - documents
  - written messages
  lexicon: HALOT
  rationale: In this Persian administrative context, the plural refers to written
    communications dispatched through the empire; 'letters' is the most natural and
    contextually precise English rendering.
- source_word: אֶל כָּל הַיְּהוּדִים
  chosen: to all the Jews
  alternatives:
  - to every Jew
  lexicon: HALOT
  rationale: The phrase is collective and distributive across the empire. 'All the
    Jews' is the standard and accurate rendering.
- source_word: אֶל שֶׁבַע וְעֶשְׂרִים וּמֵאָה מְדִינָה
  chosen: in the one hundred twenty-seven provinces
  alternatives:
  - to the one hundred twenty-seven provinces
  lexicon: HALOT
  rationale: The second אֶל introduces the geographic extent of the recipients. In
    idiomatic English, 'in the one hundred twenty-seven provinces' best conveys that
    the Jews were located throughout those provinces, not that the letters were addressed
    to provinces as such.
- source_word: מְדִינָה
  chosen: provinces
  alternatives:
  - districts
  - satrapies
  lexicon: HALOT
  rationale: In Esther, מְדִינָה refers to administrative regions within the Persian
    Empire. 'Provinces' is the conventional and clearest English equivalent.
- source_word: מַלְכוּת אֲחַשְׁוֵרוֹשׁ
  chosen: of the kingdom of Ahasuerus
  alternatives:
  - of King Ahasuerus's kingdom
  - of the realm of Ahasuerus
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'the kingdom of Ahasuerus.'
    This preserves the formal imperial setting without adding 'King,' which is not
    explicit here.
- source_word: אֲחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  alternatives:
  - Xerxes
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than replaced with historical identifications. 'Ahasuerus' reflects the Hebrew
    form.
- source_word: דִּבְרֵי שָׁלוֹם וֶאֱמֶת
  chosen: words of peace and truth
  alternatives:
  - a message of peace and truth
  - words of peace and faithfulness
  lexicon: HALOT
  rationale: The construct phrase is literally 'words of peace and truth.' Retaining
    'words' preserves the Hebrew expression and its formal tone. שָׁלוֹם here denotes
    peace/well-being, and אֱמֶת most naturally means truth/reliability. 'Truth' is
    preferred as the more direct lexical equivalent, while 'faithfulness' remains
    a viable nuance.
