id: EST.9.32
reference: Esther 9:32
source:
  edition: WLC
  text: וּ/מַאֲמַ֣ר אֶסְתֵּ֔ר קִיַּ֕ם דִּבְרֵ֥י הַ/פֻּרִ֖ים הָ/אֵ֑לֶּה וְ/נִכְתָּ֖ב
    בַּ/סֵּֽפֶר׃פ
translation:
  text: And Esther’s command confirmed these matters of Purim, and it was written
    in the book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words of these Purim observances.' Hebrew 'words' can also mean
      'matters' or 'affairs' in administrative contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it was recorded in the book.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲמַר
  chosen: command
  alternatives:
  - word
  - decree
  - order
  lexicon: HALOT
  rationale: In context, the noun refers not to a mere spoken word but to Esther’s
    authoritative directive establishing the observance. 'Command' best captures the
    performative and official force in readable English.
- source_word: אֶסְתֵּר
  chosen: Esther
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: קִיַּם
  chosen: confirmed
  alternatives:
  - established
  - upheld
  lexicon: HALOT
  rationale: The verb conveys causing something to stand or be established. 'Confirmed'
    fits the legal/administrative context of ratifying the Purim observance and reads
    naturally with the subject 'Esther’s command.'
- source_word: דִּבְרֵי
  chosen: these matters
  alternatives:
  - the words
  - the affairs
  - the regulations
  lexicon: HALOT
  rationale: Although literally 'words of,' Hebrew דִּבְרֵי often extends to 'matters'
    or 'affairs.' Here it refers to the content or provisions concerning Purim rather
    than merely verbal utterances. 'These matters' also works smoothly with the following
    demonstrative.
- source_word: הַפֻּרִים
  chosen: Purim
  rationale: Proper festival name is best retained as 'Purim.'
- source_word: הָאֵלֶּה
  chosen: these
  rationale: Demonstrative retained to reflect the Hebrew specification of the Purim
    matters just mentioned.
- source_word: וְנִכְתָּב
  chosen: and it was written
  alternatives:
  - and it was recorded
  - and it was inscribed
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as passive. 'Written' is the most
    direct equivalent; 'recorded' is possible but slightly more interpretive.
- source_word: בַּסֵּפֶר
  chosen: in the book
  alternatives:
  - in the scroll
  - in the record
  lexicon: HALOT
  rationale: סֵפֶר can denote a book, scroll, or written record. 'The book' is the
    most straightforward formal rendering; the specific identity of the book is not
    stated in the verse itself, so the translation should not over-specify.
