id: EST.9.15
reference: Esther 9:15
source:
  edition: WLC
  text: וַ/יִּֽקָּהֲל֞וּ ה/יהודיים אֲשֶׁר בְּ/שׁוּשָׁ֗ן גַּ֠ם בְּ/י֣וֹם אַרְבָּעָ֤ה
    עָשָׂר֙ לְ/חֹ֣דֶשׁ אֲדָ֔ר וַ/יַּֽהַרְג֣וּ בְ/שׁוּשָׁ֔ן שְׁלֹ֥שׁ מֵא֖וֹת אִ֑ישׁ
    וּ/בַ֨/בִּזָּ֔ה לֹ֥א שָׁלְח֖וּ אֶת יָדָֽ/ם־־׃
translation:
  text: The Jews who were in Susa also assembled on the fourteenth day of the month
    of Adar, and they killed three hundred men in Susa; but they did not lay a hand
    on the plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'they did not stretch out their hand to the plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered themselves together
  - were assembled
  lexicon: HALOT
  rationale: From קהל in the Niphal-like/waw-consecutive form, indicating coming together
    as a group. 'Assembled' is natural English and preserves the collective, purposeful
    sense without over-paraphrasing.
- source_word: הַיְּהוּדִים
  chosen: The Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther, יְהוּדִים refers to the Jewish people as an ethnic-religious
    group in the Persian diaspora. 'The Jews' is the standard and clearest rendering
    in this context; 'Judeans' would overemphasize geographic origin.
- source_word: אֲשֶׁר בְּשׁוּשָׁן
  chosen: who were in Susa
  alternatives:
  - who were at Susa
  - who were in Shushan
  lexicon: HALOT
  rationale: The relative clause identifies the subset of Jews located in the capital
    city. 'Who were in Susa' is idiomatic and precise. 'Susa' follows standard English
    transliteration.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - as well
  lexicon: HALOT
  rationale: גַּם adds that this action occurred in addition to the previous day's
    events. 'Also' best captures the additive force in straightforward English.
- source_word: בְּיוֹם אַרְבָּעָה עָשָׂר לְחֹדֶשׁ אֲדָר
  chosen: on the fourteenth day of the month of Adar
  alternatives:
  - on the fourteenth day of Adar
  lexicon: HALOT
  rationale: A formally complete date expression. Retaining 'the month of' reflects
    the Hebrew structure and keeps the calendrical wording clear.
- source_word: וַיַּהַרְגוּ
  chosen: they killed
  alternatives:
  - they struck down
  - they slew
  lexicon: HALOT
  rationale: הרג is the ordinary verb for killing. 'Killed' is the most direct modern
    English equivalent; 'struck down' can sound euphemistic, and 'slew' is archaic.
- source_word: שְׁלֹשׁ מֵאוֹת אִישׁ
  chosen: three hundred men
  alternatives:
  - three hundred people
  - three hundred persons
  lexicon: HALOT
  rationale: אִישׁ here functions distributively after the number and is best rendered
    'men,' matching the masculine singular noun used in Hebrew. This follows the project's
    gender-accurate principle rather than flattening to a neutral term.
- source_word: וּבַבִּזָּה
  chosen: but on the plunder
  alternatives:
  - but on the spoil
  - and on the plunder
  lexicon: HALOT
  rationale: בִּזָּה means spoil/plunder taken in war or conflict. In English, 'plunder'
    is more readable than 'spoil' while preserving the sense of seized goods. The
    prefixed conjunction is rendered adversatively in context because the clause contrasts
    killing with refraining from taking goods.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  chosen: they did not lay a hand
  alternatives:
  - they did not stretch out their hand
  - they did not put forth their hand
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'did not send/stretch out their hand.'
    In English, 'did not lay a hand on' is a natural idiomatic equivalent when referring
    to taking possession of goods, preserving the sense without wooden literalism.
