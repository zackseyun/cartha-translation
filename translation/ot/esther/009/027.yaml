id: EST.9.27
reference: Esther 9:27
source:
  edition: WLC
  text: קִיְּמ֣וּ ו/קבל הַ/יְּהוּדִים֩ עֲלֵי/הֶ֨ם וְ/עַל זַרְעָ֜/ם וְ/עַ֨ל כָּל הַ/נִּלְוִ֤ים
    עֲלֵי/הֶם֙ וְ/לֹ֣א יַעֲב֔וֹר לִ/הְי֣וֹת עֹשִׂ֗ים אֵ֣ת שְׁנֵ֤י הַ/יָּמִים֙ הָ/אֵ֔לֶּה
    כִּ/כְתָבָ֖/ם וְ/כִ/זְמַנָּ֑/ם בְּ/כָל שָׁנָ֖ה וְ/שָׁנָֽה׀׀־־־׃
translation:
  text: 'the Jews established and accepted for themselves, for their offspring, and
    for all who joined them, that it should not fail: to observe these two days according
    to what was written for them and at their appointed time, year after year.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who attached themselves to them.' The Hebrew refers to those who
      joined or allied themselves with the Jews.
    reason: lexical_alternative
  - marker: b
    text: Or 'that it should not pass away' or 'that it should not be neglected.'
      The clause means the observance was not to lapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִיְּמוּ
  chosen: established
  alternatives:
  - confirmed
  - ordained
  lexicon: HALOT
  rationale: From קום in the causative sense of making something stand/establishing
    it. 'Established' fits the legal-institutional context of fixing the observance.
- source_word: וְקִבֵּל
  chosen: and accepted
  alternatives:
  - and took upon themselves
  - and received
  lexicon: HALOT
  rationale: Though morphologically unusual in the table, the sense in context is
    that the Jews accepted or took on this obligation. Pairing 'established and accepted'
    reflects the two-verb formulation without over-paraphrase.
- source_word: עֲלֵיהֶם
  chosen: for themselves
  alternatives:
  - upon themselves
  lexicon: HALOT
  rationale: Idiomatic English for taking an obligation upon oneself. 'Upon themselves'
    is more literal but less natural in modern English.
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their descendants
  - their seed
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the generational
    sense. ''Seed'' would be overly literal here.'
- source_word: כָּל הַנִּלְוִים עֲלֵיהֶם
  chosen: all who joined them
  alternatives:
  - all who attached themselves to them
  - all who allied themselves with them
  lexicon: HALOT
  rationale: The participle from לוה denotes those who attach/join themselves to the
    Jews. 'Joined them' is clear and readable while preserving the sense of association.
- source_word: וְלֹא יַעֲבוֹר
  chosen: that it should not fail
  alternatives:
  - and it should not pass away
  - and it should not be neglected
  lexicon: HALOT
  rationale: The idiom conveys non-lapse/non-omission of the observance. 'Should not
    fail' communicates that the practice is not to lapse, fitting the following infinitive
    clause.
- source_word: לִהְיוֹת עֹשִׂים
  chosen: to observe
  alternatives:
  - to keep doing
  - to celebrate
  lexicon: HALOT
  rationale: Literally 'to be doing,' but in festival context 'observe' best captures
    ongoing ritual practice without adding festal color beyond the text.
- source_word: שְׁנֵי הַיָּמִים הָאֵלֶּה
  chosen: these two days
  alternatives:
  - the two days האלה
  lexicon: HALOT
  rationale: Straightforward rendering of the demonstrative phrase.
- source_word: כִּכְתָבָם
  chosen: according to what was written for them
  alternatives:
  - as prescribed in writing
  - according to their written instruction
  lexicon: HALOT
  rationale: The suffix likely refers to the prescribed written form/order for the
    days. This rendering keeps the passive written standard in view without over-specifying
    the document.
- source_word: וְכִזְמַנָּם
  chosen: at their appointed time
  alternatives:
  - according to their appointed time
  - in their proper season
  lexicon: HALOT
  rationale: זמן denotes appointed time. Singular in English is idiomatic for the
    recurring scheduled observance of the two-day festival.
- source_word: בְּכָל שָׁנָה וְשָׁנָה
  chosen: year after year
  alternatives:
  - every year
  - from year to year
  lexicon: HALOT
  rationale: This idiom expresses annual repetition. 'Year after year' preserves the
    iterative force more vividly than simply 'every year.'
