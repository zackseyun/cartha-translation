id: EST.9.17
reference: Esther 9:17
source:
  edition: WLC
  text: בְּ/יוֹם שְׁלֹשָׁ֥ה עָשָׂ֖ר לְ/חֹ֣דֶשׁ אֲדָ֑ר וְ/נ֗וֹחַ בְּ/אַרְבָּעָ֤ה עָשָׂר֙
    בּ֔/וֹ וְ/עָשֹׂ֣ה אֹת֔/וֹ י֖וֹם מִשְׁתֶּ֥ה וְ/שִׂמְחָֽה־׃
translation:
  text: on the thirteenth day of the month of Adar, and resting on the fourteenth
    day of it, and making it a day of feasting and gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and made it a day of feasting and gladness.' The Hebrew verbal form
      may be represented with a more finite English sense in context.
    reason: lexical_alternative
  - marker: b
    text: That is, the fourteenth day of the month of Adar.
    reason: cultural_note
lexical_decisions:
- source_word: בְּיוֹם
  chosen: on the ... day
  alternatives:
  - in the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם here marks time, naturally rendered in English
    as 'on the ... day.'
- source_word: שְׁלֹשָׁה עָשָׂר
  chosen: thirteenth
  alternatives:
  - thirteen
  lexicon: HALOT
  rationale: The compound numeral functions ordinally in dating context; English idiom
    prefers 'thirteenth day' rather than 'day thirteen.'
- source_word: לְחֹדֶשׁ אֲדָר
  chosen: of the month of Adar
  alternatives:
  - in the month Adar
  - of Adar
  lexicon: HALOT
  rationale: This preserves the Hebrew dating formula with clear modern English. 'Adar'
    is transliterated as a proper month name.
- source_word: וְנוֹחַ
  chosen: and resting
  alternatives:
  - and having rest
  - and being at rest
  lexicon: HALOT
  rationale: From נוח, here a verbal form describing cessation from conflict. 'Resting'
    is concise and fits the sequence of actions in the verse.
- source_word: בְּאַרְבָּעָה עָשָׂר בּוֹ
  chosen: on the fourteenth day of it
  alternatives:
  - on the fourteenth of it
  - on its fourteenth day
  lexicon: HALOT
  rationale: בּוֹ refers back to the month; 'of it' preserves the pronominal reference
    without over-specifying beyond the Hebrew.
- source_word: וְעָשֹׂה אֹתוֹ
  chosen: and making it
  alternatives:
  - and made it
  - and observing it as
  lexicon: HALOT
  rationale: The form continues the narrative description in coordination with the
    previous verbal idea. 'Making it' captures the sense of appointing/keeping the
    day as something.
- source_word: יוֹם מִשְׁתֶּה
  chosen: a day of feasting
  alternatives:
  - a banquet day
  - a day of banqueting
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking, but 'feasting'
    is the most natural and broad English rendering here.
- source_word: וְשִׂמְחָה
  chosen: and gladness
  alternatives:
  - and joy
  - and rejoicing
  lexicon: HALOT
  rationale: The noun denotes joyfulness/celebration. 'Gladness' pairs well with 'feasting'
    and preserves the nominal style of the Hebrew.
