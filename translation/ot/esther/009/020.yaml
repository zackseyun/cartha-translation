id: EST.9.20
reference: Esther 9:20
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֣ב מָרְדֳּכַ֔י אֶת הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/יִּשְׁלַ֨ח סְפָרִ֜ים
    אֶל כָּל הַ/יְּהוּדִ֗ים אֲשֶׁר֙ בְּ/כָל מְדִינוֹת֙ הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ
    הַ/קְּרוֹבִ֖ים וְ/הָ/רְחוֹקִֽים־־־־׃
translation:
  text: Then Mordecai wrote these things and sent letters to all the Jews who were
    in all the provinces of King Ahasuerus, both near and far.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "these words." The Hebrew can refer either to the matters/events just
      described or to the words Mordecai wrote about them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The wayyiqtol verb from כתב straightforwardly denotes writing. 'Wrote'
    is the most direct and natural English rendering in narrative sequence.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - these words
  - this account
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' Here it likely refers
    back to the matters just narrated and to what Mordecai set down in writing. 'These
    things' preserves the broader sense without over-specifying.
- source_word: וַיִּשְׁלַח סְפָרִים
  chosen: sent letters
  alternatives:
  - sent documents
  - sent written messages
  lexicon: HALOT
  rationale: סְפָרִים in this administrative context refers to written communications.
    'Letters' is idiomatic and fits the Persian court setting better than the more
    generic 'documents.'
- source_word: כָּל הַיְּהוּדִים
  chosen: all the Jews
  alternatives:
  - all the Jewish people
  lexicon: HALOT
  rationale: The phrase denotes the ethnic-religious community throughout the empire.
    'All the Jews' is the standard, direct rendering.
- source_word: בְּכָל מְדִינוֹת
  chosen: in all the provinces
  alternatives:
  - throughout all the provinces
  lexicon: HALOT
  rationale: מְדִינוֹת refers to administrative districts or provinces in an imperial
    setting. 'Provinces' is the clearest English equivalent.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: of King Ahasuerus
  alternatives:
  - of Ahasuerus the king
  lexicon: HALOT
  rationale: The construct chain is naturally rendered 'of King Ahasuerus' in English.
    The personal name is transliterated per translation policy.
- source_word: הַקְּרוֹבִים וְהָרְחוֹקִים
  chosen: both near and far
  alternatives:
  - the near and the far
  - those nearby and those far away
  lexicon: HALOT
  rationale: The paired adjectives function substantivally to describe the Jews across
    the empire. 'Both near and far' is concise, natural English that preserves the
    merism.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw-consecutive continues the narrative. 'Then' communicates
    sequential development more idiomatically in modern English than repeated 'And,'
    while remaining faithful to the discourse flow.
