id: EST.9.8
reference: Esther 9:8
source:
  edition: WLC
  text: וְ/אֵ֧ת פּוֹרָ֛תָא וְ/אֵ֥ת אֲדַלְיָ֖א וְ/אֵ֥ת אֲרִידָֽתָא׀׀׀׃
translation:
  text: and Poratha, and Adalia, and Aridatha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse continues the list of Haman's sons from the previous verse; the
      verb 'killed' is understood from Esther 9:7.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/אֵת
  chosen: and
  alternatives:
  - also
  - namely
  lexicon: HALOT
  rationale: Here וְ plus the direct-object marker אֵת introduces each item in a continuing
    list of the sons of Haman being named after the governing verb from the previous
    verse. In English, the direct-object marker is not represented, so the natural
    rendering is simply the conjunction 'and' before each name to preserve the list
    structure.
- source_word: פּוֹרָתָא
  chosen: Poratha
  lexicon: HALOT
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated. 'Poratha' is a standard English transliteration of the Hebrew
    form.
- source_word: אֲדַלְיָא
  chosen: Adalia
  lexicon: HALOT
  rationale: Personal name; transliterated directly into standard English form 'Adalia'.
- source_word: אֲרִידָתָא
  chosen: Aridatha
  lexicon: HALOT
  rationale: Personal name; transliterated directly into standard English form 'Aridatha'.
