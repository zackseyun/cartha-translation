id: EST.9.29
reference: Esther 9:29
source:
  edition: WLC
  text: וַ֠/תִּכְתֹּב אֶסְתֵּ֨ר הַ/מַּלְכָּ֧ה בַת אֲבִיחַ֛יִל וּ/מָרְדֳּכַ֥י הַ/יְּהוּדִ֖י
    אֶת כָּל תֹּ֑קֶף לְ/קַיֵּ֗ם אֵ֣ת אִגֶּ֧רֶת הַ/פּוּרִ֛ים הַ/זֹּ֖את הַ/שֵּׁנִֽית־־־׃
translation:
  text: Then Esther the queen, daughter of Abihail, and Mordecai the Jew wrote with
    full authority to confirm this second letter about Purim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all authority' or 'with full force.' The Hebrew expression emphasizes
      the official forcefulness of the letter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְתֹּב
  chosen: Then ... wrote
  alternatives:
  - and ... wrote
  - so ... wrote
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... wrote' gives natural
    English narrative progression while preserving the past action.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Esther the queen
  alternatives:
  - Queen Esther
  lexicon: HALOT
  rationale: The Hebrew apposition is most directly represented by 'Esther the queen.'
    This preserves the formal identification without recasting it into a more idiomatic
    title-first English form.
- source_word: בַת אֲבִיחַיִל
  chosen: daughter of Abihail
  lexicon: HALOT
  rationale: A straightforward genealogical expression; retained formally because
    it is part of the verse's identification of Esther.
- source_word: וּמָרְדֳּכַי הַיְּהוּדִי
  chosen: and Mordecai the Jew
  alternatives:
  - and Mordecai the Judean
  lexicon: HALOT
  rationale: '''The Jew'' is the conventional and contextually appropriate rendering
    in Esther, where יהודי functions as an ethnic designation within the Persian setting.
    ''Judean'' is possible but less natural here and may narrow the sense geographically.'
- source_word: אֶת כָּל תֹּקֶף
  chosen: with full authority
  alternatives:
  - with all authority
  - with full force
  lexicon: HALOT
  rationale: תֹּקֶף denotes strength, force, or authoritative power. In the context
    of issuing a confirming letter, 'with full authority' best conveys official force
    rather than physical strength.
- source_word: לְקַיֵּם
  chosen: to confirm
  alternatives:
  - to establish
  - to uphold
  lexicon: HALOT
  rationale: The infinitive expresses the purpose of the writing. In the context of
    formal correspondence regarding an observance already instituted, 'to confirm'
    is the clearest English equivalent.
- source_word: אֵת אִגֶּרֶת הַפּוּרִים
  chosen: this ... letter about Purim
  alternatives:
  - this Purim letter
  - the letter of Purim
  lexicon: HALOT
  rationale: אִגֶּרֶת is 'letter' or 'epistle.' The construct with הַפּוּרִים is best
    represented in readable English as 'letter about Purim,' clarifying that the letter
    concerns the Purim observance.
- source_word: הַזֹּאת
  chosen: this
  alternatives:
  - this very
  lexicon: HALOT
  rationale: The demonstrative points to the specific letter under discussion; simple
    'this' is sufficient.
- source_word: הַשֵּׁנִית
  chosen: second
  alternatives:
  - a second
  - the second
  lexicon: HALOT
  rationale: The adjective marks this as a second letter. In English, 'this second
    letter' naturally conveys the definite sense carried by the Hebrew article.
