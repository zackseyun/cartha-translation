id: EST.9.19
reference: Esther 9:19
source:
  edition: WLC
  text: עַל כֵּ֞ן הַ/יְּהוּדִ֣ים ה/פרוזים הַ/יֹּשְׁבִים֮ בְּ/עָרֵ֣י הַ/פְּרָזוֹת֒
    עֹשִׂ֗ים אֵ֠ת י֣וֹם אַרְבָּעָ֤ה עָשָׂר֙ לְ/חֹ֣דֶשׁ אֲדָ֔ר שִׂמְחָ֥ה וּ/מִשְׁתֶּ֖ה
    וְ/י֣וֹם ט֑וֹב וּ/מִשְׁל֥וֹחַ מָנ֖וֹת אִ֥ישׁ לְ/רֵעֵֽ/הוּ־׃פ
translation:
  text: Therefore the Jews of the villages, who live in the rural towns, make the
    fourteenth day of the month of Adar a day of gladness and feasting and a holiday,
    and of sending portions, each man to his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jews in the unwalled towns, who live in the open country settlements.'
    reason: lexical_alternative
  - marker: b
    text: '''Sending portions'' likely refers to sending food portions or gifts for
      the feast.'
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: A standard inferential connective drawing a conclusion from the preceding
    narrative. 'Therefore' is natural modern English and preserves the causal/result
    sense.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther the term denotes the Jewish people as an ethnic-religious group
    within the Persian Empire, not merely inhabitants of Judah. 'The Jews' is the
    clearest contextual rendering.
- source_word: הפרוזים
  chosen: of the villages
  alternatives:
  - the unwalled
  - the villagers
  lexicon: HALOT
  rationale: The adjective/noun refers to those in open or unwalled settlements, contrasted
    with fortified cities in the context. Rendering it as 'of the villages' communicates
    the social-geographical distinction in idiomatic English while the following phrase
    specifies the setting further.
- source_word: הַיֹּשְׁבִים בְּעָרֵי הַפְּרָזוֹת
  chosen: who live in the rural towns
  alternatives:
  - who dwell in the unwalled towns
  - who live in the open towns
  lexicon: HALOT
  rationale: This appositional participial phrase explains who the 'village Jews'
    are. 'Rural towns' captures the sense of settlements lacking fortification without
    awkward repetition of 'villages ... villages.' The alternative 'unwalled towns'
    is more formal and is preserved in a footnote because it reflects the lexical
    nuance directly.
- source_word: עֹשִׂים אֵת יוֹם אַרְבָּעָה עָשָׂר
  chosen: make the fourteenth day
  alternatives:
  - observe the fourteenth day
  - celebrate the fourteenth day
  lexicon: HALOT
  rationale: Hebrew עשה with a day can mean to keep or celebrate it. 'Make ... a day
    of' closely follows the Hebrew construction while remaining understandable in
    English.
- source_word: לְחֹדֶשׁ אֲדָר
  chosen: of the month of Adar
  alternatives:
  - in the month of Adar
  lexicon: HALOT
  rationale: This is the standard dating formula. 'Of the month of Adar' fits the
    English syntax after 'the fourteenth day' and preserves the genitival relationship.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: HALOT
  rationale: '''Gladness'' preserves the noun form and festive emotional sense. ''Joy''
    is possible but slightly broader; ''gladness'' pairs well with ''feasting'' in
    this context.'
- source_word: וּמִשְׁתֶּה
  chosen: feasting
  alternatives:
  - banqueting
  - drinking feast
  lexicon: HALOT
  rationale: The noun denotes a festive banquet/feast, often with drinking. 'Feasting'
    is readable modern English and suits the celebratory context without over-specifying
    alcohol.
- source_word: וְיוֹם טוֹב
  chosen: a holiday
  alternatives:
  - a good day
  - a festive day
  lexicon: HALOT
  rationale: The idiom means a festal or celebratory day. 'A holiday' is concise,
    natural English for a designated festive observance.
- source_word: וּמִשְׁלוֹחַ מָנוֹת
  chosen: of sending portions
  alternatives:
  - of sending gifts of food
  - of sending portions
  lexicon: HALOT
  rationale: The phrase refers to sending portions, likely food portions, as part
    of the celebration. 'Sending portions' stays close to the Hebrew and leaves the
    object slightly general, as in the source.
- source_word: אִישׁ לְרֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - each person to his companion
  - one man to another
  lexicon: HALOT
  rationale: The distributive singular is preserved with 'each man,' in keeping with
    the project's gender-accurate policy. 'Neighbor' naturally renders רֵעַ here as
    a fellow member of the community.
