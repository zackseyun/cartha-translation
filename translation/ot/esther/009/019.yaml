theological_decisions:
- issue: Gendered distributive expression אִישׁ לְרֵעֵהוּ
  chosen_reading: each man to his neighbor
  alternative_readings:
  - each person to another
  - to one another
  rationale: The Hebrew uses a grammatically masculine singular distributive expression.
    Following the project's gender-accurate policy, the main text preserves the masculine
    form rather than neutralizing it, while the sense remains representative/community-wide
    rather than exclusively male.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
