id: EST.9.10
reference: Esther 9:10
source:
  edition: WLC
  text: עֲ֠שֶׂרֶת בְּנֵ֨י הָמָ֧ן בֶּֽן הַמְּדָ֛תָא צֹרֵ֥ר הַ/יְּהוּדִ֖ים הָרָ֑גוּ
    וּ/בַ֨/בִּזָּ֔ה לֹ֥א שָׁלְח֖וּ אֶת יָדָֽ/ם־־׃
translation:
  text: the ten sons of Haman son of Hammedatha, the enemy of the Jews, they killed;
    but they did not lay a hand on the plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֶׂרֶת
  chosen: the ten
  alternatives:
  - ten
  lexicon: HALOT
  rationale: Cardinal number in construct with 'sons of Haman'; English naturally
    supplies the article in this definite phrase.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The immediate referent is Haman's male offspring listed in the surrounding
    context, so 'sons of' is the most precise rendering.
- source_word: הָמָן
  chosen: Haman
  rationale: Personal name is transliterated per translation philosophy.
- source_word: בֶּן הַמְּדָתָא
  chosen: son of Hammedatha
  rationale: Genealogical apposition identifying Haman; personal name transliterated.
- source_word: צֹרֵר הַיְּהוּדִים
  chosen: the enemy of the Jews
  alternatives:
  - the adversary of the Jews
  - the foe of the Jews
  lexicon: HALOT
  rationale: צֹרֵר denotes one who shows hostility or causes distress. 'Enemy' is
    the clearest natural English equivalent here and matches the appositional identification
    of Haman.
- source_word: הָרָגוּ
  chosen: they killed
  alternatives:
  - they struck down
  - they slew
  lexicon: HALOT
  rationale: Straightforward qatal 3cp of הרג. 'Killed' is accurate, modern, and avoids
    archaic diction like 'slew.'
- source_word: וּבַבִּזָּה
  chosen: but ... on the plunder
  alternatives:
  - and ... on the spoil
  - but ... on the spoil
  lexicon: HALOT
  rationale: בִּזָּה means plunder/spoil. 'Plunder' is more natural modern English.
    The prefixed conjunction is rendered adversatively as 'but' because the clause
    contrasts killing with refraining from taking goods, a sense supported by English
    discourse even though Hebrew waw is formally coordinative.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  chosen: they did not lay a hand
  alternatives:
  - they did not send out their hand
  - they did not put forth their hand
  lexicon: HALOT
  rationale: This is an idiom for taking hold of or appropriating something. 'Lay
    a hand' communicates the idiomatic sense in clear English while preserving the
    concrete imagery.
