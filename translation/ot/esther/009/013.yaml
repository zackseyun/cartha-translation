id: EST.9.13
reference: Esther 9:13
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר אֶסְתֵּר֙ אִם עַל הַ/מֶּ֣לֶךְ ט֔וֹב יִנָּתֵ֣ן גַּם מָחָ֗ר לַ/יְּהוּדִים֙
    אֲשֶׁ֣ר בְּ/שׁוּשָׁ֔ן לַ/עֲשׂ֖וֹת כְּ/דָ֣ת הַ/יּ֑וֹם וְ/אֵ֛ת עֲשֶׂ֥רֶת בְּנֵֽי
    הָמָ֖ן יִתְל֥וּ עַל הָ/עֵֽץ־־־־־׃
translation:
  text: Esther said, “If it pleases the king, let it be granted to the Jews who are
    in Susa to do tomorrow also according to today’s decree, and let Haman’s ten sons
    be hanged on the gallows.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'be hung on the tree' or 'be impaled on the stake.' The Hebrew literally
      says 'on the wood/tree,' which in context refers to an execution structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  chosen: If it pleases the king
  alternatives:
  - If it is good to the king
  - If it seems good to the king
  lexicon: HALOT
  rationale: This idiom expresses royal pleasure or approval rather than a moral judgment
    of 'good.' 'If it pleases the king' is natural English and preserves the courtly
    register.
- source_word: יִנָּתֵן
  chosen: let it be granted
  alternatives:
  - may it be given
  - let permission be given
  lexicon: HALOT
  rationale: The passive/jussive sense fits Esther's request to the king. 'Granted'
    conveys official authorization in context.
- source_word: גַּם מָחָר
  chosen: tomorrow also
  alternatives:
  - also tomorrow
  - even tomorrow
  lexicon: HALOT
  rationale: The phrase extends the present authorization into the following day.
    In the English line, 'tomorrow also' preserves the emphasis while remaining readable.
- source_word: לַיְּהוּדִים אֲשֶׁר בְּשׁוּשָׁן
  chosen: to the Jews who are in Susa
  alternatives:
  - for the Jews who are in Susa
  - to the Jews in Susa
  lexicon: HALOT
  rationale: The dative marks the beneficiaries of the royal grant. 'Who are in Susa'
    is slightly more formal and tracks the Hebrew relative clause.
- source_word: לַעֲשׂוֹת כְּדָת הַיּוֹם
  chosen: to do tomorrow also according to today’s decree
  alternatives:
  - to act tomorrow also according to today's law
  - to do as today's edict prescribes tomorrow also
  lexicon: HALOT
  rationale: דָּת in Esther commonly refers to a royal law/decree/edict. 'Decree'
    best fits Persian court context. The infinitive 'to do' is left broad rather than
    over-specifying the action.
- source_word: דָּת
  chosen: decree
  alternatives:
  - law
  - edict
  lexicon: HALOT
  rationale: In Esther, דָּת often denotes an official royal regulation. 'Decree'
    is idiomatic and contextually appropriate in the king's court.
- source_word: עֲשֶׂרֶת בְּנֵי הָמָן
  chosen: Haman’s ten sons
  alternatives:
  - the ten sons of Haman
  lexicon: HALOT
  rationale: The construct chain is naturally rendered possessively in English.
- source_word: יִתְלוּ עַל־הָעֵץ
  chosen: let Haman’s ten sons be hanged on the gallows
  alternatives:
  - let ... be hung on the tree
  - let ... be impaled on the stake/pole
  lexicon: HALOT
  rationale: The verb תלה means 'hang,' and עֵץ can denote tree, wood, stake, or gallows
    depending on context. In Esther, the execution structure associated with Haman
    is traditionally rendered 'gallows,' and this fits the narrative setting. Because
    the underlying term may also suggest a wooden stake or pole, that alternative
    is preserved in a footnote.
