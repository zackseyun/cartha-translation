id: EST.9.23
reference: Esther 9:23
source:
  edition: WLC
  text: וְ/קִבֵּל֙ הַ/יְּהוּדִ֔ים אֵ֥ת אֲשֶׁר הֵחֵ֖לּוּ לַ/עֲשׂ֑וֹת וְ/אֵ֛ת אֲשֶׁר
    כָּתַ֥ב מָרְדֳּכַ֖י אֲלֵי/הֶֽם־־׃
translation:
  text: So the Jews accepted what they had begun to do, and what Mordecai had written
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'undertook what they had begun to do.' The Hebrew verb can carry the
      sense of accepting or taking something upon oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קִבֵּל
  chosen: accepted
  alternatives:
  - undertook
  - confirmed
  - received
  lexicon: HALOT
  rationale: The verb קבל here conveys taking upon oneself or accepting an obligation/practice.
    In context of establishing the Purim observance, 'accepted' best captures the
    sense that the Jews formally took up what had been initiated. 'Received' is too
    passive, and 'undertook' slightly overstates the voluntative nuance.
- source_word: הַ/יְּהוּדִים
  chosen: the Jews
  lexicon: HALOT
  rationale: Straightforward ethnoreligious designation with the definite article;
    'the Jews' is the natural and accurate rendering.
- source_word: אֵת אֲשֶׁר הֵחֵלּוּ לַעֲשׂוֹת
  chosen: what they had begun to do
  alternatives:
  - that which they had started doing
  - what they had undertaken to do
  lexicon: HALOT
  rationale: 'The construction marks the object of ''accepted'': specifically, the
    practice they had already initiated. The Hiphil of חלל/החל means ''begin,'' and
    the infinitive of עשה gives the action. The pluperfect-like English ''had begun''
    fits the narrative sequence.'
- source_word: וְ/אֵת אֲשֶׁר
  chosen: and what
  alternatives:
  - and that which
  lexicon: HALOT
  rationale: This repeats the direct-object marker plus relative particle, linking
    a second object to 'accepted.' 'And what' is idiomatic while preserving the parallel
    structure.
- source_word: כָּתַב
  chosen: had written
  alternatives:
  - wrote
  lexicon: HALOT
  rationale: Although the Hebrew perfect can be rendered simply as past, English past
    perfect clarifies that Mordecai's writing preceded the Jews' acceptance in the
    narrative flow.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אֲלֵי/הֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition אֶל normally indicates direction toward; 'to them' is
    the most direct rendering in the context of a written communication.
