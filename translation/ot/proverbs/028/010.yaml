theological_decisions:
- issue: Moral consequence imagery in בִּשְׁחוּתוֹ
  chosen_reading: Concrete metaphor 'his own pit' retained in the main text
  alternative_readings:
  - his own destruction
  - his own ruin
  rationale: The proverb teaches poetic justice without requiring a narrower doctrinal
    claim about the mode of judgment. Retaining the pit/trap imagery preserves the
    wisdom-literature metaphor and avoids flattening it into an abstract statement
    only.
  doctrine_reference: Translation philosophy §1, §3, §6
