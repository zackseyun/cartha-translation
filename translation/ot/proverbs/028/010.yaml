id: PRO.28.10
reference: Proverbs 28:10
source:
  edition: WLC
  text: מַשְׁגֶּ֤ה יְשָׁרִ֨ים בְּ/דֶ֥רֶךְ רָ֗ע בִּ/שְׁחוּת֥/וֹ הֽוּא יִפּ֑וֹל וּ֝/תְמִימִ֗ים
    יִנְחֲלוּ טֽוֹב׀־־׃
translation:
  text: Whoever leads the upright astray in an evil way will himself fall into his
    own pit, but the blameless will inherit good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will fall into his own destruction' or 'his own ruin.' The Hebrew term
      can denote a pit or ruin/destruction; the main text preserves the proverb's
      trap imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁגֶּה
  chosen: Whoever leads ... astray
  alternatives:
  - One who misleads
  - He who causes ... to go astray
  lexicon: HALOT
  rationale: Hiphil participle of שׁגה conveys causing someone to err or go astray.
    Rendering with an indefinite 'Whoever' gives natural English for the participial
    subject while preserving the generic force.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: Refers to morally straight/upright people, a common wisdom term. 'The
    upright' is idiomatic and preserves the ethical nuance better than the more literal
    'the straight.'
- source_word: בְּדֶרֶךְ רָע
  chosen: in an evil way
  alternatives:
  - into an evil way
  - on an evil path
  lexicon: HALOT
  rationale: דֶּרֶךְ is literally 'way/path,' often metaphorical for conduct. 'In
    an evil way' preserves the Hebrew metaphor and reads naturally with 'leads ...
    astray.' 'Into an evil way' is possible, but the preposition ב favors 'in/by means
    of' rather than explicit motion into.
- source_word: בִּשְׁחוּתוֹ
  chosen: into his own pit
  alternatives:
  - in his own destruction
  - in his own ditch
  - by his own ruin
  lexicon: HALOT
  rationale: The noun can denote pit, destruction, or ruin. In this proverb, the image
    of the deceiver falling into the trap he intended for others is strong, so 'pit'
    best preserves the concrete metaphor while allowing the moral sense. The 3ms suffix
    is reflected by 'his own.'
- source_word: הוּא יִפּוֹל
  chosen: will himself fall
  alternatives:
  - he will fall
  - will fall
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis/contrast in Hebrew. 'Will himself
    fall' brings that emphasis into English without sounding overly wooden.
- source_word: וּתְמִימִים
  chosen: but the blameless
  alternatives:
  - and the blameless
  - the innocent
  - the wholehearted
  lexicon: HALOT
  rationale: תמים in wisdom literature commonly denotes integrity or blamelessness.
    'But' captures the adversative sense of the clause contrast, though the conjunction
    is formally 'and.' 'Blameless' is the clearest ethical equivalent here.
- source_word: יִנְחֲלוּ
  chosen: will inherit
  alternatives:
  - will possess
  - will receive as an inheritance
  lexicon: HALOT
  rationale: נחל commonly means inherit/receive as a possession. 'Will inherit' preserves
    the covenantal/wisdom resonance better than the flatter 'receive.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  - prosperity
  - blessing
  lexicon: HALOT
  rationale: The Hebrew is broad and unspecific. 'Good' preserves that breadth and
    avoids over-interpreting the blessing as merely material prosperity.
