id: PRO.28.27
reference: Proverbs 28:27
source:
  edition: WLC
  text: נוֹתֵ֣ן לָ֭/רָשׁ אֵ֣ין מַחְס֑וֹר וּ/מַעְלִ֥ים עֵ֝ינָ֗י/ו רַב מְאֵרֽוֹת־׃
translation:
  text: Whoever gives to the poor will have no lack, but he who hides his eyes will
    receive many curses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shuts his eyes' / 'turns his eyes away'—an idiom for deliberately ignoring
      the poor.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹתֵן
  chosen: Whoever gives
  alternatives:
  - He who gives
  - One who gives
  lexicon: HALOT
  rationale: Qal participle of נתן functions generically/proverbially. 'Whoever gives'
    conveys the gnomic force in natural English while preserving the habitual sense.
- source_word: לָרָשׁ
  chosen: to the poor
  alternatives:
  - to the needy
  - to the impoverished
  lexicon: HALOT
  rationale: רָשׁ denotes a poor or impoverished person. 'The poor' is idiomatic and
    suitably broad in English for the singular generic object.
- source_word: אֵין מַחְסוֹר
  chosen: will have no lack
  alternatives:
  - there is no want
  - will not be in need
  lexicon: HALOT
  rationale: The existential negative with מַחְסוֹר expresses absence of deficiency.
    'Will have no lack' preserves the proverb's promise in clear modern English without
    overinterpreting the kind of provision.
- source_word: וּמַעְלִים עֵינָיו
  chosen: but he who hides his eyes
  alternatives:
  - but whoever shuts his eyes
  - but the one who turns his eyes away
  lexicon: HALOT
  rationale: The Hiphil participle of עלם with 'eyes' is an idiom for deliberately
    ignoring someone in need. 'Hides his eyes' is relatively literal and preserves
    the moral image; the idiomatic sense is clear from context.
- source_word: רַב מְאֵרוֹת
  chosen: will receive many curses
  alternatives:
  - has many curses
  - will have many curses
  lexicon: HALOT
  rationale: מְאֵרוֹת is the plural of 'curse.' The verbless phrase after the participle
    is rendered as a future/result clause to match the first colon's proverbial consequence.
    'Receive many curses' makes explicit the implied result in idiomatic English.
