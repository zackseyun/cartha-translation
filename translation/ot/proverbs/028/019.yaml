id: PRO.28.19
reference: Proverbs 28:19
source:
  edition: WLC
  text: עֹבֵ֣ד אַ֭דְמָת/וֹ יִֽשְׂבַּֽע לָ֑חֶם וּ/מְרַדֵּ֥ף רֵ֝קִ֗ים יִֽשְׂבַּֽע רִֽישׁ־־׃
translation:
  text: Whoever works his land will have plenty of bread, but he who pursues worthless
    things will have his fill of poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'empty things'; the Hebrew may also be understood by some as referring
      to empty or worthless people.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵד
  chosen: works
  alternatives:
  - tills
  - serves
  - cultivates
  lexicon: HALOT
  rationale: The participle from עבד here refers to laboring on the land. 'Works'
    is natural modern English and broad enough to include cultivation without sounding
    overly technical. 'Tills' is possible but narrower than the Hebrew.
- source_word: אַדְמָתוֹ
  chosen: his land
  alternatives:
  - his ground
  - his soil
  lexicon: HALOT
  rationale: אַדָמָה commonly means ground/land/soil. In this proverb about agricultural
    diligence, 'his land' is the most idiomatic English rendering.
- source_word: יִשְׂבַּע לָחֶם
  chosen: will have plenty of bread
  alternatives:
  - will be satisfied with bread
  - will have his fill of bread
  - will have plenty to eat
  lexicon: HALOT
  rationale: The idiom combines 'be satisfied' with 'bread.' 'Will have plenty of
    bread' preserves the concrete image of bread while expressing the sense of sufficient
    provision in natural English. 'Bread' is retained rather than generalized to 'food'
    to preserve the Hebrew imagery.
- source_word: וּמְרַדֵּף
  chosen: but he who pursues
  alternatives:
  - and the one chasing
  - but whoever follows after
  lexicon: HALOT
  rationale: The waw here marks contrast in the proverb's parallelism, so 'but' brings
    out the adversative sense. 'Pursues' fits the participial idea of actively chasing
    after something.
- source_word: רֵקִים
  chosen: worthless things
  alternatives:
  - empty things
  - vain things
  - empty people
  - idlers
  lexicon: HALOT
  rationale: רֵקִים literally means 'empty ones/things' and is contextually ambiguous.
    In this proverb, the contrast is between productive labor and futile pursuits,
    so 'worthless things' best captures the likely sense without overcommitting to
    persons. The more literal 'empty things' is preserved in a footnote.
- source_word: יִשְׂבַּע רִישׁ
  chosen: will have his fill of poverty
  alternatives:
  - will be filled with poverty
  - will be satisfied with poverty
  lexicon: HALOT
  rationale: The repetition of שׂבע is mirrored by 'have his fill,' preserving the
    proverb's wordplay and irony. 'Poverty' renders רִישׁ straightforwardly.
