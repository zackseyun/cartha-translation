id: PRO.28.4
reference: Proverbs 28:4
source:
  edition: WLC
  text: עֹזְבֵ֣י ת֭וֹרָה יְהַֽלְל֣וּ רָשָׁ֑ע וְ/שֹׁמְרֵ֥י ת֝וֹרָ֗ה יִתְגָּ֥רוּ בָֽ/ם׃פ
translation:
  text: Those who forsake the law praise the wicked, but those who keep the law contend
    with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oppose them' or 'contend against them.' The Hebrew verb can carry the
      sense of striving against someone.
    reason: lexical_alternative
  - marker: b
    text: '''The law'' may also be rendered ''instruction'' or ''teaching,'' especially
      in wisdom contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹזְבֵי
  chosen: those who forsake
  alternatives:
  - those who abandon
  - those who leave
  lexicon: HALOT
  rationale: Qal participle plural construct from עזב denotes people characterized
    by leaving or abandoning. 'Forsake' preserves the moral weight and proverbial
    tone better than the flatter 'leave.'
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: תורה can mean instruction broadly, but in Proverbs it often carries the
    sense of authoritative moral instruction. 'The law' is concise and idiomatic here,
    while still allowing the broader wisdom-and-covenant sense. The article reflects
    the generic but definite force in English.
- source_word: יְהַלְלוּ
  chosen: praise
  alternatives:
  - commend
  - celebrate
  lexicon: HALOT
  rationale: Piel imperfect of הלל here means to praise or commend. 'Praise' is the
    most direct and natural rendering, preserving the irony that law-forsakers approve
    of the wicked.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked person
  - the wicked person
  lexicon: HALOT
  rationale: Although morphologically singular, Hebrew often uses the singular adjective
    substantivally in a representative sense. 'The wicked' reads naturally in English
    and captures the class/generic force better than 'a wicked person.'
- source_word: שֹׁמְרֵי
  chosen: those who keep
  alternatives:
  - those who guard
  - those who observe
  lexicon: HALOT
  rationale: Qal participle plural construct from שמר denotes keeping, observing,
    or guarding. 'Keep' is the most idiomatic pairing with 'law' in English and preserves
    covenantal-obediential nuance.
- source_word: יִתְגָּרוּ
  chosen: contend
  alternatives:
  - strive
  - stir themselves up against
  - oppose
  lexicon: HALOT
  rationale: Hitpael imperfect of גרה in this context conveys engaging in strife or
    contention. 'Contend' preserves the adversarial sense without overtranslating
    to physical violence. 'Oppose' is possible but less vivid; 'stir themselves up
    against' is too wooden for the main text.
- source_word: בָם
  chosen: with them
  alternatives:
  - against them
  lexicon: HALOT
  rationale: The preposition ב with this verb can indicate contention directed toward
    persons, yielding either 'with them' or 'against them' in English. 'With them'
    is idiomatic after 'contend' and leaves the adversarial relation clear without
    adding interpretive force.
