id: PRO.28.14
reference: Proverbs 28:14
source:
  edition: WLC
  text: אַשְׁרֵ֣י אָ֭דָם מְפַחֵ֣ד תָּמִ֑יד וּ/מַקְשֶׁ֥ה לִ֝בּ֗/וֹ יִפּ֥וֹל בְּ/רָעָֽה׃
translation:
  text: Blessed is the man who is always fearful, but whoever hardens his heart will
    fall into calamity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the man who fears continually.' The Hebrew does not state an
      explicit object for 'fears.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will fall into evil/trouble.' The Hebrew רָעָה can mean evil, harm,
      trouble, or calamity; here it likely refers to disastrous trouble.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: אַשְׁרֵי is the beatitude form, often introducing a state of enviable
    blessedness rather than a mere wish. 'Blessed is' preserves the wisdom-literature
    register better than the flatter 'happy' or 'fortunate'.
- source_word: אָדָם
  chosen: the man
  alternatives:
  - a man
  - the person
  - humankind
  lexicon: HALOT
  rationale: The noun is singular masculine and generic in wisdom style. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral when the source uses
    masculine representative language. 'The man' fits the proverbial, generic sense
    in English.
- source_word: מְפַחֵד
  chosen: who is always fearful
  alternatives:
  - who fears continually
  - who is in dread continually
  - who is always cautious
  lexicon: HALOT
  rationale: The participle from פחד denotes fearing/dreading. In context it likely
    commends ongoing reverent caution and moral alertness, not cowardice. 'Who is
    always fearful' keeps the lexical force of fear while remaining natural English;
    the nuance is clarified by context rather than paraphrased into 'cautious' in
    the main text.
- source_word: תָּמִיד
  chosen: always
  alternatives:
  - continually
  - constantly
  lexicon: HALOT
  rationale: תָּמִיד marks ongoing regularity. 'Always' is concise and idiomatic with
    the participle.
- source_word: וּמַקְשֶׁה לִבּוֹ
  chosen: but whoever hardens his heart
  alternatives:
  - but the one hardening his heart
  - but whoever makes his heart stubborn
  lexicon: HALOT
  rationale: The Hiphil of קשה means to make hard/harden. With 'heart' as object,
    'hardens his heart' is the standard and transparent English equivalent, preserving
    the moral-volitional sense of stubbornness.
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - falls
  - will stumble
  lexicon: HALOT
  rationale: The imperfect here naturally expresses the consequence in proverbial
    future sense. 'Will fall' is the straightforward rendering.
- source_word: בְּרָעָה
  chosen: into calamity
  alternatives:
  - into evil
  - into trouble
  - by evil
  lexicon: HALOT
  rationale: רָעָה can denote evil, harm, trouble, or calamity. Here the consequence
    of a hardened heart is best expressed as disastrous ruin rather than moral evil
    committed, so 'into calamity' captures the resultative sense idiomatically.
