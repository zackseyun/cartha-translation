id: PRO.28.17
reference: Proverbs 28:17
source:
  edition: WLC
  text: אָ֭דָם עָשֻׁ֣ק בְּ/דַם נָפֶשׁ עַד בּ֥וֹר יָ֝נ֗וּס אַל יִתְמְכוּ בֽ/וֹ־־־־׃
translation:
  text: A man burdened with the blood of a life will flee as far as the pit; let no
    one support him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a man oppressed/burdened by the blood of a life.' The
      expression refers to bloodguilt for taking a life.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the grave.' The Hebrew 'pit' can carry the sense of a deadly end.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: A man
  alternatives:
  - A person
  - Humankind
  lexicon: HALOT
  rationale: The singular noun here refers to an individual case, not humanity in
    general. Per doctrine, gender-accurate rendering is preferred; 'man' fits the
    representative singular better than the more abstract 'person.'
- source_word: עָשֻׁק
  chosen: burdened
  alternatives:
  - oppressed
  - pressed down
  - weighed down
  lexicon: HALOT
  rationale: Although the verb can denote being oppressed, in this construction with
    'blood' it describes a person under the crushing weight or liability of bloodguilt.
    'Burdened' communicates the idiomatic sense in readable English without over-paraphrasing.
- source_word: בְּדַם נָפֶשׁ
  chosen: with the blood of a life
  alternatives:
  - by bloodguilt for a life
  - with lifeblood
  - with the blood of a person
  lexicon: HALOT
  rationale: Literally 'with/by the blood of a life/soul.' In context this is an idiom
    for bloodguilt incurred by taking a life. The main text keeps the concrete imagery
    ('blood of a life') while remaining intelligible; the bloodguilt nuance is preserved
    in documentation and footnote.
- source_word: עַד בּוֹר
  chosen: as far as the pit
  alternatives:
  - to the pit
  - to the grave
  - to the dungeon
  lexicon: HALOT
  rationale: בּוֹר can mean pit, cistern, dungeon, or metaphorically grave. Here it
    likely denotes the fatal end toward which the bloodguilty man rushes. 'The pit'
    preserves the Hebrew image and allows the grave/death resonance without over-specifying.
- source_word: יָנוּס
  chosen: will flee
  alternatives:
  - will keep fleeing
  - will run
  lexicon: HALOT
  rationale: Simple imperfect with the sense of fleeing/running away. 'Will flee'
    is natural English and preserves the forward movement toward destruction.
- source_word: אַל יִתְמְכוּ בוֹ
  chosen: let no one support him
  alternatives:
  - let them not uphold him
  - let no one help him
  - do not sustain him
  lexicon: HALOT
  rationale: The plural jussive functions as a prohibition to unspecified people.
    English idiom is best captured by the indefinite singular 'let no one support
    him.' 'Support' preserves the sense of giving aid or sustaining him.
