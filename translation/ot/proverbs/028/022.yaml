id: PRO.28.22
reference: Proverbs 28:22
source:
  edition: WLC
  text: נִֽבֳהָ֥ל לַ/ה֗וֹן אִ֭ישׁ רַ֣ע עָ֑יִן וְ/לֹֽא יֵ֝דַע כִּי חֶ֥סֶר יְבֹאֶֽ/נּוּ־־׃
translation:
  text: A man with an evil eye hastens after wealth, and does not know that poverty
    will come upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stingy' or 'greedy'; literally 'a man with an evil eye,' a Hebrew idiom
      for a selfish, begrudging disposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבֳהָל
  chosen: hastens
  alternatives:
  - is in haste
  - rushes
  lexicon: HALOT
  rationale: The Niphal participle of בהל conveys being hurried or acting hastily.
    'Hastens' gives natural English while preserving the sense of urgent, reckless
    pursuit.
- source_word: לַהוֹן
  chosen: after wealth
  alternatives:
  - for wealth
  - to wealth
  - for riches
  lexicon: HALOT
  rationale: 'הוֹן denotes wealth/riches. With ל here, the sense is directional or
    goal-oriented: the man is hurrying toward or after wealth. ''After wealth'' is
    idiomatic in English and fits the context of greedy pursuit.'
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - A person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per the translation philosophy, gender-accurate
    rendering is preferred where the source is masculine and representative. 'A man'
    preserves the form and proverbial style.
- source_word: רַע עָיִן
  chosen: with an evil eye
  alternatives:
  - stingy
  - envious
  - greedy
  lexicon: HALOT
  rationale: Literally 'evil of eye/evil-eyed.' In Hebrew idiom this can denote stinginess,
    envy, or greed. Because the phrase is semantically rich and culturally marked,
    the main text preserves the idiom 'evil eye,' while an explanatory alternative
    is preserved in a footnote.
- source_word: וְלֹא יֵדַע
  chosen: and does not know
  alternatives:
  - but he does not know
  - without knowing
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus imperfect verb. 'And
    does not know' preserves the Hebrew coordination and the proverbial flow.
- source_word: חֶסֶר
  chosen: poverty
  alternatives:
  - lack
  - want
  - need
  lexicon: HALOT
  rationale: חֶסֶר denotes lack or deficiency; in this wisdom context, the result
    of greedy haste is best expressed as 'poverty,' which captures the concrete socioeconomic
    consequence.
- source_word: יְבֹאֶנּוּ
  chosen: will come upon him
  alternatives:
  - will come to him
  - will overtake him
  lexicon: HALOT
  rationale: The verb 'come' with pronominal suffix indicates that lack/poverty comes
    to or upon the man. 'Come upon him' is idiomatic and slightly weightier, fitting
    the warning tone.
