theological_decisions:
- issue: Anthropology of 'heart'
  chosen_reading: Retain 'heart' rather than interpretively replacing it with 'mind'
    or 'self'.
  alternative_readings:
  - in his own mind
  - in himself
  rationale: In Hebrew anthropology, 'heart' includes thought, judgment, and will.
    Preserving 'heart' maintains the source-text imagery and theological anthropology
    without reducing it to modern psychological categories.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without flattening theological weight.'
- issue: Generic masculine expression
  chosen_reading: Use masculine singular forms ('his,' 'he who') to match the Hebrew
    generic masculine.
  alternative_readings:
  - their own heart ... the one who walks
  - one's own heart ... whoever walks
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing
    when the source uses masculine generic forms.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
