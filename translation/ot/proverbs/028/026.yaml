id: PRO.28.26
reference: Proverbs 28:26
source:
  edition: WLC
  text: בּוֹטֵ֣חַ בְּ֭/לִבּ/וֹ ה֣וּא כְסִ֑יל וְ/הוֹלֵ֥ךְ בְּ֝/חָכְמָ֗ה ה֣וּא יִמָּלֵֽט׃
translation:
  text: Whoever trusts in his own heart is a fool, but he who walks in wisdom will
    escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'heart' often refers to the inner person, including thought, judgment,
      and will, not only emotion.
    reason: cultural_note
  - marker: b
    text: Or 'will be delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹטֵחַ
  chosen: trusts
  alternatives:
  - is confident
  - relies
  lexicon: HALOT
  rationale: The participle from בטח denotes placing confidence or trust in someone
    or something. 'Trusts' is the most natural English rendering here and preserves
    the proverb's moral warning against self-reliance.
- source_word: בְּלִבּוֹ
  chosen: in his own heart
  alternatives:
  - in his heart
  - in himself
  - in his own mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew commonly refers to the inner self, including thought
    and will, not merely emotion. 'In his own heart' is a formally close rendering;
    adding 'own' makes explicit the 3ms suffix and the reflexive sense of self-trust.
- source_word: כְסִיל
  chosen: a fool
  alternatives:
  - foolish
  - stupid person
  lexicon: HALOT
  rationale: כְסִיל is a standard wisdom-term for a morally and intellectually deficient
    person. 'A fool' preserves the established wisdom-category better than a flatter
    adjective.
- source_word: וְהוֹלֵךְ
  chosen: he who walks
  alternatives:
  - who walks
  - who lives
  - who conducts himself
  lexicon: HALOT
  rationale: הלך in wisdom literature often denotes one's manner of life or conduct.
    'He who walks' keeps the Hebrew metaphor while remaining idiomatic in English.
- source_word: בְּחָכְמָה
  chosen: in wisdom
  alternatives:
  - wisely
  - with wisdom
  lexicon: HALOT
  rationale: The prepositional phrase is retained as 'in wisdom' to preserve the Hebrew
    imagery and parallel the participial construction, while still sounding natural
    enough in English.
- source_word: יִמָּלֵט
  chosen: will escape
  alternatives:
  - will be delivered
  - will be kept safe
  lexicon: HALOT
  rationale: The Niphal of מלט commonly means to escape or be delivered. 'Will escape'
    fits the concise proverbial style and avoids over-theologizing the outcome, while
    still conveying rescue from danger.
- source_word: הוּא ... הוּא
  chosen: is ... he who
  alternatives:
  - he is ... he will
  - such a one is ... such a one will
  lexicon: Hebrew grammar
  rationale: The explicit pronouns add emphasis in Hebrew. English does not require
    both pronouns, so the emphasis is represented idiomatically through the clause
    structure rather than wooden repetition.
