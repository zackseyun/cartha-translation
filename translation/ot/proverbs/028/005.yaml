theological_decisions:
- issue: Scope of 'understand everything'
  chosen_reading: A proverbial statement about comprehensive moral discernment, not
    literal omniscience.
  alternative_readings:
  - Literal knowledge of all things
  rationale: The wisdom context contrasts inability to grasp justice with broad discernment
    granted to those who seek the LORD. Rendering כֹל as 'everything' preserves the
    Hebrew's force while understanding it proverbially rather than as a doctrinal
    claim of omniscience.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
