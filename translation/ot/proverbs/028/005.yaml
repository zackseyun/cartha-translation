id: PRO.28.5
reference: Proverbs 28:5
source:
  edition: WLC
  text: אַנְשֵׁי רָ֭ע לֹא יָבִ֣ינוּ מִשְׁפָּ֑ט וּ/מְבַקְשֵׁ֥י יְ֝הוָ֗ה יָבִ֥ינוּ כֹֽל־־׃
translation:
  text: Evil men do not understand justice, but those who seek the LORD understand
    everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'understand all things'; in context this refers to broad moral discernment,
      especially regarding justice, not to knowing everything without limit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי רָע
  chosen: Evil men
  alternatives:
  - men of evil
  - evil people
  lexicon: HALOT
  rationale: Construct phrase literally means 'men of evil.' 'Evil men' preserves
    the masculine/generic form of the Hebrew while remaining natural English. 'Evil
    people' is possible, but the project prefers gender-accurate renderings where
    the source is grammatically masculine and representative.
- source_word: יָבִינוּ
  chosen: understand
  alternatives:
  - discern
  - comprehend
  lexicon: HALOT
  rationale: The verb בין commonly denotes understanding or discernment. 'Understand'
    is the most natural and sufficiently broad rendering here, and it works in both
    cola for consistency.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In wisdom literature, מִשְׁפָּט often refers not merely to a legal verdict
    but to justice/right order. 'Justice' best fits the ethical contrast with evil
    men and the practical discernment in view.
- source_word: מְבַקְשֵׁי יְהוָה
  chosen: those who seek the LORD
  alternatives:
  - seekers of the LORD
  - those who seek Yahweh
  lexicon: HALOT
  rationale: The participial form denotes an ongoing class of people characterized
    by seeking YHWH. 'Those who seek the LORD' is idiomatic and preserves the covenant
    name according to project policy for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כֹל
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: HALOT
  rationale: 'The absolute ''all'' is naturally rendered ''everything'' in English.
    In context it is a wisdom generalization: those who seek the LORD gain comprehensive
    moral discernment, not omniscience.'
