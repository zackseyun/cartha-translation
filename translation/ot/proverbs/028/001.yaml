theological_decisions:
- issue: Generic singular/plural moral types in proverb
  chosen_reading: Render רָשָׁע and צַדִּיקִים as class terms ('the wicked' / 'the
    righteous') rather than individuated gendered expressions.
  alternative_readings:
  - a wicked man ... righteous men
  - the wicked person ... righteous people
  rationale: The proverb contrasts moral classes, not specific male individuals. This
    follows the translation philosophy of gender-accurate rendering according to intent
    while preserving the representative force of the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
