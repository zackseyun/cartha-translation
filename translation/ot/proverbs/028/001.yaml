id: PRO.28.1
reference: Proverbs 28:1
source:
  edition: WLC
  text: נָ֣סוּ וְ/אֵין רֹדֵ֣ף רָשָׁ֑ע וְ֝/צַדִּיקִ֗ים כִּ/כְפִ֥יר יִבְטָֽח־׃
translation:
  text: The wicked flee when no one is pursuing, but the righteous are confident like
    a young lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The wicked flee though no one pursues ... but the righteous are bold
      like a lion.' The Hebrew allows slightly different nuances for both clauses;
      'young lion' reflects the more specific sense of כְּפִיר.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסוּ
  chosen: flee
  alternatives:
  - have fled
  - run away
  lexicon: HALOT
  rationale: From נסס/נוס 'to flee.' English present 'flee' fits proverbial, gnomic
    style better than a past tense and matches the general truth expressed.
- source_word: וְאֵין רֹדֵף
  chosen: when no one is pursuing
  alternatives:
  - though no one pursues
  - with no pursuer
  lexicon: HALOT
  rationale: אֵין + participle expresses the absence of a pursuer. Rendering with
    'when' gives natural English while preserving the circumstantial sense in the
    proverb.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: Though singular in Hebrew, the term functions generically in proverbial
    style. 'The wicked' is idiomatic English for a representative class and avoids
    over-specifying gender while preserving the moral category.
- source_word: וְצַדִּיקִים
  chosen: but the righteous
  alternatives:
  - but righteous people
  - but the righteous ones
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is the most natural
    English collective rendering and preserves the contrast with 'the wicked.'
- source_word: כִּכְפִיר
  chosen: like a young lion
  alternatives:
  - like a lion
  - like a lion cub
  lexicon: HALOT
  rationale: כפיר specifically denotes a young lion rather than the more general 'lion.'
    'Young lion' preserves the lexical distinction without sounding childish like
    'lion cub' in this wisdom context.
- source_word: יִבְטָח
  chosen: are confident
  alternatives:
  - trust
  - are secure
  - are bold
  lexicon: HALOT
  rationale: 'בטח often means ''trust'' or ''be secure,'' but in this simile the sense
    is settled fearlessness or confidence. Because the subject is plural (''the righteous''),
    idiomatic English shifts to plural agreement: ''are confident.'' This best captures
    the proverb''s contrast with the fearful flight of the wicked.'
