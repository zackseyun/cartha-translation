id: PRO.28.16
reference: Proverbs 28:16
source:
  edition: WLC
  text: נָגִ֗יד חֲסַ֣ר תְּ֭בוּנוֹת וְ/רַ֥ב מַעֲשַׁקּ֑וֹת שנאי בֶ֝֗צַע יַאֲרִ֥יךְ יָמִֽים׃פ
translation:
  text: A ruler lacking understanding is also great in acts of oppression, but one
    who hates unjust gain will prolong his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and commits much extortion.' The Hebrew phrase is literally 'and great
      in oppressions.'
    reason: lexical_alternative
  - marker: b
    text: '''Unjust gain'' can also be rendered ''greedy profit'' or ''ill-gotten
      gain.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד denotes one in authority. 'Ruler' is natural modern English and
    broad enough for the proverb's general application, avoiding the narrower or more
    monarchical nuance of 'prince.'
- source_word: חֲסַר תְּבוּנוֹת
  chosen: lacking understanding
  alternatives:
  - devoid of discernment
  - without insight
  lexicon: HALOT
  rationale: The adjective חֲסַר with plural abstract תְּבוּנוֹת expresses deficiency
    in discernment or good judgment. 'Lacking understanding' is idiomatic and preserves
    the wisdom-literature sense.
- source_word: וְרַב מַעֲשַׁקּוֹת
  chosen: is also great in acts of oppression
  alternatives:
  - and abundant in oppressions
  - and commits much extortion
  lexicon: HALOT
  rationale: The phrase literally means 'and great/much in oppressions.' Because English
    does not naturally say 'great in oppressions,' the rendering supplies 'acts of'
    to make the plural noun intelligible while preserving the sense of repeated oppressive
    conduct. 'Also' reflects the conjunctive waw linking the two characterizations.
- source_word: מַעֲשַׁקּוֹת
  chosen: acts of oppression
  alternatives:
  - oppressions
  - extortions
  lexicon: HALOT
  rationale: The noun refers to oppressive or exploitative acts. 'Acts of oppression'
    is clearer in English than the bare plural 'oppressions' and broader than 'extortions,'
    which may be too narrow.
- source_word: שׂנֵא בֶצַע
  chosen: one who hates unjust gain
  alternatives:
  - he who hates profit
  - one who hates greed
  lexicon: HALOT
  rationale: בֶצַע commonly denotes gain acquired by greed or unjust means. 'Unjust
    gain' captures the moral force better than the neutral 'profit.' The participle
    is rendered generically as 'one who hates' to express the proverbial contrast.
- source_word: יַאֲרִיךְ יָמִים
  chosen: will prolong his days
  alternatives:
  - will live long
  - will lengthen his days
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for long life. 'Will prolong his days'
    preserves the idiom's imagery while remaining understandable; 'will live long'
    is possible but less formally connected to the Hebrew wording.
