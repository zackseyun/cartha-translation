id: PRO.28.23
reference: Proverbs 28:23
source:
  edition: WLC
  text: מ֘וֹכִ֤יחַ אָדָ֣ם אַ֭חֲרַי חֵ֣ן יִמְצָ֑א מִֽ/מַּחֲלִ֥יק לָשֽׁוֹן׃
translation:
  text: Whoever rebukes a man will afterward find favor, more than one who flatters
    with the tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whoever rebukes a man will afterward find favor more than a smooth-tongued
      flatterer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹכִיחַ
  chosen: rebukes
  alternatives:
  - corrects
  - reproves
  lexicon: HALOT
  rationale: Hiphil participle of יכח denotes giving reproof or correction. 'Rebukes'
    best fits the proverb's contrast with flattery and preserves the confrontational
    sense without over-paraphrase.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual human object of rebuke, not humanity
    in general. Per the gender-accurate guideline, 'a man' matches the singular masculine/generic
    force better than the more neutral 'a person'.
- source_word: אַחֲרַי
  chosen: afterward
  alternatives:
  - after me
  - later
  lexicon: HALOT
  rationale: 'In this proverb the adverbial sense ''afterward/later'' is the plain
    contextual meaning: favor comes subsequently, not immediately. ''After me'' would
    be awkward and less likely in context.'
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חֵן commonly denotes favor or gracious acceptance. 'Favor' is idiomatic
    in English wisdom literature and avoids importing stronger theological overtones
    of 'grace' not demanded here.
- source_word: יִמְצָא
  chosen: will find
  alternatives:
  - finds
  - will obtain
  lexicon: HALOT
  rationale: The imperfect here naturally expresses a general future/result in proverbial
    style. 'Will find' communicates the expected outcome of the action.
- source_word: מִמַּחֲלִיק לָשׁוֹן
  chosen: more than one who flatters with the tongue
  alternatives:
  - rather than a smooth-tongued flatterer
  - more than one with a flattering tongue
  lexicon: HALOT
  rationale: 'The comparative מן before the participle indicates comparison: the rebuker
    finds favor more than the flatterer does. מחליק literally suggests making smooth,
    hence flattering; לָשׁוֹן is retained as ''tongue'' to preserve the Hebrew image
    while remaining natural in English.'
