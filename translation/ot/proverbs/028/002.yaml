id: PRO.28.2
reference: Proverbs 28:2
source:
  edition: WLC
  text: בְּ/פֶ֣שַֽׁע אֶ֭רֶץ רַבִּ֣ים שָׂרֶ֑י/הָ וּ/בְ/אָדָ֥ם מֵבִ֥ין יֹ֝דֵ֗עַ כֵּ֣ן
    יַאֲרִֽיךְ׃
translation:
  text: Because of a land's transgression, its rulers are many, but by a man of understanding
    and knowledge, stability endures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because of a land's transgression, its princes are many; but by a man
      who understands and knows, it is prolonged.' The Hebrew of the second line is
      difficult; the sense is that wise understanding brings lasting stability.
    reason: alternative_reading
  - marker: b
    text: '''Man'' translates Hebrew adam, a singular generic term here referring
      representatively to a human leader or counselor, not necessarily excluding others
      by sex.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶשַׁע
  chosen: Because of ... transgression
  alternatives:
  - In ... transgression
  - By ... transgression
  lexicon: HALOT
  rationale: 'The preposition ב with פשע here is best taken causally: the multiplication
    of rulers happens because of the land''s rebellion/transgression. ''Transgression''
    preserves the moral-legal force of פשע better than a flatter term like ''wrongdoing''.'
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the land
  - a country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/country/earth. In this proverb it refers to a political
    territory or nation. 'A land' fits the generic proverbial sense better than 'the
    land,' while remaining more literal than 'country'.
- source_word: רַבִּים שָׂרֶיהָ
  chosen: its rulers are many
  alternatives:
  - its princes are many
  - it has many officials
  lexicon: HALOT
  rationale: שׂרים are leaders, princes, or rulers. 'Rulers' is clear modern English
    and suits the political context. The clause likely means frequent changes or multiplication
    of leadership in a destabilized nation.
- source_word: וּבְאָדָם
  chosen: but by a man
  alternatives:
  - but with a man
  - and by a man
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the contrasting second line.
    Rendering ו as 'but' brings out the antithetical parallelism typical of Proverbs.
    אָדָם is singular and generic; per doctrine, the gender-accurate 'man' is retained.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - human
  lexicon: HALOT
  rationale: The doctrine specifies 'man / humankind' for אָדָם according to context.
    Here the singular generic wise leader/counselor is in view, so 'man' best matches
    the Hebrew form and proverbial style.
- source_word: מֵבִין יֹדֵעַ
  chosen: of understanding and knowledge
  alternatives:
  - who understands and knows
  - discerning and knowledgeable
  lexicon: HALOT
  rationale: The paired participles describe a person marked by discernment and knowledge.
    The nominal English phrase is smoother while preserving both terms distinctly;
    this avoids collapsing the Hebrew double description into a single adjective.
- source_word: כֵּן
  chosen: stability
  alternatives:
  - thus
  - so
  - right order
  lexicon: HALOT
  rationale: כֵּן literally means 'so/thus,' but in this difficult proverb it functions
    idiomatically in the sense of what is established or orderly. Many interpreters
    understand the line to mean that through a discerning, knowledgeable man the state's
    condition is prolonged or stabilized. 'Stability' makes the sense explicit in
    natural English.
- source_word: יַאֲרִיךְ
  chosen: endures
  alternatives:
  - is prolonged
  - lasts long
  lexicon: HALOT
  rationale: The Hiphil of ארך means to make long/prolong. Since the implied object
    is the land's stable order or condition, 'endures' communicates the result idiomatically
    in English. 'Is prolonged' is more formal but less natural in the proverb's flow.
