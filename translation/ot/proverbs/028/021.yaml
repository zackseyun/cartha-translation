id: PRO.28.21
reference: Proverbs 28:21
source:
  edition: WLC
  text: הַֽכֵּר פָּנִ֥ים לֹא ט֑וֹב וְ/עַל פַּת לֶ֝֗חֶם יִפְשַׁע גָּֽבֶר־־־־־׃
translation:
  text: To show partiality is not good, yet for a piece of bread a man will transgress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to recognize faces,' an idiom meaning to show partiality
      or favoritism.
    reason: lexical_alternative
  - marker: b
    text: Or 'for a morsel of bread'; the point is that a person may commit wrongdoing
      for something very small.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'a man' in a generic proverbial sense.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֵּר פָּנִים
  chosen: to show partiality
  alternatives:
  - to recognize faces
  - to respect persons
  - to show favoritism
  lexicon: HALOT
  rationale: The idiom literally means 'to recognize faces' and refers to partiality
    or favoritism in judgment or treatment. 'Show partiality' is clear modern English
    and preserves the ethical force without wooden literalism.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is not good at all
  lexicon: HALOT
  rationale: A straightforward rendering of the evaluative statement. 'Good' preserves
    the broad moral assessment of the Hebrew better than a narrower legal term like
    'right'.
- source_word: וְעַל
  chosen: yet for
  alternatives:
  - and for
  - even for
  - on account of
  lexicon: HALOT
  rationale: 'The conjunction plus preposition introduces a contrastive or consequential
    second line: despite the principle just stated, a person may sin for something
    trivial. ''Yet for'' captures the proverb''s adversative movement and the motive
    expressed by עַל.'
- source_word: פַּת לֶחֶם
  chosen: a piece of bread
  alternatives:
  - a morsel of bread
  - a crust of bread
  - a loaf of bread
  lexicon: HALOT
  rationale: The phrase denotes a small portion of bread, emphasizing how little gain
    can induce wrongdoing. 'Piece of bread' is natural English and retains the sense
    of triviality.
- source_word: יִפְשַׁע
  chosen: will transgress
  alternatives:
  - will sin
  - will offend
  - will do wrong
  lexicon: HALOT
  rationale: The verb פשע often conveys transgression or rebellion. Here it refers
    to committing wrongdoing for gain. 'Transgress' preserves the moral-legal weight
    more strongly than the broader 'do wrong.'
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - a person
  - a strong man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in proverbial style. Per the project's gender-accurate policy, 'a man' is retained
    rather than neutralized to 'a person.'
