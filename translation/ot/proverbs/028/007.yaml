id: PRO.28.7
reference: Proverbs 28:7
source:
  edition: WLC
  text: נוֹצֵ֣ר תּ֭וֹרָה בֵּ֣ן מֵבִ֑ין וְ/רֹעֶה זֽ֝וֹלְלִ֗ים יַכְלִ֥ים אָבִֽי/ו׃
translation:
  text: Whoever keeps the law is a discerning son, but he who companions with gluttons
    shames his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'associates with gluttons'; literally, 'shepherds gluttons.' The Hebrew
      verb carries a pastoral image used idiomatically for keeping company with certain
      people.
    reason: lexical_alternative
  - marker: b
    text: '''Gluttons'' may also be understood more broadly as wastrels or profligates—people
      given to excess and dissipation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹצֵר
  chosen: keeps
  alternatives:
  - guards
  - observes
  lexicon: HALOT
  rationale: The participle denotes keeping, guarding, or observing. 'Keeps' is idiomatic
    in English with 'law' and preserves the sense of faithful observance without sounding
    wooden.
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - Torah
  lexicon: HALOT
  rationale: In Proverbs, תּוֹרָה can mean instruction broadly, but with נֹצֵר and
    in wisdom context it naturally refers to authoritative teaching/law. 'The law'
    is concise and idiomatic; 'instruction' is possible but weaker here. 'Torah' would
    be more transliterative than needed in this context.
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per gender-accurate philosophy,
    'son' should be retained rather than neutralized to 'child'.
- source_word: מֵבִין
  chosen: discerning
  alternatives:
  - understanding
  - prudent
  - wise
  lexicon: HALOT
  rationale: The participle describes one who has understanding. 'Discerning' reads
    naturally in English as an attributive description of 'son' and preserves the
    wisdom nuance better than the more abstract 'understanding'.
- source_word: וְרֹעֶה
  chosen: companions with
  alternatives:
  - associates with
  - shepherds
  - feeds
  lexicon: HALOT
  rationale: Literally the verb is 'shepherds' or 'pastures,' but in this construction
    it idiomatically means keeping company with or associating with. 'Companions with'
    preserves the relational sense without flattening the metaphor entirely; 'associates
    with' is a viable alternative.
- source_word: זֹלְלִים
  chosen: gluttons
  alternatives:
  - wastrels
  - riotous eaters
  - profligates
  lexicon: HALOT
  rationale: The term refers to those given to excessive eating and dissipation. 'Gluttons'
    is the most direct lexical equivalent and matches common wisdom-language usage,
    though the broader sense of wastrel/profligate is worth preserving in a footnote.
- source_word: יַכְלִים
  chosen: shames
  alternatives:
  - disgraces
  - brings shame on
  lexicon: HALOT
  rationale: The Hiphil conveys causing shame or disgrace. 'Shames' is concise and
    direct; 'brings shame on' is slightly more expansive but not necessary in the
    main text.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained literally.
