id: PRO.28.8
reference: Proverbs 28:8
source:
  edition: WLC
  text: מַרְבֶּ֣ה ה֭וֹנ/וֹ בְּ/נֶ֣שֶׁךְ ו/ב/תרבית לְ/חוֹנֵ֖ן דַּלִּ֣ים יִקְבְּצֶֽ/נּוּ׃
translation:
  text: Whoever increases his wealth by interest and profit gathers it for one who
    is gracious to the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by usury and increase.' The Hebrew terms refer to gain from lending,
      often with an exploitative sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'for one who is generous to the poor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבֶּה
  chosen: increases
  alternatives:
  - multiplies
  - makes great
  lexicon: HALOT
  rationale: Hiphil participle of רבה denotes causing to become many/great. 'Increases'
    is natural modern English and fits the proverbial statement about accumulating
    wealth.
- source_word: הוֹנוֹ
  chosen: his wealth
  alternatives:
  - his riches
  - his substance
  lexicon: HALOT
  rationale: הוֹן commonly refers to wealth, riches, or substance. 'Wealth' is clear
    and idiomatic in contemporary English.
- source_word: בְּנֶשֶׁךְ
  chosen: by interest
  alternatives:
  - by usury
  - by biting interest
  lexicon: HALOT
  rationale: נֶשֶׁךְ literally relates to 'bite' and idiomatically denotes interest
    on a loan, often with exploitative connotations. 'Interest' communicates the economic
    practice in readable English; the exploitative nuance is preserved by the proverb's
    negative outcome and the pairing with the poor.
- source_word: וּבְתַרְבִּית
  chosen: and profit
  alternatives:
  - and increase
  - and usury
  lexicon: HALOT
  rationale: תַּרְבִּית denotes increase, gain, or profit, especially additional amount
    exacted in lending. 'Profit' distinguishes it from the previous term while preserving
    the sense of financial gain.
- source_word: לְחוֹנֵן
  chosen: for one who is gracious
  alternatives:
  - for one who shows favor
  - for one who is generous
  lexicon: HALOT
  rationale: The participle of חנן means to show favor or be gracious. 'Gracious'
    preserves the lexical connection to favor/mercy better than the more interpretive
    'generous,' while still reading naturally.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דלים refers to the poor, lowly, or weak. In this economic context, 'the
    poor' is the most direct and idiomatic rendering.
- source_word: יִקְבְּצֶנּוּ
  chosen: gathers it
  alternatives:
  - collects it
  - stores it up
  lexicon: HALOT
  rationale: קבץ means gather, collect, assemble. With the 3ms suffix referring back
    to wealth, 'gathers it' preserves the concise proverbial force and allows the
    irony that the accumulator is really amassing wealth for another.
