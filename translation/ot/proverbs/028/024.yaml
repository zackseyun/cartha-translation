id: PRO.28.24
reference: Proverbs 28:24
source:
  edition: WLC
  text: גּוֹזֵ֤ל אָ֘בִ֤י/ו וְ/אִמּ֗/וֹ וְ/אֹמֵ֥ר אֵֽין פָּ֑שַׁע חָבֵ֥ר ה֝֗וּא לְ/אִ֣ישׁ
    מַשְׁחִֽית׀־׃
translation:
  text: Whoever robs his father and his mother and says, “It is no transgression,”
    is a companion to a destructive man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “is a companion with a destroyer” / “is a companion to one who destroys.”
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹזֵל
  chosen: robs
  alternatives:
  - steals from
  - plunders
  lexicon: HALOT
  rationale: The Qal participle of גזל denotes taking by force or wrongful seizure.
    'Robs' captures the seriousness better than the flatter 'steals from,' while remaining
    idiomatic in English.
- source_word: אָבִיו וְאִמּוֹ
  chosen: his father and his mother
  alternatives:
  - his parents
  lexicon: HALOT
  rationale: The Hebrew names each parent individually. Rendering both explicitly
    preserves the form and rhetorical force better than collapsing to 'parents.'
- source_word: וְאֹמֵר
  chosen: and says
  alternatives:
  - while saying
  lexicon: HALOT
  rationale: Simple coordination reflects the Hebrew conjunction plus participle naturally
    in English.
- source_word: אֵין פָּשַׁע
  chosen: It is no transgression
  alternatives:
  - There is no offense
  - It is not a crime
  - This is no sin
  lexicon: HALOT
  rationale: פָּשַׁע commonly denotes transgression, rebellion, or offense. 'Transgression'
    preserves the moral dimension without over-specifying legal or cultic categories.
    The supplied 'It is' makes the English idiomatic.
- source_word: חָבֵר
  chosen: a companion
  alternatives:
  - an associate
  - a friend
  lexicon: HALOT
  rationale: חבר denotes one joined with or associated with another. 'Companion' conveys
    moral association without implying affection as strongly as 'friend' might.
- source_word: לְאִישׁ מַשְׁחִית
  chosen: to a destructive man
  alternatives:
  - with a destroyer
  - to a man who destroys
  - to a ruinous man
  lexicon: HALOT
  rationale: מַשְׁחִית is a Hiphil participial form meaning one who destroys or ruins.
    The lamed after חָבֵר marks relation/association. 'A companion to a destructive
    man' is smooth English and preserves the comparison of moral kinship.
- source_word: הוּא
  chosen: is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The pronoun functions as the copular subject in the clause. English normally
    omits the repeated pronoun and expresses it with 'is.'
