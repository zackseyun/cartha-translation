id: PRO.28.11
reference: Proverbs 28:11
source:
  edition: WLC
  text: חָכָ֣ם בְּ֭/עֵינָי/ו אִ֣ישׁ עָשִׁ֑יר וְ/דַ֖ל מֵבִ֣ין יַחְקְרֶֽ/נּוּ׃
translation:
  text: A rich man is wise in his own eyes, but a poor man who has understanding searches
    him out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "finds him out" or "investigates him." The Hebrew verb can carry the
      sense of searching out, examining, or penetrating someone's true character.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  chosen: wise
  alternatives:
  - thinks himself wise
  lexicon: HALOT
  rationale: Predicate adjective meaning 'wise.' The following phrase 'in his own
    eyes' already conveys the subjective/self-assessing nuance, so 'wise' is retained
    in the main text rather than expanding to an interpretive paraphrase.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for one's own estimation or self-perception.
    'His own eyes' makes the reflexive force explicit and reads naturally in English.
- source_word: אִישׁ עָשִׁיר
  chosen: a rich man
  alternatives:
  - a wealthy man
  - a rich person
  lexicon: HALOT
  rationale: The noun-adjective combination straightforwardly denotes a rich man.
    Per translation philosophy, the masculine singular is kept as gender-accurate
    rather than neutralized.
- source_word: וְדַל
  chosen: but a poor man
  alternatives:
  - and a poor man
  - yet a poor man
  lexicon: HALOT
  rationale: Though waw is formally 'and,' in this proverb it marks contrast with
    the first colon; 'but' best reflects the sense in idiomatic English. 'Dal' denotes
    one of low means, hence 'poor.'
- source_word: מֵבִין
  chosen: who has understanding
  alternatives:
  - discerning
  - intelligent
  - understanding
  lexicon: HALOT
  rationale: Participle from בין denotes discernment or understanding. Rendering it
    as a relative clause modifies 'poor man' smoothly in English while preserving
    the attributive sense.
- source_word: יַחְקְרֶנּוּ
  chosen: searches him out
  alternatives:
  - discerns him
  - investigates him
  - finds him out
  lexicon: HALOT
  rationale: From חקר, 'to search out, investigate, examine.' With the 3ms suffix,
    the poor but discerning man penetrates or exposes the rich man's true condition/pretensions.
    'Searches him out' preserves the investigative metaphor without overinterpreting.
