theological_decisions:
- issue: Rendering of אָדָם in a generic singular proverb
  chosen_reading: a man
  alternative_readings:
  - humankind
  - a person
  - people
  rationale: The Hebrew uses singular אדם generically. Following the stated doctrine,
    the translation keeps the gender-accurate singular rather than flattening to a
    plural or neutral collective, while preserving the representative sense in a footnote.
