id: PRO.28.12
reference: Proverbs 28:12
source:
  edition: WLC
  text: בַּ/עֲלֹ֣ץ צַ֭דִּיקִים רַבָּ֣ה תִפְאָ֑רֶת וּ/בְ/ק֥וּם רְ֝שָׁעִ֗ים יְחֻפַּ֥שׂ
    אָדָֽם׃
translation:
  text: When the righteous rejoice, there is great glory, but when the wicked rise,
    a man is hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person' or 'people' in the sense that ordinary people go into hiding
      when the wicked gain power.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֹץ
  chosen: When ... rejoice
  alternatives:
  - In the rejoicing of
  - When ... exult
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of עלץ functions temporally
    here: ''when rejoicing occurs.'' ''Rejoice'' is natural modern English; ''exult''
    is possible but less accessible.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A substantival plural adjective referring to righteous persons. 'The
    righteous' is concise and idiomatic in wisdom literature.
- source_word: רַבָּה
  chosen: there is great
  alternatives:
  - is abundant
  - abounds
  lexicon: HALOT
  rationale: Predicative adjective modifying the following noun תפארת. Rendering with
    existential 'there is great' produces natural English while preserving the sense
    of abundance.
- source_word: תִפְאָרֶת
  chosen: glory
  alternatives:
  - splendor
  - honor
  - beauty
  lexicon: HALOT
  rationale: The noun can denote beauty, honor, or splendor. In this proverb it refers
    to public flourishing and honor attending righteous ascendancy. 'Glory' best captures
    the elevated social sense without over-paraphrasing.
- source_word: וּבְקוּם
  chosen: but when ... rise
  alternatives:
  - and when ... arise
  - but in the rising of
  lexicon: HALOT
  rationale: 'The conjunction marks contrast with the first colon, and the preposition
    with infinitive construct of קום is temporal: ''when ... rise/arise.'' ''Rise''
    fits the political-social context of gaining power.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard substantival plural for morally wicked persons; 'the wicked'
    is the conventional and accurate wisdom-literature rendering.
- source_word: יְחֻפַּשׂ
  chosen: is hidden
  alternatives:
  - hides himself
  - is sought out
  - is searched for
  lexicon: HALOT
  rationale: 'From חפשׂ in the Pual, the form is best taken as passive: ''is hidden''
    or ''is concealed.'' In context the sense is that ordinary people withdraw from
    public view under wicked rule. Alternatives such as ''is sought out'' reflect
    a different semantic development and fit the proverb less well.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - people
  - a person
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here אדם is singular
    generic, and the proverb contrasts social conditions affecting the ordinary individual.
    'A man' preserves the Hebrew form; inclusivity can be clarified in a footnote.
