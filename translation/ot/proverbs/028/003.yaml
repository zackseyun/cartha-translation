id: PRO.28.3
reference: Proverbs 28:3
source:
  edition: WLC
  text: גֶּ֣בֶר רָ֭שׁ וְ/עֹשֵׁ֣ק דַּלִּ֑ים מָטָ֥ר סֹ֝חֵ֗ף וְ/אֵ֣ין לָֽחֶם׃
translation:
  text: A poor man who oppresses the lowly is like a sweeping rain that leaves no
    food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and there is no bread.' 'Bread' here likely stands for food
      or provision generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - strong man
  - person
  lexicon: HALOT
  rationale: The noun commonly denotes a man/male person, sometimes with nuance of
    strength. Here it introduces a representative individual in a proverb. In keeping
    with the project's gender-accurate policy, 'man' is preferred over the more generic
    'person' because the Hebrew is grammatically masculine and proverbial.
- source_word: רָשׁ
  chosen: poor
  alternatives:
  - needy
  - impoverished
  lexicon: HALOT
  rationale: The adjective denotes one who is poor or lacking resources. 'Poor' is
    the most natural and direct English equivalent in this wisdom context.
- source_word: עֹשֵׁק
  chosen: who oppresses
  alternatives:
  - oppressing
  - extorts from
  - defrauds
  lexicon: HALOT
  rationale: The participle from עשק carries the sense of exploiting, oppressing,
    or defrauding. 'Who oppresses' gives clear English syntax after 'a poor man' while
    preserving the active, ongoing force of the participle.
- source_word: דַּלִּים
  chosen: the lowly
  alternatives:
  - the poor
  - the weak
  lexicon: HALOT
  rationale: דלים refers to those of low status, weakness, or poverty. Since the verse
    already uses רָשׁ for 'poor,' rendering this as 'the lowly' preserves lexical
    distinction while still overlapping semantically with economic vulnerability.
- source_word: מָטָר
  chosen: rain
  alternatives:
  - downpour
  lexicon: HALOT
  rationale: The noun straightforwardly means 'rain.' 'Rain' is retained, with the
    modifying participle supplying the destructive nuance.
- source_word: סֹחֵף
  chosen: sweeping
  alternatives:
  - driving
  - washing away
  - flooding
  lexicon: HALOT
  rationale: The participle describes something that sweeps away or carries off. 'Sweeping'
    is concise and idiomatic with 'rain,' conveying destructive force without overparaphrasing.
- source_word: וְאֵין לָחֶם
  chosen: that leaves no food
  alternatives:
  - and there is no bread
  - with no bread left
  lexicon: HALOT
  rationale: Literally, 'and there is no bread.' In context the image is of destructive
    rain ruining sustenance. 'That leaves no food' communicates the result in natural
    English while broadening 'bread' to its metonymic sense of food/provision. The
    more literal alternative is preserved in a footnote.
