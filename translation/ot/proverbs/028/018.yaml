id: PRO.28.18
reference: Proverbs 28:18
source:
  edition: WLC
  text: הוֹלֵ֣ךְ תָּ֭מִים יִוָּשֵׁ֑עַ וְ/נֶעְקַ֥שׁ דְּ֝רָכַ֗יִם יִפּ֥וֹל בְּ/אֶחָֽת׃
translation:
  text: Whoever walks in integrity will be delivered, but one crooked in his ways
    will fall all at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be saved' or 'will be kept safe.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in one'; likely meaning 'all at once' or 'suddenly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: walks
  alternatives:
  - goes
  - lives
  lexicon: HALOT
  rationale: הלך in wisdom literature commonly functions metaphorically for one's
    manner of life. 'Walks' preserves the Hebrew image while remaining natural English.
- source_word: תָּמִים
  chosen: in integrity
  alternatives:
  - blameless
  - upright
  - with integrity
  lexicon: HALOT
  rationale: תמים can mean blameless, whole, or having integrity. Here it describes
    moral wholeness in conduct. 'In integrity' is idiomatic with 'walks' and avoids
    implying sinless perfection.
- source_word: יִוָּשֵׁעַ
  chosen: will be delivered
  alternatives:
  - will be saved
  - will be kept safe
  - will be rescued
  lexicon: HALOT
  rationale: The Niphal of ישׁע here most naturally refers to being delivered or kept
    safe in a wisdom/proverbial sense, not specifically soteriological salvation.
    'Will be delivered' preserves the passive sense without importing later theological
    freight.
- source_word: נֶעְקַשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The participial/adjectival form from עקשׁ denotes moral crookedness or
    perversity. 'Crooked' is vivid, accessible, and pairs well with the path/ways
    imagery.
- source_word: דְּרָכַיִם
  chosen: his ways
  alternatives:
  - his paths
  - his conduct
  lexicon: HALOT
  rationale: Though the noun is dual/plural ('ways'), in English 'his ways' naturally
    conveys patterns of conduct and preserves the metaphor. The masculine singular
    is retained as gender-accurate generic per translation philosophy.
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - will stumble
  - will come to ruin
  lexicon: HALOT
  rationale: נפל literally means 'fall' and in wisdom contexts can imply downfall.
    'Will fall' keeps the concrete metaphor and lets the proverb's warning stand without
    over-interpretation.
- source_word: בְּאֶחָת
  chosen: all at once
  alternatives:
  - in one thing
  - in one moment
  - into one
  lexicon: HALOT
  rationale: The phrase is idiomatic and likely means suddenly or at one stroke. 'All
    at once' best captures the adverbial force in clear modern English. A more literal
    alternative is preserved in a footnote because the phrase is somewhat debated.
