theological_decisions:
- issue: Scope of יִוָּשֵׁעַ in a wisdom proverb
  chosen_reading: temporal/general deliverance rather than explicitly salvific 'saved'
  alternative_readings:
  - will be saved
  rationale: In Proverbs, ישׁע language often concerns practical preservation and
    deliverance. Rendering it 'saved' in English could suggest a narrower doctrinal
    sense not demanded by the context. This preserves the proverb's wisdom setting
    without denying broader theological resonance.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than import doctrinal claims the
    text does not make.'
- issue: Generic masculine expression
  chosen_reading: retain singular masculine in 'his ways' while using inclusive 'whoever'
    for the subject
  alternative_readings:
  - their ways
  - the one whose ways are crooked
  rationale: The Hebrew is grammatically masculine singular with representative force.
    'Whoever ... his ways' reflects the source more closely than a fully gender-neutral
    recast, while remaining natural enough in English.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
