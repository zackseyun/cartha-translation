theological_decisions:
- issue: Scope of תּוֹרָה in wisdom context
  chosen_reading: Rendered as 'the law' with the sense of God's authoritative instruction
  alternative_readings:
  - the instruction
  - teaching
  rationale: The verse condemns refusal to heed divine instruction and states that
    such refusal renders prayer abhorrent. 'The law' best preserves the covenantal
    and authoritative force without narrowing the text to merely legal code; the broader
    nuance is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
