id: PRO.28.9
reference: Proverbs 28:9
source:
  edition: WLC
  text: מֵסִ֣יר אָ֭זְנ/וֹ מִ/שְּׁמֹ֣עַ תּוֹרָ֑ה גַּֽם תְּ֝פִלָּת֗/וֹ תּוֹעֵבָֽה־׃
translation:
  text: Whoever turns his ear away from hearing the law—even his prayer is an abomination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' or 'teaching' for 'the law' (Hebrew torah), emphasizing
      God's authoritative instruction more broadly, not only legal statutes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  chosen: turns away
  alternatives:
  - removes
  - turns aside
  lexicon: HALOT
  rationale: The Hiphil participle of סור here describes a habitual or characteristic
    action. 'Turns away' is idiomatic in English and preserves the volitional sense
    better than the more wooden 'removes.' Rendering the participle with 'whoever
    turns away' captures the proverb's generic subject.
- source_word: אָזְנוֹ
  chosen: his ear
  alternatives:
  - his hearing
  lexicon: HALOT
  rationale: Literally 'his ear.' Keeping the body-part metaphor preserves the Hebrew
    idiom of refusing to listen, while remaining natural in English.
- source_word: מִשְּׁמֹעַ
  chosen: from hearing
  alternatives:
  - from listening to
  - so as not to hear
  lexicon: HALOT
  rationale: The preposition with infinitive construct expresses turning away from
    the act of hearing. 'From hearing' is close to the Hebrew; the fuller English
    clause 'turns his ear away from hearing' remains understandable and preserves
    the source structure.
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in wisdom literature it often
    carries the sense of authoritative divine instruction. 'The law' preserves that
    weight and matches common biblical usage, while still allowing the broader sense
    of God's revealed instruction. Because 'instruction' is also viable, it is preserved
    in a footnote.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Here גַּם heightens the statement: not only is the person disobedient,
    but even his prayer is unacceptable. ''Even'' conveys the emphatic force better
    than the flatter ''also.'''
- source_word: תְּפִלָּתוֹ
  chosen: his prayer
  alternatives:
  - his plea
  lexicon: HALOT
  rationale: The noun normally denotes prayer. 'Prayer' is the most direct and contextually
    appropriate rendering.
- source_word: תּוֹעֵבָה
  chosen: an abomination
  alternatives:
  - detestable
  - something abhorrent
  lexicon: HALOT
  rationale: This term is strong and morally charged in the Hebrew Bible, often denoting
    something detestable before God. 'An abomination' preserves the severity and established
    biblical resonance better than softer alternatives.
