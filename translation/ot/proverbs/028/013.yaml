id: PRO.28.13
reference: Proverbs 28:13
source:
  edition: WLC
  text: מְכַסֶּ֣ה פְ֭שָׁעָי/ו לֹ֣א יַצְלִ֑יחַ וּ/מוֹדֶ֖ה וְ/עֹזֵ֣ב יְרֻחָֽם׃
translation:
  text: Whoever covers his transgressions will not prosper, but he who confesses and
    forsakes them will be shown mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conceals' or 'hides' his transgressions.
    reason: lexical_alternative
  - marker: b
    text: Or 'will obtain mercy.' The Hebrew says literally 'will be shown mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  chosen: covers
  alternatives:
  - conceals
  - hides
  lexicon: HALOT
  rationale: The participle from כסה means to cover/conceal. 'Covers' preserves the
    concrete metaphor and the moral sense of hiding wrongdoing without over-paraphrasing.
- source_word: פְשָׁעָיו
  chosen: his transgressions
  alternatives:
  - his rebellions
  - his offenses
  - his sins
  lexicon: HALOT
  rationale: פשע often denotes transgression/rebellion, not merely generic wrongdoing.
    'Transgressions' is natural English and preserves the stronger covenantal-moral
    nuance better than the broader 'sins.'
- source_word: יַצְלִיחַ
  chosen: will not prosper
  alternatives:
  - will not succeed
  - will not thrive
  lexicon: HALOT
  rationale: The Hiphil of צלח commonly conveys succeeding/prospering. 'Prosper' fits
    wisdom-literature style and includes the broader sense of not flourishing under
    God's moral order.
- source_word: וּמוֹדֶה
  chosen: confesses
  alternatives:
  - acknowledges
  - admits
  lexicon: HALOT
  rationale: ידה in this stem can mean confess/give thanks depending on context. Here,
    with sins as object and paired with forsaking, 'confesses' is the clearest and
    most idiomatic rendering.
- source_word: וְעֹזֵב
  chosen: forsakes
  alternatives:
  - abandons
  - leaves
  lexicon: HALOT
  rationale: עזב means leave/forsake. 'Forsakes' is the standard moral-ethical collocation
    in English for abandoning sinful conduct and pairs well with 'confesses.'
- source_word: יְרֻחָם
  chosen: will be shown mercy
  alternatives:
  - will obtain mercy
  - will receive compassion
  - will be pitied
  lexicon: HALOT
  rationale: The passive of רחם denotes receiving compassion/mercy. 'Will be shown
    mercy' is clear modern English and preserves the passive sense without specifying
    the agent, as in the Hebrew.
- source_word: implicit object after וּמוֹדֶה וְעֹזֵב
  chosen: them
  alternatives:
  - his transgressions
  - it
  lexicon: Hebrew syntax
  rationale: English idiom requires an explicit object for 'forsakes,' and the object
    is naturally carried over from 'his transgressions.' 'Them' avoids awkward repetition
    while accurately reflecting the Hebrew ellipsis.
- source_word: masculine singular participles/pronouns
  chosen: Whoever ... he who ... his
  alternatives:
  - The one who ... will ...
  - Whoever ... they ... their
  lexicon: Hebrew grammar
  rationale: The Hebrew uses masculine singular forms with representative/generic
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    plural/gender-neutral forms. 'Whoever' plus 'he who' preserves the generic singular
    naturally in English.
