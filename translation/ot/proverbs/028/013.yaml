theological_decisions:
- issue: Agent of mercy left implicit in passive verb
  chosen_reading: Retain passive 'will be shown mercy' without making God the explicit
    subject in the main text.
  alternative_readings:
  - God will show him mercy
  - will obtain mercy
  rationale: The proverb strongly implies divine moral order, and likely divine mercy,
    but the Hebrew passive does not explicitly name God. Preserving the passive avoids
    importing a subject not stated while keeping the theological force intact.
  doctrine_reference: Translation philosophy §1, §3
