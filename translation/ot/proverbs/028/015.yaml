id: PRO.28.15
reference: Proverbs 28:15
source:
  edition: WLC
  text: אֲרִי נֹ֭הֵם וְ/דֹ֣ב שׁוֹקֵ֑ק מֹשֵׁ֥ל רָ֝שָׁ֗ע עַ֣ל עַם דָּֽל־־׃
translation:
  text: Like a roaring lion and a charging bear is a wicked ruler over a poor people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a ravenous bear' or 'a rushing bear'; the Hebrew participle for the
      bear conveys aggressive threat and may emphasize either its violent movement
      or its predatory hunger.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרִי
  chosen: lion
  alternatives:
  - young lion
  lexicon: HALOT
  rationale: The noun denotes a lion generally. 'Lion' is the natural English equivalent
    here in a simile; 'young lion' is possible in some contexts but is not required
    by this form.
- source_word: נֹהֵם
  chosen: roaring
  alternatives:
  - growling
  lexicon: HALOT
  rationale: The participle describes the sound made by the lion. 'Roaring' is the
    most idiomatic and vivid English rendering in this proverb.
- source_word: דֹב
  chosen: bear
  lexicon: HALOT
  rationale: Straightforward animal term; 'bear' is the standard equivalent.
- source_word: שׁוֹקֵק
  chosen: charging
  alternatives:
  - ravenous
  - rushing
  lexicon: HALOT
  rationale: The participle can convey violent movement or aggressive onrush. In parallel
    with 'roaring lion,' 'charging bear' best captures the threatening image in clear
    modern English. 'Ravenous' is possible by association with predatory threat, but
    the verbal idea is more kinetic.
- source_word: מֹשֵׁל
  chosen: ruler
  alternatives:
  - one who rules
  - governor
  lexicon: HALOT
  rationale: The participle functions substantivally for a person exercising rule.
    'Ruler' is concise and idiomatic.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - evil
  lexicon: HALOT
  rationale: The adjective characterizes the ruler morally. 'Wicked' is the standard
    wisdom-literature term and preserves the ethical force.
- source_word: עַל
  chosen: over
  alternatives:
  - against
  lexicon: HALOT
  rationale: In context of governance, the preposition indicates authority over a
    people rather than merely hostility against them.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: The term refers to a populace under rule. 'People' fits the proverb's
    social focus better than the more political 'nation.'
- source_word: דָּל
  chosen: poor
  alternatives:
  - weak
  - lowly
  lexicon: HALOT
  rationale: The adjective often denotes poverty or social weakness. 'Poor' is the
    clearest default here, while also implying vulnerability in context.
