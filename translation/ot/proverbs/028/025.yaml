id: PRO.28.25
reference: Proverbs 28:25
source:
  edition: WLC
  text: רְחַב נֶ֭פֶשׁ יְגָרֶ֣ה מָד֑וֹן וּ/בוֹטֵ֖חַ עַל יְהוָ֣ה יְדֻשָּֽׁן־־׃
translation:
  text: A greedy person stirs up strife, but the one who trusts in Yahweh will be enriched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'broad of soul,' an idiom for a grasping or insatiable appetite; alternatively, 'the proud person' or 'the one of large appetite.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'will be made fat,' a Hebrew image for flourishing or abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְחַב נֶפֶשׁ
  chosen: a greedy man
  alternatives:
  - one broad of soul
  - the broad-souled person
  - the proud person
  - the one of large appetite
  lexicon: HALOT, BDB
  rationale: Literally 'broad of soul,' an idiom for an expansive, grasping appetite or insatiable desire. In Proverbs this points to greed/covetous self-seeking rather than commendable generosity. 'Greedy man' captures the moral sense in natural English while preserving the masculine singular representative force.
- source_word: יְגָרֶה
  chosen: stirs up
  alternatives:
  - provokes
  - incites
  lexicon: HALOT, BDB
  rationale: The Hiphil form conveys causing or provoking. 'Stirs up' is idiomatic English for causing conflict and fits the proverb's concise style.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - contention
  - quarreling
  lexicon: HALOT, BDB
  rationale: A common wisdom-term for interpersonal conflict. 'Strife' is concise, natural, and suitably weighty.
- source_word: וּבֹטֵחַ
  chosen: but the one who trusts
  alternatives:
  - and the one who trusts
  - but whoever trusts
  lexicon: HALOT, BDB
  rationale: The conjunction here is best taken adversatively in the proverb's antithetical parallelism. 'The one who trusts' preserves the participial, character-describing force.
- source_word: עַל יְהוָה
  chosen: in the LORD
  alternatives:
  - on the LORD
  lexicon: HALOT, BDB
  rationale: Hebrew uses 'on,' but idiomatic English with 'trust' normally takes 'in.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְדֻשָּׁן
  chosen: will prosper
  alternatives:
  - will be enriched
  - will be made fat
  - will thrive
  lexicon: HALOT, BDB
  rationale: Literally 'will be made fat,' a Hebrew image for flourishing, abundance, or well-being. 'Will prosper' communicates the metaphor's sense in readable modern English without importing materialistic excess; 'thrive' was possible, but 'prosper' better matches the wisdom contrast.
