theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Representative masculine in proverbial subject
  chosen_reading: man in the first colon; the one who in the second
  alternative_readings:
  - a greedy person ... the one who trusts
  - the greedy person ... will prosper
  rationale: The Hebrew is grammatically masculine singular and functions representatively in wisdom literature. 'A greedy man' preserves gender-accurate force per doctrine, while the second colon uses a natural English generic expression without changing the sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
