id: PRO.28.6
reference: Proverbs 28:6
source:
  edition: WLC
  text: טֽוֹב רָ֭שׁ הוֹלֵ֣ךְ בְּ/תֻמּ֑/וֹ מֵ/עִקֵּ֥שׁ דְּ֝רָכַ֗יִם וְ/ה֣וּא עָשִֽׁיר־׃
translation:
  text: Better is a poor man who walks in his integrity than one who is crooked in
    his ways, though he is rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Better is a poor man walking in his integrity than one
      crooked in ways, and he is rich.' The Hebrew final clause literally reads 'and
      he is rich,' referring to the crooked person.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - is better
  - better
  lexicon: HALOT
  rationale: 'In Hebrew proverbial comparison, טוֹב at the head of the clause functions
    comparatively: ''better is ... than ...''. Rendering with ''Better is'' preserves
    the aphoristic comparative structure.'
- source_word: רָשׁ
  chosen: a poor man
  alternatives:
  - the poor man
  - a poor person
  lexicon: HALOT
  rationale: רָשׁ denotes a poor or impoverished person. 'A poor man' matches the
    singular masculine form and the proverb's representative individual sense. This
    follows the project's gender-accurate policy rather than neutralizing to 'person'.
- source_word: הוֹלֵךְ
  chosen: who walks
  alternatives:
  - walking
  - who lives
  lexicon: HALOT
  rationale: הלך commonly means 'walk,' and in wisdom literature often carries ethical-conduct
    nuance. 'Who walks' preserves the Hebrew metaphor while remaining natural English.
- source_word: בְּתֻמּוֹ
  chosen: in his integrity
  alternatives:
  - in his blamelessness
  - with integrity
  lexicon: HALOT
  rationale: תֹּם/תֻּם conveys integrity, wholeness, or blamelessness. 'In his integrity'
    is idiomatic and preserves the moral quality without overstating sinlessness.
- source_word: מֵעִקֵּשׁ
  chosen: than one who is crooked
  alternatives:
  - than the crooked one
  - than one who is perverse
  lexicon: HALOT
  rationale: 'With comparative מִן after טוֹב, this introduces the second term of
    comparison: ''than [one who is] crooked.'' ''Crooked'' fits wisdom-language contrast
    with integrity and is more readable than ''perverse'' here.'
- source_word: דְּרָכַיִם
  chosen: in his ways
  alternatives:
  - in conduct
  - in his paths
  lexicon: HALOT
  rationale: Though formally dual/plural ('ways'), the term idiomatically refers to
    one's manner of life or conduct. 'In his ways' keeps the Hebrew image and pairs
    naturally with 'walks.'
- source_word: וְהוּא עָשִׁיר
  chosen: though he is rich
  alternatives:
  - and he is rich
  - while he is rich
  lexicon: HALOT
  rationale: 'The final phrase identifies the crooked person as rich. In English,
    ''though he is rich'' makes explicit the concessive force implied by the proverb''s
    contrast: poverty with integrity is better than wealth with crookedness. This
    is an optimal-equivalence adjustment for clarity, not a change in referent.'
