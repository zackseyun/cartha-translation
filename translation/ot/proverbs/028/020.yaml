id: PRO.28.20
reference: Proverbs 28:20
source:
  edition: WLC
  text: אִ֣ישׁ אֱ֭מוּנוֹת רַב בְּרָכ֑וֹת וְ/אָ֥ץ לְ֝/הַעֲשִׁ֗יר לֹ֣א יִנָּקֶֽה־׃
translation:
  text: A faithful man will abound with blessings, but one who hastens to become rich
    will not go unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be held innocent' / 'will not be acquitted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: Rendered 'man' to reflect the grammatically masculine singular Hebrew
    with representative/generic force, in keeping with the gender-accurate policy.
    English idiom in Proverbs commonly uses 'man' for a representative individual.
- source_word: אֱמוּנוֹת
  chosen: faithful
  alternatives:
  - faithfulness
  - trustworthiness
  - steadfastness
  lexicon: HALOT
  rationale: 'The plural abstract noun after אִישׁ functions adjectivally: ''a man
    of faithfulnesses,'' i.e., a faithful/trustworthy man. ''Faithful'' is the most
    natural English rendering and fits the wisdom context of reliability and integrity.'
- source_word: רַב
  chosen: will abound
  alternatives:
  - is great in
  - has many
  lexicon: HALOT
  rationale: Though formally an adjective meaning 'many/much,' in this verbless clause
    it predicates abundance. 'Will abound' captures the proverbial sense in smooth
    English and pairs naturally with 'blessings.' Future-like English is idiomatic
    for Hebrew wisdom generalizations.
- source_word: בְּרָכוֹת
  chosen: blessings
  alternatives:
  - blessing
  - benefits
  lexicon: HALOT
  rationale: Plural retained because the Hebrew is plural and emphasizes abundance
    of favorable outcomes or divine favor.
- source_word: וְאָץ
  chosen: but one who hastens
  alternatives:
  - but he who is hasty
  - but one eager
  lexicon: HALOT
  rationale: אָץ denotes being hasty/eager. Rendered with a relative expression for
    natural English parallelism with the first colon while preserving the negative
    sense of impatient pursuit.
- source_word: לְהַעֲשִׁיר
  chosen: to become rich
  alternatives:
  - to get rich
  - to make wealth
  lexicon: HALOT
  rationale: The Hiphil infinitive means 'to become rich' or 'to gain riches.' 'Become
    rich' is slightly more formal and fits the proverb's warning against acquisitive
    haste.
- source_word: לֹא יִנָּקֶה
  chosen: will not go unpunished
  alternatives:
  - will not be held innocent
  - will not be acquitted
  lexicon: HALOT
  rationale: The Niphal of נקה often means to be left unpunished or held guiltless.
    In this wisdom context, 'will not go unpunished' communicates the consequence
    clearly in contemporary English.
