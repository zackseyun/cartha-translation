id: PRO.28.28
reference: Proverbs 28:28
source:
  edition: WLC
  text: בְּ/ק֣וּם רְ֭שָׁעִים יִסָּתֵ֣ר אָדָ֑ם וּ֝/בְ/אָבְדָ֗/ם יִרְבּ֥וּ צַדִּיקִֽים׃
translation:
  text: When the wicked rise, a man hides himself, but when they perish, the righteous
    increase.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is hidden'; the Hebrew verb may be read as passive ('a man is hidden')
      or with a reflexive/middle sense ('a man hides himself').
    reason: lexical_alternative
  - marker: b
    text: '''A man'' renders Hebrew adam, which can function generically for a human
      being in proverbial speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקוּם
  chosen: when ... rise
  alternatives:
  - at the rising of
  - in the rising of
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of קום functions temporally
    here, best rendered 'when ... rise' in natural English while preserving the temporal
    sense.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: A substantival adjective/plural referring to wicked persons. 'The wicked'
    is concise, idiomatic, and preserves the moral category without adding gender
    not explicit in the plural form.
- source_word: יִסָּתֵר
  chosen: hides himself
  alternatives:
  - is hidden
  - keeps out of sight
  lexicon: HALOT
  rationale: Nifal of סתר can be passive or reflexive/middle in sense. In this proverb's
    social setting, the sense is that a person withdraws or conceals himself when
    wicked rulers ascend. 'Hides himself' communicates the likely middle/reflexive
    force more clearly than a bare passive.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - people
  - a person
  lexicon: HALOT
  rationale: 'Following the doctrine''s gender-accurate principle, אָדָם here is singular
    and representative: an individual human in general. ''A man'' preserves the Hebrew
    form and proverbial style better than the more abstract ''humankind.'''
- source_word: וּבְאָבְדָם
  chosen: but when they perish
  alternatives:
  - and when they perish
  - at their perishing
  - when they vanish
  lexicon: HALOT
  rationale: The conjunction plus ב with infinitive construct and 3mp suffix gives
    a temporal clause, 'and/but when they perish.' 'But' brings out the antithetical
    parallelism of the proverb in idiomatic English.
- source_word: יִרְבּוּ
  chosen: increase
  alternatives:
  - become many
  - multiply
  - grow numerous
  lexicon: HALOT
  rationale: The verb רבה here denotes becoming numerous or flourishing in number/presence.
    'Increase' is compact and fits proverbial English without over-specifying whether
    the increase is numerical, social, or visible.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A standard substantival plural for those characterized by righteousness.
    'The righteous' is the most natural and consistent rendering in wisdom literature.
