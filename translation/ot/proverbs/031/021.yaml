id: PRO.31.21
reference: Proverbs 31:21
source:
  edition: WLC
  text: לֹא תִירָ֣א לְ/בֵיתָ֣/הּ מִ/שָּׁ֑לֶג כִּ֥י כָל בֵּ֝יתָ֗/הּ לָבֻ֥שׁ שָׁנִֽים־־׃
translation:
  text: She does not fear snow for her household, for all her household are clothed
    in scarlet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her household are clothed in double garments.' Some take the Hebrew
      שָׁנִים here in the sense of doubleness rather than scarlet cloth.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִירָא
  chosen: does not fear
  alternatives:
  - is not afraid
  lexicon: HALOT
  rationale: Qal imperfect 3fs of ירא expresses her ongoing lack of fear or anxiety.
    'Does not fear' is a natural modern rendering that preserves the verbal force
    without over-paraphrase.
- source_word: לְבֵיתָהּ
  chosen: for her household
  alternatives:
  - for her house
  - for her family
  lexicon: HALOT
  rationale: בַּיִת can denote the physical house or the household/family. In this
    domestic wisdom context, the concern is for the people under her care, so 'household'
    best captures the sense while remaining close to the Hebrew.
- source_word: מִשָּׁלֶג
  chosen: snow
  alternatives:
  - because of snow
  - from snow
  lexicon: HALOT
  rationale: The preposition מִן with 'snow' marks the circumstance causing concern.
    English idiom is best served by 'fear snow for her household,' which conveys fear
    in view of snowy conditions.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for her lack of fear. 'For' preserves the explanatory
    connection in a concise literary register.
- source_word: לָבֻשׁ
  chosen: are clothed
  alternatives:
  - is clothed
  - wears
  lexicon: HALOT
  rationale: 'Though formally singular, the predicate functions collectively with
    ''all her household.'' English idiom prefers the plural verb with the collective
    subject: ''all her household are clothed.'''
- source_word: שָׁנִים
  chosen: scarlet
  alternatives:
  - double garments
  - crimson
  lexicon: HALOT
  rationale: The usual lexical sense is 'scarlet' or 'scarlet cloth/thread,' and this
    is the traditional and most straightforward reading. Some interpreters connect
    the form with the idea of doubleness, yielding 'double garments,' likely because
    that better suits the mention of snow; however, the lexical evidence more naturally
    supports 'scarlet' in the main text, with the alternative preserved in a footnote.
