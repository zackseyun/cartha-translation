id: PRO.31.20
reference: Proverbs 31:20
source:
  edition: WLC
  text: כַּ֭פָּ/הּ פָּרְשָׂ֣ה לֶ/עָנִ֑י וְ֝/יָדֶ֗י/הָ שִׁלְּחָ֥ה לָֽ/אֶבְיֽוֹן׃
translation:
  text: She opens her palm to the poor, and extends her hands to the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She spreads out her palm to the poor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'stretches out' or 'reaches out' for 'extends.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפָּהּ
  chosen: her palm
  alternatives:
  - her hand
  lexicon: HALOT
  rationale: כַּף often denotes the palm or hollow of the hand. 'Palm' preserves the
    concrete image and pairs well with the verb 'opens/spreads out,' while still sounding
    natural in English.
- source_word: פָּרְשָׂה
  chosen: opens
  alternatives:
  - spreads out
  - stretches out
  lexicon: HALOT
  rationale: The verb פרשׂ means to spread out or extend. With 'palm' as object, 'opens'
    gives idiomatic English while retaining the image of an open hand of generosity.
    The alternatives are semantically possible but less natural here.
- source_word: לֶעָנִי
  chosen: to the poor
  alternatives:
  - to the afflicted
  - to the humble
  lexicon: HALOT
  rationale: עָנִי commonly refers to one who is poor, afflicted, or socially vulnerable.
    In this wisdom context of charitable action, 'the poor' best captures the socioeconomic
    sense.
- source_word: יָדֶיהָ
  chosen: her hands
  alternatives:
  - her arms
  lexicon: HALOT
  rationale: The dual/plural form naturally refers to both hands. 'Hands' is the straightforward
    and contextually fitting rendering.
- source_word: שִׁלְּחָה
  chosen: extends
  alternatives:
  - sends out
  - stretches out
  - reaches out
  lexicon: HALOT
  rationale: The piel of שלח can mean to send or stretch out. With 'hands' and a recipient
    marked by ל, the sense is physical extension in aid. 'Extends' is faithful and
    dignified; 'reaches out' is idiomatic but slightly more interpretive.
- source_word: לָאֶבְיוֹן
  chosen: to the needy
  alternatives:
  - to the poor
  - to the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes one in want or need. Rendering it as 'needy' preserves
    the distinction from עָנִי in the first colon while keeping the parallelism clear.
