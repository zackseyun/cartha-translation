id: PRO.31.31
reference: Proverbs 31:31
source:
  edition: WLC
  text: תְּנוּ לָ֭/הּ מִ/פְּרִ֣י יָדֶ֑י/הָ וִֽ/יהַלְל֖וּ/הָ בַ/שְּׁעָרִ֣ים מַעֲשֶֽׂי/הָ־׃
translation:
  text: Give her from the fruit of her hands, and let her works praise her in the
    gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the city gates'—the gates were the public place of recognition, judgment,
      and honor in ancient Israelite society.
    reason: cultural_note
  - marker: b
    text: Or 'let her deeds praise her'; the Hebrew personifies her works as bearing
      public witness to her worth.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  chosen: Give
  alternatives:
  - Grant
  - Give due
  lexicon: HALOT
  rationale: Imperative plural of נתן, a direct command to bestow or give. 'Give'
    is the plain and natural English equivalent.
- source_word: לָהּ
  chosen: her
  lexicon: HALOT
  rationale: Indirect object pronoun referring to the excellent wife/woman of the
    poem; rendered straightforwardly as 'her'.
- source_word: מִפְּרִי
  chosen: from the fruit
  alternatives:
  - of the fruit
  - some of the fruit
  lexicon: HALOT
  rationale: 'The preposition מִן here naturally indicates source or portion: give
    to her from what her labor has produced. ''From the fruit'' preserves the Hebrew
    imagery and syntax better than a flattened ''for'' or ''according to''.'
- source_word: יָדֶיהָ
  chosen: of her hands
  alternatives:
  - of her labor
  - her handiwork
  lexicon: HALOT
  rationale: Literally 'her hands.' In Hebrew this commonly stands for labor or productive
    work. Retaining 'hands' preserves the concrete metaphor while remaining intelligible
    in English.
- source_word: וִיהַלְלוּהָ
  chosen: and let ... praise her
  alternatives:
  - and may ... praise her
  - and they will praise her
  lexicon: HALOT
  rationale: 'Imperfect/jussive-like form of הלל with prefixed conjunction, functioning
    as a volitive: ''and let ... praise her.'' This fits the exhortational parallelism
    with the opening imperative.'
- source_word: בַשְּׁעָרִים
  chosen: in the gates
  alternatives:
  - at the city gates
  - in the public square
  lexicon: HALOT
  rationale: Literally 'in the gates,' referring to the city gates as the place of
    public recognition and civic life. The literal rendering is clear enough in English
    and preserves the cultural setting.
- source_word: מַעֲשֶׂיהָ
  chosen: her works
  alternatives:
  - her deeds
  - what she has done
  lexicon: HALOT
  rationale: Plural of מעשה, denoting deeds, works, accomplishments. 'Her works' preserves
    the concise parallel with 'fruit of her hands' and allows the personified sense
    that her deeds testify on her behalf.
