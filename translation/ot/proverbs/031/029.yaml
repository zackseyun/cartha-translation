id: PRO.31.29
reference: Proverbs 31:29
source:
  edition: WLC
  text: רַבּ֣וֹת בָּ֭נוֹת עָ֣שׂוּ חָ֑יִל וְ֝/אַ֗תְּ עָלִ֥ית עַל כֻּלָּֽ/נָה־׃
translation:
  text: Many daughters have done nobly, but you surpass them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'daughters' can idiomatically refer more broadly to women or young
      women.
    reason: lexical_alternative
  - marker: b
    text: Or 'Many women have acted excellently, but you excel them all.' The Hebrew
      term for 'nobly' can also carry senses such as strength, valor, or excellence.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  chosen: Many
  alternatives:
  - Many a
  - Numerous
  lexicon: HALOT
  rationale: Adjectival use meaning 'many' or 'numerous.' 'Many' is the most natural
    modern English rendering in this comparative saying.
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - women
  - young women
  lexicon: HALOT
  rationale: The literal sense is 'daughters.' In Hebrew wisdom and poetic discourse
    this can refer broadly to women, but 'daughters' preserves the source imagery
    and idiom. The broader sense is worth preserving in a footnote.
- source_word: עָשׂוּ
  chosen: have done
  alternatives:
  - have acted
  - have shown
  lexicon: HALOT
  rationale: Qal perfect plural of עשה, here introducing what many women have accomplished
    or displayed. 'Have done' keeps the verbal force and pairs naturally with the
    following object.
- source_word: חָיִל
  chosen: nobly
  alternatives:
  - excellently
  - valiantly
  - worthily
  lexicon: HALOT
  rationale: חיל is a rich term covering strength, valor, competence, wealth, or excellence
    depending on context. In Proverbs 31, it describes the woman's admirable strength
    and excellence. Rendering it adverbially as 'nobly' fits the English syntax with
    'have done' while preserving moral and practical excellence without narrowing
    it merely to military 'valor' or social 'worth.'
- source_word: וְאַתְּ
  chosen: but you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun marks contrast in context:
    many have done well, but this woman exceeds them. ''But you'' best conveys the
    adversative sense in English.'
- source_word: עָלִית
  chosen: surpass
  alternatives:
  - have gone up above
  - excel
  - rise above
  lexicon: HALOT
  rationale: Literally 'you have gone up' or 'ascended,' but with עַל it idiomatically
    means to exceed or surpass. Present-tense English 'surpass' expresses the comparative
    force naturally.
- source_word: עַל כֻּלָּנָה
  chosen: them all
  alternatives:
  - all of them
  - all
  lexicon: HALOT
  rationale: The phrase means 'above all of them.' In idiomatic English after 'surpass,'
    'them all' is concise and clear while preserving the total comparison.
