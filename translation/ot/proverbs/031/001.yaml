id: PRO.31.1
reference: Proverbs 31:1
source:
  edition: WLC
  text: דִּ֭בְרֵי לְמוּאֵ֣ל מֶ֑לֶךְ מַ֝שָּׂ֗א אֲֽשֶׁר יִסְּרַ֥תּ/וּ אִמּֽ/וֹ־׃
translation:
  text: 'The words of King Lemuel, an oracle that his mother taught him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The words of King Lemuel of Massa, which his mother taught him.' The
      Hebrew מַשָּׂא can be read as 'oracle' or as the place-name 'Massa.'
    reason: alternative_reading
  - marker: b
    text: The verb can also mean 'disciplined' or 'instructed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר introducing a collection or heading. 'Words
    of' is the most direct and natural heading formula in English, while 'sayings
    of' is possible but slightly more interpretive.
- source_word: לְמוּאֵל
  chosen: Lemuel
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: מֶלֶךְ
  chosen: King
  lexicon: HALOT
  rationale: 'Straightforward title/apposition to Lemuel: ''King Lemuel.'''
- source_word: מַשָּׂא
  chosen: an oracle
  alternatives:
  - Massa
  - a burden
  lexicon: HALOT
  rationale: מַשָּׂא commonly denotes an 'oracle' or prophetic utterance. Some take
    it as the place-name 'Massa' ('King Lemuel of Massa'), but the unpointed consonants
    allow either reading. Given the Masoretic pointing and common lexical sense, 'an
    oracle' is preferred in the main text, with the geographical reading preserved
    in a footnote.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle linking 'oracle' with the clause that follows. 'That'
    is idiomatic in English.
- source_word: יִסְּרַתּוּ
  chosen: taught him
  alternatives:
  - disciplined him
  - instructed him
  lexicon: HALOT
  rationale: From יסר, whose semantic range includes chasten, discipline, instruct.
    In context of maternal transmission of wisdom, 'taught him' best captures the
    instructional force in readable English; 'disciplined' is possible but too narrow
    and potentially misleading here.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Simple noun with 3ms suffix; rendered directly.
