theological_decisions:
- issue: Potentially eschatological sense of אַחֲרוֹן
  chosen_reading: 'Temporal future in a wisdom-context sense: ''the days to come'''
  alternative_readings:
  - an eschatological 'last day' or 'latter day'
  rationale: In Proverbs 31 the concern is the woman's prudent, confident posture
    toward the future, not a developed doctrine of final judgment. The Hebrew adjective
    אַחֲרוֹן can mean latter/last, but here the immediate wisdom context favors ordinary
    futurity rather than eschatological specificity.
  doctrine_reference: Preserve theological tension rather than resolve it; choose
