id: PRO.31.25
reference: Proverbs 31:25
source:
  edition: WLC
  text: עֹז וְ/הָדָ֥ר לְבוּשָׁ֑/הּ וַ֝/תִּשְׂחַ֗ק לְ/י֣וֹם אַחֲרֽוֹן־׃
translation:
  text: Strength and dignity are her clothing, and she laughs at the days to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she laughs at the future'; literally, 'she laughs at a latter/last day.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - strongness
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' is the most natural
    modern English rendering here and pairs well with the following noun in a character
    description.
- source_word: הָדָר
  chosen: dignity
  alternatives:
  - majesty
  - splendor
  - honor
  lexicon: HALOT
  rationale: הָדָר can denote splendor, majesty, or honor. In this proverb describing
    the noble character of the woman, 'dignity' best conveys an honorable bearing
    in idiomatic English without implying royal pomp.
- source_word: לְבוּשָׁהּ
  chosen: are her clothing
  alternatives:
  - is her garment
  - clothe her
  lexicon: HALOT
  rationale: 'The noun means clothing/garment with a 3fs suffix, used metaphorically:
    these qualities are what she is clothed with. ''Are her clothing'' preserves the
    metaphor while reading naturally in English.'
- source_word: וַתִּשְׂחַק
  chosen: she laughs
  alternatives:
  - she smiles
  - she rejoices
  lexicon: HALOT
  rationale: The verb שׂחק in this stem commonly means laugh. 'She laughs' preserves
    the vividness and confidence of the Hebrew better than the softer 'smiles' or
    the more interpretive 'rejoices.'
- source_word: לְיוֹם אַחֲרוֹן
  chosen: at the days to come
  alternatives:
  - at the future
  - at the last day
  - at the latter day
  lexicon: HALOT
  rationale: Literally the phrase is 'at/to a later day' or 'the future.' English
    idiom often pluralizes this sense as 'the days to come,' which communicates her
    fearless confidence regarding what lies ahead. 'Last day' would sound overly eschatological
    in this wisdom context, and 'latter day' is less natural in modern English.
