id: PRO.31.17
reference: Proverbs 31:17
source:
  edition: WLC
  text: חָֽגְרָ֣ה בְ/ע֣וֹז מָתְנֶ֑י/הָ וַ֝/תְּאַמֵּ֗ץ זְרֹעוֹתֶֽי/הָ׃
translation:
  text: She girds her waist with strength and makes her arms strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She girds her loins with strength.' The Hebrew preserves a concrete
      bodily image of readiness and vigor.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָגְרָה
  chosen: girds
  alternatives:
  - has girded
  - clothes
  - binds around
  lexicon: HALOT
  rationale: The verb literally refers to girding or fastening on, often around the
    waist. 'Girds' preserves the concrete bodily metaphor better than a more interpretive
    rendering like 'clothes herself.' Present-tense English suits proverbial style.
- source_word: בְּעֹז
  chosen: with strength
  alternatives:
  - with might
  - with power
  lexicon: HALOT
  rationale: עֹז denotes strength or might. 'With strength' is natural English and
    keeps the instrumental sense of בְּ.
- source_word: מָתְנֶיהָ
  chosen: her waist
  alternatives:
  - her loins
  - her hips
  lexicon: HALOT
  rationale: The Hebrew refers to the waist/loins area. 'Her waist' communicates the
    anatomy clearly in modern English without archaic overtones of 'loins,' while
    retaining the image of readiness and vigor.
- source_word: וַתְּאַמֵּץ
  chosen: makes strong
  alternatives:
  - strengthens
  - makes firm
  lexicon: HALOT
  rationale: The piel form conveys strengthening or making firm. 'Makes strong' mirrors
    the causative force and pairs well with the following object.
- source_word: זְרֹעוֹתֶיהָ
  chosen: her arms
  alternatives:
  - her forearms
  lexicon: HALOT
  rationale: The plural noun denotes arms. 'Her arms' is the straightforward and idiomatic
    rendering in context, emphasizing capability for labor.
