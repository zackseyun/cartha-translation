id: PRO.31.5
reference: Proverbs 31:5
source:
  edition: WLC
  text: פֶּן יִ֭שְׁתֶּה וְ/יִשְׁכַּ֣ח מְחֻקָּ֑ק וִֽ֝/ישַׁנֶּה דִּ֣ין כָּל בְּנֵי עֹֽנִי־־־׃
translation:
  text: lest he drink and forget what has been decreed, and pervert the justice due
    to all the afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the sons of affliction,' an idiom for people who are
      suffering or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'forget the decree' / 'forget what is prescribed.'
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a negative purpose/result warning. 'Lest' best preserves the
    concise admonitory force in English.
- source_word: יִשְׁתֶּה
  chosen: he drink
  alternatives:
  - he may drink
  lexicon: HALOT
  rationale: Qal imperfect 3ms after פֶּן expresses the warned-against action. Simple
    English present-subjunctive-like 'he drink' fits the construction after 'lest'.
- source_word: וְיִשְׁכַּח
  chosen: and forget
  alternatives:
  - and he forget
  lexicon: HALOT
  rationale: Coordinates the second consequence of drinking. 'Forget' is the plain
    sense of שכח.
- source_word: מְחֻקָּק
  chosen: what has been decreed
  alternatives:
  - the decree
  - what is prescribed
  - the law
  lexicon: HALOT
  rationale: From חקק in a passive/participial form, referring to that which is prescribed
    or decreed. Rendering it as 'what has been decreed' preserves the passive sense
    and avoids over-narrowing to statutory 'law' alone.
- source_word: וִישַׁנֶּה
  chosen: and pervert
  alternatives:
  - and alter
  - and distort
  - and change
  lexicon: HALOT
  rationale: Piel of שנה here means to alter in a wrongful judicial sense. 'Pervert'
    captures the legal-ethical force better than the more neutral 'change' or 'alter'.
- source_word: דִּין
  chosen: the justice due to
  alternatives:
  - the judgment of
  - the legal case of
  - the rights of
  lexicon: HALOT
  rationale: In context of royal/judicial responsibility, דין refers to legal judgment/justice.
    'The justice due to' communicates both the judicial setting and the idea of rightful
    treatment.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' reads naturally with the following
    plural construct phrase.
- source_word: בְּנֵי עֹנִי
  chosen: the afflicted
  alternatives:
  - the sons of affliction
  - the poor
  - those in misery
  lexicon: HALOT
  rationale: Literally 'sons of affliction,' a Hebrew idiom for people characterized
    by suffering or misery. 'The afflicted' preserves the sense in readable modern
    English without wooden literalism.
