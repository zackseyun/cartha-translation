id: PRO.31.16
reference: Proverbs 31:16
source:
  edition: WLC
  text: זָמְמָ֣ה שָׂ֭דֶה וַ/תִּקָּחֵ֑/הוּ מִ/פְּרִ֥י כַ֝פֶּ֗י/הָ נטע כָּֽרֶם׃
translation:
  text: She considers a field and acquires it; from the fruit of her hands she plants
    a vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans for a field and takes it'; the Hebrew verbs can be rendered more
      literally, but the main text aims for natural English while preserving the sense
      of deliberate economic action.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'from the fruit of her hands,' an idiom for the yield or
      proceeds of her labor.
    reason: cultural_note
lexical_decisions:
- source_word: זָמְמָה
  chosen: considers
  alternatives:
  - plans for
  - sets her mind on
  - evaluates
  lexicon: HALOT
  rationale: The verb זמם here denotes purposeful consideration or planning. 'Considers'
    captures deliberation without overreading the action as merely desire or as a
    fully formed plan.
- source_word: שָׂדֶה
  chosen: field
  alternatives:
  - piece of land
  lexicon: HALOT
  rationale: The common sense of שָׂדֶה is 'field' or cultivated land. 'Field' is
    the most direct and natural rendering in context.
- source_word: וַתִּקָּחֵהוּ
  chosen: acquires it
  alternatives:
  - takes it
  - buys it
  lexicon: HALOT
  rationale: לקח broadly means 'take' or 'acquire.' In this economic context, 'acquires
    it' is more idiomatic and contextually appropriate than the overly literal 'takes
    it,' while avoiding the narrower 'buys it,' which the Hebrew does not explicitly
    state.
- source_word: מִפְּרִי
  chosen: from the fruit
  alternatives:
  - with the fruit
  - from the produce
  lexicon: HALOT
  rationale: The preposition מן indicates source, and פְּרִי commonly means 'fruit'
    or produce/yield. 'From the fruit' preserves the metaphorical sense of proceeds
    or yield from her labor.
- source_word: כַפֶּיהָ
  chosen: of her hands
  alternatives:
  - of her labor
  - of her handiwork
  lexicon: HALOT
  rationale: Literally 'her hands.' This idiom points to the results of her work.
    The literal rendering is clear in English and preserves the Hebrew imagery.
- source_word: נטע
  chosen: she plants
  alternatives:
  - she establishes
  lexicon: HALOT
  rationale: Although the morphology note lists a 3ms form, the context throughout
    the verse concerns the excellent woman, and English should reflect the feminine
    subject carried through the line. The lexical sense is straightforwardly 'plant.'
- source_word: כָּרֶם
  chosen: a vineyard
  alternatives:
  - a vine-garden
  lexicon: HALOT
  rationale: כָּרֶם is the standard term for a vineyard. This is the natural and established
    English equivalent.
