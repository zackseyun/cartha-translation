id: PRO.31.2
reference: Proverbs 31:2
source:
  edition: WLC
  text: מַה בְּ֭רִ/י וּ/מַֽה בַּר בִּטְנִ֑/י וּ֝/מֶה בַּר נְדָרָֽ/י־־־־׃
translation:
  text: What, my son? And what, son of my womb? And what, son of my vows?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'What shall I say, my son? What shall I say, son
      of my womb? What shall I say, son of my vows?' The Hebrew keeps the repeated
      'What?' for rhetorical effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - What is it,
  - What then,
  lexicon: HALOT
  rationale: The repeated interrogative מַה introduces an emotional, rhetorical address
    rather than a request for information. 'What' preserves the terse, urgent force
    of the Hebrew and the poetic repetition.
- source_word: בְּרִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: From בַּר 'son' with 1cs suffix. Although the form is Aramaizing/poetic,
    the sense is straightforwardly filial. 'My son' is gender-accurate and preserves
    the maternal address.
- source_word: בַּר
  chosen: son of
  alternatives:
  - child of
  lexicon: HALOT
  rationale: The repeated noun בַּר means 'son.' Rendering it consistently as 'son'
    preserves the poetic triad and the gendered wording of the source.
- source_word: בִּטְנִי
  chosen: my womb
  alternatives:
  - my body
  lexicon: HALOT
  rationale: בֶּטֶן literally denotes the womb/belly. In this maternal context, 'my
    womb' is the most natural and precise English rendering.
- source_word: נְדָרָי
  chosen: my vows
  alternatives:
  - my solemn vows
  lexicon: HALOT
  rationale: נֶדֶר means 'vow.' The plural with 1cs suffix is best rendered 'my vows,'
    likely referring to vows associated with the son's birth or dedication. The plain
    rendering avoids over-interpreting the specific content of the vows.
