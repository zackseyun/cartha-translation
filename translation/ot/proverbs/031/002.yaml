theological_decisions:
- issue: Force of the threefold rhetorical address
  chosen_reading: 'Retained as three abrupt questions: ''What ... ? And what ... ?
    And what ... ?'''
  alternative_readings:
  - Expanded idiomatically as 'What shall I say, my son...?'
  rationale: The Hebrew is elliptical and emotionally charged. Preserving the repeated
    interrogative maintains the text's poetic intensity without importing explanatory
    wording not present in the source.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered filial term
  chosen_reading: '''my son'' / ''son of my womb'' / ''son of my vows'''
  alternative_readings:
  - '''my child'' / ''child of my womb'' / ''child of my vows'''
  rationale: The source uses the masculine noun בַּר repeatedly. Per the gender-accurate
    principle, the translation preserves the masculine form rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §4
