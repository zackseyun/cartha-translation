id: PRO.31.11
reference: Proverbs 31:11
source:
  edition: WLC
  text: בָּ֣טַח בָּ֭/הּ לֵ֣ב בַּעְלָ֑/הּ וְ֝/שָׁלָ֗ל לֹ֣א יֶחְסָֽר׃
translation:
  text: The heart of her husband trusts in her, and he will lack no gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoil' or 'plunder'; the Hebrew noun often refers to booty taken in
      war, here used figuratively for material gain or profit.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּטַח
  chosen: trusts
  alternatives:
  - has confidence in
  - is secure in
  lexicon: HALOT
  rationale: The verb denotes trusting or placing confidence in someone. Present-tense
    English fits proverbial style better than a simple past ('trusted'), expressing
    a general truth about the excellent wife.
- source_word: לֵב
  chosen: the heart of
  alternatives:
  - the mind of
  - the inner being of
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including will and
    confidence. Retaining 'heart' preserves the Hebrew imagery and remains natural
    in English here.
- source_word: בַּעְלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: In this domestic context the noun clearly refers to a husband, not a
    master/owner. 'Her husband' is the idiomatic and contextually precise rendering.
- source_word: שָׁלָל
  chosen: gain
  alternatives:
  - spoil
  - plunder
  - profit
  lexicon: HALOT
  rationale: Literally the noun often means 'spoil/plunder,' but in this wisdom context
    it refers metaphorically to material advantage or beneficial return. 'Gain' communicates
    the sense without importing warfare language into the main text.
- source_word: יֶחְסָר
  chosen: he will lack no
  alternatives:
  - he will not be lacking in
  - he will not lack
  lexicon: HALOT
  rationale: 'The verb means ''to lack, be in need.'' Rendering it with the husband
    as subject follows the Hebrew syntax straightforwardly: because he trusts in her,
    he will lack no gain.'
