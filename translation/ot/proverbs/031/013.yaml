id: PRO.31.13
reference: Proverbs 31:13
source:
  edition: WLC
  text: דָּ֭רְשָׁה צֶ֣מֶר וּ/פִשְׁתִּ֑ים וַ֝/תַּ֗עַשׂ בְּ/חֵ֣פֶץ כַּפֶּֽי/הָ׃
translation:
  text: She seeks wool and flax, and works with willing hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and works with delight in her hands' or 'and works eagerly with her
      hands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרְשָׁה
  chosen: seeks
  alternatives:
  - looks for
  - procures
  lexicon: HALOT
  rationale: The verb דרשׁ commonly means to seek, inquire, or pursue. Here it describes
    the capable woman's active effort to obtain materials. 'Seeks' preserves the verbal
    force without over-specifying whether the emphasis is searching, selecting, or
    acquiring.
- source_word: צֶמֶר
  chosen: wool
  lexicon: HALOT
  rationale: The noun straightforwardly denotes wool, a common textile material.
- source_word: וּפִשְׁתִּים
  chosen: flax
  alternatives:
  - linen
  lexicon: HALOT
  rationale: The Hebrew names the plant/material flax. 'Linen' would reflect the processed
    textile product, but 'flax' better matches the source term alongside 'wool' as
    raw material sought for household production.
- source_word: וַתַּעַשׂ
  chosen: works
  alternatives:
  - does
  - makes
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In this context of textile labor, 'works' idiomatically
    conveys productive activity in English better than the overly general 'does' and
    avoids implying only finished products with 'makes'.
- source_word: בְּחֵפֶץ
  chosen: with willing
  alternatives:
  - with delight
  - eagerly
  - with pleasure
  lexicon: HALOT
  rationale: חֵפֶץ denotes pleasure, delight, desire, or willingness. In context it
    describes the disposition with which she labors. 'With willing' captures readiness
    and positive intent in natural English when completed by 'hands,' while avoiding
    an overly emotional reading.
- source_word: כַּפֶּיהָ
  chosen: hands
  alternatives:
  - palms
  lexicon: HALOT
  rationale: Though כף can mean palm, in this idiom 'hands' is the natural English
    equivalent for manual labor. The dual/plural form with suffix refers to her own
    hands as instruments of work.
