id: PRO.31.7
reference: Proverbs 31:7
source:
  edition: WLC
  text: יִ֭שְׁתֶּה וְ/יִשְׁכַּ֣ח רִישׁ֑/וֹ וַ֝/עֲמָל֗/וֹ לֹ֣א יִזְכָּר עֽוֹד־׃
translation:
  text: Let him drink and forget his poverty, and remember his trouble no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his toil' for 'his trouble'; the Hebrew can refer to labor, hardship,
      or misery.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁתֶּה
  chosen: Let him drink
  alternatives:
  - He should drink
  - May he drink
  lexicon: HALOT
  rationale: The jussive/imperfect in context continues the permissive/exhortative
    sense from the surrounding verses about giving strong drink to the perishing and
    wine to the bitter in soul. 'Let him drink' captures the volitional nuance better
    than a simple future 'he will drink.'
- source_word: וְיִשְׁכַּח
  chosen: and forget
  alternatives:
  - so that he may forget
  - and he forgets
  lexicon: HALOT
  rationale: The conjunction plus imperfect/jussive continues the purpose/result-like
    sequence. 'And forget' is natural English and preserves the parallel verbal flow
    without over-interpreting as strictly purpose.
- source_word: רִישׁוֹ
  chosen: his poverty
  alternatives:
  - his destitution
  - his need
  - his misery
  lexicon: HALOT
  rationale: רִישׁ denotes poverty or impoverished condition. 'Poverty' is the most
    direct and idiomatic rendering here; 'destitution' is possible but sounds stronger
    and less natural in this proverb.
- source_word: וַעֲמָלוֹ
  chosen: his trouble
  alternatives:
  - his toil
  - his misery
  - his suffering
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, or misery. In this context of alleviating
    distress through drink, the broader experiential sense 'trouble' fits better than
    the narrower 'toil,' while still reflecting the burden implied by the Hebrew.
- source_word: לֹא יִזְכָּר עוֹד
  chosen: remember ... no more
  alternatives:
  - not remember again
  - remember ... any longer
  lexicon: HALOT
  rationale: 'The negative with זכר and עוֹד expresses cessation: ''no longer remember.''
    ''Remember ... no more'' is concise, idiomatic, and preserves the emphatic finality
    of the Hebrew.'
