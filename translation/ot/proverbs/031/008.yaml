id: PRO.31.8
reference: Proverbs 31:8
source:
  edition: WLC
  text: פְּתַח פִּ֥י/ךָ לְ/אִלֵּ֑ם אֶל דִּ֝֗ין כָּל בְּנֵ֥י חֲלֽוֹף־־־׃
translation:
  text: Open your mouth for the mute, for the cause of all the passing away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the rights/case of all who are destitute,' 'for all who are passing
      away,' or 'for all the sons of transience.' The Hebrew phrase is difficult,
      especially the rare noun חֲלוֹף.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח
  chosen: Open
  alternatives:
  - Speak up
  lexicon: HALOT
  rationale: Imperative 2ms of פתח, literally 'open.' In context with 'your mouth,'
    English idiom 'Open your mouth' preserves the concrete metaphor and exhortational
    force better than a more interpretive 'Speak up.'
- source_word: פִּיךָ
  chosen: your mouth
  lexicon: HALOT
  rationale: Literal object of the imperative. Retaining 'mouth' preserves the Hebrew
    imagery rather than abstracting to 'voice' or 'speech.'
- source_word: לְאִלֵּם
  chosen: for the mute
  alternatives:
  - for the speechless
  - for those unable to speak
  lexicon: HALOT
  rationale: אִלֵּם denotes one who is mute or unable to speak. 'The mute' is concise
    and close to the Hebrew; alternatives are possible but slightly more interpretive.
- source_word: אֶל־דִּין
  chosen: for the cause
  alternatives:
  - for justice
  - for the legal case
  lexicon: HALOT
  rationale: The preposition plus דִּין points to advocacy in a judicial or forensic
    sense. 'For the cause' captures legal representation without over-specifying courtroom
    procedure; 'for justice' is broader and less tied to the noun's forensic nuance.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward rendering of the distributive/collective term. 'All'
    fits the collective phrase that follows.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - those of
  - the children of
  lexicon: HALOT
  rationale: Construct form of 'sons of.' Here it functions idiomatically for a class
    of people. Because English 'sons of' would sound wooden in this context, the idiomatic
    force is absorbed into the full phrase in translation rather than represented
    woodenly.
- source_word: חֲלוֹף
  chosen: the passing away
  alternatives:
  - ruin
  - transience
  - those passing away
  - the destitute
  lexicon: HALOT
  rationale: This rare noun is difficult. Its core sense is connected with passing
    on/passing away, hence people who are perishing, transient, or socially disappearing.
    The translation keeps the verbal idea visible with 'passing away' while allowing
    the phrase to denote those whose case is otherwise neglected. Because the term
    is lexically uncertain, alternatives are preserved in a footnote.
