theological_decisions:
- issue: Scope of the warning about women
  chosen_reading: A wisdom warning against dissipating royal strength through sexual/relational
    entanglements, stated generally rather than as a blanket theological condemnation
    of women.
  alternative_readings:
  - A warning specifically about foreign wives or royal polygamy
  - A broader warning about any indulgence that weakens rulers
  rationale: The Hebrew text directly says 'women' and should be translated that way,
    but the proverb's force is moral-practical within royal instruction, not a doctrinal
    statement about the nature of women. The translation preserves the text's wording
    without importing misogynistic generalizations beyond the verse.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Meaning of חֵילֶךָ
  chosen_reading: Personal strength/vigor/resources in a broad sense
  alternative_readings:
  - Wealth
  - sexual potency specifically
  rationale: The proverb warns a king not to expend what makes him effective. 'Strength'
    is broad enough to include vigor, authority, and resources, preserving the Hebrew's
    semantic range without collapsing it into one narrower modern category.
  doctrine_reference: Translation philosophy §§1, 5
