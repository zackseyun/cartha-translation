id: PRO.31.3
reference: Proverbs 31:3
source:
  edition: WLC
  text: אַל תִּתֵּ֣ן לַ/נָּשִׁ֣ים חֵילֶ֑/ךָ וּ֝/דְרָכֶ֗י/ךָ לַֽ/מְח֥וֹת מְלָכִֽין־׃
translation:
  text: Do not give your strength to women, or your ways to those who destroy kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not give your strength to women, nor your paths to what destroys
      kings.' The Hebrew can also be construed more abstractly, with 'destroy' expressed
      as a verbal noun ('destruction'/'ruin').
    reason: lexical_alternative
  - marker: b
    text: '''Strength'' may also include vigor, resources, or wealth, not only physical
      power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the imperfect/jussive for prohibition.
    'Do not' is the natural modern English imperative equivalent.
- source_word: תִּתֵּן
  chosen: give
  alternatives:
  - hand over
  - devote
  lexicon: HALOT
  rationale: נתן commonly means 'give.' In this warning context, 'give' preserves
    the metaphor without over-interpreting it as total surrender.
- source_word: לַנָּשִׁים
  chosen: to women
  alternatives:
  - to wives
  - to a woman
  lexicon: HALOT
  rationale: The plural noun נשים is best rendered 'women.' Although context concerns
    sexual entanglement, the Hebrew is plural and not specifically 'wives.' This keeps
    the warning as stated without narrowing it.
- source_word: חֵילֶךָ
  chosen: your strength
  alternatives:
  - your vigor
  - your wealth
  - your power
  lexicon: HALOT
  rationale: חיל can denote strength, wealth, or capacity. In this admonitory parallelism
    with 'your ways,' 'strength' best captures personal vigor/resources broadly without
    reducing it merely to money or military power. It may include virility and substance
    by implication.
- source_word: וּדְרָכֶיךָ
  chosen: or your ways
  alternatives:
  - and your paths
  - and your course of life
  lexicon: HALOT
  rationale: דרך often means way, path, or manner of life. 'Your ways' preserves the
    plural and allows both literal conduct and life-course nuance. 'Or' is idiomatic
    in English for the second prohibited object after a negative command, though the
    Hebrew conjunction is simply 'and.'
- source_word: לַמְחוֹת
  chosen: to those who destroy
  alternatives:
  - to destruction of
  - to those who wipe out
  - to those who ruin
  lexicon: HALOT
  rationale: From מחה, 'wipe out/blot out/destroy.' The infinitive/verb form here
    functions in relation to kings; rendering it personally as 'those who destroy'
    makes the Hebrew idiomatic in English while preserving the destructive sense.
    'Ruin' is possible but weaker than the verb's force.
- source_word: מְלָכִין
  chosen: kings
  alternatives:
  - royal men
  lexicon: HALOT
  rationale: Straightforward plural of 'king.' 'Kings' preserves the proverb's royal
    setting and direct address to a ruler.
