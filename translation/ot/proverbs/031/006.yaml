id: PRO.31.6
reference: Proverbs 31:6
source:
  edition: WLC
  text: תְּנוּ שֵׁכָ֣ר לְ/אוֹבֵ֑ד וְ֝/יַיִן לְ/מָ֣רֵי נָֽפֶשׁ־׃
translation:
  text: Give strong drink to one who is perishing, and wine to those bitter in soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the one who is dying' for 'to one who is perishing.' The Hebrew participle
      can refer broadly to someone perishing, ruined, or near death.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the bitter of soul,' an idiom for deep inner anguish or misery.
    reason: cultural_note
lexical_decisions:
- source_word: תְּנוּ
  chosen: Give
  alternatives:
  - Give out
  - Provide
  lexicon: HALOT
  rationale: Imperative plural of נתן, a straightforward command. 'Give' is the most
    direct and natural English equivalent.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - intoxicating drink
  - beer
  lexicon: HALOT
  rationale: Refers broadly to alcoholic drink other than wine, often with intoxicating
    force. 'Strong drink' is the established and accurate English rendering without
    over-specifying the beverage type.
- source_word: לְאוֹבֵד
  chosen: to one who is perishing
  alternatives:
  - to the one who is dying
  - to one who is ruined
  lexicon: HALOT
  rationale: The participle of אבד can denote one who is perishing, being destroyed,
    or near death. 'One who is perishing' preserves the broader Hebrew sense and fits
    the proverb's parallelism.
- source_word: וְיַיִן
  chosen: and wine
  lexicon: HALOT
  rationale: Simple coordination with the common Hebrew term for wine; no reason to
    depart from the standard rendering.
- source_word: לְמָרֵי נָפֶשׁ
  chosen: to those bitter in soul
  alternatives:
  - to those of bitter soul
  - to the embittered
  - to those in deep anguish
  lexicon: HALOT
  rationale: The phrase literally means 'to the bitter of soul.' 'Bitter in soul'
    preserves the metaphor and emotional depth while remaining readable modern English.
    The plural adjective is reflected by 'those.'
- source_word: נָפֶשׁ
  chosen: soul
  alternatives:
  - self
  - life
  - inner being
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to the inner life or seat of distress. 'Soul' best
    preserves the idiomatic force of the Hebrew expression 'bitter of soul' in English.
