theological_decisions:
- issue: Whether the verse should be softened to avoid sounding like a blanket endorsement
    of drunkenness
  chosen_reading: Retain the imperative sense as stated in the Hebrew without interpretive
    softening.
  alternative_readings:
  - Paraphrasing as a limited medicinal use of alcohol
  - Recasting as irony or sarcasm in the main text
  rationale: The Hebrew gives direct imperatives and does not itself explain or limit
    them within this verse. Any ethical or contextual qualification belongs to interpretation
    of the surrounding passage, not to the translation of this line.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
