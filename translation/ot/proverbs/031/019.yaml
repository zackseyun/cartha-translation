id: PRO.31.19
reference: Proverbs 31:19
source:
  edition: WLC
  text: יָ֭דֶי/הָ שִׁלְּחָ֣ה בַ/כִּישׁ֑וֹר וְ֝/כַפֶּ֗י/הָ תָּ֣מְכוּ פָֽלֶךְ׃
translation:
  text: She stretches out her hands to the distaff, and her palms hold the spindle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She puts her hands to the distaff, and her palms grasp the spindle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶיהָ
  chosen: her hands
  alternatives:
  - her hand
  lexicon: HALOT
  rationale: Dual form with 3fs suffix, naturally rendered as the pair of hands belonging
    to the woman described in the poem.
- source_word: שִׁלְּחָה
  chosen: stretches out
  alternatives:
  - sends out
  - puts forth
  - extends
  lexicon: HALOT
  rationale: From שׁלח, here describing purposeful manual action. 'Stretches out'
    is idiomatic in English for extending the hands toward work, preserving the concrete
    imagery better than the more wooden 'sends out.'
- source_word: בַכִּישׁוֹר
  chosen: to the distaff
  alternatives:
  - to the spindle
  - with the distaff
  lexicon: HALOT
  rationale: כִּישׁוֹר refers to a spinning implement, commonly the distaff. The preposition
    ב here is rendered directionally as 'to' in smooth English because the verb-plus-object
    scene depicts reaching for the tool. 'Distaff' best distinguishes this item from
    פָלֶךְ in the second colon.
- source_word: וְכַפֶּיהָ
  chosen: and her palms
  alternatives:
  - and her hands
  lexicon: HALOT
  rationale: כַּף literally denotes the palm or hollow of the hand. 'Palms' preserves
    the more specific bodily image and the poetic parallelism with 'hands' in the
    first colon.
- source_word: תָּמְכוּ
  chosen: hold
  alternatives:
  - grasp
  - support
  - take hold of
  lexicon: HALOT
  rationale: From תמך, 'to support, hold, grasp.' In this context of textile work,
    'hold' is natural, concise, and fits the image of handling the implement without
    overinterpreting the exact motion.
- source_word: פָלֶךְ
  chosen: the spindle
  alternatives:
  - the whorl
  - the spinning spindle
  lexicon: HALOT
  rationale: פָלֶךְ denotes a spinning tool, commonly the spindle. Rendering it as
    'spindle' preserves the domestic craft imagery and complements 'distaff' in the
    first colon.
