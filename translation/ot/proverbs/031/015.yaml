id: PRO.31.15
reference: Proverbs 31:15
source:
  edition: WLC
  text: וַ/תָּ֤קָם בְּ/ע֬וֹד לַ֗יְלָה וַ/תִּתֵּ֣ן טֶ֣רֶף לְ/בֵיתָ֑/הּ וְ֝/חֹ֗ק לְ/נַעֲרֹתֶֽי/הָ׀׃
translation:
  text: She rises while it is still night and gives food to her household and portions
    to her servant girls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and an assigned share to her maidservants.' The Hebrew word for 'portions'
      can also mean a prescribed due or fixed allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: She rises
  alternatives:
  - She gets up
  - She arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in poetic narrative sequence. Present-tense English
    is natural in proverbial description, while preserving the vivid habitual sense
    of the poem.
- source_word: בְּעוֹד לַיְלָה
  chosen: while it is still night
  alternatives:
  - while it is yet night
  - before dawn
  lexicon: HALOT
  rationale: The phrase literally means 'in/still night'; 'while it is still night'
    is idiomatic English that preserves the sense of rising very early without over-interpreting
    it as a precise time like 'before dawn'.
- source_word: וַתִּתֵּן
  chosen: and gives
  alternatives:
  - and provides
  - and sets out
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' 'Gives' is the most direct rendering and
    fits the habitual-present style used in the verse.
- source_word: טֶרֶף
  chosen: food
  alternatives:
  - prey
  - provision
  lexicon: HALOT
  rationale: Though the noun can literally mean 'prey,' in wisdom usage here it refers
    to food/provisions supplied for the household. 'Food' is the clearest natural
    English equivalent; 'prey' would mislead in this domestic context.
- source_word: לְבֵיתָהּ
  chosen: to her household
  alternatives:
  - for her house
  - to her family
  lexicon: HALOT
  rationale: בַּיִת often extends beyond the physical house to the household members.
    'Household' best captures the social unit being fed.
- source_word: וְחֹק
  chosen: and portions
  alternatives:
  - and a portion
  - and an assigned share
  - and a task
  lexicon: HALOT
  rationale: חֹק commonly denotes an allotted portion, prescribed due, or fixed share.
    In parallel with 'food to her household,' 'portions' best fits the domestic provisioning
    context. 'Task' is possible in some interpretations but is less likely given the
    food-related parallelism.
- source_word: לְנַעֲרֹתֶיהָ
  chosen: to her servant girls
  alternatives:
  - to her young women
  - to her maidservants
  - to her female servants
  lexicon: HALOT
  rationale: נַעֲרוֹת are female attendants/young women in her service. 'Servant girls'
    is clear, natural, and reflects both gender and subordinate household role without
    archaic tone.
