id: PRO.31.23
reference: Proverbs 31:23
source:
  edition: WLC
  text: נוֹדָ֣ע בַּ/שְּׁעָרִ֣ים בַּעְלָ֑/הּ בְּ֝/שִׁבְתּ֗/וֹ עִם זִקְנֵי אָֽרֶץ־־׃
translation:
  text: Her husband is known in the gates, when he sits among the elders of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''In the gates'' refers to the public place where civic, legal, and communal
      matters were conducted.'
    reason: cultural_note
  - marker: b
    text: Or 'is respected' / 'is recognized.' The Hebrew says literally 'is known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹדָע
  chosen: is known
  alternatives:
  - is respected
  - is recognized
  lexicon: HALOT
  rationale: Nifal participle of ידע conveys being known/recognized. 'Is known' preserves
    the stative/passive sense without over-interpreting it as specifically honorific,
    though social esteem is implied by context.
- source_word: בַּשְּׁעָרִים
  chosen: in the gates
  alternatives:
  - at the city gates
  - in the city gates
  lexicon: HALOT
  rationale: שערים literally means 'gates.' In Proverbs this often refers to the public/judicial
    place of civic life. The simple 'in the gates' keeps the Hebrew image while remaining
    intelligible; the civic nuance can be preserved in a note.
- source_word: בַּעְלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: בעל can mean owner/master/husband depending on context. In this domestic
    portrait of the capable wife, 'her husband' is the clear contextual sense and
    avoids importing a stronger hierarchical nuance not required here.
- source_word: בְּשִׁבְתּוֹ
  chosen: when he sits
  alternatives:
  - in his sitting
  - as he sits
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct with suffix is naturally
    rendered temporally here: ''when he sits.'' This is idiomatic English and reflects
    the circumstantial timing of his public presence.'
- source_word: עִם
  chosen: among
  alternatives:
  - with
  lexicon: HALOT
  rationale: Though literally 'with,' 'among' better conveys his seated participation
    in the company/council of the elders in idiomatic English.
- source_word: זִקְנֵי אָרֶץ
  chosen: the elders of the land
  alternatives:
  - the elders of the הארץ
  - the elders of the city
  lexicon: HALOT
  rationale: זקני ארץ is literally 'elders of the land.' 'Land' is retained rather
    than narrowing to 'city,' since the Hebrew says ארץ. In context it denotes leading
    civic figures, but the translation preserves the broader lexical form.
