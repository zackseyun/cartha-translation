id: PRO.31.27
reference: Proverbs 31:27
source:
  edition: WLC
  text: צ֭וֹפִיָּה הֲלִיכ֣וֹת בֵּיתָ֑/הּ וְ/לֶ֥חֶם עַ֝צְל֗וּת לֹ֣א תֹאכֵֽל׃
translation:
  text: She watches over the ways of her household, and does not eat the bread of
    idleness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She looks well to the affairs of her household.' The Hebrew literally
      speaks of 'the ways/goings of her house.'
    reason: lexical_alternative
  - marker: b
    text: '''The bread of idleness'' is a Hebrew idiom for living in laziness or feeding
      on unproductive ease.'
    reason: cultural_note
lexical_decisions:
- source_word: צוֹפִיָּה
  chosen: watches over
  alternatives:
  - keeps watch over
  - looks well to
  - observes
  lexicon: HALOT
  rationale: Qal feminine singular participle from צפה conveys ongoing attentive watching
    or oversight. 'Watches over' preserves the active, habitual sense in idiomatic
    English and fits the portrait of diligent household supervision.
- source_word: הֲלִיכוֹת
  chosen: the ways
  alternatives:
  - the goings
  - the conduct
  - the affairs
  lexicon: HALOT
  rationale: Plural noun from הלך literally denotes goings/walkings, but in context
    refers to the patterns, movements, or affairs of the household. 'Ways' keeps a
    relatively formal link to the Hebrew while remaining natural English.
- source_word: בֵּיתָהּ
  chosen: her household
  alternatives:
  - her house
  - her home
  lexicon: HALOT
  rationale: בַּיִת can mean the physical house or the household as a domestic unit.
    Here, because the verse concerns oversight of domestic operations, 'household'
    better captures the social and functional sense.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: '''Bread'' is the literal sense and works well in the idiom ''bread of
    idleness.'' Retaining ''bread'' preserves the metaphor of what one lives on or
    consumes.'
- source_word: עַצְלוּת
  chosen: idleness
  alternatives:
  - laziness
  - sloth
  lexicon: HALOT
  rationale: The noun denotes laziness or slothfulness. 'Idleness' fits the English
    idiom 'bread of idleness' and avoids archaic tone while preserving the moral nuance
    of unproductive inactivity.
- source_word: לֹא תֹאכֵל
  chosen: does not eat
  alternatives:
  - will not eat
  - never eats
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic action in proverbial style
    rather than simple future. 'Does not eat' best communicates habitual refusal/absence
    of participation in idleness.
