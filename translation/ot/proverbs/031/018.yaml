id: PRO.31.18
reference: Proverbs 31:18
source:
  edition: WLC
  text: טָ֭עֲמָה כִּי ט֣וֹב סַחְרָ֑/הּ לֹֽא יִכְבֶּ֖ה ב/ליל נֵרָֽ/הּ־־׃
translation:
  text: She perceives that her merchandise is good; her lamp does not go out at night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She tastes that her merchandise is good,' with 'tastes' expressing experiential
      discernment rather than literal eating.
    reason: lexical_alternative
  - marker: b
    text: Or 'her trade' or 'her profit' is good.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָעֲמָה
  chosen: she perceives
  alternatives:
  - she tastes
  - she sees by experience
  - she realizes
  lexicon: HALOT
  rationale: The verb literally means 'taste,' but in wisdom usage it extends to experiential
    discernment or perception. Here the object is the quality of her trade, so an
    idiomatic English rendering that preserves evaluative discernment is preferable
    to the overly literal 'tastes.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the content of what she perceives: ''that her merchandise
    is good.'' ''That'' is the most natural English complementizer here.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - profitable
  - beneficial
  lexicon: HALOT
  rationale: The adjective broadly denotes goodness or desirability. In commercial
    context it can imply profitability, but 'good' preserves the Hebrew's wider sense
    while allowing the economic nuance to be inferred from 'merchandise.'
- source_word: סַחְרָהּ
  chosen: her merchandise
  alternatives:
  - her trade
  - her profit
  - her gain
  lexicon: HALOT
  rationale: The noun refers to merchandise, trade, or commercial gain. 'Merchandise'
    best matches the concrete commercial sense in context and avoids narrowing the
    term to abstract profit alone.
- source_word: לֹא יִכְבֶּה
  chosen: does not go out
  alternatives:
  - is not extinguished
  - does not go dark
  lexicon: HALOT
  rationale: Standard idiomatic rendering for a lamp being extinguished. Present tense
    in English fits the proverbial description.
- source_word: בַלַּיְלָה
  chosen: at night
  alternatives:
  - in the night
  - by night
  lexicon: HALOT
  rationale: Natural modern English temporal expression.
- source_word: נֵרָהּ
  chosen: her lamp
  alternatives:
  - her light
  lexicon: HALOT
  rationale: The noun specifically denotes a lamp, not light in the abstract. Retaining
    'lamp' preserves the domestic and metaphorically industrious image.
