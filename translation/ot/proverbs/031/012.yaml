id: PRO.31.12
reference: Proverbs 31:12
source:
  edition: WLC
  text: גְּמָלַ֣תְ/הוּ ט֣וֹב וְ/לֹא רָ֑ע כֹּ֝֗ל יְמֵ֣י חַיֶּֽי/ה־׃
translation:
  text: She does him good, and not harm, all the days of her life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She repays him with good and not harm.' The Hebrew verb can carry the
      sense of dealing with or recompensing someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּמָלַתְהוּ
  chosen: does him
  alternatives:
  - deals with him
  - repays him
  - rewards him
  lexicon: HALOT
  rationale: The verb גמל can mean to deal with, repay, or recompense someone, whether
    for good or ill. In this context, paired with the direct objects 'good' and 'not
    harm,' the idiom expresses ongoing treatment toward her husband. 'Does him' in
    the sense 'does him good' is natural English and preserves the Hebrew construction
    without overinterpreting it as repayment.
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  - benefit
  lexicon: HALOT
  rationale: טוֹב is the straightforward adjective/noun 'good.' Here it functions
    substantivally after the verb, so 'good' is the most direct rendering.
- source_word: וְלֹא רָע
  chosen: and not harm
  alternatives:
  - and not evil
  - and not bad
  lexicon: HALOT
  rationale: רָע can denote moral evil or experiential harm/injury. In this domestic
    and relational context, 'harm' best conveys the contrast with 'good' in idiomatic
    English without importing a broader abstract moral category.
- source_word: כֹּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout
  - for all the days of
  lexicon: HALOT
  rationale: This common Hebrew temporal expression is most naturally rendered 'all
    the days of,' preserving both the distributive sense and the poetic cadence.
- source_word: חַיֶּיהָ
  chosen: her life
  alternatives:
  - her lifetime
  - her lives
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, חַיִּים commonly means 'life' in English
    singular when referring to the span of a person's life. 'Her life' is idiomatic
    and accurate.
