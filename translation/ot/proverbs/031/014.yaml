id: PRO.31.14
reference: Proverbs 31:14
source:
  edition: WLC
  text: הָ֭יְתָה כָּ/אֳנִיּ֣וֹת סוֹחֵ֑ר מִ֝/מֶּרְחָ֗ק תָּבִ֥יא לַחְמָֽ/הּ׃
translation:
  text: She is like merchant ships; from far away she brings her food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "her bread."'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה
  chosen: She is
  alternatives:
  - She was
  - She has become
  lexicon: HALOT
  rationale: Qal perfect 3fs of היה can be rendered with a present sense in proverbial
    poetry, describing characteristic behavior rather than a past event. English present
    fits the gnomic context of the valiant wife passage.
- source_word: כָּאֳנִיּוֹת
  chosen: like merchant ships
  alternatives:
  - like ships
  - as merchant vessels
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). אֳנִיּוֹת is plural 'ships.'
    The following סוֹחֵר specifies trading/merchant activity, so the phrase is best
    taken together as 'merchant ships' rather than leaving 'ships' bare.
- source_word: סוֹחֵר
  chosen: merchant
  alternatives:
  - trader
  - commerce
  lexicon: HALOT
  rationale: The participial/nominal form denotes one engaged in trade. In construct-like
    apposition with 'ships,' 'merchant' is the most natural English modifier.
- source_word: מִמֶּרְחָק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: The preposition מִן plus מֶרְחָק expresses source from a distant place.
    'From far away' is clear modern English while preserving the sense of distance.
- source_word: תָּבִיא
  chosen: she brings
  alternatives:
  - she brings in
  - she causes to come
  lexicon: HALOT
  rationale: Hiphil 3fs of בוא commonly means 'bring.' In context it describes the
    woman's procuring provisions, so simple 'brings' is sufficient and idiomatic.
- source_word: לַחְמָהּ
  chosen: her food
  alternatives:
  - her bread
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but often broadly denotes food/provisions.
    Here the context is household provisioning from afar, so 'food' communicates the
    wider sense; the more literal 'bread' is worth preserving in a footnote.
