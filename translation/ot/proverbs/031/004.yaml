id: PRO.31.4
reference: Proverbs 31:4
source:
  edition: WLC
  text: אַ֤ל לַֽ/מְלָכִ֨ים לְֽמוֹאֵ֗ל אַ֣ל לַֽ/מְלָכִ֣ים שְׁתוֹ יָ֑יִן וּ֝/לְ/רוֹזְנִ֗ים
    או שֵׁכָֽר׀־׃
translation:
  text: It is not for kings, O Lemuel, it is not for kings to drink wine, nor for
    rulers to crave strong drink,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''nor for rulers: Where is strong drink?'' The Hebrew
      expression is terse and may depict rulers seeking intoxicating drink.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: It is not for
  alternatives:
  - Do not
  - Not for
  lexicon: HALOT
  rationale: אַל is a negative particle often used in prohibition. In this poetic
    admonition, the repeated construction with לַמְלָכִים is more naturally rendered
    idiomatically as 'It is not for kings' rather than a direct imperative 'Do not,'
    preserving the Hebrew emphasis and parallelism.
- source_word: לַמְלָכִים
  chosen: for kings
  alternatives:
  - to kings
  lexicon: HALOT
  rationale: 'The preposition ל with ''kings'' expresses suitability or propriety:
    this is not fitting for kings. ''For kings'' is the most natural English equivalent
    in this wisdom context.'
- source_word: לְמוֹאֵל
  chosen: O Lemuel
  alternatives:
  - Lemuel
  lexicon: HALOT
  rationale: A direct address to the named king. Adding 'O' reflects the vocative
    force in natural English without overtranslating.
- source_word: שְׁתוֹ
  chosen: to drink
  alternatives:
  - drink
  lexicon: HALOT
  rationale: The infinitive/verb form here functions with the preceding negative suitability
    expression. 'To drink' fits the English syntax after 'it is not for kings.'
- source_word: יָיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for the Hebrew term for wine.
- source_word: וּלְרוֹזְנִים
  chosen: nor for rulers
  alternatives:
  - and for dignitaries
  - and for princes
  lexicon: HALOT
  rationale: רוֹזְנִים denotes high officials, princes, or rulers. 'Rulers' is clear
    modern English and preserves the parallel with 'kings.' The prefixed conjunction
    and preposition are represented by 'nor for.'
- source_word: או
  chosen: to crave
  alternatives:
  - where is?
  - or
  lexicon: HALOT
  rationale: In this context או is commonly understood idiomatically in the sense
    of asking after or desiring strong drink ('where is strong drink?' > craving/seeking
    it), not as a simple disjunction 'or.' Rendering it as 'to crave' communicates
    the sense in readable English. The more literal alternative is preserved in a
    footnote because the Hebrew is somewhat terse and debated.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר refers broadly to intoxicating drink other than wine. 'Strong
    drink' is the established and sufficiently clear English rendering.
