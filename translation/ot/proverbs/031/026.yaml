id: PRO.31.26
reference: Proverbs 31:26
source:
  edition: WLC
  text: פִּ֭י/הָ פָּתְחָ֣ה בְ/חָכְמָ֑ה וְ/תֽוֹרַת חֶ֝֗סֶד עַל לְשׁוֹנָֽ/הּ־־׃
translation:
  text: She opens her mouth with wisdom, and the instruction of kindness is on her
    tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law of kindness is on her tongue.' The Hebrew תּוֹרָה can mean 'law,'
      but here likely refers more broadly to instruction or teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'steadfast love,' 'mercy,' or 'faithful love' for 'kindness' (חֶסֶד),
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיהָ
  chosen: her mouth
  alternatives:
  - her speech
  lexicon: HALOT
  rationale: Literal rendering of 'her mouth' preserves the concrete Hebrew idiom.
    English naturally understands 'opens her mouth' as speaking, so no paraphrase
    is needed.
- source_word: פָּתְחָה
  chosen: opens
  alternatives:
  - has opened
  - speaks
  lexicon: HALOT
  rationale: The qatal form in this poetic context expresses characteristic action;
    present-tense English fits proverbial description better than a simple past. 'Opens'
    also preserves the Hebrew verb rather than paraphrasing as 'speaks'.
- source_word: בְחָכְמָה
  chosen: with wisdom
  alternatives:
  - wisely
  - in wisdom
  lexicon: HALOT
  rationale: The preposition ב is retained with 'with' to preserve the instrumental/associative
    sense. 'With wisdom' is more formally transparent than the adverb 'wisely' while
    remaining natural English.
- source_word: וְתוֹרַת
  chosen: the instruction of
  alternatives:
  - the law of
  - teaching of
  lexicon: HALOT
  rationale: תּוֹרָה here is not specifically Mosaic law but instruction/teaching.
    'Instruction' best conveys formative guidance in wisdom literature and avoids
    an overly legal sense that 'law' might suggest.
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - mercy
  - faithful love
  lexicon: HALOT
  rationale: In this interpersonal wisdom context, 'kindness' communicates benevolent,
    loyal speech naturally in English. More covenantally loaded options such as 'steadfast
    love' are possible but sound less idiomatic attached to 'instruction' here.
- source_word: תּוֹרַת חֶסֶד
  chosen: the instruction of kindness
  alternatives:
  - kind instruction
  - gracious teaching
  - the law of kindness
  lexicon: HALOT
  rationale: The construct chain is preserved rather than flattened into a simple
    adjective. 'Instruction of kindness' keeps both nouns visible and reflects the
    Hebrew structure, while still reading clearly.
- source_word: עַל לְשׁוֹנָהּ
  chosen: is on her tongue
  alternatives:
  - is upon her tongue
  - is in her speech
  lexicon: HALOT
  rationale: This idiom is rendered closely and naturally. 'On her tongue' preserves
    the image of ready, habitual speech better than the more interpretive 'in her
    speech'.
