id: PRO.31.10
reference: Proverbs 31:10
source:
  edition: WLC
  text: אֵֽשֶׁת חַ֭יִל מִ֣י יִמְצָ֑א וְ/רָחֹ֖ק מִ/פְּנִינִ֣ים מִכְרָֽ/הּ־׃
translation:
  text: A wife of noble character—who can find? Her value is far beyond jewels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A woman of noble character'; the Hebrew can refer more generally to
      a woman, though the household context favors 'wife.'
    reason: lexical_alternative
  - marker: b
    text: פְּנִינִים may also be rendered 'pearls' or traditionally 'rubies'; the
      exact gemstone is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'Her worth is far above jewels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת
  chosen: wife of
  alternatives:
  - woman of
  lexicon: HALOT
  rationale: Construct form of אִשָּׁה with following noun. In this acrostic context
    introducing the ideal household figure, 'wife of' fits the marital and domestic
    setting better than the more general 'woman of,' while still preserving the construct
    relationship.
- source_word: חַיִל
  chosen: noble character
  alternatives:
  - valor
  - excellence
  - worth
  - strength
  lexicon: HALOT
  rationale: חַיִל can denote strength, valor, capability, wealth, or excellence.
    Here it describes the exemplary wife not primarily as a warrior but as a woman
    of strength, competence, and moral worth. 'Noble character' captures the composite
    sense in idiomatic English, though 'valor' and 'excellent' are possible more formal
    alternatives.
- source_word: מִי יִמְצָא
  chosen: who can find?
  alternatives:
  - who will find?
  - who may find?
  lexicon: HALOT
  rationale: The imperfect here functions rhetorically, expressing rarity rather than
    simple future time. 'Who can find?' is natural English for the rhetorical question
    and conveys the sense of exceptional scarcity.
- source_word: וְרָחֹק
  chosen: is far beyond
  alternatives:
  - is far more distant than
  - is far above
  lexicon: HALOT
  rationale: Predicate adjective meaning 'far, distant.' In context it expresses surpassing
    worth by comparison, so 'is far beyond' communicates comparative excellence in
    clear modern English.
- source_word: פְּנִינִים
  chosen: jewels
  alternatives:
  - pearls
  - rubies
  - corals
  lexicon: HALOT
  rationale: The precise referent of פְּנִינִים is debated; it denotes precious gems
    or costly ornaments. Traditional English often uses 'rubies,' but the term is
    not certainly that specific. 'Jewels' preserves the sense of precious valuables
    without over-specifying the gemstone.
- source_word: מִכְרָהּ
  chosen: her value
  alternatives:
  - her price
  - her worth
  lexicon: HALOT
  rationale: The noun refers to price or valuation. In English, 'her value' or 'her
    worth' better conveys the proverb's comparison without sounding commercial in
    a reductive way. The text speaks of comparative worth, not market commodification.
