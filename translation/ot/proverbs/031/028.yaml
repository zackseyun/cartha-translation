id: PRO.31.28
reference: Proverbs 31:28
source:
  edition: WLC
  text: קָ֣מוּ בָ֭נֶי/הָ וַֽ/יְאַשְּׁר֑וּ/הָ בַּ֝עְלָ֗/הּ וַֽ/יְהַֽלְלָ/הּ׃
translation:
  text: 'Her children rise up and call her blessed; her husband also, and he praises
    her:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her sons rise up.' The Hebrew בָנֶיהָ can refer specifically to sons
      or more generally to children.
    reason: lexical_alternative
  - marker: b
    text: Or 'pronounce her blessed.' The Hebrew verb carries the sense of declaring
      someone fortunate or blessed.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָמוּ
  chosen: rise up
  alternatives:
  - stand up
  - arise
  lexicon: HALOT
  rationale: Qal perfect plural of קום, literally 'arose/stood up.' 'Rise up' preserves
    the concrete action and the honorific nuance in context without over-paraphrasing.
- source_word: בָנֶיהָ
  chosen: her children
  alternatives:
  - her sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' specifically or 'children' more broadly. In wisdom
    literature and family commendation context, 'children' best captures the likely
    collective sense without unnecessary male restriction.
- source_word: וַיְאַשְּׁרוּהָ
  chosen: call her blessed
  alternatives:
  - pronounce her blessed
  - bless her
  - call her happy
  lexicon: HALOT
  rationale: From אשר in the Piel, meaning to declare someone blessed/happy/fortunate.
    'Call her blessed' is idiomatic English and preserves the evaluative public commendation
    implied by the verb.
- source_word: בַּעְלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: Though בעל can denote owner/master in some contexts, in this domestic
    setting with a pronominal suffix it clearly means 'her husband.'
- source_word: וַיְהַלְלָהּ
  chosen: he praises her
  alternatives:
  - he commends her
  - he extols her
  lexicon: HALOT
  rationale: From הלל, 'to praise.' 'He praises her' is the most direct and natural
    rendering, preserving the singular subject referring back to 'her husband.'
- source_word: ו
  chosen: also, and
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction before 'her husband' is rendered with slight expansion
    as 'also, and' to reflect the additive force and the shift from the children to
    the husband in smooth English.
