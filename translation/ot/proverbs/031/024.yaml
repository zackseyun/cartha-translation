id: PRO.31.24
reference: Proverbs 31:24
source:
  edition: WLC
  text: סָדִ֣ין עָ֭שְׂתָה וַ/תִּמְכֹּ֑ר וַ֝/חֲג֗וֹר נָתְנָ֥ה לַֽ/כְּנַעֲנִֽי׃
translation:
  text: She makes linen garments and sells them, and supplies belts to the merchant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'linen cloth' or 'fine linen garments.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the Canaanite'; in context this likely means 'to the merchant'
      or 'trader.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sashes' for the waist.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָדִין
  chosen: linen garments
  alternatives:
  - linen cloth
  - sheet
  - fine linen garment
  lexicon: HALOT
  rationale: The noun denotes a linen item or garment made of fine cloth. In this
    commercial context, a countable product is in view rather than raw fabric, so
    'linen garments' best captures both material and merchandise.
- source_word: עָשְׂתָה
  chosen: makes
  alternatives:
  - made
  - produces
  - fashioned
  lexicon: HALOT
  rationale: 'Although the Hebrew perfect can be rendered past, the poem describes
    the woman''s characteristic activities, so an English present habitual fits the
    discourse well: ''makes''.'
- source_word: וַתִּמְכֹּר
  chosen: and sells them
  alternatives:
  - and sold
  - then sells
  lexicon: HALOT
  rationale: The waw-consecutive continues the description of her customary industrious
    actions. English present habitual preserves the portrait style. 'Them' is supplied
    naturally in English to refer back to the garments.
- source_word: חֲגוֹר
  chosen: belts
  alternatives:
  - sashes
  - girdles
  - waistbands
  lexicon: HALOT
  rationale: The noun refers to an item worn around the waist. 'Belts' is clear, modern
    English; 'sashes' remains possible but is less neutral and may sound more specialized.
- source_word: נָתְנָה
  chosen: supplies
  alternatives:
  - gives
  - delivers
  - provides
  lexicon: HALOT
  rationale: Literally 'gives,' but in a trade setting the sense is commercial provision
    or delivery. 'Supplies' conveys the market-oriented action without overstating
    the mechanics.
- source_word: לַכְּנַעֲנִי
  chosen: to the merchant
  alternatives:
  - to the Canaanite
  - to the trader
  lexicon: HALOT
  rationale: In wisdom and poetic contexts, 'Canaanite' can function metonymically
    for a trader or merchant. Here the commercial context strongly favors the occupational
    sense over ethnic identity, so 'merchant' is the clearest rendering.
