- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of תִתְהַלָּל in the final clause
  chosen_reading: passive-like 'shall be praised'
  alternative_readings:
  - reflexive 'shall praise herself'/'may praise herself'
  rationale: 'Although the stem can sometimes bear a reflexive nuance, the immediate context and the broader poem''s commendation of the excellent woman strongly favor the passive-like sense: she is the one who deserves praise.'
