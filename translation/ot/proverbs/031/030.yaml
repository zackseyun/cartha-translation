id: PRO.31.30
reference: Proverbs 31:30
source:
  edition: WLC
  text: שֶׁ֣קֶר הַ֭/חֵן וְ/הֶ֣בֶל הַ/יֹּ֑פִי אִשָּׁ֥ה יִרְאַת יְ֝הוָ֗ה הִ֣יא תִתְהַלָּֽל־׃
translation:
  text: Charm is deceitful, and beauty is fleeting, but a woman who fears Yahweh shall be praised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'beauty is vapor'; the Hebrew image can emphasize transience as well as emptiness.
    reason: lexical_alternative
  - marker: b
    text: Or 'a wife'; the Hebrew אִשָּׁה can mean either 'woman' or 'wife' depending on context.
    reason: alternative_reading
  - marker: c
    text: Or 'may praise herself' if taken reflexively, though the context strongly favors 'shall be praised.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁקֶר
  chosen: deceitful
  alternatives:
  - 'false'
  - a lie
  - deceptive
  lexicon: HALOT
  rationale: The noun literally means 'falsehood/deception.' In English, predicating it of 'charm' is most natural as the adjective 'deceitful' rather than the more wooden 'charm is false.' This preserves the proverb's evaluative force in idiomatic English.
- source_word: הַחֵן
  chosen: charm
  alternatives:
  - grace
  - favor
  - pleasantness
  lexicon: HALOT
  rationale: In this context the term refers to outward attractiveness or winsomeness rather than theological 'grace' or social 'favor.' 'Charm' is the standard and contextually fitting English equivalent.
- source_word: הֶבֶל
  chosen: fleeting
  alternatives:
  - vain
  - vanity
  - breath
  - vapor
  lexicon: HALOT
  rationale: The noun's core image is breath/vapor, often extended to transience or emptiness. With 'beauty' as subject complement, 'fleeting' best captures the proverb's point that beauty quickly passes, while avoiding archaic 'vanity' and preserving readability.
- source_word: הַיֹּפִי
  chosen: beauty
  alternatives:
  - physical beauty
  - appearance
  lexicon: HALOT
  rationale: The noun denotes beauty or attractiveness. 'Beauty' is the most direct and natural rendering here.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - woman
  - wife
  lexicon: HALOT
  rationale: The Hebrew can mean either 'woman' or 'wife' depending on context. Here the saying is a general wisdom statement, not explicitly about a husband-wife relation, so 'a woman' best preserves the generic sense.
- source_word: יִרְאַת יְהוָה
  chosen: who fears the LORD
  alternatives:
  - with the fear of the LORD
  - fearing the LORD
  lexicon: HALOT
  rationale: The construct phrase literally 'fear of the LORD' functions appositionally to identify the kind of woman in view. Rendering it as a relative clause produces clear English while preserving the covenantal wisdom theme. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: הִיא
  chosen: she
  alternatives:
  - this one
  - that one
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic. Rendering it explicitly as ''she'' and setting it off with a dash preserves the emphasis: this woman, rather than charm or beauty, is the one worthy of praise.'
- source_word: תִתְהַלָּל
  chosen: shall be praised
  alternatives:
  - is to be praised
  - will praise herself
  - praises herself
  lexicon: HALOT
  rationale: The Hitpael of הלל can be reflexive ('boast oneself') or passive-like ('be praised'). In this context, contrasted with deceptive charm and fleeting beauty, the sense is that such a woman is the proper object of praise. 'Shall be praised' fits both the syntax and the proverb's commendatory conclusion.
