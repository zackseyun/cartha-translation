id: PRO.31.22
reference: Proverbs 31:22
source:
  edition: WLC
  text: מַרְבַדִּ֥ים עָֽשְׂתָה לָּ֑/הּ שֵׁ֖שׁ וְ/אַרְגָּמָ֣ן לְבוּשָֽׁ/הּ־׃
translation:
  text: She makes coverings for herself; fine linen and purple are her clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coverlets,' 'bed coverings,' or possibly 'tapestries.' The Hebrew term
      refers broadly to textile coverings and may denote luxurious household fabrics.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבַדִּים
  chosen: coverings
  alternatives:
  - coverlets
  - bed coverings
  - tapestries
  lexicon: HALOT
  rationale: The plural noun refers to spread-out textile items, likely household
    or bed coverings. 'Coverings' is broad and natural in English, avoiding over-specification
    while preserving the domestic textile sense. Alternatives such as 'coverlets'
    or 'bed coverings' are possible but narrower; 'tapestries' is traditional in some
    English versions but can suggest wall hangings more than the Hebrew warrants.
- source_word: עָשְׂתָה
  chosen: makes
  alternatives:
  - made
  - has made
  lexicon: HALOT
  rationale: The qatal form in Hebrew wisdom poetry commonly expresses characteristic
    action. Present tense in English ('makes') fits the portrait of the capable woman
    as a habitual pattern rather than a single past event.
- source_word: לָּהּ
  chosen: for herself
  alternatives:
  - for her
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates benefit or possession.
    'For herself' best conveys that these items are made for her own use, matching
    the verse's focus on her household competence and personal attire.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שֵׁשׁ commonly denotes fine linen, often a high-quality textile. 'Fine
    linen' preserves the sense of quality and status better than the bare 'linen'.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - purple fabric
  lexicon: HALOT
  rationale: The noun denotes purple-dyed material associated with wealth and dignity.
    'Purple' is the standard concise rendering in English; the textile sense is clear
    from the parallel with clothing.
- source_word: לְבוּשָׁהּ
  chosen: her clothing
  alternatives:
  - her garment
  - what she wears
  lexicon: HALOT
  rationale: The singular collective noun is naturally rendered 'her clothing' in
    English. This preserves the sense of attire generally rather than implying only
    one garment.
