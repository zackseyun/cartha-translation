id: PRO.21.11
reference: Proverbs 21:11
source:
  edition: WLC
  text: בַּ/עְנָשׁ לֵ֭ץ יֶחְכַּם פֶּ֑תִי וּ/בְ/הַשְׂכִּ֥יל לְ֝/חָכָ֗ם יִקַּח דָּֽעַת־־־׃
translation:
  text: When a scoffer is punished, the simple become wise; and when a wise man is
    instructed, he gains knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a wise person is instructed, he or she gains knowledge.' The Hebrew
      reads 'a wise man,' using a masculine singular form as a representative type
      in proverbial style.
    reason: lexical_alternative
  - marker: b
    text: Or 'By the punishment of a scoffer, the simple become wise.' The Hebrew
      construction can be rendered more formally with 'by/in the punishing of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/עְנָשׁ
  chosen: When ... is punished
  alternatives:
  - By the punishment of
  - In the punishing of
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct of ענשׁ expresses circumstance
    or occasion: ''when/in the punishing of.'' In idiomatic English, ''when ... is
    punished'' best captures the temporal-situational force without awkwardness.'
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  - a scorner
  lexicon: HALOT
  rationale: לץ denotes a cynical, derisive person who rejects correction. 'Scoffer'
    preserves the moral and verbal dimension better than the more generic 'mocker.'
- source_word: יֶחְכַּם
  chosen: become wise
  alternatives:
  - learn wisdom
  - grow wise
  lexicon: HALOT
  rationale: The verb from חכם in the Qal here indicates becoming wise rather than
    merely possessing wisdom. 'Become wise' is a natural English rendering.
- source_word: פֶּתִי
  chosen: the simple
  alternatives:
  - the naive
  - the inexperienced
  lexicon: HALOT
  rationale: פתי in Proverbs refers to the simple or naive person, morally and intellectually
    unformed, not merely unintelligent. 'The simple' is the standard wisdom-literature
    term and preserves the category.
- source_word: וּ/בְ/הַשְׂכִּיל
  chosen: and when ... is instructed
  alternatives:
  - and by instructing
  - and when one gives insight to
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of שׂכל can mean to make prudent, instruct,
    or give insight. With the following לְחָכָם, the sense is 'when a wise man is
    instructed/given insight.' 'Is instructed' is the clearest idiomatic rendering.
- source_word: לְ/חָכָם
  chosen: a wise man
  alternatives:
  - the wise
  - a wise person
  lexicon: HALOT
  rationale: The masculine singular adjective used substantivally refers to a wise
    man as a representative type in Proverbs. Per gender-accurate policy, 'wise man'
    matches the source form and proverbial style better than a neutral recasting.
- source_word: יִקַּח
  chosen: he gains
  alternatives:
  - he acquires
  - he takes
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this collocation with דַּעַת the idiomatic
    sense is acquiring or gaining knowledge. 'Gains' is natural modern English while
    preserving the metaphor of reception/acquisition.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: דעת is the standard term for knowledge in Proverbs, distinct from but
    related to wisdom. 'Knowledge' preserves that lexical distinction.
