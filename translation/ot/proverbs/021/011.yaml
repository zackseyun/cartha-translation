theological_decisions:
- issue: Gendered proverbial subject
  chosen_reading: a wise man
  alternative_readings:
  - a wise person
  - the wise
  rationale: The Hebrew is grammatically masculine singular and functions as a representative
    proverbial type. Following the project's gender-accurate policy, the masculine
    form is retained rather than neutralized.
