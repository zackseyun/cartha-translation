id: PRO.21.15
reference: Proverbs 21:15
source:
  edition: WLC
  text: שִׂמְחָ֣ה לַ֭/צַּדִּיק עֲשׂ֣וֹת מִשְׁפָּ֑ט וּ֝/מְחִתָּ֗ה לְ/פֹ֣עֲלֵי אָֽוֶן׃
translation:
  text: Doing justice is a joy to the righteous, but a terror to evildoers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Doing justice is joy to the righteous, and ruin to evildoers.' The Hebrew
      noun מְחִתָּה can denote terror, dismay, or ruin/destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy/gladness. 'Joy' is concise and idiomatic in the
    verbless clause, yielding natural English without losing the nominal force.
- source_word: לַצַּדִּיק
  chosen: to the righteous
  alternatives:
  - for the righteous
  - to the just
  lexicon: HALOT
  rationale: The preposition ל marks relation/advantage here. 'To the righteous' preserves
    the Hebrew structure, while 'the righteous' reflects צַדִּיק as a substantival
    singular with representative force.
- source_word: עֲשׂוֹת
  chosen: doing
  alternatives:
  - to do
  - the doing of
  lexicon: HALOT
  rationale: The infinitive construct functions substantivally. 'Doing' gives smooth
    English and keeps the action as a general principle rather than a one-time act.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: In wisdom literature מִשְׁפָּט commonly refers to just judgment or justice
    as a moral-legal norm. 'Justice' is the clearest modern rendering here.
- source_word: וּמְחִתָּה
  chosen: but a terror
  alternatives:
  - and ruin
  - and dismay
  - and destruction
  lexicon: HALOT
  rationale: The noun can denote terror, dismay, or ruin. In this antithetical proverb,
    the sense is that the same reality that is joy to the righteous is dreadful to
    evildoers. Rendering with 'but a terror' makes the contrast explicit and idiomatic
    in English.
- source_word: לְפֹעֲלֵי אָוֶן
  chosen: to evildoers
  alternatives:
  - to workers of iniquity
  - to those who do wickedness
  lexicon: HALOT
  rationale: The phrase literally means 'to workers/doers of trouble/wickedness.'
    'Evildoers' is a natural, compact equivalent that preserves the moral sense of
    the Hebrew idiom.
- source_word: אָוֶן
  chosen: evil
  alternatives:
  - iniquity
  - wickedness
  - trouble
  lexicon: HALOT
  rationale: In this collocation with 'workers of,' the term denotes moral evil/wickedness
    rather than mere trouble. This supports the idiomatic rendering 'evildoers'.
