theological_decisions:
- issue: Divine sovereignty over rulers
  chosen_reading: The verse states that the LORD exercises real control over a king’s
    inner disposition and direction, using the simile of water channels, without specifying
    a philosophical model of providence or human freedom.
  alternative_readings:
  - The verse could be read more strongly as exhaustive determinism.
  - The verse could be read more weakly as mere influence or guidance.
  rationale: The proverb clearly affirms the LORD's sovereign ability to direct a
    king's heart. The translation preserves that force through 'in the hand of the
    LORD' and 'he turns it' while avoiding interpretive additions that would settle
    later theological debates not explicit in the Hebrew.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
