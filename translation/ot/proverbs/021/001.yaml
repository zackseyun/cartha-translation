id: PRO.21.1
reference: Proverbs 21:1
source:
  edition: WLC
  text: פַּלְגֵי מַ֣יִם לֶב מֶ֭לֶךְ בְּ/יַד יְהוָ֑ה עַֽל כָּל אֲשֶׁ֖ר יַחְפֹּ֣ץ יַטֶּֽ/נּוּ־־־־־׃
translation:
  text: A king’s heart is like channels of water in the hand of the LORD; he turns
    it wherever he desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'streams of water' or 'watercourses.' The Hebrew image is of divided
      channels that can be directed.
    reason: lexical_alternative
  - marker: b
    text: Or 'he pleases' or 'he wills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּלְגֵי מַיִם
  chosen: channels of water
  alternatives:
  - streams of water
  - watercourses
  lexicon: HALOT
  rationale: פֶּלֶג commonly refers to divided streams, channels, or watercourses
    rather than water in general. 'Channels of water' preserves the image of directed
    irrigation flow and fits the following verb 'turns.'
- source_word: לֶב מֶלֶךְ
  chosen: a king’s heart
  alternatives:
  - the heart of a king
  - the king’s heart
  lexicon: HALOT
  rationale: Construct phrase meaning 'heart of a king.' The indefinite 'a king’s
    heart' suits proverbial style, expressing a general truth rather than referring
    to one specific king.
- source_word: בְּיַד יְהוָה
  chosen: in the hand of the LORD
  alternatives:
  - in the LORD’s hand
  lexicon: HALOT
  rationale: The idiom 'in the hand of' conveys control or power. Per doctrine, יְהוָה
    is rendered 'the LORD.' Retaining the idiom preserves the metaphor of divine control
    without over-paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: עַל כָּל אֲשֶׁר
  chosen: wherever
  alternatives:
  - to whatever
  - toward all that
  lexicon: HALOT
  rationale: The phrase literally means 'upon all that/whatever,' but in context with
    נָטָה ('turn, incline') it idiomatically expresses direction toward any destination
    the subject chooses. 'Wherever' gives clear modern English while preserving the
    sense.
- source_word: יַחְפֹּץ
  chosen: he desires
  alternatives:
  - he pleases
  - he wills
  lexicon: HALOT
  rationale: The verb חפץ denotes taking pleasure in, desiring, or willing. 'Desires'
    is readable modern English and avoids importing stronger philosophical freight
    than the Hebrew itself requires.
- source_word: יַטֶּנּוּ
  chosen: he turns it
  alternatives:
  - he directs it
  - he inclines it
  lexicon: HALOT
  rationale: Hiphil of נָטָה means to stretch out, turn, incline, or direct. 'Turns
    it' best matches the water-channel metaphor and keeps the object suffix explicit
    ('it' = the king's heart).
