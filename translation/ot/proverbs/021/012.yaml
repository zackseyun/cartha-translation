id: PRO.21.12
reference: Proverbs 21:12
source:
  edition: WLC
  text: מַשְׂכִּ֣יל צַ֭דִּיק לְ/בֵ֣ית רָשָׁ֑ע מְסַלֵּ֖ף רְשָׁעִ֣ים לָ/רָֽע׃
translation:
  text: The righteous one considers the house of the wicked; he brings the wicked
    to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The Righteous One considers the house of the wicked; he brings the
      wicked to ruin,' taking the subject as God rather than a righteous person.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: considers
  alternatives:
  - acts wisely toward
  - understands
  - gives insight into
  lexicon: HALOT
  rationale: 'From שכל in the Hiphil, the participle commonly conveys acting with
    insight or giving careful consideration. In this syntax it most naturally predicates
    what the righteous person does with respect to the wicked man''s house: he considers
    it thoughtfully. This avoids the less natural English ''is wise to'' while preserving
    the sense of discerning attention.'
- source_word: צַדִּיק
  chosen: the righteous one
  alternatives:
  - the righteous man
  - a righteous person
  lexicon: HALOT
  rationale: Masculine singular adjective used substantivally. 'The righteous one'
    preserves the singular and representative force without over-specifying gender
    in English, while still matching the Hebrew's individual portrait style typical
    of Proverbs.
- source_word: לְבֵית רָשָׁע
  chosen: the house of the wicked
  alternatives:
  - the house of a wicked man
  - the household of the wicked
  lexicon: HALOT
  rationale: בַּיִת can mean house or household. Here either is possible, but 'house'
    is the more direct rendering and works idiomatically in wisdom literature for
    a wicked person's estate or domestic sphere. רָשָׁע is singular, so 'the wicked'
    here is best understood as a singular class-like substantive in English.
- source_word: מְסַלֵּף
  chosen: brings ... to ruin
  alternatives:
  - overthrows
  - subverts
  - casts down
  lexicon: HALOT
  rationale: The verb סלף can carry the sense of overturning, subverting, or ruining.
    Given the object 'the wicked' and the result phrase 'to evil/ruin,' 'brings ...
    to ruin' captures both the action and outcome in natural English.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the wicked ones
  lexicon: HALOT
  rationale: Masculine plural substantive adjective. Rendered generically as 'the
    wicked' for concise proverbial style.
- source_word: לָרָע
  chosen: to ruin
  alternatives:
  - to evil
  - into calamity
  - to disaster
  lexicon: HALOT
  rationale: Though רַע often means 'evil,' in wisdom contexts and with a motion/result
    preposition it can denote harmful outcome, disaster, or ruin. 'To ruin' best fits
    the clause idiomatically in English and avoids suggesting moral corruption is
    being caused rather than judgment/disaster coming upon them.
