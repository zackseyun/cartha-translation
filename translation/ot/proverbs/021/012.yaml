theological_decisions:
- issue: Subject identification in a syntactically compressed proverb
  chosen_reading: The subject is 'the righteous one' throughout the verse.
  alternative_readings:
  - God/the Righteous One considers the house of the wicked; he brings the wicked
    to ruin
  rationale: The Hebrew lacks an explicit divine name, and the most straightforward
    reading takes צַדִּיק as the human subject of the first participial clause, with
    the second participle continuing the same subject. Some interpreters capitalize
    'Righteous One' and take God as subject, but the text itself does not require
    that theological specification. To preserve the proverb's plain sense and avoid
    importing a doctrinal claim not explicit in the Hebrew, the human-generic reading
    is preferred; the divine reading is preserved in a footnote as a viable interpretive
    alternative.
  doctrine_reference: Translation philosophy §§1, 3
