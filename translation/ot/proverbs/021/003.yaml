id: PRO.21.3
reference: Proverbs 21:3
source:
  edition: WLC
  text: עֲ֭שֹׂה צְדָקָ֣ה וּ/מִשְׁפָּ֑ט נִבְחָ֖ר לַ/יהוָ֣ה מִ/זָּֽבַח׃
translation:
  text: To do righteousness and justice is more acceptable to Yahweh than sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is preferred by the LORD'; the Hebrew literally has 'is chosen to/by the LORD,' expressing divine preference or acceptability.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֹׂה
  chosen: to do
  alternatives:
  - doing
  - to practice
  lexicon: HALOT
  rationale: The infinitive construct of עשה functions substantivally here, introducing the action being evaluated. 'To do' is the most direct and idiomatic rendering in English; 'to practice' is possible but slightly more interpretive.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness/right conduct. Since משפט follows, rendering צדקה as 'righteousness' preserves the paired distinction 'righteousness and justice' rather than collapsing both into justice-language.
- source_word: וּמִשְׁפָּט
  chosen: and justice
  alternatives:
  - and judgment
  - and what is just
  lexicon: HALOT
  rationale: משפט here refers to just judgment/justice in ethical conduct. 'Justice' is the clearest modern English equivalent in this wisdom context.
- source_word: נִבְחָר
  chosen: is more acceptable
  alternatives:
  - is chosen
  - is preferable
  - is more pleasing
  lexicon: HALOT
  rationale: The Niphal participle of בחר literally means 'chosen' or 'preferred.' In context with לַיהוָה and the comparison with sacrifice, the sense is comparative preference/acceptability before God. 'More acceptable' communicates the idiomatic force naturally in English while preserving the comparison.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' With נבחר, 'to the LORD' is idiomatic English for acceptability directed toward him; 'before the LORD' is possible but less direct here.
- source_word: מִזָּבַח
  chosen: than sacrifice
  alternatives:
  - than a sacrifice
  - than sacrificial offering
  lexicon: HALOT
  rationale: 'The prefixed מן marks comparison: ''more than sacrifice.'' The singular collective ''sacrifice'' is idiomatic and fits the proverb''s general statement better than the more specific ''a sacrifice'' or expanded ''sacrificial offering.'''
