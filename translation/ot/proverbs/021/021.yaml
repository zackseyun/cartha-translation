theological_decisions:
- issue: Meaning of the repeated צְדָקָה in a wisdom context
  chosen_reading: righteousness in both occurrences
  alternative_readings:
  - justice in one or both occurrences
  - vindication for the second occurrence
  rationale: The verse links the pursuit of righteousness with the finding of life,
    righteousness, and honor. Keeping 'righteousness' in both places preserves the
    Hebrew repetition and the proverb's theological-moral symmetry, rather than narrowing
    the term to social justice or forensic vindication in the main text.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
