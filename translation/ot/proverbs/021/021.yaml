id: PRO.21.21
reference: Proverbs 21:21
source:
  edition: WLC
  text: רֹ֭דֵף צְדָקָ֣ה וָ/חָ֑סֶד יִמְצָ֥א חַ֝יִּ֗ים צְדָקָ֥ה וְ/כָבֽוֹד׃
translation:
  text: Whoever pursues righteousness and steadfast love will find life, righteousness,
    and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for one or both instances of 'righteousness'; the Hebrew term
      can include both personal righteousness and just conduct.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term that can also be rendered
      ''kindness,'' ''mercy,'' or ''loyal love.'''
    reason: lexical_alternative
  - marker: c
    text: The second 'righteousness' may also be understood as 'vindication' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹדֵף
  chosen: pursues
  alternatives:
  - chases
  - seeks after
  - follows after
  lexicon: HALOT
  rationale: The participle denotes active, ongoing pursuit. 'Pursues' is idiomatic
    modern English and preserves the energetic sense better than the flatter 'seeks.'
    Rendering with 'whoever' captures the proverb's generic subject in natural English.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In Proverbs, צְדָקָה can overlap with justice/uprightness, but 'righteousness'
    best preserves the moral and covenantal breadth here. It also matches the repeated
    use later in the verse, maintaining lexical consistency.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - kindness
  - mercy
  - loyal love
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and faithful love, richer than mere
    'kindness' or 'mercy.' 'Steadfast love' is a well-established English rendering
    that preserves this density without paraphrase.
- source_word: יִמְצָא
  chosen: will find
  alternatives:
  - finds
  - will attain
  lexicon: HALOT
  rationale: The imperfect here expresses the general result of the pursuit. 'Will
    find' communicates proverbial consequence clearly in English.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - true life
  lexicon: HALOT
  rationale: Though morphologically plural, the noun commonly functions idiomatically
    as singular 'life' in English. 'Life' is the natural equivalent and fits wisdom-literature
    usage.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - vindication
  lexicon: HALOT
  rationale: The second occurrence is retained as 'righteousness' for consistency.
    Here it may denote either the quality itself or the reward of being regarded as
    righteous/vindicated; the Hebrew allows the compact repetition, and the English
    should preserve it rather than resolve the ambiguity.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  - wealth
  lexicon: HALOT
  rationale: In wisdom contexts כָבוֹד can denote honor, glory, or social esteem,
    sometimes with material overtones. 'Honor' best fits the triad 'life, righteousness,
    and honor' without overreading material prosperity.
