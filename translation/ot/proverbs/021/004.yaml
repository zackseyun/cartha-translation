id: PRO.21.4
reference: Proverbs 21:4
source:
  edition: WLC
  text: רוּם עֵ֭ינַיִם וּ/רְחַב לֵ֑ב נִ֖ר רְשָׁעִ֣ים חַטָּֽאת־־׃
translation:
  text: Haughty eyes and a proud heart— the lamp of the wicked— are sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the plowing of the wicked is sin' (also 'the tillage' or 'the fallow
      ground' of the wicked). The Hebrew word rendered 'lamp' can also be understood
      in an agricultural sense.
    reason: alternative_reading
lexical_decisions:
- source_word: רוּם עֵינַיִם
  chosen: Haughty eyes
  alternatives:
  - lofty eyes
  - raised eyes
  lexicon: HALOT
  rationale: The construct combines רוּם ('height, exaltation') with 'eyes' as an
    idiom for arrogance or pride. 'Haughty eyes' is natural English and preserves
    the metaphor better than a more literal but less idiomatic 'high eyes.'
- source_word: וּרְחַב לֵב
  chosen: a proud heart
  alternatives:
  - a wide heart
  - an enlarged heart
  lexicon: HALOT
  rationale: Literally 'broad/wide of heart,' but in wisdom context this denotes arrogance
    or self-exaltation rather than generosity. 'Proud heart' communicates the moral
    sense in idiomatic English.
- source_word: נִר
  chosen: lamp
  alternatives:
  - plowing
  - tillage
  - fallow ground
  lexicon: HALOT
  rationale: 'The consonantal form can be understood as נִיר/נֵר with two main interpretive
    options in tradition: ''lamp'' or ''plowing/fallow ground.'' ''Lamp'' is preferred
    here because it yields a coherent proverb parallel to inner arrogance: even what
    guides or prospers the wicked is sinful. The alternative is significant and preserved
    in a footnote.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard wisdom term for morally guilty persons. 'The wicked' is concise,
    idiomatic, and preserves the class designation.
- source_word: חַטָּאת
  chosen: are sin
  alternatives:
  - is sin
  - is sinful
  lexicon: HALOT
  rationale: The noun means 'sin.' Because the English subject is compound ('eyes
    and heart ... are'), 'are sin' preserves the nominal force more closely than the
    adjectival 'are sinful,' though the latter is a viable smoothing option.
