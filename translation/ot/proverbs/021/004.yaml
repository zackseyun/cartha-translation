theological_decisions:
- issue: Interpretation of נִר רְשָׁעִים
  chosen_reading: the lamp of the wicked
  alternative_readings:
  - the plowing of the wicked
  - the tillage of the wicked
  - the fallow ground of the wicked
  rationale: This is primarily a lexical and contextual decision rather than a doctrinal
    one, but it affects the proverb's sense substantially. The 'lamp' reading is well
    attested in translation tradition and fits the verse's focus on arrogant disposition
    and the moral corruption of the wicked. The agricultural reading is also ancient
    and plausible, so it is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3, §5
