id: PRO.21.27
reference: Proverbs 21:27
source:
  edition: WLC
  text: זֶ֣בַח רְ֭שָׁעִים תּוֹעֵבָ֑ה אַ֝֗ף כִּֽי בְ/זִמָּ֥ה יְבִיאֶֽ/נּוּ־׃
translation:
  text: The sacrifice of the wicked is an abomination; how much more when he brings
    it with evil intent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even more when he brings it with a wicked scheme.' The Hebrew phrase
      can denote depraved intent or a malicious plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: HALOT
  rationale: זֶבַח denotes a sacrificial offering, especially a slaughtered sacrifice.
    'Sacrifice' is the most natural and sufficiently specific English rendering in
    Proverbs.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: The plural adjective/substantive refers to morally guilty persons in
    general. 'The wicked' is concise, idiomatic, and preserves the proverbial category.
- source_word: תּוֹעֵבָה
  chosen: an abomination
  alternatives:
  - detestable
  - a disgusting thing
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong term for something abhorrent before God. 'Abomination'
    preserves the moral and theological force better than flatter modern alternatives.
- source_word: אַף כִּי
  chosen: how much more
  alternatives:
  - indeed when
  - even when
  - much more when
  lexicon: HALOT
  rationale: 'In wisdom literature אַף כִּי commonly intensifies the statement, moving
    from a base case to a stronger one. ''How much more'' best captures the escalated
    comparison: if the wicked person''s sacrifice is already abhorrent, it is even
    more so under the following condition.'
- source_word: בְּזִמָּה
  chosen: with evil intent
  alternatives:
  - with a wicked scheme
  - with lewdness
  - with depravity
  lexicon: HALOT
  rationale: זִמָּה can denote wickedness, a malicious plan, or depraved intent depending
    on context. Here, in relation to bringing a sacrifice, the sense is not primarily
    sexual but corrupt motive or scheming purpose. 'With evil intent' communicates
    that the offering is brought as part of a morally perverse design.
- source_word: יְבִיאֶנּוּ
  chosen: he brings it
  alternatives:
  - he presents it
  - he brings him
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'bring' or 'present.' The pronominal suffix most
    naturally refers back to the sacrifice, hence 'brings it.' 'Presents it' is possible,
    but 'brings it' stays closer to the Hebrew while remaining natural English.
