theological_decisions:
- issue: Moral evaluation of sacrifice offered by the wicked
  chosen_reading: The proverb teaches that ritual sacrifice is abhorrent when offered
    by wicked persons, and even more so when offered with corrupt intent.
  alternative_readings:
  - The second clause could be read more generally as 'especially when he brings it
    in wickedness' without specifying motive as strategic intent.
  rationale: The verse critiques not sacrifice itself but hypocritical or morally
    corrupt worship. The translation avoids importing a broader anti-sacrificial theology
    and keeps the focus on the offerer's wickedness and intent.
  doctrine_reference: Translation philosophy §1, §3
