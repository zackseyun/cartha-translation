id: PRO.21.28
reference: Proverbs 21:28
source:
  edition: WLC
  text: עֵד כְּזָבִ֥ים יֹאבֵ֑ד וְ/אִ֥ישׁ שׁ֝וֹמֵ֗עַ לָ/נֶ֥צַח יְדַבֵּֽר־׃
translation:
  text: A false witness will perish, but a man who listens will speak forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will speak continually' or 'will speak with enduring effect.' The Hebrew
      phrase rendered 'forever' likely emphasizes lasting validity rather than abstract
      endless duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  chosen: witness
  alternatives:
  - testifier
  lexicon: HALOT
  rationale: The noun denotes one who gives testimony, especially in a legal setting.
    'Witness' is the natural English equivalent and preserves the forensic nuance.
- source_word: כְּזָבִים
  chosen: 'false'
  alternatives:
  - lies
  - deceitful
  lexicon: HALOT
  rationale: Plural 'lies/falsehoods' functions attributively with 'witness.' English
    idiom prefers 'false witness' over the more wooden 'witness of lies.'
- source_word: יֹאבֵד
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: The verb אבד commonly means to perish or be destroyed. 'Will perish'
    is concise, idiomatic, and preserves the proverb's warning without over-specifying
    the mode of ruin.
- source_word: וְאִישׁ
  chosen: but a man
  alternatives:
  - but one
  - but a person
  lexicon: HALOT
  rationale: The conjunction marks contrast, and אִישׁ is grammatically masculine
    singular. Per the gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person,' while still carrying representative force in proverbial style.
- source_word: שֹׁמֵעַ
  chosen: who listens
  alternatives:
  - who hears
  - who obeys
  lexicon: HALOT
  rationale: The participle from שמע can mean hear, listen, or obey depending on context.
    Here the contrast is with false testimony; the sense is of one who listens carefully/reliably
    before speaking. 'Who listens' best captures that nuance.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - continually
  - enduringly
  - victoriously
  lexicon: HALOT
  rationale: נֶצַח can denote perpetuity, lastingness, or enduring continuance. In
    this proverb it most naturally modifies the durability or ongoing validity of
    the truthful speaker's testimony. 'Forever' is the traditional and most compact
    rendering, though the idiomatic sense is enduringly rather than metaphysical eternity.
- source_word: יְדַבֵּר
  chosen: will speak
  alternatives:
  - will keep speaking
  - may speak
  lexicon: HALOT
  rationale: The piel imperfect of דבר means 'speak.' In context it contrasts the
    doomed false witness with the enduring credibility of the one who listens. 'Will
    speak' preserves the Hebrew form and lets לָנֶצַח carry the durative force.
