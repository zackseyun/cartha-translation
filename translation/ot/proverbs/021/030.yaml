id: PRO.21.30
reference: Proverbs 21:30
source:
  edition: WLC
  text: אֵ֣ין חָ֭כְמָה וְ/אֵ֣ין תְּבוּנָ֑ה וְ/אֵ֥ין עֵ֝צָ֗ה לְ/נֶ֣גֶד יְהוָֽה׃פ
translation:
  text: There is no wisdom, no understanding, and no counsel against the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the LORD' or 'in the presence of the LORD.' The Hebrew expression
      can denote being set before someone, but here likely carries the sense of opposition
      or standing over against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: there is no
  alternatives:
  - there is not
  - 'no'
  lexicon: HALOT
  rationale: Existential negation introducing each noun phrase. Rendering as 'there
    is no' gives natural English while preserving the emphatic repeated denial.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs, denoting practical or skillful
    wisdom. 'Wisdom' preserves the proverb's conceptual triad.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: In wisdom literature תְּבוּנָה commonly denotes understanding or discernment.
    'Understanding' is the most idiomatic paired term with 'wisdom' in English and
    preserves the semantic distinction from חָכְמָה.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - advice
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, advice, or plan. 'Counsel' fits the wisdom context
    and keeps the progression from internal capacities ('wisdom,' 'understanding')
    to deliberative strategy.
- source_word: לְנֶגֶד
  chosen: against
  alternatives:
  - before
  - in opposition to
  - in the face of
  lexicon: HALOT
  rationale: Here the preposition expresses opposition rather than mere spatial presence.
    'Against' best captures the sense that no human wisdom or planning can stand in
    opposition to or prevail over the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English convention and the stated policy for
    יְהוָה.
