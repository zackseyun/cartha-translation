theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה. This preserves covenantal resonance in standard English Bible style
    without transliterating the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of לְנֶגֶד יְהוָה
  chosen_reading: against the LORD
  alternative_readings:
  - before the LORD
  - in the presence of the LORD
  rationale: In this proverb the point is not mere existence before God but the futility
    of any wisdom or strategy set in opposition to him. 'Against' best preserves the
    theological thrust that no human resource can successfully oppose the LORD.
