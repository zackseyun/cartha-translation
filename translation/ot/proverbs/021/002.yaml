id: PRO.21.2
reference: Proverbs 21:2
source:
  edition: WLC
  text: כָּֽל דֶּרֶךְ אִ֭ישׁ יָשָׁ֣ר בְּ/עֵינָ֑י/ו וְ/תֹכֵ֖ן לִבּ֣וֹת יְהוָֽה־־׃
translation:
  text: Every man's way is right in his own eyes, but Yahweh weighs hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: "Yahweh." The main text follows the project’s default rendering of the divine name as "the LORD."'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the proverb: each individual case is in view rather than a collective abstraction.'
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: '"Way" is the standard wisdom-literature metaphor for one''s course of life or conduct and is natural in English.'
- source_word: אִישׁ
  chosen: man's
  alternatives:
  - a man’s
  - a person's
  lexicon: HALOT
  rationale: The Hebrew is singular masculine with representative force. Per gender-accurate policy, "man's" preserves the source form and proverbial generic sense better than a neutral recast.
- source_word: יָשָׁר
  chosen: right
  alternatives:
  - upright
  - straight
  lexicon: HALOT
  rationale: In this context the sense is evaluative—what seems morally or practically correct to the person himself—so "right" is the clearest idiomatic rendering.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - to himself
  lexicon: HALOT
  rationale: This Hebrew idiom commonly means according to one's own evaluation. Adding "own" makes the reflexive force explicit in natural English.
- source_word: וְתֹכֵן
  chosen: weighs
  alternatives:
  - examines
  - evaluates
  - measures
  lexicon: HALOT
  rationale: The verb conveys assessing or weighing, often with the image of scales. "Weighs" preserves the metaphor and contrasts human self-assessment with divine evaluation.
- source_word: לִבּוֹת
  chosen: hearts
  alternatives:
  - minds
  - inner motives
  lexicon: HALOT
  rationale: In Hebrew anthropology, "hearts" denotes the inner person, including thought and motive. Retaining "hearts" preserves the biblical idiom and theological depth.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
