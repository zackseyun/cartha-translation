id: PRO.21.7
reference: Proverbs 21:7
source:
  edition: WLC
  text: שֹׁד רְשָׁעִ֥ים יְגוֹרֵ֑/ם כִּ֥י מֵ֝אֲנ֗וּ לַ/עֲשׂ֥וֹת מִשְׁפָּֽט־׃
translation:
  text: The violence of the wicked will drag them away, because they refuse to do
    justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "The plunder of the wicked will sweep them away." The Hebrew of the verb
      is difficult, and interpreters differ on whether the emphasis is on violence,
      plunder, terror, or being carried off by one's own wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁד
  chosen: violence
  alternatives:
  - plunder
  - devastation
  - robbery
  lexicon: HALOT
  rationale: שֹׁד denotes violent destruction or plundering. In this proverb, paired
    with the wicked and followed by their refusal to do justice, the sense is broader
    than a single act of theft; 'violence' best captures their destructive wrongdoing
    in readable English.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard rendering for the plural adjective/noun referring to morally
    guilty persons. 'The wicked' is concise and proverbially natural in English.
- source_word: יְגוֹרֵם
  chosen: will drag them away
  alternatives:
  - will sweep them away
  - will terrify them
  - will carry them off
  lexicon: HALOT
  rationale: From גור, this form with 3mp suffix is difficult and has been understood
    in context as the wicked's own violence carrying them off or sweeping them away.
    'Drag them away' preserves the image of being forcibly carried off by the consequences
    of their own actions. 'Terrify them' is a lexical possibility in some discussions,
    but the context of retributive consequence and the object suffix favors a destructive-result
    sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'Because' is clearer
    in contemporary English than 'for'.
- source_word: מֵאֲנוּ
  chosen: they refuse
  alternatives:
  - they have refused
  - they declined
  lexicon: HALOT
  rationale: The verb means to refuse. Present English 'refuse' fits proverbial style,
    expressing characteristic action.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to practice
  lexicon: HALOT
  rationale: Straightforward infinitive complement after 'refuse.' 'To do' is idiomatic
    with מִשְׁפָּט in biblical legal-ethical contexts.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - what is just
  - judgment
  lexicon: HALOT
  rationale: Here מִשְׁפָּט refers to just action or justice, not merely a legal verdict.
    'Do justice' is a well-established and accurate English equivalent.
