theological_decisions:
- issue: Meaning of רְפָאִים in wisdom literature
  chosen_reading: the dead
  alternative_readings:
  - the shades
  - Rephaim
  rationale: The verse warns that departure from the path of understanding ends in
    the realm/company of the dead. Rendering the term as 'Rephaim' would obscure the
    sense for most readers, while 'the shades' is possible but less accessible. The
    main text therefore uses 'the dead,' with the more literal nuance preserved in
    a footnote.
  doctrine_reference: Translation philosophy §§1, 6
