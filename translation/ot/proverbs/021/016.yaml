id: PRO.21.16
reference: Proverbs 21:16
source:
  edition: WLC
  text: אָדָ֗ם תּ֭וֹעֶה מִ/דֶּ֣רֶךְ הַשְׂכֵּ֑ל בִּ/קְהַ֖ל רְפָאִ֣ים יָנֽוּחַ׃
translation:
  text: A man who wanders from the way of understanding will come to rest in the assembly
    of the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the shades"; Hebrew "Rephaim," a term used in wisdom literature for
      the departed dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: A man
  alternatives:
  - A person
  - Humankind
  lexicon: HALOT
  rationale: The singular noun here introduces a representative individual in a wisdom
    saying. Per doctrine, gender-accurate rendering is preferred where the Hebrew
    is grammatically masculine and generic. 'A man' preserves the singular proverbial
    force better than the more abstract 'whoever' or collective 'humankind'.
- source_word: תּוֹעֶה
  chosen: who wanders
  alternatives:
  - goes astray
  - strays
  lexicon: HALOT
  rationale: The participle denotes one who is wandering or straying from a path.
    'Wanders' fits the path metaphor naturally in English and preserves the ongoing
    character of the participle.
- source_word: מִדֶּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  lexicon: HALOT
  rationale: '''Way'' is a standard wisdom-term in Proverbs for a course of life or
    conduct, and should be preserved where possible rather than flattened to a generic
    expression.'
- source_word: הַשְׂכֵּל
  chosen: of understanding
  alternatives:
  - of insight
  - of prudence
  - of good sense
  lexicon: HALOT
  rationale: The noun refers to insight or prudent understanding. 'Understanding'
    is idiomatic in English with 'way' and preserves the wisdom-literature register
    without becoming overly technical.
- source_word: בִּקְהַל
  chosen: in the assembly
  alternatives:
  - in the congregation
  - among the company
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' is clear modern English and
    retains the corporate image better than the more ecclesially loaded 'congregation'.
- source_word: רְפָאִים
  chosen: the dead
  alternatives:
  - the shades
  - the departed
  - Rephaim
  lexicon: HALOT
  rationale: In this context רפאים refers to the dead in Sheol, not the ethnic Rephaim.
    'The dead' communicates the sense clearly for modern readers. Because 'shades'
    is a plausible more literal alternative that preserves the underworld nuance,
    it is retained in a footnote.
- source_word: יָנוּחַ
  chosen: will come to rest
  alternatives:
  - will rest
  - will settle
  lexicon: HALOT
  rationale: The verb means to rest or settle down. 'Will come to rest' captures the
    future result of the man's wandering and avoids suggesting peaceful repose; in
    context it means ending up among the dead.
