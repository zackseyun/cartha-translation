id: PRO.21.10
reference: Proverbs 21:10
source:
  edition: WLC
  text: נֶ֣פֶשׁ רָ֭שָׁע אִוְּתָה רָ֑ע לֹא יֻחַ֖ן בְּ/עֵינָ֣י/ו רֵעֵֽ/הוּ־־׃
translation:
  text: The soul of the wicked desires evil; his neighbor finds no favor in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' or 'his companion' for 'his neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'finds no favor in his eyes,' a Hebrew idiom for receiving no
      kindness or approval from him.
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - inner being
  - appetite
  - self
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the inner life or desire-center of the person. 'Soul'
    preserves the compact Hebrew expression and the anthropological weight of the
    proverb better than the flatter 'person' or the narrower 'appetite.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked person
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'The wicked' is concise and idiomatic
    in English, preserving the representative singular sense without over-specifying
    gender.
- source_word: אִוְּתָה
  chosen: desires
  alternatives:
  - craves
  - longs for
  lexicon: HALOT
  rationale: From אוה/אוהה in the sense of desiring or craving. 'Desires' is natural
    modern English and fits the moral tone without overstating intensity.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - what is evil
  lexicon: HALOT
  rationale: In wisdom context רָע commonly carries moral force, not merely misfortune
    or injury. 'Evil' best reflects the ethical sense of what the wicked person wants.
- source_word: יֻחַן
  chosen: finds no favor
  alternatives:
  - is not shown favor
  - receives no mercy
  - is not treated graciously
  lexicon: HALOT
  rationale: Hophal of חנן conveys being shown favor or grace. Because the subject
    is the neighbor, 'finds no favor' is idiomatic and preserves the passive sense
    in natural English.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - to him
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in his eyes' and expresses evaluation
    from the wicked man's perspective. Retaining the idiom preserves the proverb's
    vividness.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  - his fellow
  lexicon: HALOT
  rationale: 'רֵעַ can mean friend, companion, or neighbor. ''Neighbor'' best fits
    the ethical-social sense here: even the person near to him receives no favor.'
