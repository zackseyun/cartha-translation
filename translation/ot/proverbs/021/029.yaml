id: PRO.21.29
reference: Proverbs 21:29
source:
  edition: WLC
  text: הֵעֵ֬ז אִ֣ישׁ רָשָׁ֣ע בְּ/פָנָ֑י/ו וְ֝/יָשָׁ֗ר ה֤וּא יכין דרכי/ו׀׃
translation:
  text: A wicked man puts on a bold face, but an upright man makes his way sure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A wicked man hardens his face, but the upright establishes his ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵעֵז
  chosen: puts on a bold face
  alternatives:
  - hardens his face
  - shows a bold face
  - is brazen in his face
  lexicon: HALOT
  rationale: Hiphil of עזז here conveys making oneself strong/bold, idiomatically
    expressed with the following בְּפָנָיו ('in/with his face'). In English, 'puts
    on a bold face' captures the idiomatic sense of brazen self-assertion better than
    a wooden 'strengthens his face.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Gender-accurate rendering per translation philosophy. The Hebrew singular
    masculine is proverbial and representative; 'man' preserves the form and force
    of the source.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - guilty
  - evil
  lexicon: HALOT
  rationale: '''Wicked'' is the standard wisdom-literature moral category and fits
    the contrast with יָשָׁר (''upright'').'
- source_word: בְּפָנָיו
  chosen: puts on a bold face
  alternatives:
  - hardens his face
  - with his face
  - before him
  lexicon: HALOT
  rationale: 'The phrase is best taken idiomatically with הֵעֵז: the wicked man makes
    his face bold/brazen. A more literal ''hardens his face'' is possible, but ''puts
    on a bold face'' is clearer modern English while preserving the facial idiom.'
- source_word: וְיָשָׁר
  chosen: but an upright man
  alternatives:
  - but the upright
  - but an ישר person
  lexicon: HALOT
  rationale: Adversative sense is required by the proverb's contrast. 'Upright' is
    the standard ethical gloss for יָשָׁר in Proverbs.
- source_word: הוּא
  chosen: an upright man
  alternatives:
  - he
  lexicon: HALOT
  rationale: The pronoun is retained in sense rather than with awkward English emphasis.
    The clause contrasts the upright person with the wicked man.
- source_word: יכין
  chosen: makes ... sure
  alternatives:
  - establishes
  - directs
  - understands
  lexicon: HALOT
  rationale: Hiphil of כון commonly means establish, make firm, set in order. With
    'his way' as object, 'makes his way sure' conveys firm, deliberate ordering in
    idiomatic English. 'Directs' is possible in some traditions but is less directly
    tied to the core sense of making firm/establishing.
- source_word: דרכיו
  chosen: his way
  alternatives:
  - his ways
  - his path
  lexicon: HALOT
  rationale: Although morphologically plural in form, דֶּרֶךְ often functions as a
    collective. Singular 'his way' is idiomatic in English proverbial style and matches
    the ethical course-of-life sense.
