id: PRO.21.14
reference: Proverbs 21:14
source:
  edition: WLC
  text: מַתָּ֣ן בַּ֭/סֵּתֶר יִכְפֶּה אָ֑ף וְ/שֹׁ֥חַד בַּ֝/חֵ֗ק חֵמָ֥ה עַזָּֽה־׃
translation:
  text: A gift in secret subdues anger, and a bribe in the bosom, fierce wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the lap'; the Hebrew image is of something concealed in the fold
      of a garment, emphasizing secrecy.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתָּן
  chosen: gift
  alternatives:
  - present
  lexicon: HALOT
  rationale: The noun denotes a gift or present. 'Gift' is the most natural modern
    English rendering and avoids prematurely importing the more negative sense of
    'bribe,' since the second colon uses a distinct term for that idea.
- source_word: בַּסֵּתֶר
  chosen: in secret
  alternatives:
  - secretly
  - in hiding
  lexicon: HALOT
  rationale: The phrase literally means 'in the secret/hidden place.' 'In secret'
    preserves the locative sense and the proverb's compact parallelism.
- source_word: יִכְפֶּה
  chosen: subdues
  alternatives:
  - covers
  - appeases
  - pacifies
  lexicon: HALOT
  rationale: From כסה/כפה in this stem, the sense here is to cover over or suppress
    anger. 'Subdues' communicates the effect idiomatically in English while preserving
    the image of restraining anger rather than eliminating it absolutely.
- source_word: אָף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Though literally 'nose,' it is a common Hebrew idiom for anger. 'Anger'
    is the clear contextual sense in English.
- source_word: שֹׁחַד
  chosen: bribe
  alternatives:
  - gift
  lexicon: HALOT
  rationale: This term regularly carries the negative sense of a bribe. Rendering
    it distinctly from מַתָּן preserves the proverb's lexical contrast between a general
    gift and an explicitly illicit payoff.
- source_word: בַּחֵק
  chosen: in the bosom
  alternatives:
  - in the lap
  - under the cloak
  lexicon: HALOT
  rationale: Literally 'in the bosom/lap,' referring to something concealed in one's
    garment. 'In the bosom' is more literal and preserves the image of a hidden bribe;
    the idiomatic sense is clarified in a footnote.
- source_word: חֵמָה עַזָּה
  chosen: fierce wrath
  alternatives:
  - strong rage
  - intense fury
  lexicon: HALOT
  rationale: The noun-adjective pair intensifies the second colon beyond the first.
    'Fierce wrath' preserves the heightened force and the parallel escalation from
    'anger' to stronger indignation.
