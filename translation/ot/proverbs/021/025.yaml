id: PRO.21.25
reference: Proverbs 21:25
source:
  edition: WLC
  text: תַּאֲוַ֣ת עָצֵ֣ל תְּמִיתֶ֑/נּוּ כִּֽי מֵאֲנ֖וּ יָדָ֣י/ו לַ/עֲשֽׂוֹת־׃
translation:
  text: The craving of a lazy man puts him to death, because his hands refuse to work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The desire of a sluggard kills him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוַת
  chosen: craving
  alternatives:
  - desire
  - longing
  - appetite
  lexicon: HALOT
  rationale: The noun denotes desire or craving. 'Craving' fits the proverb's negative
    context better than the more neutral 'desire' and pairs naturally with the fatal
    outcome.
- source_word: עָצֵל
  chosen: lazy man
  alternatives:
  - sluggard
  - lazy person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and refers to the stock character of
    Proverbs. 'Lazy man' is gender-accurate and readable modern English; 'sluggard'
    is traditional but archaic for the target audience.
- source_word: תְּמִיתֶנּוּ
  chosen: puts him to death
  alternatives:
  - kills him
  - will kill him
  lexicon: HALOT
  rationale: 'Hiphil of מות is causative: ''causes to die/puts to death.'' Present
    English in proverbial style communicates the general truth well. ''Kills him''
    is possible, but ''puts him to death'' preserves the causative nuance more explicitly.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the previous clause. 'Because' is clearer in
    contemporary English than the more formal 'for'.
- source_word: מֵאֲנוּ
  chosen: refuse
  alternatives:
  - have refused
  - decline
  lexicon: HALOT
  rationale: The verb means to refuse. Present tense suits the gnomic nature of Proverbs
    and matches the ongoing disposition of the lazy man.
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his hand
  lexicon: HALOT
  rationale: The dual/plural form is naturally rendered 'his hands.' In Hebrew this
    concretely represents his capacity for labor, and the literal image should be
    preserved.
- source_word: לַעֲשׂוֹת
  chosen: to work
  alternatives:
  - to do
  - to act
  - to make
  lexicon: HALOT
  rationale: While עשה is broadly 'to do/make,' in this context with 'his hands refuse'
    the sense is specifically manual labor or productive action. 'To work' makes the
    proverb's point clear without over-paraphrasing.
