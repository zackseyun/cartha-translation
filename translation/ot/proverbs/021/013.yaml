id: PRO.21.13
reference: Proverbs 21:13
source:
  edition: WLC
  text: אֹטֵ֣ם אָ֭זְנ/וֹ מִ/זַּעֲקַת דָּ֑ל גַּֽם ה֥וּא יִ֝קְרָ֗א וְ/לֹ֣א יֵעָנֶֽה־־׃
translation:
  text: Whoever shuts his ear to the cry of the poor, he also will call out and not
    be answered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the weak' or 'the needy.' The Hebrew דָּל can denote a person who is
      poor, weak, or socially vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹטֵם
  chosen: shuts
  alternatives:
  - stops up
  - closes
  lexicon: HALOT
  rationale: The Qal participle denotes actively closing or stopping something. 'Shuts'
    is natural modern English and preserves the deliberate refusal implied by the
    participle.
- source_word: אָזְנוֹ
  chosen: his ear
  alternatives:
  - his ears
  lexicon: HALOT
  rationale: The Hebrew is singular with 3ms suffix. English idiom commonly uses singular
    'ear' in this expression, preserving the concrete imagery.
- source_word: מִזַּעֲקַת
  chosen: to the cry of
  alternatives:
  - from the cry of
  - against the cry of
  lexicon: HALOT
  rationale: With אטם אזן, the preposition marks what one refuses to hear. English
    idiom is best expressed as 'shuts his ear to the cry of,' rather than a more wooden
    'from the cry of.'
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  - the lowly
  lexicon: HALOT
  rationale: דָּל refers to one who is poor, weak, or socially vulnerable. 'The poor'
    is the clearest and most standard rendering in wisdom literature, while still
    carrying the social vulnerability in context.
- source_word: גַּם הוּא
  chosen: he also
  alternatives:
  - he too
  - that person also
  lexicon: HALOT
  rationale: 'This combination adds emphatic reciprocity: the one who refuses to hear
    will likewise experience refusal. ''He also'' preserves the parallelism.'
- source_word: יִקְרָא
  chosen: will call out
  alternatives:
  - will cry out
  - will call
  lexicon: HALOT
  rationale: The verb means to call or cry out. 'Call out' fits the reciprocal structure
    with 'cry' earlier while avoiding over-interpretation about the exact addressee.
- source_word: וְלֹא יֵעָנֶה
  chosen: and not be answered
  alternatives:
  - but will not be answered
  - and will not be answered
  lexicon: HALOT
  rationale: The Niphal gives a passive sense, 'be answered.' The simple coordination
    'and not be answered' closely follows the Hebrew while remaining idiomatic.
