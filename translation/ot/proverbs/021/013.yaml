theological_decisions:
- issue: Implied addressee of the unanswered cry
  chosen_reading: Leave the addressee unstated in the main text.
  alternative_readings:
  - Imply that God is the one who does not answer
  - Imply that other people do not answer
  rationale: The Hebrew does not explicitly state who fails to answer. In Proverbs,
    the unstated passive can naturally imply divine justice, but the text itself leaves
    the agent implicit. Preserving that ambiguity best fits the translation philosophy
    of not resolving theological tension beyond the source text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine expression
  chosen_reading: Retain masculine singular wording ('his ear,' 'he also') as representative/generic.
  alternative_readings:
  - Use gender-neutral wording such as 'their ear' or 'they also'
  - Use 'whoever... will also' without pronouns
  rationale: The Hebrew uses masculine singular forms generically. Per the stated
    philosophy, gender-accurate rendering is preferred where the source is grammatically
    masculine and representative.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
