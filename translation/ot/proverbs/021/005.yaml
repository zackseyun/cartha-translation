id: PRO.21.5
reference: Proverbs 21:5
source:
  edition: WLC
  text: מַחְשְׁב֣וֹת חָ֭רוּץ אַךְ לְ/מוֹתָ֑ר וְ/כָל אָ֝֗ץ אַךְ לְ/מַחְסֽוֹר־־־׃
translation:
  text: The plans of the diligent surely lead to abundance, but everyone who is hasty
    surely comes to want.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lead to profit' for לְמוֹתָר; the Hebrew term can denote surplus, advantage,
      or gain.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone who rushes' for אָץ, emphasizing impulsive speed rather than
      a settled trait.
    reason: lexical_alternative
  - marker: c
    text: Or 'comes to poverty' for לְמַחְסוֹר; the Hebrew can refer broadly to lack,
      need, or impoverishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְשְׁבוֹת
  chosen: plans
  alternatives:
  - thoughts
  - devices
  lexicon: HALOT
  rationale: In Proverbs this noun commonly refers to intentional designs or plans
    rather than mere internal thoughts. 'Plans' fits the wisdom context of practical
    conduct and outcomes.
- source_word: חָרוּץ
  chosen: the diligent
  alternatives:
  - the industrious
  - the hard-working
  lexicon: HALOT
  rationale: The adjective/noun denotes one who is sharp, diligent, industrious. 'The
    diligent' is concise, idiomatic, and traditional without being archaic.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - only
  - indeed
  lexicon: HALOT
  rationale: Here אַךְ marks certainty/emphasis rather than restriction. 'Surely'
    conveys the proverbial force that the stated result reliably follows.
- source_word: לְמוֹתָר
  chosen: lead to abundance
  alternatives:
  - lead to profit
  - result in plenty
  - lead only to advantage
  lexicon: HALOT
  rationale: מוֹתָר can denote surplus, abundance, or profit. In this antithetical
    parallel with 'want,' 'abundance' best captures the concrete positive outcome
    in accessible English. 'Lead to' makes the implied result relation explicit and
    natural in English.
- source_word: וְכָל
  chosen: but everyone who
  alternatives:
  - and all who
  - and everyone who
  lexicon: HALOT
  rationale: Though waw is formally 'and,' English proverb style often uses adversative
    'but' in clear antithetical parallelism. 'Everyone who' brings out the distributive
    force of כָל with the following participle.
- source_word: אָץ
  chosen: is hasty
  alternatives:
  - rushes
  - acts hastily
  - is impatient
  lexicon: HALOT
  rationale: The participle denotes one who presses or hastens. 'Is hasty' preserves
    the character description rather than focusing on a single act.
- source_word: לְמַחְסוֹר
  chosen: comes to want
  alternatives:
  - comes to poverty
  - to lack
  - to shortage
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack, need, or poverty. 'Comes to want' is a natural
    English rendering that matches the proverb's outcome language and pairs well with
    'abundance.'
