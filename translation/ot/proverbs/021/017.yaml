id: PRO.21.17
reference: Proverbs 21:17
source:
  edition: WLC
  text: אִ֣ישׁ מַ֭חְסוֹר אֹהֵ֣ב שִׂמְחָ֑ה אֹהֵ֥ב יַֽיִן וָ֝/שֶׁ֗מֶן לֹ֣א יַעֲשִֽׁיר־׃
translation:
  text: A man who loves pleasure will become poor; whoever loves wine and oil will
    not become rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who loves joy' or 'who loves merrymaking.' The Hebrew term can denote
      joy or festivity, but here likely refers to a pleasure-seeking lifestyle.
    reason: lexical_alternative
  - marker: b
    text: '''Oil'' likely refers to olive oil and may imply luxury or costly ointment,
      not merely a basic food item.'
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - Whoever
  - A person
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and here introduces a representative
    individual in proverbial style. Per the gender-accurate policy, 'man' best matches
    the source form and generic force.
- source_word: מַחְסוֹר
  chosen: poor
  alternatives:
  - lack
  - poverty
  - want
  lexicon: HALOT
  rationale: Literally the noun denotes 'lack' or 'want.' In English proverbial style,
    'will become poor' naturally expresses the result state implied by the verbless
    opening phrase 'a man of lack.' This captures the sense without woodenly rendering
    'a man of poverty.'
- source_word: אֹהֵב שִׂמְחָה
  chosen: who loves pleasure
  alternatives:
  - who loves joy
  - who loves merrymaking
  - lover of pleasure
  lexicon: HALOT
  rationale: שִׂמְחָה can mean joy, gladness, or festive merriment. In this wisdom
    context, the sense is not wholesome joy in general but indulgence in enjoyment,
    so 'pleasure' best conveys the warning.
- source_word: אֹהֵב יַיִן וָשֶׁמֶן
  chosen: whoever loves wine and oil
  alternatives:
  - he who loves wine and olive oil
  - one who loves wine and fine oil
  lexicon: HALOT
  rationale: יַיִן is 'wine.' שֶׁמֶן is 'oil,' often olive oil, and in wisdom literature
    can connote luxury or costly ointment. 'Oil' preserves the Hebrew image while
    remaining readable; the paired items signify indulgent luxury.
- source_word: לֹא יַעֲשִׁיר
  chosen: will not become rich
  alternatives:
  - will not be rich
  - will not prosper
  lexicon: HALOT
  rationale: 'The Hiphil of עשר means ''to become rich'' or ''make rich.'' With no
    explicit object, the intransitive/resultative sense fits: such a person will not
    attain wealth. ''Prosper'' is broader than the Hebrew here.'
