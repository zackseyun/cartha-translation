id: PRO.21.9
reference: Proverbs 21:9
source:
  edition: WLC
  text: ט֗וֹב לָ/שֶׁ֥בֶת עַל פִּנַּת גָּ֑ג מֵ/אֵ֥שֶׁת מִ֝דְיָנִ֗ים וּ/בֵ֥ית חָֽבֶר־־׃
translation:
  text: Better to live on a corner of the roof than with a quarrelsome wife in a shared
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a house shared with others'; the Hebrew phrase is literally 'and
      a house of company/association.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better
  alternatives:
  - It is better
  - Good
  lexicon: HALOT
  rationale: 'In proverb style, the adjective functions comparatively: ''better''
    introduces a wisdom comparison naturally in English.'
- source_word: לָשֶׁבֶת
  chosen: to live
  alternatives:
  - to sit
  - to dwell
  lexicon: HALOT
  rationale: Though literally 'to sit,' ישב commonly means 'to dwell/live' in habitation
    contexts. 'Live' is idiomatic and fits the contrast with domestic cohabitation.
- source_word: עַל פִּנַּת גָּג
  chosen: on a corner of the roof
  alternatives:
  - on the corner of a roof
  - in a corner on the housetop
  lexicon: HALOT
  rationale: פִּנָּה is 'corner' and גָּג is a flat roof/housetop. 'Roof' is clear
    modern English; the image is of an exposed, cramped place preferable to domestic
    strife.
- source_word: מֵאֵשֶׁת
  chosen: than with a ... wife
  alternatives:
  - than from a wife
  - than a wife
  lexicon: HALOT
  rationale: The prefixed מִן after טוֹב marks comparison ('better than'). English
    requires supplying 'with' to express the relational contrast implied by the proverb.
- source_word: מִדְיָנִים
  chosen: quarrelsome
  alternatives:
  - contentious
  - given to strife
  - of quarrels
  lexicon: HALOT
  rationale: From the noun 'strifes/quarrels.' 'Quarrelsome' renders the attributive
    sense in natural modern English without archaic tone.
- source_word: וּבֵית חָבֶר
  chosen: in a shared house
  alternatives:
  - in a house of company
  - in a common house
  - with a companion in a house
  lexicon: HALOT
  rationale: חָבֶר denotes association/company/companion. In this construction the
    sense is a house shared with others or in close company, heightening the discomfort
    of living with a quarrelsome spouse in confined communal space. 'Shared house'
    is concise and idiomatic while preserving the social setting.
