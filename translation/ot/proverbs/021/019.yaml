id: PRO.21.19
reference: Proverbs 21:19
source:
  edition: WLC
  text: ט֗וֹב שֶׁ֥בֶת בְּ/אֶֽרֶץ מִדְבָּ֑ר מֵ/אֵ֖שֶׁת מדונים וָ/כָֽעַס־׃
translation:
  text: It is better to live in a desert land than with a quarrelsome and vexing wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than with a contentious and angry wife.' The final term can be understood
      as describing either her disposition ('angry') or her effect on others ('vexing,
      provoking').
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Predicate adjective introducing a comparative proverb. English idiom
    naturally supplies 'it is' to make the saying complete.
- source_word: שֶׁבֶת
  chosen: to live
  alternatives:
  - to dwell
  - to sit
  lexicon: HALOT
  rationale: From ישׁב, here an infinitive functioning verbally after טוֹב. 'To live'
    is more idiomatic in modern English than the more wooden 'to dwell,' while still
    conveying settled residence rather than a momentary act of sitting.
- source_word: בְּאֶרֶץ מִדְבָּר
  chosen: in a desert land
  alternatives:
  - in the wilderness
  - in a desert
  - in a wilderness land
  lexicon: HALOT
  rationale: The phrase denotes a barren, uninhabited region. 'Desert land' preserves
    both אֶרֶץ ('land') and מִדְבָּר ('wilderness/desert region') without sounding
    overly literal.
- source_word: מֵאֵשֶׁת
  chosen: than with a ... wife
  alternatives:
  - than a wife of ...
  - than from a ... wife
  lexicon: HALOT
  rationale: The comparative מִן after טוֹב is rendered 'than.' English requires an
    idiomatic relational complement with 'live,' hence 'with a ... wife' rather than
    a more wooden construction.
- source_word: מדונים
  chosen: quarrelsome
  alternatives:
  - contentious
  - full of strife
  - quarreling
  lexicon: HALOT
  rationale: Plural abstract noun from מדון ('strife, contention') used attributively
    with 'wife.' 'Quarrelsome' is natural modern English and captures habitual contentiousness.
- source_word: וָכָעַס
  chosen: and vexing
  alternatives:
  - and angry
  - and provoking
  - and irritating
  lexicon: HALOT
  rationale: The noun כעס can denote vexation, provocation, or anger. In parallel
    with 'quarrelsome' and in relation to the effect of living with such a person,
    'vexing' best captures the sense of causing continual irritation. The conjunction
    is retained with 'and'.
