id: PRO.21.26
reference: Proverbs 21:26
source:
  edition: WLC
  text: כָּל הַ֭/יּוֹם הִתְאַוָּ֣ה תַאֲוָ֑ה וְ/צַדִּ֥יק יִ֝תֵּ֗ן וְ/לֹ֣א יַחְשֹֽׂךְ־׃
translation:
  text: All day long he craves craving, but the righteous man gives and does not hold
    back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly, ''he keeps craving all day long.'' The Hebrew uses a
      verb with a cognate noun for emphasis: literally, ''he craves craving.'''
    reason: lexical_alternative
  - marker: b
    text: '''The righteous man'' is grammatically masculine singular in Hebrew and
      functions here as a representative singular; the proverb describes the character
      of a righteous person generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  chosen: All day long
  alternatives:
  - All the day
  - The whole day
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning throughout the day; 'All day long'
    is natural modern English while preserving the durative sense.
- source_word: הִתְאַוָּה תַאֲוָה
  chosen: he craves craving
  alternatives:
  - he covets greedily
  - he desires desire
  - he keeps craving
  lexicon: HALOT
  rationale: The verb plus cognate noun intensifies the action. 'He craves craving'
    preserves the Hebrew emphasis more transparently than smoothing it away entirely.
    The object is left as 'craving' rather than specifying a material object, since
    the Hebrew is general.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Masculine singular adjective used substantivally. Following the gender-accurate
    policy, 'the righteous man' preserves the singular representative force better
    than the abstract 'the righteous,' while still functioning proverbially.
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - gives freely
  - keeps giving
  lexicon: HALOT
  rationale: Simple imperfect with habitual/proverbial force. 'Gives' fits English
    proverbial style without adding adverbial nuance not explicit in the Hebrew.
- source_word: לֹא יַחְשֹׂךְ
  chosen: does not hold back
  alternatives:
  - does not withhold
  - does not spare
  lexicon: HALOT
  rationale: The verb means to withhold or keep back. 'Does not hold back' is clear,
    idiomatic modern English and suits the generosity contrast in the proverb.
