id: PRO.21.20
reference: Proverbs 21:20
source:
  edition: WLC
  text: אוֹצָ֤ר נֶחְמָ֣ד וָ֭/שֶׁמֶן בִּ/נְוֵ֣ה חָכָ֑ם וּ/כְסִ֖יל אָדָ֣ם יְבַלְּעֶֽ/נּוּ׀׃
translation:
  text: Precious treasure and oil are in the dwelling of a wise man, but a foolish
    man swallows it up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fool devours it' or 'consumes it.' The Hebrew verb is literally 'swallows
      it up,' a vivid image for reckless use of resources.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹצָר
  chosen: treasure
  alternatives:
  - storehouse
  - treasury
  lexicon: HALOT
  rationale: The noun denotes stored wealth or valuables. 'Treasure' fits the proverb's
    contrast between prudent preservation and foolish consumption better than the
    more concrete 'storehouse.'
- source_word: נֶחְמָד
  chosen: precious
  alternatives:
  - desirable
  - pleasant
  lexicon: HALOT
  rationale: The adjective describes something valuable or desirable. 'Precious' idiomatically
    conveys worth in English when paired with 'treasure.'
- source_word: וָשֶׁמֶן
  chosen: and oil
  alternatives:
  - and olive oil
  lexicon: HALOT
  rationale: Hebrew שֶׁמֶן commonly refers to oil, often olive oil, but the text does
    not specify beyond 'oil.' Retaining 'oil' preserves the source wording while allowing
    the cultural sense of a valuable household provision.
- source_word: בִּנְוֵה
  chosen: in the dwelling of
  alternatives:
  - in the house of
  - in the home of
  lexicon: HALOT
  rationale: The noun refers to a habitation or abode. 'Dwelling' is slightly more
    formal but preserves the proverb's imagery without over-specifying architecture.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise
  - a wise person
  lexicon: HALOT
  rationale: The adjective functions substantivally. Because the Hebrew is grammatically
    masculine singular and representative, 'a wise man' follows the gender-accurate
    policy while preserving proverbial generic force.
- source_word: וּכְסִיל
  chosen: but a foolish man
  alternatives:
  - but a fool
  lexicon: HALOT
  rationale: כְּסִיל is the stock wisdom term for a fool. 'Foolish man' keeps the
    parallel with 'wise man' explicit in English, though 'fool' is a viable alternative.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - human
  lexicon: HALOT
  rationale: Here אָדָם appositionally reinforces the subject as a human type. Rendering
    it as 'man' preserves the masculine singular proverbial style and aligns with
    the project's gender-accurate policy.
- source_word: יְבַלְּעֶנּוּ
  chosen: swallows it up
  alternatives:
  - devours it
  - consumes it
  lexicon: HALOT
  rationale: From בלע, literally 'swallow.' In context it metaphorically depicts wasteful
    consumption of stored goods. 'Swallows it up' preserves the vividness of the Hebrew
    while remaining natural English.
