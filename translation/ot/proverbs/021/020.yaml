theological_decisions:
- issue: Gendered proverbial anthropology in חָכָם ... כְסִיל אָדָם
  chosen_reading: 'Render with masculine singular forms: ''a wise man ... a foolish
    man'''
  alternative_readings:
  - a wise person ... a foolish person
  - the wise ... the fool
  rationale: The proverb uses masculine singular forms in a representative/generic
    way. Per the doctrine's gender-accurate policy, the translation keeps 'man' rather
    than neutralizing the wording, while the sense remains broadly applicable to humanity.
