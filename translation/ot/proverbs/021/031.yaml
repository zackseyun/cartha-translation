id: PRO.21.31
reference: Proverbs 21:31
source:
  edition: WLC
  text: ס֗וּס מ֭וּכָן לְ/י֣וֹם מִלְחָמָ֑ה וְ֝/לַֽ/יהוָ֗ה הַ/תְּשׁוּעָֽה׃
translation:
  text: A horse is prepared for the day of battle, but victory belongs to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salvation' or 'deliverance belongs to the LORD.' The Hebrew term can denote rescue broadly; here 'victory' fits the battle context.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּס
  chosen: horse
  alternatives:
  - war horse
  lexicon: HALOT
  rationale: The noun denotes a horse generally. Although the context is military, the Hebrew does not explicitly say 'war horse'; the military sense is supplied by the following phrase 'for the day of battle.' 'Horse' preserves the concise proverbial form.
- source_word: מוּכָן
  chosen: is prepared
  alternatives:
  - is made ready
  - is ready
  lexicon: HALOT
  rationale: The passive participial form conveys a state of readiness/preparation. 'Is prepared' is natural English and retains the passive sense better than the more adjectival 'is ready.'
- source_word: לְיוֹם
  chosen: for the day
  alternatives:
  - for a day
  - for the day
  lexicon: HALOT
  rationale: The preposition ל marks purpose or reference. 'For the day' is idiomatic with the following construct-like phrase and preserves the Hebrew expression 'day of battle.'
- source_word: מִלְחָמָה
  chosen: battle
  alternatives:
  - war
  lexicon: HALOT
  rationale: Both 'war' and 'battle' are possible. In English, 'day of battle' is more idiomatic and fits the immediate scene of combat readiness better than 'day of war.'
- source_word: וְלַיהוָה
  chosen: but ... to the LORD / belongs to the LORD
  alternatives:
  - and to the LORD
  - yet to the LORD
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a contrast between human preparation and divine outcome. English requires making the implied contrast explicit; 'but' captures the proverb's adversative force. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name, preserving the reverential convention and standard English Bible practice.
- source_word: הַתְּשׁוּעָה
  chosen: victory
  alternatives:
  - salvation
  - deliverance
  lexicon: HALOT
  rationale: The noun can mean salvation, deliverance, or victory. In this military proverb, 'victory' best fits the immediate context and communicates that the battle's outcome comes from the LORD. 'Salvation' would sound overly theological in English here and could obscure the concrete battlefield sense.
