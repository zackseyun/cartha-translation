theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of תְּשׁוּעָה in a military proverb
  chosen_reading: victory belongs to the LORD
  alternative_readings:
  - salvation belongs to the LORD
  - deliverance belongs to the LORD
  rationale: The verse contrasts military preparation with the LORD's decisive role in battle. Rendering תְּשׁוּעָה as 'victory' preserves that contextual force while avoiding an unnecessarily abstract reading. The broader theological truth of divine deliverance remains intact without importing more than the context warrants.
