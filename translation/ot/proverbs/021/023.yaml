id: PRO.21.23
reference: Proverbs 21:23
source:
  edition: WLC
  text: שֹׁמֵ֣ר פִּ֭י/ו וּ/לְשׁוֹנ֑/וֹ שֹׁמֵ֖ר מִ/צָּר֣וֹת נַפְשֽׁ/וֹ׃
translation:
  text: Whoever guards his mouth and his tongue guards his life from troubles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “guards himself from distresses”; Hebrew “guards his nephesh from troubles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: guards
  alternatives:
  - keeps
  - watches
  - restrains
  lexicon: HALOT
  rationale: The Qal participle denotes guarding/keeping watch over. 'Guards' works
    naturally in English for both the mouth/tongue and the resulting protection of
    life, preserving the verbal repetition in the Hebrew.
- source_word: פִּיו
  chosen: his mouth
  lexicon: HALOT
  rationale: Literal rendering of the noun with 3ms suffix. 'Mouth' is the natural
    English equivalent and suits the proverb's focus on speech control.
- source_word: לְשׁוֹנוֹ
  chosen: his tongue
  lexicon: HALOT
  rationale: Literal rendering. In wisdom literature 'tongue' commonly stands metonymically
    for speech, and retaining it preserves the Hebrew imagery and parallelism.
- source_word: שֹׁמֵר
  chosen: guards
  alternatives:
  - keeps safe
  - preserves
  lexicon: HALOT
  rationale: Repeating 'guards' reflects the Hebrew repetition and reinforces the
    cause-effect structure of the proverb.
- source_word: מִצָּרוֹת
  chosen: from troubles
  alternatives:
  - from distress
  - from calamities
  - from afflictions
  lexicon: HALOT
  rationale: The plural noun refers broadly to troubles/distresses. 'Troubles' is
    clear modern English and avoids overstating the severity with 'calamities' while
    still conveying adverse consequences.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In this proverb נֶפֶשׁ most naturally refers to the person's life/self
    rather than the immaterial soul in a technical sense. 'His life' best communicates
    the idiom in clear English without importing anthropological precision the text
    does not require.
