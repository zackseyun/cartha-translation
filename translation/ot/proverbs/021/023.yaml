theological_decisions:
- issue: Rendering of נַפְשׁוֹ
  chosen_reading: his life
  alternative_readings:
  - his soul
  - himself
  rationale: The context is practical wisdom about avoiding harmful consequences through
    restrained speech, so 'life' fits the semantic range of נֶפֶשׁ here better than
    a more doctrinally loaded 'soul.' This preserves the proverb's ethical focus without
    making a statement about human constitution beyond the text.
