id: PRO.21.22
reference: Proverbs 21:22
source:
  edition: WLC
  text: עִ֣יר גִּ֭בֹּרִים עָלָ֣ה חָכָ֑ם וַ֝/יֹּ֗רֶד עֹ֣ז מִבְטֶחָֽ/ה׃
translation:
  text: A wise man goes up against the city of mighty men and brings down the stronghold
    in which they trust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wise man goes up to the city of warriors and brings down the strength
      of its confidence.' The Hebrew allows a more literal rendering with 'strength'
      rather than 'stronghold,' but the context favors a concrete defensive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The basic sense is an urban settlement or fortified city. 'City' is the
    standard and most natural rendering here, especially in a military/proverbial
    context.
- source_word: גִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - strong men
  - heroes
  lexicon: HALOT
  rationale: The noun often denotes strong or valiant men, frequently with martial
    overtones. 'Mighty men' preserves the Hebrew imagery and masculine form better
    than the more interpretive 'warriors,' while still fitting the context of a defended
    city.
- source_word: עָלָה
  chosen: goes up against
  alternatives:
  - ascends
  - goes up
  - attacks
  lexicon: HALOT
  rationale: Literally 'goes up,' but in military contexts the verb commonly carries
    the sense of advancing against or attacking a city. 'Goes up against' preserves
    the Hebrew idiom while making the adversarial force clear in English.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise man
  - a wise one
  lexicon: HALOT
  rationale: The singular adjective/noun functions substantivally. 'A wise man' fits
    proverbial style and follows the gender-accurate policy, since the Hebrew is grammatically
    masculine and representative.
- source_word: וַיֹּרֶד
  chosen: and brings down
  alternatives:
  - and pulls down
  - and casts down
  - and lowers
  lexicon: HALOT
  rationale: From ירד, literally 'causes to go down' or 'brings down' in context.
    'Brings down' is idiomatic modern English and suits the image of overcoming defenses.
- source_word: עֹז
  chosen: the stronghold
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: Although the noun commonly means 'strength' or 'might,' in construct
    with 'their trust' it most naturally refers concretely to the object or source
    of strength/security. Rendering it as 'the stronghold' captures the military image
    and the sense of defensive power better than the abstract 'strength.'
- source_word: מִבְטֶחָה
  chosen: in which they trust
  alternatives:
  - their confidence
  - their security
  - their trust
  lexicon: HALOT
  rationale: The noun means trust, confidence, or security, with the 3fs suffix referring
    back to the city/stronghold as the object of trust. English requires an explicit
    relational phrase; 'in which they trust' makes the referent clear and preserves
    the dependence implied by the Hebrew.
