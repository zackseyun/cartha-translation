id: PRO.21.18
reference: Proverbs 21:18
source:
  edition: WLC
  text: כֹּ֣פֶר לַ/צַּדִּ֣יק רָשָׁ֑ע וְ/תַ֖חַת יְשָׁרִ֣ים בּוֹגֵֽד׃
translation:
  text: The wicked is a ransom for the righteous, and the treacherous one in place
    of the upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The wicked serves as a substitute for the righteous, and the treacherous
      for the upright.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּפֶר
  chosen: a ransom
  alternatives:
  - an atonement price
  - a substitute payment
  - a covering
  lexicon: HALOT
  rationale: כֹּפֶר commonly denotes a ransom price or compensation paid in place
    of another. In this proverb the substitutional sense is central, so 'a ransom'
    best preserves the terse metaphor without overexplaining it.
- source_word: לַצַּדִּיק
  chosen: for the righteous
  alternatives:
  - for the just
  - for a righteous man
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/benefit here: the wicked serves as
    a ransom ''for'' the righteous. ''The righteous'' preserves the generic singular
    class sense of צַדִּיק in proverbial style.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: Though morphologically singular masculine, the term functions generically
    in wisdom literature. 'The wicked' is idiomatic English and preserves the class
    contrast with 'the righteous.'
- source_word: וְתַחַת
  chosen: and ... in place of
  alternatives:
  - and instead of
  - and under
  lexicon: HALOT
  rationale: תַּחַת here expresses substitution rather than spatial 'under.' 'In place
    of' makes the parallelism with כֹּפֶר explicit in natural English.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: יְשָׁרִים in Proverbs denotes morally straight/upright people. 'The upright'
    is the standard and most precise ethical rendering.
- source_word: בּוֹגֵד
  chosen: the treacherous one
  alternatives:
  - the traitor
  - the faithless one
  - the betrayer
  lexicon: HALOT
  rationale: בּוֹגֵד denotes one who acts treacherously or faithlessly. 'The treacherous
    one' best matches the moral category in wisdom literature without narrowing it
    to political betrayal.
