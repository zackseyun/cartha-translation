id: PRO.21.8
reference: Proverbs 21:8
source:
  edition: WLC
  text: הֲפַכְפַּ֬ךְ דֶּ֣רֶךְ אִ֣ישׁ וָזָ֑ר וְ֝/זַ֗ךְ יָשָׁ֥ר פָּעֳלֽ/וֹ׃
translation:
  text: The way of a guilty man is crooked and strange, but the conduct of the pure
    is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The way of a man is crooked and strange'; the Hebrew term rendered 'guilty'
      is difficult and may also carry the sense of 'strange,' 'foreign,' or 'alien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲפַכְפַּךְ
  chosen: crooked
  alternatives:
  - twisted
  - devious
  - perverse
  lexicon: HALOT
  rationale: The adjective denotes something turned about or distorted. 'Crooked'
    is idiomatic modern English and fits the wisdom contrast with 'upright' later
    in the verse.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: Common wisdom-term for one's manner or course of life. 'Way' preserves
    the metaphor and is standard in Proverbs.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. Per translation philosophy,
    a gender-accurate rendering is preferred unless context clearly demands neutralization.
    Here 'man' works proverbially.
- source_word: וָזָר
  chosen: guilty
  alternatives:
  - estranged
  - foreign
  - alien
  lexicon: HALOT
  rationale: Though the form can suggest 'strange/foreign,' in this proverb the parallelism
    contrasts a morally distorted person with the pure. Many interpreters understand
    the term in the sense of one who is morally out of place or culpable. 'Guilty'
    makes the ethical force clear in English while preserving the contrast with 'pure.'
    The more literal 'strange' is preserved in a footnote because the Hebrew is difficult.
- source_word: זַךְ
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: HALOT
  rationale: The adjective refers to moral or ritual cleanness; in Proverbs' ethical
    setting, 'pure' best conveys the moral sense.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - right
  lexicon: HALOT
  rationale: A standard wisdom adjective for moral rectitude. 'Upright' is the natural
    antonym to 'crooked' in English.
- source_word: פָּעֳלוֹ
  chosen: conduct
  alternatives:
  - deed
  - work
  - action
  lexicon: HALOT
  rationale: The noun can denote deed or work. Since the first colon speaks of a person's
    'way,' 'conduct' gives a natural English parallel for the person's behavior as
    a whole, not merely one isolated act.
