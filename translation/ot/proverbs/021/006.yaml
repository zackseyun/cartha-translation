id: PRO.21.6
reference: Proverbs 21:6
source:
  edition: WLC
  text: פֹּ֣עַל א֭וֹצָרוֹת בִּ/לְשׁ֣וֹן שָׁ֑קֶר הֶ֥בֶל נִ֝דָּ֗ף מְבַקְשֵׁי מָֽוֶת־׃
translation:
  text: Making treasures by a lying tongue is a fleeting vapor, sought by those who
    seek death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a false tongue.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'vapor driven away'; that is, something insubstantial and quickly
      gone.
    reason: lexical_alternative
  - marker: c
    text: The final Hebrew phrase is difficult. It may also mean 'those who get such
      wealth seek death,' or, in some ancient-version-influenced renderings, 'it is
      a snare of death.'
    reason: alternative_reading
lexical_decisions:
- source_word: פֹּעַל
  chosen: Making
  alternatives:
  - The making of
  - Gain
  lexicon: HALOT
  rationale: The noun from פעל denotes work, deed, or product. In this proverb it
    functions verbally with 'treasures,' referring to the act/process of acquiring
    or producing wealth. 'Making' is concise and natural in English while preserving
    the Hebrew's focus on the activity.
- source_word: אֹצָרוֹת
  chosen: treasures
  alternatives:
  - storehouses
  - wealth
  lexicon: HALOT
  rationale: Though the noun can denote storehouses or treasuries, in wisdom context
    it commonly refers to stored wealth or riches. 'Treasures' preserves the concrete
    image while naturally conveying accumulated wealth.
- source_word: בִּלְשׁוֹן שָׁקֶר
  chosen: by a lying tongue
  alternatives:
  - with a false tongue
  - by deceitful speech
  lexicon: HALOT
  rationale: Literally 'with/by a tongue of falsehood.' 'By a lying tongue' keeps
    the vivid bodily metaphor and indicates the means by which the treasures are made.
- source_word: הֶבֶל
  chosen: a fleeting vapor
  alternatives:
  - vanity
  - breath
  - mere vapor
  lexicon: HALOT
  rationale: הבל often conveys breath-like transience or emptiness. 'A fleeting vapor'
    communicates both insubstantiality and brevity in readable modern English better
    than the traditional but potentially opaque 'vanity.'
- source_word: נִדָּף
  chosen: fleeting
  alternatives:
  - driven away
  - blown away
  - scattered
  lexicon: HALOT
  rationale: The participle means driven/blown away. Combined with הבל, the phrase
    depicts something insubstantial and quickly dispersed. Rendering it adjectivally
    as 'fleeting' produces idiomatic English while preserving the image of transience.
- source_word: מְבַקְשֵׁי מָוֶת
  chosen: sought by those who seek death
  alternatives:
  - those who seek death
  - seekers of death
  lexicon: HALOT
  rationale: 'The Hebrew sequence is compressed and syntactically difficult. The Masoretic
    wording most naturally apposes or relates the fraudulent gain to death-seekers.
    To preserve all elements without over-paraphrase, the translation renders the
    phrase in a way that reflects the Hebrew wording and its grim moral outcome. An
    alternative construal takes the phrase adverbially/predicatively: such gain is
    ''for those who seek death'' or identifies the makers as ''those who seek death.'''
