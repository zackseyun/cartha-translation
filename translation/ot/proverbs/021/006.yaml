theological_decisions:
- issue: Interpretation of the final phrase מְבַקְשֵׁי מָוֶת
  chosen_reading: The proverb portrays dishonest gain as belonging to or characterizing
    people who seek death, expressed in English as 'sought by those who seek death.'
  alternative_readings:
  - '''those who seek such gain seek death'''
  - '''it is a snare of death'' (reflecting ancient versions or interpretive emendation)'
  rationale: This is not a major doctrinal issue, but it is an interpretive crux.
    The MT reads 'seekers of death,' whereas some translations smooth the line or
    follow a variant-like sense such as 'a snare of death.' Following original-language
    primacy, the draft stays close to the MT and preserves the alternative in a footnote
    rather than importing a smoother traditional reading.
  doctrine_reference: Translation philosophy §1, §3
