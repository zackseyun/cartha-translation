id: PRO.5.15
reference: Proverbs 5:15
source:
  edition: WLC
  text: שְׁתֵה מַ֥יִם מִ/בּוֹרֶ֑/ךָ וְ֝/נֹזְלִ֗ים מִ/תּ֥וֹךְ בְּאֵרֶֽ/ךָ־׃
translation:
  text: Drink water from your own cistern, and flowing water from within your own
    well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and what flows from within your own well.' The Hebrew participle can
      be rendered more literally without supplying 'water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵה
  chosen: Drink
  alternatives:
  - Drink deeply
  - Drink from
  lexicon: HALOT
  rationale: Qal imperative 2ms of שׁתה, a direct command. Simple 'Drink' best preserves
    the imperative force without adding nuance not explicit in the verb.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Common noun meaning 'water.' Singular in English is idiomatic though
    Hebrew is morphologically plural.
- source_word: מִבּוֹרֶךָ
  chosen: from your own cistern
  alternatives:
  - from your pit
  - from your reservoir
  lexicon: HALOT
  rationale: בּוֹר commonly denotes a pit or cistern; in this domestic parallel with
    'well' and in the marital-fidelity metaphor of the context, 'cistern' is the most
    precise and natural rendering. 'Your own' brings out the possessive suffix and
    the exclusivity emphasized by the context.
- source_word: וְנֹזְלִים
  chosen: and flowing water
  alternatives:
  - and streams
  - and what flows
  lexicon: HALOT
  rationale: Participle from נזל, 'to flow.' Because the participle stands elliptically
    in parallel with 'water,' English supplies the noun sense naturally as 'flowing
    water.' This preserves the imagery without over-paraphrasing.
- source_word: מִתּוֹךְ
  chosen: from within
  alternatives:
  - from the midst of
  - out of
  lexicon: HALOT
  rationale: תּוֹךְ denotes interiority or midst. 'From within' is idiomatic modern
    English and preserves the sense of source from the inside.
- source_word: בְּאֵרֶךָ
  chosen: your own well
  alternatives:
  - your spring
  - your fountain
  lexicon: HALOT
  rationale: בְּאֵר normally means 'well.' Although the broader context uses water
    imagery metaphorically for one's wife, the concrete image should remain in the
    main text. 'Your own' again reflects the possessive suffix and the exclusivity
    stressed in the proverb.
