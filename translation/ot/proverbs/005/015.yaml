theological_decisions:
- issue: Whether to make the marital-sexual metaphor explicit in the main text
  chosen_reading: Retain the literal water imagery in the main text
  alternative_readings:
  - Interpretively expand to 'Be satisfied with your own wife' or similar
  rationale: The proverb intentionally uses metaphor, and the immediate context supplies
    its application. Making the metaphor explicit in translation would move from translation
    into commentary. Preserving the image maintains the literary force and avoids
    importing explanatory wording not present in the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
