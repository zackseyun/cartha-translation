id: PRO.5.2
reference: Proverbs 5:2
source:
  edition: WLC
  text: לִ/שְׁמֹ֥ר מְזִמּ֑וֹת וְ֝/דַ֗עַת שְׂפָתֶ֥י/ךָ יִנְצֹֽרוּ׃
translation:
  text: so that you may keep discretion, and your lips may guard knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prudence' or 'sound judgment' for 'discretion.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'your lips'; the phrase implies speech that preserves or expresses
      knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹר
  chosen: so that you may keep
  alternatives:
  - to keep
  - that you may preserve
  lexicon: HALOT
  rationale: The prefixed infinitive construct with ל expresses purpose in context,
    continuing the father's exhortation from the previous verse. 'So that you may
    keep' makes the purpose relation explicit in natural English while preserving
    the verbal sense of שמר ('keep, guard, preserve').
- source_word: מְזִמּוֹת
  chosen: discretion
  alternatives:
  - prudence
  - sound judgment
  - plans
  lexicon: HALOT
  rationale: In wisdom literature מזמות can denote prudent discretion or thoughtful
    planning, not merely 'schemes' in a negative sense. Here the positive instructional
    context favors 'discretion' as a concise, idiomatic rendering.
- source_word: וְדַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת regularly denotes knowledge in Proverbs, especially moral and practical
    knowledge gained through wisdom. 'Knowledge' preserves the lexical connection
    without overinterpreting it as a more developed faculty such as 'understanding.'
- source_word: שְׂפָתֶיךָ
  chosen: your lips
  alternatives:
  - your speech
  - your mouth
  lexicon: HALOT
  rationale: The Hebrew is literally 'your lips.' Retaining the body-part imagery
    is natural in English and preserves the poetic concreteness of the proverb, while
    also implying speech as the instrument of guarding knowledge.
- source_word: יִנְצֹרוּ
  chosen: may guard
  alternatives:
  - may preserve
  - may keep
  - will guard
  lexicon: HALOT
  rationale: נצר overlaps with שמר in the semantic field of guarding/keeping. 'Guard'
    provides a helpful distinction from the earlier 'keep' while preserving the protective
    nuance. The imperfect is rendered with 'may' in keeping with the purpose/result
    sense of the verse in context rather than as a simple future.
