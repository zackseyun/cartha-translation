id: PRO.5.23
reference: Proverbs 5:23
source:
  edition: WLC
  text: ה֗וּא יָ֭מוּת בְּ/אֵ֣ין מוּסָ֑ר וּ/בְ/רֹ֖ב אִוַּלְתּ֣/וֹ יִשְׁגֶּֽה׃פ
translation:
  text: He dies for lack of discipline, and in the greatness of his folly he goes
    astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will die without discipline, and in the abundance of his folly he
      will go astray.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - will die
  lexicon: HALOT
  rationale: Qal imperfect 3ms of מות. In Hebrew wisdom literature, the imperfect
    can express a general or certain outcome. Present-tense English ('dies') fits
    proverbial style while preserving the inevitability of the result.
- source_word: בְּאֵין
  chosen: for lack of
  alternatives:
  - without
  - in the absence of
  lexicon: HALOT
  rationale: 'The preposition ב with אֵין expresses circumstance/cause: ''in/through
    there being no.'' ''For lack of'' communicates the causal sense naturally in English.'
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: מוּסָר in Proverbs commonly carries the sense of corrective instruction
    or discipline, not mere information. 'Discipline' best matches the moral-formative
    force in this context.
- source_word: וּבְרֹב
  chosen: in the greatness of
  alternatives:
  - in the abundance of
  - through the abundance of
  - because of the greatness of
  lexicon: HALOT
  rationale: רֹב denotes abundance, greatness, or multitude. Here it intensifies the
    following noun. 'In the greatness of' preserves the Hebrew image while remaining
    readable.
- source_word: אִוַּלְתּוֹ
  chosen: his folly
  alternatives:
  - his foolishness
  lexicon: HALOT
  rationale: The noun denotes moral folly, a key wisdom category. 'Folly' is more
    idiomatic and weightier in Proverbs than 'foolishness.'
- source_word: יִשְׁגֶּה
  chosen: he goes astray
  alternatives:
  - he wanders
  - he is led astray
  - he staggers
  lexicon: HALOT
  rationale: שׁגה can mean stray, wander, or err. In this moral context, 'goes astray'
    best conveys ruinous moral deviation without over-specifying physical drunken
    staggering.
- source_word: הוּא
  chosen: He
  alternatives:
  - That man
  - Such a one
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis to the subject already implied in
    the verb. English retains it simply as 'He' without needing additional emphasis
    markers.
