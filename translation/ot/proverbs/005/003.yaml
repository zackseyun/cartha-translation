theological_decisions:
- issue: Meaning of זָרָה in Proverbs wisdom context
  chosen_reading: a forbidden woman
  alternative_readings:
  - a strange woman
  - a foreign woman
  - an adulteress
  rationale: The term in Proverbs regularly functions as a wisdom-category for the
    sexually illicit woman, emphasizing prohibited relationship rather than ethnicity
    alone. 'Forbidden woman' best captures the moral force for modern readers while
    avoiding unnecessary narrowing to a married adulteress in every occurrence.
  doctrine_reference: Translation philosophy §§1, 5, 6
