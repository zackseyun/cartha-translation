id: PRO.5.3
reference: Proverbs 5:3
source:
  edition: WLC
  text: כִּ֤י נֹ֣פֶת תִּ֭טֹּפְנָה שִׂפְתֵ֣י זָרָ֑ה וְ/חָלָ֖ק מִ/שֶּׁ֣מֶן חִכָּֽ/הּ׃
translation:
  text: For the lips of a forbidden woman drip honey, and her mouth is smoother than
    oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a strange woman,' 'a foreign woman,' or 'an adulteress.' The Hebrew
      term in Proverbs often refers to a woman outside the bounds of lawful sexual
      relationship.
    reason: lexical_alternative
  - marker: b
    text: Literally 'her palate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the warning in the surrounding
    context. 'For' preserves the logical connection naturally in English.
- source_word: נֹפֶת
  chosen: honey
  alternatives:
  - honeycomb
  - dripping honey
  lexicon: HALOT
  rationale: Refers to honey, often specifically flowing honey from the comb. 'Honey'
    is the most natural English rendering here, while the verbal idea of flowing is
    already carried by תִּטֹּפְנָה.
- source_word: תִּטֹּפְנָה
  chosen: drip
  alternatives:
  - drop
  - flow
  lexicon: HALOT
  rationale: The verb conveys dripping or distilling. 'Drip' preserves the sensual
    metaphor and pairs well with 'honey' in idiomatic English.
- source_word: שִׂפְתֵי
  chosen: the lips of
  alternatives:
  - lips
  lexicon: HALOT
  rationale: Construct form requiring completion by the following noun. 'The lips
    of' is clear and formally close.
- source_word: זָרָה
  chosen: a forbidden woman
  alternatives:
  - a strange woman
  - an adulteress
  - a foreign woman
  lexicon: HALOT
  rationale: In Proverbs this term commonly denotes a woman outside the covenantal
    and moral bounds of legitimate sexual relationship, not merely an ethnically foreign
    woman. 'Forbidden woman' communicates the moral-social sense in readable modern
    English without over-specifying adultery in every instance.
- source_word: וְחָלָק
  chosen: and ... is smoother
  alternatives:
  - and smooth
  - and slippery
  lexicon: HALOT
  rationale: The adjective means smooth, here in comparative sense by context with
    מִן ('than'). Rendering it predicatively as 'is smoother' produces natural English
    and preserves the comparison.
- source_word: מִשֶּׁמֶן
  chosen: than oil
  alternatives:
  - than olive oil
  lexicon: HALOT
  rationale: The comparative min marks standard of comparison. 'Oil' is sufficient
    and idiomatic; specifying 'olive' is possible culturally but not necessary in
    the main text.
- source_word: חִכָּהּ
  chosen: her mouth
  alternatives:
  - her palate
  - her speech
  lexicon: HALOT
  rationale: Literally 'her palate,' but in Hebrew this can stand metonymically for
    the mouth or speech. 'Her mouth' preserves the bodily imagery and reads naturally
    in English; 'speech' would interpret more than translate.
