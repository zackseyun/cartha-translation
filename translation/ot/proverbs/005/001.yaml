id: PRO.5.1
reference: Proverbs 5:1
source:
  edition: WLC
  text: בְּ֭נִ/י לְ/חָכְמָתִ֣/י הַקְשִׁ֑יבָ/ה לִ֝/תְבוּנָתִ֗/י הַט אָזְנֶֽ/ךָ־׃
translation:
  text: My son, pay attention to my wisdom; incline your ear to my understanding,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen attentively to my wisdom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to my discernment' or 'to my insight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from a father/teacher to a male son; the Hebrew is grammatically
    masculine singular. Per doctrine, gender-accurate rendering is preferred over
    neutralizing to 'child.'
- source_word: לְחָכְמָתִי
  chosen: to my wisdom
  alternatives:
  - to my wise teaching
  lexicon: HALOT
  rationale: חָכְמָה commonly means 'wisdom.' Here the prefixed ל marks the object
    of attention after הַקְשִׁיבָה, so 'pay attention to my wisdom' preserves the
    noun rather than paraphrasing it as teaching, though that nuance is possible in
    context.
- source_word: הַקְשִׁיבָה
  chosen: pay attention
  alternatives:
  - listen attentively
  - give heed
  lexicon: HALOT
  rationale: Imperative of קשׁב conveys attentive listening. 'Pay attention' is natural
    modern English and fits optimal equivalence better than the more formal 'give
    heed.'
- source_word: לִתְבוּנָתִי
  chosen: to my understanding
  alternatives:
  - to my discernment
  - to my insight
  lexicon: HALOT
  rationale: תְּבוּנָה denotes understanding/discernment/insight. 'Understanding'
    pairs well with 'wisdom' and preserves the abstract noun form. Alternatives are
    viable but slightly more interpretive.
- source_word: הַט
  chosen: incline
  alternatives:
  - turn
  - bend
  lexicon: HALOT
  rationale: Imperative of נטה with 'ear' is a standard idiom for attentive listening.
    'Incline' preserves the metaphor and remains understandable in modern English.
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: Singular in Hebrew; English idiom also commonly uses singular in this
    expression. Retaining singular preserves the imagery of the source.
