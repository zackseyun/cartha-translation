id: PRO.5.18
reference: Proverbs 5:18
source:
  edition: WLC
  text: יְהִֽי מְקוֹרְ/ךָ֥ בָר֑וּךְ וּ֝/שְׂמַ֗ח מֵ/אֵ֥שֶׁת נְעוּרֶֽ/ךָ־׃
translation:
  text: Let your fountain be blessed, and rejoice in the wife of your youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your spring" for "your fountain." The Hebrew keeps the water metaphor
      and may imply both the source of life and marital fertility.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: Let ... be
  alternatives:
  - May ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/exhortation. 'Let ... be' is natural
    modern English and preserves the volitional force without sounding archaic.
- source_word: מְקוֹרְךָ
  chosen: your fountain
  alternatives:
  - your spring
  - your source
  lexicon: HALOT
  rationale: מָקוֹר literally denotes a spring/fountain/source. In this context of
    marital sexuality and offspring imagery in Proverbs 5, 'fountain' preserves the
    metaphor vividly and matches the surrounding water imagery better than the flatter
    'source.'
- source_word: בָרוּךְ
  chosen: blessed
  alternatives:
  - prosperous
  - favored
  lexicon: HALOT
  rationale: The passive/adjectival sense 'blessed' is the most direct rendering and
    preserves the covenantal and wisdom-register resonance of ברך without overinterpreting
    the specific form of blessing.
- source_word: וּשְׂמַח
  chosen: and rejoice
  alternatives:
  - and be glad
  - and delight yourself
  lexicon: HALOT
  rationale: Imperatival force after the jussive continues the exhortation. 'Rejoice'
    is concise, idiomatic, and preserves the positive command of marital delight.
- source_word: מֵאֵשֶׁת
  chosen: in the wife of
  alternatives:
  - with the wife of
  - because of the wife of
  lexicon: HALOT
  rationale: The preposition מן after שמח can mark the source/object of joy. In English,
    'rejoice in' best conveys delight centered on one's wife; 'with' is possible but
    weaker, and 'because of' is more explanatory than the Hebrew requires.
- source_word: נְעוּרֶיךָ
  chosen: your youth
  alternatives:
  - your young manhood
  - your younger days
  lexicon: HALOT
  rationale: The construct phrase 'wife of your youth' is a standard Hebrew expression
    for the wife married in one's early life. 'Your youth' is the most natural and
    recognizable English rendering.
