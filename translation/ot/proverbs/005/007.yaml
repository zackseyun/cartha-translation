id: PRO.5.7
reference: Proverbs 5:7
source:
  edition: WLC
  text: וְ/עַתָּ֣ה בָ֭נִים שִׁמְעוּ לִ֑/י וְ/אַל תָּ֝ס֗וּרוּ מֵ/אִמְרֵי פִֽ/י־־־׃
translation:
  text: And now, sons, listen to me, and do not turn aside from the words of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children.' The Hebrew is masculine plural ('sons'), and the translation
      preserves that form in keeping with the source wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a transition and exhortational
    pivot. 'And now' preserves both the connective force and the discourse shift better
    than a bare 'Now.'
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  - my sons
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in wisdom literature
    commonly addresses a male audience or disciples in filial terms. Per the gender-accurate
    policy, 'sons' is preferred over gender-neutral 'children.' 'My sons' would add
    a possessive not present in this verse, though it appears in some nearby contexts.
- source_word: שִׁמְעוּ לִי
  chosen: listen to me
  alternatives:
  - hear me
  - obey me
  lexicon: HALOT
  rationale: שׁמע with ל can mean hear/listen, and in wisdom exhortation carries attentiveness
    that may imply obedience. 'Listen to me' is natural modern English and preserves
    the imperative without overtranslating to 'obey.'
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - but do not
  lexicon: HALOT
  rationale: The conjunction with negative particle links the second imperative to
    the first. 'And do not' reflects the straightforward coordination.
- source_word: תָּסוּרוּ
  chosen: turn aside
  alternatives:
  - depart
  - swerve
  - turn away
  lexicon: HALOT
  rationale: סור commonly denotes turning aside or departing from a path or instruction.
    'Turn aside' fits the wisdom-path metaphor and avoids sounding overly absolute
    like 'depart.'
- source_word: מֵאִמְרֵי פִי
  chosen: from the words of my mouth
  alternatives:
  - from my words
  - from the sayings of my mouth
  lexicon: HALOT
  rationale: אִמְרֵי is the construct plural of 'utterance/word/saying.' 'The words
    of my mouth' preserves the Hebrew idiom and rhetorical solemnity, while remaining
    clear in English.
