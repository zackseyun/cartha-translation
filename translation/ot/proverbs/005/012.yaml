id: PRO.5.12
reference: Proverbs 5:12
source:
  edition: WLC
  text: וְֽ/אָמַרְתָּ֗ אֵ֭יךְ שָׂנֵ֣אתִי מוּסָ֑ר וְ֝/תוֹכַ֗חַת נָאַ֥ץ לִבִּֽ/י׃
translation:
  text: and you say, “How I hated discipline, and my heart despised reproof!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and you will say,” reflecting the Hebrew perfect used in a future or
      consequential sense within the father's warning.
    reason: lexical_alternative
  - marker: b
    text: “Reproof” may also be rendered “rebuke” or “correction.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and you say
  alternatives:
  - and you will say
  - then you say
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in this instructional context
    is best rendered as a future-like or vivid consequential statement. Present-tense
    English ('you say') captures the vividness of the lament within the larger discourse,
    while retaining the direct second-person address.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How could it be that
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament rather than a request for information.
    'How' preserves the emotional force succinctly in natural English.
- source_word: שָׂנֵאתִי
  chosen: I hated
  alternatives:
  - I have hated
  lexicon: HALOT
  rationale: Qal perfect 1cs expresses the speaker's retrospective confession. Simple
    past is the most natural English rendering in the lament.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: In Proverbs, מוּסָר commonly denotes formative discipline/instruction
    with corrective force. 'Discipline' best preserves both the pedagogical and corrective
    sense in accessible modern English.
- source_word: וְתוֹכַחַת
  chosen: and reproof
  alternatives:
  - and rebuke
  - and correction
  lexicon: HALOT
  rationale: תוֹכַחַת refers to verbal correction or rebuke. 'Reproof' pairs well
    with 'discipline' and preserves the wisdom-literature register without becoming
    archaic.
- source_word: נָאַץ
  chosen: despised
  alternatives:
  - spurned
  - rejected
  lexicon: HALOT
  rationale: The verb conveys contemptuous rejection. 'Despised' matches the strong
    negative force and fits the parallelism with 'hated'.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - I
  - my inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' often denotes the inner person, including will and thought.
    Retaining 'my heart' preserves the Hebrew anthropology and poetic force rather
    than flattening it to a mere pronoun.
