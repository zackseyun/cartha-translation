theological_decisions:
- issue: Subject reference in the final clause
  chosen_reading: 'The verse continues to describe the forbidden woman: ''she does
    not know it.'''
  alternative_readings:
  - 'The final clause addresses the son/reader: ''you do not know'''
  rationale: The surrounding context (vv. 3–6) consistently describes the woman in
    the third feminine singular. Reading the final verb with her as subject preserves
    the flow of the warning and avoids an abrupt shift to second person. Because the
    Hebrew form has been taken differently in some traditions, the alternative is
    preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
