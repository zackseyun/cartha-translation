id: PRO.5.6
reference: Proverbs 5:6
source:
  edition: WLC
  text: אֹ֣רַח חַ֭יִּים פֶּן תְּפַלֵּ֑ס נָע֥וּ מַ֝עְגְּלֹתֶ֗י/הָ לֹ֣א תֵדָֽע־׃פ
translation:
  text: Lest she level the path of life, her tracks wander; she does not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you do not know,' if the final clause is taken as addressing the listener
      rather than describing the woman.
    reason: alternative_reading
  - marker: b
    text: Or, 'Lest you ponder the path of life; her paths wander.' The Hebrew of
      this verse is compact and has been understood in more than one way.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח חַיִּים
  chosen: the path of life
  alternatives:
  - the way of life
  lexicon: HALOT
  rationale: אֹרַח denotes a path/way, and חַיִּים specifies life. 'Path of life'
    is natural English and preserves the concrete metaphor.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: פֶּן commonly introduces a negative purpose or prevention clause. 'Lest'
    is concise and fits the warning style of Proverbs.
- source_word: תְּפַלֵּס
  chosen: level
  alternatives:
  - make straight
  - weigh
  - ponder
  lexicon: HALOT
  rationale: From פלס in the piel, the sense here is to make level/straight or weigh
    out. In the immediate path imagery, 'level' best preserves the metaphor of a straight,
    well-considered course. 'Ponder' is a traditional rendering but is less directly
    tied to the road imagery.
- source_word: נָעוּ
  chosen: wander
  alternatives:
  - are unstable
  - reel
  - move to and fro
  lexicon: HALOT
  rationale: The verb conveys wavering or instability. 'Wander' fits the image of
    deviating tracks and communicates moral instability in idiomatic English.
- source_word: מַעְגְּלֹתֶיהָ
  chosen: her tracks
  alternatives:
  - her paths
  - her courses
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track or path. Using 'tracks' distinguishes it from
    אֹרַח earlier while preserving the same travel metaphor.
- source_word: לֹא תֵדָע
  chosen: she does not know it
  alternatives:
  - you do not know
  - she does not know
  - you will not know
  lexicon: HALOT
  rationale: The ketiv/qere tradition and context favor a third feminine subject referring
    to the adulterous woman described in the surrounding verses. The object 'it' is
    implicit in English, referring to the wandering of her tracks or the path of life.
    This yields a coherent sense in context.
