id: PRO.5.8
reference: Proverbs 5:8
source:
  edition: WLC
  text: הַרְחֵ֣ק מֵ/עָלֶ֣י/הָ דַרְכֶּ֑/ךָ וְ/אַל תִּ֝קְרַ֗ב אֶל פֶּ֥תַח בֵּיתָֽ/הּ־־׃
translation:
  text: Keep your way far from her, and do not go near the entrance of her house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Stay far from her, and do not approach the doorway of her house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְחֵק
  chosen: Keep ... far
  alternatives:
  - Remove ... far
  - Stay far
  lexicon: HALOT
  rationale: Hiphil imperative of רחק gives a causative command to make distance.
    In idiomatic English with 'your way' as object, 'Keep your way far' best preserves
    both the imperative force and the metaphor of maintaining distance.
- source_word: מֵעָלֶיהָ
  chosen: from her
  alternatives:
  - away from her
  - far from her
  lexicon: HALOT
  rationale: The preposition with עַל in this construction conveys separation from
    her vicinity or sphere. 'From her' is concise, while the adverbial sense of distance
    is already carried by הַרְחֵק and reflected in 'far'.
- source_word: דַרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  - your course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path' both literally and metaphorically.
    'Your way' preserves the Hebrew metaphor for one's conduct or course of life and
    fits wisdom literature style.
- source_word: וְאַל תִּקְרַב
  chosen: and do not go near
  alternatives:
  - and do not come near
  - and do not approach
  lexicon: HALOT
  rationale: The negative jussive/imperfect gives a prohibition. 'Go near' is natural
    modern English and suits the movement imagery; 'approach' is possible but slightly
    less idiomatic here.
- source_word: אֶל פֶּתַח
  chosen: the entrance of
  alternatives:
  - the door of
  - the doorway of
  - the opening of
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening, entrance, or doorway. 'Entrance' is broad
    enough to include the threshold area and reads naturally in English. 'Door' would
    be too specific if the focus is proximity to the house's access point.
- source_word: בֵּיתָהּ
  chosen: her house
  alternatives:
  - her home
  lexicon: HALOT
  rationale: בַּיִת is straightforwardly 'house.' 'Home' is possible, but 'house'
    better preserves the concrete spatial warning of the proverb.
