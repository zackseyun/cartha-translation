theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse belongs to Hebrew wisdom literature and uses שְׁאוֹל as a stock
    term for the underworld / realm of the dead. Transliteration preserves theological
    tension and avoids importing either a minimalist 'grave' reading or later, more
    developed notions of hell. Because English readers may need help, an explanatory
    footnote preserves alternatives.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it.
