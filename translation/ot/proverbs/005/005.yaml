id: PRO.5.5
reference: Proverbs 5:5
source:
  edition: WLC
  text: רַ֭גְלֶי/הָ יֹרְד֣וֹת מָ֑וֶת שְׁ֝א֗וֹל צְעָדֶ֥י/הָ יִתְמֹֽכוּ׃
translation:
  text: Her feet go down to death; her steps hold fast to Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֶיהָ
  chosen: her feet
  alternatives:
  - her foot
  lexicon: HALOT
  rationale: Plural construct with 3fs suffix; the plural is natural in English and
    preserves the concrete bodily imagery of the warning about the forbidden woman.
- source_word: יֹרְדוֹת
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: Qal participle feminine plural from ירד. 'Go down' is idiomatic modern
    English and preserves the ongoing/resultative sense without sounding overly formal;
    'descend' is possible but less natural.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Direct object/goal of descent. The plain lexical sense 'death' fits the
    wisdom context and should not be weakened to merely 'danger' or 'ruin,' though
    those ideas are implicated.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: The Hebrew term is culturally and theologically specific. Transliteration
    preserves the source-world concept better than flattening it to 'grave' or over-interpreting
    it as a fully developed afterlife term. An explanatory alternative is preserved
    in a footnote.
- source_word: צְעָדֶיהָ
  chosen: her steps
  alternatives:
  - her stride
  - her footsteps
  lexicon: HALOT
  rationale: Concrete plural noun meaning steps/footsteps. 'Her steps' is concise,
    natural, and parallels 'her feet' in the first colon.
- source_word: יִתְמֹכוּ
  chosen: hold fast to
  alternatives:
  - take hold of
  - support
  - grasp
  lexicon: HALOT
  rationale: From תמך, whose core sense involves holding/supporting. In this poetic
    context, with 'her steps' as subject and Sheol as object placed before the verb,
    the sense is that her course firmly lays hold of or clings to Sheol. 'Hold fast
    to' communicates the strong attachment without awkward literalism.
