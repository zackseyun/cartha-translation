theological_decisions:
- issue: Erotic marital imagery in wisdom literature
  chosen_reading: Retain the explicit marital-sexual imagery without euphemistic softening.
  alternative_readings:
  - Use softened language such as 'bosom' or 'affection' to reduce sexual explicitness.
  rationale: The verse commends delight in one's wife as the proper alternative to
    adultery in the surrounding context. Preserving the concreteness of the imagery
    reflects the Hebrew text and avoids importing prudish restraint not present in
    Scripture.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic.'
