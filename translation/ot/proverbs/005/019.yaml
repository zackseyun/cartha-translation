id: PRO.5.19
reference: Proverbs 5:19
source:
  edition: WLC
  text: אַיֶּ֥לֶת אֲהָבִ֗ים וְֽ/יַעֲלַ֫ת חֵ֥ן דַּ֭דֶּי/הָ יְרַוֻּ֣/ךָ בְ/כָל עֵ֑ת
    בְּ֝/אַהֲבָתָ֗/הּ תִּשְׁגֶּ֥ה תָמִֽיד־־׃
translation:
  text: a loving doe, a graceful mountain goat—may her breasts satisfy you at all
    times; be intoxicated always with her love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a graceful ibex.' The Hebrew יַעֲלָה refers to a wild mountain goat.
    reason: lexical_alternative
  - marker: b
    text: Or 'be enraptured always with her love.' The Hebrew verb can literally mean
      'go astray,' but here it is used positively for being carried away by love.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֶּלֶת אֲהָבִים
  chosen: a loving doe
  alternatives:
  - a doe of loves
  - a beloved hind
  lexicon: HALOT
  rationale: אַיֶּלֶת denotes a female deer/doe. אֲהָבִים functions adjectivally or
    as an attributive genitive, describing her as associated with love/affection.
    'A loving doe' is natural modern English while preserving the animal imagery and
    erotic-marital tone.
- source_word: וְיַעֲלַת חֵן
  chosen: a graceful mountain goat
  alternatives:
  - a graceful ibex
  - a doe of grace
  lexicon: HALOT
  rationale: יַעֲלָה refers to a wild goat/ibex; 'mountain goat' is a clear contemporary
    equivalent. חֵן means grace/charm. 'Graceful mountain goat' preserves the parallel
    poetic image and avoids flattening the metaphor.
- source_word: דַּדֶּיהָ
  chosen: her breasts
  alternatives:
  - her bosom
  lexicon: HALOT
  rationale: The noun refers concretely to breasts. Given the marital-sexual context
    of Proverbs 5, the explicit anatomical rendering is warranted and more accurate
    than the euphemistic 'bosom'.
- source_word: יְרַוֻּךָ
  chosen: may ... satisfy you
  alternatives:
  - may ... fill you
  - may ... intoxicate you
  - let ... abundantly refresh you
  lexicon: HALOT
  rationale: From רוה, 'to drink one's fill, be saturated, be abundantly satisfied.'
    With breasts as subject, 'satisfy you' best conveys the sense of full sensual
    delight in idiomatic English without over-paraphrase.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - always
  - at every time
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'At all times' preserves the formal
    sense and fits the poetic cadence.
- source_word: בְּאַהֲבָתָהּ
  chosen: with her love
  alternatives:
  - by her love
  - in her love
  lexicon: HALOT
  rationale: The preposition ב here is best rendered instrumentally or associatively
    in English. 'With her love' is natural and keeps the focus on the wife's affectionate
    bond, not merely sexual attraction.
- source_word: תִּשְׁגֶּה
  chosen: be intoxicated
  alternatives:
  - go astray
  - be enraptured
  - be exhilarated
  lexicon: HALOT
  rationale: Although שׁגה often means 'go astray' or 'err,' in this context it is
    used positively/ironically for being carried away in love. 'Be intoxicated' matches
    the semantic extension of being overcome or captivated and fits the parallel with
    sensual satisfaction.
- source_word: תָמִיד
  chosen: always
  alternatives:
  - continually
  lexicon: HALOT
  rationale: A common adverb meaning continual duration. 'Always' is idiomatic and
    pairs well with the imperative-like force of the clause.
