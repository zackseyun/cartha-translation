id: PRO.5.16
reference: Proverbs 5:16
source:
  edition: WLC
  text: יָפ֣וּצוּ מַעְיְנֹתֶ֣י/ךָ ח֑וּצָ/ה בָּ֝/רְחֹב֗וֹת פַּלְגֵי מָֽיִם־׃
translation:
  text: Should your springs be scattered abroad, streams of water in the streets?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Let your springs be scattered abroad, streams of water
      in the streets.' The Hebrew form itself can be read this way, but the wider
      context strongly favors a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: The water imagery refers metaphorically to a man's sexual vitality and offspring
      in the context of marital faithfulness (see Prov 5:15–18).
    reason: cross_reference
lexical_decisions:
- source_word: יָפ֣וּצוּ
  chosen: should ... be scattered
  alternatives:
  - let ... be scattered
  - are ... scattered
  - may ... spread out
  lexicon: HALOT
  rationale: The verb פוץ in the Qal commonly means 'be scattered' or 'be dispersed.'
    In this context, the form can be read as an interrogative/jussive-like statement
    continuing the father's admonition. Rendering it with 'should ... be scattered'
    captures the rhetorical force better than a flat indicative.
- source_word: מַעְיְנֹתֶיךָ
  chosen: your springs
  alternatives:
  - your fountains
  - your sources
  lexicon: HALOT
  rationale: מַעְיָן denotes a spring or fountain. 'Springs' is natural modern English
    and preserves the water metaphor tied to sexual fidelity in the surrounding context.
- source_word: חוּצָה
  chosen: abroad
  alternatives:
  - outside
  - outdoors
  lexicon: HALOT
  rationale: The adverb means 'outside' or 'outward.' 'Abroad' fits the idiom 'scattered
    abroad' and conveys movement into public space.
- source_word: בָּרְחֹבוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the open places
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to broad public places, streets, or squares. 'In the
    streets' is the most idiomatic English here and matches the contrast with private
    marital intimacy in the context.
- source_word: פַּלְגֵי מָיִם
  chosen: streams of water
  alternatives:
  - channels of water
  - watercourses
  lexicon: HALOT
  rationale: פֶּלֶג means a division, channel, or stream of water. 'Streams of water'
    is clear and preserves the poetic parallelism with 'springs.'
