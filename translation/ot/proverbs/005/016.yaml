theological_decisions:
- issue: Whether the line is a statement or a rhetorical question within the warning
    about sexual fidelity
  chosen_reading: 'Render as a rhetorical question: ''Should your springs be scattered
    abroad...?'''
  alternative_readings:
  - 'Render as an imperative/jussive: ''Let your springs be scattered abroad...'''
  - Render as an indicative statement
  rationale: In the immediate context (Prov 5:15–17), the father urges exclusive enjoyment
    of one's own wife. A positive imperative here would conflict with verse 17 ('let
    them be for yourself alone, and not for strangers with you'). The rhetorical-question
    rendering best preserves the admonitory flow without importing extra wording.
