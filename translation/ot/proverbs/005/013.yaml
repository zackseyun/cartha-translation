id: PRO.5.13
reference: Proverbs 5:13
source:
  edition: WLC
  text: וְֽ/לֹא שָׁ֭מַעְתִּי בְּ/ק֣וֹל מוֹרָ֑/י וְ֝/לִֽ/מְלַמְּדַ֗/י לֹא הִטִּ֥יתִי
    אָזְנִֽ/י־־׃
translation:
  text: and I did not listen to the voice of my instructors, nor incline my ear to
    my teachers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey the voice of my instructors.' The Hebrew verb can carry
      the sense of hearing with obedience in wisdom contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: did not listen
  alternatives:
  - did not obey
  - did not hear
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here, with
    'to the voice of' teachers in a wisdom setting, 'listen' best captures attentive
    reception without over-specifying obedience, while still implying refusal to heed
    instruction.
- source_word: בְּקוֹל
  chosen: to the voice of
  alternatives:
  - to the sound of
  - to what ... said
  lexicon: HALOT
  rationale: The idiom שׁמע בקול commonly means 'listen to the voice of' or 'heed.'
    Retaining 'voice' preserves the Hebrew imagery and remains natural enough in English.
- source_word: מוֹרָי
  chosen: my instructors
  alternatives:
  - my teachers
  - those who instructed me
  lexicon: HALOT
  rationale: From ירה in the sense of instruct/teach. 'Instructors' differentiates
    this term from the following מלמדי while preserving the educational setting. The
    plural with 1cs suffix is rendered straightforwardly.
- source_word: מְלַמְּדַי
  chosen: my teachers
  alternatives:
  - my instructors
  - those teaching me
  lexicon: HALOT
  rationale: From למד, 'teach.' Rendering this as 'teachers' provides a natural English
    equivalent and preserves a slight distinction from מוֹרָי rendered 'instructors.'
- source_word: הִטִּיתִי אָזְנִי
  chosen: incline my ear
  alternatives:
  - turn my ear
  - pay attention
  - bend my ear
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for giving attentive heed. 'Incline my
    ear' is a clear, established English rendering that preserves the metaphor better
    than the more interpretive 'pay attention.'
- source_word: וְ...וְלֹא
  chosen: and ... nor
  alternatives:
  - and ... and not
  - but ... not
  lexicon: HALOT
  rationale: The verse coordinates two negative clauses. English style is improved
    by rendering the second conjunction as 'nor,' which accurately reflects the continued
    negation.
