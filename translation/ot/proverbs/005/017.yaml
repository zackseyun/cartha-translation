id: PRO.5.17
reference: Proverbs 5:17
source:
  edition: WLC
  text: יִֽהְיוּ לְ/ךָ֥ לְ/בַדֶּ֑/ךָ וְ/אֵ֖ין לְ/זָרִ֣ים אִתָּֽ/ךְ־׃
translation:
  text: Let them be for you alone, and not for strangers with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let them be yours alone, and not shared with strangers.' The verse continues
      the metaphor of springs/streams from the previous context and stresses exclusive
      marital fidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: Let them be
  alternatives:
  - They shall be
  - May they be
  lexicon: HALOT
  rationale: Qal imperfect 3mp of היה here functions jussively in context, continuing
    the father's exhortation. 'Let them be' captures the volitional force in natural
    English better than a simple future.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  - yours
  lexicon: HALOT
  rationale: The preposition ל with the pronoun marks possession/benefit. 'For you'
    preserves the syntax and works smoothly with the following phrase.
- source_word: לְבַדֶּךָ
  chosen: alone
  alternatives:
  - by yourself
  - for yourself alone
  lexicon: HALOT
  rationale: The noun/adverbial expression means 'alone, by oneself.' 'Alone' is concise
    and idiomatic in English, while still conveying exclusivity.
- source_word: וְאֵין
  chosen: and not
  alternatives:
  - and let there not be
  - with none
  lexicon: HALOT
  rationale: The conjunction plus existential negative introduces the negative counterpart
    to the first clause. In English, 'and not' gives the intended prohibition/exclusion
    without awkwardness.
- source_word: לְזָרִים
  chosen: for strangers
  alternatives:
  - for outsiders
  - for foreigners
  lexicon: HALOT
  rationale: זָרִים in this wisdom context refers to those outside the marriage bond,
    not ethnic foreigners. 'Strangers' is the standard and suitably broad rendering;
    'outsiders' is possible but less literal.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - beside you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is straightforwardly associative.
    'With you' preserves the Hebrew and clarifies that strangers are not to share
    in what belongs exclusively to the addressee.
