id: PRO.5.9
reference: Proverbs 5:9
source:
  edition: WLC
  text: פֶּן תִּתֵּ֣ן לַ/אֲחֵרִ֣ים הוֹדֶ֑/ךָ וּ֝/שְׁנֹתֶ֗י/ךָ לְ/אַכְזָרִֽי־׃
translation:
  text: lest you give your honor to others, and your years to the cruel one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your splendor' or 'your vigor' for 'your honor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to a cruel man' or 'to the merciless one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' preserves the
    concise admonitory force typical in wisdom literature better than the more explanatory
    'otherwise'.
- source_word: תִּתֵּן
  chosen: you give
  alternatives:
  - you hand over
  - you surrender
  lexicon: HALOT
  rationale: The verb נתן commonly means 'give.' In context it implies yielding something
    away through folly, but the simple 'give' best preserves the Hebrew while allowing
    the warning context to supply the nuance.
- source_word: לַאֲחֵרִים
  chosen: to others
  alternatives:
  - to strangers
  - to another
  lexicon: HALOT
  rationale: The plural form clearly supports 'others.' 'Strangers' is possible in
    some contexts for אחר, but here the contrast is broader and not limited to foreignness;
    the warning is against losing what is yours to other people.
- source_word: הוֹדֶךָ
  chosen: your honor
  alternatives:
  - your splendor
  - your vigor
  - your majesty
  lexicon: HALOT
  rationale: הוד can denote honor, splendor, or majesty. In this wisdom context, where
    illicit sexuality leads to public and personal ruin, 'honor' best captures the
    loss of dignity/reputation, while still allowing a broader sense of personal glory
    or strength.
- source_word: וּשְׁנֹתֶיךָ
  chosen: and your years
  alternatives:
  - and the years of your life
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with suffix. The
    idiom refers to one's lifespan or prime years; 'your years' is natural and sufficiently
    transparent.
- source_word: לְאַכְזָרִי
  chosen: to the cruel one
  alternatives:
  - to a cruel man
  - to the merciless one
  - to the pitiless one
  lexicon: HALOT
  rationale: The adjective functions substantivally in the singular. 'The cruel one'
    preserves the Hebrew's terseness and leaves the referent somewhat open, fitting
    the proverb's warning. 'A cruel man' is possible, but the Hebrew does not explicitly
    supply 'man.'
