id: PRO.5.10
reference: Proverbs 5:10
source:
  edition: WLC
  text: פֶּֽן יִשְׂבְּע֣וּ זָרִ֣ים כֹּחֶ֑/ךָ וַ֝/עֲצָבֶ֗י/ךָ בְּ/בֵ֣ית נָכְרִֽי־׃
translation:
  text: lest strangers be filled with your strength, and your labors go to the house
    of a foreigner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be satisfied with your strength.' The Hebrew verb can denote being filled
      or being satisfied.
    reason: lexical_alternative
  - marker: b
    text: '''Your labors'' may also mean ''the fruit of your labor'' or ''your hard-earned
      wealth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' preserves the
    concise admonitory force typical in Proverbs better than the more explanatory
    'otherwise'.
- source_word: יִשְׂבְּעוּ
  chosen: be filled
  alternatives:
  - be satisfied
  - have their fill
  lexicon: HALOT
  rationale: The verb שבע commonly means to be sated or filled. 'Be filled' works
    naturally with the object 'your strength' and preserves the image of others being
    enriched at the addressee's expense.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: HALOT
  rationale: In wisdom literature this term often denotes those outside one's proper
    relational or covenantal sphere. 'Strangers' is idiomatic here and pairs well
    with the parallel 'foreigner' in the second colon without making both lines identical.
- source_word: כֹּחֶךָ
  chosen: your strength
  alternatives:
  - your wealth
  - your vigor
  - your resources
  lexicon: HALOT
  rationale: כח literally denotes strength, power, or capacity. In this context it
    likely includes the productive power by which one acquires goods, but 'your strength'
    keeps the Hebrew's broader sense and allows the economic implication to emerge
    from context.
- source_word: וַעֲצָבֶיךָ
  chosen: your labors
  alternatives:
  - your toil
  - the fruit of your labor
  - your hard-earned goods
  lexicon: HALOT
  rationale: From עצב in this nominal form, the sense is toil, labor, or what is gained
    through painful effort. 'Your labors' preserves the connection to exertion without
    over-interpreting it strictly as possessions, though the result of labor is implied.
- source_word: בְּבֵית
  chosen: go to the house of
  alternatives:
  - be in the house of
  - end up in the house of
  lexicon: HALOT
  rationale: The preposition 'in' with 'house' in this warning context implies transfer
    into another's household. Supplying 'go to' makes the English sense explicit while
    remaining faithful to the implied movement of the parallelism.
- source_word: נָכְרִי
  chosen: a foreigner
  alternatives:
  - an outsider
  - another man
  lexicon: HALOT
  rationale: נכרי denotes one who is foreign or alien. 'Foreigner' preserves the lexical
    distinction from זרים while fitting the proverb's warning that one's gains may
    pass into the household of someone outside one's own family or community.
