id: PRO.5.22
reference: Proverbs 5:22
source:
  edition: WLC
  text: עַֽווֹנוֹתָ֗י/ו יִלְכְּדֻ/נ֥וֹ אֶת הָ/רָשָׁ֑ע וּ/בְ/חַבְלֵ֥י חַ֝טָּאת֗/וֹ
    יִתָּמֵֽךְ־׃
translation:
  text: His iniquities will capture the wicked man, and he will be held fast in the
    cords of his sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked'; the Hebrew is singular masculine.
    reason: lexical_alternative
  - marker: b
    text: Or 'ropes' instead of 'cords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַוּוֹנוֹתָיו
  chosen: his iniquities
  alternatives:
  - his sins
  - his guilty acts
  lexicon: HALOT
  rationale: Plural of עָוֹן often carries the sense of iniquities/guilt-bearing wrongs,
    not merely isolated acts. 'Iniquities' preserves the moral weight and fits the
    wisdom context of wrongdoing recoiling on the wrongdoer.
- source_word: יִלְכְּדֻנוֹ
  chosen: will capture
  alternatives:
  - will seize him
  - will catch him
  lexicon: HALOT
  rationale: From לָכַד, 'to capture/seize.' 'Will capture' is vivid and natural English,
    preserving the image of being overtaken by one's own wrongdoing.
- source_word: הָרָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - the guilty man
  lexicon: HALOT
  rationale: The adjective/substantive is singular masculine. Following the gender-accurate
    principle, 'the wicked man' reflects the Hebrew form while remaining representative
    in wisdom literature.
- source_word: וּבְחַבְלֵי
  chosen: and in the cords of
  alternatives:
  - and with the ropes of
  - and in the bonds of
  lexicon: HALOT
  rationale: חֶבֶל can denote cord/rope/band. 'Cords' fits the parallel trapping imagery
    and reads smoothly with the following verb.
- source_word: חַטָּאתוֹ
  chosen: his sin
  alternatives:
  - his sinful act
  - his offense
  lexicon: HALOT
  rationale: Singular 'sin' works well as a collective or abstract noun here, matching
    the Hebrew and the image of sin itself becoming the instrument of restraint.
- source_word: יִתָּמֵךְ
  chosen: he will be held fast
  alternatives:
  - he will be seized
  - he will be bound
  - he will be supported
  lexicon: HALOT
  rationale: Niphal of תמך here is best understood in context as being held, restrained,
    or fastened by the cords of sin. 'Held fast' preserves the passive sense and the
    entanglement imagery. 'Supported' is a possible lexical sense in other contexts
    but does not fit the parallelism here.
