theological_decisions:
- issue: Anthropological/moral agency imagery
  chosen_reading: The verse depicts the wicked person being ensnared by his own wrongdoing
    rather than by an external arbitrary force.
  alternative_readings:
  - A more generalized statement about consequences without personified entrapment
  rationale: The paired images of capture and cords present sin/iniquity as the means
    by which the wicked is trapped. The translation preserves this moral causality
    without importing further doctrinal claims about determinism or judgment mechanics.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; §4, gender-accurate over gender-neutral.
