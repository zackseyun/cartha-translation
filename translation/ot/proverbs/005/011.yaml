id: PRO.5.11
reference: Proverbs 5:11
source:
  edition: WLC
  text: וְ/נָהַמְתָּ֥ בְ/אַחֲרִיתֶ֑/ךָ בִּ/כְל֥וֹת בְּ֝שָׂרְ/ךָ֗ וּ/שְׁאֵרֶֽ/ךָ׃
translation:
  text: and you groan at your end, when your flesh and your body are consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you moan' for 'and you groan'; the Hebrew verb conveys an audible
      cry of distress.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your latter end' or 'at the end of your life'; the Hebrew can refer
      both to one's final outcome and to life's end.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָהַמְתָּ
  chosen: and you groan
  alternatives:
  - and you moan
  - and you lament
  - and you roar
  lexicon: HALOT
  rationale: The verb נהם denotes a guttural sound of distress, often a groan or moan.
    In this wisdom context, 'groan' communicates anguished regret in natural English
    without overstating the imagery.
- source_word: בְאַחֲרִיתֶךָ
  chosen: at your end
  alternatives:
  - in your latter end
  - at the end of your life
  - in your end
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or outcome. Here it points to the
    final result of the warned-against path, likely including life's end. 'At your
    end' preserves the Hebrew's compactness and ambiguity between temporal end and
    final outcome.
- source_word: בִּכְלוֹת
  chosen: when ... are consumed
  alternatives:
  - when ... come to an end
  - as ... waste away
  - in the consuming of
  lexicon: HALOT
  rationale: 'From כלה, the infinitive construct marks the circumstance/time: ''when''
    or ''as'' something is finished/consumed. Given the bodily objects that follow,
    ''are consumed'' best captures physical wasting away.'
- source_word: בְּשָׂרְךָ
  chosen: your flesh
  alternatives:
  - your body
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Since the verse pairs it with שארך, retaining
    'flesh' preserves the concrete Hebrew imagery and avoids collapsing the parallel
    terms into one English gloss.
- source_word: וּשְׁאֵרֶךָ
  chosen: your body
  alternatives:
  - your frame
  - your remnant
  - your kin
  lexicon: HALOT
  rationale: שאר can denote flesh, body, or close relation depending on context. Here,
    in parallel with 'your flesh' and in a context of bodily ruin, 'your body' is
    the clearest idiomatic rendering. 'Frame' is possible but less natural; 'remnant'
    and 'kin' do not fit the context.
