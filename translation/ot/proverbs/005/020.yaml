theological_decisions:
- issue: How to render the paired terms זָרָה and נָכְרִיָּה in Proverbs' warning
    material
  chosen_reading: Render זָרָה as 'forbidden woman' and נָכְרִיָּה as 'foreign woman'
  alternative_readings:
  - '''strange woman'' / ''strange woman'''
  - '''adulteress'' / ''adulteress'''
  rationale: The verse warns against illicit sexual union, not primarily against ethnicity.
    Using 'forbidden woman' for זָרָה communicates the moral prohibition clearly in
    modern English, while 'foreign woman' for נָכְרִיָּה preserves the lexical distinction
    and poetic parallelism. This avoids importing xenophobic force while still reflecting
    the covenantal outsider nuance present in Proverbs.
  doctrine_reference: Translation philosophy §§1, 5, 6
