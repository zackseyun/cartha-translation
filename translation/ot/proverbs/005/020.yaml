id: PRO.5.20
reference: Proverbs 5:20
source:
  edition: WLC
  text: וְ/לָ֤/מָּה תִשְׁגֶּ֣ה בְנִ֣/י בְ/זָרָ֑ה וּ֝/תְחַבֵּ֗ק חֵ֣ק נָכְרִיָּֽה׃
translation:
  text: Why, my son, should you go astray with a forbidden woman and embrace the bosom
    of a foreign woman?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange woman.' The Hebrew term refers to a woman outside proper covenantal
      or marital bounds; the sense here is moral and relational, not merely unusual.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lap of a foreign woman.' 'Bosom' renders a Hebrew term for the chest
      or lap in an intimate embrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָה
  chosen: Why ... should you
  alternatives:
  - Why would you
  - Why
  lexicon: HALOT
  rationale: Interrogative 'why' introducing a rhetorical question of admonition.
    In English, adding 'should you' brings out the exhortational force naturally without
    over-paraphrasing.
- source_word: תִשְׁגֶּה
  chosen: go astray
  alternatives:
  - wander
  - be led astray
  - be intoxicated
  lexicon: HALOT
  rationale: The verb שׁגה can denote straying or wandering, and in this chapter may
    carry the nuance of being led astray or infatuated. 'Go astray' preserves the
    moral and metaphorical sense without importing a stronger image than the immediate
    context requires.
- source_word: בְנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The form includes the 1cs suffix, so 'my son' is required. This also
    preserves the father-to-son instructional frame of Proverbs and follows the gender-accurate
    policy.
- source_word: זָרָה
  chosen: forbidden woman
  alternatives:
  - strange woman
  - another woman
  - adulteress
  lexicon: HALOT
  rationale: In Proverbs, זָרָה refers not merely to an ethnically foreign woman but
    to a woman outside the covenantal/marital bounds, often the seductress or adulterous
    outsider. 'Forbidden woman' communicates the moral-social force in clear modern
    English better than the traditional but opaque 'strange woman.' 'Adulteress' is
    possible but slightly more specific than the lexeme itself here.
- source_word: תְחַבֵּק
  chosen: embrace
  alternatives:
  - clasp
  - hug
  lexicon: HALOT
  rationale: A straightforward rendering of חבק. 'Embrace' fits both the poetic register
    and the sexual context.
- source_word: חֵק
  chosen: bosom
  alternatives:
  - breast
  - lap
  - embrace
  lexicon: HALOT
  rationale: חֵק often denotes bosom or lap, especially the intimate area held in
    an embrace. 'Bosom' preserves the concrete image and poetic tone better than the
    flatter 'lap' in this sexual context.
- source_word: נָכְרִיָּה
  chosen: foreign woman
  alternatives:
  - strange woman
  - outsider woman
  lexicon: HALOT
  rationale: The adjective/noun denotes a foreign or alien woman. Here it overlaps
    semantically with זָרָה, likely for poetic parallelism. Rendering it 'foreign
    woman' preserves the lexical distinction from זָרָה while allowing the context
    to signal that moral otherness, not merely ethnicity, is in view.
