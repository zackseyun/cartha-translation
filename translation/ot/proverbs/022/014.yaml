id: PRO.22.14
reference: Proverbs 22:14
source:
  edition: WLC
  text: שׁוּחָ֣ה עֲ֭מֻקָּה פִּ֣י זָר֑וֹת זְע֥וּם יְ֝הוָ֗ה יפול שָֽׁם־׃
translation:
  text: The mouth of forbidden women is a deep pit; he who is under Yahweh’s wrath will fall there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange women,' 'foreign women,' or 'adulterous women.' The Hebrew term in Proverbs commonly refers to women who are outside proper covenantal sexual boundaries.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּחָה
  chosen: pit
  alternatives:
  - ditch
  - trap
  lexicon: HALOT
  rationale: The noun denotes a pit or deep hole. 'Pit' is the most natural modern English equivalent and fits the proverb's metaphor of danger and entrapment.
- source_word: עֲמֻקָּה
  chosen: deep
  alternatives:
  - profound
  - very deep
  lexicon: HALOT
  rationale: The adjective straightforwardly modifies 'pit.' 'Deep' preserves the concrete image without overinterpreting it.
- source_word: פִּי
  chosen: mouth
  alternatives:
  - speech
  - lips
  lexicon: HALOT
  rationale: Literally 'mouth.' In context it can imply seductive speech, but retaining 'mouth' preserves the Hebrew metaphor while allowing the implication to be heard.
- source_word: זָרוֹת
  chosen: forbidden women
  alternatives:
  - strange women
  - adulterous women
  - immoral women
  lexicon: HALOT
  rationale: The adjective/noun from זור often refers in Proverbs to women outside covenantal/sexual boundaries, not merely ethnically foreign women. 'Forbidden women' captures the moral-social sense better than the traditional but misleading 'strange women.'
- source_word: זְעוּם
  chosen: is under ... wrath
  alternatives:
  - is cursed by
  - is denounced by
  - is abhorred by
  lexicon: HALOT
  rationale: The passive participial form indicates one who is the object of indignation. Rendering it as 'is under the LORD’s wrath' expresses the state clearly in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יפול
  chosen: will fall
  alternatives:
  - falls
  - will be cast down
  lexicon: HALOT
  rationale: 'The imperfect here naturally expresses a general future/result in proverbial style: the one under the LORD''s wrath will fall into that danger.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - into it
  - in that place
  lexicon: HALOT
  rationale: The adverb points back to the metaphorical pit. 'There' is concise and natural; English readers will understand the implied 'into it.'
