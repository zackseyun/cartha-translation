theological_decisions:
- issue: Meaning of זָרוֹת in Proverbs wisdom context
  chosen_reading: forbidden women
  alternative_readings:
  - strange women
  - foreign women
  - adulterous women
  rationale: In Proverbs, זָר/זָרָה often functions as a wisdom-category for the sexually illicit or covenantally prohibited woman rather than focusing on ethnicity alone. 'Forbidden women' preserves that broader moral sense without narrowing the referent to adultery only.
- issue: Force of זְעוּם יְהוָה
  chosen_reading: he who is under Yahweh’s wrath
  alternative_readings:
  - the one cursed by the LORD
  - the one detested by the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
