id: PRO.22.4
reference: Proverbs 22:4
source:
  edition: WLC
  text: עֵ֣קֶב עֲ֭נָוָה יִרְאַ֣ת יְהוָ֑ה עֹ֖שֶׁר וְ/כָב֣וֹד וְ/חַיִּֽים׃
translation:
  text: The reward of humility and the fear of Yahweh is wealth and honor and life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'The reward of humility is the fear of the LORD, wealth and honor and life.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֵקֶב
  chosen: reward of
  alternatives:
  - result of
  - consequence of
  - because of
  lexicon: HALOT
  rationale: עֵקֶב can denote consequence, result, or recompense/reward. In this proverb, followed by a nominal phrase and then a list of benefits, it most naturally introduces the outcome of humility and the fear of the LORD. 'Reward of' captures the proverbial sense idiomatically in English while preserving the causal/resultative force.
- source_word: עֲנָוָה
  chosen: humility
  alternatives:
  - meekness
  - lowliness
  lexicon: HALOT
  rationale: The noun denotes humility or lowliness. 'Humility' is the clearest modern English equivalent and fits wisdom-literature ethics without importing excessive passivity that 'meekness' may suggest.
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: This is a standard wisdom expression denoting reverent fear toward Israel's covenant God. 'The fear of the LORD' preserves the established biblical idiom and its theological weight better than the interpretive paraphrase 'reverence.' 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: The noun refers to material abundance or riches. 'Wealth' is natural modern English and suits the concise style of Proverbs.
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this wisdom context, the term refers to social esteem or honor rather than divine glory. 'Honor' best fits the human, proverbial setting.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - long life
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as the abstract noun 'life.' 'Life' is the most direct rendering. 'Long life' is possible by implication in Proverbs, but the adjective is not present and should not be imported into the main text.
