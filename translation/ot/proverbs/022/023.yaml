id: PRO.22.23
reference: Proverbs 22:23
source:
  edition: WLC
  text: כִּֽי יְ֭הוָה יָרִ֣יב רִיבָ֑/ם וְ/קָבַ֖ע אֶת קֹבְעֵי/הֶ֣ם נָֽפֶשׁ־־׃
translation:
  text: For Yahweh will plead their case and rob of life those who rob them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the LORD will contend for their cause and take the life of those who despoil them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding warning; 'for' fits English proverb style and preserves the causal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָרִיב
  chosen: will plead
  alternatives:
  - will contend
  - will take up
  lexicon: HALOT
  rationale: From ריב, in legal/dispute context. 'Will plead' naturally conveys advocacy in court-like language and pairs well with the cognate noun that follows.
- source_word: רִיבָם
  chosen: their case
  alternatives:
  - their dispute
  - their cause
  lexicon: HALOT
  rationale: 'The cognate noun רִיב often denotes a legal case or cause. ''Their case'' gives clear legal sense in idiomatic English: ''plead their case.'''
- source_word: וְקָבַע
  chosen: and rob of life
  alternatives:
  - and despoil of life
  - and seize the life of
  - and take the life of
  lexicon: HALOT
  rationale: The verb קבע means to rob, seize, or despoil. With נָפֶשׁ as the object/complement, the sense is retributive deprivation of life. 'Rob of life' preserves the lexical wordplay with the participle קֹבְעֵיהֶם while remaining intelligible.
- source_word: קֹבְעֵיהֶם
  chosen: those who rob them
  alternatives:
  - their robbers
  - those who despoil them
  lexicon: HALOT
  rationale: Participial form of the same root קבע. Rendering it with the same English root 'rob' preserves the Hebrew repetition and the poetic justice of the line.
- source_word: נָפֶשׁ
  chosen: life
  alternatives:
  - soul
  - life-breath
  - person
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to life itself rather than an immaterial 'soul.' 'Rob of life' communicates the idiom in context of divine retribution.
