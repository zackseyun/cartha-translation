id: PRO.22.2
reference: Proverbs 22:2
source:
  edition: WLC
  text: עָשִׁ֣יר וָ/רָ֣שׁ נִפְגָּ֑שׁוּ עֹשֵׂ֖ה כֻלָּ֣/ם יְהוָֽה׃
translation:
  text: The rich and the poor meet together; Yahweh is the maker of them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more interpretively, “The rich and the poor have this in common: the LORD is the maker of them all.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׁיר
  chosen: the rich
  alternatives:
  - a rich man
  - rich person
  lexicon: HALOT
  rationale: Adjectival substantive referring to a rich person/class. 'The rich' is natural English and preserves the representative/generic force of the Hebrew without over-specifying an individual.
- source_word: וָרָשׁ
  chosen: and the poor
  alternatives:
  - and a poor man
  - and the needy
  lexicon: HALOT
  rationale: Paired social opposite to עָשִׁיר. 'The poor' keeps the proverb's generic class contrast and matches the concise style of Hebrew wisdom literature.
- source_word: נִפְגָּשׁוּ
  chosen: meet together
  alternatives:
  - meet
  - have this in common
  - encounter one another
  lexicon: HALOT
  rationale: From פגשׁ in the Niphal, literally 'meet/encounter one another.' 'Meet together' preserves the reciprocal sense and the proverb's compact parallelism. Some interpreters take the sense more idiomatically as 'have this in common,' but that is an interpretive extension rather than the plain lexical sense, so it is preserved in a footnote rather than adopted in the main text.
- source_word: עֹשֵׂה
  chosen: the maker of
  alternatives:
  - made
  - creator of
  lexicon: HALOT
  rationale: 'Qal participle of עשה, functioning substantivally: ''the one who makes.'' ''The maker of'' is idiomatic in English and preserves the participial force better than a finite verb like ''made.'''
- source_word: כֻלָּם
  chosen: them all
  alternatives:
  - all of them
  - all
  lexicon: HALOT
  rationale: Refers back to both rich and poor collectively. 'Them all' is clear, natural English and preserves the inclusive scope.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
