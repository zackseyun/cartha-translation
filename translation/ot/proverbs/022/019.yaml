id: PRO.22.19
reference: Proverbs 22:19
source:
  edition: WLC
  text: לִ/הְי֣וֹת בַּ֭/יהוָה מִבְטַחֶ֑/ךָ הוֹדַעְתִּ֖י/ךָ הַ/יּ֣וֹם אַף אָֽתָּה־׃
translation:
  text: So that your trust may be in Yahweh, I have made known to you today, even to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have made known to you today, even you''; the object (''them,'' i.e., these sayings/instructions) is implied by the context and supplied in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  chosen: So that ... may be
  alternatives:
  - for ... to be
  - that ... might be
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose here, introducing the aim of the instruction. Rendering it as 'So that ... may be' captures the purposive force in natural English.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object in which trust is placed. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: מִבְטַחֶךָ
  chosen: your trust
  alternatives:
  - your confidence
  - your security
  lexicon: HALOT
  rationale: מִבְטָח denotes trust/confidence as that in which one relies. 'Your trust' fits the idiom with ביהוה and preserves the personal second masculine singular suffix.
- source_word: הוֹדַעְתִּיךָ
  chosen: I have made them known to you
  alternatives:
  - I have instructed you
  - I have made you know
  lexicon: HALOT
  rationale: The Hiphil of ידע means 'cause to know, make known.' In context, the implied object is the sayings/instruction of the surrounding passage, so English requires supplying 'them' for clarity. 'I have made them known to you' stays close to the causative sense without awkwardness.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: A straightforward temporal adverb. 'Today' is modern and natural while preserving the temporal emphasis.
- source_word: אַף
  chosen: even
  alternatives:
  - indeed
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף functions as an emphatic particle. 'Even' works well with the following pronoun to stress the addressee.
- source_word: אָתָּה
  chosen: to you
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''even you/you yourself.'' Because English idiom after ''made known'' normally repeats the indirect object, ''even to you'' preserves both the emphasis and the syntax.'
