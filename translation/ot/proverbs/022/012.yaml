id: PRO.22.12
reference: Proverbs 22:12
source:
  edition: WLC
  text: עֵינֵ֣י יְ֭הוָה נָ֣צְרוּ דָ֑עַת וַ֝/יְסַלֵּ֗ף דִּבְרֵ֥י בֹגֵֽד׃
translation:
  text: The eyes of Yahweh preserve knowledge, but he overturns the words of the treacherous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guard knowledge.' The Hebrew verb can mean 'guard,' 'keep,' or 'preserve.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he subverts' or 'he distorts.' The Hebrew verb may convey making something crooked or overturning it.
    reason: lexical_alternative
  - marker: c
    text: Or 'the faithless.' The Hebrew term refers to one who acts treacherously or unfaithfully.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי יְהוָה
  chosen: The eyes of the LORD
  alternatives:
  - The LORD's eyes
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic imagery of divine watchfulness. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: נָצְרוּ
  chosen: preserve
  alternatives:
  - guard
  - keep
  - watch over
  lexicon: HALOT
  rationale: The verb נצר commonly carries the sense of guarding or preserving. 'Preserve' fits the proverb's contrast with the following clause, where the LORD actively frustrates false speech; here he maintains or safeguards knowledge.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת is most naturally 'knowledge' in Proverbs and pairs well with the verb 'preserve.' This keeps the wisdom-literature emphasis on true knowledge rather than a more interpretive gloss.
- source_word: וַיְסַלֵּף
  chosen: he overturns
  alternatives:
  - he subverts
  - he distorts
  - he overthrows
  lexicon: HALOT
  rationale: The verb סלף can denote making crooked, subverting, or overturning. In this context, with 'the words of the treacherous' as object, the sense is that the LORD frustrates or overturns what the treacherous says or plans. 'Overturns' is idiomatic and preserves the force of active divine opposition.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the speech of
  lexicon: HALOT
  rationale: Although דבר can mean 'matter' as well as 'word,' 'words' is the most straightforward sense here and matches the immediate object of divine overturning.
- source_word: בֹגֵד
  chosen: the treacherous
  alternatives:
  - the faithless
  - the betrayer
  - the unfaithful man
  lexicon: HALOT
  rationale: בוגד denotes one who acts treacherously or faithlessly. 'The treacherous' is concise, natural English and avoids over-specifying whether the focus is covenantal, interpersonal, or general deceit.
