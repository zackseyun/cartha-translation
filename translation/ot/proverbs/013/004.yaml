id: PRO.13.4
reference: Proverbs 13:4
source:
  edition: WLC
  text: מִתְאַוָּ֣ה וָ֭/אַיִן נַפְשׁ֣/וֹ עָצֵ֑ל וְ/נֶ֖פֶשׁ חָרֻצִ֣ים תְּדֻשָּֽׁן׃
translation:
  text: The sluggard craves, but his appetite has nothing; but the appetite of the
    diligent will be richly satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'will be made fat,' a Hebrew image for abundance and full satisfaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתְאַוָּה
  chosen: craves
  alternatives:
  - desires
  - longs for
  lexicon: HALOT
  rationale: Hitpael participle of אוה expresses ongoing desire or craving. 'Craves'
    captures the active, habitual sense more vividly than the flatter 'desires.'
- source_word: וָאַיִן
  chosen: but ... has nothing
  alternatives:
  - and there is nothing
  - yet there is nothing
  lexicon: HALOT
  rationale: The conjunction plus existential negative yields the sense that the desire
    is unmet. In idiomatic English, attaching it to the following noun phrase as 'but
    his appetite has nothing' communicates the proverb's contrast clearly.
- source_word: נַפְשׁוֹ
  chosen: his appetite
  alternatives:
  - his soul
  - his life
  - his desire
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers not to the immaterial soul in a technical theological
    sense but to the person's inner appetite/desire. 'Appetite' best fits the wisdom
    context and parallel with the second colon.
- source_word: עָצֵל
  chosen: the sluggard
  alternatives:
  - the lazy man
  - the lazy one
  lexicon: HALOT
  rationale: A standard wisdom-term for a habitually lazy person. 'Sluggard' is traditional
    but still understandable and preserves the proverbial register better than the
    more generic 'lazy one.'
- source_word: וְנֶפֶשׁ
  chosen: but the appetite
  alternatives:
  - and the soul
  - and the desire
  lexicon: HALOT
  rationale: Repeated נֶפֶשׁ is rendered consistently with the first colon as 'appetite'
    to preserve the parallelism and the concrete sense of desire.
- source_word: חָרֻצִים
  chosen: the diligent
  alternatives:
  - the industrious
  - the hard-working
  lexicon: HALOT
  rationale: Plural adjective used substantivally for those characterized by diligence.
    'The diligent' is concise, idiomatic, and common in Proverbs.
- source_word: תְּדֻשָּׁן
  chosen: will be richly satisfied
  alternatives:
  - will be made fat
  - will be prospered
  - will be abundantly supplied
  lexicon: HALOT
  rationale: Pual of דשׁן literally evokes being made fat or luxuriant, a metaphor
    for abundance and satisfaction. 'Will be richly satisfied' conveys the metaphor's
    sense in natural modern English without flattening the result to mere material
    prosperity.
