theological_decisions:
- issue: Whether to soften the proverb's corporal-discipline imagery
  chosen_reading: Retain the concrete image 'rod' and the direct statement about discipline
    without paraphrastic mitigation.
  alternative_readings:
  - Replace 'rod' with a generalized 'correction' or 'guidance'
  rationale: The Hebrew text explicitly uses שֵׁבֶט ('rod') and frames parental love
    in terms of active discipline. The translation should preserve the text's imagery
    and rhetorical force rather than importing later ethical debates or muting the
    concrete metaphor. At the same time, rendering מוּסָר as 'discipline' avoids reducing
    the verse to physical punishment alone, since the Hebrew term is broader.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it; Gender-accurate
    over gender-neutral.'
