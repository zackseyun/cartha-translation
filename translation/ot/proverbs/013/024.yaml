id: PRO.13.24
reference: Proverbs 13:24
source:
  edition: WLC
  text: חוֹשֵׂ֣ךְ שִׁ֭בְט/וֹ שׂוֹנֵ֣א בְנ֑/וֹ וְ֝/אֹהֲב֗/וֹ שִֽׁחֲר֥/וֹ מוּסָֽר׃
translation:
  text: Whoever withholds his rod hates his son, but whoever loves him diligently
    seeks discipline for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spares his rod.' The Hebrew verb can mean 'withholds' or 'spares,' but
      'withholds' better reflects the sense in contemporary English.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seeks him early discipline'; the expression means to seek discipline
      for him earnestly or diligently.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹשֵׂךְ
  chosen: withholds
  alternatives:
  - spares
  - holds back
  lexicon: HALOT
  rationale: The participle from חשׂך carries the sense of refraining from using or
    holding back. 'Withholds' preserves the active refusal implied by the Hebrew better
    than the traditional 'spares,' which can sound compassionate in modern English
    and may soften the proverb's force.
- source_word: שִׁבְטוֹ
  chosen: his rod
  alternatives:
  - his staff
  - his switch
  lexicon: HALOT
  rationale: שֵׁבֶט commonly denotes a rod, staff, or scepter. In wisdom literature
    and family-discipline contexts, 'rod' is the most direct and established sense.
    It should not be paraphrased away, since the concrete image is part of the proverb.
- source_word: שׂוֹנֵא
  chosen: hates
  alternatives:
  - is hateful toward
  - rejects
  lexicon: HALOT
  rationale: The verb plainly means 'hate.' Although in some biblical contexts 'hate'
    can function comparatively, there is no need to weaken it here. The proverb uses
    stark antithesis for rhetorical force.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his child
  lexicon: HALOT
  rationale: The Hebrew is specifically 'his son,' not a gender-neutral term. Per
    the translation philosophy, gender-accurate rendering is preferred over neutralization,
    even where the proverb may have broader representative application.
- source_word: וְאֹהֲבוֹ
  chosen: but whoever loves him
  alternatives:
  - but the one loving him
  - but he who loves him
  lexicon: HALOT
  rationale: The participial construction is rendered idiomatically in English while
    preserving the direct object suffix 'him,' referring back to the son.
- source_word: שִׁחֲרוֹ
  chosen: diligently seeks
  alternatives:
  - seeks early
  - is earnest to seek
  lexicon: HALOT
  rationale: The piel of שׁחר literally relates to seeking early, but idiomatically
    conveys earnestness or diligence. 'Diligently seeks' communicates the sense in
    natural English without losing the intentionality of the Hebrew.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - training
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often includes corrective discipline and moral training.
    Here, in parallel with 'rod,' 'discipline' best captures the corrective aspect
    while remaining broader than mere punishment.
