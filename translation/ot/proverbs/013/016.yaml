id: PRO.13.16
reference: Proverbs 13:16
source:
  edition: WLC
  text: כָּל עָ֭רוּם יַעֲשֶׂ֣ה בְ/דָ֑עַת וּ֝/כְסִ֗יל יִפְרֹ֥שׂ אִוֶּֽלֶת־׃
translation:
  text: Every prudent man acts with knowledge, but a fool displays folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lays open folly' / 'spreads out folly.' The Hebrew verb suggests making
      something open or visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the proverb''s gnomic style: each member of
    the class is characterized this way.'
- source_word: עָרוּם
  chosen: prudent man
  alternatives:
  - shrewd man
  - sensible man
  - crafty man
  lexicon: HALOT
  rationale: In Proverbs this term is typically positive or neutral for practical
    wisdom and foresight, not negative 'crafty.' 'Prudent' best captures wise caution.
    'Man' preserves the grammatically masculine singular with representative force,
    in keeping with the gender-accurate policy.
- source_word: יַעֲשֶׂה
  chosen: acts
  alternatives:
  - does
  - works
  lexicon: HALOT
  rationale: A broad verb in Hebrew; 'acts' is idiomatic in English for habitual conduct
    in a wisdom saying and pairs naturally with the following prepositional phrase.
- source_word: בְדָעַת
  chosen: with knowledge
  alternatives:
  - in knowledge
  - knowingly
  - with understanding
  lexicon: HALOT
  rationale: 'The beth preposition here is best rendered instrumentally or adverbially:
    the prudent person acts on the basis of knowledge. ''With knowledge'' is both
    natural and close to the Hebrew.'
- source_word: וּכְסִיל
  chosen: but a fool
  alternatives:
  - and a fool
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' English proverb style commonly
    uses 'but' to bring out the clear contrast between the two cola.
- source_word: יִפְרֹשׂ
  chosen: displays
  alternatives:
  - spreads out
  - lays open
  - proclaims
  - exposes
  lexicon: HALOT
  rationale: The verb literally suggests spreading out or laying open. In context,
    the fool makes his folly evident or public. 'Displays' communicates that sense
    clearly in modern English without over-paraphrasing.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: Standard wisdom-term rendering; concise and idiomatic in English, matching
    the abstract noun in Hebrew.
