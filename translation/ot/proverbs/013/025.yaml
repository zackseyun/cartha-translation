id: PRO.13.25
reference: Proverbs 13:25
source:
  edition: WLC
  text: צַדִּ֗יק אֹ֭כֵל לְ/שֹׂ֣בַע נַפְשׁ֑/וֹ וּ/בֶ֖טֶן רְשָׁעִ֣ים תֶּחְסָֽר׃פ
translation:
  text: A righteous man eats to the satisfaction of his soul, but the belly of the
    wicked lacks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to satisfy his appetite.' The Hebrew word נֶפֶשׁ (nephesh) can mean
      'soul,' 'life,' 'self,' or 'appetite' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a righteous person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'A righteous man' preserves
    the masculine singular form in line with the gender-accurate policy while still
    conveying a representative proverb about the righteous person generally.
- source_word: אֹכֵל
  chosen: eats
  alternatives:
  - will eat
  - is eating
  lexicon: HALOT
  rationale: The participle expresses a gnomic or habitual action in proverbial style.
    Simple present English best captures the general truth.
- source_word: לְשֹׂבַע
  chosen: to the satisfaction of
  alternatives:
  - to fullness of
  - until satisfied
  - to satiety of
  lexicon: HALOT
  rationale: The preposition with the noun conveys eating to a point of sufficiency/full
    satisfaction. 'To the satisfaction of' is idiomatic and preserves the sense of
    adequacy rather than excess.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his appetite
  - himself
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or appetite. Here the context of
    eating could support 'appetite,' but 'his soul' preserves the Hebrew anthropological
    term and the proverb's broader sense of inward satisfaction. The lexical alternative
    is worth preserving in a footnote.
- source_word: וּבֶטֶן
  chosen: but the belly
  alternatives:
  - but the stomach
  - but the womb
  lexicon: HALOT
  rationale: In contrast with 'soul,' 'belly' is the natural literal rendering and
    works idiomatically in English as a metonym for bodily need or appetite. The conjunction
    is adversative in context, hence 'but.'
- source_word: רְשָׁעִים
  chosen: of the wicked
  alternatives:
  - of wicked people
  - of the guilty
  lexicon: HALOT
  rationale: The plural substantive denotes wicked persons as a class. 'The wicked'
    is concise and standard in wisdom literature.
- source_word: תֶּחְסָר
  chosen: lacks
  alternatives:
  - will be in want
  - is lacking
  - comes up short
  lexicon: HALOT
  rationale: 'The verb means to lack, be deficient, or be in need. With ''belly''
    as subject, ''lacks'' gives a crisp proverbial contrast: the righteous has enough,
    the wicked remains unsatisfied.'
