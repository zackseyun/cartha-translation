id: PRO.13.19
reference: Proverbs 13:19
source:
  edition: WLC
  text: תַּאֲוָ֣ה נִ֭הְיָה תֶּעֱרַ֣ב לְ/נָ֑פֶשׁ וְ/תוֹעֲבַ֥ת כְּ֝סִילִ֗ים ס֣וּר מֵ/רָֽע׃
translation:
  text: A desire fulfilled is sweet to the soul, but it is an abomination to fools
    to turn away from evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A desire that comes to pass is pleasant to the soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוָה
  chosen: desire
  alternatives:
  - longing
  - craving
  lexicon: HALOT
  rationale: The noun denotes a desire or longing. 'Desire' is broad and natural in
    English, fitting the proverb's general observation without over-intensifying it
    to 'craving'.
- source_word: נִהְיָה
  chosen: fulfilled
  alternatives:
  - come to pass
  - realized
  lexicon: HALOT
  rationale: As a Niphal participle of היה, it describes the desire as having come
    into being or been realized. 'Fulfilled' is idiomatic with 'desire' in English
    and captures the resultant state.
- source_word: תֶּעֱרַב
  chosen: is sweet
  alternatives:
  - is pleasant
  - is delightful
  lexicon: HALOT
  rationale: From ערב in the sense 'be pleasant/sweet.' 'Sweet' preserves the concrete
    metaphor common in wisdom literature while remaining idiomatic in English.
- source_word: לְנָפֶשׁ
  chosen: to the soul
  alternatives:
  - to oneself
  - to the life
  lexicon: HALOT
  rationale: נפש here refers to the inner self/person rather than merely physical
    life. 'To the soul' preserves the anthropological depth of the Hebrew and the
    proverb's affective force.
- source_word: וְתוֹעֲבַת
  chosen: but it is an abomination
  alternatives:
  - and an abomination
  - but an abomination
  lexicon: HALOT
  rationale: The conjunction links the contrasting cola; in English, 'but' best conveys
    the adversative sense. תועבה is strong language meaning something detestable or
    abhorrent; 'abomination' preserves that force.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the dull-minded
  - the stupid
  lexicon: HALOT
  rationale: In Proverbs כסילים are morally and intellectually obstinate persons.
    'Fools' is the standard wisdom-literature rendering and carries the ethical dimension
    better than merely cognitive alternatives.
- source_word: סוּר
  chosen: to turn away
  alternatives:
  - to depart
  - turning aside
  lexicon: HALOT
  rationale: The infinitive expresses the action that fools find abhorrent. 'To turn
    away' is idiomatic and preserves the moral-volitional sense of rejecting evil.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from what is bad
  - from harm
  lexicon: HALOT
  rationale: רע here is moral evil in the wisdom context, not merely misfortune. 'From
    evil' is concise and preserves the ethical contrast.
