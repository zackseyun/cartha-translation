theological_decisions:
- issue: Gendered substantival adjective in a proverb
  chosen_reading: a good man
  alternative_readings:
  - a good person
  rationale: The Hebrew uses a grammatically masculine singular form with representative
    proverbial force. Following the project's gender-accurate policy, the translation
    keeps the masculine form rather than neutralizing it, while understanding it as
    broadly representative rather than exclusively male.
