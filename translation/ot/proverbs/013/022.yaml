id: PRO.13.22
reference: Proverbs 13:22
source:
  edition: WLC
  text: ט֗וֹב יַנְחִ֥יל בְּנֵֽי בָנִ֑ים וְ/צָפ֥וּן לַ֝/צַּדִּ֗יק חֵ֣יל חוֹטֵֽא־׃
translation:
  text: A good man leaves an inheritance to his grandchildren, but the wealth of a
    sinner is stored up for the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'children's children.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is hidden away' / 'is reserved for the righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: a good man
  alternatives:
  - a good person
  - the good
  lexicon: HALOT
  rationale: The adjective functions substantivally here, referring to a good person.
    Because the Hebrew is grammatically masculine singular and proverbial in force,
    'a good man' best reflects the source while preserving the representative sense,
    in line with the gender-accurate policy.
- source_word: יַנְחִיל
  chosen: leaves an inheritance
  alternatives:
  - causes to inherit
  - bequeaths
  lexicon: HALOT
  rationale: The Hiphil of נחל commonly carries the sense 'cause to inherit' or 'give
    as an inheritance.' In idiomatic English within a proverb about family legacy,
    'leaves an inheritance' communicates the causative sense naturally without over-paraphrase.
- source_word: בְּנֵי בָנִים
  chosen: his grandchildren
  alternatives:
  - children's children
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of sons/children of children.'
    'Grandchildren' is the natural English equivalent and preserves the generational
    sense clearly.
- source_word: וְצָפוּן
  chosen: but ... is stored up
  alternatives:
  - and ... is hidden away
  - and ... is reserved
  lexicon: HALOT
  rationale: The passive participial/adjectival form from צפן conveys something laid
    up, hidden, or reserved. In the antithetical parallelism, 'but ... is stored up'
    expresses the contrast clearly and idiomatically.
- source_word: לַצַּדִּיק
  chosen: for the righteous
  alternatives:
  - for the righteous man
  lexicon: HALOT
  rationale: The phrase marks the beneficiary of the stored wealth. 'For the righteous'
    preserves the singular class sense of the Hebrew adjective used substantivally
    and fits English proverbial style.
- source_word: חֵיל
  chosen: wealth
  alternatives:
  - resources
  - substance
  - estate
  lexicon: HALOT
  rationale: חֵיל can denote wealth, resources, or substance in wisdom literature.
    'Wealth' is the clearest modern rendering in this context of inheritance and stored
    assets.
- source_word: חוֹטֵא
  chosen: a sinner
  alternatives:
  - the sinner
  - one who sins
  lexicon: HALOT
  rationale: The participle is substantival, denoting a sinful person as a class representative.
    'A sinner' is concise and idiomatic in English.
