id: PRO.13.7
reference: Proverbs 13:7
source:
  edition: WLC
  text: יֵ֣שׁ מִ֭תְעַשֵּׁר וְ/אֵ֣ין כֹּ֑ל מִ֝תְרוֹשֵׁ֗שׁ וְ/ה֣וֹן רָֽב׃
translation:
  text: There is one who pretends to be rich, yet has nothing; another pretends to
    be poor, yet has great wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is one who makes himself rich, yet has nothing; another makes
      himself poor, yet has great wealth.' The Hebrew reflexive verbs can describe
      either self-presentation or actual self-enrichment/self-impoverishment; the
      main text favors the appearance sense because of the proverb's sharp irony.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - One may be
  - There is one who
  lexicon: HALOT
  rationale: Existential particle introducing a general observation. 'There is' preserves
    the proverb's gnomic style in natural English.
- source_word: מִתְעַשֵּׁר
  chosen: pretends to be rich
  alternatives:
  - makes himself rich
  - shows himself rich
  - acts rich
  lexicon: HALOT
  rationale: 'Hitpael of עשר can denote presenting oneself as rich or making oneself
    rich. In this antithetical proverb, the contrast with ''has nothing'' favors the
    reflexive/display sense: someone gives the appearance of wealth without possessing
    it.'
- source_word: וְאֵין כֹּל
  chosen: yet has nothing
  alternatives:
  - but there is nothing at all
  - and has nothing
  lexicon: HALOT
  rationale: אֵין with כֹּל intensifies total lack. 'Yet has nothing' captures the
    adversative force in English and the absolute emptiness implied by the Hebrew.
- source_word: מִתְרוֹשֵׁשׁ
  chosen: pretends to be poor
  alternatives:
  - makes himself poor
  - shows himself poor
  - acts poor
  lexicon: HALOT
  rationale: Reflexive form from רושׁ/רשׁשׁ conveys presenting oneself as poor or
    reducing oneself to poverty. In parallel with מִתְעַשֵּׁר, the sense of appearing/portraying
    oneself as poor best fits the proverb's balanced contrast.
- source_word: וְהוֹן רָב
  chosen: yet has great wealth
  alternatives:
  - but has abundant riches
  - and great wealth belongs to him
  lexicon: HALOT
  rationale: הוֹן denotes wealth/riches; רָב means much, abundant, great. 'Great wealth'
    is concise, natural, and preserves the substantive force of the phrase.
