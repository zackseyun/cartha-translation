id: PRO.13.6
reference: Proverbs 13:6
source:
  edition: WLC
  text: צְ֭דָקָה תִּצֹּ֣ר תָּם דָּ֑רֶךְ וְ֝/רִשְׁעָ֗ה תְּסַלֵּ֥ף חַטָּֽאת־׃
translation:
  text: Righteousness guards the blameless in his way, but wickedness overturns sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'wickedness overthrows the sinner.' The Hebrew חַטָּאת can be understood
      here as referring to a sinful person rather than sin in the abstract.
    reason: alternative_reading
lexical_decisions:
- source_word: צְדָקָה
  chosen: Righteousness
  alternatives:
  - Justice
  lexicon: HALOT
  rationale: The noun denotes righteousness/uprightness here as a moral quality that
    protects. 'Righteousness' best matches wisdom-literature usage and aligns with
    the project's default for cognate theological terms, while 'justice' is possible
    but less fitting in this individual ethical proverb.
- source_word: תִּצֹּר
  chosen: guards
  alternatives:
  - keeps
  - watches over
  - preserves
  lexicon: HALOT
  rationale: From נצר, 'to guard/keep/watch over.' 'Guards' is concise, natural English
    and preserves the protective sense of the verb.
- source_word: תָּם
  chosen: the blameless
  alternatives:
  - the upright
  - the innocent
  - the person of integrity
  lexicon: HALOT
  rationale: תם in Proverbs commonly describes one who is whole, blameless, or of
    integrity. 'The blameless' is idiomatic and captures the ethical sense without
    overstating sinlessness.
- source_word: דָּרֶךְ
  chosen: in his way
  alternatives:
  - on his path
  - in the way
  lexicon: HALOT
  rationale: The Hebrew sequence תם דרך is syntactically compressed. It can be understood
    as 'one blameless in way' or 'the blameless in his way/path.' Rendering 'in his
    way' preserves the ethical-path metaphor and the likely adverbial sense tied to
    conduct.
- source_word: וְרִשְׁעָה
  chosen: but wickedness
  alternatives:
  - and wickedness
  - but evil
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively because the proverb contrasts
    the effects of righteousness and wickedness. 'Wickedness' is the most direct lexical
    equivalent.
- source_word: תְּסַלֵּף
  chosen: overturns
  alternatives:
  - subverts
  - twists
  - ruins
  lexicon: HALOT
  rationale: The piel of סלף carries the idea of twisting, perverting, or overthrowing.
    'Overturns' communicates destructive reversal in clear modern English; 'subverts'
    and 'twists' are viable alternatives.
- source_word: חַטָּאת
  chosen: sin
  alternatives:
  - the sinner
  - sinfulness
  lexicon: HALOT
  rationale: The noun can denote 'sin' or, in some contexts, 'sinner.' Here the parallelism
    is difficult, but 'sin' is retained in the main text as the more direct lexical
    rendering of the feminine singular noun, while the alternative 'the sinner' is
    preserved in a footnote because many understand the line to mean wickedness ruins
    the sinner.
