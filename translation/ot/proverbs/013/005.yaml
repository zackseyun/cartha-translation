id: PRO.13.5
reference: Proverbs 13:5
source:
  edition: WLC
  text: דְּבַר שֶׁ֭קֶר יִשְׂנָ֣א צַדִּ֑יק וְ֝/רָשָׁ֗ע יַבְאִ֥ישׁ וְ/יַחְפִּֽיר־׃
translation:
  text: A righteous man hates a lying word, but a wicked man stinks and brings shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A righteous man hates falsehood.' The Hebrew is literally 'a word of
      falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'becomes odious and is put to shame.' The final two verbs may be understood
      as describing the wicked man as shameful or as coming to shame.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר שֶׁקֶר
  chosen: a lying word
  alternatives:
  - falsehood
  - a false matter
  - a false word
  lexicon: HALOT
  rationale: Construct phrase literally means 'word of falsehood/lie.' 'A lying word'
    preserves the concrete singular 'word' better than the more abstract 'falsehood,'
    while still sounding natural in English.
- source_word: יִשְׂנָא
  chosen: hates
  alternatives:
  - detests
  lexicon: HALOT
  rationale: Standard rendering of the Qal of שׂנא. 'Hates' is direct and idiomatic,
    matching the moral aversion expressed in wisdom literature.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a righteous person
  lexicon: HALOT
  rationale: The adjective is masculine singular used substantivally. Per translation
    philosophy, gender-accurate rendering is preferred where the source is grammatically
    masculine and representative. 'A righteous man' preserves the singular proverbial
    type.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: Masculine singular substantive parallel to צַדִּיק. 'A wicked man' keeps
    the antithetical proverb balanced and preserves the singular representative figure.
- source_word: יַבְאִישׁ
  chosen: stinks
  alternatives:
  - gives off a bad odor
  - acts disgustingly
  - causes a stench
  lexicon: HALOT
  rationale: Hiphil of באש fundamentally relates to causing or becoming foul/odious.
    'Stinks' is vivid, concise, and preserves the metaphorical force of moral offensiveness
    without overinterpreting it.
- source_word: וְיַחְפִּיר
  chosen: and brings shame
  alternatives:
  - and is put to shame
  - and acts shamefully
  - and causes disgrace
  lexicon: HALOT
  rationale: 'The verb can denote being ashamed or causing shame/disgrace depending
    on nuance. In this parallel line, an active sense fits well in English: the wicked
    person becomes odious and brings shame. The ambiguity is preserved in a footnote.'
