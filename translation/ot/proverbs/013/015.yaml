id: PRO.13.15
reference: Proverbs 13:15
source:
  edition: WLC
  text: שֵֽׂכֶל ט֭וֹב יִתֶּן חֵ֑ן וְ/דֶ֖רֶךְ בֹּגְדִ֣ים אֵיתָֽן־־׃
translation:
  text: Good sense gives favor, but the way of the treacherous is hard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Good understanding wins favor.' The Hebrew verb is literally 'gives,'
      but can express resulting in or obtaining favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'the way of the treacherous is rugged.' The final Hebrew word can suggest
      something harsh, rough, or unyielding.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂכֶל
  chosen: sense
  alternatives:
  - understanding
  - insight
  - prudence
  lexicon: HALOT
  rationale: The noun denotes understanding or sound judgment. In English, 'good sense'
    is natural and preserves the proverb's practical wisdom emphasis better than the
    more abstract 'understanding.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - sound
  - fine
  lexicon: HALOT
  rationale: Used attributively with שֵׂכֶל, it qualifies the kind of discernment
    in view. 'Good' is the most direct and idiomatic rendering in this collocation.
- source_word: יִתֶּן
  chosen: gives
  alternatives:
  - produces
  - wins
  lexicon: HALOT
  rationale: The verb is literally 'gives.' In proverbial style, this can imply resulting
    in or obtaining, but 'gives' preserves the Hebrew image while remaining clear
    in English.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: Here the sense is social approval or gracious regard rather than specifically
    theological grace. 'Favor' best fits the wisdom context and common English usage.
- source_word: דֶרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: A standard wisdom term for manner of life or conduct. 'Way' is both literal
    enough and idiomatic in Proverbs.
- source_word: בֹּגְדִים
  chosen: the treacherous
  alternatives:
  - traitors
  - the faithless
  - the unfaithful
  lexicon: HALOT
  rationale: The participle refers to those who act deceitfully or treacherously.
    'The treacherous' captures the character type in a concise, proverbial way.
- source_word: אֵיתָן
  chosen: hard
  alternatives:
  - rugged
  - enduring
  - impassable
  lexicon: HALOT
  rationale: In this context the adjective describes the way of the treacherous as
    harsh, rough, or difficult. Although the term can elsewhere mean enduring or perennial,
    the proverb's antithesis favors a negative sense such as 'hard' or 'rugged.' 'Hard'
    is concise and idiomatic.
