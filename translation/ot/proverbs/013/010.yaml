id: PRO.13.10
reference: Proverbs 13:10
source:
  edition: WLC
  text: רַק בְּ֭/זָדוֹן יִתֵּ֣ן מַצָּ֑ה וְ/אֶת נ֖וֹעָצִ֣ים חָכְמָֽה־־׃
translation:
  text: Only by arrogance comes strife, but wisdom is with those who receive counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only through insolence comes contention, but wisdom is with the well-advised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Surely
  - Merely
  lexicon: HALOT
  rationale: 'רַק restricts or limits the statement: the proverb presents arrogance
    as the sole source in view for the resulting strife. ''Only'' preserves the emphatic
    restrictive force better than a weaker adverb.'
- source_word: בְּזָדוֹן
  chosen: by arrogance
  alternatives:
  - through insolence
  - in pride
  - by presumption
  lexicon: HALOT
  rationale: זָדוֹן denotes presumptuous pride, arrogance, or insolence. 'Arrogance'
    is natural modern English and captures the haughty self-assertion that generates
    conflict. The prefixed ב is rendered instrumentally/circumstantially as 'by'.
- source_word: יִתֵּן
  chosen: comes
  alternatives:
  - gives
  - produces
  - brings
  lexicon: HALOT
  rationale: Literally the verb is 'gives,' but in English 'arrogance gives strife'
    is awkward. 'Comes' idiomatically conveys the proverb's sense that strife arises
    from arrogance, an optimal-equivalence rendering of the Hebrew verbal idea.
- source_word: מַצָּה
  chosen: strife
  alternatives:
  - contention
  - quarrel
  - discord
  lexicon: HALOT
  rationale: מַצָּה refers to contention or conflict. 'Strife' is concise, proverbial,
    and broad enough to cover interpersonal contention without sounding overly technical.
- source_word: וְאֶת
  chosen: but
  alternatives:
  - and with
  - while with
  lexicon: HALOT
  rationale: 'The conjunction plus אֵת introduces the contrasting second colon: literally
    ''and with the advised/counseled [is] wisdom.'' In English the adversative sense
    is best brought out with ''but''.'
- source_word: נֹועָצִים
  chosen: those who receive counsel
  alternatives:
  - the well-advised
  - those who consult together
  - those who are counseled
  lexicon: HALOT
  rationale: The Niphal participle from יעץ most naturally means those who are advised
    or who accept counsel. 'Those who receive counsel' makes the passive/reflexive
    nuance clear and fits the wisdom context better than the less transparent 'the
    well-advised.'
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - prudence
  lexicon: HALOT
  rationale: חָכְמָה is the standard wisdom term in Proverbs. 'Wisdom' should be retained
    for consistency and because the context is sapiential rather than merely practical
    skill.
