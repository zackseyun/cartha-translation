id: PRO.13.3
reference: Proverbs 13:3
source:
  edition: WLC
  text: נֹצֵ֣ר פִּ֭י/ו שֹׁמֵ֣ר נַפְשׁ֑/וֹ פֹּשֵׂ֥ק שְׂ֝פָתָ֗י/ו מְחִתָּה לֽ/וֹ־׃
translation:
  text: Whoever guards his mouth preserves his life; whoever opens wide his lips comes
    to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brings destruction on himself' / 'is ruin to him.' The Hebrew phrase
      is compact and allows several close English renderings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his life' (nephesh); elsewhere the term can also mean 'soul' or
      'self,' but here it most naturally refers to one's life.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹצֵר
  chosen: guards
  alternatives:
  - keeps
  - watches over
  lexicon: HALOT
  rationale: The participle denotes guarding or keeping watch over. 'Guards' is natural
    English and fits the proverb's moral sense of careful restraint in speech.
- source_word: פִּיו
  chosen: his mouth
  lexicon: HALOT
  rationale: Literal rendering of the singular noun with 3ms suffix. 'Mouth' is the
    natural English equivalent and preserves the concrete imagery.
- source_word: שֹׁמֵר
  chosen: preserves
  alternatives:
  - keeps
  - guards
  lexicon: HALOT
  rationale: 'Although the verb often means ''keeps/guards,'' in this collocation
    with ''his life'' the sense is resultative: guarding one''s mouth results in preserving
    one''s life. Rendering it ''preserves'' communicates the proverb''s consequence
    clearly in idiomatic English.'
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In Proverbs, נֶפֶשׁ often refers to life or the person rather than the
    immaterial soul in a narrow theological sense. 'His life' best fits the wisdom
    context and avoids importing later dualistic assumptions.
- source_word: פֹּשֵׂק
  chosen: opens wide
  alternatives:
  - opens
  - lets loose
  - speaks rashly
  lexicon: HALOT
  rationale: The verb literally conveys opening wide or spreading apart. 'Opens wide'
    preserves the concrete metaphor of unrestrained speech better than the more interpretive
    'speaks rashly.'
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew parallelism between 'mouth' and
    'lips.'
- source_word: מְחִתָּה לוֹ
  chosen: comes to ruin
  alternatives:
  - brings destruction to him
  - is ruin to him
  lexicon: HALOT
  rationale: The noun means ruin, terror, or destruction. The phrase is elliptical
    in Hebrew; 'comes to ruin' renders the proverbial consequence smoothly in English
    while preserving the sense of self-incurred disaster.
