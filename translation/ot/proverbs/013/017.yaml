id: PRO.13.17
reference: Proverbs 13:17
source:
  edition: WLC
  text: מַלְאָ֣ךְ רָ֭שָׁע יִפֹּ֣ל בְּ/רָ֑ע וְ/צִ֖יר אֱמוּנִ֣ים מַרְפֵּֽא׃
translation:
  text: A wicked messenger falls into trouble, but a faithful envoy brings healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wicked messenger falls into evil/harm.' The Hebrew phrase may be rendered
      more literally, but here likely refers to the harmful trouble that befalls him.
    reason: lexical_alternative
  - marker: b
    text: Or 'messenger' or 'ambassador' for 'envoy.' The Hebrew uses two different
      words for messenger in this proverb.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָךְ
  chosen: messenger
  alternatives:
  - envoy
  - angel
  lexicon: HALOT
  rationale: In Proverbs this noun commonly refers to a human messenger in wisdom/social
    contexts rather than a heavenly being. 'Messenger' is the broadest natural English
    equivalent here.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - evil
  - guilty
  lexicon: HALOT
  rationale: As an attributive adjective modifying 'messenger,' it describes moral
    character rather than merely harmful effect. 'Wicked' preserves the ethical force.
- source_word: יִפֹּל
  chosen: falls
  alternatives:
  - will fall
  - comes to ruin
  lexicon: HALOT
  rationale: The yiqtol in a proverb expresses a general truth. English present tense
    fits proverbial style better than a predictive future while retaining the image
    of collapse or downfall.
- source_word: בְּרָע
  chosen: into trouble
  alternatives:
  - into evil
  - into harm
  - in calamity
  lexicon: HALOT
  rationale: The phrase is idiomatic. Here רָע likely denotes harmful consequence
    or distress rather than moral evil committed by the messenger. 'Into trouble'
    is clear modern English and suits the contrast with healing.
- source_word: צִיר
  chosen: envoy
  alternatives:
  - messenger
  - ambassador
  lexicon: HALOT
  rationale: This term often denotes an official or commissioned messenger. Using
    'envoy' differentiates it from מַלְאָךְ while preserving the parallelism of two
    kinds of messengers.
- source_word: אֱמוּנִים
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: The plural abstract/intensive form conveys reliability or faithfulness.
    'Faithful' is concise and idiomatic in English.
- source_word: מַרְפֵּא
  chosen: healing
  alternatives:
  - health
  - remedy
  lexicon: HALOT
  rationale: The noun can denote healing or restoration. 'Healing' best captures both
    literal and figurative benefit brought by a trustworthy envoy.
