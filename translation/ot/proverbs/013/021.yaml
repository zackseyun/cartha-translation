id: PRO.13.21
reference: Proverbs 13:21
source:
  edition: WLC
  text: חַ֭טָּאִים תְּרַדֵּ֣ף רָעָ֑ה וְ/אֶת צַ֝דִּיקִ֗ים יְשַׁלֶּם טֽוֹב־־׃
translation:
  text: Disaster pursues sinners, but good repays the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Calamity pursues sinners, but the righteous are repaid with good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: HALOT
  rationale: Plural adjective/substantive from חטא, referring to those characterized
    by sin. 'Sinners' is the natural concise English equivalent and preserves the
    moral category.
- source_word: תְּרַדֵּף
  chosen: pursues
  alternatives:
  - chases
  - persecutes
  - follows after
  lexicon: HALOT
  rationale: Piel imperfect 3fs of רדף, with רָעָה as the feminine singular subject.
    'Pursues' captures the active, ongoing sense of calamity relentlessly following
    sinners.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - harm
  - calamity
  lexicon: HALOT
  rationale: Although רָעָה can mean 'evil,' in wisdom literature and in this syntactic
    role as what befalls sinners, the sense is adverse outcome or calamity rather
    than moral evil. 'Disaster' communicates the consequence clearly in modern English.
- source_word: וְאֶת
  chosen: but
  alternatives:
  - and
  lexicon: Hebrew syntax
  rationale: The conjunction ו normally means 'and,' but here the verse sets up a
    contrast between the fate of sinners and the fate of the righteous. Rendering
    it as 'but' reflects the adversative sense required by the parallelism. The object
    marker אֶת marks 'the righteous' as the object.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural substantive adjective meaning those characterized by righteousness.
    'The righteous' is idiomatic and preserves the wisdom-literature category.
- source_word: יְשַׁלֶּם
  chosen: repays
  alternatives:
  - rewards
  - pays back
  - makes whole for
  lexicon: HALOT
  rationale: Piel imperfect of שלם. In this construction it conveys recompense or
    repayment. 'Repays' preserves the lexical link to recompense without overinterpreting
    as merely emotional blessing.
- source_word: טוֹב
  chosen: good
  alternatives:
  - prosperity
  - well-being
  - what is good
  lexicon: HALOT
  rationale: The noun/adjective here functions as the beneficial recompense given
    to the righteous. 'Good' is broad and faithful, allowing the proverb's generality
    to stand rather than narrowing it to material prosperity.
