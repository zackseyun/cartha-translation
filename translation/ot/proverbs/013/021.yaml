theological_decisions:
- issue: Nature of recompense in wisdom literature
  chosen_reading: 'The proverb states a general moral pattern: disaster pursues sinners,
    while good recompenses the righteous.'
  alternative_readings:
  - A strict immediate retribution in every individual case
  - An exclusively eschatological recompense
  rationale: The Hebrew proverb presents a wisdom principle without specifying timing
    or mechanism. The translation avoids importing a rigid doctrine of immediate prosperity
    or judgment while preserving the moral contrast stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
