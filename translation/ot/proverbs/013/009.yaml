id: PRO.13.9
reference: Proverbs 13:9
source:
  edition: WLC
  text: אוֹר צַדִּיקִ֥ים יִשְׂמָ֑ח וְ/נֵ֖ר רְשָׁעִ֣ים יִדְעָֽךְ־׃
translation:
  text: The light of the righteous rejoices, but the lamp of the wicked goes out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is glad.' The Hebrew verb normally means 'rejoices' or 'is glad'; some
      understand it here in a contextual sense like 'shines brightly' because the
      subject is 'light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  - light
  lexicon: HALOT
  rationale: אוֹר commonly denotes light or brightness. 'Light' is the most natural
    and established English equivalent here and fits the proverb's contrast with 'lamp'
    in the second colon.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' preserves the moral
    category succinctly and matches wisdom-literature style better than the more expansive
    'righteous people.'
- source_word: יִשְׂמָח
  chosen: rejoices
  alternatives:
  - is glad
  - shines brightly
  lexicon: HALOT
  rationale: From שׂמח, whose normal sense is 'rejoice, be glad.' Some interpreters
    take it metaphorically of shining brightly because the subject is 'light,' but
    the verb itself does not mean 'shine.' 'Rejoices' preserves the Hebrew wording
    and the proverb's personification.
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  - candle
  lexicon: HALOT
  rationale: 'נֵר refers to a lamp, typically an oil lamp, not specifically a candle.
    ''Lamp'' also sharpens the poetic contrast: the righteous have ''light,'' while
    the wicked have only a ''lamp'' that can be extinguished.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The wicked' is the standard concise
    rendering in wisdom contexts and pairs well with 'the righteous.'
- source_word: יִדְעָךְ
  chosen: goes out
  alternatives:
  - is extinguished
  - is snuffed out
  - grows dim
  lexicon: HALOT
  rationale: The verb means to be extinguished or go out, especially of a lamp. 'Goes
    out' is idiomatic modern English and preserves the image without over-specifying
    agency.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Though formally 'and,' the conjunction here links antithetical cola in
    Hebrew poetry. 'But' communicates the adversative force naturally in English.
