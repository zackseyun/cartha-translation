id: PRO.13.1
reference: Proverbs 13:1
source:
  edition: WLC
  text: בֵּ֣ן חָ֭כָם מ֣וּסַר אָ֑ב וְ֝/לֵ֗ץ לֹא שָׁמַ֥ע גְּעָרָֽה־׃
translation:
  text: A wise son accepts a father's discipline, but a scoffer does not listen to
    rebuke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wise son hears a father's discipline'; the Hebrew verb 'hear' can
      carry the sense of listening with acceptance or obedience, and the first clause
      likely implies that sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'mocker' for 'scoffer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and in proverb style commonly presents
    a representative case. Per the project's gender-accurate policy, 'son' is retained
    rather than neutralizing to 'child.'
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: In wisdom literature the adjective denotes practical wisdom and moral
    discernment; 'wise' is the standard and most natural rendering here.
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: מוּסַר in Proverbs often carries the sense of formative correction or
    training, not mere information. 'Discipline' best captures the father's corrective
    instruction in this contrast with rebuke.
- source_word: אָב
  chosen: a father's
  alternatives:
  - his father's
  - of a father
  lexicon: HALOT
  rationale: The construct phrase מוּסַר אָב is rendered idiomatically as 'a father's
    discipline.' Hebrew lacks an explicit possessive suffix, so 'his father's' would
    over-specify.
- source_word: לֵץ
  chosen: scoffer
  alternatives:
  - mocker
  lexicon: HALOT
  rationale: In Proverbs לֵץ is a settled wisdom-category for one who arrogantly mocks
    correction. 'Scoffer' preserves that moral posture slightly better than the more
    generic 'mocker.'
- source_word: שָׁמַע
  chosen: accepts / does not listen to
  alternatives:
  - hears
  - obeys
  lexicon: HALOT
  rationale: The verb can mean hear, listen, or heed/obey depending on context. In
    the first colon, English requires an implied verb; 'accepts' expresses the sense
    of heeding the father's discipline. In the second colon, where the verb is explicit
    with גְּעָרָה, 'does not listen to' is idiomatic and preserves the refusal to
    heed rebuke.
- source_word: גְּעָרָה
  chosen: rebuke
  alternatives:
  - reproof
  lexicon: HALOT
  rationale: The noun denotes a verbal reprimand. 'Rebuke' is clear modern English
    and fits the contrast with discipline.
