id: PRO.13.8
reference: Proverbs 13:8
source:
  edition: WLC
  text: כֹּ֣פֶר נֶֽפֶשׁ אִ֣ישׁ עָשְׁר֑/וֹ וְ֝/רָ֗שׁ לֹא שָׁמַ֥ע גְּעָרָֽה־־׃
translation:
  text: A man's wealth is the ransom of his life, but a poor man does not hear a rebuke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor man does not hear a threat/reproof.' The line likely means
      that the poor man is not targeted for extortion or ransom because he has nothing
      to pay.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּפֶר
  chosen: ransom
  alternatives:
  - price of redemption
  - compensation
  - bribe
  lexicon: HALOT
  rationale: כֹּפֶר commonly denotes a ransom price or compensation paid to avert
    loss or penalty. 'Ransom' best preserves the concrete economic/legal sense here
    without over-paraphrasing. 'Bribe' is possible in some contexts, but here the
    proverb more naturally speaks of wealth serving as the means by which a life may
    be redeemed or protected.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: In wisdom literature נֶפֶשׁ often refers to the person's life or life-breath
    rather than the immaterial soul in a later theological sense. 'Life' fits the
    proverb's practical setting of danger and ransom.
- source_word: אִישׁ
  chosen: man's
  alternatives:
  - a person's
  - his
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative. Per
    translation philosophy, a gender-accurate rendering is preferred. 'A man's' preserves
    the form and proverbial style.
- source_word: עָשְׁרוֹ
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: HALOT
  rationale: The noun denotes riches or wealth. 'Wealth' is idiomatic modern English
    and suits the proverb's contrast with the poor man.
- source_word: רָשׁ
  chosen: poor man
  alternatives:
  - poor person
  - the poor
  lexicon: HALOT
  rationale: The adjective/substantive means poor or needy. Because the Hebrew is
    masculine singular and set in antithetical parallelism with אִישׁ, 'poor man'
    preserves both the grammar and the proverb's symmetry.
- source_word: לֹא שָׁמַע
  chosen: does not hear
  alternatives:
  - does not listen to
  - never hears
  lexicon: HALOT
  rationale: שׁמע literally means 'hear,' though it can imply heed or listen. Here
    the point is that the poor man is not subjected to a threatening rebuke demanding
    payment; 'does not hear' keeps the Hebrew image and allows the reader to infer
    the social implication.
- source_word: גְּעָרָה
  chosen: a rebuke
  alternatives:
  - threat
  - reproof
  lexicon: HALOT
  rationale: The noun denotes rebuke or reproof, sometimes in a forceful or threatening
    sense. 'Rebuke' is the most direct lexical equivalent; the social nuance of a
    threatening demand can be preserved in a footnote rather than imported into the
    main text.
