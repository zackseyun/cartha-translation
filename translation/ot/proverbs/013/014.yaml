id: PRO.13.14
reference: Proverbs 13:14
source:
  edition: WLC
  text: תּוֹרַ֣ת חָ֭כָם מְק֣וֹר חַיִּ֑ים לָ֝/ס֗וּר מִ/מֹּ֥קְשֵׁי מָֽוֶת׃
translation:
  text: The instruction of a wise man is a fountain of life, turning one away from
    the snares of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The teaching of a wise man is a spring of life, to turn away from the
      snares of death.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wise man'; the masculine singular is used representatively in Proverbs.
    reason: cultural_note
lexical_decisions:
- source_word: תּוֹרַת
  chosen: instruction of
  alternatives:
  - law of
  - teaching of
  lexicon: HALOT
  rationale: תּוֹרָה here refers broadly to instruction or teaching rather than specifically
    legal code. In wisdom literature, 'instruction' best captures the pedagogical
    sense in accessible modern English.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise
  - a wise person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in Proverbs commonly
    denotes the representative wise man. Per gender-accurate policy, 'a wise man'
    preserves the source form better than a gender-neutral rendering.
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: '''Fountain'' is a natural English rendering for a life-giving water
    source in poetic context and pairs idiomatically with ''of life.'' ''Spring''
    and ''source'' are possible but less traditional/poetic here.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as the abstract singular 'life' in English.
- source_word: לָסוּר
  chosen: turning one away
  alternatives:
  - to turn away
  - for turning away
  - to depart
  lexicon: HALOT
  rationale: 'The infinitive expresses result or purpose: the wise man''s instruction
    functions so as to turn a person away from danger. ''Turning one away'' makes
    the connection to the preceding clause smooth in English without over-paraphrasing.'
- source_word: מִמֹּקְשֵׁי
  chosen: from the snares of
  alternatives:
  - from the traps of
  - from the nooses of
  lexicon: HALOT
  rationale: מוֹקֵשׁ denotes a snare or trap. 'Snares' fits wisdom-style metaphor
    and collocates well with 'death.'
- source_word: מָוֶת
  chosen: death
  alternatives:
  - deadly death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun; the genitive construction is best
    expressed as 'the snares of death.'
