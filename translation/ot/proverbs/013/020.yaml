id: PRO.13.20
reference: Proverbs 13:20
source:
  edition: WLC
  text: הלוך אֶת חֲכָמִ֣ים ו/חכם וְ/רֹעֶ֖ה כְסִילִ֣ים יֵרֽוֹעַ־׃
translation:
  text: Whoever walks with the wise will become wise, but a companion of fools will
    suffer harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will be harmed,' 'will fare badly,' or 'will come to ruin.' The Hebrew
      verb can denote experiencing injury or an adverse outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ
  chosen: walks
  alternatives:
  - goes
  - walks along
  lexicon: HALOT
  rationale: The infinitive absolute functions proverbially as a substantive-like
    expression ('one who walks'). 'Walks' preserves the Hebrew metaphor of conduct/association
    better than a more generic 'goes'.
- source_word: אֶת
  chosen: with
  alternatives:
  - in company with
  lexicon: HALOT
  rationale: Here אֶת marks accompaniment rather than a direct object. 'With' is the
    natural English equivalent.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - wise people
  lexicon: HALOT
  rationale: The plural adjective/noun refers to wise persons generally. 'The wise'
    is concise and preserves the representative force without over-specifying gender.
- source_word: וְחָכָם
  chosen: will become wise
  alternatives:
  - and is wise
  - and will be wise
  lexicon: HALOT
  rationale: 'The verb from חכם in this construction is best taken as a resultative
    imperfect/jussive-like consequence: association with the wise leads to becoming
    wise. ''Will become wise'' expresses the progression implied by the Hebrew better
    than the stative ''will be wise''.'
- source_word: וְרֹעֶה
  chosen: but a companion of
  alternatives:
  - and one who associates with
  - and a shepherd of
  lexicon: HALOT
  rationale: Although the root commonly means 'shepherd' or 'pasture,' in wisdom usage
    it can denote keeping company or associating with others. 'Companion of' fits
    the parallel with 'walks with' and avoids an overly literal 'shepherd of fools,'
    which would mislead in English.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard wisdom-term rendering. 'Fools' is idiomatic and preserves the
    moral-intellectual category of Proverbs.
- source_word: יֵרוֹעַ
  chosen: will suffer harm
  alternatives:
  - will be harmed
  - will come to ruin
  - will fare badly
  lexicon: HALOT
  rationale: The Niphal of רעע here conveys experiencing injury or adverse outcome.
    'Will suffer harm' is clear modern English and preserves the consequence without
    overstating it as total destruction.
