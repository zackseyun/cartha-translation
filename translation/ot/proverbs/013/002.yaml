id: PRO.13.2
reference: Proverbs 13:2
source:
  edition: WLC
  text: מִ/פְּרִ֣י פִי אִ֭ישׁ יֹ֣אכַל ט֑וֹב וְ/נֶ֖פֶשׁ בֹּגְדִ֣ים חָמָֽס־׃
translation:
  text: From the fruit of a man's mouth he eats good, but the appetite of the treacherous
    is for violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'soul' (nephesh); here likely meaning 'appetite' or 'desire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the soul of the treacherous [eats] violence.' The Hebrew second line
      is terse and elliptical.
    reason: alternative_reading
lexical_decisions:
- source_word: מִ/פְּרִי
  chosen: From the fruit of
  alternatives:
  - By the fruit of
  - From the produce of
  lexicon: HALOT
  rationale: 'פְּרִי literally means ''fruit'' and is commonly used metaphorically
    for the outcome or product of speech and conduct in wisdom literature. Retaining
    ''fruit'' preserves the Hebrew image. The prefixed מִן is rendered ''from'' to
    express source/result: what follows comes from one''s speech.'
- source_word: פִי
  chosen: mouth
  alternatives:
  - speech
  - words
  lexicon: HALOT
  rationale: Literally 'mouth.' Although it metonymically refers to speech, 'mouth'
    preserves the concrete Hebrew idiom 'fruit of the mouth,' which is intelligible
    in English and common in biblical style.
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - a person's
  - one's
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular and here functions generically
    in a proverb. Per the translation philosophy's gender-accurate principle, 'a man's'
    best matches the source form and representative force better than a gender-neutral
    recasting.
- source_word: יֹאכַל
  chosen: he eats
  alternatives:
  - he will eat
  - one eats
  - he enjoys
  lexicon: HALOT
  rationale: The imperfect can express habitual or gnomic action in proverbs. Present-tense
    English ('he eats') communicates the general truth naturally while preserving
    the eating metaphor that links with 'fruit.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  - good things
  - benefit
  lexicon: HALOT
  rationale: 'טוֹב is broad: good, goodness, benefit, prosperity. ''Good'' is concise
    and preserves the Hebrew''s open-ended quality; ''good things'' is possible but
    slightly more interpretive.'
- source_word: וְ/נֶפֶשׁ
  chosen: but the appetite
  alternatives:
  - but the soul
  - and the appetite
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul/self/life,' but in many contexts it denotes
    appetite or desire. Here, paired with an object-like predicate 'violence,' it
    most naturally refers to inward craving. The conjunction is rendered adversatively
    as 'but' because the second colon contrasts the righteous benefit of speech with
    the inner drive of the treacherous.
- source_word: בֹּגְדִים
  chosen: the treacherous
  alternatives:
  - traitors
  - the unfaithful
  - the faithless
  lexicon: HALOT
  rationale: From בגד, 'to act treacherously, deal deceitfully.' 'The treacherous'
    captures the participial, character-describing force in a wisdom context better
    than the more specific 'traitors.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - destruction
  - violent gain
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or violent wrongdoing. 'Violence'
    is the standard and most transparent rendering here, fitting the contrast with
    'good.' The clause is elliptical; supplying 'is for' in English expresses desire/appetite
    without overtranslating.
