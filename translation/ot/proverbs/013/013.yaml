theological_decisions:
- issue: Representative masculine language in a wisdom proverb
  chosen_reading: Retain masculine singular in the second colon ('he who fears') while
    using 'whoever' in the first for natural English parallelism.
  alternative_readings:
  - 'Use fully gender-neutral language throughout: ''whoever... whoever...'''
  - 'Use masculine singular throughout: ''he who... he who...'''
  rationale: Hebrew wisdom sayings often use masculine singular forms generically.
    The translation preserves that representative force without making the English
    wooden. The explicit pronoun הוּא supports a masculine singular rendering in the
    second colon, while 'whoever' in the first colon is a natural English equivalent
    for a generic participle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
