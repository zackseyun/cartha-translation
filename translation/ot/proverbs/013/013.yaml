id: PRO.13.13
reference: Proverbs 13:13
source:
  edition: WLC
  text: בָּ֣ז לְ֭/דָבָר יֵחָ֣בֶל ל֑/וֹ וִ/ירֵ֥א מִ֝צְוָ֗ה ה֣וּא יְשֻׁלָּֽם׃
translation:
  text: Whoever despises a word will be ruined by it, but he who fears the commandment
    will be repaid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a matter.' Hebrew דָבָר can mean 'word,' 'matter,' or 'thing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will suffer for it' or 'brings ruin on himself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be rewarded.' The Hebrew more literally means 'will be repaid/recompensed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּז
  chosen: despises
  alternatives:
  - scorns
  - treats with contempt
  lexicon: HALOT
  rationale: The participle denotes one who holds something in contempt. 'Despises'
    is natural modern English and preserves the moral force better than the slightly
    more idiomatic 'scorns.'
- source_word: לְדָבָר
  chosen: a word
  alternatives:
  - the word
  - a matter
  lexicon: HALOT
  rationale: דָבָר can mean 'word,' 'matter,' or 'thing.' In this proverb it likely
    refers broadly to an instruction or spoken counsel. 'A word' keeps the Hebrew's
    lexical form and proverbial openness, while avoiding over-specification.
- source_word: יֵחָבֶל לוֹ
  chosen: will be ruined by it
  alternatives:
  - will suffer for it
  - will be destroyed
  - brings ruin on himself
  lexicon: HALOT
  rationale: The Niphal of חבל here conveys coming to ruin or suffering damage. The
    dative/pronominal element is represented idiomatically as 'by it,' making clear
    that the despised word becomes the occasion of ruin. This balances formal correspondence
    with readable English.
- source_word: וִירֵא
  chosen: he who fears
  alternatives:
  - whoever reveres
  - he who stands in awe of
  lexicon: HALOT
  rationale: The adjective/participle from ירא expresses reverent fear. 'Fears' preserves
    the Hebrew term directly and maintains the wisdom-literature theme of fear/reverence
    without softening it to mere respect.
- source_word: מִצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - instruction
  lexicon: HALOT
  rationale: מִצְוָה most directly means 'commandment' or 'command.' 'The commandment'
    gives the line a more definite, proverbial contrast with 'a word' and preserves
    the covenantal-ethical weight often carried by the term.
- source_word: יְשֻׁלָּם
  chosen: will be repaid
  alternatives:
  - will be rewarded
  - will receive recompense
  lexicon: HALOT
  rationale: The Pual of שלם means to be repaid or recompensed. 'Will be repaid' is
    semantically broad enough to include positive recompense here without importing
    a narrower prosperity sense. 'Rewarded' is interpretive and therefore kept as
    an alternative.
- source_word: הוּא
  chosen: he
  alternatives:
  - that one
  - such a person
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis. Rendering it as 'he' preserves the
    masculine singular form in line with the project's gender-accurate policy, while
    still functioning generically in proverbial style.
