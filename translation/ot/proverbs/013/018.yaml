id: PRO.13.18
reference: Proverbs 13:18
source:
  edition: WLC
  text: רֵ֣ישׁ וְ֭/קָלוֹן פּוֹרֵ֣עַ מוּסָ֑ר וְ/שׁוֹמֵ֖ר תּוֹכַ֣חַת יְכֻבָּֽד׃
translation:
  text: Poverty and disgrace come to one who ignores discipline, but whoever heeds
    reproof will be honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Poverty and shame are for one who neglects discipline.' The Hebrew participle
      can be rendered more formally as 'neglects' or 'casts off.'
    reason: lexical_alternative
  - marker: b
    text: '''Heeds'' is literally ''keeps'' or ''guards,'' meaning to pay careful
      attention to correction and retain it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵישׁ
  chosen: Poverty
  alternatives:
  - Want
  - destitution
  - poverty
  lexicon: HALOT
  rationale: The noun denotes poverty or lack. 'Poverty' is clear modern English and
    fits the proverb's consequence statement better than the more archaic 'want.'
- source_word: קָלוֹן
  chosen: disgrace
  alternatives:
  - shame
  - dishonor
  - ignominy
  lexicon: HALOT
  rationale: The term refers to public shame or dishonor. 'Disgrace' captures both
    the social and moral dimension in readable English.
- source_word: פּוֹרֵעַ
  chosen: come to one who ignores
  alternatives:
  - befall one who neglects
  - belong to one who refuses
  - are for one who lets go of
  lexicon: HALOT
  rationale: The participle of פרע in this context conveys neglecting, casting off,
    or refusing restraint/discipline. Rendering it woodenly as 'one who neglects'
    is possible, but 'one who ignores' is more idiomatic in English while preserving
    the sense of rejecting instruction.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - training
  lexicon: HALOT
  rationale: In Proverbs, מוּסָר commonly carries the sense of corrective training
    or discipline, not mere information. 'Discipline' best preserves the wisdom-literature
    nuance.
- source_word: שׁוֹמֵר
  chosen: whoever heeds
  alternatives:
  - the one who keeps
  - the one who observes
  - whoever accepts
  lexicon: HALOT
  rationale: Literally 'keeps/guards,' but in this parallelism it means paying careful
    attention to and retaining correction. 'Heeds' is idiomatic and matches the contrast
    with ignoring discipline.
- source_word: תּוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  - warning
  lexicon: HALOT
  rationale: The noun denotes verbal correction or rebuke. 'Reproof' preserves the
    formal wisdom tone and pairs well with 'discipline' without collapsing the two
    terms into the same English gloss.
- source_word: יְכֻבָּד
  chosen: will be honored
  alternatives:
  - will be esteemed
  - will gain honor
  - will be made weighty/glorious
  lexicon: HALOT
  rationale: The Pual of כבד here expresses receiving honor. 'Will be honored' is
    the most natural passive rendering in English and preserves the social-result
    sense of the proverb.
