id: PRO.13.12
reference: Proverbs 13:12
source:
  edition: WLC
  text: תּוֹחֶ֣לֶת מְ֭מֻשָּׁכָה מַחֲלָה לֵ֑ב וְ/עֵ֥ץ חַ֝יִּ֗ים תַּאֲוָ֥ה בָאָֽה־׃
translation:
  text: Hope deferred makes the heart sick, but a desire fulfilled is a tree of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Hope drawn out is sickness of heart, and desire come
      is a tree of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹחֶלֶת
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun denotes hopeful expectation. 'Hope' is the most natural and
    idiomatic English rendering here and fits the proverb's contrast with fulfilled
    desire.
- source_word: מְמֻשָּׁכָה
  chosen: deferred
  alternatives:
  - drawn out
  - prolonged
  - delayed
  lexicon: HALOT
  rationale: From משׁך, literally 'drawn out' or 'prolonged.' 'Deferred' captures
    the sense of hope being extended beyond expectation in clear modern English and
    matches the proverb's experiential force.
- source_word: מַחֲלָה לֵב
  chosen: makes the heart sick
  alternatives:
  - is sickness of heart
  - is heart-sickness
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause, literally 'sickness of heart.' English
    idiom is improved by expressing the predicative force as 'makes the heart sick,'
    preserving the metaphor without awkwardness.
- source_word: וְעֵץ חַיִּים
  chosen: but a tree of life
  alternatives:
  - and a tree of life
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in proverbial parallelism
    the sense is adversative, contrasting the first colon with the second. 'Tree of
    life' is retained as a theologically and literarily significant biblical image.
- source_word: תַּאֲוָה
  chosen: a desire
  alternatives:
  - longing
  - craving
  lexicon: HALOT
  rationale: The noun can denote desire or longing. 'Desire' is broad and neutral
    enough for this wisdom context, avoiding the overly negative connotation that
    'craving' can carry in English.
- source_word: בָאָה
  chosen: fulfilled
  alternatives:
  - come
  - comes
  - that comes
  lexicon: HALOT
  rationale: Literally 'has come' or 'comes.' In context, the sense is that the desired
    thing has arrived. 'Fulfilled' makes the implied object explicit in idiomatic
    English while staying within the semantic range of arrival/realization.
