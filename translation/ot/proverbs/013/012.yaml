theological_decisions:
- issue: Rendering the conjunction ו before עֵץ חַיִּים
  chosen_reading: but
  alternative_readings:
  - and
  rationale: Although the conjunction is formally 'and,' Hebrew wisdom literature
    often uses simple coordination for contrast. Rendering it 'but' best communicates
    the antithetical parallelism in English without altering the proverb's meaning.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
