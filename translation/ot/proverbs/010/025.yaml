theological_decisions:
- issue: Representative masculine singular in wisdom literature
  chosen_reading: Render class terms generically as 'the wicked' and 'the righteous'
    rather than explicitly masculine singular forms.
  alternative_readings:
  - the wicked man ... the righteous man
  rationale: The Hebrew singular adjectives function proverbially to describe categories
    of persons, not to restrict the saying to males. This follows the translation
    philosophy's gender-accurate principle by matching the source's representative
    force without flattening the contrast.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
