id: PRO.10.25
reference: Proverbs 10:25
source:
  edition: WLC
  text: כַּ/עֲב֣וֹר ס֭וּפָה וְ/אֵ֣ין רָשָׁ֑ע וְ֝/צַדִּ֗יק יְס֣וֹד עוֹלָֽם׃
translation:
  text: When the storm passes, the wicked are no more, but the righteous are an everlasting
    foundation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the whirlwind passes' or 'As the storm passes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'and there is no wicked.' The sense is that the wicked
      disappear or perish.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּעֲבוֹר
  chosen: When ... passes
  alternatives:
  - As ... passes
  - At the passing of
  lexicon: HALOT
  rationale: 'The prefixed כ plus infinitive construct of עבר functions temporally/comparatively
    here. In English, a temporal clause is most natural: ''When the storm passes.''
    This preserves the proverb''s vivid, event-based contrast without awkward literalism.'
- source_word: סוּפָה
  chosen: storm
  alternatives:
  - whirlwind
  - tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm or tempest. 'Storm' is clear modern English
    and broad enough to include the destructive force implied. 'Whirlwind' is possible,
    but 'storm' better fits contemporary readability while retaining the image.
- source_word: וְאֵין
  chosen: are no more
  alternatives:
  - is not
  - is gone
  - there is no
  lexicon: HALOT
  rationale: The idiom 'and there is no wicked' expresses disappearance or destruction
    after the storm. 'Are no more' communicates resultant nonexistence in context
    more idiomatically than the wooden 'there is no wicked.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: Although grammatically singular masculine, the proverb states a general
    truth about a class of people. 'The wicked' is idiomatic English for this representative
    singular and avoids an unnecessarily individualized reading.
- source_word: וְצַדִּיק
  chosen: but the righteous
  alternatives:
  - and the righteous
  - but a righteous man
  lexicon: HALOT
  rationale: The conjunction marks contrast in the proverb's parallelism, so 'but'
    brings out the adversative sense. As with רָשָׁע, the singular adjective is representative;
    'the righteous' communicates the class clearly.
- source_word: יְסוֹד
  chosen: foundation
  alternatives:
  - foundation stone
  - firm foundation
  lexicon: HALOT
  rationale: יְסוֹד means foundation/base. 'Foundation' is the most direct rendering.
    Adding 'firm' would interpret rather than translate, since the durability is already
    conveyed by עוֹלָם.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - forever
  - perpetual
  - enduring
  lexicon: HALOT
  rationale: עוֹלָם here qualifies the righteous person's stability/durability. 'Everlasting
    foundation' is natural English and preserves the strong sense of enduring permanence.
    'Forever' would be less adjectivally smooth in this construction.
