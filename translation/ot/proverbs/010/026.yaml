id: PRO.10.26
reference: Proverbs 10:26
source:
  edition: WLC
  text: כַּ/חֹ֤מֶץ לַ/שִּׁנַּ֗יִם וְ/כֶ/עָשָׁ֥ן לָ/עֵינָ֑יִם כֵּ֥ן הֶ֝/עָצֵ֗ל לְ/שֹׁלְחָֽי/ו׀׃
translation:
  text: Like vinegar to the teeth and smoke to the eyes, so is the sluggard to those
    who send him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like sour wine to the teeth and smoke to the eyes, so is the sluggard
      to those who send him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹמֶץ
  chosen: vinegar
  alternatives:
  - sour wine
  lexicon: HALOT
  rationale: The noun denotes something sour, commonly vinegar. 'Vinegar' is the most
    natural English equivalent in this proverb's sensory comparison, conveying the
    sharp, unpleasant effect on the teeth.
- source_word: לַשִּׁנַּיִם
  chosen: to the teeth
  alternatives:
  - for the teeth
  lexicon: HALOT
  rationale: The preposition ל marks relation/effect. 'To the teeth' preserves the
    Hebrew simile structure and idiomatic force in English.
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; the image is irritation caused by
    smoke in the eyes.
- source_word: לָעֵינַיִם
  chosen: to the eyes
  alternatives:
  - for the eyes
  lexicon: HALOT
  rationale: As with 'to the teeth,' this preserves the Hebrew parallelism and expresses
    harmful effect.
- source_word: כֵּן
  chosen: so is
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: This comparative particle introduces the proverb's application. 'So is'
    makes the implied copula explicit in natural English.
- source_word: הֶעָצֵל
  chosen: the sluggard
  alternatives:
  - the lazy man
  - the lazy one
  lexicon: HALOT
  rationale: The adjective used substantivally refers to a habitually lazy person.
    'Sluggard' is a standard and precise rendering in Proverbs, preserving the character-type
    emphasized in wisdom literature better than the flatter 'lazy person.'
- source_word: לְשֹׁלְחָיו
  chosen: to those who send him
  alternatives:
  - to his senders
  - for those who send him
  lexicon: HALOT
  rationale: The participial form with 3ms suffix means 'to the ones sending him.'
    'Those who send him' is idiomatic modern English and preserves the plural subject
    with singular object suffix.
