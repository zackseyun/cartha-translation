id: PRO.10.17
reference: Proverbs 10:17
source:
  edition: WLC
  text: אֹ֣רַח לְ֭/חַיִּים שׁוֹמֵ֣ר מוּסָ֑ר וְ/עוֹזֵ֖ב תּוֹכַ֣חַת מַתְעֶֽה׃
translation:
  text: Whoever keeps discipline is on the path to life, but whoever forsakes reproof
    leads others astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is a path to life'; the Hebrew can be read more tersely, with 'path
      to life' functioning as a predicate expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: אֹרַח denotes a road, way, or course of life. In Proverbs it often carries
    a metaphorical sense of one's moral course. 'Path' is natural modern English and
    preserves the metaphor.
- source_word: לְחַיִּים
  chosen: to life
  alternatives:
  - of life
  - toward life
  lexicon: HALOT
  rationale: The preposition לְ most naturally indicates direction or result here.
    'To life' fits the Hebrew closely, but in idiomatic English 'on the path to life'
    expresses the sense clearly.
- source_word: שׁוֹמֵר
  chosen: keeps
  alternatives:
  - guards
  - observes
  - heeds
  lexicon: HALOT
  rationale: The participle means keeping, guarding, or observing. With מוּסָר, 'keeps'
    communicates ongoing adherence to discipline without sounding wooden.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - training
  lexicon: HALOT
  rationale: מוּסָר in Proverbs commonly refers to formative discipline or instruction,
    often with corrective force. 'Discipline' best captures both training and correction
    in concise English.
- source_word: וְעוֹזֵב
  chosen: but whoever forsakes
  alternatives:
  - and the one who abandons
  - but the one who neglects
  lexicon: HALOT
  rationale: The conjunction marks contrast in this proverb, so 'but' is appropriate
    in English. עזב means to leave, forsake, or abandon; 'forsakes' preserves the
    moral seriousness.
- source_word: תּוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: תּוֹכַחַת is verbal correction or rebuke. 'Reproof' is slightly more
    general than 'rebuke' and pairs well with the wisdom context.
- source_word: מַתְעֶה
  chosen: leads others astray
  alternatives:
  - goes astray
  - causes to wander
  - is misleading
  lexicon: HALOT
  rationale: 'The Hiphil participle of תעה is causative: causing wandering or leading
    astray, not merely wandering oneself. Rendering it transitively preserves the
    stem''s force. ''Others'' is supplied in English because the causative sense implies
    an object, even though Hebrew leaves it unstated.'
