id: PRO.10.20
reference: Proverbs 10:20
source:
  edition: WLC
  text: כֶּ֣סֶף נִ֭בְחָר לְשׁ֣וֹן צַדִּ֑יק לֵ֖ב רְשָׁעִ֣ים כִּ/מְעָֽט׃
translation:
  text: The tongue of the righteous is choice silver; the heart of the wicked is worth
    little.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is of little value,' 'is little,' or 'is as nothing.' The Hebrew כִּמְעָט
      is concise and can express slight worth or near-nothingness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The primary sense is 'silver,' often functioning as a measure of value.
    In this proverb's comparison imagery, the concrete 'silver' preserves the metaphor
    better than the more abstract 'money'.
- source_word: נִבְחָר
  chosen: choice
  alternatives:
  - chosen
  - refined
  - select
  lexicon: HALOT
  rationale: Here the participle describes high quality or select value. 'Choice'
    is idiomatic in English for precious metal and fits the proverb's evaluative comparison.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - words
  lexicon: HALOT
  rationale: The Hebrew literally says 'tongue.' Retaining the body-part metaphor
    is natural in English and preserves the concrete style of Proverbs, while implying
    speech by metonymy.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The adjective is used substantivally for a righteous person or class.
    'The righteous' is concise, natural, and avoids unnecessarily narrowing the singular
    collective force to a male individual.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew anthropology includes
    thought and moral character. It matches the proverb''s contrast with ''tongue''
    while preserving the source image.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'The wicked' is the standard
    collective rendering and preserves the moral category without overexpansion.
- source_word: כִּמְעָט
  chosen: worth little
  alternatives:
  - is little
  - is as nothing
  - is of little value
  lexicon: HALOT
  rationale: In context the phrase conveys small worth or insignificance, balancing
    the valuation metaphor established by 'choice silver.' 'Worth little' makes the
    implied predicate explicit in idiomatic English without adding foreign content.
