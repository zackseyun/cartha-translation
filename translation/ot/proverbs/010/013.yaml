id: PRO.10.13
reference: Proverbs 10:13
source:
  edition: WLC
  text: בְּ/שִׂפְתֵ֣י נָ֭בוֹן תִּמָּצֵ֣א חָכְמָ֑ה וְ֝/שֵׁ֗בֶט לְ/גֵ֣ו חֲסַר לֵֽב־׃
translation:
  text: On the lips of a discerning man wisdom is found, but a rod is for the back
    of one who lacks sense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lacking heart,' a Hebrew idiom for lacking sense or understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/שִׂפְתֵי
  chosen: On the lips of
  alternatives:
  - In the lips of
  - By the lips of
  lexicon: HALOT
  rationale: The preposition ב with 'lips' idiomatically marks location/source of
    speech. 'On the lips of' is natural English and preserves the Hebrew image of
    wisdom being present in a person's speech.
- source_word: נָבוֹן
  chosen: a discerning man
  alternatives:
  - an understanding man
  - a prudent man
  - a discerning person
  lexicon: HALOT
  rationale: נָבוֹן denotes one who has understanding/discernment. 'Discerning man'
    is concise and fits the wisdom-literature contrast with the 'one who lacks sense.'
    'Man' preserves the grammatically masculine singular in line with the gender-accurate
    policy, while still functioning proverbially.
- source_word: תִּמָּצֵא
  chosen: is found
  alternatives:
  - will be found
  - is to be found
  lexicon: HALOT
  rationale: The Niphal imperfect of מצא here expresses a general proverbial truth
    rather than strict future time. English present passive best captures the gnomic
    sense.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs; no contextual reason to vary.
- source_word: וְ/שֵׁבֶט
  chosen: but a rod
  alternatives:
  - and a rod
  - while a rod
  - the rod
  lexicon: HALOT
  rationale: The conjunction links a sharp contrast between the wise speaker and the
    senseless person. 'But' makes the adversative force clear in English. שֵׁבֶט here
    is best rendered 'rod,' an instrument of discipline/punishment.
- source_word: לְ/גֵו
  chosen: is for the back
  alternatives:
  - for the back
  - for the body
  - for the back of
  lexicon: HALOT
  rationale: גֵו refers to the back/body, especially the back as the place struck
    by a rod. Supplying 'is' yields idiomatic English in this verbless clause.
- source_word: חֲסַר לֵב
  chosen: one who lacks sense
  alternatives:
  - one who lacks heart
  - a man without sense
  - one lacking understanding
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lacking heart,' but in wisdom literature
    'heart' is the seat of understanding/judgment. 'One who lacks sense' communicates
    the idiomatic meaning clearly in modern English without flattening the moral-intellectual
    contrast.
