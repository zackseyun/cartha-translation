id: PRO.10.23
reference: Proverbs 10:23
source:
  edition: WLC
  text: כִּ/שְׂח֣וֹק לִ֭/כְסִיל עֲשׂ֣וֹת זִמָּ֑ה וְ֝/חָכְמָ֗ה לְ/אִ֣ישׁ תְּבוּנָֽה׃
translation:
  text: Doing wickedness is like a joke to a fool, but wisdom is for a man of understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Doing an evil scheme is sport to a fool.' The Hebrew term for 'wickedness'
      can also suggest a shameless or outrageous act.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּשְׂחוֹק
  chosen: is like a joke
  alternatives:
  - is sport
  - is laughter
  - is a game
  lexicon: HALOT
  rationale: The prefixed כ expresses comparison ('like/as'), and שְׂחוֹק denotes
    laughter, amusement, or sport. 'Is like a joke' captures the proverb's sense that
    the fool treats the matter as amusing play, while remaining idiomatic in modern
    English.
- source_word: לִכְסִיל
  chosen: to a fool
  alternatives:
  - for a fool
  lexicon: HALOT
  rationale: The preposition ל marks relation or perspective here. 'To a fool' naturally
    conveys that this is how the fool regards the action.
- source_word: עֲשׂוֹת
  chosen: Doing
  alternatives:
  - to do
  - the doing of
  lexicon: HALOT
  rationale: The infinitive construct functions substantivally as the subject of the
    clause. 'Doing' is concise and natural English.
- source_word: זִמָּה
  chosen: wickedness
  alternatives:
  - evil scheme
  - lewdness
  - outrage
  - depravity
  lexicon: HALOT
  rationale: זִמָּה can denote wickedness, especially a shameless or morally outrageous
    act, sometimes with sexual overtones in other contexts. Here the broader ethical
    sense fits best in Proverbs. 'Wickedness' preserves the moral weight without narrowing
    the term unnecessarily.
- source_word: וְחָכְמָה
  chosen: but wisdom
  alternatives:
  - and wisdom
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' Hebrew proverb parallelism
    often uses waw adversatively. 'But wisdom' best reflects the contrast between
    the fool and the understanding man.
- source_word: לְאִישׁ תְּבוּנָה
  chosen: is for a man of understanding
  alternatives:
  - belongs to a man of understanding
  - is a delight to a man of understanding
  - to a man of understanding, wisdom
  lexicon: HALOT
  rationale: The phrase literally reads 'to a man of understanding.' Because the second
    colon omits an explicit predicate, English must supply one. 'Is for a man of understanding'
    preserves the terseness and leaves the relation somewhat open, matching the Hebrew
    ellipsis better than more interpretive expansions such as 'is a delight.' 'Man'
    is retained as gender-accurate and representative, in keeping with the translation
    philosophy.
