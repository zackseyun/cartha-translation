theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: man of understanding
  alternative_readings:
  - person of understanding
  - one of understanding
  rationale: The Hebrew uses the singular masculine אִישׁ in a representative wisdom-saying.
    Per the translation philosophy, gender-accurate language is preferred where the
    source uses masculine representative language. The saying is general in application,
    but the form 'man' best matches the Hebrew wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
