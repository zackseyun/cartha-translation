id: PRO.10.5
reference: Proverbs 10:5
source:
  edition: WLC
  text: אֹגֵ֣ר בַּ֭/קַּיִץ בֵּ֣ן מַשְׂכִּ֑יל נִרְדָּ֥ם בַּ֝/קָּצִ֗יר בֵּ֣ן מֵבִֽישׁ׃
translation:
  text: He who gathers in summer is a prudent son, but he who sleeps during harvest
    is a son who brings shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stores up in summer is a wise son.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'son' is masculine singular; in Proverbs it often has representative
      force while retaining the father-to-son instructional form.
    reason: cultural_note
lexical_decisions:
- source_word: אֹגֵר
  chosen: gathers
  alternatives:
  - stores up
  - collects
  lexicon: HALOT
  rationale: The participle denotes gathering in produce. 'Gathers' is natural English
    and fits the agricultural parallel with harvest; 'stores up' is possible but slightly
    over-specifies the result rather than the act.
- source_word: בַּקַּיִץ
  chosen: in summer
  alternatives:
  - during summer
  lexicon: HALOT
  rationale: Refers to the proper season for agricultural preparation or collection.
    'In summer' is concise and idiomatic.
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per the translation philosophy,
    gender-accurate rendering is preferred over neutralizing. In Proverbs, 'son' can
    be representative, but the masculine form should be preserved.
- source_word: מַשְׂכִּיל
  chosen: prudent
  alternatives:
  - wise
  - acting wisely
  lexicon: HALOT
  rationale: This participial form conveys practical insight shown in behavior. 'Prudent'
    highlights sensible, timely action in context better than the broader 'wise.'
- source_word: נִרְדָּם
  chosen: sleeps
  alternatives:
  - falls asleep
  - is sleeping
  lexicon: HALOT
  rationale: The Niphal participle describes one characterized here by sleeping at
    the wrong time. 'Sleeps' is the most direct and idiomatic rendering in the proverb.
- source_word: בַּקָּצִיר
  chosen: during harvest
  alternatives:
  - in harvest
  - at harvest time
  lexicon: HALOT
  rationale: The phrase marks the crucial time when work should be done. 'During harvest'
    communicates the temporal force clearly in modern English.
- source_word: מֵבִישׁ
  chosen: who brings shame
  alternatives:
  - shameful
  - causing shame
  - disgraceful
  lexicon: HALOT
  rationale: 'The Hiphil participle is causative: the son causes shame or acts shamefully
    to the family''s dishonor. ''Who brings shame'' preserves that causative nuance
    better than the adjectival ''shameful''.'
