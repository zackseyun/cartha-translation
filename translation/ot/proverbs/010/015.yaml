id: PRO.10.15
reference: Proverbs 10:15
source:
  edition: WLC
  text: ה֣וֹן עָ֭שִׁיר קִרְיַ֣ת עֻזּ֑/וֹ מְחִתַּ֖ת דַּלִּ֣ים רֵישָֽׁ/ם׃
translation:
  text: A rich man's wealth is his fortified city; the ruin of the poor is their poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A rich man's wealth is his strong city'; the Hebrew literally reads
      'city of his strength.'
    reason: lexical_alternative
  - marker: b
    text: '''Ruin'' may also be rendered ''destruction'' or, less likely here, ''terror/dismay.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - substance
  lexicon: HALOT
  rationale: Denotes material possessions or wealth. 'Wealth' is natural modern English
    and fits the proverb's economic contrast.
- source_word: עָשִׁיר
  chosen: rich man’s
  alternatives:
  - the rich
  - a rich person’s
  lexicon: HALOT
  rationale: Adjectival noun meaning 'rich' used substantivally. 'Rich man's' preserves
    the singular masculine form and the possessive relationship to wealth, in line
    with the gender-accurate policy.
- source_word: קִרְיַת
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The construct form means 'city of.' 'City' is the standard rendering
    and preserves the metaphor of urban security.
- source_word: עֻזּוֹ
  chosen: his fortified
  alternatives:
  - his strength
  - his strong
  lexicon: HALOT
  rationale: From עֹז/עֹזז, 'strength, stronghold.' In construct with 'city,' the
    sense is not merely 'city of strength' woodenly, but a city characterized by strength/defense.
    'Fortified' brings out the metaphor idiomatically in English.
- source_word: מְחִתַּת
  chosen: ruin
  alternatives:
  - terror
  - destruction
  - dismay
  lexicon: HALOT
  rationale: The noun can denote destruction, ruin, or dismay. In parallel with the
    first colon and followed by 'their poverty,' 'ruin' best captures the proverb's
    point that poverty is the poor person's undoing.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - poor people
  - the weak
  lexicon: HALOT
  rationale: Refers to those who are poor/lowly. 'The poor' is concise and idiomatic,
    preserving the class designation.
- source_word: רֵישָׁם
  chosen: their poverty
  alternatives:
  - their poverty/penury
  - their destitution
  lexicon: HALOT
  rationale: The noun means poverty or lack. 'Their poverty' is the most direct rendering
    and preserves the causal force in the parallelism.
