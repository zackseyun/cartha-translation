id: PRO.10.9
reference: Proverbs 10:9
source:
  edition: WLC
  text: הוֹלֵ֣ךְ בַּ֭/תֹּם יֵ֣לֶךְ בֶּ֑טַח וּ/מְעַקֵּ֥שׁ דְּ֝רָכָ֗י/ו יִוָּדֵֽעַ׃
translation:
  text: Whoever walks in integrity walks securely, but he who makes his ways crooked
    will be found out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will become known' or 'will be exposed.' The Hebrew can mean either
      that the crooked person is recognized for what he is or that his conduct is
      uncovered.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: Whoever walks
  alternatives:
  - He who walks
  - One who walks
  lexicon: HALOT
  rationale: The participle functions generically/proverbially rather than referring
    to a specific male individual. 'Whoever walks' conveys the habitual sense in natural
    English while preserving the metaphor of conduct as walking.
- source_word: בַּתֹּם
  chosen: in integrity
  alternatives:
  - blamelessly
  - in innocence
  - with integrity
  lexicon: HALOT
  rationale: תֹּם denotes integrity, wholeness, or blamelessness of character. 'In
    integrity' preserves the noun-based moral quality and fits proverbial style better
    than the more absolute-sounding 'blamelessly'.
- source_word: יֵלֶךְ
  chosen: walks
  alternatives:
  - goes
  - lives
  lexicon: HALOT
  rationale: Repeating 'walks' preserves the Hebrew wordplay and the metaphor of life-conduct.
    Although English could vary with 'goes,' consistency here better reflects the
    source.
- source_word: בֶּטַח
  chosen: securely
  alternatives:
  - in safety
  - confidently
  - secure
  lexicon: HALOT
  rationale: בֶּטַח expresses security/safety. 'Securely' reads naturally with 'walks'
    and captures the adverbial force. 'Confidently' could overemphasize subjective
    feeling rather than objective security.
- source_word: וּמְעַקֵּשׁ
  chosen: but he who makes ... crooked
  alternatives:
  - but the one who perverts
  - but he who twists
  lexicon: HALOT
  rationale: The participle from עקשׁ conveys making crooked, twisting, or perverting.
    Rendering it verbally as 'makes ... crooked' allows the object 'his ways' to remain
    explicit and preserves the contrast with walking in integrity.
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his path
  - his conduct
  lexicon: HALOT
  rationale: Plural 'ways' is the direct lexical equivalent and is a common Hebrew
    metaphor for one's manner of life. 'Conduct' is interpretive; 'ways' preserves
    the imagery.
- source_word: יִוָּדֵעַ
  chosen: will be found out
  alternatives:
  - will be known
  - will become known
  - will be exposed
  lexicon: HALOT
  rationale: The Niphal of ידע can mean 'be known' or 'be found out/exposed.' In this
    antithetical proverb, the sense is that crooked conduct will not remain hidden.
    'Will be found out' communicates that consequence clearly in idiomatic English.
