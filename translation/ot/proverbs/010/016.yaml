theological_decisions:
- issue: Sense of חַטָּאת
  chosen_reading: sin
  alternative_readings:
  - sin offering
  rationale: 'Although חַטָּאת can denote ''sin offering'' in sacrificial contexts,
    Proverbs 10:16 is a wisdom saying contrasting moral outcomes: the righteous person''s
    labor tends toward life, while the wicked person''s produce tends toward sin.
    No cultic context suggests ''sin offering'' here.'
