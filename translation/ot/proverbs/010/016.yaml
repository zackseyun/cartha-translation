id: PRO.10.16
reference: Proverbs 10:16
source:
  edition: WLC
  text: פְּעֻלַּ֣ת צַדִּ֣יק לְ/חַיִּ֑ים תְּבוּאַ֖ת רָשָׁ֣ע לְ/חַטָּֽאת׃
translation:
  text: The labor of the righteous leads to life; the produce of the wicked leads
    to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for life' / 'results in life.' The Hebrew preposition can mark purpose
      or result.
    reason: lexical_alternative
  - marker: b
    text: Or 'income,' 'yield,' or 'harvest' for 'produce.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew חַטָּאת can also mean 'sin offering' in sacrificial contexts, but
      here the sense is 'sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: פְּעֻלַּת
  chosen: labor
  alternatives:
  - work
  - wages
  - deed
  lexicon: HALOT
  rationale: פְּעֻלָּה can denote work, labor, or the result/reward of work. Here,
    paired with תְּבוּאַת in a proverb contrasting outcomes, 'labor' best preserves
    the sense of what the righteous person does/produces without narrowing it only
    to wages.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The righteous' is concise,
    natural English and preserves the representative singular without unnecessarily
    specifying gender.
- source_word: לְחַיִּים
  chosen: leads to life
  alternatives:
  - for life
  - results in life
  lexicon: HALOT
  rationale: The preposition ל here expresses result or end. 'Leads to life' communicates
    the directional/resultative force in idiomatic English while preserving the proverb's
    moral causality.
- source_word: תְּבוּאַת
  chosen: produce
  alternatives:
  - income
  - yield
  - harvest
  lexicon: HALOT
  rationale: תְּבוּאָה commonly refers to produce, yield, or revenue. 'Produce' works
    well in parallel with 'labor' and keeps the broad sense of what comes in from
    one's activity, not only agricultural harvest.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: Like צַדִּיק, this is a substantival singular with representative force.
    'The wicked' preserves the category contrast central to Proverbs.
- source_word: לְחַטָּאת
  chosen: leads to sin
  alternatives:
  - for sin
  - results in sin
  - to sinfulness
  lexicon: HALOT
  rationale: חַטָּאת can mean sin or sin offering depending on context. In wisdom
    literature and in antithesis to 'life,' the moral sense 'sin' is clearly intended.
    'Leads to sin' mirrors the resultative force of ל and the first colon's structure.
