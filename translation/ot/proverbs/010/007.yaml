id: PRO.10.7
reference: Proverbs 10:7
source:
  edition: WLC
  text: זֵ֣כֶר צַ֭דִּיק לִ/בְרָכָ֑ה וְ/שֵׁ֖ם רְשָׁעִ֣ים יִרְקָֽב׃
translation:
  text: The memory of the righteous is a blessing, but the name of the wicked will
    rot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The remembrance of the righteous is for a blessing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵכֶר
  chosen: memory
  alternatives:
  - remembrance
  - mention
  lexicon: HALOT
  rationale: The noun denotes remembrance or memory. 'Memory' is natural modern English
    and fits the proverb's contrast with 'name.' 'Remembrance' is possible but slightly
    more formal.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the just
  - a righteous man
  lexicon: HALOT
  rationale: The adjective functions substantivally for a righteous person in a generic
    sense. 'The righteous' preserves the representative force without over-specifying
    gender, fitting the proverb genre.
- source_word: לִבְרָכָה
  chosen: is a blessing
  alternatives:
  - for a blessing
  - brings blessing
  lexicon: HALOT
  rationale: Literally 'for blessing,' but in idiomatic English the predicate sense
    'is a blessing' best conveys the Hebrew lamed here. This preserves the proverb's
    concise evaluative statement.
- source_word: שֵׁם
  chosen: name
  alternatives:
  - reputation
  - renown
  lexicon: HALOT
  rationale: '''Name'' is the direct lexical equivalent and preserves the Hebrew idiom,
    which includes reputation and legacy without reducing it to one interpretive nuance.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the ungodly
  lexicon: HALOT
  rationale: The plural adjective is used substantivally. 'The wicked' is concise,
    idiomatic, and matches the generic moral category in wisdom literature.
- source_word: יִרְקָב
  chosen: will rot
  alternatives:
  - will decay
  - will perish
  lexicon: HALOT
  rationale: The verb literally refers to rotting or decaying. 'Will rot' preserves
    the vivid concrete imagery of corruption better than the more abstract 'perish.'
