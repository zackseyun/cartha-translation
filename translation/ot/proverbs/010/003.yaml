theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of נֶפֶשׁ in wisdom literature
  chosen_reading: person
  alternative_readings:
  - soul
  - life
  - appetite
  rationale: The text speaks of God's provision for the righteous as a whole person, not necessarily making a technical statement about the soul as distinct from the body. Rendering it 'person' preserves the Hebrew sense in context and avoids importing later anthropological categories.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English'
- issue: Sense of הַוַּת רְשָׁעִים
  chosen_reading: the craving of the wicked
  alternative_readings:
  - the desire of the wicked
  - the ruin/calamity of the wicked
  rationale: The immediate antithesis with hunger supports reading the noun as desire/craving rather than ruin. Because the noun can be understood differently in lexica and translations, the alternative is preserved in a footnote rather than erased.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
