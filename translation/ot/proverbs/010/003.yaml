id: PRO.10.3
reference: Proverbs 10:3
source:
  edition: WLC
  text: לֹֽא יַרְעִ֣יב יְ֭הוָה נֶ֣פֶשׁ צַדִּ֑יק וְ/הַוַּ֖ת רְשָׁעִ֣ים יֶהְדֹּֽף־׃
translation:
  text: Yahweh will not let the righteous go hungry, but he thwarts the craving of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he thrusts away the ruin of the wicked' / 'he repels the desire of the wicked.' The Hebrew noun may be understood as 'craving/desire' or 'ruin/calamity.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: will not
  alternatives:
  - does not
  lexicon: HALOT
  rationale: Simple negation; rendered with English future-like aspect to match the yiqtol verbal sequence in a proverbial statement.
- source_word: יַרְעִיב
  chosen: let ... go hungry
  alternatives:
  - cause ... to hunger
  - make ... hungry
  - starve
  lexicon: HALOT
  rationale: Hiphil of רעב means to cause to hunger. 'Let ... go hungry' is idiomatic modern English that preserves the causative sense without overstating it as 'starve.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  - appetite
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to the living self/person rather than an immaterial 'soul' in a narrow sense. 'Person' communicates the Hebrew idiom naturally in English while avoiding misleading dualistic overtones.
- source_word: צַדִּיק
  chosen: the righteous person
  alternatives:
  - the righteous
  - the just man
  lexicon: HALOT
  rationale: Adjective used substantivally. 'Righteous person' is gender-accurate and clear in modern English; it preserves the moral category without implying only males are in view.
- source_word: הַוַּת
  chosen: the craving
  alternatives:
  - desire
  - greed
  - ruin
  lexicon: HALOT
  rationale: In this context the noun most plausibly denotes the wicked's desire/craving, forming a contrast with the righteous person's hunger. Some take it as 'ruin' or 'calamity,' but the parallelism with hunger favors an inner appetite/desire that God frustrates.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard substantive plural for morally evil persons; 'the wicked' is concise and idiomatic.
- source_word: יֶהְדֹּף
  chosen: he drives away
  alternatives:
  - he thrusts away
  - he repels
  - he casts off
  lexicon: HALOT
  rationale: The verb conveys pushing away or repelling. 'Drives away' is natural English and fits the image of God refusing or frustrating the wicked's craving.
