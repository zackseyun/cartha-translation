id: PRO.10.6
reference: Proverbs 10:6
source:
  edition: WLC
  text: בְּ֭רָכוֹת לְ/רֹ֣אשׁ צַדִּ֑יק וּ/פִ֥י רְ֝שָׁעִ֗ים יְכַסֶּ֥ה חָמָֽס׃
translation:
  text: Blessings are on the head of the righteous, but the mouth of the wicked covers
    violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the mouth of the wicked conceals violence'; some also understand, 'violence
      covers the mouth of the wicked.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרָכוֹת
  chosen: Blessings
  alternatives:
  - blessings
  - benedictions
  lexicon: HALOT
  rationale: Plural noun meaning blessings/benefits bestowed. 'Blessings' is the natural
    modern English equivalent and preserves the plural.
- source_word: לְרֹאשׁ
  chosen: are on the head of
  alternatives:
  - for the head of
  - upon the head of
  lexicon: HALOT
  rationale: The preposition ל with 'head' here idiomatically marks what comes upon
    or rests on someone. 'Are on the head of' communicates the Hebrew image clearly
    in English without over-literal awkwardness.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: Adjectival substantive referring to a righteous person generically. 'The
    righteous' preserves the representative singular sense without unnecessarily specifying
    'man.'
- source_word: וּפִי
  chosen: but the mouth of
  alternatives:
  - and the mouth of
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' Hebrew poetry often uses waw
    adversatively in antithetical parallelism. Since this proverb contrasts righteous
    and wicked, 'but' best reflects the sense in natural English.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the wicked ones
  lexicon: HALOT
  rationale: Masculine plural adjective used substantivally. 'The wicked' is the standard
    concise English rendering and matches proverbial style.
- source_word: יְכַסֶּה
  chosen: covers
  alternatives:
  - conceals
  - overwhelms
  lexicon: HALOT
  rationale: Piel imperfect of כסה, 'to cover/conceal.' 'Covers' preserves the lexical
    image and allows the ambiguity of whether violence fills the mouth or is concealed
    by it.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence and injustice
  lexicon: HALOT
  rationale: The noun commonly denotes violence, wrongdoing, or ruthless injustice.
    'Violence' is the most direct and established rendering in wisdom literature contexts.
