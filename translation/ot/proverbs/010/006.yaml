theological_decisions:
- issue: Interpretive sense of the second colon
  chosen_reading: The line is rendered literally as 'the mouth of the wicked covers
    violence,' preserving the Hebrew image and ambiguity.
  alternative_readings:
  - the mouth of the wicked conceals violence
  - violence covers the mouth of the wicked
  rationale: The Hebrew wording is terse and has been understood in more than one
    way, including by comparison with Proverbs 10:11. Following optimal equivalence
    and the principle of preserving tension rather than over-resolving ambiguity,
    the main text keeps the Masoretic syntax straightforward while preserving notable
    alternatives in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
