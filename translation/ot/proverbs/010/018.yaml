id: PRO.10.18
reference: Proverbs 10:18
source:
  edition: WLC
  text: מְכַסֶּ֣ה שִׂ֭נְאָה שִׂפְתֵי שָׁ֑קֶר וּ/מוֹצִ֥א דִ֝בָּ֗ה ה֣וּא כְסִֽיל־׃
translation:
  text: Lying lips conceal hatred, and whoever spreads slander is a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'False lips hide hatred.' The Hebrew may be construed more literally
      with 'lips of falsehood' as the subject.
    reason: lexical_alternative
  - marker: b
    text: Or 'whoever brings out a bad report.' The Hebrew expression can denote circulating
      a harmful report more broadly, not only formal slander.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  chosen: conceal
  alternatives:
  - cover
  - hide
  lexicon: HALOT
  rationale: The participle from כסה denotes covering or concealing. 'Conceal' fits
    idiomatic English and preserves the moral sense of hiding inward hatred behind
    outward speech.
- source_word: שִׂנְאָה
  chosen: hatred
  alternatives:
  - hate
  lexicon: HALOT
  rationale: The noun denotes hatred or enmity. 'Hatred' is the most natural abstract
    noun in English here.
- source_word: שִׂפְתֵי שָׁקֶר
  chosen: lying lips
  alternatives:
  - false lips
  - deceitful lips
  lexicon: HALOT
  rationale: Construct phrase literally 'lips of falsehood.' 'Lying lips' is concise,
    idiomatic, and preserves the image of speech as the instrument of concealment.
- source_word: וּ/מוֹצִא
  chosen: whoever spreads
  alternatives:
  - and one who brings out
  - and he who utters
  lexicon: HALOT
  rationale: The Hiphil participle of יצא literally means 'bring out,' but with דִּבָּה
    it idiomatically refers to circulating or spreading a report. 'Whoever spreads'
    makes the proverbial subject clear in English.
- source_word: דִבָּה
  chosen: slander
  alternatives:
  - bad report
  - defamation
  - gossip
  lexicon: HALOT
  rationale: דִּבָּה often denotes an unfavorable report, sometimes false or malicious.
    'Slander' best captures the harmful, defamatory force in wisdom context, though
    'bad report' is a possible broader alternative.
- source_word: הוּא כְסִיל
  chosen: is a fool
  alternatives:
  - is foolish
  - is a dullard
  lexicon: HALOT
  rationale: כְּסִיל in Proverbs is the stock wisdom term for a morally obtuse fool,
    not merely someone unintelligent. 'Is a fool' preserves the category term used
    throughout Proverbs.
