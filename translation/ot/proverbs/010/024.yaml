theological_decisions:
- issue: Implicit subject of יִתֵּן
  chosen_reading: Leave the giver implicit in translation by using 'will be granted.'
  alternative_readings:
  - '''he will give,'' taking an unspecified human subject'
  - '''God will grant,'' making God the implied subject explicit'
  rationale: The Hebrew does not name God explicitly. While divine agency may be implied
    in wisdom literature, making God the subject in the main text would resolve an
    ambiguity the source leaves unstated. The passive preserves the theological tension
    and the proverb's concise style.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
