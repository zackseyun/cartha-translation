id: PRO.10.24
reference: Proverbs 10:24
source:
  edition: WLC
  text: מְגוֹרַ֣ת רָ֭שָׁע הִ֣יא תְבוֹאֶ֑/נּוּ וְ/תַאֲוַ֖ת צַדִּיקִ֣ים יִתֵּֽן׃
translation:
  text: What the wicked dreads will come upon him, but the desire of the righteous
    will be granted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The dread of the wicked—it will come upon him.' The Hebrew can be rendered
      more formally, but the main text expresses the same sense in clearer English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'he will give.' The subject is unstated; the main text
      renders the sense without specifying the giver.
    reason: alternative_reading
lexical_decisions:
- source_word: מְגוֹרַת
  chosen: what ... dreads
  alternatives:
  - the dread of
  - the thing feared by
  lexicon: HALOT
  rationale: The noun denotes fear, dread, or the object of dread. In construct with
    רָשָׁע, the sense is not merely an abstract emotion but what the wicked fears.
    English idiom is clearer with 'what the wicked dreads' than a more wooden 'the
    dread of the wicked.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for a representative
    individual or class. 'The wicked' preserves the proverbial, generic force without
    over-specifying gender.
- source_word: הִיא תְבוֹאֶנּוּ
  chosen: will come upon him
  alternatives:
  - it will come to him
  - it will overtake him
  lexicon: HALOT
  rationale: The feminine subject pronoun refers back to מְגוֹרַת, and the verb בוא
    with pronominal suffix naturally yields 'it will come upon him/to him.' 'Come
    upon him' best conveys impending arrival of the feared outcome in idiomatic English.
- source_word: וְתַאֲוַת
  chosen: but the desire of
  alternatives:
  - and the desire of
  - but the craving of
  lexicon: HALOT
  rationale: תאוה commonly means desire, longing, or craving. 'Desire' fits the positive
    parallel with the righteous. The conjunction is rendered 'but' to reflect the
    antithetical parallelism typical of Proverbs, though formally it is simply 'and.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the righteous ones
  lexicon: HALOT
  rationale: The plural adjective is substantival. 'The righteous' is natural English
    and preserves the class sense. The plural in Hebrew is represented collectively
    in English.
- source_word: יִתֵּן
  chosen: will be granted
  alternatives:
  - he will give
  - it will be given
  - will be given
  lexicon: HALOT
  rationale: The Hebrew verb is active singular, literally 'he will give,' with an
    unstated subject. In this proverb the focus is on the fulfillment of the righteous
    person's desire rather than identifying the giver. English passive 'will be granted'
    communicates the sense clearly and naturally without importing an explicit subject
    not present in the text.
