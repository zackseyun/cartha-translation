id: PRO.10.11
reference: Proverbs 10:11
source:
  edition: WLC
  text: מְק֣וֹר חַ֭יִּים פִּ֣י צַדִּ֑יק וּ/פִ֥י רְ֝שָׁעִ֗ים יְכַסֶּ֥ה חָמָֽס׃
translation:
  text: The mouth of the righteous is a fountain of life, but the mouth of the wicked
    conceals violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covers violence.' The Hebrew verb can mean either literal covering or
      figurative concealing; the latter is adopted here for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: The noun denotes a spring or fountain as a source of flowing water. 'Fountain'
    is idiomatic in English wisdom literature and preserves the metaphor of life-giving
    speech better than the more abstract 'source.'
- source_word: חַיִּים
  chosen: of life
  alternatives:
  - of lives
  - living
  lexicon: HALOT
  rationale: The plural form commonly functions as an abstract singular meaning 'life.'
    'Of life' is the natural English equivalent in this construct phrase.
- source_word: פִּי צַדִּיק
  chosen: the mouth of the righteous
  alternatives:
  - the mouth of a righteous man
  - the speech of the righteous
  lexicon: HALOT
  rationale: The construct literally reads 'mouth of a righteous [one].' 'The righteous'
    captures the representative singular without unnecessarily specifying 'man,' while
    retaining the concrete image of 'mouth' rather than abstracting to 'speech.'
- source_word: וּפִי רְשָׁעִים
  chosen: but the mouth of the wicked
  alternatives:
  - and the mouth of the wicked
  - but the mouths of the wicked
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but in Hebrew proverb parallelism
    it often carries adversative force; 'but' best reflects the contrast. Although
    'wicked' is plural in Hebrew, the singular 'mouth' likely functions collectively
    or as a class statement, and English reads more naturally with 'the mouth of the
    wicked' than with the more awkward 'mouths of the wicked.'
- source_word: יְכַסֶּה
  chosen: conceals
  alternatives:
  - covers
  - overwhelms
  lexicon: HALOT
  rationale: 'The verb means ''cover'' in a literal or figurative sense. Here a figurative
    sense fits best: the wicked mouth hides or masks violence. ''Conceals'' communicates
    that sense clearly in modern English while preserving the metaphorical force.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence and injustice
  lexicon: HALOT
  rationale: The noun commonly denotes violence, brutality, or violent wrongdoing.
    'Violence' is the standard concise rendering and fits the proverb's moral contrast.
