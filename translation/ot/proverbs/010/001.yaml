id: PRO.10.1
reference: Proverbs 10:1
source:
  edition: WLC
  text: מִשְׁלֵ֗י שְׁלֹ֫מֹ֥ה בֵּ֣ן חָ֭כָם יְשַׂמַּח אָ֑ב וּ/בֵ֥ן כְּ֝סִ֗יל תּוּגַ֥ת
    אִמּֽ/וֹפ־׃
translation:
  text: 'The proverbs of Solomon: a wise son makes a father glad, but a foolish son
    is the grief of his mother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foolish son is a grief to his mother.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁלֵי
  chosen: The proverbs of
  alternatives:
  - Proverbs of
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of מָשָׁל introducing a collection heading. 'Proverbs'
    is the most natural and established English equivalent here; 'sayings' is possible
    but less precise for this book title/header function.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy.
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per gender-accurate policy,
    'son' is retained rather than neutralizing to 'child'.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: In Proverbs, חָכָם commonly denotes wisdom in moral and practical living,
    not merely technical skill. 'Wise' best fits the sapiential contrast with כְּסִיל.
- source_word: יְשַׂמַּח
  chosen: makes ... glad
  alternatives:
  - gladdens
  - brings joy to
  lexicon: HALOT
  rationale: 'Hiphil of שׂמח is causative: ''causes to rejoice/be glad.'' ''Makes
    a father glad'' is clear, idiomatic modern English and preserves the causative
    sense.'
- source_word: אָב
  chosen: a father
  alternatives:
  - his father
  - father
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit pronominal suffix. English idiom benefits
    from the article, and the parallel with 'his mother' need not force an added possessive
    here. 'A father' preserves the proverb's general character.
- source_word: וּבֵן
  chosen: but a ... son
  alternatives:
  - and a ... son
  lexicon: HALOT
  rationale: Though waw is formally 'and,' in antithetical parallelism English 'but'
    better conveys the contrast between the two cola.
- source_word: כְּסִיל
  chosen: foolish
  alternatives:
  - stupid
  - dull
  lexicon: HALOT
  rationale: In wisdom literature כְּסִיל denotes a morally and practically foolish
    person, not merely low intelligence. 'Foolish' communicates the ethical-sapiential
    sense.
- source_word: תּוּגַת
  chosen: the grief of
  alternatives:
  - a grief to
  - the sorrow of
  lexicon: HALOT
  rationale: The noun denotes grief/sorrow. 'Is the grief of his mother' closely reflects
    the construct relationship and keeps the terse proverbial force.
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The 3ms suffix is explicit and should be represented in English.
