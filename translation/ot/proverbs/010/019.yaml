id: PRO.10.19
reference: Proverbs 10:19
source:
  edition: WLC
  text: בְּ/רֹ֣ב דְּ֭בָרִים לֹ֣א יֶחְדַּל פָּ֑שַׁע וְ/חֹשֵׂ֖ךְ שְׂפָתָ֣י/ו מַשְׂכִּֽיל־׃
translation:
  text: When words are many, transgression does not cease, but whoever restrains his
    lips is prudent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the abundance of words, transgression is not lacking.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his lips'; the masculine singular is representative/generic in proverbial
      style.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  chosen: When ... are many
  alternatives:
  - In the abundance of
  - With many
  lexicon: HALOT
  rationale: The preposition ב plus רֹב expresses circumstance/quantity ('in/with
    abundance'). Rendering it idiomatically as 'When ... are many' preserves the proverbial
    sense in natural English.
- source_word: דְּבָרִים
  chosen: words
  alternatives:
  - speech
  - talk
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing'; here the context is verbal
    expression, so 'words' is the most direct fit with the warning about speech.
- source_word: לֹא יֶחְדַּל
  chosen: does not cease
  alternatives:
  - will not be lacking
  - does not fail
  lexicon: HALOT
  rationale: חדל in Qal means 'cease, stop.' With negation, the sense is that something
    does not come to an end or is not absent. 'Does not cease' is both literal and
    idiomatic.
- source_word: פָּשַׁע
  chosen: transgression
  alternatives:
  - sin
  - offense
  lexicon: HALOT
  rationale: פֶּשַׁע denotes rebellion, transgression, or offense. 'Transgression'
    preserves the moral weight and wisdom-literature register better than the broader
    'sin,' while remaining understandable.
- source_word: וְחֹשֵׂךְ
  chosen: but whoever restrains
  alternatives:
  - and the one who holds back
  - but he who spares
  lexicon: HALOT
  rationale: The participle from חשׂך here means to hold back or restrain. The conjunction
    is rendered adversatively ('but') because the second colon contrasts with the
    first, which is standard in Hebrew poetry.
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  - his words
  lexicon: HALOT
  rationale: A literal rendering of the body-part metaphor is natural in English and
    preserves the Hebrew imagery for speech control.
- source_word: מַשְׂכִּיל
  chosen: is prudent
  alternatives:
  - acts wisely
  - has insight
  - is wise
  lexicon: HALOT
  rationale: The Hiphil participle of שׂכל conveys acting with insight or prudence.
    'Is prudent' fits the proverb's ethical contrast and reads smoothly in English.
