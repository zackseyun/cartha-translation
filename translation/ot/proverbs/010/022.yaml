theological_decisions:
- issue: Implied subject of יוֹסִף
  chosen_reading: 'The clause is rendered with an implied personal subject: ''he adds no sorrow with it,'' most naturally referring to the LORD in context.'
  alternative_readings:
  - '''it adds no sorrow with it/with it'' taking ''blessing'' as the subject despite the masculine verb'
  - '''and no sorrow is added with it'' as a more impersonal rendering'
  rationale: The Hebrew verb is masculine singular, while 'blessing' is feminine singular, so a strictly concordant reading does not straightforwardly support 'it adds.' Hebrew proverbial style can use an unspecified 3ms verb, and in context the LORD is the most natural implied agent. This avoids smoothing away the grammatical detail while keeping the saying readable.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity per verse.
