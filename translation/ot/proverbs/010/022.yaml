id: PRO.10.22
reference: Proverbs 10:22
source:
  edition: WLC
  text: בִּרְכַּ֣ת יְ֭הוָה הִ֣יא תַעֲשִׁ֑יר וְ/לֹֽא יוֹסִ֖ף עֶ֣צֶב עִמָּֽ/הּ־׃
translation:
  text: The blessing of Yahweh makes rich, and it adds no sorrow with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it adds no sorrow with it'; the Hebrew verb is masculine singular, while 'blessing' is feminine, so the clause may be taken either with an implied subject ('he') or as a smoother sense rendering with 'blessing' as subject.
    reason: alternative_reading
  - marker: b
    text: '''Sorrow'' may also be rendered ''pain,'' ''grief,'' or ''toil.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  chosen: blessing
  alternatives:
  - blessing-gift
  - benefit
  lexicon: HALOT
  rationale: 'The construct noun denotes blessing or benefaction. ''Blessing'' is the natural and established English equivalent and fits the construct with the divine name: ''the blessing of the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִיא
  chosen: —
  alternatives:
  - it is
  - she
  lexicon: HALOT
  rationale: The independent pronoun is retained implicitly for natural English style. It serves to emphasize the subject in Hebrew ('it is ... that makes rich'), but explicit repetition is not required in idiomatic English.
- source_word: תַעֲשִׁיר
  chosen: makes rich
  alternatives:
  - enriches
  - brings wealth
  lexicon: HALOT
  rationale: The Hiphil of עשר is causative, 'make rich' or 'enrich.' 'Makes rich' preserves the verbal force and the concise proverbial style.
- source_word: וְלֹא
  chosen: and ... no
  alternatives:
  - but not
  - and not
  lexicon: HALOT
  rationale: 'The conjunction plus negation is best carried as a coordinate statement: ''and he adds no sorrow with it.'' This preserves the parallel structure of the proverb.'
- source_word: יוֹסִף
  chosen: he adds
  alternatives:
  - it adds
  - one adds
  lexicon: HALOT
  rationale: The verb is 3ms singular. Hebrew commonly uses an impersonal or unspecified masculine singular verb. Because the nearest explicit subject is 'the blessing of the LORD' (feminine), some English versions make the blessing the subject ('it adds no sorrow'), but the Hebrew form more naturally leaves the subject unspecified or understood. Rendering 'he adds' preserves the masculine singular verbal form without overinterpreting. In context, the implied agent is most naturally the LORD.
- source_word: עֶצֶב
  chosen: sorrow
  alternatives:
  - pain
  - toil
  - grief
  lexicon: HALOT
  rationale: The noun can denote pain, hurt, grief, or toil. In this proverb, 'sorrow' best captures the adverse burden or grief not accompanying divine blessing, while remaining broad enough to include painful toil.
- source_word: עִמָּהּ
  chosen: with it
  alternatives:
  - with her
  - along with it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring back to 'blessing' (a feminine noun). English uses 'it' for an abstract noun.
