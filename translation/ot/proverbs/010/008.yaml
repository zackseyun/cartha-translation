id: PRO.10.8
reference: Proverbs 10:8
source:
  edition: WLC
  text: חֲכַם לֵ֭ב יִקַּ֣ח מִצְוֺ֑ת וֶ/אֱוִ֥יל שְׂ֝פָתַ֗יִם יִלָּבֵֽט־׃
translation:
  text: A wise-hearted man accepts commands, but a foolish man of lips will be ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a fool of lips will be thrown down.' The final verb
      is rare and may carry the sense of being cast down or coming to ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם לֵב
  chosen: a wise-hearted man
  alternatives:
  - a wise man in heart
  - the wise of heart
  - a wise-hearted person
  lexicon: HALOT
  rationale: The construct-like pairing literally means 'wise of heart.' In Hebrew
    anthropology, 'heart' is the seat of thought and volition, not merely emotion.
    'Wise-hearted' preserves the Hebrew imagery better than flattening to simply 'wise,'
    while 'man' reflects the masculine singular form in line with the gender-accurate
    policy.
- source_word: יִקַּח
  chosen: accepts
  alternatives:
  - receives
  - takes
  lexicon: HALOT
  rationale: The verb is literally 'takes,' but in context with 'commands' it idiomatically
    means receiving or accepting instruction. 'Accepts' best conveys willing reception
    rather than mere physical taking.
- source_word: מִצְוֺת
  chosen: commands
  alternatives:
  - commandments
  - instructions
  lexicon: HALOT
  rationale: The plural noun denotes authoritative directives. 'Commands' is more
    natural modern English than 'commandments' here, while still preserving the force
    of obligation better than the softer 'instructions.'
- source_word: אֱוִיל
  chosen: a foolish man
  alternatives:
  - a fool
  - an arrogant fool
  lexicon: HALOT
  rationale: The term denotes a morally and practically foolish person. 'Foolish man'
    keeps the parallel with the first colon's masculine singular and avoids making
    the line sound like a mere insult label.
- source_word: שְׂפָתַיִם
  chosen: of lips
  alternatives:
  - lipped
  - with his lips
  - talkative
  lexicon: HALOT
  rationale: Literally 'lips' in the dual. The phrase 'foolish man of lips' preserves
    the Hebrew idiom that marks him by speech. More interpretive renderings like 'talkative
    fool' capture part of the sense but go beyond the wording.
- source_word: יִלָּבֵט
  chosen: will be ruined
  alternatives:
  - will come to ruin
  - will be thrown down
  - will be cast headlong
  lexicon: HALOT
  rationale: This Niphal verb is rare and difficult. In context and ancient versions,
    it conveys being brought down or ruined. 'Will be ruined' gives clear modern English
    while preserving the passive/resultative sense. Because of lexical uncertainty,
    a more literal alternative is preserved in a footnote.
