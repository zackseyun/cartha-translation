id: PRO.10.30
reference: Proverbs 10:30
source:
  edition: WLC
  text: צַדִּ֣יק לְ/עוֹלָ֣ם בַּל יִמּ֑וֹט וּ֝/רְשָׁעִ֗ים לֹ֣א יִשְׁכְּנוּ אָֽרֶץ־־׃
translation:
  text: The righteous will never be shaken, but the wicked will not dwell in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' The Hebrew אֶרֶץ can refer either to a specific land or
      to the earth more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous person
  - the righteous one
  lexicon: HALOT
  rationale: The singular adjective functions substantivally to denote the righteous
    person as a class or representative individual. 'The righteous' is idiomatic in
    English and preserves the proverb's generic force without over-specifying gender.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: 'Literally ''for ever/forever,'' but with the negated verb it idiomatically
    conveys enduring impossibility: ''will never be shaken.'' This is a natural optimal-equivalence
    rendering of the Hebrew construction.'
- source_word: בַּל
  chosen: never
  alternatives:
  - not
  - certainly not
  lexicon: HALOT
  rationale: A poetic negative particle. In combination with לְעוֹלָם and the imperfect
    verb, it strengthens the sense of permanent negation, well represented by 'never'
    in English.
- source_word: יִמּוֹט
  chosen: be shaken
  alternatives:
  - be moved
  - totter
  - be overthrown
  lexicon: HALOT
  rationale: The Niphal of מוט commonly conveys being shaken, moved, or made unstable.
    'Be shaken' is clear modern English and preserves the metaphor of stability rather
    than importing the stronger idea 'overthrown.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A substantival plural adjective referring to morally wicked persons.
    'The wicked' is the standard concise English equivalent and matches the generic
    class sense.
- source_word: יִשְׁכְּנוּ
  chosen: will not dwell
  alternatives:
  - will not live
  - will not remain
  lexicon: HALOT
  rationale: From שכן, 'to dwell, settle, reside.' 'Dwell' preserves the sense of
    settled habitation better than the broader 'live' and avoids over-interpretation.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In wisdom literature this can mean 'earth' broadly or 'land' more concretely.
    Here, in contrast with secure dwelling, 'the land' best captures the covenantal
    and territorial resonance without forcing a narrow technical sense. The broader
    alternative is preserved in a footnote.
