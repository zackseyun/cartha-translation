theological_decisions:
- issue: Scope of אָרֶץ in the proverb
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The verse contrasts the enduring stability of the righteous with the
    loss of settled habitation for the wicked. 'The land' preserves possible resonance
    with Israel's covenantal land themes while remaining natural English. Because
    wisdom sayings can also generalize to the inhabited world, 'the earth' is preserved
    as an alternative rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
