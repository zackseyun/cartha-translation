id: PRO.10.21
reference: Proverbs 10:21
source:
  edition: WLC
  text: שִׂפְתֵ֣י צַ֭דִּיק יִרְע֣וּ רַבִּ֑ים וֶֽ֝/אֱוִילִ֗ים בַּ/חֲסַר לֵ֥ב יָמֽוּתוּ־׃
translation:
  text: The lips of the righteous feed many, but fools die for lack of sense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nourish many'; the Hebrew verb can also mean 'shepherd' or 'pasture.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'by lack of heart,' with 'heart' in Hebrew often referring to
      understanding or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  chosen: the lips of
  alternatives:
  - the speech of
  - the words of
  lexicon: HALOT
  rationale: The construct literally denotes 'lips of.' In Proverbs, 'lips' often
    stands metonymically for speech, but retaining 'lips' preserves the Hebrew imagery
    while remaining natural in English.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The adjective functions substantivally for a representative righteous
    person or class. 'The righteous' is concise, idiomatic, and preserves the generic
    force without over-specifying gender.
- source_word: יִרְעוּ
  chosen: feed
  alternatives:
  - shepherd
  - pasture
  - nourish
  lexicon: HALOT
  rationale: From רעה, whose core sense is 'to pasture/shepherd/feed.' With 'lips'
    as subject and 'many' as object, the metaphor points to nourishing others by speech.
    'Feed' best preserves the metaphor in clear English; 'shepherd' would sound less
    natural with 'lips' as subject.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many people
  - multitudes
  lexicon: HALOT
  rationale: A straightforward plural adjective/substantive meaning 'many.' 'Many'
    is sufficiently clear and avoids adding 'people' where the Hebrew leaves it implicit.
- source_word: אֱוִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard wisdom-literature term for morally dull and obstinate persons,
    not merely intellectually weak. 'Fools' is the established and accurate rendering.
- source_word: בַּחֲסַר לֵב
  chosen: for lack of sense
  alternatives:
  - through lack of heart
  - for lack of understanding
  - for want of sense
  lexicon: HALOT
  rationale: Literally 'in/by lack of heart.' In Hebrew anthropology, 'heart' often
    denotes understanding and judgment. 'Lack of sense' communicates the idiom naturally
    in modern English while preserving the wisdom emphasis on discernment rather than
    emotion.
- source_word: יָמוּתוּ
  chosen: die
  alternatives:
  - will die
  - come to ruin
  lexicon: HALOT
  rationale: The verb means 'die.' Although proverbial context can imply ruin, the
    plain lexical sense should be retained unless context requires otherwise. English
    present tense works proverbially here.
