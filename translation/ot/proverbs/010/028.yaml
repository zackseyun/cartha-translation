theological_decisions:
- issue: Referent of perishing in the second colon
  chosen_reading: The wicked's hope is what perishes, not an explicit statement here
    about the annihilation or final fate of the wicked themselves.
  alternative_readings:
  - The line may be taken more broadly as implying the collapse of the wicked along
    with their hopes.
  rationale: The feminine singular verb agrees with תִקְוַת ('hope'), so the clause
    directly states that the hope of the wicked perishes. The translation avoids importing
    a fuller doctrinal conclusion beyond what the syntax explicitly says.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
