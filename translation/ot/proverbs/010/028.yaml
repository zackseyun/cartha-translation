id: PRO.10.28
reference: Proverbs 10:28
source:
  edition: WLC
  text: תּוֹחֶ֣לֶת צַדִּיקִ֣ים שִׂמְחָ֑ה וְ/תִקְוַ֖ת רְשָׁעִ֣ים תֹּאבֵֽד׃
translation:
  text: The expectation of the righteous is joy, but the hope of the wicked will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hope' for 'expectation' in the first line; the Hebrew uses a different
      noun than in the second line, though the meanings overlap.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹחֶלֶת
  chosen: expectation
  alternatives:
  - hope
  lexicon: HALOT
  rationale: The noun denotes expectation or hopeful waiting. 'Expectation' preserves
    a slight distinction from the second colon's תִקְוָה, allowing the Hebrew parallelism
    to retain some lexical variation in English while still conveying hopeful anticipation.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A substantival plural adjective referring to righteous persons. 'The
    righteous' is natural, concise, and preserves the proverbial class contrast with
    'the wicked.'
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy or gladness. 'Joy' is the most idiomatic and compact
    rendering in this proverb.
- source_word: תִקְוַת
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: This noun commonly means hope. Rendering it 'hope' gives a natural English
    expression and maintains the antithetical parallel with the righteous person's
    positive expectation.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A substantival plural adjective for wicked persons. 'The wicked' is the
    standard concise rendering in wisdom literature and matches the class-based contrast
    of the verse.
- source_word: תֹּאבֵד
  chosen: will perish
  alternatives:
  - will vanish
  - will come to nothing
  lexicon: HALOT
  rationale: From אבד, 'to perish, be lost, vanish.' 'Will perish' is a clear and
    sufficiently formal rendering for the future sense here, referring to the destruction
    of the wicked's hope rather than necessarily the persons themselves in this clause.
