theological_decisions:
- issue: Nature of the proverb's promise about longevity
  chosen_reading: Render as a general wisdom principle without making it an absolute
    guarantee.
  alternative_readings:
  - Treat as an unconditional promise of long life for every God-fearer and early
    death for every wicked person
  rationale: 'The Hebrew proverb states a general moral pattern: reverence for the
    LORD tends toward life, while wickedness tends toward shortened years. The translation
    preserves the straightforward wording without importing a mechanistic or exceptionless
    doctrine.'
  doctrine_reference: Preserve theological tension rather than resolve it.
