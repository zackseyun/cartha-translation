id: PRO.10.27
reference: Proverbs 10:27
source:
  edition: WLC
  text: יִרְאַ֣ת יְ֭הוָה תּוֹסִ֣יף יָמִ֑ים וּ/שְׁנ֖וֹת רְשָׁעִ֣ים תִּקְצֹֽרְנָה׃
translation:
  text: The fear of the LORD adds days, but the years of the wicked will be cut short.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prolongs days.' The Hebrew verb is literally 'adds,' with 'days' as
      its object.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  chosen: fear of
  alternatives:
  - reverence for
  - fear
  lexicon: HALOT
  rationale: Construct form of יִרְאָה with YHWH; in wisdom literature this denotes
    reverent fear toward God, but 'fear of' best preserves the Hebrew idiom and theological
    weight without reducing it to mere respect.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and common English Bible convention.
- source_word: תּוֹסִיף
  chosen: adds
  alternatives:
  - increases
  - prolongs
  lexicon: HALOT
  rationale: Hiphil of יסף means 'to add/increase.' 'Adds' is a natural English rendering
    that stays close to the verbal idea; 'prolongs' is interpretive and less directly
    tied to the object 'days.'
- source_word: יָמִים
  chosen: days
  alternatives:
  - length of days
  - long life
  lexicon: HALOT
  rationale: The Hebrew literally says 'days.' While the sense is longevity, retaining
    'days' preserves the proverb's concrete wording and parallelism with 'years' in
    the second colon.
- source_word: וּ/שְׁנ֖וֹת
  chosen: but the years of
  alternatives:
  - and the years of
  lexicon: HALOT
  rationale: The conjunction here introduces the contrasting second line of the proverb.
    In English, 'but' best conveys the adversative force implied by the poetic parallelism,
    even though waw is formally 'and.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard wisdom-literature term for morally evil persons. 'The wicked'
    is concise, idiomatic, and preserves the representative plural sense.
- source_word: תִּקְצֹרְנָה
  chosen: will be cut short
  alternatives:
  - will be shortened
  - will become few
  lexicon: HALOT
  rationale: Qal of קצר in the feminine plural agrees with 'years' and means 'to be
    short/shortened.' 'Will be cut short' is idiomatic English that clearly expresses
    the passive/resultative sense in context.
