id: PRO.10.10
reference: Proverbs 10:10
source:
  edition: WLC
  text: קֹ֣רֵֽץ עַ֭יִן יִתֵּ֣ן עַצָּ֑בֶת וֶ/אֱוִ֥יל שְׂ֝פָתַ֗יִם יִלָּבֵֽט׃
translation:
  text: Whoever winks the eye causes grief, and a fool of lips will come to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He who winks the eye causes sorrow, and a babbling fool will come to
      ruin.' The second clause is difficult; the Hebrew literally reads 'a fool of
      lips will come to ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵץ עַיִן
  chosen: Whoever winks the eye
  alternatives:
  - He who winks the eye
  - One who winks the eye
  - Whoever winks
  lexicon: HALOT
  rationale: The participle קֹרֵץ functions substantivally ('one who winks'), with
    עַיִן as its object. 'Whoever' gives natural English while preserving the generic
    force. Retaining 'the eye' reflects the Hebrew idiom more closely than simply
    'winks,' though the latter is a viable smoother alternative.
- source_word: יִתֵּן
  chosen: causes
  alternatives:
  - gives
  - brings
  lexicon: HALOT
  rationale: 'נתן literally means ''give,'' but in this collocation with עַצָּבֶת
    the idiomatic sense is causative: ''causes/brings grief.'' ''Causes'' is clearer
    modern English and fits optimal equivalence.'
- source_word: עַצָּבֶת
  chosen: grief
  alternatives:
  - sorrow
  - pain
  - vexation
  lexicon: HALOT
  rationale: The noun denotes pain, hurt, or sorrow. 'Grief' captures the emotional
    and relational harm implied in wisdom literature. 'Pain' could sound too physical;
    'vexation' is possible but less natural for modern readers.
- source_word: וֶאֱוִיל שְׂפָתַיִם
  chosen: and a fool of lips
  alternatives:
  - and a babbling fool
  - and a foolish talker
  - and a fool with his lips
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'a fool of lips,' an idiom for a fool
    characterized by his speech. This rendering preserves the metaphor and parallelism
    with the first colon better than a more interpretive paraphrase, while remaining
    intelligible.
- source_word: יִלָּבֵט
  chosen: will come to ruin
  alternatives:
  - will be ruined
  - will fall
  - will be overthrown
  lexicon: HALOT
  rationale: The Niphal of לבט is difficult and comparatively rare. In context and
    by ancient-version support, it conveys collapse, ruin, or being brought down.
    'Will come to ruin' is idiomatic English that preserves the resultative sense
    without overcommitting to a more specific image.
