id: PRO.10.4
reference: Proverbs 10:4
source:
  edition: WLC
  text: רָ֗אשׁ עֹשֶׂ֥ה כַף רְמִיָּ֑ה וְ/יַ֖ד חָרוּצִ֣ים תַּעֲשִֽׁיר־׃
translation:
  text: A slack hand makes one poor, but the hand of the diligent makes rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A deceitful hand makes poor'; the noun רְמִיָּה can elsewhere carry
      the sense of deceit, but in this labor proverb the context favors 'slack' or
      'lazy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשׁ
  chosen: poor
  alternatives:
  - poverty
  - destitute
  lexicon: HALOT
  rationale: 'In this proverb the adjective functions predicatively/resultatively
    with עֹשֶׂה: the one acting with a slack hand becomes poor. English idiom is clearer
    with ''makes one poor'' rather than the more wooden ''does poverty'' or ''is poor.''
    ''Poor'' best captures the socioeconomic result in parallel with ''makes rich.'''
- source_word: עֹשֶׂה
  chosen: makes
  alternatives:
  - does
  - produces
  - brings about
  lexicon: HALOT
  rationale: The participle of עשה here expresses causing or producing a result. 'Makes'
    is natural English and preserves the causal force linking the subject ('a slack
    hand') to the outcome ('poor').
- source_word: כַף
  chosen: hand
  alternatives:
  - palm
  lexicon: HALOT
  rationale: Though כַף can more specifically mean 'palm,' in this idiom it refers
    to the hand as the instrument of work. 'Hand' is the natural English equivalent
    in wisdom literature.
- source_word: רְמִיָּה
  chosen: slack
  alternatives:
  - deceitful
  - lazy
  - negligent
  lexicon: HALOT
  rationale: In this collocation with 'hand,' the sense is not moral deception but
    laxness or slackness in labor. 'Slack hand' preserves the Hebrew image while communicating
    laziness/negligence. 'Lazy hand' is possible, but 'slack' better reflects the
    noun's nuance of looseness/remissness.
- source_word: יָד
  chosen: the hand
  alternatives:
  - hand
  lexicon: HALOT
  rationale: The second colon repeats the body-part image for antithetical parallelism.
    Including 'the' yields idiomatic English while preserving the concrete metaphor.
- source_word: חָרוּצִים
  chosen: the diligent
  alternatives:
  - the industrious
  - the hard-working
  lexicon: HALOT
  rationale: The plural adjective/substantive denotes people marked by diligence.
    'The diligent' is concise, idiomatic, and preserves the proverbial contrast with
    the slack hand.
- source_word: תַּעֲשִׁיר
  chosen: makes rich
  alternatives:
  - enriches
  - brings wealth
  lexicon: HALOT
  rationale: 'The Hiphil of עשר is causative: to make rich/enrich. ''Makes rich''
    mirrors the first colon''s ''makes one poor'' and preserves the antithetical balance
    of the proverb.'
