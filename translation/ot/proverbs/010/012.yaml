id: PRO.10.12
reference: Proverbs 10:12
source:
  edition: WLC
  text: שִׂ֭נְאָה תְּעוֹרֵ֣ר מְדָנִ֑ים וְ/עַ֥ל כָּל פְּ֝שָׁעִ֗ים תְּכַסֶּ֥ה אַהֲבָֽה־׃
translation:
  text: Hatred stirs up conflicts, but love covers all transgressions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strife' instead of 'conflicts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'covers all transgressions'; the image is of love not exposing
      or perpetuating offenses.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂנְאָה
  chosen: Hatred
  alternatives:
  - hate
  lexicon: HALOT
  rationale: Abstract noun in subject position; 'hatred' is the natural English equivalent
    and preserves the proverb's contrast with 'love.'
- source_word: תְּעוֹרֵר
  chosen: stirs up
  alternatives:
  - arouses
  - awakens
  - provokes
  lexicon: HALOT
  rationale: Polel/imperfect 3fs from עור in a causative sense. 'Stirs up' is idiomatic
    modern English and fits the sense of actively inciting strife.
- source_word: מְדָנִים
  chosen: conflicts
  alternatives:
  - strife
  - contentions
  - quarrels
  lexicon: HALOT
  rationale: Plural noun denoting disputes or contentions. 'Conflicts' is readable
    modern English; 'strife' is traditional but slightly less natural for the target
    audience.
- source_word: וְ/עַל
  chosen: but
  alternatives:
  - and over
  - and upon
  lexicon: HALOT
  rationale: Although literally 'and/on, over,' in this antithetical proverb the conjunction-preposition
    introduces the contrasting second colon. Rendering the line as 'but love...' communicates
    the poetic contrast in natural English while preserving the sense relation.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' is the most idiomatic with the plural
    object 'transgressions.'
- source_word: פְּשָׁעִים
  chosen: transgressions
  alternatives:
  - offenses
  - rebellions
  - wrongs
  lexicon: HALOT
  rationale: פשׁע often denotes acts of offense or rebellion. 'Transgressions' preserves
    the moral weight without overinterpreting the exact social setting.
- source_word: תְּכַסֶּה
  chosen: covers
  alternatives:
  - conceals
  - overlooks
  lexicon: HALOT
  rationale: Piel/imperfect 3fs from כסה, literally 'cover.' 'Covers' preserves the
    metaphor and allows readers to infer the sense of not exposing or perpetuating
    offenses. More interpretive options like 'forgives' or 'overlooks' go beyond the
    lexical wording.
- source_word: אַהֲבָה
  chosen: love
  lexicon: HALOT
  rationale: Direct equivalent of the abstract noun; preserves the proverb's central
    ethical contrast.
