theological_decisions:
- issue: Meaning of 'love covers all transgressions'
  chosen_reading: Love does not keep stirring up or exposing offenses, but responds
    in a way that covers them.
  alternative_readings:
  - Love forgives all sins
  - Love conceals every wrongdoing regardless of justice
  rationale: The Hebrew uses the metaphor 'covers' rather than an explicit term for
    forgiveness. The translation preserves that metaphor and avoids importing either
    a narrower doctrinal claim about atonement or an unethical implication of hiding
    injustice. The proverb contrasts hatred's tendency to inflame disputes with love's
    tendency to absorb and not broadcast offenses.
  doctrine_reference: Preserve theological tension rather than resolve it.
