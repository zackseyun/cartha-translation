id: PRO.10.2
reference: Proverbs 10:2
source:
  edition: WLC
  text: לֹא י֭וֹעִילוּ אוֹצְר֣וֹת רֶ֑שַׁע וּ֝/צְדָקָ֗ה תַּצִּ֥יל מִ/מָּֽוֶת־׃
translation:
  text: Treasures gained by wickedness do not profit, but righteousness delivers from
    death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Treasures of wickedness do not profit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice delivers from death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: י֭וֹעִילוּ
  chosen: do not profit
  alternatives:
  - are of no benefit
  - do not help
  lexicon: HALOT
  rationale: Hiphil of יעל conveys being useful or beneficial. 'Do not profit' is
    concise, idiomatic, and preserves the proverbial force better than a more wooden
    'do not benefit.'
- source_word: אוֹצְר֣וֹת
  chosen: Treasures
  alternatives:
  - storehouses
  - treasuries
  - stored-up riches
  lexicon: HALOT
  rationale: In construct with רֶשַׁע, the noun refers to accumulated wealth/treasures
    rather than literal storage buildings. 'Treasures' fits English proverb style
    and the semantic sense of valuables amassed.
- source_word: רֶ֑שַׁע
  chosen: gained by wickedness
  alternatives:
  - of wickedness
  - wicked treasures
  - treasures of wickedness
  lexicon: HALOT
  rationale: The construct phrase literally reads 'treasures of wickedness.' In English,
    'gained by wickedness' makes explicit the likely genitival sense—wealth acquired
    through evil—without over-paraphrasing. This is a natural optimal-equivalence
    rendering of the Hebrew construct.
- source_word: וּ֝/צְדָקָ֗ה
  chosen: but righteousness
  alternatives:
  - and righteousness
  - but justice
  lexicon: HALOT
  rationale: The prefixed conjunction is formally 'and,' but Hebrew poetry commonly
    uses waw adversatively in antithetical parallelism; 'but' best reflects the proverb's
    contrast. For צְדָקָה, 'righteousness' is the default rendering in the doctrine
    guidance and fits wisdom literature's moral sense; 'justice' is possible but less
    likely here.
- source_word: תַּצִּ֥יל
  chosen: delivers
  alternatives:
  - rescues
  - saves
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away, rescue, or deliver. 'Delivers' is
    idiomatic, dignified, and broad enough to preserve the proverb's scope without
    importing specifically soteriological overtones that 'saves' might suggest.
- source_word: מִ/מָּֽוֶת
  chosen: from death
  alternatives:
  - from mortal danger
  - from dying
  lexicon: HALOT
  rationale: The preposition מן with 'death' is straightforwardly rendered 'from death.'
    The phrase may include both literal and figurative dimensions in wisdom literature,
    so the simple wording preserves that theological and literary breadth.
