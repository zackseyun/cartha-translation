- issue: Rendering of צְדָקָה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt lists 'righteousness' as the default rendering for
    cognate terms where theological weight is present. In this wisdom context, 'righteousness'
    best captures upright moral conduct contrasted with wickedly gained wealth, while
    still allowing the broader sense of just living.
