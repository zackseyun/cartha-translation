id: PRO.10.14
reference: Proverbs 10:14
source:
  edition: WLC
  text: חֲכָמִ֥ים יִצְפְּנוּ דָ֑עַת וּ/פִֽי אֱ֝וִיל מְחִתָּ֥ה קְרֹבָֽה־־׃
translation:
  text: Wise men store up knowledge, but the mouth of a fool is near ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The wise store up knowledge, and the mouth of a fool brings near ruin.'
      The Hebrew conjunction can be read as either simple 'and' or adversative 'but';
      the context favors contrast.
    reason: lexical_alternative
  - marker: b
    text: '''Store up'' may also be rendered ''treasure up'' or ''hide,'' conveying
      the prudent preservation of knowledge.'
    reason: lexical_alternative
  - marker: c
    text: '''Ruin'' may also be translated ''destruction'' or ''dismay/terror,'' depending
      on how מְחִתָּה is understood in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכָמִים
  chosen: Wise men
  alternatives:
  - The wise
  - Wise people
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning 'wise ones.' Rendered 'Wise men'
    to reflect the grammatically masculine plural in keeping with the gender-accurate
    policy, while still functioning proverbially/generically.
- source_word: יִצְפְּנוּ
  chosen: store up
  alternatives:
  - treasure up
  - hide
  - lay up
  lexicon: HALOT
  rationale: From צפן, 'to hide, store, treasure.' In wisdom context the sense is
    not concealment for deception but prudent accumulation/preservation of knowledge;
    'store up' is natural modern English and preserves the metaphor.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: Standard gloss for דעת in Proverbs. 'Knowledge' fits the wisdom-literature
    contrast with foolish speech and maintains consistency with common usage in the
    book.
- source_word: וּפִי
  chosen: but the mouth of
  alternatives:
  - and the mouth of
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but in Hebrew proverb
    parallelism it often carries adversative force. Here the second colon contrasts
    the wise with the fool, so 'but' best communicates the relationship in English.
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - the fool
  - a stubborn fool
  lexicon: HALOT
  rationale: Common wisdom term for a morally dull or obstinate fool. 'A fool' is
    idiomatic in English proverbial style and preserves the singular representative
    sense.
- source_word: מְחִתָּה
  chosen: ruin
  alternatives:
  - destruction
  - terror
  - dismay
  lexicon: HALOT
  rationale: The noun can denote ruin, destruction, or dismay/terror depending on
    context. In this proverb, paired with the fool's mouth and modified by 'near,'
    the sense is impending calamity/destruction rather than an internal emotion; 'ruin'
    is concise and readable.
- source_word: קְרֹבָה
  chosen: is near
  alternatives:
  - is imminent
  - comes near
  lexicon: HALOT
  rationale: Predicate adjective meaning 'near.' 'Is near' preserves the Hebrew image
    of impending danger without overinterpreting the exact timing.
