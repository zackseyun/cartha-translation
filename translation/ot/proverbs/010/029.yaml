id: PRO.10.29
reference: Proverbs 10:29
source:
  edition: WLC
  text: מָע֣וֹז לַ֭/תֹּם דֶּ֣רֶךְ יְהוָ֑ה וּ֝/מְחִתָּ֗ה לְ/פֹ֣עֲלֵי אָֽוֶן׃
translation:
  text: The way of the LORD is a stronghold for the blameless, but destruction for
    those who do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD's way' or 'the path of the LORD'; the Hebrew may refer both
      to the LORD's own way of acting and to the way he sets before people.
    reason: lexical_alternative
  - marker: b
    text: Or 'ruin' or 'terror' for 'destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - refuge
  - fortress
  - strength
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of protection/strength. 'Stronghold'
    preserves the concrete metaphor and reads naturally in English. 'Refuge' is possible
    but slightly softer; 'strength' is more abstract than the Hebrew image.
- source_word: לַתֹּם
  chosen: for the blameless
  alternatives:
  - for integrity
  - to the innocent
  - for the upright
  lexicon: HALOT
  rationale: The noun תֹּם refers to integrity, completeness, or blamelessness. In
    this construction, rendering it personally ('for the blameless') fits the proverb's
    contrast with 'those who do evil' and communicates the ethical category clearly.
- source_word: דֶּרֶךְ יְהוָה
  chosen: the way of the LORD
  alternatives:
  - the LORD's way
  - the path of the LORD
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the way of the LORD.'
    It may denote either the way the LORD walks/acts or the way he prescribes; the
    proverb likely exploits that breadth, so a literal rendering best preserves the
    ambiguity. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Following the project's contested-terms policy, the divine name is rendered
    'the LORD' rather than transliterated.
- source_word: וּמְחִתָּה
  chosen: but destruction
  alternatives:
  - but ruin
  - but terror
  - and destruction
  lexicon: HALOT
  rationale: מְחִתָּה denotes ruin, destruction, or dismay. 'Destruction' best matches
    the antithesis with 'stronghold.' The conjunction ו is rendered adversatively
    as 'but' because the proverb sets up a sharp contrast between the righteous and
    evildoers.
- source_word: לְפֹעֲלֵי אָוֶן
  chosen: for those who do evil
  alternatives:
  - for workers of iniquity
  - for evildoers
  - for those who practice wickedness
  lexicon: HALOT
  rationale: The phrase literally means 'for doers/workers of trouble/wickedness.'
    'Those who do evil' is clear modern English and preserves the verbal force of
    פֹעֲלֵי. 'Workers of iniquity' is more traditional but less natural for the target
    audience.
- source_word: אָוֶן
  chosen: evil
  alternatives:
  - wickedness
  - trouble
  - iniquity
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or harmful wrongdoing. In this
    ethical contrast with תֹּם, 'evil' best captures the moral sense in accessible
    English.
