theological_decisions:
- issue: Semantic scope of 'the way of the LORD'
  chosen_reading: Retain the broader phrase without specifying whether it means the
    LORD's own way of acting or the way he prescribes for humans.
  alternative_readings:
  - the LORD's conduct/action
  - the way the LORD commands
  rationale: The Hebrew construct can naturally bear either nuance, and wisdom literature
    often benefits from such layered meaning. Preserving the phrase avoids importing
    a narrower doctrinal interpretation than the text itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
