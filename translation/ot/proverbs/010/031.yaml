id: PRO.10.31
reference: Proverbs 10:31
source:
  edition: WLC
  text: פִּֽי צַ֭דִּיק יָנ֣וּב חָכְמָ֑ה וּ/לְשׁ֥וֹן תַּ֝הְפֻּכ֗וֹת תִּכָּרֵֽת־׃
translation:
  text: The mouth of the righteous bears wisdom as fruit, but the tongue of perversities
    will be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brings forth wisdom.' The Hebrew verb evokes sprouting or bearing fruit.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tongue of perversity' or 'the perverse tongue.' The Hebrew plural
      may emphasize repeated twisted speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  chosen: mouth
  alternatives:
  - mouth of
  - speech of
  lexicon: HALOT
  rationale: Literal 'mouth' is retained as the concrete source of speech, fitting
    Hebrew wisdom style and the construct phrase 'mouth of the righteous.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: Rendered substantivally as 'the righteous' to reflect the singular adjective
    used as a class representative in Proverbs, avoiding an unnecessary gendered singular
    while preserving the moral category.
- source_word: יָנוּב
  chosen: bears ... as fruit
  alternatives:
  - brings forth
  - produces
  - buds
  lexicon: HALOT
  rationale: The verb commonly denotes sprouting or bearing fruit. 'Bears ... as fruit'
    preserves the organic metaphor more clearly than the flatter 'produces' while
    remaining natural English.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - wise speech
  lexicon: HALOT
  rationale: The direct object is the abstract noun 'wisdom'; no expansion is needed.
    The metaphor implies speech characterized by wisdom, but the text itself says
    'wisdom.'
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: Literal 'tongue' is a standard Hebrew metonym for speech and pairs well
    antithetically with 'mouth' in the first colon.
- source_word: תַּהְפֻּכוֹת
  chosen: perversities
  alternatives:
  - perversity
  - crookedness
  - deceit
  lexicon: HALOT
  rationale: The plural noun conveys twisted or perverse things/speech. 'Perversities'
    preserves the plural and the sense of moral distortion better than the singular
    abstraction.
- source_word: תִּכָּרֵת
  chosen: will be cut off
  alternatives:
  - will be cut out
  - will be removed
  - will be silenced
  lexicon: HALOT
  rationale: The Niphal of כרת is well rendered 'be cut off.' This preserves the severity
    and passive sense without over-interpreting whether the tongue is silenced, destroyed,
    or removed.
