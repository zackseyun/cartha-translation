id: PRO.10.32
reference: Proverbs 10:32
source:
  edition: WLC
  text: שִׂפְתֵ֣י צַ֭דִּיק יֵדְע֣וּ/ן רָצ֑וֹן וּ/פִ֥י רְ֝שָׁעִ֗ים תַּהְפֻּכֽוֹת׃
translation:
  text: The lips of the righteous know what is acceptable, but the mouth of the wicked
    speaks perversity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is pleasing' or 'favor.' The Hebrew noun can denote favor, goodwill,
      or what is acceptable/fitting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'but the mouth of the wicked—perversities/perverse things';
      the English verb 'speaks' is supplied for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  chosen: the lips of
  alternatives:
  - the speech of
  lexicon: HALOT
  rationale: A literal body-part expression is natural in English wisdom literature
    and preserves the poetic parallel with 'mouth' in the second colon. 'Speech of'
    is interpretive and less vivid.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The singular adjective functions generically. 'The righteous' preserves
    the representative force without unnecessarily narrowing to an individual male,
    fitting the proverb's class-based contrast.
- source_word: יֵדְעוּן
  chosen: know
  alternatives:
  - understand
  - know how to speak
  lexicon: HALOT
  rationale: The verb is the common 'know.' In context it implies discernment in speech,
    but the translation keeps the lexical core rather than paraphrasing the implication.
- source_word: רָצוֹן
  chosen: what is acceptable
  alternatives:
  - favor
  - what is pleasing
  - goodwill
  lexicon: HALOT
  rationale: Here the noun most naturally denotes what is pleasing or fitting in speech.
    'What is acceptable' captures the object of discernment without restricting it
    to divine favor alone. A more literal 'favor' is possible but less clear in English.
- source_word: וּפִי
  chosen: but the mouth of
  alternatives:
  - but the speech of
  lexicon: HALOT
  rationale: The conjunction marks contrast, and 'mouth' preserves the concrete poetic
    parallel with 'lips.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering in Proverbs for the morally corrupt class. 'The
    wicked' is concise and idiomatic.
- source_word: תַּהְפֻּכוֹת
  chosen: perversity
  alternatives:
  - perverse things
  - crookedness
  - deceit
  lexicon: HALOT
  rationale: The noun denotes twisted or perverse speech. 'Perversity' gives a compact
    abstract noun matching the Hebrew plural of quality/function in context. Because
    English often prefers an explicit verb here, 'speaks perversity' makes the predicate
    natural while preserving the noun's sense.
