id: PRO.4.1
reference: Proverbs 4:1
source:
  edition: WLC
  text: שִׁמְע֣וּ בָ֭נִים מ֣וּסַר אָ֑ב וְ֝/הַקְשִׁ֗יבוּ לָ/דַ֥עַת בִּינָֽה׃
translation:
  text: Hear, sons, a father's instruction, and pay attention so as to know understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children.” The Hebrew says “sons,” preserving the father-to-son framing
      typical of Proverbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural from שׁמע, calling for attentive hearing/obedience.
    'Hear' preserves the concise imperative force and common wisdom-literature idiom
    better than the more interpretive 'listen.'
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: Masculine plural noun meaning 'sons.' In Proverbs this often addresses
    a pedagogical audience in filial terms. Per gender-accurate philosophy, 'sons'
    is retained rather than neutralizing to 'children,' though the representative
    force could be noted as broader.
- source_word: מוּסַר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסַר in wisdom literature can denote discipline, correction, or instruction
    formed through discipline. 'Instruction' fits the immediate didactic context and
    reads naturally in English, while still preserving the formative sense.
- source_word: אָב
  chosen: a father's
  alternatives:
  - of a father
  - my father’s
  lexicon: HALOT
  rationale: The construct phrase מוּסַר אָב is indefinite in Hebrew. 'A father's
    instruction' is the most natural English rendering. 'My father's' would import
    specificity not present in this verse.
- source_word: וְהַקְשִׁיבוּ
  chosen: and pay attention
  alternatives:
  - and listen attentively
  - and give heed
  lexicon: HALOT
  rationale: Imperative plural from קשׁב, stronger than mere hearing and implying
    focused attention. 'Pay attention' is idiomatic modern English and distinguishes
    it from the first imperative.
- source_word: לָדַעַת
  chosen: so as to know
  alternatives:
  - to know
  - for knowing
  lexicon: HALOT
  rationale: Infinitive construct with ל expressing purpose/result. 'So as to know'
    makes the purposive nuance explicit in natural English.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: A key wisdom term denoting understanding/discernment. 'Understanding'
    is the broad, standard rendering and pairs well with the pedagogical context.
