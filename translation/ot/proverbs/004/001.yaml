theological_decisions:
- issue: Gendered address in wisdom instruction
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew is explicitly masculine plural and framed as filial instruction.
    Following the project's gender-accurate policy, the masculine form is preserved
    rather than neutralized, while recognizing that the wisdom teaching may have broader
    representative application.
