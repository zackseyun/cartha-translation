id: PRO.4.20
reference: Proverbs 4:20
source:
  edition: WLC
  text: בְּ֭נִ/י לִ/דְבָרַ֣/י הַקְשִׁ֑יבָ/ה לַ֝/אֲמָרַ֗/י הַט אָזְנֶֽ/ךָ־׃
translation:
  text: My son, pay attention to my words; incline your ear to my sayings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen attentively to my words.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'incline your ear,' an idiom meaning to listen carefully.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from a father/teacher to a male son in the immediate
    literary setting. Per gender-accurate policy, the masculine singular is preserved
    rather than neutralized.
- source_word: לִדְבָרַי
  chosen: to my words
  alternatives:
  - to my speech
  - to my matters
  lexicon: HALOT
  rationale: דבר commonly denotes words/speech; here the plural with 1cs suffix refers
    to the speaker's instruction. 'Words' is the most natural and sufficiently formal
    rendering in parallel with the next colon.
- source_word: הַקְשִׁיבָה
  chosen: pay attention
  alternatives:
  - listen attentively
  - give heed
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב calls for active, careful listening. 'Pay attention'
    captures the idiomatic force in modern English better than the more wooden 'give
    heed,' while retaining the imperative sense.
- source_word: לַאֲמָרַי
  chosen: to my sayings
  alternatives:
  - to my words
  - to my utterances
  lexicon: HALOT
  rationale: אמרים overlaps with דברים but is kept distinct in English to preserve
    the Hebrew poetic parallelism without flattening both cola into identical wording.
    'Sayings' is idiomatic in wisdom literature.
- source_word: הַט
  chosen: incline
  alternatives:
  - turn
  - bend
  lexicon: HALOT
  rationale: Imperative of נטה with 'ear' is a conventional idiom for attentive listening.
    'Incline' preserves the metaphor and the elevated but still readable wisdom-register.
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: The Hebrew singular is retained. In English, 'incline your ear' is a
    conventional singular idiom matching the source closely.
