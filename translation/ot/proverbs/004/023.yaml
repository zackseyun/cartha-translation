id: PRO.4.23
reference: Proverbs 4:23
source:
  edition: WLC
  text: מִֽ/כָּל מִ֭שְׁמָר נְצֹ֣ר לִבֶּ֑/ךָ כִּֽי מִ֝מֶּ֗/נּוּ תּוֹצְא֥וֹת חַיִּֽים־־׃
translation:
  text: Guard your heart above all guarding, for from it are the springs of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Guard your heart more than anything you guard.' The Hebrew literally
      says 'above all guarding, guard your heart,' emphasizing supreme vigilance.
    reason: lexical_alternative
  - marker: b
    text: Or 'for from it are the sources/outgoings of life.' Traditional English
      'issues of life' reflects the same Hebrew expression but is less clear in modern
      usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל
  chosen: above all
  alternatives:
  - more than all
  - from all
  lexicon: HALOT
  rationale: 'With the following noun מִשְׁמָר, the preposition מן has a comparative/superlative
    force: ''more than every kind of guarding'' or ''above all else that is guarded.''
    ''Above all'' communicates priority naturally in English while preserving the
    comparative sense.'
- source_word: מִשְׁמָר
  chosen: guarding
  alternatives:
  - guard
  - keeping
  - watch
  lexicon: HALOT
  rationale: The noun denotes guarding/keeping/watchfulness. Rendering it as 'guarding'
    preserves the wordplay with the following imperative נְצֹר ('guard!'). 'Above
    all guarding' keeps the Hebrew's rhetorical emphasis better than smoothing to
    'above all else.'
- source_word: נְצֹר
  chosen: Guard
  alternatives:
  - keep
  - watch over
  lexicon: HALOT
  rationale: The imperative calls for active protection or careful keeping. 'Guard'
    matches the semantic field of מִשְׁמָר and yields a concise, forceful English
    imperative.
- source_word: לִבֶּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the center of thought, will, and affections,
    not merely emotion. The literal rendering should be retained rather than interpreted
    away.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is idiomatic and preserves
    the explanatory connection.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  - from the heart
  lexicon: HALOT
  rationale: The suffix refers back to 'heart' (masculine noun in Hebrew). English
    naturally uses 'it' for the organ/metaphorical center. 'From it' preserves the
    source syntax and avoids over-expansion.
- source_word: תּוֹצְאוֹת
  chosen: springs
  alternatives:
  - outgoings
  - sources
  - issues
  lexicon: HALOT
  rationale: The noun can denote goings out, outlets, or sources. In context with
    'life,' 'springs' captures the image of life flowing out from the heart and is
    clearer in modern English than the traditional but opaque 'issues.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as an abstract
    singular meaning 'life.' Singular English is the natural equivalent here.
