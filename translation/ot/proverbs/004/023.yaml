theological_decisions:
- issue: Anthropological sense of 'heart'
  chosen_reading: Retain 'heart' literally as the center of inner life, without reducing
    it to emotions alone.
  alternative_readings:
  - mind
  - inner self
  rationale: The proverb speaks in standard Hebrew anthropological language. Translating
    'heart' literally preserves the text's conceptual world and avoids narrowing its
    scope.
  doctrine_reference: Translation philosophy §1, §6
