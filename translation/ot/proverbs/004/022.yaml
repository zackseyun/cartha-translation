theological_decisions:
- issue: Generic masculine singular in proverbial discourse
  chosen_reading: Retain 'his flesh' in the main text
  alternative_readings:
  - their flesh
  - the whole body
  rationale: The Hebrew uses a singular masculine suffix in a generic proverb. Per
    the doctrine's gender-accurate policy, the translation preserves the source's
    grammatical form and representative force rather than flattening it into a plural
    or more interpretive paraphrase.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Literal versus interpretive rendering of בָּשָׂר
  chosen_reading: Render as 'flesh'
  alternative_readings:
  - body
  rationale: The Hebrew term is literally 'flesh.' Although the sense is bodily well-being,
    the text does not require a more interpretive rendering. Preserving 'flesh' maintains
    lexical transparency while remaining understandable in context.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 5
