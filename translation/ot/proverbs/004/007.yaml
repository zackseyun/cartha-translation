id: PRO.4.7
reference: Proverbs 4:7
source:
  edition: WLC
  text: רֵאשִׁ֣ית חָ֭כְמָה קְנֵ֣ה חָכְמָ֑ה וּ/בְ/כָל קִ֝נְיָנְ/ךָ֗ קְנֵ֣ה בִינָֽה־׃
translation:
  text: 'The beginning of wisdom is this: acquire wisdom, and with all you acquire,
    acquire understanding.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Wisdom is the principal thing; therefore acquire wisdom,' preserving
      רֵאשִׁית in the sense of 'chief' or 'first importance.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'with all your acquisition' or 'with all your possessions'; the wording
      likely plays on the repeated verb 'acquire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the beginning of
  alternatives:
  - the first thing
  - the principal thing
  - the sum of
  lexicon: HALOT
  rationale: רֵאשִׁית commonly denotes beginning, first, or chief part. Here it introduces
    a terse wisdom saying. 'The beginning of' preserves the Hebrew form and allows
    the following clause to explain what that beginning entails.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs, referring to practical and
    moral wisdom rather than mere intelligence.
- source_word: קְנֵה
  chosen: acquire
  alternatives:
  - get
  - buy
  - obtain
  lexicon: HALOT
  rationale: The imperative of קנה can mean buy, acquire, or get. 'Acquire' communicates
    intentional obtaining without sounding colloquial like 'get' or overly commercial
    like 'buy,' while fitting the parallel with קִנְיָן ('what you acquire/possessions').
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Repeated for emphasis in the Hebrew; retained in English to preserve
    the rhetorical force.
- source_word: וּבְכָל
  chosen: and with all
  alternatives:
  - and in all
  - and for all
  lexicon: HALOT
  rationale: The conjunction plus preposition and quantifier is best represented as
    'and with all,' introducing the means or cost associated with the next imperative.
- source_word: קִנְיָנְךָ
  chosen: you acquire
  alternatives:
  - your possessions
  - your wealth
  - your getting
  lexicon: HALOT
  rationale: From the cognate noun of קנה, it can denote acquisition, possessions,
    or wealth. 'All you acquire' preserves the wordplay with קְנֵה and avoids narrowing
    the sense to money alone, while still conveying total investment.
- source_word: קְנֵה
  chosen: acquire
  alternatives:
  - get
  - buy
  - obtain
  lexicon: HALOT
  rationale: Repeated imperative retained for emphasis and parallelism.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בִינָה in wisdom literature often denotes discernment or understanding.
    'Understanding' is the most natural and broadly accurate English equivalent here.
