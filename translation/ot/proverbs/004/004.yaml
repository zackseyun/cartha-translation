id: PRO.4.4
reference: Proverbs 4:4
source:
  edition: WLC
  text: וַ/יֹּרֵ֗/נִי וַ/יֹּ֥אמֶר לִ֗/י יִֽתְמָךְ דְּבָרַ֥/י לִבֶּ֑/ךָ שְׁמֹ֖ר מִצְוֺתַ֣/י
    וֶֽ/חְיֵֽה־׃
translation:
  text: Then he taught me and said to me, “Let your heart hold fast my words; keep
    my commandments and live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let your heart retain my words.”
    reason: lexical_alternative
  - marker: b
    text: In Hebrew, “heart” often includes thought, will, and understanding, not
      only emotion.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּרֵנִי
  chosen: he taught me
  alternatives:
  - he instructed me
  - he directed me
  lexicon: HALOT
  rationale: From ירה in the Hiphil, here meaning to teach/instruct. 'Taught' is natural
    modern English and fits the father-to-son wisdom setting better than the more
    wooden 'instructed,' while preserving the pedagogical sense.
- source_word: וַיֹּאמֶר לִי
  chosen: and said to me
  alternatives:
  - and told me
  lexicon: HALOT
  rationale: Standard rendering of אמר with indirect object. 'Said to me' preserves
    the direct speech introduction without adding interpretive nuance.
- source_word: יִתְמָךְ
  chosen: hold fast
  alternatives:
  - retain
  - support
  - grasp firmly
  lexicon: HALOT
  rationale: From תמך, 'to hold, support, uphold.' With 'your heart' as subject and
    'my words' as object, the sense is that the heart should firmly retain or cling
    to the words. 'Hold fast' captures both firmness and internal retention better
    than the less vivid 'retain.'
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my sayings
  - my words of instruction
  lexicon: HALOT
  rationale: A straightforward rendering of דברים with first-person suffix. 'Words'
    is broad and faithful; 'sayings' is possible but narrower.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner being
  lexicon: HALOT
  rationale: Hebrew לב commonly denotes the inner person, including thought and will,
    but 'heart' is the standard and most transparent biblical rendering. It preserves
    the Hebrew anthropology without reduction to mere emotion or intellect.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: From שמר, often used for keeping commandments. 'Keep' is idiomatic in
    English biblical style and naturally pairs with 'commandments.' 'Guard' is possible
    but less idiomatic here.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  - my instruction
  lexicon: HALOT
  rationale: מצוה refers to commands/commandments. 'Commandments' preserves the authoritative
    and covenantal tone of the term better than the lighter 'commands.'
- source_word: וֶחְיֵה
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: 'Imperative of חיה with prefixed conjunction. In context it functions
    as a direct exhortation-result pair: ''keep ... and live.'' This preserves the
    compact Hebrew style without over-interpreting the conjunction as explicitly purposive
    or predictive.'
