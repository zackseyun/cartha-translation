id: PRO.4.12
reference: Proverbs 4:12
source:
  edition: WLC
  text: בְּֽ֭/לֶכְתְּ/ךָ לֹא יֵצַ֣ר צַעֲדֶ֑/ךָ וְ/אִם תָּ֝ר֗וּץ לֹ֣א תִכָּשֵֽׁל־־׃
translation:
  text: When you walk, your step will not be hindered; and if you run, you will not
    stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your step will not be cramped/restricted.' The Hebrew verb conveys the
      idea of being narrowed or constrained.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתְּךָ
  chosen: When you walk
  alternatives:
  - In your walking
  - As you go
  lexicon: HALOT
  rationale: 'Infinitive construct of הלך with prefixed ב and 2ms suffix functions
    temporally: ''when you walk'' or ''as you go.'' ''When you walk'' is natural English
    and preserves the conditional-temporal sense.'
- source_word: יֵצַר
  chosen: will be hindered
  alternatives:
  - will be cramped
  - will be restricted
  - will be narrow
  lexicon: HALOT
  rationale: From צרר/צר in the sense of being narrow or constrained. With 'your step'
    as subject/object relation, the idiom means one's movement is not restricted.
    'Will be hindered' communicates the sense clearly in modern English without over-literal
    awkwardness.
- source_word: צַעֲדֶךָ
  chosen: your step
  alternatives:
  - your stride
  - your steps
  lexicon: HALOT
  rationale: Singular noun with 2ms suffix. English singular 'your step' works idiomatically
    as a collective/path image. 'Stride' is possible but slightly more interpretive;
    'steps' would smooth the singular.
- source_word: וְאִם
  chosen: and if
  alternatives:
  - and when
  - even if
  lexicon: HALOT
  rationale: Simple conjunction plus conditional particle. 'And if' preserves the
    Hebrew linkage and conditional form better than the more interpretive 'and when.'
- source_word: תָּרוּץ
  chosen: you run
  alternatives:
  - you hurry
  - you race
  lexicon: HALOT
  rationale: רץ commonly means 'run.' No contextual reason to weaken or intensify
    it.
- source_word: תִכָּשֵׁל
  chosen: you will not stumble
  alternatives:
  - you will not fall
  - you will not trip
  lexicon: HALOT
  rationale: Nifal of כשל commonly denotes stumbling, often literally and metaphorically.
    'Stumble' preserves the wisdom-path imagery and allows both physical and moral
    resonance without over-specifying.
