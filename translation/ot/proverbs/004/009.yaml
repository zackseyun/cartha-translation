id: PRO.4.9
reference: Proverbs 4:9
source:
  edition: WLC
  text: תִּתֵּ֣ן לְ֭/רֹאשְׁ/ךָ לִוְיַת חֵ֑ן עֲטֶ֖רֶת תִּפְאֶ֣רֶת תְּמַגְּנֶֽ/ךָּ־׃
translation:
  text: She will place on your head a graceful wreath; she will bestow on you a crown
    of beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a garland of grace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a crown of splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  chosen: she will place
  alternatives:
  - she will give
  - she will set
  lexicon: HALOT
  rationale: Qal imperfect 3fs of נתן, with wisdom as the feminine subject from the
    context. 'Place' fits the idiom with 'on your head' more naturally than the more
    general 'give,' while preserving the concrete imagery.
- source_word: לְרֹאשְׁךָ
  chosen: on your head
  alternatives:
  - to your head
  - for your head
  lexicon: HALOT
  rationale: The preposition ל with 'head' in this adornment context is best rendered
    idiomatically in English as 'on your head.'
- source_word: לִוְיַת
  chosen: wreath
  alternatives:
  - garland
  - chaplet
  lexicon: HALOT
  rationale: The noun denotes a wreath or garland worn as an ornament. 'Wreath' is
    clear modern English and preserves the image without sounding archaic.
- source_word: חֵן
  chosen: graceful
  alternatives:
  - of grace
  - gracious
  - favor
  lexicon: HALOT
  rationale: חן can denote grace, charm, or favor. In construct with 'wreath,' an
    attributive rendering ('graceful wreath') is natural English and conveys the ornamental
    attractiveness in context.
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - diadem
  lexicon: HALOT
  rationale: A standard rendering for the ornamental headpiece imagery. 'Crown' is
    both accurate and readily understood.
- source_word: תִּפְאֶרֶת
  chosen: beauty
  alternatives:
  - splendor
  - glory
  - honor
  lexicon: HALOT
  rationale: The term can mean beauty, splendor, or glory. In parallel with 'graceful
    wreath' and in the context of adornment, 'beauty' best captures the aesthetic
    sense in natural English.
- source_word: תְּמַגְּנֶךָּ
  chosen: she will bestow on you
  alternatives:
  - she will deliver to you
  - she will hand to you
  - she will shield you
  lexicon: HALOT
  rationale: Piel imperfect 3fs + 2ms suffix from מגן/מגן in the sense 'hand over,
    deliver, bestow.' In this parallel line, the sense is giving/presenting a crown,
    not 'shielding.' 'Bestow on you' matches the elevated poetic register and the
    benefactive force.
