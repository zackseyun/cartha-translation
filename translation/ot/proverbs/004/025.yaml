id: PRO.4.25
reference: Proverbs 4:25
source:
  edition: WLC
  text: עֵ֭ינֶי/ךָ לְ/נֹ֣כַח יַבִּ֑יטוּ וְ֝/עַפְעַפֶּ֗י/ךָ יַיְשִׁ֥רוּ נֶגְדֶּֽ/ךָ׃
translation:
  text: Let your eyes look straight ahead, and let your eyelids be directed right
    before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let your eyelids be straight before you.' The Hebrew verb can more literally
      express straightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your eye
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix; the natural English rendering is plural,
    matching the Hebrew body-part idiom.
- source_word: לְנֹכַח
  chosen: straight ahead
  alternatives:
  - directly
  - in front
  - straight
  lexicon: HALOT
  rationale: The prepositional phrase conveys what is directly in front of someone.
    'Straight ahead' is idiomatic modern English and fits the wisdom context of focused
    moral direction.
- source_word: יַבִּיטוּ
  chosen: look
  alternatives:
  - gaze
  - regard
  lexicon: HALOT
  rationale: From נבט, 'to look, regard.' 'Look' is the clearest modern equivalent;
    'gaze' would add intensity not required by the verb.
- source_word: וְעַפְעַפֶּיךָ
  chosen: your eyelids
  alternatives:
  - your glance
  - your eyes
  lexicon: HALOT
  rationale: The Hebrew specifically names the eyelids, a poetic parallel to 'eyes.'
    Retaining 'eyelids' preserves the concrete imagery rather than flattening the
    parallelism.
- source_word: יַיְשִׁרוּ
  chosen: be directed right
  alternatives:
  - be straight
  - go straight
  - be fixed straight
  lexicon: HALOT
  rationale: From ישר, conveying straightness/uprightness. In this context of visual
    focus, an English passive-like expression 'be directed right' communicates the
    sense that one's gaze is set straight, while preserving the moral undertone of
    straightness.
- source_word: נֶגְדֶּךָ
  chosen: before you
  alternatives:
  - in front of you
  - opposite you
  lexicon: HALOT
  rationale: The term denotes what is in front of or before someone. 'Before you'
    is concise and natural in parallel with 'straight ahead.'
