id: PRO.4.11
reference: Proverbs 4:11
source:
  edition: WLC
  text: בְּ/דֶ֣רֶךְ חָ֭כְמָה הֹרֵתִ֑י/ךָ הִ֝דְרַכְתִּ֗י/ךָ בְּ/מַעְגְּלֵי יֹֽשֶׁר־׃
translation:
  text: I have instructed you in the way of wisdom; I have led you in paths of uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paths of straightness.' The Hebrew noun can evoke both literal straightness
      and moral uprightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/דֶרֶךְ חָכְמָה
  chosen: in the way of wisdom
  alternatives:
  - in a way of wisdom
  - on the path of wisdom
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way, road, path' and often carries a metaphorical
    sense of manner or course of life in Proverbs. 'Way of wisdom' preserves the metaphor
    and the construct-like relationship with חָכְמָה without over-paraphrasing.
- source_word: הֹרֵתִיךָ
  chosen: I have instructed you
  alternatives:
  - I have taught you
  - I have shown you
  lexicon: HALOT
  rationale: From ירה in the Hiphil, commonly 'teach, instruct, direct.' 'Instructed'
    fits wisdom-literature pedagogy and pairs well with the following verb of guidance.
    The perfect is rendered with English present perfect to reflect completed instruction
    with present relevance.
- source_word: הִדְרַכְתִּיךָ
  chosen: I have led you
  alternatives:
  - I have guided you
  - I have caused you to tread
  lexicon: HALOT
  rationale: From דרך in the Hiphil, meaning to lead or guide along a way. 'Led' is
    natural English and preserves the movement imagery. 'Caused you to tread' is more
    wooden than the context requires.
- source_word: בְּ/מַעְגְּלֵי
  chosen: in paths of
  alternatives:
  - in tracks of
  - in courses of
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track, path, or course. 'Paths' is idiomatic and
    suits the parallelism with 'way' in the first colon while preserving the plural.
- source_word: יֹשֶׁר
  chosen: uprightness
  alternatives:
  - straightness
  - rectitude
  lexicon: HALOT
  rationale: יֹשֶׁר denotes straightness in both literal and moral senses, often ethical
    uprightness. 'Uprightness' best conveys the moral sense in Proverbs. 'Straightness'
    is possible and preserves the image, but in English it can sound less clearly
    ethical.
