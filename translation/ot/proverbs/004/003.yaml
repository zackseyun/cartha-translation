id: PRO.4.3
reference: Proverbs 4:3
source:
  edition: WLC
  text: כִּי בֵ֭ן הָיִ֣יתִי לְ/אָבִ֑/י רַ֥ךְ וְ֝/יָחִ֗יד לִ/פְנֵ֥י אִמִּֽ/י־׃
translation:
  text: For I was a son to my father, tender and the only one before my mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because I was my father's son, tender and my mother's only one.'
    reason: lexical_alternative
  - marker: b
    text: '''The only one'' translates Hebrew יָחִיד, which can also mean ''only son,''
      ''unique one,'' or in some contexts ''beloved one.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the father's instruction in
    the surrounding context. 'For' fits natural English discourse and preserves the
    explanatory force.
- source_word: בֵן
  chosen: a son
  alternatives:
  - a child
  lexicon: HALOT
  rationale: The Hebrew specifically says 'son,' not the more general 'child.' This
    follows the gender-accurate principle and preserves the father-son framing of
    the proverb.
- source_word: הָיִיתִי
  chosen: I was
  alternatives:
  - I became
  lexicon: HALOT
  rationale: 'The verb היה here is best rendered as a simple past state: ''I was.''
    ''Became'' would suggest a transition not emphasized in context.'
- source_word: לְאָבִי
  chosen: to my father
  alternatives:
  - with my father
  - before my father
  lexicon: HALOT
  rationale: 'The preposition ל with ''father'' here expresses relation: ''a son to
    my father,'' an idiomatic way of saying ''my father''s son'' while preserving
    the Hebrew construction as much as readable English allows.'
- source_word: רַךְ
  chosen: tender
  alternatives:
  - soft
  - young
  - delicate
  lexicon: HALOT
  rationale: רַךְ can denote softness, tenderness, or youthful delicacy. 'Tender'
    best captures the sense of youthful vulnerability without sounding pejorative.
- source_word: וְיָחִיד
  chosen: the only one
  alternatives:
  - only son
  - unique one
  - beloved one
  lexicon: HALOT
  rationale: יָחִיד means 'only, solitary, unique.' Because the phrase is qualified
    by 'before my mother,' the sense is that he was his mother's only one, likely
    her only child/son at the time. 'The only one' stays close to the Hebrew while
    avoiding over-specification not explicit in the text.
- source_word: לִפְנֵי אִמִּי
  chosen: before my mother
  alternatives:
  - in the sight of my mother
  - to my mother
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' Retaining 'before
    my mother' preserves the Hebrew idiom, though in English it conveys relational
    standing rather than mere spatial position.
