id: PRO.4.26
reference: Proverbs 4:26
source:
  edition: WLC
  text: פַּ֭לֵּס מַעְגַּ֣ל רַגְלֶ֑/ךָ וְֽ/כָל דְּרָכֶ֥י/ךָ יִכֹּֽנוּ־׃
translation:
  text: Level the path of your feet, and all your ways will be established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ponder the path of your feet'; the Hebrew verb can also carry the sense
      of weighing or carefully considering.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּ֭לֵּס
  chosen: Level
  alternatives:
  - Make level
  - Ponder
  - Weigh
  lexicon: HALOT
  rationale: The Piel imperative of פלס commonly conveys making smooth, level, or
    weighing out. In this wisdom context with 'path of your feet,' the concrete image
    of preparing or leveling a path best fits the parallelism and preserves the metaphor
    of careful moral direction. 'Ponder' reflects a traditional interpretive rendering
    but is less directly tied to the path imagery.
- source_word: מַעְגַּ֣ל
  chosen: path
  alternatives:
  - track
  - course
  lexicon: HALOT
  rationale: The noun denotes a track or path, often in wisdom literature for one's
    course of life. 'Path' is natural modern English and preserves both the literal
    and metaphorical sense.
- source_word: רַגְלֶךָ
  chosen: of your feet
  alternatives:
  - for your foot
  - of your foot
  lexicon: HALOT
  rationale: Although רֶגֶל is singular in lemma, the form here functions idiomatically
    with the path image. 'Of your feet' sounds more natural in English and matches
    the embodied metaphor of walking.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - then all
  lexicon: HALOT
  rationale: The conjunction plus 'all' straightforwardly coordinates the second clause.
    No stronger inferential particle is present, so 'and all' is preferred over a
    more interpretive 'then all.'
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your paths
  - your courses
  lexicon: HALOT
  rationale: דֶּרֶךְ in the plural often refers to one's ways or manner of life. Since
    מַעְגַּל has already been rendered 'path,' using 'ways' avoids awkward repetition
    while preserving the moral-life metaphor.
- source_word: יִכֹּנוּ
  chosen: will be established
  alternatives:
  - will be made firm
  - will be straightened
  - will be secure
  lexicon: HALOT
  rationale: 'The Niphal of כון commonly means to be established, fixed, or made firm.
    ''Will be established'' best captures the resultative sense in wisdom instruction:
    a rightly prepared path leads to stability in one''s conduct.'
