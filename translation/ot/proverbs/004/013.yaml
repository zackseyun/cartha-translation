id: PRO.4.13
reference: Proverbs 4:13
source:
  edition: WLC
  text: הַחֲזֵ֣ק בַּ/מּוּסָ֣ר אַל תֶּ֑רֶף נִ֝צְּרֶ֗/הָ כִּי הִ֥יא חַיֶּֽי/ךָ־־׃
translation:
  text: Hold fast to instruction; do not let go. Guard her, for she is your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' or 'correction' for 'instruction' (Hebrew musar), emphasizing
      formative training as well as teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזֵק
  chosen: Hold fast
  alternatives:
  - Take hold
  - Seize firmly
  - Hold on to
  lexicon: HALOT
  rationale: Imperative of חזק conveys strong grasping or firm adherence. 'Hold fast'
    preserves both the physical metaphor and the exhortational force in natural English.
- source_word: בַּמּוּסָר
  chosen: to instruction
  alternatives:
  - to discipline
  - to correction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often denotes formative instruction with disciplinary
    force. 'Instruction' fits the wisdom context best in English, while the disciplinary
    nuance is acknowledged by alternatives.
- source_word: אַל תֶּרֶף
  chosen: do not let go
  alternatives:
  - do not slacken
  - do not abandon
  - do not release
  lexicon: HALOT
  rationale: From רפה, the sense here is to loosen one's grip or relax one's hold.
    'Do not let go' matches the preceding grasp metaphor and reads idiomatically.
- source_word: נִצְּרֶהָ
  chosen: Guard her
  alternatives:
  - Keep her
  - Watch over her
  - Preserve her
  lexicon: HALOT
  rationale: נצר commonly means guard, keep, or watch over. The feminine suffix refers
    back to instruction. 'Guard her' preserves the personification of instruction
    as feminine in Hebrew and the active protective sense.
- source_word: כִּי הִיא
  chosen: for she
  alternatives:
  - for it
  - because she
  lexicon: HALOT
  rationale: The feminine pronoun refers to מוּסָר as grammatically construed in the
    personified exhortation. 'She' preserves the literary personification created
    by the suffix and pronoun sequence.
- source_word: חַיֶּיךָ
  chosen: your life
  alternatives:
  - your lives
  - your livelihood
  - your source of life
  lexicon: HALOT
  rationale: 'Though formally plural, חַיִּים often functions idiomatically as ''life.''
    Singular English is the natural rendering here: instruction is presented as the
    addressee''s life in a comprehensive sense.'
