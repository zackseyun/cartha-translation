id: PRO.4.8
reference: Proverbs 4:8
source:
  edition: WLC
  text: סַלְסְלֶ֥/הָ וּֽ/תְרוֹמְמֶ֑/ךָּ תְּ֝כַבֵּ֗דְ/ךָ כִּ֣י תְחַבְּקֶֽ/נָּה׃
translation:
  text: Prize her highly, and she will exalt you; she will honor you when you embrace
    her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cherish her, and she will exalt you.' The opening verb is rare and may
      carry the sense of valuing, cherishing, or extolling wisdom.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for/because you embrace her'; the clause may also be understood
      causally rather than temporally.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַלְסְלֶהָ
  chosen: Prize her highly
  alternatives:
  - Cherish her
  - Extol her
  - Esteem her
  lexicon: HALOT
  rationale: The verb סלסל is rare and contextually paired with wisdom as a feminine
    object. Traditional English often has 'exalt her,' but because the next verb already
    states that she 'will exalt you,' rendering the first verb as 'prize highly' or
    'cherish' avoids awkward repetition while preserving the sense of valuing or lifting
    up wisdom.
- source_word: וּתְרוֹמְמֶךָ
  chosen: and she will exalt you
  alternatives:
  - and she will lift you up
  lexicon: HALOT
  rationale: From רומם, 'to raise, exalt.' The 3fs subject matches wisdom personified
    as feminine. 'Exalt' preserves the elevated, honorific sense better than the more
    colloquial 'lift you up'.
- source_word: תכבדך
  chosen: she will honor you
  alternatives:
  - she will glorify you
  - she will make you weighty
  lexicon: HALOT
  rationale: Piel of כבד commonly conveys honoring or bestowing honor. 'Honor' is
    the most natural modern English equivalent here; 'glorify' would overstate the
    sense in this wisdom context, and 'make you weighty' is too literal.
- source_word: כי
  chosen: when
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Although כי often means ''for'' or ''because,'' in this context it introduces
    the circumstance under which honor comes: ''when you embrace her.'' This yields
    smoother English and fits the instructional logic of the verse.'
- source_word: תחבקנה
  chosen: you embrace her
  alternatives:
  - you hold her close
  - you clasp her
  lexicon: HALOT
  rationale: From חבק, 'to embrace.' The verb continues the personification of wisdom
    as a woman to be held fast. 'Embrace' is both literal and idiomatic, preserving
    the metaphor without paraphrase.
