id: PRO.4.21
reference: Proverbs 4:21
source:
  edition: WLC
  text: אַל יַלִּ֥יזוּ מֵ/עֵינֶ֑י/ךָ שָׁ֝מְרֵ֗/ם בְּ/ת֣וֹךְ לְבָבֶֽ/ךָ־׃
translation:
  text: Do not let them depart from your eyes; keep them within your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not let them out of your sight.'
    reason: lexical_alternative
  - marker: b
    text: '''Heart'' here refers to the inner person—the seat of thought, will, and
      affection in Hebrew usage.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Standard negative particle used for prohibition; 'Do not' gives clear
    modern English without archaism.
- source_word: יַלִּיזוּ
  chosen: let them depart
  alternatives:
  - let them slip away
  - let them turn aside
  - let them vanish
  lexicon: HALOT
  rationale: From לוז in the sense of turning aside/departing. In context of the father's
    words/instruction (vv. 20–21), the sense is that these teachings are not to move
    away from one's sight. 'Depart' is idiomatic and preserves the image better than
    a more interpretive paraphrase.
- source_word: מֵעֵינֶיךָ
  chosen: from your eyes
  alternatives:
  - out of your sight
  - from before your eyes
  lexicon: HALOT
  rationale: Literally 'from your eyes.' The phrase is a Hebrew idiom for keeping
    something continually in view/attention. The main text keeps the concrete imagery;
    a more idiomatic English alternative is preserved in footnote.
- source_word: שָׁמְרֵם
  chosen: keep them
  alternatives:
  - guard them
  - watch over them
  lexicon: HALOT
  rationale: Imperative of שמר with 3mp suffix. 'Keep them' is natural English and
    broad enough to include guarding, preserving, and observing. 'Guard them' is a
    viable alternative but slightly narrower.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: The preposition-noun construction means 'in the midst/interior of.' 'Within'
    is concise and natural in English while preserving the inward-location emphasis.
- source_word: לְבָבֶךָ
  chosen: your heart
  alternatives:
  - your inner being
  - your mind
  lexicon: HALOT
  rationale: לֵבָב/לֵב in Hebrew commonly denotes the inner person, including thought
    and will, not merely emotion. 'Heart' is the standard biblical rendering and preserves
    the metaphor; interpretive expansions are better left to notes.
