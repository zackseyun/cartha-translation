id: PRO.4.27
reference: Proverbs 4:27
source:
  edition: WLC
  text: אַֽל תֵּט יָמִ֥ין וּ/שְׂמֹ֑אול הָסֵ֖ר רַגְלְ/ךָ֣ מֵ/רָֽע־־׃
translation:
  text: Do not turn to the right or to the left; turn your foot away from evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not swerve to the right or to the left.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'remove your foot from evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּט
  chosen: turn
  alternatives:
  - swerve
  - deviate
  - incline
  lexicon: HALOT
  rationale: From נטה, here in a jussive/imperfect with אַל expressing prohibition.
    'Turn' is natural modern English and fits the parallel directional phrases 'to
    the right or to the left.' 'Swerve' is possible but slightly more interpretive.
- source_word: יָמִין
  chosen: the right
  alternatives:
  - right hand side
  lexicon: HALOT
  rationale: Directional noun meaning 'right.' With the paired שְׂמֹאול, the idiom
    refers to deviating in either direction, so 'the right' is the clearest English
    rendering.
- source_word: שְׂמֹאול
  chosen: the left
  alternatives:
  - left hand side
  lexicon: HALOT
  rationale: Directional counterpart to יָמִין. Rendered simply as 'the left' for
    idiomatic English and to preserve the Hebrew parallelism.
- source_word: הָסֵר
  chosen: turn away
  alternatives:
  - remove
  - put away
  - keep away
  lexicon: HALOT
  rationale: Imperative of סור/הסיר in context of movement and moral avoidance. Because
    the object is 'your foot' and the complement is 'from evil,' 'turn away' best
    captures the concrete metaphor in readable English. A more literal 'remove your
    foot from evil' is possible but less idiomatic.
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  - your step
  lexicon: HALOT
  rationale: Singular 'your foot' matches the Hebrew singular and preserves the embodied
    metaphor of one's path or conduct. 'Your step' would interpret the metaphor more
    explicitly than the text does.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is evil
  - from wickedness
  lexicon: HALOT
  rationale: רַע here is best taken in the moral sense within wisdom exhortation about
    the path of life. 'From evil' is concise and preserves the broad moral category
    without narrowing it to either abstract wickedness or harmful consequences alone.
