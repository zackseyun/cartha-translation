id: PRO.4.5
reference: Proverbs 4:5
source:
  edition: WLC
  text: קְנֵ֣ה חָ֭כְמָה קְנֵ֣ה בִינָ֑ה אַל תִּשְׁכַּ֥ח וְ/אַל תֵּ֝֗ט מֵֽ/אִמְרֵי פִֽ/י־־־׃
translation:
  text: Acquire wisdom; acquire understanding. Do not forget, and do not turn away
    from the words of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Get wisdom; get understanding.' The Hebrew verb can mean obtain, acquire,
      or buy, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not turn aside' or 'do not swerve' from the words of my mouth.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְנֵה
  chosen: Acquire
  alternatives:
  - Get
  - Buy
  lexicon: HALOT
  rationale: Imperative of קנה. In wisdom literature the verb can extend beyond commercial
    purchase to obtaining or securing something of value. 'Acquire' preserves the
    force of intentional obtaining without sounding overly commercial, while fitting
    both occurrences for rhetorical repetition.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה in Proverbs, denoting practical and moral
    wisdom. No contextual reason to vary.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: בינה commonly denotes understanding or discernment. 'Understanding' is
    the most natural paired term with 'wisdom' in English and preserves the semantic
    distinction without overinterpreting.
- source_word: אַל תִּשְׁכַּח
  chosen: Do not forget
  alternatives:
  - Do not neglect
  lexicon: HALOT
  rationale: The verb שכח primarily means 'forget.' Although in exhortational contexts
    forgetting can imply neglect, the plain lexical sense should be retained in the
    main text.
- source_word: וְאַל תֵּט
  chosen: and do not turn away
  alternatives:
  - and do not swerve
  - and do not turn aside
  lexicon: HALOT
  rationale: נטה in this stem can mean to turn aside/away. 'Turn away' is idiomatic
    modern English and matches the warning against deviating from instruction.
- source_word: מֵאִמְרֵי פִי
  chosen: from the words of my mouth
  alternatives:
  - from my sayings
  - from the utterances of my mouth
  lexicon: HALOT
  rationale: אִמְרֵי are spoken words/sayings; the construct with 'my mouth' is a
    Hebrew idiom emphasizing spoken instruction. 'The words of my mouth' preserves
    the imagery and parallelism better than the more interpretive 'my sayings.'
