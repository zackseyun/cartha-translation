id: PRO.4.24
reference: Proverbs 4:24
source:
  edition: WLC
  text: הָסֵ֣ר מִ֭מְּ/ךָ עִקְּשׁ֣וּת פֶּ֑ה וּ/לְז֥וּת שְׂ֝פָתַ֗יִם הַרְחֵ֥ק מִמֶּֽ/ךָּ׃
translation:
  text: Put away from yourself a crooked mouth, and keep devious lips far from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a perverse mouth' and 'perverse lips.' The Hebrew nouns in both clauses
      describe speech that is morally twisted or distorted.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵר
  chosen: Put away
  alternatives:
  - Remove
  - Turn away
  lexicon: HALOT
  rationale: Imperative of סור/הסר in a causative sense calling for active removal.
    'Put away' is idiomatic modern English and preserves the force of deliberate rejection.
- source_word: מִמְּךָ
  chosen: from yourself
  alternatives:
  - from you
  lexicon: HALOT
  rationale: The preposition plus second masculine singular suffix marks separation
    from the addressee. 'From yourself' is used in the first clause to reflect the
    reflexive, personal responsibility emphasized in the Hebrew.
- source_word: עִקְּשׁוּת
  chosen: crooked
  alternatives:
  - perversity
  - twistedness
  lexicon: HALOT
  rationale: The noun denotes crookedness or perversity. 'Crooked' is more natural
    in English when modifying 'mouth' and preserves the moral metaphor without sounding
    overly abstract.
- source_word: פֶּה
  chosen: mouth
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Literally 'mouth.' Retaining the body-part metaphor matches Hebrew style
    and keeps the parallelism with 'lips' in the next colon.
- source_word: וּלְזוּת
  chosen: devious
  alternatives:
  - perverseness
  - corruption
  - twistedness
  lexicon: HALOT
  rationale: This noun refers to distortion or deviousness in speech. 'Devious' fits
    naturally with 'lips' and maintains the semantic overlap with the first colon
    while allowing some variation in English style.
- source_word: שְׂפָתַיִם
  chosen: lips
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Literally 'lips.' Keeping the concrete image preserves the poetic parallelism
    and avoids flattening the metaphor into an abstract term.
- source_word: הַרְחֵק
  chosen: keep ... far
  alternatives:
  - put far away
  - distance
  lexicon: HALOT
  rationale: 'Imperative of רחק in the causative sense: cause to be far, keep at a
    distance. ''Keep ... far'' is concise, natural, and preserves the intensification
    relative to the first imperative.'
- source_word: מִמֶּךָ
  chosen: from you
  alternatives:
  - from yourself
  lexicon: HALOT
  rationale: Again marks separation from the addressee. Here 'from you' reads more
    smoothly after 'keep ... far' while preserving the same underlying sense.
