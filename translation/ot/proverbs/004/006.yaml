id: PRO.4.6
reference: Proverbs 4:6
source:
  edition: WLC
  text: אַל תַּעַזְבֶ֥/הָ וְ/תִשְׁמְרֶ֑/ךָּ אֱהָבֶ֥/הָ וְ/תִצְּרֶֽ/ךָּ־׃
translation:
  text: Do not forsake her, and she will keep you; love her, and she will guard you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, wisdom, personified as a woman in this passage.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not' is the natural modern
    English rendering without adding emphasis not explicit in the Hebrew.
- source_word: תַּעַזְבֶהָ
  chosen: forsake her
  alternatives:
  - abandon her
  - leave her
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake, abandon.' 'Forsake' fits wisdom-instruction
    style and preserves the covenantal/relational force better than the flatter 'leave.'
    The 3fs suffix refers back to wisdom in the immediate context, so 'her' is retained.
- source_word: וְתִשְׁמְרֶךָּ
  chosen: and she will keep you
  alternatives:
  - and she will watch over you
  - and she will preserve you
  lexicon: HALOT
  rationale: שׁמר has a broad semantic range including keep, guard, watch over. Here
    'keep you' is concise and idiomatic, and pairs well with the following verb while
    allowing the next colon to intensify with 'guard you.' The prefixed conjunction
    is kept as 'and.'
- source_word: אֱהָבֶהָ
  chosen: love her
  alternatives:
  - cherish her
  lexicon: HALOT
  rationale: אהב straightforwardly means 'love.' Because the source uses the ordinary
    verb for love, the translation preserves that lexical simplicity. The feminine
    suffix again points to wisdom personified as a woman.
- source_word: וְתִצְּרֶךָּ
  chosen: and she will guard you
  alternatives:
  - and she will protect you
  - and she will watch over you
  lexicon: HALOT
  rationale: נצר often conveys guarding, keeping, preserving with a protective nuance.
    'Guard you' brings out that nuance and creates a slight semantic distinction from
    שׁמר in the previous colon, while remaining natural English.
