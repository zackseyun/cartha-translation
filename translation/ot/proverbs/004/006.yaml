theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her,' 'she') for wisdom
  alternative_readings:
  - Replace with 'it' to make the abstraction explicit
  - Replace with 'wisdom' repeatedly instead of pronouns
  rationale: The Hebrew uses feminine suffixes and verbs because wisdom is personified
    as a woman in the surrounding context. Retaining the feminine pronouns preserves
    the literary texture and source-language imagery rather than flattening it into
    an abstract concept.
  doctrine_reference: Translation philosophy §1, §4, §5
