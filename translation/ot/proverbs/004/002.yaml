theological_decisions:
- issue: Rendering תּוֹרָתִי in wisdom context
  chosen_reading: my teaching
  alternative_readings:
  - my law
  - my instruction
  rationale: In this father-to-son wisdom setting, torah denotes authoritative instruction
    rather than specifically codified law. Rendering it as 'my teaching' preserves
    the semantic range without suggesting the speaker is directly identifying his
    words with the Mosaic Torah.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
