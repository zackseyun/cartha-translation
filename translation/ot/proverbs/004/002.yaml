id: PRO.4.2
reference: Proverbs 4:2
source:
  edition: WLC
  text: כִּ֤י לֶ֣קַח ט֭וֹב נָתַ֣תִּי לָ/כֶ֑ם תּֽ֝וֹרָתִ֗/י אַֽל תַּעֲזֹֽבוּ־׃
translation:
  text: For I have given you good instruction; do not forsake my teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my instruction'; traditionally, 'my law.' The Hebrew torah can denote
      instruction broadly, not only statutory law.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the exhortation in the surrounding
    context. 'For' best preserves the connective force in natural English.
- source_word: לֶקַח
  chosen: instruction
  alternatives:
  - teaching
  - learning
  - lesson
  lexicon: HALOT
  rationale: Here the noun refers to what the father imparts to the son(s), not the
    act of taking. 'Instruction' fits wisdom-literature usage and pairs well with
    the following 'my teaching' without collapsing the two terms into identical English
    words.
- source_word: טוֹב
  chosen: good
  alternatives:
  - sound
  - excellent
  lexicon: HALOT
  rationale: A straightforward qualitative adjective modifying 'instruction.' 'Good'
    is both accurate and idiomatic.
- source_word: נָתַתִּי לָכֶם
  chosen: I have given you
  alternatives:
  - I gave you
  - I have imparted to you
  lexicon: HALOT
  rationale: The perfect verb presents the instruction as something already bestowed.
    English present perfect communicates a completed gift with present relevance in
    the discourse.
- source_word: תּוֹרָתִי
  chosen: my teaching
  alternatives:
  - my instruction
  - my law
  lexicon: HALOT
  rationale: Though torah can mean 'law,' in Proverbs this paternal wisdom context
    points more broadly to instruction or teaching. 'My teaching' avoids importing
    a specifically Mosaic-legal sense not demanded by the verse.
- source_word: אַל תַּעֲזֹבוּ
  chosen: do not forsake
  alternatives:
  - do not abandon
  - do not leave
  lexicon: HALOT
  rationale: The negative jussive/prohibitive calls for continued adherence. 'Forsake'
    preserves the covenantal and moral weight of עזב better than the flatter 'leave.'
