id: PRO.4.18
reference: Proverbs 4:18
source:
  edition: WLC
  text: וְ/אֹ֣רַח צַ֭דִּיקִים כְּ/א֣וֹר נֹ֑גַהּ הוֹלֵ֥ךְ וָ֝/א֗וֹר עַד נְכ֥וֹן הַ/יּֽוֹם־׃
translation:
  text: But the path of the righteous is like the light of dawn, going on and shining
    until the day is fully established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brightness of dawn.'
    reason: lexical_alternative
  - marker: b
    text: Or 'growing brighter until full day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֹרַח
  chosen: But the path
  alternatives:
  - And the path
  - Now the path
  lexicon: HALOT
  rationale: אֹרַח means 'path, way.' The prefixed conjunction can be rendered simply
    'and,' but in this antithetical wisdom context following the previous verse, 'but'
    brings out the contrast naturally in English without exceeding the discourse function.
- source_word: צַדִּיקִים
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning 'righteous ones.' 'The righteous'
    is idiomatic, concise, and preserves the moral category central to Proverbs.
- source_word: כְּ/אוֹר
  chosen: is like the light
  alternatives:
  - is as light
  - is like light
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and אוֹר is 'light.' 'Like the light'
    preserves the simile clearly.
- source_word: נֹגַהּ
  chosen: of dawn
  alternatives:
  - brightness
  - radiance
  - shining light
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or shining, often of morning light. In this
    proverb's progression toward full day, 'dawn' best captures the image's temporal
    development rather than a static abstract 'brightness.'
- source_word: הוֹלֵךְ
  chosen: going on
  alternatives:
  - growing
  - advancing
  - proceeding
  lexicon: HALOT
  rationale: Qal participle of הלך, literally 'going/walking.' Here it functions adverbially
    in the image of increasing light. 'Going on' preserves the verbal sense while
    fitting the idiom of progressive increase.
- source_word: וָ/אוֹר
  chosen: and shining
  alternatives:
  - and becoming brighter
  - and giving light
  lexicon: HALOT
  rationale: 'From אור as a verb, ''to shine/give light.'' Rendering it verbally keeps
    the Hebrew participial sequence: ''going on and shining.'' ''Becoming brighter''
    is interpretive and therefore left as an alternative.'
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: Standard temporal preposition marking the endpoint of the progression.
- source_word: נְכוֹן
  chosen: fully established
  alternatives:
  - firm
  - fixed
  - at its full strength
  lexicon: HALOT
  rationale: Passive participial/adjectival form from כון, conveying firmness, establishment,
    or readiness. In context of the day reaching its settled state, 'fully established'
    expresses the idea of the day having come to its full, fixed brightness.
- source_word: הַ/יּוֹם
  chosen: the day
  alternatives:
  - daytime
  lexicon: HALOT
  rationale: Definite noun 'the day.' In context it refers to the full day in contrast
    to dawn, not merely a generic day.
