theological_decisions:
- issue: Moral category of צַדִּיקִים
  chosen_reading: the righteous
  alternative_readings:
  - righteous people
  - the just
  rationale: The verse contrasts the life-course of the righteous with that of the
    wicked in the surrounding context. 'The righteous' preserves the ethical-theological
    category without importing later doctrinal precision beyond the proverb itself.
  doctrine_reference: Translation philosophy §6; Affirmations (no denominational overreading)
