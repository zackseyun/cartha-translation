id: PRO.4.17
reference: Proverbs 4:17
source:
  edition: WLC
  text: כִּ֣י לָ֭חֲמוּ לֶ֣חֶם רֶ֑שַׁע וְ/יֵ֖ין חֲמָסִ֣ים יִשְׁתּֽוּ׃
translation:
  text: For they eat the bread of wickedness, and drink the wine of violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For they feed on the bread of wickedness.' The verb can carry the sense
      of consuming or feeding on, but 'eat' is the most straightforward rendering
      in this parallel with 'drink.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wine of violences.' The plural likely intensifies or collectivizes
      the idea; English idiom normally renders it 'wine of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning in the discourse. 'For'
    fits natural English while preserving the explanatory force.
- source_word: לָחֲמוּ
  chosen: they eat
  alternatives:
  - they feed on
  - they consume
  lexicon: HALOT
  rationale: From לחם II 'to eat, consume.' The verb is not the common אכל but clearly
    carries the sense of eating here in parallel with 'drink.' 'They eat' is the most
    direct and idiomatic rendering.
- source_word: לֶחֶם
  chosen: the bread
  alternatives:
  - bread
  - food
  lexicon: HALOT
  rationale: Literal 'bread' is retained because the Hebrew image is concrete and
    paired with 'wine.' The article is not explicit in Hebrew, but English idiom commonly
    uses 'the bread of...' in such genitival expressions.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: '''Wickedness'' best captures the moral quality of רשע in wisdom literature
    and matches the genitive construction ''bread of wickedness.'''
- source_word: וְיֵין
  chosen: and drink the wine
  alternatives:
  - and the wine
  - and wine
  lexicon: HALOT
  rationale: The conjunction links the parallel cola. Supplying 'drink' before 'the
    wine' in English reflects the following verb and yields a natural rendering of
    the Hebrew poetic parallelism.
- source_word: חֲמָסִים
  chosen: violence
  alternatives:
  - violent deeds
  - wrongdoing
  lexicon: HALOT
  rationale: Though morphologically plural, the noun often functions as an abstract
    or collective. Singular 'violence' is the most idiomatic English equivalent and
    preserves the ethical sense.
- source_word: יִשְׁתּוּ
  chosen: drink
  alternatives:
  - they drink
  lexicon: HALOT
  rationale: Rendered as 'drink' with the subject supplied from context ('they') already
    expressed in the first colon. This keeps the English concise while preserving
    the parallel structure.
