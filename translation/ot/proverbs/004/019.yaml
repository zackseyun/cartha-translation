id: PRO.4.19
reference: Proverbs 4:19
source:
  edition: WLC
  text: דֶּ֣רֶךְ רְ֭שָׁעִים כָּֽ/אֲפֵלָ֑ה לֹ֥א יָ֝דְע֗וּ בַּ/מֶּ֥ה יִכָּשֵֽׁלוּ׃פ
translation:
  text: The way of the wicked is like deep darkness; they do not know what makes them
    stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like thick darkness' or 'like gloom.' The Hebrew term denotes especially
      dense darkness.
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not know what they stumble over.' The Hebrew expression can
      be understood as either what causes their stumbling or the object over which
      they stumble.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  lexicon: HALOT
  rationale: Common wisdom-literature metaphor for one's course of life or conduct.
    'Way' is idiomatic and preserves the metaphor without over-interpreting.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: Substantival plural adjective/noun referring to morally guilty persons.
    'The wicked' is concise, natural, and standard in wisdom contexts.
- source_word: כָּאֲפֵלָה
  chosen: like deep darkness
  alternatives:
  - like darkness
  - like gloom
  - as thick darkness
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). אֲפֵלָה denotes dense darkness
    or gloom, stronger than ordinary 'darkness.' 'Deep darkness' communicates the
    intensified image in readable modern English.
- source_word: לֹא יָדְעוּ
  chosen: they do not know
  alternatives:
  - they do not understand
  - they are unaware
  lexicon: HALOT
  rationale: ידע here expresses lack of awareness or understanding. 'Do not know'
    is the most direct rendering and leaves the nuance broad enough to include both
    ignorance and lack of discernment.
- source_word: בַּמֶּה
  chosen: what makes
  alternatives:
  - in what
  - by what
  - over what
  lexicon: HALOT
  rationale: 'The interrogative with preposition is idiomatically causal/instrumental
    in context: they do not know by what means or on what they stumble. ''What makes''
    gives clear English sense while preserving the causal force.'
- source_word: יִכָּשֵׁלוּ
  chosen: them stumble
  alternatives:
  - they stumble
  - them fall
  lexicon: HALOT
  rationale: Nifal of כשל commonly means 'stumble' or 'be made to stumble/fall.' With
    בַּמֶּה, the clause is best expressed in English as 'what makes them stumble,'
    preserving both the passive-like sense and the proverb's moral imagery.
