id: PRO.4.15
reference: Proverbs 4:15
source:
  edition: WLC
  text: פְּרָעֵ֥/הוּ אַל תַּעֲבָר בּ֑/וֹ שְׂטֵ֖ה מֵ/עָלָ֣י/ו וַ/עֲבֽוֹר־־׃
translation:
  text: Avoid it; do not pass through it. Turn away from it and pass on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shun it' for 'Avoid it.' The Hebrew verb is rare and conveys keeping
      clear of the wicked path.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Turn aside from upon it and pass on.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרָעֵהוּ
  chosen: Avoid it
  alternatives:
  - Shun it
  - Leave it alone
  lexicon: HALOT
  rationale: Imperative 2ms with 3ms suffix from פרע/פרע in this context is best taken
    as a command to keep away from the way/path of the wicked. 'Avoid it' is idiomatic
    modern English and fits the parallel imperatives that follow. 'Shun it' is possible
    but slightly more marked; 'leave it alone' is too colloquial and less precise.
- source_word: אַל
  chosen: do not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Standard negative particle used with the following imperfect/jussive-like
    verb to express prohibition. 'Do not' is the natural English equivalent.
- source_word: תַּעֲבָר בּוֹ
  chosen: pass through it
  alternatives:
  - go through it
  - cross it
  lexicon: HALOT
  rationale: עבר with ב conveys moving through or along something, here the wicked
    path/way from the prior context. 'Pass through it' preserves the spatial metaphor
    and the formal parallel with the final imperative.
- source_word: שְׂטֵה
  chosen: Turn away
  alternatives:
  - swerve aside
  - turn aside
  lexicon: HALOT
  rationale: Imperative from שטה, meaning to turn aside/deviate. 'Turn away' is clear
    modern English and captures deliberate avoidance. 'Swerve aside' is vivid but
    less natural in contemporary Bible English.
- source_word: מֵעָלָיו
  chosen: from it
  alternatives:
  - from upon it
  - away from it
  lexicon: HALOT
  rationale: Literally 'from upon it/him,' but the referent is the path/way, so idiomatic
    English uses 'from it.' This avoids awkward literalism while preserving the sense
    of separation.
- source_word: וַעֲבוֹר
  chosen: and pass on
  alternatives:
  - and go on
  - and pass by
  lexicon: HALOT
  rationale: 'Final imperative from עבר continues the sequence of avoidance commands.
    ''Pass on'' communicates moving beyond without entering. ''Pass by'' is possible,
    but ''pass on'' better matches the progression: avoid, do not enter, turn away,
    continue onward.'
