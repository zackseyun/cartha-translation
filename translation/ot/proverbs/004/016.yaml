theological_decisions:
- issue: Moral force of the unstated object in יָרֵעוּ
  chosen_reading: General evil-doing rather than a narrowly specified harm against
    a victim
  alternative_readings:
  - they do harm to others
  rationale: The Hebrew leaves the object unstated, so the translation should not
    over-specify beyond the text. The following clause then narrows the expression
    by mentioning causing another to stumble.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of יכשולו
  chosen_reading: 'Causative in context: causing another person to stumble/fall'
  alternative_readings:
  - 'intransitive: unless they themselves stumble'
  rationale: The parallelism with doing evil and the logic of the proverb favor the
    wicked being restless until they have harmed others. Because the Hebrew form can
    be read more tersely, the alternative is preserved in a footnote rather than adopted
    in the main text.
  doctrine_reference: Translation philosophy §3
