id: PRO.4.16
reference: Proverbs 4:16
source:
  edition: WLC
  text: כִּ֤י לֹ֣א יִֽ֭שְׁנוּ אִם לֹ֣א יָרֵ֑עוּ וְֽ/נִגְזְלָ֥ה שְׁ֝נָתָ֗/ם אִם לֹ֥א
    יכשולו־־׃
translation:
  text: For they do not sleep unless they have done evil, and their sleep is taken
    away unless they make someone stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'unless they themselves stumble.' The Hebrew form is brief and has been
      understood either as causing another to stumble or as stumbling themselves;
      the context favors harm done to others.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding warning; 'For' fits English
    discourse flow while preserving the causal force.
- source_word: יִשְׁנוּ
  chosen: they do not sleep
  alternatives:
  - they cannot sleep
  lexicon: HALOT
  rationale: Qal imperfect of ישׁן denotes ordinary sleeping. The negated imperfect
    here expresses habitual inability/refusal to sleep until evil is done; 'do not
    sleep' is closer to the Hebrew form than the more interpretive 'cannot sleep'.
- source_word: יָרֵעוּ
  chosen: they have done evil
  alternatives:
  - they do evil
  - they do harm
  - they act wickedly
  lexicon: HALOT
  rationale: Hiphil of רעע can mean do evil/harm. In this wisdom context the object
    is unstated, so a broad moral rendering is best. English present perfect after
    'unless' idiomatically conveys the action that must occur before sleep.
- source_word: וְנִגְזְלָה
  chosen: is taken away
  alternatives:
  - is robbed
  - is snatched away
  lexicon: HALOT
  rationale: Niphal of גזל conveys being taken/robbed away. 'Is taken away' is natural
    modern English and preserves the passive sense without over-dramatizing.
- source_word: שְׁנָתָם
  chosen: their sleep
  alternatives:
  - their slumber
  lexicon: HALOT
  rationale: The noun refers to sleep itself, not merely bedtime. 'Sleep' is the clearest
    contemporary equivalent.
- source_word: יכשולו
  chosen: they make someone stumble
  alternatives:
  - they cause someone to fall
  - they trip someone up
  - they stumble
  lexicon: HALOT
  rationale: 'Though the written form lacks an explicit object, the context and common
    rendering support a causative/resultative sense: their sleep is withheld until
    they have caused another''s downfall. ''Make someone stumble'' preserves the metaphor
    and avoids flattening it to purely physical falling.'
