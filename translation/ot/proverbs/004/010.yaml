theological_decisions:
- issue: Gendered address in wisdom instruction
  chosen_reading: my son
  alternative_readings:
  - my child
  rationale: The Hebrew is grammatically masculine singular and the literary form
    of Proverbs frequently presents paternal instruction to a son. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral smoothing.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
