id: PRO.4.10
reference: Proverbs 4:10
source:
  edition: WLC
  text: שְׁמַ֣ע בְּ֭נִ/י וְ/קַ֣ח אֲמָרָ֑/י וְ/יִרְבּ֥וּ לְ֝/ךָ֗ שְׁנ֣וֹת חַיִּֽים׃
translation:
  text: Hear, my son, and receive my words, and the years of your life will be many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Listen, my son.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and take my words.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and the years of your life will increase' or 'will multiply.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע. 'Hear' preserves both the auditory sense and
    the common wisdom-literature nuance of attentive obedience without over-paraphrasing.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Vocative with 1cs suffix. 'My son' is the direct, gender-accurate rendering
    and fits the father-to-son instructional frame in Proverbs; 'my child' would flatten
    the masculine form and the literary setting.
- source_word: וְקַח
  chosen: and receive
  alternatives:
  - and take
  - and accept
  lexicon: HALOT
  rationale: Imperative of לקח. 'Receive' communicates taking in instruction idiomatically
    in English while remaining close to the Hebrew; 'take' is more literal but less
    natural here.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix from אמר. 'My words' is straightforward and
    natural; 'my sayings' is possible in wisdom context but slightly more interpretive.
- source_word: וְיִרְבּוּ
  chosen: will be many
  alternatives:
  - will increase
  - will multiply
  lexicon: HALOT
  rationale: Qal imperfect 3mp of רבה with plural subject 'years.' In English, 'the
    years ... will be many' is idiomatic and preserves the result sense without awkwardness;
    'will multiply' is more literal but less natural with 'years' in contemporary
    English.
- source_word: לְךָ
  chosen: of your life
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'The preposition plus pronoun marks advantage/possession with the following
    phrase. Rather than a wooden ''for you,'' English idiom is best expressed by attaching
    possession to the life-years phrase: ''the years of your life.'''
- source_word: שְׁנוֹת חַיִּים
  chosen: the years of your life
  alternatives:
  - years of life
  - life-years
  lexicon: HALOT
  rationale: Construct phrase meaning 'years of life.' Expanded as 'the years of your
    life' for natural English and to reflect the relation implied in context with
    לְךָ.
