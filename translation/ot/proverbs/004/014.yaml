- issue: Gender rendering of masculine plural רָעִים
  chosen_reading: evil men
  alternative_readings:
  - evildoers
  - evil ones
  rationale: The Hebrew form is grammatically masculine plural. Per the translation
    philosophy's gender-accurate principle, the English should reflect the source's
    masculine form where it carries representative force rather than flattening it
    to a neutral term without note.
