id: PRO.4.14
reference: Proverbs 4:14
source:
  edition: WLC
  text: בְּ/אֹ֣רַח רְ֭שָׁעִים אַל תָּבֹ֑א וְ/אַל תְּ֝אַשֵּׁ֗ר בְּ/דֶ֣רֶךְ רָעִֽים־־׃
translation:
  text: Do not enter the path of the wicked, and do not walk in the way of evil men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not proceed in the way of evil ones.' The Hebrew verb can mean 'go
      on,' 'advance,' or 'walk straight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - track
  lexicon: HALOT
  rationale: אֹרַח commonly denotes a path or course of travel, often metaphorically
    for one's manner of life. 'Path' preserves the concrete metaphor and distinguishes
    it from the second colon's דֶּרֶךְ, rendered 'way' for stylistic and lexical differentiation.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - guilty ones
  lexicon: HALOT
  rationale: The adjective/substantive refers to wicked persons generally. 'The wicked'
    is natural English and preserves the collective force without over-specifying
    gender.
- source_word: אַל תָּבֹא
  chosen: do not enter
  alternatives:
  - do not come
  - do not go in
  lexicon: HALOT
  rationale: With בְּאֹרַח ('into/on the path'), בוא here carries the sense of entering
    onto a course. 'Do not enter' is idiomatic and fits the path metaphor better than
    the more general 'come'.
- source_word: תְּאַשֵּׁר
  chosen: do not walk
  alternatives:
  - do not proceed
  - do not go straight
  - do not advance
  lexicon: HALOT
  rationale: From אשר in the Piel, the verb can mean to go straight on, advance, or
    make progress. In this context of moral travel imagery, 'walk' communicates proceeding
    along a way in readable English, though more literally the sense is 'go on/advance.'
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - road
  lexicon: HALOT
  rationale: דֶּרֶךְ is a common term for road/way and, metaphorically, manner of
    life. 'Way' is the most natural English equivalent here and pairs well with 'path'
    in the first colon.
- source_word: רָעִים
  chosen: evil men
  alternatives:
  - evildoers
  - evil ones
  - the evil
  lexicon: HALOT
  rationale: The masculine plural adjective/substantive denotes evil persons. Following
    the project's gender-accurate principle, 'evil men' reflects the masculine form;
    alternatives are possible, but the source grammar is masculine and representative.
