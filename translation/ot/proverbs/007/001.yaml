id: PRO.7.1
reference: Proverbs 7:1
source:
  edition: WLC
  text: בְּ֭נִ/י שְׁמֹ֣ר אֲמָרָ֑/י וּ֝/מִצְוֺתַ֗/י תִּצְפֹּ֥ן אִתָּֽ/ךְ׃
translation:
  text: My son, keep my words, and store up my commandments with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasure up my commandments with you.' The Hebrew verb can convey carefully
      storing or hiding something for safekeeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew is singular masculine with 1cs suffix, a direct paternal address
    common in Proverbs. Per the gender-accurate policy, 'My son' best matches the
    source form and literary setting; 'My child' is possible as a more inclusive dynamic
    rendering but is less precise.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: The imperative calls for careful retention/obedience. 'Keep' is idiomatic
    in English for both preserving and obeying instruction, fitting wisdom literature
    better than the more wooden 'guard' or the narrower 'observe'.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  lexicon: HALOT
  rationale: The plural of אמר here refers to the speaker's spoken instruction. 'My
    words' is the broad, natural rendering; 'my sayings' is possible in Proverbs but
    can sound more stylized and narrower.
- source_word: וּמִצְוֺתַי
  chosen: and my commandments
  alternatives:
  - and my commands
  lexicon: HALOT
  rationale: מִצְוָה denotes commandment/command. 'Commandments' preserves the formal
    instructional and moral weight of the term in wisdom literature, while remaining
    understandable in modern English.
- source_word: תִּצְפֹּן
  chosen: store up
  alternatives:
  - treasure up
  - hide
  lexicon: HALOT
  rationale: The verb צפן literally involves hiding or storing something carefully.
    In this context of internalizing instruction, 'store up' communicates deliberate
    preservation without suggesting concealment for secrecy. 'Treasure up' is also
    good, but 'store up' is slightly more neutral and direct.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - within you
  - by you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most naturally means 'with you.'
    In context it implies keeping the commandments close at hand or in one's possession.
    'Within you' is interpretive and stronger than the Hebrew explicitly states.
