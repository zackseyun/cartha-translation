id: PRO.7.22
reference: Proverbs 7:22
source:
  edition: WLC
  text: ה֤וֹלֵ֥ךְ אַחֲרֶ֗י/הָ פִּ֫תְאֹ֥ם כְּ֭/שׁוֹר אֶל טָ֣בַח יָב֑וֹא וּ֝/כְ/עֶ֗כֶס
    אֶל מוּסַ֥ר אֱוִֽיל־־׃
translation:
  text: He goes after her at once, like an ox going to the slaughter, and like a fetter
    to the discipline of a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and like a fetter to the discipline of a fool.' The line is difficult.
      Some understand the word rendered 'fetter' differently and translate the clause
      along the lines of 'like a deer stepping into a snare' or 'like shackles for
      the correction of a fool.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: goes
  alternatives:
  - walks
  - is going
  lexicon: HALOT
  rationale: Qal participle of הלך used predicatively in context; present English
    'goes' gives the vivid, ongoing action without sounding wooden.
- source_word: אַחֲרֶיהָ
  chosen: after her
  alternatives:
  - behind her
  lexicon: HALOT
  rationale: Spatial idiom here conveys following the adulterous woman; 'after her'
    is natural English and preserves the sense.
- source_word: פִּתְאֹם
  chosen: at once
  alternatives:
  - suddenly
  - immediately
  lexicon: HALOT
  rationale: The adverb marks abrupt, unreflective action. 'At once' fits the context
    of impulsive compliance; 'suddenly' could suggest merely temporal surprise rather
    than rash immediacy.
- source_word: כְּשׁוֹר
  chosen: like an ox
  alternatives:
  - as an ox
  - like a bull
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes ox/cattle; 'ox' is the conventional and contextually
    apt image of a domesticated animal being led unknowingly.
- source_word: אֶל טָבַח יָבֹא
  chosen: going to the slaughter
  alternatives:
  - comes to slaughter
  - to be slaughtered
  lexicon: HALOT
  rationale: The Hebrew literally 'comes to slaughter.' In English, 'going to the
    slaughter' is idiomatic and preserves the destination/result sense.
- source_word: וּכְעֶכֶס
  chosen: and like a fetter
  alternatives:
  - and like shackles
  - and like an anklet
  lexicon: HALOT
  rationale: The noun is difficult and debated. A restraint term best fits the parallel
    with being led to destruction and the following phrase about discipline. 'Fetter'
    preserves the likely sense of binding/restraint without overcommitting to a specific
    object.
- source_word: אֶל מוּסַר
  chosen: to the discipline
  alternatives:
  - to correction
  - to punishment
  - to instruction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often carries the sense of corrective discipline/instruction.
    Here, in a judgment context, 'discipline' preserves the semantic breadth better
    than the narrower 'punishment' or the softer 'instruction'.
- source_word: אֱוִיל
  chosen: of a fool
  alternatives:
  - for a fool
  - of the fool
  lexicon: HALOT
  rationale: The final noun is singular masculine 'fool.' The construct-like relation
    is syntactically difficult; 'of a fool' is a cautious rendering that preserves
    the Hebrew wording without overresolving the exact relation.
