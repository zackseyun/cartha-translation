id: PRO.7.16
reference: Proverbs 7:16
source:
  edition: WLC
  text: מַ֭רְבַדִּים רָבַ֣דְתִּי עַרְשִׂ֑/י חֲ֝טֻב֗וֹת אֵט֥וּן מִצְרָֽיִם׃
translation:
  text: I have spread my couch with coverings, with colored linens of Egyptian yarn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with carved work, with linen from Egypt.' The Hebrew terms for the patterned
      coverings and the Egyptian material are rare and may refer more specifically
      to decorated or embroidered textiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבַדִּים
  chosen: coverings
  alternatives:
  - coverlets
  - spreads
  - carpets
  lexicon: HALOT
  rationale: Plural noun for bed-coverings or decorative spreads. 'Coverings' is natural
    modern English and broad enough to include the ornamental sense without over-specifying
    floor carpets.
- source_word: רָבַדְתִּי
  chosen: I have spread
  alternatives:
  - I have decked
  - I have covered
  lexicon: HALOT
  rationale: The verb means to spread out or arrange in layers. Present perfect in
    English fits the woman's speech describing preparation already completed.
- source_word: עַרְשִׂי
  chosen: my couch
  alternatives:
  - my bed
  lexicon: HALOT
  rationale: The noun can mean bed or couch. 'Couch' preserves the sensual, luxurious
    setting of the context slightly better than the more neutral 'bed,' while still
    being idiomatic.
- source_word: חֲטֻבוֹת
  chosen: colored linens
  alternatives:
  - carved work
  - striped cloths
  - embroidered coverings
  lexicon: HALOT
  rationale: This rare plural likely refers to patterned or worked textiles rather
    than literal carved objects in this context. 'Colored linens' communicates decorative
    fabric prepared for a bed. Because the term is difficult and variously understood,
    an alternative is preserved in a footnote.
- source_word: אֵטוּן
  chosen: yarn
  alternatives:
  - linen
  - thread
  - cloth
  lexicon: HALOT
  rationale: A term for fine textile material, often understood as yarn, thread, or
    linen. 'Yarn' works well with the construct relation to Egypt and avoids overstating
    certainty about the exact fabric type.
- source_word: מִצְרָיִם
  chosen: Egyptian
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: 'Rendered adjectivally in English to express the construct chain smoothly:
    ''Egyptian yarn.'' This preserves the sense of imported luxury goods from Egypt.'
