id: PRO.7.5
reference: Proverbs 7:5
source:
  edition: WLC
  text: לִ֭/שְׁמָרְ/ךָ מֵ/אִשָּׁ֣ה זָרָ֑ה מִ֝/נָּכְרִיָּ֗ה אֲמָרֶ֥י/הָ הֶחֱלִֽיקָה׃
translation:
  text: to keep you from the forbidden woman, from the foreign woman whose words are
    smooth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose words flatter' or 'who flatters with her words.' The Hebrew literally
      says 'has made her words smooth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמָרְךָ
  chosen: to keep you
  alternatives:
  - to guard you
  - to preserve you
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל expresses purpose in relation
    to the previous verse: the instruction/wisdom is given ''to keep'' or ''guard''
    the son. ''Keep you'' is natural modern English and preserves the protective sense
    of שמר.'
- source_word: מֵאִשָּׁה זָרָה
  chosen: from the forbidden woman
  alternatives:
  - from the strange woman
  - from an adulteress
  - from a loose woman
  lexicon: HALOT
  rationale: זָרָה literally means 'strange/foreign,' but in Proverbs this collocation
    functions idiomatically for a woman outside the covenantal/moral bounds of lawful
    sexuality. 'Forbidden woman' communicates the moral force more clearly in contemporary
    English than the traditional but misleading 'strange woman.'
- source_word: מִנָּכְרִיָּה
  chosen: from the foreign woman
  alternatives:
  - from the stranger
  - from the adulteress
  lexicon: HALOT
  rationale: נָכְרִיָּה more directly carries the sense 'foreign/alien woman.' Because
    the verse uses both זָרָה and נָכְרִיָּה in parallel, rendering them identically
    would flatten the Hebrew. 'Foreign woman' preserves the lexical distinction while
    still fitting the Proverbs idiom of the seductress who is outside proper covenantal
    bounds.
- source_word: אֲמָרֶיהָ
  chosen: whose words
  alternatives:
  - her sayings
  - her speech
  lexicon: HALOT
  rationale: The construct plural means 'her words/sayings.' 'Whose words' connects
    smoothly to the following verb in English.
- source_word: הֶחֱלִיקָה
  chosen: are smooth
  alternatives:
  - she has made smooth
  - she flatters
  - are flattering
  lexicon: HALOT
  rationale: The Hiphil of חלק means 'make smooth,' often metaphorically for smooth
    or flattering speech. Since the object is 'her words,' English idiom prefers the
    stative result 'are smooth.' This preserves the imagery while remaining readable.
    The flattering nuance is implicit and can be noted in a footnote.
