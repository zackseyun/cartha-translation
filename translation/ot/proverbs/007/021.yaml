id: PRO.7.21
reference: Proverbs 7:21
source:
  edition: WLC
  text: הִ֭טַּתּ/וּ בְּ/רֹ֣ב לִקְחָ֑/הּ בְּ/חֵ֥לֶק שְׂ֝פָתֶ֗י/הָ תַּדִּיחֶֽ/נּוּ׃
translation:
  text: She persuades him with her abundant persuasion; with the smoothness of her
    lips she compels him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She turns him aside with much persuasion; with the smoothness of her
      lips she drives him along.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִטַּתּוּ
  chosen: she persuades him
  alternatives:
  - she turns him aside
  - she seduces him
  - she inclines him
  lexicon: HALOT
  rationale: 'From נטה in the Hiphil, with 3fs subject and 3ms object: causative sense
    of causing him to turn or be swayed. In this context of enticement, ''persuades
    him'' captures the effect in natural English without over-paraphrasing. ''Turns
    him aside'' is more formal but less idiomatic here; ''seduces him'' is contextually
    plausible but imports sexual nuance already supplied by the broader passage rather
    than this verb alone.'
- source_word: בְּרֹב
  chosen: with her abundant
  alternatives:
  - with much
  - by the abundance of
  lexicon: HALOT
  rationale: רֹב denotes abundance or multitude. Rendered with 'abundant' in close
    connection to the following noun to preserve the instrumental sense introduced
    by בְּ while keeping the English natural.
- source_word: לִקְחָהּ
  chosen: persuasion
  alternatives:
  - enticing speech
  - instruction
  - argument
  lexicon: HALOT
  rationale: לקח can mean learning, instruction, or persuasive discourse depending
    on context. In Proverbs 7, the woman is using speech to entice, so 'persuasion'
    best fits the immediate context. 'Instruction' would sound too positive or didactic
    in English; 'enticing speech' is interpretive and more expansive than the noun
    itself.
- source_word: בְּחֵלֶק
  chosen: with the smoothness of
  alternatives:
  - with smooth
  - with flattery of
  - with slipperiness of
  lexicon: HALOT
  rationale: חלק in this idiom refers to smoothness, especially smooth or flattering
    speech. 'With the smoothness of' preserves the metaphor and avoids collapsing
    it immediately into the interpretive gloss 'flattery,' though that sense is present.
- source_word: שְׂפָתֶיהָ
  chosen: her lips
  alternatives:
  - her speech
  lexicon: HALOT
  rationale: Literally 'her lips.' Retained to preserve the Hebrew imagery and poetic
    concreteness. 'Her speech' would be a smoother dynamic rendering but loses the
    embodied metaphor.
- source_word: תַּדִּיחֶנּוּ
  chosen: she compels him
  alternatives:
  - she drives him along
  - she leads him astray
  - she impels him
  lexicon: HALOT
  rationale: From נדח in the Hiphil, the sense is to drive, impel, or push away/along.
    In this context, after verbal enticement, the idea is that her speech presses
    him onward. 'Compels him' communicates strong force of influence in idiomatic
    English. 'Leads him astray' is possible but overlaps too much with moral interpretation
    rather than the verbal image of driving.
