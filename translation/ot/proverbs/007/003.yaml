theological_decisions:
- issue: Metaphorical internalization of instruction
  chosen_reading: Retain the concrete metaphors of tying on the fingers and writing
    on the heart rather than paraphrasing them as merely 'remember' or 'internalize.'
  alternative_readings:
  - Keep them always before you; internalize them deeply
  rationale: The verse uses vivid covenantal/wisdom imagery that carries theological
    and literary weight. Preserving the metaphors maintains intertextual resonance
    with Deuteronomic language and wisdom exhortation without adding interpretation
    beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
