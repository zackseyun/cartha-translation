id: PRO.7.3
reference: Proverbs 7:3
source:
  edition: WLC
  text: קָשְׁרֵ֥/ם עַל אֶצְבְּעֹתֶ֑י/ךָ כָּ֝תְבֵ֗/ם עַל ל֥וּחַ לִבֶּֽ/ךָ־־׃
translation:
  text: Tie them on your fingers; write them on the tablet of your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bind them on your fingers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָשְׁרֵם
  chosen: Tie them
  alternatives:
  - Bind them
  lexicon: HALOT
  rationale: Imperative 2ms + 3mp suffix from קשר, literally 'tie/bind them.' 'Tie'
    is natural modern English while preserving the concrete metaphor of fastening
    the father's teachings/commands close at hand.
- source_word: עַל אֶצְבְּעֹתֶיךָ
  chosen: on your fingers
  alternatives:
  - upon your fingers
  lexicon: HALOT
  rationale: עַל is straightforwardly locative here, and אֶצְבְּעוֹת refers to fingers.
    Plural 'fingers' follows the Hebrew and keeps the imagery of something worn or
    kept constantly before oneself.
- source_word: כָּתְבֵם
  chosen: write them
  lexicon: HALOT
  rationale: Imperative 2ms + 3mp suffix from כתב. Direct, literal rendering fits
    the parallelism with the first colon and preserves the metaphor of internalized
    instruction.
- source_word: עַל לוּחַ
  chosen: on the tablet
  alternatives:
  - upon the tablet
  - on the tablet surface
  lexicon: HALOT
  rationale: לוּחַ commonly denotes a tablet or writing board. 'Tablet' preserves
    the concrete writing image and echoes biblical usage such as the tablets of the
    law and the metaphorical writing tablet of the heart.
- source_word: לִבֶּךָ
  chosen: of your heart
  alternatives:
  - of your mind
  - of your inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew often includes thought and will as well as emotion,
    but 'heart' is the standard and best English equivalent here, especially in the
    established biblical metaphor 'tablet of your heart.'
