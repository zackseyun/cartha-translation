id: PRO.7.14
reference: Proverbs 7:14
source:
  edition: WLC
  text: זִבְחֵ֣י שְׁלָמִ֣ים עָלָ֑/י הַ֝/יּ֗וֹם שִׁלַּ֥מְתִּי נְדָרָֽ/י׃
translation:
  text: I had peace offerings with me; today I have paid my vows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings.' The Hebrew refers to peace/well-being offerings,
      from which meat could be eaten after the sacrifice.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִבְחֵי שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - sacrifices of peace offerings
  - fellowship offerings
  lexicon: HALOT
  rationale: The construct phrase literally denotes sacrifices of well-being/peace.
    'Peace offerings' is the standard, clear English rendering in sacrificial contexts
    and preserves the cultic sense without paraphrase. 'Fellowship offerings' is interpretive
    and less directly tied to the Hebrew term.
- source_word: עָלַי
  chosen: with me
  alternatives:
  - upon me
  - on me
  - incumbent on me
  lexicon: HALOT
  rationale: The preposition עַל with 1cs suffix literally means 'upon me,' but in
    this context with sacrificial language it idiomatically conveys that such offerings
    were available to her / in her possession after sacrifice. 'With me' gives the
    natural English sense in context while staying close to the Hebrew.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Straightforward temporal adverb; 'today' is idiomatic modern English.
- source_word: שִׁלַּמְתִּי
  chosen: I have paid
  alternatives:
  - I paid
  - I have fulfilled
  lexicon: HALOT
  rationale: From שׁלם in the Piel, commonly 'pay, fulfill' with vows. 'I have paid'
    fits the direct object 'my vows' and communicates completed action with present
    relevance in English. 'Fulfilled' is possible but less concrete here.
- source_word: נְדָרַי
  chosen: my vows
  alternatives:
  - my vow offerings
  lexicon: HALOT
  rationale: נֶדֶר means a vow; the plural with 1cs suffix is best rendered 'my vows.'
    The sacrificial implication is already conveyed by the surrounding context, so
    adding 'offerings' would overtranslate.
