id: PRO.7.9
reference: Proverbs 7:9
source:
  edition: WLC
  text: בְּ/נֶֽשֶׁף בְּ/עֶ֥רֶב י֑וֹם בְּ/אִישׁ֥וֹן לַ֝֗יְלָה וַ/אֲפֵלָֽה־׃
translation:
  text: at twilight, in the evening of the day, in the black of night and darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in deep night'; literally, 'in the pupil of night,' a Hebrew idiom for
      the darkest part of the night.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶשֶׁף
  chosen: twilight
  alternatives:
  - dusk
  - twilight gloom
  lexicon: HALOT
  rationale: נֶשֶׁף denotes the dim light period at day's end or beginning; in this
    context, paired with evening and night imagery, it refers to twilight toward nightfall.
    'Twilight' is natural English and preserves the transitional sense without over-specifying.
- source_word: עֶרֶב יוֹם
  chosen: the evening of the day
  alternatives:
  - evening
  - day's evening
  lexicon: HALOT
  rationale: The construct-like sequence intensifies the time reference. Rendering
    both nouns preserves the Hebrew buildup rather than collapsing it to a single
    'evening.' 'The evening of the day' sounds slightly marked in English but reflects
    the source's layered temporal phrasing.
- source_word: אִישׁוֹן לַיְלָה
  chosen: the black of night
  alternatives:
  - the pupil of night
  - deep night
  - midnight darkness
  lexicon: HALOT
  rationale: אִישׁוֹן literally refers to the 'little man/pupil' of the eye and idiomatically
    conveys the deepest or darkest part. In collocation with לַיְלָה, the sense is
    the blackest part of night. 'The black of night' captures the idiom in readable
    English better than a literal but opaque 'pupil of night.'
- source_word: וַאֲפֵלָה
  chosen: and darkness
  alternatives:
  - and deep darkness
  - and gloom
  lexicon: HALOT
  rationale: אֲפֵלָה denotes darkness/gloom, often thick darkness. 'And darkness'
    keeps the parallelism concise; 'deep darkness' is possible, but the preceding
    'black of night' already carries the intensification, so a simpler rendering avoids
    redundancy while preserving the cumulative effect.
- source_word: בְּ ... בְּ ... בְּ
  chosen: at ... in ... in ...
  alternatives:
  - in ... in ... in ...
  - at ... at ... at ...
  lexicon: Hebrew grammar
  rationale: The repeated preposition ב marks successive temporal settings. Varying
    the English prepositions slightly produces natural English while retaining the
    Hebrew's stepwise progression into darkness.
