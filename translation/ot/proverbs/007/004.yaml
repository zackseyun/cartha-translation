id: PRO.7.4
reference: Proverbs 7:4
source:
  edition: WLC
  text: אֱמֹ֣ר לַֽ֭/חָכְמָה אֲחֹ֣תִ/י אָ֑תְּ וּ֝/מֹדָ֗ע לַ/בִּינָ֥ה תִקְרָֽא׃
translation:
  text: Say to wisdom, “You are my sister,” and call understanding your close friend,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kinsman,” “acquaintance,” or “intimate friend” for מוֹדָע. The Hebrew
      term can denote someone known closely, ranging from acquaintance to relative
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative 2ms of אמר, introducing direct speech. 'Say' is the most straightforward
    English equivalent and fits the parallel imperative structure with 'call.'
- source_word: לַחָכְמָה
  chosen: to wisdom
  lexicon: HALOT
  rationale: The preposition ל marks the addressee of the speech. 'Wisdom' is the
    standard rendering of חָכְמָה in Proverbs and preserves the personification motif.
- source_word: אֲחֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: Literal kinship term with 1cs suffix. The familial metaphor is important
    in context, contrasting proper intimacy with the forbidden woman later in the
    chapter; therefore it should be preserved rather than generalized.
- source_word: אָתְּ
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'Independent 2fs pronoun used predicatively after ''my sister.'' English
    idiom requires the copula: ''You are my sister.'' The feminine form matches the
    personified feminine noun ''wisdom.'''
- source_word: וּמוֹדָע
  chosen: close friend
  alternatives:
  - kinsman
  - acquaintance
  - intimate friend
  lexicon: HALOT
  rationale: מוֹדָע denotes one known, an acquaintance, and in some contexts a relative/kinsman.
    Here, in parallel with 'sister' and addressed to personified understanding, the
    sense is relational closeness rather than legal kinship. 'Close friend' communicates
    intimate familiarity in natural English without overstating blood relation.
- source_word: לַבִּינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: בִּינָה in Proverbs commonly denotes understanding/discernment. 'Understanding'
    keeps the lexical pairing with 'wisdom' and is idiomatic in English.
- source_word: תִקְרָא
  chosen: call
  alternatives:
  - name
  lexicon: HALOT
  rationale: 'Imperfect 2ms with directive force after the first imperative, functioning
    as a parallel exhortation: ''call.'' This is more natural than a wooden future
    and preserves the poetic parallelism.'
