id: PRO.7.23
reference: Proverbs 7:23
source:
  edition: WLC
  text: עַ֤ד יְפַלַּ֪ח חֵ֡ץ כְּֽבֵד֗/וֹ כְּ/מַהֵ֣ר צִפּ֣וֹר אֶל פָּ֑ח וְ/לֹֽא יָ֝דַ֗ע
    כִּֽי בְ/נַפְשׁ֥/וֹ הֽוּא־־־׃פ
translation:
  text: until an arrow pierces his liver, like a bird rushing into a snare, and he
    does not know that it will cost him his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'that it is for his life' or 'forfeits his life'; the Hebrew
      is elliptical and means that the course he is taking leads to his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - till
  lexicon: HALOT
  rationale: Temporal marker continuing the previous verse's description of the young
    man's course of action up to its fatal outcome.
- source_word: יְפַלַּח
  chosen: pierces
  alternatives:
  - splits
  - cleaves
  - transfixes
  lexicon: HALOT
  rationale: The Piel of פלח here conveys forceful penetration. 'Pierces' is natural
    modern English and fits the image of an arrow entering the body.
- source_word: חֵץ
  chosen: arrow
  lexicon: HALOT
  rationale: Standard gloss for the projectile weapon; no contextual reason to vary.
- source_word: כְּבֵדוֹ
  chosen: his liver
  alternatives:
  - his inward parts
  lexicon: HALOT
  rationale: כָּבֵד normally means 'liver.' Retaining the concrete body part preserves
    the vivid Hebrew imagery rather than generalizing to 'heart' or 'inward parts.'
- source_word: כְמַהֵר
  chosen: rushing
  alternatives:
  - hastening
  - quickly going
  lexicon: HALOT
  rationale: The participial/adverbial sense expresses hurried movement. 'Rushing'
    is idiomatic and preserves the reckless speed of the comparison.
- source_word: צִפּוֹר
  chosen: bird
  lexicon: HALOT
  rationale: Generic term for a bird; no species is specified.
- source_word: אֶל־פָּח
  chosen: into a snare
  alternatives:
  - to a trap
  - into a trap
  lexicon: HALOT
  rationale: פָּח denotes a trap/snare, especially for birds. 'Into a snare' fits
    the simile smoothly in English and reflects the bird's movement into danger.
- source_word: וְלֹא יָדַע
  chosen: and he does not know
  alternatives:
  - without knowing
  - not realizing
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. Present-tense English works
    well in proverbial narration and keeps the immediacy of the warning.
- source_word: כִּי בְנַפְשׁוֹ הוּא
  chosen: that it will cost him his life
  alternatives:
  - that it is for his life
  - that it concerns his life
  - that it is against his own life
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally, ''that it is for/against his life.''
    In context the sense is that the trap leads to his death. ''It will cost him his
    life'' expresses the idiomatic force clearly while preserving the fatal outcome.'
