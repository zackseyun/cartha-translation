id: PRO.7.13
reference: Proverbs 7:13
source:
  edition: WLC
  text: וְ/הֶחֱזִ֣יקָה בּ֭/וֹ וְ/נָ֣שְׁקָה לּ֑/וֹ הֵעֵ֥זָה פָ֝נֶ֗י/הָ וַ/תֹּ֣אמַר
    לֽ/וֹ־׃
translation:
  text: 'She seized him and kissed him; with a bold face she said to him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a brazen face' or 'with shameless boldness.' The Hebrew idiom conveys
      audacious, unembarrassed forwardness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱזִיקָה בּוֹ
  chosen: She seized him
  alternatives:
  - She grabbed him
  - She took hold of him
  lexicon: HALOT
  rationale: החזיק with ב can mean to grasp or take hold of someone. 'Seized' conveys
    the sudden, assertive physical action in context without over-paraphrasing.
- source_word: וְנָשְׁקָה לּוֹ
  chosen: and kissed him
  alternatives:
  - and gave him a kiss
  lexicon: HALOT
  rationale: נשק in the Qal commonly means 'to kiss.' The direct, simple rendering
    best matches the Hebrew narrative sequence.
- source_word: הֵעֵזָה פָנֶיהָ
  chosen: with a bold face
  alternatives:
  - with a brazen face
  - she made her face bold
  - with shameless boldness
  lexicon: HALOT
  rationale: The idiom literally involves making/being strong in her face, expressing
    audacity or brazenness. 'With a bold face' preserves the facial idiom more closely
    than the more interpretive 'with shameless boldness,' while remaining natural
    English.
- source_word: וַתֹּאמַר לוֹ
  chosen: she said to him
  alternatives:
  - she said
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the indirect object 'to him'; retaining
    it preserves the directness of the encounter and the source wording.
