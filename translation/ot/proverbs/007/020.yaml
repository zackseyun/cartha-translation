id: PRO.7.20
reference: Proverbs 7:20
source:
  edition: WLC
  text: צְֽרוֹר הַ֭/כֶּסֶף לָקַ֣ח בְּ/יָד֑/וֹ לְ/י֥וֹם הַ֝/כֵּ֗סֶא יָבֹ֥א בֵיתֽ/וֹ־׃
translation:
  text: He took a bag of money in his hand; he will come home at the full moon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the appointed day'; the Hebrew term is difficult and has also been
      understood by some as 'new moon,' though 'full moon' best fits the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְרוֹר
  chosen: bag
  alternatives:
  - bundle
  - pouch
  lexicon: HALOT
  rationale: The noun denotes something tied up, here a money-bag or pouch. 'Bag'
    is natural modern English and fits the commercial/travel context better than the
    more literal but less idiomatic 'bundle'.
- source_word: הַכֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although כֶּסֶף literally means 'silver,' in many contexts it functions
    metonymically for money. Here the husband has taken funds for a journey, so 'money'
    best conveys the sense in readable English.
- source_word: לָקַח בְיָדוֹ
  chosen: took ... in his hand
  alternatives:
  - has taken ... with him
  - carried ... in his hand
  lexicon: HALOT
  rationale: This preserves the concrete Hebrew idiom without sounding unnatural.
    The perfect verb is naturally rendered as a past action in the woman's speech.
- source_word: לְיוֹם
  chosen: at
  alternatives:
  - for the day of
  - by the day of
  lexicon: HALOT
  rationale: The preposition with 'day' marks the time of return. In idiomatic English,
    'at the full moon' communicates the temporal force more naturally than a wooden
    'for the day of the full moon.'
- source_word: הַכֵּסֶא
  chosen: the full moon
  alternatives:
  - the appointed day
  - the new moon
  lexicon: HALOT
  rationale: In this context the term most plausibly refers to the full moon, likely
    indicating a set point in the lunar month and thus a delayed return. This fits
    the seductress's assurance that the husband will not return soon. Because the
    term is debated, alternatives are preserved in a footnote.
- source_word: יָבֹא בֵיתוֹ
  chosen: he will come home
  alternatives:
  - he will come to his house
  - he will return to his house
  lexicon: HALOT
  rationale: The Hebrew literally says 'he will come to his house,' but 'come home'
    is the natural English equivalent and preserves the meaning clearly.
