id: PRO.7.19
reference: Proverbs 7:19
source:
  edition: WLC
  text: כִּ֤י אֵ֣ין הָ/אִ֣ישׁ בְּ/בֵית֑/וֹ הָ֝לַ֗ךְ בְּ/דֶ֣רֶךְ מֵ/רָחֽוֹק׃
translation:
  text: For the man is not at his house; he has gone on a journey far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my husband is not at home.' The Hebrew more literally says 'the man
      is not at his house,' using an indirect expression for her husband.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the seductress's assurance in the surrounding
    context. 'For' fits natural English while preserving the causal force.
- source_word: אֵין
  chosen: is not
  alternatives:
  - there is no
  - is absent
  lexicon: HALOT
  rationale: 'With the following nominal phrase and location, the sense is absence:
    ''is not at.'' This is more idiomatic than a wooden ''there is no'' in English.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - my husband
  lexicon: HALOT
  rationale: Literally 'the man.' In context the speaker refers to her husband, but
    the Hebrew uses the more indirect expression. The translation preserves the source
    wording rather than importing the interpretive gloss 'my husband' into the main
    text.
- source_word: בְּבֵיתוֹ
  chosen: at his house
  alternatives:
  - in his house
  - at home
  lexicon: HALOT
  rationale: The preposition with 'house' here denotes presence at one's residence.
    'At his house' preserves the possessive and is slightly more formal than 'at home,'
    while remaining natural.
- source_word: הָלַךְ
  chosen: he has gone
  alternatives:
  - he went
  - he is gone
  lexicon: HALOT
  rationale: The qatal verb reports a completed action with present relevance. 'He
    has gone' communicates that he departed and remains away.
- source_word: בְּדֶרֶךְ
  chosen: on a journey
  alternatives:
  - on the road
  - by way of a journey
  lexicon: HALOT
  rationale: Idiomatic use of 'way/road' with the verb 'go' indicates travel. 'On
    a journey' conveys the sense naturally in English.
- source_word: מֵרָחוֹק
  chosen: far away
  alternatives:
  - from afar
  - to a distant place
  lexicon: HALOT
  rationale: Expresses distance. 'Far away' is clear modern English and fits the travel
    context.
