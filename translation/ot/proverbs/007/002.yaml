id: PRO.7.2
reference: Proverbs 7:2
source:
  edition: WLC
  text: שְׁמֹ֣ר מִצְוֺתַ֣/י וֶ/חְיֵ֑ה וְ֝/תוֹרָתִ֗/י כְּ/אִישׁ֥וֹן עֵינֶֽי/ךָ׃
translation:
  text: Keep my commandments and live, and my instruction like the pupil of your eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the apple of your eye.' The Hebrew idiom refers to the pupil, expressing
      something to be guarded with utmost care.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  chosen: Keep
  alternatives:
  - Guard
  - Observe
  lexicon: HALOT
  rationale: Imperative of שׁמר commonly carries the sense of keeping, guarding, or
    observing. 'Keep' is idiomatic in English for commandments and preserves both
    obedience and protective attentiveness.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מִצְוָה is well rendered 'commandment' in wisdom and covenantal contexts.
    The plural with first-person suffix is preserved directly.
- source_word: וֶחְיֵה
  chosen: and live
  alternatives:
  - so that you may live
  - that you may live
  lexicon: HALOT
  rationale: The imperative/consecutive form is concise and naturally rendered 'and
    live.' This preserves the Hebrew parataxis while allowing the implied result nuance
    to be heard without over-explication.
- source_word: וְתוֹרָתִי
  chosen: and my instruction
  alternatives:
  - and my law
  - and my teaching
  lexicon: HALOT
  rationale: תּוֹרָה in Proverbs refers broadly to instruction or teaching, not narrowly
    statutory law. 'Instruction' best fits wisdom literature and avoids importing
    a purely legal sense.
- source_word: כְּאִישׁוֹן
  chosen: like the pupil
  alternatives:
  - as the apple
  - like the apple
  lexicon: HALOT
  rationale: אִישׁוֹן in this idiom refers to the pupil, the small dark center of
    the eye. Traditional English 'apple of the eye' is idiomatic but less transparent
    to modern readers; 'pupil' gives the plain sense.
- source_word: עֵינֶיךָ
  chosen: of your eye
  alternatives:
  - of your eyes
  lexicon: HALOT
  rationale: Though morphologically dual/plural in form, the idiom 'pupil of your
    eye' is standard English and reflects the singular sense of the expression in
    context.
