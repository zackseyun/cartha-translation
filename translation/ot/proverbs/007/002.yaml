theological_decisions:
- issue: Rendering תּוֹרָה in wisdom context
  chosen_reading: instruction
  alternative_readings:
  - law
  - teaching
  rationale: In Proverbs, the speaker's תּוֹרָה is parental/wisdom instruction rather
    than specifically Mosaic legislation. 'Instruction' preserves the semantic breadth
    without flattening it into mere information.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
