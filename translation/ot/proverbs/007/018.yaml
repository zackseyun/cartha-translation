id: PRO.7.18
reference: Proverbs 7:18
source:
  edition: WLC
  text: לְכָ֤/ה נִרְוֶ֣ה דֹ֭דִים עַד הַ/בֹּ֑קֶר נִ֝תְעַלְּסָ֗ה בָּ/אֳהָבִֽים־׃
translation:
  text: Come, let us drink our fill of love until morning; let us delight ourselves
    with lovemaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us have our fill of caresses until morning.' The Hebrew uses sensual
      terms that can be rendered more concretely as physical love-expressions.
    reason: lexical_alternative
  - marker: b
    text: Or 'let us revel in love.' The final phrase may be rendered more generally,
      but here it refers to erotic enjoyment in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come on
  - Go
  lexicon: HALOT
  rationale: Imperative invitation from הלך used idiomatically as an exhortation.
    'Come' is natural English and fits the seductive summons in context better than
    the more literal but less idiomatic 'Go.'
- source_word: נִרְוֶה
  chosen: let us drink our fill
  alternatives:
  - let us be saturated
  - let us have our fill
  lexicon: HALOT
  rationale: From רוה, 'to drink one's fill, be saturated.' The imagery is metaphorical
    but vivid; 'drink our fill' preserves the sensual metaphor better than flattening
    to merely 'have our fill.'
- source_word: דֹדִים
  chosen: love
  alternatives:
  - caresses
  - love-making
  lexicon: HALOT
  rationale: דֹדִים often denotes love or love-expressions in erotic contexts. Here,
    after the drinking metaphor, 'love' works idiomatically in English while retaining
    the sensual sense. More explicit options are possible, but 'love' best balances
    fidelity and readability.
- source_word: עַד הַבֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - till dawn
  lexicon: HALOT
  rationale: Straightforward temporal phrase. 'Until morning' is idiomatic modern
    English.
- source_word: נִתְעַלְּסָה
  chosen: let us delight ourselves
  alternatives:
  - let us enjoy ourselves
  - let us revel
  lexicon: HALOT
  rationale: Hitpael of עלס conveys luxuriating, taking delight, reveling. 'Delight
    ourselves' preserves the reflexive nuance and sensual pleasure without becoming
    slangy.
- source_word: בָּאֳהָבִים
  chosen: with lovemaking
  alternatives:
  - with love
  - with caresses
  lexicon: HALOT
  rationale: Plural noun from אהב in an erotic setting. 'With lovemaking' makes explicit
    the sexual sense demanded by context and distinguishes it from the earlier דֹדִים,
    while remaining natural English.
