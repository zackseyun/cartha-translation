id: PRO.7.11
reference: Proverbs 7:11
source:
  edition: WLC
  text: הֹמִיָּ֣ה הִ֣יא וְ/סֹרָ֑רֶת בְּ֝/בֵיתָ֗/הּ לֹא יִשְׁכְּנ֥וּ רַגְלֶֽי/הָ־׃
translation:
  text: She is loud and rebellious; her feet do not stay at home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in her house her feet do not dwell/remain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹמִיָּה
  chosen: loud
  alternatives:
  - boisterous
  - clamorous
  - noisy
  lexicon: HALOT
  rationale: The adjective describes a noisy, tumultuous, or boisterous disposition.
    'Loud' is concise, natural English and fits the characterization in context without
    sounding archaic.
- source_word: וְסֹרָרֶת
  chosen: rebellious
  alternatives:
  - stubborn
  - wayward
  - unruly
  lexicon: HALOT
  rationale: From the root סרר, conveying stubbornness or insubordination. 'Rebellious'
    best captures the moral and behavioral defiance in this wisdom context; 'stubborn'
    is possible but slightly narrower.
- source_word: בְּבֵיתָהּ
  chosen: at home
  alternatives:
  - in her house
  - within her house
  lexicon: HALOT
  rationale: The prepositional phrase is literally 'in her house,' but idiomatic English
    prefers 'at home' in this context of habitual presence or absence.
- source_word: לֹא יִשְׁכְּנוּ רַגְלֶיהָ
  chosen: her feet do not stay
  alternatives:
  - her feet do not dwell
  - her feet do not remain
  - her feet do not settle
  lexicon: HALOT
  rationale: The Hebrew literally says 'her feet do not dwell/remain.' Retaining 'her
    feet' preserves the vivid personification of restless movement, while 'stay' gives
    the natural English sense of not remaining in one place.
