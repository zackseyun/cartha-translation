id: PRO.7.27
reference: Proverbs 7:27
source:
  edition: WLC
  text: דַּרְכֵ֣י שְׁא֣וֹל בֵּיתָ֑/הּ יֹ֝רְד֗וֹת אֶל חַדְרֵי מָֽוֶת־־׃פ
translation:
  text: Her house is the way to Sheol, going down to the chambers of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her house is the ways of Sheol'; the Hebrew uses a plural form ('ways/paths'),
      which may be understood collectively in English as 'the way.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the realm of the dead; alternatively, 'the grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵי
  chosen: the way
  alternatives:
  - ways
  lexicon: HALOT
  rationale: Construct plural of 'way/path.' In English, the predicate idiom is smoother
    as a collective singular, 'is the way to,' while still conveying that her house
    leads along the route toward destruction. 'Ways' is possible more formally, but
    sounds less natural here.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' rather than flattening to 'grave' or paraphrasing,
    since the Hebrew denotes the underworld/realm of the dead more broadly than a
    burial place. Transliteration preserves the Hebrew concept with theological precision.
- source_word: בֵּיתָהּ
  chosen: Her house
  alternatives:
  - her household
  lexicon: HALOT
  rationale: In context of the adulterous woman in Proverbs 7, the literal 'house'
    is primary and also carries the metaphorical sense of the place one enters. 'Household'
    is less likely here.
- source_word: יֹרְדוֹת
  chosen: going down
  alternatives:
  - descending
  - lead down
  lexicon: HALOT
  rationale: Feminine plural participle agreeing with 'ways' and expressing ongoing/resultative
    motion downward. 'Going down' preserves the participial force and vividness. 'Lead
    down' makes the causative sense more explicit but is less formally tied to the
    Hebrew wording.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: Standard directional preposition. 'To' works naturally with 'going down'
    and avoids over-specifying penetration, though 'into' is also possible.
- source_word: חַדְרֵי
  chosen: the chambers
  alternatives:
  - the rooms
  - the inner rooms
  lexicon: HALOT
  rationale: The noun refers to inner rooms/chambers. 'Chambers' preserves the poetic
    and ominous tone better than the flatter 'rooms.'
- source_word: מָוֶת
  chosen: death
  alternatives:
  - Death
  lexicon: HALOT
  rationale: Rendered as the common noun 'death.' Capitalizing as 'Death' could personify
    it, but the Hebrew here does not require personification.
