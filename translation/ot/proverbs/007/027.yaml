theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse warns of descent to the underworld of the dead, not merely
    burial. Transliteration preserves the Hebrew concept without importing a more
    developed later doctrine of hell or reducing it to a grave.
  doctrine_reference: Translation philosophy §1, §3
