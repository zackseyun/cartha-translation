id: PRO.7.8
reference: Proverbs 7:8
source:
  edition: WLC
  text: עֹבֵ֣ר בַּ֭/שּׁוּק אֵ֣צֶל פִּנָּ֑/הּ וְ/דֶ֖רֶךְ בֵּיתָ֣/הּ יִצְעָֽד׃
translation:
  text: passing through the street near her corner, and he steps on the way to her
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passing by the market street near her corner, and walking the road to
      her house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵר
  chosen: passing through
  alternatives:
  - passing by
  - going along
  lexicon: HALOT
  rationale: Qal participle of עבר denotes movement past/through a place. 'Passing
    through' preserves the participial, scene-setting sense better than a finite verb
    alone.
- source_word: בַּשּׁוּק
  chosen: the street
  alternatives:
  - the market
  - the marketplace
  lexicon: HALOT
  rationale: שׁוּק can denote a street, especially a public thoroughfare or market
    street. In this context of moving through an urban area toward the woman's house,
    'street' is the most natural English rendering, while the market nuance is possible
    but not required.
- source_word: אֵצֶל
  chosen: near
  alternatives:
  - beside
  - by
  lexicon: HALOT
  rationale: The preposition indicates proximity. 'Near' is idiomatic and clear in
    modern English.
- source_word: פִּנָּהּ
  chosen: her corner
  alternatives:
  - her street corner
  - the corner by her place
  lexicon: HALOT
  rationale: פִּנָּה means 'corner.' With the 3fs suffix it refers to the corner associated
    with the woman introduced in the surrounding context. 'Her corner' preserves the
    possessive association without overexplaining.
- source_word: וְדֶרֶךְ
  chosen: and ... on the way
  alternatives:
  - and on the road
  - and the path
  lexicon: HALOT
  rationale: דֶּרֶךְ means way/road/path. Here it functions adverbially with the following
    phrase to describe the route he takes. Rendering it as 'on the way' gives natural
    English while preserving the concrete sense of route.
- source_word: בֵּיתָהּ
  chosen: to her house
  alternatives:
  - toward her house
  - her house
  lexicon: HALOT
  rationale: בַּיִת with suffix means 'her house.' In English, with 'way,' the destination
    is best expressed as 'to her house' to make the directional sense explicit.
- source_word: יִצְעָד
  chosen: he steps
  alternatives:
  - he walks
  - he strides
  lexicon: HALOT
  rationale: The verb צעד denotes stepping or striding. 'He steps' keeps the concrete
    verbal image and the finite verbal progression from the participle at the start
    of the verse.
