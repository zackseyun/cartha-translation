id: PRO.7.25
reference: Proverbs 7:25
source:
  edition: WLC
  text: אַל יֵ֣שְׂטְ אֶל דְּרָכֶ֣י/הָ לִבֶּ֑/ךָ אַל תֵּ֝תַע בִּ/נְתִיבוֹתֶֽי/הָ־־־׃
translation:
  text: Do not let your heart turn aside to her ways; do not wander into her paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not let your heart swerve to her ways.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not go astray in her paths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשְׂטְ
  chosen: turn aside
  alternatives:
  - swerve
  - stray
  - deviate
  lexicon: HALOT
  rationale: From שׂטה/שׁטה in the sense of turning aside or deviating from a course.
    'Turn aside' is idiomatic modern English and preserves the metaphor of moral deviation
    without over-paraphrase.
- source_word: דְּרָכֶיהָ
  chosen: her ways
  alternatives:
  - her roadways
  - her conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path,' and often metaphorically one's manner
    of life. 'Her ways' preserves both the literal-path imagery and the moral sense
    in Proverbs.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵב in Hebrew denotes the inner person, including thought and desire.
    'Heart' is the standard and sufficiently broad English equivalent, especially
    fitting in wisdom literature.
- source_word: תֵּתַע
  chosen: wander
  alternatives:
  - go astray
  - stagger
  - err
  lexicon: HALOT
  rationale: From תעה, 'to wander, go astray.' 'Wander' fits the path imagery and
    communicates moral misdirection naturally in English. 'Go astray' is possible
    but slightly more interpretive and repetitive with the first clause.
- source_word: בִּנְתִיבוֹתֶיהָ
  chosen: into her paths
  alternatives:
  - in her tracks
  - along her paths
  lexicon: HALOT
  rationale: נְתִיבָה means 'path, track.' With בְּ after a verb of wandering, English
    idiom is better expressed as 'into her paths' rather than the more wooden 'in
    her paths,' conveying movement into her course of life.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive rendering. 'Do not' is clear modern
    English and suits the direct paternal warning of the context.
