id: PRO.7.12
reference: Proverbs 7:12
source:
  edition: WLC
  text: פַּ֤עַם בַּ/ח֗וּץ פַּ֥עַם בָּ/רְחֹב֑וֹת וְ/אֵ֖צֶל כָּל פִּנָּ֣ה תֶאֱרֹֽב׀־׃
translation:
  text: Now in the street, now in the squares, and beside every corner she lies in
    wait.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sometimes outside, sometimes in the plazas.' The Hebrew repeats 'פַּעַם'
      for alternating movement from place to place.
    reason: lexical_alternative
  - marker: b
    text: Or 'she lurks' or 'she waits in ambush.' The verb suggests stealthy, predatory
      waiting.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּעַם ... פַּעַם
  chosen: Now ... now
  alternatives:
  - At one time ... at another
  - Sometimes ... sometimes
  lexicon: HALOT
  rationale: The repeated noun/adverb marks alternation or shifting location. 'Now
    ... now' preserves the vivid, rapid movement of the Hebrew more naturally than
    a more wooden temporal phrasing.
- source_word: בַּחוּץ
  chosen: in the street
  alternatives:
  - outside
  - in the open
  lexicon: HALOT
  rationale: חוּץ commonly denotes the outside/public street area. 'In the street'
    fits the urban setting and pairs well with the following plural 'squares.'
- source_word: בָּרְחֹבוֹת
  chosen: in the squares
  alternatives:
  - in the plazas
  - in the broad streets
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to open public places or plazas within a town. 'Squares'
    is concise, idiomatic, and distinguishes it from the prior 'street.'
- source_word: וְאֵצֶל
  chosen: and beside
  alternatives:
  - and near
  - and by
  lexicon: HALOT
  rationale: אֵצֶל indicates proximity. 'Beside' gives a natural English sense of
    lurking near strategic locations.
- source_word: כָּל פִּנָּה
  chosen: every corner
  alternatives:
  - every street corner
  - every angle
  lexicon: HALOT
  rationale: פִּנָּה literally means 'corner.' In context, 'every corner' idiomatically
    conveys the city's corners where someone might ambush or solicit passersby.
- source_word: תֶאֱרֹב
  chosen: she lies in wait
  alternatives:
  - she lurks
  - she waits in ambush
  lexicon: HALOT
  rationale: The verb ארב carries the sense of lying in wait or ambushing. 'She lies
    in wait' preserves the predatory nuance central to the warning passage.
