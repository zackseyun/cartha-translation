theological_decisions:
- issue: Gendered vocative in wisdom address
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The source text uses a masculine plural form. In keeping with the translation
    philosophy's gender-accurate principle, the masculine form is preserved in the
    main text rather than generalized, while recognizing that wisdom instruction can
    have representative force.
