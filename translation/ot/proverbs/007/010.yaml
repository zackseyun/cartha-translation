id: PRO.7.10
reference: Proverbs 7:10
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה אִ֭שָּׁה לִ/קְרָאת֑/וֹ שִׁ֥ית ז֝וֹנָ֗ה וּ/נְצֻ֥רַת לֵֽב׃
translation:
  text: And look—a woman came to meet him, dressed like a prostitute and guarded of
    heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wily of heart,' 'secretive,' or 'cunning of heart.' The Hebrew literally
      says 'guarded of heart,' suggesting concealed intentions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - And see
  lexicon: HALOT
  rationale: Introduces the scene with vivid immediacy. 'Look' preserves the deictic
    force in readable modern English better than the more archaic 'behold.'
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a female
  lexicon: HALOT
  rationale: The immediate context presents an unidentified female figure; 'woman'
    is the natural English equivalent. 'Wife' is possible for the Hebrew lexeme in
    some contexts, but not demanded here.
- source_word: לִקְרָאתוֹ
  chosen: came to meet him
  alternatives:
  - to meet him
  - toward him
  lexicon: HALOT
  rationale: The preposition plus infinitive/construct idiom indicates movement in
    encounter. 'Came to meet him' makes the motion explicit in idiomatic English while
    preserving the sense of direct approach.
- source_word: שִׁית
  chosen: dressed like
  alternatives:
  - attire of
  - garment of
  - clothed as
  lexicon: HALOT
  rationale: The noun refers to attire or dress. 'Dressed like' is natural English
    and conveys outward appearance without over-literal awkwardness. It also fits
    the construct relation with 'prostitute.'
- source_word: זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: '''Prostitute'' is the clearest contemporary English rendering. ''Harlot''
    is archaic, and the cruder alternative would add a tone not required by the Hebrew.'
- source_word: וּנְצֻרַת לֵב
  chosen: guarded of heart
  alternatives:
  - wily of heart
  - secretive
  - cunning of heart
  lexicon: HALOT
  rationale: The passive/participial form from נצר literally suggests being guarded,
    watched, or kept; with 'heart' it conveys inward guardedness or concealed intent.
    'Guarded of heart' preserves the metaphor and ambiguity better than interpretive
    renderings like 'wily' or 'cunning,' though those capture likely implication.
