id: PRO.7.17
reference: Proverbs 7:17
source:
  edition: WLC
  text: נַ֥פְתִּי מִשְׁכָּבִ֑/י מֹ֥ר אֲ֝הָלִ֗ים וְ/קִנָּמֽוֹן׃
translation:
  text: I have perfumed my bed with myrrh, aloes, and cinnamon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'aloewood'; the Hebrew term refers to a fragrant wood used in perfumes,
      not the modern aloe plant in the usual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְתִּי
  chosen: I have perfumed
  alternatives:
  - I have sprinkled
  - I have scented
  lexicon: HALOT
  rationale: From the verb נפת/נוף in the Piel, here meaning to apply fragrance or
    spice. In context of preparing a bed with aromatic substances, 'I have perfumed'
    best captures the resultative sense in natural English. 'Sprinkled' is more literal
    but under-translates the aromatic purpose; 'scented' is possible but slightly
    less vivid.
- source_word: מִשְׁכָּבִי
  chosen: my bed
  alternatives:
  - my couch
  - my couch-bed
  lexicon: HALOT
  rationale: מִשְׁכָּב can denote a place of lying down, bed, or couch. In this seduction
    context, 'my bed' is the clearest and most idiomatic English rendering.
- source_word: מֹר
  chosen: myrrh
  lexicon: HALOT
  rationale: Standard rendering for the aromatic resin מור. 'Myrrh' is established,
    precise, and still understandable in modern English.
- source_word: אֲהָלִים
  chosen: aloes
  alternatives:
  - aloewood
  - eaglewood
  lexicon: HALOT
  rationale: Refers not to medicinal aloe vera but to fragrant aloes/aloewood used
    in perfumes. 'Aloes' is the conventional biblical rendering, but because modern
    readers may misunderstand it, an explanatory footnote preserves 'aloewood'.
- source_word: וְקִנָּמוֹן
  chosen: and cinnamon
  lexicon: HALOT
  rationale: Straightforward rendering of קנמון as the spice 'cinnamon.' The conjunction
    is naturally rendered 'and' in the list of aromatics.
