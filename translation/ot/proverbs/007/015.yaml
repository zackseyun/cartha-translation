id: PRO.7.15
reference: Proverbs 7:15
source:
  edition: WLC
  text: עַל כֵּ֭ן יָצָ֣אתִי לִ/קְרָאתֶ֑/ךָ לְ/שַׁחֵ֥ר פָּ֝נֶ֗י/ךָ וָ/אֶמְצָאֶֽ/ךָּ־׃
translation:
  text: That is why I came out to meet you, to seek your face, and I have found you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to seek you early' or 'to seek you diligently'; the Hebrew verb can
      imply earnest or early seeking.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: That is why
  alternatives:
  - Therefore
  - For this reason
  lexicon: HALOT
  rationale: The idiom introduces the woman's explanation for her action. 'That is
    why' is natural modern English and preserves the causal force without sounding
    overly formal.
- source_word: יָצָאתִי
  chosen: I came out
  alternatives:
  - I went out
  lexicon: HALOT
  rationale: The verb means 'go out/come out.' In English, from the speaker's perspective
    to the addressee, 'came out' fits the immediate encounter and reads naturally.
- source_word: לִקְרָאתֶךָ
  chosen: to meet you
  alternatives:
  - to encounter you
  - to come to meet you
  lexicon: HALOT
  rationale: The construction with קרא/לקראת commonly means going out to meet someone.
    'To meet you' is the clearest idiomatic rendering.
- source_word: לְשַׁחֵר
  chosen: to seek
  alternatives:
  - to seek early
  - to look diligently for
  lexicon: HALOT
  rationale: The verb can carry the nuance of seeking early or earnestly, but in context
    the main sense is intentional pursuit. English 'to seek' preserves the core meaning
    without overloading the line; the nuance is preserved in a footnote.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' Retaining 'face' preserves the Hebrew idiom and
    the vivid personal directness of the seductress's speech. 'Presence' is possible
    interpretively, but the literal expression works well in English here.
- source_word: וָאֶמְצָאֶךָּ
  chosen: and I have found you
  alternatives:
  - and I found you
  lexicon: HALOT
  rationale: 'The wayyiqtol advances the narrative: ''and I found you.'' However,
    in this direct speech, English present perfect can naturally convey the result
    now achieved (''I have found you''). This keeps the immediacy of the encounter
    while remaining faithful to the sense.'
