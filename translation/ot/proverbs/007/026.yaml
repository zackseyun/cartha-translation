id: PRO.7.26
reference: Proverbs 7:26
source:
  edition: WLC
  text: כִּֽי רַבִּ֣ים חֲלָלִ֣ים הִפִּ֑ילָה וַ֝/עֲצֻמִ֗ים כָּל הֲרֻגֶֽי/הָ־־׃
translation:
  text: For she has cast down many wounded, and all her slain are mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many are the slain she has brought down'; the first noun may also be
      rendered 'slain' rather than 'wounded,' but 'wounded' is retained in the main
      text to preserve the intensification with the next line, 'all her slain are
      mighty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the warning in the surrounding
    context. 'For' preserves the explanatory force naturally in English.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: Common quantitative adjective meaning 'many' or 'numerous.' 'Many' is
    idiomatic and concise.
- source_word: חֲלָלִים
  chosen: wounded
  alternatives:
  - slain
  - pierced ones
  lexicon: HALOT
  rationale: Although the noun can denote those fatally struck, in this verse it is
    paired with the later explicit term for 'her slain,' so rendering it as 'wounded'
    preserves the poetic progression and avoids flattening the parallelism into exact
    repetition.
- source_word: הִפִּילָה
  chosen: has cast down
  alternatives:
  - has caused to fall
  - has brought down
  lexicon: HALOT
  rationale: Hiphil of נפל conveys causing to fall. 'Has cast down' is vivid, idiomatic,
    and fits the image of victims brought low by her.
- source_word: וַעֲצֻמִים
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes strength or might. 'Mighty' best captures the forceful,
    proverbial tone and highlights that even the strong are among her victims.
- source_word: כָּל
  chosen: all
  alternatives:
  - every one of
  lexicon: HALOT
  rationale: Straightforward universal term; 'all' is the most natural rendering in
    this poetic line.
- source_word: הֲרֻגֶיהָ
  chosen: her slain
  alternatives:
  - those killed by her
  - her victims
  lexicon: HALOT
  rationale: 'Qal passive participle with 3fs suffix: literally ''her killed/slain
    ones.'' ''Her slain'' is compact, formal enough for poetry, and preserves the
    possessive relation.'
