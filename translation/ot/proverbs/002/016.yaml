  from: from the forbidden woman, from the foreign woman
  to: from the forbidden woman—the outsider
  rationale: 'The Hebrew presents two parallel descriptions of a single figure: the
    ''ishshah zarah'' (strange/forbidden woman) and the ''nokhriyyah'' (foreign/outsider
    woman). The current rendering, by repeating ''from the...'', makes them sound
    like two separate items in a list. Structuring the phrase as a clear apposition
    (e.g., using a comma or em-dash and removing the repeated ''from the'') would
    better reflect the Hebrew poetic structure, where the second term intensifies
    the first. Using ''the outsider'' for ''nokhriyyah'' also creates a stronger parallel
    with the interpretive ''forbidden woman'' than the more literal ''foreign woman''
    does.'
