id: PRO.2.16
reference: Proverbs 2:16
source:
  edition: WLC
  text: לְ֭/הַצִּ֣ילְ/ךָ מֵ/אִשָּׁ֣ה זָרָ֑ה מִ֝/נָּכְרִיָּ֗ה אֲמָרֶ֥י/הָ הֶחֱלִֽיקָה׃
translation:
  text: to rescue you from the strange woman, from the foreign woman whose words are
    smooth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange woman'; in Proverbs this expression often refers to a woman
      outside proper covenantal or marital bounds, not merely someone ethnically foreign.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose words are flattering.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the forbidden woman, from the foreign woman'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְהַצִּילְךָ
  chosen: to rescue you
  alternatives:
  - to deliver you
  - to save you
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of נצל with 2ms suffix expresses purpose/result
    in context: wisdom will act ''to rescue you.'' ''Rescue'' is natural modern English
    and preserves the sense of deliverance from danger better than the more theological-sounding
    ''save.'''
- source_word: מֵאִשָּׁה
  chosen: from the ... woman
  alternatives:
  - from a ... woman
  lexicon: HALOT
  rationale: The preposition מִן marks separation ('from'). Although the noun lacks
    the article, English idiom in this warning context often prefers 'the' for a class/type
    already introduced in wisdom discourse; this also fits the parallel with the following
    appositional phrase.
- source_word: זָרָה
  chosen: forbidden
  alternatives:
  - strange
  - adulterous
  - loose
  - immoral
  lexicon: HALOT
  rationale: זָרָה literally means 'strange/foreign,' but in Proverbs it commonly
    denotes a woman outside the proper covenantal/marital bounds. 'Forbidden' captures
    the moral-social force in contemporary English without over-specifying adultery
    in every instance. A more literal alternative is preserved in a footnote.
- source_word: מִנָּכְרִיָּה
  chosen: from the foreign woman
  alternatives:
  - from the stranger
  - from the alien woman
  lexicon: HALOT
  rationale: נָכְרִיָּה is closely related to foreignness/outsider status. Here it
    parallels זָרָה, likely intensifying the idea of the dangerous outsider rather
    than merely ethnicity. 'Foreign woman' keeps the lexical link to foreignness while
    allowing the moral warning context to stand.
- source_word: אֲמָרֶיהָ
  chosen: whose words
  alternatives:
  - whose sayings
  - her speech
  lexicon: HALOT
  rationale: The plural construct 'her words/sayings' is best rendered simply as 'whose
    words' in smooth English.
- source_word: הֶחֱלִיקָה
  chosen: are smooth
  alternatives:
  - are flattering
  - she has made smooth
  - she flatters
  lexicon: HALOT
  rationale: The verb חלק in Hiphil means 'to make smooth,' often metaphorically of
    smooth or flattering speech. 'Are smooth' preserves the metaphor in readable English;
    'flattering' is interpretive and is preserved in a footnote as a lexical alternative.
