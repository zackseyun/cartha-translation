id: PRO.2.6
reference: Proverbs 2:6
source:
  edition: WLC
  text: כִּֽי יְ֭הוָה יִתֵּ֣ן חָכְמָ֑ה מִ֝/פִּ֗י/ו דַּ֣עַת וּ/תְבוּנָֽה־׃
translation:
  text: For Yahweh gives wisdom; from his mouth come knowledge and understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the LORD gives wisdom.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from his mouth'; the image is that knowledge and understanding proceed from the LORD's speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'discernment' for 'understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation. 'For' fits the proverb's explanatory flow in English more naturally than 'Because' at the head of a standalone verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - gives forth
  - will give
  lexicon: HALOT
  rationale: The imperfect here expresses a general truth in proverbial style rather than a simple future prediction. Present-tense 'gives' best communicates the gnomic sense in natural English.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs, preserving the book's key theme and maintaining consistency.
- source_word: מִפִּיו
  chosen: from his mouth come
  alternatives:
  - from his mouth
  - out of his mouth come
  lexicon: HALOT
  rationale: 'The prepositional phrase literally means ''from his mouth.'' English idiom requires supplying the verbal sense with the following nouns: ''come.'' This preserves the imagery of divine speech as the source of knowledge and understanding without over-paraphrasing.'
- source_word: דַּעַת
  chosen: knowledge
  lexicon: HALOT
  rationale: Direct and standard gloss; pairs naturally with 'understanding' in wisdom literature.
- source_word: וּתְבוּנָה
  chosen: and understanding
  alternatives:
  - and discernment
  lexicon: HALOT
  rationale: תְבוּנָה often denotes understanding or discernment. 'Understanding' is chosen for readability and because it forms a familiar wisdom pair with 'knowledge' while remaining faithful to the Hebrew.
