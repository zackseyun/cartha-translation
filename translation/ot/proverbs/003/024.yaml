id: PRO.3.24
reference: Proverbs 3:24
source:
  edition: WLC
  text: אִם תִּשְׁכַּ֥ב לֹֽא תִפְחָ֑ד וְ֝/שָׁכַבְתָּ֗ וְֽ/עָרְבָ֥ה שְׁנָתֶֽ/ךָ־־׃
translation:
  text: If you lie down, you will not be afraid; when you lie down, your sleep will
    be pleasant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sleep will be sweet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or situational clause. 'If' preserves the Hebrew
    particle's basic force, while the following clause can still imply a general circumstance
    rather than uncertainty.
- source_word: תִּשְׁכַּב
  chosen: you lie down
  alternatives:
  - you go to bed
  - you recline
  lexicon: HALOT
  rationale: From שׁכב, here referring naturally to lying down for sleep. 'Lie down'
    is idiomatic, close to the Hebrew, and fits the parallel with 'your sleep.'
- source_word: לֹא תִפְחָד
  chosen: you will not be afraid
  alternatives:
  - you need not fear
  - you will not fear
  lexicon: HALOT
  rationale: The imperfect with negation expresses future/resultative assurance. 'Will
    not be afraid' is natural English and preserves the emotional sense of פחד without
    overinterpreting it as a command.
- source_word: וְשָׁכַבְתָּ
  chosen: when you lie down
  alternatives:
  - and you will lie down
  - yes, you will lie down
  lexicon: HALOT
  rationale: The waw + perfect here continues the thought with a temporal/resultative
    nuance rather than simple coordination. Rendering it 'when you lie down' avoids
    awkward repetition of 'and' in English while preserving the parallel development
    of the verse.
- source_word: וְעָרְבָה
  chosen: will be pleasant
  alternatives:
  - will be sweet
  - will be agreeable
  lexicon: HALOT
  rationale: From ערב in the sense of being pleasant or sweet. Because the subject
    is 'your sleep,' 'pleasant' is idiomatic modern English; 'sweet' is possible and
    traditional, but can sound slightly stylized.
- source_word: שְׁנָתֶךָ
  chosen: your sleep
  alternatives:
  - your slumber
  lexicon: HALOT
  rationale: Direct object/subject complement referring to the state or experience
    of sleep. 'Sleep' is the clearest modern equivalent; 'slumber' is more literary.
