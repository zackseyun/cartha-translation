id: PRO.3.13
reference: Proverbs 3:13
source:
  edition: WLC
  text: אַשְׁרֵ֣י אָ֭דָם מָצָ֣א חָכְמָ֑ה וְ֝/אָדָ֗ם יָפִ֥יק תְּבוּנָֽה׃
translation:
  text: Blessed is the man who finds wisdom, and the man who obtains understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is the person who finds wisdom, and the person who obtains understanding.'
      The Hebrew uses 'man' in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural form used idiomatically in beatitude-style expressions conveys
    a state of enviable blessedness. 'Blessed is' preserves the elevated wisdom-literature
    tone better than the flatter 'happy is,' while remaining natural English.
- source_word: אָדָם
  chosen: the man
  alternatives:
  - a man
  - the person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם is singular and generic, referring representatively to any
    human who attains wisdom. Per doctrine, gender-accurate language is preferred
    where the source uses masculine representative language, so 'the man' is retained
    rather than neutralizing to 'the person' in the main text.
- source_word: מָצָא
  chosen: finds
  alternatives:
  - has found
  - discovers
  lexicon: HALOT
  rationale: The qatal form in this beatitude context can be rendered as a gnomic
    present in English. 'Finds' reads naturally in proverbial style and expresses
    the general truth rather than a single past event.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for the central wisdom term in Proverbs; no contextual
    reason to vary.
- source_word: וְאָדָם
  chosen: and the man
  alternatives:
  - and a man
  - and the person
  lexicon: HALOT
  rationale: The repeated noun creates parallelism with the first colon. Rendering
    it explicitly as 'the man' preserves the Hebrew structure and poetic balance.
- source_word: יָפִיק
  chosen: obtains
  alternatives:
  - gets
  - brings forth
  - draws out
  - gains
  lexicon: HALOT
  rationale: The verb can carry the sense of producing, bringing out, or obtaining.
    In parallel with 'finds wisdom,' 'obtains understanding' best captures the sense
    of successfully acquiring insight in idiomatic English.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: A standard wisdom term denoting understanding or discernment. 'Understanding'
    matches common English Bible usage and pairs well with 'wisdom' in the poetic
    parallelism.
