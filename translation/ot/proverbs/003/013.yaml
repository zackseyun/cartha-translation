- issue: Generic masculine representation in wisdom beatitude
  chosen_reading: Retain 'the man' in the main text as representative/generic masculine
  alternative_readings:
  - the person
  - one who
  rationale: The Hebrew uses masculine singular אָדָם in a representative sense. Following
    the doctrine's gender-accurate principle, the translation preserves the source's
    form rather than neutralizing it, while a footnote can clarify inclusive force
    for modern readers.
