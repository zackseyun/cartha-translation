id: PRO.3.18
reference: Proverbs 3:18
source:
  edition: WLC
  text: עֵץ חַיִּ֣ים הִ֭יא לַ/מַּחֲזִיקִ֣ים בָּ֑/הּ וְֽ/תֹמְכֶ֥י/הָ מְאֻשָּֽׁר־׃פ
translation:
  text: She is a tree of life to those who take hold of her, and those who hold her
    fast are blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and those who uphold her are blessed.' The Hebrew verb can mean 'support,'
      'uphold,' or 'hold fast.'
    reason: lexical_alternative
  - marker: b
    text: The feminine pronouns refer to personified wisdom in the surrounding context.
    reason: cultural_note
lexical_decisions:
- source_word: עֵץ חַיִּים
  chosen: a tree of life
  alternatives:
  - the tree of life
  - a life-giving tree
  lexicon: HALOT
  rationale: The construct phrase literally means 'tree of life/lives.' 'A tree of
    life' is the most natural English rendering and preserves the metaphor without
    over-specifying it as the unique Edenic tree ('the tree of life'). 'Life-giving
    tree' captures sense but is more interpretive than the Hebrew image warrants.
- source_word: הִיא
  chosen: She is
  alternatives:
  - It is
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring back to personified wisdom
    in the immediate context. 'She' preserves the grammatical and literary personification
    better than the impersonal 'it.'
- source_word: לַמַּחֲזִיקִים
  chosen: to those who take hold of
  alternatives:
  - for those who seize
  - to those who grasp
  lexicon: HALOT
  rationale: From חזק in the Hiphil/causative stem with the sense of grasping or taking
    hold. 'Take hold of' is idiomatic, concrete, and fits wisdom literature's exhortational
    tone better than the harsher 'seize.'
- source_word: בָּהּ
  chosen: her
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, again referring to personified
    wisdom. 'Her' maintains the personification established by the Hebrew.
- source_word: וְתֹמְכֶיהָ
  chosen: and those who hold her fast
  alternatives:
  - and her supporters
  - and those who uphold her
  - and those who cling to her
  lexicon: HALOT
  rationale: From תמך, 'to support, uphold, hold fast.' In parallel with 'take hold
    of her,' the phrase likely intensifies persevering attachment to wisdom. 'Hold
    her fast' preserves the metaphor of firm retention better than the more abstract
    'supporters' or 'uphold her.'
- source_word: מְאֻשָּׁר
  chosen: are blessed
  alternatives:
  - are happy
  - are fortunate
  lexicon: HALOT
  rationale: This term denotes a state of blessedness or enviable flourishing, often
    rendered 'blessed' in wisdom contexts (cf. אַשְׁרֵי formulas). 'Happy' is too
    subjective and modern; 'fortunate' can imply chance rather than covenantal or
    moral flourishing.
