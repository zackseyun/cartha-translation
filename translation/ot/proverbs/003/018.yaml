theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine personal language ('She... her') for wisdom
  alternative_readings:
  - Use impersonal language ('It... it') to refer to wisdom abstractly
  rationale: The Hebrew explicitly uses feminine singular forms, and Proverbs regularly
    personifies wisdom as a woman. Preserving this literary feature reflects the source
    text without making additional theological claims.
  doctrine_reference: Translation philosophy §1, §6
