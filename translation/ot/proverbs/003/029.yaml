id: PRO.3.29
reference: Proverbs 3:29
source:
  edition: WLC
  text: אַל תַּחֲרֹ֣שׁ עַל רֵעֲ/ךָ֣ רָעָ֑ה וְ/הֽוּא יוֹשֵׁ֖ב לָ/בֶ֣טַח אִתָּֽ/ךְ־־־׃
translation:
  text: Do not devise harm against your neighbor while he lives securely beside you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not plot evil against your neighbor while he dwells in safety with
      you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחֲרֹשׁ
  chosen: devise
  alternatives:
  - plot
  - plan
  lexicon: HALOT
  rationale: The verb חרשׁ in this idiom means to plan or scheme, not literally 'plow'
    or 'be silent.' 'Devise' preserves the intentional, inward planning sense in clear
    modern English.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: With חרשׁ רעה, the preposition marks hostile direction toward the object.
    'Against' best conveys adversarial intent in English.
- source_word: רֵעֲךָ
  chosen: your neighbor
  alternatives:
  - your friend
  - your companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In wisdom literature and
    ethical instruction, 'neighbor' best captures the social-moral scope without implying
    emotional closeness.
- source_word: רָעָה
  chosen: harm
  alternatives:
  - evil
  - trouble
  lexicon: HALOT
  rationale: Here רָעָה refers to intended injury or wrongdoing toward another person.
    'Harm' communicates concrete malicious intent more naturally than the broader
    and more abstract 'evil.'
- source_word: יוֹשֵׁב
  chosen: lives
  alternatives:
  - dwells
  - sits
  lexicon: HALOT
  rationale: The participle of ישׁב denotes dwelling or residing. 'Lives' is idiomatic
    modern English in this context, while still reflecting ongoing settled presence.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - trustingly
  lexicon: HALOT
  rationale: בֶּטַח denotes security or safety. 'Securely' fits the adverbial force
    and highlights the unsuspecting safety of the neighbor.
- source_word: אִתָּךְ
  chosen: beside you
  alternatives:
  - with you
  - near you
  lexicon: HALOT
  rationale: The phrase indicates proximity or association. Because the proverb concerns
    someone dwelling in trusting nearness, 'beside you' brings out the relational
    and spatial closeness more naturally than the bare 'with you.'
