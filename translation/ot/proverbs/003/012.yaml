theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Gendered parental imagery
  chosen_reading: as a father the son
  alternative_readings:
  - as a parent a child
  rationale: The Hebrew explicitly uses masculine singular terms for the proverb's representative imagery. Per the project's gender-accurate policy, the translation preserves 'father' and 'son' rather than neutralizing them.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
- issue: Sense of divine correction
  chosen_reading: reproves
  alternative_readings:
  - corrects
  - disciplines
  rationale: The immediate Hebrew verb denotes reproof/correction more specifically than the broader concept of discipline. This preserves the lexical force without importing a fuller theological notion than the word itself states, though the surrounding context includes discipline.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
