id: PRO.3.12
reference: Proverbs 3:12
source:
  edition: WLC
  text: כִּ֤י אֶ֥ת אֲשֶׁ֣ר יֶאֱהַ֣ב יְהוָ֣ה יוֹכִ֑יחַ וּ֝/כְ/אָ֗ב אֶת בֵּ֥ן יִרְצֶֽה־׃
translation:
  text: For Yahweh reproves the one he loves, as a father the son in whom he delights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corrects' or 'disciplines.' The Hebrew verb emphasizes reproof or correction, though in context it contributes to the broader theme of the LORD's discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'and like a father the son he favors.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation; 'For' fits the discourse flow in English wisdom literature.
- source_word: אֶת אֲשֶׁר
  chosen: the one ... whom
  alternatives:
  - whomever
  - him whom
  lexicon: HALOT
  rationale: The object marker plus relative particle forms a relative construction referring to a person. 'The one ... whom' is natural English and preserves the singular personal reference.
- source_word: יֶאֱהַב
  chosen: he loves
  alternatives:
  - he has affection for
  lexicon: HALOT
  rationale: Standard rendering of אהב. 'Loves' preserves the covenantal and parental warmth of the Hebrew without paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the convention signaled in DOCTRINE.md.
- source_word: יוֹכִיחַ
  chosen: reproves
  alternatives:
  - corrects
  - rebukes
  - disciplines
  lexicon: HALOT
  rationale: The Hiphil of יכח commonly carries the sense of reproof or correction by verbal/moral confrontation. 'Reproves' best matches the lexical core here, while the broader disciplinary implication remains in context from the surrounding verses.
- source_word: וּכְאָב
  chosen: as a father
  alternatives:
  - and like a father
  lexicon: HALOT
  rationale: The conjunction with comparative כ introduces a simile. English idiom is smoother with 'as a father' while retaining the comparison.
- source_word: בֵּן
  chosen: the son
  alternatives:
  - a son
  - his son
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit possessive suffix; 'the son' preserves the generic singular and matches the proverb's representative father-son imagery. This also aligns with the gender-accurate policy rather than neutralizing to 'child'.
- source_word: יִרְצֶה
  chosen: in whom he delights
  alternatives:
  - he delights in
  - he favors
  - he accepts
  lexicon: HALOT
  rationale: רצה here expresses favorable pleasure or delight. Rendering it as 'in whom he delights' makes the relation explicit in idiomatic English and preserves the positive affection paired with reproof.
