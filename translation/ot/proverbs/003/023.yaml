id: PRO.3.23
reference: Proverbs 3:23
source:
  edition: WLC
  text: אָ֤ז תֵּלֵ֣ךְ לָ/בֶ֣טַח דַּרְכֶּ֑/ךָ וְ֝/רַגְלְ/ךָ֗ לֹ֣א תִגּֽוֹף׃
translation:
  text: Then you will walk securely on your way, and your foot will not stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in safety.' The Hebrew phrase can be rendered more literally as 'in
      security' or 'in safety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: Temporal adverb marking the result of the preceding instruction; 'Then'
    is concise and natural in English while preserving the sequence.
- source_word: תֵּלֵךְ
  chosen: you will walk
  alternatives:
  - you will go
  lexicon: HALOT
  rationale: הלך commonly means 'walk/go.' 'Walk' fits wisdom literature's path metaphor
    and pairs naturally with 'your way.'
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - confidently
  lexicon: HALOT
  rationale: The phrase indicates safety/security. 'Securely' renders the adverbial
    sense smoothly in modern English. 'Confidently' is possible but could overemphasize
    subjective feeling rather than objective safety.
- source_word: דַּרְכֶּךָ
  chosen: on your way
  alternatives:
  - your path
  - your road
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean way, path, or road, often literally and metaphorically
    in Proverbs. 'On your way' is idiomatic with 'walk' and preserves both literal
    and figurative resonance.
- source_word: וְרַגְלְךָ
  chosen: and your foot
  alternatives:
  - and your feet
  lexicon: HALOT
  rationale: The Hebrew noun is singular with 2ms suffix. English singular 'foot'
    preserves the source form and suits the following singular verb.
- source_word: לֹא תִגּוֹף
  chosen: will not stumble
  alternatives:
  - will not strike against anything
  - will not be made to stumble
  lexicon: HALOT
  rationale: נגף in this context refers to striking the foot or stumbling. 'Will not
    stumble' is the clearest idiomatic English rendering and matches the imagery of
    safe walking. A more literal 'strike your foot' is possible but less natural here.
