id: PRO.3.32
reference: Proverbs 3:32
source:
  edition: WLC
  text: כִּ֤י תוֹעֲבַ֣ת יְהוָ֣ה נָל֑וֹז וְֽ/אֶת יְשָׁרִ֥ים סוֹדֽ/וֹ־׃
translation:
  text: For the crooked person is an abomination to the LORD, but his intimate counsel
    is with the upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his secret is with the upright"; the Hebrew סוֹד can mean confidential
      counsel, secret, or intimate fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding admonition; 'For'
    is a natural English connective in wisdom literature.
- source_word: תוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable before God. 'Abomination'
    preserves the moral and covenantal weight of the Hebrew better than a flatter
    adjective.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md.
- source_word: נָלוֹז
  chosen: the crooked person
  alternatives:
  - the devious one
  - the perverse one
  - the twisted one
  lexicon: HALOT
  rationale: The participial/adjectival form describes one who is morally bent or
    deviating from the straight path. 'Crooked person' fits the wisdom contrast with
    'upright' and is idiomatic modern English.
- source_word: וְאֶת
  chosen: but
  alternatives:
  - and
  - while
  lexicon: HALOT
  rationale: Though formally the conjunction is 'and' with the object marker, in this
    antithetical proverb the sense is adversative. 'But' best conveys the contrast
    in English.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  - the righteous
  lexicon: HALOT
  rationale: In wisdom literature this term commonly denotes morally straight or upright
    people. 'The upright' preserves the metaphorical contrast with 'crooked person'.
- source_word: סוֹדוֹ
  chosen: his intimate counsel
  alternatives:
  - his counsel
  - his secret
  - his confidential fellowship
  lexicon: HALOT
  rationale: סוֹד can denote confidential counsel, intimate circle, or secret fellowship.
    'Intimate counsel' preserves both the relational and communicative dimensions
    without overstating one side exclusively.
