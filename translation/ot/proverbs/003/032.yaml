theological_decisions:
- issue: Meaning of סוֹד in relation to the upright
  chosen_reading: God grants the upright his intimate counsel
  alternative_readings:
  - God's secret is with the upright
  - God has intimate fellowship with the upright
  rationale: The Hebrew noun can refer to confidential counsel or intimate company.
    The chosen rendering keeps the metaphor accessible in English while preserving
    the idea of privileged nearness and disclosure, without narrowing it to either
    mere information or mere fellowship.
  doctrine_reference: Preserve theological tension rather than resolve it
