id: PRO.3.6
reference: Proverbs 3:6
source:
  edition: WLC
  text: בְּ/כָל דְּרָכֶ֥י/ךָ דָעֵ֑/הוּ וְ֝/ה֗וּא יְיַשֵּׁ֥ר אֹֽרְחֹתֶֽי/ךָ־׃
translation:
  text: In all your ways acknowledge him, and he will make your paths straight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will direct your paths.' The Hebrew more literally says 'he will
      make your paths straight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל
  chosen: In all
  alternatives:
  - In every
  lexicon: HALOT
  rationale: 'The preposition ב plus כָּל is naturally rendered as a comprehensive
    sphere: ''in all'' your ways. ''In every'' is possible, but ''in all'' is idiomatic
    and preserves the distributive-total sense.'
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your paths
  - your course of life
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes both literal road and figurative manner of life.
    Here, paired with the more concrete אֹרְחוֹתֶיךָ later in the verse, rendering
    this first term as 'ways' preserves the figurative breadth and avoids flattening
    both nouns into the same English word.
- source_word: דָעֵהוּ
  chosen: acknowledge him
  alternatives:
  - know him
  - recognize him
  lexicon: HALOT
  rationale: The imperative from יָדַע with 3ms suffix calls for relational recognition
    of God in all one's conduct, not merely intellectual awareness. 'Acknowledge him'
    is the established and contextually apt rendering in wisdom literature, capturing
    active regard and submission. 'Know him' is more literal but can sound too cognitive
    in English; 'recognize him' is possible but less natural here.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - then he
  - and he himself
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun marks the subject explicitly:
    ''and he.'' English does not require an emphatic gloss like ''himself'' here,
    though the pronoun does highlight God''s responsive action.'
- source_word: יְיַשֵּׁר
  chosen: will make straight
  alternatives:
  - will straighten
  - will direct
  - will level
  lexicon: HALOT
  rationale: The Piel of יָשַׁר means to make straight or smooth. 'Will make straight'
    best reflects the Hebrew image and avoids importing the more interpretive 'direct'
    into the main text. Because idiomatic English prefers the adjective after 'make,'
    the final line is rendered 'make your paths straight.'
- source_word: אֹרְחֹתֶיךָ
  chosen: your paths
  alternatives:
  - your tracks
  - your ways
  lexicon: HALOT
  rationale: אֹרַח often refers to a path or track, literal or figurative. Rendering
    it as 'paths' preserves the metaphor and creates a deliberate distinction from
    דְּרָכֶיךָ ('ways') earlier in the verse.
