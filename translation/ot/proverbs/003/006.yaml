theological_decisions:
- issue: Nature of divine guidance in the promise
  chosen_reading: he will make your paths straight
  alternative_readings:
  - he will direct your paths
  rationale: The Hebrew imagery emphasizes God making the course straight/smooth rather
    than merely giving directional advice. This preserves the proverb's theological
    claim without narrowing it to inward guidance alone. The common traditional rendering
    'direct your paths' is preserved as an alternative because it reflects a longstanding
    interpretive translation.
  doctrine_reference: Translation philosophy §1, §3, §5
