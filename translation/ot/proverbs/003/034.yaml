theological_decisions:
- issue: Referent of the pronoun הוּא
  chosen_reading: The subject is left as 'he,' with God understood from the surrounding
    context.
  alternative_readings:
  - Explicitly supplying 'the LORD' or 'God' in English
  rationale: The Hebrew uses an explicit pronoun, not the divine name. Retaining 'he'
    respects the source text while allowing the immediate context to identify the
    referent. This avoids adding wording not present in the verse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of עניים in this context
  chosen_reading: Rendered as 'the humble' rather than 'the poor.'
  alternative_readings:
  - the poor
  - the afflicted
  - the lowly
  rationale: 'In this antithetical proverb, the contrast is ethical/postural rather
    than merely socioeconomic: scoffers versus the humble. This also coheres with
    the verse''s reception in later biblical tradition without forcing that tradition
    into the text.'
  doctrine_reference: Translation philosophy §1, §5
