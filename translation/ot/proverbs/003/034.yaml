id: PRO.3.34
reference: Proverbs 3:34
source:
  edition: WLC
  text: אִם לַ/לֵּצִ֥ים הֽוּא יָלִ֑יץ ו/ל/עניים יִתֶּן חֵֽן־־־׃
translation:
  text: If it is to scoffers, he scoffs; but to the humble he gives favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to mockers, he mocks'; the Hebrew repeats the same root for both 'scoffers'
      and 'scoffs,' creating a deliberate wordplay.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the poor' or 'to the afflicted'; the Hebrew term can denote those
      who are lowly in status or circumstance, though here 'humble' best fits the
      contrast with 'scoffers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'grace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces a conditional or concessive-like clause. In this proverb's
    antithetical structure, 'If' preserves the Hebrew form without overinterpreting
    it as an emphatic particle.
- source_word: לַלֵּצִים
  chosen: to scoffers
  alternatives:
  - to mockers
  - to the scornful
  lexicon: HALOT
  rationale: לץ denotes those who mock or deride. 'Scoffers' is concise, idiomatic,
    and matches wisdom-literature usage in English.
- source_word: הוּא
  chosen: he
  alternatives:
  - He himself
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew, but standard English can
    convey the sense with 'he' without awkwardness. The subject is left implicit as
    God from context rather than expanded in translation.
- source_word: יָלִיץ
  chosen: scoffs
  alternatives:
  - mocks
  - shows himself a scoffer
  lexicon: HALOT
  rationale: 'The Hiphil of לוץ here forms a wordplay with לֵצִים. ''Scoffs'' preserves
    the lexical echo: to scoffers, he scoffs. This also aligns with the sense reflected
    in ancient versions and the proverb''s retributive symmetry.'
- source_word: וְלַעֲנִיִּים
  chosen: but to the humble
  alternatives:
  - and to the afflicted
  - and to the poor
  lexicon: HALOT
  rationale: Though עני often means poor or afflicted, in wisdom context and in this
    antithetical pairing with scoffers it points to the lowly/humble. 'But' brings
    out the adversative sense of the parallelism in natural English.
- source_word: יִתֶּן
  chosen: he gives
  alternatives:
  - he grants
  - he will give
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic action in proverbial style.
    Present tense in English best captures the gnomic force.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: חן can mean favor or grace. 'Favor' is the more natural English choice
    in this wisdom context and avoids importing later theological associations unnecessarily,
    while still preserving the benevolent sense.
