id: PRO.3.17
reference: Proverbs 3:17
source:
  edition: WLC
  text: דְּרָכֶ֥י/הָ דַרְכֵי נֹ֑עַם וְֽ/כָל נְתִ֖יבוֹתֶ֣י/הָ שָׁלֽוֹם־־׃
translation:
  text: Her ways are ways of pleasantness, and all her paths are peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-being' or 'wholeness' for 'peace' (Hebrew shalom).
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכֶיהָ
  chosen: her ways
  alternatives:
  - her roads
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes a way, road, or course of life. In wisdom literature
    it often carries a metaphorical sense of conduct or manner of life. 'Her ways'
    preserves both the concrete imagery and the figurative sense, with the feminine
    suffix referring back to wisdom in the context.
- source_word: דַרְכֵי
  chosen: ways of
  alternatives:
  - paths of
  - roads of
  lexicon: HALOT
  rationale: 'The construct form repeats the noun for emphasis: literally, ''her ways
    are ways of ...'' Retaining the repetition in English reflects the Hebrew style
    and avoids flattening the poetic parallelism.'
- source_word: נֹעַם
  chosen: pleasantness
  alternatives:
  - delight
  - pleasantness/graciousness
  - sweetness
  lexicon: HALOT
  rationale: נֹעַם denotes pleasantness, delightfulness, or agreeableness. 'Pleasantness'
    best fits the abstract noun construction and preserves the wisdom-poetry tone
    without overinterpreting toward emotional delight alone.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: The conjunction plus כָּל straightforwardly means 'and all.' This keeps
    the comprehensive force of the second colon.
- source_word: נְתִיבוֹתֶיהָ
  chosen: her paths
  alternatives:
  - her tracks
  - her pathways
  lexicon: HALOT
  rationale: נְתִיבָה is a path or track, often poetically parallel to דֶּרֶךְ. 'Paths'
    gives natural English while preserving the parallel image with 'ways.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  - peacefulness
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, wholeness, and well-being.
    'Peace' is the most established and natural rendering here, while still allowing
    the fuller Hebrew sense to resonate in context.
