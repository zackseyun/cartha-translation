id: PRO.3.10
reference: Proverbs 3:10
source:
  edition: WLC
  text: וְ/יִמָּלְא֣וּ אֲסָמֶ֣י/ךָ שָׂבָ֑ע וְ֝/תִיר֗וֹשׁ יְקָבֶ֥י/ךָ יִפְרֹֽצוּ׃פ
translation:
  text: then your barns will be filled with plenty, and your vats will burst with
    new wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overflow with new wine.' The Hebrew verb literally suggests breaking
      out or bursting forth, emphasizing abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלְאוּ
  chosen: will be filled
  alternatives:
  - will be full
  lexicon: HALOT
  rationale: 'Niphal imperfect of מלא expresses a future/passive-result sense: the
    barns come to be filled. ''Will be filled'' is natural English and preserves the
    verbal force.'
- source_word: אֲסָמֶיךָ
  chosen: your barns
  alternatives:
  - your storehouses
  - your granaries
  lexicon: HALOT
  rationale: אסם denotes a storage building for grain or produce. 'Barns' is the most
    idiomatic modern equivalent, while 'storehouses' is possible but less vivid here.
- source_word: שָׂבָע
  chosen: with plenty
  alternatives:
  - with abundance
  - to satisfaction
  - with fullness
  lexicon: HALOT
  rationale: The noun conveys abundance/satiety. In English, after 'filled,' the idiom
    'filled with plenty' communicates abundant provision without awkward literalism
    such as 'filled with satiety.'
- source_word: תִירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - wine
  lexicon: HALOT
  rationale: תירוש commonly refers to fresh/new wine, distinct from the more general
    יין. 'New wine' preserves the lexical distinction and the agricultural imagery.
- source_word: יְקָבֶיךָ
  chosen: your vats
  alternatives:
  - your wine vats
  - your presses
  lexicon: HALOT
  rationale: יקב refers to a vat or wine vat associated with pressing/collecting grape
    juice. 'Vats' is concise and fits the parallel with barns; 'presses' is possible
    but less precise for the container imagery.
- source_word: יִפְרֹצוּ
  chosen: will burst
  alternatives:
  - will overflow
  - will break open
  lexicon: HALOT
  rationale: פרץ literally conveys breaking through/bursting forth. 'Will burst' preserves
    the strong image; in context it implies overflowing abundance rather than structural
    destruction.
