id: PRO.3.25
reference: Proverbs 3:25
source:
  edition: WLC
  text: אַל תִּ֭ירָא מִ/פַּ֣חַד פִּתְאֹ֑ם וּ/מִ/שֹּׁאַ֥ת רְ֝שָׁעִ֗ים כִּ֣י תָבֹֽא־׃
translation:
  text: Do not fear sudden terror, or the ruin of the wicked when it comes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devastation' or 'destruction' for 'ruin' (Heb. שֹׁאָה).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the ruin of the wicked' may mean either the calamity that befalls
      the wicked or the calamity associated with wicked people; the Hebrew is compact
      and does not fully specify the relation.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not be
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verb
    to express prohibition. 'Do not' is the natural English imperative equivalent.
- source_word: תִּירָא
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: From ירא, 'to fear, be afraid.' 'Fear' works smoothly with the prohibition
    and preserves the concise force of the Hebrew.
- source_word: מִפַּחַד
  chosen: sudden terror
  alternatives:
  - dread
  - terror
  lexicon: HALOT
  rationale: The preposition מן with פחד after a verb of fearing marks the object/source
    of fear. In English, 'fear' naturally takes a direct object, so the preposition
    is not carried over woodenly. The noun פחד denotes dread/terror.
- source_word: פִּתְאֹם
  chosen: sudden
  alternatives:
  - suddenly
  - unexpected
  lexicon: HALOT
  rationale: This adverb modifies the terror as something abrupt or unexpected. Rendering
    it attributively as 'sudden terror' is idiomatic and preserves the sense.
- source_word: וּמִשֹּׁאַת
  chosen: the ruin
  alternatives:
  - devastation
  - destruction
  - storm
  lexicon: HALOT
  rationale: שֹׁאָה commonly denotes devastation, ruin, or destructive calamity. 'Ruin'
    is clear modern English and fits the parallel with 'sudden terror.' The prefixed
    conjunction and preposition are absorbed idiomatically into 'or the ruin.'
- source_word: רְשָׁעִים
  chosen: of the wicked
  alternatives:
  - of wicked people
  - that comes upon the wicked
  lexicon: HALOT
  rationale: The plural adjective/noun means 'wicked ones' or 'wicked people.' The
    construct relation with שֹׁאַת is most naturally rendered 'the ruin of the wicked,'
    i.e., the calamity associated with them. This preserves the Hebrew compactness
    without over-interpreting whether they suffer it or cause it.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  - if
  lexicon: HALOT
  rationale: Here כִּי introduces the temporal circumstance tied to the feminine singular
    verb תבוא referring back to שֹׁאַת. 'When it comes' best fits the syntax and context;
    'for' would make poor sense in English here.
- source_word: תָבֹא
  chosen: it comes
  alternatives:
  - it arrives
  - it happens
  lexicon: HALOT
  rationale: From בוא, 'to come.' The feminine singular agrees with שֹׁאַת ('ruin/devastation').
    'When it comes' is a straightforward rendering.
