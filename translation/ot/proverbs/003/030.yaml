id: PRO.3.30
reference: Proverbs 3:30
source:
  edition: WLC
  text: אַל תרוב עִם אָדָ֣ם חִנָּ֑ם אִם לֹ֖א גְמָלְ/ךָ֣ רָעָֽה־־־׃
translation:
  text: Do not contend with a man for no reason, if he has done you no harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not quarrel with a man without cause, if he has done you no wrong.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man' may function generically here for any person.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibitive command. Simple English prohibition
    best matches the Hebrew without adding emphasis not explicit in the text.
- source_word: תרוב
  chosen: contend
  alternatives:
  - quarrel
  - strive
  - bring a case against
  lexicon: HALOT
  rationale: The verb ריב can denote contending, quarreling, or litigating. 'Contend'
    preserves the broader sense, covering both verbal and legal dispute, and fits
    wisdom-instruction style better than the narrower 'bring a case against' or the
    more colloquial 'quarrel'.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition normally means 'with.' In English, 'contend with' is
    idiomatic and preserves the Hebrew construction. 'Against' is possible by sense,
    but less formally aligned to the source wording here.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - someone
  - a person
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here אָדָם refers
    to an individual human counterpart in a generic wisdom saying, so 'a man' best
    reflects the singular masculine/generic force. More neutral alternatives are possible
    in interpretation but are less source-mirroring.
- source_word: חִנָּם
  chosen: for no reason
  alternatives:
  - without cause
  - gratuitously
  - in vain
  lexicon: HALOT
  rationale: חִנָּם commonly means 'without cause' or 'for nothing.' 'For no reason'
    is clear modern English and communicates the unjustified nature of the contention
    without archaic phrasing.
- source_word: אִם לֹא
  chosen: if he has not
  alternatives:
  - unless he has
  - when he has not
  lexicon: HALOT
  rationale: The conditional phrase introduces the exception or qualifying condition.
    In smooth English, this is best represented as 'if he has not,' though the sense
    is close to 'unless he has.'
- source_word: גְמָלְךָ
  chosen: has done you
  alternatives:
  - has repaid you
  - has dealt with you
  lexicon: HALOT
  rationale: The verb גמל often carries the idea of dealing with or repaying someone,
    whether for good or ill. In this collocation with 'harm,' 'has done you' is the
    most natural English expression while preserving the action toward the addressee.
- source_word: רָעָה
  chosen: no harm
  alternatives:
  - evil
  - wrong
  - injury
  lexicon: HALOT
  rationale: רָעָה can mean evil, harm, or injury. In this interpersonal context,
    'harm' best captures concrete wrongdoing against the addressee in idiomatic English.
