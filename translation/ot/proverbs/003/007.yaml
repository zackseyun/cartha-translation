id: PRO.3.7
reference: Proverbs 3:7
source:
  edition: WLC
  text: אַל תְּהִ֣י חָכָ֣ם בְּ/עֵינֶ֑י/ךָ יְרָ֥א אֶת יְ֝הוָ֗ה וְ/ס֣וּר מֵ/רָֽע־־׃
translation:
  text: Do not be wise in your own eyes; fear the LORD and turn away from evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not become wise in your own eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'revere the LORD.' The Hebrew verb can denote reverent fear or awe before
      God.
    reason: lexical_alternative
  - marker: c
    text: Or 'depart from evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not become
  - Do not be
  lexicon: HALOT
  rationale: Negative particle used for prohibition; in English it naturally governs
    the following verb as an imperative prohibition.
- source_word: תְּהִי
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Qal imperfect/jussive 2ms of היה after אַל expresses a prohibition. 'Be'
    is the most natural English complement with the predicate adjective חָכָם.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - a wise man
  - self-wise
  lexicon: HALOT
  rationale: Predicate adjective meaning 'wise.' 'Wise' preserves the concise Hebrew
    expression without over-interpreting it as 'self-wise' in the main text.
- source_word: בְּעֵינֶיךָ
  chosen: in your own eyes
  alternatives:
  - in your eyes
  - in your own sight
  lexicon: HALOT
  rationale: Idiomatic Hebrew for one's own estimation or self-assessment. 'Your own
    eyes' is a standard and transparent English equivalent; 'own' is supplied idiomatically
    to convey the reflexive sense.
- source_word: יְרָא
  chosen: fear
  alternatives:
  - revere
  - stand in awe of
  lexicon: HALOT
  rationale: Imperative of ירא in wisdom literature commonly denotes reverent fear
    before God. 'Fear' preserves the established biblical-theological weight better
    than the weaker 'revere,' while remaining natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the Tetragrammaton.
- source_word: וְסוּר
  chosen: and turn away
  alternatives:
  - and depart
  - and turn aside
  lexicon: HALOT
  rationale: Imperative of סור meaning to turn aside or depart. 'Turn away' is idiomatic
    modern English and captures the volitional moral avoidance called for in wisdom
    instruction.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is evil
  - from wrongdoing
  lexicon: HALOT
  rationale: רָע here denotes moral evil in parallel with fearing the LORD. 'From
    evil' is concise and preserves the ethical force without narrowing it to a specific
    act.
