id: PRO.3.11
reference: Proverbs 3:11
source:
  edition: WLC
  text: מוּסַ֣ר יְ֭הוָה בְּנִ֣/י אַל תִּמְאָ֑ס וְ/אַל תָּ֝קֹ֗ץ בְּ/תוֹכַחְתּֽ/וֹ־־׃
translation:
  text: My son, do not despise Yahweh’s discipline, and do not loathe his reproof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be weary of his rebuke.' The Hebrew verb can also carry the sense of becoming weary or impatient, not only loathing.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: מוּסַר in wisdom literature commonly denotes corrective training or discipline, not mere abstract teaching. 'Discipline' best captures the formative and corrective sense in natural modern English, while avoiding the narrower 'instruction' and the more punitive-sounding 'chastening'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew is singular masculine with a direct paternal address in wisdom instruction. Following the gender-accurate policy, 'My son' preserves the source form and literary setting better than the more neutral 'My child'.
- source_word: אַל תִּמְאָס
  chosen: do not despise
  alternatives:
  - do not reject
  - do not spurn
  lexicon: HALOT
  rationale: מָאַס conveys rejecting with contempt or disdain. 'Despise' preserves the attitudinal force and fits the admonitory tone better than the flatter 'reject'.
- source_word: תָּקֹץ
  chosen: do not loathe
  alternatives:
  - do not be weary of
  - do not be disgusted by
  - do not abhor
  lexicon: HALOT
  rationale: קוּץ can express revulsion, impatience, or weariness. In parallel with 'do not despise,' 'do not loathe' preserves the stronger emotional aversion implied by the verb while remaining idiomatic. A softer rendering like 'be weary of' is possible but underplays the parallelism.
- source_word: בְּתוֹכַחְתּוֹ
  chosen: his reproof
  alternatives:
  - his rebuke
  - his correction
  lexicon: HALOT
  rationale: תּוֹכַחַת denotes verbal correction, rebuke, or reproof. 'Reproof' pairs well with 'discipline' by distinguishing verbal admonition from broader formative discipline. 'Rebuke' is viable but slightly harsher; 'correction' risks redundancy with 'discipline'.
