id: PRO.3.8
reference: Proverbs 3:8
source:
  edition: WLC
  text: רִ֭פְאוּת תְּהִ֣י לְ/שָׁרֶּ֑/ךָ וְ֝/שִׁקּ֗וּי לְ/עַצְמוֹתֶֽי/ךָ׃
translation:
  text: It will be healing to your body and refreshment to your bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your navel.' The Hebrew term may refer specifically to the navel,
      though in this context it likely stands more broadly for the body's physical
      well-being.
    reason: lexical_alternative
  - marker: b
    text: Or 'moisture' or 'nourishment' to your bones.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִפְאוּת
  chosen: healing
  alternatives:
  - health
  - medicine
  lexicon: HALOT
  rationale: The noun denotes healing or health-restoration. 'Healing' best captures
    the result-oriented sense in natural English while preserving the concrete bodily
    imagery of the Hebrew.
- source_word: תְּהִי
  chosen: it will be
  alternatives:
  - may it be
  - shall be
  lexicon: HALOT
  rationale: 'The form is an imperfect/jussive-like 3fs of היה agreeing with the feminine
    noun רִפְאוּת. In context, following the preceding exhortation, it expresses resultant
    consequence: ''it will be.'''
- source_word: לְשָׁרֶּךָ
  chosen: to your body
  alternatives:
  - to your navel
  - to your flesh
  lexicon: HALOT
  rationale: The noun שֹׁר is traditionally rendered 'navel,' but in this context
    many understand it more broadly as the body's center or frame. 'Body' communicates
    the likely sense in readable modern English without forcing an anatomically narrow
    image that may obscure the proverb's meaning.
- source_word: וְשִׁקּוּי
  chosen: and refreshment
  alternatives:
  - and drink
  - and moisture
  - and nourishment
  lexicon: HALOT
  rationale: The noun derives from the idea of giving drink or moisture. In parallel
    with 'healing' and with 'bones,' the sense is restorative refreshment or invigoration.
    'Refreshment' is idiomatic and preserves the metaphorical force.
- source_word: לְעַצְמוֹתֶיךָ
  chosen: to your bones
  lexicon: HALOT
  rationale: A straightforward rendering. 'Bones' in Hebrew anthropology often represents
    the inner frame or vitality of the person, and the concrete image should be preserved.
