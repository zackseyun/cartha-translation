id: PRO.3.20
reference: Proverbs 3:20
source:
  edition: WLC
  text: בְּ֭/דַעְתּ/וֹ תְּהוֹמ֣וֹת נִבְקָ֑עוּ וּ֝/שְׁחָקִ֗ים יִרְעֲפוּ טָֽל־׃
translation:
  text: By his knowledge the depths were split open, and the clouds drip dew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deeps' or 'the deep waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the skies drip dew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדַעְתּוֹ
  chosen: By his knowledge
  alternatives:
  - through his knowledge
  - by his understanding
  lexicon: HALOT
  rationale: The preposition ב marks means or instrument here, and דַּעַת denotes
    knowledge. 'By his knowledge' is concise and natural, while preserving the instrumental
    sense. 'Understanding' is possible in wisdom contexts, but 'knowledge' more directly
    matches the noun.
- source_word: תְּהוֹמוֹת
  chosen: the depths
  alternatives:
  - the deeps
  - the deep waters
  - the abysses
  lexicon: HALOT
  rationale: תְּהוֹמוֹת refers to the deep waters or primeval depths. 'The depths'
    is idiomatic modern English and preserves the cosmic sense without sounding archaic
    like 'the deeps.'
- source_word: נִבְקָעוּ
  chosen: were split open
  alternatives:
  - were broken open
  - were cleft
  - burst open
  lexicon: HALOT
  rationale: The Niphal form conveys a passive or reflexive opening/splitting. 'Were
    split open' captures the vivid physical imagery and works well with the waters/depths
    imagery.
- source_word: וּשְׁחָקִים
  chosen: and the clouds
  alternatives:
  - and the skies
  - and the heavens
  lexicon: HALOT
  rationale: שְׁחָקִים can denote skies or clouds, especially the upper regions associated
    with rain and dew. Because the following verb concerns dripping dew, 'clouds'
    best fits the immediate meteorological image.
- source_word: יִרְעֲפוּ
  chosen: drip
  alternatives:
  - distill
  - pour down
  - drop
  lexicon: HALOT
  rationale: The verb denotes dripping or distilling gently. 'Drip' is clear modern
    English and suits dew better than stronger options like 'pour down.' 'Distill'
    is possible but less natural for contemporary readers.
- source_word: טָל
  chosen: dew
  lexicon: HALOT
  rationale: Standard rendering of טָל; no significant ambiguity in this context.
