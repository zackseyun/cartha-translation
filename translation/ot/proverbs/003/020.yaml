theological_decisions:
- issue: Cosmic imagery of creation/providence
  chosen_reading: The verse describes God's wisdom/knowledge as the means by which
    the world was ordered, using imagery of the deep waters and the dew-bearing clouds.
  alternative_readings:
  - A narrower reference to God's ongoing providential ordering of weather patterns
    rather than creation imagery alone
  rationale: In context (Prov 3:19–20), wisdom language points to God's ordering of
    creation. The translation preserves the poetic cosmic imagery without forcing
    a technical cosmology or excluding ongoing providence.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it.'
