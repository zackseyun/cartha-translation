theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as creator. Per project doctrine,
    the default rendering for יְהוָה is 'the LORD,' not a transliteration, unless
    context requires otherwise. No such exception applies here.
