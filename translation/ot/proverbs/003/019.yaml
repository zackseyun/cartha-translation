id: PRO.3.19
reference: Proverbs 3:19
source:
  edition: WLC
  text: יְֽהוָ֗ה בְּ/חָכְמָ֥ה יָֽסַד אָ֑רֶץ כּוֹנֵ֥ן שָׁ֝מַ֗יִם בִּ/תְבוּנָֽה־׃
translation:
  text: The LORD founded the earth by wisdom; he established the heavens by understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with wisdom' ... 'with understanding.' The Hebrew preposition can express
      means or accompaniment; here 'by' best fits the sense of instrumentality in
      creation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Rendered according to the project''s default for the divine name YHWH:
    ''the LORD,'' following established reverential convention and the doctrine table.'
- source_word: בְּחָכְמָה
  chosen: by wisdom
  alternatives:
  - with wisdom
  - in wisdom
  lexicon: HALOT
  rationale: The preposition ב here most naturally expresses means or instrument in
    parallel with the second colon. 'By wisdom' is concise, idiomatic, and preserves
    the poetic claim that wisdom was the means by which the LORD founded the earth.
- source_word: יָסַד
  chosen: founded
  alternatives:
  - established
  - laid the foundation of
  lexicon: HALOT
  rationale: The verb commonly denotes founding or laying a foundation. 'Founded'
    preserves the creation/building metaphor and pairs well with 'earth'.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic creation context, 'earth' is clearly intended rather than
    a particular land.
- source_word: כּוֹנֵן
  chosen: established
  alternatives:
  - fixed firmly
  - set in place
  - made secure
  lexicon: HALOT
  rationale: The participial/finite verbal form here conveys firm setting or establishing.
    'Established' is natural English and forms a good poetic parallel with 'founded'
    without flattening the distinction between the two verbs.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural in cosmological contexts is best represented by 'the
    heavens,' which preserves the elevated register and the earth/heavens pairing.
- source_word: בִּתְבוּנָה
  chosen: by understanding
  alternatives:
  - with understanding
  - by insight
  lexicon: HALOT
  rationale: The noun denotes understanding, discernment, or insight. 'Understanding'
    matches the wisdom vocabulary of Proverbs and preserves the parallelism with 'wisdom.'
