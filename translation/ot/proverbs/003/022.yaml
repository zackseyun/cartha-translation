id: PRO.3.22
reference: Proverbs 3:22
source:
  edition: WLC
  text: וְ/יִֽהְי֣וּ חַיִּ֣ים לְ/נַפְשֶׁ֑/ךָ וְ֝/חֵ֗ן לְ/גַרְגְּרֹתֶֽי/ךָ׃
translation:
  text: and they will be life to your soul and grace to your neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'favor' for 'grace' (Hebrew חֵן), emphasizing attractiveness or esteem
      rather than graciousness alone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'soul' (נֶפֶשׁ) can also mean 'life,' 'self,' or 'inner being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִהְיוּ
  chosen: and they will be
  alternatives:
  - and let them be
  - then they will be
  lexicon: HALOT
  rationale: Qal imperfect 3mp of היה with prefixed conjunction; in context it refers
    back to the wisdom/discretion of the previous verse and is best rendered as a
    future/resultative statement rather than a jussive.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as an abstract
    noun meaning 'life.' Singular English is the most natural and accurate rendering
    here.
- source_word: לְנַפְשֶׁךָ
  chosen: to your soul
  alternatives:
  - for your soul
  - to your life
  - to you
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being. 'Soul' preserves
    the anthropological breadth and traditional force without reducing it merely to
    physical life. The preposition ל is rendered 'to' in parallel with the second
    colon.
- source_word: וְחֵן
  chosen: and grace
  alternatives:
  - and favor
  - and charm
  - and beauty
  lexicon: HALOT
  rationale: חֵן denotes favor, grace, or attractiveness. 'Grace' fits wisdom literature's
    moral-aesthetic sense and pairs well with the figurative adornment of the neck.
    It also preserves the compactness of the Hebrew.
- source_word: לְגַרְגְּרֹתֶיךָ
  chosen: to your neck
  alternatives:
  - for your throat
  - for your necklace-place
  lexicon: HALOT
  rationale: The noun refers literally to the throat/neck area. In Proverbs it often
    appears in imagery of adornment worn around the neck. 'Neck' is the idiomatic
    English choice in this metaphorical context.
