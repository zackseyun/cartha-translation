id: PRO.3.1
reference: Proverbs 3:1
source:
  edition: WLC
  text: בְּ֭נִ/י תּוֹרָתִ֣/י אַל תִּשְׁכָּ֑ח וּ֝/מִצְוֺתַ֗/י יִצֹּ֥ר לִבֶּֽ/ךָ־׃
translation:
  text: My son, do not forget my instruction, and let your heart keep my commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my teaching.' The Hebrew torah here refers to instruction or teaching,
      not necessarily law in the narrow legal sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'guard my commandments.' The verb carries the sense of keeping carefully
      or watching over.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative singular with first-person suffix. Rendered gender-accurately
    as 'My son' in keeping with the masculine singular form and the father-to-son
    instructional setting of Proverbs, rather than neutralizing to 'My child'.
- source_word: תּוֹרָתִי
  chosen: my instruction
  alternatives:
  - my law
  - my teaching
  lexicon: HALOT
  rationale: תּוֹרָה here refers to parental/wisdom instruction rather than specifically
    Mosaic law. 'Instruction' preserves the directive sense in readable modern English
    better than 'law,' while remaining more pointed than the broader 'teaching'.
- source_word: אַל תִּשְׁכָּח
  chosen: do not forget
  alternatives:
  - must not forget
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive addressed to the son. 'Do not forget'
    is the natural English equivalent and preserves the imperative force without overinterpreting
    modality.
- source_word: וּמִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מִצְוֺת denotes authoritative commands. 'Commandments' preserves the
    weight and traditional moral force of the term better than the slightly lighter
    'commands,' while still being clear in modern English.
- source_word: יִצֹּר
  chosen: keep
  alternatives:
  - guard
  - watch over
  - observe
  lexicon: HALOT
  rationale: The verb נצר carries the sense of guarding/keeping carefully. 'Keep'
    is idiomatic with 'commandments' in English and captures both retention and observance;
    the stronger nuance of guarding is noted by the alternatives.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the center of thought, will, and affection.
    It should be preserved literally rather than reduced to 'mind,' since the verse
    calls for inward custody and obedience, not merely cognition.
