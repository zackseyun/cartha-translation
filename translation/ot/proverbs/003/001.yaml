theological_decisions:
- issue: Gendered address in wisdom instruction
  chosen_reading: Retain the masculine singular vocative as 'My son'
  alternative_readings:
  - My child
  rationale: The Hebrew is explicitly masculine singular and reflects the literary
    form of paternal wisdom address. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
