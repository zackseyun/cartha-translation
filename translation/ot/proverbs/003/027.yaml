id: PRO.3.27
reference: Proverbs 3:27
source:
  edition: WLC
  text: אַל תִּמְנַע ט֥וֹב מִ/בְּעָלָ֑י/ו בִּ/הְי֨וֹת לְ/אֵ֖ל ידי/ך לַ/עֲשֽׂוֹת־־׃
translation:
  text: Do not withhold good from its owners when it is in your power to do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not withhold good from those to whom it is due.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'when it is to the power of your hand to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used for prohibition; simple English imperative
    prohibition best matches the Hebrew.
- source_word: תִּמְנַע
  chosen: withhold
  alternatives:
  - hold back
  - keep back
  - deny
  lexicon: HALOT
  rationale: The verb מנע commonly means to withhold or keep back. 'Withhold' is idiomatic
    in English wisdom literature and fits the ethical force of the command.
- source_word: טוֹב
  chosen: good
  alternatives:
  - benefit
  - kindness
  lexicon: HALOT
  rationale: The noun/adjective here is broad and intentionally general. 'Good' preserves
    the open-ended moral and practical sense better than narrowing it to 'kindness'
    or 'benefit'.
- source_word: מִבְּעָלָיו
  chosen: from its owners
  alternatives:
  - from those to whom it is due
  - from its possessors
  lexicon: HALOT
  rationale: בעל can denote an owner, possessor, or one who has a claim. The suffix
    refers back to 'good' in an idiomatic construction meaning those who have rightful
    claim to that good. 'Its owners' is a transparent rendering of the Hebrew form,
    while the footnote preserves the more interpretive idiom 'those to whom it is
    due.'
- source_word: בִּהְיוֹת
  chosen: when it is
  alternatives:
  - while it is
  - in the time of being
  lexicon: HALOT
  rationale: The infinitive construct of היה with prefixed ב expresses circumstance
    or time. 'When it is' gives natural English while preserving the temporal sense.
- source_word: לְאֵל
  chosen: in your power
  alternatives:
  - to the power of
  - to the might of
  - in the power of your hand
  lexicon: HALOT
  rationale: The phrase לְאֵל ידך is idiomatic for something being within one's power
    or ability. Rendering the idiom directly as 'in your power' communicates the sense
    clearly in modern English.
- source_word: יָדֶךָ
  chosen: your power
  alternatives:
  - your hand
  lexicon: HALOT
  rationale: Although literally 'your hand,' in this idiom the hand signifies capacity
    or control. The main text renders the idiomatic sense; the more literal image
    is preserved in a footnote.
- source_word: לַעֲשׂוֹת
  chosen: to do it
  alternatives:
  - to act
  - to accomplish it
  lexicon: HALOT
  rationale: עשה is the common verb 'to do/make.' 'To do it' is the most natural completion
    of the English clause and reflects the implied object from context.
