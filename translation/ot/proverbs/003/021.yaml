id: PRO.3.21
reference: Proverbs 3:21
source:
  edition: WLC
  text: בְּ֭נִ/י אַל יָלֻ֣זוּ מֵ/עֵינֶ֑י/ךָ נְצֹ֥ר תֻּ֝שִׁיָּ֗ה וּ/מְזִמָּֽה־׃
translation:
  text: My son, do not let them depart from your eyes; guard sound wisdom and discretion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not let them slip out of your sight.' The plural 'them' refers back
      to the instruction or qualities in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: '''Sound wisdom'' may also be rendered ''sound judgment'' or ''resourcefulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from a father/teacher to a male son in the discourse
    frame of Proverbs. Per gender-accurate policy, masculine singular is retained
    rather than neutralized.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive, naturally rendered as
    a prohibition in English.
- source_word: יָלֻזוּ
  chosen: let them depart
  alternatives:
  - turn aside
  - slip away
  - be lost
  lexicon: HALOT
  rationale: The 3mp jussive requires an implicit plural subject, referring back to
    the teachings/qualities in the surrounding context. 'Depart' fits the idiom with
    'from your eyes' and preserves the sense of not letting these things drift out
    of view.
- source_word: מֵעֵינֶיךָ
  chosen: from your eyes
  alternatives:
  - out of your sight
  lexicon: HALOT
  rationale: Literal idiom is retained because it is clear in modern English and preserves
    the imagery of continual attentiveness.
- source_word: נְצֹר
  chosen: guard
  alternatives:
  - keep
  - watch over
  lexicon: HALOT
  rationale: Imperative calling for careful preservation. 'Guard' conveys active,
    vigilant keeping more strongly than the flatter 'keep.'
- source_word: תֻּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - sound judgment
  - success
  - resourcefulness
  lexicon: HALOT
  rationale: In wisdom literature this noun often denotes effective wisdom or sound
    judgment. 'Sound wisdom' is a natural English rendering that preserves both intellectual
    and practical force in context.
- source_word: וּמְזִמָּה
  chosen: and discretion
  alternatives:
  - and prudence
  - and thoughtful planning
  lexicon: HALOT
  rationale: In Proverbs the term can be positive ('discretion, prudence') or negative
    ('scheming') depending on context. Here, paired with תֻּשִׁיָּה in paternal instruction,
    the positive sense is clearly intended.
