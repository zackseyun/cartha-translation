id: PRO.3.35
reference: Proverbs 3:35
source:
  edition: WLC
  text: כָּ֭בוֹד חֲכָמִ֣ים יִנְחָ֑לוּ וּ֝/כְסִילִ֗ים מֵרִ֥ים קָלֽוֹן׃פ
translation:
  text: The wise will inherit honor, but fools lift up disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fools are exalted with disgrace,' taking the participle more passively
      or idiomatically. The Hebrew of this clause is compact and has been understood
      in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In Proverbs, כבוד commonly denotes social esteem or honorable status
    rather than overtly theological 'glory.' 'Honor' fits the wisdom-context contrast
    with disgrace.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  lexicon: HALOT
  rationale: The masculine plural is representative/generic in wisdom literature.
    'The wise' is natural English and preserves the class designation without unnecessarily
    narrowing to males.
- source_word: יִנְחָלוּ
  chosen: will inherit
  alternatives:
  - inherit
  - obtain
  - possess
  lexicon: HALOT
  rationale: נחל in the Qal commonly means 'inherit/receive as a possession.' 'Will
    inherit' preserves the future verbal form and the proverb's outcome-oriented sense.
- source_word: וּכְסִילִים
  chosen: but fools
  alternatives:
  - and fools
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' English proverb style commonly
    renders the adversative sense with 'but' because the line contrasts wise and fools.
- source_word: מֵרִים
  chosen: lift up
  alternatives:
  - raise
  - promote
  - carry away
  lexicon: HALOT
  rationale: 'The Hiphil participle of רום/רים most basically means ''raising'' or
    ''lifting up.'' Here it is best taken predicatively with ''fools'' as subject:
    they ''lift up'' disgrace, i.e., they bear/exalt it as their lot. This keeps close
    to the Hebrew while remaining intelligible.'
- source_word: קָלוֹן
  chosen: disgrace
  alternatives:
  - shame
  - dishonor
  lexicon: HALOT
  rationale: קלון denotes public shame or ignominy. 'Disgrace' pairs well antithetically
    with 'honor' and captures the social dimension.
