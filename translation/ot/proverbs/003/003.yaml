theological_decisions:
- issue: Rendering the covenantal pair חֶסֶד וֶאֱמֶת
  chosen_reading: steadfast love and faithfulness
  alternative_readings:
  - mercy and truth
  - loyal love and truth
  rationale: The pair is ethically and relationally charged in Hebrew usage. 'Steadfast
    love and faithfulness' communicates covenant loyalty and reliability without importing
    a narrower doctrinal claim. Traditional 'mercy and truth' is possible but less
    precise in contemporary English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
