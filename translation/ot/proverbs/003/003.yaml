id: PRO.3.3
reference: Proverbs 3:3
source:
  edition: WLC
  text: חֶ֥סֶד וֶ/אֱמֶ֗ת אַֽל יַעַ֫זְבֻ֥/ךָ קָשְׁרֵ֥/ם עַל גַּרְגְּרוֹתֶ֑י/ךָ כָּ֝תְבֵ֗/ם
    עַל ל֥וּחַ לִבֶּֽ/ךָ־־־׃
translation:
  text: Let steadfast love and faithfulness not forsake you; bind them around your
    neck; write them on the tablet of your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy and truth.' The Hebrew pair often denotes covenant loyalty and
      reliability; here rendered 'steadfast love and faithfulness' to reflect that
      sense in contemporary English.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - loyal love
  - kindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes covenantal loyalty expressed in love and kindness.
    'Steadfast love' preserves both affective and loyal dimensions better than the
    thinner 'kindness' or the narrower 'mercy.'
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: In the pairing חֶסֶד וֶאֱמֶת, אֱמֶת often carries the sense of reliability
    or faithfulness rather than abstract propositional 'truth.' 'Faithfulness' best
    matches the ethical exhortation and the common covenantal collocation.
- source_word: אַל יַעַזְבֻךָ
  chosen: Let ... not forsake you
  alternatives:
  - Do not let ... leave you
  - May ... not abandon you
  lexicon: HALOT
  rationale: The jussive construction with אַל plus עזב allows an exhortational sense.
    English idiom is best preserved by fronting the paired nouns and rendering the
    clause as 'Let ... not forsake you,' which keeps the personified subject and the
    admonitory force.
- source_word: קָשְׁרֵם
  chosen: bind them
  alternatives:
  - tie them
  lexicon: HALOT
  rationale: The imperative is concrete and metaphorical, calling for intentional
    retention. 'Bind' is the standard and suitably weighty English equivalent.
- source_word: גַּרְגְּרוֹתֶיךָ
  chosen: around your neck
  alternatives:
  - on your throat
  lexicon: HALOT
  rationale: Though the noun can refer anatomically to the throat/neck region, in
    this wisdom context the idiomatic image is ornamental or mnemonic placement at
    the neck. 'Around your neck' is natural English and fits the metaphor.
- source_word: כָּתְבֵם
  chosen: write them
  alternatives:
  - inscribe them
  lexicon: HALOT
  rationale: The imperative continues the metaphor of deliberate internalization.
    'Write' is clear and direct; 'inscribe' is possible but slightly more elevated
    than needed.
- source_word: לוּחַ לִבֶּךָ
  chosen: the tablet of your heart
  alternatives:
  - your heart's tablet
  lexicon: HALOT
  rationale: לוּחַ is literally a tablet or writing surface. Retaining 'tablet' preserves
    the concrete metaphor of inscription on the inner person rather than flattening
    it to mere memory.
