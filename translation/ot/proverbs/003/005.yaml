id: PRO.3.5
reference: Proverbs 3:5
source:
  edition: WLC
  text: בְּטַ֣ח אֶל יְ֭הוָה בְּ/כָל לִבֶּ֑/ךָ וְ/אֶל בִּֽ֝ינָתְ/ךָ֗ אַל תִּשָּׁעֵֽן־־־־׃
translation:
  text: Trust in Yahweh with all your heart, and do not lean on your own understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not rely on your own understanding.' The Hebrew verb literally means 'lean' or 'support yourself' on something.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטַח
  chosen: Trust
  alternatives:
  - Put your trust
  - Be confident
  lexicon: HALOT
  rationale: Imperative 2ms from בטח calls for a direct command. 'Trust' is concise, idiomatic, and preserves the relational reliance implied by the Hebrew without overexpanding it.
- source_word: אֶל
  chosen: in
  alternatives:
  - toward
  - unto
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with בטח the idiomatic English equivalent is 'trust in,' not 'trust to' or 'trust toward.' This is an optimal-equivalence adjustment for natural English while preserving sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל
  chosen: with all
  alternatives:
  - in all
  - with the whole of
  lexicon: HALOT
  rationale: The preposition plus 'all' expresses totality of inner commitment. 'With all' is the most natural English collocation with 'heart' here.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew commonly denotes the inner person, including thought and will, but 'heart' is the established and sufficiently broad English equivalent here. It preserves the anthropological force without narrowing it to emotion alone.
- source_word: וְאֶל
  chosen: and on
  alternatives:
  - and toward
  - but on
  lexicon: HALOT
  rationale: The conjunction links the negative prohibition to the prior command. Rendering the preposition with 'on' anticipates the English idiom 'lean on,' which matches the following verb.
- source_word: בִּינָתְךָ
  chosen: your own understanding
  alternatives:
  - your discernment
  - your insight
  lexicon: HALOT
  rationale: בִּינָה refers to understanding/discernment. 'Understanding' is the broadest and most familiar English equivalent in wisdom literature. 'Your own' is supplied naturally in English to reflect the possessive suffix and the contrast with trusting in the LORD.
- source_word: אַל
  chosen: do not
  alternatives:
  - must not
  - never
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive expresses prohibition. 'Do not' is the standard and appropriately direct English rendering.
- source_word: תִּשָּׁעֵן
  chosen: lean
  alternatives:
  - rely
  - support yourself
  lexicon: HALOT
  rationale: The Niphal of שׁען literally conveys leaning/supporting oneself upon something. 'Lean on' preserves the metaphor, which is important to the proverb's imagery; 'rely' is interpretive and therefore kept as an alternative rather than the main text.
