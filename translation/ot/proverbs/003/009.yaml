id: PRO.3.9
reference: Proverbs 3:9
source:
  edition: WLC
  text: כַּבֵּ֣ד אֶת יְ֭הוָה מֵ/הוֹנֶ֑/ךָ וּ֝/מֵ/רֵאשִׁ֗ית כָּל תְּבוּאָתֶֽ/ךָ־־׃
translation:
  text: Honor Yahweh with your wealth and with the firstfruits of all your produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your wealth'; the Hebrew preposition can be rendered either way after 'honor.'
    reason: lexical_alternative
  - marker: b
    text: '''Firstfruits'' refers to the first and best portion of the harvest given in honor to God.'
    reason: cultural_note
lexical_decisions:
- source_word: כַּבֵּד
  chosen: Honor
  alternatives:
  - Glorify
  - Give honor to
  lexicon: HALOT
  rationale: Imperative of כבד in the Piel commonly means to honor or give weight to someone. 'Honor' is idiomatic, concise, and fits the ethical exhortation without over-expanding to 'glorify,' which can sound more overtly liturgical than the proverb requires.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵהוֹנֶךָ
  chosen: with your wealth
  alternatives:
  - from your wealth
  - with your substance
  - with your possessions
  lexicon: HALOT
  rationale: הוֹן denotes wealth, substance, or possessions. The prefixed מִן after 'honor' is well represented in English by 'with,' expressing means or instrument. 'Wealth' is natural modern English and broad enough to include material resources generally.
- source_word: וּמֵרֵאשִׁית
  chosen: and with the firstfruits
  alternatives:
  - and from the first
  - and with the first part
  lexicon: HALOT
  rationale: רֵאשִׁית means beginning/first part; in an agricultural offering context with produce, 'firstfruits' is the most precise and established English equivalent. The prefixed מִן is again naturally rendered 'with' after the governing imperative.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all' here, modifying the following noun in construct.
- source_word: תְּבוּאָתֶךָ
  chosen: your produce
  alternatives:
  - your crops
  - your yield
  - your increase
  lexicon: HALOT
  rationale: תְּבוּאָה refers to produce, yield, or harvest. 'Produce' preserves the agricultural sense while remaining understandable in modern English. 'Increase' is traditional but less transparent to contemporary readers.
