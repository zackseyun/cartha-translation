theological_decisions:
- issue: Rendering of אָדָם in a representative human sense
  chosen_reading: man
  alternative_readings:
  - people
  - humankind
  rationale: 'The Hebrew sets up a conventional contrast between divine and human
    evaluation: ''God and man.'' Following the project''s gender-accurate policy,
    ''man'' is retained because it matches the source form and idiom here, while the
    broader human sense can be noted in a footnote.'
