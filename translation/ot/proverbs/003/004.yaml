id: PRO.3.4
reference: Proverbs 3:4
source:
  edition: WLC
  text: וּ/מְצָא חֵ֖ן וְ/שֵֽׂכֶל ט֑וֹב בְּ/עֵינֵ֖י אֱלֹהִ֣ים וְ/אָדָֽם־־׃פ
translation:
  text: Then you will find favor and good insight in the eyes of God and man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'people'; Hebrew 'man' (אָדָם) here represents human beings
      in contrast with God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְצָא
  chosen: Then you will find
  alternatives:
  - and find
  - so you will find
  lexicon: HALOT
  rationale: 'Qal waw-consecutive/perfect form of מצא in this instructional context
    is naturally rendered as a future-result statement following the preceding exhortation:
    ''then/so you will find.'' ''Then'' makes the consequential sense clear in English
    without over-paraphrasing.'
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חֵן commonly denotes favor or gracious acceptance. 'Favor' fits the wisdom
    context and the collocation with 'in the eyes of' better than the more theologically
    loaded 'grace'.
- source_word: וְשֵׂכֶל טוֹב
  chosen: good insight
  alternatives:
  - good understanding
  - good success
  - sound judgment
  lexicon: HALOT
  rationale: שֵׂכֶל can denote insight, understanding, or prudence; with טוֹב it forms
    a common expression for commendable discernment. 'Good insight' is clear modern
    English and preserves the cognitive-ethical sense better than 'success,' though
    that nuance is sometimes proposed from context.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This idiom literally means 'in the eyes of' and conveys evaluation or
    esteem. Retaining the idiom is natural in English and preserves the Hebrew imagery.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the one true God, not 'gods' or a generic divine
    being. Singular 'God' is required by context.
- source_word: וְאָדָם
  chosen: man
  alternatives:
  - people
  - humankind
  lexicon: HALOT
  rationale: אָדָם here contrasts with God as the human party in a God-and-human pair.
    Per the doctrine's gender-accurate principle and contested-terms guidance, 'man'
    is the most direct rendering in this context, though the sense is broadly human
    rather than male-specific.
