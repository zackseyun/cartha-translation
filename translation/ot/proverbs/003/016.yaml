id: PRO.3.16
reference: Proverbs 3:16
source:
  edition: WLC
  text: אֹ֣רֶךְ יָ֭מִים בִּֽ/ימִינָ֑/הּ בִּ֝/שְׂמֹאולָ֗/הּ עֹ֣שֶׁר וְ/כָבֽוֹד׃
translation:
  text: Length of days is in her right hand; in her left hand are riches and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'long life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ יָמִים
  chosen: Length of days
  alternatives:
  - long life
  lexicon: HALOT
  rationale: A fairly literal rendering of the construct phrase, preserving the poetic
    idiom while remaining intelligible in English. 'Long life' is a smoother dynamic
    alternative, but 'Length of days' better reflects the Hebrew wording and parallel
    poetic style.
- source_word: בִּימִינָהּ
  chosen: in her right hand
  alternatives:
  - at her right hand
  - from her right hand
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here, depicting wisdom
    personified as holding these gifts. 'Her' reflects the 3fs suffix and the feminine
    personification of wisdom in the context.
- source_word: בִּשְׂמֹאולָהּ
  chosen: in her left hand
  alternatives:
  - at her left hand
  - from her left hand
  lexicon: HALOT
  rationale: Parallel to 'in her right hand,' preserving the balanced poetic structure.
    The feminine suffix again refers to personified wisdom.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: '''Riches'' fits the poetic register and pairs naturally with ''honor.''
    ''Wealth'' is possible, but ''riches'' better preserves the elevated style of
    the proverb.'
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In wisdom literature this term commonly denotes social esteem or honor
    rather than the fuller theological sense 'glory.' 'Honor' best suits the immediate
    context of benefits associated with wisdom.
