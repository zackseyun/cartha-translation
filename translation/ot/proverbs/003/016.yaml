theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: The feminine pronouns refer to personified wisdom from the immediate
    context.
  rationale: The verse continues the personification of wisdom as a woman who holds
    benefits in her hands. This is a literary feature of Proverbs, not a doctrinal
    statement about a divine feminine being.
