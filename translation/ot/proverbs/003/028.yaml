id: PRO.3.28
reference: Proverbs 3:28
source:
  edition: WLC
  text: אַל תֹּ֘אמַ֤ר ל/רעי/ך לֵ֣ךְ וָ֭/שׁוּב וּ/מָחָ֥ר אֶתֵּ֗ן וְ/יֵ֣שׁ אִתָּֽ/ךְ־׀׃
translation:
  text: Do not say to your neighbor, “Go, and come back, and tomorrow I will give,”
    when you have it with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “return” for “come back.”
    reason: lexical_alternative
  - marker: b
    text: The final clause means the person already has the means to give and should
      not delay.
    reason: cultural_note
lexical_decisions:
- source_word: רֵעַ
  chosen: neighbor
  alternatives:
  - friend
  - companion
  lexicon: HALOT
  rationale: In Proverbs, רֵעַ commonly refers to a fellow person in one's social
    proximity, not necessarily an intimate friend. 'Neighbor' preserves the ethical
    force of obligation toward another person better than the narrower 'friend.'
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go away
  - Leave
  lexicon: HALOT
  rationale: The imperative is simple and direct. 'Go' is the most natural English
    equivalent and fits the paired command with 'come back.'
- source_word: שׁוּב
  chosen: come back
  alternatives:
  - return
  - come again
  lexicon: HALOT
  rationale: In direct speech to the hearer, 'come back' is idiomatic modern English.
    'Return' is more formal but less natural in dialogue.
- source_word: מָחָר
  chosen: tomorrow
  lexicon: HALOT
  rationale: Standard temporal adverb; no special nuance requires expansion.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will give it
  - I will provide
  lexicon: HALOT
  rationale: The object is left implicit in Hebrew and should remain implicit in English
    rather than supplied. 'Give' is the straightforward equivalent.
- source_word: יֵשׁ אִתָּךְ
  chosen: when you have it with you
  alternatives:
  - though you have it
  - while it is with you
  - when it is in your hand
  lexicon: HALOT
  rationale: 'The clause explains the moral offense: delaying help despite present
    ability to give. ''When you have it with you'' preserves the idiom without overinterpreting
    it as specifically ''in your hand,'' while making clear that the resource is presently
    available.'
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative prohibition with the imperfect/jussive force. 'Do not'
    is sufficient and avoids adding emphasis not explicit in the Hebrew.
