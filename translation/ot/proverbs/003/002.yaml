id: PRO.3.2
reference: Proverbs 3:2
source:
  edition: WLC
  text: כִּ֤י אֹ֣רֶךְ יָ֭מִים וּ/שְׁנ֣וֹת חַיִּ֑ים וְ֝/שָׁל֗וֹם יוֹסִ֥יפוּ לָֽ/ךְ׃
translation:
  text: for they will add to you length of days and years of life and peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-being' or 'wholeness' for 'peace' (shalom), reflecting a fuller
      sense of flourishing, not merely the absence of conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding exhortation in context; 'for'
    is the most natural English connective here.
- source_word: אֹרֶךְ יָמִים
  chosen: length of days
  alternatives:
  - long life
  - many days
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom while remaining
    understandable in English. 'Long life' is possible, but 'length of days' better
    reflects the source expression.
- source_word: וּשְׁנוֹת חַיִּים
  chosen: and years of life
  alternatives:
  - and years of living
  - and life-years
  lexicon: HALOT
  rationale: Keeps the parallel structure with the previous phrase and reflects the
    construct relationship. 'Years of life' is natural enough and preserves the poetic
    cadence.
- source_word: וְשָׁלוֹם
  chosen: and peace
  alternatives:
  - and well-being
  - and wholeness
  lexicon: HALOT
  rationale: '''Shalom'' includes peace, wholeness, and well-being. ''Peace'' is the
    standard concise rendering in English and fits the proverb''s style; broader nuances
    are worth preserving in a footnote.'
- source_word: יוֹסִיפוּ
  chosen: will add
  alternatives:
  - will increase
  - will multiply
  lexicon: HALOT
  rationale: The Hiphil of יסף commonly means 'add' or 'increase.' 'Will add' is the
    most direct rendering and works idiomatically with the following indirect object.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of what is added. 'To you'
    is the most straightforward formal rendering, though in context it implies benefit.
