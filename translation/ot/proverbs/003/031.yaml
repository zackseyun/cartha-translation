id: PRO.3.31
reference: Proverbs 3:31
source:
  edition: WLC
  text: אַל תְּ֭קַנֵּא בְּ/אִ֣ישׁ חָמָ֑ס וְ/אַל תִּ֝בְחַ֗ר בְּ/כָל דְּרָכָֽי/ו־־־׃
translation:
  text: Do not envy a violent man, and do not choose any of his ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be jealous of a violent man.' The Hebrew verb can express either envy
      or jealousy in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not' is the natural
    modern English imperative equivalent.
- source_word: תְּקַנֵּא
  chosen: envy
  alternatives:
  - be jealous of
  - be envious of
  lexicon: HALOT
  rationale: קנא in this stem here denotes envious desire toward another person. 'Envy'
    is concise and idiomatic in English wisdom literature.
- source_word: בְּאִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Following the gender-accurate policy,
    'man' is retained rather than neutralizing to 'person,' since the proverb presents
    a representative individual type.
- source_word: חָמָס
  chosen: violent
  alternatives:
  - violent one
  - given to violence
  - wrongdoing
  lexicon: HALOT
  rationale: 'חָמָס denotes violence, wrongdoing, or ruthless injustice. In construct
    with אִישׁ, the sense is adjectival: ''a violent man.'' ''Violent'' best captures
    the dominant sense here.'
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: The conjunction links the second prohibition closely to the first. 'And
    do not' preserves the parallel structure clearly.
- source_word: תִּבְחַר
  chosen: choose
  alternatives:
  - select
  - prefer
  lexicon: HALOT
  rationale: בחר means 'choose' or 'select.' 'Choose' is the standard and most natural
    rendering in this ethical context.
- source_word: בְּכָל
  chosen: any of
  alternatives:
  - in any of
  - all
  lexicon: HALOT
  rationale: Literally 'in all,' but with בחר plus ב and the following plural noun,
    the idiomatic sense is not to adopt even one of them. 'Any of' communicates the
    prohibitive force more naturally in English while preserving the totalizing sense.
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his paths
  - his conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ in wisdom literature often refers metaphorically to one's manner
    of life or conduct. 'Ways' preserves the metaphor and matches common biblical
    idiom.
