id: PRO.3.14
reference: Proverbs 3:14
source:
  edition: WLC
  text: כִּ֤י ט֣וֹב סַ֭חְרָ/הּ מִ/סְּחַר כָּ֑סֶף וּ֝/מֵ/חָר֗וּץ תְּבוּאָתָֽ/הּ־׃
translation:
  text: for her profit is better than the profit of silver, and her yield than gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her merchandise' / 'her gain' for 'her profit'; the Hebrew uses commercial
      language for the value wisdom brings.
    reason: lexical_alternative
  - marker: b
    text: Or 'than fine gold'; the Hebrew term can denote especially precious or refined
      gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding commendation of wisdom. 'For'
    fits the explanatory function in context.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  - more beneficial
  lexicon: HALOT
  rationale: Though formally an adjective 'good,' in this comparative construction
    with מִן it is best rendered 'better' in English.
- source_word: סַחְרָהּ
  chosen: her profit
  alternatives:
  - her merchandise
  - her gain
  - her trading
  lexicon: HALOT
  rationale: Refers metaphorically to what wisdom yields or brings in. 'Profit' communicates
    the economic metaphor naturally in English while fitting the personified feminine
    subject ('her' = wisdom).
- source_word: מִסְּחַר כָּסֶף
  chosen: than the profit of silver
  alternatives:
  - than silver's merchandise
  - than trading in silver
  - than silver
  lexicon: HALOT
  rationale: The phrase literally compares wisdom's gain with the gain/commerce of
    silver. Retaining 'profit' on both sides preserves the parallelism and commercial
    imagery better than reducing it simply to 'silver'.
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard rendering for the precious metal; here part of the comparison
    value imagery.
- source_word: וּמֵחָרוּץ
  chosen: than gold
  alternatives:
  - than fine gold
  - than choice gold
  lexicon: HALOT
  rationale: חָרוּץ in wisdom literature commonly denotes gold, often refined or precious
    gold. 'Gold' is clear modern English; the nuance 'fine' is possible but not strictly
    necessary in the main text.
- source_word: תְּבוּאָתָהּ
  chosen: her yield
  alternatives:
  - her produce
  - her revenue
  - her increase
  lexicon: HALOT
  rationale: Keeps the harvest/produce metaphor while sounding natural in English.
    It parallels 'profit' but adds the sense of what wisdom brings forth.
