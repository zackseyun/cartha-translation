id: PRO.3.26
reference: Proverbs 3:26
source:
  edition: WLC
  text: כִּֽי יְ֭הוָה יִהְיֶ֣ה בְ/כִסְלֶ֑/ךָ וְ/שָׁמַ֖ר רַגְלְ/ךָ֣ מִ/לָּֽכֶד־׃
translation:
  text: For the LORD will be your confidence, and he will keep your foot from being
    caught.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will be at your side'; the Hebrew expression can be understood
      more literally, though here it is likely figurative for confidence or security.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding exhortation/promise.
    'For' preserves the explanatory connection in concise English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future sense fits the promise context. 'Will be' is natural modern
    English.
- source_word: בְּכִסְלֶךָ
  chosen: your confidence
  alternatives:
  - at your side
  - in your loins
  - your security
  lexicon: HALOT
  rationale: 'כֶּסֶל can denote ''loins/flank'' literally, but in wisdom literature
    it commonly carries the figurative sense of confidence, security, or trust. Here
    the parallel with divine protection from a trap favors the metaphorical sense:
    the LORD is the basis of the addressee''s security. ''Your confidence'' is idiomatic
    and preserves the personal possessive force.'
- source_word: וְשָׁמַר
  chosen: and he will keep
  alternatives:
  - and he will guard
  - and he will watch over
  lexicon: HALOT
  rationale: The verb means keep/guard/watch. 'Keep' works well with the following
    infinitive-like prepositional phrase 'from being caught' and is concise.
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: The Hebrew singular is retained. In context it functions collectively
    enough in English without needing pluralization.
- source_word: מִלָּכֶד
  chosen: from being caught
  alternatives:
  - from capture
  - from the trap
  - from being snared
  lexicon: HALOT
  rationale: The noun/infinitive-related form from לכד conveys being taken or captured.
    'From being caught' is clear modern English and fits the image of one's foot being
    trapped. 'From the trap' would require supplying a more concrete object than the
    Hebrew explicitly states.
