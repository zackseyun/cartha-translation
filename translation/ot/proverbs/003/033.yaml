theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This preserves reverential convention without making a sectarian claim
    about pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic singular רָשָׁע versus gender-specific English
  chosen_reading: the wicked
  alternative_readings:
  - the wicked man
  rationale: The Hebrew singular is representative/generic in a wisdom saying. Rendering
    it as 'the wicked' preserves the category without introducing unnecessary male-specific
    wording, while still respecting the text's intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over
    gender-neutral)
