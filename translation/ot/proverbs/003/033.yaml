id: PRO.3.33
reference: Proverbs 3:33
source:
  edition: WLC
  text: מְאֵרַ֣ת יְ֭הוָה בְּ/בֵ֣ית רָשָׁ֑ע וּ/נְוֵ֖ה צַדִּיקִ֣ים יְבָרֵֽךְ׃
translation:
  text: Yahweh’s curse is on the house of the wicked, but he blesses the dwelling of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the house of the wicked'; the Hebrew preposition can be rendered more literally, but 'is on the house of' better conveys the sense of a curse resting upon it.
    reason: lexical_alternative
  - marker: b
    text: Or 'abode' or 'home' for 'dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאֵרַת
  chosen: curse
  alternatives:
  - cursing
  - curse upon
  lexicon: HALOT
  rationale: The noun denotes a curse or cursed state. In English, 'curse' is the most natural and direct rendering in this predicative construction ('The LORD’s curse is on...').
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּבֵית
  chosen: is on the house of
  alternatives:
  - in the house of
  - against the house of
  lexicon: HALOT
  rationale: The preposition ב with 'house' can be rendered literally as 'in/on the house of.' In idiomatic English with 'curse,' 'is on the house of' best conveys the sense of a curse resting upon a household.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Although morphologically singular, the term often functions generically. 'The wicked' preserves the representative force without awkwardly narrowing to an individual male.
- source_word: וּנְוֵה
  chosen: but he blesses the dwelling of
  alternatives:
  - but the abode of
  - but the home of
  lexicon: HALOT
  rationale: נָוֶה refers to a dwelling place, abode, or habitation. 'Dwelling' is natural modern English and preserves the concrete image. The conjunction is adversative in context, hence 'but.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - the righteous ones
  - the just
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'The righteous' is the most idiomatic English rendering and preserves the moral category.
- source_word: יְבָרֵךְ
  chosen: he blesses
  alternatives:
  - he will bless
  - he blesses richly
  lexicon: HALOT
  rationale: The imperfect here expresses a general truth/proverbial present rather than strictly future time. 'He blesses' fits English proverbial style and matches the contrast with the first clause.
