- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic singular רָשָׁע versus gender-specific English
  chosen_reading: the wicked
  alternative_readings:
  - the wicked man
  rationale: The Hebrew singular is representative/generic in a wisdom saying. Rendering it as 'the wicked' preserves the category without introducing unnecessary male-specific wording, while still respecting the text's intent.
