id: PRO.17.6
reference: Proverbs 17:6
source:
  edition: WLC
  text: עֲטֶ֣רֶת זְ֭קֵנִים בְּנֵ֣י בָנִ֑ים וְ/תִפְאֶ֖רֶת בָּנִ֣ים אֲבוֹתָֽ/ם׃
translation:
  text: Grandchildren are the crown of the aged, and the glory of children is their
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'children of children.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the aged' could be rendered 'old men'; the Hebrew refers to elderly
      people, not necessarily community elders.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - wreath
  - honor
  lexicon: HALOT
  rationale: The noun denotes a crown or wreath as a symbol of honor. 'Crown' is the
    most natural English equivalent here and preserves the metaphor of distinction
    and honor.
- source_word: זְקֵנִים
  chosen: the aged
  alternatives:
  - old men
  - elders
  lexicon: HALOT
  rationale: In this proverb the term refers to elderly people rather than office-bearing
    'elders.' 'The aged' is natural, concise, and avoids implying a formal leadership
    role. 'Old men' is possible but less idiomatic in contemporary English.
- source_word: בְּנֵי בָנִים
  chosen: Grandchildren
  alternatives:
  - children's children
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of sons/children of children,'
    idiomatically 'grandchildren.' This is a straightforward contextual rendering
    into natural English.
- source_word: תִפְאֶרֶת
  chosen: glory
  alternatives:
  - beauty
  - splendor
  - honor
  lexicon: HALOT
  rationale: The noun carries the sense of glory, splendor, or honor. 'Glory' best
    matches the parallel with 'crown' and preserves the elevated proverbial style.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although grammatically masculine plural, in wisdom literature this commonly
    has a representative family sense. 'Children' fits the relational parallel with
    'fathers' and communicates the proverb's general application without over-specifying
    male offspring.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  - their parents
  lexicon: HALOT
  rationale: The Hebrew specifically says 'their fathers,' not a gender-neutral parental
    term. In keeping with the translation philosophy's gender-accurate principle,
    the masculine familial term is retained.
