theological_decisions:
- issue: Gendered family terms in a general proverb
  chosen_reading: Render בָּנִים as 'children' but retain אֲבוֹתָם as 'their fathers.'
  alternative_readings:
  - Render both more formally as 'sons' and 'their fathers'
  - Render more generically as 'children' and 'their parents'
  rationale: The proverb speaks generally about family honor across generations. The
    first בְּנֵי בָנִים is idiomatic for 'grandchildren,' and the second בָּנִים can
    naturally be rendered 'children' in English. However, אֲבוֹתָם is explicitly masculine
    and should not be flattened to 'parents.' This preserves source-language gender
    where semantically significant while keeping the proverb readable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
