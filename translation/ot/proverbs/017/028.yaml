id: PRO.17.28
reference: Proverbs 17:28
source:
  edition: WLC
  text: גַּ֤ם אֱוִ֣יל מַ֭חֲרִישׁ חָכָ֣ם יֵחָשֵׁ֑ב אֹטֵ֖ם שְׂפָתָ֣י/ו נָבֽוֹן׃
translation:
  text: Even a fool who keeps silent is considered wise; one who closes his lips,
    discerning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is thought wise ... prudent.' The Hebrew emphasizes how silence can
      make even a fool appear wise and discerning.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Introduces a concessive or surprising extension: not only the wise,
    but even a fool may appear wise under the stated condition. ''Even'' captures
    the proverb''s rhetorical force better than the flatter ''also''.'
- source_word: אֱוִיל
  chosen: fool
  alternatives:
  - stupid person
  - senseless person
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and intellectually deficient
    person. 'Fool' is the established and accurate English equivalent in Proverbs.
- source_word: מַחֲרִישׁ
  chosen: who keeps silent
  alternatives:
  - when silent
  - being silent
  - who is silent
  lexicon: HALOT
  rationale: The participle describes the fool in the act/state of refraining from
    speech. 'Who keeps silent' is idiomatic and preserves the ongoing verbal nuance.
- source_word: חָכָם יֵחָשֵׁב
  chosen: is considered wise
  alternatives:
  - is counted wise
  - is thought wise
  - is regarded as wise
  lexicon: HALOT
  rationale: The Niphal of חשׁב here conveys being reckoned or regarded as something.
    'Is considered wise' is natural modern English while preserving the passive evaluative
    sense.
- source_word: אֹטֵם
  chosen: one who closes
  alternatives:
  - one who restrains
  - one who shuts
  lexicon: HALOT
  rationale: The participle literally denotes shutting or closing. In context of lips,
    it refers to deliberate restraint in speech. 'Closes' keeps the concrete metaphor.
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  - his mouth
  lexicon: HALOT
  rationale: The Hebrew is literally 'his lips' with 3ms suffix. Retaining the body-part
    imagery preserves the proverb's poetic concreteness.
- source_word: נָבוֹן
  chosen: discerning
  alternatives:
  - prudent
  - understanding
  - intelligent
  lexicon: HALOT
  rationale: In wisdom contexts נבון denotes perceptive understanding or discernment.
    'Discerning' fits contemporary English and pairs well with 'wise' without sounding
    redundant.
