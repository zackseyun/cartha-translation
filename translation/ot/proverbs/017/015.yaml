- issue: Forensic versus transformative sense of צדק/רשע verbs
  chosen_reading: 'Judicial language: ''acquits'' and ''condemns'''
  alternative_readings:
  - More general moral sense such as 'treats as righteous' and 'treats as wicked'
  rationale: The paired Hiphil participles form a courtroom antithesis common in wisdom and legal contexts. Rendering them judicially avoids importing later doctrinal nuances into 'justify' while preserving the proverb's condemnation of perverted justice.
