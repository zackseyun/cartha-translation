id: PRO.17.15
reference: Proverbs 17:15
source:
  edition: WLC
  text: מַצְדִּ֣יק רָ֭שָׁע וּ/מַרְשִׁ֣יעַ צַדִּ֑יק תּוֹעֲבַ֥ת יְ֝הוָ֗ה גַּם שְׁנֵי/הֶֽם־׃
translation:
  text: The one who acquits the wicked and the one who condemns the righteous—both alike are an abomination to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who justifies the wicked and the one who declares the righteous guilty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְדִּיק
  chosen: the one who acquits
  alternatives:
  - the one who justifies
  - the one who declares righteous
  lexicon: HALOT
  rationale: Hiphil participle of צדק here has a forensic sense in parallel with 'condemns.' 'Acquits' communicates legal vindication in clear modern English better than the more theologically loaded 'justifies,' while preserving the judicial contrast.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked person
  - the guilty
  lexicon: HALOT
  rationale: Refers to a morally culpable person. 'The wicked' is idiomatic and concise in proverbial style; 'the guilty' is possible in a legal context but narrows the moral dimension more than the Hebrew requires.
- source_word: וּמַרְשִׁיעַ
  chosen: and the one who condemns
  alternatives:
  - and the one who declares guilty
  lexicon: HALOT
  rationale: Hiphil participle of רשע in judicial usage means to pronounce guilty/condemn. 'Condemns' is the natural English counterpart to 'acquits' and preserves the legal antithesis.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous person
  - the innocent
  lexicon: HALOT
  rationale: In this legal-moral contrast, צַדִּיק denotes one who is in the right/righteous. 'The righteous' preserves both ethical and forensic resonance; 'the innocent' is possible but slightly narrower.
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - something detestable
  lexicon: HALOT
  rationale: A strong covenantal-moral term for something loathsome to God. 'An abomination' preserves the intensity and familiar biblical force better than a softened adjective.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גַּם שְׁנֵיהֶם
  chosen: both alike
  alternatives:
  - even both of them
  - both of them
  lexicon: HALOT
  rationale: The phrase emphasizes that each of the two practices/persons is equally abhorrent. 'Both alike' captures the distributive emphasis in natural English.
