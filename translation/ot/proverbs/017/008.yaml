id: PRO.17.8
reference: Proverbs 17:8
source:
  edition: WLC
  text: אֶֽבֶן חֵ֣ן הַ֭/שֹּׁחַד בְּ/עֵינֵ֣י בְעָלָ֑י/ו אֶֽל כָּל אֲשֶׁ֖ר יִפְנֶ֣ה
    יַשְׂכִּֽיל־־־׃
translation:
  text: A bribe is a charm-stone in the eyes of its owner; wherever he turns, he prospers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a precious stone,'' ''a magic stone,'' or ''a lucky charm.'' Hebrew:
      ''a stone of favor.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'he succeeds.' The Hebrew verb can denote acting with success or prospering.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן חֵן
  chosen: a charm-stone
  alternatives:
  - a precious stone
  - a stone of favor
  - a magic stone
  - a lucky charm
  lexicon: HALOT
  rationale: Literally 'stone of favor/grace.' In this proverb the phrase is idiomatic
    and likely refers metaphorically to something thought to secure favor or success.
    'Charm-stone' preserves the stone imagery while communicating the sense of an
    object believed to bring advantage. Alternatives such as 'precious stone' fit
    the imagery of value, while 'magic stone' or 'lucky charm' make the implied efficacy
    more explicit; the chosen rendering balances literal form and intelligibility.
- source_word: הַשֹּׁחַד
  chosen: a bribe
  alternatives:
  - a gift
  lexicon: HALOT
  rationale: The noun commonly denotes a bribe rather than a neutral gift. In wisdom
    literature it often carries a morally negative sense. 'Gift' is possible in some
    contexts, but here the standard sense 'bribe' best fits the proverb's realism
    about corrupt advantage.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the view of
  - to
  lexicon: HALOT
  rationale: This Hebrew idiom expresses perspective or estimation. 'In the eyes of'
    is a natural and transparent English equivalent that preserves the metaphor.
- source_word: בְעָלָיו
  chosen: its owner
  alternatives:
  - its master
  - the one who possesses it
  lexicon: HALOT
  rationale: The suffix refers back to the bribe as possessed by the giver/holder.
    'Owner' is idiomatic English and avoids overreading social hierarchy implied by
    'master'.
- source_word: אֶל כָּל אֲשֶׁר יִפְנֶה
  chosen: wherever he turns
  alternatives:
  - to every place he turns
  - in every direction he turns
  lexicon: HALOT
  rationale: This clause is an idiomatic way of expressing any direction or undertaking.
    'Wherever he turns' is concise and natural while preserving the broad scope.
- source_word: יַשְׂכִּיל
  chosen: he prospers
  alternatives:
  - he succeeds
  - he acts wisely
  - he has success
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can mean to have success/prosper, often with the nuance
    of acting effectively or wisely. In this context the point is practical success
    obtained through the bribe, not moral wisdom, so 'he prospers' best conveys the
    result. 'He succeeds' is also viable and is preserved in a footnote because the
    Hebrew can carry both success and skill/wisdom overtones.
