id: PRO.17.20
reference: Proverbs 17:20
source:
  edition: WLC
  text: עִקֶּשׁ לֵ֭ב לֹ֣א יִמְצָא ט֑וֹב וְ/נֶהְפָּ֥ךְ בִּ֝/לְשׁוֹנ֗/וֹ יִפּ֥וֹל בְּ/רָעָֽה־־׃
translation:
  text: A crooked heart does not find good, and one who is twisted in his tongue falls
    into trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and one who is perverse in speech falls into calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִקֶּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The adjective denotes moral crookedness or perversity rather than mere
    complexity. 'Crooked' is vivid, natural English and pairs well with the wisdom
    motif of straight vs. crooked ways.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, לֵב commonly refers to the inner person,
    including thought and will. 'Heart' preserves the Hebrew anthropological term
    and remains idiomatic in English.
- source_word: יִמְצָא טוֹב
  chosen: does not find good
  alternatives:
  - does not prosper
  - does not find anything good
  lexicon: HALOT
  rationale: The verb-object combination is kept fairly literal. 'Find good' in Proverbs
    can imply obtaining benefit or well-being; this is left implicit rather than expanded
    into paraphrase.
- source_word: נֶהְפָּךְ
  chosen: twisted
  alternatives:
  - perverse
  - devious
  - turned
  lexicon: HALOT
  rationale: The passive/participle form conveys being turned or distorted. In context
    with speech, 'twisted' communicates morally distorted use of language without
    sounding archaic.
- source_word: בִּלְשׁוֹנוֹ
  chosen: in his tongue
  alternatives:
  - in his speech
  - with his tongue
  lexicon: HALOT
  rationale: The Hebrew is literally 'in his tongue.' This can metonymically mean
    speech. The translation keeps the concrete image while remaining understandable
    in English.
- source_word: יִפּוֹל בְּרָעָה
  chosen: falls into trouble
  alternatives:
  - falls into evil
  - falls into calamity
  - comes to ruin
  lexicon: HALOT
  rationale: רָעָה here likely refers to misfortune, harm, or calamity rather than
    moral evil committed by the subject. 'Falls into trouble' is idiomatic and preserves
    the consequence-oriented sense.
