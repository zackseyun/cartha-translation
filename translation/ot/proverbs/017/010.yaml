id: PRO.17.10
reference: Proverbs 17:10
source:
  edition: WLC
  text: תֵּ֣חַת גְּעָרָ֣ה בְ/מֵבִ֑ין מֵ/הַכּ֖וֹת כְּסִ֣יל מֵאָֽה׃
translation:
  text: A rebuke goes deeper into a man of understanding than a hundred blows into
    a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A rebuke sinks deeper into one who understands than striking a fool
      a hundred times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּחַת
  chosen: goes deeper into
  alternatives:
  - sinks into
  - has more effect on
  - descends into
  lexicon: HALOT
  rationale: The verb from נחת in this form conveys coming down or penetrating. In
    this proverb it is idiomatic for a rebuke making a deeper impact. 'Goes deeper
    into' preserves the comparative force with the following מן-phrase while remaining
    natural English.
- source_word: גְּעָרָה
  chosen: a rebuke
  alternatives:
  - reproof
  - scolding
  lexicon: HALOT
  rationale: The noun denotes a verbal reprimand or sharp correction. 'Rebuke' is
    concise, idiomatic, and fits wisdom-literature style better than the more formal
    'reproof' or the narrower 'scolding'.
- source_word: בְמֵבִין
  chosen: into a man of understanding
  alternatives:
  - into one who understands
  - in a discerning man
  lexicon: HALOT
  rationale: מֵבִין is a masculine singular participle meaning one who understands,
    a discerning person. Following the project's gender-accurate policy, 'man of understanding'
    preserves the masculine singular form and proverbial representative force.
- source_word: מֵהַכּוֹת
  chosen: than ... blows into
  alternatives:
  - more than striking
  - than beating
  - than ... lashes on
  lexicon: HALOT
  rationale: 'The prefixed מ marks comparison: the rebuke affects the discerning person
    more than beating affects the fool. The infinitive construct of נכה denotes striking/beating.
    ''Than a hundred blows into'' mirrors the comparative structure and keeps the
    image vivid.'
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: In Proverbs כְּסִיל is a stock wisdom term for a morally and intellectually
    obstinate fool, not merely someone unintelligent. 'Fool' is the standard and most
    faithful rendering.
- source_word: מֵאָה
  chosen: a hundred
  alternatives:
  - one hundred
  lexicon: HALOT
  rationale: The numeral intensifies the contrast hyperbolically. 'A hundred' is natural
    English and preserves the proverb's force.
