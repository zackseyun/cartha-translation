id: PRO.17.19
reference: Proverbs 17:19
source:
  edition: WLC
  text: אֹ֣הֵֽב פֶּ֭שַׁע אֹהֵ֣ב מַצָּ֑ה מַגְבִּ֥יהַּ פִּ֝תְח֗/וֹ מְבַקֶּשׁ שָֽׁבֶר־׃
translation:
  text: Whoever loves transgression loves strife; he who makes his doorway high seeks
    destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who raises his door/gate high seeks ruin.' The image may suggest
      arrogant self-exaltation, ostentatious building, or a posture that invites disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - is fond of
  - delights in
  lexicon: HALOT
  rationale: Qal participle of אָהַב denotes loving or taking pleasure in. 'Loves'
    preserves the proverb's moral force and parallelism in both cola.
- source_word: פֶּשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - offense
  lexicon: HALOT
  rationale: פֶּשַׁע commonly denotes willful violation or rebellion, stronger than
    a mere mistake. 'Transgression' fits wisdom literature and preserves the ethical
    seriousness.
- source_word: מַצָּה
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: HALOT
  rationale: In context this noun refers to conflict or contention. 'Strife' is concise,
    idiomatic, and preserves the proverb's general scope better than the more event-specific
    'quarreling.'
- source_word: מַגְבִּיהַּ
  chosen: makes ... high
  alternatives:
  - raises
  - exalts
  lexicon: HALOT
  rationale: The Hiphil participle of גבה means to make high or raise. Rendering it
    verbally with the following object keeps the concrete image of architectural self-exaltation.
- source_word: פִּתְחוֹ
  chosen: his doorway
  alternatives:
  - his door
  - his gate
  - his entrance
  lexicon: HALOT
  rationale: פֶּתַח is an opening, entrance, or doorway. 'Doorway' best fits a house
    image while remaining broad enough for the proverb's figurative sense. 'Gate'
    would suggest a larger civic setting not required by the text.
- source_word: מְבַקֶּשׁ
  chosen: seeks
  alternatives:
  - looks for
  - invites
  lexicon: HALOT
  rationale: The participle of בקש normally means seek. In proverbial usage it can
    imply courting a result; 'seeks' preserves the Hebrew wording while allowing the
    implied irony.
- source_word: שָׁבֶר
  chosen: destruction
  alternatives:
  - ruin
  - collapse
  - breaking
  lexicon: HALOT
  rationale: שֶׁבֶר can denote breaking, fracture, ruin, or calamity. 'Destruction'
    communicates the severe outcome in idiomatic English, though 'ruin' is also possible.
