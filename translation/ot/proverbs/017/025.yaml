id: PRO.17.25
reference: Proverbs 17:25
source:
  edition: WLC
  text: כַּ֣עַס לְ֭/אָבִי/ו בֵּ֣ן כְּסִ֑יל וּ֝/מֶ֗מֶר לְ/יוֹלַדְתּֽ/וֹ׃
translation:
  text: A foolish son is grief to his father, and bitterness to the woman who bore
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vexation to his father.' The Hebrew noun can denote anger, vexation,
      or grief; here it likely refers to the father's distress caused by the son.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the one who bore him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּעַס
  chosen: grief
  alternatives:
  - vexation
  - anger
  - sorrow
  lexicon: HALOT
  rationale: In this proverb the noun denotes the painful emotional effect caused
    by the son on his father. 'Grief' communicates the result naturally in English
    and fits the parallel with 'bitterness.' 'Anger' is possible lexically, but here
    the focus is better taken as the father's distress rather than his reactive emotion.
- source_word: לְאָבִיו
  chosen: to his father
  alternatives:
  - for his father
  lexicon: HALOT
  rationale: The preposition ל marks relation or effect here. 'To his father' is idiomatic
    in English in a verbless proverb and preserves the concise Hebrew structure.
- source_word: בֵּן כְּסִיל
  chosen: a foolish son
  alternatives:
  - a son who is a fool
  - a stupid son
  lexicon: HALOT
  rationale: כְּסִיל in Proverbs is a stock wisdom term for a morally and practically
    foolish person, not merely someone lacking intelligence. 'Foolish' preserves that
    wisdom-category sense better than 'stupid.'
- source_word: וּמֶמֶר
  chosen: and bitterness
  alternatives:
  - and bitterness of spirit
  - and rebellion
  lexicon: HALOT
  rationale: The noun is rare and commonly understood here as 'bitterness' or a bitter
    grief/distress. This fits the synonymous parallelism with כַּעַס. A sense like
    'rebellion' is less likely in this context because the phrase describes the effect
    on the mother, not another trait of the son.
- source_word: לְיוֹלַדְתּוֹ
  chosen: to the woman who bore him
  alternatives:
  - to his mother
  - to the one who gave birth to him
  lexicon: HALOT
  rationale: The participial form literally means 'the one who bore him.' Rendering
    it this way preserves the vivid maternal expression of the Hebrew while remaining
    natural English. 'His mother' is interpretive and simpler, but the source text
    is more specific.
