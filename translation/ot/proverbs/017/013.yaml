id: PRO.17.13
reference: Proverbs 17:13
source:
  edition: WLC
  text: מֵשִׁ֣יב רָ֭עָה תַּ֣חַת טוֹבָ֑ה לֹא תמיש רָ֝עָ֗ה מִ/בֵּיתֽ/וֹ־׃
translation:
  text: Whoever repays evil for good, evil will not depart from his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity will not depart from his house.' The second 'evil' (רָעָה)
      can denote either moral evil or harmful consequence/disaster; the main text
      preserves the Hebrew repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵשִׁיב
  chosen: repays
  alternatives:
  - returns
  - answers with
  lexicon: HALOT
  rationale: From שוב in the Hiphil participle, here with the sense of causing something
    to return in exchange. 'Repays' fits the reciprocal/retributive force in the proverb
    better than the more wooden 'returns.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - bad
  lexicon: HALOT
  rationale: The noun can denote evil, harm, or calamity depending on context. Here
    the first occurrence refers to wrongful treatment in response to good, so 'evil'
    best preserves the moral dimension.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in return for
  lexicon: HALOT
  rationale: The preposition marks exchange or substitution. In idiomatic English
    with 'repays,' 'for' is the most natural rendering while preserving the sense
    of recompense.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - kindness
  - benefit
  lexicon: HALOT
  rationale: The term broadly denotes good/goodness/benefit. 'Good' keeps the proverb
    general and balanced with 'evil,' without narrowing it to a specific act of kindness.
- source_word: לֹא תמיש
  chosen: will not depart
  alternatives:
  - will not turn aside
  - will not leave
  lexicon: HALOT
  rationale: From מוש in the Hiphil/imperfect, expressing removal or departure. 'Will
    not depart' is idiomatic and preserves the durative sense of evil remaining attached
    to the household.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - calamity
  - disaster
  lexicon: HALOT
  rationale: In the second occurrence the word may be read either morally ('evil')
    or consequentially ('calamity/disaster'). The main text keeps the lexical repetition
    with the first occurrence, preserving the proverb's stark symmetry; the consequential
    nuance is preserved in a footnote.
- source_word: מִבֵּיתוֹ
  chosen: from his house
  alternatives:
  - from his household
  - from his family
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or family. 'House' is the most direct
    rendering and preserves the common proverbial idiom, while still implying the
    broader household sphere.
- source_word: implicit subject of participle
  chosen: Whoever
  alternatives:
  - He who
  - One who
  rationale: Hebrew uses a substantival participle without an explicit pronoun. 'Whoever'
    renders the generic force in clear modern English without archaic tone.
