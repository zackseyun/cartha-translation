id: PRO.17.12
reference: Proverbs 17:12
source:
  edition: WLC
  text: פָּג֬וֹשׁ דֹּ֣ב שַׁכּ֣וּל בְּ/אִ֑ישׁ וְ/אַל כְּ֝סִ֗יל בְּ/אִוַּלְתּֽ/וֹ־׃
translation:
  text: Better to meet a bear robbed of her cubs than a fool in his folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Better to encounter a bereaved bear than a fool in his foolishness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּגוֹשׁ
  chosen: to meet
  alternatives:
  - to encounter
  - to come upon
  lexicon: HALOT
  rationale: 'The infinitive construct functions proverbially as the verbal idea in
    comparison: ''to meet/encounter.'' ''Meet'' is idiomatic and concise in English.'
- source_word: דֹּב
  chosen: bear
  lexicon: HALOT
  rationale: Straightforward animal term; 'bear' is the natural English equivalent.
- source_word: שַׁכּוּל
  chosen: robbed of her cubs
  alternatives:
  - bereaved
  - deprived of offspring
  lexicon: HALOT
  rationale: The adjective means bereaved, especially of children/young. With 'bear,'
    idiomatic English is 'robbed of her cubs,' which conveys the dangerous maternal
    rage implied by the proverb more clearly than the less natural 'bereaved bear.'
- source_word: בְּאִישׁ
  chosen: than a man
  alternatives:
  - with a man
  - in a man
  lexicon: HALOT
  rationale: The preposition with פגש marks the one encountered, 'meet ... a man.'
    In the comparative proverb, English expresses the contrast with 'than.' Because
    the second colon specifies 'a fool,' the generic 'man' is absorbed into the comparison
    rather than translated woodenly as a separate noun phrase.
- source_word: וְאַל
  chosen: than
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: 'Though literally ''and not,'' in this comparative construction it introduces
    the less desirable alternative: ''rather than'' or ''than.'' English proverb style
    favors ''than'' after ''better to.'''
- source_word: כְּסִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and intellectually obstinate
    fool, not merely someone lacking intelligence. 'Fool' preserves the ethical force.
- source_word: בְּאִוַּלְתּוֹ
  chosen: in his folly
  alternatives:
  - in his foolishness
  - during his folly
  lexicon: HALOT
  rationale: The phrase denotes the fool in the sphere or exercise of his folly. 'In
    his folly' is both literal and idiomatic, preserving the sense of active foolish
    behavior.
