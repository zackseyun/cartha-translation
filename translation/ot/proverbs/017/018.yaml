id: PRO.17.18
reference: Proverbs 17:18
source:
  edition: WLC
  text: אָדָ֣ם חֲסַר לֵ֭ב תּוֹקֵ֣עַ כָּ֑ף עֹרֵ֥ב עֲ֝רֻבָּ֗ה לִ/פְנֵ֥י רֵעֵֽ/הוּ־׃
translation:
  text: A man lacking sense shakes hands, pledging security before his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'A man lacking heart strikes the hand, becoming surety
      before his neighbor.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'shakes hands' refers to a customary gesture of entering
      a financial pledge or guarantee.
    reason: cultural_note
  - marker: c
    text: Or 'becoming surety' / 'putting up security.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  chosen: A man
  alternatives:
  - A person
  - Humankind
  lexicon: HALOT
  rationale: The singular noun refers to an individual exemplar in a wisdom saying,
    not humanity in general. Per doctrine, the grammatically masculine generic is
    rendered gender-accurately as 'man' where that matches the source's representative
    force.
- source_word: חֲסַר לֵב
  chosen: lacking sense
  alternatives:
  - lacking heart
  - without understanding
  - senseless
  lexicon: HALOT
  rationale: Literally 'lacking heart,' but in Hebrew wisdom 'heart' commonly denotes
    understanding or judgment. 'Lacking sense' communicates the idiom in natural English
    without flattening the moral-intellectual force.
- source_word: תּוֹקֵעַ כָּף
  chosen: shakes hands
  alternatives:
  - strikes the hand
  - clasps hands
  lexicon: HALOT
  rationale: The idiom refers to striking or clasping the hand as a gesture of entering
    a pledge or guarantee. 'Shakes hands' is a readable modern equivalent, while the
    legal sense is clarified by the following participial phrase.
- source_word: עֹרֵב עֲרֻבָּה
  chosen: pledging security
  alternatives:
  - becoming surety
  - guaranteeing a pledge
  - putting up security
  lexicon: HALOT
  rationale: The cognate verb-noun pair intensifies the act of suretyship. 'Pledging
    security' preserves the financial/legal sense in accessible English. 'Becoming
    surety' is more traditional but less transparent to modern readers.
- source_word: לִפְנֵי רֵעֵהוּ
  chosen: before his neighbor
  alternatives:
  - in the presence of his neighbor
  - for his neighbor
  lexicon: HALOT
  rationale: לִפְנֵי most naturally means 'before/in the presence of.' In this context
    it likely indicates the public act of making the pledge in relation to his neighbor.
    'Before his neighbor' preserves the preposition without over-interpreting whether
    the neighbor is beneficiary, creditor, or witness.
