id: PRO.17.3
reference: Proverbs 17:3
source:
  edition: WLC
  text: מַצְרֵ֣ף לַ֭/כֶּסֶף וְ/כ֣וּר לַ/זָּהָ֑ב וּ/בֹחֵ֖ן לִבּ֣וֹת יְהוָֽה׃
translation:
  text: The crucible is for silver, and the furnace for gold, but Yahweh tests hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The crucible is for silver, and the furnace for gold, and the LORD examines hearts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצְרֵף
  chosen: crucible
  alternatives:
  - refining pot
  - smelter
  lexicon: HALOT
  rationale: Refers to a vessel or instrument used in refining metals. 'Crucible' is concise, natural English and preserves the metallurgical image better than the more generic 'refining pot.'
- source_word: לַכֶּסֶף
  chosen: for silver
  alternatives:
  - for the silver
  lexicon: HALOT
  rationale: 'The prefixed ל marks purpose or relation: the crucible is used for silver. English idiom prefers anarthrous ''for silver'' in a proverbial statement.'
- source_word: כּוּר
  chosen: furnace
  alternatives:
  - smelting furnace
  lexicon: HALOT
  rationale: Denotes a furnace used for smelting or refining. 'Furnace' is the standard, readable rendering and pairs well with 'crucible' in the parallelism.
- source_word: לַזָּהָב
  chosen: for gold
  alternatives:
  - for the gold
  lexicon: HALOT
  rationale: As with 'for silver,' the ל expresses purpose or application. The generic proverb sense is best conveyed by 'for gold.'
- source_word: וּבֹחֵן
  chosen: tests
  alternatives:
  - examines
  - proves
  - tries
  lexicon: HALOT
  rationale: The participle from בחן conveys testing or examining to reveal genuineness, fitting the refining metaphor. 'Tests' is clear, idiomatic, and preserves the evaluative force without overinterpreting.
- source_word: לִבּוֹת
  chosen: hearts
  alternatives:
  - minds
  - inner selves
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the standard term for the inner person, including thought and intention. Retaining 'hearts' preserves the biblical metaphor and avoids flattening the image.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
