theological_decisions:
- issue: Gendered expression in wisdom saying
  chosen_reading: a man of understanding
  alternative_readings:
  - a person of understanding
  - one of understanding
  rationale: The Hebrew uses אִישׁ, an explicitly masculine singular noun. Per translation
    philosophy, gender-accurate rendering is preferred over gender-neutral smoothing
    unless context clearly demands otherwise. The proverb states a general truth through
    a masculine singular form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
