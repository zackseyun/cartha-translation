id: PRO.17.27
reference: Proverbs 17:27
source:
  edition: WLC
  text: חוֹשֵׂ֣ךְ אֲ֭מָרָי/ו יוֹדֵ֣עַ דָּ֑עַת ו/קר ר֝֗וּחַ אִ֣ישׁ תְּבוּנָֽה־׃
translation:
  text: Whoever restrains his words has knowledge, and a man of understanding is cool
    in spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is calm in spirit.' The Hebrew literally says 'is cool of spirit,' using
      a temperature image for self-control.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man of understanding'; the masculine singular form is used proverbially
      for a person characterized by discernment.
    reason: cultural_note
lexical_decisions:
- source_word: חוֹשֵׂךְ
  chosen: restrains
  alternatives:
  - spares
  - holds back
  lexicon: HALOT
  rationale: The participle from חשׂך in this context refers to holding back speech.
    'Restrains' is natural English and preserves the proverb's emphasis on self-control
    better than the more literal but less idiomatic 'spares his words.'
- source_word: אֲמָרָיו
  chosen: his words
  alternatives:
  - his sayings
  - his speech
  lexicon: HALOT
  rationale: אמרים commonly refers to spoken words or utterances. 'His words' is the
    most straightforward and idiomatic rendering here.
- source_word: יוֹדֵעַ דָּעַת
  chosen: has knowledge
  alternatives:
  - knows knowledge
  - is knowing in knowledge
  lexicon: HALOT
  rationale: The Hebrew construction is idiomatic, describing a person characterized
    by knowledge. 'Has knowledge' communicates the sense in clear English without
    unnecessary literalism.
- source_word: וְקַר
  chosen: is cool
  alternatives:
  - is calm
  - is of cool
  lexicon: HALOT
  rationale: קר literally means 'cool/cold.' In parallel with restrained speech, it
    metaphorically describes emotional composure. 'Is cool' preserves the concrete
    Hebrew image better than the more interpretive 'is calm.'
- source_word: רוּחַ
  chosen: in spirit
  alternatives:
  - in temper
  - in disposition
  lexicon: HALOT
  rationale: רוּחַ here refers to inner disposition or temperament. 'In spirit' keeps
    the Hebrew anthropological term while remaining understandable in English.
- source_word: אִישׁ תְּבוּנָה
  chosen: a man of understanding
  alternatives:
  - a discerning man
  - a man of insight
  lexicon: HALOT
  rationale: This construct phrase denotes a person characterized by discernment.
    Following the project's gender-accurate policy, 'man' is retained because אִישׁ
    is explicitly masculine singular in form, while still functioning proverbially.
