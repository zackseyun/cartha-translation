id: PRO.17.21
reference: Proverbs 17:21
source:
  edition: WLC
  text: יֹלֵ֣ד כְּ֭סִיל לְ/ת֣וּגָה ל֑/וֹ וְ/לֹֽא יִ֝שְׂמַ֗ח אֲבִ֣י נָבָֽל־׃
translation:
  text: He who fathers a fool does so to his own grief, and the father of a vile man
    has no joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One who begets a fool begets him for sorrow.' The Hebrew wording is
      compact and may be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: '''Vile man'' translates Hebrew nabal, a term for a morally shameful or
      disgraceful person, not merely one lacking intelligence.'
    reason: cultural_note
lexical_decisions:
- source_word: יֹלֵד
  chosen: He who fathers
  alternatives:
  - One who begets
  - Whoever fathers
  - He who gives birth to
  lexicon: HALOT
  rationale: 'The Qal participle of ילד functions substantivally: ''one who begets/fathers.''
    In this proverb the subject is parallel to ''father'' in the second colon, so
    ''fathers'' best captures the paternal sense in idiomatic English. ''Gives birth
    to'' would be possible at the lexical level but is less likely here given the
    parallelism.'
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: כסיל is a standard wisdom term for a morally and intellectually obstinate
    fool, not merely someone lacking intelligence. 'Fool' is the established and most
    accurate rendering in Proverbs.
- source_word: לְתוּגָה
  chosen: to his own grief
  alternatives:
  - for grief
  - to sorrow
  lexicon: HALOT
  rationale: תוגה denotes grief, sorrow, or anguish. With the prefixed ל and following
    pronominal לּוֹ, the sense is that the begetting results in grief for the father
    himself. Rendering the phrase together as 'to his own grief' communicates the
    resultative force naturally.
- source_word: לוֹ
  chosen: his own
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the begetter/father. In English,
    'his own' clarifies the reflexive sense implied by the construction without adding
    new meaning.
- source_word: וְלֹא יִשְׂמַח
  chosen: has no joy
  alternatives:
  - does not rejoice
  - will not be glad
  lexicon: HALOT
  rationale: The imperfect expresses the general outcome in proverbial style. 'Has
    no joy' is a natural English equivalent that fits the gnomic sense, while preserving
    the idea of lacking rejoicing.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - a father of
  lexicon: HALOT
  rationale: The construct form requires completion by the following noun. 'The father
    of' works idiomatically in the parallel line and gives the generic force of the
    proverb.
- source_word: נָבָל
  chosen: a vile man
  alternatives:
  - a godless fool
  - a scoundrel
  - a disgraceful man
  lexicon: HALOT
  rationale: נבל in wisdom literature often denotes a morally base, disgraceful, or
    senseless person, overlapping with but not identical to כסיל. 'Vile man' preserves
    the ethical dimension and allows differentiation from 'fool' in the first colon.
    'Godless fool' is interpretive and stronger than the immediate context requires.
