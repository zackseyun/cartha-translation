id: PRO.17.4
reference: Proverbs 17:4
source:
  edition: WLC
  text: מֵ֭רַע מַקְשִׁ֣יב עַל שְׂפַת אָ֑וֶן שֶׁ֥קֶר מֵ֝זִין עַל לְשׁ֥וֹן הַוֺּֽת־־־׃
translation:
  text: An evildoer listens to wicked lips; a liar gives ear to a destructive tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'An evildoer listens to lips of iniquity; falsehood gives ear to a tongue
      of ruin.' The Hebrew allows a more literal rendering in which 'falsehood' is
      taken abstractly rather than as 'a liar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרַע
  chosen: an evildoer
  alternatives:
  - a wrongdoer
  - an evil person
  lexicon: HALOT
  rationale: Substantival use of the adjective/noun from רעע, referring to a person
    characterized by evil. 'Evildoer' is natural English and preserves the moral force
    better than the more generic 'wrongdoer.'
- source_word: מַקְשִׁיב
  chosen: listens to
  alternatives:
  - pays attention to
  - heeds
  lexicon: HALOT
  rationale: From קשׁב, 'to listen attentively/pay attention.' 'Listens to' is the
    most straightforward modern rendering; the context already implies culpable receptivity.
- source_word: עַל
  chosen: to
  alternatives:
  - for
  - toward
  lexicon: HALOT
  rationale: With verbs of listening, על can mark the object attended to. In idiomatic
    English, 'listen to' best conveys the construction.
- source_word: שְׂפַת אָוֶן
  chosen: wicked lips
  alternatives:
  - lips of trouble
  - lips of iniquity
  - mischievous speech
  lexicon: HALOT
  rationale: שׂפה ('lip') often stands metonymically for speech. אָוֶן can denote
    trouble, wickedness, or iniquity; here it describes morally corrupt speech. 'Wicked
    lips' is concise and idiomatic while preserving the metaphor.
- source_word: שֶׁקֶר
  chosen: a liar
  alternatives:
  - one who is false
  - a false person
  lexicon: HALOT
  rationale: 'Although formally ''falsehood/lie,'' in parallel with מֵרַע it is best
    taken substantivally for the person characterized by deceit. This yields a balanced
    proverb: evil person / liar.'
- source_word: מֵזִין
  chosen: gives ear to
  alternatives:
  - listens to
  - hears attentively
  lexicon: HALOT
  rationale: From אזן in the Hiphil, 'to give ear, listen.' Varying the English slightly
    from the first colon preserves the poetic parallelism without flattening it into
    exact repetition.
- source_word: לְשׁוֹן הַוּוֹת
  chosen: a destructive tongue
  alternatives:
  - a tongue of ruin
  - a perverse tongue
  - a tongue of calamities
  lexicon: HALOT
  rationale: לשׁון ('tongue') is metonymic for speech. הַוּוֹת denotes destructive
    acts, ruin, or calamities. 'Destructive tongue' communicates the active harmful
    force of the speech in clear modern English.
