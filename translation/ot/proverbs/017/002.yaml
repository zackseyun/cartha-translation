theological_decisions:
- issue: Gendered familial language
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: The Hebrew explicitly uses the masculine plural אַחִים. In keeping with
    the project’s gender-accurate policy, the main text retains 'brothers' rather
    than neutralizing to 'siblings,' though the sense may include the family heirs
    more broadly.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
