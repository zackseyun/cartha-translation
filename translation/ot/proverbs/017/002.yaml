id: PRO.17.2
reference: Proverbs 17:2
source:
  edition: WLC
  text: עֶֽבֶד מַשְׂכִּ֗יל יִ֭מְשֹׁל בְּ/בֵ֣ן מֵבִ֑ישׁ וּ/בְ/ת֥וֹךְ אַ֝חִ֗ים יַחֲלֹ֥ק
    נַחֲלָֽה־׃
translation:
  text: A prudent slave will rule over a son who brings shame, and among brothers
    he will share the inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servant.” The Hebrew עֶבֶד can denote either, but “slave” is used here
      because the proverb’s force depends on the social reversal of a bonded person
      rising above a disgraceful son.
    reason: lexical_alternative
  - marker: b
    text: Or “siblings.” Hebrew “brothers” reflects the masculine familial term and
      likely refers to the family heirs.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: 'The noun denotes a bonded subordinate. In this wisdom context the social
    inferiority of the figure is important to the proverb’s force: even a slave, if
    prudent, may surpass a disgraceful son. Following the project’s guidance, ''slave''
    is preferred where bonded status is salient.'
- source_word: מַשְׂכִּיל
  chosen: prudent
  alternatives:
  - wise
  - skillful
  - having insight
  lexicon: HALOT
  rationale: The participle from שכל conveys acting with insight or prudence, not
    merely intellectual wisdom. 'Prudent' fits the practical wisdom emphasis of Proverbs
    and pairs well with the contrast to the shame-bringing son.
- source_word: יִמְשֹׁל
  chosen: will rule over
  alternatives:
  - will govern
  - will have authority over
  lexicon: HALOT
  rationale: The verb משל commonly means to rule or exercise authority over. 'Rule
    over' preserves the directness of the Hebrew and the social reversal in the proverb.
- source_word: בְּבֵן
  chosen: over a son
  alternatives:
  - over the son
  lexicon: HALOT
  rationale: The preposition with 'son' marks the object of rule. The anarthrous form
    is best rendered generically as 'a son,' fitting proverbial style rather than
    a specific individual.
- source_word: מֵבִישׁ
  chosen: who brings shame
  alternatives:
  - shameful
  - who causes shame
  - disgraceful
  lexicon: HALOT
  rationale: The participle describes one who causes shame, likely to his household.
    'Who brings shame' expresses the verbal force more clearly than the adjectival
    'shameful'.
- source_word: וּבְתוֹךְ אַחִים
  chosen: and among brothers
  alternatives:
  - and in the midst of brothers
  - and among the brothers
  lexicon: HALOT
  rationale: The phrase indicates inclusion within the family group for inheritance
    purposes. 'Among brothers' is natural English and preserves the masculine familial
    term present in the Hebrew.
- source_word: יַחֲלֹק
  chosen: he will share
  alternatives:
  - he will divide
  - he will receive a share of
  lexicon: HALOT
  rationale: The verb חלק can mean divide or apportion, but with 'inheritance' and
    this context it means to share in or receive a portion of the inheritance. 'He
    will share' is concise and idiomatic.
- source_word: נַחֲלָה
  chosen: the inheritance
  alternatives:
  - an inheritance
  - the estate
  - the patrimony
  lexicon: HALOT
  rationale: The noun refers to inherited property or allotted estate. 'The inheritance'
    best captures the family-legal sense in context.
