id: PRO.17.1
reference: Proverbs 17:1
source:
  edition: WLC
  text: ט֤וֹב פַּ֣ת חֲ֭רֵבָה וְ/שַׁלְוָה בָ֑/הּ מִ֝/בַּ֗יִת מָלֵ֥א זִבְחֵי רִֽיב־־׃
translation:
  text: Better is a dry crust with peace in it than a house full of sacrificial feasts
    with strife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrifices'; the Hebrew may refer either to sacrificial meals or, more
      generally, abundant feast fare associated with sacrifice.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Better
  - It is better
  lexicon: HALOT
  rationale: Introduces the comparative proverb formula. English idiom prefers 'Better
    is ... than ...' to reflect the Hebrew elliptical comparison.
- source_word: פַּת
  chosen: crust
  alternatives:
  - piece of bread
  - morsel
  - loaf
  lexicon: HALOT
  rationale: Refers to a piece or bit of bread; 'crust' fits the proverb's image of
    meager fare, especially with 'dry.'
- source_word: חֲרֵבָה
  chosen: dry
  alternatives:
  - parched
  - stale
  lexicon: HALOT
  rationale: Describes the bread as dry, emphasizing poverty or simplicity rather
    than spoilage.
- source_word: וְשַׁלְוָה בָהּ
  chosen: with peace in it
  alternatives:
  - and quiet with it
  - and tranquility in it
  - with quietness
  lexicon: HALOT
  rationale: שַׁלְוָה denotes quietness, ease, tranquility. 'Peace' communicates the
    domestic contrast with 'strife' in the second colon, while 'in it' preserves the
    pronominal suffix referring back to the situation/meal.
- source_word: מִבַּיִת
  chosen: than a house
  alternatives:
  - than the house of
  - than a household
  lexicon: HALOT
  rationale: The comparative מִן is rendered by 'than.' 'House' is retained rather
    than abstracting to 'household,' preserving the concrete domestic setting.
- source_word: מָלֵא
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Straightforward adjectival predicate in comparison with the first colon.
- source_word: זִבְחֵי
  chosen: sacrificial feasts
  alternatives:
  - sacrifices
  - choice meat from sacrifices
  - feasting
  lexicon: HALOT
  rationale: Plural construct of זֶבַח can denote sacrificial slaughter and, by extension,
    the meal associated with it. In this proverb the point is abundance and festivity,
    so 'sacrificial feasts' preserves both the cultic background and the idea of plentiful
    dining.
- source_word: רִיב
  chosen: strife
  alternatives:
  - quarreling
  - contention
  - discord
  lexicon: HALOT
  rationale: Captures interpersonal conflict in a concise proverbial register and
    pairs well with 'peace' in the first colon.
