id: PRO.17.23
reference: Proverbs 17:23
source:
  edition: WLC
  text: שֹׁ֣חַד מֵ֭/חֵיק רָשָׁ֣ע יִקָּ֑ח לְ֝/הַטּ֗וֹת אָרְח֥וֹת מִשְׁפָּֽט׃
translation:
  text: A wicked man takes a bribe from the bosom to pervert the paths of justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the lap'; the Hebrew image likely suggests something taken from
      a concealed fold of the garment, implying secrecy.
    reason: lexical_alternative
  - marker: b
    text: Or 'the course of justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  chosen: bribe
  alternatives:
  - gift
  - payoff
  lexicon: HALOT
  rationale: The noun denotes an illicit payment intended to influence judgment or
    conduct. 'Bribe' is the clearest modern English equivalent in this wisdom context.
- source_word: מֵחֵיק
  chosen: from the bosom
  alternatives:
  - from the lap
  - from the fold of the garment
  - secretly
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap, often the fold of a garment where
    something is concealed. Retaining 'from the bosom' preserves the concrete Hebrew
    image and implies concealment without over-paraphrasing to an adverb like 'secretly'
    in the main text.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a guilty man
  lexicon: HALOT
  rationale: The adjective/substantive refers to a wicked person. Because the Hebrew
    is singular masculine and representative, 'a wicked man' is gender-accurate and
    proverbially generic.
- source_word: יִקָּח
  chosen: takes
  alternatives:
  - receives
  - accepts
  lexicon: HALOT
  rationale: The verb לקח is the common verb 'take.' In context it means receiving
    or accepting a bribe, but 'takes' stays closer to the Hebrew while remaining natural
    English.
- source_word: לְהַטּוֹת
  chosen: to pervert
  alternatives:
  - to bend
  - to turn aside
  - to subvert
  lexicon: HALOT
  rationale: The infinitive of נטה here expresses causing deviation from what is right.
    'To pervert' fits legal/judicial context well and is idiomatic with 'justice'
    in English.
- source_word: אָרְחוֹת
  chosen: the paths
  alternatives:
  - the ways
  - the courses
  lexicon: HALOT
  rationale: The plural noun literally means 'paths' or 'ways.' 'Paths' preserves
    the metaphorical imagery common in Proverbs.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal right
  lexicon: HALOT
  rationale: In this context of bribery and legal corruption, מִשְׁפָּט is best rendered
    'justice' rather than the more procedural 'judgment.'
- source_word: אָרְחוֹת מִשְׁפָּט
  chosen: the paths of justice
  alternatives:
  - the ways of justice
  - the course of justice
  lexicon: HALOT
  rationale: 'The construct-like sense is metaphorical: bribery bends the proper avenues
    by which justice proceeds. ''Paths of justice'' preserves the Hebrew plural image;
    ''course of justice'' is smoother English but less formally transparent.'
