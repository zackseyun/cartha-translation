id: PRO.17.9
reference: Proverbs 17:9
source:
  edition: WLC
  text: מְֽכַסֶּה פֶּ֭שַׁע מְבַקֵּ֣שׁ אַהֲבָ֑ה וְ/שֹׁנֶ֥ה בְ֝/דָבָ֗ר מַפְרִ֥יד אַלּֽוּף־׃
translation:
  text: Whoever covers over an offense seeks love, but he who repeats a matter separates
    close friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covers a transgression.' The Hebrew keeps the metaphor of covering rather
      than stating forgiveness explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or 'he who brings up a matter again' or 'he who repeats a matter.' The sense
      is revisiting an offense rather than letting it rest.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'separates an intimate friend' (singular); the English plural 'close
      friends' expresses the proverb's generic force more naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  chosen: covers over
  alternatives:
  - covers
  - conceals
  - forgives
  lexicon: HALOT
  rationale: The participle of כסה literally means 'covering/concealing.' In this
    proverb it refers to not exposing or dwelling on another's wrongdoing. 'Covers
    over' preserves the metaphor while sounding natural in English and avoids overinterpreting
    it as full 'forgiveness,' though that idea is related.
- source_word: פֶּשַׁע
  chosen: an offense
  alternatives:
  - transgression
  - rebellion
  - wrongdoing
  lexicon: HALOT
  rationale: פשע often denotes transgression or rebellion, but in wisdom context here
    it refers to an interpersonal wrong. 'An offense' fits the relational setting
    and idiomatic English better than the more formal 'transgression.'
- source_word: מְבַקֵּשׁ
  chosen: seeks
  alternatives:
  - pursues
  - desires
  lexicon: HALOT
  rationale: The participle straightforwardly means 'seeking.' 'Seeks' is concise
    and preserves the proverb's moral logic.
- source_word: אַהֲבָה
  chosen: love
  alternatives:
  - affection
  - friendship
  lexicon: HALOT
  rationale: The noun broadly denotes love. 'Love' is the most direct equivalent and
    preserves the lexical connection without narrowing it prematurely to friendship,
    though the context is relational.
- source_word: שֹׁנֶה
  chosen: repeats
  alternatives:
  - brings up again
  - does again
  - retells
  lexicon: HALOT
  rationale: From שנה 'to repeat/do again.' In context with 'a matter,' the sense
    is revisiting or bringing up an issue again. 'Repeats' is compact and faithful;
    the more interpretive 'keeps bringing up' is possible but slightly expands the
    text.
- source_word: בְדָבָר
  chosen: a matter
  alternatives:
  - a word
  - an issue
  - the matter
  lexicon: HALOT
  rationale: דבר has a broad semantic range including word, matter, affair. Here it
    likely means a matter/issue previously discussed. 'A matter' is idiomatic and
    sufficiently broad.
- source_word: מַפְרִיד
  chosen: separates
  alternatives:
  - divides
  - alienates
  lexicon: HALOT
  rationale: The Hiphil participle means 'causing separation.' 'Separates' is the
    most direct rendering.
- source_word: אַלּוּף
  chosen: close friends
  alternatives:
  - an intimate friend
  - a companion
  - a close companion
  lexicon: HALOT
  rationale: אַלּוּף can denote a close associate, intimate, or companion in wisdom
    usage. Because the Hebrew singular may function generically, 'close friends' communicates
    the relational sense naturally in English. The plural is an idiomatic adjustment
    rather than a change in meaning.
