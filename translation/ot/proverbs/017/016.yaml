id: PRO.17.16
reference: Proverbs 17:16
source:
  edition: WLC
  text: לָ/מָּה זֶּ֣ה מְחִ֣יר בְּ/יַד כְּסִ֑יל לִ/קְנ֖וֹת חָכְמָ֣ה וְ/לֶב אָֽיִן־־־׃
translation:
  text: Why is there a price in the hand of a fool to buy wisdom when he has no heart
    for it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and there is no heart.' In Hebrew, 'heart' can refer to the
      inner faculty of understanding, judgment, or will.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why indeed
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing a rhetorical question. 'Why' is the
    plain and natural English equivalent.
- source_word: זֶּה
  chosen: there
  alternatives:
  - this
  - such
  lexicon: HALOT
  rationale: Though literally 'this,' in the idiom לָמָּה זֶּה it functions naturally
    in English as an existential-like 'why is there...?' rather than the stiffer 'why
    is this...?'.
- source_word: מְחִיר
  chosen: a price
  alternatives:
  - money
  - payment
  - purchase price
  lexicon: HALOT
  rationale: Refers to the means or price of purchase. 'A price' preserves the commercial
    metaphor without over-specifying coinage.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - in the possession of
  - available to
  lexicon: HALOT
  rationale: Literal 'in the hand of' is idiomatic Hebrew for possession or control.
    Retained because it is clear in English and preserves the imagery.
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: Standard wisdom-literature term for the morally and intellectually obstinate
    person. 'Fool' is the established and accurate rendering.
- source_word: לִקְנוֹת
  chosen: to buy
  alternatives:
  - to acquire
  - to purchase
  lexicon: HALOT
  rationale: Infinitive of קנה in a commercial sense. 'To buy' fits the price metaphor
    and is idiomatic.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise instruction
  lexicon: HALOT
  rationale: In Proverbs this term centrally denotes wisdom in the moral and practical
    sense. 'Wisdom' is the best direct rendering.
- source_word: וְלֶב אָיִן
  chosen: when he has no heart for it
  alternatives:
  - but there is no sense in him
  - and he has no mind
  - and he lacks understanding
  lexicon: HALOT
  rationale: 'Literally ''and heart is not/there is no heart.'' In Hebrew anthropology,
    ''heart'' includes mind, will, and understanding. ''No heart for it'' preserves
    the metaphor while making the sense intelligible in modern English: the fool lacks
    the inner capacity or disposition needed to gain wisdom.'
