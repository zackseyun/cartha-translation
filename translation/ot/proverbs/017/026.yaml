id: PRO.17.26
reference: Proverbs 17:26
source:
  edition: WLC
  text: גַּ֤ם עֲנ֣וֹשׁ לַ/צַּדִּ֣יק לֹא ט֑וֹב לְ/הַכּ֖וֹת נְדִיבִ֣ים עַל יֹֽשֶׁר־־׃
translation:
  text: Also, to punish a righteous man is not good, nor to strike nobles for their
    uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor to strike princes contrary to justice.' The Hebrew phrase עַל יֹשֶׁר
      can be understood either as 'for uprightness' or, more idiomatically, 'against
      what is right / contrary to justice.'
    reason: lexical_alternative
  - marker: b
    text: '''Nobles'' may also be rendered ''princes'' or ''leaders''; the Hebrew
      can denote people of high rank.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional proverb or further point. 'Also' is natural
    modern English and preserves the additive force without overemphasis.
- source_word: עֲנוֹשׁ
  chosen: to punish
  alternatives:
  - to fine
  - to penalize
  lexicon: HALOT
  rationale: The infinitive conveys the act of imposing punishment. 'Punish' is the
    broadest and most natural rendering in context; 'fine' would be too narrow.
- source_word: לַצַּדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a just man
  lexicon: HALOT
  rationale: The singular adjective with article after ל marks the person affected
    by punishment. 'A righteous man' is gender-accurate and idiomatic, matching the
    representative singular in Hebrew wisdom literature.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is improper
  lexicon: HALOT
  rationale: A standard evaluative expression in Hebrew. 'Is not good' preserves the
    source wording while still sounding natural in English.
- source_word: לְהַכּוֹת
  chosen: to strike
  alternatives:
  - to beat
  - to flog
  lexicon: HALOT
  rationale: The verb נכה broadly means to strike/smite. 'Strike' is sufficiently
    literal without specifying a degree of violence the text does not require.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - leaders
  - generous men
  lexicon: HALOT
  rationale: In Proverbs this noun commonly denotes persons of rank or noble standing.
    'Nobles' best fits the social-judicial context here. 'Generous men' reflects another
    semantic possibility of the root but is less likely in parallel with 'righteous
    man' and the concern for unjust punishment.
- source_word: עַל יֹשֶׁר
  chosen: for their uprightness
  alternatives:
  - because of uprightness
  - contrary to justice
  - for what is right
  lexicon: HALOT
  rationale: 'The preposition עַל here most naturally gives the grounds or occasion:
    they are struck on account of uprightness. ''For their uprightness'' makes the
    sense explicit in English. An interpretive alternative is adverbial, ''contrary
    to justice,'' but the more direct lexical sense is preferable in the main text.'
