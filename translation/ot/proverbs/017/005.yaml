theological_decisions:
- issue: Referent of 'his Maker'
  chosen_reading: The poor person's maker is God, and mocking the poor is therefore
    an affront to God.
  alternative_readings:
  - '''his Maker'' could be read more generally as ''the Creator'' without emphasizing
    the possessive relation'
  rationale: The suffix in עֹשֵׂהוּ naturally points back to the poor person. The
    proverb's theology grounds human dignity in God's creative act; the translation
    preserves that implication without expanding beyond the text.
- issue: Generic masculine expression
  chosen_reading: Use mixed English forms ('Whoever... he who...') to preserve the
    generic singular force without flattening the source.
  alternative_readings:
  - Use fully gender-neutral forms such as 'the one who... they...'
  rationale: The Hebrew uses grammatically masculine singular forms in generic proverbial
    style. Per the translation philosophy, the rendering should be gender-accurate
    rather than fully gender-neutral, while still reading naturally in modern English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
