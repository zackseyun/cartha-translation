id: PRO.17.5
reference: Proverbs 17:5
source:
  edition: WLC
  text: לֹעֵ֣ג לָ֭/רָשׁ חֵרֵ֣ף עֹשֵׂ֑/הוּ שָׂמֵ֥חַ לְ֝/אֵ֗יד לֹ֣א יִנָּקֶֽה׃
translation:
  text: Whoever mocks the poor insults his Maker; he who rejoices at calamity will
    not go unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scoffs at the poor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his Creator.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will not be acquitted' or 'will not be held innocent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹעֵג
  chosen: mocks
  alternatives:
  - scoffs at
  - derides
  lexicon: HALOT
  rationale: The participle denotes mocking or derisive speech. 'Mocks' is concise,
    natural English and preserves the active contempt of the Hebrew.
- source_word: לָרָשׁ
  chosen: the poor
  alternatives:
  - the needy
  - the impoverished
  lexicon: HALOT
  rationale: רָשׁ refers to a poor or destitute person. 'The poor' is the most idiomatic
    collective rendering in English and fits proverbial style.
- source_word: חֵרֵף
  chosen: insults
  alternatives:
  - taunts
  - reproaches
  - blasphemes
  lexicon: HALOT
  rationale: The verb means to reproach or treat with contempt. 'Insults' best matches
    the interpersonal force here without overreading it as explicitly cultic blasphemy.
- source_word: עֹשֵׂהוּ
  chosen: his Maker
  alternatives:
  - the one who made him
  - his Creator
  lexicon: HALOT
  rationale: The participle with suffix means 'the one who made him.' 'His Maker'
    is idiomatic, preserves the personal relation, and reflects the theological point
    that contempt for the poor affronts God as creator.
- source_word: שָׂמֵחַ
  chosen: rejoices
  alternatives:
  - is glad
  - takes joy
  lexicon: HALOT
  rationale: The adjective/participle expresses gladness. 'Rejoices' gives the durative
    moral posture in a proverb and pairs well with the following prepositional phrase.
- source_word: לְאֵיד
  chosen: at calamity
  alternatives:
  - at disaster
  - over misfortune
  lexicon: HALOT
  rationale: אֵיד denotes disaster or ruin. 'Calamity' is weighty and general enough
    to preserve the proverb's broad application.
- source_word: לֹא יִנָּקֶה
  chosen: will not go unpunished
  alternatives:
  - will not be held innocent
  - will not be acquitted
  lexicon: HALOT
  rationale: The Niphal of נקה commonly means to be left unpunished or declared innocent.
    In this wisdom context, 'will not go unpunished' communicates the judicial-moral
    consequence clearly in natural English.
