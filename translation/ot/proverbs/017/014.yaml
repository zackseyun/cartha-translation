id: PRO.17.14
reference: Proverbs 17:14
source:
  edition: WLC
  text: פּ֣וֹטֵֽר מַ֭יִם רֵאשִׁ֣ית מָד֑וֹן וְ/לִ/פְנֵ֥י הִ֝תְגַּלַּ֗ע הָ/רִ֥יב נְטֽוֹשׁ׃
translation:
  text: The beginning of strife is like letting out water; so abandon the quarrel
    before it breaks out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The beginning of strife is like one who releases water'; the Hebrew
      image may suggest opening a breach in a dam or channel, after which the flow
      becomes hard to stop.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'breaks out' is difficult; alternatives include 'bursts
      forth' or 'is exposed/escalates.' The sense is that one should stop the dispute
      before it becomes openly unmanageable.
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹטֵר
  chosen: letting out
  alternatives:
  - releasing
  - opening
  - letting loose
  lexicon: HALOT
  rationale: The participle from פטר here evokes opening or releasing something restrained.
    In context with 'water,' the image is of water being let out through a breach
    or opening. 'Letting out' preserves the concrete metaphor more naturally than
    the overly literal 'opening' or the less idiomatic 'releasing.'
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Although morphologically plural, Hebrew מַיִם is commonly rendered as
    the mass noun 'water' in English. Singular English best matches idiomatic usage
    while preserving the image.
- source_word: רֵאשִׁית
  chosen: the beginning of
  alternatives:
  - the start of
  - the first part of
  lexicon: HALOT
  rationale: The noun denotes beginning or first stage. 'The beginning of' fits proverbial
    style and clearly links the image to the onset of conflict.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - contention
  - discord
  - quarreling
  lexicon: HALOT
  rationale: מָדוֹן often denotes contentious conflict. 'Strife' is concise, natural
    in wisdom literature, and slightly broader than a single verbal exchange.
- source_word: וְלִפְנֵי
  chosen: before
  alternatives:
  - and before
  lexicon: HALOT
  rationale: The conjunction plus preposition literally means 'and before,' but English
    proverb style is smoother with 'before' after the semicolon. The logical connection
    is preserved without forcing the conjunction.
- source_word: הִתְגַּלַּע
  chosen: it breaks out
  alternatives:
  - it bursts forth
  - it is exposed
  - it escalates
  lexicon: HALOT
  rationale: The verb is difficult and likely conveys breaking out, bursting forth,
    or becoming violently exposed. In context of a quarrel and the water-breach metaphor,
    'breaks out' best captures the onset of open conflict in idiomatic English.
- source_word: הָרִיב
  chosen: the quarrel
  alternatives:
  - the dispute
  - the contention
  - the conflict
  lexicon: HALOT
  rationale: רִיב commonly denotes a dispute or quarrel. 'Quarrel' fits the immediate
    interpersonal sense and pairs well with 'strife' without exact repetition.
- source_word: נְטוֹשׁ
  chosen: abandon
  alternatives:
  - leave off
  - drop
  - forsake
  lexicon: HALOT
  rationale: The imperative calls for ceasing involvement before escalation. 'Abandon'
    is strong and clear, preserving the force of the command better than the more
    colloquial 'drop,' while remaining readable modern English.
