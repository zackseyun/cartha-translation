id: PRO.17.17
reference: Proverbs 17:17
source:
  edition: WLC
  text: בְּ/כָל עֵ֭ת אֹהֵ֣ב הָ/רֵ֑עַ וְ/אָ֥ח לְ֝/צָרָ֗ה יִוָּלֵֽד־׃
translation:
  text: A friend loves at all times, and a brother is born for adversity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and a brother is born for a time of trouble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל עֵת
  chosen: at all times
  alternatives:
  - at every time
  - always
  lexicon: HALOT
  rationale: The preposition ב plus כָּל with עֵת expresses comprehensive temporal
    scope. 'At all times' is idiomatic modern English and preserves the proverb's
    universal claim better than the slightly stiffer 'at every time.'
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - shows love
  - is loving
  lexicon: HALOT
  rationale: The Qal participle functions predicatively here, expressing characteristic
    action. 'Loves' is the most direct and natural rendering, preserving the durative/general
    sense without paraphrase.
- source_word: הָ/רֵעַ
  chosen: a friend
  alternatives:
  - the friend
  - a companion
  - a neighbor
  lexicon: HALOT
  rationale: Although the Hebrew has the article, in proverbial style it often marks
    a class or type rather than a specific individual. 'A friend' best conveys the
    generic sense in English. 'Companion' is possible but less natural here; 'neighbor'
    is too spatial/social and misses the relational nuance.
- source_word: וְ/אָח
  chosen: and a brother
  alternatives:
  - and a kinsman
  lexicon: HALOT
  rationale: אָח normally means 'brother.' In wisdom literature it may be literal
    or extended to close kin-like solidarity, but 'brother' preserves the source term
    and the proverb's rhetorical parallelism.
- source_word: לְ֝/צָרָה
  chosen: for adversity
  alternatives:
  - for trouble
  - for distress
  - for a time of trouble
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity. 'Adversity' fits the concise,
    proverbial register and avoids over-specifying the nature of the hardship.
- source_word: יִוָּלֵד
  chosen: is born
  alternatives:
  - comes to be
  - is made
  lexicon: HALOT
  rationale: 'The Niphal of ילד is most naturally ''is born.'' Some interpreters take
    it idiomatically as purpose or destiny (''comes into being for''), but the literal
    rendering works well in English and preserves the metaphorical force: a brother''s
    role is especially realized in adversity.'
