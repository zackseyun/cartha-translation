theological_decisions:
- issue: Whether מַלְאָךְ should be rendered as a supernatural 'angel' or a more general
    'messenger'
  chosen_reading: messenger
  alternative_readings:
  - angel
  rationale: The verse does not explicitly identify the agent as heavenly. Rendering
    it 'messenger' preserves the Hebrew term's semantic range and avoids importing
    a more specific theological claim than the text requires. The alternative is preserved
    in a footnote because readers may understand a divine agent of judgment here.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
