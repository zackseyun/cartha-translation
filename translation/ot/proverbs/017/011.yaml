id: PRO.17.11
reference: Proverbs 17:11
source:
  edition: WLC
  text: אַךְ מְרִ֥י יְבַקֶּשׁ רָ֑ע וּ/מַלְאָ֥ךְ אַ֝כְזָרִ֗י יְשֻׁלַּח בּֽ/וֹ־־־׃
translation:
  text: A rebel seeks only evil, and a cruel messenger will be sent against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cruel angel will be sent against him.' The Hebrew word can mean either
      'messenger' or 'angel.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - nothing but
  lexicon: HALOT
  rationale: Here אַךְ functions restrictively/emphatically, limiting the rebel's
    pursuit to evil. 'Only' captures the restrictive force more naturally in English
    than 'surely' or 'indeed'.
- source_word: מְרִי
  chosen: a rebel
  alternatives:
  - rebellion
  - the rebellious man
  - defiance
  lexicon: HALOT
  rationale: Although the noun can denote 'rebellion' abstractly, in this syntax it
    is best taken metonymically/personally for a rebellious person. 'A rebel' gives
    clear English sense and fits the following masculine singular verbs and pronoun.
- source_word: יְבַקֶּשׁ
  chosen: seeks
  alternatives:
  - looks for
  - pursues
  lexicon: HALOT
  rationale: The piel of בקש commonly means 'seek' or 'look for.' 'Seeks' is concise
    and idiomatic here.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - trouble
  - disaster
  lexicon: HALOT
  rationale: רָע can denote moral evil or harmful trouble. In this proverb, the moral
    dimension is prominent in describing the rebel's intent, so 'evil' is preferred,
    while the punitive consequence in the second colon balances it.
- source_word: מַלְאָךְ
  chosen: messenger
  alternatives:
  - angel
  - envoy
  lexicon: HALOT
  rationale: The Hebrew term can mean either human 'messenger' or supernatural 'angel.'
    In wisdom literature and in this judgment context, the phrase may refer generally
    to an agent sent to punish. 'Messenger' preserves the lexical breadth without
    over-specifying the agent as supernatural.
- source_word: אַכְזָרִי
  chosen: cruel
  alternatives:
  - merciless
  - fierce
  lexicon: HALOT
  rationale: '''Cruel'' is the most direct and natural rendering for the adjective,
    conveying harshness in judgment.'
- source_word: יְשֻׁלַּח
  chosen: will be sent
  alternatives:
  - is sent
  - shall be dispatched
  lexicon: HALOT
  rationale: The pual gives a passive sense. 'Will be sent' fits proverbial future
    consequence in English.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - to him
  - upon him
  - at him
  lexicon: HALOT
  rationale: Although the preposition is literally 'in/with him,' in this hostile
    context English idiom requires 'against him' to express punitive direction.
