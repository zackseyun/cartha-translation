id: PRO.17.22
reference: Proverbs 17:22
source:
  edition: WLC
  text: לֵ֣ב שָׂ֭מֵחַ יֵיטִ֣ב גֵּהָ֑ה וְ/ר֥וּחַ נְ֝כֵאָ֗ה תְּיַבֶּשׁ גָּֽרֶם־׃
translation:
  text: A joyful heart promotes healing, but a crushed spirit dries up the bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does good like medicine.' The Hebrew noun גֵּהָה can denote healing,
      recovery, or remedy/medicine; the main text renders the broader sense 'healing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: In Proverbs, לֵב commonly denotes the inner person, including emotions
    and will. 'Heart' is the natural English equivalent and preserves the anthropological
    imagery.
- source_word: שָׂמֵחַ
  chosen: joyful
  alternatives:
  - glad
  - merry
  lexicon: HALOT
  rationale: The adjective denotes gladness or rejoicing. 'Joyful' is idiomatic with
    'heart' and avoids the potentially frivolous tone of 'merry' in modern English.
- source_word: יֵיטִב
  chosen: promotes
  alternatives:
  - does good
  - makes good
  - improves
  lexicon: HALOT
  rationale: The Hiphil of יטב means 'to make good' or 'to do good.' Because the object
    is גֵּהָה ('healing/recovery'), 'promotes healing' expresses the causative sense
    in clear modern English better than the wooden 'does good healing.'
- source_word: גֵּהָה
  chosen: healing
  alternatives:
  - health
  - recovery
  - cure
  lexicon: HALOT
  rationale: The noun refers to healing or recovery. 'Healing' best fits the proverb's
    contrast with bodily deterioration in the second colon and remains broad enough
    for physical and general well-being.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - inner disposition
  lexicon: HALOT
  rationale: Here רוּחַ refers to a person's inner spirit or disposition, contrasted
    with 'heart.' 'Spirit' preserves the anthropological parallelism without reducing
    it merely to mood.
- source_word: נְכֵאָה
  chosen: crushed
  alternatives:
  - broken
  - stricken
  - smitten
  lexicon: HALOT
  rationale: The adjective conveys being beaten down or crushed. 'Crushed' is vivid,
    idiomatic, and matches the proverb's emotional and physical imagery.
- source_word: תְּיַבֶּשׁ
  chosen: dries up
  alternatives:
  - withers
  - causes to dry
  lexicon: HALOT
  rationale: The Piel verb intensifies the action of drying. 'Dries up' is a direct
    and natural rendering that preserves the concrete metaphor.
- source_word: גָּרֶם
  chosen: the bones
  alternatives:
  - bone
  - body frame
  lexicon: HALOT
  rationale: Although singular in form, the noun can function collectively. English
    idiom strongly prefers 'the bones' in this proverbial expression, and the plural
    conveys the bodily effect clearly.
