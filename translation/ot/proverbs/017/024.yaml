theological_decisions:
- issue: Gendered proverbial subject
  chosen_reading: a discerning man
  alternative_readings:
  - a discerning person
  - one who understands
  rationale: The Hebrew participle is grammatically masculine singular and functions
    as a representative proverbial type. Per the translation philosophy, the rendering
    remains gender-accurate rather than neutralized, while the sense is generic.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Personification of wisdom
  chosen_reading: Wisdom is before the face of a discerning man
  alternative_readings:
  - wisdom is before a discerning man
  rationale: The verse does not require a doctrinally loaded personification; the
    translation preserves the abstract noun straightforwardly. The capitalization
    is not intended to assert hypostatic personification but to reflect English style
    for the clause-initial subject; the underlying sense remains lexical, not theological.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
