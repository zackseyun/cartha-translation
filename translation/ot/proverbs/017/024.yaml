id: PRO.17.24
reference: Proverbs 17:24
source:
  edition: WLC
  text: אֶת פְּנֵ֣י מֵבִ֣ין חָכְמָ֑ה וְ/עֵינֵ֥י כְ֝סִ֗יל בִּ/קְצֵה אָֽרֶץ־־׃
translation:
  text: Wisdom is before the face of a discerning man, but the eyes of a fool are
    at the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Wisdom is in the presence of one who understands.' The Hebrew opening
      may also be taken less literally, with 'face' expressing presence rather than
      physical face.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a discerning man.' The masculine singular functions proverbially
      for a representative person.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land' instead of 'the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  chosen: before
  alternatives:
  - with
  - in the presence of
  - direct-object marker omitted in translation
  lexicon: HALOT
  rationale: Here אֶת is best taken in its less common prepositional sense ('with,
    near, before') rather than as an untranslated direct-object marker. The proverb
    contrasts wisdom as immediately present to the discerning person with the fool's
    gaze wandering far away.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the presence of
  - before
  lexicon: HALOT
  rationale: Literally 'face of.' Retained in translation to preserve the concrete
    Hebrew image, while still reading naturally in English in the idiom 'before the
    face of.'
- source_word: מֵבִין
  chosen: a discerning man
  alternatives:
  - one who understands
  - the understanding man
  - a discerning person
  lexicon: HALOT
  rationale: The participle denotes a person characterized by understanding/discernment.
    'Discerning man' preserves the masculine singular form in line with the gender-accurate
    policy, while conveying the proverbial type rather than a specific individual.
- source_word: חָכְמָה
  chosen: Wisdom
  alternatives:
  - wisdom
  lexicon: HALOT
  rationale: Rendered as 'Wisdom' as the subject of the clause. Capitalization here
    is stylistic rather than theological, reflecting the abstract noun's prominence;
    the sense remains the quality of wisdom, not necessarily personified Wisdom.
- source_word: וְעֵינֵי
  chosen: but the eyes
  alternatives:
  - and the eyes
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively ('but') because the verse sets
    up a clear contrast between the discerning person and the fool.
- source_word: כְסִיל
  chosen: of a fool
  alternatives:
  - of the fool
  - of a dullard
  lexicon: HALOT
  rationale: כְסִיל in Proverbs regularly denotes the morally and intellectually foolish
    person. 'Fool' is the standard and clearest English rendering.
- source_word: בִּקְצֵה
  chosen: at the ends of
  alternatives:
  - to the ends of
  - at the farthest part of
  - at the edge of
  lexicon: HALOT
  rationale: The phrase conveys remoteness. 'At the ends of' is idiomatic and preserves
    the image of the fool's attention ranging far afield rather than fixed on what
    is near.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this wisdom saying, the broader sense 'earth' better fits the hyperbolic
    contrast of distance than a specific 'land.'
