id: PRO.17.7
reference: Proverbs 17:7
source:
  edition: WLC
  text: לֹא נָאוָ֣ה לְ/נָבָ֣ל שְׂפַת יֶ֑תֶר אַ֝֗ף כִּֽי לְ/נָדִ֥יב שְׂפַת שָֽׁקֶר־־־־׃
translation:
  text: Excellent speech is not fitting for a fool; how much less are lying lips for
    a noble man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lofty speech.' The Hebrew expression may emphasize elevated, excessive,
      or grand speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'a prince' or 'a generous man.' The Hebrew נָדִיב can refer to noble
      rank or noble character.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוָה
  chosen: is not fitting
  alternatives:
  - is not becoming
  - is not suitable
  - is not seemly
  lexicon: HALOT
  rationale: The adjective/verb conveys what is appropriate or becoming. 'Is not fitting'
    is natural modern English and preserves the proverb's concern with propriety.
- source_word: נָבָל
  chosen: a fool
  alternatives:
  - a senseless man
  - a vile person
  lexicon: HALOT
  rationale: In wisdom literature נָבָל commonly denotes a morally and intellectually
    deficient person, not merely someone lacking intelligence. 'Fool' is the standard
    concise rendering in Proverbs and fits the genre.
- source_word: שְׂפַת יֶתֶר
  chosen: Excellent speech
  alternatives:
  - lofty speech
  - abundant speech
  - grand speech
  lexicon: HALOT
  rationale: שְׂפַת is literally 'lip/speech.' יֶתֶר here carries the sense of excess,
    superiority, or loftiness. In context the point is elevated or refined speech
    that does not suit a fool. 'Excellent speech' communicates elevated speech idiomatically,
    though the nuance of 'lofty' is possible and preserved in a footnote.
- source_word: אַף כִּי
  chosen: how much less
  alternatives:
  - much less
  - still less
  lexicon: HALOT
  rationale: This idiom intensifies the comparison from the first line to the second.
    'How much less' clearly signals the a fortiori logic in English.
- source_word: נָדִיב
  chosen: a noble man
  alternatives:
  - a prince
  - a noble
  - a generous man
  lexicon: HALOT
  rationale: נָדִיב can denote one of noble status or noble character, sometimes a
    prince. In this proverb it contrasts with 'fool' and suits a person of honorable
    standing. 'Noble man' preserves the masculine singular and the social-ethical
    sense. A footnote preserves 'prince' and 'generous man' as viable alternatives.
- source_word: שְׂפַת שָׁקֶר
  chosen: lying lips
  alternatives:
  - false speech
  - a lying lip
  lexicon: HALOT
  rationale: The Hebrew literally says 'lip of falsehood.' 'Lying lips' is idiomatic
    English, preserves the concrete imagery, and matches wisdom-style diction.
