id: PRO.12.1
reference: Proverbs 12:1
source:
  edition: WLC
  text: אֹהֵ֣ב מ֭וּסָר אֹ֣הֵֽב דָּ֑עַת וְ/שֹׂנֵ֖א תוֹכַ֣חַת בָּֽעַר׃
translation:
  text: Whoever loves discipline loves knowledge, but he who hates reproof is stupid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brutish' for 'stupid.' The Hebrew adjective בָּעַר can denote a person
      who is dull, senseless, or beastlike.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  chosen: Whoever loves
  alternatives:
  - He who loves
  - One who loves
  lexicon: HALOT
  rationale: The participle functions generically/proverbially. 'Whoever loves' gives
    natural modern English while preserving the generic force of the masculine singular.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - training
  lexicon: HALOT
  rationale: מוּסָר in Proverbs commonly denotes formative discipline/instruction,
    not mere abstract teaching. 'Discipline' best captures the corrective and training
    sense in wisdom literature.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - learning
  lexicon: HALOT
  rationale: A standard rendering for דָּעַת in Proverbs. It pairs naturally with
    מוּסָר and preserves the wisdom theme of acquired knowledge.
- source_word: וְשֹׂנֵא
  chosen: but he who hates
  alternatives:
  - and whoever hates
  - but whoever hates
  lexicon: HALOT
  rationale: The conjunction marks contrast in this antithetical proverb, so 'but'
    is preferable to a simple 'and.' The participle is again rendered generically.
- source_word: תוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: תוֹכַחַת refers to verbal correction or rebuke. 'Reproof' is concise
    and fits the proverbial register; 'rebuke' is a close alternative.
- source_word: בָּעַר
  chosen: stupid
  alternatives:
  - brutish
  - senseless
  - ignorant
  lexicon: HALOT
  rationale: בָּעַר describes a person as dull, brutish, or stupid in wisdom contexts.
    'Stupid' is the clearest modern equivalent and preserves the proverb's sharp moral
    evaluation. 'Brutish' is more traditional but less accessible.
