id: PRO.12.17
reference: Proverbs 12:17
source:
  edition: WLC
  text: יָפִ֣יחַ אֱ֭מוּנָה יַגִּ֣יד צֶ֑דֶק וְ/עֵ֖ד שְׁקָרִ֣ים מִרְמָֽה׃
translation:
  text: He who breathes out truth declares what is right, but a false witness, deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''faithfulness'': ''He who breathes out faithfulness declares what is
      right.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'declares righteousness' or 'declares justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפִיחַ
  chosen: breathes out
  alternatives:
  - utters
  - speaks forth
  lexicon: HALOT
  rationale: The Hiphil of נפח literally evokes breathing/blowing out, used idiomatically
    for uttering speech. 'Breathes out' preserves the vivid metaphor while remaining
    intelligible in English.
- source_word: אֱמוּנָה
  chosen: truth
  alternatives:
  - faithfulness
  - trustworthiness
  - honesty
  lexicon: HALOT
  rationale: In wisdom context with witness-bearing and parallel to 'false witness,'
    אֱמוּנָה denotes reliable/truthful speech rather than abstract faith. 'Truth'
    is concise and fits the forensic contrast, while the broader sense of faithfulness
    is preserved as an alternative.
- source_word: יַגִּיד
  chosen: declares
  alternatives:
  - tells
  - announces
  - reports
  lexicon: HALOT
  rationale: The verb נגד in Hiphil commonly means to make known or declare. 'Declares'
    fits the formal witness setting and pairs well with the preceding speech metaphor.
- source_word: צֶדֶק
  chosen: what is right
  alternatives:
  - righteousness
  - justice
  lexicon: HALOT
  rationale: In this proverb's legal-ethical setting, צֶדֶק can denote what is just/right.
    'What is right' is readable modern English and avoids narrowing the sense to either
    purely moral righteousness or courtroom justice alone; both alternatives remain
    viable.
- source_word: עֵד
  chosen: witness
  alternatives:
  - testifier
  lexicon: HALOT
  rationale: Standard rendering in legal and wisdom contexts; the verse contrasts
    truthful and false testimony.
- source_word: שְׁקָרִים
  chosen: 'false'
  alternatives:
  - lies
  - deceitful
  lexicon: HALOT
  rationale: Used attributively with 'witness,' the plural noun functions idiomatically
    to describe the witness as characterized by falsehood. English idiom prefers the
    adjectival rendering 'false witness.'
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  lexicon: HALOT
  rationale: 'The final noun is verbless and elliptical: the false witness yields
    or speaks deceit. Rendering simply as ''deceit'' preserves the terseness and antithetical
    parallelism of the Hebrew.'
