id: PRO.12.20
reference: Proverbs 12:20
source:
  edition: WLC
  text: מִ֭רְמָה בְּ/לֶב חֹ֣רְשֵׁי רָ֑ע וּֽ/לְ/יֹעֲצֵ֖י שָׁל֣וֹם שִׂמְחָֽה־׃
translation:
  text: Deceit is in the heart of those who devise evil, but joy belongs to those
    who counsel peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but to those who counsel peace, there is joy.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being or wholeness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְמָה
  chosen: Deceit
  alternatives:
  - treachery
  - guile
  - deception
  lexicon: HALOT
  rationale: The noun denotes deceitful intent or fraud. 'Deceit' is concise, natural
    English and fits the inner moral quality contrasted with 'joy' in the second colon.
- source_word: בְּלֶב
  chosen: is in the heart of
  alternatives:
  - is in the mind of
  - is in the inner being of
  lexicon: HALOT
  rationale: The preposition plus 'heart' expresses internal disposition. English
    idiom requires supplying 'is' and rendering 'heart' as the seat of intention,
    not merely emotion.
- source_word: חֹרְשֵׁי רָע
  chosen: those who devise evil
  alternatives:
  - those who plot evil
  - workers of evil
  lexicon: HALOT
  rationale: The participle from חרשׁ in this context carries the sense of planning
    or devising, especially of harmful schemes. 'Devise evil' preserves the deliberative
    nuance better than the more general 'do evil'.
- source_word: וּלְיֹעֲצֵי שָׁלוֹם
  chosen: but joy belongs to those who counsel peace
  alternatives:
  - but to counselors of peace there is joy
  - but those who advise peace have joy
  lexicon: HALOT
  rationale: The lamed marks the contrasting group, and the participle means 'those
    who advise/counsel.' 'Counsel peace' preserves the verbal force and keeps 'peace'
    broad enough to include wholeness and reconciliation, not merely absence of conflict.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard rendering and suits the proverb''s contrast
    with evil plotting. The broader semantic range of shalom is acknowledged, but
    ''peace'' is the most idiomatic main-text choice.'
- source_word: שִׂמְחָה
  chosen: joy belongs to
  alternatives:
  - there is joy for
  - gladness
  lexicon: HALOT
  rationale: The verbless clause requires an implied copular sense. 'Joy belongs to'
    makes the contrast with the first colon clear and reads naturally in English while
    preserving the nominal force of the Hebrew.
