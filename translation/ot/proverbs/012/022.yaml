id: PRO.12.22
reference: Proverbs 12:22
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה שִׂפְתֵי שָׁ֑קֶר וְ/עֹשֵׂ֖י אֱמוּנָ֣ה רְצוֹנֽ/וֹ־׃
translation:
  text: Lying lips are an abomination to Yahweh, but those who act faithfully are his delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who practice faithfulness,' 'those who act truthfully,' or 'those who are trustworthy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a disgust
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable, often in moral/religious contexts. 'An abomination' preserves the strong ethical force and matches common biblical usage without paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שִׂפְתֵי שָׁקֶר
  chosen: lying lips
  alternatives:
  - false lips
  - lips of falsehood
  lexicon: HALOT
  rationale: The construct phrase literally means 'lips of falsehood.' 'Lying lips' is idiomatic modern English that preserves the metaphor and moral sense.
- source_word: וְעֹשֵׂי
  chosen: but those who act
  alternatives:
  - and doers
  - but those who do
  - while those who make
  lexicon: HALOT
  rationale: The participle means 'those doing/making.' In this antithetical proverb, English reads more naturally with an implied contrastive 'but,' and 'those who act' avoids awkward literalism while preserving the participial sense.
- source_word: אֱמוּנָה
  chosen: faithfully
  alternatives:
  - faithfulness
  - truth
  - trustworthiness
  - reliability
  lexicon: HALOT
  rationale: The noun can denote faithfulness, reliability, or trustworthiness. With 'do/act,' an adverbial rendering ('act faithfully') is natural English and captures conduct marked by fidelity and truthfulness, fitting the contrast with lying.
- source_word: רְצוֹנוֹ
  chosen: his delight
  alternatives:
  - his favor
  - his pleasure
  - acceptable to him
  lexicon: HALOT
  rationale: The noun means pleasure, favor, or delight. 'His delight' gives a vivid personal counterpart to 'abomination' and preserves the relational contrast in the proverb.
