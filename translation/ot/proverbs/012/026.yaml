id: PRO.12.26
reference: Proverbs 12:26
source:
  edition: WLC
  text: יָתֵ֣ר מֵ/רֵעֵ֣/הוּ צַדִּ֑יק וְ/דֶ֖רֶךְ רְשָׁעִ֣ים תַּתְעֵֽ/ם׃
translation:
  text: The righteous person searches out his neighbor, but the way of the wicked
    leads them astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The righteous is more excellent than his neighbor.' The Hebrew verb
      יָתֵר here is difficult, and this traditional rendering remains possible.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'his neighbor' could also be rendered 'his friend' or 'his companion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָתֵר
  chosen: searches out
  alternatives:
  - is more excellent than
  - guides
  - spies out
  - carefully considers
  lexicon: HALOT
  rationale: The verb יתר in Hiphil here is notoriously difficult. Traditional renderings
    take it comparatively ('is more excellent than his neighbor'), but the immediate
    proverb contrast with 'the way of the wicked leads them astray' favors an active
    sense of examining or choosing one's associate/path carefully. 'Searches out'
    captures prudent discernment without over-paraphrasing.
- source_word: מֵרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - from his companion
  lexicon: HALOT
  rationale: רֵעַ commonly means 'friend, companion, neighbor.' 'Neighbor' is broad
    and fits wisdom literature's social scope. The prefixed מ is taken with the difficult
    verb construction rather than translated woodenly as 'from' in English.
- source_word: צַדִּיק
  chosen: the righteous person
  alternatives:
  - the righteous man
  - a righteous man
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'The righteous person' preserves
    the generic singular sense in readable modern English without implying only males
    are in view.
- source_word: וְדֶרֶךְ
  chosen: but the way
  alternatives:
  - and the way
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in English because the proverb
    sets the righteous over against the wicked in antithetic parallelism.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard wisdom-literature substantive plural; 'the wicked' is concise
    and idiomatic.
- source_word: תַּתְעֵם
  chosen: leads them astray
  alternatives:
  - causes them to wander
  - deceives them
  - makes them err
  lexicon: HALOT
  rationale: 'From תעה in Hiphil with 3mp suffix: ''causes them to wander/go astray.''
    ''Leads them astray'' is natural English and preserves the causative sense.'
