theological_decisions:
- issue: Gendered singular substantives in wisdom literature
  chosen_reading: the evil man ... the righteous
  alternative_readings:
  - the wicked ... the righteous person
  - an evil person ... a righteous person
  rationale: The Hebrew uses singular masculine forms functioning representatively.
    Per the translation philosophy, gender-accurate renderings are preferred over
    flattening to gender-neutral language unless context requires otherwise. Here
    the proverb presents representative types, so masculine singular is retained where
    natural.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
