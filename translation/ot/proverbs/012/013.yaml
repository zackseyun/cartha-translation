id: PRO.12.13
reference: Proverbs 12:13
source:
  edition: WLC
  text: בְּ/פֶ֣שַׁע שְׂ֭פָתַיִם מוֹקֵ֣שׁ רָ֑ע וַ/יֵּצֵ֖א מִ/צָּרָ֣ה צַדִּֽיק׃
translation:
  text: In the transgression of the lips there is a snare for the evil man, but the
    righteous comes out of trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the transgression of the lips an evil man is snared.' The Hebrew
      is compact, and the relation between 'transgression of the lips' and 'snare'
      may be taken either as location ('in') or means/result ('by').
    reason: alternative_reading
  - marker: b
    text: '''The lips'' is a Hebrew idiom for speech or spoken words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶשַׁע
  chosen: In the transgression of
  alternatives:
  - By the transgression of
  - Through the transgression of
  lexicon: HALOT
  rationale: The preposition ב plus פשע can indicate sphere or means. 'In the transgression
    of' preserves the Hebrew compactness and the proverb's sense that sinful speech
    is the realm/source in which the snare is found, without over-interpreting causation.
- source_word: שְׂפָתַיִם
  chosen: the lips
  alternatives:
  - lips
  - speech
  lexicon: HALOT
  rationale: Literally 'lips.' Retaining the body-part metaphor matches Hebrew style
    and keeps the focus on spoken words. 'Speech' is interpretive and less vivid.
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - trap
  lexicon: HALOT
  rationale: '''Snare'' is a standard rendering for מוקש and fits wisdom-literature
    imagery of entrapment. ''Trap'' is possible but slightly flatter.'
- source_word: רָע
  chosen: the evil man
  alternatives:
  - an evil man
  - the wicked
  lexicon: HALOT
  rationale: As an adjectival substantive, רָע refers to an evil/wicked person. 'The
    evil man' preserves the singular masculine form in line with the gender-accurate
    policy. 'The wicked' is idiomatic but less formally aligned to the singular.
- source_word: וַיֵּצֵא
  chosen: comes out
  alternatives:
  - escapes
  - goes out
  lexicon: HALOT
  rationale: The verb means 'go out/come out.' 'Comes out' is natural English and
    preserves the concrete image. 'Escapes' captures the sense but interprets the
    metaphor more strongly.
- source_word: מִצָּרָה
  chosen: of trouble
  alternatives:
  - from distress
  - from trouble
  lexicon: HALOT
  rationale: צָרָה denotes trouble, distress, or adversity. 'Of trouble' completes
    the idiom 'comes out of trouble' in natural English while staying close to the
    Hebrew.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous man
  - a righteous man
  lexicon: HALOT
  rationale: Used substantivally for a righteous person. 'The righteous' is idiomatic
    in English wisdom literature and contrasts well with 'the evil man.'
