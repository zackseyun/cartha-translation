id: PRO.12.16
reference: Proverbs 12:16
source:
  edition: WLC
  text: אֱוִ֗יל בַּ֭/יּוֹם יִוָּדַ֣ע כַּעְס֑/וֹ וְ/כֹסֶ֖ה קָל֣וֹן עָרֽוּם׃
translation:
  text: A fool’s anger is known at once, but a prudent man covers shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A fool’s anger is known the same day'; Hebrew literally, 'in the day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a prudent man conceals an insult/disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - a foolish man
  lexicon: HALOT
  rationale: The noun denotes a morally and practically foolish person in wisdom literature,
    not merely someone lacking intelligence. 'A fool' is the standard concise English
    equivalent and fits the proverb's character contrast.
- source_word: בַּיּוֹם
  chosen: at once
  alternatives:
  - in a day
  - the same day
  - today
  lexicon: HALOT
  rationale: 'Literally ''in/on the day,'' but in this proverbial context the phrase
    idiomatically conveys immediacy: the fool''s anger becomes evident right away.
    ''At once'' communicates the sense in natural English without wooden literalism.'
- source_word: יִוָּדַע
  chosen: is known
  alternatives:
  - becomes known
  - is made known
  lexicon: HALOT
  rationale: 'Nifal imperfect of ידע here is passive/reflexive in sense: the anger
    becomes evident or known. ''Is known'' is concise and preserves the passive idea.'
- source_word: כַּעְסוֹ
  chosen: anger
  alternatives:
  - vexation
  - provocation
  - wrath
  lexicon: HALOT
  rationale: The noun refers to anger or vexation. 'Anger' is the clearest modern
    English rendering and suits the contrast with the prudent person's restraint.
- source_word: וְכֹסֶה
  chosen: but ... covers
  alternatives:
  - but conceals
  - but overlooks
  lexicon: HALOT
  rationale: The participle from כסה means 'cover, conceal.' 'Covers' preserves the
    metaphor and allows the object 'shame' to remain direct. The conjunction is adversative
    in context, hence 'but.'
- source_word: קָלוֹן
  chosen: shame
  alternatives:
  - disgrace
  - insult
  - dishonor
  lexicon: HALOT
  rationale: The noun can denote disgrace or dishonor, and in context likely refers
    to an affront or shameful matter that could provoke public reaction. 'Shame' is
    compact and preserves the semantic breadth.
- source_word: עָרוּם
  chosen: a prudent man
  alternatives:
  - the prudent
  - a shrewd man
  - a sensible man
  lexicon: HALOT
  rationale: In Proverbs this term is usually positive, referring to prudence or shrewd
    discernment rather than deceit. Because the Hebrew adjective is grammatically
    masculine singular and representative, 'a prudent man' follows the project's gender-accurate
    policy.
