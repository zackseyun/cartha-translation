id: PRO.12.25
reference: Proverbs 12:25
source:
  edition: WLC
  text: דְּאָגָ֣ה בְ/לֶב אִ֣ישׁ יַשְׁחֶ֑/נָּה וְ/דָבָ֖ר ט֣וֹב יְשַׂמְּחֶֽ/נָּה־׃
translation:
  text: Anxiety in a man's heart weighs it down, but a good word makes it glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bows it down.' The Hebrew verb pictures being brought low or made to
      stoop.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a man's heart.' The singular 'man' is representative.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּאָגָה
  chosen: anxiety
  alternatives:
  - worry
  - care
  - heaviness
  lexicon: HALOT
  rationale: The noun denotes anxious care or worry. 'Anxiety' is natural modern English
    and preserves the inward emotional sense better than the broader 'care' or the
    interpretive 'heaviness'.
- source_word: בְלֶב אִישׁ
  chosen: in a man's heart
  alternatives:
  - in the heart of a man
  - in a person's heart
  lexicon: HALOT
  rationale: The Hebrew is literally 'in the heart of a man.' Following the gender-accurate
    guideline, 'man's' is retained because אִישׁ is grammatically masculine and functions
    here as a representative singular. 'Heart' in Hebrew idiom refers to the inner
    person, not merely emotion.
- source_word: יַשְׁחֶנָּה
  chosen: weighs it down
  alternatives:
  - bows it down
  - depresses it
  - makes it stoop
  lexicon: HALOT
  rationale: The Hiphil of שׁחח/שׁחה here conveys causing something to sink low or
    bow down. With the feminine suffix referring back to 'heart' or to the state of
    anxiety's effect on the inner person, 'weighs it down' communicates the metaphor
    clearly in modern English while preserving the image of being pressed low.
- source_word: וְדָבָר טוֹב
  chosen: but a good word
  alternatives:
  - and a good word
  - but a kind word
  - but a good message
  lexicon: HALOT
  rationale: 'דָבָר is broadly ''word, matter, message.'' In this proverb''s antithetical
    parallelism, ''a good word'' is the most direct rendering and leaves the phrase
    appropriately broad: encouraging, favorable, or timely speech. ''But'' captures
    the adversative force of the parallelism better than a wooden ''and.'''
- source_word: יְשַׂמְּחֶנָּה
  chosen: makes it glad
  alternatives:
  - cheers it up
  - gladdens it
  - makes it rejoice
  lexicon: HALOT
  rationale: The Piel of שׂמח means to make glad or rejoice. 'Makes it glad' is clear,
    idiomatic, and preserves the causative sense. The feminine suffix is represented
    by 'it,' referring back to the heart/inner person.
