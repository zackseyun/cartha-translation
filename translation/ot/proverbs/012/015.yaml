id: PRO.12.15
reference: Proverbs 12:15
source:
  edition: WLC
  text: דֶּ֣רֶךְ אֱ֭וִיל יָשָׁ֣ר בְּ/עֵינָ֑י/ו וְ/שֹׁמֵ֖עַ לְ/עֵצָ֣ה חָכָֽם׃
translation:
  text: The way of a fool is right in his own eyes, but he who listens to counsel
    is wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The way of a fool seems right to him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in his own eyes,' an idiom for one's own judgment or self-assessment.
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: '''Way'' is the standard wisdom-literature metaphor for one''s course
    of life or manner of conduct. It preserves the figurative sense without over-interpreting.'
- source_word: אֱוִיל
  chosen: fool
  alternatives:
  - stupid person
  - senseless person
  lexicon: HALOT
  rationale: In Proverbs this term denotes a morally and intellectually deficient
    person in wisdom categories. 'Fool' is the established and accurate English equivalent.
- source_word: יָשָׁר
  chosen: right
  alternatives:
  - straight
  - upright
  lexicon: HALOT
  rationale: Here the sense is evaluative—'seems right/correct'—rather than moral
    uprightness in an absolute sense. 'Right' fits the idiom with 'in his own eyes.'
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - to himself
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for one's own assessment or self-judgment.
    Adding 'own' makes the idiomatic force natural in English and reflects the possessive
    suffix.
- source_word: וְשֹׁמֵעַ
  chosen: but he who listens
  alternatives:
  - and the one hearing
  - but the one who hears
  lexicon: HALOT
  rationale: The conjunction marks contrast in this proverb, so 'but' brings out the
    antithesis. The participle is rendered as a generic person characterized by listening.
- source_word: לְעֵצָה
  chosen: to counsel
  alternatives:
  - advice
  - guidance
  lexicon: HALOT
  rationale: '''Counsel'' best matches wisdom-language register and can denote considered
    advice rather than casual suggestion. ''Listens to counsel'' is idiomatic English.'
- source_word: חָכָם
  chosen: is wise
  alternatives:
  - is a wise man
  - is skillful
  lexicon: HALOT
  rationale: 'Predicate use is most natural here: the listener proves wise. Rendering
    it as ''is wise'' avoids unnecessary nominal stiffness while preserving the contrast
    with ''fool''.'
