theological_decisions:
- issue: Gendered singular forms in a generic proverb
  chosen_reading: 'Use masculine singular in English: ''his own eyes'' and ''he who
    listens'''
  alternative_readings:
  - their own eyes ... whoever listens is wise
  - one's own eyes ... the one who listens is wise
  rationale: The Hebrew uses grammatically masculine singular forms generically. Per
    doctrine, gender-accurate rendering is preferred over gender-neutral when it matches
    the source's representative intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
