id: PRO.12.6
reference: Proverbs 12:6
source:
  edition: WLC
  text: דִּבְרֵ֣י רְשָׁעִ֣ים אֱרָב דָּ֑ם וּ/פִ֥י יְ֝שָׁרִ֗ים יַצִּילֵֽ/ם־׃
translation:
  text: The words of the wicked are an ambush for blood, but the mouth of the upright
    delivers them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lie in wait for blood.' The Hebrew expression pictures the wicked's
      words as a deadly ambush.
    reason: lexical_alternative
  - marker: b
    text: '''Them'' refers generally to those threatened by such violence; some understand
      the sense more reflexively, ''the mouth of the upright delivers them themselves''
      or simply ''delivers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the speech of
  - the sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here refers to spoken words/speech. 'Words
    of' is the most natural and sufficiently formal rendering in this proverb.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Adjectival substantive denoting morally evil persons. 'The wicked' is
    concise, idiomatic, and preserves the moral contrast with 'the upright.'
- source_word: אֱרָב
  chosen: are an ambush for
  alternatives:
  - lie in wait for
  - are a lurking in wait for
  lexicon: HALOT
  rationale: Though formally a noun/verb form with the sense of ambush/lying in wait,
    in context it predicates what the wicked's words amount to. 'Are an ambush for'
    preserves the metaphor more formally than smoothing to a verbal paraphrase.
- source_word: דָּם
  chosen: blood
  alternatives:
  - bloodshed
  - someone's blood
  - life
  lexicon: HALOT
  rationale: Hebrew 'blood' often stands metonymically for violent death or bloodshed.
    The proverb's terseness is best preserved by retaining 'blood' in the main text
    rather than explicating the metonym.
- source_word: וּפִי
  chosen: but the mouth of
  alternatives:
  - but the speech of
  - but the words of
  lexicon: HALOT
  rationale: The conjunction marks contrast. 'Mouth' is retained rather than replaced
    with 'speech' to preserve the Hebrew imagery and parallelism with 'words' in the
    first colon.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: Substantive adjective for morally straight/upright persons. 'The upright'
    is the standard and contextually apt ethical term in Proverbs.
- source_word: יַצִּילֵם
  chosen: delivers them
  alternatives:
  - rescues them
  - delivers themselves
  lexicon: HALOT
  rationale: Hiphil of נצל means 'deliver, rescue.' The 3mp suffix most naturally
    refers to people endangered by the wicked's ambush-like words. 'Delivers them'
    keeps the Hebrew object explicit while allowing the proverb's concise ambiguity
    about the exact referent. A reflexive sense ('deliver themselves') is possible
    in interpretation but is less directly represented by the morphology.
