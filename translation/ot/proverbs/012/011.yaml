id: PRO.12.11
reference: Proverbs 12:11
source:
  edition: WLC
  text: עֹבֵ֣ד אַ֭דְמָת/וֹ יִֽשְׂבַּֽע לָ֑חֶם וּ/מְרַדֵּ֖ף רֵיקִ֣ים חֲסַר לֵֽב־־׃
translation:
  text: Whoever works his land will have plenty of bread, but he who pursues empty
    things lacks sense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursues worthless people'; the Hebrew 'empty ones' can be understood
      personally or impersonally.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵד
  chosen: works
  alternatives:
  - cultivates
  - serves
  lexicon: HALOT
  rationale: The participle from עבד here refers to laboring on agricultural land.
    'Works' is natural English and broad enough to include cultivation without sounding
    overly technical; 'serves' would be misleading in this context.
- source_word: אַדְמָתוֹ
  chosen: his land
  alternatives:
  - his ground
  - his soil
  lexicon: HALOT
  rationale: אַדָמָה denotes ground/land/soil. In a wisdom saying about agricultural
    diligence, 'his land' is the most idiomatic English rendering.
- source_word: יִשְׂבַּע לָחֶם
  chosen: will have plenty of bread
  alternatives:
  - will be satisfied with bread
  - will have his fill of bread
  lexicon: HALOT
  rationale: The idiom literally means 'will be satisfied with bread,' expressing
    adequate or abundant provision from labor. 'Will have plenty of bread' communicates
    the proverb's sense in readable modern English while preserving the concrete image
    of bread.
- source_word: וּמְרַדֵּף
  chosen: but he who pursues
  alternatives:
  - but whoever chases
  - and one pursuing
  lexicon: HALOT
  rationale: The conjunction marks contrast in the proverb's parallelism, so 'but'
    is preferable to a simple 'and.' 'Pursues' fits the moral tone of chasing after
    a course of life.
- source_word: רֵיקִים
  chosen: empty things
  alternatives:
  - vain things
  - worthless things
  - empty people
  lexicon: HALOT
  rationale: רֵיקִים literally means 'empty ones' and can denote what is empty, vain,
    or worthless. In context the object of pursuit is likely futile or worthless pursuits
    rather than persons, so 'empty things' best captures the proverb's contrast with
    productive labor. The personal sense is preserved in a footnote.
- source_word: חֲסַר לֵב
  chosen: lacks sense
  alternatives:
  - is lacking heart
  - lacks understanding
  - is senseless
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'lacking heart,' where 'heart' refers
    to understanding or judgment. 'Lacks sense' is concise, idiomatic modern English
    that preserves the wisdom-literature meaning.
