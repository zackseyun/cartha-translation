id: PRO.12.18
reference: Proverbs 12:18
source:
  edition: WLC
  text: יֵ֣שׁ בּ֭וֹטֶה כְּ/מַדְקְר֣וֹת חָ֑רֶב וּ/לְשׁ֖וֹן חֲכָמִ֣ים מַרְפֵּֽא׃
translation:
  text: There is one who speaks rashly like the thrusts of a sword, but the tongue
    of the wise brings healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like sword thrusts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tongue of the wise [is] healing/remedy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is one who
  alternatives:
  - There is one
  - One may be found who
  lexicon: HALOT
  rationale: Introduces the existence of a type of person rather than naming an individual.
    English idiom requires supplying 'one who' to connect naturally with the following
    participle.
- source_word: בּוֹטֶה
  chosen: speaks rashly
  alternatives:
  - babbles
  - blurts out
  - speaks thoughtlessly
  lexicon: HALOT
  rationale: The participle denotes reckless, unrestrained speech. 'Speaks rashly'
    captures the verbal force and moral nuance better than the less natural 'one babbling'
    or the narrower 'blurts out.'
- source_word: כְּמַדְקְרוֹת חָרֶב
  chosen: like the thrusts of a sword
  alternatives:
  - like sword thrusts
  - like the piercings of a sword
  - like stabbings with a sword
  lexicon: HALOT
  rationale: The comparison is to repeated piercing blows. 'Thrusts of a sword' is
    vivid, natural English and preserves the plural noun's sense of repeated wounding.
- source_word: וּלְשׁוֹן
  chosen: but the tongue
  alternatives:
  - but the speech
  - but the words
  lexicon: HALOT
  rationale: '''Tongue'' preserves the Hebrew metaphor for speech and sets up the
    proverb''s contrast with the previous speaker.'
- source_word: חֲכָמִים
  chosen: of the wise
  alternatives:
  - of wise people
  - of wise men
  lexicon: HALOT
  rationale: The plural refers to wise persons generically. 'The wise' is concise,
    idiomatic, and preserves the representative force without unnecessary narrowing.
- source_word: מַרְפֵּא
  chosen: brings healing
  alternatives:
  - is healing
  - is health
  - brings remedy
  lexicon: HALOT
  rationale: The noun means healing/remedy. Rendering it verbally in English produces
    a natural proverb line while preserving the sense that wise speech has a restorative
    effect.
