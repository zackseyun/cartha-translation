id: PRO.12.28
reference: Proverbs 12:28
source:
  edition: WLC
  text: בְּ/אֹֽרַח צְדָקָ֥ה חַיִּ֑ים וְ/דֶ֖רֶךְ נְתִיבָ֣ה אַל מָֽוֶת־־׃
translation:
  text: In the path of righteousness is life, and in its pathway there is no death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and its pathway is immortality.' This reflects an alternative understanding
      of the difficult Hebrew in the second line.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/אֹרַח
  chosen: In the path of
  alternatives:
  - On the path of
  - In the way of
  lexicon: HALOT
  rationale: אֹרַח denotes a path, way, or course. 'Path' is natural modern English
    and preserves the metaphor of a moral course of life. The prefixed ב is rendered
    'in' to express location/sphere.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. In this wisdom context describing
    a moral way of life, 'righteousness' best captures the ethical sense while aligning
    with the project's default handling of this semantic field.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - life itself
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as 'life.' Singular English is the most natural and accurate rendering here.
- source_word: וְ/דֶרֶךְ
  chosen: and in its pathway
  alternatives:
  - and the way of
  - and in the road of
  lexicon: HALOT
  rationale: דֶרֶךְ overlaps semantically with אֹרַח ('way/path'). Rendering it with
    a slight variation avoids awkward repetition while preserving the parallelism.
    The conjunction ו is rendered 'and.' The preposition 'in' is supplied in English
    to match the parallel sense of the first colon.
- source_word: נְתִיבָה
  chosen: pathway
  alternatives:
  - path
  - track
  lexicon: HALOT
  rationale: נְתִיבָה denotes a path or track. Here it stands in construct-like relation
    after דֶרֶךְ in a compressed poetic expression. 'Its pathway' makes good sense
    of the Hebrew as referring back to the way/path of righteousness and preserves
    the poetic parallelism.
- source_word: אַל
  chosen: 'no'
  alternatives:
  - not
  - there is not
  lexicon: HALOT
  rationale: 'Although אַל often functions as a prohibitive particle, in this difficult
    poetic line many understand it adverbially/negatively in the sense ''no/not.''
    Rendering ''there is no'' yields a coherent proverbial statement: the way of righteousness
    does not lead to death.'
- source_word: מָוֶת
  chosen: death
  alternatives:
  - deadly end
  lexicon: HALOT
  rationale: The noun plainly means 'death.' The translation keeps the stark antithesis
    with 'life' in the first colon.
