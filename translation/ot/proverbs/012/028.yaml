theological_decisions:
- issue: Interpretation of the difficult second colon ודרך נתיבה אל־מות
  chosen_reading: 'The second colon means that the pathway belonging to righteousness
    does not lead to death: ''and in its pathway there is no death.'''
  alternative_readings:
  - '''and the way of her path is immortality'' (taking אל as לו/reading a different
    sense)'
  - '''and the path of its way is to death'' (if the negative is construed differently,
    though this is less likely in context)'
  rationale: The Masoretic wording is compressed and has generated multiple renderings.
    In the immediate context and broader proverb structure, the verse contrasts righteousness
    with death and most naturally affirms life as the outcome of righteousness. The
    chosen rendering preserves that antithesis without importing speculative emendation
    into the main text. An alternative traditional rendering involving 'immortality'
    is preserved in a footnote because it reflects an ancient interpretive trajectory.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
