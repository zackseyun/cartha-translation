id: PRO.12.5
reference: Proverbs 12:5
source:
  edition: WLC
  text: מַחְשְׁב֣וֹת צַדִּיקִ֣ים מִשְׁפָּ֑ט תַּחְבֻּל֖וֹת רְשָׁעִ֣ים מִרְמָֽה׃
translation:
  text: The thoughts of the righteous are just; the counsels of the wicked are deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans' for 'thoughts' and 'schemes' or 'strategies' for 'counsels.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'justice' or 'judgment'; rendered 'just' in English to express the
      predicate naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְשְׁבוֹת
  chosen: thoughts
  alternatives:
  - plans
  lexicon: HALOT
  rationale: The noun denotes thoughts, plans, or intentions. 'Thoughts' fits the
    antithetic parallel with the inner moral quality of the righteous, while remaining
    natural English.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A substantival adjective referring to righteous persons. 'The righteous'
    is concise, idiomatic, and preserves the representative plural.
- source_word: מִשְׁפָּט
  chosen: just
  alternatives:
  - justice
  - judgment
  - right
  lexicon: HALOT
  rationale: Here the predicate summarizes the character of the righteous persons'
    thoughts. Rendering adjectivally as 'just' produces clear English and captures
    the sense of what is right or in accord with justice.
- source_word: תַּחְבֻּלוֹת
  chosen: counsels
  alternatives:
  - plans
  - schemes
  - strategies
  lexicon: HALOT
  rationale: The term can denote guidance, direction, or strategic planning. In this
    antithetical proverb, 'counsels' works well for deliberate designs and pairs naturally
    with 'thoughts' without over-intensifying to overtly sinister 'schemes' in the
    lexical choice itself.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A substantival adjective for wicked persons. 'The wicked' is the standard
    concise rendering and matches the moral contrast with 'the righteous.'
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - deception
  - treachery
  lexicon: HALOT
  rationale: The noun denotes deceit or fraud. 'Deceit' is direct, idiomatic, and
    preserves the moral quality of the wicked persons' counsels.
