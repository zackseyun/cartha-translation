id: PRO.12.27
reference: Proverbs 12:27
source:
  edition: WLC
  text: לֹא יַחֲרֹ֣ךְ רְמִיָּ֣ה צֵיד֑/וֹ וְ/הוֹן אָדָ֖ם יָקָ֣ר חָרֽוּץ־־׃
translation:
  text: A lazy man does not roast his game, but diligence is a man’s precious wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A lazy man does not catch his prey,' if the verb is taken more broadly
      as obtaining or preparing game rather than specifically roasting it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man'; the singular masculine here is representative, referring
      to a person in general through proverbial male language.
    reason: cultural_note
lexical_decisions:
- source_word: יַחֲרֹךְ
  chosen: roast
  alternatives:
  - catch
  - prepare
  lexicon: HALOT
  rationale: The verb חרך commonly refers to scorching or roasting by fire. In context
    with 'his game,' 'roast' best fits the image of failing to make use of what one
    has obtained. Some interpreters broaden it to 'prepare' or, by conjectural/contextual
    extension, 'catch,' but the more concrete culinary sense is preferable.
- source_word: רְמִיָּה
  chosen: lazy man
  alternatives:
  - slothful person
  - deceit
  lexicon: HALOT
  rationale: In Proverbs this noun often denotes slackness, laziness, or a negligent
    disposition rather than moral deceit in the narrow sense. Rendering it as 'lazy
    man' captures the proverbial contrast with חרוץ ('diligent'). 'Man' is retained
    as gender-accurate proverbial usage.
- source_word: צֵידוֹ
  chosen: his game
  alternatives:
  - his prey
  - what he hunted
  lexicon: HALOT
  rationale: The noun denotes hunted game/prey. 'His game' is idiomatic modern English
    and fits the roasting image naturally.
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - treasure
  lexicon: HALOT
  rationale: הון commonly means wealth or riches. 'Wealth' is clear and natural in
    proverbial style.
- source_word: אָדָם
  chosen: a man’s
  alternatives:
  - human
  - humankind’s
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, אדם here is rendered
    'man' because the proverb uses representative masculine language in a wisdom context.
    The sense is generic, but the Hebrew form is singular masculine.
- source_word: יָקָר
  chosen: precious
  alternatives:
  - valuable
  - costly
  lexicon: HALOT
  rationale: The adjective conveys value or preciousness. 'Precious' preserves the
    evaluative force and works well in the aphoristic contrast.
- source_word: חָרוּץ
  chosen: diligence
  alternatives:
  - the diligent man
  - industry
  lexicon: HALOT
  rationale: The adjective/noun can denote a diligent person or diligence as a quality.
    Because the Hebrew clause is compressed and somewhat elliptical, rendering it
    abstractly as 'diligence' yields smooth English while preserving the contrast
    with laziness. The sense is that diligence itself constitutes precious wealth.
