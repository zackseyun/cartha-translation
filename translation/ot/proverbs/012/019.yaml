id: PRO.12.19
reference: Proverbs 12:19
source:
  edition: WLC
  text: שְֽׂפַת אֱ֭מֶת תִּכּ֣וֹן לָ/עַ֑ד וְ/עַד אַ֝רְגִּ֗יעָה לְשׁ֣וֹן שָֽׁקֶר־־׃
translation:
  text: A truthful lip is established forever, but a lying tongue lasts only a moment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The lip of truth is established forever, but the tongue
      of falsehood is only for a moment.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression in the second line is difficult; the sense is that
      false speech is short-lived in contrast to truth's permanence.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂפַת
  chosen: lip
  alternatives:
  - speech
  - lips
  lexicon: HALOT
  rationale: Singular construct literally means 'lip of'; in English, 'a truthful
    lip' preserves the Hebrew singular idiom better than plural 'lips,' while still
    functioning proverbially for speech.
- source_word: אֱמֶת
  chosen: truthful
  alternatives:
  - truth
  - 'true'
  lexicon: HALOT
  rationale: Though literally 'truth,' the construct phrase שְׂפַת אֱמֶת is idiomatically
    rendered adjectivally in English. 'Truthful lip' is natural and preserves the
    moral quality of speech.
- source_word: תִּכּוֹן
  chosen: is established
  alternatives:
  - will be established
  - endures
  - stands firm
  lexicon: HALOT
  rationale: Nifal of כון conveys being established, made firm, or enduring. Present
    tense in English suits proverbial gnomic force better than a simple future, while
    retaining the idea of permanence rather than merely survival.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for perpetuity
  - continually
  lexicon: HALOT
  rationale: This adverbial phrase denotes lasting permanence. 'Forever' is idiomatic,
    clear modern English and matches the proverb's contrast with momentary falsehood.
- source_word: וְעַד
  chosen: but
  alternatives:
  - and until
  - while only
  lexicon: HALOT
  rationale: Though formally 'and/until,' in this antithetical proverb it introduces
    the contrasting second colon. Rendering the clause contrastively in English best
    reflects the poetic sense.
- source_word: אַרְגִּיעָה
  chosen: lasts only a moment
  alternatives:
  - for a moment
  - until I wink
  - until I calm/rest
  lexicon: HALOT
  rationale: 'The form is difficult, but in context the sense is temporal brevity:
    the lying tongue endures only briefly. Traditional and contextually strong renderings
    take the phrase as ''for a moment.'' ''Lasts only a moment'' makes the implied
    verb explicit in natural English and preserves the contrast with ''forever.'''
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: '''Tongue'' is the standard concrete metaphor for speech in wisdom literature
    and pairs naturally with ''lip'' in the first colon.'
- source_word: שָׁקֶר
  chosen: lying
  alternatives:
  - falsehood
  - deceit
  lexicon: HALOT
  rationale: As an attributive genitive/qualifier with 'tongue,' 'lying' is the most
    natural English equivalent here. 'Falsehood' is possible but less idiomatic in
    this collocation.
