id: PRO.12.14
reference: Proverbs 12:14
source:
  edition: WLC
  text: מִ/פְּרִ֣י פִי אִ֭ישׁ יִשְׂבַּע ט֑וֹב וּ/גְמ֥וּל יְדֵי אָ֝דָ֗ם ישוב לֽ/וֹ־־־׃
translation:
  text: From the fruit of a man's mouth he is satisfied with good, and the work of
    a man's hands returns to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a man' in both lines uses singular masculine terms generically;
      the proverb states a general truth about people.
    reason: cultural_note
  - marker: b
    text: Or 'the recompense of a man's hands returns to him.' The Hebrew term can
      emphasize what one's actions earn or bring back.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּרִי
  chosen: From the fruit of
  alternatives:
  - By the fruit of
  - With the fruit of
  lexicon: HALOT
  rationale: 'The preposition מִן here marks source or means: what follows comes from
    or is produced by the ''fruit'' of speech. ''From the fruit of'' is idiomatic
    and preserves the metaphor.'
- source_word: פִי אִישׁ
  chosen: a man's mouth
  alternatives:
  - the mouth of a man
  - one's mouth
  lexicon: HALOT
  rationale: Literally 'mouth of a man.' The singular generic אִישׁ is best kept as
    'a man' per the gender-accurate policy, since the proverb speaks representatively
    rather than using an explicitly collective term.
- source_word: יִשְׂבַּע
  chosen: he is satisfied
  alternatives:
  - he will be satisfied
  - he is filled
  lexicon: HALOT
  rationale: The verb שׂבע commonly means 'be satisfied, be filled.' In proverbial
    style the imperfect expresses a general truth; present-tense English communicates
    this naturally. 'Satisfied' fits the collocation with טוֹב.
- source_word: טוֹב
  chosen: with good
  alternatives:
  - with what is good
  - with prosperity
  lexicon: HALOT
  rationale: 'טוֹב is broad: good, goodness, benefit. ''With good'' preserves the
    concise Hebrew and allows both moral and beneficial nuance without over-specifying
    material prosperity.'
- source_word: וּגְמוּל
  chosen: the work
  alternatives:
  - the recompense
  - the reward
  - the dealing
  lexicon: HALOT
  rationale: גְמוּל often denotes recompense or what is dealt out/produced. In this
    parallelism with 'fruit of a man's mouth' and 'hands,' the sense is what a person's
    hands produce or bring about. 'The work' reads naturally in English while preserving
    the cause-and-effect idea. The more formal 'recompense' is possible but sounds
    less natural here.
- source_word: יְדֵי אָדָם
  chosen: a man's hands
  alternatives:
  - human hands
  - the hands of a man
  lexicon: HALOT
  rationale: Literally 'hands of a man/human.' Because אָדָם here is generic, either
    'human' or 'man' is possible. I chose 'a man's hands' to mirror the first colon's
    singular generic wording and preserve the proverb's symmetry. Inclusivity can
    be noted in a footnote.
- source_word: יָשׁוּב לוֹ
  chosen: returns to him
  alternatives:
  - will return to him
  - comes back to him
  lexicon: HALOT
  rationale: שׁוּב means 'return, turn back.' In context it expresses the principle
    that what one does comes back upon oneself. Present tense suits proverbial generalization;
    'returns to him' is concise and idiomatic.
