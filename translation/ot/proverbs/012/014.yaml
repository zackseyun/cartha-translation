theological_decisions:
- issue: Generic masculine nouns אִישׁ and אָדָם in wisdom literature
  chosen_reading: Rendered as singular generic 'a man' in both cola
  alternative_readings:
  - a person
  - one
  - human
  rationale: The Hebrew uses grammatically masculine singular terms representatively.
    Per the doctrine's gender-accurate policy, the translation preserves this with
    'a man' rather than neutralizing to 'person,' while the proverb's applicability
    to humanity generally can be clarified in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
