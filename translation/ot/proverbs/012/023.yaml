id: PRO.12.23
reference: Proverbs 12:23
source:
  edition: WLC
  text: אָדָ֣ם עָ֭רוּם כֹּ֣סֶה דָּ֑עַת וְ/לֵ֥ב כְּ֝סִילִ֗ים יִקְרָ֥א אִוֶּֽלֶת׃
translation:
  text: A prudent man conceals knowledge, but the heart of fools proclaims folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A shrewd man covers knowledge.' The Hebrew adjective can carry the sense
      'shrewd' as well as 'prudent,' and the verb literally means 'covers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the heart of fools calls out folly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: The singular noun here refers to an individual in a wisdom saying, not
    humanity in general. Per the project's gender-accurate policy, 'man' fits the
    representative masculine singular better than the more neutral 'person'.
- source_word: עָרוּם
  chosen: prudent
  alternatives:
  - shrewd
  - crafty
  lexicon: HALOT
  rationale: In Proverbs this adjective often has a positive wisdom sense of being
    sensible or prudent, though in some contexts it can mean 'shrewd' or even 'crafty.'
    Here the contrast with fools favors the positive moral-intellectual sense 'prudent'.
- source_word: כֹּסֶה
  chosen: conceals
  alternatives:
  - covers
  - hides
  lexicon: HALOT
  rationale: The participle denotes covering or concealing. 'Conceals' communicates
    restrained withholding of knowledge in context better than the more physical 'covers'
    and is less potentially misleading than 'hides'.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: A standard wisdom term for knowledge. 'Knowledge' is the most direct
    rendering and preserves the contrast with 'folly' in the second colon.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including thought and
    disposition. Retaining 'heart' preserves the Hebrew anthropological idiom and
    the proverb's vivid contrast.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - stupid people
  lexicon: HALOT
  rationale: The established wisdom-category term 'fools' best matches the moral and
    intellectual sense in Proverbs. More colloquial alternatives flatten the category.
- source_word: יִקְרָא
  chosen: proclaims
  alternatives:
  - calls out
  - announces
  - cries out
  lexicon: HALOT
  rationale: The verb literally means 'calls' or 'cries out,' but in this context
    it conveys making something publicly known. 'Proclaims' captures the sense that
    folly is openly broadcast by fools.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: A core Proverbs term for folly/foolishness. 'Folly' is concise, idiomatic,
    and pairs well with 'fools' without sounding cumbersome.
