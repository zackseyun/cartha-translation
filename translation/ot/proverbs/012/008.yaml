id: PRO.12.8
reference: Proverbs 12:8
source:
  edition: WLC
  text: לְֽ/פִי שִׂ֭כְל/וֹ יְהֻלַּל אִ֑ישׁ וְ/נַעֲוֵה לֵ֝֗ב יִהְיֶ֥ה לָ/בֽוּז־־־׃
translation:
  text: A man is praised according to his insight, but one with a twisted heart will
    be despised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A man is praised in proportion to his prudence.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'twisted of heart,' an idiom for a morally crooked inner disposition.
    reason: cultural_note
lexical_decisions:
- source_word: לְפִי
  chosen: according to
  alternatives:
  - by
  - in proportion to
  lexicon: HALOT
  rationale: 'The idiom לְפִי literally means ''according to the mouth of,'' but in
    context functions as a standard-of-measure expression: praise is given in accordance
    with a person''s discernment. ''According to'' is idiomatic and preserves the
    comparative sense.'
- source_word: שִׂכְלוֹ
  chosen: his insight
  alternatives:
  - his prudence
  - his discretion
  - his understanding
  lexicon: HALOT
  rationale: שֵׂכֶל commonly denotes insight, prudence, or good sense. 'Insight' fits
    wisdom-literature usage well and reads naturally in modern English without flattening
    the intellectual-moral nuance.
- source_word: יְהֻלַּל
  chosen: is praised
  alternatives:
  - will be praised
  - is commended
  lexicon: HALOT
  rationale: The Pual form expresses being praised/commended. English present passive
    works well in proverbial style, conveying a general truth rather than a strictly
    future event.
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - A person
  - A human being
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in a proverb. Per the translation philosophy's gender-accurate principle, 'A man'
    best matches the source form and representative force.
- source_word: נַעֲוֵה
  chosen: twisted
  alternatives:
  - perverse
  - crooked
  - distorted
  lexicon: HALOT
  rationale: The participial/adjectival form conveys moral crookedness or distortion.
    'Twisted' is clear modern English and preserves the metaphor of deviation from
    what is straight. 'Perverse' is possible but sounds more archaic or specialized.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology, לֵב includes thought and will as well as emotion.
    'Heart' is the standard rendering and preserves the biblical idiom; interpretive
    expansions like 'mind' would narrow the sense.
- source_word: יִהְיֶה לָבוּז
  chosen: will be despised
  alternatives:
  - will be for contempt
  - will be held in contempt
  lexicon: HALOT
  rationale: The construction 'be/become to contempt' means to become an object of
    scorn. 'Will be despised' is concise, idiomatic English that captures the resultative
    force.
