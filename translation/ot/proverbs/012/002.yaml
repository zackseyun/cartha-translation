id: PRO.12.2
reference: Proverbs 12:2
source:
  edition: WLC
  text: ט֗וֹב יָפִ֣יק רָ֭צוֹן מֵ/יְהוָ֑ה וְ/אִ֖ישׁ מְזִמּ֣וֹת יַרְשִֽׁיעַ׃
translation:
  text: A good man obtains favor from Yahweh, but a man of schemes he condemns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secures goodwill from the LORD.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''a man of schemes''; the phrase likely carries a negative sense here: one characterized by crafty or wicked plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - upright
  - kind
  lexicon: HALOT
  rationale: Adjectival substantive describing the character of the person. 'Good' is the broadest and most natural rendering in wisdom literature, preserving moral quality without narrowing it to a specific virtue.
- source_word: יָפִיק
  chosen: obtains
  alternatives:
  - brings forth
  - draws out
  - secures
  lexicon: HALOT
  rationale: In context with 'favor from the LORD,' the Hiphil conveys causing favor to come forth for oneself, idiomatically 'obtains' or 'secures.' 'Obtains' is clear modern English and fits the proverb's concise style.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  lexicon: HALOT
  rationale: Here the noun denotes divine approval or goodwill. 'Favor' is the standard concise English equivalent and fits the collocation with 'from the LORD.'
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'The preposition marks source: the favor comes from YHWH. Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions representatively in a wisdom saying. Per doctrine, gender-accurate language is preferred over flattening to a neutral term where the source uses 'man.'
- source_word: מְזִמּוֹת
  chosen: schemes
  alternatives:
  - evil devices
  - plans
  - wicked intentions
  lexicon: HALOT
  rationale: In Proverbs this term can be positive or negative by context, but here the antithesis with 'good' and the following verb of condemnation make the negative sense likely. 'Schemes' captures crafty, morally suspect planning without overexpanding the text.
- source_word: יַרְשִׁיעַ
  chosen: he condemns
  alternatives:
  - he declares guilty
  - he treats as wicked
  lexicon: HALOT
  rationale: Hiphil of רשע commonly means to declare guilty/condemn. The implied subject is the LORD from the first colon, a common Hebrew ellipsis in parallelism. 'He condemns' is concise and idiomatic.
