theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Supplying the subject of יַרְשִׁיעַ in the second colon
  chosen_reading: 'The implied subject is the LORD: ''but a man of schemes he condemns.'''
  alternative_readings:
  - 'Passive-like English: ''but a man of schemes is condemned'''
  - 'Explicit repetition: ''but the LORD condemns a man of schemes'''
  rationale: The Hebrew second colon omits an explicit subject, but the most natural reading carries over the LORD as subject from the first colon. Keeping 'he condemns' preserves the Hebrew terseness while making the clause intelligible in English without adding 'the LORD' explicitly.
