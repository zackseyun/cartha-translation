id: PRO.12.3
reference: Proverbs 12:3
source:
  edition: WLC
  text: לֹא יִכּ֣וֹן אָדָ֣ם בְּ/רֶ֑שַׁע וְ/שֹׁ֥רֶשׁ צַ֝דִּיקִ֗ים בַּל יִמּֽוֹט־־׃
translation:
  text: A man is not established by wickedness, but the root of the righteous will
    not be moved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person is not established by wickedness.' Hebrew 'adam' can mean 'man'
      or, in some contexts, 'human being' more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be shaken' or 'will not totter.' The image is of firm, enduring
      stability.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכּוֹן
  chosen: is established
  alternatives:
  - will be established
  - is made secure
  lexicon: HALOT
  rationale: Niphal of כון conveys being established, made firm, or set securely.
    Present English fits proverbial gnomic sense better than a simple future, while
    preserving the passive/resultative nuance.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here the singular
    generic functions proverbially for a representative human individual, so 'a man'
    preserves the gender-accurate singular form better than the more abstract 'humankind.'
- source_word: בְּרֶשַׁע
  chosen: by wickedness
  alternatives:
  - through wickedness
  - in wickedness
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken instrumentally or by means: wickedness
    is not the means by which a person gains lasting stability. ''By wickedness''
    is concise and natural.'
- source_word: שֹׁרֶשׁ
  chosen: the root
  alternatives:
  - root system
  - rootedness
  lexicon: HALOT
  rationale: The concrete metaphor 'root' should be retained rather than abstracted.
    It evokes stability, life, and permanence in contrast to the instability of wickedness.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic, concise,
    and preserves the class designation.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  - certainly not
  lexicon: HALOT
  rationale: בַּל is a poetic negative, here strengthening the denial. Simple 'not'
    in English preserves the sense without overtranslation.
- source_word: יִמּוֹט
  chosen: will not be moved
  alternatives:
  - will not be shaken
  - will not totter
  lexicon: HALOT
  rationale: מוט commonly denotes being moved, shaken, or tottering. 'Will not be
    moved' preserves the metaphor of firm stability and echoes common biblical diction
    without becoming archaic.
