theological_decisions:
- issue: Generic singular anthropology in proverbial discourse
  chosen_reading: Use 'a man' as a representative singular human figure
  alternative_readings:
  - a person
  - one
  rationale: The proverb speaks generically about human moral stability. Following
    the doctrine's gender-accurate principle and the default handling of אָדָם, 'a
    man' best matches the Hebrew singular while still functioning generically in context.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
