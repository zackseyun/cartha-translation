id: PRO.12.9
reference: Proverbs 12:9
source:
  edition: WLC
  text: ט֣וֹב נִ֭קְלֶה וְ/עֶ֣בֶד ל֑/וֹ מִ֝/מְּתַכַּבֵּ֗ד וַ/חֲסַר לָֽחֶם־׃
translation:
  text: Better is one who is lightly esteemed and has a servant than one who honors
    himself and lacks bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'than one who pretends to be important and has no bread.' The Hebrew
      for 'honors himself' can carry the sense of making oneself appear honorable
      or important.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Good is
  - It is better
  lexicon: HALOT
  rationale: In a comparative proverb, טוֹב functions idiomatically as 'better' rather
    than simply 'good.' Supplying 'is' yields natural English while preserving the
    verbless Hebrew comparison.
- source_word: נִקְלֶה
  chosen: one who is lightly esteemed
  alternatives:
  - despised
  - of low status
  - held in little esteem
  lexicon: HALOT
  rationale: The Niphal participle denotes being treated as insignificant or lightly
    regarded. 'Lightly esteemed' preserves the social-honor nuance without overstating
    it as active hatred ('despised').
- source_word: וְעֶבֶד לוֹ
  chosen: and has a servant
  alternatives:
  - and has a slave
  - yet has a servant of his own
  lexicon: HALOT
  rationale: The phrase literally means 'and a servant/slave to him,' i.e., he has
    a household servant. In this wisdom context the point is modest but real means,
    not the bonded status itself, so 'servant' best fits the proverb's social contrast.
    'Has' is supplied idiomatically.
- source_word: מִמְּתַכַּבֵּד
  chosen: than one who honors himself
  alternatives:
  - than one who pretends to be important
  - than one who glorifies himself
  - than one who makes himself rich/honored
  lexicon: HALOT
  rationale: 'The Hitpael participle of כבד is reflexive: presenting oneself as weighty/honored.
    ''Honors himself'' keeps the reflexive sense and leaves open whether the issue
    is self-exaltation or pretension. Many interpreters understand social pretense;
    that nuance is preserved in a footnote.'
- source_word: וַחֲסַר לָחֶם
  chosen: and lacks bread
  alternatives:
  - but has no bread
  - and is short of food
  - and lacks food
  lexicon: HALOT
  rationale: לֶחֶם often means bread literally or food more broadly. 'Lacks bread'
    is a natural, concrete rendering that preserves the Hebrew image and implies poverty/basic
    want.
