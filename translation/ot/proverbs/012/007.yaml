id: PRO.12.7
reference: Proverbs 12:7
source:
  edition: WLC
  text: הָפ֣וֹךְ רְשָׁעִ֣ים וְ/אֵינָ֑/ם וּ/בֵ֖ית צַדִּיקִ֣ים יַעֲמֹֽד׃
translation:
  text: The wicked are overthrown and are no more, but the house of the righteous
    will stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the household of the righteous will stand.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and they are not.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפוֹךְ
  chosen: are overthrown
  alternatives:
  - when overturned
  - overthrow
  lexicon: HALOT
  rationale: 'The form functions elliptically/predicatively in this proverb. English
    supplies a finite sense for clarity: ''are overthrown.'' This captures the passive/resultative
    force better than a bare infinitive-like ''overthrow'' or a more wooden ''an overturning
    of.'''
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A substantival adjective/plural referring to morally evil persons. 'The
    wicked' is concise, idiomatic, and preserves the proverb's moral category.
- source_word: וְאֵינָם
  chosen: and are no more
  alternatives:
  - and they are not
  - and they vanish
  lexicon: HALOT
  rationale: Literally 'and they are not.' In English proverbial style, 'are no more'
    naturally conveys disappearance/destruction without over-paraphrasing. 'They vanish'
    is too interpretive.
- source_word: וּבֵית
  chosen: but the house
  alternatives:
  - but the household
  - and the house
  lexicon: HALOT
  rationale: '''House'' can denote either a physical house or a household/dynasty.
    In wisdom literature it often carries the broader sense of one''s established
    household. ''House'' is retained in the main text for compactness and metaphorical
    breadth; the adversative sense is brought out with ''but'' to match the contrast.'
- source_word: צַדִּיקִים
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: HALOT
  rationale: The plural adjective is substantival. 'The righteous' is the standard
    and most transparent rendering in wisdom contexts, preserving the ethical category.
- source_word: יַעֲמֹד
  chosen: will stand
  alternatives:
  - will endure
  - will remain standing
  lexicon: HALOT
  rationale: The verb literally means 'stand.' In context it implies stability/endurance
    in contrast to overthrow. 'Will stand' preserves the concrete metaphor while allowing
    the implied endurance to be heard.
