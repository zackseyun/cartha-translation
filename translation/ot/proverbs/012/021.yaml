id: PRO.12.21
reference: Proverbs 12:21
source:
  edition: WLC
  text: לֹא יְאֻנֶּ֣ה לַ/צַּדִּ֣יק כָּל אָ֑וֶן וּ֝/רְשָׁעִ֗ים מָ֣לְאוּ רָֽע־־׃
translation:
  text: No harm will happen to the righteous, but the wicked are filled with trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No misfortune will befall the righteous.' The Hebrew term can denote
      harm, trouble, or calamity.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wicked are full of evil/calamity.' The final word can refer either
      to moral evil or to disastrous trouble, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְאֻנֶּה
  chosen: will happen
  alternatives:
  - will befall
  - will come upon
  - will be caused
  lexicon: HALOT
  rationale: The verb from אנה in this passive/intensive form conveys something happening
    or befalling someone. In English, 'will happen to' is natural and preserves the
    passive sense without over-specifying agency.
- source_word: לַצַּדִּיק
  chosen: to the righteous
  alternatives:
  - to the righteous person
  - to the just
  lexicon: HALOT
  rationale: צַדִּיק is best rendered 'righteous' in wisdom literature, preserving
    the moral category rather than reducing it to merely forensic or civic 'just.'
    Singular in Hebrew can function generically, so English singular collective sense
    is retained.
- source_word: כָּל אָוֶן
  chosen: harm
  alternatives:
  - evil
  - trouble
  - misfortune
  - iniquity
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, disaster, wickedness, or harmful misfortune
    depending on context. Here, with 'befall' language and in contrast to the wicked
    being full of רָע, the sense is adverse harm/misfortune rather than moral guilt.
    'Harm' is concise and idiomatic in English.
- source_word: וּרְשָׁעִים
  chosen: but the wicked
  alternatives:
  - and the wicked
  lexicon: HALOT
  rationale: The conjunction waw here is adversative in sense because the verse contrasts
    the righteous with the wicked. Rendering it as 'but' communicates the proverb's
    antithesis clearly in English.
- source_word: מָלְאוּ
  chosen: are filled
  alternatives:
  - have become full
  - are full
  lexicon: HALOT
  rationale: The perfect verb literally means 'have filled' or 'are full.' In English,
    'are filled' captures the resultant state and works naturally with the following
    predicate.
- source_word: רָע
  chosen: trouble
  alternatives:
  - evil
  - calamity
  - harm
  - misery
  lexicon: HALOT
  rationale: רָע can mean moral evil or experiential adversity. In this context, paired
    with the wicked as recipients of consequence, 'trouble' best expresses the experiential
    result without implying that they are ontologically filled with moral evil alone.
