theological_decisions:
- issue: Interpretation of the proverb's absolute language about the righteous
  chosen_reading: Render the statement straightforwardly as a wisdom generalization
    without softening or systematizing it.
  alternative_readings:
  - No ultimate harm will happen to the righteous
  - No moral evil will attach to the righteous
  rationale: The Hebrew states the proverb tersely and absolutely. The translation
    should preserve that form rather than importing a theological qualifier such as
    'ultimate' or shifting the sense to moral innocence. Wisdom literature often states
    general truths in absolute form.
  doctrine_reference: Preserve theological tension rather than resolve it.
