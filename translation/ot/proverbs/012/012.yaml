id: PRO.12.12
reference: Proverbs 12:12
source:
  edition: WLC
  text: חָמַ֣ד רָ֭שָׁע מְצ֣וֹד רָעִ֑ים וְ/שֹׁ֖רֶשׁ צַדִּיקִ֣ים יִתֵּֽן׃
translation:
  text: A wicked man desires the plunder of evil men, but the root of the righteous
    yields fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wicked man desires the net of evil men.' The Hebrew noun מְצוֹד is
      difficult and may refer to a net, snare, prey, or plunder; the main text adopts
      'plunder' because it best fits the contrast with the fruitful root of the righteous.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the root of the righteous gives.' The translation 'yields fruit'
      makes explicit the likely agricultural sense of the Hebrew idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמַד
  chosen: desires
  alternatives:
  - covets
  - craves
  lexicon: HALOT
  rationale: The verb denotes strong desire. 'Desires' is natural English and does
    not over-specify illicit coveting, though the context of the wicked gives it a
    negative cast. 'Covets' is possible, but 'desires' better preserves the lexical
    breadth.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'A wicked man' fits the proverb's
    generic singular style and follows the project's gender-accurate principle. 'The
    wicked man' is also possible, but the indefinite generic reads more naturally
    in English wisdom literature.
- source_word: מְצוֹד
  chosen: the plunder
  alternatives:
  - the net
  - the stronghold
  - the prey
  - the snare
  lexicon: HALOT
  rationale: 'This noun is difficult and has been understood in several ways. In context,
    the sense of what evil men gain or seize fits the parallel best: the wicked desires
    what evildoers acquire, contrasted with the productive stability of the righteous
    root. ''Net/snare'' is a traditional rendering, but ''plunder'' better captures
    the likely object of desire in this line.'
- source_word: רָעִים
  chosen: of evil men
  alternatives:
  - of evildoers
  - of the wicked
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'Evil men' keeps the parallel with
    singular 'wicked man' and preserves the masculine/generic form of the Hebrew.
- source_word: שֹׁרֶשׁ
  chosen: the root
  alternatives:
  - rootstock
  - source
  lexicon: HALOT
  rationale: The image is botanical and should be preserved. 'Root' is the straightforward
    rendering and prepares for the implied idea of organic productivity in the second
    colon.
- source_word: צַדִּיקִים
  chosen: of the righteous
  alternatives:
  - of righteous men
  - of the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic and
    preserves the class reference without awkwardness.
- source_word: יִתֵּן
  chosen: yields fruit
  alternatives:
  - gives
  - produces
  - endures
  lexicon: HALOT
  rationale: Literally the verb is 'gives.' In English, with 'root' as subject, 'yields
    fruit' makes the implied agricultural sense explicit and idiomatic without departing
    far from the Hebrew image. A bare 'gives' would sound incomplete in English.
