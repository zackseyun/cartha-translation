id: PRO.12.10
reference: Proverbs 12:10
source:
  edition: WLC
  text: יוֹדֵ֣עַ צַ֭דִּיק נֶ֣פֶשׁ בְּהֶמְתּ֑/וֹ וְֽ/רַחֲמֵ֥י רְ֝שָׁעִ֗ים אַכְזָרִֽי׃
translation:
  text: A righteous man knows the life of his animal, but the compassion of the wicked
    is cruel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knows the needs of his animal.' The Hebrew says 'knows the life/soul
      of his animal,' expressing attentive regard for the creature's well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדֵעַ
  chosen: knows
  alternatives:
  - cares for
  - understands
  lexicon: HALOT
  rationale: The participle from ידע denotes knowing/understanding. In this proverb
    the sense includes attentive regard, but 'knows' best preserves the lexical core
    while allowing the ethical implication to arise from context rather than paraphrase.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a righteous person
  lexicon: HALOT
  rationale: צַדִּיק refers to a righteous person. Because the Hebrew form is grammatically
    masculine singular and proverbial, 'a righteous man' preserves the gendered singular
    form in keeping with the project's gender-accurate policy, while functioning generically
    in wisdom literature.
- source_word: נֶפֶשׁ
  chosen: the life
  alternatives:
  - the soul
  - the needs
  - the appetite
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad semantic range including soul, life, self, and animating
    life. Here with an animal it most naturally refers to its life/self, that is,
    its living condition and needs. 'Life' is more literal and less interpretive than
    'needs,' while avoiding the misleading English connotations of 'soul' in this
    context.
- source_word: בְּהֶמְתּוֹ
  chosen: his animal
  alternatives:
  - his beast
  - his livestock
  - his cattle
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast, domestic animal, or livestock. Singular with
    suffix here is well rendered 'his animal,' which is natural modern English and
    broad enough not to restrict the reference to cattle alone.
- source_word: רַחֲמֵי
  chosen: the compassion
  alternatives:
  - the mercies
  - the tender mercies
  - the pity
  lexicon: HALOT
  rationale: From רחם, the plural construct often expresses acts or feelings of compassion/mercy.
    'Compassion' is idiomatic and clear in modern English while preserving the emotional-ethical
    sense.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive in wisdom literature.
    'The wicked' is concise and idiomatic.
- source_word: אַכְזָרִי
  chosen: cruel
  alternatives:
  - merciless
  - harsh
  lexicon: HALOT
  rationale: 'אַכְזָרִי means cruel, pitiless, merciless. ''Cruel'' is the most direct
    and forceful English equivalent and fits the proverb''s irony: even what the wicked
    call compassion is cruelty.'
