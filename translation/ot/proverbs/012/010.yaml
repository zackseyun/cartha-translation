theological_decisions:
- issue: Gendered singular in proverbial subject
  chosen_reading: a righteous man
  alternative_readings:
  - a righteous person
  - the righteous
  rationale: The Hebrew is masculine singular and functions generically in wisdom
    literature. Per translation philosophy, the rendering preserves the source's gendered
    form rather than neutralizing it, while the proverb's application remains general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
