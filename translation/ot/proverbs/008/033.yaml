id: PRO.8.33
reference: Proverbs 8:33
source:
  edition: WLC
  text: שִׁמְע֖וּ מוּסָ֥ר וַ/חֲכָ֗מוּ וְ/אַל תִּפְרָֽעוּ־׃
translation:
  text: Hear instruction and become wise, and do not neglect it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not cast it off' or 'do not let it go.' The Hebrew verb can carry
      the sense of rejecting or neglecting instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  - Obey
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the Hebrew's broad sense
    of attentive listening that can imply obedience without over-specifying it as
    'obey.'
- source_word: מוּסָר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסָר commonly denotes formative discipline/instruction in wisdom literature.
    'Instruction' fits the pedagogical context of Proverbs 8 while remaining readable;
    'discipline' is a viable alternative but can sound narrower or more punitive in
    English.
- source_word: וַחֲכָמוּ
  chosen: and become wise
  alternatives:
  - and be wise
  - that you may become wise
  lexicon: HALOT
  rationale: Imperative plural from חכם. 'Become wise' captures the verbal force of
    acquiring wisdom rather than merely possessing it. The conjunction is rendered
    simply as 'and' in natural English.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - but do not
  lexicon: HALOT
  rationale: Standard negative imperative construction. 'And do not' preserves the
    coordination of the Hebrew clauses.
- source_word: תִּפְרָעוּ
  chosen: neglect it
  alternatives:
  - do not let it go
  - do not cast it off
  - do not refuse
  lexicon: HALOT
  rationale: From פרע in a sense of letting go, casting off restraint, or neglecting.
    In this context, the implied object is the instruction/wisdom just mentioned.
    'Neglect it' communicates the warning idiomatically in English while preserving
    the sense of failing to hold fast to instruction.
