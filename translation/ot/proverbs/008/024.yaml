theological_decisions:
- issue: Rendering Wisdom's origin language in Proverbs 8
  chosen_reading: I was brought forth
  alternative_readings:
  - I was born
  - I was formed
  rationale: The verse uses maternal/birth-like imagery for personified Wisdom. The
    translation should preserve the metaphor without importing later doctrinal conclusions
    about Christology from this poetic text. 'Brought forth' is faithful to the Hebrew
    and leaves the theological tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
