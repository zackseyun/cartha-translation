id: PRO.8.24
reference: Proverbs 8:24
source:
  edition: WLC
  text: בְּ/אֵין תְּהֹמ֥וֹת חוֹלָ֑לְתִּי בְּ/אֵ֥ין מַ֝עְיָנ֗וֹת נִכְבַּדֵּי מָֽיִם־־׃
translation:
  text: When there were no depths, I was brought forth, when there were no springs
    heavy with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was born' or 'I was formed.' The Hebrew verb can evoke birth imagery;
      'brought forth' preserves the metaphor without over-specifying it.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  chosen: when there were no
  alternatives:
  - in the absence of
  - before there were any
  lexicon: HALOT
  rationale: The preposition ב with אֵין introduces a temporal circumstance here in
    parallel cola. English 'when there were no' preserves the poetic temporal sense
    naturally; 'before there were any' is possible but slightly more interpretive.
- source_word: תְּהֹמוֹת
  chosen: depths
  alternatives:
  - deeps
  - abysses
  - primeval depths
  lexicon: HALOT
  rationale: תְּהֹמוֹת refers to the deep waters/abyss. 'Depths' is clear modern English
    and fits the creation context without over-specifying mythology. 'Deeps' is traditional
    but less natural; 'primeval depths' adds interpretive color not explicit in the
    word itself.
- source_word: חוֹלָלְתִּי
  chosen: I was brought forth
  alternatives:
  - I was born
  - I was formed
  lexicon: HALOT
  rationale: In Proverbs 8 this verb is commonly understood in a birth/begetting metaphor
    for personified Wisdom. 'I was brought forth' preserves the passive sense and
    poetic dignity without forcing a more biologically narrow 'born.' 'Formed' is
    possible in some contexts but is less likely in this parallelism.
- source_word: מַעְיָנוֹת
  chosen: springs
  alternatives:
  - fountains
  - wellsprings
  lexicon: HALOT
  rationale: The noun denotes natural water sources. 'Springs' is the most natural
    modern rendering; 'fountains' can sound artificial in contemporary English.
- source_word: נִכְבַּדֵּי מָיִם
  chosen: heavy with water
  alternatives:
  - abounding in water
  - rich with water
  - laden with water
  lexicon: HALOT
  rationale: The participial phrase literally conveys being weighty/heavy with water.
    'Heavy with water' preserves the concrete imagery and poetic force better than
    the smoother but more interpretive 'abounding in water.'
- source_word: מָיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Although formally plural in Hebrew, English idiom prefers singular 'water'
    in this construction. This keeps the line readable while preserving the sense.
