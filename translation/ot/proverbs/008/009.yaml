id: PRO.8.9
reference: Proverbs 8:9
source:
  edition: WLC
  text: כֻּלָּ֣/ם נְ֭כֹחִים לַ/מֵּבִ֑ין וִֽ֝/ישָׁרִ֗ים לְ/מֹ֣צְאֵי דָֽעַת׃
translation:
  text: All of them are straightforward to the one who understands, and upright to
    those who find knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plain' or 'right' for 'straightforward.' The Hebrew emphasizes that
      wisdom's words are direct and not crooked to the discerning.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - All
  lexicon: HALOT
  rationale: Refers back to wisdom's words in the immediate context (vv. 6–8). 'All
    of them' makes the plural referent explicit in natural English while preserving
    the comprehensiveness of כֹּל.
- source_word: נְכֹחִים
  chosen: straightforward
  alternatives:
  - right
  - plain
  - direct
  - straight
  lexicon: HALOT
  rationale: The adjective conveys what is straight/direct/plain. 'Straightforward'
    fits the context of speech and understanding better than the more abstract 'right'
    or the potentially misleading 'plain' alone. It preserves the sense that wisdom's
    words are not crooked or deceptive to the discerning person.
- source_word: לַמֵּבִין
  chosen: to the one who understands
  alternatives:
  - to him who understands
  - to the discerning
  - for the one who understands
  lexicon: HALOT
  rationale: The preposition ל marks relation ('to/for'), and the participle from
    בין denotes a person with discernment/understanding. 'The one who understands'
    is gender-accurate in sense without importing unnecessary male specificity in
    English, and it reads naturally.
- source_word: וִישָׁרִים
  chosen: and upright
  alternatives:
  - and straight
  - and right
  lexicon: HALOT
  rationale: יָשָׁר commonly denotes what is upright/straight/right. 'Upright' pairs
    well with moral and verbal rectitude in wisdom literature and complements 'straightforward'
    without sounding redundant.
- source_word: לְמֹצְאֵי
  chosen: to those who find
  alternatives:
  - for those who find
  - to the finders of
  lexicon: HALOT
  rationale: 'The participle means ''those finding'' or ''those who find.'' This keeps
    the active, experiential sense: wisdom''s words are recognized as upright by people
    who come into possession of knowledge.'
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: דַּעַת is best rendered 'knowledge' here, distinct from the previous
    term for understanding (בין). Preserving the lexical distinction reflects the
    Hebrew parallelism without collapsing the two concepts.
