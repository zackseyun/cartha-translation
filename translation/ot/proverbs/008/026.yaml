id: PRO.8.26
reference: Proverbs 8:26
source:
  edition: WLC
  text: עַד לֹ֣א עָ֭שָׂה אֶ֣רֶץ וְ/חוּצ֑וֹת וְ֝/רֹ֗אשׁ עָפְר֥וֹת תֵּבֵֽל־׃
translation:
  text: before he had made the earth and the open fields, and the first of the dust
    of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the open places'; elsewhere חוּצוֹת can mean 'streets' in an urban setting,
      but here the creation context favors a non-urban sense such as 'open fields'
      or 'open country.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the beginning of the dust of the world.' The Hebrew phrase is compact
      and somewhat unusual, likely referring to the earliest soil or dust from which
      the world was formed.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד לֹא
  chosen: before ... had
  alternatives:
  - until not
  - while not yet
  lexicon: HALOT
  rationale: In context with the perfect verb עָשָׂה, עַד לֹא functions idiomatically
    as 'before ... had' or 'before ... was yet,' marking priority in time. English
    'before he had made' best captures the temporal sense naturally.
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - fashioned
  - prepared
  lexicon: HALOT
  rationale: The verb is the common 'make/do.' With the preceding temporal construction,
    English pluperfect 'had made' is the most natural rendering.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: In this creation-context parallel with תֵּבֵל ('world'), the global sense
    'earth' is preferable to localized 'land'.
- source_word: חוּצוֹת
  chosen: the open fields
  alternatives:
  - the outdoors
  - the streets
  - the open places
  lexicon: HALOT
  rationale: Though חוּצוֹת can mean 'streets' or 'outside places' in urban contexts,
    here the creation setting rules out city streets. 'Open fields' conveys the outdoor
    expanses or open country before ordered creation.
- source_word: רֹאשׁ
  chosen: the first
  alternatives:
  - the beginning
  - the chief part
  - the sum
  lexicon: HALOT
  rationale: In construct with עָפְרוֹת, רֹאשׁ denotes the first or earliest part.
    'The first' fits the temporal/primordial sense in this verse.
- source_word: עָפְרוֹת
  chosen: the dust
  alternatives:
  - clods
  - soil
  - masses of dust
  lexicon: HALOT
  rationale: From עפר ('dust, dry soil'). The plural likely has a collective sense.
    'Dust' is idiomatic in English and suits the creation imagery.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the world, often the inhabited world in ordered-cosmic
    sense. 'World' is concise and natural here.
