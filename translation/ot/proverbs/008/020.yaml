id: PRO.8.20
reference: Proverbs 8:20
source:
  edition: WLC
  text: בְּ/אֹֽרַח צְדָקָ֥ה אֲהַלֵּ֑ך בְּ֝/ת֗וֹךְ נְתִיב֥וֹת מִשְׁפָּֽט־׃
translation:
  text: I walk in the way of righteousness, in the midst of the paths of justice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the way of justice ... among the paths of judgment.' The Hebrew terms
      צְדָקָה and מִשְׁפָּט overlap semantically, but the main text preserves their
      poetic distinction as 'righteousness' and 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֹרַח
  chosen: in the way of
  alternatives:
  - on the path of
  - in the path of
  lexicon: HALOT
  rationale: אֹרַח denotes a way, path, or course. 'Way' is idiomatic in English and
    fits wisdom literature's metaphorical use for moral conduct. The prefixed ב is
    rendered 'in' to preserve the Hebrew image of movement within a moral course rather
    than flattening it to a bare adverbial sense.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. In this wisdom context,
    paired with מִשְׁפָּט, rendering it as 'righteousness' preserves the distinction
    between personal moral rectitude and judicial equity. This also aligns with the
    project's default handling of cognate theological terms where applicable.
- source_word: אֲהַלֵּך
  chosen: I walk
  alternatives:
  - I go
  - I conduct myself
  lexicon: HALOT
  rationale: הלך in the Piel here expresses ongoing movement/conduct. 'I walk' preserves
    the metaphor central to wisdom literature and matches the first-person feminine
    speaker, Wisdom, without adding interpretive material.
- source_word: בְּ/תוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - within
  lexicon: HALOT
  rationale: תּוֹךְ means midst, middle, or interior. 'In the midst of' is slightly
    more formal but preserves the spatial imagery and the poetic parallelism with
    the first colon better than the flatter 'among.'
- source_word: נְתִיבוֹת
  chosen: the paths of
  alternatives:
  - the tracks of
  - the roadways of
  lexicon: HALOT
  rationale: נְתִיבוֹת is the plural of a term for paths or tracks. 'Paths' is the
    most natural English equivalent and maintains the poetic parallel with אֹרַח ('way').
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly denotes justice, judgment, or legal right. Here 'justice'
    best complements 'righteousness' in the parallel line and communicates the ethical-judicial
    sense in accessible modern English.
