id: PRO.8.36
reference: Proverbs 8:36
source:
  edition: WLC
  text: וְֽ֭/חֹטְאִ/י חֹמֵ֣ס נַפְשׁ֑/וֹ כָּל מְ֝שַׂנְאַ֗/י אָ֣הֲבוּ מָֽוֶת־׃פ
translation:
  text: But the one who misses me injures himself; all who hate me love death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'sins against me.' The Hebrew verb can carry the sense
      'miss' or 'sin.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does violence to his soul/life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֹטְאִי
  chosen: the one who misses me
  alternatives:
  - he who sins against me
  - whoever fails to find me
  lexicon: HALOT
  rationale: From חטא, whose core sense is 'miss' or 'sin.' In Wisdom's speech, the
    object suffix 'me' is explicit. 'Misses me' preserves the underlying metaphor
    and avoids importing a narrower moral sense than the Hebrew alone requires, while
    still fitting the wisdom context. The singular participle is rendered generically
    as 'the one who.'
- source_word: חֹמֵס
  chosen: injures
  alternatives:
  - wrongs
  - does violence to
  - harms
  lexicon: HALOT
  rationale: The participle from חמס can denote violence, wrong, or harm. With 'his
    soul/life' as object, the idiom points to self-harm or self-injury rather than
    literal physical violence alone. 'Injures' is natural English and preserves the
    serious force.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  lexicon: HALOT
  rationale: נפש often means soul, life, self, or person. In the idiom 'does violence
    to his nephesh,' English 'himself' best communicates the reflexive sense without
    suggesting a technical anthropology the verse does not require. A footnote preserves
    the more literal alternatives.
- source_word: כָּל
  chosen: all
  alternatives:
  - everyone who
  lexicon: HALOT
  rationale: Straightforward universal quantifier; 'all' fits the parallelism and
    terseness of the proverb.
- source_word: מְשַׂנְאַי
  chosen: who hate me
  alternatives:
  - my haters
  lexicon: HALOT
  rationale: Participle with first-person suffix, rendered as a relative clause for
    idiomatic English while preserving the ongoing characterization.
- source_word: אָהֲבוּ
  chosen: love
  alternatives:
  - have loved
  lexicon: HALOT
  rationale: Though morphologically perfect, in proverbial parallelism it expresses
    a general truth. English present 'love' best conveys the gnomic force.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Direct and standard rendering; in context it carries both literal and
    wisdom-theological force of ruin opposed to life.
