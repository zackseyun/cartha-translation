theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in self-harm idiom
  chosen_reading: Rendered idiomatically as 'himself' rather than 'his soul.'
  alternative_readings:
  - his soul
  - his life
  rationale: The verse warns that rejecting wisdom is self-destructive. Rendering
    נֶפֶשׁ as 'himself' avoids implying a sharp body/soul distinction not demanded
    by the Hebrew and communicates the idiom clearly in modern English.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather
    than resolve it.
