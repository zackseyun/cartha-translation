theological_decisions:
- issue: Personification of wisdom
  chosen_reading: retain feminine personal reference ('her')
  alternative_readings:
  - render non-personally as 'it'
  rationale: The Hebrew suffix בָהּ is feminine singular, and Proverbs 8 consistently
    personifies Wisdom as a woman. Retaining 'her' preserves the literary form without
    making additional doctrinal claims.
  doctrine_reference: Translation philosophy §3, §6
