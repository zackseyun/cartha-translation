id: PRO.8.11
reference: Proverbs 8:11
source:
  edition: WLC
  text: כִּֽי טוֹבָ֣ה חָ֭כְמָה מִ/פְּנִינִ֑ים וְ/כָל חֲ֝פָצִ֗ים לֹ֣א יִֽשְׁווּ בָֽ/הּ־־־׃
translation:
  text: For wisdom is better than jewels, and all desirable things cannot compare
    with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pearls' or 'rubies' for 'jewels'; the Hebrew term refers generally to
      precious gems.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation. 'For'
    preserves the connective force naturally in English.
- source_word: טוֹבָה
  chosen: is better
  alternatives:
  - is good
  - is more valuable
  lexicon: HALOT
  rationale: 'With the comparative preposition מִן, the adjective carries comparative
    sense: wisdom is ''better than'' rather than merely ''good.'''
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs, preserving the personified
    theme of Wisdom in this chapter.
- source_word: מִפְּנִינִים
  chosen: than jewels
  alternatives:
  - than pearls
  - than rubies
  lexicon: HALOT
  rationale: פְּנִינִים denotes precious gems/jewels; English tradition varies between
    'rubies' and 'pearls.' 'Jewels' avoids over-specifying the exact stone while preserving
    the sense of costly valuables.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Straightforward conjunctive plus totalizing noun phrase.
- source_word: חֲפָצִים
  chosen: desirable things
  alternatives:
  - delights
  - precious things
  - things one may desire
  lexicon: HALOT
  rationale: Refers broadly to objects of desire or delight. 'Desirable things' is
    natural modern English and preserves the semantic range without narrowing it to
    pleasure alone.
- source_word: לֹא יִשְׁווּ בָהּ
  chosen: cannot compare with her
  alternatives:
  - are not equal to her
  - do not match her
  - cannot be compared to her
  lexicon: HALOT
  rationale: The verb שׁוה with ב conveys being equal or comparable to something.
    'Cannot compare with her' is idiomatic English and fits the personification of
    wisdom with the feminine suffix.
