theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Render the speaker as personified wisdom without importing later
    christological identification into the translation.
  alternative_readings:
  - Capitalize 'Wisdom' to signal a quasi-personal figure
  - Translate with christological overtones
  rationale: Proverbs 8 presents wisdom as a poetic personification. The translation
    should preserve that literary-theological feature while not resolving it into
    a doctrinal identification the verse itself does not make.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
