id: PRO.8.12
reference: Proverbs 8:12
source:
  edition: WLC
  text: אֲֽנִי חָ֭כְמָה שָׁכַ֣נְתִּי עָרְמָ֑ה וְ/דַ֖עַת מְזִמּ֣וֹת אֶמְצָֽא־׃
translation:
  text: I, wisdom, dwell with prudence, and I find knowledge of discretion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I, Wisdom, have dwelt with prudence, and I find knowledge and discretion.'
      The Hebrew allows 'have dwelt,' and מְזִמּוֹת can also be rendered 'plans,'
      'devices,' or 'sound judgment' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - Wisdom
  lexicon: HALOT
  rationale: The noun means 'wisdom.' Lowercase is used in the English text because
    the Hebrew personifies wisdom without requiring capitalization as a proper name;
    the appositional structure 'I, wisdom' preserves the personification.
- source_word: שָׁכַנְתִּי
  chosen: dwell
  alternatives:
  - have dwelt
  - reside
  lexicon: HALOT
  rationale: The verb שׁכן denotes dwelling or residing. Present-tense English best
    fits the poetic personification and immediate discourse, even though the Hebrew
    perfect can be rendered more formally as 'have dwelt.'
- source_word: עָרְמָה
  chosen: prudence
  alternatives:
  - shrewdness
  - craftiness
  lexicon: HALOT
  rationale: In Proverbs this term is positively valued as practical prudence or shrewd
    good sense, not negative deceit. 'Prudence' communicates the virtue clearly in
    modern English.
- source_word: דַעַת
  chosen: knowledge
  lexicon: HALOT
  rationale: Standard rendering of the noun; it pairs naturally with wisdom language
    in Proverbs and should remain distinct from 'wisdom' itself.
- source_word: מְזִמּוֹת
  chosen: discretion
  alternatives:
  - sound judgment
  - plans
  - devices
  lexicon: HALOT
  rationale: The noun can denote plans, devices, or discretion depending on context.
    In wisdom literature, especially in positive parallelism with prudence and knowledge,
    'discretion' best captures the commendable sense.
- source_word: אֶמְצָא
  chosen: I find
  alternatives:
  - I obtain
  - I discover
  lexicon: HALOT
  rationale: The verb מצא commonly means 'find.' Retaining the simple verb preserves
    the Hebrew imagery and avoids over-interpretation.
- source_word: וְ
  chosen: and
  alternatives:
  - even
  lexicon: HALOT
  rationale: The conjunction straightforwardly links the two clauses. 'And' preserves
    the parallel structure without adding emphasis not explicit in the text.
