id: PRO.8.7
reference: Proverbs 8:7
source:
  edition: WLC
  text: כִּֽי אֱ֭מֶת יֶהְגֶּ֣ה חִכִּ֑/י וְ/תוֹעֲבַ֖ת שְׂפָתַ֣/י רֶֽשַׁע־׃
translation:
  text: For my mouth will utter truth, and wickedness is an abomination to my lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'my palate will utter truth.' Here 'palate' functions as a figure
      for the organ of speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding appeal of Wisdom.
    'For' preserves the explanatory force in natural English.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - what is true
  lexicon: HALOT
  rationale: In this context of speech, אֱמֶת most naturally denotes truthful content
    or truthfulness in utterance. 'Truth' is concise and idiomatic with 'utter.'
- source_word: יֶהְגֶּה
  chosen: will utter
  alternatives:
  - will speak
  - will murmur
  - will meditate
  lexicon: HALOT
  rationale: Though הגה can denote muttering, murmuring, or meditating, with 'my mouth/palate'
    as subject and direct object 'truth,' the sense is vocal expression. 'Will utter'
    captures deliberate spoken output better than the flatter 'speak.'
- source_word: חִכִּי
  chosen: my mouth
  alternatives:
  - my palate
  - my tongue
  lexicon: HALOT
  rationale: Literally 'my palate,' but in Hebrew poetry this can stand metonymically
    for the organ of speech. 'My mouth' communicates the intended sense in clear English
    and pairs naturally with 'utter.'
- source_word: וְתוֹעֲבַת
  chosen: and ... is an abomination
  alternatives:
  - and ... is detestable
  - and ... is abhorrent
  lexicon: HALOT
  rationale: The noun תּוֹעֵבָה denotes something abhorrent or detestable. 'Abomination'
    preserves the moral force and common biblical register without being obscure here.
- source_word: שְׂפָתַי
  chosen: to my lips
  alternatives:
  - for my lips
  - to my mouth
  lexicon: HALOT
  rationale: The construct with תועבת yields the sense that wickedness is abhorrent
    with respect to Wisdom's speech. 'To my lips' is a natural English rendering that
    preserves the bodily metaphor.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: רֶשַׁע commonly denotes wickedness or guilt in a moral sense. 'Wickedness'
    best matches the ethical contrast with 'truth' in Wisdom's speech.
