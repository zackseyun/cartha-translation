id: PRO.8.29
reference: Proverbs 8:29
source:
  edition: WLC
  text: בְּ/שׂ֘וּמ֤/וֹ לַ/יָּ֨ם חֻקּ֗/וֹ וּ֭/מַיִם לֹ֣א יַֽעַבְרוּ פִ֑י/ו בְּ֝/חוּק֗/וֹ
    מ֣וֹסְדֵי אָֽרֶץ׀־׃
translation:
  text: when he set a boundary for the sea, so that the waters would not transgress
    his command, when he marked out the foundations of the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set its limit' for חֻקּוֹ; the Hebrew term can denote a fixed decree
      or prescribed boundary.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his mouth'; that is, what his mouth commands.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׂוּמוֹ
  chosen: when he set
  alternatives:
  - in his setting
  - when he placed
  lexicon: HALOT
  rationale: 'The prefixed ב with the infinitive construct of שׂוּם plus pronominal
    suffix gives a temporal sense in context: ''when he set/placed.'' ''Set'' is idiomatic
    and concise in English.'
- source_word: לַיָּם
  chosen: for the sea
  alternatives:
  - to the sea
  lexicon: HALOT
  rationale: 'The preposition ל here marks the indirect object/complement of assigning
    a limit: ''set for the sea.'' English idiom prefers ''for the sea'' with ''boundary.'''
- source_word: חֻקּוֹ
  chosen: a boundary
  alternatives:
  - its limit
  - his decree
  - its shore
  lexicon: HALOT
  rationale: חֹק/חֻק can mean statute, decree, fixed limit, or prescribed boundary.
    In the creation context with the sea, 'boundary' best captures the concrete sense
    of a fixed limit. 'His decree' is possible but less explicit in English about
    the sea's limit.
- source_word: וּמַיִם
  chosen: so that the waters
  alternatives:
  - and the waters
  lexicon: HALOT
  rationale: The conjunction links the result/purpose clause naturally in English.
    Rendering simply 'and the waters' is more wooden; 'so that the waters' brings
    out the sense of the following negated verb in context.
- source_word: לֹא יַעַבְרוּ
  chosen: would not transgress
  alternatives:
  - would not pass beyond
  - might not cross
  lexicon: HALOT
  rationale: עבר means pass over/cross, and with the object 'his mouth/command' idiomatically
    conveys overstepping a command or boundary. 'Transgress' preserves both the boundary
    and command nuance.
- source_word: פִּיו
  chosen: his command
  alternatives:
  - his mouth
  - his word
  lexicon: HALOT
  rationale: Literally 'his mouth,' but in Hebrew this metonymically refers to what
    proceeds from the mouth—his command/utterance. 'His command' is the clearest natural
    English rendering in this context.
- source_word: בְּחוּקוֹ
  chosen: when he marked out
  alternatives:
  - in his inscribing
  - when he decreed
  lexicon: HALOT
  rationale: From חקק, the infinitive construct with ב again gives a temporal sense.
    The verb can mean inscribe, engrave, prescribe, or mark out. With 'foundations
    of the earth,' 'marked out' fits the creation imagery well.
- source_word: מוֹסְדֵי אָרֶץ
  chosen: the foundations of the earth
  alternatives:
  - earth's foundations
  lexicon: HALOT
  rationale: A standard and accurate rendering of the construct phrase, preserving
    the cosmological imagery of the Hebrew.
