theological_decisions:
- issue: Creation imagery in Wisdom's speech
  chosen_reading: Render the verse as describing God's ordering of creation without
    importing later doctrinal claims.
  alternative_readings:
  - Read the language more abstractly as only metaphorical order
  - Read it through later christological categories in the main text
  rationale: The verse belongs to Wisdom's poetic recounting of creation. The translation
    should preserve the concrete creation imagery and not resolve broader theological
    debates beyond what the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
