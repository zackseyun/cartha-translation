id: PRO.8.4
reference: Proverbs 8:4
source:
  edition: WLC
  text: אֲלֵי/כֶ֣ם אִישִׁ֣ים אֶקְרָ֑א וְ֝/קוֹלִ֗/י אֶל בְּנֵ֥י אָדָֽם־׃
translation:
  text: To you, O men, I call, and my voice is to the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of humanity' / 'human beings.' The Hebrew says 'the sons
      of man,' a common expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲלֵיכֶם
  chosen: To you
  alternatives:
  - Unto you
  - To all of you
  lexicon: HALOT
  rationale: Preposition אֶל with 2mp suffix marks the addressees of Wisdom's call.
    'To you' is natural modern English and preserves the direct address.
- source_word: אִישִׁים
  chosen: O men
  alternatives:
  - men
  - people
  lexicon: HALOT
  rationale: Plural of אִישׁ refers specifically to men/males here, especially in
    contrastive parallelism with בְּנֵי אָדָם. Following the gender-accurate principle,
    'men' is retained rather than a neutral 'people.' The vocative force is brought
    out with 'O' in direct address.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I proclaim
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא in this context denotes calling out/addressing.
    'I call' is the most straightforward rendering and fits the parallel with 'my
    voice.'
- source_word: וְקוֹלִי
  chosen: and my voice
  alternatives:
  - and my sound
  - and I raise my voice
  lexicon: HALOT
  rationale: The noun קוֹל with 1cs suffix is literally 'my voice.' Retaining the
    noun preserves the Hebrew parallelism rather than converting it into a verbal
    paraphrase.
- source_word: אֶל
  chosen: is to
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: 'A simple ''to'' would also be possible, but English idiom after ''my
    voice'' is smoother with an implied copular sense: ''my voice is to ...'' This
    preserves the directional force without over-paraphrasing.'
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humanity
  - mankind
  lexicon: HALOT
  rationale: This construct phrase is a common Hebrew expression for human beings.
    Because the source uses explicitly masculine/genealogical language and the doctrine
    calls for gender-accurate rendering, 'the sons of man' is preferred in the main
    text. More idiomatic inclusive alternatives are preserved in a footnote.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: Per the doctrine's contested-terms guidance, אָדָם may be rendered 'man'
    or 'humankind' depending on context. Here, within בְּנֵי אָדָם and in parallel
    with אִישִׁים, 'man' best preserves the Hebrew diction and poetic parallelism.
