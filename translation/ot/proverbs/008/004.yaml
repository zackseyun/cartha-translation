theological_decisions:
- issue: Gendered anthropological language in Hebrew parallelism
  chosen_reading: 'Retain masculine forms in the main text: ''O men'' and ''the sons
    of man.'''
  alternative_readings:
  - O people ... the children of humanity
  - O men ... human beings
  rationale: The verse uses two distinct masculine expressions, אִישִׁים and בְּנֵי
    אָדָם, in poetic parallelism. In keeping with the translation philosophy's gender-accurate
    principle, the main text preserves that form rather than flattening both into
    gender-neutral English. Because English readers may understand the second phrase
    generically, an inclusive idiomatic alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
