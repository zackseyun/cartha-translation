id: PRO.8.30
reference: Proverbs 8:30
source:
  edition: WLC
  text: וָֽ/אֶהְיֶ֥ה אֶצְל֗/וֹ אָ֫מ֥וֹן וָֽ/אֶהְיֶ֣ה שַׁ֭עֲשֻׁעִים י֤וֹם י֑וֹם מְשַׂחֶ֖קֶת
    לְ/פָנָ֣י/ו בְּ/כָל עֵֽת׀־׃
translation:
  text: Then I was beside him, like a master workman; and I was his delight day after
    day, rejoicing before him at all times,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a little child' (or 'as a faithful one'); the Hebrew word translated
      'master workman' is difficult and may carry a different nuance.
    reason: alternative_reading
  - marker: b
    text: Or 'playing before him at all times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  chosen: I was
  alternatives:
  - I became
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה here functions in past narrative/sequential description
    within Wisdom's speech. 'I was' is the most natural English rendering in context.
- source_word: אֶצְלוֹ
  chosen: beside him
  alternatives:
  - with him
  - at his side
  lexicon: HALOT
  rationale: The preposition אצל denotes proximity or attendance. 'Beside him' preserves
    the spatial-relational sense without overinterpreting the relationship.
- source_word: אָמֹון
  chosen: like a master workman
  alternatives:
  - a little child
  - faithful one
  - architect
  lexicon: HALOT
  rationale: אָמֹון is notoriously difficult and lexically contested. In this creation
    context, 'master workman' best fits the surrounding imagery of Wisdom present
    at creation and aligns with a long-standing plausible sense. Because the term
    is genuinely ambiguous, an alternative is preserved in a footnote rather than
    suppressed.
- source_word: שַׁעֲשֻׁעִים
  chosen: his delight
  alternatives:
  - delight
  - daily delight
  lexicon: HALOT
  rationale: The noun denotes delight or object of delight. With the preceding 'I
    was,' English idiom is best expressed as 'I was his delight,' making explicit
    the implied possessive relationship from context.
- source_word: יוֹם יוֹם
  chosen: day after day
  alternatives:
  - day by day
  - every day
  lexicon: HALOT
  rationale: The repetition expresses continual regularity. 'Day after day' is natural
    modern English and preserves the iterative force.
- source_word: מְשַׂחֶקֶת
  chosen: rejoicing
  alternatives:
  - playing
  - laughing
  lexicon: HALOT
  rationale: The participle from שׂחק can denote play, laughter, or joyous sport.
    Here, in elevated poetic context, 'rejoicing' communicates joyful activity without
    sounding trivial, while a more literal alternative is worth preserving in a footnote
    because of the verse's imagery.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: The phrase literally indicates presence before someone. 'Before him'
    is concise and sufficiently transparent.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - continually
  - at every time
  lexicon: HALOT
  rationale: The phrase expresses uninterrupted duration. 'At all times' is a clear,
    natural rendering that preserves the comprehensive sense.
