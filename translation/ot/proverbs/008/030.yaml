theological_decisions:
- issue: Interpretation of Wisdom's role in creation implied by אָמוֹן
  chosen_reading: Render Wisdom as 'like a master workman' in the main text while
    preserving the alternative 'little child' in a footnote.
  alternative_readings:
  - like a little child
  - as a faithful one
  rationale: The verse is poetically and lexically ambiguous, and later theological
    debates sometimes press this text into christological or metaphysical claims.
    Following the translation philosophy, the main text adopts the reading that best
    fits the immediate creation context, but the ambiguity is preserved in a footnote
    rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
