id: PRO.8.8
reference: Proverbs 8:8
source:
  edition: WLC
  text: בְּ/צֶ֥דֶק כָּל אִמְרֵי פִ֑/י אֵ֥ין בָּ֝/הֶ֗ם נִפְתָּ֥ל וְ/עִקֵּֽשׁ־־׃
translation:
  text: All the words of my mouth are in righteousness; there is nothing twisted or
    crooked in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is nothing perverse or devious in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶדֶק
  chosen: are in righteousness
  alternatives:
  - are righteous
  - are just
  - are in justice
  lexicon: HALOT
  rationale: The preposition ב plus צֶדֶק is most literally 'in righteousness.' This
    preserves the Hebrew construction while remaining natural enough in English. 'Are
    righteous' is smoother but slightly reduces the force of the prepositional phrase;
    'justice' is possible for צֶדֶק, but in this wisdom-speech context 'righteousness'
    better captures moral straightness of speech.
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: '''All'' naturally modifies the plural ''words'' and reflects the comprehensive
    scope of Wisdom''s speech.'
- source_word: אִמְרֵי פִי
  chosen: the words of my mouth
  alternatives:
  - my sayings
  - the utterances of my mouth
  lexicon: HALOT
  rationale: אִמְרֵי denotes spoken words or sayings; paired with 'my mouth,' the
    idiomatic English 'the words of my mouth' preserves the Hebrew imagery and solemnity
    better than the more interpretive 'my sayings.'
- source_word: אֵין בָּהֶם
  chosen: there is nothing ... in them
  alternatives:
  - none of them are
  - there is not in them
  lexicon: HALOT
  rationale: This English restructuring best conveys the existential negation with
    the plural pronoun while reading naturally.
- source_word: נִפְתָּל
  chosen: twisted
  alternatives:
  - perverse
  - devious
  lexicon: HALOT
  rationale: נפתל conveys what is twisted, tortuous, or perverse. 'Twisted' is vivid,
    accessible modern English and pairs well with the following term without becoming
    overly interpretive. 'Perverse' is traditional but more abstract and potentially
    archaic for the target audience.
- source_word: וְעִקֵּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - distorted
  lexicon: HALOT
  rationale: עִקֵּשׁ commonly denotes what is crooked or warped. 'Crooked' preserves
    the concrete moral metaphor and forms a natural pair with 'twisted.' The two English
    terms are not exact duplicates, allowing the Hebrew's near-synonymous intensification
    to remain visible.
