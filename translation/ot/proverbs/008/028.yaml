id: PRO.8.28
reference: Proverbs 8:28
source:
  edition: WLC
  text: בְּ/אַמְּצ֣/וֹ שְׁחָקִ֣ים מִ/מָּ֑עַל בַּ֝/עֲז֗וֹז עִינ֥וֹת תְּהוֹם׃
translation:
  text: when he made the skies firm above, when the springs of the deep grew strong,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he strengthened the fountains of the deep.' The Hebrew can be taken
      either as the deep's springs becoming strong or as God making them strong.
    reason: lexical_alternative
  - marker: b
    text: '''Skies'' may also be rendered ''clouds'' or ''heavens,'' depending on
      how broadly שְׁחָקִים is understood in this creation context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַמְּצוֹ
  chosen: when he made ... firm
  alternatives:
  - when he strengthened
  - when he established
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal clause in this
    context within Wisdom's recital of creation ('when he...'). The verb from אמץ
    carries the sense of making strong/firm. 'Made ... firm' is natural English and
    fits the cosmological image of securing the skies.
- source_word: שְׁחָקִים
  chosen: the skies
  alternatives:
  - the clouds
  - the heavens
  lexicon: HALOT
  rationale: שׁחקים can denote skies/clouds, often the upper expanse. Here, paired
    with 'above' and in a creation context, 'the skies' best captures the elevated
    atmospheric/heavenly region without overcommitting to mere rain clouds.
- source_word: מִמָּעַל
  chosen: above
  alternatives:
  - in the heights
  - overhead
  lexicon: HALOT
  rationale: The adverb/prepositional form straightforwardly indicates location above.
    'Above' is concise and idiomatic.
- source_word: בַּעֲזֹז
  chosen: grew strong
  alternatives:
  - became strong
  - were strengthened
  - when he made strong
  lexicon: HALOT
  rationale: From עזז, the form here functions in a temporal clause parallel to the
    previous colon. Because the subject is 'springs of the deep,' English reads more
    naturally with an intransitive/resultative expression, 'grew strong,' conveying
    their forceful establishment or intensification.
- source_word: עִינוֹת
  chosen: the springs
  alternatives:
  - the fountains
  - the sources
  lexicon: HALOT
  rationale: עינות commonly refers to springs or fountains. 'Springs' is clear modern
    English and suits the imagery of subterranean waters.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the depths
  - the primeval deep
  lexicon: HALOT
  rationale: תְּהוֹם regularly denotes the deep abyss/watery deep. 'The deep' is the
    standard concise rendering and preserves the cosmic resonance of the Hebrew.
