id: PRO.8.16
reference: Proverbs 8:16
source:
  edition: WLC
  text: בִּ֭/י שָׂרִ֣ים יָשֹׂ֑רוּ וּ֝/נְדִיבִ֗ים כָּל שֹׁ֥פְטֵי צֶֽדֶק־׃
translation:
  text: By me rulers rule, and nobles—all judges of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "judges of justice." The Hebrew צֶדֶק can denote both moral righteousness
      and judicial justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  chosen: By me
  alternatives:
  - Through me
  - In me
  lexicon: HALOT
  rationale: 'The preposition ב with 1cs suffix here expresses agency/instrumentality
    in Wisdom''s speech: rulers exercise rule by means of or through Wisdom. ''By
    me'' is concise and idiomatic, matching the parallel in the surrounding context.'
- source_word: שָׂרִים
  chosen: rulers
  alternatives:
  - princes
  - officials
  lexicon: HALOT
  rationale: The noun denotes high officials or princes. 'Rulers' fits modern English
    better than the more traditional 'princes' and avoids implying only royal sons;
    it captures governing authority in parallel with the following political terms.
- source_word: יָשֹׂרוּ
  chosen: rule
  alternatives:
  - govern
  - exercise authority
  lexicon: HALOT
  rationale: From the verb שׂרר, 'to rule, have dominion.' 'Rule' preserves the lexical
    connection with governing authority and keeps the line compact and proverbial.
- source_word: וּנְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - noblemen
  lexicon: HALOT
  rationale: The term refers to nobles or prominent leaders. 'Nobles' is natural modern
    English and distinguishes this group from the preceding שָׂרִים while preserving
    the social-political sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - even all
  - indeed all
  lexicon: HALOT
  rationale: The quantifier modifies the following construct phrase. Retaining 'all'
    reflects the Hebrew explicitly and gives the final phrase an appositional or summarizing
    force.
- source_word: שֹׁפְטֵי צֶדֶק
  chosen: judges of righteousness
  alternatives:
  - righteous judges
  - judges of justice
  lexicon: HALOT
  rationale: The construct phrase is most formally represented as 'judges of righteousness.'
    This preserves the noun צֶדֶק rather than converting it into an adjective. Because
    צֶדֶק can also carry the sense 'justice,' that alternative is worth preserving
    in a footnote.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: In wisdom literature צֶדֶק can denote what is right in both moral and
    judicial senses. 'Righteousness' preserves the broader ethical dimension, while
    'justice' remains a viable contextual alternative given the judicial setting.
