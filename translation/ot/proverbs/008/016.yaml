theological_decisions:
- issue: Sense of Wisdom's agency in political authority
  chosen_reading: The verse states that rulers and judges exercise their authority
    by means of Wisdom, without making a broader doctrinal claim about the legitimacy
    of every ruler.
  alternative_readings:
  - A stronger providential claim that all political authority is directly endorsed
    by Wisdom
  rationale: The Hebrew presents Wisdom as the means by which governance is rightly
    exercised. The translation should preserve that claim without importing a fuller
    theology of civil authority beyond the verse itself.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
