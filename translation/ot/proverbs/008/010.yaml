id: PRO.8.10
reference: Proverbs 8:10
source:
  edition: WLC
  text: קְחֽוּ מוּסָרִ֥/י וְ/אַל כָּ֑סֶף וְ֝/דַ֗עַת מֵ/חָר֥וּץ נִבְחָֽר־־׃
translation:
  text: Take my instruction instead of silver, and knowledge rather than choice gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take my discipline and not silver'; the Hebrew contrast can be rendered
      more literally, but the sense is to prefer wisdom's instruction over wealth.
    reason: lexical_alternative
  - marker: b
    text: '''Choice gold'' may also be rendered ''fine gold'' or ''selected gold.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Receive
  lexicon: HALOT
  rationale: Imperative plural of לקח, a direct exhortation. 'Take' is natural, concise
    English and preserves the force of the command.
- source_word: מוּסָרִי
  chosen: my instruction
  alternatives:
  - my discipline
  - my correction
  lexicon: HALOT
  rationale: מוּסָר can denote instruction with a disciplinary/corrective nuance in
    wisdom literature. Here, in parallel with 'knowledge,' 'instruction' best fits
    the pedagogical context while retaining the wisdom theme.
- source_word: וְאַל כָּסֶף
  chosen: instead of silver
  alternatives:
  - and not silver
  - rather than silver
  lexicon: HALOT
  rationale: The construction with אַל after an imperative functions idiomatically
    as preference/contrast in this poetic line, not merely prohibition. 'Instead of
    silver' communicates the comparative sense clearly in English.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Standard rendering of דעת in wisdom contexts. It pairs naturally with
    'instruction' and contrasts with material wealth.
- source_word: מֵחָרוּץ
  chosen: rather than choice gold
  alternatives:
  - more than fine gold
  - rather than gold
  - rather than refined gold
  lexicon: HALOT
  rationale: חָרוּץ in Proverbs commonly refers to gold, often fine or precious gold.
    Because the following participle נבחר qualifies it, rendering the phrase together
    as 'choice gold' captures the sense of highly valued gold without overloading
    the English.
- source_word: נבחר
  chosen: choice
  alternatives:
  - chosen
  - select
  - finest
  lexicon: HALOT
  rationale: Passive participle of בחר, 'chosen/selected.' In English, attributive
    'choice' is idiomatic for something specially selected and valuable, especially
    in a poetic comparison with wisdom.
