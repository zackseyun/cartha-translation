id: PRO.8.31
reference: Proverbs 8:31
source:
  edition: WLC
  text: מְ֭שַׂחֶקֶת בְּ/תֵבֵ֣ל אַרְצ֑/וֹ וְ֝/שַׁעֲשֻׁעַ֗/י אֶת בְּנֵ֥י אָדָֽם־׃פ
translation:
  text: rejoicing in the world, his earth, and my delight was with the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the inhabited world.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the sons of man'; that is, humankind.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׂחֶקֶת
  chosen: rejoicing
  alternatives:
  - playing
  - delighting
  lexicon: HALOT
  rationale: In this context of personified Wisdom describing her activity in creation,
    the participle conveys joyful, lively delight rather than mere amusement. 'Rejoicing'
    fits the elevated poetic register and coheres with the parallel idea of delight
    in the next colon, while preserving the active, ongoing sense.
- source_word: בְּתֵבֵל
  chosen: in the world
  alternatives:
  - in the inhabited world
  - in the productive world
  lexicon: HALOT
  rationale: תֵבֵל commonly denotes the world as the inhabited, ordered earth. 'World'
    is the most natural modern English rendering; the more specific nuance 'inhabited
    world' is possible and worth preserving in a footnote as a lexical alternative.
- source_word: אַרְצוֹ
  chosen: his earth
  alternatives:
  - his land
  lexicon: HALOT
  rationale: With the 3ms suffix, the phrase is literally 'his earth/land.' In the
    creation context of Proverbs 8, 'earth' better matches the cosmic scope than 'land.'
    The possessive is retained explicitly.
- source_word: וְשַׁעֲשֻׁעַי
  chosen: and my delight was
  alternatives:
  - and my delights were
  - and I delighted
  lexicon: HALOT
  rationale: The noun with 1cs suffix is literally 'my delights/delight.' English
    idiom favors the singular abstract 'my delight was' in this poetic line. The plural
    form likely intensifies rather than requiring a strictly plural English rendering.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humanity
  - mankind
  lexicon: HALOT
  rationale: This phrase is literally 'the sons of man/humankind.' Per the project's
    gender-accurate philosophy, the masculine form is preserved where it carries representative
    force. Because the phrase refers broadly to human beings, a footnote preserves
    the more idiomatic alternative 'humanity'.
