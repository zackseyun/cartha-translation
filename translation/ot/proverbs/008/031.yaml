theological_decisions:
- issue: Rendering personified Wisdom's joyful activity without importing later christological
    interpretation into the translation itself
  chosen_reading: Maintain the feminine first-person poetic voice as personified Wisdom
    speaking of her delight in creation and in humankind
  alternative_readings:
  - A christological reading that identifies Wisdom directly with the preincarnate
    Son
  rationale: Historic Christian theology may read Proverbs 8 typologically or canonically
    in relation to Christ, but the translation should render the Hebrew poetry as
    it stands and not encode a later theological identification into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
