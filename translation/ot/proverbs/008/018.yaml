theological_decisions:
- issue: Rendering of צְדָקָה in a morally weighted but non-Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can legitimately be rendered either 'righteousness' or
    'justice.' Because the verse presents Wisdom's gifts in a broad moral frame rather
    than a courtroom or social-legal setting, 'righteousness' is preferred in the
    main text, while 'justice' is preserved in a footnote to avoid over-resolving
    the semantic range.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms table
    for δικαιοσύνη as analogous guidance on preserving both 'righteousness' and 'justice'
    where context allows
