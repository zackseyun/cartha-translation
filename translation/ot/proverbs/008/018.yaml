id: PRO.8.18
reference: Proverbs 8:18
source:
  edition: WLC
  text: עֹֽשֶׁר וְ/כָב֥וֹד אִתִּ֑/י ה֥וֹן עָ֝תֵ֗ק וּ/צְדָקָֽה־׃
translation:
  text: Riches and honor are with me, enduring wealth and righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lasting wealth'; the adjective may also suggest wealth that is substantial
      or enduring.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: Denotes material abundance or riches. 'Riches' fits the poetic parallel
    with 'honor' and avoids flattening the first and fourth terms into the same English
    word.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In wisdom literature this commonly refers to social esteem or honor rather
    than overtly divine 'glory.' 'Honor' best matches the paired benefits Wisdom offers.
- source_word: אִתִּי
  chosen: are with me
  alternatives:
  - is with me
  lexicon: HALOT
  rationale: Though no explicit copula appears in Hebrew, English requires one. The
    plural verb 'are' reflects the compound subject 'riches and honor.'
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - substance
  - riches
  lexicon: HALOT
  rationale: Refers to possessions or wealth. 'Wealth' distinguishes it from the earlier
    עֹשֶׁר while preserving the semantic overlap of the poetic line.
- source_word: עָתֵק
  chosen: enduring
  alternatives:
  - lasting
  - ancient
  - surpassing
  lexicon: HALOT
  rationale: Here the adjective modifies wealth and likely conveys what is lasting,
    substantial, or enduring rather than merely old. 'Enduring' communicates durable
    wealth in a natural modern English way.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun can denote righteousness or justice. In this wisdom context,
    paired with wealth as a benefit associated with Wisdom, 'righteousness' best preserves
    the moral quality without narrowing it to juridical justice alone; the alternative
    is preserved in a footnote per translation philosophy on preserving tension.
