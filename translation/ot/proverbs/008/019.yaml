id: PRO.8.19
reference: Proverbs 8:19
source:
  edition: WLC
  text: ט֣וֹב פִּ֭רְיִ/י מֵ/חָר֣וּץ וּ/מִ/פָּ֑ז וּ֝/תְבוּאָתִ֗/י מִ/כֶּ֥סֶף נִבְחָֽר׃
translation:
  text: My fruit is better than gold, even fine gold, and my yield than choice silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and my produce than pure gold.' The Hebrew terms for precious metals
      distinguish gold generally (חָרוּץ) from especially fine gold (פָּז).
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: better than
  alternatives:
  - good
  - more beneficial than
  lexicon: HALOT
  rationale: 'In predicate position with comparative מִן, the adjective functions
    comparatively: wisdom''s fruit is ''better than'' the valuables named, not merely
    ''good.'''
- source_word: פִּרְיִי
  chosen: my fruit
  alternatives:
  - my produce
  lexicon: HALOT
  rationale: The noun פְּרִי commonly denotes fruit or produce. 'Fruit' works naturally
    in English and preserves the metaphor of what wisdom yields.
- source_word: מֵחָרוּץ
  chosen: than gold
  alternatives:
  - than חרוץ/gold
  - than refined gold
  lexicon: HALOT
  rationale: חָרוּץ in wisdom literature commonly refers to gold. Since the next term
    פָּז specifies a finer quality, rendering this first term simply as 'gold' preserves
    the progression without overloading both terms with the same modifier.
- source_word: וּמִפָּז
  chosen: even fine gold
  alternatives:
  - and than pure gold
  - and than refined gold
  lexicon: HALOT
  rationale: פָּז denotes especially pure or fine gold. 'Even fine gold' captures
    the intensifying force after the first mention of gold and reads idiomatically
    in English.
- source_word: וּתְבוּאָתִי
  chosen: and my yield
  alternatives:
  - and my produce
  - and my revenue
  - and my harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce, yield, or income. In parallel with 'my fruit,'
    'my yield' preserves the agricultural metaphor while sounding natural in modern
    English.
- source_word: מִכֶּסֶף נִבְחָר
  chosen: than choice silver
  alternatives:
  - than selected silver
  - than finest silver
  lexicon: HALOT
  rationale: נִבְחָר means chosen/choice. The phrase denotes high-quality silver;
    'choice silver' is concise and preserves the adjectival nuance without paraphrase.
