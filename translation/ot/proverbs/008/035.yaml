id: PRO.8.35
reference: Proverbs 8:35
source:
  edition: WLC
  text: כִּ֣י מֹ֭צְאִ/י מצאי חַיִּ֑ים וַ/יָּ֥פֶק רָ֝צ֗וֹן מֵ/יְהוָֽה׃
translation:
  text: For whoever finds me finds life and obtains favor from the LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation. 'For'
    fits the discourse flow in English better than 'because' here.
- source_word: מֹצְאִי
  chosen: whoever finds me
  alternatives:
  - he who finds me
  - the one finding me
  lexicon: HALOT
  rationale: The form means 'my finder' or 'the one who finds me,' with first-person
    suffix referring to personified Wisdom. 'Whoever finds me' conveys the generic
    force naturally in modern English while preserving the singular sense.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as 'life.' Singular English is the natural equivalent in wisdom literature.
- source_word: וַיָּפֶק
  chosen: obtains
  alternatives:
  - draws forth
  - secures
  - receives
  lexicon: HALOT
  rationale: The verb can mean to bring out or obtain. In this context with רָצוֹן
    מֵיְהוָה, 'obtains' best expresses the result of finding Wisdom in idiomatic English
    without overstating agency.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  - delight
  lexicon: HALOT
  rationale: In context it denotes divine favor or goodwill granted by YHWH. 'Favor'
    is concise, idiomatic, and preserves the relational sense.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'The preposition marks source: the favor comes from YHWH. Per doctrine
    guidelines, יְהוָה is rendered ''the LORD'' rather than transliterated.'
