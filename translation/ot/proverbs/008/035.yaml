theological_decisions:
- issue: Rendering of the generic singular in a personified-Wisdom context
  chosen_reading: whoever finds me
  alternative_readings:
  - he who finds me
  - the one who finds me
  rationale: The Hebrew singular is generic, not restricted to males. 'Whoever' preserves
    the universal invitation without importing a male-specific limitation, while still
    reflecting the singular construction in natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the divine name is 'the LORD.' This follows the
    stated policy and preserves continuity with Jewish reverence practice and the
    Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
