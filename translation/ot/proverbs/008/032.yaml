theological_decisions:
- issue: Gendered address in wisdom instruction
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The masculine plural form is retained in the main text to reflect the
    source wording and the conventional pedagogical address of Proverbs, in keeping
    with the translation's gender-accurate policy. An inclusive alternative is worth
    preserving in a footnote because the instruction is not limited in application
    to males.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
