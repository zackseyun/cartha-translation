id: PRO.8.34
reference: Proverbs 8:34
source:
  edition: WLC
  text: אַ֥שְֽׁרֵי אָדָם֮ שֹׁמֵ֪עַֽ֫ לִ֥/י לִ/שְׁקֹ֣ד עַל דַּ֭לְתֹתַ/י י֤וֹם י֑וֹם
    לִ֝/שְׁמֹ֗ר מְזוּזֹ֥ת פְּתָחָֽ/י־׀׃
translation:
  text: Blessed is the man who listens to me, watching at my doors day by day, keeping
    watch at the doorposts of my entrances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the man' uses a singular masculine form with generic force, referring
      to any person who listens to Wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  lexicon: HALOT
  rationale: The interjection/noun expresses a state of blessedness or flourishing.
    'Blessed is' preserves the beatitude-like force better than the weaker 'happy
    is,' especially in wisdom literature.
- source_word: אָדָם
  chosen: the man
  alternatives:
  - a man
  - humankind
  - the person
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here the singular
    generic refers representatively to any human who heeds Wisdom; 'the man' preserves
    the Hebrew singular and proverbial style better than a pluralized or gender-neutral
    paraphrase.
- source_word: שֹׁמֵעַ לִי
  chosen: who listens to me
  alternatives:
  - hearing me
  - obeying me
  lexicon: HALOT
  rationale: The participle with ל marks ongoing attentive listening to personified
    Wisdom. 'Listens to me' is idiomatic and preserves the auditory metaphor without
    over-interpreting it as full 'obeying,' though obedience is implied.
- source_word: לִשְׁקֹד
  chosen: watching
  alternatives:
  - keeping watch
  - being vigilant
  - waiting eagerly
  lexicon: HALOT
  rationale: The infinitive conveys vigilant, eager attentiveness. 'Watching' fits
    the doorway imagery and pairs naturally with the following locative phrase. The
    nuance of diligence is retained by the broader clause.
- source_word: עַל דַּלְתֹתַי
  chosen: at my doors
  alternatives:
  - by my doors
  - over my doors
  lexicon: HALOT
  rationale: With עַל in this idiom, English 'at' best conveys position in attendance
    at Wisdom's doors. 'Doors' is more natural than the more architectural 'door leaves'
    while remaining faithful.
- source_word: יוֹם יוֹם
  chosen: day by day
  alternatives:
  - daily
  - day after day
  lexicon: HALOT
  rationale: The repetition emphasizes continual regularity. 'Day by day' preserves
    the iterative feel more transparently than the compressed adverb 'daily.'
- source_word: לִשְׁמֹר
  chosen: keeping watch
  alternatives:
  - guarding
  - observing
  - watching
  lexicon: HALOT
  rationale: The verb commonly means keep, guard, watch. In parallel with 'watching
    at my doors,' 'keeping watch' avoids implying defensive guarding and maintains
    the image of attentive waiting.
- source_word: מְזוּזוֹת
  chosen: the doorposts
  alternatives:
  - the doorframes
  - the posts
  lexicon: HALOT
  rationale: The noun denotes doorposts/jambs. 'Doorposts' is the standard clear English
    equivalent and preserves the concrete architectural image.
- source_word: פְּתָחַי
  chosen: of my entrances
  alternatives:
  - of my doorway
  - of my entryways
  - of my gates
  lexicon: HALOT
  rationale: The noun refers to openings/entrances. 'Entrances' preserves the plural
    and avoids collapsing it into the same term as 'doors,' allowing the Hebrew parallelism
    to remain visible in English.
