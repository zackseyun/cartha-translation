theological_decisions:
- issue: Generic masculine in wisdom beatitude
  chosen_reading: the man
  alternative_readings:
  - the person
  - anyone
  rationale: The Hebrew singular masculine אָדָם is representative/generic, not restricted
    to males. Following the doctrine's gender-accurate principle, the translation
    keeps 'the man' in the main text while recognizing inclusive force in a footnote.
