id: PRO.8.14
reference: Proverbs 8:14
source:
  edition: WLC
  text: לִֽ/י עֵ֭צָה וְ/תוּשִׁיָּ֑ה אֲנִ֥י בִ֝ינָ֗ה לִ֣/י גְבוּרָֽה־׃
translation:
  text: Counsel and sound wisdom are mine; I am understanding; strength is mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Counsel and effective wisdom are mine; I am insight; might is mine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - advice
  - plan
  lexicon: HALOT
  rationale: In wisdom literature, עֵצָה commonly denotes counsel or prudent guidance
    rather than merely casual advice. 'Counsel' preserves the elevated, personified
    voice of Wisdom.
- source_word: תוּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - success
  - resourcefulness
  - effectual wisdom
  lexicon: HALOT
  rationale: The noun can denote effective wisdom, competence, or sound judgment.
    'Sound wisdom' is a natural English rendering in Proverbs and captures both solidity
    and practical efficacy without over-specifying material success.
- source_word: אֲנִי בִינָה
  chosen: I am understanding
  alternatives:
  - I am insight
  - I am discernment
  lexicon: HALOT
  rationale: 'The verbless clause identifies Wisdom with בִּינָה. ''Understanding''
    is the most idiomatic and established English equivalent here, preserving the
    predicative force: Wisdom is not merely possessing understanding but embodying
    it.'
- source_word: גְּבוּרָה
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: The term can mean strength, might, or valor. In this list of qualities
    possessed by personified Wisdom, 'strength' is broad and idiomatic, avoiding an
    overly martial nuance that 'valor' might suggest.
- source_word: לִי ... לִי
  chosen: are mine ... is mine
  alternatives:
  - belong to me
  - I have
  lexicon: HALOT
  rationale: The repeated לִי marks possession emphatically. Rendering with 'are mine'/'is
    mine' preserves the poetic emphasis better than the flatter 'I have'.
