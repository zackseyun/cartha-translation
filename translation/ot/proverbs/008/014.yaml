theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain first-person self-description of Wisdom without importing
    later christological identification into the translation.
  alternative_readings:
  - Interpret as a direct christological statement in translation
  rationale: Proverbs 8 presents Wisdom as personified and speaking in the first person.
    The translation should preserve that literary-theological presentation without
    resolving broader interpretive debates beyond the Hebrew text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
