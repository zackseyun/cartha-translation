id: PRO.8.15
reference: Proverbs 8:15
source:
  edition: WLC
  text: בִּ֭/י מְלָכִ֣ים יִמְלֹ֑כוּ וְ֝/רוֹזְנִ֗ים יְחֹ֣קְקוּ צֶֽדֶק׃
translation:
  text: By me kings reign, and rulers decree what is just.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through me kings reign.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and nobles/princes decree justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  chosen: By me
  alternatives:
  - through me
  - in me
  lexicon: HALOT
  rationale: 'The preposition ב with 1cs suffix here expresses agency/instrumentality
    in Wisdom''s speech: kings reign by means of or through Wisdom. ''By me'' is concise,
    idiomatic, and preserves the source''s directness.'
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for monarchs. 'Kings' is the plain
    and natural English equivalent.
- source_word: יִמְלֹכוּ
  chosen: reign
  alternatives:
  - rule
  - be kings
  lexicon: HALOT
  rationale: The verb from מלך denotes exercising royal rule. 'Reign' fits well with
    'kings' and preserves the royal nuance better than the more generic 'rule'.
- source_word: וְרֹזְנִים
  chosen: rulers
  alternatives:
  - princes
  - nobles
  lexicon: HALOT
  rationale: רֹזְנִים refers to high officials or dignitaries who govern. 'Rulers'
    is broad enough for modern English and fits the parallelism with 'kings' without
    sounding archaic like 'princes'.
- source_word: יְחֹקְקוּ
  chosen: decree
  alternatives:
  - legislate
  - ordain
  - enact
  lexicon: HALOT
  rationale: From חקק in this context of governance, the sense is establishing or
    prescribing law/justice. 'Decree' is idiomatic with political authorities and
    preserves the authoritative force without over-specifying a modern legislative
    process.
- source_word: צֶדֶק
  chosen: what is just
  alternatives:
  - justice
  - righteousness
  - just decrees
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness, justice, or what is right. Here, after
    'decree,' the English phrase 'what is just' reads naturally and conveys the object
    of their decreeing. 'Justice' is possible, but 'decree justice' is less idiomatic
    in English; 'righteousness' sounds less natural in a civic-legal context.
