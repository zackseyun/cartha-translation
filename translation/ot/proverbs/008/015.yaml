theological_decisions:
- issue: Whether to render the verse as a claim of Wisdom's enabling role in political
    authority without importing a doctrine of automatic moral legitimacy for all rulers
  chosen_reading: The verse states that kings reign and rulers decree justly by means
    of Wisdom, without implying that every actual ruler always governs justly.
  alternative_readings:
  - A stronger providential reading that all political authority is directly legitimated
    here
  - A moralized reading that all rulers in view necessarily issue righteous decrees
  rationale: In context, personified Wisdom describes her indispensable role in right
    governance. The translation preserves the positive ideal of wise rule while avoiding
    an overstatement that the text itself does not make about every ruler in practice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
