theological_decisions:
- issue: Rendering Wisdom's origin language in a way that preserves poetic personification
    without importing later doctrinal conclusions
  chosen_reading: I was brought forth
  alternative_readings:
  - I was born
  - I was begotten
  rationale: Because Proverbs 8 is later used in theological debates, especially Christological
    ones, the translation should reflect the Hebrew imagery of origination while not
    overstating it. 'I was brought forth' preserves the metaphor and leaves the text's
    poetic-theological tension intact better than 'begotten,' which can sound more
    dogmatically loaded in English, or 'born,' which may sound too biologically literal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
