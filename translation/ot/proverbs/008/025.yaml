id: PRO.8.25
reference: Proverbs 8:25
source:
  edition: WLC
  text: בְּ/טֶ֣רֶם הָרִ֣ים הָטְבָּ֑עוּ לִ/פְנֵ֖י גְבָע֣וֹת חוֹלָֽלְתִּי׃
translation:
  text: Before the mountains were settled, before the hills, I was brought forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was born' or 'I was begotten.' The Hebrew uses birth/origin imagery
      for personified Wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - ere
  - before that
  lexicon: HALOT
  rationale: Temporal marker introducing a prior action/state. 'Before' is the natural
    modern English equivalent and fits the parallel structure of the verse.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for mountains. The article is naturally
    represented in English by 'the' in this poetic cosmological context.
- source_word: הָטְבָּעוּ
  chosen: were settled
  alternatives:
  - were sunk down
  - were fixed
  - were established
  lexicon: HALOT
  rationale: Passive perfect/pluperfect-like sense from טבע in the Hophal, likely
    describing the mountains as being set firmly in place. 'Were settled' communicates
    emplacement in creation without over-literal awkwardness. 'Established' is possible
    but less tied to the imagery of being embedded/fixed.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - prior to
  lexicon: HALOT
  rationale: Here the preposition is temporal, not spatial, in parallel with בטרם.
    'Before' preserves the poetic repetition and temporal force.
- source_word: גְבָעוֹת
  chosen: the hills
  alternatives:
  - hills
  lexicon: HALOT
  rationale: Common poetic parallel to 'mountains.' 'The hills' reads naturally in
    English and preserves the paired topographical imagery.
- source_word: חוֹלָלְתִּי
  chosen: I was brought forth
  alternatives:
  - I was born
  - I was formed
  - I was begotten
  lexicon: HALOT
  rationale: In Proverbs 8, Wisdom speaks in highly figurative, personified language
    about origin prior to creation. The passive-like English 'I was brought forth'
    best preserves the birth/origin imagery without forcing a narrower biological
    sense ('born') or a stronger theological claim ('begotten') than the Hebrew itself
    requires.
