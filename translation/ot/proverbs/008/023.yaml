id: PRO.8.23
reference: Proverbs 8:23
source:
  edition: WLC
  text: מֵ֭/עוֹלָם נִסַּ֥כְתִּי מֵ/רֹ֗אשׁ מִ/קַּדְמֵי אָֽרֶץ־׃
translation:
  text: From everlasting I was established, from the beginning, from before the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was set up'; the Hebrew verb is debated and has also been understood
      as 'I was installed' or, less likely here, 'I was anointed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעוֹלָם
  chosen: From everlasting
  alternatives:
  - From eternity
  - From ancient times
  - From of old
  lexicon: HALOT
  rationale: עוֹלָם can denote remote antiquity or eternity depending on context.
    In Wisdom's pre-creation setting, 'from everlasting' best preserves the elevated
    temporal scope without over-paraphrasing.
- source_word: נִסַּכְתִּי
  chosen: I was established
  alternatives:
  - I was set up
  - I was installed
  - I was anointed
  lexicon: HALOT
  rationale: The Niphal of נסך here is debated. In context, Wisdom speaks of her appointment
    prior to creation. 'Established' communicates being set in place or appointed
    and reads naturally in modern English. 'Set up' is more traditional and possible;
    'anointed' reflects another possible semantic line but is less likely in this
    context and could import messianic overtones not demanded by the text.
- source_word: מֵרֹאשׁ
  chosen: from the beginning
  alternatives:
  - from the first
  - from the outset
  - from the head/start
  lexicon: HALOT
  rationale: רֹאשׁ in temporal expressions commonly means 'beginning' or 'first.'
    'From the beginning' is idiomatic English and fits the parallel temporal phrases.
- source_word: מִקַּדְמֵי אָרֶץ
  chosen: from before the earth
  alternatives:
  - before the earth existed
  - from the earliest times of the earth
  - before the land
  lexicon: HALOT
  rationale: קַדְמֵי conveys what is prior or ancient, and with אָרֶץ here the sense
    is pre-creation priority relative to the earth. 'From before the earth' keeps
    the compact Hebrew force while remaining intelligible. 'Earth' is preferable to
    'land' in this cosmic context.
