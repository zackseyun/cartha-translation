theological_decisions:
- issue: Potential christological overreading of personified Wisdom
  chosen_reading: Translate the verse as personified Wisdom speaking of pre-creation
    establishment without importing explicit messianic or Trinitarian terminology.
  alternative_readings:
  - Render נִסַּכְתִּי as 'anointed,' which may encourage a messianic reading
  rationale: Historic Christian theology may read Proverbs 8 in relation to the Son
    typologically, but the translation should reflect the Hebrew text's immediate
    literary sense. Therefore the wording avoids doctrinally loaded language not required
    by the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
