id: PRO.8.1
reference: Proverbs 8:1
source:
  edition: WLC
  text: הֲ/לֹֽא חָכְמָ֥ה תִקְרָ֑א וּ֝/תְבוּנָ֗ה תִּתֵּ֥ן קוֹלָֽ/הּ־׃
translation:
  text: Does not wisdom call, and understanding raise her voice?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry out' for 'call.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'give her voice'; the Hebrew idiom means 'raise her voice' or
      'speak out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Does not
  alternatives:
  - Is it not that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative response. 'Does
    not' preserves the interrogative force more transparently than the more interpretive
    'surely'.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of the noun. In Proverbs 8 wisdom is personified as
    a woman, so the abstract noun is retained while later feminine pronouns in English
    reflect the Hebrew grammar and literary personification.
- source_word: תִקְרָא
  chosen: call
  alternatives:
  - cry out
  - proclaim
  lexicon: HALOT
  rationale: Qal of קרא commonly means 'call' or 'cry out.' 'Call' fits the parallelism
    and keeps the line natural in English without overstating volume.
- source_word: וּתְבוּנָה
  chosen: and understanding
  alternatives:
  - and insight
  - and discernment
  lexicon: HALOT
  rationale: תבונה denotes understanding or discernment. 'Understanding' is the most
    direct and conventional equivalent and pairs well with 'wisdom' in English.
- source_word: תִּתֵּן קוֹלָהּ
  chosen: raise her voice
  alternatives:
  - give her voice
  - lift up her voice
  - utter her voice
  lexicon: HALOT
  rationale: Literally 'give her voice,' an idiom meaning to speak out or raise one's
    voice. 'Raise her voice' is idiomatic modern English that preserves the vividness
    and personification better than the wooden literalism 'give her voice.'
