theological_decisions:
- issue: Personification of wisdom and understanding
  chosen_reading: Retain feminine personification with 'her voice' while translating
    the nouns as abstract qualities ('wisdom,' 'understanding').
  alternative_readings:
  - Depersonalize as 'its voice'
  - Capitalize as 'Wisdom' to suggest a more developed theological identification
  rationale: The Hebrew grammar is feminine and the literary context personifies wisdom
    as a woman calling publicly. Using 'her' preserves the text's imagery without
    importing a stronger theological identification than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
