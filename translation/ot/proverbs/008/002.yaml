theological_decisions:
- issue: Personification of Wisdom as feminine
  chosen_reading: Retain feminine pronoun 'she' for Wisdom
  alternative_readings:
  - Repeat 'Wisdom' without pronoun
  - Use a gender-neutral rendering
  rationale: The Hebrew verb is feminine singular, matching the personified figure
    of Wisdom in the immediate context. Retaining 'she' preserves the literary form
    of the passage without importing further theological claims.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
