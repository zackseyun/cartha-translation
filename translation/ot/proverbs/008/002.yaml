id: PRO.8.2
reference: Proverbs 8:2
source:
  edition: WLC
  text: בְּ/רֹאשׁ מְרוֹמִ֥ים עֲלֵי דָ֑רֶךְ בֵּ֖ית נְתִיב֣וֹת נִצָּֽבָה־־׃
translation:
  text: On the heights beside the road, at the crossroads she takes her stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'at the house of paths'—that is, where paths meet.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רֹאשׁ
  chosen: On the heights
  alternatives:
  - At the top
  - On the summit
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head' or 'top,' but in this locative expression
    with מְרוֹמִים it idiomatically refers to the topmost or prominent place. Rendering
    the phrase as 'On the heights' gives natural English while preserving the elevated
    setting.
- source_word: מְרוֹמִים
  chosen: heights
  alternatives:
  - high places
  - elevated places
  lexicon: HALOT
  rationale: The noun denotes elevated locations. 'Heights' is concise, natural, and
    fits the poetic imagery of Wisdom positioning herself where she can be seen and
    heard.
- source_word: עֲלֵי דָרֶךְ
  chosen: beside the road
  alternatives:
  - by the way
  - along the road
  - above the road
  lexicon: HALOT
  rationale: The preposition with דָרֶךְ marks location relative to a road or way.
    'Beside the road' best captures the public, accessible setting in idiomatic modern
    English. 'By the way' is possible but sounds archaic or potentially misleading
    in contemporary English.
- source_word: בֵּית נְתִיבוֹת
  chosen: at the crossroads
  alternatives:
  - at the meeting of the paths
  - where the paths meet
  lexicon: HALOT
  rationale: Literally 'house of paths,' an idiom for the place where paths converge.
    'At the crossroads' is the clearest natural equivalent in English and preserves
    the image of intersecting routes.
- source_word: נִצָּבָה
  chosen: she takes her stand
  alternatives:
  - she stands
  - she stations herself
  lexicon: HALOT
  rationale: The Niphal form conveys a deliberate standing or positioning. 'She takes
    her stand' reflects the stative/resultative sense with an active rhetorical force
    appropriate to personified Wisdom.
