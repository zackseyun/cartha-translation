theological_decisions:
- issue: Rendering of קָנָנִי in a verse historically used in christological debates
  chosen_reading: possessed me
  alternative_readings:
  - created me
  - acquired me
  - brought me forth
  rationale: Because the translation must preserve theological tension rather than
    resolve it, and because Proverbs 8 personifies Wisdom rather than directly naming
    the Son, the main text should not choose a rendering primarily to support or avoid
    a later doctrinal argument. 'Possessed me' reflects a strong lexical option and
    avoids overstating a creation sense in the main text, while the historically important
    alternative 'created me' is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed 381 AD,
    including homoousios language)
