id: PRO.8.22
reference: Proverbs 8:22
source:
  edition: WLC
  text: יְֽהוָ֗ה קָ֭נָ/נִי רֵאשִׁ֣ית דַּרְכּ֑/וֹ קֶ֖דֶם מִפְעָלָ֣י/ו מֵ/אָֽז׃
translation:
  text: The LORD possessed me at the beginning of his way, before his works of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD created me' or 'The LORD acquired me.' The Hebrew verb can
      carry more than one sense, and this verse has been central in historical debates
      about personified Wisdom and its relation to the Son.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH as 'the
    LORD,' preserving established covenantal usage in English while respecting the
    doctrine file's contested-terms guidance.
- source_word: קָנָנִי
  chosen: possessed me
  alternatives:
  - created me
  - acquired me
  - brought me forth
  lexicon: HALOT
  rationale: The verb קנה can mean 'acquire, possess,' and in some contexts 'create.'
    In Proverbs 8:22, where Wisdom is personified, 'possessed me' best preserves the
    lexical range without forcing the more theologically loaded 'created me.' Because
    this verse has major christological significance in historical interpretation,
    the alternative 'created me' is preserved in a footnote rather than adopted in
    the main text.
- source_word: רֵאשִׁית
  chosen: the beginning
  alternatives:
  - first
  - beginning part
  - chief part
  lexicon: HALOT
  rationale: Here רֵאשִׁית functions naturally as a temporal expression with the following
    phrase, indicating the start or beginning of the LORD's way/activity.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: A straightforward rendering of דרך with the 3ms suffix. 'Way' is broad
    enough to include God's ordered activity or course without over-interpreting it.
- source_word: קֶדֶם
  chosen: before
  alternatives:
  - formerly
  - from of old
  - in front of
  lexicon: HALOT
  rationale: 'In this construction with מִפְעָלָיו and מֵאָז, the sense is temporal
    priority: Wisdom existed before God''s works. English ''before'' communicates
    this clearly.'
- source_word: מִפְעָלָיו
  chosen: his works
  alternatives:
  - his deeds
  - his works made
  lexicon: HALOT
  rationale: Refers to what God has made or done. 'Works' is concise and idiomatic
    in English, fitting the creation-oriented context.
- source_word: מֵאָז
  chosen: of old
  alternatives:
  - from then
  - from long ago
  - from ancient times
  lexicon: HALOT
  rationale: This adverbial expression marks remote antiquity. 'Of old' is natural
    in English and pairs well with 'before his works' to express primordial precedence.
