theological_decisions:
- issue: Cosmological imagery in Wisdom's speech
  chosen_reading: Render the verse as poetic description of Wisdom's presence during
    creation without importing later doctrinal conclusions into the translation.
  alternative_readings:
  - Translate in a way that more strongly suggests a specific cosmological model such
    as 'horizon' or 'vault'
  - Translate in a way that foregrounds later christological interpretation of Wisdom
  rationale: The verse belongs to personified Wisdom's creation speech. The translation
    should preserve the poetic imagery and theological openness of the Hebrew text
    without resolving broader interpretive debates beyond what the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
