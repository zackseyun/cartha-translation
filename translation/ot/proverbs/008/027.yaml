id: PRO.8.27
reference: Proverbs 8:27
source:
  edition: WLC
  text: בַּ/הֲכִינ֣/וֹ שָׁ֭מַיִם שָׁ֣ם אָ֑נִי בְּ/ח֥וּק/וֹ ח֝֗וּג עַל פְּנֵ֥י תְהֽוֹם־׃
translation:
  text: When he established the heavens, I was there, when he inscribed a circle on
    the face of the deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marked out a circle'; the Hebrew may evoke the horizon or a circular
      boundary over the waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהֲכִינוֹ
  chosen: when he established
  alternatives:
  - when he prepared
  - in his establishing
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct with pronominal suffix is temporal
    here: ''when he established/prepared.'' ''Established'' fits cosmological creation
    context in English better than the more generic ''prepared,'' while preserving
    the verbal sense of setting in order or making firm.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: In creation/cosmic context the plural Hebrew is best represented by the
    conventional English 'the heavens,' which preserves the elevated register and
    scope better than 'sky.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - then
  lexicon: HALOT
  rationale: The adverb is locative, not merely temporal. 'There' naturally conveys
    Wisdom's presence at creation.
- source_word: אָ֑נִי
  chosen: I was
  alternatives:
  - I am
  lexicon: HALOT
  rationale: Although the Hebrew explicitly has only the pronoun 'I,' English idiom
    requires a supplied copula. In this narrative recollection of primordial creation,
    'I was there' is the most natural and contextually appropriate rendering.
- source_word: בְּחֻקוֹ
  chosen: when he inscribed
  alternatives:
  - when he marked out
  - when he decreed
  - in his inscribing
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of חקק/חוק here denotes the
    act of marking out or prescribing. Given the object 'a circle' and the cosmological
    image, 'inscribed' best captures the concrete imagery of tracing a boundary, while
    'decreed' would sound too abstract.
- source_word: חוּג
  chosen: a circle
  alternatives:
  - the horizon
  - a vault
  lexicon: HALOT
  rationale: The noun denotes a circle or circuit. In this poetic creation image,
    'a circle' is the most direct rendering. 'Horizon' is interpretive and may be
    implied, but the Hebrew image itself is geometric and should be preserved in the
    main text.
- source_word: עַל־פְּנֵי
  chosen: on the face of
  alternatives:
  - over the surface of
  - upon
  lexicon: HALOT
  rationale: This common Hebrew expression literally means 'on the face/surface of.'
    Retaining 'face of' preserves the poetic texture, while remaining intelligible
    in modern English.
- source_word: תְהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the primeval deep
  lexicon: HALOT
  rationale: '''The deep'' is the standard and natural English equivalent for the
    primordial waters. ''Abyss'' is possible but can import later theological associations
    not explicit here.'
