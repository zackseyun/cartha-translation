id: PRO.8.3
reference: Proverbs 8:3
source:
  edition: WLC
  text: לְ/יַד שְׁעָרִ֥ים לְ/פִי קָ֑רֶת מְב֖וֹא פְתָחִ֣ים תָּרֹֽנָּה־־׃
translation:
  text: Beside the gates, at the mouth of the city, at the entrance of the doorways,
    she cries out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the opening of the city.' The Hebrew literally reads 'at the mouth
      of the city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she calls aloud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְיַד
  chosen: Beside
  alternatives:
  - By
  - At the side of
  lexicon: HALOT
  rationale: The preposition with יָד idiomatically means 'beside' or 'at the side
    of.' 'Beside' is concise and natural in English while preserving the locative
    sense.
- source_word: שְׁעָרִים
  chosen: the gates
  alternatives:
  - gates
  lexicon: HALOT
  rationale: Refers to city gates, a public place of gathering and judgment in wisdom
    literature. The article is supplied naturally in English for a specific civic
    setting.
- source_word: לְפִי
  chosen: at the mouth of
  alternatives:
  - at the opening of
  - at the entrance to
  lexicon: HALOT
  rationale: Literally 'at the mouth of.' Retaining 'mouth' preserves the Hebrew imagery
    and parallelism with the surrounding locative phrases, while remaining understandable
    in English.
- source_word: קָרֶת
  chosen: the city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The noun denotes a town or city. 'City' fits the urban-gate setting and
    is the more standard rendering in this context.
- source_word: מְבוֹא
  chosen: entrance
  alternatives:
  - entry
  - approach
  lexicon: HALOT
  rationale: Denotes a place of entering. 'Entrance' is the clearest modern English
    equivalent and matches the spatial sequence of the verse.
- source_word: פְתָחִים
  chosen: the doorways
  alternatives:
  - the doors
  - the entrances
  lexicon: HALOT
  rationale: Plural of 'opening/doorway.' 'Doorways' avoids redundancy with מְבוֹא
    while preserving the concrete image of access points.
- source_word: תָּרֹנָּה
  chosen: she cries out
  alternatives:
  - she calls aloud
  - she shouts
  lexicon: HALOT
  rationale: From רנן/רנן-related verbal usage here in context of public proclamation.
    Given the parallel with Wisdom's speech in the surrounding verses, 'she cries
    out' best conveys loud public calling without over-specifying emotional tone.
