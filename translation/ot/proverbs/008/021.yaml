id: PRO.8.21
reference: Proverbs 8:21
source:
  edition: WLC
  text: לְ/הַנְחִ֖יל אֹהֲבַ֥/י יֵ֑שׁ וְ/אֹצְרֹ֖תֵי/הֶ֣ם אֲמַלֵּֽא׀׃פ
translation:
  text: to endow those who love me with wealth, and to fill their treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to cause those who love me to inherit substance'; Hebrew יֵשׁ can also
      be rendered 'substance' or 'possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַנְחִיל
  chosen: to endow
  alternatives:
  - to cause to inherit
  - to give as an inheritance
  - to bequeath
  lexicon: HALOT
  rationale: The Hiphil of נחל means to cause someone to inherit or to give possession.
    In English, 'endow' captures the benefactive sense smoothly in this poetic context
    while preserving the idea of granting substantial possession. 'Cause to inherit'
    is more formally literal but less idiomatic here.
- source_word: אֹהֲבַי
  chosen: those who love me
  alternatives:
  - my lovers
  - my friends who love me
  lexicon: HALOT
  rationale: The participial form with 1cs suffix denotes people characterized by
    loving Wisdom. 'Those who love me' is the most natural and accurate rendering
    in English.
- source_word: יֵשׁ
  chosen: wealth
  alternatives:
  - substance
  - property
  - what exists
  - possessions
  lexicon: HALOT
  rationale: In wisdom literature, יֵשׁ can denote substantial goods or real possessions,
    not merely abstract 'existence.' Here, paired with 'treasuries,' it points to
    material or substantial riches. 'Wealth' is clear modern English; 'substance'
    is traditional but archaic/ambiguous.
- source_word: וְאֹצְרֹתֵיהֶם
  chosen: their treasuries
  alternatives:
  - their storehouses
  - their treasuries of wealth
  - their treasures
  lexicon: HALOT
  rationale: From אוֹצָר, the term refers to storehouses or treasuries. 'Treasuries'
    preserves the concrete plural image and fits the parallelism with bestowed wealth
    better than the more abstract 'treasures.'
- source_word: אֲמַלֵּא
  chosen: to fill
  alternatives:
  - I fill
  - that I may fill
  - and fill
  lexicon: HALOT
  rationale: The 1cs Piel means 'I fill,' but in context it continues the purpose/result
    sense begun by the prefixed infinitive לְהַנְחִיל. Rendering it as 'to fill' produces
    natural English and reflects the verse's coordinated purpose structure in Wisdom's
    speech.
