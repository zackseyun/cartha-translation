theological_decisions:
- issue: Reciprocal language of Wisdom's love
  chosen_reading: Render the statement as a general reciprocal principle without importing
    later christological or soteriological categories.
  alternative_readings:
  - Read as implying salvific election or covenantal favoritism
  - Read as directly christological in the main text
  rationale: Within Proverbs 8, personified Wisdom speaks poetically. The verse states
    that Wisdom responds favorably to those who love and seek her. The translation
    should preserve that literary-theological register and not load the line with
    doctrinal claims the Hebrew does not explicitly make.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
