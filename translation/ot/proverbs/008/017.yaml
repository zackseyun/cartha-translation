id: PRO.8.17
reference: Proverbs 8:17
source:
  edition: WLC
  text: אֲ֭נִי אהבי/ה אֵהָ֑ב וּ֝/מְשַׁחֲרַ֗/י יִמְצָאֻֽ/נְנִי׃
translation:
  text: I love those who love me, and those who seek me diligently find me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who seek me early find me.' The Hebrew verb can denote seeking
      early, and by extension seeking earnestly or diligently.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun; retained explicitly for
    emphasis at the head of the clause.
- source_word: אֹהֲבַי / אהבי/ה
  chosen: those who love me
  alternatives:
  - my lovers
  - my friends
  lexicon: HALOT
  rationale: 'Participle with 1cs suffix from אהב, functioning substantivally: ''those
    loving me.'' English idiom prefers a relative clause. ''My lovers'' is too erotic
    in English for this wisdom context; ''my friends'' is interpretive and too weak.'
- source_word: אֵהָב
  chosen: I love
  alternatives:
  - I will love
  lexicon: HALOT
  rationale: Qal imperfect 1cs can be habitual/generic or future. In this proverbial
    context, a gnomic present best fits the reciprocal principle being stated.
- source_word: מְשַׁחֲרַי
  chosen: those who seek me diligently
  alternatives:
  - those who seek me early
  - those who seek me earnestly
  lexicon: HALOT
  rationale: Piel participle of שׁחר with 1cs suffix. The verb can carry the concrete
    sense 'seek early' and, by extension, 'seek diligently/earnestly.' In English,
    'seek diligently' best conveys the idiomatic force without sounding temporally
    narrow; the more literal 'early' is preserved in a footnote.
- source_word: יִמְצָאֻנְנִי
  chosen: find me
  alternatives:
  - will find me
  lexicon: HALOT
  rationale: Qal imperfect 3mp + 1cs suffix. In parallel with the first colon and
    in proverbial style, present gnomic English ('find me') communicates the general
    truth more naturally than a simple future.
