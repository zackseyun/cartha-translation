id: PRO.8.6
reference: Proverbs 8:6
source:
  edition: WLC
  text: שִׁ֭מְעוּ כִּֽי נְגִידִ֣ים אֲדַבֵּ֑ר וּ/מִפְתַּ֥ח שְׂ֝פָתַ֗/י מֵישָׁרִֽים־׃
translation:
  text: Listen, for I will speak noble things, and the opening of my lips will be
    upright things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'excellent things' for 'noble things.' The Hebrew term is related to
      what is princely or noble, hence speech of high worth.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is right' for 'upright things.' The Hebrew denotes straightness
      or uprightness in a moral sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is natural modern English and preserves
    the call to attentive hearing better than the more archaic-sounding 'Hear.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the imperative: the audience should
    listen because Wisdom is about to speak. ''For'' best captures that explanatory
    force in concise English.'
- source_word: נְגִידִים
  chosen: noble things
  alternatives:
  - excellent things
  - princely things
  lexicon: HALOT
  rationale: The noun can denote leaders/princes, but in this poetic context it functions
    idiomatically for speech of high worth or noble character. 'Noble things' preserves
    the elevated sense without forcing a literal personal reference. 'Excellent things'
    is possible and traditional, but 'noble' better reflects the underlying association
    with princely dignity.
- source_word: אֲדַבֵּר
  chosen: I will speak
  alternatives:
  - I speak
  lexicon: HALOT
  rationale: Imperfect 1cs of דבר. In context it expresses imminent or characteristic
    future speech following the imperative, so 'I will speak' is the most natural
    English rendering.
- source_word: וּמִפְתַּח שְׂפָתַי
  chosen: the opening of my lips
  alternatives:
  - the utterance of my lips
  - what comes from my lips
  lexicon: HALOT
  rationale: Literally 'the opening of my lips.' Retaining the image preserves the
    poetic parallelism with the first colon while remaining understandable in English.
- source_word: מֵישָׁרִים
  chosen: upright things
  alternatives:
  - what is right
  - straight things
  lexicon: HALOT
  rationale: The term denotes straightness/uprightness and by extension moral rectitude.
    'Upright things' keeps the plural nominal form and matches the poetic style; 'what
    is right' is smoother but less formally parallel.
