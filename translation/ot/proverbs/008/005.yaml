id: PRO.8.5
reference: Proverbs 8:5
source:
  edition: WLC
  text: הָבִ֣ינוּ פְתָאיִ֣ם עָרְמָ֑ה וּ֝/כְסִילִ֗ים הָבִ֥ינוּ לֵֽב׃
translation:
  text: Learn prudence, you simple ones; and learn understanding, you fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''heart.'' Here ''heart'' refers to the inner faculty of understanding
      and judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִינוּ
  chosen: Learn
  alternatives:
  - Understand
  - Gain understanding
  lexicon: HALOT
  rationale: Imperative plural of בין can mean 'understand, discern, perceive.' In
    English, repeating 'learn' yields a natural imperative that fits the parallel
    exhortation structure of wisdom literature, while still conveying the call to
    acquire discernment.
- source_word: פְתָאיִם
  chosen: simple ones
  alternatives:
  - naive ones
  - the simple
  lexicon: HALOT
  rationale: פתי in Proverbs refers not to the intellectually disabled but to the
    inexperienced, gullible, or naive. 'Simple ones' preserves the established wisdom-category
    and the direct address in the plural.
- source_word: עָרְמָה
  chosen: prudence
  alternatives:
  - shrewdness
  - craftiness
  lexicon: HALOT
  rationale: In Proverbs, ערמה is often positive in wisdom contexts, denoting prudent
    discernment or sensible shrewdness rather than deceit. 'Prudence' best captures
    the commendable quality being urged here.
- source_word: וּכְסִילִים
  chosen: and ... you fools
  alternatives:
  - and fools
  - and dullards
  lexicon: HALOT
  rationale: כסילים is the standard wisdom term for morally obstinate fools. Rendering
    it as 'you fools' preserves the vocative force parallel to 'you simple ones.'
- source_word: הָבִינוּ
  chosen: learn
  alternatives:
  - understand
  - gain understanding
  lexicon: HALOT
  rationale: The second occurrence repeats the imperative. Using 'learn' again preserves
    the Hebrew repetition and keeps the English parallelism clear.
- source_word: לֵב
  chosen: understanding
  alternatives:
  - heart
  - sense
  lexicon: HALOT
  rationale: Although לב literally means 'heart,' in Hebrew anthropology it often
    denotes the inner faculty of thought, judgment, and discernment. Here 'understanding'
    communicates the functional sense in context. The more literal 'heart' is preserved
    in a footnote because it is a significant lexical alternative.
