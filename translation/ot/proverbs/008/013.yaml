id: PRO.8.13
reference: Proverbs 8:13
source:
  edition: WLC
  text: יִֽרְאַ֣ת יְהוָה֮ שְֽׂנֹ֫את רָ֥ע גֵּ֘אָ֤ה וְ/גָא֨וֹן וְ/דֶ֣רֶךְ רָ֭ע וּ/פִ֨י
    תַהְפֻּכ֬וֹת שָׂנֵֽאתִי׀׃
translation:
  text: The fear of the LORD is to hate evil; pride and arrogance and the way of evil
    and a mouth of perversions I hate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a perverse mouth' or 'a mouth of crookedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  lexicon: HALOT
  rationale: Construct phrase meaning reverent fear directed toward YHWH. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: שְׂנֹאת
  chosen: is to hate
  alternatives:
  - means hating
  - hates
  lexicon: HALOT
  rationale: 'Infinitive construct functioning predicatively after the subject phrase:
    ''the fear of the LORD is hatred of evil'' / ''is to hate evil.'' ''Is to hate''
    preserves the verbal force in natural English.'
- source_word: רָע
  chosen: evil
  alternatives:
  - what is evil
  - bad
  lexicon: HALOT
  rationale: Moral evil is in view, not merely misfortune or something unpleasant.
- source_word: גֵּאָה
  chosen: pride
  alternatives:
  - haughtiness
  lexicon: HALOT
  rationale: Abstract noun denoting proud self-exaltation. 'Pride' is the most natural
    modern English equivalent.
- source_word: גָאוֹן
  chosen: arrogance
  alternatives:
  - majesty
  - exaltation
  - pride
  lexicon: HALOT
  rationale: In this negative vice list, the term carries the sense of arrogant loftiness
    rather than neutral majesty. 'Arrogance' differentiates it from גֵּאָה while preserving
    the semantic overlap.
- source_word: דֶרֶךְ רָע
  chosen: the way of evil
  alternatives:
  - an evil way
  - the evil path
  lexicon: HALOT
  rationale: Hebrew idiom for a pattern or course of conduct characterized by evil.
    'The way of evil' preserves the metaphor and proverbial style.
- source_word: פִי תַהְפֻּכוֹת
  chosen: a mouth of perversions
  alternatives:
  - a perverse mouth
  - a mouth of crookedness
  lexicon: HALOT
  rationale: Literally 'mouth of perversions/crooked things.' The more literal rendering
    preserves the genitive construction and the plural abstract noun, though English
    remains readable.
- source_word: תַהְפֻּכוֹת
  chosen: perversions
  alternatives:
  - crookedness
  - devious speech
  lexicon: HALOT
  rationale: Plural abstract noun from a root conveying distortion or perversity.
    'Perversions' captures twisted, contrary speech; alternatives are possible and
    worth preserving.
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  lexicon: HALOT
  rationale: 'Qal perfect 1cs, here best rendered as a present gnomic statement in
    Wisdom''s speech: ''I hate.'' This matches English idiom and the parallel vice
    list.'
