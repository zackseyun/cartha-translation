theological_decisions:
- issue: Speaker perspective in Wisdom discourse
  chosen_reading: Retain first-person 'I hate' as Wisdom's direct speech without adding
    interpretive identifiers in the verse text.
  alternative_readings:
  - Interpret the 'I' explicitly as personified Wisdom
  - Interpret the 'I' theologically as the voice of God
  rationale: The Hebrew text itself shifts to first person within Wisdom's speech
    context. Adding 'Wisdom says' or identifying the speaker in the verse would import
    interpretation beyond the wording. The translation preserves the literary-theological
    tension of personified Wisdom speaking.
  doctrine_reference: Preserve theological tension rather than resolve it.
