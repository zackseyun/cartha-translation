id: PRO.20.19
reference: Proverbs 20:19
source:
  edition: WLC
  text: גּֽוֹלֶה סּ֭וֹד הוֹלֵ֣ךְ רָכִ֑יל וּ/לְ/פֹתֶ֥ה שְׂ֝פָתָ֗י/ו לֹ֣א תִתְעָרָֽב־׃
translation:
  text: One who reveals secrets goes about as a slanderer; do not associate with one
    who opens his lips wide.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'goes about gossiping.' The Hebrew רָכִיל can refer to one who spreads
      damaging reports or gossip.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'with one who opens his lips.' The expression refers to a person
      who talks too freely or too much.
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹלֶה
  chosen: reveals
  alternatives:
  - unveils
  - discloses
  lexicon: HALOT
  rationale: Qal participle of גלה here means to uncover or disclose. 'Reveals' is
    natural modern English and fits the proverb's warning about exposing confidential
    matters.
- source_word: סּוֹד
  chosen: secrets
  alternatives:
  - confidential matter
  - counsel
  lexicon: HALOT
  rationale: סוד can denote confidential speech, secret counsel, or intimate deliberation.
    In this context of gossip and betrayal, 'secrets' best captures the practical
    sense for English readers.
- source_word: הוֹלֵךְ רָכִיל
  chosen: goes about as a slanderer
  alternatives:
  - goes about gossiping
  - is a talebearer
  - walks about as a gossip
  lexicon: HALOT
  rationale: The idiom combines 'goes/walks about' with רָכִיל, one who traffics in
    damaging talk. 'Goes about as a slanderer' preserves the movement idiom and the
    harmful character of the speech. 'Gossip' is possible, but 'slanderer' better
    reflects the malicious nuance often carried by רָכִיל.
- source_word: וּלְפֹתֶה
  chosen: with one who opens
  alternatives:
  - with the simple one
  - with one who entices
  - with one who is gullible
  lexicon: HALOT
  rationale: The form is best taken from פתה in the sense of being open, naive, or
    easily led, but in construct with 'his lips' the phrase points to someone who
    opens them freely. Rendering the sense idiomatically as 'one who opens' prepares
    for the following object and avoids an unnatural literalism.
- source_word: שְׂפָתָיו
  chosen: his lips wide
  alternatives:
  - his lips
  - his mouth
  lexicon: HALOT
  rationale: The plural 'his lips' is retained for closeness to the Hebrew. 'Wide'
    is supplied in English to bring out the idiom of loose, excessive speech implied
    by the collocation with פתה.
- source_word: לֹא תִתְעָרָב
  chosen: do not associate
  alternatives:
  - do not mix yourself
  - do not get involved
  - do not keep company
  lexicon: HALOT
  rationale: The Hitpael of ערב here means to mix oneself with, join, or associate
    with someone. 'Do not associate' is clear, idiomatic, and suitably proverbial.
