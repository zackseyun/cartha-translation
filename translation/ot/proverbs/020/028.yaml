id: PRO.20.28
reference: Proverbs 20:28
source:
  edition: WLC
  text: חֶ֣סֶד וֶ֭/אֱמֶת יִצְּרוּ מֶ֑לֶךְ וְ/סָעַ֖ד בַּ/חֶ֣סֶד כִּסְאֽ/וֹ־׃
translation:
  text: Steadfast love and faithfulness preserve a king, and by steadfast love his
    throne is upheld.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truth' for אֱמֶת; in this context the word likely emphasizes reliability
      or faithfulness alongside steadfast love.
    reason: lexical_alternative
  - marker: b
    text: Or 'guard' or 'keep' for 'preserve.'
    reason: lexical_alternative
  - marker: c
    text: The repeated 'steadfast love' translates חֶסֶד in both clauses, preserving
      the Hebrew repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - loyal love
  - kindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and benevolent commitment, stronger
    than mere 'kindness' and broader than 'mercy.' 'Steadfast love' is a well-established
    English rendering that preserves both affection and loyalty.
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: In this pairing with חֶסֶד, אֱמֶת commonly conveys reliability or faithfulness
    rather than abstract propositional 'truth.' 'Faithfulness' best matches the ethical
    quality that preserves royal rule.
- source_word: יִצְּרוּ
  chosen: preserve
  alternatives:
  - guard
  - watch over
  - keep
  lexicon: HALOT
  rationale: The verb נצר in the Qal commonly means to guard, keep, or preserve. In
    context, 'preserve' communicates the sustaining/protective effect of these virtues
    on the king.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The absence of the article in Hebrew supports an indefinite or generic
    sense in a wisdom saying. 'A king' fits the proverbial, generalizing context better
    than a specific 'the king.'
- source_word: סָעַד
  chosen: is upheld
  alternatives:
  - is sustained
  - is supported
  lexicon: HALOT
  rationale: 'The verb סעד denotes support or sustaining. Rendering it passively in
    English reflects the Hebrew clause naturally: the throne receives support through
    steadfast love.'
- source_word: בַּחֶסֶד
  chosen: by steadfast love
  alternatives:
  - through steadfast love
  - with steadfast love
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: steadfast love is the means
    by which the throne is sustained. ''By'' is concise and clear.'
- source_word: כִּסְאוֹ
  chosen: his throne
  lexicon: HALOT
  rationale: Literal rendering of the noun with 3ms suffix. 'Throne' here metonymically
    refers to royal rule, but the concrete image should be preserved in translation.
