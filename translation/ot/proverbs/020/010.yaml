id: PRO.20.10
reference: Proverbs 20:10
source:
  edition: WLC
  text: אֶ֣בֶן וָ֭/אֶבֶן אֵיפָ֣ה וְ/אֵיפָ֑ה תּוֹעֲבַ֥ת יְ֝הוָ֗ה גַּם שְׁנֵי/הֶֽם־׃
translation:
  text: A differing weight and a differing measure—both of them are an abomination to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'stone and stone, ephah and ephah'—that is, differing weights and differing measures used dishonestly in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן
  chosen: weight
  alternatives:
  - stone
  - weight-stone
  lexicon: HALOT
  rationale: Although the noun literally means 'stone,' in commercial contexts it refers to a stone weight used on scales. Rendering it as 'weight' communicates the idiomatic sense in clear English rather than preserving a potentially misleading literalism.
- source_word: וָאֶבֶן
  chosen: a differing weight
  alternatives:
  - one stone and another stone
  - diverse weights
  - double weights
  lexicon: HALOT
  rationale: The repeated noun with conjunction expresses two nonmatching standards. 'A differing weight' captures the sense of discrepancy rather than mere plurality. 'Double weights' is possible idiomatically, but 'differing' is more transparent for modern readers.
- source_word: אֵיפָה
  chosen: measure
  alternatives:
  - ephah
  lexicon: HALOT
  rationale: An ephah is a dry measure, but here the point is not the exact unit but the use of inconsistent measures in trade. 'Measure' preserves the commercial sense in natural English. The more formal 'ephah' would be less accessible and could obscure the proverb's ethical force.
- source_word: וְאֵיפָה
  chosen: a differing measure
  alternatives:
  - one ephah and another ephah
  - diverse measures
  - double measures
  lexicon: HALOT
  rationale: As with the repeated 'stone/weight,' the repetition signals dishonest inconsistency. 'A differing measure' makes explicit the implied contrast between one standard and another.
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: '''Abomination'' is a strong and established rendering for this noun and appropriately conveys moral revulsion before God. It preserves the severity of the Hebrew better than softer alternatives.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גַּם שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - even both of them
  - indeed both
  lexicon: HALOT
  rationale: The phrase emphasizes that both dishonest practices are equally offensive. 'Both of them' is natural English and preserves the inclusive emphasis.
