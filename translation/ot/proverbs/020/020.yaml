id: PRO.20.20
reference: Proverbs 20:20
source:
  edition: WLC
  text: מְ֭קַלֵּל אָבִ֣י/ו וְ/אִמּ֑/וֹ יִֽדְעַ֥ךְ נֵ֝ר֗/וֹ ב/אישון חֹֽשֶׁךְ׃
translation:
  text: Whoever curses his father and his mother—his lamp will be put out in deepest
    darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the pupil of darkness,' a Hebrew idiom for the deepest or
      blackest darkness.
    reason: cultural_note
  - marker: b
    text: Or 'his lamp will go out in utter darkness.' The image of the lamp likely
      symbolizes a person's life, well-being, or future.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקַלֵּל
  chosen: Whoever curses
  alternatives:
  - He who curses
  - One who reviles
  lexicon: HALOT
  rationale: The participle functions substantivally to denote a general person characterized
    by this action. 'Whoever curses' gives natural modern English while preserving
    the proverbial generality. 'Curses' is preferred over 'reviles' because קלל in
    this stem commonly denotes speaking a curse against, especially in parent-honor
    contexts.
- source_word: אָבִיו וְאִמּוֹ
  chosen: his father and his mother
  alternatives:
  - his father or his mother
  lexicon: HALOT
  rationale: The Hebrew conjunction is straightforwardly conjunctive. The singular
    possessive pronouns are retained. 'Father and his mother' preserves the familial
    pair explicitly rather than compressing to 'parents,' which would lose the source
    wording.
- source_word: יִדְעַךְ
  chosen: will be put out
  alternatives:
  - will go out
  - will be extinguished
  lexicon: HALOT
  rationale: The verb means to be extinguished or go out, especially of a lamp. 'Will
    be put out' communicates the result clearly in idiomatic English and fits the
    image of a lamp extinguished under judgment. The passive English also reflects
    the Hebrew's focus on the lamp's extinguishing rather than specifying an agent.
- source_word: נֵרוֹ
  chosen: his lamp
  alternatives:
  - his light
  lexicon: HALOT
  rationale: נֵר is literally 'lamp.' Retaining 'lamp' preserves the concrete metaphor
    common in wisdom literature for life, prosperity, or posterity. 'Light' is possible
    but less precise.
- source_word: בְאִישׁוֹן חֹשֶׁךְ
  chosen: in deepest darkness
  alternatives:
  - in the pupil of darkness
  - in utter darkness
  - in blackest darkness
  lexicon: HALOT
  rationale: The idiom literally involves the 'pupil' or 'apple' of darkness, a Hebrew
    expression for the deepest or blackest darkness. A literal rendering would be
    obscure in English, so the idiomatic sense is brought into the main text. 'Deepest
    darkness' is vivid, readable, and faithful to the superlative force.
