id: PRO.20.2
reference: Proverbs 20:2
source:
  edition: WLC
  text: נַ֣הַם כַּ֭/כְּפִיר אֵ֣ימַת מֶ֑לֶךְ מִ֝תְעַבְּר֗/וֹ חוֹטֵ֥א נַפְשֽׁ/וֹ׃
translation:
  text: The terror of a king is like the growling of a young lion; whoever provokes
    him to anger sins against his own life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The terror of a king is like the roaring of a young lion.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the one provoking him'; the sense is provoking the king to anger.
    reason: lexical_alternative
  - marker: c
    text: Or 'sins against himself' or 'his own soul'; Hebrew nephesh can mean 'life,'
      'self,' or 'soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַהַם
  chosen: growling
  alternatives:
  - roaring
  - snarling
  lexicon: HALOT
  rationale: The noun denotes the sound made by a lion. 'Growling' fits the proverb's
    threatening comparison and works naturally with 'young lion.' 'Roaring' is possible,
    but English often associates a full roar with a mature lion; the Hebrew image
    here is the menacing sound generally.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion
  - fierce lion
  lexicon: HALOT
  rationale: כפיר commonly refers to a young lion, often emphasizing vigor and danger.
    'Young lion' preserves the lexical specificity better than the generic 'lion.'
- source_word: אֵימַת
  chosen: terror
  alternatives:
  - dread
  - fear
  lexicon: HALOT
  rationale: The construct phrase אֵימַת מֶלֶךְ expresses the fearfulness inspired
    by the king. 'Terror' best conveys the intensity of the noun in this warning context.
- source_word: מִתְעַבְּרוֹ
  chosen: whoever provokes him to anger
  alternatives:
  - he who enrages him
  - whoever stirs up his wrath
  - whoever crosses him
  lexicon: HALOT
  rationale: From עבר in the hitpael, the sense here is becoming enraged against or
    provoking wrath in relation to the king. Because the suffix is third masculine
    singular referring to the king, the clause is best rendered idiomatically as causing
    the king's anger to rise. 'Crosses him' is too colloquial and less explicit.
- source_word: חוֹטֵא
  chosen: sins
  alternatives:
  - forfeits
  - does wrong
  lexicon: HALOT
  rationale: The participle of חטא fundamentally means 'sins' or 'misses.' Although
    the consequence is self-destructive, the Hebrew retains moral language, so 'sins'
    should be preserved rather than reduced to mere pragmatism.
- source_word: נַפְשׁוֹ
  chosen: his own life
  alternatives:
  - himself
  - his soul
  lexicon: HALOT
  rationale: נפש in wisdom literature often refers to one's life or self. Here the
    warning concerns mortal danger from provoking royal wrath, so 'his own life' communicates
    the concrete sense better than 'his soul,' while preserving the reflexive force
    with 'own'.
