theological_decisions:
- issue: Anthropology and moral purity claim
  chosen_reading: The verse is rendered as a rhetorical question denying that anyone
    can truthfully claim inward purity and freedom from sin.
  alternative_readings:
  - A merely observational question about rare moral integrity
  rationale: The proverb's parallel lines ('I have made my heart pure' / 'I am clean
    from my sin') present an absolute claim to moral purity. The rhetorical question
    expects the answer 'no one,' and the translation preserves that force without
    adding doctrinal language beyond the text.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
