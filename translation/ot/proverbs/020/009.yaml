id: PRO.20.9
reference: Proverbs 20:9
source:
  edition: WLC
  text: מִֽי יֹ֭אמַר זִכִּ֣יתִי לִבִּ֑/י טָ֝הַ֗רְתִּי מֵ/חַטָּאתִֽ/י־׃
translation:
  text: Who can say, “I have made my heart pure; I am clean from my sin” ?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who says, “I have cleansed my heart; I have purified myself from my
      sin”?' The Hebrew verbs can be rendered more formally to emphasize self-cleansing
      language.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who can
  alternatives:
  - Who
  lexicon: HALOT
  rationale: Interrogative pronoun meaning 'who.' Rendered as 'Who can' in English
    to convey the rhetorical force of the question in natural modern idiom; the Hebrew
    verb 'say' remains explicit afterward.
- source_word: יֹאמַר
  chosen: say
  alternatives:
  - declare
  lexicon: HALOT
  rationale: Common verb 'to say.' 'Say' is the most direct and idiomatic rendering
    here; 'declare' would overstate the formality.
- source_word: זִכִּיתִי
  chosen: I have made ... pure
  alternatives:
  - I have cleansed
  - I am pure
  lexicon: HALOT
  rationale: From זכה in the Piel, conveying making clean/pure rather than merely
    being innocent. The causative nuance is preserved with 'I have made ... pure,'
    matching the object 'my heart.'
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my inner self
  - my mind
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term and should be
    preserved rather than flattened to a psychological paraphrase. It refers to the
    inner moral center.'
- source_word: טָהַרְתִּי
  chosen: I am clean
  alternatives:
  - I have become clean
  - I have purified myself
  lexicon: HALOT
  rationale: From טהר, 'to be clean/pure' or 'to become clean.' In parallel with the
    first clause, English 'I am clean' best captures the resultant state without awkwardness.
    'I have purified myself' would overemphasize reflexive action not explicit in
    the form.
- source_word: מֵחַטָּאתִי
  chosen: from my sin
  alternatives:
  - from my offense
  - from my guilt
  lexicon: HALOT
  rationale: 'חטאת commonly means ''sin'' here. The preposition מִן marks separation:
    ''from my sin.'' ''Guilt'' is possible in some contexts, but the moral sense ''sin''
    fits the proverb''s concern with human moral impurity.'
