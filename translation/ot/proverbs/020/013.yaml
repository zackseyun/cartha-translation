id: PRO.20.13
reference: Proverbs 20:13
source:
  edition: WLC
  text: אַל תֶּֽאֱהַ֣ב שֵׁ֭נָה פֶּן תִּוָּרֵ֑שׁ פְּקַ֖ח עֵינֶ֣י/ךָ שְֽׂבַֽע לָֽחֶם־־־׃
translation:
  text: Do not love sleep, lest you become poor; open your eyes, and you will have
    your fill of bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you come to poverty' / 'you be impoverished.' The Hebrew verb can carry
      the sense of becoming dispossessed or poor; here it refers to falling into poverty
      through laziness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'open your eyes; be satisfied with bread.' The final clause is
      rendered as a result in English to make the proverb's sense clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the following imperfect/jussive-like
    form to express prohibition. 'Do not' is the natural English imperative equivalent.
- source_word: תֶּאֱהַב
  chosen: love
  alternatives:
  - be fond of
  - delight in
  lexicon: HALOT
  rationale: From אָהַב, 'to love.' 'Love' preserves the directness and moral force
    of the proverb better than softer idioms like 'be fond of.'
- source_word: שֵׁנָה
  chosen: sleep
  alternatives:
  - slumber
  lexicon: HALOT
  rationale: The noun denotes sleep. 'Sleep' is clear modern English; 'slumber' is
    possible but more literary/archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a negative consequence to be avoided. 'Lest' is concise and
    idiomatic in wisdom literature, preserving the warning relationship.
- source_word: תִּוָּרֵשׁ
  chosen: you become poor
  alternatives:
  - you come to poverty
  - you be dispossessed
  lexicon: HALOT
  rationale: Niphal of ירשׁ can denote becoming impoverished/dispossessed in context.
    Here the proverb contrasts love of sleep with material lack, so 'you become poor'
    best captures the practical sense in natural English.
- source_word: פְּקַח
  chosen: open
  alternatives:
  - keep open
  - be alert with
  lexicon: HALOT
  rationale: 'Imperative from פקח, literally ''open,'' especially of the eyes. The
    command is metaphorically practical: wake up / be industrious. ''Open'' preserves
    the image without over-paraphrasing.'
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal rendering of the construct noun with 2ms suffix. The concrete
    image should be retained.
- source_word: שְׂבַע
  chosen: you will have your fill
  alternatives:
  - be satisfied
  - eat your fill
  lexicon: HALOT
  rationale: 'Imperative form used idiomatically after the prior imperative, expressing
    resulting satisfaction when one is awake and diligent. In English, an explicit
    future/result clause communicates the proverb''s sense naturally: ''and you will
    have your fill.'''
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Literally 'bread.' While it can stand metonymically for food/provision,
    'bread' preserves the Hebrew imagery and remains understandable in English.
