id: PRO.20.1
reference: Proverbs 20:1
source:
  edition: WLC
  text: לֵ֣ץ הַ֭/יַּין הֹמֶ֣ה שֵׁכָ֑ר וְ/כָל שֹׁ֥גֶה בּ֝֗/וֹ לֹ֣א יֶחְכָּֽם־׃
translation:
  text: Wine is a mocker, strong drink a brawler, and whoever is led astray by it
    is not wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wine is a scoffer, strong drink is noisy/boisterous.' The Hebrew personifies
      intoxicants and warns that one who goes astray by them lacks wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵץ
  chosen: mocker
  alternatives:
  - scoffer
  - mocking thing
  lexicon: HALOT
  rationale: The noun commonly denotes a scoffer/mocker. Here it is predicated of
    wine metaphorically, so 'mocker' is vivid and idiomatic in English, preserving
    the personification better than a more abstract rendering.
- source_word: הַיַּיִן
  chosen: Wine
  lexicon: HALOT
  rationale: Standard rendering for יין. The definite article in Hebrew is not naturally
    reproduced in English in this proverbial construction.
- source_word: הֹמֶה
  chosen: a brawler
  alternatives:
  - boisterous
  - in an uproar
  - noisy
  lexicon: HALOT
  rationale: 'The participle from המה conveys noisiness, tumult, or boisterous agitation.
    In parallel with ''mocker'' and with שֵׁכָר as the subject, an English personal
    predicate is best: ''a brawler'' captures the personified, disruptive effect of
    strong drink more naturally than the less idiomatic ''is noisy.'''
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: A broad term for intoxicating beverage other than wine. 'Strong drink'
    is the established and sufficiently clear English equivalent without narrowing
    the reference to a specific modern beverage.
- source_word: שֹׁגֶה
  chosen: is led astray
  alternatives:
  - errs
  - staggers
  - is deceived
  lexicon: HALOT
  rationale: The verb denotes going astray or erring. In context of intoxicants, the
    sense is moral and practical misdirection rather than merely physical staggering.
    The passive-like English 'is led astray' communicates the result of being misdirected
    by drink.
- source_word: בּוֹ
  chosen: by it
  alternatives:
  - in it
  - by them
  lexicon: HALOT
  rationale: The singular pronominal suffix most naturally refers back collectively
    to the intoxicating drink just mentioned. 'By it' is idiomatic and preserves the
    singular form better than 'by them.'
- source_word: לֹא יֶחְכָּם
  chosen: is not wise
  alternatives:
  - will not become wise
  - is no wise man
  lexicon: HALOT
  rationale: The imperfect here expresses a general proverbial truth. 'Is not wise'
    is concise, natural English and fits the gnomic force better than a future-sounding
    'will not become wise.'
