id: PRO.20.16
reference: Proverbs 20:16
source:
  edition: WLC
  text: לְֽקַח בִּ֭גְד/וֹ כִּי עָ֣רַב זָ֑ר וּ/בְעַ֖ד נכרים חַבְלֵֽ/הוּ־־׃
translation:
  text: Take his garment, for he has put up security for a stranger; and hold it in
    pledge for foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take a pledge from him for foreigners.' The Hebrew of the final clause
      is terse and may focus either on the garment as collateral or on taking security
      from the man himself.
    reason: alternative_reading
  - marker: b
    text: '''Has put up security'' refers to guaranteeing another person''s debt or
      obligation.'
    reason: cultural_note
lexical_decisions:
- source_word: לְקַח
  chosen: Take
  alternatives:
  - Seize
  - Get
  lexicon: HALOT
  rationale: Qal imperative masculine singular from לקח, a direct command. 'Take'
    is the most natural imperative in English and fits the legal/wisdom setting without
    overstrengthening to 'seize'.
- source_word: בִּגְדוֹ
  chosen: his garment
  alternatives:
  - his cloak
  - his robe
  lexicon: HALOT
  rationale: בגד denotes an article of clothing broadly. 'Garment' preserves the general
    sense better than the more specific 'cloak' or 'robe'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the command. 'For' gives smooth proverbial
    English while preserving the causal sense.
- source_word: עָרַב
  chosen: has put up security
  alternatives:
  - has become surety
  - has given a pledge
  lexicon: HALOT
  rationale: ערב in this context refers to standing surety or guaranteeing another's
    debt. 'Has put up security' expresses the commercial-legal meaning in clear modern
    English; the more traditional 'become surety' is preserved as an alternative.
- source_word: זָר
  chosen: for a stranger
  alternatives:
  - for an outsider
  - for another
  lexicon: HALOT
  rationale: זָר commonly means a stranger/outsider, someone outside one's ordinary
    circle. 'Stranger' is concise and idiomatic in wisdom literature.
- source_word: וּבְעַד
  chosen: and ... for
  alternatives:
  - and on behalf of
  - and because of
  lexicon: HALOT
  rationale: בעד here marks representation or liability on behalf of others. Rendering
    with 'for' keeps the parallelism with the first colon and communicates assumed
    liability.
- source_word: נכרים
  chosen: foreigners
  alternatives:
  - strangers
  - unknown people
  lexicon: HALOT
  rationale: נכרי often carries the sense of foreigners or those outside the community.
    Using 'foreigners' differentiates it from זָר in the first colon while preserving
    the social distance implied by the Hebrew.
- source_word: חַבְלֵהוּ
  chosen: hold it in pledge
  alternatives:
  - take him as security
  - bind him
  - take a pledge from him
  lexicon: HALOT
  rationale: The imperative from חבל in this context concerns taking or holding a
    pledge/security. Because the direct object suffix likely points back to the garment
    or debtor's property in a collateral sense, 'hold it in pledge' communicates the
    practical legal action in idiomatic English. The Hebrew admits a more literal
    'take a pledge from him,' which is preserved as an alternative.
