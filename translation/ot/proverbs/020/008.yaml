id: PRO.20.8
reference: Proverbs 20:8
source:
  edition: WLC
  text: מֶ֗לֶךְ יוֹשֵׁ֥ב עַל כִּסֵּא דִ֑ין מְזָרֶ֖ה בְ/עֵינָ֣י/ו כָּל רָֽע־־־׃
translation:
  text: A king sitting on a throne of judgment winnows all evil with his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scatters' or 'sifts away'; the Hebrew verb evokes the image of winnowing,
      separating what is worthless from what is good.
    reason: lexical_alternative
  - marker: b
    text: Or 'every evil person.' The Hebrew can refer broadly to evil or, by implication,
      to evildoers brought under judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: A king
  alternatives:
  - The king
  lexicon: HALOT
  rationale: Rendered as the indefinite/generic 'A king' because the proverb states
    a general truth about royal judgment, not a specific monarch.
- source_word: יוֹשֵׁב
  chosen: sitting
  alternatives:
  - who sits
  - enthroned
  lexicon: HALOT
  rationale: The participle denotes an ongoing or characteristic posture/action. 'Sitting'
    preserves the vivid image and pairs naturally with the following throne language.
- source_word: עַל כִּסֵּא דִין
  chosen: on a throne of judgment
  alternatives:
  - on the throne of judgment
  - on a judgment seat
  lexicon: HALOT
  rationale: כִּסֵּא is 'throne/seat' and דִין is 'judgment/justice/legal decision.'
    'Throne of judgment' preserves the royal setting better than the more generic
    'judgment seat.'
- source_word: מְזָרֶה
  chosen: winnows
  alternatives:
  - scatters
  - sifts away
  lexicon: HALOT
  rationale: From זרה, whose agricultural sense is to winnow by separating grain from
    chaff. In context it is metaphorical for discriminating and removing evil. 'Winnows'
    best preserves the concrete metaphor rather than flattening it to 'sifts away'
    or broadening it to 'scatters.'
- source_word: בְעֵינָיו
  chosen: with his eyes
  alternatives:
  - by his gaze
  - before his eyes
  lexicon: HALOT
  rationale: 'The beth here is instrumental or associative: the king''s discerning
    gaze exposes and separates evil. ''With his eyes'' is a natural English rendering
    that keeps the Hebrew imagery.'
- source_word: כָּל רָע
  chosen: all evil
  alternatives:
  - every evil person
  - all wickedness
  lexicon: HALOT
  rationale: רָע can denote evil in an abstract sense or evil persons/things contextually.
    Here the proverb speaks broadly of what the king's judicial discernment separates
    out; 'all evil' preserves that breadth without over-specifying persons alone.
