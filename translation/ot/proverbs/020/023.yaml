id: PRO.20.23
reference: Proverbs 20:23
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה אֶ֣בֶן וָ/אָ֑בֶן וּ/מֹאזְנֵ֖י מִרְמָ֣ה לֹא טֽוֹב־׃
translation:
  text: Unequal weights are an abomination to Yahweh, and deceitful scales are not good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a stone and a stone,' an idiom for differing weights used dishonestly in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable, often in moral or covenantal contexts. 'An abomination' preserves the strong ethical force and matches common biblical usage without softening it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶבֶן וָאָבֶן
  chosen: unequal weights
  alternatives:
  - a stone and a stone
  - diverse weights
  - double weights
  lexicon: HALOT
  rationale: Literally 'a stone and a stone,' referring to differing stone weights used in trade. In context this idiom points to dishonest, unequal measures. 'Unequal weights' communicates the plain sense in natural English while preserving the commercial setting.
- source_word: וּמֹאזְנֵי מִרְמָה
  chosen: and deceitful scales
  alternatives:
  - and scales of deceit
  - and fraudulent balances
  lexicon: HALOT
  rationale: מֹאזְנַיִם/מֹאזְנֵי refers to balances or scales, and מִרְמָה denotes deceit or fraud. 'Deceitful scales' is idiomatic English and accurately conveys the genitive relationship.
- source_word: לֹא טוֹב
  chosen: are not good
  alternatives:
  - are evil
  - are unacceptable
  lexicon: HALOT
  rationale: The Hebrew is straightforwardly negative plus 'good.' Rendering it as 'are not good' preserves the wording and the proverb's measured style, rather than intensifying it beyond the text.
