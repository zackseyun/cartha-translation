id: PRO.20.12
reference: Proverbs 20:12
source:
  edition: WLC
  text: אֹ֣זֶן שֹׁ֭מַעַת וְ/עַ֣יִן רֹאָ֑ה יְ֝הוָ֗ה עָשָׂ֥ה גַם שְׁנֵי/הֶֽם־׃
translation:
  text: The hearing ear and the seeing eye—the LORD made both of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The ear that hears and the eye that sees—the LORD made both of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹזֶן
  chosen: ear
  alternatives:
  - an ear
  lexicon: HALOT
  rationale: Basic concrete sense is 'ear.' Singular is retained to match the Hebrew
    proverb's balanced parallelism.
- source_word: שֹׁמַעַת
  chosen: hearing
  alternatives:
  - that hears
  - able to hear
  - listening
  lexicon: HALOT
  rationale: The participle functions attributively with 'ear.' 'Hearing' is concise,
    idiomatic, and preserves the Hebrew's descriptive force without over-paraphrasing.
- source_word: עַיִן
  chosen: eye
  alternatives:
  - an eye
  lexicon: HALOT
  rationale: Basic concrete sense is 'eye.' Singular is retained for the proverb's
    parallel structure.
- source_word: רֹאָה
  chosen: seeing
  alternatives:
  - that sees
  - able to see
  - watchful
  lexicon: HALOT
  rationale: Like שֹׁמַעַת, this participle is attributive. 'Seeing' mirrors 'hearing'
    and keeps the poetic symmetry.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English convention for YHWH.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - has made
  - fashioned
  - created
  lexicon: HALOT
  rationale: Qal perfect 3ms here states a general truth about God's action. 'Made'
    is the most direct and natural rendering; 'created' would be possible but is more
    interpretive than the verb itself requires.
- source_word: גַם
  chosen: both
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: In combination with 'the two of them,' גַם has an inclusive sense best
    expressed in English as 'both.' This avoids awkwardly rendering both elements
    separately.
- source_word: שְׁנֵיהֶם
  chosen: of them
  alternatives:
  - the two of them
  - both of them
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the two of them.' In English, with גַם already
    represented by 'both,' the natural full expression is 'both of them,' which preserves
    the emphasis without sounding wooden.
