id: PRO.20.3
reference: Proverbs 20:3
source:
  edition: WLC
  text: כָּב֣וֹד לָ֭/אִישׁ שֶׁ֣בֶת מֵ/רִ֑יב וְ/כָל אֱ֝וִ֗יל יִתְגַּלָּֽע־׃
translation:
  text: It is an honor for a man to keep away from strife, but every fool bursts out
    in quarrel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew verb rendered 'bursts out in quarrel' is rare and uncertain;
      it may also mean 'gets involved in quarrel' or, more literally, something like
      'shows himself' aggressively.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  - credit
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly denotes social esteem or honorable
    status. 'Honor' fits the proverb's ethical point better than the weightier 'glory'.
- source_word: לָאִישׁ
  chosen: for a man
  alternatives:
  - for a person
  - for anyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אִישׁ. Per the translation philosophy,
    the rendering remains gender-accurate rather than neutralized, while still carrying
    a representative sense in proverbial style.
- source_word: שֶׁבֶת
  chosen: to keep away
  alternatives:
  - to cease
  - to dwell
  - to sit
  lexicon: HALOT
  rationale: From ישׁב/שׁבת in this construction with מִן + noun, the sense is abstaining
    from or staying out of something. 'Keep away' expresses the idiomatic force in
    natural English.
- source_word: מֵרִיב
  chosen: from strife
  alternatives:
  - from quarrel
  - from contention
  - from dispute
  lexicon: HALOT
  rationale: רִיב can denote dispute, contention, or quarrel. 'Strife' is broad and
    proverbial, matching the general warning against contentious conflict.
- source_word: אֱוִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: Standard wisdom-term rendering. 'Fool' preserves the moral and character
    dimension of the Hebrew better than a merely intellectual label.
- source_word: יִתְגַּלָּע
  chosen: bursts out in quarrel
  alternatives:
  - gets involved in quarrel
  - shows his teeth
  - becomes enraged
  lexicon: HALOT
  rationale: This rare Hitpael form is difficult. In context, contrasted with keeping
    away from strife, it most plausibly means breaking out into contention or letting
    oneself loose in a quarrel. The chosen rendering captures the likely contextual
    sense while remaining idiomatic. Because the lexical sense is uncertain, alternatives
    are preserved in a footnote.
