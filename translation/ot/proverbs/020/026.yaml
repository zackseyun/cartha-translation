theological_decisions:
- issue: Metaphorical image of royal judgment
  chosen_reading: Retain the concrete agricultural/judicial metaphor ('winnows' /
    'drives the wheel over them') rather than flattening it into an abstract statement
    about punishment.
  alternative_readings:
  - A wise king separates out the wicked and punishes them
  - A wise king scatters the wicked and crushes them
  rationale: The proverb uses vivid threshing imagery for discernment and judgment.
    Preserving the metaphor maintains the text's literary force and avoids importing
    a more specific doctrinal claim than the Hebrew states.
  doctrine_reference: Translation philosophy §§1, 3, 6
