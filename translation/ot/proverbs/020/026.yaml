id: PRO.20.26
reference: Proverbs 20:26
source:
  edition: WLC
  text: מְזָרֶ֣ה רְ֭שָׁעִים מֶ֣לֶךְ חָכָ֑ם וַ/יָּ֖שֶׁב עֲלֵי/הֶ֣ם אוֹפָֽן׃
translation:
  text: A wise king winnows the wicked and drives the wheel over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scatters the wicked'; the Hebrew verb can denote scattering, but here
      likely evokes winnowing imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and turns/causes a wheel to return over them'; likely an image
      drawn from threshing, hence 'drives the wheel over them.'
    reason: cultural_note
lexical_decisions:
- source_word: מְזָרֶה
  chosen: winnows
  alternatives:
  - scatters
  - sifts
  lexicon: HALOT
  rationale: From זרה, commonly used of winnowing grain by tossing so that chaff is
    separated. 'Winnows' preserves the agricultural metaphor better than the more
    generic 'scatters' or interpretive 'sifts'.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering of רשעים. The article is not explicit in Hebrew, but
    English idiom naturally uses 'the wicked' as a class designation.
- source_word: מֶלֶךְ חָכָם
  chosen: a wise king
  alternatives:
  - the wise king
  - a king who is wise
  lexicon: HALOT
  rationale: 'Predicate-participle construction is naturally rendered in English with
    the subject first: ''A wise king winnows…''. The indefinite form fits proverbial
    style better than a definite ''the wise king''.'
- source_word: וַיָּשֶׁב
  chosen: drives
  alternatives:
  - turns back
  - brings back
  - causes to return
  lexicon: HALOT
  rationale: From שוב in the Hiphil/waw-consecutive form, here idiomatically with
    'wheel' and 'over them' conveying the action of bringing/rolling the threshing
    wheel over the wicked. 'Drives' expresses the causative motion in natural English
    while preserving the image.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  - against them
  lexicon: HALOT
  rationale: The preposition על with the wheel imagery most naturally means movement
    over the wicked, matching threshing imagery and judicial force.
- source_word: אוֹפָן
  chosen: the wheel
  alternatives:
  - a wheel
  - threshing wheel
  lexicon: HALOT
  rationale: Literally 'wheel.' The context likely evokes a threshing wheel, but adding
    'threshing' in the main text would make the metaphor more explicit than the Hebrew
    does. The definite article in English helps the image read naturally.
