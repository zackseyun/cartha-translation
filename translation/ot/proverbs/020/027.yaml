id: PRO.20.27
reference: Proverbs 20:27
source:
  edition: WLC
  text: נֵ֣ר יְ֭הוָה נִשְׁמַ֣ת אָדָ֑ם חֹ֝פֵ֗שׂ כָּל חַדְרֵי בָֽטֶן־־׃
translation:
  text: The spirit of man is the lamp of Yahweh, searching all the innermost chambers of the belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The breath of man is the lamp of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the chambers of the belly,' an idiom for a person's deepest inner parts or inner being.
    reason: cultural_note
lexical_decisions:
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: נֵר ordinarily denotes a lamp rather than an abstract 'light.' 'Lamp' preserves the concrete metaphor of illumination and examination.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִשְׁמַת
  chosen: spirit
  alternatives:
  - breath
  - soul
  lexicon: HALOT
  rationale: נשמה can denote breath or spirit/life-breath. In this proverb it refers to the inward animating principle by which a person is examined and examines; 'spirit' best captures that anthropological sense in idiomatic English while preserving the metaphorical force.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Here אָדָם is generic but singular, referring representatively to a human being. Per doctrine's gender-accurate principle, 'man' preserves the singular representative force better than the pluralizing 'humankind.'
- source_word: חֹפֵשׂ
  chosen: searching
  alternatives:
  - examining
  - seeking out
  lexicon: HALOT
  rationale: The participle conveys ongoing probing or searching. 'Searching' is natural English and fits the lamp metaphor of illumination that exposes what is hidden.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' straightforwardly renders the comprehensive scope of the search.'
- source_word: חַדְרֵי
  chosen: innermost chambers
  alternatives:
  - rooms
  - chambers
  - recesses
  lexicon: HALOT
  rationale: Literally 'chambers/rooms,' but in this figurative context the sense is the hidden inner recesses. 'Innermost chambers' preserves the spatial metaphor and clarifies the idiom in readable English.
- source_word: בָטֶן
  chosen: belly
  alternatives:
  - inner being
  - womb
  - abdomen
  lexicon: HALOT
  rationale: בטן literally means 'belly' or 'womb' and can idiomatically refer to the inward parts. Retaining 'belly' keeps the Hebrew imagery; 'innermost chambers of the belly' communicates the metaphor of the deepest interior. A more interpretive rendering like 'inner being' is preserved in a footnote.
