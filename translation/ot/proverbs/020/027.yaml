theological_decisions:
- issue: Anthropological sense of נִשְׁמַת אָדָם
  chosen_reading: The verse speaks of the human spirit/life-breath as the LORD's lamp for probing a person's inner life.
  alternative_readings:
  - The verse speaks more concretely of a person's breath as evidence of life under God's scrutiny.
  - The verse could be read as the conscience functioning as God's lamp within a person.
  rationale: The Hebrew does not explicitly mention 'conscience,' so that theological interpretation should not be imported into the main text. 'Spirit' preserves the broader anthropological category and allows the proverb's metaphorical force to stand without over-specification.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
