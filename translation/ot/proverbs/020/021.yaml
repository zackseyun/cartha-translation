id: PRO.20.21
reference: Proverbs 20:21
source:
  edition: WLC
  text: נַ֭חֲלָה מבחלת בָּ/רִאשֹׁנָ֑ה וְ֝/אַחֲרִיתָ֗/הּ לֹ֣א תְבֹרָֽךְ׃
translation:
  text: An inheritance gained hastily at first will not be blessed in the end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'An inheritance obtained quickly at the beginning.' The Hebrew term may
      emphasize speed, premature acquisition, or greedy haste.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - estate
  - heritage
  lexicon: HALOT
  rationale: The noun denotes inherited property or possession. 'Inheritance' is the
    most natural and standard English equivalent in wisdom literature and fits the
    proverb's concern with acquired family wealth.
- source_word: מבחלת
  chosen: gained hastily
  alternatives:
  - obtained quickly
  - got in haste
  - acquired prematurely
  lexicon: HALOT
  rationale: The form is commonly understood from a verb meaning to hasten or acquire
    quickly/greedily. Because the proverb contrasts an initial manner of acquisition
    with the final outcome, 'gained hastily' captures both the speed and the implied
    impropriety better than a bare 'obtained quickly.'
- source_word: בָּרִאשֹׁנָה
  chosen: at first
  alternatives:
  - in the beginning
  - initially
  lexicon: HALOT
  rationale: This temporal phrase marks the early stage of the inheritance's acquisition.
    'At first' is concise, idiomatic, and preserves the contrast with 'in the end.'
- source_word: וְאַחֲרִיתָהּ
  chosen: in the end
  alternatives:
  - its end
  - its latter end
  - afterward
  lexicon: HALOT
  rationale: The noun with suffix literally means 'its end/latter end.' In English
    proverb style, 'in the end' communicates the final outcome clearly while preserving
    the contrastive structure.
- source_word: לֹא תְבֹרָךְ
  chosen: will not be blessed
  alternatives:
  - will not prosper
  - will not receive blessing
  lexicon: HALOT
  rationale: The passive/reflexive sense from ברך is best represented by 'be blessed.'
    'Prosper' captures part of the sense but narrows the statement to material success;
    the Hebrew more broadly denies divine favor on the outcome.
