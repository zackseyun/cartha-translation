- issue: Representative masculine language in a wisdom saying
  chosen_reading: a righteous man
  alternative_readings:
  - the righteous person
  - one who is righteous
  rationale: The Hebrew uses a masculine singular form in a proverbial, representative
    sense. Per the doctrine's gender-accurate policy, the translation retains masculine
    wording rather than neutralizing it, while not implying exclusion of women from
    the principle.
