id: PRO.20.7
reference: Proverbs 20:7
source:
  edition: WLC
  text: מִתְהַלֵּ֣ךְ בְּ/תֻמּ֣/וֹ צַדִּ֑יק אַשְׁרֵ֖י בָנָ֣י/ו אַחֲרָֽי/ו׃
translation:
  text: A righteous man walks in his integrity; blessed are his children after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy are his children after him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons' can function generically for offspring; here rendered 'children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתְהַלֵּךְ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: HALOT
  rationale: The Hitpael participle of הלך commonly expresses one's manner of life
    or conduct. 'Walks' preserves the Hebrew metaphor and remains natural in English
    wisdom literature.
- source_word: בְּתֻמּוֹ
  chosen: in his integrity
  alternatives:
  - in his blamelessness
  - with integrity
  lexicon: HALOT
  rationale: תֹּם/תֻּם denotes integrity, completeness, or blamelessness of character.
    'In his integrity' closely reflects the preposition בְּ and the ethical sense
    in context.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous man
  - a just man
  lexicon: HALOT
  rationale: The adjective/noun denotes a righteous person. Because the Hebrew is
    grammatically masculine singular and representative, 'a righteous man' follows
    the gender-accurate policy and fits proverbial style better than a plural or gender-neutral
    recast.
- source_word: אַשְׁרֵי
  chosen: blessed are
  alternatives:
  - happy are
  - fortunate are
  lexicon: HALOT
  rationale: אַשְׁרֵי is an exclamation of blessedness or enviable flourishing. 'Blessed
    are' preserves the elevated wisdom-register and avoids reducing the term to mere
    emotion.
- source_word: בָנָיו
  chosen: his children
  alternatives:
  - his sons
  lexicon: HALOT
  rationale: Though formally from בנים, the term often functions generically for offspring/children.
    'His children' best conveys the familial sense in natural English without overstating
    male-only reference.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - following him
  - afterward
  lexicon: HALOT
  rationale: The phrase indicates those who come after him, here his descendants.
    'After him' is the most direct rendering and preserves the compact Hebrew expression.
