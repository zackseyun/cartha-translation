id: PRO.20.11
reference: Proverbs 20:11
source:
  edition: WLC
  text: גַּ֣ם בְּ֭/מַעֲלָלָי/ו יִתְנַכֶּר נָ֑עַר אִם זַ֖ךְ וְ/אִם יָשָׁ֣ר פָּעֳלֽ/וֹ־־־׃
translation:
  text: Even a youth makes himself known by his deeds, whether his work is pure and
    upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Even a youth is recognized by his deeds, whether what he does is pure
      and upright.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: 'Introduces an emphatic or extending statement: not only adults, but
    even a youth can be recognized by conduct. ''Even'' captures the concessive-emphatic
    force naturally in English.'
- source_word: בְּמַעֲלָלָיו
  chosen: by his deeds
  alternatives:
  - by his actions
  - by his practices
  lexicon: HALOT
  rationale: 'מַעֲלָל denotes deeds or actions, often with moral coloring. ''By his
    deeds'' is concise and preserves the evaluative sense. The preposition ב marks
    means or sphere: he is known by what he does.'
- source_word: יִתְנַכֶּר
  chosen: makes himself known
  alternatives:
  - is recognized
  - shows himself
  - makes himself conspicuous
  lexicon: HALOT
  rationale: The hitpael of נכר here carries the sense of becoming known or revealing
    oneself by outward behavior. 'Makes himself known' preserves the reflexive nuance
    better than the passive 'is recognized,' while remaining idiomatic.
- source_word: נָעַר
  chosen: a youth
  alternatives:
  - a boy
  - a young man
  lexicon: HALOT
  rationale: נַעַר can refer broadly to a boy or young person. 'Youth' best fits the
    proverb's generalizing observation without implying either a small child or a
    fully mature man.
- source_word: אִם זַךְ
  chosen: whether his work is pure
  alternatives:
  - if his work is pure
  - whether he is innocent
  lexicon: HALOT
  rationale: The clause evaluates the character of the youth's conduct. זַךְ means
    pure, clean, or innocent. Because the predicate is tied to פָּעֳלוֹ ('his work/deed'),
    'whether his work is pure' makes the syntax explicit in English.
- source_word: וְאִם יָשָׁר
  chosen: and upright
  alternatives:
  - and straight
  - and right
  lexicon: HALOT
  rationale: יָשָׁר commonly denotes moral straightness or uprightness. 'Upright'
    is the standard ethical equivalent in wisdom literature and pairs naturally with
    'pure'.
- source_word: פָּעֳלוֹ
  chosen: his work
  alternatives:
  - his deed
  - what he does
  lexicon: HALOT
  rationale: פֹּעַל refers to work, deed, or activity. Here it summarizes the youth's
    conduct. 'His work' is slightly more formal and pairs well with the preceding
    adjectives, though the verse as a whole already uses 'deeds' for מַעֲלָלָיו; the
    variation is documented because English style benefits from avoiding awkward repetition
    while preserving the semantic overlap.
