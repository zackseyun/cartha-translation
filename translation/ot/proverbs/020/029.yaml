id: PRO.20.29
reference: Proverbs 20:29
source:
  edition: WLC
  text: תִּפְאֶ֣רֶת בַּחוּרִ֣ים כֹּחָ֑/ם וַ/הֲדַ֖ר זְקֵנִ֣ים שֵׂיבָֽה׃
translation:
  text: The glory of young men is their strength, and the splendor of old men is gray
    hair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The beauty of young men is their strength, and the honor of old men
      is gray hair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְאֶרֶת
  chosen: glory
  alternatives:
  - beauty
  - splendor
  - ornament
  lexicon: HALOT
  rationale: The noun denotes that which is a source of honor, beauty, or pride. 'Glory'
    fits the proverbial contrast with the second colon and preserves the sense of
    honorable distinction rather than mere physical attractiveness.
- source_word: בַּחוּרִים
  chosen: young men
  alternatives:
  - young men in their prime
  - youths
  lexicon: HALOT
  rationale: The term refers specifically to young males, not youth in general. 'Young
    men' is gender-accurate and natural English, matching the Hebrew masculine plural.
- source_word: כֹּחָם
  chosen: their strength
  alternatives:
  - their vigor
  - their power
  lexicon: HALOT
  rationale: The noun commonly denotes strength or power; in this context it refers
    to the vigor characteristic of youth. 'Strength' is the most direct and idiomatic
    rendering.
- source_word: הֲדַר
  chosen: splendor
  alternatives:
  - honor
  - majesty
  - beauty
  lexicon: HALOT
  rationale: This noun overlaps semantically with honor and adornment. 'Splendor'
    provides a fitting parallel to 'glory' while avoiding exact repetition in English
    and preserving the elevated poetic register.
- source_word: זְקֵנִים
  chosen: old men
  alternatives:
  - elders
  - aged men
  lexicon: HALOT
  rationale: Here the contrast is age-based, not office-based, so 'old men' is preferable
    to 'elders.' It also mirrors the gender-specific reference of the first colon.
- source_word: שֵׂיבָה
  chosen: gray hair
  alternatives:
  - gray head
  - hoary hair
  lexicon: HALOT
  rationale: The noun refers to gray hair/old age as the visible mark of age. 'Gray
    hair' is clear, natural modern English and suits the proverb's concrete imagery.
