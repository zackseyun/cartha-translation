id: PRO.20.17
reference: Proverbs 20:17
source:
  edition: WLC
  text: עָרֵ֣ב לָ֭/אִישׁ לֶ֣חֶם שָׁ֑קֶר וְ֝/אַחַ֗ר יִמָּֽלֵא פִ֥י/הוּ חָצָֽץ־׃
translation:
  text: Bread gained by deceit is sweet to a man, but afterward his mouth is filled
    with gravel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'bread of falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his mouth will be filled with gravel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵב
  chosen: is sweet
  alternatives:
  - is pleasant
  - is pleasing
  lexicon: HALOT
  rationale: The adjective means pleasant/sweet/agreeable. In the proverb's food imagery,
    'sweet' is the most natural English choice and preserves the ironic contrast with
    the harsh result that follows.
- source_word: לָאִישׁ
  chosen: to a man
  alternatives:
  - to a person
  - to someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'to a man.' Following the gender-accurate
    principle, 'man' is retained here as a representative singular rather than neutralized.
- source_word: לֶחֶם
  chosen: Bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Although 'bread' can stand metonymically for food or sustenance, the
    concrete image should be preserved in a proverb unless context requires abstraction.
    The contrast with 'gravel' in the mouth favors the literal image.
- source_word: שָׁקֶר
  chosen: gained by deceit
  alternatives:
  - of falsehood
  - of lies
  - deceptive
  lexicon: HALOT
  rationale: Literally 'bread of falsehood/lie.' In idiomatic English, 'bread of deceit'
    is possible but less clear. 'Gained by deceit' makes explicit that the bread is
    acquired through deception, which fits proverbial usage without over-paraphrasing.
- source_word: וְאַחַר
  chosen: but afterward
  alternatives:
  - and afterward
  - later
  lexicon: HALOT
  rationale: The conjunction plus adverb marks temporal sequence, and in English the
    adversative force is best conveyed by 'but afterward' because the second colon
    reverses the first.
- source_word: יִמָּלֵא
  chosen: is filled
  alternatives:
  - will be filled
  - fills up
  lexicon: HALOT
  rationale: The Niphal imperfect can express a future/resultative sense. English
    present 'is filled' works proverbially as a general truth, while still conveying
    the inevitable consequence.
- source_word: פִיהוּ
  chosen: his mouth
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'mouth' should be retained because
    the proverb's sensory imagery is central.
- source_word: חָצָץ
  chosen: gravel
  alternatives:
  - pebbles
  - grit
  lexicon: HALOT
  rationale: The noun denotes small stones/gravel. 'Gravel' is vivid, idiomatic, and
    communicates the painful reversal of the initially 'sweet' bread.
