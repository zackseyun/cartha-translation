id: PRO.20.5
reference: Proverbs 20:5
source:
  edition: WLC
  text: מַ֣יִם עֲ֭מֻקִּים עֵצָ֣ה בְ/לֶב אִ֑ישׁ וְ/אִ֖ישׁ תְּבוּנָ֣ה יִדְלֶֽ/נָּה־׃
translation:
  text: Counsel in a man's heart is like deep water, but a man of understanding draws
    it out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deep waters.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man's heart' ... 'a man of understanding'; the masculine form
      is used generically in this proverb.
    reason: cultural_note
lexical_decisions:
- source_word: מַיִם עֲמֻקִּים
  chosen: deep water
  alternatives:
  - deep waters
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'deep waters.' In English proverb style,
    'deep water' can function collectively and reads more naturally while preserving
    the metaphor of hidden depth. The plural alternative is viable and preserved in
    a footnote.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - advice
  - purpose
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, advice, or purpose. Here it refers to
    the inner deliberation or intention within a person, and 'counsel' best preserves
    the wisdom-literature sense without narrowing it merely to external advice.
- source_word: בְלֶב אִישׁ
  chosen: in a man's heart
  alternatives:
  - in the heart of a man
  - in a person's heart
  lexicon: HALOT
  rationale: לֵב in Hebrew often denotes the inner mind, will, or thought-life, not
    merely emotion; 'heart' is retained because it is both accurate and idiomatic
    in English. אִישׁ is grammatically masculine and representative/generic here,
    so 'a man's' follows the gender-accurate policy rather than neutralizing to 'person's'.
- source_word: וְאִישׁ תְּבוּנָה
  chosen: but a man of understanding
  alternatives:
  - and a man of understanding
  - but a discerning man
  - and a discerning man
  lexicon: HALOT
  rationale: תְּבוּנָה denotes understanding, discernment, or insight. 'A man of understanding'
    is a natural English rendering of the construct-like expression and matches wisdom
    idiom. The conjunction וְ is rendered adversatively as 'but' because the second
    colon contrasts hidden counsel with the skill of the discerning person who can
    bring it forth.
- source_word: יִדְלֶנָּה
  chosen: draws it out
  alternatives:
  - will draw it out
  - draws it up
  lexicon: HALOT
  rationale: From דלה, 'to draw up/out' as from a well. The suffix refers back to
    the feminine noun עֵצָה ('counsel'). English present tense suits proverbial discourse.
    'Draws it out' communicates both the water metaphor and the act of eliciting hidden
    counsel.
