id: PRO.20.30
reference: Proverbs 20:30
source:
  edition: WLC
  text: חַבֻּר֣וֹת פֶּ֭צַע תמריק בְּ/רָ֑ע וּ֝/מַכּ֗וֹת חַדְרֵי בָֽטֶן־׃
translation:
  text: The bruises of a wound cleanse away evil, and blows reach the innermost parts
    of the belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The bruises of a wound purge evil'; the Hebrew verb can carry the sense
      of scouring or purging.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the chambers of the belly,' a Hebrew expression for the deepest
      inward parts of a person.
    reason: cultural_note
lexical_decisions:
- source_word: חַבֻּרוֹת
  chosen: bruises
  alternatives:
  - stripes
  - welts
  - wounds
  lexicon: HALOT
  rationale: The noun denotes marks left by blows, especially bruises or welts. 'Bruises'
    is natural modern English and fits the parallel with 'blows.' 'Stripes' is traditional
    but archaic in this context.
- source_word: פֶּצַע
  chosen: of a wound
  alternatives:
  - wound
  - injury
  lexicon: HALOT
  rationale: 'Taken as a genitive construction with חַבֻּרוֹת: ''bruises of a wound,''
    intensifying the image of corrective injury. Rendering the second noun explicitly
    preserves the Hebrew compactness without flattening it into a single term.'
- source_word: תמריק
  chosen: cleanse away
  alternatives:
  - purge
  - scrub away
  - cleanse
  lexicon: HALOT
  rationale: Hiphil of מרק carries the sense of cleansing/polishing/scouring. In context,
    the idea is that painful correction removes evil. 'Cleanse away' captures both
    the causative force and the metaphor of removal.
- source_word: בְּרָע
  chosen: evil
  alternatives:
  - wickedness
  - what is bad
  lexicon: HALOT
  rationale: 'The preposition with רע is best taken as the object affected by the
    cleansing idea: evil is removed. ''Evil'' is concise and morally weighty, fitting
    Proverbs'' ethical register.'
- source_word: וּמַכּוֹת
  chosen: and blows
  alternatives:
  - and beatings
  - and strokes
  lexicon: HALOT
  rationale: The noun refers to striking blows. 'Blows' is direct and idiomatic, and
    it parallels the first colon's imagery of physical chastisement.
- source_word: חַדְרֵי בָטֶן
  chosen: the innermost parts of the belly
  alternatives:
  - the inner chambers of the belly
  - the depths of the inner being
  lexicon: HALOT
  rationale: Literally 'chambers of the belly.' In Hebrew anthropology this can refer
    to the deepest interior of a person. The chosen rendering preserves the bodily
    metaphor while making clear the sense of inward penetration. 'Belly' is retained
    rather than replacing it with an interpretive abstraction in the main text.
