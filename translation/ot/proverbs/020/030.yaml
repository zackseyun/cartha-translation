theological_decisions:
- issue: Interpretation of disciplinary imagery
  chosen_reading: The verse teaches that painful correction can remove moral evil
    and penetrate to a person's deepest interior.
  alternative_readings:
  - The verse refers more generally to the cleansing effect of suffering, not specifically
    disciplinary punishment.
  rationale: The paired images of bruises and blows in Proverbs most naturally describe
    corrective discipline. The translation preserves the concrete imagery without
    expanding it into a doctrinal claim about all suffering.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
