id: PRO.20.14
reference: Proverbs 20:14
source:
  edition: WLC
  text: רַ֣ע רַ֭ע יֹאמַ֣ר הַ/קּוֹנֶ֑ה וְ/אֹזֵ֥ל ל֝֗/וֹ אָ֣ז יִתְהַלָּֽל׃
translation:
  text: “Bad, bad,” says the buyer; but when he goes away, then he boasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “No good, no good,” or “Worthless, worthless.” The Hebrew repeats “bad”
      for emphasis, reflecting the buyer’s attempt to talk down the value of the item.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע רַע
  chosen: “Bad, bad”
  alternatives:
  - “It is bad, it is bad”
  - “Worthless, worthless”
  - “No good, no good”
  lexicon: HALOT
  rationale: The repetition intensifies the buyer’s disparagement of the item. 'Bad,
    bad' preserves the terse Hebrew rhetoric and the commercial haggling context better
    than a more interpretive expansion. English quotation marks clarify that this
    is direct speech.
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - says repeatedly
  - will say
  lexicon: HALOT
  rationale: The imperfect here functions naturally as a present/generic statement
    in a proverb. 'Says' fits English proverbial style better than a future.
- source_word: הַקּוֹנֶה
  chosen: the buyer
  alternatives:
  - the purchaser
  - the one buying
  lexicon: HALOT
  rationale: From קנה, 'to buy/acquire.' In this context of bargaining, 'the buyer'
    is the most idiomatic and precise English rendering.
- source_word: וְאֹזֵל לוֹ
  chosen: but when he goes away
  alternatives:
  - and goes away
  - and is gone
  - but after he leaves
  lexicon: HALOT
  rationale: 'The participle with waw continues the scene: after making the disparaging
    claim, the buyer departs. Rendering the conjunction as ''but'' brings out the
    adversative sense implied by the contrast between public disparagement and private
    self-congratulation. ''Goes away'' is a natural rendering of אזל in context; ''לוֹ''
    is idiomatic and not separately emphasized in English.'
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Marks the temporal sequence clearly and succinctly in English.
- source_word: יִתְהַלָּל
  chosen: he boasts
  alternatives:
  - he brags
  - he praises himself
  - he exults
  lexicon: HALOT
  rationale: The hitpael of הלל here conveys self-congratulatory boasting. 'He boasts'
    is concise, idiomatic, and preserves the proverb’s moral point about deceptive
    bargaining.
