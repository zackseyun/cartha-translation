id: PRO.20.15
reference: Proverbs 20:15
source:
  edition: WLC
  text: יֵ֣שׁ זָ֭הָב וְ/רָב פְּנִינִ֑ים וּ/כְלִ֥י יְ֝קָ֗ר שִׂפְתֵי דָֽעַת־־׃
translation:
  text: There is gold, and an abundance of pearls, but lips of knowledge are a precious
    vessel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rubies,' 'corals,' or more generally 'precious gems' for פְּנִינִים;
      the exact referent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There are
  - One may find
  lexicon: HALOT
  rationale: Existential particle introducing the proverb's observation. Singular
    English 'There is' works idiomatically even with the following compound items.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; no reason to expand or paraphrase.
- source_word: וְרָב
  chosen: and an abundance of
  alternatives:
  - and many
  - and much
  lexicon: HALOT
  rationale: רָב here functions substantivally/adjectivally with the following noun
    to indicate great quantity. 'An abundance of' captures the sense more naturally
    than the wooden 'many' with a luxury item.
- source_word: פְּנִינִים
  chosen: pearls
  alternatives:
  - corals
  - rubies
  - jewels
  lexicon: HALOT
  rationale: The term denotes precious gems/jewels; English tradition often uses 'rubies,'
    but 'pearls' is a defensible and common lexical option. Because the exact gemstone
    is uncertain, an alternative is preserved in a footnote.
- source_word: וּכְלִי יְקָר
  chosen: a precious vessel
  alternatives:
  - a costly jewel
  - a precious article
  - a valuable thing
  lexicon: HALOT
  rationale: 'כְלִי is broadly ''vessel, article, object, implement.'' In this proverb
    it is metaphorical/appositional: lips characterized by knowledge are compared
    to a valuable object. ''Precious vessel'' preserves the concrete imagery better
    than flattening to ''valuable thing.'''
- source_word: שִׂפְתֵי דָעַת
  chosen: lips of knowledge
  alternatives:
  - knowledgeable lips
  - lips that know
  lexicon: HALOT
  rationale: Construct chain literally 'lips of knowledge.' Retaining the genitival
    form preserves the Hebrew poetic texture while remaining intelligible in English.
    It refers to speech marked by true knowledge.
