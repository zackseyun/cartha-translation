id: PRO.20.4
reference: Proverbs 20:4
source:
  edition: WLC
  text: מֵ֭/חֹרֶף עָצֵ֣ל לֹא יַחֲרֹ֑שׁ ישאל בַּ/קָּצִ֣יר וָ/אָֽיִן־׃
translation:
  text: Because of winter, the lazy man does not plow; at harvest he seeks, and there
    is nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In winter the lazy man does not plow.' The Hebrew preposition may be
      taken temporally ('in winter') or causally ('because of winter').
    reason: lexical_alternative
  - marker: b
    text: Or 'he asks at harvest.' The Hebrew verb can mean 'ask' or, by implication
      here, 'seek/request' produce when harvest comes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵחֹרֶף
  chosen: Because of winter
  alternatives:
  - In winter
  - From winter
  - On account of the cold season
  lexicon: HALOT
  rationale: The preposition מִן with חֹרֶף can express causation ('because of/on
    account of winter') rather than simple temporal location. In this proverb, the
    sense is that winter/cold is the excuse or deterrent for not plowing, which fits
    the antithetical outcome in the second colon.
- source_word: עָצֵל
  chosen: the lazy man
  alternatives:
  - the sluggard
  - a lazy person
  lexicon: HALOT
  rationale: עָצֵל is the stock wisdom term for a habitually lazy person. 'The lazy
    man' preserves the masculine singular form and representative force, in keeping
    with the gender-accurate policy. 'Sluggard' is traditional but less natural in
    contemporary English.
- source_word: לֹא יַחֲרֹשׁ
  chosen: does not plow
  alternatives:
  - will not plow
  - does not cultivate
  lexicon: HALOT
  rationale: חרשׁ here refers to agricultural plowing. English present tense suits
    proverbial, gnomic force. 'Plow' is more precise than the broader 'cultivate'.
- source_word: ישאל
  chosen: he seeks
  alternatives:
  - he asks
  - he begs
  - he looks for
  lexicon: HALOT
  rationale: שׁאל commonly means 'ask,' but in this context the object is omitted
    and the parallel with 'there is nothing' favors the sense of seeking/requesting
    produce at harvest time. 'He seeks' is idiomatic and preserves the open-endedness
    of the Hebrew better than specifying begging.
- source_word: בַּקָּצִיר
  chosen: at harvest
  alternatives:
  - in harvest time
  - during the harvest
  lexicon: HALOT
  rationale: The phrase marks the time when the consequence becomes evident. 'At harvest'
    is concise and natural English.
- source_word: וָאָיִן
  chosen: and there is nothing
  alternatives:
  - but there is nothing
  - and he has nothing
  - and there is none
  lexicon: HALOT
  rationale: אָיִן is an existential negation. 'There is nothing' preserves the terseness
    and leaves the implied object unstated, matching the Hebrew's concise judgment.
    The conjunction can be rendered simply as 'and' while still conveying the result.
