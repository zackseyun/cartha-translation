id: PRO.20.6
reference: Proverbs 20:6
source:
  edition: WLC
  text: רָב אָדָ֗ם יִ֭קְרָא אִ֣ישׁ חַסְדּ֑/וֹ וְ/אִ֥ישׁ אֱ֝מוּנִ֗ים מִ֣י יִמְצָֽא־׃
translation:
  text: Many a man proclaims his own steadfast love, but who can find a faithful man?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many people proclaim each his own loyalty'; Hebrew חֶסֶד can mean 'steadfast
      love,' 'loyalty,' or 'kindness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a trustworthy man'; Hebrew אֱמוּנִים denotes faithfulness or reliability.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָב אָדָם
  chosen: Many a man
  alternatives:
  - Many people
  - Many a person
  - Most men
  lexicon: HALOT
  rationale: The phrase literally combines 'many/much' with 'man/humanity.' In this
    proverb it functions distributively ('many a man' / 'many people'). Because the
    Hebrew uses אָדָם, and the style is proverbial and generic, 'man' preserves the
    gender-accurate representative force noted in the doctrine guidelines better than
    a flattened gender-neutral rendering, while still sounding natural in English.
- source_word: יִקְרָא
  chosen: proclaims
  alternatives:
  - calls
  - declares
  - claims
  lexicon: HALOT
  rationale: קרא commonly means 'call,' but here with the following object it has
    the sense of publicly declaring or announcing. 'Proclaims' captures the self-advertising
    nuance in context better than the more wooden 'calls.'
- source_word: אִישׁ חַסְדּוֹ
  chosen: his own steadfast love
  alternatives:
  - his own loyalty
  - his own kindness
  - his own faithfulness
  lexicon: HALOT
  rationale: חֶסֶד has a broad semantic range including covenant loyalty, steadfast
    love, kindness, and loyalty. In this proverb the point is that many advertise
    their own virtue or loyal love. 'Steadfast love' preserves the weight of חֶסֶד
    and avoids reducing it to mere niceness. 'His own' reflects the 3ms suffix and
    the reflexive sense of self-commendation.
- source_word: וְאִישׁ אֱמוּנִים
  chosen: but who can find a faithful man
  alternatives:
  - but a trustworthy man, who can find?
  - but who can find a man of faithfulness?
  - but who can find a reliable man?
  lexicon: HALOT
  rationale: אֱמוּנִים denotes faithfulness, reliability, trustworthiness. The construct-like
    phrase with אִישׁ is idiomatically rendered 'a faithful man' or 'a trustworthy
    man.' 'Faithful man' is concise and preserves the moral contrast with self-proclaimed
    חֶסֶד.
- source_word: מִי יִמְצָא
  chosen: who can find
  alternatives:
  - who will find
  - who finds
  lexicon: HALOT
  rationale: The interrogative plus imperfect expresses rhetorical difficulty or rarity.
    English idiom is best captured by 'who can find,' implying that such a person
    is hard to find, not merely future tense.
