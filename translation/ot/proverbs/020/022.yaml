id: PRO.20.22
reference: Proverbs 20:22
source:
  edition: WLC
  text: אַל תֹּאמַ֥ר אֲשַׁלְּמָה רָ֑ע קַוֵּ֥ה לַֽ֝/יהוָ֗ה וְ/יֹ֣שַֽׁע לָֽ/ךְ־־׃
translation:
  text: Do not say, “I will repay evil”; wait for Yahweh, and he will save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will pay back evil' or 'I will repay wrong.'
    reason: lexical_alternative
  - marker: b
    text: '''Wait for'' also carries the sense of hoping expectantly in the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he will deliver you' or 'he will vindicate you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive functions as a prohibition. 'Do not' is the natural concise English equivalent.
- source_word: תֹּאמַר
  chosen: say
  alternatives:
  - declare
  - think
  lexicon: HALOT
  rationale: אָמַר ordinarily means 'say.' The context is direct speech introduced by quotation, so 'say' is the most straightforward rendering.
- source_word: אֲשַׁלְּמָה
  chosen: I will repay
  alternatives:
  - I will pay back
  - I will make restitution
  lexicon: HALOT
  rationale: From שׁלם in the Piel, here in a retaliatory context meaning to repay or pay back. 'Repay' fits idiomatic English and preserves the reciprocity implied by the verb.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: HALOT
  rationale: רָע can denote evil, harm, or wrong. In a wisdom context about retaliation, 'evil' best preserves the moral dimension of the offense rather than merely its harmful effect.
- source_word: קַוֵּה
  chosen: wait for
  alternatives:
  - hope in
  - look to
  lexicon: HALOT
  rationale: קוה commonly carries the sense of waiting with expectation or hope. 'Wait for' is the clearest main-text rendering here; the expectant nuance is worth preserving in a footnote.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' in the main text, following the project's default for the divine name.
- source_word: וְיֹשַׁע
  chosen: and he will save
  alternatives:
  - and he will deliver
  - and he will give victory
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, meaning to save or deliver. 'Save' is broad and faithful, allowing both rescue and vindication without over-specifying the mode.
- source_word: לָךְ
  chosen: you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition plus pronoun can be represented idiomatically in English simply as 'you' after 'save.' 'Save you' is more natural than 'save for you' while preserving the sense.
