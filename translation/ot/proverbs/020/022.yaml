theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of salvation language in וְיֹשַׁע לָךְ
  chosen_reading: he will save you
  alternative_readings:
  - he will deliver you
  - he will vindicate you
  rationale: The Hebrew verb ישׁע can denote rescue, deliverance, or salvation. 'Save you' preserves the lexical core without narrowing the promise merely to legal vindication or temporal rescue.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
