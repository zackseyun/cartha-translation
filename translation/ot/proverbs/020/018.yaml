id: PRO.20.18
reference: Proverbs 20:18
source:
  edition: WLC
  text: מַ֭חֲשָׁבוֹת בְּ/עֵצָ֣ה תִכּ֑וֹן וּ֝/בְ/תַחְבֻּל֗וֹת עֲשֵׂ֣ה מִלְחָמָֽה׃
translation:
  text: Plans are established by counsel; wage war with guidance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with strategy' or 'with wise direction'; the Hebrew term can denote
      skillful guidance, originally with the imagery of steering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲשָׁבוֹת
  chosen: Plans
  alternatives:
  - thoughts
  - purposes
  - schemes
  lexicon: HALOT
  rationale: The plural noun refers here to intended courses of action rather than
    mere internal thoughts. 'Plans' fits the proverb's practical setting and pairs
    naturally with military action in the second colon.
- source_word: בְּעֵצָה
  chosen: by counsel
  alternatives:
  - through advice
  - with counsel
  lexicon: HALOT
  rationale: 'The beth preposition is instrumental here: plans are made firm by means
    of counsel/advice. ''Counsel'' preserves the wisdom-literature register better
    than the more casual ''advice.'''
- source_word: תִכּוֹן
  chosen: are established
  alternatives:
  - is established
  - are made firm
  - are set in place
  lexicon: HALOT
  rationale: From כון in the Niphal, the sense is 'be established, be made firm.'
    Although the verb form is 3fs, the feminine singular verb agrees with the plural
    subject מַחֲשָׁבוֹת as a collective/abstract plural usage common in Hebrew; idiomatic
    English therefore uses plural 'are established.'
- source_word: וּבְתַחְבֻּלוֹת
  chosen: with guidance
  alternatives:
  - with strategy
  - with wise direction
  - with steering
  lexicon: HALOT
  rationale: תַּחְבֻּלוֹת literally evokes steering or skillful direction and in wisdom
    contexts refers to strategic guidance or wise management. 'Guidance' is clear
    modern English and suits both the metaphorical background and the military context.
    'Strategy' is possible but slightly narrows the term.
- source_word: עֲשֵׂה
  chosen: wage
  alternatives:
  - make
  - conduct
  lexicon: HALOT
  rationale: The imperative of עשה with מִלְחָמָה is an idiom meaning 'make/wage war.'
    English idiom requires 'wage' rather than the wooden 'make.'
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: The noun denotes war or warfare broadly. 'War' is the most direct rendering
    in this imperative construction and preserves the proverb's force.
