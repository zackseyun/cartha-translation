theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic masculine anthropology in גבר / אדם
  chosen_reading: a man ... a man
  alternative_readings:
  - a person ... a person
  - humankind ... a person
  rationale: Both nouns are masculine singular with representative force. Per translation philosophy, gender-accurate renderings are preferred over gender-neutral ones unless context demands otherwise. The proverb speaks generically through the figure of 'a man.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
