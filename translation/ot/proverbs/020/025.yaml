id: PRO.20.25
reference: Proverbs 20:25
source:
  edition: WLC
  text: מוֹקֵ֣שׁ אָ֭דָם יָ֣לַע קֹ֑דֶשׁ וְ/אַחַ֖ר נְדָרִ֣ים לְ/בַקֵּֽר׃
translation:
  text: It is a snare for a man to rashly dedicate something as holy, and only afterward
    to consider his vows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is a snare for a man to say rashly, "Holy!" and afterward to examine
      vows.' The Hebrew verb translated 'rashly dedicate' is difficult; the proverb
      warns against impulsive speech or action regarding what is set apart to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: The noun denotes a trap or snare. 'Snare' fits proverbial style and preserves
    the metaphor of self-entanglement caused by rash speech.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: Here the singular generic refers to an individual human in a wisdom saying.
    Per doctrine, the masculine singular is kept where representative/generic force
    is intended, so 'a man' is preferred over a neutral recasting.
- source_word: יָלַע
  chosen: to rashly dedicate
  alternatives:
  - to swallow
  - to utter rashly
  - to devour what is holy
  lexicon: HALOT
  rationale: The verb is difficult and idiomatic in this context. In Proverbs 20:25
    it is commonly understood as acting impulsively with respect to something holy,
    likely by blurting out or consuming what has been set apart. The sense required
    by the parallel with vows is rash consecration or declaration. 'Rashly dedicate'
    captures the practical force in clear English while staying tied to the sacred-vow
    context.
- source_word: קֹדֶשׁ
  chosen: something as holy
  alternatives:
  - a holy thing
  - what is holy
  - holy property
  lexicon: HALOT
  rationale: The noun means 'holiness' or 'holy thing.' Because the proverb concerns
    vows and consecration, an object or offering set apart to God is likely in view.
    'Something as holy' makes the implied object explicit enough for English without
    over-specifying the item.
- source_word: וְאַחַר
  chosen: and only afterward
  alternatives:
  - and afterward
  - then afterward
  lexicon: HALOT
  rationale: 'The conjunction plus adverb marks the second stage of the folly: first
    the rash act, then later reflection. ''Only afterward'' brings out the rebuked
    sequence.'
- source_word: נְדָרִים
  chosen: his vows
  alternatives:
  - vows
  lexicon: HALOT
  rationale: The plural noun means 'vows.' Adding 'his' is natural English because
    the vows belong to the person under discussion.
- source_word: לְבַקֵּר
  chosen: to consider
  alternatives:
  - to examine
  - to investigate
  - to reflect on
  lexicon: HALOT
  rationale: The verb means to examine or scrutinize. In context it refers to evaluating
    one's vows after making them. 'Consider' is idiomatic and readable while preserving
    the sense of later examination.
