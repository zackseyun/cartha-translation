id: PRO.18.9
reference: Proverbs 18:9
source:
  edition: WLC
  text: גַּ֭ם מִתְרַפֶּ֣ה בִ/מְלַאכְתּ֑/וֹ אָ֥ח ה֝֗וּא לְ/בַ֣עַל מַשְׁחִֽית׃
translation:
  text: Even one who is slack in his work is brother to a master of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is brother to a destroyer.' The Hebrew phrase may point either to a
      person characterized by destruction or more concretely to one who destroys.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic/additive comparison. 'Even' fits the proverb's
    force by marking the surprising equivalence between the lazy worker and the destroyer.
- source_word: מִתְרַפֶּה
  chosen: one who is slack
  alternatives:
  - lazy
  - slack-handed
  - negligent
  - one who relaxes himself
  lexicon: HALOT
  rationale: The Hitpael participle from רפה conveys letting oneself become slack,
    showing negligence rather than mere inability. 'One who is slack' preserves the
    participial, character-describing force without over-paraphrase.
- source_word: בִמְלַאכְתּוֹ
  chosen: in his work
  alternatives:
  - in his labor
  - in his task
  - in his occupation
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work, labor, or task. 'In his work' is natural
    modern English and preserves the sphere in which the slackness is displayed.
- source_word: אָח הוּא
  chosen: is brother to
  alternatives:
  - is akin to
  - is the brother of
  - belongs with
  lexicon: HALOT
  rationale: The Hebrew uses kinship language metaphorically to express close similarity
    or shared character. 'Is brother to' keeps the concrete familial metaphor rather
    than flattening it into a purely abstract comparison.
- source_word: לְבַעַל
  chosen: to a master of
  alternatives:
  - to an owner of
  - to one given to
  - to a possessor of
  lexicon: HALOT
  rationale: בעל here denotes one characterized by or possessing the following quality.
    'Master of' is idiomatic in English and preserves the sense of a person marked
    by destructive activity.
- source_word: מַשְׁחִית
  chosen: destruction
  alternatives:
  - ruin
  - waste
  - destroying
  - destructive behavior
  lexicon: HALOT
  rationale: The noun denotes destructive ruin or one associated with destruction.
    Rendering the phrase as 'a master of destruction' preserves the Hebrew construction
    and the proverb's moral parallel between negligence and active ruin.
