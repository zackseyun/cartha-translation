id: PRO.18.7
reference: Proverbs 18:7
source:
  edition: WLC
  text: פִּֽי כְ֭סִיל מְחִתָּה ל֑/וֹ וּ֝/שְׂפָתָ֗י/ו מוֹקֵ֥שׁ נַפְשֽׁ/וֹ־־׃
translation:
  text: A fool’s mouth is his ruin, and his lips are a snare to his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A fool’s mouth is destruction to him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his soul'; here likely meaning 'his life' or 'himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  chosen: mouth
  alternatives:
  - mouth of
  - speech
  lexicon: HALOT
  rationale: Literally 'mouth of.' In English proverb style, 'mouth' naturally represents
    a person's speech as its source. 'Speech' is possible but less concrete than the
    Hebrew image.
- source_word: כְסִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: Standard wisdom-term rendering. 'Fool' preserves the moral and sapiential
    sense in Proverbs, not merely low intelligence.
- source_word: מְחִתָּה
  chosen: ruin
  alternatives:
  - destruction
  - terror
  - dismay
  lexicon: HALOT
  rationale: The noun can denote ruin or destruction; here it describes what the fool's
    mouth brings upon him. 'Ruin' is idiomatic and fits the parallel with 'snare.'
    'Destruction' is possible but slightly heavier; 'terror/dismay' fits less well
    in this context.
- source_word: לוֹ
  chosen: his
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: 'The preposition plus pronoun is rendered idiomatically as possession/personal
    relation in English: ''his ruin.'' A more literal ''to him'' is awkward here.'
- source_word: וּשְׂפָתָיו
  chosen: and his lips
  alternatives:
  - and his speech
  lexicon: HALOT
  rationale: Retains the concrete body-part imagery and the synonymous parallelism
    with 'mouth.'
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: '''Snare'' is the standard metaphorical rendering in wisdom literature
    and matches the poetic register. ''Trap'' is possible but less traditional and
    slightly less vivid here.'
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In Proverbs, נֶפֶשׁ often refers to the person's life or self rather
    than the immaterial soul in a narrow sense. 'His life' best communicates the idiom
    in contemporary English without importing later anthropological distinctions.
