id: PRO.18.15
reference: Proverbs 18:15
source:
  edition: WLC
  text: לֵ֣ב נָ֭בוֹן יִקְנֶה דָּ֑עַת וְ/אֹ֥זֶן חֲ֝כָמִ֗ים תְּבַקֶּשׁ דָּֽעַת־־׃
translation:
  text: An understanding heart acquires knowledge, and the ear of the wise seeks knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a discerning heart gains knowledge.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the ear of the wise'; the singular 'ear' is a collective/metaphorical
      expression for receptiveness to instruction.
    reason: cultural_note
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, לֵב commonly denotes the inner faculty of
    thought, discernment, and volition, not merely emotion. 'Heart' preserves the
    Hebrew metaphor while remaining natural in English.
- source_word: נָבוֹן
  chosen: understanding
  alternatives:
  - discerning
  - prudent
  lexicon: HALOT
  rationale: As an attributive adjective modifying 'heart,' נָבוֹן describes perceptive
    discernment. 'Understanding' fits idiomatic English in the phrase 'an understanding
    heart' and matches wisdom-context usage.
- source_word: יִקְנֶה
  chosen: acquires
  alternatives:
  - gets
  - gains
  - buys
  lexicon: HALOT
  rationale: קנה can mean 'buy/acquire/possess.' In this proverbial context of pursuing
    wisdom, 'acquires' best conveys intentional obtaining without overly commercial
    overtones.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - learning
  lexicon: HALOT
  rationale: דַּעַת in Proverbs regularly refers to knowledge in the sense of learned
    understanding. 'Knowledge' is the most direct and consistent rendering here; repeated
    in both cola for rhetorical parallelism.
- source_word: אֹזֶן
  chosen: ear
  alternatives:
  - hearing
  - listening ear
  lexicon: HALOT
  rationale: The singular noun is a concrete body-part image used metaphorically for
    receptivity. 'Ear' preserves the Hebrew imagery and the proverb's parallelism
    with 'heart.'
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise people
  - wise men
  lexicon: HALOT
  rationale: The masculine plural is representative/generic in wisdom literature.
    'The wise' is gender-accurate to intent without unnecessarily narrowing the reference,
    and it works naturally after 'ear of.'
- source_word: תְּבַקֶּשׁ
  chosen: seeks
  alternatives:
  - searches for
  - pursues
  lexicon: HALOT
  rationale: בקש in the piel expresses active seeking. 'Seeks' is concise, idiomatic,
    and preserves the parallel with 'acquires' in the first colon.
