id: PRO.18.2
reference: Proverbs 18:2
source:
  edition: WLC
  text: לֹֽא יַחְפֹּ֣ץ כְּ֭סִיל בִּ/תְבוּנָ֑ה כִּ֝֗י אִֽם בְּ/הִתְגַּלּ֥וֹת לִבּֽ/וֹ־־׃
translation:
  text: A fool does not delight in understanding, but only in revealing his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but rather in exposing what is in his heart.' Here 'heart' refers to
      the inner thoughts and inclinations, not merely emotions.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפֹּץ
  chosen: does not delight in
  alternatives:
  - takes no pleasure in
  - desires not
  lexicon: HALOT
  rationale: חפץ commonly denotes taking pleasure in, delighting in, or desiring.
    'Does not delight in' preserves the volitional nuance in natural English and fits
    the wisdom context better than a flatter 'does not want.'
- source_word: כְּסִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: In Proverbs כְּסִיל is a stock wisdom term for a morally and intellectually
    obstinate person, not merely someone lacking intelligence. 'Fool' is the established
    and most accurate English equivalent.
- source_word: תְבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: תבונה in wisdom literature refers to understanding or discernment. 'Understanding'
    is the most direct and idiomatic rendering here and pairs well with 'fool' in
    English wisdom style.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - but rather
  - except that
  lexicon: HALOT
  rationale: 'The construction introduces a strong contrast: the fool has no pleasure
    in understanding, but instead in something else. ''But only'' captures the exclusivity
    and adversative force succinctly.'
- source_word: בְּהִתְגַּלּוֹת
  chosen: in revealing
  alternatives:
  - in exposing
  - in making known
  lexicon: HALOT
  rationale: From גלה, the infinitive here conveys disclosure or uncovering. 'Revealing'
    is a natural English equivalent that preserves the metaphor of uncovering what
    is within.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - what is in him
  lexicon: HALOT
  rationale: לֵב/לֵבָב often denotes the inner person—thoughts, intentions, desires.
    'Heart' is the standard biblical rendering and preserves the Hebrew anthropological
    sense without over-interpreting it as merely emotion or intellect.
