id: PRO.18.24
reference: Proverbs 18:24
source:
  edition: WLC
  text: אִ֣ישׁ רֵ֭עִים לְ/הִתְרֹעֵ֑עַ וְ/יֵ֥שׁ אֹ֝הֵ֗ב דָּבֵ֥ק מֵ/אָֽח׃
translation:
  text: A man of many companions may come to ruin, but there is a friend who sticks
    closer than a brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A man of many companions must show himself friendly'; the Hebrew verb
      לְהִתְרֹעֵעַ is difficult and has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - A person
  - Someone
  lexicon: HALOT
  rationale: Rendered with the gender-accurate singular 'man' in keeping with the
    Hebrew masculine singular and the project's stated preference for gender-accurate
    translation where the source uses masculine representative language.
- source_word: רֵעִים
  chosen: companions
  alternatives:
  - friends
  - associates
  lexicon: HALOT
  rationale: The plural noun can denote friends/companions/associates. 'Companions'
    avoids prematurely equating this first group with the more positive singular 'friend'
    in the second colon, preserving the proverb's contrast.
- source_word: לְהִתְרֹעֵעַ
  chosen: may come to ruin
  alternatives:
  - comes to ruin
  - is ruined
  - shows himself friendly
  lexicon: HALOT
  rationale: This form is notoriously difficult and has been understood either from
    a root meaning 'to associate' ('to make many friends' / 'to show oneself friendly')
    or from a sense yielding 'to be broken/ruined.' The immediate contrast with a
    loyal friend favors the sense that having many companions can still end badly.
    'May come to ruin' preserves proverbial force without overstating inevitability.
    The alternative traditional reading is preserved in a footnote.
- source_word: וְיֵשׁ
  chosen: but there is
  alternatives:
  - and there is
  - yet there is
  lexicon: HALOT
  rationale: The conjunction introduces a contrast between many superficial companions
    and one loyal friend. English 'but' best conveys the adversative sense in context.
- source_word: אֹהֵב
  chosen: a friend
  alternatives:
  - one who loves
  - a lover
  lexicon: HALOT
  rationale: Although literally 'one loving' or 'a lover/friend,' in this wisdom context
    it denotes a loving friend. 'A friend' is idiomatic and fits the contrast with
    'companions,' while the following participle supplies the loyal action.
- source_word: דָּבֵק
  chosen: sticks closer
  alternatives:
  - clings more closely
  - holds fast more than
  lexicon: HALOT
  rationale: The participle from דבק conveys close attachment or cleaving. 'Sticks
    closer' is natural modern English and preserves the vivid relational imagery.
- source_word: מֵאָח
  chosen: than a brother
  alternatives:
  - than one's brother
  lexicon: HALOT
  rationale: The comparative preposition with 'brother' expresses a degree of closeness
    surpassing even sibling bonds. 'Than a brother' is the most idiomatic English
    rendering.
