id: PRO.18.13
reference: Proverbs 18:13
source:
  edition: WLC
  text: מֵשִׁ֣יב דָּ֭בָר בְּ/טֶ֣רֶם יִשְׁמָ֑ע אִוֶּ֥לֶת הִיא ל֝֗/וֹ וּ/כְלִמָּֽה־׃
translation:
  text: Whoever answers a matter before he hears it, it is folly and shame to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever answers a word/case before hearing it.' The Hebrew דָּבָר can
      mean 'word,' 'matter,' or 'case.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵשִׁיב
  chosen: answers
  alternatives:
  - responds
  - gives an answer
  lexicon: HALOT
  rationale: Hiphil participle of שוב here functions idiomatically as 'to answer/respond,'
    not in its more basic sense 'to bring back/return.' English 'answers' is concise
    and natural in a proverb.
- source_word: דָּבָר
  chosen: a matter
  alternatives:
  - a word
  - a case
  - a thing
  lexicon: HALOT
  rationale: דבר is broad, but in wisdom context with 'before he hears' it refers
    to a matter/case under discussion rather than merely a single spoken word. 'A
    matter' preserves the proverb's applicability to speech, disputes, and decisions.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - prior to the time that
  lexicon: HALOT
  rationale: Standard temporal sense. 'Before' is the clearest idiomatic English equivalent.
- source_word: יִשְׁמָע
  chosen: he hears
  alternatives:
  - he listens
  - he has heard
  lexicon: HALOT
  rationale: שמע can mean hear/listen, but 'he hears' fits the Hebrew imperfect and
    keeps the proverb's emphasis on receiving the matter before answering.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: A standard wisdom-term gloss. 'Folly' is compact and preserves the moral-intellectual
    nuance common in Proverbs.
- source_word: הִיא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with אִוֶּלֶת and is naturally represented
    in English by the copular clause 'it is' referring to the act just described.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The lamed marks personal reference/result. 'To him' is a conventional
    rendering in English proverbial style and matches the Hebrew closely.
- source_word: וּכְלִמָּה
  chosen: and shame
  alternatives:
  - and disgrace
  - and humiliation
  lexicon: HALOT
  rationale: כלמה denotes disgrace/shame. 'Shame' pairs well with 'folly' and preserves
    the terse force of the Hebrew.
