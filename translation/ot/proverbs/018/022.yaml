id: PRO.18.22
reference: Proverbs 18:22
source:
  edition: WLC
  text: מָצָ֣א אִ֭שָּׁה מָ֣צָא ט֑וֹב וַ/יָּ֥פֶק רָ֝צ֗וֹן מֵ/יְהוָֽה׃
translation:
  text: He who finds a wife finds a good thing and obtains favor from Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever finds a wife finds good and obtains favor from the LORD.' The Hebrew uses a masculine singular form in a proverbial, representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָא
  chosen: finds
  alternatives:
  - has found
  - find
  lexicon: HALOT
  rationale: The Qal perfect in proverb style expresses a general truth; English present 'finds' best conveys gnomic force in natural modern English.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In wisdom literature and in this collocation, the sense is marital rather than generic female. 'Wife' fits the proverb's point about marriage; 'woman' would be too broad.
- source_word: טוֹב
  chosen: a good thing
  alternatives:
  - good
  - what is good
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'A good thing' is idiomatic English and preserves the indefinite, proverbial sense.
- source_word: וַיָּפֶק
  chosen: obtains
  alternatives:
  - receives
  - draws forth
  - secures
  lexicon: HALOT
  rationale: The verb here carries the sense of gaining or obtaining. 'Obtains' is concise and fits the parallel with 'finds.' 'Draws forth' would be too literal and awkward in English.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  lexicon: HALOT
  rationale: In relation to the LORD, רָצוֹן commonly denotes favor or goodwill. 'Favor' is the most natural and theologically neutral rendering here.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD.' The preposition מִן is straightforwardly 'from.'
- source_word: implicit subject of מָצָא
  chosen: He who
  alternatives:
  - Whoever
  - The one who
  rationale: Hebrew omits the explicit subject, but English requires one. 'He who' preserves the masculine singular form and proverbial style in keeping with the gender-accurate policy; the statement is generic rather than restricted in application.
