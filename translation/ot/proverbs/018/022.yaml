theological_decisions:
- issue: Rendering the generic masculine proverb subject
  chosen_reading: He who finds a wife
  alternative_readings:
  - Whoever finds a wife
  - The one who finds a wife
  rationale: The Hebrew uses masculine singular grammar in a representative, proverbial statement. Following the gender-accurate policy, the translation preserves the masculine form rather than neutralizing it, while understanding the proverb as a general maxim.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
