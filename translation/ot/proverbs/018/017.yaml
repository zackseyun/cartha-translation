id: PRO.18.17
reference: Proverbs 18:17
source:
  edition: WLC
  text: צַדִּ֣יק הָ/רִאשׁ֣וֹן בְּ/רִיב֑/וֹ יבא רֵ֝עֵ֗/הוּ וַ/חֲקָרֽ/וֹ־׃
translation:
  text: The first to present his case seems right, until his neighbor comes and examines
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The first in his dispute seems just, until the other party comes and
      examines him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: seems right
  alternatives:
  - is righteous
  - is in the right
  - appears just
  lexicon: HALOT
  rationale: Although the adjective commonly means 'righteous/just,' in legal-dispute
    context with בְּרִיבוֹ ('in his dispute/case') it idiomatically refers to appearing
    or being in the right. English 'seems right' captures the proverb's point about
    initial plausibility before cross-examination.
- source_word: הָרִאשׁוֹן
  chosen: The first
  alternatives:
  - Whoever is first
  - The one who comes first
  lexicon: HALOT
  rationale: Marks the first party to speak or appear in the dispute. 'The first'
    is concise and preserves the comparative setup completed by the following clause.
- source_word: בְּרִיבוֹ
  chosen: to present his case
  alternatives:
  - in his dispute
  - in his lawsuit
  - in his contention
  lexicon: HALOT
  rationale: רִיב can denote dispute, contention, or legal case. In idiomatic English,
    'present his case' makes explicit the forensic sense implied by the proverb without
    over-paraphrasing.
- source_word: יבא
  chosen: to present
  alternatives:
  - comes
  - appears
  - enters
  lexicon: HALOT
  rationale: The verb literally means 'comes,' but in context it refers to the first
    party coming forward in a dispute. Rendering it within 'to present his case' communicates
    the action naturally in English while preserving the legal setting.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - the other party
  - his friend
  lexicon: HALOT
  rationale: רֵעַ often means neighbor, companion, or associate. 'His neighbor' is
    a standard and broad rendering that fits wisdom literature and avoids implying
    friendship where the context is adversarial.
- source_word: וַחֲקָרוֹ
  chosen: examines him
  alternatives:
  - searches him out
  - cross-examines him
  - investigates him
  lexicon: HALOT
  rationale: The verb חקר means to examine, investigate, or search out. 'Examines
    him' is broad enough for wisdom style while still suggesting scrutiny of the first
    speaker's claims. 'Cross-examines' is possible but slightly more technical than
    the Hebrew requires.
