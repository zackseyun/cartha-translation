id: PRO.18.8
reference: Proverbs 18:8
source:
  edition: WLC
  text: דִּבְרֵ֣י נִ֭רְגָּן כְּ/מִֽתְלַהֲמִ֑ים וְ֝/הֵ֗ם יָרְד֥וּ חַדְרֵי בָֽטֶן־׃
translation:
  text: The words of a whisperer are like delicious morsels, and they go down into
    the inner chambers of the belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like dainty bits'; the rare Hebrew term may also be understood as 'like
      wounds' or 'like things greedily swallowed.'
    reason: lexical_alternative
  - marker: b
    text: '''The inner chambers of the belly'' is a Hebrew idiom for a person''s inmost
      being.'
    reason: cultural_note
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר; 'words of' is the most natural and sufficiently
    formal rendering in English.
- source_word: נִרְגָּן
  chosen: a whisperer
  alternatives:
  - a gossip
  - a grumbler
  - a slanderer
  lexicon: HALOT
  rationale: The noun denotes one who murmurs or spreads talk in a covert, divisive
    way. 'Whisperer' preserves the image of secretive speech better than the more
    interpretive 'gossip,' while still being intelligible in modern English.
- source_word: כְּמִתְלַהֲמִים
  chosen: like delicious morsels
  alternatives:
  - like dainty bits
  - like wounds
  - like things greedily swallowed
  lexicon: HALOT
  rationale: This rare form is debated. In Proverbs 26:22 the same wording is commonly
    understood as something tasty or eagerly consumed. 'Delicious morsels' best fits
    the proverb's imagery and parallelism with words going down into the inner person.
    Because the lexical sense is contested, alternatives are preserved in a footnote.
- source_word: וְהֵם
  chosen: and they
  alternatives:
  - and these
  lexicon: HALOT
  rationale: Simple conjunction plus independent pronoun resuming the subject 'words';
    'and they' is the natural English equivalent.
- source_word: יָרְדוּ
  chosen: go down
  alternatives:
  - descend
  - have gone down
  lexicon: HALOT
  rationale: Though formally perfect, in proverbial discourse the verb expresses a
    general truth. English present 'go down' communicates the gnomic sense better
    than a simple past.
- source_word: חַדְרֵי בָטֶן
  chosen: the inner chambers of the belly
  alternatives:
  - the innermost parts of the body
  - the depths of the inner being
  - the chambers of the stomach
  lexicon: HALOT
  rationale: Literally 'rooms/chambers of the belly.' Retaining 'inner chambers' preserves
    the metaphor of penetration into a person's depths. 'Belly' is kept rather than
    fully abstracting to 'heart' or 'inner being,' though the phrase idiomatically
    refers to the inner self.
