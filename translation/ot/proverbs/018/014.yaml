id: PRO.18.14
reference: Proverbs 18:14
source:
  edition: WLC
  text: רֽוּחַ אִ֭ישׁ יְכַלְכֵּ֣ל מַחֲלֵ֑/הוּ וְ/ר֥וּחַ נְ֝כֵאָ֗ה מִ֣י יִשָּׂאֶֽ/נָּה־׃
translation:
  text: A man's spirit can sustain him in sickness, but a crushed spirit—who can bear
    it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person's spirit can sustain him in illness.' The Hebrew uses singular
      masculine 'man' in a representative proverbial sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'a broken spirit' instead of 'a crushed spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - wind
  - inner spirit
  - temper
  lexicon: HALOT
  rationale: In wisdom literature, רוּחַ commonly refers to a person's inner disposition
    or animating inner life rather than literal wind or breath. Here it is contrasted
    with physical sickness and then described as crushed, which favors 'spirit' as
    the inner resilience of a person.
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - a person's
  - a human's
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and in proverbial style often has representative
    force. Per the translation philosophy's gender-accurate principle, 'a man's' preserves
    the source form while still functioning generically in context.
- source_word: יְכַלְכֵּל
  chosen: can sustain
  alternatives:
  - will sustain
  - supports
  - endures
  - maintains
  lexicon: HALOT
  rationale: 'The verb from כלכל carries the sense of supporting, sustaining, or maintaining.
    ''Can sustain'' best captures the modal force in an English proverb: an inner
    spirit is able to carry a person through illness.'
- source_word: מַחֲלֵהוּ
  chosen: him in sickness
  alternatives:
  - his sickness
  - his illness
  - his disease
  lexicon: HALOT
  rationale: The noun means sickness/illness, with the 3ms suffix 'his.' In idiomatic
    English, 'sustain him in sickness' expresses the relationship more naturally than
    'sustain his sickness,' while preserving the sense that the man's spirit bears
    him through his illness.
- source_word: נְכֵאָה
  chosen: crushed
  alternatives:
  - broken
  - stricken
  - wounded
  lexicon: HALOT
  rationale: The adjective denotes something smitten, broken, or crushed. 'Crushed'
    is vivid, natural modern English and fits the contrast with a resilient spirit.
- source_word: מִי
  chosen: who
  alternatives:
  - who is able to
  lexicon: HALOT
  rationale: The interrogative introduces a rhetorical question. Simple 'who' is sufficient
    in English, with ability implied by the context.
- source_word: יִשָּׂאֶנָּה
  chosen: can bear it
  alternatives:
  - can carry it
  - can endure it
  - will lift it
  lexicon: HALOT
  rationale: נשא often means bear, carry, or lift. In context of a crushed spirit,
    'bear it' communicates enduring or carrying such a condition. The feminine suffix
    refers back to 'spirit,' but English idiom naturally uses 'it' for the condition/state.
