id: PRO.18.19
reference: Proverbs 18:19
source:
  edition: WLC
  text: אָ֗ח נִפְשָׁ֥ע מִ/קִּרְיַת עֹ֑ז ו/מדונים כִּ/בְרִ֥יחַ אַרְמֽוֹן־׃
translation:
  text: A brother offended is harder to win than a fortified city, and quarrels are
    like the bars of a citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A brother wronged is harder to win than a fortified city.' The Hebrew
      participle can emphasize one who has been wronged/offended, leading to either
      'offended' or 'wronged' in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'and disputes are like the bar of a citadel/palace.' The final noun can
      denote either a fortified residence ('citadel') or 'palace,' but the defensive
      context favors 'citadel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָח
  chosen: brother
  alternatives:
  - a brother
  - a kinsman
  lexicon: HALOT
  rationale: The noun literally means 'brother.' In Proverbs it can denote a literal
    brother or a close relational counterpart. 'Brother' preserves the Hebrew image
    and the proverb's force better than broadening to 'kinsman' in the main text.
- source_word: נִפְשָׁע
  chosen: offended
  alternatives:
  - wronged
  - alienated
  - rebelled against
  lexicon: HALOT
  rationale: From פשע, here likely describing one who has been offended or estranged
    in relationship. 'Offended' is idiomatic in English proverb style and fits the
    context of relational breach. 'Wronged' is possible and preserved as an alternative
    nuance, but 'offended' better matches the traditional sense without overstating
    legal injury.
- source_word: מִקִּרְיַת עֹז
  chosen: than a fortified city
  alternatives:
  - than a strong city
  - more than a city of strength
  lexicon: HALOT
  rationale: The comparative מִן with 'city of strength' yields the sense 'harder
    than a fortified/strong city.' 'Fortified city' is natural modern English and
    conveys defensive inaccessibility.
- source_word: וּמְדֹנִים
  chosen: and quarrels
  alternatives:
  - and contentions
  - and disputes
  lexicon: HALOT
  rationale: The plural noun denotes strifes or contentions. 'Quarrels' is clear,
    contemporary, and suits proverbial style.
- source_word: כִּבְרִיחַ
  chosen: are like the bars of
  alternatives:
  - are like a bar of
  - like the bolt of
  lexicon: HALOT
  rationale: בְּרִיחַ is a bar or bolt used to secure a gate or door. Because English
    idiom with a large building naturally uses plural 'bars,' this rendering communicates
    the image clearly, though the Hebrew form is singular/collective in comparison.
- source_word: אַרְמוֹן
  chosen: a citadel
  alternatives:
  - a palace
  - a fortress
  lexicon: HALOT
  rationale: The term can mean palace or fortified stronghold. In this context of
    defensive imagery ('fortified city,' 'bars'), 'citadel' best preserves the sense
    of an imposing, secured stronghold. 'Palace' is possible lexically but weaker
    in the immediate metaphor.
