id: PRO.18.23
reference: Proverbs 18:23
source:
  edition: WLC
  text: תַּחֲנוּנִ֥ים יְדַבֶּר רָ֑שׁ וְ֝/עָשִׁ֗יר יַעֲנֶ֥ה עַזּֽוֹת־׃
translation:
  text: The poor man speaks with pleas, but the rich man answers harshly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The poor speaks with supplications, but the rich answers with hard words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחֲנוּנִים
  chosen: with pleas
  alternatives:
  - supplications
  - entreaties
  - pleading
  lexicon: HALOT
  rationale: The plural noun denotes earnest requests for favor or mercy. 'Pleas'
    is natural modern English and preserves the sense of humble entreaty without sounding
    overly formal. Rendering it adverbially with 'speaks with pleas' reflects the
    Hebrew construction where the noun functions as the manner/content of speaking.
- source_word: יְדַבֶּר
  chosen: speaks
  alternatives:
  - speaks with
  - utters
  - makes
  lexicon: HALOT
  rationale: Piel of דבר commonly means 'speak.' Present tense suits proverbial style
    in English. Combined with תַּחֲנוּנִים, it conveys the manner of speech rather
    than a one-time act.
- source_word: רָשׁ
  chosen: the poor man
  alternatives:
  - a poor man
  - the poor
  - the needy man
  lexicon: HALOT
  rationale: The adjective/substantive refers to a poor person. 'The poor man' preserves
    the singular representative force typical of Proverbs and follows the project's
    gender-accurate principle for grammatically masculine generic forms.
- source_word: וְעָשִׁיר
  chosen: but the rich man
  alternatives:
  - and the rich man
  - while the rich man
  - but a rich man
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the proverb sets up a contrast
    between poor and rich, so 'but' best conveys the adversative sense in idiomatic
    English. 'The rich man' mirrors the singular representative masculine form.
- source_word: יַעֲנֶה
  chosen: answers
  alternatives:
  - responds
  - replies
  lexicon: HALOT
  rationale: ענה in Qal commonly means 'answer/respond.' 'Answers' is the most direct
    and idiomatic choice in this antithetical proverb.
- source_word: עַזּוֹת
  chosen: harshly
  alternatives:
  - roughly
  - with hard words
  - boldly
  lexicon: HALOT
  rationale: From עזז/עז, the plural feminine form here functions adverbially, describing
    the manner of the rich man's response. In context the sense is not commendable
    boldness but hard, severe, or brusque speech. 'Harshly' captures the social contrast
    of the proverb better than the more ambiguous 'boldly'.
