id: PRO.18.1
reference: Proverbs 18:1
source:
  edition: WLC
  text: לְֽ֭/תַאֲוָה יְבַקֵּ֣שׁ נִפְרָ֑ד בְּ/כָל תּ֝וּשִׁיָּ֗ה יִתְגַּלָּֽע־׃
translation:
  text: Whoever isolates himself seeks his own desire; he breaks out against all sound
    judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He who separates himself seeks desire; against all sound wisdom he
      quarrels.' The Hebrew of the second line is difficult, especially the rare verb
      rendered 'breaks out against.'
    reason: alternative_reading
  - marker: b
    text: '''Sound judgment'' may also be rendered ''sound wisdom'' or ''good sense.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְתַאֲוָה
  chosen: his own desire
  alternatives:
  - selfish desire
  - craving
  - for desire
  lexicon: HALOT
  rationale: 'The noun תַּאֲוָה commonly denotes desire, craving, or longing. With
    the prefixed לְ and in this proverb''s compressed style, it expresses purpose
    or motive: the separated person acts for the sake of his own desire. ''His own
    desire'' makes the implied self-reference clear in English without over-paraphrasing.'
- source_word: יְבַקֵּשׁ
  chosen: seeks
  alternatives:
  - pursues
  - looks for
  lexicon: HALOT
  rationale: בקש in the piel regularly means 'seek' or 'pursue.' 'Seeks' is the most
    direct and idiomatic rendering here.
- source_word: נִפְרָד
  chosen: whoever isolates himself
  alternatives:
  - the one separated
  - a recluse
  - he who separates himself
  lexicon: HALOT
  rationale: From פרד, the niphal participle denotes one who is separated or who separates
    himself. In context the sense is not merely passive separation but self-isolation
    from community and counsel. 'Whoever isolates himself' captures the proverbial/generic
    force in natural English.
- source_word: בְּכָל
  chosen: against all
  alternatives:
  - in every
  - with all
  - toward every
  lexicon: HALOT
  rationale: The preposition בְ here is difficult in a terse poetic line. Given the
    following verb and the adversative sense of the clause, 'against all' best conveys
    the relational force in idiomatic English.
- source_word: תּוּשִׁיָּה
  chosen: sound judgment
  alternatives:
  - wisdom
  - sound wisdom
  - good sense
  lexicon: HALOT
  rationale: תּוּשִׁיָּה in wisdom literature often refers to sound wisdom, practical
    insight, or effective judgment. 'Sound judgment' fits the proverb's social-ethical
    context and reads naturally.
- source_word: יִתְגַּלָּע
  chosen: he breaks out against
  alternatives:
  - he quarrels with
  - he shows his teeth against
  - he is exposed in
  lexicon: HALOT
  rationale: This rare hitpael form from געל/גלע is notoriously difficult. In context
    and by common scholarly understanding, it conveys bursting out in hostility or
    contention. 'Breaks out against' preserves the vividness while avoiding overconfidence
    in a more specific image such as 'shows his teeth.'
