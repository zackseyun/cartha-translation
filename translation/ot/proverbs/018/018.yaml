id: PRO.18.18
reference: Proverbs 18:18
source:
  edition: WLC
  text: מִ֭דְיָנִים יַשְׁבִּ֣ית הַ/גּוֹרָ֑ל וּ/בֵ֖ין עֲצוּמִ֣ים יַפְרִֽיד׃
translation:
  text: The lot puts an end to disputes, and separates between the mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The lot settles disputes and decides between the powerful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדְיָנִים
  chosen: disputes
  alternatives:
  - contentions
  - quarrels
  - strifes
  lexicon: HALOT
  rationale: The plural noun denotes conflicts or legal/contentious disputes. 'Disputes'
    is natural modern English and broad enough to cover interpersonal or judicial
    contention without sounding archaic like 'strifes'.
- source_word: יַשְׁבִּית
  chosen: puts an end to
  alternatives:
  - causes to cease
  - stops
  - settles
  lexicon: HALOT
  rationale: 'Hiphil of שבת here has causative force: ''cause to cease.'' ''Puts an
    end to'' preserves the causative sense in idiomatic English better than the more
    interpretive ''settles''.'
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the casting of lots
  - the decision by lot
  lexicon: HALOT
  rationale: גורל refers to the lot used for decision-making. 'The lot' is the standard
    concise rendering and fits the proverb's gnomic style.
- source_word: וּבֵין
  chosen: and separates between
  alternatives:
  - and decides between
  - and separates
  - even between
  lexicon: HALOT
  rationale: The preposition בין introduces the parties distinguished or divided.
    Rendering it explicitly as 'between' preserves the Hebrew structure, though slightly
    less idiomatic in English.
- source_word: עֲצוּמִים
  chosen: the mighty
  alternatives:
  - the strong
  - powerful men
  - the powerful
  lexicon: HALOT
  rationale: The adjective denotes those who are strong or powerful. 'The mighty'
    is concise and proverbially fitting, while avoiding over-specification such as
    'men' where the Hebrew adjective itself does not require it.
- source_word: יַפְרִיד
  chosen: separates
  alternatives:
  - divides
  - distinguishes
  - decides
  lexicon: HALOT
  rationale: Hiphil of פרד commonly means 'separate' or 'divide.' In context of arbitration
    by lot, it likely means separating opposing powerful parties. 'Separates' keeps
    the concrete Hebrew image while allowing the judicial implication to be inferred.
