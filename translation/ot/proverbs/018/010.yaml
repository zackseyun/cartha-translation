id: PRO.18.10
reference: Proverbs 18:10
source:
  edition: WLC
  text: מִגְדַּל עֹ֭ז שֵׁ֣ם יְהוָ֑ה בּֽ/וֹ יָר֖וּץ צַדִּ֣יק וְ/נִשְׂגָּֽב־־׃
translation:
  text: The name of the LORD is a strong tower; the righteous man runs into it and
    is set securely on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Or 'the righteous,' with representative force; Hebrew singular masculine.
    reason: lexical_alternative
  - marker: c
    text: Or 'is safe' / 'is protected'; the Hebrew verb suggests being set in a high,
      inaccessible place.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל
  chosen: tower
  alternatives:
  - fortress
  - towered stronghold
  lexicon: HALOT
  rationale: The noun denotes a tower or elevated defensive structure. 'Tower' is
    the most direct and natural English rendering in the proverb's metaphor.
- source_word: עֹז
  chosen: strong
  alternatives:
  - strength
  - mighty
  lexicon: HALOT
  rationale: In construct with מִגְדַּל, the phrase means 'tower of strength.' Rendering
    adjectivally as 'strong tower' is idiomatic English while preserving the force
    of the Hebrew.
- source_word: שֵׁם
  chosen: name
  alternatives:
  - reputation
  lexicon: HALOT
  rationale: Hebrew 'name' can imply revealed character or reputation, but the proverb
    explicitly says 'name,' and retaining it preserves the theological richness without
    over-interpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern.
- source_word: בּוֹ
  chosen: into it
  alternatives:
  - into him
  - in it
  lexicon: HALOT
  rationale: The preposition plus 3ms suffix is grammatically masculine singular and
    refers back most naturally to the metaphorical 'tower' represented by 'the name
    of the LORD.' English idiom with 'run' favors 'into it.' Because the referent
    is the divine name in metaphor, 'into him' is possible but less immediate in this
    syntax.
- source_word: יָרוּץ
  chosen: runs
  alternatives:
  - flees
  - hurries
  lexicon: HALOT
  rationale: The verb means 'run.' In this protective context it implies urgent movement
    for refuge, but 'runs' keeps the image concrete and lets the context supply the
    nuance.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: The adjective is substantival singular masculine. Per translation philosophy,
    a gender-accurate rendering is preferred where the source is grammatically masculine
    with representative force. 'The righteous man' preserves the singular and proverbial
    character.
- source_word: נִשְׂגָּב
  chosen: is set securely on high
  alternatives:
  - is safe
  - is exalted
  - is protected
  lexicon: HALOT
  rationale: The Niphal of שׂגב carries the sense of being made inaccessible, high,
    or secure. 'Is set securely on high' captures both the vertical imagery and the
    security implied by the defensive metaphor better than the flatter 'is safe.'
