id: PRO.18.21
reference: Proverbs 18:21
source:
  edition: WLC
  text: מָ֣וֶת וְ֭/חַיִּים בְּ/יַד לָשׁ֑וֹן וְ֝/אֹהֲבֶ֗י/הָ יֹאכַ֥ל פִּרְיָֽ/הּ־׃
translation:
  text: Death and life are in the power of the tongue, and those who love it will
    eat its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Death and life are in the hand of the tongue.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who love it'' likely refers to those who love using the tongue;
      that is, they will experience the consequences of their words, whether for death
      or for life.'
    reason: cultural_note
lexical_decisions:
- source_word: מָוֶת
  chosen: Death
  alternatives:
  - death
  lexicon: HALOT
  rationale: Rendered as the abstract noun 'Death' to match the Hebrew noun used in
    parallel with 'life.' Capitalization is stylistic sentence-initial English, not
    personification.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew commonly functions as the abstract
    singular 'life.' The singular best matches idiomatic English and the antithetical
    pairing with 'death.'
- source_word: בְּיַד
  chosen: are in the power of
  alternatives:
  - are in the hand of
  - are in the control of
  lexicon: HALOT
  rationale: The idiom 'in the hand of' denotes power or control. 'In the power of'
    communicates the Hebrew sense naturally in modern English while preserving the
    metaphorical force.
- source_word: לָשׁוֹן
  chosen: the tongue
  alternatives:
  - the tongue/speech
  - speech
  lexicon: HALOT
  rationale: Kept the concrete image 'tongue' rather than abstracting to 'speech,'
    since the proverb uses the body-part metaphor for human words and their effects.
- source_word: אֹהֲבֶיהָ
  chosen: those who love it
  alternatives:
  - its lovers
  - those who love the tongue
  - those who love speaking
  lexicon: HALOT
  rationale: The suffix most naturally refers back to 'tongue.' 'Those who love it'
    preserves the ambiguity of whether this means loving speech itself, using the
    tongue much, or indulging its power, without over-interpreting.
- source_word: יֹאכַל
  chosen: will eat
  alternatives:
  - eats
  - shall eat
  lexicon: HALOT
  rationale: 'Rendered with future-like English to fit proverbial consequence: those
    who love the tongue will experience the outcome. Singular Hebrew verb after a
    plural participial expression is a common collective construction and does not
    require singular English.'
- source_word: פִּרְיָהּ
  chosen: its fruit
  alternatives:
  - the fruit of it
  - its produce
  lexicon: HALOT
  rationale: A standard metaphor for consequences or results. 'Its fruit' is concise,
    idiomatic, and preserves the agricultural metaphor.
