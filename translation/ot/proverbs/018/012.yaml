id: PRO.18.12
reference: Proverbs 18:12
source:
  edition: WLC
  text: לִ/פְנֵי שֶׁ֭בֶר יִגְבַּ֣הּ לֵב אִ֑ישׁ וְ/לִ/פְנֵ֖י כָב֣וֹד עֲנָוָֽה־־׃
translation:
  text: Before destruction a man's heart is haughty, and before honor comes humility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person's heart.' The Hebrew has 'a man's heart,' using a masculine
      singular form in a generic proverbial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: Before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: HALOT
  rationale: Temporal-prepositional use here marks what precedes an event, best rendered
    'Before' in both cola for the proverb's parallel structure.
- source_word: שֶׁבֶר
  chosen: destruction
  alternatives:
  - ruin
  - crash
  - breaking
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly denotes collapse or ruin rather
    than a literal fracture. 'Destruction' fits the moral-warning context and pairs
    naturally with the following contrast to honor.
- source_word: יִגְבַּהּ
  chosen: is haughty
  alternatives:
  - is exalted
  - rises high
  - becomes proud
  lexicon: HALOT
  rationale: Though literally 'is high,' the idiom with 'heart' expresses pride/arrogance.
    'Is haughty' captures the figurative sense without over-paraphrasing.
- source_word: לֵב אִישׁ
  chosen: a man's heart
  alternatives:
  - the heart of a man
  - a person's heart
  lexicon: HALOT
  rationale: The construct phrase is singular and grammatically masculine/generic.
    Per gender-accurate policy, 'a man's heart' preserves the source form and proverbial
    generic force better than an explicitly neutral recasting.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  - esteem
  lexicon: HALOT
  rationale: In this proverb the term refers to social exaltation or honorable status
    rather than divine glory. 'Honor' is the most natural English equivalent in contrast
    with humiliation/pride.
- source_word: עֲנָוָה
  chosen: humility
  alternatives:
  - lowliness
  - meekness
  lexicon: HALOT
  rationale: The noun denotes humble disposition. 'Humility' is clear modern English
    and preserves the ethical contrast with a haughty heart.
