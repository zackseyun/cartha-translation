id: PRO.18.11
reference: Proverbs 18:11
source:
  edition: WLC
  text: ה֣וֹן עָ֭שִׁיר קִרְיַ֣ת עֻזּ֑/וֹ וּ/כְ/חוֹמָ֥ה נִ֝שְׂגָּבָ֗ה בְּ/מַשְׂכִּיתֽ/וֹ׃
translation:
  text: A rich man's wealth is his strong city, and like a high wall in his imagination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his mind,' 'in his perception,' or 'in his conceit.' The Hebrew term
      refers to a mental image or way of seeing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - property
  lexicon: HALOT
  rationale: Denotes material wealth or possessions. 'Wealth' is natural modern English
    and fits the proverb's general statement better than the slightly narrower 'riches.'
- source_word: עָשִׁיר
  chosen: rich man’s
  alternatives:
  - the rich man’s
  - a wealthy man’s
  lexicon: HALOT
  rationale: 'The adjective functions substantivally: ''rich person/man.'' Because
    the proverb states a general principle and the Hebrew is grammatically masculine
    singular, ''rich man''s'' preserves the source''s gendered singular form in line
    with the gender-accurate policy.'
- source_word: קִרְיַת עֻזּוֹ
  chosen: his strong city
  alternatives:
  - the city of his strength
  - his fortress city
  lexicon: HALOT
  rationale: The construct phrase is literally 'city of his strength.' In English,
    'his strong city' communicates the metaphor clearly while staying close to the
    Hebrew image of urban fortification.
- source_word: וּכְחוֹמָה נִשְׂגָּבָה
  chosen: and like a high wall
  alternatives:
  - and like an inaccessible wall
  - and like a lofty wall
  lexicon: HALOT
  rationale: חוֹמָה is 'wall'; נִשְׂגָּבָה conveys height/exaltation and by implication
    inaccessibility or impregnability. 'High wall' is concise, idiomatic, and preserves
    the image without overinterpreting.
- source_word: בְּמַשְׂכִּיתוֹ
  chosen: in his imagination
  alternatives:
  - in his conceit
  - in his mind
  - in his image/perception
  lexicon: HALOT
  rationale: This noun can denote an image, representation, or mental picture. In
    this context the sense is the rich man's perception of his wealth as secure. 'In
    his imagination' best captures the subjective, possibly illusory dimension of
    the proverb; 'in his conceit' is interpretive and too pejorative for the lexical
    base alone.
