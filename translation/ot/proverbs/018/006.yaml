id: PRO.18.6
reference: Proverbs 18:6
source:
  edition: WLC
  text: שִׂפְתֵ֣י כְ֭סִיל יָבֹ֣אֽוּ בְ/רִ֑יב וּ֝/פִ֗י/ו לְֽ/מַהֲלֻמ֥וֹת יִקְרָֽא׃
translation:
  text: A fool’s lips enter into strife, and his mouth calls for blows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his lips come into a quarrel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his mouth invites a beating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  chosen: lips
  alternatives:
  - speech
  - words
  lexicon: HALOT
  rationale: Literal 'lips' is retained as a vivid metonym for speech, matching Hebrew
    style and preserving the parallel with 'mouth' in the second colon.
- source_word: כְסִיל
  chosen: fool
  alternatives:
  - stupid person
  - senseless person
  lexicon: HALOT
  rationale: '''Fool'' is the standard wisdom-literature term for כְּסִיל and carries
    the moral and behavioral sense intended in Proverbs, not merely low intelligence.'
- source_word: יָבֹאוּ
  chosen: enter into
  alternatives:
  - come into
  - lead to
  lexicon: HALOT
  rationale: The verb בוא with בְּרִיב is best rendered 'enter into strife,' expressing
    involvement in quarrels rather than simple motion.
- source_word: בְרִיב
  chosen: into strife
  alternatives:
  - into a quarrel
  - into contention
  lexicon: HALOT
  rationale: רִיב denotes dispute, contention, or quarrel. 'Strife' is concise, natural
    English and fits the proverb's warning about conflict.
- source_word: פִיו
  chosen: his mouth
  alternatives:
  - what he says
  - his speech
  lexicon: HALOT
  rationale: Literal 'mouth' preserves the poetic parallelism with 'lips' and keeps
    the embodied imagery of speech.
- source_word: לְמַהֲלֻמוֹת
  chosen: for blows
  alternatives:
  - for beatings
  - for wounds
  - for stripes
  lexicon: HALOT
  rationale: The noun refers to striking or blows received. 'Blows' is idiomatic,
    concise, and fits the sense that the fool's speech invites physical punishment.
- source_word: יִקְרָא
  chosen: calls for
  alternatives:
  - invites
  - cries out for
  - summons
  lexicon: HALOT
  rationale: '''Calls for'' captures the idiom that his speech brings or invites blows
    upon himself, without over-paraphrasing.'
