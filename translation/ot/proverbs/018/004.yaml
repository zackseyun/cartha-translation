id: PRO.18.4
reference: Proverbs 18:4
source:
  edition: WLC
  text: מַ֣יִם עֲ֭מֻקִּים דִּבְרֵ֣י פִי אִ֑ישׁ נַ֥חַל נֹ֝בֵ֗עַ מְק֣וֹר חָכְמָֽה־׃
translation:
  text: The words of a man's mouth are deep waters; the fountain of wisdom is a flowing
    brook.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The words of a man's mouth are deep waters, a flowing brook, a fountain
      of wisdom.' The Hebrew can be read so that both water images describe the words
      themselves rather than making the second line a separate statement about wisdom.
    reason: alternative_reading
  - marker: b
    text: '''Man'' renders Hebrew אִישׁ, a masculine singular term used here in proverbial
      style for an individual speaker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Plural form used idiomatically; 'waters' preserves the Hebrew image and
    natural English poetic diction.
- source_word: עֲמֻקִּים
  chosen: deep
  alternatives:
  - profound
  lexicon: HALOT
  rationale: Describes the waters metaphorically as deep. 'Deep' keeps the concrete
    image while allowing the proverb's figurative force; 'profound' would over-interpret
    the metaphor.
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: HALOT
  rationale: Construct plural of 'word/matter.' 'Words' is the most direct and flexible
    rendering in this poetic comparison.
- source_word: פִי אִישׁ
  chosen: of a man's mouth
  alternatives:
  - from a man's mouth
  - of a person's mouth
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered 'of a man's mouth.' 'Man's'
    follows the gender-accurate policy for אִישׁ, which here denotes an individual
    man generically in wisdom style rather than explicitly all humanity.
- source_word: נַחַל
  chosen: brook
  alternatives:
  - stream
  - wadi
  - torrent
  lexicon: HALOT
  rationale: נחל can denote a stream or wadi. In this parallel with 'fountain,' 'brook'
    gives a natural English image of moving water without implying a dry seasonal
    channel as 'wadi' would.
- source_word: נֹבֵעַ
  chosen: flowing
  alternatives:
  - gushing
  - bubbling up
  - springing forth
  lexicon: HALOT
  rationale: The participle denotes water welling up or flowing out. 'Flowing' is
    idiomatic with 'brook' and preserves the sense of active movement without sounding
    exaggerated.
- source_word: מְקוֹר חָכְמָה
  chosen: the fountain of wisdom
  alternatives:
  - a fountain of wisdom
  - the source of wisdom
  - a spring of wisdom
  lexicon: HALOT
  rationale: מְקוֹר commonly means 'source, spring, fountain.' 'Fountain of wisdom'
    preserves the vivid metaphor and works well in parallel with the water imagery.
    The definite article is supplied in English for a proverbial, class-defining statement.
