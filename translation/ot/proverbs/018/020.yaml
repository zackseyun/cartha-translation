id: PRO.18.20
reference: Proverbs 18:20
source:
  edition: WLC
  text: מִ/פְּרִ֣י פִי אִ֭ישׁ תִּשְׂבַּ֣ע בִּטְנ֑/וֹ תְּבוּאַ֖ת שְׂפָתָ֣י/ו יִשְׂבָּֽע־׃
translation:
  text: From the fruit of a man's mouth his stomach is satisfied; he is satisfied
    by the produce of his lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the fruit of a man's mouth his stomach is filled; by the yield of
      his lips he is filled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פְּרִי
  chosen: From the fruit of
  alternatives:
  - By the fruit of
  - With the fruit of
  lexicon: HALOT
  rationale: מִן with פְּרִי expresses source or means. 'From the fruit of' preserves
    the metaphor and the causal/source sense without over-interpreting.
- source_word: פִי
  chosen: mouth
  lexicon: HALOT
  rationale: פֶּה commonly means 'mouth' literally and metaphorically for speech.
    Here it introduces the speech metaphor in parallel with 'lips.'
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - a person's
  - one's
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions proverbially/generically.
    Per doctrine, a gender-accurate rendering is preferred over gender-neutral smoothing.
- source_word: תִּשְׂבַּע
  chosen: is satisfied
  alternatives:
  - will be satisfied
  - is filled
  lexicon: HALOT
  rationale: The verb שׂבע means 'be satisfied, be filled.' English present tense
    suits proverbial discourse. Passive-style English reflects the Hebrew predicate
    naturally with the feminine subject 'stomach.'
- source_word: בִּטְנוֹ
  chosen: his stomach
  alternatives:
  - his belly
  - his inward parts
  lexicon: HALOT
  rationale: בֶּטֶן is literally 'belly/stomach/womb.' In this proverb it refers to
    the inner self receiving the consequences of speech. 'Stomach' is idiomatic modern
    English and keeps the bodily metaphor without archaic tone.
- source_word: תְּבוּאַת
  chosen: the produce of
  alternatives:
  - the yield of
  - the harvest of
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce, yield, or increase. 'Produce' preserves the
    agricultural metaphor and pairs well with 'fruit' in the first colon.
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  - what he says
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip'; in plural it commonly stands metonymically
    for speech. Retaining 'lips' preserves the Hebrew parallelism with 'mouth.'
- source_word: יִשְׂבָּע
  chosen: he is satisfied
  alternatives:
  - he will be satisfied
  - he is filled
  lexicon: HALOT
  rationale: Repeating 'is satisfied' preserves the lexical repetition of שׂבע across
    both cola, an important poetic feature emphasizing the consequence of speech.
