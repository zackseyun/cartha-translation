id: PRO.18.16
reference: Proverbs 18:16
source:
  edition: WLC
  text: מַתָּ֣ן אָ֭דָם יַרְחִ֣יב ל֑/וֹ וְ/לִ/פְנֵ֖י גְדֹלִ֣ים יַנְחֶֽ/נּוּ׃
translation:
  text: A man's gift makes room for him, and brings him before great men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person's gift makes room for him'; Hebrew 'man' is singular and generic
      here.
    reason: lexical_alternative
  - marker: b
    text: Or 'and leads him before important men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתָּן
  chosen: gift
  alternatives:
  - present
  lexicon: HALOT
  rationale: The noun denotes a gift or present. 'Gift' is the most natural modern
    English rendering and fits the proverb's general statement about what a gift accomplishes.
- source_word: אָדָם
  chosen: man's
  alternatives:
  - a person's
  - humankind's
  lexicon: HALOT
  rationale: Here אָדָם is singular and individual rather than collective. Per the
    gender-accurate policy, 'man's' best matches the Hebrew form and proverbial style,
    while functioning generically.
- source_word: יַרְחִיב לוֹ
  chosen: makes room for him
  alternatives:
  - widens for him
  - opens the way for him
  lexicon: HALOT
  rationale: The Hiphil of רחב literally means 'make wide/broad.' In this idiom, 'makes
    room for him' preserves the concrete metaphor and communicates opportunity or
    access without over-paraphrasing.
- source_word: וְלִפְנֵי גְדֹלִים
  chosen: before great men
  alternatives:
  - before important men
  - into the presence of the great
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/social 'before, in the presence of.' גְדֹלִים refers
    to socially prominent or powerful people. 'Great men' is concise, traditional,
    and faithful to the masculine plural form.
- source_word: יַנְחֶנּוּ
  chosen: brings him
  alternatives:
  - leads him
  - guides him
  lexicon: HALOT
  rationale: The Hiphil of נחה commonly means 'lead/guide.' In this context of access
    to prominent people, 'brings him' is idiomatic English that captures the result
    of being led into someone's presence.
