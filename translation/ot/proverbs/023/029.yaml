id: PRO.23.29
reference: Proverbs 23:29
source:
  edition: WLC
  text: לְ/מִ֨י א֥וֹי לְ/מִ֪י אֲב֡וֹי לְ/מִ֤י מדונים לְ/מִ֥י שִׂ֗יחַ לְ֭/מִי פְּצָעִ֣ים
    חִנָּ֑ם לְ֝/מִ֗י חַכְלִל֥וּת עֵינָֽיִם׀׃
translation:
  text: Who has woe? Who has sorrow? Who has strife? Who has complaining? Who has
    wounds for nothing? Who has redness of eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grief' for 'sorrow' (אֲבוֹי), preserving the lament-like nuance of the
      Hebrew cry.
    reason: lexical_alternative
  - marker: b
    text: Or 'without cause' for 'for nothing' (חִנָּם).
    reason: lexical_alternative
  - marker: c
    text: Or 'bloodshot eyes' for 'redness of eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֥וֹי
  chosen: woe
  alternatives:
  - misery
  lexicon: HALOT
  rationale: Interjection/noun of distress or calamity. 'Woe' preserves the terse,
    proverbial force better than the more diffuse 'misery.'
- source_word: אֲב֡וֹי
  chosen: sorrow
  alternatives:
  - alas
  - grief
  lexicon: HALOT
  rationale: A cry/expression closely related to lament. Rendered 'sorrow' to differentiate
    it from the preceding 'woe' while keeping the emotional parallelism intelligible
    in English.
- source_word: מדונים
  chosen: strife
  alternatives:
  - contentions
  - quarrels
  lexicon: HALOT
  rationale: Plural noun from מדון, denoting contentious conflict. 'Strife' is concise
    and natural in a wisdom list, while still covering repeated quarrels.
- source_word: שִׂ֗יחַ
  chosen: complaining
  alternatives:
  - babbling
  - muttering
  - trouble
  lexicon: HALOT
  rationale: The noun can denote talk, complaint, or troubled musing. In this context
    of drunken consequences, 'complaining' best fits the sequence of social and bodily
    harms without over-specifying incoherent speech.
- source_word: פְּצָעִ֣ים
  chosen: wounds
  alternatives:
  - injuries
  lexicon: HALOT
  rationale: Concrete bodily injuries. 'Wounds' is the standard and vivid rendering.
- source_word: חִנָּ֑ם
  chosen: for nothing
  alternatives:
  - without cause
  - needlessly
  lexicon: HALOT
  rationale: Adverb meaning gratuitously or without cause. 'For nothing' is idiomatic
    and preserves the sense of undeserved or pointless injury.
- source_word: חַכְלִל֥וּת עֵינָֽיִם
  chosen: redness of eyes
  alternatives:
  - dullness of eyes
  - bloodshot eyes
  lexicon: HALOT
  rationale: The phrase denotes an altered eye appearance associated here with intoxication.
    'Redness of eyes' stays close to the Hebrew expression; 'bloodshot eyes' is possible
    but slightly more interpretive and colloquial.
- source_word: לְ/מִי
  chosen: Who has
  alternatives:
  - For whom is
  - Who gets
  lexicon: HALOT
  rationale: The repeated interrogative literally means 'to/for whom?' In English,
    'Who has...?' best conveys the idiomatic force of the repeated rhetorical questions.
