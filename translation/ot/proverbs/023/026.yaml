id: PRO.23.26
reference: Proverbs 23:26
source:
  edition: WLC
  text: תְּנָֽ/ה בְנִ֣/י לִבְּ/ךָ֣ לִ֑/י וְ֝/עֵינֶ֗י/ךָ דְּרָכַ֥/י תרצנה־׃
translation:
  text: My son, give me your heart, and let your eyes delight in my ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let your eyes observe my ways.' The Hebrew verb can be understood as
      attentive regard, but in this context it likely includes favorable delight in
      and acceptance of the father's way of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנָה
  chosen: give
  alternatives:
  - grant
  - present
  lexicon: HALOT
  rationale: Imperative of נתן, a straightforward command to give. 'Give' is the most
    natural and direct English equivalent in this parental appeal.
- source_word: בְנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative with 1cs suffix. 'My son' preserves the masculine singular address
    of the Hebrew and follows the gender-accurate principle; 'my child' would flatten
    the specific form of address.
- source_word: לִבְּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew commonly denotes the inner self, will, and affections.
    The literal rendering is clear and idiomatic in English, and preserves the metaphorical
    force without paraphrase.'
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition marks the indirect object of the imperative. English
    idiom prefers 'give me your heart' rather than the more wooden 'give your heart
    to me,' though both are possible.
- source_word: וְעֵינֶיךָ
  chosen: and let your eyes
  alternatives:
  - and may your eyes
  - and your eyes
  lexicon: HALOT
  rationale: The conjunction links a second clause with a jussive verb. 'Let your
    eyes' brings out the volitional nuance in natural English.
- source_word: דְּרָכַי
  chosen: my ways
  alternatives:
  - my paths
  lexicon: HALOT
  rationale: דרך often means way, path, or manner of life. 'My ways' fits wisdom-instruction
    context and pairs naturally with the son's attentive eyes.
- source_word: תִּרְצֶנָה
  chosen: delight in
  alternatives:
  - observe
  - watch carefully
  - take pleasure in
  lexicon: HALOT
  rationale: From רצה, here likely expressing favorable regard or pleasure rather
    than mere visual observation. In context, the father urges not only attention
    to his ways but glad approval and embrace of them. 'Delight in' captures this
    affective-volitional sense better than the flatter 'observe.'
