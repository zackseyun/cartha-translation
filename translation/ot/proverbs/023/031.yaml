id: PRO.23.31
reference: Proverbs 23:31
source:
  edition: WLC
  text: אַל תֵּ֥רֶא יַיִן֮ כִּ֪י יִתְאַ֫דָּ֥ם כִּֽי יִתֵּ֣ן ב/כיס עֵינ֑/וֹ יִ֝תְהַלֵּ֗ךְ
    בְּ/מֵישָׁרִֽים־־׃
translation:
  text: Do not look at wine when it is red, when it sparkles in the cup, when it goes
    down smoothly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'when it gives its eye in the cup,' a Hebrew idiom for wine's
      attractive appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'when it goes along in straightness'; the sense here is that the wine
      goes down easily or smoothly.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let yourself
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. Simple English imperative
    best matches the force without overexpansion.
- source_word: תֵּרֶא
  chosen: look at
  alternatives:
  - see
  - gaze at
  lexicon: HALOT
  rationale: ראה literally means 'see,' but in this warning context 'look at' conveys
    the volitional sense of fixing one's attention on wine.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of the common Hebrew term for wine.
- source_word: כִּי יִתְאַדָּם
  chosen: when it is red
  alternatives:
  - because it is red
  - when it reddens
  lexicon: HALOT
  rationale: The clause describes the attractive appearance of the wine. Although
    כִּי can be causal ('because'), in this poetic sequence it functions naturally
    as 'when,' introducing the circumstances under which one is warned not to look.
    The hitpael/imperfect of אדם here refers to showing redness.
- source_word: כִּי יִתֵּן בַּכּוֹס עֵינוֹ
  chosen: when it sparkles in the cup
  alternatives:
  - when it gives its eye in the cup
  - when it shows its color in the cup
  lexicon: HALOT
  rationale: Literally, 'when it gives its eye in the cup,' an idiom referring to
    the visual appeal of wine in the cup. 'Sparkles' captures the idiomatic sense
    in natural English while preserving the focus on appearance.
- source_word: יִתְהַלֵּךְ
  chosen: it goes down
  alternatives:
  - it moves along
  - it glides
  lexicon: HALOT
  rationale: הלך in the hitpael here is idiomatic for the wine's smooth movement as
    it is drunk. 'Goes down' is the natural English equivalent in context.
- source_word: בְּמֵישָׁרִים
  chosen: smoothly
  alternatives:
  - straight
  - uprightly
  - with smoothness
  lexicon: HALOT
  rationale: Though the noun often means 'uprightness' or 'straightness,' in this
    context with wine it describes smooth, easy passage. 'Smoothly' best fits the
    idiom and the warning against wine's seductive ease.
