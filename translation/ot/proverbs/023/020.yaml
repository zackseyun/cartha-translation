id: PRO.23.20
reference: Proverbs 23:20
source:
  edition: WLC
  text: אַל תְּהִ֥י בְ/סֹֽבְאֵי יָ֑יִן בְּ/זֹלֲלֵ֖י בָשָׂ֣ר לָֽ/מוֹ־־׃
translation:
  text: Do not be among heavy drinkers of wine, among gluttonous eaters of meat,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'among those who gorge themselves on meat for themselves';
      the final Hebrew term לָמוֹ is syntactically difficult and may add emphasis
      rather than a distinct new idea.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not become
  - Never be
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive form gives a prohibition. 'Do not' is
    the natural English imperative equivalent.
- source_word: תְּהִי
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: From היה, 2ms imperfect/jussive after אַל. In this construction it functions
    as a prohibition against associating/being in a certain company. 'Be' is concise
    and idiomatic in English.
- source_word: בְסֹבְאֵי
  chosen: among heavy drinkers
  alternatives:
  - with drunkards
  - among winebibbers
  - among those who drink excessively
  lexicon: HALOT
  rationale: 'The preposition ב plus participial plural indicates association: ''among/with.''
    סבא denotes heavy drinking rather than merely drinking. ''Heavy drinkers'' preserves
    the habitual sense without archaic diction. ''Drunkards'' is possible, but the
    Hebrew participle focuses on the practice of excessive drinking.'
- source_word: יַיִן
  chosen: of wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Completes the construct-like sense of סֹבְאֵי יָיִן, specifying what
    is drunk to excess.
- source_word: בְזֹלֲלֵי
  chosen: among gluttonous eaters
  alternatives:
  - with gluttons
  - among those who gorge themselves
  lexicon: HALOT
  rationale: Again ב marks association. זלל in this participial form refers to reckless,
    excessive consumption. 'Gluttonous eaters' keeps the participial/habitual force
    and avoids reducing the phrase to a mere label.
- source_word: בָשָׂר
  chosen: of meat
  alternatives:
  - flesh
  - rich food
  lexicon: HALOT
  rationale: In wisdom literature this refers to meat as food. 'Flesh' would sound
    wooden in modern English; 'rich food' is interpretive and broader than the Hebrew.
- source_word: לָמוֹ
  chosen: ','
  alternatives:
  - for themselves
  - to them
  lexicon: HALOT
  rationale: The final לָמוֹ is difficult and often understood idiomatically with
    the preceding phrase, yielding the sense 'gluttonous eaters of meat.' Many English
    translations do not represent it explicitly. Given the compressed poetic syntax,
    smooth English is best achieved without a separate lexical rendering in the main
    text; the alternative is preserved in a footnote.
