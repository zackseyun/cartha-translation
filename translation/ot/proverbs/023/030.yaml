id: PRO.23.30
reference: Proverbs 23:30
source:
  edition: WLC
  text: לַֽ/מְאַחֲרִ֥ים עַל הַ/יָּ֑יִן לַ֝/בָּאִ֗ים לַ/חְקֹ֥ר מִמְסָֽךְ־׃
translation:
  text: For those who linger over wine, for those who go to search out mixed wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spiced wine' or 'blended drink.' The Hebrew refers to wine that has
      been mixed, likely to intensify flavor or strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַחֲרִים
  chosen: linger over
  alternatives:
  - stay long at
  - tarry over
  lexicon: HALOT
  rationale: The participle from אחר in this context refers to delaying or remaining
    long. 'Linger over' is idiomatic modern English that preserves the sense of prolonged
    indulgence without archaic tone.
- source_word: עַל הַיָּיִן
  chosen: over wine
  alternatives:
  - at wine
  - with wine
  lexicon: HALOT
  rationale: The preposition עַל with wine here conveys being occupied with or lingering
    over wine. 'Over wine' fits the English idiom 'linger over' and keeps the Hebrew
    construction's force.
- source_word: בָּאִים
  chosen: go
  alternatives:
  - come
  - enter
  lexicon: HALOT
  rationale: Although the verb is literally 'come,' in English the idiom with an infinitive
    of purpose is more natural as 'go to search out.' This is an optimal-equivalence
    adjustment for readability while preserving the action of deliberately seeking
    more drink.
- source_word: לַחְקֹר
  chosen: to search out
  alternatives:
  - to seek
  - to investigate
  lexicon: HALOT
  rationale: The verb carries the sense of searching or exploring. In this context
    it suggests actively seeking a particular kind of drink, stronger than a simple
    'seek.'
- source_word: מִמְסָךְ
  chosen: mixed wine
  alternatives:
  - spiced wine
  - blended drink
  lexicon: HALOT
  rationale: The noun refers to wine mixed, likely with spices or other ingredients,
    to enhance potency or flavor. 'Mixed wine' is the most direct rendering; the more
    specific possibilities are preserved as alternatives.
