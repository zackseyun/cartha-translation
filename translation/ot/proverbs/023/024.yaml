id: PRO.23.24
reference: Proverbs 23:24
source:
  edition: WLC
  text: גול יגול אֲבִ֣י צַדִּ֑יק יולד חָ֝כָ֗ם ו/ישמח בּֽ/וֹ־׃
translation:
  text: The father of a righteous man will greatly rejoice; he who fathers a wise
    son will be glad in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'The father of a righteous man, rejoicing he will rejoice.'
      The doubled verb intensifies the joy.
    reason: lexical_alternative
  - marker: b
    text: Or 'he who begets a wise one.' The Hebrew does not explicitly repeat 'son'
      in this line, though the filial sense is strongly implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: גול יגול
  chosen: will greatly rejoice
  alternatives:
  - will surely rejoice
  - rejoicing he will rejoice
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. English
    expresses this naturally with 'will greatly rejoice' rather than a wooden repetition.
- source_word: אֲבִי צַדִּיק
  chosen: the father of a righteous man
  alternatives:
  - a righteous man's father
  - the father of the righteous
  lexicon: HALOT
  rationale: The construct phrase most naturally means 'father of a righteous [man/person].'
    Because צַדִּיק is grammatically masculine singular and refers to an individual
    son in the parallel line, 'righteous man' preserves the gendered singular sense
    better than a plural or abstract rendering.
- source_word: צַדִּיק
  chosen: righteous man
  alternatives:
  - righteous person
  - just man
  lexicon: HALOT
  rationale: '''Righteous'' is the standard rendering and preserves the moral category.
    ''Man'' is retained for gender accuracy in line with the Hebrew masculine singular
    and the project''s stated philosophy.'
- source_word: יולד
  chosen: he who fathers
  alternatives:
  - one who begets
  - the one who sires
  - he who has begotten
  lexicon: HALOT
  rationale: The participle from ילד denotes begetting/fathering in this context.
    Since the subject is masculine and parallel to 'father,' 'he who fathers' is both
    accurate and idiomatic, avoiding the more clinical 'sires' and the potentially
    maternal ambiguity of 'gives birth to'.
- source_word: חָכָם
  chosen: a wise son
  alternatives:
  - a wise man
  - one who is wise
  lexicon: HALOT
  rationale: Although 'son' is not explicit in this colon, the parental context and
    the parallel with the surrounding proverbs about sons justify making the filial
    object explicit in English for clarity. This remains close to the sense rather
    than paraphrastic.
- source_word: וישמח בו
  chosen: will be glad in him
  alternatives:
  - will rejoice in him
  - will be glad because of him
  lexicon: HALOT
  rationale: שמח commonly means 'be glad/rejoice.' 'Be glad in him' preserves the
    preposition בו and keeps a slightly more literal connection to the son as the
    source/object of joy.
