id: PRO.23.33
reference: Proverbs 23:33
source:
  edition: WLC
  text: עֵ֭ינֶי/ךָ יִרְא֣וּ זָר֑וֹת וְ֝/לִבְּ/ךָ֗ יְדַבֵּ֥ר תַּהְפֻּכֽוֹת׃
translation:
  text: Your eyes will see strange things, and your heart will speak perverse things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange women.' The Hebrew זָרוֹת can, in some contexts, refer to foreign
      or illicit women; here it may also be understood more generally as strange or
      distorted sights brought on by intoxication.
    reason: alternative_reading
  - marker: b
    text: Or 'twisted things' or 'crooked things.' The Hebrew תַּהְפֻּכוֹת refers
      to what is distorted or perverse, especially in speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your eye
  lexicon: HALOT
  rationale: Dual form with 2ms suffix; idiomatically rendered as the natural English
    plural 'your eyes.'
- source_word: יִרְאוּ
  chosen: will see
  alternatives:
  - see
  lexicon: HALOT
  rationale: Qal imperfect expresses future/result in this warning context; 'will
    see' fits the consequence of drunkenness described in the surrounding verses.
- source_word: זָרוֹת
  chosen: strange things
  alternatives:
  - strange women
  - strangers
  - foreign things
  lexicon: HALOT
  rationale: The feminine plural adjective/substantive can denote 'strange/foreign
    things' or, in some contexts, 'strange women.' In this verse the broader result
    of intoxication is distorted perception paired with corrupt speech, so the less
    specific 'strange things' best preserves the likely sense without over-specifying
    an object not explicit in the text.
- source_word: וְלִבְּךָ
  chosen: and your heart
  alternatives:
  - and your mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person including thought and
    will. 'Heart' is retained in the main text for transparency to the source, rather
    than interpretive 'mind.'
- source_word: יְדַבֵּר
  chosen: will speak
  alternatives:
  - speaks
  - will utter
  lexicon: HALOT
  rationale: Piel imperfect here naturally gives a future/result sense parallel to
    'will see.' 'Speak' is straightforward modern English.
- source_word: תַּהְפֻּכוֹת
  chosen: perverse things
  alternatives:
  - twisted things
  - crooked things
  lexicon: HALOT
  rationale: The noun denotes perversities, distortions, or twisted speech. 'Perverse
    things' preserves the moral and verbal force in context, where the heart is speaking
    what is warped.
