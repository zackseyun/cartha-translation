id: PRO.23.14
reference: Proverbs 23:14
source:
  edition: WLC
  text: אַ֭תָּה בַּ/שֵּׁ֣בֶט תַּכֶּ֑/נּוּ וְ֝/נַפְשׁ֗/וֹ מִ/שְּׁא֥וֹל תַּצִּֽיל׃
translation:
  text: You shall strike him with the rod, and you will deliver his life from Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul.' Hebrew nephesh can mean 'life,' 'self,' or 'soul' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשֵּׁבֶט
  chosen: with the rod
  alternatives:
  - with a rod
  - with the staff
  lexicon: HALOT
  rationale: שֵׁבֶט commonly denotes a rod, staff, or scepter. In this parental-discipline
    context, 'rod' is the most natural and established sense, preserving the concrete
    instrument without softening it.
- source_word: תַּכֶּנּוּ
  chosen: you shall strike him
  alternatives:
  - you shall beat him
  - you shall discipline him
  lexicon: HALOT
  rationale: The Hiphil of נכה here most directly means 'strike/smite.' 'Strike' is
    more literal than 'discipline' and less interpretively loaded than 'beat,' preserving
    the physical action stated in the Hebrew while avoiding overstatement.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - him
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Because the
    parallel phrase is 'from Sheol,' the sense is deliverance from death or the grave;
    'his life' best conveys the Hebrew idiom in clear English without importing a
    narrower anthropological claim.
- source_word: מִשְּׁאוֹל
  chosen: from Sheol
  alternatives:
  - from the grave
  - from the realm of the dead
  lexicon: HALOT
  rationale: שְׁאוֹל is best preserved as 'Sheol' to retain the Hebrew concept rather
    than collapsing it into only 'grave.' A footnote preserves the more interpretive
    alternatives for readers unfamiliar with the term.
- source_word: תַּצִּיל
  chosen: you will deliver
  alternatives:
  - you will rescue
  - you will save
  lexicon: HALOT
  rationale: The Hiphil of נצל means to deliver or rescue. 'Deliver' fits the solemn
    tone and pairs naturally with 'from Sheol' without importing specifically soteriological
    overtones that 'save' may carry in English.
