id: PRO.23.12
reference: Proverbs 23:12
source:
  edition: WLC
  text: הָבִ֣יאָ/ה לַ/מּוּסָ֣ר לִבֶּ֑/ךָ וְ֝/אָזְנֶ֗/ךָ לְ/אִמְרֵי דָֽעַת־׃
translation:
  text: Apply your heart to instruction, and your ear to words of knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bring your heart to discipline, and your ear to sayings of knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאָה
  chosen: Apply
  alternatives:
  - Bring
  - Direct
  - Give
  lexicon: HALOT, BDB
  rationale: Imperative of בוא/הביא in a causative form literally means 'bring.' In
    English, 'bring your heart to instruction' is awkward; 'apply' captures the idiomatic
    sense of directing oneself intentionally toward discipline or teaching while preserving
    the imperative force.
- source_word: לַמּוּסָר
  chosen: to instruction
  alternatives:
  - to discipline
  - to correction
  lexicon: HALOT, BDB
  rationale: מוּסָר can denote discipline, correction, or instruction in wisdom literature.
    Here, paired with 'words of knowledge,' the pedagogical sense is prominent, so
    'instruction' best fits the parallelism while still retaining the formative nuance
    of disciplined teaching.
- source_word: לִבֶּךָ
  chosen: your heart
  lexicon: HALOT, BDB
  rationale: לֵב/לֵבָב in Hebrew commonly denotes the inner person, including mind
    and will, not merely emotion. 'Heart' is the standard and sufficiently transparent
    English rendering, preserving the Hebrew anthropology.
- source_word: וְאָזְנֶךָ
  chosen: and your ear
  alternatives:
  - and your ears
  lexicon: HALOT, BDB
  rationale: The Hebrew is singular with 2ms suffix. English can use singular idiomatically
    in exhortation ('lend your ear'), and retaining singular preserves the poetic
    parallel with 'your heart.'
- source_word: לְאִמְרֵי
  chosen: to words of
  alternatives:
  - to sayings of
  - to utterances of
  lexicon: HALOT, BDB
  rationale: אִמְרֵי is the construct plural of 'sayings/words.' 'Words of' is natural
    modern English and avoids sounding overly formal, while still reflecting the lexical
    content.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT, BDB
  rationale: דַּעַת most directly means 'knowledge.' 'Understanding' is possible in
    wisdom contexts, but 'knowledge' is the more straightforward lexical equivalent
    and matches the instructional setting.
