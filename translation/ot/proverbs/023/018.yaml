id: PRO.23.18
reference: Proverbs 23:18
source:
  edition: WLC
  text: כִּ֭י אִם יֵ֣שׁ אַחֲרִ֑ית וְ֝/תִקְוָתְ/ךָ֗ לֹ֣א תִכָּרֵֽת־׃
translation:
  text: For surely there is a future, and your hope will not be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is an end/outcome'; Hebrew אַחֲרִית can denote an end, latter
      end, outcome, or future. Here it is rendered 'future' because the context is
      one of positive expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For surely
  alternatives:
  - Surely
  - Indeed
  - For if
  lexicon: HALOT
  rationale: In this idiom, כִּי אִם with יֵשׁ introduces an emphatic assurance rather
    than a simple conditional. 'For surely' preserves the connective force from the
    previous verse and the emphatic sense without sounding wooden. 'For if' would
    mislead English readers into hearing an unrealized condition.
- source_word: יֵשׁ
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Existential particle best rendered with natural English existential phrasing.
- source_word: אַחֲרִית
  chosen: a future
  alternatives:
  - an end
  - an outcome
  - a latter end
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, outcome, or future. In wisdom literature, especially
    in a promise context paired with hope, 'future' best conveys a positive forward-looking
    prospect in idiomatic modern English. 'End' could sound merely terminal or ominous
    in English.
- source_word: וְתִקְוָתְךָ
  chosen: and your hope
  alternatives:
  - and your expectation
  - and your prospect
  lexicon: HALOT
  rationale: תִּקְוָה commonly denotes hope or expectation. 'Hope' is the most natural
    and theologically resonant English equivalent here, matching the positive assurance
    of the verse.
- source_word: לֹא תִכָּרֵת
  chosen: will not be cut off
  alternatives:
  - will not be destroyed
  - will not be cut down
  - will not perish
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' Retaining this image
    preserves the Hebrew metaphor while remaining understandable in English. More
    interpretive alternatives flatten the idiom.
