id: PRO.23.2
reference: Proverbs 23:2
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֣ שַׂכִּ֣ין בְּ/לֹעֶ֑/ךָ אִם בַּ֖עַל נֶ֣פֶשׁ אָֽתָּה־׃
translation:
  text: and put a knife to your throat if you are a man of appetite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if you are given to appetite' or 'if you are a glutton.' The Hebrew
      idiom is literally 'a בעל of appetite/soul,' describing a person ruled by strong
      desire in this setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שַׂמְתָּ
  chosen: and put
  alternatives:
  - and set
  - then put
  lexicon: HALOT
  rationale: The waw + Qal perfect 2ms of שׂים continues the instructional sequence
    from the previous verse and is naturally rendered as an imperative-like continuation
    in English. 'Put' is idiomatic and concise.
- source_word: שַׂכִּין
  chosen: a knife
  alternatives:
  - a blade
  lexicon: HALOT
  rationale: The noun denotes a knife. 'Knife' is the plain modern English equivalent
    and preserves the vivid, hyperbolic warning.
- source_word: בְּ/לֹעֶךָ
  chosen: to your throat
  alternatives:
  - in your throat
  - to your gullet
  lexicon: HALOT
  rationale: לֹעַ refers to the throat/gullet. With בְּ after שׂים, English idiom
    prefers 'put ... to your throat' rather than the more wooden 'in your throat.'
    'Throat' is more natural than 'gullet' for modern readers.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: The conditional particle is best rendered 'if,' introducing the circumstance
    under which the warning applies.
- source_word: בַּעַל נֶפֶשׁ
  chosen: a man of appetite
  alternatives:
  - given to appetite
  - a glutton
  - master of desire
  - a man with a big appetite
  lexicon: HALOT
  rationale: Literally 'owner/master of appetite/soul.' In context of dining before
    a ruler, the idiom refers to someone strongly driven by appetite or desire. 'A
    man of appetite' preserves the masculine singular form and the idiomatic force
    without over-specifying gluttony.
- source_word: אָתָּה
  chosen: you are
  lexicon: HALOT
  rationale: The independent pronoun supplies the explicit subject and is naturally
    represented in English by 'you are' in the conditional clause.
