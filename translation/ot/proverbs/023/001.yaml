id: PRO.23.1
reference: Proverbs 23:1
source:
  edition: WLC
  text: כִּֽי תֵ֭שֵׁב לִ/לְח֣וֹם אֶת מוֹשֵׁ֑ל בִּ֥ין תָּ֝בִ֗ין אֶת אֲשֶׁ֥ר לְ/פָנֶֽי/ךָ־־־׃
translation:
  text: When you sit down to dine with a ruler, carefully consider what is before
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what is set before you.' The Hebrew may refer specifically to the food
      on the table, though it can also imply the broader situation before you.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause rather than a causal statement.
    In wisdom instruction, 'when' best captures the practical, conditional setting
    of the admonition.
- source_word: תֵשֵׁב
  chosen: you sit down
  alternatives:
  - you sit
  - you take your seat
  lexicon: HALOT
  rationale: From ישׁב, literally 'sit/dwell.' In meal context, 'sit down' is idiomatic
    English and preserves the concrete action without over-paraphrase.
- source_word: ללחום
  chosen: to dine
  alternatives:
  - to eat
  - to partake of food
  lexicon: HALOT
  rationale: The infinitive from לחם in this construction means eating a meal. 'To
    dine' fits the formal setting of a meal with a ruler and conveys more than mere
    consumption, while remaining natural English.
- source_word: את מושל
  chosen: with a ruler
  alternatives:
  - with one who rules
  - with a governor
  lexicon: HALOT
  rationale: 'מוֹשֵׁל denotes one exercising authority. ''Ruler'' is the most straightforward
    and contextually appropriate rendering. The prepositionless object after the eating
    verb is naturally rendered in English as accompaniment: dining ''with'' a ruler.'
- source_word: בין תבין
  chosen: carefully consider
  alternatives:
  - carefully discern
  - surely understand
  - pay close attention to
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Carefully
    consider' communicates both discernment and the emphatic force in clear modern
    English.
- source_word: את אשר לפניך
  chosen: what is before you
  alternatives:
  - what is set before you
  - that which is before you
  lexicon: HALOT
  rationale: The phrase can refer literally to the food placed before the guest, while
    also allowing the broader sense of the situation at hand. 'What is before you'
    preserves that breadth; the more specific 'what is set before you' is a viable
    alternative but slightly narrows the sense.
