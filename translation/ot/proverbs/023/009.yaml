id: PRO.23.9
reference: Proverbs 23:9
source:
  edition: WLC
  text: בְּ/אָזְנֵ֣י כְ֭סִיל אַל תְּדַבֵּ֑ר כִּֽי יָ֝ב֗וּז לְ/שֵׂ֣כֶל מִלֶּֽי/ךָ־־׃
translation:
  text: Do not speak in the hearing of a fool, for he will despise the insight of
    your words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the ears of a fool.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will despise the good sense of your words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: HALOT
  rationale: Literally 'in the ears of,' an idiom for speaking so that someone hears.
    'In the hearing of' preserves the Hebrew image while sounding natural in English
    better than the more wooden 'in the ears of.'
- source_word: כְסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: A standard wisdom-term for a morally and intellectually obstinate person,
    not merely someone lacking intelligence. 'Fool' is the established and most accurate
    English equivalent in Proverbs.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Regular negative particle used with the imperfect for prohibition. 'Do
    not' is the straightforward English imperative.
- source_word: תְּדַבֵּר
  chosen: speak
  alternatives:
  - talk
  - utter words
  lexicon: HALOT
  rationale: Common verb 'to speak.' 'Speak' fits the proverb's concise style better
    than the more casual 'talk.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' preserves the proverbial
    explanatory connection compactly.
- source_word: יָב֗וּז
  chosen: he will despise
  alternatives:
  - he will scorn
  - he will hold in contempt
  lexicon: HALOT
  rationale: The verb denotes contemptuous rejection. 'Despise' is concise, idiomatic,
    and suitably strong.
- source_word: לְ/שֵׂכֶל
  chosen: the insight
  alternatives:
  - the prudence
  - the good sense
  - the wisdom
  lexicon: HALOT
  rationale: שֵׂכֶל refers to insight, discretion, or good sense. 'Insight' best captures
    perceptive understanding in this context without overstating it as full 'wisdom.'
    The prefixed ל is taken as marking the object of contempt after בזה, yielding
    'despise the insight...'.
- source_word: מִלֶּֽי/ךָ
  chosen: of your words
  alternatives:
  - of your speech
  - in what you say
  lexicon: HALOT
  rationale: Plural noun from 'word/saying.' 'Of your words' keeps the genitival relation
    to 'insight' and preserves the concrete Hebrew expression.
