id: PRO.23.3
reference: Proverbs 23:3
source:
  edition: WLC
  text: אַל תִּ֭תְאָו לְ/מַטְעַמּוֹתָ֑י/ו וְ֝/ה֗וּא לֶ֣חֶם כְּזָבִֽים־׃
translation:
  text: Do not crave his delicacies, for they are deceptive food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'bread/food of lies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let yourself
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the imperfect/jussive to express
    prohibition. 'Do not' is the natural concise English equivalent.
- source_word: תִּתְאָו
  chosen: crave
  alternatives:
  - desire
  - lust after
  - long for
  lexicon: HALOT
  rationale: From אוה, expressing strong desire. 'Crave' captures the warning against
    inward appetite more vividly than the flatter 'desire,' without oversexualizing
    the sense as 'lust after' might.
- source_word: לְמַטְעַמּוֹתָיו
  chosen: his delicacies
  alternatives:
  - his tasty foods
  - his dainties
  - his delicacies of food
  lexicon: HALOT
  rationale: The noun refers to tasty dishes or delicacies. 'His delicacies' is idiomatic,
    concise, and preserves the sense of attractive, rich food set before the guest.
- source_word: וְהוּא
  chosen: for they are
  alternatives:
  - and it is
  - for it is
  - for he is
  lexicon: HALOT
  rationale: Although morphologically singular ('and it/he'), the pronoun refers back
    to the collective idea of the delicacies/food. English naturally shifts to plural
    agreement ('they are') to match the antecedent as understood in context. The conjunction
    is rendered causally as 'for' because the second clause gives the reason for the
    prohibition.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  - meal
  lexicon: HALOT
  rationale: While literally 'bread,' Hebrew לֶחֶם often broadly denotes food. Here
    'food' better fits the context of rich dishes and avoids an overly narrow English
    sense.
- source_word: כְּזָבִים
  chosen: deceptive
  alternatives:
  - of lies
  - 'false'
  - deceitful
  lexicon: HALOT
  rationale: The plural noun 'lies/deceptions' functions attributively with 'food/bread.'
    'Deceptive' gives clear modern English while preserving the idea that the food
    is not what it seems, but serves hidden motives.
