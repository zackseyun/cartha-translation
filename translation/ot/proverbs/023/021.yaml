id: PRO.23.21
reference: Proverbs 23:21
source:
  edition: WLC
  text: כִּי סֹבֵ֣א וְ֭/זוֹלֵל יִוָּרֵ֑שׁ וּ֝/קְרָעִ֗ים תַּלְבִּ֥ישׁ נוּמָֽה־׃
translation:
  text: For the drunkard and the glutton will come to poverty, and drowsiness will
    clothe one with rags.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slumber will clothe a person with rags.' The Hebrew noun נוּמָה can
      be rendered 'slumber' as well as 'drowsiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹבֵא
  chosen: drunkard
  alternatives:
  - one given to drink
  - winebibber
  lexicon: HALOT
  rationale: The noun denotes a habitual heavy drinker, not merely someone presently
    drunk. 'Drunkard' is concise, idiomatic, and preserves the proverb's moral characterization.
- source_word: זוֹלֵל
  chosen: glutton
  alternatives:
  - wastrel
  - one who gorges himself
  lexicon: HALOT
  rationale: In wisdom contexts the term refers to a prodigal, self-indulgent eater.
    'Glutton' fits the immediate pairing with 'drunkard' and matches the vice list
    context better than the broader 'wastrel'.
- source_word: יִוָּרֵשׁ
  chosen: will come to poverty
  alternatives:
  - will become poor
  - will be impoverished
  - will be dispossessed
  lexicon: HALOT
  rationale: The Niphal of ירש here expresses the result of becoming impoverished
    rather than literal dispossession of land. 'Will come to poverty' is natural English
    and preserves the consequential sense.
- source_word: קְרָעִים
  chosen: rags
  alternatives:
  - torn clothes
  - tatters
  lexicon: HALOT
  rationale: The plural noun refers to torn garments or ragged clothing. 'Rags' is
    vivid and idiomatic in English, conveying the shameful poverty envisioned.
- source_word: תַּלְבִּישׁ
  chosen: will clothe
  alternatives:
  - will dress
  - will cover
  lexicon: HALOT
  rationale: The Hiphil means 'cause to be clothed' or 'clothe.' 'Will clothe' keeps
    the metaphor direct and close to the Hebrew.
- source_word: נוּמָה
  chosen: drowsiness
  alternatives:
  - sleepiness
  - slumber
  lexicon: HALOT
  rationale: The noun denotes sleepy laziness or slumber. 'Drowsiness' captures the
    state that leads to neglect and poverty; 'slumber' is possible but slightly more
    traditional/archaic in tone.
