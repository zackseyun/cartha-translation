theological_decisions:
- issue: Rendering גֹאֵל language in a wisdom context
  chosen_reading: Redeemer
  alternative_readings:
  - kinsman-redeemer
  - vindicator
  rationale: The verse speaks of God or the divinely sanctioned protector of the vulnerable
    as their powerful גֹאֵל. 'Redeemer' preserves the canonical and theological resonance
    of the term without over-specifying kinship where the proverb's emphasis is on
    effective vindication. The legal-protective nuance is documented in lexical decisions.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
