id: PRO.23.11
reference: Proverbs 23:11
source:
  edition: WLC
  text: כִּֽי גֹאֲלָ֥/ם חָזָ֑ק הֽוּא יָרִ֖יב אֶת רִיבָ֣/ם אִתָּֽ/ךְ־־־׃
translation:
  text: for their Redeemer is strong; he will plead their case against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsman-redeemer' or 'their vindicator.' The Hebrew גֹאֵל refers
      to one who acts to redeem, defend, or vindicate a family member.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding prohibition in the context. 'For'
    is natural English and preserves the causal force.
- source_word: גֹאֲלָם
  chosen: their Redeemer
  alternatives:
  - their kinsman-redeemer
  - their avenger
  lexicon: HALOT
  rationale: גאל denotes one who acts as a family redeemer or vindicator. In this
    proverb, the sense is of a powerful protector who will vindicate the vulnerable.
    'Redeemer' is concise and preserves the theological and legal resonance better
    than the more explanatory 'kinsman-redeemer'; 'avenger' is too narrow here.
- source_word: חָזָק
  chosen: strong
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective emphasizes power and ability to act on behalf of the vulnerable.
    'Strong' is the most direct rendering; 'mighty' is possible but slightly more
    elevated than the Hebrew requires.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the subject already implied
    in the verb. English naturally expresses this with the explicit pronoun 'he'.
- source_word: יָרִיב
  chosen: will plead
  alternatives:
  - will contend
  - will take up
  lexicon: HALOT
  rationale: From ריב, 'to contend/plead a case.' In legal imagery, 'will plead' communicates
    advocacy in court-like terms and fits the following cognate noun.
- source_word: אֶת רִיבָם
  chosen: their case
  alternatives:
  - their dispute
  - their cause
  lexicon: HALOT
  rationale: 'The cognate construction with יָרִיב intensifies the legal sense: he
    will contend their contention/case. ''Their case'' is idiomatic English that preserves
    the juridical force. ''Cause'' is also good, but ''case'' is slightly clearer
    for modern readers.'
- source_word: אִתָּךְ
  chosen: against you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The preposition with ריב in this adversarial legal context means contention
    against someone. 'Against you' makes the hostile/legal force explicit in natural
    English.
