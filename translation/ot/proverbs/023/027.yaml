theological_decisions:
- issue: Rendering נָכְרִיָּה in wisdom-literature warning language
  chosen_reading: foreign woman
  alternative_readings:
  - strange woman
  - adulteress
  rationale: The term in Proverbs carries moral and social overtones, but the base
    lexical sense is 'foreign woman.' To avoid importing a more specific doctrinal
    or moral category than the Hebrew explicitly states, the main text keeps the lexical
    sense, while alternatives with interpretive tradition are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
