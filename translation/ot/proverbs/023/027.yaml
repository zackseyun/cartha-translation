id: PRO.23.27
reference: Proverbs 23:27
source:
  edition: WLC
  text: כִּֽי שׁוּחָ֣ה עֲמֻקָּ֣ה זוֹנָ֑ה וּ/בְאֵ֥ר צָ֝רָ֗ה נָכְרִיָּֽה־׃
translation:
  text: For a prostitute is a deep pit, and a foreign woman is a narrow well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange woman'; some render more interpretively, 'adulteress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding warning; 'For'
    preserves the proverb's explanatory force in natural English.
- source_word: שׁוּחָה
  chosen: pit
  alternatives:
  - ditch
  - trap-pit
  lexicon: HALOT
  rationale: Refers to a pit or deep hollow. 'Pit' is concise, idiomatic, and preserves
    the danger imagery without overinterpreting it as a metaphorical 'trap' in the
    main text.
- source_word: עֲמֻקָּה
  chosen: deep
  alternatives:
  - profound
  - very deep
  lexicon: HALOT
  rationale: Adjective modifying 'pit'; 'deep' is the plain and natural rendering
    and keeps the image vivid.
- source_word: זוֹנָה
  chosen: prostitute
  alternatives:
  - harlot
  - whore
  lexicon: HALOT
  rationale: Denotes a sexually immoral woman, specifically a prostitute. 'Prostitute'
    is accurate, modern, and avoids archaic or overly coarse English.
- source_word: וּבְאֵר
  chosen: and a ... well
  alternatives:
  - and a cistern
  - and a pit
  lexicon: HALOT
  rationale: בְּאֵר normally means 'well.' The conjunction is carried by 'and.' Although
    the parallelism with 'pit' could invite a more generalized rendering, 'well' best
    reflects the lexical sense.
- source_word: צָרָה
  chosen: narrow
  alternatives:
  - tight
  - confining
  lexicon: HALOT
  rationale: Describes the well as constricted or narrow. 'Narrow' preserves the concrete
    image and the sense of entrapment without adding interpretation.
- source_word: נָכְרִיָּה
  chosen: foreign woman
  alternatives:
  - strange woman
  - adulteress
  lexicon: HALOT
  rationale: In Proverbs this term often refers to the 'foreign/strange woman,' an
    outsider associated with sexual temptation. 'Foreign woman' follows the Hebrew
    more directly; 'strange woman' is traditional but archaic, while 'adulteress'
    is more interpretive than the lexical form itself warrants.
