id: PRO.23.15
reference: Proverbs 23:15
source:
  edition: WLC
  text: בְּ֭נִ/י אִם חָכַ֣ם לִבֶּ֑/ךָ יִשְׂמַ֖ח לִבִּ֣/י גַם אָֽנִי־־׃
translation:
  text: My son, if your heart is wise, my heart also will rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my heart—even I—will rejoice,' preserving the emphatic force of 'also/even
      I' in the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew is literally 'my son,' a common paternal address in Proverbs.
    Per the translation philosophy, the masculine form is retained as gender-accurate
    rather than neutralized, since the source text uses a masculine singular vocative.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: The particle introduces a conditional clause. 'If' best preserves the
    straightforward conditional sense without importing stronger expectation.
- source_word: חָכַם
  chosen: is wise
  alternatives:
  - becomes wise
  - has become wise
  lexicon: HALOT
  rationale: Though formally a perfect verb, in this conditional setting with a stative/resultative
    sense it is naturally rendered in English as 'is wise.' This communicates the
    state of possessing wisdom rather than emphasizing process.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including thought and
    will. 'Heart' is retained to preserve the Hebrew anthropological imagery, especially
    since the verse parallels 'my heart.'
- source_word: יִשְׂמַח
  chosen: will rejoice
  alternatives:
  - will be glad
  - rejoices
  lexicon: HALOT
  rationale: 'The imperfect verb fits a future/result sense following the condition:
    if the son''s heart is wise, the father''s heart will rejoice. ''Rejoice'' is
    slightly weightier and more idiomatic in wisdom literature than ''be glad.'''
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - I
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'my heart,' not merely 'I.' Retaining 'heart'
    preserves the poetic parallelism with 'your heart' and the affective center of
    the speaker.
- source_word: גַם אֲנִי
  chosen: also
  alternatives:
  - I also
  - even I
  lexicon: HALOT
  rationale: 'The combination intensifies and personalizes the speaker''s response:
    ''I too / even I.'' In English, placing ''also'' after ''my heart'' yields natural
    style while preserving the additive emphasis. The fuller nuance is preserved in
    a footnote.'
