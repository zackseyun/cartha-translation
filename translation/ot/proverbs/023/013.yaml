id: PRO.23.13
reference: Proverbs 23:13
source:
  edition: WLC
  text: אַל תִּמְנַ֣ע מִ/נַּ֣עַר מוּסָ֑ר כִּֽי תַכֶּ֥/נּוּ בַ֝/שֵּׁ֗בֶט לֹ֣א יָמֽוּת־־׃
translation:
  text: Do not withhold discipline from a boy, for if you strike him with the rod,
    he will not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a child' or 'from a youth.' The Hebrew noun can refer to a boy
      or young person more broadly; the main text keeps the masculine singular form
      of the proverb.
    reason: lexical_alternative
  - marker: b
    text: The proverb states that such correction is not, in itself, fatal; it should
      not be read as a blanket approval of abusive violence or as an absolute guarantee
      in every case.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the imperfect/jussive for prohibition;
    concise English imperative best matches the force.
- source_word: תִּמְנַע
  chosen: withhold
  alternatives:
  - hold back
  - keep back
  lexicon: HALOT
  rationale: מןע in this stem commonly means to withhold or restrain. 'Withhold' is
    idiomatic with an object like discipline and preserves the admonitory tone.
- source_word: מִנַּעַר
  chosen: from a boy
  alternatives:
  - from a youth
  - from a child
  lexicon: HALOT
  rationale: נַעַר can denote boy, youth, servant, or young person depending on context.
    Here the parental-discipline setting favors 'boy' as a gender-accurate singular
    rendering, matching the masculine singular pronominal suffixes that follow.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - training
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often carries the sense of corrective discipline/training,
    not mere verbal instruction. 'Discipline' best fits the immediate context of corporal
    correction with the rod.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the prohibition. 'For' is natural
    and preserves the explanatory connection.
- source_word: תַכֶּנּוּ
  chosen: you strike him
  alternatives:
  - you beat him
  - you discipline him
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite/hit. 'Strike' is direct without
    overstating the violence; 'discipline him' would obscure the concrete imagery,
    while 'beat him' may over-specify.
- source_word: בַשֵּׁבֶט
  chosen: with the rod
  alternatives:
  - with a rod
  - with the staff
  lexicon: HALOT
  rationale: שֵׁבֶט can mean rod, staff, scepter, or tribe depending on context. In
    wisdom literature on discipline, 'rod' is the clear sense. The article is naturally
    rendered generically in English as 'the rod'.
- source_word: לֹא יָמוּת
  chosen: he will not die
  alternatives:
  - he will not die from it
  - he will not perish
  lexicon: HALOT
  rationale: Simple negated imperfect of מות. The plain sense is retained without
    softening or expanding beyond the Hebrew; the statement expresses the proverb's
    assurance rather than a universal legal guarantee.
