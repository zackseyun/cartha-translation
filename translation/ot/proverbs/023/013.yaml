theological_decisions:
- issue: Gendered reference of נַעַר in a wisdom maxim
  chosen_reading: Render as 'boy' in the main text
  alternative_readings:
  - child
  - youth
  rationale: The Hebrew is grammatically masculine singular and the translation philosophy
    prefers gender-accurate renderings over gender-neutral ones where the source is
    masculine and representative. 'Boy' preserves the form and likely household setting,
    while broader applicability can be noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of the proverb's claim about corporal discipline
  chosen_reading: Translate the statement straightforwardly as 'he will not die' without
    adding interpretive qualifiers to the main text
  alternative_readings:
  - he will not die from it
  - it will not kill him
  rationale: The Hebrew makes a direct proverbial assertion. Adding qualifiers in
    the main text would interpret and soften beyond the source. Because modern readers
    may misconstrue the line as an absolute promise or endorsement of abuse, clarification
    is better handled in a footnote rather than by altering the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
