id: PRO.23.22
reference: Proverbs 23:22
source:
  edition: WLC
  text: שְׁמַ֣ע לְ֭/אָבִי/ךָ זֶ֣ה יְלָדֶ֑/ךָ וְ/אַל תָּ֝ב֗וּז כִּֽי זָקְנָ֥ה אִמֶּֽ/ךָ־־׃
translation:
  text: Listen to your father, who fathered you, and do not despise your mother when
    she is old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear your father, this one who begot you.' The Hebrew uses a demonstrative
      ('this one') after 'your father' for emphasis, which is rendered idiomatically
      in English as 'who.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when she has grown old.' The Hebrew perfect verb can emphasize the resulting
      state of old age.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative of שׁמע commonly means not merely auditory hearing but attentive
    heed. 'Listen' is natural modern English and preserves the exhortational force
    better than the more archaic-sounding 'hear'.
- source_word: לְאָבִיךָ
  chosen: to your father
  alternatives:
  - your father
  lexicon: HALOT
  rationale: The preposition ל marks the object of attentive listening here. In idiomatic
    English, 'listen to your father' best represents the construction.
- source_word: זֶה
  chosen: who
  alternatives:
  - this one who
  - he who
  lexicon: HALOT
  rationale: The demonstrative points to the father just mentioned and introduces
    a relative-like clarification. English expresses this most naturally with the
    relative pronoun 'who' rather than the wooden 'this one'.
- source_word: יְלָדֶךָ
  chosen: fathered you
  alternatives:
  - begot you
  - gave you birth
  lexicon: HALOT
  rationale: From ילד, here with masculine subject referring to the father. 'Fathered
    you' preserves the paternal perspective better than 'gave you birth,' while 'begot'
    is accurate but archaic for the target audience.
- source_word: וְאַל תָּבוּז
  chosen: and do not despise
  alternatives:
  - and do not scorn
  - and do not treat with contempt
  lexicon: HALOT
  rationale: בוז denotes holding in contempt or despising. 'Despise' is concise, strong,
    and idiomatic in wisdom literature.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - though
  lexicon: HALOT
  rationale: 'Here כּי introduces the circumstance under which the warning applies:
    as/when your mother has grown old. ''When'' fits the sense better than causal
    ''because,'' which could imply despising her on account of old age.'
- source_word: זָקְנָה
  chosen: she is old
  alternatives:
  - she has grown old
  - she becomes old
  lexicon: HALOT
  rationale: The perfect verb describes the state of having become old. 'She is old'
    is smooth English; the temporal force is carried by 'when.'
- source_word: אִמֶּךָ
  chosen: your mother
  lexicon: HALOT
  rationale: Direct and standard rendering of the noun with 2ms suffix.
