id: PRO.23.25
reference: Proverbs 23:25
source:
  edition: WLC
  text: יִֽשְׂמַח אָבִ֥י/ךָ וְ/אִמֶּ֑/ךָ וְ֝/תָגֵ֗ל יֽוֹלַדְתֶּֽ/ךָ־׃
translation:
  text: Let your father and your mother be glad, and let her who gave birth to you
    rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she who bore you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  chosen: be glad
  alternatives:
  - rejoice
  - be joyful
  lexicon: HALOT
  rationale: 'Qal jussive 3ms of שׂמח expresses a wish/exhortation: ''let ... be glad.''
    ''Be glad'' is natural English and distinguishes it from the second verb.'
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct possessive construction; straightforwardly rendered 'your father.'
- source_word: וְאִמֶּךָ
  chosen: and your mother
  lexicon: HALOT
  rationale: Simple coordination with the previous noun; rendered explicitly for clarity
    in English.
- source_word: וְתָגֵל
  chosen: and let ... rejoice
  alternatives:
  - and let ... exult
  - and let ... be joyful
  lexicon: HALOT
  rationale: Qal jussive 3fs of גיל, a stronger expression of joy than שׂמח. 'Rejoice'
    preserves the elevated sense while remaining readable.
- source_word: יוֹלַדְתֶּךָ
  chosen: her who gave birth to you
  alternatives:
  - the one who bore you
  - she who bore you
  lexicon: HALOT
  rationale: Feminine singular participial form from ילד with 2ms suffix refers specifically
    to the mother as the one who bore the son addressed. 'Her who gave birth to you'
    is explicit and idiomatic in modern English; 'bore you' is possible but slightly
    less transparent for contemporary readers.
