id: PRO.23.6
reference: Proverbs 23:6
source:
  edition: WLC
  text: אַל תִּלְחַ֗ם אֶת לֶ֭חֶם רַ֣ע עָ֑יִן וְ/אַל תתאו לְ/מַטְעַמֹּתָֽי/ו־־־׃
translation:
  text: Do not eat the bread of a man with an evil eye, and do not crave his delicacies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the bread of an evil eye.' The idiom refers to a stingy,
      begrudging, or ungenerous person.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּלְחַם
  chosen: eat
  alternatives:
  - consume
  - partake of
  lexicon: HALOT
  rationale: Though the verb לחם can be associated with eating bread/food, in this
    idiom with לֶחֶם it means 'eat' rather than the unrelated homograph 'fight.' English
    'eat' best captures the plain sense in context.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  - meal
  lexicon: HALOT
  rationale: The noun literally means 'bread.' Retaining 'bread' preserves the Hebrew
    imagery, though in context it can stand metonymically for a meal or food generally.
- source_word: רַע עָיִן
  chosen: a man with an evil eye
  alternatives:
  - a stingy man
  - a begrudging host
  - one who is envious
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'evil of eye/evil-eyed.' In wisdom literature
    it denotes a miserly, begrudging, or ungenerous person. The main text keeps the
    idiom in transparent English ('a man with an evil eye') to preserve the source
    expression, while the sense can be clarified by footnote.
- source_word: תתאו
  chosen: crave
  alternatives:
  - desire
  - long for
  lexicon: HALOT
  rationale: The Hitpael/imperfect form from אוה expresses strong desire. 'Crave'
    conveys the warning against inward appetite more vividly than the flatter 'desire.'
- source_word: לְמַטְעַמֹּתָיו
  chosen: his delicacies
  alternatives:
  - his tasty foods
  - his dainties
  lexicon: HALOT
  rationale: The noun refers to tasty dishes or delicacies. 'Delicacies' is natural
    modern English and preserves the sense of specially appealing food.
