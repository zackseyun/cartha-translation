id: PRO.23.35
reference: Proverbs 23:35
source:
  edition: WLC
  text: הִכּ֥וּ/נִי בַל חָלִיתִי֮ הֲלָמ֗וּ/נִי בַּל יָ֫דָ֥עְתִּי מָתַ֥י אָקִ֑יץ א֝וֹסִ֗יף
    אֲבַקְשֶׁ֥/נּוּ עֽוֹד־־׃
translation:
  text: “They struck me, but I was not hurt; they beat me, but I did not know it.
    When will I awake? I will seek it again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They struck me, but I did not feel it; they beat me, but I was unaware.'
      The Hebrew verbs can be rendered with slightly different nuances of injury,
      pain, or awareness.
    reason: lexical_alternative
  - marker: b
    text: The pronoun in 'I will seek it again' most likely refers to wine or strong
      drink from the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: הִכּוּנִי
  chosen: They struck me
  alternatives:
  - They hit me
  - They beat me
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/smiting. 'Struck' is natural English
    and preserves the physical violence without over-specifying the manner. 'Beat'
    is reserved for the second verb to preserve the Hebrew variation.
- source_word: בַל
  chosen: but ... not
  alternatives:
  - not
  lexicon: HALOT
  rationale: 'Negative particle. In English the adversative sense is supplied by context:
    ''They struck me, but I was not hurt.'' This reflects the drunken speaker''s claim
    despite the assault.'
- source_word: חָלִיתִי
  chosen: I was not hurt
  alternatives:
  - I was not sick
  - I did not feel pain
  - I was not wounded
  lexicon: HALOT
  rationale: From חלה, whose semantic range includes being weak, sick, or hurt. In
    this context of physical blows, 'I was not hurt' best fits idiomatic English and
    the speaker's numbness. 'Sick' would sound misleadingly medical here.
- source_word: הֲלָמֻנִי
  chosen: they beat me
  alternatives:
  - they struck me
  - they pummeled me
  lexicon: HALOT
  rationale: From הלם, to strike/beat. Rendering it as 'beat' differentiates it from
    the previous verb while keeping the parallelism of repeated assault.
- source_word: יָדָעְתִּי
  chosen: I did not know it
  alternatives:
  - I did not notice
  - I was unaware
  lexicon: HALOT
  rationale: ידע normally means 'know.' In context the sense is lack of awareness
    due to intoxication. 'I did not know it' is slightly more formal and preserves
    the Hebrew wording while remaining clear.
- source_word: מָתַי אָקִיץ
  chosen: When will I awake?
  alternatives:
  - When shall I wake up?
  - When will I come to my senses?
  lexicon: HALOT
  rationale: קיץ in the Hiphil means to awake/arouse. 'Awake' preserves the literal
    image; 'come to my senses' interprets beyond the wording.
- source_word: אוֹסִיף
  chosen: I will
  alternatives:
  - I will again
  - I will continue to
  lexicon: HALOT
  rationale: 'יסף often conveys adding/continuing. Here it functions with the following
    verb to express repetition: ''I will seek it again.'' The iterative force is carried
    in English by ''again'' attached to the object sought.'
- source_word: אֲבַקְשֶׁנּוּ
  chosen: seek it
  alternatives:
  - look for it
  - seek him
  lexicon: HALOT
  rationale: בקש means seek/look for. The 3ms suffix most naturally refers back to
    wine/drink from the surrounding context, so 'it' is appropriate. 'Seek him' is
    grammatically possible but contextually implausible.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - once more
  lexicon: HALOT
  rationale: In this closing clause, עוד marks repetition. 'Again' clearly conveys
    the drunkard's resolve to return to drink.
