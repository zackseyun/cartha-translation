id: PRO.23.7
reference: Proverbs 23:7
source:
  edition: WLC
  text: כִּ֤י כְּמוֹ שָׁעַ֥ר בְּ/נַפְשׁ֗/וֹ כֶּ֫ן ה֥וּא אֱכֹ֣ל וּ֭/שְׁתֵה יֹ֣אמַר
    לָ֑/ךְ וְ֝/לִבּ֗/וֹ בַּל עִמָּֽ/ךְ׀־־־׃
translation:
  text: 'For as he calculates within himself, so he is: “Eat and drink,” he says to
    you, but his heart is not with you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For as he thinks within himself, so he is.” The Hebrew verb can mean
      “thinks,” but more specifically suggests reckoning or calculating.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the warning in the surrounding context.
    'For' fits the proverbial explanatory force in English.
- source_word: כְּמוֹ
  chosen: as
  alternatives:
  - like
  - just as
  lexicon: HALOT
  rationale: Used in the comparative construction כְּמוֹ...כֵּן, best rendered 'as...so'
    in English.
- source_word: שָׁעַר
  chosen: calculates
  alternatives:
  - thinks
  - reckons
  - estimates
  lexicon: HALOT
  rationale: The verb commonly relates to calculating or reckoning. Here it conveys
    inward assessment rather than mere abstract thought, fitting the context of a
    stingy host who is mentally counting the cost.
- source_word: בְּנַפְשׁוֹ
  chosen: within himself
  alternatives:
  - in his soul
  - in himself
  - in his mind
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the inner self rather than the physical life or
    'soul' in a technical sense. 'Within himself' communicates the internal, private
    nature of the reckoning in natural English.
- source_word: כֵּן הוּא
  chosen: so he is
  alternatives:
  - so is he
  - that is what he is
  lexicon: HALOT
  rationale: 'Keeps the concise proverbial conclusion: a person''s inward reckoning
    reveals his true character.'
- source_word: אֱכֹל וּשְׁתֵה
  chosen: Eat and drink
  alternatives:
  - Go ahead, eat and drink
  lexicon: HALOT
  rationale: Imperatives quoted as the host's invitation. A straightforward rendering
    preserves the contrast between his words and his heart.
- source_word: יֹאמַר לָךְ
  chosen: he says to you
  alternatives:
  - he tells you
  - he will say to you
  lexicon: HALOT
  rationale: Simple speech formula introducing the quoted invitation. Present-tense
    English suits proverbial discourse.
- source_word: וְלִבּוֹ
  chosen: but his heart
  alternatives:
  - yet his heart
  - and his heart
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in context because the clause
    contrasts his spoken invitation with his true disposition.
- source_word: בַּל
  chosen: is not
  alternatives:
  - is by no means
  - is not at all
  lexicon: HALOT
  rationale: Negative particle rendered idiomatically in English.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - for you
  - toward you
  lexicon: HALOT
  rationale: Expresses relational alignment or solidarity. 'With you' preserves the
    idiom and the sense that his affections are not genuinely engaged.
