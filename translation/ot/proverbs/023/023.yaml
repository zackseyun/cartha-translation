id: PRO.23.23
reference: Proverbs 23:23
source:
  edition: WLC
  text: אֱמֶ֣ת קְ֭נֵה וְ/אַל תִּמְכֹּ֑ר חָכְמָ֖ה וּ/מוּסָ֣ר וּ/בִינָֽה־׃
translation:
  text: Buy truth, and do not sell wisdom, instruction, and understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Acquire truth'; the Hebrew verb can mean 'buy' or more broadly 'acquire/get,'
      but the commercial imagery is likely intentional because of the following 'do
      not sell.'
    reason: lexical_alternative
  - marker: b
    text: '''Instruction'' may also be rendered ''discipline'' or ''correction.'''
    reason: lexical_alternative
  - marker: c
    text: '''Understanding'' may also be rendered ''discernment'' or ''insight.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - truthfulness
  - reliability
  - faithfulness
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, reliability, or faithfulness. Here, in
    a wisdom exhortation paired with acquiring wisdom-related qualities, 'truth' is
    the most natural and concise English rendering, preserving both moral and cognitive
    force without over-specifying one nuance.
- source_word: קְנֵה
  chosen: Buy
  alternatives:
  - acquire
  - get
  lexicon: HALOT
  rationale: The imperative of קנה literally means 'buy/acquire.' 'Buy' preserves
    the commercial metaphor that is balanced by 'do not sell' in the next clause.
    'Acquire' is possible but weakens the deliberate antithesis.
- source_word: וְאַל תִּמְכֹּר
  chosen: and do not sell
  alternatives:
  - but do not sell
  lexicon: HALOT
  rationale: The conjunction plus negative imperative is straightforward. 'And do
    not sell' keeps the Hebrew coordination and preserves the proverb's terse parallelism.
    English readers can still hear the contrast with 'Buy.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs. It denotes practical, moral, and God-oriented
    skill in living; 'wisdom' is the established and accurate English equivalent.
- source_word: מוּסָר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs can mean discipline, correction, or instruction formed
    through discipline. 'Instruction' reads naturally in English in this list and
    avoids narrowing the term only to punitive correction, while still fitting wisdom
    literature usage.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בינה refers to understanding or discernment. 'Understanding' is the broadest
    and most idiomatic rendering here, matching the triad with 'wisdom' and 'instruction'
    without sounding overly technical.
