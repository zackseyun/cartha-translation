id: PRO.23.5
reference: Proverbs 23:5
source:
  edition: WLC
  text: ה/תעוף עֵינֶ֥י/ךָ בּ֗/וֹ וְֽ/אֵ֫ינֶ֥/נּוּ כִּ֤י עָשֹׂ֣ה יַעֲשֶׂה לּ֣/וֹ כְנָפַ֑יִם
    כְּ֝/נֶ֗שֶׁר ו/עיף הַ/שָּׁמָֽיִם־׃פ
translation:
  text: Will you let your eyes fly to it, and it is gone? For it surely makes wings
    for itself; like an eagle, it flies to the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture'; the Hebrew nesher can refer more broadly to a large
      bird of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָעוּף
  chosen: Will you let ... fly
  alternatives:
  - Will your eyes fly
  - Do you cause your eyes to fly
  - When you glance
  lexicon: HALOT
  rationale: The Hiphil imperfect 2ms of עוּף literally means 'cause to fly.' In context
    with 'your eyes' it is an idiom for directing one's gaze quickly toward something.
    Rendering it as 'Will you let your eyes fly' preserves the vivid Hebrew image
    while remaining intelligible. A more idiomatic option like 'glance' is possible
    but would flatten the metaphor.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your gaze
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom and imagery.
- source_word: בּוֹ
  chosen: to it
  alternatives:
  - upon it
  - on it
  lexicon: HALOT
  rationale: English idiom with verbs of looking prefers 'to it' here, though the
    preposition is literally 'in/on him/it.' The referent is the wealth/riches of
    the previous context.
- source_word: וְאֵינֶנּוּ
  chosen: and it is gone
  alternatives:
  - and it is no more
  - but it is not there
  lexicon: HALOT
  rationale: The expression literally means 'and it is not.' In context it denotes
    sudden disappearance, so 'it is gone' communicates the sense naturally.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the disappearance of wealth.
- source_word: עָשֹׂה יַעֲשֶׂה
  chosen: it surely makes
  alternatives:
  - it certainly makes
  - it makes indeed
  - it will surely make
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Surely
    makes' captures the emphatic force in natural English.
- source_word: לּוֹ
  chosen: for itself
  alternatives:
  - for it
  - its own
  lexicon: HALOT
  rationale: The dative pronoun indicates that the subject acquires or makes wings
    for itself. 'For itself' brings out the reflexive sense implied by the Hebrew
    construction.
- source_word: כְנָפַיִם
  chosen: wings
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: כְּנֶשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נֶשֶׁר can denote a large bird of prey, sometimes argued to be 'vulture.'
    In biblical poetic and traditional English usage, 'eagle' is the most recognizable
    and fitting image here. The alternative is worth preserving in a footnote because
    the zoological identification is debated.
- source_word: וְעָף
  chosen: it flies
  alternatives:
  - and flies away
  - and it will fly
  lexicon: HALOT
  rationale: 'Qal perfect/consecutive here functions in the poetic sequence to describe
    the result: wealth takes flight. ''It flies'' is concise and vivid; ''flies away''
    is interpretive but possible.'
- source_word: הַשָּׁמָיִם
  chosen: to the heavens
  alternatives:
  - to the sky
  - to heaven
  lexicon: HALOT
  rationale: The Hebrew plural often denotes the sky/heavens. 'The heavens' preserves
    the elevated poetic register better than 'the sky' while avoiding a doctrinally
    loaded singular 'heaven' in this wisdom context.
