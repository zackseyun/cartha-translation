id: PRO.23.32
reference: Proverbs 23:32
source:
  edition: WLC
  text: אַ֭חֲרִית/וֹ כְּ/נָחָ֣שׁ יִשָּׁ֑ךְ וּֽ/כְ/צִפְעֹנִ֥י יַפְרִֽשׁ׃
translation:
  text: In the end it bites like a snake, and it stings like a viper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its end bites like a snake.' The Hebrew literally says 'its end,' referring
      to the eventual outcome of the wine described in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'adder' for 'viper.' The Hebrew term denotes a venomous snake.
    reason: lexical_alternative
  - marker: c
    text: The final verb is lexically difficult; it is traditionally rendered 'stings,'
      though 'strikes' or 'spreads venom' are also proposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִיתוֹ
  chosen: In the end
  alternatives:
  - Its end
  - Afterward
  lexicon: HALOT
  rationale: אַחֲרִית denotes the latter end, outcome, or final result. Given the
    preceding context about wine, English idiom is clearer with the adverbial phrase
    'In the end' rather than the more wooden 'its end,' while preserving the sense
    of eventual outcome.
- source_word: כְּנָחָשׁ
  chosen: like a snake
  alternatives:
  - like a serpent
  lexicon: HALOT
  rationale: נָחָשׁ is the common term for snake/serpent. 'Snake' is more natural
    modern English; 'serpent' is possible but sounds more elevated and may import
    associations not required by the proverb.
- source_word: יִשָּׁךְ
  chosen: it bites
  alternatives:
  - it will bite
  lexicon: HALOT
  rationale: From נשׁך, 'to bite.' English present tense suits proverbial discourse,
    expressing a general truth. The subject is implicit from context (wine), so 'it
    bites' makes the clause complete in English.
- source_word: וּכְצִפְעֹנִי
  chosen: and like a viper
  alternatives:
  - and like an adder
  lexicon: HALOT
  rationale: צִפְעֹנִי refers to a venomous snake, commonly rendered 'viper' or 'adder.'
    'Viper' is clearer and more current in modern English than 'adder.'
- source_word: יַפְרִשׁ
  chosen: it stings
  alternatives:
  - it strikes
  - it spreads venom
  lexicon: HALOT
  rationale: The verb is difficult and has been understood in context as the harmful
    action of a venomous snake. 'It stings' is the conventional and contextually fitting
    rendering in English, conveying the poisonous injury parallel to 'bites.' Alternatives
    such as 'strikes' or 'spreads venom' are possible but less idiomatic here.
