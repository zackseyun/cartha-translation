id: PRO.23.17
reference: Proverbs 23:17
source:
  edition: WLC
  text: אַל יְקַנֵּ֣א לִ֭בְּ/ךָ בַּֽ/חַטָּאִ֑ים כִּ֥י אִם בְּ/יִרְאַת יְ֝הוָ֗ה כָּל
    הַ/יּֽוֹם־־־־׃
translation:
  text: Do not let your heart envy sinners, but continue in the fear of the LORD all
    day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not let your heart be jealous of sinners, but let it remain in the
      fear of the LORD all day long.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Standard negative particle used for prohibition; idiomatic English imperative
    is 'Do not.'
- source_word: יְקַנֵּא
  chosen: envy
  alternatives:
  - be jealous of
  - be envious of
  lexicon: HALOT
  rationale: The verb קנא in this context denotes jealous/envying desire toward others'
    apparent prosperity. 'Envy' is the most natural concise English rendering here.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  - you
  lexicon: HALOT
  rationale: Hebrew 'heart' is retained rather than flattened, since it naturally
    conveys the inner disposition in English and preserves the imagery of the source.
- source_word: בַּחַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: HALOT
  rationale: The noun plainly refers to those characterized by sin. 'Sinners' is direct,
    idiomatic, and preserves the moral category.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: 'The paired particles introduce a contrastive correction: not X, but
    Y. English ''but'' captures the adversative force smoothly; the sense of replacement
    is reflected by the following wording.'
- source_word: בְּיִרְאַת יְהוָה
  chosen: in the fear of the LORD
  alternatives:
  - in fearing the LORD
  - in reverence for the LORD
  lexicon: HALOT
  rationale: '''Fear of the LORD'' is a key biblical expression and should be preserved
    rather than paraphrased away. The divine name follows project policy as ''the
    LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: The phrase denotes duration through the whole day. 'All day long' is
    natural modern English and preserves the temporal emphasis.
