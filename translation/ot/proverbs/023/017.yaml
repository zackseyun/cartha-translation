theological_decisions:
- issue: How to construe the verbless second clause after 'but'
  chosen_reading: 'Supply an implied exhortation: ''but continue in the fear of the
    LORD all day long.'''
  alternative_readings:
  - but be in the fear of the LORD all day long
  - but let your heart be in the fear of the LORD all day long
  rationale: The Hebrew second clause is elliptical, contrasting the forbidden envy
    with the desired posture. English requires an explicit verbal idea. 'Continue
    in' communicates the sustained orientation implied by the prepositional phrase
    and the temporal expression, without overinterpreting beyond the contrast.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
