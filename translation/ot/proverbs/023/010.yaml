id: PRO.23.10
reference: Proverbs 23:10
source:
  edition: WLC
  text: אַל תַּ֭סֵּג גְּב֣וּל עוֹלָ֑ם וּ/בִ/שְׂדֵ֥י יְ֝תוֹמִ֗ים אַל תָּבֹֽא־־׃
translation:
  text: Do not move an ancient boundary marker, and do not enter the fields of orphans,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not remove an ancient boundary, and do not go into the fields of
      the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסֵּג
  chosen: move
  alternatives:
  - remove
  - shift back
  lexicon: HALOT
  rationale: The verb from נסג in this context refers to moving a boundary marker
    out of place, i.e., encroaching on property. 'Move' is natural modern English
    and preserves the legal/property sense without over-paraphrasing.
- source_word: גְּבוּל
  chosen: boundary marker
  alternatives:
  - boundary
  - landmark
  - boundary line
  lexicon: HALOT
  rationale: While the noun can mean 'boundary' or 'border,' in this legal-wisdom
    context it refers concretely to the marker establishing a property line. 'Boundary
    marker' makes the implied object explicit in idiomatic English.
- source_word: עוֹלָם
  chosen: ancient
  alternatives:
  - everlasting
  - old
  - long-standing
  lexicon: HALOT
  rationale: Here עוֹלָם modifies the boundary as something from long ago, not metaphysically
    eternal. 'Ancient' best fits the property-law setting and common English usage.
- source_word: וּ/בִ/שְׂדֵי
  chosen: and ... the fields of
  alternatives:
  - and into the fields of
  - and in the fields of
  lexicon: HALOT
  rationale: The prefixed preposition ב with the following verb of motion yields the
    sense of entering into the fields. English idiom expresses this with 'enter the
    fields of' rather than a more wooden 'come into the fields of.'
- source_word: יְתוֹמִים
  chosen: orphans
  alternatives:
  - the fatherless
  lexicon: HALOT
  rationale: The noun denotes children deprived of a father. 'Orphans' is clear, contemporary
    English; 'the fatherless' is a viable traditional alternative but less natural
    for the target audience.
- source_word: תָּבֹא
  chosen: enter
  alternatives:
  - come
  - go in
  lexicon: HALOT
  rationale: With the negative and the prepositional phrase, the verb warns against
    intruding on or encroaching upon their property. 'Enter' is concise and idiomatic
    in English.
