id: PRO.23.28
reference: Proverbs 23:28
source:
  edition: WLC
  text: אַף הִ֭יא כְּ/חֶ֣תֶף תֶּֽאֱרֹ֑ב וּ֝/בוֹגְדִ֗ים בְּ/אָדָ֥ם תּוֹסִֽף־׃
translation:
  text: Indeed, she lies in wait like a robber, and she increases the treacherous
    among man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a bandit.' The Hebrew term חֶתֶף is rare and difficult; some understand
      it more generally as violent seizure or sudden attack.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among man,' with אָדָם used generically for humanity; that is, she
      increases the treacherous among humankind.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Even
  - Surely
  lexicon: HALOT
  rationale: Here אַף functions as an asseverative/emphatic particle rather than simple
    addition. 'Indeed' conveys the emphatic force naturally in English.
- source_word: הִיא
  chosen: she
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the adulterous/forbidden woman in
    the immediate context. English should preserve the feminine singular reference.
- source_word: כְּחֶתֶף
  chosen: like a robber
  alternatives:
  - like a bandit
  - like prey
  - like sudden destruction
  lexicon: HALOT
  rationale: חֶתֶף is difficult and relatively rare. In this context, paired with
    'lies in wait,' it most plausibly denotes a violent snatcher/robber rather than
    an abstract event. 'Like a robber' fits the predatory imagery and parallelism.
- source_word: תֶּאֱרֹב
  chosen: lies in wait
  alternatives:
  - lurks
  - ambushes
  lexicon: HALOT
  rationale: The verb ארב commonly carries the sense of lying in ambush or waiting
    to attack. 'Lies in wait' is idiomatic and preserves the predatory nuance.
- source_word: וּבוֹגְדִים
  chosen: the treacherous
  alternatives:
  - traitors
  - the unfaithful
  - the faithless
  lexicon: HALOT
  rationale: בוגדים denotes those who act treacherously or faithlessly. 'The treacherous'
    is broad enough to fit wisdom literature's moral category without over-specifying
    political betrayal.
- source_word: בְּאָדָם
  chosen: among man
  alternatives:
  - among mankind
  - among humankind
  - among men
  lexicon: HALOT
  rationale: אָדָם here is collective/generic. Per doctrine, gender-accurate rendering
    is preferred; 'man' preserves the Hebrew generic singular, though the sense is
    humanity in general.
- source_word: תּוֹסִף
  chosen: increases
  alternatives:
  - adds to
  - multiplies
  lexicon: HALOT
  rationale: 'The Hiphil of יסף means to add/increase. Here the sense is causative:
    she makes the number of treacherous persons grow. ''Increases'' is concise and
    natural.'
