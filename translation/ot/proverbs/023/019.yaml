theological_decisions:
- issue: Gendered filial address in wisdom instruction
  chosen_reading: my son
  alternative_readings:
  - my child
  rationale: The Hebrew address is grammatically masculine singular and should be
    rendered accordingly rather than neutralized. In Proverbs this form can have representative
    force, but the wording itself remains masculine.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
