id: PRO.23.19
reference: Proverbs 23:19
source:
  edition: WLC
  text: שְׁמַע אַתָּ֣ה בְנִ֣/י וַ/חֲכָ֑ם וְ/אַשֵּׁ֖ר בַּ/דֶּ֣רֶךְ לִבֶּֽ/ךָ־׃
translation:
  text: Listen, my son, and be wise, and direct your heart in the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear, my son ... and guide your heart on the path.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative 2ms from שׁמע. 'Listen' communicates not merely auditory reception
    but heedful attention in natural modern English. 'Hear' is possible but sounds
    more archaic here.
- source_word: בְנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Vocative with 1cs suffix. The Hebrew is explicitly masculine singular
    and in Proverbs often reflects father-to-son instruction. Per gender-accurate
    philosophy, 'my son' is preferred over neutralizing to 'my child'.
- source_word: וַחֲכָם
  chosen: and be wise
  alternatives:
  - and become wise
  lexicon: HALOT
  rationale: Imperative from חכם. English idiom favors 'be wise'; 'become wise' is
    possible but slightly more process-oriented than the concise exhortational force
    here.
- source_word: וְאַשֵּׁר
  chosen: and direct
  alternatives:
  - and guide
  - and make straight
  lexicon: HALOT
  rationale: Piel imperative from אשר in the sense of making straight/directing. With
    'your heart' and 'in the way,' the sense is to set or guide the inner person on
    the right path. 'Direct' preserves the metaphor compactly; 'make straight' is
    more literal but less idiomatic in English.
- source_word: בַּדֶּרֶךְ
  chosen: in the way
  alternatives:
  - on the path
  - in the path
  lexicon: HALOT
  rationale: דרך commonly denotes way/path, often metaphorically for conduct. 'In
    the way' preserves the Hebrew metaphor and works naturally with 'direct your heart.'
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לב in Hebrew anthropology includes thought, will, and desire, but 'heart'
    is the standard and theologically/literarily important rendering. Broader interpretive
    senses should not replace the concrete metaphor in the main text.
