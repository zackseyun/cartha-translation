id: PRO.23.34
reference: Proverbs 23:34
source:
  edition: WLC
  text: וְ֭/הָיִיתָ כְּ/שֹׁכֵ֣ב בְּ/לֶב יָ֑ם וּ֝/כְ/שֹׁכֵ֗ב בְּ/רֹ֣אשׁ חִבֵּֽל־׃
translation:
  text: And you will be like one lying down in the heart of the sea, like one lying
    down on the top of the rigging.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the top of a mast.' The Hebrew חִבֵּל can refer to ship's tackle,
      ropes, or related nautical equipment; 'mast' reflects a traditional contextual
      interpretation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  chosen: And you will be
  alternatives:
  - and you become
  - then you will be
  lexicon: HALOT
  rationale: Qal perfect 2ms of היה with prefixed conjunction functions here with
    future/resultative force in the warning context. 'And you will be' preserves the
    direct second-person address and the consequence sense.
- source_word: כְּשֹׁכֵב
  chosen: like one lying down
  alternatives:
  - like one who lies down
  - as one sleeping
  lexicon: HALOT
  rationale: The participle of שׁכב denotes the state of lying down. 'Like one lying
    down' is idiomatic and preserves the simile without overinterpreting it as actual
    sleep.
- source_word: בְּלֶב יָם
  chosen: in the heart of the sea
  alternatives:
  - in the midst of the sea
  - at sea
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' often metaphorically 'midst' or 'center.'
    Retaining 'heart of the sea' preserves the vivid Hebrew imagery while remaining
    understandable in English.
- source_word: וּכְשֹׁכֵב
  chosen: like one lying down
  alternatives:
  - and like one lying down
  - like one who lies down
  lexicon: HALOT
  rationale: The repeated participial phrase intensifies the comparison. English can
    omit an extra 'and' inside the simile for smoother style while preserving the
    parallelism.
- source_word: בְּרֹאשׁ
  chosen: on the top of
  alternatives:
  - at the head of
  - on the summit of
  lexicon: HALOT
  rationale: רֹאשׁ commonly means 'head' or 'top.' In this nautical image, 'on the
    top of' best conveys precarious elevation.
- source_word: חִבֵּל
  chosen: the rigging
  alternatives:
  - a mast
  - the ropes
  - a ship's mast
  lexicon: HALOT
  rationale: חבל can denote rope, cord, or ship's tackle/rigging in context. Given
    the maritime imagery and the phrase 'top of,' 'rigging' best fits the picture
    of a dangerously exposed place on a ship. Because 'mast' is a common traditional
    rendering and remains plausible, it is preserved in a footnote.
