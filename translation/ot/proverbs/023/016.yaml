id: PRO.23.16
reference: Proverbs 23:16
source:
  edition: WLC
  text: וְ/תַעְלֹ֥זְנָה כִלְיוֹתָ֑/י בְּ/דַבֵּ֥ר שְׂ֝פָתֶ֗י/ךָ מֵישָׁרִֽים׃
translation:
  text: and my inmost being will rejoice when your lips speak what is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'my kidneys,' a Hebrew expression for the inner self or deepest
      emotions.
    reason: cultural_note
  - marker: b
    text: Or 'when your lips speak what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַעְלֹזְנָה
  chosen: will rejoice
  alternatives:
  - will exult
  - will be glad
  lexicon: HALOT
  rationale: The verb עלז denotes exuberant joy or exultation. 'Will rejoice' is natural
    modern English and fits the parental delight context of the surrounding verses,
    while preserving the future sense.
- source_word: כִלְיוֹתַי
  chosen: my inmost being
  alternatives:
  - my kidneys
  - my heart
  - my inward parts
  lexicon: HALOT
  rationale: Literally 'my kidneys,' a Hebrew idiom for the inner self or deepest
    emotions. A literal rendering would be opaque in English, so 'my inmost being'
    conveys the anthropological sense without overinterpreting as merely 'heart.'
- source_word: בְּדַבֵּר
  chosen: when ... speak
  alternatives:
  - in speaking
  - as ... speak
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct commonly introduces a temporal
    sense here: ''when speaking.'' Rendering it as ''when your lips speak'' is idiomatic
    and preserves the syntactic relation.'
- source_word: שְׂפָתֶיךָ
  chosen: your lips
  alternatives:
  - your speech
  - what you say
  lexicon: HALOT
  rationale: The Hebrew uses the concrete image 'your lips.' Retaining 'your lips'
    preserves the poetic diction while remaining clear in English.
- source_word: מֵישָׁרִים
  chosen: what is upright
  alternatives:
  - upright things
  - straight things
  - what is right
  lexicon: HALOT
  rationale: The noun denotes uprightness/straightness, often ethically. 'What is
    upright' captures the moral sense and works smoothly with 'speak.' 'What is right'
    is possible, but 'upright' better reflects the lexical imagery and wisdom context.
