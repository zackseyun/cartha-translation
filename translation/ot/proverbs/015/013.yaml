id: PRO.15.13
reference: Proverbs 15:13
source:
  edition: WLC
  text: לֵ֣ב שָׂ֭מֵחַ יֵיטִ֣ב פָּנִ֑ים וּ/בְ/עַצְּבַת לֵ֝ב ר֣וּחַ נְכֵאָֽה־׃
translation:
  text: A joyful heart makes the face cheerful, but by the sorrow of the heart the
    spirit is crushed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brightens the face.' The Hebrew literally says 'makes good the face,'
      an idiom for improving one's outward expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'a broken spirit' for 'the spirit is crushed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Proverbs, לֵב commonly denotes the inner person, including emotions
    and disposition. 'Heart' is the most natural and established English equivalent
    here, especially in parallel with 'spirit.'
- source_word: שָׂמֵחַ
  chosen: joyful
  alternatives:
  - glad
  - merry
  lexicon: HALOT
  rationale: The adjective describes a state of gladness. 'Joyful' is clear modern
    English and fits wisdom-style generalization without sounding frivolous like 'merry'
    might.
- source_word: יֵיטִב
  chosen: makes ... cheerful
  alternatives:
  - improves
  - does good to
  - brightens
  lexicon: HALOT
  rationale: The Hiphil of יטב means to make good or improve. With 'face' as object,
    the idiomatic sense is that inner joy brightens outward appearance. 'Makes the
    face cheerful' preserves both causation and the concrete image.
- source_word: פָּנִים
  chosen: face
  alternatives:
  - countenance
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, the normal English idiom is singular
    'face.' 'Countenance' is possible but less natural for the target readership.
- source_word: וּבְעַצְּבַת
  chosen: but by the sorrow of
  alternatives:
  - and in grief of
  - but in sadness of
  - but through the pain of
  lexicon: HALOT
  rationale: The conjunction marks the antithetical parallelism, best rendered 'but.'
    The noun עַצֶּב/עַצְּבָה here conveys sorrow, pain, or grief. 'By the sorrow of'
    reflects the prefixed ב and the causal/instrumental sense in context.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: 'Repeated to preserve the Hebrew parallelism: joyful heart / sorrow of
    heart.'
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - inner spirit
  - temper
  lexicon: HALOT
  rationale: Here רוּחַ refers to the person's animating inner disposition rather
    than literal breath or wind. 'Spirit' best preserves the anthropological depth
    of the Hebrew.
- source_word: נְכֵאָה
  chosen: crushed
  alternatives:
  - broken
  - stricken
  - smitten
  lexicon: HALOT
  rationale: The adjective conveys being beaten down or crushed. 'Crushed' is vivid,
    idiomatic, and fits the proverb's contrast with a brightened face.
