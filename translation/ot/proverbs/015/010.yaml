id: PRO.15.10
reference: Proverbs 15:10
source:
  edition: WLC
  text: מוּסָ֣ר רָ֭ע לְ/עֹזֵ֣ב אֹ֑רַח שׂוֹנֵ֖א תוֹכַ֣חַת יָמֽוּת׃
translation:
  text: Harsh discipline is for one who forsakes the path; whoever hates reproof will
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'severe discipline.' The Hebrew adjective can also be rendered 'bad'
      or 'evil,' but here it most likely describes the painful severity of the discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'the way.' The Hebrew uses a common wisdom metaphor for one's moral course
      of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: מוּסָר commonly denotes corrective discipline or instruction. In this
    proverb, paired with 'harsh' and followed by the consequence for hating reproof,
    the corrective/punitive nuance is prominent, so 'discipline' best fits.
- source_word: רָע
  chosen: harsh
  alternatives:
  - evil
  - bad
  - severe
  lexicon: HALOT
  rationale: Although the adjective can mean 'evil' or 'bad,' in context it describes
    the quality of the discipline awaiting the one who abandons the right way. English
    'harsh' or 'severe' captures the experiential force better than the morally loaded
    'evil.' 'Harsh' is more idiomatic here.
- source_word: לְעֹזֵב
  chosen: for one who forsakes
  alternatives:
  - for him who leaves
  - belongs to the one abandoning
  lexicon: HALOT
  rationale: 'The preposition ל marks relation or destination (''for''), and the participle
    עֹזֵב denotes an ongoing characteristic: one who abandons/forsakes. ''Forsakes''
    preserves the moral weight of leaving the proper course.'
- source_word: אֹרַח
  chosen: the path
  alternatives:
  - the way
  - the course
  lexicon: HALOT
  rationale: אֹרַח in wisdom literature often metaphorically denotes one's moral course
    of life. 'Path' is a natural English equivalent and preserves the wisdom metaphor.
- source_word: שׂוֹנֵא
  chosen: whoever hates
  alternatives:
  - the one hating
  - he who hates
  lexicon: HALOT
  rationale: The participle functions generically. 'Whoever hates' renders the gnomic
    force in clear modern English while preserving the representative masculine sense
    without over-literal awkwardness.
- source_word: תוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: תוֹכַחַת is verbal correction or rebuke. 'Reproof' fits wisdom-register
    English and pairs well with 'discipline' without collapsing the distinction between
    the two Hebrew terms.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - dies
  - shall die
  lexicon: HALOT
  rationale: The imperfect here expresses a general future/result in proverbial style.
    'Will die' is straightforward modern English and preserves the severity of the
    warning.
