theological_decisions:
- issue: Nature of the death threatened in the proverb
  chosen_reading: Rendered simply as 'will die' without specifying physical, moral,
    or ultimate death.
  alternative_readings:
  - will come to ruin
  - will die physically
  - will perish
  rationale: The Hebrew verb מות is broad, and the proverb does not explicitly define
    the mode of death. To preserve theological and interpretive tension, the translation
    keeps the plain term 'die' rather than resolving it into a narrower interpretive
    paraphrase such as 'come to ruin.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
