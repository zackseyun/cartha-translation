id: PRO.15.28
reference: Proverbs 15:28
source:
  edition: WLC
  text: לֵ֣ב צַ֭דִּיק יֶהְגֶּ֣ה לַ/עֲנ֑וֹת וּ/פִ֥י רְ֝שָׁעִ֗ים יַבִּ֥יעַ רָעֽוֹת׃
translation:
  text: The heart of the righteous considers how to answer, but the mouth of the wicked
    pours out evil things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meditates before answering.' The Hebrew verb can carry the sense of
      musing or pondering, and the phrase may be rendered more formally as 'ponders
      to answer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, 'heart' commonly denotes the inner person,
    including thought and deliberation. 'Heart' preserves the Hebrew imagery while
    still making sense in English.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The adjective functions substantivally for a representative righteous
    person. 'The righteous' is concise, natural, and preserves the generic force without
    over-specifying gender.
- source_word: יֶהְגֶּה
  chosen: considers
  alternatives:
  - meditates
  - ponders
  - thinks
  lexicon: HALOT
  rationale: The verb can denote musing, meditating, or thoughtful utterance. In this
    context, paired with 'to answer,' it refers to careful prior reflection before
    speaking. 'Considers' captures that sense in readable English.
- source_word: לַעֲנוֹת
  chosen: how to answer
  alternatives:
  - to answer
  - what to answer
  lexicon: HALOT
  rationale: 'The infinitive with prefixed ל marks purpose or relation: the righteous
    heart reflects with a view toward giving an answer. English idiom is improved
    by supplying ''how,'' which expresses deliberation without adding content foreign
    to the Hebrew.'
- source_word: וּפִי
  chosen: but the mouth
  alternatives:
  - and the mouth
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but in this antithetical proverb the
    sense is adversative. Rendering it 'but' communicates the contrast natural to
    Hebrew parallelism.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: The plural adjective is used substantivally. 'The wicked' is the standard
    concise rendering and matches the generic class contrast with 'the righteous.'
- source_word: יַבִּיעַ
  chosen: pours out
  alternatives:
  - bubbles forth
  - utters abundantly
  - gushes out
  lexicon: HALOT
  rationale: The Hiphil conveys causing something to gush or pour forth. 'Pours out'
    is vivid, idiomatic, and fits the image of uncontrolled speech.
- source_word: רָעוֹת
  chosen: evil things
  alternatives:
  - evil
  - wicked things
  - harmful things
  lexicon: HALOT
  rationale: The plural noun refers to evil matters or harmful speech. 'Evil things'
    preserves the plural and avoids narrowing the sense to either moral evil alone
    or merely harmful consequences.
