id: PRO.15.19
reference: Proverbs 15:19
source:
  edition: WLC
  text: דֶּ֣רֶךְ עָ֭צֵל כִּ/מְשֻׂ֣כַת חָ֑דֶק וְ/אֹ֖רַח יְשָׁרִ֣ים סְלֻלָֽה׃
translation:
  text: The way of the lazy is like a hedge of thorns, but the path of the upright
    is a raised highway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the path of the upright is level/smooth.' The Hebrew term can emphasize
      a built-up roadway and, by extension, an unobstructed course.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - road
  - path
  lexicon: HALOT
  rationale: Common metaphorical term for one's course of life or conduct. 'Way' preserves
    the proverbial and moral sense better than the more concrete 'road.'
- source_word: עָצֵל
  chosen: the lazy
  alternatives:
  - the sluggard
  - a lazy person
  lexicon: HALOT
  rationale: Refers to a habitually lazy person. 'The lazy' is natural modern English
    and preserves the generic singular force without archaic tone; 'sluggard' is traditional
    but less accessible.
- source_word: כִּמְשֻׂכַת
  chosen: is like a hedge
  alternatives:
  - is like a barrier
  - is like a fence
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). The noun from שׂוך/שׂוכה
    denotes a hedge or enclosing barrier. 'Hedge' fits the image and keeps the simile
    compact.
- source_word: חָדֶק
  chosen: of thorns
  alternatives:
  - of briars
  - thornbush
  lexicon: HALOT
  rationale: Denotes thorny growth or thornbush. 'Of thorns' is idiomatic in English
    and conveys an obstructive, painful barrier.
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: A near-synonym of דֶּרֶךְ, but rendered 'path' here for readable variation
    while preserving the same metaphorical field. The distinction is stylistic, not
    theological.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the righteous
  lexicon: HALOT
  rationale: Describes morally straight/upright people. 'The upright' best captures
    the ethical sense without over-specifying as forensic 'righteous.'
- source_word: סְלֻלָה
  chosen: is a raised highway
  alternatives:
  - is level
  - is built up
  - is a highway
  lexicon: HALOT
  rationale: Passive participial/adjectival form from סלל, 'to heap up, build up,
    cast up a road.' The image is not merely smoothness but an elevated, prepared
    roadway. 'Raised highway' preserves the concrete picture behind the metaphor better
    than simply 'level'.
