id: PRO.15.25
reference: Proverbs 15:25
source:
  edition: WLC
  text: בֵּ֣ית גֵּ֭אִים יִסַּ֥ח יְהוָ֑ה וְ֝/יַצֵּ֗ב גְּב֣וּל אַלְמָנָֽה׀׃
translation:
  text: Yahweh tears down the house of the proud, but he sets firm the boundary of the widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uproots the house of the proud.' The Hebrew verb can carry the sense of removing or uprooting, not only demolishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'establishes the widow's boundary line' or 'landmark.' The image is of the LORD protecting the property rights of the vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  chosen: house of
  alternatives:
  - household of
  lexicon: HALOT
  rationale: Construct form meaning 'house of.' In Proverbs this can denote a physical house or a household/dynasty; here 'house of the proud' preserves the concrete image while allowing the broader sense of one's estate.
- source_word: גֵּאִים
  chosen: the proud
  alternatives:
  - the arrogant
  - the exalted
  lexicon: HALOT
  rationale: Refers to haughty or arrogant people, not merely socially elevated persons. 'The proud' is idiomatic and fits wisdom-literature contrast.
- source_word: יִסַּח
  chosen: tears down
  alternatives:
  - uproots
  - pulls away
  - sweeps away
  lexicon: HALOT
  rationale: The verb conveys removing or tearing away. With 'house' as object, 'tears down' gives a natural English equivalent that preserves the destructive force better than a weaker 'removes.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיַצֵּב
  chosen: but he sets firm
  alternatives:
  - and he establishes
  - and he sets up
  lexicon: HALOT
  rationale: Hiphil of יצב means to set, establish, make firm. The conjunction is rendered adversatively ('but') because the proverb contrasts divine judgment on the proud with protection for the widow.
- source_word: גְּב֣וּל
  chosen: the boundary
  alternatives:
  - the boundary line
  - the landmark
  - the territory
  lexicon: HALOT
  rationale: Basic sense is boundary or border. 'Boundary' is broad enough to include a property line and fits the legal-protective sense in context.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Singular collective/representative use is common in wisdom literature. 'The widow' preserves the class-representative force and the vulnerable social category in view.
