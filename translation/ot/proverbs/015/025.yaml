theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the conjunction ו before יַצֵּב
  chosen_reading: but
  alternative_readings:
  - and
  rationale: 'Although the Hebrew conjunction is formally ''and,'' the proverb''s parallelism is antithetical: destruction of the proud is contrasted with establishment of the widow''s boundary. Rendering it as ''but'' communicates the discourse function without adding content.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
