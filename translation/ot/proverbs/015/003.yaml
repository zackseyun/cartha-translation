id: PRO.15.3
reference: Proverbs 15:3
source:
  edition: WLC
  text: בְּֽ/כָל מָ֭קוֹם עֵינֵ֣י יְהוָ֑ה צֹ֝פ֗וֹת רָעִ֥ים ו/טוֹבִֽים־׃
translation:
  text: In every place the eyes of the LORD are watching the evil and the good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל מָקוֹם
  chosen: In every place
  alternatives:
  - Everywhere
  - In every location
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the distributive sense of 'in every
    place.' 'Everywhere' is idiomatic English, but 'in every place' better reflects
    the Hebrew phrasing while remaining natural.
- source_word: עֵינֵי יְהוָה
  chosen: the eyes of the LORD
  alternatives:
  - the LORD's eyes
  lexicon: HALOT
  rationale: This keeps the Hebrew construct relationship explicit and preserves the
    anthropomorphic imagery. יְהוָה is rendered 'the LORD' per doctrine guidance for
    the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צֹפוֹת
  chosen: are watching
  alternatives:
  - keep watch on
  - observe
  - are keeping watch
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'Are watching' communicates continuous
    observation in readable modern English without overstating the nuance. 'Keep watch
    on' is possible, but can suggest guarding rather than simply observing.
- source_word: רָעִים וְטוֹבִים
  chosen: the evil and the good
  alternatives:
  - evil people and good people
  - the wicked and the good
  lexicon: HALOT
  rationale: The adjectives are substantival here, referring to persons characterized
    as evil or good. 'The evil and the good' preserves the concise parallelism of
    the proverb. 'The wicked' is possible for רָעִים, but 'evil' stays closer lexically
    and balances with 'good'.
