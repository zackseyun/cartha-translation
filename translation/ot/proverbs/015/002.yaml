id: PRO.15.2
reference: Proverbs 15:2
source:
  edition: WLC
  text: לְשׁ֣וֹן חֲ֭כָמִים תֵּיטִ֣יב דָּ֑עַת וּ/פִ֥י כְ֝סִילִ֗ים יַבִּ֥יעַ אִוֶּֽלֶת׃
translation:
  text: The tongue of the wise makes knowledge good, but the mouth of fools pours
    out folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uses knowledge well,' 'adorns knowledge,' or 'makes knowledge attractive.'
      The Hebrew verb is causative ('makes good') and may refer either to the wise
      person's beneficial use of knowledge or to presenting it well.
    reason: lexical_alternative
  - marker: b
    text: Or 'bubbles forth' or 'gushes out.' The Hebrew verb pictures something spilling
      out in abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Rendered literally as 'tongue' to preserve the proverb's concrete body-part
    imagery for speech, which is common in Hebrew wisdom literature. 'Speech' is a
    possible dynamic alternative but is less vivid.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - wise people
  lexicon: HALOT
  rationale: Substantival plural adjective rendered as 'the wise.' This preserves
    the class/category sense without over-specifying gender. 'Wise men' would be more
    formally gendered, but the proverb addresses a representative class rather than
    males specifically.
- source_word: תֵּיטִיב
  chosen: makes ... good
  alternatives:
  - adorns
  - improves
  - uses well
  lexicon: HALOT
  rationale: Hiphil of יטב conveys causing something to be good or making good use
    of it. 'Makes ... good' is transparent to the Hebrew and preserves the causative
    force. In context it means the wise person's speech presents knowledge well or
    beneficially.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Standard rendering of דעת in wisdom literature. 'Knowledge' fits the
    contrast with 'folly' and keeps the proverb's epistemic emphasis.
- source_word: וּפִי
  chosen: but the mouth
  alternatives:
  - and the mouth
  lexicon: HALOT
  rationale: The conjunction waw is rendered adversatively as 'but' because the second
    colon sharply contrasts the first, which is idiomatic in English and faithful
    to Hebrew poetic parallelism. 'Mouth' is retained literally to match the imagery
    of 'tongue' in the first colon.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard wisdom-term rendering. 'Fools' is concise and idiomatic in Proverbs,
    preserving the moral-intellectual category signaled by כסילים.
- source_word: יַבִּיעַ
  chosen: pours out
  alternatives:
  - bubbles forth
  - utters abundantly
  - gushes out
  lexicon: HALOT
  rationale: The verb denotes gushing or pouring forth. 'Pours out' is natural modern
    English and preserves the image of uncontrolled abundance, fitting the negative
    portrayal of foolish speech.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: Standard rendering in Proverbs for the abstract quality or expression
    of the fool. 'Folly' is concise and stylistically fitting for wisdom literature.
