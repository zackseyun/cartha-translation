id: PRO.15.5
reference: Proverbs 15:5
source:
  edition: WLC
  text: אֱוִ֗יל יִ֭נְאַץ מוּסַ֣ר אָבִ֑י/ו וְ/שֹׁמֵ֖ר תּוֹכַ֣חַת יַעְרִֽם׃
translation:
  text: A fool despises his father's discipline, but whoever heeds reproof is prudent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but he who keeps/observes reproof becomes shrewd.' The Hebrew verb behind
      'heeds' is literally 'keeps' or 'guards,' and the final verb can carry the sense
      'becomes prudent' or 'shows shrewdness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - a foolish man
  - a dullard
  lexicon: HALOT
  rationale: Common wisdom-term for a morally and practically foolish person, not
    merely someone lacking intelligence. 'A fool' is idiomatic and preserves the proverb's
    categorical contrast.
- source_word: יִנְאַץ
  chosen: despises
  alternatives:
  - spurns
  - rejects
  lexicon: HALOT
  rationale: The verb conveys contemptuous rejection, stronger than simple refusal.
    'Despises' captures both the emotional disdain and practical dismissal.
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: In Proverbs this term often includes formative correction and training,
    not mere information transfer. 'Discipline' best reflects the parental wisdom
    context.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his parent
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his father,' and the translation follows
    the gender-accurate principle rather than neutralizing the term.
- source_word: וְשֹׁמֵר
  chosen: whoever heeds
  alternatives:
  - but one who keeps
  - but he who listens to
  lexicon: HALOT
  rationale: Literally 'keeps/guards,' but in this wisdom context the sense is to
    observe or heed instruction. 'Whoever heeds' gives natural English while preserving
    the active responsiveness implied by the Hebrew participle.
- source_word: תּוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: This noun denotes verbal correction or rebuke. 'Reproof' fits the wisdom-register
    and pairs well with 'heeds.'
- source_word: יַעְרִם
  chosen: is prudent
  alternatives:
  - becomes shrewd
  - acts wisely
  lexicon: HALOT
  rationale: The verb is related to becoming or showing prudence/shrewdness. In English,
    'is prudent' communicates the resulting wise disposition without suggesting sinful
    cunning.
