id: PRO.15.17
reference: Proverbs 15:17
source:
  edition: WLC
  text: ט֤וֹב אֲרֻחַ֣ת יָ֭רָק וְ/אַהֲבָה שָׁ֑ם מִ/שּׁ֥וֹר אָ֝ב֗וּס וְ/שִׂנְאָה בֽ/וֹ־־׃
translation:
  text: Better is a meal of vegetables where there is love than a fattened ox with
    hatred in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than an ox from the stall'; the Hebrew expression can emphasize either
      stall-feeding or the resulting fattened condition.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and hatred in it,' likely referring to the meal or household
      setting being marked by hatred.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Better
  - It is better
  lexicon: HALOT
  rationale: In a comparative proverb with מִן, טוֹב functions idiomatically as 'better
    (is) ... than ...'. Supplying 'is' yields natural English while preserving the
    Hebrew comparison.
- source_word: אֲרֻחַת
  chosen: a meal of
  alternatives:
  - a portion of
  - a dinner of
  lexicon: HALOT
  rationale: The noun denotes a meal or portion of food, not merely the food item
    itself. 'A meal of' best captures the domestic table setting of the proverb.
- source_word: יָרָק
  chosen: vegetables
  alternatives:
  - greens
  - herbs
  lexicon: HALOT
  rationale: The word refers broadly to green plants/vegetables used for food. 'Vegetables'
    is clear modern English; 'herbs' could sound too narrow, and 'greens' too colloquial.
- source_word: וְאַהֲבָה שָׁם
  chosen: where there is love
  alternatives:
  - and love is there
  - with love there
  lexicon: HALOT
  rationale: The Hebrew literally says 'and love there.' Rendering it as 'where there
    is love' expresses the locative sense of שָׁם naturally in English and ties the
    quality of the household to the meal.
- source_word: מִשּׁוֹר אָבוּס
  chosen: than a fattened ox
  alternatives:
  - than an ox from the stall
  - than a stall-fed ox
  lexicon: HALOT
  rationale: שׁוֹר is 'ox,' and אָבוּס describes an animal that has been fattened/stall-fed.
    'Fattened ox' communicates abundance and luxury more idiomatically than the more
    wooden 'ox from the stall.'
- source_word: וְשִׂנְאָה בוֹ
  chosen: with hatred in it
  alternatives:
  - where there is hatred
  - and hatred with it
  - with hatred there
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'in it' or 'with it,' referring
    to the setting/meal/household. 'With hatred in it' preserves the compact Hebrew
    image that hostility permeates the feast.
