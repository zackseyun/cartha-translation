id: PRO.15.23
reference: Proverbs 15:23
source:
  edition: WLC
  text: שִׂמְחָ֣ה לָ֭/אִישׁ בְּ/מַעֲנֵה פִ֑י/ו וְ/דָבָ֖ר בְּ/עִתּ֣/וֹ מַה טּֽוֹב־־׃
translation:
  text: A man has joy in the answer of his mouth, and a word in its time—how good
    it is!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a man there is joy in an answer from his mouth.' The Hebrew construction
      can be rendered more formally, but the main text expresses the sense in natural
      English.
    reason: lexical_alternative
  - marker: b
    text: Or 'a word at the right time' or 'a word in season.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes gladness or joy. 'Joy' is concise, natural English and
    fits the proverb's statement about the satisfaction produced by a fitting reply.
- source_word: לָאִישׁ
  chosen: a man
  alternatives:
  - a person
  - for a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine. Per the translation philosophy, the masculine
    form is preserved where it carries representative force. The prefixed ל marks
    possession/advantage here; in idiomatic English this is best expressed as 'A man
    has...' rather than a wooden 'To a man...'.
- source_word: בְּמַעֲנֵה
  chosen: in the answer
  alternatives:
  - by the answer
  - with the answer
  - in a reply
  lexicon: HALOT
  rationale: מַעֲנֶה refers to an answer or response. The preposition ב here is taken
    in a contextual/instrumental sense tied to the source construction; 'in the answer'
    preserves the Hebrew flavor while remaining intelligible.
- source_word: פִיו
  chosen: of his mouth
  alternatives:
  - from his mouth
  - he gives
  lexicon: HALOT
  rationale: Literally 'his mouth.' Retaining the body-part expression preserves the
    Hebrew idiom and the proverb's focus on spoken response, rather than paraphrasing
    to a more abstract subject.
- source_word: וְדָבָר
  chosen: and a word
  alternatives:
  - and a matter
  - and a saying
  lexicon: HALOT
  rationale: דָבָר has a broad semantic range, but in this parallel line it most naturally
    refers to a spoken word or utterance. 'Word' keeps the parallel with 'answer of
    his mouth.'
- source_word: בְּעִתּוֹ
  chosen: in its time
  alternatives:
  - at the right time
  - in season
  lexicon: HALOT
  rationale: Literally 'in its time.' This can imply appropriateness or timeliness.
    The more literal rendering is kept in the main text, while the idiomatic sense
    is clear from context.
- source_word: מַה־טּוֹב
  chosen: how good it is
  alternatives:
  - how good
  - what goodness
  lexicon: HALOT
  rationale: An exclamatory expression praising the value of the timely word. 'How
    good it is!' gives natural English force while reflecting the Hebrew exclamation.
