id: PRO.15.6
reference: Proverbs 15:6
source:
  edition: WLC
  text: בֵּ֣ית צַ֭דִּיק חֹ֣סֶן רָ֑ב וּ/בִ/תְבוּאַ֖ת רָשָׁ֣ע נֶעְכָּֽרֶת׃
translation:
  text: In the house of the righteous there is great wealth, but in the income of
    the wicked there is trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'produce,' 'harvest,' or 'revenue' of the wicked.
    reason: lexical_alternative
  - marker: b
    text: Or 'it is ruined/disturbed'; the Hebrew verb can express trouble, disturbance,
      or ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  chosen: house
  alternatives:
  - household
  - home
  lexicon: HALOT
  rationale: Construct form with צַדִּיק, denoting the house/estate of the righteous
    person. 'House' preserves the concrete image and can naturally imply household
    possessions and condition.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: Used substantivally for a righteous person in proverbial contrast with
    רָשָׁע. 'The righteous' is idiomatic in English and preserves the representative/generic
    singular force without over-specifying gender.
- source_word: חֹסֶן
  chosen: wealth
  alternatives:
  - treasure
  - riches
  - security
  lexicon: HALOT
  rationale: The noun can denote wealth, treasure, or resources. In this antithetical
    proverb, paired with agricultural/economic תְבוּאָה, 'wealth' best captures material
    abundance in the righteous person's house.
- source_word: רָב
  chosen: great
  alternatives:
  - much
  - abundant
  lexicon: HALOT
  rationale: Modifies חֹסֶן to indicate abundance. 'Great wealth' is natural English
    and preserves the sense of largeness/abundance.
- source_word: וּבִתְבוּאַת
  chosen: but in the income of
  alternatives:
  - and in the produce of
  - but in the harvest of
  - but in the revenue of
  lexicon: HALOT
  rationale: The prefixed conjunction here is adversative in sense because of the
    proverb's contrast. תְבוּאָה often means produce/yield, but in wisdom literature
    it can extend to income or revenue more generally. 'Income' communicates the economic
    result in contemporary English while preserving the contrast with the righteous
    person's wealth.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: Substantival adjective in antithesis to צַדִּיק. 'The wicked' is the
    standard and natural rendering for the representative singular.
- source_word: נֶעְכָּרֶת
  chosen: there is trouble
  alternatives:
  - it is troubled
  - it is ruined
  - it is disturbed
  lexicon: HALOT
  rationale: From עכר, conveying disturbance, trouble, or bringing into ruin. In this
    context the sense is that the wicked person's income is attended by trouble/disaster.
    Rendering existentially as 'there is trouble' produces clear English while reflecting
    the predicate force of the Hebrew.
