id: PRO.15.18
reference: Proverbs 15:18
source:
  edition: WLC
  text: אִ֣ישׁ חֵ֭מָה יְגָרֶ֣ה מָד֑וֹן וְ/אֶ֥רֶך אַ֝פַּ֗יִם יַשְׁקִ֥יט רִֽיב׃
translation:
  text: A hot-tempered man stirs up strife, but one who is slow to anger quiets a
    dispute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A man of wrath provokes contention.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'long of nostrils,' a Hebrew idiom for being slow to anger.
    reason: cultural_note
  - marker: c
    text: Or 'calms a quarrel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and here introduces a representative
    type in a proverb. Per the project's gender-accurate philosophy, 'man' preserves
    the source form and proverbial style.
- source_word: חֵמָה
  chosen: hot-tempered
  alternatives:
  - wrath
  - rage
  - furious
  lexicon: HALOT
  rationale: Literally the noun denotes heat/wrath. In construct with אִישׁ it describes
    a character type, so the adjectival English 'hot-tempered' best conveys the idiomatic
    sense in natural modern English.
- source_word: יְגָרֶה
  chosen: stirs up
  alternatives:
  - provokes
  - incites
  lexicon: HALOT
  rationale: The Piel of גרה commonly carries the sense of stirring up or provoking.
    'Stirs up' is vivid, idiomatic, and fits the wisdom context.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - contention
  - quarreling
  lexicon: HALOT
  rationale: A common wisdom-term for contention or discord. 'Strife' is concise and
    idiomatic in English proverbial style.
- source_word: אֶרֶך אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  - long-tempered
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'long of nostrils/faces' and denotes
    forbearance in anger. 'Slow to anger' is the standard transparent equivalent and
    preserves the semantic link to anger more clearly than the broader 'patient'.
- source_word: יַשְׁקִיט
  chosen: quiets
  alternatives:
  - calms
  - stills
  - pacifies
  lexicon: HALOT
  rationale: The Hiphil of שקט means to cause quiet or calm. 'Quiets' mirrors the
    causative force while remaining natural English.
- source_word: רִיב
  chosen: dispute
  alternatives:
  - quarrel
  - contention
  - lawsuit
  lexicon: HALOT
  rationale: The noun can refer broadly to a dispute, quarrel, or legal contention.
    Here, parallel to מָדוֹן, 'dispute' fits the interpersonal wisdom setting without
    over-specifying a legal context.
