theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implication of divine 'distance' from the wicked
  chosen_reading: The verse states relational distance and refusal of favorable regard, not absolute absence or ignorance.
  alternative_readings:
  - God is spatially absent from the wicked
  - God cannot hear the wicked at all in any sense
  rationale: The Hebrew adjective 'far' in wisdom literature communicates moral-relational separation. The second colon clarifies the contrast by speaking of hearing the righteous, so the translation should not overstate the first colon into metaphysical absence or inability.
