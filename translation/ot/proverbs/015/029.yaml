id: PRO.15.29
reference: Proverbs 15:29
source:
  edition: WLC
  text: רָח֣וֹק יְ֭הוָה מֵ/רְשָׁעִ֑ים וּ/תְפִלַּ֖ת צַדִּיקִ֣ים יִשְׁמָֽע׃
translation:
  text: Yahweh is far from the wicked, but he hears the prayer of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; rendered ''the LORD'' following the translation''s standard practice for the divine name.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָחוֹק
  chosen: far from
  alternatives:
  - distant from
  - remote from
  lexicon: HALOT
  rationale: Predicate adjective expressing relational distance, not spatial geography alone. 'Far from' is idiomatic and preserves the proverb's moral-relational contrast.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵרְשָׁעִים
  chosen: from the wicked
  alternatives:
  - from wicked people
  - from the guilty
  lexicon: HALOT
  rationale: רְשָׁעִים denotes morally wicked persons, not merely those declared guilty in a forensic sense. 'The wicked' is concise, natural, and preserves the class designation.
- source_word: וּתְפִלַּת
  chosen: but he hears the prayer
  alternatives:
  - and the prayer
  - while the prayer
  lexicon: HALOT
  rationale: The conjunction links the second colon antithetically in sense, though simple waw is used. English 'but' best conveys the proverb's contrast. 'Prayer' is the straightforward rendering of תְּפִלָּה.
- source_word: צַדִּיקִים
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: HALOT
  rationale: צַדִּיקִים refers to those characterized by righteousness. 'The righteous' is the standard and most natural class term in wisdom literature.
- source_word: יִשְׁמָע
  chosen: he hears
  alternatives:
  - he listens to
  - he answers
  lexicon: HALOT
  rationale: שׁמע literally means 'hear/listen.' In prayer contexts it can imply favorable attention, but 'he hears' preserves the lexical form without over-interpreting it as automatic answer.
