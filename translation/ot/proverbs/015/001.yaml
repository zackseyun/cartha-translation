id: PRO.15.1
reference: Proverbs 15:1
source:
  edition: WLC
  text: מַֽעֲנֶה רַּ֭ךְ יָשִׁ֣יב חֵמָ֑ה וּ/דְבַר עֶ֝֗צֶב יַעֲלֶה אָֽף־־־׃
translation:
  text: A gentle answer turns away wrath, but a painful word stirs up anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a hurtful word' or 'a harsh word.' The Hebrew phrase literally means
      'a word of pain/grief,' which can describe speech that causes hurt and so provokes
      anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲנֶה
  chosen: answer
  alternatives:
  - response
  - reply
  lexicon: HALOT
  rationale: The noun denotes an answer or response given to speech. 'Answer' is the
    most natural and concise English equivalent in a proverb about verbal exchange.
- source_word: רַּךְ
  chosen: gentle
  alternatives:
  - soft
  - tender
  lexicon: HALOT
  rationale: The adjective means soft or gentle. 'Gentle' communicates the interpersonal
    sense in idiomatic modern English better than the more literal 'soft,' while preserving
    the contrast with the harsh second line.
- source_word: יָשִׁיב
  chosen: turns away
  alternatives:
  - turns back
  - restores
  lexicon: HALOT
  rationale: Hiphil of שוב here carries the causative sense of turning something back
    or away. With wrath as object, 'turns away' best captures the idiom of defusing
    anger.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - heat
  lexicon: HALOT
  rationale: The noun denotes burning anger or wrath. 'Wrath' preserves the intensity
    and fits the proverb's elevated but still readable style.
- source_word: דְבַר
  chosen: word
  alternatives:
  - speech
  - statement
  - matter
  lexicon: HALOT
  rationale: In construct with עֶצֶב, the phrase refers to a spoken word or utterance.
    'Word' is concise and idiomatic in English proverbial style.
- source_word: עֶצֶב
  chosen: painful
  alternatives:
  - grievous
  - hurtful
  - harsh
  lexicon: HALOT
  rationale: The noun can denote pain, hurt, or something causing grief. 'Painful'
    preserves the core sense of causing pain without overinterpreting it as merely
    tonal harshness; it also keeps the semantic contrast with 'gentle.'
- source_word: יַעֲלֶה
  chosen: stirs up
  alternatives:
  - raises
  - brings up
  - causes to rise
  lexicon: HALOT
  rationale: Hiphil of עלה literally means causes to go up. In context with anger,
    the idiomatic sense is to arouse or stir up. 'Stirs up' is natural English and
    preserves the causative force.
- source_word: אָף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Though literally 'nose,' the noun commonly functions idiomatically for
    anger. Here 'anger' is the plain sense. Using 'anger' also avoids awkward literalism
    while maintaining the parallel with חֵמָה.
