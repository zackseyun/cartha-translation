id: PRO.15.33
reference: Proverbs 15:33
source:
  edition: WLC
  text: יִרְאַ֣ת יְ֭הוָה מוּסַ֣ר חָכְמָ֑ה וְ/לִ/פְנֵ֖י כָב֣וֹד עֲנָוָֽה׃
translation:
  text: The fear of the LORD is instruction in wisdom, and humility comes before honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The fear of the LORD is the discipline of wisdom.' The Hebrew term for
      'instruction' can also carry the sense of corrective discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: Construct phrase meaning reverent fear directed toward YHWH. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than a transliteration. 'Fear' is retained
    rather than softened to 'reverence' because the Hebrew term regularly carries
    the fuller sense of awe-filled fear in wisdom literature.
- source_word: מוּסַר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסַר in Proverbs often includes formative discipline or instruction.
    Here 'instruction' fits the predicate relation with 'wisdom' and reads naturally
    in English, while still allowing the disciplinary nuance.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs; no contextual reason to vary.
- source_word: וְלִפְנֵי
  chosen: and before
  alternatives:
  - and in the presence of
  - and preceding
  lexicon: HALOT
  rationale: The preposition marks temporal or logical precedence. In this proverb
    it introduces the sequence that humility precedes honor.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In wisdom context referring to social exaltation or esteem, 'honor' is
    more idiomatic than 'glory' and best matches the proverb's ethical contrast.
- source_word: עֲנָוָה
  chosen: humility comes
  alternatives:
  - humility is
  - lowliness comes
  lexicon: HALOT
  rationale: The noun means humility or lowliness. Because the Hebrew second colon
    is verbless, English supplies a copular or existential sense. 'Humility comes
    before honor' is idiomatic and captures the proverb's sequence without overtranslating.
