id: PRO.15.22
reference: Proverbs 15:22
source:
  edition: WLC
  text: הָפֵ֣ר מַ֭חֲשָׁבוֹת בְּ/אֵ֣ין ס֑וֹד וּ/בְ/רֹ֖ב יוֹעֲצִ֣ים תָּקֽוּם׃
translation:
  text: Plans fail for lack of counsel, but with many advisers they stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Plans are frustrated without deliberation, but with many advisers they
      are established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפֵר
  chosen: fail
  alternatives:
  - are frustrated
  - are broken
  - come to nothing
  lexicon: HALOT
  rationale: From פרר in the Hiphil, the sense is causative breaking/frustrating.
    In English, with 'plans' as subject, 'fail' gives the natural result sense without
    over-literal awkwardness. 'Are frustrated' is possible, but 'fail' is clearer
    modern English.
- source_word: מַחֲשָׁבוֹת
  chosen: plans
  alternatives:
  - thoughts
  - purposes
  - intentions
  lexicon: HALOT
  rationale: Though the noun can mean 'thoughts,' in wisdom context with succeeding
    reference to advisers and establishment, it refers to deliberated plans or purposes
    rather than mere internal thoughts.
- source_word: בְּאֵין
  chosen: for lack of
  alternatives:
  - without
  - when there is no
  lexicon: HALOT
  rationale: The preposition with אֵין expresses absence. 'For lack of' idiomatically
    conveys the causal force in English better than the more wooden 'without' in this
    proverb.
- source_word: סוֹד
  chosen: counsel
  alternatives:
  - confidential counsel
  - deliberation
  - secret counsel
  lexicon: HALOT
  rationale: סוֹד can denote confidential conversation, council, or intimate deliberation.
    Here the contrast with 'many advisers' points to counsel/deliberation rather than
    secrecy as such. 'Counsel' best captures the practical wisdom setting.
- source_word: וּבְרֹב
  chosen: but with many
  alternatives:
  - and in the abundance of
  - and with a multitude of
  lexicon: HALOT
  rationale: The conjunction marks contrast with the first colon, and רֹב denotes
    abundance/multiplicity. 'But with many' is concise and idiomatic while preserving
    the antithetical parallelism.
- source_word: יוֹעֲצִים
  chosen: advisers
  alternatives:
  - counselors
  - those who give counsel
  lexicon: HALOT
  rationale: Active participle from יעץ, referring to people who give advice. 'Advisers'
    is readable modern English and fits the wisdom context.
- source_word: תָּקוּם
  chosen: they stand
  alternatives:
  - they are established
  - it stands
  - it is established
  lexicon: HALOT
  rationale: From קום, 'stand' or 'be established.' The feminine singular verb formally
    agrees with a collective/understood singular notion, but English naturally resumes
    the plural 'plans' from the first colon as 'they stand.' This preserves the proverb's
    sense in idiomatic English. 'Are established' is slightly more interpretive but
    worth preserving as an alternative.
