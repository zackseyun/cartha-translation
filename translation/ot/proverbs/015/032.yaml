id: PRO.15.32
reference: Proverbs 15:32
source:
  edition: WLC
  text: פּוֹרֵ֣עַ מ֭וּסָר מוֹאֵ֣ס נַפְשׁ֑/וֹ וְ/שׁוֹמֵ֥עַ תּ֝וֹכַ֗חַת ק֣וֹנֶה לֵּֽב׃
translation:
  text: Whoever ignores discipline despises himself, but he who listens to reproof
    gains understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''acquires heart,'' with ''heart'' referring to the inner seat
      of thought and discernment; that is, understanding or sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹרֵעַ
  chosen: ignores
  alternatives:
  - rejects
  - neglects
  - casts off
  lexicon: HALOT
  rationale: The participle from פרע in this context conveys letting discipline go
    or refusing its restraint. 'Ignores' gives clear modern English and fits the wisdom
    contrast, without over-paraphrasing. 'Rejects' is possible but slightly stronger;
    'casts off' is more literal but less natural here.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs commonly denotes formative discipline or instruction
    with corrective force. 'Discipline' best preserves that semantic range in wisdom
    literature.
- source_word: מוֹאֵס
  chosen: despises
  alternatives:
  - rejects
  - spurns
  lexicon: HALOT
  rationale: The verb מאס regularly means to reject or despise. 'Despises' fits the
    moral force of the proverb and pairs well with the reflexive object.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  lexicon: HALOT
  rationale: נפש can mean soul, self, or life. In this proverb the sense is reflexive
    and practical rather than anthropological. 'Himself' communicates the idiom naturally
    in English while preserving the point that the person harms his own self.
- source_word: שׁוֹמֵעַ
  chosen: listens to
  alternatives:
  - hears
  - obeys
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here 'listens
    to' preserves receptivity to correction without importing full obedience beyond
    the text.
- source_word: תּוֹכַחַת
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: תּוֹכַחַת denotes verbal correction or rebuke. 'Reproof' is concise and
    suitably weighty in a wisdom context.
- source_word: קֹנֶה
  chosen: gains
  alternatives:
  - acquires
  - gets
  lexicon: HALOT
  rationale: The verb קנה literally means acquire or gain. 'Gains' is idiomatic with
    the abstract object in English and preserves the metaphor of obtaining something
    valuable.
- source_word: לֵּב
  chosen: understanding
  alternatives:
  - heart
  - sense
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the center of thought and discernment,
    not merely emotion. In this proverb, the idiom 'acquires heart' means gaining
    sense or understanding. Rendering it as 'understanding' communicates the intended
    meaning clearly in modern English; the more literal 'heart' is preserved in a
    footnote.
