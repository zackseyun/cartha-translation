id: PRO.15.26
reference: Proverbs 15:26
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה מַחְשְׁב֣וֹת רָ֑ע וּ֝/טְהֹרִ֗ים אִמְרֵי נֹֽעַם־׃
translation:
  text: Evil plans are an abomination to Yahweh, but pleasant words are pure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans of evil' or 'evil schemes.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew word order: ''and/but pure are pleasant words.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: Construct form with יְהוָה, expressing what is abhorrent to the LORD. 'Abomination' preserves the moral and covenantal force common in wisdom literature.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַחְשְׁבוֹת
  chosen: thoughts
  alternatives:
  - plans
  - schemes
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or devices. Here 'thoughts' fits the proverb's contrast with spoken words in the second colon while remaining broad enough to include inward intentions.
- source_word: רָע
  chosen: of evil
  alternatives:
  - evil
  - wicked
  lexicon: HALOT
  rationale: Used attributively with 'thoughts.' Rendering as 'of evil' makes clear that the evil quality belongs to the thoughts, not to a singular evil person. This also avoids over-specifying as 'wicked man,' which the Hebrew does not state.
- source_word: וּטְהֹרִים
  chosen: but pleasant words are pure
  alternatives:
  - and pure are pleasant words
  - but pure are pleasant words
  lexicon: HALOT
  rationale: The conjunction introduces the contrasting second colon. Hebrew word order places 'pure' before the subject phrase, but idiomatic English requires reordering. 'But' brings out the antithetical parallelism typical of Proverbs.
- source_word: טְהֹרִים
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: The adjective denotes ceremonial or moral purity/cleanness. 'Pure' is the most natural English equivalent here and suits the ethical contrast with evil thoughts.
- source_word: אִמְרֵי
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: HALOT
  rationale: Construct plural from אמר, referring to spoken expressions. 'Words' is clear, natural, and fits the concise style of Proverbs.
- source_word: נֹעַם
  chosen: pleasant
  alternatives:
  - gracious
  - delightful
  - sweet
  lexicon: HALOT
  rationale: The noun denotes pleasantness, sweetness, or favor. In construct with 'words,' 'pleasant words' is idiomatic and preserves the semantic sense without importing specifically theological overtones such as 'gracious'.
