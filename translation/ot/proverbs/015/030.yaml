id: PRO.15.30
reference: Proverbs 15:30
source:
  edition: WLC
  text: מְֽאוֹר עֵ֭ינַיִם יְשַׂמַּֽח לֵ֑ב שְׁמוּעָ֥ה ט֝וֹבָ֗ה תְּדַשֶּׁן עָֽצֶם־־־׃
translation:
  text: The light of the eyes gladdens the heart; good news fattens the bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brightness of the eyes,' that is, a cheerful or shining look.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fattens the bone'; the expression is an idiom for deep bodily vigor
      or refreshment.
    reason: cultural_note
lexical_decisions:
- source_word: מְאוֹר
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: HALOT
  rationale: The noun denotes light or brightness. In this proverb, 'light' preserves
    the concrete image while allowing the idiomatic sense of a bright, cheerful look.
- source_word: עֵינַיִם
  chosen: of the eyes
  alternatives:
  - in the eyes
  - from the eyes
  lexicon: HALOT
  rationale: The construct relationship with מְאוֹר is best rendered literally as
    'light of the eyes.' This keeps the Hebrew imagery rather than over-interpreting
    it as merely a cheerful expression.
- source_word: יְשַׂמַּח
  chosen: gladdens
  alternatives:
  - makes glad
  - rejoices
  lexicon: HALOT
  rationale: Piel of שׂמח expresses causing joy. 'Gladdens' is concise, natural English
    and preserves the causative sense.
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and fits Hebrew anthropology, referring
    to the inner person rather than merely emotion.'
- source_word: שְׁמוּעָה
  chosen: news
  alternatives:
  - report
  - tidings
  lexicon: HALOT
  rationale: The noun can mean report or news. In context, 'good news' is the most
    natural modern English collocation and matches the proverb's experiential tone.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - pleasant
  - favorable
  lexicon: HALOT
  rationale: The adjective straightforwardly qualifies שְׁמוּעָה. 'Good' is the plain
    and idiomatic choice.
- source_word: תְּדַשֶּׁן
  chosen: fattens
  alternatives:
  - refreshes
  - nourishes
  - makes fat
  lexicon: HALOT
  rationale: The verb דשׁן literally conveys making fat or rich, often metaphorically
    for thriving or being invigorated. 'Fattens' preserves the earthy Hebrew metaphor
    better than a flattened dynamic rendering like 'refreshes.'
- source_word: עָצֶם
  chosen: the bones
  alternatives:
  - the body
  - the frame
  lexicon: HALOT
  rationale: Although singular in form, the noun here functions collectively in a
    common Hebrew idiom. English naturally renders this as 'the bones,' preserving
    the bodily metaphor of deep vitality.
