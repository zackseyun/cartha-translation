theological_decisions:
- issue: Gendered representative language
  chosen_reading: a man lacking sense ... a man of understanding
  alternative_readings:
  - one lacking sense ... one of understanding
  - a person lacking sense ... a person of understanding
  rationale: The Hebrew uses masculine singular forms representatively in wisdom literature.
    Per translation philosophy, gender-accurate language is preferred over flattening
    to gender-neutral English when the source is grammatically masculine and generic.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
