id: PRO.15.21
reference: Proverbs 15:21
source:
  edition: WLC
  text: אִ֭וֶּלֶת שִׂמְחָ֣ה לַ/חֲסַר לֵ֑ב וְ/אִ֥ישׁ תְּ֝בוּנָ֗ה יְיַשֶׁר לָֽכֶת־־׃
translation:
  text: Folly is joy to a man lacking sense, but a man of understanding makes his
    way straight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lacking heart,' an idiom meaning lacking sense or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  chosen: Folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: Abstract noun; 'folly' is concise, idiomatic English for the quality
    or practice of foolishness, fitting the proverb's contrast with understanding.
- source_word: שִׂמְחָה
  chosen: is joy
  alternatives:
  - brings joy
  - is a delight
  lexicon: HALOT
  rationale: Nominal predicate construction. 'Is joy' preserves the terseness of the
    Hebrew better than a more expansive verbal paraphrase.
- source_word: לַחֲסַר לֵב
  chosen: to a man lacking sense
  alternatives:
  - to one lacking heart
  - to a senseless man
  - to a man without sense
  lexicon: HALOT
  rationale: The idiom 'lacking heart' in Proverbs denotes lack of sense or judgment,
    not emotion. 'A man lacking sense' communicates the Hebrew idiom clearly while
    retaining the masculine singular representative form.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - one
  - a person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source's masculine singular representative
    usage, in line with the stated philosophy.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: '''Understanding'' is the standard wisdom-term equivalent and pairs naturally
    with the contrast to the senseless person.'
- source_word: יְיַשֶׁר
  chosen: makes ... straight
  alternatives:
  - directs
  - keeps straight
  - walks straight
  lexicon: HALOT
  rationale: Piel of ישר means to make straight or level. Rendering it causatively
    preserves the verbal force better than simply 'walks uprightly.'
- source_word: לָכֶת
  chosen: his way
  alternatives:
  - his walking
  - his path
  - his course
  lexicon: HALOT
  rationale: The infinitive 'to walk/go' functions idiomatically for one's conduct
    or course of life. 'His way' gives natural English while preserving the metaphor
    of walking.
