id: PRO.15.15
reference: Proverbs 15:15
source:
  edition: WLC
  text: כָּל יְמֵ֣י עָנִ֣י רָעִ֑ים וְ/טֽוֹב לֵ֝֗ב מִשְׁתֶּ֥ה תָמִֽיד־־׃
translation:
  text: All the days of the afflicted are bad, but a good heart is a continual feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor' for 'the afflicted'; the Hebrew עָנִי can refer to one who
      is poor, afflicted, or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'a cheerful heart' for 'a good heart'; the Hebrew expression refers to
      an inward disposition of gladness or well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the whole set; 'All' is idiomatic with the following
    plural construct 'days of.'
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: Construct plural of 'days'; in wisdom literature it commonly denotes
    the course of one's days. 'The days of' preserves the Hebrew image without over-interpreting
    as 'lifetime.'
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the oppressed
  - the needy
  lexicon: HALOT
  rationale: The adjective/noun can denote poverty, affliction, or oppression. Here
    the contrast is with inward cheerfulness rather than wealth, so 'the afflicted'
    best captures the broader condition of misery without restricting the saying to
    economics alone.
- source_word: רָעִים
  chosen: are bad
  alternatives:
  - are evil
  - are miserable
  - are hard
  lexicon: HALOT
  rationale: Predicate adjective describing the quality of the afflicted person's
    days. 'Bad' is broad and natural English, preserving the Hebrew's general term
    without narrowing it to moral evil ('evil') or adding interpretive color ('miserable').
- source_word: וְטוֹב לֵב
  chosen: but a good heart
  alternatives:
  - but one with a cheerful heart
  - but a glad heart
  lexicon: HALOT
  rationale: The conjunction marks contrast. Literally 'good of heart/heart-good.'
    'A good heart' keeps the Hebrew anthropological term 'heart' and allows the proverb's
    inner-disposition contrast to remain visible. More interpretive options like 'cheerful
    heart' are possible but less formally transparent.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  - feasting
  lexicon: HALOT
  rationale: The noun denotes a feast or banquet. 'Feast' is concise and idiomatic
    in the predicate construction 'is a continual feast.'
- source_word: תָמִיד
  chosen: continual
  alternatives:
  - always
  - continually
  - perpetual
  lexicon: HALOT
  rationale: Adverbial/nominal term meaning continually or regularly. 'Continual'
    works smoothly attributively with 'feast' and preserves the proverb's enduring
    contrast.
