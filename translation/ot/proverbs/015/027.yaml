id: PRO.15.27
reference: Proverbs 15:27
source:
  edition: WLC
  text: עֹכֵ֣ר בֵּ֭ית/וֹ בּוֹצֵ֣עַ בָּ֑צַע וְ/שׂוֹנֵ֖א מַתָּנֹ֣ת יִחְיֶֽה׃
translation:
  text: Whoever is greedy for unjust gain troubles his own house, but he who hates
    bribes will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'gifts'; in this context the sense is likely 'bribes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹכֵר
  chosen: troubles
  alternatives:
  - brings trouble on
  - ruins
  lexicon: HALOT
  rationale: The participle from עכר conveys causing trouble/disaster. 'Troubles'
    is concise and idiomatic in English, preserving the proverb's moral cause-effect
    sense without overstating to total destruction.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his household
  - his family
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or family. In wisdom literature it
    often extends to one's household/family sphere. 'His own house' keeps the Hebrew
    image while naturally implying the household affected by his conduct.
- source_word: בּוֹצֵעַ בָּצַע
  chosen: is greedy for unjust gain
  alternatives:
  - profits by plunder
  - is greedy for gain
  - seeks dishonest profit
  lexicon: HALOT
  rationale: The cognate verb+noun construction intensifies acquisitive greed, often
    with the sense of dishonest or violent gain. 'Greedy for unjust gain' captures
    both the appetite and the moral taint better than the blander 'greedy for gain.'
- source_word: וְשׂוֹנֵא
  chosen: but he who hates
  alternatives:
  - and whoever hates
  lexicon: HALOT
  rationale: The conjunction can be simple 'and,' but in proverb parallelism the sense
    is contrastive. 'But he who hates' brings out the antithetical structure in natural
    English.
- source_word: מַתָּנוֹת
  chosen: bribes
  alternatives:
  - gifts
  lexicon: HALOT
  rationale: Although the noun literally means 'gifts,' in wisdom and legal contexts
    it commonly refers to gifts that pervert justice, i.e., bribes. Given the contrast
    with unjust gain, 'bribes' best reflects the contextual sense. The more literal
    'gifts' is worth preserving in a footnote because the Hebrew term itself is broader.
- source_word: יִחְיֶה
  chosen: will live
  alternatives:
  - will preserve his life
  - will thrive
  lexicon: HALOT
  rationale: The imperfect of חיה in Proverbs commonly denotes living in the sense
    of surviving/prospering under wisdom. 'Will live' preserves the Hebrew terseness
    and leaves the proverb's full resonance intact.
