id: PRO.15.9
reference: Proverbs 15:9
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה דֶּ֣רֶךְ רָשָׁ֑ע וּ/מְרַדֵּ֖ף צְדָקָ֣ה יֶאֱהָֽב׃
translation:
  text: The way of the wicked is an abomination to Yahweh, but he loves the one who pursues righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'detestable to the LORD is the path of a wicked man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he loves whoever pursues justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a disgust
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable, often in moral or cultic contexts. 'An abomination' preserves the strong evaluative force and matches common biblical usage without softening the term.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: In Proverbs, 'way' naturally carries both literal and metaphorical senses of manner of life. It is concise and preserves the wisdom-literature motif.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: Although morphologically singular, the term here functions generically. 'The wicked' is idiomatic English for the class/generic person characterized by wickedness and avoids an unnecessarily awkward singular.
- source_word: מְרַדֵּף
  chosen: the one who pursues
  alternatives:
  - whoever pursues
  - the pursuer of
  lexicon: HALOT
  rationale: The participle expresses an ongoing characteristic. 'The one who pursues' renders the substantival participle naturally in English and balances the generic force of the parallel line.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In Proverbs this term commonly denotes uprightness and right moral order. 'Righteousness' best preserves the ethical and theological sense; 'justice' is possible but narrower here.
- source_word: יֶאֱהָב
  chosen: he loves
  alternatives:
  - he will love
  lexicon: HALOT
  rationale: 'The imperfect here expresses a general truth rather than future time. Present-tense English fits proverbial style: the LORD loves the person characterized by pursuing righteousness.'
