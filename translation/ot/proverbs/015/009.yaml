- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Generic masculine expression in wisdom literature
  chosen_reading: the wicked / the one who pursues righteousness
  alternative_readings:
  - a wicked man / a man who pursues righteousness
  rationale: The Hebrew uses grammatically masculine singular forms with representative force. The chosen English preserves the generic sense without importing a male-specific limitation, consistent with the gender-accurate principle.
