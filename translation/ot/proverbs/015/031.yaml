id: PRO.15.31
reference: Proverbs 15:31
source:
  edition: WLC
  text: אֹ֗זֶן שֹׁ֭מַעַת תּוֹכַ֣חַת חַיִּ֑ים בְּ/קֶ֖רֶב חֲכָמִ֣ים תָּלִֽין׃
translation:
  text: An ear that listens to life-giving rebuke will remain among the wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'An ear that hears the rebuke of life will lodge among the wise.' The
      Hebrew verb is literally 'lodge' or 'spend the night,' here used figuratively
      for remaining or dwelling among the wise.
    reason: lexical_alternative
  - marker: b
    text: '''Life-giving rebuke'' renders a Hebrew expression that could also be translated
      ''rebuke of life'' or ''rebuke for life,'' meaning correction that leads to
      life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹזֶן
  chosen: ear
  alternatives:
  - one who hears
  - listener
  lexicon: HALOT
  rationale: Rendered literally as 'ear' to preserve the Hebrew idiom in which the
    ear stands for a receptive person. English can naturally sustain this metaphor
    here.
- source_word: שֹׁמַעַת
  chosen: that listens
  alternatives:
  - hearing
  - that hears
  lexicon: HALOT
  rationale: The participle describes an ongoing receptive posture, not mere auditory
    perception. 'Listens' better conveys heedful hearing in wisdom literature.
- source_word: תּוֹכַחַת
  chosen: rebuke
  alternatives:
  - reproof
  - correction
  lexicon: HALOT
  rationale: '''Rebuke'' is a standard wisdom-term rendering and fits the moral admonition
    sense. ''Reproof'' is possible but less natural in contemporary English; ''correction''
    is slightly broader and softer.'
- source_word: חַיִּים
  chosen: life-giving
  alternatives:
  - of life
  - for life
  - living
  lexicon: HALOT
  rationale: The construct phrase תּוֹכַחַת חַיִּים is most naturally understood as
    rebuke that leads to or preserves life. 'Life-giving rebuke' communicates the
    idiomatic force in readable English better than the more wooden 'rebuke of life.'
- source_word: בְּקֶרֶב
  chosen: among
  alternatives:
  - in the midst of
  - within
  lexicon: HALOT
  rationale: The prepositional phrase indicates placement within a group. 'Among'
    is idiomatic and concise in English.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise people
  - wise men
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'The wise' is natural,
    concise, and preserves the proverbial category without unnecessarily specifying
    gender.
- source_word: תָּלִין
  chosen: will remain
  alternatives:
  - will lodge
  - will spend the night
  - will abide
  lexicon: HALOT
  rationale: The verb literally means 'lodge/spend the night,' but in this proverbial
    context it metaphorically expresses settled association or enduring place among
    the wise. 'Will remain' conveys the sense clearly in modern English while preserving
    the relational outcome.
