id: PRO.15.14
reference: Proverbs 15:14
source:
  edition: WLC
  text: לֵ֣ב נָ֭בוֹן יְבַקֶּשׁ דָּ֑עַת ו/פני כְ֝סִילִ֗ים יִרְעֶ֥ה אִוֶּֽלֶת־׃
translation:
  text: The heart of the discerning seeks knowledge, but the mouth of fools feeds
    on folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''but the face of fools feeds on folly.'' The Masoretic Text reads
      ''face(s) of fools''; many translations render the sense as ''mouth of fools''
      to fit the parallel image of feeding.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: In Proverbs, 'heart' commonly denotes the inner person, including thought
    and will. 'Heart' preserves the Hebrew metaphor better than flattening it to 'mind'.
- source_word: נָבוֹן
  chosen: discerning
  alternatives:
  - understanding
  - prudent
  lexicon: HALOT
  rationale: The adjective describes one who has understanding or discernment. 'Discerning'
    is natural modern English and fits wisdom-literature style.
- source_word: יְבַקֶּשׁ
  chosen: seeks
  alternatives:
  - searches for
  - pursues
  lexicon: HALOT
  rationale: The piel verb conveys active seeking. 'Seeks' is concise and idiomatic
    while preserving the intentional sense.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - learning
  lexicon: HALOT
  rationale: The noun regularly means 'knowledge' in wisdom contexts. This pairs well
    with the wise person's active pursuit.
- source_word: וּפְנֵי
  chosen: the mouth
  alternatives:
  - the face of
  - the presence of
  lexicon: HALOT
  rationale: Although the consonantal text reads 'face(s) of,' many interpreters understand
    this as a metonymic or textual issue in parallel with the verb 'feeds/grazes.'
    'Mouth' yields the most coherent proverb in English and reflects a widely adopted
    sense in translation tradition. The more literal 'face of fools' is preserved
    in a footnote because it is the direct form of the Masoretic text.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - stupid people
  lexicon: HALOT
  rationale: Standard wisdom-term gloss. 'Fools' preserves the moral-intellectual
    category of Proverbs better than a merely insulting modern equivalent.
- source_word: יִרְעֶה
  chosen: feeds on
  alternatives:
  - grazes on
  - pastures
  lexicon: HALOT
  rationale: The verb literally means 'to pasture, graze, feed.' With 'folly' as object,
    'feeds on' communicates habitual consumption in idiomatic English.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: A standard wisdom-term for the opposite of wisdom. 'Folly' is concise
    and stylistically fitting in Proverbs.
