id: PRO.15.11
reference: Proverbs 15:11
source:
  edition: WLC
  text: שְׁא֣וֹל וַ֭/אֲבַדּוֹן נֶ֣גֶד יְהוָ֑ה אַ֝֗ף כִּֽי לִבּ֥וֹת בְּֽנֵי אָדָֽם־־׃
translation:
  text: Sheol and Abaddon lie open before Yahweh; how much more the hearts of the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Destruction.' 'Abaddon' can denote destruction or the realm/place of destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of man,' an idiom for human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Kept as the transliterated proper noun 'Sheol' to preserve the Hebrew concept rather than flattening it into only 'grave' or a generic afterlife term. In wisdom literature it denotes the underworld/realm of the dead.
- source_word: אֲבַדּוֹן
  chosen: Abaddon
  alternatives:
  - Destruction
  - the place of destruction
  lexicon: HALOT
  rationale: Rendered as 'Abaddon' to preserve the paired, quasi-proper-name force alongside 'Sheol.' Although the noun can mean 'destruction,' in this collocation it functions as a named realm or personified place associated with death.
- source_word: נֶגֶד
  chosen: lie open before
  alternatives:
  - are before
  - are in front of
  - are exposed before
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of,' but in this proverb the sense is not merely spatial; it conveys full exposure to Yahweh's sight. 'Lie open before' brings out the idiomatic force in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: אַף כִּי
  chosen: how much more
  alternatives:
  - indeed, how much more
  - even more
  lexicon: HALOT
  rationale: 'This combination introduces a fortiori reasoning: if even Sheol and Abaddon are open before the LORD, then certainly human hearts are. ''How much more'' captures the proverb''s argumentative force.'
- source_word: לִבּוֹת
  chosen: hearts
  alternatives:
  - minds
  - inner thoughts
  lexicon: HALOT
  rationale: In Hebrew anthropology 'heart' is the standard term for the inner person, including thought, will, and intention. 'Hearts' preserves the source metaphor and theological texture better than reducing it to 'minds'.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - human beings
  - mankind
  - the children of man
  lexicon: HALOT
  rationale: Rendered gender-accurately and relatively formally, reflecting the Hebrew idiom literally while still being intelligible. Here it denotes humanity in general, not males only, but the source expression is masculine and representative.
