theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to flatten שְׁאוֹל and אֲבַדּוֹן into generic afterlife/destruction language
  chosen_reading: Sheol and Abaddon
  alternative_readings:
  - the grave and destruction
  - the realm of the dead and destruction
  rationale: The proverb's force is heightened by naming the deepest hidden realms known in Hebrew thought. Preserving the Hebrew terms avoids importing a more specific doctrinal scheme about the afterlife than the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Rendering בְּנֵי אָדָם with gender-accurate language
  chosen_reading: the sons of man
  alternative_readings:
  - human beings
  - mankind
  rationale: The Hebrew is grammatically masculine with representative force. Per project policy, the translation should be gender-accurate rather than automatically gender-neutral; the generic sense can be clarified in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral; Contested terms: אָדָם → man / humankind (context)'
