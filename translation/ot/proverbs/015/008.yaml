id: PRO.15.8
reference: Proverbs 15:8
source:
  edition: WLC
  text: זֶ֣בַח רְ֭שָׁעִים תּוֹעֲבַ֣ת יְהוָ֑ה וּ/תְפִלַּ֖ת יְשָׁרִ֣ים רְצוֹנֽ/וֹ׃
translation:
  text: The sacrifice of the wicked is an abomination to Yahweh, but the prayer of the upright is his delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his favor' or 'acceptable to him.' The Hebrew noun can denote pleasure, favor, or acceptance.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: HALOT
  rationale: Refers broadly to a sacrificial offering. 'Sacrifice' is the most natural and sufficiently formal rendering in this proverb's contrast with 'prayer.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A substantival adjective/plural referring to morally guilty persons. 'The wicked' is concise, idiomatic, and preserves the proverb's moral category.
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: A strong covenantal-moral term for something abhorrent to God. 'An abomination' preserves the force better than a flatter adjective.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תְפִלַּת
  chosen: the prayer
  alternatives:
  - prayer
  lexicon: HALOT
  rationale: 'Construct form: ''the prayer of.'' Singular works well as a representative singular in proverbial style.'
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the righteous
  lexicon: HALOT
  rationale: Describes those who are morally straight/upright. 'The upright' is the standard English equivalent and preserves the ethical nuance distinct from specifically forensic 'righteous.'
- source_word: רְצוֹנוֹ
  chosen: his delight
  alternatives:
  - his favor
  - his good pleasure
  - acceptable to him
  lexicon: HALOT
  rationale: The noun denotes pleasure, favor, or acceptance. In this antithetical parallelism with 'abomination,' 'his delight' gives a clear and vivid contrast while remaining faithful to the Hebrew sense.
