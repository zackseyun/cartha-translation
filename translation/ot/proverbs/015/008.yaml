theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the contrast in the second colon
  chosen_reading: is his delight
  alternative_readings:
  - is acceptable to him
  - has his favor
  rationale: The Hebrew nominal clause leaves the copula implicit. Rendering it as 'is his delight' preserves the strong antithesis with 'abomination' without adding doctrinal content beyond the text.
