id: PRO.15.7
reference: Proverbs 15:7
source:
  edition: WLC
  text: שִׂפְתֵ֣י חֲ֭כָמִים יְזָ֣רוּ דָ֑עַת וְ/לֵ֖ב כְּסִילִ֣ים לֹא כֵֽן־׃
translation:
  text: The lips of the wise spread knowledge, but the heart of fools is not so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scatter knowledge.' The Hebrew verb carries the image of scattering
      or dispersing; 'spread' is used here for natural English.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is elliptical: literally, ''but the heart of fools, not so.''
      The sense is that fools do not distribute knowledge in the same way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  chosen: the lips of
  alternatives:
  - lips
  lexicon: HALOT
  rationale: Construct plural of 'lip'; in English the construct relation is best
    expressed as 'the lips of the wise.' Retains the concrete body-part imagery rather
    than paraphrasing as 'words' or 'speech.'
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - wise people
  lexicon: HALOT
  rationale: Substantival adjective/plural meaning 'wise ones.' 'The wise' is natural
    English and preserves the representative class sense without over-specifying gender.
- source_word: יְזָרוּ
  chosen: spread
  alternatives:
  - scatter
  - disperse
  - broadcast
  lexicon: HALOT
  rationale: The verb זרה commonly means 'scatter' or 'winnow'; in this proverb, with
    'knowledge' as object, 'spread' captures the metaphor in idiomatic modern English
    while preserving the image of dissemination.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Standard gloss for דַּעַת in wisdom literature. 'Knowledge' fits the
    proverb's contrast and is the most direct rendering.
- source_word: לֵב
  chosen: the heart of
  alternatives:
  - mind of
  - inner being of
  lexicon: HALOT
  rationale: Hebrew 'heart' often denotes the inner person, including thought and
    disposition. 'Heart' should be retained in Proverbs unless context demands abstraction,
    since it is a key wisdom term.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard wisdom-literature term for morally dull or obstinate persons.
    'Fools' is concise and conventional without flattening the ethical nuance.
- source_word: לֹא כֵן
  chosen: is not so
  alternatives:
  - is not like this
  - does not do so
  - is not right
  lexicon: HALOT
  rationale: 'The terse Hebrew predicate is elliptical. ''Is not so'' preserves the
    compact contrast: the heart of fools is not like the lips of the wise in spreading
    knowledge. This avoids adding content not explicit in the text.'
