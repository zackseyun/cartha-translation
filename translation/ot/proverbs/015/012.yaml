theological_decisions:
- issue: Gender rendering of חֲכָמִים
  chosen_reading: the wise
  alternative_readings:
  - wise men
  rationale: Although the Hebrew form is grammatically masculine plural, in wisdom
    literature it commonly has representative/generic force. Per the translation philosophy,
    gender-accurate rendering should match source intent; here the proverb addresses
    the category of wise persons rather than specifying males only.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
