id: PRO.15.12
reference: Proverbs 15:12
source:
  edition: WLC
  text: לֹ֣א יֶאֱהַב לֵ֭ץ הוֹכֵ֣חַֽ ל֑/וֹ אֶל חֲ֝כָמִ֗ים לֹ֣א יֵלֵֽךְ־־׃
translation:
  text: A mocker does not love one who corrects him; he will not go to the wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to wise men." The Hebrew is masculine plural, but here likely refers
      generically to wise persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵץ
  chosen: mocker
  alternatives:
  - scoffer
  - scorner
  lexicon: HALOT
  rationale: לֵץ denotes a contemptuous, derisive person in wisdom literature. 'Mocker'
    is clear modern English and preserves the active scornful sense better than the
    more archaic 'scorner'; 'scoffer' is possible but slightly less natural for contemporary
    readers.
- source_word: יֶאֱהַב
  chosen: does not love
  alternatives:
  - does not like
  - hates
  lexicon: HALOT
  rationale: The verb is the common 'love.' Rendering it directly preserves the Hebrew
    contrast without overstating to 'hates' or flattening to 'does not like.'
- source_word: הוֹכֵחַ לוֹ
  chosen: one who corrects him
  alternatives:
  - a reprover
  - one who rebukes him
  lexicon: HALOT
  rationale: The participle from יכח here refers to a person giving corrective reproof.
    'One who corrects him' is natural English and captures the disciplinary/corrective
    force. 'Rebukes' is possible but can sound harsher; 'a reprover' is more formal
    and less readable.
- source_word: אֶל חֲכָמִים
  chosen: to the wise
  alternatives:
  - to wise men
  - toward the wise
  lexicon: HALOT
  rationale: The preposition אֶל with plural חֲכָמִים indicates movement/approach
    toward wise persons. 'To the wise' is idiomatic and preserves the representative
    plural. 'Wise men' is more formally gender-accurate to the masculine plural, but
    in Proverbs this plural often functions generically for wise persons; the sense
    is not restricted to male individuals.
- source_word: לֹא יֵלֵךְ
  chosen: he will not go
  alternatives:
  - he does not go
  - he will not walk
  lexicon: HALOT
  rationale: הלך in this context means to go/approach. The yiqtol in proverb style
    can express habitual action; English 'will not go' captures the volitional refusal
    well in this context. 'Walk' would be too literal here.
