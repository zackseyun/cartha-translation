theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: The Hebrew term denotes the underworld or realm of the dead in Israelite
    usage. Transliteration preserves the source-world concept and avoids importing
    later doctrinal specificity associated with 'hell.' A clarifying footnote preserves
    accessible alternatives.
  doctrine_reference: Translation philosophy §1, §3
