id: PRO.15.24
reference: Proverbs 15:24
source:
  edition: WLC
  text: אֹ֣רַח חַ֭יִּים לְ/מַ֣עְלָ/ה לְ/מַשְׂכִּ֑יל לְמַ֥עַן ס֝֗וּר מִ/שְּׁא֥וֹל מָֽטָּה׃
translation:
  text: The path of life leads upward for the prudent, so that he may turn away from
    Sheol below.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the grave' or 'from the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: אֹרַח commonly denotes a path or way of conduct. 'Path' is natural English
    and preserves the metaphor of a course of life.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים is idiomatically singular in many
    contexts. 'Life' is the standard English equivalent here in the construct phrase
    'path of life.'
- source_word: לְמַעְלָה
  chosen: leads upward
  alternatives:
  - is upward
  - goes upward
  - to the heights
  lexicon: HALOT
  rationale: The adverb literally means 'upward' or 'above.' Because Hebrew omits
    a finite verb here, English requires a smoother predication. 'Leads upward' expresses
    the sense of direction inherent in the proverb while remaining close to the metaphor.
- source_word: לְמַשְׂכִּיל
  chosen: for the prudent
  alternatives:
  - for the wise
  - for the discerning
  - for the one with insight
  lexicon: HALOT
  rationale: The participial form from שכל denotes one who has insight or acts prudently.
    'Prudent' fits wisdom-literature style and avoids overflattening to mere intelligence.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose of
  lexicon: HALOT
  rationale: This conjunction marks purpose. 'So that' is idiomatic modern English
    and preserves the purposive force.
- source_word: סוּר
  chosen: he may turn away
  alternatives:
  - to turn aside
  - to depart
  - to avoid
  lexicon: HALOT
  rationale: The infinitive conveys turning aside or away. 'Turn away' preserves the
    concrete metaphor and moral sense better than the more abstract 'avoid.'
- source_word: מִשְּׁאוֹל
  chosen: from Sheol
  alternatives:
  - from the grave
  - from the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best preserved by transliteration because it refers to the Hebrew
    conception of the underworld/realm of the dead and should not be prematurely collapsed
    into a narrower English theological term.
- source_word: מָטָּה
  chosen: below
  alternatives:
  - beneath
  - downward
  lexicon: HALOT
  rationale: The adverb contrasts with 'upward' earlier in the verse. 'Below' gives
    a clean antithetical parallel in English.
