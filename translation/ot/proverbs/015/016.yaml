  chosen_reading: Rendered as 'the fear of the LORD' without paraphrasing it into 'reverence' in the main text
  alternative_readings:
  - reverence for the LORD
  - awe of the LORD
  rationale: The Hebrew phrase is a key theological expression in Proverbs. Keeping the traditional wording preserves its canonical resonance while allowing readers to understand it as reverent awe and piety rather than cringing dread. A more interpretive paraphrase would narrow the expression beyond the source text.
