id: PRO.15.20
reference: Proverbs 15:20
source:
  edition: WLC
  text: בֵּ֣ן חָ֭כָם יְשַׂמַּח אָ֑ב וּ/כְסִ֥יל אָ֝דָ֗ם בּוֹזֶ֥ה אִמּֽ/וֹ־׃
translation:
  text: A wise son brings joy to his father, but a foolish man despises his mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foolish person'; Hebrew has 'a foolish man' (כְסִיל אָדָם), with אָדָם
      here referring to an individual rather than humankind.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and in proverbial parallelism naturally
    refers to a son. Following the gender-accurate policy, 'son' is retained rather
    than neutralizing to 'child'.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  - prudent
  lexicon: HALOT
  rationale: In wisdom literature חָכָם denotes practical and moral wisdom. 'Wise'
    is the most natural and consistent English rendering here.
- source_word: יְשַׂמַּח
  chosen: brings joy to
  alternatives:
  - makes glad
  - gladdens
  lexicon: HALOT
  rationale: 'The Piel form of שׂמח is causative/intensive: ''makes glad.'' ''Brings
    joy to'' preserves the sense in readable modern English.'
- source_word: אָב
  chosen: his father
  alternatives:
  - father
  lexicon: HALOT
  rationale: English idiom naturally supplies the possessive in this proverb, matching
    the relational sense established by 'son'.
- source_word: כְסִיל
  chosen: foolish
  alternatives:
  - a fool
  - stupid
  lexicon: HALOT
  rationale: Used attributively with אָדָם, the term describes a morally dull, obstinate
    fool. 'Foolish' works smoothly before 'man' and avoids flattening the construction.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual male in parallel with 'son' and in
    relation to 'his mother,' not humanity in general. Per doctrine, the gender-accurate
    rendering is 'man' rather than a neutral term.
- source_word: בּוֹזֶה
  chosen: despises
  alternatives:
  - shows contempt for
  - scorns
  lexicon: HALOT
  rationale: 'The participle expresses characteristic action: one who treats with
    contempt. ''Despises'' is concise and appropriately strong.'
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The suffix is explicit in Hebrew, so the possessive should be retained
    in English.
