id: PRO.27.14
reference: Proverbs 27:14
source:
  edition: WLC
  text: מְבָ֘רֵ֤ךְ רֵעֵ֨/הוּ בְּ/ק֣וֹל גָּ֭דוֹל בַּ/בֹּ֣קֶר הַשְׁכֵּ֑ים קְ֝לָלָ֗ה
    תֵּחָ֥שֶׁב לֽ/וֹ׀׃
translation:
  text: Whoever blesses his neighbor with a loud voice, rising early in the morning,
    it will be counted to him as a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' or 'his companion' for 'his neighbor.'
    reason: lexical_alternative
  - marker: b
    text: 'The sense is ironic: an ostentatious early-morning blessing is received
      as though it were a curse.'
    reason: cultural_note
  - marker: c
    text: Or 'it will be regarded as a curse to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבָרֵךְ
  chosen: blesses
  alternatives:
  - greets with blessing
  - praises
  lexicon: HALOT
  rationale: From ברך in the Piel participial form, here denoting speaking a blessing
    over or to someone. 'Blesses' preserves the lexical sense without narrowing it
    to mere greeting, though the context suggests an overly effusive morning salutation.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' fits wisdom-literature
    usage broadly and preserves the interpersonal but not necessarily intimate relationship.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a great voice
  lexicon: HALOT
  rationale: A straightforward idiom meaning audible volume. 'With a loud voice' keeps
    the concrete Hebrew expression and highlights the socially intrusive manner.
- source_word: בַּבֹּקֶר הַשְׁכֵּים
  chosen: rising early in the morning
  alternatives:
  - early in the morning
  - at daybreak, rising early
  lexicon: HALOT
  rationale: The infinitive absolute/verb form הַשְׁכֵּים intensifies the idea of
    early rising. Rendering it as 'rising early in the morning' preserves both the
    temporal setting and the deliberate earliness.
- source_word: קְלָלָה
  chosen: a curse
  alternatives:
  - cursing
  - an insult
  lexicon: HALOT
  rationale: 'The noun plainly means ''curse.'' In context the point is ironic reversal:
    what is intended or presented as blessing is socially received as its opposite.'
- source_word: תֵּחָשֶׁב לוֹ
  chosen: it will be counted to him as
  alternatives:
  - it will be regarded by him as
  - it will be reckoned to him as
  lexicon: HALOT
  rationale: From חשב in the Niphal, 'to be reckoned/accounted/regarded.' 'Counted
    to him as' preserves the passive sense and leaves open whether the reckoning is
    by observers or in effect toward him.
