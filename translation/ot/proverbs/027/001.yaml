id: PRO.27.1
reference: Proverbs 27:1
source:
  edition: WLC
  text: אַֽל תִּ֭תְהַלֵּל בְּ/י֣וֹם מָחָ֑ר כִּ֤י לֹא תֵ֝דַ֗ע מַה יֵּ֥לֶד יֽוֹם־־־׃
translation:
  text: Do not boast about tomorrow, for you do not know what a day may bring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what a day will give birth to' or 'produce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַלֵּל
  chosen: boast
  alternatives:
  - praise yourself
  - glory
  lexicon: HALOT
  rationale: Hitpael of הלל here carries the reflexive sense of self-exaltation. 'Boast'
    is idiomatic modern English and preserves the warning against self-confident self-congratulation
    better than the more wooden 'praise yourself.'
- source_word: בְּיוֹם מָחָר
  chosen: about tomorrow
  alternatives:
  - in the day of tomorrow
  - concerning tomorrow
  lexicon: HALOT
  rationale: Literally 'in/on the day of tomorrow,' but in English the sense is prospective
    reference rather than location in time. 'About tomorrow' is a natural rendering
    that preserves the object of boasting.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the prohibition. 'For' fits proverbial style
    and concise English well.
- source_word: תֵדַע
  chosen: you do not know
  alternatives:
  - you cannot know
  lexicon: HALOT
  rationale: The verb ידע states lack of knowledge, not inability in an abstract sense.
    'You do not know' stays close to the Hebrew.
- source_word: מַה יֵּלֶד יוֹם
  chosen: what a day may bring
  alternatives:
  - what a day will give birth to
  - what a day will produce
  lexicon: HALOT
  rationale: ילד literally means 'bear/give birth,' used metaphorically for what the
    coming day will produce. 'May bring' is a well-established English equivalent
    that communicates the metaphor's sense without awkwardness; the more literal alternatives
    are preserved in a footnote.
