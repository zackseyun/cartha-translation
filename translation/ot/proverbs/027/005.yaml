id: PRO.27.5
reference: Proverbs 27:5
source:
  edition: WLC
  text: ט֭וֹבָה תּוֹכַ֣חַת מְגֻלָּ֑ה מֵֽ/אַהֲבָ֥ה מְסֻתָּֽרֶת׃
translation:
  text: Open rebuke is better than hidden love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concealed love.' The Hebrew may refer to love that is unexpressed rather
      than absent.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבָה
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: In this comparative construction with מִן ('than'), the adjective functions
    idiomatically as 'better' rather than the more wooden 'good.' This yields natural
    English while preserving the proverb's evaluative comparison.
- source_word: תּוֹכַחַת
  chosen: rebuke
  alternatives:
  - reproof
  - correction
  lexicon: HALOT
  rationale: The noun denotes verbal correction or censure. 'Rebuke' best captures
    the sharper force in a concise proverb, while remaining idiomatic. 'Reproof' is
    possible but less current; 'correction' is broader and softer.
- source_word: מְגֻלָּה
  chosen: open
  alternatives:
  - revealed
  - uncovered
  - frank
  lexicon: HALOT
  rationale: The passive participle literally means 'uncovered/revealed.' In English,
    'open rebuke' is the most natural equivalent for a rebuke made plainly and publicly
    rather than concealed. 'Frank rebuke' narrows the sense to candor; 'public rebuke'
    over-specifies publicity.
- source_word: מִן
  chosen: than
  alternatives:
  - from
  lexicon: HALOT
  rationale: Here the preposition marks comparison after טוֹבָה, so 'than' is the
    correct English rendering rather than the more literal spatial sense 'from.'
- source_word: אַהֲבָה
  chosen: love
  alternatives:
  - affection
  lexicon: HALOT
  rationale: The common noun for love should be rendered straightforwardly as 'love.'
    'Affection' is possible but weaker and less consistent with standard biblical
    usage.
- source_word: מְסֻתָּרֶת
  chosen: hidden
  alternatives:
  - concealed
  - secret
  lexicon: HALOT
  rationale: The participle means 'hidden/concealed.' 'Hidden love' preserves the
    ambiguity of love that is not expressed or not made visible. 'Secret love' may
    imply illicit romance, which the Hebrew does not require.
