id: PRO.27.13
reference: Proverbs 27:13
source:
  edition: WLC
  text: קַח בִּ֭גְד/וֹ כִּי עָ֣רַב זָ֑ר וּ/בְעַ֖ד נָכְרִיָּ֣ה חַבְלֵֽ/הוּ־־׃
translation:
  text: Take his garment, for he has put up security for a stranger; and hold it in
    pledge for a foreign woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take a pledge from him for a foreign woman.' The Hebrew of the second
      line is terse, and the verb may be understood as taking or holding collateral
      from the man himself.
    reason: lexical_alternative
  - marker: b
    text: '''Foreign woman'' translates a Hebrew term that can mean a non-Israelite
      woman or, in Proverbs, a socially/morally illicit woman; the broader wording
      is retained here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Seize
  - Get
  lexicon: HALOT
  rationale: Imperative 2ms of לקח, a direct command. 'Take' is the most natural and
    sufficiently forceful English equivalent in this wisdom context.
- source_word: בִּגְדוֹ
  chosen: his garment
  alternatives:
  - his cloak
  - his clothing
  lexicon: HALOT
  rationale: בגד commonly denotes a garment or outer clothing. 'Garment' is broad
    and idiomatic, and fits the collateral imagery in Proverbs.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' preserves the concise proverbial
    style better than the more explicit 'because'.
- source_word: עָרַב
  chosen: has put up security
  alternatives:
  - has become surety
  - has given a pledge
  lexicon: HALOT
  rationale: ערב in this stem refers to standing surety or guaranteeing another's
    debt. 'Has put up security' communicates the financial-legal sense in clear modern
    English.
- source_word: זָר
  chosen: a stranger
  alternatives:
  - an outsider
  - another person
  lexicon: HALOT
  rationale: זָר here is a non-kin/non-associated person in wisdom literature. 'Stranger'
    preserves the social and prudential force of the warning.
- source_word: וּבְעַד
  chosen: and ... for
  alternatives:
  - and on behalf of
  - and because of
  lexicon: HALOT
  rationale: בעד marks acting on behalf of or in relation to another party. In parallel
    with the first colon, it signals the person for whom the guarantee is made.
- source_word: נָכְרִיָּה
  chosen: a foreign woman
  alternatives:
  - a stranger woman
  - an adulteress
  lexicon: HALOT
  rationale: נכריה literally denotes a foreign/strange woman. 'Foreign woman' is the
    plain lexical sense; 'adulteress' is interpretive and too narrow here, though
    the term can carry that connotation in Proverbs.
- source_word: חַבְלֵהוּ
  chosen: hold it in pledge
  alternatives:
  - take him as security
  - bind him
  - seize a pledge from him
  lexicon: HALOT
  rationale: From חבל in pledge-taking contexts, likely meaning to take/hold a pledge.
    The suffix is rendered by referring back to the garment/collateral idea from the
    first colon, yielding idiomatic English while preserving the legal-economic image.
