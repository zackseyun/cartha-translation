id: PRO.27.12
reference: Proverbs 27:12
source:
  edition: WLC
  text: עָר֤וּם רָאָ֣ה רָעָ֣ה נִסְתָּ֑ר פְּ֝תָאיִ֗ם עָבְר֥וּ נֶעֱנָֽשׁוּ׃
translation:
  text: A prudent man sees danger and hides himself, but the simple pass on and suffer
    for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are punished.' The Hebrew can express suffering penalty or bearing the
      consequences.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוּם
  chosen: prudent man
  alternatives:
  - shrewd man
  - sensible man
  - crafty man
  lexicon: HALOT
  rationale: In Proverbs this term commonly has a positive sense of prudence or shrewd
    good sense, in contrast to the simple. Because the Hebrew form is grammatically
    masculine singular and representative, 'man' preserves the gender-accurate force
    per translation philosophy. 'Crafty' would mislead in English toward a negative
    moral sense.
- source_word: רָאָה
  chosen: sees
  alternatives:
  - has seen
  - perceives
  lexicon: HALOT
  rationale: 'The qatal here functions proverbially/generically, so present-tense
    English fits wisdom style: the prudent person characteristically sees.'
- source_word: רָעָה
  chosen: danger
  alternatives:
  - evil
  - harm
  - trouble
  lexicon: HALOT
  rationale: Although the noun can mean 'evil' or 'calamity,' in this proverb the
    sense is impending harm or trouble that one can foresee and avoid. 'Danger' is
    idiomatic and captures the practical wisdom context.
- source_word: נִסְתָּר
  chosen: hides himself
  alternatives:
  - conceals himself
  - takes cover
  lexicon: HALOT
  rationale: The Niphal conveys withdrawing or concealing oneself in response to danger.
    'Hides himself' is concise, natural, and preserves the reflexive sense.
- source_word: פְּתָאיִם
  chosen: the simple
  alternatives:
  - the naive
  - the gullible
  - simpletons
  lexicon: HALOT
  rationale: A standard wisdom term for the inexperienced and undiscerning. 'The simple'
    is both traditional and accurate without becoming pejorative slang.
- source_word: עָבְרוּ
  chosen: pass on
  alternatives:
  - go on
  - keep going
  - pass by
  lexicon: HALOT
  rationale: 'The verb contrasts with the prudent person''s hiding: the simple continue
    onward without taking precautions. ''Pass on'' preserves that movement and contrast.'
- source_word: נֶעֱנָשׁוּ
  chosen: suffer for it
  alternatives:
  - are punished
  - pay the penalty
  - suffer harm
  lexicon: HALOT
  rationale: The Niphal of ענשׁ can denote being penalized or suffering the consequences.
    In English wisdom style, 'suffer for it' communicates consequence without over-specifying
    a formal judicial punishment, while still allowing that punitive consequence may
    be in view.
