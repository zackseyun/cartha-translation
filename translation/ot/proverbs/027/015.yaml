id: PRO.27.15
reference: Proverbs 27:15
source:
  edition: WLC
  text: דֶּ֣לֶף ט֭וֹרֵד בְּ/י֣וֹם סַגְרִ֑יר וְ/אֵ֥שֶׁת מדונים נִשְׁתָּוָֽה׃
translation:
  text: A constant dripping on a day of heavy rain, and a quarrelsome wife, are alike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A continual dripping on a rainy day and a contentious wife are the same.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּלֶף
  chosen: dripping
  alternatives:
  - leak
  - drip
  lexicon: HALOT
  rationale: Refers to water dripping through a roof or continual leakage. 'Dripping'
    fits natural English and preserves the image of repeated drops rather than a single
    leak event.
- source_word: טוֹרֵד
  chosen: constant
  alternatives:
  - continual
  - unceasing
  lexicon: HALOT
  rationale: The participle describes ongoing action. Rendering adjectivally as 'constant'
    produces idiomatic English with 'dripping' while preserving the durative sense.
- source_word: בְּיוֹם
  chosen: on a day of
  alternatives:
  - in the day of
  - on the day of
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On a day of' is natural English and
    keeps the proverb's concrete situational framing.
- source_word: סַגְרִיר
  chosen: heavy rain
  alternatives:
  - steady rain
  - storm
  lexicon: HALOT
  rationale: The noun denotes a rainy, stormy, or driving-rain condition. 'Heavy rain'
    communicates the unpleasant persistence of the weather and matches the proverb's
    domestic nuisance imagery better than the broader 'storm'.
- source_word: אֵשֶׁת מִדְיָנִים
  chosen: a quarrelsome wife
  alternatives:
  - a contentious wife
  - a wife of quarrels
  lexicon: HALOT
  rationale: The construct phrase literally means 'a wife of quarrels/contentions.'
    'Quarrelsome wife' is idiomatic modern English and preserves the characterization
    without softening it.
- source_word: נִשְׁתָּוָה
  chosen: are alike
  alternatives:
  - are comparable
  - is like
  lexicon: HALOT
  rationale: The verb conveys equivalence or likeness. Because the proverb compares
    two items joined by 'and,' 'are alike' makes the comparison explicit in natural
    English. The singular Hebrew verb likely treats the comparison as a single proverbial
    equation rather than requiring awkward singular English.
