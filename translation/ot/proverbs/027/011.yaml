id: PRO.27.11
reference: Proverbs 27:11
source:
  edition: WLC
  text: חֲכַ֣ם בְּ֭נִ/י וְ/שַׂמַּ֣ח לִבִּ֑/י וְ/אָשִׁ֖יבָה חֹרְפִ֣/י דָבָֽר׃
translation:
  text: Be wise, my son, and make my heart glad, so that I may answer the one who
    reproaches me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and I may return a word to the one who reproaches me'—that
      is, 'answer the one who reproaches me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Become wise, my son.' The Hebrew imperative can emphasize either a state
      ('be wise') or the pursuit of wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם
  chosen: Be wise
  alternatives:
  - Become wise
  - Act wisely
  lexicon: HALOT
  rationale: Imperative masculine singular from חכם. 'Be wise' is concise and idiomatic
    in English, preserving the exhortational force without over-specifying process
    ('become wise') or merely behavior ('act wisely').
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: בן with 1cs suffix literally means 'my son.' Following the gender-accurate
    principle, the masculine singular is retained rather than neutralized to 'my child,'
    while still allowing representative force in wisdom literature.
- source_word: וְשַׂמַּח לִבִּי
  chosen: and make my heart glad
  alternatives:
  - and gladden my heart
  - and make me glad
  lexicon: HALOT
  rationale: 'The Hiphil imperative of שמח with ''my heart'' as object is best rendered
    causatively: ''make my heart glad.'' This preserves both the causative stem and
    the concrete Hebrew expression better than the more flattened ''make me glad.'''
- source_word: וְאָשִׁיבָה
  chosen: so that I may answer
  alternatives:
  - and I will answer
  - that I may reply
  lexicon: HALOT
  rationale: 'Cohortative 1cs of שוב in the idiom ''return a word'' functions as giving
    an answer. In context, the sense is purpose/result following the son''s wisdom:
    ''so that I may answer.'' This is more natural in English than a wooden ''and
    I may return.'''
- source_word: חֹרְפִי
  chosen: the one who reproaches me
  alternatives:
  - my reproacher
  - him who taunts me
  - the one who insults me
  lexicon: HALOT
  rationale: Active participle of חרף with 1cs suffix denotes a person who reproaches/taunts
    the speaker. 'The one who reproaches me' is natural and preserves the ongoing
    personal force of the participle.
- source_word: דָבָר
  chosen: answer
  alternatives:
  - a word
  - a response
  lexicon: HALOT
  rationale: Although דבר literally means 'word,' in the idiom with שוב it refers
    to a verbal answer or response. Rendering the idiom as 'answer' communicates the
    plain sense in readable English while avoiding unnecessary literalism.
