id: PRO.27.16
reference: Proverbs 27:16
source:
  edition: WLC
  text: צֹפְנֶ֥י/הָ צָֽפַן ר֑וּחַ וְ/שֶׁ֖מֶן יְמִינ֣/וֹ יִקְרָֽא־׃
translation:
  text: Whoever restrains her restrains the wind, and his right hand grasps oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and his right hand calls oil.' The Hebrew here is difficult;
      the main text follows the sense of the proverb rather than a strictly literal
      rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹפְנֶיהָ
  chosen: whoever restrains her
  alternatives:
  - he who restrains her
  - whoever hides her
  - whoever conceals her
  lexicon: HALOT
  rationale: The form is best taken as a participial expression from צפן with 3fs
    suffix, referring back to the contentious wife of the previous verse. In context,
    the sense is not 'hide' in a neutral spatial sense but 'restrain/contain'—attempting
    to keep her in check. 'Whoever' gives idiomatic English for the participial construction
    while preserving the generic force.
- source_word: צָפַן
  chosen: restrains
  alternatives:
  - hides
  - contains
  - conceals
  lexicon: HALOT
  rationale: Though the root often means 'hide' or 'store up,' the proverb's parallel
    with the wind favors the nuance 'contain/restrain.' Repeating 'restrains' preserves
    the Hebrew wordplay and parallelism more clearly than varying the gloss.
- source_word: רוּחַ
  chosen: the wind
  alternatives:
  - wind
  - spirit
  lexicon: HALOT
  rationale: In this concrete proverb, the comparison is to something physically uncontrollable;
    'wind' is the plain contextual sense, not 'spirit.' The article is supplied naturally
    in English.
- source_word: וְשֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: '''Oil'' is the direct lexical equivalent and fits the proverb''s imagery.
    Specifying ''olive'' would add detail not explicit in the Hebrew, though olive
    oil is culturally likely.'
- source_word: יְמִינוֹ
  chosen: his right hand
  alternatives:
  - his right
  lexicon: HALOT
  rationale: The Hebrew explicitly names the right hand; retaining it preserves the
    bodily imagery and the parallel with trying to control something slippery.
- source_word: יִקְרָא
  chosen: grasps
  alternatives:
  - encounters
  - calls
  - proclaims
  lexicon: HALOT
  rationale: 'The verb קרא normally means ''call,'' creating a notorious difficulty
    in this verse. In this context, however, many understand an idiomatic or textually
    difficult sense tied to contact with oil in the hand. ''Grasps'' communicates
    the proverb''s point in readable English: trying to restrain her is like trying
    to seize wind or hold oil. Because this is interpretively difficult, the more
    literal alternative is preserved in a footnote.'
