id: PRO.27.9
reference: Proverbs 27:9
source:
  edition: WLC
  text: שֶׁ֣מֶן וּ֭/קְטֹרֶת יְשַׂמַּֽח לֵ֑ב וּ/מֶ֥תֶק רֵ֝עֵ֗/הוּ מֵֽ/עֲצַת נָֽפֶשׁ־־׃
translation:
  text: Oil and incense make the heart glad, and the sweetness of a friend comes from
    heartfelt counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the sweetness of a friend is better than self-counsel' (taking
      the phrase differently). The Hebrew of the second line is notably compact and
      has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - perfume
  - ointment
  lexicon: HALOT
  rationale: The noun broadly denotes oil, often perfumed or used for anointing. 'Oil'
    is the most direct rendering and pairs naturally with incense in the proverb's
    imagery of pleasing, refreshing substances.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - perfume
  - fragrant offering
  lexicon: HALOT
  rationale: The term commonly refers to incense or a fragrant burning mixture. 'Incense'
    best preserves the concrete image and the parallel with oil as something pleasant
    that gladdens.
- source_word: יְשַׂמַּח לֵב
  chosen: make the heart glad
  alternatives:
  - rejoice the heart
  - cheer the heart
  lexicon: HALOT
  rationale: The Piel verb means to cause joy or gladness. 'Make the heart glad' is
    idiomatic modern English while preserving the Hebrew expression with 'heart' as
    the seat of inner feeling.
- source_word: מֶתֶק
  chosen: sweetness
  alternatives:
  - pleasantness
  - sweet counsel
  lexicon: HALOT
  rationale: The noun denotes sweetness or pleasantness. 'Sweetness' keeps the sensory
    metaphor that matches oil and incense, while allowing the second colon to speak
    of the delightful quality of friendship.
- source_word: רֵעֵהוּ
  chosen: of a friend
  alternatives:
  - of his friend
  - from a friend
  - of one's friend
  lexicon: HALOT
  rationale: The noun means friend/companion with a 3ms suffix. English proverb style
    often generalizes such suffixes, so 'of a friend' communicates the sense naturally
    without over-specifying the possessive.
- source_word: מֵעֲצַת
  chosen: comes from counsel
  alternatives:
  - is from counsel
  - than counsel
  - by counsel
  lexicon: HALOT
  rationale: 'The preposition מִן here is taken in a source sense: the sweetness of
    a friend arises from counsel. This yields a coherent parallelism in which the
    delight of friendship is grounded in sincere advice.'
- source_word: נָפֶשׁ
  chosen: heartfelt
  alternatives:
  - of the soul
  - deep
  - sincere
  lexicon: HALOT
  rationale: Literally 'soul' or 'self.' In English, 'heartfelt counsel' best conveys
    counsel arising from the inner person, preserving the anthropological force without
    sounding wooden.
