id: PRO.27.27
reference: Proverbs 27:27
source:
  edition: WLC
  text: וְ/דֵ֤י חֲלֵ֬ב עִזִּ֗ים לְֽ֭/לַחְמְ/ךָ לְ/לֶ֣חֶם בֵּיתֶ֑/ךָ וְ֝/חַיִּ֗ים לְ/נַעֲרוֹתֶֽי/ךָ׀׃
translation:
  text: And there will be enough goats’ milk for your food, for the food of your household,
    and sustenance for your servant girls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and life for your maidservants.' The Hebrew literally says 'and lives/life
      for your young women/servant girls,' using 'life' in the sense of what sustains
      life.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bread' in both occurrences likely means food or provision more generally,
      not bread alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדֵי
  chosen: And there will be enough
  alternatives:
  - and enough
  - and sufficient
  lexicon: HALOT
  rationale: דַּי denotes sufficiency or enoughness. English idiom is smoother with
    an existential sense ('there will be enough') rather than the bare nominal 'and
    enough.'
- source_word: חֲלֵב עִזִּים
  chosen: goats’ milk
  alternatives:
  - milk of goats
  - goat milk
  lexicon: HALOT
  rationale: חָלָב means milk, and with עִזִּים specifies milk from goats. 'Goats’
    milk' is natural modern English while preserving the source sense.
- source_word: לְלַחְמְךָ
  chosen: for your food
  alternatives:
  - for your bread
  - for your nourishment
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in Hebrew it often extends to food
    more generally. Here, since the verse speaks of milk as provision, 'for your food'
    better reflects the idiomatic sense than the overly literal 'for your bread.'
- source_word: לְלֶחֶם בֵּיתֶךָ
  chosen: for the food of your household
  alternatives:
  - for the bread of your house
  - for your household's food
  lexicon: HALOT
  rationale: Again לֶחֶם is best taken broadly as food/provision. בַּיִת in this context
    refers to the household, not merely the physical building.
- source_word: וְחַיִּים
  chosen: and sustenance
  alternatives:
  - and life
  - and livelihood
  lexicon: HALOT
  rationale: חַיִּים literally means 'life/lives,' but in a provisioning context it
    denotes what sustains life. 'Sustenance' captures the practical sense in idiomatic
    English without flattening the metaphor entirely.
- source_word: לְנַעֲרוֹתֶיךָ
  chosen: for your servant girls
  alternatives:
  - for your maidservants
  - for your young women
  lexicon: HALOT
  rationale: נַעֲרָה can mean girl, young woman, or female servant depending on context.
    In a household economy list of provisions, dependents within the house are in
    view; 'servant girls' best fits the social setting while remaining understandable
    in modern English.
