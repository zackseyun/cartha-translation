id: PRO.27.2
reference: Proverbs 27:2
source:
  edition: WLC
  text: יְהַלֶּלְ/ךָ֣ זָ֣ר וְ/לֹא פִ֑י/ךָ נָ֝כְרִ֗י וְ/אַל שְׂפָתֶֽי/ךָ־־׃
translation:
  text: Let a stranger praise you, and not your own mouth; a foreigner, and not your
    own lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another' for 'a stranger' (זָר), emphasizing praise from someone other
      than oneself rather than ethnic foreignness.
    reason: lexical_alternative
  - marker: b
    text: The second line uses a different Hebrew word ('a foreigner,' נָכְרִי) than
      the first ('a stranger,' זָר). The translation preserves the variation to reflect
      the Hebrew poetic parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלֶּלְךָ
  chosen: Let ... praise you
  alternatives:
  - may ... praise you
  - let ... commend you
  lexicon: HALOT
  rationale: 'The jussive/imperfect form expresses exhortation: ''let X praise you.''
    ''Praise'' is the most direct and natural rendering of הלל here. ''Commend'' is
    possible in context, but ''praise'' better preserves the lexical force and proverbial
    parallelism.'
- source_word: זָר
  chosen: a stranger
  alternatives:
  - another
  - someone else
  - an outsider
  lexicon: HALOT
  rationale: זָר commonly denotes one who is outside one's own circle, i.e., a stranger
    or outsider. 'A stranger' preserves the concrete contrast with 'your own mouth'
    and matches the proverb's emphasis that praise should come from others, not self.
- source_word: פִּיךָ
  chosen: your own mouth
  alternatives:
  - your mouth
  lexicon: HALOT
  rationale: Literally 'your mouth.' Adding 'own' is a minimal, contextually warranted
    English clarification that sharpens the contrast with praise from another person
    and reflects the reflexive sense inherent in the proverb's point without over-paraphrasing.
- source_word: נָכְרִי
  chosen: a foreigner
  alternatives:
  - a stranger
  - an outsider
  lexicon: HALOT
  rationale: נָכְרִי overlaps semantically with זָר but often carries the nuance of
    one foreign or unfamiliar. Rendering it 'a foreigner' preserves the poetic variation
    between the two cola rather than flattening both terms into the same English word.
- source_word: שְׂפָתֶיךָ
  chosen: your own lips
  alternatives:
  - your lips
  lexicon: HALOT
  rationale: Literally 'your lips.' 'Your own lips' mirrors the first colon's 'your
    own mouth' and makes the antithesis explicit in idiomatic English while preserving
    the Hebrew parallelism of mouth/lips.
- source_word: וְלֹא ... וְאַל
  chosen: and not ... and not
  alternatives:
  - but not ... and not
  - not ... nor
  lexicon: HALOT
  rationale: The first negation uses לֹא and the second אַל. In this proverb both
    function to negate self-praise in parallel lines. Rendering both as 'and not'
    yields smooth English and preserves the balanced structure. English style could
    also use 'nor,' but the repeated 'and not' better reflects the Hebrew parallelism.
