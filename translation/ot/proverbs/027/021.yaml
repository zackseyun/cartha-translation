id: PRO.27.21
reference: Proverbs 27:21
source:
  edition: WLC
  text: מַצְרֵ֣ף לַ֭/כֶּסֶף וְ/כ֣וּר לַ/זָּהָ֑ב וְ֝/אִ֗ישׁ לְ/פִ֣י מַהֲלָלֽ/וֹ׃
translation:
  text: The refining pot is for silver, and the furnace for gold, and a man is tested
    by his praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man is tested by what he praises'; alternatively, 'a man is tested
      by the praise he receives.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצְרֵף
  chosen: refining pot
  alternatives:
  - crucible
  - smelting pot
  lexicon: HALOT
  rationale: Refers to a vessel used in refining metals. 'Refining pot' is clear modern
    English and preserves the metallurgical image; 'crucible' is possible but slightly
    more technical.
- source_word: לַכֶּסֶף
  chosen: for silver
  alternatives:
  - for the silver
  lexicon: HALOT
  rationale: 'The preposition marks purpose or suitability: the refining pot is for
    refining silver. English omits the article naturally.'
- source_word: כּוּר
  chosen: furnace
  alternatives:
  - smelting furnace
  - oven
  lexicon: HALOT
  rationale: Denotes a furnace used for smelting/refining. 'Furnace' is the standard,
    natural rendering in wisdom imagery.
- source_word: לַזָּהָב
  chosen: for gold
  alternatives:
  - for the gold
  lexicon: HALOT
  rationale: Parallel to 'for silver'; expresses the object suited to the furnace.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - a human
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in proverb style often
    represents a generic individual. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language.
- source_word: לְפִי
  chosen: by
  alternatives:
  - according to
  - in proportion to
  - by the measure of
  lexicon: HALOT
  rationale: Literally 'according to the mouth of,' an idiom meaning 'according to'
    or 'by the measure of.' 'By' is concise and idiomatic in English in this testing/comparison
    construction.
- source_word: מַהֲלָלוֹ
  chosen: his praise
  alternatives:
  - what he praises
  - his reputation
  - the praise he receives
  lexicon: HALOT
  rationale: 'The noun can denote praise, praiseworthiness, or commendation. In this
    proverb the sense is debated: either a man is revealed by what he praises, or
    by the praise given to him. The main text keeps the compact Hebrew expression
    ''his praise'' to preserve the ambiguity as much as English allows, while a footnote
    records the main alternatives.'
