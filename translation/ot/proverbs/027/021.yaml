theological_decisions:
- issue: Interpretive ambiguity in the final colon
  chosen_reading: a man is tested by his praise
  alternative_readings:
  - a man is tested by what he praises
  - a man is tested by the praise he receives
  rationale: The Hebrew phrase לְפִי מַהֲלָלוֹ is genuinely ambiguous. Rather than
    over-resolving the proverb, the main text preserves the ambiguity with 'his praise,'
    which can be heard as either the praise directed toward him or the praise that
    comes from him. This follows the doctrine's instruction to preserve genuine tension
    rather than force a single interpretive resolution.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
