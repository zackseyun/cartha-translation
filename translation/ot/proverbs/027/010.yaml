theological_decisions:
- issue: Nature of the proverb’s kinship language
  chosen_reading: Retain 'brother' as the primary rendering rather than broadening
    to 'relative' or 'kinsman.'
  alternative_readings:
  - relative
  - kinsman
  rationale: Although אָח can extend beyond a literal sibling, wisdom literature often
    uses 'brother' proverbially while preserving the family contrast. Keeping 'brother'
    maintains the source image and lets readers feel the tension between expected
    family support and the practical value of a nearby neighbor.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
