id: PRO.27.10
reference: Proverbs 27:10
source:
  edition: WLC
  text: רֵֽעֲ/ךָ֨ ו/רעה אָבִ֡י/ךָ אַֽל תַּעֲזֹ֗ב וּ/בֵ֥ית אָחִ֗י/ךָ אַל תָּ֭בוֹא בְּ/י֣וֹם
    אֵידֶ֑/ךָ ט֥וֹב שָׁכֵ֥ן קָ֝ר֗וֹב מֵ/אָ֥ח רָחֽוֹק־־׃
translation:
  text: Do not forsake your friend or your father’s friend, and do not go to your
    brother’s house in the day of your calamity; a nearby neighbor is better than
    a distant brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and your father’s friend.' The Hebrew conjunction can be rendered either
      way; 'or' is used in the main text for smoother English under a single prohibition.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' may also be understood more broadly as a close relative or
      kinsman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעֲךָ
  chosen: your friend
  alternatives:
  - your companion
  - your neighbor
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a friend, companion, or associate. Here, paired
    with 'your father’s friend,' the relational sense 'friend' best fits the proverb’s
    emphasis on loyal personal bonds rather than mere proximity.
- source_word: וְרֵעַ אָבִיךָ
  chosen: or your father’s friend
  alternatives:
  - and your father’s friend
  lexicon: HALOT
  rationale: The conjunction ו can be rendered 'and' or, in prohibitions and paired
    items, effectively 'or' in English. 'Or' avoids implying two separate commands
    of different force and naturally groups both objects under 'do not forsake.' The
    phrase means a friend belonging to one's father, i.e., a longstanding family ally.
- source_word: אַל תַּעֲזֹב
  chosen: Do not forsake
  alternatives:
  - Do not abandon
  - Do not leave
  lexicon: HALOT
  rationale: עזב in wisdom literature often carries the sense of abandoning or forsaking
    a relationship or obligation. 'Forsake' preserves the covenantal-relational weight
    without sounding overly archaic in this context.
- source_word: וּבֵית אָחִיךָ אַל תָּבוֹא
  chosen: and do not go to your brother’s house
  alternatives:
  - and do not enter your brother’s house
  lexicon: HALOT
  rationale: בוא means 'come/go/enter.' In idiomatic English with 'house,' 'go to'
    is more natural than 'enter,' while still preserving the sense of seeking help
    from a brother's household.
- source_word: בְּיוֹם אֵידֶךָ
  chosen: in the day of your calamity
  alternatives:
  - on the day of your disaster
  - in the day of your distress
  lexicon: HALOT
  rationale: אֵיד denotes disaster, ruin, or calamity. 'Calamity' fits wisdom style
    and communicates serious misfortune without over-specifying the kind of trouble.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: Though literally 'good,' in this comparative proverb the idiomatic English
    rendering is 'better,' anticipating the comparison with מִן ('than').
- source_word: שָׁכֵן קָרוֹב
  chosen: a nearby neighbor
  alternatives:
  - a near neighbor
  - a close neighbor
  lexicon: HALOT
  rationale: שָׁכֵן is 'neighbor' and קָרוֹב means near/nearby. 'Nearby neighbor'
    emphasizes physical nearness, which is the point of the comparison, more than
    emotional closeness.
- source_word: מֵאָח רָחוֹק
  chosen: than a distant brother
  alternatives:
  - than a far-off brother
  lexicon: HALOT
  rationale: אָח can mean literal brother or close kinsman. In this proverb, 'brother'
    should be retained in the main text because the contrast depends on familial relation
    versus practical nearness; 'distant' captures both geographic and situational
    remoteness.
