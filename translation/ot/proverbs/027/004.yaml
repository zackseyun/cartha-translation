id: PRO.27.4
reference: Proverbs 27:4
source:
  edition: WLC
  text: אַכְזְרִיּ֣וּת חֵ֭מָה וְ/שֶׁ֣טֶף אָ֑ף וּ/מִ֥י יַ֝עֲמֹד לִ/פְנֵ֥י קִנְאָֽה׃
translation:
  text: Wrath is cruel, and anger is a flood, but who can stand before jealousy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy' (Hebrew קִנְאָה); the term can denote either depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכְזְרִיּוּת
  chosen: cruel
  alternatives:
  - cruelty
  - fierce
  lexicon: HALOT
  rationale: The noun denotes cruelty or harshness. In this verbless clause, rendering
    it predicatively as 'is cruel' produces natural English while preserving the sense.
    'Cruelty' is possible but less idiomatic in the clause structure.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - fury
  - heat
  lexicon: HALOT
  rationale: The term often denotes burning wrath or rage. 'Wrath' preserves the intensity
    and moral force better than the flatter 'anger,' especially since אָף appears
    in the next colon and benefits from differentiation.
- source_word: שֶׁטֶף
  chosen: a flood
  alternatives:
  - an overflowing torrent
  - an outburst
  - an overflow
  lexicon: HALOT
  rationale: The noun literally refers to an overflowing flood or torrent. 'A flood'
    is concise, vivid, and fits the proverb's metaphorical parallelism.
- source_word: אָף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Though literally 'nose,' the idiomatic sense here is anger. Rendering
    it 'anger' is standard and clear. 'Wrath' was reserved for חֵמָה to preserve the
    distinction between the paired terms.
- source_word: וּמִי
  chosen: but who
  alternatives:
  - and who
  - who then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces a climactic contrast. 'But
    who' captures the adversative force in English and highlights the proverb's escalation
    from wrath and anger to jealousy.
- source_word: יַעֲמֹד
  chosen: can stand
  alternatives:
  - will stand
  - can endure
  - can withstand
  lexicon: HALOT
  rationale: The verb means 'stand' or 'remain standing.' In context it conveys ability
    to withstand. 'Can stand' keeps the concrete image while expressing the rhetorical
    force of the question.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the face of
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'before' or 'in front of.' 'Before' preserves
    the spatial metaphor and works idiomatically with 'stand.'
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: The noun can denote jealousy, envy, or zeal depending on context. Here,
    in a wisdom saying about destructive passions, 'jealousy' best fits the warning
    about an especially overpowering human emotion. 'Envy' is a viable alternative
    and is preserved in a footnote.
