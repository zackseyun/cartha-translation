id: PRO.27.26
reference: Proverbs 27:26
source:
  edition: WLC
  text: כְּבָשִׂ֥ים לִ/לְבוּשֶׁ֑/ךָ וּ/מְחִ֥יר שָׂ֝דֶ֗ה עַתּוּדִֽים׃
translation:
  text: Lambs are for your clothing, and goats are the price of a field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'male goats' / 'he-goats.' The Hebrew is more specific than the broader
      English 'goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבָשִׂים
  chosen: Lambs
  alternatives:
  - Sheep
  lexicon: HALOT
  rationale: The noun commonly denotes young sheep/lambs. In this proverb about agricultural
    provision, either 'lambs' or 'sheep' is possible, but 'lambs' fits the lexical
    default more closely and suits the idea of wool/clothing supply.
- source_word: לִלְבוּשֶׁךָ
  chosen: for your clothing
  alternatives:
  - for your garment
  - for your clothing needs
  lexicon: HALOT
  rationale: 'The preposition ל plus ''clothing/garment'' with 2ms suffix expresses
    purpose or use: the flock provides what is needed for clothing. ''For your clothing''
    is natural English while staying close to the Hebrew.'
- source_word: וּמְחִיר
  chosen: and ... are the price
  alternatives:
  - and the price
  - and for the purchase price
  lexicon: HALOT
  rationale: 'מְחִיר means ''price, payment, purchase price.'' Because Biblical Hebrew
    often omits a copula, English supplies ''are'' to make the second clause intelligible:
    the goats function as the means of payment.'
- source_word: שָׂדֶה
  chosen: a field
  alternatives:
  - land
  - a piece of land
  lexicon: HALOT
  rationale: שָׂדֶה ordinarily means 'field.' 'A field' is the most direct rendering
    and fits the economic imagery of the proverb.
- source_word: עַתּוּדִים
  chosen: goats
  alternatives:
  - male goats
  - he-goats
  lexicon: HALOT
  rationale: The term more specifically denotes male goats/bucks, but in English 'goats'
    is smoother in a proverb and still communicates the livestock category. The more
    specific alternative is worth preserving in a footnote because the Hebrew is more
    precise than generic 'goats'.
