id: PRO.27.6
reference: Proverbs 27:6
source:
  edition: WLC
  text: נֶ֭אֱמָנִים פִּצְעֵ֣י אוֹהֵ֑ב וְ֝/נַעְתָּר֗וֹת נְשִׁיק֥וֹת שׂוֹנֵֽא׃
translation:
  text: The wounds of a friend are faithful, but the kisses of an enemy are excessive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profuse'; the sense may be that an enemy's kisses are overabundant and
      therefore insincere or deceptive.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱמָנִים
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  - sincere
  lexicon: HALOT
  rationale: 'The adjective denotes reliability or trustworthiness. Here it predicates
    the value of the wounds inflicted by one who loves: they are dependable in intent,
    not deceitful. ''Faithful'' preserves the compact proverbial force and the moral
    nuance better than the flatter ''reliable.'''
- source_word: פִּצְעֵי
  chosen: wounds
  alternatives:
  - blows
  - injuries
  lexicon: HALOT
  rationale: The noun refers to wounds or injuries. In proverb form, 'wounds' works
    both literally and metaphorically for painful rebuke. It is the standard, vivid
    English equivalent.
- source_word: אוֹהֵב
  chosen: friend
  alternatives:
  - one who loves
  - lover
  lexicon: HALOT
  rationale: Although the participle literally means 'one loving' or 'one who loves,'
    in this wisdom context it denotes a loving companion or friend. 'Friend' is idiomatic
    English and captures the relational contrast with 'enemy' while preserving the
    proverb's sense.
- source_word: וְנַעְתָּרוֹת
  chosen: excessive
  alternatives:
  - profuse
  - abundant
  - deceitful
  lexicon: HALOT
  rationale: 'The form is difficult and has been understood in two main ways: either
    ''abundant/profuse'' or, by contextual sense, ''deceitful/insincere.'' The more
    direct lexical sense is abundance or excess, so ''excessive'' is chosen in the
    main text. In context, the point is that an enemy''s kisses are overdone and therefore
    suspect; that interpretive nuance is preserved in a footnote rather than imported
    into the main text.'
- source_word: נְשִׁיקוֹת
  chosen: kisses
  lexicon: HALOT
  rationale: The plural noun straightforwardly means 'kisses.' In context it symbolizes
    flattering displays of affection.
- source_word: שׂוֹנֵא
  chosen: enemy
  alternatives:
  - one who hates
  - hater
  lexicon: HALOT
  rationale: The participle literally means 'one hating,' but 'enemy' is the natural
    English counterpart to 'friend' and fits the proverb's antithetical parallelism.
