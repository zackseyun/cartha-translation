id: PRO.27.20
reference: Proverbs 27:20
source:
  edition: WLC
  text: שְׁא֣וֹל ו/אבדה לֹ֣א תִשְׂבַּ֑עְנָה וְ/עֵינֵ֥י הָ֝/אָדָ֗ם לֹ֣א תִשְׂבַּֽעְנָה׃
translation:
  text: Sheol and Abaddon are never satisfied, and the eyes of man are never satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Destruction.' Hebrew Abaddon can denote destruction or the place/personified
      realm of destruction.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is generic, referring to human beings generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: Kept as 'Sheol' rather than flattening to 'grave' or 'hell,' since the
    Hebrew term denotes the underworld/realm of the dead and carries broader semantic
    range than either English alternative. Transliteration preserves the Hebrew concept
    without importing later doctrinal associations.
- source_word: אֲבַדָּה
  chosen: Abaddon
  alternatives:
  - Destruction
  - the place of destruction
  lexicon: HALOT
  rationale: Rendered as 'Abaddon' to match the parallelism with 'Sheol' and preserve
    the term's personified/place-like force in wisdom literature. 'Destruction' is
    possible, but the transliterated form better reflects the Hebrew proper-like usage
    here.
- source_word: לֹא תִשְׂבַּעְנָה
  chosen: are never satisfied
  alternatives:
  - are not satisfied
  - are never full
  lexicon: HALOT
  rationale: The verb שׂבע in this context conveys being sated or filled to satisfaction.
    'Are never satisfied' is idiomatic modern English and preserves the proverbial
    force. 'Never full' is possible but less natural here.
- source_word: עֵינֵי
  chosen: the eyes of
  alternatives:
  - eyes
  lexicon: HALOT
  rationale: Rendered literally to preserve the Hebrew image of desire expressed through
    the eyes. The construct relationship requires 'the eyes of' in English.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a man
  - humanity
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, 'man' best
    matches the singular generic force here. The proverb speaks representatively of
    human desire in general, not merely one male individual; 'humankind' is possible
    but would weaken the tight parallel with the singular expression.
- source_word: לֹא תִשְׂבַּעְנָה
  chosen: are never satisfied
  alternatives:
  - are not satisfied
  - are never full
  lexicon: HALOT
  rationale: Repeated with the same English gloss to preserve the Hebrew repetition
    and the proverb's balanced parallelism.
