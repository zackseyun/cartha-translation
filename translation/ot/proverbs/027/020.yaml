theological_decisions:
- issue: Rendering of הָאָדָם in a generic proverb
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular with article functions generically. Per the translation
    philosophy, gender-accurate rendering is preferred over gender-neutral when the
    source uses masculine/generic אדם. A footnote preserves the inclusive sense for
    modern readers.
