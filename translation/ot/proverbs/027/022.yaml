id: PRO.27.22
reference: Proverbs 27:22
source:
  edition: WLC
  text: אִ֥ם תִּכְתּֽוֹשׁ אֶת הָ/אֱוִ֨יל בַּֽ/מַּכְתֵּ֡שׁ בְּ/ת֣וֹךְ הָ֭/רִיפוֹת בַּֽ/עֱלִ֑י
    לֹא תָס֥וּר מֵ֝/עָלָ֗י/ו אִוַּלְתּֽ/וֹ־־׀־׃פ
translation:
  text: Even if you grind a fool in a mortar, in the midst of crushed grain with a
    pestle, his foolishness will not depart from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crushed grain,' 'pounded grain,' or traditionally 'grits' for Hebrew
      רִיפוֹת.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְתּוֹשׁ
  chosen: grind
  alternatives:
  - crush
  - pound
  lexicon: HALOT
  rationale: The verb denotes pounding or crushing, especially in a mortar. 'Grind'
    is idiomatic in English for the culinary image while still preserving the force
    of physical pounding.
- source_word: אֱוִיל
  chosen: fool
  alternatives:
  - stupid person
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and intellectually obstinate
    person, not merely someone lacking intelligence. 'Fool' preserves the Proverbs
    register.
- source_word: מַּכְתֵּשׁ
  chosen: mortar
  alternatives:
  - mortar bowl
  lexicon: HALOT
  rationale: Refers to a mortar used for pounding grain or spices. 'Mortar' is the
    natural English equivalent.
- source_word: רִיפוֹת
  chosen: crushed grain
  alternatives:
  - grits
  - bruised grain
  - pounded grain
  lexicon: HALOT
  rationale: The noun refers to crushed or pounded grain products. 'Crushed grain'
    is clear, concrete, and avoids the regional ambiguity of 'grits' while preserving
    the food-preparation image.
- source_word: עֱלִי
  chosen: pestle
  lexicon: HALOT
  rationale: Standard tool paired with a mortar; 'pestle' is the precise English term.
- source_word: תָסוּר מֵעָלָיו
  chosen: will not depart from him
  alternatives:
  - will not leave him
  - will not turn away from him
  lexicon: HALOT
  rationale: This idiom expresses removal or departure from a person. 'Will not depart
    from him' is both natural and suitably proverbial.
- source_word: אִוַּלְתּוֹ
  chosen: his foolishness
  alternatives:
  - his folly
  lexicon: HALOT
  rationale: The abstract noun names the fool's ingrained folly. 'Foolishness' is
    slightly more transparent to modern readers than 'folly,' though both are viable.
- source_word: אִם
  chosen: Even if
  alternatives:
  - If
  lexicon: HALOT
  rationale: In this proverb the particle introduces a concessive hypothetical. 'Even
    if' better captures the sense that the extreme action still fails to change the
    fool.
