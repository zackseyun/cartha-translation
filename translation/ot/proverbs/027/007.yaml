id: PRO.27.7
reference: Proverbs 27:7
source:
  edition: WLC
  text: נֶ֣פֶשׁ שְׂ֭בֵעָה תָּב֣וּס נֹ֑פֶת וְ/נֶ֥פֶשׁ רְ֝עֵבָ֗ה כָּל מַ֥ר מָתֽוֹק־׃
translation:
  text: A satisfied person despises honey, but to a hungry person every bitter thing
    is sweet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A full soul tramples honey underfoot, but to a hungry soul every bitter
      thing is sweet.' The Hebrew uses 'soul' idiomatically for the person or appetite.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may more specifically refer to comb honey or flowing honey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - appetite
  - life
  lexicon: HALOT
  rationale: Although literally 'soul,' in this proverb נֶפֶשׁ refers to the person
    in terms of appetite or inner desire. 'Person' communicates the idiomatic sense
    naturally in English while preserving the contrast between satiation and hunger.
- source_word: שְׂבֵעָה
  chosen: satisfied
  alternatives:
  - full
  - sated
  lexicon: HALOT
  rationale: The adjective denotes being filled or satiated. 'Satisfied' fits modern
    English and pairs well with the hunger contrast; 'full' is possible but slightly
    narrower and less idiomatic here.
- source_word: תָּב֣וּס
  chosen: despises
  alternatives:
  - tramples underfoot
  - scorns
  - disdains
  lexicon: HALOT
  rationale: The verb literally can carry the sense of trampling, but in this context
    of food it expresses contempt or rejection. 'Despises' captures the figurative
    force without over-literalizing the image.
- source_word: נֹפֶת
  chosen: honey
  alternatives:
  - honeycomb
  - dripping honey
  lexicon: HALOT
  rationale: נֹפֶת can denote honey, especially flowing or comb honey. 'Honey' is
    the clearest English rendering; the more specific nuance is not essential to the
    proverb's point.
- source_word: רְעֵבָה
  chosen: hungry
  alternatives:
  - famished
  - starving
  lexicon: HALOT
  rationale: The adjective means hungry. 'Hungry' is accurate and avoids overstating
    the intensity with 'starving' unless the context demands it.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - anything
  lexicon: HALOT
  rationale: 'The term is distributive here: every bitter thing is perceived as sweet
    by the hungry. ''Every'' expresses the proverbial generalization well.'
- source_word: מַר
  chosen: bitter thing
  alternatives:
  - bitter
  - what is bitter
  lexicon: HALOT
  rationale: Used substantivally, the adjective refers to something bitter. 'Bitter
    thing' makes the substantival sense explicit in English.
- source_word: מָתוֹק
  chosen: is sweet
  alternatives:
  - seems sweet
  - tastes sweet
  lexicon: HALOT
  rationale: The adjective predicates sweetness. 'Is sweet' is the most direct rendering;
    adding 'seems' or 'tastes' would interpret beyond the Hebrew.
