id: PRO.27.3
reference: Proverbs 27:3
source:
  edition: WLC
  text: כֹּֽבֶד אֶ֭בֶן וְ/נֵ֣טֶל הַ/ח֑וֹל וְ/כַ֥עַס אֱ֝וִ֗יל כָּבֵ֥ד מִ/שְּׁנֵי/הֶֽם־׃
translation:
  text: A stone is heavy, and sand is weighty, but a fool’s anger is heavier than
    both of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A stone is heavy and a load of sand [is heavy], but a fool’s vexation
      is heavier than both.' The Hebrew uses closely related terms for heaviness in
      the first and third lines.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּבֶד
  chosen: is heavy
  alternatives:
  - heaviness
  - weight
  lexicon: HALOT
  rationale: The noun denotes heaviness/weight. In English proverb style, converting
    the nominal expression into the predicate 'is heavy' yields natural sense while
    preserving the comparison.
- source_word: אֶבֶן
  chosen: stone
  alternatives:
  - rock
  lexicon: HALOT
  rationale: '''Stone'' is the standard sense and fits the proverb''s concrete imagery
    better than the broader ''rock''.'
- source_word: נֵטֶל
  chosen: weighty
  alternatives:
  - burden
  - load
  - lifting
  lexicon: HALOT
  rationale: The noun refers to a load or something borne. In parallel with 'heavy,'
    'weighty' preserves the semantic field and reads idiomatically in English.
- source_word: הַחוֹל
  chosen: sand
  alternatives:
  - the sand
  lexicon: HALOT
  rationale: The Hebrew has the article, but English proverbial style commonly omits
    it here. 'Sand' captures the mass of loose grains as a burdensome substance.
- source_word: כַעַס
  chosen: anger
  alternatives:
  - vexation
  - provocation
  - wrath
  lexicon: HALOT
  rationale: In this context the noun denotes the fool's angry disposition or outburst.
    'Anger' is the clearest modern English equivalent; 'wrath' sounds too elevated
    and 'provocation' shifts agency.
- source_word: אֱוִיל
  chosen: a fool’s
  alternatives:
  - of a fool
  - the fool's
  lexicon: HALOT
  rationale: The singular noun in construct-like relation with 'anger' is best rendered
    possessively. 'A fool's' preserves the generic proverbial force without over-specifying
    a particular individual.
- source_word: כָּבֵד
  chosen: is heavier
  alternatives:
  - is heavy
  - is more burdensome
  lexicon: HALOT
  rationale: Though formally an adjective, in context it functions comparatively with
    מִן ('than'). 'Is heavier' makes the comparison explicit and preserves the imagery
    established in the first colon.
- source_word: מִשְּׁנֵיהֶם
  chosen: than both of them
  alternatives:
  - than the two of them
  - than both
  lexicon: HALOT
  rationale: The phrase means 'than both/two of them,' referring back to stone and
    sand together. 'Than both of them' is explicit and natural English.
