id: PRO.27.18
reference: Proverbs 27:18
source:
  edition: WLC
  text: נֹצֵ֣ר תְּ֭אֵנָה יֹאכַ֣ל פִּרְיָ֑/הּ וְ/שֹׁמֵ֖ר אֲדֹנָ֣י/ו יְכֻבָּֽד׃
translation:
  text: Whoever tends a fig tree will eat its fruit, and he who watches over his master
    will be honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guards' / 'keeps' a fig tree; the Hebrew emphasizes careful, faithful
      attention.
    reason: lexical_alternative
  - marker: b
    text: Or 'guards his master'; the phrase refers primarily to attentive, faithful
      care for one's superior, not necessarily to physical protection alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹצֵר
  chosen: tends
  alternatives:
  - guards
  - keeps
  - watches over
  lexicon: HALOT
  rationale: The participle from נצר denotes guarding/keeping, but with a fig tree
    as object the idiomatic sense is caring for or tending it so that it bears fruit.
    'Tends' communicates the agricultural care implied while preserving the proverb's
    cause-and-effect structure.
- source_word: תְּאֵנָה
  chosen: fig tree
  alternatives:
  - fig
  lexicon: HALOT
  rationale: The noun refers to the fig tree, not merely the fruit. 'Fig tree' preserves
    the concrete agricultural image that grounds the comparison.
- source_word: יֹאכַל
  chosen: will eat
  alternatives:
  - eats
  lexicon: HALOT
  rationale: The imperfect here expresses a general result or expected outcome in
    proverbial style. 'Will eat' is natural English for the consequence of faithful
    care.
- source_word: פִּרְיָהּ
  chosen: its fruit
  alternatives:
  - her fruit
  lexicon: HALOT
  rationale: The suffix is feminine singular referring back to 'fig tree.' English
    idiom prefers 'its fruit' for an inanimate tree.
- source_word: שֹׁמֵר
  chosen: watches over
  alternatives:
  - guards
  - keeps
  - serves
  lexicon: HALOT
  rationale: The participle from שמר means keep/guard/watch. With 'his master' as
    object, 'watches over' conveys attentive, faithful service without over-paraphrasing
    to 'serves.' It also preserves the parallel with נֹצֵר.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: אדון commonly means master or lord. In this wisdom context about a subordinate's
    faithful duty, 'master' best conveys the social relationship without importing
    specifically divine overtones.
- source_word: יְכֻבָּד
  chosen: will be honored
  alternatives:
  - will be esteemed
  - will be rewarded
  - will be glorified
  lexicon: HALOT
  rationale: The Pual of כבד here indicates receiving honor. 'Will be honored' is
    the most direct and idiomatic rendering, matching the proverb's theme that faithful
    care leads to fitting recognition.
