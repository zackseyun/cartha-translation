theological_decisions:
- issue: Referent of 'his master'
  chosen_reading: human master in a wisdom analogy about faithful service
  alternative_readings:
  - the Lord/God as a possible broader application
  rationale: The Hebrew אֲדֹנָיו lacks markers requiring a divine referent, and the
    proverb's parallel with tending a fig tree favors an ordinary human social relationship.
    A broader theological application may be drawn, but it should not be imported
    into the translation itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
