id: PRO.27.17
reference: Proverbs 27:17
source:
  edition: WLC
  text: בַּרְזֶ֣ל בְּ/בַרְזֶ֣ל יָ֑חַד וְ֝/אִ֗ישׁ יַ֣חַד פְּנֵֽי רֵעֵֽ/הוּ־׃
translation:
  text: Iron sharpens iron, and a man sharpens the face of his friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Iron sharpens iron, and one man sharpens another.' The Hebrew literally
      says 'sharpens the face of his friend,' an idiom that may refer to improving
      or honing another person.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  chosen: iron
  alternatives:
  - metal
  lexicon: HALOT
  rationale: The noun plainly denotes iron. Repeating it in both halves preserves
    the proverb's compact parallelism.
- source_word: בְּ/בַרְזֶל
  chosen: iron
  alternatives:
  - with iron
  - by iron
  lexicon: HALOT
  rationale: 'The prefixed ב marks instrument or means: ''with/by iron.'' In idiomatic
    English, ''Iron sharpens iron'' best captures the reciprocal sense without awkwardness,
    while the instrumental nuance is implicit.'
- source_word: יָחַד
  chosen: sharpens
  alternatives:
  - makes sharp
  - hones
  lexicon: HALOT
  rationale: In this context the Hiphil verb means to sharpen or make keen. 'Sharpens'
    is the standard and most natural English equivalent in a proverb about mutual
    improvement.
- source_word: וְאִישׁ
  chosen: a man
  alternatives:
  - a person
  - one man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and proverbially representative.
    Per the translation philosophy's gender-accurate principle, 'a man' is preferred
    over a gender-neutral substitute.
- source_word: יַחַד
  chosen: sharpens
  alternatives:
  - makes sharp
  - hones
  lexicon: HALOT
  rationale: The same verb is repeated in the second colon, so the English should
    also repeat 'sharpens' for consistency and to preserve the parallel structure.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the countenance of
  - the edge of
  - the character of
  lexicon: HALOT
  rationale: Literally 'face of.' In Hebrew idiom this can refer to a person's outward
    expression or figuratively to the person as encountered. Retaining 'face' preserves
    the concrete imagery and avoids over-interpreting the metaphor.
- source_word: רֵעֵהוּ
  chosen: his friend
  alternatives:
  - his companion
  - his neighbor
  lexicon: HALOT
  rationale: The noun commonly denotes a friend, companion, or associate. 'His friend'
    fits the interpersonal wisdom context and reads naturally in English.
