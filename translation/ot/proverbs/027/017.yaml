theological_decisions:
- issue: Representative masculine language in wisdom literature
  chosen_reading: a man
  alternative_readings:
  - a person
  - one person
  rationale: The proverb uses masculine singular אִישׁ in a representative way. Following
    the stated gender-accurate policy, the translation keeps the masculine form rather
    than neutralizing it, while recognizing that the wisdom principle is broadly applicable.
