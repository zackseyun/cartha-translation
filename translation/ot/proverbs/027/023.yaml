id: PRO.27.23
reference: Proverbs 27:23
source:
  edition: WLC
  text: יָדֹ֣עַ תֵּ֭דַע פְּנֵ֣י צֹאנֶ֑/ךָ שִׁ֥ית לִ֝בְּ/ךָ֗ לַ/עֲדָרִֽים׃
translation:
  text: Know well the condition of your flock; set your heart on the herds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Know, know the face of your flock'; the Hebrew expression means
      to know their condition well.
    reason: lexical_alternative
  - marker: b
    text: Or 'set your heart on the flocks.' The final term can overlap in sense with
      'flock' or 'herd,' referring generally to groups of livestock.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֹעַ תֵּדַע
  chosen: Know well
  alternatives:
  - Surely know
  - Know for certain
  - Diligently know
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the command. 'Know
    well' captures the emphatic force in natural English without sounding wooden.
- source_word: פְּנֵי
  chosen: the condition of
  alternatives:
  - the face of
  - the state of
  - the appearance of
  lexicon: HALOT
  rationale: Literally 'face(s) of,' but in this idiom it refers to the observable
    state or condition. 'Condition of' best conveys the sense in context.
- source_word: צֹאנְךָ
  chosen: your flock
  alternatives:
  - your sheep
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן commonly denotes small livestock, especially sheep and goats. 'Your
    flock' is idiomatic and fits the pastoral proverb better than the narrower 'sheep.'
- source_word: שִׁית
  chosen: set
  alternatives:
  - put
  - direct
  - apply
  lexicon: HALOT
  rationale: The imperative means to place or set. 'Set' works naturally with 'your
    heart on' in English and preserves the exhortational tone.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your attention
  lexicon: HALOT
  rationale: Hebrew 'heart' includes attention, intention, and concern. Retaining
    'heart' preserves the Hebrew anthropology and proverbial style.
- source_word: לַעֲדָרִים
  chosen: the herds
  alternatives:
  - the droves
  - the flocks
  lexicon: HALOT
  rationale: עֲדָרִים refers to groups of animals in folds or herds. Since צֹאן has
    already been rendered 'flock,' 'herds' provides a natural distinction while still
    covering grouped livestock more broadly.
