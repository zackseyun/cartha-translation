theological_decisions:
- issue: Rendering of אָדָם in a wisdom proverb with generic force
  chosen_reading: man
  alternative_readings:
  - humankind
  - person
  rationale: The Hebrew uses masculine singular אדם in both occurrences. Following
    the doctrine's gender-accurate principle and the contested-terms guidance for
    אָדָם ('man / humankind' depending on context), 'man' best preserves the representative
    singular structure of the proverb. Inclusive alternatives are possible interpretively,
    so they are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
