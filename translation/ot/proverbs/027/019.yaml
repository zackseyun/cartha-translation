id: PRO.27.19
reference: Proverbs 27:19
source:
  edition: WLC
  text: כַּ֭/מַּיִם הַ/פָּנִ֣ים לַ/פָּנִ֑ים כֵּ֤ן לֵֽב הָ֝/אָדָ֗ם לָ/אָדָֽם־׃
translation:
  text: As water reflects face to face, so the heart of man reflects man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As water reflects a face, so a person's heart reflects the person,'
      taking אָדָם generically as 'person' or 'humankind.'
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, 'As water, the face to the face, so the heart of man to
      man.' The verb 'reflects' is supplied from the sense of the comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמַּיִם
  chosen: As water
  alternatives:
  - Like water
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, introducing a proverb simile. 'As water'
    fits natural English parallelism and preserves the comparative structure.
- source_word: הַפָּנִים לַפָּנִים
  chosen: reflects face to face
  alternatives:
  - the face to the face
  - faces answer to faces
  - face corresponds to face
  lexicon: HALOT
  rationale: Literally 'the face to the face.' In context of water, the sense is visual
    correspondence/reflection. 'Reflects face to face' preserves the imagery while
    making the elliptical Hebrew intelligible in English.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'Standard correlative with the opening simile: ''as ... so ...''.'
- source_word: לֵב
  chosen: the heart
  alternatives:
  - heart
  - inner self
  - mind
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person, including thought and disposition.
    'Heart' is the standard and most transparent rendering in wisdom literature.
- source_word: הָאָדָם
  chosen: of man
  alternatives:
  - of a man
  - of humankind
  - of the human
  lexicon: HALOT
  rationale: With the article, the noun can be generic, but the proverb's parallelism
    favors a representative singular. Per doctrine, gender-accurate rendering is preferred
    where the source uses masculine/generic force; 'man' preserves that form.
- source_word: לָאָדָם
  chosen: reflects man
  alternatives:
  - to man
  - to a man
  - to humankind
  - corresponds to man
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken in a relational/comparative sense
    within the proverb''s parallelism. Supplying ''reflects'' in the second colon
    mirrors the first colon''s implied verb and yields a coherent sense: a person''s
    heart reveals or reflects the person.'
