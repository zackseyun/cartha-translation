- issue: Gendered representative language in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The Hebrew uses masculine singular representative language. Following
    the stated gender-accurate policy, the translation keeps 'man' rather than adopting
    a gender-neutral substitute not present in the source.
