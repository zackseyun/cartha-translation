id: PRO.27.8
reference: Proverbs 27:8
source:
  edition: WLC
  text: כְּ֭/צִפּוֹר נוֹדֶ֣דֶת מִן קִנָּ֑/הּ כֵּֽן אִ֝֗ישׁ נוֹדֵ֥ד מִ/מְּקוֹמֽ/וֹ־־׃
translation:
  text: Like a bird that wanders from its nest, so is a man who wanders from his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person who wanders from his home'; Hebrew 'from his place' is broader
      and may include one's proper location or station, not only a house.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִפּוֹר
  chosen: Like a bird
  alternatives:
  - Like a sparrow
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a small bird, not necessarily a specific
    species. 'Bird' is the broad, natural English equivalent and avoids over-specification.
- source_word: נוֹדֶדֶת
  chosen: that wanders
  alternatives:
  - that strays
  - that flits about
  lexicon: HALOT
  rationale: The participle from נוד conveys roaming, wandering, or moving restlessly.
    'Wanders' fits the proverb's image and parallels the same root later in the verse.
- source_word: מִן קִנָּהּ
  chosen: from its nest
  alternatives:
  - away from its nest
  lexicon: HALOT
  rationale: קֵן means 'nest.' The 3fs suffix agrees with the feminine noun צִפּוֹר
    in Hebrew, but English idiom naturally uses 'its' for an animal here.
- source_word: כֵּן
  chosen: so is
  alternatives:
  - so
  - thus is
  lexicon: HALOT
  rationale: כֵּן marks the comparison between the image and its human application.
    'So is' makes the proverb read naturally in English while preserving the simile
    structure.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and here functions as
    a representative individual. Per translation philosophy, the gendered form is
    retained rather than neutralized.
- source_word: נוֹדֵד
  chosen: who wanders
  alternatives:
  - who strays
  - who roams
  lexicon: HALOT
  rationale: Using 'wanders' preserves the lexical parallel with the bird in the first
    colon and reflects the participial sense of habitual or characteristic movement.
- source_word: מִמְּקוֹמוֹ
  chosen: from his place
  alternatives:
  - from his home
  - from where he belongs
  lexicon: HALOT
  rationale: מָקוֹם is broadly 'place.' 'His place' preserves the Hebrew's generality;
    'home' would narrow the sense too much, since the proverb may refer more broadly
    to one's proper station or settled location.
