theological_decisions:
- issue: Meaning of נֵזֶר in proverbial parallelism
  chosen_reading: crown, as a symbol of royal status or enduring prominence
  alternative_readings:
  - consecration
  - diadem
  rationale: The verse contrasts things people may assume are lasting—wealth and ruling
    status—but which are not guaranteed to endure. Rendering נֵזֶר as 'crown' preserves
    the concrete image and avoids over-interpreting it as purely cultic 'consecration.'
