id: PRO.27.24
reference: Proverbs 27:24
source:
  edition: WLC
  text: כִּ֤י לֹ֣א לְ/עוֹלָ֣ם חֹ֑סֶן וְ/אִם נֵ֝֗זֶר לְ/ד֣וֹר דור־׃
translation:
  text: For wealth does not last forever, nor a crown from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'riches'; חֹסֶן can denote material resources, wealth, or strength, but
      the context favors material wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'diadem' or possibly 'consecration'; the Hebrew נֵזֶר can carry these
      senses, but here likely refers to a crown as a symbol of status or rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the rationale for the surrounding exhortation; 'for' fits
    the proverb's explanatory force in context.
- source_word: חֹסֶן
  chosen: wealth
  alternatives:
  - riches
  - treasure
  - abundance
  - strength
  lexicon: HALOT
  rationale: In this context of agricultural prudence and material provision (vv.
    23–27), the noun most naturally refers to material resources or wealth rather
    than abstract strength. 'Wealth' is clear modern English and fits the proverb's
    economic theme.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - permanently
  lexicon: HALOT
  rationale: The phrase לֹא לְעוֹלָם expresses non-permanence. 'Forever' is idiomatic
    and preserves the proverb's contrast with generational duration.
- source_word: וְאִם
  chosen: nor
  alternatives:
  - and if
  - or if
  lexicon: HALOT
  rationale: Although אִם commonly means 'if,' in this elliptical proverb it functions
    in a negative correlative sense after לֹא, introducing a second denied proposition.
    'Nor' gives the intended sense in natural English.
- source_word: נֵזֶר
  chosen: crown
  alternatives:
  - diadem
  - consecration
  - royal crown
  lexicon: HALOT
  rationale: The noun can denote a crown or consecration. Here the parallel with impermanent
    wealth and the phrase 'from generation to generation' favors 'crown' as a symbol
    of dynastic rule or status. 'Crown' is the most natural and sufficiently broad
    rendering.
- source_word: לְדוֹר דּוֹר
  chosen: from generation to generation
  alternatives:
  - for every generation
  - to all generations
  - for generation and generation
  lexicon: HALOT
  rationale: The repeated noun expresses continuing succession across generations.
    'From generation to generation' is idiomatic English that preserves the distributive,
    ongoing sense.
