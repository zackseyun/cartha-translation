id: PRO.27.25
reference: Proverbs 27:25
source:
  edition: WLC
  text: גָּלָ֣ה חָ֭צִיר וְ/נִרְאָה דֶ֑שֶׁא וְ֝/נֶאֶסְפ֗וּ עִשְּׂב֥וֹת הָרִֽים־׃
translation:
  text: The hay is removed, and new growth appears, and the grasses of the hills are
    gathered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The grass is gone,' or 'The hay is uncovered.' The Hebrew verb can denote
      being uncovered or removed; the context suggests the hay has been cut or has
      disappeared.
    reason: lexical_alternative
  - marker: b
    text: Or 'tender grass' or 'fresh grass' for 'new growth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the herbs/plants of the mountains are gathered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלָה
  chosen: is removed
  alternatives:
  - is uncovered
  - is gone
  - disappears
  lexicon: HALOT
  rationale: The verb literally has the sense of being uncovered or laid bare. With
    חָצִיר ('hay/grass') as subject in this agricultural context, the sense is that
    the hay has been cut off or is gone, making room for subsequent growth. 'Is removed'
    communicates the practical result in natural English without over-paraphrasing.
- source_word: חָצִיר
  chosen: hay
  alternatives:
  - grass
  lexicon: HALOT
  rationale: In this pastoral context the term refers to grass suitable for fodder,
    and 'hay' fits the sequence of harvesting and regrowth better than the broader
    'grass.'
- source_word: נִרְאָה
  chosen: appears
  alternatives:
  - is seen
  - becomes visible
  lexicon: HALOT
  rationale: The Niphal form commonly means 'appears' or 'is seen.' 'Appears' is idiomatic
    in English and suits the emergence of fresh vegetation after the hay is removed.
- source_word: דֶשֶׁא
  chosen: new growth
  alternatives:
  - tender grass
  - green grass
  - fresh grass
  lexicon: HALOT
  rationale: The noun denotes fresh, green vegetation or tender grass. 'New growth'
    captures the idea of fresh vegetation emerging and avoids awkward repetition with
    'hay' and 'grasses' in the same verse.
- source_word: נֶאֶסְפוּ
  chosen: are gathered
  alternatives:
  - are collected
  - are harvested
  lexicon: HALOT
  rationale: The passive sense 'are gathered' is the most straightforward rendering.
    'Harvested' is possible contextually, but 'gathered' stays closer to the lexical
    sense while still fitting the agricultural setting.
- source_word: עִשְּׂבוֹת
  chosen: the grasses
  alternatives:
  - herbs
  - plants
  - green fodder
  lexicon: HALOT
  rationale: The term refers broadly to herbage or vegetation. 'Grasses' fits the
    immediate pastoral context better than 'herbs,' which in modern English can sound
    culinary or medicinal.
- source_word: הָרִים
  chosen: of the hills
  alternatives:
  - of the mountains
  - from the hill country
  lexicon: HALOT
  rationale: Although the noun can mean 'mountains,' in English 'hills' better suits
    the pastoral imagery and avoids overstating the terrain. The construct phrase
    naturally reads 'the grasses of the hills.'
