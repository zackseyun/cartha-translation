- issue: Rendering of אָדָם in a generic anthropological sense
  chosen_reading: human understanding
  alternative_readings:
  - man's understanding
  rationale: The noun is generic rather than male-specific in this context. Following
    the doctrine's gender-accurate principle, the translation preserves the anthropological
    sense without implying only males are in view.
