id: PRO.30.12
reference: Proverbs 30:12
source:
  edition: WLC
  text: דּ֭וֹר טָה֣וֹר בְּ/עֵינָ֑י/ו וּ֝/מִ/צֹּאָת֗/וֹ לֹ֣א רֻחָֽץ׃
translation:
  text: There is a generation that is pure in its own eyes, yet is not washed from
    its filth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clean in its own eyes.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word can denote 'filth,' 'dung,' or 'excrement'; the image is
      deliberately vivid.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - kind
  - people
  lexicon: HALOT
  rationale: דּוֹר commonly denotes a generation or class of people characterized
    in a certain way. In this proverb series (vv. 11–14), it introduces a type of
    people, and 'generation' preserves both the lexical sense and the repeated rhetorical
    pattern.
- source_word: טָהוֹר
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: טָהוֹר can mean ritually or morally clean/pure. Here the contrast with
    being unwashed from filth points to perceived cleanliness with moral overtones.
    'Pure' best captures the self-assessment without reducing it to merely physical
    cleanliness.
- source_word: בְּעֵינָיו
  chosen: in its own eyes
  alternatives:
  - in his own eyes
  lexicon: HALOT
  rationale: Literally 'in his/its eyes,' an idiom for self-perception or self-judgment.
    Because דּוֹר is a collective noun, English idiom is better served by 'its own
    eyes' rather than the more individualizing 'his own eyes.' 'Own' makes the reflexive
    sense explicit.
- source_word: וּמִצֹּאָתוֹ
  chosen: from its filth
  alternatives:
  - from its excrement
  - from its uncleanness
  lexicon: HALOT
  rationale: The noun צֹאָה denotes filth, dung, or excrement. In this proverb, the
    image is intentionally strong, exposing hidden impurity beneath self-righteousness.
    'Filth' preserves the moral and physical disgust while remaining natural English;
    'excrement' is more wooden and potentially distracts from the proverb's broader
    force.
- source_word: לֹא רֻחָץ
  chosen: is not washed
  alternatives:
  - has not been washed
  - is unwashed
  lexicon: HALOT
  rationale: The passive form of רחץ means 'to be washed.' 'Is not washed' keeps the
    stative/resultative force and aligns with the contrast between self-perceived
    purity and actual uncleanness. It avoids over-specifying agency, which the Hebrew
    leaves unstated.
