theological_decisions:
- issue: Nature of purity language
  chosen_reading: Render the verse as exposing self-perceived purity contrasted with
    actual uncleanness, without specifying ritual-only or moral-only impurity.
  alternative_readings:
  - primarily ritual purity
  - primarily moral purity
  rationale: The proverb uses cleanliness language that can evoke both ritual and
    moral domains. The context of Agur's sayings about arrogant and corrupt people
    favors a moral application, but the Hebrew wording itself does not require narrowing
    the image to one sphere. The translation preserves the tension rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
