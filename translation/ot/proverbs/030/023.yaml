id: PRO.30.23
reference: Proverbs 30:23
source:
  edition: WLC
  text: תַּ֣חַת שְׂ֭נוּאָה כִּ֣י תִבָּעֵ֑ל וְ֝/שִׁפְחָ֗ה כִּֽי תִירַ֥שׁ גְּבִרְתָּֽ/הּ־׃פ
translation:
  text: under a hated woman when she gets married, and a female slave when she displaces
    her mistress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherits her mistress.' The Hebrew verb often means 'inherit' or 'take
      possession of'; here it likely refers to taking over the mistress's place or
      status.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: under
  alternatives:
  - because of
  - beneath
  lexicon: HALOT
  rationale: In the larger proverb (vv. 21–23), תַּחַת introduces the conditions under
    which the earth trembles. Rendering it as 'under' preserves the idiom and links
    this colon to the preceding verse without over-paraphrasing.
- source_word: שְׂנוּאָה
  chosen: hated woman
  alternatives:
  - unloved woman
  - despised woman
  lexicon: HALOT
  rationale: The passive participle denotes a woman who is hated or rejected. 'Hated
    woman' is the most direct rendering; 'unloved' softens the force more than the
    Hebrew warrants.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance that triggers the social reversal,
    not a causal explanation in English. 'When' best fits the temporal-situational
    sense in both cola.
- source_word: תִבָּעֵל
  chosen: gets married
  alternatives:
  - is married
  - has a husband
  lexicon: HALOT
  rationale: Nifal of בעל here means 'to be married' or 'to become married.' 'Gets
    married' communicates the event naturally in modern English while preserving the
    change-of-status sense.
- source_word: שִׁפְחָה
  chosen: female slave
  alternatives:
  - maidservant
  - slave girl
  - servant-girl
  lexicon: HALOT
  rationale: The term denotes a female slave/servant of low status. In keeping with
    the project's preference to reflect bonded status where salient, 'female slave'
    is clearer than 'maidservant.'
- source_word: תִירַשׁ
  chosen: displaces
  alternatives:
  - inherits
  - takes possession of
  lexicon: HALOT
  rationale: Although ירש commonly means 'inherit' or 'possess,' in this social context
    the sense is that the slave takes over the position/property of her mistress.
    'Displaces' makes the implied social usurpation explicit in idiomatic English
    without adding a new idea.
- source_word: גְּבִרְתָּהּ
  chosen: her mistress
  alternatives:
  - her lady
  - her mistress/owner
  lexicon: HALOT
  rationale: The noun refers to a female superior or mistress of the household. 'Mistress'
    is the standard concise rendering in this servant-master context.
