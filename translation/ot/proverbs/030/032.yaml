id: PRO.30.32
reference: Proverbs 30:32
source:
  edition: WLC
  text: אִם נָבַ֥לְתָּ בְ/הִתְנַשֵּׂ֑א וְ/אִם זַ֝מּ֗וֹתָ יָ֣ד לְ/פֶֽה־־׃
translation:
  text: If you have acted foolishly by exalting yourself, or if you have plotted evil,
    put your hand over your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have devised' or 'have schemed'; the Hebrew verb can mean to plan or
      contrive, often with a negative sense in wisdom contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'hand to mouth,' an idiom meaning to stop speaking or to restrain
      oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבַלְתָּ
  chosen: have acted foolishly
  alternatives:
  - have been foolish
  - have behaved disgracefully
  lexicon: HALOT
  rationale: The verb נבל can denote acting foolishly or disgracefully. 'Have acted
    foolishly' fits the moral/practical tone of Proverbs and reads naturally in English
    without reducing the force to mere lack of intelligence.
- source_word: בְהִתְנַשֵּׂא
  chosen: by exalting yourself
  alternatives:
  - in exalting yourself
  - when you exalt yourself
  lexicon: HALOT
  rationale: The hitpael infinitive of נשׂא here conveys self-exaltation or lifting
    oneself up. 'By exalting yourself' captures the reflexive nuance and the likely
    sense that the folly consists in self-promotion.
- source_word: זַמּוֹתָ
  chosen: have plotted evil
  alternatives:
  - have devised
  - have schemed
  lexicon: HALOT
  rationale: From זמם, the verb often carries the sense of devising or plotting, frequently
    with a negative moral coloring in wisdom literature. Since the object is unstated,
    'evil' is supplied in English to reflect the idiomatic negative force and parallel
    the warning context.
- source_word: יָד לְפֶה
  chosen: put your hand over your mouth
  alternatives:
  - lay your hand on your mouth
  - put your hand to your mouth
  lexicon: HALOT
  rationale: This idiom signifies silence, restraint, or stopping oneself from speaking
    further. 'Put your hand over your mouth' is clear modern English while preserving
    the concrete imagery.
- source_word: אִם ... וְאִם
  chosen: If ... or if
  alternatives:
  - If ... and if
  lexicon: HALOT
  rationale: The paired conditional structure presents two related cases. 'If ...
    or if' communicates the alternative possibilities more idiomatically in English
    than a wooden repetition of 'and if'.
