id: PRO.30.24
reference: Proverbs 30:24
source:
  edition: WLC
  text: אַרְבָּ֣עָה הֵ֭ם קְטַנֵּי אָ֑רֶץ וְ֝/הֵ֗מָּה חֲכָמִ֥ים מְחֻכָּמִֽים־׃
translation:
  text: 'Four are small on the earth, yet they are exceedingly wise:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'wise, made wise'—an emphatic expression meaning 'very'
      or 'exceedingly wise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה
  chosen: Four
  alternatives:
  - There are four
  lexicon: HALOT
  rationale: Cardinal numeral introducing the numerical saying. The bare 'Four' preserves
    the concise Hebrew style better than expanding to 'There are four.'
- source_word: קְטַנֵּי אָרֶץ
  chosen: small on the earth
  alternatives:
  - smallest of the earth
  - small creatures of the earth
  - small on earth
  lexicon: HALOT
  rationale: Construct phrase literally 'small ones of earth/land.' 'Small on the
    earth' keeps the adjectival force and broad reference to creatures inhabiting
    the earth, without prematurely specifying 'creatures,' which is implied by context
    but not explicit in this verse.
- source_word: וְהֵמָּה
  chosen: yet they
  alternatives:
  - and they
  - but they
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks contrast or emphatic continuation.
    'Yet they' brings out the rhetorical contrast between smallness and wisdom in
    natural English.
- source_word: חֲכָמִים
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: Standard rendering of חכם in wisdom literature. 'Wise' fits the proverb's
    theme and prepares for the intensified participle that follows.
- source_word: מְחֻכָּמִים
  chosen: exceedingly wise
  alternatives:
  - very wise
  - made wise
  - wisely endowed
  lexicon: HALOT
  rationale: Pual participle from חכם functioning as an intensifier alongside חכמים.
    Rather than a wooden 'wise, made wise,' English idiom is best served by 'exceedingly
    wise,' preserving the emphatic duplication.
